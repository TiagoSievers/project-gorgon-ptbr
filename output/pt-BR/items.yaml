"The preserved skull of a particularly impressive small animal.": "O crânio preservado de um pequeno animal particularmente impressionante."
"The preserved skull of a pretty large animal.": "O crânio preservado de um animal bastante grande."
"The preserved skull of a rakshasa.": "O crânio preservado de um rakshasa."
"The preserved skull of a sentient aberration -- a freak of nature.": "O crânio preservado de uma aberração senciente – uma aberração da natureza."
"The preserved skull of a small animal.": "O crânio preservado de um pequeno animal."
"The preserved skull of an astonishingly impressive demon.": "O crânio preservado de um demônio surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive elf.": "O crânio preservado de um elfo surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive fairy.": "O crânio preservado de uma fada surpreendentemente impressionante."
