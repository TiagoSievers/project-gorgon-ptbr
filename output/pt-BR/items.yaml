"A bit of mistletoe with a soft green glow. Probably pretty useful for druids. Exotic plant collectors would like it, too.": "Um pouco de visco com um suave brilho verde. Provavelmente muito útil para druidas. Os colecionadores de plantas exóticas também gostariam."
"A bit of sea sponge that's been soaked in something weird. Smells like camphor and... something else you can't place. Supposedly these sponges absorb ambient magic and can be used in potions.": "Um pedaço de esponja do mar embebido em algo estranho. Cheira a cânfora e... outra coisa que você não consegue identificar. Supostamente essas esponjas absorvem a magia ambiente e podem ser usadas em poções."
"A bit of string that will (technically) burn.": "Um pedaço de barbante que irá (tecnicamente) queimar."
"A bit of tentacle from a kraken.": "Um pedaço de tentáculo de um kraken."
"A bit of very specialized cloth that is used by expert flower arrangers.": "Um pedaço de tecido muito especializado usado por arranjadores de flores experientes."
"A bit weighty due to the sheer amount of protection, but you barely notice thanks to the weighting.": "Um pouco pesado devido à grande quantidade de proteção, mas você quase não percebe graças ao peso."
"A bizarre snack that uses a rare fish found only in the deepest of caves. You eat it scales and all. It takes some getting used to.": "Um lanche bizarro que utiliza um peixe raro encontrado apenas nas cavernas mais profundas. Você come escamas e tudo. Leva algum tempo para se acostumar."
"A blade that has been in the Sedgewick family line for generations.": "Uma lâmina que está na linhagem da família Sedgewick há gerações."
"A bland snack.": "Um lanche sem graça."
"A blend of baked vegetables in a hearty cheese sauce.": "Uma mistura de vegetais assados ​​em um farto molho de queijo."
"A blend of fairy wings and secret ingredients that are quite difficult to digest due to their repulsiveness. It is banned in half of the fairy courts, and readily available in the other half.": "Uma mistura de asas de fada e ingredientes secretos que são bastante difíceis de digerir devido à sua repulsividade. É proibido em metade das cortes das fadas e está prontamente disponível na outra metade."
"A blob of dirty cotton, full of seeds. You could de-seed it by hand... but that would take forever. You could also plant the seeds in a garden.": "Uma gota de algodão sujo, cheio de sementes. Você poderia retirá-lo manualmente... mas isso levaria uma eternidade. Você também pode plantar as sementes em um jardim."
"A blob of dirty wool.": "Uma gota de lã suja."
"A blob of organic sentient tissue that you can kind of fit onto your head!": "Uma bolha de tecido senciente orgânico que você pode colocar na sua cabeça!"
"A blue cheese with a surprisingly floral smell that tastes like raw meat.": "Um queijo azul com um cheiro surpreendentemente floral que tem gosto de carne crua."
"A blue-green stone. It has been tuned as an amplifier for certain armorsmithing recipes.": "Uma pedra azul esverdeada. Ele foi ajustado como um amplificador para certas receitas de armadura."
"A blurry watercolor without much to redeem it. However, it was made with highly magical elven pigments that can be reclaimed.": "Uma aquarela borrada sem muito que a redimisse. No entanto, foi feito com pigmentos élficos altamente mágicos que podem ser recuperados."
"A bone key that fits in any of the special event loot chests in Serbule. (Look behind the inn.)": "Uma chave de osso que cabe em qualquer um dos baús de saque de eventos especiais em Serbule. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 15-20 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saques de nível 15-20. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 30 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saques de nível 30. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 40 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saque de nível 40. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 50 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saque de nível 50. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 60 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saque de nível 60. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 70 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saque de nível 70. (Olhe atrás da pousada.)"
"A bone key that fits in the special chest in Serbule for level 80 loot. (Look behind the inn.)": "Uma chave de osso que cabe no baú especial em Serbule para saque de nível 80. (Olhe atrás da pousada.)"
"A bone.": "Um osso."
"A bony arm spike that's been removed from a demonic Behemoth. It's much heavier than you'd expect for its size.": "Uma ponta de braço ossuda que foi removida de um Behemoth demoníaco. É muito mais pesado do que você esperaria pelo seu tamanho."
"A book with Orcish phrases translated into several languages.": "Um livro com frases orcs traduzidas para vários idiomas."
"A book written in Orcish. From the diagrams, it seems to be about magic.": "Um livro escrito em orc. Pelos diagramas, parece que se trata de magia."
"A book written in Orcish. In the title, you recognize the orcish word for Gotkul, a famous orc general that commands a massive army in the Crone Hegemony.": "Um livro escrito em orc. No título, você reconhece a palavra orc para Gotkul, um famoso general orc que comanda um enorme exército na Hegemonia Crone."
"A book written in Orcish. It has many pictures of spears, polearms, and swords.": "Um livro escrito em orc. Tem muitas fotos de lanças, armas de haste e espadas."
"A book written in Orcish. It seems to be about war machines.": "Um livro escrito em orc. Parece ser sobre máquinas de guerra."
"A book written in Orcish. It seems to show techniques for the knife.": "Um livro escrito em orc. Parece mostrar técnicas para a faca."
"A book written in Orcish. It's clearly a guide to first aid.": "Um livro escrito em orc. É claramente um guia de primeiros socorros."
"A book written in Orcish. It's very long and there are very few pictures.": "Um livro escrito em orc. É muito longo e tem poucas fotos."
"A book written in Orcish. Judging by the pictures, it seems to be about Tast, the god of war and armies.": "Um livro escrito em orc. A julgar pelas fotos, parece ser sobre Tast, o deus da guerra e dos exércitos."
"A book written in Orcish. The occasional diagrams and woodcut illustrations suggest that it's about orcish mages that perform weird rituals.": "Um livro escrito em orc. Os diagramas ocasionais e ilustrações em xilogravura sugerem que se trata de magos orcs que realizam rituais estranhos."
"A book written in Orcish. The woodcuts appear to depict the other major races such as humans, elves, and dwarves.": "Um livro escrito em orc. As xilogravuras parecem representar outras raças importantes, como humanos, elfos e anões."
"A book.": "Um livro."
"A bottle of disgusting stuff used in making cheese.": "Uma garrafa de coisa nojenta usada para fazer queijo."
"A bottle of extraordinarily potent rum. It's supposedly made by enslaved fairies who are forced to generate magical sugar all day. This sugar when fermented raises the alcohol percentage well above 100%, much to the chagrin of everyone trying to comprehend what that could possibly mean.": "Uma garrafa de rum extraordinariamente potente. Supostamente é feito por fadas escravizadas que são forçadas a gerar açúcar mágico o dia todo. Esse açúcar quando fermentado eleva o percentual de álcool bem acima de 100%, para desgosto de todos que tentam compreender o que isso pode significar."
"A bottle of fairy honey, said to be more delicious than mortals can bear to taste. That's just hyperbole, but it's definitely an extremely rich and complex flavor.": "Uma garrafa de mel de fada, considerado mais delicioso do que os mortais podem suportar. Isso é apenas um exagero, mas é definitivamente um sabor extremamente rico e complexo."
"A bottle of honey.": "Uma garrafa de mel."
"A bottle of squid ink that's gone bad. It's leaking from the top.": "Um frasco de tinta de lula que estragou. Está vazando de cima."
"A bottle with five small areas to hold dirt.": "Uma garrafa com cinco pequenas áreas para reter a sujeira."
"A bow designed by Denton Razor using a secret bowyery technique. It's surprisingly heavy for such a sleek weapon.": "Um arco desenhado por Denton Razor usando uma técnica secreta de arco e flecha. É surpreendentemente pesado para uma arma tão elegante."
"A bow designed to channel lightning. And also arrows.": "Um arco projetado para canalizar raios. E também flechas."
"A bowl of oats and milk. Warm and bland. You should eat a bowl immediately! Food boosts your health and power regeneration rates, and makes combat much easier.": "Uma tigela de aveia e leite. Quente e sem graça. Você deve comer uma tigela imediatamente! A comida aumenta as taxas de regeneração de saúde e energia e torna o combate muito mais fácil."
"A box for storing up to 12 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 12 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 16 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 16 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 20 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 20 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 24 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 24 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 28 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 28 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 32 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 32 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box for storing up to 8 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma caixa para armazenar até 8 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A box with an unusual mechanical lock.": "Uma caixa com uma fechadura mecânica incomum."
"A box. It can't be opened, but you hear pitiable pleading coming from inside.": "Uma caixa. Não pode ser aberto, mas você ouve súplicas lamentáveis ​​vindo de dentro."
"A box. It can't be opened, but you hear screaming coming from inside.": "Uma caixa. Não pode ser aberto, mas você ouve gritos vindos de dentro."
"A box. It can't be opened, but you hear whimpering and crying coming from inside.": "Uma caixa. Não pode ser aberto, mas você ouve gemidos e choro vindo de dentro."
"A brain that's been preserved in some sort of alchemical soup.": "Um cérebro que foi preservado numa espécie de sopa alquímica."
"A brain.": "Um cérebro."
"A brass gear the size of your hand. It has no obvious purpose.": "Uma engrenagem de latão do tamanho da sua mão. Não tem nenhum propósito óbvio."
"A brass horn of dwarven design.": "Um chifre de latão de desenho anão."
"A brass... thing. It's small yet surprisingly heavy. It has no obvious use.": "Uma coisa de bronze. É pequeno, mas surpreendentemente pesado. Não tem uso óbvio."
"A breathtaking scene of the old Council grounds of Ema. It seems to be 3000 years old. Sadly, however, there are traces of alteration magic in the paint, and it could well be a forgery.": "Uma cena deslumbrante dos antigos terrenos do Conselho de Ema. Parece ter 3.000 anos. Infelizmente, porém, há vestígios de alteração mágica na pintura, e pode muito bem ser uma falsificação."
"A bright blue stone, almost teal in color. In magic, it is associated with beaches and waves.": "Uma pedra azul brilhante, quase de cor azul-petróleo. Na magia, está associado a praias e ondas."
"A bright yellow lemon.": "Um limão amarelo brilhante."
"A broken-off part of a giant rat's tooth.": "Uma parte quebrada de um dente de rato gigante."
"A broken-off piece of a zombie. It stinks quite badly, but doesn't seem to be rotting too quickly...": "Um pedaço quebrado de um zumbi. Cheira muito mal, mas não parece apodrecer muito rapidamente..."
"A brooch with an emerald inlaid in the middle. It's too dinged up to be valuable, but it's still pretty.": "Um broche com uma esmeralda incrustada no meio. Está muito desgastado para ser valioso, mas ainda é bonito."
"A bug bomb. Used as ammo for the Basic Bug Bomb ability. (The instructions are printed on the side; use this item to learn ability if needed.)": "Uma bomba contra insetos. Usado como munição para a habilidade Basic Bug Bomb. (As instruções estão impressas ao lado; use este item para aprender habilidades, se necessário.)"
"A bulging bag that's always slightly warm to the touch.": "Uma bolsa volumosa e sempre ligeiramente quente ao toque."
"A bulky knife designed to pry oysters open. (Keep in your inventory to allow oyster-opening. Also provides a 7% chance for a bonus pearl.)": "Uma faca volumosa projetada para abrir ostras. (Mantenha em seu inventário para permitir a abertura de ostras. Também oferece 7% de chance de obter uma pérola bônus.)"
"A bulky wooden cup full of greenish energy. You can sip this in your dying moments in order to come back to life. Only druids can consume this energy.": "Uma volumosa xícara de madeira cheia de energia esverdeada. Você pode saborear isso nos momentos finais para voltar à vida. Somente druidas podem consumir essa energia."
"A bunch of fresh barley grass.": "Um monte de grama de cevada fresca."
"A bunch of greens that grow in swamps and sewers. Edible if properly dried and prepared.": "Um monte de verduras que crescem em pântanos e esgotos. Comestível se devidamente seco e preparado."
"A bunch of seaweed, edible if properly dried and prepared.": "Um monte de algas marinhas, comestíveis se devidamente secas e preparadas."
"A bunch of sugarcane stalks. Sugarcane can be cooked into molasses and sugar.": "Um monte de talos de cana-de-açúcar. A cana-de-açúcar pode ser transformada em melaço e açúcar."
"A bunch of weeds wrapped around a stick, that counts as a banner, right?": "Um monte de mato enrolado em um pedaço de pau, isso conta como faixa, certo?"
"A bundle of 1000 amazing arrowheads for amazing arrows.": "Um pacote de 1000 pontas de flechas incríveis para flechas incríveis."
"A bundle of 1000 arrow fletchings for amazing and astonishing arrows.": "Um pacote de 1000 penas de flechas para flechas incríveis e surpreendentes."
"A bundle of 1000 arrow fletchings for awesome and incredible arrows.": "Um pacote de 1000 penas de flechas para flechas incríveis e incríveis."
"A bundle of 1000 arrow fletchings for basic and advanced arrows.": "Um pacote de 1000 penas de flechas para flechas básicas e avançadas."
"A bundle of 1000 arrow fletchings for expert's and masterwork arrows.": "Um pacote de 1.000 penas de flechas para flechas de especialistas e obras-primas."
"A bundle of 1000 arrow fletchings for marvelous and breathtaking arrows.": "Um pacote de 1000 penas de flechas para flechas maravilhosas e de tirar o fôlego."
"A bundle of 1000 arrow fletchings for resplendant and perfectish arrows.": "Um pacote de 1000 penas de flechas para flechas resplandecentes e perfeitas."
"A bundle of 1000 arrow shafts for advanced arrows.": "Um pacote de 1000 hastes de flechas para flechas avançadas."
"A bundle of 1000 arrow shafts for amazing arrows.": "Um pacote de 1000 hastes de flechas para flechas incríveis."
"A bundle of 1000 arrow shafts for astonishing arrows.": "Um pacote de 1000 hastes de flechas para flechas surpreendentes."
"A bundle of 1000 arrow shafts for awesome arrows.": "Um pacote de 1000 hastes de flechas para flechas incríveis."
"A bundle of 1000 arrow shafts for basic arrows.": "Um pacote de 1000 hastes de flechas para flechas básicas."
"A bundle of 1000 arrow shafts for beginner-level arrows.": "Um pacote de 1000 hastes de flecha para flechas de nível iniciante."
"A bundle of 1000 arrow shafts for breathtaking arrows.": "Um pacote de 1000 hastes de flechas para flechas de tirar o fôlego."
"A bundle of 1000 arrow shafts for expert arrows.": "Um pacote de 1000 hastes de flecha para flechas experientes."
"A bundle of 1000 arrow shafts for incredible arrows.": "Um pacote de 1000 hastes de flechas para flechas incríveis."
"A bundle of 1000 arrow shafts for marvelous arrows.": "Um pacote de 1000 hastes de flechas para flechas maravilhosas."
"A bundle of 1000 arrow shafts for masterwork arrows.": "Um pacote de 1000 hastes de flechas para flechas magistrais."
"A bundle of 1000 arrow shafts for resplendent arrows.": "Um pacote de 1000 hastes de flechas para flechas resplandecentes."
"A bundle of 1000 arrowheads for advanced arrows.": "Um pacote de 1000 pontas de flecha para flechas avançadas."
"A bundle of 1000 astonishing arrowheads for astonishing arrows.": "Um pacote de 1000 pontas de flechas surpreendentes para flechas surpreendentes."
"A bundle of 1000 awesome arrowheads for awesome arrows.": "Um pacote de 1000 pontas de flechas incríveis para flechas incríveis."
"A bundle of 1000 beautiful arrowheads for masterwork arrows.": "Um pacote de 1000 lindas pontas de flecha para flechas magistrais."
"A bundle of 1000 flinty arrowheads for beginner-level arrows.": "Um pacote de 1000 pontas de flecha duras para flechas de nível iniciante."
"A bundle of 1000 glass beakers to be inserted into arrows.": "Um pacote de 1000 copos de vidro para serem inseridos em flechas."
"A bundle of 1000 glass beakers to be inserted into arrows. Careful! They're fragile.": "Um pacote de 1000 copos de vidro para serem inseridos em flechas. Cuidadoso! Eles são frágeis."
"A bundle of 1000 mediocre arrowheads for basic arrows.": "Um pacote de 1000 pontas de flecha medíocres para flechas básicas."
"A bundle of 1000 quality arrowheads for expert arrows.": "Um pacote de 1000 pontas de flecha de qualidade para flechas experientes."
"A bundle of flax, ready to be water retted. Place in deep water. Takes 30 minutes to soak.": "Um feixe de linho, pronto para ser macerado com água. Coloque em águas profundas. Demora 30 minutos para ficar de molho."
"A bundle of rough phlogiston that has carefully sealed up and labeled \"Semi-Sturdy Phlogiston\".": "Um pacote de flogisto áspero que foi cuidadosamente selado e rotulado como \"Flogisto Semi-Resistente\"."
"A butterfly that's been captured alive. It doesn't look happy... but it's alive!": "Uma borboleta que foi capturada viva. Não parece feliz... mas está vivo!"
"A buttery, banana-flavored wine that's quite a mouthful.": "Um vinho amanteigado com sabor de banana que dá um bocado."
"A cake to celebrate 3 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 3 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A cake to celebrate 4 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 4 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A cake to celebrate 5 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 5 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A cake to celebrate 6 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 6 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A cake to celebrate 7 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 7 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A cake to celebrate 8 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Um bolo para comemorar os 8 anos do Projeto: Gorgon no Steam! Obrigado por jogar e nos apoiar!"
"A calming display of relaxing flowers that helps you get comfortable.": "Uma exibição calmante de flores relaxantes que ajuda você a se sentir confortável."
"A care package consisting entirely of mushrooms.": "Um pacote de cuidados composto inteiramente por cogumelos."
"A care package including mushroom substrate, a bag of beads, and several paper notes.": "Um pacote de cuidados incluindo substrato de cogumelo, um saco de miçangas e várias notas de papel."
"A care package including sacks of Councils, odd-colored dyes, and a note.": "Um pacote de cuidados incluindo sacos de Conselhos, corantes de cores estranhas e uma nota."
"A care package including some clover, salt licks, sealed documents, and a strange device you don't recognize.": "Um pacote de cuidados que inclui alguns trevos, salgadinhos, documentos lacrados e um dispositivo estranho que você não reconhece."
"A carefully killed and prepared lungfish, ready for cooking.": "Um peixe pulmonado cuidadosamente morto e preparado, pronto para cozinhar."
"A carefully tweaked dose of iocaine powder, designed to make you very ill but not kill you, allowing the body to build up resistance to the deadly toxin.": "Uma dose cuidadosamente ajustada de pó de iocaína, projetada para deixá-lo muito doente, mas não matá-lo, permitindo que o corpo desenvolva resistência à toxina mortal."
"A carefully-made knife designed for expert knife-throwers. (Used with the Knife combat skill.)": "Uma faca cuidadosamente feita e projetada para atiradores de facas experientes. (Usado com a habilidade de combate Faca.)"
"A chalky root with a flowery smell. Chewed by ratkin as a snack, and featured heavily in ratkin cuisine.": "Uma raiz calcária com cheiro floral. Mastigado por ratkin como lanche e muito presente na culinária ratkin."
"A chapter from an adventure novel.": "Um capítulo de um romance de aventura."
"A cheap tin cup stained with tea.": "Uma xícara barata de lata manchada de chá."
"A chewy, hearty grain that can be milled into chewy, hearty flour.": "Um grão forte e em borracha que pode ser moído e transformado em farinha forte e em borracha."
"A chisel with a magical tip designed to chip away magical crystal.": "Um cinzel com ponta mágica projetado para remover cristais mágicos."
"A chunk from a destroyed sun guardian statue. It crumbles easily into a magical healing powder that can be applied to the skin.": "Um pedaço de uma estátua destruída do guardião do sol. Ele se desintegra facilmente em um pó mágico de cura que pode ser aplicado na pele."
"A chunk of a dead scray. It still glows faintly.": "Um pedaço de um cadáver. Ainda brilha fracamente."
"A chunk of a weird giant mushroom. It reeks of death, and you're pretty sure it has no practical use.": "Um pedaço de um estranho cogumelo gigante. Cheira a morte e você tem certeza de que não tem utilidade prática."
"A chunk of brittle ore. It is extremely hard to smith, but alchemists have found some uses for it.": "Um pedaço de minério quebradiço. É extremamente difícil de forjar, mas os alquimistas encontraram alguns usos para ele."
"A chunk of dense (yet brittle) iridium. It's used in the creation of acid-proof armor and strange robotic constructs. It can also be used to augment jewelry.": "Um pedaço de irídio denso (mas quebradiço). É usado na criação de armaduras à prova de ácido e estranhas construções robóticas. Também pode ser usado para aumentar joias."
"A chunk of fool's gold. It has many alchemical uses, and is great for making costume jewelry. It is often used in formulas that augment jewelry.": "Um pedaço de ouro de tolo. Tem muitos usos alquímicos e é ótimo para fazer bijuterias. É frequentemente usado em fórmulas que complementam joias."
"A chunk of metal with magic-amplification properties. It is used as a form of currency among some goblins due to hyper-inflation of goblin paper money.": "Um pedaço de metal com propriedades de amplificação mágica. É usado como forma de moeda entre alguns goblins devido à hiperinflação do papel-moeda dos goblins."
"A chunk of ore that could be used to make gold equipment and jewelry. It is also used in formulas that augment jewelry.": "Um pedaço de minério que poderia ser usado para fazer equipamentos e joias de ouro. Também é usado em fórmulas que complementam joias."
"A chunk of ore that could be used to make silver equipment and jewelry. It can also be used in formulas that augment jewelry.": "Um pedaço de minério que poderia ser usado para fazer equipamentos e joias de prata. Também pode ser usado em fórmulas que complementam joias."
"A chunk of pointy ore. Its most common use is by blacksmiths, who can add fireproofing to armor with it.": "Um pedaço de minério pontudo. Seu uso mais comum é por ferreiros, que com ele podem adicionar proteção contra fogo às armaduras."
"A chunk of raw boar meat from an amazing animal.": "Um pedaço de carne crua de javali de um animal incrível."
"A chunk of raw boar meat from an impressive animal.": "Um pedaço de carne crua de javali de um animal impressionante."
"A chunk of raw deer meat.": "Um pedaço de carne crua de veado."
"A chunk of raw pig meat.": "Um pedaço de carne de porco crua."
"A chunk of rock from a cave deep under Eltibule.": "Um pedaço de rocha de uma caverna nas profundezas de Eltibule."
"A chunk of soft metal. While it's not particularly strong, it's very easy for smiths to work with, so it has uses in specialized armors and weapons. Fletchers use it to create dense arrows.": "Um pedaço de metal macio. Embora não seja particularmente forte, é muito fácil de trabalhar para os ferreiros, por isso tem uso em armaduras e armas especializadas. Fletchers usam-no para criar flechas densas."
"A chunk of weird ore that can conduct powerful magics, but requires extreme skill to craft with.": "Um pedaço de minério estranho que pode realizar magias poderosas, mas requer extrema habilidade para ser fabricado."
"A chunk of weird ore. It's a potent conductor of certain magics and is used in specialized armor and weapons.": "Um pedaço de minério estranho. É um potente condutor de certas magias e é usado em armaduras e armas especializadas."
"A clamp and a delicate hammer for turning gems into powder.": "Uma pinça e um martelo delicado para transformar pedras preciosas em pó."
"A classic dwarven military design. While it has down sides, the upside is incredible durability.": "Um design militar anão clássico. Embora tenha desvantagens, a vantagem é uma durabilidade incrível."
"A classic elven-style bow with magic to enhance distance.": "Um arco clássico de estilo élfico com magia para aumentar a distância."
"A classic fairy dish.": "Um prato clássico de fada."
"A classic polished crown with small embedded gems. (Level 40 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 40.)"
"A classic polished crown with small embedded gems. (Level 50 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 50.)"
"A classic polished crown with small embedded gems. (Level 60 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 60.)"
"A classic polished crown with small embedded gems. (Level 70 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 70.)"
"A classic polished crown with small embedded gems. (Level 80 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 80.)"
"A classic polished crown with small embedded gems. (Level 90 variety.)": "Uma coroa polida clássica com pequenas pedras preciosas embutidas. (Variedade de nível 90.)"
"A classic ratkin breakfast drink. Best served hot. (And best drunk by a ratkin, but what can you do.)": "Uma bebida clássica de café da manhã ratkin. Melhor servido quente. (E é melhor bebido por um ratkin, mas o que você pode fazer.)"
"A classic scary carved pumpkin.": "Uma abóbora esculpida clássica e assustadora."
"A classic vegetarian goblin meal that's heavy on the mashed potatoes.": "Uma refeição clássica de duendes vegetarianos com muito purê de batata."
"A claw enchanted specifically for making horrible scars.": "Uma garra encantada especificamente para fazer cicatrizes horríveis."
"A claw tailored specifically for the Claw Barrage maneuver.": "Uma garra adaptada especificamente para a manobra Claw Barrage."
"A claw with ugly tassels dangling from it. Being hit by this stupid-looking weapon is especially infuriating.": "Uma garra com borlas feias penduradas nela. Ser atingido por esta arma de aparência estúpida é especialmente irritante."
"A claw-style fighting weapon with spring-loaded pop-up mechanisms to disperse chemicals. A tricky weapon to master.": "Uma arma de combate tipo garra com mecanismos pop-up acionados por mola para dispersar produtos químicos. Uma arma difícil de dominar."
"A clean beer with hints of oak and licorice. The preferred drink of humans in the Crone Hegemony.": "Uma cerveja limpa com notas de carvalho e alcaçuz. A bebida preferida dos humanos na Hegemonia Crone."
"A clean, dry beer that goes down easy.": "Uma cerveja limpa, seca e que desce facilmente."
"A cleaned fish, ready for cooking.": "Um peixe limpo e pronto para cozinhar."
"A clever belt with lots of compartments for storing stuff.": "Um cinto inteligente com muitos compartimentos para guardar coisas."
"A clever combination of dwarven and rakshasa jewelrysmithing, these were used by chainmail-smiths to speed up their work.": "Uma combinação inteligente de joalheria anã e rakshasa, estas eram usadas por ferreiros de cota de malha para acelerar seu trabalho."
"A club made from a sacred tree that died heroically.": "Um porrete feito de uma árvore sagrada que morreu heroicamente."
"A clump of feathers from a midsized bird.": "Um aglomerado de penas de um pássaro de médio porte."
"A clunky necklace with an attached pouch. Made in response to Povus legging's stereotypical lack of pockets.": "Um colar desajeitado com uma bolsa anexada. Feito em resposta à estereotipada falta de bolsos da legging Povus."
"A coarse variety of whisky that's commonly drunk in the dwarven military.": "Uma variedade grosseira de uísque comumente bebido pelos militares anões."
"A cold piece of magical crystal.": "Um pedaço frio de cristal mágico."
"A cold stew that seems warm to the touch. And it smells amazing. What's your favorite food? Why, it smells exactly like that, and tastes even better!": "Um ensopado frio que parece quente ao toque. E tem um cheiro incrível. Qual é a sua comida favorita? Ora, cheira exatamente assim e tem um sabor ainda melhor!"
"A collar for a wizard's familiar. This model is used on familiars that tend to run away. (You must be an animal to wear this collar.)": "Uma coleira para o familiar de um bruxo. Este modelo é usado em familiares que tendem a fugir. (Você deve ser um animal para usar esta coleira.)"
"A collar to make large dogs smaller and less scary to some individuals.": "Uma coleira para tornar os cães grandes menores e menos assustadores para alguns indivíduos."
"A collection of 1000 dowels that are the right length for becoming arrows, if a fletcher prepared them.": "Uma coleção de 1000 cavilhas com o comprimento certo para se tornarem flechas, se um fletcher as preparasse."
"A collection of rectangles on a blue background painted by Susarex, an elf that was turned into a snake in a tragic zoo accident. The perfectly straight rectangles took Susarex over 200 hours to complete.": "Uma coleção de retângulos sobre fundo azul pintados por Susarex, um elfo que se transformou em cobra em um trágico acidente no zoológico. Os retângulos perfeitamente retos levaram Susarex mais de 200 horas para serem concluídos."
"A colony of thin tube-like fungus that collects ambient magical energy and can release that energy in an explosive burst.": "Uma colônia de fungos finos em forma de tubo que coleta a energia mágica do ambiente e pode liberar essa energia em uma explosão explosiva."
"A comb in the orcish style, made of bone and dipped in gold. Worn as jewelry.": "Um pente no estilo orc, feito de osso e banhado em ouro. Usado como joia."
"A comfortable chain overshirt.": "Uma confortável camiseta de corrente."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +15 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +15 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +18 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +18 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +21 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +21 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +24 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +24 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +27 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +27 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +30 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua regeneração de armadura em +30 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +33 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +33 por 30 minutos."
"A comfy helmet that is almost (but not quite) attractive, too!": "Um capacete confortável que é quase (mas não totalmente) atraente também!"
"A common backup weapon for many types of fairies.": "Uma arma reserva comum para muitos tipos de fadas."
"A common backup weapon for Spring Fairies that's beginning to find popularity among Winter as well.": "Uma arma reserva comum para as Fadas da Primavera que está começando a ganhar popularidade também entre o Inverno."
"A common magical ring worn by ranalon. It exudes a slimy film.": "Um anel mágico comum usado por Ranalon. Exala uma película viscosa."
"A common ranalon weapon that doubles as a multi-purpose tool. Ranastaves are sturdy enough to dig with and resilient enough to survive earth-magic being cast through them.": "Uma arma ranalon comum que também funciona como uma ferramenta multifuncional. Ranastaves são resistentes o suficiente para escavar e resistentes o suficiente para sobreviver à magia da terra sendo lançada através deles."
"A communication device common among Crone Hegemony officers, akin to a Sending Stone from the Council Lands... but much, much, creepier. This one seems inert.": "Um dispositivo de comunicação comum entre os oficiais da Hegemonia Crone, semelhante a uma Pedra Enviadora das Terras do Conselho... mas muito, muito, mais assustador. Este parece inerte."
"A competent and accurate weapon made by the elves of Sedgewick Forest.": "Uma arma competente e precisa feita pelos elfos da Floresta Sedgewick."
"A complex, dense cake.": "Um bolo complexo e denso."
"A compound that contains tannic acid. It can be used to create astounding and awesome leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro incrível e incrível."
"A compound that contains tannic acid. It can be used to create crude and decent leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro bruto e decente."
"A compound that contains tannic acid. It can be used to create great and amazing leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro incrível e incrível."
"A compound that contains tannic acid. It can be used to create incredible and marvelous leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro incrível e maravilhoso."
"A compound that contains tannic acid. It can be used to create nice and quality leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro bonito e de qualidade."
"A compound that contains tannic acid. It can be used to create shoddy and rough leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro de má qualidade e áspero."
"A conveniently-sized shovel, perfect for digging small graves. (With this in your inventory, you will have the option of burying the corpses of deceased monsters. Burying monsters will make replacement monsters appear more quickly.)": "Uma pá de tamanho conveniente, perfeita para cavar pequenas sepulturas. (Com isso em seu inventário, você terá a opção de enterrar os cadáveres de monstros falecidos. Enterrar monstros fará com que monstros substitutos apareçam mais rapidamente.)"
"A cool soothing liquid.": "Um líquido refrescante e calmante."
"A corrosive alchemical liquid that is far too dangerous for common use, and is best left to experts.": "Um líquido alquímico corrosivo que é perigoso demais para uso comum e é melhor deixá-lo para especialistas."
"A corrosive alchemical liquid with many common uses.": "Um líquido alquímico corrosivo com muitos usos comuns."
"A corrosive alchemical liquid with many household uses. It's also commonly used to clean gemstones before cutting.": "Um líquido alquímico corrosivo com muitos usos domésticos. Também é comumente usado para limpar pedras preciosas antes de cortá-las."
"A cotton hat that's good in the cold.": "Um chapéu de algodão que é bom no frio."
"A cowl of the quality that a peasant farmer might wear.": "Um capuz da qualidade que um camponês usaria."
"A cowl that makes the wearer seem more mysterious and aloof.": "Um capuz que faz quem o usa parecer mais misterioso e indiferente."
"A cowl-like linen hat that helps keep magical energy contained.": "Um chapéu de linho em forma de capuz que ajuda a manter a energia mágica contida."
"A crate. A quick peek inside reveals a wooden suit of eight-legged armor and other bizarre items.": "Uma caixa. Uma rápida olhada no interior revela uma armadura de madeira com oito pernas e outros itens bizarros."
"A creamy bowl of porridge redolent with the delicate smell of hot evu.": "Uma tigela cremosa de mingau com o cheiro delicado de evu quente."
"A crude cow will love these crude shoes.": "Uma vaca tosca vai adorar esses sapatos toscos."
"A crude deer will love these crude shoes.": "Um cervo tosco vai adorar esses sapatos toscos."
"A crudely removed horn from the head of a Demon Soldier. It is hot to the touch.": "Um chifre toscamente removido da cabeça de um Soldado Demônio. Está quente ao toque."
"A cruel weapon for cruel necromancers who like to burn things.": "Uma arma cruel para necromantes cruéis que gostam de queimar coisas."
"A crystal used to unlock certain Crone Hegemony armory chests. This one is partially digested, but should still work.": "Um cristal usado para desbloquear certos baús do arsenal da Hegemonia Crone. Este está parcialmente digerido, mas ainda deve funcionar."
"A crystallized honeycomb containing an audio message. Only fae seem to be able to access these documents, but in this case it's clearly humdrum day-to-day paperwork.": "Um favo de mel cristalizado contendo uma mensagem de áudio. Apenas as fadas parecem ser capazes de acessar esses documentos, mas neste caso é claramente uma papelada monótona do dia a dia."
"A cup of heated mushroom blend with a pinch of spices.": "Uma xícara de mistura de cogumelos aquecidos com uma pitada de especiarias."
"A curious side-effect of demonic magic. The protrusions on this rock vaguely resemble teeth.": "Um curioso efeito colateral da magia demoníaca. As saliências desta rocha lembram vagamente dentes."
"A curiously-whittled piece of wood. It hums with electricity.": "Um pedaço de madeira curiosamente talhado. Ele zumbe com eletricidade."
"A custom wand made by an old druid.": "Uma varinha personalizada feita por um velho druida."
"A customized hammer used by armor and jewelry crafters.": "Um martelo personalizado usado por artesãos de armaduras e joias."
"A customized hammer used by armorsmiths.": "Um martelo personalizado usado por armeiros."
"A customized hammer used by chefs.": "Um martelo personalizado usado por chefs."
"A customized hammer used by master smiths.": "Um martelo personalizado usado por mestres ferreiros."
"A customized hammer used by smiths.": "Um martelo personalizado usado por ferreiros."
"A customized hammer used by toolsmiths and weaponsmiths.": "Um martelo personalizado usado por ferreiros e armeiros."
"A customized staff with heavy weights on each end.": "Uma equipe personalizada com pesos pesados ​​em cada extremidade."
"A customized system of harnesses worn around the hips and legs. Armor-enhancing nanodispensers are hidden behind the knee guards.": "Um sistema personalizado de arneses usados ​​ao redor dos quadris e pernas. Nanodispensadores que melhoram a armadura estão escondidos atrás das joelheiras."
"A dance pole that can be deployed anywhere you please. Hopefully the base is sturdy enough that it won't tip over.": "Um poste de dança que pode ser colocado em qualquer lugar que você desejar. Esperamos que a base seja resistente o suficiente para não tombar."
"A dark red stone, known for its curative properties. This particular stone has been attuned to the First Aid skill if used in crafting.": "Uma pedra vermelha escura, conhecida pelas suas propriedades curativas. Esta pedra em particular foi sintonizada com a habilidade de Primeiros Socorros se usada na elaboração."
"A dark shield bearing the inscription \"In the absence of light, darkness prevails.\"": "Um escudo escuro com a inscrição \"Na ausência de luz, a escuridão prevalece\"."
"A dead starfish.": "Uma estrela do mar morta."
"A dead starfish. It's covered in a strange goop that stings to the touch.": "Uma estrela do mar morta. Está coberto por uma gosma estranha que arde ao toque."
"A deadly masterpiece that has been disguised to look like a simple sapling bow.": "Uma obra-prima mortal que foi disfarçada para parecer um simples arco de muda."
"A deadly slashing weapon for use by expert martial artists.": "Uma arma mortal para uso por artistas marciais experientes."
"A deadly wand in the right hands.": "Uma varinha mortal nas mãos certas."
"A decent roll of leather.": "Um rolo de couro decente."
"A decent-sized frog. It's still alive, for now. It is comfortable being held and may have been someone's pet.": "Um sapo de tamanho decente. Ainda está vivo, por enquanto. É confortável ser segurado e pode ter sido o animal de estimação de alguém."
"A deceptively simple dish of beets, fish, and meat, somehow made tasty together.": "Um prato aparentemente simples de beterraba, peixe e carne, de alguma forma saborosos juntos."
"A decorative ranalan bracelet made of green glass beads.": "Uma pulseira ranalana decorativa feita de contas de vidro verdes."
"A decorative ranalan bracelet made of incredibly beautiful pearls.": "Uma pulseira ranalana decorativa feita de pérolas incrivelmente lindas."
"A decorative ranalan bracelet made of purple glass beads.": "Uma pulseira ranalan decorativa feita de contas de vidro roxas."
"A deep, difficult chapbook by the late human poet Avery Lancaster. Her imagery is hauntingly beautiful, yet profoundly stupid at the same time. That's the mark of a true master.": "Um livrinho profundo e difícil do falecido poeta humano Avery Lancaster. Suas imagens são assustadoramente belas, mas profundamente estúpidas ao mesmo tempo. Essa é a marca de um verdadeiro mestre."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like bile.": "Uma poção de ação retardada que é difícil de usar em situações estressantes e também tem gosto de bile."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like wet cardboard.": "Uma poção de ação retardada difícil de usar em situações estressantes e que também tem gosto de papelão molhado."
"A delectable pastry. (Not actually a favorite of pixies, though.)": "Um pastel delicioso. (Na verdade, não é o favorito dos duendes.)"
"A delicate flower that seems simultaneously warm and cold.": "Uma flor delicada que parece simultaneamente quente e fria."
"A delicate glass star painted red and gold.": "Uma delicada estrela de vidro pintada de vermelho e dourado."
"A delicate tool for grinding orcish wheat into flour. (Using this item will teach the recipe if needed.)": "Uma ferramenta delicada para transformar trigo orc em farinha. (Usar este item ensinará a receita, se necessário.)"
"A delicately fletched arrow with potent broadheads.": "Uma flecha de penas delicadas com pontas largas potentes."
"A delicately fletched arrow with potent broadheads. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha de penas delicadas com pontas largas potentes. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A delicious blended fruit drink.": "Uma deliciosa bebida de frutas misturadas."
"A delicious breakfast. Too bad about the lack of syrup.": "Um delicioso café da manhã. Pena que não tenha calda."
"A delicious but potentially deadly mushroom.": "Um cogumelo delicioso, mas potencialmente mortal."
"A delicious cheesy snack.": "Um delicioso lanche com queijo."
"A delicious choice for those with a big sweet tooth.": "Uma opção deliciosa para quem gosta de doces."
"A delicious cold beverage.": "Uma deliciosa bebida gelada."
"A delicious fall snack.": "Um delicioso lanche de outono."
"A delicious fresh meal.": "Uma deliciosa refeição fresca."
"A delicious meal.": "Uma deliciosa refeição."
"A delicious mushroom.": "Um delicioso cogumelo."
"A delicious salad, the perfect accompaniment to a heavy meat dish.": "Uma deliciosa salada, o acompanhamento perfeito para um prato de carne pesada."
"A delicious seasonal tea.": "Um delicioso chá sazonal."
"A delicious seasonal wine.": "Um delicioso vinho sazonal."
"A delicious slab of meat.": "Um delicioso pedaço de carne."
"A delicious snack food. It's ... some sort of meat... drenched in a sweet sauce and wrapped in dough. Selaxi refuses to part with the recipe.": "Um delicioso lanche. É... uma espécie de carne... embebida em molho doce e embrulhada em massa. Selaxi se recusa a desistir da receita."
"A delicious snack from the Red Wing Casino.": "Um delicioso lanche do Red Wing Casino."
"A delicious treat: a banana shallow-fried in sugary butter.": "Uma delícia: uma banana frita em manteiga açucarada."
"A delicious vegetarian goblin dish of corn, red pepper, and spices.": "Um delicioso prato vegetariano de duendes com milho, pimenta vermelha e especiarias."
"A delicious, if basic, pumpkin pie. It's missing fancy spices! And maybe something to top it with.": "Uma torta de abóbora deliciosa, embora básica. Está faltando temperos sofisticados! E talvez algo para completar."
"A demonic crystal that can be used to repair magical items.": "Um cristal demoníaco que pode ser usado para reparar itens mágicos."
"A demonic crystal with an unusual structure. It doesn't work well for crafting.": "Um cristal demoníaco com uma estrutura incomum. Não funciona bem para artesanato."
"A dense and delicious rye bread with strong hints of beer.": "Um pão de centeio denso e delicioso com fortes notas de cerveja."
"A dense and energizing snack.": "Um lanche denso e energizante."
"A dense and filling food, but entirely unexciting and, well, frankly disappointing.": "Uma comida densa e farta, mas totalmente desinteressante e, francamente, decepcionante."
"A dense and filling meal.": "Uma refeição densa e farta."
"A dense stick that packs a punch.": "Um bastão denso que dá um soco."
"A dependable-looking blade.": "Uma lâmina de aparência confiável."
"A depiction of Talerra, the spectral God of Depression and Knowing the Truth. Her ghostly arm beckons as if she has some bad news to deliver. This painting seems supernaturally resilient, and it has probably been blessed by one of Talerra's few monk-priests. However, it's way too creepy to display in a home.": "Uma representação de Talerra, o Deus espectral da Depressão e do Conhecimento da Verdade. Seu braço fantasmagórico acena como se ela tivesse más notícias para dar. Esta pintura parece sobrenaturalmente resistente e provavelmente foi abençoada por um dos poucos monges-sacerdotes de Talerra. No entanto, é muito assustador para ser exibido em uma casa."
"A description of how to find a huge hoard of treasure buried in the Eltibule region.": "Uma descrição de como encontrar um enorme tesouro enterrado na região de Eltibule."
"A description of how to find a huge hoard of treasure buried in the Ilmari Desert.": "Uma descrição de como encontrar um enorme tesouro enterrado no deserto de Ilmari."
