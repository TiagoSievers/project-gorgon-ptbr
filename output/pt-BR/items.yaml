"Written by an anonymous goblin poet, this melodramatic prose-poem is about worms that are used as food. It is not highly-acclaimed, but beginners to the art of poetry appreciation find it humorous.": "Escrito por um poeta duende anônimo, este poema em prosa melodramático é sobre vermes que são usados ​​como alimento. Não é muito aclamado, mas os iniciantes na arte da apreciação da poesia acham-no engraçado."
"Written by an anonymous orc, this terse poem tells the story of the battle of Fok, where over a million orcs died. The author manages to deliver a glimpse into the horrors of war. It's said that the author was drawn and quartered for producing this work, and their works burned, but obviously some copies survived.": "Escrito por um orc anônimo, este poema conciso conta a história da batalha de Fok, onde mais de um milhão de orcs morreram. O autor consegue dar uma ideia dos horrores da guerra. Diz-se que o autor foi sorteado e esquartejado por produzir esta obra, e suas obras foram queimadas, mas obviamente algumas cópias sobreviveram."
