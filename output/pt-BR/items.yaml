"The preserved skull of an astonishingly impressive human.": "O crânio preservado de um ser humano surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive large animal.": "O crânio preservado de um animal grande e surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive mid-sized animal.": "O crânio preservado de um animal de tamanho médio surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive orc.": "O crânio preservado de um orc surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive rakshasa.": "O crânio preservado de um rakshasa surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive sentient freakish creature.": "O crânio preservado de uma criatura senciente e bizarra surpreendentemente impressionante."
"The preserved skull of an astonishingly impressive small animal.": "O crânio preservado de um pequeno animal surpreendentemente impressionante."
"The preserved skull of an elf.": "O crânio preservado de um elfo."
"The preserved skull of an orc.": "O crânio preservado de um orc."
"The proboscis-like organ of a grickling. Revolting.": "O órgão semelhante à tromba de um grisalho. Revoltante."
"The product of a short-lived treaty with the Orcs of Gazluk, these orcish-style boots are comfortable and keep the feet dry in any environment. The boots were stored in a military warehouse for decades, which gives them a musty odor, but they are in great shape.": "Produto de um tratado de curta duração com os Orcs de Gazluk, essas botas estilo orc são confortáveis ​​e mantêm os pés secos em qualquer ambiente. As botas ficaram guardadas em um armazém militar durante décadas, o que lhes confere um odor de mofo, mas estão em ótimo estado."
"The quadruple-thick stitching screams \"overcompensating\" and the pattern is frankly horrendous. But it'd be good for sewer-delving or something.": "A costura quádrupla de espessura grita “supercompensação” e o padrão é francamente horrível. Mas seria bom para escavar esgotos ou algo assim."
"The Rakshasa martial artist handed this weapon down to a promising pupil.": "O artista marcial Rakshasa entregou esta arma a um aluno promissor."
"The Rakshasa outcasts in the Ilmari Desert enchant these claws with life-saving protection from the desert elements.": "Os párias Rakshasa do deserto de Ilmari encantam essas garras com proteção que salva vidas contra os elementos do deserto."
"The Razor": "A navalha"
"The razor-sharp talons of a dead dinosaur.": "As garras afiadas de um dinossauro morto."
"The rightly-feared orcish Misery Troopers from the Snowblood Army wear these near-indestructible boots. Well-maintained and polished.": "Os temidos Misery Troopers orcs do Exército Snowblood usam essas botas quase indestrutíveis. Bem conservado e polido."
"The rings of this chain suit are ridiculously thick, resulting in a very protective garment that is pretty ugly -- and very conductive of cold and electricity.": "Os anéis deste traje de corrente são ridiculamente grossos, resultando em uma vestimenta muito protetora e bastante feia - e muito condutora de frio e eletricidade."
"The Sage's Lectern, Vol. 1": "O Púlpito do Sábio, Vol. 1"
"The Sage's Lectern, Vol. 2": "O Púlpito do Sábio, Vol. 2"
"The second generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "A segunda geração de uma picareta de mineração orc. Semelhante a uma Picareta de Mineração Orc tradicional, mas com um dispositivo rotacional acelerado para permitir uma melhor mineração por meio de facadas."
"The second volume in a series of travelogues and interviews by the semi-famous mage Reginald.": "O segundo volume de uma série de diários de viagem e entrevistas do semifamoso mago Reginald."
"The seed of a treant.": "A semente de um ente."
"The Servant's Walkers": "Os caminhantes do servo"
"The shark fin provides a gelatinous texture to this otherwise-simple egg soup.": "A barbatana de tubarão fornece uma textura gelatinosa a esta simples sopa de ovo."
"The sharp bit of a scray's tail.": "A ponta afiada da cauda de um scray."
"The sharp part of a spear. It's made of silver, so perhaps it was intended to be used against lycanthropes or worm-demons.": "A parte afiada de uma lança. É feito de prata, então talvez fosse para ser usado contra licantropos ou demônios-verme."
"The sharp, bony appendage of a hexapus.": "O apêndice ósseo e afiado de um hexapo."
"The shell of a dead scorpion. It's very smelly.": "A casca de um escorpião morto. É muito fedorento."
"The shell of a deceased snail. It's pretty.": "A concha de um caracol falecido. É lindo."
"The shell of a deceased snail. This is an especially large and pretty shell.": "A concha de um caracol falecido. Esta é uma concha especialmente grande e bonita."
"The shell of a departed bivalve. It's pretty.": "A concha de um bivalve que partiu. É lindo."
"The shell of a small sea snail.": "A concha de um pequeno caracol marinho."
"The shell of a small sea snail. Some say this species comes from the fae realm, but it doesn't seem particularly unusual.": "A concha de um pequeno caracol marinho. Alguns dizem que esta espécie vem do reino das fadas, mas não parece particularmente incomum."
"The signature blade of the human assassin guild called the Shadow Keepers, this weapon design is now found across the continent. Whenever nefarious types scheme, a venomizer is likely at hand.": "A lâmina característica da guilda de assassinos humanos chamada Shadow Keepers, este design de arma agora é encontrado em todo o continente. Sempre que tipos nefastos planejam, é provável que um veneno esteja disponível."
"The simplest kind of bait that can be used with angling.": "O tipo de isca mais simples que pode ser usado na pesca."
"The Six Names of Arisetsu are etched in Elvish into this lovely wooden staff.": "Os Seis Nomes de Arisetsu estão gravados em élfico neste adorável bastão de madeira."
"The skeleton of a fish.": "O esqueleto de um peixe."
"The skin and fur from a sheep, removed with perfect skill. Suitable for special tasks that require sheep skin.": "A pele e o pêlo de uma ovelha, removidos com perfeita habilidade. Adequado para tarefas especiais que requerem pele de ovelha."
"The skin of a dragon-kin creature. Suitable for very specific purposes.": "A pele de uma criatura semelhante a um dragão. Adequado para fins muito específicos."
"The skin of a rabbit, perfectly preserved. Suitable for special tasks that specifically require rabbit skin.": "A pele de um coelho, perfeitamente conservada. Adequado para tarefas especiais que requerem especificamente pele de coelho."
"The skin of a small dinosaur. Suitable for special tasks that specifically require deinonychus hide.": "A pele de um pequeno dinossauro. Adequado para tarefas especiais que requerem especificamente pele de deinônico."
"The skin of a very large rat, removed with expertise. Suitable for special tasks that require rat skin.": "A pele de um rato muito grande, removida com perícia. Adequado para tarefas especiais que requerem pele de rato."
"The skull of a dead necromancer.": "O crânio de um necromante morto."
"The skull of a ghoul that invaded from a realm of evil.": "O crânio de um ghoul que invadiu um reino do mal."
"The sleek and simple orcish style hides an extreme attention to detail.": "O estilo orc elegante e simples esconde uma extrema atenção aos detalhes."
"The slimy, sticky skin of a demonic frog. DO NOT LICK!": "A pele viscosa e pegajosa de um sapo demoníaco. NÃO LAMBA!"
"The slimy, sticky skin of a toxic frog. DO NOT LICK!": "A pele viscosa e pegajosa de um sapo tóxico. NÃO LAMBA!"
"The slimy, sticky skin of an icy frog. DO NOT LICK!": "A pele viscosa e pegajosa de um sapo gelado. NÃO LAMBA!"
"The smell is almost unbearable.": "O cheiro é quase insuportável."
"The sneaky crone Anhinda made this flask after decades of trial and error.": "A velha sorrateira Anhinda fez este frasco após décadas de tentativa e erro."
"The sort of boots you might imagine if you tried to visualize leather boots in your head. Fairly generic.": "O tipo de botas que você poderia imaginar se tentasse visualizar botas de couro em sua cabeça. Bastante genérico."
"The specially-configured Teleportation Redirector given to you by Deville.": "O Redirecionador de Teletransporte especialmente configurado fornecido a você por Deville."
"The Stalwarts, like all dwarves, had to work hard overcome their prejudice against ranged weapons. They developed this bludgeoning bow which acknowledges the value of archery while still insisting that hammers are better.": "Os Stalwarts, como todos os anões, tiveram que trabalhar duro para superar seu preconceito contra armas de longo alcance. Eles desenvolveram este arco contundente que reconhece o valor do tiro com arco e ao mesmo tempo insiste que os martelos são melhores."
"The stinky guts of a gigantic snail.": "As entranhas fedorentas de um caracol gigante."
"The stitching on these leather pants is awful. And the quality of the leather sub-par. But goblins forced to buy their own armor often choose these for cost reasons.": "A costura dessas calças de couro é horrível. E a qualidade do couro abaixo da média. Mas os goblins forçados a comprar suas próprias armaduras geralmente as escolhem por razões de custo."
"The stock shield used by countless grunts in the Crone Hegemony.": "O escudo usado por incontáveis ​​grunhidos na Hegemonia Crone."
"The story goes that a crazed elf spent a hundred years splashing himself with different acid beakers to find the one that hurt the most. This is that beaker.": "A história conta que um elfo enlouquecido passou cem anos espirrando vários copos de ácido em si mesmo para encontrar aquele que mais doía. Este é aquele copo."
"The strange substance in this bag can keep dying fairies from leaving this plane of existence. It costs 50 Fae Energy to use this item. It smells of honey. (This item is useless to non-fae.)": "A estranha substância nesta bolsa pode impedir que fadas moribundas deixem este plano de existência. Custa 50 Fae Energy para usar este item. Tem cheiro de mel. (Este item é inútil para não-fae.)"
"The strange symbols etched into this lute seem to represent constellations, but not ones you're immediately familiar with.": "Os estranhos símbolos gravados neste alaúde parecem representar constelações, mas não aquelas com as quais você está imediatamente familiarizado."
"The sweet and spicy sauce goes perfectly with this plump quality chicken meat.": "O molho doce e picante combina perfeitamente com esta carne de frango rechonchuda e de qualidade."
"The sweet berries pair nicely with crunchy lettuce and zesty dressing.": "As frutas doces combinam perfeitamente com alface crocante e molho picante."
"The tail of a large rat.": "A cauda de um rato grande."
"The teeth of a very mean bear.": "Os dentes de um urso muito cruel."
"The tell-tale signs of Newakis fatbrush-strokes indicate that this is a novice goblin painting, probably a teenagers' efforts.": "Os sinais reveladores das pinceladas grossas de Newakis indicam que esta é uma pintura de goblin novata, provavelmente um esforço de adolescente."
"The terrifying Onkara lord wore these pants all the time. Like, nonstop. But they don't smell. Eerie.": "O terrível senhor Onkara usava essas calças o tempo todo. Tipo, sem parar. Mas eles não cheiram. Sinistro."
"The terrifying orcish cult known as the Mutterers wear these garments.": "O terrível culto orc conhecido como Mutterers usa essas vestimentas."
"The terrifying orcish cult known as the Mutterers wear these garments. This piece is fitted with a Necromancy Gem.": "O terrível culto orc conhecido como Mutterers usa essas vestimentas. Esta peça está equipada com uma Gema de Necromancia."
"The third generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "A terceira geração de uma picareta mineira de origem orc. Semelhante a uma Picareta de Mineração Orc tradicional, mas com um dispositivo rotacional acelerado para permitir uma melhor mineração por meio de facadas."
"The Thorians disappeared after their god, Romast, died, thousands of years ago. It's extraordinary to find a working piece of Thorian headgear like this!": "Os Thorianos desapareceram depois que seu deus, Romast, morreu, há milhares de anos. É extraordinário encontrar um capacete Thoriano funcional como este!"
"The title is dull, but the cover art suggests something... less dull. However, someone has torn out the front half of the book, leaving only appendices.": "O título é enfadonho, mas a capa sugere algo... menos enfadonho. No entanto, alguém arrancou a primeira metade do livro, deixando apenas apêndices."
"The Traits of a Mount": "As características de uma montaria"
"The troll take on a vegetarian steak. The secret ingredient: actual steak.": "O troll come um bife vegetariano. O ingrediente secreto: bife de verdade."
"The two bolt grooves on this crossbow allow for somewhat-faster firing, but it's hardly \"speedy\".": "As duas ranhuras para parafusos nesta besta permitem um disparo um pouco mais rápido, mas dificilmente é \"rápido\"."
"The unmistakable smell of fungus hangs around this damp cowl.": "O cheiro inconfundível de fungo paira sobre esse capuz úmido."
"The unusual odor distracts your senses into not noticing the tar-like potion's foul taste.": "O odor incomum distrai seus sentidos e faz com que não percebam o gosto desagradável da poção semelhante a alcatrão."
"The wearer of this elegant black ring is coated in an energy field that protects them from harm.": "O usuário deste elegante anel preto é revestido por um campo de energia que o protege de danos."
"The weighting of this weapon is awkward for non-fairies, but it works after you get used to it.": "O peso desta arma é estranho para não-fadas, mas funciona depois que você se acostuma."
"The weird symbols on the cover seem intriguing, but the pages are so faded and ruined that you can't make out any words. Perhaps an expert librarian could make some use of it.": "Os símbolos estranhos na capa parecem intrigantes, mas as páginas estão tão desbotadas e estragadas que você não consegue distinguir nenhuma palavra. Talvez um bibliotecário experiente pudesse fazer algum uso dele."
"The weird water-and-air-processing organ of a scray.": "O estranho órgão de processamento de água e ar de um scray."
"The well-known human philosopher Jim Hatcher tried his hand at poetry with this tacky volume. There are some hints of cleverness toward the end, for people who keep reading that long.": "O conhecido filósofo humano Jim Hatcher experimentou poesia com este volume cafona. Há alguns indícios de inteligência no final, para pessoas que continuam lendo por tanto tempo."
"The wing of a giant bee or wasp.": "A asa de uma abelha ou vespa gigante."
"The wings of a dead crimsonfelt butterfly.": "As asas de uma borboleta morta de feltro vermelho."
"The wings of a dead icebreeze moth.": "As asas de uma mariposa morta da brisa gelada."
"The wings of a dead shimmerwing butterfly.": "As asas de uma borboleta morta e cintilante."
"The work of a master stoneshaper, this key is a miniature work of art. It may unlock something somewhere, but even if not, it's an interesting curio.": "Obra de um mestre modelador de pedras, esta chave é uma obra de arte em miniatura. Pode desbloquear algo em algum lugar, mas mesmo que não, é uma curiosidade interessante."
"The... err... \"backside\" of these sturdy leather pants doesn't seem to be part of the original design. Some previous owner has sewn in a thick leather square to ensure full body coverage.": "A... err... \"parte traseira\" dessas calças de couro resistentes não parece fazer parte do design original. Algum proprietário anterior costurou um quadrado de couro grosso para garantir cobertura total do corpo."
"TheBlastingUltimator": "O BlastingUltimator"
"TheBorghildLead": "TheBorghild Liderar"
"TheGalvanizer": "OGalvanizador"
"TheGodsArisetsu": "Os Deuses Arisetsu"
"TheGodsOfKnowledgeVol1": "Os Deuses do Conhecimento Vol1"
"TheGodsOfKnowledgeVol2": "Os Deuses do Conhecimento Vol2"
"TheGodsOfKnowledgeVol3": "Os Deuses do Conhecimento Vol3"
"TheGodsOfKnowledgeVol4": "Os Deuses do Conhecimento Vol4"
"TheKorbokInvestigation": "A Investigação Korbok"
"TheMauler": "O Mauler"
"TheMeltedShield": "O Escudo Derretido"
"Thentree Boots": "Botas Thentree"
"Thentree Bow": "Então Arco da Árvore"
"Thentree Gloves": "Luvas Thentree"
"Thentree Harness": "Arnês Thentree"
"Thentree Helmet": "Capacete Thentree"
"Thentree Shield": "Escudo da Árvore"
"Thentree Skirt": "Saia Entãotree"
"ThentreeBoots": "EntãotreeBotas"
"ThentreeBow": "EntãotreeBow"
"ThentreeGloves": "ThentreeLuvas"
"ThentreeHarness": "EntãotreeHarness"
"ThentreeHelmet": "EntãotreeCapacete"
"ThentreeShield": "EntãotreeShield"
"ThentreeSkirt": "EntãotreeSaia"
"TheRazor": "A navalha"
"There are six nature spirits responsible for creating the undead. Gulagra, the spirit of chaos, is not one of them. But don't try to tell <i>him</i> that.": "Existem seis espíritos da natureza responsáveis ​​pela criação dos mortos-vivos. Gulagra, o espírito do caos, não é um deles. Mas não tente dizer isso a <i>ele</i>."
"There are three parts to this weird key.": "Existem três partes nesta chave estranha."
"There are worse things to stuff in a mushroom than meat from a mantis claw. Probably.": "Há coisas piores para enfiar um cogumelo do que carne de uma garra de louva-a-deus. Provavelmente."
"There is a hint of melancholy behind this beautiful nature scene.": "Há um toque de melancolia por trás desta bela cena natural."
"There's a big hole in these, but a decade of spiderweb build-up kind of seals the hole. Kind of.": "Há um grande buraco neles, mas uma década de acúmulo de teias de aranha meio que fecha o buraco. Tipo de."
"There's little spider hairs floating on the top. Mmmm. But it'll take the poison down a notch.": "Há pequenos pelos de aranha flutuando no topo. Hummm. Mas isso reduzirá um pouco o veneno."
"There's nothing in this bottle.": "Não há nada nesta garrafa."
"There's nothing in this bucket.": "Não há nada neste balde."
"Thermic Rubyite": "Rubita Térmica"
"ThermicRubyite": "TérmicaRubyita"
"These ancient pants prove that not all powerful mages have good fashion sense.": "Estas calças antigas provam que nem todos os magos poderosos têm bom senso de moda."
"These are just cotton underclothes, but they're really well made!": "São apenas roupas íntimas de algodão, mas são muito bem feitas!"
"These are just simple line drawings, but they were done by someone with masterful skill.": "Estes são apenas desenhos simples, mas foram feitos por alguém com habilidade magistral."
"These are ledgers, orders, and addresses. Pretty waterlogged.": "São livros contábeis, pedidos e endereços. Bastante alagado."
"These are like an extension of your feet, they're so comfortable!": "São como uma extensão dos seus pés, são tão confortáveis!"
"These are perfect for corking bottles of not-yet-implemented craftable wine.": "São perfeitos para rolhar garrafas de vinho artesanal ainda não implementado."
"These are shoddy boots that have had sections of their protective armor removed to make them a little more agile. The holes let moisture in, and they quickly stink beyond fathoming.": "Estas são botas de má qualidade que tiveram partes de sua armadura protetora removidas para torná-las um pouco mais ágeis. Os buracos permitem a entrada de umidade e rapidamente cheiram mal."
"These are so slimy, wearing them is like sticking dozens of leeches to your hands.": "São tão viscosos que usá-los é como enfiar dezenas de sanguessugas nas mãos."
"These are so soft to touch that you almost feel criminal wearing them out into the mud and gore.": "Eles são tão macios ao toque que você quase se sente um criminoso ao usá-los na lama e no sangue."
"These are strings for a magical stringed instrument -- a particularly BIG instrument.": "Estas são cordas para um instrumento de cordas mágico – um instrumento particularmente GRANDE."
"These attach to a cow's head, giving them glowing red horns and a hateful disposition. You must be a cow to wear this.": "Eles se prendem à cabeça de uma vaca, dando-lhes chifres vermelhos brilhantes e uma disposição odiosa. Você deve ser uma vaca para usar isso."
"These balls of tofu are shaped and flavored to be just like meat, then dipped in a savory cranberry sauce.": "Essas bolas de tofu são moldadas e aromatizadas como carne e depois mergulhadas em um saboroso molho de cranberry."
"These beautiful leather pants are so soft, you just want to pet them. Don't let anybody see you doing that.": "Essas lindas calças de couro são tão macias que você só quer acariciá-las. Não deixe ninguém ver você fazendo isso."
"These bone dice have been carefully weighted and lovingly polished.": "Estes dados de osso foram cuidadosamente pesados ​​e cuidadosamente polidos."
"These boots are abysmal, leaky, and humiliating to wear.": "Essas botas são péssimas, vazam e são humilhantes de usar."
"These boots are pretty nice to wear, and seem like they'll last a long time, too.": "Essas botas são muito boas de usar e parecem que vão durar muito tempo também."
"These boots breathe better than most leather garments, so your feet don't get quite as stinky. Plus, they have double-reinforced laces!": "Essas botas respiram melhor do que a maioria das roupas de couro, para que seus pés não fiquem tão fedidos. Além disso, têm atacadores duplos reforçados!"
"These boots have been dyed red and given a preposterous name.": "Essas botas foram tingidas de vermelho e receberam um nome absurdo."
"These boots have been hand-painted, but are still pretty ugly.": "Essas botas foram pintadas à mão, mas ainda são bem feias."
"These boots have clearly been the birthing spot for baby spiders in the past. You can clean them off, but can you ever really get the image out of your head?": "Essas botas foram claramente o local de nascimento de bebês aranhas no passado. Você pode limpá-los, mas será que consegue realmente tirar a imagem da cabeça?"
"These carrot-flavored biscuits seem to be just as good as real carrots... to rabbits. They're pretty terrible-tasting to everybody else.": "Esses biscoitos com sabor de cenoura parecem tão bons quanto cenouras de verdade... para os coelhos. Eles têm um gosto horrível para todo mundo."
"These chain boots are both protective and comfortable.": "Estas botas de corrente são protetoras e confortáveis."
"These coats were a gift from the Crone Hegemony to Gob-land guerillas who were trying to free enslaved ratkin. Since the Hegemony is not against slavery in general, it's generally assumed they were just trying to stir up disharmony in the Gob-lands... but perhaps there was an ulterior motive. Anyway, they're still in pretty good shape a decade later.": "Esses casacos foram um presente da Hegemonia Crone para os guerrilheiros da terra Gob que tentavam libertar ratkin escravizados. Como a Hegemonia não é contra a escravidão em geral, geralmente se presume que eles estavam apenas tentando provocar a desarmonia nas terras de Gob... mas talvez houvesse um motivo oculto. De qualquer forma, eles ainda estão em boa forma uma década depois."
"These coifs used to be mass-produced for sale to Statehelm, but the attack on Povus killed most of the town's smiths.": "Essas toucas costumavam ser produzidas em massa para venda a Statehelm, mas o ataque a Povus matou a maioria dos ferreiros da cidade."
"These cotton undergarments are possibly the least interesting piece of clothing possible.": "Essas roupas íntimas de algodão são possivelmente a peça de roupa menos interessante possível."
"These could be worn as small bracelets were it not for the extreme pain they cause when in contact with flesh. They emit a continuous shock.": "Elas poderiam ser usadas como pequenas pulseiras, não fosse a dor extrema que causam quando em contato com a carne. Eles emitem um choque contínuo."
"These earrings will make a neophyte mage's spells seem much more impressive. They were intended as a gift for a young girl who passed before she got a chance to wear them.": "Esses brincos farão com que os feitiços de um mago neófito pareçam muito mais impressionantes. Eles foram concebidos como um presente para uma jovem que faleceu antes de ter a chance de usá-los."
"These excellent daggers are standard-issue for the Stalwarts, but few dwarves actually use them. They are routinely lost in gambling matches and then reported as stolen, leading to the dwarven idiom \"goblins stole your dagger\", which is essentially synonymous with \"you have a serious gambling problem.\"": "Essas excelentes adagas são padrão para os Stalwarts, mas poucos anões realmente as usam. Eles são rotineiramente perdidos em jogos de azar e depois relatados como roubados, levando à expressão anã \"goblins roubaram sua adaga\", que é essencialmente sinônimo de \"você tem um sério problema de jogo\"."
"These extra-large flower seeds are coated in sticky honey, which is in turn coated in pollen.": "Essas sementes de flores extragrandes são revestidas com mel pegajoso, que por sua vez é revestido com pólen."
"These fancy boots have been digested by a slime creature, leaving mostly just metal behind. Don't worry about them being uncomfortable, though: there's tons of ooze in there to keep your feet cozy.": "Essas botas sofisticadas foram digeridas por uma criatura viscosa, deixando para trás apenas metal. Não se preocupe com o desconforto deles: há toneladas de gosma lá para manter seus pés confortáveis."
"These fit over your knuckles to make your punches hurt more. Now with real faux-brass coating!": "Eles se ajustam aos nós dos dedos para fazer com que seus socos doam mais. Agora com revestimento de latão falso de verdade!"
"These flower seeds can be planted in garden areas.": "Estas sementes de flores podem ser plantadas em áreas ajardinadas."
"These freezing-cold gloves are hard to don, but once worn, they reveal themselves to be remarkably dextrous.": "Essas luvas geladas são difíceis de calçar, mas, uma vez usadas, revelam-se extremamente hábeis."
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 35 enchantments.)": "Estas luvas são feitas de tripa de peixe tecida e adornadas com conchas fortes. Estranho, mas usável. Inclui uma faca embutida para abrir ostras. (Inclui encantamentos aleatórios de nível 35.)"
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 40 enchantments.)": "Estas luvas são feitas de tripa de peixe tecida e adornadas com conchas fortes. Estranho, mas usável. Inclui uma faca embutida para abrir ostras. (Inclui encantamentos aleatórios de nível 40.)"
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 45 enchantments.)": "Estas luvas são feitas de tripa de peixe tecida e adornadas com conchas fortes. Estranho, mas usável. Inclui uma faca embutida para abrir ostras. (Inclui encantamentos aleatórios de nível 45.)"
"These gloves are so light, yet so protective! Astonishing craftsmanship.": "Estas luvas são tão leves, mas tão protetoras! Artesanato surpreendente."
"These gloves feature precision chainwork by an experienced maker.": "Estas luvas apresentam correntes de precisão feitas por um fabricante experiente."
"These gloves have a quality, and that quality is adequateness.": "Estas luvas têm uma qualidade, e essa qualidade é a adequação."
"These gloves were made by someone with a keen sense of anatomy, allowing a full range of motion.": "Essas luvas foram feitas por alguém com um apurado senso de anatomia, permitindo uma amplitude completa de movimentos."
"These glowing metal gloves are hard to don, but once worn, they reveal themselves to be remarkably dextrous.": "Essas luvas de metal brilhantes são difíceis de calçar, mas uma vez usadas, elas se revelam extremamente hábeis."
"These have been in the muck for ages...": "Estes estão na lama há séculos..."
"These have been perfectly worn in! Nice. But still very smelly.": "Estes foram perfeitamente usados! Legal. Mas ainda muito fedorento."
"These horseshoes - err, cow shoes - are practically supernaturally lovely.": "Essas ferraduras – err, ferraduras de vaca – são praticamente sobrenaturalmente adoráveis."
"These horseshoes - err, deer shoes - are practically supernaturally lovely.": "Essas ferraduras - err, sapatos de veado - são praticamente sobrenaturalmente adoráveis."
"These impressive shields were a gift to the ratkin, designed to be light yet sturdy. The ratkin also use them as plates, hats, and for myriad other things.": "Esses escudos impressionantes foram um presente para os ratkin, projetados para serem leves, mas resistentes. Os ratkin também os usam como pratos, chapéus e para inúmeras outras coisas."
"These leather pants are so soft. They're nice for dodging arrows and the like.": "Essas calças de couro são tão macias. Eles são bons para se esquivar de flechas e coisas do gênero."
"These leather pants have had the joints replaced with super-soft leather. The stitching is poor, though, and the pants are drafty. Drafty pants!": "Essas calças de couro tiveram as juntas substituídas por couro supermacio. A costura é ruim e as calças têm correntes de ar. Calças correntes!"
"These leftover bits of a Super Fishy Surprise have been mixed together to get an ... \"interesting\" and \"unusual\" flavor.": "Esses pedaços que sobraram de uma Super Fishy Surprise foram misturados para obter um... sabor \"interessante\" e \"incomum\"."
"These lenses fit in the eyes of deer, giving them glowing red eyes. You must be a deer to wear this.": "Essas lentes cabem nos olhos dos cervos, dando-lhes olhos vermelhos brilhantes. Você deve ser um cervo para usar isso."
"These lightweight bows aren't actually used by the Peltasts of the Crone Hegemony, but by their support archers.": "Na verdade, esses arcos leves não são usados ​​pelos Peltasts da Hegemonia Anciã, mas por seus arqueiros de apoio."
"These look like really soft plants. Wait, those are soft <i>pants.</i> That's great camo.": "Parecem plantas muito macias. Espere, essas <i>calças são macias.</i> É uma ótima camuflagem."
"These make it seem easy to make comfortable wooden shoes for cows. (It's not.)": "Isso faz com que pareça fácil fazer sapatos de madeira confortáveis ​​para vacas. (Não é.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 35 enchantments.)": "Essas enormes conchas foram reforçadas com uma fina camada de madeira, criando uma armadura desconfortável, mas eficaz. (Inclui encantamentos aleatórios de nível 35.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 40 enchantments.)": "Essas enormes conchas foram reforçadas com uma fina camada de madeira, criando uma armadura desconfortável, mas eficaz. (Inclui encantamentos aleatórios de nível 40.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 45 enchantments.)": "Essas enormes conchas foram reforçadas com uma fina camada de madeira, criando uma armadura desconfortável, mas eficaz. (Inclui encantamentos aleatórios de nível 45.)"
"These metal boots are devoid of padding and practicality.": "Essas botas de metal são desprovidas de acolchoamento e praticidade."
"These metal boots have a little bit of lining and a lot of poor craftsmanship.": "Essas botas de metal têm um pouco de forro e muito acabamento ruim."
"These notes describe how to use a \"genetics analyzer\" to discover hidden anatomical secrets of arthropods. It's very technical.": "Estas notas descrevem como usar um “analisador genético” para descobrir segredos anatômicos ocultos dos artrópodes. É muito técnico."
"These notes describe how to use a \"genetics analyzer\" to discover hidden anatomical secrets of non-ruminant ungulates. It's very technical.": "Estas notas descrevem como usar um “analisador genético” para descobrir segredos anatômicos ocultos de ungulados não ruminantes. É muito técnico."
"These old boots have been resoled with a mysterious metal, and the most recent owner has etched eerie symbols into them.": "Estas botas antigas foram revestidas com um metal misterioso, e o proprietário mais recente gravou símbolos misteriosos nelas."
"These old Magic Trooper gloves have been patched many times. But each repair was done with such care that it actually made the gloves stronger overall.": "Estas velhas luvas Magic Trooper foram remendadas muitas vezes. Mas cada reparo foi feito com tanto cuidado que tornou as luvas mais fortes em geral."
"These once-amazing pants aren't amazing anymore. They're torn and mangled. But there's still some armor on them... could be worse! A hand-sewn tag inside says \"To General Lawyr, may you remember me always, your Kello.\"": "Essas calças que antes eram incríveis não são mais incríveis. Eles estão rasgados e mutilados. Mas ainda há alguma armadura neles... poderia ser pior! Uma etiqueta costurada à mão dentro diz \"Para General Lawyr, que você sempre se lembre de mim, seu Kello.\""
"These pages of parchment are covered in symbols that make no sense to you.": "Estas páginas de pergaminho estão cobertas de símbolos que não fazem sentido para você."
"These pants are made of leather that's incredibly soft, yet strong. Although it has an inner lining to prevent chafing, that lining is made of silk, and silk chafes pretty badly too. But you get used to it.": "Estas calças são feitas de couro incrivelmente macio, mas forte. Embora tenha um forro interno para evitar atrito, esse forro é feito de seda, e a seda também irrita bastante. Mas você se acostuma."
"These pants are specifically designed for storage-type characters. This item cannot be augmented, transmuted or enchanted in any way.": "Estas calças são projetadas especificamente para personagens do tipo armazenamento. Este item não pode ser aumentado, transmutado ou encantado de forma alguma."
"These scorpiclaw gauntlets were personally adjusted by the revered general. They are denser and yet more agile than one would expect.": "Essas manoplas de garra escorpiana foram ajustadas pessoalmente pelo reverenciado general. Eles são mais densos e ainda mais ágeis do que se esperaria."
"These seeds are easy to grow, but the resulting fruit is inedible.": "Essas sementes são fáceis de cultivar, mas o fruto resultante não é comestível."
"These shackles would only fit small creatures, such as fey or possibly dwarves.": "Essas algemas serviriam apenas para pequenas criaturas, como fadas ou possivelmente anões."
"These silk pants are uncomfortably warm at all times.": "Estas calças de seda são desconfortavelmente quentes o tempo todo."
"These smell like sailor vomit.": "Estes cheiram a vômito de marinheiro."
"These soft elegant gloves have custom gripping surfaces to make sure you never slip up in combat.": "Estas luvas macias e elegantes têm superfícies de aderência personalizadas para garantir que você nunca escorregue em combate."
"These spider mandibles seem to be made of ivory! What will nature think of next?": "Estas mandíbulas de aranha parecem ser feitas de marfim! O que a natureza pensará a seguir?"
"These still get insanely hot and sweaty when worn, but at least they're kind of fashionable. Kind of.": "Eles ainda ficam incrivelmente quentes e suados quando usados, mas pelo menos estão na moda. Tipo de."
"These super-thick chainmail gloves are used by orcish arena fighters. They're uncomfortable and ugly, but very thick.": "Essas luvas de cota de malha supergrossas são usadas por lutadores orcs de arena. Eles são desconfortáveis ​​e feios, mas muito grossos."
"These tart little sugar rocks are a popular summer-time sweet.": "Essas pequenas pedras de açúcar azedas são um doce popular no verão."
"These vouchers were used with the first version of Statehelm's cornucopia, but that was years ago. The newest system is fully automated and these are but souvenirs.": "Esses vouchers foram usados ​​com a primeira versão da cornucópia de Statehelm, mas isso foi há anos. O mais novo sistema é totalmente automatizado e estes são apenas souvenirs."
"These were designed for the ratkin by the Crone Hegemony. The crones underestimated how long ratkin fingernails grow, and these gloves are now pretty holey. Still good for punching though.": "Estes foram projetados para os ratkin pela Hegemonia Crone. As velhas subestimaram o comprimento das unhas dos ratos, e essas luvas agora estão bem furadas. Ainda é bom para socar."
"These were once used in ceremonies, not combat, but they turned out to work pretty well there too, as long as you're not trying to do anything too terribly dextrous.": "Eles já foram usados ​​​​em cerimônias, não em combate, mas acabaram funcionando muito bem lá também, desde que você não esteja tentando fazer nada terrivelmente hábil."
"These were probably decent tassels at some point -- for what, it's impossible to say -- but now they're covered in blood and pus and other fluids.": "Provavelmente eram borlas decentes em algum momento - para quê, é impossível dizer - mas agora estão cobertas de sangue, pus e outros fluidos."
"These were probably part of a child's game set. There are only a handful left.": "Provavelmente faziam parte de um conjunto de jogos infantis. Restam apenas alguns."
"These were worn by a dainty goblin.": "Estes foram usados ​​por um duende delicado."
"These were worn by a tough goblin.": "Estes foram usados ​​por um goblin durão."
"These wooden footguards are a work of art. Avant garde art, where you nail wood to cows' feet.": "Estes protetores de pés de madeira são uma obra de arte. Arte vanguardista, onde se prega madeira nos pés das vacas."
"These wooden footguards are a work of art. Avant garde art, where you nail wood to the feet of an unsuspecting ungulate.": "Estes protetores de pés de madeira são uma obra de arte. Arte de vanguarda, onde você prega madeira nos pés de um ungulado desavisado."
"TheServantsWalkers": "Os Servos Caminhantes"
"TheSewerMan": "O homem do esgoto"
"TheSwarmerHypothesis": "A hipótese do Swarmer"
"TheTrespassingCharlatan": "O Charlatão Invasor"
"TheWeirdPrism": "O Prisma Estranho"
"They cannot grow anymore, but they can help other plants grow as fertilizer.": "Eles não podem mais crescer, mas podem ajudar outras plantas a crescer como fertilizante."
"They may look like a light snack at first glance, but these biscuits are meaty and filling enough for a hearty meal.": "À primeira vista, podem parecer um lanche leve, mas esses biscoitos são carnudos e fartos o suficiente para uma refeição saudável."
"They mostly stay on your foot, which is good.": "Eles ficam principalmente no seu pé, o que é bom."
"They smell delicious and taste even better.": "Eles cheiram deliciosos e têm um sabor ainda melhor."
"They're as comfortable as not wearing any gloves, and as protective as wearing plate metal on your hands.": "Eles são tão confortáveis ​​quanto não usar luvas e tão protetores quanto usar placas de metal nas mãos."
"They're supernaturally slimming! Plus they have a hidden dimensional pocket inside that can fit a few extra items.": "Eles estão emagrecendo sobrenaturalmente! Além disso, eles têm um bolso dimensional oculto no interior que pode acomodar alguns itens extras."
"They've turned all green and gross. But they'll still work to make your punches more painful.": "Eles ficaram todos verdes e nojentos. Mas eles ainda funcionarão para tornar seus socos mais dolorosos."
"Thick and awkward, but basically indestructible.": "Grosso e estranho, mas basicamente indestrutível."
"Thick and crunchy, like any good potion.": "Grosso e crocante, como qualquer boa poção."
"Thick and sweet, yet very refreshing.": "Grosso e doce, mas muito refrescante."
"Thick Armor Potion": "Poção de Armadura Grossa"
"Thick brass wire on a spool. It has no obvious use.": "Fio de latão grosso em um carretel. Não tem uso óbvio."
"Thick Cranium Lotion": "Loção de crânio espessa"
"Thick Fae Energy Potion": "Poção de Energia Fae Grossa"
"Thick Ice Shield": "Escudo de Gelo Grosso"
"Thick layers of hide and fur make these boots quite warm.": "Camadas grossas de couro e pele tornam essas botas bastante quentes."
"Thick matted hair combined with spider silk. It's kind of sticky, making it a little too form-fitting. It's surprisingly durable, though!": "Cabelo grosso e emaranhado combinado com seda de aranha. É meio pegajoso, tornando-o um pouco ajustado demais. No entanto, é surpreendentemente durável!"
"Thick matted hair combined with spider silk. The silk gets all in your hair and eyes and is rather uncomfortable, but it's really warm.": "Cabelo grosso e emaranhado combinado com seda de aranha. A seda atinge seus cabelos e olhos e é bastante desconfortável, mas é muito quente."
"Thick matted hair combined with spider silk. These feel great. No, really. They don't <i>look</i> great, but they feel great.": "Cabelo grosso e emaranhado combinado com seda de aranha. Isso é ótimo. Não, realmente. Eles não <i>parecem</i>, mas são ótimos."
"Thick matted hair combined with spider silk. These feel great. No, really. They don't <i>look</i> great, but they feel great. An ancient holy symbol has been inscribed inside.": "Cabelo grosso e emaranhado combinado com seda de aranha. Isso é ótimo. Não, realmente. Eles não <i>parecem</i>, mas são ótimos. Um antigo símbolo sagrado foi inscrito dentro."
"Thick Mesh Grate": "Grelha de malha grossa"
"Thick smelly gloves that have been through a few fights": "Luvas grossas e fedorentas que passaram por algumas brigas"
"Thick smelly gloves that the goblin Jumjab augmented. A Necromancy gem has been embedded into the right palm.": "Luvas grossas e fedorentas que o goblin Jumjab aprimorou. Uma gema de Necromancia foi embutida na palma direita."
"Thick-sliced slab bacon from the most savory pork shoulder. Unlike most food, this does not give a long-term regeneration effect. Great Bacon is an instant pick-me-up any time!": "Bacon em fatias grossas da mais saborosa paleta de porco. Ao contrário da maioria dos alimentos, este não proporciona um efeito de regeneração a longo prazo. Great Bacon é um estímulo instantâneo a qualquer hora!"
"ThickArmorPotion": "Poção ThickArmor"
"Thickened Chainmail Shirt": "Camisa de cota de malha espessada"
"Thickened cloth gloves with resilience but no panache.": "Luvas de tecido espessadas com resiliência, mas sem elegância."
"ThickenedChainmailShirt": "Camisa de cota de malha espessada"
"Thickflesh Potion": "Poção de Carne Grossa"
"Thickly padded and thickly odorous.": "Espessamente acolchoado e com forte odor."
"ThiefLeatherChest01": "LadrãoCouroPeito01"
"ThiefLeatherChestElectric": "LadrãoCouroPeitoElétrico"
"ThiefLeatherFeet01": "LadrãoLeatherFeet01"
"ThiefLeatherFeetElectric": "LadrãoCouroPésElétrico"
"ThiefLeatherHands01": "LadrãoLeatherHands01"
"ThiefLeatherHandsElectric": "LadrãoCouroMãosElétrico"
"ThiefLeatherHead01": "LadrãoLeatherHead01"
"ThiefLeatherHeadElectric": "LadrãoLeatherHeadElétrico"
"ThiefLeatherLegs01": "LadrãoCouroPernas01"
"ThiefLeatherLegsElectric": "LadrãoCouroPernasElétrico"
"Thimble Pete's Awful Cap": "Chapéu horrível de Thimble Pete"
"Thin and uncomfortable, but warm enough to keep you alive.": "Fino e desconfortável, mas quente o suficiente para mantê-lo vivo."
"Thin Cranium Lotion": "Loção Crânio Fino"
"Thin Fae Energy Potion": "Poção de Energia Fae Fina"
"Thin linen gloves typically used for magicwork.": "Luvas finas de linho normalmente usadas para trabalhos mágicos."
"Thin Mesh Grate": "Grelha de malha fina"
"Thin Metal Lattice": "Malha de metal fino"
"Thin slices of candied fruit sprinkled with walnut slices.": "Fatias finas de frutas cristalizadas polvilhadas com rodelas de nozes."
"Thin yet warm. Perhaps magically so.": "Fino, mas quente. Talvez magicamente."
"Thin, runny, and smelly. Mmm! Salt is a key ingredient.": "Fino, escorrendo e fedorento. Hum! O sal é um ingrediente chave."
"ThinMetalLattice": "ThinMetalMalha"
"This 'milk' is made from soybeans.": "Este 'leite' é feito de soja."
"This acrid topical ointment is an effective way to remove swamp parasites.": "Esta pomada tópica acre é uma forma eficaz de remover parasitas do pântano."
"This admin-created utility potion repairs all items in your inventory that are broken due to deaths while in Hardcore mode.": "Esta poção utilitária criada pelo administrador repara todos os itens em seu inventário que foram quebrados devido a mortes no modo Hardcore."
"This amusing lollipop is very popular with elves.": "Este divertido pirulito é muito popular entre os elfos."
"This ancient doomlute was severely damaged and then repaired by an expert. It still holds a bit of its magic.": "Este antigo doomlute foi severamente danificado e depois reparado por um especialista. Ainda guarda um pouco de sua magia."
"This antique shield once had an insignia, but it's been dented and scratched beyond recognition.": "Este escudo antigo já teve uma insígnia, mas foi amassado e arranhado de forma irreconhecível."
"This appears to be a custom-detailed ranastaff, not something originally made in Povus. In any case, the quality is high.": "Este parece ser um ranastaff com detalhes personalizados, não algo originalmente feito em Povus. De qualquer forma, a qualidade é alta."
"This armor is feared in any land where orcs are known.": "Esta armadura é temida em qualquer terra onde os orcs sejam conhecidos."
"This armpits of coat emit an acrid odor whenever the wearer is in combat, purportedly smelling \"like a goblin\", though goblins would fervently deny this. The odor is noxious but also somewhat protective.": "As axilas do casaco emitem um odor acre sempre que o usuário está em combate, supostamente cheirando \"como um goblin\", embora os goblins neguem isso veementemente. O odor é nocivo, mas também um tanto protetor."
"This banana is in good shape - no brown spots yet.": "Esta banana está em bom estado - ainda sem manchas marrons."
"This bardic instrument has a lovely, uplifting sound that makes it fun to play.": "Este instrumento bárdico tem um som adorável e edificante que o torna divertido de tocar."
"This barrel smells strongly of gunpowder. Light the fuse to release a swarm of confetti bomb rockets.": "Este barril tem um forte cheiro de pólvora. Acenda o pavio para liberar um enxame de foguetes de confete."
"This beak is too cursed to be useful in most dark rituals.": "Este bico é amaldiçoado demais para ser útil na maioria dos rituais sombrios."
"This beaker has been carefully constructed to keep healing chemicals at a lower temperature, slightly improving their effects. Held in the main hand.": "Este copo foi cuidadosamente construído para manter os produtos químicos de cura a uma temperatura mais baixa, melhorando ligeiramente os seus efeitos. Segurado na mão principal."
"This beaker has been coated in many layers of deadly chemicals. Wash your hands after touching it!": "Este copo foi revestido com muitas camadas de produtos químicos mortais. Lave as mãos depois de tocá-lo!"
"This beaker is one of Xegatis' early failed attempts at restoring flesh to Nightmare Creatures. A crude Necromancy Gem is embedded in the bottom.": "Este copo é uma das primeiras tentativas fracassadas de Xegatis de restaurar a carne das Criaturas do Pesadelo. Uma gema de necromancia bruta está embutida no fundo."
"This bean has little prongs growing out of it that kind of look like horns.": "Este feijão tem pequenas pontas crescendo que parecem chifres."
"This beautiful golden rock has deep striations. In magic, it is associated with animals, hunting, and livestock.": "Esta bela rocha dourada possui estrias profundas. Na magia, está associado a animais, caça e gado."
"This beautiful knife is used in the elvish custom of Surreto Silosi, where young heartbroken elves impale themselves under the oversight of a healer. This rite of passage signals their entrance into the second of three stages of elven maturity. The knife is usually kept as a memento.": "Esta linda faca é usada no costume élfico de Surreto Silosi, onde jovens elfos de coração partido se empalam sob a supervisão de um curandeiro. Este rito de passagem sinaliza sua entrada no segundo dos três estágios da maturidade élfica. A faca geralmente é guardada como lembrança."
"This belt has exotic shamanic runes etched into it.": "Este cinto tem runas xamânicas exóticas gravadas nele."
"This big golden rock has deep striations. In magic, it is associated with animals, hunting, and livestock.": "Esta grande rocha dourada tem estrias profundas. Na magia, está associado a animais, caça e gado."
"This big white gem with purple streaks is exceptionally strong and makes very resilient jewelry. In magic, it is likewise associated with toughness.": "Esta grande joia branca com listras roxas é excepcionalmente forte e produz joias muito resistentes. Na magia, também está associado à resistência."
"This bioluminescent fruit smells like death, but has a pleasant mild taste.": "Esta fruta bioluminescente tem cheiro de morte, mas tem um sabor suave e agradável."
"This bit of magical rhino horn can be worn as a makeshift necklace.": "Este pedaço mágico de chifre de rinoceronte pode ser usado como um colar improvisado."
"This bizarre \"ring\" is more the size of a bracelet, and can only fit on a pig's leg. A painful needle pierces the pig's skin while worn, somehow allowing the pig to control various chemical bottles with its mind. (Enables Battle Chemistry.)": "Este “anel” bizarro é mais do tamanho de uma pulseira e só cabe na perna de um porco. Uma agulha dolorosa perfura a pele do porco enquanto é usada, de alguma forma permitindo que o porco controle vários frascos de produtos químicos com sua mente. (Ativa Química de Batalha.)"
"This bizarre glowing helmet affects the mind of the wearer ever so slightly. Just a touch.": "Este bizarro capacete brilhante afeta levemente a mente do usuário. Apenas um toque."
"This bizarre helmet affects the mind of the wearer ever so slightly. Just a touch.": "Este capacete bizarro afeta levemente a mente do usuário. Apenas um toque."
"This blue-tinted armor is worn by Gazluk City's support soldiers, known as \"Misery Troopers\". Their armor is strong while also providing survival protection in harsh weather.": "Esta armadura azul é usada pelos soldados de apoio da cidade de Gazluk, conhecidos como \"Misery Troopers\". Sua armadura é forte, ao mesmo tempo que fornece proteção de sobrevivência em climas adversos."
"This book threatens to crumble to dust if you so much as open the cover. It would take a master librarian to get any knowledge from this old specimen.": "Este livro ameaça virar pó se você abrir a capa. Seria necessário um mestre bibliotecário para obter qualquer conhecimento deste antigo espécime."
"This bottle contains salty water made via a secret ranalon technique. It's used as a marinade and pickling agent.": "Esta garrafa contém água salgada feita através de uma técnica secreta de ranalon. É usado como marinada e agente de decapagem."
"This bottle contains the acidic runoff of the cheese-making process.": "Esta garrafa contém o escoamento ácido do processo de fabricação do queijo."
"This bottle contains the sweet runoff of the cheese-making process.": "Esta garrafa contém o doce escoamento do processo de fabricação do queijo."
"This bottle is a true work of art. It's almost too good for wine.": "Esta garrafa é uma verdadeira obra de arte. É quase bom demais para vinho."
"This bottle is full of clean, delicious water. It can be drunk to recover a little energy, and has a million other uses.": "Esta garrafa está cheia de água limpa e deliciosa. Pode ser bebido para recuperar um pouco de energia e tem um milhão de outras utilizações."
"This bottle is full of cow's milk.": "Esta garrafa está cheia de leite de vaca."
"This bottle is full of fertilizer.": "Esta garrafa está cheia de fertilizante."
"This bottle is full of goat's milk.": "Esta garrafa está cheia de leite de cabra."
"This bottle is full of sugary water.": "Esta garrafa está cheia de água açucarada."
"This bottle is nice enough for wine. Just.": "Esta garrafa é boa o suficiente para vinho. Apenas."
"This bottle of high-quality wine has been mostly consumed by goblins.": "Esta garrafa de vinho de alta qualidade tem sido consumida principalmente por goblins."
"This bourbon has been aged and is ready to be filtered and flavored.": "Este bourbon foi envelhecido e está pronto para ser filtrado e aromatizado."
"This bourbon needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este bourbon precisa ser armazenado em uma caverna por três horas antes de se tornar potável. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This brandy has been aged and is ready to be filtered and flavored.": "Esta aguardente foi envelhecida e está pronta para ser filtrada e aromatizada."
