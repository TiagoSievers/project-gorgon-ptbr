"What a find! This is an intact biped arm assembly: humerus, radius, ulna, even most of the phalanges!": "Que achado! Este é um conjunto de braço bípede intacto: úmero, rádio, ulna e até a maioria das falanges!"
"What a gauche hat!": "Que chapéu desajeitado!"
"What is that stuff running down the side of the Blood Staff, you ask? Blood. It's blood.": "O que é aquela coisa escorrendo pela lateral do Cajado de Sangue, você pergunta? Sangue. É sangue."
"What people expect when they imagine a chainmail shirt.": "O que as pessoas esperam quando imaginam uma camisa de cota de malha."
"What the... Gross!": "Que... Nojento!"
"Whatever type of meat this once was, it's completely overrun with demonic energy now.": "Seja qual for o tipo de carne que foi antes, agora está completamente invadida por energia demoníaca."
"Wheat": "Trigo"
"Wheat with a finer quality, preferred over Human wheat for certain dishes.": "Trigo de melhor qualidade, preferido ao trigo humano em determinados pratos."
"When applied topically, this ointment cures up to 10 stacks of Hellfire and Lesser Hellfire.": "Quando aplicada topicamente, esta pomada cura até 10 pilhas de Fogo do Inferno e Fogo do Inferno Menor."
"When consumed, this concoction cures all stacks of Hellfire and Lesser Hellfire.": "Quando consumida, esta mistura cura todas as pilhas de Hellfire e Lesser Hellfire."
"When goblin tribes suffer from high turnover and budget shortfalls, they often have to make do with armor like this.": "Quando as tribos goblins sofrem com alta rotatividade e déficits orçamentários, muitas vezes elas têm que se contentar com armaduras como essa."
"When grip precision is crucial, this paper has the perfect level of abrasiveness.": "Quando a precisão do aperto é crucial, este papel apresenta o nível perfeito de abrasividade."
"When held, this weapon seems to freeze the very air around it. A weapon of elite Winter Court troops.": "Quando segurada, esta arma parece congelar o ar ao seu redor. Uma arma das tropas de elite da Corte Invernal."
"When magic takes physical form, it is often made up of this material. It's a versatile crafting component.": "Quando a magia assume forma física, geralmente é feita desse material. É um componente de artesanato versátil."
"When placed in a damp cave, this box can be used to grow a crop of mushrooms.": "Quando colocada em uma caverna úmida, esta caixa pode ser usada para cultivar cogumelos."
"When the Council demanded that the Rakshasa provide renumeration for every human that was injured at the Battle of Rahu, outraged Rakshasa tore up the treaty and killed the messengers, leading to the Sand War. The Rakshasa won the war with claws like this, fashioned after weapons from their home world.": "Quando o Conselho exigiu que os Rakshasa fornecessem remuneração para cada humano ferido na Batalha de Rahu, o indignado Rakshasa rasgou o tratado e matou os mensageiros, levando à Guerra da Areia. Os Rakshasa venceram a guerra com garras como esta, feitas com armas de seu mundo natal."
"When the dwarves were holed up under Serbule so many centuries ago, they didn't have a lot to do but make really resilient armor. The resiliency magic bleeds over to the wearer.": "Quando os anões estavam escondidos sob Serbule há tantos séculos, eles não tinham muito o que fazer a não ser fabricar armaduras realmente resistentes. A magia da resiliência chega ao usuário."
"When thousands of Rakshasa warriors arrived on Alharth, they wore boots like these, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Quando milhares de guerreiros Rakshasa chegaram a Alharth, eles usavam botas como estas, projetadas para acomodar todos os ambientes. O segredo de sua elaboração foi perdido pelos Rakshasa que vivem aqui agora."
"When thousands of Rakshasa warriors arrived on Alharth, they wore suits of armor like this, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Quando milhares de guerreiros Rakshasa chegaram a Alharth, eles usavam armaduras como esta, projetadas para acomodar todos os ambientes. O segredo de sua elaboração foi perdido pelos Rakshasa que vivem aqui agora."
"When winter comes and you need a great coat, now you have one. During summer, though, this is a \"nice\" coat. At best.": "Quando chega o inverno e você precisa de um casaco lindo, agora você tem um. Durante o verão, porém, este é um casaco “bonito”. Na melhor das hipóteses."
"When winter comes and you need an amazing coat, now you have one. During summer, though, this is a \"quality\" coat. At best.": "Quando chega o inverno e você precisa de um casaco incrível, agora você tem um. Durante o verão, porém, este é um casaco de “qualidade”. Na melhor das hipóteses."
"When winter comes and you need an astounding coat, now you have one. During summer, though, this is an \"amazing\" coat. At best.": "Quando chega o inverno e você precisa de um casaco incrível, agora você tem um. Durante o verão, porém, este é um casaco “incrível”. Na melhor das hipóteses."
"When you aren't in combat, hold down Shift to run very, very fast. You also take no damage from falls. Lasts 5 minutes.": "Quando você não estiver em combate, mantenha pressionada a tecla Shift para correr muito, muito rápido. Você também não sofre danos por quedas. Dura 5 minutos."
"When you don this strange glowing metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Quando você veste este estranho traje de metal brilhante, você pode sentir seu senso de empatia e comunidade diminuir. É melhor matar sem remorso!"
"When you don this strange metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Ao vestir esse estranho traje de metal, você pode sentir seu senso de empatia e comunidade diminuir. É melhor matar sem remorso!"
"When you put these slippers on, your whole body feels lighter.": "Quando você calça esses chinelos, todo o seu corpo fica mais leve."
"When you see a spider wearing this hat, there is no mistaking the fact that they are a party animal, through and through.": "Quando você vê uma aranha usando este chapéu, não há dúvidas de que ela é um festeiro de ponta a ponta."
"When you touch it, it seems to scream into your brain.": "Quando você toca nele, parece gritar em seu cérebro."
"When your golf ball is used up, gain Non-combat Sprint Boost +2 for 120 seconds": "Quando sua bola de golfe acabar, ganhe Impulso de Corrida Sem Combate +2 por 120 segundos"
"When your snoot is just too tender to handle getting booped. Apply moderately to snoot. Reapply every 30 minutes as needed.": "Quando seu bisbilhoteiro é muito sensível para aguentar ser boopado. Aplique moderadamente no snoot. Reaplique a cada 30 minutos conforme necessário."
"Where did all these bugs come from?": "De onde vieram todos esses bugs?"
"Whetstone": "Pedra de amolar"
"While arguably not as effective as a super-sharp normal sword, Prognek's flaming design is fun for pyromaniacs.": "Embora não seja tão eficaz quanto uma espada normal superafiada, o design flamejante de Prognek é divertido para piromaníacos."
"While decades old, these gloves have never been worn in combat. They were crafted for \"all-weather exploration\", but to the orcs that made them, that mostly meant \"cold-weather exploration\".": "Embora tenham décadas, essas luvas nunca foram usadas em combate. Eles foram criados para “exploração em qualquer clima”, mas para os orcs que os criaram, isso significava principalmente “exploração em clima frio”."
"While doubtlessly dwarven in design, this helmet seems light. There is extra insulation against cold.": "Embora sem dúvida tenha um design anão, este capacete parece leve. Existe isolamento extra contra o frio."
"While dwarves are mostly known for brewing alcohol, those same techniques can also be used to brew potent offensive chemicals.": "Embora os anões sejam mais conhecidos por fabricar álcool, essas mesmas técnicas também podem ser usadas para fabricar produtos químicos potentes e ofensivos."
"While inarguably well-made, it seems somewhat ceremonial: the blade isn't even sharp! But it is very, very, VERY hot, which might count for something. There is an inscription: \"The Bearer Is Worthy\"": "Embora indiscutivelmente bem feito, parece um tanto cerimonial: a lâmina nem é afiada! Mas está muito, muito, MUITO quente, o que pode contar para alguma coisa. Há uma inscrição: \"O portador é digno\""
"While it has a close resemblance to a fly amanita, this mushroom is exceptionally poisonous and never edible.": "Embora tenha uma grande semelhança com um amanita mosca, este cogumelo é excepcionalmente venenoso e nunca comestível."
"While it has an unfortunate racist past (invented by humans who were terrified that neighboring elves were going to mind-assault them), the shield still sees use due to its broad protective powers.": "Embora tenha um passado racista infeliz (inventado por humanos que estavam com medo de que os elfos vizinhos os atacassem mentalmente), o escudo ainda é usado devido aos seus amplos poderes de proteção."
"While it resembles a wooden staff, it's actually made of super-compressed, highly conductive mushrooms.": "Embora se assemelhe a um bastão de madeira, na verdade é feito de cogumelos supercomprimidos e altamente condutores."
"While many bards lamented Tennenbrandt University's shift away from music and toward combat magic, Lostt reveled in a newfound spotlight, for his music was known across many realms as being offensively bad.": "Enquanto muitos bardos lamentavam a mudança da Universidade Tennenbrandt da música para a magia de combate, Lostt deleitou-se com um novo holofote, pois sua música era conhecida em muitos reinos como sendo ofensivamente ruim."
"While not a comfortable piece of equipment, it is decently protective.": "Embora não seja um equipamento confortável, é decentemente protetor."
"While not exactly beautiful, it's definitely elegant and comfortable. The early work of an up-and-coming master tailor, perhaps.": "Embora não seja exatamente bonito, é definitivamente elegante e confortável. Talvez o trabalho inicial de um mestre alfaiate em ascensão."
"While not the nicest way to prepare cocoa beans, this is useful for some recipes.": "Embora não seja a maneira mais agradável de preparar grãos de cacau, é útil para algumas receitas."
"While the craftsmanship is adequate, the materials are not, and this helmet looks more like a dead beaver than a helm.": "Embora o artesanato seja adequado, os materiais não são, e este capacete parece mais um castor morto do que um elmo."
"While there are still-extant offshoots of the Thorians, such as the Thentree elves and the Seekers of Marakir, only the actual Thorians made gloves like these! The weighting is pretty uncomfortable.": "Embora ainda existam ramificações dos Thorianos, como os elfos de Thentree e os Buscadores de Marakir, apenas os verdadeiros Thorianos faziam luvas como essas! A ponderação é bastante desconfortável."
"While vaguely protective, this lopsided helmet is so unbalancing that you're almost better off just going into combat without a helm at all.": "Embora vagamente protetor, este capacete torto é tão desequilibrado que é quase melhor você entrar em combate sem elmo."
"Whisky": "Uísque"
"Whisper-thin yet perfectly adaptive, these horseshoes last a lifetime and will never not be marvelous.": "Superfinas, mas perfeitamente adaptáveis, essas ferraduras duram a vida toda e nunca deixarão de ser maravilhosas."
