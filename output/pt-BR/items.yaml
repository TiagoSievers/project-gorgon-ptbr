"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, Yellow Perch, or Catfish, this gear can catch them. Takes 8 hours to attempt to catch 12-35 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye, Rock Carp, Smallmouth Bass, Yellow Perch ou Catfish, este equipamento pode pegá-los. Leva 8 horas para tentar pescar de 12 a 35 peixes."
