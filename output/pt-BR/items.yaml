"Some aberrant chemical reaction has burned off most of the crimson, but it's otherwise in good shape.": "Alguma reação química aberrante queimou a maior parte do vermelho, mas, fora isso, está em boa forma."
"Some basic calligraphy ink.": "Um pouco de tinta básica de caligrafia."
"Some bones strapped to a handle make this off-hand martial weapon look as stupid as it feels.": "Alguns ossos amarrados a um cabo fazem esta arma marcial improvisada parecer tão estúpida quanto parece."
"Some dried fish scales.": "Algumas escamas de peixe secas."
"Some effort has been made to link the chains into a glove shape!": "Algum esforço foi feito para unir as correntes em forma de luva!"
"Some extremely dedicated Winter Court fae replace their biological heart with one of these. Presumably it makes them more powerful...": "Algumas fadas extremamente dedicadas da Corte Invernal substituem seu coração biológico por um desses. Presumivelmente, isso os torna mais poderosos..."
"Some fairies like to freeze fruit juice in strange shapes. This one is just a boring rounded bar, but it's still fun.": "Algumas fadas gostam de congelar sucos de frutas em formatos estranhos. Esta é apenas uma barra arredondada chata, mas ainda é divertida."
"Some fresh cranberries. Too bitter to be eaten raw, but useful in cooking.": "Alguns cranberries frescos. Muito amargo para ser comido cru, mas útil na culinária."
"Some large, well-made tin springs.": "Algumas molas de estanho grandes e bem feitas."
"Some mantises say it's good for a hangover. But mantises don't eat soup, so who knows how they'd know that.": "Alguns louva-a-deus dizem que é bom para a ressaca. Mas os louva-a-deus não comem sopa, então quem sabe como eles saberiam disso."
"Some nice leather. Just... nice.": "Um belo couro. Apenas... legal."
"Some of the best plant-based cold-weather gear you may ever see. Comfortable and safe.": "Alguns dos melhores equipamentos vegetais para clima frio que você já viu. Confortável e seguro."
"Some simple salsa can really spice up any flatbread.": "Um pouco de molho simples pode realmente apimentar qualquer pão achatado."
"Some sort of hempen material stuffed with strange leaves. Itchy.": "Algum tipo de material de cânhamo recheado com folhas estranhas. Pruriginoso."
"Some sort of meat in a delicious sauce.": "Uma espécie de carne com um molho delicioso."
"Some strips of strange metal with strange properties. It is used by armorsmiths.": "Algumas tiras de metal estranho com propriedades estranhas. É usado por armeiros."
"Some writing in goblin. It looks like instructions or directions, maybe?": "Alguns escritos em goblin. Parecem instruções ou instruções, talvez?"
"Somebody has worn these undergarments previously without washing them. Hopefully that person was you. But you're not sure. Anyway, they reek, plus they provide no armor.": "Alguém já usou essas roupas íntimas sem lavá-las. Espero que essa pessoa seja você. Mas você não tem certeza. De qualquer forma, eles cheiram mal, além de não fornecerem armadura."
"Somebody wove some long bacon strips into a sort of bowl. And then put chunks of fried meat into the bowl. Weird. Salty.": "Alguém teceu algumas longas tiras de bacon numa espécie de tigela. E então coloque pedaços de carne frita na tigela. Esquisito. Salgado."
"Somehow this breastplate got stuck onto a spider via sticky web! What are the odds? Unfortunately, spider acid has filled it with holes, but what a great story!": "De alguma forma, este peitoral ficou preso em uma aranha através de uma teia pegajosa! Quais são as probabilidades? Infelizmente, o ácido aranha encheu-o de buracos, mas que história fantástica!"
"Somehow this glass orb has a bit of depression trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro tem um pouco de depressão presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has a bit of ultimate despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém um pouco do desespero final. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure anguish trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém pura angústia presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, este orbe de vidro contém puro desespero preso dentro dele. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure malice trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, este orbe de vidro contém pura maldade. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure revulsion trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro tem pura repulsa presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has raw emotional hate trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém um ódio emocional puro preso dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Someone dreamed of this sturdy shield, then lost control of it.": "Alguém sonhou com este escudo resistente e depois perdeu o controle dele."
"Someone has awkwardly painted these sub-par pants. Well, woodland animals aren't super smart, so maybe that'll do.": "Alguém pintou desajeitadamente essas calças abaixo da média. Bem, os animais da floresta não são muito inteligentes, então talvez isso sirva."
"Someone has carved a fist weapon out of glasstone, a rock known for its supernatural lightness. The glasstone market is in shambles now that glasstone jewelry has fallen out of fashion among humans, so new uses are becoming affordable.": "Alguém esculpiu uma arma de punho em vidro, uma rocha conhecida por sua leveza sobrenatural. O mercado de glasstone está em ruínas agora que as joias de glasstone saíram de moda entre os humanos, então novos usos estão se tornando acessíveis."
"Someone has meticulously drawn a geometric pattern on this scroll. It's unnaturally warm to the touch.": "Alguém desenhou meticulosamente um padrão geométrico neste pergaminho. É estranhamente quente ao toque."
"Someone has mixed good egg nog with cheap vodka. (This mixed drink is treated as a beer/wine.)": "Alguém misturou gemada boa com vodca barata. (Esta bebida mista é tratada como cerveja/vinho.)"
"Someone killed an ogre and <i>took its stomach</i>. That's not disturbing at all. Perfectly reasonable thing to do.": "Alguém matou um ogro e <i>cortou seu estômago</i>. Isso não é nada perturbador. Coisa perfeitamente razoável de se fazer."
"Someone put curry in this conch.": "Alguém colocou curry nesta concha."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. Then Fire Magic runes were carefully sculpted into the wood.": "Alguém levou muito tempo equilibrando e testando essa equipe para ter certeza de que ela tinha a distribuição de peso perfeita. Então as runas da Magia do Fogo foram cuidadosamente esculpidas na madeira."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. This will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.": "Alguém levou muito tempo equilibrando e testando essa equipe para ter certeza de que ela tinha a distribuição de peso perfeita. Isso funcionará bem para Staff Fighting, mas não possui as runas necessárias para funcionar para Fire Magic."
"Someone tried to map a cave, but seemed to get disoriented halfway through. The result is useless.": "Alguém tentou mapear uma caverna, mas pareceu ficar desorientado no meio do caminho. O resultado é inútil."
"Someone was buried in these, apparently. They're caked with dust, but don't seem the worse for wear.": "Alguém foi enterrado neles, aparentemente. Eles estão cobertos de poeira, mas não parecem desgastados."
"Someone was practicing their calligraphy on this parchment. They're not bad.": "Alguém estava praticando caligrafia neste pergaminho. Eles não são ruins."
"Someone with a basic sense of style has fashioned these leather pants. Unfortunately the protective reinforcement ruins the look, but it could be worse.": "Alguém com um senso básico de estilo criou essas calças de couro. Infelizmente o reforço protetor estraga o visual, mas poderia ser pior."
"Someone with competence put together these nimble leather boots. Only a small amount of protection is lost in exchange for nimble dodging ability.": "Alguém com competência montou essas ágeis botas de couro. Apenas uma pequena quantidade de proteção é perdida em troca de uma habilidade ágil de esquiva."
