"WelcomeCake": "Bem-vindoBolo"
"Well this is pretty embarrassing.": "Bem, isso é muito embaraçoso."
"Well, it's still got a pointy end and a handle. It should work fine.": "Bem, ainda tem uma ponta pontiaguda e uma alça. Deve funcionar bem."
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. (It will work for Staff Fighting but not Fire Magic abilities.)": "Bem, a maior parte da casca foi removida. Majoritariamente. Você só receberá algumas lascas tentando usar isso. (Funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. The crude Fire Magic runes bear the mark of an amateur, but should work.": "Bem, a maior parte da casca foi removida. Majoritariamente. Você só receberá algumas lascas tentando usar isso. As runas grosseiras da Magia do Fogo trazem a marca de um amador, mas devem funcionar."
"Well, the snake meat tastes a lot like chicken. But it tastes good!": "Bem, a carne de cobra tem gosto muito de frango. Mas tem um gosto bom!"
"Well, there's no name inscribed on them or anything. But you could give them a name if you wanted! The symbol of some god is etched on the inside.": "Bem, não há nenhum nome inscrito neles nem nada. Mas você poderia dar um nome a eles se quisesse! O símbolo de algum deus está gravado no interior."
"Well, they're hand-made shoes. Not everything that's hand-made is good quality, though, it turns out.": "Bem, são sapatos feitos à mão. Acontece que nem tudo que é feito à mão é de boa qualidade."
"Well, this is a stick.": "Bem, isso é um pedaço de pau."
"Well, you wouldn't want to eat off this shield, that's for sure. But why would you eat off a shield? Just strap it on your arm, weirdo.": "Bem, você não gostaria de comer este escudo, isso é certo. Mas por que você comeria um escudo? Basta amarrar no braço, esquisito."
