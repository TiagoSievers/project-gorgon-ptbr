"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Animal Handling. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Manejo de Animais. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Archery. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Tiro com Arco. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Armor Augmentation. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Aumento de Armadura. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Armor Patching. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Remendar Armadura. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Art History. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, História da Arte. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Arthropod Anatomy. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Anatomia dos Artrópodes. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
