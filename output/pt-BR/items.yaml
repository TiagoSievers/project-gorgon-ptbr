"As you glance into this painting, the details seem to melt away. It is a cursed forgery of Gobblenuk's Forger's Peril: the insane goblin artist concocted a magical painting that can never be replicated. Any attempt to do so results in this monstrous visual effect. On the other hand, the visual effect is pretty sweet.": "Ao olhar para esta pintura, os detalhes parecem derreter. É uma falsificação amaldiçoada do Perigo do Forjador de Gobblenuk: o artista duende insano inventou uma pintura mágica que nunca poderá ser replicada. Qualquer tentativa nesse sentido resulta neste efeito visual monstruoso. Por outro lado, o efeito visual é bastante agradável."
