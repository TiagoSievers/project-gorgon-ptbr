"After barely losing the annual Statehelm archery contest, Tamoko gained fame when he returned the following year and used his newly-invented beaker to win the grand prize. The beaker design has since been replicated with his blessing, delighting archery fans but causing a terrible schism in the archery-contest establishment, many of whom consider battle chemistry to be \"like cheating\".": "Depois de perder por pouco o concurso anual de tiro com arco Statehelm, Tamoko ganhou fama quando voltou no ano seguinte e usou seu copo recém-inventado para ganhar o grande prêmio. O design do copo foi replicado desde então com sua bênção, deliciando os fãs de tiro com arco, mas causando um terrível cisma no estabelecimento de competições de tiro com arco, muitos dos quais consideram a química da batalha \"como trapaça\"."
"After his brother burned to death, Vagreef spent years mastering Fire Magic to create suits of fire-resistance armor. He planned to manufacture these suits for his entire gang of bandits, but he only managed to make one prototype suit before he was murdered. This was his helmet.": "Depois que seu irmão morreu queimado, Vagreef passou anos dominando a Magia do Fogo para criar armaduras resistentes ao fogo. Ele planejava fabricar esses trajes para toda a sua gangue de bandidos, mas só conseguiu fazer um protótipo antes de ser assassinado. Este era o capacete dele."
