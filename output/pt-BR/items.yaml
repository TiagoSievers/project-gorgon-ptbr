"Is it a camouflaged nice shirt, or a nice camouflaged shirt? A little of both, probably.": "É uma bela camisa camuflada ou uma bela camisa camuflada? Um pouco de ambos, provavelmente."
"It carries the seal of Jerahd, the only swordsmith in Povus (now deceased). It feels oddly unsettling in the hand.": "Ele carrega o selo de Jerahd, o único ferreiro de Povus (já falecido). Parece estranhamente perturbador na mão."
"It claims that the holder of this letter is entitled to nothing. Absolutely nothing.": "Alega que o titular desta carta não tem direito a nada. Absolutamente nada."
"It claims that the holder of this letter is entitled to one fiftieth (1/50) of a door opening, or one tenth (1/10) of a free magical scroll. It doesn't say how one would redeem the letter, however.": "Afirma que o titular desta carta tem direito a um quinquagésimo (1/50) de abertura de porta, ou um décimo (1/10) de um pergaminho mágico gratuito. No entanto, não diz como alguém resgataria a carta."
"It contains a bunch of little hand-made badges. They don't look valuable.": "Ele contém um monte de pequenos emblemas feitos à mão. Eles não parecem valiosos."
"It doesn't have any sand magic or anything. It's just been in the sand a long time.": "Não tem nenhuma magia de areia nem nada. Está na areia há muito tempo."
"It doesn't SEEM like it's made from the hides of prarie dogs that wre sacrificed to Urtigal in a profane ceremony centuries ago... (But it is.)": "Não parece que seja feito de peles de cães da pradaria que foram sacrificados a Urtigal em uma cerimônia profana séculos atrás... (Mas é.)"
"It doesn't seem to do anything, but it's definitely magical. Huh.": "Parece não fazer nada, mas é definitivamente mágico. Huh."
"It emits a discomfiting aura, as if it isn't quite as real as it ought to be.": "Emite uma aura desconcertante, como se não fosse tão real quanto deveria ser."
"It feels like touching butter. Which is odd. But you get used to it.": "É como tocar manteiga. O que é estranho. Mas você se acostuma."
"It feels warm and calm like the last rays of a summer afternoon. It tastes like clean rainwater.": "É quente e calmo como os últimos raios de uma tarde de verão. Tem gosto de água da chuva limpa."
"It goes on your head.": "Isso passa pela sua cabeça."
"It has a splash-lip as well as a drinking lip, as if you'd be so foolish as to drink potions out of the same beaker you splash acids from!": "Ele tem uma boca para respingar e também uma boca para beber, como se você fosse tão tolo a ponto de beber poções do mesmo copo em que você espirra ácidos!"
"It has an inscription: \"Ensorcelled by Official Council Battlemages. Not for use by Rakshasa upon penalty of triple-death.\"": "Tem uma inscrição: \"Enfeitiçado por Magos de Batalha do Conselho Oficial. Não deve ser usado por Rakshasa sob pena de morte tripla.\""
"It is used by sages as a sort of battery for spells that require a large burst of power, and surveyors claim that the lichen can be used to find hidden caches of minerals in the area.\": \"Esta estranha vida orgânica armazena energia solar de uma maneira incomum": "ela a desvia para uma pequena dimensão de bolso. Isso permite que o líquen prospere em qualquer ambiente iluminado pelo sol, mas é mais comumente encontrado em áreas geladas porque há menos predadores naturais."
"It looks and tastes like turkey ... more or less. A bland turkey, but still.": "Parece e tem gosto de peru... mais ou menos. Um peru sem graça, mas ainda assim."
"It looks and tastes like turkey ... more or less. The cranberry sauce adds holiday flavor.": "Parece e tem gosto de peru... mais ou menos. O molho de cranberry adiciona sabor natalino."
"It looks and tastes like turkey ... more or less. The lemon glaze is sweet and a little tart.": "Parece e tem gosto de peru... mais ou menos. A cobertura de limão é doce e um pouco azeda."
"It looks like a coin, and it's made of some strong metal, but it has no markings or denomination. Whatever it's for, it's very old.": "Parece uma moeda e é feita de um metal forte, mas não tem marcas ou denominação. Seja qual for a finalidade, é muito antigo."
"It looks like a key, but it's made of semi-solid ectolasm. It couldn't possibly unlock anything; it's too mushy!": "Parece uma chave, mas é feita de ectolasmo semissólido. Não seria possível desbloquear nada; é muito mole!"
"It looks like a stick. But it's a very magical stick.": "Parece um pedaço de pau. Mas é um bastão muito mágico."
"It looks like cheese, smells like ammonia, and stings like a jellyfish.": "Parece queijo, cheira a amônia e pica como uma água-viva."
"It looks like it fits a heavy stone box.": "Parece que cabe em uma pesada caixa de pedra."
"It looks like lumps of dried curd on a string! Wait... it's actually metal shaped like cheese curds. Ratkin culture is weird.": "Parecem pedaços de coalhada seca em um barbante! Espere... na verdade é metal em forma de coalhada de queijo. A cultura Ratkin é estranha."
"It looks like milk, but stinks like mashed-up spider bits.": "Parece leite, mas fede como pedaços de aranha amassados."
"It looks like water. Tastes like potato. ... so it's magic potato-water, basically.": "Parece água. Tem gosto de batata. ... então é água de batata mágica, basicamente."
"It looks revolting, but... actually it's pretty good.": "Parece revoltante, mas... na verdade é muito bom."
"It looks stick-like, but it's incredibly strong.": "Parece um bastão, mas é incrivelmente forte."
"It plays the right notes.": "Ele toca as notas certas."
"It says \"This acts as a receipt to the perpetrator of a crime. __ demerits to _____ for ____.\" It hasn't been filled out.": "Diz \"Isto funciona como um recibo para o autor de um crime. __ deméritos para _____ por ____.\" Não foi preenchido."
"It says it's a recipe for a mixed drink, but there are no ingredients... Just weird pictograms.": "Diz que é uma receita de bebida mista, mas não tem ingredientes... Apenas pictogramas estranhos."
"It says, \"Dough rose too much; salvage eclair sales; baking time 12\".": "Diz: \"A massa cresceu demais; salve as vendas de éclair; tempo de cozimento 12\"."
"It says, \"Getting too old for this. Come home and inherit the bakery. You were always destined for this. And... I forgive you. Completely.\"": "Diz: \"Ficando velho demais para isso. Venha para casa e herde a padaria. Você sempre esteve destinado a isso. E... eu te perdôo. Completamente.\""
"It says, \"I hereby acknowledge that Vangreef's debt to me is paid.\" It has an elven signature symbol and the letters \"SS\". Then at the bottom is another note by the author: \"Don't waste that spell, Vangreef. Even if you could afford a second casting, I can't recast it until the moon waxes anew. Be smart and fast or your whole gang WILL die down there. And nobody will be able to rescue you.\"": "Diz: \"Reconheço por este meio que a dívida de Vangreef comigo foi paga.\" Possui um símbolo de assinatura élfica e as letras \"SS\". Então, na parte inferior, há outra nota do autor: \"Não desperdice esse feitiço, Vangreef. Mesmo que você pudesse pagar por uma segunda conjuração, não posso lançá-lo novamente até que a lua cresça novamente. Seja inteligente e rápido ou toda a sua gangue VAI morrer lá. E ninguém será capaz de resgatá-lo. \""
"It says, \"Karnag, your family loves you. Please don't do this to yourself! There must be another way. You will miss your son's first words...\" the rest is scribbled out except a bit at the bottom written in a different style, \"Karnag Has Graduated Wizard School! Signed my mother.\"": "Diz: \"Karnag, sua família ama você. Por favor, não faça isso com você mesmo! Deve haver outra maneira. Você sentirá falta das primeiras palavras de seu filho...\" o resto está rabiscado, exceto um pouco na parte inferior escrito em um estilo diferente, \"Karnag se formou na Escola de Magos! Assinou minha mãe.\""
"It seems like an ordinary giant spider leg.": "Parece uma perna de aranha gigante comum."
"It should be worth a few coins if you wash it up.": "Deve valer algumas moedas se você lavar."
"It smells awful and it leaves your tongue completely numb. So that's something.": "Tem um cheiro horrível e deixa sua língua completamente dormente. Então isso é alguma coisa."
"It smells bad, but... it doesn't taste too bad, actually.": "Cheira mal, mas... não tem um gosto tão ruim, na verdade."
"It smells like mushrooms and cinnamon.": "Cheira a cogumelos e canela."
"It smells of offal.": "Cheira a miudezas."
"It smells of sweat.": "Cheira a suor."
"It smells rancid and the texture is not pleasant. But it is filling.": "Tem cheiro rançoso e a textura não é agradável. Mas está enchendo."
"It starts delicious and then ends... not delicious.": "Começa delicioso e depois termina... nada delicioso."
"It stinks of death but has a mild, pleasant taste.": "Cheira a morte, mas tem um sabor suave e agradável."
"It stinks of outdoorsmen and fish.": "Cheira a gente do ar livre e a peixe."
"It stinks! And it tastes vinegary. But it's... it's edible.": "Isso fede! E tem gosto de vinagre. Mas é... é comestível."
"It sucks. But it makes you look less intimidating. Which might be a good thing or a bad thing.": "É uma droga. Mas faz você parecer menos intimidante. O que pode ser uma coisa boa ou ruim."
"It tastes crunchy and unpleasant. As a side-effect, it's extremely difficult to relax while under the effect of this potion.": "Tem um sabor crocante e desagradável. Como efeito colateral, é extremamente difícil relaxar sob o efeito desta poção."
"It tastes like mushroom gravy. Well, it <i>is</i> mushroom gravy, kinda. Plus pyrite for that extra crunch.": "Tem gosto de molho de cogumelos. Bem, é molho de cogumelos, mais ou menos. Além de pirita para aquela crocância extra."
"It tastes like orange juice! Kind of!": "Tem gosto de suco de laranja! Tipo de!"
"It tastes like pureed salad. And since you use it by applying it to your skin, you too will smell like pureed salad.": "Tem gosto de salada de purê. E como você usa aplicando na pele, você também vai cheirar a purê de salada."
"It was found in the gut of a giant spider. That's really the only spider-related thing going on here.": "Foi encontrado no intestino de uma aranha gigante. Essa é realmente a única coisa relacionada a aranhas acontecendo aqui."
"It was in the bedding of Old Fangsworth's lair.": "Estava na cama do covil do Velho Fangsworth."
"It won't stop squirming!": "Ele não para de se contorcer!"
"It's a bit cracked.": "Está um pouco rachado."
"It's a bit cramped for larger races, but this Dwarven unarmed weapon feels impressively heavy.": "É um pouco apertado para raças maiores, mas esta arma desarmada dos anões parece impressionantemente pesada."
"It's a blank form for requesting personal military items from the Onkara.": "É um formulário em branco para solicitar itens militares pessoais aos Onkara."
"It's a bottle of liquified feathers. Yum.": "É uma garrafa de penas liquefeitas. Hum."
"It's a broken necklace.": "É um colar quebrado."
"It's a chunk of glass. Pretty much worthless, although a few Alchemy recipes require bits of glass.": "É um pedaço de vidro. Praticamente inútil, embora algumas receitas de Alquimia exijam pedaços de vidro."
"It's a cracked bottle that stinks of rum. There was a label once, but it's mostly peeled off.": "É uma garrafa rachada que cheira a rum. Houve uma etiqueta uma vez, mas está quase toda removida."
"It's a filling meal, but nobody's going to ask you for the recipe.": "É uma refeição farta, mas ninguém vai pedir a receita."
"It's a flier about supporting \"local fauna\", whatever that means. But it's very hard to read because most of the text is mirrored. Very strange.": "É um folheto sobre o apoio à “fauna local”, seja lá o que isso signifique. Mas é muito difícil de ler porque a maior parte do texto é espelhada. Muito estranho."
"It's a gross ivory spoon. Worth something to somebody... but not to you.": "É uma colher de marfim grosseira. Vale alguma coisa para alguém... mas não para você."
"It's a hand-scribbled note from one Rakshasa to another, inviting them to a coming-of-age party. It looks pretty old... the party probably happened long ago and this was kept as a memento.": "É um bilhete rabiscado à mão de um Rakshasa para outro, convidando-os para uma festa de maioridade. Parece bem antigo... a festa provavelmente aconteceu há muito tempo e isso ficou guardado como lembrança."
"It's a high-quality hat, although it seems unlikely that an average cow would appreciate the style.": "É um chapéu de alta qualidade, embora pareça improvável que uma vaca comum apreciasse o estilo."
"It's a high-quality hat, sized to fit a deer for some reason.": "É um chapéu de alta qualidade, dimensionado para caber em um cervo por algum motivo."
"It's a high-quality hat, sized to fit snugly around a pig's ears.": "É um chapéu de alta qualidade, dimensionado para caber perfeitamente nas orelhas de um porco."
"It's a hollow crystal with some things inside that rattle around.": "É um cristal oco com algumas coisas dentro que fazem barulho."
"It's a hollow crystal with some things inside. Sarina the fairy fixed it for you.": "É um cristal oco com algumas coisas dentro. Sarina, a fada, consertou isso para você."
"It's a large hollow crystal. Or rather, a crystalline jar that looks like a crystal?": "É um grande cristal oco. Ou melhor, uma jarra cristalina que parece um cristal?"
"It's a large, gaudy belt buckle with a hand-painted scene of a man chopping lumber.": "É uma fivela de cinto grande e vistosa com uma cena pintada à mão de um homem cortando madeira."
"It's a leaf -- a non-demonic leaf -- encased in an otherworldly variety of amber.": "É uma folha – uma folha não demoníaca – envolta em uma variedade de âmbar sobrenatural."
"It's a lumpy stick, but it's had the splinters removed.": "É um pedaço de pau irregular, mas as lascas foram removidas."
"It's a mechanical arm with a strange wand tip at one end.": "É um braço mecânico com uma ponta de varinha estranha em uma das pontas."
"It's a metal headband designed for a small animal. Mages uses these to control unruly familiars after Awakening them, and also to augment the animals' burgeoning magic powers. This particular control ring allows hares to use ice magic -- as long as the hare has already learned the rituals, of course.": "É uma faixa de metal projetada para um animal pequeno. Os magos os usam para controlar familiares indisciplinados após despertá-los e também para aumentar os crescentes poderes mágicos dos animais. Este anel de controle específico permite que as lebres usem magia de gelo – desde que a lebre já tenha aprendido os rituais, é claro."
"It's a metal spike with various probes and buttons. It makes odd sounds when the buttons are pressed.": "É uma ponta de metal com várias sondas e botões. Faz sons estranhos quando os botões são pressionados."
"It's a note labeled \"To my dear friend.\"": "É uma nota chamada “Para meu querido amigo”."
"It's a note to Landri the Cold, an elf in Kur Mountains. It reads, \"You have not met me, and I cannot reveal myself, but I am a fellow theoretician, and I beg your help. I believe I can tap a portal to other planes of existence, and the plane of ice is very accessible here. I intend to use the Galkun technique to open the wormhole, and power it via ordinary ice lichen.\" (The note goes on for some length, in increasing technical detail, before ending with a perfunctory request for verification of the plan.)": "É um bilhete para Landri, o Frio, um elfo das Montanhas Kur. Diz: \"Você não me conheceu e não posso me revelar, mas sou um colega teórico e imploro sua ajuda. Acredito que posso abrir um portal para outros planos de existência, e o plano de gelo é muito acessível aqui. Pretendo usar a técnica Galkun para abrir o buraco de minhoca e alimentá-lo por meio de líquen de gelo comum. \" (A nota prossegue por algum tempo, aumentando os detalhes técnicos, antes de terminar com um pedido superficial de verificação do plano.)"
"It's a parchment with strange symbols on it. Perhaps someone could explain its meaning to you.": "É um pergaminho com símbolos estranhos. Talvez alguém possa explicar seu significado para você."
"It's a partially-acid-melted shield without any straps to keep it on.": "É um escudo parcialmente derretido com ácido, sem alças para mantê-lo."
"It's a piece of lacquered wood shaped like a long worm with a fanged mouth. Pretty impressive, really.": "É um pedaço de madeira laqueada em forma de um longo verme com boca com presas. Muito impressionante, realmente."
"It's a pool of liquid heat energy trapped in special glass.": "É uma piscina de energia térmica líquida presa em um vidro especial."
"It's a pretty big rock. You could probably carve some thoroughly mediocre arrow heads out of it if you were patient enough.": "É uma pedra bem grande. Você provavelmente poderia esculpir algumas pontas de flecha completamente medíocres se fosse paciente o suficiente."
"It's a really long scroll written in Crone. Someone somewhere may want it...": "É um pergaminho muito longo escrito em Crone. Alguém em algum lugar pode querer isso..."
"It's a rough sketch of a bear wearing a pirate hat. It is holding a jug of rum. Along the top are the words \"When it's all too much to bear, say yoho!\" and along the bottom: \"Remga's Raging Rum\"": "É um esboço de um urso usando um chapéu de pirata. Está segurando uma jarra de rum. No topo estão as palavras \"Quando for demais para suportar, diga yoho!\" e na parte inferior: \"Remga's Raging Rum\""
"It's a saddle.": "É uma sela."
"It's a scrambled egg, beloved breakfast of nearly every sentient race.": "É um ovo mexido, o café da manhã adorado por quase todas as raças sencientes."
"It's a scribbled series of images and ratios. You can kind of understand it: it's a recipe of some sort.": "É uma série rabiscada de imagens e proporções. Você pode entender: é algum tipo de receita."
"It's a sealed letter addressed to \"High Stormmaster Merriana.\"": "É uma carta lacrada endereçada ao “Alto Stormmaster Merriana”."
"It's a sealed pouch with a mineral inside.": "É uma bolsa selada com um mineral dentro."
"It's a sealed pouch with something inside.": "É uma bolsa selada com algo dentro."
"It's a skull ring! It fits all finger sizes. The skull is actually a Necromancy Gem.": "É um anel de caveira! Cabe em todos os tamanhos de dedos. O crânio é na verdade uma joia de necromancia."
"It's a small bar of pleasant-smelling soap. And so smooth! This is nice soap.": "É uma pequena barra de sabonete com cheiro agradável. E tão suave! Este é um ótimo sabonete."
"It's a small parchment with a magical inscription. You can use this to get past a huge icy barrier beneath the ruined tower in Kur.": "É um pequeno pergaminho com uma inscrição mágica. Você pode usar isso para passar por uma enorme barreira de gelo abaixo da torre em ruínas em Kur."
"It's a staff.": "É um cajado."
"It's a stringless yo-yo.": "É um ioiô sem corda."
"It's a sword! Looks pretty sharp.": "É uma espada! Parece bem nítido."
"It's a taste only an alchemist would call appetizing. \"But it has sugar in it!\" As if that offset the taste of dirt!": "É um sabor que só um alquimista chamaria de apetitoso. \"Mas tem açúcar!\" Como se isso compensasse o gosto de sujeira!"
"It's a tooth from a huge Tor-Urak.": "É um dente de um enorme Tor-Urak."
"It's a tough helmet that was once used by the elite Dwarven Stalwarts. But that was many years ago, and more recent wearers have not been big on armor maintenance. It's still a great helm, but you imagine it was once even more impressive.": "É um capacete resistente que já foi usado pela elite dos Dwarven Stalwarts. Mas isso foi há muitos anos, e os usuários mais recentes não têm se preocupado muito com a manutenção de armaduras. Ainda é um ótimo elmo, mas você imagina que já foi ainda mais impressionante."
"It's about nature. It's boring and it doesn't even rhyme.": "É sobre a natureza. É chato e nem rima."
"It's amazing that these awkwardly-riveted pieces of scorpion and beetle carapace give you any mobility at all. But they do! Just don't sit down too quickly, and you'll be fine.": "É incrível que essas peças de carapaça de escorpião e besouro desajeitadamente rebitadas proporcionem alguma mobilidade. Mas eles fazem! Apenas não se sente muito rapidamente e você ficará bem."
"It's an apple coated in a sugar glaze so thick that it hurts your teeth to bite into. A somewhat tedious treat.": "É uma maçã coberta com uma cobertura de açúcar tão espessa que machuca os dentes ao mordê-la. Um deleite um tanto tedioso."
"It's an authentic rakshasa-style claw weapon.": "É uma autêntica arma de garra estilo rakshasa."
"It's an egg scrambled with onions and topped with hash browns.": "É um ovo mexido com cebola e coberto com batatas fritas."
"It's an extremely poor forgery of \"Last Autumn Sunset\" by Kot Bhenul. There isn't even any real gold in the gold paint!": "É uma falsificação extremamente pobre de \"Last Autumn Sunset\", de Kot Bhenul. Não há nem ouro verdadeiro na tinta dourada!"
"It's an inexpertly made medal with orcish words on it.": "É uma medalha feita de maneira inexperiente com palavras orcs nela."
"It's an official letter from Praetor Ballard, demanding that a Human named Charles Thompson leave Serbule's surroundings forever... or face death.": "É uma carta oficial do Praetor Ballard, exigindo que um humano chamado Charles Thompson deixe os arredores de Serbule para sempre... ou enfrentará a morte."
"It's an old note. \"Relamir: if you read this, get out of here! The frog men came again... and they killed the guests and staff. There's nobody left but me, and I'm leaving. Fuck this island, fuck this whole inn idea, fuck money, fuck the ocean, fuck everything. I'll pay you the money I owe you within a decade, I promise. - Roolaustus\"": "É uma nota antiga. \"Relamir: se você leu isso, saia daqui! Os homens sapos voltaram... e mataram os hóspedes e funcionários. Não sobrou ninguém além de mim, e estou indo embora. Foda-se essa ilha, foda-se toda essa ideia de pousada, foda-se o dinheiro, foda-se o oceano, foda-se tudo. Eu vou te pagar o dinheiro que te devo dentro de uma década, eu prometo. - Roolaustus\""
"It's an old worn shovel with a small handle. It doesn't seem very special to you.": "É uma pá velha e gasta com um cabo pequeno. Não parece muito especial para você."
"It's been about 15 centuries since the Serbule Revolt, but these dwarven leggings don't seem a day over 450. Their preservative magic is quite strong.": "Já se passaram cerca de 15 séculos desde a Revolta dos Sérbulos, mas essas perneiras anãs não parecem ter mais de 450 anos. Sua magia preservadora é bastante forte."
"It's been flavored up with some cranberry sauce.": "Foi aromatizado com um pouco de molho de cranberry."
"It's been formally approved by a Lt. Flakis.\": \"\\\"Pagamento": "3 RTC"
"It's been hacked off of a ranalon guardian. Grisly and disturbing, especially to ranalon.": "Foi hackeado de um guardião Ranalon. Terrível e perturbador, especialmente para Ranalon."
"It's bubbling! Like magma! But it's not actually very hot.": "Está borbulhando! Como magma! Mas na verdade não está muito quente."
"It's charred and black from tossing hundreds of fireballs over the years, but it's still really comfortable to use.": "Está carbonizado e preto por ter lançado centenas de bolas de fogo ao longo dos anos, mas ainda é muito confortável de usar."
"It's clearly magical: it feels cold to the touch. But nothing seems to happen otherwise.": "É claramente mágico: parece frio ao toque. Mas nada parece acontecer de outra forma."
"It's cotton! Breathable, pleasant, cotton. Yep. Cotton.": "É algodão! Respirável, agradável, algodão. Sim. Algodão."
"It's covered in bloody fingerprints.": "Está coberto de impressões digitais sangrentas."
"It's covered in gibberish -- there are words, but they don't seem to make sentences.": "Está coberto de jargões – há palavras, mas elas não parecem formar frases."
"It's covered in mold. Perhaps the cork failed?": "Está coberto de mofo. Talvez a rolha tenha falhado?"
"It's creamy and savory and meatless! What else can you ask for?": "É cremoso, saboroso e sem carne! O que mais você pode pedir?"
"It's dead now, but you swore it was moving just a second ago.": "Está morto agora, mas você jurou que estava se movendo há apenas um segundo."
"It's either very cold or very warm to the touch... it's hard to tell which.": "Ou está muito frio ou muito quente ao toque... é difícil dizer qual."
"It's empty, but the box itself is quite beautiful.": "Está vazio, mas a caixa em si é muito bonita."
"It's fine. Nothing special, but filling.": "Está tudo bem. Nada de especial, mas recheio."
"It's fizzing unnaturally.": "Está efervescente de forma anormal."
"It's glass with some kind of chemicals in it.": "É vidro com algum tipo de produto químico."
"It's gotten a bit frayed from use, but it's still thick and warm.": "Ficou um pouco desgastado pelo uso, mas ainda está grosso e quente."
"It's hard to imagine, but once these boots were the height of fashion.": "É difícil imaginar, mas uma vez que essas botas estavam no auge da moda."
"It's hard to see, which is good for a camouflaged shirt.": "É difícil de ver, o que é bom para uma camisa camuflada."
"It's heat energy trapped in glass. It's hot to the touch.": "É energia térmica presa no vidro. Está quente ao toque."
"It's just a big sack of money.": "É apenas um grande saco de dinheiro."
"It's just a rock. The name was coined by Plaudius the Wise who posited that the Forthragarian homeworld might be paved with such stones. This has since recently been proven incorrect, but the name is unlikely to change.": "É apenas uma pedra. O nome foi cunhado por Pláudio, o Sábio, que postulou que o mundo natal Forthragariano poderia ser pavimentado com tais pedras. Desde então, isso foi provado incorreto, mas é improvável que o nome mude."
"It's labeled \"Evil Tasks For Today\", but all the tasks involve shopping and housekeeping.": "Está rotulado como \"Tarefas malignas para hoje\", mas todas as tarefas envolvem compras e tarefas domésticas."
"It's labeled 'bear repellent.' It smells spicy. You opt not to taste it.": "Está rotulado como 'repelente de urso'. Tem um cheiro picante. Você opta por não provar."
"It's made of ice! It will eventually melt, but it usually lasts a while.": "É feito de gelo! Eventualmente derreterá, mas geralmente dura um pouco."
"It's made of some sort of beautiful metal. An inscription inside says: \"B - when it falls apart, find me. -T\"": "É feito de algum tipo de metal lindo. Uma inscrição dentro diz: \"B - quando desmoronar, me encontre. -T\""
"It's metal. It fits on a werewolf. These are the only positive attributes.": "É metálico. Cabe em um lobisomem. Esses são os únicos atributos positivos."
"It's pretty generic.": "É bastante genérico."
"It's pretty good for hitting things.": "É muito bom para acertar coisas."
"It's seen years of freezing cold weather, digging in the dirt, and horrific violence. It's surprisingly clean for all that.": "Foram anos de frio congelante, escavações na terra e violência horrível. É surpreendentemente limpo por tudo isso."
"It's solid glass with a fish embedded in it.": "É um vidro sólido com um peixe embutido."
"It's somewhat melted around the edges, but still pretty sturdy.": "Está um pouco derretido nas bordas, mas ainda bastante resistente."
"It's stone, egg-shaped, and it came off of a gargoyle. Whether it's an actual embryonic gargoyle is not readily apparent.": "É de pedra, em forma de ovo, e saiu de uma gárgula. Se é uma gárgula embrionária real, não é facilmente aparente."
"It's sturdy, but it's so simple that it'd be hard <i>not</i> to be sturdy. But it's not false advertising, anyway.": "É resistente, mas é tão simples que seria difícil <i>não</i> ser resistente. Mas, de qualquer forma, não é propaganda enganosa."
"It's surprisingly heavy! It smells toxic.": "É surpreendentemente pesado! Tem um cheiro tóxico."
"It's technically a crystal, but it'd be impossible to say precisely what it's made of. It's more of a... liquid crystal? It can be squeezed and twisted into odd shapes. Maybe it'd make a fun children's toy.": "É tecnicamente um cristal, mas seria impossível dizer com precisão do que é feito. É mais um... cristal líquido? Pode ser espremido e torcido em formas estranhas. Talvez fosse um divertido brinquedo infantil."
"It's the lens Truxartis asked you to find. It should repair the \"blood well\".": "É a lente que Truxartis pediu para você encontrar. Deve reparar o \"sangue bem\"."
"It's the little-known masterpiece by dwarven artist Kot Bhenul. Note the beautiful use of real gold in the paint.": "É a obra-prima pouco conhecida do artista anão Kot Bhenul. Observe o belo uso de ouro verdadeiro na pintura."
"It's too waterlogged and slimy to be salvaged.": "Está muito encharcado e viscoso para ser recuperado."
"It's unclear what sort of leather was used in these greaves, but it's not cow leather. Something thicker.": "Não está claro que tipo de couro foi usado nessas torresmos, mas não é couro de vaca. Algo mais grosso."
"It's unclear what this sword is made of, or who might have smithed it. The edge is so sharp that it can cut flesh from three inches away.": "Não está claro do que é feita esta espada ou quem pode tê-la forjado. A borda é tão afiada que pode cortar a carne a sete centímetros de distância."
"It's unclear when this potion was made, but it's old. A tiny label declares it to be \"the liquified essence of sharpness.\" It's mint flavored.": "Não está claro quando esta poção foi feita, mas é antiga. Um pequeno rótulo declara que é “a essência liquefeita da nitidez”. Tem sabor de menta."
"It's warm to the touch. Dwarven safety runes indicate that it's explosive, poisonous, and ... there's one other danger symbol that you don't recognize.": "É quente ao toque. As runas de segurança dos anões indicam que é explosivo, venenoso e... há outro símbolo de perigo que você não reconhece."
"It's wood with some thin metal plating over it. Pretty sturdy, and also lightweight.": "É de madeira com um fino revestimento de metal por cima. Bastante resistente e também leve."
"It's... a clownfish. Dried and salted. Snack-sized.": "É... um peixe-palhaço. Seco e salgado. Do tamanho de um lanche."
"Itching Powder": "Pó para coceira"
"Itchy and viney, but the magic is impressively resilient.": "Com coceira e vinha, mas a magia é impressionantemente resistente."
