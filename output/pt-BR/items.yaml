"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x10.": "Um banquinho descartável para meditar. Use-o próximo a um Pilar de Meditação para aumentar em 10x a duração dos efeitos de meditação."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x11.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em 11 vezes."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x12.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em 12x."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x2.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em x2."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x3.": "Um banquinho descartável para meditar. Use-o próximo a um Pilar de Meditação para aumentar em três vezes a duração dos efeitos da meditação."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x4.": "Um banquinho descartável para meditar. Use-o próximo a um Pilar de Meditação para aumentar em 4x a duração dos efeitos de meditação."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x5.": "Um banquinho descartável para meditar. Use-o próximo a um Pilar de Meditação para aumentar em cinco vezes a duração dos efeitos da meditação."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x6.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em x6."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x7.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em sete vezes."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x8.": "Um banquinho descartável para meditar. Use-o próximo a um Pilar de Meditação para aumentar em 8x a duração dos efeitos de meditação."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x9.": "Um banquinho descartável para meditar. Use-o perto de um Pilar de Meditação para aumentar a duração dos efeitos de meditação em x9."
"A dollop of blood from the realm known as \"Acur\", where blood flows as freely as water does here.": "Um montão de sangue do reino conhecido como \"Acur\", onde o sangue flui tão livremente quanto a água aqui."
"A dollop of liquid that seems like it's hissing from inside the glass.": "Um montão de líquido que parece sibilar de dentro do copo."
"A dollop of ooze in a tiny vial.": "Um montão de lodo em um pequeno frasco."
"A drink that accelerates your underwater fast-movement speed. It tastes atrocious.": "Uma bebida que acelera sua velocidade de movimento rápido debaixo d’água. O gosto é horrível."
"A drinkable wine, but with a slightly musky taste and odor. This is definitely not the kind of wine that elves drink in Verta! But it's not horrible.": "Um vinho bebível, mas com sabor e odor ligeiramente almiscarados. Definitivamente, este não é o tipo de vinho que os elfos bebem em Verta! Mas não é horrível."
"A drop of blood from a gnasher.": "Uma gota de sangue de um gnasher."
"A drop of blood that's been affected by the fae realm. Winterprize crystals are known to be sensitive to this sort of blood. Carrying it in large quantities is unwise, however, as it can corrupt the bearer. (You cannot carry more than 6 at once.)": "Uma gota de sangue que foi afetada pelo reino fae. Os cristais Winterprize são conhecidos por serem sensíveis a esse tipo de sangue. Porém, carregá-lo em grandes quantidades não é aconselhável, pois pode corromper o portador. (Você não pode carregar mais de 6 de uma vez.)"
"A drop of magical darkness, trapped in a vial.": "Uma gota de escuridão mágica, presa em um frasco."
"A drop of magical liquid containing the essence of fear.": "Uma gota de líquido mágico contendo a essência do medo."
"A drop of magical liquid containing the essence of hatred.": "Uma gota de líquido mágico contendo a essência do ódio."
"A drop of magical liquid containing the essence of hope.": "Uma gota de líquido mágico contendo a essência da esperança."
"A drop of some foul magical liquid.": "Uma gota de algum líquido mágico imundo."
"A drop of sparkling gel.": "Uma gota de gel espumante."
"A drop of sweet-smelling magical liquid.": "Uma gota de líquido mágico de cheiro adocicado."
"A dry wine. It has a slightly piney smell, but the aroma is not pleasant.": "Um vinho seco. Tem um cheiro ligeiramente a pinho, mas o aroma não é agradável."
"A dwarven design coated in multiple power-containment gems, this is no beauty, but it packs a lot of power.": "Um design anão revestido com múltiplas gemas de contenção de poder, não é nada bonito, mas contém muito poder."
"A factual statement about demons. Collect enough of these and Ferris Blueheart in Vidaria can turn them into a Scroll of Demonic Research.": "Uma declaração factual sobre demônios. Colete um número suficiente deles e Ferris Blueheart em Vidaria poderá transformá-los em um Pergaminho de Pesquisa Demoníaca."
"A fad item by the master of trend magic, Rea Shuloth. Rea's spell compelled everyone to love these necklaces, but even magic can't control fashion for long, and now these are seen as incredibly gauche.": "Um item da moda do mestre da magia das tendências, Rea Shuloth. O feitiço de Rea obrigou todos a amarem esses colares, mas mesmo a magia não consegue controlar a moda por muito tempo, e agora eles são vistos como incrivelmente desajeitados."
"A fae fish that's been genetically altered to survive here and slowly kill the ocean. It's cold to the touch, and quite inedible.": "Um peixe fada que foi geneticamente alterado para sobreviver aqui e matar lentamente o oceano. É frio ao toque e bastante intragável."
"A fairly basic helmet with some unnecessary stylistic flourishes.": "Um capacete bastante básico com alguns detalhes estilísticos desnecessários."
"A fairly fragile bone that was part of some animal's rib cage.": "Um osso bastante frágil que fazia parte da caixa torácica de algum animal."
"A fairly large crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Um prisma cristalino bastante grande. Os transmutadores os usam para guiar o flogisto para dentro ou para fora de um item."
"A fairly-new item made in the Rakshasa manner, but probably not by a Rakshasa. Still not terrible.": "Um item relativamente novo feito à maneira Rakshasa, mas provavelmente não por um Rakshasa. Ainda não é terrível."
"A fairy weapon from the Summer Court.": "Uma arma de fada da Corte Estival."
"A fairy weapon from the Winter Court. (Note: although it can bolster necromantic power, it does not contain a Necromancy Gem.)": "Uma arma de fada da Corte Winter. (Nota: embora possa reforçar o poder necromântico, não contém uma Gema de Necromancia.)"
"A fall treat.": "Um deleite de outono."
"A famous orcish pasta dish.": "Um famoso prato de massa orc."
"A fancier autopsy kit for advanced pathologists. (+5 to your effective skill when autopsying a corpse.)": "Um kit de autópsia mais sofisticado para patologistas avançados. (+5 para sua habilidade efetiva ao autopsiar um cadáver.)"
"A fancy autopsy kit for advanced pathologists. (+3 to your effective skill when autopsying a corpse.)": "Um kit de autópsia sofisticado para patologistas avançados. (+3 para sua habilidade efetiva ao autopsiar um cadáver.)"
"A fancy bottle makes wine taste better, and this is a pretty fancy bottle.": "Uma garrafa sofisticada torna o vinho mais saboroso, e esta é uma garrafa bem sofisticada."
"A fancy candied apple for those who prefer less sweetness. Instead of caramel, this green apple is wrapped in a delicate layer of lacy sugar. It's almost too pretty to eat.": "Uma maçã cristalizada chique para quem prefere menos doçura. Em vez de caramelo, esta maçã verde é envolta em uma delicada camada de açúcar rendado. É quase bonito demais para comer."
"A fancy key that can open any Minotaur Vault. For security reasons the key is destroyed upon use.": "Uma chave sofisticada que pode abrir qualquer Cofre do Minotauro. Por razões de segurança, a chave é destruída durante o uso."
"A fancy plate of snack foods.": "Um prato chique de salgadinhos."
"A fancy, frilly, elegant outfit that's far more protective than it looks.": "Uma roupa chique, com babados e elegante que protege muito mais do que parece."
"A favorite of conscripted trolls. The name 'bourbon' is a misnomer since no corn is used. You don't want to know what is used.": "Um favorito dos trolls recrutados. O nome 'bourbon' é um nome impróprio, pois nenhum milho é usado. Você não quer saber o que é usado."
"A festive banner celebrating the joy of Rebirth.": "Um banner festivo celebrando a alegria do Renascimento."
"A festive banner declaring its Love for Alharth.": "Uma faixa festiva declarando o seu amor por Alharth."
"A festive banner emblazoned with a winter snowflake.": "Um banner festivo estampado com um floco de neve de inverno."
"A festive banner with a pumpkin displayed proudly upon it.": "Um banner festivo com uma abóbora exibida orgulhosamente."
"A few berries floating in a ghostly liquid.": "Algumas frutas flutuando em um líquido fantasmagórico."
"A few drops of residue from some type of cold elemental.": "Algumas gotas de resíduo de algum tipo de elemental frio."
"A few sketchy notes about a huge hoard of treasure buried in the Eltibule region.": "Algumas notas incompletas sobre um enorme tesouro enterrado na região de Eltibule."
"A few sketchy notes about a huge hoard of treasure buried in the Ilmari Desert.": "Algumas notas incompletas sobre um enorme tesouro enterrado no deserto de Ilmari."
"A few sketchy notes about a huge hoard of treasure buried or sunken near Sun Vale.": "Algumas notas incompletas sobre um enorme tesouro enterrado ou afundado perto de Sun Vale."
"A few sketchy notes about a large amount of treasure buried in the Eltibule region.": "Algumas notas incompletas sobre uma grande quantidade de tesouros enterrados na região de Eltibule."
"A few sketchy notes about a large amount of treasure buried in the Ilmari Desert.": "Algumas notas incompletas sobre uma grande quantidade de tesouros enterrados no deserto de Ilmari."
"A few sketchy notes about a large amount of treasure buried or sunken near Sun Vale.": "Algumas notas incompletas sobre uma grande quantidade de tesouros enterrados ou afundados perto de Sun Vale."
"A few sketchy notes about a legendary hoard of treasure buried in the Eltibule region.": "Algumas notas incompletas sobre um lendário tesouro enterrado na região de Eltibule."
"A few sketchy notes about a legendary hoard of treasure buried in the Ilmari Desert.": "Algumas notas incompletas sobre um lendário tesouro enterrado no deserto de Ilmari."
"A few sketchy notes about a legendary hoard of treasure buried or sunken near Sun Vale.": "Algumas notas incompletas sobre um lendário tesouro enterrado ou afundado perto de Sun Vale."
"A few sketchy notes about a small amount of treasure buried in the Eltibule region.": "Algumas notas incompletas sobre uma pequena quantidade de tesouro enterrado na região de Eltibule."
"A few sketchy notes about a small amount of treasure buried in the Ilmari Desert.": "Algumas notas incompletas sobre uma pequena quantidade de tesouro enterrado no deserto de Ilmari."
"A few sketchy notes about a small amount of treasure buried or sunken near Sun Vale.": "Algumas notas incompletas sobre uma pequena quantidade de tesouro enterrado ou afundado perto de Sun Vale."
"A few years ago, the humans of Statehelm decided shirts like this were ironically in fashion. That time has come and gone, however, and now it's just hideous again.": "Há alguns anos, os humanos de Statehelm decidiram que camisas como esta estavam ironicamente na moda. Esse tempo já passou e agora é horrível novamente."
"A figurine of a grinning skull. But, of course, all skulls grin. A necromancy gem is in the eye socket.": "Uma estatueta de uma caveira sorridente. Mas, claro, todos os crânios sorriem. Uma gema de necromancia está na órbita ocular."
"A figurine of a heart with many smaller little hearts attached to it. Eerie.": "Uma estatueta de um coração com muitos corações menores presos a ele. Sinistro."
"A figurine of a heart.": "Uma estatueta de um coração."
"A figurine of a man holding a heart in his hands. The tiny heart pulses with its own rhythm.": "Uma estatueta de um homem segurando um coração nas mãos. O minúsculo coração pulsa em seu próprio ritmo."
"A figurine of a man with an arrow in his back, who seems to be grinning.": "A estatueta de um homem com uma flecha nas costas, que parece estar sorrindo."
"A figurine of a muscular human with a huge pack on his back.": "A estatueta de um humano musculoso com uma mochila enorme nas costas."
"A figurine of a muscular human with a huge pack on his back. This amulet was enhanced by Moxie of the Crafting Caravan.": "A estatueta de um humano musculoso com uma mochila enorme nas costas. Este amuleto foi aprimorado por Moxie da Caravana de Artesanato."
"A figurine of a smiling man with ice-entombed feet.": "A estatueta de um homem sorridente com pés sepultados em gelo."
"A figurine of a tiny brain.": "Uma estatueta de um cérebro minúsculo."
"A figurine of a tiny man with a sword in his skull, who seems to be unperturbed.": "A estatueta de um homenzinho com uma espada na cabeça, que parece imperturbável."
"A figurine of a tiny metal fireball on a chain.": "Uma estatueta de uma pequena bola de fogo de metal presa a uma corrente."
"A figurine of a tiny shield.": "Uma estatueta de um pequeno escudo."
"A figurine of a woman with hearts glued to every surface of her body. Very disturbing.": "A estatueta de uma mulher com corações colados em todas as superfícies do corpo. Muito perturbador."
"A figurine of two hearts combined. Weird.": "Uma estatueta de dois corações combinados. Esquisito."
"A figurine of two hearts with little hearts coming off of them, as if they were in love. Creepy.": "Uma estatueta de dois corações com pequenos corações saindo deles, como se estivessem apaixonados. Repugnante."
"A figurine of two tiny metal fireballs on a chain.": "Uma estatueta de duas pequenas bolas de fogo de metal presas a uma corrente."
"A figurine of two wolves killing a deer together. So tiny and yet so detailed!": "Uma estatueta de dois lobos matando um cervo juntos. Tão pequeno e tão detalhado!"
"A fire pit, good for cooking in the field or for keeping warm in the cold. Lasts 3 minutes once deployed.": "Uma fogueira, boa para cozinhar no campo ou para se aquecer no frio. Dura 3 minutos depois de implantado."
"A flask for flinging chemicals in combat. Held in the off hand.": "Um frasco para lançar produtos químicos em combate. Segurado na mão inábil."
"A flask of flammable liquid. It doesn't deal much damage, but any flame will keep trolls from regenerating, and this flame lasts a long time.": "Um frasco com líquido inflamável. Não causa muito dano, mas qualquer chama impedirá a regeneração dos trolls, e essa chama dura muito tempo."
"A flask strong enough to contain even magical alcohol without evaporation.": "Um frasco forte o suficiente para conter até álcool mágico sem evaporação."
"A flimsy set of tools for picking locks. They'll break when used.": "Um frágil conjunto de ferramentas para arrombar fechaduras. Eles quebrarão quando usados."
"A fluffy pastry that's not too sweet.": "Uma massa fofa que não é muito doce."
"A focusing-item for mentalists.": "Um item de foco para mentalistas."
"A fragment of magical crystal. It's too small to be used in crafting, but it's pleasantly warm in your palm.": "Um fragmento de cristal mágico. É muito pequeno para ser usado na elaboração, mas é agradavelmente quente na palma da mão."
"A fragment of magical crystal. It's too small to be used in crafting, but perhaps it could be fused with other shards somehow.": "Um fragmento de cristal mágico. É muito pequeno para ser usado na elaboração, mas talvez pudesse ser fundido com outros fragmentos de alguma forma."
"A framework for building a mushroom grow-box.": "Uma estrutura para construir uma caixa de cultivo de cogumelos."
"A freakish mask crafted by an unliving malevolence.": "Uma máscara bizarra criada por uma malevolência sem vida."
"A freeze-dried beetle of some sort.": "Algum tipo de besouro liofilizado."
"A fresh uncooked ear of corn. Corn is a bit of a delicacy in the Council Lands, although it's extremely common elsewhere.": "Uma espiga de milho fresca e crua. O milho é uma iguaria nas Terras do Conselho, embora seja extremamente comum em outros lugares."
"A fresh, zesty, very simple salad.": "Uma salada fresca, picante e muito simples."
"A fruit-juice mix with a heavenly taste (if a bit sweet).": "Uma mistura de suco de frutas com um sabor celestial (embora um pouco doce)."
"A fruity disk of hard candy on a stick.": "Um disco frutado de bala dura em um palito."
"A fungus that can spit a noxious cloud of poison.": "Um fungo que pode cuspir uma nuvem nociva de veneno."
"A garnet that floats around your head and emits light. Not especially well-made, but it's still vaguely impressive.": "Uma granada que flutua em volta da sua cabeça e emite luz. Não é especialmente bem feito, mas ainda é vagamente impressionante."
"A garnet that floats around your head and emits light. This was obviously made by an apprentice still learning the craft. The enchantment is clumsy and the gem wobbles slightly in its orbit.": "Uma granada que flutua em volta da sua cabeça e emite luz. Obviamente, isso foi feito por um aprendiz que ainda estava aprendendo o ofício. O encantamento é desajeitado e a gema oscila levemente em sua órbita."
"A gaudy golden ring with a purple enchantment aura.": "Um berrante anel dourado com uma aura roxa de encantamento."
"A gaudy necklace worn by those that venerate Kajich, the God of Fear. It allows you to invoke his visage to strike fear in your foes.": "Um colar berrante usado por aqueles que veneram Kajich, o Deus do Medo. Ele permite que você invoque seu rosto para causar medo em seus inimigos."
"A gaudy squid amulet worn by those that venerate Enoyos, god of the sea.": "Um berrante amuleto de lula usado por aqueles que veneram Enoyos, deus do mar."
"A gaudy talisman of a cat with very long whiskers.": "Um berrante talismã de gato com bigodes muito longos."
"A Gazluk officer's key to one of the armory storage chests.": "A chave de um oficial Gazluk para um dos baús de armazenamento do arsenal."
"A ghostly document. It hasn't quite reverted to ectoplasm yet. Unfortunately it's completely illegible.": "Um documento fantasmagórico. Ainda não voltou ao ectoplasma. Infelizmente está completamente ilegível."
"A giant rubbery tentacle, not unlike an octopus tentacle (if the octopus was nightmarishly large).": "Um tentáculo gigante de borracha, não muito diferente de um tentáculo de polvo (se o polvo fosse assustadoramente grande)."
"A gift from Rappanel, the elven bard. It has something of his signature sound.": "Um presente de Rappanel, o bardo élfico. Tem algo do som característico dele."
"A gimmicky off-hand knife with a spring mechanism to increase thrusting damage. The mechanism gets gunked up a lot, but on the plus side, the knife is VERY sharp.": "Uma faca improvisada e enigmática com um mecanismo de mola para aumentar o dano de estocada. O mecanismo fica muito danificado, mas pelo lado positivo, a faca é MUITO afiada."
"A glowing eye from a grickling.": "Um olho brilhante de uma gargalhada."
"A goblin archer's business card.": "O cartão de visita de um arqueiro goblin."
"A goblin chieftain's business card.": "O cartão de visita de um chefe goblin."
"A goblin healer's business card.": "O cartão de visita de um curandeiro goblin."
"A goblin military coat that's been fitted for a hobgoblin, an extra-large, extra-stupid goblin.": "Um casaco militar goblin que foi adaptado para um hobgoblin, um goblin extragrande e extra-estúpido."
"A goblin sandwich. Savory mushrooms topped with spices and stacked between two slices of Goblin Bread.": "Um sanduíche de duende. Cogumelos saborosos cobertos com especiarias e empilhados entre duas fatias de Pão Goblin."
"A goblin scout's business card.": "O cartão de visita de um batedor goblin."
"A goblin soldier's backup weapon. The hilt guard provides protection at the expense of killing power.": "A arma reserva de um soldado goblin. A proteção do punho fornece proteção em detrimento do poder de matar."
"A goblin war mage's business card.": "O cartão de visita de um mago de guerra goblin."
"A goblin warrior's business card.": "O cartão de visita de um guerreiro goblin."
"A golden beer with a slightly bitter taste.": "Uma cerveja dourada com sabor levemente amargo."
"A golden ring etched to resemble a small, long dragon.": "Um anel dourado gravado para lembrar um pequeno e longo dragão."
"A golden ring with a gaudy black Necromancy Gem embedded in it.": "Um anel dourado com uma vistosa Gema de Necromancia preta embutida nele."
"A gorgeous replica of Crea's \"Esoteria\", complete with all 88 hidden symbols. Most noticeable is the three-headed duck in one corner, representing the three states of nature.": "Uma linda réplica da \"Esoteria\" de Crea, completa com todos os 88 símbolos ocultos. O mais notável é o pato de três cabeças num canto, representando os três estados da natureza."
"A grandiose sound comes from this rather hefty lute.": "Um som grandioso vem deste alaúde bastante robusto."
"A greasy snack.": "Um lanche gorduroso."
"A greasy, salty, delicious breakfast.": "Um café da manhã gorduroso, salgado e delicioso."
"A great helmet with great safety features, like extra padding to keep sweat out of your eyes and customized ear-holes to make sure you never miss a thing.": "Um ótimo capacete com ótimos recursos de segurança, como acolchoamento extra para evitar que o suor entre nos olhos e orifícios para as orelhas personalizados para garantir que você nunca perca nada."
"A great skinning knife for expert skinners. (+6 to your effective skill when skinning.)": "Uma ótima faca de esfola para esfoladores experientes. (+6 para sua habilidade efetiva ao esfolar.)"
"A great whittling knife for expert whittlers.": "Uma ótima faca de talhar para talhadores experientes."
"A grindstone for sharpening swords and other large weapons.": "Uma pedra de amolar para afiar espadas e outras armas grandes."
"A grisly paw hacked off of The Mauler.": "Uma pata horrível arrancada do Mauler."
"A gross antique spoon. Not worth much... but perhaps you can find a spoon collector or something.": "Uma colher antiga e nojenta. Não vale muito... mas talvez você consiga encontrar um colecionador de colheres ou algo assim."
"A gross dead scorpion. It's very heavy.": "Um escorpião morto nojento. É muito pesado."
"A gross, sludge-covered ring.": "Um anel grosseiro e coberto de lama."
"A hacked-off piece of a rakshasa's ear.": "Um pedaço cortado da orelha de um rakshasa."
"A hacked-off tail. Grisly.": "Uma cauda cortada. Horrível."
"A hacked-off wing from a Lesser Behemoth. No matter how roughed up it gets, it still quickly regenerates.": "Uma asa cortada de um Behemoth Menor. Não importa o quão difícil fique, ele ainda se regenera rapidamente."
"A hacked-out organ from a bear. Truly disgusting.": "Um órgão recortado de um urso. Verdadeiramente nojento."
"A hand-carved figurine.": "Uma estatueta esculpida à mão."
"A hand-carved spoon made of bone. One the one hand, gross! On the other hand, it's a quality hand-made item, with a certain primitive charm. No, wait. No. It's just gross.": "Uma colher esculpida à mão feita de osso. Por um lado, nojento! Por outro lado, é uma peça artesanal de qualidade, com um certo charme primitivo. Não, espere. Não. É simplesmente nojento."
"A handful of buttons of all shapes and sizes.": "Um punhado de botões de todos os formatos e tamanhos."
"A handful of fragmented animal shells.": "Um punhado de conchas de animais fragmentadas."
"A handful of fresh peppercorns.": "Um punhado de pimenta fresca."
"A handful of long wood nails.": "Um punhado de longos pregos de madeira."
"A handful of magical essence from the fairy dimension. It is used in many fairy creation techniques and can also be consumed directly to restore health and wing luster. (Note: fairy dust is extremely toxic to mortals and should never be consumed by non-fae!)": "Um punhado de essência mágica da dimensão das fadas. É usado em muitas técnicas de criação de fadas e também pode ser consumido diretamente para restaurar a saúde e o brilho das asas. (Nota: o pó de fada é extremamente tóxico para os mortais e nunca deve ser consumido por não-fae!)"
"A handful of magical ice from the fairy dimension.": "Um punhado de gelo mágico da dimensão das fadas."
"A handful of nuts.": "Um punhado de nozes."
"A handful of odorous twinkling flowers. Cute, but a little too gimmicky.": "Um punhado de flores odoríferas e cintilantes. Bonito, mas um pouco enigmático."
"A handful of odorous twinkling flowers. They smell like body odor that's being poorly masked with citrus.": "Um punhado de flores odoríferas e cintilantes. Eles cheiram a odor corporal mal mascarado com frutas cítricas."
"A handful of powdered bone.": "Um punhado de osso em pó."
"A handful of seeds to grow a green pepper bush.": "Um punhado de sementes para cultivar um arbusto de pimenta verde."
"A handful of seeds to grow a hot pepper bush.": "Um punhado de sementes para cultivar um arbusto de pimenta."
"A handful of seeds to grow corn.": "Um punhado de sementes para cultivar milho."
"A handful of seeds to grow some barley grass.": "Um punhado de sementes para cultivar grama de cevada."
"A handful of seeds to grow some moonspelt grass. This only grows at night.": "Um punhado de sementes para cultivar grama lunar. Isso só cresce à noite."
"A handful of seeds to grow some oat grass.": "Um punhado de sementes para cultivar um pouco de aveia."
"A handful of seeds to grow some sugarcane.": "Um punhado de sementes para cultivar cana-de-açúcar."
"A handful of sugar-encrusted gummy blobs. Technically each color has a distinct flavor, but not really.": "Um punhado de gotas de goma incrustadas de açúcar. Tecnicamente, cada cor tem um sabor distinto, mas não exatamente."
"A handful of tasty walnuts.": "Um punhado de nozes saborosas."
"A handful of wood nails.": "Um punhado de pregos de madeira."
"A handkerchief made of leather. Which is to say a terrible handkerchief.": "Um lenço feito de couro. O que quer dizer um lenço terrível."
"A handkerchief.": "Um lenço."
"A hard-hitting book by the goblin poet Kaghat. It approaches the topic of slavery from every angle, and it pulls no punches. It's a very polarizing book in goblin culture. Kaghat herself claims that she was banished from her tribe because of this book, although her tribe vehemently denies this, saying that Kaghat just wandered into the desert one day and never came back.": "Um livro contundente do poeta duende Kaghat. Ele aborda o tema da escravidão de todos os ângulos e não faz rodeios. É um livro muito polarizador na cultura goblin. A própria Kaghat afirma que foi banida de sua tribo por causa deste livro, embora sua tribo negue veementemente isso, dizendo que Kaghat simplesmente vagou pelo deserto um dia e nunca mais voltou."
"A hat designed to be worn by giant bat magicians.": "Um chapéu projetado para ser usado por mágicos morcegos gigantes."
"A hat worn proudly by spiders who have turned their backs on violent ways, and opted instead to embrace pacifism.": "Um chapéu usado com orgulho por aranhas que deram as costas aos métodos violentos e optaram por abraçar o pacifismo."
"A hat you wouldn't be embarrassed being seen in, and so light and protective! Anti-odor components keep it smelling fresh all day, too.": "Um chapéu com o qual você não teria vergonha de ser visto, e tão leve e protetor! Os componentes anti-odor também mantêm o cheiro fresco o dia todo."
"A head covering that begins to combine fashion sense with survival sense.": "Uma cobertura para a cabeça que começa a combinar o sentido de moda com o sentido de sobrevivência."
"A heady mixture of edible mushrooms in a green pepper \"bowl\".": "Uma mistura inebriante de cogumelos comestíveis em uma \"tigela\" de pimentão verde."
"A heaping head of broccoli with the *perfect* amount of salt and butter.": "Uma grande quantidade de brócolis com a quantidade *perfeita* de sal e manteiga."
"A hearty and sweet vegetarian meal.": "Uma refeição vegetariana saudável e doce."
"A hearty breakfast dish.": "Um farto prato de café da manhã."
"A hearty filling bread.": "Um pão farto e recheado."
"A hearty mix of fresh fruit.": "Uma mistura saudável de frutas frescas."
"A hearty soup.": "Uma sopa farta."
"A hearty vegetable medley featuring perfectly-toasted spriggan-vine hearts.": "Uma saudável mistura de vegetais com corações de videira perfeitamente torrados."
"A heavenly snack that is squash-flavored, but in a good way.": "Um lanche paradisíaco com sabor de abóbora, mas no bom sentido."
"A heavy container that's been magically sculpted from stone. It's far too cumbersome to be practical, but it makes a nice curio.": "Um recipiente pesado que foi magicamente esculpido em pedra. É muito complicado para ser prático, mas é uma bela curiosidade."
"A heavy key that looks unused. It's still polished to a shine.": "Uma chave pesada que parece não ser usada. Ainda está polido para brilhar."
"A heavy ring given to Gazluk Keep officers.": "Um anel pesado dado aos oficiais do Forte Gazluk."
"A heavy shield with a strange fae magic.": "Um escudo pesado com uma estranha magia fada."
"A heavy volume of poems by the dwarven master Gammo. It even includes the poem \"My Penis Is The Sunstone\", which has been censored by the Dwarven Culture Group for over 500 years! This is a great find for poetry lovers, though dwarves may find it too embarrassing to own. Less prudish individuals tend to find Gammo's works uplifting and ennervating.": "Um pesado volume de poemas do mestre anão Gammo. Inclui até o poema \"My Penis Is The Sunstone\", que foi censurado pelo Dwarven Culture Group por mais de 500 anos! Este é um ótimo achado para os amantes da poesia, embora os anões possam achar muito embaraçoso possuí-lo. Indivíduos menos puritanos tendem a achar os trabalhos de Gammo edificantes e enervantes."
"A hefty ring engraved with symbols that are probably related to the god Au-Shin.": "Um anel robusto gravado com símbolos que provavelmente estão relacionados ao deus Au-Shin."
"A hefty storage chest. Can only be installed in a guild hall.": "Um baú robusto. Só pode ser instalado em um Guild Hall."
"A hefty storage chest. Can only be installed in a home, and can only be accessed by the homeowner.": "Um baú robusto. Só pode ser instalado em uma residência e só pode ser acessado pelo proprietário."
"A hefty tool that doubles as a deadly weapon.": "Uma ferramenta robusta que também funciona como uma arma mortal."
"A helm made in the signature style of Tremmond Blackhammer, a once-famous dwarven armorsmith.": "Um elmo feito no estilo característico de Tremmond Blackhammer, um outrora famoso armeiro anão."
"A helmet sized for a large sow, with a simple but extremely durable design. It's hard to fathom why this exists, but it does.": "Um capacete dimensionado para uma porca grande, com um design simples mas extremamente durável. É difícil entender por que isso existe, mas existe."
"A helmet that's stylish and also functional! Great.": "Um capacete estiloso e funcional! Ótimo."
"A home-made blended-mushroom \"treat\".": "Uma \"guloseima\" caseira de cogumelos misturados."
"A hoppy beer with hints of spice.": "Uma cerveja lupulada com notas de especiarias."
"A horrible \"candy\" that is technically poisonous: that numb feeling on your tongue? That's the poison. But it's also technically food...": "Um “doce” horrível que é tecnicamente venenoso: aquela sensação de dormência na língua? Esse é o veneno. Mas também é tecnicamente comida..."
"A horrific cotton cap. High quality in every way, but just... ugly.": "Um boné de algodão horrível. Alta qualidade em todos os sentidos, mas simplesmente... feia."
"A horrifically deadly mushroom.": "Um cogumelo terrivelmente mortal."
"A horrifically hacked-off snout.": "Um focinho horrivelmente cortado."
"A horrifically violent compound that can be applied to knives.": "Um composto terrivelmente violento que pode ser aplicado em facas."
"A hot piece of magical crystal.": "Um pedaço quente de cristal mágico."
"A huge dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um enorme dragão revestido de ouro. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A huge dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um enorme dragão revestido de prata. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A huge dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Um enorme dragão. As pessoas que o visualizarem ficarão vagamente inspiradas a criar melhor. Dura 5 minutos depois de implantado."
"A huge gross hippo tooth.": "Um enorme dente de hipopótamo."
"A huge gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um enorme grifo revestido de ouro. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A huge gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um enorme grifo revestido de prata. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A huge gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Um enorme grifo. As pessoas que assistirem a isso ficarão vagamente inspiradas a assassinar melhor. Dura 5 minutos depois de implantado."
"A huge poisonous stinger.": "Um enorme ferrão venenoso."
"A huge sack of Councils.": "Um enorme saco de Conselhos."
"A huge weighted hammer that can only be wielded by mighty warriors. It is said that a minotaur may not criticize their elders until they can wield this hammer -- a task that requires years of training even for that gigantic race.": "Um enorme martelo que só pode ser empunhado por guerreiros poderosos. Diz-se que um minotauro não pode criticar os mais velhos até que eles consigam manejar o martelo – uma tarefa que requer anos de treinamento, mesmo para aquela raça gigantesca."
"A huge weighted warhammer that can only be wielded by mighty warriors. It is said that a minotaur may not criticize their elders until they can wield this hammer -- a task that requires years of training even for that gigantic race.": "Um enorme martelo de guerra que só pode ser empunhado por guerreiros poderosos. Diz-se que um minotauro não pode criticar os mais velhos até que eles consigam manejar o martelo – uma tarefa que requer anos de treinamento, mesmo para aquela raça gigantesca."
"A huge, pointy, surprisingly old-looking bone.": "Um osso enorme, pontudo e surpreendentemente antigo."
"A human dish popular in the Crone Hegemony.": "Um prato humano popular na Hegemonia Crone."
"A human dish popular in the Crone Hegemony. This one is topped with bacon.": "Um prato humano popular na Hegemonia Crone. Este é coberto com bacon."
"A human dish popular in the Crone Hegemony. This one is topped with tofu pretending to be bacon.": "Um prato humano popular na Hegemonia Crone. Este é coberto com tofu fingindo ser bacon."
"A human dish popular in the Crone Hegemony. This version is particularly fancy!": "Um prato humano popular na Hegemonia Crone. Esta versão é particularmente sofisticada!"
"A hunk of glass on a string. It's nothing to look at, but obviously enchanted.": "Um pedaço de vidro preso em um barbante. Não é nada para se olhar, mas obviamente encantado."
"A hypothetical recipe designed by a Gazluk sage. He never tested it due to a lack of kraken parts, so he doesn't know how incredibly vile it smells.": "Uma receita hipotética desenhada por um sábio Gazluk. Ele nunca o testou devido à falta de peças de kraken, então ele não sabe o quão incrivelmente horrível é o cheiro."
"A jaggedly-carved stone block, warm to the touch. Dwarven safety runes indicate that it is explosive, poisonous, and ... there's one other danger symbol that you don't recognize.": "Um bloco de pedra esculpido de forma irregular, quente ao toque. As runas de segurança dos anões indicam que é explosivo, venenoso e... há outro símbolo de perigo que você não reconhece."
"A jar of deadly acid with a grassy smell. It supposedly has many uses ranging from cleaning armor to cooking meals.": "Um pote de ácido mortal com cheiro de grama. Supostamente, ele tem muitos usos, desde limpar armaduras até cozinhar refeições."
"A jar of sticky slime.": "Um pote de gosma pegajosa."
"A jaunty cap with a crowd-pleasing feather. Carefully sculpted to look great, yet give maximum visibility so you aren't caught off-guard.": "Um boné alegre com uma pena que agrada ao público. Cuidadosamente esculpido para ter uma ótima aparência, mas oferece visibilidade máxima para que você não seja pego de surpresa."
"A jerky bite that makes your mouth water just from thinking about it.": "Uma mordida espasmódica que dá água na boca só de pensar nisso."
"A jeweled collar given to a hippogriff by its orcish caretaker.": "Um colar de joias dado a um hipogrifo por seu zelador orc."
"A jumbo version of a normal sparkler. When you strike it against a hard surface it sparkles for a few seconds, and makes you feel extra patriotic.": "Uma versão jumbo de um diamante normal. Quando você bate contra uma superfície dura, ele brilha por alguns segundos e faz você se sentir ainda mais patriótico."
"A keg of Troll's Lip, one of the cheapest and vilest beers in all the Council Lands.": "Um barril de Troll's Lip, uma das cervejas mais baratas e vis de todas as Terras do Conselho."
"A key cut from magical ice.": "Uma chave cortada de gelo mágico."
"A key cut from magical ice. It won't melt until it is used in whatever strange door it's designed for.": "Uma chave cortada de gelo mágico. Ele não derreterá até ser usado em qualquer porta estranha para a qual foi projetado."
"A key for a student's trunk. Ah, the sight of this key takes you back!": "Uma chave para o baú de um estudante. Ah, a visão desta chave leva você de volta!"
"A key formed of dirt, held in place via magic.": "Uma chave formada por terra, mantida no lugar por meio de magia."
"A key that once belonged to a rakshasa named Kimeta.": "Uma chave que pertenceu a um rakshasa chamado Kimeta."
"A knife designed for throwing. (Used with the Knife combat skill.)": "Uma faca projetada para arremessar. (Usado com a habilidade de combate Faca.)"
"A large and convenient saddlebag.": "Um alforje grande e conveniente."
"A large biting beetle. There are probably ways to prepare this for cooking.": "Um grande besouro mordedor. Provavelmente existem maneiras de preparar isso para cozinhar."
"A large block of animal fat.": "Um grande bloco de gordura animal."
"A large boar's tusk.": "Uma grande presa de javali."
"A large brass hook, used in advanced ice-fishing.": "Um grande anzol de latão, usado na pesca avançada no gelo."
"A large caliper designed for measuring the distance between two points on a skull. Used by Phrenologists.": "Um grande paquímetro projetado para medir a distância entre dois pontos em um crânio. Usado por Frenologistas."
"A large cask used for aging wine.": "Um grande barril usado para envelhecer o vinho."
"A large cask used for storing wet and dry goods.": "Um grande barril usado para armazenar produtos secos e úmidos."
"A large chunk of honeycomb from a fae beehive.": "Um grande pedaço de favo de mel de uma colmeia fae."
"A large crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Um grande prisma cristalino. Os transmutadores os usam para guiar o flogisto para dentro ou para fora de um item."
"A large dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um grande dragão revestido de ouro. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A large dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um grande dragão revestido de prata. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A large dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Um grande dragão. As pessoas que o visualizarem ficarão vagamente inspiradas a criar melhor. Dura 5 minutos depois de implantado."
"A large feather from a hippogriff. It's very pretty.": "Uma grande pena de um hipogrifo. É muito bonito."
"A large gear that came out of a very large golem. It's bent and has no obvious purpose.": "Uma grande engrenagem que saiu de um golem muito grande. Está dobrado e não tem nenhum propósito óbvio."
"A large gourd full of sticky bitter mush.": "Uma grande cabaça cheia de mingau amargo e pegajoso."
"A large green crystal. It has been tuned to empower certain weapon-crafting recipes.": "Um grande cristal verde. Ele foi ajustado para capacitar certas receitas de fabricação de armas."
"A large gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um grande grifo revestido de ouro. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A large gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um grande grifo revestido de prata. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A large gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Um grande grifo. As pessoas que assistirem a isso ficarão vagamente inspiradas a assassinar melhor. Dura 5 minutos depois de implantado."
"A large hook-shaped bone. Pretty sharp.": "Um grande osso em forma de gancho. Muito afiado."
"A large knife for cutting meat and organs out of corpses (+5 to your effective skill when Butchering). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Uma faca grande para cortar carne e órgãos de cadáveres (+5 para sua habilidade efetiva ao massacrar). (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A large knife for cutting meat and organs out of corpses (+5% chance for an organ). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Uma faca grande para cortar carne e órgãos de cadáveres (+5% de chance de obter um órgão). (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A large knife for cutting meat and organs out of corpses (+7% chance for an organ). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Uma faca grande para cortar carne e órgãos de cadáveres (+7% de chance de um órgão). (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A large knife for cutting meat and organs out of corpses. (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Uma faca grande para cortar carne e órgãos de cadáveres. (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A large knife for cutting meat and organs out of corpses. It's made of magical ice. (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Uma faca grande para cortar carne e órgãos de cadáveres. É feito de gelo mágico. (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A large mammal heart.": "Um grande coração de mamífero."
"A large metal band used in making casks.": "Uma grande faixa de metal usada na fabricação de barris."
"A large odd egg. Edible if properly prepared.": "Um ovo grande e estranho. Comestível se devidamente preparado."
"A large orange gem with many magical uses. It has been tuned to empower certain glass equipment recipes.": "Uma grande joia laranja com muitos usos mágicos. Ele foi ajustado para capacitar certas receitas de equipamentos de vidro."
"A large pretty piece of pulsing crystal. It's pleasantly warm to the touch.": "Um grande e bonito pedaço de cristal pulsante. É agradavelmente quente ao toque."
"A large scintillating gemstone. Used in magic, it can protect against death.": "Uma grande pedra preciosa cintilante. Usado em magia, pode proteger contra a morte."
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 35 enchantments.)": "Uma grande concha foi forrada com pele de tubarão e rede. É preciso um pouco de prática para lutar com isso!  (Inclui encantamentos aleatórios de nível 35.)"
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 40 enchantments.)": "Uma grande concha foi forrada com pele de tubarão e rede. É preciso um pouco de prática para lutar com isso!  (Inclui encantamentos aleatórios de nível 40.)"
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 45 enchantments.)": "Uma grande concha foi forrada com pele de tubarão e rede. É preciso um pouco de prática para lutar com isso!  (Inclui encantamentos aleatórios de nível 45.)"
"A large sweet fruit.": "Uma grande fruta doce."
"A large unbroken block of high-quality animal fat.": "Um grande bloco ininterrupto de gordura animal de alta qualidade."
"A large, generally-inedible mushroom.": "Um cogumelo grande e geralmente não comestível."
"A large, reasonably discrete Enoyos amulet.": "Um amuleto Enoyos grande e razoavelmente discreto."
"A late chapbook by the elven master Enst. This is quite a find! After his banishment, Enst is said to have only spoken his poems aloud, so that only the treants of the Harshland Forest know his later works. This tome has been written in a very sloppy hand... perhaps a treant wrote it?": "Um livrinho tardio do mestre élfico Enst. Este é um achado! Após seu banimento, diz-se que Enst apenas recitou seus poemas em voz alta, de modo que apenas os entes da Floresta de Harshland conhecem seus trabalhos posteriores. Este tomo foi escrito com uma caligrafia muito desleixada... talvez um ente o tenha escrito?"
"A lead cup with a hefty weight and some cheap jewels on it. As you hold it, it grows unnaturally warm to the touch.": "Uma xícara de chumbo com um grande peso e algumas joias baratas. Conforme você o segura, ele fica anormalmente quente ao toque."
"A leafy branch from a treant. An expert carpenter could easily prepare it for crafting.": "Um galho frondoso de um ente. Um carpinteiro experiente poderia facilmente prepará-lo para a elaboração."
"A leafy green vegetable.": "Um vegetal de folhas verdes."
"A leafy red vegetable.": "Um vegetal com folhas vermelhas."
"A leafy weed. (This item can be used in recipes that call for Mixed Greens.)": "Uma erva daninha frondosa. (Este item pode ser usado em receitas que pedem Verduras Mistas.)"
"A leather cord for tying your hair up in a knot.": "Um cordão de couro para amarrar o cabelo com um nó."
"A leather strap to keep a helmet attached to the wearer's head.": "Uma pulseira de couro para manter o capacete preso à cabeça do usuário."
"A lemony liquid designed to counter the effects of severe Pineal Juice abuse.": "Um líquido cítrico desenvolvido para combater os efeitos do abuso grave do suco de pineal."
"A letter written by Sirine. You're supposed to give it to Yetta in Eltibule.": "Uma carta escrita por Sirine. Você deveria entregá-lo para Yetta em Eltibule."
"A light and tasty snack.": "Um lanche leve e saboroso."
"A light bow designed for precision over power.": "Um arco leve projetado para precisão em vez de potência."
"A light breakfast to start a day of heavy gambling.": "Um café da manhã leve para começar um dia de jogo intenso."
"A light tasty snack of seeds and dried fruit.": "Um lanche leve e saboroso de sementes e frutas secas."
"A lightly fried fish dish.": "Um prato de peixe levemente frito."
"A linen overshirt with magic-empowering properties.": "Uma camiseta de linho com propriedades de fortalecimento mágico."
"A list of gear brought on a long expedition. The paper is very old, but not antique-level old.": "Uma lista de equipamentos trazidos em uma longa expedição. O papel é muito antigo, mas não antigo."
"A little bit of Etana cooked up in a vegetable stew. A taste of when the cook gets cooked!": "Um pouco de Etana cozinhada num ensopado de legumes. Um gostinho de quando o cozinheiro fica cozido!"
"A little doll made of yarn. Kind of creepy.": "Uma bonequinha feita de lã. Meio assustador."
"A little tastier than usual potions, perhaps. (But not good-tasting, to be clear.)": "Poções um pouco mais saborosas do que o normal, talvez. (Mas não é saboroso, para ser claro.)"
"A little thin.": "Um pouco magro."
"A little-known dish from the ranalon of Povus.": "Um prato pouco conhecido do Ranalon de Povus."
"A loaf of enticing, lucious banana bread.": "Um pedaço de pão de banana atraente e delicioso."
"A loaf of warm, moist banana bread.": "Um pedaço de pão de banana quente e úmido."
"A local ratkin dish that's been adjusted for human tastes.": "Um prato local de ratkin ajustado ao gosto humano."
"A local ratkin dish that's been heavily revised for human tastes.": "Um prato local de ratkin que foi fortemente revisado para o gosto humano."
"A long knife held in the off-hand.": "Uma faca longa segurada na mão inábil."
"A long knife held in the off-hand. It was once very sharp, but now not so much.": "Uma faca longa segurada na mão inábil. Já foi muito afiado, mas agora nem tanto."
"A long piece of lovely decorative lace.": "Um longo pedaço de linda renda decorativa."
"A long traditional poem in Ancient Elvish. Nobody speaks Ancient Elvish anymore, least of all elves, so a translation is provided. But the translation is terrible. It's a pity because Ir-Hetsu is the god of song and story, so this <i>should</i> have been a good read.": "Um longo poema tradicional em élfico antigo. Ninguém mais fala élfico antigo, muito menos elfos, então uma tradução é fornecida. Mas a tradução é terrível. É uma pena porque Ir-Hetsu é o deus da música e da história, então esta <i>deveria</i> ter sido uma boa leitura."
"A longbow optimized for long-distance targets.": "Um arco longo otimizado para alvos de longa distância."
"A longbow optimized for quick shots.": "Um arco longo otimizado para tiros rápidos."
"A lotion created by Moxie of the Crafting Caravan in order to make long distance fluttering less stressful when applied directly to the wings. Unfortunately, this formula only works on Fae.": "Uma loção criada por Moxie da Crafting Caravan para tornar a vibração de longa distância menos estressante quando aplicada diretamente nas asas. Infelizmente, esta fórmula só funciona em Fae."
"A love poem from a young man to a young woman. Apparently the young woman's eyes are like hot diamonds, whatever that means.": "Um poema de amor de um jovem para uma jovem. Aparentemente, os olhos da jovem são como diamantes em brasa, seja lá o que isso signifique."
"A lovely and sturdy garment.": "Uma peça linda e resistente."
"A lovely beach scene depicting a gaggle of goblins crowded around a massive talking fish wearing a little hat. You recognize the subject matter: it's the goblin tale of The Bossy Fishlord. Painted by Agzak, a reasonably well-known goblin artist.": "Uma linda cena de praia representando um bando de duendes aglomerados em torno de um enorme peixe falante usando um pequeno chapéu. Você reconhece o assunto: é o conto goblin de The Bossy Fishlord. Pintado por Agzak, um artista duende razoavelmente conhecido."
"A lovely conch that has proven to be resilient and powerful. It's amazing for making magic weapons with!": "Uma linda concha que provou ser resistente e poderosa. É incrível para fazer armas mágicas!"
"A lovely conch that has proven to be resilient and powerful. It's perfect for making magic weapons with!": "Uma linda concha que provou ser resistente e poderosa. É perfeito para fazer armas mágicas!"
"A lovely forgery of \"Snake Widow Lake\" by Hermard Torsitan, the most esteemed living human painter.": "Uma adorável falsificação de \"Snake Widow Lake\", de Hermard Torsitan, o mais estimado pintor humano vivo."
"A lovely navel ring with a tourmaline in it, apparently designed to calm intense anger.": "Um lindo piercing de umbigo com turmalina, aparentemente projetado para acalmar raiva intensa."
"A lovely ring made in a style that's fashionable with the Winter Court.": "Um lindo anel feito em um estilo que está na moda na Corte Invernal."
"A lovely scene. Perhaps it was created by Mirkym -- it has her signature approach to foliage -- but probably just created in the same style by an admirer of her work.": "Uma cena adorável. Talvez tenha sido criado por Mirkym – tem a sua abordagem característica à folhagem – mas provavelmente apenas criado no mesmo estilo por um admirador do seu trabalho."
"A lovely shell that's perfect for bardic performances.": "Uma linda concha perfeita para apresentações de bardo."
"A lovely stuffed toy with joyous cymbal-clashing action. It can be deployed periodically to entertain others.": "Um lindo brinquedo de pelúcia com alegre ação de choque de pratos. Pode ser implantado periodicamente para entreter outras pessoas."
"A lovely weapon, marred perhaps by its unsightly acid-flinging mechanism.": "Uma arma adorável, talvez prejudicada por seu feio mecanismo de lançamento de ácido."
"A low-quality wine that's most useful for cooking.": "Um vinho de baixa qualidade, muito útil para cozinhar."
"A lump from a very large ooze.": "Um caroço de uma gosma muito grande."
"A lump of clay from a deceased golem. This clay was purified and enchanted years ago, but doesn't seem to have any magic in it now.": "Um pedaço de argila de um golem falecido. Esta argila foi purificada e encantada anos atrás, mas não parece conter nenhuma magia agora."
"A lump of flesh from a troll. It automatically regenerates at the same rate that it rots.": "Um pedaço de carne de um troll. Ele se regenera automaticamente na mesma proporção que apodrece."
"A lump of flesh. Very disturbing. Very chewy.": "Um pedaço de carne. Muito perturbador. Muito mastigável."
"A lump of green poisonous ooze.": "Um pedaço de lodo venenoso verde."
"A lump of gummy meat. It's supposedly edible, but only expert gourmands can stomach its squishy grossness.": "Um pedaço de carne gomosa. É supostamente comestível, mas apenas os gourmets experientes podem tolerar sua grossura mole."
"A lump of matted hair.": "Um pedaço de cabelo emaranhado."
"A lump of stinking acidic green ooze.": "Um pedaço de lodo verde ácido e fedorento."
"A lump of wax that can be affixed to the head to provide light. Don't worry: it only looks dangerous because of how dangerous it is.": "Um pedaço de cera que pode ser afixado na cabeça para fornecer luz. Não se preocupe: só parece perigoso por ser tão perigoso."
"A lump of white poisonous ooze.": "Um pedaço de lodo venenoso branco."
"A lumpy stick with protruding thorns around the outside.": "Um pedaço de pau irregular com espinhos salientes na parte externa."
"A luxuriously rich seasonal snack.": "Um lanche sazonal luxuosamente rico."
"A mage's staff with a splash-beaker at the top, perfect for blasting and splashing at the same time.": "Um cajado de mago com um copo de respingos no topo, perfeito para explodir e espirrar ao mesmo tempo."
"A magical bottle that analyzes water. Use it while standing in the center of a pool of water.": "Uma garrafa mágica que analisa a água. Use-o estando no centro de uma piscina de água."
"A magical crystal.": "Um cristal mágico."
"A magical diamond that is flowing with fae power.": "Um diamante mágico que flui com poder feérico."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of a Nightmare.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, transforma sua aparência na de um Pesadelo."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of Lemon Vapors, the special Guide mount.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, ele transforma sua aparência na de Lemon Vapors, a montagem especial do Guia."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the classic prototype mount.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, ele transforma sua aparência na de um protótipo clássico de montagem."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the legendary horse Icemare, writ large.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, ele transforma sua aparência na do lendário cavalo Icemare, em letras grandes."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the legendary horse Icemare.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, transforma sua aparência na do lendário cavalo Icemare."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the mystical horse Pantiflax.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, transforma sua aparência na do cavalo místico Pantiflax."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of Zoomer, the racing-reward horse.": "Um glamour mágico que pode ser aplicado a um cavalo. Quando usado, ele transforma sua aparência na de Zoomer, o cavalo de recompensa de corrida."
"A magical prize given to the first-place horse in the decennial Jamurra Derby.": "Um prêmio mágico dado ao primeiro cavalo no decenal Jamurra Derby."
"A magical scroll that lets you play a word game.": "Um pergaminho mágico que permite jogar um jogo de palavras."
"A magical token that allows access to the lower levels of the Anagoge Records Facility.": "Um token mágico que permite acesso aos níveis inferiores do Anagoge Records Facility."
"A magically enhanced piece of fluorite.": "Um pedaço de fluorita magicamente aprimorado."
"A magically sharp dagger with complex weighting that makes it difficult for neophytes to master. A necromancy gem has been fastened to the handle by its previous owner.": "Uma adaga magicamente afiada com peso complexo que torna difícil para os neófitos dominarem. Uma gema de necromancia foi presa ao cabo por seu proprietário anterior."
"A malformed magical quartz. It's too small (and unpredictable!) to be used in crafting.": "Um quartzo mágico malformado. É muito pequeno (e imprevisível!) para ser usado na elaboração."
"A malformed magical quartz. It's too unpredictable to be used in crafting.": "Um quartzo mágico malformado. É muito imprevisível para ser usado na elaboração."
"A mammal stomach.": "Um estômago de mamífero."
"A mantis invention: watered-down gin, fruit-flavored rum, and 'secret flavorings' which are probably just mint. A casino favorite! ... because it's usually free. (This mixed drink is treated as a beer/wine.)": "Uma invenção do louva-a-deus: gim aguado, rum com sabor de frutas e “aromas secretos” que provavelmente são apenas menta. Um favorito do cassino! ... porque geralmente é gratuito. (Esta bebida mista é tratada como cerveja/vinho.)"
"A map that supposedly leads to a \"war cache\", an underground bunker from before the Sand War.": "Um mapa que supostamente leva a um \"esconderijo de guerra\", um bunker subterrâneo de antes da Guerra das Areias."
"A map that supposedly leads to a huge hoard of treasure buried in the Eltibule region.": "Um mapa que supostamente leva a um enorme tesouro enterrado na região de Eltibule."
"A map that supposedly leads to a huge hoard of treasure buried in the Ilmari Desert.": "Um mapa que supostamente leva a um enorme tesouro enterrado no deserto de Ilmari."
"A map that supposedly leads to a huge hoard of treasure buried or sunken near Sun Vale.": "Um mapa que supostamente leva a um enorme tesouro enterrado ou afundado perto de Sun Vale."
"A map that supposedly leads to a large amount of treasure buried in the Eltibule region.": "Um mapa que supostamente leva a uma grande quantidade de tesouros enterrados na região de Eltibule."
"A map that supposedly leads to a large amount of treasure buried in the Ilmari Desert.": "Um mapa que supostamente leva a uma grande quantidade de tesouros enterrados no deserto de Ilmari."
"A map that supposedly leads to a large amount of treasure buried or sunken near Sun Vale.": "Um mapa que supostamente leva a uma grande quantidade de tesouros enterrados ou afundados perto de Sun Vale."
"A map that supposedly leads to a legendary hoard of treasure buried in the Eltibule region.": "Um mapa que supostamente leva a um lendário tesouro enterrado na região de Eltibule."
"A map that supposedly leads to a legendary hoard of treasure buried in the Ilmari Desert.": "Um mapa que supostamente leva a um lendário tesouro enterrado no deserto de Ilmari."
"A map that supposedly leads to a legendary hoard of treasure buried or sunken near Sun Vale.": "Um mapa que supostamente leva a um lendário tesouro enterrado ou afundado perto de Sun Vale."
"A map that supposedly leads to a small amount of treasure buried in the Eltibule region.": "Um mapa que supostamente leva a um pequeno tesouro enterrado na região de Eltibule."
"A map that supposedly leads to a small amount of treasure buried in the Ilmari Desert.": "Um mapa que supostamente leva a uma pequena quantidade de tesouro enterrado no deserto de Ilmari."
"A map that supposedly leads to a small amount of treasure buried or sunken near Sun Vale.": "Um mapa que supostamente leva a uma pequena quantidade de tesouro enterrado ou afundado perto de Sun Vale."
"A marvelous mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma maravilhosa escolha de mineração de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A marvelous shirt made almost wholly of leather that's soft yet rugged, protective yet breathable. Modern, yet made for the years to come.": "Uma camisa maravilhosa feita quase inteiramente de couro macio, mas resistente, protetora e respirável. Moderno, mas feito para os próximos anos."
"A mask designed to be worn to a masquerade ball. It's enchanted with dark magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está encantado com magia negra."
"A mask designed to be worn to a masquerade ball. It's enchanted with electricity magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está encantado com a magia da eletricidade."
"A mask designed to be worn to a masquerade ball. It's enchanted with fire magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está encantado com magia de fogo."
"A mask designed to be worn to a masquerade ball. It's enchanted with ice magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está encantado com magia de gelo."
"A mask designed to be worn to a masquerade ball. It's enchanted with nature magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está encantado com a magia da natureza."
"A mask designed to be worn to a masquerade ball. It's slightly enchanted with dark magic.": "Uma máscara projetada para ser usada em um baile de máscaras. Está ligeiramente encantado com magia negra."
"A mass of enchanted webbing from a gigantic wind spider. It can be worn as a makeshift hat by the insane.": "Uma massa de teias encantadas de uma gigantesca aranha do vento. Pode ser usado como chapéu improvisado pelos loucos."
"A mass-produced longbow made for infantrymen to use in a bind. Nothing special.": "Um arco longo produzido em massa feito para soldados de infantaria usarem em situações difíceis. Nada de especial."
"A mass-produced replica of Sherig's \"Ovallia\". Tacky and somewhat low-quality, but it's currently popular among the nouveau riche.": "Uma réplica produzida em massa de \"Ovallia\" de Sherig. Cafona e de baixa qualidade, mas atualmente é popular entre os novos ricos."
"A mass-produced shield for non-elite orcs.": "Um escudo produzido em massa para orcs não-elite."
"A massive crystal made up of black and white bands. This particular gem has been tuned to act as an amplifier for certain leatherworking recipes.": "Um enorme cristal composto por faixas pretas e brancas. Esta joia em particular foi ajustada para funcionar como um amplificador para certas receitas de trabalho em couro."
"A masterfully-made throwing knife. (Used with the Knife combat skill.)": "Uma faca de arremesso feita com maestria. (Usado com a habilidade de combate Faca.)"
"A masterpiece dwarven crossbow further augmented by goblin mechanists. \"A kiss from this rose leads to the grave\" is engraved on the side.": "Uma obra-prima de besta anã aprimorada ainda mais por mecanicistas goblins. “Um beijo desta rosa leva ao túmulo” está gravado na lateral."
"A masterpiece in the vein of \"Esoteria\" or \"The Cured Path\", this symbol-laden mess of a painting contains over 400 secret meanings.": "Uma obra-prima no estilo \"Esoteria\" ou \"O Caminho Curado\", esta confusão de pintura carregada de símbolos contém mais de 400 significados secretos."
"A masterpiece of a saddle.": "Uma obra-prima de sela."
"A masterpiece of magical engineering.": "Uma obra-prima da engenharia mágica."
"A masterpiece of wood-nailed-to-cow-hoof design! Comfortable and stylish. Well, stylish for a cow. They have different sensibilities than people.": "Uma obra-prima de design de madeira pregada em casco de vaca! Confortável e elegante. Bem, elegante para uma vaca. Eles têm sensibilidades diferentes das pessoas."
"A masterpiece of wood-nailed-to-deer-hoof design! Comfortable and stylish. Well, stylish for a deer. They have different sensibilities than people.": "Uma obra-prima de design de madeira pregada em casco de veado! Confortável e elegante. Bem, elegante para um cervo. Eles têm sensibilidades diferentes das pessoas."
"A meat-heavy dish, a little greasy but very tasty.": "Um prato com muita carne, um pouco gorduroso mas muito saboroso."
"A meatless meatloaf chock full of flavorful vegetables.": "Um bolo de carne sem carne repleto de vegetais saborosos."
"A mechanism used in large automatons.": "Um mecanismo usado em grandes autômatos."
"A medallion with an abstract design. Perhaps it is mantis claws raised in victory. Or in pain.": "Um medalhão com desenho abstrato. Talvez sejam as garras do louva-a-deus erguidas em vitória. Ou com dor."
"A medium dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um dragão médio revestido de ouro. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A medium dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um dragão médio revestido de prata. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A medium dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Um dragão médio. As pessoas que o visualizarem ficarão vagamente inspiradas a criar melhor. Dura 5 minutos depois de implantado."
"A medium gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um grifo médio revestido de ouro. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A medium gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um grifo médio revestido de prata. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A medium gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Um grifo médio. As pessoas que assistirem a isso ficarão vagamente inspiradas a assassinar melhor. Dura 5 minutos depois de implantado."
"A medium-body beer with a malty flavor.": "Uma cerveja de corpo médio com sabor maltado."
"A medium-sized crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Um prisma cristalino de tamanho médio. Os transmutadores os usam para guiar o flogisto para dentro ou para fora de um item."
"A memento with some kind of important history tied to it. If you're knowledgeable enough, you can inspect it more closely for helpful clues.": "Uma lembrança com algum tipo de história importante ligada a ela. Se você tiver conhecimento suficiente, poderá inspecioná-lo mais de perto em busca de pistas úteis."
"A metal band used in making casks.": "Uma faixa de metal usada na fabricação de barris."
"A metal clamp used by toolmakers and weaponsmiths.": "Uma braçadeira de metal usada por fabricantes de ferramentas e ferreiros."
"A metal frame for attaching a torch to a wall.": "Uma estrutura de metal para fixar uma tocha na parede."
"A metal key from Gravamux, a ghoul.": "Uma chave de metal de Gravamux, um ghoul."
"A metal mesh, useful for cages, filters, and similar systems.": "Uma malha metálica, útil para gaiolas, filtros e sistemas similares."
"A metal ring with a beautifully-cut vervadium centerpiece. It glows a soft purple.": "Um anel de metal com uma peça central de vervádio lindamente cortada. Ele brilha em um roxo suave."
"A metal tube with a closeable valve. Used on alcohol barrels to make them easier to use. It is not reusable.": "Um tubo de metal com uma válvula que pode ser fechada. Usado em barris de álcool para facilitar o uso. Não é reutilizável."
"A mid-sized cask used for food and drink production.": "Um barril de tamanho médio usado para produção de alimentos e bebidas."
"A mildly perfumed wax that helps ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Uma cera levemente perfumada que ajuda a garantir o sucesso do acasalamento com abelhas ou vespas. (Para usar, dê a uma abelha ou vespa de estimação por meio da interface do Estável. O efeito dura até que o animal de estimação seja usado em uma tentativa de reprodução. Um animal de estimação só pode usar uma cera por vez; usar outra cera substitui a primeira.)"
"A mildly poisonous toadstool which can be eaten after boiling.": "Um cogumelo venenoso levemente venenoso que pode ser consumido após fervura."
"A military dagger used as a close-quarters weapon by some armies in the Crone Hegemony.": "Uma adaga militar usada como arma de combate corpo a corpo por alguns exércitos da Hegemonia Crone."
"A milky substance that alters your brain's reflexes, allowing you to punt spiders, scorpions and other arthropods away from you.": "Uma substância leitosa que altera os reflexos do seu cérebro, permitindo que você afaste aranhas, escorpiões e outros artrópodes."
"A mineral made mostly of ectoplasm. It shouldn't be used in crafting.": "Um mineral feito principalmente de ectoplasma. Não deve ser usado em artesanato."
"A mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Uma escolha de mineração de origem orc. Semelhante a uma Picareta de Mineração Orc tradicional, mas com um dispositivo rotacional acelerado para permitir uma melhor mineração por meio de facadas."
"A mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma escolha de mineração de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A miniscule version of a Hate Pearl. This one is too small to be used in crafting, but perhaps it could be combined into a larger one via magic.": "Uma versão minúscula de uma Pérola do Ódio. Este é pequeno demais para ser usado na elaboração, mas talvez pudesse ser combinado em um maior por meio de magia."
"A mint leaf.": "Uma folha de hortelã."
"A minty, sugary treat.": "Uma delícia mentolada e açucarada."
"A mirror on a chain with a subtle illusion. Enemies briefly see you as being far more beautiful than you are, then suddenly perceive you as being far uglier than reality. It's pretty unnerving.": "Um espelho preso a uma corrente com uma ilusão sutil. Os inimigos brevemente vêem você como sendo muito mais bonito do que você é, e de repente percebem que você é muito mais feio do que a realidade. É muito enervante."
"A mixture of grains to keep your birds fat, happy and energized.": "Uma mistura de grãos para manter seus pássaros gordos, felizes e com energia."
"A modest silver medallion of elven design. It helps one focus on their problems.": "Um modesto medalhão de prata de desenho élfico. Ajuda a focar em seus problemas."
"A modest silver medallion of elven design. It helps turn words into weapons so you can get what you want.": "Um modesto medalhão de prata de desenho élfico. Ajuda a transformar palavras em armas para que você consiga o que deseja."
"A more complex kind of bait that can be used with angling.": "Um tipo de isca mais complexo que pode ser usado na pesca."
"A mostly-used-up candle made of lard.": "Uma vela quase toda usada feita de banha."
"A multi-tool embossed with the face of a smiling cartoon elf. The skinning and butchering tools seems decent, but the other tools would break if you tried to use them. (Keep in your inventory to allow skinning and butchering of corpses. +3 to your effective skinning/butchering skill.)": "Uma multiferramenta com o rosto de um elfo sorridente de desenho animado em relevo. As ferramentas de esfolar e cortar parecem decentes, mas as outras ferramentas quebrariam se você tentasse usá-las. (Mantenha em seu inventário para permitir esfolar e massacrar cadáveres. +3 para sua habilidade efetiva de esfolar/massacrar.)"
"A mushroom that grows in high-ectoplasmic areas.": "Cogumelo que cresce em áreas com alto ectoplasma."
"A mushy fruit paste that can be eaten as a snack.": "Uma pasta pastosa de frutas que pode ser consumida como lanche."
"A musical instrument made of ram's horn.": "Instrumento musical feito de chifre de carneiro."
"A musky elvish perfume currently in vogue in Verta. Its complex scent can mask dirt and odors even from cleanliness-loving elves.": "Um perfume élfico almiscarado atualmente em voga em Verta. Seu perfume complexo pode mascarar sujeira e odores até mesmo de elfos amantes da limpeza."
"A musty tome of poetry from the dwarven master Gammo. It has both the original Dwarven rhyming couplets and a Human translation. Perfect for the poetry lover in your life.": "Um livro bolorento de poesia do mestre anão Gammo. Possui os dísticos rimados originais dos Anões e uma tradução humana. Perfeito para o amante da poesia em sua vida."
"A musty tome. Looks tedious, if you judge it by its cover.": "Um livro bolorento. Parece tedioso, se você julgar pela capa."
"A nature scene with an incredible level of detail.": "Uma cena da natureza com um nível de detalhe incrível."
"A necklace depicting the warm sun, one of the symbols of Arisetsu.": "Um colar representando o sol quente, um dos símbolos de Arisetsu."
"A necklace depicting the warm sun, one of the symbols of Arisetsu. This variety was mass-produced for use by Council priests, and was probably lost during the War of Rahu.": "Um colar representando o sol quente, um dos símbolos de Arisetsu. Esta variedade foi produzida em massa para uso pelos sacerdotes do Conselho e provavelmente foi perdida durante a Guerra de Rahu."
"A net designed to catch and contain Rose-mourning butterflies. (Keep this in your inventory when harvesting the butterflies to capture them alive.)": "Uma rede projetada para capturar e conter borboletas de luto pelas rosas. (Mantenha isso em seu inventário ao colher as borboletas para capturá-las vivas.)"
"A new sword made in a very old dwarven style. It has a glyph that must be the Eltibule crest.": "Uma nova espada feita num estilo anão muito antigo. Tem um glifo que deve ser o brasão de Eltibule."
"A nice belt with lots of little pockets.": "Um belo cinto com muitos bolsos pequenos."
"A nice blend of sweetness and mintiness.": "Uma bela mistura de doçura e menta."
"A nice cowl.": "Um belo capuz."
"A nice filling meal.": "Uma boa refeição recheada."
"A nice fresh loaf, filled with nuts. It's extremely dense bread and very filling.": "Um belo pão fresco, recheado com nozes. É um pão extremamente denso e muito recheado."
"A nice fresh loaf. It's a dense and filling bread.": "Um belo pão fresco. É um pão denso e farto."
"A nice round gourd full of mushy stuff.": "Uma bela cabaça redonda cheia de coisas moles."
"A nice-looking saddle. It's a little pinchy and underpadded, but better than nothing!": "Uma sela bonita. É um pouco apertado e pouco acolchoado, mas melhor que nada!"
"A note addressed to you.": "Uma nota dirigida a você."
"A novice-quality piece of work, with embarrassingly wide stitches.": "Um trabalho de qualidade para iniciantes, com pontos embaraçosamente largos."
"A nuanced and complex sauce that is so good, it overshadows most meats that you might want to pair it with. When you have an amazing main dish and need an amazing sauce, this is it.": "Um molho complexo e cheio de nuances que é tão bom que ofusca a maioria das carnes com as quais você pode querer combiná-lo. Quando você tem um prato principal incrível e precisa de um molho incrível, é isso."
"A nuanced and tasty version of the classic human treat.": "Uma versão matizada e saborosa do clássico deleite humano."
"A pack full of extremely small woman's clothing, plus blankets and some costume jewelry.": "Um pacote cheio de roupas femininas extremamente pequenas, além de cobertores e algumas bijuterias."
"A packet of strange chemicals wrapped in a leaf. It's said that some sentient animals find this drug irresistible.": "Um pacote de produtos químicos estranhos embrulhado numa folha. Diz-se que alguns animais sencientes consideram esta droga irresistível."
"A packet of strange chemicals wrapped in a leaf. While it has minor benefits, its primary use is to cure Bounceweed hangovers. It can also temporarily relieve the symptoms of Bounceweed abuse. Calmweed is not addictive.": "Um pacote de produtos químicos estranhos embrulhado numa folha. Embora tenha benefícios menores, seu uso principal é curar ressacas de Bounceweed. Também pode aliviar temporariamente os sintomas do abuso de Bounceweed. Calmweed não é viciante."
"A pair of cloth gloves.": "Um par de luvas de pano."
"A pair of invisible gloves, for protecting your hands while still showing them off. Useful in glamouring.": "Um par de luvas invisíveis, para proteger as mãos e ao mesmo tempo exibi-las. Útil no glamour."
"A pair of invisible pants, so when you are inevitably kicked out of establishments you can still tell all of your friends that you were technically wear pants. Useful in glamouring.": "Um par de calças invisíveis, para que, quando você for inevitavelmente expulso dos estabelecimentos, ainda possa dizer a todos os seus amigos que, tecnicamente, você usava calças. Útil no glamour."
"A pair of mittens made of yarn. These are just too ridiculously bad to be worn.": "Um par de luvas feitas de lã. Estes são ridiculamente ruins para serem usados."
"A pair of old cloth shoes that are much, <i>much</i> tougher than they look.": "Um par de sapatos velhos de pano que são muito, muito mais resistentes do que parecem."
"A pair of simple boots. Echur says that they help one connect with the world around them, whatever that means.": "Um par de botas simples. Echur diz que eles ajudam a pessoa a se conectar com o mundo ao seu redor, seja lá o que isso signifique."
"A pair of yarn socks.": "Um par de meias de lã."
"A palm-sized chunk of hardened dinosaur hide.": "Um pedaço de pele de dinossauro endurecida do tamanho da palma da mão."
"A pant-shaped conglomeration of plant material. Sometimes a bit of moss is exposed, but they mostly work great.": "Um conglomerado de material vegetal em forma de calça. Às vezes, um pouco de musgo fica exposto, mas na maioria das vezes funciona muito bem."
"A paradoxically paradoxical staff.": "Uma equipe paradoxalmente paradoxal."
"A particularly flat species of sea urchin. These shells are used as currency by the Ranalon.": "Uma espécie de ouriço-do-mar particularmente plana. Essas conchas são usadas como moeda pelos Ranalon."
"A particularly supple elven-style hunting bow.": "Um arco de caça de estilo élfico particularmente flexível."
"A particularly vividly-colored painclover. It seems ... About as toxic as the usual kind.": "Um analgésico de cores particularmente vivas. Parece... Tão tóxico quanto o normal."
"A party bowl of disgusting substances. Anyone who drinks it becomes violently ill... with emphasis on the <i>violent</i>.": "Uma tigela de festa com substâncias nojentas. Quem bebe fica gravemente doente... com destaque para os <i>violentos</i>."
"A patch of flesh and fur torn from a barghest.": "Um pedaço de carne e pêlo arrancado de um barghest."
"A pebble found on a yeti.": "Uma pedra encontrada em um Yeti."
"A peeled and de-veined shrimp, ready for cooking. It's also delicious raw.": "Camarão descascado e sem veias, pronto para cozinhar. Também é delicioso cru."
"A pendant blessed in the name of Arisetsu. It depicts the sun's power.": "Um pingente abençoado em nome de Arisetsu. Representa o poder do sol."
"A percussion instrument. Unfortunately it seems this one's been tuned to a hypersonic audio range... it doesn't sound pleasant to you!": "Um instrumento de percussão. Infelizmente parece que este foi ajustado para uma faixa de áudio hipersônica... não parece agradável para você!"
"A perfect candle wick.": "Um pavio de vela perfeito."
"A perfect skinning knife for master skinners. (+10 to your effective skill when skinning.)": "Uma faca de esfola perfeita para mestres esfoladores. (+10 para sua habilidade efetiva ao esfolar.)"
"A perfect skinning knife for master skinners. (+12 to your effective skill when skinning.)": "Uma faca de esfola perfeita para mestres esfoladores. (+12 para sua habilidade efetiva ao esfolar.)"
"A perfect skinning knife for master skinners. (+8 to your effective skill when skinning.)": "Uma faca de esfola perfeita para mestres esfoladores. (+8 para sua habilidade efetiva ao esfolar.)"
"A perfect whittling knife for master whittlers.": "Uma faca de talhar perfeita para mestres talhadores."
"A perfectly clear, sweet-smelling liquid.": "Um líquido perfeitamente límpido e de cheiro adocicado."
"A perfectly edible fish dish, if a bit uninspired.": "Um prato de peixe perfeitamente comestível, embora um pouco pouco inspirado."
"A perfectly weighted arrow with potent broadheads and excellent accuracy.": "Uma flecha com peso perfeito, pontas largas potentes e excelente precisão."
"A perfectly weighted arrow with potent broadheads and excellent accuracy. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha com peso perfeito, pontas largas potentes e excelente precisão. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A perfectly weighted arrow with quality fletching and supernatural accuracy.": "Uma flecha perfeitamente ponderada com penas de qualidade e precisão sobrenatural."
"A perfectly weighted arrow with quality fletching and supernatural accuracy. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha perfeitamente ponderada com penas de qualidade e precisão sobrenatural. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A petrified glass tube made when lightning strikes sand. Alchemists love these, and fletchers use them for some advanced arrows.": "Um tubo de vidro petrificado feito quando um raio atinge a areia. Os alquimistas adoram isso, e os flechadores os usam para algumas flechas avançadas."
"A pickled fish with an interesting taste.": "Um peixe em conserva com um sabor interessante."
"A pie so good that it would be foolish to eat it as just a dessert. Eat it as a meal.": "Uma torta tão boa que seria tolice comê-la apenas como sobremesa. Coma como uma refeição."
"A piece of an old clay pot. It might fetch a few coins from a vendor if you make up a history for this piece of junk.": "Um pedaço de um velho pote de barro. Pode render algumas moedas de um vendedor se você inventar uma história para esse lixo."
"A piece of arm machinery from a large ancient golem.": "Uma peça de maquinaria de braço de um grande golem antigo."
"A piece of enchanted cloth from a mummy.": "Um pedaço de pano encantado de uma múmia."
"A piece of metal covered in a grid of holes. It is used by flower arrangers.": "Um pedaço de metal coberto por uma grade de buracos. É usado por arranjadores de flores."
"A piece of metal that's especially strong.": "Um pedaço de metal especialmente forte."
"A piece of paper that says \"This document is worth 1 (one) Sir Johnson Buck, redeemable at participating commissaries. Sir Johnson retains the right to confiscate this document if he thinks you stole it.\" Beneath the impeccably-handwritten note is an illegible scrawl that you assume is Sir Johnson's signature.": "Um pedaço de papel que diz \"Este documento vale 1 (um) Sir Johnson Buck, resgatável nos comissários participantes. Sir Johnson reserva-se o direito de confiscar este documento se achar que você o roubou.\" Abaixo da nota impecavelmente manuscrita há um rabisco ilegível que você presume ser a assinatura de Sir Johnson."
"A piece of quartz that is partially anchored in another dimension. Being semi-intangible, it is a poor choice for crafting.": "Um pedaço de quartzo parcialmente ancorado em outra dimensão. Por ser semi-intangível, é uma má escolha para elaboração."
"A pile of bones wrapped in twine. Smells smokey.": "Uma pilha de ossos enrolados em barbante. Cheira a fumaça."
"A pile of femurs that have been positioned in a very specific way. What's it for? Eh, who cares... probably not important.": "Uma pilha de fêmures que foram posicionados de uma forma muito específica. Para que serve? Eh, quem se importa... provavelmente não é importante."
"A pile of flaked Blusher mushrooms.": "Uma pilha de cogumelos Blusher em flocos."
"A pile of flaked Boletus mushroom bits.": "Uma pilha de pedaços de cogumelo Boletus em flocos."
"A pile of flaked charged myceliums.": "Uma pilha de micélios carregados em flocos."
"A pile of flaked Field mushrooms.": "Uma pilha de cogumelos de campo em flocos."
"A pile of flaked granamurch mushrooms.": "Uma pilha de cogumelos granamurch em flocos."
"A pile of flaked Mycena mushroom bits.": "Uma pilha de pedaços de cogumelo Mycena em flocos."
"A pile of flaked Parasol mushroom bits.": "Uma pilha de pedaços de cogumelo Parasol em flocos."
"A pile of flaky rock. What could this be for?": "Uma pilha de pedras escamosas. Para que serviria isso?"
"A pile of flavored black foot morel mushrooms.": "Uma pilha de cogumelos morel pretos com sabor."
"A pile of flavored porcini mushrooms.": "Uma pilha de cogumelos porcini aromatizados."
"A pile of fly amanita flakes. These are only the normal level of fatal when eaten (which is still 100%, but lower than some other mushrooms).": "Uma pilha de flocos de amanita mosca. Estes são apenas o nível normal de mortalidade quando comidos (que ainda é 100%, mas inferior ao de alguns outros cogumelos)."
"A pile of fragrant incense.": "Uma pilha de incenso perfumado."
"A pile of pixie's parasol flakes. Quite magical and very poisonous.": "Uma pilha de flocos de guarda-sol de duende. Bastante mágico e muito venenoso."
"A pile of powdered Blood mushrooms.": "Uma pilha de cogumelos de sangue em pó."
"A pile of powdered Coral mushrooms.": "Uma pilha de cogumelos Coral em pó."
"A pile of powdered Groxmax mushrooms.": "Uma pilha de cogumelos Groxmax em pó."
"A pile of powdered Iocaine mushrooms. This is a deadly toxin to almost all life forms.": "Uma pilha de cogumelos Iocaína em pó. Esta é uma toxina mortal para quase todas as formas de vida."
"A pile of powdered Milk Cap mushrooms.": "Uma pilha de cogumelos Milk Cap em pó."
"A pile of sugar.": "Uma pilha de açúcar."
"A plain but tasty loaf of sourdough.": "Um pão de massa fermentada simples, mas saboroso."
"A plain stick topped with a necromancy gem. Also works for Fire Magic and Staff Fighting.": "Um bastão simples coberto com uma gema de necromancia. Também funciona para Fire Magic e Staff Fighting."
"A plantable basil seedling.": "Uma muda plantável de manjericão."
"A plantable beet seedling.": "Uma muda de beterraba plantável."
"A plantable broccoli seedling.": "Uma muda de brócolis plantável."
"A plantable cabbage leafling.": "Uma folhagem de repolho plantável."
"A plantable cantaloupe vine.": "Uma videira de melão plantável."
"A plantable carrot seedling.": "Uma muda de cenoura plantável."
"A plantable escarole seedling.": "Uma muda de escarola plantável."
"A plantable lettuce seedling.": "Uma muda de alface plantável."
"A plantable onion seedling.": "Uma muda de cebola plantável."
"A plantable pea plant.": "Uma planta de ervilha plantável."
"A plantable potato seedling. So easy that anyone can plant it!": "Uma muda de batata plantável. Tão fácil que qualquer um pode plantar!"
"A plantable pumpkin seedling.": "Uma muda de abóbora plantável."
"A plantable squash seedling.": "Uma muda de abóbora plantável."
"A plantable tomato seedling.": "Uma muda de tomate plantável."
"A plate-like protrusion from a carnivine.": "Uma saliência em forma de placa de uma carnivina."
"A pleasant baked dish with odds and ends.": "Um prato assado agradável com bugigangas."
"A pleasant beer that strongly takes on the characteristics of its flavoring ingredients.": "Uma cerveja agradável que assume fortemente as características dos seus ingredientes aromatizantes."
"A pleasant biscuit with a rustic, nutty flavor.": "Um biscoito agradável com sabor rústico a nozes."
"A pleasant cold beverage.": "Uma bebida gelada e agradável."
"A pleasant dessert wine.": "Um agradável vinho de sobremesa."
"A pleasant portrayal of an inn in an idyllic setting, signed by Samantha Tallow.": "Um agradável retrato de uma pousada em um cenário idílico, assinado por Samantha Tallow."
"A plucked chicken.": "Uma galinha depenada."
"A plucked-out eyeball from a Demon Overseer. If you look directly at it, you can hear it psychically issuing you orders to return it to its owner's head.": "Um globo ocular arrancado de um Supervisor Demônio. Se você olhar diretamente para ele, poderá ouvi-lo emitindo ordens psíquicas para devolvê-lo à cabeça de seu dono."
"A plucked-out eyeball from a Demon Scout. Even in death, it gives you an eerie feeling of being watched.": "Um globo ocular arrancado de um Demon Scout. Mesmo na morte, você tem uma sensação estranha de estar sendo observado."
"A plump ripe guava.": "Uma goiaba madura e rechonchuda."
"A poem written by a loved-one for a deceased family member, following an old Human custom. Since funerals are the only time these Humans ever wrote poetry in their lives, the quality is... not good.": "Um poema escrito por um ente querido para um familiar falecido, seguindo um antigo costume humano. Como os funerais são a única ocasião em que esses Humanos escreveram poesia em suas vidas, a qualidade é... nada boa."
"A pointy weed. (This item can be used in recipes that call for Mixed Greens.)": "Uma erva pontiaguda. (Este item pode ser usado em receitas que pedem Verduras Mistas.)"
"A poisoner's blade that's seen better days.": "A lâmina de um envenenador que já viu dias melhores."
"A ponderous volume wherein an anonymous rakshasa mage explores the idea that the 'old' rakshasa form is somehow still locked within each 'new' rakshasa body. The author posits that certain potions might do the trick, and then explores numerous alchemical hypotheses, none of which pan out too well, but one complex recipe catches your eye.": "Um volume pesado onde um mago rakshasa anônimo explora a ideia de que a 'velha' forma rakshasa ainda está de alguma forma trancada dentro de cada 'novo' corpo rakshasa. O autor postula que certas poções podem resolver o problema e, em seguida, explora inúmeras hipóteses alquímicas, nenhuma das quais dá certo, mas uma receita complexa chama sua atenção."
"A poor piece of clothing,  but it does at least blend into the surroundings well.": "Uma peça de roupa pobre, mas pelo menos combina bem com o ambiente."
"A poor rendition of a dragon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um dragão, coberto de ouro. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a dragon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um dragão, coberto de prata. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a dragon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Uma péssima representação de um dragão. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 5 minutos depois de implantado."
"A poor rendition of a gryphon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um grifo, coberto de ouro. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a gryphon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um grifo, coberto de prata. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a gryphon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Uma versão pobre de um grifo. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 5 minutos depois de implantado."
"A poor-quality bonnet. It's much too embarrassing to wear.": "Um capô de má qualidade. É muito embaraçoso de usar."
"A popular orcish drug that overcharges your brainstem. That sounds horrifying, and it kind of is, but this low dose generally has few side-effects.": "Uma droga orc popular que sobrecarrega seu tronco cerebral. Isso parece horrível, e até é, mas essa dose baixa geralmente tem poucos efeitos colaterais."
"A popular orcish drug that overcharges your brainstem. This advanced purified version of the drug is quite strong.": "Uma droga orc popular que sobrecarrega seu tronco cerebral. Esta versão purificada avançada da droga é bastante forte."
"A popular Statehelm beverage for busy individuals who need to focus.": "Uma bebida popular da Statehelm para indivíduos ocupados que precisam se concentrar."
"A popular Statehelm hedge ointment for curing hangovers, which it does a terrible job at. But it does help other sorts of headaches.": "Uma popular pomada Statehelm para curar ressacas, na qual faz um péssimo trabalho. Mas ajuda outros tipos de dores de cabeça."
"A porous sticky cloth that's useful for some basic garments.": "Um pano poroso e pegajoso que é útil para algumas roupas básicas."
"A portrait of a red-robed mage with a trained battle-rat. The mage is crying over a mug of spilled beer. There are no shields present in the picture. (Artist unknown.)": "Um retrato de um mago vestido de vermelho com um rato de batalha treinado. O mago está chorando por causa de uma caneca de cerveja derramada. Não há escudos presentes na imagem. (Artista desconhecido.)"
"A portrait of Khyrulek's young daughter. She's a pale Human child, no more than five years old, and she looks miserable.": "Um retrato da filha de Khyrulek. Ela é uma criança Humana pálida, não tem mais de cinco anos de idade, e parece infeliz."
"A pot-holder to protect your hands when moving a hot kettle.": "Um porta-panelas para proteger as mãos ao mover uma chaleira quente."
"A potent acid for removing inscriptions on items.": "Um ácido potente para remover inscrições em itens."
"A potent chemistry tool -- or weapon. Yeah, let's go with weapon.": "Uma poderosa ferramenta química – ou arma. Sim, vamos com a arma."
"A potent drink that's popular among poor humans of the Crone Hegemony. (Actual Crones drink much higher-quality stuff.) This can warm you up on a cold day!": "Uma bebida potente que é popular entre os humanos pobres da Hegemonia Crone. (As Crones reais bebem coisas de qualidade muito superior.) Isso pode aquecê-lo em um dia frio!"
"A potent dwarven rune.": "Uma poderosa runa anã."
"A potent mixture of magical blood.": "Uma potente mistura de sangue mágico."
"A potent weapon used by Leafmasters, Stormmasters, and other guardians of elven society.": "Uma arma potente usada por Leafmasters, Stormmasters e outros guardiões da sociedade élfica."
"A potentially edible mushroom.": "Um cogumelo potencialmente comestível."
"A powerful flavor used by master chefs.": "Um sabor poderoso usado por master chefs."
"A powerful pick-me-up for rabbits in danger.": "Um poderoso estimulante para coelhos em perigo."
"A practice tool used by bards during their studies.": "Uma ferramenta prática usada pelos bardos durante seus estudos."
"A prefectly-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma picareta de mineração orc feita com perfeição. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A pretty basic fish meal. Does it really matter what fish is in it?": "Uma refeição de peixe bastante básica. Realmente importa que peixe contém?"
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to bats when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com morcegos quando usada na fabricação."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to cattle when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com o gado quando usada na elaboração."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to pigs when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com porcos quando usada na elaboração."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to rabbits when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com coelhos quando usada na elaboração."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to spiders when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com aranhas quando usada na fabricação."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to the needs of deer when used in crafting.": "Uma joia bem grande com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com as necessidades dos cervos quando usada na fabricação."
"A pretty blue mushroom. Some believe the name comes from its vague resemblance to a wizard's hat, while others believe it's due to the tendency for the mushrooms to explode into freezing electricity when touched.": "Um lindo cogumelo azul. Alguns acreditam que o nome vem de sua vaga semelhança com o chapéu de um bruxo, enquanto outros acreditam que é devido à tendência dos cogumelos explodirem em eletricidade congelante quando tocados."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to bats when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com morcegos quando usada na fabricação."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to cattle when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com o gado quando usada na elaboração."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to pigs when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com porcos quando usada na elaboração."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to rabbits when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com coelhos quando usada na elaboração."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to spiders when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com aranhas quando usada na fabricação."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to the needs of deer when used in crafting.": "Uma linda joia com faixas verdes escuras, é conhecida por auxiliar na comunicação mágica. Esta gema em particular foi infundida com uma runa que a sintoniza com as necessidades dos cervos quando usada na fabricação."
"A pretty mushroom that's quite toxic unless it's specially prepared.": "Um lindo cogumelo que é bastante tóxico, a menos que seja especialmente preparado."
"A primer on Combat Psychology. (Raises your skill to 1 if you don't know Combat Psychology.)": "Uma cartilha sobre Psicologia do Combate. (Aumenta sua habilidade para 1 se você não conhece Psicologia de Combate.)"
"A prism that has been inscribed with weird symbols. You don't think it would be useful for regular prism-related activities.": "Um prisma que foi inscrito com símbolos estranhos. Você não acha que seria útil para atividades regulares relacionadas ao prisma."
"A pro made this leather armor, and aside from some unusual choices in tailoring, there's not much to complain about.": "Um profissional fez esta armadura de couro e, além de algumas escolhas incomuns de alfaiataria, não há muito do que reclamar."
"A pro-quality racing saddle.": "Um selim de corrida de qualidade profissional."
"A professional-grade broadsword made for slicing and injuring.": "Uma espada larga de nível profissional feita para cortar e ferir."
"A professional-grade military dirk.": "Um punhal militar de nível profissional."
"A professional-grade military knife.": "Uma faca militar de nível profissional."
"A professional-looking staff with fire magic and priestly runes etched into it.": "Uma equipe de aparência profissional com magia de fogo e runas sacerdotais gravadas nela."
"A professional-looking winter coat with heavy insulation.": "Um casaco de inverno com aparência profissional e isolamento pesado."
"A protective garment that also keeps you light on your feet. The goblin smell, unfortunately, doesn't wash out.": "Uma peça de roupa protetora que também mantém os pés leves. O cheiro do duende, infelizmente, não desaparece."
"A psychic enhancement that lets you harness your formidable skeletal knowledge into a weapon. Tastes like chalk.": "Um aprimoramento psíquico que permite que você transforme seu formidável conhecimento esquelético em uma arma. Tem gosto de giz."
"A pumpkin carved with a scary octopus face.": "Uma abóbora esculpida com uma cara de polvo assustadora."
"A pumpkin carved with a silly owl face.": "Uma abóbora esculpida com uma cara de coruja boba."
"A pumpkin-shaped gourd full of inedible mush. Perhaps it has non-culinary uses?": "Uma cabaça em forma de abóbora cheia de papa não comestível. Talvez tenha usos não culinários?"
"A pungent perfume that rakshasa find irresistable, but most other races find rather displeasant. (Orcs generally tolerate the smell well, and some even like it.) The perfume smells faintly of raw meat, cinnamon, and daisies.": "Um perfume pungente que os rakshasa consideram irresistível, mas que a maioria das outras raças consideram bastante desagradável. (Orcs geralmente toleram bem o cheiro, e alguns até gostam dele.) O perfume tem um leve cheiro de carne crua, canela e margaridas."
"A pungent smelling wax that helps ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Uma cera de cheiro pungente que ajuda a garantir o sucesso do acasalamento com abelhas ou vespas. (Para usar, dê a uma abelha ou vespa de estimação por meio da interface do Estável. O efeito dura até que o animal de estimação seja usado em uma tentativa de reprodução. Um animal de estimação só pode usar uma cera por vez; usar outra cera substitui a primeira.)"
"A purple flower with a woody, unpleasant odor. Even the scent can make one ill, and every part of the plant is toxic. It is used in Alchemy to create poisons that are especially effective against wolves and lycanthropes.": "Flor roxa com odor amadeirado e desagradável. Até o cheiro pode deixar alguém doente, e todas as partes da planta são tóxicas. É usado na Alquimia para criar venenos que são especialmente eficazes contra lobos e licantropos."
"A quality skinning knife for experienced skinners. (+4 to your effective skill when skinning.)": "Uma faca de esfola de qualidade para esfoladores experientes. (+4 para sua habilidade efetiva ao esfolar.)"
"A quality whittling knife for experienced whittlers.": "Uma faca de talhar de qualidade para talhadores experientes."
"A raffler with all standard options, plus the ability to attune the items to the winner. For admin use.": "Um sorteador com todas as opções padrão, além da possibilidade de sintonizar os itens com o vencedor. Para uso administrativo."
"A rakshasa craftsman named Malgath once used this to demonstrate his skill at crafting.": "Um artesão rakshasa chamado Malgath certa vez usou isso para demonstrar sua habilidade em artesanato."
"A rakshasa's tail ring. It's not magical. It is inscribed, \"to Sinda, the explorer supreme.\"": "Anel de cauda de um rakshasa. Não é mágico. Está inscrito \"para Sinda, o explorador supremo\"."
"A rapier-like weapon that also holds a strong cutting edge, this blade is the invention of Lord ErDrick, who was known for his expertise in defensive swordsmanship.": "Uma arma semelhante a um florete que também possui um fio de corte forte, esta lâmina é uma invenção de Lord ErDrick, que era conhecido por sua experiência em esgrima defensiva."
"A rare and beautiful starfish.": "Uma rara e bela estrela do mar."
"A rather heavy sack. It's hard to tell what's inside.": "Um saco bastante pesado. É difícil dizer o que há dentro."
"A rather murky heterogeneous mixture of mushroom bits in water.": "Uma mistura heterogênea bastante turva de pedaços de cogumelos em água."
"A rather murky heterogeneous mixture of mushroom bits in water. DO NOT DRINK!": "Uma mistura heterogênea bastante turva de pedaços de cogumelos em água. NÃO BEBA!"
"A rather unappetizing block of 'meat' made from soybeans, used in cooking.": "Um bloco de 'carne' pouco apetitoso feito de soja, usado na culinária."
"A rather unappetizing block of 'meat' made from soybeans, used in cooking. It is firm with a smooth texture.": "Um bloco de 'carne' pouco apetitoso feito de soja, usado na culinária. É firme e com textura macia."
"A rather unappetizing block of 'meat' made from soybeans, used in cooking. It's slightly squishy.": "Um bloco de 'carne' pouco apetitoso feito de soja, usado na culinária. É um pouco mole."
"A raw beet.": "Uma beterraba crua."
"A raw cabbage.": "Um repolho cru."
"A raw crab.": "Um caranguejo cru."
"A raw fish.": "Um peixe cru."
"A raw fish. Also called a yellowfin, these mid-sized ocean fish are delicious.": "Um peixe cru. Também chamados de albacora, esses peixes oceânicos de tamanho médio são deliciosos."
"A raw fish. Also known as Orcish Labyrinth Fish, these fish are surprisingly tasty when correctly prepared, but should not be eaten raw.": "Um peixe cru. Também conhecidos como Peixe Labirinto Orc, esses peixes são surpreendentemente saborosos quando preparados corretamente, mas não devem ser consumidos crus."
"A raw fish. Found in caves throughout the world, these blind fish are normally tiny, but can grow to surprising size in nature-magic-rich environments.": "Um peixe cru. Encontrados em cavernas de todo o mundo, esses peixes cegos são normalmente minúsculos, mas podem atingir tamanhos surpreendentes em ambientes ricos em magia natural."
"A raw fish. So-called because of its vaguely bluish skin, the grapefish is actually fairly bland.": "Um peixe cru. Chamado assim por causa de sua pele vagamente azulada, o peixe-toranja é, na verdade, bastante insípido."
"A raw fish. These hideous creatures are surprisingly tasty.": "Um peixe cru. Essas criaturas horríveis são surpreendentemente saborosas."
"A raw fish. These strange fish originate in the distant continent of Fosulf. They require expert handling before they can be eaten safely, and few fishermen in Alharth know the technique.": "Um peixe cru. Esses peixes estranhos são originários do distante continente de Fosulf. Eles exigem um manuseio especializado antes de poderem ser consumidos com segurança, e poucos pescadores em Alharth conhecem a técnica."
"A raw hideous blood-sucking parasite fish.": "Um horrível peixe parasita sugador de sangue."
"A raw onion.": "Uma cebola crua."
"A raw potato.": "Uma batata crua."
"A raw squash.": "Uma abóbora crua."
"A really big, eerily preserved strawberry": "Um morango muito grande e estranhamente preservado"
"A reasonable-looking metal helm for a werewolf.": "Um elmo de metal de aparência razoável para um lobisomem."
"A rebranded lute that was actually made in Rahu.": "Um alaúde renomeado que foi feito em Rahu."
"A rebranded weapon from Rahu.": "Uma arma renomeada de Rahu."
"A recently-laid scray egg.": "Um ovo escamoso recentemente posto."
"A recreation of the famous painting from the end of the Dwarven Period. The detail work really captures the ham-fisted spirit of dwarven painting techniques.": "Uma recriação da famosa pintura do final do Período dos Anões. O trabalho detalhado realmente captura o espírito desajeitado das técnicas de pintura dos anões."
"A refreshing summer wine. When prepared by a master brewer, this is the perfect outdoor party wine.": "Um vinho refrescante de verão. Quando preparado por um mestre cervejeiro, este é o vinho perfeito para festas ao ar livre."
"A relatively recent volume by the rakshasa poet Cursak. It's funny and light-hearted in the first half, then gets more and more serious. It needed a good compilation editor, in other words. But it's still fun.": "Um volume relativamente recente do poeta rakshasa Cursak. É engraçado e alegre na primeira parte, depois fica cada vez mais sério. Em outras palavras, precisava de um bom editor de compilação. Mas ainda é divertido."
"A relatively understated ring worn by the cultists that worship Ilth Hale, the Goddess of Sorrow. Ilth Hale's followers believe that sorrow must be endured so that vengeance can be wrought, and this ring helps them endure suffering.": "Um anel relativamente discreto usado pelos cultistas que adoram Ilth Hale, a Deusa da Tristeza. Os seguidores de Ilth Hale acreditam que a tristeza deve ser suportada para que a vingança possa ser realizada, e este anel os ajuda a suportar o sofrimento."
"A resilient piece of history! Perfect for the dwarf fetishist in your life. Or you could wear it in battle, if that's what you're into.": "Um pedaço resiliente da história! Perfeito para o fetichista anão da sua vida. Ou você pode usá-lo em batalha, se é isso que você gosta."
"A rich, dense, slightly sweet bread.": "Um pão rico, denso e ligeiramente doce."
"A ring that magically guides the wearer's hand for better hit placement.": "Um anel que guia magicamente a mão do usuário para melhor posicionamento do golpe."
"A ripe, fuzzy peach.": "Um pêssego maduro e fofo."
"A robotic fire pit, which uses advanced automaton techniques to spread the warmth further and keep it going longer. Lasts 10 minutes once deployed.": "Uma fogueira robótica, que usa técnicas avançadas de autômatos para espalhar ainda mais o calor e mantê-lo funcionando por mais tempo. Dura 10 minutos depois de implantado."
"A rock for sharpening the blades of advanced tools or small blades.": "Uma pedra para afiar lâminas de ferramentas avançadas ou lâminas pequenas."
"A rock for sharpening the blades of tools.": "Uma pedra para afiar as lâminas das ferramentas."
"A rock-hard fruit covered in ashy powder. It looks magical, but poisonous. Very poisonous.": "Uma fruta dura como pedra coberta de pó cinza. Parece mágico, mas venenoso. Muito venenoso."
"A rollicking good tale about a bumbling oaf who finds a magic belt that makes him supernaturally strong. A book-length poem that is popular amongst commoners, but considered a bit too \"low-brow\" for the more discerning afficianado.": "Uma boa história divertida sobre um idiota desajeitado que encontra um cinto mágico que o torna sobrenaturalmente forte. Um poema do tamanho de um livro que é popular entre os plebeus, mas considerado um pouco \"insignificante\" para o aficionado mais exigente."
"A rooty vegetable heart. Would probably be great in a salad.": "Um coração vegetal com raízes. Provavelmente ficaria ótimo em uma salada."
"A rotten urak egg. Completely valueless.": "Um ovo podre de Urak. Completamente sem valor."
"A rubbery eyestalk from a watcher.": "Um pedúnculo ocular de borracha de um observador."
"A rubbery weed. (This item can be used in recipes that call for Mixed Greens.)": "Uma erva daninha emborrachada. (Este item pode ser usado em receitas que pedem Verduras Mistas.)"
"A rugged old bracelet-sized \"ring\" that can be fit to any sort of animal appendage necessary. It has a rune depicting a pig, snug in a blanket, with a cup of tea.": "Um \"anel\" robusto e antigo do tamanho de uma pulseira que pode ser ajustado a qualquer tipo de apêndice animal necessário. Tem uma runa representando um porco, aconchegado em um cobertor, com uma xícara de chá."
"A rugged old bracelet-sized \"ring\" that can be fit to any sort of animal appendage necessary. It has runes representing a pig, a tree, and a bolt of lightning.": "Um \"anel\" robusto e antigo do tamanho de uma pulseira que pode ser ajustado a qualquer tipo de apêndice animal necessário. Possui runas representando um porco, uma árvore e um relâmpago."
"A rustic farmer might consider these pants barely adequate. Might.": "Um fazendeiro rústico pode considerar essas calças pouco adequadas. Poder."
"A sack filled with strange substances that stay warm for a long time and smell reassuring to insects. (To use, give to a mother pet bee or wasp that is still guarding her larva in the 'gestation' stage. It will speed up incubation by 24 hours.)": "Um saco cheio de substâncias estranhas que permanecem quentes por muito tempo e têm um cheiro reconfortante para os insetos. (Para usar, dê a uma abelha mãe ou vespa que ainda esteja protegendo sua larva no estágio de 'gestação'. Isso acelerará a incubação em 24 horas.)"
"A sack filled with strange substances that stay warm for a long time. (To use, give to a mother pet bee or wasp that is still guarding her larva in the 'gestation' stage. It will speed up incubation by 12 hours.)": "Um saco cheio de substâncias estranhas que permanecem quentes por muito tempo. (Para usar, dê a uma abelha mãe ou vespa que ainda esteja protegendo sua larva no estágio de 'gestação'. Isso acelerará a incubação em 12 horas.)"
"A sack of Councils.": "Um saco de Conselhos."
"A sack of millet from a strange plant.": "Um saco de milho de uma planta estranha."
"A sack of weird-smelling herbs and vegetables. It's a goblin secret formula that supposedly improves mating chances. Best results when given to both the male and female horse.": "Um saco de ervas e vegetais com cheiro estranho. É uma fórmula secreta dos goblins que supostamente aumenta as chances de acasalamento. Melhores resultados quando administrado a cavalos machos e fêmeas."
"A saddlebag for small horses.": "Alforje para cavalos pequenos."
"A saddlebag that can hold a nice amount of stuff.": "Um alforje que pode conter uma boa quantidade de coisas."
"A saddlebag that can hold some stuff.": "Um alforje que pode conter algumas coisas."
"A sage's personal diary. It doesn't contain any useful lore or anything, it's just ramblings about his personal life.": "O diário pessoal de um sábio. Não contém nenhum conhecimento útil nem nada, são apenas divagações sobre sua vida pessoal."
"A saliva-covered ball of hair. The hair is unusual and perhaps valuable... it may have uses to alchemists.": "Uma bola de cabelo coberta de saliva. O cabelo é incomum e talvez valioso... pode ser útil para alquimistas."
"A sarcastically-named elven drink that replenishes tempest energy. (For easy cleanup, the teapot magically biodegrades when the tea is consumed.)": "Uma bebida élfica com nome sarcástico que reabastece a energia da tempestade. (Para facilitar a limpeza, o bule se biodegrada magicamente quando o chá é consumido.)"
"A savory appetizer.": "Um aperitivo saboroso."
"A saw made of ice! It won't last too long, but it'll cut wood while it lasts.": "Uma serra feita de gelo! Não vai durar muito, mas cortará madeira enquanto durar."
"A scale from a dragon! Hmm, it'd be a pretty small dragon... or, more likely, some dragon-kin creature.": "Uma escama de um dragão! Hmm, seria um dragão bem pequeno... ou, mais provavelmente, alguma criatura parecida com um dragão."
"A scaled ring with a swirling crystal centerpiece.": "Um anel em escala com uma peça central de cristal girando."
"A scarred and twisted bow, barely able to be strung. A hum of darkness can be felt from within. A tiny necromancy gem is embedded in the top.": "Um arco cheio de cicatrizes e retorcido, que mal consegue ser amarrado. Um zumbido de escuridão pode ser sentido de dentro. Uma pequena joia de necromancia está embutida no topo."
"A scintillating gemstone. Used in magic, it can protect against death.": "Uma pedra preciosa cintilante. Usado em magia, pode proteger contra a morte."
"A scorched metal key you found in the belly of a fire spider under Hogan's Keep. This key has seen some hot action.": "Uma chave de metal chamuscada que você encontrou na barriga de uma aranha de fogo sob a Fortaleza de Hogan. Esta chave teve alguma ação intensa."
"A scrap of fur from a dead animal.": "Um pedaço de pelo de um animal morto."
"A scrawled note that says, \"Please, we need food within a week or our entire village will surely starve. A king's ransom for anyone who comes to our aid!\" Sadly, the date is from several years ago.": "Uma nota rabiscada que diz: \"Por favor, precisamos de comida dentro de uma semana ou toda a nossa aldeia certamente morrerá de fome. Um resgate real para qualquer um que vier em nosso auxílio!\" Infelizmente, a data é de vários anos atrás."
"A scroll filled to the brim with research notes about demons. To the right person this would be probably be very informative.": "Um pergaminho cheio até a borda com notas de pesquisa sobre demônios. Para a pessoa certa, isso provavelmente seria muito informativo."
"A scroll in Orcish. It seems to be about orcish wizards.": "Um pergaminho em Orc. Parece ser sobre bruxos orcs."
"A scroll in Orcish. There is one picture depicting a human wizard.": "Um pergaminho em Orc. Há uma imagem representando um mago humano."
"A scroll written in Orcish.": "Um pergaminho escrito em orc."
"A seasonal drink with an intoxicating aroma and a surprising kick.": "Uma bebida sazonal com um aroma inebriante e um toque surpreendente."
"A seasoned shark steak with a wood-fired sweet smoky flavor.": "Um bife de tubarão temperado com sabor adocicado de fumaça no forno a lenha."
"A secret formula that lets mortals take advantage of necromantic blood, if they are hardy enough.": "Uma fórmula secreta que permite aos mortais tirar vantagem do sangue necromântico, se forem resistentes o suficiente."
"A secret variety of rice cultivated in Rahu. Most citizens know it exists, but few know exactly where or how it is made.": "Uma variedade secreta de arroz cultivada em Rahu. A maioria dos cidadãos sabe que ela existe, mas poucos sabem exatamente onde ou como é produzida."
"A seemingly frozen beaker that enables a strange influence over the weather.": "Um copo aparentemente congelado que permite uma estranha influência sobre o clima."
"A series of notes and questions about a new type of mechanized ice fishing technique. Addressed to someone named \"Swamp Dwarf\".": "Uma série de notas e perguntas sobre um novo tipo de técnica mecanizada de pesca no gelo. Endereçado a alguém chamado \"Anão do Pântano\"."
"A series of notes and questions, written entirely in Orcish.": "Uma série de notas e perguntas, escritas inteiramente em Orc."
"A set of enchanted chimes that can be both plucked and strummed.": "Um conjunto de sinos encantados que podem ser dedilhados e dedilhados."
"A set of notes consisting of pig hoofprints.": "Um conjunto de notas que consiste em pegadas de porco."
"A set of tools and step-by-step instructions that can let almost anyone improve their blade! The effect is temporary and wears off after a certain number of attacks.": "Um conjunto de ferramentas e instruções passo a passo que podem permitir que quase qualquer pessoa melhore sua lâmina! O efeito é temporário e desaparece após um certo número de ataques."
"A set of tools and step-by-step instructions that can let almost anyone improve their bow! The effect is temporary and wears off after a certain number of attacks.": "Um conjunto de ferramentas e instruções passo a passo que podem permitir que quase qualquer pessoa melhore seu arco! O efeito é temporário e desaparece após um certo número de ataques."
"A set of tools and step-by-step instructions that can let almost anyone improve their exotic claw weapon! The effect is temporary and wears off after a certain number of attacks.": "Um conjunto de ferramentas e instruções passo a passo que podem permitir que quase qualquer pessoa melhore sua arma de garra exótica! O efeito é temporário e desaparece após um certo número de ataques."
"A shark fin, freshly hacked off.": "Uma barbatana de tubarão recém-cortada."
"A sheet of dried, untanned leather, ready to be worked for specific purposes.": "Folha de couro seco e não curtido, pronta para ser trabalhada para fins específicos."
"A sheet of interwoven chains that you can arguably place upon your head.": "Uma folha de correntes entrelaçadas que você pode colocar na cabeça."
"A sheet of paper with some kind of mapping between different characters of the Orcish alphabet.": "Uma folha de papel com algum tipo de mapeamento entre diferentes caracteres do alfabeto Orc."
"A shell that can make noise.": "Uma concha que pode fazer barulho."
"A shiny metal key from a goblin jewelry chest that you found under Hogan's Keep. Very well polished.": "Uma chave de metal brilhante de um baú de joias de goblins que você encontrou na Fortaleza de Hogan. Muito bem polido."
"A shiny red apple.": "Uma maçã vermelha brilhante."
"A shroud of metal with a face-hole.": "Uma mortalha de metal com um buraco no rosto."
"A signed and numbered copy of the famous painting by Go Hakomi, a dwarven master. He recently passed away, increasing this painting's value significantly.": "Uma cópia assinada e numerada da famosa pintura de Go Hakomi, um mestre anão. Ele faleceu recentemente, aumentando significativamente o valor desta pintura."
"A signet ring, designed to stamp an insignia into printed documents. It is vaguely enchanted. The signet is a single bat wing.": "Um anel de sinete, projetado para carimbar uma insígnia em documentos impressos. Está vagamente encantado. O sinete é uma única asa de morcego."
"A silver medallion etched with a simple drawing of a smiling elf's face.": "Um medalhão de prata gravado com um desenho simples do rosto sorridente de um elfo."
"A simple and nicely-made drum.": "Um tambor simples e bem feito."
"A simple autopsy kit for beginning pathologists. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Um kit de autópsia simples para patologistas iniciantes. (Mantenha-o em seu inventário e você terá a opção de autopsiar cadáveres.)"
"A simple belt with a pouch.": "Um cinto simples com bolsa."
"A simple book in Orcish. It has lots of pictures of weapons.": "Um livro simples em Orcish. Tem muitas fotos de armas."
"A simple book in Orcish. It looks like it might be a fiction novel -- very rare among orcs!": "Um livro simples em Orcish. Parece que pode ser um romance de ficção – muito raro entre os orcs!"
"A simple book in Orcish. It seems to contain many prayers or chants, plus woodcut images of orcish armies killing people.": "Um livro simples em Orcish. Parece conter muitas orações ou cânticos, além de imagens xilogravuras de exércitos orcs matando pessoas."
"A simple bow that can pack a lot of punch for its size.": "Um arco simples que pode ter muito impacto para seu tamanho."
"A simple but robust crossbow that handles well and can be easily restrung.": "Uma besta simples, mas robusta, que tem um bom manuseio e pode ser facilmente reajustada."
"A simple but robust off-hand blade.": "Uma lâmina simples, mas robusta."
"A simple but solidly-made knife.": "Uma faca simples, mas de fabricação sólida."
"A simple chain featuring two decorative gems.": "Uma corrente simples com duas joias decorativas."
"A simple cot for napping. Can be installed in a home or guild hall.": "Um berço simples para dormir. Pode ser instalado em uma casa ou em uma guilda."
"A simple crossbow with nothing fancy about it.": "Uma besta simples sem nada sofisticado."
"A simple grapefish steak.": "Um simples bife de toranja."
"A simple greasy salty snack. Best eaten hot.": "Um simples lanche gorduroso e salgado. Melhor comido quente."
"A simple horn instrument that's been enchanted to make listeners more nimble.": "Um simples instrumento de trompa que foi encantado para tornar os ouvintes mais ágeis."
"A simple instrument made of animal horn.": "Um instrumento simples feito de chifre de animal."
"A simple knife designed for beginning knife-throwers. (Used with the Knife combat skill.)": "Uma faca simples projetada para atiradores de facas iniciantes. (Usado com a habilidade de combate Faca.)"
"A simple meal.": "Uma refeição simples."
"A simple off-hand knife that's been crafted to exacting standards.": "Uma faca simples e improvisada que foi criada de acordo com padrões exigentes."
"A simple rocket that explodes in harmless light when used.": "Um foguete simples que explode em luz inofensiva quando usado."
"A simple scroll with both Orcish and Human words on it.": "Um pergaminho simples com palavras orcs e humanas."
"A simple scroll written in both Orcish and Human. The Human title is \"Demands of the Deceased\".": "Um pergaminho simples escrito em Orc e Humano. O título Humano é \"Demandas do Falecido\"."
"A simple scroll written in Orcish, with images of sword techniques.": "Um pergaminho simples escrito em Orc, com imagens de técnicas de espada."
"A simple skinning knife for beginning skinners. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Uma faca simples para esfolar iniciantes. (Mantenha-o em seu inventário e você terá a opção de esfolar os cadáveres de alguns inimigos.)"
"A simple skinning knife made of magical ice. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Uma simples faca de esfolar feita de gelo mágico. (Mantenha-o em seu inventário e você terá a opção de esfolar os cadáveres de alguns inimigos.)"
"A simple spring-activated trap that will stun whatever walks over it. One-use.": "Uma armadilha simples ativada por mola que atordoará qualquer pessoa que passar por cima dela. Uso único."
"A simple variety of whisky made from barley. It's drinkable and has a tolerable flavor.": "Uma variedade simples de whisky feito de cevada. É bebível e tem um sabor tolerável."
"A simple whittling knife for beginning whittlers.": "Uma faca de talhar simples para iniciantes."
"A simple wooden key with a faint green magical glow.": "Uma chave simples de madeira com um leve brilho mágico verde."
"A simple wooden mesh, useful for cages, pens, trellises, and so on.": "Uma malha de madeira simples, útil para gaiolas, currais, treliças e assim por diante."
"A simple wooden table that can be installed in a home or guild hall.": "Uma mesa simples de madeira que pode ser instalada em uma casa ou salão de guilda."
"A simple wooden wand with runes etched into it.": "Uma varinha simples de madeira com runas gravadas."
"A simple, classic meal of mouthwatering fish.": "Uma refeição simples e clássica de peixe de dar água na boca."
"A simple, tasty beverage.": "Uma bebida simples e saborosa."
"A simple, watery, slightly insipid beer.": "Uma cerveja simples, aguada e levemente insípida."
"A single poorly-made glove. The fingers have been incorrectly positioned, making it impossible to wear.": "Uma única luva mal feita. Os dedos foram posicionados incorretamente, impossibilitando o uso."
"A six-sided die with a hidden gizmo that causes it to land on one side more often than others. You'll have to roll it to figure out what it's weighted for.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia em um lado com mais frequência do que em outros. Você terá que rolar para descobrir para que serve."
"A six-sided die with a hidden gizmo that causes it to land on the \"1\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “1” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A six-sided die with a hidden gizmo that causes it to land on the \"2\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “2” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A six-sided die with a hidden gizmo that causes it to land on the \"3\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “3” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A six-sided die with a hidden gizmo that causes it to land on the \"4\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “4” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A six-sided die with a hidden gizmo that causes it to land on the \"5\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “5” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A six-sided die with a hidden gizmo that causes it to land on the \"6\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Um dado de seis lados com um dispositivo oculto que faz com que ele caia no lado “6” 50% das vezes. Devido à engenharia imprudente dos goblins, há sempre 4% de chance de o dado explodir em uma chuva de ácido quando rolado."
"A skilled metalsmith put this left-handed fighting claw together. It's a little uncomfortable to wear, though.": "Um ferreiro habilidoso montou esta garra de combate para canhotos. É um pouco desconfortável de usar, no entanto."
"A skillfully cleaned fish, ready for cooking.": "Um peixe habilmente limpo e pronto para cozinhar."
"A slice of delicious lemon custard topped with fluffy meringue, all baked to perfection.": "Uma fatia de delicioso creme de limão coberto com merengue fofo, tudo assado na perfeição."
"A slice of mouth-watering honey cake! It's slightly cold to the touch, and it looks somewhat translucent, but it tastes delicious.": "Uma fatia de bolo de mel de dar água na boca! É um pouco frio ao toque e parece um tanto translúcido, mas tem um sabor delicioso."
"A slightly bent arrow, suitable for beginning archers.": "Uma flecha levemente curvada, adequada para arqueiros iniciantes."
"A slightly bent arrow, suitable for beginning archers. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha levemente curvada, adequada para arqueiros iniciantes. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A slightly mouth-puckering treat.": "Uma delícia de enrugar levemente a boca."
"A slightly sentient fungal mat that fits under a psychic mantis's top hat. It can also be worn without a hat if you're uncultured.": "Um tapete fúngico ligeiramente senciente que cabe sob a cartola de um louva-a-deus psíquico. Também pode ser usado sem chapéu se você não tiver cultura."
"A slightly-tart jelly-like sauce with hints of citrus and spice. A tasty side-dish.": "Um molho gelatinoso levemente azedo com notas cítricas e especiarias. Um acompanhamento saboroso."
"A slimy gunk that lets you move like an eel. (Swimming buff does not stack with other swimming-buff potions.)": "Uma gosma viscosa que permite que você se mova como uma enguia. (O buff de natação não se acumula com outras poções de buff de natação.)"
"A slimy liquid with bits of bird beak floating in it. Rub it on your hands to make your poison attacks more deadly!": "Um líquido viscoso com pedaços de bico de pássaro flutuando nele. Esfregue-o nas mãos para tornar seus ataques de veneno mais mortais!"
"A slimy three-pronged tongue from a kuvou corpse.": "Uma língua viscosa de três pontas de um cadáver kuvou."
"A sludgey liquid. The label suggests it's used in alchemy.": "Um líquido lamacento. O rótulo sugere que é usado na alquimia."
"A small amount of sludgy substance.": "Uma pequena quantidade de substância lamacenta."
"A small amount of smelly sulfur.": "Uma pequena quantidade de enxofre fedorento."
"A small and elegant saddlebag.": "Um alforje pequeno e elegante."
"A small bag of something tied with a cord. You can't tell what's in the bag because it's frozen completely solid, and it seems impervious to any form of heat.": "Um pequeno saco com algo amarrado com um cordão. Você não pode dizer o que há no saco porque ele está completamente congelado e parece impermeável a qualquer forma de calor."
"A small ball of paper that explodes into a colorful burst when lit.": "Uma pequena bola de papel que explode em uma explosão colorida quando acesa."
"A small bit of xogrite, used as currency in distant rakshasa outposts. The process of making this alloy is a closely-guarded secret, but one of its ingredients seems to be xedrite.": "Um pequeno pedaço de xogrite, usado como moeda em postos avançados rakshasa distantes. O processo de fabricação desta liga é um segredo bem guardado, mas um de seus ingredientes parece ser a xedrita."
"A small black stone. It has been tuned as an amplifier for certain toolcrafting recipes.": "Uma pequena pedra preta. Ele foi ajustado como um amplificador para certas receitas de criação de ferramentas."
"A small box for storing up to 4 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma pequena caixa para armazenar até 4 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A small brass figurine of a hag. It was probably originally part of a child's toy army. Looks antique, and somewhat valuable.": "Uma pequena estatueta de latão de uma bruxa. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo e um tanto valioso."
"A small bundle of grass from a dimension of darkness and despair. Useful for taming nightmare animals.": "Um pequeno feixe de grama vindo de uma dimensão de escuridão e desespero. Útil para domar animais de pesadelo."
"A small bundle of grass. Useful for taming and feeding most types of ungulates.": "Um pequeno feixe de grama. Útil para domesticar e alimentar a maioria dos tipos de ungulados."
"A small but thick piece of metal covered in a grid of holes. It is used by flower arrangers.": "Um pequeno mas grosso pedaço de metal coberto por uma grade de buracos. É usado por arranjadores de flores."
"A small but very sharp blade inlaid with ivory. The craftsmanship is very high.": "Uma lâmina pequena, mas muito afiada, incrustada em marfim. O artesanato é muito alto."
"A small cask used in dairy and beer production.": "Um pequeno barril usado na produção de laticínios e cerveja."
"A small clay-fired pot. It could theoretically hold water, but since glass bottles are objectively better, you refuse to do so on principle. Nice pot though.": "Uma pequena panela de barro. Teoricamente, poderia reter água, mas como as garrafas de vidro são objetivamente melhores, você se recusa a fazê-lo por princípio. Belo pote, no entanto."
"A small clay-fired pot. It has long cracks that make it less than ideal for holding water, but maybe somebody could patch it up or something. Just... not you.": "Uma pequena panela de barro. Tem longas rachaduras que o tornam menos que ideal para reter água, mas talvez alguém possa consertá-lo ou algo assim. Só... não você."
"A small cloth satchel containing special powder that can be used to commune with the dead.": "Uma pequena bolsa de pano contendo um pó especial que pode ser usado para comunicar com os mortos."
"A small collar studded with sardonyx gems. Popular among certain sentient animals.": "Um pequeno colar cravejado de pedras preciosas de sardônica. Popular entre certos animais sencientes."
"A small crystal made up of black and white bands. This particular gem has been tuned to act as an amplifier for certain leatherworking recipes.": "Um pequeno cristal composto por faixas pretas e brancas. Esta joia em particular foi ajustada para funcionar como um amplificador para certas receitas de trabalho em couro."
"A small crystal made up of black and white bands. Used in magic, it guards against physical dangers. This particular onyx has been attuned to Armor Patching when used in crafting.": "Um pequeno cristal composto por faixas pretas e brancas. Usado em magia, protege contra perigos físicos. Este ônix em particular foi sintonizado com Armor Patching quando usado na fabricação."
"A small crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Um pequeno prisma cristalino. Os transmutadores os usam para guiar o flogisto para dentro ou para fora de um item."
"A small disposable vial of slimy liquid. Rub it on your hands to make your poison attacks more deadly!": "Um pequeno frasco descartável com um líquido viscoso. Esfregue-o nas mãos para tornar seus ataques de veneno mais mortais!"
"A small dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um pequeno dragão revestido de ouro. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A small dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um pequeno dragão revestido de prata. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A small dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Um pequeno dragão. As pessoas que o visualizarem ficarão vagamente inspiradas a criar melhor. Dura 5 minutos depois de implantado."
"A small flask of lubricant. Perfect for fixing jammed machinery! It may have other uses, too.": "Um pequeno frasco de lubrificante. Perfeito para consertar máquinas emperradas! Pode ter outros usos também."
"A small flask of oil. Perfect for lighting lamps! It may have other uses, too.": "Um pequeno frasco de óleo. Perfeito para iluminar lâmpadas! Pode ter outros usos também."
"A small fleck of hardened dinosaur skin.": "Uma pequena mancha de pele endurecida de dinossauro."
"A small glass jar used to hold dye indefinitely. It is not reusable.": "Um pequeno frasco de vidro usado para armazenar corante indefinidamente. Não é reutilizável."
"A small gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um pequeno grifo revestido de ouro. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A small gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um pequeno grifo revestido de prata. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A small gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Um pequeno grifo. As pessoas que assistirem a isso ficarão vagamente inspiradas a assassinar melhor. Dura 5 minutos depois de implantado."
"A small handheld device studded with aquamarines that can summon a portal to an attuned location. This device will self destruct when all of the charges have been used up.": "Um pequeno dispositivo portátil repleto de águas-marinhas que pode invocar um portal para um local sintonizado. Este dispositivo se autodestruirá quando todas as cargas forem esgotadas."
"A small handheld device with a large amethyst set in the center used to teleport the wielder to an attuned location. This device will self destruct when the charge has expired.": "Um pequeno dispositivo portátil com uma grande ametista colocada no centro, usado para teletransportar o usuário para um local sintonizado. Este dispositivo se autodestruirá quando a carga expirar."
"A small journal filled with notes on your investigation of Korbok the Goblin in Vidaria.": "Um pequeno diário repleto de anotações sobre sua investigação sobre Korbok, o Goblin, em Vidaria."
"A small key. It must fit something...": "Uma pequena chave. Deve caber em alguma coisa..."
"A small leather sack of weird powders and bones, useful for casting Orcish magics. It is worn prominently by Orcish wizards as a symbol of their power.": "Um pequeno saco de couro com pós e ossos estranhos, útil para lançar magias Orcs. É usado com destaque pelos magos Orcs como um símbolo de seu poder."
"A small lobe from a Brain Bug. Wait, did... did it just pulse? Did you see that? No... probably your imagination.": "Um pequeno lóbulo de um Brain Bug. Espere,... apenas pulsou? Você viu isso? Não... provavelmente sua imaginação."
"A small lump of a soft, whitish mineral. You can easily crumble it to a very fine powder that has no smell or taste.": "Um pequeno pedaço de mineral macio e esbranquiçado. Você pode facilmente transformá-lo em um pó muito fino, sem cheiro ou sabor."
"A small lump of gold with arrows carved into it. It seems to be a pawn for some sort of game.": "Um pequeno pedaço de ouro com flechas gravadas. Parece ser um peão para algum tipo de jogo."
"A small lump of metal said to form in areas of high latent magic. It can be combined with other ores for advanced smithing, and alchemists have their own strange uses for it.": "Um pequeno pedaço de metal que se diz se formar em áreas de alta magia latente. Ele pode ser combinado com outros minérios para forja avançada, e os alquimistas têm seus próprios usos estranhos para ele."
"A small metal band used in making casks.": "Uma pequena faixa de metal usada na fabricação de barris."
"A small metal cylinder with liquid sealed inside. There's a pull-tab on top to open it. The cylinder bears an image of a smiling Spring fairy. If you stare for a moment, she seems to mouth the cryptic words \"Rez and Shine, You Live Again! Original Honey Flavor!\"": "Um pequeno cilindro de metal com líquido selado em seu interior. Há uma aba na parte superior para abri-lo. O cilindro traz a imagem de uma sorridente fada da Primavera. Se você olhar por um momento, ela parece pronunciar as palavras enigmáticas \"Rez e Shine, você vive de novo! Sabor de mel original!\""
"A small metal key you found in a cave in Kur Mountains.": "Uma pequena chave de metal que você encontrou em uma caverna nas montanhas Kur."
"A small orange gem with many magical uses. It has been tuned as an amplifier for certain glass equipment.": "Uma pequena joia laranja com muitos usos mágicos. Foi ajustado como amplificador para determinados equipamentos de vidro."
"A small orcish utility knife, a little too short to be useful as a weapon. A few years ago, these were a fashionable accessory in Statehelm, but the fad has died out now.  ( Not to be confused with the orcish Khopesh, which is a very dangerous sword.)": "Uma pequena faca orc, um pouco curta demais para ser útil como arma. Há alguns anos, estes eram um acessório da moda em Statehelm, mas a moda desapareceu agora.  (Não deve ser confundido com o orc Khopesh, que é uma espada muito perigosa.)"
"A small painted statue of a goblin. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Uma pequena estátua pintada de um duende. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo, mas não muito valioso."
"A small painted statue of a hag. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Uma pequena estátua pintada de uma bruxa. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo, mas não muito valioso."
"A small painted statue of a skeleton. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Uma pequena estátua pintada de um esqueleto. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo, mas não muito valioso."
"A small painted statue of an ogre. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Uma pequena estátua pintada de um ogro. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo, mas não muito valioso."
"A small painted wooden chip, used in card and parlor games.": "Pequena lasca de madeira pintada, usada em jogos de cartas e de salão."
"A small painted wooden chip, used in card and parlor games. It has tiny flecks of inlaid gemstone, making it slightly harder for rogues to slip counterfeits into a game.": "Pequena lasca de madeira pintada, usada em jogos de cartas e de salão. Ele tem pequenas manchas de pedras preciosas incrustadas, tornando um pouco mais difícil para os ladrões colocarem falsificações em um jogo."
"A small painted wooden chip, used in card and parlor games. The paint is magical, and protects it from being replicated by illusion spells -- a common ploy amongst dwarven rogues and hustlers.": "Pequena lasca de madeira pintada, usada em jogos de cartas e de salão. A tinta é mágica e protege-a de ser replicada por feitiços de ilusão – uma estratégia comum entre ladinos e traficantes anões."
"A small piece of bone inscribed with a dwarven rune for eternal sleep. It doesn't look very useful to you.": "Um pequeno pedaço de osso inscrito com uma runa anã para o sono eterno. Não parece muito útil para você."
"A small piece of honeycomb from a fae beehive.": "Um pequeno pedaço de favo de mel de uma colmeia fada."
"A small plush bear. It's enchanted to give encouraging messages when you're sad.": "Um pequeno ursinho de pelúcia. Encanta dar mensagens de incentivo quando estamos tristes."
"A small poorly-made tiara, sized for a large rat or smallish dog. It seems utterly non-magical.": "Uma pequena tiara mal feita, dimensionada para um rato grande ou um cachorro pequeno. Parece totalmente não mágico."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 10,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 10.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 15,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 15.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 20,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 20.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 25,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 25.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 5,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 5.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 50,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 50.000 Conselhos."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 7,000 Councils.": "Uma pequena pedra rúnica que vale uma pequena fortuna no Red Wing Casino. Veja Qatik para trocar isso por 7.000 Conselhos."
"A small runestone used by summoners to ensure the creatures they bring forth can't return to their native dimension. Clever animal handlers have found alternate uses for its potent magic.": "Uma pequena pedra rúnica usada por invocadores para garantir que as criaturas que eles criam não possam retornar à sua dimensão nativa. Manipuladores inteligentes de animais encontraram usos alternativos para sua poderosa magia."
"A small sack of Councils.": "Um pequeno saco de Conselhos."
"A small sack of foul-smelling white dust. Echur instructed you not to eat it, but that shouldn't be a problem.": "Um pequeno saco de poeira branca e fedorenta. Echur instruiu você a não comê-lo, mas isso não deveria ser um problema."
"A small saddlebag for petite ponies.": "Um pequeno alforje para pequenos pôneis."
"A small saddlebag for ponies.": "Um pequeno alforje para pôneis."
"A small sentient gem that takes notes on your use of fire magic and automatically adjusts your spells to be more effective and protective.": "Uma pequena joia senciente que anota o uso da magia do fogo e ajusta automaticamente seus feitiços para serem mais eficazes e protetores."
"A small sentient gem that takes notes on your use of fire magic.": "Uma pequena joia senciente que anota o uso da magia do fogo."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 2 ability.": "Uma pequena lâmina afiada coberta por uma gosma preta e espessa. Este item é usado pela habilidade Poison Blade 2."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 3 ability.": "Uma pequena lâmina afiada coberta por uma gosma preta e espessa. Este item é usado pela habilidade Poison Blade 3."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 4 ability.": "Uma pequena lâmina afiada coberta por uma gosma preta e espessa. Este item é usado pela habilidade Poison Blade 4."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 5 ability.": "Uma pequena lâmina afiada coberta por uma gosma preta e espessa. Este item é usado pela habilidade Poison Blade 5."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade ability.": "Uma pequena lâmina afiada coberta por uma gosma preta e espessa. Este item é usado pela habilidade Poison Blade."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade 2 ability.": "Uma pequena lâmina afiada revestida com uma gosma tóxica que é especialmente mortal para lobos e licantropos. Este item é usado pela habilidade Wolfsbane Blade 2."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade 3 ability.": "Uma pequena lâmina afiada revestida com uma gosma tóxica que é especialmente mortal para lobos e licantropos. Este item é usado pela habilidade Wolfsbane Blade 3."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade ability.": "Uma pequena lâmina afiada revestida com uma gosma tóxica que é especialmente mortal para lobos e licantropos. Este item é usado pela habilidade Wolfsbane Blade."
"A small shiny green rock with arrows carved into it. It seems to be a pawn for some sort of game.": "Uma pequena pedra verde brilhante com flechas esculpidas. Parece ser um peão para algum tipo de jogo."
"A small spindle of cotton string.": "Um pequeno fuso de barbante de algodão."
"A small statue of a goblin. It was probably originally part of a child's toy army. Looks antique.": "Uma pequena estátua de um goblin. Provavelmente fazia parte originalmente de um exército de brinquedos infantil. Parece antigo."
"A small statuette of a wizard in battle armor, his arm outstretched as he casts a spell. It was probably originally part of a child's toy set. Looks antique, but only moderately valuable.": "Uma pequena estatueta de um mago em armadura de batalha, com o braço estendido enquanto lança um feitiço. Provavelmente fazia parte originalmente de um conjunto de brinquedos infantis. Parece antigo, mas apenas moderadamente valioso."
"A small stone covered in special moss. Licking the moss gives ranalon a potent hallucinogenic effect. Other creatures experience a less-dramatic effect, but it's still notable.": "Uma pequena pedra coberta de musgo especial. Lamber o musgo dá ao ranalon um potente efeito alucinógeno. Outras criaturas experimentam um efeito menos dramático, mas ainda é notável."
"A small tasteful Enoyos amulet.": "Um pequeno amuleto Enoyos de bom gosto."
"A small thin piece of metal covered in a grid of holes. It is used by flower arrangers.": "Um pequeno pedaço fino de metal coberto por uma grade de buracos. É usado por arranjadores de flores."
"A small valuable item encased in protective goop. The goblin technique for removing the stuff requires special equipment. Perhaps there's another means to open it.": "Um pequeno item valioso envolto em uma gosma protetora. A técnica goblin para remover o material requer equipamento especial. Talvez haja outro meio de abri-lo."
"A small vial of foul liquid. Its formula is a secret known only to werewolf clans.": "Um pequeno frasco com líquido sujo. Sua fórmula é um segredo conhecido apenas pelos clãs de lobisomens."
"A small vial that reeks of urine and other unpleasant chemicals. This is an unadulterated \"pure\" dose of the drug, straight from the alchemists' workbench.": "Um pequeno frasco que cheira a urina e outros produtos químicos desagradáveis. Esta é uma dose “pura” não adulterada da droga, direto da bancada dos alquimistas."
"A small vial that reeks of urine, gore, and chemicals. Only rakshasa are able to stomach this substance, and even they find it revolting -- although many rakshasa claim the smell is also strangely exhilarating.": "Um pequeno frasco que cheira a urina, sangue coagulado e produtos químicos. Apenas os rakshasa são capazes de engolir esta substância, e até eles a acham revoltante – embora muitos rakshasa afirmem que o cheiro também é estranhamente estimulante."
"A small wad of stinky swamp vegetation. It can be burned into potash for use in glassblowing, although the process is very unreliable, usually yielding only strange dirt.": "Um pequeno maço de vegetação de pântano fedorenta. Pode ser queimado e transformado em potássio para uso em sopro de vidro, embora o processo não seja confiável, geralmente produzindo apenas sujeira estranha."
"A small wax-sealed container with a dollop of blue sludge inside.": "Um pequeno recipiente lacrado com uma porção de lama azul dentro."
"A small yellow topaz. An incredibly versatile magical stone. This particular piece has been infused with a rune that attunes it to Fairy Magic, giving crafted items a chance to include one or more Fairy Magic powers (with the rest being Mentalism powers).": "Um pequeno topázio amarelo. Uma pedra mágica incrivelmente versátil. Esta peça em particular foi infundida com uma runa que a sintoniza com a Magia das Fadas, dando aos itens criados a chance de incluir um ou mais poderes da Magia das Fadas (sendo o restante poderes de Mentalismo)."
"A smoky-smelling weed. (This item can be used in recipes that call for Mixed Greens.)": "Uma erva com cheiro de fumaça. (Este item pode ser usado em receitas que pedem Verduras Mistas.)"
"A snack of sugar-glazed grapes.": "Um lanche de uvas glaceadas com açúcar."
"A snack of sweetened strawberries.": "Um lanche de morangos adoçados."
"A snail. It's about two inches in diameter. There are probably ways to prepare this for cooking.  It can also be used in Cheap Meat recipes.": "Um caracol. Tem cerca de cinco centímetros de diâmetro. Provavelmente existem maneiras de preparar isso para cozinhar.  Também pode ser usado em receitas de Carne Barata."
"A sneaky ratkin weapon designed for poison use.": "Uma arma ratkin sorrateira projetada para uso com veneno."
"A snippet of a family tree. Probably valuable to somebody... but not to most.": "Um trecho de uma árvore genealógica. Provavelmente valioso para alguém... mas não para a maioria."
"A soft blue rock. It's useful in curatives and curse removal potions. This particular gem has been infused with a rune that attunes it to foxes when used in crafting.": "Uma rocha azul suave. É útil em curativos e poções para remoção de maldições. Esta gema em particular foi infundida com uma runa que a sintoniza com raposas quando usada na elaboração."
"A soft leather vest with thick reinforced sleeves. Who knew wearing ten pounds of leather could be this not-horrible?": "Um colete de couro macio com mangas grossas reforçadas. Quem diria que usar cinco quilos de couro não seria tão horrível?"
"A soft strange metal, quite magical, and very poisonous. It has many uses.": "Um metal macio e estranho, bastante mágico e muito venenoso. Tem muitos usos."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +12 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura em +12 por 30 minutos."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +3 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura +3 por 30 minutos."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +6 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura +6 por 30 minutos."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +9 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura +9 por 30 minutos."
"A sort of \"cheat sheet\" for ancient scribes. Perhaps it'd be useful in recreating lost Calligraphy secrets.": "Uma espécie de \"folha de dicas\" para escribas antigos. Talvez seja útil para recriar segredos perdidos da caligrafia."
"A sort of jumpsuit worn by fae officers on their strange ships. Its strange material is very stretchy.": "Uma espécie de macacão usado por oficiais feéricos em seus navios estranhos. Seu estranho material é muito elástico."
"A sour milk product that's useful in many recipes.": "Um leite azedo útil em muitas receitas."
"A soybean seed that has sprouted and is ready to be planted.": "Uma semente de soja que germinou e está pronta para ser plantada."
"A special cake of appreciation for your support!": "Um bolo especial de agradecimento pelo seu apoio!"
"A special cake of gratitude. Thank you so much!": "Um bolo especial de gratidão. Muito obrigado!"
"A special pemphredo eye adjusted to receive messages from a nearby source, instead of a distant one.": "Um olho pefredo especial ajustado para receber mensagens de uma fonte próxima, em vez de distante."
"A special token from Moxie to barter for a special advanced item.": "Um token especial da Moxie para trocar por um item avançado especial."
"A special token from Raim to barter for a special advanced item.": "Um token especial de Raim para trocar por um item avançado especial."
"A special token from Riston to barter for a special advanced item.": "Um token especial de Riston para trocar por um item avançado especial."
"A special token from Tryaka to barter for a special advanced item.": "Um token especial de Tryaka para trocar por um item avançado especial."
"A specially-shaped piece of hardened metal. This is used in the making of plate mail armor.": "Uma peça de metal endurecido com formato especial. Isso é usado na fabricação de armaduras de cota de malha."
"A spice with a bitter, fennely taste.": "Uma especiaria com sabor amargo e de erva-doce."
"A spicy perfume concocted by humans. A commercial failure at its goal of helping human men woo women, it found new life among solitary huntsmen, foresters, and others (of both sexes) who feel stronger and more bad-ass while wearing it.": "Um perfume picante inventado por humanos. Um fracasso comercial em seu objetivo de ajudar homens humanos a cortejar mulheres, ele encontrou uma nova vida entre caçadores solitários, silvicultores e outros (de ambos os sexos) que se sentem mais fortes e durões ao usá-lo."
"A spicy red pepper.": "Uma pimenta vermelha picante."
"A spicy salad meal.": "Uma salada picante."
"A spiky and bizarre tooth, as long as a dagger.": "Um dente pontiagudo e bizarro, do tamanho de uma adaga."
"A spiky neck contraption that goes on the dominant head of a cerberus, hopefully preventing it from killing its masters.": "Uma engenhoca de pescoço pontiagudo que fica na cabeça dominante de um cerberus, evitando que ele mate seus mestres."
"A spindle of thread.": "Um fuso de linha."
"A spleen.": "Um baço."
"A spore bomb infused with wolfsbane, designed to be tossed as a weapon by a seasoned Mycologist.": "Uma bomba de esporos infundida com acônito, projetada para ser lançada como arma por um micologista experiente."
"A spun-sugar confection in the shape of a caterpillar, colored and flavored with natural fruit juices. It's a really good illusion. Are you sure you want to stick it in your mouth?": "Confeito de açúcar fiado em forma de lagarta, colorido e aromatizado com sucos naturais de frutas. É uma ilusão muito boa. Tem certeza que quer enfiar na boca?"
"A squid amulet worn by those that venerate Enoyos. This one is a failed experiment by Chirrra. The enchantment has been altered in strange and seemingly-random ways.": "Um amuleto de lula usado por aqueles que veneram Enoyos. Este é um experimento fracassado de Chirrra. O encantamento foi alterado de maneiras estranhas e aparentemente aleatórias."
"A stack of orcish breakfast pancakes.": "Uma pilha de panquecas de café da manhã orcs."
"A staff with modest enchantments and modest grip and modest... well, let's just say the whole thing is 'modest'. In a 'not very good' kind of way.": "Uma equipe com encantos modestos e aderência modesta e modesta... bem, digamos que a coisa toda é 'modesta'. De uma forma 'não muito boa'."
"A standard bow design used by orcish archers throughout the world. It's resilient yet accurate.": "Um desenho de arco padrão usado por arqueiros orcs em todo o mundo. É resiliente, mas preciso."
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.)": "Uma faca Ranalon padrão que também é uma arma perigosa. (Atua como uma faca de ostra.)"
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 35 enchantments.)": "Uma faca Ranalon padrão que também é uma arma perigosa. (Atua como uma faca de ostra.) (Com encantamentos aleatórios de nível 35.)"
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 40 enchantments.)": "Uma faca Ranalon padrão que também é uma arma perigosa. (Atua como uma faca de ostra.) (Com encantamentos aleatórios de nível 40.)"
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 45 enchantments.)": "Uma faca Ranalon padrão que também é uma arma perigosa. (Atua como uma faca de ostra.) (Com encantamentos aleatórios de nível 45.)"
"A steaming bowl of soup.": "Uma tigela fumegante de sopa."
"A stew which is definitely better than the sum of its ingredients.": "Um guisado que é definitivamente melhor que a soma dos ingredientes."
"A stick that's good for crushing.": "Um pedaço de pau que é bom para esmagar."
"A sticky blob of \"silk\" from a sand worm. It's not what you'd call silky.": "Uma gota pegajosa de “seda” de um verme da areia. Não é o que você chamaria de sedoso."
"A sticky cloth that's ideal for certain types of clothing.": "Um pano pegajoso ideal para certos tipos de roupas."
"A still-alive branch covered in still-alive treant leaves. The leaves seem... annoyed? Perhaps this should be given to a druid leader.": "Um galho ainda vivo coberto por folhas de treant ainda vivas. As folhas parecem... irritadas? Talvez isso devesse ser dado a um líder druida."
"A stinky flower. It's not going to be useful in bouquets, that's for sure.": "Uma flor fedorenta. Não vai servir em buquês, isso é certo."
"A stir-fried vegetarian dish with more than a hint of spice.": "Um prato vegetariano salteado com mais do que um toque de tempero."
"A stock arrow with improved fletching allowing for greater precision.": "Uma flecha coronha com penas aprimoradas permitindo maior precisão."
"A stock arrow with improved fletching allowing for greater precision. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha coronha com penas aprimoradas permitindo maior precisão. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A stock arrow. The kind bows shoot.": "Uma flecha de estoque. O tipo que dispara arcos."
"A stock arrow. The kind bows shoot. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha de estoque. O tipo que dispara arcos. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A stock shield used by countless orc armies.": "Um escudo usado por incontáveis ​​​​exércitos orcs."
"A straightforward but sophisticated tool for extracting fossils. (Keep it in your inventory and you'll be able to excavate fossil sites. There is a chance the pick will break with each use.)": "Uma ferramenta simples, mas sofisticada para extrair fósseis. (Mantenha-o em seu inventário e você poderá escavar locais de fósseis. Há uma chance de que a picareta quebre a cada uso.)"
"A strange cube. It once held augmentation magic, but it's been damaged beyond repair. You might be able to salvage something from it... if you knew how to open it without shattering it.": "Um cubo estranho. Ele já continha magia de aumento, mas foi danificado sem possibilidade de reparo. Talvez você consiga salvar alguma coisa dela... se soubesse como abri-la sem quebrá-la."
"A strange heavy disk. It plugs into something.": "Um estranho disco pesado. Ele se conecta a alguma coisa."
"A strange magical cube. It can be used to give a main-hand weapon a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar a uma arma principal uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give an off-hand weapon a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar a uma arma secundária uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give chest armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar à armadura torácica uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give foot armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar à armadura de pé uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give hand armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar à armadura de mão uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give head armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar à armadura de cabeça uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give leg armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar à armadura de perna uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give necklaces a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Ele pode ser usado para dar aos colares uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange magical cube. It can be used to give rings a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Um estranho cubo mágico. Pode ser usado para dar aos anéis uma habilidade mágica bônus. Visite um lojista de equipamentos (ou um aumentador de jogadores) para instalá-lo."
"A strange mechanism that can augment an arthropod's venomous attack capabilities. (Only wearable by spiders.)": "Um estranho mecanismo que pode aumentar as capacidades de ataque venenoso de um artrópode. (Só pode ser usado por aranhas.)"
"A strange organ cut out of a kuvou corpse.": "Um estranho órgão cortado de um cadáver kuvou."
"A strange padded belt that helps the wearer hold their ground.": "Um estranho cinto acolchoado que ajuda o usuário a se manter firme."
"A strange weapon made by trolls in a distant realm.": "Uma arma estranha feita por trolls em um reino distante."
"A strangely burned bone. It leaves black smudges on everything it touches.": "Um osso estranhamente queimado. Deixa manchas pretas em tudo que toca."
"A strangely heavy ring that can predict where danger will come from, and subtly move your body to prevent death.": "Um anel estranhamente pesado que pode prever de onde virá o perigo e mover sutilmente seu corpo para evitar a morte."
"A strangely-weighted off-hand knife that's good for bashing as well as stabbing.": "Uma faca de peso estranho que é boa tanto para golpear quanto para esfaquear."
"A string covered in weird little beads and shells.": "Um barbante coberto de pequenas contas e conchas estranhas."
"A strong but pleasant-smelling herb used in cooking.": "Erva forte, mas de cheiro agradável, usada na culinária."
"A strong dark beer that packs a punch. The preferred socialization drink of dwarves.": "Uma cerveja escura forte que dá um soco. A bebida de socialização preferida dos anões."
"A strong staff with a chemistry system on the end.": "Uma equipe forte com um sistema de química no final."
"A stuffed toy bear.": "Um ursinho de pelúcia."
"A stunning find! This is a truly ugly painting, but the lack of depth and proportion suggest that it was made by someone in the pre-Council era, making it at least 10,000 years old.": "Um achado impressionante! Esta é uma pintura verdadeiramente feia, mas a falta de profundidade e proporção sugere que foi feita por alguém da era pré-conciliar, o que significa que tem pelo menos 10.000 anos."
"A sturdy boring helmet.": "Um capacete robusto e chato."
"A sturdy military weapon made for ratkin. Thanks to impressive magic, it seems undamaged by years of extreme misuse.": "Uma arma militar robusta feita para ratkin. Graças à magia impressionante, parece não ter sido danificado por anos de uso indevido extremo."
"A sturdy torch in a sconce that can be installed in a home or guild hall.": "Uma tocha resistente em uma arandela que pode ser instalada em uma casa ou salão de guilda."
"A sub-par pair of leather leggings has been chopped inexpertly to make it more evasive. The result is humiliating in most respects.": "Um par de leggings de couro de baixa qualidade foi cortado de maneira inexperiente para torná-lo mais evasivo. O resultado é humilhante em muitos aspectos."
"A subpar goblin helm, dented and worn.": "Um elmo de goblin abaixo da média, amassado e desgastado."
"A substance made of cranium powder, mixed with chemicals that alter its effect.": "Substância feita de pó de crânio, misturada com produtos químicos que alteram seu efeito."
"A sudden transition is seen here: from elegant but large cowshoes to whisper-thin and unobtrusive ones. The secret is in the fit: it's marvelous.": "Uma transição repentina é vista aqui: de sapatos de vaca elegantes, mas grandes, para sapatos finos e discretos. O segredo está no ajuste: é maravilhoso."
"A sugary-sweet snack.": "Um lanche açucarado."
"A super-thick blue paste that accelerates the leg muscles far beyond their natural capacity.": "Uma pasta azul superespessa que acelera os músculos das pernas muito além da sua capacidade natural."
"A surprisingly complex beer, but... complexity doesn't always taste good.": "Uma cerveja surpreendentemente complexa, mas... a complexidade nem sempre sabe bem."
"A surprisingly fruity dark wine.": "Um vinho escuro surpreendentemente frutado."
"A surprisingly light and flavorful fish dish.": "Um prato de peixe surpreendentemente leve e saboroso."
"A surprisingly pleasant orcish dish. Traditionally brewed in vast quantities to feed an army.": "Um prato orc surpreendentemente agradável. Tradicionalmente fabricado em grandes quantidades para alimentar um exército."
"A sweet and minty disk of hard candy on a handy stick.": "Um disco doce e mentolado de rebuçados em um prático palito."
"A sweet and spicy disk of hard candy.": "Um disco doce e picante de rebuçados."
"A sweet appetizer.": "Um doce aperitivo."
"A sweet beer with hints of chocolate.": "Uma cerveja doce com notas de chocolate."
"A sweet disk of hard candy that tastes of watermelon.": "Um doce disco de rebuçado com gosto de melancia."
"A sweet disk of hard candy. It's supposed to taste like... SOMETHING... but it's impossible to say what.": "Um disco doce de bala dura. É suposto ter gosto de... ALGO... mas é impossível dizer o quê."
"A sweet millet-based candy bar.": "Uma barra de chocolate doce à base de milho."
"A sweet pastry apparently invented by trolls.": "Um doce aparentemente inventado por trolls."
"A sweet syrupy potion that warms the throat when drunk.": "Uma poção doce e xaroposa que aquece a garganta quando bebida."
"A sweet yet savory holiday meal.": "Uma refeição festiva doce, mas saborosa."
"A sweet, relatively palatable variety of vodka. Although it's a traditional dwarven drink, it long ago fell out of favor, and these days dwarves only use it for cooking.": "Uma variedade de vodka doce e relativamente saborosa. Embora seja uma bebida tradicional dos anões, há muito tempo caiu em desuso e hoje em dia os anões só a usam para cozinhar."
"A sweet-and-sour treat.": "Uma delícia agridoce."
"A symbol of Arisetsu adorns this otherwise-uninteresting staff.": "Um símbolo de Arisetsu adorna este cajado de outra forma desinteressante."
"A symbol of Arisetsu has been crudely carved into this crude staff.": "Um símbolo de Arisetsu foi esculpido grosseiramente neste cajado grosseiro."
"A symbol of Arisetsu has been etched into this inelegant staff. Functional but unimpressive.": "Um símbolo de Arisetsu foi gravado neste cajado deselegante. Funcional, mas inexpressivo."
"A symbol of merit granted by the Church of Arisetsu to the faithful. Sometimes they are given in exchange for donations; other times they are awarded for service.": "Símbolo de mérito concedido pela Igreja de Arisetsu aos fiéis. Às vezes são dados em troca de doações; outras vezes, são premiados pelo serviço prestado."
"A syrup of exotic tree seeds that will better attune your senses to the plant realm.": "Um xarope de sementes de árvores exóticas que irá sintonizar melhor os seus sentidos com o reino vegetal."
"A system of belts and harnesses worn around the hips and legs. Keeps equipment close at hand!": "Um sistema de cintos e arneses usados ​​ao redor dos quadris e pernas. Mantém o equipamento à mão!"
"A tacky necklace that calls upon Harukita, the God of Hate, to grant the wearer power. This power is typically used in pretty hateful ways. This necklace also acts as a necromancy gem.": "Um colar cafona que invoca Harukita, o Deus do Ódio, para conceder poder ao usuário. Este poder é normalmente usado de maneiras bastante odiosas. Este colar também atua como uma joia de necromancia."
"A talisman that clips behind a giant bat's ear, making it much smaller and hence less terrifying to some individuals.": "Um talismã que fica preso atrás da orelha de um morcego gigante, tornando-o muito menor e, portanto, menos assustador para alguns indivíduos."
"A talisman to harness necromantic energy.": "Um talismã para aproveitar a energia necromântica."
"A tarnished ancient coin. It feels heavy and strangely cold.": "Uma moeda antiga manchada. Parece pesado e estranhamente frio."
"A tart that's perfectly sweet and perfectly sour.": "Uma torta perfeitamente doce e perfeitamente azeda."
"A tasteful silver-and-pyrite chain with an opal pendant.": "Uma elegante corrente de prata e pirita com pingente de opala."
"A tasty and complex dish that makes the ingredients go a long way.": "Um prato saboroso e complexo que faz com que os ingredientes percorram um longo caminho."
"A tasty appetizer.": "Um saboroso aperitivo."
"A tasty baked dish with beef and veggies.": "Um saboroso prato assado com carne e vegetais."
"A tasty baked dish with mutton and veggies.": "Um saboroso prato assado com carne de carneiro e vegetais."
"A tasty beverage of cactus juice and some sweet ingredient Selaxi refuses to share.": "Uma saborosa bebida de suco de cacto e algum ingrediente doce que Selaxi se recusa a compartilhar."
"A tasty breakfast snack.": "Um saboroso lanche de café da manhã."
"A tasty meal served in flaky pastry.": "Uma saborosa refeição servida em massa folhada."
"A tasty meal that fills you up.": "Uma refeição saborosa que te enche."
"A tasty meal, best eaten hot.": "Uma refeição saborosa, melhor comida quente."
"A tasty meaty snack.": "Um saboroso lanche de carne."
"A tasty mushroom.": "Um cogumelo saboroso."
"A tasty plate for the hero on a diet.": "Um prato saboroso para o herói de dieta."
"A tasty seasonal snack.": "Um saboroso lanche sazonal."
"A tasty slab of meat.": "Um saboroso pedaço de carne."
"A tasty snack from the Red Wing casino.": "Um saboroso lanche do cassino Red Wing."
"A tasty snack.": "Um lanche saboroso."
"A tasty vegan snack.": "Um saboroso lanche vegano."
"A tasty vegetable dish.": "Um saboroso prato de vegetais."
"A tasty well-seasoned meal.": "Uma refeição saborosa e bem temperada."
"A terrible-smelling liquid that actually only tastes unpleasant, not terrible.": "Um líquido com um cheiro terrível que na verdade só tem um gosto desagradável, não terrível."
"A terrifying visage made of hardened scorpion sinews backed by reflective beetle carapaces.": "Um rosto aterrorizante feito de tendões endurecidos de escorpião apoiados por carapaças reflexivas de besouros."
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. This model is especially easy to use. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Um dispositivo terrivelmente complexo que pode analisar os códigos secretos enterrados nas profundezas de certas criaturas. Este modelo é especialmente fácil de usar. Aviso: muitas culturas consideram o estudo da genética um tabu. (Os geneticistas podem manter isso em inventário para ter a opção de analisar geneticamente esse tipo de criatura. Há 5% de chance de o dispositivo quebrar quando usado.)"
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Um dispositivo terrivelmente complexo que pode analisar os códigos secretos enterrados nas profundezas de certas criaturas. Aviso: muitas culturas consideram o estudo da genética um tabu. (Os geneticistas podem manter isso em inventário para ter a opção de analisar geneticamente esse tipo de criatura. Há 5% de chance de o dispositivo quebrar quando usado.)"
"A theoretically delicious mushroom.": "Um cogumelo teoricamente delicioso."
"A thick and ugly metal ring.": "Um anel de metal grosso e feio."
"A thick black paste that requires an iron stomach to drink. If you can keep it down, the potion protects from all types of damage, and even better, it can be combined with potions that protect against specific damage types.": "Uma pasta preta espessa que requer estômago de ferro para beber. Se você conseguir mantê-lo baixo, a poção protege contra todos os tipos de danos e, melhor ainda, pode ser combinada com poções que protegem contra tipos específicos de danos."
"A thick blanket that gives extra padding to a saddle. (Can be used for warmth in an emergency.)": "Uma manta grossa que dá acolchoamento extra à sela. (Pode ser usado para aquecimento em caso de emergência.)"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cold-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue frio. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cool-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue frio. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Fire-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento Sangue de Fogo. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Hot-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue quente. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Warm-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue quente. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with an Ice-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an emergency.)": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento Ice-Blooded. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecimento em caso de emergência.)"
"A thick blue paste that accelerates the leg muscles beyond their natural capacity.": "Uma pasta azul espessa que acelera os músculos das pernas além da sua capacidade natural."
"A thick dwarven helm. Etched inside is a quote: \"Where shall it be? Point me and I shall go. - Gondeem\"": "Um elmo anão grosso. Gravada dentro está uma citação: \"Onde estará? Aponte-me e eu irei. - Gondeem\""
"A thick gold chain with a medallion shaped like a pair of wings.": "Uma grossa corrente de ouro com um medalhão em forma de par de asas."
"A thick green paste that smells of pine needles and dirt.": "Uma pasta verde espessa que cheira a agulhas de pinheiro e sujeira."
"A thick greenish goo. It tastes delicious! Useful in brewing and cooking, and very occasionally in alchemy.": "Uma gosma espessa e esverdeada. Tem um gosto delicioso! Útil na fabricação de cerveja e culinária e, ocasionalmente, na alquimia."
"A thick layer of fungal \"skin\" peeled off of a dead fungus-man.": "Uma espessa camada de \"pele\" fúngica foi retirada de um homem-fungo morto."
"A thick layer of mold lines the inside, helping to seal the helmet to your head.": "Uma espessa camada de molde reveste o interior, ajudando a selar o capacete na cabeça."
"A thick onyx ring. Druidic symbols are etched along the inside, including the easily-recognizable symbol of Dreva: a shark.": "Um anel grosso de ônix. Símbolos druidas estão gravados no interior, incluindo o símbolo facilmente reconhecível de Dreva: um tubarão."
"A thick seasonal drink.": "Uma bebida sazonal espessa."
"A thick set of notes detailing how guild storage should be used. Can be installed in a guild hall to allow guildmates to purchase guild storage slots from the convenience of the hall.": "Um conjunto denso de notas detalhando como o armazenamento da guilda deve ser usado. Pode ser instalado em um salão da guilda para permitir que os membros da guilda comprem slots de armazenamento da guilda na conveniência do salão."
"A thick stew that fills you up.": "Um ensopado grosso que te enche."
"A thick stick. Really thick.": "Uma vara grossa. Muito grosso."
"A thick supportive cushion, perfect for lining boxes and dresser drawers.": "Uma almofada grossa de suporte, perfeita para forrar caixas e gavetas de cômodas."
"A thick treatise intended for those interested in breeding horses.": "Um tratado denso destinado aos interessados ​​na criação de cavalos."
"A thick wooden shield, etched with magical runes.": "Um grosso escudo de madeira, gravado com runas mágicas."
"A thick, cumbersome silver medallion etched with a simple drawing of a smiling elf's face.": "Um medalhão de prata grosso e pesado gravado com um desenho simples do rosto sorridente de um elfo."
"A thick, fairly toxic mushroom that can be made edible through care.": "Um cogumelo espesso e bastante tóxico que pode se tornar comestível com cuidado."
"A thick, hearty steak with a side of limp greens.": "Um bife grosso e farto com acompanhamento de verduras moles."
"A thick-brothed stew with huge chunks of tender meat. The color is a bit off-putting, but it's pretty tasty.": "Um ensopado em caldo grosso com enormes pedaços de carne tenra. A cor é um pouco desanimadora, mas é bem gostosa."
"A thin and non-descript blade that's been designed to maximize the impact of applied poisons.": "Uma lâmina fina e indescritível que foi projetada para maximizar o impacto dos venenos aplicados."
"A thin art book that contains drawings of elves au naturel.": "Um livro de arte fina que contém desenhos de elfos ao natural."
"A thin blanket embroidered with a depiction of a beaming sun. This style of blanket is often given out by followers of Arisetsu, the god of warmth and hope.": "Um cobertor fino bordado com a representação de um sol radiante. Este estilo de cobertor é frequentemente oferecido pelos seguidores de Arisetsu, o deus do calor e da esperança."
"A thin book.": "Um livro fino."
"A thin fluid used to create augmentation oils (for level 30 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 30)."
"A thin fluid used to create augmentation oils (for level 40 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 40)."
"A thin fluid used to create augmentation oils (for level 50 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 50)."
"A thin fluid used to create augmentation oils (for level 60 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 60)."
"A thin metal chain, now broken. It wasn't very high-quality in the first place, either.": "Uma fina corrente de metal, agora quebrada. Em primeiro lugar, também não era de muito alta qualidade."
"A thin ring made of white gold.": "Um anel fino feito de ouro branco."
"A thin scroll of goblin verse, focusing on the beauty of hard work, the wonders of nature, and the fairness of slavery. It has little value.": "Um fino pergaminho de versos goblins, enfocando a beleza do trabalho duro, as maravilhas da natureza e a justiça da escravidão. Tem pouco valor."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates blue sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria brilhos azuis por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates green sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria brilhos verdes por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates red sparkler for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria um brilho vermelho por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele brilha por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin volume of poetry by the goblin poet Gruzark. It has a homely, earthly feel. Which is poet-speak for \"it sucks.\" It has some exciting bits, though. Better than nothing.": "Um fino volume de poesia do poeta duende Gruzark. Tem uma sensação caseira e terrena. O que é linguagem de poeta para \"é uma merda\". No entanto, tem algumas partes emocionantes. Melhor do que nada."
"A thin volume of poetry. No pictures at all.": "Um fino volume de poesia. Nenhuma foto."
"A thin wire ring that smells awful.": "Um anel de arame fino que cheira horrível."
"A thorn from a flower.": "Um espinho de uma flor."
"A thorny protrusion from a spriggan weed or plant.": "Uma saliência espinhosa de uma erva daninha ou planta spriggan."
"A time-bending drink that allows one to perceive fairies before they exist.": "Uma bebida que altera o tempo e permite perceber as fadas antes que elas existam."
"A tiny batch of adhesive. It's used by crafters such as carpenters and fletchers.": "Um pequeno lote de adesivo. É usado por artesãos como carpinteiros e flecheiros."
"A tiny bit of unrefined ore. You'd need a bunch of these to make anything useful from them.": "Um pouquinho de minério não refinado. Você precisaria de um monte deles para fazer algo útil com eles."
"A tiny chunk of magma that has been magically prevented from cooling. Very weird.": "Um pequeno pedaço de magma que foi magicamente impedido de esfriar. Muito estranho."
"A tiny enchanted saw on a chain. But it's not just an amulet: upon command, the tiny saw can cut lumber at high speed! (This item acts as a handsaw.)": "Uma pequena serra encantada em uma corrente. Mas não é apenas um amuleto: sob comando, a pequena serra pode cortar madeira em alta velocidade! (Este item funciona como um serrote.)"
"A tiny harp. Sounds pretty good.": "Uma pequena harpa. Parece muito bom."
"A tiny key made of jade.": "Uma pequena chave feita de jade."
"A tiny metal fist on a chain.": "Um pequeno punho de metal preso a uma corrente."
"A tiny metal fist squeezing a man, who seems unperturbed. That's craftsmanship!": "Um pequeno punho de metal apertando um homem que parece imperturbável. Isso é artesanato!"
"A tiny metal foot on a chain.": "Um pequeno pé de metal preso a uma corrente."
"A tiny pinch of saltpeter, a strange substance with many magical uses.": "Uma pequena pitada de salitre, uma substância estranha com muitos usos mágicos."
"A tiny puff of animated air. Somehow it stays coherent.": "Uma pequena lufada de ar animado. De alguma forma, permanece coerente."
"A tiny puff of fetid air. Somehow it stays coherent.": "Uma pequena lufada de ar fétido. De alguma forma, permanece coerente."
"A tiny puff of humid air. Somehow it stays coherent.": "Uma pequena lufada de ar úmido. De alguma forma, permanece coerente."
"A tiny ring made of an otherworldly metal.": "Um pequeno anel feito de um metal de outro mundo."
"A tiny tart with cinnamon-pumpkin filling.": "Uma pequena torta com recheio de canela e abóbora."
"A tiny vial full of ooze of some sort.": "Um pequeno frasco cheio de algum tipo de lodo."
"A tiny vial of freezing-cold liquid.": "Um pequeno frasco de líquido gelado."
"A token of Ri-Shin's favor. The small branch is still fresh, with quite a few leaves. (See Snowleaf at the Shrine of Ri-Shin in Kur Mountains to trade these tokens for items.)": "Um sinal do favor de Ri-Shin. O pequeno galho ainda está fresco, com algumas folhas. (Veja Snowleaf no Santuário de Ri-Shin nas Montanhas Kur para trocar essas fichas por itens.)"
"A tool used aboard Fae ships during the repair of hull damage. It's quite heavy!": "Uma ferramenta usada a bordo de naves Fae durante o reparo de danos no casco. É bem pesado!"
"A tool used by rakshasa housebuilders, who like to hammer nails with their fists. This one has been cleaned up and enchanted.": "Uma ferramenta usada por construtores rakshasa, que gostam de martelar pregos com os punhos. Este foi limpo e encantado."
"A tophat, to make your mount look extra dapper.": "Uma cartola, para deixar sua montaria ainda mais elegante."
"A topical balm beloved by ranalon, who apply it to their skin continuously. Its effects are much weaker when applied to non-ranalon, but it is, at least, safe to use.": "Um bálsamo tópico apreciado por Ranalon, que o aplica continuamente na pele. Seus efeitos são muito mais fracos quando aplicados ao não ranalon, mas é, pelo menos, seguro de usar."
"A torn-off claw of a Demonic Swarmer. It twitches from time to time.": "Uma garra arrancada de um Enxame Demoníaco. Ele se contorce de vez em quando."
"A torso-shaped piece of fungal \"flesh\" from a fungus-man.": "Um pedaço de \"carne\" fúngica em forma de torso de um homem-fungo."
"A tough but highly portable snack consisting of chewy shark meat in a fried pepper husk. It's an acquired taste.": "Um lanche resistente, mas altamente portátil, que consiste em carne de tubarão em borracha com casca de pimenta frita. É um gosto adquirido."
"A tough head covering. Ugly, but practical.": "Uma cobertura resistente para a cabeça. Feio, mas prático."
"A tough little helmet.": "Um pequeno capacete resistente."
"A toxic weed of dubious utility.": "Uma erva tóxica de utilidade duvidosa."
"A traditional druidic training staff has been augmented with dozens of arcane sigils and then dipped in ... something waxy. Probably something organic. Best not to contemplate.": "Uma equipe de treinamento druida tradicional foi aumentada com dezenas de sigilos arcanos e depois mergulhada em... algo ceroso. Provavelmente algo orgânico. Melhor não contemplar."
"A transferrable day-pass to visit the parts of Rahu that are usually off-limits to tourists. While this permit lasts, the citizens of Rahu will not attack you and shopkeepers will generally be willing to deal with you. The pass becomes invalidated if you attack any Rahu citizen, and the plateau where the Onkara train is still off-limits.": "Um passe diário transferível para visitar as partes de Rahu que geralmente são proibidas aos turistas. Enquanto esta licença durar, os cidadãos de Rahu não irão atacá-lo e os lojistas geralmente estarão dispostos a negociar com você. O passe será invalidado se você atacar qualquer cidadão de Rahu, e o planalto onde o trem Onkara ainda estiver fora dos limites."
"A translucent handkerchief from a ghost. It should have turned into ectoplasm when separated from the ghost, but somehow it hasn't. Eerie.": "Um lenço translúcido de um fantasma. Deveria ter se transformado em ectoplasma quando separado do fantasma, mas de alguma forma isso não aconteceu. Sinistro."
"A trinket that augments various kinds of archery techniques.": "Uma bugiganga que aprimora vários tipos de técnicas de tiro com arco."
"A true masterpiece of potato-making. Well, actually, the potato itself is a little soggy. But the toppings are masterful!": "Uma verdadeira obra-prima da fabricação de batatas. Bem, na verdade, a batata em si está um pouco encharcada. Mas as coberturas são magistrais!"
"A tuft of fur from a manticore 'mane'.": "Um tufo de pêlo de uma 'juba' de manticora."
"A type of stone often found near demonspawn.": "Um tipo de pedra frequentemente encontrada perto de criaturas demoníacas."
"A uncommon starfish.": "Uma estrela do mar incomum."
"A useful form of rendered fat.": "Uma forma útil de gordura fundida."
"A useful spice for cooking. It has an aromatic, warm and slightly bitter taste.": "Um tempero útil para cozinhar. Apresenta um sabor aromático, quente e ligeiramente amargo."
"A vaguely grape-flavored disk of candy on a small stick.": "Um disco de doce com vagamente sabor de uva em um pequeno palito."
"A vaguely meat-flavored swill made all the more horrid with the addition of lumps of fur.": "Uma lavagem com sabor vagamente de carne tornava-se ainda mais horrível com a adição de pedaços de pele."
"A variety of morel, tasty in mushroom dishes and potent in alchemy as well.": "Uma variedade de morel, saboroso em pratos de cogumelos e potente também na alquimia."
"A variety of mycena mushroom with an especially ... unique... taste.": "Uma variedade de cogumelo mycena com um sabor especialmente...único."
"A Veilmoor clan promotional weapon. The blade psychically screams on contact with enemies.": "Uma arma promocional do clã Veilmoor. A lâmina grita psiquicamente ao entrar em contato com os inimigos."
"A versatile knife for skinning or butchering. (Keep it in your inventory and you'll be given the option to skin and/or butcher the corpses of some enemies.)": "Uma faca versátil para esfolar ou cortar. (Mantenha-o em seu inventário e você terá a opção de esfolar e/ou massacrar os cadáveres de alguns inimigos.)"
"A versatile knife for skinning, butchering, oyster-opening, or skull extraction. (Keep it in your inventory and you'll be given the option to skin, butcher, shuck, and/or extract the skull of some enemies.)": "Uma faca versátil para esfolar, cortar, abrir ostras ou extrair crânios. (Mantenha-o em seu inventário e você terá a opção de esfolar, abater, descascar e/ou extrair o crânio de alguns inimigos.)"
"A very complicated device that can help with tricky pathology inquiries. (+10 to your effective skill when autopsying a corpse.)": "Um dispositivo muito complicado que pode ajudar em investigações patológicas complicadas. (+10 para sua habilidade efetiva ao autopsiar um cadáver.)"
"A very dry wine that's quite drinkable.": "Um vinho muito seco e bastante bebível."
"A very hearty breakfast!": "Um café da manhã bem farto!"
"A very heavy shield.": "Um escudo muito pesado."
"A very large, well-made brass nail. Useful in Carpentry.": "Um prego de latão muito grande e bem feito. Útil em Carpintaria."
"A very nasty very heavy stick.": "Uma vara muito desagradável e pesada."
"A very old book. It looks to be a hand-scribed copy of a book called the Mnemonix Index for the Superficially Undead.": "Um livro muito antigo. Parece ser uma cópia manuscrita de um livro chamado Índice Mnemonix para Mortos Superficialmente."
"A very old goblet that remains cold to the touch even in hot weather. It's made of a strange metal that might be worth studying.": "Uma taça muito antiga que permanece fria ao toque mesmo em climas quentes. É feito de um metal estranho que talvez valha a pena estudar."
"A very old locket with a portrait of a human woman painted inside. The artistic quality is quite high. It is engraved, \"Don't cry, but don't forget. Love always, Caroline.\"": "Um medalhão muito antigo com o retrato de uma mulher humana pintado no interior. A qualidade artística é bastante elevada. Está gravado: \"Não chore, mas não esqueça. Ame sempre, Caroline.\""
"A very old style of Dwarven sword design.": "Um estilo muito antigo de design de espada anã."
"A very potent Elvish brew. Bitter as can be, but it warms you right up.": "Uma bebida élfica muito potente. Por mais amargo que possa ser, mas aquece você."
"A very rough alcoholic beverage. Some say you grow to like the taste, but others say that's just your tastebuds dying from the pain.": "Uma bebida alcoólica muito áspera. Alguns dizem que você passa a gostar do sabor, mas outros dizem que são apenas suas papilas gustativas morrendo de dor."
"A very sharp fist-weapon.": "Uma arma de punho muito afiada."
"A very simple elven-style hunting bow.": "Um arco de caça de estilo élfico muito simples."
"A very simple version of the classic human cookie. Edible, but probably best used for decoration.": "Uma versão muito simples do clássico biscoito humano. Comestível, mas provavelmente melhor usado para decoração."
"A very spicy version of Aromatic Chicken. Not for the faint of heart.": "Uma versão bem picante de Frango Aromático. Não para os fracos de coração."
"A very thorough explanation of how to find a huge hoard of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado na região de Eltibule."
"A very thorough explanation of how to find a huge hoard of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a huge hoard of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado ou afundado perto de Sun Vale."
"A very thorough explanation of how to find a large amount of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados na região de Eltibule."
"A very thorough explanation of how to find a large amount of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados no deserto de Ilmari."
"A very thorough explanation of how to find a large amount of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados ou afundados perto de Sun Vale."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado na região de Eltibule."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a legendary hoard of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado ou afundado perto de Sun Vale."
"A very thorough explanation of how to find a small amount of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado na região de Eltibule."
"A very thorough explanation of how to find a small amount of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a small amount of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado ou afundado perto de Sun Vale."
"A very unconventional salad that's surprisingly energizing.": "Uma salada pouco convencional e surpreendentemente energizante."
"A vial of Fruitbreath Juice.": "Um frasco de suco Fruitbreath."
"A vial of the strange substance known as mercury or quicksilver. It is used in hatmaking, gadget creation, and alchemy. Under no circumstances should it be drunk.": "Um frasco da estranha substância conhecida como mercúrio ou mercúrio. É usado na fabricação de chapéus, criação de dispositivos e alquimia. Sob nenhuma circunstância deve ser bebido."
"A vile-tasting potion used by some orcs and rakshasa.": "Uma poção de sabor horrível usada por alguns orcs e rakshasa."
"A volume of elven verse. The rhymes are forced and the lines scan poorly, but hey, it's elven verse -- somebody will want this junk.": "Um volume de versos élficos. As rimas são forçadas e os versos são mal lidos, mas ei, são versos élficos - alguém vai querer esse lixo."
"A volume of the famous 37-book series describing the history of the gods. This edition includes annotations and commentary from the Council.": "Um volume da famosa série de 37 livros que descreve a história dos deuses. Esta edição inclui anotações e comentários do Concílio."
"A voucher for 10 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 10 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 100 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 100 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 25 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 25 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 50 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 50 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A warm and pleasant ring that doesn't really seem too fearsome. Just nice.": "Um anel quente e agradável que não parece muito assustador. Muito legal."
"A warm bowl of soup.": "Uma tigela de sopa quente."
"A warm crystal that seems to constantly grow and shrink.": "Um cristal quente que parece crescer e encolher constantemente."
"A warm nourishing meal.": "Uma refeição quente e nutritiva."
"A warm piece of magical crystal.": "Um pedaço quente de cristal mágico."
"A warm sludgey liquid.": "Um líquido quente e lamacento."
"A warm sweet dessert meal.": "Uma sobremesa quente e doce."
"A watery fruit from the distant crone lands.": "Uma fruta aquosa das terras distantes da velha."
"A watery soup. Edible but not at all inspiring.": "Uma sopa aguada. Comestível, mas nada inspirador."
"A wax-sealed decanter full of liquified bones.": "Uma garrafa selada com cera cheia de ossos liquefeitos."
"A weapon design from a far-away land.": "Um projeto de arma de uma terra distante."
"A weapon for experienced staff-fighters who wish to get a little more oomph out of their lunges.": "Uma arma para lutadores experientes que desejam obter um pouco mais de força em suas estocadas."
"A weapon made by a ratkin martial artist. It fits poorly to other races' hands, but it's nothing a little adhesive can't fix.": "Uma arma feita por um artista marcial ratkin. Não cabe bem nas mãos de outras raças, mas não é nada que um pouco de adesivo não resolva."
"A weapon made by ratkin martial artists. Ratkins are renowned for their use of poison.": "Uma arma feita por artistas marciais ratkin. Ratkins são conhecidos pelo uso de veneno."
"A weapon whose appearance belies the skill of the ratkin crafter. Making a blade this sharp out of junk metal isn't easy.": "Uma arma cuja aparência desmente a habilidade do artesão ratkin. Fazer uma lâmina tão afiada com lixo não é fácil."
"A weed with inedible berries.": "Uma erva daninha com frutos não comestíveis."
"A weighty shield.": "Um escudo pesado."
"A weird container made of crystal. Inside is the essence of knowledge in liquid form. Used by the most advanced crafters.": "Um estranho recipiente feito de cristal. Dentro está a essência do conhecimento em forma líquida. Usado pelos artesãos mais avançados."
"A weird elven rune on a chain. Unlike most elven rune amulets, this one was mass-produced in Verta for export to other lands. Not exactly a triumph of art, but its protective magic is undeniable.": "Uma runa élfica estranha em uma corrente. Ao contrário da maioria dos amuletos rúnicos élficos, este foi produzido em massa em Verta para exportação para outras terras. Não é exatamente um triunfo da arte, mas a sua magia protetora é inegável."
"A weird mineral found near the rubywall crystals; the origin is completely unknown, and the name seems to be a misnomer.": "Um mineral estranho encontrado perto dos cristais da parede de rubi; a origem é completamente desconhecida e o nome parece ser um nome impróprio."
"A weird old coin that seems strangely heavy.": "Uma moeda antiga e estranha que parece estranhamente pesada."
"A weird puff of animated air. It's odd how it doesn't disperse.": "Uma estranha lufada de ar animado. É estranho como ele não se dispersa."
"A weird symbol carved into a strange metal.": "Um símbolo estranho esculpido em um metal estranho."
"A well-balanced knife designed for throwing. (Used with the Knife combat skill.)": "Uma faca bem equilibrada projetada para arremesso. (Usado com a habilidade de combate Faca.)"
"A well-bundled roll of crude leather.": "Um rolo bem empacotado de couro bruto."
"A well-known painting by the dwarven artist Kot Bhenul. Signed and numbered! This is a great find.": "Uma conhecida pintura do artista anão Kot Bhenul. Assinado e numerado! Este é um ótimo achado."
"A well-made but simple lute, perfect for beginners.": "Um alaúde bem feito, mas simples, perfeito para iniciantes."
"A well-made helmet that will keep you alive in combat. But you'll sweat profusely in it, and you don't want to know what it's going to do to your hair.": "Um capacete bem feito que o manterá vivo em combate. Mas você vai suar muito com isso e não quer saber o que isso vai fazer com seu cabelo."
"A well-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma escolha de mineração bem feita de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A well-made omelet is an attractive and delicious meal. This one's full of ham and cheese.": "Uma omelete bem feita é uma refeição atraente e deliciosa. Este está cheio de presunto e queijo."
"A well-made wooden mesh, useful for cages, pens, trellises, and so on.": "Uma malha de madeira bem feita, útil para gaiolas, currais, treliças e assim por diante."
"A well-preserved and salted fish, perfect for snacking.": "Um peixe bem conservado e salgado, ideal para petiscar."
"A well-preserved and salted fish. An ... interesting... snack.": "Um peixe bem conservado e salgado. Um... interessante... lanche."
"A well-preserved and salted fish. This makes an amazing snack!": "Um peixe bem conservado e salgado. Isso faz um lanche incrível!"
"A well-preserved book of poems.": "Um livro de poemas bem preservado."
"A well-preserved volume of poems.": "Um volume de poemas bem preservado."
"A well-recognized hat in spider culture that denotes friendliness and approachability. The hat has been enhanced with powerful magic that shrinks the spider to seem less scary.": "Um chapéu bem conhecido na cultura das aranhas que denota simpatia e acessibilidade. O chapéu foi aprimorado com uma magia poderosa que encolhe a aranha para parecer menos assustadora."
"A well-recognized hat in Spider culture. This denotes that the spider wearing it is quite friendly, and not to be feared.": "Um chapéu bem conhecido na cultura Spider. Isso denota que a aranha que o usa é bastante amigável e não deve ser temida."
"A well-roasted turkey leg makes a great snack!": "Uma perna de peru bem assada é um ótimo lanche!"
"A werewolf wore these boots while transforming a few too many times. The armor quality is totally shot, but it still has some value.": "Um lobisomem usou essas botas enquanto se transformava muitas vezes. A qualidade da armadura é totalmente fraca, mas ainda tem algum valor."
"A whimsically-named ranalon dish from the Povus region.": "Um prato de ranalon com nome caprichoso da região de Povus."
"A white-label horn sold as part of Povus's product line. It's unclear who actually created it.": "Uma buzina de marca branca vendida como parte da linha de produtos da Povus. Não está claro quem realmente o criou."
"A wintry woodland scene featuring a little elf girl crying. You don't recognize the artist's name, but it dates back at least 1300 years, so that's something.": "Uma cena de floresta invernal com uma garotinha elfa chorando. Você não reconhece o nome do artista, mas ele data de pelo menos 1.300 anos, então isso é alguma coisa."
"A wisp of demonic essence. Gather enough of these and you can combine their energies into a Demonic Essence.": "Um fio de essência demoníaca. Reúna um número suficiente deles e você poderá combinar suas energias em uma Essência Demoníaca."
"A wooden instrument that was invented by lumberjacks in Sedgewick Forest to ward off treant saplings.": "Um instrumento de madeira que foi inventado por lenhadores na Floresta de Sedgewick para afastar mudas de árvores."
"A wooden instrument with terrible and toxic enchantments. Even touching it to your lips causes slight pain.": "Um instrumento de madeira com encantamentos terríveis e tóxicos. Até mesmo tocá-lo nos lábios causa uma leve dor."
"A wooden ring designed to be worn at the base of a fox's tail.": "Um anel de madeira projetado para ser usado na base da cauda de uma raposa."
"A wool hat made by a sentient sheep. It's very comfy!": "Um gorro de lã feito por uma ovelha consciente. É muito confortável!"
"A yeti invention of boiled mutton in matted fur. The stench is impressive. The taste is unique, and not as bad as you'd expect.": "Uma invenção do Yeti de carneiro cozido com pele emaranhada. O fedor é impressionante. O sabor é único e não tão ruim quanto você esperaria."
