"Yield": "+240% more mushrooms than normal"
"Yogoki's Calling Card": "Cartão de visita de Yogoki"
"Yogzi created this convenient butcher knife that can also extract skulls. (+3 to your effective skill when Butchering or Extracting Skulls). (Keep it in your inventory and you'll be given the option to butcher and/or extract the skull of some enemies.)": "Yogzi criou esta faca de açougueiro conveniente que também pode extrair crânios. (+3 para sua habilidade efetiva ao massacrar ou extrair crânios). (Mantenha-o em seu inventário e você terá a opção de abater e/ou extrair o crânio de alguns inimigos.)"
"Yogzi's Butcher Knife": "Faca de açougueiro de Yogzi"
"You become a raven. Use the Move Up key to fly. Your attacks will do negligible damage. But you can fly, so that's something.": "Você se torna um corvo. Use a tecla Move Up para voar. Seus ataques causarão danos insignificantes. Mas você pode voar, então isso é alguma coisa."
"You can kind of make out little orc faces and little stork bodies in this abstract painting, although you have to squint. It's bright and upbeat, but you've never heard of the painter.": "Você pode distinguir pequenos rostos de orcs e pequenos corpos de cegonha nesta pintura abstrata, embora seja necessário apertar os olhos. É brilhante e otimista, mas você nunca ouviu falar do pintor."
"You can sit in it.": "Você pode sentar nele."
"You can use the ability Hymn of Resurrection. (Equipping this item will teach you the ability if needed.)": "Você pode usar a habilidade Hino da Ressurreição. (Equipar este item lhe ensinará a habilidade, se necessário.)"
"You don't want to think about the taste... it's best to drink something strong afterwards.": "Você não quer pensar no sabor... é melhor beber algo forte depois."
"You feel nice wearing a leather shirt like this. Nice enough to be able to dodge arrows.": "Você se sente bem vestindo uma camisa de couro como esta. Bom o suficiente para ser capaz de desviar de flechas."
"You get the feeling that, even when they were brand new, these pants already had that great worn-in feeling. The padding is strong but not bulky and the leather smell is intoxicating.": "Você tem a sensação de que, mesmo quando novas, essas calças já tinham aquela sensação ótima de uso. O estofamento é forte, mas não volumoso, e o cheiro de couro é inebriante."
"You never expected that cold-weather gear made from bits and bobs of nature would work so well.": "Você nunca esperou que equipamentos para clima frio feitos de pedaços da natureza funcionassem tão bem."
"You recover 300 Health. 25 seconds later, you take 1000 Poison damage.": "Você recupera 300 pontos de vida. 25 segundos depois, você sofre 1000 de dano de Veneno."
"You reflect 4% of any physical attack damage (Slashing, Piercing, or Crushing) back at the attacker.": "Você reflete 4% de qualquer dano de ataque físico (cortante, perfurante ou esmagador) de volta ao atacante."
"You reflect 5% of any physical attack damage (Slashing, Piercing, or Crushing) back at the attacker.": "Você reflete 5% de qualquer dano de ataque físico (cortante, perfurante ou esmagador) de volta ao atacante."
"You thought you'd seen a cow-shoe masterpiece before, but this just reset your expectations!": "Você pensou que já tinha visto uma obra-prima de sapato de vaca antes, mas isso apenas redefiniu suas expectativas!"
"You would never realize these pants were crafted by treants... if indeed they were crafted by treants. (Followers of Ri-Shin constantly lie about how many things are crafted by treants. Most likely, it was elves.)": "Você nunca perceberia que essas calças foram feitas por entes... se de fato elas foram feitas por entes. (Os seguidores de Ri-Shin mentem constantemente sobre quantas coisas são criadas por entes. Provavelmente foram elfos.)"
"You would not believe how big this praying mantis was. Well, YOU might.": "Você não acreditaria quão grande era esse louva-a-deus. Bem, VOCÊ pode."
"You'd almost think these were metal, that's how great these bits of wood are!": "Você quase pensaria que eram de metal, esses pedaços de madeira são lindos!"
"Your next direct attack will apply anti-invincibility poison to the target for 15 seconds": "Seu próximo ataque direto aplicará veneno anti-invencibilidade ao alvo por 15 segundos"
"Your violent cow will be made all the more violent by these uncomfortable shoes!": "Sua vaca violenta ficará ainda mais violenta com esses sapatos desconfortáveis!"
