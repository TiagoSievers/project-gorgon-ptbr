"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Wind Performance. If you have a vague understanding of the skill, you can drink it to gain experience.": "Este pequeno frasco contém a essência resumida do conhecimento sobre uma habilidade específica, Desempenho do Vento. Se você tiver uma vaga compreensão da habilidade, poderá bebê-la para ganhar experiência."
"This tiny gourd floats around your head and emits evil light.": "Esta pequena cabaça flutua em volta da sua cabeça e emite uma luz maligna."
"This tiny gourd floats around your head and watches what you do.": "Esta pequena cabaça flutua em volta da sua cabeça e observa o que você faz."
"This token is the special currency of the Crafter's Guild. It seems to have no real Council value to it, but the members of the Crafting Caravan value them for trade among fellow professionals.": "Este token é a moeda especial da Guilda dos Artesãos. Parece não ter nenhum valor real no Conselho, mas os membros da Caravana de Artesanato os valorizam para o comércio entre colegas profissionais."
"This token was earned by participating in a live event. The live-event system no longer uses tokens like this, though, and now this token is just a reminder of fun times had.": "Este token foi ganho participando de um evento ao vivo. O sistema de eventos ao vivo não usa mais tokens como este, e agora esse token é apenas um lembrete dos momentos divertidos."
"This tongue-numbing drink doesn't taste good. But it doesn't taste BAD, either.": "Esta bebida para entorpecer a língua não tem um gosto bom. Mas também não tem um gosto RUIM."
"This tough leather armor is interwoven with magical threads that supposedly keep psionic attacks at bay.": "Esta resistente armadura de couro é entrelaçada com fios mágicos que supostamente mantêm os ataques psiônicos afastados."
"This tough-but-ugly ring makes Punch attacks deal more damage.": "Este anel resistente, mas feio, faz com que os ataques de soco causem mais danos."
"This toxic compound burns the body, but it masks the symptoms of alcohol withdrawal. Carried in every dwarven medical kit.": "Este composto tóxico queima o corpo, mas mascara os sintomas da abstinência do álcool. Carregado em todos os kits médicos dos anões."
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 35 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 35.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 40 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 40.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 45 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 45.)"
"This type of armor can be found in picture-books, but nobody has met an actual Thorian in quite some time.": "Este tipo de armadura pode ser encontrada em livros ilustrados, mas há muito tempo ninguém encontra um Thorian de verdade."
"This ugly blue ring enhances most Psychology healing effects by 50.": "Este feio anel azul aumenta a maioria dos efeitos de cura da Psicologia em 50."
"This ugly leather thing is supposed to be worn on the head, apparently.": "Aparentemente, essa coisa feia de couro deveria ser usada na cabeça."
"This ugly piece has been preserved through the ages solely because it depicts Grigtekark, a goblin holy land.": "Esta peça feia foi preservada ao longo dos tempos apenas porque representa Grigtekark, uma terra sagrada dos goblins."
"This ugly purple ring magically strengthens your ankles so that falling from great heights isn't quite as painful. It's a pretty weak enchantment, really.": "Este feio anel roxo fortalece magicamente seus tornozelos para que cair de grandes alturas não seja tão doloroso. É um encantamento bem fraco, na verdade."
"This unassuming-looking weapon hides a series of fire runes on the inside of the flight groove.": "Esta arma de aparência despretensiosa esconde uma série de runas de fogo no interior da ranhura de voo."
"This uncomfortable wooden spider suit was designed with the best of intentions. It just sucks. But the wood can act as a focal point for druidic spiders.": "Este desconfortável traje de aranha de madeira foi projetado com a melhor das intenções. É simplesmente uma merda. Mas a madeira pode atuar como ponto focal para aranhas druidas."
"This ungainly hammer has an inscription: 'Not even their bones must survive. - Ku Turla'": "Este martelo desajeitado tem uma inscrição: 'Nem mesmo os seus ossos devem sobreviver. -Ku Turla'"
"This unidentified pastoral seems to be in good condition.": "Esta pastoral não identificada parece estar em bom estado."
"This unidentified portrait is remarkably lifelike.": "Este retrato não identificado é extremamente realista."
"This vaguely-green metal ring improves an Unarmed ability: Cobra Strike.": "Este anel de metal vagamente verde melhora uma habilidade desarmada: Cobra Strike."
"This variant of the Ri-Shin hat is used by humans to differentiate teams for winter games. Vol-Mu, or Volmue, is a long-deceased god of winter. In the human telling of the myth, Ri-Shin defeated Vol-Mu to allow spring to return to the land.": "Esta variante do chapéu Ri-Shin é usada pelos humanos para diferenciar os times nos jogos de inverno. Vol-Mu, ou Volmue, é um deus do inverno há muito falecido. Na narrativa humana do mito, Ri-Shin derrotou Vol-Mu para permitir que a primavera retornasse à terra."
"This variety of cider is made from sour apples and has a complex array of taste sensations. Pity you won't remember the taste after blacking out from it...": "Esta variedade de cidra é feita de maçãs ácidas e possui uma complexa gama de sensações gustativas. Pena que você não vai se lembrar do sabor depois de desmaiar..."
"This vial of liquid contains fragments of animated plants' roots, still writhing. Chug it down and don't think about it!": "Este frasco de líquido contém fragmentos de raízes de plantas animadas, ainda se contorcendo. Beba e não pense nisso!"
"This vinegar infusion is a closely-guarded secret.": "Esta infusão de vinagre é um segredo bem guardado."
"This vinegar infusion is only needed in the fanciest of dishes.": "Esta infusão de vinagre só é necessária nos pratos mais sofisticados."
"This vodka has been aged and is ready to be filtered and flavored.": "Esta vodka foi envelhecida e está pronta para ser filtrada e aromatizada."
"This vodka needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Esta vodka precisa ser armazenada em uma caverna por uma hora antes de se tornar potável. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This was designed to empower Winter Court fae who've installed Ice Hearts in themselves. Others who can stomach the liquid still gain its benefits, but also a nasty side-effect. (Due to the ingredients, this potion is supposedly forbidden by the Autumn Council of Forbidders.)": "Isso foi projetado para capacitar as fadas da Corte Invernal que instalaram Corações de Gelo em si mesmas. Outros que conseguem engolir o líquido ainda obtêm seus benefícios, mas também um efeito colateral desagradável. (Devido aos ingredientes, esta poção é supostamente proibida pelo Conselho dos Proibidores do Outono.)"
"This was enchanted by a competent apprentice, but it's nothing special.": "Isso foi encantado por um aprendiz competente, mas não tem nada de especial."
"This was made by an advanced apprentice, perhaps. While not a masterpiece, it avoids all the classic blunders of staff-making.": "Isso foi feito por um aprendiz avançado, talvez. Embora não seja uma obra-prima, evita todos os erros clássicos de criação de equipe."
"This was obviously intended to be a Potion of Universal Resistance, but the ingredients were added in the wrong order, resulting in a revolting soup with an unpredictable effect.": "Obviamente, a intenção era ser uma Poção de Resistência Universal, mas os ingredientes foram adicionados na ordem errada, resultando em uma sopa revoltante com um efeito imprevisível."
"This was once a Winter Court helm that was repurposed. Instead of twisting the mind, it protects against such things.": "Este já foi um elmo da Corte Winter que foi reaproveitado. Em vez de distorcer a mente, protege contra tais coisas."
"This was once owned by a powerful shaman who protected cute woodland animals. A tiny bit of his soul resides in this shield. If you don't use it, you're throwing away his life's work!": "Este já foi propriedade de um poderoso xamã que protegia lindos animais da floresta. Um pouquinho de sua alma reside neste escudo. Se você não usar, estará jogando fora o trabalho da vida dele!"
"This was the favored match-stick of a minor flame spirit.": "Este era o fósforo preferido de um espírito de chama menor."
"This whisky has been aged and is ready to be filtered and flavored.": "Este whisky foi envelhecido e está pronto para ser filtrado e aromatizado."
"This whisky needs to be stored in a cave for two hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este whisky precisa ser armazenado em uma caverna por duas horas antes de poder ser bebível. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This white gem with purple streaks is exceptionally strong and makes very resilient jewelry. In magic, it is likewise associated with toughness.": "Esta gema branca com listras roxas é excepcionalmente forte e produz joias muito resistentes. Na magia, também está associado à resistência."
"This wine hasn't been kept in an ideal environment and is now basically undrinkable.": "Este vinho não foi guardado num ambiente ideal e agora é basicamente intragável."
"This wooden ring is carved with elven sword-runes.": "Este anel de madeira é esculpido com runas de espadas élficas."
"This wooden staff is icy cold to the touch.": "Este cajado de madeira é gelado ao toque."
"This writ is redeemable for 1 point during the Writ Challenge event.": "Este mandado pode ser resgatado por 1 ponto durante o evento Writ Challenge."
"This writ is redeemable for 25 points and 250,000 councils during the Writ Challenge event. Use this writ to get a special quest, then see the Writ Master located near the Serbule well to collect your prize.": "Este mandado pode ser resgatado por 25 pontos e 250.000 conselhos durante o evento Writ Challenge. Use este mandado para obter uma missão especial e, em seguida, consulte o Writ Master localizado perto do poço Serbule para receber seu prêmio."
"This... this is not a lager. This is a bottle of mushroom bits.": "Isto... isto não é uma cerveja. Esta é uma garrafa de pedaços de cogumelo."
