"A baked potato that has been rotated at a perfect consistency for hours. As far as plain ungarnished potatoes go, this is great...": "Uma batata assada que foi girada com consistência perfeita por horas. No que diz respeito a batatas simples e sem guarnição, isso é ótimo..."
"A baked potato topped with fresh butter.": "Uma batata assada coberta com manteiga fresca."
"A baked potato with delicious melted cheese.": "Uma batata assada com um delicioso queijo derretido."
"A baked potato.": "Uma batata assada."
"A ball of paper that explodes into a colorful burst when lit.": "Uma bola de papel que explode em uma explosão colorida quando acesa."
"A ball of yarn made of an exotic material.": "Um novelo de lã feito de um material exótico."
"A ball of yarn.": "Um novelo de lã."
"A bar of magic-amplifying Xedrite metal. Some unknown metallurgy has been performed on it.": "Uma barra de metal Xedrite amplificador de magia. Alguma metalurgia desconhecida foi realizada nele."
"A barbaric act of cruelty to cotton.": "Um ato bárbaro de crueldade com o algodão."
"A basic but filling rye. Has a complex aroma and hints of molasses.": "Um centeio básico, mas farto. Possui aroma complexo e notas de melaço."
"A basic racing saddle.": "Um selim básico de corrida."
"A basic saw for cutting wood.": "Uma serra básica para cortar madeira."
"A basic skinning knife for novice skinners. (+2 to your effective skill when skinning.)": "Uma faca de esfola básica para esfoladores novatos. (+2 para sua habilidade efetiva ao esfolar.)"
"A basic whittling knife for novice whittlers.": "Uma faca de talhar básica para talhadores novatos."
"A bastion of basic-shoe quality in a sea of basic-shoe sadness.": "Um bastião da qualidade do calçado básico em um mar de tristeza do calçado básico."
"A beaker for exploding stuff. Held in the main hand.": "Um copo para explodir coisas. Segurado na mão principal."
"A beaker for flinging chemicals in combat. Held in the main hand.": "Um copo para arremessar produtos químicos em combate. Segurado na mão principal."
"A beaker full of a very, very stinky substance.": "Um copo cheio de uma substância muito, muito fedorenta."
"A beat up wooden spoon. It's taken some damage.": "Uma colher de pau surrada. Levou algum dano."
"A beautiful (if perhaps a bit gaudy) ring with a good heft to it.": "Um lindo (embora talvez um pouco chamativo) anel com um bom peso."
"A beautiful (if simple) ring with a magical glow.": "Um lindo (embora simples) anel com um brilho mágico."
"A beautiful and well-made lens that makes objects seem a little bit larger. It doesn't seem very useful; maybe it's for old people.": "Uma lente bonita e bem feita que faz os objetos parecerem um pouco maiores. Não parece muito útil; talvez seja para idosos."
"A beautiful big blue stone. In magic it is associated with flight and the sky.": "Uma linda e grande pedra azul. Na magia está associado ao vôo e ao céu."
"A beautiful blue stone. In magic it is associated with flight and the sky.": "Uma linda pedra azul. Na magia está associado ao vôo e ao céu."
"A beautiful chain with a slightly-large purple gem. It has a multifaceted glamour that makes the crystal seem to constantly twinkle.": "Uma linda corrente com uma gema roxa ligeiramente grande. Possui um glamour multifacetado que faz com que o cristal pareça brilhar constantemente."
"A beautiful collar with a unique identification number chiseled into the inside. As well as being made of silver, it might be useful for accessing certain supply crates.": "Uma linda coleira com um número de identificação exclusivo gravado no interior. Além de ser feito de prata, pode ser útil para acessar certas caixas de suprimentos."
"A beautiful fresh flower.": "Uma linda flor fresca."
"A beautiful green crystal. It has been tuned as an amplifier for certain weapon-crafting recipes.": "Um lindo cristal verde. Foi ajustado como um amplificador para certas receitas de fabricação de armas."
"A beautiful orb that grew inside an oyster or other mollusc. While geologists don't consider this a gem, jewelers do. It can be used in magic to convey water-related benefits.": "Um lindo orbe que cresceu dentro de uma ostra ou outro molusco. Embora os geólogos não considerem isso uma joia, os joalheiros consideram. Pode ser usado em magia para transmitir benefícios relacionados à água."
"A beautiful shell with a mellow sound.": "Uma bela concha com um som suave."
"A beginner's crossbow.": "Uma besta para iniciantes."
"A bell pepper full of steak! Mm. Meaty.": "Um pimentão cheio de bife! Hum. Carnudo."
"A bell, for making noise.": "Uma campainha, para fazer barulho."
"A belt adorned with an odd rune that gives the wearer a certain kind of luck.": "Um cinto adornado com uma runa estranha que dá ao usuário um certo tipo de sorte."
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. An inscription on the back in elvish reads, \"To the hunter of my heart. May you always find joy in nature. -Y\"": "Um cinto adornado com uma runa estranha que dá ao usuário um certo tipo de sorte. Uma inscrição no verso em élfico diz: \"Para o caçador do meu coração. Que você sempre encontre alegria na natureza. -Y\""
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. Echur has augmented this particular belt.": "Um cinto adornado com uma runa estranha que dá ao usuário um certo tipo de sorte. Echur ampliou este cinturão específico."
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. It has been custom-sized to fit around the middle of a gigantic spider.": "Um cinto adornado com uma runa estranha que dá ao usuário um certo tipo de sorte. Foi dimensionado sob medida para caber no meio de uma aranha gigante."
"A belt adorned with numerous frog runes that gives the wearer a certain kind of luck.": "Um cinto adornado com inúmeras runas de sapo que dá ao usuário um certo tipo de sorte."
"A belt buckle with a holy symbol painted on it, allowing the wearer to tap into the grace of Arisetsu. Unfortunately, the belt is extremely painful to wear, and even worse, the paint is very delicate: prolonged use in combat will cause the belt to break, requiring replacement.": "Uma fivela de cinto com um símbolo sagrado pintado, permitindo ao usuário aproveitar a graça de Arisetsu. Infelizmente, o cinto é extremamente doloroso de usar e, pior ainda, a pintura é muito delicada: o uso prolongado em combate fará com que o cinto se quebre, necessitando de substituição."
"A belt covered in hooks that face inward, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Um cinto coberto de ganchos voltados para dentro, causando dor intensa ao usuário. A maioria das pessoas nunca usaria tal cinto, mas os masoquistas podem achar que esta dor aumenta a sua sensação de sobrevivência."
"A belt covered in small knives that impale the wearer, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Um cinto coberto por pequenas facas que empalam o usuário, causando-lhe dor intensa. A maioria das pessoas nunca usaria tal cinto, mas os masoquistas podem achar que esta dor aumenta a sua sensação de sobrevivência."
"A belt covered in terrible spikes that face inward, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Um cinto coberto de pontas terríveis voltadas para dentro, causando dor intensa ao usuário. A maioria das pessoas nunca usaria tal cinto, mas os masoquistas podem achar que esta dor aumenta a sua sensação de sobrevivência."
"A belt for creepy summoners.": "Um cinto para invocadores assustadores."
"A belt for debuffers that need accuracy.": "Um cinto para debuffers que precisam de precisão."
"A belt for hoarders.": "Um cinto para acumuladores."
"A belt for sneaky hoarders.": "Um cinto para colecionadores sorrateiros."
"A belt for tricky poisoners.": "Um cinto para envenenadores astutos."
"A belt for warriors that need accuracy.": "Um cinto para guerreiros que precisam de precisão."
"A belt with broken glass along the interior, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Um cinto com vidro quebrado em seu interior, causando dor intensa ao usuário. A maioria das pessoas nunca usaria tal cinto, mas os masoquistas podem achar que esta dor aumenta a sua sensação de sobrevivência."
"A belt with multiple pockets.": "Um cinto com vários bolsos."
"A better-made helmet for a better-made bovine.": "Um capacete melhor feito para um bovino melhor feito."
"A big black stone. It has been tuned as an amplifier for certain toolcrafting recipes.": "Uma grande pedra negra. Ele foi ajustado como um amplificador para certas receitas de criação de ferramentas."
"A big blue stone, almost teal in color. In magic, it is associated with beaches and waves.": "Uma grande pedra azul, quase azul-petróleo. Na magia, está associado a praias e ondas."
"A big blue-green stone. It has been tuned as an amplifier for certain armorsmithing recipes.": "Uma grande pedra azul esverdeada. Ele foi ajustado como um amplificador para certas receitas de armadura."
"A big bunch of purple grapes.": "Um grande cacho de uvas roxas."
"A big bunch of semisweet mulberries.": "Um grande cacho de amoras meio amargas."
"A big canine from some animal. It's glowing, and is clearly enchanted. Fascinating.": "Um grande canino de algum animal. Está brilhando e claramente encantado. Fascinante."
"A big chunk of cow meat.": "Um grande pedaço de carne de vaca."
"A big chunk of glass infused with intellect-improving magic. It could make animals smarter permanently. Or you could use it on yourself, but the effects would only last a while.": "Um grande pedaço de vidro infundido com magia que melhora o intelecto. Poderia tornar os animais mais inteligentes permanentemente. Ou você poderia usá-lo em si mesmo, mas os efeitos durariam apenas um pouco."
"A big chunk of glass infused with intellect-improving magic. You could use it on yourself to boost your intellect for a while.": "Um grande pedaço de vidro infundido com magia que melhora o intelecto. Você poderia usá-lo em si mesmo para aumentar seu intelecto por um tempo."
"A big chunk of magical crystal. It's pleasantly warm in your palm.": "Um grande pedaço de cristal mágico. Está agradavelmente quente na palma da mão."
"A big chunk of red crystal. Kind of pretty. Not a normal crystal though. Seems manufactured.": "Um grande pedaço de cristal vermelho. Meio bonito. Mas não é um cristal normal. Parece fabricado."
"A big crystal made up of black and white bands. Used in magic, it guards against physical dangers. This particular onyx has been attuned to Armor Patching when used in crafting.": "Um grande cristal composto por faixas pretas e brancas. Usado em magia, protege contra perigos físicos. Este ônix em particular foi sintonizado com Armor Patching quando usado na fabricação."
"A big dark red stone, known for its curative properties. This particular stone has been attuned to the First Aid skill if used in crafting.": "Uma grande pedra vermelha escura, conhecida pelas suas propriedades curativas. Esta pedra em particular foi sintonizada com a habilidade de Primeiros Socorros se usada na elaboração."
"A big glob of high-quality animal fat that is clearly beyond what would be found in a normal animal.": "Uma grande quantidade de gordura animal de alta qualidade que está claramente além do que seria encontrado em um animal normal."
"A big glob of high-quality animal fat.": "Uma grande quantidade de gordura animal de alta qualidade."
"A big lush bell pepper.": "Um pimentão grande e exuberante."
"A big magical crystal.": "Um grande cristal mágico."
"A big piece of quartz that is partially anchored in another dimension. Being semi-intangible, it is a poor choice for crafting.": "Um grande pedaço de quartzo parcialmente ancorado em outra dimensão. Por ser semi-intangível, é uma má escolha para elaboração."
"A big raw shrimp. It needs to be de-veined and cleaned before eating.": "Um grande camarão cru. Ele precisa ser desengordurado e limpo antes de comer."
"A big ripe pear.": "Uma grande pêra madura."
"A big sack of Councils.": "Um grande saco de Conselhos."
"A big soft blue rock. It's useful in curatives and curse removal potions. This particular gem has been infused with a rune that attunes it to foxes when used in crafting.": "Uma grande rocha azul macia. É útil em curativos e poções para remoção de maldições. Esta gema em particular foi infundida com uma runa que a sintoniza com raposas quando usada na elaboração."
"A big spring made of silver. Wait, silver doesn't normally bend like that, does it? Weird. But useless.": "Uma grande mola feita de prata. Espere, a prata normalmente não dobra assim, não é? Esquisito. Mas inútil."
"A big stick that's weighted so that the heavy part is at the hitting end.": "Um bastão grande com peso de forma que a parte pesada fique na ponta do golpe."
"A big tree branch with all the bark removed.": "Um grande galho de árvore com toda a casca removida."
"A big tree branch with most of the leaves removed.": "Um grande galho de árvore com a maior parte das folhas removidas."
"A big tree branch with some of the bark removed to make a hand-hold.": "Um grande galho de árvore com parte da casca removida para servir de apoio."
"A big yellow topaz. An incredibly versatile magical stone. This particular piece has been infused with a rune that attunes it to Fairy Magic, giving crafted items a chance to include one or more Fairy Magic powers (with the rest being Mentalism powers).": "Um grande topázio amarelo. Uma pedra mágica incrivelmente versátil. Esta peça em particular foi infundida com uma runa que a sintoniza com a Magia das Fadas, dando aos itens criados a chance de incluir um ou mais poderes da Magia das Fadas (sendo o restante poderes de Mentalismo)."
"A bird egg. Looks edible.": "Um ovo de pássaro. Parece comestível."
"A bit of gauze that helps keep flowers organized in a flower arrangement.": "Um pouco de gaze que ajuda a manter as flores organizadas em um arranjo floral."
"A bit of leaves, a bit of bark, and a lot of magic.": "Um pouco de folhas, um pouco de casca e muita magia."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on boots.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1 a 30 que vão para botas."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on chest armor.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para a armadura torácica."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on gloves.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para luvas."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on helmets.": "Um pouco de escoamento mágico usado na criação de ampliações de nível 1 a 30 que vão para capacetes."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on leg armor.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para armaduras de perna."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on main-hand weapons.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para armas principais."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on off-hand equipment.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para equipamentos improvisados."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on rings.": "Um pouco de escoamento mágico usado na criação de Aumentos de nível 1-30 que vão para anéis."
"A bit of magical runoff used in the creation of level 1-30 Augments that go on necklaces.": "Um pouco de escoamento mágico usado na criação de aprimoramentos de nível 1 a 30 que vão para colares."
