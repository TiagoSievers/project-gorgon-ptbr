"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 5 hours. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 5 horas. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 6 hours. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 6 horas. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 7 hours. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 7 horas. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 8 hours. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 8 horas. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This cheap-looking purple ring makes poisons slightly less effective.": "Este anel roxo de aparência barata torna os venenos um pouco menos eficazes."
"This chunk of spider came off in one solid piece. It's probably useful for making armor, if you like wearing creepy ridiculous things as armor.": "Este pedaço de aranha saiu inteiro. Provavelmente é útil para fazer armaduras, se você gosta de usar coisas ridículas e assustadoras como armadura."
"This chunky blue ring augments any kind of kick, such as the Unarmed ability Kick or kicks done when in the form of a deer or other ungulate.": "Este anel azul robusto aumenta qualquer tipo de chute, como a habilidade Chute Desarmado ou chutes dados na forma de um cervo ou outro ungulado."
"This cider has been aged and is ready to be filtered and flavored.": "Esta cidra foi envelhecida e está pronta para ser filtrada e aromatizada."
"This cider needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Esta cidra precisa ser armazenada em uma caverna por três horas antes de poder ser consumida. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This clear liquid has bubbles in it that never seem to pop.": "Este líquido transparente contém bolhas que parecem nunca estourar."
"This clever costume is perfect for cows that need to go undercover. A symbol of Arisetsu has been hidden inside.": "Esta fantasia inteligente é perfeita para vacas que precisam se disfarçar. Um símbolo de Arisetsu está escondido dentro."
"This cloth armor is worn by the few Gazluk wizards who have become officers. It is designed to aid powerful spellcasters.": "Esta armadura de tecido é usada pelos poucos magos Gazluk que se tornaram oficiais. Ele foi projetado para ajudar conjuradores poderosos."
"This club is bizarrely light for being so heavy.": "Este clube é estranhamente leve por ser tão pesado."
"This club is coated in misleading magic. It's soaked with blood, but looks pristine!": "Este clube está revestido de magia enganosa. Está encharcado de sangue, mas parece imaculado!"
"This club makes it seem effortless to swing a massive weight around.": "Este clube faz com que pareça fácil balançar um peso enorme."
"This coat is a tight squeeze for larger races. It smells faintly of urine, and no amount of cleaning seems to fix it.": "Este casaco é justo para corridas maiores. Tem um leve cheiro de urina e nenhuma limpeza parece resolver o problema."
"This coif features precision chainwork and a clever pattern that keeps the wearer's vision-lines clear.": "Esta touca apresenta correntes de precisão e um padrão inteligente que mantém as linhas de visão do usuário claras."
"This coin appeared magically when you solved the semi-destroyed altar in Vidaria. It can be placed back onto the altar to redeem it for a special item, but it may have other uses...": "Esta moeda apareceu magicamente quando você resolveu o altar semidestruído em Vidaria. Ele pode ser colocado de volta no altar para trocá-lo por um item especial, mas pode ter outros usos..."
"This coin is made of Xogrite, a metal known only among the rakshasa. It is used by the city of Rahu to pay trade debts.": "Esta moeda é feita de Xogrite, um metal conhecido apenas entre os rakshasa. É usado pela cidade de Rahu para pagar dívidas comerciais."
"This collection of beautiful crone-language verses has been translated impeccably. A recent scandal has erupted over this book, insinuating that the powerful gorgon Rosedria didn't write it herself, but had a vast team of poet hags ghost-write it. The scandal has raised the value of this long-out-of-print book to absurd heights.": "Esta coleção de belos versos em língua antiga foi traduzida impecavelmente. Um escândalo recente eclodiu em torno deste livro, insinuando que a poderosa górgona Rosedria não o escreveu sozinha, mas teve uma vasta equipe de poetas bruxas que o escreveram como fantasmas. O escândalo elevou o valor deste livro há muito esgotado a níveis absurdos."
"This crate contains one pet, ready for travel or just some R&R.": "Esta caixa contém um animal de estimação, pronto para viajar ou apenas para descansar e relaxar."
"This criminally ugly purple ring augments your movement so that your sprint speed is slightly faster.": "Este anel roxo criminosamente feio aumenta seu movimento para que sua velocidade de corrida seja um pouco mais rápida."
"This criminally ugly, but enhanced purple ring augments your movement speed to be slightly faster. You're also better at picking things up and carrying them.": "Este anel roxo criminosamente feio, mas aprimorado, aumenta sua velocidade de movimento para ser um pouco mais rápida. Você também é melhor em pegar coisas e carregá-las."
"This crossbow is not actually demonic; it's just designed to look intimidating. The embedded necromancy gem was probably not intended for actual use, but it <i>does</i> work.": "Esta besta não é realmente demoníaca; foi projetado apenas para parecer intimidante. A gema de necromancia incorporada provavelmente não foi planejada para uso real, mas <i>funciona</i>."
"This crumpled leather shirt can't decide whether it wants to be nimble or protective, instead failing at both.": "Esta camisa de couro amassada não consegue decidir se quer ser ágil ou protetora, falhando em ambos."
"This cunningly made flask is slightly askew, causing chemicals to spray everywhere. Only experts can hope to use it in combat.": "Este frasco habilmente feito é ligeiramente torto, fazendo com que produtos químicos se espalhem por toda parte. Somente especialistas podem esperar usá-lo em combate."
"This deadly knife is made from the fang of a Winter Dragon. (Thus making it contraband in Council cities, where dragon parts are forbidden.) It has been augmented to allow the casting of ice magic.": "Esta faca mortal é feita da presa de um Dragão Invernal. (Tornando-o assim contrabandeado nas cidades do Conselho, onde partes de dragão são proibidas.) Foi aumentado para permitir o lançamento de magia de gelo."
"This delicious beverage helps you digest cheese.": "Esta deliciosa bebida ajuda a digerir o queijo."
"This depiction of the Tower of Treason was made by an elven Phot craftsman, using their signature one-bristle brush.": "Esta representação da Torre da Traição foi feita por um artesão élfico Phot, usando seu pincel característico de uma cerda."
"This dirk has never not existed and will never stop existing. It was removed from the timestream by Romast, the god of Martial Arts, who is ironically long-dead.": "Este punhal nunca deixou de existir e nunca deixará de existir. Foi removido da linha do tempo por Romast, o deus das artes marciais, que ironicamente já morreu há muito tempo."
"This disgusting belt helps you avoid being hit by projectiles.": "Este cinto nojento ajuda você a evitar ser atingido por projéteis."
"This drink has a not-too-great flavor, but it's very good at rehydrating tired bodies. The preferred desert beverage of people who are too rich to drink water.": "Esta bebida tem um sabor não muito bom, mas é muito boa para reidratar corpos cansados. A bebida preferida do deserto por pessoas que são ricas demais para beber água."
"This dull black ring improves a Psychology ability: Cause Terror.": "Este anel preto fosco melhora uma habilidade de Psicologia: Causar Terror."
"This dwarven-made pig helm was no doubt worn in an illicit pig-fighting competition. The powerful combat runes are carefully hidden on the inside of the band.": "Este elmo de porco feito pelos anões foi sem dúvida usado em uma competição ilícita de luta de porcos. As poderosas runas de combate estão cuidadosamente escondidas no interior da banda."
"This enchanted beaker has been adorned with pieces of glass in a geometric pattern. It is a little unwieldy as a result.": "Este copo encantado foi adornado com pedaços de vidro em padrão geométrico. Como resultado, é um pouco pesado."
"This exotic device fits around the waist of a gigantic bat, allowing them to disperse chemicals with a flap of their wings. Plus it's got pockets! (Enables Battle Chemistry.)": "Este dispositivo exótico cabe na cintura de um morcego gigante, permitindo-lhes dispersar produtos químicos com um bater de asas. Além disso, tem bolsos! (Ativa Química de Batalha.)"
"This exquisite piece was made by priests of Umrad. Rumors once abounded that the god Umrad himself gave them the design, but Umrad has denied this (and found the idea offensive for several reasons).": "Esta peça requintada foi feita pelos sacerdotes de Umrad. Houve rumores de que o próprio deus Umrad lhes deu o design, mas Umrad negou (e achou a ideia ofensiva por vários motivos)."
"This fertilizer has been made utterly unusable by the addition of salt.": "Este fertilizante tornou-se totalmente inutilizável pela adição de sal."
"This fire-protection potion is a delicious grape-esque flavor. It's a popular recreational drink even among the non-engulfed.": "Esta poção de proteção contra fogo tem um sabor delicioso de uva. É uma bebida recreativa popular mesmo entre os não engolfados."
"This fist-shaped thing was found embedded in a particularly ornery myconian.": "Esta coisa em forma de punho foi encontrada incrustada num micônio particularmente teimoso."
"This flask has been carefully constructed to keep healing chemicals at a lower temperature, slightly improving their effects. Held in the off hand.": "Este frasco foi cuidadosamente construído para manter os produtos químicos curativos em uma temperatura mais baixa, melhorando ligeiramente seus efeitos. Segurado na mão inábil."
"This flask is made of nice metal - pity it has a huge hole in the side.": "Este frasco é feito de um belo metal - pena que tem um buraco enorme na lateral."
"This foul orcish invention gives you a burst of energy to win a battle... but you don't typically get to celebrate for long.": "Esta horrível invenção orc dá a você uma explosão de energia para vencer uma batalha... mas normalmente você não consegue comemorar por muito tempo."
"This gaudy gold heart ring looks more like a lovelorn elf's token of affection than some powerful magical device.": "Este berrante anel de coração de ouro parece mais um símbolo de afeto de um elfo apaixonado do que um poderoso dispositivo mágico."
"This gin has been aged and is ready to be filtered and flavored.": "Este gin foi envelhecido e está pronto para ser filtrado e aromatizado."
"This gin needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este gin precisa ser armazenado em uma caverna por três horas antes de se tornar potável. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This glass orb contains a dollop of the essence of despair. It can be used as a Necromancy Gem.": "Este orbe de vidro contém uma dose da essência do desespero. Pode ser usada como uma Gema de Necromancia."
"This glass orb contains a tiny bit of the essence of fury. It can be used as a Necromancy Gem, but it should not be wielded by those lacking self-control.": "Este orbe de vidro contém um pouquinho da essência da fúria. Ela pode ser usada como uma Gema de Necromancia, mas não deve ser usada por aqueles que não têm autocontrole."
"This glass orb contains swirling black smoke.": "Esta esfera de vidro contém fumaça preta rodopiante."
"This glittery stone has a fantastic redness.": "Esta pedra brilhante tem uma vermelhidão fantástica."
"This goblin-made weapon uses a manticore tail as a powerful injector. It's not a very good sword, but it's a great poisoning tool.": "Esta arma feita por goblins usa uma cauda de manticora como um poderoso injetor. Não é uma espada muito boa, mas é uma ótima ferramenta de envenenamento."
"This gold ring is not particularly unique, but it was clearly made by dwarves.": "Este anel de ouro não é particularmente único, mas foi claramente feito por anões."
"This gold-tinted armor is worn by the highest battlefield officers in Gazluk City's army. It is versatile and strong, like its wearer.": "Esta armadura dourada é usada pelos mais altos oficiais de campo de batalha do exército da cidade de Gazluk. É versátil e forte, assim como seu usuário."
"This green-tinted armor is worn by Gazluk City's gadgeteers and tacticians, known as \"Treachery Troopers\". Their armor protects them from battlefield conditions and enhances their tricky combat techniques.": "Esta armadura verde é usada pelos gadgeteers e estrategistas da cidade de Gazluk, conhecidos como \"Treachery Troopers\". Sua armadura os protege das condições do campo de batalha e aprimora suas técnicas de combate complicadas."
"This greenish lump seems to have many other colors embedded in it. While some -- especially orcs -- find it beautiful, others find it disconcerting or even ugly. In magic it is associated with curses and the evil eye.": "Este caroço esverdeado parece ter muitas outras cores embutidas nele. Enquanto alguns - especialmente os orcs - acham isso lindo, outros acham isso desconcertante ou até feio. Na magia está associado a maldições e mau-olhado."
"This greenish stone seems to have many other colors embedded in it. While some -- especially orcs -- find it beautiful, others find it disconcerting or even ugly. In magic it is associated with curses and the evil eye.": "Esta pedra esverdeada parece ter muitas outras cores embutidas nela. Enquanto alguns - especialmente os orcs - acham isso lindo, outros acham isso desconcertante ou até feio. Na magia está associado a maldições e mau-olhado."
"This grim fist weapon was clearly inspired by the Human legend of the Green Man, a druid who supposedly wanders the forests and punches wayward teens to death if they're out past curfew.": "Esta sombria arma de punho foi claramente inspirada na lenda humana do Homem Verde, um druida que supostamente vagueia pelas florestas e soca adolescentes rebeldes até a morte se eles já passaram do toque de recolher."
"This gross shirt smells of urine. It provides no armor protection, and it's also very itchy.": "Esta camisa nojenta cheira a urina. Não fornece proteção de armadura e também causa muita coceira."
"This gross shirt still smells of urine. It continues to provide no armor protection, and is even itchier than before. But it does cause enemies to perceive you as less of a threat.": "Esta camisa nojenta ainda cheira a urina. Ele continua a não fornecer proteção de armadura e causa ainda mais coceira do que antes. Mas faz com que os inimigos considerem você menos ameaçador."
"This grungy ring has a little scoop on the end to help you dig skulls out of corpses. (Acts as a skull extractor.)": "Este anel sujo tem uma pequena cavidade na ponta para ajudá-lo a desenterrar caveiras de cadáveres. (Atua como um extrator de crânio.)"
"This hammer has little rivulets carved into it to guide any blood away from the wielder's hand. Craftsmanship!": "Este martelo tem pequenos riachos esculpidos para afastar qualquer sangue da mão do usuário. Artesanato!"
"This handful of dirt is weird and smelly and damp.": "Este punhado de terra é estranho, fedorento e úmido."
"This handful of dirt is weird and smelly and full of fungus.": "Este punhado de terra é estranho, fedorento e cheio de fungos."
"This has all the relevant features that a staff fighter could want: durable, flexible, perfectly weighted, and makes a cool whistling sound when swung. (This will work for Staff Fighting but not Fire Magic abilities.)": "Ele tem todos os recursos relevantes que um lutador de equipe poderia desejar: durável, flexível, com peso perfeito e emite um som de assobio quando balançado. (Isso funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"This has all the relevant features that a staff fighter or fire mage could want: durable, flexible, perfectly weighted, fire-spewing, and makes a cool whistling sound when swung.": "Ele tem todos os recursos relevantes que um lutador de estado-maior ou mago de fogo poderia desejar: durável, flexível, com peso perfeito, cuspidor de fogo e emite um som de assobio quando balançado."
"This hat was digested by something unnatural, and now it exists only in the abstract.": "Este chapéu foi digerido por algo não natural e agora existe apenas de forma abstrata."
"This hat was stuck to a spider for years. There's so much webbing that you can't get all of it off, and it'll keep falling in your face while you try to murder things.": "Este chapéu ficou preso a uma aranha durante anos. Há tantas teias que você não consegue tirar todas, e elas continuarão caindo na sua cara enquanto você tenta assassinar coisas."
"This head of broccoli looks a lot like a little green tree.": "Esta cabeça de brócolis se parece muito com uma pequena árvore verde."
"This helmet goes beyond mere adequacy. It says \"adequate isn't enough!\" It takes it one step farther, all the way to more-than-adequate.": "Este capacete vai além da mera adequação. Diz que \"adequado não é suficiente!\" É um passo além, até mais do que adequado."
"This helmet was crafted by orcs, but was intended to be worn by both orcs and humans. The quality is excellent, but the most interesting feature is definitely the custom ear guard: the creators apparently believed that human ears are especially vulnerable, so they provided special removable padding to give them extra security. No-one knows why the orcs felt this was necessary, and the decision is somewhat troubling.": "Este capacete foi feito por orcs, mas deveria ser usado tanto por orcs quanto por humanos. A qualidade é excelente, mas a característica mais interessante é definitivamente o protetor de ouvido personalizado: os criadores aparentemente acreditavam que os ouvidos humanos são especialmente vulneráveis, por isso forneceram um acolchoamento especial removível para lhes dar segurança extra. Ninguém sabe por que os orcs acharam que isso era necessário, e a decisão é um tanto preocupante."
"This high-quality fishing hook was made by an expert blacksmith.": "Este anzol de pesca de alta qualidade foi feito por um ferreiro experiente."
"This horn is made of shell and enchanted with protective runes.": "Este chifre é feito de concha e encantado com runas protetoras."
"This huge club has been used to kill so many drakeworms that some of their strange magic has rubbed off on it.": "Este enorme porrete foi usado para matar tantos dragões que parte de sua estranha magia foi transmitida a ele."
"This huge gem is brownish orange. It has been tuned as an amplifier for certain tailoring recipes.": "Esta enorme joia é laranja acastanhada. Foi ajustado como amplificador para certas receitas de alfaiataria."
"This idyllic scene seems to have stood the passage of time quite well.": "Esta cena idílica parece ter resistido muito bem ao passar do tempo."
"This import from the Crone Hegemony doesn't do anything directly -- although the eye in the amulet does follow you around and glare. It is primarily used as a base magic source by magical jewelrycrafters.": "Esta importação da Hegemonia Crone não faz nada diretamente - embora o olho no amuleto siga você e o encare. É usado principalmente como fonte mágica básica por joalheiros mágicos."
"This industrial-strength Hellfreeze cures all stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when ingested.": "Este Hellfreeze de força industrial cura todas as pilhas de Fogo do Inferno Maior, Fogo do Inferno e Fogo do Inferno Menor quando ingerido."
"This industrial-strength Hellfreeze cures up to 10 stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when applied topically.": "Este Hellfreeze de força industrial cura até 10 pilhas de Fogo do Inferno Maior, Fogo do Inferno e Fogo do Inferno Menor quando aplicado topicamente."
"This is a basic sword that Joeh custom-modded over the years. It has a unique hilt and \"speed stripes\" painted on the blade. Joeh had an entire joke routine planned for when someone asked him what the stripes were for, but nobody ever did.": "Esta é uma espada básica que Joeh modificou ao longo dos anos. Possui punho exclusivo e \"listras de velocidade\" pintadas na lâmina. Joeh tinha toda uma rotina de piadas planejada para quando alguém lhe perguntasse para que serviam as listras, mas ninguém nunca o fez."
"This is a fake: Ravana soldiers did not wear shields when they arrived on Alharth. This shield is a masterpiece made in the style of their armor.": "Isto é falso: os soldados Ravana não usavam escudos quando chegaram a Alharth. Este escudo é uma obra-prima feita no estilo de sua armadura."
"This is a favorite of goblin healers, who use it as a surgical tool more often than as a weapon. A universal holy symbol attunes it to priests of Saledar, Arisetsu, or Kirad.": "Este é o favorito dos curandeiros goblins, que o usam mais frequentemente como ferramenta cirúrgica do que como arma. Um símbolo sagrado universal o sintoniza com os sacerdotes de Saledar, Arisetsu ou Kirad."
"This is a few drops of a thick purple liquid. Just touching the vial gives you a mild shock.": "Estas são algumas gotas de um líquido roxo espesso. Apenas tocar no frasco causa um leve choque."
"This is a great camouflage job! The pants, well, they're not <i>bad</i> per se...": "Este é um ótimo trabalho de camuflagem! As calças, bem, elas não são <i>ruins</i> em si..."
"This is a great saddle.": "Esta é uma ótima sela."
"THIS IS A LEGACY ITEM. Take it to the Legacy Item Helper golem in Serbule to trade it in for a current item.": "ESTE É UM ITEM LEGADO. Leve-o ao golem Legacy Item Helper em Serbule para trocá-lo por um item atual."
"This is a masterpiece. It's got little hidden straps and buckles to make sure you can fit it perfectly to any form.": "Esta é uma obra-prima. Possui pequenas tiras e fivelas escondidas para garantir que você possa ajustá-lo perfeitamente a qualquer formato."
"This is a nice helmet.": "Este é um belo capacete."
"This is a novice students' attempt to mimic Landrisil's masterpiece, \"The Forest Before Dusk\".": "Esta é uma tentativa de estudantes novatos de imitar a obra-prima de Landrisil, \"The Forest Before Dusk\"."
"This is a pair of \"Servant's Walkers\" boots that have been customized for extra speed.": "Este é um par de botas \"Servant's Walkers\" que foram personalizadas para maior velocidade."
"This is a pro-quality piece of equipment! The stitching isn't even visible from the outside. Fancy.": "Este é um equipamento de qualidade profissional! A costura nem é visível do lado de fora. Chique."
"This is a real treasure -- an original hand-copied manuscript by Zuk-Ghu, the orcish poet of Kur! Mocked by his people, Zuk-Ghu was forced to write and distribute his poems in secrecy. They are truly beautiful, though... if you're fluent in Orc. If you only know pidgin-Orc like most people, these poems are largely inscrutable.": "Este é um verdadeiro tesouro – um manuscrito original copiado à mão por Zuk-Ghu, o poeta orc de Kur! Zombado de seu povo, Zuk-Ghu foi forçado a escrever e distribuir seus poemas em segredo. Eles são realmente lindos... se você for fluente em Orc. Se você conhece o pidgin-Orc como a maioria das pessoas, esses poemas são em grande parte inescrutáveis."
"This is a really old weapon design! They don't make 'em like this anymore, for better or for worse.": "Este é um design de arma muito antigo! Eles não os fazem mais assim, para o bem ou para o mal."
"This is a small amount of salt.": "Esta é uma pequena quantidade de sal."
"This is a work-order from a goblin chieftan to a goblin mason guild detailing a home expansion. It's terribly interesting.": "Esta é uma ordem de serviço de um chefe goblin para uma guilda de pedreiros goblins detalhando uma expansão de casa. É terrivelmente interessante."
"This is an especially round pebble. But it's still just a pebble, with probably very few uses.": "Esta é uma pedra especialmente redonda. Mas ainda é apenas uma pedra, provavelmente com muito poucos usos."
"This is an incredibly unappealing piece of rotten meat.": "Este é um pedaço de carne podre incrivelmente desagradável."
"This is an old battle plan for some intra-goblin skirmish. It might be worth something to <i>somebody</i>... but probably not much in any case.": "Este é um antigo plano de batalha para algum conflito intragoblin. Pode valer alguma coisa para <i>alguém</i>... mas provavelmente não muito, de qualquer forma."
"This is an orange hunk of beryl. Used in magic, it is associated with tailoring. It is the favored color of goblins.": "Este é um pedaço laranja de berilo. Usado em magia, está associado à alfaiataria. É a cor favorita dos goblins."
"This is an orange variety of beryl. Used in magic, it is associated with tailoring. It is the favored color of goblins.": "Esta é uma variedade laranja de berilo. Usado em magia, está associado à alfaiataria. É a cor favorita dos goblins."
"This is an original numbered Ertrigard painting. The master is beloved for waterfall scenes like this one. However, thanks to his magic brush, he created over 40,000 paintings during his lifetime, so being \"original\" doesn't really make it too terribly special.": "Esta é uma pintura original de Ertrigard numerada. O mestre é adorado por cenas de cachoeiras como esta. No entanto, graças ao seu pincel mágico, ele criou mais de 40.000 pinturas durante sua vida, então ser “original” não o torna muito especial."
"This is basically inedible. It has limited alchemical uses.": "Isso é basicamente intragável. Tem usos alquímicos limitados."
"This is bat shit.": "Isso é uma merda."
"This is clearly a relabeled orcish warhammer.": "Este é claramente um martelo de guerra orc renomeado."
"This is clearly the work of a skilled goblin artisan. Made in the recent Three Hierarchies goblin style, it is probably very new.": "Este é claramente o trabalho de um habilidoso artesão goblin. Feito no recente estilo goblin das Três Hierarquias, provavelmente é muito novo."
"This is damned good calligraphy ink.": "Esta é uma tinta de caligrafia muito boa."
"This is good armor, but rather uncomfortable if you have chest hair... lots of pinching.": "Esta é uma boa armadura, mas bastante desconfortável se você tiver pelos no peito... muitos beliscões."
"This is great for making bottles.": "Isso é ótimo para fazer garrafas."
"This is incredibly light leather chest armor. You can really move around in this baby. Pity about the stitching. And the color. And the design.": "Esta é uma armadura torácica de couro incrivelmente leve. Você pode realmente se movimentar neste bebê. Pena pela costura. E a cor. E o design."
"This is just a piece of metal, but it's been covered in strange substances that help protect the hand of the puncher.": "Este é apenas um pedaço de metal, mas está coberto de substâncias estranhas que ajudam a proteger a mão do perfurador."
"This is just some raw eggs in a glass, blended with a little milk. Gross.": "São apenas alguns ovos crus em um copo, misturados com um pouco de leite. Bruto."
"This is just some weird elven runes on a chain.": "Estas são apenas algumas runas élficas estranhas em uma corrente."
"This is not a book of poetry, but a book on how to better appreciate poetry.": "Este não é um livro de poesia, mas um livro sobre como apreciar melhor a poesia."
"This is slightly louder than a normal lute, allowing more effective rallying.": "É um pouco mais alto que um alaúde normal, permitindo uma mobilização mais eficaz."
"This is sloppily transliterated goblin poetry. It scans poorly, the similes make no sense after translation, and the topic of the poem is toenails. But it is poetry, technically.": "Esta é uma poesia goblin mal transliterada. A leitura é ruim, as comparações não fazem sentido após a tradução e o tema do poema são as unhas dos pés. Mas é poesia, tecnicamente."
"This is some of the worst gin ever. But it is technically not fatal to drink.": "Este é um dos piores gins de todos os tempos. Mas tecnicamente não é fatal beber."
"This is some quality leather.": "Este é um couro de qualidade."
"This is the grossest possible thing. But all the blood smears make it harder for monsters to tell where to stab you.": "Esta é a coisa mais nojenta possível. Mas todas as manchas de sangue tornam mais difícil para os monstros saberem onde esfaquear você."
"This is the latest masterpiece of rakshasa leatherworking, designed to replace the old Ravana armor they can no longer create. In many ways, this surpasses anything from their homeworld, a testament to rakshasa skill... and the toughness of beasts in Alharth.": "Esta é a mais recente obra-prima da marcenaria rakshasa, projetada para substituir a antiga armadura Ravana que eles não conseguem mais criar. Em muitos aspectos, isso supera qualquer coisa do seu mundo natal, uma prova da habilidade rakshasa... e da resistência das feras em Alharth."
"This is the skull of some weird otherworldly creature. Neat.": "Este é o crânio de alguma estranha criatura de outro mundo. Organizado."
"This is the sort of shirt a masterful guerilla elf might wear. Not that you'd ever see them wearing it, of course, but that's the point.": "Este é o tipo de camisa que um elfo guerrilheiro magistral poderia usar. Não que você os veja usando isso, é claro, mas esse é o ponto."
"This is the work of an elven artisan from approximately 300 years ago. It has a slight kitsch factor, and may look good on a wall, but it has little monetary value.": "Este é o trabalho de um artesão élfico de aproximadamente 300 anos atrás. Tem um leve fator kitsch e pode ficar bem na parede, mas tem pouco valor monetário."
"This item exists for validation purposes -- it is the prototypical item that cannot be sent to a saddlebag under any circumstances.": "Este item existe para fins de validação – é o item prototípico que não pode ser enviado para um alforje em nenhuma circunstância."
"This jade ring thumps in time to the wearer's pulse, the better to tune into their mind.": "Este anel de jade bate no ritmo do pulso do usuário, para melhor sintonizar sua mente."
"This key fell out of a fake skull. The cuts in the key are clearly decorative; if this opens anything at all, it wouldn't be a normal chest. Probably magic.": "Esta chave caiu de uma caveira falsa. Os cortes na chave são claramente decorativos; se isso abrir alguma coisa, não seria um baú normal. Provavelmente mágico."
"This key is made of cork! It seems quite fragile.": "Esta chave é feita de cortiça! Parece bastante frágil."
"This key was found on the corpse of a hag.": "Esta chave foi encontrada no cadáver de uma bruxa."
"This key will snap as soon as you use it. It fits an angled lock.": "Esta chave irá quebrar assim que você a usar. Ele se encaixa em uma fechadura angular."
"This kilt is part of the uniform of the dwarven Idealist's Guild. Members produce a substance they call \"optimism\", which is sold in the form of addictive crystals.": "Este kilt faz parte do uniforme da Guilda dos Idealistas dos Anões. Os membros produzem uma substância que chamam de “otimismo”, que é vendida na forma de cristais viciantes."
"This large net has seen heavy use, and now needs significant repair... or, more likely, replacement.": "Esta grande rede tem sido muito utilizada e agora precisa de reparos significativos... ou, mais provavelmente, de substituição."
"This leather armor is so comfortable, it's almost criminal.": "Esta armadura de couro é tão confortável que é quase criminosa."
"This legendary anti-troll device is imbued with magic flame that can never be quenched. There are rumors that sometimes the club's wielder gets a <i>tiny</i> bit incinerated when the fire gets out of control... but what are you, a baby?": "Este lendário dispositivo anti-troll está imbuído de uma chama mágica que nunca pode ser apagada. Há rumores de que às vezes o dono do clube fica um pouco incinerado quando o fogo fica fora de controle... mas o que você é, um bebê?"
"This lens looks like it fits into a stargazing contraption.": "Esta lente parece caber em uma engenhoca para observar as estrelas."
"This lightweight piece of... metal? Is used for... something? Anyway, it's green.": "Esta peça leve de... metal? É usado para... alguma coisa? De qualquer forma, é verde."
"This liquid is viscous and gross.": "Este líquido é viscoso e grosseiro."
"This long-handled beaker has been coated in many layers of deadly chemicals. Wash your hands after touching it!": "Este copo de cabo longo foi revestido com muitas camadas de produtos químicos mortais. Lave as mãos depois de tocá-lo!"
"This looks great! Very professional. And moderately comfortable, too!": "Isso parece ótimo! Muito profissional. E moderadamente confortável também!"
"This looks to be a piece of mummy wrapping.": "Isto parece ser um pedaço de embrulho de múmia."
"This lovely goblet is teeming with history and you should probably treasure it forever.": "Esta linda taça está repleta de história e você provavelmente deveria guardá-la para sempre."
"This lump of flesh still pulses to an unknowable rhythm.": "Este pedaço de carne ainda pulsa em um ritmo incognoscível."
"This magic garnet can float around your head and emit light. It also emanates hard-won wisdom, and can whisper warnings and advice when you're about to do something stupid.": "Esta granada mágica pode flutuar em volta da sua cabeça e emitir luz. Também emana sabedoria arduamente conquistada e pode sussurrar avisos e conselhos quando você está prestes a fazer algo estúpido."
"This martial artist's glove is adorned with small sharpened metal protrusions. It smells like soup.": "A luva deste artista marcial é adornada com pequenas saliências de metal afiadas. Cheira a sopa."
"This masterpiece includes the Six Names of Arisetsu, the Eight Suns of Arisetsu, the Four Priestly Runes, and dozens of other icons.": "Esta obra-prima inclui os Seis Nomes de Arisetsu, os Oito Sóis de Arisetsu, as Quatro Runas Sacerdotais e dezenas de outros ícones."
"This mean-looking weapon has a necromancy gem embedded in it.": "Esta arma de aparência cruel tem uma gema de necromancia embutida nela."
"This metal armor can shift the wearer's weight automatically to ensure they don't fall over.": "Esta armadura de metal pode deslocar o peso do usuário automaticamente para garantir que ele não caia."
"This might have been a treasure map! But it's ruined now.": "Este pode ter sido um mapa do tesouro! Mas agora está arruinado."
"This mottled ring improves a Werewolf ability: Claw": "Este anel manchado melhora uma habilidade de Lobisomem: Garra"
"This mottled ring improves a Werewolf ability: Smell Fear": "Este anel manchado melhora uma habilidade de Lobisomem: Cheirar Medo"
"This muffin might sound strange but it is actually quite sweet. Disgusting, but sweet.": "Este muffin pode parecer estranho, mas na verdade é muito doce. Nojento, mas doce."
"This nature scene depicts Traticus, the mythical elven hero, entering the Woods of Disdain. The subject matter dates the painting to the New Revisionist period, 150 years ago. By elven timelines this was very recent, making the painting extremely tacky. Perhaps it will gain value in 300 years, however.": "Esta cena da natureza retrata Traticus, o mítico herói élfico, entrando na Floresta do Desdém. O tema data a pintura do período do Novo Revisionismo, 150 anos atrás. Pelas linhas do tempo élficas, isso era muito recente, tornando a pintura extremamente cafona. Talvez ganhe valor em 300 anos, no entanto."
"This nature scene was painted with vibrant colors.": "Esta cena da natureza foi pintada com cores vibrantes."
"This notebook contains arcane sigils in a strange code.": "Este caderno contém sigilos misteriosos em um código estranho."
"This notebook contains arcane sigils in a strange code. The sage Elmetaph has scribbled out some of the sigils and written in new ones.": "Este caderno contém sigilos misteriosos em um código estranho. O sábio Elmetaph rabiscou alguns dos sigilos e escreveu novos."
"This odd potion makes your skin extremely tough. It's a fairly uncomfortable sensation, having impervious skin.": "Esta estranha poção torna sua pele extremamente dura. É uma sensação bastante desconfortável ter a pele impermeável."
"This odd weapon was made specifically for chopping attacks. The weighting makes it difficult to use for piercing.": "Esta estranha arma foi feita especificamente para ataques cortantes. A ponderação dificulta o uso para piercing."
"This old beaker is perfectly shaped for gulping down quick-brewed healing concoctions.": "Este copo antigo tem formato perfeito para engolir misturas curativas preparadas rapidamente."
"This old flask is perfectly shaped for gulping down quick-brewed healing concoctions.": "Este frasco antigo tem formato perfeito para engolir misturas curativas preparadas rapidamente."
"This old orcish warhammer was given new life with tiny decorative gems and detailed etchings of flowers.": "Este antigo martelo de guerra orc ganhou nova vida com pequenas joias decorativas e gravuras detalhadas de flores."
"This once-high-quality Trancelute was left out in the elements. No amount of tuning will make it very effective.": "Este Trancelute, que já foi de alta qualidade, foi deixado de fora dos elementos. Nenhuma quantidade de ajuste o tornará muito eficaz."
"This once-magical crystal ball seems depleted and cracked.": "Esta bola de cristal outrora mágica parece esgotada e rachada."
"This one is pretty nice.": "Este é muito bom."
"This one smells horrific, even by Alchemist's standards.": "Este cheira horrível, mesmo para os padrões do Alquimista."
"This one smells horrific, even by Alchemist's standards. The bottle's also strangely cold to the touch. (Note: you will not recover the bottle after drinking; it is too damaged by acid to be reusable.)": "Este cheira horrível, mesmo para os padrões do Alquimista. A garrafa também está estranhamente fria ao toque. (Observação: você não recuperará a garrafa depois de beber; ela está muito danificada pelo ácido para ser reutilizável.)"
"This opens a door deep inside the Statehelm Crypt.": "Isso abre uma porta nas profundezas da Cripta Statehelm."
"This oversized hat was created by fairy magic for an unknown purpose. It's too large to fit on a human's head, but it would fit a cow's head perfectly.": "Este chapéu enorme foi criado pela magia das fadas para um propósito desconhecido. É grande demais para caber na cabeça de um humano, mas caberia perfeitamente na cabeça de uma vaca."
"This packet holds a proprietary mix of mystery spices. It has a very autumn-y smell.": "Este pacote contém uma mistura proprietária de especiarias misteriosas. Tem um cheiro muito outonal."
"This painting depicts a long-lost monument. Rather pretty.": "Esta pintura retrata um monumento há muito perdido. Bastante bonito."
"This painting of a waterfall is bland and uninspired, but you can barely make out an older, better painting underneath. The older painting looks to have been a practice piece by a goblin expert.": "Esta pintura de uma cachoeira é branda e pouco inspirada, mas você mal consegue distinguir uma pintura melhor e mais antiga por baixo. A pintura mais antiga parece ter sido uma peça prática de um especialista em goblins."
"This perfectly-preserved snail shell has been infected with demonic essence.": "Esta concha de caracol perfeitamente preservada foi infectada com essência demoníaca."
"This piece is absolutely stunning... literally. Its magical pigments cause the viewer to very briefly lose their balance when viewing the painting. It's also a lovely painting and you're not sure why the artist bothered with the trickery.": "Esta peça é absolutamente deslumbrante... literalmente. Seus pigmentos mágicos fazem com que o espectador perca brevemente o equilíbrio ao visualizar a pintura. Também é uma pintura linda e você não sabe por que o artista se preocupou com essa malandragem."
"This piece of cedar is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality cedar wood.": "Este pedaço de cedro é um exemplar do seu tipo! Existem alguns usos para esse tipo de madeira, mas muitas vezes não há necessidade de uma qualidade tão alta. Nesse caso, você pode transformar isso em várias peças de madeira de cedro de qualidade típica."
"This piece of costume jewelry is so ugly that monsters tend to hate you just for wearing it.": "Esta bijuteria é tão feia que os monstros tendem a odiar você só por usá-la."
"This piece of maple is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality maple wood.": "Este pedaço de bordo é um exemplar do seu tipo! Existem alguns usos para esse tipo de madeira, mas muitas vezes não há necessidade de uma qualidade tão alta. Nesse caso, você pode transformar isso em várias peças de madeira de bordo de qualidade típica."
"This piece of oak is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality oak wood.": "Este pedaço de carvalho é um exemplar do seu tipo! Existem alguns usos para esse tipo de madeira, mas muitas vezes não há necessidade de uma qualidade tão alta. Nesse caso, você pode transformá-lo em várias peças de madeira de carvalho de qualidade típica."
"This piece of parchment has been folded into the shape of a boat.": "Este pedaço de pergaminho foi dobrado no formato de um barco."
"This piece of spruce is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality spruce wood.": "Este pedaço de abeto é um exemplar do seu tipo! Existem alguns usos para esse tipo de madeira, mas muitas vezes não há necessidade de uma qualidade tão alta. Nesse caso, você pode transformar isso em várias peças de madeira de abeto de qualidade típica."
"This piece of warm, pulsing crystal has been coated in some sort of powder, making it safe to touch.": "Este pedaço de cristal quente e pulsante foi revestido com uma espécie de pó, tornando-o seguro ao toque."
"This piece of yew is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality yew wood.": "Este pedaço de teixo é um exemplar do seu tipo! Existem alguns usos para esse tipo de madeira, mas muitas vezes não há necessidade de uma qualidade tão alta. Nesse caso, você pode transformar isso em várias peças de madeira de teixo de qualidade típica."
"This pleasant abstract painting has a nice solid frame.": "Esta agradável pintura abstrata tem uma bela moldura sólida."
"This pleasant beverage helps you digest cheese.": "Esta bebida agradável ajuda a digerir o queijo."
"This poisonous muffin smells of wood and herbs. It can be used as a test for lycanthropy, as the muffins tend to kill werewolves, while only maiming others.": "Este muffin venenoso tem cheiro de madeira e ervas. Pode ser usado como um teste para licantropia, já que os muffins tendem a matar lobisomens, enquanto apenas mutilam outros."
"This potent battle staff was used by the thaumaturges of Gazluk to train their pet hippogriff.": "Este poderoso cajado de batalha foi usado pelos taumaturgos de Gazluk para treinar seu hipogrifo de estimação."
"This potion alters your eyes so they work better when there's not much light. It's an ancient recipe that's quite effective, but the revolting taste has kept it from becoming too popular.": "Esta poção altera seus olhos para que funcionem melhor quando não há muita luz. É uma receita antiga e bastante eficaz, mas o sabor revoltante impediu que se tornasse muito popular."
"This potion can teach you what it's like to have fluid stone instead of skin. It's an unpleasant sensation but its combat efficacy is impressive.": "Esta poção pode lhe ensinar como é ter uma pedra fluida em vez de pele. É uma sensação desagradável, mas a sua eficácia em combate é impressionante."
"This potion helps you think like an animal. If you have an animal companion this lets you communicate a bit more efficiently.": "Esta poção ajuda você a pensar como um animal. Se você tiver um companheiro animal, isso permitirá que você se comunique com um pouco mais de eficiência."
"This potion increases the size of your stomach by a very small amount. (This is usually not something to get too excited about.)": "Esta poção aumenta o tamanho do seu estômago em uma quantidade muito pequena. (Isso geralmente não é algo para ficar muito animado.)"
"This potion transforms you into a spider. Permanent until dispelled! WARNING: think before you drink!": "Esta poção transforma você em uma aranha. Permanente até ser dissipado! AVISO: pense antes de beber!"
"This potion uses very spicy ingredients to distract you from the very disgusting other ingredients.": "Esta poção usa ingredientes muito picantes para distraí-lo dos outros ingredientes nojentos."
"This powder feels tingly.": "Este pó dá uma sensação de formigamento."
"This pulls strength from the drinker's bones to give their body extra density. Smells of bone marrow.": "Isso extrai força dos ossos do bebedor para dar densidade extra ao corpo. Cheira a medula óssea."
"This pumpkin pie is... not very good-tasting. Perhaps it's been tuned for insect palates. That would explain all the meat in it.": "Esta torta de abóbora... não tem muito gosto. Talvez tenha sido ajustado para o paladar dos insetos. Isso explicaria toda a carne contida nele."
"This punching weapon has a little mechanical serpent head on it which can be used to inject poison deep into a target.": "Esta arma de soco tem uma pequena cabeça de serpente mecânica que pode ser usada para injetar veneno profundamente em um alvo."
"This quality replica of \"Candlelight and Dawnlight\" is overshadowed by its frame, a beautiful masterpiece without peer.": "Esta réplica de qualidade de \"Candlelight and Dawnlight\" é ofuscada pela sua moldura, uma bela obra-prima sem igual."
"This quality weapon has been adorned with tiny jewels and acid-etched with subtle, elegant patterns.": "Esta arma de qualidade foi adornada com pequenas joias e gravada com ácido com padrões sutis e elegantes."
"This red-tinted armor is worn by Gazluk City's front-line soldiers, known as \"Death Troopers\". Their armor enhances their strength and melee prowess.": "Esta armadura vermelha é usada pelos soldados da linha de frente da cidade de Gazluk, conhecidos como \"Tropas da Morte\". Sua armadura aumenta sua força e destreza corpo a corpo."
"This reddish token is made of very thin metal. There are tiny inscrutable symbols painted on the back side. (See Qatik at the Red Wing Casino to trade these tokens for prizes.)": "Esta ficha avermelhada é feita de metal muito fino. Existem pequenos símbolos inescrutáveis ​​pintados no verso. (Consulte Qatik no Red Wing Casino para trocar esses tokens por prêmios.)"
"This rhino horn is made of ivory. You could have sworn rhino horns were made of hardened fat, but nope, clearly you were wrong.": "Este chifre de rinoceronte é feito de marfim. Você poderia jurar que os chifres de rinoceronte eram feitos de gordura endurecida, mas não, claramente você estava errado."
"This ring can make anyone a little more beastly, but works best on those who already were.": "Este anel pode deixar qualquer um um pouco mais bestial, mas funciona melhor com quem já o foi."
"This ring glows a pale blue.": "Este anel brilha em azul claro."
"This ring has little barbs all along the outside. Takes some practice to wear it safely.": "Este anel tem pequenas farpas por toda parte externa. É preciso alguma prática para usá-lo com segurança."
"This ring is blackened and pitted from (presumed) acid splashes.": "Este anel está enegrecido e esburacado por (supostos) respingos de ácido."
"This ring is made of a strange material that resembles hard bread, and is supposedly designed to \"soak up\" the alcohol in your system.": "Este anel é feito de um material estranho que lembra pão duro e supostamente foi projetado para “absorver” o álcool do seu sistema."
"This ring is slightly warm to the touch.": "Este anel é ligeiramente quente ao toque."
"This ring is unpleasantly warm.": "Este anel é desagradavelmente quente."
"This ring makes you faster. More alert. Jittery. Nervous. Uncomfortable. Tired. But faster!": "Este anel deixa você mais rápido. Mais alerta. Nervoso. Nervoso. Desconfortável. Cansado. Mas mais rápido!"
"This ring makes you unnoticeable by monsters, unless they see you in combat.": "Este anel torna você imperceptível para monstros, a menos que eles o vejam em combate."
"This ring seems ready to fly off your finger at any moment, but mercifully stays put.": "Este anel parece pronto para voar do seu dedo a qualquer momento, mas felizmente permanece no lugar."
"This ring seems to be made of stone. It's heavy.": "Este anel parece ser feito de pedra. É pesado."
"This ring weighs almost nothing.": "Este anel não pesa quase nada."
"This rock is always painfully hot to the touch.": "Esta rocha é sempre dolorosamente quente ao toque."
"This rum has been aged and is ready to be filtered and flavored.": "Este rum foi envelhecido e está pronto para ser filtrado e aromatizado."
"This rum needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este rum precisa ser armazenado em uma caverna por uma hora antes de poder ser bebível. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This saddlebag can hold a lot of stuff.": "Este alforje pode conter muitas coisas."
"This saddlebag has lots of pockets!": "Este alforje tem muitos bolsos!"
"This salami reeks of spices and... hm, is that a whiff of undeath?": "Este salame cheira a especiarias e... hm, isso é um cheiro de morto-vivo?"
"This scribbled mess is supposedly about pies, but it doesn't contain any recognizable shapes -- just ugly blobs. It's unsigned and unappealing.": "Essa bagunça rabiscada supostamente é sobre tortas, mas não contém nenhuma forma reconhecível – apenas manchas feias. Não está assinado e é desagradável."
"This seems like a simple evil crossbow, but in actuality is far more complex, with bizarre otherworldly magic.": "Parece uma simples besta maligna, mas na verdade é muito mais complexa, com uma magia bizarra de outro mundo."
"This seems to be made of enchanted ice. Kind of neat.": "Isto parece ser feito de gelo encantado. Bem legal."
"This self-learning workbook teaches you how to create robust fighting dirks. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como criar adagas de combate robustas. Inicialmente ensina duas receitas; complete essas receitas para aprender versões de nível superior."
"This self-learning workbook teaches you how to create standard broadswords. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como criar espadas padrão. Inicialmente ensina duas receitas; complete essas receitas para aprender versões de nível superior."
"This self-learning workbook teaches you how to create various claw-style fighting weapons. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como criar várias armas de combate do tipo garra. Inicialmente ensina duas receitas; complete essas receitas para aprender versões de nível superior."
"This self-learning workbook teaches you how to create various exotic claw+flask hybrid weapons. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como criar várias armas híbridas exóticas de garra + frasco. Inicialmente ensina duas receitas; complete essas receitas para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for improving the accuracy of bows. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para melhorar a precisão dos arcos. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for improving the damage of bows. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para melhorar o dano dos arcos. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening daggers. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para afiar adagas. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening dirks. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para afiar punhais. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening metal claw weapons. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para afiar armas com garras de metal. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening swords. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Este livro de autoaprendizagem ensina como fazer um kit de ajuste para afiar espadas. Inicialmente ensina uma receita; complete esta receita para aprender versões de nível superior."
"This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.": "Esta série de livros do sábio goblin Muligu detalha cada deus que pode ajudá-lo com uma questão relacionada ao conhecimento."
"This shell is in amazing condition.": "Esta concha está em condições incríveis."
"This shield was stuck to a big droach for decades. It apparently absorbed some of the droach's protective power.": "Este escudo ficou preso a uma grande barata por décadas. Aparentemente absorveu parte do poder protetor da barata."
"This Shirt is specifically designed for storage-type characters. This item cannot be augmented, transmuted or enchanted in any way.": "Esta camisa foi projetada especificamente para personagens do tipo armazenamento. Este item não pode ser aumentado, transmutado ou encantado de forma alguma."
"This shoddily-made ring improves psychic attacks.": "Este anel de má qualidade melhora os ataques psíquicos."
"This shoe has been heavily over-engineered, with secret cushions and odd snaps to ensure a perfect fit for any foot size.": "Este sapato foi superprojetado, com almofadas secretas e encaixes estranhos para garantir um ajuste perfeito para qualquer tamanho de pé."
"This short sword is fairly terrible for anything except gutting livestock. But it does that really well!": "Esta espada curta é bastante terrível para qualquer coisa, exceto para eviscerar gado. Mas faz isso muito bem!"
"This silver charm is engraved with two angelic wings inset with an azure gem in the middle. It slows the wearer's fly speed while also reducing the cost of staying in the air, ideal for one who enjoys being up among the clouds.": "Este pingente de prata tem duas asas angelicais gravadas com uma gema azul no meio. Ele diminui a velocidade de voo do usuário e ao mesmo tempo reduz o custo de permanecer no ar, ideal para quem gosta de estar entre as nuvens."
"This simple fist weapon was fitted for a goblin's hand, but you can make it work. (Cestuses count as an empty hand for purposes of Unarmed attacks.)": "Esta arma simples foi adaptada para a mão de um goblin, mas você pode fazê-la funcionar. (Cestus conta como uma mão vazia para fins de ataques desarmados.)"
"This simple fist weapon will make your punches hurt more.": "Esta simples arma de punho fará com que seus socos doam mais."
"This simple platemail has sufficient protection, but it could do with more padding. Very uncomfortable!": "Esta cota de malha simples tem proteção suficiente, mas precisa de mais acolchoamento. Muito desconfortável!"
"This slightly off-white metal ring improves a Sword ability: Many Cuts.": "Este anel de metal levemente esbranquiçado melhora a habilidade da Espada: Muitos Cortes."
"This slightly off-white metal ring improves a Sword ability: Wind Strike.": "Este anel de metal ligeiramente esbranquiçado melhora a habilidade da espada: Wind Strike."
"This small bag of sand is almost painful to the touch. Its most common use is in crafting magical items, where it is used as a magic insulator during smithing.": "Este pequeno saco de areia é quase doloroso ao toque. Seu uso mais comum é na confecção de itens mágicos, onde é usado como isolante mágico durante a forja."
"This small fire is warm enough to keep you from freezing to death, but not good enough for much else. Lasts 60 seconds once deployed.": "Esta pequena fogueira é quente o suficiente para evitar que você morra de frio, mas não é boa o suficiente para muitas outras coisas. Dura 60 segundos depois de implantado."
"This small gem is brownish orange. It has been tuned as an amplifier for certain tailoring recipes.": "Esta pequena joia é laranja acastanhada. Foi ajustado como amplificador para certas receitas de alfaiataria."
"This small metal band seems to get tighter and tighter the longer you wear it.": "Esta pequena faixa de metal parece ficar cada vez mais apertada quanto mais você a usa."
"This smells and tastes like rotten fruit. It's thick as mud.": "Isso cheira e tem gosto de fruta podre. É espesso como lama."
"This smelly gel will hyper-accelerate your heart. What could go wrong?": "Este gel fedorento irá hiperacelerar seu coração. O que poderia dar errado?"
"This smelly gel will overclock your brain. What could go wrong?": "Este gel fedorento irá acelerar seu cérebro. O que poderia dar errado?"
"This sort of instrument is said to be used by elves when they go to war. The last elven war is a distant memory, however, so it's unclear who's making these horns.": "Diz-se que esse tipo de instrumento é usado pelos elfos quando vão para a guerra. A última guerra élfica é uma memória distante, portanto não está claro quem está fazendo esses chifres."
"This special testing shield grants the wielder immense health.": "Este escudo de teste especial concede imensa saúde ao usuário."
"This spicy-yet-slimy liquid toughens your flesh so that you're better insulated against the cold.": "Este líquido picante, mas viscoso, endurece sua carne para que você fique melhor isolado do frio."
"This spider equipment features a system of discrete tubes that can dispense chemicals.": "Este equipamento spider possui um sistema de tubos discretos que podem dispensar produtos químicos."
"This staff has a surprising amount of detail work. Grips at just the right places, metal tips, and a reduction of weight without adversely affecting durability. (It will work for Staff Fighting but not Fire Magic abilities.)": "Esta equipe tem uma quantidade surpreendente de trabalho detalhado. Apertos nos lugares certos, pontas de metal e redução de peso sem afetar negativamente a durabilidade. (Funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"This staff has a surprising amount of detail work. Grips at just the right places, metal tips, and a reduction of weight without adversely affecting durability. The Fire Magic runes are elegant but understated.": "Esta equipe tem uma quantidade surpreendente de trabalho detalhado. Apertos nos lugares certos, pontas de metal e redução de peso sem afetar negativamente a durabilidade. As runas Fire Magic são elegantes, mas discretas."
"This staff has seen so much. Thankfully it can't talk.": "Essa equipe já viu muito. Felizmente ele não pode falar."
"This staff is what you'd expect from a combat staff. Absolutely nothing special, though. The standard Fire Magic runes have been etched into the wood.": "Este cajado é o que você esperaria de um cajado de combate. Absolutamente nada de especial, no entanto. As runas padrão do Fire Magic foram gravadas na madeira."
"This staff is what you'd expect from a combat staff. Absolutely nothing special, though. This will work for Staff Fighting but lacks the runes necessary to work for Fire Magic.": "Este cajado é o que você esperaria de um cajado de combate. Absolutamente nada de especial, no entanto. Isso funcionará para Staff Fighting, mas não possui as runas necessárias para funcionar para Fire Magic."
"This strain of gur-horta is relatively weak, making it a poor choice for refining into combat potions. However, it's popular among orcs that smoke the leaves recreationally due to its mellow taste and low side-effects.": "Esta variedade de gur-horta é relativamente fraca, tornando-a uma má escolha para refinar em poções de combate. No entanto, é popular entre os orcs que fumam as folhas para fins recreativos devido ao seu sabor suave e aos baixos efeitos colaterais."
"This strain of gur-horta is relatively weak, making it a poor choice for refining into combat potions. However, it's popular among orcs that smoke the leaves recreationally due to its vibrant aroma and low side-effects.": "Esta variedade de gur-horta é relativamente fraca, tornando-a uma má escolha para refinar em poções de combate. No entanto, é popular entre os orcs que fumam as folhas recreativamente devido ao seu aroma vibrante e aos baixos efeitos colaterais."
"This strange beaker constantly drips sugar-water. It has an inscription: \"Keep those bees buzzin' and those birds flying high! - Galdyr\"": "Este estranho copo goteja constantemente água com açúcar. Tem uma inscrição: \"Mantenha essas abelhas zumbindo e esses pássaros voando alto! - Galdyr\""
"This strange cloth is luxurious to the touch, yet incredibly strong.": "Este tecido estranho é luxuoso ao toque, mas incrivelmente forte."
"This strange cloth is smooth and cool to the touch.": "Este estranho pano é macio e fresco ao toque."
"This strangely-weighted punching weapon requires skill to use, but is quite deadly in the right hand.": "Esta arma de soco de peso estranho requer habilidade para ser usada, mas é bastante mortal na mão direita."
"This strawberry is no longer fit to eat.": "Este morango não serve mais para comer."
"This style of dwarven weapon has been in use for centuries. It makes an excellent stabbing weapon but lacks versatility.": "Este estilo de arma anã tem sido usado há séculos. É uma excelente arma de esfaqueamento, mas carece de versatilidade."
"This style of hat is named after a cow who, in stories and tall tales, was said to be the mightiest cow ever. Truffle supposedly went on adventures and defeated demons, ghosts, and werewolves -- all while wearing this hat.": "Este estilo de chapéu tem o nome de uma vaca que, em histórias e contos fantásticos, era considerada a vaca mais poderosa de todos os tempos. Truffle supostamente partiu em aventuras e derrotou demônios, fantasmas e lobisomens – tudo isso enquanto usava este chapéu."
"This style of orcish military greaves has seen hundreds of years of iteration and improvement.": "Este estilo de torresmos militares orcs passou por centenas de anos de iteração e aprimoramento."
"This style of plate boot is named after the elven knight Niph. As the story goes, Niph fought off an army of undead alone, somehow running \"faster than death itself.\"": "Este estilo de bota de placa tem o nome do cavaleiro élfico Niph. Conforme a história continua, Niph lutou sozinho contra um exército de mortos-vivos, de alguma forma correndo “mais rápido que a própria morte”."
"This sucker's seen some good times and some bad times. But mostly bad times, from the shield's point of view.": "Esse idiota já passou por bons e maus momentos. Mas principalmente tempos ruins, do ponto de vista do escudo."
"This supposedly protects against brain-eaters.": "Isso supostamente protege contra comedores de cérebro."
"This sword is sharp. Really sharp. As sharp as you can probably get without imbuing it with magic.": "Esta espada é afiada. Muito afiado. O mais nítido que você provavelmente conseguirá sem imbuí-lo de magia."
"This sword was stuck to a big spider. It's not really in good shape, but the holes in the blade make a neat whistling sound when you swing it.": "Esta espada estava presa a uma grande aranha. Não está em bom estado, mas os buracos na lâmina emitem um som sibilante quando você a balança."
"This tasty beverage helps you digest cheese.": "Esta bebida saborosa ajuda a digerir o queijo."
"This tattered cloak would seem like an ordinary rag except for a thick Necromancy Gem carefully sewn inside.": "Este manto esfarrapado pareceria um trapo comum, exceto por uma grossa Gema de Necromancia cuidadosamente costurada dentro dele."
"This tequila has been aged and is ready to be filtered and flavored.": "Esta tequila foi envelhecida e está pronta para ser filtrada e aromatizada."
"This tequila needs to be stored in a cave for two hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Esta tequila precisa ser armazenada em uma caverna por duas horas antes de poder ser consumida. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This terrifying medallion once belonged to an Ormalan man named Fredrick, the mate of Liamu the Watchful.": "Este terrível medalhão pertenceu a um homem ormalan chamado Fredrick, companheiro de Liamu, o Vigilante."
"This thick and ungainly thing was the preferred armor of the ancient Dwarven Stalwarts. It's easy to see why: this armor is very... stalwart.": "Essa coisa grossa e desajeitada era a armadura preferida dos antigos Anões Robustos. É fácil perceber porquê: esta armadura é muito... robusta."
"This thick liquid has bits of fulgurite in it. Mm.": "Este líquido espesso contém pedaços de fulgurito. Hum."
"This thick liquid has little glowing orbs in it.": "Este líquido espesso contém pequenas esferas brilhantes."
"This thick muddy substance causes your storage capacity to grow without the problem of unsightly pocket bulges.": "Essa substância espessa e lamacenta faz com que sua capacidade de armazenamento cresça sem o problema de protuberâncias feias nas bolsas."
"This thick wooden ring feels surprisingly light.": "Este anel de madeira grosso parece surpreendentemente leve."
"This thick-handled bow gives tiny psychic cues to the owner, helping it aim perfectly. Some inherently psychic individuals can further take advantage of this mental amplification.": "Este arco de cabo grosso fornece pequenas dicas psíquicas ao proprietário, ajudando-o a mirar perfeitamente. Alguns indivíduos inerentemente psíquicos podem aproveitar ainda mais essa amplificação mental."
"This thin chain features an onyx figurine of an orc on a horse. Orcish rituals have attuned it to several gods, including Tast, Arisetsu, and Akhisa.": "Esta corrente fina apresenta uma estatueta de ônix de um orc montado em um cavalo. Os rituais orcs sintonizaram vários deuses, incluindo Tast, Arisetsu e Akhisa."
"This ticket entitles the bearer to a free game of Cashfall Match-3 at the Red Wing Casino.": "Este bilhete dá ao portador o direito a um jogo grátis de Cashfall Match-3 no Red Wing Casino."
"This ticket entitles the bearer to a free game of Lootmaster Match-3 at the Red Wing Casino.": "Este bilhete dá ao portador o direito a um jogo grátis de Lootmaster Match-3 no Red Wing Casino."
"This ticket entitles the bearer to a free game of Monsters and Mantids at any table in the Red Wing Casino.": "Este bilhete dá ao portador o direito a um jogo grátis de Monstros e Mantídeos em qualquer mesa do Red Wing Casino."
