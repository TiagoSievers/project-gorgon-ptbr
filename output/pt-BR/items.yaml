"Although clearly intended to be gloves, these are little more than wads of leather in vaguely-hand-shaped form. Expect immense amounts of palm sweat!": "Embora claramente pretendam ser luvas, estas são pouco mais do que maços de couro em formato vagamente de mão. Espere imensas quantidades de suor nas palmas das mãos!"
"Although it would appear to leave the wearer completely blind, the magical helmet allows perfect visibility.": "Embora pareça deixar o usuário completamente cego, o capacete mágico permite uma visibilidade perfeita."
"Although nothing special by elven standards, other races would kill for the secrets of the protective runes etched into this shield.": "Embora nada de especial para os padrões élficos, outras raças matariam pelos segredos das runas protetoras gravadas neste escudo."
"Although still pretty, this shell took serious damage and is no longer structurally sound.": "Embora ainda bonita, esta concha sofreu sérios danos e não é mais estruturalmente sólida."
"Although technically Orcish, these bows are made by Dwarven conscripts.": "Embora tecnicamente Orcs, esses arcos são feitos por recrutas Anões."
"Although there might be delicious varieties of strawberry wine out there somewhere, this is not it: the strawberry flavor is undermined by a grassy taste.": "Embora possa haver variedades deliciosas de vinho de morango em algum lugar, não é esta: o sabor do morango é prejudicado por um sabor herbáceo."
"Although they're leather instead of metal, these insulated boots are made for protection, not grace or mobility.": "Embora sejam de couro em vez de metal, essas botas isoladas são feitas para proteção, não para graça ou mobilidade."
