"Roughly translates to \"Brukwint with Meat\", this is a traditional goblin sandwich but the mushroom has been replaced by meat of some kind, making it even more delicious.": "Traduzido aproximadamente como \"Brukwint com Carne\", este é um sanduíche tradicional de goblin, mas o cogumelo foi substituído por algum tipo de carne, tornando-o ainda mais delicioso."
