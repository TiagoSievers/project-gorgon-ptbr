"Another piece of once-ceremonial armor that was retrofitted for combat during the Elf-Dwarf wars. The suit has since become a favorite of elven warriors thanks to its handy odor-repulsion magic. And also, of course, its insane amount of protection.": "Outra peça de armadura outrora cerimonial que foi adaptada para combate durante as guerras entre Elfos e Anões. Desde então, o traje se tornou o favorito dos guerreiros élficos graças à sua prática magia de repulsão de odores. E também, é claro, sua quantidade absurda de proteção."
"Another public-relations disaster by the famous Veilmoor clan of human smiths, these claws are each imbued with the soul of a kitten who would otherwise have been euthanized. While it's not technically illegal to use such small souls in enchanting, the 'save the kittens forever' campaign was not appreciated by the weapon-buying public. But as is typical with Veilmoor products, the weapon is so good that nothing else matters too much.": "Outro desastre de relações públicas do famoso clã Veilmoor de ferreiros humanos, cada uma dessas garras está imbuída da alma de um gatinho que de outra forma teria sido sacrificado. Embora não seja tecnicamente ilegal usar almas tão pequenas para encantar, a campanha “salve os gatinhos para sempre” não foi apreciada pelo público comprador de armas. Mas, como é típico dos produtos Veilmoor, a arma é tão boa que nada mais importa muito."
"Another tiresome chapbook by Su-Moltik. This one is an exercise in metaphor over-extension, where the eponymous tonsils are described as being in the Throat of Belief, which is surrounded by the Neck Muscles of Close-Mindedness. It goes on like that for a very long time. Its unintentional hilarity has made it a cult classic, much to Su-Moltik's confusion and annoyance.": "Outro livro cansativo de Su-Moltik. Este é um exercício de superextensão de metáfora, onde as amígdalas de mesmo nome são descritas como estando na Garganta da Crença, que é cercada pelos Músculos do Pescoço da Mente Fechada. Isso continua assim por muito tempo. Sua hilaridade involuntária o tornou um clássico cult, para grande confusão e aborrecimento de Su-Moltik."
"Another volume by the dwarven master Gammo. Each dwarven god gets their own epic-length poem. One, the poem about Ormorek, is very good. The others are <i>embarrassingly</i> bad. But Gammo is long dead, so dwarven society seems to have agreed to just conveniently forget about the bad ones.": "Outro volume do mestre anão Gammo. Cada deus anão recebe seu próprio poema épico. Um deles, o poema sobre Ormorek, é muito bom. Os outros são <i>embaraçosamente</i> ruins. Mas Gammo morreu há muito tempo, então a sociedade anã parece ter concordado em simplesmente esquecer os maus."
