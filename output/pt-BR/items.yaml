"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +120 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +120 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +20 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +20 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +40 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +40 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +80 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +80 de dano."
"For 15 minutes, boosts Anatomy Critical-Hit Chance +8%": "Por 15 minutos, aumenta a chance de acerto crítico da anatomia em +8%"
"For 15 minutes, gain +7 Max Breath": "Por 15 minutos, ganhe +7 de Respiração Máxima"
"For 15 minutes, makes you think you look like a skeleton. Does not stack with other premonition buffs. (You can only gain one candle buff at a time.)": "Por 15 minutos, faz você pensar que parece um esqueleto. Não acumula com outros buffs de premonição. (Você só pode ganhar um buff de vela por vez.)"
"For 15 minutes, melee attacks deal +100 damage, melee evasion is +20%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers excruciating withdrawal effects for 45 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +100 de dano, a evasão corpo a corpo é de +20% e o XP é ganho mais rápido quando você está com a mente certa. Depois disso, o bebedor sofre efeitos de abstinência excruciantes por 45 minutos."
"For 15 minutes, melee attacks deal +25 damage and melee evasion is +5%. Then the drinker suffers withdrawal effects for 15 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +25 de dano e a evasão corpo a corpo é de +5%. Então o bebedor sofre efeitos de abstinência por 15 minutos."
"For 15 minutes, melee attacks deal +50 damage, melee evasion is +10%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers painful withdrawal effects for 20 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +50 de dano, a evasão corpo a corpo é de +10% e o XP é ganho mais rápido quando você está com a mente correta. Depois disso, o bebedor sofre efeitos dolorosos de abstinência por 20 minutos."
"For 15 minutes, melee attacks deal +75 damage, melee evasion is +15%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers agonizing withdrawal effects for 30 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +75 de dano, a evasão corpo a corpo é de +15% e o XP é ganho mais rápido quando você está com a mente correta. Depois, o bebedor sofre efeitos agonizantes de abstinência por 30 minutos."
"For 15 minutes, out-of-combat sprint speed is increased by 4": "Por 15 minutos, a velocidade de corrida fora de combate aumenta em 4"
"For 15 minutes, out-of-combat sprint speed is increased by 6": "Por 15 minutos, a velocidade de corrida fora de combate aumenta em 6"
"For 3 hours, lose 1% of Max Health and ignore the effects of alcohol withdrawal": "Por 3 horas, perca 1% da Saúde Máxima e ignore os efeitos da abstinência do álcool"
"For 30 minutes you can use the ability Disperse Skeleton. (Drinking this potion teaches you the ability if you don't already know it.)": "Por 30 minutos você pode usar a habilidade Disperse Skeleton. (Beber esta poção lhe ensina a habilidade, caso você ainda não a conheça.)"
"For 30 minutes you can use the ability Spider Punt. (Drinking this potion teaches you the ability if you don't already know it.)": "Por 30 minutos você pode usar a habilidade Spider Punt. (Beber esta poção lhe ensina a habilidade, caso você ainda não a conheça.)"
