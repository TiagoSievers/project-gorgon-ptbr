"Notus himself denies any such indiscretion and suggests that perhaps goblin cat-burglars stole the missing notebooks.\": \"Um caderno perdido do prolífico escriba do Conselho, Notus, que passou anos desenvolvendo formas inovadoras de catalogar o conhecimento do mundo. Como é que estes cadernos foram “perdidos” é um mistério, mas um boato persistente sugere que o próprio Noto os atirou na rua, enojado": "muitos peticionários recusaram-se a fazer a sua própria investigação, apesar dos seus excelentes índices. Ele logo se arrependeu de suas ações, mas os cadernos já haviam desaparecido."
