"Worn by a sentient panther for years. Its strong protective magic overshadows the smell of blood soaked into the collar.": "Usado por uma pantera senciente durante anos. Sua forte magia protetora ofusca o cheiro de sangue encharcado na coleira."
"Worn by both elves and dwarves during the Elf-Orc Wars, these boots were made for stomping.": "Usadas por elfos e anões durante as Guerras Elfos-Orcs, essas botas foram feitas para pisotear."
"Worn by fae officers aboard their strange ships. Made of an unrecognizable material.": "Usado por oficiais fae a bordo de seus navios estranhos. Feito de um material irreconhecível."
"Worn by lay followers of Strekios, the God of Self-Improvement. It's styled after the terrifying medallions worn at Strekios Camps, but this one is purely decorative, aside from a few enchantments that were added later.": "Usado por seguidores leigos de Strekios, o Deus do Autoaperfeiçoamento. Tem o estilo dos terríveis medalhões usados ​​nos acampamentos de Strekios, mas este é puramente decorativo, exceto alguns encantamentos que foram adicionados posteriormente."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank that most can expect to reach, given mages' glass ceiling in orcish society.": "Usado por magos orcs depois de serem promovidos a 'Magic Trooper', que é o posto mais alto que a maioria pode esperar alcançar, dado o teto de vidro dos magos na sociedade orc."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank they can expect to reach, given mages' glass ceiling in orcish society.": "Usado por magos orcs depois de serem promovidos a 'Magic Trooper', que é o posto mais alto que eles podem esperar alcançar, dado o teto de vidro dos magos na sociedade orc."
"Worn by ranalon to help protect their sensitive skin from environmental harm.": "Usado por ranalon para ajudar a proteger sua pele sensível dos danos ambientais."
"Worn by the elite Snowblood orcs that take care of problematic situations in battle. They're hard to maintain, but impressively protective.": "Usado pelos orcs de elite Snowblood que cuidam de situações problemáticas em batalha. Eles são difíceis de manter, mas impressionantemente protetores."
"Worn leather boots with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Botas de couro gastas com metal meticulosamente inserido nelas. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn leather pants with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Calças de couro gastas com metal meticulosamente inserido nelas. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn leather with metal meticulously inserted into it. Whoever made this lacked skill in leatherworking, but made up for it with time and attention to detail.": "Couro desgastado com metal meticulosamente inserido nele. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn to high-society functions by the elite of Rahu, these lovely gloves are also fairly comfortable.": "Usadas em funções da alta sociedade pela elite de Rahu, essas lindas luvas também são bastante confortáveis."
"Woven with fairy magic, this lovely shirt regenerates its leaves continuously. Unfortunately it is extremely itchy to wear. But noone said safety and comfort had to go hand in hand, so stop complaining.": "Tecido com magia de fada, esta linda camisa regenera suas folhas continuamente. Infelizmente, é extremamente coceira de usar. Mas ninguém disse que segurança e conforto devem andar de mãos dadas, então pare de reclamar."
"Wow! Awesome! You could sleep in this baby, it's so comfortable.": "Uau! Incrível! Você poderia dormir com este bebê, é tão confortável."
"Wow, off-red utility gloves. Nice. I guess.": "Uau, luvas utilitárias off-red. Legal. Eu acho."
"Wow, purple gloves. Very nice.": "Uau, luvas roxas. Muito legal."
"Wow, someone put way too much effort into these cow shoes!": "Uau, alguém se esforçou demais nesses sapatos de vaca!"
"Wow, someone put way too much effort into these deer shoes!": "Uau, alguém se esforçou demais nesses sapatos de cervo!"
"Wow, someone put way too much effort into these wooden cow shoes!": "Uau, alguém se esforçou demais nessas botas de madeira para vacas!"
"Wow, someone put way too much effort into these wooden deer shoes!": "Uau, alguém se esforçou demais nesses sapatos de madeira de cervo!"
"Wow, who made this leather? That's craftsmanship! You just want to touch it constantly.": "Nossa, quem fez esse couro? Isso é artesanato! Você só quer tocá-lo constantemente."
"Wow. Now you KNOW you've seen deer-shoe craftsmanship. These tiny things are delicate, yet indestructible.": "Uau. Agora você SABE que já viu artesanato com sapatos de cervo. Essas pequenas coisas são delicadas, mas indestrutíveis."
