"This candy has some sort of horrible flavor. Licorice? It's awful.": "Este doce tem um sabor horrível. Alcaçuz? É horrível."
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 1 hour. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 1 hora. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 10 hours. (You do not need to remain in the cave or online the whole time.)": "Este barril precisa ser colocado em uma caverna fresca e úmida. O queijo dentro amadurecerá em 10 horas. (Você não precisa permanecer na caverna ou online o tempo todo.)"
