"Used by calligraphers when extremely fine detail must be inked.": "Usado por calígrafos quando detalhes extremamente finos devem ser pintados."
"Used by desperate soldiers who want some sort of protection against the demons they're forced to fight. It fortifies the body at the cost of agility.": "Usado por soldados desesperados que querem algum tipo de proteção contra os demônios que são forçados a combater. Fortalece o corpo à custa da agilidade."
"Used by dwarves who must venture onto the battle field to aid fallen comrades.": "Usado por anões que devem se aventurar no campo de batalha para ajudar camaradas caídos."
"Used by Gazluk orcs to inspire courage and/or fear.": "Usado pelos orcs Gazluk para inspirar coragem e/ou medo."
"Used by goblin necromancers. A necromancy gem has been embedded in a case made of bone shards.": "Usado por necromantes goblins. Uma gema de necromancia foi embutida em uma caixa feita de fragmentos de osso."
"Used by goblin paleontologists in pursuit of knowledge.": "Usado por paleontólogos duendes em busca de conhecimento."
"Used by orcs to smoke raw (unrefined) gur-horta.": "Usado por orcs para fumar gur-horta crua (não refinada)."
"Used by rakshasa house-builders to \"seal\" ghosts out of new homes. The efficacy of their technique, however, seems dubious.": "Usado por construtores de casas rakshasa para \"selar\" fantasmas de novas casas. A eficácia da sua técnica, no entanto, parece duvidosa."
"Used by ranalon martial artists to great effect.": "Usado por artistas marciais ranalon com grande efeito."
"Used by ratkin summoners to raise the dead and toss the occasional fireball.": "Usado por invocadores ratkin para ressuscitar os mortos e lançar bolas de fogo ocasionais."
"Used by some troll martial-artists that you definitely do not want to meet.": "Usado por alguns artistas marciais trolls que você definitivamente não quer conhecer."
"Used by the goblin necromancer Jumjab. It contains two different necromancy gems, in case one gets shattered in combat.": "Usado pelo goblin necromante Jumjab. Ele contém duas gemas de necromancia diferentes, caso uma delas seja quebrada em combate."
"Used by the migrant house-builders that until recently found work in Povus. While it can be used as a weapon, its primary purpose was to store powerful drink.": "Utilizado pelos construtores migrantes que até recentemente encontravam trabalho em Povus. Embora possa ser usado como arma, seu objetivo principal era armazenar bebidas poderosas."
"Used by the strongest of the legendary orcish Misery Troopers.": "Usado pelos mais fortes dos lendários Misery Troopers orcs."
"Used by the typical troops of the Crone Hegemony.": "Usado pelas tropas típicas da Hegemonia Crone."
"Used by vampires to \"clean\" blood so it can be used in alcoholic drinks. This one's antique.": "Usado por vampiros para “limpar” o sangue para que possa ser usado em bebidas alcoólicas. Este é antigo."
