"A device that floats around the wearer's head and conveys critical information during battle.": "Um dispositivo que flutua ao redor da cabeça do usuário e transmite informações críticas durante a batalha."
"A device that spins continuously when you hold it a certain way.": "Um dispositivo que gira continuamente quando você o segura de uma determinada maneira."
"A device that spins furiously when you hold it a certain way.": "Um dispositivo que gira furiosamente quando você o segura de uma determinada maneira."
"A diary written in Orcish.": "Um diário escrito em orc."
"A disgusting concoction created by someone who doesn't understand certain important concepts.": "Uma mistura nojenta criada por alguém que não entende certos conceitos importantes."
"A disgusting ring coated in a perpetual layer of slime. But the slime isn't acid. It's just slime.": "Um anel nojento coberto por uma camada perpétua de gosma. Mas o lodo não é ácido. É apenas lodo."
"A dish that could really use some spice. But it's tasty anyway.": "Um prato que realmente precisa de um pouco de tempero. Mas é gostoso de qualquer maneira."
"A dish that would definitely be too sweet if it didn't have the side-effect of numbing half your tastebuds while you eat.": "Um prato que seria definitivamente muito doce se não tivesse o efeito colateral de entorpecer metade das papilas gustativas enquanto você come."
