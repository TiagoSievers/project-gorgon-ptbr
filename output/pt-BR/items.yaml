"An acorn found on an old treant that had been growing in mire for ages. It apparently couldn't grow in that soil, but perhaps there's similar soil elsewhere in Povus that would work?": "Uma bolota encontrada em um velho ente que crescia na lama há muito tempo. Aparentemente não poderia crescer naquele solo, mas talvez haja solo semelhante em outro lugar em Povus que funcionaria?"
"An advanced preparation of the humble bird. Delicious!": "Uma preparação avançada do humilde pássaro. Delicioso!"
"An all-purpose token that can be used for various special or live events. To use or redeem this token, please follow the instructions given from the event you acquired it from. Please note that this token could disappear without notice once the associated event has ended.": "Um token multifuncional que pode ser usado para vários eventos especiais ou ao vivo. Para usar ou resgatar este token, siga as instruções fornecidas no evento em que você o adquiriu. Observe que este token pode desaparecer sem aviso prévio após o término do evento associado."
"An amulet. The symbol is a strangely-adorned anvil.": "Um amuleto. O símbolo é uma bigorna estranhamente adornada."
"An ancient alicorn that's been fitted into a harness for a deer to wear. It's adorned with weird citrus-fruit iconography, which contrasts strangely with the extraordinarily sharp horn.": "Um antigo alicórnio que foi colocado em um arreio para um cervo usar. É adornado com uma estranha iconografia de frutas cítricas, que contrasta estranhamente com o chifre extraordinariamente afiado."
"An ancient crest of unknown origin. Bring this to someone knowledgeable about the past and they may be able to identify it for you.": "Uma antiga crista de origem desconhecida. Leve isso para alguém com conhecimento do passado e ele poderá identificá-lo para você."
"An ancient dirk that has been altered by dark magic. But don't worry, it's still sharp.": "Um punhal antigo que foi alterado por magia negra. Mas não se preocupe, ainda está afiado."
"An ancient dwarven instrument from a long-lost age.": "Um antigo instrumento anão de uma era há muito perdida."
"An ancient painting of something natural. Bring this to someone who appreciates nature and they may be able to identify it for you.": "Uma pintura antiga de algo natural. Leve isso para alguém que aprecia a natureza e ele poderá identificá-la para você."
"An ancient stone key, worn by yetis as a good luck token.": "Uma antiga chave de pedra, usada pelos Yetis como símbolo de boa sorte."
"An ancient vase of unknown origin. Bring this to someone who understands Flower Arrangements and they may be able to identify it for you.": "Um vaso antigo de origem desconhecida. Leve isso para alguém que entenda de arranjos florais e ele poderá identificá-lo para você."
"An ancient weapon from the War of Froliac, used by elves who were very, <i>very</i> angry. It is etched with an image of the elven begonia, a symbol of trust broken and secrets defiled. Unfortunately, other races don't understand the symbolism and seem to think it's kind of sissy.": "Uma arma antiga da Guerra de Froliac, usada por elfos que estavam muito, muito zangados. Está gravada a imagem da begônia élfica, um símbolo de confiança quebrada e segredos contaminados. Infelizmente, outras raças não entendem o simbolismo e parecem pensar que é meio maricas."
"An animal has left these bones behind after eating a meal.": "Um animal deixou esses ossos para trás depois de comer uma refeição."
"An anonymous poem about farming. It's very, <i>very</i> long -- so long that it has become a cult classic in its own way, as bored elves challenge each other to memorize the entire thing. Then one partner will recite it during sex; the first person to finish loses the challenge.": "Um poema anônimo sobre agricultura. É muito, muito longo - tão longo que se tornou um clássico cult à sua maneira, enquanto elfos entediados desafiam uns aos outros para memorizar a coisa toda. Então um dos parceiros irá recitá-lo durante o sexo; a primeira pessoa a terminar perde o desafio."
"An antique plate with careful metalwork. It's tarnished and dented, but still valuable.": "Uma placa antiga com trabalho em metal cuidadoso. Está manchado e amassado, mas ainda valioso."
"An antique style of dwarven crossbow, discontinued due to a tendency to explode while loaded. But this one seems fine.": "Um estilo antigo de besta anã, descontinuado devido à tendência de explodir quando carregado. Mas este parece bom."
"An antique, encrusted metal key. Unfortunately it appears to be encrusted in bear shit.": "Uma chave antiga de metal incrustada. Infelizmente, parece estar incrustado em merda de urso."
"An appealing-smelling mix of vegetables and mystery meat.": "Uma mistura de vegetais e carne misteriosa com um cheiro atraente."
"An appetizer intended to be eaten before the cheese course.": "Um aperitivo destinado a ser consumido antes do prato de queijos."
"An aromatic, herby weed.": "Uma erva daninha aromática."
"An arrangement of calming flowers that helps one relax.": "Um arranjo de flores calmantes que ajuda a relaxar."
"An arrangement of flowers beloved by bees, and thus indirectly beloved by people who love to see bees happy.": "Um arranjo de flores querido pelas abelhas e, portanto, indiretamente querido por quem adora ver as abelhas felizes."
"An arrow designed for grabbing targets and pulling them via magically-enhanced thread.": "Uma flecha projetada para agarrar alvos e puxá-los por meio de um fio aprimorado magicamente."
"An arrow designed for grabbing targets and pulling them via magically-enhanced thread. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha projetada para agarrar alvos e puxá-los por meio de um fio aprimorado magicamente. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"An arrow specialized for extra-long-range flight.": "Uma flecha especializada em vôos de longo alcance."
"An arrow specialized for extra-long-range flight. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha especializada em vôos de longo alcance. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"An arrow with a hollow tube designed to deliver chemicals to a target.": "Uma flecha com um tubo oco projetada para lançar produtos químicos a um alvo."
"An arrow with a hollow tube designed to deliver chemicals to a target. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha com um tubo oco projetada para lançar produtos químicos a um alvo. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"An arrow with a magically-thin netting attached.": "Uma flecha com uma rede magicamente fina anexada."
"An arrow with a magically-thin netting attached. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha com uma rede magicamente fina anexada. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"An arrow with lots of extra weight. It won't go far, but it will hit with more impact.": "Uma flecha com muito peso extra. Não irá longe, mas atingirá com mais impacto."
"An arrow with lots of extra weight. It won't go far, but it will hit with more impact. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha com muito peso extra. Não irá longe, mas atingirá com mais impacto. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"An arrowhead is embedded in this wooden ring, making it rather uncomfortable to wear.": "Uma ponta de flecha está embutida neste anel de madeira, tornando-o bastante desconfortável de usar."
"An artist's depiction of what a fifth season might be like, if there was one between winter and spring. It's lovely, but it pretty much just looks like winter to you.": "Uma representação artística de como seria uma quinta temporada, se houvesse uma entre o inverno e a primavera. É lindo, mas parece inverno para você."
"An astonishingly intricate tiny harness designed to fit a giant butterfly, enabling Druidism.": "Um pequeno arnês surpreendentemente complexo projetado para acomodar uma borboleta gigante, permitindo o Druidismo."
"An attempt at perfect harmony: metal outside, wool inside. Unfortunately, the gloves get really sweaty and are prone to fungal infestation. Ew.": "Uma tentativa de harmonia perfeita: metal por fora, lã por dentro. Infelizmente, as luvas ficam muito suadas e estão sujeitas a infestações por fungos. Eca."
"An attractive longshield. The symbols on the back say \"Lead Without Fear\" in elvish.": "Um escudo longo atraente. Os símbolos nas costas dizem \"Lidere Sem Medo\" em élfico."
"An autopsy kit made of ice and fairy dust. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Um kit de autópsia feito de gelo e pó de fada. (Mantenha-o em seu inventário e você terá a opção de autopsiar cadáveres.)"
"An awesome work of magical engineering.": "Um incrível trabalho de engenharia mágica."
"An easy-to-make snack.": "Um lanche fácil de fazer."
"An edible mushroom.": "Um cogumelo comestível."
"An edible plant with a spicy and slightly bitter flavor.": "Planta comestível de sabor picante e levemente amargo."
"An elaborate contraption that can dispense free items. This model can dispense up to 10 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 10 unidades de um único tipo de item."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item and has a place for a custom message that all visitors will see.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 1.000 unidades de um único tipo de item e possui local para uma mensagem personalizada que todos os visitantes verão."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 1000 unidades de um único tipo de item."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 10 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 10 itens de um único tipo."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item and has a place for a custom message that all users will see.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 1.000 unidades de um único tipo de item e possui local para uma mensagem personalizada que todos os usuários verão."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 1.000 unidades de um único tipo de item."
"An elaborate network of nerves that connects the three heads together.": "Uma elaborada rede de nervos que conecta as três cabeças."
"An elegant if simple meal.": "Uma refeição elegante, embora simples."
"An elegant opal on a thin gold chain. Tasteful.": "Uma elegante opala em uma fina corrente de ouro. De bom gosto."
"An elegant, but simple, medallion on a chain.": "Um medalhão elegante, mas simples, preso a uma corrente."
"An elf-only tea that boosts the chance of anatomy critical hits with archery attacks. (For easy cleanup, the teapot magically biodegrades when the tea is consumed.)": "Um chá exclusivo para elfos que aumenta a chance de acertos críticos da anatomia com ataques de arco e flecha. (Para facilitar a limpeza, o bule se biodegrada magicamente quando o chá é consumido.)"
"An Elven bow made by someone with a lot of time on their hands. (An Elf, in other words.)": "Um arco élfico feito por alguém com muito tempo disponível. (Um elfo, em outras palavras.)"
"An Elven bow that's been enhanced with Goblin magic and lots of sharp bits.": "Um arco élfico que foi aprimorado com magia Goblin e muitas pontas afiadas."
"An Elven bow that's been enhanced with Goblin magic.": "Um arco élfico que foi aprimorado com magia Goblin."
"An Elven bow that's been enhanced with shoddy Goblin magic.": "Um arco élfico que foi aprimorado com magia Goblin de má qualidade."
"An Elven Longsword that has been customized and modified by an expert. Dozens of little lines have been scratched into the blade, suggesting perhaps that the weapon has been used to kill a great many of something.": "Uma espada longa élfica que foi personalizada e modificada por um especialista. Dezenas de pequenas linhas foram gravadas na lâmina, sugerindo talvez que a arma tenha sido usada para matar muitas coisas."
"An elven-style hunting bow.": "Um arco de caça de estilo élfico."
"An elvish drink. Not quite tea, and not quite fruit juice, but something in between.": "Uma bebida élfica. Não exatamente chá, nem suco de frutas, mas algo intermediário."
"An elvish invention. A single fist-sized cube of this will keep you from being hungry all day. Although supposedly \"jerky\" flavored, there is no meat involved in the recipe and it actually tastes sort of like a fruitcake.": "Uma invenção élfica. Um único cubo do tamanho de um punho evitará que você fique com fome o dia todo. Embora supostamente com sabor de “carne seca”, não há carne envolvida na receita e na verdade tem gosto de bolo de frutas."
"An elvish invention. A single fist-sized cube of this will keep you from being hungry all day. It tastes like fruitcake.": "Uma invenção élfica. Um único cubo do tamanho de um punho evitará que você fique com fome o dia todo. Tem gosto de bolo de frutas."
"An elvish lembas brick with a modified recipe intended to appeal to a wide variety of animals. It smells kind of like meat but there's no actual meat in the recipe. Most animals find it edible but unappealing. However, it stays fresh forever, and a single brick of food fills you up for a long time.": "Um tijolo élfico de lembas com uma receita modificada destinada a atrair uma grande variedade de animais. Tem cheiro de carne, mas não há carne de verdade na receita. A maioria dos animais considera-o comestível, mas pouco atraente. No entanto, permanece fresco para sempre e um único tijolo de comida sacia você por muito tempo."
"An empty book. Experts at Calligraphy can write in it at a Writing Table.": "Um livro vazio. Especialistas em caligrafia podem escrever em uma mesa de escrita."
"An enchanted block of ice that can never melt.": "Um bloco de gelo encantado que nunca pode derreter."
"An enchanted teapot, useful for holding enchanted tea. (But this one is empty.)": "Um bule encantado, útil para guardar chá encantado. (Mas este está vazio.)"
"An esoteric glass bauble that floats around the head. It boosts psychic power.": "Uma bugiganga de vidro esotérica que flutua ao redor da cabeça. Aumenta o poder psíquico."
"An esoteric glass bauble that floats around the head. It supposedly boosts psychic power.": "Uma bugiganga de vidro esotérica que flutua ao redor da cabeça. Supostamente aumenta o poder psíquico."
"An especially beautiful shell.": "Uma concha especialmente bonita."
"An especially flavorful chicken, ready for cooking.": "Um frango especialmente saboroso, pronto para cozinhar."
"An evil weapon forged in a dark fire. A necromancy gem rests in the hilt like a gaudy bauble.": "Uma arma maligna forjada em fogo escuro. Uma joia de necromancia repousa no punho como uma bugiganga vistosa."
"An evil-looking egg. Probably best not to eat this.": "Um ovo de aparência maligna. Provavelmente é melhor não comer isso."
"An excellent and versatile staff. All eight Suns of Arisetsu are etched into this staff, hidden amongst the arcane runes.": "Uma equipe excelente e versátil. Todos os oito Sóis de Arisetsu estão gravados neste cajado, escondidos entre as runas arcanas."
"An exceptional candle wick.": "Um pavio de vela excepcional."
"An exceptional instrument that's too complex for amateurs. This shell's intricate fingering is best left to bards.": "Um instrumento excepcional e complexo demais para amadores. É melhor deixar o dedilhado intrincado desta concha para os bardos."
"An exceptional piece of meat from a cow or bull.": "Um pedaço excepcional de carne de vaca ou touro."
"An exceptional piece of meat from a cow or bull. (Use in Cheap Meat recipes.)": "Um pedaço excepcional de carne de vaca ou touro. (Use em receitas de carne barata.)"
"An exceptional piece of meat from a deer.": "Um pedaço excepcional de carne de veado."
"An exceptional piece of meat from a rabbit or hare.": "Um pedaço excepcional de carne de coelho ou lebre."
"An exceptional piece of meat from a rabbit or hare. (Use in Cheap Meat recipes.)": "Um pedaço excepcional de carne de coelho ou lebre. (Use em receitas de carne barata.)"
"An exceptional professional racing saddle.": "Um selim de corrida profissional excepcional."
"An exceptionally well-made throwing knife. (Used with the Knife combat skill.)": "Uma faca de arremesso excepcionalmente bem feita. (Usado com a habilidade de combate Faca.)"
"An exotic filleting tool, only for fishing experts.": "Uma ferramenta de filetagem exótica, apenas para especialistas em pesca."
"An exotic key. As a security mechanism, it self-destructs after a few days.": "Uma chave exótica. Como mecanismo de segurança, ele se autodestrói após alguns dias."
"An exotic meal that uses a rare fish found only in the deepest of caves. The fish is delicious, but has a slightly bitter aftertaste that has to be drowned out by tons of lemon.": "Uma refeição exótica que utiliza um peixe raro encontrado apenas nas cavernas mais profundas. O peixe é delicioso, mas tem um sabor levemente amargo que deve ser abafado por toneladas de limão."
"An expensive necklace with a well-cut magic tourmaline. This type of necklace is often used by people who fear they are in danger of having a psychotic break, although it can only hold off the inevitable for a little while.": "Um colar caro com uma turmalina mágica bem lapidada. Esse tipo de colar é frequentemente usado por pessoas que temem correr o risco de sofrer um surto psicótico, embora só consiga adiar o inevitável por um tempo."
"An expert armor seller decided this coat was special.": "Um especialista em armaduras decidiu que este casaco era especial."
"An exquisite broadsword made for slicing and injuring.": "Uma espada larga requintada feita para cortar e ferir."
"An exquisite dessert.": "Uma sobremesa requintada."
"An exquisite morsel from some sort of creature that was cooked alive. The juices have been locked in and the aroma is tantalizing.": "Um pedaço requintado de algum tipo de criatura que foi cozida viva. Os sucos foram bloqueados e o aroma é tentador."
"An extraordinarily light weapon. The entire blade weighs less than the gaudy gem in the hilt.": "Uma arma extraordinariamente leve. A lâmina inteira pesa menos que a joia berrante no punho."
"An extraordinary elven-style hunting bow.": "Um extraordinário arco de caça de estilo élfico."
"An extraordinary staff with an alchemical beaker on the end. You can use this for staff fighting or battle chemistry. It's not suitable for fire magic, though.": "Um cajado extraordinário com um copo alquímico na ponta. Você pode usar isso para lutas de equipe ou química de batalha. Porém, não é adequado para magia de fogo."
"An extremely large, extremely docile frog. It's alive for now, but you should deliver it soon.": "Um sapo extremamente grande e extremamente dócil. Está vivo por enquanto, mas você deve entregá-lo em breve."
"An extremely rare shell.": "Uma concha extremamente rara."
"An extremely secret formula used by ratkin sages to predict when and where rodents will appear.": "Uma fórmula extremamente secreta usada pelos sábios ratkin para prever quando e onde os roedores aparecerão."
"An extremely tasty meal that needs no accompaniments.": "Uma refeição extremamente saborosa que dispensa acompanhamentos."
"An illicit and dangerous substance most often used to cheat at sports.": "Uma substância ilícita e perigosa usada com mais frequência para trapacear nos esportes."
"An immaculate candle wick.": "Um pavio de vela imaculado."
"An imperfectly weighted, terribly uncomfortable head covering.": "Uma cobertura para a cabeça com peso imperfeito e terrivelmente desconfortável."
"An impressive elven-style hunting bow.": "Um impressionante arco de caça em estilo élfico."
"An improvement over basic hash browns. Greasy and salty, in a good way!": "Uma melhoria em relação aos hash browns básicos. Gorduroso e salgado, no bom sentido!"
"An incredible mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma incrível escolha de mineração de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"An incredible piece of meat that's been overcooked to charcoal. Still edible, but a waste of quality beef.": "Um pedaço incrível de carne que foi cozido demais até virar carvão. Ainda comestível, mas um desperdício de carne bovina de qualidade."
"An incredibly rare form of pearl. It can be used in very-high-end jewelrymaking, and alchemists prize it above all other gems. Geologists, for their part, don't even consider it a gem at all.": "Uma forma incrivelmente rara de pérola. Ela pode ser usada na fabricação de joias de alta qualidade, e os alquimistas a valorizam acima de todas as outras gemas. Os geólogos, por sua vez, nem mesmo consideram isso uma joia."
"An inedible mushroom, used by alchemists.": "Cogumelo não comestível, usado por alquimistas."
"An innovatively compact hammered dulcimer.": "Um dulcimer martelado inovador e compacto."
"An insane amount of sugar has been used to totally mask the ingredients' taste. Now it just tastes like pure sugar, which is still kind of revolting.": "Uma quantidade absurda de açúcar foi usada para mascarar totalmente o sabor dos ingredientes. Agora só tem gosto de açúcar puro, o que ainda é meio nojento."
"An inscription claims \"Fame and Fortune are Fleeting...\"": "Uma inscrição diz \"Fama e fortuna são passageiras...\""
"An inscription in Elven reads \"To my lovely Velkort, thanks for a great evening.\"": "Uma inscrição em élfico diz \"Para minha adorável Velkort, obrigado por uma ótima noite.\""
"An inscription on this beautiful instrument claims that it was used by Ultimator to wake up a drunken company of troops at the Battle of Buttocks' End. If true, this battle has been lost to the ages. The instrument primarily excels at low fart-like noises.": "Uma inscrição neste belo instrumento afirma que ele foi usado pelo Ultimator para acordar uma companhia de tropas bêbadas na Batalha de Buttocks' End. Se for verdade, esta batalha está perdida há muito tempo. O instrumento se destaca principalmente em ruídos baixos, semelhantes a peidos."
"An instrument made of two ram horns, one embedded inside the other. The sound is terrible, so it is exclusively used as a weapon.": "Instrumento feito de dois chifres de carneiro, um embutido no outro. O som é terrível, por isso é usado exclusivamente como arma."
"An insulated helmet that is as frightening as it is protective.": "Um capacete isolado que é tão assustador quanto protetor."
"An introductory text. Most techniques are just tutorials, but the recipe for causing fruit to rot has a few uses. And it's good practice!": "Um texto introdutório. A maioria das técnicas são apenas tutoriais, mas a receita para apodrecer as frutas tem alguns usos. E é uma boa prática!"
"An invention of the yeti people, this kabob-like snack is best eaten <i>before</i> you learn the ingredients.": "Uma invenção do povo Yeti, esse lanche tipo espetinho é melhor comido <i>antes</i> de aprender os ingredientes."
"An invisible hat, or so the wearer would have you believe. Useful in glamouring.": "Um chapéu invisível, ou pelo menos é o que o usuário quer que você acredite. Útil no glamour."
"An invisible pair of boots, designed to force others to look at your bare feet whether they want to or not. Useful in glamouring.": "Um par de botas invisíveis, projetado para forçar outras pessoas a olharem para seus pés descalços, querendo ou não. Útil no glamour."
"An invisible shirt, perfect for the budding exhibitionist. Useful in glamouring.": "Uma camisa invisível, perfeita para o exibicionista iniciante. Útil no glamour."
"An iron sword with a thick coat of silver on top.": "Uma espada de ferro com uma espessa camada de prata no topo."
"An ocarina made of horn. This instrument is especially easy to learn.": "Uma ocarina feita de chifre. Este instrumento é especialmente fácil de aprender."
"An odd serrated utility knife that can be used to extract a skull from a corpse. (Your Butchering skill is used to determine success.)": "Uma estranha faca serrilhada que pode ser usada para extrair uma caveira de um cadáver. (Sua habilidade de Açougueiro é usada para determinar o sucesso.)"
"An odorous dish said to be palatable to psychic mantises.": "Um prato odorífero considerado palatável para louva-a-deus psíquicos."
"An off-hand blade favored by some elven fencers, who use it in conjunction with a longsword.": "Uma lâmina improvisada preferida por alguns esgrimistas élficos, que a usam em conjunto com uma espada longa."
"An off-hand knife used as a personal-defense weapon by some mages. It has a tiny warding glyph that diminishes damage.": "Uma faca improvisada usada como arma de defesa pessoal por alguns magos. Possui um pequeno glifo de proteção que diminui o dano."
"An off-hand weapon with nasty barbs to cause as much traumatic damage as possible.": "Uma arma secundária com farpas desagradáveis ​​para causar o máximo de dano traumático possível."
"An oily wax that smells great to bees. Used to help ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Uma cera oleosa que cheira bem às abelhas. Usado para ajudar a garantir o sucesso do acasalamento com abelhas ou vespas. (Para usar, dê a uma abelha ou vespa de estimação por meio da interface do Estável. O efeito dura até que o animal de estimação seja usado em uma tentativa de reprodução. Um animal de estimação só pode usar uma cera por vez; usar outra cera substitui a primeira.)"
"An old book written by an elf about how to use dwarven engineering in elven designs.": "Um livro antigo escrito por um elfo sobre como usar a engenharia anã em projetos élficos."
"An old brown plate, the kind vendors really like for some reason. Maybe there's a collectibles market you're unaware of.": "Um velho prato marrom, do tipo que os vendedores realmente gostam por algum motivo. Talvez haja um mercado de colecionáveis ​​que você desconhece."
"An old dwarven tool. While unexceptional by dwarven standards, it's quite impressive to many other races, who use it as an off-hand weapon.": "Uma velha ferramenta anã. Embora não seja excepcional para os padrões dos anões, é bastante impressionante para muitas outras raças, que a usam como arma secundária."
"An old key coated in bright red goo.": "Uma chave antiga coberta com uma gosma vermelha brilhante."
"An old key coated in purple fungus.": "Uma chave antiga coberta de fungo roxo."
"An old key encrusted in slime. Somehow it passed beyond the veil of death! But it's back now.": "Uma chave antiga incrustada em lodo. De alguma forma, passou além do véu da morte! Mas está de volta agora."
"An old key marred by rust.": "Uma chave velha manchada pela ferrugem."
"An old metal key from a dusty old chest you found under Hogan's Keep. Utterly unremarkable.": "Uma velha chave de metal de um baú velho e empoeirado que você encontrou embaixo da Fortaleza de Hogan. Totalmente normal."
"An old mini-loaf made to last decades. The outside is as hard as a rock, but the inside is still edible.": "Um mini-pão antigo feito para durar décadas. O exterior é duro como uma rocha, mas o interior ainda é comestível."
"An old style of blade, favored by some werewolves but not many others.": "Um estilo antigo de lâmina, preferido por alguns lobisomens, mas não por muitos outros."
"An old, forgotten memory that has been written down so as not to forget it again. This is used to remind certain people about certain events.": "Uma memória antiga, esquecida, que foi escrita para não voltar a ser esquecida. Isto é usado para lembrar certas pessoas sobre certos eventos."
"An orange.": "Uma laranja."
"An orcish chef used this to chop vegetables... and any drunk orcs that got out of line. Sharpened via an unknown technique, it cleaves through anything with ease.": "Um chef orc usou isso para picar vegetais... e qualquer orc bêbado que saísse da linha. Afiado através de uma técnica desconhecida, ele corta qualquer coisa com facilidade."
"An orcish concoction that uses your anger to keep you warm.": "Uma mistura orc que usa sua raiva para mantê-lo aquecido."
"An orcish Hal-Ku story (which are non-fiction accounts of orcs torturing other people to death). Recounts every minute of a six-week torture session, wherein the orcish author slowly killed a human alchemist. Much of the book is padded with grotesque anecdotes, but one useful recipe is hidden in the appendix.": "Uma história orc Hal-Ku (que são relatos de não ficção de orcs torturando outras pessoas até a morte). Relata cada minuto de uma sessão de tortura de seis semanas, em que o autor orc matou lentamente um alquimista humano. Grande parte do livro está repleta de anedotas grotescas, mas uma receita útil está escondida no apêndice."
"An orcish invention similar to a Dwarven N Core, but much more powerful. It has the same shape and size as the Dwarven version.": "Uma invenção orc semelhante a um Dwarven N Core, mas muito mais poderosa. Tem o mesmo formato e tamanho da versão Dwarven."
"An orcish ragant with a very Povus flair.": "Um orc ragant com um toque muito Povus."
"An orcish staple, famous for its lingering effect. It's... an acquired taste.": "Um alimento básico dos orcs, famoso por seu efeito duradouro. É... um gosto adquirido."
"An ordinary Council that's had weird little marks etched into it.": "Um Conselho comum que tinha pequenas marcas estranhas gravadas nele."
"An ordinary-looking glass flask that's cold to the touch, even in hot environments.": "Um frasco de vidro de aparência comum e frio ao toque, mesmo em ambientes quentes."
"An organ cut out of a large scorpion.": "Um órgão cortado de um grande escorpião."
"An Orichalcum blade with a seashell motif. (With random level 35 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 35.)"
"An Orichalcum blade with a seashell motif. (With random level 40 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 40.)"
"An Orichalcum blade with a seashell motif. (With random level 45 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 45.)"
"An original work by an elven name you don't recognize, Errasteria. It's lovely.": "Uma obra original com um nome élfico que você não reconhece, Errasteria. É adorável."
"An ornate staff that celebrates your renowned generosity.": "Uma equipe ornamentada que celebra sua reconhecida generosidade."
"An ornately jeweled hairpin used by goblins of both sexes.": "Um grampo de cabelo ornamentado com joias usado por goblins de ambos os sexos."
"An otherworldly device that can fire energy projectiles. It can also fire regular arrows.": "Um dispositivo de outro mundo que pode disparar projéteis de energia. Também pode disparar flechas normais."
"An over-engineered dwarven weapon. It requires a lot of maintenance, but most users find the accelerated reload-time worth it.": "Uma arma anã superprojetada. Requer muita manutenção, mas a maioria dos usuários acha que o tempo de recarga acelerado vale a pena."
"An over-engineered potion that's quite tricky to make. There are probably easier ways to make an equivalent potion. But at least it's not addictive.": "Uma poção superprojetada que é bastante complicada de fazer. Provavelmente existem maneiras mais fáceis de fazer uma poção equivalente. Mas pelo menos não é viciante."
"An oversized ring with bumps that seem to uniquely identify a specific demon.": "Um anel enorme com saliências que parecem identificar exclusivamente um demônio específico."
"An oversized saddlebag for sturdy mounts.": "Um alforje grande para montagens resistentes."
"An ugly and not-especially-sharp weapon made of cold iron. Goblins use them when hunting fairies for capture.": "Uma arma feia e não especialmente afiada feita de ferro frio. Goblins os usam quando caçam fadas para captura."
"An ugly green ring that leaves a vaguely smelly odor behind.": "Um anel verde feio que deixa um odor vagamente fedorento."
"An uncomfortably heavy ring made of black glass. It features a necromancy gem.": "Um anel desconfortavelmente pesado feito de vidro preto. Possui uma joia de necromancia."
"An understated saddlebag that is nevertheless quite enchantmented.": "Um alforje discreto mas bastante encantado."
"An unexpectedly refreshing drink.": "Uma bebida inesperadamente refrescante."
"An unfolding bloom of fried onion. Dipping sauce optional.": "Uma flor de cebola frita que se desdobra. Molho opcional."
"An unnatural blue liquid.": "Um líquido azul não natural."
"An unnaturally cold crystal.": "Um cristal anormalmente frio."
"An unpleasant substance that activates every area of your tongue at once.": "Uma substância desagradável que ativa todas as áreas da língua ao mesmo tempo."
"An unpleasant-tasting but nutritionally dense substance.": "Uma substância de sabor desagradável, mas nutricionalmente densa."
"An unusual but tasty meal.": "Uma refeição inusitada mas saborosa."
"An unusual staff with an alchemical beaker on the end. Not suitable for casting Fire Magic.": "Um cajado incomum com um copo alquímico na ponta. Não é adequado para lançar Fire Magic."
"An unusual tea with a strong kick.": "Um chá incomum com um chute forte."
