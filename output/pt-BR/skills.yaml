"Understanding of the rich history of art in Alharth. This skill can help you identify valuable artwork, but more importantly, it helps you to be a well-rounded individual.": "Compreensão da rica história da arte em Alharth. Essa habilidade pode ajudá-lo a identificar obras de arte valiosas, mas, mais importante, ajuda você a ser um indivíduo completo."
"Understanding the mind of sentient creatures. Also, using that knowledge in combat and other stressful situations.": "Compreender a mente das criaturas sencientes. Além disso, usar esse conhecimento em combate e outras situações estressantes."
