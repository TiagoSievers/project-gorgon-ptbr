"Necromancy is control over the undead, along with other powers that trifle with mortality. To use necromantic abilities, you must be wielding or wearing a necromancy gem. You can often find these on weapons, and less often on pieces of armor. (If you are in a beast form, necromancy gems in weapons won't work, but ones in armor will.) You must NOT be wearing a symbol of Arisetsu, as it will negate your powers.": "Necromancia é o controle sobre os mortos-vivos, junto com outros poderes que brincam com a mortalidade. Para usar habilidades necromânticas, você deve empunhar ou usar uma gema de necromancia. Muitas vezes você pode encontrá-los em armas e menos frequentemente em peças de armadura. (Se você estiver na forma de besta, as gemas de necromancia em armas não funcionarão, mas as em armadura sim.) Você NÃO deve usar um símbolo de Arisetsu, pois isso negará seus poderes."
