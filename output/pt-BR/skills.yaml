"Techniques to roast creatures alive with magic. Often considered horrific and immoral, but the results are inarguably delicious.

For best results, start with weak creatures and work your way up as your skill improves. Don't use huge single blasts -- hit the target with as many different Fire damage instances as possible to increase cooking likelihood. And most importantly: their last Hit Point must be lost to Fire damage (either direct or indirect).": "Técnicas para assar criaturas vivas com magia. Muitas vezes considerado horrível e imoral, mas os resultados são indiscutivelmente deliciosos.

Para obter melhores resultados, comece com criaturas fracas e vá aumentando conforme sua habilidade melhora. Não use grandes rajadas únicas – acerte o alvo com tantas instâncias diferentes de dano de Fogo quanto possível para aumentar a probabilidade de cozinhar. E o mais importante: seu último Ponto de Vida deve ser perdido devido a dano de Fogo (direto ou indireto)."
