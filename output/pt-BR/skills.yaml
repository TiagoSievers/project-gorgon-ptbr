"Knowledge and skill in the magical art of enhancing items with the spirit of deceased animals.": "Conhecimento e habilidade na arte mágica de aprimorar itens com o espírito de animais falecidos."
"Knowledge of crossbows, including how to fire and reload them, as well as how to maintain them in peak condition.": "Conhecimento de bestas, incluindo como dispará-las e recarregá-las, bem como mantê-las em perfeitas condições."
"Knowledge of many words in the common language.": "Conhecimento de muitas palavras na língua comum."
"Knowledge of the genetics of cats of all types.": "Conhecimento da genética de gatos de todos os tipos."
"Knowledge of the genetics of creatures in general. This is an umbrella skill that encompasses a vast suite of sub-skills for particular types of creatures. This skill represents generalized genetics knowledge.": "Conhecimento da genética das criaturas em geral. Esta é uma habilidade abrangente que abrange um vasto conjunto de sub-habilidades para determinados tipos de criaturas. Esta habilidade representa conhecimento genético generalizado."
"Knowledge of the genetics of cud-chewing herbivores such as cows, sheep, deer, and camels.": "Conhecimento da genética de herbívoros ruminantes, como vacas, ovelhas, veados e camelos."
"Knowledge of the genetics of large herbivores that do NOT chew cud, such as pigs, rhinos, and horses. Also covers hippos, which are not ungulates, but which are close enough.": "Conhecimento da genética de grandes herbívoros que NÃO ruminam, como porcos, rinocerontes e cavalos. Abrange também os hipopótamos, que não são ungulados, mas que estão bastante próximos."
"Knowledge of the genetics of spiders, insects, and scorpions.": "Conhecimento da genética de aranhas, insetos e escorpiões."
"Knowledge of the physiology of bears. Bugbears, which are half-goblin and half-bear, are also covered by this skill, as they take after their bear side more than the goblin side.": "Conhecimento da fisiologia dos ursos. Bugbears, que são meio goblin e meio urso, também são cobertos por esta habilidade, já que eles seguem mais seu lado urso do que o lado goblin."
"Knowledge of the physiology of cats of all types.": "Conhecimento da fisiologia de gatos de todos os tipos."
"Knowledge of the physiology of constructs such as golems.": "Conhecimento da fisiologia de construções como golems."
"Knowledge of the physiology of creatures in general. This is an umbrella skill that encompasses a vast suite of sub-skills for particular types of creatures. This skill represents generalized knowledge that applies to all creatures in the world.": "Conhecimento da fisiologia das criaturas em geral. Esta é uma habilidade abrangente que abrange um vasto conjunto de sub-habilidades para determinados tipos de criaturas. Esta habilidade representa conhecimento generalizado que se aplica a todas as criaturas do mundo."
"Knowledge of the physiology of creatures made by mad science or dark chemistry.": "Conhecimento da fisiologia das criaturas feitas pela ciência maluca ou pela química obscura."
"Knowledge of the physiology of crones and their ilk, including harpies, hags, and striga.": "Conhecimento da fisiologia das velhas e de sua laia, incluindo harpias, bruxas e striga."
"Knowledge of the physiology of cud-chewing herbivores such as cows, sheep, deer, and camels.": "Conhecimento da fisiologia de herbívoros ruminantes, como vacas, ovelhas, veados e camelos."
"Knowledge of the physiology of demons.": "Conhecimento da fisiologia dos demônios."
"Knowledge of the physiology of dinosaurs. This skill also covers birds, which are descended from dinosaurs, and dragons, which are descended from birds.": "Conhecimento da fisiologia dos dinossauros. Esta habilidade também abrange pássaros, que são descendentes de dinossauros, e dragões, que são descendentes de pássaros."
"Knowledge of the physiology of dogs, wolves, and werewolves. Gives bonuses to killing, skinning, and raising these creatures.": "Conhecimento da fisiologia de cães, lobos e lobisomens. Dá bônus para matar, esfolar e criar essas criaturas."
"Knowledge of the physiology of dwarves.": "Conhecimento da fisiologia dos anões."
"Knowledge of the physiology of elementals.": "Conhecimento da fisiologia dos elementais."
"Knowledge of the physiology of elves.": "Conhecimento da fisiologia dos elfos."
"Knowledge of the physiology of faeries and fey creatures, including some animals that look mundane but aren't, such as the fey panther.": "Conhecimento da fisiologia das fadas e criaturas feéricas, incluindo alguns animais que parecem mundanos, mas não são, como a pantera feérica."
"Knowledge of the physiology of fish. Also snails. They're very similar. Really.": "Conhecimento da fisiologia dos peixes. Também caracóis. Eles são muito parecidos. Realmente."
"Knowledge of the physiology of fungus people, slime monsters, overgrown bacteria, and ooze beasts.": "Conhecimento da fisiologia de pessoas com fungos, monstros viscosos, bactérias crescidas e feras exsudativas."
"Knowledge of the physiology of giant-kin such as yetis and ogres.": "Conhecimento da fisiologia de parentes gigantes, como Yetis e Ogros."
"Knowledge of the physiology of goblins.": "Conhecimento da fisiologia dos goblins."
"Knowledge of the physiology of humans.": "Conhecimento da fisiologia do ser humano."
"Knowledge of the physiology of incorporeal creatures, such as ghosts and shadow illusions.": "Conhecimento da fisiologia de criaturas incorpóreas, como fantasmas e ilusões sombrias."
"Knowledge of the physiology of large herbivores that do NOT chew cud, such as pigs, rhinos, and horses. Also covers hippos, which are not ungulates, but which are close enough.": "Conhecimento da fisiologia de grandes herbívoros que NÃO ruminam, como porcos, rinocerontes e cavalos. Abrange também os hipopótamos, que não são ungulados, mas que estão bastante próximos."
"Knowledge of the physiology of monstrous plants.": "Conhecimento da fisiologia de plantas monstruosas."
"Knowledge of the physiology of orcs.": "Conhecimento da fisiologia dos orcs."
"Knowledge of the physiology of rakshasa.": "Conhecimento da fisiologia do rakshasa."
"Knowledge of the physiology of rodents. Also covers the physiology of lagomorphs such as rabbits, despite their anatomical differences.": "Conhecimento da fisiologia dos roedores. Também aborda a fisiologia de lagomorfos como os coelhos, apesar de suas diferenças anatômicas."
"Knowledge of the physiology of snakes, snake-people, and generally snakey things.": "Conhecimento da fisiologia de cobras, pessoas-cobra e coisas geralmente cobradas."
"Knowledge of the physiology of spiders, insects, and scorpions.": "Conhecimento da fisiologia de aranhas, insetos e escorpiões."
"Knowledge of the physiology of undead, such as skeletons, zombies, and liches. This skill doesn't cover undead without bodies, such as ghosts and wraiths.": "Conhecimento da fisiologia dos mortos-vivos, como esqueletos, zumbis e liches. Esta habilidade não cobre mortos-vivos sem corpos, como fantasmas e aparições."
"Knowledge of the secret language of ancient fungus creatures.": "Conhecimento da linguagem secreta das antigas criaturas fúngicas."
"Knowledge of the techniques for creating Chest-Armor Augments and Leg-Armor Augments. (Augments for other types of equipment are covered by other skills.)": "Conhecimento das técnicas para criação de Aumentos de Armadura de Peito e de Armadura de Pernas. (Aprimoramentos para outros tipos de equipamentos são cobertos por outras habilidades.)"
"Knowledge of the techniques for creating Helm Augments and Shoes Augments. (Augments for other types of equipment are covered by other skills.)": "Conhecimento das técnicas para criar aumentos de leme e aumentos de calçados. (Aprimoramentos para outros tipos de equipamentos são cobertos por outras habilidades.)"
