"A careful exploration of gender roles and sexuality, focusing on Human, Elven, and Rakshasa cultures. This knowledge is not directly applicable to combat or crafting, but it helps you to be a well-rounded individual.": "Uma exploração cuidadosa dos papéis de gênero e da sexualidade, com foco nas culturas humana, élfica e rakshasa. Esse conhecimento não é diretamente aplicável ao combate ou à criação, mas ajuda você a ser um indivíduo completo."
"A measure of your renown. You earn Notoriety the first time you defeat certain enemies (typically any monster with a proper name), and for completing particularly difficult quests.": "Uma medida de sua fama. Você ganha notoriedade na primeira vez que derrota certos inimigos (normalmente qualquer monstro com nome próprio) e por completar missões particularmente difíceis."
"A rigorous magical discipline focusing on manipulating and engaging with the environment around you. Elves are the undisputed experts of the field, which causes some races to view it negatively. It is also sometimes mistaken for (illegal) Chaos Magic due to its chaotic and dangerous nature.": "Uma rigorosa disciplina mágica focada na manipulação e envolvimento com o ambiente ao seu redor. Os elfos são os especialistas indiscutíveis na área, o que faz com que algumas raças a vejam de forma negativa. Às vezes também é confundido com Magia do Caos (ilegal) devido à sua natureza caótica e perigosa."
"A specialization of Blacksmithing. Although bladesmiths can craft excellent weapons, they are often more preoccupied with maintaining blades at peak performance.": "Especialização em Ferraria. Embora os ferreiros possam fabricar armas excelentes, eles geralmente estão mais preocupados em manter as lâminas com desempenho máximo."
"A specialization of Fire Magic that focuses entirely upon lowering temperature instead of raising it. It has protective and controlling abilities as well as offensive abilities.": "Uma especialização da Magia do Fogo que se concentra inteiramente na redução da temperatura em vez de aumentá-la. Possui habilidades de proteção e controle, bem como habilidades ofensivas."
"A sub-skill of Cooking used in the creation of delicious fish meals.": "Uma sub-habilidade de Culinária usada na criação de deliciosas refeições de peixe."
"A sub-skill of Ice Magic dedicated to the creation of delicate ice items. These items tend to melt in hot environments.": "Uma sub-habilidade da Magia do Gelo dedicada à criação de itens delicados de gelo. Esses itens tendem a derreter em ambientes quentes."
"A sub-skill of Mentalism that focuses on psychic links to the fae realms.": "Uma sub-habilidade do Mentalismo que se concentra nas ligações psíquicas com os reinos feéricos."
