"An approach to health that involves taking into account factors beyond the obvious. Some critics claim that any benefits are due to the placebo effect, and they may be right. But if it works, who cares?": "Uma abordagem da saúde que envolve levar em consideração fatores além do óbvio. Alguns críticos afirmam que quaisquer benefícios se devem ao efeito placebo, e podem estar certos. Mas se funcionar, quem se importa?"
