"Urban Expression": "Expressão Urbana"
"Using alchemical concoctions in the heat of battle. Not for the faint of heart, or the particularly sane, this combat style specializes in area-effects of all types. Advanced practitioners can also ingest their formulae directly to take on new combat personalities. Masters can even create homonculi to serve them in battle.": "Usando misturas alquímicas no calor da batalha. Não é para os fracos de coração ou para os particularmente sensatos, este estilo de combate é especializado em efeitos de área de todos os tipos. Praticantes avançados também podem ingerir suas fórmulas diretamente para enfrentar novas personalidades de combate. Os mestres podem até criar homúnculos para servi-los na batalha."
"Using daggers and thrown knives in combat. Knife combat is extremely damaging, relying on traumatic injuries, poison, and subterfuge.": "Usando adagas e facas de arremesso em combate. O combate com faca é extremamente prejudicial, dependendo de lesões traumáticas, veneno e subterfúgios."
"Using Fire to destroy your enemies. This is a very potent offensive skill, including long-range and area-effect attacks, and even some Cold attacks for versatility. However, there are drawbacks: Fire Magic is extremely Power-intensive; all creatures generate extra Rage when they are burned; and many creatures have some resistance to fire.": "Usando o fogo para destruir seus inimigos. Esta é uma habilidade ofensiva muito potente, incluindo ataques de longo alcance e de efeito de área, e até mesmo alguns ataques frios para versatilidade. No entanto, existem desvantagens: Fire Magic consome muita energia; todas as criaturas geram Fúria extra quando são queimadas; e muitas criaturas têm alguma resistência ao fogo."
"Using magical inks and arcane rituals to create areas of power.": "Usando tintas mágicas e rituais misteriosos para criar áreas de poder."
