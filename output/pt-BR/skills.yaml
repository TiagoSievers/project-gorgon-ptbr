"Skill in accurately mapping your surroundings. You earn Cartography XP by clearing the 'fog' from game maps, which happens automatically as you walk around.": "Habilidade em mapear com precisão o ambiente ao seu redor. Você ganha Cartografia XP eliminando a ‘névoa’ dos mapas do jogo, o que acontece automaticamente conforme você caminha."
"Skill in centering yourself and creating inner focus. This is especially helpful when using Unarmed combat skill.

To meditate, you must be near a Meditation Pillar. Each meditation also requires a simple focus item, such as a fruit or flower.": "Habilidade em centrar-se e criar foco interno. Isto é especialmente útil ao usar a habilidade de combate desarmado.

Para meditar, você deve estar próximo a um Pilar de Meditação. Cada meditação também requer um item de foco simples, como uma fruta ou flor."
"Skill in creating alcoholic beverages of all sorts.": "Habilidade na criação de bebidas alcoólicas de todos os tipos."
"Skill in creating belt buckles with symbolic meanings. Belt buckle artwork is a deeply personal expression which can give hammer warriors a morale boost in battle. However, because they are so personal, crafted belt buckles are only useful to the person who crafts them.": "Habilidade na criação de fivelas de cintos com significados simbólicos. A arte da fivela do cinto é uma expressão profundamente pessoal que pode dar aos guerreiros do martelo um impulso moral na batalha. No entanto, por serem tão pessoais, as fivelas de cinto feitas à mão só são úteis para quem as fabrica."
"Skill in creating glass, especially magical glass.": "Habilidade na criação de vidro, especialmente vidro mágico."
"Skill in creating magical augments. This is an umbrella skill representing your overall knowledge of augmentation.": "Habilidade em criar aumentos mágicos. Esta é uma habilidade abrangente que representa seu conhecimento geral de aumento."
"Skill in creating urban art, such as graffiti and street art.": "Habilidade na criação de arte urbana, como graffiti e arte de rua."
"Skill in dancing to music in a way that entertains or moves others.

Once you reach level 10 in this skill you'll have all the basics. At that point you can learn hidden dance moves, which will increase your level cap.": "Habilidade em dançar música de uma forma que entretém ou comove os outros.

Depois de atingir o nível 10 nesta habilidade, você terá todos os fundamentos. Nesse ponto você pode aprender movimentos de dança ocultos, o que aumentará seu limite de nível."
"Skill in determining things about somebody based on their visible appearance. A high Assessment skill lets you see more information about other players when you examine them.": "Habilidade em determinar coisas sobre alguém com base em sua aparência visível. Uma habilidade de Avaliação alta permite que você veja mais informações sobre outros jogadores ao examiná-los."
"Skill in fighting as a wolf beast. Also indicates your ability to control and suppress the beast mode.": "Habilidade em lutar como uma fera lobo. Também indica sua capacidade de controlar e suprimir o modo besta."
"Skill in figuring out how someone or something died. Higher skill allows more details to be determined and more difficult organisms to be examined.": "Habilidade em descobrir como alguém ou algo morreu. Maior habilidade permite que mais detalhes sejam determinados e organismos mais difíceis sejam examinados."
"Skill in finding the meaning of poems, especially difficult and tedious ones.": "Habilidade em encontrar o significado de poemas, especialmente os difíceis e tediosos."
"Skill in golf-related games. Covers any game involving the propulsion of an object toward a designated goal on the landscape.": "Habilidade em jogos relacionados ao golfe. Abrange qualquer jogo que envolva a propulsão de um objeto em direção a um objetivo designado na paisagem."
"Skill in howling as a werewolf.": "Habilidade em uivar como um lobisomem."
"Skill in living and fighting as a bat.": "Habilidade em viver e lutar como um morcego."
"Skill in maintaining armor, including the use of repair kits to remove dents and holes.": "Habilidade na manutenção de armaduras, incluindo o uso de kits de reparo para remover amassados ​​e buracos."
"Skill in managing a shop, boutique, or restaurant.": "Habilidade em administrar uma loja, boutique ou restaurante."
"Skill in performing uniquely orcish activities, as well as skill in maneuvering orcish society.": "Habilidade em realizar atividades exclusivamente orcs, bem como habilidade em manobrar a sociedade orc."
"Skill in performing with brass and woodwind instruments such as trumpets, ocarinas, and flutes.": "Habilidade em tocar instrumentos de sopro e metais, como trompetes, ocarinas e flautas."
"Skill in performing with percussion instruments such as drums, bells, and dulcimers.": "Habilidade em tocar instrumentos de percussão, como tambores, sinos e dulcímeros."
"Skill in performing with stringed instruments such as harps, lutes, and guitars.": "Habilidade em tocar instrumentos de cordas, como harpas, alaúdes e violões."
"Skill in playing games, especially gambling games.": "Habilidade em jogar jogos, especialmente jogos de azar."
"Skill in preparing food for consumption.": "Habilidade no preparo de alimentos para consumo."
"Skill in producing dye. These dyes can be used to color armor.

This skill covers only the creation of the dye; Textile Creation, Tanning, or Blacksmithing is used to apply the dye, depending on what the armor is made of.": "Habilidade na produção de corantes. Esses corantes podem ser usados ​​para colorir armaduras.

Esta habilidade cobre apenas a criação da tintura; Criação Têxtil, Curtimento ou Ferraria são usados ​​para aplicar a tinta, dependendo da composição da armadura."
"Skill in properly operating a grainmill.": "Habilidade em operar adequadamente um moinho de grãos."
"Skill in riding in races.": "Habilidade em andar em corridas."
"Skill in riding terrestrial mounts. Higher skill allows you to keep your mount calm even in terrifying situations. Riding skill is also used when trying to tame wild horses.

Earn XP by riding in many different and dangerous locations.": "Habilidade em montar montarias terrestres. Maior habilidade permite que você mantenha sua montaria calma mesmo em situações aterrorizantes. A habilidade de equitação também é usada ao tentar domar cavalos selvagens.

Ganhe XP andando em muitos locais diferentes e perigosos."
"Skill in speaking while in the form of an animal or monstrous beast. (You earn XP in Beast Speech by speaking aloud. You can't earn XP more than once per minute.)": "Habilidade em falar na forma de um animal ou fera monstruosa. (Você ganha XP em Fala da Besta falando em voz alta. Você não pode ganhar XP mais de uma vez por minuto.)"
"Skill in surviving as a Hardcore player. You earn XP in this skill by killing dangerous creatures while Hardcore. (The creatures' level must be higher than your Hardcore Living skill.)

Note: if you stop being Hardcore, you will lose all levels in this skill.": "Habilidade em sobreviver como jogador Hardcore. Você ganha XP nesta habilidade matando criaturas perigosas enquanto estiver no modo Hardcore. (O nível das criaturas deve ser superior à sua habilidade Hardcore Living.)

Nota: se você deixar de ser Hardcore, perderá todos os níveis desta habilidade."
"Skill in the act of removing fur or skin from an animal. You need to be carrying a Skinning Knife in order to skin a corpse. Corpses of sentient creatures, such as goblins and humans, can't be skinned.": "Habilidade no ato de retirar pêlo ou pele de um animal. Você precisa carregar uma faca de esfola para esfolar um cadáver. Cadáveres de criaturas sencientes, como goblins e humanos, não podem ser esfolados."
"Skill in the act of removing meat and useful body organs from a corpse. You need to be carrying a Butcher Knife in order to butcher a corpse. Corpses of sentient creatures, such as goblins and humans, can't be butchered.": "Habilidade no ato de remover carne e órgãos úteis de um cadáver. Você precisa carregar uma faca de açougueiro para massacrar um cadáver. Cadáveres de criaturas sencientes, como goblins e humanos, não podem ser massacrados."
"Skill in the creation of advanced tools and unusual equipment. Far more than just creating hand tools, an expert Toolcrafter is a master of repurposing found materials, and can create belts, armors, and even weapons from unusual materials. This equipment is usually designed to meet very specialized needs.": "Habilidade na criação de ferramentas avançadas e equipamentos inusitados. Muito mais do que apenas criar ferramentas manuais, um Toolcrafter especialista é um mestre em reaproveitar materiais encontrados e pode criar cintos, armaduras e até armas a partir de materiais incomuns. Este equipamento geralmente é projetado para atender necessidades muito especializadas."
"Skill in the visual arts, including painting, sculpting, and mosaic creation.": "Habilidade em artes visuais, incluindo pintura, escultura e criação de mosaicos."
"Skill in things that only fairies can do.": "Habilidade em coisas que só as fadas podem fazer."
"Skill in using the secret powers of the Wardens.": "Habilidade em usar os poderes secretos dos Guardiões."
"Skill in writing non-fiction books, including textbooks.": "Habilidade em escrever livros de não ficção, incluindo livros didáticos."
