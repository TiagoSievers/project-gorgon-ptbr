You must be wearing a holy symbol -- and NOT wearing a Necromancy Gem -- to use Priest abilities. Holy symbols are most often found as jewelry, but can also be found on armor and weapons.": "Oficialmente a habilidade 'Sacerdote de Arisetsu', representa sua sintonização com Arisetsu, a deusa do Calor e da Esperança. Ao lutar ao lado de aliados, você pode trazer esperança até mesmo nas batalhas mais impossíveis.

Você deve estar usando um símbolo sagrado – e NÃO uma Gema de Necromancia – para usar as habilidades do Sacerdote. Os símbolos sagrados são mais frequentemente encontrados como joias, mas também podem ser encontrados em armaduras e armas."
