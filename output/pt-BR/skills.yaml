"The ability of self-aware animals to enhance their natural instincts into finely-honed combat techniques. Only animals can use this skill.": "A capacidade dos animais autoconscientes de aprimorar seus instintos naturais em técnicas de combate refinadas. Somente animais podem usar esta habilidade."
"The ability to create elaborate contraptions that automate complex tasks.": "A capacidade de criar engenhocas elaboradas que automatizam tarefas complexas."
"The ability to endure heavy loads and uncomfortable situations without getting tired. Your Endurance increases the speed of your armor regeneration between fights, among other things.

(The most common way to raise Endurance is simply to take armor damage in combat.)": "A capacidade de suportar cargas pesadas e situações desconfortáveis ​​sem se cansar. Sua Resistência aumenta a velocidade de regeneração de sua armadura entre as lutas, entre outras coisas.

(A maneira mais comum de aumentar a Resistência é simplesmente sofrer dano de armadura em combate.)"
"The ability to feel empathy, even for creatures not at all like yourself.": "A capacidade de sentir empatia, mesmo por criaturas que não são como você."
"The ability to learn new skills on your own, just from reading a book.": "A capacidade de aprender novas habilidades por conta própria, apenas lendo um livro."
"The ability to smith and shape raw materials into aesthetically-pleasing rings and necklaces.": "A habilidade de forjar e moldar matérias-primas em anéis e colares esteticamente agradáveis."
"The ability to speak in public in a way that moves your audience.": "A capacidade de falar em público de uma forma que comove o seu público."
"The ability to study nature and find inner peace and contentment. Even the most hardened warriors need the ability to appreciate nature.": "A capacidade de estudar a natureza e encontrar paz interior e contentamento. Mesmo os guerreiros mais experientes precisam da habilidade de apreciar a natureza."
"The ability to use first aid kits to heal yourself or others.": "A capacidade de usar kits de primeiros socorros para curar a si mesmo ou a outras pessoas."
"The art of appreciating what you eat. Every level of the Gourmand skill increases the duration of meal bonuses by 30 seconds. The main way to earn Gourmand XP is by eating foods you've never eaten before.": "A arte de valorizar o que você come. Cada nível da habilidade Gourmand aumenta a duração dos bônus de refeição em 30 segundos. A principal forma de ganhar XP Gourmand é comendo alimentos que você nunca comeu antes."
"The art of arranging flowers so that they evoke strong emotions.": "A arte de arranjar flores para que evoquem emoções fortes."
"The art of collecting fish.": "A arte de colecionar peixes."
"The art of combining esoteric things together to make potions and poisons.": "A arte de combinar coisas esotéricas para fazer poções e venenos."
"The art of dying.": "A arte de morrer."
"The art of living and fighting as a cow.": "A arte de viver e lutar como uma vaca."
"The art of living and fighting as a deer.": "A arte de viver e lutar como um cervo."
"The art of living and fighting as a pig.": "A arte de viver e lutar como um porco."
"The art of living and fighting as a rabbit or hare. Note: rabbits are not known for their ferocity, so sentient rabbits should carefully consider their choice of secondary skill.": "A arte de viver e lutar como coelho ou lebre. Nota: os coelhos não são conhecidos por sua ferocidade, então os coelhos sencientes devem considerar cuidadosamente a escolha da habilidade secundária."
"The art of living and fighting as a spider.": "A arte de viver e lutar como uma aranha."
"The art of making metal armor.": "A arte de fazer armaduras de metal."
"The art of picking things up. Except mushrooms, those are special for some reason. Experts at Foraging are also experts at tracking down stationary items and locations (such as many Quest Objectives).": "A arte de pegar coisas. Exceto os cogumelos, esses são especiais por algum motivo. Os especialistas em Forrageamento também são especialistas em rastrear itens e locais fixos (como muitos objetivos de missão)."
"The art of taming animals and teaching them to fight alongside you.": "A arte de domesticar animais e ensiná-los a lutar ao seu lado."
"The art of turning wood into little artistic thingies.": "A arte de transformar madeira em coisinhas artísticas."
"The art of writing things. Handy for... writing things. It's also a valuable art for swordsmen and other warriors, who can infuse their art with potent additional effects.": "A arte de escrever coisas. Útil para... escrever coisas. É também uma arte valiosa para espadachins e outros guerreiros, que podem infundir sua arte com efeitos adicionais potentes."
"The craft of arrow-making. Most fletching recipes require elements obtained from Carpentry, so it's often handy to know both skills well. At higher level, fletchers also need various Alchemy components.": "A arte de fazer flechas. A maioria das receitas de penas requer elementos obtidos em Carpintaria, por isso geralmente é útil conhecer bem ambas as habilidades. Em níveis superiores, os Fletchers também precisam de vários componentes de Alquimia."
"The craft of making bows and crossbows.": "A arte de fazer arcos e bestas."
"The craft of turning disgusting animal skins, furs, and hides into leather, fleece, and other material ready to be used in clothing and armor.": "A arte de transformar peles, peles e couros de animais nojentos em couro, lã e outros materiais prontos para serem usados ​​em roupas e armaduras."
"The craft of turning raw ingredients into cloth. Textile creation includes cotton, wool, silk, and many other fiber types. Cloth made from animal hides (e.g. leather) comes from the Tanning skill instead.": "A arte de transformar ingredientes crus em tecido. A criação têxtil inclui algodão, lã, seda e muitos outros tipos de fibras. Em vez disso, tecidos feitos de peles de animais (por exemplo, couro) vêm da habilidade Curtimento."
"The exotic art of catching fish with a pole and bait. While primarily an orcish custom, it is catching on among humans as well.": "A arte exótica de pescar com vara e isca. Embora seja principalmente um costume orc, também está se difundindo entre os humanos."
"The magical art of suddenly being somewhere else.": "A arte mágica de estar de repente em outro lugar."
"The power of mind over matter: psychic powers! This combat skill focuses on recovery and restoration, but it also has multiple damaging abilities.": "O poder da mente sobre a matéria: poderes psíquicos! Esta habilidade de combate concentra-se na recuperação e restauração, mas também possui múltiplas habilidades de dano."
"The science of breeding pets.": "A ciência da criação de animais de estimação."
"The science of permanently altering how a magical item works. Also covers manipulation of the basic materials of magic, such as phlogiston.": "A ciência de alterar permanentemente o funcionamento de um item mágico. Também cobre a manipulação dos materiais básicos da magia, como o flogisto."
"The specialized skill of growing mushrooms in grow-boxes.": "A habilidade especializada de cultivar cogumelos em caixas de cultivo."
"The study of weapons and armor, with a focus on the benefits and weaknesses of different kinds of equipment.

As the skill increases, Staff users will find that their combat abilities also restore Armor.": "O estudo de armas e armaduras, com foco nos benefícios e pontos fracos dos diferentes tipos de equipamentos.

À medida que a habilidade aumenta, os usuários do Staff descobrirão que suas habilidades de combate também restauram a Armadura."
"The use of stone in construction and decoration.": "A utilização da pedra na construção e decoração."
"This 'skill' represents your ability to ward off the adverse effects of alcohol. Note, however, that alcohol tolerance does not prevent you from becoming an alcoholic after prolonged alcohol abuse.": "Esta 'habilidade' representa a sua capacidade de evitar os efeitos adversos do álcool. Observe, entretanto, que a tolerância ao álcool não impede que você se torne um alcoólatra após abuso prolongado de álcool."
"This is a prototype skill that will never appear in the live game. (Charged Pig abilities can be found under the Pig skill. You can place both Pig and Charged Pig abilities on your Pig ability bar.)": "Esta é uma habilidade protótipo que nunca aparecerá no jogo ao vivo. (As habilidades do Porco Carregado podem ser encontradas na habilidade do Porco. Você pode colocar as habilidades do Porco e do Porco Carregado na barra de habilidades do Porco.)"
"This umbrella skill represents your ability to entertain with performances of music, acrobatics, dance, art, recitals, and so on.": "Essa habilidade abrangente representa sua capacidade de entreter com apresentações de música, acrobacias, dança, arte, recitais e assim por diante."
"Thump1": "Tump1"
"Thump5": "Tump5"
"To earn more XP in Alchemy, defeat a fabled dragon of yore, or gain favor with Strom Farblood in Statehelm.": "Para ganhar mais XP em Alquimia, derrote um dragão lendário de outrora ou ganhe o favor de Strom Farblood em Statehelm."
"To earn more XP in Alchemy, gain favor with Strom Farblood in Statehelm.": "Para ganhar mais XP em Alquimia, ganhe o favor de Strom Farblood em Statehelm."
"To earn more XP in Ancillary-Armor Augmentation, gain favor with a mysterious entity deep beneath Povus or Corinth in Statehelm.": "Para ganhar mais XP no Aumento de Armadura Auxiliar, ganhe o favor de uma entidade misteriosa nas profundezas de Povus ou Corinto em Statehelm."
"To earn more XP in Ancillary-Armor Augmentation, gain favor with a mysterious entity deep beneath Povus.": "Para ganhar mais XP no Aumento da Armadura Auxiliar, ganhe o favor de uma entidade misteriosa nas profundezas de Povus."
"To earn more XP in Ancillary-Armor Augmentation, gain favor with Kohan or Ufkar in Rahu.": "Para ganhar mais XP no Aumento da Armadura Auxiliar, ganhe o favor de Kohan ou Ufkar em Rahu."
"To earn more XP in Angling, gain favor with Engineer Crall in Vidaria.": "Para ganhar mais XP em Pesca, ganhe o favor do Engenheiro Crall em Vidaria."
"To earn more XP in Angling, gain favor with Justin Smoot in Statehelm.": "Para ganhar mais XP em Pesca, ganhe o favor de Justin Smoot em Statehelm."
"To earn more XP in Angling, gain favor with Moku in Povus (note: Povus town's level must be 5+ for Moku to arrive).": "Para ganhar mais XP em Pesca, ganhe o favor de Moku em Povus (nota: o nível da cidade de Povus deve ser 5+ para que Moku chegue)."
