"<b>Pet-Only</b>": "these pets have been classified as pet-only, and can never be used for breeding. However, they <i>can</i> be placed in travel cages and sold to others. (If you use a pet cage on an Unregistered pet, they'll become a Pet-Only pet.)"
"<b>Pintura</b>": "Cavalo de equitação de resistência de sangue quente. Um cavalo bem arredondado, ótimo para iniciantes. Este cavalo, conhecido por seu grande padrão de pelagem com manchas brancas e marcas frequentes no rosto e nas pernas, é originário da região de Eltibule. Agora pode ser encontrado em todo o país, pois é um dos cavalos mais comuns."
"<b>Plateau Pony</b>": "Cold-Blooded Pack-Riding horse. Small of stature but big of heart, these are some of the friendliest horses on Alharth. They are native to the Gazluk Plateau, where their small size helps them to traverse the rocky terrain with ease. They are often seen with patterned coats, but can be solid as well."
"<b>Pregnant</b>": "this is a female that is gestating. (In the case of insects, the female isn't actually \\\"pregnant\\\", but is guarding her egg feverishly, and is unavailable for adventuring.) The duration of pregnancy is based on the species. It can also be affected by stable items, to some extent."
"<b>Pônei Plateau</b>": "Cavalo de montaria de sangue frio. Pequenos de estatura, mas grandes de coração, estes são alguns dos cavalos mais amigáveis ​​de Alharth. Eles são nativos do Planalto Gazluk, onde seu pequeno tamanho os ajuda a atravessar terrenos rochosos com facilidade. Eles costumam ser vistos com casacos estampados, mas também podem ser sólidos."
"<b>Quem ela é:</b> Começaremos com aquela com a qual todos na Hegemonia Crone estão familiarizados. As Bibliotecas da Imatia são vastos repositórios de conhecimento, reunidos em todo o mundo e mantidos em segurança. A Hegemonia Crone é uma terra onde o conhecimento pode fazer com que você seja morto, e grandes bibliotecas não tendem a sobreviver lá por muito tempo. Mas as Bibliotecas de Imatia são protegidas pelos seus monges. E mesmo que os Monges de Imatia não consigam impedir um atacante, a biblioteca simplesmente sai. Cada biblioteca tem aproximadamente o mesmo formato": "uma torre de marfim, alta como o céu. Um dia aparece, uma semana depois desaparece."
"<b>Recovering</b>": "this is a male that is recovering from sex. (They need a few hours of rest before they're ready for battle ... or more sex.) The recovery time is based on the male's Virility."
"<b>Recuperando</b>": "este é um homem que está se recuperando do sexo. (Eles precisam de algumas horas de descanso antes de estarem prontos para a batalha... ou mais sexo.) O tempo de recuperação é baseado na virilidade do homem."
"<b>Registered</b>": "these pets have been registered for breeding, and are ready to mate. (Note that you don't need to manually register your pets: if you try to breed an Unregistered pet, you'll be prompted to register them automatically.) Registration costs Councils, and newer practicioners tend to have to pay more. Experienced breeders know tricks to avoid some of the fees."
"<b>Registrados</b>": "esses animais de estimação foram registrados para reprodução e estão prontos para acasalar. (Observe que você não precisa registrar manualmente seus animais de estimação: se tentar criar um animal de estimação não registrado, você será solicitado a registrá-los automaticamente.) Custos de registro Conselhos e praticantes mais novos tendem a pagar mais. Criadores experientes conhecem truques para evitar algumas taxas."
"<b>Satincoat</b>": "Cavalo de montaria de sangue quente. Não está claro se este cavalo se originou no mundo natal de Ranalon ou em Sun Vale, mas é um cavalo poderoso e excelente de qualquer maneira. É conhecido pelo brilho característico de sua pelagem, sempre totalmente sólida."
"<b>Standardbred</b>": "Cavalo de montaria de sangue quente. Os Standardbreds são da região Serbule de Alharth e são conhecidos por sua pelagem e crina sólidas. Eles são rápidos e têm temperamento alto, o que às vezes os torna difíceis de controlar. Eles são alguns dos cavalos mais comuns."
"<b>Statehelm</b>": "Cavalo de sangue quente e corrente de ar leve. Um pau para toda obra, mestre de ninguém, este cavalo é amplamente considerado e usado em todo o país, e muitos especulam que ele é originário de Statehelm, daí o nome. Sua pelagem é totalmente preta, sendo raras marcas de qualquer tipo. Assim como o Kurbone, suas pernas sempre apresentam franjas."
"<b>Tips:</b> - Here's the secret to aiming": "imagine a line between you and the ball. When you kick, the ball will continue that line. This means the direction you're facing doesn't matter. You can turn sideways, or even shoot backwards, but that won't affect the ball's direction at all! Only your position, relative to the ball's position, matters. Oh and also the English you put on the kick, of course."
"<b>Unregistered</b>": "these pets have never been used for breeding. (They are either wild-caught, or just-born.)"
"<b>Virilidade</b> tem muito pouco efeito no campo de batalha, mas é muito importante caso você decida ramificar-se para a Criação de Animais. Virilidade é a medida de quanto seu animal de estimação gosta de procriar e de quão bem-sucedido ele é na reprodução. Animais de estimação com alta virilidade têm maior probabilidade de acasalar com sucesso e se recuperam da reprodução mais rapidamente do que outros animais de estimação. A virilidade também pode afetar o sexo da prole": "um animal de estimação muito viril tem maior probabilidade de produzir uma prole do mesmo sexo."
"<b>Virility</b> has very little effect on the battlefield, but is very important should you choose to branch into Animal Husbandry. Virility is the measure of how much your pet likes to breed, and how successful it is at reproducing. Pets with high virility are more likely to mate successfully, and they recover from breeding more quickly than other pets. Virility can also affect the sex of the offspring": "a very virile pet is more likely to produce an offspring of the same sex."
"<b>Virility</b> is primarily a breeding trait, but it also affects mounts positively out on the field. High Virility leads to increased acceleration and higher jump distances!\": \"<h1>Manejo Avançado de Animais": "Montarias</h1> As montarias são semelhantes a outros animais de estimação, como ratos, abelhas e gatos. Eles compartilham muitas das mesmas características, embora seus efeitos sejam drasticamente diferentes porque as montarias têm um propósito diferente - elas não foram feitas para combate! Veja abaixo uma lista de características usadas pelas montarias e seus efeitos específicos."
"<b>Who she is:</b> We'll start with the one everybody in the Crone Hegemony's familiar with. Imatia's Libraries are vast repositories of knowledge, gathered up from around the world and kept safe. The Crone Hegemony is a land where knowledge can get you killed, and large libraries don't tend to survive there for long. But Imatia's Libraries are protected by her monks. And even if the Monks of Imatia fail to stop an attacker, the library just leaves. Each library has roughly the same shape": "an ivory tower, tall as the sky. One day it appears, a week later it's gone."
"<h1>Advanced Animal Handling: Mounts</h1> Mounts are similar to other pets, like rats, bees and cats. They share a lot of the same traits, though their effects are drastically different because mounts serve a different purpose - they aren't meant for combat! See below for a list of traits used by mounts, and their specific effects.

<h1>Mount Traits</h1>

<b>Temperament</b> measures how \"hot\" a mount is. Mounts are typically referred to as hot-blooded or cold-blooded, and this refers to their Temperament. A lower Temperament (cold-blooded) means the mount is calmer and more collected, and thus has a higher max anxiety. Hot-blooded mounts, on the other hand, have high Temperament, and are much faster as a result!

<b>Toughness</b> is a mount's resilience in the face of danger. Higher Toughness increases a mount's max anxiety, and decreases the amount of anxiety \"damage\" they take from various sources, such as being spooked by nearby enemies.

<b>Ruggedness</b> measures how good of a pack animal a mount is, increasing its saddlebag inventory space. Rugged mounts are not easily phased, either, and the rate at which their anxiety recovers increases as their Ruggedness does!

<b>Enthusiasm</b> represents a mount's eagerness - higher enthusiasm increases a mount's overall speed and acceleration.

<b>Friendliness</b> is a good measure of how easy a mount is to handle. High friendliness increases a mount's turn speed, but what's even more important is that it also decreases ability cooldowns and costs while using that mount!

<b>Intelligence</b> is a double-edged sword, similar to Temperament. Intelligent horses are quick learners, which leads to decreased ability cooldowns. They're also more easily able to navigate treacherous terrain, such as water. However, that intelligence comes at a cost, as Intelligent mounts take longer to regenerate any lost anxiety - they're not so easy to forget about nearby threats.

<b>Virility</b> is primarily a breeding trait, but it also affects mounts positively out on the field. High Virility leads to increased acceleration and higher jump distances!": "<h1>Manejo Avançado de Animais: Montarias</h1> As montarias são semelhantes a outros animais de estimação, como ratos, abelhas e gatos. Eles compartilham muitas das mesmas características, embora seus efeitos sejam drasticamente diferentes porque as montarias têm um propósito diferente - elas não foram feitas para combate! Veja abaixo uma lista de características usadas pelas montarias e seus efeitos específicos.

<h1>Características da Montaria</h1>

<b>Temperamento</b> mede o quão \"quente\" é uma montaria. Montarias são normalmente chamadas de sangue quente ou sangue frio, e isso se refere ao seu temperamento. Um temperamento mais baixo (sangue frio) significa que a montaria é mais calma e controlada e, portanto, tem uma ansiedade máxima mais alta. Montarias de sangue quente, por outro lado, têm temperamento alto e, como resultado, são muito mais rápidas!

<b>Resistência</b> é a resiliência de uma montaria diante do perigo. Maior resistência aumenta a ansiedade máxima de uma montaria e diminui a quantidade de \"dano\" de ansiedade que ela sofre de várias fontes, como ser assustado por inimigos próximos.

<b>Robustez</b> mede o quão boa é uma montaria como animal de carga, aumentando seu espaço de inventário no alforje. Montarias Robustas também não são facilmente eliminadas, e a taxa de recuperação de sua ansiedade aumenta junto com sua Robustez!

<b>Entusiasmo</b> representa a ânsia de uma montaria - maior entusiasmo aumenta a velocidade e aceleração geral de uma montaria.

<b>Amigabilidade</b> é uma boa medida de quão fácil é manusear uma montaria. A alta simpatia aumenta a velocidade de giro de uma montaria, mas o que é ainda mais importante é que ela também diminui o tempo de recarga e os custos de habilidade ao usar aquela montaria!

<b>Inteligência</b> é uma faca de dois gumes, semelhante ao Temperamento. Cavalos inteligentes aprendem rápido, o que leva à diminuição do tempo de espera das habilidades. Eles também são mais facilmente capazes de navegar em terrenos traiçoeiros, como a água. No entanto, essa inteligência tem um custo, já que as montarias inteligentes demoram mais para regenerar qualquer ansiedade perdida – não é tão fácil esquecer ameaças próximas.

<b>Virilidade</b> é principalmente uma característica de reprodução, mas também afeta positivamente as montarias em campo. Alta virilidade leva a maior aceleração e maiores distâncias de salto!"
"<h1>Basics of Animal Husbandry</h1> Animal Husbandry is the art and science of caring for and breeding animals - specifically pets! This is a complicated topic, and it will take time to master -- but there are a few basic concepts that will help you get started.

<h1>Traits That Matter In Animal Husbandry</h1> In your career as an animal handler, You've no doubt learned all about traits like Toughness and Ferocity. But husbandry focuses on other traits, with the most important being <b>Virility</b>. Highly virile pets are more likely to successfully breed. There's another, more surprising effect of virility: it can change the chances of having a male or female baby. If a highly virile father mates with a low-virility mother, the offspring is more likely to be male. (And vice versa with a high-virility mother and a low-virility father.)

Enthusiasm helps determine the length of time it takes to breed. If both pets are friendly, breeding can be quite fast, but if they're unfriendly, it can take many hours.

The mating fee is modified by the pets' Friendliness. Unfriendly pets are more difficult to handle, so stablemasters charge more. However, as you become more experienced in Animal Husbandry, this becomes less relevant, because you'll learn to train unfriendly pets to behave well.

Intelligence also has a surprising effect when breeding. When you breed two creatures that aren't the same species, but have compatible genetics - like a bee and a wasp - the offspring will be either a bee or a wasp. The intelligence of the parents affects which type of offspring you get: higher Intelligence gives a higher chance for that species.

<h1>Breeding Pets</h1> Work with a trained stablemaster to breed your pets. You'll select an eligible male and female, and the stablemaster will keep an eye on the pair for you, even completing the necessary registration forms... for a fee, of course! Once mating begins, you can check their status by viewing the stables. While the pets are mating, they'll be shown with the status of \"Mating\". If mating is successful, the female will transition to \"Pregnant\" status and the male to \"Recovering\" status. A stable-slot will be automatically reserved for the baby, so it has somewhere to live when it arrives!

The chance of successful breeding mostly depends on the pets' Virility, but there are four other factors. First, if the pets are of different species, the chance of success is lower. Second, if your Animal Husbandry skill is high, this improves the odds slightly. Third, there are stable items you can use to improve the odds. (Use them on the pet right before beginning the breeding session.) And finally, the phase of the moon can also affect success. It's said that breeding during the Full Moon is a little easier, and breeding during the New Moon is a little harder.

The stablemaster will contact you to let you know when a new baby arrives, or if a breeding session ends unsuccessfully.

<h1>Stable Items</h1> You can use certain items on your pets while they're in the stables. The most commonly-used item is a pet cage. 

Pet cages are used to transfer a pet for sale. You can only use cages on Unregistered pets -- meaning ones that have never been used for breeding before. And for legal reasons you can only sell pets that you raised from birth: you cannot sell wild-caught animals.

Pet cages come in different sizes and styles. Low-quality cages can only keep a pet contained for a short while -- a few days, say. There are higher-quality cages with auto-feeder systems that can keep your pet alive for months at a time, if necessary. But all cages have a time limit! If you wait too long, the pet will escape and go feral, lost forever in the wild.

There are other types of items to use on pets, but they're species-dependent. For instance, there are certain aphrodesiac waxes you can use on male wasps to make them more attractive to female wasps -- use this sort of item on the male right before starting a mating session.

In general, consult the item's instruction manual before use.

<h1>Understanding Husbandry States</h1> Every pet in your stable has a \"husbandry state\". Here's a reference to all the states:

<b>Unregistered</b>: these pets have never been used for breeding. (They are either wild-caught, or just-born.)

<b>Pet-Only</b>: these pets have been classified as pet-only, and can never be used for breeding. However, they <i>can</i> be placed in travel cages and sold to others. (If you use a pet cage on an Unregistered pet, they'll become a Pet-Only pet.)

<b>Registered</b>: these pets have been registered for breeding, and are ready to mate. (Note that you don't need to manually register your pets: if you try to breed an Unregistered pet, you'll be prompted to register them automatically.) Registration costs Councils, and newer practicioners tend to have to pay more. Experienced breeders know tricks to avoid some of the fees.

<b>Mating</b>: your pets are currently having sex. This can take anywhere from a few minutes to many hours, depending on the pets' traits. If mating is successful, the male will enter Recovering state, the female will enter Pregnant state, and the baby's stable slot will be reserved automatically. (The baby's slot will be marked as \"In Utero\".)

<b>Pregnant</b>: this is a female that is gestating. (In the case of insects, the female isn't actually \"pregnant\", but is guarding her egg feverishly, and is unavailable for adventuring.) The duration of pregnancy is based on the species. It can also be affected by stable items, to some extent.

<b>Recovering</b>: this is a male that is recovering from sex. (They need a few hours of rest before they're ready for battle ... or more sex.) The recovery time is based on the male's Virility.

<b>In Utero</b>: this is a baby that isn't here yet! (The stable slot is automatically pre-reseerved, to make sure there's room for the baby when it arrives.)

<b>Dormant</b>: this very rare husbandry state indicates that the pet has forgotten about the concepts of sex. This can only happen with very long-lived species. It may be possible to remind a dormant pet about sex somehow, turning it into a Registered pet. But doing so would require a lot of husbandry experience and a strong bond with the pet.": "<h1>Fundamentos da Criação de Animais</h1> A Criação de Animais é a arte e a ciência de cuidar e criar animais - especificamente animais de estimação! Este é um tópico complicado e levará algum tempo para dominá-lo – mas existem alguns conceitos básicos que ajudarão você a começar.

<h1>Características importantes na criação de animais</h1> Em sua carreira como tratador de animais, você sem dúvida aprendeu tudo sobre características como Resistência e Ferocidade. Mas a criação se concentra em outras características, sendo a mais importante a <b>Virilidade</b>. Animais de estimação altamente viris têm maior probabilidade de procriar com sucesso. Há outro efeito mais surpreendente da virilidade: ela pode alterar as chances de ter um bebê homem ou mulher. Se um pai altamente viril acasala com uma mãe de baixa virilidade, é mais provável que a prole seja do sexo masculino. (E vice-versa com uma mãe com alta virilidade e um pai com baixa virilidade.)

O entusiasmo ajuda a determinar quanto tempo leva para procriar. Se ambos os animais de estimação forem amigáveis, a reprodução pode ser bastante rápida, mas se não forem amigáveis, pode levar muitas horas.

A taxa de acasalamento é modificada pela simpatia dos animais de estimação. Animais de estimação hostis são mais difíceis de lidar, então os estábulos cobram mais. Porém, à medida que você se torna mais experiente na criação de animais, isso se torna menos relevante, porque você aprenderá a treinar animais de estimação hostis para se comportarem bem.

A inteligência também tem um efeito surpreendente na reprodução. Quando você cria duas criaturas que não são da mesma espécie, mas têm genética compatível – como uma abelha e uma vespa – a prole será uma abelha ou uma vespa. A inteligência dos pais afeta o tipo de descendência que você terá: uma inteligência mais alta dá uma chance maior para aquela espécie.

<h1>Criando animais de estimação</h1> Trabalhe com um cavalariço treinado para criar seus animais de estimação. Você selecionará um homem e uma mulher elegíveis, e o chefe do estábulo ficará de olho no par para você, até mesmo preenchendo os formulários de registro necessários... mediante o pagamento de uma taxa, é claro! Assim que o acasalamento começar, você pode verificar seu status visualizando os estábulos. Enquanto os pets estão acasalando, eles serão mostrados com o status de \"Acasalamento\". Se o acasalamento for bem-sucedido, a fêmea passará para o status de “Grávida” e o macho para o status de “Recuperação”. Uma vaga estável será automaticamente reservada para o bebê, para que ele tenha um lugar para morar quando chegar!

A chance de uma reprodução bem-sucedida depende principalmente da virilidade dos animais de estimação, mas existem outros quatro fatores. Primeiro, se os animais de estimação forem de espécies diferentes, a chance de sucesso é menor. Em segundo lugar, se a sua habilidade em Criação de Animais for alta, isso melhora ligeiramente as chances. Terceiro, existem itens estáveis ​​que você pode usar para melhorar as chances. (Use-os no animal de estimação logo antes de iniciar a sessão de reprodução.) E, finalmente, a fase da lua também pode afetar o sucesso. Dizem que procriar durante a Lua Cheia é um pouco mais fácil e procriar durante a Lua Nova é um pouco mais difícil.

O estábulo entrará em contato com você para avisar quando um novo bebê chegar ou se uma sessão de reprodução terminar sem sucesso.

<h1>Itens do Estábulo</h1> Você pode usar certos itens em seus animais de estimação enquanto eles estão nos estábulos. O item mais comumente usado é uma gaiola para animais de estimação. 

Gaiolas para animais de estimação são usadas para transferir um animal de estimação para venda. Você só pode usar gaiolas em animais de estimação não registrados – ou seja, aqueles que nunca foram usados ​​para reprodução antes. E por razões legais você só pode vender animais de estimação criados desde o nascimento: você não pode vender animais capturados na natureza.

As gaiolas para animais de estimação vêm em diferentes tamanhos e estilos. Gaiolas de baixa qualidade só conseguem manter um animal de estimação contido por um curto período – alguns dias, digamos. Existem gaiolas de alta qualidade com sistemas de alimentação automática que podem manter seu animal de estimação vivo por meses a fio, se necessário. Mas todas as gaiolas têm um limite de tempo! Se você esperar muito, o animal escapará e ficará selvagem, perdido para sempre na natureza.

Existem outros tipos de itens para usar em animais de estimação, mas dependem da espécie. Por exemplo, existem certas ceras afrodésicas que você pode usar em vespas machos para torná-las mais atraentes para as vespas fêmeas - use esse tipo de item no macho antes de iniciar uma sessão de acasalamento.

Em geral, consulte o manual de instruções do item antes de usar.

<h1>Compreendendo os estados de criação</h1> Cada animal de estimação em seu estábulo tem um \"estado de criação\". Aqui está uma referência para todos os estados:

<b>Não registrado</b>: esses animais de estimação nunca foram usados para reprodução. (Eles são capturados na natureza ou recém-nascidos.)

<b>Apenas animais de estimação</b>: esses animais de estimação foram classificados como somente animais de estimação e nunca podem ser usados para reprodução. No entanto, eles <i>podem</i> ser colocados em gaiolas de viagem e vendidos a terceiros. (Se você usar uma gaiola para animais de estimação em um animal de estimação não registrado, ele se tornará um animal de estimação somente para animais de estimação.)

<b>Registrados</b>: esses animais de estimação foram registrados para reprodução e estão prontos para acasalar. (Observe que você não precisa registrar manualmente seus animais de estimação: se tentar criar um animal de estimação não registrado, você será solicitado a registrá-los automaticamente.) Custos de registro Conselhos e praticantes mais novos tendem a pagar mais. Criadores experientes conhecem truques para evitar algumas taxas.

<b>Acasalamento</b>: seus animais de estimação estão fazendo sexo no momento. Isso pode levar de alguns minutos a muitas horas, dependendo das características dos animais de estimação. Se o acasalamento for bem-sucedido, o macho entrará no estado de Recuperação, a fêmea entrará no estado de Grávida e a vaga do estábulo do bebê será reservada automaticamente. (O slot do bebê será marcado como \"In Utero\".)

<b>Grávida</b>: é uma mulher que está em gestação. (No caso dos insetos, a fêmea não está realmente \"grávida\", mas guarda seu ovo febrilmente e não está disponível para aventuras.) A duração da gravidez é baseada na espécie. Também pode ser afetado por itens estáveis, até certo ponto.

<b>Recuperando</b>: este é um homem que está se recuperando do sexo. (Eles precisam de algumas horas de descanso antes de estarem prontos para a batalha... ou mais sexo.) O tempo de recuperação é baseado na virilidade do homem.

<b>In Utero</b>: este é um bebê que ainda não chegou! (A vaga do estábulo é automaticamente pré-reservada, para garantir que haja espaço para o bebê quando ele chegar.)

<b>Inativo</b>: este estado de criação muito raro indica que o animal se esqueceu dos conceitos de sexo. Isso só pode acontecer com espécies de vida muito longa. Pode ser possível lembrar um animal de estimação adormecido sobre sexo de alguma forma, transformando-o em um animal de estimação registrado. Mas fazer isso exigiria muita experiência em criação e um forte vínculo com o animal de estimação."
"<h1>Beware of Godlings!</h1> As a Class 5 nature spirit, you have a new natural predator": "Class 4 nature spirits! And also... other Class 5 nature spirits! And also: certain dickish Class 3 nature spirits! They all want to absorb you to increase their own power."
"<h1>Características importantes na criação de animais</h1> Em sua carreira como tratador de animais, você sem dúvida aprendeu tudo sobre características como Resistência e Ferocidade. Mas a criação se concentra em outras características, sendo a mais importante a <b>Virilidade</b>. Animais de estimação altamente viris têm maior probabilidade de procriar com sucesso. Há outro efeito mais surpreendente da virilidade": "ela pode alterar as chances de ter um bebê homem ou mulher. Se um pai altamente viril acasala com uma mãe de baixa virilidade, é mais provável que a prole seja do sexo masculino. (E vice-versa com uma mãe com alta virilidade e um pai com baixa virilidade.)"
"<h1>Classic Stories: Arisetsu and Vol</h1>

<i>With storytelling tips for beginning bards</i>

Long ago, the gods fought. Tast's allies had battled Dreva's allies, and many gods had died. Dreva had won, but at such cost as cannot be understood by mortals. Dreva's own mother, Arisetsu, the ancient god of hope, lay dying in a field, her warm light almost faded to darkness.

It was here that Vol found her. In a swirl of rose petals he appeared next to Arisetsu. Glancing with pity over her ancient body, broken and withered, he muttered \"Death is my gift,\" as he had countless times before, and began bestowing his mercy upon her. A smile slowly played across Arisetsu's face. But it was not the face of gratitude.

\"Vol, you cannot kill hope.\" Her eyes fluttered open. \"Begone.\"

Vol shook his head. \"Your time has come, Arisetsu. You think the world cannot continue without you, but you are wrong. Take my embrace. It is time!\"

But the light around Arisetsu grew brighter, pushing Vol away with a great force, and Arisetsu rose, her ancient body looking stronger than he remembered her being for a thousand years. \"Vol, you cannot kill hope. When you try, you only make me stronger.\"

Vol is a gracious god, and a good god, but he is prideful, and nothing -- neither god nor mortal -- dared disobey him when he decided the time had come. Vol snarled with surprised anger. \"You embarrass yourself. You embarrass the legacy of hope. IT IS TIME TO DIE!\"

But Arisetsu grew even brighter, and the two took to the heavens, battling back and forth, light and darkness playing across the stars. Both had fought hard in the great war, and they were tired in ways that you and I cannot understand, but now they fought with renewed energy. Other gods nursed their wounds and watched with wonder as the two battled.

They did not get weaker. Instead, they each seemed to grow stronger, Vol's withered form becoming gallant and powerful, Arisetsu growing younger, more beautiful, and ever brighter.

Vol began to consider, for the first time, that he may not be able to bestow his gift, and it made him angry. With all of his power summoned into one command, the world shook as he bellowed. \"ARISETSU, EMBRACE DEATH!\" And with a wry smile, Arisetsu did so. But she did not die. Instead, in front of god and man and elf, Vol and Arisetsu kissed. It was a surprise to them both, and the other gods turned their glances away as death and hope became intimately intertwined.

And so began the romance of Vol and Arisetsu which continues today. Theirs is a rocky love, with many setbacks and battles, and often they refuse even to speak to each other. But so far, they have always returned to each others' embrace. For our sake, may it always be so.

- An apocryphal story told by human bards in Statehelm

<i>Notes for bards: this story should be adapted to your audience. In a solemn tavern, you can get amazing results with some simple props. A classic setup involves a candle, rose petals, and a fan. But in rowdy taverns, make the story as lewd or as gory as necessary. In a dwarven hall, play up Dreva's embarrassment for laughs or pity. In elven lands, it's wise to bring in Errana in one way or another to add more sex. And remember the bard's rule #6: never tell a story the exact same way twice!</i>": "<h1>Histórias Clássicas: Arisetsu e Vol</h1>

<i>Com dicas de narrativa para bardos iniciantes</i>

Há muito tempo, os deuses lutaram. Os aliados de Tast lutaram contra os aliados de Dreva e muitos deuses morreram. Dreva venceu, mas a um custo que não pode ser compreendido pelos mortais. A própria mãe de Dreva, Arisetsu, o antigo deus da esperança, estava morrendo em um campo, sua luz quente quase desapareceu na escuridão.

Foi aqui que Vol a encontrou. Num redemoinho de pétalas de rosa ele apareceu ao lado de Arisetsu. Olhando com pena para seu corpo antigo, quebrado e murcho, ele murmurou \"A morte é meu presente\", como havia feito inúmeras vezes antes, e começou a conceder sua misericórdia a ela. Um sorriso apareceu lentamente no rosto de Arisetsu. Mas não era uma cara de gratidão.

\"Vol, você não pode matar a esperança.\" Seus olhos se abriram. \"Vá embora.\"

Vol balançou a cabeça. \"Sua hora chegou, Arisetsu. Você acha que o mundo não pode continuar sem você, mas você está errado. Aceite meu abraço. Chegou a hora!\"

Mas a luz ao redor de Arisetsu ficou mais brilhante, empurrando Vol para longe com grande força, e Arisetsu se levantou, seu corpo antigo parecendo mais forte do que ele se lembrava por mil anos. \"Vol, você não pode matar a esperança. Quando você tenta, você só me deixa mais forte.\"

Vol é um deus gracioso e um deus bom, mas é orgulhoso, e nada - nem deus nem mortal - ousou desobedecê-lo quando ele decidiu que a hora havia chegado. Vol rosnou com raiva surpresa. \"Você se envergonha. Você envergonha o legado da esperança. É HORA DE MORRER!\"

Mas Arisetsu ficou ainda mais brilhante, e os dois subiram aos céus, lutando para frente e para trás, a luz e a escuridão brincando nas estrelas. Ambos lutaram arduamente na grande guerra e estavam cansados ​​de uma forma que você e eu não conseguimos compreender, mas agora lutaram com energia renovada. Outros deuses cuidaram de seus ferimentos e observaram maravilhados enquanto os dois lutavam.

Eles não ficaram mais fracos. Em vez disso, cada um deles parecia ficar mais forte, a forma murcha de Vol tornando-se galante e poderosa, Arisetsu ficando mais jovem, mais bonito e cada vez mais brilhante.

Vol começou a considerar, pela primeira vez, que talvez não fosse capaz de conceder seu presente, e isso o deixou furioso. Com todo o seu poder reunido em um comando, o mundo tremeu enquanto ele gritava. \"ARISETSU, ABRACE A MORTE!\" E com um sorriso irônico, Arisetsu o fez. Mas ela não morreu. Em vez disso, na frente de Deus, do homem e do elfo, Vol e Arisetsu se beijaram. Foi uma surpresa para ambos, e os outros deuses desviaram o olhar enquanto a morte e a esperança se entrelaçavam intimamente.

E assim começou o romance de Vol e Arisetsu que continua até hoje. O amor deles é difícil, com muitos contratempos e batalhas, e muitas vezes eles se recusam até mesmo a falar um com o outro. Mas até agora, eles sempre voltaram ao abraço um do outro. Para o nosso bem, que seja sempre assim.

- Uma história apócrifa contada por bardos humanos em Statehelm

<i>Notas para bardos: esta história deve ser adaptada ao seu público. Em uma taverna solene, você pode obter resultados surpreendentes com alguns acessórios simples. Uma configuração clássica envolve uma vela, pétalas de rosa e um leque. Mas em tavernas barulhentas, torne a história tão obscena ou sangrenta quanto necessário. Em um salão dos anões, transforme o constrangimento de Dreva em risadas ou pena. Nas terras élficas, é aconselhável trazer Errana de uma forma ou de outra para adicionar mais sexo. E lembre-se da regra nº 6 do bardo: nunca conte uma história exatamente da mesma maneira duas vezes!</i>"
"<h1>Commandments from Harukita</h1>

