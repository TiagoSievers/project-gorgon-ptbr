"<i>Note: this is a guide to the elegant dwarven game of golf. It is not to be confused with human golf (which involves hitting balls with sticks) or goblin golf (which involves cruelty to bears) or the unspeakably perverted elven golf.</i>

In golf, players kick a massive boulder towards a designated target. The boulder must weight at least 3 stone, and it is against the rules for your boulder to leave the ground: that is, <i>punting</i> the boulder is forbidden. Golf is about kicking!

Each ball lasts for 20 kicks (usually -- some courses vary this). After that number of kicks, if the ball isn't at the goal, it explodes and you must start over with a new ball. If you manage to get the ball to the goal, your score for that hole is the number of kicks the ball had remaining. (For instance, if you had 5 kicks left, your score for the hole would be 5.)

In casual games of golf -- and even casual golf tournaments! -- you may attempt each hole as many times as you wish. You may repeat any time, and start over any time, limited only by your patience and your shin-pain threshold. Only your best score for each hole counts, so you are mainly competing against yourself! (They say Strekios loves golf, and this is why!)

But remember that your score isn't considered \"valid\" until you've earned a score for every hole! Don't get too caught up repeating any individual hole until you've completed all the holes at least once.

Each tournament's prize structure varies wildly; always speak with the tournament organizer for the details!

<b>Tips:</b> - Here's the secret to aiming: imagine a line between you and the ball. When you kick, the ball will continue that line. This means the direction you're facing doesn't matter. You can turn sideways, or even shoot backwards, but that won't affect the ball's direction at all! Only your position, relative to the ball's position, matters. Oh and also the English you put on the kick, of course.

- Remember that you get unlimited retries! If your ball is well and truly stuck, just abandon it. Speak to the caddy to start over.

- English can move the ball quite dramatically. If you're serious about using English well, you may want to spend a while experimenting with how it works.": "<i>Nota: este é um guia para o elegante jogo de golfe dos anões. Não deve ser confundido com o golfe humano (que envolve bater nas bolas com tacos) ou com o golfe dos goblins (que envolve crueldade com os ursos) ou com o indescritivelmente pervertido golfe élfico.</i>

No golfe, os jogadores chutam uma pedra enorme em direção a um alvo designado. A pedra deve pesar pelo menos 3 pedras, e é contra as regras que ela saia do chão: ou seja, é proibido <i>puntar</i> a pedra. Golfe é chutar!

Cada bola dura 20 chutes (normalmente – alguns cursos variam isso). Após esse número de chutes, se a bola não chegar ao gol, ela explode e você deve recomeçar com uma nova bola. Se você conseguir levar a bola até o gol, sua pontuação nesse buraco será o número de chutes restantes que a bola ainda tinha. (Por exemplo, se faltassem 5 chutes, sua pontuação para o buraco seria 5.)

Em jogos casuais de golfe - e até mesmo em torneios casuais de golfe! - você pode tentar cada buraco quantas vezes desejar. Você pode repetir a qualquer momento e recomeçar a qualquer momento, limitado apenas pela sua paciência e pelo limiar de dor nas canelas. Apenas a sua melhor pontuação em cada buraco conta, então você está competindo principalmente contra si mesmo! (Dizem que Strekios adora golfe, e é por isso!)

Mas lembre-se que a sua pontuação não é considerada \"válida\" até que você obtenha uma pontuação para cada buraco! Não se preocupe em repetir qualquer buraco individual até ter completado todos os buracos pelo menos uma vez.

A estrutura de prêmios de cada torneio varia muito; fale sempre com o organizador do torneio para mais detalhes!

<b>Dicas:</b> - Aqui está o segredo para mirar: imagine uma linha entre você e a bola. Quando você chuta, a bola continuará nessa linha. Isso significa que a direção que você está enfrentando não importa. Você pode virar de lado ou até mesmo chutar para trás, mas isso não afetará em nada a direção da bola! Apenas a sua posição, em relação à posição da bola, importa. Ah, e também o inglês que você coloca no chute, claro.

- Lembre-se de que você obtém tentativas ilimitadas! Se sua bola estiver realmente presa, simplesmente abandone-a. Fale com o caddie para recomeçar.

- O inglês pode mover a bola de forma bastante dramática. Se você realmente quer usar bem o inglês, talvez queira passar algum tempo experimentando como ele funciona."
