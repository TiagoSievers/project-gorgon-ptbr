"As características são úteis ao comparar dois animais de estimação da mesma espécie, mas menos úteis ao comparar espécies. Vejamos a Resistência, por exemplo": "um urso pardo com Resistência 1 teria 25% menos saúde do que um Urso Pardo com Resistência média (de 50). Mas aquele urso com Resistência 1 ainda pode ter mais saúde do que um rato com Resistência 100! Portanto, os tratadores de animais precisam aprender os detalhes de cada espécie para realmente entender os números das características."
"As revisões de 72 a 140 são chamadas de louva-a-deus da \\\"segunda era\\\". Esta era viu o desenvolvimento do psilobo, uma porção especial do cérebro do louva-a-deus projetada para aprimorar nossos poderes psíquicos. Infelizmente, esses louva-a-deus eram instáveis": "seus psilobos primitivos causavam eventuais danos cerebrais e a maioria sofria de esquizofrenia e paranóia."
"Augments are powerful enchantments that can be placed inside a weapon or piece of armor. The equipment doesn't need to be special at all": "<i>any</i> piece of equipment can have an Augment installed into it! From a pointy stick to a razor-sharp Sword of Excruciation, they can all become stronger with the help of an Augment."
"Augments for Everyone": "Aumentos para todos"
"Aumentos são encantamentos poderosos que podem ser colocados dentro de uma arma ou peça de armadura. O equipamento não precisa ser nada especial": "<i>qualquer</i> equipamento pode ter um Aprimoramento instalado! De um bastão pontudo a uma Espada da Excruciação afiada, todos eles podem se tornar mais fortes com a ajuda de um Aprimoramento."
"Basics of Animal Husbandry": "Noções básicas de criação de animais"
"Be cautious! The monks are librarians, but they are also deadly warriors, armed with godly weapons and protections. Violence is highly discouraged. And luckily for you, it shouldn't be necessary": "the monks work for pay. Their fees are spent on new volumes to add to their tower. Expect to pay a high price! While common books can be obtained for small fees, you no doubt need a rare book. Searching for a very rare volume could cost tens of millions of coins -- and there is still no guarantee that they can find it. Imatia's libraries are vast beyond belief, but they still only hold a fraction of the universe's knowledge."
"Because of Heartseeker's awkward weight, she needed both hands to fight well. She threw the torch at the ghost in front of her. The ghost dodged it, and it hit the ground near the door. Curious": "it must be at least somewhat tangible or it wouldn't have dodged. She stepped toward the ghost, her mind working hard to shut out the screaming panic she felt. She had never fought a ghost."
"Bem, agora estamos em uma caverna a um milhão de quilômetros abaixo da terra, e Kazri está irado. Matamos dezenas dessas feras horríveis, apenas para descobrir que o poder necromântico não é necromancia. É escuridão, tudo bem, mas não poder das trevas": "é apenas... escuridão! A ausência de luz! Nunca vi Kazri tão indignado. É bastante divertido. Estamos debatendo o confronto com esse espírito da natureza. Acho que deveríamos seguir em frente; certamente os agentes do Conselho estarão nos rastreando..."
"Biped Outreach Program": "Programa de extensão bípede"
"But heed my warning": "if you intend to destroy me, you will need to bring a better army than last time. Dreva has gifted me with powers you cannot comprehend."
"But then comes the tricky part": "getting him to care. He needs to be able to hear you over the sounds of all the music, so it helps if you're telepathic! If not, bring a sign. Seriously. Once you get his attention, he will give you about ten seconds of his time, so make it count! If you inspire him to tell a story or sing a song, he'll do so. It may not be the one you needed... but then again, it just might be."
"By Muligu, Goblin Sage-Lord

Suppose you need to know something, and can pay a very high price for this knowledge. And suppose the thing one wants to know isn't available from any sage or library. Let's put it bluntly: you want to contact a god -- or, hopefully, just their local representation -- for knowledge. 

But there are so many gods that have something to do with knowledge! Where do you start? Start here. These volumes will cover each god with a penchant for knowledge, explain what they know, and tell you how they might be reached.

 <h1>Imatia, God of Knowledge and Learning</h1>

<b>Who she is:</b> We'll start with the one everybody in the Crone Hegemony's familiar with. Imatia's Libraries are vast repositories of knowledge, gathered up from around the world and kept safe. The Crone Hegemony is a land where knowledge can get you killed, and large libraries don't tend to survive there for long. But Imatia's Libraries are protected by her monks. And even if the Monks of Imatia fail to stop an attacker, the library just leaves. Each library has roughly the same shape: an ivory tower, tall as the sky. One day it appears, a week later it's gone.

<b>What she knows and how to find her:</b> Imatia is the world's librarian. If the knowledge you seek is written in a book, there's a good chance that the book is in one of Imatia's seven ivory towers. But it may take some time to find it. Each tower has its own collection of rare books, found from all over the world by Imatia's monks.

If your cause is 'pure and sound' -- code words for 'something Imatia approves of' -- you could enter a library yourself, if you happened to find one. But when a library moves, only a monk can find it. Finding a monk is relatively easy, however: just seek out the libraries and booksellers of the world, make it known that you seek a monk, and that you can pay. A monk will find you.

Be cautious! The monks are librarians, but they are also deadly warriors, armed with godly weapons and protections. Violence is highly discouraged. And luckily for you, it shouldn't be necessary: the monks work for pay. Their fees are spent on new volumes to add to their tower. Expect to pay a high price! While common books can be obtained for small fees, you no doubt need a rare book. Searching for a very rare volume could cost tens of millions of coins -- and there is still no guarantee that they can find it. Imatia's libraries are vast beyond belief, but they still only hold a fraction of the universe's knowledge.

 <h1>Fenna, God of Beauty, Innocence, Dusk, and Poetry</h1>

<b>Who she is:</b> Fenna is a young god who is more closely associated with beauty than knowledge. But she's not dumb.

<b>What she knows and how to contact her:</b> Fenna knows countless poems in every language. And she loves them. Even poems about things that would otherwise disgust her, such as rape or murder, are beautiful in her eyes -- as long as they're good poems!

Fenna can most easily be found at Paullus's parties. She often shows up at dusk for a few minutes, enthralls the crowd with her beauty, recites a poem or two, and then leaves. But before she leaves, she takes requests. If you need to hear a long-lost poem, Fenna might be willing to recite it. But don't ask her about songs! She doesn't like music all that much. For songs, speak to Irhetsu. Luckily, they are often at the same parties... sometimes as a couple.": "Por Muligu, Senhor Sábio Goblin

Suponha que você precise saber alguma coisa e possa pagar um preço muito alto por esse conhecimento. E suponha que aquilo que se deseja saber não esteja disponível em nenhum sábio ou biblioteca. Vamos ser francos: você deseja entrar em contato com um deus – ou, esperançosamente, apenas sua representação local – para obter conhecimento. 

Mas existem tantos deuses que têm algo a ver com conhecimento! Por onde você começa? Comece aqui. Esses volumes cobrirão cada deus com uma propensão ao conhecimento, explicarão o que eles sabem e dirão como podem ser alcançados.

 <h1>Imatia, Deus do Conhecimento e da Aprendizagem</h1>

<b>Quem ela é:</b> Começaremos com aquela com a qual todos na Hegemonia Crone estão familiarizados. As Bibliotecas da Imatia são vastos repositórios de conhecimento, reunidos em todo o mundo e mantidos em segurança. A Hegemonia Crone é uma terra onde o conhecimento pode fazer com que você seja morto, e grandes bibliotecas não tendem a sobreviver lá por muito tempo. Mas as Bibliotecas de Imatia são protegidas pelos seus monges. E mesmo que os Monges de Imatia não consigam impedir um atacante, a biblioteca simplesmente sai. Cada biblioteca tem aproximadamente o mesmo formato: uma torre de marfim, alta como o céu. Um dia aparece, uma semana depois desaparece.

<b>O que ela sabe e como encontrá-la:</b> Imatia é a bibliotecária do mundo. Se o conhecimento que você procura estiver escrito em um livro, há uma boa chance de que o livro esteja em uma das sete torres de marfim de Imatia. Mas pode levar algum tempo para encontrá-lo. Cada torre tem sua própria coleção de livros raros, encontrados em todo o mundo pelos monges de Imatia.

Se a sua causa for “pura e sólida” – palavras-código para “algo que Imatia aprova” – você mesmo poderá entrar em uma biblioteca, se por acaso encontrar uma. Mas quando uma biblioteca se move, apenas um monge pode encontrá-la. Encontrar um monge é relativamente fácil, entretanto: basta procurar as bibliotecas e livrarias do mundo, deixar claro que você procura um monge e que pode pagar. Um monge irá encontrar você.

Seja cauteloso! Os monges são bibliotecários, mas também são guerreiros mortais, armados com armas e proteções divinas. A violência é altamente desencorajada. E, felizmente para você, isso não deveria ser necessário: os monges trabalham por salário. Suas taxas são gastas em novos volumes para adicionar à sua torre. Espere pagar um preço alto! Embora livros comuns possam ser obtidos por pequenas taxas, você sem dúvida precisa de um livro raro. Procurar um volume muito raro pode custar dezenas de milhões de moedas – e ainda não há garantia de que o encontrarão. As bibliotecas de Imatia são inacreditavelmente vastas, mas ainda guardam apenas uma fração do conhecimento do universo.

 <h1>Fenna, Deusa da Beleza, da Inocência, do Crepúsculo e da Poesia</h1>

<b>Quem ela é:</b> Fenna é uma jovem deusa que está mais associada à beleza do que ao conhecimento. Mas ela não é burra.

<b>O que ela sabe e como contatá-la:</b> Fenna conhece inúmeros poemas em todos os idiomas. E ela os ama. Até mesmo poemas sobre coisas que de outra forma a enojariam, como estupro ou assassinato, são lindos aos seus olhos - desde que sejam bons poemas!

Fenna pode ser encontrada mais facilmente nas festas de Paullus. Ela costuma aparecer ao entardecer por alguns minutos, encanta a multidão com sua beleza, recita um ou dois poemas e depois vai embora. Mas antes de partir, ela atende pedidos. Se você precisar ouvir um poema há muito perdido, Fenna pode estar disposta a recitá-lo. Mas não pergunte a ela sobre músicas! Ela não gosta muito de música. Para músicas, fale com Irhetsu. Felizmente, eles costumam estar nas mesmas festas... às vezes como um casal."
