In exchange for the goddess's gem, Loicus said he could save Ursula. But it was a trick. He twisted her, twisted! He thought I wouldn't See what he did, but he was a fool. And then I... and now not even Death can stop me, and I will have my revenge on him and all his people. He will suffer the way...

