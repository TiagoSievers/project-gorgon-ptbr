"\\\"Nah. Now that Romast is dead, I have to admit": "it's always just seemed like a game to me. It teaches almost nothing about martial arts. The stuff you learn from it is just, like, basic ideologies. Nothing you can't learn in easier ways. Those old monks thought they were gaining skill by playing chess, but I think they were actually gaining skill the normal way: by fighting every day. Forward forward left, then backwards backwards left. Then forward forward left again. That was a tricky bit! Okay, forward forward right.\\\""
"\\\"Não. Agora que Romast está morto, tenho que admitir": "sempre pareceu um jogo para mim. Não ensina quase nada sobre artes marciais. As coisas que você aprende com ele são apenas ideologias básicas. Nada que você não possa aprender de maneiras mais fáceis. Aqueles velhos monges pensavam que estavam ganhando habilidade jogando xadrez, mas acho que na verdade estavam ganhando habilidade da maneira normal: lutando todos os dias. Avançar para a esquerda, depois para trás para a esquerda. Depois para a frente para a esquerda novamente. Essa foi uma tarefa complicada pouco! Ok, avance para a direita.\\\""
"A dusty tome in Irasce's library": "Um livro empoeirado na biblioteca de Irasce"
"A few sips remained in the Chalice, and so Ilth Hale flew to find Talerra. The goddess of depression was too weak to move most of the time, but on certain days Talerra would awaken and move with great power. Ilth Hale loved her and wanted her to be part of the covenant. Finding Talerra's body lying face-down in the muck, she parted Talerra's lips and poured some of the power into her mouth. Talerra's eyes fluttered open and she screamed, \\\"no!\\\" but it was too late": "she had become part of the brotherhood of undeath."
"A inteligência também tem um efeito surpreendente na reprodução. Quando você cria duas criaturas que não são da mesma espécie, mas têm genética compatível – como uma abelha e uma vespa – a prole será uma abelha ou uma vespa. A inteligência dos pais afeta o tipo de descendência que você terá": "uma inteligência mais alta dá uma chance maior para aquela espécie."
"Acredito que Rahu deveria ser uma colônia de mineração. Os rakshasa invasores escolheram colonizar Ilmari pela mesma razão que as velhas vieram séculos atrás": "há grandes veios inexplorados de metais mágicos aqui. Talvez os futuros habitantes de Rahu devessem ter permissão para extrair esse metal para si próprios. Mas, por enquanto, estes infelizes sobreviventes não devem ter acesso ao metal, pois parecem compreender os seus poderes muito melhor do que nós. Eles estão desesperados por armas e não se preocupam com as consequências. Portanto, destruímos todos os equipamentos de mineração e desmontamos suas minas. Os sobreviventes não os reabrirão tão cedo."
"Algumas matilhas de lobisomens \\\"sãs\\\" evitam Norala e tentam impedir a propagação da doença, chegando até a caçar sua própria espécie. Isto é admirável, mas mesmo assim devemos manter uma regra estrita para a segurança de todos os humanos": "todos os licantropos devem ser mortos assim que forem vistos.\""
"Além da adega e área de armazenamento, você fornecerá os seguintes recursos": "uma área de armazenamento e exposição para a grande coleção de obras de arte de minha senhora, uma dúzia de pequenas salas que podem ser transformadas em celas de prisão caso seja necessário e, por último, você criará uma aventura especial para o décimo terceiro aniversário do meu filho. O aniversário dele é daqui a nove meses, então, por favor, se apresse."
"And remember": "you really don't want to upset her. She won't withhold sleep from you -- that idea would be offensive to her -- but she WILL turn all your dreams into horrific nightmares, driving you gibberingly insane within a month."
