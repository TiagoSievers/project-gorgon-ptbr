"Fourteenth birthday. Katarina passed a month ago": "the moment Cualgar gave up the spell, she turned to stone, just as he predicted! Father is furious, but Cualgar looks broken and exhausted. I don't blame him."
"Freqüentemente, há também uma quantia fixa adicionada às jogadas de dados. Por exemplo, algumas habilidades causam 2D+3 de dano. Isso significa que dois dados serão lançados e o dano total será o valor mostrado nesses dados mais 3. O valor também pode ser negativo, como 2D-3. Isso funciona da mesma maneira": "você lançaria dois dados e subtrairia 3 do total. (No entanto, os totais dos dados nunca podem ser negativos; portanto, se o número for inferior a 0, ele se tornará 0.)"
"Gaiolas para animais de estimação são usadas para transferir um animal de estimação para venda. Você só pode usar gaiolas em animais de estimação não registrados – ou seja, aqueles que nunca foram usados ​​para reprodução antes. E por razões legais você só pode vender animais de estimação criados desde o nascimento": "você não pode vender animais capturados na natureza."
"Gathering dark power from the battlefield, Ilth Hale rose into the sky. She found a hole in the sky that she had never seen before": "the entrance to Acur, the dark dimension. Now able to perceive it, she flew headlong into it and claimed it as her home.\": \"<h1>A Saga do Cálice</h1>"
"Golf Guide": "Guia de golfe"
"Guide to Nature Spirit Classification": "Guia para Classificação do Espírito da Natureza"
"Hear me out": "you know of her as a goddess of evil, but Norala is a goddess of nature. Nature is not good or evil."
"His notes for revision 72 indicate satisfaction with the species' intellect. After that, he turned to improving their utility by adding psychic powers. His notes for revision 108 indicate success": "the new generation's psychic powers bred true, and all individuals had at least some psychic abilities."
"History of Alharth: The Council": "História de Alharth: O Conselho"
"History of Psi Mantises": "História dos Louva-a-deus Psi"
"History of the Council, vol. 5": "História do Concílio, vol. 5"
"Horse Breeds: A Primer": "Raças de cavalos: uma cartilha"
"Há dois anos, enviei um mensageiro com notícias da escavação. Você não leu atentamente minha carta? Vou recapitular": "recuperamos com sucesso a antiga fortaleza anã sob sua casa e removemos muitos dos preciosos artefatos da natureza anã. Também aprendemos que esta fortaleza já serviu como bastião contra invasões goblins – ela fica no topo de um importante sistema de túneis nas terras dos goblins. Foi essa descoberta que manteve meus trabalhadores trabalhando sob sua fortaleza!"
"I am Corinth, Head Augmenter of the Augmenter's Guild of Statehelm. And I am writing this book to help fix a very serious problem: our poll of soldiers and warriors visiting Statehelm shows that almost half of them don't use Augments. Some warriors don't even know what they are! Fools! These warriors are fools! And I will not stand idly by while their ignorance gets them killed. I must teach.

Augments are powerful enchantments that can be placed inside a weapon or piece of armor. The equipment doesn't need to be special at all: <i>any</i> piece of equipment can have an Augment installed into it! From a pointy stick to a razor-sharp Sword of Excruciation, they can all become stronger with the help of an Augment.

You may already have magic equipment, but Augments can carry thousands of different enchantments. Surely your weapon doesn't have <i>every</i> enchantment, does it? No. But with an Augment, you can add one more!

And you needn't stop with just one Augment! While each piece of equipment can only have a single Augment in it, you can add an Augment to every single piece of clothing or armor you're wearing. Imagine the power! Imagine the possibilities!

\"But Corinth,\" I imagine you saying (and here I must admit that I imagine your voice to be whiny and irritating, for I assume you are an imbecile that I must tutor). \"I'm not a trained Augmenter. I can't create Augments!\" Of course you can't. You're a warrior! You don't need to create your own Augments. Simply buy them from us! There are professional Augmenters all across the world. And our merchandise is for sale from shopkeepers everywhere!

\"But Corinth,\" I imagine you saying (while sniveling like a child). \"Even if I purchased an Augment, I couldn't install that Augment!\" That is correct. You should <i>never</i> try to install an Augment yourself! Doing so could cause a tremendous explosion, and in rare cases horrific transformation. Instead, visit your local weapons or armor shop. Most shopkeepers have been trained in Augment installation, and can install it for a small fee.

\"But Corinth,\" I hear you say, hopping up and down and flailing your arms. \"There are so many Augments to choose from! What if I install the wrong Augment and change my mind? I'm paralyzed with doubt!\" While it is true that removing an Augment is difficult -- too tricky for the average bumbling shopkeeper -- you can seek out a professional Augmenter to help you remove it. The old Augment will be destroyed, but your weapon or armor will be fine, and you'll be able to install a different Augment in it.

\"But Corinth,\" I hear you say. However, I have had enough of your gibbering. The time for complaints is over! Become the best warrior you can be: go and buy some Augments right now!": "Eu sou Corinth, Chefe dos Aumentadores da Guilda dos Aumentadores de Statehelm. E estou escrevendo este livro para ajudar a resolver um problema muito sério: nossa pesquisa com soldados e guerreiros que visitam Statehelm mostra que quase metade deles não usa Ampliações. Alguns guerreiros nem sabem o que são! Tolos! Esses guerreiros são tolos! E não ficarei de braços cruzados enquanto a ignorância deles os mata. Eu devo ensinar.

Aumentos são encantamentos poderosos que podem ser colocados dentro de uma arma ou peça de armadura. O equipamento não precisa ser nada especial: <i>qualquer</i> equipamento pode ter um Aprimoramento instalado! De um bastão pontudo a uma Espada da Excruciação afiada, todos eles podem se tornar mais fortes com a ajuda de um Aprimoramento.

Você pode já ter equipamento mágico, mas os Aumentos podem conter milhares de encantamentos diferentes. Certamente sua arma não tem <i>todos</i> encantamentos, não é? Não. Mas com um Aumento, você pode adicionar mais um!

E você não precisa parar com apenas um Aumento! Embora cada peça de equipamento possa conter apenas um único Aprimoramento, você pode adicionar um Aprimoramento a cada peça de roupa ou armadura que estiver vestindo. Imagine o poder! Imagine as possibilidades!

“Mas Corinto”, imagino você dizendo (e aqui devo admitir que imagino sua voz chorosa e irritante, pois presumo que você seja um imbecil que devo tutor). \"Não sou um Aumentador treinado. Não consigo criar Aumentos!\" Claro que você não pode. Você é um guerreiro! Você não precisa criar seus próprios aumentos. Basta comprá-los de nós! Existem Aumentadores profissionais em todo o mundo. E nossas mercadorias estão à venda em lojistas de todos os lugares!

“Mas Corinto”, imagino você dizendo (enquanto choraminga como uma criança). \"Mesmo se eu comprasse um Aprimoramento, não conseguiria instalá-lo!\" Isso está correto. Você <i>nunca</i> deve tentar instalar um Aumento sozinho! Fazer isso poderia causar uma explosão tremenda e, em casos raros, uma transformação horrível. Em vez disso, visite a loja local de armas ou armaduras. A maioria dos lojistas foi treinada na instalação do Augment e pode instalá-lo por uma pequena taxa.

“Mas Corinto”, ouço você dizer, pulando para cima e para baixo e agitando os braços. \"Existem tantos Aprimoramentos para escolher! E se eu instalar o Aprimoramento errado e mudar de ideia? Estou paralisado de dúvidas!\" Embora seja verdade que remover um Ampliador seja difícil – muito complicado para o lojista comum e desajeitado – você pode procurar um Ampliador profissional para ajudá-lo a removê-lo. O Aprimoramento antigo será destruído, mas sua arma ou armadura ficará bem e você poderá instalar um Aprimoramento diferente nela.

“Mas Corinto”, ouço você dizer. No entanto, já estou farto de sua tagarelice. O tempo das reclamações acabou! Torne-se o melhor guerreiro que você pode ser: vá e compre alguns Aumentos agora mesmo!"
"I believe Rahu was intended to be a mining colony. The invading rakshasa chose to colonize Ilmari for the same reason the crones came centuries ago": "there are large untapped veins of magical metals here. Perhaps the future inhabitants of Rahu should be allowed to mine this metal for themselves. But for now, these wretched survivors must not be given access to the metal, for they seem to understand its powers far better than we do. They are desperate for weapons and care not for consequences. So we have destroyed every piece of mining equipment and collapsed their mines. The survivors won't soon reopen them."
"I feel somewhat responsible for this situation and wish to make amends. Perhaps we can renovate your cellar areas in some way to make them more useful to you? Ten years is long for a human, but think of your children, or your childrens' children": "what use might they have for sturdy tunnels beneath their home? My engineers stand ready."
"I have prepared a trap for Gulagra. I've invested some of my new power in a crystal of destruction. When the worm or its avatar shows up, it will utterly destroy them. It recharges so slowly that I fear it can only fire once before the battle will be over. But hopefully that will be enough.\": \"É oficial": "vendi todo o ducado aos goblins. Isto é inteiramente culpa do Conselho. Não aceito qualquer culpa pelo que aconteceu: foi uma resposta totalmente previsível e compreensível ao abuso que sofreram. Se eles não pudessem prever que eu faria isso, não deveriam ser governantes de um país. De qualquer forma, Kazri e eu estamos foragidos. Como parte do nosso acordo, obtivemos acesso à rede de túneis goblins entre meu ducado e os adjacentes. Estamos indo para Eltibule, pois deve ser o local mais fácil de se esconder."
"If your cause is 'pure and sound' -- code words for 'something Imatia approves of' -- you could enter a library yourself, if you happened to find one. But when a library moves, only a monk can find it. Finding a monk is relatively easy, however": "just seek out the libraries and booksellers of the world, make it known that you seek a monk, and that you can pay. A monk will find you."
"Ilth Hale closed the door to Acur, and for a time the gods rested, growing strong. The strongest of these new gods was Harukita, resplendent in his Armor of Hate and wielding the Sword of Bigotry. It was Harukita who found the Chalice of Undeath that had been hidden in Acur. Instead of being full of souls, it was still full of Zek's power": "the power to create undead."
"Ilth Hale fechou a porta para Acur, e por um tempo os deuses descansaram, fortalecendo-se. O mais forte desses novos deuses foi Harukita, resplandecente em sua Armadura do Ódio e empunhando a Espada da Intolerante. Foi Harukita quem encontrou o Cálice da Morte que estava escondido em Acur. Em vez de estar cheio de almas, ainda estava cheio do poder de Zek": "o poder de criar mortos-vivos."
"Ilth Hale foi deixada apenas como uma partícula, um único espírito": "a forma humana de Ilth Hale como ela havia sido há muito tempo. Com o coração partido, nu e sozinho, Ilth Hale finalmente sucumbiu à tristeza. Procurando no campo de batalha, ela encontrou um pedaço de sua espada quebrada e cortou os pulsos. \\\"Vol, venha até mim agora! Você jurou levar a humanidade para o mar das almas, e eu sou humano novamente. Honre seu voto!\\\""
"Ilth Hale was left as but a speck, a single spirit": "the human form of Ilth Hale as she had once been so long ago. Heartbroken, naked, and alone, Ilth Hale finally succumbed to sorrow. Searching the battlefield, she found a piece of her shattered sword, and slit her wrists. \\\"Vol, come to me now! You swore to take humanity to the soul sea, and I am a human again. Honor your vow!\\\""
"In addition to the wine cellar and storage area, you will provide the following features": "a storage and display area for my Lady's large collection of artwork, a dozen small rooms that can be made into prison cells should the need arise, and lastly, you shall create a special adventure for my son's thirteenth birthday. His birthday is in nine months, so please make haste."
"In golf, players kick a massive boulder towards a designated target. The boulder must weight at least 3 stone, and it is against the rules for your boulder to leave the ground": "that is, <i>punting</i> the boulder is forbidden. Golf is about kicking!"
"In Statehelm": "Em Statehelm"
"Intelligence also has a surprising effect when breeding. When you breed two creatures that aren't the same species, but have compatible genetics - like a bee and a wasp - the offspring will be either a bee or a wasp. The intelligence of the parents affects which type of offspring you get": "higher Intelligence gives a higher chance for that species."
"Isso será feito. No entanto, fui informado pelos meus engenheiros que a aventura especial do seu filho não estará pronta até o seu décimo terceiro aniversário. Mas vou compensar isso": "encomendei uma armadura mágica para o garoto encontrar, além de uma espada de afiação impecável. Eles estarão escondidos atrás de quebra-cabeças e perigos rudimentares. A menos que haja mais atrasos, a aventura deverá estar pronta a tempo para o seu décimo quinto aniversário."
"It shall be done. However, I am informed by my engineers that your son's special adventure will not be ready by his thirteenth birthday. But I will make up for that": "I have commissioned a suit of magical armor for the boy to find, plus a sword of impeccable sharpness. They will be hidden behind rudimentary puzzles and hazards. Unless there are further delays, the adventure should be ready in time for his fifteenth birthday."
"Jacovin's Penis": "O pênis de Jacobin"
"Lastly, for those not trained in classical Elvish, I want to bring attention to the seeming absence of the two other elder elven gods": "Miraverre, goddess of Dreams, and Laeth, goddess of Time. These two stood alongside Irhetsu and Arisetsu in the crucial years after the Autumn Felling, so why are they ignored here? The answer is that they are referenced in an idiomatic form: <b>\\\"Stories, hope, dreams, and time -- these things guided the elves back to a place of strength.\\\"</b> This line, or a similar one, is used in many ancient Elvish poems to pay homage to the four old elven gods.\": \"<h1>História de Arisetsu</h1>"
"Leeka and the Blade Trials, Chapter 1": "Leeka e os testes de lâmina, capítulo 1"
"Leeka and the Blade Trials, Chapter 2": "Leeka e os testes de lâmina, capítulo 2"
"Leeka and the Blade Trials, Chapter 3": "Leeka e os testes de lâmina, capítulo 3"
"Leeka and the Blade Trials, Chapter 4": "Leeka e os testes de lâmina, capítulo 4"
"Leeka and the Blade Trials, Chapter 5": "Leeka e os testes de lâmina, capítulo 5"
"Leeka and the Blade Trials, Chapter 6": "Leeka e os testes de lâmina, capítulo 6"
"Leeka ficou tensa de surpresa. Suas palavras conseguiram doer! <i>Todo mundo quer pertencer,</i> ela disse a si mesma. Mas algumas pessoas simplesmente não estavam destinadas a se encaixar. O povo escolhido de Melkar": "os bastardos, os perdidos, os obsoletos. Aqueles que têm que seguir sozinhos. Ou quase sozinho."
"Leeka percorreu lenta e calmamente o corredor sob a orientação de Heartseeker. Quando as vozes à frente desapareceram e a luz das tochas não pôde ser vista, ela perguntou": "\\\"como você sabe fazer isso?\\\" Ela continuou a se mover nos padrões estranhos. Avançar para a direita, para a direita para a frente, para a frente para a esquerda..."
"Leeka tensed in surprise. Its words had managed to hurt! <i>Everyone wants to belong,</i> she told herself. But some people just weren't destined to fit in. Melkar's chosen people": "the bastards, the lost, the obsolete. Those who have to go it alone. Or almost alone."
"Mas então vem a parte complicada": "fazer com que ele se importe. Ele precisa ser capaz de ouvir você acima dos sons de todas as músicas, então ajuda se você for telepático! Se não, traga uma placa. Seriamente. Depois de chamar a atenção dele, ele lhe dará cerca de dez segundos de seu tempo, então faça valer a pena! Se você o inspirar a contar uma história ou cantar uma música, ele o fará. Pode não ser o que você precisava... mas, novamente, pode ser."
"Mas preste atenção ao meu aviso": "se você pretende me destruir, precisará trazer um exército melhor do que da última vez. Dreva me presenteou com poderes que você não pode compreender."
"Message-Comb to Dalvos": "Mensagem-Comb para Dalvos"
"Message-Comb to the Winter Queen": "Mensagem-Pente para a Rainha do Inverno"
"Moderation Guidebook for Volunteer Guides": "Guia de moderação para guias voluntários"
"Monsters and Mantids - Player's Handbook": "Monstros e Louva-a-deus - Manual do Jogador"
"Nature Spirit Mortality": "Mortalidade do Espírito da Natureza"
"No golfe, os jogadores chutam uma pedra enorme em direção a um alvo designado. A pedra deve pesar pelo menos 3 pedras, e é contra as regras que ela saia do chão": "ou seja, é proibido <i>puntar</i> a pedra. Golfe é chutar!"
"Norala the Huntress": "Norala, a Caçadora"
"Note that you cannot let other people ride you. [Developer's note": "at least not yet!] Travel mode just lets you \\\"ride yourself\\\".\": \"Montar um cavalo está além das capacidades da maioria dos animais quadrúpedes. Mas os quadrúpedes não precisam de cavalo para andar mais rápido! <i>Eles podem ir mais rápido.</i> E você é a prova viva! Você desenvolveu a força muscular necessária para viagens de longa distância e aprendeu as técnicas de respiração corretas com um treinador apropriado. Agora você mesmo pode montar!"
"Notes on Statehelm Graveyard Rituals": "Notas sobre os rituais do cemitério de Statehelm"
"Não fomos tão tolos a ponto de escavar os túneis das terras dos goblins, é claro, mas mesmo assim, nosso trabalho tem consequências": "com os túneis da fortaleza limpos, os mineiros goblins inevitavelmente chegarão. Isso acontecerá muito rapidamente – definitivamente durante a sua vida! Então, para sua segurança, devemos demolir estes túneis. Entretanto, ainda existem alguns artefatos anões imóveis lá, e nossas leis não nos permitem destruí-los."
"Nós concordamos em uma frase-código para druidas com ideias semelhantes se cumprimentarem": "\\\"Quando o sol se põe, a floresta acena verde.\\\" Eu acredito em você e confio em você, druida, e lhe dou a frase-código como prova."
"O lugar é enorme": "um enorme ninho de túneis e salas. Encontrei a coleção de pinturas da minha mãe lá também! Dizem que tudo isso foi obra do meu pai. Mas isso é um absurdo. E o estranho jogo infantil que meu pai mandou fazer ainda está lá embaixo. Que perda de tempo!"
"O psilobo é invenção do nosso progenitor, o grande mago Dalvos. Ele atua como um processador neural de informações psíquicas, permitindo-nos unir as emanações de outros louva-a-deus em todo tipo de estímulo": "visual, sonoro, olfativo, doloroso e até mesmo emoções. Isso nos permite comunicar perfeitamente os pensamentos entre si."
"Observe que você não pode permitir que outras pessoas o montem. [Nota do desenvolvedor": "pelo menos ainda não!] O modo de viagem apenas permite que você \\\"passeie sozinho\\\".\""
"Often there is also a fixed amount added to the dice rolls. For example, some abilities deal 2D+3 damage. This means that two dice will be rolled, and the total damage is the amount shown on those dice plus 3. The amount can also be negative, such as 2D-3. This works the same way": "you would roll two dice, then subtract 3 from the total. (Dice totals can never be negative, however, so if the number would go below 0, it becomes 0 instead.)"
"On Dealing With Rakshasa Ships": "Sobre como lidar com navios Rakshasa"
"Ormorek": "Eu não me importo. Não estou fazendo isso. Dê o fora daqui, humano! Ir! Eu ainda posso ferir as pessoas, você sabe!"
"Our Partnership with the Goblins of Segdewick": "Nossa Parceria com os Goblins de Segdewick"
"Ouça-me": "você a conhece como uma deusa do mal, mas Norala é uma deusa da natureza. A natureza não é boa ou má."
"Paradoxical Time Conundrum!": "Enigma do tempo paradoxal!"
"Passo 0": "Espere até meia-noite."
"Passo 1": "Acenda tealights em todos os 16 caixões. (Tecnicamente, apenas alguns são realmente necessários, mas é complicado descobrir quais são; é mais seguro acender todos eles.)"
"Passo 2": "Acenda uma Vela de Invocação Necromântica. Inale seus vapores."
"Passo 3": "Na frente da estátua, faça a oração padrão para criar o Pó de Necromancia."
"Pet cages are used to transfer a pet for sale. You can only use cages on Unregistered pets -- meaning ones that have never been used for breeding before. And for legal reasons you can only sell pets that you raised from birth": "you cannot sell wild-caught animals."
"Placed directly into Necromancers' minds": "Colocado diretamente nas mentes dos Necromantes"
"Por causa do peso estranho de Heartseeker, ela precisava das duas mãos para lutar bem. Ela jogou a tocha no fantasma à sua frente. O fantasma se esquivou e caiu no chão perto da porta. Curioso": "deve ser pelo menos um pouco tangível ou não teria se esquivado. Ela deu um passo em direção ao fantasma, sua mente trabalhando duro para afastar o pânico gritante que sentia. Ela nunca havia lutado contra um fantasma."
"Por último, para aqueles que não são treinados em élfico clássico, quero chamar a atenção para a aparente ausência dos outros dois deuses élficos mais velhos": "Miraverre, deusa dos Sonhos, e Laeth, deusa do Tempo. Esses dois estiveram ao lado de Irhetsu e Arisetsu nos anos cruciais após o Outono, então por que eles são ignorados aqui? A resposta é que eles são referenciados de forma idiomática: <b>\\\"Histórias, esperança, sonhos e tempo - essas coisas guiaram os elfos de volta a um lugar de força.\\\"</b> Esta frase, ou semelhante, é usada em muitos poemas élficos antigos para homenagear os quatro antigos deuses élficos.\""
"Povus Town System Guide": "Guia do sistema da cidade Povus"
"Primeiro, você deve admitir que Norala é uma contradição": "ela é o deus dos grandes comendo os pequenos, do poder que corrige, dos fortes escravizando, matando ou abusando dos fracos. Mas Norala não é um deus forte. Por que isso acontece? É porque ela não quer ofuscar os principais predadores do mundo. Se ela fosse a mais forte, então não poderia, em sã consciência, ajudar os mais fracos que ela. Você não vê?! Ela é fraca para não ter que matar todos nós!"
"Received as a favor-gift from a priest": "Recebido como presente de favor de um padre"
"Received from a golf caddy golem": "Recebido de um golem de golfe"
"Reginald": "Hum, o quê?"
"Reginaldo": "Sim?"
"Remember that training will have a much bigger overall impact than the pet's genes! And your bond with the pet is what will truly turn you both into killing machines in battle.\": \"<h1>Prelúdio": "Iniciando o manejo de animais</h1> Os manipuladores de animais neófitos que desejam usar seus animais de estimação em combate muitas vezes não sabem como começar. Bem, isso é fácil: comece domesticando um animal de estimação. Cada tipo de animal de estimação precisa de um regime de domesticação diferente; converse com seu estábulo local para ver o que eles recomendam para sua área."
"Remga's Rules of Piracy": "Regras de pirataria de Remga"
"Restaram alguns goles no Cálice e então Ilth Hale voou para encontrar Talerra. A deusa da depressão estava fraca demais para se mover na maior parte do tempo, mas em certos dias Talerra despertava e se movia com grande poder. Ilth Hale a amava e queria que ela fizesse parte do pacto. Encontrando o corpo de Talerra caído de bruços na lama, ela separou os lábios de Talerra e derramou um pouco do poder em sua boca. Os olhos de Talerra se abriram e ela gritou": "\\\"não!\\\" mas já era tarde demais: ela havia se tornado parte da irmandade dos mortos-vivos."
"Reunindo o poder sombrio do campo de batalha, Ilth Hale subiu ao céu. Ela encontrou um buraco no céu que nunca tinha visto antes": "a entrada para Acur, a dimensão escura. Agora capaz de percebê-lo, ela voou de cabeça para dentro dele e reivindicou-o como seu lar.\""
"Revisions from 72 to 140 are called \\\"second era\\\" mantises. This era saw the development of the psilobe, a special portion of the mantis brain designed to enhance our psychic powers. These mantises were unfortunately unstable": "their primitive psilobes caused eventual brain damage and most suffered from schizophrenia and paranoia."
"Riding a horse is beyond the capabilities of most quadrupedal animals. But quadrupeds don't need a horse to go faster! <i>They can just go faster.</i> And you're living proof! You've developed the necessary muscle strength for long-distance travel, and you've learned the correct breathing techniques from an appropriate trainer. Now you can mount yourself!

There's now a horse-shaped button on the right side of your screen which brings up the Mount window. (If you already had a horse in your stable, you already had this button.) While in your animal form, bring up the Mount window and press the \"Mount Up\" button. This will place you in travel mode.

While in travel mode, you behave as if you were your own mount. You can't fight in travel mode -- only travel! You'll notice an Anxiety meter: this fills up if you get too close to monsters, go underwater, or do other scary things. If you get too anxious, you'll automatically exit travel mode so that you can fight.

You also get the benefits from mount-related equipment such as saddles and reins. Equipping these items can affect your speed and behavior in travel mode. You can even equip a saddlebag and access the bag's contents while travelling. (Best not to think about the logistics of this maneuver.)

You are your own mount, but it goes beyond that: you're also your own rider! This means that you can earn Riding XP just by traveling in this mode. Doing so will unlock special mount-related abilities, which you can use on yourself while traveling.

Note that you cannot let other people ride you. [Developer's note: at least not yet!] Travel mode just lets you \"ride yourself\".": "Montar um cavalo está além das capacidades da maioria dos animais quadrúpedes. Mas os quadrúpedes não precisam de cavalo para andar mais rápido! <i>Eles podem ir mais rápido.</i> E você é a prova viva! Você desenvolveu a força muscular necessária para viagens de longa distância e aprendeu as técnicas de respiração corretas com um treinador apropriado. Agora você mesmo pode montar!

Agora há um botão em forma de cavalo no lado direito da tela que abre a janela Montar. (Se você já tinha um cavalo em seu estábulo, você já tinha este botão.) Enquanto estiver em sua forma animal, abra a janela Montar e pressione o botão \"Montar\". Isso o colocará no modo de viagem.

Enquanto estiver no modo de viagem, você se comporta como se fosse sua própria montaria. Você não pode lutar no modo viagem – apenas viajar! Você notará um medidor de ansiedade: ele enche se você chegar muito perto de monstros, mergulhar ou fazer outras coisas assustadoras. Se você ficar muito ansioso, sairá automaticamente do modo de viagem para poder lutar.

Você também obtém benefícios de equipamentos relacionados à montaria, como selas e rédeas. Equipar esses itens pode afetar sua velocidade e comportamento no modo de viagem. Você pode até equipar um alforje e acessar o conteúdo da bolsa durante a viagem. (É melhor não pensar na logística desta manobra.)

Você é sua própria montaria, mas vai além disso: você também é seu próprio cavaleiro! Isso significa que você pode ganhar Riding XP apenas viajando neste modo. Fazer isso desbloqueará habilidades especiais relacionadas à montaria, que você pode usar em si mesmo enquanto viaja.

Observe que você não pode permitir que outras pessoas o montem. [Nota do desenvolvedor: pelo menos ainda não!] O modo de viagem apenas permite que você \"passeie sozinho\"."
"Rulgirt": "Eu quero encontrar você também. Então é um pacto, humano. Vejo você esta noite."
"Se a sua causa for “pura e sólida” – palavras-código para “algo que Imatia aprova” – você mesmo poderá entrar em uma biblioteca, se por acaso encontrar uma. Mas quando uma biblioteca se move, apenas um monge pode encontrá-la. Encontrar um monge é relativamente fácil, entretanto": "basta procurar as bibliotecas e livrarias do mundo, deixar claro que você procura um monge e que pode pagar. Um monge irá encontrar você."
"Secrets of the Psilobe Explained": "Segredos do Psilobe explicados"
"Sedgewick's Journal": "Diário de Sedgewick"
"Seja cauteloso! Os monges são bibliotecários, mas também são guerreiros mortais, armados com armas e proteções divinas. A violência é altamente desencorajada. E, felizmente para você, isso não deveria ser necessário": "os monges trabalham por salário. Suas taxas são gastas em novos volumes para adicionar à sua torre. Espere pagar um preço alto! Embora livros comuns possam ser obtidos por pequenas taxas, você sem dúvida precisa de um livro raro. Procurar um volume muito raro pode custar dezenas de milhões de moedas – e ainda não há garantia de que o encontrarão. As bibliotecas de Imatia são inacreditavelmente vastas, mas ainda guardam apenas uma fração do conhecimento do universo."
"Seus descendentes serão uma nova raça. Eles sentirão novas emoções que seus pais não poderão ajudá-los a compreender. Eles serão frágeis e vulneráveis. E é por isso que deixei este lugar intacto": "os cristais de água aqui são responsáveis ​​por encher os lagos superficiais com água potável. Isto pode parecer sem importância agora, enquanto as tempestades da máquina meteorológica ainda castigam a cidade. Mas quando as tempestades acabarem, acredito que não haverá mais vida em Ilmari. Sem água potável, esta raça incipiente certamente morreria. Eu não permitirei isso."
"Since the Council went to such extreme effort to create the ritual area in the graveyard, it would be uncouth <i>not</i> to take advantage of it, I say.

The ritual area consists of a statue surrounded on three sides by 16 coffins, each containing a \"hero of Statehelm\". I cannot tell who these people were, or if they were even human, but their corpses were certainly subjected to immoral necromantic magics, trapping their souls and magnifying the power within. The statue itself was made with materials from Acur. 

Step 0: Wait until midight.

Step 1: Light tealights on all 16 coffins. (Technically only a few are actually needed, but it's tricky to figure out which those are; safer to light them all.)

Step 2: Light a Necromantic Summoning Candle. Inhale its fumes.

Step 3: In front of the statue, perform the standard prayer to create Necromancy Dust.

If correctly performed, it should pull necromantic energy from the area and form it into something substantive.": "Já que o Conselho fez um esforço tão extremo para criar a área ritual no cemitério, seria rude <i>não</i> tirar vantagem disso, eu digo.

A área ritual consiste em uma estátua cercada em três lados por 16 caixões, cada um contendo um \"herói de Statehelm\". Não sei dizer quem eram essas pessoas, ou se eram mesmo humanos, mas seus cadáveres certamente foram submetidos a magias necromânticas imorais, prendendo suas almas e ampliando o poder interior. A estátua em si foi feita com materiais da Acur. 

Passo 0: Espere até meia-noite.

Passo 1: Acenda tealights em todos os 16 caixões. (Tecnicamente, apenas alguns são realmente necessários, mas é complicado descobrir quais são; é mais seguro acender todos eles.)

Passo 2: Acenda uma Vela de Invocação Necromântica. Inale seus vapores.

Passo 3: Na frente da estátua, faça a oração padrão para criar o Pó de Necromancia.

Se executado corretamente, deve extrair energia necromântica da área e transformá-la em algo substantivo."
"Sinto-me um tanto responsável por esta situação e desejo fazer as pazes. Talvez possamos renovar as áreas da sua adega de alguma forma para torná-las mais úteis para você? Dez anos é muito tempo para um ser humano, mas pense nos seus filhos, ou nos filhos dos seus filhos": "que utilidade eles poderiam ter para os túneis resistentes sob sua casa? Meus engenheiros estão prontos."
"So You're a Spirit Fox": "Então você é uma raposa espiritual"
"Some \\\"sane\\\" werewolf packs eschew Norala and try to prevent the spread of the disease, even going as far as hunting their own kind. This is admirable, but nevertheless we must maintain a strict rule for the safety of all humans": "all lycanthropes should be killed on sight.\": \"<h1>Norala, a caçadora</h1>"
"Step 0": "Wait until midight."
"Step 1": "Light tealights on all 16 coffins. (Technically only a few are actually needed, but it's tricky to figure out which those are; safer to light them all.)"
"Step 2": "Light a Necromantic Summoning Candle. Inhale its fumes."
"Step 3": "In front of the statue, perform the standard prayer to create Necromancy Dust."
"Suas notas para a revisão 72 indicam satisfação com o intelecto da espécie. Depois disso, ele passou a melhorar sua utilidade adicionando poderes psíquicos. Suas notas para a revisão 108 indicam sucesso": "os poderes psíquicos da nova geração se tornaram verdadeiros e todos os indivíduos tinham pelo menos algumas habilidades psíquicas."
"Suponha que você encontrou um bípede incomum, talvez um humano, que apresentasse poderes psíquicos. Se você dissecasse este bípede, não encontraria nenhuma fonte física de suas habilidades psíquicas. A melhor explicação disponível é que partes do cérebro de um médium existem numa dimensão paralela. Isso pode explicar por que a maioria dos médiuns são capazes de “falar” telepaticamente uns com os outros": "eles podem projetar formas de onda em uma dimensão diferente, na qual outros médiuns são capazes de “ouvir”. Mas isso é pura conjectura. Voltemos aos fatos."
"Suponha que você precise saber alguma coisa e possa pagar um preço muito alto por esse conhecimento. E suponha que aquilo que se deseja saber não esteja disponível em nenhum sábio ou biblioteca. Vamos ser francos": "você deseja entrar em contato com um deus – ou, esperançosamente, apenas sua representação local – para obter conhecimento."
"Suppose you found an unusual biped, perhaps a human, who presented psychic powers. Were you to dissect this biped, you would not find any physical source of their psychic abilities. The best explanation available is that portions of a psychic's brain exist in a parallel dimension. This might explain why most psychics are able to telepathically \\\"speak\\\" to each other": "they can project waveforms in a different dimension, one which other psychics are able to \\\"hear\\\" in. But this is pure conjecture. Let us return to facts."
"Suppose you need to know something, and can pay a very high price for this knowledge. And suppose the thing one wants to know isn't available from any sage or library. Let's put it bluntly": "you want to contact a god -- or, hopefully, just their local representation -- for knowledge."
"Tattered Journal": "Diário Esfarrapado"
"Temos as notas de Dalvos para cada revisão do louva-a-deus psíquico, mas elas são esparsas e costumam usar abreviações enigmáticas. Não sabemos exatamente o que mudou entre cada revisão; só podemos conjecturar a partir de pistas contextuais. Mas sabemos que as primeiras quarenta e quatro revisões foram um fracasso": "as criaturas resultantes não eram suficientemente inteligentes e foram libertadas nas florestas de Eltibule."
"The Chalice Saga, Vol 1": "A Saga do Cálice, Vol 1"
"The Chalice Saga, Vol 2": "A Saga do Cálice, Vol 2"
"The Chalice Saga, Vol 3": "A Saga do Cálice, Vol 3"
"The Despairing Priest": "O padre desesperado"
"The Gods of Knowledge, Vol 1": "Os Deuses do Conhecimento, Vol 1"
"The Gods of Knowledge, Vol 2": "Os Deuses do Conhecimento, Vol 2"
"The Gods of Knowledge, Vol 3": "Os Deuses do Conhecimento, Vol 3"
"The Gods of Knowledge, Vol 4": "Os Deuses do Conhecimento, Vol 4"
"The Gods, VIII: Gulagra": "Os Deuses, VIII: Gulagra"
"The Gods, XI: Arisetsu": "Os Deuses, XI: Arisetsu"
"The Gods, XIV: Dale Renthian": "Os Deuses, XIV: Dale Renthian"
"The Gods: Council Quick-Reference": "Os Deuses: Referência Rápida do Conselho"
"The Origin of 'Tast's Pack'": "A origem do 'Pacote Tast'"
"The place is massive": "a huge nest of tunnels and rooms. I found my mother's painting collection down there, too! They say this was all my father's doing. But that's absurd. And the strange children's game my father had them make is still down there. What a waste of time!"
"The psilobe is the invention of our progenitor, the great wizard Dalvos. It acts as a neural processor of psychic information, allowing us to coalesce other mantis's emanations into every kind of stimulus": "visual, audible, olfactory, pain, even emotions. This allows us to perfectly communicate thoughts between each other."
"The Sage's Lectern, Vol 1": "O Púlpito do Sábio, Vol 1"
"The Sage's Lectern, Vol 2": "O Púlpito do Sábio, Vol 2"
"The Sun Sets on Sachetar": "O sol se põe em Sachetar"
"The Traits of a Mount": "As características de uma montaria"
"The Traits of a Pet": "As características de um animal de estimação"
"The Wasted Wishes": "Os desejos desperdiçados"
"Their offspring will be a new race. They will feel new emotions that their parents cannot help them understand. They will be fragile and vulnerable. And that is why I have left this place intact": "the water crystals here are responsible for filling the surface lakes with clean drinking water. This may seem unimportant now while the weather machine's storms still batter the city. But when the storms end, I believe there will be no life left in Ilmari. Without clean water, this fledgling race would surely die. I will not permit that."
"Traits are handy when comparing two pets of the same species, but less useful when comparing across species. Let's take Toughness, for instance": "a grizzly bear with a Toughness of 1 would have 25% less health than a Grizzly Bear with an average Toughness (of 50). But that Toughness 1 bear might still have more health than a rat with a Toughness of 100! So animal handlers need to learn the ins and outs of each species in order to really make sense of trait numbers."
"Transcript of the First Meeting of the Cult of Zhia Lian": "Transcrição do Primeiro Encontro do Culto de Zhia Lian"
"Two years ago, I sent a messenger with news of the excavation. Did you not carefully read my letter? I shall recap": "we have successfully recovered the ancient dwarven fortress beneath your home and removed many of the precious artifacts of dwarven nature. We also learned that this fortress once served as a bastion against goblin invasions -- it sits atop a major gob-lands tunnel system. It is this discovery that has kept my workers toiling beneath your keep!"
"Você é sua própria montaria, mas vai além disso": "você também é seu próprio cavaleiro! Isso significa que você pode ganhar Riding XP apenas viajando neste modo. Fazer isso desbloqueará habilidades especiais relacionadas à montaria, que você pode usar em si mesmo enquanto viaja."
"Volunteer Guide Commands": "Comandos do Guia Voluntário"
"We have agreed upon a code-phrase for like-minded druids to greet each other": "\\\"When the sun sets, the forest beckons green.\\\" I believe in you and trust you, druid, and I give you the code-phrase as proof."
"We have Dalvos's notes for each revision of psychic mantis, but they are sparse and often use cryptic abbreviations. We do not know exactly what changed between each revision; we can only conjecture from contextual clues. But we do know that the first forty-four revisions were failures": "the resulting creatures were not sufficiently intelligent and were released into the wilds of Eltibule."
"We know you have a lot of choices of where to shop, play, and eat. That's why we strive every day to earn your business. Our new Biped Outreach Program is just one of the many ways we try to make you feel at home.

What is the Biped Outreach Program? We're glad you asked! Having discerned some discomfort amongst shoppers, we used our heightened psychic abilities to detect unconscious hostilities toward insects -- including mantises! While this is, of course, highly illogical, we realize that you can't help it. You are who you are, and who you are is a bug-hater. The Biped Outreach Program makes you feel more at home by introducing many shopkeepers and employees who are bipedal -- JUST LIKE YOU!

Whether it's browsing our Shoppes at Red Wing or just relaxing in our mammal-friendly lounges, we want every minute of your stay to be memorable. Red Wing style.": "Sabemos que você tem muitas opções de onde fazer compras, brincar e comer. É por isso que nos esforçamos todos os dias para conquistar o seu negócio. Nosso novo Programa de Extensão Bípede é apenas uma das muitas maneiras pelas quais tentamos fazer você se sentir em casa.

O que é o Programa de Extensão Bípede? Estamos felizes que você perguntou! Tendo percebido algum desconforto entre os compradores, usamos nossas habilidades psíquicas intensificadas para detectar hostilidades inconscientes contra insetos – incluindo louva-a-deus! Embora isso seja, obviamente, altamente ilógico, percebemos que você não pode evitar. Você é quem você é, e quem você é odeia insetos. O Programa Biped Outreach faz você se sentir mais em casa ao apresentar muitos lojistas e funcionários que são bípedes - ASSIM COMO VOCÊ!

Seja navegando em nossas lojas no Red Wing ou apenas relaxando em nossos lounges adequados para mamíferos, queremos que cada minuto de sua estadia seja memorável. Estilo Asa Vermelha."
"We were not so foolish as to excavate the gob-lands tunnels, of course, but even so, our work has consequence": "with the fortress tunnels cleared, goblin miners will inevitably arrive. It will happen quite quickly -- definitely within your lifetime! So for your safety, we must demolish these tunnels. However, there remain some immobile dwarven artifacts there, and our laws do not permit us to destroy them."
"Welcome to Sun Vale": "Bem-vindo ao Sol Vale"
"Well, now we're in a fucking cave a million miles beneath the earth, and Kazri is irate. We've killed dozens of these horrible beasts, only to discover that the necromantic power isn't necromancy at all. It's darkness, all right, but not dark power": "it's just... darkness! The absence of light! I've never seen Kazri so outraged. It's fairly amusing. We are debating confronting this nature spirit. I think we should just move on; surely the Council's agents will be tracking us..."
"While in travel mode, you behave as if you were your own mount. You can't fight in travel mode -- only travel! You'll notice an Anxiety meter": "this fills up if you get too close to monsters, go underwater, or do other scary things. If you get too anxious, you'll automatically exit travel mode so that you can fight."
"Wilker": "Mas não posso ficar aberto nem mais um mês! Precisamos começar os reparos..."
"You are your own mount, but it goes beyond that": "you're also your own rider! This means that you can earn Riding XP just by traveling in this mode. Doing so will unlock special mount-related abilities, which you can use on yourself while traveling."
"You leaf through the book for interesting tidbits:

\"The lead wizards from each school met in secret, calling themselves the Council of Thirteen. Had the gorgons found them then, we would still be under the yoke of the Crone Hegemony to this day! But under the cloak of magical secrecy they organized a rebellion.\"

\"... Queen Hegata declared open war upon the upstart humans and called for aid from her allies. The orcs followed her lead, but the elves of Verta refused to honor their treaty, claiming that it was an internal matter. This created a schism between the elves and the hags which is still evident to this day.\"

\"... When the crones were forced out of their beloved home in Ilmari, they destroyed this Great Weather Machine so that the Council could not obtain it. Who can say if they knew what would happen as a result? Perhaps it was an accident. But in any case, Ilmari was covered in horrific storms for years. Its fertile soil was washed away and it became a barren desert. And so the Rakshasa lost the war, yet claim ownership of Ilmari by default, for none else care enough to fight for it.\"

... This is too boring. You stop reading and focus on more pressing matters.": "Você folheia o livro em busca de informações interessantes:

\"Os principais bruxos de cada escola se reuniram em segredo, autodenominando-se Conselho dos Treze. Se as górgonas os tivessem encontrado então, ainda estaríamos sob o jugo da Hegemonia da Anciã até hoje! Mas sob o manto do segredo mágico eles organizaram uma rebelião.\"

\"...A Rainha Hegata declarou guerra aberta aos humanos iniciantes e pediu ajuda a seus aliados. Os orcs seguiram seu exemplo, mas os elfos de Verta se recusaram a honrar seu tratado, alegando que era um assunto interno. Isso criou um cisma entre os elfos e as bruxas que ainda é evidente até hoje.\"

\"... Quando as velhas foram forçadas a deixar sua amada casa em Ilmari, elas destruíram esta Grande Máquina Meteorológica para que o Conselho não pudesse obtê-la. Quem pode dizer se eles sabiam o que aconteceria como resultado? Talvez tenha sido um acidente. Mas em qualquer caso, Ilmari foi coberto por tempestades horríveis durante anos. Seu solo fértil foi lavado e tornou-se um deserto árido. E assim os Rakshasa perderam a guerra, mas reivindicam a propriedade de Ilmari por padrão, pois ninguém mais se importa o suficiente para lutar por ela. \"

... Isso é muito chato. Você para de ler e se concentra em assuntos mais urgentes."
"Zek despejou no cálice agora vazio um pedaço de seu próprio poder": "o poder de capturar almas e trazer à tona os mortos-vivos. E então ele lançou o cálice em sua dimensão oculta, conhecida como Acur, a dimensão sombria da Angst, que a maioria dos deuses não conseguia perceber. Pois embora Zek fosse um deus egoísta que estava com medo de sua própria morte, ele se recusou a dar a seu irmão a satisfação de remover os mortos-vivos do mundo. Outro deus viria."
"Zek poured into the now-empty chalice a piece of his own power": "the power to capture souls and bring forth the undead. And then he hurled the chalice into his hidden dimension, known as Acur, the dark dimension of Angst, which most gods could not perceive. For even though Zek was a selfish god who was terrified of his own demise, he refused to give his brother the satisfaction of removing undeath from the world. Another god would come."
"“Mas Corinto”, ouço você dizer. No entanto, já estou farto de sua tagarelice. O tempo das reclamações acabou! Torne-se o melhor guerreiro que você pode ser": "vá e compre alguns Aumentos agora mesmo!\""
