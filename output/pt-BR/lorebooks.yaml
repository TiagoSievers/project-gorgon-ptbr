"Dale Renthian era um pintor humano com alguma habilidade e relutantemente concordou em deixar Elshana viver em sua cabeça e ser sua musa. Elshana deixou de existir, tornando-se apenas uma voz, mas tinha muito a dizer. A criatividade de Dale explodiu, suas pinturas tornaram-se extremamente imaginativas e ele logo fundou o estilo de arte Renthian, misturando magia simples com pigmentos para criar pinturas justaposicionais angustiantes. Ele atraiu muitos estudantes e ficou bastante rico, mas anos depois percebeu que estava desperdiçando seu dom. Esta é a parte de sua vida que é tantas vezes contada em contos fantásticos e poemas épicos": "ele vagou pelo mundo a cavalo, corrigindo erros com dispositivos criativos e dando inspiração àqueles que mais precisavam."
"Dale Renthian was a human painter of some skill, and he reluctantly agreed to let Elshana live in his head and be his muse. Elshana ceased to be, becoming just a voice, but she had much to say. Dale's creativity exploded, his paintings became wildly imaginative, and he soon founded the Renthian Style of art, mixing simple magics with pigments to create harrowing juxtapositional paintings. He attracted many students and grew quite wealthy, but years later, he realized he was squandering his gift. This is the part of his life that is so often told in tall tales and epic poems": "he wandered the world on horseback, righting wrongs with creative gadgetry and giving inspiration to those that needed it most."
