<h1>O que é uma Raposa Espiritual?</h1> Você é um espírito da natureza agora. Você não é um mortal. Você provavelmente não pode morrer. Experimente! Você descobrirá que, de uma forma ou de outra, você não morre. É muito conveniente! Mas lembre-se, seu corpo de raposa é feito de carne e osso e é precioso. Ele pode sobreviver a muitos abusos, mas eventualmente se desgastará. 

Você está na fase da Raposa Jovem, então divirta-se! Mas algum dia você acordará e perceberá que é parcialmente transparente. Não surte. Isso é apenas o seu corpo físico morrendo. 

Ser imaterial torna muitas atividades divertidas impraticáveis, e a maioria de nós fica bastante deprimida neste momento. Mas espere alguns milhares de anos, porque você eventualmente desenvolverá muitos grandes poderes que contornam algumas dessas limitações.

<h1>Como deixar de ser uma raposa espiritual</h1> Você já sabe como curar essa maldição: você só precisa que alguém lhe dê uma pedra espiritual! Eles se tornarão uma raposa e você estará livre!

Se você fizer isso dentro de uma ou duas décadas, você realmente retornará ao seu antigo corpo mortal. Mas em breve a sua antiga forma desaparecerá para sempre. Nesse caso, quando você deixar de ser uma raposa espiritual, você simplesmente... deixará de ser. Alguns de nós eventualmente decidem que já estamos fartos de existir. Outros são enganados e levados a segurar uma pedra espiritual por mortais espertos. De qualquer forma, esse é o fim.

<h1>Procure Raposas Despertas</h1> Não existem muitas raposas espirituais no mundo, então provavelmente você não encontrará muitas de nós. Mas existem toneladas de raposas mortais com poderes mágicos! Talvez essas raposas sejam descendentes de uma raposa espiritual... ou talvez as raposas sejam apenas médiuns espíritas naturalmente talentosos. De qualquer forma, os magos mortais têm se aproveitado das raposas há anos: eles as transformam em Familiares e as escravizam por seu poder.

Os magos usam um ritual de Despertar nessas raposas, então a maioria delas pode falar! Os inteligentes podem lhe ensinar técnicas mágicas. É claro que em algumas décadas você saberá mais do que qualquer raposa mortal poderia lhe ensinar. Mas, por enquanto, eles são seus melhores professores.

<h1>Cuidado com os Godlings!</h1> Como espírito da natureza de classe 5, você tem um novo predador natural: espíritos da natureza de classe 4! E também... outros espíritos da natureza Classe 5! E também: certos espíritos da natureza idiotas da Classe 3! Todos eles querem absorver você para aumentar seu próprio poder.

Evite interagir com QUALQUER espírito da natureza durante os primeiros séculos! Você ficará tão fraco que até mesmo o espírito guardião de uma pequena floresta poderá comê-lo. Você deve tomar cuidado especialmente com cidades de orcs e goblins com protetores semideuses. Semideuses também são espíritos da natureza! Eles geralmente têm armas que podem destruí-lo permanentemente.

Deuses, deuses, semideuses... tudo isso são apenas palavras para descrever o que você é! Você está entre os mais fracos e vulneráveis ​​de todos os espíritos da natureza, mas ainda é um espírito da natureza, uma centelha de divindade! Se você conseguir sobreviver por alguns milhares de anos, você crescerá e se tornará algo mais do que apenas uma raposa! 

... Ou, mais provavelmente, você não vai. Se o peso da existência se tornar muito pesado, você sempre poderá enganar algum pobre mortal para que lhe dê uma pedra espiritual.

 Como espírito da natureza, existem muitas outras regras e restrições das quais você deve estar ciente... mas acho que você descobrirá o resto sozinho. Ou morra tentando!

Divirta-se!"
" <h1>Helping Povus</h1> Each night (around 8pm game-time) the town of Povus is ravaged by monsters. When you help the town fend off these threats, you gain personal rewards and also help the town recover. Start by lighting the lamps around town. This will help keep the monsters at bay. Once all the lamps in town are lit, visit the town signboard for a reward. You can also start another quest at that time, if you so choose.

The second quest is chosen randomly. Complete it and return to the signpost for a reward. After that, the quests get a bit harder, and require two players to start. (Both players must interact with the signboard at the same time.) Later quests require 3, 4, and more players, up to a maximum of 6. These later quests are quite deadly and it may behoove you to team up!

<h1>Town Level</h1> The town's current state of disrepair is represented by a level. You can view the town's level from the signboard. The town earns XP when you complete nightly quests, and levels up when its XP bar is full. But there's a catch! Every night, right as the monsters appear, the town <i>loses</i> XP. This can cause its level to drop!

The town's level determines which villagers and amenities are present. For instance, Povus must be level 3 to activate the forge. Stephie Blackhammer also returns to town when it reaches level 3. These features (and people) disappear again if the town's level drops below their requirement.": "<h1>Ajudando Povus</h1> Todas as noites (por volta das 20h, horário do jogo), a cidade de Povus é devastada por monstros. Ao ajudar a cidade a se defender dessas ameaças, você ganha recompensas pessoais e também ajuda a cidade a se recuperar. Comece acendendo as lâmpadas pela cidade. Isso ajudará a manter os monstros afastados. Quando todas as lâmpadas da cidade estiverem acesas, visite a placa da cidade para receber uma recompensa. Você também pode iniciar outra missão naquele momento, se desejar.

A segunda missão é escolhida aleatoriamente. Conclua-o e retorne à placa de sinalização para receber uma recompensa. Depois disso, as missões ficam um pouco mais difíceis e exigem dois jogadores para começar. (Ambos os jogadores devem interagir com a tabuleta ao mesmo tempo.) As missões posteriores requerem 3, 4 e mais jogadores, até um máximo de 6. Essas missões posteriores são bastante mortais e pode ser necessário que vocês se unam!

<h1>Nível da Cidade</h1> O atual estado de degradação da cidade é representado por um nível. Você pode ver o nível da cidade na placa. A cidade ganha XP quando você completa missões noturnas e sobe de nível quando a barra de XP está cheia. Mas há um problema! Todas as noites, assim que os monstros aparecem, a cidade <i>perde</i> XP. Isso pode fazer com que seu nível caia!

O nível da cidade determina quais moradores e comodidades estão presentes. Por exemplo, Povus deve estar no nível 3 para ativar a forja. Stephie Blackhammer também retorna à cidade quando atinge o nível 3. Esses recursos (e pessoas) desaparecem novamente se o nível da cidade cair abaixo do exigido."
" <h1>Property of James II, Private KEEP OUT!</h1>

<hr>

Hiding in my special spot again. A new sage has arrived and is trying to treat Kat. But father is screaming at her, so I don't think the sage has anything that can help. Poor Kat is cold and pale and hasn't opened her eyes or spoken a word for two months. Mother is practically in mourning, but father says there's still hope.

The underground banging is louder than normal -- I think the dwarves are working near the surface.

<hr>

I spoke with a dwarf today! I heard him working under the hatch and surprised him. There haven't been many dwarves around for a while. 

He said that all these rocks will be used to create a new building. He says they'll be making many additions to Eltibule Keep, and this hatch will eventually be a trap door in the new throne room! I can't wait to banish my enemies by pulling a rope and dropping the floor out from beneath them!

<hr>

Thirteenth birthday. Father said he'd take me to Statehelm to meet the Council, but he is preoccupied with finding money. Kat is still alive thanks to Cualgar's magic, but he says if he stops his spell even for a moment, she will pass. Father has spent most of our fortune to find a cure, and now he is busy asking every friend and ally for more money. There won't be anything left soon, and none of it will matter. I have already said goodbye to Katarina. Beloved sister, may you rest in peace.

<hr>

Fourteenth birthday. Katarina passed a month ago: the moment Cualgar gave up the spell, she turned to stone, just as he predicted! Father is furious, but Cualgar looks broken and exhausted. I don't blame him.

Father believes the elves of Sedgewick Forest have curative magic that can help and he's mounting an expedition. The woods are a tranquil place, so Mother is going with him. That should leave me in charge, but Father says Gretchen is in charge! I don't believe he even remembers it's my birthday...

<hr>

Mother and father are dead. They've been buried next to the keep. I don't understand what happened in Thentree. Why didn't they let me see the bodies? They weren't turned to stone, that much I know.

A few dignitaries came to the funeral, but no lords came in person. No Council representatives came, either. It was just a handful of us in the rain, burying my family.

<hr>

Fifteenth birthday. I have officially taken the title of Lord Eltibule. I am the lord of dust and weeds. Father spent everything. Gretchen and Palmatir remain in my service, and the old guards.

<hr>

Sixteenth birthday. I received a letter from a dwarf named Siggund Deftwhisper. It is labeled \"Happy Fifteenth Birthday\"... they missed it by a year. Apparently my father had the dwarves create some sort of stupid \"adventure\" in the cellars. Is that what they've been doing all this time?! What a waste! I'm not a child anymore. I haven't been into the cellar in years.

I just returned from Statehelm. I've convinced the Council to parcel some of my land out to homesteaders. They're building model homes now, and soon we shall see the arrival of many new humans. I will be duke of <i>something</i>, damn it!

<hr>

The hammering underground stopped a few years ago, and I didn't really even notice. But the banging began again last night, and I can't tolerate it anymore! I slept through that hammering for my entire childhood, but I've heard enough! So I personally went into the cellar and demanded they stop.

The place is massive: a huge nest of tunnels and rooms. I found my mother's painting collection down there, too! They say this was all my father's doing. But that's absurd. And the strange children's game my father had them make is still down there. What a waste of time!

The dwarves say they have an agreement to finish the tunnels and then begin working on the keep itself. I will be old and gray by the time they start on the keep, though, and I have more pressing problems. So I ordered every dwarf to leave at once. They begged a week to finish and pack up. They had better be gone after that!

<hr>

Everyone knows I come here to be alone. I noticed Gretchen has cleaned up down here... Gretchen, if you're reading this, shame on you, woman!

<hr>

Kat's ghost came to me last night! She said that the elves of Thentree have a way to save her! But something was wrong. The way she talked... the way she gestured... it was like the words she spoke didn't match the motions she made. She was trying to tell me something, but I don't understand. 

But I know something is very wrong. So I'm taking our fastest horse to Thentree. Kenneth will accompany me. 

Kat, I'll find you!": "<h1>Propriedade de James II, particular, MANTENHA-SE FORA!</h1>

<h>

Escondido no meu lugar especial novamente. Um novo sábio chegou e está tentando tratar Kat. Mas o pai está gritando com ela, então não acho que o sábio tenha algo que possa ajudar. A pobre Kat está com frio e pálida e não abre os olhos nem fala uma palavra há dois meses. A mãe está praticamente de luto, mas o pai diz que ainda há esperança.

O barulho subterrâneo é mais alto que o normal – acho que os anões estão trabalhando perto da superfície.

<h>

Falei com um anão hoje! Eu o ouvi trabalhando embaixo da escotilha e o surpreendi. Faz um tempo que não há muitos anões por aí. 

Ele disse que todas essas pedras serão usadas para criar um novo edifício. Ele diz que eles farão muitas adições ao Forte Eltibule, e esta escotilha acabará sendo um alçapão na nova sala do trono! Mal posso esperar para banir meus inimigos puxando uma corda e derrubando o chão debaixo deles!

<h>

Décimo terceiro aniversário. Meu pai disse que me levaria a Statehelm para conhecer o Conselho, mas está preocupado em conseguir dinheiro. Kat ainda está viva graças à magia de Cualgar, mas ele diz que se parar o feitiço, mesmo que por um momento, ela passará. Papai gastou a maior parte de nossa fortuna para encontrar uma cura e agora está ocupado pedindo mais dinheiro a todos os amigos e aliados. Não sobrará nada em breve e nada disso terá importância. Já me despedi da Katarina. Amada irmã, que você descanse em paz.

<h>

Décimo quarto aniversário. Katarina faleceu há um mês: no momento em que Cualgar desistiu do feitiço, ela virou pedra, tal como ele previra! O pai está furioso, mas Cualgar parece arrasado e exausto. Eu não o culpo.

Meu pai acredita que os elfos da Floresta Sedgewick possuem magia curativa que pode ajudar e ele está montando uma expedição. A floresta é um lugar tranquilo, então mamãe vai com ele. Isso deveria me deixar no comando, mas papai diz que Gretchen está no comando! Acho que ele nem se lembra que é meu aniversário...

<h>

Mãe e pai estão mortos. Eles foram enterrados perto da fortaleza. Não entendo o que aconteceu em Thentree. Por que não me deixaram ver os corpos? Eles não foram transformados em pedra, disso eu sei.

Alguns dignitários compareceram ao funeral, mas nenhum senhor compareceu pessoalmente. Também não compareceu nenhum representante do Conselho. Éramos apenas alguns de nós na chuva, enterrando minha família.

<h>

Décimo quinto aniversário. Tomei oficialmente o título de Lord Eltibule. Eu sou o senhor do pó e das ervas daninhas. Papai gastou tudo. Gretchen e Palmatir permanecem a meu serviço, assim como a velha guarda.

<h>

Décimo sexto aniversário. Recebi uma carta de um anão chamado Siggund Deftwhisper. Está escrito \"Feliz Décimo Quinto Aniversário\"... eles perderam por um ano. Aparentemente, meu pai fez os anões criarem algum tipo de “aventura” estúpida nos porões. É isso que eles têm feito esse tempo todo?! Que desperdício! Eu não sou mais uma criança. Faz anos que não entro no porão.

Acabei de voltar de Statehelm. Convenci o Conselho a distribuir algumas das minhas terras aos proprietários rurais. Eles estão construindo casas modelo agora, e em breve veremos a chegada de muitos novos humanos. Serei duque de <i>alguma coisa</i>, droga!

<h>

As marteladas subterrâneas pararam há alguns anos e eu nem percebi. Mas as batidas recomeçaram ontem à noite e não aguento mais! Dormi durante toda a minha infância, mas já ouvi o suficiente! Então eu fui pessoalmente ao porão e exigi que parassem.

O lugar é enorme: um enorme ninho de túneis e salas. Encontrei a coleção de pinturas da minha mãe lá também! Dizem que tudo isso foi obra do meu pai. Mas isso é um absurdo. E o estranho jogo infantil que meu pai mandou fazer ainda está lá embaixo. Que perda de tempo!

Os anões dizem que têm um acordo para terminar os túneis e então começar a trabalhar na fortaleza. Mas estarei velho e grisalho quando eles começarem a trabalhar no castelo e tenho problemas mais urgentes. Então ordenei que todos os anões saíssem imediatamente. Eles imploraram por uma semana para terminar e fazer as malas. É melhor que eles tenham ido embora depois disso!

<h>

Todo mundo sabe que vim aqui para ficar sozinho. Notei que a Gretchen fez uma limpeza aqui... Gretchen, se você está lendo isso, que vergonha, mulher!

<h>

O fantasma de Kat veio até mim ontem à noite! Ela disse que os elfos de Thentree têm uma maneira de salvá-la! Mas algo estava errado. O jeito que ela falava... o jeito que ela gesticulava... era como se as palavras que ela falava não combinassem com os movimentos que ela fazia. Ela estava tentando me dizer algo, mas eu não entendo. 

Mas sei que algo está muito errado. Então vou levar nosso cavalo mais rápido para Thentree. Kenneth irá me acompanhar. 

Kat, eu vou te encontrar!"
" <h2>Welcome to Monsters and Mantids!</h2> Monsters and Mantids is based on a dwarven game with similar themes. However, we have drastically simplified the rules to make the game more approachable. If the game still seems intimidating, you are in error: the game is NOT intimidating. You will understand this after playing a few rounds. Like all good casino games, you can learn it just by playing! We have organized the rules so that the most important information comes first. You can stop reading whenever you are ready to begin gambling!

 <h2>Understanding Dice Notation</h2> Monsters and Mantids uses a large number of six-sided dice. They are referred to in a shorthand form by the letter \"D\", which stands for \"dice\". For instance, if you eat a corpse after a battle, the game might say that you will recover 5D health. This means that five dice will be rolled, and you will recover the sum total of the amount shown.

Often there is also a fixed amount added to the dice rolls. For example, some abilities deal 2D+3 damage. This means that two dice will be rolled, and the total damage is the amount shown on those dice plus 3. The amount can also be negative, such as 2D-3. This works the same way: you would roll two dice, then subtract 3 from the total. (Dice totals can never be negative, however, so if the number would go below 0, it becomes 0 instead.)

 <h2>How The Game Works</h2> You take on the role of a heroic mantis. You will fight enemies, encounter strange beings, avoid traps, and hopefully escape with a mighty pile of treasure! 

Your mantis is trained in three randomly-chosen combat abilities. During combat, you pick which of these three abilities to use. The enemy will also attack you at the same time. Your attack and the enemy's attack happen simultaneously. This means that even if you kill the enemy, their attack still hurts you, and you may both kill each other! (Certain combat abilities change this rule.)

After each successful battle you can choose to delve deeper or to retreat and \"cash out\". If you choose not to retreat, you can instead meditate to improve one of your combat abilities, or rest and eat the corpse of your fallen enemy to regain your health. (When you reach level 3 you will have additional meditation options available.)

If you choose to \"cash out\", the game ends and you receive Councils equal to the amount of gold your mantis character accumulated. You will also receive one Red Wing Token for each cultural artifact you found. (More about culture items later.)

If your mantis hero dies (either in battle or due to an unfortunate random encounter), the game ends and you receive nothing. So knowing when to cash out is a crucial skill in Monsters and Mantids -- a skill that will take practice to master! But even if your mantis dies, your score is still eligible for the leaderboards, so you you can still earn bragging rights.

Monsters and Mantids games typically only last a minute or two. Many mantis heroes will perish, but there are always more! Do not mourn them. Avenge them instead!

 <h2>Loot: Culture, Hats, and More</h2> When you defeat an enemy or survive an encounter you may receive special items. These includes gold, cultural artifacts, consumable items such as potions and bombs, and hats. 

Gold has no in-game effect, except that you can sometimes purchase items with it from creatures you meet. When you cash out and end the game, you receive Councils equal to the gold you have.

Hats are equipment that provide special benefits. You begin play with a Basic Hat that has no special effect. Whenever you find a new hat you will be asked whether you want to keep your old hat or wear the new one. You can only keep one hat at a time. There are many kinds of hats, each with different game effects.

You can also find cultural artifacts. These include jewelry, trinkets, rugs, furniture, and anything else that has cultural value. Individual cultural artifacts are unimportant, but when you accumulate multiple artifacts, there are several benefits:

<indent=15>- When you cash out, you receive 1 Red Wing Token for each cultural artifact your mantis had<br> - When you cash out, there is a chance you will activate a Table Buff (see below). The chance is 5% multiplied by the number of cultural artifacts your mantis had<br> - When your mantis makes Diplomacy checks (see below), you receive a +1 diplomacy bonus for every cultural artifact your mantis has</indent>

You can also find consumable items such as healing potions. You use these during combat. (They will be listed as additional options alongside your three combat abilities.)

 <h2>Diplomacy Checks</h2> When you encounter strange creatures, you may need to trick them, calm them, or otherwise manipulate them emotionally. This is done with a \"Diplomacy Check\". Three dice are rolled, and if the total is over a certain number, something good happens. If the number is too low, something bad happens. If the number is 6+ higher than the target number, this is called a \"critical success\" and something extra-good happens. If two or more of the dice roll a 1, however, something terrible happens: a \"critical failure\". Critical Failures happen whenever two 1s are shown, regardless of the total of the dice.

For every cultural artifact you've found, +1 is added to the dice total. There are also hats, buffs, and other strange effects that can improve your Diplomacy Checks. But remember that no matter how big of a bonus you have, it's always possible to roll two 1s and get a Critical Failure. Diplomacy always comes with risk! Sometimes the right decision is to not engage at all.

 <h2>Saving Throws</h2> When you run into traps, tricks, or treachery, you may need to make a Saving Throw. This works exactly the same as a Diplomacy Check, except that you do not get a bonus for having cultural artifacts. There are hats, buffs, and weird events that can permanently improve your Saving Throw rolls. But just as with Diplomacy Checks, rolling two 1s on the dice means a Critical Failure, which is often fatal.

 <h2>Perks</h2> When you reach level 2, 3, and 5, your character can pick a Perk from a random list. Perks are unique bonuses and abilities. 

The Perks you can choose are randomly-selected from among all Perks your character is eligible for. Many Perks require a previous Perk. For instance, the \"Robust and Lucky\" perk will only show up if you already chose the \"Lucky\" perk earlier. Some perks also require you to have a certain amount of Max Health, a certain combat ability, etc.

Note that all Perks completely stack together. So if you choose the \"Lucky\" Perk, which grants +1 to all Saving Throws, and later choose the \"Robust and Lucky\" perk, which grants +1 to Saving Throws and Diplomacy Checks\", the two perks combine to grant +2 to Saving Throws and +1 to Diplomacy Checks.

 <h2>Table Buffs</h2> If you have any cultural artifacts when you cash out and end the game, there's a chance you will activate a Table Buff. There's a 5% chance for each cultural item you have. (e.g. cashing out with 3 cultural artifacts would give you a 15% chance for a Table Buff.)

Table Buffs are special bonuses that are given to every player who starts a game at that casino table. There are many different Table Buffs, such as Lucky Looter (which causes you to find 25% more gold on corpses) or Stylish Adventurer (which causes you to start with a Stylish Hat). 

Table Buffs last for an hour once activated. It's possible you'll randomly re-activate a Table Buff that's already active -- if that happens, its duration is reset to an hour.

Everyone that starts a new game at the table during the next hour will receive all active Table Buffs. Due to space limitations, only ten players can fit around a table. Keep your place at the table by continuing to play! If you leave the table, another player may take your spot.": "<h2>Bem-vindo ao Monsters and Mantids!</h2> Monsters and Mantids é baseado em um jogo de anões com temas semelhantes. No entanto, simplificamos drasticamente as regras para tornar o jogo mais acessível. Se o jogo ainda parece intimidante, você está enganado: o jogo NÃO é intimidante. Você entenderá isso depois de jogar algumas rodadas. Como todos os bons jogos de cassino, você pode aprender apenas jogando! Organizamos as regras para que as informações mais importantes venham primeiro. Você pode parar de ler quando estiver pronto para começar a jogar!

 <h2>Compreendendo a notação de dados</h2> Monsters and Mantids usa um grande número de dados de seis lados. Eles são referidos de forma abreviada pela letra \"D\", que significa \"dados\". Por exemplo, se você comer um cadáver após uma batalha, o jogo pode dizer que você recuperará a saúde 5D. Isso significa que cinco dados serão lançados e você recuperará a soma total do valor mostrado.

Freqüentemente, há também uma quantia fixa adicionada às jogadas de dados. Por exemplo, algumas habilidades causam 2D+3 de dano. Isso significa que dois dados serão lançados e o dano total será o valor mostrado nesses dados mais 3. O valor também pode ser negativo, como 2D-3. Isso funciona da mesma maneira: você lançaria dois dados e subtrairia 3 do total. (No entanto, os totais dos dados nunca podem ser negativos; portanto, se o número for inferior a 0, ele se tornará 0.)

 <h2>Como funciona o jogo</h2> Você assume o papel de um louva-a-deus heróico. Você lutará contra inimigos, encontrará seres estranhos, evitará armadilhas e, com sorte, escapará com uma poderosa pilha de tesouros! 

Seu louva-a-deus é treinado em três habilidades de combate escolhidas aleatoriamente. Durante o combate, você escolhe qual dessas três habilidades usar. O inimigo também irá atacar você ao mesmo tempo. Seu ataque e o ataque do inimigo acontecem simultaneamente. Isso significa que mesmo se você matar o inimigo, o ataque dele ainda o machucará e vocês dois poderão matar um ao outro! (Certas habilidades de combate alteram esta regra.)

Após cada batalha bem-sucedida, você pode optar por se aprofundar ou recuar e \"sacar\". Se você optar por não recuar, poderá meditar para melhorar uma de suas habilidades de combate ou descansar e comer o cadáver de seu inimigo caído para recuperar sua saúde. (Ao atingir o nível 3, você terá opções adicionais de meditação disponíveis.)

Se você optar por “sacar”, o jogo termina e você recebe Conselhos iguais à quantidade de ouro que seu personagem louva-a-deus acumulou. Você também receberá um Red Wing Token para cada artefato cultural que encontrar. (Mais sobre itens culturais posteriormente.)

Se o seu herói louva-a-deus morrer (seja em batalha ou devido a um infeliz encontro aleatório), o jogo termina e você não recebe nada. Portanto, saber quando sacar é uma habilidade crucial em Monsters and Mantids – uma habilidade que exigirá prática para ser dominada! Mas mesmo que seu louva-a-deus morra, sua pontuação ainda será elegível para as tabelas de classificação, então você ainda pode ganhar o direito de se gabar.

Os jogos de Monstros e Mantids normalmente duram apenas um ou dois minutos. Muitos heróis louva-a-deus morrerão, mas sempre há mais! Não chore por eles. Em vez disso, vingue-os!

 <h2>Saque: cultura, chapéus e muito mais</h2> Ao derrotar um inimigo ou sobreviver a um encontro, você poderá receber itens especiais. Isso inclui ouro, artefatos culturais, itens consumíveis como poções e bombas e chapéus. 

O ouro não tem efeito no jogo, exceto que às vezes você pode comprar itens com ele de criaturas que encontrar. Ao sacar e terminar o jogo, você recebe Conselhos iguais ao ouro que possui.

Chapéus são equipamentos que proporcionam benefícios especiais. Você começa o jogo com um Chapéu Básico que não tem efeito especial. Sempre que você encontrar um chapéu novo, você será questionado se deseja manter o chapéu antigo ou usar o novo. Você só pode manter um chapéu de cada vez. Existem muitos tipos de chapéus, cada um com diferentes efeitos de jogo.

Você também pode encontrar artefatos culturais. Isso inclui joias, bugigangas, tapetes, móveis e qualquer outra coisa que tenha valor cultural. Os artefatos culturais individuais não são importantes, mas quando você acumula vários artefatos, há vários benefícios:

<indent=15>- Ao sacar, você recebe 1 Red Wing Token para cada artefato cultural que seu louva-a-deus possuía<br> - Ao sacar, há uma chance de você ativar um Buff de Mesa (veja abaixo). A chance é de 5% multiplicada pelo número de artefatos culturais que seu louva-a-deus tinha<br> - Quando seu louva-a-deus faz testes de Diplomacia (veja abaixo), você recebe +1 de bônus de diplomacia para cada artefato cultural que seu louva-a-deus possui</indent>

Você também pode encontrar itens consumíveis, como poções de cura. Você os usa durante o combate. (Elas serão listadas como opções adicionais junto com suas três habilidades de combate.)

 <h2>Verificações de Diplomacia</h2> Ao encontrar criaturas estranhas, você pode precisar enganá-las, acalmá-las ou manipulá-las emocionalmente. Isto é feito com uma “Verificação de Diplomacia”. Três dados são lançados e, se o total ultrapassar um determinado número, algo de bom acontece. Se o número for muito baixo, algo ruim acontece. Se o número for 6+ maior que o número alvo, isso é chamado de \"sucesso crítico\" e algo extra-bom acontece. Se dois ou mais dados obtiverem 1, entretanto, algo terrível acontece: uma “falha crítica”. Falhas Críticas acontecem sempre que dois 1s são mostrados, independente do total dos dados.

Para cada artefato cultural que você encontrar, +1 é adicionado ao total dos dados. Existem também chapéus, buffs e outros efeitos estranhos que podem melhorar seus testes de diplomacia. Mas lembre-se de que não importa o tamanho do bônus que você tenha, é sempre possível lançar dois 1s e obter uma Falha Crítica. A diplomacia sempre traz riscos! Às vezes, a decisão certa é não se envolver de todo.

 <h2>Testes de Resistência</h2> Quando você se depara com armadilhas, truques ou traição, pode ser necessário fazer um Teste de Resistência. Isso funciona exatamente da mesma forma que um Teste de Diplomacia, exceto que você não recebe bônus por possuir artefatos culturais. Existem chapéus, buffs e eventos estranhos que podem melhorar permanentemente suas jogadas de salvamento. Mas, assim como acontece com as verificações de diplomacia, lançar dois 1s nos dados significa uma falha crítica, que muitas vezes é fatal.

 <h2>Vantagens</h2> Quando você atinge os níveis 2, 3 e 5, seu personagem pode escolher uma vantagem de uma lista aleatória. As vantagens são bônus e habilidades únicas. 

As vantagens que você pode escolher são selecionadas aleatoriamente entre todas as vantagens para as quais seu personagem é elegível. Muitas vantagens exigem uma vantagem anterior. Por exemplo, o benefício “Robusto e Sortudo” só aparecerá se você já escolheu o benefício “Sorte” anteriormente. Algumas vantagens também exigem que você tenha uma certa quantidade de Saúde Máxima, uma certa habilidade de combate, etc.

Observe que todas as vantagens se acumulam completamente. Portanto, se você escolher o benefício \"Sorte\", que concede +1 a todos os testes de resistência, e mais tarde escolher o benefício \"Robusto e Sortudo\", que concede +1 aos testes de resistência e aos testes de diplomacia\", os dois benefícios se combinam para conceder +2 aos testes de resistência e +1 aos testes de diplomacia.

 <h2>Bônus de Mesa</h2> Se você tiver algum artefato cultural ao sacar e terminar o jogo, há uma chance de você ativar um Bônus de Mesa. Há 5% de chance para cada item cultural que você possui. (por exemplo, sacar 3 artefatos culturais daria a você 15% de chance de ganhar um Buff de Mesa.)

Table Buffs são bônus especiais dados a cada jogador que inicia um jogo naquela mesa de cassino. Existem muitos Buffs de Mesa diferentes, como Lucky Looter (que faz com que você encontre 25% mais ouro em cadáveres) ou Stylish Adventurer (que faz com que você comece com um Stylish Hat). 

Os Buffs de Mesa duram uma hora depois de ativados. É possível que você reative aleatoriamente um Buff de Mesa que já está ativo – se isso acontecer, sua duração será redefinida para uma hora.

Todos que iniciarem um novo jogo na mesa durante a próxima hora receberão todos os Buffs de Mesa ativos. Devido a limitações de espaço, apenas dez jogadores podem caber em uma mesa. Mantenha o seu lugar na mesa continuando a jogar! Se você sair da mesa, outro jogador poderá ocupar o seu lugar."
" <i>[A pile of documents was buried with Lord Eltibule. Some of the letters have dates, so you are able to piece together their proper order. They are a conversation between Lord Eltibule and Siggund Deftwhisper.]</i>

Mister Deftwhisper,

I know that dwarven work takes time. But I am a human and you have exhausted my patience. It has been ten years since our arrangement began and yet still there are giant rocks and debris all around my home! I recently reviewed your mens' work and while it is very high quality, it is <i>much</i> too large for a cellar! Even taking into account the other uses you mentioned. There is room for a thousand prisoners, or evacuees, or storage of countless goods. I do not need more space than this. 

Please complete your work within the month. As I have explained before, my daughter is very ill and I have invited sages from across the land to visit and treat her. Many of these learned sages are offput by the ceaseless hammering coming from below. I must admit that I barely notice those sounds after so many years of torture, but it is not an environment conducive to healing my precious Katarina.

Lord Eltibule

<hr>

Lord Eltibule, 

Two years ago, I sent a messenger with news of the excavation. Did you not carefully read my letter? I shall recap: we have successfully recovered the ancient dwarven fortress beneath your home and removed many of the precious artifacts of dwarven nature. We also learned that this fortress once served as a bastion against goblin invasions -- it sits atop a major gob-lands tunnel system. It is this discovery that has kept my workers toiling beneath your keep!

We were not so foolish as to excavate the gob-lands tunnels, of course, but even so, our work has consequence: with the fortress tunnels cleared, goblin miners will inevitably arrive. It will happen quite quickly -- definitely within your lifetime! So for your safety, we must demolish these tunnels. However, there remain some immobile dwarven artifacts there, and our laws do not permit us to destroy them.

Please allow my men to work another ten years. We shall fully remove the artifacts and collapse the tunnels, and then begin work upon your magnificent new Keep. As before, there will be no cost to you.

Sincerely,

Siggund Deftwhsiper

<hr>

Mister Deftwhisper,

I am disturbed by your previous letter. Ten more years is far too long! Can you not collapse some of the upper tunnels to secure my keep, then continue working from below?

Lord Eltibule

<hr>

Lord Eltibule, 

No doubt a human-made tunnel system could be quickly collapsed, but these are dwarven tunnels. Collapsing them does not destroy them -- they can be easily mined out again! We will need to use powerful acid to weaken the rocks themselves. Goblins will otherwise surely dig their way into your home.

I feel somewhat responsible for this situation and wish to make amends. Perhaps we can renovate your cellar areas in some way to make them more useful to you? Ten years is long for a human, but think of your children, or your childrens' children: what use might they have for sturdy tunnels beneath their home? My engineers stand ready.

Sincerely,

Siggund Deftwhsiper

<hr>

Mister Deftwhisper,

It has taken me some time to gather my composure. You feel <i>somewhat responsible</i>? You told me that the excavation was purely historical in nature! My children have grown up knowing nothing but the din of construction. Poor Katarina has been moved to the farthest tower -- the only place where the hammering cannot be heard. Serisa is also not pleased. But we have accepted your reasoning.

In addition to the wine cellar and storage area, you will provide the following features: a storage and display area for my Lady's large collection of artwork, a dozen small rooms that can be made into prison cells should the need arise, and lastly, you shall create a special adventure for my son's thirteenth birthday. His birthday is in nine months, so please make haste. 

My son is enamored of the \"dungeon\", as he calls it, and longs to explore it, imagining it to be full of wonder and excitement. Exploration is a worthwhile hobby for a young duke-to-be, and he is deft with a sword -- but he is not yet a grown man. Please create an adventure that is safe, yet fun.

You also promised to create a new annex to the Keep when the other work is done. I expect my Keep to take precedence over such things as pouring acid on rocks! I wish for Eltibule Keep to be the center of a township -- perhaps not in my lifetime, but in my son's.

Lord Eltibule

<hr>

Lord Eltibule, 

It shall be done. However, I am informed by my engineers that your son's special adventure will not be ready by his thirteenth birthday. But I will make up for that: I have commissioned a suit of magical armor for the boy to find, plus a sword of impeccable sharpness. They will be hidden behind rudimentary puzzles and hazards. Unless there are further delays, the adventure should be ready in time for his fifteenth birthday.

I regret that the aboveground work cannot be performed by my workers until all the underground work is complete -- this is due to complex dwarven laws regarding historical sites. But it <i>shall</i> be completed in the fullness of time. Perhaps not in your lifetime, but in your son's.

Sincerely,

Siggund Deftwhsiper": "<i>[Uma pilha de documentos foi enterrada com Lord Eltibule. Algumas das cartas têm datas, então você pode juntar as peças na ordem correta. Eles são uma conversa entre Lord Eltibule e Siggund Deftwhisper.]</i>

Senhor Deftwhisper,

Eu sei que o trabalho dos anões leva tempo. Mas eu sou humano e você esgotou minha paciência. Já se passaram dez anos desde que nosso arranjo começou e ainda há pedras gigantes e detritos por toda a minha casa! Recentemente revisei o trabalho dos seus homens e, embora seja de altíssima qualidade, é <i>muito</i> grande demais para uma adega! Mesmo levando em consideração os outros usos que você mencionou. Há espaço para mil prisioneiros, ou evacuados, ou armazenamento de inúmeros bens. Não preciso de mais espaço do que isso. 

Conclua seu trabalho dentro de um mês. Como expliquei antes, minha filha está muito doente e convidei sábios de todo o país para visitá-la e tratá-la. Muitos desses sábios eruditos ficam desconcertados com as marteladas incessantes que vêm de baixo. Devo admitir que mal percebo esses sons depois de tantos anos de tortura, mas não é um ambiente propício para a cura da minha preciosa Katarina.

Senhor Eltibule

<h>

Senhor Eltibule, 

Há dois anos, enviei um mensageiro com notícias da escavação. Você não leu atentamente minha carta? Vou recapitular: recuperamos com sucesso a antiga fortaleza anã sob sua casa e removemos muitos dos preciosos artefatos da natureza anã. Também aprendemos que esta fortaleza já serviu como bastião contra invasões goblins – ela fica no topo de um importante sistema de túneis nas terras dos goblins. Foi essa descoberta que manteve meus trabalhadores trabalhando sob sua fortaleza!

Não fomos tão tolos a ponto de escavar os túneis das terras dos goblins, é claro, mas mesmo assim, nosso trabalho tem consequências: com os túneis da fortaleza limpos, os mineiros goblins inevitavelmente chegarão. Isso acontecerá muito rapidamente – definitivamente durante a sua vida! Então, para sua segurança, devemos demolir estes túneis. Entretanto, ainda existem alguns artefatos anões imóveis lá, e nossas leis não nos permitem destruí-los.

Por favor, permita que meus homens trabalhem por mais dez anos. Removeremos completamente os artefatos e desmoronaremos os túneis, e então começaremos a trabalhar em sua magnífica nova Fortaleza. Como antes, não haverá nenhum custo para você.

Atenciosamente,

Siggund Deftwhsiper

<h>

Senhor Deftwhisper,

Estou perturbado com sua carta anterior. Mais dez anos é muito tempo! Você não pode derrubar alguns dos túneis superiores para proteger minha fortaleza e depois continuar trabalhando por baixo?

Senhor Eltibule

<h>

Senhor Eltibule, 

Sem dúvida, um sistema de túneis feitos pelo homem poderia entrar em colapso rapidamente, mas estes são túneis anões. Colapsá-los não os destrói – eles podem ser facilmente extraídos novamente! Precisaremos usar um ácido poderoso para enfraquecer as próprias rochas. Caso contrário, os goblins certamente entrarão em sua casa.

Sinto-me um tanto responsável por esta situação e desejo fazer as pazes. Talvez possamos renovar as áreas da sua adega de alguma forma para torná-las mais úteis para você? Dez anos é muito tempo para um ser humano, mas pense nos seus filhos, ou nos filhos dos seus filhos: que utilidade eles poderiam ter para os túneis resistentes sob sua casa? Meus engenheiros estão prontos.

Atenciosamente,

Siggund Deftwhsiper

<h>

Senhor Deftwhisper,

Levei algum tempo para recuperar a compostura. Você se sente <i>um pouco responsável</i>? Você me disse que a escavação era de natureza puramente histórica! Meus filhos cresceram sem conhecer nada além do barulho da construção. A pobre Katarina foi transferida para a torre mais distante – o único lugar onde as marteladas não podem ser ouvidas. Serisa também não está satisfeita. Mas aceitamos seu raciocínio.

Além da adega e área de armazenamento, você fornecerá os seguintes recursos: uma área de armazenamento e exposição para a grande coleção de obras de arte de minha senhora, uma dúzia de pequenas salas que podem ser transformadas em celas de prisão caso seja necessário e, por último, você criará uma aventura especial para o décimo terceiro aniversário do meu filho. O aniversário dele é daqui a nove meses, então, por favor, se apresse. 

Meu filho está apaixonado pela “masmorra”, como ele a chama, e deseja explorá-la, imaginando-a cheia de admiração e emoção. A exploração é um hobby que vale a pena para um jovem futuro duque, e ele é hábil com a espada - mas ainda não é um homem adulto. Por favor, crie uma aventura que seja segura, mas divertida.

Você também prometeu criar um novo anexo à Fortaleza quando o outro trabalho estiver concluído. Espero que minha Fortaleza tenha precedência sobre coisas como derramar ácido nas pedras! Desejo que Eltibule Keep seja o centro de um município – talvez não durante a minha vida, mas durante a do meu filho.

Senhor Eltibule

<h>

Senhor Eltibule, 

Isso será feito. No entanto, fui informado pelos meus engenheiros que a aventura especial do seu filho não estará pronta até o seu décimo terceiro aniversário. Mas vou compensar isso: encomendei uma armadura mágica para o garoto encontrar, além de uma espada de afiação impecável. Eles estarão escondidos atrás de quebra-cabeças e perigos rudimentares. A menos que haja mais atrasos, a aventura deverá estar pronta a tempo para o seu décimo quinto aniversário.

Lamento que o trabalho acima do solo não possa ser realizado pelos meus trabalhadores até que todo o trabalho subterrâneo esteja concluído – isso se deve às complexas leis dos anões relativas aos locais históricos. Mas <i>deverá</i> ser concluído na plenitude do tempo. Talvez não na sua vida, mas na de seu filho.

Atenciosamente,

Siggund Deftwhsiper"
" Dalvos, your horrible army is a delight to inflict upon my enemies. I especially appreciate that their shrieks of despair continue even as they eat gluttonously, even as they replicate, even when they sleep. Your work is splendid and I shall remain your patron.

Your world will be left free for two more of its cycles. In exchange, you will create an army even more wondrous than this. And should you succeed... I may have use of you in my Court.

- The Queen": "Dalvos, é uma delícia infligir seu horrível exército aos meus inimigos. Agradeço especialmente que seus gritos de desespero continuem mesmo enquanto comem com gula, mesmo enquanto replicam, mesmo quando dormem. Seu trabalho é esplêndido e continuarei sendo seu patrono.

Seu mundo ficará livre por mais dois ciclos. Em troca, você criará um exército ainda mais maravilhoso que este. E se você tiver sucesso... talvez eu possa usá-lo em minha Corte.

- A Rainha"
" Hello, fellow druid. It was my decision to keep this place intact. You likely think you deserve an explanation for that. You are wrong: I answer to Dreva directly. But though you are owed nothing, I will be generous for the sake of future druid generations.

I doubt I need to explain Dreva's anger at the loss of Ilmari. I was in neighboring Anselon and felt the earth tremble, saw the night sky light up with storms of impossible size. When I felt Dreva's summons, I knew it would be the final time I was called to fight the rakshasa, one way or another. The time for patience and diplomacy was over. Rahu had to fall.

We numbered only a few hundred druids, but Dreva gave us terrible new powers, and we took the city in short order. We then spent weeks hunting down surviving packs of warriors and slaying them.

We have destroyed every demonic artifact on the surface. That includes the \"weather machine\" responsible for ravaging Ilmari. A few demonic airships escaped to their home world, but we have destroyed their portals forever, thanks to our newfound abilities. No reinforcements will be coming.

That left us with a few thousand surviving rakshasa, all of them injured or very young. We druids had tired of killing by then; our rage had turned to sadness. We asked Dreva to let us be merciful. Dreva agreed so long as we \"gifted\" them with a strange liquid that took away their evil nature and made them \"compatible with the natural world\".

The surviving rakshasa have been given this gift. They have lost their shapeshifting powers, taking on a form more compatible with the creatures of our world. The concept of a 'conscience' has been sewn into their minds. They barely understand what is happening to them... but they know enough to hate druids.

Their offspring will be a new race. They will feel new emotions that their parents cannot help them understand. They will be fragile and vulnerable. And that is why I have left this place intact: the water crystals here are responsible for filling the surface lakes with clean drinking water. This may seem unimportant now while the weather machine's storms still batter the city. But when the storms end, I believe there will be no life left in Ilmari. Without clean water, this fledgling race would surely die. I will not permit that.

That is your explanation. Now on to other matters.

--

I asked Dreva to post an observer in Rahu, much as we keep observers in other major cities, to ward off problems before they become severe. Dreva angrily refused to spend any more resources here... and I must honor that decision. But during the Battle of Rahu, I met Archdruids from other lands, including followers of Ri-Shin, the god of plants. They have agreed to post observers here for a few hundred years. They are allies! Do not fight your fellow druids. There has been enough fighting! Trust that they, like you, want what is best for the world. 

We have agreed upon a code-phrase for like-minded druids to greet each other: \"When the sun sets, the forest beckons green.\" I believe in you and trust you, druid, and I give you the code-phrase as proof.

I believe Rahu was intended to be a mining colony. The invading rakshasa chose to colonize Ilmari for the same reason the crones came centuries ago: there are large untapped veins of magical metals here. Perhaps the future inhabitants of Rahu should be allowed to mine this metal for themselves. But for now, these wretched survivors must not be given access to the metal, for they seem to understand its powers far better than we do. They are desperate for weapons and care not for consequences. So we have destroyed every piece of mining equipment and collapsed their mines. The survivors won't soon reopen them. 

But the underground creatures of the \"gob-lands\" covet the metal as well, and without the crones to keep them in check, goblin miners will eventually find this place. When that happens, I fear for the safety of the water crystals. So I've asked the druids of Ri-Shin to help me plant many small treants in the most defensible areas. With luck, they will ensure that Rahu has a few hundred years of clean water.

--

Emotions are part of nature, so Dreva is just as susceptible to anger as any druid. I take no pleasure in disagreeing with Dreva, but I have NOT disobeyed! I have performed my solemn duty to protect life now and in the future.

I do not pretend to be blameless. I fought many rakshasa during the battles with Rahu, and I believe they would have preferred death over what we did to them. But we did not ask. We forced this new life upon them.

If you are a young rakshasa who has become a druid of Dreva, this news may be a shock to you. If you feel anger, or any other emotion, rejoice, for that is natural! Emotions are not a sign of weakness! If you wish to speak further, find me in Verta. I am retiring to my ancestral trees in Dwyndarre. I will answer any questions that I can.

But heed my warning: if you intend to destroy me, you will need to bring a better army than last time. Dreva has gifted me with powers you cannot comprehend.

- High Archdruid Celatus": "Olá, companheiro druida. Foi minha decisão manter este lugar intacto. Você provavelmente acha que merece uma explicação para isso. Você está errado: eu respondo diretamente a Dreva. Mas embora você não deva nada, serei generoso pelo bem das futuras gerações druidas.

Duvido que precise explicar a raiva de Dreva pela perda de Ilmari. Eu estava na vizinha Anselon e senti a terra tremer, vi o céu noturno se iluminar com tempestades de tamanhos impossíveis. Quando senti o chamado de Dreva, soube que seria a última vez que seria chamado para lutar contra o rakshasa, de uma forma ou de outra. O tempo da paciência e da diplomacia acabou. Rahu teve que cair.

Éramos apenas algumas centenas de druidas, mas Dreva nos deu novos poderes terríveis e tomamos a cidade em pouco tempo. Passamos então semanas caçando grupos de guerreiros sobreviventes e matando-os.

Destruímos todos os artefatos demoníacos da superfície. Isso inclui a “máquina meteorológica” responsável por devastar Ilmari. Algumas aeronaves demoníacas escaparam para seu mundo natal, mas destruímos seus portais para sempre, graças às nossas novas habilidades. Nenhum reforço virá.

Isso nos deixou com alguns milhares de rakshasas sobreviventes, todos feridos ou muito jovens. Nós, druidas, já estávamos cansados ​​de matar; nossa raiva se transformou em tristeza. Pedimos a Dreva que nos deixasse ser misericordiosos. Dreva concordou, desde que os “presenteássemos” com um líquido estranho que tirasse sua natureza maligna e os tornasse “compatíveis com o mundo natural”.

Os rakshasa sobreviventes receberam este presente. Eles perderam seus poderes de mudança de forma, assumindo uma forma mais compatível com as criaturas do nosso mundo. O conceito de “consciência” foi costurado em suas mentes. Eles mal entendem o que está acontecendo com eles... mas sabem o suficiente para odiar os druidas.

Seus descendentes serão uma nova raça. Eles sentirão novas emoções que seus pais não poderão ajudá-los a compreender. Eles serão frágeis e vulneráveis. E é por isso que deixei este lugar intacto: os cristais de água aqui são responsáveis ​​por encher os lagos superficiais com água potável. Isto pode parecer sem importância agora, enquanto as tempestades da máquina meteorológica ainda castigam a cidade. Mas quando as tempestades acabarem, acredito que não haverá mais vida em Ilmari. Sem água potável, esta raça incipiente certamente morreria. Eu não permitirei isso.

Essa é a sua explicação. Agora vamos para outros assuntos.

--

Pedi a Dreva que colocasse um observador em Rahu, tal como mantemos observadores noutras grandes cidades, para evitar problemas antes que se tornem graves. Dreva recusou-se furiosamente a gastar mais recursos aqui... e devo honrar essa decisão. Mas durante a Batalha de Rahu, conheci arquidruidas de outras terras, incluindo seguidores de Ri-Shin, o deus das plantas. Eles concordaram em colocar observadores aqui por algumas centenas de anos. Eles são aliados! Não lute contra seus colegas druidas. Já houve luta suficiente! Confie que eles, como você, desejam o que é melhor para o mundo. 

Nós concordamos em uma frase-código para druidas com ideias semelhantes se cumprimentarem: \"Quando o sol se põe, a floresta acena verde.\" Eu acredito em você e confio em você, druida, e lhe dou a frase-código como prova.

Acredito que Rahu deveria ser uma colônia de mineração. Os rakshasa invasores escolheram colonizar Ilmari pela mesma razão que as velhas vieram séculos atrás: há grandes veios inexplorados de metais mágicos aqui. Talvez os futuros habitantes de Rahu devessem ter permissão para extrair esse metal para si próprios. Mas, por enquanto, estes infelizes sobreviventes não devem ter acesso ao metal, pois parecem compreender os seus poderes muito melhor do que nós. Eles estão desesperados por armas e não se preocupam com as consequências. Portanto, destruímos todos os equipamentos de mineração e desmontamos suas minas. Os sobreviventes não os reabrirão tão cedo. 

Mas as criaturas subterrâneas das “terras dos goblins” também cobiçam o metal, e sem as velhas para mantê-las sob controle, os mineiros goblins acabarão por encontrar este lugar. Quando isso acontecer, temo pela segurança dos cristais de água. Então pedi aos druidas de Ri-Shin que me ajudassem a plantar muitos pequenos entes nas áreas mais defensáveis. Com sorte, eles garantirão que Rahu tenha algumas centenas de anos de água limpa.

--

As emoções fazem parte da natureza, então Dreva é tão suscetível à raiva quanto qualquer druida. Não tenho prazer em discordar de Dreva, mas NÃO desobedeci! Cumpri meu dever solene de proteger a vida agora e no futuro.

Não pretendo ser inocente. Lutei com muitos rakshasa durante as batalhas com Rahu e acredito que eles teriam preferido a morte ao que fizemos com eles. Mas não perguntamos. Nós impusemos esta nova vida sobre eles.

Se você é um jovem rakshasa que se tornou um druida de Dreva, esta notícia pode ser um choque para você. Se sentir raiva, ou qualquer outra emoção, alegre-se, pois isso é natural! As emoções não são um sinal de fraqueza! Se quiser conversar mais, encontre-me em Verta. Estou me retirando para as minhas árvores ancestrais em Dwyndarre. Responderei a todas as perguntas que puder.

Mas preste atenção ao meu aviso: se você pretende me destruir, precisará trazer um exército melhor do que da última vez. Dreva me presenteou com poderes que você não pode compreender.

- Alto Arquidruida Celatus"
" I admit I wasn't sure what I would find when I arrived. It's been only a handful of years since my last adventure here, but I'd feared Selleiech had forgotten her promise. The arrrangement is crude but I have what I need. I should only be here a few days.

---

Selleiech's hut is gone from the beach, washed away as if it never existed. This is impressive only in that the hut was made of stone and must have weighed several tons.

I wandered down the beach, and on the southwest corner of the island I met a ranalon that calls itself Puffy Ben, for reasons I have not learned. To my surprise, Puffy Ben recognized me and agreed to help me in Selleiech's absence. I have explained my needs and he will have preparations within three days.

---

I leave this place. I'm leaving behind a communication crystal for you.

I know you're reading this. Go ahead and activate the crystal. I want to talk. Yes, to you!": "Confesso que não tinha certeza do que encontraria quando chegasse. Faz apenas alguns anos desde minha última aventura aqui, mas temia que Selleiech tivesse esquecido sua promessa. O arranjo é grosseiro, mas tenho o que preciso. Eu só deveria estar aqui por alguns dias.

---

A cabana de Selleiech desapareceu da praia, foi destruída como se nunca tivesse existido. Isto é impressionante apenas porque a cabana era feita de pedra e devia pesar várias toneladas.

Vagueei pela praia e, no canto sudoeste da ilha, encontrei um ranalon que se autodenomina Puffy Ben, por razões que não descobri. Para minha surpresa, Puffy Ben me reconheceu e concordou em me ajudar na ausência de Selleriech. Expliquei minhas necessidades e ele terá os preparativos dentro de três dias.

---

Eu deixo este lugar. Estou deixando um cristal de comunicação para você.

Eu sei que você está lendo isso. Vá em frente e ative o cristal. Eu quero conversar. Sim, para você!"
" It's official: I have sold the entire duchy to the goblins. This is entirely the fault of the Council. I accept no blame for what happened: it was an entirely predictable, understandable response to their abuse. If they could not foresee me doing this, they should not be rulers of a country. Anyway, Kazri and I are now on the lam. As part of our deal, we have gained access to the goblin tunnel network between my duchy and the adjacent ones. We are heading to Eltibule, as it should be the easiest to hide in.

---

Kazri has had a genius idea. When we found Eltibule's daughter's spirit bound in the earth, everything fell together. She is now Kazri's puppet, and she has scared the other Eltibule brat out of the duchy! There's no ruler here now! Hahahaha! I have helped myself to the more valuable commodities in this miserable duchy, but I am eager to move on. However, Kazri has been interrogating this ghost. Seems she knows something about a font of necromantic darkness. I hope this doesn't delay us overmuch.

---

Well, now we're in a fucking cave a million miles beneath the earth, and Kazri is irate. We've killed dozens of these horrible beasts, only to discover that the necromantic power isn't necromancy at all. It's darkness, all right, but not dark power: it's just... darkness! The absence of light! I've never seen Kazri so outraged. It's fairly amusing. We are debating confronting this nature spirit. I think we should just move on; surely the Council's agents will be tracking us...

---

(The next entry is written in a different style.)

I don't know how long it's been. Kazri and I fought the spirit of darkness, and destroyed it. And then Kazri said he'd help me harness its power! I agreed, and ... Kazri is gone now, and there's a layer of dust on everything. I've been lying here for months or years. I feel ... so powerful! So incredibly powerful! But I can't leave! I'm trapped here in this small temple. I can't even get into the adjoining caves; when I try, I feel incredible pain. I have found some books among Kazri's discarded belongings. They seem to suggest that I've been turned into some sort of \"nature spirit\". Kazri must have known what would happen. But why did Kazri do this to me?

The ghost of Eltibule's brat remains here. She seems to be tied into my power somehow, and I can force her to obey my commands. But I find her constant complaints to be quite annoying.

---

I used my powers to shout to the gods. \"I am here!\" I knew they would come to fight me. And I knew I would lose. But I would die fighting gods. That's the best I can hope for, now. But in response to my scream, I heard The Worm. Gulagra. It screamed \"He is mine!\" Just that. What happens now? Gulagra's minions have been showing up here, but they don't want to fight me. They've just been excavating the tunnels, widening them. A few have come to see me, but they are gibbering madmen. I do not know what's happening.

---

Horrific creatures came today, minions of Gulagra. But I am now master of this tiny domain. I've summoned my own defenders! While I could not kill all of the beasts, I was able to seal them away. If Gulagra wants me, he will need to send far better minions. Or come for me himself...

---

I have prepared a trap for Gulagra. I've invested some of my new power in a crystal of destruction. When the worm or its avatar shows up, it will utterly destroy them. It recharges so slowly that I fear it can only fire once before the battle will be over. But hopefully that will be enough.": "É oficial: vendi todo o ducado aos goblins. Isto é inteiramente culpa do Conselho. Não aceito qualquer culpa pelo que aconteceu: foi uma resposta totalmente previsível e compreensível ao abuso que sofreram. Se eles não pudessem prever que eu faria isso, não deveriam ser governantes de um país. De qualquer forma, Kazri e eu estamos foragidos. Como parte do nosso acordo, obtivemos acesso à rede de túneis goblins entre meu ducado e os adjacentes. Estamos indo para Eltibule, pois deve ser o local mais fácil de se esconder.

---

Kazri teve uma ideia genial. Quando encontramos o espírito da filha de Eltibule preso na terra, tudo se encaixou. Ela agora é a marionete de Kazri e assustou o outro pirralho Eltibule do ducado! Não há governante aqui agora! Hahahaha! Eu me servi dos bens mais valiosos deste ducado miserável, mas estou ansioso para seguir em frente. No entanto, Kazri tem interrogado este fantasma. Parece que ela sabe alguma coisa sobre uma fonte de escuridão necromântica. Espero que isso não nos atrase muito.

---

Bem, agora estamos em uma caverna a um milhão de quilômetros abaixo da terra, e Kazri está irado. Matamos dezenas dessas feras horríveis, apenas para descobrir que o poder necromântico não é necromancia. É escuridão, tudo bem, mas não poder das trevas: é apenas... escuridão! A ausência de luz! Nunca vi Kazri tão indignado. É bastante divertido. Estamos debatendo o confronto com esse espírito da natureza. Acho que deveríamos seguir em frente; certamente os agentes do Conselho estarão nos rastreando...

---

(A próxima entrada está escrita em um estilo diferente.)

Não sei quanto tempo faz. Kazri e eu lutamos contra o espírito das trevas e o destruímos. E então Kazri disse que me ajudaria a controlar seu poder! Eu concordei e... Kazri se foi agora e há uma camada de poeira em tudo. Estou deitado aqui há meses ou anos. Eu me sinto... tão poderoso! Tão incrivelmente poderoso! Mas não posso ir embora! Estou preso aqui neste pequeno templo. Não consigo nem entrar nas cavernas vizinhas; quando tento, sinto uma dor incrível. Encontrei alguns livros entre os pertences descartados de Kazri. Eles parecem sugerir que fui transformado em uma espécie de “espírito da natureza”. Kazri devia saber o que aconteceria. Mas por que Kazri fez isso comigo?

O fantasma do pirralho de Eltibule permanece aqui. Ela parece estar ligada ao meu poder de alguma forma, e posso forçá-la a obedecer aos meus comandos. Mas acho suas reclamações constantes bastante irritantes.

---

Usei meus poderes para gritar aos deuses. \"Estou aqui!\" Eu sabia que eles viriam lutar comigo. E eu sabia que iria perder. Mas eu morreria lutando contra deuses. Isso é o melhor que posso esperar agora. Mas em resposta ao meu grito, ouvi The Worm. Gulagra. Gritou \"Ele é meu!\" Só isso. O que acontece agora? Os asseclas de Gulagra têm aparecido aqui, mas não querem lutar comigo. Eles acabaram de escavar os túneis, alargando-os. Alguns vieram me ver, mas são loucos balbuciantes. Eu não sei o que está acontecendo.

---

Criaturas horríveis vieram hoje, servos de Gulagra. Mas agora sou o mestre deste pequeno domínio. Convoquei meus próprios defensores! Embora eu não pudesse matar todas as feras, consegui selá-las. Se Gulagra me quiser, ele precisará enviar lacaios muito melhores. Ou venha ele mesmo me buscar...

---

Preparei uma armadilha para Gulagra. Investi parte do meu novo poder num cristal de destruição. Quando o worm ou seu avatar aparecer, ele os destruirá totalmente. Ele recarrega tão lentamente que temo que só possa disparar uma vez antes do fim da batalha. Mas espero que isso seja suficiente."
" Welcome to the Sun Vale Resort! We hope that your stay with us is full of delight. Let's answer the most common questions about the island! If your questions aren't covered, please ask the concierge, who will be happy to slake your curiosity!

<b>About the Name \"Sun Vale\"</b>

The ancient Elvish name of this island chain is Arasimorra Aris, which translates into Human as \"Sun's Archipelago\" or perhaps \"Sun's Island\". So it's natural to wonder why the Human name is \"Sun Vale.\" The answer? Trolls! The trolls that first inhabited the large island called it Sun Vale, and they even claimed the name was chosen by their troll god! Out of respect for the trolls (and their massive clubs), sages deferred to their name choice. And the name has stuck for thousands of years!

<b>No Scary Fairies</b>

The largest island was once home to a \"portal\" to the fae realm, which allowed fae creatures entry to our world. This portal is long dormant and no fairies live there now, but many varieties of fae plants and animals can still be found. Because these creatures are quite dangerous, we cannot allow visitors on the large island. It would be an ecological disaster if some of these creatures ever found their way to other islands, or even worse, to Verta's mainland! However, the smaller island that you're on now is perfectly safe.

<b>Friendly Frog People</b>

You may spot amusing frog-creatures on the beach. These people are called Ranalon, and they're quite common across the ocean in Fosulf. This particular tribe of Ranalon have proven to be friendly, curious, and articulate. We've entered into a mutual safety agreement with them, so there's no reason for fear. They all speak fluent Human, so if you see one, say hi! We even have a resident Ranalon on hotel staff. You can meet Puffy Ben during our daily walking tours.

<b>Reef Tours</b>

There are three distinct coral reefs here, each more beautiful than the last. These reefs glow with a haunting light that must be seen to be believed! It's so bright that it can easily be enjoyed from our tour boats at night. The tour departs promptly at dusk every evening.

If you're an experienced diver, speak with our concierge about current diving opportunities. In addition to the beautiful reefs, you may also have an opportunity to see the local Ranalon as they work on their massive \"undersea bridges\". You've never seen stonework this beautiful from such primitive creatures!": "Bem-vindo ao Resort Sol Vale! Esperamos que sua estadia conosco seja repleta de prazer. Vamos responder às dúvidas mais comuns sobre a ilha! Caso suas dúvidas não sejam sanadas, pergunte ao concierge, que terá prazer em saciar sua curiosidade!

<b>Sobre o nome \"Sun Vale\"</b>

O antigo nome élfico desta cadeia de ilhas é Arasimorra Aris, que se traduz em humano como \"Arquipélago do Sol\" ou talvez \"Ilha do Sol\". Portanto, é natural perguntar por que o nome humano é “Vale do Sol”. A resposta? Trolls! Os trolls que primeiro habitaram a grande ilha a chamaram de Vale do Sol, e até alegaram que o nome foi escolhido por seu deus troll! Por respeito aos trolls (e seus enormes porretes), os sábios adiaram a escolha do nome. E o nome ficou preso por milhares de anos!

<b>Sem fadas assustadoras</b>

A maior ilha já foi o lar de um “portal” para o reino das fadas, que permitia a entrada de criaturas feéricas em nosso mundo. Este portal está adormecido há muito tempo e nenhuma fada vive lá agora, mas muitas variedades de plantas e animais feéricos ainda podem ser encontradas. Como essas criaturas são bastante perigosas, não podemos permitir visitantes na grande ilha. Seria um desastre ecológico se algumas destas criaturas chegassem a outras ilhas, ou pior ainda, ao continente de Verta! No entanto, a ilha menor em que você está agora é perfeitamente segura.

<b>Pessoas sapos amigáveis</b>

Você pode avistar divertidas criaturas sapos na praia. Essas pessoas são chamadas de Ranalon e são bastante comuns do outro lado do oceano em Fosulf. Esta tribo particular de Ranalon provou ser amigável, curiosa e articulada. Firmamos um acordo de segurança mútuo com eles, então não há motivo para medo. Todos eles falam humano fluentemente, então se você ver um, diga oi! Temos até um Ranalon residente na equipe do hotel. Você pode conhecer Puffy Ben durante nossos passeios diários.

<b>Passeios pelos recifes</b>

Existem três recifes de coral distintos aqui, cada um mais bonito que o anterior. Esses recifes brilham com uma luz assustadora que é preciso ver para acreditar! É tão claro que pode ser facilmente apreciado em nossos barcos de passeio à noite. O passeio sai pontualmente ao anoitecer todas as noites.

Se você é um mergulhador experiente, fale com nosso concierge sobre as oportunidades atuais de mergulho. Além dos belos recifes, você também poderá ter a oportunidade de ver os Ranalon locais enquanto eles trabalham em suas enormes “pontes submarinas”. Você nunca viu pedras tão lindas de criaturas tão primitivas!"
" Your Majesty,

Please accept delivery of your new army. As I hoped, I was able to rectify some issues with your troops' anatomy through judicious craftwork.

Your new soldiers will be loyal to you unto death. They will self-replicate when they have eaten enough meat... and to them, everything is meat! I hope that these creatures have fully justified our two-year agreement.

But I must confess that although these new troops will no doubt destroy your enemies, they are rather hideous to behold. I have a new idea for a creature. It will be less grotesque, yet far more powerful! I need two more years, and some of your most expendable dog-beasts. Please let me know quickly, for our original two-year time period ends soon.

Your humble servant,

- Dalvos the Creator": "Vossa Majestade,

Por favor, aceite a entrega do seu novo exército. Como eu esperava, consegui corrigir alguns problemas com a anatomia de suas tropas através de um trabalho artesanal criterioso.

Seus novos soldados serão leais a você até a morte. Eles se auto-replicarão quando tiverem comido carne suficiente... e para eles tudo é carne! Espero que estas criaturas tenham justificado plenamente o nosso acordo de dois anos.

Mas devo confessar que embora estas novas tropas sem dúvida destruam os seus inimigos, elas são bastante horríveis de se ver. Tenho uma nova ideia para uma criatura. Será menos grotesco, mas muito mais poderoso! Preciso de mais dois anos e de alguns dos seus cães mais dispensáveis. Por favor, avise-me rapidamente, pois nosso período original de dois anos termina em breve.

Seu humilde servo,

- Dalvos o Criador"
