And so I traveled with a trade Caravan for months until we reached his hallowed Tomb. When the others had been dealt with, I carefully Excavated it, all by hand, until I found the Emerald. It was right where I'd predicted, of course.

I Studied it for seven years, and during that time I met my true Love, a simple town Guard named ... well, I had best not put his name to writing. Our beautiful daughter was born, but she was sickly... he said it was because of the things I'd done, but what could he have known?

It took all my skill at Alchemy to keep her alive, but it would not last for long. In desperation we sailed West to see my mentor.

