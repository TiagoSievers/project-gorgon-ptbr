"Durante o que pareceram séculos, ela lutou descontroladamente, mantendo os dois afastados. E então aconteceu": "um dos fantasmas estendeu a mão para sua cabeça. Sentia dor e estava sendo machucado! Com energia renovada, Leeka forçou seus braços doloridos a se moverem mais rápido, golpeando sua cabeça repetidas vezes. Mesmo depois de se dissolver em uma nuvem informe, ela continuou a atacar onde a cabeça estava. O outro fantasma aproveitou a oportunidade para golpear sua perna, suas costas, sua cabeça enquanto ela lutava contra o primeiro, mas continuou golpeando até que... ele desapareceu. Um dos fantasmas havia desaparecido."
"Décimo quarto aniversário. Katarina faleceu há um mês": "no momento em que Cualgar desistiu do feitiço, ela virou pedra, tal como ele previra! O pai está furioso, mas Cualgar parece arrasado e exausto. Eu não o culpo."
"E lembre-se": "você realmente não quer incomodá-la. Ela não vai impedir você de dormir - essa ideia seria ofensiva para ela - mas ela VAI transformar todos os seus sonhos em pesadelos horríveis, deixando você louco e tagarela dentro de um mês."
"Enquanto estiver no modo de viagem, você se comporta como se fosse sua própria montaria. Você não pode lutar no modo viagem – apenas viajar! Você notará um medidor de ansiedade": "ele enche se você chegar muito perto de monstros, mergulhar ou fazer outras coisas assustadoras. Se você ficar muito ansioso, sairá automaticamente do modo de viagem para poder lutar."
"Everyone that starts a new game at the table during the next hour will receive all active Table Buffs. Due to space limitations, only ten players can fit around a table. Keep your place at the table by continuing to play! If you leave the table, another player may take your spot.\": \"<h2>Bem-vindo ao Monsters and Mantids!</h2> Monsters and Mantids é baseado em um jogo de anões com temas semelhantes. No entanto, simplificamos drasticamente as regras para tornar o jogo mais acessível. Se o jogo ainda parece intimidante, você está enganado": "o jogo NÃO é intimidante. Você entenderá isso depois de jogar algumas rodadas. Como todos os bons jogos de cassino, você pode aprender apenas jogando! Organizamos as regras para que as informações mais importantes venham primeiro. Você pode parar de ler quando estiver pronto para começar a jogar!"
"Few things are as frustrating as a foe that can easily evade your attacks. If you encounter such a creature, you must find ways to be more accurate. I like to use precise attacks with a rapier or other accurate weapon, but other warriors prefer to stun evasive monsters. Stunning a foe will briefly prevent it from dodging.

Another troublesome foe is one that regenerates. Bleed them, bleed them! Or burn them, poison them, coat them in acid. The lingering pain will reduce their ability to regenerate significantly. And in the case of trolls, a bit of fire can leave them completely unable to heal. Of course, you must then deal with the stench of burning troll...": "Poucas coisas são tão frustrantes quanto um inimigo que pode facilmente escapar de seus ataques. Se você encontrar tal criatura, deverá encontrar maneiras de ser mais preciso. Gosto de usar ataques precisos com um florete ou outra arma precisa, mas outros guerreiros preferem atordoar monstros evasivos. Atordoar um inimigo irá impedi-lo de se esquivar brevemente.

Outro inimigo problemático é aquele que se regenera. Sangre-os, sangre-os! Ou queime-os, envenene-os, cubra-os com ácido. A dor persistente reduzirá significativamente sua capacidade de regeneração. E no caso dos trolls, um pouco de fogo pode deixá-los completamente incapazes de se curar. Claro, você deve então lidar com o fedor do troll queimado..."
"Fighting Lessons From Elsenro": "Lições de luta de Elsenro"
"First, you must admit that Norala is a contradiction": "she is the god of the big eating the little, of might making right, of the strong enslaving, killing, or abusing the weak. But Norala is not a strong god. Why is this? It is because she does not want to overshadow the apex predators in the world. If she were the strongest, then she could not in good conscience help those weaker than her. Don't you see?! She is weak so that she doesn't have to kill us all!"
"Five years ago, Sedgewick Forest was suffering from a massive influx of goblins. This created many environmental problems. Red Wings are native to the forest -- our progenitors are the native Tree Mantids -- but goblins are an invasive species with few natural predators. The forest's small population of elves and druids could not slow the rising goblin numbers, and the forest was in danger of complete destruction!

That's why the Red Wing Collective is proud to serve as predators of these goblins, ensuring that their numbers never overwhelm the wonders of the forest. We also ensure that weak and sickly goblins are culled, so the goblins that remain in the forest are powerful, hardy members of their species!

But the Red Wings are humble learners and we've adopted many techniques found in goblin culture. Our system of indentured servitude, while less violent than goblin methods, is similarly effective. We've also discovered from goblins that the accumulation of vast wealth can lead to happier lives. Goblins may seem like unimportant bipeds, but they have much to teach us. 

That's why we are proud to announce that the Red Wing Casino was developed in part through goblin subcontracting. The casino was built in an abandoned castle that needed extensive renovation, and by partnering with goblins, we were able to open the casino in less than two years!*

While other races seek to force goblins out of Sedgewick Forest, we believe that the future is through partnerships. <b>That's because Making Friends is the Way of the Mantis!</b>

-

<i>* We are contractually obligated to mention that more than 50% of the development of the Red Wing Casino was performed by dwarves, which are a similarly-sized but completely unrelated biped race. Dwarves and goblins share animosity... but we are above such petty conflicts and can see the beauty of both races. We hope to bridge the culture gap between dwarves and goblins to bring about a new era of racial harmony.** </i>

<i>** Note: there is no ETA for racial harmony at this time.</i>": "Cinco anos atrás, a Floresta Sedgewick sofria com um influxo maciço de goblins. Isso criou muitos problemas ambientais. Os Red Wings são nativos da floresta - nossos progenitores são os Tree Mantids nativos - mas os goblins são uma espécie invasora com poucos predadores naturais. A pequena população de elfos e druidas da floresta não conseguia diminuir o número crescente de goblins, e a floresta corria o risco de ser completamente destruída!

É por isso que o Red Wing Collective tem orgulho de servir como predadores desses goblins, garantindo que seu número nunca supere as maravilhas da floresta. Também garantimos que os goblins fracos e doentes sejam abatidos, para que os goblins que permanecem na floresta sejam membros poderosos e resistentes de sua espécie!

Mas os Red Wings são aprendizes humildes e adotamos muitas técnicas encontradas na cultura goblin. Nosso sistema de servidão contratada, embora menos violento que os métodos goblins, é igualmente eficaz. Também descobrimos através dos goblins que o acúmulo de vasta riqueza pode levar a vidas mais felizes. Os goblins podem parecer bípedes sem importância, mas têm muito a nos ensinar. 

É por isso que temos orgulho de anunciar que o Red Wing Casino foi desenvolvido em parte através da subcontratação de goblins. O cassino foi construído em um castelo abandonado que precisava de uma extensa reforma e, em parceria com goblins, conseguimos abrir o cassino em menos de dois anos!*

Enquanto outras raças procuram expulsar os goblins da Floresta Sedgewick, acreditamos que o futuro passa por parcerias. <b>Isso porque fazer amigos é o jeito do Louva-a-deus!</b>

-

<i>* Somos contratualmente obrigados a mencionar que mais de 50% do desenvolvimento do Red Wing Casino foi realizado por anões, que são uma raça bípede de tamanho semelhante, mas completamente não relacionada. Anões e goblins compartilham animosidade... mas estamos acima desses conflitos mesquinhos e podemos ver a beleza de ambas as raças. Esperamos preencher a lacuna cultural entre anões e goblins para trazer uma nova era de harmonia racial.** </i>

<i>** Observação: não há ETA para harmonia racial no momento.</i>"
