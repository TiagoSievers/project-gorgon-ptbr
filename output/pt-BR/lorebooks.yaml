"<i>Welcome to the first installment of The Sage's Lectern. I'm Reginald the Pretty Good Mage -- formerly known as Reginald the Archmage, but that's a separate topic. Some volumes will be travelogues, while others, such as this one, will be interviews. For this first volume I've arranged something very special: an interview with Ormorek, God of Bitterness!</i>

<i>I should disclose that I paid for this interview, and it was not cheap: Ormorek would only give an interview if I agreed to replace the roof of his favorite bar. When I agreed to this price, I did not realize the roof was made of one incredibly thick piece of stone. Since it is in New Aufghel's historical district, the bar's appearance could not be changed, so I needed to have a new roof delivered. Needless to say it cost quite a bit of money. But I'm sure I'll eventually make the millions of Councils back on the long-tail sales of this epic interview! (That's a writer's joke.) So without further ado:</i>

<h1>Interview with Ormorek</h1>

I entered the bar and took the stairs to the upper floor. The Bloated Pony looks like a typical dwarven neighborhood bar but it's located in the business district, pretty far from any homes. The regulars range from businessdwarves and moneylenders to simple cleaners and mechanists -- all the people who work in the area. To my human eyes it looked like a collection of dwarven stereotypes.

Ormorek sat at the bar, his very short beard the only thing that distinguished him from a dozen other gnarled old dwarves. A bouncer stood nearby, always watching. Ormorek does not like tourists, fans, lookie-loos, or frankly anyone at all. But he seemed well-liked by the regulars here. I sat down at the bar next to him in a spot he'd kept open for me.

Ormorek: you're back. So you've agreed to my price?

Reginald: yes... I suppose so. Assuming this interview has some revealing pieces of knowledge, you've got a deal.

Ormorek: Good. I owe Wilker a favor, and you're delivering it. If we don't get a new roof soon, the safety fines will put this place out of business. <i>(Here I looked up at the ceiling in concern.)</i> Oh, don't be a twat. This roof could last for years to come, but it's not earthquake-proof anymore. Unless there's an earthquake, you'll be fine. So go ahead, let's get this over with. Wilker, pour him a beer. 

<i>(Wilker One-Tooth, the bartender and owner, poured me a tall glass of the only beer on tap. I found it incredibly bitter and alcoholic.) </i>

Reginald: Wow... that's bitter. And after the first sip hits you, the aftertaste is a whole new kind of bitter!

Ormorek: It's why I drink here.

Reginald: Okay. So my first question is, how did you go from being God of Dwarves to --

Ormorek: -- no questions about how I ended up the god of shite! Have some respect!

Reginald: Oh. Uh. <i>(I leafed through my notes. Most of my questions were about that very topic.)</i> Well, can you give me the scoop on other gods?

<i>(Ormorek sighed, nodded, and downed his beer.)</i>

Reginald: Tell me about Harukita. He's the leader of the Chalice Gods, right? Can you give me some insights on him?

Ormorek: He's a dick. He wants to literally destroy this entire world. What else is there to know?

Reginald: He's the god of Hate, but I've heard he can be friendly at times. I guess I just don't understand him.

Ormorek: He's never fucking friendly! It's you daft humans spreading that idiocy! Just because a god says hello and doesn't smite you dead, that doesn't mean he's your friend!

Reginald: Well, I mean Necromancers of all races have been known to --

Ormorek: He's a dick sandwich. Next question.

Reginald: How about his brother Kajich?

Ormorek: Another dick. <i>(Ormorek sighed again, collected his thoughts, and signaled for another beer.)</i> Look. This goes for Harukita and Kajich both: if a god's avatar is a skellington, he's a dick! Why ya think they look like that? They're screamin' \"Hey, I'm a huge twat! You should stay away from me!\" And before you ask, the third brother's a dick too. But ... not <i>quite</i> as bad, I guess.

Reginald: You're referring to Tuvillus? He's interesting because of his dual nature: his Jealousy aspect is an incredibly beautiful elven man, and his Greed aspect is this huge, bloated...

Ormorek: Those are just his two Avatars. He's got two different-lookin' physical bodies but it's the same arsehole inside each of 'em!

Reginald: Fair enough. You said Tuvillus isn't quite as bad as his brothers. Can you help me understand why?

Ormorek: He and Ilth Hale at least take care of their... their creations.

Reginald: You mean vampires.

Ormorek: Among other things. Look, I don't want to talk about Chalice anymore. What else you got?

Reginald: Um... Hm. <i>(That wiped out the rest of my prepared questions.)</i> Look, I just need a scoop! Something new, something mortals don't know yet. What can you share with my readers?

Ormorek: A scoop? Life is stupid, and you should give up. There, that's all the wisdom mortals need. This was a dumb idea. Just get outta here.

Reginald: But our deal...

Ormorek: Deal's off! 

<i>(The bartender tried to interject.)</i>

Wilker: But I can't stay open even another month! We need to start the repairs...

Ormorek: I don't care. Not doin' this. Get the fuck outta here, human! Go! I can still smite people, ya know!

<i>(The bouncer was behind me in an instant, her meaty hands on my shoulders. I sighed and let myself be escorted out. But as I was leaving, an old dwarf caught my eye and nodded cryptically. I waited outside the bar, and sure enough, after a few minutes he stepped out. As I soon learned, his name was Rulgirt.)</i>

Rulgirt: You are a terrible interviewer. You still want that \"scoop\" of knowledge?

Reginald: Yes.

Rulgirt: If I get you a scoopful, will you honor your deal with Ormorek?

Reginald: Okay. Sure. If it's new knowledge worth printing, I'll pay for the bar repairs.

Rulgirt: Then take this. Stay up til midnight, then drink it. Be lyin' down when you do, you'll be asleep fast. You want to find me in your dreams, right?

Reginald: Um, what?

Rulgirt: Say yes.

Reginald: Yes?

Rulgirt: I want to find you, too. So it's a pact, then, human. I'll see you tonight.

<i>(Rulgirt nodded curtly, then shuffled back into the bar, leaving me with a vial of blue liquid.)</i>

 <i>Stay tuned for the next issue, in which I actually get my scoop!</i>": "<i>Bem-vindo à primeira parte do Púlpito do Sábio. Sou Reginald, o Mago Muito Bom – anteriormente conhecido como Reginald, o Arquimago, mas esse é um assunto à parte. Alguns volumes serão diários de viagem, enquanto outros, como este, serão entrevistas. Para este primeiro volume preparei algo muito especial: uma entrevista com Ormorek, Deus da Amargura!</i>

<i>Devo divulgar que paguei por esta entrevista, e não foi barato: Ormorek só daria uma entrevista se eu concordasse em substituir o telhado do seu bar favorito. Quando concordei com esse preço, não sabia que o telhado era feito de um pedaço de pedra incrivelmente grosso. Por ficar no bairro histórico de New Aufghel, a aparência do bar não poderia ser alterada, então precisei da entrega de uma nova cobertura. Escusado será dizer que custou bastante dinheiro. Mas tenho certeza de que acabarei ganhando milhões de Conselhos nas vendas de cauda longa desta entrevista épica! (Isso é uma piada de escritor.) Então, sem mais delongas:</i>

<h1>Entrevista com Ormorek</h1>

Entrei no bar e subi as escadas até o andar superior. O Bloated Pony parece um típico bar de bairro anão, mas está localizado no distrito comercial, bem longe de qualquer casa. Os frequentadores regulares variam de anões empresariais e agiotas a simples faxineiros e mecânicos – todas as pessoas que trabalham na área. Aos meus olhos humanos, parecia uma coleção de estereótipos anões.

Ormorek estava sentado no bar, sua barba muito curta era a única coisa que o distinguia de uma dúzia de outros anões velhos e retorcidos. Um segurança estava por perto, sempre observando. Ormorek não gosta de turistas, fãs, curiosos ou, francamente, de ninguém. Mas ele parecia muito querido pelos frequentadores daqui. Sentei-me no bar ao lado dele, em um lugar que ele deixou aberto para mim.

Ormorek: você está de volta. Então você concordou com meu preço?

Reginald: sim... acho que sim. Supondo que esta entrevista contenha alguns conhecimentos reveladores, você tem um acordo.

Ormorek: Bom. Devo um favor ao Wilker e você está me entregando. Se não conseguirmos um telhado novo em breve, as multas de segurança vão pôr este lugar fora do mercado. <i>(Aqui eu olhei para o teto, preocupado.)</i> Ah, não seja idiota. Este telhado pode durar anos, mas não é mais à prova de terremotos. A menos que haja um terremoto, você ficará bem. Então vá em frente, vamos acabar logo com isso. Wilker, sirva-lhe uma cerveja. 

<i>(Wilker One-Tooth, o barman e proprietário, serviu-me um copo alto da única cerveja disponível. Achei-a incrivelmente amarga e alcoólica.) </i>

Reginald: Uau... isso é amargo. E depois do primeiro gole, o sabor é um novo tipo de amargor!

Ormorek: É por isso que bebo aqui.

Reginaldo: Ok. Então, minha primeira pergunta é: como você deixou de ser o Deus dos Anões para...

Ormorek: - sem dúvidas sobre como acabei me tornando o deus da merda! Tenha um pouco de respeito!

Reginaldo: Ah. Uh. <i>(Folheei minhas anotações. A maioria das minhas perguntas era sobre esse mesmo assunto.)</i> Bem, você pode me dar informações sobre outros deuses?

<i>(Ormorek suspirou, acenou com a cabeça e bebeu a cerveja.)</i>

Reginald: Conte-me sobre Harukita. Ele é o líder dos Deuses do Cálice, certo? Você pode me dar algumas dicas sobre ele?

Ormorek: Ele é um idiota. Ele quer literalmente destruir este mundo inteiro. O que mais há para saber?

Reginald: Ele é o deus do Ódio, mas ouvi dizer que às vezes ele pode ser amigável. Acho que simplesmente não o entendo.

Ormorek: Ele nunca é amigável! São vocês, humanos idiotas, espalhando essa idiotice! Só porque um deus diz olá e não te mata, isso não significa que ele é seu amigo!

Reginald: Bem, quero dizer, sabe-se que Necromantes de todas as raças...

Ormorek: Ele é um sanduíche de pau. Próxima pergunta.

Reginald: E seu irmão Kajich?

Ormorek: Outro idiota. <i>(Ormorek suspirou novamente, organizou seus pensamentos e sinalizou pedindo outra cerveja.)</i> Olha. Isso vale para Harukita e Kajich: se o avatar de um deus é um Skellington, ele é um idiota! Por que você acha que eles são assim? Eles estão gritando \"Ei, eu sou um grande idiota! Você deveria ficar longe de mim!\" E antes que você pergunte, o terceiro irmão também é um idiota. Mas... não tão ruim, eu acho.

Reginald: Você está se referindo a Tuvillus? Ele é interessante por causa de sua dupla natureza: seu aspecto Ciúme é um homem élfico incrivelmente lindo, e seu aspecto Ganância é enorme e inchado...

Ormorek: Esses são apenas seus dois Avatares. Ele tem dois corpos físicos de aparência diferente, mas é o mesmo idiota dentro de cada um deles!

Reginald: Justo. Você disse que Tuvillus não é tão ruim quanto seus irmãos. Você pode me ajudar a entender por quê?

Ormorek: Ele e Ilth Hale pelo menos cuidam de suas... suas criações.

Reginald: Você quer dizer vampiros.

Ormorek: Entre outras coisas. Olha, não quero mais falar sobre Chalice. O que mais você tem?

Reginald: Hum... Hum. <i>(Isso eliminou o resto das minhas perguntas preparadas.)</i> Olha, só preciso de um furo! Algo novo, algo que os mortais ainda não sabem. O que você pode compartilhar com meus leitores?

Ormorek: Um furo? A vida é estúpida e você deveria desistir. Pronto, essa é toda a sabedoria que os mortais precisam. Esta foi uma ideia idiota. Apenas saia daqui.

Reginald: Mas nosso acordo...

Ormorek: Acordo encerrado! 

<i>(O barman tentou interromper.)</i>

Wilker: Mas não posso ficar aberto nem mais um mês! Precisamos começar os reparos...

Ormorek: Eu não me importo. Não estou fazendo isso. Dê o fora daqui, humano! Ir! Eu ainda posso ferir as pessoas, você sabe!

<i>(A segurança estava atrás de mim em um instante, com suas mãos carnudas em meus ombros. Suspirei e me deixei ser escoltado para fora. Mas quando eu estava saindo, um velho anão chamou minha atenção e acenou com a cabeça enigmaticamente. Esperei do lado de fora do bar e, com certeza, depois de alguns minutos ele saiu. Como logo descobri, seu nome era Rulgirt.)</i>

Rulgirt: Você é um péssimo entrevistador. Você ainda quer aquele “furo” de conhecimento?

Reginaldo: Sim.

Rulgirt: Se eu lhe der um furo, você honrará seu acordo com Ormorek?

Reginaldo: Ok. Claro. Se for um conhecimento novo que vale a pena imprimir, pagarei pelos reparos do bar.

Rulgirt: Então pegue isso. Fique acordado até meia-noite e depois beba. Esteja deitado quando fizer isso, você estará dormindo rápido. Você quer me encontrar em seus sonhos, certo?

Reginald: Hum, o quê?

Rulgirt: Diga sim.

Reginaldo: Sim?

Rulgirt: Eu quero encontrar você também. Então é um pacto, humano. Vejo você esta noite.

<i>(Rulgirt assentiu brevemente e depois voltou para o bar, deixando-me com um frasco de líquido azul.)</i>

 <i>Fique ligado na próxima edição, na qual eu realmente saberei minhas novidades!</i>"
