"(Uma dica": "encontre o Bazar de Garakh. O deus do comércio pouco se importa com o conhecimento como mercadoria, mas seu bazar atrai sábios orientados para o comércio.)"
"- English can move the ball quite dramatically. If you're serious about using English well, you may want to spend a while experimenting with how it works.\": \"<i>Nota": "este é um guia para o elegante jogo de golfe dos anões. Não deve ser confundido com o golfe humano (que envolve bater nas bolas com tacos) ou com o golfe dos goblins (que envolve crueldade com os ursos) ou com o indescritivelmente pervertido golfe élfico.</i>"
"- High Archdruid Celatus\": \"Olá, companheiro druida. Foi minha decisão manter este lugar intacto. Você provavelmente acha que merece uma explicação para isso. Você está errado": "eu respondo diretamente a Dreva. Mas embora você não deva nada, serei generoso pelo bem das futuras gerações druidas."
"... and so the Council of Thirteen was no more. The \"Dissenting Five\", as they were called, were banished from Alharth, and a Council Decree stated that their names were never to be spoken again.

Shortly thereafter, \"The Council of Thirteen\" renamed itself \"The Council of Eight.\" They maintained eight members for 103 years, replacing members as needed, but starting with Torsagar the Regent's retirement, they stopped anointing new members.

For a time they called themselves \"The Council of Five,\" before finally settling on just \"The Council.\" Its four surviving members have served for over 180 years, with no sign of stopping. All praise The Council! All praise its benevolence!": "... e então o Conselho dos Treze não existia mais. Os \"Cinco Dissidentes\", como eram chamados, foram banidos de Alharth, e um Decreto do Conselho declarou que os seus nomes nunca mais seriam mencionados.

Pouco tempo depois, \"O Conselho dos Treze\" renomeou-se como \"O Conselho dos Oito\". Eles mantiveram oito membros por 103 anos, substituindo-os conforme necessário, mas a partir da aposentadoria de Torsagar, o Regente, pararam de ungir novos membros.

Por um tempo eles se autodenominaram “O Conselho dos Cinco”, antes de finalmente decidirem apenas “O Conselho”. Seus quatro membros sobreviventes serviram por mais de 180 anos, sem nenhum sinal de que irão parar. Todos louvam o Conselho! Todos elogiam sua benevolência!"
"<b>???</b>": "Estudiosos relataram uma misteriosa décima raça de cavalo, mas os melhores geneticistas do país são atualmente incapazes de identificá-la.\""
"<b>Acasalamento</b>": "seus animais de estimação estão fazendo sexo no momento. Isso pode levar de alguns minutos a muitas horas, dependendo das características dos animais de estimação. Se o acasalamento for bem-sucedido, o macho entrará no estado de Recuperação, a fêmea entrará no estado de Grávida e a vaga do estábulo do bebê será reservada automaticamente. (O slot do bebê será marcado como \\\"In Utero\\\".)"
"<b>Akhisa, Paciência, Astúcia e Aranhas:</b> Akhisa frequentemente oferece acordos para mortais espertos. Os acordos sempre parecem ter uma brecha que o mortal esperto pode abusar, transformando um mau negócio em um ótimo. Mas repita comigo": "<i>você não é mais astuto que o deus da astúcia.</i> A menos que sua própria alma e as almas de sua família sejam um custo que você esteja disposto a pagar, você não pode se dar ao luxo de fazer “negócios” com Akhisa."
"<b>Akhisa, Patience, Cunning, and Spiders:</b> Akhisa often offers deals to clever mortals. The deals always seem to have a loophole that the clever mortal can abuse, turning a bad deal into a great one. But repeat after me": "<i>you are not more cunning than the god of cunning.</i> Unless your very soul and the souls of your family are a cost you're willing to pay, you can't afford to do \\\"business\\\" with Akhisa."
"<b>Apenas animais de estimação</b>": "esses animais de estimação foram classificados como somente animais de estimação e nunca podem ser usados para reprodução. No entanto, eles <i>podem</i> ser colocados em gaiolas de viagem e vendidos a terceiros. (Se você usar uma gaiola para animais de estimação em um animal de estimação não registrado, ele se tornará um animal de estimação somente para animais de estimação.)"
"<b>Blanketed</b>": "Warm-Blooded Riding horse. An even-keeled horse fit for riding. It is known for the distinct \\\"blanket\\\" coat pattern that drapes over its hind quarters."
"<b>Cobertor</b>": "Cavalo de montaria de sangue quente. Um cavalo de quilha equilibrada, adequado para cavalgar. É conhecido pelo distinto padrão de pelagem em \\\"cobertor\\\" que cobre seus quartos traseiros."
"<b>Councilwoman Irasce's notes:</b> Despite her adherents' claims to the contrary, Norala is a relatively weak class 3 nature spirit. Worship of Norala is forbidden, for it inevitably means voluntarily infecting oneself with lycanthropy, which is usually a fate worse than death": "not only does the mind die, but the body becomes a senseless killing machine."
"<b>Councilwoman Irasce's notes:</b> this history is exceptionally self-serving. It was written anonymously but it's easy to guess that a priest of Arisetsu is behind it": "as is typical of her priests, this story makes her sound weak!"
"<b>Dicas:</b> - Aqui está o segredo para mirar": "imagine uma linha entre você e a bola. Quando você chuta, a bola continuará nessa linha. Isso significa que a direção que você está enfrentando não importa. Você pode virar de lado ou até mesmo chutar para trás, mas isso não afetará em nada a direção da bola! Apenas a sua posição, em relação à posição da bola, importa. Ah, e também o inglês que você coloca no chute, claro."
"<b>Dormant</b>": "this very rare husbandry state indicates that the pet has forgotten about the concepts of sex. This can only happen with very long-lived species. It may be possible to remind a dormant pet about sex somehow, turning it into a Registered pet. But doing so would require a lot of husbandry experience and a strong bond with the pet.\": \"<h1>Fundamentos da Criação de Animais</h1> A Criação de Animais é a arte e a ciência de cuidar e criar animais - especificamente animais de estimação! Este é um tópico complicado e levará algum tempo para dominá-lo – mas existem alguns conceitos básicos que ajudarão você a começar."
"<b>Grávida</b>": "é uma mulher que está em gestação. (No caso dos insetos, a fêmea não está realmente \\\"grávida\\\", mas guarda seu ovo febrilmente e não está disponível para aventuras.) A duração da gravidez é baseada na espécie. Também pode ser afetado por itens estáveis, até certo ponto."
"<b>Gulagra, Anarchy:</b> Sages hear this tale all too often": "Gulagra comes to you in a dream with the answer to a problem you've been desperate to solve. But when you awaken, you can't quite remember the solution. You help Gulagra in whatever ways are needed, desperate to re-envision the dream. But the dream was a lie. Gulagra will drive you mad before ever giving you any answers."
"<b>Gulagra, Anarquia:</b> Os sábios ouvem esta história com muita frequência": "Gulagra chega até você em um sonho com a resposta para um problema que você está desesperado para resolver. Mas quando você acorda, não consegue se lembrar da solução. Você ajuda Gulagra de todas as maneiras necessárias, desesperado para repensar o sonho. Mas o sonho era uma mentira. Gulagra vai te deixar louco antes mesmo de lhe dar qualquer resposta."
"<b>Ilmarian</b>": "Cavalo de resistência de sangue quente. Esses cavalos pálidos são tão rápidos quanto bonitos. Eles vêm do deserto de Ilmari, onde os habitantes os usam para atravessar o amplo terreno vazio. Sua pelagem é geralmente cinza a branca, com crinas combinando."
"<b>In Utero</b>": "este é um bebê que ainda não chegou! (A vaga do estábulo é automaticamente pré-reservada, para garantir que haja espaço para o bebê quando ele chegar.)"
"<b>Inativo</b>": "este estado de criação muito raro indica que o animal se esqueceu dos conceitos de sexo. Isso só pode acontecer com espécies de vida muito longa. Pode ser possível lembrar um animal de estimação adormecido sobre sexo de alguma forma, transformando-o em um animal de estimação registrado. Mas fazer isso exigiria muita experiência em criação e um forte vínculo com o animal de estimação.\""
"<b>Kurbone</b>": "Cavalo de tração de sangue frio. Vindo das partes mais frias das Montanhas Kur, os Kurbones são um cavalo excepcionalmente resistente que se destaca no transporte de cargas pesadas com firmeza por toda a terra. Eles são conhecidos por terem pelagens sólidas, embora às vezes também sejam padronizadas, e a parte inferior das pernas sempre apresenta franjas."
"<b>Leopard</b>": "Warm-Blooded Light-Draught horse. The rarer version of its blanketed cousin, this horse is covered head-to-toe in leopard-like spots."
"<b>Leopardo</b>": "Cavalo de sangue quente e corrente de ar leve. A versão mais rara de seu primo coberto, este cavalo é coberto da cabeça aos pés por manchas semelhantes às do leopardo."
"<b>Mating</b>": "your pets are currently having sex. This can take anywhere from a few minutes to many hours, depending on the pets' traits. If mating is successful, the male will enter Recovering state, the female will enter Pregnant state, and the baby's stable slot will be reserved automatically. (The baby's slot will be marked as \\\"In Utero\\\".)"
"<b>Notas da vereadora Irasce:</b> Apesar das afirmações de seus adeptos em contrário, Norala é um espírito da natureza de classe 3 relativamente fraco. A adoração de Norala é proibida, pois inevitavelmente significa infectar-se voluntariamente com licantropia, que geralmente é um destino pior que a morte": "não apenas a mente morre, mas o corpo se torna uma máquina de matar sem sentido."
"<b>Notas da vereadora Irasce:</b> esta história é excepcionalmente egoísta. Foi escrito anonimamente, mas é fácil adivinhar que um sacerdote de Arisetsu está por trás disso": "como é típico de seus sacerdotes, esta história a faz parecer fraca!"
"<b>Não registrado</b>": "esses animais de estimação nunca foram usados para reprodução. (Eles são capturados na natureza ou recém-nascidos.)"
"<b>Paint</b>": "Warm-Blooded Endurance-Riding horse. A well-rounded horse that's great for beginners. This horse, known for its large white-spotted coat pattern and frequent face and leg markings, hails from the Eltibule region originally. Now, it can be found all across the land, as it's one of the most common horses."
