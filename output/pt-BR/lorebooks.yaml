"<h1>Cuidado com os Godlings!</h1> Como espírito da natureza de classe 5, você tem um novo predador natural": "espíritos da natureza de classe 4! E também... outros espíritos da natureza Classe 5! E também: certos espíritos da natureza idiotas da Classe 3! Todos eles querem absorver você para aumentar seu próprio poder."
"<h1>Final Lesson": "Avoid The Traps</h1>"
"<h1>Guide To Nature Spirit Classification</h1>

<i>by Ilvadele Irasce, Council of Eight</i>

What we call \"gods\" are just manifestations of magical power that somehow gained sentience. They are not invincible. Well... most of them aren't. I've spent some time developing a system that explains their power levels:

<b>Class 1:</b> these gods are extraordinarily powerful, and can alter the entire world if they choose to. They represent concepts that affect every aspect of reality. Dreva, Tast, and Arisetsu are examples of this type of spirit.

<b>Class 2:</b> these gods are powerful enough to exert huge influence, but tend to \"pick their battles\" and focus their efforts so as not to be stretched too thin. Irhetsu, Gulagra, and Akhisa are examples.

<b>Class 3:</b> these are the weakest spirits that we still consider \"gods\". They are just barely powerful enough to stand up to an attack from a Class 1 god. They have much power, but it is largely bound up in their own safety, so they exhibit relatively little influence on the world at large. Most have pockets of worshipers, and many have a few small token effects on the world, such as a holiday, an artifact, or a small city of their own. Ilth Hale, Melkar, and Zare are examples.

<b>Class 4:</b> these are not gods, but just \"nature spirits\". They are powerful in a small geographic area, usually only a few miles at most. They tend to be well hidden, because it's common for Class 2 and Class 3 gods to seek these spirits out and consume them to bolster their own power. (This is beneath a class 1 god, who couldn't be bothered with such small amounts of power.)

<b>Class 5:</b> these are the weakest nature spirits. They are nothing more than a waft of magic anchored into reality, usually in a single object such as a tree, rock, or pond. Dryads are a common Class 5 nature spirit. The easiest way to kill them is simply to destroy their anchor.

My colleague, Jarmanger, believes there should be a sixth classification, and while I disagree, I will include it here:

<b>Class 0:</b> these are supremely powerful gods, with enough power to bend or break any aspect of reality. It's likely that these gods could destroy weaker (class 3? class 2?) gods, if they chose to. Jarmanger argues that Dreva, Vol, and Kirad should be in this category.": "<h1>Guia para classificação do espírito da natureza</h1>

<i>por Ilvadele Irasce, Conselho dos Oito</i>

O que chamamos de “deuses” são apenas manifestações de poder mágico que de alguma forma ganharam consciência. Eles não são invencíveis. Bem... a maioria deles não é. Passei algum tempo desenvolvendo um sistema que explica seus níveis de potência:

<b>Classe 1:</b> esses deuses são extraordinariamente poderosos e podem alterar o mundo inteiro se assim o desejarem. Eles representam conceitos que afetam todos os aspectos da realidade. Dreva, Tast e Arisetsu são exemplos desse tipo de espírito.

<b>Classe 2:</b> esses deuses são poderosos o suficiente para exercer enorme influência, mas tendem a “escolher suas batalhas” e concentrar seus esforços para não serem sobrecarregados. Irhetsu, Gulagra e Akhisa são exemplos.

<b>Classe 3:</b> estes são os espíritos mais fracos que ainda consideramos “deuses”. Eles são poderosos o suficiente para resistir a um ataque de um deus de classe 1. Têm muito poder, mas este está em grande parte ligado à sua própria segurança, pelo que exibem relativamente pouca influência no mundo em geral. A maioria tem grupos de adoradores e muitos têm alguns pequenos efeitos simbólicos no mundo, como um feriado, um artefato ou uma pequena cidade própria. Ilth Hale, Melkar e Zare são exemplos.

<b>Classe 4:</b> estes não são deuses, mas apenas “espíritos da natureza”. Eles são poderosos em uma pequena área geográfica, geralmente a apenas alguns quilômetros, no máximo. Eles tendem a ficar bem escondidos, porque é comum que deuses de Classe 2 e Classe 3 procurem esses espíritos e os consumam para reforçar seu próprio poder. (Isso está abaixo de um deus de classe 1, que não se incomodaria com tão pequenas quantidades de poder.)

<b>Classe 5:</b> estes são os espíritos da natureza mais fracos. Eles nada mais são do que uma lufada de magia ancorada na realidade, geralmente em um único objeto, como uma árvore, uma pedra ou um lago. Dríades são um espírito natural comum da Classe 5. A maneira mais fácil de matá-los é simplesmente destruir sua âncora.

Meu colega Jarmanger acredita que deveria haver uma sexta classificação e, embora eu discorde, vou incluí-la aqui:

<b>Classe 0:</b> estes são deuses extremamente poderosos, com poder suficiente para dobrar ou quebrar qualquer aspecto da realidade. É provável que esses deuses possam destruir deuses mais fracos (classe 3? classe 2?), Se assim o desejarem. Jarmanger argumenta que Dreva, Vol e Kirad deveriam estar nesta categoria."
"<h1>History of Arisetsu</h1>

<i>(Council Annotated Edition)</i>

The Fennyra Crystal, the treasured memories of a million long-dead elves, shows a time unlike ours. In the age when humans and orcs were simple primitives, elves were more magical, more in tune with other realms, and their lifespans much longer. Although some sang songs of worship to Cae-a-lee, most elves cared little about gods, so the other elven gods were small.

The Crystal's last memory ends with the Autumn Felling, when half of all elves died and the rest were left in agony and despair. Cae-a-lee died too, right when elves needed her most. As elven lands rapidly fell to other races, two minor gods came to their rescue. Ir-hetsu, god of Wind, and his sister Aris, god of Warmth, guarded the last million living elves in the city now called Arisolme.

As the elves regained their strength, these gods became strong too. Irhetsu took on speech, then spoken stories, and soon enough all stories. Arisetsu remained the god of warmth, but also hope. Stories, hope, dreams, and time -- these things guided the elves back to a place of strength. And in a few short centuries Arisetsu had become a force beyond all recognition, the god of so many concepts that listing them became an ordeal. The other gods of the world were dwarfed by her magnificence, and their resentment grew.

But elves hope for peace, and not peace through excess strength. So Arisetsu in her grace and wisdom gave birth to new gods to represent concepts elves most respected. Her first child was Elshana, god of Creativity. Next came Errana, god of Food and Sex. Third was Dreva, god of Balance in Nature. 

And finally, Arisetsu could focus on simple Hope once again. Her light dimmed, but it will never expire, for Hope shall always light our darkness and save us from despair.

--

<b>Councilwoman Irasce's notes:</b> this history is exceptionally self-serving. It was written anonymously but it's easy to guess that a priest of Arisetsu is behind it: as is typical of her priests, this story makes her sound weak!

This story would have you believe that Arisetsu gave up most of her power and became a minor god. But the sheer scope of Arisetsu's power at its peak was incomprehensible, so the fact that her power level is now 'comprehensible' does not mean it is small.

Arisetsu is a class 1 nature spirit, capable of massive creation or destruction. Her priests bring comfort and healing to the sick and the needy around the world, and they are welcome in all Council cities. We are proud and honored to facilitate the worship of this kind spirit. However, the Council monitors her priesthood carefully, for although Arisetsu is ideologically a pacifist, she's also extremely pragmatic. Her paladins guard against \"threats that would extinguish hope among the faithful,\" which might as well mean \"anybody that angers Arisetsu.\" And the occasional news of combusting villains reminds us that Arisetsu is still the god of Warmth, and her priests can make things very warm indeed.

Lastly, for those not trained in classical Elvish, I want to bring attention to the seeming absence of the two other elder elven gods: Miraverre, goddess of Dreams, and Laeth, goddess of Time. These two stood alongside Irhetsu and Arisetsu in the crucial years after the Autumn Felling, so why are they ignored here? The answer is that they are referenced in an idiomatic form: <b>\"Stories, hope, dreams, and time -- these things guided the elves back to a place of strength.\"</b> This line, or a similar one, is used in many ancient Elvish poems to pay homage to the four old elven gods.": "<h1>História de Arisetsu</h1>

<i>(Edição Anotada pelo Conselho)</i>

O Cristal Fennyra, as memórias preciosas de um milhão de elfos mortos há muito tempo, mostra uma época diferente da nossa. Na época em que humanos e orcs eram simples primitivos, os elfos eram mais mágicos, mais sintonizados com outros reinos e sua expectativa de vida era muito mais longa. Embora alguns cantassem canções de adoração a Cae-a-lee, a maioria dos elfos pouco se importava com os deuses, então os outros deuses élficos eram pequenos.

A última memória do Cristal termina com o Outono, quando metade de todos os elfos morreu e o resto ficou em agonia e desespero. Cae-a-lee também morreu, bem quando os elfos mais precisavam dela. À medida que as terras élficas caíam rapidamente para outras raças, dois deuses menores vieram em seu socorro. Ir-hetsu, deus do Vento, e sua irmã Aris, deus do Calor, guardavam o último milhão de elfos vivos na cidade hoje chamada Arisolme.

À medida que os elfos recuperaram a força, esses deuses também se tornaram fortes. Irhetsu começou a falar, depois contou histórias e logo todas as histórias. Arisetsu continuou sendo o deus do calor, mas também da esperança. Histórias, esperança, sonhos e tempo – essas coisas guiaram os elfos de volta a um lugar de força. E em poucos séculos, Arisetsu tornou-se uma força além de qualquer reconhecimento, o deus de tantos conceitos que listá-los tornou-se uma provação. Os outros deuses do mundo foram ofuscados pela sua magnificência e o seu ressentimento cresceu.

Mas os elfos esperam pela paz, e não pela paz através do excesso de força. Então Arisetsu em sua graça e sabedoria deu origem a novos deuses para representar os conceitos mais respeitados pelos elfos. Seu primeiro filho foi Elshana, deus da Criatividade. Em seguida veio Errana, deus da comida e do sexo. O terceiro foi Dreva, deus do equilíbrio na natureza. 

E finalmente, Arisetsu poderia se concentrar na simples Esperança mais uma vez. Sua luz diminuiu, mas nunca expirará, pois a Esperança sempre iluminará nossas trevas e nos salvará do desespero.

--

<b>Notas da vereadora Irasce:</b> esta história é excepcionalmente egoísta. Foi escrito anonimamente, mas é fácil adivinhar que um sacerdote de Arisetsu está por trás disso: como é típico de seus sacerdotes, esta história a faz parecer fraca!

Esta história faria você acreditar que Arisetsu desistiu da maior parte de seu poder e se tornou um deus menor. Mas o alcance do poder de Arisetsu em seu auge era incompreensível, então o fato de seu nível de poder ser agora “compreensível” não significa que seja pequeno.

Arisetsu é um espírito da natureza de classe 1, capaz de criação ou destruição massiva. Os seus sacerdotes trazem conforto e cura aos doentes e necessitados em todo o mundo, e são bem-vindos em todas as cidades do Conselho. Estamos orgulhosos e honrados em facilitar a adoração deste espírito bondoso. No entanto, o Conselho monitoriza cuidadosamente o seu sacerdócio, pois embora Arisetsu seja ideologicamente pacifista, ela também é extremamente pragmática. Seus paladinos se protegem contra “ameaças que extinguiriam a esperança entre os fiéis”, o que poderia muito bem significar “qualquer pessoa que irrite Arisetsu”. E as notícias ocasionais de vilões em combustão nos lembram que Arisetsu ainda é o deus do Calor, e seus sacerdotes podem realmente aquecer as coisas.

Por último, para aqueles que não são treinados em élfico clássico, quero chamar a atenção para a aparente ausência dos outros dois deuses élficos mais velhos: Miraverre, deusa dos Sonhos, e Laeth, deusa do Tempo. Esses dois estiveram ao lado de Irhetsu e Arisetsu nos anos cruciais após o Outono, então por que eles são ignorados aqui? A resposta é que eles são referenciados de forma idiomática: <b>\"Histórias, esperança, sonhos e tempo - essas coisas guiaram os elfos de volta a um lugar de força.\"</b> Esta frase, ou semelhante, é usada em muitos poemas élficos antigos para homenagear os quatro antigos deuses élficos."
"<h1>History of Dale Renthian</h1>

<i>(Council Annotated Edition)</i>

Back when Tast and Gulagra were at the height of their friendship, they waged war on the other gods and many died. The elves once had a goddess of creative beauty named Elshana, and she was mortally wounded in the fighting, with nothing left but a single anchor point in reality. Most gods in such a state are content to quietly fade away, but a god of creativity is also a god of persistence, because creativity requires you to never stop trying. And so Elshana hurtled toward the nearest village she could find and sought the most creative person there, and begged his help.

Dale Renthian was a human painter of some skill, and he reluctantly agreed to let Elshana live in his head and be his muse. Elshana ceased to be, becoming just a voice, but she had much to say. Dale's creativity exploded, his paintings became wildly imaginative, and he soon founded the Renthian Style of art, mixing simple magics with pigments to create harrowing juxtapositional paintings. He attracted many students and grew quite wealthy, but years later, he realized he was squandering his gift. This is the part of his life that is so often told in tall tales and epic poems: he wandered the world on horseback, righting wrongs with creative gadgetry and giving inspiration to those that needed it most.

One day he was killed by a jealous sculptor, but he soon returned as a god, having managed to inadvertently leave many anchors throughout the world. And even now, Dale Renthian is the most common god to be found among human civilizations. If you come across an older human, covered in spilled paint, arguing with himself, it may be Dale Renthian. Buy him a beer and see what he has to say.

<b>Councilwoman Irasce's notes:</b> Dale Renthian is a class 3 nature spirit; he is generally friendly and is welcome in any Council city, but be warned that he has formidable powers. One of his most dangerous powers is that of persuasion, for he has many radical and foolish ideas. Wise citizens should temper his enthusiasm with natural human pessimism. Remember that almost everything a creative person comes up with is useless, even though it may seem interesting on the surface.": "<h1>História de Dale Renthian</h1>

<i>(Edição Anotada pelo Conselho)</i>

Na época em que Tast e Gulagra estavam no auge da amizade, eles travaram guerra contra os outros deuses e muitos morreram. Os elfos já tiveram uma deusa da beleza criativa chamada Elshana, e ela foi mortalmente ferida na luta, sem restar nada além de um único ponto de ancoragem na realidade. A maioria dos deuses nesse estado se contenta em desaparecer silenciosamente, mas um deus da criatividade também é um deus da persistência, porque a criatividade exige que você nunca pare de tentar. E então Elshana correu em direção à aldeia mais próxima que conseguiu encontrar e procurou a pessoa mais criativa de lá, e implorou sua ajuda.

Dale Renthian era um pintor humano com alguma habilidade e relutantemente concordou em deixar Elshana viver em sua cabeça e ser sua musa. Elshana deixou de existir, tornando-se apenas uma voz, mas tinha muito a dizer. A criatividade de Dale explodiu, suas pinturas tornaram-se extremamente imaginativas e ele logo fundou o estilo de arte Renthian, misturando magia simples com pigmentos para criar pinturas justaposicionais angustiantes. Ele atraiu muitos estudantes e ficou bastante rico, mas anos depois percebeu que estava desperdiçando seu dom. Esta é a parte de sua vida que é tantas vezes contada em contos fantásticos e poemas épicos: ele vagou pelo mundo a cavalo, corrigindo erros com dispositivos criativos e dando inspiração àqueles que mais precisavam.

Um dia foi morto por um escultor ciumento, mas logo voltou como um deus, tendo conseguido inadvertidamente deixar muitas âncoras pelo mundo. E mesmo agora, Dale Renthian é o deus mais comum entre as civilizações humanas. Se você se deparar com um humano mais velho, coberto de tinta derramada, discutindo consigo mesmo, pode ser Dale Renthian. Compre uma cerveja para ele e veja o que ele tem a dizer.

<b>Notas da vereadora Irasce:</b> Dale Renthian é um espírito da natureza de classe 3; ele é geralmente amigável e bem-vindo em qualquer cidade do Conselho, mas esteja avisado que ele tem poderes formidáveis. Um dos seus poderes mais perigosos é o de persuasão, pois tem muitas ideias radicais e tolas. Os cidadãos sábios deveriam moderar o seu entusiasmo com o pessimismo humano natural. Lembre-se de que quase tudo que uma pessoa criativa inventa é inútil, mesmo que pareça interessante superficialmente."
"<h1>History of Psi Mantises</h1> <h2>Dawn of the Perfect Species</h2>

<i>By Maletaxis</i>

<h2>The First Era</h2>

Our creator, the great wizard Dalvos, spent years perfecting his design for psychic mantises. His work began approximately six years ago in the wilds of Eltibule and Sedgwick Forest, wildernesses of little cultural importance. He noticed that the area was home to giant mantises, and wondered if he could make them intelligent enough to be good servants to him. Thus began Revision 1.

We have Dalvos's notes for each revision of psychic mantis, but they are sparse and often use cryptic abbreviations. We do not know exactly what changed between each revision; we can only conjecture from contextual clues. But we do know that the first forty-four revisions were failures: the resulting creatures were not sufficiently intelligent and were released into the wilds of Eltibule.

His notes for revision 72 indicate satisfaction with the species' intellect. After that, he turned to improving their utility by adding psychic powers. His notes for revision 108 indicate success: the new generation's psychic powers bred true, and all individuals had at least some psychic abilities.

These mantises, collectively called the \"first-era\" mantises, are capable of telepathic communication, have psychically-enhanced senses, and can usually manifest their willpower as a psychic attack. Many individuals have other powers, but these additional powers are not passed on to their descendants.

Red Wing mantises are perhaps the most important first-era mantises. It is believed they descend from members of the 60th, 62nd, and 63rd revisions. The Veiny Mantises are also first-era (of unknown revision). 

First-era mantises can be recognized by their veiny wings. They are stronger and more resilient than later mantids, but their psychic powers are weak, comparable perhaps to a gifted psychic elf.

<h2>The Second Era</h2>

Revisions from 72 to 140 are called \"second era\" mantises. This era saw the development of the psilobe, a special portion of the mantis brain designed to enhance our psychic powers. These mantises were unfortunately unstable: their primitive psilobes caused eventual brain damage and most suffered from schizophrenia and paranoia. 

We do not know the fate of most second era mantises. They were released into the wilds of Eltibule, and may have wandered anywhere. But we presume that most are dead. Three important exceptions are the \"cave mantises\" (from the relatively stable revision #108), the Yellow Mantids, known for their explosive powers and extreme instability, and the Tragic Tree Mantises of Sedgewick Forest (TTMSFs).

Second-era mantises are visually recognizable by their single-color carapaces. Because their psilobes behave unpredictably, many -- perhaps most -- of these mantises have unique and bizarre psychic gifts. This makes their mental instability all the more tragic. It also makes them horrifically dangerous.

<h2>The Third Era</h2>

Revisions from 221 onwards are called \"third era\" or \"true\" psychic mantises. Having perfected the psilobe, Dalvos focused on improving temperament, intellect, longevity, memory, and dexterity. Many mantises from generation 263 onwards have reliable short-distance flight.

Third-era mantises are visually distinguishable by their elegant pinkish hue and translucent wings.

<h2>The End of Revisions</h2>

Then, having apparently perfected the design of the psi-mantis, Dalvos left. We do not know why. He had amassed an army of thousands of loyal mantises. We expected an opportunity to defend our creator against the many evil bipeds that want him destroyed, but he had different plans. He simply set us free. His parting words are ingrained into our memories:

<indent=15><i>\"Okay everybody, I have an announcement: I have to go, and I won't be coming back. You guys have been great. All of you! You're all free now, and I hope you have wonderful lives. Create amazing cultures. Dominate the world, maybe! Hah! Thanks for everything, but listen: don't follow me. That's an order. And take care of the brain-bugs, okay?\"</i></indent>

These sacred words are a comfort to us in difficult times. Dalvos encoded many instructions in his final missive, and some of us believe his words hide further secrets that we will only understand when we are ready.

Truly Dalvos is a genius. If he has not yet ascended to godhood, we expect that he will inevitably do so in time. And we are evidence of why! Psi-mantises are just one of the five known species Dalvos has created. Is there anything more godly than creating new forms of life? The answer is no.": "<h1>História dos Louva-a-deus Psi</h1> <h2>Amanhecer da Espécie Perfeita</h2>

<i>Por Maletaxis</i>

<h2>A Primeira Era</h2>

Nosso criador, o grande mago Dalvos, passou anos aperfeiçoando seu projeto de louva-a-deus psíquicos. Seu trabalho começou há aproximadamente seis anos nas florestas de Eltibule e Sedgwick, áreas selvagens de pouca importância cultural. Ele percebeu que a área abrigava louva-a-deus gigantes e se perguntou se poderia torná-los inteligentes o suficiente para serem bons servos para ele. Assim começou a Revisão 1.

Temos as notas de Dalvos para cada revisão do louva-a-deus psíquico, mas elas são esparsas e costumam usar abreviações enigmáticas. Não sabemos exatamente o que mudou entre cada revisão; só podemos conjecturar a partir de pistas contextuais. Mas sabemos que as primeiras quarenta e quatro revisões foram um fracasso: as criaturas resultantes não eram suficientemente inteligentes e foram libertadas nas florestas de Eltibule.

Suas notas para a revisão 72 indicam satisfação com o intelecto da espécie. Depois disso, ele passou a melhorar sua utilidade adicionando poderes psíquicos. Suas notas para a revisão 108 indicam sucesso: os poderes psíquicos da nova geração se tornaram verdadeiros e todos os indivíduos tinham pelo menos algumas habilidades psíquicas.

Esses louva-a-deus, chamados coletivamente de louva-a-deus da \"primeira era\", são capazes de comunicação telepática, têm sentidos aprimorados psiquicamente e geralmente podem manifestar sua força de vontade como um ataque psíquico. Muitos indivíduos têm outros poderes, mas esses poderes adicionais não são transmitidos aos seus descendentes.

Os louva-a-deus Red Wing são talvez os louva-a-deus mais importantes da primeira era. Acredita-se que descendam de membros das 60ª, 62ª e 63ª revisões. Os Veiny Mantises também são da primeira era (de revisão desconhecida). 

Os louva-a-deus da primeira era podem ser reconhecidos por suas asas venosas. Eles são mais fortes e resistentes do que os mantídeos posteriores, mas seus poderes psíquicos são fracos, talvez comparáveis ​​aos de um elfo psíquico talentoso.

<h2>A Segunda Era</h2>

As revisões de 72 a 140 são chamadas de louva-a-deus da \"segunda era\". Esta era viu o desenvolvimento do psilobo, uma porção especial do cérebro do louva-a-deus projetada para aprimorar nossos poderes psíquicos. Infelizmente, esses louva-a-deus eram instáveis: seus psilobos primitivos causavam eventuais danos cerebrais e a maioria sofria de esquizofrenia e paranóia. 

Não sabemos o destino da maioria dos louva-a-deus da segunda era. Eles foram soltos na selva de Eltibule e podem ter vagado por qualquer lugar. Mas presumimos que a maioria está morta. Três exceções importantes são os \"louva-a-deus das cavernas\" (da revisão relativamente estável #108), os Louva-a-deus Amarelos, conhecidos por seus poderes explosivos e extrema instabilidade, e os Louva-a-deus da Árvore Trágica da Floresta de Sedgewick (TTMSFs).

Os louva-a-deus da segunda era são visualmente reconhecíveis por suas carapaças de uma única cor. Como seus psilobos se comportam de maneira imprevisível, muitos – talvez a maioria – desses louva-a-deus têm dons psíquicos únicos e bizarros. Isso torna sua instabilidade mental ainda mais trágica. Também os torna terrivelmente perigosos.

<h2>A Terceira Era</h2>

As revisões de 221 em diante são chamadas de \"terceira era\" ou \"verdadeiros\" louva-a-deus psíquicos. Tendo aperfeiçoado o psilobo, Dalvos se concentrou em melhorar o temperamento, o intelecto, a longevidade, a memória e a destreza. Muitos louva-a-deus da geração 263 em diante têm voos confiáveis ​​de curta distância.

Os louva-a-deus da terceira era são visualmente distinguíveis por seu elegante tom rosado e asas translúcidas.

<h2>O fim das revisões</h2>

Então, tendo aparentemente aperfeiçoado o design do psi-louva-a-deus, Dalvos partiu. Não sabemos por quê. Ele acumulou um exército de milhares de louva-a-deus leais. Esperávamos uma oportunidade de defender nosso criador contra os muitos bípedes malvados que queriam destruí-lo, mas ele tinha planos diferentes. Ele simplesmente nos libertou. Suas palavras de despedida estão enraizadas em nossas memórias:

<indent=15><i>\"Ok, pessoal, tenho um comunicado: preciso ir e não voltarei. Vocês têm sido ótimos. Todos vocês! Vocês estão todos livres agora e espero que tenham vidas maravilhosas. Criem culturas incríveis. Dominem o mundo, talvez! Hah! Obrigado por tudo, mas escutem: não me sigam. Isso é uma ordem. E cuidem dos bugs cerebrais, ok?\"</i></indent>

Estas palavras sagradas são um conforto para nós em tempos difíceis. Dalvos codificou muitas instruções em sua missiva final, e alguns de nós acreditamos que suas palavras escondem outros segredos que só compreenderemos quando estivermos prontos.

Verdadeiramente Dalvos é um gênio. Se ele ainda não ascendeu à divindade, esperamos que inevitavelmente o faça com o tempo. E nós somos uma prova do porquê! Os psi-mantises são apenas uma das cinco espécies conhecidas que Dalvos criou. Existe algo mais piedoso do que criar novas formas de vida? A resposta é não."
"<h1>Horse Breeds: A Primer</h1> There are currently 10 known breeds of horses on Alharth, each with their own quirks and distinct appearances. While each breed excels at particular physical attributes, the world's leading geneticists speculate that any breed can be used for any purpose if bred correctly.

<h1>The Breeds</h1>

<b>Standardbred</b>: Hot-Blooded Riding horse. Standardbreds are from the Serbule region of Alharth, and are known for their solid coats and manes. They are quick with high Temperament, making them sometimes difficult to control. They are some of the most common horses.

<b>Kurbone</b>: Cold-Blooded Draught horse. Hailing from the coldest reaches of the Kur Mountains, Kurbones are an exceptionally hardy horse that excels at carrying heavy loads unwaveringly across the land. They are known to have solid coats, though sometimes are patterned as well, and their lower legs always feature feathering.

<b>Ilmarian</b>: Hot-Blooded Endurance-Riding horse. These pale horses are as quick as they are beautiful. They hail from the desert of Ilmari, where denizens use them to traverse the wide empty terrain. Their coats are most often gray to white, with manes to match.

<b>Plateau Pony</b>: Cold-Blooded Pack-Riding horse. Small of stature but big of heart, these are some of the friendliest horses on Alharth. They are native to the Gazluk Plateau, where their small size helps them to traverse the rocky terrain with ease. They are often seen with patterned coats, but can be solid as well.

<b>Satincoat</b>: Hot-Blooded Riding horse. It's unclear whether this horse originated on the Ranalon homeworld or in Sun Vale, but it's a mighty fine horse regardless. It is known for the distinctive sheen of its coat, which is always completely solid.

<b>Statehelm</b>: Warm-Blooded Light-Draught horse. A jack of all trades, master of none, this horse is widely regarded and used across the land, and many speculate that it originates in Statehelm, hence the name. Its coat is sheer black, with markings of any kind being rare. Like the Kurbone, their legs always sport feathering.

<b>Blanketed</b>: Warm-Blooded Riding horse. An even-keeled horse fit for riding. It is known for the distinct \"blanket\" coat pattern that drapes over its hind quarters.

<b>Leopard</b>: Warm-Blooded Light-Draught horse. The rarer version of its blanketed cousin, this horse is covered head-to-toe in leopard-like spots.

<b>Paint</b>: Warm-Blooded Endurance-Riding horse. A well-rounded horse that's great for beginners. This horse, known for its large white-spotted coat pattern and frequent face and leg markings, hails from the Eltibule region originally. Now, it can be found all across the land, as it's one of the most common horses.

<b>???</b>: Scholars have reported a mysterious 10th breed of horse, but the best geneticists in the land are currently incapable of identifying it.": "<h1>Raças de cavalos: uma introdução</h1> Existem atualmente 10 raças de cavalos conhecidas em Alharth, cada uma com suas peculiaridades e aparências distintas. Embora cada raça se destaque em atributos físicos específicos, os principais geneticistas do mundo especulam que qualquer raça pode ser usada para qualquer propósito, se criada corretamente.

<h1>As raças</h1>

<b>Standardbred</b>: Cavalo de montaria de sangue quente. Os Standardbreds são da região Serbule de Alharth e são conhecidos por sua pelagem e crina sólidas. Eles são rápidos e têm temperamento alto, o que às vezes os torna difíceis de controlar. Eles são alguns dos cavalos mais comuns.

<b>Kurbone</b>: Cavalo de tração de sangue frio. Vindo das partes mais frias das Montanhas Kur, os Kurbones são um cavalo excepcionalmente resistente que se destaca no transporte de cargas pesadas com firmeza por toda a terra. Eles são conhecidos por terem pelagens sólidas, embora às vezes também sejam padronizadas, e a parte inferior das pernas sempre apresenta franjas.

<b>Ilmarian</b>: Cavalo de resistência de sangue quente. Esses cavalos pálidos são tão rápidos quanto bonitos. Eles vêm do deserto de Ilmari, onde os habitantes os usam para atravessar o amplo terreno vazio. Sua pelagem é geralmente cinza a branca, com crinas combinando.

<b>Pônei Plateau</b>: Cavalo de montaria de sangue frio. Pequenos de estatura, mas grandes de coração, estes são alguns dos cavalos mais amigáveis ​​de Alharth. Eles são nativos do Planalto Gazluk, onde seu pequeno tamanho os ajuda a atravessar terrenos rochosos com facilidade. Eles costumam ser vistos com casacos estampados, mas também podem ser sólidos.

<b>Satincoat</b>: Cavalo de montaria de sangue quente. Não está claro se este cavalo se originou no mundo natal de Ranalon ou em Sun Vale, mas é um cavalo poderoso e excelente de qualquer maneira. É conhecido pelo brilho característico de sua pelagem, sempre totalmente sólida.

<b>Statehelm</b>: Cavalo de sangue quente e corrente de ar leve. Um pau para toda obra, mestre de ninguém, este cavalo é amplamente considerado e usado em todo o país, e muitos especulam que ele é originário de Statehelm, daí o nome. Sua pelagem é totalmente preta, sendo raras marcas de qualquer tipo. Assim como o Kurbone, suas pernas sempre apresentam franjas.

<b>Cobertor</b>: Cavalo de montaria de sangue quente. Um cavalo de quilha equilibrada, adequado para cavalgar. É conhecido pelo distinto padrão de pelagem em \"cobertor\" que cobre seus quartos traseiros.

<b>Leopardo</b>: Cavalo de sangue quente e corrente de ar leve. A versão mais rara de seu primo coberto, este cavalo é coberto da cabeça aos pés por manchas semelhantes às do leopardo.

<b>Pintura</b>: Cavalo de equitação de resistência de sangue quente. Um cavalo bem arredondado, ótimo para iniciantes. Este cavalo, conhecido por seu grande padrão de pelagem com manchas brancas e marcas frequentes no rosto e nas pernas, é originário da região de Eltibule. Agora pode ser encontrado em todo o país, pois é um dos cavalos mais comuns.

<b>???</b>: Estudiosos relataram uma misteriosa décima raça de cavalo, mas os melhores geneticistas do país são atualmente incapazes de identificá-la."
"<h1>How To Stop Being a Spirit Fox</h1> You already know how to cure this curse": "you just need someone to give you a spirit stone! They'll become a fox, and you'll be free!"
"<h1>Leeka and the Blade Trials, Chapter 1</h1>

<i>by Garauna, daughter of Umaran</i>

Leeka stomped angrily through the swamp, the legendary blade Heartseeker slung carelessly behind her back. She was really tired of Heartseeker's bullshit.

Especially since the sword was why she was here, in the swamps of Untanigar, in the remotest regions of the Crone Hegemony. Somewhere in this swamp were the Blade Trials of Melkar. Apparently.

\"I tell you, you orcs are more like goblins than you want to admit,\" came a raspy voice from her back. Heartseeker sounded like the orc elders Leeka'd known growing up, their voices ruined from decades of smoking raw gur-horta. But the elders had been wise. They chose their words carefully. \"You think you're big important races. But you're both so shitty!\"

\"Shut up, sword.\"

\"You don't see elves living in this fucking swamp, do ya? This is goblin territory. And swamp-orc territory. You live in the shitholes of the world because you've been run out of everywhere else. You're like a novice swordsman who decides after one lesson that he's a master, and starts challenging experts to duels. And no surprise, you lose. But even though you keep getting beat down, you just keep challenging people to duels! You orcs think you're these noble savages, worthy of respect, but you're not even master swordsmen, let alone--\"

Leeka drew the sword in a fraction of a second and held it in front of her face. \"I <b>AM</b> a master swordsman!\" She tried to keep her fury from boiling over, but it was escaping into her voice. \"And you are an instrument. Nothing more. And if you don't shut up, I will hurl you into this swamp. You will become some swamp-goblin's novelty talking vegetable chopper for the next hundred years! Is that your wish, sword?\"

She held the blade in front of her, waiting for a response. She shook it a bit. When it said nothing, she sighed and sheathed it onto her back.

\"I didn't mean YOU weren't a master swordsman,\" said the sword, softly, a moment later. \"It was a metaphor. That's exactly what I'm saying! You orcs can't tell nuance from a punch to the face! If you -- wait WAIT WAIT!\" Leeka had drawn the blade again and was winding up to hurl Heartseeker. \"Wait! Look, we're almost there. That's the trial. Look! No, look where I'm pointing!\" The blade adjusted itself in her hand to tilt a few degrees to the right. 

In the distance was a hill shrouded in misty swamp vapors, and embedded in that hill was a huge stone door.

It took another half hour to reach the door, plus a fifteen minute argument wherein Leeka shoved Heartseeker into a rotten tree until it apologized. When she finally approached the massive stone entryway, it was dusk.

Leeka stared at the door for a minute, hands on hips, considering it. It was huge, almost twice as tall as her, and made of old granite slabs, but it looked like it opened easily. A square stone button was visible to one side -- a sign of dwarven engineering. No vines or fungus covered the button and the huge stone hinges were miraculously free of growth. In fact, the whole area was very well maintained. Someone came here often. Very often, probably, or it would have goblin squatters living in it. And if there were goblins, she would have met the advance guards by now. Still, something else could be squatting, perhaps. After a minute of considering, Leeka kicked the button with her foot, then dodged out of the way of any sudden projectiles.

The door slowly scraped open with a deafening noise. No arrows shot out. Inside was a wide stone hallway, perhaps twenty feet across, and not far up ahead, the hall abruptly turned left. There were no other visible features aside from a second stone switch on the inside, presumably to reopen the door.

As soon as the door finished sliding out of the way it immediately began sliding closed. Leeka made no motion to enter, just stood and studied. When the door had closed, she turned and went to make camp a few hundred feet away.": "<h1>Leeka e as Provas da Lâmina, Capítulo 1</h1>

<i>por Garauna, filha de Umaran</i>

Leeka pisou furiosamente pelo pântano, a lendária lâmina Heartseeker pendurada descuidadamente nas costas. Ela estava realmente cansada das besteiras de Heartseeker.

Especialmente porque a espada era a razão pela qual ela estava aqui, nos pântanos de Untanigar, nas regiões mais remotas da Hegemonia da Anciã. Em algum lugar deste pântano estavam os Blade Trials of Melkar. Aparentemente.

\"Eu te digo, vocês orcs são mais parecidos com goblins do que vocês querem admitir,\" veio uma voz rouca de suas costas. Heartseeker soava como os orcs anciões que Leeka conheceu enquanto crescia, suas vozes arruinadas por décadas fumando gur-horta crua. Mas os mais velhos foram sábios. Eles escolheram suas palavras com cuidado. \"Vocês acham que são corridas importantes. Mas vocês dois são uma merda!\"

\"Cale a boca, espada.\"

\"Você não vê elfos vivendo nesta porra de pântano, não é? Este é território dos goblins. E território dos orcs do pântano. Você vive nos buracos de merda do mundo porque foi expulso de todos os outros lugares. Você é como um espadachim novato que decide depois de uma lição que é um mestre e começa a desafiar especialistas para duelos. E sem surpresa, você perde. Mas mesmo que você continue sendo espancado, você continua desafiando as pessoas para duelos! Seus orcs acho que vocês são esses nobres selvagens, dignos de respeito, mas vocês nem são mestres espadachins, muito menos...”

Leeka desembainhou a espada numa fração de segundo e segurou-a na frente do rosto. \"EU <b>SOU</b> um mestre espadachim!\" Ela tentou evitar que sua fúria transbordasse, mas ela estava escapando em sua voz. \"E você é um instrumento. Nada mais. E se você não calar a boca, eu vou jogá-lo neste pântano. Você se tornará o cortador de legumes falante de algum goblin do pântano pelos próximos cem anos! É esse o seu desejo, espada?\"

Ela segurou a lâmina à sua frente, esperando por uma resposta. Ela balançou um pouco. Quando não disse nada, ela suspirou e colocou-o nas costas.

“Eu não quis dizer que VOCÊ não era um mestre espadachim”, disse a espada, suavemente, um momento depois. \"Foi uma metáfora. É exatamente isso que estou dizendo! Vocês, orcs, não conseguem distinguir as nuances de um soco no rosto! Se vocês - espere, ESPERE!\" Leeka puxou a lâmina novamente e estava prestes a lançar Heartseeker. \"Espere! Olha, estamos quase lá. Esse é o julgamento. Olha! Não, veja para onde estou apontando!\" A lâmina se ajustou em sua mão para inclinar alguns graus para a direita. 

Ao longe havia uma colina envolta em vapores enevoados do pântano, e embutida naquela colina havia uma enorme porta de pedra.

Demorou mais meia hora para chegar à porta, além de uma discussão de quinze minutos em que Leeka empurrou Heartseeker contra uma árvore podre até que ele se desculpasse. Quando ela finalmente se aproximou da enorme entrada de pedra, já estava anoitecendo.

Leeka olhou para a porta por um minuto, com as mãos nos quadris, pensando no assunto. Era enorme, quase duas vezes mais alto que ela, e feito de velhas lajes de granito, mas parecia que abria facilmente. Um botão quadrado de pedra era visível de um lado – um sinal da engenharia anã. Nenhuma videira ou fungo cobria o botão e as enormes dobradiças de pedra estavam milagrosamente livres de crescimento. Na verdade, toda a área estava muito bem conservada. Alguém vinha aqui com frequência. Muito frequentemente, provavelmente, ou haveria invasores goblins morando lá. E se houvesse goblins, ela já teria conhecido os guardas avançados. Ainda assim, algo mais poderia estar de cócoras, talvez. Após um minuto de reflexão, Leeka chutou o botão com o pé e depois se esquivou de qualquer projétil repentino.

A porta se abriu lentamente com um barulho ensurdecedor. Nenhuma flecha foi disparada. Lá dentro havia um amplo corredor de pedra, talvez com seis metros de largura, e não muito à frente, o corredor virava abruptamente à esquerda. Não havia outras características visíveis além de um segundo interruptor de pedra no interior, provavelmente para reabrir a porta.

Assim que a porta terminou de deslizar para fora do caminho, ela imediatamente começou a deslizar e se fechar. Leeka não fez nenhum movimento para entrar, apenas ficou parada e estudou. Quando a porta se fechou, ela se virou e foi acampar a algumas centenas de metros de distância."
"<h1>Leeka and the Blade Trials, Chapter 2</h1>

\"Okay, so I'm trying not to call you stupid here, but you're making camp in a swamp instead of going indoors. Can you just explain the logic? The door's right there! You aren't going to sleep well in the swamp. You'd be better off getting this over with.\" Heartseeker lay resting against Leeka's backpack as she struggled to flatten the earth enough to let her sit.

Leeka glared at the sword, snarled, then continued with her work.

\"Come on,\" said the sword. \"We need to work together here. I'm on trial just as much as you!\"

Leeka opened her pack and unwrapped dinner, a portion of jerky-flavored lembas brick that she'd bought in Ormala City two weeks ago. She sat down and tore off a piece of the brick with her teeth, sweat streaming down her face in the fetid night air. She picked up Heartseeker and considered its heft. A clunky blade, a bit too large for what it was. A bit too heavy.

Her mother had wielded this blade in many battles, and taught young Leeka that one day the blade would be handed down to her. And after some misadventures, it had... but the sword couldn't do the fabulous things her mother could make it do. No fire, no sparks, no slicing through metal like it was butter. It was a sharp, resilient blade with keen fighting instincts. But her favorite blade at home had all that. Of course, Heartseeker could talk and think, but that didn't seem like much of a power. She would really have preferred the sparks.

\"I should have brought my regular blade,\" she muttered for the fiftieth time.

\"I keep telling you, you can't do the Blade Trials of Melkar without a Blade of Melkar!\"

\"I mean that I would bring two swords. I would fight with my sword Fell Light, and then use you in the ceremony at the end. Or whatever it is that we need to do.\" She bit off another jerky-flavored bite. The taste was disgusting, a mixture of jerky and cake. \"Do you still remember nothing of these trials, sword?\"

\"I told you, nothing!\" said the sword. \"Something makes me forget the times when I'm around here. Probably these swamp gasses. And I'm not the only one. Your mother never told you about these trials, did she? She forgot, same as me.\"

Leeka pondered this. It meant that Leeka herself might forget the trials, too. She felt fear creeping into her mind and with practiced ease she drove it away. \"Sword, you must have something useful you can tell me about the trials. Not of the trials themselves, but... history. Hearsay. Anything.\"

\"I know that there used to be a lot more Blades of Melkar like me, but now there's only three of us. Somehow we can get... broken, or shattered or something inside there. But we have to complete the trials with each new owner to unlock all our powers.\"

She pushed down her impatience. \"Yes, yes. What else can you tell me? Tell me about Melkar. Did he say anything about the trials?\"

\"What? Look, I've never met any gods. I don't think I have, anyway.\"

\"Well, Melkar is the god of hunting and self-sufficiency, so why did he make magic swords anyway? Wouldn't he prefer magic bows?\"

\"Oh, now I see the problem. No, Melkar didn't make us. We used to be Blades of Romast. But Romast died and Melkar took over. This trial was made by Romast, but it's been bastardized to suit Melkar's purposes. You know how Melkar's the patron of mutts like your mom and you? Uh, ... no offense.\"

Leeka rolled her eyes. Her mother had been a half-human, but her father was an orc. So Leeka was a quarter human. And never a day went by that her tribe hadn't reminded her of her freakishness. The words held no power on her now. \"Go on.\"

\"And look at me: I'm a mutt too. I'm too top-heavy for a one-hander and too light for a two-hander. I was made for a race that went extinct thousands of years ago! I don't really belong anywhere. Just like you don't belong.\"

Leeka tensed in surprise. Its words had managed to hurt! <i>Everyone wants to belong,</i> she told herself. But some people just weren't destined to fit in. Melkar's chosen people: the bastards, the lost, the obsolete. Those who have to go it alone. Or almost alone.

As the sun set, Leeka took her stolen viewoscope out of her bag and started watching the door, her eyes straining to make out shapes in the gloom. Nothing yet. She settled in to wait and see if her hunch was right.": "<h1>Leeka e as Provas da Lâmina, Capítulo 2</h1>

\"Ok, então estou tentando não chamá-lo de estúpido aqui, mas você está acampando em um pântano em vez de entrar em casa. Você pode apenas explicar a lógica? A porta está bem ali! Você não vai dormir bem no pântano. Seria melhor acabar com isso.\" Heartseeker estava descansando contra a mochila de Leeka enquanto ela lutava para achatar a terra o suficiente para deixá-la sentar.

Leeka olhou para a espada, rosnou e continuou seu trabalho.

\"Vamos\", disse a espada. “Precisamos trabalhar juntos aqui. Estou sendo julgado tanto quanto você!”

Leeka abriu a mochila e desembrulhou o jantar, uma porção de tijolos de lembas com sabor de carne seca que ela comprara na cidade de Ormala há duas semanas. Ela se sentou e arrancou um pedaço do tijolo com os dentes, o suor escorrendo pelo rosto no ar fétido da noite. Ela pegou Heartseeker e considerou seu peso. Uma lâmina desajeitada, um pouco grande demais para o que era. Um pouco pesado demais.

Sua mãe empunhou esta lâmina em muitas batalhas e ensinou à jovem Leeka que um dia a lâmina seria entregue a ela. E depois de algumas desventuras, conseguiu... mas a espada não conseguiu fazer as coisas fabulosas que sua mãe conseguia fazer. Sem fogo, sem faíscas, sem cortar metal como se fosse manteiga. Era uma lâmina afiada e resistente, com instintos de luta aguçados. Mas sua lâmina favorita em casa tinha tudo isso. Claro, Heartseeker podia falar e pensar, mas isso não parecia ser um grande poder. Ela realmente teria preferido as faíscas.

\"Eu deveria ter trazido minha lâmina normal\", ela murmurou pela quinquagésima vez.

“Eu continuo dizendo a você, você não pode fazer os Blade Trials of Melkar sem uma Blade of Melkar!”

“Quero dizer que eu traria duas espadas. Eu lutaria com minha espada Fell Light e então usaria você na cerimônia no final. Ela deu outra mordida com sabor de carne seca. O sabor era nojento, uma mistura de carne seca e bolo. \"Você ainda não se lembra de nada dessas provações, espada?\"

\"Eu te disse, nada!\" disse a espada. \"Algo me faz esquecer dos momentos em que estou por aqui. Provavelmente esses gases do pântano. E eu não sou o único. Sua mãe nunca te contou sobre essas provações, não é? Ela esqueceu, assim como eu.\"

Leeka ponderou sobre isso. Isso significava que a própria Leeka também poderia esquecer as provações. Ela sentiu o medo rastejando em sua mente e com facilidade e prática ela o afastou. \"Sword, você deve ter algo útil para me contar sobre os julgamentos. Não sobre os julgamentos em si, mas... história. Boatos. Qualquer coisa.\"

“Eu sei que costumava haver muito mais Blades of Melkar como eu, mas agora somos apenas três.

Ela reprimiu sua impaciência. \"Sim, sim. O que mais você pode me dizer? Conte-me sobre Melkar. Ele disse alguma coisa sobre os julgamentos?\"

\"O quê? Olha, eu nunca conheci nenhum deus. Acho que não, de qualquer maneira.\"

“Bem, Melkar é o deus da caça e da autossuficiência, então por que ele fez espadas mágicas? Ele não preferiria arcos mágicos?”

\"Oh, agora entendo o problema. Não, Melkar não nos criou. Costumávamos ser Blades of Romast. Mas Romast morreu e Melkar assumiu. Este julgamento foi feito por Romast, mas foi bastardizado para atender aos propósitos de Melkar. Você sabe como Melkar é o patrono dos vira-latas como sua mãe e você? Uh, ... sem ofensa. \"

Leeka revirou os olhos. Sua mãe era meio humana, mas seu pai era um orc. Então Leeka era um quarto humano. E nunca se passou um dia sem que sua tribo não a lembrasse de sua estranheza. As palavras não tinham poder sobre ela agora. \"Prossiga.\"

\"E olhe para mim: eu também sou um vira-lata. Sou muito pesado para um com uma mão e muito leve para um com duas mãos. Fui feito para uma raça que foi extinta há milhares de anos! Eu realmente não pertenço a lugar nenhum. Assim como você não pertence.\"

Leeka ficou tensa de surpresa. Suas palavras conseguiram doer! <i>Todo mundo quer pertencer,</i> ela disse a si mesma. Mas algumas pessoas simplesmente não estavam destinadas a se encaixar. O povo escolhido de Melkar: os bastardos, os perdidos, os obsoletos. Aqueles que têm que seguir sozinhos. Ou quase sozinho.

À medida que o sol se punha, Leeka tirou da bolsa o viewoscópio roubado e começou a observar a porta, esforçando-se para distinguir formas na escuridão. Nada ainda. Ela se acomodou para esperar e ver se seu palpite estava certo."
"<h1>Leeka and the Blade Trials, Chapter 3</h1>

The night was at its darkest when Leeka suddenly jerked awake. A loud scraping sound was coming from the door. Leeka snatched the viewoscope from the ground, threw her pack on her back, and charged toward the door. 

A pair of torches lit a pair of orcs at the stone door, waiting patiently for it to open. She stumbled in the dark, her orcish vision little help in the near-pitch blackness, but she was heartened to hear that even though the figures were shouting to be heard, the horrendous scraping of the door muffled their words into gibberish. The sound would muffle her approach as well.

She reached the door after the figures had already gone through. She could see they had just turned left in the hall ahead, their torches casting complex shadows on the halls inside. The door was closing, so Leeka slipped in and crouched in the gloom. After another moment, the door stopped with a final thud and the air instantly became still. She was inside. The silence was startling in its relief.

Up ahead, one of the figures was talking, and a few words were disconcertingly loud in the sudden quiet. \"BE ANY DAY NOW...\" then his words became indecipherable as he lowered his voice. It was an orcish voice, but speaking the Human language. And the voice was familiar.

She slunk forward to where the hall turned, then watched as they slowly worked their way down the hall. Curious.

\"What are you waiting for?\" hissed the sword. \"We need to see where they go!\"

\"Shut up. Watch their feet! See how they move?\" Leeka hadn't drawn Heartseeker, but she knew it could see everything she saw. They watched in silence until the figures took a left-hand turn and their torchlight slowly faded from view. 

\"What were they doing?\" asked Leeka. \"It was like a dance. Forward, forward, right, then right right back, then...\"

\"Knight's moves.\" Heartseeker's voice was low and intense. It was thinking. \"It's from a boring old crone game called chess. We need light. Don't step anywhere without light!\"

Leeka dug a torch from her bag. She didn't use torches often. She'd inherited her father's excellent low-light vision, and her usual sword could light up on command. But here she was with the supposedly legendary Heartseeker and still had to use a torch! She managed to light it, and held the torch above her head while she drew Heartseeker with her other hand. The flickering light showed a grid pattern on the floor. And above, the ceiling had many holes where spears or darts no doubt descended. A trap corridor.

\"Okay, the hallway floor is a grid eight tiles wide, with one tile protruding from the board. That's where you stand first. And see how lots of the tiles are black instead of white? You can't step on those. It's a puzzle. You have to get down the hall making only knight's moves and never standing on an invalid square. Okay, step onto the first square. I don't think that counts as a move, you just start here. So! Take two squares forward, then one square left.\" Leeka did as instructed, her eyes on the ceiling. Each tile moved very slightly when she stepped onto it, but nothing shot at her. \"Now again, two squares forward and then one square left. Now step left two squares, then one back. No, best to keep facing forward. Just step backwards. If you turn your body, the directions change. My 'lefts' and 'rights' would get confusing.\"

Leeka slowly and calmly worked her way down the corridor under Heartseeker's guidance. When the voices ahead were gone and their torchlight couldn't be seen, she asked, \"how do you know to do this?\" She continued to move in the strange patterns. Forward forward right, right right forward, forward forward left...

\"I told you: before I was a Blade of Melkar I was a Blade of Romast. Romast! You know, the god of martial arts?\"

\"That was before my time.\"

\"Well no shit, it was thousands of years ago! But he was a great god! An orc god! And you learned nothing of him?!\"

Leeka gave no answer. She took three more steps and then stood still.

\"Oh,\" said Heartseeker after a moment. \"You need more directions. Okay, left left forward, forward forward right. Anyway, Romast loved chess. His priests taught that if you were good at chess you'd be better at martial arts.\"

\"Is that true?\"

\"Nah. Now that Romast is dead, I have to admit: it's always just seemed like a game to me. It teaches almost nothing about martial arts. The stuff you learn from it is just, like, basic ideologies. Nothing you can't learn in easier ways. Those old monks thought they were gaining skill by playing chess, but I think they were actually gaining skill the normal way: by fighting every day. Forward forward left, then backwards backwards left. Then forward forward left again. That was a tricky bit! Okay, forward forward right.\"

They turned the corner and the grid pattern finally ended. The hall ended in a pair of wooden doors. The left-hand door was somewhat open and light was coming from beyond, so Leeka cautiously followed the light.": "<h1>Leeka e as Provas da Lâmina, Capítulo 3</h1>

A noite estava mais escura quando Leeka acordou de repente. Um som alto de raspagem vinha da porta. Leeka pegou o visor do chão, jogou a mochila nas costas e correu em direção à porta. 

Um par de tochas acendeu dois orcs na porta de pedra, esperando pacientemente que ela se abrisse. Ela tropeçou no escuro, sua visão orc não ajudava muito na escuridão quase total, mas ficou animada ao ouvir que, embora as figuras gritassem para serem ouvidas, o horrível raspar da porta abafou suas palavras até transformá-las em algo sem sentido. O som abafaria sua abordagem também.

Ela chegou à porta depois que as figuras já haviam passado. Ela podia ver que eles tinham acabado de virar à esquerda no corredor à frente, suas tochas lançando sombras complexas nos corredores internos. A porta estava se fechando, então Leeka entrou e se agachou na escuridão. Depois de outro momento, a porta parou com um baque final e o ar ficou instantaneamente parado. Ela estava lá dentro. O silêncio era surpreendente em seu alívio.

Mais à frente, uma das figuras falava, e algumas palavras soaram desconcertantemente altas no silêncio repentino. “SEJA A QUALQUER DIA AGORA...” então suas palavras se tornaram indecifráveis ​​quando ele baixou a voz. Era uma voz orc, mas falando a linguagem humana. E a voz era familiar.

Ela se esgueirou para onde o corredor virava e então observou enquanto eles caminhavam lentamente pelo corredor. Curioso.

\"O que você está esperando?\" sibilou a espada. \"Precisamos ver para onde eles vão!\"

\"Cale a boca. Cuidado com os pés! Vê como eles se movem?\" Leeka não havia desenhado o Heartseeker, mas sabia que ele podia ver tudo o que ela via. Eles observaram em silêncio até que as figuras viraram para a esquerda e a luz das tochas desapareceu lentamente de vista. 

\"O que eles estavam fazendo?\" perguntou Leeka. \"Foi como uma dança. Para frente, para frente, para a direita, depois para trás, então...\"

\"Movimentos do cavaleiro.\" A voz de Heartseeker era baixa e intensa. Estava pensando. \"É de um velho jogo chato chamado xadrez. Precisamos de luz. Não pise em lugar nenhum sem luz!\"

Leeka tirou uma tocha da bolsa. Ela não usava tochas com frequência. Ela herdou a excelente visão na penumbra de seu pai, e sua espada habitual podia acender sob comando. Mas aqui estava ela com o supostamente lendário Heartseeker e ainda teve que usar uma tocha! Ela conseguiu acendê-lo e segurou a tocha acima da cabeça enquanto desenhava Heartseeker com a outra mão. A luz bruxuleante mostrou um padrão de grade no chão. E acima, o teto tinha muitos buracos por onde sem dúvida desciam lanças ou dardos. Um corredor de armadilha.

\"Ok, o piso do corredor é uma grade de oito ladrilhos de largura, com um ladrilho projetando-se do tabuleiro. É aí que você fica primeiro. E vê quantos ladrilhos são pretos em vez de brancos? Você não pode pisar neles. É um quebra-cabeça. Você tem que descer o corredor fazendo apenas movimentos de cavalo e nunca pisando em uma casa inválida. Ok, pise no primeiro quadrado. Não acho que isso conte como um movimento, você apenas começa aqui. Então! Avance dois quadrados, depois um quadrado esquerda.\" Leeka obedeceu às instruções, com os olhos voltados para o teto. Cada ladrilho se moveu levemente quando ela pisou nele, mas nada disparou contra ela. \"Agora, novamente, dois quadrados para frente e depois um quadrado para a esquerda. Agora dê dois quadrados para a esquerda e depois um para trás. Não, é melhor continuar olhando para frente. Basta dar um passo para trás. Se você virar o corpo, as direções mudam. Minhas 'esquerdas' e 'direitas' ficariam confusas. \"

Leeka percorreu lenta e calmamente o corredor sob a orientação de Heartseeker. Quando as vozes à frente desapareceram e a luz das tochas não pôde ser vista, ela perguntou: \"como você sabe fazer isso?\" Ela continuou a se mover nos padrões estranhos. Avançar para a direita, para a direita para a frente, para a frente para a esquerda...

\"Eu te disse: antes de ser uma Lâmina de Melkar eu era uma Lâmina de Romast. Romast! Você sabe, o deus das artes marciais?\"

\"Isso foi antes do meu tempo.\"

\"Bem, não me diga, isso foi há milhares de anos! Mas ele era um grande deus! Um deus orc! E você não aprendeu nada sobre ele?!\"

Leeka não respondeu. Ela deu mais três passos e depois ficou parada.

“Oh,” disse Heartseeker depois de um momento. \"Você precisa de mais instruções. Ok, da esquerda para a frente, para a frente para a direita. De qualquer forma, Romast adorava xadrez. Seus padres ensinavam que se você fosse bom no xadrez, seria melhor nas artes marciais.\"

\"Isso é verdade?\"

\"Não. Agora que Romast está morto, tenho que admitir: sempre pareceu um jogo para mim. Não ensina quase nada sobre artes marciais. As coisas que você aprende com ele são apenas ideologias básicas. Nada que você não possa aprender de maneiras mais fáceis. Aqueles velhos monges pensavam que estavam ganhando habilidade jogando xadrez, mas acho que na verdade estavam ganhando habilidade da maneira normal: lutando todos os dias. Avançar para a esquerda, depois para trás para a esquerda. Depois para a frente para a esquerda novamente. Essa foi uma tarefa complicada pouco! Ok, avance para a direita.\"

Eles viraram a esquina e o padrão de grade finalmente terminou. O corredor terminava em duas portas de madeira. A porta da esquerda estava um pouco aberta e a luz vinha de lá, então Leeka seguiu a luz com cautela."
"<h1>Leeka and the Blade Trials, Chapter 4</h1>

\"You're taking too long,\" hissed the blade on her back. \"Go inside, they're getting away.\"

Leeka snarled and ignored Heartseeker as she carefully examined the door. Then she pushed it open and looked at the room beyond. She was not an accomplished trap-finder, but she knew the place held traps, so it would be folly to hurry forward. She drew the sword.

\"What are you... this is undignified!\" stage-whispered the sword as Leeka jabbed it into the ground in front of her.

\"You're not good for much, but at least you're nearly unbreakable. So shut up and be my trap-detector.\" Leeka cautiously stepped into the room. It was another hallway, but this time it was quite narrow, perhaps five feet wide, and the end of the hallway was only thirty feet ahead, ending in another wooden door. She could see no sources of light besides her torch. The walls and ceiling had once been painted, but now had only a few flecks of paint. She touched the floor, then the walls, cautiously. It felt like smooth damp stone, nothing more.

\"They already did a floor trap. The next trap will be very different,\" said Heartseeker.

\"How do you know?\"

\"Romast's priests made this place. And they were... well, formulaic. You test one skill, then another, then the next. Repeating the same test would waste everybody's time.\"

\"Hmm.\" Leeka was unconvinced, but had to admit that if there were traps on the floor, walls, or ceiling, she couldn't find them. She proceeded down the hallway slowly. As she passed the halfway point, she felt suddenly cold, then felt pain on her shoulder. Snarling, she spun around in time to see a translucent hand disappear into the wall. A ghost!

From inside the walls came eerie laughter. Then a ghost stepped from the wall to block her path forward. Turning in panic, she found another ghost already blocked her escape. Two ghosts.

Because of Heartseeker's awkward weight, she needed both hands to fight well. She threw the torch at the ghost in front of her. The ghost dodged it, and it hit the ground near the door. Curious: it must be at least somewhat tangible or it wouldn't have dodged. She stepped toward the ghost, her mind working hard to shut out the screaming panic she felt. She had never fought a ghost.

The ghost seemed to be made of smoke, but the outline of a person could easily be seen. Its hands were outstretched and its face an inscrutable bank of laughing fog. She stepped forward and swung Heartseeker, slicing through its arm and torso. There was slight give to the blade, as if she was chopping water. The ghost's other hand shoved her and she stepped back, reeling from sudden cold. The ghost seemed unharmed by her attack. 

\"How do I fight ghosts?!\" yelled Leeka as the second ghost clawed at her back. She hacked at it, then pushed into it, trying to flee past it, but the ghost shoved her back. Her skin was covered in ice where it had touched her. She was trapped between the two ghosts.

The ghosts attacked together, one in front and one behind, and Leeka began slicing madly in panic. She managed to disrupt one, causing it to stop attacking for a moment, but at the same time the ghost behind her struck, reaching right through her backpack to grasp the small of her back. She screamed in pain and turned to hack that one too, but the first was already reconstituting.

\"The head,\" said Heartseeker. \"The head seems weakest! You can disorient them.\"

Leeka swung at the nearest ghost's head and it did dissipate, but quickly reformed. \"Not working!\"

\"Keep doing it! It's the only thing that even slows them down!\"

Leeka spun to face the other ghost and sent Heartseeker through its head. Then she turned to decapitate the first. Then back to the other. She was keeping them partially unformed so they couldn't attack her, but she was still stuck between them. Her back, shoulders, and arms hurt, and her conscious mind screamed in fear. She tuned it out. If this was how she died, well... at least she would die swinging Heartseeker, just as her mother had.

For what seemed like ages she fought wildly, keeping them both at bay. And then it happened: one of the ghosts reached for its head. It felt pain and it WAS being hurt! With renewed energy Leeka forced her aching arms to move faster, slashing at its head again and again. Even after it dissolved into a formless cloud, she continued to strike where the head had been. The other ghost took the opportunity to strike her leg, her back, her head as she fought the first, but she kept swinging until ... it was gone. One of the ghosts was gone.

A ghostly fist punched her shoulder and she went sprawling forward gracelessly, her backpack pinning her down. The sword said something, but she could hear only a loud ringing in her ears as she cut away one of the straps she was tangled in. The ghost kicked her legs, laughing, and she felt her left foot start to go numb. But she managed to rise, using Heartseeker's long blade to keep the ghost at bay.

\"You are not worthy,\" said the ghost. \"Surrender to death!\"

Leeka smiled a toothy grin. Without the pack on, she was much more limber, and she knew from experience that she had a few more seconds of adrenaline before the pain came in earnest. She began hacking, slicing into the ghost's head again and again, screaming with exertion. Then, in an instant, it was gone. Leeka leaned against the wall and tried to catch her breath.

\"Get your pack and get out of this room,\" said Heartseeker. \"There could be more!\"

\"They would already have come,\" said Leeka. She leaned against the hallway and let her weight drag her down to a sitting position. \"That hurt.\"": "<h1>Leeka e as Provas da Lâmina, Capítulo 4</h1>

\"Você está demorando muito\", sibilou a lâmina em suas costas. \"Entre, eles estão fugindo.\"

Leeka rosnou e ignorou Heartseeker enquanto examinava cuidadosamente a porta. Então ela a abriu e olhou para a sala além. Ela não era uma excelente caçadora de armadilhas, mas sabia que o lugar guardava armadilhas, então seria tolice avançar apressadamente. Ela desembainhou a espada.

\"O que você é... isso é indigno!\" sussurrou a espada enquanto Leeka a cravava no chão à sua frente.

\"Você não serve para muita coisa, mas pelo menos é quase inquebrável. Então cale a boca e seja meu detector de armadilhas.\" Leeka entrou cautelosamente na sala. Era outro corredor, mas desta vez era bastante estreito, talvez com um metro e meio de largura, e o final do corredor ficava a apenas dez metros à frente, terminando em outra porta de madeira. Ela não conseguia ver nenhuma fonte de luz além de sua tocha. As paredes e o teto já haviam sido pintados, mas agora tinham apenas algumas manchas de tinta. Ela tocou o chão, depois as paredes, com cautela. Parecia uma pedra lisa e úmida, nada mais.

“Eles já fizeram uma armadilha no chão. A próxima armadilha será muito diferente”, disse Heartseeker.

\"Como você sabe?\"

\"Os sacerdotes de Romast fizeram este lugar. E eles eram... bem, estereotipados. Você testa uma habilidade, depois outra, depois a próxima. Repetir o mesmo teste seria uma perda de tempo de todo mundo.\"

\"Hum.\" Leeka não estava convencida, mas teve que admitir que se houvesse armadilhas no chão, nas paredes ou no teto, ela não conseguiria encontrá-las. Ela seguiu pelo corredor lentamente. Ao passar da metade do caminho, ela sentiu frio de repente e depois sentiu dor no ombro. Rosnando, ela se virou a tempo de ver uma mão translúcida desaparecer na parede. Um fantasma!

De dentro das paredes vieram risadas estranhas. Então um fantasma saiu da parede para bloquear seu caminho. Entrando em pânico, ela encontrou outro fantasma já bloqueando sua fuga. Dois fantasmas.

Por causa do peso estranho de Heartseeker, ela precisava das duas mãos para lutar bem. Ela jogou a tocha no fantasma à sua frente. O fantasma se esquivou e caiu no chão perto da porta. Curioso: deve ser pelo menos um pouco tangível ou não teria se esquivado. Ela deu um passo em direção ao fantasma, sua mente trabalhando duro para afastar o pânico gritante que sentia. Ela nunca havia lutado contra um fantasma.

O fantasma parecia ser feito de fumaça, mas o contorno de uma pessoa podia ser facilmente visto. Suas mãos estavam estendidas e seu rosto era um banco inescrutável de névoa risonha. Ela deu um passo à frente e balançou o Heartseeker, cortando seu braço e torso. Houve uma ligeira cedência da lâmina, como se ela estivesse cortando água. A outra mão do fantasma a empurrou e ela recuou, cambaleando com o frio repentino. O fantasma parecia ileso pelo ataque dela. 

\"Como faço para lutar contra fantasmas?!\" gritou Leeka enquanto o segundo fantasma agarrava suas costas. Ela o atacou e empurrou-o, tentando fugir, mas o fantasma a empurrou de volta. Sua pele estava coberta de gelo onde a havia tocado. Ela estava presa entre os dois fantasmas.

Os fantasmas atacaram juntos, um na frente e outro atrás, e Leeka começou a cortar loucamente em pânico. Ela conseguiu interromper um deles, fazendo com que ele parasse de atacar por um momento, mas ao mesmo tempo o fantasma atrás dela atacou, alcançando através de sua mochila para agarrar suas costas. Ela gritou de dor e virou-se para cortar aquele também, mas o primeiro já estava se reconstituindo.

“A cabeça”, disse Heartseeker. \"A cabeça parece mais fraca! Você pode desorientá-los.\"

Leeka atacou a cabeça do fantasma mais próximo e ele se dissipou, mas rapidamente se recuperou. \"Não está funcionando!\"

\"Continue fazendo isso! É a única coisa que os atrasa!\"

Leeka girou para encarar o outro fantasma e enviou Heartseeker em sua cabeça. Então ela se virou para decapitar o primeiro. Então de volta para o outro. Ela os mantinha parcialmente informes para que não pudessem atacá-la, mas ainda estava presa entre eles. Suas costas, ombros e braços doíam e sua mente consciente gritava de medo. Ela desligou. Se foi assim que ela morreu, bem... pelo menos ela morreria balançando Heartseeker, assim como sua mãe morreu.

Durante o que pareceram séculos, ela lutou descontroladamente, mantendo os dois afastados. E então aconteceu: um dos fantasmas estendeu a mão para sua cabeça. Sentia dor e estava sendo machucado! Com energia renovada, Leeka forçou seus braços doloridos a se moverem mais rápido, golpeando sua cabeça repetidas vezes. Mesmo depois de se dissolver em uma nuvem informe, ela continuou a atacar onde a cabeça estava. O outro fantasma aproveitou a oportunidade para golpear sua perna, suas costas, sua cabeça enquanto ela lutava contra o primeiro, mas continuou golpeando até que... ele desapareceu. Um dos fantasmas havia desaparecido.

Um punho fantasmagórico acertou seu ombro e ela caiu esparramada para frente sem graça, a mochila prendendo-a no chão. A espada disse alguma coisa, mas ela ouviu apenas um zumbido alto em seus ouvidos enquanto cortava uma das tiras em que estava presa. O fantasma chutou suas pernas, rindo, e ela sentiu seu pé esquerdo começar a ficar dormente. Mas ela conseguiu se levantar, usando a longa lâmina de Heartseeker para manter o fantasma afastado.

“Você não é digno”, disse o fantasma. “Entregue-se à morte!”

Leeka deu um sorriso cheio de dentes. Sem a mochila, ela ficava muito mais flexível e sabia por experiência própria que teria mais alguns segundos de adrenalina antes que a dor se intensificasse. Ela começou a cortar, cortando a cabeça do fantasma repetidas vezes, gritando com esforço. Então, num instante, desapareceu. Leeka encostou-se na parede e tentou recuperar o fôlego.

“Pegue sua mochila e saia desta sala”, disse Heartseeker. \"Poderia haver mais!\"

“Eles já teriam vindo”, disse Leeka. Ela se encostou no corredor e deixou seu peso arrastá-la para a posição sentada. \"Isso doeu.\""
"<h1>Leeka and the Blade Trials, Chapter 5</h1>

Leeka began digging through her pack. Her left arm was no longer responding to her commands, and she suspected the worst was yet to come.

\"Complete lack of discipline back there,\" said Heartseeker. She'd dropped it on the ground in front of her. \"You should have just kept your pattern! One two, one two, you were doing great. Once you focused on only one, the other one tore you up. You let your desperation drive you. You lack --\"

Leeka picked up the sword with her right hand and flung it down the hall, where it clanged loudly. She immediately went back to searching the pack. She had to find healing potions. Healing potions, where were the... finally, she found her last three potions, tied together and wrapped in cloth. She pulled the cork out of the first and downed the tiny vial of liquid. Her back suddenly released its tension and she sighed relief. The second potion brought her left arm back to working order. Her leg and shoulder still hurt, but with only one potion left, she decided to tough it out. She turned her attention to the pack. She could fashion new straps, perhaps...

\"Um, Leeka, over here. A button.\"

Leeka went and retrieved the sword. She held it out and let it tilt to point at the button. It was another square stone plate, like the front door, but flush with the wall and harder to see. If she pushed it and more stone walls moved, any chance of surprising the people ahead would be gone. Impulsively, she reached out and pushed it with Heartseeker, and immediately the wall in front of her ground open.

The noise wasn't as bad, or as long, but it was still loud enough. She eyed the exits warily as the wall opened, but nobody returned to see what caused the sound. When the door was fully open, it stopped. Behind the door was a small stone room with corpses manacled by their hands. Two of the three were decayed beyond recognition. But the stink meant something had been alive in here relatively recently.

Then her eyes caught movement coming from the least-decayed corpse. Leeka stared at it, her eyes keen in the torchlight, waiting for the corpse to move. \"Speak, corpse, if you can!\"

The man raised his head. Elven ears stuck out of greasy long hair. \"Help...\" The elf's eyes were gray pits that almost glowed in the darkness. He wasn't an elf anymore. He was a --

\"It's a vampire!\" shouted Heartseeker. \"Quick, cut his head off!\"

Leeka snorted. \"He's chained to the wall, and clearly can't attack. Why should I kill him?\"

\"He's not alive! He's undead!\"

\"So? He's harmless.\"

\"Leeka, vampires are very powerful. This one has been subdued and imprisoned in here. Why do you think someone would leave a vampire in here? In the middle of the Blade Trials?\"

She considered, stepped forward, poking the creature gently with Heartseeker. The creature's eyes tracked her, but only the head moved at all.

\"Why are you here, vampire?\"

\"Heeelllpp,\" the elf said again, the syllables held so long that it sounded more like a groan.

\"Sorry, monster, I may be stupid, but I won't free a chained vampire.\"

\"Water...\" groaned the elf.

\"This is part of the Trials, Leeka.\" Heartseeker's voice was alarmed. \"Think about... what are you doing? Don't!\"

Leeka had dug out her waterskin and leaned down to pour some into the elf's mouth, skirting around his legs so he couldn't kick her. She poured a few mouthfuls and then stood back away.

\"Why are you here, vampire?\"

\"They know you're coming,\" said the creature, his voice low. He moved his tongue around his mouth like he was figuring out how to use it. \"They're waiting for you, Leeka.\"

\"You know who I am?\"

\"I overheard them say your name. They've been anticipating you for a week.\"

\"I will not ask again: why are you here?\"

\"Heh.\" The vampiric elf spit bloody water. \"I was once a part of this trial. For a few centuries, I would lure the weak or the foolish to their doom by convincing them to let me drink their blood.\"

\"Why would anyone do that?\" Leeka asked, incredulous.

The elf tried to smile. \"I can be very persuasive when I'm in good condition. But the last orc that took the trials... she chained me to this wall and tore out my guts. She left me to suffer for decades!\"

The last person -- would that be Leeka's mother? It would be foolish to trust a vampire, but she still wanted more information. \"Why has no-one freed you since then? They reset the other traps, right? Surely those priests of Melkar up ahead...\"

\"Melkar's not a fan of the undead,\" said Heartseeker. \"This creature -- this vampire is from the original Trials, aren't you? You've been here ever since this place was the Blade Trials of Romast!\"

The elf laughed. \"No, I am not that old. But we had a pact with Romast that one of our number would always come here for the Trials. That pact remains unbroken even in Romast's death.\"

\"But the priests of Melkar don't approve of you being here,\" said Heartseeker. \"And they know if they kill you, a new vampire will come knocking on the door. So they just...\"

\"Yes. They leave me to suffer. Help me, Leeka. Please...\"

\"How, by killing you? Very well, if you wish to die,\" Leeka raised Heartseeker.

\"No! I don't want to die! I meant... by feeding me.\"

At this, Leeka and Heartseeker both laughed. Leeka had never heard the blade laugh before; it was strangely comforting to know that it could.

\"Why would I feed you, vampire?\"

\"If you give me but a few drops of blood, I shall break free and escape this place.\"

\"Leeka,\" warned the blade. \"If it sinks its teeth into you...\"

\"No, don't feed me directly. Just drip a few drops into my mouth. Just a few drops! Please! And I will leave. A new vampire will come to take my place. I have suffered much for your god, your Melkar. Please...\"

\"Melkar is not my god,\" said Leeka.

\"Just kill it, Leeka,\" said the sword.

\"How do I know you won't attack me?\"

The vampire turned its head quizzically. \"Why would I? I am not a mindless evil. I am a vampire! We have honor! Some of us, anyway... my name is Pelagast. Pelegast the Wise. Have you heard of me?\"

\"No.\"

\"Oh. Well, no matter, since I can't prove who I am, anyway. But your sword can protect you from me. Can you not, blade?\"

\"No,\" said the blade. \"I don't have my powers! That's why we're doing the stupid Trials!\"

\"You know how to ward against vampires. Teach her.\"

\"What does he mean, Heartseeker? How do you protect against vampires?\"

\"There's lots of ways, but... oh. You mean with a simple protective circle?\"

The elf nodded jerkily, as if he barely controlled his neck. \"That is how the Trial is supposed to go: either I take over the aspirant's mind and make them a thrall, or the sword manages to protect them from me.\"

\"But a simple ward won't last. And we don't have salt.\"

\"Salt? Yes we do,\" said Leeka. \"I brought salt to preserve what I hunt. So this is a magic spell?\"

\"No, just a ward. It will keep a vampire at bay for a few minutes. The fanciest one I know would last... maybe a half-hour.\"

\"And then?\"

\"Then it'll overpower the ward and kill you.\"

\"No,\" said the elf. \"With only a few drops of blood I won't have the strength. I wish only to leave. And besides: the conditions of the Blade Trial prevent me from attacking anyone in a ward. That is how you are supposed to win the challenge, after all. You needn't use a fancy ward. Any ward will do... just a circle of salt.\"

\"I'll use the fancy ward,\" said Leeka. She returned to her pack to fetch the salt. \"Okay, sword, teach me.\"

\"No! This is foolish! Do you think Melkar wants -- \"

\"Heartseeker! I have taken your counsel. I will continue to do so. But I make the decisions! We are doing this ward thing. Now.\"

The blade was silent for a moment. Then it began to guide her through the preparations.

A few minutes later, Leeka stood near the vampire in a circle of salt and sigils. She'd carved strange runes into the stone floor with Heartseeker's unbreakable blade. The ward was done.

\"Open your mouth, monster,\" said Leeka. She knicked her wrist with the sword and then angled the blade toward the vampire's mouth. Then she let a small stream of blood run down Heartseeker and into the elf's waiting jaws.

First the creature's flesh took a more natural color. Then she heard bones crack and creak as they snapped into place. When his gray eyes turned greenish and he began to look like a mortal elf, she tilted the blade away.

\"Can you leave, creature?\"

Pelegast stood up, naked except for patches of black mold that covered his legs and groin. He pulled hard on the chains and they came free from the wall with a loud clang and a cloud of dust.

\"I did not expect to be freed by someone on the Trials. You've surprised me. Thank you, Leeka. I hope you pass your Trials. Be sure to leave before the sun next sets, or those ghosts will return. And they're terrible company. Oh, and be careful ahead. They replaced my part of the Trials with a giant spider or something.\" He walked slowly, stumblingly, to the door, opened it, and left. Leeka listened to the chains from his wrists dragging on the stones. After a minute the noise was gone.

\"Why did we do that, Leeka? Why?!\"

\"Because I kill for food, for safety, or for honor. I kill for all those reasons gladly, but I do not cravenly kill a bound prisoner. <b>Nor</b>-- \" she raised her voice to shout over the words Heartseeker was beginning to say. \"Nor do I leave a slave, unjustly imprisoned, to rot, just because I can't be bothered! I have honor, Heartseeker. That's a new concept for you, I guess. You should look into it.\"

\"There's honor and then there's stupidity. These are the Blade Trials of Melkar, and Melkar's not one of those new-age gods who think it's okay to be undead. Melkar is pre-Dreva. He remembers the ravages of Zek. He doesn't even accept that the undead are--\"

\"Melkar is the god of Individuality, right?\"

Heartseeker sighed, realizing where this was going. \"Yes. Officially he's the God of Individualism, Self-Sufficiency, and Hunting for Sustenance.\"

\"So I'm expressing my individuality. And really, if Melkar doesn't like the way I do things... well, he can smite me if he wants. Or he can go fuck himself.\" 

She sheathed the sword. The backpack could wait in here for a while, she decided. She fetched the last health potion and a few spare throwing knives. She tore a bite off of her lembas brick and went to the next room.": "<h1>Leeka e as Provas da Lâmina, Capítulo 5</h1>

Leeka começou a vasculhar sua mochila. Seu braço esquerdo não respondia mais aos seus comandos e ela suspeitava que o pior ainda estava por vir.

“Total falta de disciplina lá atrás”, disse Heartseeker. Ela o deixou cair no chão na sua frente. \"Você deveria ter mantido seu padrão! Um dois, um dois, você estava indo muito bem. Uma vez que você se concentrou em apenas um, o outro o destruiu. Você deixou seu desespero te levar. Você não tem...\"

Leeka pegou a espada com a mão direita e jogou-a no corredor, onde ela fez um barulho alto. Ela imediatamente voltou a procurar na mochila. Ela tinha que encontrar poções de cura. Poções de cura, onde estavam... finalmente, ela encontrou suas últimas três poções, amarradas e embrulhadas em pano. Ela tirou a rolha do primeiro e bebeu o pequeno frasco de líquido. Suas costas de repente liberaram a tensão e ela suspirou de alívio. A segunda poção trouxe seu braço esquerdo de volta ao funcionamento. Sua perna e ombro ainda doíam, mas com apenas uma poção sobrando, ela decidiu aguentar. Ela voltou sua atenção para o bando. Ela poderia criar novas tiras, talvez...

\"Hum, Leeka, aqui. Um botão.\"

Leeka foi e recuperou a espada. Ela estendeu-o e deixou-o inclinar-se para apontar para o botão. Era outra placa quadrada de pedra, como a porta da frente, mas rente à parede e mais difícil de ver. Se ela empurrasse e mais paredes de pedra se movessem, qualquer chance de surpreender as pessoas à frente desapareceria. Impulsivamente, ela estendeu a mão e empurrou-o com Heartseeker, e imediatamente a parede em frente ao seu terreno se abriu.

O barulho não era tão ruim, nem tão longo, mas ainda assim era alto o suficiente. Ela olhou as saídas com cautela enquanto a parede se abria, mas ninguém voltou para ver o que causava o som. Quando a porta estava totalmente aberta, ela parou. Atrás da porta havia uma pequena sala de pedra com cadáveres algemados pelas mãos. Dois dos três estavam deteriorados e irreconhecíveis. Mas o fedor significava que algo estava vivo aqui há relativamente pouco tempo.

Então seus olhos captaram um movimento vindo do cadáver menos deteriorado. Leeka olhou para ele, com os olhos atentos à luz da tocha, esperando que o cadáver se movesse. “Fale, cadáver, se puder!”

O homem levantou a cabeça. Orelhas élficas sobressaíam de cabelos longos e oleosos. “Socorro...” Os olhos do elfo eram buracos cinzentos que quase brilhavam na escuridão. Ele não era mais um elfo. Ele era um -

\"É um vampiro!\" gritou Heartseeker. \"Rápido, corte a cabeça dele!\"

Leeka bufou. \"Ele está acorrentado à parede e claramente não pode atacar. Por que eu deveria matá-lo?\"

\"Ele não está vivo! Ele é um morto-vivo!\"

\"Então? Ele é inofensivo.\"

“Leeka, os vampiros são muito poderosos. Este foi subjugado e aprisionado aqui. Por que você acha que alguém deixaria um vampiro aqui? No meio dos Blade Trials?”

Ela considerou, deu um passo à frente, cutucando a criatura gentilmente com Heartseeker. Os olhos da criatura a seguiram, mas apenas a cabeça se moveu.

\"Por que você está aqui, vampiro?\"

\"Heeelllpp,\" o elfo disse novamente, as sílabas sustentadas por tanto tempo que soaram mais como um gemido.

\"Desculpe, monstro, posso ser estúpido, mas não vou libertar um vampiro acorrentado.\"

\"Água...\" gemeu o elfo.

\"Isso faz parte dos Testes, Leeka.\" A voz de Heartseeker estava alarmada. \"Pense em... o que você está fazendo? Não!\"

Leeka havia desenterrado seu odre e se inclinado para derramar um pouco na boca do elfo, contornando suas pernas para que ele não pudesse chutá-la. Ela serviu alguns goles e depois se afastou.

\"Por que você está aqui, vampiro?\"

“Eles sabem que você está vindo”, disse a criatura, em voz baixa. Ele moveu a língua pela boca como se estivesse descobrindo como usá-la. \"Eles estão esperando por você, Leeka.\"

\"Você sabe quem eu sou?\"

\"Eu os ouvi dizer seu nome. Eles estão esperando por você há uma semana.\"

\"Não vou perguntar de novo: por que você está aqui?\"

\"Eh.\" O elfo vampiro cuspiu água sangrenta. \"Eu já fiz parte deste julgamento. Durante alguns séculos, eu atrairia os fracos ou os tolos para a sua condenação, convencendo-os a me deixarem beber o seu sangue.\"

\"Por que alguém faria isso?\" Leeka perguntou, incrédula.

O elfo tentou sorrir. \"Posso ser muito persuasivo quando estou em boas condições. Mas a última orc que passou nos testes... ela me acorrentou a esta parede e arrancou minhas entranhas. Ela me deixou sofrer por décadas!\"

A última pessoa – seria a mãe de Leeka? Seria tolice confiar em um vampiro, mas ela ainda queria mais informações. \"Por que ninguém te libertou desde então? Eles armaram as outras armadilhas, certo? Certamente aqueles sacerdotes de Melkar lá na frente...\"

“Melkar não é fã de mortos-vivos”, disse Heartseeker. \"Esta criatura - este vampiro é dos Trials originais, não é? Você está aqui desde que este lugar foi o Blade Trials of Romast!\"

O elfo riu. \"Não, não sou tão velho. Mas tínhamos um pacto com Romast de que um de nossos sempre viria aqui para os Julgamentos. Esse pacto permanece ininterrupto mesmo após a morte de Romast.\"

“Mas os sacerdotes de Melkar não aprovam sua presença aqui”, disse Heartseeker. \"E eles sabem que se matarem você, um novo vampiro vai bater na porta. Então eles apenas...\"

\"Sim. Eles me deixam sofrer. Ajude-me, Leeka. Por favor...\"

\"Como, matando você? Muito bem, se você deseja morrer\", Leeka criou Heartseeker.

\"Não! Eu não quero morrer! Eu quis dizer... me alimentando.\"

Com isso, Leeka e Heartseeker riram. Leeka nunca tinha ouvido a lâmina rir antes; era estranhamente reconfortante saber que isso poderia acontecer.

\"Por que eu alimentaria você, vampiro?\"

\"Se você me der apenas algumas gotas de sangue, eu me libertarei e escaparei deste lugar.\"

“Leeka,” avisou a lâmina. \"Se ele cravar os dentes em você...\"

\"Não, não me alimente diretamente. Apenas pingue algumas gotas em minha boca. Apenas algumas gotas! Por favor! E eu irei embora. Um novo vampiro virá para tomar meu lugar. Sofri muito por seu deus, seu Melkar. Por favor...\"

“Melkar não é meu deus”, disse Leeka.

“Apenas mate-o, Leeka”, disse a espada.

\"Como posso saber que você não vai me atacar?\"

O vampiro virou a cabeça interrogativamente. \"Por que eu faria isso? Eu não sou um mal irracional. Eu sou um vampiro! Temos honra! Alguns de nós, pelo menos... meu nome é Pelagast. Pelegast, o Sábio. Você já ouviu falar de mim?\"

\"Não.\"

\"Oh. Bem, não importa, já que não posso provar quem sou, de qualquer maneira. Mas sua espada pode protegê-la de mim. Não pode, lâmina?\"

“Não”, disse a lâmina. \"Eu não tenho meus poderes! É por isso que estamos fazendo esses testes estúpidos!\"

\"Você sabe como se proteger contra vampiros. Ensine-a.\"

\"O que ele quer dizer, Heartseeker? Como você se protege contra vampiros?\"

\"Há muitas maneiras, mas... ah. Você quer dizer com um simples círculo de proteção?\"

O elfo assentiu bruscamente, como se mal conseguisse controlar o pescoço. \"É assim que o Julgamento deve acontecer: ou eu assumo o controle da mente do aspirante e o torno um escravo, ou a espada consegue protegê-lo de mim.\"

\"Mas uma proteção simples não vai durar. E não temos sal.\"

\"Sal? Sim, temos\", disse Leeka. \"Eu trouxe sal para preservar o que caço. Então isso é um feitiço mágico?\"

\"Não, apenas uma proteção. Ela manterá um vampiro afastado por alguns minutos. A mais sofisticada que eu conheço duraria... talvez meia hora.\"

\"E então?\"

\"Então isso dominará a proteção e matará você.\"

\"Não\", disse o elfo. \"Com apenas algumas gotas de sangue não terei forças. Desejo apenas ir embora. E além disso: as condições do Teste da Lâmina me impedem de atacar qualquer pessoa em uma enfermaria. É assim que você deve vencer o desafio, afinal. Você não precisa usar uma proteção sofisticada. Qualquer proteção serve... apenas um círculo de sal.\"

“Vou usar a ala chique”, disse Leeka. Ela voltou para sua mochila para pegar o sal. \"Ok, espada, me ensine.\"

\"Não! Isso é tolice! Você acha que Melkar quer...\"

\"Heartseeker! Segui seu conselho. Continuarei a fazê-lo. Mas eu tomo as decisões! Estamos fazendo essa coisa de enfermaria. Agora.\"

A lâmina ficou em silêncio por um momento. Depois começou a orientá-la nos preparativos.

Alguns minutos depois, Leeka estava perto do vampiro em um círculo de sal e sigilos. Ela havia esculpido runas estranhas no chão de pedra com a lâmina inquebrável de Heartseeker. A enfermaria estava pronta.

“Abra a boca, monstro”, disse Leeka. Ela bateu no pulso com a espada e então inclinou a lâmina em direção à boca do vampiro. Então ela deixou um pequeno fluxo de sangue escorrer pelo Heartseeker e chegar às mandíbulas do elfo.

Primeiro a carne da criatura adquiriu uma cor mais natural. Então ela ouviu ossos estalando e rangendo ao se encaixarem no lugar. Quando seus olhos cinzentos ficaram esverdeados e ele começou a parecer um elfo mortal, ela inclinou a lâmina.

\"Você pode ir embora, criatura?\"

Pelegast levantou-se, nu, exceto por manchas de mofo preto que cobriam suas pernas e virilha. Ele puxou com força as correntes e elas se soltaram da parede com um barulho alto e uma nuvem de poeira.

\"Eu não esperava ser libertado por alguém nas Provas. Você me surpreendeu. Obrigado, Leeka. Espero que você passe nas Provas. Certifique-se de sair antes do próximo pôr do sol, ou aqueles fantasmas retornarão. E eles são uma companhia terrível. Ah, e tenha cuidado antes. Eles substituíram minha parte nas Provas por uma aranha gigante ou algo assim. \" Ele caminhou lentamente, tropeçando, até a porta, abriu-a e saiu. Leeka ouviu as correntes de seus pulsos arrastando-se nas pedras. Depois de um minuto o barulho desapareceu.

\"Por que fizemos isso, Leeka? Por quê?!\"

\"Porque eu mato por comida, por segurança ou por honra. Eu mato por todas essas razões com prazer, mas não mato covardemente um prisioneiro preso. <b>Nem</b>-\" ela levantou a voz para gritar sobre as palavras que Heartseeker estava começando a dizer. \"Nem deixo um escravo, preso injustamente, apodrecendo, só porque não posso ser incomodado! Eu tenho honra, Heartseeker. Esse é um novo conceito para você, eu acho. Você deveria investigar isso.\"

\"Há honra e depois há estupidez. Estes são os Blade Trials of Melkar, e Melkar não é um daqueles deuses da nova era que acham que não há problema em ser morto-vivo. Melkar é pré-Dreva. Ele se lembra da devastação de Zek. Ele nem aceita que os mortos-vivos são--\"

“Melkar é o deus da Individualidade, certo?”

Heartseeker suspirou, percebendo onde isso estava indo. \"Sim. Oficialmente ele é o Deus do Individualismo, da Autossuficiência e da Caça ao Sustento.\"

\"Então estou expressando minha individualidade. E realmente, se Melkar não gosta do jeito que eu faço as coisas... bem, ele pode me bater se quiser. Ou pode ir se foder.\" 

Ela embainhou a espada. A mochila poderia esperar aqui por um tempo, ela decidiu. Ela pegou a última poção de saúde e algumas facas extras. Ela arrancou um pedaço do tijolo de lembas e foi para a sala ao lado."
"<h1>Leeka and the Blade Trials, Chapter 6</h1>

Leeka slammed the door behind her and looked around. \"Well, it's definitely dying. I just don't know how long it'll take. Oh...\" there was a thud and a screeching in the room behind her. \"There it goes.\"

The room past the vampire had been a library, and leaving it had required her to use the room's enchanted books. Beyond that, a statue that spoke riddles. Stupid riddles. And the last room had been a spider the size of a small home. Her leather armor was now pitted with acid holes. She drank her last health potion, then sighed. \"Okay, are we finally done?\"

This last bit was aimed at the two orcs who sat in the room. \"Or do I have to do something with that forge?\" A weird forge took pride of place in the large stone room. Most of the room was taken up with piles of wood and coal. In one corner sat the two orcs, apparently waiting for her to arrive.

\"Leeka, my daughter. Come stand before me.\" One of the orcs stood up. That was his voice, her father's voice. But...

Leeka looked at the orc. She drew her sword. \"More tests! I am so tired of this nonsense!\"

Her father laughed. \"The trial is over! You have passed!\"

\"What... what are you doing here? You swore that you'd never speak to me again.\"

He nodded. \"But today, for the first time, I am proud of you, Leeka! You have more than made up for the shame your mother brought upon me. And Leeka: you have earned the right to have your human heritage erased.\"

\"What?\"

\"It's true,\" said the other orc. This one was old, his hair white and his voice raspy. \"I am a priest of Melkar, come here to administer the test. You passed, and so you must choose: you can become a Scion of Melkar, and your sword will become a symbol of The Bastard God's might in this world. Or you may toss the sword in this forge. If you do so, Melkar will take away your impurities and make you a full-blooded orc.\"

\"What?\" said Leeka again, sword still drawn. Her father looked just like she remembered him. A touch older, but everything about him -- the way his eyes constantly scanned the room, the precise way he moved -- it was him.

\"It's not him,\" said Heartseeker.

\"Why do you say that?\" asked the priest of Melkar. \"I have spent the past week with him. He has told me stories of your youth, Leeka. He is here to take you home, if you choose to become full-blooded.\"

\"Take me home? And... I would be treated as a full-blood kin?\"

\"Yes.\" Her father smiled. \"Now. Can you stop pointing that evil blade at me?\" His own blade was at his hip, but his hands were well away from it. Leeka lowered the weapon.

She fought back a wave of fatigue. Leeka was tired. So tired. But she had won. And her reward was tantalizing... but it meant destroying Heartseeker.

\"Heartseeker. You have done well by me today. But I'm afraid--\"

\"No, hold on, you seriously believe this? Look, I met your father. That guy is not him. I mean, for starters, your father vowed never to speak to you again. Is your father the kind of orc that would break his vows to his daughter?\"

\"That was a different time!\" said her father. \"Before I learned about this trial, and that it could make you whole. You had to choose to go on the trial. I wasn't allowed to--\"

\"And is your father the kind of orc that would only do what he was 'allowed' to do?\"

Her father grunted in annoyance. \"I meant that if I interfered, Melkar's gift would not--\"

The sword made a gravelly-throated laugh. \"Okay, when you proposed to Leeka's mother, what did you say?\"

\"What?\" It was her father's turn to say it. \"But... she didn't wield you on that day.\"

\"Yes she did. And even if she hadn't, she would have told me later. We were friends. The day you proposed to her was the day of a big hunt. Do you remember what we hunted?\"

\"Sword, it has been many years.\" Her father pounded the arm of his chair. \"I am not a young orc anymore! I do not remember the day perfectly, but that doesn't mean--\"

\"Well, at least you could remember this: when you proposed to her that day, did she say yes? Or did you have to wait for her to propose to you?\"

Her father hesitated. \"I'm sorry. Leeka, truly I am sorry. I had my witch take those memories from me. Memories of your mother tormented me and I couldn't be the strong chief I needed to be. But I remember you.\"

\"Oh, then what were her first words?\" asked the sword.

\"Not every detail! I remember my daughter. That's enough!\"

\"He's an imposter,\" said Heartseeker. Leeka tilted her head, catching her father's familiar smell. His mannerisms, like pounding the chair... it was him. And he wanted her to come home.

\"I think he's telling the truth,\" said the priest of Melkar, \"But it doesn't really matter. If he's some sort of imposter, fine. Kill him.\"

\"Hey!\" said her father.

\"Kill him if he's an imposter. Or throw the sword in the furnace, and I'll loan you a newer, more practical sword to kill him with. But I have waited long enough. Will you become a Scion of Melkar, or will you become a full-blooded orc?\"

\"Leeka,\" said the sword. \"Romast always said to trust your weapon. I'm a Blade of Romast and I'm telling you that's not your father.\"

\"Romast is a dead god!\" shouted Leeka. \"You are a Blade of Melkar, the Bastard God, and you resent me! You resent that I can be whole!\" She stepped toward the forge. 

Her father nodded. \"Just toss it in. You don't have to do anything else. The flames will consume it quickly.\"

\"You're right,\" said the sword. \"You're right that I am an instrument of Melkar. I am the legendary blade Heartseeker, wielded by the most famous half-bloods in orcish history! When the Formian King invaded Gazluk, Amatuk used me to kill him. I am the blade that slew Blightwing! Your mother used me to kill the Frost Siren. Half-bloods don't trust easily, but your mother trusted me. You need to trust me!\"

Her father smirked, a face she remembered so well. He walked toward the forge. \"See how pathetic these swords are? What orc would wield a weapon that demanded obedience? Swords are a tool, not a master. Come, I want to see it melt. To think that your mother could have chosen differently, if not for this sword's honeyed words, tricking her into a life of obedience to a useless bastard god!\"

Leeka nodded. The sword was a hindrance. She could be an orc... a real orc. She could some day take her place as an orc chieftan. 

\"I am Heartseeker!\" The sword nearly shouted. \"I am Heartseeker, the legendary blade, and I have never once betrayed my wielder. I have never once lied to you. Your mother trusted me, and I have never given you reason to doubt me. We may disagree on a lot of things, but we're not discussing an opinion here, Leeka. I know this for a fact: <i>that is not your father.</i>\"

Leeka stopped in mid-stride towards the furnace. \"... I know. But I so want to believe.\" She turned on her heel and lunged at her father, who fell back with a shout, drawing his blade. She pressed the assault, and with his every move she knew he was an imposter. He was martially trained, in fact quite skilled, but he had nowhere near the skill her father had.

\"Stop!\" Shouted the other orc. \"Don't hurt him! Ruma, drop your sword!\"

Leeka ignored the priest and lunged at the imposter father, who dropped his blade and fell to his knees. Leeka stopped, Heartseeker pressed into his throat, unsure of what to do. Her instinct was to kill the cruel creature that wore her father's face. But she doubted her instincts here. She wasn't seeing the whole picture.

The other orc was talking, and now her father was talking, but she tuned them out. They would simply say whatever they needed to say to live. Their words held no merit. <i>You should let them live</i>, said Heartseeker, but this time without speaking aloud. <i>Oh good, I can talk to you without words! It's working. My powers are returning!</i>

Leeka tried to 'think' a response to the sword, but after a moment decided it wasn't working. \"Why should I spare them?\" she asked aloud. Her father was still at blade-tip. The other orc had come closer and she watched him warily from the edge of her vision, ready to act if he moved suddenly. Both of them began speaking anew when she spoke, but she ignored them.

<i>They're both priests of Melkar. I can sense the medallions around their neck now. This really WAS a test. A cruel test. But they're instruments, not masters.</i>

Leeka slowly reached toward her fake-father's neck, found a cord, and pulled it up through his leather armor to reveal Melkar's sigil. Sighing, she stepped back several feet, then lowered her sword.

The other orc was speaking very quickly in Human, which Leeka needed concentration to decipher. Instead, she tuned out his words and watched his actions carefully. The priest began casting a spell on her father and his face began to morph and change. He was a young human -- no, a half-human, but favoring the human side save for his thick gray hair.

\"I'm sorry to do that to you,\" said her ex-father in Orcish. \"I know this was painful. But the more difficult the test, the more powers you can unlock with the blade, so we had to be convincing! And now, you are worthy of Heartseeker! You will be a champion for us all. For the forgotten, the forsaken, the betrayed.\"

\"I don't want that.\" Leeka sheathed Heartseeker. \"I wanted to --\"

\"-- You wanted to belong! Of course you did. That's the paradox of Melkar's chosen: you don't choose Melkar. Melkar didn't choose you, either. Your real father chose for you by disowning you.\"

Leeka fought back a welling of emotion. She turned to leave, then remembered the annoying chess corridor. \"Must I perform the same dance to leave this wretched place?\"

\"Don't go yet!\" said the priest. \"We came all the way from Ormala City when we heard you were taking the test. I paid a high price for that disguise spell. And we've waited here for a week to meet you, to help restore Heartseeker! We're friends. Family. I know we aren't the family you want. And you have no reason to trust us. But we--\"

\"Not now.\" Leeka headed toward the exit. \"Perhaps some day, but not today.\"

\"Yeah,\" said the sword on her back. Apparently it could only speak into her mind when she held it. \"Fuck these guys, and fuck Melkar. He may give me my powers, but this test is really dickish.\"

\"But the moment you leave,\" said the humanish orc, \"your memory of the Trials will be erased.\"

\"What?! That quickly? Why?\"

The older priest was standing now, too. \"Which means that if you don't leave with us, you won't remember knowing us at all.\"

\"That is fine by me,\" said Leeka, and she headed back to the swamp, and then on to wherever adventure called her.": "<h1>Leeka e as Provas da Lâmina, Capítulo 6</h1>

Leeka bateu a porta atrás dela e olhou em volta. \"Bem, definitivamente está morrendo. Só não sei quanto tempo vai demorar. Oh...\" houve um baque e um grito no quarto atrás dela. \"Lá vai.\"

A sala atrás do vampiro era uma biblioteca, e sair dela exigiu que ela usasse os livros encantados da sala. Além disso, uma estátua que contava enigmas. Enigmas estúpidos. E o último cômodo era uma aranha do tamanho de uma pequena casa. Sua armadura de couro agora estava cheia de buracos de ácido. Ela bebeu sua última poção de saúde e suspirou. \"Ok, finalmente terminamos?\"

Esta última parte foi dirigida aos dois orcs que estavam sentados na sala. “Ou eu tenho que fazer algo com aquela forja?” Uma estranha forja ocupava um lugar de destaque na grande sala de pedra. A maior parte da sala estava ocupada por pilhas de madeira e carvão. Em um canto estavam os dois orcs, aparentemente esperando que ela chegasse.

\"Leeka, minha filha. Venha ficar diante de mim.\" Um dos orcs se levantou. Essa era a voz dele, a voz do pai dela. Mas...

Leeka olhou para o orc. Ela desembainhou a espada. \"Mais testes! Estou tão cansado dessa bobagem!\"

Seu pai riu. “O julgamento acabou! Você passou!”

\"O que... o que você está fazendo aqui? Você jurou que nunca mais falaria comigo.\"

Ele assentiu. \"Mas hoje, pela primeira vez, estou orgulhoso de você, Leeka! Você mais do que compensou a vergonha que sua mãe causou sobre mim. E Leeka: você conquistou o direito de ter sua herança humana apagada.\"

\"O que?\"

“É verdade”, disse o outro orc. Este era velho, tinha cabelos brancos e voz rouca. \"Eu sou um sacerdote de Melkar, venho aqui para administrar o teste. Você passou, então você deve escolher: você pode se tornar um Descendente de Melkar, e sua espada se tornará um símbolo do poder do Deus Bastardo neste mundo. Ou você pode jogar a espada nesta forja. Se você fizer isso, Melkar removerá suas impurezas e fará de você um orc de sangue puro.\"

\"O que?\" disse Leeka novamente, a espada ainda desembainhada. Seu pai parecia exatamente como ela se lembrava dele. Um pouco mais velho, mas tudo nele – a maneira como seus olhos examinavam constantemente a sala, a maneira precisa como ele se movia – era ele.

“Não é ele”, disse Heartseeker.

\"Por que você diz isso?\" perguntou o sacerdote de Melkar. \"Passei a última semana com ele. Ele me contou histórias de sua juventude, Leeka. Ele está aqui para levá-la para casa, se você decidir se tornar de sangue puro.\"

\"Levar-me para casa? E... eu seria tratado como um parente de sangue puro?\"

\"Sim.\" Seu pai sorriu. \"Agora. Você pode parar de apontar essa lâmina maligna para mim?\" Sua própria lâmina estava em seu quadril, mas suas mãos estavam bem longe dela. Leeka baixou a arma.

Ela lutou contra uma onda de fadiga. Leeka estava cansada. Tão cansado. Mas ela havia vencido. E sua recompensa foi tentadora... mas significou destruir Heartseeker.

\"Heartseeker. Você se saiu bem comigo hoje. Mas temo-\"

\"Não, espere, você acredita seriamente nisso? Olha, eu conheci seu pai. Esse cara não é ele. Quero dizer, para começar, seu pai jurou nunca mais falar com você. Seu pai é o tipo de orc que quebraria seus votos para sua filha?\"

\"Aquela foi uma época diferente!\" disse o pai dela. \"Antes de eu saber sobre esse julgamento e que ele poderia curar você. Você tinha que escolher ir ao julgamento. Eu não tinha permissão para...\"

\"E o seu pai é o tipo de orc que só faria o que lhe era 'permitido' fazer?\"

Seu pai grunhiu de aborrecimento. “Eu quis dizer que se eu interferisse, o presente de Melkar não iria...”

A espada soltou uma risada rouca. \"Ok, quando você pediu a mãe de Leeka em casamento, o que você disse?\"

\"O que?\" Foi a vez de seu pai dizer isso. \"Mas... ela não empunhou você naquele dia.\"

\"Sim, ela fez. E mesmo que não tivesse, ela teria me contado mais tarde. Éramos amigos. O dia em que você a pediu em casamento foi o dia de uma grande caçada. Você se lembra do que caçamos?\"

“Espada, já se passaram muitos anos.” O pai dela bateu no braço da cadeira. “Eu não sou mais um jovem orc! Não me lembro perfeitamente do dia, mas isso não significa...”

\"Bem, pelo menos você pode se lembrar disso: quando você a pediu em casamento naquele dia, ela disse sim? Ou você teve que esperar que ela lhe pedisse em casamento?\"

Seu pai hesitou. \"Sinto muito. Leeka, realmente sinto muito. Fiz minha bruxa tirar essas memórias de mim. Memórias de sua mãe me atormentaram e eu não poderia ser o chefe forte que precisava ser. Mas eu me lembro de você.\"

\"Oh, então quais foram as primeiras palavras dela?\" perguntou a espada.

\"Nem todos os detalhes! Lembro-me da minha filha. Já chega!\"

“Ele é um impostor”, disse Heartseeker. Leeka inclinou a cabeça, sentindo o cheiro familiar do pai. Seus maneirismos, como bater na cadeira... era ele. E ele queria que ela voltasse para casa.

\"Acho que ele está dizendo a verdade\", disse o sacerdote de Melkar, \"mas isso realmente não importa. Se ele for algum tipo de impostor, tudo bem. Mate-o.\"

\"Ei!\" disse o pai dela.

\"Mate-o se ele for um impostor. Ou jogue a espada na fornalha, e eu lhe emprestarei uma espada mais nova e mais prática para matá-lo. Mas já esperei o suficiente. Você se tornará um Scion de Melkar ou se tornará um orc de sangue puro?\"

“Leeka,” disse a espada. \"Romast sempre disse para confiar em sua arma. Sou um Blade of Romast e estou lhe dizendo que esse não é seu pai.\"

\"Romast é um deus morto!\" gritou Leeka. \"Você é uma Lâmina de Melkar, o Deus Bastardo, e está ressentido comigo! Você está ressentido por eu poder ser inteiro!\" Ela deu um passo em direção à forja. 

Seu pai assentiu. \"Basta jogá-lo dentro. Você não precisa fazer mais nada. As chamas irão consumi-lo rapidamente.\"

“Você está certo”, disse a espada. \"Você está certo ao dizer que sou um instrumento de Melkar. Eu sou a lendária lâmina Heartseeker, empunhada pelos meio-sangues mais famosos da história dos orcs! Quando o Rei Formian invadiu Gazluk, Amatuk me usou para matá-lo. Eu sou a lâmina que matou Blightwing! Sua mãe me usou para matar a Sereia Gélida. Meio-sangues não confiam facilmente, mas sua mãe confiou em mim. Você precisa confiar em mim!\"

Seu pai sorriu, um rosto que ela lembrava tão bem. Ele caminhou em direção à forja. \"Vê como essas espadas são patéticas? Que orc empunharia uma arma que exigia obediência? Espadas são uma ferramenta, não um mestre. Venha, quero vê-la derreter. Pensar que sua mãe poderia ter escolhido diferente, se não fosse pelas palavras melosas desta espada, enganando-a para uma vida de obediência a um deus bastardo inútil!\"

Leeka assentiu. A espada era um obstáculo. Ela poderia ser uma orc... uma verdadeira orc. Ela poderia algum dia assumir seu lugar como chefe orc. 

\"Eu sou o Caçador de Corações!\" A espada quase gritou. \"Eu sou Heartseeker, a lâmina lendária, e nunca traí meu portador. Nunca menti para você. Sua mãe confiou em mim e nunca lhe dei motivos para duvidar de mim. Podemos discordar em muitas coisas, mas não estamos discutindo uma opinião aqui, Leeka. Eu sei disso com certeza: <i>esse não é seu pai.</i>\"

Leeka parou no meio do caminho em direção à fornalha. \"... eu sei. Mas eu quero muito acreditar.\" Ela virou-se e atacou o pai, que caiu para trás com um grito, desembainhando a lâmina. Ela pressionou o ataque e, com cada movimento dele, ela sabia que ele era um impostor. Ele era treinado em artes marciais, na verdade bastante habilidoso, mas não tinha nem perto da habilidade que o pai dela tinha.

\"Parar!\" Gritou o outro orc. \"Não machuque ele! Ruma, largue sua espada!\"

Leeka ignorou o padre e atacou o pai impostor, que largou a lâmina e caiu de joelhos. Leeka parou, Heartseeker pressionado em sua garganta, sem saber o que fazer. Seu instinto foi matar a criatura cruel que tinha o rosto de seu pai. Mas ela duvidou de seus instintos aqui. Ela não estava vendo o quadro completo.

O outro orc estava falando, e agora o pai dela estava falando, mas ela os desligou. Eles simplesmente diriam o que precisassem dizer para viver. Suas palavras não tinham mérito. <i>Você deveria deixá-los viver</i>, disse Heartseeker, mas desta vez sem falar em voz alta. <i>Ah, que bom, posso falar com você sem palavras! Está funcionando. Meus poderes estão retornando!</i>

Leeka tentou “pensar” em uma resposta à espada, mas depois de um momento decidiu que não estava funcionando. \"Por que eu deveria poupá-los?\" ela perguntou em voz alta. Seu pai ainda estava na ponta da lâmina. O outro orc se aproximou e ela o observou cautelosamente do limite de sua visão, pronta para agir se ele se movesse repentinamente. Os dois começaram a falar de novo quando ela falou, mas ela os ignorou.

<i>Ambos são sacerdotes de Melkar. Posso sentir os medalhões em volta do pescoço agora. Isso realmente foi um teste. Um teste cruel. Mas eles são instrumentos, não mestres.</i>

Leeka lentamente estendeu a mão em direção ao pescoço de seu falso pai, encontrou uma corda e puxou-a através de sua armadura de couro para revelar o sigilo de Melkar. Suspirando, ela recuou vários metros e depois baixou a espada.

O outro orc falava muito rapidamente em Humano, o que Leeka precisava de concentração para decifrar. Em vez disso, ela desligou as palavras dele e observou suas ações cuidadosamente. O padre começou a lançar um feitiço sobre o pai dela e seu rosto começou a se transformar e mudar. Ele era um jovem humano - não, meio-humano, mas favorecendo o lado humano, exceto por seus grossos cabelos grisalhos.

“Sinto muito por fazer isso com você”, disse seu ex-pai em orc. \"Eu sei que isso foi doloroso. Mas quanto mais difícil o teste, mais poderes você pode desbloquear com a lâmina, então tivemos que ser convincentes! E agora, você é digno de Heartseeker! Você será um campeão para todos nós. Para os esquecidos, os abandonados, os traídos.\"

\"Eu não quero isso.\" Leeka embainhou Heartseeker. \"Eu queria...\"

\"-- Você queria pertencer! Claro que sim. Esse é o paradoxo dos escolhidos de Melkar: você não escolhe Melkar. Melkar também não escolheu você. Seu verdadeiro pai escolheu por você, renegando você.\"

Leeka lutou contra uma onda de emoção. Ela se virou para sair, então se lembrou do irritante corredor de xadrez. \"Devo executar a mesma dança para deixar este lugar miserável?\"

“Não vá ainda!” disse o padre. “Viemos da cidade de Ormala quando soubemos que você estava fazendo o teste. Paguei um preço alto por aquele feitiço de disfarce.

\"Agora não.\" Leeka dirigiu-se para a saída. \"Talvez algum dia, mas não hoje.\"

\"Sim\", disse a espada em suas costas. Aparentemente, ele só conseguia falar em sua mente quando ela o segurava. \"Fodam-se esses caras e foda-se Melkar. Ele pode me dar meus poderes, mas esse teste é realmente idiota.\"

“Mas no momento em que você partir”, disse o orc humanizado, “sua memória das Provações será apagada.”

\"O quê?! Tão rápido? Por quê?\"

O padre mais velho também estava de pé. \"O que significa que se você não partir conosco, você nem se lembrará de nos conhecer.\"

\"Por mim, tudo bem\", disse Leeka, e ela voltou para o pântano e depois para onde quer que a aventura a chamasse."
"<h1>Lição final": "evite as armadilhas</h1>"
"<h1>Nature Spirit Mortality</h1>

<i>by Ilvadele Irasce, Council of Eight</i>

I've been asked to explain the concept of how gods can \"die\". As I explained in my Guide to Nature Spirit Classification, these \"gods\" are just sentient magical energy that are connected into the world via what we call \"anchors\". These anchors are minor objects of power, such as trees, ponds, swords, or dragons.

The weaker types of gods can be destroyed simply by destroying their anchors. Class 5 nature spirits have only a single anchor, such as a tree or rock, and destroying this object hurtles the spirit into oblivion. Class 4 nature spirits usually have dozens of anchors, but sometimes they can all be destroyed pretty easily. For instance, I once set a small copse ablaze to destroy a Class 4 spirit that lived in the woods. All of its anchors were trees, and they all burned.

But Class 3 and above, what we call \"gods\", are not usually susceptible to this. A class 3 god has hundreds or thousands of anchors, and a class 1 god has millions of anchors. There is another way to kill them, which is to simply tear at their energy matrix until it cannot hold onto its anchor points. This is what happens when gods fight each other -- the anchors are ignored, and instead they focus on the gods' \"grip\" on those anchors.

It should be noted that even though Class 3 nature spirits are considered \"gods\", they aren't beyond the might of the most powerful mages. I remember when Jarmanger slew a Class 3 god by himself, unraveling the energy right before our shocked eyes. But Class 1 and Class 2 gods are probably beyond any single mortal's power.": "<h1>Mortalidade do Espírito da Natureza</h1>

<i>por Ilvadele Irasce, Conselho dos Oito</i>

Pediram-me para explicar o conceito de como os deuses podem “morrer”. Como expliquei em meu Guia para Classificação dos Espíritos da Natureza, esses “deuses” são apenas energia mágica senciente que está conectada ao mundo através do que chamamos de “âncoras”. Essas âncoras são objetos menores de poder, como árvores, lagos, espadas ou dragões.

Os tipos mais fracos de deuses podem ser destruídos simplesmente destruindo suas âncoras. Os espíritos da natureza de classe 5 têm apenas uma única âncora, como uma árvore ou rocha, e destruir esse objeto leva o espírito ao esquecimento. Os espíritos da natureza de classe 4 geralmente têm dezenas de âncoras, mas às vezes todas podem ser destruídas facilmente. Por exemplo, uma vez coloquei fogo em um pequeno bosque para destruir um espírito de Classe 4 que vivia na floresta. Todas as suas âncoras eram árvores e todas queimaram.

Mas a Classe 3 e acima, o que chamamos de “deuses”, geralmente não são suscetíveis a isso. Um deus de classe 3 tem centenas ou milhares de âncoras, e um deus de classe 1 tem milhões de âncoras. Existe outra maneira de matá-los, que é simplesmente rasgar sua matriz energética até que ela não consiga se segurar em seus pontos de ancoragem. Isto é o que acontece quando os deuses lutam entre si – as âncoras são ignoradas e, em vez disso, eles se concentram no “aperto” dos deuses sobre essas âncoras.

Deve-se notar que embora os espíritos da natureza Classe 3 sejam considerados “deuses”, eles não estão além do poder dos magos mais poderosos. Lembro-me de quando Jarmanger matou sozinho um deus de Classe 3, desvendando a energia diante de nossos olhos chocados. Mas os deuses da Classe 1 e da Classe 2 provavelmente estão além do poder de qualquer mortal."
"<h1>Norala The Huntress</h1>

<b>By Fathregar the Fanged</b>

<i>(Council Annotated Edition)</i>

Hear me out: you know of her as a goddess of evil, but Norala is a goddess of nature. Nature is not good or evil.

First, you must admit that Norala is a contradiction: she is the god of the big eating the little, of might making right, of the strong enslaving, killing, or abusing the weak. But Norala is not a strong god. Why is this? It is because she does not want to overshadow the apex predators in the world. If she were the strongest, then she could not in good conscience help those weaker than her. Don't you see?! She is weak so that she doesn't have to kill us all!

It's true that Norala blesses slavery, rape, murder, anything! As long as it is done by the strong against the weak. You call this evil, but it is the way of nature! Look around you! Everywhere you look, the strong take advantage of the weak. That is natural. How can nature be evil?

Norala's blessing is known as Lycanthropy. True to her nature, it destroys the weak and grants power to the strong. Only one in twenty werewolves retain their minds for more than two moons. The ones who do? Those are the apex predators! And hidden throughout the world are Norala's scions, standing ready to test the power of those who think they are strong.

It is blasphemy to confuse Norala with Melkar. Melkar is the god of hunting for sustenance. Norala is goddess of hunting for pleasure. Melkar is weak and needy. Norala is sleek and powerful.

<b>Councilwoman Irasce's notes:</b> Despite her adherents' claims to the contrary, Norala is a relatively weak class 3 nature spirit. Worship of Norala is forbidden, for it inevitably means voluntarily infecting oneself with lycanthropy, which is usually a fate worse than death: not only does the mind die, but the body becomes a senseless killing machine.

Some \"sane\" werewolf packs eschew Norala and try to prevent the spread of the disease, even going as far as hunting their own kind. This is admirable, but nevertheless we must maintain a strict rule for the safety of all humans: all lycanthropes should be killed on sight.": "<h1>Norala, a caçadora</h1>

<b>Por Fathregar, o Presas</b>

<i>(Edição Anotada pelo Conselho)</i>

Ouça-me: você a conhece como uma deusa do mal, mas Norala é uma deusa da natureza. A natureza não é boa ou má.

Primeiro, você deve admitir que Norala é uma contradição: ela é o deus dos grandes comendo os pequenos, do poder que corrige, dos fortes escravizando, matando ou abusando dos fracos. Mas Norala não é um deus forte. Por que isso acontece? É porque ela não quer ofuscar os principais predadores do mundo. Se ela fosse a mais forte, então não poderia, em sã consciência, ajudar os mais fracos que ela. Você não vê?! Ela é fraca para não ter que matar todos nós!

É verdade que Norala abençoa a escravidão, o estupro, o assassinato, qualquer coisa! Desde que seja feito pelos fortes contra os fracos. Você chama isso de mal, mas é o jeito da natureza! Olhe ao seu redor! Para onde quer que você olhe, os fortes se aproveitam dos fracos. Isso é natural. Como pode a natureza ser má?

A bênção de Norala é conhecida como Licantropia. Fiel à sua natureza, destrói os fracos e concede poder aos fortes. Apenas um em cada vinte lobisomens mantém a mente por mais de duas luas. Aqueles que fazem? Esses são os predadores de ponta! E escondidos por todo o mundo estão os descendentes de Norala, prontos para testar o poder daqueles que se consideram fortes.

É uma blasfêmia confundir Norala com Melkar. Melkar é o deus da caça para o sustento. Norala é a deusa da caça por prazer. Melkar é fraco e necessitado. Norala é elegante e poderosa.

<b>Notas da vereadora Irasce:</b> Apesar das afirmações de seus adeptos em contrário, Norala é um espírito da natureza de classe 3 relativamente fraco. A adoração de Norala é proibida, pois inevitavelmente significa infectar-se voluntariamente com licantropia, que geralmente é um destino pior que a morte: não apenas a mente morre, mas o corpo se torna uma máquina de matar sem sentido.

Algumas matilhas de lobisomens \"sãs\" evitam Norala e tentam impedir a propagação da doença, chegando até a caçar sua própria espécie. Isto é admirável, mas mesmo assim devemos manter uma regra estrita para a segurança de todos os humanos: todos os licantropos devem ser mortos assim que forem vistos."
"<h1>Prelude: Beginning Animal Handling</h1> Neophyte animal handlers who want to use their pet in combat are often at a loss how to start. Well, that's easy: start by taming a pet. Each kind of pet needs a different taming regimen; talk to your local stablemaster to see what they recommend for your area.

Once you have a pet, take it into combat situations and let it fight! The important thing is to <i>always feed your pet</i> early on. Even if the pet doesn't seem to need it! This builds your bond with the pet and you'll soon learn other ways of interacting.

After you've learned the basics, like teaching your pet to Sic 'Em, it's time to start paying attention to your animals' traits!

<h1>Pet Traits</h1> All pets have their own personalities, character, and quirks. Animal Handlers categorize pets by seven main traits:

<b>Ferocity</b> represents how threatening your pet is to enemies. A higher ferocity means your pet deals more damage with every attack!

<b>Toughness</b> determines the creature's maximum health. Tough creatures hang on to life even when they take brutal punishment.

<b>Ruggedness</b> is the pet's cantankerous spirit. In combat this determines their maximum armor.

<b>Virility</b> has very little effect on the battlefield, but is very important should you choose to branch into Animal Husbandry. Virility is the measure of how much your pet likes to breed, and how successful it is at reproducing. Pets with high virility are more likely to mate successfully, and they recover from breeding more quickly than other pets. Virility can also affect the sex of the offspring: a very virile pet is more likely to produce an offspring of the same sex.

<b>Friendliness</b> helps a pet bond with their current owner. As you care for a pet, you build up a special bond between that specific pet and yourself. A friendly pet will form this bond much quicker than an unfriendly pet. In addition, a friendly pet is more aware of their surroundings, which helps them evade burst attacks.

<b>Enthusiasm</b> is a rough measure of how much your pet craves excitement -- especially the excitement of combat. The more enthusiastic your pet, the more likely they are to really dive in and wallop the enemy, leading to more critical hits. 

<b>Intelligence</b> helps the pet make the most of their experience with combat -- they learn more quickly. In addition, intelligent pets are more accurate with their attacks, which is helpful when fighting evasive enemies! Intelligence also has an important but surprising role in Animal Husbandry. When you breed two compatible species - like a bee and a wasp - the offspring will be either a bee or a wasp. The intelligence of the parents directly affects which type of offspring you get.  

<h1>Trait Values</h1> Each of these seven traits can range from 1 (very poor) to 100 (extraordinary). It's possible for a creature to have stats even higher than 100, but since values above 100 don't do anything extra, we represent that as \"100+\". Likewise, it's possible for a pet to be so bad at something that it's trait is less than 1, but numbers below 1 aren't any worse than 1, so we represent that as \"< 1\" (\"less than 1\"). 50 is the \"average\" value for each trait. 

Traits are handy when comparing two pets of the same species, but less useful when comparing across species. Let's take Toughness, for instance: a grizzly bear with a Toughness of 1 would have 25% less health than a Grizzly Bear with an average Toughness (of 50). But that Toughness 1 bear might still have more health than a rat with a Toughness of 100! So animal handlers need to learn the ins and outs of each species in order to really make sense of trait numbers.

Traits are determined by the creature's genes, which means they won't change during the pet's lifetime (unless you're an insane wizard practicing illegal magic). So if you're going to train a pet for a particular purpose, it's wise to make sure their traits aren't terrible for that job. For instance, if you want your pet to protect you in combat, you want one with at least an average Toughness rating. But don't get caught in the trap of holding out for a pet with \"perfect\" genes. If you're taming wild animals, most of their genes will be pretty mediocre. You'll never find a perfect creature. And if you wait too long, you'll miss out on a lot of amazing animal partners. 

Remember that training will have a much bigger overall impact than the pet's genes! And your bond with the pet is what will truly turn you both into killing machines in battle.": "<h1>Prelúdio: Iniciando o manejo de animais</h1> Os manipuladores de animais neófitos que desejam usar seus animais de estimação em combate muitas vezes não sabem como começar. Bem, isso é fácil: comece domesticando um animal de estimação. Cada tipo de animal de estimação precisa de um regime de domesticação diferente; converse com seu estábulo local para ver o que eles recomendam para sua área.

Depois de ter um animal de estimação, leve-o para situações de combate e deixe-o lutar! O importante é <i>alimentar sempre o seu animal de estimação</i> desde cedo. Mesmo que o animal pareça não precisar! Isso cria seu vínculo com o animal de estimação e em breve você aprenderá outras formas de interagir.

Depois de aprender o básico, como ensinar seu animal de estimação a Sic 'Em, é hora de começar a prestar atenção nas características de seus animais!

<h1>Características dos animais de estimação</h1> Todos os animais de estimação têm suas próprias personalidades, caráter e peculiaridades. Os manipuladores de animais categorizam os animais de estimação de acordo com sete características principais:

<b>Ferocidade</b> representa o quão ameaçador seu animal de estimação é para os inimigos. Uma ferocidade maior significa que seu animal de estimação causa mais dano a cada ataque!

<b>Resistência</b> determina a saúde máxima da criatura. Criaturas resistentes sobrevivem mesmo quando sofrem punições brutais.

<b>Robustez</b> é o espírito rabugento do animal de estimação. Em combate isto determina a sua armadura máxima.

<b>Virilidade</b> tem muito pouco efeito no campo de batalha, mas é muito importante caso você decida ramificar-se para a Criação de Animais. Virilidade é a medida de quanto seu animal de estimação gosta de procriar e de quão bem-sucedido ele é na reprodução. Animais de estimação com alta virilidade têm maior probabilidade de acasalar com sucesso e se recuperam da reprodução mais rapidamente do que outros animais de estimação. A virilidade também pode afetar o sexo da prole: um animal de estimação muito viril tem maior probabilidade de produzir uma prole do mesmo sexo.

<b>Simpatia</b> ajuda o animal a se relacionar com seu dono atual. Ao cuidar de um animal de estimação, você constrói um vínculo especial entre esse animal específico e você. Um animal de estimação amigável formará esse vínculo muito mais rápido do que um animal de estimação hostil. Além disso, um animal de estimação amigável fica mais atento ao que está ao seu redor, o que o ajuda a evitar ataques explosivos.

<b>Entusiasmo</b> é uma medida aproximada do quanto seu animal de estimação anseia por emoção - especialmente a emoção do combate. Quanto mais entusiasmado seu animal de estimação, maior a probabilidade de ele realmente mergulhar e acertar o inimigo, causando mais acertos críticos. 

A <b>Inteligência</b> ajuda o animal de estimação a aproveitar ao máximo sua experiência de combate - eles aprendem mais rapidamente. Além disso, animais de estimação inteligentes são mais precisos em seus ataques, o que é útil ao lutar contra inimigos evasivos! A inteligência também tem um papel importante, mas surpreendente, na criação de animais. Quando você cria duas espécies compatíveis – como uma abelha e uma vespa – a prole será uma abelha ou uma vespa. A inteligência dos pais afeta diretamente o tipo de filho que você terá.  

<h1>Valores de características</h1> Cada uma dessas sete características pode variar de 1 (muito ruim) a 100 (extraordinário). É possível que uma criatura tenha estatísticas ainda superiores a 100, mas como valores acima de 100 não fazem nada extra, representamos isso como “100+”. Da mesma forma, é possível que um animal de estimação seja tão ruim em alguma coisa que sua característica seja menor que 1, mas números abaixo de 1 não são piores que 1, então representamos isso como “< 1” (“menos que 1”). 50 é o valor \"médio\" para cada característica. 

As características são úteis ao comparar dois animais de estimação da mesma espécie, mas menos úteis ao comparar espécies. Vejamos a Resistência, por exemplo: um urso pardo com Resistência 1 teria 25% menos saúde do que um Urso Pardo com Resistência média (de 50). Mas aquele urso com Resistência 1 ainda pode ter mais saúde do que um rato com Resistência 100! Portanto, os tratadores de animais precisam aprender os detalhes de cada espécie para realmente entender os números das características.

As características são determinadas pelos genes da criatura, o que significa que não mudarão durante a vida do animal de estimação (a menos que você seja um bruxo maluco praticando magia ilegal). Portanto, se você pretende treinar um animal de estimação para um propósito específico, é aconselhável garantir que suas características não sejam terríveis para esse trabalho. Por exemplo, se você quiser que seu animal de estimação o proteja em combate, você quer um com pelo menos uma classificação média de Resistência. Mas não caia na armadilha de esperar por um animal de estimação com genes “perfeitos”. Se você estiver domesticando animais selvagens, a maioria de seus genes será bastante medíocre. Você nunca encontrará uma criatura perfeita. E se você esperar muito, perderá muitos parceiros animais incríveis. 

Lembre-se que o treinamento terá um impacto geral muito maior do que os genes do animal! E seu vínculo com o animal de estimação é o que realmente transformará vocês dois em máquinas de matar na batalha."
"<h1>Procure Raposas Despertas</h1> Não existem muitas raposas espirituais no mundo, então provavelmente você não encontrará muitas de nós. Mas existem toneladas de raposas mortais com poderes mágicos! Talvez essas raposas sejam descendentes de uma raposa espiritual... ou talvez as raposas sejam apenas médiuns espíritas naturalmente talentosos. De qualquer forma, os magos mortais têm se aproveitado das raposas há anos": "eles as transformam em Familiares e as escravizam por seu poder."
"<h1>Secrets of the Psilobe Explained</h1> <i>by the Hive-Mind known as Forgaxis</i>

Suppose you found an unusual biped, perhaps a human, who presented psychic powers. Were you to dissect this biped, you would not find any physical source of their psychic abilities. The best explanation available is that portions of a psychic's brain exist in a parallel dimension. This might explain why most psychics are able to telepathically \"speak\" to each other: they can project waveforms in a different dimension, one which other psychics are able to \"hear\" in. But this is pure conjecture. Let us return to facts.

Were you to dissect a fallen Red Wing mantis, you would likewise find no physical evidence of their psychic powers, for they are from an earlier generation of psi-mantis. But were you to dissect a late-generation or \"true\" psi mantis, such as a Forgaxis member or a mantis from the Great City of Insects, you would find a special brain lobe called the psilobe.

The psilobe is the invention of our progenitor, the great wizard Dalvos. It acts as a neural processor of psychic information, allowing us to coalesce other mantis's emanations into every kind of stimulus: visual, audible, olfactory, pain, even emotions. This allows us to perfectly communicate thoughts between each other.

The psilobe also lets us link dozens of mantises together to create a hive mind in times of danger, so we can act with precision in unison. And some mantis gangs, such as Forgaxis, the author of this book, choose to remain in a hive mind permanently, becoming one sentient organism with dozens of bodies.

<h1>Psilobes Provide Genetic Reliability</h1>

Our research shows that psychic creatures without psilobes are not necessarily less psychically powerful than true psi-mantises, and some have greater psychic power. So what is the point of the psilobe? Genetic reliability. While many races produce occasional individuals with psychic ability, their offspring do not reliably inherit those traits. Even when two psychic bipeds mate, their offspring will have unpredictable capabilites, or sometimes no psychic abilities at all.

Thanks to psilobes, every true psi-mantis has a basic set of psychic tools that allow them to work in harmony and efficiency. Some mantises enjoy other unique psychic gifts as well, but all can at least communicate with each other and participate in the joy of the Hive Mind.

We are still discovering new secrets of the psilobe; its mysteries are only beginning to unfold. Future editions of this book will include new information when it becomes available.": "<h1>Segredos do Psilobe explicados</h1> <i>pela Mente Colmeia conhecida como Forgaxis</i>

Suponha que você encontrou um bípede incomum, talvez um humano, que apresentasse poderes psíquicos. Se você dissecasse este bípede, não encontraria nenhuma fonte física de suas habilidades psíquicas. A melhor explicação disponível é que partes do cérebro de um médium existem numa dimensão paralela. Isso pode explicar por que a maioria dos médiuns são capazes de “falar” telepaticamente uns com os outros: eles podem projetar formas de onda em uma dimensão diferente, na qual outros médiuns são capazes de “ouvir”. Mas isso é pura conjectura. Voltemos aos fatos.

Se você dissecasse um louva-a-deus caído, você também não encontraria nenhuma evidência física de seus poderes psíquicos, pois eles são de uma geração anterior de psi-louva-a-deus. Mas se você dissecasse um louva-a-deus psi \"verdadeiro\" ou de última geração, como um membro da Forgaxis ou um louva-a-deus da Grande Cidade dos Insetos, encontraria um lóbulo cerebral especial chamado psilobo.

O psilobo é invenção do nosso progenitor, o grande mago Dalvos. Ele atua como um processador neural de informações psíquicas, permitindo-nos unir as emanações de outros louva-a-deus em todo tipo de estímulo: visual, sonoro, olfativo, doloroso e até mesmo emoções. Isso nos permite comunicar perfeitamente os pensamentos entre si.

O psilobo também nos permite unir dezenas de louva-a-deus para criar uma mente coletiva em tempos de perigo, para que possamos agir com precisão em uníssono. E algumas gangues de louva-a-deus, como Forgaxis, o autor deste livro, optam por permanecer permanentemente em uma mente coletiva, tornando-se um organismo senciente com dezenas de corpos.

<h1>Psilobes fornecem confiabilidade genética</h1>

Nossa pesquisa mostra que criaturas psíquicas sem psilobos não são necessariamente menos poderosas psiquicamente do que verdadeiros psi-mantises, e algumas têm maior poder psíquico. Então, qual é o objetivo do psilobo? Confiabilidade genética. Embora muitas raças produzam indivíduos ocasionais com habilidades psíquicas, seus descendentes não herdam essas características de forma confiável. Mesmo quando dois bípedes psíquicos acasalam, seus descendentes terão capacidades imprevisíveis, ou às vezes nenhuma habilidade psíquica.

Graças aos psilobes, todo verdadeiro psi-louva-a-deus possui um conjunto básico de ferramentas psíquicas que lhes permitem trabalhar em harmonia e eficiência. Alguns louva-a-deus também desfrutam de outros dons psíquicos únicos, mas todos podem pelo menos comunicar-se entre si e participar da alegria da Mente Colmeia.

Ainda estamos descobrindo novos segredos do psilobo; seus mistérios estão apenas começando a ser revelados. As futuras edições deste livro incluirão novas informações quando estiverem disponíveis."
"<h1>Seek Awakened Foxes</h1> There aren't very many spirit foxes in the world, so you aren't likely to meet many of us. But there are tons of mortal foxes with magical powers! Perhaps these foxes are the offspring of a spirit fox... or perhaps foxes are just naturally gifted spirit mediums. Either way, mortal mages have been taking advantage of foxes for years": "they turn them into Familiars and enslave them for their power."
"<h1>The Chalice Saga</h1>

<b>Part 1: The Death of Zek</b>

Vol, the god of death, is an old and kind god. He guards the sea of souls within the world, ensuring that everyone who dies here, be they mortal, demon, or even god, return their life force to the soul sea, to live in comfort until such time as they are drawn into the world again.

But Vol had a brother, Zek, a cruel god who captured souls in his chalice — a mythical goblet that could contain countless souls. Those who died while feeling an overwhelming dark emotion, such as hate or fear, were in danger of falling into the chalice. Zek caught far fewer souls than Vol, but the ones he did catch were kept in torment.

Sometimes Zek would drink from his chalice, consuming souls to amuse himself, but most souls in the chalice were sent back to the world as undead. Conjured by evil necromancers, these poor creatures were forced to live as slaves until they died again and were returned to the chalice — where they suffered renewed torment. These souls were reborn countless times, never resting, always in anguish.

Vol hated his brother and vowed to destroy him and free the souls trapped in his chalice. But despite Vol's power, he could never stop his brother. For countless centuries they battled, but it was only during the God War that he managed to gain the upper hand.

Vol and Dreva fought side by side against Zek, finally overpowering him. In a moment of triumph, Vol took Zek's chalice and dumped it out, pouring countless tortured souls into the aether. \"Your reign is over, Zek. I will take your stolen souls back to the sea. Surrender to me. Surrender to death.\"

But Zek was a cunning god and he knew how the battle would play out. He had reserved his mightiest avatar and his most powerful scions, and he brought them into the battle. For a brief moment they fought against death itself, and of course they were quickly destroyed. But the moment of distraction gave Zek time to reclaim the chalice.

Zek poured into the now-empty chalice a piece of his own power: the power to capture souls and bring forth the undead. And then he hurled the chalice into his hidden dimension, known as Acur, the dark dimension of Angst, which most gods could not perceive. For even though Zek was a selfish god who was terrified of his own demise, he refused to give his brother the satisfaction of removing undeath from the world. Another god would come.

The distractions gone, Vol slew Zek. But the chalice had escaped him. Swearing in anger, Vol carried portions of Zek's energy back to the soul sea, but he knew he would not find the chalice that day.": "<h1>A Saga do Cálice</h1>

<b>Parte 1: A Morte de Zek</b>

Vol, o deus da morte, é um deus antigo e gentil. Ele guarda o mar de almas dentro do mundo, garantindo que todos que morrem aqui, sejam eles mortais, demônios ou mesmo deuses, devolvam sua força vital ao mar de almas, para viverem com conforto até serem atraídos para o mundo novamente.

Mas Vol tinha um irmão, Zek, um deus cruel que capturava almas em seu cálice – uma taça mítica que poderia conter inúmeras almas. Aqueles que morreram sentindo uma emoção sombria e avassaladora, como ódio ou medo, corriam o risco de cair no cálice. Zek capturou muito menos almas do que Vol, mas as que ele capturou foram mantidas em tormento.

Às vezes Zek bebia de seu cálice, consumindo almas para se divertir, mas a maioria das almas no cálice eram enviadas de volta ao mundo como mortos-vivos. Conjuradas por necromantes malignos, essas pobres criaturas foram forçadas a viver como escravas até morrerem novamente e serem devolvidas ao cálice – onde sofreram novo tormento. Essas almas renasceram inúmeras vezes, nunca descansando, sempre angustiadas.

Vol odiava seu irmão e jurou destruí-lo e libertar as almas presas em seu cálice. Mas apesar do poder de Vol, ele nunca conseguiu impedir seu irmão. Durante incontáveis ​​séculos eles lutaram, mas foi somente durante a Guerra dos Deuses que ele conseguiu ganhar vantagem.

Vol e Dreva lutaram lado a lado contra Zek, finalmente dominando-o. Em um momento de triunfo, Vol pegou o cálice de Zek e o jogou fora, despejando inúmeras almas torturadas no éter. \"Seu reinado acabou, Zek. Eu levarei suas almas roubadas de volta ao mar. Renda-se a mim. Renda-se à morte.\"

Mas Zek era um deus astuto e sabia como a batalha iria se desenrolar. Ele reservou seu avatar mais poderoso e seus descendentes mais poderosos, e os trouxe para a batalha. Por um breve momento eles lutaram contra a própria morte e, claro, foram rapidamente destruídos. Mas o momento de distração deu a Zek tempo para recuperar o cálice.

Zek despejou no cálice agora vazio um pedaço de seu próprio poder: o poder de capturar almas e trazer à tona os mortos-vivos. E então ele lançou o cálice em sua dimensão oculta, conhecida como Acur, a dimensão sombria da Angst, que a maioria dos deuses não conseguia perceber. Pois embora Zek fosse um deus egoísta que estava com medo de sua própria morte, ele se recusou a dar a seu irmão a satisfação de remover os mortos-vivos do mundo. Outro deus viria.

Sem as distrações, Vol matou Zek. Mas o cálice lhe escapou. Jurando com raiva, Vol carregou porções da energia de Zek de volta para o mar das almas, mas sabia que não encontraria o cálice naquele dia."
"<h1>The Chalice Saga</h1>

<b>Part 2: The Death of Ilth Hale</b>

Has there ever been a more bard-worthy legend than that of Ilth Hale, the god of Bravery and Humanity? But this is not the story of her life. It is the tragic story of her death, and the birth of Ilth Hale, god of Sorrow and the Forsaken.

During the God War, Ilth Hale had been stabbed in the back by her husband Kirad. Kirad removed her Armor of Bravery and slashed at her bonds of power, easily outmaneuvering her, for Ilth had thought Kirad was her staunch ally, so his betrayal was easy. And after a hundred thousand years of marriage, Kirad knew how to destroy her utterly.

Ilth Hale was left as but a speck, a single spirit: the human form of Ilth Hale as she had once been so long ago. Heartbroken, naked, and alone, Ilth Hale finally succumbed to sorrow. Searching the battlefield, she found a piece of her shattered sword, and slit her wrists. \"Vol, come to me now! You swore to take humanity to the soul sea, and I am a human again. Honor your vow!\"

But even though her wrists poured blood, Ilth Hale did not die. Vol was caught up in battle against Arisetsu, God of Hope. In the aftermath of the God War, Vol and Arisetsu were the only two gods left capable of fighting, so they fought alone. All the other gods watched, exhausted or dying, unable to intervene. So death and hope fought for a seeming eternity, each growing stronger by feeding from the energy of dead gods that swirled about the battlefield.

Vol's battle did not seem to be ending, yet Ilth Hale sat and waited, naked, bleeding, and outraged. Finally she screamed, her voice echoing across the world. \"Vol swore to usher dead humans to the soul sea. But he has forsaken me, god of humans! So too shall I forsake death, and all that is good and beloved of Vol.\" 

And Ilth Hale, the woman, became a god again. But this time, fueled by the treachery of Kirad, the callousness of Vol, and the anguish of her mythic blade, Ilth Hale was reborn as the god of Sorrow and the Forsaken.

Gathering dark power from the battlefield, Ilth Hale rose into the sky. She found a hole in the sky that she had never seen before: the entrance to Acur, the dark dimension. Now able to perceive it, she flew headlong into it and claimed it as her home.": "<h1>A Saga do Cálice</h1>

<b>Parte 2: A Morte de Ilth Hale</b>

Já existiu uma lenda mais digna de bardo do que a de Ilth Hale, o deus da Bravura e da Humanidade? Mas esta não é a história de sua vida. É a trágica história de sua morte e do nascimento de Ilth Hale, deus da tristeza e dos abandonados.

Durante a Guerra dos Deuses, Ilth Hale foi esfaqueada nas costas por seu marido Kirad. Kirad removeu sua Armadura de Bravura e cortou seus laços de poder, superando-a facilmente, pois Ilth pensava que Kirad era seu aliado fiel, então sua traição foi fácil. E depois de cem mil anos de casamento, Kirad sabia como destruí-la completamente.

Ilth Hale foi deixada apenas como uma partícula, um único espírito: a forma humana de Ilth Hale como ela havia sido há muito tempo. Com o coração partido, nu e sozinho, Ilth Hale finalmente sucumbiu à tristeza. Procurando no campo de batalha, ela encontrou um pedaço de sua espada quebrada e cortou os pulsos. \"Vol, venha até mim agora! Você jurou levar a humanidade para o mar das almas, e eu sou humano novamente. Honre seu voto!\"

Mas mesmo que seus pulsos tenham derramado sangue, Ilth Hale não morreu. Vol foi pego na batalha contra Arisetsu, Deus da Esperança. No rescaldo da Guerra dos Deuses, Vol e Arisetsu foram os únicos dois deuses capazes de lutar, então eles lutaram sozinhos. Todos os outros deuses assistiram, exaustos ou morrendo, incapazes de intervir. Assim, a morte e a esperança lutaram por uma aparente eternidade, cada uma ficando mais forte ao se alimentar da energia dos deuses mortos que giravam no campo de batalha.

A batalha de Vol não parecia estar terminando, mas Ilth Hale sentou-se e esperou, nu, sangrando e indignado. Finalmente ela gritou, sua voz ecoando pelo mundo. \"Vol jurou conduzir os humanos mortos ao mar das almas. Mas ele me abandonou, deus dos humanos! Assim também devo abandonar a morte e tudo o que é bom e amado por Vol.\" 

E Ilth Hale, a mulher, tornou-se um deus novamente. Mas desta vez, alimentada pela traição de Kirad, pela insensibilidade de Vol e pela angústia de sua lâmina mítica, Ilth Hale renasceu como o deus da Tristeza e dos Renegados.

Reunindo o poder sombrio do campo de batalha, Ilth Hale subiu ao céu. Ela encontrou um buraco no céu que nunca tinha visto antes: a entrada para Acur, a dimensão escura. Agora capaz de percebê-lo, ela voou de cabeça para dentro dele e reivindicou-o como seu lar."
"<h1>The Chalice Saga</h1>

<b>Part 3: The Chalice Drinkers</b>

Vol, meanwhile, had finished his battle with Arisetsu, and began snuffing out the defeated gods as well as newly-forming gods. After such a terrible battle, there were hundreds of new gods forming from cast-off remnants of godly power, and Vol hunted each down and killed it before it could become whole.

Ilth Hale watched Vol from her new home, the dimension known as Acur. To spite Vol, she began to seek out newly-forming dark gods and pull them to Acur so that they could manifest in safety and grow strong. 

Harukita, Tuvillus, Kajich, and Urtigal were brothers, and she called all four into her realm. Then she spotted Ormorek, no longer the god of dwarves, now just the god of bitterness. She beckoned Ormorek into her realm before Vol could find him. 

Lastly, Ilth Hale spotted a new goddess, Talerra, the god of Depression and Knowing the Truth. She beckoned for Talerra to rise into Acur with her, but Talerra was too depressed to move. Seeing that Vol was coming, Ilth Hale swooped down from the heavens, snatched Talerra in her arms, and carried her to safety. \"Talerra, you will be my sister, for we are much alike.\" Talerra mumbled something, but could not be understood.

Ilth Hale closed the door to Acur, and for a time the gods rested, growing strong. The strongest of these new gods was Harukita, resplendent in his Armor of Hate and wielding the Sword of Bigotry. It was Harukita who found the Chalice of Undeath that had been hidden in Acur. Instead of being full of souls, it was still full of Zek's power: the power to create undead.

Harukita brought the chalice before the other gods. \"I have sipped from Zek's Chalice and gained the power to create undead. But I have not sipped overmuch, for I have learned from the past. It was foolish for one god to try to protect such a power. If I drank all of the Chalice, Vol would hunt me down and eventually destroy me. But if we ALL drink from the Chalice, we shall all have the power of undeath. Vol will never be able to destroy us all. We shall be bonded in evil, a partnership that shall span an eternity. Are you with me? Drink from the chalice!\"

Harukita's brothers quickly drank from the chalice. Ormorek drank too. But when the chalice was passed to Ilth Hale, Harukita stopped her. \"There is one condition,\" he said. \"While you may be the master of this realm known as Acur, I am the master of the Chalice. We shall all have a say in how the world is destroyed, but my voice shall call out louder than all others, including yours. Is it agreed?\"

With a shrug of her naked shoulder, Ilth Hale wordlessly agreed and drank the bitter power.

A few sips remained in the Chalice, and so Ilth Hale flew to find Talerra. The goddess of depression was too weak to move most of the time, but on certain days Talerra would awaken and move with great power. Ilth Hale loved her and wanted her to be part of the covenant. Finding Talerra's body lying face-down in the muck, she parted Talerra's lips and poured some of the power into her mouth. Talerra's eyes fluttered open and she screamed, \"no!\" but it was too late: she had become part of the brotherhood of undeath.

In a moment of rage, Talerra tossed the Chalice aside and began yelling at Ilth Hale. \"How could you do this to me? You defiled the purity of depression! You marred me forever!\" While the two gods argued, a lone figure sought out the Chalice.

It was Zhia Lian, the newly-made goddess of whimsy and unpredictability. The door to Acur is unpredictable, and against tall odds Zhia Lian had been able to perceive the entrance to Acur and sneak in uninvited. She drank the last drop of power from the Chalice and then fled, giggling, out into the real world. And so Zhia Lian secretly joined the covenant, bringing a drop of whimsy and unpredictability to the undead.

In time Harukita took the empty chalice back to the world, where it once again began collecting the souls of those who died under dark emotions. And the members of the covenant — all save Talerra — began creating undead to walk the world and spread darkness across the planet.": "<h1>A Saga do Cálice</h1>

<b>Parte 3: Os bebedores de cálice</b>

Vol, entretanto, terminou sua batalha com Arisetsu e começou a extinguir os deuses derrotados, bem como os deuses recém-formados. Depois de uma batalha tão terrível, havia centenas de novos deuses se formando a partir de restos de poder divino, e Vol caçou cada um deles e os matou antes que pudessem se tornar inteiros.

Ilth Hale assistiu Vol de sua nova casa, a dimensão conhecida como Acur. Para irritar Vol, ela começou a procurar deuses das trevas recém-formados e a puxá-los para Acur para que pudessem se manifestar em segurança e crescer fortes. 

Harukita, Tuvillus, Kajich e Urtigal eram irmãos e ela chamou os quatro para seu reino. Então ela avistou Ormorek, não mais o deus dos anões, agora apenas o deus da amargura. Ela chamou Ormorek para seu reino antes que Vol pudesse encontrá-lo. 

Por último, Ilth Hale avistou uma nova deusa, Talerra, o deus da Depressão e do Conhecimento da Verdade. Ela acenou para Talerra subir até Acur com ela, mas Talerra estava deprimido demais para se mover. Vendo que Vol estava chegando, Ilth Hale desceu dos céus, agarrou Talerra em seus braços e carregou-a para um lugar seguro. \"Talerra, você será minha irmã, pois somos muito parecidas.\" Talerra murmurou alguma coisa, mas não pôde ser compreendido.

Ilth Hale fechou a porta para Acur, e por um tempo os deuses descansaram, fortalecendo-se. O mais forte desses novos deuses foi Harukita, resplandecente em sua Armadura do Ódio e empunhando a Espada da Intolerante. Foi Harukita quem encontrou o Cálice da Morte que estava escondido em Acur. Em vez de estar cheio de almas, ainda estava cheio do poder de Zek: o poder de criar mortos-vivos.

Harukita trouxe o cálice diante dos outros deuses. \"Eu bebi do Cálice de Zek e ganhei o poder de criar mortos-vivos. Mas não bebi muito, pois aprendi com o passado. Foi tolice um deus tentar proteger tal poder. Se eu bebesse todo o Cálice, Vol me caçaria e eventualmente me destruiria. Mas se TODOS bebermos do Cálice, todos teremos o poder da morte. Vol nunca será capaz de destruir todos nós. Estaremos ligados ao mal, uma parceria que durará uma eternidade. Você está comigo?

Os irmãos de Harukita beberam rapidamente do cálice. Ormorek também bebeu. Mas quando o cálice foi passado para Ilth Hale, Harukita a deteve. “Há uma condição”, disse ele. “Embora você possa ser o mestre deste reino conhecido como Acur, eu sou o mestre do Cálice. Todos nós teremos uma palavra a dizer sobre como o mundo será destruído, mas minha voz gritará mais alto do que todas as outras, incluindo a sua.

Com um encolher de ombros nus, Ilth Hale concordou sem palavras e bebeu o poder amargo.

Restaram alguns goles no Cálice e então Ilth Hale voou para encontrar Talerra. A deusa da depressão estava fraca demais para se mover na maior parte do tempo, mas em certos dias Talerra despertava e se movia com grande poder. Ilth Hale a amava e queria que ela fizesse parte do pacto. Encontrando o corpo de Talerra caído de bruços na lama, ela separou os lábios de Talerra e derramou um pouco do poder em sua boca. Os olhos de Talerra se abriram e ela gritou: \"não!\" mas já era tarde demais: ela havia se tornado parte da irmandade dos mortos-vivos.

Num momento de raiva, Talerra jogou o Cálice de lado e começou a gritar com Ilth Hale. \"Como você pôde fazer isso comigo? Você contaminou a pureza da depressão! Você me estragou para sempre!\" Enquanto os dois deuses discutiam, uma figura solitária procurou o Cálice.

Era Zhia Lian, a deusa recém-criada do capricho e da imprevisibilidade. A porta para Acur é imprevisível e, contra todas as probabilidades, Zhia Lian conseguiu perceber a entrada de Acur e entrar furtivamente sem ser convidado. Ela bebeu a última gota de poder do Cálice e então fugiu, rindo, para o mundo real. E então Zhia Lian juntou-se secretamente ao pacto, trazendo uma gota de capricho e imprevisibilidade aos mortos-vivos.

Com o tempo, Harukita levou o cálice vazio de volta ao mundo, onde mais uma vez começou a coletar as almas daqueles que morreram sob emoções sombrias. E os membros da aliança – todos exceto Talerra – começaram a criar mortos-vivos para andar pelo mundo e espalhar a escuridão por todo o planeta."
"<h1>The Gods: Council Quick-Reference</h1>

<b>by Ilvadare Irasce</b>

This guide will help citizens quickly acertain the domains, threat, and importance of any gods that they might hear about -- or even meet in person. Remember: gods are capricious forces of nature. Some gods have been friendly toward humanity in recent years, but nothing is permanent. Taking advantage of the kindness of \"friendly\" gods is a personal decision not to be made lightly.

NOTE: this symbol <color=red>*NO*</color> indicates that it is illegal to worship or contact that god, and their priests should be considered extremely dangerous.

<b>Akhisa</b> God of Patience and Cunning. Class 2. The god of spiders. Traditionally forbidden in human lands, we have recently loosened those restrictions in response to certain favors Akhisa has done for humanity. Nevertheless, this is the god of <i>cunning</i>, so think twice before making deals with Akhisa's priests.

<b>Arisetsu</b> God of Hope and Warmth. Class 1. Worshipped by elves as the mother of their modern society, but beloved in many civilizations -- including humanity. Her priests provide a valuable service to the wounded.

<b>Au-Shin</b> God of Animals and Insects. Class 2. Brother to Ri-Shin. Not particularly important on this continent but is much more active elsewhere. His animal priests are safe to engage with... so long as you're kind to animals, of course.

<b>Bogdelle</b> God of Crafting and Craftsmen. Class 3. Dwarven god. Her place amongst dwarves is complex: she loves and protects craftsmen and artisans of all types, which dwarves like. But her priests also pass on crafting techniques to non-dwarves, which dwarves do not like. But her priests are generally safe and trustworthy.

<b>Dale Renthian</b> God of Creativity and Invention. Class 3. A human god. Dale Renthian is in good standing with the Council and is comparatively safe for mortals to approach.

<b>Dreva</b> God of Balance. Class 1. Claims to be neutral in matters of mortal affairs. Responsible for the \"Druids\", who help enforce his will. Their actions are generally beneficial to humanity, but treat them with caution. If the Druids were to decide your actions were \"out of balance with nature\", it could prove fatal.

<b>Enoyos</b> God of Oceans. Class 1. Enoyos has vowed to flood most of the surface world so that his favored race of frog-people have more space to live. This makes Enoyos a dangerous enemy of humanity. However, he is a capricious god, and we've learned that prohibiting sailors from making offerings to Enoyos causes incidents at sea. Sailors are thus permitted to make offerings, but remember his eventual goals.

<b>Errana</b> God of Harvest and Reproduction. Class 1. An elven god, but loved by many peoples including humans. Unfortunately her priests spread the plague of prostitution to our fair human cities. This is generally tolerated because they are also master crop-forecasters, but treat with care. I beg you not to get too close to a priest of Errana. They will break your fragile human heart. I speak from experience.

<b>Fenna</b> God of Beauty, Dusk, and Poetry. Class 3. Human god. Possibly the youngest god to currently exist. Technically the \"daughter\" of Ilth Hale, but so far she has not evidenced any ill will toward humans. She is currently in good standing with the Council and is welcome in our cities.

<b>Garakh</b> God of Commerce and Trade. Class 1. Worshipped by goblins, but technically a neutral god. Not as active on this continent as on others, but Garakh is as trustworthy as gods get. Priests of Garakh always fulfill their contracts or die trying. Their delivery caravans are the backbone of intra-species trade with the gob-lands.

<b>Gulagra</b> <color=red>*NO*</color> God of Anarchy. Class 2. Those who seek favor from Gulagra go mad. Not in an abstract or indirect way -- they very literally go mad. Please don't be a moron. Don't believe anything Gulagra says.

<b>Harukita</b> <color=red>*NO*</color> God of Hate. Class 2. The leader of the so-called \"Chalice Gods\" responsible for undead monsters. Stay far away.

<b>Ilth Hale</b> <color=red>*NO*</color> God of Sorrow and Loss. Class 3. Once the champion of humanity, but now despises humans. Her blood priests are very dangerous.

<b>Imatia</b> God of Knowledge and Learning. Class 1. The leader of the Crone gods, Imatia is the god of books. She is not especially active here, but her monks can sometimes be spotted buying rare books to bring back to her ivory book-towers. Generally trustworthy.

<b>Irhetsu</b> God of Wind, Song, and Story. Class 2. A very old god that has altered the nature of our reality slowly over many years. Friendly but inscrutible. Be wary.

<b>Janice Alberith</b> God of Scientific Research. Class 3. A young human god that is slowly gaining prestige and followers. However, other gods are offended by the notion that their actions should be constrained by scientific principles. She has many enemies among older gods. It is wise to seek her aid, but not wise to stick around too closely.

<b>Kajich</b> <color=red>*NO*</color> God of Fear and Intimidation. Class 2. A cruel god who should never be interacted with, let alone trusted. Brother to Harukita and Tuvillus. In the past Kajich has led the armies of the undead to ravage mortal cities. His behavior is cyclical and we expect him to rise in prominence again soon.

<b>Kirad</b> God of Hearth and home. Class 1. Dwarven god. Our continent of Alharth (\"All-Hearth\") is named after Kirad's proclamation that all of this land is his Hearth, and thus under his protection. Kirad has recently been less active here, but his dwarven priests provide valuable home protection services and are well-tolerated in human society.

<b>Laeth</b> God of Time and Space. Class 1. Apparently an elven god. Little is known about Laeth. She doesn't seem to be made of quite the same stuff as other gods. Laeth is not to be worshipped so much as obeyed: if she feels the need to intervene in mortal affairs, it's imperative that we follow her instructions and get her to leave as quickly as possible.

<b>Lo-Maj</b> God of Power and Might. Class 2. Little is known about this god, who hasn't been seen in this country in decades. His traditional avatar is of an extinct species of lizardmen wielding a hammer. I don't recall ever meeting a priest or follower of Lo-Maj.

<b>Melkar</b> God of Individualism, Self-Sufficiency, and Hunting for Sustenance. Class 3. An orc god. Patron of many an outdoorsman that fancies themselves a \"loner\". Melkar dislikes cities and avoids society in general. But he is generous to his adherents and is considered trustworthy.

<b>Mirraverre</b> God of Sleep and Dreams. Class 2. An elven god. Oversees the dream realm, protecting it from intrusion. Rarely seen, but typically considered a neutral god. Some sages say her palace in the dream realm is a safe meeting place for gods.

<b>Norala</b> <color=red>*NO*</color> God of Hunting and Animality. Class 2. An orc god. Responsible for the curse of lycanthropy. She is the god of hunting for sport rather than survival. She acts on behalf of Tast, often directly against humankind. Stay away.

<b>Ormorek</b> God of Self Doubt and Bitterness. Class 3. Dwarven god. Best known for drinking extremely bitter beer and complaining. Relatively safe to interact with, should you meet him in a dwarven city.

<b>Paullus</b> God of Revelry and Alcohol. Class 3. Claims to have invented alcohol but this is very much disputed. A benign human-appearing god who is in good standing with the Council.

<b>Randolph Alberith</b> God of Travel and Journeys. Class 3. A human god, most often found by those on epic treks. Safe to interact with, but beware -- many a vagabond along the road pretends to be a priest of Randolph. Keep your guard up and demand evidence before trusting.

<b>Remga</b> <color=red>*NO*</color> God of Piracy and Rape. Class 1. The leader of the goblin gods and patron of all pirates. In the past we allowed sailors to make offerings to Remga to ensure safe travels, but new laws disallow this. If you must make offerings, choose Enoyos instead. Enoyos is no friend of humanity but Remga has proven even more despicable and untrustworthy.

<b>Ri-Shin</b> God of Plants and Trees. Class 2. Ri-Shin's priests oversee all lumberyards to ensure proper replanting. In exchange, trees grow bountifully. Ri-Shin can react with hostility to those who harm forests. So don't do that. <i>It's against the law to anger Ri-Shin.</i>

<b>Saledar</b> God of Cooperative Society. Class 2. A goblin god. Goblin healing-priests worship Saledar instead of the more common worship of Arisetsu. Saledar's adherents claim he is the god of Empathy, but Saledar permits slavery, so I disagree. His followers may or may not be safe to interact with -- it depends on the individual. Be wary.

<b>Strekios</b> God of Self-Improvement and Competition. Class 3. Strekios is oddly absent from human culture but is well known in the Crone Lands. Known as the \"Cruel Taskmaster.\" Be wary.

<b>Tast</b> <color=red>*NO*</color> God of War and Militaries. Class 1. Tast favors the orc race and often grants orcs boons when they assault human civilizations. Stay away from Tast lest you inadvertently become a weapon against humanity yourself.

<b>Talerra</b> <color=red>*NO*</color> God of Hopelessness, Depression, and Knowing the Truth. Class 3. Best known for the tantalizing bargain she offers: she can answer your burning questions in exchange for your hope. But hope is essential for survival! You must accept the fact that it's sometimes better not to know.

<b>Tuvillus</b> <color=red>*NO*</color> God of Greed and Jealousy. Class 3. Brother to Kajich and Harukita and said to be the co-creator of vampirism (alongside Ilth Hale).

<b>Umrad</b> God of Minerals, Metals, and Mining. Class 3. Dwarven god. Can sometimes be found visiting dwarven cities, and is reasonably safe to approach, but is highly suspicious of non-dwarves.

<b>Vol</b> God of Death and Renewal. Class 1. Claims to be neutral in matters of mortal affairs, but seems to favor dwarvenkind on occasion. Despises the undead. It's said that all mortals eventually meet Vol when he carries their soul back to the Soul Sea.

<b>Zare</b> God of Secrets. Class ?. We barely know of Zare's existence. We have no understanding of Zare's role in our world. Occasionally Zare's emissaries can be found swapping secrets, but there is no reliable way to prove they are who they say. Assume that most so-called \"Priests of Zare\" are lying.

<b>Zhia Lian</b> <color=red>*NO*</color> God of Whimsy and Unpredictability. Class 3. While less problematic than the other \"Chalice Gods\", Zhia is innately unpredictable. Her avatar is human and she occasionally has humanity's best interests, but chaos follows her every move, and chaos is bad for society. Keep her out of our cities!

 <h1>Appendix A: Famous Dead Gods</h1> Sages can list well over 100 deceased gods. These are the most commonly referenced in news and literature:

<b>Cae-a-Lee<b>, God of Elves. Was extremely powerful and influential. Deceased for approx. 20,000 years.

<b>Elshana</b>, God of Ingenuity. Elven god. Deceased for approx. 17,000 years. Passed on her domains and memories to Dale Renthian.

<b>Freta</b>, God of Justice and Punishment. Lizardman god, then dwarf god, and finally crone god. Deceased approx. 400 years.

<b>Hargur</b>, God of Earthquakes, Landslides, and Tsunamis. Orc god. Recently deceased.

<b>Romast</b>, God of Martial Arts. Lizardman god. Deceased for approx. 3,500 years.

<b>Urtigal</b>, God of Revulsion and Disgust. Brother of Harukita, Kajich, and Tuvillus. Recently deceased.

<b>Volzek</b>, God of Death and Undeath. Hypothesized to be the \"proto-form\" of the gods Vol and Zek, before they separated into two gods. Deceased approx. 40,000 years.

<b>Zek</b>, God of Undeath. Brother of Vol. Deceased for approx. 17,000 years. His power over undeath was recovered by the so-called \"Chalice\" gods led by Harukita. 

<b>Zura-Fin</b>, God of Fungus. Sister of Ri-Shin and Au-Shin. Recently deceased.

 <h1>Appendix B: Notes on God Classes</h1> God classifications are hotly debated amongst sages, and our opinions change often. No doubt many of the god classes used above are wrong. This is especially true of gods who aren't active in the Council Lands, because we have less experience with them.

- Class 1 gods can alter reality on a whim. They can create new races of creatures, invent new types of magic, create or move entire land masses, and much more. An elaborate system of truces and agreements between themselves prevents too much obvious intervention day to day, but we cannot really even guess at what they're doing behind the scenes.

- Class 2 gods are weaker, but can still spread their influence far and wide. These gods are often the benefactor of a chosen race or protector of important aspects of the world.

- Class 3 gods are the weakest full gods, and although incredibly powerful by mortal standards, they usually need to localize their actions through their avatars, so their impact on the world is smaller. Most Class 3 gods only have one or two active avatars at a time, whereas Class 2 gods can have a score or more, and Class 1 gods can have countless avatars (when they bother with avatars at all).

- There are also Class 4 and Class 5 nature spirits, but these are not gods. What makes a god a god, you ask? Here's my very practical rule of thumb: if a Class 1 god has tried to kill them and they survived, they must be at least Class 3. If they died, they must have been 4 or 5. Conveniently, Vol tries to kill every new god that appears, so we know that all the gods listed here can survive Vol's wrath, at least for a short time. (Of course, should Vol attack alongside his allies, all bets are off. Gods have their own complex politics that are best avoided by mortals.)": "<h1>Os Deuses: Referência Rápida do Conselho</h1>

<b>por Ilvadare Irasce</b>

Este guia ajudará os cidadãos a determinar rapidamente os domínios, as ameaças e a importância de quaisquer deuses sobre os quais possam ouvir falar - ou até mesmo conhecer pessoalmente. Lembre-se: os deuses são forças caprichosas da natureza. Alguns deuses têm sido amigáveis ​​com a humanidade nos últimos anos, mas nada é permanente. Tirar vantagem da bondade de deuses “amigáveis” é uma decisão pessoal que não deve ser tomada levianamente.

NOTA: este símbolo <color=red>*NÃO*</color> indica que é ilegal adorar ou contatar esse deus, e seus sacerdotes devem ser considerados extremamente perigosos.

<b>Akhisa</b> Deus da paciência e da astúcia. Aula 2. O deus das aranhas. Tradicionalmente proibido em terras humanas, recentemente afrouxamos essas restrições em resposta a certos favores que Akhisa fez pela humanidade. No entanto, este é o deus da <i>astúcia</i>, então pense duas vezes antes de fazer acordos com os sacerdotes de Akhisa.

<b>Arisetsu</b> Deus da Esperança e do Calor. Classe 1. Adorada pelos elfos como a mãe de sua sociedade moderna, mas amada em muitas civilizações – incluindo a humanidade. Os seus sacerdotes prestam um serviço valioso aos feridos.

<b>Au-Shin</b> Deus dos animais e dos insetos. Classe 2. Irmão de Ri-Shin. Não é particularmente importante neste continente, mas é muito mais activo noutros locais. É seguro interagir com seus sacerdotes animais... contanto que você seja gentil com os animais, é claro.

<b>Bogdelle</b> Deus do artesanato e dos artesãos. Classe 3. Deus anão. Seu lugar entre os anões é complexo: ela ama e protege artesãos e artesãos de todos os tipos, algo que os anões gostam. Mas seus sacerdotes também transmitem técnicas de artesanato para não-anões, algo que os anões não gostam. Mas os seus sacerdotes são geralmente seguros e confiáveis.

<b>Dale Renthian</b> Deus da Criatividade e da Invenção. Classe 3. Um deus humano. Dale Renthian tem boa reputação com o Conselho e é relativamente seguro para os mortais se aproximarem.

<b>Dreva</b> Deus do Equilíbrio. Classe 1. Afirma ser neutro em assuntos mortais. Responsável pelos “Druidas”, que ajudam a fazer cumprir a sua vontade. Suas ações geralmente são benéficas para a humanidade, mas trate-as com cautela. Se os Druidas decidissem que suas ações estavam “fora de equilíbrio com a natureza”, isso poderia ser fatal.

<b>Enoyos</b> Deus dos Oceanos. Classe 1. Enoyos prometeu inundar a maior parte da superfície do mundo para que sua raça favorita de sapos tivesse mais espaço para viver. Isso faz de Enoyos um perigoso inimigo da humanidade. No entanto, ele é um deus caprichoso, e aprendemos que proibir os marinheiros de fazerem oferendas a Enoyos causa incidentes no mar. Os marinheiros estão, portanto, autorizados a fazer oferendas, mas lembrem-se de seus objetivos finais.

<b>Errana</b> Deus da Colheita e da Reprodução. Classe 1. Um deus élfico, mas amado por muitos povos, incluindo humanos. Infelizmente, os seus sacerdotes espalharam a praga da prostituição nas nossas belas cidades humanas. Isso geralmente é tolerado porque eles também são mestres em previsões de colheita, mas tratam com cuidado. Imploro-lhe que não se aproxime muito de um sacerdote de Errana. Eles quebrarão seu frágil coração humano. Falo por experiência própria.

<b>Fenna</b> Deus da Beleza, do Crepúsculo e da Poesia. Classe 3. Deus humano. Possivelmente o deus mais jovem que existe atualmente. Tecnicamente a “filha” de Ilth Hale, mas até agora ela não evidenciou qualquer má vontade para com os humanos. Ela está atualmente em dia com o Conselho e é bem-vinda em nossas cidades.

<b>Garakh</b> Deus do comércio e do comércio. Classe 1. Adorado por goblins, mas tecnicamente um deus neutro. Não tão ativo neste continente quanto em outros, mas Garakh é tão confiável quanto os deuses podem ser. Os sacerdotes de Garakh sempre cumprem seus contratos ou morrem tentando. Suas caravanas de entrega são a espinha dorsal do comércio intra-espécie com as terras gob.

<b>Gulagra</b> <color=red>*NÃO*</color> Deus da Anarquia. Aula 2. Aqueles que buscam o favor de Gulagra enlouquecem. Não de uma forma abstrata ou indireta – eles literalmente enlouquecem. Por favor, não seja um idiota. Não acredite em nada do que Gulagra diz.

<b>Harukita</b> <color=red>*NÃO*</color> Deus do Ódio. Classe 2. O líder dos chamados “Deuses do Cálice” responsáveis ​​pelos monstros mortos-vivos. Fique longe.

<b>Ilth Hale</b> <color=red>*NÃO*</color> Deus da tristeza e da perda. Classe 3. Já foi o campeão da humanidade, mas agora despreza os humanos. Seus sacerdotes de sangue são muito perigosos.

<b>Imatia</b> Deus do Conhecimento e da Aprendizagem. Classe 1. A líder dos deuses da Anciã, Imatia é o deus dos livros. Ela não é especialmente ativa aqui, mas seus monges às vezes podem ser vistos comprando livros raros para levar para suas torres de livros de marfim. Geralmente confiável.

<b>Irhetsu</b> Deus do Vento, da Canção e da História. Classe 2. Um deus muito antigo que alterou lentamente a natureza da nossa realidade ao longo de muitos anos. Amigável, mas inescrutável. Seja cauteloso.

<b>Janice Alberith</b> Deusa da Pesquisa Científica. Classe 3. Um jovem deus humano que aos poucos vai ganhando prestígio e seguidores. No entanto, outros deuses ficam ofendidos com a noção de que as suas ações deveriam ser restringidas por princípios científicos. Ela tem muitos inimigos entre os deuses mais antigos. É aconselhável procurar a ajuda dela, mas não é aconselhável ficar por perto demais.

<b>Kajich</b> <color=red>*NÃO*</color> Deus do Medo e da Intimidação. Classe 2. Um deus cruel com quem nunca se deve interagir, muito menos confiar. Irmão de Harukita e Tuvillus. No passado, Kajich liderou exércitos de mortos-vivos para devastar cidades mortais. Seu comportamento é cíclico e esperamos que ele volte a ganhar destaque em breve.

<b>Kirad</b> Deus do coração e do lar. Classe 1. Deus anão. Nosso continente de Alharth (\"All-Hearth\") recebeu o nome da proclamação de Kirad de que toda esta terra é seu Lar e, portanto, está sob sua proteção. Kirad tem estado menos ativo aqui recentemente, mas seus sacerdotes anões prestam valiosos serviços de proteção doméstica e são bem tolerados na sociedade humana.

<b>Laeth</b> Deus do Tempo e do Espaço. Classe 1. Aparentemente um deus élfico. Pouco se sabe sobre Laeth. Ela não parece ser feita da mesma matéria que outros deuses. Laeth não deve ser adorada, mas sim obedecida: se ela sentir necessidade de intervir nos assuntos mortais, é imperativo que sigamos suas instruções e façamos com que ela saia o mais rápido possível.

<b>Lo-Maj</b> Deus do Poder e da Força. Aula 2. Pouco se sabe sobre esse deus, que há décadas não é visto neste país. Seu avatar tradicional é de uma espécie extinta de homens-lagarto empunhando um martelo. Não me lembro de ter conhecido algum padre ou seguidor de Lo-Maj.

<b>Melkar</b> Deus do Individualismo, da Autossuficiência e da Caça ao Sustento. Classe 3. Um deus orc. Patrono de muitos amantes da vida ao ar livre que se consideram \"solitários\". Melkar não gosta de cidades e evita a sociedade em geral. Mas ele é generoso com seus adeptos e é considerado confiável.

<b>Mirraverre</b> Deus do Sono e dos Sonhos. Classe 2. Um deus élfico. Supervisiona o reino dos sonhos, protegendo-o de invasões. Raramente visto, mas normalmente considerado um deus neutro. Alguns sábios dizem que seu palácio no reino dos sonhos é um local de encontro seguro para os deuses.

<b>Norala</b> <color=red>*NO*</color> Deus da caça e da animalidade. Classe 2. Um deus orc. Responsável pela maldição da licantropia. Ela é o deus da caça por esporte e não pela sobrevivência. Ela age em nome da Tast, muitas vezes diretamente contra a humanidade. Fique longe.

<b>Ormorek</b> Deus da dúvida e da amargura. Classe 3. Deus anão. Mais conhecido por beber cerveja extremamente amarga e reclamar. Relativamente seguro para interagir, caso você o encontre em uma cidade anã.

<b>Paullus</b> Deus da folia e do álcool. Classe 3. Afirma ter inventado o álcool, mas isso é muito contestado. Um deus benigno de aparência humana que tem boa reputação no Conselho.

<b>Randolph Alberith</b> Deus das Viagens e Jornadas. Classe 3. Um deus humano, encontrado com mais frequência por aqueles em jornadas épicas. É seguro interagir, mas cuidado: muitos vagabundos ao longo da estrada fingem ser sacerdotes de Randolph. Mantenha a guarda alta e exija evidências antes de confiar.

<b>Remga</b> <color=red>*NÃO*</color> Deus da pirataria e do estupro. Classe 1. O líder dos deuses duendes e patrono de todos os piratas. No passado, permitíamos que os marinheiros fizessem oferendas a Remga para garantir viagens seguras, mas as novas leis não permitem isso. Se você precisar fazer oferendas, escolha Enoyos. Enoyos não é amigo da humanidade, mas Remga provou ser ainda mais desprezível e indigno de confiança.

<b>Ri-Shin</b> Deus das plantas e das árvores. Classe 2. Os sacerdotes de Ri-Shin supervisionam todas as madeireiras para garantir o replantio adequado. Em troca, as árvores crescem abundantemente. Ri-Shin pode reagir com hostilidade àqueles que prejudicam as florestas. Então não faça isso. <i>É contra a lei irritar Ri-Shin.</i>

<b>Saledar</b> Deus da Sociedade Cooperativa. Classe 2. Um deus duende. Os sacerdotes de cura goblins adoram Saledar em vez da adoração mais comum de Arisetsu. Os adeptos de Saledar afirmam que ele é o deus da Empatia, mas Saledar permite a escravidão, então discordo. Pode ou não ser seguro interagir com seus seguidores – isso depende do indivíduo. Seja cauteloso.

<b>Strekios</b> Deus do autoaperfeiçoamento e da competição. Classe 3. Strekios está estranhamente ausente da cultura humana, mas é bem conhecido nas Terras Anciãs. Conhecido como o \"Treinador Cruel\". Seja cauteloso.

<b>Sabor</b> <color=red>*NÃO*</color> Deus da Guerra e dos Militares. Classe 1. Tast favorece a raça orc e muitas vezes concede benefícios aos orcs quando eles atacam civilizações humanas. Fique longe do Tast para não se tornar inadvertidamente uma arma contra a humanidade.

<b>Talerra</b> <color=red>*NÃO*</color> Deus da desesperança, da depressão e do conhecimento da verdade. Classe 3. Mais conhecida pela barganha tentadora que oferece: ela pode responder às suas perguntas candentes em troca da sua esperança. Mas a esperança é essencial para a sobrevivência! Você deve aceitar o fato de que às vezes é melhor não saber.

<b>Tuvillus</b> <color=red>*NÃO*</color> Deus da Ganância e do Ciúme. Classe 3. Irmão de Kajich e Harukita e considerado o co-criador do vampirismo (ao lado de Ilth Hale).

<b>Umrad</b> Deus dos Minerais, Metais e Mineração. Classe 3. Deus anão. Às vezes pode ser encontrado visitando cidades anãs e é razoavelmente seguro de abordar, mas é altamente suspeito de não-anões.

<b>Vol</b> Deus da Morte e da Renovação. Classe 1. Afirma ser neutro em assuntos mortais, mas parece favorecer os anões de vez em quando. Despreza os mortos-vivos. Diz-se que todos os mortais eventualmente encontram Vol quando ele carrega suas almas de volta para o Mar das Almas.

<b>Zare</b> Deus dos Segredos. Aula ?. Mal sabemos da existência de Zare. Não entendemos o papel de Zare em nosso mundo. Ocasionalmente, os emissários de Zare podem ser encontrados trocando segredos, mas não há uma maneira confiável de provar que eles são quem dizem. Suponha que a maioria dos chamados “Sacerdotes de Zare” estejam mentindo.

<b>Zhia Lian</b> <color=red>*NÃO*</color> Deus do capricho e da imprevisibilidade. Classe 3. Embora menos problemático do que os outros \"Deuses do Cálice\", Zhia é naturalmente imprevisível. Seu avatar é humano e ela ocasionalmente atende aos melhores interesses da humanidade, mas o caos segue cada movimento seu e o caos é ruim para a sociedade. Mantenha-a fora de nossas cidades!

 <h1>Apêndice A: Famosos Deuses Mortos</h1> Os sábios podem listar bem mais de 100 deuses falecidos. Estes são os mais comumente referenciados em notícias e literatura:

<b>Cae-a-Lee<b>, Deus dos Elfos. Foi extremamente poderoso e influente. Falecido há aprox. 20.000 anos.

<b>Elshana</b>, Deus da Engenhosidade. Deus élfico. Falecido há aprox. 17.000 anos. Passou seus domínios e memórias para Dale Renthian.

<b>Freta</b>, Deus da Justiça e do Castigo. Deus homem-lagarto, depois deus anão e, finalmente, deus velho. Falecido aprox. 400 anos.

<b>Hargur</b>, Deus dos terremotos, deslizamentos de terra e tsunamis. Deus orc. Recentemente falecido.

<b>Romast</b>, Deus das Artes Marciais. Deus homem-lagarto. Falecido há aprox. 3.500 anos.

<b>Urtigal</b>, Deus da Repulsa e do Nojo. Irmão de Harukita, Kajich e Tuvillus. Recentemente falecido.

<b>Volzek</b>, Deus da Morte e dos Mortos-vivos. Hipotetizado como sendo a \"protoforma\" dos deuses Vol e Zek, antes de se separarem em dois deuses. Falecido aprox. 40.000 anos.

<b>Zek</b>, Deus da Morte. Irmão do Vol. Falecido há aprox. 17.000 anos. Seu poder sobre os mortos-vivos foi recuperado pelos chamados deuses do \"Cálice\" liderados por Harukita. 

<b>Zura-Fin</b>, Deus dos Fungos. Irmã de Ri-Shin e Au-Shin. Recentemente falecido.

 <h1>Apêndice B: Notas sobre as Classes de Deus</h1> As classificações de Deus são calorosamente debatidas entre os sábios e nossas opiniões mudam frequentemente. Não há dúvida de que muitas das classes de deuses usadas acima estão erradas. Isto é especialmente verdadeiro para deuses que não estão ativos nas Terras do Conselho, porque temos menos experiência com eles.

- Os deuses da classe 1 podem alterar a realidade por capricho. Eles podem criar novas raças de criaturas, inventar novos tipos de magia, criar ou mover massas terrestres inteiras e muito mais. Um elaborado sistema de tréguas e acordos entre eles impede intervenções demasiado óbvias no dia a dia, mas não podemos sequer adivinhar o que estão a fazer nos bastidores.

- Os deuses da classe 2 são mais fracos, mas ainda podem espalhar sua influência por toda parte. Esses deuses costumam ser benfeitores de uma raça escolhida ou protetores de aspectos importantes do mundo.

- Os deuses da classe 3 são os deuses completos mais fracos e, embora sejam incrivelmente poderosos para os padrões mortais, geralmente precisam localizar suas ações através de seus avatares, para que seu impacto no mundo seja menor. A maioria dos deuses da Classe 3 tem apenas um ou dois avatares ativos por vez, enquanto os deuses da Classe 2 podem ter uma pontuação ou mais, e os deuses da Classe 1 podem ter incontáveis ​​avatares (quando se preocupam com avatares).

– Existem também espíritos da natureza de classe 4 e classe 5, mas estes não são deuses. O que torna um deus um deus, você pergunta? Aqui está minha regra prática: se um deus da Classe 1 tentou matá-los e eles sobreviveram, eles devem ser pelo menos da Classe 3. Se eles morreram, devem ter sido 4 ou 5. Convenientemente, Vol tenta matar cada novo deus que aparece, então sabemos que todos os deuses listados aqui podem sobreviver à ira de Vol, pelo menos por um curto período de tempo. (Claro, se Vol atacar ao lado de seus aliados, todas as apostas serão canceladas. Os deuses têm suas próprias políticas complexas que são melhor evitadas pelos mortais.)"
"<h1>The Wasted Wishes</h1>

... the creature appeared before her and Leeka quickly turned away. With her eyes squeezed shut, she uttered the incantation. When she finished, she gathered her courage. \"Now, I demand you give me my wishes!\"

\"Wish granted,\" said a raspy voice. \"That's the first wish used up already!\"

Leeka grimaced. No sense arguing with a gorgon; they would just manipulate you further. \"I wish to have in my possession the blade Heartseeker. But,\" she added hastily, \"It should not be impaled in my body! I want it safely in its scabbard, at my side.\"

She couldn't see the gorgon but could hear its mirth. \"Granted,\" she said. A weight suddenly appeared at her side, and she carefully felt the scabbard. It was her mother's blade, back in her hands at last!

Leeka steadied herself for the last wish. \"And now I wish for the power to wield this sword in all its glory!\"

\"You're a foolish little thing,\" said the voice. \"Granted! You have always had the power to wield the blade. You need simply complete the Blade Trials to turn it on.\"

Leeka groaned. \"Oh, that's bullshit. Come on!\" Silence.

\"Well,\" said Leeka, defeated, \"what are the Blade Trials?\" Silence. Was the gorgon gone? After a few minutes of waiting, she cautiously opened her eyes... and closed them again just in time, for the gorgon was waiting right before her!

\"Aw, almost got you,\" said the voice. \"Don't worry, Leeka. I'll get you next time.\" And with that, the room filled with smoke, and when Leeka's coughing abated, the gorgon was gone.": "<h1>Os desejos desperdiçados</h1>

... a criatura apareceu diante dela e Leeka rapidamente se virou. Com os olhos bem fechados, ela pronunciou o encantamento. Quando ela terminou, ela reuniu coragem. \"Agora, eu exijo que você me dê meus desejos!\"

\"Desejo concedido\", disse uma voz rouca. “Esse é o primeiro desejo já esgotado!”

Leeka fez uma careta. Não faz sentido discutir com uma górgona; eles apenas manipulariam você ainda mais. \"Desejo ter em minha posse a lâmina Heartseeker. Mas\", acrescentou ela apressadamente, \"ela não deveria ser empalada em meu corpo! Quero-a seguramente em sua bainha, ao meu lado.\"

Ela não podia ver a górgona, mas podia ouvir sua alegria. \"Concedido\", disse ela. Um peso apareceu de repente ao seu lado e ela sentiu cuidadosamente a bainha. Era a lâmina de sua mãe, finalmente de volta às suas mãos!

Leeka se firmou para o último desejo. \"E agora desejo o poder de manejar esta espada em toda a sua glória!\"

“Você é uma coisinha tola”, disse a voz. \"Concedido! Você sempre teve o poder de empunhar a lâmina. Você precisa simplesmente completar os Blade Trials para ativá-la.\"

Leeka gemeu. \"Oh, isso é besteira. Vamos!\" Silêncio.

\"Bem\", disse Leeka, derrotada, \"o que são os Blade Trials?\" Silêncio. A górgona se foi? Depois de alguns minutos de espera, ela abriu os olhos cautelosamente... e fechou-os novamente bem a tempo, pois a górgona estava esperando bem diante dela!

\"Ah, quase peguei você\", disse a voz. “Não se preocupe, Leeka. Te pego na próxima vez.” E com isso, a sala encheu-se de fumaça, e quando a tosse de Leeka cessou, a górgona desapareceu."
"<h1>Traits That Matter In Animal Husbandry</h1> In your career as an animal handler, You've no doubt learned all about traits like Toughness and Ferocity. But husbandry focuses on other traits, with the most important being <b>Virility</b>. Highly virile pets are more likely to successfully breed. There's another, more surprising effect of virility": "it can change the chances of having a male or female baby. If a highly virile father mates with a low-virility mother, the offspring is more likely to be male. (And vice versa with a high-virility mother and a low-virility father.)"
"<h2>Diplomacy Checks</h2> When you encounter strange creatures, you may need to trick them, calm them, or otherwise manipulate them emotionally. This is done with a \\\"Diplomacy Check\\\". Three dice are rolled, and if the total is over a certain number, something good happens. If the number is too low, something bad happens. If the number is 6+ higher than the target number, this is called a \\\"critical success\\\" and something extra-good happens. If two or more of the dice roll a 1, however, something terrible happens": "a \\\"critical failure\\\". Critical Failures happen whenever two 1s are shown, regardless of the total of the dice."
"<h2>Loot": "Culture, Hats, and More</h2> When you defeat an enemy or survive an encounter you may receive special items. These includes gold, cultural artifacts, consumable items such as potions and bombs, and hats."
"<h2>Saque": "cultura, chapéus e muito mais</h2> Ao derrotar um inimigo ou sobreviver a um encontro, você poderá receber itens especiais. Isso inclui ouro, artefatos culturais, itens consumíveis como poções e bombas e chapéus."
"<h2>Verificações de Diplomacia</h2> Ao encontrar criaturas estranhas, você pode precisar enganá-las, acalmá-las ou manipulá-las emocionalmente. Isto é feito com uma “Verificação de Diplomacia”. Três dados são lançados e, se o total ultrapassar um determinado número, algo de bom acontece. Se o número for muito baixo, algo ruim acontece. Se o número for 6+ maior que o número alvo, isso é chamado de \\\"sucesso crítico\\\" e algo extra-bom acontece. Se dois ou mais dados obtiverem 1, entretanto, algo terrível acontece": "uma “falha crítica”. Falhas Críticas acontecem sempre que dois 1s são mostrados, independente do total dos dados."
"<i>** Note": "there is no ETA for racial harmony at this time.</i>\": \"Cinco anos atrás, a Floresta Sedgewick sofria com um influxo maciço de goblins. Isso criou muitos problemas ambientais. Os Red Wings são nativos da floresta - nossos progenitores são os Tree Mantids nativos - mas os goblins são uma espécie invasora com poucos predadores naturais. A pequena população de elfos e druidas da floresta não conseguia diminuir o número crescente de goblins, e a floresta corria o risco de ser completamente destruída!"
"<i>** Observação": "não há ETA para harmonia racial no momento.</i>\""
"<i>[The word \"LIES\" is scribbled on every page in blood. However, you can still make out the words.]</i>

<h1>The Legacy of Gulagra</h1>

<i>(Council Annotated Edition)</i>

Gulagra has weakened. That much is clear. And this is a good thing.

Gulagra is the embodiment of anarchy, so it should not be surprising that we have very poor records about it. The elven sage Tullanis wrote that Gulagra was born from old chaos gods that fought themselves to death, but if this is true, it was uncountable years ago. We also know that Gulagra and Tast were once close allies, both reveling in war. But while Tast believes war should be organized and structured, Gulagra wants only chaos, and ultimately they parted ways after the battle with Dreva. After that, Gulagra focused on infiltrating city-states and destroying them from within. Even today, a leader that damages their city is said to be \"Gulagra's Fool.\"

But now, Gulagra has weakened. How or why, we do not know. It has been more than a thousand years since Gulagra's favored shape -- a huge pale worm -- has been seen. Its followers once gathered in vast cults, but now live in hidden places, clinging together to attempt to retain their sanity. They are no more dangerous than the wild beasts of this world.

But what has happened to Gulagra's influence? Is Gulagra planning something? Can chaos gods plan at all? We will have to wait and see.

<b>Councilwoman Irasce's notes:</b> Gulagra is at least a class 2 nature spirit. I believe Gulagra is simply bored -- it is no longer excited by destruction on a small scale, or even destruction of small countries. It wishes for destruction on a scale beyond our ready comprehension. I believe Gulagra is extremely intelligent, and capable of creating complex plans. But I also believe Gulagra's influence on its followers slowly drives them mad, and quite visibly so, and it's hard for the gibberingly insane to carry out covert operations. Instead, these cultists are \"merely\" tremendous forces of direct destruction. We have little to fear from \"Gulagra's Fools\" infiltrating our cities anymore.

It goes without saying that worship of Gulagra is illegal, and is punishable by swift death for you and banishment for your family. If you see a Gulagra worshipper, report them immediately. Never attempt to communicate with them.": "<i>[A palavra \"MENTIRAS\" está rabiscada em cada página com sangue. No entanto, você ainda consegue entender as palavras.]</i>

<h1>O Legado de Gulagra</h1>

<i>(Edição Anotada pelo Conselho)</i>

Gulagra enfraqueceu. Isso está claro. E isso é uma coisa boa.

Gulagra é a personificação da anarquia, por isso não deveria surpreender que tenhamos registros muito ruins sobre isso. O sábio élfico Tullanis escreveu que Gulagra nasceu de antigos deuses do caos que lutaram até a morte, mas se isso for verdade, foi há incontáveis ​​anos atrás. Também sabemos que Gulagra e Tast já foram aliados próximos, ambos se deleitando com a guerra. Mas enquanto Tast acredita que a guerra deve ser organizada e estruturada, Gulagra quer apenas o caos e, finalmente, eles se separaram após a batalha com Dreva. Depois disso, Gulagra se concentrou em se infiltrar nas cidades-estado e destruí-las por dentro. Ainda hoje, um líder que causa danos à sua cidade é considerado o “Tolo de Gulagra”.

Mas agora o Gulagra enfraqueceu. Como ou por que, não sabemos. Já se passaram mais de mil anos desde que a forma preferida de Gulagra – um enorme verme pálido – foi vista. Seus seguidores já se reuniram em vastos cultos, mas agora vivem em lugares escondidos, unindo-se para tentar manter a sanidade. Eles não são mais perigosos que as feras deste mundo.

Mas o que aconteceu com a influência de Gulagra? Gulagra está planejando alguma coisa? Os deuses do caos podem planejar? Teremos que esperar para ver.

<b>Notas da vereadora Irasce:</b> Gulagra é pelo menos um espírito da natureza de classe 2. Acredito que Gulagra está simplesmente entediado – já não está entusiasmado com a destruição em pequena escala, ou mesmo com a destruição de pequenos países. Deseja a destruição numa escala além da nossa compreensão. Acredito que Gulagra é extremamente inteligente e capaz de criar planos complexos. Mas também acredito que a influência de Gulagra sobre os seus seguidores os leva lentamente à loucura, e de forma bastante visível, e é difícil para os insanos e tagarelas realizar operações secretas. Em vez disso, estes cultistas são “meramente” forças tremendas de destruição direta. Temos pouco a temer que os “Tolos de Gulagra” se infiltrem mais em nossas cidades.

Escusado será dizer que a adoração de Gulagra é ilegal e é punível com morte rápida para você e banimento para sua família. Se você vir um adorador de Gulagra, denuncie-o imediatamente. Nunca tente se comunicar com eles."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>

 <h1>Final Lesson: Avoid The Traps</h1>

The final lesson is that gods are usually not the best way to find answers. These volumes only cover the godly means of answering questions, but my separate twenty-volume set covers all the <i>mortal</i> means of divination, researching, and discovery, and you should <i>really</i> try those first. Mortals are simply more reliable in general. Even when the gods can't or won't help you, some mortal somewhere usually can.

(A hint: find Garakh's Bazaar. The god of commerce cares little for knowledge as a commodity, but his bazaar does attract commerce-oriented sages.)

What you absolutely <i>don't</i> want to do is contact just any random god. When you begin searching for ways to summon gods, you'll find methods for contacting gods such as Melkar, Norala, Strekios, or Ri-Shin. But just because you CAN contact a god doesn't mean you SHOULD. Most gods resent contact from mortals seeking answers.

Be <i>especially</i> wary of summoning the following gods. Contacting them may seem like a good idea, but it's probably not. (And we'll leave off the obviously-insane ideas, like contacting the God of Hate just to ask him a question.)

<b>Akhisa, Patience, Cunning, and Spiders:</b> Akhisa often offers deals to clever mortals. The deals always seem to have a loophole that the clever mortal can abuse, turning a bad deal into a great one. But repeat after me: <i>you are not more cunning than the god of cunning.</i> Unless your very soul and the souls of your family are a cost you're willing to pay, you can't afford to do \"business\" with Akhisa.

<b>Gulagra, Anarchy:</b> Sages hear this tale all too often: Gulagra comes to you in a dream with the answer to a problem you've been desperate to solve. But when you awaken, you can't quite remember the solution. You help Gulagra in whatever ways are needed, desperate to re-envision the dream. But the dream was a lie. Gulagra will drive you mad before ever giving you any answers.

<b>Remga, Piracy, Violence, and Rape:</b> it should go without saying that when Remga's \"ambassadors\" sail up with an offer for you, you should run -- not walk -- away from that city as quickly as you can. Remga only rarely honors his deals. More than likely, you'll just end up dead.

<b>Zhia Lian, Surprise, Whimsy, and Unpredictability:</b> those who seek Zhia Lian can often find her, especially if she thinks you're interesting. And it does sometimes occur that Zhia Lian answers a question for you. But she is by definition unpredictable, and if she's in a poor mood, you could end up turned into a sad song or a talking worm or a magical candlestick whose flame burns with your purest thoughts. God-level unpredictability is very bad for your health.

 <h1>Parting Thoughts</h1>

Only contact a god as a last resort.

If you must contact a god, expect the price to be very high.

And if a god ever approaches YOU with an offer, it's going to be dangerous. Very dangerous. No exceptions.": "<i>[Esta série de livros do sábio goblin Muligu detalha cada deus que pode ajudá-lo com uma questão relacionada ao conhecimento.]</i>

 <h1>Lição final: evite as armadilhas</h1>

A lição final é que os deuses geralmente não são a melhor maneira de encontrar respostas. Esses volumes cobrem apenas os meios divinos de responder perguntas, mas meu conjunto separado de vinte volumes cobre todos os meios <i>mortais</i> de adivinhação, pesquisa e descoberta, e você deveria <i>realmente</i> experimentá-los primeiro. Os mortais são simplesmente mais confiáveis ​​em geral. Mesmo quando os deuses não podem ou não querem ajudá-lo, algum mortal em algum lugar geralmente consegue.

(Uma dica: encontre o Bazar de Garakh. O deus do comércio pouco se importa com o conhecimento como mercadoria, mas seu bazar atrai sábios orientados para o comércio.)

O que você absolutamente <i>não</i> quer fazer é entrar em contato com qualquer deus aleatório. Ao começar a procurar maneiras de invocar deuses, você encontrará métodos para entrar em contato com deuses como Melkar, Norala, Strekios ou Ri-Shin. Mas só porque você PODE entrar em contato com um deus não significa que DEVE. A maioria dos deuses se ressente do contato de mortais em busca de respostas.

Seja <i>especialmente</i> cauteloso ao invocar os seguintes deuses. Contatá-los pode parecer uma boa ideia, mas provavelmente não é. (E deixaremos de lado as ideias obviamente insanas, como entrar em contato com o Deus do Ódio apenas para fazer uma pergunta.)

<b>Akhisa, Paciência, Astúcia e Aranhas:</b> Akhisa frequentemente oferece acordos para mortais espertos. Os acordos sempre parecem ter uma brecha que o mortal esperto pode abusar, transformando um mau negócio em um ótimo. Mas repita comigo: <i>você não é mais astuto que o deus da astúcia.</i> A menos que sua própria alma e as almas de sua família sejam um custo que você esteja disposto a pagar, você não pode se dar ao luxo de fazer “negócios” com Akhisa.

<b>Gulagra, Anarquia:</b> Os sábios ouvem esta história com muita frequência: Gulagra chega até você em um sonho com a resposta para um problema que você está desesperado para resolver. Mas quando você acorda, não consegue se lembrar da solução. Você ajuda Gulagra de todas as maneiras necessárias, desesperado para repensar o sonho. Mas o sonho era uma mentira. Gulagra vai te deixar louco antes mesmo de lhe dar qualquer resposta.

<b>Remga, Pirataria, Violência e Estupro:</b> nem é preciso dizer que quando os “embaixadores” de Remga vierem com uma oferta para você, você deve correr – e não andar – para longe daquela cidade o mais rápido que puder. Remga raramente honra seus acordos. Muito provavelmente, você acabará morto.

<b>Zhia Lian, surpresa, capricho e imprevisibilidade:</b> aqueles que procuram Zhia Lian muitas vezes podem encontrá-la, especialmente se ela achar que você é interessante. E às vezes ocorre que Zhia Lian responde a uma pergunta para você. Mas ela é, por definição, imprevisível e, se estiver de mau humor, você pode acabar transformado em uma canção triste, em um verme falante ou em um castiçal mágico cuja chama queima com seus pensamentos mais puros. A imprevisibilidade em nível de Deus é muito ruim para sua saúde.

 <h1>Pensamentos de despedida</h1>

Entre em contato com um deus apenas como último recurso.

Se você precisar entrar em contato com um deus, espere que o preço seja muito alto.

E se um deus alguma vez se aproximar de VOCÊ com uma oferta, será perigoso. Muito perigoso. Sem exceções."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>

 <h1>Irhetsu, God of Wind, Song, and Stories</h1>

<b>Who he is:</b> once just the god of breezes, Irhetsu somehow became the god of songs, and then stories told in song, and finally the god of stories themselves. Irhestu is one of the most easy-to-find gods because he hosts parties with his on-and-off girlfriend, Fenna, the god of Poetry, and his buddy Paullus, the god of parties.

<b>What he knows and how to find him:</b> Irhetsu knows songs. Pretty much all the songs. Plus, he knows a lot of stories. Old stories, mostly, but modern ones too. If you need to hear a lost song or story, he's your first choice.

Irhetsu is not a subtle party-thrower. To find him -- well, one of his avatars -- you just need to catch word of when his next party is. If you're in a major metropolis, that's not too hard. You're likely to have one nearby within a few months. Getting an invite to the party should be easy if you're rich and well-connected.

But then comes the tricky part: getting him to care. He needs to be able to hear you over the sounds of all the music, so it helps if you're telepathic! If not, bring a sign. Seriously. Once you get his attention, he will give you about ten seconds of his time, so make it count! If you inspire him to tell a story or sing a song, he'll do so. It may not be the one you needed... but then again, it just might be.

 <h1>Janice Alberith, God of Science and Discovery</h1>

<b>Who she is:</b> the god of Science is only ten or fifteen thousand years old, making her one of the youngest gods. While she knows an incredible amount, she's not a hoarder of knowledge and facts. The act of discovery is what Janice is about. Never content to learn something from a book when she could empirically determine it herself, everything that Janice knows comes from personal experience.

Janice seems mostly content to perform experiments far away from mortal eyes. But she does help certain sages and scientists who need her particular expertise in the art of science itself.

<b>What she knows and how to find her:</b> Janice knows an incredible amount about the physical makeup of the universe. But most of that knowledge is also known to mortals -- and a sage is far easier to contact than Janice Alberith! If you know enough metaphysics to know what Sages DON'T know, Janice might be able to help.

If Janice decides your inquiry is worthwhile, she'll help you design an experiment to answer your question empirically. She's better at it than any mortal, so if there's an experiment that would answer your question, Janice Alberith can devise it for you.

But actually PERFORMING the experiment is usually up to you. On rare occasion, though, Janice takes an interest in the experiment and may help with it. And she does often lend a hand with logistics, teleporting you to a remote destination or bringing extremely large objects closer to you so you can study them.

Contacting Janice is best left to Sages and Scientists. You will have to pay the Sage, but Janice herself does not take payment of any kind. If she chooses to help you, it will be free.

 <h1>Laeth, God of Time</h1>

<b>Who she is:</b> the god of time itself is not usually considered a god of knowledge. She does have access to tremendous information both past and future, but Laeth is charged with maintaining the time-flow of this part of the galaxy. She alone among the gods of our world works on a grander scale -- a scale that even your author cannot truly understand.

Long story short, she's pretty busy, and she doesn't answer summons.

<b>What she knows and how to find her:</b> as the god of time, she can find the answers to anything that's ever happened or ever will happen. In theory, at least. There's scant information about her, but we know she has intervened in our world's history several times -- perhaps a great many times, for all we know -- to help prevent a terrible future.

As is the case with many gods, if you find a way to summon Laeth, it means Laeth <b>wants</b> you to summon her. And unfortunately that means you're probably going to have to do something to save the world. But after you save the world, she'll usually answer a few questions before she leaves. Make them count.": "<i>[Esta série de livros do sábio goblin Muligu detalha cada deus que pode ajudá-lo com uma questão relacionada ao conhecimento.]</i>

 <h1>Irhetsu, Deus do Vento, da Canção e das Histórias</h1>

<b>Quem ele é:</b> antes apenas o deus das brisas, Irhetsu de alguma forma se tornou o deus das canções, e depois das histórias contadas em canções, e finalmente o deus das próprias histórias. Irhestu é um dos deuses mais fáceis de encontrar porque ele organiza festas com sua namorada intermitente, Fenna, o deus da poesia, e seu amigo Paullus, o deus das festas.

<b>O que ele sabe e como encontrá-lo:</b> Irhetsu conhece músicas. Praticamente todas as músicas. Além disso, ele conhece muitas histórias. Histórias antigas, em sua maioria, mas também modernas. Se você precisa ouvir uma música ou história perdida, ele é sua primeira escolha.

Irhetsu não é um festeiro sutil. Para encontrá-lo – bem, um de seus avatares – você só precisa saber quando será sua próxima festa. Se você estiver em uma grande metrópole, isso não é muito difícil. É provável que você tenha um por perto dentro de alguns meses. Conseguir um convite para a festa deve ser fácil se você for rico e bem relacionado.

Mas então vem a parte complicada: fazer com que ele se importe. Ele precisa ser capaz de ouvir você acima dos sons de todas as músicas, então ajuda se você for telepático! Se não, traga uma placa. Seriamente. Depois de chamar a atenção dele, ele lhe dará cerca de dez segundos de seu tempo, então faça valer a pena! Se você o inspirar a contar uma história ou cantar uma música, ele o fará. Pode não ser o que você precisava... mas, novamente, pode ser.

 <h1>Janice Alberith, Deusa da Ciência e da Descoberta</h1>

<b>Quem ela é:</b> o deus da Ciência tem apenas dez ou quinze mil anos, o que o torna um dos deuses mais jovens. Embora ela saiba muito, ela não é uma acumuladora de conhecimentos e fatos. O ato de descoberta é o objetivo de Janice. Nunca satisfeita em aprender algo de um livro quando ela mesma poderia determiná-lo empiricamente, tudo o que Janice sabe vem da experiência pessoal.

Janice parece contente em realizar experimentos longe dos olhos mortais. Mas ela ajuda certos sábios e cientistas que precisam de sua experiência específica na própria arte da ciência.

<b>O que ela sabe e como encontrá-la:</b> Janice sabe muito sobre a composição física do universo. Mas a maior parte desse conhecimento também é conhecida pelos mortais – e é muito mais fácil contatar um sábio do que Janice Alberith! Se você conhece metafísica o suficiente para saber o que os Sábios NÃO sabem, Janice poderá ajudar.

Se Janice decidir que sua investigação vale a pena, ela o ajudará a planejar um experimento para responder empiricamente à sua pergunta. Ela é melhor nisso do que qualquer mortal, então, se houver um experimento que responda à sua pergunta, Janice Alberith pode concebê-lo para você.

Mas, na verdade, REALIZAR o experimento geralmente depende de você. Em raras ocasiões, porém, Janice se interessa pelo experimento e pode ajudar. E ela muitas vezes ajuda na logística, teletransportando você para um destino remoto ou trazendo objetos extremamente grandes para mais perto de você para que você possa estudá-los.

É melhor deixar o contato com Janice para Sábios e Cientistas. Você terá que pagar ao Sábio, mas a própria Janice não aceita nenhum tipo de pagamento. Se ela decidir ajudá-lo, será de graça.

 <h1>Laeth, Deus do Tempo</h1>

<b>Quem ela é:</b> o deus do tempo em si geralmente não é considerado um deus do conhecimento. Ela tem acesso a informações tremendas do passado e do futuro, mas Laeth é responsável por manter o fluxo do tempo nesta parte da galáxia. Só ela, entre os deuses do nosso mundo, trabalha numa escala maior – uma escala que nem mesmo o seu autor consegue compreender verdadeiramente.

Para encurtar a história, ela está muito ocupada e não atende convocações.

<b>O que ela sabe e como encontrá-la:</b> como deusa do tempo, ela pode encontrar as respostas para tudo o que já aconteceu ou acontecerá. Em teoria, pelo menos. Há pouca informação sobre ela, mas sabemos que ela interveio na história do nosso mundo várias vezes - talvez muitas vezes, pelo que sabemos - para ajudar a prevenir um futuro terrível.

Como é o caso de muitos deuses, se você encontrar uma maneira de invocar Laeth, significa que Laeth <b>quer</b> que você a invoque. E infelizmente isso significa que você provavelmente terá que fazer algo para salvar o mundo. Mas depois de salvar o mundo, ela geralmente responderá algumas perguntas antes de partir. Faça-os contar."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>

 <h1>Miraverre, God of Sleep and Dreams</h1>

<b>Who she is:</b> Miraverre runs the Dream Realm, a place where dreams actually happen. You may have visited it yourself. They say that if you wake up from a dream with the sensation that your dream was real, you were probably dreaming in Miraverre's realm.

Although dreams seem to be what Miraverre concerns herself with most of the time, she is also the god of Sleep itself, and sometimes helps insomniacs.

<b>What she knows and how to find her:</b> if you've had one of those \"it seemed too real\" dreams, and you need to remember it better, she can help you relive it. She also knows what has taken place in countless dreams over the millennia. She will rarely divulge the secret dreams of someone who is still alive, but she sometimes shares pieces of dreams from the long-deceased. 

In general, calling on Miraverre for help is a long-shot. But if you want to reach her, just dream about her. She might choose to appear in your dream. 

And remember: you really don't want to upset her. She won't withhold sleep from you -- that idea would be offensive to her -- but she WILL turn all your dreams into horrific nightmares, driving you gibberingly insane within a month.

Just... be polite, really. That's all it takes. She's a very easygoing elf by all accounts.

Miraverre can also help you communicate with someone else who is sleeping at the same time. But that's beyond the scope of this book!

 <h1>Ormorek, God of Bitterness</h1>

<b>Who he is:</b> This old dwarven god was superseded as the \"God of Dwarves\" long ago. Now he just lives in the dwarven capital and complains a lot.

<b>What he knows and how to find him:</b> Ormorek is an old god, and he's known more gods than we have names for. Since he lives in New Aufghel, you can simply pay him a visit. If you pay his bar tab (NOT cheap), he might indulge your questions about another god, or a god-related incident. Just don't let him sell you anything.

 <h1>Talerra, God of Depression and Knowing the Truth</h1>

<b>Who she is:</b> they say that when you're truly hopeless, the world becomes more clear. You can see reality for what it is. Of course, you're too depressed to do anything about it. That's Talerra in a nutshell. She spends most of the time comatose from depression. But on occasions when the moon is new, she wakes up and answers prayers.

<b>What she knows and how to find her:</b> Talerra seems to have perfect knowledge of the past few decades. She also has imperfect knowledge of the future. But she doesn't have this knowledge stored away; she seems to answer questions for people by divining the information for them on the spot.

There is a price for this knowledge, though, and it's a harsh one. Divining the knowledge saps away part of your life force. Your sense of hope, specifically. And Talerra can't tell how much hope it's going to cost you. Typically, you'll lose hope for a few weeks or months. If your question is especially difficult to divine, you may lose hope for a year. And a tiny number of supplicants lose all hope forever.

But before you decide that \"losing hope for a month\" sounds like a reasonable price to pay, realize that without hope, you won't have the will to keep living. You will lie comatose, waiting for death. If someone doesn't feed you, bathe you, and care to your bed sores, you will die. Make preparations accordingly.

If you wish to proceed, contact your local sage. He can help you with the rituals. They aren't secret, but they're very complicated, and you need to get them right. If you're rich enough, hire an expert ritual master to assist you!

 <h1>Zare, God of Secrets</h1>

<b>Who he or she is:</b> we know little about Zare. We don't even know Zare's avatars' preferred gender, if any. Zare is always hooded and mysterious.

<b>What he or she knows and how to find them:</b> Zare knows secrets. (Not every secret. Just a lot of secrets.) But if Zare were to tell you the secret, it'd stop being a secret. So Zare would never willingly give away a secret without receiving a better secret in exchange.

If you have secrets that Zare might be willing to trade for, you can try to contact him or her. The method is, of course, a secret, but it's at least one that you can discover. Apparently there is a word, a strange and exceptionally long word, that, when spoken, summons Zare. The word only works once, though, and then it changes. Finding this word is quite difficult, but a sage should be able to help you -- for a very high fee, of course.": "<i>[Esta série de livros do sábio goblin Muligu detalha cada deus que pode ajudá-lo com uma questão relacionada ao conhecimento.]</i>

 <h1>Miraverre, Deus do Sono e dos Sonhos</h1>

<b>Quem ela é:</b> Miraverre administra o Dream Realm, um lugar onde os sonhos realmente acontecem. Você pode ter visitado você mesmo. Dizem que se você acordar de um sonho com a sensação de que seu sonho foi real, provavelmente você estava sonhando no reino de Miraverre.

Embora os sonhos pareçam ser a preocupação de Miraverre na maior parte do tempo, ela também é o próprio deus do sono e às vezes ajuda os insones.

<b>O que ela sabe e como encontrá-la:</b> se você teve um daqueles sonhos \"parecia muito real\" e precisa se lembrar melhor dele, ela pode ajudá-lo a revivê-lo. Ela também sabe o que aconteceu em inúmeros sonhos ao longo dos milênios. Ela raramente divulga os sonhos secretos de alguém que ainda está vivo, mas às vezes compartilha pedaços de sonhos de pessoas já falecidas. 

Em geral, pedir ajuda a Miraverre é um tiro no escuro. Mas se você quiser alcançá-la, apenas sonhe com ela. Ela pode escolher aparecer em seu sonho. 

E lembre-se: você realmente não quer incomodá-la. Ela não vai impedir você de dormir - essa ideia seria ofensiva para ela - mas ela VAI transformar todos os seus sonhos em pesadelos horríveis, deixando você louco e tagarela dentro de um mês.

Apenas... seja educado, de verdade. Isso é tudo que é preciso. Ela é uma elfa muito descontraída em todos os aspectos.

Miraverre também pode ajudá-lo a se comunicar com outra pessoa que esteja dormindo ao mesmo tempo. Mas isso está além do escopo deste livro!

 <h1>Ormorek, Deus da Amargura</h1>

<b>Quem ele é:</b> Este antigo deus anão foi substituído como o \"Deus dos Anões\" há muito tempo. Agora ele mora apenas na capital anã e reclama muito.

<b>O que ele sabe e como encontrá-lo:</b> Ormorek é um deus antigo e conhece mais deuses do que temos nomes. Como ele mora em New Aufghel, você pode simplesmente visitá-lo. Se você pagar a conta do bar (NÃO é barato), ele pode responder às suas perguntas sobre outro deus ou sobre um incidente relacionado a um deus. Só não deixe que ele lhe venda nada.

 <h1>Talerra, Deus da Depressão e do Conhecimento da Verdade</h1>

<b>Quem ela é:</b> dizem que quando você está realmente sem esperança, o mundo fica mais claro. Você pode ver a realidade como ela é. Claro, você está deprimido demais para fazer algo a respeito. Em poucas palavras, isso é Talerra. Ela passa a maior parte do tempo em coma devido à depressão. Mas nas ocasiões em que a lua é nova, ela acorda e responde às orações.

<b>O que ela sabe e como encontrá-la:</b> Talerra parece ter um conhecimento perfeito das últimas décadas. Ela também tem um conhecimento imperfeito do futuro. Mas ela não tem esse conhecimento guardado; ela parece responder às perguntas das pessoas, adivinhando as informações para elas na hora.

Há um preço para esse conhecimento, porém, e é um preço duro. Adivinhar o conhecimento esgota parte de sua força vital. Seu senso de esperança, especificamente. E Talerra não sabe dizer quanta esperança isso lhe custará. Normalmente, você perderá a esperança por algumas semanas ou meses. Se a sua pergunta for especialmente difícil de adivinhar, você poderá perder a esperança por um ano. E um pequeno número de suplicantes perde toda a esperança para sempre.

Mas antes de decidir que “perder a esperança por um mês” parece um preço razoável a pagar, perceba que sem esperança você não terá vontade de continuar vivendo. Você ficará em coma, esperando pela morte. Se alguém não te alimentar, dar banho e cuidar de suas feridas, você morrerá. Faça os preparativos adequadamente.

Se você deseja prosseguir, entre em contato com seu sábio local. Ele pode ajudá-lo com os rituais. Eles não são secretos, mas são muito complicados e você precisa acertá-los. Se você for rico o suficiente, contrate um mestre ritual especializado para ajudá-lo!

 <h1>Zare, Deus dos Segredos</h1>

<b>Quem ele ou ela é:</b> sabemos pouco sobre Zare. Nem sabemos o gênero preferido dos avatares de Zare, se houver. Zare está sempre encapuzado e misterioso.

<b>O que ele ou ela sabe e como encontrá-los:</b> Zare conhece segredos. (Nem todos os segredos. Apenas muitos segredos.) Mas se Zare lhe contasse o segredo, ele deixaria de ser um segredo. Então Zare nunca revelaria um segredo de boa vontade sem receber em troca um segredo melhor.

Se você tiver segredos pelos quais Zare possa estar disposto a negociar, tente contatá-lo. O método é, obviamente, um segredo, mas pelo menos é um que você pode descobrir. Aparentemente há uma palavra, uma palavra estranha e excepcionalmente longa, que, quando pronunciada, convoca Zare. A palavra só funciona uma vez e depois muda. Encontrar essa palavra é bastante difícil, mas um sábio poderá ajudá-lo – por uma taxa muito alta, é claro."
