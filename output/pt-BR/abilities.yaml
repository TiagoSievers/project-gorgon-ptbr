"Create a dangerous wall of fire at your feet.": "Crie uma perigosa parede de fogo aos seus pés."
"Create a dangerous wall of fire at your feet. This variant version of Wall of Fire 4 uses an unnaturally colored flame.": "Crie uma perigosa parede de fogo aos seus pés. Esta versão variante de Wall of Fire 4 usa uma chama de cor não natural."
"Create a pillar of particles that lasts for 30 seconds.": "Crie um pilar de partículas que dura 30 segundos."
"Create a sentient cloud of undead dust and angry bone fragments. This alternate version of Summon Tornado does not knock back foes. It deals Darkness damage instead of Nature damage.": "Crie uma nuvem senciente de poeira morta-viva e fragmentos de ossos raivosos. Esta versão alternativa de Summon Tornado não repele os inimigos. Causa dano de Escuridão em vez de dano de Natureza."
"Create a sentient microclimate of extreme low temperature which attacks foes. You do not have control over the sphere's movement.": "Crie um microclima senciente de temperatura extremamente baixa que ataca os inimigos. Você não tem controle sobre o movimento da esfera."
"Create a sentient microclimate of volatile wind which attacks foes. Although the tornado takes cues from your behavior, you do not directly control the tornado.": "Crie um microclima sensível de vento volátil que ataca os inimigos. Embora o tornado siga dicas do seu comportamento, você não o controla diretamente."
"Create a sentient microclimate of wind-blasted sand. This alternate version of Summon Tornado does not knock back foes, but deals extra armor damage.": "Crie um microclima senciente de areia soprada pelo vento. Esta versão alternativa de Summon Tornado não repele os inimigos, mas causa dano extra à armadura."
"Create a storm over target enemy. Deals nature damage immediately, and continuously for a few seconds.": "Crie uma tempestade sobre o inimigo alvo. Causa dano natural imediatamente e continuamente por alguns segundos."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Amazing Caustic Ink.": "Crie um símbolo de bile que lança ácido destruidor de armaduras nos alvos. Dura 120 segundos. Consome uma Tinta Cáustica Incrível."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Astounding Caustic Ink.": "Crie um símbolo de bile que lança ácido destruidor de armaduras nos alvos. Dura 120 segundos. Consome uma Tinta Cáustica Surpreendente."
