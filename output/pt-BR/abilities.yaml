"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Incredibly Caustic Ink.": "Crie um símbolo de bile que lança ácido destruidor de armaduras nos alvos. Dura 120 segundos. Consome uma tinta incrivelmente cáustica."
