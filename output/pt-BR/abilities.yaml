"Create a dangerous symbol that explodes when an enemy gets near. Requires one Expert Volatile Ink, with a 33% chance to consume it.": "Crie um símbolo perigoso que explode quando um inimigo se aproxima. Requer uma Tinta Volátil Especializada, com 33% de chance de consumi-la."
