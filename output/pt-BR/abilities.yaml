"This variant of Super Fireball has a chance to super-char one of the femurs in a human, elf, or rakshasa target, leaving it behind on their corpse when they perish.": "Esta variante do Super Fireball tem a chance de superchar um dos fêmures de um alvo humano, elfo ou rakshasa, deixando-o para trás em seu cadáver quando eles morrerem."
"This variant Wall of Fire has slightly increased range and is extremely aggravating to enemies.": "Esta variante Wall of Fire tem alcance ligeiramente aumentado e é extremamente agravante para os inimigos."
"This variant Wall of Fire is green in color and provides life at the expense of damage.": "Esta variante Wall of Fire é de cor verde e fornece vida às custas de danos."
"This variant Wall of Fire is icy cold.": "Esta variante Wall of Fire é gelada."
"Thrall Throw": "Lançamento de Escravos"
"Thrall Throw Harder": "Thrall joga com mais força"
"Throw a ball of cold.": "Jogue uma bola de frio."
"Throw a ball of cold. It travels farther than a normal frostball and deals extra damage to Off-Guard targets.": "Jogue uma bola de frio. Ele viaja mais longe do que uma bola de gelo normal e causa dano extra aos alvos fora da guarda."
"Throw a ball of cold. It travels farther than a normal frostball and deals extra damage to vulnerable targets.": "Jogue uma bola de frio. Ele viaja mais longe do que uma bola de gelo normal e causa dano extra a alvos vulneráveis."
"Throw a ball of fire.": "Jogue uma bola de fogo."
"Throw a ball of fire. This variant is more potent than a regular Fireball of the same level but costs Power.": "Jogue uma bola de fogo. Esta variante é mais potente que uma bola de fogo normal do mesmo nível, mas custa Poder."
"Throw a ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Jogue uma bola de fogo. Você não precisa empunhar um implemento para lançar este feitiço, nem mesmo ter Fire Magic ativo. Este feitiço vai para sua barra de habilidades diversas."
"Throw a ball of room-temperature matter.": "Jogue uma bola de matéria à temperatura ambiente."
"Throw a big ball of water at your enemy.": "Jogue uma grande bola de água em seu inimigo."
"Throw a grievously harmful ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Jogue uma bola de fogo extremamente prejudicial. Você não precisa empunhar um implemento para lançar este feitiço, nem mesmo ter Fire Magic ativo. Este feitiço vai para sua barra de habilidades diversas."
"Throw a painful ball of room-temperature matter.": "Jogue uma bola dolorosa de matéria à temperatura ambiente."
"Throw a potently damaging ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Jogue uma bola de fogo potencialmente prejudicial. Você não precisa empunhar um implemento para lançar este feitiço, nem mesmo ter Fire Magic ativo. Este feitiço vai para sua barra de habilidades diversas."
"Throw a reasonably painful ball of room-temperature matter.": "Jogue uma bola razoavelmente dolorosa de matéria à temperatura ambiente."
"Throw a scintillating energy ball. It travels farther than a fireball and does additional damage to Off-Guard targets.": "Jogue uma bola de energia cintilante. Ele viaja mais longe que uma bola de fogo e causa dano adicional aos alvos fora da guarda."
"Throw a scintillating energy ball. It travels farther than a fireball and does additional damage to vulnerable targets.": "Jogue uma bola de energia cintilante. Ele viaja mais longe que uma bola de fogo e causa danos adicionais a alvos vulneráveis."
"Throw a vaguely painful ball of warmth.": "Jogue uma bola de calor vagamente dolorosa."
"Throw a vaguely painful ball of warmth. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Jogue uma bola de calor vagamente dolorosa. Você não precisa empunhar um implemento para lançar este feitiço, nem mesmo ter Fire Magic ativo. Este feitiço vai para sua barra de habilidades diversas."
"Throw a very potent fireball.": "Jogue uma bola de fogo muito potente."
"Throw an essentially-harmless ball of cold.": "Jogue uma bola de frio essencialmente inofensiva."
"Throw an essentially-harmless sphere of room-temperature matter.": "Jogue uma esfera essencialmente inofensiva de matéria à temperatura ambiente."
"Throw an intensely painful ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Jogue uma bola de fogo intensamente dolorosa. Você não precisa empunhar um implemento para lançar este feitiço, nem mesmo ter Fire Magic ativo. Este feitiço vai para sua barra de habilidades diversas."
"Throw spirit-realm energy at your enemy.": "Jogue energia do reino espiritual em seu inimigo."
