"Inject a spider egg into the target. If they live long enough, a spider will erupt from them.": "Injete um ovo de aranha no alvo. Se viverem o suficiente, uma aranha surgirá deles."
"Inject healing chemicals into yourself or an ally.": "Injete produtos químicos curativos em você ou em um aliado."
"Inject mutation chemicals into yourself or an ally. You grow a small ancillary heart inside your ribcage, causing you to regenerate power quicker. (Someone can only be affected by one Mutation at a time.)": "Injete produtos químicos de mutação em você ou em um aliado. Você desenvolve um pequeno coração auxiliar dentro de sua caixa torácica, fazendo com que você regenere o poder mais rapidamente. (Alguém só pode ser afetado por uma mutação por vez.)"
"Inject mutation chemicals into yourself or an ally. You grow numerous additional spiky toes on your feet, giving you purchase on the ground and causing all Kick attacks to deal extra damage. (Someone can only be affected by one Mutation at a time.)": "Injete produtos químicos de mutação em você ou em um aliado. Você desenvolve vários dedos pontiagudos adicionais em seus pés, dando-lhe apoio no chão e fazendo com que todos os ataques de chute causem dano extra. (Alguém só pode ser afetado por uma mutação por vez.)"
"Inject mutation chemicals into yourself or an ally. Your skin thickens and coarsens. You take less damage from attacks. (Someone can only be affected by one Mutation at a time.)": "Injete produtos químicos de mutação em você ou em um aliado. Sua pele fica mais espessa e áspera. Você sofre menos dano de ataques. (Alguém só pode ser afetado por uma mutação por vez.)"
