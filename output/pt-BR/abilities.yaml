"If your health is reduced to 0 during the next 30 seconds and you are within 40 meters of your cloud, you blink back to the cloud location instead of dying.": "Se sua saúde for reduzida a 0 durante os próximos 30 segundos e você estiver a 40 metros de sua nuvem, você retornará ao local da nuvem em vez de morrer."
"If your health is reduced to 0 during the next 35 seconds and you are within 45 meters of your cloud, you blink back to the cloud location instead of dying.": "Se sua saúde for reduzida a 0 durante os próximos 35 segundos e você estiver a 45 metros de sua nuvem, você retornará ao local da nuvem em vez de morrer."
