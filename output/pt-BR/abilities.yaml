"Create a dangerous symbol that explodes when an enemy gets near. Requires one Advanced Volatile Ink, with a 50% chance to consume it.": "Crie um símbolo perigoso que explode quando um inimigo se aproxima. Requer uma Tinta Volátil Avançada, com 50% de chance de consumi-la."
