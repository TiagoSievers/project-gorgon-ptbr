"This ability can only be used when you are wearing four or more pieces of Gazluk Death Trooper Armor.": "Esta habilidade só pode ser usada quando você estiver usando quatro ou mais peças da Armadura do Soldado da Morte Gazluk."
"This ability can only be used when you are wearing four or more pieces of Gazluk Treachery Trooper Armor.": "Esta habilidade só pode ser usada quando você estiver usando quatro ou mais peças da Gazluk Treachery Trooper Armor."
"This ability can only be used when you are wearing four or more pieces of Gazluk War-Wizard Armor.": "Esta habilidade só pode ser usada quando você estiver usando quatro ou mais peças da Armadura do Mago de Guerra Gazluk."
"This ability can only be used when you are wearing four or more pieces of Mutterer Necromancer Armor.": "Esta habilidade só pode ser usada quando você estiver usando quatro ou mais peças da Armadura Mutterer Necromancer."
