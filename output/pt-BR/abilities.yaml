"Instantly heal yourself or a selected ally.": "Cure instantaneamente a si mesmo ou a um aliado selecionado."
"Instantly heals you and allies for 500 health, increased by any First Aid or Major Healing bonuses you have": "Cura instantaneamente você e seus aliados em 500 pontos de vida, aumentados por quaisquer bônus de Primeiros Socorros ou Cura Importante que você tenha"
"Instantly heals you for 500 health, increased by any First Aid or Major Healing bonuses you have": "Cura você instantaneamente em 500 pontos de vida, aumentado por quaisquer bônus de Primeiros Socorros ou Cura Importante que você tenha"
"Instantly reduce target's blood alcohol level by one tier. For 15 minutes, the target's liver metabolizes alcohol three times faster than normal.": "Reduz instantaneamente o nível de álcool no sangue do alvo em um nível. Durante 15 minutos, o fígado do alvo metaboliza o álcool três vezes mais rápido que o normal."
"Instantly turn to face the next objective in your active quest. If it's within visual range, it will be marked with a pillar of light. Only works if your next objective is in the general vicinity.": "Vire-se instantaneamente para enfrentar o próximo objetivo em sua missão ativa. Se estiver dentro do alcance visual, será marcado com um pilar de luz. Só funciona se o seu próximo objetivo estiver nas proximidades."
"Instruct your pet to perform its special trick ability. (Each type of pet has a trick ability. Their usefulness varies widely.)

If the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Instrua seu animal de estimação a executar sua habilidade especial de truque. (Cada tipo de animal de estimação tem uma habilidade de truque. Sua utilidade varia muito.)

Se o animal de estimação ainda não estiver em combate, ele usará o alvo selecionado como inimigo sugerido."
"Instruct your pet to perform its special trick ability. It also recovers some Armor. (Each type of pet has a trick ability. Their usefulness varies widely.)

If the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Instrua seu animal de estimação a executar sua habilidade especial de truque. Também recupera alguma armadura. (Cada tipo de animal de estimação tem uma habilidade de truque. Sua utilidade varia muito.)

Se o animal de estimação ainda não estiver em combate, ele usará o alvo selecionado como inimigo sugerido."
"Instruct your pet to use its special attack ability. (Each type of pet has a special attack, although some pets' special attacks are hardly more impressive than their basic attack.)

If the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Instrua seu animal de estimação a usar sua habilidade de ataque especial. (Cada tipo de animal de estimação tem um ataque especial, embora os ataques especiais de alguns animais de estimação não sejam mais impressionantes do que o ataque básico.)

Se o animal de estimação ainda não estiver em combate, ele usará o alvo selecionado como inimigo sugerido."
