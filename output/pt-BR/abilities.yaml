"Create a symbol of health and wellness that heals nearby allies.": "Crie um símbolo de saúde e bem-estar que cure aliados próximos."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 120 seconds. Consumes one Amazing Holistic Ink.": "Crie um símbolo de saúde que cura aliados próximos quando o perigo está próximo. Dura 120 segundos. Consome uma tinta holística incrível."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 120 seconds. Consumes one Astounding Holistic Ink.": "Crie um símbolo de saúde que cura aliados próximos quando o perigo está próximo. Dura 120 segundos. Consome uma Tinta Holística Surpreendente."
