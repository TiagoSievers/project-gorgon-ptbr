"10% Chance to consume 1 Carrot (or Rabbit Treat)": "10% de chance de consumir 1 cenoura (ou guloseima de coelho)"
"A carefully-aimed attack that bypasses armor entirely.": "Um ataque cuidadosamente direcionado que contorna completamente a armadura."
"A clever knife cantrip that revitalizes you as it injures your enemy.": "Um truque de faca inteligente que revitaliza você enquanto fere seu inimigo."
"A deadly attack that uses dual-wielded knives. This is a variant of Slice, and treasure that boosts Slice also boosts Duelist's Slash.": "Um ataque mortal que usa facas de empunhadura dupla. Esta é uma variante do Slice, e o tesouro que aumenta o Slice também aumenta o Slash do Duelista."
"A devastating attack.": "Um ataque devastador."
"A distracting motion whose main aim is to give you time to add poison to your blade for your next maneuver.": "Um movimento de distração cujo objetivo principal é dar-lhe tempo para adicionar veneno à sua lâmina para a sua próxima manobra."
"A feint that catches an opponent off-guard. In combos, you can use Jab whenever Punch is called for, and equipment that affects Punch also affects Jab.": "Uma finta que pega o oponente desprevenido. Em combos, você pode usar o Jab sempre que o Punch for necessário, e o equipamento que afeta o Punch também afeta o Jab."
"A flurry of attacks that does extra damage to Off-Guard targets, and creates an opening for your next attack to be more successful.": "Uma enxurrada de ataques que causa dano extra aos alvos fora da guarda e cria uma abertura para que seu próximo ataque seja mais bem-sucedido."
"A flurry of attacks that does extra damage to vulnerable targets, and creates an opening for your next attack to be more successful.": "Uma enxurrada de ataques que causa dano extra a alvos vulneráveis ​​e cria uma abertura para que seu próximo ataque seja mais bem-sucedido."
"A flurry of attacks that leave the enemy disoriented and disheveled.": "Uma enxurrada de ataques que deixa o inimigo desorientado e desgrenhado."
"A flurry of blows that will leave an opponent briefly stunned. (Your hands must be empty.)": "Uma rajada de golpes que deixará o oponente brevemente atordoado. (Suas mãos devem estar vazias.)"
"A flurry of blows that will leave an opponent briefly stunned. This is a variant of Barrage. (You must be wielding two unarmed weapons or be an empty-handed animal with claws.)": "Uma rajada de golpes que deixará o oponente brevemente atordoado. Esta é uma variante do Barrage. (Você deve estar empunhando duas armas desarmadas ou ser um animal de mãos vazias com garras.)"
"A frustration-inducing bash to the face.": "Uma pancada na cara que induz à frustração."
"A full-on attack that causes horrific damage if the target is not paying enough attention to you.": "Um ataque total que causa danos horríveis se o alvo não prestar atenção suficiente em você."
"A glyph on James Eltibule's armor can fill your lungs with fresh air.": "Um glifo na armadura de James Eltibule pode encher seus pulmões de ar fresco."
"A kick that sends the enemy flying backwards.": "Um chute que faz o inimigo voar para trás."
"A knife to the stomach or other vulnerable spot. Causes bleeding if the enemy is caught off guard.": "Uma faca no estômago ou outro ponto vulnerável. Causa sangramento se o inimigo for pego de surpresa."
"A large, reusable, pocket-sized expanding box that encases a pocket dimension. This storage is not tied to conventional crafted storage crates (Each player that accesses the box can store their own items). This box can only be deployed once every 3 hours of in-game time.": "Uma caixa expansível grande, reutilizável e de bolso que envolve uma dimensão de bolso. Este armazenamento não está vinculado a caixas de armazenamento convencionais (cada jogador que acessa a caixa pode armazenar seus próprios itens). Esta caixa só pode ser implantada uma vez a cada 3 horas de jogo."
"A mysterious bit of music causes an enemy to stop and stand in fascination. (Chance of success is based on your Bard skill and the target's mental faculties.)": "Uma música misteriosa faz com que um inimigo pare e fique fascinado. (A chance de sucesso é baseada em sua habilidade de Bardo e nas faculdades mentais do alvo.)"
"A parrying technique that takes the opponent out of their comfort-zone, leaving them rattled.": "Uma técnica de defesa que tira o adversário da sua zona de conforto, deixando-o abalado."
"A punch that damages the target's innards, leaving them more susceptible to further attack.": "Um soco que danifica as entranhas do alvo, deixando-o mais suscetível a novos ataques."
"A punch with a claw weapon (or animal claws).": "Um soco com uma arma de garra (ou garras de animais)."
"A quick attack that hinders your enemy's ability to avoid subsequent attacks.": "Um ataque rápido que dificulta a capacidade do seu inimigo de evitar ataques subsequentes."
"A quick attack. For equipment and combos that require Sword Slash, you can use Thrusting Blade instead.": "Um ataque rápido. Para equipamentos e combos que exigem Sword Slash, você pode usar Thrusting Blade."
"A quick distracting attack with the knife that sets up subsequent attacks.": "Um ataque rápido e perturbador com a faca que inicia ataques subsequentes."
"A quick smack with the shield. It doesn't hurt much, but it helps keep the tide of battle going in your favor.": "Um rápido golpe com o escudo. Não dói muito, mas ajuda a manter a maré da batalha a seu favor."
"A rapid sequence of front kicks that makes sure enemies keep paying attention to you.": "Uma sequência rápida de chutes frontais que garante que os inimigos continuem prestando atenção em você."
"A slow horrific cut across the midsection.": "Um corte lento e horrível na barriga."
"A small, reusable, pocket-sized box that encases a tiny pocket dimension. This storage is not tied to conventional crafted storage crates (Each player that accesses the box can store their own items). This box can only be deployed once every 90 minutes of in-game time.": "Uma pequena caixa reutilizável de bolso que envolve uma pequena dimensão de bolso. Este armazenamento não está vinculado a caixas de armazenamento convencionais (cada jogador que acessa a caixa pode armazenar seus próprios itens). Esta caixa só pode ser implantada uma vez a cada 90 minutos de jogo."
"A solemn strike that does extra damage to undead.": "Um ataque solene que causa dano extra aos mortos-vivos."
"A strong attack.": "Um ataque forte."
"A strong ranged attack. This is a variant of Slice, and treasure that boosts Slice also boosts Slicing Ice.": "Um forte ataque à distância. Esta é uma variante do Slice, e o tesouro que aumenta o Slice também aumenta o Slicing Ice."
"A sudden painful kick. You can use Knee Kick in place of Front Kick in combos.": "Um chute repentino e doloroso. Você pode usar o Knee Kick no lugar do Front Kick em combos."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Amazing Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 incrível faca de arremesso."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Astounding Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 faca de arremesso surpreendente."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Basic Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 faca de arremesso básica."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Expert's Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 faca de arremesso do especialista."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Good Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 Boa Faca de Arremesso."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Master's Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 Faca de Arremesso do Mestre."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Simple Throwing Knife.": "Uma lâmina lançada que ataca um ponto vulnerável. Ineficaz, a menos que o foco do inimigo esteja em um agressor diferente. Consome 1 faca de arremesso simples."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Amazing Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 incrível faca de arremesso."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Astounding Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 faca de arremesso surpreendente."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Basic Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 faca de arremesso básica."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Expert's Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 faca de arremesso do especialista."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Good Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 Boa Faca de Arremesso."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Master's Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 Faca de Arremesso do Mestre."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Simple Throwing Knife.": "Uma lâmina lançada na perna que pode arruinar a mobilidade do inimigo. Consome 1 faca de arremesso simples."
"A vicious attack that injects poison deep into the enemy's body.": "Um ataque cruel que injeta veneno profundamente no corpo do inimigo."
"A weak attack that can confuse your opponents about how best to counter-attack you. This attack generates no enemy Rage.": "Um ataque fraco que pode confundir seus oponentes sobre a melhor forma de contra-atacar você. Este ataque não gera Fúria inimiga."
"A whispered song of prayer restores life to all dead allies nearby. The allies must have heard your Song of Resurgence or Song of Bravery during the last 90 seconds (while they were alive!).

Note: to use this ability, you must be wearing a piece of equipment that enables it.": "Uma canção de oração sussurrada restaura a vida de todos os aliados mortos próximos. Os aliados devem ter ouvido sua Canção do Ressurgimento ou Canção da Bravura durante os últimos 90 segundos (enquanto estavam vivos!).

Nota: para usar esta habilidade, você deve estar usando um equipamento que a habilite."
