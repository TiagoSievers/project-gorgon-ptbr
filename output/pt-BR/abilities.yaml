"Raise a skeletal warrior from death to serve you. Skeletal swordsmen are melee fighters that can occasionally stun their enemies.": "Levante um guerreiro esquelético da morte para servir você. Espadachins esqueléticos são lutadores corpo a corpo que podem ocasionalmente atordoar seus inimigos."
