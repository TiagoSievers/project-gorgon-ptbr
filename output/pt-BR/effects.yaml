"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de aparecimento de mortos-vivos": "você pode detectar onde monstros mortos-vivos irão aparecer. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de desova de peixes": "você pode detectar onde peixes, caracóis e anfíbios irão desovar. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de desova de plantas": "você pode detectar onde as criaturas vegetais irão desovar. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de desova de roedores": "você pode detectar onde roedores e ratkin irão desovar. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de desova de ungulados": "você pode detectar onde os ungulados irão desovar. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de Spawn Fae": "Você pode detectar onde fadas e criaturas Fae irão aparecer. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de Spawn Incorpóreo": "Você pode detectar onde fantasmas e outras criaturas incorpóreas irão aparecer. Você verá uma premonição por 10 segundos antes que a criatura apareça."
"(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)\": \"Premonição de Spawn Universal": "Você pode detectar onde as criaturas irão aparecer. Você verá uma premonição por 4 segundos antes que a criatura apareça."
