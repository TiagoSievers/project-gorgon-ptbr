"Etch the magical rune for fairy magic onto a topaz, so that it has a chance to yield fairy magic powers when used in crafting recipes.": "Grave a runa mágica da magia das fadas em um topázio, para que ele tenha a chance de produzir poderes mágicos das fadas quando usado na elaboração de receitas."
"Etch the magical rune for first aid onto a garnet, so that it is attuned to that skill when used in crafting recipes.": "Grave a runa mágica de primeiros socorros em uma granada, para que ela fique em sintonia com essa habilidade quando usada na elaboração de receitas."
"Etch the magical rune for fox onto a piece of lapis lazuli, so that it is attuned to only spirit foxes when used in crafting recipes.": "Grave a runa mágica da raposa em um pedaço de lápis-lazúli, para que ela fique sintonizada apenas com espíritos de raposa quando usada na elaboração de receitas."
"Etch the magical rune for pigs onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Grave a runa mágica dos porcos em uma malaquita, para que ela fique sintonizada apenas com aquela espécie quando usada na elaboração de receitas."
"Etch the magical rune for rabbits onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Grave a runa mágica para coelhos em uma malaquita, para que ela fique sintonizada apenas com aquela espécie quando usada na elaboração de receitas."
"Etch the magical rune for spiders onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Grave a runa mágica para aranhas em uma malaquita, para que ela fique sintonizada apenas com aquela espécie quando usada na elaboração de receitas."
