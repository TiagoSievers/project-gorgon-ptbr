"It so accurately replicates the sensory experience of the ocean that those afraid of water should stay clear.": "Ele reproduz com tanta precisão a experiência sensorial do oceano que aqueles que têm medo da água devem ficar longe."
"It's a high-quality hat, although it seems unlikely that an average cow would appreciate the style. (NOTE: only cows can wear this garment.)": "É um chapéu de alta qualidade, embora pareça improvável que uma vaca comum apreciasse o estilo. (NOTA: apenas vacas podem usar esta vestimenta.)"
