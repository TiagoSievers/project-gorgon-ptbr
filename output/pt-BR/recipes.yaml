"For 15 minutes, your attacks cause double Rage to enemies, allowing them to use their Rage attacks more often.": "Por 15 minutos, seus ataques causam o dobro de Fúria aos inimigos, permitindo que eles usem seus ataques de Fúria com mais frequência."
"For 2 hours, all earned combat XP will be reduced by half. Creates 2 potions.": "Durante 2 horas, todo o XP de combate ganho será reduzido pela metade. Cria 2 poções."
"For 2 hours, all earned combat XP will be reduced to zero. Creates 2 potions.": "Durante 2 horas, toda a XP de combate ganha será reduzida a zero. Cria 2 poções."
"For 2 minutes, you'll be able to leap high into the sky!": "Por 2 minutos, você poderá saltar alto no céu!"
"For 30 minutes, all indirect Electricity damage you deal is increased +50%.": "Por 30 minutos, todo dano indireto de eletricidade que você causa aumenta em +50%."
"For 30 minutes, all indirect Fire damage you deal is increased +50%.": "Por 30 minutos, todo dano indireto de Fogo que você causa aumenta em +50%."
"For 30 minutes, all indirect Nature damage you deal is increased +50%.": "Por 30 minutos, todo dano indireto de Natureza que você causa aumenta em +50%."
"For 30 minutes, all Poison attacks you make will deal +5 extra damage.": "Por 30 minutos, todos os ataques de veneno que você fizer causarão +5 de dano extra."
"For 30 minutes, all your attacks will deal +10% damage, but your Max Power will be reduced by 50.": "Por 30 minutos, todos os seus ataques causarão +10% de dano, mas seu Poder Máximo será reduzido em 50."
"For 30 minutes, all your Lycanthropy attacks will deal +10% damage. The secret ingredient: your own cursed saliva.": "Por 30 minutos, todos os seus ataques de Licantropia causarão +10% de dano. O ingrediente secreto: sua própria saliva amaldiçoada."
"For 30 minutes, all your Lycanthropy attacks will deal +20% damage. This advanced version of the so-called Sanguinizer potion can only be made during the full moon.": "Por 30 minutos, todos os seus ataques de Licantropia causarão +20% de dano. Esta versão avançada da chamada poção Sanguinizadora só pode ser feita durante a lua cheia."
"For 30 minutes, your Acid Damage (direct and indirect) is +5": "Por 30 minutos, seu Dano Ácido (direto e indireto) é +5"
"For 30 minutes, your attacks cause 25% less Rage, preventing enemies from using their Rage attacks as often.": "Por 30 minutos, seus ataques causam 25% menos Fúria, evitando que os inimigos usem seus ataques de Fúria com a mesma frequência."
"For 30 minutes, your attacks cause 50% less Rage, preventing enemies from using their Rage attacks as often.": "Por 30 minutos, seus ataques causam 50% menos Fúria, evitando que os inimigos usem seus ataques de Fúria com a mesma frequência."
"For an hour, all acid damage is reduced by 10, potentially eliminating the damage entirely.": "Por uma hora, todo o dano ácido é reduzido em 10, potencialmente eliminando totalmente o dano."
"For an hour, all acid damage is reduced by 15, potentially eliminating the damage entirely.": "Por uma hora, todo o dano ácido é reduzido em 15, potencialmente eliminando totalmente o dano."
"For an hour, all acid damage is reduced by 25, potentially eliminating the damage entirely.": "Por uma hora, todo o dano ácido é reduzido em 25, potencialmente eliminando totalmente o dano."
"For an hour, all acid damage is reduced by 5, potentially eliminating the damage entirely.": "Por uma hora, todo o dano ácido é reduzido em 5, potencialmente eliminando totalmente o dano."
"For an hour, all acid damage is reduced by 5, potentially eliminating the damage entirely. In addition, any enemies that strike you take 25 acid damage.": "Por uma hora, todo o dano ácido é reduzido em 5, potencialmente eliminando totalmente o dano. Além disso, qualquer inimigo que atingir você sofre 25 de dano ácido."
"For an hour, all electricity damage is reduced by 10, potentially eliminating the damage entirely.": "Por uma hora, todos os danos elétricos são reduzidos em 10, potencialmente eliminando totalmente o dano."
"For an hour, all Energy (Fire, Cold, or Electricity) damage is reduced by 5, potentially eliminating the damage entirely.": "Por uma hora, todo o dano de Energia (Fogo, Frio ou Eletricidade) é reduzido em 5, potencialmente eliminando totalmente o dano."
"For an hour, all fire damage is reduced by 5, potentially eliminating the damage entirely. In addition, any enemies that strike you take 25 fire damage.": "Por uma hora, todo o dano de fogo é reduzido em 5, potencialmente eliminando totalmente o dano. Além disso, qualquer inimigo que atingir você sofre 25 de dano de fogo."
"For an hour, all Nature damage is reduced by 5, potentially eliminating the damage entirely. Creates 2 potions.": "Por uma hora, todo o dano de Natureza é reduzido em 5, potencialmente eliminando totalmente o dano. Cria 2 poções."
"For an hour, all Psychic damage is reduced by 5, potentially eliminating the damage entirely.": "Por uma hora, todo o dano Psíquico é reduzido em 5, potencialmente eliminando totalmente o dano."
"For an hour, all your attacks will seem to do 10% less damage to the target for purposes of determining who the target chooses to attack. (As a result, it may choose to attack someone else, unless nobody else is around.)": "Por uma hora, todos os seus ataques parecerão causar 10% menos dano ao alvo para determinar quem o alvo escolhe atacar. (Como resultado, pode optar por atacar outra pessoa, a menos que não haja mais ninguém por perto.)"
"For an hour, all your attacks will seem to do 25% less damage to the target for purposes of determining who the target chooses to attack. (As a result, it may choose to attack someone else, unless nobody else is around.)": "Por uma hora, todos os seus ataques parecerão causar 25% menos dano ao alvo para determinar quem o alvo escolhe atacar. (Como resultado, pode optar por atacar outra pessoa, a menos que não haja mais ninguém por perto.)"
"For an hour, any attacks you make against creatures of the Fish subtype deal +10% damage.": "Por uma hora, qualquer ataque que você fizer contra criaturas do subtipo Peixe causará +10% de dano."
"For an hour, any critical hits deal +10% damage. (Some skills, such as Archery, Mentalism, and Psychology, have special critical-hit chances. Most skills do not, however, in which case this potion does nothing.)": "Por uma hora, qualquer acerto crítico causa +10% de dano. (Algumas habilidades, como Tiro com Arco, Mentalismo e Psicologia, têm chances especiais de acerto crítico. A maioria das habilidades, entretanto, não tem, e nesse caso esta poção não faz nada.)"
"For an hour, earn +10% combat XP. Creates 2 potions.": "Por uma hora, ganhe +10% de XP de combate. Cria 2 poções."
"For an hour, gain +7 Max Breath.": "Por uma hora, ganhe +7 de Respiração Máxima."
"For creating equipment that enables Necromancy.": "Por criar equipamentos que habilitam a Necromancia."
"For healing debilitating injuries. Animals can use these bombs with the First Aid Bomb ability.": "Para curar lesões debilitantes. Os animais podem usar essas bombas com a habilidade Bomba de Primeiros Socorros."
"For healing debilitating injuries. Used by First Aid 4 (and other abilities). This kit is made of magical ice and tends to melt.": "Para curar lesões debilitantes. Usado por Primeiros Socorros 4 (e outras habilidades). Este kit é feito de gelo mágico e tende a derreter."
"For healing debilitating injuries. Used by First Aid abilities. This recipe creates two such kits.": "Para curar lesões debilitantes. Usado por habilidades de Primeiros Socorros. Esta receita cria dois desses kits."
"For healing devastating injuries. Animals can use these bombs with the First Aid Bomb ability.": "Para curar ferimentos devastadores. Os animais podem usar essas bombas com a habilidade Bomba de Primeiros Socorros."
"For healing devastating injuries. Used by First Aid 5 (and other abilities). This kit is made of magical ice and tends to melt.": "Para curar ferimentos devastadores. Usado por Primeiros Socorros 5 (e outras habilidades). Este kit é feito de gelo mágico e tende a derreter."
"For healing devastating injuries. Used by First Aid abilities. This recipe creates three such kits.": "Para curar ferimentos devastadores. Usado por habilidades de Primeiros Socorros. Esta receita cria três desses kits."
"For healing devastating injuries. Used by First Aid abilities. This recipe creates two such kits.": "Para curar ferimentos devastadores. Usado por habilidades de Primeiros Socorros. Esta receita cria dois desses kits."
"For healing heinous injuries. Animals can use these bombs with the First Aid Bomb ability.": "Para curar ferimentos hediondos. Os animais podem usar essas bombas com a habilidade Bomba de Primeiros Socorros."
"For healing heinous injuries. Used by First Aid 6 and 7 (and other abilities). This kit is made of magical ice and tends to melt.": "Para curar ferimentos hediondos. Usado pelos Primeiros Socorros 6 e 7 (e outras habilidades). Este kit é feito de gelo mágico e tende a derreter."
