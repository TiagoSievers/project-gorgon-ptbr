"It's a high-quality hat, sized to fit snugly around a pig's ears. (NOTE: only pigs can wear this garment.)": "É um chapéu de alta qualidade, dimensionado para caber perfeitamente nas orelhas de um porco. (NOTA: apenas porcos podem usar esta vestimenta.)"
"It's a high-quality hat, sized to fit snugly around a pig's ears. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (NOTE: only pigs can wear this garment.)": "É um chapéu de alta qualidade, dimensionado para caber perfeitamente nas orelhas de um porco. Max-Enchanting cria itens que são um nível de raridade maior do que seriam de outra forma. (NOTA: apenas porcos podem usar esta vestimenta.)"
