"Extract an enchantment from a helmet and turn it into an augment. This process destroys the helmet.

The chosen enchantment must be between levels 0 and 30, and will match the associated skill of the crystal you provide. You can view enchantment levels by holding Shift while viewing the item.

<b>Note:</b> If no enchantments match the crystal and the level requirements, you get nothing, and the item is still destroyed!": "Extraia um encantamento de um capacete e transforme-o em um aumento. Este processo destrói o capacete.

O encantamento escolhido deve estar entre os níveis 0 e 30 e corresponderá à habilidade associada ao cristal que você fornecer. Você pode ver os níveis de encantamento segurando Shift enquanto visualiza o item.

<b>Nota:</b> Se nenhum encantamento corresponder ao cristal e aos requisitos de nível, você não receberá nada e o item ainda será destruído!"
