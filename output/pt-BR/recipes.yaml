"A substance made of cranium powder, mixed with chemicals that alter its effect.": "Substância feita de pó de crânio, misturada com produtos químicos que alteram seu efeito."
"A super-thick blue paste that accelerates the leg muscles far beyond their natural capacity.": "Uma pasta azul superespessa que acelera os músculos das pernas muito além da sua capacidade natural."
"A surprisingly complex beer, but... complexity doesn't always taste good.": "Uma cerveja surpreendentemente complexa, mas... a complexidade nem sempre sabe bem."
"A surprisingly fruity dark wine.": "Um vinho escuro surpreendentemente frutado."
"A sweet beer with hints of chocolate.": "Uma cerveja doce com notas de chocolate."
"A sweet, relatively palatable variety of vodka. Although it's a traditional dwarven drink, it long ago fell out of favor, and these days dwarves only use it for cooking.": "Uma variedade de vodka doce e relativamente saborosa. Embora seja uma bebida tradicional dos anões, há muito tempo caiu em desuso e hoje em dia os anões só a usam para cozinhar."
"A tantalizing reminder of the beach.": "Uma lembrança tentadora da praia."
"A thick blue paste that accelerates the leg muscles beyond their natural capacity.": "Uma pasta azul espessa que acelera os músculos das pernas além da sua capacidade natural."
"A thin fluid used to create augmentation oils (for level 30 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 30). Cria cinco doses. NOTA: esta receita herdada não é mais usada por aumento!"
"A thin fluid used to create augmentation oils (for level 40 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 40). Cria cinco doses. NOTA: esta receita herdada não é mais usada por aumento!"
"A thin fluid used to create augmentation oils (for level 50 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 50). Cria cinco doses. NOTA: esta receita herdada não é mais usada por aumento!"
"A thin fluid used to create augmentation oils (for level 60 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 60). Cria cinco doses. NOTA: esta receita herdada não é mais usada por aumento!"
"A tiny short-lived light used for decoration.

Tealights are non-interactible. They last for 5 minutes. You can deploy up to 5 tealights at a time.": "Uma pequena luz de curta duração usada para decoração.

Tealights não são interativos. Eles duram 5 minutos. Você pode implantar até cinco tealights por vez."
"A tiny wooden exoskeleton sized for a giant butterfly.": "Um pequeno exoesqueleto de madeira dimensionado para uma borboleta gigante."
"A torch and sconce that can be installed in a home or guild hall.": "Uma tocha e uma arandela que podem ser instaladas em uma casa ou salão de guilda."
"A toxic muffin that shouldn't be eaten by anybody, but most especially not by lycanthropes. Requires a stove or fire pit.": "Um muffin tóxico que não deveria ser comido por ninguém, mas principalmente por licantropos. Requer um fogão ou fogueira."
"A useful form of rendered fat.": "Uma forma útil de gordura fundida."
"A versatile knife for skinning or butchering. (Keep it in your inventory and you'll be given the option to skin and/or butcher the corpses of some enemies.)

Must be near a forge.": "Uma faca versátil para esfolar ou cortar. (Mantenha-o em seu inventário e você terá a opção de esfolar e/ou massacrar os cadáveres de alguns inimigos.)

Deve estar perto de uma forja."
"A versatile knife for skinning, butchering, or skull extraction. (Keep it in your inventory and you'll be given the option to skin, butcher, and/or extract the skull of some enemies.)

Must be near a forge.": "Uma faca versátil para esfolar, cortar ou extrair crânios. (Mantenha-o em seu inventário e você terá a opção de esfolar, abater e/ou extrair o crânio de alguns inimigos.)

Deve estar perto de uma forja."
"A very basic animal cage designed for transfering pets. Suitable only for extremely short-term use! Pets kept in this cage for more than 48 hours will escape and be lost. One use only.": "Uma gaiola para animais muito básica projetada para a transferência de animais de estimação. Adequado apenas para uso de prazo extremamente curto! Animais de estimação mantidos nesta gaiola por mais de 48 horas escaparão e se perderão. Um uso apenas."
"A very complicated device that can help with tricky pathology inquiries. (+10 to your effective skill when autopsying a corpse.)": "Um dispositivo muito complicado que pode ajudar em investigações patológicas complicadas. (+10 para sua habilidade efetiva ao autopsiar um cadáver.)"
"A very dry wine that's quite drinkable.": "Um vinho muito seco e bastante bebível."
"A very rough alcoholic beverage. Some say you grow to like the taste, but others say that's just your tastebuds dying from the pain.": "Uma bebida alcoólica muito áspera. Alguns dizem que você passa a gostar do sabor, mas outros dizem que são apenas suas papilas gustativas morrendo de dor."
"A viceral odor experience that causes you to clench your fists in exuberance.": "Uma experiência de odor viceral que faz você cerrar os punhos de exuberância."
"A well-balanced knife designed for throwing. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Uma faca bem equilibrada projetada para arremesso. (Usado com a habilidade de combate Faca.) A receita cria 10 facas."
"A well-made wooden mesh, useful for cages, pens, trellises, and so on.": "Uma malha de madeira bem feita, útil para gaiolas, currais, treliças e assim por diante."
"A wide-basined wax bowl candle designed for ... placing on your head. This is very dangerous.": "Uma vela de cera de base larga projetada para ... ser colocada na cabeça. Isto é muito perigoso."
