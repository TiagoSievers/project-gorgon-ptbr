"A stack (20) of confetti bombs that can be used in celebrations.": "Uma pilha (20) de bombas de confete que podem ser usadas em comemorações."
"A stack (99) of pretty explosives for use in celebrations.": "Uma pilha (99) de lindos explosivos para usar em celebrações."
"A sticky cloth that's ideal for certain types of clothing.": "Um pano pegajoso ideal para certos tipos de roupas."
"A strange padded belt that helps the wearer hold their ground.": "Um estranho cinto acolchoado que ajuda o usuário a se manter firme."
"A strong dark beer that packs a punch. The preferred socialization drink of dwarves.": "Uma cerveja escura forte que dá um soco. A bebida de socialização preferida dos anões."
