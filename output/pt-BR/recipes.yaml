"A pumpkin carved with a scary octopus face.": "Uma abóbora esculpida com uma cara de polvo assustadora."
"A pumpkin carved with a silly owl face.": "Uma abóbora esculpida com uma cara de coruja boba."
"A pungent smelling wax that helps ensure mating success with bees or wasps.": "Uma cera de cheiro pungente que ajuda a garantir o sucesso do acasalamento com abelhas ou vespas."
"A quality skinning knife for experienced skinners. (+4 to your effective skill when skinning.)

Must be near a forge.": "Uma faca de esfola de qualidade para esfoladores experientes. (+4 para sua habilidade efetiva ao esfolar.)

Deve estar perto de uma forja."
"A quality whittling knife for experienced whittlers. Must be near a forge.": "Uma faca de talhar de qualidade para talhadores experientes. Deve estar perto de uma forja."
"A reasonable-looking metal helm for a werewolf. (Must be near a forge consecrated to Norala.)": "Um elmo de metal de aparência razoável para um lobisomem. (Deve estar perto de uma forja consagrada a Norala.)"
"A refreshing summer wine. When prepared by a master brewer, this is the perfect outdoor party wine.": "Um vinho refrescante de verão. Quando preparado por um mestre cervejeiro, este é o vinho perfeito para festas ao ar livre."
"A robotic fire pit, overloaded with a powerful source of energy. Lasts 10 minutes once deployed.

While standing near the deployed Dronefire, you receive the following:
+10% Cold Resistance
+10% Direct Fire Damage
+20% Fire Vulnerability": "Uma fogueira robótica, sobrecarregada com uma poderosa fonte de energia. Dura 10 minutos depois de implantado.

Enquanto estiver perto do Dronefire implantado, você receberá o seguinte:
+10% de resistência ao frio
+10% de Dano Direto de Fogo
+20% de Vulnerabilidade a Incêndios"
"A robotic fire pit, which uses advanced automaton techniques to spread the warmth further and keep it going longer. Lasts 10 minutes once deployed.": "Uma fogueira robótica, que usa técnicas avançadas de autômatos para espalhar ainda mais o calor e mantê-lo funcionando por mais tempo. Dura 10 minutos depois de implantado."
"A scent that brings forth happy visions of flowers basking in the sun.": "Um perfume que traz visões felizes de flores se aquecendo ao sol."
"A secret formula that lets mortals take advantage of necromantic blood.": "Uma fórmula secreta que permite aos mortais tirar vantagem do sangue necromântico."
"A secret paleontology technique for dealing with unruly skeletons. (Creates a stack of 5.)": "Uma técnica paleontológica secreta para lidar com esqueletos rebeldes. (Cria uma pilha de 5.)"
"A secret recipe from Deville Neth's bakery.": "Uma receita secreta da padaria Deville Neth."
"A secret recipe taught to you by Drummond Stonecurl.": "Uma receita secreta ensinada a você por Drummond Stonecurl."
"A shield-shaped piece of ice. This item can melt in warm or hot environments, although it tends to last longer than small ice items.": "Um pedaço de gelo em forma de escudo. Este item pode derreter em ambientes quentes ou quentes, embora tenda a durar mais do que pequenos itens de gelo."
"A simple autopsy kit for beginning pathologists.": "Um kit de autópsia simples para patologistas iniciantes."
"A simple belt with a pouch.": "Um cinto simples com bolsa."
"A simple butcher knife made of magical ice. (Keep it in your inventory and you'll be given the option to butcher the corpses of some enemies.)": "Uma simples faca de açougueiro feita de gelo mágico. (Mantenha-o em seu inventário e você terá a opção de massacrar os cadáveres de alguns inimigos.)"
"A simple collection of wood bits that allow a sentient spider to use druidic magic.": "Uma coleção simples de pedaços de madeira que permitem que uma aranha senciente use magia druídica."
"A simple knife designed for beginning knife-throwers. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Uma faca simples projetada para atiradores de facas iniciantes. (Usado com a habilidade de combate Faca.) A receita cria 10 facas."
"A simple skinning knife for beginning skinners. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)

Must be near a forge.": "Uma faca simples para esfolar iniciantes. (Mantenha-o em seu inventário e você terá a opção de esfolar os cadáveres de alguns inimigos.)

Deve estar perto de uma forja."
"A simple skinning knife made of magical ice. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Uma simples faca de esfolar feita de gelo mágico. (Mantenha-o em seu inventário e você terá a opção de esfolar os cadáveres de alguns inimigos.)"
"A simple variety of whisky made from barley. It's drinkable and has a tolerable flavor.": "Uma variedade simples de whisky feito de cevada. É bebível e tem um sabor tolerável."
"A simple whittling knife for beginning whittlers. Must be near a forge.": "Uma faca de talhar simples para iniciantes. Deve estar perto de uma forja."
"A simple wooden mesh, useful for cages, pens, trellises, and so on.": "Uma malha de madeira simples, útil para gaiolas, currais, treliças e assim por diante."
"A simple wooden table that can be installed in a home or guild hall.": "Uma mesa simples de madeira que pode ser instalada em uma casa ou salão de guilda."
"A simple, watery, slightly insipid beer.": "Uma cerveja simples, aguada e levemente insípida."
"A small box for storing up to 4 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Uma pequena caixa para armazenar até 4 itens. Dura 5 minutos depois de implantado. (Cada jogador que acessar a caixa de armazenamento pode armazenar seus próprios itens. Todas as caixas de armazenamento permitem acesso aos mesmos itens para aquele jogador.)"
"A small but thick piece of metal covered in a grid of holes. It is used by flower arrangers. Makes two.": "Um pequeno mas grosso pedaço de metal coberto por uma grade de buracos. É usado por arranjadores de flores. Faz dois."
"A small cask used in dairy food production.": "Um pequeno barril usado na produção de laticínios."
"A small dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um pequeno dragão revestido de ouro. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A small dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Um pequeno dragão revestido de prata. As pessoas que o visualizarem serão inspiradas a criar melhor. Dura 10 minutos depois de implantado."
"A small dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Um pequeno dragão. As pessoas que o visualizarem ficarão vagamente inspiradas a criar melhor. Dura 5 minutos depois de implantado."
"A small gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um pequeno grifo revestido de ouro. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A small gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Um pequeno grifo revestido de prata. As pessoas que assistirem a isso serão inspiradas a matar melhor. Dura 10 minutos depois de implantado."
"A small gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Um pequeno grifo. As pessoas que assistirem a isso ficarão vagamente inspiradas a assassinar melhor. Dura 5 minutos depois de implantado."
"A small metal hoop used in making casks.": "Um pequeno aro de metal usado na fabricação de barris."
