"It's a high-quality hat, sized to fit a deer for some reason. (NOTE: only deer can wear this garment.)": "É um chapéu de alta qualidade, dimensionado para caber em um cervo por algum motivo. (NOTA: apenas cervos podem usar esta vestimenta.)"
