"The bitter smokiness of a forest fire combined with the pleasant aroma of cooking meat.": "O fumo amargo de um incêndio florestal combinado com o aroma agradável da carne cozinhada."
"The Body Abides": "O Corpo Permanece"
"The elven lily provides a base scent for this candle, and the bitter-cold winterhue flower accentuates it.": "O lírio élfico fornece um perfume base para esta vela, e a flor de inverno frio intenso o acentua."
"The enchanted and ground-up pineal glands of intelligent creatures, in a sweet syrupy liquid.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes, em um líquido doce e xaroposo."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with a secret catalyst for added effect.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes, misturadas com um catalisador secreto para efeito adicional."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with top-secret special ingredients.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes, misturadas com ingredientes especiais ultrassecretos."
"The enchanted and ground-up pineal glands of intelligent creatures. No syrup added, just pure pineal juice.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes. Sem adição de xarope, apenas suco pineal puro."
"The Flopsy Dance": "A Dança Flopsy"
"The height of generic floral scents. Pleasant but forgettable.": "O auge dos aromas florais genéricos. Agradável, mas esquecível."
"The liquid in this cauldron is sure to cause hallucinations and may bring out latent magic effects in unpredictable ways. It's insanely dangerous.": "O líquido neste caldeirão certamente causará alucinações e poderá trazer à tona efeitos mágicos latentes de maneiras imprevisíveis. É extremamente perigoso."
"The lovely aroma of bacon reminds you of how tasty bacon is.": "O adorável aroma do bacon lembra como o bacon é saboroso."
"The smell of bark and pollen isn't pleasant, but it turns your thoughts to nature.": "O cheiro da casca e do pólen não é agradável, mas direciona seus pensamentos para a natureza."
"The smell of sand in wind. Because there's nothing like smelling a sandstorm in the air to quicken one's pace.": "O cheiro de areia no vento. Porque não há nada como sentir o cheiro de uma tempestade de areia no ar para acelerar o passo."
"The smell of the forest, idealized and crystallized into a dramatic burst of memories.": "O cheiro da floresta, idealizado e cristalizado numa dramática explosão de memórias."
"These muffins sound strange but they are actually quite sweet. Requires a stove or fire pit.": "Esses muffins parecem estranhos, mas na verdade são muito doces. Requer um fogão ou fogueira."
