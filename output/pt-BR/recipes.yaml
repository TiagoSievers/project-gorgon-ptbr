"Increase your Maximum Tempest Energy +5 by reciting an ancient elven story that can expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed outdoors while surrounded by at least 20 growing garden plants.": "Aumente sua Energia Máxima da Tempestade +5 recitando uma antiga história élfica que pode expandir sua mente. A recitação só precisa ser realizada uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre, rodeado por pelo menos 20 plantas de jardim em crescimento."
"Increase your Maximum Tempest Energy +5 by reciting elven verses that can expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed outdoors while enjoying post-coital bliss.": "Aumente sua Energia Máxima da Tempestade +5 recitando versos élficos que podem expandir sua mente. A recitação só precisa ser realizada uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre enquanto desfruta da felicidade pós-coito."
"Increase your Maximum Tempest Energy +5 through a mysterious ceremony. It must be performed at midnight [game time] on a new moon [real world]. It need only be performed once; the effects are permanent.": "Aumente sua Energia Máxima da Tempestade +5 por meio de uma cerimônia misteriosa. Deve ser realizado à meia-noite [horário do jogo] na lua nova [mundo real]. Só precisa ser realizado uma vez; os efeitos são permanentes."
"Increase your Maximum Tempest Energy +5 through a primitive ceremony. The recitation need only be performed once; the effects are permanent. It must be performed while suffering 10+ damage-over-time effects.": "Aumente sua Energia Máxima da Tempestade +5 através de uma cerimônia primitiva. A recitação só precisa ser realizada uma vez; os efeitos são permanentes. Deve ser executado enquanto sofre mais de 10 efeitos de dano ao longo do tempo."
"Increase your Maximum Tempest Energy +5 through a ritual that expands your understanding. The ritual need only be performed once; the effects are permanent. It must be performed outdoors while severely intoxicated and suffering from a pineal juice hangover.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual que expande sua compreensão. O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre enquanto estiver gravemente intoxicado e sofrendo de ressaca de suco pineal."
"Increase your Maximum Tempest Energy +5 through a simple but extremely lengthy ritual. The ritual need only be performed once; the effects are permanent. Must be performed near a meditation pillar.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual simples, mas extremamente longo. O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado próximo a um pilar de meditação."
"Increase your Maximum Tempest Energy +5 through a simple ceremony in a crowded place. The recitation need only be performed once; the effects are permanent. It must be performed while around at least 20 other players while undressed and unashamed.": "Aumente sua Energia Máxima da Tempestade +5 através de uma cerimônia simples em um local lotado. A recitação só precisa ser realizada uma vez; os efeitos são permanentes. Deve ser realizado com pelo menos 20 outros jogadores, despidos e sem vergonha."
"Increase your Maximum Tempest Energy +5 through a simple ceremony said to expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed while sitting in shallow water after having just licked a toxic frog.": "Aumente sua Energia Máxima da Tempestade +5 por meio de uma cerimônia simples que expande sua mente. A recitação só precisa ser realizada uma vez; os efeitos são permanentes. Deve ser realizado sentado em águas rasas, depois de lamber um sapo tóxico."
"Increase your Maximum Tempest Energy +5 through a simple ritual that expands your understanding. The ritual need only be performed once; the effects are permanent. Must be performed outdoors while fully submerged in water.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual simples que expande sua compreensão. O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre totalmente submerso em água."
"Increase your Maximum Tempest Energy +5 through a simple ritual. The ritual need only be performed once; the effects are permanent. It must be performed at precisely 4AM [game time] while in a sandstorm.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual simples. O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado precisamente às 4h [horário do jogo], durante uma tempestade de areia."
"Increase your Maximum Tempest Energy +5 through a supposedly-ancient (but actually fairly modern) ritual. The ritual need only be performed once; the effects are permanent. It must be performed outdoors while suffering from at least two diseases and two curses.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual supostamente antigo (mas na verdade bastante moderno). O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre enquanto se sofre de pelo menos duas doenças e duas maldições."
"Increase your Maximum Tempest Energy +5 through an extraordinarily painful ritual. The ritual need only be performed once; the effects are permanent. Must be performed outdoors while suffering from 20 broken bones.": "Aumente sua Energia Máxima da Tempestade +5 através de um ritual extraordinariamente doloroso. O ritual só precisa ser realizado uma vez; os efeitos são permanentes. Deve ser realizado ao ar livre enquanto se sofre de 20 ossos quebrados."
"Increase your Maximum Tempest Energy through a simple ceremony. It must be performed at noon [game time] on a perfectly clear day. It can be performed repeatedly on different days. Each performance permanently increases your Maximum Tempest Energy +1.": "Aumente sua Energia Máxima da Tempestade através de uma cerimônia simples. Deve ser realizado ao meio-dia [horário do jogo] em um dia perfeitamente claro. Pode ser realizado repetidamente em dias diferentes. Cada apresentação aumenta permanentemente sua Energia Máxima da Tempestade +1."
