"A specialized tool for blowing glass.": "Uma ferramenta especializada para soprar vidro."
"A specially-shaped piece of hardened metal. This is used in the making of plate mail armor.

Must be near a forge.": "Uma peça de metal endurecido com formato especial. Isso é usado na fabricação de armaduras de cota de malha.

