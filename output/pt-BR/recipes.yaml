"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor. This augury tends to have more potent futures -- both good and ill -- than the Advanced Augury. Like the Advanced Augury, it is sensitive to the body part used, with more possible outcomes for certain parts.": "Estude os ossos, órgãos ou partes do corpo de uma criatura falecida para ter uma ideia sobre o seu futuro. Você pode não gostar do que vê, mas as chances de um bom presságio estão a seu favor. Este augúrio tende a ter futuros mais potentes – bons e ruins – do que o Augúrio Avançado. Assim como o Augúrio Avançado, é sensível à parte do corpo utilizada, com mais resultados possíveis para determinadas partes."
"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor. This augury tends to have more potent futures -- both good and ill -- than the Basic Augury. It is also more sensitive to the body part used, with more possible outcomes for certain parts.": "Estude os ossos, órgãos ou partes do corpo de uma criatura falecida para ter uma ideia sobre o seu futuro. Você pode não gostar do que vê, mas as chances de um bom presságio estão a seu favor. Este augúrio tende a ter futuros mais potentes – bons e ruins – do que o Augúrio Básico. Também é mais sensível à parte do corpo utilizada, com mais resultados possíveis para determinadas partes."
