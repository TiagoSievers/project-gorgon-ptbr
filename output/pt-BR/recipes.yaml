This model can dispense up to 100 raffle tickets for up to 8 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-60 minutes.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 100 rifas para até 8 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos. Este modelo possui local para uma inscrição que é exibida a cada usuário, e uma mensagem que é mostrada apenas ao vencedor. Este modelo também pode ser configurado para ter um limite de tempo de 1 a 60 minutos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 1000 raffle tickets for up to 10 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-90 minutes.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 1.000 bilhetes de rifa para até 10 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos. Este modelo possui local para uma inscrição que é exibida a cada usuário, e uma mensagem que é mostrada apenas ao vencedor. Este modelo também pode ser configurado para ter um limite de tempo de 1 a 90 minutos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 30 raffle tickets for up to 3 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode dispensar até 30 rifas para até 3 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 50 raffle tickets for up to 6 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

