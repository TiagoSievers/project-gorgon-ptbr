"This small fire is warm enough to keep you from freezing to death, but not good enough for much else. Lasts 60 seconds once deployed.": "Esta pequena fogueira é quente o suficiente para evitar que você morra de frio, mas não é boa o suficiente para muitas outras coisas. Dura 60 segundos depois de implantado."
"This smell is a cultivated bacon odor, accentuating the highs and diminishing the lows, making real bacon taste incredible.": "Esse cheiro é um odor cultivado de bacon, acentuando os agudos e diminuindo os graves, tornando o verdadeiro sabor do bacon incrível."
"This smells less like bacon than some candles, but the smell synergizes with real bacon scent in an incredible way.": "Tem menos cheiro de bacon do que algumas velas, mas o cheiro tem uma sinergia com o verdadeiro cheiro de bacon de uma forma incrível."
"This smells like a cold, cold, morning in a fairly-unpleasant-smelling place.": "Isso cheira a uma manhã fria, fria, em um lugar com cheiro bastante desagradável."
"This smells like a warm drink on a cold, cold morning.": "Isso cheira a uma bebida quente em uma manhã muito fria."
"This smells like waking up to a cold dawn around a warming campfire, with a loving pet wolf-dog nearby who's happy you're finally awake.": "Isso cheira a acordar em um amanhecer frio ao redor de uma fogueira aquecida, com um adorável cão-lobo de estimação por perto, feliz por você finalmente ter acordado."
"This smelly gel will hyper-accelerate your heart. What could go wrong?": "Este gel fedorento irá hiperacelerar seu coração. O que poderia dar errado?"
"This smelly gel will overclock your brain. What could go wrong?": "Este gel fedorento irá acelerar seu cérebro. O que poderia dar errado?"
"This strange cloth is luxurious to the touch, yet incredibly strong.": "Este tecido estranho é luxuoso ao toque, mas incrivelmente forte."
"This strange cloth is smooth and cool to the touch.": "Este estranho pano é macio e fresco ao toque."
"This variety of cider is made from sour apples and has a complex array of taste sensations. Pity you won't remember the taste after blacking out from it...": "Esta variedade de cidra é feita de maçãs ácidas e possui uma complexa gama de sensações gustativas. Pena que você não vai se lembrar do sabor depois de desmaiar..."
