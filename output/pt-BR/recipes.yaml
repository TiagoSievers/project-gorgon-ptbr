"A smoky, musty candle that evokes the danger of fire.": "Uma vela esfumaçada e bolorenta que evoca o perigo do fogo."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +12 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura em +12 por 30 minutos."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +3 for 30 minutes.": "Uma cadeira um tanto confortável. Relaxar nele aumenta sua Regeneração de Armadura +3 por 30 minutos."
