"Consult your references to figure out the current phase of the moon.": "Consulte suas referências para descobrir a fase atual da lua."
"Consume a flower (or flower arrangement). For 30 minutes after, the Mentalism abilities Health Wave, Armor Wave, and Power Wave have increased potency. The increase depends on the quality of the flower(s) consumed.

You must be a butterfly to use this technique, and you must meet the flower(s)'s skill requirements, if any.": "Consuma uma flor (ou arranjo de flores). Por 30 minutos depois, as habilidades Health Wave, Armor Wave e Power Wave aumentaram de potência. O aumento depende da qualidade da(s) flor(es) consumida(s).

Você deve ser uma borboleta para usar esta técnica e deve atender aos requisitos de habilidade da(s) flor(es), se houver."
