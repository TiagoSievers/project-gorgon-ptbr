"Concoct explosive fungal bombs. The result is dangerous to most creatures, but especially to those that are momentarily Vulnerable.": "Prepare bombas fúngicas explosivas. O resultado é perigoso para a maioria das criaturas, mas especialmente para aquelas que estão momentaneamente vulneráveis."
