"Attach a tap to a barrel of beer or hard liquor and deploy it. The barrel will IMMEDIATELY APPEAR near you, and any players can drink from it. The barrel will persist until all alcohol is consumed (or very slowly evaporates). The barrel cannot be reused. If the barrel is inscribed prior to being tapped, the inscription will be shown to all who drink from it.": "Coloque uma torneira em um barril de cerveja ou bebida destilada e abra-a. O barril aparecerá IMEDIATAMENTE perto de você e qualquer jogador poderá beber dele. O barril persistirá até que todo o álcool seja consumido (ou evapore muito lentamente). O barril não pode ser reutilizado. Se o barril for inscrito antes de ser batido, a inscrição será mostrada a todos que beberem dele."
