"Conjure a ball of elemental energy from the fae realm. It does nothing, but it's pretty.": "Conjure uma bola de energia elementar do reino das fadas. Não faz nada, mas é bonito."
"Conjures a heavily glamoured meal-like substance. It tastes good, but can only nourish the body for a short while. It can also melt, so eat it quickly!": "Evoca uma substância semelhante a uma refeição altamente glamorosa. Tem um gosto bom, mas só pode nutrir o corpo por um curto período. Também pode derreter, então coma rápido!"
"Conjures a semi-real snack-like substance. It tastes good, but can only nourish the body for a short while. It can also melt, so eat it quickly!": "Evoca uma substância semi-real semelhante a um lanche. Tem um gosto bom, mas só pode nutrir o corpo por um curto período. Também pode derreter, então coma rápido!"
