"Etch the magical rune for armor patching onto an onyx, so that it is attuned to that skill when used in crafting recipes.": "Grave a runa mágica para remendar armadura em um ônix, para que ela fique em sintonia com essa habilidade quando usada na elaboração de receitas."
"Etch the magical rune for bats onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Grave a runa mágica para morcegos em uma malaquita, para que ela fique sintonizada apenas com aquela espécie quando usada na elaboração de receitas."
"Etch the magical rune for cattle onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Grave a runa mágica do gado em uma malaquita, para que ela fique sintonizada apenas com aquela espécie quando usada na elaboração de receitas."
