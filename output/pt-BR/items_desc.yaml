"\"Coif of Calamities\" is inscribed inside, in tiny lettering. It doesn't seem very calamitous, though. Maybe it was some sort of ancient marketing campaign.": "\"Coif of Calamities\" está inscrito no interior, em letras minúsculas. Não parece muito calamitoso, no entanto. Talvez tenha sido algum tipo de campanha de marketing antiga."
"\"I don't know who you are, but you've got a lot of nerve using my storage box without permission. I sold all your stuff.\"

 - Ivyn": "\"Não sei quem você é, mas você teve muita coragem de usar minha caixa de armazenamento sem permissão. Vendi todas as suas coisas.\"

 -Ivyn"
"\"Payment: 3 RTC
To: Tal-Saka (outcast rakshasa)
Reason: assistance in interpreting notes about Transmutation.\"

It's been formally approved by a Lt. Flakis.": "\"Pagamento: 3 RTC
Para: Tal-Saka (pária rakshasa)
Motivo: auxílio na interpretação de notas sobre Transmutação.\"

Foi formalmente aprovado pelo Tenente Flakis."
"\"The sensational best-selling diary of a maid from the Crone Hegemony. This was saved from obscurity due to one scene that documents the first sabotage attack of the (at-the-time-unrecognized) Night Executioner, the deadly hitman who is STILL. AT. LARGE. Read of his first heinous exploits here!\"": "\"O diário sensacional e mais vendido de uma empregada da Hegemonia Crone. Ele foi salvo da obscuridade devido a uma cena que documenta o primeiro ataque de sabotagem do (na época não reconhecido) Carrasco Noturno, o assassino mortal que AINDA está. EM GRANDE. Leia sobre suas primeiras façanhas hediondas aqui!\""
"\"To my lover, may she run back to me soon. - Raul\"": "\"Para minha amante, que ela volte logo para mim. - Raul\""
"\"Twenty godlings in the ground,
Twenty more in air surround,
One was killed in demon fire,
Two were banished to the mire.\"": "\"Vinte deuses no chão,
Mais vinte em ambiente aéreo,
Um foi morto em fogo demoníaco,
Dois foram banidos para a lama.\""
