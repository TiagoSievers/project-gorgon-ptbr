"Meant to prank your friends, these bombs don't explode. They are rightly disdained by most sentient persons.": "Destinadas a pregar peças em seus amigos, essas bombas não explodem. Eles são justamente desprezados pela maioria das pessoas sencientes."
"Meat and vegetables in a creamy sauce. There's really nothing quite like this taste.": "Carne e legumes em molho cremoso. Não há realmente nada como esse sabor."
"Melee attacks deal +5 damage to pigs": "Ataques corpo a corpo causam +5 de dano a porcos"
"Merry Christmas and Happy New Year from the Project: Gorgon team! Thanks for playing and supporting us!": "Feliz Natal e Próspero Ano Novo da equipe Projeto: Gorgon! Obrigado por jogar e nos apoiar!"
