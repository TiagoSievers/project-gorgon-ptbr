"Righteous Flame (priest ability) Damage +25% for 15 Minutes": "Righteous Flame (habilidade de sacerdote) Dano +25% por 15 minutos"
"Rita asked you to deliver this soap to Helena, who lives in the ruins of Castle Eltibule.": "Rita pediu para você entregar este sabonete para Helena, que mora nas ruínas do Castelo Eltibule."
"Robust, like dwarves. Flammable, like dwarves.": "Robusto, como anões. Inflamável, como os anões."
"Rough cloth for industrial uses.": "Pano áspero para uso industrial."
"Roughly translates to \"Brukwint with Cheese\", this is a traditional goblin sandwich with a slice of decadent cheese added.": "Traduzido aproximadamente como \"Brukwint com Queijo\", este é um sanduíche tradicional de goblin com uma fatia de queijo decadente adicionada."
"Roughly translates to \"Brukwint with Meat & Cheese\", this is so far removed from the traditional goblin sandwich (Brukwint) that it shouldn't even share the same name. It is savory meat topped with decadent cheese and spices, squished between two slices of Goblin Bread.": "Traduzido aproximadamente como \"Brukwint com Carne e Queijo\", isso está tão distante do tradicional sanduíche de goblin (Brukwint) que nem deveria ter o mesmo nome. É uma carne saborosa coberta com queijo e temperos decadentes, espremida entre duas fatias de Pão Goblin."
"Roughly translates to \"Brukwint with Meat\", this is a traditional goblin sandwich but the mushroom has been replaced by meat of some kind, making it even more delicious.": "Traduzido aproximadamente como \"Brukwint com Carne\", este é um sanduíche tradicional de goblin, mas o cogumelo foi substituído por algum tipo de carne, tornando-o ainda mais delicioso."
"Roughly translates to \"Brukwont with Cheese\", this is a traditional \"lesser\" goblin sandwich with a slice of decadent cheese added.": "Traduzido aproximadamente como \"Brukwont com Queijo\", este é um tradicional sanduíche de goblin \"menor\" com uma fatia de queijo decadente adicionada."
"Rub this lotion into your scalp to increase your brainpower.": "Esfregue esta loção no couro cabeludo para aumentar sua capacidade intelectual."
"Rub this potion into your hair and head and your memory will stop working so well.": "Esfregue esta poção no cabelo e na cabeça e sua memória deixará de funcionar tão bem."
"Rub this potion into your hair and head and your short-term memory will break.": "Esfregue esta poção no cabelo e na cabeça e sua memória de curto prazo será quebrada."
"Rugged cloth with an innate magical insulation.": "Tecido robusto com isolamento mágico inato."
"Runny and hot and covered in salt and pepper. Ideal with some bread.": "Líquido e quente e coberto de sal e pimenta. Ideal com um pouco de pão."
"Rust damage has taken a heavy toll on this breastplate. It's still functional, but you'll probably get rust stains all over yourself.": "Os danos causados ​​pela ferrugem tiveram um grande impacto neste peitoral. Ainda está funcional, mas você provavelmente ficará com manchas de ferrugem por todo o corpo."
"Rust has taken its toll on this blade, but it's better than nothing.": "A ferrugem cobrou seu preço nesta lâmina, mas é melhor que nada."
"Sacrificing armor for killing power, these robes are popular with wizards. A Necromancy Gem is woven into the chest.": "Sacrificando a armadura pelo poder de matar, essas vestes são populares entre os bruxos. Uma Gema de Necromancia está tecida no baú."
"Sacrificing defense for maneuverability, this shield is for experts who want to deal more damage with their shield.": "Sacrificando a defesa pela manobrabilidade, este escudo é para especialistas que desejam causar mais danos com seu escudo."
"Sacrificing flair for elegance, these are an understated masterpiece.": "Sacrificando o talento pela elegância, estas são uma obra-prima discreta."
"Safe, mild recipes for increasing your Max Power. \"Great for beginners!\"": "Receitas seguras e suaves para aumentar sua potência máxima. \"Ótimo para iniciantes!\""
"Sages say the Timedancer was a scion of Laeth, the goddess of Time. Or perhaps the Timedancer will be so one day. Time paradoxes are complex, and all that can be reliably said is that the Timedancer is not here right now.": "Os sábios dizem que o Timedancer era descendente de Laeth, a deusa do Tempo. Ou talvez o Timedancer o seja um dia. Os paradoxos do tempo são complexos, e tudo o que pode ser dito com segurança é que o Timedancer não está aqui agora."
"Salvaged from some ancient public works project, this magic nail gives extra resilience to complex carpentry items.": "Resgatado de algum antigo projeto de obras públicas, este prego mágico confere resiliência extra a itens de carpintaria complexos."
"Scaly.": "Escamoso."
"Scratchy mittens maid of metal.": "Luvas ásperas feitas de metal."
"Secreted from gigantic insects, this substance is used in making very high-quality shellac.": "Secretada por insetos gigantescos, essa substância é usada na fabricação de goma-laca de altíssima qualidade."
"See Qatik in the Red Wing Casino to trade this token in for a magical crown!": "Veja Qatik no Red Wing Casino para trocar este token por uma coroa mágica!"
"Seeds that can grow into delicious wheat.": "Sementes que podem se transformar em um trigo delicioso."
"Seeds that can grow into rye.": "Sementes que podem se transformar em centeio."
"Seems like a nice horn.": "Parece um belo chifre."
"Seems like a normal femur.": "Parece um fêmur normal."
"Seems like a normal skeletal arm.": "Parece um braço esquelético normal."
"Seems like a normal skull.": "Parece um crânio normal."
"Seems like it unlocks something.": "Parece que desbloqueia alguma coisa."
"Several pages of notes written entirely in Orcish. There are a few drawings and diagrams depicting a rotational device.": "Várias páginas de notas escritas inteiramente em Orc. Existem alguns desenhos e diagramas que representam um dispositivo rotacional."
"Sewn by an amateur, with low-quality materials and a lack of fashion sense.": "Costurada por amador, com materiais de baixa qualidade e falta de senso de moda."
"Sewn by an expert tailor in Rahu, this gown is lovely, but apparently not lovely <i>enough</i>, since it was discarded.": "Costurado por um alfaiate experiente em Rahu, este vestido é lindo, mas aparentemente não é lindo o suficiente, já que foi descartado."
"Sewn by Eveline Rastin for a friend.": "Costurado por Eveline Rastin para uma amiga."
"Shaped like a snake for some reason.": "Com o formato de uma cobra por algum motivo."
"Shaped like a tiny pair of longswords.": "Com o formato de um pequeno par de espadas longas."
"Sharpened bone \"blades\" protrude from this off-hand martial weapon. It's silly looking, but dangerous!": "\"Lâminas\" de ossos afiados se projetam desta arma marcial de mão inábil. Parece bobo, mas perigoso!"
"Shaved ice flavored with apple. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com maçã. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with grapes. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com uvas. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with guava. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com goiaba. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with lemon juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com suco de limão. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with orange juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com suco de laranja. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with peach juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com suco de pêssego. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with pear juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com suco de pêra. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with pureed banana. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com purê de banana. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shaved ice flavored with strawberries. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gelo raspado aromatizado com morangos. Esta guloseima deve ser comida rapidamente antes de derreter! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Shiny boots for shiny warriors.": "Botas brilhantes para guerreiros brilhantes."
"Silky leaves, soft moss ... These things are almost comfortable!": "Folhas sedosas, musgo macio... Essas coisas são quase confortáveis!"
"Silver is a poor metal for making weapons, and this pocked and marred blade shows it. But its effect against lycanthropes is quite pronounced.": "A prata é um metal pobre para fazer armas, e esta lâmina esburacada e danificada mostra isso. Mas o seu efeito contra os licantropos é bastante pronunciado."
"Simple as can be.": "Tão simples quanto possível."
"Simple bits of metal designed to fit on the chest and shoulders of a wolf.": "Pedaços simples de metal projetados para caber no peito e nos ombros de um lobo."
"Simple bits of metal designed to fit on the front legs and claws of a wolf.": "Pedaços simples de metal projetados para caber nas patas dianteiras e nas garras de um lobo."
"Simple bits of metal designed to fit on the hind legs of a wolf.": "Pedaços simples de metal projetados para caber nas patas traseiras de um lobo."
"Simple bits of metal designed to fit on the lower legs and haunches of a wolf.": "Pedaços simples de metal projetados para caber na parte inferior das pernas e nas ancas de um lobo."
"Simple but high-quality, these earrings were worn by a human who lived in the desert years ago. They can be worn in humans' pierced ears.": "Simples, mas de alta qualidade, estes brincos foram usados ​​por um humano que viveu no deserto anos atrás. Eles podem ser usados ​​nas orelhas furadas dos humanos."
"Simple in design, but heavy on the armor plating.": "Design simples, mas pesado na blindagem."
"Simplistic runes and bright colors are what give this belt's wearer such stage presence. (But do not actually wear this ugly thing on stage.)

This buckle quickly decays when worn in combat, eventually disappearing.": "Runas simplistas e cores brilhantes são o que dão ao usuário deste cinto tanta presença de palco. (Mas não use essa coisa feia no palco.)

Esta fivela se deteriora rapidamente quando usada em combate, eventualmente desaparecendo."
"Simultaneously elegant and protective. If you own only one shirt, ... then you probably can't afford this one.": "Simultaneamente elegante e protetor. Se você possui apenas uma camisa, provavelmente não terá dinheiro para comprar esta."
"Six different mushrooms make this a very stinky potion.": "Seis cogumelos diferentes tornam esta poção muito fedorenta."
"Sized for a genetically-enhanced goblin known as a hobgoblin. Their feet are pretty big, but you can still make these fit.": "Dimensionado para um goblin geneticamente aprimorado conhecido como hobgoblin. Seus pés são bem grandes, mas você ainda pode ajustá-los."
"Sized for a very large goblin, or slightly-large human.": "Dimensionado para um goblin muito grande ou um humano ligeiramente grande."
"Skillfully-cooked mystery snack. It's super fresh and tasty looking.": "Lanche misterioso habilmente preparado. Fica com um aspecto super fresco e saboroso."
"Skintight clothing worn by ranalon. It's remarkably stretchy.": "Roupas colantes usadas por ranalon. É extremamente elástico."
"Skintight shoes worn by ranalon. Their creation method is a mystery to outsiders.": "Sapatos colantes usados ​​por Ranalon. Seu método de criação é um mistério para quem está de fora."
"Skintight tights worn by ranalon. Their creation method is a mystery to outsiders.": "Meias justas usadas por ranalon. Seu método de criação é um mistério para quem está de fora."
