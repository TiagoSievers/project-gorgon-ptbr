"Used in the first annual Gazluk Archery Competition by the titular Black Agatha, who assassinated the rightful winner with it.": "Usado na primeira competição anual de tiro com arco Gazluk pela titular Black Agatha, que assassinou o legítimo vencedor com ele."
"Used in the most primitive of smithing recipes.": "Usado nas receitas de ferraria mais primitivas."
"Used in the parlor game known as \"featherball\". This is a nice one!": "Usado no jogo de salão conhecido como \"featherball\". Este é legal!"
"Useful generic wood! Good for cooking, building, whittling, and who knows what else. Wow! What a find!": "Madeira genérica útil! Bom para cozinhar, construir, talhar e sabe-se lá o que mais. Uau! Que achado!"
"Useful primarily to mages, this apple-flavored potion causes explosions to be a little more particular about what they hit.": "Útil principalmente para magos, esta poção com sabor de maçã faz com que as explosões sejam um pouco mais específicas sobre o que atingem."
"Uses a faux-wool trim that's actually made of white moss. Itches a bit.": "Usa um acabamento de lã sintética feito de musgo branco. Coça um pouco."
"Uses the sweetness of pumpkin and cinnamon to flavor basic pancakes. No syrup needed.": "Usa a doçura da abóbora e da canela para dar sabor a panquecas básicas. Não é necessário xarope."
"Using a Fear ability restores 200 Power to you.": "Usar uma habilidade de Medo restaura 200 de Poder para você."
"Velkort gave these to you.": "Velkort deu isso para você."
"Velkort's masterpiece. Apparently the most difficult potion he's ever concocted. It tastes like beetle urine and it smells like burnt toast, and if you shake it too hard, you might blow up the countryside. But aside from those quirks... a masterpiece.": "Obra-prima de Velkort. Aparentemente a poção mais difícil que ele já inventou. Tem gosto de urina de besouro e cheiro de torrada queimada, e se você agitar com muita força, poderá explodir o campo. Mas tirando essas peculiaridades... uma obra-prima."
"Venison fried in butter and coated in fresh-cracked pepper. A restorative treat!": "Carne de veado frita na manteiga e coberta com pimenta fresca. Um deleite restaurador!"
"Very basic vinegar used in simple dishes.": "Vinagre muito básico usado em pratos simples."
"Very extremely fancy calligraphy ink.": "Tinta de caligrafia extremamente sofisticada."
"Very fancy calligraphy ink.": "Tinta de caligrafia muito sofisticada."
"Very finely ground sand mixed with clay. A useful construction sand, but bulky.": "Areia muito fina misturada com argila. Uma areia de construção útil, mas volumosa."
"Very high-quality rendered fat.": "Gordura fundida de altíssima qualidade."
"Very impressive tack for a horse.": "Aderência muito impressionante para um cavalo."
"Very old bones, recently unearthed.": "Ossos muito antigos, recentemente desenterrados."
"Very old seeds that can't be planted anymore, but may have other uses due to their glowing magical nature. Perhaps druids or shamans would like them. Or seed collectors.": "Sementes muito antigas que não podem mais ser plantadas, mas podem ter outros usos devido à sua natureza mágica e brilhante. Talvez druidas ou xamãs gostassem deles. Ou coletores de sementes."
"Very protective yet very comfortable.": "Muito protetor, mas muito confortável."
"Very small chance that you will be turned into a pig permanently": "Chance muito pequena de você se transformar permanentemente em um porco"
"Very soft to the touch, but resistant to damage.": "Muito macio ao toque, mas resistente a danos."
"Very sturdy, but with a hollow core that gives it a strange heft when swung.": "Muito resistente, mas com um núcleo oco que lhe confere um peso estranho quando balançado."
"Very sweet, sludgy, vaguely plant-flavored.": "Muito doce, lamacento, vagamente com sabor vegetal."
"Vinegar infused with a secret blend of spices.": "Vinagre infundido com uma mistura secreta de especiarias."
"Voted the most under-rated vegetable dish by 4 out of 5 elven gourmands.": "Eleito o prato de vegetais mais subestimado por 4 entre 5 gourmands élficos."
"Wanted: Kill 10 Aktaari Hall Monitors. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Procurado: Mate 10 Monitores do Salão Aktaari. Recompensa: 8.500 conselhos, 1 pedaço de Xogrite e compensação adicional apropriada."
"Wanted: Kill 10 Aktaari Swarmers. Reward: 9000 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 10 Swarmers Aktaari. Recompensa: 9.000 conselhos, 2 pedaços de Xogrite e compensação adicional apropriada."
"Wanted: Kill 10 Aktaari Swarmlings. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Procurado: Mate 10 Enxames Aktaari. Recompensa: 8.500 conselhos, 1 pedaço de Xogrite e compensação adicional apropriada."
"Wanted: Kill 10 Aktaari Workers (Group). Reward: 9500 councils, 5 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 10 Trabalhadores Aktaari (Grupo). Recompensa: 9.500 conselhos, 5 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 10 Forthragarian Engineers. Reward: 9500 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 10 Engenheiros Forthragianos. Recompensa: 9.500 conselhos, 3 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 12 Trained Gricklings. Reward: 10800 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 12 Gricklings Treinados. Recompensa: 10.800 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 12 Young Gricklings. Reward: 10200 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Procura-se: mate 12 jovens Gricklings. Recompensa: 10.200 conselhos, 1 pedaço Xogrite e compensação adicional apropriada."
"Wanted: Kill 4 Cave Lamia (Group). Reward: 3600 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 4 Cave Lamia (Grupo). Recompensa: 3.600 conselhos, 4 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 4 Deep Hippos. Reward: 3600 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procura-se: mate 4 hipopótamos profundos. Recompensa: 3.600 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 5 Guardian Drakeworms. Reward: 4500 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 5 Drakeworms Guardiões. Recompensa: 4.500 conselhos, 4 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Big Gricklings. Reward: 5700 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 6 Grandes Gricklings. Recompensa: 5.700 conselhos, 3 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Deep Cocks. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procura-se: mate 6 galos profundos. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Deep Gnashers. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procura-se: Mate 6 Roedores Profundos. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Deep Sadness Gazelles. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 6 Gazelas da Tristeza Profunda. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Deep Wasps or Menagerie Pollenators. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procura-se: mate 6 vespas profundas ou polinizadores do zoológico. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Frozen Cave Elementals. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 6 Elementais da Caverna Congelada. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Incubator Spiders (Elite). Reward: 5400 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 6 Aranhas Incubadoras (Elite). Recompensa: 5.400 conselhos, 4 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 6 Menagerie Donkeys. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 6 burros do zoológico. Recompensa: 5.400 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Deep Vines. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 8 Deep Vines. Recompensa: 7.200 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Friendly Frogs. Reward: 6800 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Procura-se: mate 8 sapos amigáveis. Recompensa: 6.800 conselhos, 1 pedaço Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Mangler Scorpions. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 8 Escorpiões Mangler. Recompensa: 7.200 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Osslar Custodians. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 8 Custodiantes Osslar. Recompensa: 7.200 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Osslar Scouts. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procurado: Mate 8 Batedores Osslar. Recompensa: 7.200 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Spider Brutes (Elite). Reward: 7200 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Procura-se: Mate 8 Spider Brutes (Elite). Recompensa: 7.200 conselhos, 4 pedaços Xogrite e compensação adicional apropriada."
"Wanted: Kill 8 Tough Tigers. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Procura-se: mate 8 tigres durões. Recompensa: 7.200 conselhos, 2 pedaços Xogrite e compensação adicional apropriada."
"Warm and cozy without getting in the way of violence.": "Quente e aconchegante sem atrapalhar a violência."
"Warm and fresh and tastes like autumn. And sugar!": "Quente e fresco e com gosto de outono. E açúcar!"
"Warm and squishy.": "Quente e mole."
"Warm crusty bread, perfect for a cold day. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Pão quentinho e crocante, perfeito para um dia frio. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Warm while worn, but freezing-cold to the touch.": "Quente enquanto usado, mas congelante ao toque."
"Warm, warm, warm. A little smelly. But warm!": "Quente, quente, quente. Um pouco fedorento. Mas quente!"
"Warmth is the key goal here. They're a little clumsy, but not enough to complain about.": "O calor é o objetivo principal aqui. Eles são um pouco desajeitados, mas não o suficiente para reclamar."
"WARNING! This spittle is contaminated with the Lycanthropy disease. Drinking it will make you a werewolf instantly and forever! There is NO cure.": "AVISO! Esta saliva está contaminada com a doença Licantropia. Beber fará de você um lobisomem instantaneamente e para sempre! NÃO há cura."
"Water made from freshly-melted snow, plus various impurities.": "Água feita de neve recém-derretida, além de diversas impurezas."
"Watery and extremely ineffective.": "Aguado e extremamente ineficaz."
"Wax-coated string for use in a candle.": "Fio revestido de cera para uso em velas."
"We be lemon pirates, Arrrrr!": "Somos piratas do limão, Arrrrr!"
"Weighted to feel comfortable for a hobgoblin, which makes it too heavy for most other races.": "Ponderado para ser confortável para um hobgoblin, o que o torna pesado demais para a maioria das outras raças."
"Weirdly cold and soupy, but not unpleasant to taste.": "Estranhamente frio e como uma sopa, mas não desagradável ao paladar."
"Welcome to Project: Gorgon!": "Bem-vindo ao Projeto: Górgona!"
"Well this is pretty embarrassing.": "Bem, isso é muito embaraçoso."
"Well, it's still got a pointy end and a handle. It should work fine.": "Bem, ainda tem uma ponta pontiaguda e uma alça. Deve funcionar bem."
"Well, someone's gone and chopped up a mangy dog.

(Use in Cheap Meat recipes.)": "Bem, alguém foi e esquartejou um cachorro sarnento.

(Use em receitas de carne barata.)"
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. (It will work for Staff Fighting but not Fire Magic abilities.)": "Bem, a maior parte da casca foi removida. Majoritariamente. Você só receberá algumas lascas tentando usar isso. (Funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. The crude Fire Magic runes bear the mark of an amateur, but should work.": "Bem, a maior parte da casca foi removida. Majoritariamente. Você só receberá algumas lascas tentando usar isso. As runas grosseiras da Magia do Fogo trazem a marca de um amador, mas devem funcionar."
"Well, the snake meat tastes a lot like chicken. But it tastes good!": "Bem, a carne de cobra tem gosto muito de frango. Mas tem um gosto bom!"
"Well, there's no name inscribed on them or anything. But you could give them a name if you wanted! The symbol of some god is etched on the inside.": "Bem, não há nenhum nome inscrito neles nem nada. Mas você poderia dar um nome a eles se quisesse! O símbolo de algum deus está gravado no interior."
"Well, they're hand-made shoes. Not everything that's hand-made is good quality, though, it turns out.": "Bem, são sapatos feitos à mão. Acontece que nem tudo que é feito à mão é de boa qualidade."
"Well, this is a stick.": "Bem, isso é um pedaço de pau."
"Well, you wouldn't want to eat off this shield, that's for sure. But why would you eat off a shield? Just strap it on your arm, weirdo.": "Bem, você não gostaria de comer este escudo, isso é certo. Mas por que você comeria um escudo? Basta amarrar no braço, esquisito."
"Well-made boots with significant armor.": "Botas bem feitas com armadura significativa."
"Well-made chainmail with a tailored fit.": "Cota de malha bem feita com ajuste sob medida."
"Well-made chainmail with extreme attention to detail.": "Cota de malha bem feita com extrema atenção aos detalhes."
"Well-prepared, but tough, leather.": "Couro bem preparado, mas resistente."
"Well-suited for staff-fighting, but a reasonable fire staff as well. Versatility!": "Adequado para combate a pessoal, mas também é um corpo de bombeiros razoável. Versatilidade!"
"Well... it hasn't hatched... yet... hopefully it won't!": "Bem... ainda não eclodiu... espero que não!"
"What a find! This is an intact biped arm assembly: humerus, radius, ulna, even most of the phalanges!": "Que achado! Este é um conjunto de braço bípede intacto: úmero, rádio, ulna e até a maioria das falanges!"
"What a gauche hat!": "Que chapéu desajeitado!"
"What is that stuff running down the side of the Blood Staff, you ask? Blood. It's blood.": "O que é aquela coisa escorrendo pela lateral do Cajado de Sangue, você pergunta? Sangue. É sangue."
"What people expect when they imagine a chainmail shirt.": "O que as pessoas esperam quando imaginam uma camisa de cota de malha."
"What the... Gross!": "Que... Nojento!"
"Whatever type of meat this once was, it's completely overrun with demonic energy now.": "Seja qual for o tipo de carne que foi antes, agora está completamente invadida por energia demoníaca."
"Wheat with a finer quality, preferred over Human wheat for certain dishes.": "Trigo de melhor qualidade, preferido ao trigo humano em determinados pratos."
"When applied topically, this ointment cures up to 10 stacks of Hellfire and Lesser Hellfire.": "Quando aplicada topicamente, esta pomada cura até 10 pilhas de Fogo do Inferno e Fogo do Inferno Menor."
"When consumed, this concoction cures all stacks of Hellfire and Lesser Hellfire.": "Quando consumida, esta mistura cura todas as pilhas de Hellfire e Lesser Hellfire."
"When goblin tribes suffer from high turnover and budget shortfalls, they often have to make do with armor like this.": "Quando as tribos goblins sofrem com alta rotatividade e déficits orçamentários, muitas vezes elas têm que se contentar com armaduras como essa."
"When grip precision is crucial, this paper has the perfect level of abrasiveness.": "Quando a precisão do aperto é crucial, este papel apresenta o nível perfeito de abrasividade."
"When held, this weapon seems to freeze the very air around it. A weapon of elite Winter Court troops.": "Quando segurada, esta arma parece congelar o ar ao seu redor. Uma arma das tropas de elite da Corte Invernal."
"When magic takes physical form, it is often made up of this material. It's a versatile crafting component.": "Quando a magia assume forma física, geralmente é feita desse material. É um componente de artesanato versátil."
"When placed in a damp cave, this box can be used to grow a crop of mushrooms.": "Quando colocada em uma caverna úmida, esta caixa pode ser usada para cultivar cogumelos."
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.
Grow Time: 100% slower than normal
Yield: +200% more mushrooms than normal
Note: this box requires 2 doses of substrate": "Quando colocada em uma caverna úmida, esta caixa pode ser usada para cultivar uma grande colheita de cogumelos.
Tempo de crescimento: 100% mais lento que o normal
Rendimento: +200% mais cogumelos que o normal
Nota: esta caixa requer 2 doses de substrato"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.
Grow Time: 100% slower than normal
Yield: +220% more mushrooms than normal
Chance for Second Mushroom Type: 20%
Note: this box requires 2 doses of substrate": "Quando colocada em uma caverna úmida, esta caixa pode ser usada para cultivar uma grande colheita de cogumelos.
Tempo de crescimento: 100% mais lento que o normal
Rendimento: +220% mais cogumelos que o normal
Chance para o segundo tipo de cogumelo: 20%
Nota: esta caixa requer 2 doses de substrato"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.
Grow Time: 100% slower than normal
Yield: +240% more mushrooms than normal
Chance for Second Mushroom Type: 40%
Note: this box requires 2 doses of substrate": "Quando colocada em uma caverna úmida, esta caixa pode ser usada para cultivar uma grande colheita de cogumelos.
Tempo de crescimento: 100% mais lento que o normal
Rendimento: +240% mais cogumelos que o normal
Chance para o segundo tipo de cogumelo: 40%
Nota: esta caixa requer 2 doses de substrato"
"When the Council demanded that the Rakshasa provide renumeration for every human that was injured at the Battle of Rahu, outraged Rakshasa tore up the treaty and killed the messengers, leading to the Sand War. The Rakshasa won the war with claws like this, fashioned after weapons from their home world.": "Quando o Conselho exigiu que os Rakshasa fornecessem remuneração para cada humano ferido na Batalha de Rahu, o indignado Rakshasa rasgou o tratado e matou os mensageiros, levando à Guerra da Areia. Os Rakshasa venceram a guerra com garras como esta, feitas com armas de seu mundo natal."
"When the dwarves were holed up under Serbule so many centuries ago, they didn't have a lot to do but make really resilient armor. The resiliency magic bleeds over to the wearer.": "Quando os anões estavam escondidos sob Serbule há tantos séculos, eles não tinham muito o que fazer a não ser fabricar armaduras realmente resistentes. A magia da resiliência chega ao usuário."
"When thousands of Rakshasa warriors arrived on Alharth, they wore boots like these, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Quando milhares de guerreiros Rakshasa chegaram a Alharth, eles usavam botas como estas, projetadas para acomodar todos os ambientes. O segredo de sua elaboração foi perdido pelos Rakshasa que vivem aqui agora."
"When thousands of Rakshasa warriors arrived on Alharth, they wore suits of armor like this, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Quando milhares de guerreiros Rakshasa chegaram a Alharth, eles usavam armaduras como esta, projetadas para acomodar todos os ambientes. O segredo de sua elaboração foi perdido pelos Rakshasa que vivem aqui agora."
"When winter comes and you need a great coat, now you have one. During summer, though, this is a \"nice\" coat. At best.": "Quando chega o inverno e você precisa de um casaco lindo, agora você tem um. Durante o verão, porém, este é um casaco “bonito”. Na melhor das hipóteses."
"When winter comes and you need an amazing coat, now you have one. During summer, though, this is a \"quality\" coat. At best.": "Quando chega o inverno e você precisa de um casaco incrível, agora você tem um. Durante o verão, porém, este é um casaco de “qualidade”. Na melhor das hipóteses."
"When winter comes and you need an astounding coat, now you have one. During summer, though, this is an \"amazing\" coat. At best.": "Quando chega o inverno e você precisa de um casaco incrível, agora você tem um. Durante o verão, porém, este é um casaco “incrível”. Na melhor das hipóteses."
"When you aren't in combat, hold down Shift to run very, very fast. You also take no damage from falls. Lasts 5 minutes.": "Quando você não estiver em combate, mantenha pressionada a tecla Shift para correr muito, muito rápido. Você também não sofre danos por quedas. Dura 5 minutos."
"When you don this strange glowing metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Quando você veste este estranho traje de metal brilhante, você pode sentir seu senso de empatia e comunidade diminuir. É melhor matar sem remorso!"
"When you don this strange metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Ao vestir esse estranho traje de metal, você pode sentir seu senso de empatia e comunidade diminuir. É melhor matar sem remorso!"
"When you put these slippers on, your whole body feels lighter.": "Quando você calça esses chinelos, todo o seu corpo fica mais leve."
"When you see a spider wearing this hat, there is no mistaking the fact that they are a party animal, through and through.": "Quando você vê uma aranha usando este chapéu, não há dúvidas de que ela é um festeiro de ponta a ponta."
"When you touch it, it seems to scream into your brain.": "Quando você toca nele, parece gritar em seu cérebro."
"When your golf ball is used up, gain Non-combat Sprint Boost +2 for 120 seconds": "Quando sua bola de golfe acabar, ganhe Impulso de Corrida Sem Combate +2 por 120 segundos"
"When your snoot is just too tender to handle getting booped. Apply moderately to snoot. Reapply every 30 minutes as needed.": "Quando seu bisbilhoteiro é muito sensível para aguentar ser boopado. Aplique moderadamente no snoot. Reaplique a cada 30 minutos conforme necessário."
"Where did all these bugs come from?": "De onde vieram todos esses bugs?"
"While arguably not as effective as a super-sharp normal sword, Prognek's flaming design is fun for pyromaniacs.": "Embora não seja tão eficaz quanto uma espada normal superafiada, o design flamejante de Prognek é divertido para piromaníacos."
"While crude, this buckle has a certain charming skill to it.

This buckle quickly decays when worn in combat, eventually disappearing.": "Embora rudimentar, esta fivela tem uma certa habilidade encantadora.

Esta fivela se deteriora rapidamente quando usada em combate, eventualmente desaparecendo."
"While decades old, these gloves have never been worn in combat. They were crafted for \"all-weather exploration\", but to the orcs that made them, that mostly meant \"cold-weather exploration\".": "Embora tenham décadas, essas luvas nunca foram usadas em combate. Eles foram criados para “exploração em qualquer clima”, mas para os orcs que os criaram, isso significava principalmente “exploração em clima frio”."
"While doubtlessly dwarven in design, this helmet seems light. There is extra insulation against cold.": "Embora sem dúvida tenha um design anão, este capacete parece leve. Existe isolamento extra contra o frio."
"While dwarves are mostly known for brewing alcohol, those same techniques can also be used to brew potent offensive chemicals.": "Embora os anões sejam mais conhecidos por fabricar álcool, essas mesmas técnicas também podem ser usadas para fabricar produtos químicos potentes e ofensivos."
"While inarguably well-made, it seems somewhat ceremonial: the blade isn't even sharp! But it is very, very, VERY hot, which might count for something. There is an inscription: \"The Bearer Is Worthy\"": "Embora indiscutivelmente bem feito, parece um tanto cerimonial: a lâmina nem é afiada! Mas está muito, muito, MUITO quente, o que pode contar para alguma coisa. Há uma inscrição: \"O portador é digno\""
"While it has a close resemblance to a fly amanita, this mushroom is exceptionally poisonous and never edible.": "Embora tenha uma grande semelhança com um amanita mosca, este cogumelo é excepcionalmente venenoso e nunca comestível."
"While it has an unfortunate racist past (invented by humans who were terrified that neighboring elves were going to mind-assault them), the shield still sees use due to its broad protective powers.": "Embora tenha um passado racista infeliz (inventado por humanos que estavam com medo de que os elfos vizinhos os atacassem mentalmente), o escudo ainda é usado devido aos seus amplos poderes de proteção."
"While it resembles a wooden staff, it's actually made of super-compressed, highly conductive mushrooms.": "Embora se assemelhe a um bastão de madeira, na verdade é feito de cogumelos supercomprimidos e altamente condutores."
"While many bards lamented Tennenbrandt University's shift away from music and toward combat magic, Lostt reveled in a newfound spotlight, for his music was known across many realms as being offensively bad.": "Enquanto muitos bardos lamentavam a mudança da Universidade Tennenbrandt da música para a magia de combate, Lostt deleitou-se com um novo holofote, pois sua música era conhecida em muitos reinos como sendo ofensivamente ruim."
"While not a comfortable piece of equipment, it is decently protective.": "Embora não seja um equipamento confortável, é decentemente protetor."
"While not exactly beautiful, it's definitely elegant and comfortable. The early work of an up-and-coming master tailor, perhaps.": "Embora não seja exatamente bonito, é definitivamente elegante e confortável. Talvez o trabalho inicial de um mestre alfaiate em ascensão."
"While not the nicest way to prepare cocoa beans, this is useful for some recipes.": "Embora não seja a maneira mais agradável de preparar grãos de cacau, é útil para algumas receitas."
"While on the surface this belt buckle elegantly conveys the wonder and joy of hitting things, a second interpretation suggests that people who hit things with hammers are inherently better than other people. The symbolism is subtle, but it's there.

This buckle slowly decays when worn in combat until it eventually disappears.": "Embora na superfície esta fivela de cinto transmita elegantemente a maravilha e a alegria de bater nas coisas, uma segunda interpretação sugere que as pessoas que batem nas coisas com martelos são inerentemente melhores do que outras pessoas. O simbolismo é sutil, mas está lá.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"While the craftsmanship is adequate, the materials are not, and this helmet looks more like a dead beaver than a helm.": "Embora o artesanato seja adequado, os materiais não são, e este capacete parece mais um castor morto do que um elmo."
"While there are still-extant offshoots of the Thorians, such as the Thentree elves and the Seekers of Marakir, only the actual Thorians made gloves like these! The weighting is pretty uncomfortable.": "Embora ainda existam ramificações dos Thorianos, como os elfos de Thentree e os Buscadores de Marakir, apenas os verdadeiros Thorianos faziam luvas como essas! A ponderação é bastante desconfortável."
"While this buckle is certainly gaudy, it also conveys notions of toughness and fortitude in a way that mere words never could.

This buckle slowly decays when worn in combat until it eventually disappears.": "Embora esta fivela seja certamente vistosa, ela também transmite noções de resistência e coragem de uma forma que meras palavras nunca conseguiriam.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"While vaguely protective, this lopsided helmet is so unbalancing that you're almost better off just going into combat without a helm at all.": "Embora vagamente protetor, este capacete torto é tão desequilibrado que é quase melhor você entrar em combate sem elmo."
"Whisper-thin yet perfectly adaptive, these horseshoes last a lifetime and will never not be marvelous.": "Superfinas, mas perfeitamente adaptáveis, essas ferraduras duram a vida toda e nunca deixarão de ser maravilhosas."
"Who doesn't love steel plate armor on your hands? Well... besides wizards?": "Quem não gosta de armadura de chapa de aço nas mãos? Bem... além de bruxos?"
"Who knows what this ancient document says? The language has been lost to the ages. Judging by the accompanying stick-figure pornographic art, however, it's probably not really worth dwelling on.": "Quem sabe o que diz este antigo documento? A linguagem se perdeu ao longo dos tempos. A julgar pela arte pornográfica de bonecos palitos que a acompanha, no entanto, provavelmente não vale a pena insistir nisso."
"Why do acid resistance potions always have to TASTE like acid?": "Por que as poções de resistência a ácidos sempre têm que ter gosto de ácido?"
"Wielded by the mad assassin Nopec who wished to bring about Endless Nights in the name of Fenna, goddess of Dusk and Innocence. Fenna was repulsed by this idea, but that didn't stop Nopec's spree of murder.": "Empunhado pelo louco assassino Nopec que desejava realizar Endless Nights em nome de Fenna, deusa do Crepúsculo e da Inocência. Fenna sentiu repulsa pela ideia, mas isso não impediu a onda de assassinatos de Nopec."
"Wielded by the more sinister variety of Winter Court fae assassins, this shiv freezes everything it touches.": "Empunhada pela variedade mais sinistra de assassinos fae da Corte Winter, esta faca congela tudo que toca."
"Wielded by the warrior-priests of Saledar, the goblin god of Societal Cooperation.": "Empunhado pelos sacerdotes guerreiros de Saledar, o deus goblin da Cooperação Social."
"With a bewildering aroma and a barrage of different textures, this ranalon favorite is exotic and delicious... although it does take some getting used to.": "Com um aroma desconcertante e uma série de texturas diferentes, este favorito do ranalon é exótico e delicioso... embora demore um pouco para se acostumar."
"With a simple, streamlined style and a sharp, edgy aesthetic.": "Com um estilo simples e aerodinâmico e uma estética nítida e ousada."
"With an eye toward performance over elegance, these leather pants will protect you from monsters, but not from chafing.": "Visando o desempenho em vez da elegância, essas calças de couro irão protegê-lo de monstros, mas não de atrito."
"With but a glance, the viewer understands the message behind this beautiful belt: people who use hammers can never die.

This buckle slowly decays when worn in combat until it eventually disappears.": "Com apenas um relance, o espectador entende a mensagem por trás deste lindo cinto: quem usa martelos nunca morre.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"With horrid stitching and gigantic holes, these smelly pants are just plain sad.": "Com costuras horríveis e buracos gigantescos, essas calças fedorentas são simplesmente tristes."
"With notes of citrus and sweetness, this is a decent table wine.": "Com notas cítricas e doçura, este é um vinho de mesa digno."
"Wood-grilled to perfection.": "Grelhado a lenha com perfeição."
"Worn by a sentient panther for years. Its strong protective magic overshadows the smell of blood soaked into the collar.": "Usado por uma pantera senciente durante anos. Sua forte magia protetora ofusca o cheiro de sangue encharcado na coleira."
"Worn by both elves and dwarves during the Elf-Orc Wars, these boots were made for stomping.": "Usadas por elfos e anões durante as Guerras Elfos-Orcs, essas botas foram feitas para pisotear."
"Worn by fae officers aboard their strange ships. Made of an unrecognizable material.": "Usado por oficiais fae a bordo de seus navios estranhos. Feito de um material irreconhecível."
"Worn by lay followers of Strekios, the God of Self-Improvement. It's styled after the terrifying medallions worn at Strekios Camps, but this one is purely decorative, aside from a few enchantments that were added later.": "Usado por seguidores leigos de Strekios, o Deus do Autoaperfeiçoamento. Tem o estilo dos terríveis medalhões usados ​​nos acampamentos de Strekios, mas este é puramente decorativo, exceto alguns encantamentos que foram adicionados posteriormente."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank that most can expect to reach, given mages' glass ceiling in orcish society.": "Usado por magos orcs depois de serem promovidos a 'Magic Trooper', que é o posto mais alto que a maioria pode esperar alcançar, dado o teto de vidro dos magos na sociedade orc."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank they can expect to reach, given mages' glass ceiling in orcish society.": "Usado por magos orcs depois de serem promovidos a 'Magic Trooper', que é o posto mais alto que eles podem esperar alcançar, dado o teto de vidro dos magos na sociedade orc."
"Worn by ranalon to help protect their sensitive skin from environmental harm.": "Usado por ranalon para ajudar a proteger sua pele sensível dos danos ambientais."
"Worn by the elite Snowblood orcs that take care of problematic situations in battle. They're hard to maintain, but impressively protective.": "Usado pelos orcs de elite Snowblood que cuidam de situações problemáticas em batalha. Eles são difíceis de manter, mas impressionantemente protetores."
"Worn leather boots with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Botas de couro gastas com metal meticulosamente inserido nelas. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn leather pants with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Calças de couro gastas com metal meticulosamente inserido nelas. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn leather with metal meticulously inserted into it. Whoever made this lacked skill in leatherworking, but made up for it with time and attention to detail.": "Couro desgastado com metal meticulosamente inserido nele. Quem fez isso não tinha habilidade em trabalhar couro, mas compensou com tempo e atenção aos detalhes."
"Worn to high-society functions by the elite of Rahu, these lovely gloves are also fairly comfortable.": "Usadas em funções da alta sociedade pela elite de Rahu, essas lindas luvas também são bastante confortáveis."
"Woven with fairy magic, this lovely shirt regenerates its leaves continuously. Unfortunately it is extremely itchy to wear. But noone said safety and comfort had to go hand in hand, so stop complaining.": "Tecido com magia de fada, esta linda camisa regenera suas folhas continuamente. Infelizmente, é extremamente coceira de usar. Mas ninguém disse que segurança e conforto devem andar de mãos dadas, então pare de reclamar."
"Wow! Awesome! You could sleep in this baby, it's so comfortable.": "Uau! Incrível! Você poderia dormir com este bebê, é tão confortável."
"Wow, off-red utility gloves. Nice. I guess.": "Uau, luvas utilitárias off-red. Legal. Eu acho."
"Wow, purple gloves. Very nice.": "Uau, luvas roxas. Muito legal."
"Wow, someone put way too much effort into these cow shoes!": "Uau, alguém se esforçou demais nesses sapatos de vaca!"
"Wow, someone put way too much effort into these deer shoes!": "Uau, alguém se esforçou demais nesses sapatos de cervo!"
"Wow, someone put way too much effort into these wooden cow shoes!": "Uau, alguém se esforçou demais nessas botas de madeira para vacas!"
"Wow, someone put way too much effort into these wooden deer shoes!": "Uau, alguém se esforçou demais nesses sapatos de madeira de cervo!"
"Wow, who made this leather? That's craftsmanship! You just want to touch it constantly.": "Nossa, quem fez esse couro? Isso é artesanato! Você só quer tocá-lo constantemente."
"Wow. Now you KNOW you've seen deer-shoe craftsmanship. These tiny things are delicate, yet indestructible.": "Uau. Agora você SABE que já viu artesanato com sapatos de cervo. Essas pequenas coisas são delicadas, mas indestrutíveis."
"Written by an anonymous goblin poet, this melodramatic prose-poem is about worms that are used as food. It is not highly-acclaimed, but beginners to the art of poetry appreciation find it humorous.": "Escrito por um poeta duende anônimo, este poema em prosa melodramático é sobre vermes que são usados ​​como alimento. Não é muito aclamado, mas os iniciantes na arte da apreciação da poesia acham-no engraçado."
"Written by an anonymous orc, this terse poem tells the story of the battle of Fok, where over a million orcs died. The author manages to deliver a glimpse into the horrors of war. It's said that the author was drawn and quartered for producing this work, and their works burned, but obviously some copies survived.": "Escrito por um orc anônimo, este poema conciso conta a história da batalha de Fok, onde mais de um milhão de orcs morreram. O autor consegue dar uma ideia dos horrores da guerra. Diz-se que o autor foi sorteado e esquartejado por produzir esta obra, e suas obras foram queimadas, mas obviamente algumas cópias sobreviveram."
"Yellowtail so fresh, it melts in your mouth.": "Yellowtail tão fresco que derrete na boca."
"Yep, the snout of a pig.": "Sim, o focinho de um porco."
"Yew chips for smoking fish and meat.": "Batatas fritas de teixo para defumar peixe e carne."
"Yogzi created this convenient butcher knife that can also extract skulls. (+3 to your effective skill when Butchering or Extracting Skulls). (Keep it in your inventory and you'll be given the option to butcher and/or extract the skull of some enemies.)": "Yogzi criou esta faca de açougueiro conveniente que também pode extrair crânios. (+3 para sua habilidade efetiva ao massacrar ou extrair crânios). (Mantenha-o em seu inventário e você terá a opção de abater e/ou extrair o crânio de alguns inimigos.)"
"You become a raven. Use the Move Up key to fly. Your attacks will do negligible damage. But you can fly, so that's something.": "Você se torna um corvo. Use a tecla Move Up para voar. Seus ataques causarão danos insignificantes. Mas você pode voar, então isso é alguma coisa."
"You can almost hear the ocean waves when you smell this pleasing sea-inspired aroma.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Você quase pode ouvir as ondas do mar ao sentir este agradável aroma inspirado no mar.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"You can kind of make out little orc faces and little stork bodies in this abstract painting, although you have to squint. It's bright and upbeat, but you've never heard of the painter.": "Você pode distinguir pequenos rostos de orcs e pequenos corpos de cegonha nesta pintura abstrata, embora seja necessário apertar os olhos. É brilhante e otimista, mas você nunca ouviu falar do pintor."
"You can perceive newly-spawned fairies and fae creatures 10 seconds before they actually appear.

The effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Você pode perceber fadas e criaturas feéricas recém-geradas 10 segundos antes de elas realmente aparecerem.

O efeito não passa, mas sempre que você morre há 5% de chance de acabar."
"You can perceive newly-spawned plant creatures 10 seconds before they actually appear.

The effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Você pode perceber criaturas vegetais recém-geradas 10 segundos antes de elas realmente aparecerem.

O efeito não passa, mas sempre que você morre há 5% de chance de acabar."
"You can perceive newly-spawned rodents and rodent-kin 10 seconds before they actually appear.

The effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Você pode perceber roedores e parentes de roedores recém-gerados 10 segundos antes de eles realmente aparecerem.

O efeito não passa, mas sempre que você morre há 5% de chance de acabar."
"You can perceive newly-spawned undead 10 seconds before they actually appear.

The effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Você pode perceber mortos-vivos recém-gerados 10 segundos antes de eles realmente aparecerem.

O efeito não passa, mas sempre que você morre há 5% de chance de acabar."
"You can perceive where new monsters will spawn. They will appear as purple energy for 2 seconds before they actually appear.

This effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Você pode perceber onde novos monstros irão aparecer. Eles aparecerão como energia roxa por 2 segundos antes de realmente aparecerem.

Este efeito não passa, mas sempre que você morre há 5% de chance de que ele acabe."
"You can sit in it.": "Você pode sentar nele."
"You can use the ability Hymn of Resurrection. (Equipping this item will teach you the ability if needed.)": "Você pode usar a habilidade Hino da Ressurreição. (Equipar este item lhe ensinará a habilidade, se necessário.)"
"You don't want to think about the taste... it's best to drink something strong afterwards.": "Você não quer pensar no sabor... é melhor beber algo forte depois."
"You feel nice wearing a leather shirt like this. Nice enough to be able to dodge arrows.": "Você se sente bem vestindo uma camisa de couro como esta. Bom o suficiente para ser capaz de desviar de flechas."
"You get the feeling that, even when they were brand new, these pants already had that great worn-in feeling. The padding is strong but not bulky and the leather smell is intoxicating.": "Você tem a sensação de que, mesmo quando novas, essas calças já tinham aquela sensação ótima de uso. O estofamento é forte, mas não volumoso, e o cheiro de couro é inebriante."
"You never expected that cold-weather gear made from bits and bobs of nature would work so well.": "Você nunca esperou que equipamentos para clima frio feitos de pedaços da natureza funcionassem tão bem."
"You recover 300 Health. 25 seconds later, you take 1000 Poison damage.": "Você recupera 300 pontos de vida. 25 segundos depois, você sofre 1000 de dano de Veneno."
"You reflect 4% of any physical attack damage (Slashing, Piercing, or Crushing) back at the attacker.": "Você reflete 4% de qualquer dano de ataque físico (cortante, perfurante ou esmagador) de volta ao atacante."
"You reflect 5% of any physical attack damage (Slashing, Piercing, or Crushing) back at the attacker.": "Você reflete 5% de qualquer dano de ataque físico (cortante, perfurante ou esmagador) de volta ao atacante."
"You thought you'd seen a cow-shoe masterpiece before, but this just reset your expectations!": "Você pensou que já tinha visto uma obra-prima de sapato de vaca antes, mas isso apenas redefiniu suas expectativas!"
"You would never realize these pants were crafted by treants... if indeed they were crafted by treants. (Followers of Ri-Shin constantly lie about how many things are crafted by treants. Most likely, it was elves.)": "Você nunca perceberia que essas calças foram feitas por entes... se de fato elas foram feitas por entes. (Os seguidores de Ri-Shin mentem constantemente sobre quantas coisas são criadas por entes. Provavelmente foram elfos.)"
"You would not believe how big this praying mantis was. Well, YOU might.": "Você não acreditaria quão grande era esse louva-a-deus. Bem, VOCÊ pode."
"You'd almost think these were metal, that's how great these bits of wood are!": "Você quase pensaria que eram de metal, esses pedaços de madeira são lindos!"
"Your next direct attack will apply anti-invincibility poison to the target for 15 seconds": "Seu próximo ataque direto aplicará veneno anti-invencibilidade ao alvo por 15 segundos"
"Your violent cow will be made all the more violent by these uncomfortable shoes!": "Sua vaca violenta ficará ainda mais violenta com esses sapatos desconfortáveis!"
