"An artist's depiction of what a fifth season might be like, if there was one between winter and spring. It's lovely, but it pretty much just looks like winter to you.": "Uma representação artística de como seria uma quinta temporada, se houvesse uma entre o inverno e a primavera. É lindo, mas parece inverno para você."
"An astonishingly intricate tiny harness designed to fit a giant butterfly, enabling Druidism.": "Um pequeno arnês surpreendentemente complexo projetado para acomodar uma borboleta gigante, permitindo o Druidismo."
"An attempt at perfect harmony: metal outside, wool inside. Unfortunately, the gloves get really sweaty and are prone to fungal infestation. Ew.": "Uma tentativa de harmonia perfeita: metal por fora, lã por dentro. Infelizmente, as luvas ficam muito suadas e estão sujeitas a infestações por fungos. Eca."
"An attractive longshield. The symbols on the back say \"Lead Without Fear\" in elvish.": "Um escudo longo atraente. Os símbolos nas costas dizem \"Lidere Sem Medo\" em élfico."
"An autopsy kit made of ice and fairy dust. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Um kit de autópsia feito de gelo e pó de fada. (Mantenha-o em seu inventário e você terá a opção de autopsiar cadáveres.)"
"An awesome work of magical engineering.": "Um incrível trabalho de engenharia mágica."
"An easy-to-make snack.": "Um lanche fácil de fazer."
"An edible mushroom.": "Um cogumelo comestível."
"An edible plant with a spicy and slightly bitter flavor.": "Planta comestível de sabor picante e levemente amargo."
"An elaborate contraption that can dispense free items. This model can dispense up to 10 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 10 unidades de um único tipo de item."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item and has a place for a custom message that all visitors will see.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 1.000 unidades de um único tipo de item e possui local para uma mensagem personalizada que todos os visitantes verão."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens grátis. Este modelo pode dispensar até 1000 unidades de um único tipo de item."
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 10 free raffle tickets for a single item (or item stack).": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa grátis e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 10 rifas grátis para um único item (ou pilha de itens)."
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 20 free raffle tickets for 1 or 2 items (or item stacks) and/or a small cash prize.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa grátis e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 20 rifas grátis para 1 ou 2 itens (ou pilhas de itens) e/ou um pequeno prêmio em dinheiro."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 10 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 10 itens de um único tipo."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item and has a place for a custom message that all users will see.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 1.000 unidades de um único tipo de item e possui local para uma mensagem personalizada que todos os usuários verão."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item.": "Uma engenhoca elaborada que pode distribuir itens e coletar dinheiro. Este modelo pode vender até 1.000 unidades de um único tipo de item."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 100 raffle tickets for up to 8 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-120 minutes.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 100 rifas para até 8 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos. Este modelo possui local para uma inscrição que é exibida a cada usuário, e uma mensagem que é mostrada apenas ao vencedor. Este modelo também pode ser configurado para ter um limite de tempo de 1 a 120 minutos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 1000 raffle tickets for up to 10 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-120 minutes.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 1.000 bilhetes de rifa para até 10 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos. Este modelo possui local para uma inscrição que é exibida a cada usuário, e uma mensagem que é mostrada apenas ao vencedor. Este modelo também pode ser configurado para ter um limite de tempo de 1 a 120 minutos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 30 raffle tickets for up to 3 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode dispensar até 30 rifas para até 3 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.

This model can dispense up to 50 raffle tickets for up to 6 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user.": "Uma engenhoca elaborada que pode distribuir bilhetes de rifa e depois entregar uma recompensa ao vencedor do sorteio.

Este modelo pode distribuir até 50 rifas para até 6 itens (ou pilhas de itens) e/ou prêmio em dinheiro. As rifas podem ser gratuitas ou podem custar Conselhos. Este modelo possui local para uma inscrição que é exibida a cada usuário."
"An elaborate network of nerves that connects the three heads together.": "Uma elaborada rede de nervos que conecta as três cabeças."
"An elegant buckle covered in symbols. The most prominent symbol is a god-like being swinging a hammer.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela elegante coberta de símbolos. O símbolo mais proeminente é um ser semelhante a um deus brandindo um martelo.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"An elegant buckle covered in symbols. There's demonic beings swinging hammers, among other things.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela elegante coberta de símbolos. Existem seres demoníacos balançando martelos, entre outras coisas.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"An elegant buckle covered in symbols. There's lots of hammers and clubs.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela elegante coberta de símbolos. Há muitos martelos e porretes.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"An elegant buckle covered in symbols. There's lots of hammers.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela elegante coberta de símbolos. São muitos martelos.

Esta fivela decai lentamente quando usada em combate até desaparecer."
