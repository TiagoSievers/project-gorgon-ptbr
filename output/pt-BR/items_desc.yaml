"Teaches you patterns for great hats tailored specifically for swine.": "Ensina padrões para ótimos chapéus feitos especificamente para suínos."
"Teaches you patterns for hats tailored specifically for giant bats.": "Ensina padrões para chapéus feitos especificamente para morcegos gigantes."
"Teaches you patterns for hats tailored specifically for giant bats. (You must complete a quest during the Zhia Lian event to unlock the prerequisite recipe!)": "Ensina padrões para chapéus feitos especificamente para morcegos gigantes. (Você deve completar uma missão durante o evento Zhia Lian para desbloquear a receita de pré-requisito!)"
"Teaches you patterns for quality hats tailored for does and bucks.": "Ensina padrões para chapéus de qualidade feitos sob medida para dinheiro e dinheiro."
"Teaches you patterns for quality hats tailored specifically for cows.": "Ensina padrões para chapéus de qualidade feitos sob medida especificamente para vacas."
"Teaches you patterns for quality hats tailored specifically for swine.": "Ensina padrões para chapéus de qualidade feitos sob medida especificamente para suínos."
"Teaches you recipes for turning mushroom powders into suspensions, making them useful for alchemy.": "Ensina receitas para transformar cogumelos em pó em suspensões, tornando-os úteis para a alquimia."
"Teaches you schematics for a claw-style fighting weapon with spring-loaded pop-up mechanisms to disperse chemicals.": "Ensina esquemas para uma arma de combate tipo garra com mecanismos pop-up acionados por mola para dispersar produtos químicos."
"Teaches you schematics for a harness that allows bats to disperse chemicals with a flap of their wings.": "Ensina esquemas de um arnês que permite aos morcegos dispersar produtos químicos com um bater de asas."
"Teaches you schematics for a revealing but very comfortable garment.": "Ensina esquemas para uma peça de roupa reveladora, mas muito confortável."
"Teaches you schematics for a spider harness with a system of discrete tubes that can dispense chemicals.": "Ensina esquemas para um arnês de aranha com um sistema de tubos discretos que podem dispensar produtos químicos."
"Teaches you schematics for armoring cows. Really!": "Ensina esquemas para blindar vacas. Realmente!"
"Teaches you schematics for turning snail shells and other items into something resembling armor.": "Ensina esquemas para transformar conchas de caracóis e outros itens em algo parecido com uma armadura."
"Teaches you several ways to make advanced acids with many uses in crafting. Not quite useful in combat.": "Ensina várias maneiras de fazer ácidos avançados com muitos usos na elaboração. Não é muito útil em combate."
"Teaches you the basics of Archery. (Raises your skill to 1 if it isn't already.)": "Ensina o básico do tiro com arco. (Aumenta sua habilidade para 1, se ainda não estiver.)"
"Teaches you the basics of Fletching. (Raises your skill to 1 if it isn't already.)": "Ensina o básico do Fletching. (Aumenta sua habilidade para 1, se ainda não estiver.)"
"Teaches you the basics of Teleportation. (Raises your skill to 1 if it isn't already.)": "Ensina o básico do teletransporte. (Aumenta sua habilidade para 1, se ainda não estiver.)"
"Teaches you the Myconian language. (This is a testing aid and will not be available for long; please use this to test the Myconian dungeon, which can be accessed via random brown mushrooms in Serbule.)": "Ensina a língua Myconiana. (Este é um auxílio de teste e não estará disponível por muito tempo; use-o para testar a masmorra de Myconian, que pode ser acessada por meio de cogumelos marrons aleatórios em Serbule.)"
"Teaches you the technique for creating mercury, a curious liquid with many uses.": "Ensina a técnica de criação do mercúrio, um líquido curioso e com muitas utilidades."
"Teaches you to brew a tea useful to weather witches.": "Ensina você a preparar um chá útil para as bruxas do clima."
"Teaches you to make a bizarre \"ring\" that allows pigs to perform feats of Battle Chemistry.": "Ensina você a fazer um “anel” bizarro que permite aos porcos realizar proezas de Química de Batalha."
"Teaches you to make a lovely ring fashionable with the Winter Court.": "Ensina a fazer um lindo anel na moda com a Corte Invernal."
"Teaches you to make a magic ring from otherworldly material.": "Ensina você a fazer um anel mágico com material de outro mundo."
"Teaches you to make a necklace that can activate a necromancer's rituals.": "Ensina a fazer um colar que pode ativar os rituais de um necromante."
"Teaches you to make a necklace that can serve as a priest's holy symbol.": "Ensina a fazer um colar que pode servir como símbolo sagrado de um sacerdote."
"Teaches you to make a quite astounding skinning knife.": "Ensina você a fazer uma faca de esfolar bastante surpreendente."
"Teaches you to make a simple chain featuring two decorative gems.": "Ensina a fazer uma corrente simples com duas pedras decorativas."
"Teaches you to make a simple, beautiful, magical ring.": "Ensina a fazer um anel simples, lindo e mágico."
"Teaches you to make simple acids from exotic metals, or from organic items you may already have in your home. Great for cleaning! Too mild for use in combat.": "Ensina a fazer ácidos simples a partir de metais exóticos ou de itens orgânicos que você já tenha em casa. Ótimo para limpeza! Muito suave para uso em combate."
"Teaches you various recipes for special inks.": "Ensina diversas receitas de tintas especiais."
"Technically usable cloth gloves.": "Luvas de tecido tecnicamente utilizáveis."
"Teleports wielder to a location in Vidaria": "Teleporta o usuário para um local em Vidaria"
"Teleports wielder to Eltibule": "Teletransporta o usuário para Eltibule"
"Teleports wielder to Kur Mountains": "Teletransporta o usuário para as Montanhas Kur"
"Teleports wielder to New Prestonbule in Gazluk": "Teleporta o portador para New Prestonbule em Gazluk"
"Teleports wielder to Povus": "Teletransporta o usuário para Povus"
"Teleports wielder to Rahu": "Teletransporta o usuário para Rahu"
"Teleports wielder to Serbule": "Teletransporta o usuário para Serbule"
"Teleports wielder to Serbule Hills": "Teletransporta o usuário para Serbule Hills"
"Teleports wielder to Sun Vale": "Teletransporta o usuário para Sun Vale"
"Teleports wielder to the Fae Realm": "Teletransporta o usuário para o Reino Fae"
"Teleports wielder to the Ilmari Desert": "Teletransporta o usuário para o deserto de Ilmari"
"Teleports wielder to the Level 90 Trainers beneath Povus": "Teleporta o usuário para os treinadores de nível 90 abaixo de Povus"
"Temporarily masks the side-effects of Pineal Juice abuse": "Mascara temporariamente os efeitos colaterais do abuso do suco de pineal"
"Tender chicken atop a fluffy mound of steamed orcish couscous, accompanied by the sweet crunch of carrots.": "Frango tenro em cima de um monte fofo de cuscuz orc cozido no vapor, acompanhado pelo doce crocante de cenoura."
"Tender cuts of pork delicately flavored with fruit and sprigged with mint.": "Deliciosos cortes de porco delicadamente aromatizados com frutas e salpicados de hortelã."
"Test potion to haunt you.": "Poção de teste para assombrá-lo."
"Test potion transforms you into a cow. Permanent until dispelled! WARNING: think before you drink!": "A poção de teste transforma você em uma vaca. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Test potion transforms you into a deer. Permanent until dispelled! WARNING: think before you drink!": "A poção de teste transforma você em um cervo. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Test potion transforms you into a giant bat. Permanent until dispelled! WARNING: think before you drink!": "A poção de teste transforma você em um morcego gigante. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Test potion transforms you into a pig. Permanent until dispelled! WARNING: think before you drink!": "A poção de teste transforma você em um porco. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Test sword!": "Espada de teste!"
"Thanks to a modicum of padding inside, wearing these pants will only leave you severely chafed, instead of incapacitated.": "Graças a um mínimo de acolchoamento interno, usar essas calças só vai deixar você muito irritado, em vez de incapacitado."
"Thanks to their near-invisible size, these marvelous cowshoes say almost nothing about the cow that wears them. Friend, foe, demon? These shoes give no clues to the observer.": "Graças ao seu tamanho quase invisível, estas maravilhosas ferraduras não dizem quase nada sobre a vaca que as usa. Amigo, inimigo, demônio? Esses sapatos não dão pistas ao observador."
"That's disgusting!": "Isso é nojento!"
"The  rune etchings in this blade were made by Elven masters. It is rare to find these so far from Elven homelands.": "As gravuras rúnicas nesta lâmina foram feitas por mestres élficos. É raro encontrá-los tão longe das terras élficas."
"The \"quality\" in the title refers to the defensive merits, not the fashion statement.": "A “qualidade” no título refere-se aos méritos defensivos, não à declaração de moda."
"The antler-like growth from the head of a pixie.": "O crescimento semelhante a um chifre na cabeça de uma duende."
"The beak of a cockatrice. Just touching it causes your hands to go numb momentarily. Creepy!": "O bico de uma cockatrice. Apenas tocá-lo faz com que suas mãos fiquem dormentes momentaneamente. Repugnante!"
"The beak of a midsized bird.": "O bico de um pássaro de médio porte."
"The beak of a very large turkey.": "O bico de um peru muito grande."
"The best armor ever! Oh, except it rusts easily, squeaks a lot, is hot in the summer and cold in the winter, very uncomfortable, and particularly prone to lightning damage. And also it's not the best armor in terms of armor capacity. But ... but it's not bad.": "A melhor armadura de todas! Ah, exceto que enferruja facilmente, range muito, é quente no verão e frio no inverno, muito desconfortável e particularmente sujeito a danos causados ​​por raios. E também não é a melhor armadura em termos de capacidade de armadura. Mas... mas não é ruim."
"The bile gland of an aktaari. This horrific trophy Is upsetting for aktaari to see.": "A glândula biliar de um aktaari. Este troféu horrível é perturbador para Aktaari ver."
"The bitter smokiness of a forest fire combined with the pleasant aroma of cooking meat.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "O fumo amargo de um incêndio florestal combinado com o aroma agradável da carne cozinhada.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"The blade of one who has lost graces in elvish court and sunken to depraved lows.": "A lâmina de alguém que perdeu as graças na corte élfica e afundou em níveis depravados."
"The bleeding end clotted up fast, so this severed goblin thumb is a little less disgusting than it could be.": "A extremidade sangrenta coagulou rapidamente, então este polegar decepado do goblin é um pouco menos nojento do que poderia ser."
"The bloody forelimb of a rabbit. It smells.": "O maldito membro anterior de um coelho. Cheira."
"The bloody skin of a dirty animal.": "A pele ensanguentada de um animal sujo."
"The bloody skin of a lowly animal.": "A pele ensanguentada de um animal humilde."
"The bloody skin of a majestic animal.": "A pele ensanguentada de um animal majestoso."
"The bloody skin of a mangy animal.": "A pele ensanguentada de um animal sarnento."
"The bloody skin of an amazing animal.": "A pele ensanguentada de um animal incrível."
"The bloody skin of an astounding animal.": "A pele ensanguentada de um animal surpreendente."
"The bloody skin of an average animal.": "A pele ensanguentada de um animal comum."
"The bloody skin of an awesome animal.": "A pele sangrenta de um animal incrível."
"The bloody skin of an impressive animal.": "A pele ensanguentada de um animal impressionante."
"The bloody skin of an incredible animal.": "A pele ensanguentada de um animal incrível."
"The bones of an extinct creature's tail.": "Os ossos da cauda de uma criatura extinta."
"The bow given to Tamoko for his contributions to the townfolk.": "A reverência dada a Tamoko por suas contribuições aos habitantes da cidade."
"The bowels of a dead deer.": "As entranhas de um cervo morto."
"The brain of a deceased demonic Behemoth, of the Lesser variety.": "O cérebro de um Behemoth demoníaco falecido, da variedade Menor."
"The brain of a deceased demonic Behemoth.": "O cérebro de um Behemoth demoníaco falecido."
"The brain of a demon soldier.": "O cérebro de um soldado demônio."
"The brain of a demonic Justiciar. It shocks you every time you handle it.": "O cérebro de um juiz demoníaco. Isso te choca toda vez que você lida com isso."
"The brain of a demonic Overseer. It is hot to the touch, and still pulsating.": "O cérebro de um Supervisor demoníaco. Está quente ao toque e ainda pulsante."
"The brain of a swarmer demon.": "O cérebro de um demônio enxameador."
"The brain of an ordinary animal that has been corrupted by demonic energy.": "O cérebro de um animal comum que foi corrompido pela energia demoníaca."
"The breastplate features a perfectly preserved Giant Snail shell.": "O peitoral apresenta uma concha de Caracol Gigante perfeitamente preservada."
"The broken-off tip of a fire wand. While it's now completely inert, it may still be a useful study aid for mages.": "A ponta quebrada de uma varinha de fogo. Embora agora esteja completamente inerte, ainda pode ser um auxílio de estudo útil para magos."
"The broken-off tip of a lightning wand. While it's now completely inert, it may still be a useful study aid for mages.": "A ponta quebrada de uma varinha relâmpago. Embora agora esteja completamente inerte, ainda pode ser um auxílio de estudo útil para magos."
"The broken-off tip of an ice wand. While it's now completely inert, it may still be a useful study aid for mages.": "A ponta quebrada de uma varinha de gelo. Embora agora esteja completamente inerte, ainda pode ser um auxílio de estudo útil para magos."
"The broken-off wing of a dead fairy. Broken fairy wings are a horrific, nauseating sight to other fairies.": "A asa quebrada de uma fada morta. Asas de fada quebradas são uma visão horrível e nauseante para outras fadas."
"The brutish barbarians known as the 'McNasty clan' are known for their fearlessness almost as much as for their malodorous grooming habits. These crude metal pants are certainly not clean. But they are strong.": "Os bárbaros brutais conhecidos como o “clã McNasty” são conhecidos por seu destemor quase tanto quanto por seus maus hábitos de higiene. Essas calças de metal bruto certamente não estão limpas. Mas eles são fortes."
"The canines of a canine.": "Os caninos de um canino."
"The captain of the Wintertide's secret recipe. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "A receita secreta do capitão da Maré de Inverno. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"The classic human dish.": "O clássico prato humano."
"The claw of a bear that grew up around too much magic.": "A garra de um urso que cresceu em torno de muita magia."
"The confident taste of yellow perch is complimented by perfect vinegar.": "O sabor confiante da perca amarela é complementado pelo vinagre perfeito."
"The cork came out of this bottle of blade poison and the liquid inside froze. It doesn't look useful as a weapon anymore, although it could still make fish sick.": "A rolha saiu desta garrafa de veneno para lâminas e o líquido dentro dela congelou. Não parece mais útil como arma, embora ainda possa deixar os peixes doentes."
"The craftsmanship of these gloves is adequate, but the material is poor, resulting in a functional pair of gloves that aren't much fun to wear.": "O acabamento dessas luvas é adequado, mas o material é pobre, resultando em um par de luvas funcionais que não são muito divertidas de usar."
"The creator of this beaker designed it around what he thought dwarves would use in combat. He was utterly wrong in every way, but the beaker is still pretty powerful.": "O criador deste copo o projetou em torno do que ele achava que os anões usariam em combate. Ele estava completamente errado em todos os sentidos, mas o copo ainda é bastante poderoso."
"The creator of this staff obviously had a lot of experience in making these. Largely metal-clad, but just the right amount of give from the wood. (This staff will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.)": "O criador desta equipe obviamente tinha muita experiência em fazer isso. Em grande parte revestido de metal, mas com a quantidade certa de elasticidade da madeira. (Este cajado funcionará bem para Staff Fighting, mas não possui as runas necessárias para funcionar para Fire Magic.)"
"The creator of this staff obviously had a lot of experience in making these. Largely metal-clad, but just the right amount of give from the wood. The Fire Magic Runes were burned in, and glow with comforting warmth when used.": "O criador desta equipe obviamente tinha muita experiência em fazer isso. Em grande parte revestido de metal, mas com a quantidade certa de elasticidade da madeira. As Runas Mágicas de Fogo foram queimadas e brilham com um calor reconfortante quando usadas."
"The creepy orcish mages known as Mutterers sometimes use weapons like this, designed to bleed the enemy.": "Os assustadores magos orcs conhecidos como Mutterers às vezes usam armas como essa, projetadas para sangrar o inimigo."
"The custom-tailored weapon of a mighty Ranalon Guardian captain.
Note: this weapon is considered a Staff.": "A arma personalizada de um poderoso capitão Guardião Ranalon.
Nota: esta arma é considerada um Cajado."
"The customized scorpiclaw boots of the dread Onkara general. They fit a little better than normal.": "As botas personalizadas do terrível general Onkara. Eles se encaixam um pouco melhor que o normal."
"The damaged remains of an intellect-enhancement helmet.": "Os restos danificados de um capacete de aprimoramento do intelecto."
"The desiccated remains of a small animal that was caught and partially digested by a carnivorous plant or giant spider or something horrible like that.": "Os restos dessecados de um pequeno animal que foi capturado e parcialmente digerido por uma planta carnívora ou aranha gigante ou algo horrível assim."
"The dismembered claw of a demonic beast. Dangerous to the touch.": "A garra desmembrada de uma fera demoníaca. Perigoso ao toque."
"The dismembered paw of a large bear.": "A pata desmembrada de um grande urso."
"The Dwarven Stalwarts were hammer-lovers to a fault, and these thick gauntlets were engineered with hammers in mind.": "Os Anões Stalwarts eram extremamente amantes de martelos, e essas manoplas grossas foram projetadas com martelos em mente."
"The elite Stalwarts used this sort of shield, embossed with protective sigils and a symbol of Arisetsu. It's hard to find fault with the design, except that it's super heavy.": "Os Stalwarts de elite usavam esse tipo de escudo, gravado com sigilos protetores e um símbolo de Arisetsu. É difícil encontrar falhas no design, exceto que é super pesado."
"The elven lily provides a base scent for this candle, and the bitter-cold winterhue flower accentuates it.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "O lírio élfico fornece um perfume base para esta vela, e a flor de inverno frio intenso o acentua.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"The elven shock-poet Zini's famous work about how humankind might go extinct due to their prudishness, but will be saved by kind and promiscuous elves. It has a <i>lot</i> of depraved imagery, but also plenty of clever rhymes. A good gift for poetry lovers and those who appreciate a good porno. But not a good gift for especially uptight (or racist) Humans.": "O famoso trabalho do poeta élfico Zini sobre como a humanidade pode ser extinta devido ao seu pudor, mas será salva por elfos gentis e promíscuos. Tem muitas imagens depravadas, mas também muitas rimas inteligentes. Um bom presente para os amantes da poesia e para quem aprecia um bom pornô. Mas não é um bom presente para humanos especialmente tensos (ou racistas)."
"The elves of Sedgewick Forest use shields like this for some reason.": "Os elfos da Floresta Sedgewick usam escudos como este por algum motivo."
"The enchanted and ground-up pineal glands of intelligent creatures, in a sweet syrupy liquid.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes, em um líquido doce e xaroposo."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with a secret catalyst for added effect.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes, misturadas com um catalisador secreto para efeito adicional."
"The enchanted and ground-up pineal glands of intelligent creatures. No syrup added, just pure pineal juice.": "As glândulas pineais encantadas e trituradas de criaturas inteligentes. Sem adição de xarope, apenas suco pineal puro."
"The end of a basilisk's tail, said to be a potent natural magic source.": "A ponta da cauda de um basilisco, considerada uma poderosa fonte de magia natural."
"The end of a manticore's tail, with the venom sack intact.": "A ponta da cauda de uma manticora, com o saco de veneno intacto."
"The epitome of mass-produced shielding.": "O epítome da blindagem produzida em massa."
"The essence of a demon. If you hold it in your hand, you can hear a quiet scream that nobody else can.": "A essência de um demônio. Se você segurá-lo na mão, poderá ouvir um grito baixo que ninguém mais consegue."
"The evil creature Ciervos wore these for thousands of years. Must be lucky! Hmm, but he died wearing them. Maybe they're unlucky...": "A criatura maligna Ciervos usou isso por milhares de anos. Deve ter sorte! Hmm, mas ele morreu usando-os. Talvez eles tenham azar..."
"The evil necromancer/mentalist wore these comfy booties whenever he destroyed towns or villages.": "O malvado necromante/mentalista usava essas botas confortáveis ​​sempre que destruía cidades ou vilas."
"The face of a big snail has been made into a makeshift helmet.": "O rosto de um grande caracol foi transformado em um capacete improvisado."
"The famous children's poem about Mort, the undead skeleton, who ultimately kills everyone he ever loved in life.

It's famous because the Council once declared it mandatory reading for all children at age 4. However, the sheer amount of crying and misery it caused eventually got them to relent.": "O famoso poema infantil sobre Mort, o esqueleto morto-vivo, que acaba matando todos que amou na vida.

É famoso porque o Conselho certa vez declarou que era leitura obrigatória para todas as crianças aos 4 anos. No entanto, a enorme quantidade de choro e sofrimento que causou acabou fazendo com que cedessem."
"The favored close-quarters weapon of orcish archers.": "A arma de combate corpo a corpo favorita dos arqueiros orcs."
"The fibrous and smelly heart of a spriggan plant.": "O coração fibroso e fedorento de uma planta spriggan."
"The fifth generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "A quinta geração de uma picareta de mineração orc. Semelhante a uma Picareta de Mineração Orc tradicional, mas com um dispositivo rotacional acelerado para permitir uma melhor mineração por meio de facadas."
"The fin of a large shark. It's supposedly edible.": "A barbatana de um grande tubarão. É supostamente comestível."
"The finest in slave-made head protection.": "O que há de melhor em proteção de cabeça feita por escravos."
"The first volume in a series of travelogues and interviews by the semi-famous mage Reginald.": "O primeiro volume de uma série de diários de viagem e entrevistas do semifamoso mago Reginald."
"The flesh of a rhino, removed perfectly. Suitable for special tasks that specifically require rhino hide.": "A carne de um rinoceronte, perfeitamente removida. Adequado para tarefas especiais que requerem especificamente pele de rinoceronte."
"The fleshy part of a fungus-man's hand, worn as a glove.": "A parte carnuda da mão de um homem-fungo, usada como luva."
"The florid smell of rotting mushroom gives this potion that special something.": "O cheiro florido de cogumelo podre dá a esta poção algo especial."
"The Flower Child liked to lovingly poke people with this dainty stick.": "A Criança Flor gostava de cutucar as pessoas carinhosamente com esse bastão delicado."
"The fourth generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "A quarta geração de uma picareta de mineração de origem orc. Semelhante a uma Picareta de Mineração Orc tradicional, mas com um dispositivo rotacional acelerado para permitir uma melhor mineração por meio de facadas."
"The freakish orcish spellcasters known as Mutterers use these ornate blades to enhance their spells.": "Os bizarros conjuradores orcs conhecidos como Mutterers usam essas lâminas ornamentadas para aprimorar seus feitiços."
"The freshest greens topped with nuts and the sweet flesh of the evu fruit.": "As verduras mais frescas cobertas com nozes e a polpa doce da fruta evu."
"The fretboard is reinforced with steel to keep it from breaking at an inopportune moment.": "O braço da guitarra é reforçado com aço para evitar que se quebre em momentos inoportunos."
"The fungal core of a myconian. It is inedible and has no obvious use, but it somehow <i>feels</i> useful. To somebody.": "O núcleo fúngico de um micônio. Não é comestível e não tem uso óbvio, mas de alguma forma <i>parece</i> útil. Para alguém."
"The general seems to have customized this Scorpiclaw suit to his own strange needs: there's a hidden compartment inside.": "O general parece ter personalizado este traje Scorpiclaw de acordo com suas estranhas necessidades: há um compartimento escondido dentro."
"The giant glowy sack from a dead tentakiller.": "O saco gigante e brilhante de um tentakiller morto."
"The giant stabbing part of a giant stabbing wasp.": "A parte gigante esfaqueadora de uma vespa gigante esfaqueadora."
"The goblin chief Rubgag used these magic slippers to win dancing competitions (which was definitely cheating, or \"Chiefing\", as he called it.).": "O chefe goblin Rubgag usava esses chinelos mágicos para vencer competições de dança (o que era definitivamente uma trapaça, ou \"Chefe\", como ele chamava)."
"The goblin poet Kaghat wrote this twee poem about the supposed \"lost tribe\" of goblins, noble creatures that were more in tune with nature. It's her least-popular work, but it's also so much shorter than her other works that many more copies exist.": "O poeta duende Kaghat escreveu este pequeno poema sobre a suposta \"tribo perdida\" de duendes, criaturas nobres que estavam mais em sintonia com a natureza. É o trabalho menos popular dela, mas também é muito mais curto do que os outros trabalhos e existem muito mais cópias."
"The goblin-trained bear Graz was outfitted with these after he killed one too many overzealous goblin mages. (Only animals can wear these.)": "O urso treinado pelos goblins, Graz, foi equipado com isso depois de matar muitos magos goblins excessivamente zelosos. (Apenas animais podem usá-los.)"
"The grasping device of a deceased construct. These claws can be found in the weirdest places because they're designed to keep holding on even in death. Some people believe they're lucky charms, but otherwise they serve no obvious purpose.": "O dispositivo de preensão de uma construção falecida. Essas garras podem ser encontradas nos lugares mais estranhos porque foram projetadas para resistir mesmo na morte. Algumas pessoas acreditam que são amuletos da sorte, mas por outro lado não têm nenhum propósito óbvio."
"The great alchemists of yore supposedly used flasks like this when they fought in wars. Or perhaps that's just a tale invented to sell flasks.": "Os grandes alquimistas de antigamente supostamente usavam frascos como este quando lutavam em guerras. Ou talvez seja apenas uma história inventada para vender frascos."
"The green flowers of the hop plant. Used in beer brewing.": "As flores verdes da planta do lúpulo. Usado na fabricação de cerveja."
"The greens in this salad are definitely an acquired taste, but the rich mushroom dressing is delicious.": "As verduras desta salada são definitivamente um sabor adquirido, mas o rico molho de cogumelos é delicioso."
"The hacked-off claw of an aktaari. This is a grim trophy that is upsetting for aktaari to see.": "A garra decepada de um Aktaari. Este é um troféu sombrio que é perturbador para Aktaari ver."
"The hacked-off hoof of a pig or boar.": "O casco decepado de um porco ou javali."
"The heart of a demon. While it no longer beats, it still smoulders with some sort of flame.": "O coração de um demônio. Embora não bata mais, ainda arde com algum tipo de chama."
"The heart of a desert-living drakeworm.": "O coração de uma lagarta que vive no deserto."
"The heart of a massive snail.": "O coração de um enorme caracol."
"The height of generic floral scents. Pleasant but forgettable.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "O auge dos aromas florais genéricos. Agradável, mas esquecível.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"The hide of a demonic creature. It's hot to the touch.": "A pele de uma criatura demoníaca. Está quente ao toque."
"The hide of a monstrous creature. It's horrid-looking, yet undeniably pleasant to touch.": "A pele de uma criatura monstruosa. Tem uma aparência horrível, mas inegavelmente agradável de tocar."
"The high attention to detail elevates this headgear beyond mere armor.": "A grande atenção aos detalhes eleva este capacete além da mera armadura."
"The hilt has been worn smooth with use, leaving indentations that make it easier for neophytes to know how to hold it properly.": "O punho ficou liso com o uso, deixando marcas que tornam mais fácil para os neófitos saberem como segurá-lo corretamente."
"The hilt of this magical blade has been coated in tiny gemstones. They almost completely obscure the necromantic symbols on the pommel.": "O punho desta lâmina mágica foi revestido com pequenas pedras preciosas. Eles obscurecem quase completamente os símbolos necromânticos no punho."
"The hired mage Eeaeiikik crafted this ring to channel his fiery blasts.": "O mago contratado Eeaeiikik criou este anel para canalizar suas rajadas de fogo."
"The horn of a deceased unicorn. Alicorns have many medicinal uses, but in the right hooves, they have formidable combat uses as well. This particular alicorn looks like it would fit on a deer's head quite nicely, bonding to the skull and enhancing their abilities.": "O chifre de um unicórnio falecido. Os alicórnios têm muitos usos medicinais, mas com os cascos certos, eles também têm usos formidáveis ​​em combate. Este alicórnio em particular parece caber muito bem na cabeça de um cervo, unindo-se ao crânio e melhorando suas habilidades."
"The horn of a fae rhino.": "O chifre de um rinoceronte fae."
"The horn of a unicorn, enhanced with some sort of dark metal. It looks like it would fit on a deer's head, bonding to the skull and enhancing their abilities.": "O chifre de um unicórnio, reforçado com algum tipo de metal escuro. Parece que caberia na cabeça de um cervo, unindo-se ao crânio e melhorando suas habilidades."
"The humble pork chop taken to a higher level via careful marination.": "A humilde costeleta de porco levada a um nível superior através de uma marinada cuidadosa."
"The invention of a rakshasa alchemist who loved her pet. This flask's magic helps to alert pets when their owner is in danger.": "A invenção de uma alquimista rakshasa que amava seu animal de estimação. A magia deste frasco ajuda a alertar os animais de estimação quando seu dono está em perigo."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care.": "A isolada colônia de elfos da Floresta Sedgewick prefere armaduras desse tipo porque ela os lembra de sua casa em Verta. Foi explicado a eles que ninguém em Verta se veste mais assim, mas eles parecem não se importar."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care. A symbol of Arisetsu is painted onto the front.": "A isolada colônia de elfos da Floresta Sedgewick prefere armaduras desse tipo porque ela os lembra de sua casa em Verta. Foi explicado a eles que ninguém em Verta se veste mais assim, mas eles parecem não se importar. Um símbolo de Arisetsu está pintado na frente."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care. An outdated version of the Symbol of Arisetsu can be found on the front.": "A isolada colônia de elfos da Floresta Sedgewick prefere armaduras desse tipo porque ela os lembra de sua casa em Verta. Foi explicado a eles que ninguém em Verta se veste mais assim, mas eles parecem não se importar. Uma versão desatualizada do Símbolo de Arisetsu pode ser encontrada na frente."
"The ivory tooth of a hippopotamus.": "O dente de marfim de um hipopótamo."
"The key to a goblin equipment chest.": "A chave para um baú de equipamentos goblins."
"The key to a goblin hoard chest, typically one of several keys needed to unlock it.": "A chave para um baú de goblins, normalmente uma das várias chaves necessárias para desbloqueá-lo."
"The label indicates that it's some sort of alchemical byproduct of \"soul darkening\", whatever that is.": "O rótulo indica que é algum tipo de subproduto alquímico do “escurecimento da alma”, seja lá o que for."
"The last pulse of blood from a dying mortal taken by a vampire. These few drops of blood contain a sliver of the victim's soul.": "O último pulso de sangue de um mortal moribundo levado por um vampiro. Estas poucas gotas de sangue contêm um pedaço da alma da vítima."
"The leather in these pants has been been partially transformed into wood bark, which is is profoundly uncomfortable.": "O couro dessas calças foi parcialmente transformado em casca de madeira, o que é profundamente desconfortável."
"The leather in these pants has been been partially transformed into wood bark, which is profoundly uncomfortable.": "O couro dessas calças foi parcialmente transformado em casca de madeira, o que é profundamente desconfortável."
"The legacy is one of rusting quietly in a cave for hundreds of years. A faded symbol of Arisetsu makes the gloves slightly warm to the touch.": "O legado é o de enferrujar silenciosamente em uma caverna por centenas de anos. Um símbolo desbotado de Arisetsu torna as luvas ligeiramente quentes ao toque."
"The lich Khyrulek crafted this wand during her centuries as a living corpse. It works better for the undead, but it's still pretty good for living people. (Not suitable for use as a fighting staff. This only works for fire magic.)": "A lich Khyrulek criou esta varinha durante seus séculos como um cadáver vivo. Funciona melhor para os mortos-vivos, mas ainda é muito bom para pessoas vivas. (Não é adequado para uso como bastão de combate. Isso só funciona para magia de fogo.)"
"The life's work of dwarven blacksmith Jott Battlestar, who claimed it contains a shred of the essence of a star.": "O trabalho da vida do ferreiro anão Jott Battlestar, que afirmou que contém um fragmento da essência de uma estrela."
"The liquid in this cauldron is sure to cause hallucinations and may bring out latent magic effects in unpredictable ways. It's insanely dangerous.

Once deployed, any player can drink from the cauldron. It disappears after five minutes.": "O líquido neste caldeirão certamente causará alucinações e poderá trazer à tona efeitos mágicos latentes de maneiras imprevisíveis. É extremamente perigoso.

Uma vez implantado, qualquer jogador pode beber do caldeirão. Desaparece após cinco minutos."
"The long tongue of a frog-like creature.": "A longa língua de uma criatura parecida com um sapo."
"The lovely aroma of bacon reminds you of how tasty bacon is.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "O adorável aroma do bacon lembra como o bacon é saboroso.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"The lung of a newly-sacrificied mega scray. (NOTE: not yet implemented; does nothing!)": "O pulmão de um mega scray recém-sacrificado. (NOTA: ainda não implementado; não faz nada!)"
"The mandible of a giant insect or arthropod.": "A mandíbula de um inseto gigante ou artrópode."
"The mandibles from a particularly nasty insect.": "As mandíbulas de um inseto particularmente desagradável."
"The meat of a large-sized rabbit. (Use in Cheap Meat recipes.)": "A carne de um coelho grande. (Use em receitas de carne barata.)"
"The medallion is engraved with a pirate ship, the symbol of the goblin god Remga.": "O medalhão está gravado com um navio pirata, o símbolo do deus duende Remga."
"The metal is always freezing cold, but you'll soon become numb to such trivial irritations.": "O metal está sempre gelado, mas você logo ficará insensível a essas irritações triviais."
"The most complex kind of bait that can be used with angling.": "O tipo de isca mais complexo que pode ser usado na pesca."
"The nails are too long for the deer's small hooves, causing considerable pain while wearing.": "As unhas são muito longas para os pequenos cascos do cervo, causando dor considerável durante o uso."
"The next 10 critical-hits that you would suffer from arthropods of any type instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria com artrópodes de qualquer tipo se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from bears or canines instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de ursos ou caninos se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from cats or rodents instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de gatos ou roedores se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from dwarves or cronekin instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de anões ou cronekins se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from elementals and constructs instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de elementais e construções se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from elves or fairies instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de elfos ou fadas se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from fish, snails, reptiles, or dinosaurs instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de peixes, caracóis, répteis ou dinossauros tornam-se ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from giants or aberrations instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de gigantes ou aberrações se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from goblinkin instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria com o goblinkin se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from plants or fungus instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de plantas ou fungos se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from rakshasa and demons instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de rakshasa e demônios se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from undead and incorporeal creatures instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de mortos-vivos e criaturas incorpóreas se tornariam ataques regulares. Dura até 30 minutos"
"The next 10 critical-hits that you would suffer from ungulates of any type instead become regular attacks. Lasts up to 30 minutes": "Os próximos 10 acertos críticos que você sofreria de ungulados de qualquer tipo se tornariam ataques regulares. Dura até 30 minutos"
"The next critical-hit that you would suffer instead becomes a regular attack. Lasts up to 5 minutes": "O próximo acerto crítico que você sofreria se tornaria um ataque normal. Dura até 5 minutos"
"The not-quite-dead remains of an ooze. It's mainly used as an ingredient in other potions, but it does have a healing effect when drunk -- assuming you have the gastronomic experience to tolerate the flavor without vomiting.": "Os restos não totalmente mortos de uma lama. É usado principalmente como ingrediente em outras poções, mas tem um efeito curativo quando bebido - desde que você tenha experiência gastronômica para tolerar o sabor sem vomitar."
"The Onkara leader claimed to wear this mask even when resting, often saying that a true warrior could never be unprepared.": "O líder Onkara afirmou usar esta máscara mesmo quando descansava, muitas vezes dizendo que um verdadeiro guerreiro nunca poderia estar despreparado."
"The original Fatestick was created in a bygone age by Jessandra the Cruel, who used it to save an orphanage from frost bees. Afterwards she declared that the staff had somehow tricked her into being kind and discarded it.": "O Fatestick original foi criado em uma época passada por Jessandra, a Cruel, que o usou para salvar um orfanato das abelhas congeladas. Depois ela declarou que a equipe de alguma forma a enganou para que fosse gentil e descartou o convite."
"The padding is worn through in all the right places, making it easy to fight in these disgusting gloves.": "O acolchoamento está desgastado em todos os lugares certos, facilitando a luta com essas luvas nojentas."
"The painting is a student effort by an untrained hand, but the frame is quite lovely.": "A pintura é um esforço de estudante feito por uma mão não treinada, mas a moldura é linda."
"The patterns are hypnotic if you stare into it. It's hot to the touch.": "Os padrões são hipnóticos se você olhar para eles. Está quente ao toque."
"The perfect hat for goblin chiefs: it has protection from loud noise, a secret compartment to stash your bribe money, and extra weight to make your headbutts really impressive.": "O chapéu perfeito para chefes goblins: tem proteção contra ruídos altos, um compartimento secreto para guardar o dinheiro do suborno e peso extra para deixar suas cabeçadas realmente impressionantes."
"The perfect refreshment after desert exertion. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "O refresco perfeito após o esforço no deserto. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"The perfect seasonings make cat meat not just palatable, but actually tasty.": "Os temperos perfeitos tornam a carne de gato não apenas saborosa, mas realmente saborosa."
"The perfectly-removed hide of a goat.": "A pele perfeitamente removida de uma cabra."
"The perfectly-removed hide of a massive shark. Terrifying!": "A pele perfeitamente removida de um enorme tubarão. Aterrorizante!"
"The perfumed note says, \"W: My love for you grows each night I spend alone. I long to touch you. Your beard, your lips, your... tee hee... meet me tonight behind the kennels. I cannot survive another night without your touch! And don't worry -- the messenger is safe. - E\"": "A nota perfumada diz: \"W: Meu amor por você cresce a cada noite que passo sozinho. Anseio por tocar você. Sua barba, seus lábios, seu... tee hee... encontre-me esta noite atrás dos canis. Não posso sobreviver mais uma noite sem o seu toque! E não se preocupe - o mensageiro está seguro. - E\""
"The pig snout is rubbery and squishy, but the sauce makes it work! Kind of.": "O focinho de porco é emborrachado e mole, mas o molho faz funcionar! Tipo de."
"The pineal gland of an ancient droach.": "A glândula pineal de uma barata antiga."
"The pods are too spicy to eat raw, but the powder scraped from them is a valuable spice for cooking.": "As vagens são muito picantes para serem comidas cruas, mas o pó raspado delas é um tempero valioso para cozinhar."
"The poison-injecting apparatus of a giant bee.": "O aparelho de injeção de veneno de uma abelha gigante."
"The preferred armor of goblin tribes on serious budget crunches.": "A armadura preferida das tribos goblins em sérias crises orçamentárias."
"The preferred blade of elvish courtesans in non-elvish lands, this sneaky knife can be concealed almost anywhere. The hilt has symbols of Arisetsu and Errana.": "A lâmina preferida das cortesãs élficas em terras não élficas, esta faca sorrateira pode ser escondida em quase qualquer lugar. O punho contém símbolos de Arisetsu e Errana."
"The preferred punching thingy of elven bullies.": "O soco preferido dos valentões élficos."
"The preferred style of orcish armor for front-line fighters.": "O estilo preferido de armadura orc para combatentes da linha de frente."
"The premier choice for those who work the land daily. Strong stitching, and none of that annoying \"attractiveness\" to get in the way.": "A primeira escolha para quem trabalha diariamente a terra. Costura forte, e nada daquela “atratividade” chata para atrapalhar."
