"A plantable pea plant.": "Uma planta de ervilha plantável."
"A plantable potato seedling. So easy that anyone can plant it!": "Uma muda de batata plantável. Tão fácil que qualquer um pode plantar!"
"A plantable pumpkin seedling.": "Uma muda de abóbora plantável."
"A plantable squash seedling.": "Uma muda de abóbora plantável."
"A plantable tomato seedling.": "Uma muda de tomate plantável."
"A plate-like protrusion from a carnivine.": "Uma saliência em forma de placa de uma carnivina."
"A pleasant baked dish with odds and ends.": "Um prato assado agradável com bugigangas."
"A pleasant beer that strongly takes on the characteristics of its flavoring ingredients.": "Uma cerveja agradável que assume fortemente as características dos seus ingredientes aromatizantes."
"A pleasant biscuit with a rustic, nutty flavor.": "Um biscoito agradável com sabor rústico a nozes."
"A pleasant cold beverage. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma bebida gelada e agradável. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A pleasant dessert wine.": "Um agradável vinho de sobremesa."
"A pleasant hard cheese that's favored by elves.

Cheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo duro e agradável, preferido pelos elfos.

Tipo de queijo: Duro (Este é um lanche. Os lanches se acumulam com os alimentos da refeição; você pode comer um de cada e obter os benefícios de ambos.)"
"A pleasant odor reminiscent of burning hickory, but backed by acrid smoke.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um odor agradável que lembra nogueira queimada, mas acompanhado de fumaça acre.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A pleasant portrayal of an inn in an idyllic setting, signed by Samantha Tallow.": "Um agradável retrato de uma pousada em um cenário idílico, assinado por Samantha Tallow."
"A pleasant smell that evokes the forest without burying you in it.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um cheiro agradável que evoca a floresta sem enterrá-lo nela.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A pleasantly mild semi-hard cheese.

Cheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo semi-duro agradavelmente suave.

Tipo de queijo: Semi-Duro (Este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A pleasantly sweet semi-hard cheese.

Cheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo semiduro agradavelmente doce.

Tipo de queijo: Semi-Duro (Este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A plucked chicken.": "Uma galinha depenada."
"A plucked-out eyeball from a Demon Overseer. If you look directly at it, you can hear it psychically issuing you orders to return it to its owner's head.": "Um globo ocular arrancado de um Supervisor Demônio. Se você olhar diretamente para ele, poderá ouvi-lo emitindo ordens psíquicas para devolvê-lo à cabeça de seu dono."
"A plucked-out eyeball from a Demon Scout. Even in death, it gives you an eerie feeling of being watched.": "Um globo ocular arrancado de um Demon Scout. Mesmo na morte, você tem uma sensação estranha de estar sendo observado."
"A plump ripe guava.": "Uma goiaba madura e rechonchuda."
"A poem written by a loved-one for a deceased family member, following an old Human custom. Since funerals are the only time these Humans ever wrote poetry in their lives, the quality is... not good.": "Um poema escrito por um ente querido para um familiar falecido, seguindo um antigo costume humano. Como os funerais são a única ocasião em que esses Humanos escreveram poesia em suas vidas, a qualidade é... nada boa."
"A pointy weed. (This item can be used in recipes that call for Mixed Greens.)": "Uma erva pontiaguda. (Este item pode ser usado em receitas que pedem Verduras Mistas.)"
"A poisoner's blade that's seen better days.": "A lâmina de um envenenador que já viu dias melhores."
"A ponderous volume wherein an anonymous rakshasa mage explores the idea that the 'old' rakshasa form is somehow still locked within each 'new' rakshasa body. The author posits that certain potions might do the trick, and then explores numerous alchemical hypotheses, none of which pan out too well, but one complex recipe catches your eye.": "Um volume pesado onde um mago rakshasa anônimo explora a ideia de que a 'velha' forma rakshasa ainda está de alguma forma trancada dentro de cada 'novo' corpo rakshasa. O autor postula que certas poções podem resolver o problema e, em seguida, explora inúmeras hipóteses alquímicas, nenhuma das quais dá certo, mas uma receita complexa chama sua atenção."
"A poor piece of clothing,  but it does at least blend into the surroundings well.": "Uma peça de roupa pobre, mas pelo menos combina bem com o ambiente."
"A poor rendition of a dragon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um dragão, coberto de ouro. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a dragon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um dragão, coberto de prata. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a dragon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Uma péssima representação de um dragão. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 5 minutos depois de implantado."
"A poor rendition of a gryphon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um grifo, coberto de ouro. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a gryphon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Uma pobre representação de um grifo, coberto de prata. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 10 minutos depois de implantado."
"A poor rendition of a gryphon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Uma versão pobre de um grifo. Isso não impressionará ninguém, mas fazê-lo foi uma boa prática. Dura 5 minutos depois de implantado."
"A poor-quality bonnet. It's much too embarrassing to wear.": "Um capô de má qualidade. É muito embaraçoso de usar."
"A poorly crafted music box that sounds like a lute for animal forms so they can play music for their plants. This box looks like it is only good for one use before it will break. Don't forget to start it up after you deploy it!
<b>IMPORTANT:</b> You must be in beast form for at least 3 hours of in-game time before you can deploy this item. Leaving beast form after deploying will cause you to lose control of the box. Limit one music box deployment per account at a time.": "Uma caixa de música mal feita que soa como um alaúde para formas animais, para que possam tocar música para suas plantas. Esta caixa parece que só serve para um uso antes de quebrar. Não se esqueça de iniciá-lo depois de implantá-lo!
<b>IMPORTANTE:</b> Você deve estar na forma de besta por pelo menos 3 horas de jogo antes de poder implantar este item. Sair da forma de besta após a implantação fará com que você perca o controle da caixa. Limite a implantação de uma caixa de música por conta por vez."
"A popular orcish drug that overcharges your brainstem. That sounds horrifying, and it kind of is, but this low dose generally has few side-effects.": "Uma droga orc popular que sobrecarrega seu tronco cerebral. Isso parece horrível, e até é, mas essa dose baixa geralmente tem poucos efeitos colaterais."
"A popular orcish drug that overcharges your brainstem. This advanced purified version of the drug is quite strong.": "Uma droga orc popular que sobrecarrega seu tronco cerebral. Esta versão purificada avançada da droga é bastante forte."
"A popular Statehelm beverage for busy individuals who need to focus.": "Uma bebida popular da Statehelm para indivíduos ocupados que precisam se concentrar."
"A popular Statehelm hedge ointment for curing hangovers, which it does a terrible job at. But it does help other sorts of headaches.": "Uma popular pomada Statehelm para curar ressacas, na qual faz um péssimo trabalho. Mas ajuda outros tipos de dores de cabeça."
"A porous sticky cloth that's useful for some basic garments.": "Um pano poroso e pegajoso que é útil para algumas roupas básicas."
"A portrait of a red-robed mage with a trained battle-rat. The mage is crying over a mug of spilled beer. There are no shields present in the picture. (Artist unknown.)": "Um retrato de um mago vestido de vermelho com um rato de batalha treinado. O mago está chorando por causa de uma caneca de cerveja derramada. Não há escudos presentes na imagem. (Artista desconhecido.)"
"A portrait of Khyrulek's young daughter. She's a pale Human child, no more than five years old, and she looks miserable.": "Um retrato da filha de Khyrulek. Ela é uma criança Humana pálida, não tem mais de cinco anos de idade, e parece infeliz."
"A pot-holder to protect your hands when moving a hot kettle.": "Um porta-panelas para proteger as mãos ao mover uma chaleira quente."
"A potent acid for removing inscriptions on items.": "Um ácido potente para remover inscrições em itens."
"A potent chemistry tool -- or weapon. Yeah, let's go with weapon.": "Uma poderosa ferramenta química – ou arma. Sim, vamos com a arma."
"A potent drink that's popular among poor humans of the Crone Hegemony. (Actual Crones drink much higher-quality stuff.) This can warm you up on a cold day! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma bebida potente que é popular entre os humanos pobres da Hegemonia Crone. (As Crones reais bebem coisas de qualidade muito superior.) Isso pode aquecê-lo em um dia frio! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A potent dwarven rune.": "Uma poderosa runa anã."
"A potent floral scent that features red roses plucked at the height of their crimson yearning. Or so it smells.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um potente aroma floral que apresenta rosas vermelhas colhidas no auge do seu desejo carmesim. Ou então cheira.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A potent mixture of magical blood.": "Uma potente mistura de sangue mágico."
"A potent weapon used by Leafmasters, Stormmasters, and other guardians of elven society.": "Uma arma potente usada por Leafmasters, Stormmasters e outros guardiões da sociedade élfica."
"A potentially edible mushroom.": "Um cogumelo potencialmente comestível."
"A powerful flavor used by master chefs.": "Um sabor poderoso usado por master chefs."
"A powerful pick-me-up for rabbits in danger.": "Um poderoso estimulante para coelhos em perigo."
"A practice tool used by bards during their studies.": "Uma ferramenta prática usada pelos bardos durante seus estudos."
"A prefectly-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma picareta de mineração orc feita com perfeição. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A pretty basic fish meal. Does it really matter what fish is in it?": "Uma refeição de peixe bastante básica. Realmente importa que peixe contém?"
