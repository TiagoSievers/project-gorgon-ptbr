"A delicious seasonal tea. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um delicioso chá sazonal. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious seasonal wine.": "Um delicioso vinho sazonal."
"A delicious slab of meat.": "Um delicioso pedaço de carne."
"A delicious snack food. It's ... some sort of meat... drenched in a sweet sauce and wrapped in dough. Selaxi refuses to part with the recipe. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um delicioso lanche. É... uma espécie de carne... embebida em molho doce e embrulhada em massa. Selaxi se recusa a desistir da receita. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious snack from the Red Wing Casino. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um delicioso lanche do Red Wing Casino. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious treat: a banana shallow-fried in sugary butter.": "Uma delícia: uma banana frita em manteiga açucarada."
"A delicious treat: a banana shallow-fried in sugary butter. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma delícia: uma banana frita em manteiga açucarada. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious vegetarian goblin dish of corn, red pepper, and spices.": "Um delicioso prato vegetariano de duendes com milho, pimenta vermelha e especiarias."
"A delicious, if basic, pumpkin pie. It's missing fancy spices! And maybe something to top it with.": "Uma torta de abóbora deliciosa, embora básica. Está faltando temperos sofisticados! E talvez algo para completar."
"A demonic crystal that can be used to repair magical items.": "Um cristal demoníaco que pode ser usado para reparar itens mágicos."
"A demonic crystal with an unusual structure. It doesn't work well for crafting.": "Um cristal demoníaco com uma estrutura incomum. Não funciona bem para artesanato."
"A dense and delicious rye bread with strong hints of beer.": "Um pão de centeio denso e delicioso com fortes notas de cerveja."
"A dense and energizing snack.": "Um lanche denso e energizante."
"A dense and filling food, but entirely unexciting and, well, frankly disappointing.": "Uma comida densa e farta, mas totalmente desinteressante e, francamente, decepcionante."
