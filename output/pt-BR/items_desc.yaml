"For 60 minutes, you gain +10% Burst Accuracy": "Por 60 minutos, você ganha +10% de Precisão de Explosão"
"For 60 minutes, you gain +3 inventory slots.": "Por 60 minutos, você ganha +3 espaços no inventário."
"For 60 minutes, you have +50% Max Body Heat (when in cold environments)": "Por 60 minutos, você tem +50% de Calor Corporal Máximo (quando em ambientes frios)"
"For 60 minutes, you mitigate 1 point of attack damage for every 20 Armor you have remaining, instead of 1 per 25 Armor like normal. (Note: this potion does not stack with Shield-skill equipment that does the same thing.)": "Por 60 minutos, você reduz 1 ponto de dano de ataque para cada 20 de Armadura restantes, em vez de 1 para cada 25 de Armadura como normal. (Observação: esta poção não se acumula com equipamentos da habilidade Escudo que fazem a mesma coisa.)"
"For 60 minutes, your \"Chance to Miraculously Avoid Death\" resets after 10 minutes instead of 15 minutes.": "Por 60 minutos, sua \"Chance de evitar milagrosamente a morte\" é reiniciada após 10 minutos, em vez de 15 minutos."
"For 60 minutes, your Max Body Heat is +30 and you never lose body heat while in combat": "Por 60 minutos, seu Calor Corporal Máximo é +30 e você nunca perde calor corporal durante o combate"
"For 60 minutes, your out-of-combat Sprint Speed is +1": "Por 60 minutos, sua Velocidade de Sprint fora de combate é +1"
"For 60 minutes, your underwater fast-swim speed is +7 and you lose Breath Meter half as quickly while underwater.": "Por 60 minutos, sua velocidade de natação rápida subaquática é +7 e você perde Medidor de Respiração pela metade enquanto está debaixo d’água."
