"Metal pins used mainly in armorsmithing.": "Pinos de metal usados ​​principalmente em armaduras."
"Might as well roast the left-over bits. It doesn't taste awful. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "É melhor assar os pedaços que sobraram. Não tem um gosto horrível. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Mild flaky fish surrounded with bold roasted vegetables.": "Peixe levemente escamoso rodeado de ousados ​​vegetais assados."
"Milky white, this big crystal is useful in magic that relates to 'new beginnings.'

Associated Primary Skill: Lycanthropy": "Branco leitoso, este grande cristal é útil em magia relacionada a 'novos começos'.

Habilidade Primária Associada: Licantropia"
"Milky white, this gem is useful in magic that relates to 'new beginnings.'

Associated Primary Skill: Lycanthropy": "Branca leitosa, esta joia é útil em magia relacionada a 'novos começos'.

Habilidade Primária Associada: Licantropia"
"Milky. Hmm. Turns out that's not really a good thing when it comes to describing potion taste.": "Leitoso. Hum. Acontece que isso não é realmente uma coisa boa quando se trata de descrever o sabor de uma poção."
"Minty fresh yet full of dirt, this creepy vial of fluid will make you better able to manage the growth of plants.": "Fresco e mentolado, mas cheio de sujeira, este frasco de fluido assustador tornará você mais capaz de controlar o crescimento das plantas."
"Mmm, battered and deep-fried. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Mmm, maltratado e frito. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Moderately less embarrassing!": "Moderadamente menos constrangedor!"
"Moist and delicious - and pretty healthy.": "Úmido e delicioso - e muito saudável."
"Moku's delicious house sushi.": "O delicioso sushi da casa do Moku."
"Moonspelt ground into flour for cooking.": "Moonspelt moído em farinha para cozinhar."
"More ornate than most orcish armor, this helm is worn with pride by countless elite orcs.": "Mais ornamentado do que a maioria das armaduras orcs, este elmo é usado com orgulho por incontáveis ​​orcs de elite."
"Most are nondescript, but a few have streaks of quartz.": "A maioria é indefinida, mas alguns apresentam listras de quartzo."
"Most people can't tell that this does anything at all. But it does have magic. Just not very good magic.": "A maioria das pessoas não consegue perceber que isso faz alguma coisa. Mas tem magia. Apenas não é uma magia muito boa."
"Mu asked you to deliver this to a Myconian named Poe.": "Mu pediu que você entregasse isto a um Myconiano chamado Poe."
"Mutton marinaded in fresh-squeezed cranberry juice. Mmm.": "Carneiro marinado em suco de cranberry espremido na hora. Hum."
"Mystery meat that has been cooked alive to perfection. It makes a tasty snack.": "Carne misteriosa que foi cozinhada viva com perfeição. Faz um lanche saboroso."
"Mystically attuned to your inventory-management needs.": "Misticamente sintonizado com suas necessidades de gerenciamento de estoque."
"Named after a dwarven children's folk hero, this hammer's weighting is very odd. But quite powerful when you get the hang of it.": "Nomeado em homenagem a um herói popular infantil anão, o peso deste martelo é muito estranho. Mas bastante poderoso quando você pega o jeito."
"Named after a famous shield that was reluctantly given by Ormorek,the  god of bitterness, to his chosen champion during the Rebuke.": "Nomeado em homenagem a um famoso escudo que foi relutantemente dado por Ormorek, o deus da amargura, ao seu campeão escolhido durante a Repreensão."
"Named after a legendary werewolf who supposedly designed this style of footwear, these shoes fall off cleanly when a lycanthrope transforms, avoiding embarrassing trip-and-fall accidents in the heat of battle. A symbol of Arisetsu is carefully embroidered into the left shoe.": "Nomeados em homenagem a um lobisomem lendário que supostamente projetou esse estilo de calçado, esses sapatos caem perfeitamente quando um licantropo se transforma, evitando acidentes embaraçosos de tropeços e quedas no calor da batalha. Um símbolo de Arisetsu é cuidadosamente bordado no sapato esquerdo."
"Named by a bard who was having a bad day, this jaunty hat is actually pretty despair-free. A symbol of Arisetsu was added as a tassle by a later owner.": "Nomeado por um bardo que estava tendo um dia ruim, este chapéu alegre é, na verdade, bastante livre de desespero. Um símbolo de Arisetsu foi adicionado como uma borla por um proprietário posterior."
"Named for the god of knowledge, this potion lets you see a few seconds into the future! It is permanent, however, and some scribes of Imatia have been driven insane by what they see.": "Nomeada em homenagem ao deus do conhecimento, esta poção permite que você veja alguns segundos no futuro! É permanente, porém, e alguns escribas de Imatia ficaram loucos com o que viram."
"Naturally svelte with every movement, these pants highlight the surprising suppleness of leather.": "Naturalmente esbeltas a cada movimento, estas calças realçam a surpreendente flexibilidade do couro."
"Nearly charcoal but technically edible, this comes from some sort of beast.": "Quase carvão, mas tecnicamente comestível, vem de algum tipo de animal."
"Neat!": "Organizado!"
"Nice cow shoes!": "Belos sapatos de vaca!"
"Nice deer shoes!": "Belos sapatos de veado!"
"Nice goblin craftsmanship. Well, goblin oversight of slave craftsmanship, which is the same thing.": "Belo artesanato de goblin. Bem, a supervisão dos goblins sobre o artesanato escravo, que é a mesma coisa."
"Nice greaves. Vaguely stylish yet vaguely protective.": "Belos torresmos. Vagamente elegante, mas vagamente protetor."
"Nice horseshoes for nice horses.": "Belas ferraduras para bons cavalos."
"Nice saddle.": "Bela sela."
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. (This will work for Staff Fighting but not Fire Magic abilities.)": "Sem palavras. Basta girar este bastão algumas vezes e você perceberá que sua beleza supera a linguagem falada. (Isso funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. The Fire Magic and Priest runes are a masterpiece of calligraphy, too.": "Sem palavras. Basta girar este bastão algumas vezes e você perceberá que sua beleza supera a linguagem falada. As runas Fire Magic e Priest também são uma obra-prima da caligrafia."
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. The Fire Magic runes are a masterpiece of calligraphy, too.": "Sem palavras. Basta girar este bastão algumas vezes e você perceberá que sua beleza supera a linguagem falada. As runas Fire Magic também são uma obra-prima da caligrafia."
"Nobody out-clubs this club!": "Ninguém supera este clube!"
"Normally to a novice, a horseshoe is just a horseshoe. But anyone can tell that this is an incredible horseshoe. It feels special.": "Normalmente, para um novato, uma ferradura é apenas uma ferradura. Mas qualquer um pode dizer que esta é uma ferradura incrível. Parece especial."
"Not bad. You wouldn't even be embarrassed to be seen in these nice pants. Unless you were seen by someone you wanted to impress.": "Nada mal. Você nem teria vergonha de ser visto com essas calças lindas. A menos que você tenha sido visto por alguém que queria impressionar."
"Not content with the sweetness of ordinary bananas, trolls created this. It has interesting notes of complexity that make the sweetness a bit more palatable. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Não satisfeitos com a doçura das bananas comuns, os trolls criaram isso. Possui interessantes notas de complexidade que tornam a doçura um pouco mais palatável. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Not edible by themselves, but useful in recipes.": "Não são comestíveis por si só, mas são úteis em receitas."
"Not exactly formalwear, but not humiliating either.": "Não é exatamente uma roupa formal, mas também não é humilhante."
"Not generally considered a good choice, shodding a cow with bits of wood. These crude shoes are... crude.": "Geralmente não é considerada uma boa escolha ferrar uma vaca com pedaços de madeira. Esses sapatos grosseiros são... grosseiros."
"Not generally considered a good choice, shodding a deer with bits of wood. These crude shoes are... crude.": "Geralmente não é considerada uma boa escolha calçar um cervo com pedaços de madeira. Esses sapatos grosseiros são... grosseiros."
"Not great for splashing people, but pretty good for delivering healing concoctions.": "Não é ótimo para espirrar nas pessoas, mas é muito bom para fornecer misturas curativas."
"Not inspired, but quite pleasant to look at, this abstract piece would look good hanging in a Council official's office. It lends a little class to any room it's in.": "Não inspirada, mas bastante agradável de se ver, esta peça abstrata ficaria bem pendurada no escritório de um funcionário do Conselho. Ele confere um pouco de classe a qualquer ambiente em que esteja."
"Not just strong and comfortable, but fashionable too.": "Não apenas forte e confortável, mas também moderno."
"Not many yetis use shields, but they aren't terrible. This one is made of super-thick wood that's been reinforced with pounds of spider silk.": "Poucos Yetis usam escudos, mas eles não são terríveis. Este é feito de madeira super grossa reforçada com quilos de seda de aranha."
"Not nice to look at, but its got it where it counts. Which is to say the chest region.": "Não é bonito de se ver, mas está onde é importante. O que quer dizer a região do peito."
"Not really berries at all, these are actually seed cones with some bitter mushy stuff on the end. Useful as a spice and flavoring in brewing.": "Na verdade, não são frutas vermelhas, na verdade são cones de sementes com um pouco de coisa amarga e pastosa no final. Útil como tempero e aromatizante na fabricação de cerveja."
"Not really that comfortable unless you're in a blizzard, but then they are really cozy.": "Não é tão confortável, a menos que você esteja em uma nevasca, mas eles são muito aconchegantes."
"Notes from Fransesca Muradrake on how best to use the ritual spot in Statehelm's graveyard.": "Notas de Fransesca Muradrake sobre a melhor forma de usar o local ritual no cemitério de Statehelm."
"Nothing better than roasted veggies for a cold fall afternoon. Or any other time, really. ": "Nada melhor do que vegetais assados ​​para uma tarde fria de outono. Ou em qualquer outro momento, na verdade."
"Oak chips for smoking fish and meat.": "Lascas de carvalho para defumar peixe e carne."
"Oats ground into a powder, ready for cooking.": "Aveia moída em pó, pronta para cozinhar."
"Obtained from a human named Nelson Ballard. It's not in the best condition, but it has been powerfully enchanted.": "Obtido de um humano chamado Nelson Ballard. Não está nas melhores condições, mas foi poderosamente encantado."
"Obtained from a human named Tyler, this shield seems to have been well-maintained.": "Obtido de um humano chamado Tyler, este escudo parece ter sido bem conservado."
"Oddly shaped and weirdly smelly.": "De formato estranho e com um cheiro esquisito."
"Oddly warm to the touch, even in cold weather, these makeshift Summer Court gloves protect from frostbite.": "Estranhamente quentes ao toque, mesmo em tempo frio, estas luvas improvisadas Summer Court protegem contra congelamento."
"Oh... yuck.": "Ah... eca."
"Old-fashioned elven armor from the age of Romast, thousands of years ago.": "Armadura élfica antiquada da era de Romast, milhares de anos atrás."
"Once a fine weapon, this bow has been mistreated for a very long time. It still shoots arrows, though.": "Outrora uma excelente arma, este arco foi maltratado por muito tempo. Ele ainda atira flechas, no entanto."
"Once used by ratkin guerillas, these cowls were later repurposed for cheese-storage, then un-purposed for that and re-repurposed as armor. As a result they smell a lot like cheese, which the ratkin consider a feature.": "Uma vez usados ​​​​por guerrilheiros ratkin, esses capuzes foram posteriormente reaproveitados para armazenamento de queijo, depois descartados para isso e reaproveitados como armadura. Como resultado, eles cheiram muito a queijo, o que os ratkin consideram uma característica."
"Once worn by Makopa the semi-legendary goblin boss.": "Uma vez usado por Makopa, o semi-lendário chefe goblin."
"One of the few \"Povus Special\" weapons actually made in Povus. It has classic Deftwhisper styling.": "Uma das poucas armas \"Povus Special\" realmente fabricadas em Povus. Possui estilo clássico Deftwhisper."
"One of the rings of sharp teeth found in the \"mouth\" of a hexapus.": "Um dos anéis de dentes afiados encontrados na “boca” de um hexapo."
"One of the spikes from the back of a demonic Osslar.": "Uma das pontas das costas de um demoníaco Osslar."
"One year after issuance, the upstanding citizen bearing this document may redeem it at the Statehelm Bank.": "Um ano após a emissão, o cidadão íntegro portador deste documento poderá resgatá-lo no Banco Statehelm."
"Only the best trollish crafters can claim the title of Archtroll and create Archcudgels. These weapons are deadly works of art.": "Somente os melhores artesãos trolls podem reivindicar o título de Archtroll e criar Archcudgels. Estas armas são obras de arte mortais."
"Only true connoisseurs realize that this sublimely delicious candy cane far exceeds its mint-addled cousins.": "Somente os verdadeiros conhecedores percebem que esta bengala doce sublimemente deliciosa excede em muito seus primos com menta."
"Orange and pointy. Yup, it's a carrot.": "Laranja e pontudo. Sim, é uma cenoura."
"Orcs are known for many things, and big-ass swords is one of those things.": "Orcs são conhecidos por muitas coisas, e espadas grandes são uma dessas coisas."
"Originally gifted to ratkin guerillas by the Crone Hegemony, these magic boots have been re-soled and re-leathered several times in the intervening years.": "Originalmente oferecidas aos guerrilheiros ratkin pela Hegemonia Crone, essas botas mágicas foram re-soladas e re-couro diversas vezes nos anos seguintes."
"Originally popularized by the terrifying harpy mages known as the Winged Witches.": "Originalmente popularizado pelas terríveis harpias magos conhecidas como Bruxas Aladas."
"Orloaka the goblin sage augmented this staff by filling its hollow core with tears collected from dying unicorns. Unicorns that he burned alive! (They were actually rhinos, not unicorns, though, so the enchantment isn't all that great.)": "Orloaka, o sábio goblin, aumentou esse cajado preenchendo seu núcleo oco com lágrimas coletadas de unicórnios moribundos. Unicórnios que ele queimou vivos! (Na verdade, eles eram rinocerontes, não unicórnios, então o encantamento não é tão bom.)"
"Otis the Ogre once used this in an epic arena battle. But he gave it away after he found a better one.": "Otis, o Ogro, certa vez usou isso em uma batalha épica de arena. Mas ele o deu depois de encontrar um melhor."
"Overcooked and dry, but adequate.": "Cozido demais e seco, mas adequado."
"Oversized gloves were the style hundreds of years ago, which is why these dwarven gauntlets can fit your hands.": "Luvas grandes eram a moda há centenas de anos, e é por isso que essas manoplas anãs cabem em suas mãos."
"Oversized headgear worn by a supernaturally large skeleton. Various runes and a necromancy gem seem to empower it.": "Capacete enorme usado por um esqueleto sobrenaturalmente grande. Várias runas e uma gema de necromancia parecem fortalecê-lo."
"Owned by a once-powerful mage who died choking on a lemon seed. They retain some of Soteric's power but also a traumatic death-memory.": "Propriedade de um mago outrora poderoso que morreu engasgado com uma semente de limão. Eles retêm parte do poder de Soteric, mas também uma memória de morte traumática."
"Pack a snack of amberjack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Prepare um lanche de âmbar! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Packed with flavor, these candies make a wonderful summer treat.": "Repletos de sabor, esses doces são uma delícia maravilhosa de verão."
"Padded chain footwear made by a competent hand.": "Calçado de corrente acolchoada feito por mão competente."
"Padded chain leggings with a nominal attention to detail.": "Leggings de corrente acolchoadas com atenção nominal aos detalhes."
"Painfully hot to the touch, this is designed to facilitate throwing extra-massive fireballs.": "Dolorosamente quente ao toque, foi projetado para facilitar o lançamento de bolas de fogo extra-massivas."
"Pale yellow-green and pretty big.": "Verde-amarelado pálido e bastante grande."
"Pale yellow-green and pretty.": "Verde-amarelado pálido e bonito."
"Pants that aren't quite all there... Weird.": "Calças que não estão todas lá... Estranho."
"Part of a dead wolf's tail.": "Parte da cauda de um lobo morto."
"Part of a specialized toolset for pulling the guts out of a body without making a mess. These are often carried by followers of Tast to show their contempt for death that occurs off the battlefield. (It's hard to explain the symbolism to outsiders.)": "Parte de um conjunto de ferramentas especializado para extrair as entranhas de um corpo sem fazer bagunça. Muitas vezes são carregados por seguidores de Tast para mostrar seu desprezo pela morte que ocorre fora do campo de batalha. (É difícil explicar o simbolismo para quem está de fora.)"
"Part of an abomination. It has an identification mark branded into it. Might be useful to impersonate an abomination... but mostly just junk.": "Parte de uma abominação. Possui uma marca de identificação gravada nele. Pode ser útil para personificar uma abominação... mas principalmente apenas lixo."
"Part of an extinct species of great cat.": "Parte de uma espécie extinta de grande felino."
"Part of an undead skeleton, this bone became so clogged with hatred that it glows with malice! Pretty neat.": "Parte de um esqueleto morto-vivo, este osso ficou tão obstruído pelo ódio que brilha com malícia! Muito legal."
"Part of some self-aware gizmo. It may still be in working order.": "Parte de algum aparelho autoconsciente. Pode ainda estar em condições de funcionamento."
"Part of the ancient uniform of Dwarven Stalwarts, the elite warriors entrusted with protecting the most important Dwarven secrets. Quality-wise, they're very protective, but very uncomfortable.": "Parte do antigo uniforme dos Dwarven Stalwarts, os guerreiros de elite encarregados de proteger os segredos mais importantes dos Anões. Em termos de qualidade, eles são muito protetores, mas muito desconfortáveis."
"Part of the uniform worn on fae ships. The stretchy gloves seem especially designed for precision work.": "Parte do uniforme usado em navios feéricos. As luvas elásticas parecem especialmente projetadas para trabalhos de precisão."
"Parts of a broken sword blade. Looks like it was once an orcish khopesh, but it's not repairable.": "Partes de uma lâmina de espada quebrada. Parece que já foi um khopesh orc, mas não pode ser reparado."
"Peach juice with secret added ingredients. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Suco de pêssego com ingredientes secretos adicionados. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Peeled from the legs of a dead fungus-man, these form-fitting \"leggings\" are made of fungus.": "Descascadas das pernas de um homem-fungo morto, essas \"leggings\" justas são feitas de fungo."
"People won't realize how silly your shirt is, because they won't even notice you're there! Much.": "As pessoas não vão perceber o quão boba é a sua camisa, porque nem vão notar que você está ali! Muito."
"Perfect for hitting enemies and then shooting them with lightning. Much less practical for construction work.": "Perfeito para atingir inimigos e depois atirar neles com raios. Muito menos prático para obras."
"Perfect for making maps, surveys, wills, poetry, you name it.": "Perfeito para fazer mapas, pesquisas, testamentos, poesias, o que quiser."
"Perfect for the pig that wishes it were something else. A symbol of Arisetsu has been hidden inside.": "Perfeito para o porco que gostaria que fosse outra coisa. Um símbolo de Arisetsu está escondido dentro."
"Perfect weighting, professional sigiling, and understated holy symbols combine in this exquisite and versatile staff.": "Ponderação perfeita, sigilo profissional e símbolos sagrados discretos combinam-se nesta equipe requintada e versátil."
"Perfectly removed from a hippo. Suitable for very specific purposes.": "Perfeitamente removido de um hipopótamo. Adequado para fins muito específicos."
"Perfectly removed from a large serpent. Suitable for very specific purposes.": "Perfeitamente removido de uma grande serpente. Adequado para fins muito específicos."
"Perfectly removed from a vicious barghest. Suitable for special tasks that require barghest skin.": "Perfeitamente removido de um barghest cruel. Adequado para tarefas especiais que exigem pele mais brilhante."
"Perfectly removed from a wolf or worg. Suitable for special tasks that require wolf skin.": "Perfeitamente removido de um lobo ou worg. Adequado para tarefas especiais que requerem pele de lobo."
"Perfectly seasoned catfish, with seaweed and rice.": "Bagre perfeitamente temperado, com algas e arroz."
"Perfectly-braised tender human loin in a savory sauce made of elf blood and organs.": "Lombo humano tenro perfeitamente refogado em um molho saboroso feito de sangue e órgãos de elfo."
"Perhaps the best way to eat flounder. The fish is complemented perfectly by the sour lemon, with a bit of heat from the pepper.": "Talvez a melhor maneira de comer linguado. O peixe é complementado na perfeição pelo limão azedo, com um pouco do calor da pimenta."
"Perhaps there's a slimy lock somewhere that this opens? It doesn't look like it will last too long...
<i>[Note: this key does not yet unlock anything.]</i>": "Talvez haja uma fechadura viscosa em algum lugar que isso abra? Não parece que vai durar muito...
<i>[Nota: esta chave ainda não desbloqueia nada.]</i>"
"Periodically creates Sugar": "Periodicamente cria açúcar"
"Perma-frozen grizlark from an unnaturally cold Kuvou. In this form it is inert, so you can handle it easily.": "Cotovia congelada permanentemente de um Kuvou anormalmente frio. Nesta forma é inerte, então você pode manuseá-lo facilmente."
"Phlogiston is used in Transmutation recipes and at Transmutation tables. Phlogiston helps you transmute an item's powers into different powers.": "O flogisto é usado em receitas de transmutação e em tabelas de transmutação. O Flogisto ajuda você a transmutar os poderes de um item em poderes diferentes."
"Picked beets in a secret alpha-development sauce. (This item cannot be crafted. It provides benefits equivalent to a level 25 Meal item, but it has no Gourmand requirement. A normal level 25 Meal requires Gourmand level 10+.)": "Beterrabas colhidas em molho secreto de desenvolvimento alfa. (Este item não pode ser fabricado. Ele fornece benefícios equivalentes a um item de Refeição de nível 25, mas não tem nenhum requisito Gourmand. Uma Refeição normal de nível 25 requer nível Gourmand 10+.)"
"Pickled brain chunks with real bits of apple and just a tinge of dirt.": "Pedaços de cérebro em conserva com pedaços reais de maçã e apenas um toque de sujeira."
"Pieces of chitin and metal are sewn into reinforced webbing to create a suit for spiders.": "Pedaços de quitina e metal são costurados em uma teia reforçada para criar uma fantasia para aranhas."
"Pieces of chitin and scraps of metal are held together with thick webbing. This should make a spider somewhat tougher.": "Pedaços de quitina e restos de metal são mantidos juntos por uma teia grossa. Isso deve tornar a aranha um pouco mais resistente."
"Pieces of chitin and scraps of metal are held together with thick webbing. This would fit on a spider.": "Pedaços de quitina e restos de metal são mantidos juntos por uma teia grossa. Isso caberia em uma aranha."
"Pieces of chitin and strong metal are sewn into reinforced webbing to create a powerful armor suit for spiders.": "Pedaços de quitina e metal forte são costurados em uma teia reforçada para criar uma armadura poderosa para aranhas."
"Pig and sugar belong together.": "Porco e açúcar pertencem um ao outro."
"Pigs drinking this are advised not to think about the ingredients lest they become depressed. And possibly very angry.": "Os porcos que bebem isso são aconselhados a não pensar nos ingredientes, para não ficarem deprimidos. E possivelmente com muita raiva."
"Pigs gain +15 Pig Damage for 30 minutes": "Porcos ganham +15 de Dano de Porco por 30 minutos"
"Pigs gain +35 Pig Damage for 30 minutes": "Porcos ganham +35 de Dano de Porco por 30 minutos"
"Pigs gain +60 Pig Damage for 30 minutes": "Porcos ganham +60 de Dano de Porco por 30 minutos"
"Pillowy potato dumplings in a velvety sauce. The orcish version uses squash as well as other vegetables.": "Bolinhos de batata fofos com molho aveludado. A versão orc usa abóbora e outros vegetais."
"Plants a creepy acorn.": "Planta uma bolota assustadora."
"Pleasant to wear and reasonably protective.": "Agradável de usar e razoavelmente protetor."
"Pleasant, slightly citrusy, but with a distinctive bitterness too. It's said to be the favorite hard liquor of elves, but since elves mostly drink wine, that's not much praise.": "Agradável, levemente cítrico, mas também com um amargor característico. Dizem que é a bebida forte favorita dos elfos, mas como os elfos bebem principalmente vinho, isso não é um grande elogio."
"Pleasantly hot.": "Agradavelmente quente."
"Pleasantly warm.": "Agradavelmente quente."
"Polished and weighted with care and attention to detail.": "Polido e pesado com cuidado e atenção aos detalhes."
"Poor-quality leather has been crudely woven into a fairly repulsive shirt. It's essentially made of garbage.": "Couro de baixa qualidade foi toscamente tecido em uma camisa bastante repulsiva. É essencialmente feito de lixo."
"Poor-quality leather.": "Couro de baixa qualidade."
"Poorly-made chain that fits and protects poorly.": "Corrente mal feita que se ajusta e protege mal."
"Poorly-made chain that fits poorly.": "Corrente mal feita que se ajusta mal."
"Poorly-made chain that has been organized into a semblance of pants.": "Corrente mal feita que foi organizada em uma aparência de calça."
"Poorly-made tack for a horse.": "Arreios mal feitos para um cavalo."
"Pop the top and chug it down for 24 hours of getting down! This foul tasting fizzy liquid will grant you super buffs for 24 hours of real time. This liquid will destablize and evaporate 60 days after it is created, so use it quickly!
Buffs include: Combat & crafting xp. Extra fish, mushrooms, wood, seeds and fruit. Gardening bonus harvest chance. Survey and mining buffs. Training discount. Meal and snack time buffs. Vendor stall discount. NPC workorder bonus. Faster liver recovery.
<b>IMPORTANT!</b>: There is no visible timer on these buffs, so be sure to note the time when you drink this!": "Abra a tampa e beba por 24 horas depois de descer! Este líquido efervescente de sabor desagradável concederá super buffs por 24 horas em tempo real. Este líquido irá desestabilizar e evaporar 60 dias após ser criado, então use-o rapidamente!
Os buffs incluem: XP de combate e artesanato. Peixe extra, cogumelos, madeira, sementes e frutas. Chance de colheita bônus de jardinagem. Fãs de pesquisa e mineração. Desconto em treinamento. Fãs da hora das refeições e lanches. Desconto na barraca do fornecedor. Bônus de ordem de serviço NPC. Recuperação mais rápida do fígado.
<b>IMPORTANTE!</b>: Não há cronômetro visível nesses buffs, então anote o horário em que você bebe isso!"
"Pop the top and chug it down for 48 hours of getting down! This foul tasting fizzy liquid will grant you super buffs for 48 hours of real time. This liquid will destablize and evaporate 60 days after it is created, so use it quickly!
Buffs include: Combat & crafting xp. Extra fish, mushrooms, wood, seeds and fruit. Gardening bonus harvest chance. Survey and mining buffs. Training discount. Meal and snack time buffs. Vendor stall discount. NPC workorder bonus. Faster liver recovery.
<b>IMPORTANT!</b>: There is no visible timer on these buffs, so be sure to note the time when you drink this!": "Abra a tampa e beba por 48 horas depois de descer! Este líquido efervescente de sabor desagradável concederá super buffs por 48 horas em tempo real. Este líquido irá desestabilizar e evaporar 60 dias após ser criado, então use-o rapidamente!
Os buffs incluem: XP de combate e artesanato. Peixe extra, cogumelos, madeira, sementes e frutas. Chance de colheita bônus de jardinagem. Fãs de pesquisa e mineração. Desconto em treinamento. Fãs da hora das refeições e lanches. Desconto na barraca do fornecedor. Bônus de ordem de serviço NPC. Recuperação mais rápida do fígado.
<b>IMPORTANTE!</b>: Não há cronômetro visível nesses buffs, então anote o horário em que você bebe isso!"
"Popular among the guards of the Council, these gloves are lined with lead to protect against mind control. Of course, the lead would be more effective if it was on your head instead of your hands, but nobody really wants a bunch of lead on their head.": "Populares entre os guardas do Conselho, estas luvas são revestidas com chumbo para proteger contra o controle da mente. É claro que o chumbo seria mais eficaz se estivesse na sua cabeça em vez de nas mãos, mas ninguém realmente quer um monte de chumbo na cabeça."
"Popular with elven messengers, these elegant cloth footwraps make your feet move much faster! But they don't protect your feet very well, so you'll need significant endurance to tolerate the numerous stubbed toes and sprained ankles.": "Populares entre os mensageiros élficos, essas elegantes bandagens de tecido fazem seus pés se moverem muito mais rápido! Mas eles não protegem muito bem seus pés, então você precisará de uma resistência significativa para tolerar as inúmeras topadas nos dedos dos pés e torções nos tornozelos."
"Popular with elven messengers, these elegant cloth footwraps make your feet move much faster! But they don't protect your feet very well, so you'll need significant endurance to tolerate the numerous stubbed toes and sprained ankles. This pair was enhanced by Raim of the Crafting Caravan.": "Populares entre os mensageiros élficos, essas elegantes bandagens de tecido fazem seus pés se moverem muito mais rápido! Mas eles não protegem muito bem seus pés, então você precisará de uma resistência significativa para tolerar as inúmeras topadas nos dedos dos pés e torções nos tornozelos. Este par foi aprimorado por Raim da Caravana de Artesanato."
"Popular with silversmiths and salad enthusiasts.": "Popular entre ourives e entusiastas de saladas."
"Pork chops in a delicious sweet sauce.": "Costeletas de porco em um delicioso molho doce."
"Porous cotton that's resistant to heat. Ideal for creating hard cheeses.": "Algodão poroso e resistente ao calor. Ideal para criar queijos duros."
"Porous cotton that's resistant to heat. Ideal for creating mold cheeses that take a long time to ripen.": "Algodão poroso e resistente ao calor. Ideal para criar queijos mofados que demoram muito para amadurecer."
"Porous cotton that's resistant to heat. Ideal for storing fresh bread.": "Algodão poroso e resistente ao calor. Ideal para guardar pão fresco."
"Potion transforms you into a GIGANTIC spider. Permanent until dispelled via UnspiderJuice. For live events only!": "Poção transforma você em uma aranha GIGANTESCA. Permanente até ser dissipado via UnspiderJuice. Apenas para eventos ao vivo!"
"Pound, Pound to Slag, Leaping Smash, Rib Shatter, Reckless Slam, and Seismic Impact deal Piercing damage": "Pound, Pound to Slag, Leaping Smash, Rib Shatter, Reckless Slam e Seismic Impact causam dano perfurante"
"Powdered bone blended with wax and milk into a semi-solid sludge.": "Osso em pó misturado com cera e leite formando uma lama semissólida."
"Powdered bone blended with wrappings into a semi-solid sludge.": "Osso em pó misturado com invólucros formando uma lama semissólida."
"Powdered bone prepared via a secret necromantic ritual. This is used by necromancers to summon undead skeletons.": "Osso em pó preparado através de um ritual necromântico secreto. Isso é usado por necromantes para invocar esqueletos mortos-vivos."
"Powdered brains of psychic creatures, cut with secret and dangerous substances that enhance its effect on psychics.": "Cérebros em pó de criaturas psíquicas, cortados com substâncias secretas e perigosas que aumentam seu efeito sobre os médiuns."
"Powdered brains of psychic creatures. A choice drug for psychics.": "Cérebros em pó de criaturas psíquicas. Uma droga de escolha para médiuns."
"Powdered brains of psychic creatures. A choice drug for psychics. This batch has been enhanced with secret chemicals.": "Cérebros em pó de criaturas psíquicas. Uma droga de escolha para médiuns. Este lote foi aprimorado com produtos químicos secretos."
"Powdered brains of psychic creatures. A choice drug for psychics. This batch is 99% pure frontal cortex.": "Cérebros em pó de criaturas psíquicas. Uma droga de escolha para médiuns. Este lote é 99% de córtex frontal puro."
"Powdered skull dust for use in consecrating items or places. Harukita, the god of Hate, and Kajich, the god of Fear, both appreciate this sort of thing.

(You can turn this special bone-meal into ordinary bone-meal by right-clicking the item.)": "Pó de caveira em pó para uso em itens ou locais consagrados. Harukita, o deus do Ódio, e Kajich, o deus do Medo, apreciam esse tipo de coisa.

(Você pode transformar esta farinha de ossos especial em farinha de ossos comum clicando com o botão direito no item.)"
"Powdered soap. Used with a bucket of water to remove graffiti.": "Sabonete em pó. Usado com um balde de água para remover grafites."
