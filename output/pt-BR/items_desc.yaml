"A pulled-curd cheese with a rubbery but sweet taste.

Cheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo de coalhada com sabor borrachento, mas adocicado.

