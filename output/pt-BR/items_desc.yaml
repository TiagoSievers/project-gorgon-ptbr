"A clump of feathers from a midsized bird.": "Um aglomerado de penas de um pássaro de médio porte."
"A clunky necklace with an attached pouch. Made in response to Povus legging's stereotypical lack of pockets.": "Um colar desajeitado com uma bolsa anexada. Feito em resposta à estereotipada falta de bolsos da legging Povus."
"A coarse variety of whisky that's commonly drunk in the dwarven military.": "Uma variedade grosseira de uísque comumente bebido pelos militares anões."
"A cold piece of magical crystal.": "Um pedaço frio de cristal mágico."
"A cold stew that seems warm to the touch. And it smells amazing. What's your favorite food? Why, it smells exactly like that, and tastes even better!": "Um ensopado frio que parece quente ao toque. E tem um cheiro incrível. Qual é a sua comida favorita? Ora, cheira exatamente assim e tem um sabor ainda melhor!"
"A collar for a wizard's familiar. This model is used on familiars that tend to run away. (You must be an animal to wear this collar.)": "Uma coleira para o familiar de um bruxo. Este modelo é usado em familiares que tendem a fugir. (Você deve ser um animal para usar esta coleira.)"
"A collar to make large dogs smaller and less scary to some individuals.": "Uma coleira para tornar os cães grandes menores e menos assustadores para alguns indivíduos."
