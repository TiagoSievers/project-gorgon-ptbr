"Carved of bamboo and painted with magic pigments.": "Esculpido em bambu e pintado com pigmentos mágicos."
"Cat meat coated in a thick orange sauce. Surprisingly not terrible.": "Carne de gato coberta com molho espesso de laranja. Surpreendentemente não é terrível."
"Cat meat is never particularly tasty, but this is ... edible.

(Use in Cheap Meat recipes.)": "A carne de gato nunca é particularmente saborosa, mas é... comestível.

(Use em receitas de carne barata.)"
