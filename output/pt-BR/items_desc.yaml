"Evokes the wind in your hair (even if you have no hair) to facilitate an incredible runner's high.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Evoca o vento no seu cabelo (mesmo que você não tenha cabelo) para facilitar uma sensação incrível de corredor.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"Excellent tack for a horse, adorned with lots of little pouches.": "Excelente arreio para cavalo, adornado com muitas bolsinhas."
"Excellent tack for a horse.": "Excelente aderência para um cavalo."
"Exotic candy that combines unlikely flavors. Candy connoisseurs swear by it. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Doce exótico que combina sabores improváveis. Os conhecedores de doces confiam nisso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Exotic-flavored candy that's unlike any natural food you've tasted. Candy aficionados love it.  (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Doces com sabores exóticos, diferentes de qualquer alimento natural que você já provou. Os aficionados por doces adoram.  (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Expert chains reinforced with plates and heavily padded.": "Correntes especializadas reforçadas com placas e fortemente acolchoadas."
"Expertly cleaned and ready for cooking.": "Habilmente limpo e pronto para cozinhar."
"Expertly made out of a barghest, or something similar.": "Habilmente feito de barghest ou algo semelhante."
"Explains a technique for hyper-accelerating your organs well beyond their natural limits.": "Explica uma técnica para hiperacelerar seus órgãos muito além de seus limites naturais."
"Extra insulated to protect against winds.": "Extra isolado para proteger contra ventos."
"Extra-strong cloth with innate magical properties.": "Pano extra-forte com propriedades mágicas inatas."
"Extra-tough gloves for hobgoblins, specially grown battle-goblins with keen combat senses and little common sense.": "Luvas extra-resistentes para hobgoblins, goblins de batalha especialmente desenvolvidos com sentidos de combate aguçados e pouco bom senso."
"Extraordinarily light armor that is very cold to the touch.": "Armadura extraordinariamente leve e muito fria ao toque."
"Extremely dry. Could be saved with enough gravy, though.": "Extremamente seco. Poderia ser salvo com molho suficiente, no entanto."
"Extremely fancy calligraphy ink.": "Tinta de caligrafia extremamente sofisticada."
"Extremely high-quality rendered fat.": "Gordura fundida de altíssima qualidade."
"Faded print declares that Jasmine's Fiery Blades has now opened in Statehelm. It seems to have closed some time after.": "A impressão desbotada declara que Jasmine's Fiery Blades foi inaugurado em Statehelm. Parece ter fechado algum tempo depois."
"Fae Bee royal jelly -- a potent magical substance used as a currency by many parts of the Fae Realm.": "Geléia real de Abelha Fada – uma substância mágica potente usada como moeda por muitas partes do Reino Fae."
"Fae blacksmiths have infused the metal of this helm with the essence of eternity, meaning that this helm has never not existed. Don't think about it too much.": "Os ferreiros Fae infundiram no metal deste elmo a essência da eternidade, o que significa que este elmo nunca deixou de existir. Não pense muito nisso."
"Fangy. And poisony.": "Presunçoso. E venenoso."
"Farmers typically don't feel compelled to shod a cow. But some cows are more violent and adventurous than others.": "Os agricultores normalmente não se sentem obrigados a calçar uma vaca. Mas algumas vacas são mais violentas e aventureiras do que outras."
"Fashionable platemail boots.": "Botas elegantes de cota de malha."
"Fashionable, but a little uncomfortable to wear unless you're a Rakshasa.": "Elegante, mas um pouco desconfortável de usar, a menos que você seja um Rakshasa."
"Fashioned after the long knife used by the Executrix of Command, the terrifying head of the Council's personal defenses. This is no match for the real Executrix's knife, but it is still an incredible weapon.": "Fabricado com base na longa faca usada pelo Executrix of Command, o terrível chefe das defesas pessoais do Conselho. Isso não é páreo para a faca do Executrix real, mas ainda é uma arma incrível."
"Fashioned to look like ice, but significantly more protective.": "Projetado para parecer gelo, mas significativamente mais protetor."
"Fat from an animal.": "Gordura de um animal."
"Featuring embarrassingly bad chainwork!": "Apresentando correntes embaraçosamente ruins!"
"Fermented cactus juice with a complex taste. This batch is pretty vile, but barely drinkable.": "Suco fermentado de cacto de sabor complexo. Este lote é bastante vil, mas quase impossível de beber."
"Fermented cactus juice with a complex taste. This variety has been aged to make it more drinkable. (It's \"more\" drinkable, but still not \"very\" drinkable -- it's an acquired taste.) The stereotypical drink of rakshasa desert bandits.": "Suco fermentado de cacto de sabor complexo. Esta variedade foi envelhecida para torná-la mais potável. (É \"mais\" potável, mas ainda não \"muito\" potável - é um gosto adquirido.) A bebida estereotipada dos bandidos rakshasa do deserto."
"Fertilizer for a mushroom box farm.": "Fertilizante para uma fazenda de cogumelos."
"Few of the legendary Dwarven Stalwarts used unarmed weapons, but the ones that did wore claws like this.": "Poucos dos lendários Dwarven Stalwarts usavam armas desarmadas, mas os que usavam usavam garras como esta."
"Filling, vegan, and a bit spicy.": "Recheio, vegano e um pouco picante."
"Filling, vegan, and kind of bland.": "Recheio, vegano e meio sem graça."
"Fine-tuned for clubbing.": "Afinado para boates."
"Finely-diced vegetables nestled on a bed of fluffy orcish wheat.": "Legumes em cubos finos aninhados em uma cama de trigo orc fofo."
"Finely-ground almonds, suitable for baking.": "Amêndoas finamente moídas, próprias para panificação."
"Finishing Blow dispels one fire effect on you (up to 35 damage/tick) and restores 65 health": "Golpe Finalizador dissipa um efeito de fogo em você (até 35 de dano/tique) e restaura 65 de vida"
"Fish and vegetables in a flour wrapping. Delicious!": "Peixe e legumes embrulhados em farinha. Delicioso!"
"Fish marinaded in sweet fruit juices, grilled to perfection, and garnished with crunchy almond flakes.": "Peixe marinado em sucos de frutas doces, grelhado na perfeição e guarnecido com crocantes flocos de amêndoa."
"Fitted, protective chainmail. If it had pockets, you'd forget it was armor.": "Cota de malha protetora ajustada. Se tivesse bolsos, você esqueceria que era uma armadura."
"Flax seeds can be grown into flax fiber.": "As sementes de linhaça podem ser cultivadas em fibra de linhaça."
"Flax that has been prepared for use in textiles. It can now be spun into linen.": "Linho preparado para utilização em têxteis. Agora pode ser fiado em linho."
"Flexible kelp material worn by ranalon. It smells exactly like you'd expect.": "Material flexível de algas usado por ranalon. Cheira exatamente como você esperaria."
"Fluid that's been siphoned out of a Demon Justiciar's spine. It crackles with electricity.": "Fluido que foi sugado da espinha de um Juiz Demônio. Ele estala com eletricidade."
"Food Poisoning: Heavy poison damage over time masks beneficial effect": "Intoxicação Alimentar: O dano pesado do veneno ao longo do tempo mascara o efeito benéfico"
"Food-quality vegetable oil with a high burn point and a neutral taste. Good for many dishes.": "Óleo vegetal de qualidade alimentar, com alto ponto de queima e sabor neutro. Bom para muitos pratos."
"Food-quality vegetable oil with a high burn point and a pleasant taste. Extremely versatile.": "Óleo vegetal de qualidade alimentar, com alto ponto de queima e sabor agradável. Extremamente versátil."
"Food-quality vegetable oil. It burns easily so is only suitable for certain dishes.": "Óleo vegetal de qualidade alimentar. Queima facilmente, por isso só é adequado para alguns pratos."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +120 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +120 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +20 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +20 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +40 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +40 de dano."
"For 15 minutes, all non-basic attacks made with fists, feet, claws, teeth, or similar body parts deal +80 damage.": "Por 15 minutos, todos os ataques não básicos feitos com punhos, pés, garras, dentes ou partes semelhantes do corpo causam +80 de dano."
"For 15 minutes, boosts Anatomy Critical-Hit Chance +8%": "Por 15 minutos, aumenta a chance de acerto crítico da anatomia em +8%"
"For 15 minutes, gain +7 Max Breath": "Por 15 minutos, ganhe +7 de Respiração Máxima"
"For 15 minutes, makes you think you look like a skeleton. Does not stack with other premonition buffs. (You can only gain one candle buff at a time.)": "Por 15 minutos, faz você pensar que parece um esqueleto. Não acumula com outros buffs de premonição. (Você só pode ganhar um buff de vela por vez.)"
"For 15 minutes, melee attacks deal +100 damage, melee evasion is +20%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers excruciating withdrawal effects for 45 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +100 de dano, a evasão corpo a corpo é de +20% e o XP é ganho mais rápido quando você está com a mente certa. Depois disso, o bebedor sofre efeitos de abstinência excruciantes por 45 minutos."
"For 15 minutes, melee attacks deal +25 damage and melee evasion is +5%. Then the drinker suffers withdrawal effects for 15 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +25 de dano e a evasão corpo a corpo é de +5%. Então o bebedor sofre efeitos de abstinência por 15 minutos."
"For 15 minutes, melee attacks deal +50 damage, melee evasion is +10%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers painful withdrawal effects for 20 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +50 de dano, a evasão corpo a corpo é de +10% e o XP é ganho mais rápido quando você está com a mente correta. Depois disso, o bebedor sofre efeitos dolorosos de abstinência por 20 minutos."
"For 15 minutes, melee attacks deal +75 damage, melee evasion is +15%, and XP is earned faster when in the right mindframe. Afterwards, the drinker suffers agonizing withdrawal effects for 30 minutes.": "Por 15 minutos, os ataques corpo a corpo causam +75 de dano, a evasão corpo a corpo é de +15% e o XP é ganho mais rápido quando você está com a mente correta. Depois, o bebedor sofre efeitos agonizantes de abstinência por 30 minutos."
"For 15 minutes, out-of-combat sprint speed is increased by 4": "Por 15 minutos, a velocidade de corrida fora de combate aumenta em 4"
"For 15 minutes, out-of-combat sprint speed is increased by 6": "Por 15 minutos, a velocidade de corrida fora de combate aumenta em 6"
