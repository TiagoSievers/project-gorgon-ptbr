Tempo de crescimento: 50% mais lento para cada cultura
Rendimento: +66% por colheita
Chance de segundo tipo de cogumelo: 33% por colheita"
"This box can be used to grow mushrooms.
Box Duration: 48 hours
Grow Time: 50% slower for each crop
Yield: +66% per crop
Chance for Second Mushroom Type: 33% per crop": "Esta caixa pode ser usada para cultivar cogumelos.
Duração da caixa: 48 horas
Tempo de crescimento: 50% mais lento para cada cultura
Rendimento: +66% por colheita
Chance de segundo tipo de cogumelo: 33% por colheita"
"This box can be used to grow mushrooms.
Box Duration: 72 hours
Grow Time: 50% slower for each crop
