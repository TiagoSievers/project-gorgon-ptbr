"This tiny gourd floats around your head and emits evil light.": "Esta pequena cabaça flutua em volta da sua cabeça e emite uma luz maligna."
"This tiny gourd floats around your head and watches what you do.": "Esta pequena cabaça flutua em volta da sua cabeça e observa o que você faz."
"This token can be redeemed with -ADMIN- Jackencola for up to a level 80 max-enchanted ring, necklace or piece of armor of choice.
This token can only be redeemed by the account that won it. The prize is non-transferable.": "Este token pode ser resgatado com -ADMIN- Jackencola por um anel, colar ou peça de armadura encantada de até nível 80, à sua escolha.
Este token só pode ser resgatado pela conta que o ganhou. O prêmio é intransferível."
"This token can be redeemed with -ADMIN- Jackencola for up to a level 85 legendary mastercrafted piece of modded gear.
This token can only be redeemed by the account that won it. The prize is non-transferable.": "Este token pode ser resgatado com -ADMIN- Jackencola por uma peça lendária de equipamento modificado de nível 85.
Este token só pode ser resgatado pela conta que o ganhou. O prêmio é intransferível."
"This token is the special currency of the Crafter's Guild. It seems to have no real Council value to it, but the members of the Crafting Caravan value them for trade among fellow professionals.": "Este token é a moeda especial da Guilda dos Artesãos. Parece não ter nenhum valor real no Conselho, mas os membros da Caravana de Artesanato os valorizam para o comércio entre colegas profissionais."
"This token was earned by participating in a live event. The live-event system no longer uses tokens like this, though, and now this token is just a reminder of fun times had.": "Este token foi ganho participando de um evento ao vivo. O sistema de eventos ao vivo não usa mais tokens como este, e agora esse token é apenas um lembrete dos momentos divertidos."
"This tongue-numbing drink doesn't taste good. But it doesn't taste BAD, either. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Esta bebida para entorpecer a língua não tem um gosto bom. Mas também não tem um gosto RUIM. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"This tough leather armor is interwoven with magical threads that supposedly keep psionic attacks at bay.": "Esta resistente armadura de couro é entrelaçada com fios mágicos que supostamente mantêm os ataques psiônicos afastados."
"This tough-but-ugly ring makes Punch attacks deal more damage.": "Este anel resistente, mas feio, faz com que os ataques de soco causem mais danos."
"This toxic compound burns the body, but it masks the symptoms of alcohol withdrawal. Carried in every dwarven medical kit.": "Este composto tóxico queima o corpo, mas mascara os sintomas da abstinência do álcool. Carregado em todos os kits médicos dos anões."
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 35 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 35.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 40 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 40.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 45 enchantments.)": "Esta arma tradicional dos tritões possui encantamentos de água úteis, mas infelizmente esses mesmos encantamentos a tornam inútil para magia de fogo. (Com encantamentos aleatórios de nível 45.)"
"This twee honey-flavored beverage has become a popular vice among gamblers rich and poor. It enhances the pleasure received from gambling.
+10% Gaming XP Earned": "Esta bebida com sabor de mel tornou-se um vício popular entre jogadores ricos e pobres. Aumenta o prazer recebido no jogo.
+10% de XP de jogo ganho"
"This type of armor can be found in picture-books, but nobody has met an actual Thorian in quite some time.": "Este tipo de armadura pode ser encontrada em livros ilustrados, mas há muito tempo ninguém encontra um Thorian de verdade."
"This ugly blue ring enhances most Psychology healing effects by 50.": "Este feio anel azul aumenta a maioria dos efeitos de cura da Psicologia em 50."
"This ugly leather thing is supposed to be worn on the head, apparently.": "Aparentemente, essa coisa feia de couro deveria ser usada na cabeça."
"This ugly piece has been preserved through the ages solely because it depicts Grigtekark, a goblin holy land.": "Esta peça feia foi preservada ao longo dos tempos apenas porque representa Grigtekark, uma terra sagrada dos goblins."
"This ugly purple ring magically strengthens your ankles so that falling from great heights isn't quite as painful. It's a pretty weak enchantment, really.": "Este feio anel roxo fortalece magicamente seus tornozelos para que cair de grandes alturas não seja tão doloroso. É um encantamento bem fraco, na verdade."
"This unassuming-looking weapon hides a series of fire runes on the inside of the flight groove.": "Esta arma de aparência despretensiosa esconde uma série de runas de fogo no interior da ranhura de voo."
"This uncomfortable wooden spider suit was designed with the best of intentions. It just sucks. But the wood can act as a focal point for druidic spiders.": "Este desconfortável traje de aranha de madeira foi projetado com a melhor das intenções. É simplesmente uma merda. Mas a madeira pode atuar como ponto focal para aranhas druidas."
"This ungainly hammer has an inscription: 'Not even their bones must survive. - Ku Turla'": "Este martelo desajeitado tem uma inscrição: 'Nem mesmo os seus ossos devem sobreviver. -Ku Turla'"
"This unidentified pastoral seems to be in good condition.": "Esta pastoral não identificada parece estar em bom estado."
"This unidentified portrait is remarkably lifelike.": "Este retrato não identificado é extremamente realista."
"This vaguely-green metal ring improves an Unarmed ability: Cobra Strike.": "Este anel de metal vagamente verde melhora uma habilidade desarmada: Cobra Strike."
"This variant of the Ri-Shin hat is used by humans to differentiate teams for winter games. Vol-Mu, or Volmue, is a long-deceased god of winter. In the human telling of the myth, Ri-Shin defeated Vol-Mu to allow spring to return to the land.": "Esta variante do chapéu Ri-Shin é usada pelos humanos para diferenciar os times nos jogos de inverno. Vol-Mu, ou Volmue, é um deus do inverno há muito falecido. Na narrativa humana do mito, Ri-Shin derrotou Vol-Mu para permitir que a primavera retornasse à terra."
"This variety of cider is made from sour apples and has a complex array of taste sensations. Pity you won't remember the taste after blacking out from it...": "Esta variedade de cidra é feita de maçãs ácidas e possui uma complexa gama de sensações gustativas. Pena que você não vai se lembrar do sabor depois de desmaiar..."
"This vial of liquid contains fragments of animated plants' roots, still writhing. Chug it down and don't think about it!": "Este frasco de líquido contém fragmentos de raízes de plantas animadas, ainda se contorcendo. Beba e não pense nisso!"
"This vinegar infusion is a closely-guarded secret.": "Esta infusão de vinagre é um segredo bem guardado."
"This vinegar infusion is only needed in the fanciest of dishes.": "Esta infusão de vinagre só é necessária nos pratos mais sofisticados."
"This vodka has been aged and is ready to be filtered and flavored.": "Esta vodka foi envelhecida e está pronta para ser filtrada e aromatizada."
"This vodka needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Esta vodka precisa ser armazenada em uma caverna por uma hora antes de se tornar potável. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This was designed to empower Winter Court fae who've installed Ice Hearts in themselves. Others who can stomach the liquid still gain its benefits, but also a nasty side-effect. (Due to the ingredients, this potion is supposedly forbidden by the Autumn Council of Forbidders.)": "Isso foi projetado para capacitar as fadas da Corte Invernal que instalaram Corações de Gelo em si mesmas. Outros que conseguem engolir o líquido ainda obtêm seus benefícios, mas também um efeito colateral desagradável. (Devido aos ingredientes, esta poção é supostamente proibida pelo Conselho dos Proibidores do Outono.)"
"This was enchanted by a competent apprentice, but it's nothing special.": "Isso foi encantado por um aprendiz competente, mas não tem nada de especial."
"This was made by an advanced apprentice, perhaps. While not a masterpiece, it avoids all the classic blunders of staff-making.": "Isso foi feito por um aprendiz avançado, talvez. Embora não seja uma obra-prima, evita todos os erros clássicos de criação de equipe."
"This was obviously intended to be a Potion of Universal Resistance, but the ingredients were added in the wrong order, resulting in a revolting soup with an unpredictable effect.": "Obviamente, a intenção era ser uma Poção de Resistência Universal, mas os ingredientes foram adicionados na ordem errada, resultando em uma sopa revoltante com um efeito imprevisível."
"This was once a Winter Court helm that was repurposed. Instead of twisting the mind, it protects against such things.": "Este já foi um elmo da Corte Winter que foi reaproveitado. Em vez de distorcer a mente, protege contra tais coisas."
"This was once owned by a powerful shaman who protected cute woodland animals. A tiny bit of his soul resides in this shield. If you don't use it, you're throwing away his life's work!": "Este já foi propriedade de um poderoso xamã que protegia lindos animais da floresta. Um pouquinho de sua alma reside neste escudo. Se você não usar, estará jogando fora o trabalho da vida dele!"
"This was the favored match-stick of a minor flame spirit.": "Este era o fósforo preferido de um espírito de chama menor."
"This whisky has been aged and is ready to be filtered and flavored.": "Este whisky foi envelhecido e está pronto para ser filtrado e aromatizado."
"This whisky needs to be stored in a cave for two hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este whisky precisa ser armazenado em uma caverna por duas horas antes de poder ser bebível. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This white gem with purple streaks is exceptionally strong and makes very resilient jewelry. In magic, it is likewise associated with toughness.": "Esta gema branca com listras roxas é excepcionalmente forte e produz joias muito resistentes. Na magia, também está associado à resistência."
"This wine hasn't been kept in an ideal environment and is now basically undrinkable.": "Este vinho não foi guardado num ambiente ideal e agora é basicamente intragável."
"This wooden ring is carved with elven sword-runes.": "Este anel de madeira é esculpido com runas de espadas élficas."
"This wooden staff is icy cold to the touch.": "Este cajado de madeira é gelado ao toque."
"This would be presentable if you were very clever with the presentation.

(Use in Cheap Meat recipes.)": "Isso ficaria apresentável se você fosse muito inteligente com a apresentação.

(Use em receitas de carne barata.)"
"This writ is redeemable for 1 point during the Writ Challenge event.": "Este mandado pode ser resgatado por 1 ponto durante o evento Writ Challenge."
"This writ is redeemable for 25 points and 250,000 councils during the Writ Challenge event. Use this writ to get a special quest, then see the Writ Master located near the Serbule well to collect your prize.": "Este mandado pode ser resgatado por 25 pontos e 250.000 conselhos durante o evento Writ Challenge. Use este mandado para obter uma missão especial e, em seguida, consulte o Writ Master localizado perto do poço Serbule para receber seu prêmio."
"This... this is not a lager. This is a bottle of mushroom bits.": "Isto... isto não é uma cerveja. Esta é uma garrafa de pedaços de cogumelo."
"Thorians were elves that followed Romast, the god of Martial Arts, who taught that being one with nature was key to grace. That's why their armor was made of metal: nothing's more natural than metal.": "Thorianos eram elfos que seguiram Romast, o deus das artes marciais, que ensinou que ser um com a natureza era a chave para a graça. É por isso que a armadura deles era feita de metal: nada é mais natural que o metal."
"Though it resembles a pearl, it is made of almost-pure Fear mixed with some Revulsion. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pérola, é feito de medo quase puro misturado com alguma repulsa. É muito emocional para ser usado na elaboração."
"Though it resembles a pearl, it is made of almost-pure Greed and jealousy. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pérola, é feito de pura ganância e ciúme. É muito emocional para ser usado na elaboração."
"Though it resembles a pearl, it is made of almost-pure Hate. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pérola, é feito de ódio quase puro. É muito emocional para ser usado na elaboração."
"Though it resembles a pearl, it is made of almost-pure Lust. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pérola, é feito de luxúria quase pura. É muito emocional para ser usado na elaboração."
"Though it resembles a pearl, it is made of almost-pure misery and loathing. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pérola, é feito de quase pura miséria e ódio. É muito emocional para ser usado na elaboração."
"Though it resembles a tiny pearl, it is made of almost-pure Fear mixed with some Revulsion. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pequena pérola, é feito de medo quase puro misturado com alguma repulsa. É muito emocional para ser usado na elaboração."
"Though it resembles a tiny pearl, it is made of almost-pure Greed and jealousy. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pequena pérola, é feito de pura ganância e ciúme. É muito emocional para ser usado na elaboração."
"Though it resembles a tiny pearl, it is made of almost-pure Hate. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pequena pérola, é feita de ódio quase puro. É muito emocional para ser usado na elaboração."
"Though it resembles a tiny pearl, it is made of almost-pure Lust. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pequena pérola, é feito de luxúria quase pura. É muito emocional para ser usado na elaboração."
"Though it resembles a tiny pearl, it is made of almost-pure misery and loathing. It's too emotional to be used in crafting.": "Embora se assemelhe a uma pequena pérola, é feita de quase pura miséria e ódio. É muito emocional para ser usado na elaboração."
"Though now best known as a captain of the splinter group known as the Alharth Rebels, Tabor first gained fame in the Sand War, wielding this blade in the name of the Council.": "Embora agora seja mais conhecido como capitão do grupo dissidente conhecido como Rebeldes de Alharth, Tabor ganhou fama pela primeira vez na Guerra da Areia, empunhando esta lâmina em nome do Conselho."
"Three skewers of seafood and vegetables.": "Três espetos de frutos do mar e legumes."
"Through years of solitude, the ancient spider Wynn discovered this means of restoring the spirit in the depths of a lost cave.": "Através de anos de solidão, a antiga aranha Wynn descobriu este meio de restaurar o espírito nas profundezas de uma caverna perdida."
"Throw enough spices into coffee and it tastes pretty good! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Jogue temperos suficientes no café e ele fica muito gostoso! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Tight dried-kelp gloves worn by ranalon. They're a little itchy.": "Luvas apertadas de algas secas usadas por ranalon. Eles estão com um pouco de coceira."
"Tiny foot coverings for an infant.": "Pequenas coberturas para os pés de uma criança."
"Tofu with real turkey flavor and a host of vegetables in a tasty stir-fry dish.": "Tofu com verdadeiro sabor de peru e uma variedade de vegetais em um saboroso prato salteado."
"Tofu with real turkey flavor in a simple stir-fry dish.": "Tofu com verdadeiro sabor de peru em um prato simples refogado."
"Too small to be filleted, but still useful as bait.": "Muito pequeno para ser cortado em filetes, mas ainda útil como isca."
"Tools for refining the balance and movement of weapons. Includes restringing kit.": "Ferramentas para refinar o equilíbrio e o movimento das armas. Inclui kit de amarração."
"Touching it gives an unpleasant static shock.": "Tocá-lo causa um choque estático desagradável."
"Tough and dry, but good for gnawing. This provides a quick instant pick-me-up.": "Duro e seco, mas bom para roer. Isso fornece um estímulo rápido e instantâneo."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version has a bunch of extra padding.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Esta versão tem um monte de preenchimento extra."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is enchanted for extra warmth.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Esta versão é encantada pelo calor extra."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is made of decent materials, but doesn't fit too well.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Esta versão é feita de materiais decentes, mas não cabe muito bem."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is moderately uncomfortable.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Esta versão é moderadamente desconfortável."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is pretty nice.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Essa versão é bem legal."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is typical of the ones you'd see in Statehelm.": "Chapéu tradicional usado pelos humanos durante a celebração de inverno de Ri-Shin, o deus das plantas e das árvores. Esta versão é típica daquelas que você veria em Statehelm."
"Traditional hat worn by priests of Ri-Shin. Treants and other intelligent plants recognize this hat, and most will refrain from attacking the wearer.": "Chapéu tradicional usado pelos sacerdotes de Ri-Shin. Treants e outras plantas inteligentes reconhecem este chapéu, e a maioria evitará atacar o usuário."
"Transforms you into a rabbit. Permanent until dispelled! WARNING: think before you drink!": "Transforma você em um coelho. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Transforms you into a skeleton. Permanent until dispelled! WARNING: think before you drink!": "Transforma você em um esqueleto. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Transforms you into a spirit fox. Permanent until dispelled! WARNING: think before you drink!": "Transforma você em uma raposa espiritual. Permanente até ser dissipado! AVISO: pense antes de beber!"
"Tremor the Myconian took this bow from a pesky elf. Myconians can't use bows, but Tremor liked plucking the string to make a 'twang' sound. It really irritated other myconians, and Tremor liked that.": "Tremor, o Myconiano, pegou este arco de um elfo irritante. Os habitantes de Mycon não podem usar arcos, mas Tremor gostava de dedilhar a corda para fazer um som de 'sotaque'. Isso realmente irritou outros myconianos, e Tremor gostou disso."
"Truly awesome horseshoes. Maybe not a huge improvement over the astounding horesehoes, but still awesome!": "Ferraduras verdadeiramente incríveis. Talvez não seja uma grande melhoria em relação às espantosas ferraduras, mas ainda assim é incrível!"
"Truth in advertising: this is not a pretty helmet. It has other charms, though, such as a deep-seated aroma of spoiled cheese.": "Verdade na publicidade: este não é um capacete bonito. Porém, tem outros encantos, como um aroma profundo de queijo estragado."
"Tundra rye that's been milled into a bakable flour.": "Centeio de tundra que foi moído em uma farinha que pode ser cozida."
"Turkey can be fried deliciously, and this dish proves it.": "O peru pode ser frito deliciosamente, e este prato é a prova disso."
"Turns off PvP caused by PvP Juice test-potions.": "Desativa o PvP causado pelas poções de teste PvP Juice."
"Two ordinary Council Screeds glued together by a prankster.": "Duas mesas comuns do Conselho coladas por um brincalhão."
"Tyler gave this ring to his soulmate as a token of his affection.": "Tyler deu este anel à sua alma gêmea como prova de seu afeto."
"Typical winter gear for acolytes of Ri-Shin. (Well, the ones that need clothes, anyway.)": "Equipamento típico de inverno para acólitos de Ri-Shin. (Bem, pelo menos aqueles que precisam de roupas.)"
"Uncomfortable chain that drapes the body.": "Corrente desconfortável que envolve o corpo."
"Uncomfortable tights made of scray skin. When a scray dies, ranalon often make pants like these to honor them by using all the parts of the corpse.": "Meias desconfortáveis ​​feitas de pele áspera. Quando um scray morre, Ranalon costuma fazer calças como essas para homenageá-lo, usando todas as partes do cadáver."
"Unleavened bread. Not super tasty by itself, but good in sandwiches. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Pão sem fermento. Não é muito saboroso por si só, mas é bom em sanduíches. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Unleavened bread. The orcish version is a little better. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Pão sem fermento. A versão orc é um pouco melhor. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Unlike most food, this does not give a long-term regeneration effect. Bacon is an instant pick-me-up any time!": "Ao contrário da maioria dos alimentos, este não proporciona um efeito de regeneração a longo prazo. Bacon é um estimulante instantâneo a qualquer hora!"
"Unlike most food, this does not give a long-term regeneration effect. Fried potatoes are an instant pick-me-up any time!": "Ao contrário da maioria dos alimentos, este não proporciona um efeito de regeneração a longo prazo. Batatas fritas são um estímulo instantâneo a qualquer hora!"
"Unlocks special quest to redeem a large prize. Only one Golden Writ quest can be active at a time.": "Desbloqueia uma missão especial para resgatar um grande prêmio. Apenas uma missão Golden Writ pode estar ativa por vez."
"Unusual bone structure.": "Estrutura óssea incomum."
"Up to five poison effects are removed immediately (for all poisons up to 20 damage/update)": "Até cinco efeitos de veneno são removidos imediatamente (para todos os venenos até 20 de dano/atualização)"
"Up to three poison effects are removed immediately (for all poisons up to 15 damage/tick)": "Até três efeitos de veneno são removidos imediatamente (para todos os venenos até 15 de dano/tique)"
"Upon activation, this small stone explodes, typically killing the person activating it. These runes are used by paranoid merchants as anti-theft devices. Intermediate runecrafters and fire mages can also make use of them in their research.": "Após a ativação, esta pequena pedra explode, normalmente matando a pessoa que a ativou. Essas runas são usadas por comerciantes paranóicos como dispositivos antifurto. Criadores de runas intermediários e magos de fogo também podem usá-los em suas pesquisas."
"usable once per 30 minutes.": "utilizável uma vez a cada 30 minutos."
"usable once per 5 minutes.": "utilizável uma vez a cada 5 minutos."
"Use this item to claim 1 month of VIP membership.": "Use este item para reivindicar 1 mês de assinatura VIP."
"Use this item to deploy a Keg of Love which will explode and spread its love to everyone around it within 20 meters.": "Use este item para implantar um Barril de Amor que explodirá e espalhará seu amor para todos ao seu redor em um raio de 20 metros."
"Use this item to summon a temporary trash can that anyone can use. Note: Items thrown in the trash are lost forever!": "Use este item para invocar uma lata de lixo temporária que qualquer pessoa pode usar. Obs: Itens jogados no lixo são perdidos para sempre!"
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish or Perch, this gear can catch them. Takes 5 minutes to attempt to catch 1 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Grapefish ou Perch, este equipamento pode pegá-los. Leva 5 minutos para tentar pegar 1 peixe."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 2 hours to attempt to catch 3-12 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Grapefish, Perch, Eel ou Shark, este equipamento pode pegá-los. Leva 2 horas para tentar pegar de 3 a 12 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 4 hours to attempt to catch 5-20 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Grapefish, Perch, Eel ou Shark, este equipamento pode pegá-los. Leva 4 horas para tentar pegar de 5 a 20 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 8 hours to attempt to catch 12-35 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Grapefish, Perch, Eel ou Shark, este equipamento pode pegá-los. Leva 8 horas para tentar pescar de 12 a 35 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, or Eel, this gear can catch them. Takes 30 minutes to attempt to catch 2-5 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Grapefish, Perch ou Eel, este equipamento pode pegá-los. Leva 30 minutos para tentar pegar de 2 a 5 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye or Rock Carp, this gear can catch them. Takes 5 minutes to attempt to catch 1 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye ou Rock Carp, este equipamento pode pegá-los. Leva 5 minutos para tentar pegar 1 peixe."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, or Smallmouth Bass, this gear can catch them. Takes 30 minutes to attempt to catch 2-5 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye, Rock Carp ou Smallmouth Bass, este equipamento pode pegá-los. Leva 30 minutos para tentar pegar de 2 a 5 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, or Yellow Perch, this gear can catch them. Takes 2 hours to attempt to catch 3-12 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye, Rock Carp, Smallmouth Bass ou Yellow Perch, este equipamento pode pegá-los. Leva 2 horas para tentar pegar de 3 a 12 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, Yellow Perch, or Catfish, this gear can catch them. Takes 4 hours to attempt to catch 5-20 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye, Rock Carp, Smallmouth Bass, Yellow Perch ou Catfish, este equipamento pode pegá-los. Leva 4 horas para tentar pegar de 5 a 20 peixes."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, Yellow Perch, or Catfish, this gear can catch them. Takes 8 hours to attempt to catch 12-35 fish.": "Use-o para pescar no gelo de um lago congelado. Se o lago tiver Walleye, Rock Carp, Smallmouth Bass, Yellow Perch ou Catfish, este equipamento pode pegá-los. Leva 8 horas para tentar pescar de 12 a 35 peixes."
"Use this wolf whistle on the teleportation platform south of Serbule Keep.": "Use este apito de lobo na plataforma de teletransporte ao sul de Serbule Keep."
"Used by calligraphers when extremely fine detail must be inked.": "Usado por calígrafos quando detalhes extremamente finos devem ser pintados."
"Used by desperate soldiers who want some sort of protection against the demons they're forced to fight. It fortifies the body at the cost of agility.": "Usado por soldados desesperados que querem algum tipo de proteção contra os demônios que são forçados a combater. Fortalece o corpo à custa da agilidade."
"Used by dwarves who must venture onto the battle field to aid fallen comrades.": "Usado por anões que devem se aventurar no campo de batalha para ajudar camaradas caídos."
"Used by Gazluk orcs to inspire courage and/or fear.": "Usado pelos orcs Gazluk para inspirar coragem e/ou medo."
"Used by goblin necromancers. A necromancy gem has been embedded in a case made of bone shards.": "Usado por necromantes goblins. Uma gema de necromancia foi embutida em uma caixa feita de fragmentos de osso."
"Used by goblin paleontologists in pursuit of knowledge.": "Usado por paleontólogos duendes em busca de conhecimento."
"Used by orcs to smoke raw (unrefined) gur-horta.": "Usado por orcs para fumar gur-horta crua (não refinada)."
"Used by rakshasa house-builders to \"seal\" ghosts out of new homes. The efficacy of their technique, however, seems dubious.": "Usado por construtores de casas rakshasa para \"selar\" fantasmas de novas casas. A eficácia da sua técnica, no entanto, parece duvidosa."
"Used by ranalon martial artists to great effect.": "Usado por artistas marciais ranalon com grande efeito."
"Used by ratkin summoners to raise the dead and toss the occasional fireball.": "Usado por invocadores ratkin para ressuscitar os mortos e lançar bolas de fogo ocasionais."
"Used by some troll martial-artists that you definitely do not want to meet.": "Usado por alguns artistas marciais trolls que você definitivamente não quer conhecer."
"Used by the elite Gazluk orcish tacticians.

Note: this halberd is considered a Staff, but it cannot be used to cast spells.": "Usado pelos estrategistas orcs de elite de Gazluk.

Nota: esta alabarda é considerada um cajado, mas não pode ser usada para lançar feitiços."
"Used by the goblin necromancer Jumjab. It contains two different necromancy gems, in case one gets shattered in combat.": "Usado pelo goblin necromante Jumjab. Ele contém duas gemas de necromancia diferentes, caso uma delas seja quebrada em combate."
"Used by the migrant house-builders that until recently found work in Povus. While it can be used as a weapon, its primary purpose was to store powerful drink.": "Utilizado pelos construtores migrantes que até recentemente encontravam trabalho em Povus. Embora possa ser usado como arma, seu objetivo principal era armazenar bebidas poderosas."
"Used by the strongest of the legendary orcish Misery Troopers.": "Usado pelos mais fortes dos lendários Misery Troopers orcs."
"Used by the typical troops of the Crone Hegemony.": "Usado pelas tropas típicas da Hegemonia Crone."
"Used by vampires to \"clean\" blood so it can be used in alcoholic drinks. This one's antique.": "Usado por vampiros para “limpar” o sangue para que possa ser usado em bebidas alcoólicas. Este é antigo."
"Used in amazing smithing recipes.": "Usado em receitas de ferraria incríveis."
"Used in astounding smithing recipes.": "Usado em receitas de ferraria surpreendentes."
"Used in Augmentation recipes to create level 1-30 Augments that go on necklaces.": "Usado em receitas de aumento para criar aumentos de nível 1 a 30 que vão para colares."
