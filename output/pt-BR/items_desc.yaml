"Heavily reinforced gauntlets intended to withstand assault by even massive creatures.": "Manoplas fortemente reforçadas destinadas a resistir a ataques até mesmo de criaturas enormes."
"Heavy but not unwieldy, this style of helmet provides extra protection against massive opponents.": "Pesado, mas não pesado, este estilo de capacete oferece proteção extra contra oponentes enormes."
"Hellfire Cost Reduction: 25%": "Redução de custo do Fogo do Inferno: 25%"
"Hey, this isn't a real skull! It's wood that's been painted to resemble stone. Or perhaps bone.": "Ei, isso não é uma caveira de verdade! É madeira pintada para parecer pedra. Ou talvez osso."
"Hideous foot wrappings covered in excess leather to provide protection - but not comfort. Expect gigantic blisters.": "Envoltórios horríveis para os pés cobertos com excesso de couro para fornecer proteção - mas não conforto. Espere bolhas gigantescas."
"High-end pro racing gear.": "Equipamento de corrida profissional de última geração."
"High-quality cotton fibers that have been cleaned and prepared.": "Fibras de algodão de alta qualidade que foram limpas e preparadas."
"High-quality rendered fat.": "Gordura fundida de alta qualidade."
"High-quality sheep meat.": "Carne ovina de alta qualidade."
"Hm... there must be something nice to say about this shirt. Ah! The pockets are sewn on straight. Nice!": "Hm... deve haver algo de bom a dizer sobre esta camisa. Ah! Os bolsos são costurados retos. Legal!"
"Hmm. Could this be part of some weird magical globe?": "Hum. Isso poderia ser parte de algum estranho globo mágico?"
"Hogan the staff-fighter's masterpiece... Well, a reasonable facsimile.": "Hogan, a obra-prima do lutador de estado-maior... Bem, um fac-símile razoável."
"Hold down Shift to run very, very fast. You also take no damage from falls.": "Mantenha pressionada a tecla Shift para correr muito, muito rápido. Você também não sofre danos por quedas."
"Holds 1000 dowels. Suitable for use by fletchers. The box can only be used once.": "Contém 1000 cavilhas. Adequado para uso por Fletchers. A caixa só pode ser usada uma vez."
"Home-made from snail parts.": "Feito em casa com partes de caracol."
"Honed to perfection by a staff expert who slowly went mad from Lycanthropy. It's a powerful weapon, though it is marred by long ugly claw marks.": "Aperfeiçoado até a perfeição por um especialista da equipe que lentamente enlouqueceu com a Licantropia. É uma arma poderosa, embora esteja marcada por marcas de garras longas e feias."
"Horrendously strong, but not especially deft.": "Terrivelmente forte, mas não especialmente hábil."
"Horseshoes, but fitted for a cow's hooves.": "Ferraduras, mas adequadas para cascos de vaca."
"Horseshoes, but fitted for a deer's hooves.": "Ferraduras, mas adequadas para cascos de veado."
"Horseshoes, but fitted for a pig's hooves.": "Ferraduras, mas adequadas para cascos de porco."
"Hot, freshly-grilled fish and cold crunchy lettuce, seasoned perfectly.": "Peixe quente grelhado na hora e alface fria e crocante, perfeitamente temperados."
"Hot, juicy steak smothered in delicious cheese and wrapped in lettuce. Amazing!": "Bife quente e suculento, coberto com um delicioso queijo e embrulhado em alface. Incrível!"
"Humans gain +5 Independence for 1 hour": "Humanos ganham +5 de Independência por 1 hora"
"Hygiene bonus is applied even when gloves are not being worn.": "O bônus de higiene é aplicado mesmo quando não estão sendo usadas luvas."
"Iconic goblin headwear.": "Chapéu de duende icônico."
"If a cow needed to be shod for some reason, it is surely not with these wooden, splinter-laced bits of junk.": "Se uma vaca precisasse ser ferrada por algum motivo, certamente não seria com esses pedaços de madeira cheios de lascas."
"If a deer needed to be shod for some reason, it is surely not with these wooden, splinter-laced bits of junk.": "Se um cervo precisasse ser ferrado por algum motivo, certamente não seria com esses pedaços de madeira cheios de lascas."
"If all you're looking for is some horseshoe-shaped pieces of wood to nail to your cow's feet, you're in luck.": "Se tudo o que você procura são alguns pedaços de madeira em forma de ferradura para pregar nos pés da sua vaca, você está com sorte."
"If all you're looking for is some horseshoe-shaped pieces of wood to nail to your deer's feet, you're in luck.": "Se tudo o que você procura são alguns pedaços de madeira em formato de ferradura para pregar nas patas do cervo, você está com sorte."
"If cat meat tasted good, this would taste good.

(Use in Cheap Meat recipes.)": "Se a carne de gato tivesse um gosto bom, isso teria um gosto bom.

(Use em receitas de carne barata.)"
"If this shield is so lucky, why did Marna give it away? Still, it seems pretty sturdy.": "Se este escudo tem tanta sorte, por que Marna o deu? Ainda assim, parece bastante resistente."
"If used immediately before an attack, the attack will cause the target(s) to be covered in mild but long-burning flame.": "Se usado imediatamente antes de um ataque, o ataque fará com que o(s) alvo(s) fique(m) coberto(s) por chamas suaves, mas de longa duração."
"If you know anything about cowshoe craftsmanship, you know you're looking at a masterpiece right here.": "Se você sabe alguma coisa sobre artesanato com ferraduras, sabe que está vendo uma obra-prima bem aqui."
"If you know anything about deershoe craftsmanship, you know you're looking at a masterpiece right here.": "Se você sabe alguma coisa sobre artesanato com ferraduras, sabe que está vendo uma obra-prima bem aqui."
"Imbued with potent magic, the ever-patching shirt is constantly fixing itself.": "Imbuída de uma magia poderosa, a camisa sempre remendada está constantemente se consertando."
"Impeccably presented yellowtail, wrapped in seaweed, on a ball of delicious rice.": "Yellowtail impecavelmente apresentado, envolto em algas marinhas, numa bola de arroz delicioso."
"Impossibly comfortable for leather. Stylish too!": "Impossivelmente confortável para couro. Elegante também!"
"Impossibly soft felt cloth.": "Pano de feltro incrivelmente macio."
"Impressive tack for a horse.": "Aderência impressionante para um cavalo."
"Impressively comfy in the cold.": "Impressionantemente confortável no frio."
"In his youth, Chet loved the lightning. In his later days he kind of preferred plain smashing. This club served him in both.": "Em sua juventude, Chet adorava raios. Em seus últimos dias, ele preferia simplesmente esmagar. Este clube o serviu em ambos."
"In just a few symbols, this belt buckle juxtaposes the grace, beauty, and apparent immortality of the hammer wearer.

This buckle slowly decays when worn in combat until it eventually disappears.": "Em apenas alguns símbolos, esta fivela de cinto justapõe a graça, a beleza e a aparente imortalidade do usuário do martelo.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"In Rahu it is said that if a mother studies these flowers just before she gives birth, the child will have an abundance of health.

You can only have one flower arrangement benefit at a time.": "Em Rahu diz-se que se uma mãe estudar estas flores pouco antes de dar à luz, a criança terá saúde abundante.

Você só pode ter o benefício de um arranjo de flores por vez."
"In the right hands, anything is a good weapon. Forged to the same exacting requirements of all dwarven weapons, this tool strikes with a mighty twang.": "Nas mãos certas, qualquer coisa é uma boa arma. Forjada com os mesmos requisitos de todas as armas anãs, esta ferramenta ataca com um som poderoso."
"Incredible crafstmanship and a fashion-forward view on pockets. (That is: not having any.)": "Artesanato incrível e uma visão moderna nos bolsos. (Isto é: não ter nenhum.)"
"Incredible! You can evade like crazy in these.": "Incrível! Você pode fugir como um louco com isso."
"Incredibly fancy calligraphy ink.": "Tinta de caligrafia incrivelmente sofisticada."
"Incredibly fresh flounder on a ball of delicious rice.": "Linguado incrivelmente fresco em uma bola de arroz delicioso."
"Incredibly protective against freezing.": "Incrivelmente protetor contra congelamento."
"Infused with arcane protective rituals. While technically usable by fire Fire Mages and Staff Fighters, this weapon is designed to be wielded by those who fancy themselves healers.": "Infundido com rituais de proteção arcanos. Embora tecnicamente utilizável por Fire Mages e Staff Fighters, esta arma foi projetada para ser empunhada por aqueles que se consideram curandeiros."
"Ink infused with deadly chemicals. It has several uses, but is most commonly used by sigil scripters to create destructive runes.": "Tinta infundida com produtos químicos mortais. Tem vários usos, mas é mais comumente usado por criadores de scripts de sigilo para criar runas destrutivas."
"Ink infused with fiery chemicals. Used by sigil scripters to create deadly runes.": "Tinta infundida com produtos químicos ardentes. Usado por criadores de scripts de sigilo para criar runas mortais."
"Ink infused with many chemicals. It has many uses, but is most prominently used by sigil scripters to create restorative runes.": "Tinta infundida com muitos produtos químicos. Ele tem muitos usos, mas é usado com mais destaque por criadores de scripts de sigilos para criar runas restaurativas."
"Inlaid with beautiful silver filigree, this cozy shirt looks gorgeous. A universal holy symbol is embroidered inside, allowing priests of Arisetsu, Saledar, or Kirad to enforce their wills.": "Incrustada com uma linda filigrana prateada, esta camisa aconchegante fica linda. Um símbolo sagrado universal é bordado no interior, permitindo que os sacerdotes de Arisetsu, Saledar ou Kirad imponham suas vontades."
"Inlaid with intricate patterns that are incredibly precise. The palms have tiny quick-access pockets, too!": "Incrustado com padrões intrincados que são incrivelmente precisos. As palmas também têm pequenos bolsos de acesso rápido!"
"Inscribed with ancient rakshasa runes, this staff taps magic from another world, making it quite hot. A recent owner also attuned it to Arisetsu, further heating it to the point that wielding the staff is a bit painful.": "Inscrito com antigas runas rakshasa, este cajado extrai magia de outro mundo, tornando-o bastante quente. Um proprietário recente também o sintonizou com Arisetsu, aquecendo-o ainda mais a ponto de empunhar o cajado ser um pouco doloroso."
"Install into a home or guild hall to let anyone write in it.": "Instale em uma casa ou guild hall para permitir que qualquer pessoa escreva nele."
