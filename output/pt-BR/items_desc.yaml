"This brandy has been aged and is ready to be filtered and flavored.": "Esta aguardente foi envelhecida e está pronta para ser filtrada e aromatizada."
"This brandy needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Este conhaque precisa ser armazenado em uma caverna por uma hora antes de se tornar potável. (Você não precisa permanecer na caverna ou online o tempo todo.)"
"This brass device serves no obvious purpose. Perhaps it was part of an ancient machine.": "Este dispositivo de latão não tem nenhum propósito óbvio. Talvez fosse parte de uma máquina antiga."
"This brass ring numbs each of your senses just enough to make swimming in water come much easier.": "Este anel de latão entorpece cada um dos seus sentidos apenas o suficiente para tornar muito mais fácil nadar na água."
"This breastplate is very old, and a sequence of enchantments has been laid atop it to protect it from the elements. An active symbol of Arisetsu is barely visible under layers of rust and paint.": "Este peitoral é muito antigo e uma sequência de encantamentos foi colocada sobre ele para protegê-lo dos elementos. Um símbolo ativo de Arisetsu é pouco visível sob camadas de ferrugem e tinta."
"This bright red powder always feels warm to the touch.": "Este pó vermelho brilhante sempre é quente ao toque."
"This broadsword was enchanted with the sole goal of taking off heads.": "Esta espada larga foi encantada com o único objetivo de arrancar cabeças."
"This bucket is full of clean, delicious water. It's not usable on its own, but it can be used to fill up containers which can better distribute the water further.": "Este balde está cheio de água limpa e deliciosa. Não pode ser utilizado sozinho, mas pode ser utilizado para encher recipientes que distribuam melhor a água."
"This buckle concisely describes the emotion one feels when smashing something's head open with a big club.

This buckle slowly decays when worn in combat until it eventually disappears.": "Esta fivela descreve concisamente a emoção que alguém sente ao quebrar a cabeça de algo com um grande porrete.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"This buckle expresses the sentiment that sometimes a hammer is the best way to solve a problem.

This buckle slowly decays when worn in combat until it eventually disappears.": "Esta fivela expressa o sentimento de que às vezes um martelo é a melhor maneira de resolver um problema.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"This buckle has a depiction of Jake the Buckler holding a hammer. It's not very impressive, but a strange magic is keeping the buckle from decaying or breaking. Perhaps it'd make a good backup buckle.": "Esta fivela tem uma representação de Jake, o Broquel, segurando um martelo. Não é muito impressionante, mas uma estranha magia impede que a fivela se deteriore ou quebre. Talvez fosse uma boa fivela reserva."
"This buckle is a work of art that elevates the wearer to lofty heights of imagined heroism.

This buckle slowly decays when worn in combat until it eventually disappears.": "Esta fivela é uma obra de arte que eleva o usuário a alturas elevadas de heroísmo imaginado.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"This buckle is crudely made but conveys the basic idea that hammering things is fun.

This buckle slowly decays when worn in combat until it eventually disappears.": "Esta fivela é feita de maneira grosseira, mas transmite a ideia básica de que martelar coisas é divertido.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"This buckle should be in a museum. A buckle museum. You probably couldn't charge for admission to a buckle museum, but you'd have occasional passersby come and gawk.

This buckle slowly decays when worn in combat until it eventually disappears.": "Esta fivela deveria estar em um museu. Um museu de fivelas. Você provavelmente não poderia cobrar pela entrada em um museu de fivelas, mas você ocasionalmente receberia transeuntes e ficaria boquiaberto.

Esta fivela decai lentamente quando usada em combate até desaparecer."
