"Slightly magical spelt grown at night. Most useful when ground into flour.": "Feitiço ligeiramente mágico cultivado à noite. Mais útil quando moído em farinha."
"Slip into these and enjoy having leather on your crotch like never before.": "Vista-os e desfrute de couro na virilha como nunca antes."
"Slippers that combine comfort, safety, and fashion.": "Chinelos que aliam conforto, segurança e moda."
"Small dried vegetable chunks, magically puffed with air and then filled with sugar and cheese. It's... interesting.": "Pequenos pedaços de vegetais secos, magicamente inflados com ar e depois recheados com açúcar e queijo. É... interessante."
"Smells foul but doesn't really taste bad (for an alchemy potion).": "Cheira mal, mas não tem gosto ruim (para uma poção de alquimia)."
"Smells like entrails. Tastes like entrails... but with an extremely unpleasant crunch.": "Cheira a entranhas. Tem gosto de entranhas... mas com uma crocância extremamente desagradável."
"Smells like ground-up bees. (Pity you know what that smells like.)": "Cheira a abelhas moídas. (Pena que você sabe como é o cheiro.)"
"Smells like leaves.": "Cheira a folhas."
"Smells of sulfur and tastes of hair. Typical alchemy nonsense.": "Cheira a enxofre e tem gosto de cabelo. Bobagem típica da alquimia."
"Smelly old helmet.": "Capacete velho e fedorento."
"Smelly old shoes.": "Sapatos velhos e fedorentos."
"Smithed from iron, these washers are used in making and maintaining orcish traps.": "Forjadas em ferro, essas arruelas são usadas na fabricação e manutenção de armadilhas para orcs."
"Smoked perch with a sweet orange glaze.": "Perca defumada com cobertura de laranja doce."
"Smooth, luscious yellow butter with a strong sweet undercurrent. Perfect for elven pastries!": "Manteiga amarela suave e deliciosa com um forte toque doce. Perfeito para doces élficos!"
"Smooth, luscious yellow butter.": "Manteiga amarela suave e deliciosa."
