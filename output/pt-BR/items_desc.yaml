"For many decades this was the de facto standard for masters of the magical arts, only falling from favor because the tree it is made from has gone extinct.": "Durante muitas décadas este foi o padrão de facto para os mestres das artes mágicas, só caindo em desuso porque a árvore da qual é feito foi extinta."
"For one hour, boosts Max Bodyheat +20 and Breath Restored (on land or partial water) +5/sec": "Por uma hora, aumenta o Calor Corporal Máximo em +20 e a Respiração Restaurada (em terra ou parcialmente na água) +5/seg."
"For one hour, boosts Max Power +50, Max Breath +3, Burst Evasion +10%, and Automatic Miss Chance +5%": "Por uma hora, aumenta Max Power +50, Max Breath +3, Burst Evasion +10% e Automatic Miss Chance +5%"
"For orcs that rely on speed and stealth to survive, this leather helmet is the standard. It's not really the best possible cap, but standards usually aren't.": "Para orcs que dependem de velocidade e furtividade para sobreviver, este capacete de couro é o padrão. Não é realmente o melhor limite possível, mas os padrões geralmente não são."
"For race/sex combinations with multiple beard colors: randomly chooses a new beard color. (Beard style is unchanged.)": "Para combinações de raça/sexo com múltiplas cores de barba: escolhe aleatoriamente uma nova cor de barba. (O estilo da barba permanece inalterado.)"
"For race/sex combinations with multiple beard styles: randomly chooses a new beard style. (Beard color is unchanged.)": "Para combinações de raça/sexo com vários estilos de barba: escolhe aleatoriamente um novo estilo de barba. (A cor da barba permanece inalterada.)"
"For races with multiple hair colors: randomly chooses a new hair color. (Hair style is unchanged.)": "Para raças com múltiplas cores de cabelo: escolhe aleatoriamente uma nova cor de cabelo. (O estilo do cabelo permanece inalterado.)"
"For races with multiple hair styles: randomly chooses a new hair style. (Hair color is unchanged.)": "Para corridas com vários estilos de cabelo: escolhe aleatoriamente um novo estilo de cabelo. (A cor do cabelo permanece inalterada.)"
"For races with multiple skintones: randomly chooses a new skintone.": "Para corridas com vários tons de pele: escolhe aleatoriamente um novo tom de pele."
"For repairing debilitating armor damage. Used by Armor Patching abilities.": "Para reparar danos debilitantes à armadura. Usado por habilidades de Patching de Armadura."
"For repairing devastating armor damage. Used by Armor Patching abilities.": "Para reparar danos devastadores à armadura. Usado por habilidades de Patching de Armadura."
"For repairing heinous armor damage. Used by Armor Patching abilities.": "Para reparar danos hediondos na armadura. Usado por habilidades de Patching de Armadura."
"For repairing incredible armor damage. Used by Armor Patching abilities.": "Para reparar danos incríveis à armadura. Usado por habilidades de Patching de Armadura."
"For repairing minor armor damage. Used by Armor Patching abilities.": "Para reparar pequenos danos à armadura. Usado por habilidades de Patching de Armadura."
"For repairing moderate armor damage. Used by Armor Patching abilities.": "Para reparar danos moderados à armadura. Usado por habilidades de Patching de Armadura."
"For repairing serious armor damage. Used by Armor Patching abilities.": "Para reparar danos graves à armadura. Usado por habilidades de Patching de Armadura."
"For rough riding.": "Para passeios difíceis."
"For the mage who needs to clear a sewer in the morning and dance at a ball in the evening.": "Para o mago que precisa limpar um esgoto pela manhã e dançar num baile à noite."
"For two minutes, all Fire Magic attacks deal +25 damage": "Por dois minutos, todos os ataques de Magia de Fogo causam +25 de dano"
"For two minutes, all Slashing attacks deal +25 damage": "Por dois minutos, todos os ataques cortantes causam +25 de dano"
"For two minutes, power regeneration is increased by 20, even during combat": "Por dois minutos, a regeneração de energia aumenta em 20, mesmo durante o combate"
"For use by admins only!": "Para uso apenas por administradores!"
"Forged by the most skilled goblin weaponsmiths in the tri-county area.": "Forjado pelos armeiros goblins mais habilidosos da região dos três condados."
"Foul-smelling and poorly-maintained, yet quite dangerous. Like ratkin homes.": "Fedorento e mal conservado, mas bastante perigoso. Como casas de ratkin."
"Found stuck to a giant spider, this shield has been scarred and pitted with acid. It looks pretty badass, but it's not really very protective.": "Encontrado preso a uma aranha gigante, este escudo foi marcado e perfurado com ácido. Parece muito foda, mas não é muito protetor."
"Found within a sentient weather phenomenon, this bizarre horn gives off an eerie glow.": "Encontrado em um fenômeno climático sensível, este chifre bizarro emite um brilho misterioso."
"Four out of five talking shoe-wearing deer agree: these are the nicest ones they've ever seen.": "Quatro em cada cinco cervos falantes que usam sapatos concordam: estes são os mais bonitos que já viram."
"Foxes are beloved wizard familiars because they channel tremendous Power. This little metal image of a fox does too.": "As raposas são familiares bruxos amados porque canalizam um poder tremendo. Esta pequena imagem metálica de uma raposa também."
"Fresh and sugary! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Fresco e açucarado! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Fresh catfish doused in crisp vinegar.": "Bagre fresco mergulhado em vinagre crocante."
"Fresh creamy yogurt with strawberries. A sweet snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Iogurte cremoso fresco com morangos. Um lanche doce. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Fresh green peas, ready for cooking.": "Ervilhas frescas, prontas para cozinhar."
"Fresh soybeans, ready to be processed into edible food. They are too bitter to be eaten raw, but useful in cooking.": "Soja fresca, pronta para ser transformada em alimento comestível. Eles são muito amargos para serem comidos crus, mas são úteis na culinária."
"Fresh, cold, and delicious. Eat it before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Fresco, frio e delicioso. Coma antes que derreta! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Fresh-caught river fish.": "Peixe de rio recém pescado."
"Fresh-tossed!": "Fresco!"
"Freshly-squeezed liquid out of a cactus.": "Líquido recém-espremido de um cacto."
"Fried beetles with salt. What's not to like? (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Besouros fritos com sal. O que há para não gostar? (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Fried cat-meat in a house blend of spices and lightly breaded.": "Carne de gato frita em mistura de temperos da casa e levemente empanada."
"From an Aktaari rake. They use them to cultivate evu fruit.": "De um ancinho Aktaari. Eles os usam para cultivar frutas evu."
"From burs to brushes, screws to setting tools, it's all in here.": "De brocas a escovas, de parafusos a ferramentas de fixação, está tudo aqui."
"From the material to the craftsmanship to the enchantments, these fashionable pants exude a calm mastery.": "Do material ao artesanato e aos encantos, essas calças da moda exalam um domínio calmo."
"Fruit from a strange plant that grows in the fae realm. While delicious, sprigganberries are incredibly poisonous unless the tiny seeds are carefully removed. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Fruto de uma planta estranha que cresce no reino das fadas. Embora deliciosos, os raminhos são incrivelmente venenosos, a menos que as pequenas sementes sejam removidas com cuidado. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Full of anatomical drawings of rat-people, and musings in arcane Goblinese.": "Cheio de desenhos anatômicos de pessoas-rato e reflexões em Goblinês misterioso."
"Full of meat, corn, and potatoes. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Cheio de carne, milho e batatas. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Full of wool! Way too much wool. You'd get heatstroke if it was too hot!": "Cheio de lã! Muita lã. Você teria insolação se estivesse muito quente!"
"Fun Guile happened to have this ring on when he became a fungus-man, and it allowed him to retain some pre-fungination memories. This created distrust among his brothers, leading to his cruel nickname.": "Acontece que Fun Guile usava esse anel quando se tornou um homem-fungo, e isso lhe permitiu reter algumas memórias pré-funginação. Isso criou desconfiança entre seus irmãos, levando ao seu apelido cruel."
