"Etched with the symbol of a long-lost elven family.": "Gravado com o símbolo de uma família élfica há muito perdida."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a brave and daring pig could wear these.": "Gravados com os símbolos de Dreva e esculpidos em madeira desconhecida, estes sapatos de animais irradiam autoridade sobre a natureza. Somente um porco corajoso e ousado poderia usar isso."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a cow, pure of heart, could wear these.": "Gravados com os símbolos de Dreva e esculpidos em madeira desconhecida, estes sapatos de animais irradiam autoridade sobre a natureza. Somente uma vaca, de coração puro, poderia usar isso."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a deer could wear these.": "Gravados com os símbolos de Dreva e esculpidos em madeira desconhecida, estes sapatos de animais irradiam autoridade sobre a natureza. Somente um cervo poderia usar isso."
"Etched with weird runes of distraction, this shield is especially useful at attracting opponents.": "Gravado com estranhas runas de distração, este escudo é especialmente útil para atrair oponentes."
"Etchings in the Goblin language roughly translate to \"I Bash Really Well\". It sounds better in the native tongue.": "Gravuras na língua Goblin traduzem aproximadamente como \"I Bash Really Well\". Soa melhor na língua nativa."
"Etchings in the Goblin language roughly translate to \"I Don't Care About Your Feelings\". It sounds better in the native tongue.": "Gravuras na língua Goblin traduzem aproximadamente como \"Eu não me importo com seus sentimentos\". Soa melhor na língua nativa."
"Etchings in the Goblin language roughly translate to \"I Have My Rights And I Don't Care About Yours\". It sounds better in the native tongue.": "Gravuras na língua Goblin traduzem aproximadamente como \"Eu tenho meus direitos e não me importo com os seus\". Soa melhor na língua nativa."
"Even the slugs' eggs are poisonous!": "Até os ovos das lesmas são venenosos!"
"Even though this food was designed to last a very long time, it's still been too long.": "Embora este alimento tenha sido projetado para durar muito tempo, ainda faz muito tempo."
