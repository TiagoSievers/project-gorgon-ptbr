"Disgusting fat from an animal.": "Gordura nojenta de um animal."
"Dispels all Fire effects (up to 70/sec). For 30 minutes, gain -10% Fire Vulnerability and +10% Cold Vulnerability": "Dissipa todos os efeitos de Fogo (até 70/s). Por 30 minutos, ganhe -10% de Vulnerabilidade a Fogo e +10% de Vulnerabilidade a Frio"
"Dispels haunting.": "Dissipa a assombração."
"Dispels lycanthropic regeneration effects": "Dissipa efeitos de regeneração licantrópica"
"Dispels most curses, diseases, disfigurements, addictions, and botherments.": "Dissipa a maioria das maldições, doenças, desfigurações, vícios e incômodos."
"Dispels permanent batification.": "Dissipa a batificação permanente."
"Dispels permanent cowification.": "Dissipa a cowificação permanente."
"Dispels permanent deerification.": "Dissipa a deerificação permanente."
"Dispels permanent foxification.": "Dissipa a foxificação permanente."
"Dispels permanent pigification.": "Dissipa a pigificação permanente."
"Dispels permanent rabbitization.": "Dissipa a coelhoização permanente."
"Dispels permanent raven form.": "Dissipa a forma permanente de corvo."
"Dispels permanent skeletonization.": "Dissipa a esqueletização permanente."
"Dispels permanent spiderification.": "Dissipa a aranhaficação permanente."
"Dog meat is an acquired taste, but at least this particular cut looks fresh and juicy.

(Use in Cheap Meat recipes.)": "A carne de cachorro tem um sabor adquirido, mas pelo menos esse corte em particular parece fresco e suculento.

(Use em receitas de carne barata.)"
"Don't drop these in the forest or you'll never find them again.": "Não os deixe cair na floresta ou você nunca mais os encontrará."
"Doubles the rage a monster generates from your attacks for 15 minutes": "Dobra a raiva que um monstro gera com seus ataques por 15 minutos"
"Drab and very old, this robe was once cloth but is now held together by load-bearing cobwebs and magic. Elaborate necromantic symbols have been inscribed inside; the dye of the symbols is long-faded by they can still be detected by the resonant angst one feels when touching the inside of the garment. A slightly newer inscription inside says \"Protect your sanity lest you succumb to the hatred.\"": "Monótono e muito antigo, este manto já foi de tecido, mas agora é mantido unido por teias de aranha e magia. Símbolos necromânticos elaborados foram inscritos no interior; a tinta dos símbolos está desbotada há muito tempo e eles ainda podem ser detectados pela angústia ressonante que se sente ao tocar o interior da roupa. Uma inscrição um pouco mais recente diz \"Proteja sua sanidade para não sucumbir ao ódio\"."
"Drape your mount in glorious lemons!": "Cubra sua montaria com limões gloriosos!"
"Dried \"sticks\" of cinnamon, perfect for spicing many dishes.": "“Paus” de canela secos, perfeitos para temperar muitos pratos."
"Dried but not dead, this exotic mold will spring to life when used in cheesemaking.": "Seco, mas não morto, este molde exótico ganhará vida quando usado na fabricação de queijos."
"Dried meat and fish in a secret blend of spices. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Carne seca e peixe numa mistura secreta de especiarias. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Dried meat from unusual creatures. Salted beyond reckoning. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Carne seca de criaturas incomuns. Salgado além da conta. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Dry most of the way through, but still a bit juicy. This hits the spot.": "Seque a maior parte do tempo, mas ainda um pouco suculento. Isso acerta o alvo."
"During the Elf-Dwarf wars, Dwarven mages created leather-evaporation magic, rendering elves' usual armor obsolete. These ceremonial plate leggings were hurried into battle. Although they're impressively protective, they're still pretty uncomfortable.": "Durante as guerras entre Elfos e Anões, os magos Anões criaram magia de evaporação de couro, tornando obsoletas as armaduras usuais dos elfos. Essas perneiras cerimoniais foram levadas às pressas para a batalha. Embora sejam impressionantemente protetores, ainda são bastante desconfortáveis."
"During the Elf-Orc war, dwarven priests of Umrad made tens of thousands of these for their elven allies.": "Durante a guerra Elfo-Orc, os sacerdotes anões de Umrad fizeram dezenas de milhares destes para seus aliados élficos."
"During Winter's reign in the fae realm, these necklaces are extremely common.": "Durante o reinado de Winter no reino das fadas, esses colares são extremamente comuns."
"Dwarven in design and quite heavy. Insulated against cold, though.": "De design anão e bastante pesado. Isolado contra o frio, no entanto."
"Dwarven Stalwarts wore leg armor like this a thousand years ago, and then handed down for centuries after the Stalwarts were no more, because these pants are great at absorbing punishment.": "Os Anões Stalwarts usavam armaduras para as pernas como esta há mil anos, e então transmitidas por séculos depois que os Stalwarts não existiam mais, porque essas calças são ótimas para absorver punições."
"Dwarves aren't really great at making bows with decent range. But this bow is very sturdy!": "Os anões não são muito bons em fazer arcos com alcance decente. Mas esse arco é muito resistente!"
"Dye used to color a piece of clothing or armor antique white.": "Tintura usada para colorir uma peça de roupa ou armadura de branco antigo."
"Dye used to color a piece of clothing or armor aquamarine.": "Tintura usada para colorir uma peça de roupa ou armadura de água-marinha."
"Dye used to color a piece of clothing or armor azure.": "Tintura usada para colorir uma peça de roupa ou armadura de azul."
"Dye used to color a piece of clothing or armor beige.": "Tintura usada para colorir uma peça de roupa ou armadura de bege."
"Dye used to color a piece of clothing or armor blue violet.": "Tintura usada para colorir uma peça de roupa ou armadura de azul violeta."
"Dye used to color a piece of clothing or armor blue.": "Tintura usada para colorir uma peça de roupa ou armadura de azul."
"Dye used to color a piece of clothing or armor brick red.": "Tintura usada para colorir uma peça de roupa ou armadura de vermelho tijolo."
"Dye used to color a piece of clothing or armor bright violet.": "Tintura usada para colorir uma peça de roupa ou armadura de violeta brilhante."
