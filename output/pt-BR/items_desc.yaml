"Eel prepared in the orcish way: coated in cheese.": "Enguia preparada à maneira orc: coberta com queijo."
"Eh, you've tasted worse.": "Eh, você já provou pior."
"Elegant platemail boots.": "Botas elegantes de cota de malha."
"Elegant silk material.": "Material de seda elegante."
"Elegantly whittled and reinforced wooden shoes. They can easily withstand the weight of an angry buck.": "Sapatos de madeira elegantemente talhados e reforçados. Eles podem suportar facilmente o peso de um veado furioso."
"Elegantly whittled and reinforced wooden shoes. They can easily withstand the weight of an angry heiffer.": "Sapatos de madeira elegantemente talhados e reforçados. Eles podem suportar facilmente o peso de uma novilha furiosa."
"Elves create these staves when they're feeling old. The feeling usually passes after a few decades, though, and then the elves give them away.": "Elfos criam esses cajados quando se sentem velhos. A sensação geralmente passa depois de algumas décadas, e então os elfos os entregam."
"Elves gain +5 Cleanliness for 1 hour": "Elfos ganham +5 de Limpeza por 1 hora"
"Enchanted especially for defense.": "Encantado especialmente para defesa."
"Enchanted to accelerate tossed liquids, this off-hand tool is perfect for chemistry-based fighting.": "Encantada para acelerar o lançamento de líquidos, esta ferramenta improvisada é perfeita para combates baseados em química."
"Enchanted with cold magic, this weapon is uncomfortable to hold at first, but after a while your hand goes numb and it stops being so bothersome... as long as you don't need to use your hand in combat for anything else.": "Encantada com magia fria, esta arma é desconfortável de segurar no início, mas depois de um tempo sua mão fica dormente e ela deixa de ser tão incômoda... desde que você não precise usar a mão em combate para mais nada."
"Enhanced by prayers to Harukita, this shield radiates malice. A necromancy gem is in the center.": "Aprimorado por orações a Harukita, este escudo irradia malícia. Uma joia de necromancia está no centro."
