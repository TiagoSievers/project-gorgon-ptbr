"A subpar goblin helm, dented and worn.": "Um elmo de goblin abaixo da média, amassado e desgastado."
"A substance made of cranium powder, mixed with chemicals that alter its effect.": "Substância feita de pó de crânio, misturada com produtos químicos que alteram seu efeito."
"A sudden transition is seen here: from elegant but large cowshoes to whisper-thin and unobtrusive ones. The secret is in the fit: it's marvelous.": "Uma transição repentina é vista aqui: de sapatos de vaca elegantes, mas grandes, para sapatos finos e discretos. O segredo está no ajuste: é maravilhoso."
"A sugary-sweet snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um lanche açucarado. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A super-thick blue paste that accelerates the leg muscles far beyond their natural capacity.": "Uma pasta azul superespessa que acelera os músculos das pernas muito além da sua capacidade natural."
"A surprisingly complex beer, but... complexity doesn't always taste good.": "Uma cerveja surpreendentemente complexa, mas... a complexidade nem sempre sabe bem."
"A surprisingly fruity dark wine.": "Um vinho escuro surpreendentemente frutado."
"A surprisingly light and flavorful fish dish.": "Um prato de peixe surpreendentemente leve e saboroso."
"A surprisingly pleasant orcish dish. Traditionally brewed in vast quantities to feed an army.": "Um prato orc surpreendentemente agradável. Tradicionalmente fabricado em grandes quantidades para alimentar um exército."
"A sweet and minty disk of hard candy on a handy stick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um disco doce e mentolado de rebuçados em um prático palito. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet and spicy disk of hard candy. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um disco doce e picante de rebuçados. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet and spicy hard cheese.

Cheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo duro doce e picante.

Tipo de queijo: Duro (Este é um lanche. Os lanches se acumulam com os alimentos da refeição; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet appetizer. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um doce aperitivo. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet beer with hints of chocolate.": "Uma cerveja doce com notas de chocolate."
"A sweet brown cheese made with sour cream.

Cheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo marrom doce feito com creme de leite.

Tipo de queijo: Whey (este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet disk of hard candy that tastes of watermelon. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um doce disco de rebuçado com gosto de melancia. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet disk of hard candy. It's supposed to taste like... SOMETHING... but it's impossible to say what. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um disco doce de bala dura. É suposto ter gosto de... ALGO... mas é impossível dizer o quê. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet millet-based candy bar.": "Uma barra de chocolate doce à base de milho."
"A sweet pastry apparently invented by trolls. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um doce aparentemente inventado por trolls. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A sweet syrupy potion that warms the throat when drunk.": "Uma poção doce e xaroposa que aquece a garganta quando bebida."
"A sweet yet savory holiday meal.": "Uma refeição festiva doce, mas saborosa."
"A sweet, relatively palatable variety of vodka. Although it's a traditional dwarven drink, it long ago fell out of favor, and these days dwarves only use it for cooking.": "Uma variedade de vodka doce e relativamente saborosa. Embora seja uma bebida tradicional dos anões, há muito tempo caiu em desuso e hoje em dia os anões só a usam para cozinhar."
"A sweet-and-sour treat.": "Uma delícia agridoce."
"A symbol of Arisetsu adorns this otherwise-uninteresting staff.": "Um símbolo de Arisetsu adorna este cajado de outra forma desinteressante."
"A symbol of Arisetsu has been crudely carved into this crude staff.": "Um símbolo de Arisetsu foi esculpido grosseiramente neste cajado grosseiro."
"A symbol of Arisetsu has been etched into this inelegant staff. Functional but unimpressive.": "Um símbolo de Arisetsu foi gravado neste cajado deselegante. Funcional, mas inexpressivo."
"A symbol of merit granted by the Church of Arisetsu to the faithful. Sometimes they are given in exchange for donations; other times they are awarded for service.": "Símbolo de mérito concedido pela Igreja de Arisetsu aos fiéis. Às vezes são dados em troca de doações; outras vezes, são premiados pelo serviço prestado."
"A syrup of exotic tree seeds that will better attune your senses to the plant realm.": "Um xarope de sementes de árvores exóticas que irá sintonizar melhor os seus sentidos com o reino vegetal."
"A system of belts and harnesses worn around the hips and legs. Keeps equipment close at hand!": "Um sistema de cintos e arneses usados ​​ao redor dos quadris e pernas. Mantém o equipamento à mão!"
"A tacky necklace that calls upon Harukita, the God of Hate, to grant the wearer power. This power is typically used in pretty hateful ways. This necklace also acts as a necromancy gem.": "Um colar cafona que invoca Harukita, o Deus do Ódio, para conceder poder ao usuário. Este poder é normalmente usado de maneiras bastante odiosas. Este colar também atua como uma joia de necromancia."
"A talisman that clips behind a giant bat's ear, making it much smaller and hence less terrifying to some individuals.": "Um talismã que fica preso atrás da orelha de um morcego gigante, tornando-o muito menor e, portanto, menos assustador para alguns indivíduos."
"A talisman to harness necromantic energy.": "Um talismã para aproveitar a energia necromântica."
"A tangy cheddar cheese.

Cheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo cheddar picante.

Tipo de queijo: Semi-Duro (Este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tantalizing reminder of the beach.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Uma lembrança tentadora da praia.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A tarnished ancient coin. It feels heavy and strangely cold.": "Uma moeda antiga manchada. Parece pesado e estranhamente frio."
"A tart that's perfectly sweet and perfectly sour. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma torta perfeitamente doce e perfeitamente azeda. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasteful silver-and-pyrite chain with an opal pendant.": "Uma elegante corrente de prata e pirita com pingente de opala."
"A tasty and complex dish that makes the ingredients go a long way.": "Um prato saboroso e complexo que faz com que os ingredientes percorram um longo caminho."
"A tasty appetizer. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um saboroso aperitivo. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty baked dish with beef and veggies.": "Um saboroso prato assado com carne e vegetais."
"A tasty baked dish with mutton and veggies.": "Um saboroso prato assado com carne de carneiro e vegetais."
"A tasty beverage of cactus juice and some sweet ingredient Selaxi refuses to share. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma saborosa bebida de suco de cacto e algum ingrediente doce que Selaxi se recusa a compartilhar. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty breakfast snack.": "Um saboroso lanche de café da manhã."
"A tasty meal served in flaky pastry.": "Uma saborosa refeição servida em massa folhada."
"A tasty meal that fills you up.": "Uma refeição saborosa que te enche."
"A tasty meal, best eaten hot.": "Uma refeição saborosa, melhor comida quente."
"A tasty meaty snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um saboroso lanche de carne. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty mushroom.": "Um cogumelo saboroso."
"A tasty plate for the hero on a diet. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um prato saboroso para o herói de dieta. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty seasonal snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um saboroso lanche sazonal. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty slab of meat.": "Um saboroso pedaço de carne."
"A tasty snack from the Red Wing casino. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um saboroso lanche do cassino Red Wing. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um lanche saboroso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty soup with little bits of delectable meat floating around in it, infused with demonic essence.

In addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Uma sopa saborosa com pedacinhos de carne deliciosa flutuando nela, infundida com essência demoníaca.

Além dos efeitos alimentares habituais, esta refeição também reduz o efeito do custo de energia do Fogo do Inferno em 25%."
"A tasty vegan snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um saboroso lanche vegano. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A tasty vegetable dish.": "Um saboroso prato de vegetais."
"A tasty well-seasoned meal.": "Uma refeição saborosa e bem temperada."
"A terrible-smelling liquid that actually only tastes unpleasant, not terrible.": "Um líquido com um cheiro terrível que na verdade só tem um gosto desagradável, não terrível."
"A terrifying visage made of hardened scorpion sinews backed by reflective beetle carapaces.": "Um rosto aterrorizante feito de tendões endurecidos de escorpião apoiados por carapaças reflexivas de besouros."
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. This model is especially easy to use. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Um dispositivo terrivelmente complexo que pode analisar os códigos secretos enterrados nas profundezas de certas criaturas. Este modelo é especialmente fácil de usar. Aviso: muitas culturas consideram o estudo da genética um tabu. (Os geneticistas podem manter isso em inventário para ter a opção de analisar geneticamente esse tipo de criatura. Há 5% de chance de o dispositivo quebrar quando usado.)"
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Um dispositivo terrivelmente complexo que pode analisar os códigos secretos enterrados nas profundezas de certas criaturas. Aviso: muitas culturas consideram o estudo da genética um tabu. (Os geneticistas podem manter isso em inventário para ter a opção de analisar geneticamente esse tipo de criatura. Há 5% de chance de o dispositivo quebrar quando usado.)"
"A theoretically delicious mushroom.": "Um cogumelo teoricamente delicioso."
"A thick and ugly metal ring.": "Um anel de metal grosso e feio."
"A thick black paste that requires an iron stomach to drink. If you can keep it down, the potion protects from all types of damage, and even better, it can be combined with potions that protect against specific damage types.": "Uma pasta preta espessa que requer estômago de ferro para beber. Se você conseguir mantê-lo baixo, a poção protege contra todos os tipos de danos e, melhor ainda, pode ser combinada com poções que protegem contra tipos específicos de danos."
"A thick blanket that gives extra padding to a saddle. (Can be used for warmth in an emergency.)": "Uma manta grossa que dá acolchoamento extra à sela. (Pode ser usado para aquecimento em caso de emergência.)"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cold-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue frio. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cool-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue frio. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Fire-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento Sangue de Fogo. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Hot-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue quente. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Warm-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento de sangue quente. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecer em um"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with an Ice-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an emergency.)": "Uma manta grossa que dá calor e conforto à égua durante a gravidez. Esta manta é adequada para éguas com temperamento Ice-Blooded. Dê a um cavalo estabulado durante a fase de gestação para acelerar a gestação em 24 horas. (Também pode ser usado para aquecimento em caso de emergência.)"
"A thick blue paste that accelerates the leg muscles beyond their natural capacity.": "Uma pasta azul espessa que acelera os músculos das pernas além da sua capacidade natural."
"A thick but attractive buckle.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela grossa, mas atraente.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"A thick dwarven helm. Etched inside is a quote: \"Where shall it be? Point me and I shall go. - Gondeem\"": "Um elmo anão grosso. Gravada dentro está uma citação: \"Onde estará? Aponte-me e eu irei. - Gondeem\""
"A thick gold chain with a medallion shaped like a pair of wings.": "Uma grossa corrente de ouro com um medalhão em forma de par de asas."
"A thick green paste that smells of pine needles and dirt.": "Uma pasta verde espessa que cheira a agulhas de pinheiro e sujeira."
"A thick greenish goo. It tastes delicious! Useful in brewing and cooking, and very occasionally in alchemy.": "Uma gosma espessa e esverdeada. Tem um gosto delicioso! Útil na fabricação de cerveja e culinária e, ocasionalmente, na alquimia."
"A thick layer of fungal \"skin\" peeled off of a dead fungus-man.": "Uma espessa camada de \"pele\" fúngica foi retirada de um homem-fungo morto."
"A thick layer of mold lines the inside, helping to seal the helmet to your head.": "Uma espessa camada de molde reveste o interior, ajudando a selar o capacete na cabeça."
"A thick onyx ring. Druidic symbols are etched along the inside, including the easily-recognizable symbol of Dreva: a shark.": "Um anel grosso de ônix. Símbolos druidas estão gravados no interior, incluindo o símbolo facilmente reconhecível de Dreva: um tubarão."
"A thick seasonal drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma bebida sazonal espessa. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A thick set of notes detailing how guild storage should be used. Can be installed in a guild hall to allow guildmates to purchase guild storage slots from the convenience of the hall.": "Um conjunto denso de notas detalhando como o armazenamento da guilda deve ser usado. Pode ser instalado em um salão da guilda para permitir que os membros da guilda comprem slots de armazenamento da guilda na conveniência do salão."
"A thick stew that fills you up.": "Um ensopado grosso que te enche."
"A thick stick. Really thick.": "Uma vara grossa. Muito grosso."
"A thick supportive cushion, perfect for lining boxes and dresser drawers.": "Uma almofada grossa de suporte, perfeita para forrar caixas e gavetas de cômodas."
"A thick treatise intended for those interested in breeding horses.": "Um tratado denso destinado aos interessados ​​na criação de cavalos."
"A thick wooden shield, etched with magical runes.": "Um grosso escudo de madeira, gravado com runas mágicas."
"A thick, cumbersome silver medallion etched with a simple drawing of a smiling elf's face.": "Um medalhão de prata grosso e pesado gravado com um desenho simples do rosto sorridente de um elfo."
"A thick, fairly toxic mushroom that can be made edible through care.": "Um cogumelo espesso e bastante tóxico que pode se tornar comestível com cuidado."
"A thick, hearty steak with a side of limp greens.": "Um bife grosso e farto com acompanhamento de verduras moles."
"A thick, ugly buckle.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela grossa e feia.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"A thick-brothed stew with huge chunks of tender meat. The color is a bit off-putting, but it's pretty tasty.": "Um ensopado em caldo grosso com enormes pedaços de carne tenra. A cor é um pouco desanimadora, mas é bem gostosa."
"A thin and non-descript blade that's been designed to maximize the impact of applied poisons.": "Uma lâmina fina e indescritível que foi projetada para maximizar o impacto dos venenos aplicados."
"A thin art book that contains drawings of elves au naturel.": "Um livro de arte fina que contém desenhos de elfos ao natural."
"A thin blanket embroidered with a depiction of a beaming sun. This style of blanket is often given out by followers of Arisetsu, the god of warmth and hope.": "Um cobertor fino bordado com a representação de um sol radiante. Este estilo de cobertor é frequentemente oferecido pelos seguidores de Arisetsu, o deus do calor e da esperança."
"A thin book.": "Um livro fino."
"A thin fluid used to create augmentation oils (for level 30 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 30)."
"A thin fluid used to create augmentation oils (for level 40 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 40)."
"A thin fluid used to create augmentation oils (for level 50 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 50)."
"A thin fluid used to create augmentation oils (for level 60 effects).": "Um fluido fino usado para criar óleos de aumento (para efeitos de nível 60)."
"A thin metal chain, now broken. It wasn't very high-quality in the first place, either.": "Uma fina corrente de metal, agora quebrada. Em primeiro lugar, também não era de muito alta qualidade."
"A thin ring made of white gold.": "Um anel fino feito de ouro branco."
"A thin scroll of goblin verse, focusing on the beauty of hard work, the wonders of nature, and the fairness of slavery. It has little value.": "Um fino pergaminho de versos goblins, enfocando a beleza do trabalho duro, as maravilhas da natureza e a justiça da escravidão. Tem pouco valor."
"A thin tube full of liquid. Apparently you jab it into your skin to use it -- a horrific idea that only a mantis could dream up.

Sharpen is supposedly not addictive, but higher-quality doses are only effective if the recipient has well-honed survival instincts.": "Um tubo fino cheio de líquido. Aparentemente, você o enfia na pele para usá-lo – uma ideia horrível que só um louva-a-deus poderia imaginar.

Supostamente, Sharpen não vicia, mas doses de alta qualidade só são eficazes se o destinatário tiver instintos de sobrevivência bem apurados."
"A thin tube full of liquid. Apparently you jab it into your skin to use it -- a horrific idea that only a mantis could dream up.

Sharpen is supposedly not addictive.": "Um tubo fino cheio de líquido. Aparentemente, você o enfia na pele para usá-lo – uma ideia horrível que só um louva-a-deus poderia imaginar.

Sharpen supostamente não é viciante."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates blue sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria brilhos azuis por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates green sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria brilhos verdes por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates red sparkler for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele cria um brilho vermelho por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it sparkles for a few seconds, and makes you feel oddly patriotic.": "Um tubo fino do que você tem certeza que é mágico. Quando você bate contra uma superfície dura, ele brilha por alguns segundos e faz você se sentir estranhamente patriótico."
"A thin volume of poetry by the goblin poet Gruzark. It has a homely, earthly feel. Which is poet-speak for \"it sucks.\" It has some exciting bits, though. Better than nothing.": "Um fino volume de poesia do poeta duende Gruzark. Tem uma sensação caseira e terrena. O que é linguagem de poeta para \"é uma merda\". No entanto, tem algumas partes emocionantes. Melhor do que nada."
"A thin volume of poetry. No pictures at all.": "Um fino volume de poesia. Nenhuma foto."
"A thin wire ring that smells awful.": "Um anel de arame fino que cheira horrível."
"A thorn from a flower.": "Um espinho de uma flor."
"A thorny protrusion from a spriggan weed or plant.": "Uma saliência espinhosa de uma erva daninha ou planta spriggan."
"A time-bending drink that allows one to perceive fairies before they exist.": "Uma bebida que altera o tempo e permite perceber as fadas antes que elas existam."
"A tiny batch of adhesive. It's used by crafters such as carpenters and fletchers.": "Um pequeno lote de adesivo. É usado por artesãos como carpinteiros e flecheiros."
"A tiny bit of unrefined ore. You'd need a bunch of these to make anything useful from them.": "Um pouquinho de minério não refinado. Você precisaria de um monte deles para fazer algo útil com eles."
"A tiny chunk of magma that has been magically prevented from cooling. Very weird.": "Um pequeno pedaço de magma que foi magicamente impedido de esfriar. Muito estranho."
"A tiny enchanted saw on a chain. But it's not just an amulet: upon command, the tiny saw can cut lumber at high speed! (This item acts as a handsaw.)": "Uma pequena serra encantada em uma corrente. Mas não é apenas um amuleto: sob comando, a pequena serra pode cortar madeira em alta velocidade! (Este item funciona como um serrote.)"
"A tiny harp. Sounds pretty good.": "Uma pequena harpa. Parece muito bom."
"A tiny key made of jade.": "Uma pequena chave feita de jade."
"A tiny metal fist on a chain.": "Um pequeno punho de metal preso a uma corrente."
"A tiny metal fist squeezing a man, who seems unperturbed. That's craftsmanship!": "Um pequeno punho de metal apertando um homem que parece imperturbável. Isso é artesanato!"
"A tiny metal foot on a chain.": "Um pequeno pé de metal preso a uma corrente."
"A tiny pinch of saltpeter, a strange substance with many magical uses.": "Uma pequena pitada de salitre, uma substância estranha com muitos usos mágicos."
"A tiny puff of animated air. Somehow it stays coherent.": "Uma pequena lufada de ar animado. De alguma forma, permanece coerente."
"A tiny puff of fetid air. Somehow it stays coherent.": "Uma pequena lufada de ar fétido. De alguma forma, permanece coerente."
"A tiny puff of humid air. Somehow it stays coherent.": "Uma pequena lufada de ar úmido. De alguma forma, permanece coerente."
"A tiny ring made of an otherworldly metal.": "Um pequeno anel feito de um metal de outro mundo."
"A tiny short-lived light used for decoration.

Tealights are non-interactible. They last for 5 minutes. You can deploy up to 5 tealights at a time.": "Uma pequena luz de curta duração usada para decoração.

Tealights não são interativos. Eles duram 5 minutos. Você pode implantar até cinco tealights por vez."
"A tiny tart with cinnamon-pumpkin filling.": "Uma pequena torta com recheio de canela e abóbora."
"A tiny vial full of ooze of some sort.": "Um pequeno frasco cheio de algum tipo de lodo."
"A tiny vial of freezing-cold liquid.": "Um pequeno frasco de líquido gelado."
"A token of Ri-Shin's favor. The small branch is still fresh, with quite a few leaves. (See Snowleaf at the Shrine of Ri-Shin in Kur Mountains to trade these tokens for items.)": "Um sinal do favor de Ri-Shin. O pequeno galho ainda está fresco, com algumas folhas. (Veja Snowleaf no Santuário de Ri-Shin nas Montanhas Kur para trocar essas fichas por itens.)"
"A tool used aboard Fae ships during the repair of hull damage. It's quite heavy!": "Uma ferramenta usada a bordo de naves Fae durante o reparo de danos no casco. É bem pesado!"
"A tool used by rakshasa housebuilders, who like to hammer nails with their fists. This one has been cleaned up and enchanted.": "Uma ferramenta usada por construtores rakshasa, que gostam de martelar pregos com os punhos. Este foi limpo e encantado."
"A tophat, to make your mount look extra dapper.": "Uma cartola, para deixar sua montaria ainda mais elegante."
"A topical balm beloved by ranalon, who apply it to their skin continuously. Its effects are much weaker when applied to non-ranalon, but it is, at least, safe to use.": "Um bálsamo tópico apreciado por Ranalon, que o aplica continuamente na pele. Seus efeitos são muito mais fracos quando aplicados ao não ranalon, mas é, pelo menos, seguro de usar."
"A torn-off claw of a Demonic Swarmer. It twitches from time to time.": "Uma garra arrancada de um Enxame Demoníaco. Ele se contorce de vez em quando."
"A torso-shaped piece of fungal \"flesh\" from a fungus-man.": "Um pedaço de \"carne\" fúngica em forma de torso de um homem-fungo."
"A tough but highly portable snack consisting of chewy shark meat in a fried pepper husk. It's an acquired taste.": "Um lanche resistente, mas altamente portátil, que consiste em carne de tubarão em borracha com casca de pimenta frita. É um gosto adquirido."
"A tough head covering. Ugly, but practical.": "Uma cobertura resistente para a cabeça. Feio, mas prático."
"A tough little helmet.": "Um pequeno capacete resistente."
"A toxic weed of dubious utility.": "Uma erva tóxica de utilidade duvidosa."
"A traditional druidic training staff has been augmented with dozens of arcane sigils and then dipped in ... something waxy. Probably something organic. Best not to contemplate.": "Uma equipe de treinamento druida tradicional foi aumentada com dezenas de sigilos arcanos e depois mergulhada em... algo ceroso. Provavelmente algo orgânico. Melhor não contemplar."
"A transferrable day-pass to visit the parts of Rahu that are usually off-limits to tourists. While this permit lasts, the citizens of Rahu will not attack you and shopkeepers will generally be willing to deal with you. The pass becomes invalidated if you attack any Rahu citizen, and the plateau where the Onkara train is still off-limits.": "Um passe diário transferível para visitar as partes de Rahu que geralmente são proibidas aos turistas. Enquanto esta licença durar, os cidadãos de Rahu não irão atacá-lo e os lojistas geralmente estarão dispostos a negociar com você. O passe será invalidado se você atacar qualquer cidadão de Rahu, e o planalto onde o trem Onkara ainda estiver fora dos limites."
"A translucent handkerchief from a ghost. It should have turned into ectoplasm when separated from the ghost, but somehow it hasn't. Eerie.": "Um lenço translúcido de um fantasma. Deveria ter se transformado em ectoplasma quando separado do fantasma, mas de alguma forma isso não aconteceu. Sinistro."
"A trinket that augments various kinds of archery techniques.": "Uma bugiganga que aprimora vários tipos de técnicas de tiro com arco."
"A true masterpiece of potato-making. Well, actually, the potato itself is a little soggy. But the toppings are masterful!": "Uma verdadeira obra-prima da fabricação de batatas. Bem, na verdade, a batata em si está um pouco encharcada. Mas as coberturas são magistrais!"
"A tuft of fur from a manticore 'mane'.": "Um tufo de pêlo de uma 'juba' de manticora."
"A type of stone often found near demonspawn.": "Um tipo de pedra frequentemente encontrada perto de criaturas demoníacas."
"A typical orcish-style fishing device. A very long string is stored on a winchable spool. Bizarre.

(Keep this in your inventory in order to use Angling abilities.)": "Um típico dispositivo de pesca de estilo orc. Uma corda muito longa é armazenada em um carretel que pode ser guinchado. Bizarro.

(Mantenha isso em seu inventário para usar as habilidades de pesca.)"
"A uncommon starfish.": "Uma estrela do mar incomum."
"A useful form of rendered fat.": "Uma forma útil de gordura fundida."
"A useful spice for cooking. It has an aromatic, warm and slightly bitter taste.": "Um tempero útil para cozinhar. Apresenta um sabor aromático, quente e ligeiramente amargo."
"A vaguely grape-flavored disk of candy on a small stick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um disco de doce com vagamente sabor de uva em um pequeno palito. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A vaguely meat-flavored swill made all the more horrid with the addition of lumps of fur.": "Uma lavagem com sabor vagamente de carne tornava-se ainda mais horrível com a adição de pedaços de pele."
"A variety of morel, tasty in mushroom dishes and potent in alchemy as well.": "Uma variedade de morel, saboroso em pratos de cogumelos e potente também na alquimia."
"A variety of mycena mushroom with an especially ... unique... taste.": "Uma variedade de cogumelo mycena com um sabor especialmente...único."
"A Veilmoor clan promotional weapon. The blade psychically screams on contact with enemies.": "Uma arma promocional do clã Veilmoor. A lâmina grita psiquicamente ao entrar em contato com os inimigos."
"A versatile knife for skinning or butchering. (Keep it in your inventory and you'll be given the option to skin and/or butcher the corpses of some enemies.)": "Uma faca versátil para esfolar ou cortar. (Mantenha-o em seu inventário e você terá a opção de esfolar e/ou massacrar os cadáveres de alguns inimigos.)"
"A versatile knife for skinning, butchering, oyster-opening, or skull extraction. (Keep it in your inventory and you'll be given the option to skin, butcher, shuck, and/or extract the skull of some enemies.)": "Uma faca versátil para esfolar, cortar, abrir ostras ou extrair crânios. (Mantenha-o em seu inventário e você terá a opção de esfolar, abater, descascar e/ou extrair o crânio de alguns inimigos.)"
"A very basic animal cage designed for transferring pets, intended for extremely short-term use.

This one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 48 hours. If the animal is not rehomed in a stable by then, it will escape and be lost forever.
<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Uma gaiola para animais muito básica, projetada para a transferência de animais de estimação, destinada ao uso por períodos extremamente curtos.

Este contêiner descartável pode conter qualquer animal de qualidade para animais de estimação (não reprodutor) criado em cativeiro (não capturado na natureza) por até 48 horas. Se o animal não for realojado em um estábulo até lá, ele escapará e se perderá para sempre.
<i>[Você pode usar este item em um animal de estimação no estábulo visitando um mestre de estábulo. Procure o botão \"Usar Item...\" na tela estável.]</i>"
"A very basic mild cheddar cheese.

Cheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo cheddar suave muito básico.

Tipo de queijo: Semi-Duro (Este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A very complicated device that can help with tricky pathology inquiries. (+10 to your effective skill when autopsying a corpse.)": "Um dispositivo muito complicado que pode ajudar em investigações patológicas complicadas. (+10 para sua habilidade efetiva ao autopsiar um cadáver.)"
"A very dry wine that's quite drinkable.": "Um vinho muito seco e bastante bebível."
"A very hard cheese, suitable for grating as a topping.

Cheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Queijo muito duro, adequado para ralar como cobertura.

Tipo de queijo: Duro (Este é um lanche. Os lanches se acumulam com os alimentos da refeição; você pode comer um de cada e obter os benefícios de ambos.)"
"A very hearty breakfast!": "Um café da manhã bem farto!"
"A very heavy shield.": "Um escudo muito pesado."
"A very large, well-made brass nail. Useful in Carpentry.": "Um prego de latão muito grande e bem feito. Útil em Carpintaria."
"A very nasty very heavy stick.": "Uma vara muito desagradável e pesada."
"A very old book. It looks to be a hand-scribed copy of a book called the Mnemonix Index for the Superficially Undead.": "Um livro muito antigo. Parece ser uma cópia manuscrita de um livro chamado Índice Mnemonix para Mortos Superficialmente."
"A very old goblet that remains cold to the touch even in hot weather. It's made of a strange metal that might be worth studying.": "Uma taça muito antiga que permanece fria ao toque mesmo em climas quentes. É feito de um metal estranho que talvez valha a pena estudar."
"A very old locket with a portrait of a human woman painted inside. The artistic quality is quite high. It is engraved, \"Don't cry, but don't forget. Love always, Caroline.\"": "Um medalhão muito antigo com o retrato de uma mulher humana pintado no interior. A qualidade artística é bastante elevada. Está gravado: \"Não chore, mas não esqueça. Ame sempre, Caroline.\""
"A very old style of Dwarven sword design.": "Um estilo muito antigo de design de espada anã."
"A very ornate belt buckle depicting a hammer.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela de cinto muito ornamentada representando um martelo.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"A very potent Elvish brew. Bitter as can be, but it warms you right up. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma bebida élfica muito potente. Por mais amargo que possa ser, mas aquece você. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A very rough alcoholic beverage. Some say you grow to like the taste, but others say that's just your tastebuds dying from the pain.": "Uma bebida alcoólica muito áspera. Alguns dizem que você passa a gostar do sabor, mas outros dizem que são apenas suas papilas gustativas morrendo de dor."
"A very sharp fist-weapon.": "Uma arma de punho muito afiada."
"A very simple elven-style hunting bow.": "Um arco de caça de estilo élfico muito simples."
"A very simple version of the classic human cookie. Edible, but probably best used for decoration. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma versão muito simples do clássico biscoito humano. Comestível, mas provavelmente melhor usado para decoração. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A very spicy version of Aromatic Chicken. Not for the faint of heart.": "Uma versão bem picante de Frango Aromático. Não para os fracos de coração."
"A very sweet brown cheese made with sour cream.

Cheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um queijo marrom muito doce feito com creme de leite.

Tipo de queijo: Whey (este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A very thorough explanation of how to find a huge hoard of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado na região de Eltibule."
"A very thorough explanation of how to find a huge hoard of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a huge hoard of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar um enorme tesouro enterrado ou afundado perto de Sun Vale."
"A very thorough explanation of how to find a large amount of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados na região de Eltibule."
"A very thorough explanation of how to find a large amount of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados no deserto de Ilmari."
"A very thorough explanation of how to find a large amount of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar uma grande quantidade de tesouros enterrados ou afundados perto de Sun Vale."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado na região de Eltibule."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a legendary hoard of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar um tesouro lendário enterrado ou afundado perto de Sun Vale."
"A very thorough explanation of how to find a small amount of treasure buried in the Eltibule region.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado na região de Eltibule."
"A very thorough explanation of how to find a small amount of treasure buried in the Ilmari Desert.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado no deserto de Ilmari."
"A very thorough explanation of how to find a small amount of treasure buried or sunken near Sun Vale.": "Uma explicação muito completa de como encontrar uma pequena quantidade de tesouro enterrado ou afundado perto de Sun Vale."
"A very unconventional salad that's surprisingly energizing.": "Uma salada pouco convencional e surpreendentemente energizante."
"A vial of Fruitbreath Juice.": "Um frasco de suco Fruitbreath."
"A vial of the strange substance known as mercury or quicksilver. It is used in hatmaking, gadget creation, and alchemy. Under no circumstances should it be drunk.": "Um frasco da estranha substância conhecida como mercúrio ou mercúrio. É usado na fabricação de chapéus, criação de dispositivos e alquimia. Sob nenhuma circunstância deve ser bebido."
"A viceral odor experience that causes you to clench your fists in exuberance.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Uma experiência de odor viceral que faz você cerrar os punhos de exuberância.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A vile-tasting potion used by some orcs and rakshasa.": "Uma poção de sabor horrível usada por alguns orcs e rakshasa."
"A volume of elven verse. The rhymes are forced and the lines scan poorly, but hey, it's elven verse -- somebody will want this junk.": "Um volume de versos élficos. As rimas são forçadas e os versos são mal lidos, mas ei, são versos élficos - alguém vai querer esse lixo."
"A volume of the famous 37-book series describing the history of the gods. This edition includes annotations and commentary from the Council.": "Um volume da famosa série de 37 livros que descreve a história dos deuses. Esta edição inclui anotações e comentários do Concílio."
"A voucher for 10 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 10 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 100 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 100 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 25 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 25 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A voucher for 50 Live Event Credits. Credits will be given to the person that uses this voucher.": "Um voucher para 50 créditos de eventos ao vivo. Os créditos serão dados à pessoa que utilizar este voucher."
"A warm and pleasant ring that doesn't really seem too fearsome. Just nice.": "Um anel quente e agradável que não parece muito assustador. Muito legal."
"A warm bowl of soup.": "Uma tigela de sopa quente."
"A warm crystal that seems to constantly grow and shrink.": "Um cristal quente que parece crescer e encolher constantemente."
"A warm nourishing meal.": "Uma refeição quente e nutritiva."
"A warm piece of magical crystal.": "Um pedaço quente de cristal mágico."
"A warm sludgey liquid.": "Um líquido quente e lamacento."
"A warm sweet dessert meal.": "Uma sobremesa quente e doce."
"A washed-rind cheese with a pleasant smell and hard consistency.

Cheese Type: White": "Queijo de casca lavada, cheiro agradável e consistência dura.

Tipo de Queijo: Branco"
"A washed-rind cheese with a pungent odor and tangy taste.

Cheese Type: White": "Queijo de casca lavada, odor pungente e sabor picante.

Tipo de Queijo: Branco"
"A watery fruit from the distant crone lands. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma fruta aquosa das terras distantes da velha. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A watery soup. Edible but not at all inspiring.": "Uma sopa aguada. Comestível, mas nada inspirador."
"A wax-sealed decanter full of liquified bones.": "Uma garrafa selada com cera cheia de ossos liquefeitos."
"A weapon design from a far-away land.": "Um projeto de arma de uma terra distante."
"A weapon for experienced staff-fighters who wish to get a little more oomph out of their lunges.": "Uma arma para lutadores experientes que desejam obter um pouco mais de força em suas estocadas."
"A weapon made by a ratkin martial artist. It fits poorly to other races' hands, but it's nothing a little adhesive can't fix.": "Uma arma feita por um artista marcial ratkin. Não cabe bem nas mãos de outras raças, mas não é nada que um pouco de adesivo não resolva."
"A weapon made by ratkin martial artists. Ratkins are renowned for their use of poison.": "Uma arma feita por artistas marciais ratkin. Ratkins são conhecidos pelo uso de veneno."
"A weapon whose appearance belies the skill of the ratkin crafter. Making a blade this sharp out of junk metal isn't easy.": "Uma arma cuja aparência desmente a habilidade do artesão ratkin. Fazer uma lâmina tão afiada com lixo não é fácil."
"A weed with inedible berries.": "Uma erva daninha com frutos não comestíveis."
"A weighty shield.": "Um escudo pesado."
"A weird container made of crystal. Inside is the essence of knowledge in liquid form. Used by the most advanced crafters.": "Um estranho recipiente feito de cristal. Dentro está a essência do conhecimento em forma líquida. Usado pelos artesãos mais avançados."
"A weird elven rune on a chain. Unlike most elven rune amulets, this one was mass-produced in Verta for export to other lands. Not exactly a triumph of art, but its protective magic is undeniable.": "Uma runa élfica estranha em uma corrente. Ao contrário da maioria dos amuletos rúnicos élficos, este foi produzido em massa em Verta para exportação para outras terras. Não é exatamente um triunfo da arte, mas a sua magia protetora é inegável."
"A weird mineral found near the rubywall crystals; the origin is completely unknown, and the name seems to be a misnomer.": "Um mineral estranho encontrado perto dos cristais da parede de rubi; a origem é completamente desconhecida e o nome parece ser um nome impróprio."
"A weird old coin that seems strangely heavy.": "Uma moeda antiga e estranha que parece estranhamente pesada."
"A weird puff of animated air. It's odd how it doesn't disperse.": "Uma estranha lufada de ar animado. É estranho como ele não se dispersa."
"A weird symbol carved into a strange metal.": "Um símbolo estranho esculpido em um metal estranho."
"A well crafted music box that sounds like a harp for animal forms so they can play music for their plants. This box looks sturdy enough for a few uses before it will break. Don't forget to start it up after you deploy it!
<b>IMPORTANT:</b> You must be in beast form for at least 3 hours of in-game time before you can deploy this item. Leaving beast form after deploying will cause you to lose control of the box. Limit one music box deployment per account at a time.": "Uma caixa de música bem trabalhada que soa como uma harpa para formas de animais, para que possam tocar música para suas plantas. Esta caixa parece resistente o suficiente para alguns usos antes de quebrar. Não se esqueça de iniciá-lo depois de implantá-lo!
<b>IMPORTANTE:</b> Você deve estar na forma de besta por pelo menos 3 horas de jogo antes de poder implantar este item. Sair da forma de besta após a implantação fará com que você perca o controle da caixa. Limite a implantação de uma caixa de música por conta por vez."
"A well-balanced knife designed for throwing. (Used with the Knife combat skill.)": "Uma faca bem equilibrada projetada para arremesso. (Usado com a habilidade de combate Faca.)"
"A well-bundled roll of crude leather.": "Um rolo bem empacotado de couro bruto."
"A well-known painting by the dwarven artist Kot Bhenul. Signed and numbered! This is a great find.": "Uma conhecida pintura do artista anão Kot Bhenul. Assinado e numerado! Este é um ótimo achado."
"A well-made but simple lute, perfect for beginners.": "Um alaúde bem feito, mas simples, perfeito para iniciantes."
"A well-made helmet that will keep you alive in combat. But you'll sweat profusely in it, and you don't want to know what it's going to do to your hair.": "Um capacete bem feito que o manterá vivo em combate. Mas você vai suar muito com isso e não quer saber o que isso vai fazer com seu cabelo."
"A well-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma escolha de mineração bem feita de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"A well-made omelet is an attractive and delicious meal. This one's full of ham and cheese.": "Uma omelete bem feita é uma refeição atraente e deliciosa. Este está cheio de presunto e queijo."
"A well-made wooden mesh, useful for cages, pens, trellises, and so on.": "Uma malha de madeira bem feita, útil para gaiolas, currais, treliças e assim por diante."
"A well-preserved and salted fish, perfect for snacking. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um peixe bem conservado e salgado, ideal para petiscar. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A well-preserved and salted fish. An ... interesting... snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um peixe bem conservado e salgado. Um... interessante... lanche. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A well-preserved and salted fish. This makes an amazing snack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um peixe bem conservado e salgado. Isso faz um lanche incrível! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A well-preserved book of poems.": "Um livro de poemas bem preservado."
"A well-preserved volume of poems.": "Um volume de poemas bem preservado."
"A well-recognized hat in spider culture that denotes friendliness and approachability. The hat has been enhanced with powerful magic that shrinks the spider to seem less scary.": "Um chapéu bem conhecido na cultura das aranhas que denota simpatia e acessibilidade. O chapéu foi aprimorado com uma magia poderosa que encolhe a aranha para parecer menos assustadora."
"A well-recognized hat in Spider culture. This denotes that the spider wearing it is quite friendly, and not to be feared.": "Um chapéu bem conhecido na cultura Spider. Isso denota que a aranha que o usa é bastante amigável e não deve ser temida."
"A well-roasted turkey leg makes a great snack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma perna de peru bem assada é um ótimo lanche! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A werewolf wore these boots while transforming a few too many times. The armor quality is totally shot, but it still has some value.": "Um lobisomem usou essas botas enquanto se transformava muitas vezes. A qualidade da armadura é totalmente fraca, mas ainda tem algum valor."
"A whimsically-named ranalon dish from the Povus region.": "Um prato de ranalon com nome caprichoso da região de Povus."
"A white stone with dark green veins, the moss agate is also known as the Gardener's Talisman.

Associated Primary Skill: Hammer

Associated Secondary Skills: Gardening, Mycology": "Pedra branca com veios verde-escuros, a ágata musgo também é conhecida como Talismã do Jardineiro.

Habilidade Primária Associada: Martelo

Habilidades Secundárias Associadas: Jardinagem, Micologia"
"A white-label horn sold as part of Povus's product line. It's unclear who actually created it.": "Uma buzina de marca branca vendida como parte da linha de produtos da Povus. Não está claro quem realmente o criou."
"A white-mold cheese with a bland taste. It's known for having small holes in the final cheese.

Cheese Type: White": "Queijo de mofo branco e sabor suave. É conhecido por apresentar pequenos furos no queijo final.

Tipo de Queijo: Branco"
"A white-mold cheese with a complex taste.

Cheese Type: White": "Queijo de bolor branco e sabor complexo.

Tipo de Queijo: Branco"
"A white-mold cheese with a pasty and nutty flavor.

Cheese Type: White": "Queijo de mofo branco com sabor pastoso e de nozes.

Tipo de Queijo: Branco"
"A white-mold cheese with a savory taste.

Cheese Type: White": "Queijo de mofo branco com sabor saboroso.

Tipo de Queijo: Branco"
"A wintry woodland scene featuring a little elf girl crying. You don't recognize the artist's name, but it dates back at least 1300 years, so that's something.": "Uma cena de floresta invernal com uma garotinha elfa chorando. Você não reconhece o nome do artista, mas ele data de pelo menos 1.300 anos, então isso é alguma coisa."
"A wisp of demonic essence. Gather enough of these and you can combine their energies into a Demonic Essence.": "Um fio de essência demoníaca. Reúna um número suficiente deles e você poderá combinar suas energias em uma Essência Demoníaca."
"A wooden instrument that was invented by lumberjacks in Sedgewick Forest to ward off treant saplings.": "Um instrumento de madeira que foi inventado por lenhadores na Floresta de Sedgewick para afastar mudas de árvores."
"A wooden instrument with terrible and toxic enchantments. Even touching it to your lips causes slight pain.": "Um instrumento de madeira com encantamentos terríveis e tóxicos. Até mesmo tocá-lo nos lábios causa uma leve dor."
"A wooden ring designed to be worn at the base of a fox's tail.": "Um anel de madeira projetado para ser usado na base da cauda de uma raposa."
"A wool hat made by a sentient sheep. It's very comfy!": "Um gorro de lã feito por uma ovelha consciente. É muito confortável!"
"A wretched odor of lingering dissatistfaction and malaise.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um odor miserável de insatisfação e mal-estar persistentes.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A yeti invention of boiled mutton in matted fur. The stench is impressive. The taste is unique, and not as bad as you'd expect.": "Uma invenção do Yeti de carneiro cozido com pele emaranhada. O fedor é impressionante. O sabor é único e não tão ruim quanto você esperaria."
"About a million of these enchanted pants were made by the Crone Hegemony for ratkin revolutionaries who said they were going to overthrow their gob-land masters. Ultimately the revolutionaries freed themselves and their friends, then called it quits and traded their armor away.": "Cerca de um milhão dessas calças encantadas foram feitas pela Hegemonia Crone para revolucionários ratkin que diziam que iriam derrubar seus senhores da terra gob. Em última análise, os revolucionários libertaram-se a si próprios e aos seus amigos, depois desistiram e trocaram as suas armaduras."
"Absurdly strong orcish coffee. Drunk before battle, or after battle, but never for its taste. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Café orc absurdamente forte. Bêbado antes ou depois da batalha, mas nunca pelo sabor. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Activate nearby Ranalon Beacon": "Ative o farol Ranalon próximo"
"Activate this gross beacon in a certain place to let ranalon know it's time to invade.": "Ative este farol bruto em um determinado local para avisar Ranalon que é hora de invadir."
"Actually made by dwarven priests in New Aufghel and rebranded by Povus smiths, who did not specialize in weaponry.": "Na verdade, feito por sacerdotes anões em New Aufghel e rebatizado por ferreiros Povus, que não se especializavam em armamentos."
"Adds one point to the Writ Challenge score": "Adiciona um ponto à pontuação do Writ Challenge"
"Adorned with dead leaves that rustle to their own magical wind.": "Adornada com folhas mortas que farfalham ao som de seu próprio vento mágico."
"Adorned with little glyphs of brains, but the brains have been crossed out.": "Adornado com pequenos glifos de cérebros, mas os cérebros foram riscados."
"After barely losing the annual Statehelm archery contest, Tamoko gained fame when he returned the following year and used his newly-invented beaker to win the grand prize. The beaker design has since been replicated with his blessing, delighting archery fans but causing a terrible schism in the archery-contest establishment, many of whom consider battle chemistry to be \"like cheating\".": "Depois de perder por pouco o concurso anual de tiro com arco Statehelm, Tamoko ganhou fama quando voltou no ano seguinte e usou seu copo recém-inventado para ganhar o grande prêmio. O design do copo foi replicado desde então com sua bênção, deliciando os fãs de tiro com arco, mas causando um terrível cisma no estabelecimento de competições de tiro com arco, muitos dos quais consideram a química da batalha \"como trapaça\"."
"After his brother burned to death, Vagreef spent years mastering Fire Magic to create suits of fire-resistance armor. He planned to manufacture these suits for his entire gang of bandits, but he only managed to make one prototype suit before he was murdered. This was his helmet.": "Depois que seu irmão morreu queimado, Vagreef passou anos dominando a Magia do Fogo para criar armaduras resistentes ao fogo. Ele planejava fabricar esses trajes para toda a sua gangue de bandidos, mas só conseguiu fazer um protótipo antes de ser assassinado. Este era o capacete dele."
"After-effects reduce damage for a time but can be countered with more Bounceweed": "Os efeitos posteriores reduzem o dano por um tempo, mas podem ser combatidos com mais Bounceweed"
"After-effects reduce damage for a time but can be countered with more Cranium Powder": "Os efeitos posteriores reduzem o dano por um tempo, mas podem ser combatidos com mais Pó de Crânio"
"After-effects reduce Max Power and Power Regeneration for a time, but can be countered by drinking more Pineal Juice": "Os efeitos posteriores reduzem a potência máxima e a regeneração de energia por um tempo, mas podem ser combatidos bebendo mais suco de pineal"
"Aggressively minty!": "Agressivamente mentolado!"
"Aggressively sour!": "Agressivamente azedo!"
"Agrashab used this club for a while before he found a better one.": "Agrashab usou este clube por um tempo antes de encontrar um melhor."
"All animal attacks deal +10 damage for 15 minutes and animals experience additional movement-related benefits depending upon their form": "Todos os ataques de animais causam +10 de dano por 15 minutos e os animais experimentam benefícios adicionais relacionados ao movimento dependendo de sua forma"
"All animal attacks deal +20 damage for 15 minutes and animals experience additional movement-related benefits depending upon their form": "Todos os ataques de animais causam +20 de dano por 15 minutos e os animais experimentam benefícios adicionais relacionados ao movimento, dependendo de sua forma"
"All animal attacks deal +30 damage for 15 minutes and animals experience additional movement-related benefits depending upon their form": "Todos os ataques de animais causam +30 de dano por 15 minutos e os animais experimentam benefícios adicionais relacionados ao movimento, dependendo de sua forma"
"All animal attacks deal +40 damage for 15 minutes and animals experience additional movement-related benefits depending upon their form": "Todos os ataques de animais causam +40 de dano por 15 minutos e os animais experimentam benefícios adicionais relacionados ao movimento, dependendo de sua forma"
"All Hammer attacks except for Pound have a 25% chance to restore 10 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 10 de saúde e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 15 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 15 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 20 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 20 de saúde e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 25 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 25 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 30 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 30 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 35 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 35 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 40 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 40 de saúde e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 45 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 45 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 5 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 5 pontos de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 50 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 50 de saúde e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 55 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 55 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 60 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 60 de vida e armadura"
"All Hammer attacks except for Pound have a 25% chance to restore 65 health and armor": "Todos os ataques do Martelo, exceto Pound, têm 25% de chance de restaurar 65 de vida e armadura"
"All Hammer attacks have a 25% chance to ignite the target, causing 50 damage over 20 seconds": "Todos os ataques do Martelo têm 25% de chance de incendiar o alvo, causando 50 de dano em 20 segundos"
"All Mentalism and Psychology attacks deal +125 damage for 30 minutes": "Todos os ataques de Mentalismo e Psicologia causam +125 de dano por 30 minutos"
"All Mentalism and Psychology attacks deal +15 damage for 15 minutes": "Todos os ataques de Mentalismo e Psicologia causam +15 de dano por 15 minutos"
"All Mentalism and Psychology attacks deal +40 damage for 20 minutes": "Todos os ataques de Mentalismo e Psicologia causam +40 de dano por 20 minutos"
"All Mentalism and Psychology attacks deal +75 damage for 30 minutes": "Todos os ataques de Mentalismo e Psicologia causam +75 de dano por 30 minutos"
"All the smells of a scrub tree in a swamp to help you get into a natural mindset.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Todos os cheiros de um arbusto em um pântano para ajudá-lo a entrar em uma mentalidade natural.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"All three common symbols of Arisetsu are inscribed in Elvish into this nice staff.": "Todos os três símbolos comuns de Arisetsu estão inscritos em élfico neste belo cajado."
"Although clearly intended to be gloves, these are little more than wads of leather in vaguely-hand-shaped form. Expect immense amounts of palm sweat!": "Embora claramente pretendam ser luvas, estas são pouco mais do que maços de couro em formato vagamente de mão. Espere imensas quantidades de suor nas palmas das mãos!"
"Although it would appear to leave the wearer completely blind, the magical helmet allows perfect visibility.": "Embora pareça deixar o usuário completamente cego, o capacete mágico permite uma visibilidade perfeita."
"Although nothing special by elven standards, other races would kill for the secrets of the protective runes etched into this shield.": "Embora nada de especial para os padrões élficos, outras raças matariam pelos segredos das runas protetoras gravadas neste escudo."
"Although still pretty, this shell took serious damage and is no longer structurally sound.": "Embora ainda bonita, esta concha sofreu sérios danos e não é mais estruturalmente sólida."
"Although technically Orcish, these bows are made by Dwarven conscripts.": "Embora tecnicamente Orcs, esses arcos são feitos por recrutas Anões."
"Although there might be delicious varieties of strawberry wine out there somewhere, this is not it: the strawberry flavor is undermined by a grassy taste.": "Embora possa haver variedades deliciosas de vinho de morango em algum lugar, não é esta: o sabor do morango é prejudicado por um sabor herbáceo."
"Although they're leather instead of metal, these insulated boots are made for protection, not grace or mobility.": "Embora sejam de couro em vez de metal, essas botas isoladas são feitas para proteção, não para graça ou mobilidade."
"Always a classic dish!": "Sempre um prato clássico!"
"Amazing candy that can only be truly appreciated by expert gourmands. Comes in a bit of wax paper to prevent outside odors from diluting its flavor bouquet. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Doces incríveis que só podem ser verdadeiramente apreciados por gourmets experientes. Vem em um pedaço de papel manteiga para evitar que odores externos diluam seu buquê de sabor. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Amazing horseshoes that let a mount move through shallow water almost as easily as on land.": "Ferraduras incríveis que permitem que uma montaria se mova em águas rasas quase tão facilmente quanto em terra firme."
"Amazing horseshoes. Overkill for draft animals, but preferred for travel.": "Ferraduras incríveis. Exagero para animais de tração, mas preferido para viagens."
"Amazing saddle! Very comfy.": "Sela incrível! Muito confortável."
"Amazing stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Coisas incríveis! Esse é o tipo de botas evasivas que você veria na vitrine de uma loja, se houvesse uma loja específica para botas evasivas, o que não existe."
"Amazingly protective against freezing.": "Surpreendentemente protetor contra congelamento."
"Amazingly sharp given that the blades are made of ancient bone. It exudes an uncomfortable aura.": "Incrivelmente afiada, visto que as lâminas são feitas de osso antigo. Exala uma aura desconfortável."
"An acorn found on an old treant that had been growing in mire for ages. It apparently couldn't grow in that soil, but perhaps there's similar soil elsewhere in Povus that would work?": "Uma bolota encontrada em um velho ente que crescia na lama há muito tempo. Aparentemente não poderia crescer naquele solo, mas talvez haja solo semelhante em outro lugar em Povus que funcionaria?"
"An advanced preparation of the humble bird. Delicious!": "Uma preparação avançada do humilde pássaro. Delicioso!"
"An all-purpose token that can be used for various special or live events. To use or redeem this token, please follow the instructions given from the event you acquired it from. Please note that this token could disappear without notice once the associated event has ended.": "Um token multifuncional que pode ser usado para vários eventos especiais ou ao vivo. Para usar ou resgatar este token, siga as instruções fornecidas no evento em que você o adquiriu. Observe que este token pode desaparecer sem aviso prévio após o término do evento associado."
"An almost-malignant odor that sends your body into a ferocious snarl.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um odor quase maligno que deixa seu corpo em um rosnado feroz.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"An almost-overpowering odor of the sea. It reminds you to hold your breath underwater.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um odor quase avassalador do mar. Isso lembra você de prender a respiração debaixo d'água.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"An almost-smoky smell with an earthy undertone, suggesting a forest fire.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um cheiro quase fumado com um tom terroso, sugerindo um incêndio florestal.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"An amulet. The symbol is a strangely-adorned anvil.": "Um amuleto. O símbolo é uma bigorna estranhamente adornada."
"An ancient alicorn that's been fitted into a harness for a deer to wear. It's adorned with weird citrus-fruit iconography, which contrasts strangely with the extraordinarily sharp horn.": "Um antigo alicórnio que foi colocado em um arreio para um cervo usar. É adornado com uma estranha iconografia de frutas cítricas, que contrasta estranhamente com o chifre extraordinariamente afiado."
"An ancient crest of unknown origin. Bring this to someone knowledgeable about the past and they may be able to identify it for you.": "Uma antiga crista de origem desconhecida. Leve isso para alguém com conhecimento do passado e ele poderá identificá-lo para você."
"An ancient dirk that has been altered by dark magic. But don't worry, it's still sharp.": "Um punhal antigo que foi alterado por magia negra. Mas não se preocupe, ainda está afiado."
"An ancient dwarven instrument from a long-lost age.": "Um antigo instrumento anão de uma era há muito perdida."
"An ancient painting of something natural. Bring this to someone who appreciates nature and they may be able to identify it for you.": "Uma pintura antiga de algo natural. Leve isso para alguém que aprecia a natureza e ele poderá identificá-la para você."
"An ancient stone key, worn by yetis as a good luck token.": "Uma antiga chave de pedra, usada pelos Yetis como símbolo de boa sorte."
"An ancient vase of unknown origin. Bring this to someone who understands Flower Arrangements and they may be able to identify it for you.": "Um vaso antigo de origem desconhecida. Leve isso para alguém que entenda de arranjos florais e ele poderá identificá-lo para você."
"An ancient weapon from the War of Froliac, used by elves who were very, <i>very</i> angry. It is etched with an image of the elven begonia, a symbol of trust broken and secrets defiled. Unfortunately, other races don't understand the symbolism and seem to think it's kind of sissy.": "Uma arma antiga da Guerra de Froliac, usada por elfos que estavam muito, muito zangados. Está gravada a imagem da begônia élfica, um símbolo de confiança quebrada e segredos contaminados. Infelizmente, outras raças não entendem o simbolismo e parecem pensar que é meio maricas."
"An animal has left these bones behind after eating a meal.": "Um animal deixou esses ossos para trás depois de comer uma refeição."
"An anonymous poem about farming. It's very, <i>very</i> long -- so long that it has become a cult classic in its own way, as bored elves challenge each other to memorize the entire thing. Then one partner will recite it during sex; the first person to finish loses the challenge.": "Um poema anônimo sobre agricultura. É muito, muito longo - tão longo que se tornou um clássico cult à sua maneira, enquanto elfos entediados desafiam uns aos outros para memorizar a coisa toda. Então um dos parceiros irá recitá-lo durante o sexo; a primeira pessoa a terminar perde o desafio."
"An antique plate with careful metalwork. It's tarnished and dented, but still valuable.": "Uma placa antiga com trabalho em metal cuidadoso. Está manchado e amassado, mas ainda valioso."
"An antique style of dwarven crossbow, discontinued due to a tendency to explode while loaded. But this one seems fine.": "Um estilo antigo de besta anã, descontinuado devido à tendência de explodir quando carregado. Mas este parece bom."
"An antique, encrusted metal key. Unfortunately it appears to be encrusted in bear shit.": "Uma chave antiga de metal incrustada. Infelizmente, parece estar incrustado em merda de urso."
"An appealing-smelling mix of vegetables and mystery meat.": "Uma mistura de vegetais e carne misteriosa com um cheiro atraente."
"An appetizer intended to be eaten before the cheese course.": "Um aperitivo destinado a ser consumido antes do prato de queijos."
"An aromatic, herby weed.": "Uma erva daninha aromática."
"An arrangement of calming flowers that helps one relax.": "Um arranjo de flores calmantes que ajuda a relaxar."
"An arrangement of flowers beloved by bees, and thus indirectly beloved by people who love to see bees happy.": "Um arranjo de flores querido pelas abelhas e, portanto, indiretamente querido por quem adora ver as abelhas felizes."
"An arrangement of fresh flowers that instills a hearty vigor and a thirst for the outdoors.

Grants 10% chance of chopping extra wood. Duration: 4 hours.

You can only have one flower arrangement benefit at a time.": "Um arranjo de flores frescas que inspira vigor e sede de atividades ao ar livre.

Concede 10% de chance de cortar madeira extra. Duração: 4 horas.

Você só pode ter o benefício de um arranjo de flores por vez."
