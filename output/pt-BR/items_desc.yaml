"Causes the wearer's flesh to constantly regenerate at incredible speed. Slashing wounds appear to self-repair instantly! But the constant flesh-generation can be irksome.": "Faz com que a carne do usuário se regenere constantemente em uma velocidade incrível. Feridas cortantes parecem se auto-reparar instantaneamente! Mas a constante geração de carne pode ser cansativa."
"Causes visual distortion": "Causa distorção visual"
"Causes your head to emit light for 15 minutes. May inflict mild scalding.": "Faz com que sua cabeça emita luz por 15 minutos. Pode causar queimaduras leves."
"Cedar chips for smoking fish and meat.": "Lascas de cedro para defumar peixe e carne."
"Ceremonial armor refitted for battlefield use, this helm looks sharp -- and can make the wearer look sharp, too, provided they know how to wear it with style.": "Armadura cerimonial reformada para uso no campo de batalha, este elmo parece elegante – e pode fazer com que o usuário pareça elegante também, desde que saiba como usá-lo com estilo."
"Certainly \"well done\" and perhaps a bit beyond that, but at least it's fresh.": "Certamente \"muito bem\" e talvez um pouco além disso, mas pelo menos é fresco."
"Chain gloves made by recently-deceased rakshasa armorsmiths.": "Luvas de corrente feitas por armeiros rakshasa recentemente falecidos."
"Chain that basically covers the torso.": "Corrente que cobre basicamente o tronco."
"Chainmail that combines comfort, safety, and even a bit of style.": "Cota de malha que combina conforto, segurança e até um pouco de estilo."
"Chains cover most of the palm, leaving the fingers free -- and vulnerable.": "As correntes cobrem a maior parte da palma da mão, deixando os dedos livres – e vulneráveis."
"Chance that Installing Will Accidentally Destroy Item: 8%": "Chance de que a instalação destrua acidentalmente o item: 8%"
"Cheesy breaded porcini mushrooms with a lot of heat! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Cogumelos porcini empanados com queijo e muito calor! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Chicken meat that causes mild paralysis when eaten. An extremely exotic ingredient in food, but a common ingredient in poisons.": "Carne de frango que causa paralisia leve quando comida. Um ingrediente extremamente exótico na comida, mas um ingrediente comum em venenos."
"Chicken that's succulent, sweet, sour, spicy, and numbing. All the flavors!": "Frango suculento, doce, azedo, picante e entorpecente. Todos os sabores!"
"Choice parts of a pig infused with ancient spirits of evil. An instant pick-me-up! Warning: if Ur-Bacon speaks to you, do not speak back. Never follow instructions you receive from evil food of any kind.": "Partes escolhidas de um porco infundidas com antigos espíritos malignos. Um estímulo instantâneo! Aviso: se Ur-Bacon falar com você, não responda. Nunca siga as instruções que você recebe de alimentos nocivos de qualquer tipo."
"Chunks of roasted tofu and sweet evu fruit impaled on a stick. ": "Pedaços de tofu assado e frutas doces evu empalados em um palito."
"Chunks of tofu and vegetables impaled on a stick. ": "Pedaços de tofu e vegetais empalados num palito."
"Classic creamy tomato soup with crumbles of ground beef.": "Sopa cremosa clássica de tomate com migalhas de carne moída."
"Classic creamy tomato soup with crumbles of well-seasoned tofu.": "Sopa cremosa clássica de tomate com migalhas de tofu bem temperado."
"Classic creamy tomato soup with cubes of roasted pumpkin.": "Sopa cremosa clássica de tomate com cubos de abóbora assada."
"Classic creamy tomato soup.": "Sopa cremosa de tomate clássica."
"Cleaned crab meat, ready for cooking": "Carne de caranguejo limpa, pronta para cozinhar"
"Clearly of Elven design, and unlikely to have been made in Povus. But Statehelm bought thousands of them, just the same.": "Claramente de design élfico e improvável que tenha sido feito em Povus. Mas a Statehelm comprou milhares deles, mesmo assim."
"Cleverly weighted chain gloves that feel almost as comfortable as leather.": "Luvas de corrente com peso inteligente que são quase tão confortáveis ​​quanto couro."
"Cloth gloves that fit well and don't look too ridiculous.": "Luvas de tecido que se ajustam bem e não parecem muito ridículas."
"Cloth slippers that fit well and don't look too ridiculous.": "Chinelos de pano que caem bem e não ficam muito ridículos."
"Cloth slippers with a bit of resilience.": "Chinelos de tecido com um pouco de resiliência."
"Cloth slippers with a bit of resilience. But not much.": "Chinelos de tecido com um pouco de resiliência. Mas não muito."
"Cloth slippers. Brilliant! (Not really.)": "Chinelos de pano. Brilhante! (Na verdade.)"
"Coated in too many etched symbols to count, it's easy to overlook the secret button that sprays chemicals from the end.": "Revestido de muitos símbolos gravados para contar, é fácil ignorar o botão secreto que pulveriza produtos químicos no final."
"Collects some information about a large supply of metal in or around Kur Mountains.": "Coleta algumas informações sobre um grande suprimento de metal nas montanhas Kur ou ao redor."
"Collects some information about a large supply of metal in the Ilmari Desert.": "Coleta algumas informações sobre um grande suprimento de metal no Deserto Ilmari."
"Collects some information about a large supply of metal on the Gazluk Plateau.": "Coleta algumas informações sobre um grande suprimento de metal no Planalto Gazluk."
"Come on, the bark isn't even fully removed from this stick! But it's pretty thick. (It will work for Staff Fighting but not Fire Magic abilities.)": "Qual é, a casca ainda nem foi totalmente removida desse pedaço de pau! Mas é bem grosso. (Funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"Come on, the bark isn't even fully removed from this stick! But it's pretty thick. Very basic Fire Magic runes have been crudely etched into the bark.": "Qual é, a casca ainda nem foi totalmente removida desse pedaço de pau! Mas é bem grosso. Runas muito básicas da Magia do Fogo foram grosseiramente gravadas na casca."
"Comes with its own handle! An instant fill-up for the not-particularly-discerning bar patron.": "Vem com alça própria! Um abastecimento instantâneo para o cliente do bar que não é particularmente exigente."
"Comfortable padded chain gloves. There's some mobility issues, but they're not too bad.": "Luvas de corrente acolchoadas confortáveis. Existem alguns problemas de mobilidade, mas não são tão ruins."
"Comfortable shoes that make a violent cow feel free as the wind.": "Sapatos confortáveis ​​que fazem uma vaca violenta se sentir livre como o vento."
"Comfortable shoes that make a violent deer feel free as the wind.": "Sapatos confortáveis ​​que fazem um cervo violento se sentir livre como o vento."
"Comfortable, and perfectly fitting in with deer fashion sense.": "Confortável e combinando perfeitamente com o senso de moda dos cervos."
"Comfortable. Not exactly fashionable, but not ugly either.": "Confortável. Não é exatamente elegante, mas também não é feio."
"Comfy, invigorating, and magically protective. They smell like lilac and pimentos for some reason.": "Confortável, revigorante e magicamente protetor. Eles cheiram a lilases e pimentões por algum motivo."
"Commissioned by Arianna Fangblade for a close personal friend.": "Encomendado por Arianna Fangblade para um amigo próximo."
"Commissioned by the druid duck master Rummencola. Carved from the hardest wood available on Alharth and dressed in garnets, this mug will endure endless hours of chugging your favorite swill.": "Encomendado pelo mestre druida dos patos Rummencola. Esculpida na madeira mais dura disponível em Alharth e revestida com granadas, esta caneca aguentará intermináveis ​​horas bebendo seu líquido favorito."
"Common among elven hunters, this bauble lets you skin corpses from further away, telepathically extending your tool reach and letting you avoid smelling the corpse up close.": "Comum entre os caçadores élficos, esta bugiganga permite que você esfole cadáveres de lugares mais distantes, ampliando telepaticamente o alcance da ferramenta e evitando cheirar o cadáver de perto."
"Common apparel from the Serbule Revolt, 1500 years ago. These boots are so over-engineered that they look brand new. But the smell is pretty bad.": "Traje comum da Revolta dos Sérbulos, há 1.500 anos. Essas botas são tão sofisticadas que parecem novas. Mas o cheiro é muito ruim."
"Common professional-grade racing tack.": "Aderência de corrida comum de nível profissional."
"Competent workmanship.": "Mão de obra competente."
"Complex and layered.": "Complexo e em camadas."
"Confusingly named, as the ring is intended to be a Warden's primary ring, not their backup ring. It is solid and pleasant to hold.": "Nome confuso, já que o anel se destina a ser o anel principal do Diretor, não o anel reserva. É sólido e agradável de segurar."
"Congratulations from the Project: Gorgon team! Thanks for playing and supporting us!": "Parabéns da equipe do Projeto: Gorgon! Obrigado por jogar e nos apoiar!"
"Congratulations on winning the Moat Circuit!": "Parabéns pela vitória no Circuito do Fosso!"
"Consume this fuzzy gel when you're suffering from poison.": "Consuma este gel difuso quando estiver sofrendo de veneno."
"Consume this fuzzy gel when you're suffering poison effects.": "Consuma este gel difuso quando estiver sofrendo efeitos venenosos."
"Contains a magical power that can be added to an item. To have it installed into a piece of equipment, visit an equipment shopkeeper.": "Contém um poder mágico que pode ser adicionado a um item. Para instalá-lo em um equipamento, visite um lojista de equipamentos."
"Contains a magical power that can be temporarily added to an item. Use this item to learn the necessary recipe (if not already known).": "Contém um poder mágico que pode ser adicionado temporariamente a um item. Use este item para aprender a receita necessária (se ainda não for conhecida)."
"Contains formulae for insanely dangerous run-speed acceleration potions.": "Contém fórmulas para poções de aceleração de velocidade de corrida insanamente perigosas."
"Cooking goodness is trapped inside.": "Os benefícios da culinária estão presos lá dentro."
"Core attacks hasten the current reuse timer of Virtuoso's Ballad by 5 seconds": "Ataques centrais aceleram o cronômetro de reutilização atual da Balada do Virtuoso em 5 segundos"
"Core attacks stun plant creatures": "Ataques centrais atordoam criaturas vegetais"
"Corn ground into meal. It's useful for cooking in this form.": "Milho moído em farinha. É útil cozinhar desta forma."
"Corn, peas, and chopped red pepper in a delicious butter sauce.": "Milho, ervilhas e pimentão vermelho picado em um delicioso molho de manteiga."
"Cotton cloth that's extremely porous. Ideal for butter and certain cheeses.": "Pano de algodão extremamente poroso. Ideal para manteiga e alguns queijos."
"Cotton cloth that's very porous. Ideal for use in creating mold cheeses.": "Pano de algodão muito poroso. Ideal para usar na criação de queijos mofados."
"Cotton that's been cleaned of seeds and is ready to become yarn.": "Algodão que foi limpo de sementes e está pronto para virar fio."
"Covered in light fur. It has many alchemical uses and is also a common ingredient in totemic magic.": "Coberto de pêlo claro. Tem muitos usos alquímicos e também é um ingrediente comum na magia totêmica."
"Covered in little tiny blades.": "Coberto por pequenas lâminas."
"Covered in magical runes that augment battle chemistry.": "Coberto por runas mágicas que aumentam a química da batalha."
"Covered in matted fur.": "Coberto de pêlo emaranhado."
"Covered in spiked teeth.": "Coberto de dentes pontiagudos."
"Covered in weird runes. Probably just graffiti.": "Coberto de runas estranhas. Provavelmente apenas graffiti."
"Covers the drinker in a super-tough dermal layer. The extra flesh is mildly inconvenient when performing subtle evasive movements.": "Cobre o bebedor com uma camada dérmica super resistente. A carne extra é ligeiramente inconveniente ao realizar movimentos evasivos sutis."
"Cozy and warm, with lots of fur trim.": "Aconchegante e quentinho, com muitos enfeites de pele."
"Crafted by an ancient necromantic ritual and then blessed by Norala, this ugly ring smells of blood.": "Feito por um antigo ritual necromântico e depois abençoado por Norala, este anel feio cheira a sangue."
"Crafted by dwarven blacksmith (and notorious druid-hater) Goh Rastuk. It was going to be imbued with anti-nature magic, but Goh didn't get around to it. It's still a nice sword, though.": "Feito pelo ferreiro anão (e notório odiador de druidas) Goh Rastuk. Seria imbuído de magia anti-natureza, mas Goh não teve tempo para isso. Ainda é uma bela espada, no entanto."
"Crafted by elves who were too homesick to get out of bed, the Pants of the Yearning Sea are sorrow incarnate. But these sure are comfy. Plus, the tears that dripped onto the fabric have made it extra bouncy!": "Criadas por elfos que estavam com muita saudade de casa para sair da cama, as Calças do Mar Saudoso são a encarnação da tristeza. Mas estes com certeza são confortáveis. Além disso, as lágrimas que pingaram no tecido o tornaram ainda mais saltitante!"
"Crafted by expert Winter Court ice mages for use in the eternal struggle of the seasons. (Although it's made of incredibly strong ice, it's not suitable for use as a melee weapon.)": "Criado por magos de gelo especialistas da Corte Invernal para uso na eterna luta das estações. (Embora seja feito de gelo incrivelmente forte, não é adequado para uso como arma branca.)"
"Crafted by goblin slaves under the watchful eye of Gyrumpa, the legendary bowyer. He hated fun, and made sure his bows were especially taxing to use.": "Feito por escravos goblins sob o olhar atento de Gyrumpa, o lendário arqueiro. Ele odiava diversão e fazia questão de que seus arcos fossem especialmente difíceis de usar."
"Crafted by skilled rakshasa armorsmiths prior to the desolation of Povus.": "Feito por armeiros rakshasa habilidosos antes da desolação de Povus."
"Crafted on the famous Blues family looms. These sorts of gloves were once used to inspect the Vertan Royal Guard.": "Feito nos famosos teares da família Blues. Esse tipo de luvas já foi usado para inspecionar a Guarda Real de Vertan."
"Crafted out of magical ice that doesn't melt. (Not suitable for use as a melee weapon.)": "Feito de gelo mágico que não derrete. (Não é adequado para uso como arma corpo a corpo.)"
"Crafting Point Cost: 1": "Custo de Pontos de Fabricação: 1"
"Crafting Point Cost: 10": "Custo de Pontos de Fabricação: 10"
"Crafting Point Cost: 5": "Custo de Pontos de Fabricação: 5"
"Created by an alchemist/farmer to protect her legs in the fields, these pants are great at keeping nature off of you. Too bad about the odor...": "Criadas por uma alquimista/agricultora para proteger as pernas no campo, estas calças são ótimas para manter a natureza longe de você. Que pena pelo cheiro..."
"Created by priests of Arisetsu, this pleasant drink wards away the cold.": "Criada pelos sacerdotes de Arisetsu, esta agradável bebida afasta o frio."
"Created by some very clever divination scholars in Statehelm, drinking this potion lets you detect where undead monsters will spawn a few seconds before they do.": "Criada por alguns estudiosos de adivinhação muito inteligentes em Statehelm, beber esta poção permite detectar onde monstros mortos-vivos aparecerão alguns segundos antes deles."
"Created by the famed elven jeweler Sharra, this necklace supposedly reflects the wearer's treatment of the poor. It doesn't seem to do anything like that, but nobody has been brave enough to ask Sharra what's up.": "Criado pela famosa joalheira élfica Sharra, este colar supostamente reflete o tratamento que o usuário dispensa aos pobres. Parece que não faz nada disso, mas ninguém teve coragem suficiente para perguntar a Sharra o que está acontecendo."
"Created by the orcs of Gazluk as part of a short-lived coalition with the neighboring Council Lands. The \"Pathfinders of Kur\" initiative would have been a mixed-race team of orcs and humans that patrolled and mapped the vast mountain range. Unfortunately one of the human diplomats to Kur drunkenly revealed that the Council cared little about Kur itself, but mostly wanted this opportunity to work cooperatively with the orcs and perhaps build comeraderie. The orcs perceived it as \"manipulative human trickery\", killed the diplomat, and called the alliance off. But the armor had already been delivered. It's pretty good.": "Criado pelos orcs de Gazluk como parte de uma coalizão de curta duração com as vizinhas Terras do Conselho. A iniciativa \"Desbravadores de Kur\" teria sido uma equipe mestiça de orcs e humanos que patrulhavam e mapeavam a vasta cordilheira. Infelizmente, um dos diplomatas humanos revelou a Kur, bêbado, que o Conselho pouco se importava com Kur em si, mas principalmente queria esta oportunidade de trabalhar cooperativamente com os orcs e talvez construir camaradagem. Os orcs perceberam isso como \"truque humano manipulativo\", mataram o diplomata e cancelaram a aliança. Mas a armadura já havia sido entregue. É muito bom."
"Created in homage to an unknown god or king. They are inscribed with the phrase \"Be quick, my servant! Time is fleeting!\"": "Criado em homenagem a um deus ou rei desconhecido. Eles estão inscritos com a frase \"Seja rápido, meu servo! O tempo é passageiro!\""
"Creates a meal for two. Requires a stove or fire pit.": "Cria uma refeição para dois. Requer um fogão ou fogueira."
"Creates a punch bowl that lasts for 15 minutes. Those that drink from the punch bowl become PvP-enabled, have hampered movement but improved jumping, and deal half damage for 5 minutes.": "Cria uma tigela de ponche que dura 15 minutos. Aqueles que bebem da tigela de ponche tornam-se habilitados para PvP, dificultam os movimentos, mas melhoram os saltos e causam metade do dano por 5 minutos."
"Crude horseshoes for crude horses.": "Ferraduras toscas para cavalos toscos."
"Crude, ugly, and stupid, this buckle gives the wearer a sense of boldness. Only a bold warrior would wear this in public.

This buckle quickly decays when worn in combat, eventually disappearing.": "Rude, feia e estúpida, esta fivela dá ao usuário uma sensação de ousadia. Somente um guerreiro ousado usaria isto em público.

Esta fivela se deteriora rapidamente quando usada em combate, eventualmente desaparecendo."
"Crunchy!": "Crocante!"
"Crushed synthetic crystal.": "Cristal sintético triturado."
"Crusty goblin bread that stays edible and nutritious for months, though it should be noted that it never tastes good, even when fresh.": "Pão crocante de goblin que permanece comestível e nutritivo por meses, embora deva ser observado que nunca tem um gosto bom, mesmo quando fresco."
"Crystallized sugar on a stick. It's pretty and sweet.": "Açúcar cristalizado no palito. É lindo e doce."
"Cured pig meat with a touch of sugar and a hint of cloves.": "Carne de porco curada com um toque de açúcar e um toque de cravo."
"Cures headaches": "Cura dores de cabeça"
"Cures Lice": "Cura piolhos"
"Cures the symptoms of Cranium Powder abuse": "Cura os sintomas do abuso de Cranium Powder"
"Customized for the Unfun Guy by visiting weaponsmiths, this staff hits hard. And often.": "Personalizado para o Unfun Guy visitando armeiros, esse cajado bate forte. E frequentemente."
"Dainty gloves made of a stretchy material. They could fit any sized hands, but were made for a child.": "Luvas delicadas feitas de material elástico. Eles cabiam em mãos de qualquer tamanho, mas foram feitos para uma criança."
"Deadly Emission's direct damage becomes Darkness damage.": "O dano direto da Emissão Mortal torna-se dano de Escuridão."
"Deals +10 damage to fey": "Causa +10 de dano a feéricos"
"Deals +20 damage to lycanthropes": "Causa +20 de dano a licantropos"
"Dear player, thank you for completing this quest. If this were a complete MMO, you would have received a fun reward now. Maybe next time! - Eric": "Caro jogador, obrigado por completar esta missão. Se este fosse um MMO completo, você teria recebido uma recompensa divertida agora. Talvez na próxima vez! -Érico"
"Death by iocaine poison": "Morte por veneno de iocaína"
"Decades of spiderwebs have made the joints hard to open and close. It's hard to make magical gestures while wearing them, but on the bright side, they're silky smooth inside.": "Décadas de teias de aranha dificultaram a abertura e o fechamento das articulações. É difícil fazer gestos mágicos ao usá-los, mas pelo lado positivo, eles são macios e sedosos por dentro."
"Decent horseshoes for decent horses.": "Ferraduras decentes para cavalos decentes."
"Decent horseshoes with an anti-water enchantment that helps mounts get out of water faster.": "Ferraduras decentes com um encantamento anti-água que ajuda as montarias a sair da água mais rapidamente."
"Decent pants that blend into the surroundings.": "Calças decentes que combinam com o ambiente."
"Decent shoes for a cow that's not too shabby.": "Sapatos decentes para uma vaca que não seja tão surrada."
"Decent shoes for a deer that's not too shabby.": "Sapatos decentes para um cervo que não sejam tão surrados."
"Deep crimson in color, this big gem is used in magic to ensure good fortune.": "De cor carmesim profundo, esta grande joia é usada em magia para garantir boa sorte."
"Deep crimson in color, this gem is known for bringing good luck. This particular ruby kind of looks like a horse if you squint at it.": "De cor carmesim profunda, esta joia é conhecida por trazer boa sorte. Este rubi em particular parece um cavalo se você olhar de soslaio para ele."
"Deep crimson in color, this valuable gem is used in magic to ensure good fortune.": "De cor carmesim profunda, esta gema valiosa é usada em magia para garantir boa sorte."
"Deep-fried and battered. All races love an occasional greasy treat!": "Frito e maltratado. Todas as raças adoram uma guloseima gordurosa ocasional!"
"Deer can use this handy disguise to appear less conspicuous. A symbol of Arisetsu has been hidden inside.": "Os cervos podem usar esse disfarce útil para parecer menos visíveis. Um símbolo de Arisetsu está escondido dentro."
"Deer gain +15 Deer Damage for 30 minutes": "Cervos ganham +15 de Dano de Cervos por 30 minutos"
"Deer gain +35 Deer Damage for 30 minutes": "Cervos ganham +35 de Dano de Cervos por 30 minutos"
"Deer gain +60 Deer Damage for 30 minutes": "Cervos ganham +60 de Dano de Cervos por 30 minutos"
"Deer seem to get along fine in nature without having metal hammered into their hooves, but not all deer are content with the life of a passive ungulate.": "Os cervos parecem se dar bem na natureza sem ter metal martelado em seus cascos, mas nem todos os cervos estão satisfeitos com a vida de um ungulado passivo."
"Definitely dwarven in design, but relatively dainty for dwarven gear.": "Definitivamente com design anão, mas relativamente delicado para equipamentos anões."
"Dehulled oats. They can be cooked in this form or ground to oat flour.": "Aveia descascada. Eles podem ser cozidos nesta forma ou moídos em farinha de aveia."
"Delicious gel boosts your maximum power by 100 for two minutes.": "Delicioso gel aumenta sua potência máxima em 100 por dois minutos."
"Delicious long-grain rice, as prepared in Rahu.": "Delicioso arroz de grão longo, preparado em Rahu."
"Delicious! Although it could be spicier.": "Delicioso! Embora pudesse ser mais picante."
"Delicious! The butter brings out the flavor of the fish, and the lemon accentuates it.": "Delicioso! A manteiga realça o sabor do peixe e o limão o acentua."
"Deliciously baked vegetables covered in delicious cheese.": "Legumes deliciosamente assados ​​e cobertos com um delicioso queijo."
"Deploys a music box that will play for 1 hour with the effectiveness of a level 40 harp player.": "Implanta uma caixa de música que tocará por 1 hora com a eficácia de um harpista nível 40."
"Deploys a music box that will play for 30 minutes with the effectiveness of a level 15 lute player.": "Implanta uma caixa de música que tocará por 30 minutos com a eficácia de um alaúde nível 15."
"Describes the known types of horses, but sadly lacks pictures.": "Descreve os tipos conhecidos de cavalos, mas infelizmente não possui imagens."
"Designed (but never used) by the slightly-mad gadgeteer Tamiq. It uses a series of magically-powered cascading motors to augment the punching power.": "Projetado (mas nunca usado) pelo gadgeteer Tamiq, um pouco maluco. Ele usa uma série de motores em cascata com energia mágica para aumentar o poder de perfuração."
"Designed by a spiteful necromancer bent on conquering a city, these airy pants seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Projetadas por um necromante rancoroso determinado a conquistar uma cidade, essas calças arejadas fervem de ódio. E acontece que o ódio puro é bastante quente, proporcionando uma proteção moderada contra o frio."
"Designed by a spiteful necromancer bent on conquering a city, these cloth foot coverings seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Projetadas por um necromante rancoroso determinado a conquistar uma cidade, essas coberturas de tecido para os pés fervem de ódio. E acontece que o ódio puro é bastante quente, proporcionando uma proteção moderada contra o frio."
"Designed by a spiteful necromancer bent on conquering a city, these cloth gloves seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Projetadas por um necromante rancoroso determinado a conquistar uma cidade, essas luvas de tecido fervilham de ódio. E acontece que o ódio puro é bastante quente, proporcionando uma proteção moderada contra o frio."
"Designed by a spiteful necromancer bent on conquering a city, these robes seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Desenhadas por um necromante rancoroso determinado a conquistar uma cidade, essas vestes fervilham de ódio. E acontece que o ódio puro é bastante quente, proporcionando uma proteção moderada contra o frio."
"Designed by a spiteful necromancer bent on conquering a city, this hood seethes with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Projetado por um necromante rancoroso determinado a conquistar uma cidade, este bairro ferve de ódio. E acontece que o ódio puro é bastante quente, proporcionando uma proteção moderada contra o frio."
"Designed by blacksmith-in-hiding Torgan, this absurdly heavy shield can only be used by those with the most intense courage.": "Projetado pelo ferreiro escondido Torgan, este escudo absurdamente pesado só pode ser usado por aqueles com a coragem mais intensa."
"Designed by blacksmith-in-hiding Torgan, this cruel knife rewards the foolish warrior who dares bring a knife to a melee.": "Projetada pelo ferreiro escondido Torgan, esta faca cruel recompensa o guerreiro tolo que ousa trazer uma faca para um combate corpo a corpo."
"Designed by blacksmith-in-hiding Torgan, this hammer is insanely, ridiculously, heavy.": "Projetado pelo ferreiro escondido Torgan, este martelo é insanamente, ridiculamente, pesado."
"Designed by blacksmith-in-hiding Torgan, this heavy blade yearns to spill blood.": "Projetada pelo ferreiro escondido Torgan, esta lâmina pesada anseia por derramar sangue."
"Designed by blacksmith-in-hiding Torgan, this staff is weighted very oddly, rewarding users for truly committing to each attack.": "Projetado pelo ferreiro escondido Torgan, esse cajado tem um peso muito estranho, recompensando os usuários por realmente se comprometerem com cada ataque."
"Designed by blacksmith-in-hiding Torgan, this weapon was weighted by a master. It requires quite a strong arm, though.": "Projetada pelo ferreiro escondido Torgan, esta arma foi pesada por um mestre. No entanto, requer um braço bastante forte."
"Designed by blacksmith-in-hiding Torgan, this wicked weapon features hooked talons to rip into flesh.": "Projetada pelo ferreiro escondido Torgan, esta arma perversa possui garras em forma de gancho para rasgar a carne."
"Designed by Povus's former master alchemist, Kimeta, and sold to Statehelm in large quantity.": "Projetado pelo ex-mestre alquimista de Povus, Kimeta, e vendido para Statehelm em grande quantidade."
"Designed for a ratkin's nose, but perhaps also wearable by a cow or pig.": "Projetado para o nariz de um ratkin, mas talvez também possa ser usado por uma vaca ou porco."
"Designed for a ratkin's tail but also usable by rakshasa, this small yellow ring smells like... cheese? Well, anyway, it stinks.": "Projetado para a cauda de um ratkin, mas também utilizável por rakshasa, este pequeno anel amarelo cheira a... queijo? Bem, de qualquer forma, isso fede."
"Designed for a ratkin's tail but also usable by rakshasa, this ugly ring makes a soft whistling sound when you move your tail.": "Projetado para a cauda de um ratkin, mas também utilizável por rakshasa, este anel feio emite um som suave de assobio quando você move a cauda."
"Designed for ice mages in hostile environments, these gloves try to be the perfect blend of protection and versatility.": "Projetadas para magos do gelo em ambientes hostis, essas luvas tentam ser a combinação perfeita de proteção e versatilidade."
"Designed for inquisitive fire mages who like to explore new ways to burn things.": "Projetado para magos de fogo curiosos que gostam de explorar novas maneiras de queimar coisas."
"Designed for longer transit periods, this travel cage provides basic sustenance and comfort for up to a week.

This one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 7 days (168 hours). If the animal is not rehomed in a stable by then, it will escape and be lost forever.
<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Projetada para períodos de trânsito mais longos, esta gaiola de viagem oferece sustento e conforto básicos por até uma semana.

Este contêiner descartável pode conter qualquer animal de qualidade para animais de estimação (não reprodutor) criado em cativeiro (não capturado na natureza) por até 7 dias (168 horas). Se o animal não for realojado em um estábulo até lá, ele escapará e se perderá para sempre.
<i>[Você pode usar este item em um animal de estimação no estábulo visitando um mestre de estábulo. Procure o botão \"Usar Item...\" na tela estável.]</i>"
"Designed for orcish scouts and mobile assault troops, these gloves are patterned after the famous orcish plate gauntlets, but just made out of many layers of leather. Nobody really loves the result, but it's still better than steel gauntlets if you're trying to aim a bow.": "Projetadas para batedores orcs e tropas de assalto móveis, essas luvas são modeladas com base nas famosas manoplas de placas orcs, mas feitas apenas de muitas camadas de couro. Ninguém adora o resultado, mas ainda é melhor do que manoplas de aço se você estiver tentando mirar um arco."
"Designed for use by orcish healers, this crossbow comes equipped with a vicious blade for self-defense and a series of holy symbols to allow healing.": "Projetada para uso por curandeiros orcs, esta besta vem equipada com uma lâmina cruel para autodefesa e uma série de símbolos sagrados para permitir a cura."
"Designed to be clipped to a fairy's wings, these enchanted ringlets improve fae energy conductivity.": "Projetados para serem presos às asas de uma fada, esses cachos encantados melhoram a condutividade da energia das fadas."
"Designed to be clipped to a fairy's wings, these enchanted tassels make a fairy fly slightly faster.": "Projetadas para serem presas às asas de uma fada, essas borlas encantadas fazem a fada voar um pouco mais rápido."
"Designed to be clipped to a fairy's wings, these tassels exude a pheromone that makes many types of bees and wasps non-aggressive (unless attacked).": "Projetadas para serem presas às asas de uma fada, essas borlas exalam um feromônio que torna muitos tipos de abelhas e vespas não agressivas (a menos que sejam atacadas)."
"Designed to be slathered onto the mandibles of a giant spider, this reusable paint helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetada para ser espalhada nas mandíbulas de uma aranha gigante, essa tinta reutilizável ajuda a proteger contra a doença causada por estar muito perto de cristais amarelos brilhantes."
"Designed to be slathered onto the mandibles of a giant spider, this reusable paint offers some protection against the negative effects of Hellfire.": "Projetada para ser aplicada nas mandíbulas de uma aranha gigante, esta tinta reutilizável oferece alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn at the base of a deer's tail, this brass ring enhances ferocity.": "Projetado para ser usado na base da cauda de um cervo, este anel de latão aumenta a ferocidade."
"Designed to be worn at the base of a deer's tail, this brass ring is very cute.": "Projetado para ser usado na base da cauda de um cervo, este anel de latão é muito fofo."
"Designed to be worn at the base of a rakshasa's tail, but also able to fit on the tail of a wolf or deer, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetado para ser usado na base da cauda de um rakshasa, mas também capaz de caber na cauda de um lobo ou veado, este anel ajuda a proteger contra a doença causada por estar muito perto de cristais amarelos brilhantes."
"Designed to be worn at the base of a Rakshasa's tail, this allows the wearer to remember two additional map spots at a time. It is inscribed, \"to Sinda, the explorer supreme.\"": "Projetado para ser usado na base da cauda de um Rakshasa, permite ao usuário lembrar dois pontos adicionais do mapa por vez. Está inscrito \"para Sinda, o explorador supremo\"."
"Designed to be worn at the base of a Rakshasa's tail, this helps keep the wearer from dying. It is inscribed with a message that simply reads, \"Remember me. - Ashk\"": "Projetado para ser usado na base da cauda de um Rakshasa, ajuda a evitar que o usuário morra. Está inscrito com uma mensagem que diz simplesmente: \"Lembre-se de mim. - Ashk\""
"Designed to be worn at the base of a Rakshasa's tail, this imperceptibly alters a Rakshasa's mind.": "Projetado para ser usado na base da cauda de um Rakshasa, altera imperceptivelmente a mente de um Rakshasa."
"Designed to be worn at the base of a Rakshasa's tail, this improves the wearer's Righteousness, allowing them to forgo the negative effects of killing sentient creatures for longer.": "Projetado para ser usado na base da cauda de um Rakshasa, melhora a Retidão do usuário, permitindo-lhe renunciar aos efeitos negativos de matar criaturas sencientes por mais tempo."
"Designed to be worn at the base of a rakshasa's tail, this ring offers some protection against the negative effects of Hellfire.": "Projetado para ser usado na base da cauda de um rakshasa, este anel oferece alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn at the base of a Rakshasa's tail, this slows the rate at which hydration is lost, allowing the Rakshasa to function without water for twice as long.": "Projetado para ser usado na base da cauda de um Rakshasa, diminui a taxa de perda de hidratação, permitindo que o Rakshasa funcione sem água pelo dobro do tempo."
"Designed to be worn by either orcs or humans, these pants feature several cinch-points to make them comfortable for any leg girth. With clever manipulation of these belts you store a few small items in them... although that wouldn't be very comfortable.": "Projetadas para serem usadas por orcs ou humanos, essas calças apresentam vários pontos de ajuste para torná-las confortáveis ​​para qualquer circunferência de perna. Com a manipulação inteligente desses cintos você armazena alguns itens pequenos neles... embora isso não seja muito confortável."
"Designed to be worn in a cow or pig's nose, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetado para ser usado no nariz de uma vaca ou porco, este anel ajuda a proteger contra o enjôo causado por estar muito perto de cristais amarelos brilhantes."
"Designed to be worn in a cow or pig's nose, this ring offers some protection against the negative effects of Hellfire.": "Projetado para ser usado no nariz de uma vaca ou porco, este anel oferece alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn in a cow's nose, this brass ring aggravates bovine sensibilities, causing violence.": "Projetado para ser usado no nariz de uma vaca, este anel de latão agrava a sensibilidade bovina, causando violência."
"Designed to be worn in a cow's nose, this brass ring further enhances natural bovine strength.": "Projetado para ser usado no nariz de uma vaca, este anel de latão aumenta ainda mais a força natural do bovino."
"Designed to be worn in a cow's nose, this brass ring makes attractive cattle even more attractive.": "Projetado para ser usado no nariz de uma vaca, este anel de latão torna o gado atraente ainda mais atraente."
"Designed to be worn in an elf's pierced navel, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetado para ser usado no piercing do umbigo de um elfo, este anel ajuda a proteger contra o enjôo causado por estar muito perto de cristais amarelos brilhantes."
"Designed to be worn in an elf's pierced navel, this ring offers some protection against the negative effects of Hellfire.": "Projetado para ser usado no umbigo perfurado de um elfo, este anel oferece alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn in an elf's pierced navel, this small gemmed ring enhances the elf's biorhythms slightly.": "Projetado para ser usado no umbigo perfurado de um elfo, este pequeno anel com pedras preciosas melhora ligeiramente o biorritmo do elfo."
"Designed to be worn in an elf's pierced navel, this small gemmed ring enhances the elf's natural accuracy with a bow.": "Projetado para ser usado no umbigo perfurado de um elfo, este pequeno anel com pedras preciosas aumenta a precisão natural do elfo com um arco."
"Designed to be worn in an elf's pierced navel, this small gemmed ring repels dust and dirt.": "Projetado para ser usado no umbigo perfurado de um elfo, este pequeno anel com pedras preciosas repele poeira e sujeira."
"Designed to be worn in humans' pierced ears, these earrings boost the wearer's maximum capacity for enjoyment of others' company, allowing them to be alone longer without becoming miserable.": "Projetados para serem usados ​​nas orelhas furadas de humanos, esses brincos aumentam a capacidade máxima do usuário de aproveitar a companhia dos outros, permitindo que fiquem sozinhos por mais tempo sem se sentirem infelizes."
"Designed to be worn in humans' pierced ears, these earrings help protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetados para serem usados ​​nas orelhas furadas de humanos, esses brincos ajudam a proteger contra o enjôo causado por estar muito perto de cristais amarelos brilhantes."
"Designed to be worn in humans' pierced ears, these earrings offer some protection against the negative effects of Hellfire.": "Projetados para serem usados ​​nas orelhas furadas de humanos, esses brincos oferecem alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn in humans' pierced ears, these lovely earrings are enchanted with potent protection magic.": "Projetados para serem usados ​​nas orelhas furadas dos humanos, estes lindos brincos são encantados com uma poderosa magia de proteção."
"Designed to be worn in the wings of a fairy, butterfly, or giant bat, these rings help protect against the sickness that comes from being too close to glowy yellow crystals.": "Projetados para serem usados ​​nas asas de uma fada, borboleta ou morcego gigante, esses anéis ajudam a proteger contra doenças causadas por estar muito perto de cristais amarelos brilhantes."
"Designed to be worn in the wings of a fairy, butterfly, or giant bat, these rings offers some protection against the negative effects of Hellfire.": "Projetados para serem usados ​​nas asas de uma fada, borboleta ou morcego gigante, esses anéis oferecem alguma proteção contra os efeitos negativos do Fogo do Inferno."
"Designed to be worn on the wings of magical butterflies, these rings grant the wearer access to weather witching powers.": "Projetados para serem usados ​​nas asas de borboletas mágicas, esses anéis concedem ao usuário acesso a poderes de bruxaria climática."
"Designed to fit over leather gloves, these brass knuckles have nasty bumps to make your punches cause extra injury.": "Projetadas para caber sobre luvas de couro, essas soqueiras têm saliências desagradáveis ​​que fazem com que seus socos causem ferimentos extras."
"Designed to let you drink longer without unfortunate gastrointestinal issues.": "Projetado para permitir que você beba por mais tempo sem problemas gastrointestinais infelizes."
"Designed to protect from concussions and minor scrapes, this helmet has the serious drawbacks of reduced visibility, unpleasant odor, and terrible craftsmanship.": "Projetado para proteger contra concussões e pequenos arranhões, este capacete tem sérias desvantagens de visibilidade reduzida, odor desagradável e péssimo acabamento."
