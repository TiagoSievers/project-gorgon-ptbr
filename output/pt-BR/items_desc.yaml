"A collection of rectangles on a blue background painted by Susarex, an elf that was turned into a snake in a tragic zoo accident. The perfectly straight rectangles took Susarex over 200 hours to complete.": "Uma coleção de retângulos sobre fundo azul pintados por Susarex, um elfo que se transformou em cobra em um trágico acidente no zoológico. Os retângulos perfeitamente retos levaram Susarex mais de 200 horas para serem concluídos."
"A collection of unpleasant-smelling flowers. These will make you very sick.

Lasts 4 hours

You can only have one flower arrangement \"benefit\" at a time.": "Uma coleção de flores com cheiro desagradável. Isso vai deixar você muito doente.

Dura 4 horas

Você só pode ter um “benefício” de arranjo de flores por vez."
"A collection of woodsy odors to remind you of your place in nature.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Uma coleção de odores amadeirados para lembrá-lo do seu lugar na natureza.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A colony of thin tube-like fungus that collects ambient magical energy and can release that energy in an explosive burst.": "Uma colônia de fungos finos em forma de tubo que coleta a energia mágica do ambiente e pode liberar essa energia em uma explosão explosiva."
"A comb in the orcish style, made of bone and dipped in gold. Worn as jewelry.": "Um pente no estilo orc, feito de osso e banhado em ouro. Usado como joia."
"A comfortable chain overshirt.": "Uma confortável camiseta de corrente."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +15 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +15 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +18 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +18 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +21 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +21 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +24 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +24 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +27 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +27 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +30 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua regeneração de armadura em +30 por 30 minutos."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +33 for 30 minutes.": "Uma cadeira confortável. Relaxar nele aumenta sua Regeneração de Armadura em +33 por 30 minutos."
"A comfy helmet that is almost (but not quite) attractive, too!": "Um capacete confortável que é quase (mas não totalmente) atraente também!"
"A common backup weapon for many types of fairies.": "Uma arma reserva comum para muitos tipos de fadas."
"A common backup weapon for Spring Fairies that's beginning to find popularity among Winter as well.": "Uma arma reserva comum para as Fadas da Primavera que está começando a ganhar popularidade também entre o Inverno."
"A common magical ring worn by ranalon. It exudes a slimy film.": "Um anel mágico comum usado por Ranalon. Exala uma película viscosa."
"A common ranalon weapon that doubles as a multi-purpose tool. Ranastaves are sturdy enough to dig with and resilient enough to survive earth-magic being cast through them.": "Uma arma ranalon comum que também funciona como uma ferramenta multifuncional. Ranastaves são resistentes o suficiente para escavar e resistentes o suficiente para sobreviver à magia da terra sendo lançada através deles."
"A communication device common among Crone Hegemony officers, akin to a Sending Stone from the Council Lands... but much, much, creepier. This one seems inert.": "Um dispositivo de comunicação comum entre os oficiais da Hegemonia Crone, semelhante a uma Pedra Enviadora das Terras do Conselho... mas muito, muito, mais assustador. Este parece inerte."
"A competent and accurate weapon made by the elves of Sedgewick Forest.": "Uma arma competente e precisa feita pelos elfos da Floresta Sedgewick."
"A complex, dense cake.": "Um bolo complexo e denso."
"A compound that contains tannic acid. It can be used to create astounding and awesome leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro incrível e incrível."
"A compound that contains tannic acid. It can be used to create crude and decent leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro bruto e decente."
"A compound that contains tannic acid. It can be used to create great and amazing leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro incrível e incrível."
"A compound that contains tannic acid. It can be used to create incredible and marvelous leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro incrível e maravilhoso."
"A compound that contains tannic acid. It can be used to create nice and quality leather.": "Um composto que contém ácido tânico. Pode ser usado para criar couro bonito e de qualidade."
"A compound that contains tannic acid. It can be used to create shoddy and rough leather.": "Um composto que contém ácido tânico. Ele pode ser usado para criar couro de má qualidade e áspero."
"A conveniently-sized shovel, perfect for digging small graves. (With this in your inventory, you will have the option of burying the corpses of deceased monsters. Burying monsters will make replacement monsters appear more quickly.)": "Uma pá de tamanho conveniente, perfeita para cavar pequenas sepulturas. (Com isso em seu inventário, você terá a opção de enterrar os cadáveres de monstros falecidos. Enterrar monstros fará com que monstros substitutos apareçam mais rapidamente.)"
"A cool soothing liquid.": "Um líquido refrescante e calmante."
"A corrosive alchemical liquid that is far too dangerous for common use, and is best left to experts.": "Um líquido alquímico corrosivo que é perigoso demais para uso comum e é melhor deixá-lo para especialistas."
"A corrosive alchemical liquid with many common uses.": "Um líquido alquímico corrosivo com muitos usos comuns."
"A corrosive alchemical liquid with many household uses. It's also commonly used to clean gemstones before cutting.": "Um líquido alquímico corrosivo com muitos usos domésticos. Também é comumente usado para limpar pedras preciosas antes de cortá-las."
"A cotton hat that's good in the cold.": "Um chapéu de algodão que é bom no frio."
"A cowl of the quality that a peasant farmer might wear.": "Um capuz da qualidade que um camponês usaria."
"A cowl that makes the wearer seem more mysterious and aloof.": "Um capuz que faz quem o usa parecer mais misterioso e indiferente."
"A cowl-like linen hat that helps keep magical energy contained.": "Um chapéu de linho em forma de capuz que ajuda a manter a energia mágica contida."
"A crate full of sparklers you can deploy for all to enjoy.

Can only be deployed once every two hours.": "Uma caixa cheia de faíscas que você pode usar para que todos possam desfrutar.

Só pode ser implantado uma vez a cada duas horas."
"A crate. A quick peek inside reveals a wooden suit of eight-legged armor and other bizarre items.": "Uma caixa. Uma rápida olhada no interior revela uma armadura de madeira com oito pernas e outros itens bizarros."
"A creamy bowl of porridge redolent with the delicate smell of hot evu.": "Uma tigela cremosa de mingau com o cheiro delicado de evu quente."
"A crude cow will love these crude shoes.": "Uma vaca tosca vai adorar esses sapatos toscos."
"A crude deer will love these crude shoes.": "Um cervo tosco vai adorar esses sapatos toscos."
"A crudely removed horn from the head of a Demon Soldier. It is hot to the touch.": "Um chifre toscamente removido da cabeça de um Soldado Demônio. Está quente ao toque."
"A cruel weapon for cruel necromancers who like to burn things.": "Uma arma cruel para necromantes cruéis que gostam de queimar coisas."
"A crystal used to unlock certain Crone Hegemony armory chests. This one is partially digested, but should still work.": "Um cristal usado para desbloquear certos baús do arsenal da Hegemonia Crone. Este está parcialmente digerido, mas ainda deve funcionar."
"A crystallized honeycomb containing an audio message. Only fae seem to be able to access these documents, but in this case it's clearly humdrum day-to-day paperwork.": "Um favo de mel cristalizado contendo uma mensagem de áudio. Apenas as fadas parecem ser capazes de acessar esses documentos, mas neste caso é claramente uma papelada monótona do dia a dia."
"A cup of heated mushroom blend with a pinch of spices. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma xícara de mistura de cogumelos aquecidos com uma pitada de especiarias. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A curious side-effect of demonic magic. The protrusions on this rock vaguely resemble teeth.": "Um curioso efeito colateral da magia demoníaca. As saliências desta rocha lembram vagamente dentes."
"A curiously-whittled piece of wood. It hums with electricity.": "Um pedaço de madeira curiosamente talhado. Ele zumbe com eletricidade."
"A custom wand made by an old druid.": "Uma varinha personalizada feita por um velho druida."
"A customized hammer used by armor and jewelry crafters.": "Um martelo personalizado usado por artesãos de armaduras e joias."
"A customized hammer used by armorsmiths.": "Um martelo personalizado usado por armeiros."
"A customized hammer used by chefs.": "Um martelo personalizado usado por chefs."
"A customized hammer used by master smiths.": "Um martelo personalizado usado por mestres ferreiros."
"A customized hammer used by smiths.": "Um martelo personalizado usado por ferreiros."
"A customized hammer used by toolsmiths and weaponsmiths.": "Um martelo personalizado usado por ferreiros e armeiros."
"A customized staff with heavy weights on each end.": "Uma equipe personalizada com pesos pesados ​​em cada extremidade."
"A customized system of harnesses worn around the hips and legs. Armor-enhancing nanodispensers are hidden behind the knee guards.": "Um sistema personalizado de arneses usados ​​ao redor dos quadris e pernas. Nanodispensadores que melhoram a armadura estão escondidos atrás das joelheiras."
"A cut of meat from a wild creature that's not normally used for food. The meat is low-quality but still useful in many dishes.

(Use in Cheap Meat recipes.)": "Um corte de carne de uma criatura selvagem que normalmente não é usado como alimento. A carne é de baixa qualidade, mas ainda útil em muitos pratos.

(Use em receitas de carne barata.)"
"A dance pole that can be deployed anywhere you please. Hopefully the base is sturdy enough that it won't tip over.": "Um poste de dança que pode ser colocado em qualquer lugar que você desejar. Esperamos que a base seja resistente o suficiente para não tombar."
"A dark red stone, known for its curative properties.

Associated Primary Skill: Druid

Associated Secondary Skill: First Aid": "Uma pedra vermelha escura, conhecida pelas suas propriedades curativas.

Habilidade Primária Associada: Druida

Habilidade Secundária Associada: Primeiros Socorros"
"A dark red stone, known for its curative properties. This particular stone has been attuned to the First Aid skill if used in crafting.": "Uma pedra vermelha escura, conhecida pelas suas propriedades curativas. Esta pedra em particular foi sintonizada com a habilidade de Primeiros Socorros se usada na elaboração."
"A dark shield bearing the inscription \"In the absence of light, darkness prevails.\"": "Um escudo escuro com a inscrição \"Na ausência de luz, a escuridão prevalece\"."
"A dead starfish.": "Uma estrela do mar morta."
"A dead starfish. It's covered in a strange goop that stings to the touch.": "Uma estrela do mar morta. Está coberto por uma gosma estranha que arde ao toque."
"A deadly masterpiece that has been disguised to look like a simple sapling bow.": "Uma obra-prima mortal que foi disfarçada para parecer um simples arco de muda."
"A deadly slashing weapon for use by expert martial artists.": "Uma arma mortal para uso por artistas marciais experientes."
"A deadly wand in the right hands.": "Uma varinha mortal nas mãos certas."
"A decent roll of leather.": "Um rolo de couro decente."
"A decent-sized frog. It's still alive, for now. It is comfortable being held and may have been someone's pet.": "Um sapo de tamanho decente. Ainda está vivo, por enquanto. É confortável ser segurado e pode ter sido o animal de estimação de alguém."
"A deceptively simple dish of beets, fish, and meat, somehow made tasty together.": "Um prato aparentemente simples de beterraba, peixe e carne, de alguma forma saborosos juntos."
"A decorative ranalan bracelet made of green glass beads.": "Uma pulseira ranalana decorativa feita de contas de vidro verdes."
"A decorative ranalan bracelet made of incredibly beautiful pearls.": "Uma pulseira ranalana decorativa feita de pérolas incrivelmente lindas."
"A decorative ranalan bracelet made of purple glass beads.": "Uma pulseira ranalan decorativa feita de contas de vidro roxas."
"A deep blue gem evocative of dark stormy oceans or winter skies. In magic it enhances musical skill.

Associated Primary Skill: Bard": "Uma joia de um azul profundo que evoca oceanos escuros e tempestuosos ou céus de inverno. Na magia, melhora a habilidade musical.

Habilidade Primária Associada: Bardo"
"A deep, difficult chapbook by the late human poet Avery Lancaster. Her imagery is hauntingly beautiful, yet profoundly stupid at the same time. That's the mark of a true master.": "Um livrinho profundo e difícil do falecido poeta humano Avery Lancaster. Suas imagens são assustadoramente belas, mas profundamente estúpidas ao mesmo tempo. Essa é a marca de um verdadeiro mestre."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like bile.": "Uma poção de ação retardada que é difícil de usar em situações estressantes e também tem gosto de bile."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like wet cardboard.": "Uma poção de ação retardada difícil de usar em situações estressantes e que também tem gosto de papelão molhado."
"A delectable pastry. (Not actually a favorite of pixies, though.) (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um pastel delicioso. (Na verdade, não é o favorito dos duendes.) (Este é um lanche. Os lanches se acumulam com as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicate flower that seems simultaneously warm and cold.": "Uma flor delicada que parece simultaneamente quente e fria."
"A delicate glass star painted red and gold.": "Uma delicada estrela de vidro pintada de vermelho e dourado."
"A delicate smell that pulls at the edges of your memories and reminds you of the power of nature.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um cheiro delicado que envolve suas memórias e lembra o poder da natureza.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"A delicate tool for grinding orcish wheat into flour. (Using this item will teach the recipe if needed.)": "Uma ferramenta delicada para transformar trigo orc em farinha. (Usar este item ensinará a receita, se necessário.)"
"A delicately fletched arrow with potent broadheads.": "Uma flecha de penas delicadas com pontas largas potentes."
"A delicately fletched arrow with potent broadheads. (Note: only Orcs are trained to use this type of ammunition.)": "Uma flecha de penas delicadas com pontas largas potentes. (Nota: apenas Orcs são treinados para usar este tipo de munição.)"
"A delicious blended fruit drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma deliciosa bebida de frutas misturadas. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious breakfast. Too bad about the lack of syrup.": "Um delicioso café da manhã. Pena que não tenha calda."
"A delicious but potentially deadly mushroom.": "Um cogumelo delicioso, mas potencialmente mortal."
"A delicious cheesy snack.": "Um delicioso lanche com queijo."
"A delicious choice for those with a big sweet tooth.": "Uma opção deliciosa para quem gosta de doces."
"A delicious cold beverage. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma deliciosa bebida gelada. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious fall snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um delicioso lanche de outono. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"A delicious fresh meal.": "Uma deliciosa refeição fresca."
"A delicious meal.": "Uma deliciosa refeição."
"A delicious mushroom.": "Um delicioso cogumelo."
