"A beautiful orb that grew inside an oyster or other mollusc. While geologists don't consider this a gem, jewelers do. It can be used in magic to convey water-related benefits.": "Um lindo orbe que cresceu dentro de uma ostra ou outro molusco. Embora os geólogos não considerem isso uma joia, os joalheiros consideram. Pode ser usado em magia para transmitir benefícios relacionados à água."
