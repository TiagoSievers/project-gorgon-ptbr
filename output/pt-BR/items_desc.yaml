"Practically drowning in magical tourmalines, this necklace wards off bad thoughts in the very literal sense.": "Praticamente afogado em turmalinas mágicas, este colar afasta maus pensamentos no sentido literal."
"Practically oozing with enchantment, this masterpiece is rarely seen outside of Elven lands.": "Praticamente transbordando encantamento, esta obra-prima raramente é vista fora das terras dos Elfos."
"Preferred by orcish martial artists, this black-iron fist weapon is intimidatingly heavy in the hand.": "Preferida pelos artistas marciais orcs, esta arma de punho de ferro preto é intimidadoramente pesada na mão."
"Pretty high quality. Good thread count, decent coloration, not too tight. Good stuff.": "Qualidade bastante alta. Boa contagem de fios, coloração decente, não muito apertada. Coisas boas."
"Pretty protective. Still pretty embarrassing.": "Bastante protetor. Ainda é muito embaraçoso."
"Pretty shoddy workmanship... but hey, it's armor.": "Acabamento de má qualidade... mas ei, é uma armadura."
"Prisms are used in Transmutation recipes and at Transmutation tables. Prisms help you distill unwanted equipment into phlogiston.": "Prismas são usados ​​em receitas de Transmutação e em tabelas de Transmutação. Os prismas ajudam a destilar equipamentos indesejados em flogisto."
"Produced in Povus right up until the day the town was attacked. While stylish, they unfortunately lack pockets.": "Produzido em Povus até o dia em que a cidade foi atacada. Embora elegantes, infelizmente não têm bolsos."
