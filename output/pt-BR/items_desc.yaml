"<i>[We had a whole Baking skill planned but it turned out to be tedious and I hated it, and now it's unclear if there'll be any kind of skill for it. Maybe they'll just be regular cooking recipes but under a sub-skill or something like that. In the mean time here's a sample bread so the poor baker has something to sell.]</i>": "<i>[Tínhamos toda uma habilidade de Culinária planejada, mas acabou sendo tediosa e eu odiei, e agora não está claro se haverá algum tipo de habilidade para isso. Talvez sejam apenas receitas culinárias regulares, mas com uma sub-habilidade ou algo parecido. Enquanto isso, aqui está uma amostra de pão para que o pobre padeiro tenha algo para vender.]</i>"
