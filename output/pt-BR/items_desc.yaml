"A belt adorned with numerous frog runes that gives the wearer a certain kind of luck.": "Um cinto adornado com inúmeras runas de sapo que dá ao usuário um certo tipo de sorte."
"A belt buckle with a holy symbol painted on it, allowing the wearer to tap into the grace of Arisetsu. Unfortunately, the belt is extremely painful to wear, and even worse, the paint is very delicate: prolonged use in combat will cause the belt to break, requiring replacement.": "Uma fivela de cinto com um símbolo sagrado pintado, permitindo ao usuário aproveitar a graça de Arisetsu. Infelizmente, o cinto é extremamente doloroso de usar e, pior ainda, a pintura é muito delicada: o uso prolongado em combate fará com que o cinto se quebre, necessitando de substituição."
