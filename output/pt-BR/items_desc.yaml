"Life Steal reaps +25 Health.": "Roubo de Vida rende +25 de Saúde."
"Light, delicate gloves that seem far more fragile than they really are.": "Luvas leves e delicadas que parecem muito mais frágeis do que realmente são."
"Lightweight, but not very sturdy. It's not immediately clear what it might be good for.": "Leve, mas não muito resistente. Não está imediatamente claro para que isso pode ser bom."
"Like chicken meat, but larger, and with a more pronounced flavor.": "Semelhante à carne de frango, porém maior e com sabor mais pronunciado."
"Like chicken meat, but larger, and with a more pronounced flavor. This bird was quite well-fed.": "Semelhante à carne de frango, porém maior e com sabor mais pronunciado. Este pássaro estava muito bem alimentado."
"Likely of human make, these thick metal boots expand or contract to meet any foot size and always fit perfectly.": "Provavelmente de fabricação humana, essas botas grossas de metal se expandem ou contraem para se adequar a qualquer tamanho de pé e sempre se ajustam perfeitamente."
"Linen pants with convenient pockets and magic-sustaining properties.": "Calças de linho com bolsos convenientes e propriedades de sustentação mágica."
"Linen slippers with grippy soles and magic-sustaining properties.": "Chinelos de linho com sola aderente e propriedades de sustentação mágica."
"Linen that has been augmented with fae power.": "Linho que foi aumentado com poder fae."
"Long, deadly blades jut out from this glove-like weapon. It only fits the left hand.": "Lâminas longas e mortais projetam-se desta arma semelhante a uma luva. Cabe apenas na mão esquerda."
"Long, thin wheat noodles made in the orcish style. While most famous as the main ingredient in uraknocha, they are also used in many other dishes.": "Macarrão de trigo longo e fino feito no estilo orc. Embora sejam mais famosos como ingrediente principal do uraknocha, eles também são usados ​​em muitos outros pratos."
"Long-term animals that equip this can use the ability Familiar's Recall": "Animais de longo prazo que equipam isso podem usar a habilidade Familiar's Recall"
"Look, someone figured out how to sand down the edges of a stick. Too bad the creator had no idea how to balance its weight. (It will work for Staff Fighting but not Fire Magic abilities.)": "Olha, alguém descobriu como lixar as pontas de um pedaço de pau. Pena que o criador não tinha ideia de como equilibrar seu peso. (Funcionará para Staff Fighting, mas não para habilidades de Fire Magic.)"
"Look, someone figured out how to sand down the edges of a stick. Too bad the creator had no idea how to balance its weight. The Fire Magic runes look a little less haphazard, though.": "Olha, alguém descobriu como lixar as pontas de um pedaço de pau. Pena que o criador não tinha ideia de como equilibrar seu peso. As runas da Magia do Fogo parecem um pouco menos aleatórias, no entanto."
"Looks like meat. Gross meat, but ... just meat.": "Parece carne. Carne nojenta, mas... só carne."
"Looks like regular seaweed. Smells even worse, though. Apparently it's toxic.": "Parece uma alga marinha normal. Cheira ainda pior, no entanto. Aparentemente é tóxico."
"Lost in a cave and worn by generations of insane werewolves, these well-made gauntlets have become infused with lycanthropic power.": "Perdidas em uma caverna e usadas por gerações de lobisomens insanos, essas manoplas bem feitas foram infundidas com poder licantrópico."
"Lovingly crafted to a high standard, this wooden spider suit makes spiders even more adaptable than normal. Its wood can also act as a focal point for druidic spiders.": "Carinhosamente elaborado com um alto padrão, este traje de aranha de madeira torna as aranhas ainda mais adaptáveis ​​do que o normal. Sua madeira também pode atuar como ponto focal para aranhas druidas."
"Low-quality pieces of cat meat have been sliced extraordinarily thin, tenderized, and then buried in salt. The result is a cup of hot stew that tastes ... salty. But not horrible. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Pedaços de carne de gato de baixa qualidade foram cortados extraordinariamente finos, amaciados e depois enterrados em sal. O resultado é uma xícara de ensopado quente com gosto... salgado. Mas não horrível. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Low-quality wheat flour, but cheap and abundant.": "Farinha de trigo de baixa qualidade, mas barata e abundante."
"Low-quality, but shelf-stable, rendered fat.": "Gordura fundida de baixa qualidade, mas com estabilidade de armazenamento."
"Luxuriously soft, this headgear moves with your body, preventing blind spots.": "Luxuosamente macio, este arnês se move com o seu corpo, evitando pontos cegos."
"Made by an amateur, this punching weapon barely fits onto your hand. But sometimes an ugly, stupid-looking weapon can inspire more fear than a good weapon. Not really. But keep thinking that while you wear these.": "Feita por um amador, esta arma de soco mal cabe na sua mão. Mas às vezes uma arma feia e de aparência estúpida pode inspirar mais medo do que uma arma boa. Na verdade. Mas continue pensando nisso enquanto usa isso."
"Made by an expert craftsman in Rahu. The body is imported hardwood, the strings are high-quality grimalkin gut, and the unusual enchantments give it a deep luxurious sound quality. Not for beginners!": "Feito por um artesão especialista em Rahu. O corpo é de madeira importada, as cordas são de tripa Grimalkin de alta qualidade e os encantos incomuns conferem-lhe uma qualidade de som profunda e luxuosa. Não para iniciantes!"
"Made by dwarven forge-priests during the Elf-Orc wars.": "Feito por sacerdotes-forja anões durante as guerras entre Elfos e Orcs."
"Made by ranalon to feed their pet frogs during low-insect times. They can also be eaten by ranalon in an emergency.": "Feito por ranalon para alimentar seus sapos de estimação durante períodos de baixo consumo de insetos. Eles também podem ser consumidos por ranalon em caso de emergência."
"Made by someone with decent working knowledge of wood, these seem fairly comfortable if you have hooves for feet.": "Feitos por alguém com um conhecimento decente de madeira, eles parecem bastante confortáveis ​​​​se você tiver cascos no lugar dos pés."
"Made by someone with potent magics and very poor knitting skills, this coat is also unfortunately woven of dog hair and is rather uncomfortable. An inscription inside says \"K2togYO\"": "Feito por alguém com magia poderosa e péssimas habilidades de tricô, este casaco infelizmente também é feito de pêlo de cachorro e é bastante desconfortável. Uma inscrição dentro diz \"K2togYO\""
"Made for goblins by craftsman slaves. It seems fairly old, and has a nice sound quality.": "Feito para goblins por escravos artesãos. Parece bastante antigo e tem uma boa qualidade de som."
"Made for orcish armies by dwarven smiths under an ancient treaty.": "Feito para exércitos orcs por ferreiros anões sob um antigo tratado."
"Made from a conch shell.": "Feito de uma concha."
"Made from a giant scorpion tail, this weapon is difficult to use deftly, but poisoners love it.": "Feita com a cauda de um escorpião gigante, esta arma é difícil de usar com habilidade, mas os envenenadores adoram."
"Made from a particularly well-bred scray, this fleshy coat has predictable odor problems but is nonetheless quite impressive.": "Feita a partir de um scray particularmente bem criado, esta pelagem carnuda tem problemas de odor previsíveis, mas ainda assim é bastante impressionante."
"Made from a perfectly preserved Giant Snail shell.": "Feito de uma concha de caracol gigante perfeitamente preservada."
"Made from a sea-snail shell, this instrument has an ominous tone.": "Feito de concha de caracol marinho, este instrumento tem um tom sinistro."
"Made from fermented corn mash, this is very mellow and drinkable. This is the favored drink of Councilwoman Sereel \"The Steel\" Avenbule. She holds a bourbon competition each year in Vidaria.": "Feito com purê de milho fermentado, é muito suave e bebível. Esta é a bebida preferida da vereadora Sereel \"The Steel\" Avenbule. Ela realiza uma competição de bourbon todos os anos em Vidaria."
"Made from fresh in-season ingredients, this meal hits the spot.": "Feita com ingredientes frescos da estação, esta refeição é perfeita."
"Made from orcish wheat. This has a notably superior taste to human wheat flour, and is preferred for high-end baked goods.": "Feito de trigo orc. Tem um sabor notavelmente superior ao da farinha de trigo humano e é preferida para produtos de panificação de alta qualidade."
"Made from repurposed Winter Court armor in an imperfect process. This somehow conveys the warmth of summer while still being quite cold to the touch.": "Feito com armadura da Corte de Inverno reaproveitada em um processo imperfeito. De alguma forma, isso transmite o calor do verão, embora ainda seja bastante frio ao toque."
"Made from the ashes of certain plants, this is useful in glassblowing.": "Feito a partir das cinzas de certas plantas, é útil para soprar vidro."
"Made from the horn of the extinct Destiny Ram, this instrument is illegal in six countries, including Verta. But it sounds great!": "Feito a partir do chifre do extinto Destiny Ram, este instrumento é ilegal em seis países, incluindo Verta. Mas parece ótimo!"
"Made from the skin of abominations, these pants seem to constantly fondle your legs as you wear them. It's really quite disturbing, but the armor is tough...": "Feitas com pele de abominações, essas calças parecem acariciar constantemente suas pernas enquanto você as veste. É realmente muito perturbador, mas a armadura é resistente..."
"Made from the tender tentacles of young kraken, this meal is quite the delicacy.": "Feita com os tenros tentáculos de um jovem kraken, esta refeição é uma iguaria."
"Made in a dwarven style that controls and focuses electricity.": "Feito em estilo anão que controla e concentra a eletricidade."
"Made in Povus for sale to Statehelm, which recently found itself in need of demonic shielding.": "Feito em Povus para venda para Statehelm, que recentemente precisou de proteção demoníaca."
"Made of a bizarre glowing metal, these uncomfortable boots seem to clench your feet with malice.": "Feitas de um metal brilhante e bizarro, essas botas desconfortáveis ​​parecem apertar seus pés com malícia."
"Made of a bizarre metal, these uncomfortable boots seem to clench your feet with malice.": "Feitas de um metal bizarro, essas botas desconfortáveis ​​parecem apertar seus pés com malícia."
"Made of a felled treant, this staff almost seems to squirm with resentment.": "Feito de um ente derrubado, esse cajado quase parece se contorcer de ressentimento."
"Made of a large animal horn and enchanted with magics that enhance its volume.": "Feito de um grande chifre de animal e encantado com magias que aumentam seu volume."
"Made of a pretentious fairy wood, this staff is incredibly strong, yet gives in just the right ways.": "Feito de uma pretensiosa madeira de fada, este cajado é incrivelmente forte, mas cede da maneira certa."
"Made of a secret elven wood (not oak, despite the name), this horn has a warm but somber quality.": "Feito de uma madeira élfica secreta (não de carvalho, apesar do nome), este chifre tem uma qualidade quente, mas sombria."
"Made of an unfamiliar metal, this key has weird lines etched all over it.": "Feita de um metal desconhecido, esta chave tem linhas estranhas gravadas por toda parte."
"Made of bent wire and topped with a piece of glass... it's made of junk. But it's still pretty, and it's magical.": "Feito de arame dobrado e coberto com um pedaço de vidro... é feito de lixo. Mas ainda é bonito e mágico."
"Made of blackened metal and etched with demonic runes.": "Feito de metal enegrecido e gravado com runas demoníacas."
"Made of burned bones, this staff is great for necromancers or fire mages. Less great for staff fighting, because burned bones aren't exactly quality building material. It's topped with a necromancy gem.": "Feito de ossos queimados, este cajado é ótimo para necromantes ou magos de fogo. Menos adequado para brigas de equipe, porque ossos queimados não são exatamente materiais de construção de qualidade. É coberto com uma joia de necromancia."
"Made of Cold Iron, this weapon is used in fae civil wars. Fairies who wield it are in constant pain from the metal... but not as much pain as their victims.": "Feita de Ferro Frio, esta arma é usada nas guerras civis feéricas. As fadas que o empunham sofrem constante dor por causa do metal... mas não tanto quanto suas vítimas."
"Made of dried root, this myconian-designed ring is not attractive, but it is comfortable.": "Feito de raiz seca, este anel com design miconiano não é atraente, mas é confortável."
"Made of enchanted aquamarine, this ring takes the oomph out of projectiles that pierce your body.": "Feito de água-marinha encantada, este anel tira o vigor dos projéteis que perfuram seu corpo."
"Made of enchanted snow, this ring is quite irritating to wear. It's not cold to the touch, and it never seems to lose its shape, but it <i>does</i> melt continuously, creating damp sleeves and pockets.": "Feito de neve encantada, este anel é bastante irritante de usar. Não é frio ao toque e parece nunca perder a forma, mas <i>derrete</i> continuamente, criando mangas e bolsos úmidos."
"Made of extra bent wire and topped with a piece of green glass... it's made of junk. But it's still pretty, magical and more powerful than before.": "Feito de arame extra dobrado e coberto com um pedaço de vidro verde... é feito de lixo. Mas ainda é bonito, mágico e mais poderoso do que antes."
"Made of fae mollusc shell, a notoriously difficult material to obtain.": "Feito de concha de molusco fae, um material notoriamente difícil de obter."
"Made of giant beetle and scorpion carapace, this stifling, awkward, and heavy coat rewards those who have the fortitude to endure wearing it.": "Feito de carapaça de besouro gigante e escorpião, este casaco sufocante, desajeitado e pesado recompensa aqueles que têm coragem de suportá-lo."
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 35 enchantments.)": "Feito de conchas gigantes costuradas com corda de algas marinhas. Surpreendentemente, eles não cheiram mal. (Inclui encantamentos aleatórios de nível 35.)"
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 40 enchantments.)": "Feito de conchas gigantes costuradas com corda de algas marinhas. Surpreendentemente, eles não cheiram mal. (Inclui encantamentos aleatórios de nível 40.)"
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 45 enchantments.)": "Feito de conchas gigantes costuradas com corda de algas marinhas. Surpreendentemente, eles não cheiram mal. (Inclui encantamentos aleatórios de nível 45.)"
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 35 enchantments.)": "Feito de conchas gigantes. É mais confortável do que parece. (Inclui encantamentos aleatórios de nível 35.)"
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 40 enchantments.)": "Feito de conchas gigantes. É mais confortável do que parece. (Inclui encantamentos aleatórios de nível 40.)"
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 45 enchantments.)": "Feito de conchas gigantes. É mais confortável do que parece. (Inclui encantamentos aleatórios de nível 45.)"
"Made of immaculately-carved pieces of giant insect carapace, these are a work of mechanical art. Heavy and prone to painful pinching, they are tolerable only to hardened warriors.": "Feitos de peças de carapaça de inseto gigante imaculadamente esculpidas, são uma obra de arte mecânica. Pesados ​​e propensos a beliscões dolorosos, eles são toleráveis ​​apenas para guerreiros endurecidos."
"Made of insanely strong scorpion and beetle carapace plates riveted together, these boots will keep your feet safe from everything except blisters. It's a pity carapace plates aren't more comfortable...": "Feitas de placas de carapaça de escorpião e besouro incrivelmente fortes rebitadas, essas botas manterão seus pés protegidos de tudo, exceto bolhas. É uma pena que as placas da carapaça não sejam mais confortáveis..."
"Made of painstakingly carved bone. It has very fine teeth for collecting insects out of hair.": "Feito de osso cuidadosamente esculpido. Possui dentes muito finos para coletar insetos do cabelo."
"Made of pink wood, supposedly common in the orcish homeland of Gu.": "Feito de madeira rosa, supostamente comum na terra natal dos orcs Gu."
"Made of reasonable materials, these gloves are nice. Just nice.": "Feitas de materiais razoáveis, essas luvas são lindas. Muito legal."
"Made of snail shells and sinew.": "Feito de conchas de caracol e tendões."
"Made of snail shells and sinew. Only somewhat stinky.": "Feito de conchas de caracol e tendões. Apenas um pouco fedorento."
"Made of snail shells and sinew. The sinews were not properly cured and stink beyond comprehension.": "Feito de conchas de caracol e tendões. Os tendões não foram devidamente curados e cheiram além da compreensão."
"Made of snail shells, sinews, and animal claws.": "Feito de conchas de caracol, tendões e garras de animais."
"Made of stone that's been immersed in sadness -- literal, liquid sadness -- for years. It requires a strong mind to wield.": "Feito de pedra que esteve imersa em tristeza – tristeza literal e líquida – durante anos. Requer uma mente forte para manejar."
"Made of stone, this traditional dwarven instrument requires much skill to use.": "Feito de pedra, este instrumento anão tradicional requer muita habilidade para ser usado."
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 35 enchantments.)": "Feito do exótico metal oceânico Orichalcum, este escudo é leve, forte e durável. (Inclui encantamentos aleatórios de nível 35.)"
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 40 enchantments.)": "Feito do exótico metal oceânico Orichalcum, este escudo é leve, forte e durável. (Inclui encantamentos aleatórios de nível 40.)"
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 45 enchantments.)": "Feito do exótico metal oceânico Orichalcum, este escudo é leve, forte e durável. (Inclui encantamentos aleatórios de nível 45.)"
"Made of the sheerest material and nearly invisible.": "Feito do material mais transparente e quase invisível."
"Made of ultra-strong cloth, this garment makes it easy to dodge attacks.": "Feita de tecido ultra-forte, esta vestimenta facilita a esquiva de ataques."
"Made of utterly unbreakable glass mined from the heart of a dying star, this is no measuring tool: it is a deadly weapon of war! (Because the measurement marks rubbed off long ago.)": "Feito de vidro totalmente inquebrável extraído do coração de uma estrela moribunda, este não é um instrumento de medição: é uma arma de guerra mortal! (Porque as marcas de medição desapareceram há muito tempo.)"
"Made of wire that's been bent into a sort of wave. It feels a little greasy and slimy.": "Feito de arame dobrado em uma espécie de onda. Parece um pouco gorduroso e viscoso."
"Made of wood from a world that you will never see (and if you did, all the trees are extinct anyway). It's a little small, but serviceable.": "Feito de madeira de um mundo que você nunca verá (e se você viu, todas as árvores estarão extintas de qualquer maneira). É um pouco pequeno, mas útil."
"Made with super-tart apples and complemented by super-sweet sugar. Delicious! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Feito com maçãs supertortas e complementado com açúcar superdoce. Delicioso! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Made with whatever meat is available and seasoned within an inch of its life. Most races find the smell pleasant, but the taste much too salty. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Feito com qualquer carne disponível e temperado até o fim da vida. A maioria das raças acha o cheiro agradável, mas o sabor é muito salgado. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Magic gauntlets that were in a giant spider's hoard for decades, taking some of the spider's aspect.": "Manoplas mágicas que estiveram no tesouro de uma aranha gigante por décadas, assumindo um pouco do aspecto da aranha."
"Magical gloves used by nobles who don't want to accidentally misspell words: these gloves prevent such simple errors. They improve accuracy in other ways, too. Unfortunately, this pair is stained and gross.": "Luvas mágicas usadas por nobres que não querem escrever palavras erradas acidentalmente: essas luvas evitam erros tão simples. Eles também melhoram a precisão de outras maneiras. Infelizmente, este par está manchado e nojento."
"Magical runes have been etched into this claw to cause acidic explosions. Unfortunately the etchings weakened the chitin, and it's not suitable for use in constructing armor.": "Runas mágicas foram gravadas nesta garra para causar explosões ácidas. Infelizmente, as gravuras enfraqueceram a quitina e ela não é adequada para uso na construção de armaduras."
"Magically tough. With variable-sizing latches because hobgoblin head sizes differ pretty dramatically from one batch to the next.": "Magicamente difícil. Com travas de tamanho variável porque os tamanhos das cabeças dos hobgoblins diferem dramaticamente de um lote para outro."
"Makes you a vampire. Permanent! Cannot be cured even with a Minor Panacea.": "Faz de você um vampiro. Permanente! Não pode ser curado mesmo com uma Panacéia Menor."
"Makes you PvP against ALL players -- even ones who don't want to PvP! Used for live events only! Use UnPvPJuice to turn it off.": "Torna você PvP contra TODOS os jogadores - mesmo aqueles que não querem PvP! Usado apenas para eventos ao vivo! Use UnPvPJuice para desligá-lo."
"Makes you PvP for an hour.": "Faz você PvP por uma hora."
"Makes you PvP for testing.": "Torna você PvP para teste."
"Makes you PvP-flagged for a half hour. You can attack other players who are also PvP-flagged.": "Deixa você sinalizado PvP por meia hora. Você pode atacar outros jogadores que também estejam sinalizados como PvP."
"Makes your attacks generate 25% less Rage, preventing enemies from using their Rage attacks as often.": "Faz com que seus ataques gerem 25% menos Fúria, evitando que os inimigos usem seus ataques de Fúria com tanta frequência."
"Makes your attacks generate 50% less Rage, preventing enemies from using their Rage attacks as often.": "Faz com que seus ataques gerem 50% menos Fúria, evitando que os inimigos usem seus ataques de Fúria com tanta frequência."
"Makes your attacks generate double Rage in enemies, allowing them to use their Rage attacks more often. Popular among assholes and masochists.": "Faz com que seus ataques gerem o dobro de Fúria nos inimigos, permitindo que eles usem seus ataques de Fúria com mais frequência. Popular entre idiotas e masoquistas."
"Makes your fingers tingle when you touch it.": "Faz seus dedos formigarem ao tocá-lo."
"Makeshift fae armor crafted from repurposed Winter Court armor. It doesn't have quite the style or powers of Summer Court armor, but it's not bad.": "Armadura fada improvisada feita a partir de armaduras reaproveitadas da Corte Invernal. Não tem exatamente o estilo ou os poderes da armadura da Corte de Verão, mas não é ruim."
"Makeshift Summer armor. It grants empathy to the wearer, though only those who are attuned to such things will notice.": "Armadura improvisada de verão. Concede empatia ao usuário, embora apenas aqueles que estão sintonizados com essas coisas notem."
"Many townsfolk will consider you to be a harmless animal. Combat is ineffective.": "Muitos habitantes da cidade considerarão você um animal inofensivo. O combate é ineficaz."
"Maple chips for smoking fish and meat.": "Lascas de bordo para defumar peixe e carne."
"Marvelously protective against freezing.": "Maravilhosamente protetor contra congelamento."
"Mass-produced by competent artisans, there is nothing special -- or especially wrong -- about this lute.": "Produzido em massa por artesãos competentes, não há nada de especial – ou especialmente errado – neste alaúde."
"Mass-produced in Povus right before the town was destroyed.": "Produzido em massa em Povus pouco antes da cidade ser destruída."
