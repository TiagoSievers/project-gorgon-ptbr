"A pulled-curd cheese with a slightly rubbery, very bland taste.

Cheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Queijo de coalhada desfiada, com sabor levemente borrachento e muito suave.

