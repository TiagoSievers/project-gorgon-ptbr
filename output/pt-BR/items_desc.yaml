"Gain 50 inventory slots for 5 hours.": "Ganhe 50 slots de inventário por 5 horas."
"Gaudily enchanted with potent portal magic.": "Ostentosamente encantado com a poderosa magia do portal."
"Gaudy but somehow still gorgeous, this staff has hidden controls for all sorts of mechanisms to spurt acid.": "Chamativo, mas de alguma forma ainda lindo, esse cajado tem controles ocultos para todos os tipos de mecanismos que liberam ácido."
"Gauntlet-style gloves, but maneuverable enough for casting work.": "Luvas estilo manopla, mas manobráveis ​​o suficiente para trabalhos de fundição."
"Gem-encrusted and clearly magical.": "Incrustado de pedras preciosas e claramente mágico."
"Ghost sweat, congealed into a slimy lump. Probably useful for crafting potions or something.": "Suor fantasma, congelado em um caroço viscoso. Provavelmente útil para criar poções ou algo assim."
"Given that it was made from carrots, this wine is... surprisingly good!": "Dado que foi feito à base de cenoura, este vinho é... surpreendentemente bom!"
"Given to neophyte druids to help them hone their powers.": "Dado aos druidas neófitos para ajudá-los a aprimorar seus poderes."
"Gives encouragement": "Dá incentivo"
"Gives severe food poisoning.": "Dá intoxicação alimentar grave."
"Gives you a blank appearance. Consume a minor panacea to return to normal.": "Dá uma aparência vazia. Consumir uma pequena panacéia para voltar ao normal."
"Gloves that combine comfort, safety, and fashion.": "Luvas que aliam conforto, segurança e moda."
"Glowing redly.": "Brilhando em vermelho."
"Glowing redly. And hugely.": "Brilhando em vermelho. E enormemente."
"Goblin-made, with a focus on sharpness over all else.": "Feito por Goblins, com foco na nitidez acima de tudo."
"Goes on a horse.": "Vai a cavalo."
"Gold! With little white frill things. Reasonably protective, too.": "Ouro! Com pequenas coisas brancas com babados. Razoavelmente protetor também."
"Good craftmanship.": "Bom artesanato."
"Good for flinging small amounts of chemicals all around you. Held in the main hand.": "Bom para lançar pequenas quantidades de produtos químicos ao seu redor. Segurado na mão principal."
"Good for flinging small amounts of chemicals all around you. Held in the off hand.": "Bom para lançar pequenas quantidades de produtos químicos ao seu redor. Segurado na mão inábil."
"Good for lounging around the house. Where nobody will see you.": "Bom para relaxar pela casa. Onde ninguém vai te ver."
"Good for making bottles. But not that good: it's not especially pure or clean.": "Bom para fazer garrafas. Mas não é tão bom: não é especialmente puro ou limpo."
"Good materials and great craftsmanship combine in a helmet that breathes easy and protects from nearly any injury.": "Bons materiais e excelente acabamento combinam-se em um capacete que respira facilmente e protege contra quase qualquer lesão."
"Good thread count. Sturdy crotch support. A little stiff, but to be expected for such a resilient pair of pants.": "Boa contagem de fios. Suporte de virilha resistente. Um pouco rígido, mas era de se esperar para uma calça tão resistente."
"Gorgeous and profoundly magical.": "Lindo e profundamente mágico."
"Grants 10 Live Event Credits upon use": "Concede 10 créditos de eventos ao vivo mediante uso"
"Grants 100 Live Event Credits upon use": "Concede 100 créditos de eventos ao vivo mediante uso"
"Grants 16 major buffs for 24 hours.": "Concede 16 buffs principais por 24 horas."
"Grants 16 major buffs for 48 hours.": "Concede 16 buffs principais por 48 horas."
"Grants 25 Live Event Credits upon use": "Concede 25 créditos de eventos ao vivo mediante uso"
"Grants 50 Live Event Credits upon use": "Concede 50 créditos de eventos ao vivo mediante uso"
"Grants a brief period of vincibility to the usually-invincible.": "Concede um breve período de vincibilidade ao normalmente invencível."
"Grants access to back-areas of Rahu for 90 minutes": "Concede acesso às áreas secundárias de Rahu por 90 minutos"
"Grants flight for 5 minutes": "Concede voo por 5 minutos"
"Grants super speed for 2 minutes": "Concede supervelocidade por 2 minutos"
"Grants temporary Fae death penalty immunity": "Concede imunidade temporária à pena de morte aos Fae"
"Grants XP in whatever topic this particular notebook covers": "Concede XP em qualquer tópico abordado por este notebook em particular"
"Greasy and salty, but a pretty nice snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Gorduroso e salgado, mas um lanche bem gostoso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Great for punching! Also, somehow makes your kicks hurt more, too... weird.": "Ótimo para socar! Além disso, de alguma forma faz seus chutes doerem mais também... estranho."
"Great horseshoes. Overkill for draft animals, but preferred for travel.": "Ótimas ferraduras. Exagero para animais de tração, mas preferido para viagens."
"Great stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Ótima coisa! Esse é o tipo de botas evasivas que você veria na vitrine de uma loja, se houvesse uma loja específica para botas evasivas, o que não existe."
"Great! Just great. For cows.": "Ótimo! Simplesmente ótimo. Para vacas."
"Great! Just great. For deers.": "Ótimo! Simplesmente ótimo. Para veados."
"Gretchen Salas has a way with a potato. These rolls are really good! You can't even taste the potato.": "Gretchen Salas tem jeito com batatas. Esses rolinhos são muito bons! Você nem consegue sentir o gosto da batata."
"Grimly fashioned from a mythical rhino's horn. It has a sound like... a dying rhino.": "Sombriamente moldado a partir de um chifre de rinoceronte mítico. Tem um som como... o de um rinoceronte moribundo."
"Gross little seeds from a weed. They can't be grown, but can be ground into an edible form.": "Pequenas sementes nojentas de uma erva daninha. Eles não podem ser cultivados, mas podem ser moídos até se tornarem comestíveis."
"Grotesque boots with an uncomfortably slime-like internal material. Crudely sewn into the inside is the phrase \"Boots Not Art.\"": "Botas grotescas com um material interno desconfortavelmente parecido com limo. Costurada grosseiramente no interior está a frase \"Boots Not Art\"."
"Grows a plant whose inedible fruit is useful in crafting horse-taming potions.": "Cultiva uma planta cujos frutos não comestíveis são úteis na elaboração de poções para domesticar cavalos."
"Gruesome!": "Horrível!"
"Gulagra, the spirit of discord, usually takes the form of a mountain-sized worm, and would have no use for this club. But somebody named it after him anyway.": "Gulagra, o espírito da discórdia, geralmente assume a forma de um verme do tamanho de uma montanha e não teria utilidade para este porrete. Mas alguém deu o nome dele de qualquer maneira."
"Ham-flavored broth with maggots swimming in it! It looks vile but if you eat it quickly, it's... less vile.": "Caldo com sabor de presunto e larvas nadando! Parece vil, mas se você comer rápido, é... menos vil."
"Hammered and polished and ready for battle.": "Martelado e polido e pronto para a batalha."
"Hammered together from simple materials, for a simple battle cow.": "Martelados com materiais simples, para uma simples vaca de batalha."
"Hammery.": "Martelo."
"Hand-made by a bored bowyer of middling skill.": "Feito à mão por um arqueiro entediado e de habilidade mediana."
"Hand-made from a leftover snail shell, and infused with simple magic by Sie's fairy friends.": "Feito à mão com sobras de concha de caracol e infundido com magia simples pelas fadas amigas de Sie."
"Handmade by a fairy, these make you especially light on your feet.": "Feitos à mão por uma fada, eles deixam você especialmente leve."
"Handmade by a fairy, this staff is embarrassingly dainty.": "Feito à mão por uma fada, este cajado é embaraçosamente delicado."
"Hard on the outside, runny liquid on the inside. Mmm...": "Duro por fora, líquido escorrendo por dentro. Hum..."
"Harvested flax fiber. It needs to be retted before it can be turned into linen.": "Fibra de linho colhida. Ele precisa ser macerado antes de ser transformado em linho."
"Harvested from a largeish frog. A cooking ingredient that can also be used in Cheap Meat recipes.": "Colhido de um sapo grande. Um ingrediente culinário que também pode ser usado em receitas de Carne Barata."
"Harvested from a very young hexapus (before the meat becomes inedible). There are probably special ways to prepare this for cooking. It can also be used in Cheap Meat recipes.": "Colhido de um hexapus muito jovem (antes que a carne se torne não comestível). Provavelmente existem maneiras especiais de prepará-lo para cozinhar. Também pode ser usado em receitas de Carne Barata."
"Hash browns with onion.": "Hash brown com cebola."
"Having been blasted by hellfire, this sand is especially pure. A little cursed, but pure. It's good for magical bottles.": "Tendo sido atingida pelo fogo do inferno, esta areia é especialmente pura. Um pouco amaldiçoado, mas puro. É bom para garrafas mágicas."
