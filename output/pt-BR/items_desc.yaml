"Pumpkin soup cooked and served in the shell of a swamp gourd. It has a secret ingredient that brings out the vividness of the pumpkin. And, well, the vividness of everything, really.": "Sopa de abóbora cozida e servida na casca de uma cabaça. Tem um ingrediente secreto que realça a vivacidade da abóbora. E, bem, a vivacidade de tudo, na verdade."
"Purified essence of a demon. If you hold it in your hand, you can hear a low hum.

Consuming this essence will cure you of all Hellfire currently infesting your body. This includes Lesser, normal, and Greater Hellfire.": "Essência purificada de um demônio. Se você segurá-lo na mão, poderá ouvir um zumbido baixo.

Consumir esta essência irá curá-lo de todo o Fogo do Inferno que atualmente infesta seu corpo. Isso inclui Fogo do Inferno Menor, normal e Maior."
"Quality horseshoes for quality horses.": "Ferraduras de qualidade para cavalos de qualidade."
"Quality stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Coisas de qualidade! Esse é o tipo de botas evasivas que você veria na vitrine de uma loja, se houvesse uma loja específica para botas evasivas, o que não existe."
