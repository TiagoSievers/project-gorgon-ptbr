"Sniff that? Smells like feathers and hate. Definitely an archery potion.": "Cheirar isso? Cheira a penas e ódio. Definitivamente uma poção de tiro com arco."
"So cold that your hand goes numb as soon as you touch it.": "Tão frio que sua mão fica dormente assim que você toca nela."
"So heavy! Wait, that's probably an illusion... nope, it really is super heavy. Makes it hard to hold stuff.": "Tão pesado! Espere, isso provavelmente é uma ilusão... não, é realmente muito pesado. Torna difícil segurar as coisas."
"So named because it makes a sort of swishing noise. Nobody said weapons crafters were good at naming things.": "Assim chamado porque faz uma espécie de barulho sibilante. Ninguém disse que os artesãos de armas eram bons em nomear coisas."
"So-called \"Dwarven Nails\", these aren't useful for making houses or other sensible things. Instead, they're used in creating weird machines.": "Chamados de \"Unhas Anãs\", não são úteis para fazer casas ou outras coisas sensatas. Em vez disso, eles são usados ​​na criação de máquinas estranhas."
"Soft, astonishingly flexible, and resistant to murder.": "Suave, surpreendentemente flexível e resistente ao assassinato."
"Soft, warm, and comfortable, without interfering with movement.": "Macio, quente e confortável, sem interferir nos movimentos."
"Some aberrant chemical reaction has burned off most of the crimson, but it's otherwise in good shape.": "Alguma reação química aberrante queimou a maior parte do vermelho, mas, fora isso, está em boa forma."
"Some basic calligraphy ink.": "Um pouco de tinta básica de caligrafia."
"Some bones strapped to a handle make this off-hand martial weapon look as stupid as it feels.": "Alguns ossos amarrados a um cabo fazem esta arma marcial improvisada parecer tão estúpida quanto parece."
"Some damp biscuits. Not appetizing, but much better than starving!

(For an hour after you eat food, you'll regenerate health and power between fights. And better food than this can regenerate you DURING combat, too!)": "Alguns biscoitos úmidos. Não é apetitoso, mas muito melhor do que passar fome!

(Por uma hora depois de comer, você regenerará saúde e poder entre as lutas. E comida melhor do que essa também pode regenerar você DURANTE o combate!)"
"Some dried fish scales.": "Algumas escamas de peixe secas."
"Some effort has been made to link the chains into a glove shape!": "Algum esforço foi feito para unir as correntes em forma de luva!"
"Some extremely dedicated Winter Court fae replace their biological heart with one of these. Presumably it makes them more powerful...": "Algumas fadas extremamente dedicadas da Corte Invernal substituem seu coração biológico por um desses. Presumivelmente, isso os torna mais poderosos..."
"Some fairies like to freeze fruit juice in strange shapes. This one is just a boring rounded bar, but it's still fun.": "Algumas fadas gostam de congelar sucos de frutas em formatos estranhos. Esta é apenas uma barra arredondada chata, mas ainda é divertida."
"Some fresh cranberries. Too bitter to be eaten raw, but useful in cooking.": "Alguns cranberries frescos. Muito amargo para ser comido cru, mas útil na culinária."
"Some large, well-made tin springs.": "Algumas molas de estanho grandes e bem feitas."
"Some mantises say it's good for a hangover. But mantises don't eat soup, so who knows how they'd know that. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Alguns louva-a-deus dizem que é bom para a ressaca. Mas os louva-a-deus não comem sopa, então quem sabe como eles saberiam disso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Some nice leather. Just... nice.": "Um belo couro. Apenas... legal."
"Some of the best plant-based cold-weather gear you may ever see. Comfortable and safe.": "Alguns dos melhores equipamentos vegetais para clima frio que você já viu. Confortável e seguro."
"Some simple salsa can really spice up any flatbread. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um pouco de molho simples pode realmente apimentar qualquer pão achatado. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Some sort of beast was used for this cut. You'd want to tenderize this. A lot.

(Use in Cheap Meat recipes.)": "Algum tipo de animal foi usado para este corte. Você gostaria de amaciar isso. Bastante.

(Use em receitas de carne barata.)"
"Some sort of hempen material stuffed with strange leaves. Itchy.": "Algum tipo de material de cânhamo recheado com folhas estranhas. Pruriginoso."
"Some sort of meat in a delicious sauce. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma espécie de carne com um molho delicioso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Some strips of strange metal with strange properties. It is used by armorsmiths.": "Algumas tiras de metal estranho com propriedades estranhas. É usado por armeiros."
"Some writing in goblin. It looks like instructions or directions, maybe?": "Alguns escritos em goblin. Parecem instruções ou instruções, talvez?"
"Somebody has worn these undergarments previously without washing them. Hopefully that person was you. But you're not sure. Anyway, they reek, plus they provide no armor.": "Alguém já usou essas roupas íntimas sem lavá-las. Espero que essa pessoa seja você. Mas você não tem certeza. De qualquer forma, eles cheiram mal, além de não fornecerem armadura."
"Somebody wove some long bacon strips into a sort of bowl. And then put chunks of fried meat into the bowl. Weird. Salty.": "Alguém teceu algumas longas tiras de bacon numa espécie de tigela. E então coloque pedaços de carne frita na tigela. Esquisito. Salgado."
"Somehow this breastplate got stuck onto a spider via sticky web! What are the odds? Unfortunately, spider acid has filled it with holes, but what a great story!": "De alguma forma, este peitoral ficou preso em uma aranha através de uma teia pegajosa! Quais são as probabilidades? Infelizmente, o ácido aranha encheu-o de buracos, mas que história fantástica!"
"Somehow this glass orb has a bit of depression trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro tem um pouco de depressão presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has a bit of ultimate despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém um pouco do desespero final. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure anguish trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém pura angústia presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, este orbe de vidro contém puro desespero preso dentro dele. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure malice trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, este orbe de vidro contém pura maldade. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has pure revulsion trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro tem pura repulsa presa dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Somehow this glass orb has raw emotional hate trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "De alguma forma, esta esfera de vidro contém um ódio emocional puro preso dentro dela. Emoções sombrias são poder para a Necromancia, e este orbe pode ser usado como uma Gema de Necromancia."
"Someone dreamed of this sturdy shield, then lost control of it.": "Alguém sonhou com este escudo resistente e depois perdeu o controle dele."
"Someone gutted a mangy cat.

(Use in Cheap Meat recipes.)": "Alguém estripou um gato sarnento.

(Use em receitas de carne barata.)"
"Someone has awkwardly painted these sub-par pants. Well, woodland animals aren't super smart, so maybe that'll do.": "Alguém pintou desajeitadamente essas calças abaixo da média. Bem, os animais da floresta não são muito inteligentes, então talvez isso sirva."
"Someone has carved a fist weapon out of glasstone, a rock known for its supernatural lightness. The glasstone market is in shambles now that glasstone jewelry has fallen out of fashion among humans, so new uses are becoming affordable.": "Alguém esculpiu uma arma de punho em vidro, uma rocha conhecida por sua leveza sobrenatural. O mercado de glasstone está em ruínas agora que as joias de glasstone saíram de moda entre os humanos, então novos usos estão se tornando acessíveis."
"Someone has meticulously drawn a geometric pattern on this scroll. It's unnaturally warm to the touch.": "Alguém desenhou meticulosamente um padrão geométrico neste pergaminho. É estranhamente quente ao toque."
"Someone has mixed good egg nog with cheap vodka. (This mixed drink is treated as a beer/wine.)": "Alguém misturou gemada boa com vodca barata. (Esta bebida mista é tratada como cerveja/vinho.)"
"Someone killed an ogre and <i>took its stomach</i>. That's not disturbing at all. Perfectly reasonable thing to do.": "Alguém matou um ogro e <i>cortou seu estômago</i>. Isso não é nada perturbador. Coisa perfeitamente razoável de se fazer."
"Someone put curry in this conch.": "Alguém colocou curry nesta concha."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. Then Fire Magic runes were carefully sculpted into the wood.": "Alguém levou muito tempo equilibrando e testando essa equipe para ter certeza de que ela tinha a distribuição de peso perfeita. Então as runas da Magia do Fogo foram cuidadosamente esculpidas na madeira."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. This will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.": "Alguém levou muito tempo equilibrando e testando essa equipe para ter certeza de que ela tinha a distribuição de peso perfeita. Isso funcionará bem para Staff Fighting, mas não possui as runas necessárias para funcionar para Fire Magic."
"Someone tried to map a cave, but seemed to get disoriented halfway through. The result is useless.": "Alguém tentou mapear uma caverna, mas pareceu ficar desorientado no meio do caminho. O resultado é inútil."
"Someone was buried in these, apparently. They're caked with dust, but don't seem the worse for wear.": "Alguém foi enterrado neles, aparentemente. Eles estão cobertos de poeira, mas não parecem desgastados."
"Someone was practicing their calligraphy on this parchment. They're not bad.": "Alguém estava praticando caligrafia neste pergaminho. Eles não são ruins."
"Someone with a basic sense of style has fashioned these leather pants. Unfortunately the protective reinforcement ruins the look, but it could be worse.": "Alguém com um senso básico de estilo criou essas calças de couro. Infelizmente o reforço protetor estraga o visual, mas poderia ser pior."
"Someone with competence put together these nimble leather boots. Only a small amount of protection is lost in exchange for nimble dodging ability.": "Alguém com competência montou essas ágeis botas de couro. Apenas uma pequena quantidade de proteção é perdida em troca de uma habilidade ágil de esquiva."
"Somewhere between a foul odor and a pleasant one, this amps your adrenal system for fighting.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Algo entre um odor desagradável e um odor agradável, isso amplifica seu sistema adrenal para a luta.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"Sorry! Please accept this cake as a token of our apology. - Sincerely, the Project: Gorgon team": "Desculpe! Por favor, aceite este bolo como um sinal de nossas desculpas. - Atenciosamente, equipe do Projeto: Gorgon"
"Sparks of electricity dance within the otherwise plain-looking water. There's no way that's safe, right?": "Faíscas de eletricidade dançam na água aparentemente plana. Não tem como ser seguro, certo?"
"Special deer-fitted horseshoes made of an otherworldly metal. ": "Ferraduras especiais equipadas com cervos, feitas de um metal de outro mundo."
"Spider legs and brain bits in a slurry of disgusting chemicals!": "Pernas de aranha e pedaços de cérebro em uma mistura de produtos químicos nojentos!"
"Spiders wear this hat for one reason and one reason only: to show off their impeccable sense of fashion.": "As aranhas usam este chapéu por um único motivo: para mostrar seu senso de moda impecável."
"Spooky Banner": "Bandeira Assustadora"
"Spruce chips for smoking fish and meat.": "Batatas fritas para defumar peixe e carne."
"Spun from the butt of a very big spider.": "Fiado da bunda de uma aranha muito grande."
"Staff abilities that normally deal Crushing damage instead deal Slashing damage": "Habilidades do cajado que normalmente causam dano Esmagador, em vez disso causam dano Cortante"
"Stained with blood, ash, and lightning scars, this dark, evil sword is cold to the touch. Which is kind of creepy. But it's surprisingly well-maintained, and wonderfully sharp! A necromancy gem is embedded in the hilt.": "Manchada com sangue, cinzas e cicatrizes de raios, esta espada sombria e maligna é fria ao toque. O que é meio assustador. Mas é surpreendentemente bem conservado e maravilhosamente nítido! Uma gema de necromancia está embutida no punho."
"Stamped with the seal of an official Council representative, this certificate is redeemable for 1000 councils at the Statehelm Bank.": "Carimbado com o selo de um representante oficial do Conselho, este certificado pode ser resgatado por 1.000 conselhos no Statehelm Bank."
"Standard issue for the ancient Dwarven Stalwarts. They don't make them like this anymore.": "Edição padrão para os antigos Dwarven Stalwarts. Eles não os fazem mais assim."
"Stands for \"new model\"": "Significa \"novo modelo\""
"Steak marinaded in fresh-squeezed cranberry juice. Mmm.": "Bife marinado em suco de cranberry espremido na hora. Hum."
"Stick-like and covered in tiny hairs, this is not particularly pleasant to touch.": "Parecido com um bastão e coberto de pêlos minúsculos, não é particularmente agradável de tocar."
"Stinky and stringy, but if you boiled it and hammered it... it'd still be gross.

(Use in Cheap Meat recipes.)": "Fedorento e pegajoso, mas se você fervê-lo e martelá-lo... ainda seria nojento.

(Use em receitas de carne barata.)"
"Stinky sludge that lets you move like a shark. (Swimming buff does not stack with other swimming-buff potions.)": "Lama fedorenta que permite que você se mova como um tubarão. (O buff de natação não se acumula com outras poções de buff de natação.)"
"Stir-fried chicken with broccoli and other vegetables.": "Frango frito com brócolis e outros vegetais."
"Stir-fried eel with juicy cabbage.": "Enguia frita com repolho suculento."
"Strange weeds that supposedly bring the dead back to life.": "Ervas daninhas estranhas que supostamente trazem os mortos de volta à vida."
"Stroking the soft down of this leather often makes even the manliest man shed a manly tear. It's just that soft.": "Acariciar a suavidade deste couro muitas vezes faz até o homem mais viril derramar uma lágrima viril. É tão macio."
"Strong armor with a strong statement to make: \"I like red!\"": "Armadura forte com uma declaração forte a fazer: \"Gosto de vermelho!\""
"Strong enough for a Human, but made for a Goblin. By slaves who toil in very poor working conditions.": "Forte o suficiente para um Humano, mas feito para um Goblin. Por escravos que trabalham em condições de trabalho muito precárias."
"Strong enough to survive a drakeworm's breath, yet supple enough for light dancing in the evening.": "Forte o suficiente para sobreviver ao sopro de uma lagarta, mas flexível o suficiente para dançar levemente à noite."
"Strong general-purpose footwear, with metal outside for protection, wool inside for insulation.": "Calçado resistente de uso geral, com parte externa de metal para proteção e lã interna para isolamento."
"Strong greaves designed to survive even giant attacks.": "Torresmos fortes projetados para sobreviver até mesmo a ataques gigantes."
"Strong metal designed to fit on the chest and shoulders of a wolf.": "Metal forte projetado para caber no peito e nos ombros de um lobo."
"Strong metal designed to fit on the front legs and claws of a wolf.": "Metal forte projetado para caber nas patas dianteiras e nas garras de um lobo."
"Strong metal designed to fit on the lower legs and haunches of a wolf.": "Metal forte projetado para caber na parte inferior das pernas e nas ancas de um lobo."
"Strong pants made of leather. You don't want to think about what creature the leather may have come from.": "Calças fortes feitas de couro. Você não quer pensar de qual criatura o couro pode ter vindo."
"Strong, well-fitting chainmail. A shame about the lack of pockets.": "Cota de malha forte e bem ajustada. Uma pena a falta de bolsos."
"Stuffed with silky leaves and bits of straw. Not comfortable, but great protection!": "Recheado com folhas sedosas e pedaços de palha. Não é confortável, mas ótima proteção!"
"Stuffed with what? Venison, of course!": "Recheado com o quê? Carne de veado, é claro!"
"Sturdy and fashionable, if not especially protective.": "Robusto e moderno, embora não especialmente protetor."
"Sturdy metal boots with a guiding mechanism to orient a shovel while digging.": "Botas de metal resistentes com mecanismo de guia para orientar a pá durante a escavação."
"Styled after the blade of the notorious vampire Ruxandra, who publicly forsook blood-drinking, but was nevertheless hunted and defanged by a mob of angry humans. She took her revenge, using this dirk to feed on the blood of those she deemed unworthy of life.": "Inspirado na lâmina da notória vampira Ruxandra, que publicamente abandonou o consumo de sangue, mas mesmo assim foi caçada e desfigurada por uma multidão de humanos furiosos. Ela se vingou, usando esse punhal para se alimentar do sangue daqueles que ela considerava indignos de viver."
"Stylish, highly mobile, and almost-but-not-quite comfortable leather pants.": "Calças de couro elegantes, altamente móveis e quase, mas não muito confortáveis."
"Stylish, highly mobile, and comfortable leather pants.": "Calças de couro elegantes, altamente móveis e confortáveis."
"Stylish, protective, and almost-but-not-quite comfortable.": "Elegante, protetor e quase, mas não muito confortável."
"Suffer severe stomach pain": "Sofrer fortes dores de estômago"
"Sugar that's supernaturally sweet. A favorite of fairies.": "Açúcar que é sobrenaturalmente doce. Um favorito das fadas."
"Summons a Keg of Love that will grant +5% Combat and Crafting xp to everyone within 20 meters. This buff does not stack with other kegs.": "Evoca um Barril de Amor que concederá +5% de experiência em Combate e Artesanato para todos em um raio de 20 metros. Este buff não acumula com outros barris."
"Summons a portal to Gazluk Keep for 5 minutes": "Evoca um portal para a Fortaleza Gazluk por 5 minutos"
"Summons a portal to Kur Tower for 5 minutes": "Evoca um portal para a Torre Kur por 5 minutos"
"Summons a portal to the Eltibule Goblin Dungeon for 5 minutes": "Evoca um portal para a Masmorra Eltibule Goblin por 5 minutos"
"Summons a portal to the Fungal Fortress for 5 minutes": "Evoca um portal para a Fortaleza Fúngica por 5 minutos"
"Summons a portal to the Ilmari Labyrinth for 5 minutes": "Evoca um portal para o Labirinto Ilmari por 5 minutos"
"Summons a portal to the Nightmare Caves for 5 minutes": "Evoca um portal para as Cavernas do Pesadelo por 5 minutos"
"Summons a portal to the Wintertide for 5 minutes": "Evoca um portal para Wintertide por 5 minutos"
"Super fancy calligraphy ink.": "Tinta de caligrafia super sofisticada."
"Super-resilient winter gloves.": "Luvas de inverno super resistentes."
"Supposedly a favorite of mountain-dwelling orcs. Fresh mutton topped with cheese and peppers.": "Supostamente um dos favoritos dos orcs que vivem nas montanhas. Carneiro fresco coberto com queijo e pimentão."
"Supposedly coated in blood from over 100 different sacrificed creatures, this knife emanates hatred and can lead to unwanted thoughts of murder. A necromancy gem is embedded in the hilt.": "Supostamente revestida com sangue de mais de 100 criaturas sacrificadas diferentes, esta faca emana ódio e pode levar a pensamentos indesejados de assassinato. Uma gema de necromancia está embutida no punho."
"Supposedly taken from the dwarven queen Carlosta, this ruby is quite valuable, but otherwise unremarkable.": "Supostamente tirado da rainha anã Carlosta, este rubi é bastante valioso, mas de outra forma normal."
"Supposedly used by the Rakshasa forces that first arrived on Alharth, this weird weapon is definitely not typical.": "Supostamente usada pelas forças Rakshasa que chegaram pela primeira vez a Alharth, esta arma estranha definitivamente não é típica."
"Sure they're gross, but they're already worn in, and the caked-on dirt provides extra resilience.": "Claro que são nojentos, mas já estão desgastados e a sujeira endurecida proporciona resiliência extra."
"Sure, maybe YOU know it's fake, but nobody else will! They'll think you're riding an actual unicorn!": "Claro, talvez VOCÊ saiba que é falso, mas ninguém mais saberá! Eles vão pensar que você está montando um unicórnio de verdade!"
"Surprise! It's fish plus potatoes.": "Surpresa! É peixe mais batatas."
"Surprisingly clean. Orcs wash their hair more often than most would expect. While orcs don't especially enjoy bathing, they enjoy orc-lice far less.": "Surpreendentemente limpo. Orcs lavam os cabelos com mais frequência do que a maioria esperaria. Embora os orcs não gostem muito de tomar banho, eles gostam muito menos de piolhos-orc."
"Surprisingly light for chainmail, these pants are very comfortable except for the swishing sound they make, and the lack of pockets.": "Surpreendentemente leves para a cota de malha, essas calças são muito confortáveis, exceto pelo som sibilante que fazem e pela falta de bolsos."
"Swallowing this small pebble will teleport you to the Red Wing Casino.": "Engolir esta pequena pedra irá teletransportá-lo para o Red Wing Casino."
"Swallowing this small pebble will teleport you to the Teleportation Circle that you're bound to.": "Engolir esta pequena pedra irá teletransportá-lo para o Círculo de Teletransporte ao qual você está vinculado."
"Sweet *and* tart!": "Doce *e* torta!"
"Sweet and fruity fish-on-a-stick.": "Peixe no palito doce e frutado."
"Sweet and savory pork ribs.": "Costelinha de porco doce e salgada."
"Sweet and strong, with the distinctive odor of molasses. In far-off lands, ranalon produce and drink rum in tremendous quantities, but it's less common -- and less delicious -- in Alharth.": "Doce e forte, com odor característico de melaço. Em terras distantes, os ranalon produzem e bebem rum em enormes quantidades, mas é menos comum – e menos delicioso – em Alharth."
"Sweet sugarcane molasses, useful for cooking or making alcohol.": "Melaço doce de cana-de-açúcar, útil para cozinhar ou fazer álcool."
"Sweet, sweet, sweet steamed carrots.": "Cenouras doces, doces e doces no vapor."
"Sweeter AND more sour than a natural lemon, this troll dessert is guaranteed to pucker your face. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Mais doce E mais azedo que um limão natural, esta sobremesa troll com certeza vai franzir seu rosto. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Sword abilities apply Psychic scream damage for 10 seconds.": "As habilidades de espada aplicam dano de grito psíquico por 10 segundos."
"Sword Slash, Riposte, Windstrike, and Finishing Blow deal direct Fire damage. All Sword abilities apply Flaming Sword damage for 10 seconds.": "Sword Slash, Riposte, Windstrike e Finishing Blow causam dano direto de Fogo. Todas as habilidades de Espada aplicam dano de Espada Flamejante por 10 segundos."
"Tack for a horse.": "Tack para um cavalo."
"Tart and sweet and not too complicated. A basic side-dish.": "Ácido e doce e não muito complicado. Um acompanhamento básico."
"Tart and sweet. A delicacy to some, but not as versatile for cooking as red apples.": "Ácido e doce. Uma iguaria para alguns, mas não tão versátil para cozinhar como as maçãs vermelhas."
"Tastes like furry eyeballs but it makes all your motions feel crisp and sharp.": "Tem gosto de olhos peludos, mas faz com que todos os seus movimentos pareçam nítidos e nítidos."
"Tastes like it will burn your tongue off... and it probably would, if the magic didn't kick in first.": "Tem gosto de que vai queimar sua língua... e provavelmente iria queimar, se a magia não fizesse efeito primeiro."
"Tasty crabmeat in a makeshift bun. Lemony!": "Saborosa carne de caranguejo em pão improvisado. Limão!"
"Tasty fish sticks with the heartburny flavor of fried onions.": "Deliciosos palitos de peixe com sabor azia da cebola frita."
"Tasty fried beetle skewers. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Espetos de besouro fritos saborosos. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Tasty pork and venison sausage. Just don't ask to see how it's made ...": "Saborosa linguiça de porco e veado. Só não pergunte para ver como é feito..."
"Tasty raw flounder wrapped in seaweed, on a ball of delicious rice.": "Saboroso linguado cru envolto em algas marinhas, numa deliciosa bola de arroz."
"Tasty raw vexfish wrapped in lettuce, on a ball of rice and peas.": "Saboroso vexfish cru envolto em alface, numa bola de arroz e ervilhas."
"Tasty raw vexfish wrapped in seaweed, on a ball of delicious rice.": "Saboroso vexfish cru envolto em algas marinhas, numa deliciosa bola de arroz."
"Teaches werewolves how to make a special compound from their saliva.": "Ensina lobisomens a fazer um composto especial com sua saliva."
"Teaches you a bard technique.": "Ensina uma técnica de bardo."
"Teaches you a bat combat technique.": "Ensina uma técnica de combate com morcegos."
"Teaches you a battle chemistry technique.": "Ensina uma técnica de química de batalha."
"Teaches you a cheese recipe.": "Ensina uma receita de queijo."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Death Trooper armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura Gazluk Death Trooper."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Misery Trooper armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura do Soldado da Miséria Gazluk."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Officer armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura de Oficial Gazluk."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Treachery Trooper armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura do Soldado Traiçoeiro Gazluk."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk War Wizard armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura do Mago de Guerra Gazluk."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Mutterer Cabalist armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura Mutterer Cabalist."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Mutterer Necromancer armor.": "Ensina uma técnica de combate que pode ser usada quando você estiver usando quatro ou mais peças da armadura Mutterer Necromancer."
"Teaches you a cow technique.": "Ensina uma técnica de vaca."
"Teaches you a crossbow technique.": "Ensina uma técnica de besta."
"Teaches you a deer technique.": "Ensina uma técnica de cervo."
"Teaches you a distressing meal recipe.": "Ensina uma receita de refeição angustiante."
"Teaches you a disturbing meal recipe.": "Ensina uma receita de refeição perturbadora."
"Teaches you a drink recipe.": "Ensina uma receita de bebida."
"Teaches you a druid technique.": "Ensina uma técnica druida."
"Teaches you a fairy magic technique.": "Ensina uma técnica de magia de fadas."
"Teaches you a first aid technique.": "Ensina uma técnica de primeiros socorros."
"Teaches you a fishing combat technique.": "Ensina uma técnica de combate de pesca."
"Teaches you a flower arrangement and a related flower display.": "Ensina um arranjo de flores e uma exibição de flores relacionada."
"Teaches you a flower arrangement.": "Ensina um arranjo de flores."
"Teaches you a forbidden cooking technique from a lost age.": "Ensina uma técnica culinária proibida desde uma época perdida."
