"Carefully tailored to the eyes of a ratkin, these are worn when a ratkin must go outside during bright sun. The lenses are made of blue glass.": "Cuidadosamente adaptados aos olhos de um ratkin, eles são usados ​​quando um ratkin precisa sair durante o sol forte. As lentes são feitas de vidro azul."
