"An incredible mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Uma incrível escolha de mineração de origem orc. Há um pequeno dispositivo embutido na cabeça que permite girar, para que os orcs possam minerar esfaqueando em vez de balançar. Inovador."
"An incredible piece of meat that's been overcooked to charcoal. Still edible, but a waste of quality beef.": "Um pedaço incrível de carne que foi cozido demais até virar carvão. Ainda comestível, mas um desperdício de carne bovina de qualidade."
"An incredibly rare form of pearl. It can be used in very-high-end jewelrymaking, and alchemists prize it above all other gems. Geologists, for their part, don't even consider it a gem at all.": "Uma forma incrivelmente rara de pérola. Ela pode ser usada na fabricação de joias de alta qualidade, e os alquimistas a valorizam acima de todas as outras gemas. Os geólogos, por sua vez, nem mesmo consideram isso uma joia."
"An inedible mushroom, used by alchemists.": "Cogumelo não comestível, usado por alquimistas."
"An innovatively compact hammered dulcimer.": "Um dulcimer martelado inovador e compacto."
"An insane amount of sugar has been used to totally mask the ingredients' taste. Now it just tastes like pure sugar, which is still kind of revolting.": "Uma quantidade absurda de açúcar foi usada para mascarar totalmente o sabor dos ingredientes. Agora só tem gosto de açúcar puro, o que ainda é meio nojento."
"An inscription claims \"Fame and Fortune are Fleeting...\"": "Uma inscrição diz \"Fama e fortuna são passageiras...\""
"An inscription in Elven reads \"To my lovely Velkort, thanks for a great evening.\"": "Uma inscrição em élfico diz \"Para minha adorável Velkort, obrigado por uma ótima noite.\""
"An inscription on this beautiful instrument claims that it was used by Ultimator to wake up a drunken company of troops at the Battle of Buttocks' End. If true, this battle has been lost to the ages. The instrument primarily excels at low fart-like noises.": "Uma inscrição neste belo instrumento afirma que ele foi usado pelo Ultimator para acordar uma companhia de tropas bêbadas na Batalha de Buttocks' End. Se for verdade, esta batalha está perdida há muito tempo. O instrumento se destaca principalmente em ruídos baixos, semelhantes a peidos."
"An instrument made of two ram horns, one embedded inside the other. The sound is terrible, so it is exclusively used as a weapon.": "Instrumento feito de dois chifres de carneiro, um embutido no outro. O som é terrível, por isso é usado exclusivamente como arma."
"An insulated helmet that is as frightening as it is protective.": "Um capacete isolado que é tão assustador quanto protetor."
"An intoxicating aroma of autumn flavors mixed with potent hallucinogens.

This candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Um aroma inebriante de sabores outonais misturados com potentes alucinógenos.

Esta vela dura 5 minutos e qualquer número de pessoas pode apreciá-la. Você só pode implantar 1 vela por vez."
"An introductory text. Most techniques are just tutorials, but the recipe for causing fruit to rot has a few uses. And it's good practice!": "Um texto introdutório. A maioria das técnicas são apenas tutoriais, mas a receita para apodrecer as frutas tem alguns usos. E é uma boa prática!"
"An invention of the yeti people, this kabob-like snack is best eaten <i>before</i> you learn the ingredients. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma invenção do povo Yeti, esse lanche tipo espetinho é melhor comido <i>antes</i> de aprender os ingredientes. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"An invisible hat, or so the wearer would have you believe. Useful in glamouring.": "Um chapéu invisível, ou pelo menos é o que o usuário quer que você acredite. Útil no glamour."
"An invisible pair of boots, designed to force others to look at your bare feet whether they want to or not. Useful in glamouring.": "Um par de botas invisíveis, projetado para forçar outras pessoas a olharem para seus pés descalços, querendo ou não. Útil no glamour."
"An invisible shirt, perfect for the budding exhibitionist. Useful in glamouring.": "Uma camisa invisível, perfeita para o exibicionista iniciante. Útil no glamour."
"An iron sword with a thick coat of silver on top.": "Uma espada de ferro com uma espessa camada de prata no topo."
"An ocarina made of horn. This instrument is especially easy to learn.": "Uma ocarina feita de chifre. Este instrumento é especialmente fácil de aprender."
"An odd serrated utility knife that can be used to extract a skull from a corpse. (Your Butchering skill is used to determine success.)": "Uma estranha faca serrilhada que pode ser usada para extrair uma caveira de um cadáver. (Sua habilidade de Açougueiro é usada para determinar o sucesso.)"
"An odorous dish said to be palatable to psychic mantises.": "Um prato odorífero considerado palatável para louva-a-deus psíquicos."
"An off-hand blade favored by some elven fencers, who use it in conjunction with a longsword.": "Uma lâmina improvisada preferida por alguns esgrimistas élficos, que a usam em conjunto com uma espada longa."
"An off-hand knife used as a personal-defense weapon by some mages. It has a tiny warding glyph that diminishes damage.": "Uma faca improvisada usada como arma de defesa pessoal por alguns magos. Possui um pequeno glifo de proteção que diminui o dano."
"An off-hand weapon with nasty barbs to cause as much traumatic damage as possible.": "Uma arma secundária com farpas desagradáveis ​​para causar o máximo de dano traumático possível."
"An oily wax that smells great to bees. Used to help ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Uma cera oleosa que cheira bem às abelhas. Usado para ajudar a garantir o sucesso do acasalamento com abelhas ou vespas. (Para usar, dê a uma abelha ou vespa de estimação por meio da interface do Estável. O efeito dura até que o animal de estimação seja usado em uma tentativa de reprodução. Um animal de estimação só pode usar uma cera por vez; usar outra cera substitui a primeira.)"
"An old book written by an elf about how to use dwarven engineering in elven designs.": "Um livro antigo escrito por um elfo sobre como usar a engenharia anã em projetos élficos."
"An old brown plate, the kind vendors really like for some reason. Maybe there's a collectibles market you're unaware of.": "Um velho prato marrom, do tipo que os vendedores realmente gostam por algum motivo. Talvez haja um mercado de colecionáveis ​​que você desconhece."
"An old dwarven tool. While unexceptional by dwarven standards, it's quite impressive to many other races, who use it as an off-hand weapon.": "Uma velha ferramenta anã. Embora não seja excepcional para os padrões dos anões, é bastante impressionante para muitas outras raças, que a usam como arma secundária."
"An old key coated in bright red goo.": "Uma chave antiga coberta com uma gosma vermelha brilhante."
"An old key coated in purple fungus.": "Uma chave antiga coberta de fungo roxo."
"An old key encrusted in slime. Somehow it passed beyond the veil of death! But it's back now.": "Uma chave antiga incrustada em lodo. De alguma forma, passou além do véu da morte! Mas está de volta agora."
"An old key marred by rust.": "Uma chave velha manchada pela ferrugem."
"An old metal key from a dusty old chest you found under Hogan's Keep. Utterly unremarkable.": "Uma velha chave de metal de um baú velho e empoeirado que você encontrou embaixo da Fortaleza de Hogan. Totalmente normal."
"An old mini-loaf made to last decades. The outside is as hard as a rock, but the inside is still edible.": "Um mini-pão antigo feito para durar décadas. O exterior é duro como uma rocha, mas o interior ainda é comestível."
"An old style of blade, favored by some werewolves but not many others.": "Um estilo antigo de lâmina, preferido por alguns lobisomens, mas não por muitos outros."
"An old, forgotten memory that has been written down so as not to forget it again. This is used to remind certain people about certain events.": "Uma memória antiga, esquecida, que foi escrita para não voltar a ser esquecida. Isto é usado para lembrar certas pessoas sobre certos eventos."
"An orange.": "Uma laranja."
"An orcish chef used this to chop vegetables... and any drunk orcs that got out of line. Sharpened via an unknown technique, it cleaves through anything with ease.": "Um chef orc usou isso para picar vegetais... e qualquer orc bêbado que saísse da linha. Afiado através de uma técnica desconhecida, ele corta qualquer coisa com facilidade."
"An orcish concoction that uses your anger to keep you warm.": "Uma mistura orc que usa sua raiva para mantê-lo aquecido."
"An orcish Hal-Ku story (which are non-fiction accounts of orcs torturing other people to death). Recounts every minute of a six-week torture session, wherein the orcish author slowly killed a human alchemist. Much of the book is padded with grotesque anecdotes, but one useful recipe is hidden in the appendix.": "Uma história orc Hal-Ku (que são relatos de não ficção de orcs torturando outras pessoas até a morte). Relata cada minuto de uma sessão de tortura de seis semanas, em que o autor orc matou lentamente um alquimista humano. Grande parte do livro está repleta de anedotas grotescas, mas uma receita útil está escondida no apêndice."
"An orcish invention similar to a Dwarven N Core, but much more powerful. It has the same shape and size as the Dwarven version.": "Uma invenção orc semelhante a um Dwarven N Core, mas muito mais poderosa. Tem o mesmo formato e tamanho da versão Dwarven."
"An orcish ragant with a very Povus flair.": "Um orc ragant com um toque muito Povus."
"An orcish staple, famous for its lingering effect. It's... an acquired taste.": "Um alimento básico dos orcs, famoso por seu efeito duradouro. É... um gosto adquirido."
"An ordinary Council that's had weird little marks etched into it.": "Um Conselho comum que tinha pequenas marcas estranhas gravadas nele."
"An ordinary-looking glass flask that's cold to the touch, even in hot environments.": "Um frasco de vidro de aparência comum e frio ao toque, mesmo em ambientes quentes."
"An organ cut out of a large scorpion.": "Um órgão cortado de um grande escorpião."
"An Orichalcum blade with a seashell motif. (With random level 35 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 35.)"
"An Orichalcum blade with a seashell motif. (With random level 40 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 40.)"
"An Orichalcum blade with a seashell motif. (With random level 45 enchantments.)": "Lâmina de Orichalcum com motivo de concha. (Com encantamentos aleatórios de nível 45.)"
"An original work by an elven name you don't recognize, Errasteria. It's lovely.": "Uma obra original com um nome élfico que você não reconhece, Errasteria. É adorável."
"An ornate belt buckle depicting a hammer.

This buckle slowly decays when worn in combat until it eventually disappears.": "Uma fivela de cinto ornamentada representando um martelo.

Esta fivela decai lentamente quando usada em combate até desaparecer."
"An ornate staff that celebrates your renowned generosity.": "Uma equipe ornamentada que celebra sua reconhecida generosidade."
"An ornately jeweled hairpin used by goblins of both sexes.": "Um grampo de cabelo ornamentado com joias usado por goblins de ambos os sexos."
"An otherworldly device that can fire energy projectiles. It can also fire regular arrows.": "Um dispositivo de outro mundo que pode disparar projéteis de energia. Também pode disparar flechas normais."
"An over-engineered dwarven weapon. It requires a lot of maintenance, but most users find the accelerated reload-time worth it.": "Uma arma anã superprojetada. Requer muita manutenção, mas a maioria dos usuários acha que o tempo de recarga acelerado vale a pena."
"An over-engineered potion that's quite tricky to make. There are probably easier ways to make an equivalent potion. But at least it's not addictive.": "Uma poção superprojetada que é bastante complicada de fazer. Provavelmente existem maneiras mais fáceis de fazer uma poção equivalente. Mas pelo menos não é viciante."
"An oversized ring with bumps that seem to uniquely identify a specific demon.": "Um anel enorme com saliências que parecem identificar exclusivamente um demônio específico."
"An oversized saddlebag for sturdy mounts.": "Um alforje grande para montagens resistentes."
"An ugly and not-especially-sharp weapon made of cold iron. Goblins use them when hunting fairies for capture.": "Uma arma feia e não especialmente afiada feita de ferro frio. Goblins os usam quando caçam fadas para captura."
"An ugly green ring that leaves a vaguely smelly odor behind.": "Um anel verde feio que deixa um odor vagamente fedorento."
"An uncomfortably heavy ring made of black glass. It features a necromancy gem.": "Um anel desconfortavelmente pesado feito de vidro preto. Possui uma joia de necromancia."
"An understated saddlebag that is nevertheless quite enchantmented.": "Um alforje discreto mas bastante encantado."
"An unexpectedly refreshing drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Uma bebida inesperadamente refrescante. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"An unfolding bloom of fried onion. Dipping sauce optional.": "Uma flor de cebola frita que se desdobra. Molho opcional."
"An unidentifiable hunk of meat, imbued with demonic essence, and roasted to perfection.

In addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Um pedaço de carne não identificável, imbuído de essência demoníaca e assado com perfeição.

Além dos efeitos alimentares habituais, esta refeição também reduz o efeito do custo de energia do Fogo do Inferno em 25%."
"An unimpressive dog-like creature yielded this unimpressive \"meat\".

(Use in Cheap Meat recipes.)": "Uma criatura inexpressiva, parecida com um cachorro, rendeu essa \"carne\" inexpressiva.

(Use em receitas de carne barata.)"
"An uninviting dinosaur flank.

(Use in Cheap Meat recipes.)": "Um flanco de dinossauro pouco convidativo.

(Use em receitas de carne barata.)"
"An unnatural blue liquid.": "Um líquido azul não natural."
"An unnaturally cold crystal.": "Um cristal anormalmente frio."
"An unpleasant substance that activates every area of your tongue at once.": "Uma substância desagradável que ativa todas as áreas da língua ao mesmo tempo."
"An unpleasant-tasting but nutritionally dense substance.": "Uma substância de sabor desagradável, mas nutricionalmente densa."
"An unusual but tasty meal.": "Uma refeição inusitada mas saborosa."
"An unusual staff with an alchemical beaker on the end. Not suitable for casting Fire Magic.": "Um cajado incomum com um copo alquímico na ponta. Não é adequado para lançar Fire Magic."
"An unusual tea with a strong kick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Um chá incomum com um chute forte. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Another piece of once-ceremonial armor that was retrofitted for combat during the Elf-Dwarf wars. The suit has since become a favorite of elven warriors thanks to its handy odor-repulsion magic. And also, of course, its insane amount of protection.": "Outra peça de armadura outrora cerimonial que foi adaptada para combate durante as guerras entre Elfos e Anões. Desde então, o traje se tornou o favorito dos guerreiros élficos graças à sua prática magia de repulsão de odores. E também, é claro, sua quantidade absurda de proteção."
"Another public-relations disaster by the famous Veilmoor clan of human smiths, these claws are each imbued with the soul of a kitten who would otherwise have been euthanized. While it's not technically illegal to use such small souls in enchanting, the 'save the kittens forever' campaign was not appreciated by the weapon-buying public. But as is typical with Veilmoor products, the weapon is so good that nothing else matters too much.": "Outro desastre de relações públicas do famoso clã Veilmoor de ferreiros humanos, cada uma dessas garras está imbuída da alma de um gatinho que de outra forma teria sido sacrificado. Embora não seja tecnicamente ilegal usar almas tão pequenas para encantar, a campanha “salve os gatinhos para sempre” não foi apreciada pelo público comprador de armas. Mas, como é típico dos produtos Veilmoor, a arma é tão boa que nada mais importa muito."
"Another tiresome chapbook by Su-Moltik. This one is an exercise in metaphor over-extension, where the eponymous tonsils are described as being in the Throat of Belief, which is surrounded by the Neck Muscles of Close-Mindedness. It goes on like that for a very long time. Its unintentional hilarity has made it a cult classic, much to Su-Moltik's confusion and annoyance.": "Outro livro cansativo de Su-Moltik. Este é um exercício de superextensão de metáfora, onde as amígdalas de mesmo nome são descritas como estando na Garganta da Crença, que é cercada pelos Músculos do Pescoço da Mente Fechada. Isso continua assim por muito tempo. Sua hilaridade involuntária o tornou um clássico cult, para grande confusão e aborrecimento de Su-Moltik."
"Another volume by the dwarven master Gammo. Each dwarven god gets their own epic-length poem. One, the poem about Ormorek, is very good. The others are <i>embarrassingly</i> bad. But Gammo is long dead, so dwarven society seems to have agreed to just conveniently forget about the bad ones.": "Outro volume do mestre anão Gammo. Cada deus anão recebe seu próprio poema épico. Um deles, o poema sobre Ormorek, é muito bom. Os outros são <i>embaraçosamente</i> ruins. Mas Gammo morreu há muito tempo, então a sociedade anã parece ter concordado em simplesmente esquecer os maus."
"Any beauty these leggings once possessed has long faded. But they still have an inner beauty, right?": "Qualquer beleza que essas leggings possuíram já desapareceu há muito tempo. Mas eles ainda têm uma beleza interior, certo?"
"Apparently intended to be a gift to Ursula's mother, this cowl is <i>very</i> poorly made and offers no real protection. It has been enchanted with an apprentice-level spell that would normally not be very effective, but the enchantment has been repeated thousands of times over many years, and this has somehow cohered into a decent level of magic.": "Aparentemente destinado a ser um presente para a mãe de Ursula, este capuz é <i>muito</i> mal feito e não oferece nenhuma proteção real. Ele foi encantado com um feitiço de nível de aprendiz que normalmente não seria muito eficaz, mas o encantamento foi repetido milhares de vezes ao longo de muitos anos, e isso de alguma forma resultou em um nível decente de magia."
"Apparently once used by Lawara, an elf you met in on an island. It's high-quality, and has a custom hand plate that provides a bit of shielding.": "Aparentemente, uma vez usado por Lawara, um elfo que você conheceu em uma ilha. É de alta qualidade e possui uma placa de mão personalizada que fornece um pouco de proteção."
"Apparently Rita gave these to Sir Coth, who has since discarded them.": "Aparentemente, Rita deu-os a Sir Coth, que desde então os descartou."
"Apparently this starfish is especially problematic to local fish.": "Aparentemente, esta estrela do mar é especialmente problemática para os peixes locais."
"Apple brandy, with a distinctive apple taste and a strong kick. A longtime favorite of rural humans.": "Aguardente de maçã, com um sabor característico de maçã e um toque forte. Um favorito de longa data dos humanos rurais."
"Apple Juice!": "Suco de maçã!"
"Apple Juice! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Suco de maçã! (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Apples and strawberries in sweet syrup. A little monotonous.": "Maçãs e morangos em calda doce. Um pouco monótono."
"Apples, grapes, oranges and guava in sweet syrup. Who puts guava in fruit cocktail?": "Maçãs, uvas, laranjas e goiabada em calda doce. Quem coloca goiaba no coquetel de frutas?"
"Apples, strawberries, and grapes in sweet syrup. It's good... but not great.": "Maçãs, morangos e uvas em calda doce. É bom... mas não ótimo."
"Apples, strawberries, grapes and oranges in sweet syrup.": "Maçãs, morangos, uvas e laranjas em calda doce."
"Appropriate padding and reinforcement make this coif a pleasure to wear into battle.": "O acolchoamento e o reforço apropriados tornam esta touca um prazer de usar na batalha."
"Approximating the traditional look of a chainmail coif.": "Aproximando-se do visual tradicional de uma touca de cota de malha."
"Archtroll merchants in the fae realm sell these clubs as souvenirs to rich magical tourists. Very few tourists realize the exceptional quality they're purchasing, and most are thrown away as junk a few years later.": "Comerciantes Archtrolls no reino feérico vendem esses clubes como lembranças para ricos turistas mágicos. Muito poucos turistas percebem a qualidade excepcional que estão comprando e a maioria é jogada fora como lixo alguns anos depois."
"Aromatic and juicy.": "Aromático e suculento."
"As far as meat jerkies go, it really doesn't get much better than this.": "No que diz respeito à carne seca, realmente não existe nada melhor do que isso."
"As simple as clubs are, it's still surprisingly easy to screw them up. This one isn't screwed up!": "Por mais simples que sejam os clubes, ainda é surpreendentemente fácil estragá-los. Este não está estragado!"
"As soon as you wield this blade, you can sense its eagerness: it wants to be your partner in murder! Of course, good partnerships require sacrifice from both partners...": "Assim que você empunhar esta lâmina, você poderá sentir sua ansiedade: ela quer ser sua parceira no assassinato! É claro que boas parcerias exigem sacrifício de ambos os parceiros..."
"As you glance into this painting, the details seem to melt away. It is a cursed forgery of Gobblenuk's Forger's Peril: the insane goblin artist concocted a magical painting that can never be replicated. Any attempt to do so results in this monstrous visual effect. On the other hand, the visual effect is pretty sweet.": "Ao olhar para esta pintura, os detalhes parecem derreter. É uma falsificação amaldiçoada do Perigo do Forjador de Gobblenuk: o artista duende insano inventou uma pintura mágica que nunca poderá ser replicada. Qualquer tentativa nesse sentido resulta neste efeito visual monstruoso. Por outro lado, o efeito visual é bastante agradável."
"Aside from the jangle sound when you walk, these are decent pants.": "Além do som estridente quando você anda, essas calças são decentes."
"Aside from the jangle sound when you walk, these boots are decent.": "Além do barulho quando você anda, essas botas são decentes."
"Asterion the minotaur customized this ridiculously heavy hammer to be even heavier. A phrase is inscribed on the shaft in common tongue: \"If you cannot lift my hammer, I shall lift it for you.\"": "Asterion, o minotauro, personalizou este martelo ridiculamente pesado para ficar ainda mais pesado. Uma frase está inscrita na haste na língua comum: \"Se você não consegue levantar meu martelo, eu o levantarei para você.\""
"Astonishingly, these leather pants don't chafe! This is some high-grade magic right here. Or just great tailoring.": "Surpreendentemente, essas calças de couro não irritam! Esta é uma magia de alta qualidade bem aqui. Ou apenas uma ótima alfaiataria."
"Astounding stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Coisas surpreendentes! Esse é o tipo de botas evasivas que você veria na vitrine de uma loja, se houvesse uma loja específica para botas evasivas, o que não existe."
"Astounding, yes. But only incrementally better than the amazing horseshoes.": "Surpreendente, sim. Mas apenas gradativamente melhor do que as incríveis ferraduras."
"Astoundingly protective against freezing.": "Surpreendentemente protetor contra congelamento."
"At first glance it seems to be an acorn dipped in gold, but it's actually an acorn carved from solid gold. Pretty.": "À primeira vista parece ser uma bolota mergulhada em ouro, mas na verdade é uma bolota esculpida em ouro maciço. Bonito."
"Attaching this enchanted medal to your gear will boost your learning from races. Or it will explode during installation.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha encantada ao seu equipamento aumentará seu aprendizado nas corridas. Ou explodirá durante a instalação.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this enchanted medal to your gear will boost your mount's bravery during races... If it doesn't explode during installation.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha encantada ao seu equipamento aumentará a bravura da sua montaria durante as corridas... Se ela não explodir durante a instalação.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this enchanted medal to your gear will boost your mount's jumping capability during races... If it doesn't explode during installation, that is.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha encantada ao seu equipamento aumentará a capacidade de salto da sua montaria durante as corridas... Isto é, se ela não explodir durante a instalação.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this enchanted medal to your gear will boost your mount's maximum land speed during races. Or it'll explode your gear.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha encantada ao seu equipamento aumentará a velocidade máxima da sua montaria durante as corridas. Ou explodirá seu equipamento.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this medal to your gear will boost your mount's jumping capability during races.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha ao seu equipamento aumentará a capacidade de salto da sua montaria durante as corridas.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this medal to your gear will make your mount slightly braver during races.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Anexar esta medalha ao seu equipamento tornará sua montaria um pouco mais corajosa durante as corridas.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this ribbon to your reins will make you go faster during races. Slightly. Very, very slightly.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Prender esta fita nas rédeas fará com que você ande mais rápido durante as corridas. Um pouco. Muito, muito ligeiramente.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Attaching this ribbon to your reins will make you learn a bit more from each race you undertake.

This item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Prender esta fita nas rédeas fará com que você aprenda um pouco mais com cada corrida que realizar.

Este item é anexado às Rédeas ou à Sela por meio de uma receita. Usar este item lhe ensinará a receita, se necessário."
"Augmented with magical sigils that enhance the lute's hypnotic properties. (The magic isn't strong, but it's noticeable.) One of the sigils happens to be a symbol of Arisetsu, enabling priest magic.": "Aumentado com sigilos mágicos que melhoram as propriedades hipnóticas do alaúde. (A magia não é forte, mas é perceptível.) Um dos sigilos é um símbolo de Arisetsu, permitindo a magia sacerdotal."
"Awesome stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Coisas incríveis! Esse é o tipo de botas evasivas que você veria na vitrine de uma loja, se houvesse uma loja específica para botas evasivas, o que não existe."
"Awesomely protective against freezing.": "Incrivelmente protetor contra congelamento."
"Baked beets in a succulent, simple glaze.": "Beterraba assada em uma cobertura simples e suculenta."
"Baked chicken in a complex dish. This one was cooked just right and has a variety of textures.": "Frango assado em um prato complexo. Este foi cozido na medida certa e tem uma variedade de texturas."
"Baked with a delicate lemon glaze. Delicious!": "Assado com uma delicada cobertura de limão. Delicioso!"
"Barely functional cloth gloves.": "Luvas de pano pouco funcionais."
"Barley ground into flour.": "Cevada moída em farinha."
"Basic horseshoes for basic horses.": "Ferraduras básicas para cavalos básicos."
"Basic racing tack.": "Aderência básica de corrida."
"Basic tack for a horse, with little pouches sewn in for quick access to key items.": "Arreios básicos para cavalo, com bolsinhas costuradas para acesso rápido aos itens principais."
"Basic tack for a horse.": "Aderência básica para um cavalo."
"Basically just chunks of wood nailed to a cow's feet. Which makes them sound more comfortable than they really are.": "Basicamente, apenas pedaços de madeira pregados nos pés de uma vaca. O que os faz parecer mais confortáveis ​​do que realmente são."
"Basically just chunks of wood nailed to a deer's feet. Which makes them sound more comfortable than they really are.": "Basicamente, apenas pedaços de madeira pregados nas patas de um cervo. O que os faz parecer mais confortáveis ​​do que realmente são."
"Batter-dipped onion rings.": "Anéis de cebola mergulhados em massa."
"Batter-dipped potato wedges.": "Fatias de batata mergulhadas em massa."
"Beautiful! Look at those stripes!": "Lindo! Olha essas listras!"
"Beetles are the least-offensive ingredient in this horrifying -- but tasty -- snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Os besouros são o ingrediente menos ofensivo neste lanche horrível - mas saboroso. (Este é um lanche. Os lanches acompanham as refeições; você pode comer um de cada e obter os benefícios de ambos.)"
"Beets and cheese!": "Beterraba e queijo!"
"Bestows a holiday title.": "Concede um título de feriado."
"Bestows a special title.": "Confere um título especial."
"Bestows a testing title.": "Concede um título de teste."
"Bestows a title.": "Concede um título."
"Bestows a title. (This scroll was created by the player that owns this title.)": "Concede um título. (Este pergaminho foi criado pelo jogador que possui este título.)"
"Bits of ground up hippo hair. Very itchy.": "Pedaços de cabelo de hipopótamo moído. Muito coceira."
"Bits of ground-up stinger are floating in it.": "Pedaços de ferrão moído estão flutuando nele."
"Bits of meat are floating in this small vial of sugar water.": "Pedaços de carne estão flutuando neste pequeno frasco de água com açúcar."
"Bits of prepared leather, useful in many ways.": "Pedaços de couro preparado, úteis de várias maneiras."
"Blackened as if from fire, this metal glyph emanates controlled rage. A soot-covered Necromancy Gem is still affixed on the back.": "Enegrecido como se fosse de fogo, este glifo de metal emana raiva controlada. Uma Gema de Necromancia coberta de fuligem ainda está afixada nas costas."
"Blackened, gristly, and overcooked meat from some sort of beast. At least it's fresh.": "Carne enegrecida, cartilaginosa e cozida demais de algum tipo de animal. Pelo menos está fresco."
"Blessed by a high priest of Au-Shin, this tube of liquid glows like a light.": "Abençoado por um sumo sacerdote de Au-Shin, este tubo de líquido brilha como uma luz."
"Blood from a crazed vampire thrall, said to be especially tasty. (But tastes like blood to you.)": "Sangue de um vampiro enlouquecido, considerado especialmente saboroso. (Mas tem gosto de sangue para você.)"
"Blood, or at least some sort of blood-like ichor, extracted from the wings of a demonic flapskull.": "Sangue, ou pelo menos algum tipo de icor semelhante a sangue, extraído das asas de um crânio demoníaco."
"Boiled cabbage with salt and butter to taste. Not as bad as it sounds!": "Repolho cozido com sal e manteiga a gosto. Não é tão ruim quanto parece!"
