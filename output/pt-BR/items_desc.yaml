"A pretty blue mushroom. Some believe the name comes from its vague resemblance to a wizard's hat, while others believe it's due to the tendency for the mushrooms to explode into freezing electricity when touched.": "Um lindo cogumelo azul. Alguns acreditam que o nome vem de sua vaga semelhança com o chapéu de um bruxo, enquanto outros acreditam que é devido à tendência dos cogumelos explodirem em eletricidade congelante quando tocados."
