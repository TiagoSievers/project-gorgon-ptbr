Grants 10% chance to harvest double items when gardening.

Once deployed, display lasts 5 minutes and can be used by any number of players.": "Uma incrível exposição de flores que inspira maior cuidado e atenção na hora de jardinar.

Concede 10% de chance de colher itens duplos durante a jardinagem.

Depois de implantada, a exibição dura 5 minutos e pode ser usada por qualquer número de jogadores."
