"A pulled-curd cheese with a slightly rubbery, sweet taste.

Cheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Queijo de coalhada desfiada com sabor adocicado e levemente borrachento.

