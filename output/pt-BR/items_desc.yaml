"A beautiful chain with a slightly-large purple gem. It has a multifaceted glamour that makes the crystal seem to constantly twinkle.": "Uma linda corrente com uma gema roxa ligeiramente grande. Possui um glamour multifacetado que faz com que o cristal pareça brilhar constantemente."
"A beautiful collar with a unique identification number chiseled into the inside. As well as being made of silver, it might be useful for accessing certain supply crates.": "Uma linda coleira com um número de identificação exclusivo gravado no interior. Além de ser feito de prata, pode ser útil para acessar certas caixas de suprimentos."
"A beautiful collection of flowers that reaffirms a friendship.

