# Project Gorgon — directedgoals (pt-BR)
# Gerado de templates/translator-ru + cache/translations.json

"A hunter named Percy lives in a cabin in the countryside. Getting to know Percy can unlock certain opportunities.": "Um caçador chamado Percy mora em uma cabana no campo. Conhecer Percy pode desbloquear certas oportunidades."
"A Rakshasa named Kalaba is a sturdy warrior camping in Eltibule Keep. Seek him out and learn how to change ability mods on your equipment.": "Um Rakshasa chamado Kalaba é um guerreiro robusto que acampa no Forte Eltibule. Procure-o e aprenda como alterar os mods de habilidade do seu equipamento."
"An Elf named Braigon is visiting Eltibule Keep. Take advantage of that opportunity to befriend him and learn his cheesemaking techniques.": "Um elfo chamado Braigon está visitando Eltibule Keep. Aproveite a oportunidade para fazer amizade com ele e aprender suas técnicas de fabricação de queijos."
"An enchanted training dummy can be found on the northwest beach of the island. It is immune to physical damage (which means Slashing, Crushing, or Piercing damage), so you'll need to find another way to damage it.": "Um boneco de treinamento encantado pode ser encontrado na praia noroeste da ilha. Ele é imune a danos físicos (o que significa dano cortante, esmagador ou perfurante), então você precisará encontrar outra maneira de danificá-lo."
"Anagoge Island": "Ilha Anagoge"
"Anagoge Island Dungeon": "Masmorra da Ilha Anagoge"
"Befriend Tyler Green and learn Shield Mastery": "Faça amizade com Tyler Green e aprenda Shield Mastery"
"Beyond the megaspider in the Serbule crypt is a lich. Defeat her to access a deeper part of the crypt.": "Além da megaaranha na cripta de Serbule está um lich. Derrote-a para acessar uma parte mais profunda da cripta."
"Complete a War Cache": "Conclua um cache de guerra"
"Complete favors for Echur or give him gifts until you reach Friends favor-level, and he will automatically teach you the Mentalism skill for free.": "Complete favores para Echur ou dê presentes a ele até atingir o nível de favor de Amigos, e ele lhe ensinará automaticamente a habilidade Mentalismo de graça."
"Complete two quests involving killing panthers and Kalaba will offer to teach you Transmutation. Once you reach Friends favor-level with Kalaba, you can learn more Transmutation recipes from his Training menu. This is a very important crafting skill to learn as it allows you to take any piece of modded equipment and make it stronger for your combat ability's needs.": "Complete duas missões envolvendo matar panteras e Kalaba se oferecerá para lhe ensinar Transmutação. Depois de atingir o nível de amizade de Amigos com Kalaba, você poderá aprender mais receitas de transmutação em seu menu de treinamento. Esta é uma habilidade de artesanato muito importante para aprender, pois permite que você pegue qualquer peça de equipamento modificado e torne-o mais forte para as necessidades de sua habilidade de combate."
"Cook Bacon": "Cozinhar Bacon"
"Cook Onion Rings": "Cozinhe anéis de cebola"
"Create a Poison Resistance Potion": "Crie uma poção de resistência a veneno"
"Deep in the bowels of the Serbule crypt is a gigantic spider of ridiculous size and power. Kill it to gain access to a new skill. (Good luck. You'll need it.)": "Nas profundezas da cripta de Serbule está uma aranha gigantesca de tamanho e poder ridículos. Mate-o para obter acesso a uma nova habilidade. (Boa sorte. Você vai precisar.)"
"Deep in the dungeon beneath Anagoge Island is a stash of important knowledge, including a book on how to stun golems and automatons. The dungeon entrance is in a cliff face. Once inside, you'll need to take three sets of stairs down to reach the records level. (Avoid Gajus! If you see warnings about Gajus, you missed the second stairwell.) The chest you need is in the far north part of the dungeon. When you find strange lamps in the middle of rooms, you're in the vicinity.": "Nas profundezas da masmorra abaixo da Ilha Anagoge há um estoque de conhecimentos importantes, incluindo um livro sobre como atordoar golens e autômatos. A entrada da masmorra fica na face de um penhasco. Uma vez lá dentro, você precisará descer três lances de escadas para chegar ao nível dos recordes. (Evite Gajus! Se você vir avisos sobre Gajus, você perdeu a segunda escada.) O baú que você precisa está na parte norte da masmorra. Quando você encontra lâmpadas estranhas no meio dos quartos, você está nas proximidades."
"Defeat a Megaspider": "Derrote uma Megaaranha"
"Defeat an Omegaspider": "Derrote um Omegaspider"
"Defeat Khyrulek's First Form": "Derrote a primeira forma de Khyrulek"
"Defeat The Big Widow": "Derrote a Grande Viúva"
"Defeat The Mangler": "Derrote o Mangler"
"Destroy the training dummy": "Destrua o boneco de treinamento"
"Discover all the Ranalon Telepods": "Descubra todos os telépodes Ranalon"
"Echur is an Elf living in Serbule. He's standing near a strange glowing contraption. He's a master of Meditation, but if you become close enough friends, he'll also reveal deeper mental secrets.": "Echur é um elfo que vive em Serbule. Ele está parado perto de uma estranha engenhoca brilhante. Ele é um mestre em meditação, mas se vocês se tornarem amigos próximos o suficiente, ele também revelará segredos mentais mais profundos."
"Eltibule can be reached from Serbule.": "Eltibule pode ser alcançado a partir de Serbule."
"Eltibule Countryside": "Campo de Eltibule"
"Eltibule Keep": "Fortaleza de Eltibule"
"Eltibule Keep Dungeons": "Masmorras da Fortaleza de Eltibule"
"Examine items in town, such as paintings, wall ornaments, and so on, until you obtain several levels of Lore skill. Then you can use the recipe for a Basic Word of Power. To activate a word of power, speak it aloud in chat. Once the word is spoken, it stops being magical. A warning: there are only so many words of power in the world at any time, and other players can learn the same words you do! So don't store your words for too long, or they may have already been used up by the time you speak them. This is especially true of lower-level words of power.": "Examine os itens da cidade, como pinturas, enfeites de parede e assim por diante, até obter vários níveis de habilidade de Lore. Então você pode usar a receita de uma Palavra Básica de Poder. Para ativar uma palavra de poder, fale-a em voz alta no chat. Uma vez dita a palavra, ela deixa de ser mágica. Um aviso: existem tantas palavras de poder no mundo a qualquer momento, e outros jogadores podem aprender as mesmas palavras que você! Portanto, não armazene suas palavras por muito tempo, ou elas podem já ter se esgotado no momento em que você as pronuncia. Isto é especialmente verdadeiro no caso de palavras de poder de nível inferior."
"Fainor in Serbule teaches the recipe for bacon. You'll need a little bit of skill in Cooking, which Fainor can also help you with.": "Fainor em Serbule ensina a receita do bacon. Você precisará de um pouco de habilidade em Culinária, na qual Fainor também pode ajudá-lo."
"Fainor in Serbule teaches the recipe for onion rings. You'll need a little bit of skill in Cooking, which Fainor can also help you with.": "Fainor em Serbule ensina a receita dos anéis de cebola. Você precisará de um pouco de habilidade em Culinária, na qual Fainor também pode ajudá-lo."
"Fainor will teach you the recipe for a small fee. Bacon requires only a Pork Shoulder and Salt. You must be near a stove to complete the recipe; there's a suitable fire pit in every inn.": "Fainor lhe ensinará a receita por uma pequena taxa. O bacon requer apenas uma paleta de porco e sal. Você deve estar perto de um fogão para completar a receita; há uma fogueira adequada em cada pousada."
"Fainor will teach you the recipe for a small fee. Onion Rings require an onion and a bottle of water. You can grow the onion yourself in a garden, or buy one from another player.": "Fainor lhe ensinará a receita por uma pequena taxa. Onion Rings requer uma cebola e uma garrafa de água. Você mesmo pode cultivar a cebola em um jardim ou comprar uma de outro jogador."
"Farm outside of Serbule": "Fazenda fora de Serbule"
"First you'll need a skinning knife. There's lots of places to find these. Perhaps the easiest is to do a favor for Ivyn the farmer, near Serbule. He'll give you one in exchange for some seedlings he needs. Once you have the knife, practice skinning the corpses of small animals like rats.": "Primeiro você precisará de uma faca para esfolar. Há muitos lugares para encontrar isso. Talvez o mais fácil seja fazer um favor ao fazendeiro Ivyn, perto de Serbule. Ele lhe dará uma em troca de algumas mudas que ele precisa. Depois de ter a faca, pratique esfolar cadáveres de pequenos animais, como ratos."
"General": "Em geral"
"Get Harry to like you even though you're not an animal": "Faça com que Harry goste de você mesmo que você não seja um animal"
"Get Hogan to let you into his keep": "Faça com que Hogan deixe você entrar em seu castelo"
"Get Ivyn to let you use his storage chest": "Faça com que Ivyn deixe você usar seu baú de armazenamento"
"Get Velkort to teach you Fire Magic": "Faça com que Velkort lhe ensine Magia de Fogo"
"Gobstores are large chests full of prized goblin equipment. There's a gobstore in Serbule Hills in the southeast. You'll need several keys to open it! The keys can be found on goblins in Serbule Hills. (PS: \"gobstore\" is a derogatory word humans use for goblin loot boxes. The word should not be used in the presence of goblins you want to befriend!)": "Gobstores são grandes baús cheios de equipamentos goblins valiosos. Há uma loja em Serbule Hills, no sudeste. Você precisará de várias chaves para abri-lo! As chaves podem ser encontradas em goblins em Serbule Hills. (PS: \"gobstore\" é uma palavra depreciativa que os humanos usam para caixas de saque de goblins. A palavra não deve ser usada na presença de goblins com os quais você deseja fazer amizade!)"
"Grow a potato": "Cultive uma batata"
"Harry the wolf hangs out in Serbule, usually in the little plot behind the windmill. He's not big on bipeds, but if you were friends with Rita, she could give you an introductory note to smooth things over with Harry.": "Harry, o lobo, fica em Serbule, geralmente no pequeno terreno atrás do moinho de vento. Ele não gosta muito de bípedes, mas se você fosse amigo de Rita, ela poderia lhe dar uma nota introdutória para acalmar as coisas com Harry."
"Help defeat a bear in a barn": "Ajude a derrotar um urso em um celeiro"
"Hogan is housing some unusual guests hiding in his keep. He doesn't let people in unless they're trustworthy friends, though. Become his close friend to gain access.": "Hogan está abrigando alguns convidados incomuns escondidos em seu castelo. Ele não deixa as pessoas entrarem, a menos que sejam amigos de confiança. Torne-se seu amigo próximo para obter acesso."
"Hogan will send you on a merry chase for special items. The snail shells can be found on giant snails in Eltibule. Poetry can be found in many places, including from a goblin in the dungeons beneath Eltibule. The ancient bronze coins are perhaps the most difficult request; these are rare drops from many kinds of monsters. You can often find some for sale on the Used tab of vendors.": "Hogan enviará você em uma alegre busca por itens especiais. As conchas dos caracóis podem ser encontradas em caracóis gigantes em Eltibule. Poesia pode ser encontrada em muitos lugares, inclusive de um goblin nas masmorras abaixo de Eltibule. As antigas moedas de bronze são talvez o pedido mais difícil; essas são quedas raras de muitos tipos de monstros. Muitas vezes você pode encontrar alguns à venda na guia Usados ​​dos fornecedores."
"Hogan's Keep": "Fortaleza de Hogan"
"Ilmari Desert": "Deserto de Ilmari"
"Ilmari Desert can be reached from Kur Mountains.": "O deserto de Ilmari pode ser alcançado a partir das montanhas Kur."
"In the center of Eltibule is a small fort called Eltibule Keep. Beneath this keep are goblins. The chief is down the hall on the left. Oh, but he has a few friends with him.": "No centro de Eltibule há um pequeno forte chamado Eltibule Keep. Abaixo desta fortaleza estão goblins. O chefe está no corredor à esquerda. Ah, mas ele tem alguns amigos com ele."
"In the countryside of the Eltibule region is a large fey bear with an entourage. He preys upon travelers and must be put down.": "Na zona rural da região de Eltibule há um grande urso feérico com uma comitiva. Ele ataca os viajantes e deve ser abatido."
"In the crypt near Serbule is a pretty big spider. Its poison is quite deadly, so watch out for that!": "Na cripta perto de Serbule há uma aranha bem grande. Seu veneno é bastante mortal, então tome cuidado com isso!"
"In the nearby duchy of Eltibule, the monk Hogan runs a small keep. Talk to him and complete his quest to learn Staff Fighting.": "No vizinho ducado de Eltibule, o monge Hogan administra uma pequena fortaleza. Fale com ele e complete sua missão para aprender Staff Fighting."
"Ivyn the farmer has a large storage chest with a combination lock. If you become his close friend, he'll give you the code.": "Ivyn, o fazendeiro, tem um grande baú com fechadura de combinação. Se você se tornar seu amigo próximo, ele lhe dará o código."
"Ivyn will give you a skinning knife if you complete his favor request for squash seedlings. But there's many ways to find a skinning knife -- in fact, you can sometimes find them for sale in town. Your chance of success at skinning depends on the Skinning skill, but you can start practicing before you have any levels of the skill. Practice on easy monsters, like rats, and you'll gain Skinning levels automatically.": "Ivyn lhe dará uma faca para esfolar se você atender ao pedido de favor de mudas de abóbora. Mas há muitas maneiras de encontrar uma faca de esfolar – na verdade, às vezes você pode encontrá-la à venda na cidade. Sua chance de sucesso em esfolar depende da habilidade Esfolar, mas você pode começar a praticar antes de adquirir qualquer nível da habilidade. Pratique em monstros fáceis, como ratos, e você ganhará níveis de Skinning automaticamente."
"Jara and Ivyn have a barn outside of town, and there's a bear inside. Consider bringing backup, because bears are very dangerous!": "Jara e Ivyn têm um celeiro fora da cidade e há um urso lá dentro. Considere trazer reforços, porque os ursos são muito perigosos!"
"Khyrulek is guarded by trained rhinos, and they are very powerful. You'll need several friends to defeat them. Once you slay Khyrulek, a portal will open to a much more dangerous part of the dungeon. Do not be too eager to venture here! First, explore the rest of the crypt to gain power and skills.": "Khyrulek é guardado por rinocerontes treinados e eles são muito poderosos. Você precisará de vários amigos para derrotá-los. Depois de matar Khyrulek, um portal se abrirá para uma parte muito mais perigosa da masmorra. Não fique muito ansioso para se aventurar aqui! Primeiro, explore o resto da cripta para ganhar poder e habilidades."
"Kur Mountains": "Montanhas Kur"
"Kur Mountains can be reached from Eltibule.": "As montanhas Kur podem ser alcançadas a partir de Eltibule."
"Lawara is on the island away from the beach. If it's dark, you can find her by looking for her bonfire. Complete favors for her -- or give her gifts -- until you reach Comfortable favor-level. Lawara will then teach you how to autopsy and give you an autopsy kit.": "Lawara está na ilha longe da praia. Se estiver escuro, você pode encontrá-la procurando sua fogueira. Complete favores para ela - ou dê-lhe presentes - até atingir o nível de favor Confortável. Lawara então lhe ensinará como fazer a autópsia e lhe dará um kit de autópsia."
"Learn Calligraphy": "Aprenda caligrafia"
"Learn Cheesemaking": "Aprenda a fazer queijo"
"Learn First Aid from Marna": "Aprenda Primeiros Socorros com Marna"
"Learn Mentalism from Echur": "Aprenda Mentalismo com Echur"
"Learn Psychology by helping Riger be happier": "Aprenda Psicologia ajudando Riger a ser mais feliz"
"Learn Staff Fighting from Hogan": "Aprenda a luta de equipe com Hogan"
"Learn to autopsy corpses": "Aprenda a autopsiar cadáveres"
"Learn to skin corpses": "Aprenda a esfolar cadáveres"
"Learn to stun golems": "Aprenda a atordoar golems"
"Learn Transmutation": "Aprenda Transmutação"
"Loot the Serbule Hills Gobstore": "Saqueie a Gobstore de Serbule Hills"
"Marna in Serbule can teach you the recipe for Words of Power. You'll need to have a few levels of the Lore skill before you can use it, though. Lore is learned by simply examining things everywhere you go.": "Marna em Serbule pode lhe ensinar a receita das Palavras de Poder. Você precisará ter alguns níveis de habilidade Lore antes de poder usá-la. A sabedoria é aprendida simplesmente examinando as coisas onde quer que você vá."
"Marna runs a bustling general store in Serbule, with a focus on potions and healing items. She's happy to teach First Aid because she sells the necessary first aid kits.": "Marna administra um movimentado armazém em Serbule, com foco em poções e itens de cura. Ela fica feliz em ensinar Primeiros Socorros porque vende os kits de primeiros socorros necessários."
"Marna the shopkeeper has posted warnings in the Serbule Crypt about venomous spiders. After you read the note in the crypt, talk to Marna in town.": "Marna, a lojista, postou avisos na Cripta de Serbule sobre aranhas venenosas. Depois de ler a nota na cripta, fale com Marna na cidade."
"Marna will teach you First Aid just by talking to her. If you've been cursed into some sort of animal form, however, Marna won't be willing to talk to you at all. If you can't find a cure for your predicament, another option is to trek to the dangerous island of Sun Vale -- a boatman on the Serbule docks can take you there. Sun Vale has a town of talking animals, and Norbert the pig can teach First Aid.": "Marna vai te ensinar Primeiros Socorros apenas conversando com ela. Se você foi amaldiçoado em algum tipo de forma animal, entretanto, Marna não estará disposta a falar com você. Se você não conseguir encontrar uma cura para sua situação, outra opção é caminhar até a perigosa ilha de Sun Vale – um barqueiro nas docas de Serbule pode levá-lo até lá. Sun Vale tem uma cidade de animais falantes, e o porco Norbert pode ensinar primeiros socorros."
"Master the art of taming rats": "Domine a arte de domesticar ratos"
"Meet Nightshade": "Conheça a Beladona"
"Meet Percy Evans": "Conheça Percy Evans"
"Meet Silvia the Druid": "Conheça Silvia, a Druida"
"Meet Urglemarg": "Conheça Urglemarg"
"More specifically, The Big Widow lives in a farm house near the southernmost central lake in Serbule Hills, very close to the Ranalon encampment. She has numerous offspring with her, so this is a tricky battle! If you are being overwhelmed by poison, you might want to wait until you've found ways to counteract poison.": "Mais especificamente, a Viúva Grande mora em uma casa de fazenda perto do lago central mais ao sul de Serbule Hills, muito perto do acampamento Ranalon. Ela tem vários filhos com ela, então esta é uma batalha complicada! Se você estiver sendo dominado pelo veneno, talvez seja melhor esperar até encontrar maneiras de neutralizar o veneno."
"Most of the golems in the area aren't too tough, but the Records Librarian golem is tougher; make sure to dismantle other nearby golems before attacking it so that they don't join in the fight and overwhelm you! Once the monsters are defeated you will need to solve the lamp puzzle. This is quite simple: just turn on all the lamps in all nearby rooms to gain access to the chest you need.": "A maioria dos golens da área não são muito resistentes, mas o golem do Bibliotecário de Registros é mais resistente; certifique-se de desmantelar outros golens próximos antes de atacá-lo, para que eles não se juntem à luta e o dominem! Assim que os monstros forem derrotados, você precisará resolver o quebra-cabeça da lâmpada. Isso é bastante simples: basta acender todas as lâmpadas de todos os cômodos próximos para ter acesso ao baú que você precisa."
"Multiple": "Múltiplo"
"Nightshade can be found staying at a remote Inn found in the mountains near the central western shores. He can teach you how to add augments to your equipment without the help of a NPC and how to extract them from equipment.": "Nightshade pode ser encontrada hospedada em uma pousada remota encontrada nas montanhas perto da costa centro-oeste. Ele pode te ensinar como adicionar aprimoramentos ao seu equipamento sem a ajuda de um NPC e como extraí-los do equipamento."
"Nightshade can be found staying at a remote Inn.": "Nightshade pode ser encontrado hospedado em uma pousada remota."
"On the island where you first awoke with amnesia, there's a beach area with four magical arches. If you touch the pillars in the right order, you unlock a nearby chest.": "Na ilha onde você acordou com amnésia, há uma área de praia com quatro arcos mágicos. Se você tocar nos pilares na ordem certa, você desbloqueará um baú próximo."
"Once you reach Comfortable favor-level with Braigon, you can learn Cheesemaking from his Training menu. Braigon also teaches many cheese recipes. Be warned: cheesemaking is not the most accessible of crafting skills because it requires some exotic ingredients. However, cheese is one of the best foods in the game, and is worth the effort.": "Depois de atingir o nível de favor Confortável com Braigon, você poderá aprender a fazer queijos em seu menu de treinamento. Braigon também ensina muitas receitas de queijo. Esteja avisado: a fabricação de queijos não é a habilidade artesanal mais acessível porque requer alguns ingredientes exóticos. Porém, o queijo é um dos melhores alimentos do jogo e vale a pena o esforço."
"Once you've met Velkort, ask for training and learn the 'Introductory Fire Magic Research' recipe. Next, go to the inn in Serbule and buy some salt from the innkeeper. Stand near the fire pit in the inn and use the recipe window to complete the Introductory Fire Magic research recipe. Once you've learned some spells, you can cast them by wielding a staff. Velkort sells a suitable beginner's staff.": "Depois de conhecer Velkort, peça treinamento e aprenda a receita da 'Pesquisa Introdutória à Magia do Fogo'. Em seguida, vá até a pousada em Serbule e compre um pouco de sal do estalajadeiro. Fique perto da fogueira na pousada e use a janela de receitas para completar a receita de pesquisa introdutória da magia do fogo. Depois de aprender alguns feitiços, você pode lançá-los empunhando um cajado. Velkort vende uma equipe adequada para iniciantes."
"One of the smaller islands was once a resort. Puffy Ben lives there. He collects shells.": "Uma das ilhas menores já foi um resort. Puffy Ben mora lá. Ele coleciona conchas."
"Percy Evans lives in a rundown house in the far northeast corner of Eltibule.": "Percy Evans mora em uma casa em ruínas no extremo nordeste de Eltibule."
"Perform favors for Tyler, or give him gifts, until you reach Comfortable favor-level. You can then learn the Shield skill from Tyler's Training menu.": "Faça favores para Tyler ou dê-lhe presentes até atingir o nível de favor Confortável. Você pode então aprender a habilidade Escudo no menu Treinamento de Tyler."
"Perhaps the easiest method is with a spore bomb. You can find a recipe for creating spore bombs in the dungeon on Anagoge Island. Another easy method is with Psychology. Once you've discovered this skill you'll have abilities that deal Psychic damage. Since Psychic damage isn't physical damage, it will work on the dummy!": "Talvez o método mais fácil seja com uma bomba de esporos. Você pode encontrar uma receita para criar bombas de esporos na masmorra da Ilha Anagoge. Outro método fácil é com Psicologia. Depois de descobrir essa habilidade, você terá habilidades que causam dano psíquico. Como o dano psíquico não é dano físico, funcionará no manequim!"
"Puffy Ben is a ranalon that can be found on the northeastern island of Sun Vale. He is usually on the island's southwestern beach. He offers different trade options throughout the day.": "Puffy Ben é um ranalon que pode ser encontrado na ilha nordeste de Sun Vale. Ele geralmente está na praia do sudoeste da ilha. Ele oferece diferentes opções de negociação ao longo do dia."
"Ranalon are the frog-like race that have recently infested Serbule Hills. They seem to have the ability to rapidly move troops to different areas -- perhaps you can use this same technology. Their main camp is near the lakes in the center of Serbule Hills.": "Ranalon é a raça parecida com um sapo que recentemente infestou Serbule Hills. Eles parecem ter a capacidade de mover tropas rapidamente para áreas diferentes – talvez você possa usar essa mesma tecnologia. Seu acampamento principal fica perto dos lagos no centro de Serbule Hills."
"Rescue a Fairy from a Goblin Chief": "Resgate uma fada de um chefe duende"
"Research a Basic Word of Power": "Pesquise uma palavra básica de poder"
"Riger is the amnesiac Elf you met on the island when you first started playing. He's very unhappy. There's a potion that will make him happy for a while; you can find the recipe somewhere on that island.": "Riger é o elfo amnésico que você conheceu na ilha quando começou a jogar. Ele está muito infeliz. Existe uma poção que o deixará feliz por um tempo; você pode encontrar a receita em algum lugar daquela ilha."
"Sammie Grimspine in Serbule Hills can teach you calligraphy.": "Sammie Grimspine, em Serbule Hills, pode lhe ensinar caligrafia."
"Sammie is happy to teach you calligraphy, as she sells the inks and papers you'll need. From the northwest entrance to Serbule Hills, head due south, past the Duchess. Sammie is on a hill along the western edge of the map.": "Sammie terá prazer em lhe ensinar caligrafia, pois ela vende as tintas e os papéis necessários. Da entrada noroeste de Serbule Hills, siga para o sul, passando pela Duquesa. Sammie está em uma colina na borda oeste do mapa."
"Sarina the fairy is trapped in the cave near the Algapa the goblin chief. This is a difficult fight, especially alone, so see if other players can help you. Most goblins are weak against cold and electricity, and resistant to poison and trauma, so plan accordingly.": "Sarina, a fada, está presa na caverna perto de Algapa, o chefe goblin. Esta é uma luta difícil, principalmente sozinho, então veja se outros jogadores podem te ajudar. A maioria dos goblins são fracos contra o frio e a eletricidade, e resistentes a venenos e traumas, então planeje adequadamente."
"Seek the tiny town of Amulna in the Ilmari Desert. Look for Sir Johnson, who will task you with a quest.": "Procure a pequena cidade de Amulna, no deserto de Ilmari. Procure Sir Johnson, que lhe dará uma missão."
"Serbule can be reached by completing the island tutorial and teleporting with the correct code.": "Serbule pode ser alcançado completando o tutorial da ilha e teletransportando-se com o código correto."
"Serbule Crypt": "Cripta de Sérbulo"
"Serbule Crypt (and the town)": "Cripta de Serbule (e a cidade)"
"Serbule Hills": "Colinas de Sérbulo"
"Serbule Hills can be reached by traveling south from Serbule.": "Serbule Hills pode ser alcançada viajando para o sul de Serbule."
"Silvia leads the druids of Sun Vale. She can be found in the druid camp on the main island.": "Silvia lidera os druidas de Sun Vale. Ela pode ser encontrada no acampamento druida na ilha principal."
"Silvia's druid camp is in the northern tip of Sun Vale's largest island.": "O acampamento druida de Silvia fica no extremo norte da maior ilha de Sun Vale."
"Sir Johnson lives in Amulna, a city roughly in the middle of the Ilmari Desert. He will send you on an expedition to a 'war cache', a lost dungeon full of dangers and loot.": "Sir Johnson mora em Amulna, uma cidade aproximadamente no meio do deserto de Ilmari. Ele irá enviar-te numa expedição a um 'esconderijo de guerra', uma masmorra perdida cheia de perigos e saques."
"Sun Vale": "Vale do Sol"
"Sun Vale can be reached by visiting a boatman in Serbule, among other methods.": "Sun Vale pode ser alcançado visitando um barqueiro em Serbule, entre outros métodos."
"Tasks in this area": "Tarefas nesta área"
"Tasks in this dungeon": "Tarefas nesta masmorra"
"Tasks without a specific location": "Tarefas sem local específico"
"The bear in the barn is too difficult for a beginner to defeat alone. Even two beginners will have trouble! Find a few adventurers willing to help, or gain some combat levels before attempting to solo the bear. Like most bears, this one is resistant to crushing and trauma damage, so Unarmed attacks are not a good choice. Bears are vulnerable to acid and electricity attacks, so use those if you have them. (Mentalism has some electricity abilities.)": "O urso no celeiro é muito difícil para um iniciante derrotar sozinho. Mesmo dois iniciantes terão problemas! Encontre alguns aventureiros dispostos a ajudar ou ganhe alguns níveis de combate antes de tentar derrotar o urso sozinho. Como a maioria dos ursos, este é resistente a danos por esmagamento e trauma, então ataques desarmados não são uma boa escolha. Os ursos são vulneráveis ​​a ataques de ácido e eletricidade, então use-os se os tiver. (O mentalismo tem algumas habilidades elétricas.)"
"The Big Widow is a large venomous spider that lives in one of the abandoned farm houses in Serbule Hills.": "A Grande Viúva é uma grande aranha venenosa que vive em uma das casas de fazenda abandonadas em Serbule Hills."
"The easiest way to accomplish this one is to befriend Lawara, an Elf on the island where you started the game, but there are many other ways to learn autopsying.": "A maneira mais fácil de fazer isso é fazer amizade com Lawara, uma elfa da ilha onde você começou o jogo, mas existem muitas outras maneiras de aprender a autópsia."
"The Mangler and the Mauler are giant green bears that hunt together. They are surrounded by ordinary bears and some panthers. You will need to be patient and tactical in defeating their hangers-on in order to fight the Mangler without being swarmed!": "O Mangler e o Mauler são ursos verdes gigantes que caçam juntos. Eles estão cercados por ursos comuns e algumas panteras. Você precisará ser paciente e tático ao derrotar seus parasitas para lutar contra o Mangler sem ser atacado!"
"The megaspider is almost certain death for a new player unless they have poison resistance. You can learn to make poison resistance potions from Marna in Serbule, or you can find poison resistance from certain pieces of equipment.": "A megaaranha é uma morte quase certa para um novo jogador, a menos que ele tenha resistência a veneno. Você pode aprender a fazer poções de resistência a veneno com Marna em Serbule, ou pode encontrar resistência a veneno em certos equipamentos."
"The omegaspider lies beyond Khyrulek's First Form. It is a gigantic fire spider. Unlike ordinary fire spiders, however, this one is vulnerable to fire! Use this to your advantage. Also, bring friends.": "A aranha ômega está além da Primeira Forma de Khyrulek. É uma gigantesca aranha de fogo. Ao contrário das aranhas de fogo comuns, porém, esta é vulnerável ao fogo! Use isso a seu favor. Além disso, traga amigos."
"The recipe you need is Pick-Me-Up Juice. Find it in a book near Elmetaph the elf. He's in the lighthouse at the center of the island. You can collect the needed ingredients on the island. Give the completed potion to Riger, who lives in a hut on the island.": "A receita que você precisa é o suco Pick-Me-Up. Encontre-o em um livro perto de Elmetaph, o elfo. Ele está no farol no centro da ilha. Você pode coletar os ingredientes necessários na ilha. Dê a poção completa para Riger, que mora em uma cabana na ilha."
"The Serbule Crypt is in the corner of the Serbule map.": "A Cripta de Serbule está no canto do mapa de Serbule."
"There are five so-called 'telepods' hidden throughout Serbule Hills. They look like large bowls. They are surrounded by greenery to help them blend in, although in some cases this makes them more noticeable, not less. Touch each teleporter to unlock it. Once you have unlocked at least two teleporters, you will be able to teleport from one bowl to any other that you've unlocked.": "Existem cinco chamados 'telépodes' escondidos em Serbule Hills. Parecem tigelas grandes. Eles estão rodeados de vegetação para ajudá-los a se misturar, embora em alguns casos isso os torne mais visíveis, e não menos. Toque em cada teletransportador para desbloqueá-lo. Depois de desbloquear pelo menos dois teletransportadores, você poderá se teletransportar de uma tigela para qualquer outra que tenha desbloqueado."
"There are three outposts along the goblin-controlled road north of the gobstore. In each outpost is a Competent Goblin with a gobkey. You need all three gobkeys to unlock the gobstore. As always when fighting goblins, be patient: pick them off one or two at a time, because they are quite deadly in packs.": "Existem três postos avançados ao longo da estrada controlada pelos goblins ao norte do Gobstore. Em cada posto avançado há um Goblin Competente com um gobkey. Você precisa de todos os três gobkeys para desbloquear o gobstore. Como sempre, ao lutar contra goblins, seja paciente: mate-os um ou dois de cada vez, porque eles são bastante mortais em matilhas."
"Therese in Serbule can help you get started -- she sells potato seedlings and water bottles, and she has a gardening area behind the windmill. Another option is visiting Julius Patton on his farm in Serbule Hills; he'd be happy to help, too.": "Therese, em Serbule, pode ajudá-lo a começar: ela vende mudas de batata e garrafas de água e tem uma área de jardinagem atrás do moinho de vento. Outra opção é visitar Julius Patton em sua fazenda em Serbule Hills; ele ficaria feliz em ajudar também."
"This one is quite difficult. You must reach Close Friends favor-level with Hogan. Complete his favors, then give him gifts to further increase your favor-level. Hogan likes poetry, raw fruit, and magic staves.": "Este é bastante difícil. Você deve atingir o nível de favorecimento de amigos próximos com Hogan. Complete seus favores e dê-lhe presentes para aumentar ainda mais seu nível de favores. Hogan gosta de poesia, frutas cruas e cajados mágicos."
"This one is quite difficult; you must become Close Friends with Ivyn, which means doing favors and giving him gifts. Other players might teach you the code, but be wary of using his chest without permission! Ivyn has been known to exact revenge on those who abuse his trust.": "Este é bastante difícil; você deve se tornar amigo próximo de Ivyn, o que significa fazer favores e dar presentes a ele. Outros jogadores podem lhe ensinar o código, mas tome cuidado ao usar o baú dele sem permissão! Ivyn é conhecido por se vingar daqueles que abusam de sua confiança."
"Those that go diving for pearls are likely to meet Urglemarg. Bring sand dollars!": "Aqueles que mergulham em busca de pérolas provavelmente encontrarão Urglemarg. Traga dólares de areia!"
"To become Harry's friend, you'll need Rita's help. Rita is standing outside of the inn. Perform favors for her -- or give her flowers! -- until you reach Comfortable favor-level with her. She'll automatically give you an introductory note. Harry is a good friend to have if you ever become cursed, because he has cures for several nasty problems.": "Para se tornar amigo de Harry, você precisará da ajuda de Rita. Rita está do lado de fora da pousada. Faça favores para ela - ou dê-lhe flores! - até atingir um nível de favor confortável com ela. Ela lhe dará automaticamente uma nota introdutória. Harry é um bom amigo se você for amaldiçoado, porque ele tem curas para vários problemas desagradáveis."
"To plant a potato, you need no special skill. Just purchase a potato seedling and a bottle of water, then plant the seedling in a garden area. Several people can help you get started.": "Para plantar uma batata não é necessária nenhuma habilidade especial. Basta comprar uma muda de batata e uma garrafa de água e depois plantar a muda em uma área de jardim. Várias pessoas podem ajudá-lo a começar."
"Town of Serbule": "Cidade de Sérbule"
"Trade with Puffy Ben": "Negocie com Puffy Ben"
"Tyler Green is in the Tapestry Inn, in the northwest corner of Serbule Hills.": "Tyler Green está no Tapestry Inn, no canto noroeste de Serbule Hills."
"Urglemarg is a ranalon that can be found deep beneath the sea. He's set up shop in the coral reef between the large island and the ranalon-covered island to the southeast.": "Urglemarg é um ranalon que pode ser encontrado nas profundezas do mar. Ele se estabeleceu no recife de coral entre a ilha grande e a ilha coberta de ranalon a sudeste."
"Velkort the fire mage lives in Serbule. You can often find him wandering around -- look for his sentient pet flame. He's surly, but he's happy to teach the ways of fire... for a small fee.": "Velkort, o mago do fogo, vive em Serbule. Muitas vezes você pode encontrá-lo vagando por aí - procure sua chama de estimação senciente. Ele é ranzinza, mas fica feliz em ensinar os métodos do fogo... por uma pequena taxa."
"Visit Eltibule to unlock this list of tasks.": "Visite Eltibule para desbloquear esta lista de tarefas."
"Visit Kur Mountains to unlock this list of tasks.": "Visite as montanhas Kur para desbloquear esta lista de tarefas."
"Visit Serbule Hills to unlock this list of tasks.": "Visite Serbule Hills para desbloquear esta lista de tarefas."
"Visit Serbule to unlock this list of tasks.": "Visite Serbule para desbloquear esta lista de tarefas."
"Visit Sun Vale to unlock this list of tasks.": "Visite Sun Vale para desbloquear esta lista de tarefas."
"Visit the Ilmari Desert to unlock this list of tasks.": "Visite o Deserto Ilmari para desbloquear esta lista de tarefas."
"You can find the four arches by following the shore in either direction. The correct order to touch the arches is South-East-West-North.": "Você pode encontrar os quatro arcos seguindo a costa em qualquer direção. A ordem correta para tocar os arcos é Sudeste-Oeste-Norte."
"You must read the note in the Serbule Crypt before Marna will offer to teach you her best poison resistance recipe. She will insist on a very large number of spider legs in order to teach the recipe; fortunately, spiders have a lot of legs, so it won't take too long to collect them.": "Você deve ler a nota na Cripta de Serbule antes que Marna se ofereça para lhe ensinar sua melhor receita de resistência a venenos. Ela vai insistir em um número muito grande de patas de aranha para ensinar a receita; felizmente, as aranhas têm muitas pernas, então não demorará muito para coletá-las."
