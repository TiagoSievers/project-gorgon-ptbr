"Of course, I can't compensate you if you die. Be careful out there!\\\"\": \"Sir Hughes, em Statehelm, disse": "\\\"Bem, estou convencido de que você sabe como se cuidar! Por que você não faz algum trabalho de limpeza para nós no campo? Posso pagar a você com um dos fundos militares. Vencer -ganhar, e você ainda estará melhorando com suas habilidades. Vencer-ganhar-ganhar!"
"Of course, I was hesitant to use charm magic. But the surgery we must perform requires it. We healers know that sometimes a patient calls for a difficult procedure. A dangerous one. So summon your courage": "the city needs us!"
"Of course, if you happen to have a few friends and wanted to kill the damned thing, I'd be happy to reward such heroism.\\\"\": \"Mox Warcut em New Prestonbule disse": "\\\"Sabe, aposto que há uma múmia mestre em Foothills Cave. Quando uma múmia permanece viva por tempo suficiente, há uma chance de que ela possa recuperar seu livre arbítrio e se recuperar de sua amargura inerente. Quando isso acontece, torna-se MUITO perigoso. Eles geralmente ficam amarelados ou enegrecidos com o tempo. Se você vir um, corra! Você precisaria de uma equipe de guerreiros treinados para matá-lo!"
"Of course, there's no chance I'll ever see my most recent masterpiece ever again. The thief no doubt valued that one over all the other trinkets in my store, and would never have parted with it. Well, I shouldn't give up hope; perhaps it will show up on the market in a few years.

But right now I need to create a NEW masterpiece. The old one was a riff on my famous rubywall crystal motif, but now I'm imagining something fresher: rubywall-like crystals, but with the darkest of aquamarines!

I should get started right away while the inspiration has hit me. Unfortunately, my gem supply is gone and what I need is no ordinary aquamarine. I need just the right one.

Why don't you simply get me 100 or so and I'll just pick the best one from the batch.": "Claro, não há chance de eu ver minha obra-prima mais recente novamente. O ladrão sem dúvida valorizou aquela acima de todas as outras bugigangas da minha loja e nunca teria se desfeito dela. Bem, eu não deveria perder as esperanças; talvez apareça no mercado em alguns anos.

Mas agora preciso criar uma NOVA obra-prima. O antigo era um riff do meu famoso motivo de cristal Rubywall, mas agora estou imaginando algo mais fresco: cristais parecidos com Rubywall, mas com a mais escura das águas-marinhas!

Eu deveria começar imediatamente enquanto a inspiração me atinge. Infelizmente, meu estoque de gemas acabou e o que preciso não é de água-marinha comum. Eu preciso do caminho certo.

Por que você simplesmente não me dá 100 ou mais e eu escolho o melhor do lote."
"Of course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?\": \"As raposas adoram as joias que você ganhou! Expliquei a Rubi que ela recebeu o nome de uma joia chamada Ruby. Ela insiste em ver algumas dessas joias imediatamente! E isso me fez pensar": "se eu tivesse MUITOS, poderia usá-los na aula de matemática de amanhã. Você sabe onde encontrar muitos rubis?"
"Of course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?\\\"\": \"Barnaby, na Gruta do Guardião Sagrado, disse": "\\\"As raposas adoram as joias que você ganhou! Expliquei a Rubi que ela recebeu o nome de uma joia chamada Ruby. Ela insiste em ver algumas dessas joias imediatamente! E isso me fez pensar: se eu tivesse MUITAS delas, poderia usá-las na aula de matemática de amanhã. Você sabe onde encontrar muitos rubis?"
"Of course, you know that it only blooms at night.\\\"\": \"Fransesca Muradrake, em Statehelm, disse": "\\\"Vamos começar com algo fácil que qualquer novato deve ser capaz de fazer. Traga-me flores frescas. Temos sorte de que ela cresça no cemitério nos arredores da cidade."
"Of course, you must know how to revive the recently-incapacitated. Have you mastered the technique yet? Here: this practice lute may help.": "Claro, você deve saber como reviver os recentemente incapacitados. Você já domina a técnica? Aqui: esta prática do alaúde pode ajudar."
"Of course, you must know how to revive the recently-incapacitated. Have you mastered the technique yet? Here: this practice lute may help. ": "Claro, você deve saber como reviver os recentemente incapacitados. Você já domina a técnica? Aqui: esta prática do alaúde pode ajudar."
"Offer Ormond the Potion": "Ofereça a Poção a Ormond"
"Ogres are all dumb as hell and mean to boot, but Gorgos is the biggest and dumbest one around here. He chased us back here! If he were to die suddenly... that'd be really convenient.": "Ogros são todos burros e malvados, mas Gorgos é o maior e mais idiota por aqui. Ele nos perseguiu até aqui! Se ele morresse de repente... isso seria muito conveniente."
"OgreStomach": "Estômago de Ogro"
"Oh and be prepared to defend yourself.\": \"Eis a história que me contaram": "um viajante tinha parado na antiga estalagem da Vidaria. Está praticamente abandonado, mas ainda tem um telhado resistente e estava chovendo. Enquanto chovia, ele cozinhou um pedaço incrível de carne no fogão."
"Oh and be prepared to defend yourself.\\\"\": \"Farsight Flemmings em Statehelm disse": "\\\"Aqui está a história que me contaram: um viajante parou na velha estalagem em Vidaria. Está praticamente abandonada, mas ainda tem um telhado resistente e estava chovendo. Enquanto chovia, ele cozinhou um incrível pedaço de carne no fogão."
"Oh boo hoo, so you got wet. And slimy. You're still alive, and you got the Weaponized Xedrite, so how hard could it have been? Here's your tickets!": "Oh boo hoo, então você se molhou. E viscoso. Você ainda está vivo e conseguiu o Xedrite Armado, então quão difícil poderia ter sido? Aqui estão seus ingressos!"
"Oh come on! You seriously used Disharmony to kill 30 fiends? That's... Well, that's impressive. Good work.": "Ah, vamos lá! Você usou seriamente o Desarmonia para matar 30 demônios? Isso é... Bem, isso é impressionante. Bom trabalho."
"Oh drat, I need more peridots to enhance my calligraphy. Do you happen to have a few?": "Nossa, preciso de mais peridotos para melhorar minha caligrafia. Por acaso você tem alguns?"
"Oh Fiddler will love these! Thank-you!": "Oh, o violinista vai adorar isso! Obrigado!"
"Oh for fuck's sake. Now the snails are gettin' too close! Go clear those out too, okay?": "Ah, pelo amor de Deus. Agora os caracóis estão chegando perto demais! Vá limpar isso também, ok?"
"Oh give them! I want sausages! ... But I'll only eat some of them. The others go on the tree.": "Ah, dê-lhes! Eu quero salsichas! ... Mas só comerei alguns deles. Os outros vão para a árvore."
"Oh gods they stink so bad! Augh! You didn't clean them?! No, no, it's fine. I'll have Lana do it for me. And here: I was going to give this to you. It's made of a goat's horn! Impressive, isn't it? I made it myself.": "Oh deuses, eles fedem tanto! Ah! Você não os limpou?! Não, não, está tudo bem. Vou pedir à Lana para fazer isso por mim. E aqui: eu ia dar isso para você. É feito de chifre de cabra! Impressionante, não é? Eu mesmo fiz isso."
"Oh gods, it's still moving! What in the hell! This is seriously wrong. Okay... okay, here goes. <i>Elahil rubs his magic ring in the flesh.</i>

Hey, I think it's working! Here, you can have my old ring. This one's way better.": "Oh deuses, ainda está se movendo! Que diabos! Isso está seriamente errado. Ok... ok, aqui vai. <i>Elahil esfrega seu anel mágico na carne.</i>

Ei, acho que está funcionando! Aqui, você pode ficar com meu antigo anel. Este é muito melhor."
"Oh good! This will be wonderful. Thank you friend!

[Scripted movement not yet implemented.]": "Ah, que bom! Isso será maravilhoso. Obrigado amigo!

[Movimento com script ainda não implementado.]"
"Oh good, you're back. Now I get to clean delicate machinery while holding an acid-soaked rag in my mouth! Have I mentioned how irritating it is that I can't just bring in an expert? I know some very discreet elves who could get everything working again within a day! But noooo, we can't have elves in our sacred grotto... even if it means animals die! Milton seriously said that to me, if you can believe it.

Sorry, I'm just talking while I work. Ignore me... hand me that spring? Okay. Look, it's already blinking! One of the backups is on!

Let's see if we have a signal... it's working! Here, I'm going to stick this crystal in your ear for a second. It won't hurt. Okay, you're attuned. Now you should be able to listen to the Warden Alerts! Give it a try. <i>[This recipe can be found under the 'Lore' skill in the recipe window.]</i>": "Ah, que bom, você está de volta. Agora posso limpar máquinas delicadas enquanto seguro um pano embebido em ácido na boca! Já mencionei como é irritante não poder simplesmente contratar um especialista? Conheço alguns elfos muito discretos que conseguem fazer tudo funcionar novamente em um dia! Mas não, não podemos ter elfos em nossa gruta sagrada... mesmo que isso signifique a morte de animais! Milton disse isso para mim seriamente, se você pode acreditar.

Desculpe, só estou conversando enquanto trabalho. Ignore-me... me entregue naquela primavera? OK. Olha, já está piscando! Um dos backups está ativado!

Vamos ver se temos sinal... está funcionando! Aqui, vou enfiar este cristal na sua orelha por um segundo. Não vai doer. Ok, você está sintonizado. Agora você deve poder ouvir os Alertas do Diretor! Experimente. <i>[Esta receita pode ser encontrada na habilidade 'Lore' na janela de receitas.]</i>"
"Oh good, you're here! There's a new threat to the wildlife of Kur: a huge swarm of hook beasts! They normally live in the yeti caves beneath the ground, but I guess food has become too scarce. You'll find them north and east of the yeti crevice.": "Ah, que bom, você está aqui! Há uma nova ameaça à vida selvagem de Kur: um enorme enxame de feras anzol! Eles normalmente vivem nas cavernas dos Yetis abaixo do solo, mas acho que a comida se tornou muito escassa. Você os encontrará ao norte e ao leste da fenda do Yeti."
"Oh hey, I had another botany idea. No, this one's great! See, you got me carnivine teeth, but I have nothing really to compare them to. Why don't you ALSO get me some spriggan weed teeth? Then I can compare them! Go, go! There's science to do!": "Ah, ei, tive outra ideia de botânica. Não, este é ótimo! Veja, você me deu dentes carnivinos, mas não tenho nada com que compará-los. Por que você TAMBÉM não me dá alguns dentes de erva spriggan? Então posso compará-los! Vá, vá! Há ciência para fazer!"
"Oh hey. You found my medals. Hm, the nice ones are missing. But that's okay. It'll do for what I need.": "Ah, ei. Você encontrou minhas medalhas. Hm, os legais estão faltando. Mas tudo bem. Vai servir para o que preciso."
"Oh hi, can you get me a bouquet? I don't care what kind of flowers, just a half-dozen nice flowers. Thanks!": "Oh, oi, você pode me dar um buquê? Não me importa que tipo de flores, apenas meia dúzia de lindas flores. Obrigado!"
"Oh ho ho, now THESE are nice gems! So, question for ya: Sona wants to use heavy wire to make the gems look like they're floatin' off the tree. I told her they're supposed to look like fruit, nestled under the leaves... but then she asks why, since you can't eat 'em... and I don't really have an answer! What do you think we should do?

Oh, what's that? Sure, of course! We'll get these beauties back to you after the holiday, don't worry! I mean... unless they get stolen by orcs or something...": "Oh ho ho, agora ESTAS são lindas joias! Então, uma pergunta para você: Sona quer usar arame pesado para fazer as joias parecerem que estão flutuando na árvore. Eu disse a ela que eles deveriam parecer frutas, aninhados sob as folhas... mas então ela pergunta por quê, já que você não pode comê-los... e eu realmente não tenho uma resposta! O que você acha que deveríamos fazer?

Ah, o que é isso? Claro, claro! Devolveremos essas lindezas para você depois do feriado, não se preocupe! Quero dizer... a menos que sejam roubados por orcs ou algo assim..."
"Oh I have a really big favor to ask! It's really hard but I'll totally make it worth your while. Can you get me a flawless giant snail shell? They're really hard to get. I heard you have to kill dozens to find one. But you're so strong and brave, I'm sure it'll only take you a second!": "Ah, eu tenho um grande favor a pedir! É muito difícil, mas farei com que valha a pena. Você pode me conseguir uma concha de caracol gigante impecável? Eles são realmente difíceis de conseguir. Ouvi dizer que você tem que matar dezenas para encontrar um. Mas você é tão forte e corajoso que tenho certeza que só levará um segundo!"
"Oh it's so nice to have your ear! Well, my husband was killed by a bear a long time ago. And I witnessed it! We were hiking through the forests south of here, as young lovers do, and came upon a bear with green fur. Lennel was a strong man but stupid, and he tried to hit it with a longbow. The bear killed him, scattering blood everywhere, and then it did the most cursed thing: it picked up his bow, stared right into my eyes, and snapped the bow over its knee. It was a very human thing to do.

I learned that the locals call him the Mangler. And I promise you this: it has been decades, but my hatred still runs deep. I've paid to have him killed, but he's immortal and he keeps coming back! No, what really upsets him is to see his beloved friend injured. They call that one The Mauler. If you ask me I think they're gay bears who are gay for each other, but nobody ever asks me. After you kill The Mauler, say \"This one's for Lennel.\"": "Ah, é tão bom ter seu ouvido! Bem, meu marido foi morto por um urso há muito tempo. E eu testemunhei isso! Estávamos caminhando pelas florestas ao sul daqui, como fazem os jovens amantes, e encontramos um urso de pêlo verde. Lennel era um homem forte, mas estúpido, e tentou acertá-lo com um arco longo. O urso o matou, espalhando sangue por toda parte, e então fez a coisa mais maldita: pegou seu arco, olhou bem nos meus olhos e quebrou o arco sobre o joelho. Foi uma coisa muito humana de se fazer.

Aprendi que os moradores locais o chamam de Mangler. E eu prometo a você: já se passaram décadas, mas meu ódio ainda é profundo. Eu paguei para matá-lo, mas ele é imortal e continua voltando! Não, o que realmente o incomoda é ver seu querido amigo ferido. Eles chamam aquele de O Mauler. Se você me perguntar, acho que eles são ursos gays que são gays um para o outro, mas ninguém nunca me perguntou. Depois de matar o Mauler, diga \"Este é para Lennel\"."
"Oh m-my... th-thank y-y-you! H-here, p-p-p-... <i>Daisy struggles with her words.</i> P-please take this. F-for y-your own r-recipes.": "Oh m-meu... v-obrigado! A-aqui, p-p-p-... <i>Daisy luta com as palavras.</i> P-por favor, pegue isso. F-para suas próprias receitas."
"Oh man! Thank you so much. I already had to feed them my apprentice, I'm sure I was going to be next!

<i>[You earn 10 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Ah cara! Muito obrigado. Já tive que alimentá-los meu aprendiz, tenho certeza que seria o próximo!

<i>[Você ganha 10 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"Oh man! Thank you so much. I already had to feed them my apprentice, I'm sure I was going to be next!

<i>[You earn 15 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Ah cara! Muito obrigado. Já tive que alimentá-los meu aprendiz, tenho certeza que seria o próximo!

<i>[Você ganha 15 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"Oh man! Thank you so much. I might have become the next thing served up for supper!

<i>[You earn 10 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Ah cara! Muito obrigado. Eu poderia ter me tornado a próxima coisa servida no jantar!

<i>[Você ganha 10 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"Oh man! Thank you so much. It makes my life a lot easier when these guys can snack while on the move. Hungry travellers can get... dangerous.

<i>[You earn 5 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Ah cara! Muito obrigado. Minha vida fica muito mais fácil quando esses caras podem fazer um lanche enquanto estão em movimento. Viajantes famintos podem se tornar... perigosos.

<i>[Você ganha 5 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"Oh my birthday is coming up... in like six or eight months... and I thought of a great early present you could get me! Goblin Slippers! They supposedly make the most comfortable slippers of any race! I want green ones, but I'm not picky. You pick the color!": "Ah, meu aniversário está chegando... daqui a seis ou oito meses... e pensei em um ótimo presente antecipado que você poderia me dar! Chinelos de duende! Eles supostamente são os chinelos mais confortáveis ​​de qualquer raça! Quero verdes, mas não sou exigente. Você escolhe a cor!"
"Oh my goodness. You're too much! You found a dead dragon and pried off its scales for me?! Thank you so much! I hope it wasn't too scary. Even if it was long-dead I'd be a little scared of such a fearsome monster. I wish I had something to offer you... hm, here. This is... a thing!": "Ó meu Deus. Você é demais! Você encontrou um dragão morto e arrancou suas escamas para mim?! Muito obrigado! Espero que não tenha sido muito assustador. Mesmo que estivesse morto há muito tempo, eu ficaria com um pouco de medo de um monstro tão assustador. Eu gostaria de ter algo para lhe oferecer... hm, aqui. Isso é... uma coisa!"
"Oh my gosh I really could use some grapes! They're my favorite snack. I should learn to grow them myself or something. Have you seen any?": "Oh meu Deus, eu realmente poderia usar algumas uvas! Eles são meu lanche favorito. Eu deveria aprender a cultivá-los sozinho ou algo assim. Você viu algum?"
"Oh my, they stink horribly! Did the bees scream when they died? No, don't tell me...

This is... dreadful. What have I done?! I hate having stuff like this in my shop. But I guess it won't be for long. Here's your cut of the money!": "Nossa, eles cheiram horrivelmente! As abelhas gritaram quando morreram? Não, não me diga...

Isso é... terrível. O que eu fiz?! Eu odeio ter coisas assim na minha loja. Mas acho que não será por muito tempo. Aqui está sua parte do dinheiro!"
"Oh my... this is the softest material I've ever felt! I'm in love with this felt!

In fact... this is the perfect ingredient for the clothing I've been designing!

<i>[New Training Recipes available.]</i>": "Nossa... esse é o material mais macio que já senti! Estou apaixonada por esse feltro!

Na verdade... este é o ingrediente perfeito para a roupa que tenho desenhado!

<i>[Novas receitas de treinamento disponíveis.]</i>"
"Oh n-no. Th-th-this r-recipe n-needs EYE STALKS. W-where in the w-world w-w-would I g-get that?! They c-come from w-watchers, b-but there's no w-w-watchers anywhere a-around h-here! Th-thankfully!

B-but i-if you ever f-find any eyestalks, p-please save them f-for me.": "Ah, não. Esta r-receita n-precisa de EYE STALKS. Onde-onde no-mundo eu poderia conseguir isso?! Eles vêm de observadores, m-mas não há observadores em lugar nenhum por aqui! Ainda bem!

M-mas e-se você encontrar algum pedúnculo ocular, p-por favor guarde-o para mim."
"Oh no. This is definitely Sinda's. Her father gave it to her, and I... I... need a moment. Thank you for your help. Here. It is customary to pay coins for services here, correct?": "Oh não. Este é definitivamente do Sinda. O pai dela deu-lha e eu... eu... preciso de um momento. Obrigado pela ajuda. Aqui. Aqui é costume pagar moedas por serviços, correto?"
"Oh thank the Fall King, I couldn't do this another night! It's just in time.

Hmm, the tentakiller arm doesn't smell at all like the hexapus arm did. But they're both tentacley smells, so this should work. I'll see what kind of sleep I get this week.": "Oh, graças ao Rei da Queda, eu não poderia fazer isso em outra noite! Chegou bem na hora.

Hmm, o braço tentakiller não tem o mesmo cheiro do braço hexapus. Mas ambos têm cheiros de tentáculos, então isso deve funcionar. Vou ver que tipo de sono terei esta semana."
"Oh thank you so much! Did you have to travel far from the circle?

Oh... you do know how to hop mushroom circles, right? No? Let me show you! It's really very simple teleportation magic. I'm sorry, I should have checked before you went all that way.": "Ah, muito obrigado! Você teve que viajar para longe do círculo?

Ah... você sabe pular círculos de cogumelos, certo? Não? Deixe-me mostrar a você! É realmente uma magia de teletransporte muito simples. Sinto muito, eu deveria ter verificado antes de você ir até lá."
"Oh thank you! This spider silk is enough to make a new pair of pants. Here's your money. And hey, take my old pair of pants, too. There's a hole in the crotch, but nobody will notice.": "Ah, obrigado! Essa seda de aranha é suficiente para fazer uma calça nova. Aqui está o seu dinheiro. E ei, leve minha calça velha também. Há um buraco na virilha, mas ninguém vai notar."
"Oh these are perfect! Give them to me! I'm going to make so many sour things!

Here: this recipe isn't too sour, so your mortal frame should be able to survive it.": "Ah, esses são perfeitos! Dê-os para mim! Vou fazer tantas coisas azedas!

Aqui: esta receita não é muito azeda, então seu corpo mortal deve ser capaz de sobreviver a ela."
"Oh yes, the rat tails I wanted. Very good, very good.": "Ah, sim, os rabos de rato que eu queria. Muito bom, muito bom."
"Oh yes. Hot mycena bites! So simple! Yet so delicious! Thanks!": "Oh sim. Picadas quentes de mycena! Tão simples! No entanto, tão delicioso! Obrigado!"
"Oh you're good at this! No seeds at all. Thank you! Here: I made this for you and I hope you like it!": "Ah, você é bom nisso! Sem sementes. Obrigado! Aqui: fiz isso para você e espero que goste!"
"Oh you're right, these leaves do seem to be... wait... wait. These are fucking TREANT LEAVES! What have you done?! Get these away from me, you idiot! Druids kill people who steal these!

... Actually, nevermind, I'll keep them. I've always wanted to runs some experiments on these, and there don't seem to be too many avenging druids down here! Haha!

So those trees are treants, not mutants. Well, they're VERY small for treants... so they're probably mutated treants! Whew. I thought for a moment there that I'd made a miscalculation. But all is well. Here is your shiny!": "Ah, você está certo, essas folhas parecem ser... espere... espere. Estas são a porra das FOLHAS DE TRANT! O que é que você fez?! Tire isso de mim, seu idiota! Druidas matam pessoas que roubam isso!

... Na verdade, deixa pra lá, vou ficar com eles. Sempre quis fazer alguns experimentos com isso, e não parece haver muitos druidas vingadores por aqui! Haha!

Então essas árvores são entes, não mutantes. Bem, eles são MUITO pequenos para entes... então provavelmente são entes mutantes! Ufa. Pensei por um momento que tinha cometido um erro de cálculo. Mas está tudo bem. Aqui está o seu brilho!"
"Oh! And since you'll be heading down there anyway, perhaps you could collect some items for me? I mean, it'd be foolish to waste this opportunity to study Hegemony weapons...\\\"\": \"O Vidente da Areia em Amulna disse": "\\\"Foi bom da sua parte me ver. Temo pelo futuro desta pequena cidade, e não é por causa das escassas criaturas que vagam pelo deserto. Não, o problema vem das profundezas das areias. Aprendi que há milhares de soldados da Hegemonia Crone lá embaixo, deixados para trás depois de uma guerra relativamente recente. Eles estão se reproduzindo, tramando e muito, muito zangados. É apenas um questão de tempo antes que eles se levantem e reivindiquem o deserto. Você deve atacar enquanto eles ainda estão fracos e despreparados. Procure as entradas do túnel e acabe com o perigo."
"Oh! Fresh basil! You found some!! Here. You are too kind!": "Oh! Manjericão fresco! Você encontrou alguns!! Aqui. Você é muito gentil!"
"Oh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.\": \"Agradeço o que você fez para impedir Grosark. Mas tenho más notícias": "o que você matou foi apenas a casca corporal de Grosark, uma espécie de fantoche de carne que ele usou porque não percebeu que os liches não precisam deles. Mas a boa notícia é que ele ainda não sabe o suficiente sobre seus poderes para ser particularmente perigoso para o nosso reino. Parte de sua alma está em Acur, e o resto está preso aqui, sem corpo, no que é chamado de estado astral."
"Oh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.\\\"\": \"Fransesca Muradrake em Statehelm disse": "\\\"Eu aprecio o que você fez para impedir Grosark. Mas tenho más notícias: o que você matou foi apenas a casca corporal de Grosark, uma espécie de fantoche de carne que ele usava porque não percebeu que os liches não precisam deles. Mas a boa notícia é que ele ainda não sabe o suficiente sobre seus poderes para ser particularmente perigoso para o nosso reino. Parte de sua alma está em Acur, e o resto dela está preso aqui, sem corpo, no que é chamado de estado astral."
"Oh, a work order. Thank you, dear. Here is your money.": "Ah, uma ordem de serviço. Obrigado, querido. Aqui está o seu dinheiro."
"Oh, and don't underestimate him. Asterion is FAR more dangerous than typical minotaurs.\\\"\": \"Lady Alethina no Red Wing Casino disse": "\\\"Vá para o deserto de Ilmari e procure os cristais amarelos gigantes onde vivem as manticoras... e mate-os! As manticoras geralmente têm Chaves de Armazenamento Hegemônicas, das quais você precisará. Continue matando as manticoras até ter pelo menos cinco chaves."
"Oh, and here": "of the many recipes Sir Coth found for me, this is the only version of Gingerbread Humans that might actually be tasty. If you're ever in the mood for an ethnic cookie, maybe try out this recipe.\": \"Hmm... se eu não soubesse, diria que são caricaturas de humanos destinadas a zombar deles... mas aparentemente não! Vou adicioná-los à árvore."
"Oh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.\": \"Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual": "não consigo sentir esperança durante um ano inteiro."
"Oh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.\\\"\": \"Percy Evans em Eltibule disse": "\\\"Você tem muitos amigos, certo? Preciso de sua ajuda rápido ou não conseguirei. Quando a lua era nova, chamei Talerra para descobrir para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não posso ter esperança por um ano inteiro."
"Oh, and if you're freaked out about murder, don't worry": "it doesn't count as murder when you kill the undead! You can trust me. I'm a god.\": \"<i>Zhia Lian:</i> Os mortos-vivos estão extremamente ativos agora, então você precisa matá-los! Comece matando esqueletos. Você pode encontrá-los em um cemitério. Ou muitos outros lugares, na verdade."
"Oh, and tell him not to eat the giant mushrooms. They're not only poisonous, they're also as hard as stone. Not a fun way to spend a weekend.\": \"Quem? Carlos Thompson? Nunca ouvi falar dele. Mas sim, eu sei para que servem esses cogumelos gigantes": "eles são antenas psíquicas para os Myconianos! Eles usam esses cogumelos como faróis para controlar os pensamentos de pessoas de vontade fraca."
"Oh, are you for hire? Great! I need special metal for my next promotional sword. I spent quite a bit to learn where to find it. I may have ordered the information from... overseas. And you know how it is with information from... overseas: always with the mysterious language! But I'm hoping you can figure it out!

\\t\"Within a mushroom tall as hills
\\tsomething something, wise preying mantises...
\\tsomething something minimum mining level of 50.\"

I should have written it down, but that's what I remember. Hope it helps.": "Ah, você está de aluguel? Ótimo! Preciso de metal especial para minha próxima espada promocional. Gastei bastante para saber onde encontrá-lo. Posso ter encomendado a informação... do exterior. E você sabe como são as informações do... exterior: sempre com a linguagem misteriosa! Mas espero que você consiga descobrir!

\\t\"Dentro de um cogumelo alto como colinas
\\talguma coisa, louva-a-deus sábios...
\\tsomething algo com nível mínimo de mineração de 50.\"

Eu deveria ter anotado, mas é disso que me lembro. Espero que ajude."
"Oh, but FYI": "we've already sent thousands of them off to other worlds, along with their horrible brain-dog pets. So it's much too late for you to stop the army. They're invading a distant world even as we speak!"
"Oh, come on, it's no big deal. In time you'll learn to hate again. Most necromancers eventually become incredible assholes, so don't worry about it! Let's go have some necrofun!\": \"<i>Zhia Lian:</i> Aqueles velhos altares Harukita ilegais são ótimos": "eles simplesmente despejam conhecimento direto em seu cérebro, sem necessidade de aprendizado e sem necessidade de sacrifícios! Mas você notou que seu ódio se tornou mais confuso e menos específico? Você terá que odiar mais explicitamente de agora em diante, porque Harukita está explorando suas emoções subconscientes para se fortalecer."
"Oh, don't you start with me! Hogan hasn't killed a single damned Tor-Urak in months! If it's not right outside his castle gate, he doesn't give a crap about it. I work my ass off, and he has the gall to suggest...

Sorry, kid. I don't mean to get you mixed up in this. I'll take it up with him tomorrow.": "Oh, não comece comigo! Hogan não mata um único maldito Tor-Urak há meses! Se não estiver do lado de fora do portão do castelo, ele não dá a mínima para isso. Eu trabalho pra caramba e ele tem a ousadia de sugerir...

Desculpe, garoto. Não é minha intenção envolver você nisso. Vou conversar com ele amanhã."
"Oh, drat it, now I'm out of rabbit's feet! I'll have to import some more... unless you happen to know where to get some?": "Oh, droga, agora estou fora dos pés de coelho! Terei que importar mais alguns... a menos que você saiba onde conseguir alguns?"
"Oh, eu deveria pagar pelo seu serviço! Não tenho muitas moedas locais, mas aqui": "esse pó é apreciado entre as bruxas do tempo.\""
"Oh, finally! The appetizers!

Well, the stench is pretty typical. But see how thick it is? That means it's not very fresh. These ratkin aren't making their own aparatifs... which means they must be trading with other ratkin... which means there's a tunnel-caravan that passes by here!

That explains how they're staying well-stocked. Now, if I knew exactly which caravan route we were on, maybe I could isolate cultural variations from that! Oh, sorry to keep you wating. Here's your shiny.": "Ah, finalmente! Os aperitivos!

Bem, o fedor é bem típico. Mas veja como é grosso? Isso significa que não é muito fresco. Esses ratkin não estão fazendo seus próprios aparatos... o que significa que eles devem estar negociando com outros ratkin... o que significa que há uma caravana-túnel que passa por aqui!

Isso explica como eles estão bem abastecidos. Agora, se eu soubesse exatamente em qual rota da caravana estávamos, talvez pudesse isolar as variações culturais disso! Oh, desculpe por mantê-lo esperando. Aqui está o seu brilho."
"Oh, good. I already went at Fiddler's hooves with a metal file, but I need these hairballs to scrub the more delicate parts of the feet. I thank you, and so does Fiddler!": "Ah, que bom. Já acertei os cascos do Fiddler com uma lima de metal, mas preciso dessas bolas de pelo para esfregar as partes mais delicadas dos pés. Eu agradeço, e o Fiddler também!"
"Oh, hello again! Wait... You've changed. I'm so sorry. You've succumbed to darkness! ... 

What? Your master wants my help? Well, I love a puzzle, give me the notes. ... Yes, I can realign these coordinates. You probably could have done it yourself, in fact, if you'd happened to recognize this numbering system. It's made by a deceased species of lizard men who had 8 fingers instead of 10. Such a simple biological difference resulted in an entirely different numbering system, which we sages often find useful for coordinate magic...

Hm? Oh, my apologies for rambling. Here, I've brought the locations up to date. But the book is still cursed -- you did know about the curse, right? No? Well, that would have been awkward! The curse tricks you into misreading the coordinates. You would have died! Haha! No matter, no matter, you can uncurse it. Or your master can, at least. The ingredients are a bit exotic... let me write them down for you. There! Bring those to your master and you'll no doubt be bloodling of the week! Goodbye.": "Ah, olá de novo! Espere... Você mudou. Eu sinto muito. Você sucumbiu à escuridão! ... 

O que? Seu mestre quer minha ajuda? Bem, eu adoro quebra-cabeças, me dê as anotações. ... Sim, posso realinhar essas coordenadas. Você provavelmente poderia ter feito isso sozinho, na verdade, se reconhecesse esse sistema de numeração. É feito por uma espécie falecida de homens lagartos que tinham 8 dedos em vez de 10. Uma diferença biológica tão simples resultou em um sistema de numeração totalmente diferente, que nós, sábios, muitas vezes achamos útil para magia de coordenadas...

Hum? Oh, minhas desculpas por divagar. Aqui, atualizei os locais. Mas o livro ainda está amaldiçoado – você sabia sobre a maldição, certo? Não? Bem, isso teria sido estranho! A maldição faz você interpretar mal as coordenadas. Você teria morrido! Haha! Não importa, não importa, você pode anular a maldição. Ou seu mestre pode, pelo menos. Os ingredientes são um pouco exóticos... deixe-me anotá-los para você. Lá! Traga-os para o seu mestre e você sem dúvida será o sangrento da semana! Adeus."
"Oh, hi %PLAYER_NAME%! You got that wax for me, remember? I appreciate it, but turns out the wax was heavily scented, and the scent gives me a headache.

Flitilda studies local fauna and says the odors from these things would cancel out the scent.": "Ah, olá %PLAYER_NAME%! Você comprou aquela cera para mim, lembra? Agradeço, mas descobri que a cera tinha um cheiro forte e o cheiro me dá dor de cabeça.

Flitilda estuda a fauna local e diz que os odores dessas coisas anulariam o cheiro."
"Oh, hi there mutant, I have a small test for you. Go and get yourself shot by some ratkin necromancers. Try not to die, though! I need to ask you some questions after, and I can't speak with the dead! Because I'm not a necromancer!\\\"\": \"Bogaku nos Esgotos Rahu disse": "\\\"Esses ratkin são excepcionalmente bons em necromancia. Eu me pergunto exatamente o quão poderosos eles são? Hmm..."
"Oh, his signet ring! He'll be so pleased!

I suppose I can part with those gaudy jewels... Where did I put them?": "Oh, seu anel de sinete! Ele ficará muito satisfeito!

Suponho que posso me desfazer dessas joias berrantes... Onde as coloquei?"
"Oh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...\": \"Tenho outra entrega de flogisto para meu comprador no deserto de Ilmari, mas não tenho tempo para ir até lá. Eu sei que é perigoso, mas acredito em você": "você é forte o suficiente para ir no meu lugar!"
"Oh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...\\\"\": \"Kalaba em Eltibule disse": "“Tenho outra entrega de flogisto para meu comprador no deserto de Ilmari, mas não tenho tempo para ir até lá. Sei que é perigoso, mas acredito em você: você é forte o suficiente para ir no meu lugar!"
"Oh, how kind. Now I'm sure to get perfect sleep, thanks to you!": "Ah, que gentil. Agora tenho certeza de que vou dormir perfeitamente, graças a você!"
"Oh, I made some floral soap for Helena. She lives way off in Eltibule though, in one of those little mini-castle things, so I haven't had a chance to give it to her. If you're headed that way can you give it to her? She's this cute but dorky armor vendor. She's always smelled a little... bad... so I thought... well, hopefully she gets the hint in time for my next orgy!": "Ah, fiz um sabonete floral para Helena. Mas ela mora bem longe, em Eltibule, em um daqueles pequenos castelos, então não tive a chance de dar a ela. Se você está indo nessa direção, pode dar a ela? Ela é uma vendedora de armaduras fofa, mas idiota. Ela sempre cheirou um pouco... mal... então pensei... bem, espero que ela entenda a dica a tempo para minha próxima orgia!"
"Oh, I should pay you for your service! I don't have much of the local coin, but here": "this powder is prized among weather witches.\": \"Estes são adoráveis! Mas... <i>[Trasen estuda o vidro]</i> estes são apenas vidros comuns e sem valor. Por que eles carregam isso por aí?! Que estranho."
"Oh, I'm fine! It's just that I've been worried. Worried sick, actually. I've heard my daughter's in trouble financially. She's... estranged. And her father has all but disowned her, and I understand why. Kind of agree with him.

But she's my daughter and I can't just watch as she ruins her life.

Maybe I'm overreacting. Could you check in on her? Her name is Helena Veilmoor and she moved far south to a fortress called Hogan's Keep. Apparently she's having trouble with a gang of sentient insects. Oh, my poor idiot daughter! Let me know she's okay!": "Ah, estou bem! É que estou preocupado. Preocupado e doente, na verdade. Ouvi dizer que minha filha está com problemas financeiros. Ela está... distante. E o pai dela praticamente a renegou, e eu entendo por quê. Concordo com ele.

Mas ela é minha filha e não posso ficar apenas vendo ela arruinar a vida dela.

Talvez eu esteja exagerando. Você poderia dar uma olhada nela? O nome dela é Helena Veilmoor e ela se mudou para o sul, para uma fortaleza chamada Hogan's Keep. Aparentemente ela está tendo problemas com uma gangue de insetos sencientes. Oh, minha pobre filha idiota! Deixe-me saber que ela está bem!"
"Oh, I'm glad I ran into you! I need some gems to finish my... project. A carnelian and an onyx. Actually, two of each! Just in case I'm unlucky.": "Ah, que bom que encontrei você! Preciso de algumas joias para terminar meu... projeto. Uma cornalina e um ônix. Na verdade, dois de cada! Apenas no caso de eu ter azar."
"Oh, Irkima. Even asking me these questions causes emotional pain. Tell him that I have indeed killed my mate before. I was unable to control my instincts. I will not make the same mistake again. Tell him to find a different mate!": "Ah, Irkima. Até me fazer essas perguntas causa dor emocional. Diga a ele que eu realmente matei meu companheiro antes. Não consegui controlar meus instintos. Não cometerei o mesmo erro novamente. Diga a ele para encontrar um companheiro diferente!"
"Oh, it's large! Well, I guess it's small for you. It's kind of unwieldy for a fairy. But I'll manage! Thank you so much!": "Ah, é grande! Bem, acho que é pequeno para você. É meio pesado para uma fada. Mas eu vou conseguir! Muito obrigado!"
"Oh, it's you. The bozo who gave me an infested hexapus arm to sleep on! Well to your credit, all those horrific odors DID cancel out and I was able to get some sleep for a bit, but two days later I was in terrible pain. I visited Steven the healer, who declared that I had Hexapus Ear and cured me. Apparently the tentacle you gave me was covered in eggs, and they got all over everything!

I threw out the hexapus arm but I still keep getting infected with Hexapus Ear every night! It's disgusting! It's... humiliating at this point. Please, you have to help me sanitize my bed area! ... And also get me a tentatkiller arm to replace the odor of the hexapus arm.": "Ah, é você. O idiota que me deu um braço hexapus infestado para dormir! Bem, para seu crédito, todos aqueles odores horríveis se anularam e consegui dormir um pouco, mas dois dias depois eu estava com dores terríveis. Visitei Steven, o curandeiro, que declarou que eu tinha orelha Hexapus e me curou. Aparentemente o tentáculo que você me deu estava coberto de ovos, e eles se espalharam por tudo!

Joguei fora o braço hexapus, mas ainda fico infectado com a orelha hexapus todas as noites! É nojento! É... humilhante neste momento. Por favor, você tem que me ajudar a higienizar a área da minha cama! ... E também me dê um braço tentatkiller para substituir o odor do braço hexapo."
"Oh, right, the spices. Before I let you have some, can you bring me some cranberries? Cranberries are <i>amazing</i> with turkey.": "Ah, certo, as especiarias. Antes de eu deixar você comer alguns, você pode me trazer alguns cranberries? Cranberries são <i>incríveis</i> com peru."
"Oh, right, the spices. Before I let you have some, can you bring me some cranberries? Cranberries are <i>amazing</i> with turkey. ": "Ah, certo, as especiarias. Antes de eu deixar você comer alguns, você pode me trazer alguns cranberries? Cranberries são <i>incríveis</i> com peru."
"Oh, thank you! This is... adequate. I appreciate it! Here.": "Ah, obrigado! Isso é... adequado. Eu agradeço! Aqui."
"Oh, thanks. Sorry I was freaking out earlier. It turns out the turrets can handle the panthers just fine! Yeah, a panther came too close, got zapped, and just ran away. So Mittens and I weren't in any immediate danger. But other foxes still were, so thank you for helping us!": "Ah, obrigado. Desculpe, eu estava pirando mais cedo. Acontece que as torres podem lidar perfeitamente com as panteras! Sim, uma pantera chegou muito perto, foi eletrocutada e simplesmente fugiu. Então Mittens e eu não corríamos nenhum perigo imediato. Mas outras raposas ainda existiam, então obrigado por nos ajudar!"
"Oh, the bones! I must apologize: having conferred with Dorimir Fangblade, I have learned that 'rollin' the bones' is an idiom for dice-rolling. And we happen to have a large supply of dice on hand, so we shall just use those on the tree!

I asked Dorimir if I could hang the bones you brought me as well, since you went to all the effort, but he hinted that they would be a grim reminder of our guests' mortality, and thus inappropriate. But they will not go to waste: Tavilak expressed enthusiasm about using them for fertilizer. Thank you for your effort!": "Ah, os ossos! Devo me desculpar: depois de conversar com Dorimir Fangblade, aprendi que “rolar os ossos” é uma expressão idiomática para jogar dados. E acontece que temos um grande estoque de dados em mãos, então usaremos apenas os que estão na árvore!

Perguntei a Dorimir se eu poderia pendurar os ossos que você me trouxe também, já que você se esforçou ao máximo, mas ele deu a entender que seriam um lembrete sombrio da mortalidade de nossos convidados e, portanto, inapropriados. Mas eles não serão desperdiçados: Tavilak expressou entusiasmo em usá-los como fertilizante. Obrigado pelo seu esforço!"
"Oh, the ink, thank you. I hope it wasn't any trouble! Let's see what happens when I use it to create a geometric chart.

<i>[ You wait for the Sand Seer to work. ]</i>

Oh my. Did you see that? I felt that healing wave all the way to my toes! Hah! It's a sigil! Quite unusual, too. If you're skilled enough in the art of sigil scripting, I'd be happy to show you how to make it.

<i>[ Ability 'Health Glyph' added to Sand Seer's Training menu. ]</i>": "Ah, a tinta, obrigado. Espero que não tenha sido nenhum problema! Vamos ver o que acontece quando eu o uso para criar um gráfico geométrico.

<i>[Você espera o Sand Seer funcionar. ]</i>

Ah, meu Deus. Você viu isso? Senti aquela onda de cura até os dedos dos pés! Hah! É um sigilo! Bastante incomum também. Se você tiver habilidade suficiente na arte da escrita de sigilos, ficarei feliz em mostrar como fazê-lo.

<i>[Habilidade 'Health Glyph' adicionada ao menu de treinamento do Sand Seer. ]</i>"
"Oh, there you are. Nelson brought me the ornaments while you were gone. They're very intricate! Glass balls with little hooks. I suppose they're meant to represent fruit, but why not just use real fruit? Well, no matter. I'll toss them onto the tree.": "Ah, aí está você. Nelson me trouxe os enfeites enquanto você estava fora. Eles são muito complicados! Bolas de vidro com pequenos ganchos. Suponho que pretendem representar frutas, mas por que não usar frutas reais? Bem, não importa. Vou jogá-los na árvore."
"Oh, these are cold iron all right. And just about dwarf-sized. Perfect! Thanks. What? Oh, no, I just wanted them for... um, a project I'm working on. A special ink! Right, they're for a special ink.

Let me show you some sword techniques I learned back home.": "Oh, estes são de ferro frio, certo. E quase do tamanho de um anão. Perfeito! Obrigado. O que? Ah, não, eu só os queria para... hum, um projeto em que estou trabalhando. Uma tinta especial! Certo, eles são para uma tinta especial.

Deixe-me mostrar algumas técnicas de espada que aprendi em casa."
"Oh, these are good looking fish. Thank you!": "Oh, estes são peixes bonitos. Obrigado!"
"Oh, this brie is lovely! I'm going to enjoy this for lunch! Here's the technique for making disgusting soft tofu.": "Ah, esse brie é lindo! Vou aproveitar isso no almoço! Aqui está a técnica para fazer tofu macio e nojento."
"Oh, uh, be aware they have death rays. Just a heads up.\\\"\": \"O alferes Cricket a bordo do Wintertide disse": "\\\"Deixe-me pensar. Como você atacaria um navio? Acho que você poderia simplesmente atacar a tripulação! Tente atacar os alferes! Heehee!"
"Oh, waiter, finally! Yes, I want to know what makes your beetle skewer a \"Deluxe\" bettle skewer? Oh, don't tell me, I want to be surprised!": "Oh, garçom, finalmente! Sim, quero saber o que torna o seu espeto de besouro um espeto de besouro \"Deluxe\"? Ah, não me diga, quero ser surpreendido!"
"Oh, what's that? Sure, of course! We'll get these beauties back to you after the holiday, don't worry! I mean... unless they get stolen by orcs or something...\": \"Oh ho ho, agora ESTAS são lindas joias! Então, uma pergunta para você": "Sona quer usar arame pesado para fazer as joias parecerem que estão flutuando na árvore. Eu disse a ela que eles deveriam parecer frutas, aninhados sob as folhas... mas então ela pergunta por quê, já que você não pode comê-los... e eu realmente não tenho uma resposta! O que você acha que deveríamos fazer?"
"Oh, while you are in there, I need a few other items.\\\"\": \"Truxartis em Vidaria disse": "\\\"Os ossos do Primeiro Escravo foram sugados, mas ainda são valiosos. Eu só preciso... atualizá-los! Sim. Isso pode funcionar."
"Oh, wow, I didn't realize the tongues were so long! I probably could have done with fewer of them. But thanks! Hmm, here! I brought a lot of these with me from the fae realm for their medicinal value, but mortals seem to like them because they're shiny.": "Nossa, não sabia que as línguas eram tão compridas! Eu provavelmente poderia ter feito com menos deles. Mas obrigado! Hum, aqui! Trouxe muitos deles comigo do reino fae por seu valor medicinal, mas os mortais parecem gostar deles porque são brilhantes."
"Oh, wow. This will work great! I'm going to get started right now. Here... would you like my old coat? It's pretty warm.": "Ah, uau. Isso funcionará muito bem! Vou começar agora. Aqui... você gostaria do meu casaco velho? Está bem quente."
"Oh, yes, the Veltan Blue for Mr. Ballard. Um. Well...

The reason I haven't delivered it yet is because <i>it isn't ready yet</i>. He does understand that a custom blue cheese will take time to ripen, right? Obviously not. Tell him that I will bring him his cheese as soon as it is perfect, and not a moment before!": "Ah, sim, o Veltan Blue para o Sr. Ballard. Hum. Bem...

A razão pela qual ainda não o entreguei é porque <i>ainda não está pronto</i>. Ele entende que um queijo azul personalizado leva tempo para amadurecer, certo? Obviamente não. Diga a ele que vou trazer o queijo assim que estiver perfeito, e nem um minuto antes!"
"Oh, you found them all? Must not have been so hard to find after all, eh? Well, a deal's a deal: here's your half of the pay.

I desperately needed this sale to pay some debts. So... Thanks again!": "Ah, você encontrou todos eles? Afinal, não deve ter sido tão difícil de encontrar, né? Bem, acordo é acordo: aqui está sua metade do pagamento.

Eu precisava desesperadamente dessa venda para pagar algumas dívidas. Então... Obrigado novamente!"
"Oh, you got him! I thought he'd get away from you. Nice job!

Well, I guess we won't need Yavazek for this after all. He's sneaky, so I asked him to hide in the lake and leap out to kill the bully when it got too close. But apparently mantises can't breathe underwater. I thought they could, but, I mean, Yav would know. So anyway I went all around to a bunch of druids and got water-breathing potions made up... and now we don't need 'em! Here, you keep 'em.": "Ah, você o pegou! Achei que ele iria fugir de você. Bom trabalho!

Bem, acho que não precisaremos de Yavazek para isso, afinal. Ele é sorrateiro, então pedi para ele se esconder no lago e pular para matar o valentão quando ele chegasse perto demais. Mas aparentemente os louva-a-deus não conseguem respirar debaixo d'água. Achei que sim, mas quero dizer, Yav saberia. De qualquer forma, procurei um bando de druidas e preparei poções para respirar água... e agora não precisamos delas! Aqui, você fica com eles."
"Oh, you look like the sort who works with their hands. Have you any cotton to spare? I could use some. Seeded and carded, of course.": "Oh, você parece do tipo que trabalha com as mãos. Você tem algodão sobrando? Eu poderia usar alguns. Semeado e cardado, é claro."
"Oh, you're a friend of Jake the Buckler? That human is my oldest customer! Seems like I've known him all my life.

Okay, so he needs to paint the stripes on a tiger, but yellow overwhelms the pale green of the trees? He needs lemon chiffon dye. I don't carry it here. But I know where he can get it: tell him to find a mantis living outside of Serbule. The mantis can help him out.

Also, tell him that my advice costs 311 Councils, which is the exact amount I owed him, so we're even now.": "Ah, você é amigo de Jake, o Broquel? Esse humano é meu cliente mais antigo! Parece que o conheço desde sempre.

Ok, então ele precisa pintar as listras de um tigre, mas o amarelo supera o verde claro das árvores? Ele precisa de tinta chiffon limão. Eu não carrego isso aqui. Mas eu sei onde ele pode conseguir isso: diga-lhe para encontrar um louva-a-deus vivendo fora de Serbule. O louva-a-deus pode ajudá-lo.

Além disso, diga a ele que meu conselho custa 311 Conselhos, que é o valor exato que eu lhe devia, então estamos empatados agora."
"Oh, you're doing deliveries for the Wardens? Hey, that's the stuff I asked for! ... What is this? This is a milking device for goats! Not cows! How can you mix these up? Our udder shape isn't even similar!

Tell him thanks for the clover and salt, but I still need a milk storage device FOR COWS.

And more clover than this!": "Oh, você está fazendo entregas para os Diretores? Ei, foi isso que eu pedi! ... O que é isso? Este é um aparelho de ordenha para cabras! Não vacas! Como você pode misturar isso? Nosso formato de úbere nem é parecido!

Agradeça a ele pelo trevo e pelo sal, mas ainda preciso de um dispositivo de armazenamento de leite PARA VACAS.

E mais trevo que isso!"
"Oh, you're the one going after the mama scorpion? Well, I hope you're up for the task!

The hole you're going into has a very tough scorpion inside. The 'mama scorpion', the bandits call her. We only know about her location because she's stopped laying eggs and she's become too aggressive for the bandits to deal with. So they sold her location to us.

I'm no fan of killing exotic wildlife, but I think we should make an exception here in the name of science. Kill her, see if you can figure out what makes her special, and report back.": "Ah, é você quem vai atrás da mamãe escorpião? Bem, espero que você esteja pronto para a tarefa!

O buraco em que você está entrando tem um escorpião muito resistente dentro. A 'mamãe escorpião', como os bandidos a chamam. Só sabemos sobre a localização dela porque ela parou de botar ovos e se tornou muito agressiva para os bandidos lidarem. Então eles venderam a localização dela para nós.

Não sou fã de matar animais selvagens exóticos, mas acho que deveríamos abrir uma exceção aqui em nome da ciência. Mate-a, veja se consegue descobrir o que a torna especial e relate."
"Oh. Oh! <i>That</i> dwarf! This is wonderful news. I will prepare some collaboration materials immediately. You wouldn't mind translating them for me, would you? Well nevermind, we can cross that bridge when we arrive at it, so to speak.": "Oh. Oh! <i>Aquele</i> anão! Esta é uma notícia maravilhosa. Prepararei alguns materiais de colaboração imediatamente. Você não se importaria de traduzi-los para mim, não é? Bem, deixa pra lá, podemos cruzar essa ponte quando chegarmos nela, por assim dizer."
"Oh. Os bandidos estão mortos? Bem, suponho que é isso que acontece com os bandidos. Nenhuma grande perda, posso garantir! Aqui": "não quero que você se torne hostil, então deixe-me recompensá-lo pelo seu escasso esforço.\""
"Oh. Qatik does not wish to mate with me? And Tavilak has eaten her mating partners in the past?! That is the piece of information I needed. Qatik's behavior now makes sense, although I still do not like it! Please, I need another favor of you...": "Oh. Qatik não deseja acasalar comigo? E Tavilak já comeu seus parceiros de acasalamento no passado?! Essa é a informação que eu precisava. O comportamento de Qatik agora faz sentido, embora eu ainda não goste! Por favor, preciso de outro favor seu..."
"Oh. The bandits are dead? Well, I suppose that's what comes of bandits. No great loss, I can assure you! Here": "I don't want you to become hostile, so let me reward you for your meager effort.\": \"Este orbe está rachado! Espere. Isso é uma farsa! Uma farsa rachada! Quanto você pagou por isso?!"
"Oh. You do delivery work? I'm very mildly surprised. Thank you for these. They'll be very useful.": "Oh. Você faz trabalho de entrega? Estou um pouco surpreso. Obrigado por isso. Serão muito úteis."
"Ohh perfect! These are perfect! I'm going to make some rennet right now.

Looks like I have too many of these, would you like them?": "Ah, perfeito! Estes são perfeitos! Vou fazer um pouco de coalho agora mesmo.

Parece que tenho muitos desses, você gostaria deles?"
"Oils for Arrows": "Óleos para flechas"
"Ok, então ele precisa pintar as listras de um tigre, mas o amarelo supera o verde claro das árvores? Ele precisa de tinta chiffon limão. Eu não carrego isso aqui. Mas eu sei onde ele pode conseguir isso": "diga-lhe para encontrar um louva-a-deus vivendo fora de Serbule. O louva-a-deus pode ajudá-lo."
"Okay a tough one... can you get me some sulfur? I have no idea where you'd find it around here, but I need some!": "Ok, uma pergunta difícil... você pode me trazer um pouco de enxofre? Não tenho ideia de onde você poderia encontrá-lo por aqui, mas preciso de um pouco!"
"Okay for real this time. Can you collect 20 rings in 60 seconds? Go go go go go go!": "Ok, de verdade desta vez. Você consegue coletar 20 anéis em 60 segundos? Vá, vá, vá, vá, vá!"
"Okay now I've got a hard one for ya. Daisy's working on some new thing and she needs some troll flesh. But I'm feeling pretty tired right now. Can you get it for me?": "Ok, agora eu tenho uma pergunta difícil para você. Daisy está trabalhando em algo novo e precisa de carne de troll. Mas estou me sentindo muito cansado agora. Você pode pegar para mim?"
"Okay so I have a problem. I admit it: I'm addicted to cranium powder. But it's okay. I'm a master of the mind! I just willed myself to stop.

Unfortunately I can't will away these nasty side-effects. I think I remember Velkort saying he dabbled in drugs like this when he was my age - can you ask him for a hangover cure?": "Ok, então eu tenho um problema. Eu admito: sou viciado em pó de crânio. Mas está tudo bem. Eu sou um mestre da mente! Eu apenas desejei parar.

Infelizmente não posso eliminar esses efeitos colaterais desagradáveis. Acho que me lembro de Velkort dizendo que se envolveu com drogas como essa quando tinha a minha idade - você pode pedir a ele uma cura para a ressaca?"
"Okay this is a secret, but I guess I have to trust somebody here, so congrats, it's you! Now don't fuck this up! For my best potions I need oil of hatred. HATRED. Not oil of malaise, not oil of greed, not oil of disgust. Oil of hatred! Can you handle that? No, I don't know where it comes from. Back home we just bought it at the market. Around here it's harder to find, but it's gotta be somewhere...": "Ok, isso é segredo, mas acho que tenho que confiar em alguém aqui, então, parabéns, é você! Agora não estrague tudo! Para minhas melhores poções preciso do óleo do ódio. ÓDIO. Não é óleo de mal-estar, não é óleo de ganância, não é óleo de desgosto. Óleo de ódio! Você consegue lidar com isso? Não, não sei de onde vem. Em casa, acabamos de comprar no mercado. Por aqui é mais difícil de achar, mas tem que estar em algum lugar..."
"Okay, I need a bit of discreet help. Nelson gave me a decoration to put atop the tree, but I lost it! And I never lose things! So you know what this means: it was stolen. And I know who did it.

There's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!": "Ok, preciso de uma ajuda discreta. Nelson me deu uma decoração para colocar em cima da árvore, mas perdi! E eu nunca perco coisas! Então você sabe o que isso significa: foi roubado. E eu sei quem fez isso.

Há um certo roedor que tornou minha vida miserável desde que acidentalmente dei a ele superinteligência. O nome dele é Senhor Squeaky e ele mora em algum lugar a noroeste da cidade. Por favor, traga de volta a estrela que ele roubou!"
"Okay, I think you've proven yourself. But here's one more challenge that's just for fun. Can you take out a dummy with a shield and your fists?

<i>[You must have the Shield and Unarmed skills active to advance this quest.]</i>": "Ok, acho que você provou seu valor. Mas aqui está mais um desafio que é apenas para diversão. Você consegue derrubar um manequim com escudo e punhos?

<i>[Você deve ter as habilidades Escudo e Desarmado ativas para avançar nesta missão.]</i>"
"Okay, I'll cut the act: I know why you're really here. You're after the wizard! Well, he isn't here. Not physically, anyway. But his creations are! Go up to the science deck and you'll see what I mean. By all means, feel free to dispose of our new 'army'!": "Ok, vou parar de fingir: eu sei por que você está realmente aqui. Você está atrás do mago! Bem, ele não está aqui. Não fisicamente, de qualquer maneira. Mas suas criações são! Vá até o deck de ciências e você verá o que quero dizer. Por suposto, sinta-se à vontade para se desfazer do nosso novo 'exército'!"
"Okay, last time. Just go touch candles until your hand burns off. Hyperbole! Relax! How about 25, just to be damned sure we've got it done?": "Ok, da última vez. Basta tocar nas velas até que sua mão queime. Hipérbole! Relaxar! Que tal 25, só para ter certeza de que conseguimos?"
"Okay, okay. Thanks for playing. Here. See this? Loaded die. Highly explosive, as  you know. But if you throw them like <i>this</i>, they don't explode as often. You're welcome.

<i>[Loaded Dice Explosion Rate -1%]</i>": "Ok, ok. Obrigado por jogar. Aqui. Veja isso? Morre carregado. Altamente explosivo, como você sabe. Mas se você jogá-los assim, eles não explodem com tanta frequência. De nada.

<i>[Taxa de explosão de dados carregados -1%]</i>"
"Okay, so he needs to paint the stripes on a tiger, but yellow overwhelms the pale green of the trees? He needs lemon chiffon dye. I don't carry it here. But I know where he can get it": "tell him to find a mantis living outside of Serbule. The mantis can help him out."
"Okay, so the rakkies in the southwest have been breeding extra-vicious sand dogs. You need to kill those.

Look, I know what this sounds like and I don't want to hear it. Those sand dogs aren't like us... they're not even mammals! They're dinosaurs or something! Wardens hate dinosaurs, right? Well... they aren't native to here! They're disrupting the natural order and shit.

Look, the bandits were already a big problem for Amulna, and now they're much worse. And those sand dogs creep me out. Just fill out the forms however you need to, but those freaks need to go.": "Ok, então os rakkies do sudoeste têm criado cães de areia extremamente cruéis. Você precisa matá-los.

Olha, eu sei como isso soa e não quero ouvir. Esses cachorros da areia não são como nós... nem são mamíferos! Eles são dinossauros ou algo assim! Os guardas odeiam dinossauros, certo? Bem... eles não são nativos daqui! Eles estão perturbando a ordem natural e essas merdas.

Olha, os bandidos já eram um grande problema para Amulna e agora são muito piores. E aqueles cachorros da areia me assustam. Basta preencher os formulários como for necessário, mas esses malucos precisam ir embora."
"Okay, so these teeth are very much not like the other teeth. The carnivines grow wood-like plates, but the spriggan weed teeth are little nuggets of hard stuff.

Therefore it's my expert opinion that carnivines are completely unrelated to spriggan weeds. Science accomplished! This is fun! Oh speaking of botany, here's some exotic seeds I found for you!": "Ok, então esses dentes não são muito parecidos com os outros dentes. As carnivinas desenvolvem placas semelhantes a madeira, mas os dentes das ervas daninhas spriggan são pequenas pepitas de material duro.

Portanto, é minha opinião de especialista que as carnivinas não têm nenhuma relação com as ervas daninhas spriggan. Ciência realizada! Isso é divertido! Ah, falando em botânica, aqui estão algumas sementes exóticas que encontrei para você!"
"Okay, thanks. I haven't ever actually made paint before, but I saw someone make it once, and it's probably pretty easy.

Here, I don't have much to offer, but I wanted you to have this. Master taught me that wizards use these to learn how to shoot lightning. Maybe you can sell it to a wizard and buy yourself something nice.": "Ok, obrigado. Na verdade, nunca fiz tinta antes, mas vi alguém fazer isso uma vez e provavelmente é bem fácil.

Aqui, não tenho muito a oferecer, mas queria que você ficasse com isso. O Mestre me ensinou que os magos usam isso para aprender a disparar raios. Talvez você possa vendê-lo para um mago e comprar algo legal."
"Okay, these agates are great. But to make a useful paint I also need some lac. It comes from insects... but harvesting little insects would take too long. I bet the tor-urak that live around here would have it in larger quantities.": "Ok, essas ágatas são ótimas. Mas para fazer uma tinta útil também preciso de um pouco de laca. Vem de insetos... mas colher pequenos insetos levaria muito tempo. Aposto que os tor-urak que vivem por aqui o comeriam em quantidades maiores."
"Okay. I'll admit it. I'm out of coursework. I think you know nearly as much as me!": "OK. Eu admito. Estou sem curso. Acho que você sabe quase tanto quanto eu!"
"Okay. So these are the ingredients I need for the genital transmogrification potion. Bring these to me and I'll brew it up!": "OK. Então esses são os ingredientes que preciso para a poção de transmogrificação genital. Traga isso para mim e eu prepararei!"
"Okay. Stand back. I put the resistance potion on the box and the cleanser on the lock, then I can use the picks, and... Haha!

For ONCE I wasn't scammed by a mortal. There really is treasure in here!

I'd planned to use this to pull an epic illusion prank on the whole city. But it's yours. ALL of it. I'm sorry. Please, please, please forgive me?": "OK. Afaste-se. Coloquei a poção de resistência na caixa e o limpador na fechadura, depois posso usar as picaretas e... Haha!

Pela primeira vez eu não fui enganado por um mortal. Realmente há um tesouro aqui!

Eu planejei usar isso para pregar uma peça de ilusão épica em toda a cidade. Mas é seu. TUDO isso. Desculpe. Por favor, por favor, por favor, me perdoe?"
"Okay. We need round things on the tree. Round. Round round round. Think... Oh, onions are round! Get lots of onions.": "OK. Precisamos de coisas redondas na árvore. Redondo. Rodada, volta, volta. Pense... Ah, cebola é redonda! Pegue muitas cebolas."
"Okay. Well I'm working on some Roquefort, and I need pungent rennet. Get it for me and I'll teach you a simple tofu recipe.\\\"\": \"Braigon em Eltibule disse": "\\\"Você ainda está preso à coisa do tofu? O tofu é inútil por si só, é por isso que parei de persegui-lo. Não vale a pena comer sozinho, como o queijo! Em vez disso, eu poderia lhe ensinar algumas boas receitas de queijo... Não?"
"Okay... remind me, if you would: why in the FUCK did I ask you for cave fish? I should have asked for a tastier fish! Damn it! Damn it! Cave fish taste like feet. But what's done is done. Here, take these: some of my best throwing knives. And don't give me any lip, those are valuable! Learn to throw a knife, why don'tcha?": "Ok... lembre-me, por favor: por que diabos eu pedi peixes da caverna? Eu deveria ter pedido um peixe mais saboroso! Caramba! Caramba! Os peixes das cavernas têm gosto de pés. Mas o que está feito está feito. Aqui, pegue estas: algumas das minhas melhores facas de arremesso. E não me venha com nenhuma lábia, elas são valiosas! Aprenda a atirar uma faca, por que não?"
"Old Fangsworth": "Velho Fangsworth"
"OldFangsworth": "Old Fangsworth"
"On behalf of my troops, Statehelm itself, and indeed all of Alharth, you have our heartfelt thanks. You did amazing work out there.

I'll instruct Ferris to share as much knowledge about the demons with you as we can.": "Em nome das minhas tropas, do próprio Statehelm e, na verdade, de toda Alharth, você tem nossos sinceros agradecimentos. Você fez um trabalho incrível lá.

Vou instruir Ferris a compartilhar com você o máximo de conhecimento possível sobre os demônios."
"On Sun Vale's main island, on the northeast beach, some sort of entity asked you to remove a huge clownfish. It can only be caught at dusk or dawn (5am or 7pm).": "Na ilha principal de Sun Vale, na praia nordeste, uma espécie de entidade pediu para você remover um enorme peixe-palhaço. Só pode ser capturado ao anoitecer ou ao amanhecer (5h ou 19h)."
"On the south end of Sun Vale's \"Ranalon Island\", a psychic fish asked you to help remove extremely vicious eels via angling.": "No extremo sul da \"Ilha Ranalon\" de Sun Vale, um peixe psíquico pediu que você ajudasse a remover enguias extremamente ferozes através da pesca."
"Once again I'm going to have to trek out into the dangerous wilds to collect the slime of fae molluscs... say, you know how to milk a snail, I presume? Would you mind doing it? Take some clean bottles with you to collect it!": "Mais uma vez terei que caminhar pelas florestas perigosas para coletar o lodo dos moluscos feéricos... digamos, você sabe como ordenhar um caracol, presumo? Você se importaria de fazer isso? Leve algumas garrafas limpas com você para coletá-las!"
"Once I heard a wizard say a weird word -- just some gibberish -- and then they disappeared! Do you know any magic words? Say some for me!

<i>[ You can research words of power when you have several levels of the Lore skill, which you can obtain by examining lore items in the world. ]</i>": "Uma vez ouvi um bruxo dizer uma palavra estranha – apenas algumas bobagens – e então eles desapareceram! Você conhece alguma palavra mágica? Diga um pouco para mim!

<i>[Você pode pesquisar palavras de poder quando tiver vários níveis de habilidade de Conhecimento, que pode ser obtido examinando itens de conhecimento no mundo. ]</i>"
"Once inside, look for a Tuvillic Rune. It's not too far... inside.\\\"\": \"Truxartis em Vidaria disse": "\\\"O ingrediente secreto da minha poção é, claro... um segredo. Você não é digno... de conhecê-lo. Sua criação estaria além de você de qualquer maneira."
"Once inside, search for these items -- I will write them down for you. You may keep anything else you find.\\\"\": \"Truxartis em Vidaria disse": "\\\"Eu usei o diário de Khyrulek para mapear um caminho para um dos esconderijos de vampiros abaixo de Statehelm. Há uma entrada funcional em... Vidaria! Fica no antigo prédio comum da Fazenda Woodburr. Procure por um... moinho de vento... próximo. Depois de encontrar a Runa Tuvillic, você deverá ser capaz de... derrotar o guardião... e entrar no esconderijo."
"Once you know the spell, use it on some humans, elves, or rakshasa to collect perfectly charred femurs. ... And make sure to only kill those deserving of death. Obviously.\\\"\": \"Guzor Harrison, da Statehelm, disse": "“Estou trabalhando em um novo feitiço extremamente interessante e, para continuar minha pesquisa, preciso de reagentes especiais."
"Once, long ago, giant cats roamed Povus. But we've only managed to resurrect a few specimens! We're so early in our research of this creature that we don't even want to study their behavior yet: I just need bones to study! If you find giant cat bones, please bring them to me.": "Antigamente, há muito tempo, gatos gigantes vagavam por Povus. Mas só conseguimos ressuscitar alguns exemplares! Estamos tão no início da pesquisa sobre essa criatura que nem queremos estudar seu comportamento ainda: só preciso de ossos para estudar! Se você encontrar ossos de gatos gigantes, por favor, traga-os para mim."
"One heart down! Lots to go!": "Um coração abatido! Muito para ir!"
"One of my fae friends said that there are flitterbies growing here in this country, somewhere far south of here in a land called Eltibule. I need one for my drawings!": "Um dos meus amigos fae disse que existem flitterbies crescendo aqui neste país, em algum lugar bem ao sul daqui, em uma terra chamada Eltibule. Preciso de um para meus desenhos!"
"One of our VIP guests has requested a special variety of bread, and I do not know how to make it! Another guest told me that a human somewhere in Kur can teach the recipe, but of course that helps me very little. I am in dire need of this 'vegan nut barley bread', so if you manage to bake some, please bring it to me!": "Um dos nossos convidados VIP solicitou uma variedade especial de pão e não sei como fazer! Outro convidado me disse que um humano em algum lugar de Kur pode ensinar a receita, mas é claro que isso me ajuda muito pouco. Estou precisando urgentemente deste 'pão vegano de cevada e nozes', então se você conseguir assar um pouco, por favor, traga-o para mim!"
"One of the chapters is in that old spider-infested cave northeast of here. Tyler -- the drunk over there in the corner -- said he saw them when he was exploring, but he didn't think the pages were worth anything. And now he's too afraid to go back in.

He said they were on top of some cobweb-encrusted crates deep in the cave. I'll pay extra for that one, since it sounds dangerous.": "Um dos capítulos está naquela velha caverna infestada de aranhas a nordeste daqui. Tyler – o bêbado ali no canto – disse que os viu enquanto estava explorando, mas não achava que as páginas valiam alguma coisa. E agora ele está com muito medo de voltar.

Ele disse que eles estavam em cima de algumas caixas incrustadas de teias de aranha no fundo da caverna. Pagarei a mais por isso, pois parece perigoso."
"One single meat creature that inhabits this cavern is so poisonous and foul that I am unable to filter out its toxins, and must flee if it approaches. This creature was bred for some ill purpose. I know this from spying upon the minds of green-skinned bipeds that came to feed it. They called the creature 'Murklinger'. It would please me to no longer need to fear this creature.": "Uma única criatura carnívora que habita esta caverna é tão venenosa e nojenta que não consigo filtrar suas toxinas e preciso fugir caso ela se aproxime. Esta criatura foi criada para algum propósito maligno. Sei disso por espionar as mentes dos bípedes de pele verde que vieram alimentá-lo. Eles chamaram a criatura de 'Murklinger'. Me agradaria não precisar mais temer esta criatura."
"One thing I was known for before being ousted from the army was my ability to seek out and destroy creatures that should not be here. I may no longer possess the ability to destroy them, but I can still seek them out...

That's why you must believe me when I say there is a non-native abomination within our midst. I've heard some folks calling it 'The Perforator', but whatever its name is it must be destroyed lest it open the way for more of its kind to infiltrate the desert.": "Uma coisa pela qual eu era conhecido antes de ser expulso do exército era minha capacidade de procurar e destruir criaturas que não deveriam estar aqui. Posso não possuir mais a habilidade de destruí-los, mas ainda posso procurá-los...

É por isso que você deve acreditar em mim quando digo que existe uma abominação não-nativa em nosso meio. Já ouvi algumas pessoas chamá-lo de 'O Perfurador', mas seja qual for o nome, ele deve ser destruído para que não abra caminho para que mais pessoas dessa espécie se infiltrem no deserto."
