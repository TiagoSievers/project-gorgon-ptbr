<i>[There is a new button on the Storage UI window, \"Stow Items in Nearby Storages\". Pressing this button will move items from your inventory into any nearby storage, provided there's at least one of that item in the storage already.]</i>": "Perfeito! Também incluirei alguns alimentos que comprei em Selaxi e colocarei este pacote no próximo navio de correio.

