"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Amazing Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Olá! Fazer arreios para cavalos é um trabalho muito importante! Estou precisando de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 selas incríveis? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar sua arte."
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Decent Reins? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Olá! Fazer arreios para cavalos é um trabalho muito importante! Estou precisando de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 Rédeas Decentes? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar sua arte."
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Quality Saddlebags? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Olá! Fazer arreios para cavalos é um trabalho muito importante! Estou precisando de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 alforjes de qualidade? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar sua arte."
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Rough Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Olá! Fazer arreios para cavalos é um trabalho muito importante! Estou precisando de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 selas ásperas? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar sua arte."
"Hogan explained that the tree should be decorated with a number of small orbs. This seems trivial. Please fetch some lumber and I shall carve some balls. Maple is fragrant; we should use that.": "Hogan explicou que a árvore deveria ser decorada com uma série de pequenos orbes. Isto parece trivial. Por favor, traga um pouco de madeira e eu esculpirei algumas bolas. Maple é perfumado; devemos usar isso."
"Hogan gave us many complex requirements. Fragrance, sentiment, color, and reflectiveness must all be taken into account. I have it: fish! Shiny, colorful, fragrant, and sentimental ... to me, at least. Fetch fresh grapefish!": "Hogan nos deu muitos requisitos complexos. Fragrância, sentimento, cor e refletividade devem ser levados em consideração. Eu tenho: peixe! Brilhante, colorido, perfumado e sentimental... para mim, pelo menos. Pegue toranja fresca!"
"Hogan in Hogan's Keep asked you to collect some guavas.": "Hogan, na Fortaleza de Hogan, pediu que você coletasse algumas goiabas."
"Hogan in Hogan's Keep asked you to kill Gnasher Matriarchs. He says they are near a waterfall to the west.": "Hogan, na Fortaleza de Hogan, pediu para você matar as Matriarcas Gnasher. Ele diz que eles estão perto de uma cachoeira a oeste."
"Hogan in Hogan's Keep asked you to visit Sie Antry at her home southwest of Hogan's Keep.": "Hogan, na Fortaleza de Hogan, pediu que você visitasse Sie Antry na casa dela, a sudoeste da Fortaleza de Hogan."
"Hogan the staff fighter has requested some items as payment for teaching you staff combat.": "Hogan, o lutador de equipe, solicitou alguns itens como pagamento por ensinar combate com equipe."
