"Psst... I need your help! My friend Avgal -- he's another gru-maghi -- was caught trying to escape yesterday! And you know the penalty for that: they strip you naked and leave you in the mountains to freeze to death. You've probably never seen somebody die from hypothermia, but it's horrible. Not to worry, though: I have a plan. I just need some cold resistance potions! A lot of them!": "Psiu... preciso da sua ajuda! Meu amigo Avgal – ele é outro gru-maghi – foi pego tentando escapar ontem! E você conhece a penalidade por isso: eles te deixam nu e te deixam nas montanhas para morrer congelado. Você provavelmente nunca viu alguém morrer de hipotermia, mas é horrível. Mas não se preocupe: eu tenho um plano. Eu só preciso de algumas poções de resistência ao frio! Muitos deles!"
"Psst... thanks for your help getting those fresh bee stingers. I've got another order for really fresh butterfly wings. I'd collect them myself, but I'm very fluent in butterfly speech, and I just can't handle their dying screams right now...": "Psiu... obrigado pela sua ajuda para conseguir aqueles ferrões de abelha frescos. Tenho outro pedido de asas de borboleta bem fresquinhas. Eu mesmo os colecionaria, mas sou muito fluente na fala das borboletas e simplesmente não consigo lidar com seus gritos de morte agora..."
"Psst... you're with the Wardens? Whew! I was hoping backup would arrive!

A few days ago, teams of orcs from Gazluk Keep were up here clearing out their secret system of mountain trails. And today we found out that there are now hundreds of slimes in the southern valley! That has to be connected. Right?

Sometimes ice slimes fall down the mountain, but not in numbers like this. The animals that live in the valley don't know how to avoid ice slimes. They're sitting ducks! And deer, and goats, and other animals! Not to mention those dwarves that live in the New Prestonbule cave. Please help me lower the number of ice slicks down there!": "Psiu... você está com os Guardiões? Uau! Eu esperava que o reforço chegasse!

Há alguns dias, equipes de orcs do Forte Gazluk estiveram aqui limpando seu sistema secreto de trilhas nas montanhas. E hoje descobrimos que existem centenas de limos no vale sul! Isso tem que estar conectado. Certo?

Às vezes, limos de gelo caem da montanha, mas não em números como este. Os animais que vivem no vale não sabem como evitar a gosma gelada. Eles são alvos fáceis! E veados, cabras e outros animais! Sem mencionar aqueles anões que vivem na caverna de New Prestonbule. Por favor, ajude-me a diminuir o número de manchas de gelo lá embaixo!"
"Pst... a little bird told me the most exciting rumor: there's some weird kind of skeletons in a cave under Rahu... and they're easily controllable by necromancers! I bet they're the restless undead from that rakkie war! Those rakkies could supposedly shapeshift... imagine a shapeshifting skeleton! Orrrr... they say there were dragons during the war... imagine a dragon skeleton at our command!

Well, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!": "Pst... um passarinho me contou o boato mais emocionante: há algum tipo estranho de esqueleto em uma caverna sob Rahu... e eles são facilmente controláveis ​​por necromantes! Aposto que são os mortos-vivos inquietos daquela guerra rakkie! Aqueles rakkies poderiam supostamente mudar de forma... imagine um esqueleto que muda de forma! Orrrr... dizem que havia dragões durante a guerra... imagine um esqueleto de dragão sob nosso comando!

Bom, não me importa o que seja, sério... preciso ver um! Se você encontrar, você tem que me mostrar. Prometa-me!"
