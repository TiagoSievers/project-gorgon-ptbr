"Time to practice the technique I taught you to harvest excess negative emotions. Check my almanac to see what sort of undead are best to hunt right now. Then go kill them until you find some pearls! Remember: you don't have to be a priest to do this, but you do have to be wearing a Symbol of Arisetsu while you kill the undead.": "É hora de praticar a técnica que ensinei para colher o excesso de emoções negativas. Verifique meu almanaque para ver que tipo de mortos-vivos são melhores para caçar agora. Então vá matá-los até encontrar algumas pérolas! Lembre-se: você não precisa ser um sacerdote para fazer isso, mas precisa usar um Símbolo de Arisetsu enquanto mata os mortos-vivos."
