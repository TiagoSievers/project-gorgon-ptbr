"Ferand Deftwhisper in Povus said, \"If I'm going to run an armor shop again I'll need more grizlark, and Leah's kuvou are dead. But there's still feral kuvou! If you just let them spit on you and collect that into a bottle, I'll pay you.\"": "Ferand Deftwhisper em Povus disse: \"Se eu for administrar uma loja de armaduras novamente, precisarei de mais grizlark, e os kuvou de Leah estão mortos. Mas ainda há kuvou selvagens! Se você simplesmente deixá-los cuspir em você e coletar isso em uma garrafa, eu pagarei a você. \""
