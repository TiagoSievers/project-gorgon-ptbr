"WerewolfInvasion": "LobisomemInvasão"
"WerewolfOverflow": "Lobisomem Overflow"
"WerewolfSpit": "Cuspir de lobisomem"
"Werewolves": "Lobisomens"
"Werewolves who never leave wolf form eventually start leaking magic into their bones and organs. It's happened to me, and I quite like the feeling, but I wish to study the phenomenon more... without dissecting myself. See if you can find werewolves whose magic has bled into their teeth. I doubt they'll be too common, but please look around.": "Lobisomens que nunca deixam a forma de lobo eventualmente começam a vazar magia em seus ossos e órgãos. Já aconteceu comigo e gosto bastante da sensação, mas quero estudar mais o fenômeno... sem me dissecar. Veja se você consegue encontrar lobisomens cuja magia sangrou em seus dentes. Duvido que sejam muito comuns, mas por favor, olhe ao redor."
"Westley got turned into an elf by Zhia Lian. He was pretty shaken up about it. He'd been this tough half-human and suddenly he was scrawny and weird. Ran off to find a cure. Last I heard he was headed to the edge of the Council Lands. There's a town near the border with Verta where a lot of elves live. It's called Serbule. He figured they might know something. Go check on him!": "Westley foi transformado em elfo por Zhia Lian. Ele ficou bastante abalado com isso. Ele era um meio-humano durão e de repente estava magro e estranho. Fugiu para encontrar uma cura. A última vez que ouvi, ele estava indo para os limites das Terras do Conselho. Há uma cidade perto da fronteira com Verta onde vivem muitos elfos. Chama-se Sérbulo. Ele imaginou que eles poderiam saber alguma coisa. Vá ver como ele está!"
"Westley in Serbule asked for help gathering the ingredients for a medicinal balm.": "Westley, em Serbule, pediu ajuda para reunir os ingredientes para um bálsamo medicinal."
"What a relief! Now I can get back to what's important: mating. Thank you!": "Que alívio! Agora posso voltar ao que é importante: o acasalamento. Obrigado!"
"What I need you to do is start an undeniable rumor that giant bats hate and kill striga on sight. Do this by killing striga on sight!\": \"<i>Zhia Lian:</i> Prevejo um problema com meu plano da Deusa dos Morcegos": "striga! Você sabe, aqueles morcegos que atuam como servos das velhas? Eles são o povo favorito de Imatia e parecem morcegos. Acho que o melhor plano aqui é partir para o ataque."
"What is that? Oh, Ferris needs assistance is it? Well, let me see the samples that you have, then.

[Pitre takes the skins from you, but then quickly returns them.]

On second thought, a genetic scan is quite unnecessary. The demons' plan is obvious. You see, frogs have permeable skin through which they absorb all manner of particulates. And if you look around this area, you are likely to see many ordinary animals overcome with demonic influence. If the passive presence of the demons has such an effect on these animals, I can only imagine the level of influence they could have on an animal that is designed to be influenced by its environment. Easy, deep influence, is the answer I would give to Ferris.": "O que é aquilo? Oh, Ferris precisa de ajuda, não é? Bem, deixe-me ver as amostras que você tem, então.

[Pitre tira as peles de você, mas as devolve rapidamente.]

Pensando bem, uma varredura genética é totalmente desnecessária. O plano dos demônios é óbvio. Veja, os sapos têm pele permeável, através da qual absorvem todo tipo de partículas. E se você olhar ao redor desta área, provavelmente verá muitos animais comuns vencidos pela influência demoníaca. Se a presença passiva dos demónios tem tal efeito sobre estes animais, só posso imaginar o nível de influência que poderiam ter sobre um animal concebido para ser influenciado pelo seu ambiente. Influência fácil e profunda, é a resposta que eu daria a Ferris."
"What is this? A medal?

<i>[ Asparagus stares at it, turning it in his hand. He wipes away a tear. ]</i>

This is from Justin, isn't it?

Tell him... Tell him thanks.": "O que é isso? Uma medalha?

<i>[Asparagus olha para ele, virando-o na mão. Ele enxuga uma lágrima. ]</i>

Isso é do Justin, não é?

Diga a ele... Agradeça a ele."
"What is this? I don't remember ordering lunch. Is this a prank? No matter. I'll give it to Skitters. Go.": "O que é isso? Não me lembro de ter pedido o almoço. Isso é uma pegadinha? Não importa. Vou entregá-lo ao Skitters. Ir."
"What took you so long?! I've been waiting for more than an hour! Nevermind. I don't care about your excuses. Please prepare a stuffed bell pepper for me.": "Por que você demorou tanto?! Estou esperando há mais de uma hora! Deixa para lá. Eu não me importo com suas desculpas. Por favor, prepare um pimentão recheado para mim."
"What we need is more brave hunters. Be a brave hunter. Go kill some harmless deer! But do it the hunter way: with a bow and arrow. None of that magical crap!": "O que precisamos é de caçadores mais corajosos. Seja um caçador corajoso. Vá matar alguns cervos inofensivos! Mas faça do jeito do caçador: com arco e flecha. Nada dessa porcaria mágica!"
"What we need to cure boredom is culture! And culture demands patrons. So help me foster some culture -- go tip people! Give them at least 10 Councils apiece -- nobody likes a cheapskate.

<i>[ Use the /tip command in the chat window to tip players. For instance, if a player was named Bob, you could type \"/tip Bob 10\" ]</i>": "O que precisamos para curar o tédio é cultura! E a cultura exige patronos. Então ajude-me a promover um pouco de cultura - dê dicas às pessoas! Dê-lhes pelo menos 10 Conselhos para cada um – ninguém gosta de pão-duro.

<i>[ Use o comando /tip na janela de bate-papo para dar gorjeta aos jogadores. Por exemplo, se um jogador se chamasse Bob, você poderia digitar \"/tip Bob 10\" ]</i>"
"What's all this? You think this can help fix memory problems? Oh, hmm. You know, I think you're right! This might work! There's some missing ingredients, but I think I have those. You're a genius, thank you! I have to mix this up right now before I forget.

<i>[Midge works horriedly, then takes a deep breath and drinks her concoction.]</i>

Oh, you're still here? That's nice. ... hmm. I think I may have helped my brain just now. I'll be able to tell in a bit. Hey, you're an alchemist too, right? Here, let me show you a related formula that I devised this earlier. It's not quite what I was looking for. In fact, it's a LOT of work for a short-term boost... maybe it'll help somebody somewhere, though!": "O que é tudo isso? Você acha que isso pode ajudar a resolver problemas de memória? Ah, hum. Sabe, acho que você está certo! Isso pode funcionar! Faltam alguns ingredientes, mas acho que os tenho. Você é um gênio, obrigado! Tenho que misturar isso agora antes que me esqueça.

<i>[Midge trabalha horrivelmente, depois respira fundo e bebe sua mistura.]</i>

Ah, você ainda está aqui? Muito legal. ... hum. Acho que posso ter ajudado meu cérebro agora há pouco. Daqui a pouco poderei contar. Ei, você também é alquimista, certo? Aqui, deixe-me mostrar uma fórmula relacionada que desenvolvi anteriormente. Não é bem o que eu estava procurando. Na verdade, dá MUITO trabalho para um impulso de curto prazo... talvez ajude alguém em algum lugar!"
"What's this?

Oh, I see. Anaberyl put you up to this, didn't she? Give that to me.

[<i>Ormond snatches the potion and drinks it down.</i>]

It's working... It's... Wait, it's changing my... Oh my. I thought it would just shrink my... uh, I should have asked for the fine print on this potion, eh? Ha ha!

Hah.

Listen, tell Anaberyl i drank it down without hesitation, okay? I know fairies have their bizarre mating rituals, and... I think she's worth it. Now if you'll excuse me, I'm going to go freak out.": "O que é isso?

Oh, eu vejo. Anaberyl mandou você fazer isso, não foi? Dê isso para mim.

[<i>Ormond pega a poção e bebe.</i>]

Está funcionando... Está... Espere, está mudando meu... Nossa. Achei que isso iria diminuir meu... uh, eu deveria ter pedido as letras miúdas desta poção, hein? Ha ha!

Hah.

Ouça, diga a Anaberyl que bebi sem hesitar, ok? Sei que as fadas têm rituais de acasalamento bizarros e... acho que ela vale a pena. Agora, se você me der licença, vou pirar."
"What's this? <i>Landri takes the letter and reads it with incredible speed.</i>

Hm. A valid hypothesis, though I do not think it will work. Tell the author that she should substitute other elemental energy foci in place of ice foci. I believe that all the elemental planes are very close together, and using other energy types will open micro-portals to those planes, which may coalesce into a full portal more easily. And tell her good luck; she will need it.": "O que é isso? <i>Landri pega a carta e a lê com uma velocidade incrível.</i>

Hum. Uma hipótese válida, embora eu não ache que funcione. Diga à autora que ela deveria substituir outros focos de energia elementar no lugar dos focos de gelo. Acredito que todos os planos elementares estão muito próximos uns dos outros, e o uso de outros tipos de energia abrirá microportais para esses planos, que podem se fundir em um portal completo com mais facilidade. E diga-lhe boa sorte; ela vai precisar disso."
"What's this? Oh. From Lana in the inn? I told her not to bother! Bear repellent might cause an attacking bear to go away, but this bear is literally living in my barn! I'm not gonna try to repel it, it'd just kill me! Why doesn't she listen?! Human youth are so stupid!

Sigh... but no, don't tell her that. Tell her thanks, and that I appreciate it and I'll try it out soon.": "O que é isso? Oh. Da Lana na pousada? Eu disse a ela para não se preocupar! O repelente de urso pode fazer com que um urso atacante vá embora, mas esse urso está literalmente morando no meu celeiro! Não vou tentar repeli-lo, isso só me mataria! Por que ela não escuta?! A juventude humana é tão estúpida!

Suspiro... mas não, não diga isso a ela. Agradeça a ela e que agradeço e que experimentarei em breve."
"What's this? This fixes memory problems? No, this is a memory inhibitor! Why would you give me this?! Wait.. wait, I asked you for this, didn't I? Because I can study it! Hmm. Okay! Okay! I have to take some notes, but thanks! Thank you. This is great! Here: this doesn't work.": "O que é isso? Isso corrige problemas de memória? Não, isso é um inibidor de memória! Por que você me daria isso?! Espere... espere, eu pedi isso a você, não foi? Porque eu posso estudar! Hum. OK! OK! Preciso fazer algumas anotações, mas obrigado! Obrigado. Isso é ótimo! Aqui: isso não funciona."
"What... this is real muntok pepper! Why, you're a gem in the gold pile! Thank you so much! Let me give you some soup! No, no, that's not nearly good enough. Wait. Here, take this. I, uh, borrowed it when I was leaving the keep. It was the younger Lord Eltibule's hunting weapon. I thought I could use it for safety, but it's too fiddly for me.": "O que... isso é pimenta muntok de verdade! Ora, você é uma joia na pilha de ouro! Muito obrigado! Deixa eu te dar um pouco de sopa! Não, não, isso não é bom o suficiente. Espere. Aqui, pegue isso. Eu, uh, peguei emprestado quando estava saindo do castelo. Era a arma de caça do jovem Lorde Eltibule. Achei que poderia usá-lo por segurança, mas é muito complicado para mim."
"What? A Praetor's Order? He seriously wants to issue a Praetor's Execution out here? In front of those Elves? What would they think? They'd revolt! No, he's just bluffing. Tell him I'm not going anywhere!": "O que? Ordem de um pretor? Ele quer mesmo emitir uma Execução do Pretor aqui? Na frente daqueles Elfos? O que eles pensariam? Eles se revoltariam! Não, ele está apenas blefando. Diga a ele que não vou a lugar nenhum!"
"What? Brain lobes, alchemical gel, and something else? What else?! How can he not know?!

Okay. Okay. Not a problem. You can get me that stuff, right?": "O que? Lóbulos cerebrais, gel alquímico e mais alguma coisa? O que mais?! Como ele pode não saber?!

OK. OK. Não é um problema. Você pode me conseguir essas coisas, certo?"
"What? Cranium dust? Why that imbecile! An elf who doesn't know how to moderate his illicit drug use is an embarrassment to us all!

<i>Sigh...</i>yes, I use it now and again, but I know when to stop! Sorry, sorry... I sound like my father.

There's a cure for the side-effects, but I don't quite remember the formula. It involves mixing brain lobes with willpower gel -- you know, that tawdry alchemical stuff. And there was one other ingredient, but damned if I can remember it. Sorry.": "O que? Poeira de crânio? Por que esse imbecil! Um elfo que não sabe moderar o uso de drogas ilícitas é uma vergonha para todos nós!

<i>Suspiro...</i>sim, eu uso de vez em quando, mas sei quando parar! Desculpe, desculpe... pareço meu pai.

Existe uma cura para os efeitos colaterais, mas não me lembro bem da fórmula. Envolve misturar lobos cerebrais com gel de força de vontade – você sabe, aquela coisa alquímica de mau gosto. E havia outro ingrediente, mas dane-se se consigo me lembrar dele. Desculpe."
"What? Did Irkima put you up to this? Look, I don't want to mate with Irkima. I am busy wooing a Red Wing general and do not need to add further complexity to my relationships! I simply need him to pick a different mate than Tavilak. She is a good worker and a dangerous warrior, but she is not a good mate for Irkima. Tell him that I will be happy to find a nice willing mate for him... one that doesn't kill their partners!": "O que? Irkima induziu você a fazer isso? Olha, eu não quero acasalar com Irkima. Estou ocupado cortejando um general da Asa Vermelha e não preciso adicionar mais complexidade aos meus relacionamentos! Eu simplesmente preciso que ele escolha um companheiro diferente de Tavilak. Ela é uma boa trabalhadora e uma guerreira perigosa, mas não é uma boa companheira para Irkima. Diga a ele que ficarei feliz em encontrar uma companheira boa e disposta para ele... uma que não mate seus parceiros!"
"What? Me?! I had nothing to do with it! Almost certainly nothing! Okay, look. I feel bad about it, but I had no choice": "an Onkara trooper came in here and demanded a key to her shop. He was huge and terrifying, and I figured he was just stealing magical secrets, so I let him in. The very next evening, Sona was attacked by bandits."
"What? Not ready? It's been weeks! Cheese-making is so stupid.

I just wanted the Velten Blue because it was my wife's favorite, and tomorrow would have been our anniversary. I don't even like it!

You know what? Go tell him to cancel the order. No, no, don't do that. I already paid for the stuff. I'll just give it away when it finally arrives.

Thank-you. Here's a few coin for your trouble.": "O que? Não está pronto? Já se passaram semanas! Fazer queijo é tão estúpido.

Eu só queria o Velten Blue porque era o favorito da minha esposa e amanhã seria nosso aniversário. Eu nem gosto disso!

Você sabe o que? Vá dizer a ele para cancelar o pedido. Não, não, não faça isso. Já paguei pelas coisas. Vou doá-lo quando finalmente chegar.

Obrigado. Aqui estão algumas moedas pelo seu trabalho."
"What? Of course I'll make it worthwhile, buddy": "if you kill a thousand ratkin I'll give you 10 pieces of xedrite. Totally worth your time, right?\": \"Desisto. Estou sem ideias."
"What? Oh. Yes. I ordered this ring from that shopkeeper in Serbule. But that was weeks ago! I suppose I still want it. Thank you.": "O que? Oh. Sim. Encomendei este anel àquele lojista em Serbule. Mas isso foi há semanas! Acho que ainda quero isso. Obrigado."
"What? Shirogin sent you? Hahaha! This is <i>exactly</i> why he wasn't invited! He skulks! He has others do his dirty work. He connives. He worries. He pleads.

Shirogin is something between a master schemer and a desperate fawning kitten. And I say that as Shirogin's closest friend!

Tell him what I told you. There was an incident at a previous execution which got him banned... he'll know which one.

Tell him that I care for him, and that as his friend, I am telling him that he needs to drop this.": "O que? Shirogin enviou você? Hahaha! Foi <i>exatamente</i> por isso que ele não foi convidado! Ele se esquiva! Ele faz com que outros façam seu trabalho sujo. Ele é conivente. Ele se preocupa. Ele implora.

Shirogin é algo entre um mestre conspirador e um gatinho bajulador desesperado. E digo isso como o melhor amigo de Shirogin!

Diga a ele o que eu lhe contei. Houve um incidente em uma execução anterior que o baniu... ele saberá qual.

Diga a ele que me importo com ele e que, como amigo dele, estou dizendo que ele precisa parar com isso."
"What? Steven sent you? Steven is dead! Oh. You mean the priest. Yes, I know what you're referring to.

<i>[Fransesca scrutinizes you for a moment.]</i> Okay. You're clear. Tell him \"fizzlebump\". That's the secret code that means you're clear.": "O que? Steven enviou você? Steven está morto! Oh. Você quer dizer o padre. Sim, eu sei a que você está se referindo.

<i>[Fransesca examina você por um momento.]</i> Ok. Você está claro. Diga a ele \"fizzlebump\". Esse é o código secreto que significa que você está limpo."
"When humans domesticated the wolf, they made dogs. When orcs domesticated the wolf, they made worgs. Orcs win this one. When hungry enough, packs of feral worgs are known to kill entire caravans.\": \"<b>Caça": "Worgs</b>"
"When I beseeched Talerra, she told me what I'd somehow known all along: my Lydia didn't fade into blessed nothing. The thing that killed her captured her soul and keeps it as a trinket.

I'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.": "Quando implorei a Talerra, ela me contou o que eu de alguma forma sempre soube: minha Lydia não se transformou em nada abençoado. A coisa que a matou capturou sua alma e a mantém como uma bugiganga.

Não posso salvá-la: ela está naquele maldito reino das fadas, mas não é acessível pelo portal que conheço. Deve haver alguma outra maneira de entrar. Se você encontrar o caminho, mate todos os demônios que puder! Procure por uma cobra flutuante chamada Despair Puck. Terá a alma de Lydia."
"When I first left camp, I wandered a bit before settling here. I stumbled upon a dwarven man near the swamp to the north, but we lacked communication because he did not speak Orcish... or perhaps he did, and simply did not want to chat. Regardless, dwarves are often clever inventors, so would you inquire about a collaboration between us?": "Quando saí do acampamento, vaguei um pouco antes de me estabelecer aqui. Eu tropecei em um anão perto do pântano ao norte, mas não tínhamos comunicação porque ele não falava Orc... ou talvez falasse, e simplesmente não queria conversar. Independentemente disso, os anões costumam ser inventores inteligentes, então você poderia perguntar sobre uma colaboração entre nós?"
"When I first saw you, I thought you were only a worthless fleshbag. But now I see that you're truly a RUTHLESS KILLER. Hahahaha!": "Quando te vi pela primeira vez, pensei que você fosse apenas um saco de carne inútil. Mas agora vejo que você é realmente um ASSASSINO RUTHLESS. Hahahaha!"
"When I left the mining camp, I did so in a hurry. Rock-Wrecker and I got into... let's just say, we did not see eye-to-eye. At any rate, I left behind some valuable notes on a new mining device I was working on. I would hate for them to pick up the design where I left off, and use it for their nefarious goals. If you happen upon their camp, could you retrieve my notes while you're there? I wouldn't be surprised if Rock-Wrecker seized them for himself already.": "Quando saí do campo de mineração, saí com pressa. Rock-Wrecker e eu entramos em... digamos apenas, não concordamos. De qualquer forma, deixei algumas notas valiosas sobre um novo dispositivo de mineração em que estava trabalhando. Eu odiaria que eles continuassem o design de onde parei e o usassem para seus objetivos nefastos. Se você encontrar o acampamento deles, poderia recuperar minhas anotações enquanto estiver lá? Eu não ficaria surpreso se Rock-Wrecker já os tivesse tomado para si."
"When I was an active general, I was given a gift by a visiting dwarven emissary. It's a mechanical back-scratching arm. It was my prized possession for years, until it broke.

Ufkar says it's not really broken, though, just out of magic. I need something called an 'N Core'. Two of them, actually. I've heard of adventurers finding them in the desert. Usually in those ruins from the war.": "Quando eu era um general ativo, ganhei um presente de um emissário anão visitante. É um braço mecânico que coça as costas. Foi meu bem precioso durante anos, até que quebrou.

Ufkar diz que não está realmente quebrado, apenas por magia. Eu preciso de algo chamado 'N Core'. Dois deles, na verdade. Já ouvi falar de aventureiros que os encontraram no deserto. Geralmente naquelas ruínas da guerra."
"When I was the chef for Lord Eltibule, he let me import all kinds of exotic spices! One that I used to love was muntok pepper. Hard to find it if you're not an orc, or insanely rich! But it makes the best spicy soups.": "Quando eu era chef de Lord Eltibule, ele me deixou importar todos os tipos de temperos exóticos! Uma que eu adorava era pimenta muntok. Difícil encontrá-lo se você não for um orc ou incrivelmente rico! Mas faz as melhores sopas picantes."
"When night happens, vicious Blinding Wasps come out. Sends the bees into hiding. Bees prefer sunlight anyway, but if there weren't so many wasps, I think they'd spend another hour or so working each day.

So anyway, I need you to kill wasps, and you can take your pick of reasons: for safety, or just to help me make more honey.": "Quando a noite chega, vespas cegantes aparecem. Faz com que as abelhas se escondam. De qualquer forma, as abelhas preferem a luz solar, mas se não houvesse tantas vespas, acho que elas passariam mais ou menos uma hora trabalhando todos os dias.

De qualquer forma, preciso que você mate vespas, e você pode escolher entre os motivos: por segurança ou apenas para me ajudar a fazer mais mel."
"When the Council was planning out the new town that never happened here, they built a model home to try to attract settlers. It's just past that hill over there.

So here's the thing: Sarina used to live there, alone, until goblins kidnapped her in the basement one day. She says she's never going anywhere near there again. But her clothes are there, and she's stretching out all my blouses! Can you go find her stuff?": "Quando o Conselho estava planejando a nova cidade que nunca aconteceu aqui, eles construíram uma casa modelo para tentar atrair colonos. É logo depois daquela colina ali.

Então é o seguinte: Sarina morava lá, sozinha, até que um dia goblins a sequestraram no porão. Ela diz que nunca mais vai chegar perto de lá. Mas as roupas dela estão lá, e ela está esticando todas as minhas blusas! Você pode encontrar as coisas dela?"
"When the ranalon ran my cart off the road, I just fled in a panic. I should have grabbed my papers! I'm kicking myself for leaving them behind. Those books are key to my business!

I'm sure the ranalon have stolen all the valuable stuff from my cart, but the books don't look valuable. Could you go look for them?

Follow the road south until you reach a crossroads, then head east into Ranalon territory. The road will go along a strip of land separating two lakes. My cart was run off the road right near there! It rolled down toward the southern lake. It didn't go into the water, though, so maybe my papers are still intact! You've gotta check. Please?": "Quando o ranalon tirou meu carrinho da estrada, fugi em pânico. Eu deveria ter pegado meus papéis! Estou me culpando por deixá-los para trás. Esses livros são fundamentais para o meu negócio!

Tenho certeza de que os Ranalon roubaram todas as coisas valiosas do meu carrinho, mas os livros não parecem valiosos. Você poderia ir procurá-los?

Siga a estrada para o sul até chegar a uma encruzilhada e depois siga para o leste até o território de Ranalon. A estrada passará por uma faixa de terra que separa dois lagos. Meu carrinho saiu da estrada ali perto! Ele rolou em direção ao lago ao sul. Porém, ele não caiu na água, então talvez meus papéis ainda estejam intactos! Você tem que verificar. Por favor?"
"When the town was healthier, we used to put prettied-up mushrooms on the tree. Fly amanita grows everywhere around here, so that's not a problem. But I don't know how to make the dye! We need a nice tomato red dye to cover the stems.": "Quando a cidade era mais saudável, costumávamos colocar cogumelos enfeitados na árvore. Fly amanita cresce em todos os lugares por aqui, então isso não é um problema. Mas não sei fazer a tintura! Precisamos de um bom corante vermelho tomate para cobrir os caules."
"When we reanimate a creature through Paleontology, we can't control it. Most of my associates are skilled at aggression deterrance, so there aren't too many accidents. But I have to admit the number of skeletal beasts in the area is becoming somewhat ... problematic. Hey, maybe you could clean some of them up for us? Start with the lanky ones. They're comparatively docile.": "Quando reanimarmos uma criatura através da Paleontologia, não podemos controlá-la. A maioria dos meus associados é hábil em dissuadir agressões, então não há muitos acidentes. Mas tenho que admitir que o número de feras esqueléticas na área está se tornando um tanto... problemático. Ei, talvez você possa limpar alguns deles para nós? Comece com os esguios. Eles são comparativamente dóceis."
"When we were checking altitude measurements the other day, we found some very unusual creatures on top of the mountains. They're like slimes, but ice cold! A few fiery crossbow bolts can take 'em out. There's something inside, though... a sort of gunk. I'm thinking it might help make a nice kind of crossbow bolt. If you run across any ice slimes out there, check 'em for sludge!": "Outro dia, quando estávamos verificando as medições de altitude, encontramos algumas criaturas muito incomuns no topo das montanhas. Eles são como limos, mas gelados! Algumas flechas de besta podem eliminá-los. Porém, há algo dentro... uma espécie de gosma. Estou pensando que pode ajudar a fazer um belo tipo de seta de besta. Se você encontrar alguma gosma de gelo por aí, verifique se há lama!"
"When will my cavefish supper be ready? Don't tell me you're catching the cavefish now!": "Quando meu jantar de cavefish estará pronto? Não me diga que você está pegando o peixe-caverna agora!"
"When you finally corner one of the professors at Tennenbrandt and get them to actually give you a lesson, they teach FAST. It fells like they're shoving knowledge at you faster than you can process it! But you know what helps? Pineal juice. Illegal here, of course. So I know you wouldn't have any on you. That's a shame because I have a pretty rough day of lessons coming up.": "Quando você finalmente encurrala um dos professores da Tennenbrandt e faz com que ele realmente lhe dê uma aula, eles ensinam RÁPIDO. Parece que eles estão empurrando conhecimento para você mais rápido do que você consegue processá-lo! Mas você sabe o que ajuda? Suco de pineal. Ilegal aqui, é claro. Então eu sei que você não teria nenhum com você. É uma pena porque tenho um dia muito difícil de aulas chegando."
"When you first awoke on an island, you met an elf named Riger who seemed depressed and asked for something to cure his depression. Unfortunately, he wasn't clear about what that might be.": "Quando você acordou em uma ilha, conheceu um elfo chamado Riger que parecia deprimido e pediu algo para curar sua depressão. Infelizmente, ele não estava claro sobre o que poderia ser."
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but most of them aren't recognizable. One of the last images is clearer: it's a pile of rubies. Apparently you can insert rubies into this thing. But there aren't likely to be rubies in this cave...": "Ao tocar neste dispositivo frio, você vê uma enxurrada de imagens visuais confusas. Depois de pensar por um momento, você acredita que está sem combustível. Mostrou muitos tipos de combustível que poderiam ser usados, mas a maioria deles não é reconhecível. Uma das últimas imagens é mais clara: é uma pilha de rubis. Aparentemente você pode inserir rubis nesta coisa. Mas não é provável que haja rubis nesta caverna..."
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but most of them aren't recognizable. One of the last images seems less weird than the others, though: a glowy spike, taken from a creature. Apparently you could just stick several of them into this hollow spot...": "Ao tocar neste dispositivo frio, você vê uma enxurrada de imagens visuais confusas. Depois de pensar por um momento, você acredita que está sem combustível. Mostrou muitos tipos de combustível que poderiam ser usados, mas a maioria deles não é reconhecível. Uma das últimas imagens parece menos estranha que as outras: uma ponta brilhante, tirada de uma criatura. Aparentemente você poderia simplesmente enfiar vários deles neste lugar vazio..."
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but the only fuel you recognized was the last one: the glowing eyes of gricklings. Apparently you could just stick them into this hollow here...": "Ao tocar neste dispositivo frio, você vê uma enxurrada de imagens visuais confusas. Depois de pensar por um momento, você acredita que está sem combustível. Mostrava muitos tipos de combustível que poderiam ser usados, mas o único combustível que você reconhecia era o último: os olhos brilhantes dos grilos. Aparentemente você poderia simplesmente enfiá-los neste buraco aqui..."
"Whenever a streetlight stays broken for too long, a miserable myconian vagabond sprouts up. They attack anyone who gets too near, making them dangerous. These varieties are not intelligent enough to communicate with, so they must be removed! Safely!

<i>[Progress is lost if you die.]</i>": "Sempre que um poste de luz fica quebrado por muito tempo, surge um miserável vagabundo miconiano. Eles atacam qualquer um que se aproxime, tornando-os perigosos. Essas variedades não são inteligentes o suficiente para se comunicarem, então devem ser removidas! Com segurança!

<i>[O progresso será perdido se você morrer.]</i>"
"Where are my porcini bites? Remember, I ordered two!": "Onde estão minhas mordidas de porcini? Lembre-se, eu pedi dois!"
"Where Are the Police?!": "Onde está a polícia?!"
"Where is my orcish onion soup?": "Onde está minha sopa de cebola orc?"
"Where is my ruktagh?!": "Onde está meu ruktagh?!"
"Where is my shroom feast? I'm starving!": "Onde está meu banquete de cogumelos? Estou morrendo de fome!"
"Where the heck were you all this time?! No matter. How are your vexfish lettuce wraps? Fresh, I hope? I'll take that! And please make it snappy. I'm famished from waiting!": "Onde diabos você estava esse tempo todo?! Não importa. Como estão seus wraps de alface vexfish? Fresco, espero? Eu aceito isso! E, por favor, seja rápido. Estou faminto de tanto esperar!"
"Where the hell did you even find a hippo, let alone learn how to skin one? And perfectly?! You're way too good at this.": "Onde diabos você encontrou um hipopótamo, e muito menos aprendeu a esfolar um? E perfeitamente?! Você é muito bom nisso."
"Where'd you... 

<i>[Denton breaks into a grin.]</i>

The fucker remembered my birthday. Tell him he owes me a duel, and that I'm still waiting.

But tell him I won't wait forever. He'll know what I mean.": "Onde você... 

<i>[Denton abre um sorriso.]</i>

O filho da puta se lembrou do meu aniversário. Diga a ele que ele me deve um duelo e que ainda estou esperando.

Mas diga a ele que não vou esperar para sempre. Ele saberá o que quero dizer."
"Where's my deluxe beetle skewer?": "Onde está meu espeto de besouro de luxo?"
"Where's my grilled amberjack? And can I get a refill on my water?": "Onde está meu âmbar grelhado? E posso reabastecer minha água?"
"Where... How... Nevermind! These are priceless, thank you!

Wait, did I say priceless? I meant they're worth exactly 2500 Councils. But I'll give you double that because you're a friend.": "Onde... Como... Deixa pra lá! Isso não tem preço, obrigado!

Espere, eu disse inestimável? Eu quis dizer que valem exatamente 2.500 Conselhos. Mas vou te dar o dobro porque você é um amigo."
"Whew. Gross! Yeah, these strawberries are rotten enough. I'll get them into the brew right away, thanks. Here's some coins to cover any expenses, or whatever.

And here's some hops. Don't lose these! They're hard to come by. You need them for brewing beer.": "Ufa. Bruto! Sim, esses morangos estão bastante podres. Vou colocá-los na bebida imediatamente, obrigado. Aqui estão algumas moedas para cobrir quaisquer despesas, ou algo assim.

E aqui estão alguns lúpulos. Não perca isso! Eles são difíceis de encontrar. Você precisa deles para fazer cerveja."
"Which is to say that he would NOT be pleased if he saw any graffiti. And his last assistant was banished to the fairy tree. Eugh.\": \"Obrigado por manter as ruas limpas. Eu sei que parece sem importância agora, mas não é. Lembro-me de uma coisa que o vereador Pláudio me disse": "se a cidade estiver uma merda, as pessoas vão tratá-la como uma merda."
"While a pedestrian symbol to some, the Cutlery symbol is a symbol of high honor to others. You long to bring the necessary gravitas to the task: you yourself must become a gourmand.": "Embora seja um símbolo pedestre para alguns, o símbolo dos talheres é um símbolo de grande honra para outros. Você deseja trazer a seriedade necessária para a tarefa: você mesmo deve se tornar um gourmet."
"While angling in a lake in northeast Povus, you encountered a voice that asked you to remove some of the aggressive frogs from the lake. These frogs can be caught with angling at dusk, and a little while after. (7pm-8pm)": "Enquanto pescava em um lago no nordeste de Povus, você encontrou uma voz que lhe pedia para remover alguns dos sapos agressivos do lago. Essas rãs podem ser capturadas com pesca ao entardecer e um pouco depois. (19h-20h)"
"While angling in Povus near orcish land, a strange voice asked you to help kill Old Dreadtooth. Apparently it's a pretty big fish, and it only comes out at midnight.": "Enquanto pescava em Povus, perto da terra dos orcs, uma voz estranha pediu para você ajudar a matar o Velho Dreadtooth. Aparentemente é um peixe bem grande e só sai à meia-noite."
"While angling in the ocean in Kur, a strange voice asked you for help. It wanted you to angle frozen posion jars out of the sea.": "Enquanto pescava no oceano em Kur, uma voz estranha pediu ajuda. Ele queria que você retirasse potes congelados do mar."
"While angling near the town of Povus, a mysterious voice contacted you and asked for your help. Apparently \"ghost bass\" are causing havoc among the local fish and need to be removed. They can only be caught at night.": "Enquanto pescava perto da cidade de Povus, uma voz misteriosa entrou em contato com você e pediu sua ajuda. Aparentemente, os \"robalos fantasmas\" estão causando estragos entre os peixes locais e precisam ser removidos. Eles só podem ser capturados à noite."
"While I am still... more powerful than you could ever dream to be, I... have been robbed of much of my... power. But do not worry. You shall help me recover.

Not too long ago I had a thrall hide supplies in an abandoned keep in Eltibule. Find a way into the walls and find a rune of Tuvillus.
Defeat the primitive guardian and... bring me the ointment it guards. Hurry.": "Embora eu ainda seja... mais poderoso do que você jamais poderia sonhar ser, eu... fui roubado de grande parte do meu... poder. Mas não se preocupe. Você deve me ajudar a recuperar.

Não muito tempo atrás, um servo escondeu suprimentos em uma fortaleza abandonada em Eltibule. Encontre um caminho para as paredes e encontre uma runa de Tuvillus.
Derrote o guardião primitivo e... traga-me o unguento que ele protege. Pressa."
"While I was exploring Foothills Cave, I uncovered mummies. I think orcs buried an army of mummies in there after a war and forgot about them. Well, you know how we dwarves feel about mummies! So I killed a few, but there were so many other nasty undead in that cave that I had to retreat. Can you go back in there and get rid of a bunch?": "Enquanto explorava a Caverna Foothills, descobri múmias. Acho que os orcs enterraram um exército de múmias lá depois de uma guerra e se esqueceram delas. Bem, você sabe como nós, anões, nos sentimos em relação às múmias! Então matei alguns, mas havia tantos outros mortos-vivos desagradáveis ​​naquela caverna que tive que recuar. Você pode voltar lá e se livrar de um monte?"
"While not as deadly as some spiders, they are still quite deadly. They seek warmth at night and are a terror to find in campsites.\": \"<b>Caça": "Aranhas Venenosas</b>"
"While the goblins sent to patrol the roads here are not nearly as dangerous as the ones in Sedgewick Forest, they are still very deadly. If trade is ever to return to normal, their blockade must be destroyed.\": \"<b>Caça": "Goblins</b>"
"While you were angling at Bonnie's Hot Spring in the Ilmari desert, a psychic slug asked you to catch a particularly cruel Dorado. It only comes out at night.": "Enquanto você estava pescando em Bonnie's Hot Spring, no deserto de Ilmari, uma lesma psíquica pediu para você pegar um Dorado particularmente cruel. Só sai à noite."
"While you were angling on the docks in Rahu, a psychic creature asked you to help remove a toxic type of seaweed that is choking nearby sea life.": "Enquanto você pescava nas docas de Rahu, uma criatura psíquica pediu que você ajudasse a remover um tipo tóxico de alga marinha que está sufocando a vida marinha próxima."
"While you were angling on the north end of Sun Vale's main island, a strange voice begged you to remove some of the starfish feeding on the local fish egg population.": "Enquanto você pescava no extremo norte da ilha principal de Sun Vale, uma voz estranha implorou que você removesse algumas estrelas do mar que se alimentavam da população local de ovos de peixes."
"While you were taking your time finding the dye I needed, I completed a test-run of General Tremal's gown. It's perfect! Except for the color. So now I need to make another gown in aquamarine... and I've run out of the secret ingredient needed for its protective elements: cockatrice beaks. Can you buy some, or murder some cockatrices and de-beak them? Thank you. Go do it now. This is important!": "Enquanto você procurava a tinta que eu precisava, fiz um teste do vestido do General Tremal. É perfeito! Exceto pela cor. Então agora preciso fazer outro vestido em água-marinha... e fiquei sem o ingrediente secreto necessário para seus elementos protetores: bicos de cocatriz. Você pode comprar alguns ou matar alguns cockatrices e tirar-lhes o bico? Obrigado. Vá fazer isso agora. Isto é importante!"
"While you're invading, would you mind exterminating those pesky birds on the main deck? Lieutenant Frostglimmer insists they're trained alarm birds that will prevent intruders from sneaking around. But they make so much noise that most of us just ignore them...": "Enquanto você está invadindo, você se importaria de exterminar aqueles pássaros irritantes no convés principal? O Tenente Frostglimmer insiste que eles são pássaros de alarme treinados que impedirão que intrusos se esgueirem. Mas eles fazem tanto barulho que a maioria de nós simplesmente os ignora..."
"WhittlingKnife5": "Talhar Faca5"
"Who? Charles Thompson? Never heard of him. But yes, I know what those giant mushrooms are for: they're psychic antennae for the Myconians! They use those mushrooms as beacons to control the thoughts of weak-willed people.

No, I don't have proof. Fuck your proof, just open your ears! You stay around those mushrooms long enough and you'll hear the voices, too!

Oh, and tell him not to eat the giant mushrooms. They're not only poisonous, they're also as hard as stone. Not a fun way to spend a weekend.": "Quem? Carlos Thompson? Nunca ouvi falar dele. Mas sim, eu sei para que servem esses cogumelos gigantes: eles são antenas psíquicas para os Myconianos! Eles usam esses cogumelos como faróis para controlar os pensamentos de pessoas de vontade fraca.

Não, não tenho provas. Foda-se a sua prova, basta abrir os ouvidos! Se você ficar perto desses cogumelos por tempo suficiente, também ouvirá as vozes!

Ah, e diga a ele para não comer os cogumelos gigantes. Eles não são apenas venenosos, mas também duros como pedra. Não é uma maneira divertida de passar um fim de semana."
"Who? Oh, that old bat... well, she can have the ugly red ornaments. Sorry, but all the pretty ones are needed here! I'll have Sir Coth bring them down.": "Quem? Ah, aquela velha morcego... bem, ela pode ficar com os feios enfeites vermelhos. Desculpe, mas todos os bonitos são necessários aqui! Mandarei Sir Coth trazê-los."
"Who? Sona? I don't know a Sona. ... ohhh, THAT Sona. The teenage rakshasa with all the customers. Very sad. She was a good tenant.

What? Me?! I had nothing to do with it! Almost certainly nothing! Okay, look. I feel bad about it, but I had no choice: an Onkara trooper came in here and demanded a key to her shop. He was huge and terrifying, and I figured he was just stealing magical secrets, so I let him in. The very next evening, Sona was attacked by bandits.

Believe me, I didn't want her gone! She was earning me a lot of money in rent, and more importantly, she was making Amulna famous! When she disappeared, her assistants wandered off to become bandits themselves... if I had to guess, one of those two is to blame for the attack! Now excuse me. I have a lot of paperwork to attend to.": "Quem? Sônia? Não conheço nenhuma Sona. ... ahh, ESSA Sona. O rakshasa adolescente com todos os clientes. Muito triste. Ela era uma boa inquilina.

O que? Meu?! Eu não tive nada a ver com isso! Quase certamente nada! Ok, olhe. Sinto-me mal por isso, mas não tive escolha: um soldado Onkara entrou aqui e exigiu a chave da sua loja. Ele era enorme e assustador, e imaginei que ele estava apenas roubando segredos mágicos, então o deixei entrar. Na noite seguinte, Sona foi atacada por bandidos.

Acredite, eu não queria que ela fosse embora! Ela estava me rendendo muito dinheiro com aluguel e, mais importante, estava tornando Amulna famosa! Quando ela desapareceu, seus assistentes se afastaram e se tornaram bandidos... se eu tivesse que adivinhar, um desses dois é o culpado pelo ataque! Agora me desculpe. Tenho muita papelada para resolver."
"Whoa, for me? You shouldn't have!": "Uau, para mim? Você não deveria ter feito isso!"
"Why are you shaking my hand? Wait, is that vindaloo I smell on your breath? You're the creepy curry courier from the other day. What are you up to?": "Por que você está apertando minha mão? Espere, é aquele cheiro de vindaloo no seu hálito? Você é o mensageiro de curry assustador do outro dia. O que você está fazendo?"
"Why did you take so long to show up? It's because I said I needed help with snails, isn't it? You aren't taking me seriously! These aren't normal snails, they're huge snails! Bigger than a cow! BIGGER THAN A COW!

An incredible number of snails have hatched and they're ruining everything. They're in the east, they're in the west... at least they aren't in the north, but that's only because the horrible gnashers and uraks can eat them. They're EVERYWHERE ELSE! And guess what snails eat? GRASS! They eat my herd's food! So maybe it's not life or death today, but just you wait! I had to call for help! So get to it, Warden!": "Por que você demorou tanto para aparecer? É porque eu disse que precisava de ajuda com os caracóis, não é? Você não está me levando a sério! Estes não são caracóis normais, são caracóis enormes! Maior que uma vaca! MAIOR QUE UMA VACA!

Um número incrível de caracóis eclodiu e está estragando tudo. Eles estão no leste, estão no oeste... pelo menos não estão no norte, mas isso é apenas porque os horríveis rangers e uraks podem comê-los. Eles estão em todos os lugares! E adivinhe o que os caracóis comem? GRAMA! Eles comem a comida do meu rebanho! Então talvez não seja vida ou morte hoje, mas apenas espere! Tive que pedir ajuda! Então vá em frente, Diretor!"
"Why do people think I'm responsible for investigating thefts? Ugh! But yes, I did report Elune's story to the constabulary. They made a perfunctory investigation and decided it was Denton Razor's gang. And that's the end of that! We don't tangle with Razor's gang if we can help it. She's out of luck.

No no, don't tell Elune that! Tell her we're still investigating and it's an intricate process and time will tell and there are multiple investigative vectors etcetera etcetera. Sheesh.": "Por que as pessoas pensam que sou responsável pela investigação de roubos? Eca! Mas sim, relatei a história de Elune à polícia. Eles fizeram uma investigação superficial e decidiram que era a gangue de Denton Razor. E esse é o fim de tudo! Não nos envolveremos com a gangue de Razor se pudermos evitar. Ela está sem sorte.

Não, não, não diga isso a Eluna! Diga a ela que ainda estamos investigando e que é um processo complexo e o tempo dirá e que existem vários vetores investigativos, etc., etc. Nossa."
"Why don't we start with some target practice. When hitting multiple enemies, the ideal number to hit is three. But sometimes it's necessary to hit more. Try different densities and study the difference.

There's a metal dodecahedron outside. Stand in it and say 'Ossugazak 1'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>": "Por que não começamos com alguma prática de tiro ao alvo? Ao acertar vários inimigos, o número ideal para acertar é três. Mas às vezes é necessário bater mais. Experimente densidades diferentes e estude a diferença.

Há um dodecaedro de metal lá fora. Fique nele e diga 'Ossugazak 1'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>"
"Why don't you assassinate the ranalon that are off duty? They'll be in the lounge and resting areas. And they definitely won't be expecting you!": "Por que você não assassina os Ranalon que estão de folga? Eles estarão nas áreas de estar e descanso. E eles definitivamente não estarão esperando por você!"
"Why don't you go grow some vegetables for me? Yes. Grow a dozen fresh vegetables. How bored am I? I'm bored enough to watch plants grow -- THAT'S how bored!": "Por que você não vai cultivar alguns vegetais para mim? Sim. Cultive uma dúzia de vegetais frescos. Quão entediado estou? Estou entediado o suficiente para ver as plantas crescerem - ISSO é tão entediado!"
"Why don't you simply get me 100 or so and I'll just pick the best one from the batch.\\\"\": \"Elune, em Statehelm, disse": "\\\"Claro, não há chance de eu ver minha obra-prima mais recente novamente. O ladrão sem dúvida valorizou aquela acima de todas as outras bugigangas em minha loja e nunca teria se desfeito dela. Bem, eu não deveria perder as esperanças; talvez ela apareça no mercado em alguns anos."
"Why don't you speak with this Denton Razor fellow yourself? He's supposed to live in the hills of Vidaria. Just get him to give my jewelry back.": "Por que você mesmo não fala com esse Denton Razor? Ele deveria viver nas colinas de Vidaria. Apenas peça para ele devolver minhas joias."
"Why don't you try? See if she'll tell you anything.\\\"\": \"Tremmond Blackhammer em Povus disse": "“Os orcs têm técnicas de armadura especiais que nem eu conheço... e eu mereço conhecê-las!"
"Why Violet Glass?": "Por que Vidro Violeta?"
"Why, thank you! And still pulsing. It's perfect. Here. Have some fire dust, it will help you in your studies.": "Ora, obrigado! E ainda pulsando. É perfeito. Aqui. Tenha um pouco de pó de fogo, vai te ajudar nos estudos."
"Why, thank you. That's fruit cocktail all right! And I guess I <i>did</i> say I didn't care what kind of fruit cocktail, didn't I? Me and my big mouth. Oh well, a favor's a favor! Here. This is for you.": "Ora, obrigado. Isso é coquetel de frutas, certo! E acho que <i>disse</i> que não me importava com o tipo de coquetel de frutas, não é? Eu e minha boca grande. Bem, um favor é um favor! Aqui. Isto é para você."
"WhyVioletGlass?": "Por queVioletGlass?"
"WildChicken": "Frango Selvagem"
"WildPig": "Porco Selvagem"
"Will you do me a favor? I want to try out some mortal recipes I've learned. To master them, I figured I'll need about two thousand potatoes. I can't do that all myself! So I'm asking everyone I see to bring me a few potatoes. Can you bring me a handful?": "Você poderia me fazer um favor? Quero experimentar algumas receitas mortais que aprendi. Para dominá-los, imaginei que precisaria de cerca de duas mil batatas. Eu não posso fazer tudo isso sozinho! Então peço a todos que vejo que me tragam algumas batatas. Você pode me trazer um punhado?"
"Willbreaker1": "Quebra-vontade1"
"Willem Fangblade in Red Wing Casino said, \"Do ya know what 'cheshire' is? It's a kinda cheese. Look, I can't explain why, but it's important that I find some. I need ta appear cultured.\"": "Willem Fangblade, do Red Wing Casino, disse: \"Você sabe o que é 'cheshire'? É um tipo de queijo. Olha, não posso explicar por quê, mas é importante que eu encontre alguns. Preciso parecer culto.\""
"Willem Fangblade in Red Wing Casino said, \"I need more sulfur for my gem-cleaning solution, but for some reason sulfur is very rare around here, which makes no sense. None at all. Anyway if you find some, bring it here!\"": "Willem Fangblade, do Red Wing Casino, disse: \"Preciso de mais enxofre para minha solução de limpeza de gemas, mas por alguma razão o enxofre é muito raro por aqui, o que não faz sentido. Nenhum. De qualquer forma, se você encontrar algum, traga-o aqui!\""
"Willem Fangblade in Red Wing Casino said, \"I'm sorry to say this, but the last cheese didn't work out either. But this time I know exactly what's needed. I called in some expert help! I need a 'brunost' cheese, it's the best for the cheap wine I've been usin'. Guaranteed ta work this time. I fuckin' hope.\"": "Willem Fangblade, do Red Wing Casino, disse: \"Lamento dizer isso, mas o último queijo também não deu certo. Mas desta vez sei exatamente o que é necessário. Liguei para a ajuda de um especialista! Preciso de um queijo 'brunost', é o melhor para o vinho barato que estou usando. Garantido que funcionará desta vez. Espero, porra.\""
"Willem Fangblade in Red Wing Casino said, \"So that last cheese, the 'cheshire', turned out to be slightly too bitter, so it doesn't go well with wine. Look, I don't fuckin' know, it's all just cheese ta me. But I need a different one. A 'gloucester'. It's supposed to be better, accordin' to my cousin that runs a stall down the hall. Ya got any of that?\"": "Willem Fangblade, do Red Wing Casino, disse: \"Então aquele último queijo, o 'cheshire', acabou sendo um pouco amargo demais, então não combina bem com vinho. Olha, não sei, é tudo só queijo para mim. Mas preciso de um diferente. Um 'gloucester'. É suposto ser melhor, de acordo com meu primo que dirige uma barraca no fim do corredor. Você tem alguma dessas?\""
"Willpower Gels": "Géis de Força de Vontade"
"WillpowerGel": "Força de vontadeGel"
"Win Monsters and Mantids": "Ganhe monstros e louva-a-deus"
"Windbiter": "Corta-vento"
"Windbiter!": "Corta-vento!"
"WindHeart": "Vento Coração"
"Winston Veilmoor in Statehelm said, \"Now, I won't be doing the enchantment on these upcoming promotional swords. We have quite a specialist for that task! But I do need to provide special foci. These will be worked into the weapon to strengthen and shape the magic in the weapon. I'm afraid I can accept no substitutes!\"": "Winston Veilmoor em Statehelm disse: \"Agora, não farei o encantamento nessas próximas espadas promocionais. Temos um grande especialista para essa tarefa! Mas preciso fornecer focos especiais. Eles serão trabalhados na arma para fortalecer e moldar a magia da arma. Receio não poder aceitar substitutos!\""
"Winston Veilmoor in Statehelm said, \"Oh, are you for hire? Great! I need special metal for my next promotional sword. I spent quite a bit to learn where to find it. I may have ordered the information from... overseas. And you know how it is with information from... overseas: always with the mysterious language! But I'm hoping you can figure it out!

\\t\"Within a mushroom tall as hills
\\tsomething something, wise preying mantises...
\\tsomething something minimum mining level of 50.\"

I should have written it down, but that's what I remember. Hope it helps.\"": "Winston Veilmoor em Statehelm disse: \"Oh, você está contratado? Ótimo! Preciso de metal especial para minha próxima espada promocional. Gastei um pouco para saber onde encontrá-la. Posso ter encomendado as informações de... do exterior. E você sabe como são as informações do... exterior: sempre com a linguagem misteriosa! Mas espero que você consiga descobrir!

\\t\"Dentro de um cogumelo alto como colinas
\\talguma coisa, louva-a-deus sábios...
\\tsomething algo com nível mínimo de mineração de 50.\"

Eu deveria ter anotado, mas é disso que me lembro. Espero que ajude.\""
"Winston Veilmoor in Statehelm said, \"The rhino hide's miscoloration has thrown everything off kilter aesthetically! I need an entirely new accent color. And a different pommel crystal! Since you're basically responsible for this mess, can you help fix it? Don't worry. I'll pay.\"": "Winston Veilmoor em Statehelm disse: \"A descoloração da pele de rinoceronte desequilibrou tudo esteticamente! Preciso de uma cor de destaque totalmente nova. E um cristal com alça diferente! Já que você é basicamente responsável por essa bagunça, pode ajudar a consertar isso? Não se preocupe. Eu pagarei. \""
"WinstonVeilmoor2": "Winston Veilmoor2"
"WinstonVeilmoor3": "Winston Veilmoor3"
"Winter Court scouts think the town is weak, and they're attacking! They've invaded every neighborhood! Do something before they freeze and/or burn the place down!

