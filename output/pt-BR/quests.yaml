"Take some replacement bulbs and fix broken lamps tonight. I'll reimburse you for the lamps.\\\"\": \"Sor Hackley em Statehelm disse": "\\\"Substituímos todas as lâmpadas a óleo por um moderno sistema de aquecimento de cristal que liga sozinho à noite e desliga pela manhã. Uma verdadeira maravilha da inovação! Exceto que os anões já os têm há séculos, mas não vamos lá. De qualquer forma, o design é muito novo e ainda estamos resolvendo os problemas. Bem, éramos antes dos demônios aparecerem. No momento, estamos apenas tentando manter as coisas funcionando da melhor maneira que podemos. Perdemos lâmpadas a cada noite!"
"Take these hops and don't lose 'em. You need hops for brewing beer, and they're not so easy to come by.\": \"Obrigado. Agora não tente me copiar": "minha cerveja de boleto e maçã é única. Sua cerveja ficará diferente, mesmo com os mesmos ingredientes!"
"Take this journal, and keep as detailed notes in it as you can. Get in close with Korbok, see if there's any more poison-related missions he can send you on, and just try to gather more info in general. While I do find him and his kind fascinating, I cannot let that get in the way of my primary assignment.\\\"\": \"Pitre Ferrence em Vidaria disse": "\\\"Meu contato alquimista em Statehelm insiste que não há semelhanças nos venenos que Korbok fez você recuperar. O próprio Sr. Farblood até deu uma olhada, sem sucesso. Deve haver algo mais profundo acontecendo aqui."
"Take this to my daughter Laura. She's my oldest and smartest. She lives in Kur, in self-inflicted banishment. Tell her it's time to come home.\\\"\": \"Deville Neth, em Statehelm, disse": "“Esse pequeno plano deu certo! Vendi muito pão e lembrei às pessoas como o pão fresco é bom."
"Tal-Saka is dead?! Oh, that is tragic news. I knew I shouldn't have sent you! Terrible deeds pile upon terrible deeds, and although I did not spill his blood, it is on my hands! <i>[ Sona sighs. ]</i> What's done is done.

You say he had a Rahu trade coin? That could be coincidence... perhaps he found it somewhere in the sand. But most likely it means that the city of Rahu paid him for a service. Perhaps they hired him to explain my stolen research notes.

It would seem the very city of my birth wants me dead. This is the worst outcome I could have imagined! I cannot keep this from Rick anymore. Talk to him, see if he knows what to do next.

<i>[ New Favor for Rick Snapley. ]</i>": "Tal-Saka está morto?! Oh, isso é uma notícia trágica. Eu sabia que não deveria ter enviado você! Ações terríveis se acumulam em ações terríveis e, embora eu não tenha derramado o sangue dele, ele está em minhas mãos! <i>[Sona suspira. ]</i> O que está feito está feito.

Você diz que ele tinha uma moeda comercial de Rahu? Isso pode ser coincidência... talvez ele tenha encontrado em algum lugar na areia. Mas muito provavelmente significa que a cidade de Rahu lhe pagou por um serviço. Talvez o tenham contratado para explicar as minhas notas de pesquisa roubadas.

Parece que a própria cidade onde nasci me quer morto. Este é o pior resultado que eu poderia ter imaginado! Não posso mais esconder isso de Rick. Fale com ele, veja se ele sabe o que fazer a seguir.

<i>[Novo favor para Rick Snapley. ]</i>"
"Tal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.\": \"Pensei no que Urzab lhe contou": "que meus assistentes podem estar envolvidos no atentado contra minha vida. Rick já localizou um deles e ela não sabia de nada. Ele não conseguiu encontrar o outro..."
"Tal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.\\\"\": \"Sona em New Prestonbule disse": "\\\"Pensei no que Urzab lhe disse: que meus assistentes podem estar envolvidos no atentado contra minha vida. Rick já localizou um deles e ela não sabia de nada. Ele não conseguiu encontrar o outro..."
