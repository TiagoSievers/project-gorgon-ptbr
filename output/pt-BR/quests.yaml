"Gunther Ashbrown in Statehelm said, \"Hey, you're the chair-wizard. You made that chair for me a while back, right? Well, I could really use your help this time. Here, look a this. See? Yeah. This is a quality chair. Far beyond my skill, I'll admit. And it needs to be made to these exact measurements.

I'm not saying you owe me anything. I'm just saying, since you obviously like making chairs so much...\"": "Gunther Ashbrown em Statehelm disse: \"Ei, você é o feiticeiro da cadeira. Você fez aquela cadeira para mim há um tempo, certo? Bem, eu realmente gostaria de sua ajuda desta vez. Aqui, olhe isto. Viu? Sim. Esta é uma cadeira de qualidade. Muito além da minha habilidade, admito. E precisa ser feita com essas medidas exatas.

Não estou dizendo que você me deve alguma coisa. Só estou dizendo que você obviamente gosta tanto de fazer cadeiras..."
"Gunther Ashbrown in Statehelm said, \"I'm supposed to be making a custom chair for someone, but damned if I can manage to get it to come out right. Are you good with wood? Here's the specifications. See? Slightly too tall and slightly too short.\"": "Gunther Ashbrown, em Statehelm, disse: \"Eu deveria estar fazendo uma cadeira personalizada para alguém, mas dane-se se consigo fazer com que ela saia direito. Você é bom com madeira? Aqui estão as especificações. Viu? Um pouco alto demais e um pouco baixo demais.\""
"Gunther Ashbrown in Statehelm said, \"I've been looking all over for you!

I delivered that last chair and got lots of compliments. And now I've got an incredibly tough order. I can't even get other carpenters in town to make this for me!

You're my best chance. I will give you half -- no, two thirds of the money for the job.\"": "Gunther Ashbrown, em Statehelm, disse: \"Tenho procurado por você por toda parte!

Entreguei aquela última cadeira e recebi muitos elogios. E agora tenho uma ordem incrivelmente difícil. Não consigo nem que outros carpinteiros da cidade façam isso para mim!

Você é minha melhor chance. Eu lhe darei metade – não, dois terços do dinheiro pelo trabalho.”"
