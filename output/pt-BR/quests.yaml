"Brandon Mellus in the Red Wing Casino said, \"Deville got turned into a donkey. And that pretty much ruined his life. He couldn't talk at all for a long time and his parents wouldn't believe me that he was still in there! They decided he was just a donkey and their real son was dead, so they held a funeral for him. He really has no home to go back to now. But he still doesn't want to stay a donkey!

I've tried all kinds of schemes to cure Deville and Rick, but nothing worked. Deville eventually got fed up and left. A few months later, a talking bird stopped by to tell me Deville was living in Animal Town now. I've tried to figure out where that is, and my best guess is an island called \"Sun Vale\". See if you can find him!\"": "Brandon Mellus, do Red Wing Casino, disse: \"Deville se transformou em um burro. E isso praticamente arruinou sua vida. Ele não conseguiu falar por um longo tempo e seus pais não acreditaram que ele ainda estava lá! Eles decidiram que ele era apenas um burro e seu filho verdadeiro estava morto, então eles realizaram um funeral para ele. Ele realmente não tem casa para onde voltar agora. Mas ele ainda não quer continuar sendo um burro!

Tentei todos os tipos de esquemas para curar Deville e Rick, mas nada funcionou. Deville finalmente se cansou e foi embora. Alguns meses depois, um pássaro falante apareceu para me dizer que Deville estava morando em Animal Town agora. Tentei descobrir onde fica, e meu melhor palpite é uma ilha chamada “Sun Vale”. Veja se você consegue encontrá-lo!\""
"Brandon Mellus in the Red Wing Casino said, \"I guess you need to talk to Chaf too. The thing is that Chaf is perfectly fine. Zhia Lian only gave him a single coin when he wished for money, but that's really not a bad outcome when you ask Zhia Lian for a favor! Yet he has never stopped complaining.

Chaf's a gambler, always has been, and very superstitious. He insists that Zhia's coin is cursed. He also drinks a lot, and I'm afraid he's going to show up at the party and make a scene in front of Zhia. And that would be awful. Not just for him: for everyone!

Go talk to him -- he's already arrived at the casino (big shocker). He loves dice games, so look for him there.\"": "Brandon Mellus, do Red Wing Casino, disse: \"Acho que você precisa falar com Chaf também. O problema é que Chaf está perfeitamente bem. Zhia Lian só deu a ele uma única moeda quando ele desejou dinheiro, mas isso não é um resultado ruim quando você pede um favor a Zhia Lian! Mesmo assim, ele nunca parou de reclamar.

Chaf é um jogador, sempre foi, e muito supersticioso. Ele insiste que a moeda de Zhia está amaldiçoada. Ele também bebe muito e temo que apareça na festa e faça cena na frente de Zhia. E isso seria horrível. Não só para ele: para todos!

Vá falar com ele – ele já chegou ao cassino (grande choque). Ele adora jogos de dados, então procure por ele lá.\""
"Brandon Mellus in the Red Wing Casino said, \"I think we need a backup soup in case the eyeball soup doesn't go over well. Can you get these ingredients?\"": "Brandon Mellus, do Red Wing Casino, disse: \"Acho que precisamos de uma sopa reserva, caso a sopa do globo ocular não corra bem. Você consegue esses ingredientes?\""
"Brandon Mellus in the Red Wing Casino said, \"Let's round out the party's food offerings with something a little less disgusting! I got this recipe from my mother. Can you get the stuff?\"": "Brandon Mellus, do Red Wing Casino, disse: \"Vamos completar as ofertas de comida da festa com algo um pouco menos nojento! Recebi esta receita da minha mãe. Você pode pegar o produto?\""
"Brandon Mellus in the Red Wing Casino said, \"Rick got turned into a mirror. For months he seemed like just a normal mirror, until one day words started appearing on him: \"please destroy me\", \"you can't leave me like this forever\", \"you're my only friends and I'm begging you to end this\", and so on. Eventually we agreed and tried to end his suffering... only to find out that he's indestructible. Or at least too hard for us to break!

So we just kept trying to find cures for him, because what else could we do? Eventually Rick calmed down about wanting to die, which was nice, but he still really wanted to not be a mirror. We tried all kinds of crazy stuff: talked to oracles, begged other gods for miracles, anything we could think of, but nothing worked.

Then a few months ago we heard about a special kind of magic in Gazluk. A shaman in an orc city there could supposedly help him. So I took Rick to this city with an orc guide we hired. The guide said we'd get in fine, but he was wrong: he was shot by a gigantic crossbow and died. I fled and orcs captured Rick. So all I can tell you is Rick is somewhere in Gazluk, maybe still in that orc city. I really don't think you should go look for him because you'll die. But if you do, tell him I'm sorry.\"": "Brandon Mellus, do Red Wing Casino, disse: \"Rick se transformou em um espelho. Durante meses ele parecia apenas um espelho normal, até que um dia palavras começaram a aparecer nele: \"por favor, me destrua\", \"você não pode me deixar assim para sempre\", \"vocês são meus únicos amigos e estou implorando para que acabe com isso\", e assim por diante. Eventualmente, concordamos e tentamos acabar com seu sofrimento... apenas para descobrir que ele é indestrutível. Ou pelo menos muito difícil para nós quebrarmos!

Então continuamos tentando encontrar a cura para ele, porque o que mais poderíamos fazer? Eventualmente, Rick se acalmou sobre querer morrer, o que foi bom, mas ele ainda queria não ser um espelho. Tentamos todo tipo de loucura: conversamos com oráculos, imploramos milagres a outros deuses, qualquer coisa que pudéssemos imaginar, mas nada funcionou.

Então, há alguns meses, ouvimos falar de um tipo especial de magia em Gazluk. Um xamã em uma cidade orc poderia supostamente ajudá-lo. Então levei Rick para esta cidade com um guia orc que contratamos. O guia disse que entraríamos bem, mas ele se enganou: foi atingido por uma besta gigante e morreu. Eu fugi e os orcs capturaram Rick. Então tudo que posso dizer é que Rick está em algum lugar de Gazluk, talvez ainda naquela cidade orc. Eu realmente não acho que você deva procurá-lo porque você vai morrer. Mas se você fizer isso, diga a ele que sinto muito.\""
"Brandon Mellus in the Red Wing Casino said, \"Since Zhia Lian is the goddess of Whimsy, we need a lot of very eccentric snacks. And unfortunately most of my best stuff was either stolen by cat men, or was lost in the desert as we fled for our lives. From cat men.

The casino will provide some boring snacks, but we definitely need some more exotic stuff! Let's start with a recipe from the Crone Hegemony. I found it in an old book! Can you get the ingredients?\"": "Brandon Mellus, do Red Wing Casino, disse: \"Como Zhia Lian é a deusa do capricho, precisamos de muitos lanches excêntricos. E, infelizmente, a maioria das minhas melhores coisas foi roubada por homens-gatos ou perdida no deserto enquanto fugimos para salvar nossas vidas. De homens-gatos.

O cassino oferecerá alguns lanches chatos, mas definitivamente precisamos de coisas mais exóticas! Vamos começar com uma receita da Hegemonia Crone. Encontrei isso em um livro antigo! Você pode pegar os ingredientes?\""
"Brandon Mellus in the Red Wing Casino said, \"Westley got turned into an elf by Zhia Lian. He was pretty shaken up about it. He'd been this tough half-human and suddenly he was scrawny and weird. Ran off to find a cure. Last I heard he was headed to the edge of the Council Lands. There's a town near the border with Verta where a lot of elves live. It's called Serbule. He figured they might know something. Go check on him!\"": "Brandon Mellus, do Red Wing Casino, disse: \"Westley foi transformado em elfo por Zhia Lian. Ele ficou bastante abalado com isso. Ele era um meio-humano durão e de repente estava magro e estranho. Fugiu para encontrar uma cura. A última vez que ouvi, ele estava indo para o limite das Terras do Conselho. Há uma cidade perto da fronteira com Verta onde vivem muitos elfos. Chama-se Serbule. Ele imaginou que eles poderiam saber de alguma coisa. Vá verificar. ele!\""
