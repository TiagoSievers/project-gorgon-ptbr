"Tofu can be made in three main ways. Firm tofu is used when the recipe calls for a protein that won't fall apart! I can teach you how to make it in exchange for a fresh Brunost cheese.": "O tofu pode ser feito de três maneiras principais. O tofu firme é usado quando a receita pede uma proteína que não se desfaça! Posso te ensinar como fazer em troca de um queijo Brunost fresco."
"Tofu can be made in three main ways. Soft tofu is even mushier than regular tofu. Personally I think it tastes disgusting, but perhaps you're more cultured than me!

I can teach you how to make it in exchange for a fresh brie.": "O tofu pode ser feito de três maneiras principais. O tofu macio é ainda mais pastoso do que o tofu normal. Pessoalmente acho que tem um gosto nojento, mas talvez você seja mais culto que eu!

Posso te ensinar como fazer isso em troca de um brie fresco."
