"Saltpeter for Percy Evans": "Salitre para Percy Evans"
"SaltpeterForLandriTheCold": "SalitrePara LandriTheCold"
"SaltpeterForPercyEvans": "SalitreForPercyEvans"
"Sam Veilmoor in Statehelm said, \"Helena is a degenerate. She's addicted to gambling, and worse: she's addicted to CHEATING at gambling. But still, she's a Veilmoor. If she should fall prey to a monster or a highwayman, it would tarnish the Veilmoor name. That's my excuse, anyway.

I want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.\"": "Sam Veilmoor em Statehelm disse: \"Helena é uma degenerada. Ela é viciada em jogos de azar e, pior: ela é viciada em trapacear no jogo. Mas ainda assim, ela é uma Veilmoor. Se ela fosse vítima de um monstro ou de um salteador de estrada, isso mancharia o nome de Veilmoor. Essa é a minha desculpa, de qualquer maneira.

Quero enviar a ela um amuleto de proteção. Esta é uma receita de família, transmitida por três gerações. Quatro, se algum dia eu ensinar isso para Helena. Eu tenho o básico, mas preciso de alguns focos especiais.\""
"Sam Veilmoor in Statehelm said, \"Here: it's finished. This amulet only works for those of Veilmoor blood. For us, it will protect against death itself! Once. Plus, I've altered this one so that I can track where it is, in case she gets kidnapped. That was quite an expensive ritual, too.

Tell her none of that. Just deliver it to her. Helena will know what it is and what it means.\"": "Sam Veilmoor em Statehelm disse: \"Aqui: está terminado. Este amuleto só funciona para aqueles de sangue Veilmoor. Para nós, ele protegerá contra a própria morte! Uma vez. Além disso, alterei este para poder rastrear onde está, caso ela seja sequestrada. Esse também foi um ritual bastante caro.

Não diga nada disso a ela. Apenas entregue a ela. Helena saberá o que é e o que significa.\""
"Sam Veilmoor in Statehelm said, \"I need to pay off Helena's debt. But I can't entrust her with the money. Can I ask you to deliver it to the mantises? I've been communicating via letter with a mantis named Irkima. He... or she? Eh, whatever. It will take posession of the money. \"": "Sam Veilmoor, em Statehelm, disse: “Preciso pagar a dívida de Helena. Mas não posso confiar o dinheiro a ela."
"Sam Veilmoor in Statehelm said, \"Oh, I'm fine! It's just that I've been worried. Worried sick, actually. I've heard my daughter's in trouble financially. She's... estranged. And her father has all but disowned her, and I understand why. Kind of agree with him.

But she's my daughter and I can't just watch as she ruins her life.

Maybe I'm overreacting. Could you check in on her? Her name is Helena Veilmoor and she moved far south to a fortress called Hogan's Keep. Apparently she's having trouble with a gang of sentient insects. Oh, my poor idiot daughter! Let me know she's okay!\"": "Sam Veilmoor em Statehelm disse: \"Oh, estou bem! É que estou preocupado. Preocupado e doente, na verdade. Ouvi dizer que minha filha está com problemas financeiros. Ela está... distante. E o pai dela praticamente a rejeitou, e eu entendo o porquê. Concordo com ele.

Mas ela é minha filha e não posso ficar apenas vendo ela arruinar a vida dela.

Talvez eu esteja exagerando. Você poderia dar uma olhada nela? O nome dela é Helena Veilmoor e ela se mudou para o sul, para uma fortaleza chamada Hogan's Keep. Aparentemente ela está tendo problemas com uma gangue de insetos sencientes. Oh, minha pobre filha idiota! Deixe-me saber que ela está bem!\""
"Sammie Grimspine in Serbule Hills said, \"I heard that goblins took the logging camps to the northeast... and that they're using fairies as slaves! So terrible! Now, I could never condone killing anybody, but IF a slave were to HAPPEN to perish, and if they had cold iron shackles in good condition, and IF those shackles made it back to me, I would be very grateful. Not that I want you to kill anybody, though! No no no. Just... be on the lookout for cold iron shackles. That's all.\"": "Sammie Grimspine em Serbule Hills disse: \"Ouvi dizer que goblins levaram os acampamentos madeireiros para o nordeste... e que eles estão usando fadas como escravas! Que terrível! Agora, eu nunca poderia tolerar matar alguém, mas SE um escravo ACONTECESSE de morrer, e se eles tivessem algemas de ferro frio em boas condições, e SE essas algemas voltassem para mim, eu ficaria muito grato. Não que eu queira que você mate alguém! Não, não, não. Apenas... fique atento às algemas de ferro frio. Isso é tudo.\""
"Sammie Grimspine in Serbule Hills said, \"Oh my gosh I really could use some grapes! They're my favorite snack. I should learn to grow them myself or something. Have you seen any?\"": "Sammie Grimspine em Serbule Hills disse: \"Oh meu Deus, eu realmente gostaria de algumas uvas! Elas são meu lanche favorito. Eu deveria aprender a cultivá-las sozinho ou algo assim. Você viu alguma?\""
"Sammie Grimspine in Serbule Hills said, \"Some of my calligraphy projects require unusual paper. Right now I've been experimenting with paper made out of watercress! Do you happen to have any? And don't worry about freshness: I'm going to pound it into a paste anyway.\"": "Sammie Grimspine, em Serbule Hills, disse: \"Alguns de meus projetos de caligrafia exigem papel incomum. No momento, estou experimentando papel feito de agrião! Por acaso você tem algum? E não se preocupe com o frescor: vou transformá-lo em uma pasta de qualquer maneira. \""
"Sammie Grimspine in Serbule Hills said, \"You know those flying monsters the ranalon have? Those 'scray'? Yeah. Well, I need a stinger from one. If you find one, bring it to me!\"": "Sammie Grimspine em Serbule Hills disse: \"Você conhece aqueles monstros voadores que o ranalon tem? Aqueles 'scray'? Sim. Bem, eu preciso de um ferrão de um. Se você encontrar um, traga-o para mim!\""
