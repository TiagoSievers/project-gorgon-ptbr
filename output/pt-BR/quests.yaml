"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Mild Cheddar Cheese, I will share some of my cheesemaking experience with you!\"": "Serrold disse: \"Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo sempre pode ser difícil, e realmente poderíamos usar um estoque de algo diferente do que Serrold e eu estamos carregando. Se você estiver disposto a me trazer 10 pedaços de queijo Cheddar Suave, compartilharei um pouco da minha experiência de fabricação de queijo com você!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Raclette Cheese, I will share some of my cheesemaking experience with you!\"": "Serrold disse: \"Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo sempre pode ser difícil, e realmente poderíamos usar um estoque de algo diferente do que Serrold e eu estamos carregando. Se você estiver disposto a me trazer 10 pedaços de queijo Raclette, compartilharei um pouco da minha experiência de fabricação de queijo com você!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Edam Cheese, I will share some of my cheesemaking experience with you!\"": "Serrold disse: \"Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo sempre pode ser difícil, e realmente poderíamos usar um estoque de algo diferente do que Torana e eu estamos carregando. Se você estiver disposto a me trazer 10 pedaços de queijo Edam, compartilharei um pouco da minha experiência de fabricação de queijo com você!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Feta Cheese, I will share some of my cheesemaking experience with you!\"": "Serrold disse: \"Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo sempre pode ser difícil, e realmente poderíamos usar um estoque de algo diferente do que Torana e eu estamos carregando. Se você estiver disposto a me trazer 10 pedaços de queijo feta, compartilharei um pouco da minha experiência de fabricação de queijo com você!\""
