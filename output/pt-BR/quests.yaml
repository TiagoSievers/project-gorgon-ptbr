"George Madler asked you for some cotton.": "George Madler pediu algodão."
"George Madler asked you to get some red asters. He's going to use the flowers to create dye.": "George Madler pediu para você comprar alguns ásteres vermelhos. Ele vai usar as flores para criar a tintura."
"George Madler asked you to kill a bear named Graz. He doesn't know where Graz lives, though, except that it's likely in a cave filled with goblins.": "George Madler pediu para você matar um urso chamado Graz. Ele não sabe onde Graz mora, exceto que provavelmente é em uma caverna cheia de goblins."
"George Madler has asked you to kill a goblin named Algapa. George thinks this goblin can be found in the dungeons beneath Eltibule Keep.": "George Madler pediu para você matar um goblin chamado Algapa. George acha que esse goblin pode ser encontrado nas masmorras abaixo do Forte Eltibule."
"George Madler has asked you to kill a goblin named Fugorg. George thinks this goblin can be found near a giant statue in the wilds of Eltibule.": "George Madler pediu para você matar um goblin chamado Fugorg. George acha que este goblin pode ser encontrado perto de uma estátua gigante na selva de Eltibule."
"Gerrux in Povus has asked you to find his deceased sister's key, which she threw into the river before her death. He heard there's a ranalon who trades in river treasures who might be able to help.": "Gerrux in Povus pediu que você encontrasse a chave de sua falecida irmã, que ela jogou no rio antes de morrer. Ele ouviu que há um ranalon que comercializa tesouros fluviais e que pode ajudar."
"Gerrux in Povus said, \"I like to refine weapons by giving them an artistic touch. I'm working on a combat beaker -- I haven't done one of these since my sister died! It seems I'm out of blue glass, though. Do you have any? Oh, I need a bit of pyrite too.\"": "Gerrux em Povus disse: \"Gosto de refinar armas dando-lhes um toque artístico. Estou trabalhando em um copo de combate - não faço um desses desde que minha irmã morreu! Parece que estou sem vidro azul. Você tem algum? Ah, preciso de um pouco de pirita também.\""
"Gerrux in Povus said, \"I'm working on artistically improving a dagger right now, but I need something very special: blue glass. But not any old blue glass. Only the glass from a pair of ratkin goggles will do! I also need several sets of hexapus teeth. I'm afraid this dagger will not be subtle.\"": "Gerrux em Povus disse: \"Estou trabalhando no aprimoramento artístico de uma adaga agora, mas preciso de algo muito especial: vidro azul. Mas não qualquer vidro azul velho. Somente o vidro de um par de óculos de ratkin servirá! Também preciso de vários conjuntos de dentes hexapus. Receio que esta adaga não seja sutil. \""
"Gerrux in Povus said, \"In my spare time I dabble in artistic weapon improvements, and I'm working on a dazzling khopesh. But I need more raw materials!

I'm not a smith, but if I had enough old broken blades, I could probably fulfill my artistic vision.\"": "Gerrux em Povus disse: \"No meu tempo livre, me envolvo em melhorias artísticas de armas e estou trabalhando em um khopesh deslumbrante. Mas preciso de mais matéria-prima!

Não sou ferreiro, mas se eu tivesse lâminas quebradas suficientes, provavelmente conseguiria concretizar minha visão artística.\""
"Gerrux in Povus said, \"In my spare time I work to artistically enhance weapons, and I'm working on a hammer that needs a new wrap. I know just the material! Kuvou tongue! Can you get me some?\"": "Gerrux em Povus disse: \"No meu tempo livre, trabalho para aprimorar armas artisticamente e estou trabalhando em um martelo que precisa de um novo embrulho. Conheço exatamente o material! Língua Kuvou! Você pode me conseguir um pouco?\""
"Gershok the Ranalon in Serbule Hills asked for a meal of Breaded Perch with Onions.": "Gershok, o Ranalon, em Serbule Hills, pediu uma refeição de perca à milanesa com cebola."
"Gershok the Ranalon in Serbule Hills asked for a meditation stool.": "Gershok, o Ranalon, em Serbule Hills, pediu um banco para meditação."
"Gershok the Ranalon in Serbule Hills asked for some rat teeth.": "Gershok, o Ranalon, em Serbule Hills, pediu alguns dentes de rato."
