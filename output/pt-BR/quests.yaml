"Steven Poplar in Statehelm said, \"Arisetsu despises undeath. As any sane person should! I'm always on the lookout for potential undeath incidents, and I've detected one nearby.

In Vidaria there's a massive floating rock. Under that rock flow a constant stream of the undead. The soldiers are doing what they can to prevent the undead from swarming, but they could use help.

Seek out the \"Lungers\". They're causing the most harm right now. Oh, and the dark-casting skeletons. Oh and also the fiery ones.\"": "Steven Poplar em Statehelm disse: \"Arisetsu despreza os mortos-vivos. Como qualquer pessoa sã deveria! Estou sempre atento a possíveis incidentes com mortos-vivos e detectei um por perto.

Em Vidaria existe uma enorme rocha flutuante. Sob aquela rocha flui um fluxo constante de mortos-vivos. Os soldados estão fazendo o que podem para evitar o enxame de mortos-vivos, mas precisam de ajuda.

Procure os \"Lungers\". Eles estão causando mais danos agora. Ah, e os esqueletos sombrios. Ah, e também os de fogo.\""
"Steven Poplar in Statehelm said, \"It's that time again: time to ask for help paying the rent for over fifty would-be homeless people! We've promised to pay their rent until they're able to pay it themselves, and we need your help to do that!

For tax-clarity purposes, I would appreciate any donation be in the form of Council Certificates.\"": "Steven Poplar, em Statehelm, disse: \"Chegou a hora de novo: hora de pedir ajuda para pagar o aluguel de mais de cinquenta moradores de rua! Prometemos pagar o aluguel até que eles possam pagá-lo sozinhos, e precisamos da sua ajuda para fazer isso!

Para fins de clareza fiscal, gostaria que qualquer doação fosse na forma de Certificados do Conselho.\""
"Steven Poplar in Statehelm said, \"Time to practice the technique I taught you to harvest excess negative emotions. Check my almanac to see what sort of undead are best to hunt right now. Then go kill them until you find some pearls! Remember: you don't have to be a priest to do this, but you do have to be wearing a Symbol of Arisetsu while you kill the undead.\"": "Steven Poplar em Statehelm disse: \"É hora de praticar a técnica que ensinei a você para colher o excesso de emoções negativas. Verifique meu almanaque para ver que tipo de mortos-vivos são melhores para caçar agora. Então vá matá-los até encontrar algumas pérolas! Lembre-se: você não precisa ser um sacerdote para fazer isso, mas você precisa usar um Símbolo de Arisetsu enquanto mata os mortos-vivos. \""
"Steven Poplar in Statehelm said, \"You've proven yourself capable on the battlefield. I wonder if you would like to learn of another way to help Arisetsu's mission?

It's a bit unorthodox. I'm sure my higher-ups in the church wouldn't approve. But I think it's worthwhile.

I'm sorry for being vague. You see, I promised someone that I'd let them vet anyone I wanted to pass on this knowledge to. He's dead, but his wife will know what he was looking for. Go get her blessing to learn the secret. Fransesca is in the wizard school. Yes, she's a necromancer. But she's one of the good ones. Trust me.\"": "Steven Poplar em Statehelm disse: “Você provou ser capaz no campo de batalha. Gostaria de saber se gostaria de aprender outra maneira de ajudar na missão de Arisetsu?

É um pouco pouco ortodoxo. Tenho certeza de que meus superiores na igreja não aprovariam. Mas acho que vale a pena.

Sinto muito por ser vago. Veja, prometi a alguém que os deixaria examinar qualquer pessoa a quem eu quisesse transmitir esse conhecimento. Ele está morto, mas sua esposa saberá o que ele procurava. Vá buscar a bênção dela para aprender o segredo. Fransesca está na escola de bruxos. Sim, ela é uma necromante. Mas ela é uma das boas. Confie em mim.\""
