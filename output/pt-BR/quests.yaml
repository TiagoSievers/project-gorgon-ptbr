"Elune in Statehelm said, \"Denton Razor said that some of my jewelry was sold to a fence in town. Everybody knows who the town fence is: that filthy human who runs the bar on the docks. Cynthia Rolfe! Go berate her until she relinquishes my jewelry!\"": "Elune, em Statehelm, disse: \"Denton Razor disse que algumas de minhas joias foram vendidas para uma cerca na cidade. Todo mundo sabe quem é a cerca da cidade: aquele humano imundo que dirige o bar nas docas. Cynthia Rolfe! Vá repreendê-la até que ela desista de minhas joias! \""
"Elune in Statehelm said, \"Denton Razor said that someone named 'Engineer Crall' in Vidaria bought some of my jewelry. Find this Crall and convince them to return the stolen goods!\"": "Elune em Statehelm disse: \"Denton Razor disse que alguém chamado 'Engenheiro Crall' em Vidaria comprou algumas de minhas joias. Encontre este Crall e convença-o a devolver os bens roubados!\""
"Elune in Statehelm said, \"I have the worst news. The constabulary spotted a suspicious person yesterday, and as he fled he threw a huge clump of jewelry into the ocean. It's got to be some of my stolen jewelry! Can you fish it out for me? It was down on the docks.\"": "Elune, em Statehelm, disse: \"Tenho as piores notícias. A polícia avistou uma pessoa suspeita ontem e, enquanto ele fugia, jogou um enorme monte de joias no oceano. Devem ser algumas das minhas joias roubadas! Você pode pescar para mim? Estava nas docas.\""
"Elune in Statehelm said, \"I heard a rumor that's just too stupid to NOT be true. Apparently a rabbit <i>covered in jewelry</i> was seen hopping into a sewer pipe outside of town. It seems to live down there.

It's got to be one of those dreadful talking pets that wizards love so much. They never mind their pets at all, and now this one's taken to a life of crime! Take care of the matter for me, won't you?\"": "Elune, em Statehelm, disse: \"Ouvi um boato que é estúpido demais para NÃO ser verdade. Aparentemente, um coelho coberto de joias foi visto pulando em um cano de esgoto fora da cidade. Parece viver lá embaixo.

Deve ser um daqueles animais de estimação falantes horríveis que os bruxos tanto amam. Eles não se importam com seus animais de estimação, e agora este foi levado para uma vida de crime! Cuide do assunto para mim, certo?"
"Elune in Statehelm said, \"I'm sorry. I can't open my store in this condition. I've been robbed! The store is a disgrace!

If you're inclined to help, can you speak to that Hackley woman with the Council? A few guards investigated days ago, but I've heard nothing since. Surely the thief is caught by now! Go check.\"": "Elune, em Statehelm, disse: \"Sinto muito. Não posso abrir minha loja nessas condições. Fui assaltado! A loja é uma vergonha!

Se estiver disposto a ajudar, pode falar com aquela mulher Hackley do Conselho? Alguns guardas investigaram dias atrás, mas não ouvi nada desde então. Certamente o ladrão já foi pego! Vá verificar.\""
"Elune in Statehelm said, \"Of course, there's no chance I'll ever see my most recent masterpiece ever again. The thief no doubt valued that one over all the other trinkets in my store, and would never have parted with it. Well, I shouldn't give up hope; perhaps it will show up on the market in a few years.

But right now I need to create a NEW masterpiece. The old one was a riff on my famous rubywall crystal motif, but now I'm imagining something fresher: rubywall-like crystals, but with the darkest of aquamarines!

I should get started right away while the inspiration has hit me. Unfortunately, my gem supply is gone and what I need is no ordinary aquamarine. I need just the right one.

Why don't you simply get me 100 or so and I'll just pick the best one from the batch.\"": "Elune, em Statehelm, disse: \"Claro, não há chance de eu ver minha obra-prima mais recente novamente. O ladrão sem dúvida valorizou aquela acima de todas as outras bugigangas em minha loja e nunca teria se desfeito dela. Bem, eu não deveria perder as esperanças; talvez ela apareça no mercado em alguns anos.

Mas agora preciso criar uma NOVA obra-prima. O antigo era um riff do meu famoso motivo de cristal Rubywall, mas agora estou imaginando algo mais fresco: cristais parecidos com Rubywall, mas com a mais escura das águas-marinhas!

Eu deveria começar imediatamente enquanto a inspiração me atinge. Infelizmente, meu estoque de gemas acabou e o que preciso não é de água-marinha comum. Eu preciso do caminho certo.

Por que você simplesmente não me dá 100 ou mais e eu escolho o melhor do lote?"
"Elune in Statehelm said, \"Since the constabulary is completely useless, I've been poking around for clues to my stolen jewelry. And I have a lead for you! ... You <i>will</i> help me, right? It's oh so important!

So you see the jewelry was sold to an orc who trades such things amongst his kind. His name is Throgg and he lives  in a camp in Povus. Can you go and retrieve my stolen jewelry before he gets a chance to resell it?\"": "Elune, em Statehelm, disse: \"Como a polícia é completamente inútil, estou procurando pistas sobre minhas joias roubadas. E tenho uma pista para você!... Você <i>vai</i> me ajudar, certo? É tão importante!

Então você vê que as joias foram vendidas para um orc que comercializa essas coisas entre sua espécie. O nome dele é Throgg e ele mora em um acampamento em Povus. Você pode recuperar minhas joias roubadas antes que ele tenha a chance de revendê-las?\""
"Elune in Statehelm said, \"Why don't you speak with this Denton Razor fellow yourself? He's supposed to live in the hills of Vidaria. Just get him to give my jewelry back.\"": "Elune, em Statehelm, disse: \"Por que você mesmo não fala com esse tal de Denton Razor? Ele deveria morar nas colinas de Vidaria. Basta pedir que ele devolva minhas joias.\""
"Elune in Statehelm said, \"You've helped me get all my stock back. And my new masterpiece is perhaps even better than the old one! I can't thank you enough. But let me try. I have an idea for a masterpiece just for you. I only need a few special ingredients! When you come back with these things, be ready to tell me what combat skills I should enchant it with.\"": "Elune em Statehelm disse: \"Você me ajudou a recuperar todo o meu estoque. E minha nova obra-prima talvez seja ainda melhor do que a antiga! Não posso agradecer o suficiente. Mas deixe-me tentar. Tenho uma ideia para uma obra-prima só para você. Só preciso de alguns ingredientes especiais! Quando você voltar com essas coisas, esteja pronto para me dizer com quais habilidades de combate devo encantá-lo. \""
