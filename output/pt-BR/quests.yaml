"Lakrea told you to bomb things. (Use bomb abilities, such as Spore Bomb.)": "Lakrea disse para você bombardear coisas. (Use habilidades de bomba, como Spore Bomb.)"
"Lakrea told you to build two meditation stools. (Meditation stools are made with Carpentry.)": "Lakrea disse para você construir dois bancos de meditação. (Os bancos de meditação são feitos com carpintaria.)"
"Lakrea told you to bury canines to build up your sense of compassion.": "Lakrea disse para você enterrar caninos para aumentar seu senso de compaixão."
"Lakrea told you to catch cavefish. They can be found deep in certain caves, including the caves of Kur Mountains.": "Lakrea disse para você pegar peixe-caverna. Eles podem ser encontrados nas profundezas de certas cavernas, incluindo as cavernas das Montanhas Kur."
"Lakrea told you to dye suits of armor.": "Lakrea disse para você tingir armaduras."
"Lakrea told you to get 100 crystals and show her your collection. You don't have to mine them yourself -- you just need 100 of them.": "Lakrea disse para você pegar 100 cristais e mostrar sua coleção a ela. Você não precisa extraí-los sozinho – você só precisa de 100 deles."
"Lakrea told you to go get attacked by nine different dinosaurs, or at least creatures in the dinosaur family. (Many things are in the dinosaur family, including dragons and birds.)": "Lakrea disse para você ser atacado por nove dinossauros diferentes, ou pelo menos criaturas da família dos dinossauros. (Muitas coisas pertencem à família dos dinossauros, incluindo dragões e pássaros.)"
"Lakrea told you to go get attacked by nine different ruminants. (Ruminants are animals like cows, sheep, deer, or camels.)": "Lakrea disse para você ser atacado por nove ruminantes diferentes. (Ruminantes são animais como vacas, ovelhas, veados ou camelos.)"
"Lakrea told you to grow some carrots.": "Lakrea disse para você cultivar algumas cenouras."
"Lakrea told you to make your own cheese. She suggested avoiding the fancier cheese recipes that require aging.": "Lakrea disse para você fazer seu próprio queijo. Ela sugeriu evitar receitas de queijo mais sofisticadas que exigem envelhecimento."
"Lakrea told you to mine some iridium. Iridium can be found in the Kur Mountains and in caves beneath the mountains.": "Lakrea disse para você extrair um pouco de irídio. O irídio pode ser encontrado nas montanhas Kur e em cavernas sob as montanhas."
"Lakrea told you to practice your conversation skills. (Use the 'small talk' option when talking to different NPCs.)": "Lakrea disse para você praticar suas habilidades de conversação. (Use a opção de 'conversa fiada' ao conversar com diferentes NPCs.)"
"Lakrea told you to put 40 pieces of equipment in your inventory and then talk to her.": "Lakrea disse para você colocar 40 equipamentos em seu inventário e depois falar com ela."
"Lakrea told you to skin a flawless animal skin of some kind. (If you have high anatomy knowledge of a creature that you skin, you have a chance of obtaining a flawless skin instead of the usual skin.)": "Lakrea disse para você esfolar algum tipo de pele de animal impecável. (Se você tiver alto conhecimento de anatomia de uma criatura que você esfola, você terá uma chance de obter uma pele perfeita em vez da pele normal.)"
"Lakrea told you to smith some hoops. She didn't seem to care what kind of hoops you smithed. (Blacksmithing is the skill used to make hoops for barrels and casks.)": "Lakrea disse para você fazer alguns aros. Ela não parecia se importar com o tipo de aro que você forjava. (Ferraria é a habilidade usada para fazer aros para barris e tonéis.)"
"Lakrea told you to use treasure maps to find buried treasure.": "Lakrea disse para você usar mapas do tesouro para encontrar tesouros enterrados."
"Lakrea told you to work the word 'beleaguered' into your next conversation.

Beleaguered: adjective: beset with difficulties.

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'sitiado' em sua próxima conversa.

Assediado: adjetivo: assolado por dificuldades.

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
