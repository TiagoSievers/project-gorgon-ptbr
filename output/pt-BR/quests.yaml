"Algapa is dead? Hah! If only his father was still alive to weep for him. But no matter. Thank you. Here, let me give you what I can.": "Algapa está morta? Hah! Se ao menos seu pai ainda estivesse vivo para chorar por ele. Mas não importa. Obrigado. Aqui, deixe-me dar o que posso."
"Alien fae creatures are all over Sun Vale! I don't blame you, but you should do your part to help clean this up. Kill fey panthers and bring me their tails as proof!": "Criaturas alienígenas feéricas estão por todo Sun Vale! Não te culpo, mas você deveria fazer a sua parte para ajudar a limpar isso. Mate panteras feéricas e traga-me suas caudas como prova!"
"All clear! I'll sweep up and try to open shop. Chancellor Vexford's evil scheme has been foiled again!": "Tudo claro! Vou varrer e tentar abrir a loja. O esquema maligno do Chanceler Vexford foi frustrado novamente!"
"All my beautiful furniture was destroyed by invaders. Perhaps the most tragic was the loss of my amazing chair. It was hand-crafted by my favorite carpenter! Some day I hope to have a new one that's just as good.": "Todos os meus lindos móveis foram destruídos por invasores. Talvez o mais trágico tenha sido a perda da minha incrível cadeira. Foi feito à mão pelo meu carpinteiro favorito! Algum dia espero ter um novo que seja igualmente bom."
"All of my cleaning tools were stolen by the orcs. Even my trusty cleaning stick! I used to use it to get items off of the roof, disgorge gutters and drains, and poke seeds into the dirt! It was an amazingly versatile stick. I saw a perfect replacement in Rahu, but they couldn't guarantee that it wasn't made by slave labor. So I had to keep searching...": "Todas as minhas ferramentas de limpeza foram roubadas pelos orcs. Até meu fiel bastão de limpeza! Eu costumava usá-lo para tirar itens do telhado, despejar calhas e ralos e enfiar sementes na terra! Era um stick incrivelmente versátil. Vi um substituto perfeito em Rahu, mas não podiam garantir que não fosse feito com trabalho escravo. Então tive que continuar pesquisando..."
"All of the water samples were clean? No screeches from the bottle? Oh, good. I have no idea what we'd do if they weren't working!

Did you happen to notice if the treants are looking well? They were happy to see me last year! Wait.. wait, you aren't a friend of treants! How is that possible? Did the treants attack you?!

I apologize. I should have thought of this earlier: Dreva's boons are not quite the same as Ri-Shin's boons, are they? But fear not, because I believe I can share this one with you.

<i>[Lady Windsong hops around you, and you feel something changing. Sewer treants will no longer be aggressive to you.]</i>": "Todas as amostras de água estavam limpas? Nenhum grito da garrafa? Ah, que bom. Não tenho ideia do que faríamos se eles não estivessem funcionando!

Você notou se os ents estão bem? Eles ficaram felizes em me ver no ano passado! Espere... espere, você não é amigo de entes! Como isso é possível? Os ents atacaram você?!

Peço desculpas. Eu deveria ter pensado nisso antes: os benefícios de Dreva não são exatamente iguais aos benefícios de Ri-Shin, não é? Mas não tema, porque acredito que posso compartilhar isso com você.

<i>[Lady Windsong salta ao seu redor e você sente algo mudando. Os entes do esgoto não serão mais agressivos com você.]</i>"
"All our supplies are gone, so I've had lots of trouble feeding Tryaka and myself. We're making due, but I really miss having an orange for breakfast each morning. And our gums are starting to bleed... I fear that's somehow related.": "Todos os nossos suprimentos acabaram, então tive muitos problemas para alimentar Tryaka e a mim mesmo. Estamos vencendo, mas sinto muita falta de comer uma laranja no café da manhã todas as manhãs. E nossas gengivas estão começando a sangrar... Temo que isso esteja de alguma forma relacionado."
"All the \\\"wild\\\" chickens in Serbule Hills descend from a chicken farm that was overrun by goblins. The smartest chickens escaped capture, and they have since spread throughout the hills. They lay far fewer eggs than domestic chickens, but they're still delicious when fried.\": \"<b>Caça": "Galinhas Selvagens</b>"
"All The Fish You Could Want": "Todos os peixes que você poderia querer"
"All-Flavor Chickens": "Frangos com todos os sabores"
"AllFlavorChicken": "AllFlavorFrango"
"AllTheFishYouCouldWant": "Todos os peixes que você poderia querer"
"AlmondCrustedWalleye": "AmêndoaCrustedWalleye"
"AlmondFlour": "Farinha de Amêndoa"
"Although my species is generally able to cohabit with slimes and fungi of all types, there exist herein a species that reduces the ambient temperature. This is clearly unacceptable behavior. Please extinguish these slimes before they make the environment uninhabitable!": "Embora a minha espécie seja geralmente capaz de coabitar com limos e fungos de todos os tipos, existe aqui uma espécie que reduz a temperatura ambiente. Este é um comportamento claramente inaceitável. Por favor, apague essas gosmas antes que tornem o ambiente inabitável!"
"Although their distant grandparents were domestic sheep, these feral sheep will not tolerate being sheared. They are aggressive toward anyone that gets too close.\": \"<b>Caça": "ovelhas</b>"
"Although... Our armor isn't \\\"orcish\\\". It's Tast's armor. As in the god of war. If you want to know how to make it, just ask one of his avatars! It's easy": "just go to a forge consecrated to Tast, and say \\\"Gurkah, Tast!\\\" Every orcish blacksmith learns this way.\": \"Você quer aprender a fazer armaduras orcs? Hahaha! Espere, você realmente espera que eu lhe ensine um segredo orc? Eu não sou nenhum traidor! Diga ao Tremmond para se foder."
"Alzaneth in Statehelm said, \"I found reference to another gale-chanting spot, and this one is right outside of Statehelm! Unfortunately, it's underwater. I suppose the waterline has moved since it was first made. So hold your breath and look for it past the docks. Summon a tornado there, and you should be able to access an unusual weather form. Kill it and get its heart.

And then you should run. It might have a guardian itself, and you wouldn't want to run into that.\"": "Alzaneth em Statehelm disse: \"Encontrei referência a outro local de canto de vendaval, e este fica fora de Statehelm! Infelizmente, está debaixo d'água. Suponho que a linha d'água se moveu desde que foi feita pela primeira vez. Então prenda a respiração e procure por ele além das docas. Invoque um tornado lá, e você deverá ser capaz de acessar uma forma de clima incomum. Mate-o e pegue seu coração.

E então você deveria correr. Ele pode ter um guardião, e você não gostaria de se deparar com isso.\""
"Alzaneth in Statehelm said, \"I need you to collect one more unusual wind-heart for me. You'll find the gale-chanting spot in Povus, near water. Summon a tornado there, and you should find a swampy wind. I need its heart. After you kill it, run quickly. You know why by now.\"": "Alzaneth em Statehelm disse: \"Preciso que você colete mais um coração de vento incomum para mim. Você encontrará o local de canto de vendaval em Povus, perto da água. Invoque um tornado lá, e você deverá encontrar um vento pantanoso. Eu preciso de seu coração. Depois de matá-lo, corra rapidamente. Você já sabe por que.\""
"Alzaneth in Statehelm said, \"You want me to train you in Weather Witching? Well... I'm flattered, but I'm hardly the most qualified instructor. Though I suppose if even MY meager skills are above yours, I should help you out of the doldrums of mediocrity. But it will take time, and I'm only visiting for a short while.

Why don't you run an errand for me? That will free up some time to give you lessons.

I've heard there's an old gale-chanting spot. I'm not sure where it is exactly, but it's on a hill overlooking a lake. There can't be that many lakes, right? You'll know you're in the right spot by the breeze you feel.

I've heard that if you summon a sandstorm while standing there, it will attract a young breeze elemental right to you! Most aren't native to this realm, but something about the winds in the Ilmari allow them to be born. Quite unusual! So anyway, it will find you in seconds. Kill it and get its heart. Don't worry: most wind elementals that grow up <i>here</i> end up insane anyway, so you're doing it a favor, maybe.

After you get that heart, you should definitely leave very quickly, though. Larger wind elementals will be attracted, too, and noone can fight a hurricane.\"": "Alzaneth em Statehelm disse: \"Você quer que eu treine você em Weather Witching? Bem... estou lisonjeado, mas dificilmente sou o instrutor mais qualificado. Embora eu suponha que mesmo que MINHAS escassas habilidades estejam acima das suas, eu deveria ajudá-lo a sair da crise da mediocridade. Mas isso levará tempo, e estou visitando apenas por um curto período.

Por que você não faz uma tarefa para mim? Isso liberará algum tempo para lhe dar aulas.

Ouvi dizer que há um antigo local onde se cantam ventos fortes. Não tenho certeza de onde fica exatamente, mas fica em uma colina com vista para um lago. Não pode haver tantos lagos, certo? Você saberá que está no lugar certo pela brisa que sentir.

Ouvi dizer que se você invocar uma tempestade de areia enquanto estiver ali, ela atrairá uma jovem brisa elemental direto para você! A maioria não é nativa deste reino, mas algo nos ventos de Ilmari permite que eles nasçam. Bastante incomum! De qualquer forma, ele o encontrará em segundos. Mate-o e pegue seu coração. Não se preocupe: a maioria dos elementais do vento que crescem <i>aqui</i> acabam ficando loucos de qualquer maneira, então talvez você esteja fazendo um favor a isso.

Depois de conseguir esse coração, você definitivamente deveria sair muito rapidamente. Elementais do vento maiores também serão atraídos e ninguém poderá combater um furacão.\""
"Am I glad to see you! This one's too tough for me. Apparently the orcs of Gazluk Keep have a barghest breeding program, and last night they released their excess animals. Suddenly there's hundreds of barghests south of the keep! And they're hungry. We can't let them settle up here or they'll destroy the delicate ecosystem, and eat me.

Don't worry, these aren't true barghests -- these are just animals. Big dogs! You can take 'em! I mean, I can't, but you can!": "Estou feliz em ver você! Este é muito difícil para mim. Aparentemente, os orcs do Forte Gazluk têm um programa de procriação muito barulhento e ontem à noite eles soltaram os animais excedentes. De repente, há centenas de barghests ao sul da fortaleza! E eles estão com fome. Não podemos deixá-los se instalar aqui ou eles destruirão o delicado ecossistema e me comerão.

Não se preocupe, estes não são verdadeiros barghests - são apenas animais. Cachorros grandes! Você pode pegá-los! Quer dizer, eu não posso, mas você pode!"
"Amazen! Disiz de gud stuff... I meen, itsa shame it hazta bee destroyed. <i>[Korbok winks at you]</i>": "Surpreendente! Disiz de gud stuff ... Quero dizer, é uma pena que tenha sido destruído. <i>[Korbok pisca para você]</i>"
