"Ferris Blueheart in Vidaria said, \"Ah, you were the one that got me the swarmer brains and the flapskull blood? Very good. I have need of you again: you must help me prove my hypothesis! I just need brains from demon soldiers so I can compare them with the swarmer brains.\"": "Ferris Blueheart em Vidaria disse: \"Ah, foi você quem me deu os cérebros do enxame e o sangue do crânio abalado? Muito bem. Preciso de você de novo: você deve me ajudar a provar minha hipótese! Eu só preciso de cérebros de soldados demônios para que eu possa compará-los com os cérebros dos enxameadores. \""
"Ferris Blueheart in Vidaria said, \"Have you seen the frostbelches in the area? Little blue frogs, very adorable, very deadly. Of course you have, but it seems the demons have as well. They've developed a particular interest in the little creature, and I don't have to know why to know that it's troubling.

Bring me back a few samples of frostbelch skin, and please let me remain ignorant of how you get them.\"": "Ferris Blueheart em Vidaria disse: \"Você viu os arrotos gelados na área? Sapinhos azuis, muito adoráveis, muito mortais. Claro que sim, mas parece que os demônios também. Eles desenvolveram um interesse particular pela pequena criatura, e não preciso saber por que para saber que isso é preocupante.

Traga-me algumas amostras de pele de Belch e, por favor, deixe-me ignorar como você as consegue.\""
"Ferris Blueheart in Vidaria said, \"I have a theory. I suspect that the demons specifically value some combination of the Frostbelches' protective properties with their own. But I don't know what combination, exactly. Do you still have those frog skins from before? I'll need those, and I'll need some demonic essences. Bring me both, so I can compare.\"": "Ferris Blueheart em Vidaria disse: \"Eu tenho uma teoria. Suspeito que os demônios valorizam especificamente alguma combinação das propriedades protetoras dos Frostbelches com as suas próprias. Mas não sei exatamente qual combinação. Você ainda tem aquelas peles de sapo de antes? Vou precisar delas e de algumas essências demoníacas. Traga-me as duas, para que eu possa comparar. \""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Animals. Can you help me out?\"": "Ferris Blueheart, em Vidaria, disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos animais infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Behemoths. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Behemoths infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Justiciars. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: “Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Justiciars infernais."
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Lesser Behemoths. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Behemoths Infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Overseers. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: “Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Supervisores infernais."
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Scouts. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Escoteiros infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Soldiers. Can you help me out?\"": "Ferris Blueheart, em Vidaria, disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos soldados infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Swarmers. Can you help me out?\"": "Ferris Blueheart em Vidaria disse: \"Minha pesquisa atual sobre a ameaça demoníaca está paralisada. Para continuar, preciso realizar algumas amostras biológicas dos Swarmers infernais. Você pode me ajudar?\""
"Ferris Blueheart in Vidaria said, \"Some of the crystals near the wall move. They move! You'll understand when you see them.

Please see if you can destroy them.\"": "Ferris Blueheart em Vidaria disse: \"Alguns dos cristais perto da parede se movem. Eles se movem! Você entenderá quando os vir.

Por favor, veja se você pode destruí-los.\""
"Ferris Blueheart in Vidaria said, \"This one's quite simple: I need a bunch of fluxic quartz for some experiments. I don't care where you get it.\"": "Ferris Blueheart, em Vidaria, disse: \"Este é bem simples: preciso de um monte de quartzo fluxado para alguns experimentos. Não me importa onde você o consegue.\""
"Ferris Blueheart in Vidaria said, \"Unfortunately, my tests on these Frostbelch skins were inconclusive. There's nothing out of the ordinary with them. Fortunately for us, however, an animal expert was recently stationed near here. Seek out Pitre Ferrence, he should be somewhere south of this area. Ask him, nay, tell him that we'd like his assistance in this matter. Take the skins with you as well, he may need them.\"": "Ferris Blueheart em Vidaria disse: \"Infelizmente, meus testes nessas peles de Frostbelch foram inconclusivos. Não há nada fora do comum com elas. Felizmente para nós, no entanto, um especialista em animais esteve recentemente estacionado perto daqui. Procure Pitre Ferrence, ele deveria estar em algum lugar ao sul desta área. Pergunte a ele, não, diga a ele que gostaríamos de sua ajuda neste assunto. Leve as peles com você também, ele pode precisar delas. \""
"Ferris Blueheart in Vidaria said, \"We cannot let that happen. We cannot let the demons fuse with the Frostbelches. [Ferris looks around, clearly panicked.] I'm afraid we have no choice. We have to destroy the Frostbelches before it's too late. My heart goes out to the cute little creatures, but there really is no other way.

I hate to ask you to do this, but I need you to deal with as many Frostbelches as you can.\"": "Ferris Blueheart em Vidaria disse: \"Não podemos deixar isso acontecer. Não podemos deixar os demônios se fundirem com os Frostbelches. [Ferris olha em volta, claramente em pânico.] Receio que não tenhamos escolha. Temos que destruir os Frostbelches antes que seja tarde demais. Meu coração está com as criaturinhas fofas, mas realmente não há outra maneira.

Odeio pedir que você faça isso, mas preciso que você lide com o maior número possível de Arrotos de Gelo.\""
"Ferris Blueheart in Vidaria said, \"We've studied the minions and the Behemoths pretty exhaustively, but there's still a lot we don't know about the highest ranks: the Overseers and the Justiciars. I would love to observe their inner workings and see how they stack up to the others. You know what to do.\"": "Ferris Blueheart em Vidaria disse: \"Estudamos exaustivamente os minions e os Behemoths, mas ainda há muito que não sabemos sobre os escalões mais altos: os Supervisores e os Justiciars. Eu adoraria observar seu funcionamento interno e ver como eles se comparam aos outros. Você sabe o que fazer.\""
"Ferris Blueheart in Vidaria said, \"You've been incredibly helpful in my research thus far, but we've only been dealing with the minions. I still have many questions about the higher ranks of the demons.

We should start by examining the large ones. I've noticed that one of them seems more in-charge than the other, despite no obvious physical differences. The brains have been so helpful in the past, and you've proven that you're clearly capable of extracting them, so bring me some from each, if you don't mind.\"": "Ferris Blueheart em Vidaria disse: \"Você tem sido incrivelmente útil em minha pesquisa até agora, mas só temos lidado com os lacaios. Ainda tenho muitas perguntas sobre os escalões mais altos dos demônios.

Deveríamos começar examinando os grandes. Percebi que um deles parece mais responsável do que o outro, apesar de não haver diferenças físicas óbvias. Os cérebros foram muito úteis no passado, e você provou que é claramente capaz de extraí-los, então traga-me um pouco de cada um, se não se importar.\""
