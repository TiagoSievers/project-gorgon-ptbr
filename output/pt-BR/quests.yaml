"Denton Razor said that some of my jewelry was sold to a fence in town. Everybody knows who the town fence is: that filthy human who runs the bar on the docks. Cynthia Rolfe! Go berate her until she relinquishes my jewelry!": "Denton Razor disse que algumas das minhas joias foram vendidas para um vendedor na cidade. Todo mundo sabe quem é o cercador da cidade: aquele humano imundo que administra o bar nas docas. Cinthia Rolfe! Vá repreendê-la até que ela desista das minhas joias!"
"Denton Razor said that someone named 'Engineer Crall' in Vidaria bought some of my jewelry. Find this Crall and convince them to return the stolen goods!": "Denton Razor disse que alguém chamado “Engenheiro Crall” em Vidaria comprou algumas de minhas joias. Encontre este Crall e convença-os a devolver os bens roubados!"
"Denton Razor?! The famous thief? But that's absurd: he steals from the rich and gives to the poor!

Oh no. Oh no! By Statehelm standards I <i>am</i> rich! I was just regular-wealthy back home.

But <i>now</i> I'm poor. So Denton Razor should give to me! Maybe you could speak with him?": "Navalha Denton?! O famoso ladrão? Mas isso é um absurdo: ele rouba dos ricos e dá aos pobres!

Oh não. Oh não! Pelos padrões da Statehelm eu <i>sou</i> rico! Eu era simplesmente rico em casa.

Mas <i>agora</i> sou pobre. Então Denton Razor deveria me dar! Talvez você pudesse falar com ele?"
"Desadaptativo": "adjetivo: não proporciona ajuste adequado ou apropriado ao ambiente ou situação."
"Desculpe por isso": "acidentalmente baixei meus padrões por um segundo. Tudo melhor agora!\""
