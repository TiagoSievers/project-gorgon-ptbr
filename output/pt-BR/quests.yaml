"Next I need perfect snake skins. That's a lot less weird of a request than usual. I sometimes even have these in stock! But not right now.": "Em seguida, preciso de peles de cobra perfeitas. Esse é um pedido muito menos estranho do que o normal. Às vezes até tenho isso em estoque! Mas não agora."
"Next I need to better understand how demons are so resistant to fire. Go and kill some of the medium-sized ones.

Oh, and wear this. It will automatically take detailed field notes.

<i>[To advance this quest you must be wearing the Fire Analysis Gem and using Fire Magic.]</i>": "A seguir preciso entender melhor como os demônios são tão resistentes ao fogo. Vá e mate alguns dos de tamanho médio.

Ah, e use isso. Ele fará automaticamente anotações de campo detalhadas.

<i>[Para avançar nesta missão você deve estar usando a Gema de Análise de Fogo e usar Magia de Fogo.]</i>"
