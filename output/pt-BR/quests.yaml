"Floxie has been helping me gather local flowers to test as dyes, but the ocelots keep running her off. I told her not to be afraid of little kittens, and she told me to go get my own flowers! Can you clear some of them out for me? If anyone can deal with harmless felines, it's you!": "Floxie tem me ajudado a colher flores locais para testar como corantes, mas as jaguatiricas continuam a expulsá-la. Eu disse a ela para não ter medo de gatinhos, e ela me disse para ir buscar minhas próprias flores! Você pode limpar alguns deles para mim? Se alguém pode lidar com felinos inofensivos, é você!"
