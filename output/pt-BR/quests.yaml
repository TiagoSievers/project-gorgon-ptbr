"Rita in Serbule has asked you to discover the secret of Marna's beautiful long hair. Marna is a shopkeeper in Serbule.": "Rita em Serbule pediu que você descobrisse o segredo dos lindos cabelos longos de Marna. Marna é lojista em Serbule."
"Rita in Serbule wants you to deliver some soap she made to Helena who lives in Eltibule, and can be found \"somewhere in one of those little mini-castle things\".": "Rita em Serbule quer que você entregue um sabonete que ela fez para Helena que mora em Eltibule, e pode ser encontrado \"em algum lugar daquelas coisinhas de mini-castelo\"."
