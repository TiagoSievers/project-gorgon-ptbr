"Great work on the troll-slaying. And trolls are true immortals, so killing them isn't even that big of a deal. They'll be reborn in just a few years! Hopefully they'll make better decisions next time.": "Excelente trabalho na matança de trolls. E os trolls são verdadeiros imortais, então matá-los não é grande coisa. Eles renascerão em apenas alguns anos! Esperamos que eles tomem decisões melhores na próxima vez."
"Great work! I can turn this negative emotion into healing and warmth. Here, take this as thanks. In the future, you can convert these pearls directly via the evil spiky mirror.": "Ótimo trabalho! Posso transformar essa emoção negativa em cura e calor. Aqui, aceite isso como um agradecimento. No futuro, você poderá converter essas pérolas diretamente através do espelho pontiagudo do mal."
"Great work! Now get out of town! If the constabulary catches you, you'll be imprisoned. Fly, fool! Go!": "Ótimo trabalho! Agora saia da cidade! Se a polícia te pegar, você será preso. Voe, idiota! Ir!"
"Great work. Leave the rest to me -- I've never made candy before, but I don't think it can be that hard. We're gonna be rich! Come see me tomorrow and I'll give you a sample.": "Ótimo trabalho. Deixe o resto comigo: nunca fiz doces antes, mas não acho que seja tão difícil. Seremos ricos! Venha me ver amanhã e eu lhe darei uma amostra."
"Great! Fewer trolls stinking up the place! Of course, new squads of trolls arrive almost constantly, so you're really wasting your time. But that's okay! Please... waste more time!

Here's some precious cargo.": "Ótimo! Menos trolls fedendo o lugar! É claro que novos esquadrões de trolls chegam quase constantemente, então você está realmente perdendo seu tempo. Mas tudo bem! Por favor... perca mais tempo!

Aqui está uma carga preciosa."
"Great! I hope you convinced the Frostbelches to simply give you a sliver of skin peacefully. <i>[Ferris swallows nervously.]</i>

Let me perform some research on these to determine what our next step is.": "Ótimo! Espero que você tenha convencido os Arrotos de Gelo a simplesmente lhe dar um pedaço de pele pacificamente. <i>[Ferris engole nervosamente.]</i>

Deixe-me realizar algumas pesquisas sobre isso para determinar qual é o nosso próximo passo."
"Great! I mean, these are incredibly disgusting, but great, thanks for doing that! Now let me teach you how to handle a saber like a real elf!": "Ótimo! Quero dizer, isso é incrivelmente nojento, mas ótimo, obrigado por fazer isso! Agora deixe-me ensiná-lo a manusear um sabre como um elfo de verdade!"
"Great! Look, see this bump here? <i>He points to an almost imperceptible bump on one of the skulls.</i> Associated with feelings of neglect. And here, this skull has the same rise! All of the people here seem to have had low self esteem. How odd, I have to study this further.

 Oh, right after you left, I remembered there's a <i>much</i> easier way to get skulls. You can just use a skull extractor on corpses! Here, you can take mine.": "Ótimo! Olha, está vendo esse caroço aqui? <i>Ele aponta para uma protuberância quase imperceptível em um dos crânios.</i> Associada a sentimentos de negligência. E aqui, esta caveira tem a mesma ascensão! Todas as pessoas aqui parecem ter baixa auto-estima. Que estranho, tenho que estudar mais isso.

 Ah, logo depois que você saiu, lembrei que existe uma maneira <i>muito</i> mais fácil de conseguir caveiras. Você pode simplesmente usar um extrator de crânio em cadáveres! Aqui, você pode pegar o meu."
"Great! Now I can start to work repairing my bow. Here, would you like some leather?": "Ótimo! Agora posso começar a trabalhar consertando meu arco. Aqui, você gostaria de um pouco de couro?"
"Great! You gather the ingredients, I'll get them painted. We're making a great team!": "Ótimo! Você reúne os ingredientes, eu vou pintá-los. Estamos formando uma ótima equipe!"
"Great, thanks! I'm going to feed these to the rat in town. He loves flowers!": "Ótimo, obrigado! Vou dar isso para o rato da cidade. Ele adora flores!"
"Great, you didn't explode! And you look a little fitter and leaner, too!

That fairy is trying to use these mushrooms to recharge the wall turrets. Seems pretty insane, huh? But we did our part already! Now we can just watch. Marrowchomp's giving me 3-to-1 odds he explodes. Want in?": "Ótimo, você não explodiu! E você parece um pouco mais em forma e mais magro também!

Aquela fada está tentando usar esses cogumelos para recarregar as torres da parede. Parece muito insano, hein? Mas já fizemos a nossa parte! Agora podemos apenas observar. Marrowchomp está me dando chances de 3 para 1 de que ele exploda. Quer entrar?"
"Great. I will take a look at whatever they send over. It's the least I can do after my outburst.": "Ótimo. Vou dar uma olhada no que eles enviarem. É o mínimo que posso fazer depois da minha explosão."
"Great. Now get lost so I can bathe. Here's some cash for your trouble.": "Ótimo. Agora vá embora para que eu possa tomar banho. Aqui está algum dinheiro pelo seu problema."
"Great. Thanks. Now please get off the docks. I'm expecting a big ship to come in any minute.": "Ótimo. Obrigado. Agora, por favor, saia das docas. Espero que um grande navio chegue a qualquer minuto."
