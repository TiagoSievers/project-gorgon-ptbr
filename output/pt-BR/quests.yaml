"Braigon in Eltibule said, \"Are you still stuck on the tofu thing? Tofu is useless on its own, that's why I stopped pursuing it. It's not really worth eating alone, like cheese is! I could teach you some nice cheese recipes instead ... No?

Okay. Well I'm working on some Roquefort, and I need pungent rennet. Get it for me and I'll teach you a simple tofu recipe.\"": "Braigon em Eltibule disse: \"Você ainda está preso à coisa do tofu? O tofu é inútil por si só, é por isso que parei de persegui-lo. Não vale a pena comer sozinho, como o queijo! Em vez disso, eu poderia lhe ensinar algumas boas receitas de queijo... Não?

Ok. Bem, estou trabalhando em um pouco de Roquefort e preciso de coalho picante. Pegue para mim e eu lhe ensinarei uma receita simples de tofu.\""
"Braigon in Eltibule said, \"I'm working on some mozzarella right now. Bring me some whey and we'll talk about the tofu.\"": "Braigon, em Eltibule, disse: \"Estou trabalhando em um pouco de mussarela agora. Traga-me um pouco de soro de leite e conversaremos sobre o tofu.\""
"Braigon in Eltibule said, \"Now you know the most bland, basic tofu dish. Take that back to your rakshasa and see what he thinks.

And if you want to know how to make fancier kinds of tofu, I suppose I could trade that fancy knowledge for some fancy cheese...\"": "Braigon em Eltibule disse: \"Agora você conhece o prato de tofu mais básico e insípido. Leve isso de volta ao seu rakshasa e veja o que ele pensa.

E se você quiser saber como fazer tipos mais sofisticados de tofu, suponho que poderia trocar esse conhecimento sofisticado por um queijo sofisticado...\""
"Braigon in Eltibule said, \"Tofu can be made in three main ways. Firm tofu is used when the recipe calls for a protein that won't fall apart! I can teach you how to make it in exchange for a fresh Brunost cheese.\"": "Braigon, em Eltibule, disse: \"O tofu pode ser feito de três maneiras principais. O tofu firme é usado quando a receita pede uma proteína que não se desfaz! Posso ensiná-lo a prepará-lo em troca de um queijo Brunost fresco.\""
"Braigon in Eltibule said, \"Tofu can be made in three main ways. Soft tofu is even mushier than regular tofu. Personally I think it tastes disgusting, but perhaps you're more cultured than me!

I can teach you how to make it in exchange for a fresh brie.\"": "Braigon em Eltibule disse: \"O tofu pode ser feito de três maneiras principais. O tofu macio é ainda mais pastoso do que o tofu normal. Pessoalmente, acho que tem um gosto nojento, mas talvez você seja mais culto do que eu!

Posso te ensinar como fazer isso em troca de um brie fresco.\""
"Braigon mentioned needing more animal stomachs to make rennet.": "Braigon mencionou a necessidade de mais estômagos de animais para fazer coalho."
"Braigon mentioned needing more milk.": "Braigon mencionou que precisava de mais leite."
"Braigon needs more quarter hoops for barrel making.": "Braigon precisa de mais argolas para fazer barris."
"Braigon wants a perfect cow hide for an experimental cheese he's making.

(Perfect Cow Hides come from expert skinners who have mastered bovine anatomy. They're quite rare!)": "Braigon quer uma pele de vaca perfeita para um queijo experimental que está fazendo.

(Perfect Cow Hides vem de esfoladores especialistas que dominam a anatomia bovina. Eles são muito raros!)"
"Braigon was right -- cranberry <i>is</i> amazing, even with fake turkey. Thanks!": "Braigon estava certo: cranberry é incrível, mesmo com peru falso. Obrigado!"
"Brain": "Cérebro"
