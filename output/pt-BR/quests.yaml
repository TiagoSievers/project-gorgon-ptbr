"Iridium": "Irídio"
"Irkima in Red Wing Casino said, \"As I understand it, our Ri-Shin tree should be decorated with items that evoke memories of our venue. Several customers told me that when they think of Red Wing, they think of 'rollin' the bones'. I do not know why they associate grim body parts with our lovely establishment, but I'm sure it's another racist anti-insect thing. These connotations are hurtful, but we aim to make our guests happy, so bones it is!

Unfortunately I used up my supply of bones during some recent shamanic infusion experiments... do you happen to have a surplus? Do not concern yourself with their rollability; any bones will do at this stage.\"": "Irkima, do Red Wing Casino, disse: \"Pelo que entendi, nossa árvore Ri-Shin deve ser decorada com itens que evoquem memórias de nosso local. Vários clientes me disseram que quando pensam em Red Wing, pensam em 'rolar os ossos'. Não sei por que eles associam partes sombrias do corpo ao nosso adorável estabelecimento, mas tenho certeza de que é outra coisa racista anti-insetos. Essas conotações são prejudiciais, mas nosso objetivo é fazer nossos convidados felizes, então ossos são!

Infelizmente eu esgotei meu estoque de ossos durante alguns experimentos recentes de infusão xamânica... por acaso você tem um excedente? Não se preocupe com a rolabilidade deles; qualquer osso serve nesta fase.\""
"Irkima in Red Wing Casino said, \"At the Ri-Shin celebration in Statehelm, the trees are lit with fairy lights! Our tree must be lit as well. There are a few fairy shopkeepers in the employ of the casino, and Laphylla says she can place a glamour on our tree... but she demands payment in a substance called 'pixie sugar'. Can you obtain this?\"": "Irkima, no Red Wing Casino, disse: \"Na celebração Ri-Shin em Statehelm, as árvores são iluminadas com luzes de fadas! Nossa árvore também deve ser iluminada. Há alguns lojistas de fadas a serviço do cassino, e Laphylla diz que pode colocar um glamour em nossa árvore... mas ela exige o pagamento em uma substância chamada 'açúcar pixie'. Você pode obter isso? \""
"Irkima in Red Wing Casino said, \"I have a pigeon with a broken wing, and I am in need of some supplies to try and heal it. There is a special realm where Phoenixes dwell that is occupied by the Fae.
Go there and kill these creatures until you can get a good, undamaged phoenix feather. I can use the feather's regenerative abilities to help accelerate the healing process. Bring the feather back to me as soon as you can! I need it as fresh as possible.\"": "Irkima, no Red Wing Casino, disse: \"Tenho um pombo com a asa quebrada e preciso de alguns suprimentos para tentar curá-lo. Existe um reino especial onde vivem as Fênix que é ocupado pelos Fae.
Vá até lá e mate essas criaturas até conseguir uma pena de fênix boa e intacta. Posso usar as habilidades regenerativas da pena para ajudar a acelerar o processo de cura. Traga a pena de volta para mim assim que puder! Preciso que seja o mais fresco possível.\""
"Irkima in Red Wing Casino said, \"I have been instructed to sell more 'baubles and trinkets' to appeal to drunken bipeds with lots of cash. They often ask for lucky tokens, so I wish to procure some rabbit feet. If you bring me three, I shall pay 1200 Councils for them, plus some Red Wing Tokens.\"": "Irkima, no Red Wing Casino, disse: \"Fui instruído a vender mais 'bugigangas e bugigangas' para atrair bípedes bêbados com muito dinheiro. Eles costumam pedir fichas da sorte, então desejo adquirir alguns pés de coelho. Se você me trouxer três, pagarei 1.200 Conselhos por eles, mais algumas fichas Red Wing. \""
"Irkima in Red Wing Casino said, \"I have given you my recipe for the bird feed we use here. Collect the ingredients and bring me 10 units of it back.

<i>You can find the recipe in the Lore category of your recipe book.</i>\"": "Irkima, do Red Wing Casino, disse: “Dei a você minha receita para a ração para pássaros que usamos aqui. Reúna os ingredientes e traga-me 10 unidades.

<i>Você pode encontrar a receita na categoria Lore do seu livro de receitas.</i>\""
"Irkima in Red Wing Casino said, \"I need the assistance of a Red Wing named Mandibles. She will only aid me if I produce something called 'paralytic chicken meat'.

The meat of several different bird-like creatures would work, but Mandibles said the most accessible meat is in a tower in Kur. I cannot go to Kur, it is too cold. She knows this and she taunts me with knowledge I cannot use! Please aid me?\"": "Irkima, do Red Wing Casino, disse: \"Preciso da ajuda de uma Red Wing chamada Mandibles. Ela só me ajudará se eu produzir algo chamado 'carne de frango paralisante'.

A carne de várias criaturas parecidas com pássaros funcionaria, mas Mandibles disse que a carne mais acessível está em uma torre em Kur. Não posso ir para Kur, está muito frio. Ela sabe disso e me provoca com conhecimentos que não posso usar! Por favor me ajude?\""
"Irkima in Red Wing Casino said, \"I'm feeling a little foolish about this, but could I trouble you to go back where you were and get me a fresh phoenix egg? I know I should have asked you before, but I completely forgot about it. I mix the egg with the feed for sickly pigeons to aid in healing.
I have asked to speak with the Queen about your request, and will let her know of your extra effort to aid me.\"": "Irkima, do Red Wing Casino, disse: \"Estou me sentindo um pouco tolo com isso, mas posso incomodá-lo para voltar onde estava e me trazer um ovo de fênix fresco? Eu sei que deveria ter perguntado antes, mas esqueci completamente. Eu misturo o ovo com a ração para pombos doentes para ajudar na cura.
Pedi para falar com a Rainha sobre o seu pedido e contarei a ela sobre o seu esforço extra para me ajudar.\""
"Irkima in Red Wing Casino said, \"It was a mistake to speak with my superior about personal matters. While conversing amicably to my boss, Qatik, I mentioned my attraction to Tavilak. Qatik became emotional and demanded that I never mate with Tavilak. I suspect Qatik wants to mate with me herself. I enjoy Qatik's company more than any other Red Wing mantis, but I am not interested in mating with her. Could you explain this to Qatik for me? Make it seem like the topic is entirely your idea.\"": "Irkima no Red Wing Casino disse: \"Foi um erro falar com meu superior sobre assuntos pessoais. Enquanto conversava amigavelmente com meu chefe, Qatik, mencionei minha atração por Tavilak. Qatik ficou emocionado e exigiu que eu nunca acasalasse com Tavilak. Suspeito que Qatik queira acasalar comigo mesma. Gosto da companhia de Qatik mais do que qualquer outro louva-a-deus Red Wing, mas não estou interessado em acasalar com ela. Você poderia explicar isso a Qatik para mim? Faça parecer como se o assunto fosse inteiramente ideia sua.\""
"Irkima in Red Wing Casino said, \"Please speak to Tavilak about her previous mates -- the ones she killed. Why did she do it? Is this why she is unwilling to mate with me?\"": "Irkima no Red Wing Casino disse: \"Por favor, fale com Tavilak sobre seus companheiros anteriores - aqueles que ela matou. Por que ela fez isso? É por isso que ela não está disposta a acasalar comigo?\""
"Irkima in Red Wing Casino said, \"Red Wing is famous for our gaming, so I proposed we use Monsters and Mantids game chips on the tree. However, our game chips are very valuable and we fear inebriated guests may purloin them.

Dorimir suggests we instead use the worthless 'game chips' that are often used in home games. If you could just find a few examples of these chips, I'll have our goblin maintenance team create more.\"": "Irkima, do Red Wing Casino, disse: \"Red Wing é famoso por nossos jogos, então propus que usássemos fichas de jogo Monstros e Louva-a-deus na árvore. No entanto, nossas fichas de jogo são muito valiosas e tememos que hóspedes embriagados possam roubá-las.

Dorimir sugere que, em vez disso, utilizemos as “fichas de jogo” inúteis que são frequentemente utilizadas em jogos caseiros. Se você pudesse encontrar apenas alguns exemplos desses chips, pedirei à nossa equipe de manutenção goblin que crie mais.\""
"Irkima in Red Wing Casino said, \"The tree is supposed to be topped with a personalized symbol of our culture. Dorimir suggested that we use a large top hat, since mantises love hats so much. He was being mirthful, but his suggestion has merit!

As the casino's official calligrapher, I am of course skilled in creating elaborate paper props. I've fashioned a suitable top hat, but its bow is not sufficiently festive: I need a better shade of red dye! I believe crushed rose petals will be suitable. Are those easy to find?\"": "Irkima, do Red Wing Casino, disse: \"A árvore deveria ter no topo um símbolo personalizado de nossa cultura. Dorimir sugeriu que usássemos uma cartola grande, já que os louva-a-deus adoram chapéus. Ele estava sendo alegre, mas sua sugestão tem mérito!

Como calígrafo oficial do cassino, sou naturalmente hábil na criação de elaborados adereços de papel. Fiz uma cartola adequada, mas seu laço não é suficientemente festivo: preciso de um tom melhor de tinta vermelha! Acredito que pétalas de rosa esmagadas serão adequadas. São fáceis de encontrar?\""
"Is that elf ready for the ornaments? Good. Now don't drop these, they're antique, and they're made of glass! Actually, you know what... I'll bring them to Echur myself. Thanks.": "Esse elfo está pronto para os enfeites? Bom. Agora não deixe cair estes, eles são antigos e são feitos de vidro! Na verdade, quer saber... eu mesmo os levarei para Echur. Obrigado."
"Is that... yes! You found them! These are going to be great in my collection of ancient burial rites!

Hm? Magical? Oh, no, these aren't magical. They're just a traditional thing dwarves do. But they never let outsiders have them! Very exciting! Here. Let me give you something for your trouble!": "Isso é... sim! Você os encontrou! Eles serão ótimos em minha coleção de ritos funerários antigos!

Hum? Mágico? Oh, não, isso não é mágico. Eles são apenas uma coisa tradicional que os anões fazem. Mas eles nunca permitem que estranhos os tenham! Muito emocionante! Aqui. Deixe-me dar-lhe algo pelo seu problema!"
"Is this it? Augh! It screamed into my brain! You should have warned me!

But good. Yes. Yesss... this is perfect!  Well done.": "É isso? Ah! Gritou em meu cérebro! Você deveria ter me avisado!

Mas bom. Sim. Simmm... isso é perfeito!  Bom trabalho."
"Is this it? Thank you! Oh, thank you so much. I can already feel it working... I can think straight! You've been a good friend. Here, let me give you something in return.": "É isso? Obrigado! Ah, muito obrigado. Já sinto que está funcionando... consigo pensar direito! Você tem sido um bom amigo. Aqui, deixe-me lhe dar algo em troca."
"Is this premium fat? It looks like shitty fat to me. And it stinks! Ugghh... this is disgusting! This is how you make candles!? Screw this!": "Isso é gordura premium? Parece uma gordura de merda para mim. E fede! Uggh... isso é nojento! É assim que você faz velas!? Dane-se isso!"
"Is this premium fat? It looks like shitty fat to me. And it stinks! Ugghh... this is disgusting! This is how you make candles!? Screw this!

": "Isso é gordura premium? Parece uma gordura de merda para mim. E fede! Uggh... isso é nojento! É assim que você faz velas!? Dane-se isso!"
"Is this the first fae silk blanket you ever made? Hah! I don't care, it's just to smother a fire. You did good.": "Este é o primeiro cobertor de seda fada que você fez? Hah! Não me importo, é só para abafar o fogo. Você fez bem."
"Is this... a tulip!? Oh, it's so ugly! I love it! What a dumb flower! Haha! I kind of expected something different. But I'll take it home and draw it for my upcoming botanical art book. Thanks!": "Isso é... uma tulipa!? Ah, é tão feio! Eu amo isso! Que flor idiota! Haha! Eu meio que esperava algo diferente. Mas vou levar para casa e desenhar para meu próximo livro de arte botânica. Obrigado!"
"Is this... zombified meat?! Are you certain this is safe to eat? Well...

Hm...

No, this one isn't for me. I can tell it's well prepared, but the fact that the meat is still squirming is just... Anyway, thank you for the experience.": "Isso é... carne zumbificada?! Você tem certeza de que isso é seguro para comer? Bem...

Hum...

Não, este não é para mim. Posso dizer que está bem preparado, mas o fato da carne ainda estar se contorcendo é só... De qualquer forma, obrigado pela experiência."
"IsLongtimeAnimal": "É um animal de longa data"
"IsNotGuest": "Não é Convidado"
"Isso é uma piada. Deixa para lá. Aqui": "Floxie sugeriu esta receita para me distrair dos besouros, mas agora não preciso dela.\""
"IsVampire": "É Vampiro"
"IsWarden": "É Diretor"
"It appears that the \"entrance exam\" to become a student of Statehelm's bard college requires you to slay some sort of creature.": "Parece que o “exame de admissão” para se tornar um aluno da faculdade de bardos de Statehelm exige que você mate algum tipo de criatura."
"It gets so boring eating Hogan's cooking! What I wouldn't do for some fruit cocktail. Any kind would do, really. I'm not picky.": "Fica tão chato comer a comida do Hogan! O que eu não faria por um coquetel de frutas. Qualquer tipo serviria, na verdade. Eu não sou exigente."
"It is as I feared: this snail meat is poisoned with traces of that weird metal they mine down there. That explains why the ratkin don't eat them!

Hmm. The meat almost seems rotted from within, as if a druid had cast Rotflesh on it. Hmm? No, not \"Rotskin\"... what's Rotskin? I mean Rotflesh! The druid spell? Oh... this must be another one of those differences between druid types. Why don't I teach you our version?": "É como eu temia: a carne deste caracol está envenenada com vestígios daquele metal estranho que eles extraem lá embaixo. Isso explica por que os ratkin não os comem!

Hum. A carne quase parece podre por dentro, como se um druida tivesse lançado Carne Podre sobre ela. Hum? Não, não é \"Rotskin\"... o que é Rotskin? Quero dizer, Rotflesh! O feitiço druida? Ah... essa deve ser mais uma daquelas diferenças entre os tipos druidas. Por que não te ensino nossa versão?"
"It is atypical for members of my species to desire the destruction of meatlings. However, the snails in this cavern are of egregious proportions and they enjoy consuming many of the same food sources that I do. They also enjoy consuming me directly. For this reason, I request their dissolution.": "É atípico que membros da minha espécie desejem a destruição de carnes. No entanto, os caracóis nesta caverna são de proporções flagrantes e gostam de consumir muitas das mesmas fontes de alimento que eu. Eles também gostam de me consumir diretamente. Por este motivo, solicito a sua dissolução."
"It is difficult to remember what beast is a true immortal and what is not. But I have invented something in the human tongue to help! Bury bears. Because they are mortal, you see? \"Bury bears\"? Go and practice until this trick is burned into your mind.": "É difícil lembrar qual animal é um verdadeiro imortal e qual não é. Mas inventei algo na língua humana para ajudar! Enterre ursos. Porque eles são mortais, entende? \"Enterrar ursos\"? Vá e pratique até que esse truque esteja gravado em sua mente."
"It is done? Good. I tip my hat to you. Top o' the morning, as they say in your idiom.": "Está feito? Bom. Tiro meu chapéu para você. No início da manhã, como dizem no seu idioma."
"It is mine again! Mine! As it should be! Wait... it is broken!

You fool! How could you break... no! I will control my anger! Remember the past, Gasu'um! Remember!

<i>[Gasu'um glares at you a while until she regains her composure.]</i>

Thank you. Here is coin for your... for your effort.

I can repair the necklace. You will help me, and I will reward you.": "É meu de novo! Meu! Como deveria ser! Espere... está quebrado!

Seu idiota! Como você pôde quebrar... não! Vou controlar minha raiva! Lembre-se do passado, Gasu'um! Lembrar!

<i>[Gasu'um olha para você por um momento até recuperar a compostura.]</i>

Obrigado. Aqui está uma moeda pelo seu... pelo seu esforço.

Posso consertar o colar. Você vai me ajudar e eu vou recompensá-lo."
"It is never a happy day when I must order trolls killed. But... well, they WILL come back in a few years. It's still cruel, though. But you did as requested, and I am sufficiently pleased!": "Nunca é um dia feliz quando devo ordenar a morte de trolls. Mas... bem, eles voltarão em alguns anos. Ainda é cruel, no entanto. Mas você fez o que lhe foi pedido e estou bastante satisfeito!"
"It is poison to our kind, but we can overcome it and grow even mightier. Collect wolfsbane and bring it here as an offering.": "É um veneno para a nossa espécie, mas podemos superá-lo e ficar ainda mais poderosos. Colete acônito e traga-o aqui como oferenda."
"It is unfortunate when mortals become pawns in fairy politics. Unfortunate for the pawns, of course, but also for us. Mortals' behavior is hard for us to predict. It appears the best approach may be to use other mortals.": "É lamentável quando os mortais se tornam peões na política das fadas. Infelizmente para os peões, claro, mas também para nós. O comportamento dos mortais é difícil de prever. Parece que a melhor abordagem pode ser usar outros mortais."
"It is very sad, I know, but she is under the control of Tidal's renegade myconians. Look on the bright side": "tenders are just meatlings, not mushrooms! Oh, I guess that doesn't help you, does it.\": \"Obrigado por ajudar a esclarecer algumas propostas, mas ainda há tantas!"
"It is with relief that I acknowledge your completion of this task! You will find this substance to be of value.": "É com alívio que reconheço a conclusão desta tarefa! Você descobrirá que esta substância tem valor."
"It looks like another Doctrine-Keeper took the last one's place. If you take care of that one, too, I'll give you something for your troubles.": "Parece que outro Guardião de Doutrina tomou o lugar do último. Se você cuidar disso também, eu lhe darei algo para seus problemas."
"It looks like the glass we used in the earlier repair isn't strong enough": "it actually melted inside the machine, and the mess took me hours to remove. Instead of glass, let's try diamonds. Those are super strong, right?"
"It looks like you know your way around an organ knife. I could use someone like you! On a contractual basis, of course. Here's the pay for this one. I have more requests if you have time.": "Parece que você conhece bem uma faca de órgão. Eu poderia usar alguém como você! Numa base contratual, claro. Aqui está o pagamento por este. Tenho mais pedidos se você tiver tempo."
"It may be because I'm already very drunk, but this is delicious! You're ready for a trickier wine!": "Pode ser porque já estou muito bêbado, mas está uma delícia! Você está pronto para um vinho mais complicado!"
"It may be hard to find a scout that hasn't eaten all their beetles yet... I know! Look for especially thin scouts.\\\"\": \"Bendith, no Reino Fae, disse": "“A última vez que fui banido da Corte Winter, tive o bom senso de me preparar primeiro."
"It was a mistake to speak with my superior about personal matters. While conversing amicably to my boss, Qatik, I mentioned my attraction to Tavilak. Qatik became emotional and demanded that I never mate with Tavilak. I suspect Qatik wants to mate with me herself. I enjoy Qatik's company more than any other Red Wing mantis, but I am not interested in mating with her. Could you explain this to Qatik for me? Make it seem like the topic is entirely your idea.": "Foi um erro falar com meu superior sobre assuntos pessoais. Enquanto conversava amigavelmente com meu chefe, Qatik, mencionei minha atração por Tavilak. Qatik ficou emocionado e exigiu que eu nunca acasalasse com Tavilak. Suspeito que Qatik queira acasalar comigo. Gosto da companhia de Qatik mais do que qualquer outro louva-a-deus Red Wing, mas não estou interessado em acasalar com ela. Você poderia explicar isso para Qatik para mim? Faça parecer que o assunto é inteiramente ideia sua."
"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.": "Foi bom você me ver. Temo pelo futuro desta pequena cidade, e não é por causa das escassas criaturas que vagam pelo deserto. Não, o problema vem das profundezas da areia. Aprendi que há milhares de soldados da Hegemonia Crone lá embaixo, deixados para trás depois de uma guerra relativamente recente. Eles estão criando, tramando e muito, muito zangados. É apenas uma questão de tempo até que eles se levantem e reivindiquem o deserto. Você deve atacar enquanto eles ainda estão fracos e despreparados. Procure as entradas dos túneis e acabe com o perigo."
"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.

Oh! And since you'll be heading down there anyway, perhaps you could collect some items for me? I mean, it'd be foolish to waste this opportunity to study Hegemony weapons...": "Foi bom você me ver. Temo pelo futuro desta pequena cidade, e não é por causa das escassas criaturas que vagam pelo deserto. Não, o problema vem das profundezas da areia. Aprendi que há milhares de soldados da Hegemonia Crone lá embaixo, deixados para trás depois de uma guerra relativamente recente. Eles estão criando, tramando e muito, muito zangados. É apenas uma questão de tempo até que eles se levantem e reivindiquem o deserto. Você deve atacar enquanto eles ainda estão fracos e despreparados. Procure as entradas dos túneis e acabe com o perigo.

Oh! E já que você irá para lá de qualquer maneira, talvez pudesse coletar alguns itens para mim? Quero dizer, seria tolice desperdiçar esta oportunidade estudando armas da Hegemonia..."
"It wasn't the sheep upsetting our tornado friends. It's the tigers! Tigers can't hurt tornadoes, but our tornadoes are juveniles and don't really understand that.

The whirlwinds say there's a huge tiger on the hill east of here, near the lookout tower. They call her Windbiter because she viciously attacks them! Completely harmlessly, of course, but it's still not polite. Can you get rid of this big cat and her entourage?": "Não foram as ovelhas que perturbaram nossos amigos tornados. São os tigres! Os tigres não podem ferir tornados, mas nossos tornados são juvenis e realmente não entendem isso.

Os redemoinhos dizem que há um tigre enorme na colina a leste daqui, perto da torre de observação. Eles a chamam de Windbiter porque ela os ataca violentamente! Completamente inofensivo, é claro, mas ainda assim não é educado. Você consegue se livrar desse grande felino e de sua comitiva?"
"It went off without a hitch, then? I was worried that they couldn't be trusted. I hope I was wrong.

Thank you for helping my daughter. I have another request of you, if you have time.": "Correu sem problemas, então? Eu estava preocupado que eles não fossem confiáveis. Espero estar errado.

Obrigado por ajudar minha filha. Tenho outro pedido para você, se tiver tempo."
"It will have extreme regeneration, just as it did in the egg": "you'll need to light it on fire to prevent that. Fortunately, weapons work better than they do on the egg, but there's an extra complication: this spider has a very venomous bite!"
"It worked! So the Pixie Pocket is as I remembered: a slurry of peaches and coagulated goat emissions. ... Well, this was definitely named by mortals, then. Take it away before its stench angers me.": "Funcionou! Então o Pixie Pocket é como eu me lembrava: uma pasta de pêssegos e emissões coaguladas de cabra. ... Bem, isso foi definitivamente nomeado pelos mortais, então. Leve-o embora antes que seu fedor me irrite."
"It would calm my spores to know Senzur was deceased. He is a mighty psychic presence, and he is quite dangerous. To find him, head down the hall and turn right. Then a left. Then right. If you run into Greta the garden tender then you have failed to follow my very simple instructions.": "Acalmaria meus esporos saber que Senzur estava falecido. Ele é uma presença psíquica poderosa e bastante perigoso. Para encontrá-lo, siga pelo corredor e vire à direita. Depois uma esquerda. Então certo. Se você encontrar Greta, a jardineira, então não seguiu minhas instruções muito simples."
"It'll soon be time for outdoor grilling again! And my grill was destroyed by orcs. But I can fix it! What I can't fix is the lack of fuel. How can I make perfect food without perfect fuel? It's impossible! I need spruce wood chips!": "Em breve chegará a hora de grelhar ao ar livre novamente! E minha grelha foi destruída por orcs. Mas eu posso consertar isso! O que não consigo consertar é a falta de combustível. Como posso fazer comida perfeita sem combustível perfeito? É impossível! Preciso de lascas de madeira de abeto!"
"It's almost unknowable, the Brain symbol. But you must have its secrets! This will be taxing on your own brain, but you will find the knowledge you need or die trying!": "É quase incognoscível, o símbolo do Cérebro. Mas você deve ter seus segredos! Isso será desgastante para o seu cérebro, mas você encontrará o conhecimento que precisa ou morrerá tentando!"
"It's been almost a decade since I heard from my daughter. Last I heard she'd taken up with filthy human \"sage\" who promised to teach her secret human knowledge. Ha! Human knowledge! Anyway, the sage traveled here and then contacted Sinda and told her to come find him. I'm sure they're both dead by now. But I want to know. Please bring me proof of Sinda's death.

In the note, he told her to find his lean-to under a giant boulder. He said he could just hear the sounds of a waterfall.": "Já se passou quase uma década desde que tive notícias da minha filha. A última vez que ouvi, ela havia se envolvido com um “sábio” humano imundo que prometeu ensinar-lhe o conhecimento humano secreto. Ha! Conhecimento humano! De qualquer forma, o sábio viajou até aqui e então contatou Sinda e disse-lhe para vir procurá-lo. Tenho certeza de que ambos já estão mortos. Mas eu quero saber. Por favor, traga-me uma prova da morte de Sinda.

No bilhete, ele disse a ela para encontrar seu alpendre sob uma pedra gigante. Ele disse que conseguia ouvir apenas o som de uma cachoeira."
"It's coming up on that time of year again: the anniversary of my Lennel's death at the hands of a bear. I was wondering if you could do a poor widow a favor. Could kill some bears for me? I'm not too particular about the type of bear. I hate all bears! Every one of them. And they're a menace to humanity, that's what I say. They kill humans! Why do we allow them to live?! I'll tell you why: magic's made us soft. People don't go out of town anymore so they don't realize how deadly the bears are. But you and I, we're no fools.": "Está chegando aquela época do ano novamente: o aniversário da morte do meu Lennel nas mãos de um urso. Eu queria saber se você poderia fazer um favor a uma viúva pobre. Poderia matar alguns ursos para mim? Não sou muito exigente quanto ao tipo de urso. Eu odeio todos os ursos! Cada um deles. E são uma ameaça para a humanidade, é o que digo. Eles matam humanos! Por que permitimos que eles vivam?! Vou lhe dizer por quê: a magia nos tornou moles. As pessoas não saem mais da cidade para não perceberem o quão mortais os ursos são. Mas você e eu não somos tolos."
"It's complete? Well well well. That should put an end to his incessant interference on the Sub-Council. You've done an admirable job.": "Está completo? Bem, bem, bem. Isso deverá pôr fim à sua incessante interferência no Subconselho. Você fez um trabalho admirável."
"It's crucial that you can push an opponent off-kilter with just an entrancing ditty. Go and practice on reasonably-dangerous opponents.": "É crucial que você consiga desequilibrar um oponente apenas com uma cantiga fascinante. Vá e pratique em oponentes razoavelmente perigosos."
"It's done?! ... Wait, I saw that guy run by just a minute ago. You didn't kill anybody! But I like your chutzpah, you really sold that lie with your body language.": "Está feito?! ... Espere, eu vi aquele cara passando correndo há apenas um minuto. Você não matou ninguém! Mas eu gosto da sua ousadia, você realmente vendeu essa mentira com sua linguagem corporal."
"It's got to be one of those dreadful talking pets that wizards love so much. They never mind their pets at all, and now this one's taken to a life of crime! Take care of the matter for me, won't you?\\\"\": \"Elune, em Statehelm, disse": "\\\"Ouvi um boato que é estúpido demais para NÃO ser verdade. Aparentemente, um coelho coberto de joias foi visto pulando em um cano de esgoto fora da cidade. Parece viver lá embaixo."
"It's illegal to cremate the dead, of course, because they might come back as ghosts. But burying them's hardly better! The graveyard southwest of town is the worst case I've ever seen. Can you clean it up a bit?": "É ilegal cremar os mortos, claro, porque eles podem voltar como fantasmas. Mas enterrá-los não é melhor! O cemitério a sudoeste da cidade é o pior caso que já vi. Você pode limpar um pouco?"
"It's just so boring here! I figured maybe I could get a card game going. But I need some supplies! Can you get me some game chips? Whatever denomination doesn't matter. I just need a handful of them to get the games started!": "É tão chato aqui! Achei que talvez pudesse começar um jogo de cartas. Mas preciso de alguns suprimentos! Você pode me trazer algumas fichas de jogo? Qualquer que seja a denominação, não importa. Eu só preciso de um punhado deles para começar os jogos!"
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>amazing armor patch kits</b>. Can you make some for me?

My uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "É meu trabalho manter o tio Tremmond trabalhando em sua capacidade máxima, e ele está quase sem <b>incríveis kits de remendos de armadura</b>. Você pode fazer alguns para mim?

Meu tio segue rigorosamente as regras da guilda de artesanato dos anões. Isso significa que não posso aceitar ferramentas que você não criou!"
