"Far from here, on a freezing plateau in Gazluk, there is a city of orcs. Find this place and sneak into their keep. I need you to assassinate some important people... and creatures... for political reasons. This will be dangerous; bring allies that you trust. Here's a list of those who must die. Remember, all of these are on the top floor of the keep. You don't need to go into the lower level.": "Longe daqui, em um planalto gelado em Gazluk, existe uma cidade de orcs. Encontre este lugar e entre furtivamente em sua fortaleza. Preciso que você assassine algumas pessoas importantes... e criaturas... por razões políticas. Isto será perigoso; traga aliados em quem você confia. Aqui está uma lista daqueles que devem morrer. Lembre-se de que tudo isso está no último andar da fortaleza. Você não precisa ir para o nível inferior."
"Farsight Flemmings in Statehelm said, \"A soldier told me a very peculiar tale yesterday, and I think I know what's going on. But it's too dangerous for me to investigate! Can you do it?

The soldier said she was in Vidaria, fighting back demons, when she saw a big slab of steak lying in one of the demon craters. She said the meat was sentient, and that when she investigated, it attacked her and fended her off.

I bet that steak is still out there in one of those craters. Can you bring it to me?\"": "O clarividente Flemmings em Statehelm disse: \"Um soldado me contou uma história muito peculiar ontem, e acho que sei o que está acontecendo. Mas é muito perigoso para mim investigar! Você pode fazer isso?

A soldado disse que estava em Vidaria, lutando contra demônios, quando viu um grande pedaço de bife em uma das crateras dos demônios. Ela disse que a carne era senciente e que, quando investigou, a atacou e a rechaçou.

Aposto que aquele bife ainda está em uma daquelas crateras. Você pode trazê-lo para mim?\""
"Farsight Flemmings in Statehelm said, \"Here's an order for pieces of bugs. Wait, aren't aktaari those man-sized bugs? ... Good luck with this one.\"": "Farsight Flemmings em Statehelm disse: \"Aqui está um pedido de pedaços de insetos. Espere, os aktaari não são aqueles insetos do tamanho de um homem?... Boa sorte com este.\""
"Farsight Flemmings in Statehelm said, \"Here's an order from a craniologist. I need skulls of a specific quality.\"": "Farsight Flemmings, em Statehelm, disse: \"Aqui está uma ordem de um craniologista. Preciso de crânios de uma qualidade específica.\""
"Farsight Flemmings in Statehelm said, \"Here's the story I was told: a traveler had stopped at the old inn in Vidaria. It's mostly abandoned, but it's still got a sturdy roof, and it was raining. While it rained, he cooked an incredible piece of beef on the stove.

Just as he was adding some unusual herbs he'd found, a bolt of lightning struck the chimney! The traveler avoided harm, but the piece of steak was blasted and blackened. And then... he says the steak got up and tried to kill him, so he ran out into the night rain.

I hadn't put too much faith in his story, but we should see if it's true.

Go to the inn in Vidaria and recreate the same situation by burning some high-quality beef. I'll give you precise instructions.

Oh and be prepared to defend yourself.\"": "Farsight Flemmings em Statehelm disse: \"Aqui está a história que me contaram: um viajante parou na velha estalagem em Vidaria. Está praticamente abandonada, mas ainda tem um telhado resistente e estava chovendo. Enquanto chovia, ele cozinhou um incrível pedaço de carne no fogão.

No momento em que ele estava adicionando algumas ervas incomuns que encontrou, um raio atingiu a chaminé! O viajante evitou o dano, mas o pedaço de bife ficou queimado e enegrecido. E então... ele disse que o bife se levantou e tentou matá-lo, então ele saiu correndo na chuva noturna.

Eu não coloquei muita fé na história dele, mas deveríamos ver se é verdade.

Vá à estalagem da Vidaria e recrie a mesma situação queimando carne de boa qualidade. Vou lhe dar instruções precisas.

Ah, e esteja preparado para se defender.\""
"Farsight Flemmings in Statehelm said, \"Hmm. I know what THIS order's for. But that' s not our business. Just get the skin.\"": "O clarividente Flemmings em Statehelm disse: \"Hmm. Eu sei para que serve ESTA ordem. Mas isso não é da nossa conta. Basta pegar a pele.\""
"Farsight Flemmings in Statehelm said, \"I know a lot of weird rituals, but even I don't know what they want this for. Some of these should be easy to find, and some... less so. \"": "Farsight Flemmings em Statehelm disse: \"Conheço muitos rituais estranhos, mas nem eu sei para que eles querem isso. Alguns deles devem ser fáceis de encontrar, e outros... nem tanto.\""
"Farsight Flemmings in Statehelm said, \"Most of my customers are out-of-town orders. Quite expensive stuff. Say! You wouldn' t be interested in helping me fill some orders, would you? Like this one for skulls and brains?\"": "Farsight Flemmings em Statehelm disse: \"A maioria dos meus clientes são pedidos de fora da cidade. Coisas muito caras. Diga! Você não estaria interessado em me ajudar a atender alguns pedidos, não é? Como este para crânios e cérebros?\""
"Farsight Flemmings in Statehelm said, \"The craniologist loved the skulls and ordered another batch! These need to be \"astonishingly impressive\" though.\"": "Farsight Flemmings em Statehelm disse: \"O craniologista adorou os crânios e encomendou outro lote! No entanto, eles precisam ser\" surpreendentemente impressionantes \".\""
"Farsight Flemmings in Statehelm said, \"This is a complicated bundle order from someone who's obsessed with dragonkin. The hassle is huge but the pay is good.\"": "Farsight Flemmings em Statehelm disse: \"Este é um pedido complicado de alguém que é obcecado por dragonkin. O incômodo é enorme, mas o pagamento é bom.\""
