"Joeh in Serbule asked you for a pig snout. \" You need to be a pretty good skinner in order to get one, though.\"": "Joeh em Serbule pediu um focinho de porco. \"Mas você precisa ser um bom esfolador para conseguir um.\""
"Joeh in Serbule asked you to kill a tiger called \"Old Fangsworth\", rumored to live somewhere north of Serbule.": "Joeh em Serbule pediu para você matar um tigre chamado \"Old Fangsworth\", que dizem viver em algum lugar ao norte de Serbule."
"Joeh in Serbule asked you to obtain some intact eyes from slain tigers. \"Intact ones are pretty hard to find, but if you kill enough tigers I'm sure you'll get them.\"": "Joeh em Serbule pediu para você obter alguns olhos intactos de tigres mortos. \"Os intactos são muito difíceis de encontrar, mas se você matar tigres suficientes, tenho certeza de que os pegará.\""
"Joeh in Serbule asked you to retrieve a bunch of shoddy leather rolls.": "Joeh, em Serbule, pediu que você recuperasse um monte de rolos de couro de má qualidade."
