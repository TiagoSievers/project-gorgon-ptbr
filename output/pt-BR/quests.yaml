"Coldfeather": "Pena Fria"
"Coldfeather is dead? Huh. I guess I expected to feel better about that, since cleaning frozen bird poop is extremely unfun. But actually I'm kind of sad.

Well, there's more brood hippogriffs, and I'm sure we'll get a new one soon. Unless you blow up the ship first! Here's hoping!

Hey, what's that up there?! Hah, made you look! Hmm? Oh, no, it's just a memory injector. Do you feel the memory? Then it worked! This 'coffee' thing isn't a fairy invention, though. Actually, we found it on the mortal realm! But it's pretty good. Maybe some day you'll be able to make some. Or not. Who cares.": "Pena Fria está morta? Huh. Acho que esperava me sentir melhor com isso, já que limpar cocô de pássaro congelado é extremamente desagradável. Mas na verdade estou um pouco triste.

Bem, há mais ninhadas de hipogrifos e tenho certeza de que teremos um novo em breve. A menos que você exploda o navio primeiro! Aqui está a esperança!

Ei, o que é isso aí?! Hah, fez você olhar! Hum? Ah, não, é apenas um injetor de memória. Você sente a memória? Então funcionou! Essa coisa de ‘café’ não é uma invenção de fada. Na verdade, encontramos no reino mortal! Mas é muito bom. Talvez algum dia você consiga fazer alguns. Ou não. Quem se importa."
