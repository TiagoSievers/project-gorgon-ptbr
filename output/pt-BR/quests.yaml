"Topazes": "Topázios"
"Torana said, \"BACON! Who doesn't like bacon? Well, maybe those crazy vegans don't. If I can't have bacon while we're out on the road, I can at least take the smell of it with me! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Nice Bacon Candles? I'll trade some of my knowledge for it!\"": "Torana disse: \"BACON! Quem não gosta de bacon? Bem, talvez aqueles veganos malucos não gostem. Se eu não puder comer bacon enquanto estivermos na estrada, posso pelo menos levar o cheiro dele comigo! Ainda estou esperando meu salário de Orran para comprar suprimentos para fazer o meu próprio. Você poderia criar e me trazer 10 lindas velas de bacon? Trocarei um pouco do meu conhecimento por isso!\""
"Torana said, \"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Amazing Brisk Candles? I'll trade some of my knowledge and a token for it!\"": "Torana disse: \"Preciso de algumas velas para ajudar a inspirar esses caras a lutarem mais quando estivermos lá fora e tivermos que nos preparar para a batalha. Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas incríveis e vivas? Trocarei um pouco do meu conhecimento e um token por isso!\""
"Torana said, \"I need some candles to help kill the odor of musty crafters in our wagons! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Floral Candles? I'll trade some of my knowledge and a token for it!\"": "Torana disse: \"Preciso de algumas velas para ajudar a matar o odor de mofo dos artesãos em nossos vagões! Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas florais decentes? Trocarei um pouco do meu conhecimento e um token por isso!\""
"Torana said, \"I need to figure out how to get these fools more into nature but need something a little stronger for some of these guys. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Astounding Woodland Candles? I'll trade some of my knowledge and some tokens for it!\"": "Torana disse: \"Preciso descobrir como trazer esses idiotas mais para a natureza, mas preciso de algo um pouco mais forte para alguns desses caras. Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas surpreendentes da floresta? Trocarei um pouco do meu conhecimento e algumas fichas por isso!\""
"Torana said, \"I need to figure out how to get these fools more into nature. I'm still waiting on my stipend from Orran to go buy supplies. Could you craft and bring me 10 Rough Woodland Candles? I'll trade some of my knowledge for it!\"": "Torana disse: \"Preciso descobrir como trazer esses idiotas mais para a natureza. Ainda estou esperando minha bolsa de Orran para comprar suprimentos. Você poderia criar e me trazer 10 velas ásperas da floresta? Trocarei um pouco do meu conhecimento por isso!\""
"Torgan in New Prestonbule said, \"My new hammer must have a handle of impeccable quality. Spruce is, of course, the ideal wood for gripping, but its strength is substandard... except for very occasional pieces of spruce. I need those perfect specimens of spruce wood!\"": "Torgan em New Prestonbule disse: \"Meu novo martelo deve ter um cabo de qualidade impecável. O abeto é, obviamente, a madeira ideal para agarrar, mas sua resistência é inferior... exceto para peças muito ocasionais de abeto. Preciso daqueles espécimes perfeitos de madeira de abeto!\""
"Torgan in New Prestonbule said, \"Snapley told me the pitiful tale of the settlement outside. Here is a detail he did not know: the strike was ordered by General Naurlok himself, and was executed by his elite legion. And here is where things become interesting. For you see, ghosts often retain something of what they had when they died. And if they died with spear heads from Naurlok's Avengers still stuck in them... that metal is precious! I cannot even make it myself.

You should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.\"": "Torgan em New Prestonbule disse: \"Snapley me contou a lamentável história do assentamento lá fora. Aqui está um detalhe que ele não sabia: o ataque foi ordenado pelo próprio General Naurlok e executado por sua legião de elite. E é aqui que as coisas se tornam interessantes. Para você ver, os fantasmas muitas vezes retêm algo do que tinham quando morreram. E se eles morreram com pontas de lança dos Vingadores de Naurlok ainda presas neles... esse metal é precioso! Eu não consigo nem fazer isso sozinho.

Você deveria destruir alguns desses fantasmas e ver se consegue encontrar metal orc. Pagarei em Conselhos.\""
"Torgan in New Prestonbule said, \"The metal that humans use is weak and deficient. I use it to make horseshoes and tools, but never for armor. Armor requires the astounding metal found in the mines of Gazluk! In fact, it can often be found exposed at the tops of mountains here. I will pay a bounty for a pile of it, for I must repair Vughal's helmet, and I will not use feeble metal!\"": "Torgan em New Prestonbule disse: \"O metal que os humanos usam é fraco e deficiente. Eu o uso para fazer ferraduras e ferramentas, mas nunca para armaduras. A armadura requer o metal surpreendente encontrado nas minas de Gazluk! Na verdade, muitas vezes pode ser encontrado exposto no topo das montanhas aqui. Pagarei uma recompensa por uma pilha dele, pois devo consertar o capacete de Vughal e não usarei metal fraco! \""
