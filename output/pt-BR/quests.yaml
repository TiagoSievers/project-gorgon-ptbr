"Two Thousand Potatoes": "Duas Mil Batatas"
"Two years ago the Council started a \"green up the city\" initiative, where anyone who wanted to grow plants in the city would get free maintenance from utility golems. Those utility golems have all been repurposed for the war effort -- I mean the demonic incident -- and now the city is overgrowing with weeds! I trust you can handle weeding a plant? Most of them are indoors, so you may have to poke around for them. Oh, also, take that opportunity to put a fertilizer stick in the soil. I have some for sale or trade -- don't worry, you'll make your money back!

<i>[To weed a plant, place the Weed Plants ability on your sidebar, obtain Fertilizer Sticks, then stand near a weedy potted plant and use the Weed Plants ability.]</i>": "Há dois anos, o Conselho iniciou uma iniciativa “ecologizar a cidade”, onde qualquer pessoa que quisesse cultivar plantas na cidade receberia manutenção gratuita de golens utilitários. Esses golens utilitários foram todos reaproveitados para o esforço de guerra - quero dizer, o incidente demoníaco - e agora a cidade está coberta de ervas daninhas! Eu confio que você consegue arrancar ervas daninhas de uma planta? A maioria deles está dentro de casa, então você pode ter que procurá-los. Ah, aproveite também para colocar um bastão de fertilizante no solo. Tenho alguns para venda ou troca - não se preocupe, você receberá seu dinheiro de volta!

<i>[Para remover ervas daninhas de uma planta, coloque a habilidade Plantas Daninhas na barra lateral, obtenha Varetas Fertilizantes, fique perto de um vaso de plantas com ervas daninhas e use a habilidade Plantas Daninhas.]</i>"
"TwoThousandPotatoes": "Duas Mil Batatas"
"Tyler Green asked you to bring him some Simple Metal Slabs, which are most easily obtained via Surveying. He intimated that Jaime Fatholm in Serbule Hills might know how to survey ores.": "Tyler Green pediu que você trouxesse algumas placas de metal simples, que são mais facilmente obtidas por meio de levantamento. Ele insinuou que Jaime Fatholm, em Serbule Hills, poderia saber como pesquisar minérios."
"Tyler Green asked you to get him some oranges or lemons so his teeth don't all fall out.": "Tyler Green pediu para você comprar laranjas ou limões para ele não cair todos os dentes."
"Tyler Green in Serbule Hills said, \"I can fight goblins. I can fight spiders. But the frogs? Those 'ranalons', as they call themselves? They're just too thick in number. It's too hard to fight 'em one at a time!

But, uh... I told our pretty waitress that I'd killed thousands of 'em. Can you help me out? I just need one of their hideous tongues as a 'souvenir' to show to Lana.\"": "Tyler Green em Serbule Hills disse: \"Eu posso lutar contra goblins. Eu posso lutar contra aranhas. Mas os sapos? Aqueles 'ranalons', como eles se chamam? Eles são muito numerosos. É muito difícil lutar contra eles, um de cada vez!

Mas, uh... eu disse à nossa linda garçonete que matei milhares deles. Você pode me ajudar? Eu só preciso de uma de suas línguas horríveis como ‘lembrança’ para mostrar para Lana.”"
"Tyler Green in Serbule Hills said, \"I'll tell you one of the reasons I'm so depressed. I was exploring a bit and I found a cave close by, just down the road a ways, a little north and east of here. There's this corpse in there that had a note, and apparently there were people that needed saving, so I rushed in like old times, bashing spiders everywhere! And then, somehow, I was overrun by spiders, a dozen of 'em or more. I threw my backup shield at a big one and ran. But that was my second-most favorite shield!  Now I'm left with only my favorite shield and my third-favorite shield. And fourth-favorite. I feel so empty.

Hey, if you find that cave, grab the shield for me? I'm not sure where I was, but I remember I didn't go up any slopes, if that helps.\"": "Tyler Green, em Serbule Hills, disse: \"Vou lhe contar uma das razões pelas quais estou tão deprimido. Eu estava explorando um pouco e encontrei uma caverna perto, logo abaixo na estrada, um pouco ao norte e a leste daqui. Há um cadáver lá que tinha uma nota, e aparentemente havia pessoas que precisavam ser salvas, então corri como nos velhos tempos, atacando aranhas por toda parte! E então, de alguma forma, fui invadido por aranhas, uma dúzia delas ou mais. Joguei meu escudo reserva em um grande problema e corri. Mas esse era meu segundo escudo favorito. Agora me resta apenas meu escudo favorito e meu terceiro escudo favorito. E me sinto tão vazio.

Ei, se você encontrar aquela caverna, pegue o escudo para mim? Não tenho certeza de onde estava, mas lembro que não subi nenhuma ladeira, se isso ajuda.\""
"Ugh, I stink. I know it, you don't have to make that face! Ain't bathed in days. Ukorga's out of soap again. What a moron. You got any soap by chance?": "Ugh, eu estou fedendo. Eu sei, você não precisa fazer essa cara! Não tomo banho há dias. Ukorga está sem sabão novamente. Que idiota. Você tem algum sabonete por acaso?"
"Ugh, the stench! But this does look like a good hide. Thanks. Here.": "Ugh, o fedor! Mas isso parece uma boa pele. Obrigado. Aqui."
"Ugh, they stink! Just... put them over there. Now, what do I owe you? Oh, right, you were doing me a favor! So I owe you nothing but my thanks. Thanks!

Fine, fine, here, take this money also.": "Ugh, eles fedem! Apenas... coloque-os ali. Agora, o que devo a você? Ah, certo, você estava me fazendo um favor! Portanto, não lhe devo nada além do meu agradecimento. Obrigado!

Tudo bem, tudo bem, aqui, pegue esse dinheiro também."
"Ugh, this is the rankest cheese ya've brought me yet! And hopefully the last! Dwarves weren't made to eat cheese, I tell ya!": "Ugh, este é o queijo mais nojento que você já me trouxe! E espero que seja o último! Os anões não foram feitos para comer queijo, eu te digo!"
"Ugh. These aren't fresh at all! Which means they aren't growing crops down here after all, these must be bartered from caravans. Unfortunately I can't learn much from roots that are this old!

Hm, how do I explain the problem to a monster like you? They're like books of knowledge, but the books have gotten wet, and ... wait, do you know what a book is? Oh, nevermind! You did fine, here's your shiny.": "Eca. Estes não são nada frescos! O que significa que eles não estão cultivando aqui, afinal, eles devem ser trocados com caravanas. Infelizmente não consigo aprender muito com raízes tão antigas!

Hm, como posso explicar o problema para um monstro como você? São como livros de conhecimento, mas os livros ficaram molhados e... espere, você sabe o que é um livro? Ah, deixa pra lá! Você se saiu bem, aqui está o seu brilho."
"Ugh. This stuff is gross. Thanks, though. I use it for everything from potions to food seasoning. Hm? Oh, a reward? Uh... here. This is... valuable, maybe?": "Eca. Essa coisa é nojenta. Obrigado, no entanto. Eu o uso para tudo, desde poções até temperos alimentares. Hum? Ah, uma recompensa? Uh... aqui. Isso é... valioso, talvez?"
"Uh, are these fresh? I didn't mean you should go out and kill...  Wait... <i>[Trasen studies the lures]</i> These are very unusual indeed. I need to examine these more closely. Here: these powders should be fair trade.": "Uh, estes são frescos? Eu não quis dizer que você deveria sair e matar... Espere... <i>[Trasen estuda as iscas]</i> Elas são realmente muito incomuns. Preciso examiná-los mais de perto. Aqui: esses pós deveriam ser de comércio justo."
"Uh... that's a LOT bigger than I expected! You must have found a huge automaton! Thanks for grabbing the gear for me. And hey, good thing the automaton wasn't still functioning, huh?

Hmm, I bet I could make a new kind of automaton with this! Come back later and I'll teach you what I discover.": "Uh... isso é MUITO maior do que eu esperava! Você deve ter encontrado um autômato enorme! Obrigado por pegar o equipamento para mim. E ei, ainda bem que o autômato ainda não estava funcionando, hein?

Hmm, aposto que poderia fazer um novo tipo de autômato com isso! Volte mais tarde e eu lhe ensinarei o que descobri."
"Ukorga asked you to collect some Unrefined Silver Ore.": "Ukorga pediu que você coletasse Minério de Prata Não Refinado."
"Ukorga in the Kur Mountains asked you for Cedar Wood Chips to keep the kitchen stocked.": "Ukorga, nas montanhas Kur, pediu lascas de madeira de cedro para manter a cozinha abastecida."
"Ukorga in the Kur Mountains asked you for lots of Trophy Wolf Skins.": "Ukorga nas montanhas Kur pediu muitas skins de lobo troféu."
"Ukorga in the Kur Mountains asked you for Tufts of Fur.": "Ukorga nas Montanhas Kur pediu Tufos de Pele."
"Ukorga in the Kur Mountains asked you for Wool.": "Ukorga nas montanhas Kur pediu lã para você."
"Ukorga in the Kur Mountains asked you to procure some nice chairs.": "Ukorga, nas montanhas Kur, pediu que você comprasse algumas cadeiras bonitas."
