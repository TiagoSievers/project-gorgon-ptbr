"Red in Kur Mountains said, \"Oh good, you're here! There's a new threat to the wildlife of Kur: a huge swarm of hook beasts! They normally live in the yeti caves beneath the ground, but I guess food has become too scarce. You'll find them north and east of the yeti crevice.\"": "Red nas montanhas Kur disse: \"Que bom, você está aqui! Há uma nova ameaça à vida selvagem de Kur: um enorme enxame de feras anzol! Eles normalmente vivem nas cavernas do Yeti abaixo do solo, mas acho que a comida se tornou muito escassa. Você os encontrará ao norte e ao leste da fenda do Yeti.\""
"Red in Kur Mountains said, \"Thanks for answering my summons. I know me and the Wardens don't always agree, but this one's bad: an invasion of werewolves! I don't know where they came from, but there's lots of 'em are prowling around northeast of here, along the beach past the orcs. Sanja's camp is too far northwest to be much help. So it's up to you!\"": "Red nas Montanhas Kur disse: \"Obrigado por atender minha convocação. Eu sei que eu e os Guardiões nem sempre concordamos, mas este é ruim: uma invasão de lobisomens! Não sei de onde eles vieram, mas há muitos deles rondando a nordeste daqui, ao longo da praia, passando pelos orcs. O acampamento de Sanja fica muito a noroeste para ser de muita ajuda. Então, depende de você!\""
"Red in Kur Mountains said, \"Well, if Spot likes you, I guess you're okay. With your help, we might make it through winter after all. But I'll warn you: you'll have to go up against werewolves. If you want to back out, I completely understand. I'm not stupid enough to take werewolves on either!\"": "Red nas montanhas Kur disse: \"Bem, se Spot gosta de você, acho que você está bem. Com sua ajuda, poderemos sobreviver ao inverno, afinal. Mas vou avisá-lo: você terá que enfrentar lobisomens. Se quiser desistir, eu entendo completamente. Também não sou estúpido o suficiente para enfrentar lobisomens!\""
"Red in Kur Mountains said, \"You're finally here! We have a panther problem. An orcish ship came in the night and unloaded hundreds of war panthers! They must be planning a war or something. But who cares about that! They let their panthers hunt freely all through yeti territory, which is also where most of the surviving fox dens are!

They're getting really close to this outpost, too. I saw one watching me from across the river earlier! I've programmed the turrets to target the panthers... but I don't know if they'll be enough. If Mittens and I are dead when you get back, please avenge us!\"": "Red nas montanhas Kur disse: \"Você finalmente chegou! Temos um problema com panteras. Um navio orc chegou durante a noite e descarregou centenas de panteras de guerra! Eles devem estar planejando uma guerra ou algo assim. Mas quem se importa com isso! Eles deixaram suas panteras caçarem livremente por todo o território dos Yeti, que também é onde está a maioria das tocas de raposas sobreviventes!

Eles estão chegando muito perto deste posto avançado também. Eu vi um me observando do outro lado do rio mais cedo! Programei as torres para atingir as panteras... mas não sei se serão suficientes. Se Mittens e eu estivermos mortos quando você voltar, por favor, vingue-nos!\""
