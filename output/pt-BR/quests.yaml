"Uriana in the fae realm said, \"At night, go south of here until you find the fiery birds, which are immortal like me, and seek the crimsonfelt moths, which are not immortal. Steal these moths' lives. Let the phoenices see you do it! That is the only way to make them understand what I understand.\"": "Uriana, no reino das fadas, disse: “À noite, vá para o sul daqui até encontrar os pássaros de fogo, que são imortais como eu, e procure as mariposas de feltro carmesim, que não são imortais."
"Uriana in the fae realm said, \"Go and pluck the wings from shimmerwings. Listen to their final dying words and then you will know what I know.\"": "Uriana no reino fae disse: \"Vá e arranque as asas das asas brilhantes. Ouça suas últimas palavras e então você saberá o que eu sei.\""
"Uriana in the fae realm said, \"I have been to the ancient ruins and I have meditated there. You, too, must go. Touch them. Feel their bones. Hear their words.\"": "Uriana, no reino feérico, disse: \"Estive nas ruínas antigas e meditei lá. Você também deve ir. Toque-os. Sinta seus ossos. Ouça suas palavras.\""
"Uriana in the fae realm said, \"I remember a thing! It is called a Pixie Pocket. So named by cruel mortals! Or... perhaps named by cruel fairies... I do not remember. But I think I remember the formula! Here: my notes. Make the Pixie Pocket. Tell me if my formula works.\"": "Uriana no reino fae disse: \"Eu me lembro de uma coisa! É chamado de Pixie Pocket. Assim chamado por mortais cruéis! Ou... talvez nomeado por fadas cruéis... não me lembro. Mas acho que me lembro da fórmula! Aqui: minhas anotações. Faça o Pixie Pocket. Diga-me se minha fórmula funciona.\""
"Uriana in the fae realm said, \"It is difficult to remember what beast is a true immortal and what is not. But I have invented something in the human tongue to help! Bury bears. Because they are mortal, you see? \"Bury bears\"? Go and practice until this trick is burned into your mind.\"": "Uriana, no reino das fadas, disse: \"É difícil lembrar qual animal é um verdadeiro imortal e qual não é. Mas eu inventei algo na língua humana para ajudar! Enterre ursos. Porque eles são mortais, entende? \"Enterre ursos\"? Vá e pratique até que este truque esteja gravado em sua mente.\""
"Uriana in the fae realm said, \"Listen for the buzz of bees at night. You will see that it is not bees who dwell in the night, it is wasps! Wasps who bask in the power the Winter Queen! They sting all who oppose her. You know what to do.\"": "Uriana, no reino feérico, disse: \"Ouça o zumbido das abelhas à noite. Você verá que não são as abelhas que vivem à noite, são as vespas! Vespas que se deleitam com o poder da Rainha do Inverno! Elas picam todos que se opõem a ela. Você sabe o que fazer.\""
"Uriana in the fae realm said, \"My horn hurts! It burns with righteousness! I need a new horn, a horn of dark! Fetch it fresh from the most despicable pixie you can. Go!\"": "Uriana, no reino feérico, disse: \"Meu chifre dói! Ele queima com justiça! Preciso de um chifre novo, um chifre das trevas! Pegue-o fresco do duende mais desprezível que puder. Vá!\""
"Uriana in the fae realm said, \"Pixies hunt; fairies hunt; panthers hunt! But one is not worthy! NOT WORTHY! They are not like us! They seethe with mortality! Can you not smell the mortality of the panthers?! Show them their mortality! SHOW THEM!\"": "Uriana no reino das fadas disse: \"Caçam duendes; caçam fadas; caçam panteras! Mas um não é digno! NÃO DIGNO! Eles não são como nós! Eles fervem de mortalidade! Você não consegue sentir o cheiro da mortalidade das panteras?! Mostre-lhes sua mortalidade! MOSTRE-OS!\""
"Uriana in the fae realm said, \"There is only one way to overcome the bees: let them sting you. Yes! Tell them to inject their hatred into you. INTO YOU, and yet you survive! Show them. Show them their hatred is unworthy.\"": "Uriana, no reino feérico, disse: \"Só há uma maneira de superar as abelhas: deixe-as picar você. Sim! Diga-lhes para injetarem seu ódio em você. EM VOCÊ, e ainda assim você sobreviverá! Mostre-lhes. Mostre-lhes que seu ódio é indigno.\""
"Uriana in the fae realm said, \"Yesterday I experienced fear. Why should I suffer fear?! I am immortal! Yet I did fear. I was hunted by another immortal: a true barghest, and I was afraid! I slew it, but I knew it would return, and so my fear only grew!

I do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!\"": "Uriana, no reino das fadas, disse: \"Ontem experimentei medo. Por que deveria sofrer medo?! Eu sou imortal! Mesmo assim, tive medo. Fui caçado por outro imortal: um verdadeiro barghest, e tive medo! Eu o matei, mas sabia que ele retornaria, e então meu medo só aumentou!

Eu não gosto de medo. Eu não gosto disso! Vá e encontre o novo corpo do barghest e derrote meu medo com suas ações!\""
