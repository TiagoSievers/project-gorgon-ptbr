"Greetings! Are you a druid? Or just psychic? I need your help either way!

Druids used growth magic on the fish here, which was nice at first. But one of the local clownfish managed to get a triple dose of magic and now he's out of control! He's massive! You can catch him when he hunts -- either at dusk or dawn. Please catch him!": "Saudações! Você é um druida? Ou apenas psíquico? Preciso da sua ajuda de qualquer maneira!

Os druidas usaram magia de crescimento nos peixes aqui, o que foi bom no início. Mas um dos peixes-palhaço locais conseguiu uma dose tripla de magia e agora está fora de controle! Ele é enorme! Você pode pegá-lo quando ele caçar – ao anoitecer ou ao amanhecer. Por favor, pegue-o!"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 amazing arrows? I would really appreciate it!": "Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente poderia usar alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 flechas incríveis? Eu realmente apreciaria isso!"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 Awesome Arrows? I would really appreciate it!": "Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente poderia usar alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 Flechas Incríveis? Eu realmente apreciaria isso!"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 basic arrows? I would really appreciate it!": "Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente poderia usar alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 flechas básicas? Eu realmente apreciaria isso!"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 expert arrows? I would really appreciate it!": "Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente poderia usar alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 flechas especializadas? Eu realmente apreciaria isso!"
"Greetings! Ready for advanced Bun-Fu lessons? Great!

In order to survive, you must be able to replenish your carrot supply no matter the conditions! Find a good, fertile plot of ground somewhere out here in the Kur Mountains and grow twelve carrots. Don't forget, you MUST grow these carrots while being a rabbit. If you want to be a non-rabbit gardener, then go talk to someone else! Once you are done, bring them to me for inspection and I shall reward you with some bunny juices.": "Saudações! Pronto para aulas avançadas de Bun-Fu? Ótimo!

Para sobreviver, você deve ser capaz de reabastecer seu suprimento de cenouras, independentemente das condições! Encontre um terreno bom e fértil em algum lugar aqui nas montanhas Kur e cultive doze cenouras. Não se esqueça, você DEVE cultivar essas cenouras sendo um coelho. Se você quer ser um jardineiro que não seja coelho, vá conversar com outra pessoa! Quando terminar, traga-os para mim para inspeção e eu o recompensarei com alguns sucos de coelho."
"Greetings, taker of fish. I cannot tell if you are a friend or foe of nature. If you be a friend, help make my home clean. A surface-walker dumped hundreds of bottles of rancid liquids in here, and then left. They are making fish sick.": "Saudações, pescador. Não sei dizer se você é amigo ou inimigo da natureza. Se você for um amigo, ajude a deixar minha casa limpa. Um caminhante da superfície despejou centenas de garrafas de líquidos rançosos aqui e depois foi embora. Eles estão deixando os peixes doentes."
"Gregory Pincackle": "Gregório Pincackle"
"Gregory Pincackle in Statehelm said, \"Hey, remember when you cleared out the animated legs in the graveyard? Well, they're back.

<i>[Gregory looks at you and raises his eyebrows.]</i>\"": "Gregory Pincackle em Statehelm disse: “Ei, lembra quando você eliminou as pernas animadas no cemitério?

<i>[Gregory olha para você e levanta as sobrancelhas.]</i>\""
"Gregory Pincackle in Statehelm said, \"Somebody needs to take care of all the damned leg bones wandering around in the graveyard! It's one thing to run away from a full skeleton but I'll be damned if I'm running away from a single leg. I was able to suspend disbelief at a whole fleshless body, but just one leg? One leg that for some reason kicks like a mule? I won't have it. It's an undignified way to die, and the graveyard needs all the dignity it can muster.

So as I say, <i>somebody</i> should do something about it. Somebody braver than the town guards.

<i>[Gregory looks at you.]</i>\"": "Gregory Pincackle em Statehelm disse: \"Alguém precisa cuidar de todos os malditos ossos das pernas vagando pelo cemitério! Uma coisa é fugir de um esqueleto completo, mas serei amaldiçoado se estiver fugindo de uma única perna. Consegui suspender a descrença em um corpo inteiro sem carne, mas apenas uma perna? Uma perna que por algum motivo chuta como uma mula? Não vou permitir. É uma maneira indigna de morrer, e o cemitério precisa de toda a dignidade que puder reunir.

Então, como eu digo, <i>alguém</i> deveria fazer algo a respeito. Alguém mais corajoso que os guardas da cidade.

<i>[Gregory olha para você.]</i>\""
"Greta Must Die": "Greta deve morrer"
"GretaMustDie": "Greta deve morrer"
"Gretchen in Eltibule asked you to find a crate of gratflower millet. She thinks there's some left in the storage tower in Eltibule Keep.": "Gretchen em Eltibule pediu que você encontrasse uma caixa de milheto gratflower. Ela acha que sobrou um pouco na torre de armazenamento em Eltibule Keep."
"Gretchen in Eltibule complained about a lack of sour cream.": "Gretchen, em Eltibule, reclamou da falta de creme de leite."
"Gretchen in Eltibule has pined for an exotic spice, \"muntok pepper\". It's a common spice among orcs, so you might be able to find some in the Kur Mountains.": "Gretchen, em Eltibule, ansiava por um tempero exótico, a \"pimenta muntok\". É um tempero comum entre os orcs, então você poderá encontrar algum nas Montanhas Kur."
"Gribburn in Hogan's Keep asked you for a bunch of long rubbery tongues from Ranalan Warriors. A tribe of them live in far-off Sun Vale, among other places.": "Gribburn, na Fortaleza de Hogan, pediu a você um monte de línguas longas e elásticas dos Guerreiros Ranalan. Uma tribo deles vive no distante Vale do Sol, entre outros lugares."
"Gribburn in Hogan's Keep asked you for a goblin hairpin.": "Gribburn, em Hogan's Keep, pediu a você um grampo de goblin."
"Gribburn in Hogan's Keep asked you for some eel kabobs.": "Gribburn, em Hogan's Keep, pediu alguns espetinhos de enguia."
