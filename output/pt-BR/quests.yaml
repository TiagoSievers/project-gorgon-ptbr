"Astute work. I shall make use of these.": "Trabalho astuto. Farei uso deles."
"At last! Now perhaps it will be possible to lie dormant without needing to expend energy to maintain core temperature! Ha ha! Oh, that is not a joke in your language. ... Nevermind.

There is a way to use the remnants of those slimes, combined with myconian give-offs, to enhance your own safety. Let me show you the method. Perhaps it will be useful to you in a future moon cycle.": "Afinal! Agora talvez seja possível permanecer adormecido sem precisar gastar energia para manter a temperatura central! Ha ha! Ah, isso não é uma piada na sua língua. ... Deixa para lá.

Existe uma maneira de usar os restos desses limos, combinados com resíduos miconianos, para aumentar sua própria segurança. Deixe-me mostrar o método. Talvez seja útil para você em um futuro ciclo lunar."
"At night, go south of here until you find the fiery birds, which are immortal like me, and seek the crimsonfelt moths, which are not immortal. Steal these moths' lives. Let the phoenices see you do it! That is the only way to make them understand what I understand.": "À noite, vá para o sul daqui até encontrar os pássaros de fogo, que são imortais como eu, e procure as mariposas de feltro carmesim, que não são imortais. Roube a vida dessas mariposas. Deixe as fenícias verem você fazer isso! Essa é a única maneira de fazê-los entender o que eu entendo."
"At the behest of an animal friend, you visited the Sacred Grotto in the Kur Mountains. But they wouldn't let you in! Instead you were sent to Sun Vale to speak with a talking pig named Norbert.": "A pedido de um amigo animal, você visitou a Gruta Sagrada nas Montanhas Kur. Mas eles não deixaram você entrar! Em vez disso, você foi enviado para Sun Vale para falar com um porco falante chamado Norbert."
"At the Ri-Shin celebration in Statehelm, the trees are lit with fairy lights! Our tree must be lit as well. There are a few fairy shopkeepers in the employ of the casino, and Laphylla says she can place a glamour on our tree... but she demands payment in a substance called 'pixie sugar'. Can you obtain this?": "Na celebração Ri-Shin em Statehelm, as árvores são iluminadas com luzes de fadas! Nossa árvore também deve estar acesa. Há algumas fadas lojistas a serviço do cassino, e Laphylla diz que pode colocar um glamour em nossa árvore... mas ela exige o pagamento em uma substância chamada 'açúcar pixie'. Você pode obter isso?"
