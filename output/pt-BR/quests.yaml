"During my exhile... no, I should say during my \"extended aid session\" here in Sun Vale, I desire to investigate potential new drug remedies. The carnivorous plants that grow on this island fascinate me. Sometimes you can obtain the dessicated remains of their last meal inside them. If you come upon these, please procure them for me.": "Durante meu exílio... não, devo dizer que durante minha \"sessão de ajuda prolongada\" aqui em Sun Vale, desejo investigar potenciais novos medicamentos. As plantas carnívoras que crescem nesta ilha fascinam-me. Às vezes você pode obter dentro deles os restos dessecados da última refeição. Se você encontrar isso, por favor, compre-os para mim."
"During my lifetime, I have invented but a single category of shamanic infusion. All the others came to me in the egg, but my rat-totem belts are unique! I wish to prepare more of my belts for the new hatchlings, but I need totemic parts. Can you get rat teeth for me?": "Durante a minha vida, inventei apenas uma única categoria de infusão xamânica. Todos os outros vieram até mim no ovo, mas meus cintos de totem de rato são únicos! Desejo preparar mais cintos para os novos filhotes, mas preciso de peças totêmicas. Você pode conseguir dentes de rato para mim?"
"Durstin behind the bar is good for a scrambled egg or a bit of fried bread, but he's just not willing to broaden his horizons! And yet right down the road is a rare delicacy: ranalan-style pickled fish! Get some for me. I'll convince him to try them some evening, and he'll finally see what he's been missing.

Look for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!": "Durstin atrás do bar é bom para comer um ovo mexido ou um pedaço de pão frito, mas ele simplesmente não está disposto a ampliar seus horizontes! E, no entanto, logo adiante há uma iguaria rara: peixe em conserva ao estilo ranalan! Pegue um pouco para mim. Vou convencê-lo a experimentá-los alguma noite e ele finalmente verá o que está perdendo.

Procure os ranalans ao redor do grande lago. Eles gostam de deixar potes de conserva fora de suas cabanas. E não se preocupe – eles não são realmente inteligentes, apenas parecem ser. Eu li tudo sobre eles na faculdade de bardo em Verta!"
"Durstin Tallow in Serbule Hills said, \"<i>[Durstin sighs.]</i> Very bad news. I was talking to Paul the lumberjack -- he's around here somewhere -- and he knew where the last chapter was. He said it was hidden in a box near the lumber mills east of here. So he went to go get it for me... and he ran into a pack of boars on the way back. And here's the kicker: one of the boars ate the pages!

Paul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!\"": "Durstin Tallow em Serbule Hills disse: \"<i>[Durstin suspira.]</i> Más notícias. Eu estava conversando com Paul, o lenhador - ele está por aqui em algum lugar - e ele sabia onde estava o último capítulo. Ele disse que estava escondido em uma caixa perto das serrarias a leste daqui. Então ele foi buscá-lo para mim... e encontrou um bando de javalis no caminho de volta. E aqui está o chute: um dos javalis comeu as páginas!

Paul está morrendo de medo desse javali. Ele o chamou de 'Mudtusks'. Parece pensar que é mais resistente do que um javali normal. Mas um javali é um javali, certo? Acho que se você se apressar poderá tirar as páginas da barriga. Vou pagar a mais! Depressa!\""
"Durstin Tallow in Serbule Hills said, \"I know exactly where this chapter is. Well, not exactly. There used to be a caretaker that lived on a hill south of here. George left years ago, but he told me he kept a chapter of the book in a box somewhere on his farm.

There's some dwarf living there now by the name of Sammie. Go search around the place, see if you can find the chapter.\"": "Durstin Tallow, em Serbule Hills, disse: \"Eu sei exatamente onde está este capítulo. Bem, não exatamente. Costumava haver um zelador que morava em uma colina ao sul daqui. George partiu anos atrás, mas ele me disse que guardava um capítulo do livro em uma caixa em algum lugar de sua fazenda.

Há um anão morando lá agora chamado Sammie. Vá procurar pelo local e veja se consegue encontrar o capítulo.\""
"Durstin Tallow in Serbule Hills said, \"I know my wife gave one of the chapters to old Julius Patton. He lives on the farm nearby. He's not a bad sort; explain things to him and see if he'll give the chapter to you.\"": "Durstin Tallow, em Serbule Hills, disse: \"Sei que minha esposa deu um dos capítulos ao velho Julius Patton. Ele mora em uma fazenda próxima. Ele não é mau tipo; explique as coisas a ele e veja se ele lhe dará o capítulo.\""
"Durstin Tallow in Serbule Hills said, \"My wife's diary says one of the chapters is hidden at her favorite reading spot. I guess that'd be the old watchtower overlooking the Serbule Hunting Lodge. Not a very safe reading spot these days! It's on a hill. Go past the lodge and climb the hills a little south of it.\"": "Durstin Tallow em Serbule Hills disse: \"O diário de minha esposa diz que um dos capítulos está escondido em seu local de leitura favorito. Acho que seria a velha torre de vigia com vista para o Serbule Hunting Lodge. Não é um local de leitura muito seguro hoje em dia! Fica em uma colina. Passe pelo alojamento e suba as colinas um pouco ao sul dele. \""
"Durstin Tallow in Serbule Hills said, \"One of the chapters is in that old spider-infested cave northeast of here. Tyler -- the drunk over there in the corner -- said he saw them when he was exploring, but he didn't think the pages were worth anything. And now he's too afraid to go back in.

He said they were on top of some cobweb-encrusted crates deep in the cave. I'll pay extra for that one, since it sounds dangerous.\"": "Durstin Tallow em Serbule Hills disse: \"Um dos capítulos está naquela velha caverna infestada de aranhas a nordeste daqui. Tyler - o bêbado ali no canto - disse que os viu quando estava explorando, mas não achou que as páginas valessem alguma coisa. E agora ele está com muito medo de voltar.

Ele disse que eles estavam em cima de algumas caixas incrustadas de teias de aranha no fundo da caverna. Pagarei a mais por isso, pois parece perigoso.\""
"Durstin Tallow in Serbule Hills said, \"That old bi-- err, old biddy Brianna Willer has one of the chapters. But she won't give it to me. Says my wife deserved... well, she won't give it to me. Can you snoop around her farm, see if you can find it?\"": "Durstin Tallow em Serbule Hills disse: \"Aquela velha bi-- err, velha biddy Brianna Willer tem um dos capítulos. Mas ela não quer dar para mim. Diz que minha esposa merecia... bem, ela não vai dar para mim. Você pode bisbilhotar a fazenda dela, ver se consegue encontrá-la?\""
