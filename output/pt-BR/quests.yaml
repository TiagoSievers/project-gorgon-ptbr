"Daisy in Sun Vale's Animal Town asked for some new blank books. She needs at least two of them because her hoofwriting is atrocious.": "Daisy em Animal Town de Sun Vale pediu alguns novos livros em branco. Ela precisa de pelo menos dois deles porque seu casco é horrível."
"Dalvos gave us healing! The power to heal! But magical healing cannot stop the pain! I need mundane healing! Bring it to me!": "Dalvos nos deu a cura! O poder de curar! Mas a cura mágica não pode parar a dor! Eu preciso de cura mundana! Traga para mim!"
"Dalvos isn't in Serbule. You need to find him. Eltibule is the next logical place to try.": "Dalvos não está em Sérbule. Você precisa encontrá-lo. Eltibule é o próximo lugar lógico para tentar."
