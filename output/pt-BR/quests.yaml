"She gave me a bunch of Rage to Heat bottles... we just need a few more.\\\"\": \"Rick Snapley em New Prestonbule disse": "\\\"Estou tentando reunir toda a caverna aqui, então envolvi os orcs na decoração também. Como raça, eles não são realmente conhecidos por suas decorações, mas Gasu'um coleta frascos de poções vazios, então vamos colocá-los na árvore!"
"She liked it? Oh, good! I was worried. She said she didn't want my help, but I figured that was just elves being stuck up about getting help from humans. I'm sure her bear problem is a thing of the past.

Here, take this as thanks: it's spider repellent!": "Ela gostou? Ah, que bom! Eu estava preocupado. Ela disse que não queria minha ajuda, mas imaginei que fossem apenas elfos sendo arrogantes em conseguir ajuda de humanos. Tenho certeza de que o problema do urso dela é coisa do passado.

Aqui, aceite isso como agradecimento: é repelente de aranha!"
"She said her hair is due to a potion? Like, magic shampoo? I don't believe that for a second. Sigh. Well, you tried, I guess. So thanks, I guess.": "Ela disse que o cabelo dela é por causa de uma poção? Tipo, shampoo mágico? Não acredito nisso nem por um segundo. Suspirar. Bem, você tentou, eu acho. Então, obrigado, eu acho."
"She said to suckle a treant? Well guess who's not coming to my party next month! She's such a stump anyway. I try to do some charity work and this is what I get! Anyway, thanks for delivering that for me.": "Ela disse para amamentar um ente? Bem, adivinhe quem não vem à minha festa no próximo mês! Ela é um idiota de qualquer maneira. Tento fazer algum trabalho de caridade e é isso que consigo! De qualquer forma, obrigado por entregar isso para mim."
"She wants more phlogiston in a week? That's great news! Here's your delivery fee. And more importantly, I introduced you to my teacher! Makara taught me basic Transmutation. She can probably teach you the fancier techniques, if you're nice enough to her.": "Ela quer mais flogisto em uma semana? Isso é uma ótima notícia! Aqui está sua taxa de entrega. E o mais importante, apresentei você ao meu professor! Makara me ensinou Transmutação básica. Ela provavelmente poderá lhe ensinar técnicas mais sofisticadas, se você for gentil o suficiente com ela."
"She's still alive? Great. Did she like the stuff? Oh. Well, I got it third-hand from a wolf in the desert, so... I did my best. Thanks for doing the delivery.": "Ela ainda está viva? Ótimo. Ela gostou das coisas? Oh. Bem, consegui-o em terceira mão, de um lobo no deserto, por isso... fiz o meu melhor. Obrigado por fazer a entrega."
