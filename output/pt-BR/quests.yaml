"Gareth Plumsy in Statehelm said, \"Hey, you've got to help me out again. BIG test coming up and I'm out of the juice! I need the cranked juice. Nothing else works anymore. I'll pay well!\"": "Gareth Plumsy em Statehelm disse: \"Ei, você tem que me ajudar de novo. GRANDE teste chegando e estou sem energia! Preciso do suco acionado. Nada mais funciona. Vou pagar bem!\""
"Gareth Plumsy in Statehelm said, \"I have a big test coming up at school and I need to be at my best. I could literally die if I'm not! This school is nuts! I need more pineal juice, but not the weak stuff you brought me before.

Here. I bribed an alchemist at the mage college to get this recipe. Of course, I don't know how to actually do alchemy, so I'll leave it up to you.\"": "Gareth Plumsy, em Statehelm, disse: \"Tenho um grande teste chegando na escola e preciso estar no meu melhor. Eu poderia literalmente morrer se não estiver! Esta escola é uma loucura! Preciso de mais suco pineal, mas não das coisas fracas que você me trouxe antes.

Aqui. Subornei um alquimista da faculdade de magos para conseguir esta receita. Claro, eu não sei realmente fazer alquimia, então deixarei isso para você.\""
"Gareth Plumsy in Statehelm said, \"Tennenbrandt University teaches important music and magic theory, but they're not very hands-on. It's important to see other performers work their magic -- that's part of my education too! But staying out all night leaves me exhausted for the next day. You know what helps? Pineal juice.\"": "Gareth Plumsy, em Statehelm, disse: \"A Universidade Tennenbrandt ensina música importante e teoria mágica, mas eles não são muito práticos. É importante ver outros artistas fazendo sua mágica - isso também faz parte da minha educação! Mas ficar fora a noite toda me deixa exausto para o dia seguinte. Sabe o que ajuda? Suco de pineal.\""
"Gareth Plumsy in Statehelm said, \"When you finally corner one of the professors at Tennenbrandt and get them to actually give you a lesson, they teach FAST. It fells like they're shoving knowledge at you faster than you can process it! But you know what helps? Pineal juice. Illegal here, of course. So I know you wouldn't have any on you. That's a shame because I have a pretty rough day of lessons coming up.\"": "Gareth Plumsy, em Statehelm, disse: \"Quando você finalmente encurrala um dos professores da Tennenbrandt e faz com que ele realmente lhe dê uma lição, eles ensinam RÁPIDO. Parece que estão empurrando conhecimento para você mais rápido do que você pode processá-lo! Mas você sabe o que ajuda? Suco de pineal. Ilegal aqui, é claro. Então, eu sei que você não teria nenhum com você. Isso é uma pena, porque tenho um dia de aulas muito difícil chegando. \""
