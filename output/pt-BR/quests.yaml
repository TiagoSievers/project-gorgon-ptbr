"Nice Cow Champrons": "Belos Champrons de Vaca"
"Nice Darkness Medallions": "Belos medalhões da escuridão"
"Nice Enchanted Necklaces": "Lindos colares encantados"
"Nice Evasion Shirts": "Belas camisas de evasão"
"Nice gardening work! Those carrots will serve you well! Be sure to vist my other two cousins Lopsy and Boop to complete your training. Here are your bunny juices, as promised.": "Belo trabalho de jardinagem! Essas cenouras vão te servir bem! Não deixe de visitar meus outros dois primos Lopsy e Boop para completar seu treinamento. Aqui estão seus sucos de coelho, como prometido."
"Nice Leather Helmets": "Belos capacetes de couro"
"Nice Leather Rolls": "Lindos rolos de couro"
"Nice Leather Shirts": "Belas camisas de couro"
"Nice Magic Rings": "Lindos anéis mágicos"
"Nice Meditation Stools": "Belos bancos de meditação"
"Nice Melee Staves": "Belos cajados corpo a corpo"
"Nice Priest Staves": "Belos cajados de sacerdote"
"Nice Snail Coats": "Belos casacos de caracol"
"Nice Spider Casings": "Belos invólucros de aranha"
"Nice Spring Fairy Tops": "Lindas blusas de fadas da primavera"
"Nice Storage Crates": "Belas caixas de armazenamento"
"Nice Werewolf Bardings": "Belos Bardings de Lobisomem"
"Nice Werewolf Champrons": "Belos Champrons de Lobisomem"
"Nice Werewolf Foreguards": "Lindos protetores de lobisomem"
"Nice Werewolf Hind Leg Guards": "Belos protetores de perna traseira de lobisomem"
"Nice Werewolf Hindguards": "Belos guarda-costas de lobisomem"
"Nice Winter Coats": "Belos casacos de inverno"
"Nice Winter Fae Rings": "Belos anéis Fae de inverno"
"Nice work! You brought the blaze of Arisetsu to those monsters! I have some hellfire curatives here. Take them.": "Bom trabalho! Você trouxe o brilho de Arisetsu para aqueles monstros! Eu tenho alguns curativos do fogo do inferno aqui. Leve-os."
"Nice wounds! So, tell me the epic story of your battle! ... ... That's it? You should have embellished it some more. But I guess it's a start of a decent story.": "Belas feridas! Então, conte-me a história épica da sua batalha! ... ... É isso? Você deveria ter embelezado um pouco mais. Mas acho que é o começo de uma história decente."
"Nice! It even holds together, more or less. Good job!": "Legal! Até se mantém unido, mais ou menos. Bom trabalho!"
"Nice, fresh watercress. Good.": "Belo agrião fresco. Bom."
"Nice, that's a lot of honey! I bet Mox can use this to make the potion drinkable.": "Legal, isso é muito mel! Aposto que Mox pode usar isso para tornar a poção potável."
"Nice. I really hated cleaning up after those birds! Thanks! Here's some precious loot. Tell people that I gave it to you under great duress.": "Legal. Eu realmente odiei limpar aqueles pássaros! Obrigado! Aqui está um saque precioso. Diga às pessoas que eu dei a você sob grande pressão."
"Nice. This will convince Lana I'm a real warrior. And what do maidens want, if not protection from the evil monsters outside? Hmm, we might get to dancing soon, if you catch my meaning!

Here's some money. And, uh, here's a book. I also told her I was a master of teleportation magic, so I was trying to study the topic. But it's too boring for me.": "Legal. Isto convencerá Lana de que sou um verdadeiro guerreiro. E o que as donzelas querem, senão proteção contra os monstros malignos lá fora? Hmm, podemos começar a dançar em breve, se você me entende!

Aqui está algum dinheiro. E, uh, aqui está um livro. Eu também disse a ela que era um mestre em magia de teletransporte, então estava tentando estudar o assunto. Mas é muito chato para mim."
"Nicely excavated. Here is your pay! Come back tomorrow, I'm sure I'll need more.": "Bem escavado. Aqui está o seu pagamento! Volte amanhã, tenho certeza que vou precisar de mais."
"night": "noite"
"Nightmare Caves": "Cavernas do Pesadelo"
"NightmareFlesh": "Carne do Pesadelo"
"Nightshade asked you to look in on his business associate Gribburn, a goblin who lives within Hogan's Keep in Eltibule. In return, Nightshade says he'll help you convince Gribburn to teach you his unusual craft skill.": "Nightshade pediu que você procurasse seu sócio, Gribburn, um goblin que mora na Fortaleza de Hogan, em Eltibule. Em troca, Nightshade diz que irá ajudá-lo a convencer Gribburn a lhe ensinar sua habilidade artesanal incomum."
"Nightshade asked you to look in on his friend Malgath, who is deep within a cave full of wolves. The cave is somewhere in the Kur Mountains. In return, Nightshade says he'll help you convince Malgath to teach you his unusual craft skill.": "Nightshade pediu que você visse seu amigo Malgath, que está nas profundezas de uma caverna cheia de lobos. A caverna fica em algum lugar nas montanhas Kur. Em troca, Nightshade diz que irá ajudá-lo a convencer Malgath a lhe ensinar sua habilidade artesanal incomum."
"Nightshade asked you to look in on his friend Poe, a myconian who lives somewhere beneath Serbule. In return, Nightshade says he'll help you convince Poe to teach you his unusual craft skill.": "Nightshade pediu que você visse seu amigo Poe, um myconiano que mora em algum lugar abaixo de Serbule. Em troca, Nightshade diz que irá ajudá-lo a convencer Poe a lhe ensinar sua habilidade artesanal incomum."
"Nightshade asked you to look in on his friend Syndra, who is residing somewhere in a barn in Kur Mountains. In return, Nightshade says he'll help you convince Syndra to teach you her unusual craft skill.": "Nightshade pediu que você visse sua amiga Syndra, que está morando em algum lugar em um celeiro nas montanhas Kur. Em troca, Nightshade diz que irá ajudá-lo a convencer Syndra a lhe ensinar sua habilidade artesanal incomum."
"Nightshade in Kur said, \"I've delegated the candy-cane creation to Laura Neth, but she insists she needs more cinnamon. Ugh. It's for decoration, who cares how it tastes?! But she's very insistent.\"": "Nightshade em Kur disse: \"Delegei a criação da bengala de doce para Laura Neth, mas ela insiste que precisa de mais canela. Ugh. É para decoração, quem se importa com o gosto ?! Mas ela é muito insistente.\""
"Nightshade in Kur said, \"Landri is a master ice-wizard. I've talked her into preparing a beautiful ice-gem to top the tree. She just needs a bit of magical ice. An 'ice core', she said. Better get two, in case I need to have her remake it in a different shape.\"": "Nightshade em Kur disse: \"Landri é uma mestre feiticeira do gelo. Eu a convenci a preparar uma linda joia de gelo para cobrir a árvore. Ela só precisa de um pouco de gelo mágico. Um 'núcleo de gelo', ela disse. Melhor conseguir dois, caso eu precise que ela o refaça em uma forma diferente. \""
"Nightshade in Kur said, \"We need something blue, and I think it would be pretty funny to cover the tree in fungus. Let's do that.\"": "Nightshade em Kur disse: \"Precisamos de algo azul e acho que seria muito engraçado cobrir a árvore com fungos. Vamos fazer isso.\""
"Nightshade in Kur said, \"We need tinsel. What can we make it from? It should be fluffy, light, and... I have it! Matted hairballs! We'll dye them red. Go, fetch some!\"": "Nightshade em Kur disse: \"Precisamos de enfeites. Do que podemos fazer isso? Deve ser fofo, leve e... eu tenho! Bolas de pelo emaranhadas! Vamos tingi-las de vermelho. Vá buscar algumas!\""
"Nightshade sent you? Well, at least he didn't come after me himself. He'd die! Tell him I'm fine. I'm just infected with lycanthropy. I'm a werewolf now. I've just got to get this under control, and if I succeed, I'll come find him.": "Nightshade enviou você? Bem, pelo menos ele não veio atrás de mim. Ele morreria! Diga a ele que estou bem. Estou apenas infectado com licantropia. Eu sou um lobisomem agora. Só preciso controlar isso e, se conseguir, irei procurá-lo."
"Nightshade? Oh, the overworlder that named itself after a plant. I remember. I like Nightshade. Tell Nightshade that I am well, and that I am grateful for the concern.": "Beladona? Oh, o overworlder que recebeu o nome de uma planta. Eu lembro. Eu gosto de Nightshade. Diga a Nightshade que estou bem e que sou grato pela preocupação."
"Nishika in Rahu asked you to obtain a large amount of meat from grimalkins in the desert.": "Nishika em Rahu pediu para você obter uma grande quantidade de carne dos Grimalkins no deserto."
"Nishika in Rahu asked you to obtain grapefish. It's an ingredient in her \"famous\" travel snacks.": "Nishika em Rahu pediu que você conseguisse toranja. É um ingrediente de seus “famosos” lanches de viagem."
"Nishika in Rahu asked you to obtain oregano. She doesn't know where it comes from, but it's not from the desert.": "Nishika em Rahu pediu para você obter orégano. Ela não sabe de onde vem, mas não é do deserto."
"Nishika in Rahu asked you to obtain several decent chairs.": "Nishika em Rahu pediu que você conseguisse várias cadeiras decentes."
"Nishika's Meat Request": "Pedido de Carne de Nishika"
"Nishika's Travel Snacks": "Lanches de viagem de Nishika"
"NishikasMeatRequest": "NishikasMeatSolicitação"
"NishikasTravelSnack": "NishikasViagensLanche"
"Nissim in Amulna said, \"I want Amulna to be a welcoming place for all creatures, but so few desert-dwellers behave appropriately. Even our fellow Rakshasa have attacked our settlement several times this year. And then the roving packs of cat-things attacked... and of course those ridiculous human-faced cat things...

Simply put, the Sand Seer is the only reason we haven't been overrun already. But she won't be living here forever. This part of the desert must be made more secure!\"": "Nissim em Amulna disse: \"Quero que Amulna seja um lugar acolhedor para todas as criaturas, mas poucos habitantes do deserto se comportam adequadamente. Até mesmo nossos companheiros Rakshasa atacaram nosso assentamento várias vezes este ano. E então os bandos itinerantes de coisas-gatos atacaram... e, claro, aquelas coisas ridículas de gatos com rosto humano...

Simplificando, o Sand Seer é a única razão pela qual ainda não fomos invadidos. Mas ela não viverá aqui para sempre. Esta parte do deserto deve ser mais segura!\""
"No matter how much I work, I cannot seem to stop being overwhelmed by work requests. Perhaps a different approach is needed. A visiting elf once invited me to a \"dance party\" which ended up having very little music and a lot more nakedness than I was expecting. But the highlight of the evening was a powder he brought with him, called 'Enhanced Cranium Powder'. Perhaps if I had some of this... I could finish this work more efficiently! Do you know how to get some?": "Não importa o quanto eu trabalhe, não consigo parar de ficar sobrecarregado com solicitações de trabalho. Talvez seja necessária uma abordagem diferente. Certa vez, um elfo visitante me convidou para uma “festa dançante” que acabou tendo muito pouca música e muito mais nudez do que eu esperava. Mas o destaque da noite foi um pó que ele trouxe consigo, chamado “Enhanced Cranium Powder”. Talvez se eu tivesse um pouco disso... eu poderia terminar esse trabalho com mais eficiência! Você sabe como conseguir alguns?"
"No Ordinary Blacksmith's Challenge": "Nenhum desafio comum de ferreiro"
"No, not the Hellfire... No, the frost doesn't seem to affect the demonic energies, so it's not that either. There must be someth- <i>[Ferris' eyes widen]</i> No. No no no. This is very not good.

It seems that when the demonic essence fuses with the Frostbelch skin, their defenses perfectly align to create an entity which is immune to all of the elements. All of them.": "Não, não é o Fogo do Inferno... Não, a geada não parece afetar as energias demoníacas, então também não é isso. Deve haver algo- <i>[Os olhos de Ferris se arregalam]</i> Não. Não, não, não. Isso não é muito bom.

Parece que quando a essência demoníaca se funde com a pele de Frostbelch, suas defesas se alinham perfeitamente para criar uma entidade imune a todos os elementos. Todos eles."
"No, stop talking. I don't care about a monster's opinions... make yourself useful and go murder some rats. See if they're living or undead. Remember, undead ones don't bleed much!\\\"\": \"Bogaku, nos Esgotos Rahu, disse": "\\\"Os ratkin por aqui dependem muito da necromancia para ajudá-los a minerar mais rápido. E notei que os necromantes costumam trazer ratos brancos gigantes com eles. Eles não parecem bons ratos para escavar túneis... Eu me pergunto para que servem?"
"Nobody likes sitting on the stools in here. I wish I had better chairs. Real nice ones! But I don't know how to make those.": "Ninguém gosta de sentar nos bancos aqui. Eu gostaria de ter cadeiras melhores. Muito legais! Mas não sei como fazer isso."
"Noisy Arcta Hippogriffs": "Hipogrifos Arcta barulhentos"
"Noita the Green in the Fae Realm said, \"Have you met Marrowchomp? Oh, hmm, actually, you should probably keep your distance from him: he can be ornery. But he's an amazing cook! And he's told me about something called barbecue, which I simply must try. Unfortunately it requires a lot of meat. A LOT of meat! But it doesn't really matter what kind, as apparently he can barbecue anything! Just make sure there's a lot of it.\"": "Noita, o Verde, no Reino Fae, disse: “Você conheceu Marrowchomp? Oh, hmm, na verdade, você provavelmente deveria manter distância dele: ele pode ser teimoso."
"Noita the Green in the Fae Realm said, \"Since you're an outsider, you can help fix a tricky problem. Fae panthers have been increasing in number and they're hunting quite close to town. The fairies dealt with other threats such as rhinos very easily, yet they've ignored the panthers... and I've finally realized that it's due to ME. Pegast is afraid of offending me. I've tried to explain that these are just ordinary animals, barely smarter than a mortal cat... but he thinks I SHOULD be offended, even if I'm not. Anyway, if you were to just go and remove those panthers near town, that'd be great.\"": "Noita, a Verde, no Reino Fae, disse: \"Já que você é um estranho, você pode ajudar a resolver um problema complicado. As panteras Fae têm aumentado em número e estão caçando bem perto da cidade. As fadas lidaram com outras ameaças, como rinocerontes, com muita facilidade, mas ignoraram as panteras... e finalmente percebi que isso é devido a MIM. Pegast tem medo de me ofender. Tentei explicar que esses são apenas animais comuns, um pouco mais espertos do que um gato mortal... mas ele acha que eu deveria ficar ofendido, mesmo que não esteja. De qualquer forma, se você simplesmente fosse remover aquelas panteras perto da cidade, seria ótimo."
"NonDrevanSnook": "NãoDrevanSnook"
"NonDrevanSnookFillet": "NãoDrevanSnookFillet"
"Nope, that wasn't it: you're still not entertaining. You do smell different, though: flowery but with a slight musk of sweat... strangely nice, in fact...

In fact... I was thinking maybe you and I could go and... wait! No!

Sorry about that: I accidentally lowered my standards for a second there. All better now!": "Não, não foi isso: você ainda não é divertido. Você tem um cheiro diferente, porém: florido, mas com um leve almíscar de suor... estranhamente bom, na verdade...

Na verdade... eu estava pensando que talvez você e eu pudéssemos ir e... esperar! Não!

Desculpe por isso: acidentalmente baixei meus padrões por um segundo. Tudo melhor agora!"
"Nope. You are especially un-fun while you're being violently ill. Not entertaining!

Oh, stop the moaning. Here. Here's some extra coin for your trouble.": "Não. Você é especialmente desagradável quando está gravemente doente. Não é divertido!

Ah, pare de gemer. Aqui. Aqui está uma moeda extra pelo seu trabalho."
"Norala believes in the rule of might. If you can kill the Scion of Norala, then you should do so. If you die, then you were too weak to live.": "Norala acredita no governo do poder. Se você pode matar o Scion of Norala, então você deve fazê-lo. Se você morrer, então você estava fraco demais para viver."
"Norala blesses you thus. And both of us shall be watching you.": "Norala te abençoa assim. E nós dois estaremos observando você."
"Norala's Armor": "Armadura de Norala"
"NoralaGift": "NoralaPresente"
"NoralaOrcishGenocide1": "NoralaOrcishGenocídio1"
"Norbert has inducted you into the Wardens! Time to head back to Kur: you should be able to get into the Sacred Grotto now.": "Norbert introduziu você nos Guardiões! É hora de voltar para Kur: você deve conseguir entrar na Gruta Sagrada agora."
"Norbert in Sun Vale has tasked you with a list of deeds to prove your worthiness to join the Wardens.": "Norbert, em Sun Vale, encarregou você de fazer uma lista de ações para provar seu valor para se juntar aos Vigilantes."
"Norbert in Sun Vale's Animal Town asked you to investigate the weird elven building on the island and retrieve any written notes.": "Norbert, em Animal Town, em Sun Vale, pediu que você investigasse a estranha construção élfica na ilha e recuperasse todas as notas escritas."
"Norbert in Sun Vale's Animal Town asked you to obtain some raw Iocaine mushrooms, which are quite rare and only grow in the deepest and dankest of caves.": "Norbert, em Animal Town, em Sun Vale, pediu para você obter alguns cogumelos Iocaína crus, que são bastante raros e só crescem nas cavernas mais profundas e úmidas."
"Norbert told me of a rakshasa dish called the Vegetable Masterpiece. It sounds amazing. I would like to try it some day.": "Norbert me contou sobre um prato de rakshasa chamado Obra-prima Vegetal. Parece incrível. Eu gostaria de experimentar algum dia."
"Norbert used to make the trip out here every week! It's a long journey, but he came out here hundreds of times. And after the massacre... he's come over maybe twice.

I think this is his way of mourning. So we'll give the pig time to mourn his dead friends. I mean, it's not like I need time to mourn too. No. I only LOST MY SON in the massacre! I could use a helping hoof too! ... 

Sorry. You don't need to hear this. Me and Norbert go way back, and I'm a little upset. Just... give me time to mourn, too. I'll be fine.": "Norbert costumava vir aqui toda semana! É uma longa jornada, mas ele veio aqui centenas de vezes. E depois do massacre... ele veio talvez duas vezes.

Acho que essa é a maneira dele de lamentar. Então daremos tempo ao porco para lamentar os seus amigos mortos. Quero dizer, não é como se eu precisasse de tempo para lamentar também. Não. Só PERDI MEU FILHO no massacre! Eu também poderia usar um casco de ajuda! ... 

Desculpe. Você não precisa ouvir isso. Eu e Norbert nos conhecemos há muito tempo e estou um pouco chateado. Apenas... dê-me tempo para lamentar também. Eu ficarei bem."
"North and east of here is a very powerful, semi-sentient fey bear named The Mauler. He and his mate dominate whole swaths of the countryside, maiming and killing any caravans that try to come here. Can you put him down? Bring me his claw when you've done the deed.": "Ao norte e ao leste daqui está um urso feérico muito poderoso e semi-senciente chamado The Mauler. Ele e seu companheiro dominam áreas inteiras do campo, mutilando e matando qualquer caravana que tente vir para cá. Você pode colocá-lo no chão? Traga-me a garra dele quando tiver feito a ação."
"Not For Lickin'": "Não para lamber"
"Not too sweet, but a delicious bouquet! Kind of wasted on me given how drunk I already am, but I still like it! Here's a wine recipe I only learned a few decades ago.": "Não muito doce, mas um buquê delicioso! Meio que um desperdício comigo, dado o quão bêbado já estou, mas ainda gosto disso! Aqui está uma receita de vinho que aprendi há apenas algumas décadas."
"Nota do cliente": "<i>\\\"Adoro experimentar drogas exóticas de terras distantes! Mas, por favor, use apenas dentes limpos.\\\"</i>\""
"Nota do comprador": "<i>\\\"Se estes não forem REALMENTE de má qualidade, vou devolvê-los imediatamente para receber um reembolso.\\\"</i>\""
"Nota do encomendante": "<i>\\\"Preciso de construção de péssima qualidade! Esses bancos são para meus alunos menos favoritos.\\\"</i>\""
"Nota do ordenante": "<i>\\\"Ouvi dizer que os rinocerontes nas Terras do Conselho têm chifres de marfim em vez de chifres feitos de gordura animal. Preciso ver isso com meus próprios olhos!\\\"</i>\""
"Nota do pedido": "<i>\\\"Estômagos grandes, estômagos pequenos, estômagos bons, estômagos maus, não me importo. Apenas me dê estômagos para fazer queijo!\\\"</i>\""
"Nota do solicitante": "<i>\\\"Ouvi dizer que um local remanso chamado Eltibule tem centenas de caracóis blindados gigantescos!\\\"</i>\""
"Note from orderer": "<i>\\\"I love to try exotic drugs from far-away lands! But please use only clean teeth.\\\"</i>\": \"Entregue 10 dentes de Telka (variedade \\\"Molar\\\") para Ogamboe no Reino Fae. Recompensa: 14.285 conselhos."
"Nothing is entertaining enough! Hmm... perhaps... why don't you drink some poison? Not enough to kill you, necessarily -- just enough to make you quite ill.": "Nada é divertido o suficiente! Hmm... talvez... por que você não bebe um pouco de veneno? Não o suficiente para matá-lo, necessariamente – apenas o suficiente para deixá-lo bastante doente."
"Nothing works! Nothing is entertaining! I guess I am just too jaded to be amused by simple things. But there's still the ultimate prey: other people! Go kill another adventurer! Mwahahaha!

<i>[ There's a \"PvP cellar\" in Serbule where players can attack each other. See if you can kill someone in there. ]</i>": "Nada funciona! Nada é divertido! Acho que estou cansado demais para me divertir com coisas simples. Mas ainda há a presa final: outras pessoas! Vá matar outro aventureiro! Mwahahaha!

<i>[ Há uma \"adega PvP\" em Serbule onde os jogadores podem atacar uns aos outros. Veja se você consegue matar alguém lá dentro. ]</i>"
"Nothing? No clues at all? They were just regular ratkin?!

I know you aren't lying, but I really feel like you aren't giving me your best effort. <i>[Bogaku sighs.]</i> No, it's not your fault. It's mine, for expecting too much. Here is your shiny.": "Nada? Nenhuma pista? Eles eram apenas ratos normais?!

Eu sei que você não está mentindo, mas realmente sinto que você não está me dando o seu melhor. <i>[Bogaku suspira.]</i> Não, não é culpa sua. É meu, por esperar demais. Aqui está o seu brilho."
"Now defeat enemies with Frostbite.": "Agora derrote os inimigos com Frostbite."
"Now did you pull them up by their roots? If you don't pull up all the roots, the spriggan weed will just grow back! And you didn't let the root bulbs crack, did you? Oh no! That lets their tiny spores escape in the wind!

Well... maybe you should let a professional handle the weeding duties in the future, but you showed willing, and I like that.": "Agora você os arrancou pelas raízes? Se você não arrancar todas as raízes, a erva spriggan simplesmente voltará a crescer! E você não deixou os bulbos das raízes quebrarem, não é? Oh não! Isso permite que seus pequenos esporos escapem com o vento!

Bem... talvez você devesse deixar um profissional cuidar das tarefas de remoção de ervas daninhas no futuro, mas você se mostrou disposto, e eu gosto disso."
"Now don't hurt her! The town will never forgive us if she's hurt.\": \"Agora a parte mais importante": "a copa da árvore. Tem que ser a senhorita Fly-Hater! Ela é um sapo gigante que sai da hibernação agora mesmo. Ela mora em uma pequena ilha no meio do rio, e nós a trazemos para sentar na árvore e pegar insetos. Ela adora, a cidade adora, todos nós ganhamos!"
"Now don't hurt her! The town will never forgive us if she's hurt.\\\"\": \"Leah Bowman em Povus disse": "\\\"Agora, a parte mais importante: a copa da árvore. Tem que ser a senhorita Fly-Hater! Ela é um sapo gigante que sai da hibernação agora mesmo. Ela mora em uma pequena ilha no meio do rio, e nós a trazemos para sentar na árvore e pegar insetos. Ela adora, a cidade adora, todos nós ganhamos!"
"Now for the most important part: the tree topper. It has to be Miss Fly-Hater! She's a gigantic frog that comes out of hibernation right around now. She lives on a little island in the middle of the river, and we bring her in to sit on the tree and catch bugs. She loves it, the town loves it, we all win!

Now don't hurt her! The town will never forgive us if she's hurt.": "Agora a parte mais importante: a copa da árvore. Tem que ser a senhorita Fly-Hater! Ela é um sapo gigante que sai da hibernação agora mesmo. Ela mora em uma pequena ilha no meio do rio, e nós a trazemos para sentar na árvore e pegar insetos. Ela adora, a cidade adora, todos nós ganhamos!

Agora não a machuque! A cidade nunca nos perdoará se ela estiver ferida."
"Now here's the worse news": "tornado spiders are the weak ones. When an infestation of tornado spiders gets large enough, they somehow spontaneously start laying eggs for the REAL dangerous spiders, the Hurricane Spiders. And those eggs have been spotted in the hole you're headed to."
"Now let's focus on common Ice Magic deficiencies. Frostbite is an overlooked but very valuable tool in your aresenal. Use it on some tougher enemies.

Return to the metal dodecahedron outside. Stand in it and say 'Ossugazak 3'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>": "Agora vamos nos concentrar nas deficiências comuns da Magia do Gelo. Frostbite é uma ferramenta esquecida, mas muito valiosa em seu aresenal. Use-o em alguns inimigos mais difíceis.

Volte para o dodecaedro metálico do lado de fora. Entre nele e diga 'Ossugazak 3'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>"
"Now see, this is sort of interesting: the good-luck charms you brought me are from humans. Where the heck are they getting exotic teeth from?! I bet these are actually magical, and used in some sort of shamanic activity... hmm... well, I'll get to the bottom of this! Here is your reward.": "Agora veja, isso é meio interessante: os amuletos de boa sorte que você me trouxe são de humanos. De onde diabos eles estão tirando dentes exóticos?! Aposto que são realmente mágicos e usados ​​em algum tipo de atividade xamânica... hmm... bem, vou descobrir isso! Aqui está sua recompensa."
"Now that her missus is dead there's no reason she can't come home. She's just inherited the Neth stubbornness. But walnut bread can fix a lot of problems.\": \"Laura disse não de novo? A culpa é minha": "pensei que você fosse mais carismático do que é. Vou esperar alguns meses e tentar novamente, e desta vez mandarei um pouco de pão de nozes."
"Now that Norala knows she isn't the only god making a play during this weird equinox thing, she'll be more careful, more manipulative, and way less boring. So good work!\": \"<i>Zhia Lian:</i> Bom trabalho matando lobisomens. Essa é realmente a única coisa que Norala respeita atualmente": "o poder de matar."
"Now that you've grown carrots, nothing can stop you! Look out, demons, monsters, and ghosts, because here you come!": "Agora que você cultivou cenouras, nada poderá impedi-lo! Cuidado, demônios, monstros e fantasmas, porque aí vem você!"
"Now that's a fancy tree! Although in retrospect, I kind of wish I didn't have to feed the ornaments to keep them alive. Oh well, we'll do better next year. Now it's time for presents!": "Essa é uma árvore chique! Embora, em retrospecto, eu meio que gostaria de não ter que alimentar os enfeites para mantê-los vivos. Bem, faremos melhor no próximo ano. Agora é hora dos presentes!"
"Now the phoenices surely know the truth! It is carved into their immortal souls...

<i>[Uriana seems lost in thought. She absentmindedly hands you an item from her hoard.]</i>": "Agora os fenícios certamente sabem a verdade! Está gravado em suas almas imortais...

<i>[Uriana parece perdida em pensamentos. Ela distraidamente lhe entrega um item de seu tesouro.]</i>"
"Now this is unexpected. Not only are the highest ranks completely different from the lower ranks, but they're also completely different from each other! Considering their similar appearances, I would have assumed their brains would be identical.

I must ponder what to do with all of this information. In the meantime, I may have other research you can assist with.

<i>[You've unlocked daily quests with Ferris]</i>": "Agora isso é inesperado. Não apenas os escalões mais altos são completamente diferentes dos escalões mais baixos, mas também são completamente diferentes uns dos outros! Considerando suas aparências semelhantes, eu teria assumido que seus cérebros seriam idênticos.

Devo ponderar o que fazer com todas essas informações. Enquanto isso, posso ter outras pesquisas nas quais você possa ajudar.

<i>[Você desbloqueou missões diárias com Ferris]</i>"
"Now we have a cheese tree! Yay!": "Agora temos uma árvore de queijo! Yay!"
"Now we just wait a few years and then bask in the pleasantness that ensues from enhanced morale. It's a good thing elves are patient, eh?": "Agora apenas esperamos alguns anos e então nos deleitamos com o prazer que resulta do aumento do moral. Ainda bem que os elfos são pacientes, não é?"
"Now we're starting to get repeat business! The same man who needed a goat skin now needs a hippo skin. Heh! Good luck with that one.": "Agora estamos começando a repetir negócios! O mesmo homem que precisava de uma pele de cabra agora precisa de uma pele de hipopótamo. Ei! Boa sorte com isso."
"Now where did I leave the ghostly guano? Ah, of course. On an island known as Sun Vale, look for a ruin. That should be enough to go on, right? Oh, yes": "some of those grim little Winter Fae like to... frolic nearby."
"Now you are awakened to the bees! Tell them what you have learned and they will never trouble you again. This item will be your badge of accomplishment. Now go!": "Agora você está acordado para as abelhas! Conte a eles o que você aprendeu e eles nunca mais o incomodarão. Este item será seu distintivo de realização. Agora vá!"
"Now you know the most bland, basic tofu dish. Take that back to your rakshasa and see what he thinks.

And if you want to know how to make fancier kinds of tofu, I suppose I could trade that fancy knowledge for some fancy cheese...": "Agora você conhece o prato de tofu mais insosso e básico. Leve isso de volta ao seu rakshasa e veja o que ele pensa.

E se você quiser saber como fazer tipos mais sofisticados de tofu, suponho que poderia trocar esse conhecimento sofisticado por um queijo sofisticado..."
"Now, I won't be doing the enchantment on these upcoming promotional swords. We have quite a specialist for that task! But I do need to provide special foci. These will be worked into the weapon to strengthen and shape the magic in the weapon. I'm afraid I can accept no substitutes!": "Agora, não farei o encantamento nessas próximas espadas promocionais. Temos um especialista e tanto para essa tarefa! Mas preciso fornecer focos especiais. Eles serão trabalhados na arma para fortalecer e moldar a magia da arma. Receio não poder aceitar substitutos!"
"Now, the tinnitus you're experiencing is <i>probably</i> mostly temporary. But that feeling of elation you feel? ... also temporary. Enjoy it while it lasts.": "Agora, o zumbido que você está sentindo é <i>provavelmente</i> principalmente temporário. Mas aquela sensação de euforia que você sente? ... também temporário. Aproveite enquanto dura."
"Não me olhe assim": "meu mestre é um grande mago! Eu não era seu escravo! Eu era seu parceiro! De qualquer forma, não contei a ele os detalhes, então ele não pode ser muito útil, mas acha que tem um livro que vai ajudar. E ele enviou para mim no exterior! Deve estar aguardando coleta em Rahu. Não tenho certeza de onde exatamente, mas fale com o gerente da doca.\""
"Não posso pagar-lhe em Conselhos, mas posso fazer muito melhor": "posso pagar-lhe em exposição. Direi a todos que compram aqui como você é incrível e como você se tornou uma adição valiosa à Statehelm.\""
"Não posso salvá-la": "ela está naquele maldito reino das fadas, mas não é acessível pelo portal que conheço. Deve haver alguma outra maneira de entrar. Se você encontrar o caminho, mate todos os demônios que puder! Procure por uma cobra flutuante chamada Despair Puck. Terá a alma de Lydia.\""
"Não tenho certeza de onde ele está escondido agora, mas lembro de ter ouvido isto": "“Em vez de um fêmur, ofereça uma caveira”. Não sei o que isso significa. Descubra e mate-o!"
"O que? Claro que farei valer a pena, amigo": "se você matar mil ratkin eu te dou 10 pedaços de xedrita. Vale totalmente o seu tempo, certo?\""
"O que? Meu?! Eu não tive nada a ver com isso! Quase certamente nada! Ok, olhe. Sinto-me mal por isso, mas não tive escolha": "um soldado Onkara entrou aqui e exigiu a chave da sua loja. Ele era enorme e assustador, e imaginei que ele estava apenas roubando segredos mágicos, então o deixei entrar. Na noite seguinte, Sona foi atacada por bandidos."
"O quê? Claro que farei valer a pena, amigo": "se você matar mil ratkin eu te dou 10 pedaços de xedrita. Vale totalmente o seu tempo, certo?\\\"\""
