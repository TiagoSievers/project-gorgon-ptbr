"Red Wing is famous for our gaming, so I proposed we use Monsters and Mantids game chips on the tree. However, our game chips are very valuable and we fear inebriated guests may purloin them.

Dorimir suggests we instead use the worthless 'game chips' that are often used in home games. If you could just find a few examples of these chips, I'll have our goblin maintenance team create more.": "Red Wing é famoso por nossos jogos, então propus que usássemos fichas de jogo Monstros e Mantids na árvore. No entanto, nossas fichas de jogo são muito valiosas e tememos que hóspedes embriagados possam roubá-las.

Dorimir sugere que, em vez disso, utilizemos as “fichas de jogo” inúteis que são frequentemente utilizadas em jogos caseiros. Se você pudesse encontrar apenas alguns exemplos desses chips, pedirei à nossa equipe de manutenção goblin que crie mais."
