 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. Winter seems to be arriving and we must prepare to hibernate. Fire elementals will ambush us while we sleep.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 You must kill them!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. O inverno parece estar chegando e devemos nos preparar para hibernar. Os elementais do fogo nos emboscarão enquanto dormimos.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...Bzz. ZzzZzzZzzBz ... zzzBzt!
We need your help, fairy. Our enemies burrow under the ground to ambush us while we pollinate.

Zzrt bzz. ZzzZzzZzzBz ... zzzBzt!
We cannot care for our young flowers. You must go instead.

BzzRtxl!
Pollinate our young flowers!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz ... Bzz. ZzzZzzZzzBz ... zzzBzt!
Precisamos da sua ajuda, fada. Nossos inimigos se enterram no subsolo para nos emboscar enquanto polinizamos.

Zzrt bzz. ZzzZzzZzzBz ... zzzBzt!
Não podemos cuidar de nossas flores jovens. Você deve ir em vez disso.

BzzRtxl!
Polinize nossas flores jovens!\""
"A beggar in Statehelm asked you to find some Autumnal Shagouda cheese. He had advice on how to find it, but the advice changes each game-day so if you wait too long, you will want to ask him again.": "Um mendigo em Statehelm pediu que você encontrasse um pouco de queijo Shagouda outonal. Ele deu conselhos sobre como encontrá-lo, mas os conselhos mudam a cada dia de jogo, então se você esperar muito, vai querer perguntar a ele novamente."
"A Bench For Writing": "Um banco para escrever"
"A Bit of This, A Bit of That": "Um pouco disso, um pouco daquilo"
"A Brighter Glow": "Um brilho mais brilhante"
"A bunch of idiots got into another fight here yesterday. I think they all lived, but not all of my furniture did. I've cleaned up all the mess and replaced what I could, but we're still low on chairs. You wouldn't happen to be a carpenter, would you?": "Um bando de idiotas brigou aqui ontem. Acho que todos sobreviveram, mas nem todos os meus móveis sobreviveram. Limpei toda a bagunça e substituí o que pude, mas ainda estamos com poucas cadeiras. Você não seria carpinteiro, seria?"
"A bushel of wood chips, and I can smell their spruciness! You've made me very happy.": "Um alqueire de lascas de madeira e posso sentir o cheiro de seu enfeite! Você me fez muito feliz."
"A code system that reads as a bakery order? The worst part is that it's a good idea. But tell him that he should have had that idea to start with, because it's too late now! The code system is IN USE. Tell him discussions on... No, sorry, I'm getting side tracked. He always brings that out of me.

I can tell he's not taking the news well -- he's always an extra-big asshole when he's stressed out. I can't really do anything more for him from here. But if you wanted to help him, I'd appreciate it.

He's a mediocre father, but he does love his kids. And the bakery is everything to him.": "Um sistema de código que parece um pedido de padaria? O pior é que é uma boa ideia. Mas diga a ele que ele deveria ter tido essa ideia para começar, porque agora é tarde demais! O sistema de código está EM USO. Conte a ele as discussões sobre... Não, desculpe, estou sendo desviado. Ele sempre tira isso de mim.

Posso dizer que ele não está recebendo bem as notícias – ele é sempre um grande idiota quando está estressado. Eu realmente não posso fazer mais nada por ele daqui. Mas se você quiser ajudá-lo, eu agradeceria.

Ele é um pai medíocre, mas ama seus filhos. E a padaria é tudo para ele."
"A concerned scapegoat has shown up at the bridge North of Serbule Keep, in search of something important to her. Search for her lost family, Miss Guided, Miss Take, Miss Fire, Miss Behaved, and Miss Fits, then return to her once you've found them all.": "Um bode expiatório preocupado apareceu na ponte ao norte de Serbule Keep, em busca de algo importante para ela. Procure sua família perdida, Miss Guided, Miss Take, Miss Fire, Miss Behaved e Miss Fits, e volte para ela assim que encontrar todos eles."
"A constant danger in the desert, these vipers don't hesitate to attack creatures many times their size.\": \"<b>Caça": "Víboras</b>"
"A Crate of Oranges": "Uma caixa de laranjas"
"A Crop of Onions": "Uma colheita de cebolas"
"A Dark Surprise": "Uma surpresa sombria"
"A Delicious Stuffed Bell Pepper": "Um delicioso pimentão recheado"
"A Dwarf in the Swamp": "Um anão no pântano"
"A favor for me? Help me finish my objective here: kill all these mindless werewolves!": "Um favor para mim? Ajude-me a completar meu objetivo aqui: matar todos esses lobisomens estúpidos!"
"A favor, huh? Well, you could get me some paint. It's for my hobby. Any color will do, I'm not picky. Just get me a LOT of it.": "Um favor, hein? Bem, você poderia me conseguir um pouco de tinta. É para o meu hobby. Qualquer cor serve, não sou exigente. Apenas me dê MUITO disso."
"A favor? Oh, well, I'm out of dirt. Not just regular dirt, you understand -- the strange dirt you sometimes find under mushrooms or corpses. It has a million uses! Most people use it for fertilizer, but I use it in potions. I just use a lot of sugar to mask the taste.": "Um favor? Oh, bem, estou sem sujeira. Não apenas sujeira comum, você entende – a sujeira estranha que você às vezes encontra sob cogumelos ou cadáveres. Tem um milhão de utilizações! A maioria das pessoas usa como fertilizante, mas eu uso em poções. Só uso muito açúcar para mascarar o sabor."
"A few moons back, an elf visited us and gave me an exotic item called a 'yo-yo'. It has a string. It goes up and down via magic. I loved it!

Unfortunately I left it lying about, and one of the sentinel spiders took it to their nest. If you happen upon it, please return it.": "Algumas luas atrás, um elfo nos visitou e me deu um item exótico chamado 'ioiô'. Tem uma corda. Ele sobe e desce por meio de magia. Eu adorei!

Infelizmente deixei-o caído e uma das aranhas-sentinela levou-o para o ninho. Se você encontrar isso, por favor, devolva-o."
"A few of the crystals that you brought to me have interesting properties! I require further samples of these to better understand them.": "Alguns dos cristais que você me trouxe têm propriedades interessantes! Preciso de mais amostras para entendê-los melhor."
"A friendly mantis named Azalak suggested that the brain bugs in the area are coming from a cave west of him. Azalak asked you to find out what happened to a human named Commander Ferrows, last seen in that cave. In exchange, you'll get something that will be useful when encountering Dalvos.": "Um louva-a-deus amigável chamado Azalak sugeriu que os insetos cerebrais da área vêm de uma caverna a oeste dele. Azalak pediu para você descobrir o que aconteceu com um humano chamado Comandante Ferrows, visto pela última vez naquela caverna. Em troca, você receberá algo que será útil ao encontrar Dalvos."
"A frumpy man brought some ornaments for us. Good work! I'll put them up.": "Um homem desleixado trouxe alguns enfeites para nós. Bom trabalho! Vou colocá-los."
"A gift from Rita? Thanks! I guess she had fun at the... what is this, soap?!

...

Ha ha. Tell Rita to go suckle a treant, will you?": "Um presente da Rita? Obrigado! Acho que ela se divertiu no... o que é isso, sabonete?!

...

Ha ha. Diga à Rita para amamentar um ente, sim?"
"A Gift of a Badge": "Um presente de um distintivo"
"A goblin in the Rahu Sewers said that you would be allowed entrance to the goblins' sanctuary if you retrieve a lost notebook. He said it was in the \"ratkin nesting warrens\", and not too far from their hideout.": "Um goblin nos esgotos de Rahu disse que você teria permissão para entrar no santuário dos goblins se recuperasse um caderno perdido. Ele disse que estava nas \"tocas de nidificação de ratkin\" e não muito longe de seu esconderijo."
"A goblin named Jumjab in Eltibule asked for oversized mandibles, sometimes found on Tor-Uraks.": "Um goblin chamado Jumjab em Eltibule pediu mandíbulas enormes, às vezes encontradas em Tor-Uraks."
"A goblin named Jumjab in Eltibule asked for some onions.": "Um goblin chamado Jumjab em Eltibule pediu algumas cebolas."
"A goblin named Jumjab in Eltibule asked for some perfectly round pebbles. He says there's no common place to find them, but they can be found \"all over the place\".": "Um goblin chamado Jumjab em Eltibule pediu algumas pedras perfeitamente redondas. Ele diz que não existe um lugar comum para encontrá-los, mas eles podem ser encontrados “em todos os lugares”."
"A good Ri-Shin tree should be covered in red baubles. The shinier the better. We need a big pile of rubies or whatever!": "Uma boa árvore Ri-Shin deve ser coberta de enfeites vermelhos. Quanto mais brilhante melhor. Precisamos de uma grande pilha de rubis ou algo assim!"
"A great guest chair": "Uma ótima cadeira de convidados"
"A great new calligraphy bench": "Um ótimo novo banco de caligrafia"
"A great new stool": "Um ótimo banquinho novo"
"A great new storage solution": "Uma ótima nova solução de armazenamento"
"A guest told me that moss agates have magical properties that enhance the growth speed of a garden. She was unable to explain the exact nature of this magic, however. If I had a number of moss agates, perhaps I could find the secret!": "Um convidado me contou que as ágatas musgosas têm propriedades mágicas que aumentam a velocidade de crescimento de um jardim. Ela foi incapaz de explicar a natureza exata dessa magia, entretanto. Se eu tivesse várias ágatas musgosas, talvez conseguisse descobrir o segredo!"
"A hand came out of the coffin and snatched the Acur Blood. A moment later, a pale human stepped out.": "Uma mão saiu do caixão e pegou o Sangue Acur. Um momento depois, um humano pálido saiu."
"A job well done. Of course, due to their incredible reproductive prowess, a new generation of ratkin will soon replace the ones you've slain. There will be just as many ratkin out tomorrow night -- but they'll be a little less smug about it.": "Um trabalho bem feito. É claro que, devido à sua incrível capacidade reprodutiva, uma nova geração de ratkin substituirá em breve aqueles que você matou. Haverá tantos ratkins amanhã à noite - mas eles serão um pouco menos presunçosos sobre isso."
"A job well done. Of course, trying to stop the growth of fungus is a doomed adventure. But doomed adventures are the ones they write about in the history books, right? No, that doesn't make sense here.": "Um trabalho bem feito. É claro que tentar impedir o crescimento de fungos é uma aventura condenada. Mas aventuras condenadas são aquelas sobre as quais eles escrevem nos livros de história, certo? Não, isso não faz sentido aqui."
"A Kick In The Whiskers": "Um chute nos bigodes"
"A little fishy. I think it could have used another minute on the grill. No, no, it's fine, I'll eat it. It's not bad!": "Um pouco suspeito. Acho que poderia ter levado mais um minuto na grelha. Não, não, está tudo bem, eu como. Não é ruim!"
"A Little Guidance Goes A Long Way": "Um pouco de orientação ajuda muito"
"A lot of us like to whittle a lot, so our supply of whittling knives are running low. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Master Whittling Knives to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.": "Muitos de nós gostamos de talhar muito, então nosso estoque de facas de talhar está acabando. Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão!  Se você tivesse a gentileza de me entregar 10 Facas Mestres de Talhar para mim, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em sua arte em troca de seus problemas."
"A lot of us like to whittle a lot, so our supply of whittling knives are running low. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Master Whittling Knives to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.

": "Muitos de nós gostamos de talhar muito, então nosso estoque de facas de talhar está acabando. Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão!  Se você tivesse a gentileza de me entregar 10 Facas Mestres de Talhar para mim, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em sua arte em troca de seus problemas."
"A Masterpiece for YOU": "Uma obra-prima para você"
"A Masterpiece of Neckwear": "Uma obra-prima da gravata"
"A Message For Willem": "Uma mensagem para Willem"
"A monstrosity named Yalox asked you for a really good bandage.": "Uma monstruosidade chamada Yalox pediu um curativo muito bom."
"A monstrosity named Yalox asked you to just kill some goblins as some sort of pointless revenge.": "Uma monstruosidade chamada Yalox pediu para você matar alguns goblins como uma espécie de vingança inútil."
"A mysterious talking scapegoat has arrived at the bridge North of Serbule, in search of her missing family. Speak with her to find out what's happened to them.": "Um misterioso bode expiatório falante chegou à ponte ao norte de Serbule, em busca de sua família desaparecida. Fale com ela para descobrir o que aconteceu com eles."
"A nature spirit asked you to cull some of the poisonous slugs, and their eggs, near the waterfall in Eltibule.": "Um espírito da natureza pediu para você abater algumas lesmas venenosas e seus ovos perto da cachoeira em Eltibule."
"A nature spirit asked you to help reduce the number of scray eggs on the easternmost side of the eastern lake in Serbule Hills.": "Um espírito da natureza pediu que você ajudasse a reduzir o número de ovos escamados no lado leste do lago oriental em Serbule Hills."
"A nature spirit asked you to help remove invasive fish from the Serbule docks.": "Um espírito da natureza pediu que você ajudasse a remover peixes invasores das docas de Serbule."
"A nature spirit hinted to you that it would appreciate your help removing junk from the Serbule moat.": "Um espírito da natureza lhe deu a entender que apreciaria sua ajuda para remover o lixo do fosso de Serbule."
"A New Life": "Uma nova vida"
"A New Mining Pick": "Uma nova escolha de mineração"
"A New Strength Potion": "Uma nova poção de força"
"A nice big pile of bones. I'll get them sorted and organized, and on the tree. They'll be... truly hideous. But that's just my opinion based on my human upbringing! They'll get all the town's rakshasa in a festive mood, and that's what matters.": "Uma bela pilha de ossos. Vou classificá-los e organizá-los e colocá-los na árvore. Eles serão... verdadeiramente horríveis. Mas essa é apenas a minha opinião baseada na minha formação humana! Eles deixarão todos os rakshasa da cidade em clima festivo, e é isso que importa."
"A Nice Stool": "Um belo banquinho"
"A non-ranalon! Please help!

The ranalon are mostly very kind to nature, but their scray are a problem. It's already a very crowded lake, and the scray just laid more eggs! If those eggs hatch, it will be disaster for the native lake fish. Get them out!": "Um não-ranalon! Por favor ajude!

Os ranalon são em sua maioria muito gentis com a natureza, mas seus rastros são um problema. Já é um lago muito lotado e o scray acabou de botar mais ovos! Se esses ovos eclodirem, será um desastre para os peixes nativos do lago. Tire-os daqui!"
"A person in a coffin in Vidaria said, \"I have a... magical illness.

I need a rare substance known as Acur Blood. I know ...not... where one such as... yourself... would find this thing. Perhaps seek out sages or ...mystics. In any case, I grant you no hope. But if you succeed, I shall reward you handsomely.
Wait! Actually, make it two jars of Acur Blood.\"": "Uma pessoa num caixão em Vidaria disse: \"Tenho uma... doença mágica.

Preciso de uma substância rara conhecida como Sangue Acur. Eu sei... não... onde alguém como... você... encontraria essa coisa. Talvez procure sábios ou... místicos. De qualquer forma, não lhe concedo nenhuma esperança. Mas se você tiver sucesso, eu o recompensarei generosamente.
Espere! Na verdade, faça dois potes de Sangue Acur.\""
"A poor transmogrified pigeon has been stopping by recently, begging for my help. Well, I can't help him, so I think it's time I put him down. Can you get me some Iocaine Powder? It's the most humane way.": "Um pobre pombo transmogrificado passou por aqui recentemente, implorando por minha ajuda. Bem, não posso ajudá-lo, então acho que é hora de colocá-lo no chão. Você pode me trazer um pouco de Iocaína em pó? É a maneira mais humana."
"A primeira coisa que preciso é bem simples": "basta pegar uma amostra de cada tipo de gema ou cristal que pode ser encontrado ao minerar os cristais perto dos demônios.\""
"A rakshasa named Zealo asked you to collect mana sponges that she placed in jars all through the area.": "Uma rakshasa chamada Zealo pediu para você coletar esponjas de mana que ela colocou em potes por toda a área."
"A rakshasa named Zealo asked you to collect toxic sludge for her potions.": "Uma rakshasa chamada Zealo pediu que você coletasse lama tóxica para suas poções."
"A Ratkin Talisman for Daniel": "Um Talismã Ratkin para Daniel"
"A Ri-Shin tree has to reflect its people. Hah, I know: wouldn't butterflies look great?! Representational, kinda. And also the fairies love 'em. But there's a catch: they have to be alive. Dead butterflies would upset a lot of the fae here.

Crimsonfelt butterflies would look nicest, but they eat cinders out of the air, and there's no way I'm feeding 'em cinders every day. How about some nice pretty rose-mourning butterflies? They're a little smaller, but they can survive on sugar water.

Go catch a whole bunch of 'em! Here's a net.": "Uma árvore Ri-Shin deve refletir seu povo. Hah, eu sei: as borboletas não ficariam lindas?! Representacional, mais ou menos. E também as fadas os amam. Mas há um problema: eles precisam estar vivos. Borboletas mortas perturbariam muitos Fae aqui.

Borboletas de feltro carmesim ficariam mais bonitas, mas elas comem cinzas do ar, e não há como alimentá-las com cinzas todos os dias. Que tal algumas lindas borboletas de luto rosadas? Eles são um pouco menores, mas podem sobreviver com água com açúcar.

Vá pegar um monte deles! Aqui está uma rede."
"A Ri-Shin tree needs a topper, something that glows. But I don't wanna use one of those glowing yellow crystals... I know Sona says she can make 'em safe, but it's too dangerous.

Let's just... I dunno, let's just stick some candles on top, like my family used to do. But we'll need to light 'em every night... got any spare tealights?": "Uma árvore Ri-Shin precisa de uma cobertura, algo que brilhe. Mas não quero usar um daqueles cristais amarelos brilhantes... Sei que Sona diz que pode torná-los seguros, mas é muito perigoso.

Vamos só... não sei, vamos colocar algumas velas em cima, como minha família costumava fazer. Mas precisaremos acendê-los todas as noites... tem alguma vela sobressalente?"
"A roaming caravan of master crafters and their apprentices have stopped at the Red Wing Casino for a few days of rest, restocking, and a chance to study some of the local crafts. They have rented the Theater Room for their staging area. Go pay them a visit and see if they can help you advance your craft skills faster!": "Uma caravana itinerante de mestres artesãos e seus aprendizes parou no Red Wing Casino para alguns dias de descanso, reabastecimento e uma oportunidade de estudar alguns dos artesanatos locais. Eles alugaram a Sala de Teatro como área de palco. Faça uma visita a eles e veja se eles podem ajudá-lo a aprimorar suas habilidades artesanais com mais rapidez!"
"A roaming caravan of master crafters have stopped at the Red Wing Casino for a few days of rest, restocking, and a chance to study some of the local crafts. They have rented the Theater Room for their staging area. Go pay them a visit and see if they can help you advance your craft skills faster!": "Uma caravana itinerante de mestres artesãos parou no Red Wing Casino para alguns dias de descanso, reabastecimento e uma oportunidade de estudar alguns dos artesanatos locais. Eles alugaram a Sala de Teatro como área de palco. Faça uma visita a eles e veja se eles podem ajudá-lo a aprimorar suas habilidades artesanais com mais rapidez!"
"A roving band of flapskulls and other undead have found their way to town. They have no necromantic master, but they are led by the hideous Chuckleflap. You can activate the pagodas in town if you need some fresh air.

(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Um bando errante de crânios e outros mortos-vivos chegou à cidade. Eles não têm mestre necromântico, mas são liderados pelo horrível Chuckleflap. Você pode ativar os pagodes da cidade se precisar de um pouco de ar fresco.

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar pelo menos um inimigo Elite ou Chefe.)"
"A Scray Stinger": "Um ferrão scray"
"A Secret Type of Skeleton": "Um tipo secreto de esqueleto"
"A soldier told me a very peculiar tale yesterday, and I think I know what's going on. But it's too dangerous for me to investigate! Can you do it?

The soldier said she was in Vidaria, fighting back demons, when she saw a big slab of steak lying in one of the demon craters. She said the meat was sentient, and that when she investigated, it attacked her and fended her off.

I bet that steak is still out there in one of those craters. Can you bring it to me?": "Um soldado me contou uma história muito peculiar ontem e acho que sei o que está acontecendo. Mas é muito perigoso para eu investigar! Você pode fazer isso?

A soldado disse que estava em Vidaria, lutando contra demônios, quando viu um grande pedaço de bife em uma das crateras dos demônios. Ela disse que a carne era senciente e que, quando investigou, a atacou e a rechaçou.

Aposto que aquele bife ainda está em uma daquelas crateras. Você pode trazê-lo para mim?"
"A Soothing Balm": "Um bálsamo calmante"
"A Stencil to Make Runes": "Um estêncil para fazer runas"
"A Substitute for the Horn Bow": "Um substituto para o arco de chifre"
"A Summer fairy named Fazzi taught you a ritual that you can use to free some Summer fae that are being tortured in the Winter Corridors.": "Uma fada do verão chamada Fazzi lhe ensinou um ritual que você pode usar para libertar algumas fadas do verão que estão sendo torturadas nos Corredores de Inverno."
"A travelling monk told me the most interesting thing! She said that if you drink at least 20 glasses of water a day, your entire system will be flushed and you'll feel amazing. Give it a shot!": "Um monge viajante me contou uma coisa muito interessante! Ela disse que se você beber pelo menos 20 copos de água por dia, todo o seu sistema ficará limpo e você se sentirá incrível. Experimente!"
"A Weighty Repair": "Um reparo pesado"
"Aaahhh, smell that aroma.

...Well, the smell is better than the taste, but it's not bad. Not bad.": "Aaahhh, sinta esse aroma.

...Bem, o cheiro é melhor que o sabor, mas não é ruim. Nada mal."
"Ability": "Habilidade"
"AbilityKill": "HabilidadeMatar"
"AbilityKillWithoutDying": "HabilidadeMatarSemMorrer"
"AbilityKnown": "Habilidade conhecida"
"AbominableSoldier": "Soldado Abominável"
"AbrasiveSand": "Areia Abrasiva"
"Absolum is dead! You've really made a difference today. And a very powerful enemy. But that's a problem for another day. Today we celebrate!

Okay, celebration time is over.": "Absolum está morto! Você realmente fez a diferença hoje. E um inimigo muito poderoso. Mas isso é um problema para outro dia. Hoje comemoramos!

Ok, o tempo de celebração acabou."
"AcceleratedRotor": "Rotor Acelerado"
"Accessing the Safehouse": "Acessando a Casa Segura"
"AcclimatedMantis": "AclimatadoMantis"
"Accursed Frost Pigeons": "Pombos de Gelo Amaldiçoados"
"Aceri said, \"I could use your assistance! I hear there is a speed potion that a lot of folks craft around here to get around easier. Could you get me 10 of those Agonizing Speed Potions? I need to reverse engineer them so I can make them for the whole group.\"": "Aceri disse: \"Eu poderia usar sua ajuda! Ouvi dizer que há uma poção de velocidade que muitas pessoas criam por aqui para se locomover mais facilmente. Você poderia me conseguir 10 dessas Poções de Velocidade Agonizantes? Preciso fazer engenharia reversa para poder fazê-las para todo o grupo.\""
"Aceri said, \"I could use your assistance! I hear there is an orcish potion that can enhance your combat readiness.  Could you get me 10 of those Gur-Hortas? I need to reverse engineer them so I can make them for the whole group.\"": "Aceri disse: \"Eu poderia usar sua ajuda! Ouvi dizer que existe uma poção orc que pode melhorar sua prontidão de combate. Você poderia me conseguir 10 desses Gur-Hortas? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo.\""
"Aceri said, \"I could use your assistance! I swear it feels like most of these people have the memory capcity of a clownfish around here!  Could you get me 20 Memory Enhancers? I need to reverse engineer them so I can make them for the whole group.\"": "Aceri disse: \"Eu poderia usar sua ajuda! Juro que parece que a maioria dessas pessoas tem a capacidade de memória de um peixe-palhaço por aqui! Você poderia me conseguir 20 Intensificadores de Memória? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo.\""
"Acho que é uma força de assalto escondida nas cavernas abaixo da cidade. Quando a laje for ativada, eles aparecerão para atacar. Precisamos activar esse sinal cedo, antes que estejam totalmente preparados. Isso os pegará desprevenidos. O único truque é": "como o ativamos?"
