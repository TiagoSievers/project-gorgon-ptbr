"Paul Vaughn in Serbule Hills said, \"I was one of the last lumberjacks to leave our logging camp. Thought I could hold out against some lousy goblins, but they just kept coming! Eventually I had to run. I left behind a lot of great beer, which I'm sure is all gone by now. But more importantly, I left behind my lucky belt buckle. I'd really like it back.

The camps are east of here, over some hills. The buckle is in the northernmost camp, if that helps.\"": "Paul Vaughn, em Serbule Hills, disse: \"Fui um dos últimos lenhadores a deixar nosso acampamento madeireiro. Pensei que poderia resistir a alguns goblins nojentos, mas eles continuaram vindo! Eventualmente, tive que correr. Deixei para trás muita cerveja boa, que tenho certeza que já acabou. Mas o mais importante, deixei para trás minha fivela de cinto da sorte. Eu realmente gostaria dela de volta.

Os acampamentos ficam a leste daqui, em algumas colinas. A fivela está no acampamento mais ao norte, se isso ajudar.\""
"Paul Vaughn in Serbule Hills said, \"The lumber camps east of here were made by humans. I helped build the fences myself! But then goblins came and ran us out, and now they're chopping our wood!

Goblins have huge numbers on their side, but most goblins are stupid. To really hurt 'em, you gotta kill the overseers! Look for the mage-casting goblins in the camps, and kill 'em.

And hey, if you want help with how to attack the camps, just ask me.\"": "Paul Vaughn, em Serbule Hills, disse: \"Os acampamentos madeireiros a leste daqui foram feitos por humanos. Eu mesmo ajudei a construir as cercas! Mas então os goblins vieram e nos expulsaram, e agora estão cortando nossa madeira!

Os goblins têm um grande número ao seu lado, mas a maioria dos goblins é estúpida. Para realmente machucá-los, você tem que matar os capatazes! Procure os goblins lançadores de magos nos acampamentos e mate-os.

E ei, se você quiser ajuda sobre como atacar os acampamentos, é só me perguntar.\""
"Paul Vaughn in Serbule Hills said, \"This is gonna sound silly. But you know that watery beer Durstin sells? I found a way to improve it: strawberry juice! I just need a few strawberries for each cup. If you have some, I'll buy 'em from you for... I dunno, ten times their value!\"": "Paul Vaughn, em Serbule Hills, disse: \"Isso vai parecer bobagem. Mas você sabe aquela cerveja aguada que Durstin vende? Encontrei uma maneira de melhorá-la: suco de morango! Só preciso de alguns morangos para cada xícara. Se você tiver alguns, vou comprá-los de você por... não sei, dez vezes o valor deles!\""
"Paul Vaughn in Serbule Hills said, \"You know the only good thing about staying here? It's the food! I know, most of it's nothing to write home about. But some days, Durstin makes his fried mycena bites, and they are delicious! They're my one weakness, really. I could eat a million of 'em!

Sadly, Durstin's not made any in a while. He offered to teach me the recipe so I could make 'em myself, but that's way too much work! Say... you wanna do it for me?\"": "Paul Vaughn, em Serbule Hills, disse: \"Você sabe que a única coisa boa de ficar aqui? É a comida! Eu sei, a maior parte não é nada digno de nota. Mas alguns dias, Durstin faz suas mordidas fritas de mycena, e elas são deliciosas! Eles são minha única fraqueza, na verdade. Eu poderia comer um milhão deles!

Infelizmente, Durstin não ganha nada há algum tempo. Ele se ofereceu para me ensinar a receita para que eu mesmo pudesse fazer, mas isso dá muito trabalho! Diga... você quer fazer isso por mim?\""
"Paul's Beer Additive": "Aditivo para cerveja Paul's"
"Paul's Lucky Buckle": "Fivela da Sorte de Paul"
"Paul's Mycena Weakness": "A fraqueza micênica de Paulo"
"Paul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!\": \"<i>[Durstin suspira.]</i> Más notícias. Eu estava conversando com Paul, o lenhador – ele está por aqui em algum lugar – e ele sabia onde estava o último capítulo. Ele disse que estava escondido numa caixa perto da serraria a leste daqui. Então ele foi buscar para mim... e encontrou um bando de javalis no caminho de volta. E aqui está o chute": "um dos javalis comeu as páginas!"
"Paul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!\\\"\": \"Durstin Tallow em Serbule Hills disse": "\\\"<i>[Durstin suspira.]</i> Más notícias. Eu estava conversando com Paul, o lenhador - ele está por aqui em algum lugar - e ele sabia onde estava o último capítulo. Ele disse que estava escondido em uma caixa perto das serrarias a leste daqui. Então ele foi buscá-lo para mim... e encontrou um bando de javalis no caminho de volta. E aqui está o chute: um dos javalis comeu as páginas!"
"Paullus in Statehelm said, \"Banana wine is not for the faint of heart. It's too sweet for the likes of Fenna and too rich for the likes of Irhetsu. But it's perfect for the likes of me! Made any?\"": "Paullus em Statehelm disse: \"O vinho de banana não é para os fracos de coração. É muito doce para pessoas como Fenna e muito rico para pessoas como Irhetsu. Mas é perfeito para pessoas como eu! Fez algum?\""
"Paullus in Statehelm said, \"Have you been practicing wine making? I'd love to try your grape wine!\"": "Paullus em Statehelm disse: \"Você tem praticado a produção de vinho? Eu adoraria experimentar o seu vinho de uva!\""
"Paullus in Statehelm said, \"Hey, did you make that pear wine yet? It'd go great with this party!\"": "Paullus em Statehelm disse: \"Ei, você já fez aquele vinho de pêra? Ficaria ótimo com esta festa!\""
"Paullus in Statehelm said, \"I know a lot of ways to turn rice into alcohol. Rice wine is the smoothest! Got any of that smoothness to share?\"": "Paullus, em Statehelm, disse: \"Conheço muitas maneiras de transformar arroz em álcool. O vinho de arroz é o mais suave! Tem alguma dessa suavidade para compartilhar?\""
"Paullus in Statehelm said, \"I know how absurd it sounds! But cantaloupe wine is pretty good, if you follow my recipe exactly. See if you can master it.\"": "Paullus, em Statehelm, disse: \"Eu sei o quão absurdo isso parece! Mas o vinho de melão é muito bom, se você seguir exatamente minha receita. Veja se você consegue dominá-la.\""
"Paullus in Statehelm said, \"My mouth is watering in anticipation. Try making some of that citrus wine!\"": "Paullus em Statehelm disse: \"Estou com água na boca de ansiedade. Experimente fazer um pouco daquele vinho cítrico!\""
"Paullus in Statehelm said, \"See if you can make that mulberry wine. It's a good dessert wine. Probably good for parties!\"": "Paullus em Statehelm disse: \"Veja se você consegue fazer aquele vinho de amora. É um bom vinho de sobremesa. Provavelmente bom para festas!\""
"Paullus in Statehelm said, \"Sometimes you need an earthy wine, and carrot does the trick! Have you made any?\"": "Paullus, em Statehelm, disse: \"Às vezes você precisa de um vinho terroso, e a cenoura resolve! Você fez algum?\""
"Paullus in Statehelm said, \"Try making some juniper wine. It's not easy, but it's worth it! Sometimes, anyway!\"": "Paullus em Statehelm disse: \"Experimente fazer vinho de zimbro. Não é fácil, mas vale a pena! Às vezes, pelo menos!\""
"Paullus in Statehelm said, \"You might have to wait for cranberries to be in season for this one, but it's worth the wait. One cranberry wine, please!\"": "Paullus em Statehelm disse: \"Talvez você tenha que esperar que os cranberries estejam na estação para este, mas vale a pena esperar. Um vinho de cranberry, por favor!\""
"Paullus in Statehelm said, \"You're a practicing brewer! Love to see it! Let me teach you how to make strawberry wine. Next time you catch me at a party, if you have a bottle of this for me, I'll teach you to make a trickier variety.\"": "Paullus em Statehelm disse: \"Você é um cervejeiro praticante! Adoro ver isso! Deixe-me ensiná-lo a fazer vinho de morango. Da próxima vez que você me encontrar em uma festa, se tiver uma garrafa disso para mim, vou ensiná-lo a fazer uma variedade mais complicada.\""
