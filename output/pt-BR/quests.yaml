"Sie Antry and I have been working to keep the roads safe, but it's a very hard battle. But I foresee a new problem that I'd like to nip in the bud. Can you help?

To the west of here, near the waterfall, a herd of Gnashers has moved in. And they're breeding! This will be very bad soon. Can you kill off some of the Gnasher Matriarchs before the whole land is overrun?": "Sie Antry e eu temos trabalhado para manter as estradas seguras, mas é uma batalha muito difícil. Mas prevejo um novo problema que gostaria de eliminar pela raiz. Você pode ajudar?

A oeste daqui, perto da cachoeira, um rebanho de Gnashers chegou. E eles estão procriando! Isso será muito ruim em breve. Você consegue matar algumas das Matriarcas Gnasher antes que toda a terra seja invadida?"
"Sie Antry asked you to help make the trade path behind her homestead safer.": "Sie Antry pediu que você ajudasse a tornar mais segura a rota comercial atrás de sua propriedade."
"Sie Antry in Eltibule asked for your help in getting rid of hungry rabbits. Just grow some plants in any garden area, and they'll come running!": "Sie Antry em Eltibule pediu sua ajuda para se livrar dos coelhos famintos. Basta cultivar algumas plantas em qualquer área do jardim e elas virão correndo!"
"Sie Antry requested two perfect giant snail shells. The giant snails near her homestead occasionally drop them.": "Sie Antry solicitou duas conchas de caracóis gigantes perfeitas. Os caracóis gigantes perto de sua propriedade ocasionalmente os deixam cair."
"Sie Antry wants you to kill Giant Mantises near her homestead.": "Sie Antry quer que você mate Giant Mantises perto de sua casa."
"Sie Antry wants you to kill Giant Snails near her homestead.": "Sie Antry quer que você mate Caracóis Gigantes perto da propriedade dela."
"Sie's Roadside Assistance": "Assistência rodoviária de Sie"
"SiesRoadsideAssistance": "SiesRoadsideAssistência"
"Siga o mapa, entre, encontre o Xedrite Armado e saia. Não estrague tudo! Você só tem uma chance": "você não conseguirá voltar na segunda vez.\""
"Sigh... Ormond and his damned codes! Let me see... ah. Tell him thanks for nothing, I already learned that earlier this morning.

And tell him his code system needs work: it's too obviously a code! I think the code message should read like a bakery order. Wouldn't that be clever? Why couldn't he have been clever like his sister Laura? Ask him that.": "Suspiro... Ormond e seus malditos códigos! Deixe-me ver... ah. Agradeça a ele por nada, já aprendi isso esta manhã.

E diga a ele que seu sistema de código precisa ser melhorado: é obviamente um código! Acho que a mensagem do código deveria parecer um pedido de padaria. Isso não seria inteligente? Por que ele não poderia ter sido inteligente como sua irmã Laura? Pergunte isso a ele."
"Siiigh... Once again I've used you to kill a creature that I wasn't able to kill. Am I weak? Perhaps. But delegating tasks you're unable to do yourself is top-tier delegation. And I'm a delegate. So I think I'm doing pretty well, actually.

... I'm sorry. And thanks.": "Siiigh... Mais uma vez usei você para matar uma criatura que não fui capaz de matar. Eu sou fraco? Talvez. Mas delegar tarefas que você não consegue realizar sozinho é uma delegação de alto nível. E eu sou um delegado. Então acho que estou indo muito bem, na verdade.

... Desculpe. E obrigado."
