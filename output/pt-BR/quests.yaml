"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Boletus Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?": "Olá! O cassino oferece ótimas bebidas, mas estou morrendo de vontade de comer um smoothie de cogumelos! Você poderia me trazer 10 smoothies de cogumelos Boletus? Não! Não vou beber todos de uma vez. O que você acha que eu sou... um anão?"
"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Boletus Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?

": "Olá! O cassino oferece ótimas bebidas, mas estou morrendo de vontade de comer um smoothie de cogumelos! Você poderia me trazer 10 smoothies de cogumelos Boletus? Não! Não vou beber todos de uma vez. O que você acha que eu sou... um anão?"
"Hi! I am flat exhausted from traveling so much. Everyone else is too! We need some fresh flowers to perk everyone up. Can you make me 10 Dandelion Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.": "Oi! Estou exausto de tanto viajar. Todos os outros também estão! Precisamos de algumas flores frescas para animar a todos. Você pode me fazer 10 buquês de dente-de-leão? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos."
