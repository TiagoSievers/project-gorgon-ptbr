"Delia said, \"Hi! I am flat exhausted from traveling so much. Everyone else is too! We need some fresh flowers to perk everyone up. Can you make me 10 Dandelion Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Delia disse: \"Olá! Estou exausta de tanto viajar. Todo mundo também está! Precisamos de algumas flores frescas para animar a todos. Você pode me fazer 10 buquês de dente-de-leão? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos para isso. \""
"Delia said, \"Hi! I am flat exhausted from traveling so much. Everyone else is too! We need some fresh flowers to perk everyone up. Can you make me 10 Hyacinth Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Delia disse: \"Oi! Estou exausta de tanto viajar. Todo mundo também está! Precisamos de algumas flores frescas para animar a todos. Você pode me fazer 10 buquês de jacintos? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos para isso. \""
"Delia said, \"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect more fish so there's more to eat. Can you make me 10 of Fisherman's Arrangement #6? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Delia disse: \"Olá! Estou exausta de tanto viajar. Preciso criar alguns arranjos para motivar nossos coletores a coletar mais peixes para que haja mais para comer. Você pode me fazer 10 do Arranjo de Pescador # 6? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos para isso.\""
"Delia said, \"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect wood for fires and repairs more efficiently. Can you make me 10 Lumberjack Arrangements #3? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Delia disse: \"Olá! Estou exausta de tanto viajar. Preciso criar alguns arranjos para motivar nossos coletores a coletar madeira para fogueiras e reparos com mais eficiência. Você pode me fazer 10 arranjos de lenhador nº 3? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos para isso. \""
"Delia said, \"Hi! I am flat exhausted from traveling so much. The smell of violets always brings me back to life! Can you make me 10 Violet Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Delia disse: \"Oi! Estou exausta de tanto viajar. O cheiro de violetas sempre me traz de volta à vida! Você pode me fazer 10 buquês de violetas? Terei prazer em lhe dar algumas novas idéias para expandir suas opções de arranjos para isso.\""
