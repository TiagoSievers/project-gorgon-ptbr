"Another easy one: practice your Thunderous Note on 50 enemies and then kill them. Pay attention to the efficacy of the note on different types of enemies.": "Outra fácil: pratique sua Thunderous Note em 50 inimigos e depois mate-os. Preste atenção na eficácia da nota em diferentes tipos de inimigos."
