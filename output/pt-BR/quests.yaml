"Felmer can be a handy person to know when things get... Um... chaotic. You should say hello.": "Felmer pode ser uma pessoa útil para saber quando as coisas ficam... Hum... caóticas. Você deveria dizer olá."
"Felmer in the Fae Realm said, \"Did you hear about that unfortunate fire-rift that opened south of here? I was thinking... while the Winter Fae portal is also open, that means there's three potent elemental sources here: Fire, Cold, and Nature. You know what that means: party time!

Oh, sorry, you don't know what I mean, do you. Well, If you can find three elementals big enough and old enough to drop nice-sounding crystals, I can fashion those crystals into beautiful fairy chimes.

I'm not sure if mortals are capable of playing them... but we could find out!\"": "Felmer, no Reino Fae, disse: \"Você ouviu falar daquela infeliz fenda de fogo que se abriu ao sul daqui? Eu estava pensando... embora o portal Winter Fae também esteja aberto, isso significa que há três fontes elementais potentes aqui: Fogo, Frio e Natureza. Você sabe o que isso significa: hora da festa!

Oh, desculpe, você não sabe o que quero dizer, não é? Bem, se você conseguir encontrar três elementais grandes e velhos o suficiente para soltar cristais de bom som, posso transformar esses cristais em lindos sinos de fadas.

Não tenho certeza se os mortais são capazes de interpretá-los... mas podemos descobrir!\""
"Felmer in the Fae Realm said, \"Floxie has been helping me gather local flowers to test as dyes, but the ocelots keep running her off. I told her not to be afraid of little kittens, and she told me to go get my own flowers! Can you clear some of them out for me? If anyone can deal with harmless felines, it's you! \"": "Felmer, no Reino Fae, disse: “Floxie tem me ajudado a coletar flores locais para testar como corantes, mas as jaguatiricas continuam a expulsá-la. Eu disse a ela para não ter medo de gatinhos, e ela me disse para ir buscar minhas próprias flores!"
"Felmer in the Fae Realm said, \"If you bring me dinosaur scales to make buttons, I'll show you how to use First Aid.\"": "Felmer, no Reino Fae, disse: “Se você me trouxer escamas de dinossauro para fazer botões, mostrarei como usar os primeiros socorros”."
"Felmer in the Fae Realm said, \"My friend Lisi in Sun Vale is very good at making images. Of course now she needs to use paper, but it's still not bad. She's holding a, uh... a book for me. Like an an art book, you know? With sketches of ... nature. Look, nevermind. Just go to Sun Vale and bring me back that book!\"": "Felmer, no Reino Fae, disse: “Minha amiga Lisi em Sun Vale é muito boa em fazer imagens."
"Felmer in the Fae Realm said, \"Once again I'm going to have to trek out into the dangerous wilds to collect the slime of fae molluscs... say, you know how to milk a snail, I presume? Would you mind doing it? Take some clean bottles with you to collect it!\"": "Felmer, no Reino Fae, disse: \"Mais uma vez terei que caminhar pelas perigosas florestas para coletar o lodo dos moluscos Fae... digamos, você sabe como ordenhar um caracol, presumo? Você se importaria de fazer isso? Leve algumas garrafas limpas com você para coletá-lo!\""
"Felmer sent you?

<i>[Lisi glances around anxiously, then sighs.]</i>

He always does this. If Silvia finds out...

<i>[She shoots you a pointed look.]</i>

Nevermind! I didn't say anything! You didn't even talk to me!

Here's the 'art book' for Felmer. And tell him I won't keep doing this! This is the last time!": "Felmer enviou você?

<i>[Lisi olha ao redor ansiosamente e depois suspira.]</i>

Ele sempre faz isso. Se Silvia descobrir...

<i>[Ela lança um olhar penetrante para você.]</i>

Deixa pra lá! Eu não disse nada! Você nem falou comigo!

Aqui está o 'livro de arte' de Felmer. E diga a ele que não vou continuar fazendo isso! Esta é a última vez!"
