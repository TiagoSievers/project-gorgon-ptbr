"But I do not want a different mate than Tavilak! Surely there is a resolution to this. She could simply refrain from killing me, for instance... I need to meld with Tavilak and understand her concerns. Could you cover my storefront for a few minutes while I see her? It shouldn't take too long. <i>[New Hangout available.]</i>": "Mas não quero um companheiro diferente do Tavilak! Certamente há uma solução para isso. Ela poderia simplesmente evitar me matar, por exemplo... Preciso me fundir com Tavilak e entender suas preocupações. Você poderia cobrir minha loja por alguns minutos enquanto eu a vejo? Não deve demorar muito. <i>[Novo Hangout disponível.]</i>"
"But I have a lead on a sale": "Crelpin asked if I had any fresh pears, and I realized I didn't! Mine are old! If you're headed out of town, please pick me up some really fresh ones. And don't eat them!\\\"\": \"Raina, no Reino Fae, disse: “Tento manter minha loja abastecida com o essencial... mas o que É essencial, afinal? Eu pessoalmente não preciso de muito, então tenho estocado um pouco de tudo, caso seja essencial para outra pessoa. Apesar disso, as vendas são... não boas."
"But it seems crazy not to try to fix this somehow. Can you go and talk to him? Just get a feeling for where he's at mentally. He goes by Tessa now and works in the kitchen most days.\\\"\": \"Sourgum em Statehelm disse": "\\\"Sabe, esse esquema de banana realmente trouxe de volta memórias. Eu e meu melhor amigo, Mophew, costumávamos executar todos os tipos de esquemas malucos como esse! Mas ele... morreu."
"But listen VERY carefully": "carrying it will make you sick. So get the ore and then <i>run</i> back here to me as quick as you can. Don't dally! I only need three pieces, so don't get any more than that.\\\"\": \"Mox Warcut em New Prestonbule disse: \\\"Preciso de uma amostra do Vol's Kiss que pode ser encontrada em Gazluk. Você pode conseguir para mim? É um cristal amarelo quente ao toque. Você pode encontrá-lo em toda a encosta da montanha."
"But Norala's boon requires the death of the largest, most horrific creatures. No ordinary orc or human shall do!\\\"\": \"Um avatar de Tast em Povus disse": "Posso ensiná-lo a fabricar uma armadura de lobo de qualidade surpreendente, abençoada por minha consorte Norala. Pois embora seus lobos sejam fortes, seus ferreiros são fracos! E a fraqueza não é tolerada por muito tempo na guerra. Você os ajudará a serem dignos de guerra."
"But one more thing, and I can't stress this part enough": "you need to be naked when you do it. No shirt, no pants, no gloves! But you can wear, like, a hat. And shoes, obviously.\": \"<i>Zhia Lian:</i> Houve um desastre terrível que está vagamente relacionado a mim. Parece que eu não sabia o suficiente sobre biologia de sapos. Achei que estava ajudando! Mas esqueça os detalhes. Existem alguns sapos muito perigosos em Povus e você deveria matá-los para mim!"
"But please <i>please</i> don't tell Norbert because he yells at me when I say I like sausage. Please? Okay good.\\\"\": \"Spot em Animal Town disse": "\\\"Precisamos de coisas pegajosas. Tipo... hum, barbante. Não, barbante é feio. Salsichas! Salsichas são pegajosas! Pegue um pouco!"
"But right now I need to create a NEW masterpiece. The old one was a riff on my famous rubywall crystal motif, but now I'm imagining something fresher": "rubywall-like crystals, but with the darkest of aquamarines!"
"But that repair didn't make it go. I think I found the problem": "the primary timing system is just... gone! It must have gotten lost or stolen. I've studied the similar ones in the auxiliary system, and I think if I had a dwarven weight like this one, I could rig something up with some string. Maybe? Worth a try.\": \"O equipamento que você encontrou se encaixa perfeitamente! Essas engrenagens devem ser produzidas em massa pelos anões! Isso é incrível, certo?"
