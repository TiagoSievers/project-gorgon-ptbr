"Mope in Povus said, \"I need new types of fungus to improve my fungal forest. These species do not grow natively here, so I must ask for assistance.\"": "Mope, em Povus, disse: “Preciso de novos tipos de fungos para melhorar minha floresta de fungos. Essas espécies não crescem nativamente aqui, por isso devo pedir ajuda”."
"Mope in Povus said, \"If you were to exterminate more ratkin root-tenders, I would be in your debt.\"": "Mope em Povus disse: \"Se você exterminasse mais ratkin root-tenders, eu ficaria em dívida com você.\""
"Mope in Povus said, \"Six days prior, a band of fortified orcs attempted to cross my fungal fields and chop down my tall mushrooms. They were killed and their bodies are now fertilizer. Yet I fear retaliation, for orcs are not prone to abandoning their schemes. It would be prudent to remove that threat immediately.\"": "Mope em Povus disse: \"Seis dias antes, um bando de orcs fortificados tentou cruzar meus campos de fungos e derrubar meus cogumelos altos. Eles foram mortos e seus corpos agora são fertilizantes. No entanto, temo retaliação, pois os orcs não são propensos a abandonar seus esquemas. Seria prudente remover essa ameaça imediatamente.\""
"Mope in Povus said, \"Some of my fly amanita has spread beyond my locus of control. They are mine and I desire to have them.\"": "Mope em Povus disse: \"Alguns dos meus amanitas mosca se espalharam além do meu locus de controle. Eles são meus e desejo tê-los.\""
"Mope in Povus said, \"You wish to aid me? Then exterminate the ratkin root-tenders that constantly try to unearth my fungus!\"": "Mope em Povus disse: \"Você deseja me ajudar? Então extermine os criadores de raízes de ratkin que constantemente tentam desenterrar meu fungo!\""
