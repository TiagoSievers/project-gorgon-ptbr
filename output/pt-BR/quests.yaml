"Barnaby in the Sacred Warden Grotto said, \"I've been teaching the foxes how to read by sounding out the Human language symbols. I don't think they're ready for writing yet -- truth be told I have a hard time with writing myself! But it's time they became familiar with paper and ink. We'll need a LOT of both.\"": "Barnaby, na Gruta do Guardião Sagrado, disse: \"Tenho ensinado as raposas a ler, sondando os símbolos da linguagem humana. Não acho que eles estejam prontos para escrever ainda - verdade seja dita, tenho dificuldade em escrever sozinho! Mas é hora de eles se familiarizarem com papel e tinta. Precisaremos de MUITOs de ambos.\""
"Barnaby in the Sacred Warden Grotto said, \"The foxes love the gems you got! I explained to Rubi that she's named after a gem called a Ruby. She insists upon seeing some of these gems right away! And that got me to thinking: if I had a LOT of them, I could use them in tomorrow's math lesson. Do you know where to find a lot of rubies?

Of course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?\"": "Barnaby, na Gruta do Guardião Sagrado, disse: \"As raposas adoram as joias que você ganhou! Expliquei a Rubi que ela recebeu o nome de uma joia chamada Ruby. Ela insiste em ver algumas dessas joias imediatamente! E isso me fez pensar: se eu tivesse MUITAS delas, poderia usá-las na aula de matemática de amanhã. Você sabe onde encontrar muitos rubis?

Claro, não deveríamos deixar Cassie de fora. Encontre algumas pedras bonitas para ela também, ok?"
"Barnaby in the Sacred Warden Grotto said, \"We're having some trouble with the \"drawing with ink\" lessons: Rubi refuses to get her paws inked up. I think I need something less messy to help them build paw-mouth dexterity. Help me get the raw materials for a little sewing project.\"": "Barnaby, na Gruta do Guardião Sagrado, disse: \"Estamos tendo alguns problemas com as lições de\" desenho com tinta \": Rubi se recusa a tatuar as patas. Acho que preciso de algo menos bagunçado para ajudá-los a desenvolver a destreza na boca da pata. Ajude-me a conseguir a matéria-prima para um pequeno projeto de costura. \""
"Barnaby in the Sacred Warden Grotto said, \"Young foxes love colorful gems! I could use a selection of nice colors to use as teaching props.\"": "Barnaby, na Gruta do Guardião Sagrado, disse: \"Jovens raposas adoram joias coloridas! Eu poderia usar uma seleção de cores bonitas para usar como adereços de ensino.\""
"Baroness Marith Felgard in Serbule Hills said, \"Goblins are quite horrid little creatures, but they often decorate their calling-cards quite elegantly. I think if we had a number of calling-cards we could use them as makeshift tree decorations.\"": "A Baronesa Marith Felgard, em Serbule Hills, disse: \"Goblins são criaturinhas horríveis, mas muitas vezes decoram seus cartões de visita com bastante elegância. Acho que se tivéssemos vários cartões de visita, poderíamos usá-los como decorações improvisadas para árvores.\""
"Baroness Marith Felgard in Serbule Hills said, \"I know that most of the farms in Serbule Hills have been abandoned, but I still need to soil samples from each one. It's part of my scientific duties, you understand. Here. Put a bit of soil from each farm in here and bring it back. Simple as cake! And I shall award you 700 Councils.\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Eu sei que a maioria das fazendas em Serbule Hills foram abandonadas, mas ainda preciso coletar amostras de solo de cada uma delas. Faz parte dos meus deveres científicos, você entende. Aqui. Coloque um pouco de solo de cada fazenda aqui e traga-o de volta. Simples como um bolo! E eu vou premiar você com 700 Conselhos.\""
"Baroness Marith Felgard in Serbule Hills said, \"The goblins are keeping the ranalon very focused on their west flank. The eastern flank, the one facing us, has only a handful of guards. If we attack it, they'll have to split their forces up more, giving the goblins a better chance to take them out for us.

Focus on the guards at the outpost down the road. That will get their attention. I will pay you 350 Councils if you kill six of them.\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Os goblins estão mantendo o Ranalon muito focado em seu flanco oeste. O flanco leste, aquele que está de frente para nós, tem apenas um punhado de guardas. Se o atacarmos, eles terão que dividir mais suas forças, dando aos goblins uma chance melhor de derrotá-los para nós.

Concentre-se nos guardas do posto avançado na estrada. Isso chamará a atenção deles. Eu pagarei a você 350 Conselhos se você matar seis deles.\""
"Baroness Marith Felgard in Serbule Hills said, \"The ranalon have a sort of outdoor temple near the lake. You'll know it by the two large stone obelisks sticking out of the water nearby. Go there and slay the prayermaster and his minions. The prayer-master is an important leader, and his death will cause chaos among their ranks. I shall pay you 400 Councils.\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Os ranalon têm uma espécie de templo ao ar livre perto do lago. Você saberá disso pelos dois grandes obeliscos de pedra saindo da água nas proximidades. Vá até lá e mate o mestre de orações e seus asseclas. O mestre de orações é um líder importante, e sua morte causará o caos entre suas fileiras. Eu pagarei a você 400 Conselhos. \""
"Baroness Marith Felgard in Serbule Hills said, \"There's a bunch of old holiday ornaments stored in Serbule Keep. Nelson Ballard is a stingy bastard, but perhaps you can persuade him to part with some of his ornaments?\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Há um monte de enfeites antigos de férias armazenados em Serbule Keep. Nelson Ballard é um bastardo mesquinho, mas talvez você possa convencê-lo a se desfazer de alguns de seus enfeites?\""
"Baroness Marith Felgard in Serbule Hills said, \"We need something large and beautiful to top the tree. I've seen some of the ranalon wearing decorative brooches that might work. Search the ones that stay down in the water and carry staves. 'Garden Masters', I think is what we call them.\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Precisamos de algo grande e bonito para cobrir a árvore. Vi alguns ranalon usando broches decorativos que podem funcionar. Procure aqueles que ficam na água e carregam cajados. 'Mestres de Jardim', acho que é como os chamamos. \""
"Baroness Marith Felgard in Serbule Hills said, \"We need to slow down the ranalon food production. They have a massive number of farmers in those lakes. Dispatch them! I shall reward you with 500 Councils.\"": "A Baronesa Marith Felgard em Serbule Hills disse: \"Precisamos desacelerar a produção de alimentos ranalon. Eles têm um grande número de agricultores nesses lagos. Despache-os! Vou recompensá-lo com 500 Conselhos.\""
"Baroness Marith Felgard in Serbule Hills said, \"We're very low on resources this year so we'll have to get creative with our decorations. Hmm, how about grapes? They're colorful and relatively plentiful...\"": "A Baronesa Marith Felgard, em Serbule Hills, disse: \"Estamos com poucos recursos este ano, então teremos que ser criativos com nossas decorações. Hmm, que tal as uvas? Elas são coloridas e relativamente abundantes...\""
