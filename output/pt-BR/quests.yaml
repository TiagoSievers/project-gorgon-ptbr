"Grakelsput in Povus said, \"Do you think you can take out the pointy-faced dinosaurs? Those were called triceratops, and they lived a very long time ago. Try not to get knocked off a cliff!\"": "Grakelsput em Povus disse: \"Você acha que pode eliminar os dinossauros de rosto pontudo? Eles eram chamados de triceratops e viveram há muito tempo. Tente não ser derrubado de um penhasco!\""
"Grakelsput in Povus said, \"Once, long ago, giant cats roamed Povus. But we've only managed to resurrect a few specimens! We're so early in our research of this creature that we don't even want to study their behavior yet: I just need bones to study! If you find giant cat bones, please bring them to me.\"": "Grakelsput em Povus disse: \"Uma vez, há muito tempo, gatos gigantes vagavam por Povus. Mas só conseguimos ressuscitar alguns espécimes! Estamos tão no início de nossa pesquisa sobre esta criatura que nem queremos estudar seu comportamento ainda: só preciso de ossos para estudar! Se você encontrar ossos de gatos gigantes, por favor, traga-os para mim.\""
"Grakelsput in Povus said, \"When we reanimate a creature through Paleontology, we can't control it. Most of my associates are skilled at aggression deterrance, so there aren't too many accidents. But I have to admit the number of skeletal beasts in the area is becoming somewhat ... problematic. Hey, maybe you could clean some of them up for us? Start with the lanky ones. They're comparatively docile.\"": "Grakelsput em Povus disse: \"Quando reanimarmos uma criatura por meio da Paleontologia, não podemos controlá-la. A maioria dos meus associados são habilidosos em dissuadir a agressão, então não há muitos acidentes. Mas tenho que admitir que o número de bestas esqueléticas na área está se tornando um tanto... problemático. Ei, talvez você pudesse limpar alguns deles para nós? Comece com os esguios. Eles são comparativamente dóceis. \""
