"Work on my new spell continues. I suppose I will share the premise with you: it is a new kind of sentient flame, much more suitable to certain types of work.

But there is much research left. You seem competent enough to help with that research. Here's what I need you to do. Go find some rakshasa bandits, or pirates, or other socially undesirables, and kill them with fire. This next bit is very important: they need to die from the impact of a Scintillating Flame.

As you bury them, note whether they have a startled expression on their face.": "O trabalho no meu novo feitiço continua. Suponho que compartilharei a premissa com você: é um novo tipo de chama senciente, muito mais adequada a certos tipos de trabalho.

Mas ainda há muita pesquisa. Você parece competente o suficiente para ajudar nessa pesquisa. Aqui está o que eu preciso que você faça. Vá encontrar alguns bandidos rakshasa, ou piratas, ou outros socialmente indesejáveis, e mate-os com fogo. A próxima parte é muito importante: eles precisam morrer pelo impacto de uma Chama Cintilante.

Ao enterrá-los, observe se eles têm uma expressão assustada no rosto."
"Working with physical paper is interesting. I've been reading some books about creatures in this realm. Could you bring me some spider legs to study?": "Trabalhar com papel físico é interessante. Tenho lido alguns livros sobre criaturas deste reino. Você poderia me trazer algumas pernas de aranha para estudar?"
"WorkOrder": "Ordem de serviço"
"WorkOrderCurrency": "Moeda da Ordem de Trabalho"
"World Goal: Deliver 125 Evil Pumpkins": "Objetivo Mundial: Entregar 125 Abóboras Malignas"
"World Goal: Deliver 125 Fire Dust": "Objetivo Mundial: Entregar 125 Pó de Fogo"
"World Goal: Deliver 125 Oregano": "Meta Mundial: Entregar 125 Oréganos"
"World Goal: Deliver 125 Strange Dirt": "Objetivo Mundial: Entregar 125 Sujeiras Estranhas"
"World Goal: Deliver 250 Evil Pumpkins": "Objetivo Mundial: Entregar 250 Abóboras Malignas"
"World Goal: Deliver 250 Fire Dust": "Meta Mundial: Entregar 250 Pó de Fogo"
"World Goal: Deliver 250 Oregano": "Meta Mundial: Entregar 250 Oréganos"
"World Goal: Deliver 250 Strange Dirt": "Objetivo Mundial: Entregar 250 Sujidades Estranhas"
"Worm Teeth": "Dentes de verme"
"WormTeeth": "Dentes de minhoca"
"WormTooth": "Dente de minhoca"
"Would you 'be a deer' as the humans say, and pick me up a certain thing while you're out hunting? It's... a slightly delicate issue: I need a few barghest snouts. Please don't tell Marrowchomp -- I'm already 'on thin ice' with him, as the humans say.": "Você seria um cervo, como dizem os humanos, e me pegaria uma certa coisa enquanto estivesse caçando? É... uma questão um pouco delicada: preciso de alguns focinhos barghest. Por favor, não conte a Marrowchomp – já estou “no gelo fino” com ele, como dizem os humanos."
"Wow! Do you know Orcish? How did you find these?! No, no, don't tell me your scavenging secrets. I trust that you didn't steal them from anyone in Statehelm, and that's all I care about.": "Uau! Você conhece Orc? Como você encontrou isso?! Não, não, não me conte seus segredos de limpeza. Confio que você não os roubou de ninguém em Statehelm, e isso é tudo que me importa."
"Wow! Give it to me!

Okay. You  can hang out here. But don't beg for treats, got it?": "Uau! Dê para mim!

OK. Você pode sair aqui. Mas não implore por guloseimas, entendeu?"
"Wow! Thanks so much! These mushrooms don't smell at all. That's kind of amazing! I bet these would make a really effective poison. But there might be nutritional value here somehow, and I'll find it!

Here, these are more traditionally nutritional.": "Uau! Muito obrigado! Esses cogumelos não têm cheiro nenhum. Isso é incrível! Aposto que seriam um veneno realmente eficaz. Mas pode haver algum valor nutricional aqui, e eu vou encontrá-lo!

Aqui, estes são mais tradicionalmente nutricionais."
"Wow! Where'd you find garnets around here? I hope you didn't go to a lot of trouble for me! Here are some of my prettier gems in exchange!": "Uau! Onde você encontrou granadas por aqui? Espero que você não tenha se dado muito trabalho por minha causa! Aqui estão algumas das minhas joias mais bonitas em troca!"
"Wow! You can really smell the earth the carrots grew in! Definitely different, eh? ... Let's move on.": "Uau! Você pode realmente sentir o cheiro da terra onde as cenouras cresceram! Definitivamente diferente, né? ... Vamos em frente."
"WOW! You finished all 7 of them? That's pretty impressive! Thank you for your massive contribution!!!

The quests are done, but you can still continue to use normal and Golden Writs to help advance the Community Score.": "UAU! Você terminou todos os 7 deles? Isso é bastante impressionante! Obrigado pela sua enorme contribuição!!!

As missões estão concluídas, mas você ainda pode continuar usando os Mandamentos normais e de Ouro para ajudar a avançar na Pontuação da Comunidade."
"Wow, amazing! And you made this? Yourself? Oh, that's perfect, I'll take it!": "Uau, incrível! E você fez isso? Você mesmo? Ah, isso é perfeito, eu aceito!"
"Wow, I didn't expect you to manage that. Thank you. Ain't got much to repay you with, but here's some tailoring supplies.": "Uau, eu não esperava que você conseguisse isso. Obrigado. Não tenho muito com o que retribuir, mas aqui estão alguns materiais de alfaiataria."
"Wow, pristine. Very nice skinning job.": "Uau, impecável. Muito bom trabalho de esfola."
"Wow, thanks! Here's something in exchange.": "Uau, obrigado! Aqui está algo em troca."
"Wow, the combined odor is quite a lot. I'm having second thoughts about this plan, but since you seem to think it's a good idea, I'll give it a try! I'll bask in these odors before I sleep. Come back in a week and I'll let you know how it went.": "Nossa, o odor combinado é bastante. Estou pensando melhor sobre esse plano, mas como você parece achar que é uma boa ideia, vou tentar! Vou me deleitar com esses odores antes de dormir. Volte em uma semana e contarei como foi."
"Wow, these are better than I expected.

But enough about that. I noticed that you didn't have much compunction about ripping the skulls out of your fellow creatures using a small knife. You must have a <i>fucked up</i> past! What? No memory? Well, here. This might help you remember things better.": "Uau, estes são melhores do que eu esperava.

Mas chega disso. Percebi que você não teve muito escrúpulo em arrancar os crânios de seus semelhantes usando uma pequena faca. Você deve ter um passado <i>fodido</i>! O que? Sem memória? Bem, aqui. Isso pode ajudá-lo a se lembrar melhor das coisas."
"Wow, they're quite cold. And not very interesting to look at, are they? But don't worry. Landri can work her magic and we'll get a nice tree-topper out of it, I'm sure!": "Uau, eles estão muito frios. E não são muito interessantes de se olhar, não é? Mas não se preocupe. Landri pode fazer sua mágica e conseguiremos uma bela copa de árvore com isso, tenho certeza!"
"Wow, this is larger than I expected! Thank you. Here, you can keep this skin -- it was my first idea, but turns out it's not sexy at all.": "Uau, isso é maior do que eu esperava! Obrigado. Aqui, você pode ficar com essa skin – foi minha primeira ideia, mas descobri que não é nada sexy."
"Wow, you found rabbit's feet! You're quite resourceful. Here, perhaps this will further improve your resourcefulness.": "Uau, você encontrou pés de coelho! Você é bastante engenhoso. Aqui, talvez isso melhore ainda mais sua desenvoltura."
"Wow, you got them! Hmm. They're kind of gross. But no problem; I'll have Gremix class them up with some metal or something.": "Uau, você os pegou! Hum. Eles são meio nojentos. Mas não há problema; Vou pedir ao Gremix para classificá-los com algum metal ou algo assim."
"Wow. Ned'll love this. Thank you so much! Here, let me give you some pointers on surveying.": "Uau. Ned vai adorar isso. Muito obrigado! Aqui, deixe-me dar algumas dicas sobre topografia."
"Wow. The polish on this chair is immaculate. You went all out! And I'm going to reap the rewards! Haven't learned my lesson yet, hahaha!": "Uau. O polimento desta cadeira é imaculado. Você deu tudo de si! E vou colher os frutos! Ainda não aprendi a lição, hahaha!"
"Wow. This stuff is potent!

If you think about it, me giving you that recipe was part of your payment. If you look at it this way you'll see that you're getting a pretty good deal for this stuff!": "Uau. Essa coisa é potente!

Se você pensar bem, eu te dar aquela receita fazia parte do seu pagamento. Se você olhar dessa maneira, verá que está fazendo um bom negócio com essas coisas!"
"Wow. You are really good at killing ranalons. Terrifyingly good. Have you considered killing goblins instead? ... No, gotta stay on focus! We're 'slaying the ranalon menace'!": "Uau. Você é muito bom em matar Ranalons. Terrivelmente bom. Você já pensou em matar goblins? ... Não, tenho que manter o foco! Estamos 'matando a ameaça ranalon'!"
"Wrestling Demons": "Lutando Demônios"
"Wrestling Scorpions": "Escorpiões de luta livre"
"Wrestling Vipers": "Víboras de luta livre"
