"Rebeccah the Whisperer in Statehelm gave you a note that said, \"Congratulations! I knew you were an advanced student when I heard your song.

I can no longer sing, but in my dreams I still can. When I wake, my throat is quite sore. Can you fetch some bitter-mint tea for me?\"": "Rebeccah, a Sussurradora, em Statehelm, deu-lhe um bilhete que dizia: \"Parabéns! Eu sabia que você era um estudante avançado quando ouvi sua música.

Não consigo mais cantar, mas nos meus sonhos ainda consigo. Quando acordo, minha garganta está bastante dolorida. Você pode trazer um pouco de chá de menta amarga para mim?\""
"Recently while tuning up our portal system, we accidentally connected to a series of caves beneath Eltibule. These oddly-dark caves are inaccessible except via teleportation, yet there are numerous bipedal denizens! I believe there is significant magical power hidden in the caves, but the Queen won't allow me to send a mantis assault team in, fearing they'd just be outnumbered and killed. That's why we need you!

Since you and your friends are roughly bipedal, perhaps you can blend in with the other bipeds and scout out the place. Barring that, of course, you should fight desperately for your lives, because the bipeds seem to be mentally ill and quite homicidal.

I have located a few potential sources of magical energy in the caves, so go retrieve them! The teleportation attendant can send you into these caves if you ask him early enough today.

<i>[A group of 4+ level 40+ players recommended.]</i>": "Recentemente, enquanto ajustamos nosso sistema de portal, nos conectamos acidentalmente a uma série de cavernas abaixo de Eltibule. Essas cavernas estranhamente escuras são inacessíveis, exceto por teletransporte, mas ainda assim existem numerosos habitantes bípedes! Acredito que haja um poder mágico significativo escondido nas cavernas, mas a Rainha não me permite enviar uma equipe de ataque de louva-a-deus, temendo que eles fiquem em menor número e sejam mortos. É por isso que precisamos de você!

Como você e seus amigos são praticamente bípedes, talvez você possa se misturar com os outros bípedes e explorar o local. Exceto isso, é claro, vocês deveriam lutar desesperadamente por suas vidas, porque os bípedes parecem ser doentes mentais e bastante homicidas.

Localizei algumas fontes potenciais de energia mágica nas cavernas, então vá recuperá-las! O atendente do teletransporte pode mandá-lo para essas cavernas se você perguntar a ele com antecedência hoje.

<i>[Recomenda-se um grupo de 4+ jogadores de nível 40+.]</i>"
