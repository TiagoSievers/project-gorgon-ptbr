"Damn it! Still not enough candles!

Well, let me teach you a bit about hammering out dents. [You gain Armor Patching XP]": "Caramba! Ainda não há velas suficientes!

Bem, deixe-me ensinar um pouco sobre como fazer amassados. [Você ganha XP em Remendos de Armadura]"
"Damn it, he's still out there! Mocking me! The only tiger to escape my blade! Old Fangsworth is a crafty beast; I admit he bested me when I was younger. I could kill him now, but I no longer have the time to stalk him and take him out.": "Droga, ele ainda está por aí! Zombando de mim! O único tigre que escapou da minha lâmina! O velho Fangsworth é uma fera astuta; Admito que ele me superou quando eu era mais jovem. Eu poderia matá-lo agora, mas não tenho mais tempo para persegui-lo e matá-lo."
