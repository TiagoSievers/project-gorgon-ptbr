"How can the Butterfly symbol truly capture the essence of the wind? It can't: that's the job of the Wind symbol! Even so, you must understand the way the wind works on the subject. It wouldn't take but a moment to understand it, if only you were a butterfly yourself!": "Como o símbolo da Borboleta pode realmente capturar a essência do vento? Não pode: esse é o trabalho do símbolo do Vento! Mesmo assim, é preciso entender a forma como o vento atua sobre o assunto. Não demoraria mais do que um momento para entender isso, se você fosse uma borboleta!"
"How did the pig guts feel? Gross? Fatty? You see!? You're finally interacting with the <i>real</i> world, not the fake world that you usually live in. You'll get healthy in no time.": "Como se sentiram as tripas de porco? Bruto? Gordo? Você vê!? Você finalmente está interagindo com o mundo <i>real</i>, não com o mundo falso em que normalmente vive. Você ficará saudável em pouco tempo."
"How did you get peaches?! Thank you so much! Tryaka will love these!": "Como você conseguiu pêssegos?! Muito obrigado! Tryaka vai adorar isso!"
"How many pemphredo eyes did you find? Hmm. That's too few. If they were actively listening for orders from their homeland, there would be hundreds everywhere. And it seems Asterion's personal eye was only used for close-range communication! But...

But... but they MUST be communicating with the Hegemony military somehow. Right?! There's an entire platoon buried in the sand, waiting to spring some sort of trap. I just can't figure out what signal they're waiting for!

Argh! Damn your failure! Damn it all! I have nothing to go on!

Yes, yes, of course: you did as requested and here is your payment.": "Quantos olhos de pefredo você encontrou? Hum. Isso é muito pouco. Se eles estivessem ouvindo ativamente as ordens de sua terra natal, haveria centenas por toda parte. E parece que o olho pessoal de Asterion só foi usado para comunicação de curta distância! Mas...

Mas... mas eles DEVEM estar se comunicando com os militares da Hegemonia de alguma forma. Certo?! Há um pelotão inteiro enterrado na areia, esperando para lançar algum tipo de armadilha. Eu simplesmente não consigo descobrir que sinal eles estão esperando!

Argh! Maldito seja o seu fracasso! Maldito seja! Não tenho nada para continuar!

Sim, sim, claro: você fez o que lhe foi solicitado e aqui está o seu pagamento."
"How to depict the Wind symbol? Its mysteries are limited only by the forces of nature itself. You must delve ever deeper into the heart of the storm to comprehend the Wind.": "Como representar o símbolo do Vento? Seus mistérios são limitados apenas pelas forças da própria natureza. Você deve mergulhar cada vez mais fundo no coração da tempestade para compreender o Vento."
"How would you find the camp? Let me think. It's on the plateau. There's a useless lookout tower somewhat nearby. From the camp you can look down over the cliff and see a lot of trees. Does that narrow it down? You'll know you're in the right place when you see iron dodecahedrons hammered into the cold earth. There'll be a building with a sending stone; contact me from there.\\\"\": \"Unora Veilmoor em Statehelm disse": "\\\"Estou muito ocupado para treiná-lo pessoalmente. Mas preparei algo para você. Vá e visite meu antigo campo de treinamento em Gazluk. Deixei programas de treinamento lá e vou orientá-lo através deles enviando pedras."
"However, I have to personally meet the craftsman to ensure that I'm not buying furniture made by slaves. Goblin slavers have flooded the market with that stuff, and I will have no part of it!\\\"\": \"Lincha em Povus disse": "\\\"Não sou um grande louco por caligrafia, mas costumava praticar de vez em quando. Se eu ainda tivesse meu incrível banco de caligrafia, poderia começar de novo!"
"Hrm. It says right here that their flavor profile is best described as \"a combination of spicy and sour.\" I don't know who exactly performed this taste test, but bless their heart.": "Hum. Diz aqui que seu perfil de sabor é melhor descrito como “uma combinação de picante e azedo”. Não sei quem exatamente realizou esse teste de sabor, mas abençoe seu coração."
"Huge Fae Honeycombs": "Enormes favos de mel Fae"
"Huge Gold Dragon Statues": "Enormes estátuas de dragões dourados"
"Huge Gold Gryphon Statues": "Enormes estátuas de grifos de ouro"
"Huge Silver Dragon Statues": "Enormes estátuas de dragão prateado"
"Huge Silver Gryphon Statues": "Enormes estátuas de grifos prateados"
"Huh, this iridium's not glowing. I wonder if I have to cast some sort of activation spell or something? Shit. I'll ask Wombat, he'll know what to do.

Thanks for the help. Here -- take my old backup buckle. In my younger days I was wearing this buckle when I got sent to a prison dimension. I spent thousands of years in limbo before I could get free. Ha, those were good times, probably! I can't really remember it well, but I met some fun people.

Anyway, when I came out, I discovered this buckle can't be broken. No matter what you do, it's unbreakable. Neat, huh? Keep it, because you, too, are fucking UNBREAKABLE! YEAH!": "Huh, este irídio não está brilhando. Eu me pergunto se tenho que lançar algum tipo de feitiço de ativação ou algo assim? Merda. Vou perguntar ao Wombat, ele saberá o que fazer.

Obrigado pela ajuda. Aqui - pegue minha velha fivela reserva. Na minha juventude, eu usava essa fivela quando fui enviado para uma dimensão de prisão. Passei milhares de anos no limbo antes de poder me libertar. Ha, aqueles foram bons tempos, provavelmente! Não me lembro bem, mas conheci algumas pessoas divertidas.

De qualquer forma, quando saí, descobri que essa fivela não pode ser quebrada. Não importa o que você faça, é inquebrável. Legal, hein? Fique com ele, porque você também é INQUEBRÁVEL! SIM!"
"Huh. It's not half bad! Doesn't taste much like milk to me, but it's tasty enough.

Here, here's a small reward for helping me.": "Huh. Não é tão ruim! Para mim, não tem gosto de leite, mas é bastante saboroso.

Aqui está uma pequena recompensa por me ajudar."
"Huh? Nightshade sent you? Really? Well... tell him thanks. I'm okay. Just... cold and miserable.": "Huh? Nightshade enviou você? Realmente? Bem... agradeça a ele. Estou bem. Apenas... frio e miserável."
"Hulking Gels": "Géis gigantescos"
"Hulon won't let you use the Council Vault while you're an animal... if his superiors found out, he'd be in trouble. But he hinted that a suitable bribe would get him to look the other way.": "Hulon não deixará você usar o Cofre do Conselho enquanto você for um animal... se seus superiores descobrissem, ele estaria em apuros. Mas ele deu a entender que um suborno adequado o faria desviar o olhar."
