"Mittens in Kur Mountains asked for some lac to help make paint. She says that it can be found on giant insects, including Tor-Uraks.": "Mittens nas montanhas Kur pediram um pouco de laca para ajudar a fazer tinta. Ela diz que pode ser encontrado em insetos gigantes, incluindo Tor-Uraks."
"Mittens in Kur Mountains asked for some winterhue flowers. They bloom all around Kur Mountains starting at 5am, but they die off as the afternoon sun reaches its peak.": "As luvas nas montanhas Kur pediam algumas flores em tons de inverno. Eles florescem ao redor das montanhas Kur a partir das 5h, mas morrem quando o sol da tarde atinge seu pico."
"Mm, the odor of clipped grass and overripe strawberries. Not mouthwatering, but it gets you drunk!

Let me teach you a classic wine. This one's much tastier.": "Hum, o cheiro de grama cortada e morangos maduros demais. Não é de dar água na boca, mas deixa você bêbado!

Deixe-me ensinar-lhe um vinho clássico. Este é muito mais saboroso."
"MM. IS NOT PERFECT! BUT IS GOOD. WILL USE. TAKE OLD. STILL WORK!": "Milímetros. NÃO É PERFEITO! MAS É BOM. USARÁ. PEGUE VELHO. AINDA TRABALHO!"
"Mm. It has animal hair on it. But this is definitely some of my stolen jewelry. Thank you so much for your hard work!": "Hum. Tem pelos de animais. Mas esta é definitivamente uma das minhas jóias roubadas. Muito obrigado pelo seu trabalho duro!"
"Mm. Kill plants. Bring dust.": "Hum. Mate as plantas. Traga poeira."
"Mmm, smells delicious! Thanks!

Let me show you a couple little gardening tips.": "Humm, tem um cheiro delicioso! Obrigado!

Deixe-me mostrar algumas dicas de jardinagem."
"Mmm. Sweet and pungent. You are too kind! Here. Take this as a sort of gesture of thanks.": "Hum. Doce e picante. Você é muito gentil! Aqui. Considere isso uma espécie de gesto de agradecimento."
"Mmm. Thanks! All mine, no sharing! Here, you can have the meal Gorvessa made for me.": "Hum. Obrigado! Tudo meu, sem compartilhar! Aqui você pode comer a refeição que Gorvessa fez para mim."
"Mmm. Well, I'm sure the boss fight was dramatic, but your storytelling skill is ... terrible. I need to feel like I was there!": "Hum. Bem, tenho certeza de que a luta contra o chefe foi dramática, mas sua habilidade de contar histórias é... terrível. Preciso sentir que estive lá!"
