"Thank you. Here, have some free tanning supplies.": "Obrigado. Aqui, tenha alguns suprimentos de bronzeamento grátis."
"Thank you. Hopefully this will be the last we see of them. Hah. We both wish!": "Obrigado. Esperamos que esta seja a última vez que os veremos. Hah. Nós dois desejamos!"
"Thank you. I have a lead-lined box to hold these pieces. Are you feeling okay? Here. Take this to ease the discomfort. And here's a bounty for your hard work.": "Obrigado. Tenho uma caixa forrada de chumbo para guardar essas peças. Você está se sentindo bem? Aqui. Tome isso para aliviar o desconforto. E aqui está uma recompensa pelo seu trabalho duro."
"Thank you. I have asked something cruel of you, and I recognize that. In exchange, I will teach you the most secretive weather witching secrets I know.": "Obrigado. Pedi-lhe algo cruel e reconheço isso. Em troca, vou lhe ensinar os segredos climáticos mais secretos que conheço."
"Thank you. I hope it wasn't out of your way!

This claw is just as I'd hoped! I'm expanding my horizons to encompass rakshasa claw techniques in my fighting.": "Obrigado. Espero que não tenha saído do seu caminho!

Esta garra é exatamente como eu esperava! Estou expandindo meus horizontes para abranger técnicas de garras rakshasa em minhas lutas."
"Thank you. I mix these with rhak whiskey for a truly energizing beverage. Here, let me show you a few pointers for your trouble.": "Obrigado. Eu misturo estes com uísque rhak para uma bebida verdadeiramente energizante. Aqui, deixe-me mostrar algumas dicas para o seu problema."
"Thank you. I will perform the wake privately. I would invite you to join me, but I fear I may cry, and I will not be seen in that state. Oh, but here is some money to compensate for your purchase.": "Obrigado. Farei o velório em particular. Eu conVidaria você para se juntar a mim, mas temo que possa chorar e não serei visto nesse estado. Ah, mas aqui está algum dinheiro para compensar sua compra."
"Thank you. I'm going to try soaking this watercress in something vile and see what happens when ranalons eat it. I think I'm getting the hang of this 'being an evil fiend' thing, huh? Here: this is your reward. Now give me a few minutes to work.": "Obrigado. Vou tentar molhar este agrião em algo nojento e ver o que acontece quando os ranalons o comem. Acho que estou pegando o jeito dessa coisa de 'ser um demônio malvado', hein? Aqui: esta é a sua recompensa. Agora me dê alguns minutos para trabalhar."
"Thank you. I've found the beer on this continent to be vile, but we Aktaari are not fond of beer anyway, so I am trying not to judge beer-makers too harshly! I hope this is appropriate compensation.": "Obrigado. Achei a cerveja neste continente horrível, mas nós, Aktaari, não gostamos de cerveja de qualquer maneira, então estou tentando não julgar os fabricantes de cerveja com muita severidade! Espero que esta seja uma compensação adequada."
"Thank you. It takes so long to collect these! Here, let me give you some Council money.": "Obrigado. Demora tanto para coletar isso! Aqui, deixe-me dar-lhe algum dinheiro do Conselho."
"Thank you. It will probably take a bit before the tornadoes calm down, but I'm sure they'll be a bit calmer now. Here, this is for your trouble.": "Obrigado. Provavelmente demorará um pouco até que os tornados se acalmem, mas tenho certeza que eles ficarão um pouco mais calmos agora. Aqui, isso é para o seu problema."
"Thank you. Maybe my people can forage in safety now! Take this as a gift.": "Obrigado. Talvez meu povo possa procurar alimentos em segurança agora! Leve isso como um presente."
"Thank you. Now I'll turn the slime into silk. Would you like to watch? You'll be able to pick up my technique.

<i>[New hangout available when your Textile skill is at least 50.]</i>": "Obrigado. Agora vou transformar o lodo em seda. Você gostaria de assistir? Você poderá aprender minha técnica.

<i>[Novo hangout disponível quando sua habilidade em Têxteis for pelo menos 50.]</i>"
"Thank you. Now maybe I can visit my son's grave. If I can just avoid the animated rib bones.

You know, living in a mageocracy has its downsides. Shit like this is always happening.": "Obrigado. Agora talvez eu possa visitar o túmulo do meu filho. Se eu puder evitar as costelas animadas.

Você sabe, viver em uma mageocracia tem suas desvantagens. Merdas como essa estão sempre acontecendo."
"Thank you. Our eggs wouldn't have survived in that colder water! By the way, I noticed your bait is very unappetizing to fish. Let me teach you a better recipe.": "Obrigado. Nossos ovos não teriam sobrevivido naquela água mais fria! A propósito, notei que sua isca não é muito apetitosa para pescar. Deixe-me ensinar uma receita melhor."
"Thank you. Pashub will turn these into horrific stilettos! Here, this is one of her earlier works.": "Obrigado. Pashub vai transformá-los em sapatos de salto agulha horríveis! Aqui, este é um de seus primeiros trabalhos."
"Thank you. Perhaps this is the beginning of a tolerable relationship.": "Obrigado. Talvez este seja o início de um relacionamento tolerável."
"Thank you. Thank you, thank you, thank you. I don't know how I can ever repay you for that. You prevented a disaster, of that we can be sure. Take this, in memory of the many fallen frogs.": "Obrigado. Obrigado, obrigado, obrigado. Não sei como poderei retribuir isso. Você evitou um desastre, disso podemos ter certeza. Tome isto, em memória dos muitos sapos caídos."
"Thank you. These are a little underripe, but they will do. Here... perhaps these toys will be useful to you?": "Obrigado. Estes estão um pouco maduros, mas servem. Aqui... talvez esses brinquedos sejam úteis para você?"
"Thank you. These are a little underripe, but they will do. Here... perhaps these toys will be useful to you? ": "Obrigado. Estes estão um pouco maduros, mas servem. Aqui... talvez esses brinquedos sejam úteis para você?"
"Thank you. These will make a lovely apple-snake that coils around the tree. Festive!": "Obrigado. Eles farão uma linda cobra-maçã que se enrola na árvore. Festivo!"
"Thank you. This looks tasty! Hopefully that biddy will be appreciative. I'll wait until the right time... she can be a mean drunk. Oh, here's your money!": "Obrigado. Isso parece saboroso! Esperançosamente, esse Biddy ficará agradecido. Vou esperar até a hora certa... ela pode ser uma bêbada malvada. Ah, aqui está o seu dinheiro!"
"Thank you. This simple act of kindness between our species will not be forgotten. Well, not for another couple of moon cycles. After that I'll probably be dead. And I won't be needing this! So here, take it.": "Obrigado. Este simples ato de bondade entre a nossa espécie não será esquecido. Bem, não por mais alguns ciclos lunares. Depois disso provavelmente estarei morto. E não vou precisar disso! Então aqui, pegue."
"Thank you. We will regenerate these myconians and retrain them. It will take several years, but if you return I will make sure they thank you for saving them.

<i>[You gain Myconic XP.]</i>": "Obrigado. Vamos regenerar estes myconianos e treiná-los novamente. Levará vários anos, mas se você voltar, farei com que eles agradeçam por salvá-los.

<i>[Você ganha XP Micônico.]</i>"
"Thank you. You cleaned these yourself? Huh. You learn fast! I could hardly do better myself, and I was a fisherman for a few decades in my youth! But I gave that all up for my art. <i>Sigh</i>, I guess I'll have to cook these fish myself, though. I have a recipe all picked out: eggs! They go with anything! Here, let me teach you my recipe.": "Obrigado. Você mesmo limpou isso? Huh. Você aprende rápido! Eu dificilmente poderia fazer melhor e fui pescador durante algumas décadas na minha juventude! Mas desisti de tudo pela minha arte. <i>Suspiro</i>, mas acho que terei que cozinhar esses peixes sozinho. Tenho uma receita já escolhida: ovos! Eles combinam com qualquer coisa! Aqui, deixe-me ensinar minha receita."
"Thank you. You may be wondering why I didn't hunt them myself: I did at first, but realized the fairies found that barbaric as well. Fairies have a complicated and annoying sense of honor, or decency, or... something. I'm much more comfortable with the trolls: they're very pragmatic!": "Obrigado. Você pode estar se perguntando por que eu não os cacei: no começo eu fiz isso, mas percebi que as fadas também achavam isso bárbaro. As fadas têm um senso de honra complicado e irritante, ou decência, ou... algo assim. Fico muito mais confortável com os trolls: eles são muito pragmáticos!"
"Thank you... oh. That really stinks! I'll analyze it to see if there's any redeeming qualities, but I doubt it. Drat it!

Thank you for your hard work, though. Let me remunerate you.": "Obrigado... ah. Isso realmente fede! Vou analisar para ver se há alguma qualidade redentora, mas duvido. Droga!

Obrigado pelo seu trabalho duro, no entanto. Deixe-me remunerar você."
"Thanks for answering my summons. I know me and the Wardens don't always agree, but this one's bad: an invasion of werewolves! I don't know where they came from, but there's lots of 'em are prowling around northeast of here, along the beach past the orcs. Sanja's camp is too far northwest to be much help. So it's up to you!": "Obrigado por responder à minha convocação. Eu sei que eu e os Guardiões nem sempre concordamos, mas este é ruim: uma invasão de lobisomens! Não sei de onde eles vieram, mas há muitos deles rondando a nordeste daqui, ao longo da praia, passando pelos orcs. O acampamento de Sanja fica muito a noroeste para ser de muita ajuda. Então depende de você!"
"Thanks for delivering the message. She said what? Carrots? Not a problem. Hey, as long as they're not mushrooms, I don't care where she puts 'em.": "Obrigado por entregar a mensagem. Ela disse o que? Cenouras? Não é um problema. Ei, desde que não sejam cogumelos, não me importa onde ela os coloca."
"Thanks for getting those brains. They apparently confirmed Mr. Blueheart's theory. Have you met him? He's in camp here. Squirrely man, but his heart's in the right place. Anyway, I have another request from him. You know those skulls with wings near the walls? Yeah, kill those and get a sample of their blood.

I know, skulls don't have blood! But he says there's blood in the wings.": "Obrigado por conseguir esses cérebros. Aparentemente, eles confirmaram a teoria do Sr. Blueheart. Você o conheceu? Ele está no acampamento aqui. Homem esquisito, mas seu coração está no lugar certo. De qualquer forma, tenho outro pedido dele. Você conhece aquelas caveiras com asas perto das paredes? Sim, mate-os e obtenha uma amostra do sangue deles.

Eu sei, crânios não têm sangue! Mas ele diz que há sangue nas asas."
"Thanks for helping clear out some tenders, but there's still so many!

We buy our Garden Tenders from goblins. I do not know what their true species is; that's just what we call them. They are loyal and strong, but the goblins only sell us males. However, last season, they made a mistake. They left us a female! Now we have several females, but still only one at reproductive age. And you must kill her.

It is very sad, I know, but she is under the control of Tidal's renegade myconians. Look on the bright side: tenders are just meatlings, not mushrooms! Oh, I guess that doesn't help you, does it.": "Obrigado por ajudar a esclarecer algumas propostas, mas ainda há tantas!

Compramos nossas propostas de jardim de goblins. Não sei qual é a sua verdadeira espécie; é assim que os chamamos. Eles são leais e fortes, mas os goblins só nos vendem homens. Porém, na temporada passada, eles cometeram um erro. Eles nos deixaram uma mulher! Agora temos várias fêmeas, mas ainda apenas uma em idade reprodutiva. E você deve matá-la.

É muito triste, eu sei, mas ela está sob o controle dos miconianos renegados do Tidal. Veja o lado positivo: as propostas são apenas almôndegas, não cogumelos! Ah, acho que isso não ajuda você, não é?"
"Thanks for helping maintain normalcy in town. I'm sure the town's vandals are already back at it, though. Come see me any day if you have time to do more scrubbing.": "Obrigado por ajudar a manter a normalidade na cidade. Tenho certeza de que os vândalos da cidade já estão de volta. Venha me ver qualquer dia se tiver tempo para esfregar mais."
"Thanks for helping with these errands! Here, you look handy with a sword, do you want this? It's my old backup blade. Maybe you'll find it useful.\": \"Ele disse que não vai embora? Caramba. Ele chamou meu blefe": "a única maneira de fazer cumprir uma Ordem do Pretor é através da execução. Eu poderia teletransportar um esquadrão de execução para despachá-lo, mas isso seria um pouco demais para uma simples invasão! Hum. Bem, vou pensar em algo para me livrar dele."
"Thanks for keeping the streets clean. I know it seems unimportant right now, but it's not. I remember something Councilman Plaudius told me: if the town looks like shit, people will treat it like shit.

Which is to say that he would NOT be pleased if he saw any graffiti. And his last assistant was banished to the fairy tree. Eugh.": "Obrigado por manter as ruas limpas. Eu sei que parece sem importância agora, mas não é. Lembro-me de uma coisa que o vereador Pláudio me disse: se a cidade estiver uma merda, as pessoas vão tratá-la como uma merda.

O que quer dizer que ele NÃO ficaria satisfeito se visse algum grafite. E seu último assistente foi banido para a árvore das fadas. Ei."
"Thanks for stamping out some droaches. I'm sure there's hundreds more in the walls and floors, but if we can at least terrorize them into staying out of the way, that's a big win.

Hey, stand still. This may hurt. There! Did it hurt? Perfect! You've stolen more of our technology! That will outrage the captain even more!

Those blueprints are probably useless to you right now, but I'm sure some day you'll be glad I burned them into your mind!": "Obrigado por eliminar algumas baratas. Tenho certeza de que há centenas de outros nas paredes e no chão, mas se conseguirmos pelo menos aterrorizá-los para que fiquem fora do caminho, será uma grande vitória.

Ei, fique parado. Isso pode doer. Lá! Doeu? Perfeito! Você roubou mais da nossa tecnologia! Isso vai indignar ainda mais o capitão!

Esses projetos provavelmente são inúteis para você agora, mas tenho certeza de que algum dia você ficará feliz por eu tê-los gravado em sua mente!"
"Thanks for taking out the cow-men. Although to be honest, I don't think our breeding program was ever going to work. For one thing, they're actually sentient, and they don't like us. Second, all our specimens were male. But who knows what Winter's genetic engineers could do with them, so ... good work!": "Obrigado por eliminar os vaqueiros. Embora, para ser sincero, não ache que nosso programa de criação algum dia iria funcionar. Por um lado, eles são realmente sencientes e não gostam de nós. Em segundo lugar, todos os nossos espécimes eram do sexo masculino. Mas quem sabe o que os engenheiros genéticos de Winter poderiam fazer com eles, então... bom trabalho!"
"Thanks for the goo. I'll use this to make sure the hives around here are able to survive the fluctuations of winter. Here, this is for your trouble.

And please return tomorrow, I need fresh fairy puff goo every day!": "Obrigado pela gosma. Usarei isso para garantir que as colmeias por aqui consigam sobreviver às flutuações do inverno. Aqui, isso é para o seu problema.

E, por favor, volte amanhã, preciso de gosma de fada fresca todos os dias!"
"Thanks for the help with my birthday present. I hope Az liked it.": "Obrigado pela ajuda com meu presente de aniversário. Espero que Az tenha gostado."
"Thanks for the relatively discreet delivery. This will get me through another week of intense lectures.": "Obrigado pela entrega relativamente discreta. Isso me ajudará a passar por mais uma semana de palestras intensas."
"Thanks so much. They pay a lot more attention when I use these gems in the lessons!": "Muito obrigado. Eles prestam muito mais atenção quando uso essas joias nas aulas!"
"Thanks! <i>Hiral drinks the juice.</i> Huh. It is exactly the same, except it doesn't have the emotional tones that fairy foods have. That's a good thing in this case. Fae apple juice tastes like resignation and patience. Which is not really that thirst quenching.

Hey, as trade, want this weird drug somebody gave me? He said it makes you able to 'multitask', which sounds tiresome, but maybe that's your thing?": "Obrigado! <i>Hiral bebe o suco.</i> Huh. É exatamente igual, exceto que não possui os tons emocionais que as comidas de fada têm. Isso é uma coisa boa neste caso. O suco de maçã Fae tem gosto de resignação e paciência. O que não é realmente aquele que mata a sede.

Ei, como comércio, quer essa droga estranha que alguém me deu? Ele disse que isso torna você capaz de realizar 'multitarefas', o que parece cansativo, mas talvez seja essa a sua praia?"
"Thanks! Did you pick these yourself? You're so talented! I'm only good at geology. But, um, here! Have some powdered geology remnants.": "Obrigado! Você mesmo escolheu isso? Você é tão talentoso! Só sou bom em geologia. Mas, hum, aqui! Tem alguns vestígios de geologia em pó."
"Thanks! Here's something for your effort.": "Obrigado! Aqui está algo pelo seu esforço."
"Thanks! Here, have a packet of spices. If you need more, I'll trade you spices for turkeys.": "Obrigado! Aqui, pegue um pacote de especiarias. Se precisar de mais, troco temperos por perus."
"Thanks! Here, take this. It's not much, but it's a token.": "Obrigado! Aqui, pegue isso. Não é muito, mas é um sinal."
"Thanks! Here, this is for you.": "Obrigado! Aqui, isso é para você."
"Thanks! Hey, do you have any use for this skinning knife? It will let you skin animals after you kill them. I don't skin animals because I'm a good, wholesome farmer. I grow crops. But you look like the animal-murdering type. So keep that.": "Obrigado! Ei, você tem alguma utilidade para esta faca de esfolar? Isso permitirá que você esfole animais depois de matá-los. Não esfolo animais porque sou um agricultor bom e saudável. Eu cultivo colheitas. Mas você parece o tipo que mata animais. Então fique com isso."
"Thanks! Hey, let me give you some gems in exchange.": "Obrigado! Ei, deixe-me dar-lhe algumas joias em troca."
"Thanks! Hey, you're all right. Let me show you how to make cabbage soup. Just don't tell everybody how easy it is!": "Obrigado! Ei, você está bem. Deixe-me mostrar como fazer sopa de repolho. Só não diga a todo mundo como é fácil!"
"Thanks! Hope it wasn't a big hassle. Here's something for your trouble.": "Obrigado! Espero que não tenha sido um grande incômodo. Aqui está algo para o seu problema."
"Thanks! Hopefully this will be enough food to impress people at the party.": "Obrigado! Esperançosamente, isso será comida suficiente para impressionar as pessoas na festa."
"Thanks! I hope it's not too late. My teeth are so loose... maybe there's an elven tooth tightener spell? Hmm.": "Obrigado! Espero que não seja tarde demais. Meus dentes estão tão frouxos... talvez haja um feitiço élfico para apertar os dentes? Hum."
"Thanks! I only half want the orc traders to show up. They terrify me and the fairies, but I need the money!

But here... for all your work, have some of the money I got left. Orcs don't usually trade in Council money, they use the old crone coins like these.": "Obrigado! Eu só quero que os comerciantes orcs apareçam. Eles aterrorizam a mim e às fadas, mas eu preciso do dinheiro!

Mas aqui... por todo o seu trabalho, fique com um pouco do dinheiro que me sobrou. Orcs geralmente não negociam com dinheiro do Conselho, eles usam moedas antigas como estas."
"Thanks! I owe you one! Here, this isn't really equivalent in value, but maybe you can use it.": "Obrigado! Eu te devo uma! Aqui, isso não é realmente equivalente em valor, mas talvez você possa usá-lo."
"Thanks! I'll make sure it gets to Statehelm. Here's your coin!": "Obrigado! Vou garantir que chegue a Statehelm. Aqui está sua moeda!"
"Thanks! I'll take the delicate surgical tape from each of these, and let's see, I can reinforce the little scalpel. Hmm, yeah, I can work with this. Here's something for your trouble. Mortals really like these silly documents!": "Obrigado! Vou pegar a delicada esparadrapo cirúrgica de cada um deles, e vamos ver, consigo reforçar o bisturizinho. Hmm, sim, posso trabalhar com isso. Aqui está algo para o seu problema. Os mortais gostam muito desses documentos bobos!"
"Thanks! I'm going to save this and share it with Yagreet later. She works so hard, you know? But hey, here. I brought it with me from the fae realm.": "Obrigado! Vou salvar isso e compartilhar com Yagreet mais tarde. Ela trabalha tanto, sabe? Mas ei, aqui. Eu trouxe isso comigo do reino fae."
"Thanks! Let me flip this coin to see what your reward should be! Aww, it's heads. Well, that means you get a beet. Sorry.": "Obrigado! Deixe-me jogar esta moeda para ver qual deveria ser sua recompensa! Ah, é cara. Bem, isso significa que você ganha uma beterraba. Desculpe."
"Thanks! Let me give you something in exchange.": "Obrigado! Deixe-me lhe dar algo em troca."
"Thanks! Let me show you a clever way to prepare oak planks. <i>[You gain Carpentry XP.]</i>": "Obrigado! Deixe-me mostrar uma maneira inteligente de preparar tábuas de carvalho. <i>[Você ganha EXP Carpintaria.]</i>"
"Thanks! Mm, smell that sulfury goodness.": "Obrigado! Hum, cheire essa bondade sulfurosa."
"Thanks! Now if I can convince her to drink one of these, maybe I can get her out of her bed for the first time in days.

Here, let me trade you. Sie has a bunch of these fire-protection potions lying about! I guess sometimes visiting orcs try to set the inn on fire.": "Obrigado! Agora, se eu conseguir convencê-la a beber um desses, talvez consiga tirá-la da cama pela primeira vez em dias.

Aqui, deixe-me trocar com você. Sie tem um monte dessas poções de proteção contra fogo por aí! Acho que às vezes os orcs visitantes tentam colocar fogo na pousada."
"Thanks! Oh, wait, I also need some lac to make the paint! But one step at a time, right? Here: this is for you.": "Obrigado! Ah, espere, também preciso de um pouco de laca para fazer a tinta! Mas um passo de cada vez, certo? Aqui: isso é para você."
"Thanks! Oh. Huh. It's pretty badly damaged. I can fix it, but that'd be a lot of work. I'll pass. But hey, let me get the straps fixed up and you can use it. I mean, it's not amazing anymore, but it's still better than the worthless junk they call shields around here!": "Obrigado! Oh. Huh. Está bastante danificado. Eu posso consertar isso, mas isso daria muito trabalho. Eu vou passar. Mas ei, deixe-me consertar as alças e você pode usá-lo. Quer dizer, não é mais incrível, mas ainda é melhor do que o lixo inútil que eles chamam de escudos por aqui!"
"Thanks! Perfect! You're really good at skinning wolves. Here, let me pay you for those. And let me show you a couple of leatherworking pointers, too!": "Obrigado! Perfeito! Você é muito bom em esfolar lobos. Aqui, deixe-me pagar por isso. E deixe-me mostrar algumas dicas sobre couro também!"
"Thanks! That's perfect. Here, let me give you some cash for that.": "Obrigado! Perfeito. Aqui, deixe-me dar-lhe algum dinheiro por isso."
"Thanks! These are perfect. Now the gumbo is going to take a long time simmering, so don't get impatient!": "Obrigado! Estes são perfeitos. Agora o gumbo vai demorar muito para ferver, então não fique impaciente!"
"Thanks! These aren't half bad.

Hmmm... the candles are too heavy, they're bending the branches down... do you think it'll catch the tree on fire? Nah, it's fine. I'm just overthinking this!": "Obrigado! Isso não é tão ruim.

Hmmm... as velas são muito pesadas, estão entortando os galhos... você acha que isso vai pegar fogo na árvore? Não, está tudo bem. Estou pensando demais nisso!"
"Thanks! These should make a few pieces of cress paper. It gives a nice old-timey feel to my calligraphy.

Oh, here. This is the runt of my sword collection, and nothing too special, but I thought you might find it useful.": "Obrigado! Estes devem formar alguns pedaços de papel agrião. Dá um toque antigo e agradável à minha caligrafia.

Ah, aqui. Esta é a menor da minha coleção de espadas e nada de muito especial, mas achei que poderia ser útil para você."
"Thanks! These will be the faces of my marionettes! Here, want this pretty stone I found?": "Obrigado! Esses serão os rostos das minhas marionetes! Aqui, quer essa linda pedra que encontrei?"
"Thanks! This is great! Here, in exchange, let me teach you some swordfighting pointers.": "Obrigado! Isso é ótimo! Aqui, em troca, deixe-me ensinar algumas dicas de luta com espadas."
"Thanks! This is the stuff. You know, I'm never really sure what quality of phlogiston will come out of an item. Have you figured out a pattern? Oh, who cares. Anyway, here's some more prisms, and some money! And stick around because I think I have more work for you!

<i>[New Favor Unlocked!]</i>": "Obrigado! Esta é a coisa. Você sabe, nunca tenho certeza da qualidade do flogisto que sairá de um item. Você descobriu um padrão? Ah, quem se importa. De qualquer forma, aqui estão mais alguns prismas e algum dinheiro! E fique por aqui porque acho que tenho mais trabalho para você!

<i>[Novo favor desbloqueado!]</i>"
"Thanks! This should do the job. Here, take these leftover simple bandages. Don't worry, they're not used!": "Obrigado! Isso deve fazer o trabalho. Aqui, pegue essas sobras de bandagens simples. Não se preocupe, eles não são usados!"
"Thanks! This should have something for the swelling. It's been so painful that I've not even been able to eat! Here, actually: take my lunch!": "Obrigado! Isto deve ter algo para o inchaço. Tem sido tão doloroso que nem consigo comer! Aqui, na verdade: leve meu almoço!"
"Thanks! This will do for a little while.

[Echur inhales the powder.]

What? I have things under control. Cranium Powder's not that addictive as long as you know how to pace yourself.

Anyway, let's spar! I'll teach you a new move.

[You gain Unarmed XP]": "Obrigado! Isso servirá por um tempo.

[Echur inala o pó.]

O quê? Tenho as coisas sob controle. Cranium Powder não é tão viciante, desde que você saiba controlar seu ritmo.

De qualquer forma, vamos treinar! Vou te ensinar um novo movimento.

[Você ganha XP Desarmado]"
"Thanks! This will keep me warm for a little while. I appreciate it! I don't have much to give you in exchange, but here's a few coins.": "Obrigado! Isso vai me manter aquecido por um tempo. Eu agradeço! Não tenho muito para lhe dar em troca, mas aqui estão algumas moedas."
"Thanks! This will work. I'll try it out in a while.

I haven't got much, but here's some of my old emergency potions. You might as well use 'em, they're just going stale sitting on my shelf.": "Obrigado! Isso funcionará. Vou experimentar daqui a pouco.

Não tenho muito, mas aqui estão algumas das minhas antigas poções de emergência. Você também pode usá-los, eles estão ficando velhos na minha prateleira."
"Thanks! Uh, here, take these as trade.": "Obrigado! Uh, aqui, tome isso como troca."
"Thanks! Wait, this... this is it?! MARNA!!!": "Obrigado! Espere, isso... é isso?! MARNA!!!"
"Thanks! Yep, they smell like home. I miss the fey realm sometimes. But mostly just the fairy boys. I definitely miss those. And my friends.

<i>Jesina looks sad for a moment.</i> Oh, right! Here, a reward for your effort! It's not much. I'm sorry.": "Obrigado! Sim, eles cheiram a casa. Às vezes sinto falta do reino das fadas. Mas principalmente apenas os meninos fadas. Eu definitivamente sinto falta disso. E meus amigos.

<i>Jesina parece triste por um momento.</i> Ah, certo! Aqui, uma recompensa pelo seu esforço! Não é muito. Desculpe."
"Thanks! You're a kipper. Here's something for your trouble. And let me tell you some gardening tips, too.": "Obrigado! Você é um arenque. Aqui está algo para o seu problema. E deixe-me contar algumas dicas de jardinagem também."
"Thanks! You're a peach. Here's something for your trouble. And let me tell you some gardening tips, too.": "Obrigado! Você é um pêssego. Aqui está algo para o seu problema. E deixe-me contar algumas dicas de jardinagem também."
"Thanks! You're amazing at this. Here, this is my own brew, try some! It's very expensive to make, but it makes you feel amazing.": "Obrigado! Você é incrível nisso. Aqui, esta é a minha própria bebida, experimente! É muito caro de fazer, mas faz você se sentir incrível."
"Thanks, chief. You know, I used to be a wizard's familiar until I escaped. That's how I know you'll like this! It's a better-tasting bait recipe. But, uh, you gotta promise you'll only use it to catch fish, not to EAT them, fair?": "Obrigado, chefe. Você sabe, eu era familiar de um bruxo até escapar. É assim que sei que você vai gostar! É uma receita de isca mais saborosa. Mas, uh, você tem que prometer que só vai usá-lo para pegar peixes, não para COMÊ-los, justo?"
"Thanks, pal! Here, take this.": "Obrigado, amigo! Aqui, pegue isso."
"Thanks, that's plenty. Got lots more pairs of pants to insulate! Here, take this.": "Obrigado, isso é suficiente. Tenho muito mais pares de calças para isolar! Aqui, pegue isso."
"Thanks, these will work great for my marionettes!": "Obrigado, eles funcionarão muito bem para minhas marionetes!"
"Thanks, you're a life saver! Here, you can have my last dose since Daisy's gonna make me some more now.": "Obrigado, você é um salva-vidas! Aqui, você pode tomar minha última dose, já que Daisy vai me preparar mais agora."
"Thanks.": "Obrigado."
"Thanks. Actually these aren't part of a scheme: I'm keeping them. Somebody keeps stealing mine as a cruel prank, and my skin is getting all dry. Here's your reward!": "Obrigado. Na verdade, estes não fazem parte de um esquema: vou mantê-los. Alguém continua roubando o meu como uma brincadeira cruel, e minha pele está ficando toda seca. Aqui está sua recompensa!"
"Thanks. But I talked to my card reader Gossamyr and she predicted that I would be maimed and go to prison if I tried my plan. And she said it like it was completely obvious to everybody. But if it was obvious to everybody, why did you fulfill my request?! I kind of feel like you aren't really my friend.

But I'll tip well for your discretion anyway.": "Obrigado. Mas conversei com minha leitora de cartões, Gossamyr, e ela previu que eu ficaria mutilado e iria para a prisão se tentasse meu plano. E ela disse isso como se fosse completamente óbvio para todos. Mas se era óbvio para todos, por que você atendeu ao meu pedido?! Eu meio que sinto que você não é realmente meu amigo.

Mas de qualquer maneira darei uma boa gorjeta para sua discrição."
"Thanks. Come see me again tomorrow, by then another should have taken their place.": "Obrigado. Venha me ver novamente amanhã, até lá outro deverá ter tomado o seu lugar."
"Thanks. Here's some coin for your trouble!": "Obrigado. Aqui está uma moeda pelo seu trabalho!"
"Thanks. Here's some edible pumpkins for ya. I swear, this neighborhood just gets worse and worse. First the ranalon and now this! Pah.": "Obrigado. Aqui estão algumas abóboras comestíveis para você. Eu juro, este bairro está cada vez pior. Primeiro o ranalon e agora isso! Pah."
"Thanks. I have info on another chapter, if you're interested in helping more.": "Obrigado. Tenho informações sobre outro capítulo, se você estiver interessado em ajudar mais."
"Thanks. I hope you didn't have to kill too many deer for these! But I'm glad you understand that sometimes deer have to die for inexplicable reasons. That's part of nature's way.": "Obrigado. Espero que você não tenha que matar muitos cervos para isso! Mas estou feliz que você entenda que às vezes os cervos morrem por razões inexplicáveis. Isso faz parte do caminho da natureza."
"Thanks. I swear by Ormorek's snipped beard if the daft girl hates this cheese too, I... <i>sigh</i> anyway here's payment for your cheese!": "Obrigado. Juro pela barba aparada de Ormorek se a garota idiota também odeia esse queijo, eu... <i>suspiro</i> de qualquer forma, aqui está o pagamento pelo seu queijo!"
"Thanks. I'm glad you could find it. Brianna's stubborn, but I guess in her own way, she's dutiful to her friends.": "Obrigado. Estou feliz que você tenha encontrado. Brianna é teimosa, mas acho que, à sua maneira, ela é obediente aos amigos."
"Thanks. If you want to know how to make the stuff, I'm sure Gretchen in Eltibule can teach you. Just hang out and help her chop potatoes some time.

Oh, here, this is for you. Hold on to these! You need 'em for brewing beer.": "Obrigado. Se você quiser saber como fazer essas coisas, tenho certeza que Gretchen em Eltibule pode te ensinar. Apenas saia e ajude-a a picar batatas algum dia.

Ah, aqui, isso é para você. Segure-se nisso! Você precisa deles para fazer cerveja."
"Thanks. Kajich's a huge ass, and but he tries hard to foster fear. I don't want his reputation ruined by a stupid mistake. Let's go kill the next one!": "Obrigado. Kajich é um idiota enorme, mas ele se esforça para fomentar o medo. Não quero que a reputação dele seja arruinada por um erro estúpido. Vamos matar o próximo!"
"Thanks. Let me teach you a recipe that uses these!": "Obrigado. Deixe-me ensinar uma receita que usa isso!"
"Thanks. Let me teach you a recipe that uses these! ": "Obrigado. Deixe-me ensinar uma receita que usa isso!"
"Thanks. Now don't try to copy me: my boletus-and-apple ale is unique. Your beer will be different, even with the same ingredients!

Take these hops and don't lose 'em. You need hops for brewing beer, and they're not so easy to come by.": "Obrigado. Agora não tente me copiar: minha cerveja de boleto e maçã é única. Sua cerveja ficará diferente, mesmo com os mesmos ingredientes!

Pegue esses saltos e não os perca. Você precisa de lúpulo para fazer cerveja, e eles não são tão fáceis de encontrar."
"Thanks. Overgrown plants may seem irrelevant but these sorts of things can snowball into major problems when they reach a certain level of saturation. We civil engineers must maintain the status quo!": "Obrigado. Plantas crescidas podem parecer irrelevantes, mas esse tipo de coisa pode se transformar em grandes problemas quando atingem um certo nível de saturação. Nós, engenheiros civis, devemos manter o status quo!"
"Thanks. Soon we'll have them all, and I can put this part of my life behind me.": "Obrigado. Em breve teremos todos eles e poderei deixar essa parte da minha vida para trás."
"Thanks. The last thing you want is a loading golem to lose even a portion of its memory. Typically goes on a killing rampage. And then we'd be down a golem AND however many workers it killed.": "Obrigado. A última coisa que você deseja é que um golem de carregamento perca pelo menos uma parte de sua memória. Normalmente entra em uma onda de matança. E então estaríamos derrubando um golem E quantos trabalhadores ele matou."
"Thanks. This will keep these cows happy for a few more days. Everybody likes the milk but nobody likes feeding the cows!

Speaking of which, here's something for your trouble.": "Obrigado. Isso manterá essas vacas felizes por mais alguns dias. Todo mundo gosta de leite, mas ninguém gosta de alimentar as vacas!

Falando nisso, aqui está algo para o seu problema."
"Thanks. Ugh, those are horrid! Let's hope they cook up nicely! Oh, here's the recipe, if you're curious.": "Obrigado. Ugh, isso é horrível! Esperemos que eles cozinhem bem! Ah, aqui está a receita, se você estiver curioso."
"Thanks. Um, when you report in, can you not tell them mummies creep me out? I'd never hear the end of it! Here. Take these warming rocks as a bribe. Don't worry, Fluffikins said they're safe.": "Obrigado. Hum, quando você se apresentar, não pode dizer a eles que as múmias me assustam? Eu nunca ouviria o fim disso! Aqui. Aceite essas pedras quentes como suborno. Não se preocupe, Fluffikins disse que eles estão seguros."
"Thanks. We're fighting the good fight here. And don't worry, most of those sand dogs are dumb as shit. And the ones that can talk? Super racist. Against werewolves, at least.

I'll clean up the rest when the sun sets. You can get outta here.": "Obrigado. Estamos combatendo o bom combate aqui. E não se preocupe, a maioria desses cachorros da areia são burros pra caramba. E aqueles que podem falar? Super racista. Contra lobisomens, pelo menos.

Vou limpar o resto quando o sol se pôr. Você pode sair daqui."
"That ass! Guzor from the mage's guild has once again chosen to belittle our school in front of the Council Sub-Commander. I've given up on convincing that conceited fool of the power of song magic. I've wasted a year trying! I understand now that mere words are not up to this task. Ormond is good at mind work -- explain the situation to him and come up with a solution.": "Essa bunda! Guzor, da guilda dos magos, mais uma vez optou por menosprezar nossa escola na frente do Subcomandante do Conselho. Desisti de convencer aquele idiota vaidoso do poder da magia da música. Perdi um ano tentando! Compreendo agora que meras palavras não estão à altura desta tarefa. Ormond é bom no trabalho mental – explique a situação para ele e encontre uma solução."
"That blasted human! Laura Neth! She doesn't like me, and she's very mean. And she's a huge fucking racist, just like most humans, and I am <i>so sick</i> of her shit!

<i>[Gloria breathes deeply.]</i> I'm sorry. I can fight a horde of zombies without breaking a sweat, but one bitchy old human who knows how to get under my defenses... anyway, I'm trying to befriend her. I know she needs more sharp cheddar cheese for her biscuits. Do you have any? I'll buy it from you for, say, 600 Councils?": "Aquele maldito humano! Laura Neth! Ela não gosta de mim e é muito má. E ela é uma grande racista, assim como a maioria dos humanos, e estou <i>tão farto</i> das merdas dela!

<i>[Gloria respira profundamente.]</i> Sinto muito. Posso lutar contra uma horda de zumbis sem suar a camisa, mas uma humana velha e mal-intencionada que sabe como escapar de minhas defesas... de qualquer forma, estou tentando fazer amizade com ela. Eu sei que ela precisa de mais queijo cheddar picante para seus biscoitos. Você tem algum? Vou comprar de você por, digamos, 600 Conselhos?"
"That drunkard Ukorga asked me to make him some meditation stools to decorate his inn. That'd be a waste of time. I need to focus on honing my skills! But I already told him I'd do it. Can I delegate that task to you?": "Aquele bêbado Ukorga me pediu para fazer alguns bancos de meditação para decorar sua pousada. Isso seria uma perda de tempo. Preciso me concentrar em aprimorar minhas habilidades! Mas eu já disse a ele que faria isso. Posso delegar essa tarefa para você?"
"That greenskin girl can forge. I've seen her making parts for her cages": "she handles a hammer like a pro. So why won't she tell me how to make orcish armor?!"
"That helped. Not enough, but a start. Thank you. I don't have much, but here's some coin.": "Isso ajudou. Não o suficiente, mas um começo. Obrigado. Não tenho muito, mas aqui está uma moeda."
"That is an impressive amount of meat! It looks delicious already! But I'll keep my appetite. I'm so excited to try barbecue! Thank you! And don't worry: if Marrowchomp refuses to serve you, I'll slip some to you when he's not looking. Here's something to tide you over.": "É uma quantidade impressionante de carne! Já parece delicioso! Mas vou manter o apetite. Estou tão animado para experimentar o churrasco! Obrigado! E não se preocupe: se Marrowchomp se recusar a atendê-lo, entregarei um pouco para você quando ele não estiver olhando. Aqui está algo para ajudá-lo."
"That little plan went great! I sold a lot of bread, and reminded people how good fresh bread is. It's led to repeat customers!

But Vexford is embarrassed. And an embarrassed man is dangerous.

Take this to my daughter Laura. She's my oldest and smartest. She lives in Kur, in self-inflicted banishment. Tell her it's time to come home.": "Esse pequeno plano foi ótimo! Vendi muito pão e lembrei às pessoas como o pão fresco é bom. Isso levou a clientes fiéis!

Mas Vexford está envergonhado. E um homem envergonhado é perigoso.

Leve isso para minha filha Laura. Ela é minha mais velha e mais inteligente. Ela vive em Kur, em exílio autoinfligido. Diga a ela que é hora de voltar para casa."
"That old bi-- err, old biddy Brianna Willer has one of the chapters. But she won't give it to me. Says my wife deserved... well, she won't give it to me. Can you snoop around her farm, see if you can find it?": "Aquela velha bi-- err, velha Brianna Willer tem um dos capítulos. Mas ela não vai me dar isso. Diz que minha esposa merecia... bem, ela não vai me dar isso. Você pode bisbilhotar a fazenda dela e ver se consegue encontrá-la?"
"That should be enough for another game. Thanks! As promised, here, take this for your trouble.

<i>[She hands you something, then starts playing another game.]</i>": "Isso deve ser suficiente para outro jogo. Obrigado! Como prometido, aqui, leve isso para o seu problema.

<i>[Ela lhe entrega algo e começa a jogar outro jogo.]</i>"
"That skeleton is... AMAZING! What is it? A rat-man? Look at that hat! Did you put that hat on him?! Nevermind that... you must teach me how to raise one. I command you!

Please? Here! Do you want money? No, no, of course not. You want power! Very well. In exchange for your secret, I will teach you my best secret ritual!

<i>[New Hangout Available]</i>": "Esse esqueleto é... INCRÍVEL! O que é? Um homem-rato? Olha esse chapéu! Você colocou esse chapéu nele?! Não importa... você deve me ensinar como criar um. Eu te ordeno!

Por favor? Aqui! Você quer dinheiro? Não, não, claro que não. Você quer poder! Muito bem. Em troca do seu segredo, vou te ensinar meu melhor ritual secreto!

<i>[Novo Hangout disponível]</i>"
"That stench can only mean one thing: you've got my cat meat! Thanks! Hey, as a thank-you, I'd be willing to teach you how I make my famous Orange Cat recipe.

<i>[ Recipe 'Orange Cat' added to Nishika's Training menu. ]</i>": "Esse fedor só pode significar uma coisa: você está com a minha carne de gato! Obrigado! Ei, como forma de agradecimento, gostaria de lhe ensinar como faço minha famosa receita de Orange Cat.

<i>[Receita 'Gato Laranja' adicionada ao menu de treinamento de Nishika. ]</i>"
"That was impressive with the sword. But can you destroy a dummy WITHOUT a sword? Let's see your versatility!

<i>[You must NOT have the Sword skill active to advance this quest.]</i>": "Isso foi impressionante com a espada. Mas você pode destruir um manequim SEM espada? Vamos ver sua versatilidade!

<i>[Você NÃO deve ter a habilidade Espada ativa para avançar nesta missão.]</i>"
"That was kind of entertaining -- the bits I could see, anyway...": "Isso foi meio divertido - as partes que eu pude ver, de qualquer maneira..."
"That was some terrible dancing. But vaguely entertaining in its terribleness, so good job.": "Foi uma dança terrível. Mas vagamente divertido em sua terribilidade, muito bom trabalho."
"That's a joke. Nevermind. Here": "Floxie suggested this recipe to take my mind off the beetles, but now I don't need it.\": \"Maravilhoso! Mmm... na verdade... esses besouros são vis. Muito açúcar pixie, pouco gelo. Eu sabia que eles eram terríveis! Tenho uma excelente memória. Mas quando não pude mais tê-los, comecei a desejá-los. Parece que estou perdendo a objetividade: minhas lembranças de casa estão se tornando uma sopa sentimental. Isso me irrita! Pois eu desprezo a sopa."
"That's a lot of spider legs. Well, I guess they do come eight to a body. What is that, two spiders' worth? Eh, whatever. You got the metal, and the Seer can study these for whatever thing she cares about... so you did it! Take a rest, soldier.": "São muitas pernas de aranha. Bem, acho que são oito por corpo. Quanto é isso, duas aranhas? Ah, tanto faz. Você tem o metal, e a Vidente pode estudá-los para qualquer coisa que lhe interesse... então você conseguiu! Descanse, soldado."
"That's all he said? He didn't say anything about the <i>contents</i> of my letter? I mean, I trust you, so why isn't that enough for him?! Hmph. Oh, here. Now... please leave me alone... I just need to be alone for a minute.": "Isso é tudo que ele disse? Ele não disse nada sobre o <i>conteúdo</i> da minha carta? Quer dizer, eu confio em você, então por que isso não é suficiente para ele?! Hmph. Ah, aqui. Agora... por favor, me deixe em paz... só preciso ficar sozinho por um minuto."
"That's another heart dead! Great work.": "Esse é outro coração morto! Ótimo trabalho."
"That's everything I need! When the coast is clear, I'll get my friend to perform the ritual. Then I'll sneak Rick out via ... well, I've said too much already. Not that I don't trust you, but sometimes the walls have ears... it's best if you just let me handle this. I'll get him home!": "Isso é tudo que eu preciso! Quando a barra estiver limpa, pedirei ao meu amigo para realizar o ritual. Então vou tirar Rick de lá por... bem, já falei demais. Não que eu não confie em você, mas às vezes as paredes têm ouvidos... é melhor você me deixar cuidar disso. Vou levá-lo para casa!"
"That's evil grass? <i>Jumper tastes some.</i> Aw! Gross! That tastes like meat, not grass! Oh, I guess that's why it's evil? Nice! I learned something!

Here, this is my favorite kind of bounceweed. Let's hope Daisy can make some even better stuff now!": "Isso é grama maligna? <i>Jumper prova um pouco.</i> Ah! Bruto! Isso tem gosto de carne, não de grama! Oh, acho que é por isso que é mau? Legal! Eu aprendi alguma coisa!

Aqui, este é meu tipo favorito de erva-bamba. Esperemos que Daisy possa fazer coisas ainda melhores agora!"
"That's impressive work. I appreciate it.": "É um trabalho impressionante. Eu agradeço."
"That's it! But the string has been digested by spider acid. Sadness and happiness collide! Nevertheless, thank you.": "É isso! Mas o barbante foi digerido pelo ácido aranha. Tristeza e felicidade colidem! Mesmo assim, obrigado."
"That's it! I guess that's the last we'll see of her! Hah, who am I kidding, this is an emotion resonance chamber down here, the undead are just rising back up out of the ground continuously. Unless we can get a squad of Placid Seers down here to wipe everything out, I give her a month, two tops before she's right back at it. So you pretty much wasted your time. But I appreciate the effort! Here's something for your trouble.": "É isso! Acho que será a última vez que a veremos! Hah, quem estou enganando, esta é uma câmara de ressonância emocional aqui embaixo, os mortos-vivos estão subindo continuamente do chão. A menos que consigamos trazer um esquadrão de Placid Seers aqui para acabar com tudo, dou a ela um mês, dois no máximo, antes que ela volte ao trabalho. Então você praticamente perdeu seu tempo. Mas agradeço o esforço! Aqui está algo para o seu problema."
"That's it! Oregano! I'm saved! Thank you. Here, let me pay you for your time.

And, hey, if you wanted to help me make the meal, come hang out with me some time soon.": "É isso! Orégano! Estou salvo! Obrigado. Aqui, deixe-me pagar pelo seu tempo.

E, ei, se você quiser me ajudar a preparar a refeição, venha sair comigo em breve."
"That's it, lovely aquamarine dye! This will make a wondrous gown. Thank you for delivering it! You may go now.": "É isso aí, linda tinta água-marinha! Isso fará um vestido maravilhoso. Obrigado por entregá-lo! Você pode ir agora."
"That's perfect! A perfect hide! Did you skin this yourself? No matter, no matter. What's important is that it's mine now, and I can get to work on this Cow's Paradise cheese! Here. Some of my private cheese stock should be ample payment!": "Perfeito! Um esconderijo perfeito! Você mesmo esfolou isso? Não importa, não importa. O importante é que agora é meu e posso começar a trabalhar neste queijo Cow's Paradise! Aqui. Parte do meu estoque particular de queijo deveria ser um pagamento amplo!"
"That's precisely how it's done! But are you a one-trick goblin?": "É exatamente assim que se faz! Mas você é um goblin de um truque só?"
"That's quite a haul of xedrite! Ghosts give ya any trouble? Haha! I'm sure it was nothing you couldn't handle.

Here's your pay, and if you meet my second-best finder Kella, tell her she missed out on easy money when she turned this one down!": "Isso é uma grande quantidade de xedrite! Fantasmas te dão algum problema? Haha! Tenho certeza de que não foi nada que você não pudesse resolver.

Aqui está o seu pagamento, e se você conhecer minha segunda melhor descobridora, Kella, diga a ela que ela perdeu dinheiro fácil quando recusou este!"
"That's quite a lot of wax! I can make a lot of ear protectors from this. Thank you so much!": "Isso é muita cera! Posso fazer muitos protetores de ouvido com isso. Muito obrigado!"
"That's the hard part done! Now you just need to collect the other few things.": "Essa é a parte difícil! Agora você só precisa coletar as outras coisas."
"That's the last heart defeated! Wait... Wait, no, there are more.": "Esse é o último coração derrotado! Espere... Espere, não, tem mais."
"That's the stuff! Mm. I want to just eat it all! But I'll save it to show to Spot. Thanks a lot, this will really help solidify my cover story. Here! This is something I made. I hope it fits your... weird body.": "Essa é a coisa! Hum. Eu quero comer tudo! Mas vou salvá-lo para mostrar ao Spot. Muito obrigado, isso realmente ajudará a solidificar minha história de capa. Aqui! Isso é algo que eu fiz. Espero que caiba no seu... corpo estranho."
"That's the stuff. Here's your sword, hope you like it!": "Essa é a coisa. Aqui está sua espada, espero que gostem!"
"That's the tea? Okay. Good. I'm going to go apologize. You stay hidden!": "Esse é o chá? OK. Bom. Eu vou me desculpar. Você fica escondido!"
"That's the whole checklist. Okay. Why don't you come with me to do the trade tonight.

<i>[ New Hangout Available. ]</i>": "Essa é toda a lista de verificação. OK. Por que você não vem comigo para fazer a troca esta noite?

<i>[Novo Hangout disponível. ]</i>"
"That's what a carnelian looks like? Well, good for it. I just hope this works. Thank you! I've got to go now.": "É assim que se parece uma cornalina? Bem, bom para isso. Eu só espero que isso funcione. Obrigado! Eu tenho que ir agora."
"That's what I like to hear! Let me give you a bit of money to cover your expenses.": "É isso que gosto de ouvir! Deixe-me dar-lhe um pouco de dinheiro para cobrir suas despesas."
"That's... that's a lot of equipment. Okay, you look like you're about to herniate something. Go put that stuff down!": "Isso é... isso é muito equipamento. Ok, parece que você está prestes a herniar alguma coisa. Vá largar essas coisas!"
"The 'cinnamon' that grows in Council Lands isn't the same plant that we have growing overtop Mt. Aufghel. I need to collect some of the stuff for a report back home. Can you help me collect it? It grows on trees in the snow out there.": "A 'canela' que cresce nas Terras do Conselho não é a mesma planta que crescemos no Monte Aufghel. Preciso coletar algumas coisas para um relatório em casa. Você pode me ajudar a coletá-lo? Ela cresce em árvores na neve lá fora."
"The air is becoming breathable. The ratkin are repelled! Visit the Town Status Board for a reward.": "O ar está se tornando respirável. Os ratkin são repelidos! Visite o Town Status Board para receber uma recompensa."
"The alchemy books! These are decently legible copies, too. I'll ship these off right away. Here's your payment.": "Os livros de alquimia! Estas também são cópias decentemente legíveis. Vou despachá-los imediatamente. Aqui está o seu pagamento."
"The Animal Menace is a Spider": "A ameaça animal é uma aranha"
"The animals of this city are in great danger. A spider came to me for aid. I could not do much for him, but I did manage to have his exotic equipment shipped into Statehelm. Take this to him. If you can, give him whatever help he needs.": "Os animais desta cidade estão em grande perigo. Uma aranha veio até mim em busca de ajuda. Não pude fazer muito por ele, mas consegui enviar seu equipamento exótico para Statehelm. Leve isso para ele. Se puder, dê a ele toda a ajuda que ele precisar."
"The Annex district, along with the whole area south of town, is being flooded by Ranalon interlopers! Destroy their water portals and push back their assault force!

(To receive a reward, make sure that you personally defeat at least one enemy.)

(To receive a reward, make sure that you personally help defeat at least one enemy.)": "O distrito anexo, juntamente com toda a área ao sul da cidade, está sendo inundado por intrusos Ranalon! Destrua seus portais de água e empurre sua força de assalto!

(Para receber uma recompensa, certifique-se de derrotar pessoalmente pelo menos um inimigo.)

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar pelo menos um inimigo.)"
"The Anxiety Propagators": "Os propagadores da ansiedade"
"The Bad Veilmoor": "O Mau Veilmoor"
"The bandits had been there for days before you arrived? Damn it all! Well, at least you got my xedrite. You did well. I'll have the Sand Seer take a look at this corpse you brought. That's all for now.": "Os bandidos já estavam lá há dias antes de você chegar? Maldito seja! Bem, pelo menos você pegou meu xedrite. Você se saiu bem. Vou pedir ao Sand Seer para dar uma olhada neste cadáver que você trouxe. Isso é tudo por enquanto."
"The beaks! Don't touch them with your bare hands, you'll waste their magic! Yes, yes, these will do nicely. I'm sure Tremal will forgive me when she tries on this masterpiece of a gown!

Oh, you're still here? I have work to do, so go! And take this practice gown with you. It's the wrong color.": "Os bicos! Não toque neles com as mãos desprotegidas, você desperdiçará sua magia! Sim, sim, estes vão servir bem. Tenho certeza que Tremal vai me perdoar quando experimentar esta obra-prima de vestido!

Ah, você ainda está aqui? Tenho trabalho a fazer, então vá! E leve este vestido de treino com você. É a cor errada."
"The Bear in There": "O urso aí"
"The bears are gone? Great! I was about to get in trouble for that one. See, the cow-men were sentient, but the bears weren't. So as a little prank, I  swapped their intelligence reports in our system. For weeks, ensigns have been trying to tame the cow-men and parlay with the bears. It's been very, VERY funny to watch, but the joke's run its course. Thanks to you!": "Os ursos se foram? Ótimo! Eu estava prestes a ter problemas por causa disso. Veja, os vaqueiros eram sencientes, mas os ursos não. Então, como brincadeira, troquei os relatórios de inteligência deles em nosso sistema. Durante semanas, alferes tentaram domar os vaqueiros e negociar com os ursos. Foi muito, MUITO engraçado de assistir, mas a piada seguiu seu curso. Obrigado a você!"
"The bears in Eltibule are odd. First, some of them are green. Second, they don't seem to act like bears should. They tend to gather in large aimless groups. It's not clear why they do this, but it's clearly not good.\": \"<b>Caça": "Ursos Eltibule</b>"
"The Beautiful Anaberyl": "A Bela Anaberyl"
"The Beautiful Topaz": "O lindo topázio"
"The Beauty in Predation": "A beleza da predação"
"The Beauty in Seeds": "A beleza nas sementes"
"The best loading golems have a cutting mode to open tough crates. The ones we have left on the docks don't have that feature, though. I was thinking, maybe I could install it. If I had some cutting arms, I mean.": "Os melhores golens de carregamento têm um modo de corte para abrir caixas difíceis. Os que deixamos nas docas não têm esse recurso. Eu estava pensando, talvez eu pudesse instalá-lo. Se eu tivesse alguns braços cortantes, quero dizer."
"The best way to assault a ship is to kill the captain! Go kill Captain Evergloam!": "A melhor maneira de atacar um navio é matar o capitão! Vá matar o Capitão Evergloam!"
"The Big Boss Birdie": "O passarinho do chefão"
"The Birthday Box": "A caixa de aniversário"
"The Bonefish is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Bonefish é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The bones of the First Thrall have been sucked dry, but they are still valuable. I just need... Refresh them! Yes. This could work.

I have located another entrance to a secret basement beneath Statehelm. I believe this to be a storehouse for vampiric thralls that are... too far gone to live on the street. \"Lost thralls,\" they're called, but their blood is... potent. After years or even decades of vampiric feeding, they've become delectable and potent vessels. Not as delectable as my poor First Thrall, of course. ... But good enough to recharge these bones.

The entrance is in Rahu. I recall it being in a small house overlooking a lake.

Oh, while you are in there, I need a few other items.": "Os ossos do Primeiro Escravo foram sugados, mas ainda são valiosos. Eu só preciso... atualizá-los! Sim. Isso poderia funcionar.

Localizei outra entrada para um porão secreto abaixo do Statehelm. Acredito que este seja um depósito para escravos vampíricos que estão... longe demais para viver nas ruas. \"Escravos perdidos\", são chamados, mas seu sangue é... potente. Depois de anos ou mesmo décadas de alimentação vampírica, eles se tornaram recipientes deliciosos e potentes. Não tão delicioso quanto meu pobre Primeiro Escravo, é claro. ... Mas bom o suficiente para recarregar esses ossos.

A entrada fica em Rahu. Lembro-me de estar em uma pequena casa com vista para um lago.

Ah, enquanto você está aí, preciso de alguns outros itens."
"The Boreal Fist": "O Punho Boreal"
"The Borghild Lead": "A liderança Borghild"
"The bottle is surprisingly heavy -- you can't even lift it! You notice a keyhole in the cork, which makes no sense at all, but it is there nonetheless. You are unable to pry the cork out -- apparently you need a key.": "A garrafa é surpreendentemente pesada – você nem consegue levantá-la! Você percebe um buraco de fechadura na rolha, o que não faz nenhum sentido, mas mesmo assim está lá. Você não consegue retirar a rolha - aparentemente você precisa de uma chave."
"The Bridge Bully": "O valentão da ponte"
"The camps are east of here, over some hills. The buckle is in the northernmost camp, if that helps.\\\"\": \"Paul Vaughn, em Serbule Hills, disse": "\\\"Fui um dos últimos lenhadores a deixar nosso acampamento madeireiro. Pensei que poderia resistir a alguns goblins nojentos, mas eles continuaram vindo! Eventualmente, tive que correr. Deixei para trás muita cerveja boa, que tenho certeza que já acabou. Mas o mais importante, deixei para trás minha fivela de cinto da sorte. Eu realmente gostaria dela de volta."
"The casino will provide some boring snacks, but we definitely need some more exotic stuff! Let's start with a recipe from the Crone Hegemony. I found it in an old book! Can you get the ingredients?\\\"\": \"Brandon Mellus, do Red Wing Casino, disse": "\\\"Como Zhia Lian é a deusa do capricho, precisamos de muitos lanches excêntricos. E, infelizmente, a maioria das minhas melhores coisas foi roubada por homens-gatos ou perdida no deserto enquanto fugimos para salvar nossas vidas. De homens-gatos."
"The Cat's Glassy Stare": "O olhar vítreo do gato"
"The central decoration of the necklace you broke is a rare and beautiful crystal known as vervadium. It will be difficult to find. But should you find a piece, bring it to me. I will pay you ten times its value!": "A decoração central do colar que você quebrou é um cristal raro e lindo conhecido como vervádio. Será difícil encontrar. Mas se você encontrar um pedaço, traga-o para mim. Eu pagarei dez vezes o seu valor!"
"The Chain of Gasu'um's Necklace": "A Corrente do Colar de Gasu'um"
"The chosen of Gulagra has been found! Norala tells us he is deep beneath the earth in Eltibule. Calling himself the Scion of Discord, he believes he is the fiercest warrior alive. This cannot be. Prove it.": "O escolhido do Gulagra foi encontrado! Norala nos diz que ele está nas profundezas da terra em Eltibule. Chamando a si mesmo de Scion of Discord, ele acredita ser o guerreiro mais feroz vivo. Isto não pode ser. Prove."
"The cocks are gone? Maybe we can get some peace and quiet now... Or maybe the hippogriffs will just get louder without competition. We'll see!

Hey, want to know something new? Stand still. Did it take? You didn't die, so I think it must have worked! Haha! You've stolen our technology now! Some day you may even have use for that knowledge.": "Os galos sumiram? Talvez possamos ter um pouco de paz e sossego agora... Ou talvez os hipogrifos fiquem mais barulhentos sem competição. Veremos!

Ei, quer saber uma novidade? Fique parado. Demorou? Você não morreu, então acho que deve ter funcionado! Haha! Você roubou nossa tecnologia agora! Algum dia você poderá até usar esse conhecimento."
"The Council didn't finish improving this town before they were called away to deal with the demon problem. So we're making do with very expensive magics. For instance, the sewer wasn't finished, so we used a bunch of portals to connect it! Smart, eh? Unfortunately those portals are two-way, and field rats have started living in the sewers, coming out at night to eat the crops in the fields. Can you go deal with the issue? Thanks.": "O Conselho não terminou de melhorar esta cidade antes de ser chamado para lidar com o problema dos demônios. Então estamos nos contentando com magias muito caras. Por exemplo, o esgoto não estava terminado, então usamos vários portais para conectá-lo! Inteligente, hein? Infelizmente, esses portais são de mão dupla e os ratos do campo começaram a viver nos esgotos, saindo à noite para comer as colheitas nos campos. Você pode resolver o problema? Obrigado."
"The Council provides me with the metal to fix horseshoes and fences, but I need fancier metal for a personal project I'm working on.\\\"\": \"Leopold Smith em Statehelm disse": "\\\"Ei! Uh, desculpe novamente por acusá-lo de ser um ladrão. Você apenas parece ... aham, bem, de qualquer maneira, AGORA sei que você é um ferreiro especialista! E isso significa que você deve ter acesso a metal de qualidade. Preciso de alguns."
"The craniologist loved the skulls and ordered another batch! These need to be \"astonishingly impressive\" though.": "O craniologista adorou os crânios e encomendou outro lote! No entanto, eles precisam ser “surpreendentemente impressionantes”."
"The creature Murklinger is deceased! And you have not suffered the loss of even a single limb or core organ! You are a more competent warrior than I had expected!": "A criatura Murklinger faleceu! E você não sofreu a perda de um único membro ou órgão central! Você é um guerreiro mais competente do que eu esperava!"
"The Cure For Cranium Blues": "A cura para o blues craniano"
"The Dawn Flower": "A Flor do Amanhecer"
"The Deadliest Mushroom": "O cogumelo mais mortal"
"The Deadliness of Discordance": "A mortalidade da discórdia"
"The door doesn't budge. A cloying voice says, \"Where are my penguins?! I won't go anywhere without ALL of my penguins!\"": "A porta não se mexe. Uma voz enjoativa diz: \"Onde estão meus pinguins?! Não irei a lugar nenhum sem TODOS os meus pinguins!\""
"The door exudes a satisfied air. \"My penguins! You saved them!\"": "A porta exala um ar satisfeito. \"Meus pinguins! Você os salvou!\""
"The dread lich Urg-Ak Faqu has come to claim Povus! His minions are empowered by spells that nullify most attacks. The town's only hope is to enable the protective pagodas! Bring monsters near activated pagodas to strip them of their defenses.

The monsters are invading from all sides, but it seems they're congregating on the north side of town.

(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "O terrível lich Urg-Ak Faqu veio reivindicar Povus! Seus lacaios são fortalecidos por feitiços que anulam a maioria dos ataques. A única esperança da cidade é ativar os pagodes protetores! Traga monstros para perto de pagodes ativados para tirar suas defesas.

Os monstros estão invadindo por todos os lados, mas parece que estão se reunindo no lado norte da cidade.

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar pelo menos um inimigo Elite ou Chefe.)"
"The Eagle Ray is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Eagle Ray é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The easiest of my friends to find would probably be Syndra. She's in this frozen hell-hole somewhere. She said she'd found a shack or a barn or something, and it had a magical fire to keep her warm. That's all I know. But it's out there somewhere!

Find her, report back to me, and I'll help you convince her to train you in her special craft skill.": "O mais fácil dos meus amigos de encontrar provavelmente seria Syndra. Ela está neste buraco congelado em algum lugar. Ela disse que encontrou um barraco ou um celeiro ou algo assim, e que tinha um fogo mágico para mantê-la aquecida. Isso é tudo que sei. Mas está por aí em algum lugar!

Encontre-a, informe-me e eu ajudarei você a convencê-la a treiná-lo em sua habilidade especial de artesanato."
"The Elf's Hobby": "O hobby do elfo"
"The enemy lounges and relaxes as if they were not at war! Fix it! By murdering every lazy ratkin you see!": "O inimigo descansa e relaxa como se não estivesse em guerra! Corrija isso! Assassinando todos os ratos preguiçosos que você vê!"
"The Errana Bunny has challenged you to an egg hunt! Find the blue, yellow and red Errana Eggs scattered throughout Eltibule and Serbule. Once you have found them all, return to The Errana Bunny to collect your prize.
<b>IMPORTANT:</b> You must remain in bunny form for the duration of this quest! If you jump out of bunny form for any reason, this quest will fail and you will have to start over!": "A Coelhinha Errana desafiou você para uma caça aos ovos! Encontre os Ovos Errana azuis, amarelos e vermelhos espalhados por Eltibule e Serbule. Depois de encontrar todos eles, retorne ao The Errana Bunny para receber seu prêmio.
<b>IMPORTANTE:</b> Você deve permanecer na forma de coelho durante esta missão! Se você pular da forma de coelho por qualquer motivo, esta missão irá falhar e você terá que começar de novo!"
"The essence of Bread isn't precisely the subject itself. The Bread symbol does not teach the viewer that bread is maid of grains. No, it teaches that bread is made of love, and entices with its breadiness, its warmth, its comfort. Eliciting the proper emotional depth for the Bread symbol requires you to experience for yourself the joy of a perfect bake.": "A essência do Pão não é precisamente o assunto em si. O símbolo do Pão não ensina ao espectador que o pão é feito de grãos. Não, ensina que o pão é feito de amor e seduz pela sua panificação, pelo seu calor, pelo seu conforto. Extrair a profundidade emocional adequada para o símbolo do Pão exige que você experimente por si mesmo a alegria de um cozimento perfeito."
"The External Resource Coordinator": "O Coordenador de Recursos Externos"
"The Eye of Fate": "O Olho do Destino"
"The fae believe they are superior to mortals. Norala rewards those who punish the unjustly arrogant.": "As fadas acreditam que são superiores aos mortais. Norala recompensa aqueles que punem os injustamente arrogantes."
"The Famous Denton Razor": "A famosa navalha Denton"
"The Fate of Commander Ferrows": "O Destino do Comandante Ferrows"
"The final ingredient I need to recover my mental powers is... an ancient pineal gland. I know where you can find exactly... What I need. Search for a Tuvillic Rune in Povus. I believe it is somewhere along the outer wall.": "O último ingrediente que preciso para recuperar meus poderes mentais é... uma antiga glândula pineal. Eu sei onde você pode encontrar exatamente... O que eu preciso. Procure por uma Runa Tuvílica em Povus. Acredito que esteja em algum lugar ao longo da parede externa."
"The first aid kits that seem common in this country are kind of underwhelming, even the so-called \"Master\" kits. But I can combine multiple kits to get the stuff I need. Unfortunately the druids don't bother with first aid kits, so I could really use a supply!": "Os kits de primeiros socorros que parecem comuns neste país são um tanto desanimadores, até mesmo os chamados kits “Master”. Mas posso combinar vários kits para conseguir o que preciso. Infelizmente os druidas não se preocupam com kits de primeiros socorros, então eu realmente precisaria de um suprimento!"
"The first major success *and* failure of our Teleportation Technology department came two years ago when we reached a warm cave complex beneath Kur. Kur has always been a land of mystery to us, for it is too cold to support true life -- mantis life. But this cave was warmer! And so we sent in two squads of servant mantises to subdue the caves. Instead... they took up residence among the other creatures. They rebelled! This was a huge setback to teleportation magic, and even today I dare not send more mantises into that cave. But you and your friends will not be tricked by whatever wonders lie in there! You can complete the original mission from years ago! I have bribed the teleportation technician to send you there, so long as you ask quickly.

<i>[A group of 3+ level 40+ players is recommended.]</i>": "O primeiro grande sucesso *e* fracasso do nosso departamento de Tecnologia de Teletransporte ocorreu há dois anos, quando chegamos a um complexo de cavernas quentes abaixo de Kur. Kur sempre foi uma terra misteriosa para nós, pois é muito frio para sustentar a vida verdadeira – a vida do louva-a-deus. Mas esta caverna era mais quente! E então enviamos dois esquadrões de servos louva-a-deus para subjugar as cavernas. Em vez disso... eles fixaram residência entre as outras criaturas. Eles se rebelaram! Este foi um grande revés para a magia de teletransporte, e ainda hoje não me atrevo a enviar mais louva-a-deus para aquela caverna. Mas você e seus amigos não serão enganados pelas maravilhas que estão aí! Você pode completar a missão original de anos atrás! Subornei o técnico de teletransporte para mandá-lo para lá, desde que você peça rapidamente.

<i>[Recomenda-se um grupo de 3+ jogadores de nível 40+.]</i>"
"The first thing I need is quite simple": "just get a sample of every kind of gem or crystal that can be found when mining the crystals near the demons.\": \"Esta terra está infestada de demônios problemáticos e não consigo chegar perto o suficiente da muralha para atingir meus objetivos. Se você me ajudar, ficarei muito grato."
"The Fishy Beacon": "O farol suspeito"
"The flooding is contained! Visit the Town Status Board for a reward.": "A inundação está contida! Visite o Town Status Board para receber uma recompensa."
"The food here's nice enough, but not what I'm used to. I've got a craving for a classic cottage pie! Do ya know where to get one around here? 'Cuz I surely don't!": "A comida aqui é boa o suficiente, mas não é o que estou acostumada. Estou com vontade de comer uma torta caseira clássica! Você sabe onde conseguir um por aqui? Porque eu certamente não!"
"The Footprint symbol. So iconic. And yet so unknowable. Feet can take all sorts of shapes; how can you stereotype a whole body part like that? You'll need to stretch your feet in all new ways to discover the tantalizing secret of the Footprint symbol.": "O símbolo da Pegada. Tão icônico. E ainda assim tão incognoscível. Os pés podem assumir todos os tipos de formatos; como você pode estereotipar uma parte inteira do corpo assim? Você precisará esticar os pés de novas maneiras para descobrir o segredo tentador do símbolo da Pegada."
"The formal execution is a very important social event for the upper crust of Rahu. I used to go every time... but this is the third time in a row that I didn't get invited.

I need to know what I did. Ask my friend Ichin why I'm not invited. I know Ichin plans to go to the execution... he must know what's going on! I would confront him myself, but... I'm not really the confrontational type.": "A execução formal é um evento social muito importante para a classe alta de Rahu. Eu costumava ir sempre... mas é a terceira vez consecutiva que não sou convidado.

Preciso saber o que fiz. Pergunte ao meu amigo Ichin por que não fui convidado. Eu sei que Ichin planeja ir para a execução... ele deve saber o que está acontecendo! Eu mesmo o confrontaria, mas... não sou do tipo que confronta."
"The foxes love the gems you got! I explained to Rubi that she's named after a gem called a Ruby. She insists upon seeing some of these gems right away! And that got me to thinking: if I had a LOT of them, I could use them in tomorrow's math lesson. Do you know where to find a lot of rubies?

Of course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?": "As raposas adoram as joias que você ganhou! Expliquei a Rubi que ela recebeu o nome de uma joia chamada Ruby. Ela insiste em ver algumas dessas joias imediatamente! E isso me fez pensar: se eu tivesse MUITOS, poderia usá-los na aula de matemática de amanhã. Você sabe onde encontrar muitos rubis?

Claro, não deveríamos deixar Cassie de fora. Encontre algumas pedras bonitas para ela também, ok?"
"The freakish half-dragon creatures are weak. They hide behind the might of their dragon ancestors. They should be rooted out.": "As bizarras criaturas meio-dragão são fracas. Eles se escondem atrás do poder de seus ancestrais dragões. Eles deveriam ser erradicados."
"The Frightened Animals of Statehelm": "Os animais assustados de Statehelm"
"The frozen magma that you brought me is interesting, and I would like to perform some experiments with it. I suspect it can be used in place of the central core of a Dwar- you know what, I'll spare you the details. I need more info about the demons in general, and a bunch of N Cores to perform my testing with. Can you keep an eye out for those things?": "O magma congelado que você me trouxe é interessante e gostaria de fazer alguns experimentos com ele. Eu suspeito que pode ser usado no lugar do núcleo central de um anão - quer saber, vou poupar você dos detalhes. Preciso de mais informações sobre os demônios em geral e de vários N núcleos para realizar meus testes. Você consegue ficar de olho nessas coisas?"
"The Galvanizer": "O Galvanizador"
"The gear you found fits perfectly! These gears must be mass-produced by the dwarves! That's pretty amazing, right?

But that repair didn't make it go. I think I found the problem: the primary timing system is just... gone! It must have gotten lost or stolen. I've studied the similar ones in the auxiliary system, and I think if I had a dwarven weight like this one, I could rig something up with some string. Maybe? Worth a try.": "O equipamento que você encontrou se encaixa perfeitamente! Essas engrenagens devem ser produzidas em massa pelos anões! Isso é incrível, certo?

Mas esse reparo não funcionou. Acho que encontrei o problema: o sistema de cronometragem primário simplesmente... desapareceu! Deve ter sido perdido ou roubado. Estudei os semelhantes no sistema auxiliar e acho que se eu tivesse um peso anão como este, poderia amarrar algo com um barbante. Talvez? Vale a pena tentar."
"The Gem in Gasu'um's Necklace": "A joia no colar de Gasu'um"
"The Gem in Gasu'um's Necklace (round 2)": "A joia no colar de Gasu'um (rodada 2)"
"The giant mantises in Eltibule are not intelligent, but that doesn't make them easy to kill. They like to prey upon the distracted, hiding in tall grass until their victims come too close.\": \"<b>Caça": "Louva-a-deus</b>"
"The goblins are keeping the ranalon very focused on their west flank. The eastern flank, the one facing us, has only a handful of guards. If we attack it, they'll have to split their forces up more, giving the goblins a better chance to take them out for us.

Focus on the guards at the outpost down the road. That will get their attention. I will pay you 350 Councils if you kill six of them.": "Os goblins estão mantendo o Ranalon bem focado no flanco oeste. O flanco leste, aquele que está à nossa frente, tem apenas um punhado de guardas. Se atacarmos, eles terão que dividir ainda mais suas forças, dando aos goblins uma chance melhor de eliminá-los para nós.

Concentre-se nos guardas do posto avançado na estrada. Isso chamará a atenção deles. Eu pagarei a você 350 Conselhos se você matar seis deles."
"The Golem's Gear": "O equipamento do Golem"
"The Grapefish Roundup": "A rodada de toranja"
"The Grapefish Roundup, Part 2": "O resumo do Grapefish, Parte 2"
"The Greedy Orc": "O orc ganancioso"
"The Grouper is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "A Garoupa é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Healing Presentation": "A apresentação de cura"
"The Heart of a Swampy Spout": "O coração de um bico pantanoso"
"The Heart of a Tiny Storm": "O coração de uma pequena tempestade"
"The Heart of a Wet Twister": "O coração de um twister molhado"
"The heft of the battlehammer is not quite coming through in your Hammer (Weapon) symbol. In fact, you aren't managing to capture the calloused hands of the user or the heavy sweat on their brow. You're going to need to get up close and personal with the subject.": "O peso do martelo de batalha não aparece no símbolo do martelo (arma). Na verdade, você não está conseguindo capturar as mãos calejadas do usuário ou o suor intenso em sua testa. Você precisará se aproximar do assunto."
"The Horse symbol is a potent idea that should never be misused. To control its forces you should collect many example horses. Then you can compare and contrast them.": "O símbolo do Cavalo é uma ideia poderosa que nunca deve ser mal utilizada. Para controlar suas forças você deve coletar muitos exemplos de cavalos. Então você pode compará-los e contrastá-los."
"The Ink For Something Amazing": "A tinta para algo incrível"
"The Jewelry Fence": "A cerca de joias"
"The Knife Backlog": "O acúmulo de facas"
"The Korbok Investigation": "A Investigação Korbok"
"The lakes of Eltibule are infested with these gigantic venomous slugs. With no natural predators, their growth is unchecked.\": \"<b>Caça": "Lesmas Venenosas</b>"
"The least-competent farmers are sent topside to farm the lakes up there, but farmers who can cast a few spells are kept down here in safety. They're a crucial part of the den's food supply. Which means they're precious... which means you should kill them! Go!": "Os agricultores menos competentes são enviados para a superfície para cultivar os lagos lá em cima, mas os agricultores que conseguem lançar alguns feitiços são mantidos aqui em segurança. Eles são uma parte crucial do abastecimento alimentar da toca. O que significa que eles são preciosos... o que significa que você deveria matá-los! Ir!"
"The Lightning Connection": "A conexão relâmpago"
"The local orcish warlord himself is attacking from the east, along with his best-equipped troops! Defend Povus!

(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "O próprio senhor da guerra orc local está atacando do leste, junto com suas tropas mais bem equipadas! Defenda Povus!

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar pelo menos um inimigo Elite ou Chefe.)"
"The Logging Camp Overseers": "Os superintendentes do acampamento madeireiro"
"The Lost Spade": "A espada perdida"
"The Lost Travels of Romast": "As viagens perdidas de Romast"
"The loudest things aboard are definitely the hippogriffs. At first it was neat hearing them shriek all night, but it's gotten a little repetitive. I think any official invasion party would really need to kill those! Thanks!": "As coisas mais barulhentas a bordo são definitivamente os hipogrifos. No começo foi legal ouvi-los gritar a noite toda, mas ficou um pouco repetitivo. Acho que qualquer grupo de invasão oficial realmente precisaria matá-los! Obrigado!"
"The lowest deck is mostly empty and just used for storage. We've stored a bunch of mortal specimens down there for later analysis.

The mortal realm near here is full of really beautiful things. Beautiful flowers! Talking trees! 'Elves'! Real dragons! But what's in the hold? ... cow-men.

They're going to try to breed them into an army, so you should totally go stop them.": "O convés mais baixo está quase vazio e usado apenas para armazenamento. Armazenamos um monte de espécimes mortais lá para análise posterior.

O reino mortal perto daqui está cheio de coisas realmente lindas. Lindas flores! Árvores falantes! 'Elfos'! Dragões de verdade! Mas o que há no porão? ... vaqueiros.

Eles vão tentar transformá-los em um exército, então você deveria detê-los totalmente."
"The lumber camps east of here were made by humans. I helped build the fences myself! But then goblins came and ran us out, and now they're chopping our wood!

Goblins have huge numbers on their side, but most goblins are stupid. To really hurt 'em, you gotta kill the overseers! Look for the mage-casting goblins in the camps, and kill 'em.

And hey, if you want help with how to attack the camps, just ask me.": "Os acampamentos madeireiros a leste daqui foram feitos por humanos. Eu mesmo ajudei a construir as cercas! Mas então os goblins vieram e nos expulsaram, e agora estão cortando nossa lenha!

Os goblins têm um grande número ao seu lado, mas a maioria dos goblins é estúpida. Para realmente machucá-los, você tem que matar os capatazes! Procure os goblins lançadores de magos nos acampamentos e mate-os.

E ei, se você quiser ajuda sobre como atacar os acampamentos, é só me perguntar."
"The Mad Wizard": "O Feiticeiro Louco"
"The Male symbol's jagged angulars require a deep understanding of the subject acquired through careful study.": "Os ângulos recortados do símbolo Masculino exigem uma compreensão profunda do assunto, adquirida através de um estudo cuidadoso."
"The Man In The Coffin": "O homem no caixão"
"The mantises have been augmenting the oozes in here, making them more dangerous. Morons! But there's a silver lining: their mucus is very useful for potions. If you happen to kill some oozes, can you look for their sludge?": "Os louva-a-deus têm aumentado o lodo aqui, tornando-os mais perigosos. Idiotas! Mas há uma fresta de esperança: seu muco é muito útil para poções. Se acontecer de você matar alguns limos, você pode procurar seu lodo?"
"The Marlin is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Marlin é um peixe difícil de filetar; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Mauler": "O Mauler"
"The meat of several different bird-like creatures would work, but Mandibles said the most accessible meat is in a tower in Kur. I cannot go to Kur, it is too cold. She knows this and she taunts me with knowledge I cannot use! Please aid me?\\\"\": \"Irkima, do Red Wing Casino, disse": "\\\"Preciso da ajuda de uma Red Wing chamada Mandibles. Ela só me ajudará se eu produzir algo chamado 'carne de frango paralisante'."
"The Melted Shield": "O Escudo Derretido"
"The mercenary Evil Carnivore Gang is trying to steal Povus's priceless protective pagodas! They've placed explosive spells on them and are planning to cart off the enchanted rubble.

Without the pagodas, Povus will soon be overrun with undead. Cleans the pagodas! You'll also need to defeat the raid leader, Asila the Spark, to convince the gang to back down.

(To receive a reward, make sure that you personally activate a pagoda or defeat the gang leader.)": "A gangue mercenária Evil Carnivore está tentando roubar os inestimáveis ​​​​pagodes protetores de Povus! Eles colocaram feitiços explosivos neles e estão planejando retirar os escombros encantados.

Sem os pagodes, Povus logo será invadido por mortos-vivos. Limpa os pagodes! Você também precisará derrotar o líder do ataque, Asila the Spark, para convencer a gangue a recuar.

(Para receber uma recompensa, certifique-se de ativar pessoalmente um pagode ou derrotar o líder da gangue.)"
"The metal that humans use is weak and deficient. I use it to make horseshoes and tools, but never for armor. Armor requires the astounding metal found in the mines of Gazluk! In fact, it can often be found exposed at the tops of mountains here. I will pay a bounty for a pile of it, for I must repair Vughal's helmet, and I will not use feeble metal!": "O metal que os humanos usam é fraco e deficiente. Eu uso isso para fazer ferraduras e ferramentas, mas nunca para armaduras. A armadura requer o metal surpreendente encontrado nas minas de Gazluk! Na verdade, muitas vezes pode ser encontrado exposto no topo das montanhas daqui. Pagarei uma recompensa por uma pilha dele, pois preciso consertar o capacete de Vughal e não usarei metal fraco!"
"The Mind Made Anew": "A mente feita de novo"
"The Missing Gown Ingredient": "O ingrediente que faltava no vestido"
"The Mnemonix Index has laid bare what other resources I will need. Here is a list. Take care of it.": "O Índice Mnemonix revelou quais outros recursos precisarei. Aqui está uma lista. Cuide disso."
"The Mushroom Man's Secret": "O segredo do homem cogumelo"
"The Mythical Heartshroom": "O Cogumelo Mítico"
"The Natural Food Experience": "A experiência alimentar natural"
"The Natural Food Experience ends with a difficult task: growing carrots. This is not a task that the average guest can complete during their stay. As a result, reported guest satisfaction is extraordinarily low. Please grow some carrots and exclaim that you are not perturbed by the slow growing speed of organic matter.": "A Experiência Alimentar Natural termina com uma tarefa difícil: cultivar cenouras. Esta não é uma tarefa que o hóspede médio possa realizar durante a sua estadia. Como resultado, a satisfação relatada dos hóspedes é extraordinariamente baixa. Por favor, cultive algumas cenouras e diga que você não está perturbado pela lenta velocidade de crescimento da matéria orgânica."
"The Natural Food Experience, pt 2": "A Experiência Alimentar Natural, ponto 2"
"The Natural Food Experience, pt 3": "A Experiência Alimentar Natural, ponto 3"
"The Nature Of Mantis Love": "A natureza do amor louva-a-deus"
"The Non-Drevan Snook is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Non-Drevan Snook é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The nonsense I have to deal with. An Elf in town recently reported a theft of his magic headband. But get this: he said a super-intelligent rat stole it from him in the dead of night. Clearly more is going on here, but he won't say anything else.

And the frustrating part about this idiotic story is that I believe him! So, if you're travelling in the woods outside of town and you come across a super-intelligent rat with a tiara or something, can you bring it to me? I need to get to the bottom of this, and I think that head thing will be a useful bargaining chip.": "O absurdo com o qual tenho que lidar. Um elfo na cidade relatou recentemente o roubo de sua faixa mágica. Mas veja só: ele disse que um rato superinteligente roubou dele na calada da noite. É evidente que mais está acontecendo aqui, mas ele não dirá mais nada.

E a parte frustrante dessa história idiota é que eu acredito nele! Então, se você estiver viajando pela floresta fora da cidade e se deparar com um rato superinteligente com uma tiara ou algo assim, você pode trazê-lo para mim? Preciso chegar ao fundo disso e acho que essa coisa da cabeça será uma moeda de troca útil."
"The notes you brought back from Rock-Wrecker's camp are pretty clever - I wish those other engineers worked this hard when I was still around. At any rate, there's a few missing pieces of information.

For security purposes, many orcish engineers write their notes as a cipher, and they carry the key on their person. Obtain a few of these keys and bring them back, hopefully one of them is the key that I need.": "As notas que você trouxe do acampamento Rock-Wrecker são muito inteligentes - eu gostaria que aqueles outros engenheiros trabalhassem tanto quando eu ainda estava por perto. De qualquer forma, faltam algumas informações.

Por motivos de segurança, muitos engenheiros orcs escrevem suas anotações como uma cifra e carregam a chave consigo. Obtenha algumas dessas chaves e traga-as de volta, espero que uma delas seja a chave que eu preciso."
"The ocean perch tend to stay away from this area. They know I'll catch 'em! But I don't really want to get up right now. Sitting on the beach just relaxing feels so good. Anyway, can you bring me a passel of perch? The freshest ones are the ones you catch yourself!": "As percas do oceano tendem a ficar longe desta área. Eles sabem que vou pegá-los! Mas eu realmente não quero me levantar agora. Sentar na praia apenas relaxando é tão bom. De qualquer forma, você pode me trazer um pedaço de perca? Os mais frescos são aqueles que você mesmo pega!"
"The ointments are delivered? Oh, good. I don't mind delivering ointments usually, but Strom has said some weird things around me. About using <i>fairy wings</i> for potions! Eugh. I'm just happier not thinking about that.": "As pomadas são entregues? Ah, que bom. Normalmente não me importo de entregar pomadas, mas Strom disse algumas coisas estranhas perto de mim. Sobre usar <i>asas de fada</i> para poções! Ei. Estou simplesmente mais feliz por não pensar nisso."
"The orb you found for me was a fake, but I know it's somewhere in Serbule Hills! I must find it.

The vortices have overheard the ranalon speak of a seer or wise-person called a 'doctrine keeper' -- if the ranalon have my orb, I bet their seer would have it.

I understand they live under the water or somesuch thing. Finding it would be worthwhile.": "O orbe que você encontrou para mim era falso, mas sei que está em algum lugar das Colinas Serbule! Eu devo encontrá-lo.

Os vórtices ouviram o ranalon falar de um vidente ou pessoa sábia chamado de 'guardião da doutrina' - se o ranalon tiver meu orbe, aposto que o vidente deles o teria.

Eu entendo que eles vivem debaixo d'água ou algo assim. Encontrar isso valeria a pena."
"The orc invaders stole all my wine! Most of it wasn't even ready for drinking yet! And now I must start all over. But the hogsheads for sale in Rahu may have been made by goblin-owned slaves. Nobody keeps track of that stuff in Rahu, but it matters to me! I need all my hogsheads to be made by free folk.": "Os invasores orcs roubaram todo o meu vinho! A maior parte ainda nem estava pronta para beber! E agora devo começar tudo de novo. Mas os barris à venda em Rahu podem ter sido feitos por escravos de propriedade de duendes. Ninguém acompanha essas coisas em Rahu, mas isso é importante para mim! Preciso que todos os meus barris sejam feitos por gente livre."
"The orc invaders stole everything. Even our blankets! I've made a thin blanket from old rags, but as it gets colder, we'll need something warmer. If only sheep grew around here, I could get some wool!": "Os invasores orcs roubaram tudo. Até nossos cobertores! Fiz um cobertor fino com trapos velhos, mas à medida que esfria, precisaremos de algo mais quente. Se ao menos ovelhas crescessem por aqui, eu poderia conseguir um pouco de lã!"
"The orcs destroyed all my beautiful furniture when they attacked Povus. I miss my meditation stool so badly! It was amazing! I would love to have a new one, but the furniture sold in Rahu is made by goblin slave-labor. Many in Rahu turn a blind eye to slavery, but I won't! My furniture has to be made by a crafter I know!": "Os orcs destruíram todos os meus lindos móveis quando atacaram Povus. Sinto muita falta do meu banquinho de meditação! Foi incrível! Eu adoraria ter um novo, mas os móveis vendidos em Rahu são feitos por trabalho escravo de duendes. Muitos em Rahu fecham os olhos à escravidão, mas eu não farei isso! Meus móveis têm que ser feitos por um artesão que conheço!"
"The orcs even stole my guest chair. It was pretty great, too. I wish I could find a replacement! The trouble is that I must know the chair's provenance. I won't support goblin slave labor!": "Os orcs até roubaram minha cadeira de convidados. Foi muito bom também. Eu gostaria de encontrar um substituto! O problema é que preciso saber a procedência da cadeira. Não apoiarei o trabalho escravo dos duendes!"
"The orcs have special armor techniques that even I don't know... and I deserve to know them!

That greenskin girl can forge. I've seen her making parts for her cages: she handles a hammer like a pro. So why won't she tell me how to make orcish armor?!

Why don't you try? See if she'll tell you anything.": "Os orcs possuem técnicas especiais de armadura que nem eu conheço... e mereço conhecê-las!

Aquela garota de pele verde pode forjar. Já a vi fazendo peças para suas gaiolas: ela maneja um martelo como uma profissional. Então por que ela não me conta como fazer uma armadura orc?!

Por que você não tenta? Veja se ela lhe conta alguma coisa."
"The ornate shape of the Beer symbol will require a bit of hands-on study.": "A forma ornamentada do símbolo da cerveja exigirá um pouco de estudo prático."
"The panthers here are native -- unlike the tigers -- but these panthers seem more vicious than one would expect. They act distracted, roused by an unknown energy.\": \"<b>Caça": "Panteras</b>"
"The pay's pretty good, though. Don't die.\\\"\": \"Grim Jim em Statehelm disse": "“Espero que você esteja pronto para uma tarefa difícil. Preciso da pele perfeita de um cão demônio de três cabeças!"
"The people in this town are boring. Aside from the great sex, there's nothing to really recommend this place. I think the problem lies in morale. Go boost morale! Give the townsfolk thoughtful gifts. And don't be a cheapskate -- spend at least 50 Councils on each.": "As pessoas nesta cidade são chatas. Além do ótimo sexo, não há nada que realmente recomende este lugar. Acho que o problema está no moral. Vá aumentar o moral! Dê presentes atenciosos aos habitantes da cidade. E não seja pão-duro – gaste pelo menos 50 Conselhos em cada um."
"The Perfect Cow Hide": "A pele de vaca perfeita"
"The Perfect Rice For Weddings": "O arroz perfeito para casamentos"
"The Perfect Wolf Skin": "A pele de lobo perfeita"
"The phoenixes are gone? Well, that's an important part of the ship's backup system taken out!

Nobody will notice at first. But in a few months when we need to restart an engine, people will be SO PISSED!": "As fênix se foram? Bem, essa é uma parte importante do sistema de backup da nave removida!

Ninguém notará a princípio. Mas daqui a alguns meses, quando precisarmos religar um motor, as pessoas ficarão MUITO chateadas!"
"The potion worked! I feel stronger. Healthier. More virile. I can feel my powers returning! I just need to unlock... them again.

Help me with the unlocking ritual, and I shall unlock the power of the bat for you, too!

I just need some supplies for the inscription ceremony.

Now where did I leave the ghostly guano? Ah, of course. On an island known as Sun Vale, look for a ruin. That should be enough to go on, right? Oh, yes: some of those grim little Winter Fae like to... frolic nearby.

For the other ingredients, I'm certain your... cosmopolitan upbringing will aid you in their procurance.": "A poção funcionou! Eu me sinto mais forte. Mais saudável. Mais viril. Posso sentir meus poderes retornando! Eu só preciso desbloqueá-los novamente.

Ajude-me com o ritual de desbloqueio e eu desbloquearei o poder do bastão para você também!

Só preciso de alguns suprimentos para a cerimônia de inscrição.

Agora, onde deixei o guano fantasmagórico? Ah, claro. Em uma ilha conhecida como Sun Vale, procure por uma ruína. Isso deve ser suficiente para continuar, certo? Ah, sim: alguns daqueles pequenos Winter Fae sombrios gostam de... brincar por perto.

Quanto aos outros ingredientes, tenho certeza de que sua... educação cosmopolita irá ajudá-lo em sua obtenção."
"The Power of the Bat": "O poder do morcego"
"The Power of Urban Expression": "O poder da expressão urbana"
"The Power of Volume": "O poder do volume"
"The Radiant Muskie is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Radiant Muskie é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The ranalon have a sort of outdoor temple near the lake. You'll know it by the two large stone obelisks sticking out of the water nearby. Go there and slay the prayermaster and his minions. The prayer-master is an important leader, and his death will cause chaos among their ranks. I shall pay you 400 Councils.": "Os ranalon têm uma espécie de templo ao ar livre perto do lago. Você saberá disso pelos dois grandes obeliscos de pedra saindo da água nas proximidades. Vá até lá e mate o mestre de orações e seus asseclas. O mestre de orações é um líder importante e sua morte causará o caos entre suas fileiras. Pagarei a você 400 Conselhos."
"The Rat Tiara": "A tiara do rato"
"The ratkin are farming fish in here... freshwater fish! That's not unusual further inland, but this close to the sea, it seems odd, doesn't it? Maybe these fish are atypical somehow. Oh, you don't understand biology anyway... look, just get me a bunch of these fish, okay?": "Os ratkin estão criando peixes aqui... peixes de água doce! Isso não é incomum lá no interior, mas tão perto do mar parece estranho, não é? Talvez esses peixes sejam de alguma forma atípicos. Ah, você não entende de biologia de qualquer maneira... olha, só me traga um monte desses peixes, ok?"
"The ratkin around here rely heavily on necromancy to help them mine faster. And I noticed the necromancers often have giant white rats with them. They don't look like good tunneling rats... I wonder what they're for?

No, stop talking. I don't care about a monster's opinions... make yourself useful and go murder some rats. See if they're living or undead. Remember, undead ones don't bleed much!": "Os ratkin por aqui dependem muito da necromancia para ajudá-los a minerar mais rápido. E notei que os necromantes costumam trazer ratos brancos gigantes com eles. Eles não parecem bons ratos para escavar túneis... Eu me pergunto para que servem?

Não, pare de falar. Eu não me importo com a opinião de um monstro... seja útil e vá matar alguns ratos. Veja se eles estão vivos ou mortos-vivos. Lembre-se, os mortos-vivos não sangram muito!"
"The ratkin just keep... surviving! How is it possible?! Perhaps we need to broaden our approach. The sewer rat may seem harmless... but it's wily and dangerous and probably somehow the secret crux of our problem!": "Os ratkin continuam... sobrevivendo! Como é possível?! Talvez precisemos ampliar nossa abordagem. O rato de esgoto pode parecer inofensivo... mas é astuto e perigoso e provavelmente de alguma forma é o cerne secreto do nosso problema!"
"The ratkin seem all too comfortable... probably because of those soldiers who wander around protecting them. Kill the soldiers, and surely their morale will falter!": "Os ratkin parecem muito confortáveis... provavelmente por causa daqueles soldados que andam por aí protegendo-os. Mate os soldados e certamente o moral deles irá vacilar!"
"The ratkin seem to be growing an orchard of sentient trees down here! That is FASCINATING! Right? But how old are these trees? Go and chop down some of these trees and see how many rings they have.

Wait, trees can be over a hundred years old. Can you count all the way to 100, monster? Well, try your best! Hurry, now.": "Os ratkin parecem estar cultivando um pomar de árvores sencientes aqui embaixo! Isso é FASCINANTE! Certo? Mas quantos anos têm essas árvores? Vá e corte algumas dessas árvores e veja quantos anéis elas têm.

Espere, as árvores podem ter mais de cem anos. Você consegue contar até 100, monstro? Bem, tente o seu melhor! Depressa, agora."
"The ratkin used to be friendly. When I was younger, they would come into town and I'd sell 'em vegetables! But after the fall of Povus they attack on sight. I had to give up mining because of them. I wish somebody would teach 'em a lesson for me! Hint, hint.": "O ratkin costumava ser amigável. Quando eu era mais jovem, eles vinham à cidade e eu vendia vegetais para eles! Mas após a queda de Povus eles atacam imediatamente. Tive que desistir da mineração por causa deles. Eu gostaria que alguém lhes ensinasse uma lição para mim! Dica, dica."
"The reason I'm here in Kur is the tundra lichen. They grow here, though I've not found very many. I need more tundra lichen for my research. If you see any, I will pay handsomely.": "A razão pela qual estou aqui em Kur é o líquen da tundra. Eles crescem aqui, embora eu não tenha encontrado muitos. Preciso de mais líquen da tundra para minha pesquisa. Se você vir algum, pagarei generosamente."
"The reason Ormond recommended this particular obscure bardic technique is that it can be performed without the victim being present. The vindaloo will connect you to him. Oh, yes, you'll be the one performing the Geas! It's quite an honor, really. This sort of technique is usually kept locked away, but you're getting hands-on experience with it!

Wait until the full moon. That's the only time this will work. Then eat the vindaloo -- oh, you will need more vindaloo for this -- and dance in such a way as to twist his mind toward affection. Don't worry about the particulars; let your hips do the thinking. Then simply shake his hand.": "A razão pela qual Ormond recomendou esta técnica bárdica obscura em particular é que ela pode ser executada sem a presença da vítima. O vindaloo conectará você a ele. Ah, sim, você será quem executará os Geas! É uma grande honra, realmente. Esse tipo de técnica geralmente é mantida trancada, mas você estará adquirindo experiência prática com ela!

Espere até a lua cheia. Essa é a única vez que isso funcionará. Então coma o vindaloo - ah, você vai precisar de mais vindaloo para isso - e dance de maneira a distorcer a mente dele em direção ao afeto. Não se preocupe com os detalhes; deixe seus quadris pensarem. Depois basta apertar a mão dele."
"The Red Crystal": "O Cristal Vermelho"
"The rhino hide's miscoloration has thrown everything off kilter aesthetically! I need an entirely new accent color. And a different pommel crystal! Since you're basically responsible for this mess, can you help fix it? Don't worry. I'll pay.": "A descoloração da pele do rinoceronte desequilibrou tudo esteticamente! Preciso de uma cor de destaque totalmente nova. E um cristal com alças diferente! Já que você é basicamente responsável por essa bagunça, você pode ajudar a consertar isso? Não se preocupe. Eu pagarei."
"The Ring's Requirement": "A exigência do anel"
"The river-ranalon have brought a horrible beast to town! Kill it before it destroys us all!

(To receive a reward, make sure that you personally help defeat the Boss enemy.)": "Os rio-ranalon trouxeram uma fera horrível para a cidade! Mate-o antes que destrua todos nós!

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar o chefe inimigo.)"
"The Sacred Grotto Password": "A senha da Gruta Sagrada"
"The Sad End of Senzur": "O triste fim de Senzur"
"The Sand Seer examined the scorpion remains you brought back, and she found something interesting. That scorpion's carapace was infused with xedrite! She thinks xedrite dust got into their shells or something. I don't buy it. We need a lot more information.

It took some bribery, but I got the location of another scorpion-filled pit for you. There's no xedrite in this one. Just go in, kill every scorpion, and bring me back those carapaces.": "A Vidente da Areia examinou os restos mortais do escorpião que você trouxe e encontrou algo interessante. A carapaça daquele escorpião estava infundida com xedrita! Ela acha que pó de xedrita entrou em suas conchas ou algo assim. Eu não acredito nisso. Precisamos de muito mais informações.

Foi necessário algum suborno, mas consegui a localização de outro poço cheio de escorpiões para você. Não há xedrite neste. Basta entrar, matar todos os escorpiões e me trazer de volta aquelas carapaças."
"The Sand Seer in Amulna asked for some Geometric Rune Scrolls. She said that many Rakshasa in the nearby city of Rahu are gifted in making them.": "O Vidente da Areia em Amulna pediu alguns Pergaminhos Rúnicos Geométricos. Ela disse que muitos Rakshasa na cidade vizinha de Rahu são talentosos em fazê-los."
"The Sand Seer in Amulna asked for some very particular, very amazing ink. She is attempting to reproduce the Rakshasas' Geometric Rune Charts with higher-quality materials.": "O Vidente da Areia em Amulna pediu uma tinta muito particular e incrível. Ela está tentando reproduzir os gráficos geométricos de runas dos Rakshasas com materiais de alta qualidade."
"The Sand Seer in Amulna said, \"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.

Oh! And since you'll be heading down there anyway, perhaps you could collect some items for me? I mean, it'd be foolish to waste this opportunity to study Hegemony weapons...\"": "O Vidente da Areia em Amulna disse: \"Foi bom da sua parte me ver. Temo pelo futuro desta pequena cidade, e não é por causa das escassas criaturas que vagam pelo deserto. Não, o problema vem das profundezas das areias. Aprendi que há milhares de soldados da Hegemonia Crone lá embaixo, deixados para trás depois de uma guerra relativamente recente. Eles estão se reproduzindo, tramando e muito, muito zangados. É apenas um questão de tempo antes que eles se levantem e reivindiquem o deserto. Você deve atacar enquanto eles ainda estão fracos e despreparados. Procure as entradas do túnel e acabe com o perigo.

Ah! E já que você irá para lá de qualquer maneira, talvez pudesse coletar alguns itens para mim? Quero dizer, seria tolice desperdiçar esta oportunidade estudando armas da Hegemonia…”"
"The Sand Seer in Amulna said, \"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.\"": "O Vidente da Areia em Amulna disse: \"Foi bom da sua parte me ver. Temo pelo futuro desta pequena cidade, e não é por causa das escassas criaturas que vagam pelo deserto. Não, o problema vem das profundezas das areias. Aprendi que há milhares de soldados da Hegemonia Crone lá embaixo, deixados para trás depois de uma guerra relativamente recente. Eles estão se reproduzindo, tramando e muito, muito zangados. É apenas um questão de tempo antes que eles se levantem e reivindiquem o deserto. Você deve atacar enquanto eles ainda estão fracos e despreparados. Procure as entradas dos túneis e acabe com o perigo."
"The Sand Seer in Amulna wanted you to be on the lookout for an \"ancient magical stencil\". She suggested that she would pay well for it.": "O Vidente da Areia em Amulna queria que você procurasse um \"estêncil mágico antigo\". Ela sugeriu que pagaria bem por isso."
"The science deck has been given over to the mad wizard that made those... monstrosities. And he's not even here! He just astrally projects himself here from the mortal realm.

Sustained astral projection requires an impressive amount of magical fortitude, I'll admit. But its so gauche!

You should just pull his plug.": "O baralho científico foi entregue ao mago maluco que criou aquelas... monstruosidades. E ele nem está aqui! Ele apenas se projeta astralmente do reino mortal para cá.

A projeção astral sustentada requer uma quantidade impressionante de fortaleza mágica, admito. Mas é tão desajeitado!

Você deveria apenas desligar a tomada dele."
"The second goblin was the ship captain that held my wife as a slave. But that ship sank. So instead, I'll take revenge on his son, Algapa. Seems fair, right?

And best of all, his son is right here! He's trying to make a name for himself under Eltibule Keep! I bet it'll be no trouble to kill him. Well... probably a <i>little</i> trouble. But it would help me sleep at night.": "O segundo goblin era o capitão do navio que mantinha minha esposa como escrava. Mas aquele navio afundou. Então, em vez disso, vou me vingar do filho dele, Algapa. Parece justo, certo?

E o melhor de tudo é que o filho dele está bem aqui! Ele está tentando fazer seu nome no Forte Eltibule! Aposto que não será problema matá-lo. Bem... provavelmente um <i>pequeno</i> problema. Mas isso me ajudaria a dormir à noite."
"The Second Woo": "O Segundo Woo"
"The Secret Ingredient": "O ingrediente secreto"
"The secret ingredient in my potion is, of course... a secret. You are not worthy... to know it. Its creation would be beyond you anyway.

I have hid some of this ingredient in various realms... outside of ours. The easiest to reach is via Eltibule.

The winter fae have tunnels that travel through Eltibule. Look for green bears. Oh... you may need to find a key. Speak to humans in the area.

Once inside, look for a Tuvillic Rune. It's not too far... inside.": "O ingrediente secreto da minha poção é, claro... um segredo. Você não é digno... de saber disso. Sua criação estaria além de você de qualquer maneira.

Eu escondi alguns desses ingredientes em vários reinos... fora do nosso. O acesso mais fácil é via Eltibule.

As fadas do inverno têm túneis que atravessam Eltibule. Procure ursos verdes. Ah... talvez você precise encontrar uma chave. Fale com os humanos na área.

Uma vez lá dentro, procure uma Runa Tuvillic. Não é muito longe... lá dentro."
"The Secret Method for Soda Ash": "O método secreto para carbonato de sódio"
"The Secret of Wine": "O segredo do vinho"
"The service here is truly awful. Do you know how long I've been waiting?! And I had to seat myself! But nevermind. Nevermind all that! I heard that this place makes a great swamp salad. I would like to try this dish.": "O serviço aqui é realmente horrível. Você sabe há quanto tempo estou esperando?! E eu tive que me sentar! Mas deixa pra lá. Esqueça tudo isso! Ouvi dizer que este lugar faz uma ótima salada de pântano. Eu gostaria de experimentar este prato."
"The settlers who lived in the houses outside were adherents of Arisetsu, the goddess of Hope and Warmth. You know what that means, right? Blankets! Arisetsu nuts always bring tons of their blankets to give to the needy. Well, they're dead, and we're needy. They brought a lot of their stuff into this cave when they fled, but when the survivors died, they were buried in... you guessed it: Arisetsu blankets. So now we're very low. I'm betting that there's more in those houses, though. Sneak past the ghosts and get us some!": "Os colonos que viviam nas casas externas eram adeptos de Arisetsu, a deusa da Esperança e do Calor. Você sabe o que isso significa, certo? Cobertores! Os malucos de Arisetsu sempre trazem toneladas de seus cobertores para dar aos necessitados. Bem, eles estão mortos e nós estamos necessitados. Eles trouxeram muitas de suas coisas para esta caverna quando fugiram, mas quando os sobreviventes morreram, eles foram enterrados em... você adivinhou: cobertores Arisetsu. Então agora estamos muito baixos. Aposto que há mais nessas casas, no entanto. Passe furtivamente pelos fantasmas e consiga alguns para nós!"
"The Sewer Man": "O homem do esgoto"
"The sewers are relatively safe, so you can scout things out on your own... but you're going to need friends to kill these targets! They're tougher than the rest of the stuff down there.\\\"\": \"Lady Alethina no Red Wing Casino disse": "\\\"Vá para Rahu e encontre um caminho para o sistema de esgoto. Há um problemático comerciante de veneno no mercado negro nos níveis superiores do esgoto; acabe com seus esquemas malignos! Em seguida, você precisará descobrir como chegar aos níveis mais baixos do lugar. Eu entendo que há um lodo enorme em algum lugar nos canos e está começando a contaminar o abastecimento de água da cidade. Se a água deles se tornar insegura, Rahu será devastado e o a área se tornará uma zona de guerra novamente. Então, vá consertar isso. Finalmente, há algum tipo de grupo militante de ratos em algum lugar cujo alinhamento político é problemático e isso deve deixá-los em desordem."
"The sewers connect to a cave system, and last year I noticed that some of the ratkins' snails had escaped and wandered into the caves. The ratkin didn't seem interested in recovering them, and I really want to know why. In this case I think the death of a few innocent snails is justified. Bring me a sample so that I can examine it.": "Os esgotos estão ligados a um sistema de cavernas e, no ano passado, reparei que alguns dos caracóis ratkins tinham escapado e entrado nas cavernas. Os ratkin não pareciam interessados ​​em recuperá-los, e eu realmente quero saber por quê. Neste caso penso que a morte de alguns caracóis inocentes é justificada. Traga-me uma amostra para que eu possa examiná-la."
"The sewers use a magical solvent to clean and repurpose waste material, and they're supposed to be maintenance-free. Hah. I need you to go down there and clear out some of the clogs in the system. Can you do that? Here's a key to the sewer manholes. Don't get killed down there.

<i>[Manholes Unlocked!]</i>": "Os esgotos usam um solvente mágico para limpar e reaproveitar resíduos, e supostamente não precisam de manutenção. Hah. Preciso que você vá até lá e limpe algumas obstruções do sistema. Você pode fazer isso? Aqui está a chave dos bueiros de esgoto. Não seja morto lá embaixo.

<i>[Bueiros desbloqueados!]</i>"
"The Sexy Panther": "A Pantera Sexy"
"The skeletal ratkin mages with electricity powers... those are very annoying! Kill them!": "Os magos ratkin esqueléticos com poderes de eletricidade... esses são muito irritantes! Mate-os!"
"The Skull symbol seems simple enough. But the more you look, the deeper it goes! You despair of ever mastering it. Why, you would need practically a thousand skulls as examples before you could glean the perfect form.": "O símbolo da Caveira parece bastante simples. Mas quanto mais você olha, mais fundo vai! Você se desespera em dominá-lo. Ora, você precisaria de praticamente mil crânios como exemplos antes de poder obter a forma perfeita."
"The so-called 'firebird mountain' south of here is home to an irritating phoenix population, which terrify my subjects, but at least they don't typically hunt trolls for food! Droaches, unfortunately, do. Please head to 'Firebird Mountain' and eliminate the fire droach threat.": "A chamada “montanha do pássaro de fogo” ao sul daqui é o lar de uma irritante população de fênix, que aterroriza meus súditos, mas pelo menos eles não costumam caçar trolls para se alimentar! Drogas, infelizmente, sim. Por favor, vá para 'Firebird Mountain' e elimine a ameaça das baratas de fogo."
"The so-called Gnasher is a dinosaur from a distant land, imported by the Council to counter the uncontrolled spread of Uraks and other problem pests. However, gnashers are now as big a threat as any of the other invasive species. They are able to cut through armor with incredible ease.\": \"<b>Caça": "Roedores</b>"
"The Sorubim is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Sorubim é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The sparking droaches are neutralized? Very good! The next wave of my children will arrive in less than a year, and they would have been easy prey to these foul ambushers. You have served trollkind well.": "As baratas brilhantes são neutralizadas? Muito bom! A próxima leva de meus filhos chegará em menos de um ano e eles teriam sido presas fáceis desses emboscadores hediondos. Você serviu bem aos trolls."
"The spider legs you brought me were a lot of fun to study! Will you bring me some antlers from the local deer population? Be careful - some of them are rabid.": "As pernas de aranha que você me trouxe foram muito divertidas de estudar! Você pode me trazer alguns chifres da população local de cervos? Tenha cuidado – alguns deles são raivosos."
"The Spies": "Os espiões"
"The Stolen Lens": "A lente roubada"
"The Stonecurl Clan": "O Clã Stonecurl"
"The story Urzab told you is also what he told Rick. But this bit about the Onkara soldier breaking into my shop is a new detail. That's terrifying! Thank you for your hard work. Here -- I don't have much money left, but I want  to give you something.": "A história que Urzab contou a você também é a que ele contou a Rick. Mas essa parte sobre o soldado Onkara invadindo minha loja é um detalhe novo. Isso é assustador! Obrigado pelo seu trabalho duro. Aqui - não tenho muito dinheiro sobrando, mas quero lhe dar uma coisa."
"The Strength Potion's Strength": "A Força da Poção de Força"
"The Striped Bass is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Robalo é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Suspicious Cow in Eltibule said, \"Finally! I did the summoning ritual hours ago! Why do you Wardens even bother with a summoning ritual if you're just going to ignore me for HOURS while terrible things happen?!

It's the gnashers! They usually keep their distance and stay northwest of here, but now they've been spreading towards us. They killed a bull this morning! It was a bit north of here. And... they ate him! They ATE him! And nobody in that castle over there cares one bit! Please hurry. I know I'm delicious. It's only a matter of time!\"": "A Vaca Suspeita em Eltibule disse: \"Finalmente! Eu fiz o ritual de invocação horas atrás! Por que vocês, Vigilantes, se preocupam com um ritual de invocação se vão me ignorar por HORAS enquanto coisas terríveis acontecem?!

São os rangedores! Eles geralmente mantêm distância e ficam a noroeste daqui, mas agora estão se espalhando em nossa direção. Eles mataram um touro esta manhã! Ficava um pouco ao norte daqui. E... eles o comeram! Eles COMERARAM ele! E ninguém naquele castelo ali se importa nem um pouco! Por favor, se apresse. Eu sei que estou delicioso. É só uma questão de tempo!\""
"The Suspicious Cow in Eltibule said, \"There should be plenty of grazing space for the herd, but all these weird monsters are making life tough. Maybe if some of the fire spiders east of here were to mysteriously die...\"": "A Vaca Suspeita em Eltibule disse: “Deve haver bastante espaço de pastagem para o rebanho, mas todos esses monstros estranhos estão dificultando a vida. Talvez se algumas das aranhas de fogo a leste daqui morressem misteriosamente...”"
"The Suspicious Cow in Eltibule said, \"Why did you take so long to show up? It's because I said I needed help with snails, isn't it? You aren't taking me seriously! These aren't normal snails, they're huge snails! Bigger than a cow! BIGGER THAN A COW!

An incredible number of snails have hatched and they're ruining everything. They're in the east, they're in the west... at least they aren't in the north, but that's only because the horrible gnashers and uraks can eat them. They're EVERYWHERE ELSE! And guess what snails eat? GRASS! They eat my herd's food! So maybe it's not life or death today, but just you wait! I had to call for help! So get to it, Warden!\"": "A vaca suspeita em Eltibule disse: \"Por que você demorou tanto para aparecer? É porque eu disse que precisava de ajuda com os caracóis, não é? Você não está me levando a sério! Estes não são caracóis normais, são caracóis enormes! Maiores que uma vaca! MAIORES QUE UMA VACA!

Um número incrível de caracóis eclodiu e está estragando tudo. Eles estão no leste, estão no oeste... pelo menos não estão no norte, mas isso é apenas porque os horríveis rangers e uraks podem comê-los. Eles estão em todos os lugares! E adivinhe o que os caracóis comem? GRAMA! Eles comem a comida do meu rebanho! Então talvez não seja vida ou morte hoje, mas apenas espere! Tive que pedir ajuda! Então vá em frente, Diretor!\""
"The suspicious lemons are back! Suspicious lemons carry several possible buffs, debuffs or items. You will find lemons spawning randomly all over Alharth. Some are hiding while others are sitting out in the open. Now get out there and touch them all!
WARNING FOR FAE CHARACTERS: The suspicious lemons love to deal in death and punishment just as much as buffs and love! Fairy players may want to use extreme caution when touching a lemon! Not everything a lemon gives results in death, but you need to be prepared!": "Os limões suspeitos estão de volta! Limões suspeitos carregam vários buffs, debuffs ou itens possíveis. Você encontrará limões surgindo aleatoriamente por todo Alharth. Alguns estão se escondendo enquanto outros estão sentados ao ar livre. Agora vá lá e toque em todos eles!
AVISO PARA PERSONAGENS FAE: Os limões suspeitos adoram lidar com morte e punição tanto quanto com buffs e amor! Os jogadores fadas podem querer ter extremo cuidado ao tocar em um limão! Nem tudo que um limão dá resulta em morte, mas é preciso estar preparado!"
"The Swarmer Hypothesis": "A hipótese do enxame"
"The Sweater": "O suéter"
"The Sweet Butter Secret": "O segredo da manteiga doce"
"The Tarpon is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Tarpon é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The thing about life is, it somehow keeps coming back! But now while you're around to say anything about it! Go out, end as many lives as you can, then come back. Then do it again next week!": "O problema da vida é que, de alguma forma, ela continua voltando! Mas agora enquanto você está por perto para dizer alguma coisa sobre isso! Saia, acabe com tantas vidas quanto puder e depois volte. Então faça novamente na próxima semana!"
"The third person I need revenge on isn't really a goblin at all. It's a bear. A bear named Graz, famous for eating disobedient slaves. I lost track of where they'd moved Graz. There were some cave-ins around here recently, and the tribe that owned him is missing. Hell, Graz may be dead already. I just need to know Graz will never hurt another slave. Can you make sure of that?": "A terceira pessoa de quem preciso me vingar não é realmente um goblin. É um urso. Um urso chamado Graz, famoso por comer escravos desobedientes. Perdi a noção de para onde eles mudaram Graz. Houve alguns desmoronamentos por aqui recentemente, e a tribo que o possuía desapareceu. Inferno, Graz pode já estar morto. Só preciso saber que Graz nunca machucará outro escravo. Você pode ter certeza disso?"
"The top of the tree must be a beautiful beacon of strength and honor. Kalaba has been working on an appropriately beautiful blade to sit atop the tree. My contribution is to light it on fire with harmless decorative flames. I know a rakshasa recipe for decorative fire, but I need a large amount of fire dust!": "O topo da árvore deve ser um lindo farol de força e honra. Kalaba está trabalhando em uma lâmina apropriadamente bonita para ser colocada no topo da árvore. Minha contribuição é incendiá-lo com chamas decorativas inofensivas. Conheço uma receita de rakshasa para fogo decorativo, mas preciso de uma grande quantidade de pó de fogo!"
"The Training Camp": "O campo de treinamento"
"The tree came with a complex system of wires and sparking mechanisms. Apparently they can make the tree glow. I've asked Ufkar to reverse-engineer it, and he says we can make it work with a power source. A few dwarven N cores ought to work.": "A árvore veio com um complexo sistema de fios e mecanismos de faíscas. Aparentemente eles podem fazer a árvore brilhar. Pedi a Ufkar para fazer engenharia reversa e ele disse que podemos fazê-lo funcionar com uma fonte de energia. Alguns N núcleos anões devem funcionar."
"The tree is supposed to be topped with a personalized symbol of our culture. Dorimir suggested that we use a large top hat, since mantises love hats so much. He was being mirthful, but his suggestion has merit!

As the casino's official calligrapher, I am of course skilled in creating elaborate paper props. I've fashioned a suitable top hat, but its bow is not sufficiently festive: I need a better shade of red dye! I believe crushed rose petals will be suitable. Are those easy to find?": "A árvore deve ter no topo um símbolo personalizado da nossa cultura. Dorimir sugeriu que usássemos uma cartola grande, já que os louva-a-deus adoram chapéus. Ele estava sendo alegre, mas sua sugestão tem mérito!

Como calígrafo oficial do cassino, sou naturalmente hábil na criação de elaborados adereços de papel. Fiz uma cartola adequada, mas seu laço não é suficientemente festivo: preciso de um tom melhor de tinta vermelha! Acredito que pétalas de rosa esmagadas serão adequadas. São fáceis de encontrar?"
"The tree needs bright shiny red things... and now you see why I took on this stupid job! I need a lot of hot peppers.  A lot. Do you need some seeds? I still have some for sale!": "A árvore precisa de coisas vermelhas brilhantes... e agora você entende por que aceitei esse trabalho estúpido! Preciso de muita pimenta.  Bastante. Você precisa de algumas sementes? Ainda tenho alguns à venda!"
"The tree should be topped with a large decoration. But what decoration? There were no instructions. Since this is a human celebration of Ri-Shin, the god of plants and trees, it makes sense to use a wooden decoration, no? Fetch me a large load of spruce and I'll ask Daniel Murderdark what we should make with it.": "A árvore deve ser coberta com uma grande decoração. Mas que decoração? Não houve instruções. Por se tratar de uma celebração humana de Ri-Shin, o deus das plantas e das árvores, faz sentido usar uma decoração em madeira, não? Traga-me um grande carregamento de abetos e perguntarei a Daniel Murderdark o que devemos fazer com eles."
"The tree smells horrible, doesn't it? All... piney. I think we should douse it with Telka's Tail. And hang the perfume bottles in the tree as decorations! I have lots of empty bottles, but no full ones. Can you get me two?": "A árvore tem um cheiro horrível, não é? Tudo... pinheiro. Acho que deveríamos apagá-lo com Rabo de Telka. E pendure os frascos de perfume na árvore como decoração! Tenho muitas garrafas vazias, mas nenhuma cheia. Você pode me trazer dois?"
"The Trespassing Charlatan": "O charlatão invasor"
"The Triple Tail is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "A cauda tripla é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The troubled valleys of Eltibule are even more dangerous than they should be. Droaches have leaked out of the dark places in the ground to cause mayhem to the surface ecologies. Druids, go now and make it right.

Fire droaches flow from the dwarven statues and congregate near the central keep. Defeat them to lure out the more calculating electric droaches, and then defeat those as well.": "Os vales conturbados de Eltibule são ainda mais perigosos do que deveriam ser. Droaches vazaram dos lugares escuros do solo para causar danos às ecologias da superfície. Druidas, vão agora e corrijam as coisas.

Dracas de fogo fluem das estátuas dos anões e se reúnem perto da fortaleza central. Derrote-os para atrair as baratas elétricas mais calculistas e depois derrote-as também."
"The usual population of giant mantises has changed. They can talk now! And they have deadly acid attacks. I have no idea what the heck happened, but they're no longer an ignorable threat. Can you stomp them out? I'm stuck here, defending the gate...": "A população habitual de louva-a-deus gigantes mudou. Eles podem conversar agora! E eles têm ataques ácidos mortais. Não tenho ideia do que aconteceu, mas eles não são mais uma ameaça ignorável. Você pode eliminá-los? Estou preso aqui, defendendo o portão..."
"The Vanquisher's Blade": "A Lâmina do Vencedor"
"The Vertan Tuna is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O atum Vertan é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Vidarian Pickerel is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Vidarian Pickerel é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Wahoo is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "O Wahoo é um peixe difícil de filé; você precisa de um pouco de prática em capturar mais deles para descobrir."
"The Warden Test": "O Teste do Diretor"
"The water supply is safe? Excellent. That's one more lever of control that the Hegemony can't use. And you've hopefully prevented a ratkin uprising for at least a few more months. Mortal politics are every bit as messy as fae politics!

You appear to have applied your skills well; here is your payment.": "O abastecimento de água é seguro? Excelente. Essa é mais uma alavanca de controle que a Hegemonia não pode usar. E esperamos que você tenha evitado uma revolta dos ratkin por pelo menos mais alguns meses. A política mortal é tão confusa quanto a política das fadas!

Você parece ter aplicado bem suas habilidades; aqui está o seu pagamento."
"The wax was the hard part of my recipe. The rest is just candymaking. Here's what I need:": "A cera foi a parte difícil da minha receita. O resto é apenas fazer doces. Aqui está o que eu preciso:"
"The weak point in the enemy's production is the Ratkin Necro-Shamans who control undead miners. With those shamans dead, the undead will revolt! Maybe.": "O ponto fraco na produção do inimigo são os Necro-Xamãs Ratkin que controlam os mineiros mortos-vivos. Com esses xamãs mortos, os mortos-vivos se revoltarão! Talvez."
"The Weird Prism": "O Prisma Estranho"
"The whirlwinds say there's a huge tiger on the hill east of here, near the lookout tower. They call her Windbiter because she viciously attacks them! Completely harmlessly, of course, but it's still not polite. Can you get rid of this big cat and her entourage?\\\"\": \"Trasen em Serbule Hills disse": "\\\"Não foram as ovelhas que perturbaram nossos amigos tornados. São os tigres! Os tigres não podem ferir tornados, mas nossos tornados são juvenis e realmente não entendem isso."
"The white rats aren't undead? You're sure? Then they must be using them as necromantic Familiars! I've never heard of that happening before! This demands further study... but not right now. I need to think first. Here's your trinket.": "Os ratos brancos não são mortos-vivos? Você tem certeza? Então eles devem estar usando-os como Familiares necromânticos! Nunca ouvi falar disso acontecer antes! Isto exige mais estudos... mas não agora. Preciso pensar primeiro. Aqui está sua bugiganga."
"The whole Warden Alert system is down. The main crystal's been down for months, but now both backup crystals are down, too! I don't know how any of this works, so I'm just going to try taking everything apart, cleaning it, and putting it back together. Unfortunately Cassie spilled my last jar of cleaning acid, which then melted most of my cleaning supplies. Can you get us some new stuff?": "Todo o sistema de Alerta do Diretor está desativado. O cristal principal está inativo há meses, mas agora os dois cristais de backup também estão inativos! Não sei como isso funciona, então vou tentar desmontar tudo, limpar e montar novamente. Infelizmente, Cassie derramou meu último pote de ácido de limpeza, que derreteu a maior parte dos meus produtos de limpeza. Você pode nos trazer algumas coisas novas?"
"The Winter Court uses trolls as laborers and guards everywhere, but here they also use them to spread misinformation throughout troll society. If you see one, execute it!\": \"Os Winter Trolls ao sul daqui são uma verdadeira praga. Eles não são nativos desta área! Só os verdes são! Lembre-se": "verde é bom, azul é ruim."
"The Winter Court uses trolls as laborers and guards everywhere, but here they also use them to spread misinformation throughout troll society. If you see one, execute it!\\\"\": \"Pegast, no Reino Fae, disse": "\\\"Os Winter Trolls ao sul daqui são uma verdadeira praga. Eles não são nativos desta área! Apenas os verdes são! Lembre-se: verde é bom, azul é ruim."
"The Winter Trolls south of here are a real pest. They're not native to this area! Only the green ones are! Remember: green good, blue bad.

The Winter Court uses trolls as laborers and guards everywhere, but here they also use them to spread misinformation throughout troll society. If you see one, execute it!": "Os Winter Trolls ao sul daqui são uma verdadeira praga. Eles não são nativos desta área! Só os verdes são! Lembre-se: verde é bom, azul é ruim.

A Corte Winter usa trolls como trabalhadores e guardas em todos os lugares, mas aqui eles também os usam para espalhar desinformação por toda a sociedade troll. Se você vir um, execute-o!"
"The Wintertide": "A maré de inverno"
"The Wizard Hat symbol Is highly-regarded, for only true wizards can master its delicate details. You vow to achieve this!": "O símbolo do Chapéu de Feiticeiro é altamente considerado, pois apenas verdadeiros bruxos podem dominar seus detalhes delicados. Você jura conseguir isso!"
"The Worst Slug": "A pior lesma"
"TheBeautifulTopaz": "O lindo topázio"
"TheBeautyInPredation": "A beleza na predação"
"TheBorghildLead": "TheBorghild Liderar"
"TheChainOfGasuumsNecklace": "Colar TheChainOfGasuums"
"Thedar said, \"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Amazing Orcish Plate suit and I will see what I can do to help you advance your craft!  \"": "Thedar disse: \"Então, você quer ser um armeiro, não é? Vamos ao que interessa agora! Forje e traga-me um traje completo de Amazing Orcish Plate e verei o que posso fazer para ajudá-lo a avançar em seu ofício!\""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Awesome Orcish Plate suit and I will see what I can do to help you advance your craft!  \"": "Thedar disse: \"Então, você quer ser um armeiro, não é? Vamos ao que interessa agora! Forje e traga-me um traje completo de placa de orc incrível e verei o que posso fazer para ajudá-lo a avançar em seu ofício!\""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's move on to something more complex! Forge and bring me one full Quality Dwarven Plate suit and I will see what I can do to help you advance your craft!  \"": "Thedar disse: “Então, você quer ser um armeiro, não é? Vamos passar para algo mais complexo!"
"Thedar said, \"So, you want to be an Armorsmith do you? Let's start out simple! Forge and bring me one full <b>unenchanted</b> Crude Chainmail suit and I will see what I can do to help you advance your craft!  \"": "Thedar disse: \"Então, você quer ser um armeiro, não é? Vamos começar de forma simples! Forje e traga-me um traje de cota de malha bruto <b>não encantado</b> completo e verei o que posso fazer para ajudá-lo a avançar em seu ofício! \""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's try something a bit more advanced this time! Forge and bring me one full <b>enchanted</b> Decent Chainmail suit and I will see what I can do to help you advance your craft!  \"": "Thedar disse: \"Então, você quer ser um armeiro, não é? Vamos tentar algo um pouco mais avançado desta vez! Forje e traga-me um traje de cota de malha decente completo e verei o que posso fazer para ajudá-lo a avançar em seu ofício! \""
"TheDawnFlower": "A Flor do Amanhecer"
"TheDeadliestMushroom": "O cogumelo mais mortal"
"TheGalvanizer": "OGalvanizador"
"TheGemInGasuumsNecklace": "Colar TheGemInGasuums"
"TheGemInGasuumsNecklace(round2)": "Colar TheGemInGasuums (rodada 2)"
"TheGrapefishRoundup": "O resumo do Grapefish"
"TheGrapefishRoundupPart2": "TheGrapefishRoundupParte2"
"TheHealingPresentation": "A Apresentação de Cura"
"Their Hairy Legs": "Suas pernas peludas"
"TheKorbokInvestigation": "A Investigação Korbok"
"TheLoggingCampOverseers": "Supervisores do TheLoggingCamp"
"TheMauler": "O Mauler"
"TheMeltedShield": "O Escudo Derretido"
"TheMushroomMansSecret": "TheMushroomMansSegredo"
"Then a few months ago we heard about a special kind of magic in Gazluk. A shaman in an orc city there could supposedly help him. So I took Rick to this city with an orc guide we hired. The guide said we'd get in fine, but he was wrong": "he was shot by a gigantic crossbow and died. I fled and orcs captured Rick. So all I can tell you is Rick is somewhere in Gazluk, maybe still in that orc city. I really don't think you should go look for him because you'll die. But if you do, tell him I'm sorry.\": \"Rick se transformou em um espelho. Durante meses ele parecia apenas um espelho normal, até que um dia começaram a aparecer palavras nele: “por favor, me destrua”, “você não pode me deixar assim para sempre”, “vocês são meus únicos amigos e estou implorando para que acabem com isso”, e assim por diante. Eventualmente concordamos e tentamos acabar com seu sofrimento... apenas para descobrir que ele é indestrutível. Ou pelo menos muito difícil para quebrarmos!"
"TheNatureOfMantisLove": "TheNatureOfMantisAmor"
"There are a LOT of muggers out tonight. You could make a big improvement to the city's safety by exterminating a bunch of them before the scurry back into whatever hole they came out of. But you know that your safety is paramount: you mustn't die on such a mundane errand!

<i>[Quest can only be advanced at night.]</i>
<i>[Progress is lost if you die.]</i>": "Há MUITOS assaltantes esta noite. Você poderia fazer uma grande melhoria na segurança da cidade exterminando um monte deles antes que eles voltassem para qualquer buraco de onde saíram. Mas você sabe que sua segurança é fundamental: você não deve morrer em uma missão tão mundana!

<i>[A missão só pode ser avançada à noite.]</i>
<i>[O progresso será perdido se você morrer.]</i>"
"There are crystals down in the sewer which remove filth, salt, and any other contaminants from the water. Quite amazing magic! But we do not know how long the magic will last, so each year we test the water. Can you do it this year?

Here is the special beaker I was given. I counted ten pools of water with functioning crystal fountains. Wade into each pool and test the water in the center of the room. The beaker will hum if the water is clean and screech horribly if there is a problem.": "Existem cristais no esgoto que removem sujeira, sal e quaisquer outros contaminantes da água. Magia incrível! Mas não sabemos quanto tempo a magia vai durar, por isso todos os anos testamos a água. Você pode fazer isso este ano?

Aqui está o copo especial que me foi dado. Contei dez piscinas de água com fontes de cristal em funcionamento. Entre em cada piscina e teste a água no centro da sala. O copo irá zumbir se a água estiver limpa e chiar horrivelmente se houver algum problema."
"There are just so many Garden Tenders! It's hard to convince fellow myconians to resist Tidal when they see his massive army of tenders. They're so scary! Can you kill the scary monsters for us?": "Existem tantas propostas de jardim! É difícil convencer outros myconianos a resistir ao Tidal quando veem seu enorme exército de propostas. Eles são tão assustadores! Você pode matar os monstros assustadores para nós?"
"There are many seashells on the beaches here. I like the pointy ones, and the round shiny ones ... But I really like the shell fragments. I can use them to make little mosaics. It gives me something to do while my wing heals.": "Existem muitas conchas nas praias daqui. Gosto dos pontiagudos e dos redondos e brilhantes... Mas gosto muito dos fragmentos de concha. Posso usá-los para fazer pequenos mosaicos. Isso me dá algo para fazer enquanto minha asa cura."
"There are more tigers here than could possibly be natural. Moreover, many of the tigers are sickly and unwell. Wherever they came from, they apparently can't go home again.\": \"<b>Caça": "Tigres</b>"
"There are plants out there that pop out of the ground to eat people. They followed us here from the Spring Court of the Fae, and they don't even belong in this world! We've told the druids all about them, but they just laugh and say they're harmless. Harmless enough to have killed Pyrale last week! Mow them down, if you see them!": "Existem plantas por aí que surgem do solo para comer pessoas. Eles nos seguiram desde a Corte Primaveril dos Fae até aqui e nem pertencem a este mundo! Contamos tudo sobre eles aos druidas, mas eles apenas riem e dizem que são inofensivos. Inofensivo o suficiente para ter matado Pyrale na semana passada! Corte-os, se você os vir!"
"There are several types of ranalon around here. The large ones with the dangling orb on their heads are my favorite. I would love to see how their glow balls work. Well, if you happen to find any, please show them to me!": "Existem vários tipos de ranalon por aqui. Os grandes com o orbe pendurado na cabeça são os meus favoritos. Eu adoraria ver como funcionam suas bolas luminosas. Bem, se acontecer de você encontrar algum, por favor, mostre-o para mim!"
"There are two requirements to join the Statehelm School of Magic. First, you'll also need to get recommendations from wizards that I trust. Here are some names. Get at least three to sign off on your competence. Oh, and don't bother trying to forge these letters. If they agree to recommend you, these good folks will know how to contact me directly.

<i>The following wizards can provide recommendations: The Sand Seer, Bendith the Banished, Velkort the Inferno, Ichin the Ice Master, Landri the Cold.</i>": "Existem dois requisitos para ingressar na Statehelm School of Magic. Primeiro, você também precisará obter recomendações de assistentes em quem confio. Aqui estão alguns nomes. Obtenha pelo menos três para aprovar sua competência. Ah, e não se preocupe em tentar falsificar essas cartas. Se concordarem em recomendá-lo, essas boas pessoas saberão como entrar em contato comigo diretamente.

<i>Os seguintes magos podem fornecer recomendações: O Vidente da Areia, Bendith, o Banido, Velkort, o Inferno, Ichin, o Mestre do Gelo, Landri, o Frio.</i>"
"There are way too many snakes in this place. I bet they have some nefarious purpose. Let's outsmart the ratkin by killing these snakes before their secret scheme comes to fruition!": "Há muitas cobras neste lugar. Aposto que eles têm algum propósito nefasto. Vamos ser mais espertos que os ratkin matando essas cobras antes que seu plano secreto se concretize!"
"There has been a recent influx of pixies, and along with them come many typical creatures. The worst of these is the so-called shocking droach, a cowardly creature that roams in packs causing chaos. We have enough chaos right now; please remove this excess.": "Houve um influxo recente de duendes e junto com eles vêm muitas criaturas típicas. O pior deles é a chamada droach chocante, uma criatura covarde que vagueia em bandos causando o caos. Já temos caos suficiente; por favor remova esse excesso."
"There is a catch, however": "he only speaks goblinese. Rick has confronted him, but Rick's goblinese is poor and he is not sure he understood everything. Do you happen to be fluent? If so, could you speak to Urzab about the attempt on my life?\\\"\": \"Sona em New Prestonbule disse: \\\"Gostaria de sua ajuda em um assunto delicado. Preciso saber se o goblin Urzab teve alguma coisa a ver com o que aconteceu comigo no deserto. Ele mora em Amulna."
"There is a disgraced Ice Magus staying in that little inn on the mainland. Her theorycrafting is already spreading among outsiders, but her own society has vilified her, just for a single murder. Elven society is foolish. But no matter: I must take advantage of this opportunity. Unfortunately because of their rampant racism, I cannot walk into the inn and have a conversation. I would be attacked. Instead, please deliver this note for me.": "Há um Mago do Gelo em desgraça hospedado naquela pequena pousada no continente. Sua elaboração de teorias já está se espalhando entre pessoas de fora, mas sua própria sociedade a difamou, apenas por um único assassinato. A sociedade élfica é tola. Mas não importa: devo aproveitar esta oportunidade. Infelizmente, por causa do racismo desenfreado, não posso entrar na pousada e conversar. Eu seria atacado. Em vez disso, por favor, entregue esta nota para mim."
"There is a necklace I wish to have returned to me. It was my mother's, and she gave it to me. To ME! Because I was her favorite! My worthless brother stole it from me... and then... I had to leave it behind.

Leave this cave and venture right. You will see the camp of the feckless Aguva clan... go past them. Continue right until you find the camp on a hill.  That camp is what remains of the Uga'th clan. The necklace is in there somewhere.": "Há um colar que eu gostaria que me fosse devolvido. Era da minha mãe e ela me deu. Para MIM! Porque eu era o favorito dela! O meu inútil irmão roubou-mo... e depois... tive de o deixar para trás.

Saia desta caverna e aventure-se pela direita. Você verá o acampamento do irresponsável clã Aguva... passe por eles. Continue à direita até encontrar o acampamento em uma colina.  Esse acampamento é o que resta do clã Uga'th. O colar está aí em algum lugar."
"There is a universal meat symbol. You just know it! How can you find it? Only through savoring meat of all kinds.": "Existe um símbolo universal da carne. Você simplesmente sabe disso! Como você pode encontrá-lo? Somente saboreando carnes de todos os tipos."
"There is another seed repository deeper in the caves. I believe at least one myconian there will be friendly to you - can you go there and deliver these sporelings for safe keeping? We can't afford to keep all our sporelings in one place.": "Existe outro repositório de sementes nas profundezas das cavernas. Acredito que pelo menos um myconiano será amigável com você - você pode ir até lá e entregar esses esporelinhos para mantê-los em segurança? Não podemos nos dar ao luxo de manter todos os nossos sporelings em um só lugar."
"There is only one way to overcome the bees: let them sting you. Yes! Tell them to inject their hatred into you. INTO YOU, and yet you survive! Show them. Show them their hatred is unworthy.": "Só há uma maneira de vencer as abelhas: deixe-as picar você. Sim! Diga-lhes para injetarem ódio em você. EM VOCÊ, e ainda assim você sobrevive! Mostre a eles. Mostre-lhes que seu ódio é indigno."
"There should be plenty of grazing space for the herd, but all these weird monsters are making life tough. Maybe if some of the fire spiders east of here were to mysteriously die...": "Deveria haver bastante espaço de pastagem para o rebanho, mas todos esses monstros estranhos estão dificultando a vida. Talvez se algumas das aranhas de fogo a leste daqui morressem misteriosamente..."
"There was a charlatan visiting town a couple days ago. Well, his potions are magical, but Velkort said they were incredibly toxic. I ordered him to leave Serbule, but I hear he's still around somewhere, selling potions out of his tent. So now I have to make it official. Can you deliver this? It's a Praetor's Order, declaring him illegal in this area.": "Havia um charlatão visitando a cidade há alguns dias. Bem, as poções dele são mágicas, mas Velkort disse que eram incrivelmente tóxicas. Ordenei que ele deixasse Serbule, mas ouvi dizer que ele ainda está por aí em algum lugar, vendendo poções em sua tenda. Então agora tenho que tornar isso oficial. Você pode entregar isso? É uma Ordem do Pretor que o declara ilegal nesta área."
"There you are! I've been waiting so long! Let me have the orcish onion soup. And it had better be fresh!": "Aí está você! Estou esperando há tanto tempo! Deixe-me comer a sopa de cebola orc. E é melhor que seja fresco!"
"There! I know a thing or two about bombs, and these bug bombs are now safely activated. Please use them to kill the bugs!": "Lá! Eu sei uma ou duas coisas sobre bombas, e essas bombas de insetos agora estão ativadas com segurança. Por favor, use-os para matar os insetos!"
"There's a barren festival tree at the Baroness's house in Serbule Hills. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore festiva estéril na casa da Baronesa em Serbule Hills. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's a barren festival tree near Echur in Serbule. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore festiva estéril perto de Echur, em Serbule. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's a beast that lives in the caves here that I really hope I get a chance to hunt! They're sort of like dogs, but ... not dogs. Barghests! If you find any, can you try to get some patches of their flesh for me to study?": "Há uma fera que vive nas cavernas aqui e eu realmente espero ter a chance de caçar! Eles são como cachorros, mas... não cachorros. Barghests! Se você encontrar algum, pode tentar conseguir alguns pedaços de carne para eu estudar?"
"There's a bunch of bears on the storage deck because of... reasons. You should clear those out, if you're going that way!": "Há um monte de ursos no depósito por alguns... motivos. Você deve limpá-los, se estiver indo por esse caminho!"
"There's a bunch of old holiday ornaments stored in Serbule Keep. Nelson Ballard is a stingy bastard, but perhaps you can persuade him to part with some of his ornaments?": "Há um monte de enfeites festivos antigos guardados na Fortaleza de Serbule. Nelson Ballard é um bastardo mesquinho, mas talvez você possa convencê-lo a se desfazer de alguns de seus enfeites?"
"There's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!\": \"Ok, preciso de uma ajuda discreta. Nelson me deu uma decoração para colocar em cima da árvore, mas perdi! E eu nunca perco coisas! Então você sabe o que isso significa": "foi roubado. E eu sei quem fez isso."
"There's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!\\\"\": \"Echur em Serbule disse": "\\\"Tudo bem, preciso de uma ajuda discreta. Nelson me deu uma decoração para colocar no topo da árvore, mas eu a perdi! E nunca perco coisas! Então você sabe o que isso significa: foi roubado. E eu sei quem fez isso."
"There's a kind of mushroom found only in this mountain range. Orcs call it 'Groxmax'. You'll know them by the stench of rotten meat. I'll pay well for them! Oh, and if you find other kinds of mushrooms, hold on to them too; I may need them.\\\"\": \"Hemmit Magmagrip em New Prestonbule disse": "“Preciso que você faça uma espeleologia! Há cavernas por todas as montanhas, e algumas delas têm cogumelos crescendo dentro."
"There's a lot of tigers around here! The sewer system's a mess of poorly-planned portals, and personally, I think the tigers have been pouring out of one of them! Sir Coth is too incompetent to deal with the menace, and I'm too busy. Can you do it?

I need some proof that they're being handled. Can you get me a couple of cat eyeballs? Intact ones are pretty hard to find, but if you kill enough tigers I'm sure you'll get them.": "Há muitos tigres por aqui! O sistema de esgoto é uma confusão de portais mal planejados e, pessoalmente, acho que os tigres estão saindo de um deles! Sir Coth é demasiado incompetente para lidar com a ameaça e eu estou demasiado ocupado. Você pode fazer isso?

Preciso de alguma prova de que eles estão sendo tratados. Você pode me dar alguns olhos de gato? Os intactos são muito difíceis de encontrar, mas se você matar tigres suficientes, tenho certeza de que os pegará."
"There's a mortal drink I like. It tastes awful, but it does help me relax a little. I think it's called a Perker Up? Peaky Cup? Pick Me up? Something like that.\\\"\": \"Midge, no Reino Fae, disse": "\\\"Talvez seja melhor não conseguirmos lembrar de nada. Talvez não queiramos lembrar. Mas não é justo que eu não possa criar novas memórias! Não é minha culpa ter morrido repetidamente! Não desta vez!"
"There's also the issue of the so-called Invincible Bulwark skeletons. They're a huge problem. Be careful!": "Há também a questão dos chamados esqueletos do Baluarte Invencível. Eles são um grande problema. Tome cuidado!"
"There's an undecorated tree in a house near Ukorga's inn in Kur Mountains. Nightshade is in charge of decorating it. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração em uma casa perto da pousada de Ukorga nas montanhas Kur. Nightshade se encarrega de decorá-lo. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in Amulna, a town in the Ilmari desert. Kelim is in charge of decorating it. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração em Amulna, uma cidade no deserto de Ilmari. Kelim é o responsável pela decoração. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in Animal Town near Spot's tent. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração em Animal Town, perto da tenda de Spot. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in Povus. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração em Povus. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in Rahu near Zhao's shop. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração em Rahu, perto da loja de Zhao. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in the Fae Realm. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração no Reino Fae. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in the New Prestonbule cave. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração na caverna de New Prestonbule. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's an undecorated tree in the Red Wing Casino. When fully decorated, casino employees will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração no Red Wing Casino. Quando estiver totalmente decorado, os funcionários do cassino deixarão presentes debaixo da árvore todos os dias durante a temporada de férias."
"There's an undecorated tree near Kleave in Eltibule. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Há uma árvore sem decoração perto de Kleave, em Eltibule. Quando totalmente decorado, os moradores da cidade deixarão presentes debaixo da árvore todos os dias durante as festas de fim de ano."
"There's bound to be a good bowstring in here somewhere. Thanks a lot!": "Deve haver uma boa corda de arco aqui em algum lugar. Muito obrigado!"
"There's food plants everywhere in here -- look for some watercress, and bring it to me. I need a lot of it; I have an idea.": "Há plantas alimentícias por toda parte aqui - procure um pouco de agrião e traga para mim. Eu preciso muito disso; Eu tenho uma ideia."
"There's lots of good cedar here, and a little bit of maple, but no oak. You wouldn't happen to have oak wood with you, by chance?": "Há muito cedro bom aqui e um pouco de bordo, mas nenhum carvalho. Por acaso você não teria madeira de carvalho com você?"
"There's so many types of hammers! You'd love to give the hammer-as-tool its due in a symbol, but how to capture its unique essence? You grit your teeth: only hands-on work at the forge will do.": "Existem tantos tipos de martelos! Você adoraria dar o devido valor ao martelo como ferramenta em um símbolo, mas como capturar sua essência única? Você cerra os dentes: só o trabalho prático na forja serve."
"There's some dwarf living there now by the name of Sammie. Go search around the place, see if you can find the chapter.\\\"\": \"Durstin Tallow, em Serbule Hills, disse": "\\\"Eu sei exatamente onde está este capítulo. Bem, não exatamente. Costumava haver um zelador que morava em uma colina ao sul daqui. George partiu anos atrás, mas ele me disse que guardava um capítulo do livro em uma caixa em algum lugar de sua fazenda."
"There's this goblin off a long way from here. Met him? Named Jumjab. He says he can talk to dead people. I want him to visit here and tell me if he can sense my Lydia in the ground. I dunno why. Just... to know. Oh, you know goblinese, right?": "Tem um goblin muito longe daqui. Conheceu ele? Chamado Jumjab. Ele diz que pode falar com pessoas mortas. Quero que ele venha aqui e me diga se consegue sentir minha Lydia no chão. Não sei por quê. Apenas... para saber. Ah, você conhece goblinese, certo?"
"Therese has asked for bone meal. She thinks it's most easily obtained in the crypt at the back of the small graveyard beneath Serbule.": "Therese pediu farinha de ossos. Ela acha que é mais fácil obtê-lo na cripta nos fundos do pequeno cemitério abaixo de Serbule."
"Therese has asked for some dinosaur scales. She thinks there are dinosaurs living deep in the crypt beneath Serbule.": "Therese pediu algumas escamas de dinossauro. Ela acha que há dinossauros vivendo nas profundezas da cripta abaixo de Serbule."
"Therese has asked for some hash browns.": "Therese pediu algumas batatas fritas."
"Therese Wants Hash Browns": "Therese quer batatas fritas"
"TheRingsRequirement": "O requisito de anéis"
"ThermicRubyite": "TérmicaRubyita"
"These agates are lovely. Did you mine these yourself? I hope that Tryaka likes them!": "Essas ágatas são lindas. Você mesmo extraiu isso? Espero que Tryaka goste deles!"
"These are a bit... grimy... but I'll just clean them up and add them to the tree!": "Estes estão um pouco... sujos... mas vou apenas limpá-los e colocá-los na árvore!"
"These are all cave tilapia? Hmm... it's such a bland, generic meat that I can't even tell where it came from! if I had more equipment here I could tell if these fish were atypical, but they just look like regular cave tilapia to me. I guess I know what I'm making for dinner tonight, though! Here, have some shinies!": "São todas tilápias das cavernas? Hmm... é uma carne tão sem graça e genérica que nem sei dizer de onde veio! se eu tivesse mais equipamento aqui, poderia dizer se esses peixes eram atípicos, mas para mim eles parecem apenas tilápias normais das cavernas. Acho que sei o que vou fazer para o jantar esta noite! Aqui, tenha alguns brilhos!"
"These are all mammilian in nature. Corroboration! I noticed that the plants do not attack me, and now I understand: the plants do not eat insects! This is a very useful discovery. I must contact the Queen at once. We can use these plants as guards!

As an added bonus, I can now experiment with these powders for new drug ideas as well.

You have been exceptionally useful. I understand that your culture dictates that I now give you 'tit for your tat', which I assume is a disgusting sexual act. Since insects do not have breasts -- and if they did, males such as I would not have these organs -- please accept this secretion instead. In my home city, we farm the insects that make this, and use it as currency.": "Todos são de natureza mamiliana. Corroboração! Percebi que as plantas não me atacam e agora entendi: as plantas não comem insetos! Esta é uma descoberta muito útil. Devo contatar a Rainha imediatamente. Podemos usar essas plantas como guardas!

Como um bônus adicional, agora posso experimentar esses pós também para novas ideias de medicamentos.

Você foi excepcionalmente útil. Eu entendo que sua cultura determina que eu agora lhe dê 'olho por olho', o que presumo ser um ato sexual nojento. Como os insetos não têm seios – e se tivessem, machos como eu não teriam esses órgãos – por favor, aceite esta secreção. Na minha cidade natal, cultivamos os insetos que produzem isso e os usamos como moeda."
"These are beautiful! Well, personally I've never loved the desert rose; they're a bit weedy for my taste. But these are very nice examples of the species!

I think Ormond will like it. He'll breathe in their aroma, and he'll smile.

Thank you. I'll present these to him tonight.": "Estes são lindos! Bem, pessoalmente nunca amei a rosa do deserto; eles são um pouco ervas daninhas para o meu gosto. Mas estes são exemplos muito bons da espécie!

Acho que Ormond vai gostar. Ele respirará seu aroma e sorrirá.

Obrigado. Vou apresentá-los a ele esta noite."
"These are fresh and deadly! Perfect, thank you! I need these for my mushroom farming.": "Estes são frescos e mortais! Perfeito, obrigado! Preciso disso para meu cultivo de cogumelos."
"These are from Denton? That man! He hurts my soul!

He wants me to desert my post! How presumptuous can a man be? And the worst part is that I so wish to do it. Perhaps it's a spell. No, I think he's a master psychologist. He's turned my thoughts against me.

Tell him I'll always ... Tell him that I would...

<i>[Sir Fisk turns from you and waves you way.]</i>": "Estes são de Denton? Esse homem! Ele machuca minha alma!

Ele quer que eu abandone meu posto! Quão presunçoso pode ser um homem? E o pior é que eu quero muito fazer isso. Talvez seja um feitiço. Não, acho que ele é um mestre psicólogo. Ele virou meus pensamentos contra mim.

Diga a ele que sempre irei... Diga a ele que eu faria...

<i>[Sir Fisk se afasta de você e acena em sua direção.]</i>"
"These are good quality. And I see you've left your mark on them. I trust you, so I trust your wares. Thank you.": "Estes são de boa qualidade. E vejo que você deixou sua marca neles. Eu confio em você, então confio em seus produtos. Obrigado."
"These are his fear? Let us see. Yes, this will work, for the dreamer's nightmare is our salvation: he fears Gulagra!

It is done. As anticlimactic as that! Gulagra has been repelled. But I shall not end this dream. No, that would be too kind. The mortal who dared to dream it shall never awaken; this will stay in this nightmare until his body perishes.

You have my gratitude! If you need to leave now, please go with my blessing. If you had a bit more time, there's one remaining clean up task to see to...": "Esses são o medo dele? Vamos ver. Sim, vai funcionar, pois o pesadelo do sonhador é a nossa salvação: ele teme o Gulagra!

Está feito. Tão anticlimático quanto isso! Gulagra foi repelido. Mas não vou acabar com este sonho. Não, isso seria muito gentil. O mortal que ousou sonhar nunca despertará; isso permanecerá neste pesadelo até que seu corpo morra.

Você tem minha gratidão! Se você precisar sair agora, por favor, vá com minha bênção. Se você tivesse um pouco mais de tempo, ainda há uma tarefa de limpeza restante para fazer..."
"These are hops? They smell bad... well, I'll take your word for it. Thank you! Here's something from my shop in return.": "Estes são lúpulo? Eles cheiram mal... bem, vou acreditar na sua palavra. Obrigado! Aqui está algo da minha loja em troca."
"These are just what I wanted. Thank you! Now hand me that kit and I'll show you the best way to wrap bandages. This works for bondage as well as injuries.": "Isso é exatamente o que eu queria. Obrigado! Agora me passe esse kit e eu lhe mostrarei a melhor forma de embrulhar os curativos. Isso funciona tanto para a escravidão quanto para lesões."
"These are lovely! But ... <i>[Trasen studies the glass]</i> these are just ordinary worthless glass. Why do they carry these around?! How strange.

Oh, I should pay you for your service! I don't have much of the local coin, but here: this powder is prized among weather witches.": "Estes são adoráveis! Mas... <i>[Trasen estuda o vidro]</i> estes são apenas vidros comuns e sem valor. Por que eles carregam isso por aí?! Que estranho.

Oh, eu deveria pagar pelo seu serviço! Não tenho muitas moedas locais, mas aqui: esse pó é apreciado entre as bruxas do tempo."
"These are nice ones. Did you explain to them what's happening? ... Oh, you don't speak Fae Insect at all? Huh. Well, don't worry about it. I'll get 'em situated.": "Estes são legais. Você explicou a eles o que está acontecendo? ... Ah, você não fala nada de Fae Insect? Huh. Bem, não se preocupe com isso. Vou colocá-los situados."
"These are not my lost fly amanita! But they will be useful nonetheless.": "Estes não são meus amanitas perdidos! Mas eles serão úteis mesmo assim."
"These are not my lost fly amanita! But they will be useful nonetheless. ": "Estes não são meus amanitas perdidos! Mas eles serão úteis mesmo assim."
"These are perfect, thanks! I'm glad you stopped by. I just remembered that Miss Chievous actually hates loud things, so I won't be needing those. Feel free to keep them! And for your help, let me teach you a bit about artistry.": "Estes são perfeitos, obrigado! Que bom que você passou por aqui. Acabei de lembrar que a Srta. Chievous odeia coisas barulhentas, então não vou precisar disso. Sinta-se à vontade para mantê-los! E para sua ajuda, deixe-me ensinar um pouco sobre arte."
"These are perfect. Now look here ... No, come over here. I won't bite! See how the feather has these little spines that lock together? And even though the bird is dead, the feather stays intact and even waterproof! Isn't that wonderful?": "Estes são perfeitos. Agora olhe aqui... Não, venha aqui. Eu não vou morder! Viu como a pena tem esses pequenos espinhos que se prendem? E mesmo que o pássaro esteja morto, a pena permanece intacta e até à prova d'água! Não é maravilhoso?"
"These are shattered just right! Thank you!": "Estes estão quebrados na medida certa! Obrigado!"
"These are the 'power sources' the original team was sent for? Hm... I have doubts about these items' potency. But in any case you have accomplished the task well! And I hope that you didn't mind my little addition to the task-list. Those turnwing mantises deserved death! I have added some additional compensation for dispatching justice.": "Estas são as 'fontes de energia' para as quais a equipe original foi enviada? Hm... tenho dúvidas sobre a potência desses itens. Mas de qualquer forma você cumpriu bem a tarefa! E espero que você não tenha se importado com minha pequena adição à lista de tarefas. Aqueles louva-a-deus mereciam a morte! Eu adicionei alguma compensação adicional por enviar justiça."
"These are the books? They're... They have no pages. But okay! Okay, I don't care, so this is great! I'll deliver this order. You're really good at this, you know?": "Estes são os livros? Eles são... Eles não têm páginas. Mas tudo bem! Ok, eu não me importo, então isso é ótimo! Eu entregarei esse pedido. Você é muito bom nisso, sabia?"
"These are the dice? Oh well. This is pretty typical ratkin garbage. But I'll keep them... I have some new game ideas I wanted to prototype! Here's a shiny for your trouble.": "Estes são os dados? Ah bem. Este é um lixo bastante típico de ratkin. Mas vou mantê-los... Tenho algumas novas ideias de jogos que queria prototipar! Aqui está um brilho para o seu problema."
"These are the documents? Hmm, I'll see if I can get these decoded. You've done well!": "Estes são os documentos? Hmm, vou ver se consigo decodificar isso. Você se saiu bem!"
"These are the mushrooms? Hmm, yep, pretty standard. You can keep those. And as for the exercise you just got: you're welcome!": "Estes são os cogumelos? Hmm, sim, bastante padrão. Você pode ficar com eles. E quanto ao exercício que você acabou de fazer: de nada!"
"These are your research notes? Terse... But sufficient. I see my hypothesis was correct: nobody expects to die from a Scintillating Flame. It's just too shiny to be scary. Perhaps we can use that.

I have more research for you when you're ready.": "Estas são suas notas de pesquisa? Conciso... Mas suficiente. Vejo que minha hipótese estava correta: ninguém espera morrer por causa de uma Chama Cintilante. É muito brilhante para ser assustador. Talvez possamos usar isso.

Tenho mais pesquisas para você quando estiver pronto."
"These are... Well... these are... adequate work. Thank you.": "Estes são... Bem... estes são... trabalhos adequados. Obrigado."
"These big green panthers come from the fairy realm. Semi-intelligent, they seek to cause mischief and destruction. Regular panthers seem to instinctively treat them as royalty, following their lead and protecting their flank.\": \"<b>Caça": "Panteras Feéricas</b>"
"These boars are huge, deadly, and very aggressive. They are able to hold their own against enchanted cats, man-sized mantises, and house-sized snails. They are not afraid of people.\": \"<b>Caça": "Javalis Feroz</b>"
"These boots are hideous! But I like them! You are industrious. Let me show you some clever toolcrafting techniques usually only taught to goblins.": "Essas botas são horríveis! Mas eu gosto deles! Você é trabalhador. Deixe-me mostrar algumas técnicas inteligentes de criação de ferramentas que normalmente só são ensinadas aos goblins."
"These carrots grew slowly, and I wouldn't have it any other way. Thanks Red Wing Casino!": "Essas cenouras cresceram lentamente e eu não aceitaria de outra maneira. Obrigado Cassino Red Wing!"
"These craven resurrected menaces love to hurt people from afar. They run in fear when approached.\": \"<b>Caça": "Arqueiros Esqueletos</b>"
"These definitely look like black foot morels. Thank you. I'll do some quick tests to make sure they're typical for the species. Here is a bounty for your hard work.": "Definitivamente se parecem com cogumelos pretos. Obrigado. Farei alguns testes rápidos para ter certeza de que são típicos da espécie. Aqui está uma recompensa pelo seu trabalho duro."
"These dinosaurs are native to plains lands but have learned that they can survive here in the desert, where they wreak the delicate ecology by eating everything.\": \"<b>Caça": "Deinonychus</b>"
"These feral pigs once must have been tended by ranchers, but they have been living in the wild for too many generations": "there's no taming these delicious beasts.\": \"<b>Caça: Porcos</b>"
"These frogs destroy ecosystems and breed rapidly. Few creatures can withstand their acidic touch for long.\": \"<b>Caça": "sapos Burnspittle</b>"
"These highly venomous spiders eat many dangerous pests. However, they also like to eat people, and they especially love sneaking up on campers and caravans in the night.\": \"<b>Caça": "Aranhas Viúva Negra</b>"
"These lungfish are native to our homeland of Fosulf, and the den guards them well because they hold a precious secret: the oil in these fish has regenerative properties! Also they're delicious.

I'm going to sneak these fish into the lake outside. And then... hm... I'm not exactly sure how destroying the local fish ecosystem helps our cause, but since the den doesn't want that to happen, I do want it to happen!

And here's your reward.": "Estes peixes pulmonados são nativos da nossa terra natal, Fosulf, e a toca os guarda bem porque guardam um segredo precioso: o óleo destes peixes tem propriedades regenerativas! Também são deliciosos.

Vou levar esses peixes para o lago lá fora. E então... hm... não tenho certeza de como a destruição do ecossistema de peixes local ajuda a nossa causa, mas como a toca não quer que isso aconteça, eu quero que aconteça!

E aqui está sua recompensa."
"These mind gems... they're synthetic! Who would bother to ... nevermind. These will work. Everything seems to be here. There is but one more step!": "Essas joias mentais... são sintéticas! Quem se daria ao trabalho de... deixa pra lá. Isso funcionará. Tudo parece estar aqui. Falta apenas mais um passo!"
"These once-ordinary frogs were slain in some particularly heinous way, causing their souls to seek vengeance. They are pure malice.\": \"<b>Caça": "sapos esqueléticos</b>"
"These organs will work well, thank you. I use them as part of the catalyst for my... well, I've said too much already. Here's something for your trouble. Don't tell anyone where you got that!": "Esses órgãos funcionarão bem, obrigado. Eu os uso como parte do catalisador para o meu... bem, já falei demais. Aqui está algo para o seu problema. Não conte a ninguém onde você conseguiu isso!"
"These ornaments will stare into the soul of those who engage our tree! May those who come unprepared for gifting feel their hateful gaze! Excellent work!": "Esses enfeites vão marcar a alma de quem envolve nossa árvore! Que quem chega despreparado para presentear sinta seu olhar de ódio! Excelente trabalho!"
"These pebbles are too small. You did technically bring me what I asked for, but OBVIOUSLY what I asked for wasn't specific enough. You cared more about getting the job done than about whether the job should be done or not! No tip.": "Essas pedras são muito pequenas. Você tecnicamente me trouxe o que eu pedi, mas OBVIAMENTE o que eu pedi não foi específico o suficiente. Você se preocupava mais em fazer o trabalho do que em saber se ele deveria ser feito ou não! Nenhuma dica."
"These pigs were never tame; they tolerate their feral brethren, but they attack most other creatures without fear. Wild pigs are not prey animals": "they're ominvorous, intelligent, and vicious.\": \"<b>Caça: Porcos Selvagens</b>"
"These rabbit appendages are much less attractive than I had anticipated. Perhaps there is a special method to preparing them? I doubt these bloody stinky objects will appeal to rich bipeds! Hmm... but in any case, here is the promised payment. Thank you.": "Esses apêndices de coelho são muito menos atraentes do que eu imaginava. Talvez exista um método especial para prepará-los? Duvido que esses malditos objetos fedorentos atraiam bípedes ricos! Hmm... mas de qualquer forma, aqui está o pagamento prometido. Obrigado."
"These ratkin are gorging themselves on snail meat! Unacceptable! Desnailitize them immediately!": "Esses ratkin estão se empanturrando de carne de caracol! Inaceitável! Desnailitize-os imediatamente!"
"These ratkin are unusually good at necromancy. I wonder exactly how powerful they are? Hmm...

Oh, hi there mutant, I have a small test for you. Go and get yourself shot by some ratkin necromancers. Try not to die, though! I need to ask you some questions after, and I can't speak with the dead! Because I'm not a necromancer!": "Esses ratkin são excepcionalmente bons em necromancia. Eu me pergunto exatamente o quão poderosos eles são? Hum...

Oh, olá mutante, tenho um pequeno teste para você. Vá e leve um tiro de alguns necromantes ratkin. Tente não morrer, no entanto! Preciso fazer algumas perguntas depois e não posso falar com os mortos! Porque eu não sou um necromante!"
"These spiders happened to eat a newly-formed air elemental -- which admittedly look like a large fly at first -- and have become entangled with air magic. They are not victims, though": "they are able to use the wind to their advantage and are extremely hard to hit!\": \"<b>Caça: Aranhas Tornado</b>"
"These will be delightful decorations at my autumn festival!": "Estas serão decorações deliciosas no meu festival de outono!"
"These will do. I'll preserve them and string them up for the tree. Also, you may be relieved to hear this: I asked Daniel Murderdark about using ears on his peoples' festival tree. I expected he'd be offended, but he said it was 'awesome'. So don't worry about it! Humans are more understanding than I expected.": "Isso servirá. Vou preservá-los e pendurá-los na árvore. Além disso, você pode ficar aliviado ao ouvir isto: perguntei a Daniel Murderdark sobre o uso de orelhas na árvore do festival de seu povo. Eu esperava que ele ficasse ofendido, mas ele disse que era “incrível”. Então não se preocupe com isso! Os humanos são mais compreensivos do que eu esperava."
"These will work. Thanks. Here's some coin. I don't expect to survive a fight with the Shadow Keepers, but I don't want to make it too easy, either.": "Isso funcionará. Obrigado. Aqui está uma moeda. Não espero sobreviver a uma luta com os Guardiões das Sombras, mas também não quero tornar isso muito fácil."
"TheSecretIngredient": "O ingrediente secreto"
"TheSewerMan": "O homem do esgoto"
"TheSexyPanther": "A Pantera Sexy"
"TheSpies": "Os espiões"
"TheStonecurlClan": "O Clã Stonecurl"
"TheSwarmerHypothesis": "A hipótese do Swarmer"
"TheSweater": "O suéter"
"TheSweetButterSecret": "O segredo da manteiga doce"
"TheTrespassingCharlatan": "O Charlatão Invasor"
"TheWeirdPrism": "O Prisma Estranho"
"TheWoolyBastard": "O Wooly Bastardo"
"TheWorstSlug": "A pior lesma"
"They aren't really dead, you know. Not like mortals die. They'll be back within a week. But they'll not soon forget the pain you caused them! Thank you.": "Eles não estão realmente mortos, você sabe. Não é como se os mortais morressem. Eles estarão de volta dentro de uma semana. Mas eles não esquecerão tão cedo a dor que você lhes causou! Obrigado."
"They come at night! The froooooggggsss! It's just too much! As a sovereign independent psychic insect lord I demand you aid my swampy kingdom. Please? The frogs come out at dusk and they leave a while after. Come on. Do a bug a favor.": "Eles vêm à noite! O froooooggggss! É demais! Como um senhor inseto psíquico soberano e independente, exijo que você ajude meu reino pantanoso. Por favor? As rãs saem ao entardecer e vão embora um pouco depois. Vamos. Faça um favor a um bug."
"They have exquisite magic, don't you agree? These Ice Cores never get warm enough to melt... ever! I've thrown them into fires and they still retain this property. This is a phenomenal level of power, in some ways... anyway, I appreciate your efforts. Thank you!": "Eles têm uma magia requintada, você não concorda? Esses núcleos de gelo nunca esquentam o suficiente para derreter... nunca! Eu os joguei no fogo e eles ainda mantêm esta propriedade. Este é um nível de poder fenomenal, em alguns aspectos... de qualquer forma, agradeço seus esforços. Obrigado!"
"They have many interesting spirits here, but I miss the drink of my homeland. Rahu has the most salivation-inducing tequila! I would love to have a cask delivered.

And of course, this would be a business expense, so I can tap into my generous expense account.": "Eles têm muitas bebidas espirituosas interessantes aqui, mas sinto falta da bebida da minha terra natal. Rahu tem a tequila que mais causa salivação! Eu adoraria que um barril fosse entregue.

E, claro, isso seria uma despesa comercial, para que eu possa aproveitar minha generosa conta de despesas."
"They just looked like bones, you say? Did you hit enough of them? Nothing special? Hm. Fascinating. By which I mean not fascinating. Maybe there's a better test...": "Eles apenas pareciam ossos, você disse? Você acertou o suficiente deles? Nada de especial? Hum. Fascinante. Com isso quero dizer não fascinante. Talvez haja um teste melhor..."
"They look alright, I guess. Thanks. You can tell my sister to stop worrying so much about me. I'll be home after I finish this snack. Here, take this. I don't need it anymore.

<i>[She drops something, then goes back to chewing on a lemon she had nearby.]</i>": "Eles parecem bem, eu acho. Obrigado. Você pode dizer à minha irmã para parar de se preocupar tanto comigo. Estarei em casa depois de terminar este lanche. Aqui, pegue isso. Eu não preciso mais disso.

<i>[Ela deixa cair alguma coisa e volta a mastigar um limão que tinha por perto.]</i>"
"They're getting really close to this outpost, too. I saw one watching me from across the river earlier! I've programmed the turrets to target the panthers... but I don't know if they'll be enough. If Mittens and I are dead when you get back, please avenge us!\\\"\": \"Red nas montanhas Kur disse": "\\\"Você finalmente chegou! Temos um problema com panteras. Um navio orc chegou durante a noite e descarregou centenas de panteras de guerra! Eles devem estar planejando uma guerra ou algo assim. Mas quem se importa com isso! Eles deixaram suas panteras caçarem livremente por todo o território dos Yeti, que também é onde está a maioria das tocas de raposas sobreviventes!"
"They're going to try to breed them into an army, so you should totally go stop them.\\\"\": \"O alferes Cricket a bordo do Wintertide disse": "“O convés mais baixo está quase vazio e usado apenas para armazenamento. Armazenamos um monte de espécimes mortais lá para análise posterior."
"They're manufacturing drugs? That sounds... bad. Are you sure it's not just another ill-conceived perfume line?

Hmm. Well, this is the first I've heard of it, and hopefully the last. Thanks for the intel.": "Eles estão fabricando drogas? Isso parece... ruim. Tem certeza de que não é apenas mais uma linha de perfumes mal concebida?

Hum. Bem, esta é a primeira vez que ouço falar dele, e espero que seja a última. Obrigado pela informação."
"They're pretty! Thank you. Red will love them. Here... it's embarrassing, but this is all I have to offer in exchange.": "Eles são lindos! Obrigado. Red vai amá-los. Aqui... é constrangedor, mas isso é tudo que tenho a oferecer em troca."
"Thick Cranium Lotions": "Loções espessas para crânio"
"Thick, rich, and kind of disgusting. Thank you!

This next one's got broader appeal, don't worry!": "Grosso, rico e meio nojento. Obrigado!

Este próximo tem um apelo mais amplo, não se preocupe!"
"Thimble Pete asked for a bunch of prepped cotton.": "Thimble Pete pediu um monte de algodão preparado."
"Thimble Pete asked for a Trophy Rat Skin, which is a rare item found by expert skinners.": "Thimble Pete pediu um Trophy Rat Skin, que é um item raro encontrado por esfoladores experientes."
"Thimble Pete asked for some fruit cocktail.": "Thimble Pete pediu um coquetel de frutas."
"Thin Cranium Lotions": "Loções Finas para Crânio"
"Thin The Food Supply": "Reduza o suprimento de alimentos"
"Thinking about it, you're pretty sure you could master drawing a bone symbol if you had about a thousand bones on hand to study.": "Pensando nisso, você tem certeza de que conseguiria dominar o desenho de um símbolo de osso se tivesse cerca de mil ossos disponíveis para estudar."
"Third lungs down! Hey, do you think those lungs would be scarier if they were coughing and gagging blood all the time? Oh, less scary? Hmm. Okay, what if the lungs were coated in fire? Fire makes everything scarier! No? Too dumb? Well, I'll think of something eventually.": "Terceiros pulmões abatidos! Ei, você acha que esses pulmões seriam mais assustadores se tossem e engasgassem com sangue o tempo todo? Ah, menos assustador? Hum. Ok, e se os pulmões estivessem cobertos de fogo? O fogo torna tudo mais assustador! Não? Muito burro? Bem, eventualmente pensarei em algo."
"This batch of manticores are total jerks so you should kill them and let them be reborn to try again.\": \"<b>Caça": "Manticoras</b>"
"This book is priceless, so I will give you priceless knowledge in exchange.\\\"\": \"Michael Irasce, da Statehelm, disse": "\\\"Tenho um pedido especial de livro para o qual gostaria de sua ajuda. Se eu conseguir vender isso, compensarei meses de vendas fracas!"
"This cheese has been aged locally. Perfect! I'm packing this up to take back home with me. I didn't bring my cheese-ometer with me, I'm sorry to say. Good job! Here is your reward!": "Este queijo foi envelhecido localmente. Perfeito! Estou arrumando isso para levar para casa comigo. Não trouxe meu medidor de queijo comigo, lamento dizer. Bom trabalho! Aqui está sua recompensa!"
"This cheese is fantastic! We might eat it all right now! Come check with me later on... we might need some more!

<i>[You earn 10 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Este queijo é fantástico! Podemos comer tudo agora mesmo! Venha conferir comigo mais tarde... talvez precisemos de mais!

<i>[Você ganha 10 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"This cheese is fantastic! We might eat it all right now! Come check with me later on... we might need some more!

<i>[You earn 5 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "Este queijo é fantástico! Podemos comer tudo agora mesmo! Venha conferir comigo mais tarde... talvez precisemos de mais!

<i>[Você ganha 5 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"This chest isn't locked, but it's jammed shut. If you had a spoon of some sort, you could pop it open.": "Este baú não está trancado, mas está trancado. Se você tivesse algum tipo de colher, poderia abri-la."
"This cinnabar will make some excellent necklaces. Many thanks, my friend.": "Este cinábrio fará alguns colares excelentes. Muito obrigado, meu amigo."
"This clump of bloody teeth will do well. You are resourceful! And so am I! Look what I found at the bottom of the lake. It is a gift for you.": "Este amontoado de dentes ensanguentados vai servir bem. Você é engenhoso! E eu também! Olha o que encontrei no fundo do lago. É um presente para você."
"THIS DISGUSTING! WHAT THIS!? OH. OHHH. OTIS STOMACH NOT HURT NOW... OTIS KEEP FOR LATER. HERE. TAKE GARBAGE STOMACH.": "ISSO NOJENTO! QUE ISSO!? OH. AHHH. O ESTÔMAGO DE OTIS NÃO DÓI AGORA... OTIS GUARDE PARA MAIS TARDE. AQUI. TOME LIXO ESTÔMAGO."
"This hole's near the other mummy-pits, so be on your guard. Could be mummies or other nasty undead.": "Este buraco fica perto dos outros poços de múmia, então fique atento. Podem ser múmias ou outros mortos-vivos desagradáveis."
"This is a bitter pill to swallow, as they say in your idiom.

I still believe there is a way. Perhaps if I prepared the venison specially...

In any case, thank you for your labor.": "Esta é uma pílula difícil de engolir, como dizem no seu idioma.

Eu ainda acredito que há um caminho. Talvez se eu preparasse a carne de veado especialmente...

De qualquer forma, obrigado pelo seu trabalho."
"This is a complicated bundle order from someone who's obsessed with dragonkin. The hassle is huge but the pay is good.": "Este é um pedido complicado de alguém obcecado por dragonkin. O incômodo é enorme, mas o salário é bom."
"This is a good start! We're on our way to... Umm. What are we doing?": "Este é um bom começo! Estamos a caminho de... Hum. O que estamos fazendo?"
"This is a lot less satisfying than I thought it would be. But that's on me. Thanks for trying!": "Isso é muito menos satisfatório do que pensei que seria. Mas isso é por minha conta. Obrigado por tentar!"
"This is a perfect spot for a jewelry shop because those hideous manticores love jewelry! If you kill them, bring their jewelry here to sell. And if you really want to get on my good side, bring me their tail spikes. I'm shipping them home for my wife to turn into powerful poison knives!": "Este é o local perfeito para uma joalheria porque aquelas manticoras horríveis adoram joias! Se você matá-los, traga suas joias aqui para vender. E se você realmente quer me agradar, traga-me as pontas da cauda. Estou enviando-os para casa para que minha esposa os transforme em poderosas facas venenosas!"
"This is a Salmpo heart? Really?

Let me take a test bite ... well, it tastes like cabbage. I'm a little disappointed, but very thankful to finally have an answer to this very important question.": "Este é um coração Salmpo? Realmente?

Deixe-me fazer um teste... bem, tem gosto de repolho. Estou um pouco desapontado, mas muito grato por finalmente ter uma resposta para esta pergunta tão importante."
"This is a valuable gift. Thank you. I wish for you to have this in exchange.": "Este é um presente valioso. Obrigado. Desejo que você tenha isso em troca."
"This is all the darkness you could get?! This is only enough for a few incredibly-powerful potions! <i>[Ragabir sighs.]</i> If you'd brought more, I could have paid better, but here's what you're owed.": "Essa é toda a escuridão que você poderia conseguir?! Isso é suficiente apenas para algumas poções incrivelmente poderosas! <i>[Ragabir suspira.]</i> Se você tivesse trazido mais, eu poderia ter pago melhor, mas aqui está o que você deve."
"This is all the ingredients? I... don't know what to say!

I guess I'll take these to Silvia. What do you think the odds are that this will work? Well, it doesn't matter, because I've got to try! I thought I was coming to terms with being an ass, but I really want to be a person again!

But if it works, I'll have to say goodbye to my friends at Animal Town. Jumper is going to be devastated...": "Esses são todos os ingredientes? Eu... não sei o que dizer!

Acho que vou levar isso para Silvia. Quais você acha que são as chances de que isso funcione? Bem, não importa, porque eu tenho que tentar! Achei que estava aceitando ser um idiota, mas quero muito ser uma pessoa de novo!

Mas se funcionar, terei que me despedir dos meus amigos da Animal Town. Jumper vai ficar arrasado..."
"This is an interesting assortment of artifacts you've brought me. I will send these off for study but for now I shall take your word for it that they are magical, and compensate you accordingly.": "Esta é uma variedade interessante de artefatos que você me trouxe. Vou enviá-los para estudo, mas por enquanto acreditarei na sua palavra de que são mágicos e compensarei você de acordo."
"This is barghest flesh? Hmm, it's very similar to dog flesh, isn't it? Legend says barghests were genetically engineered by goblins, but that seems unlikely to me... I mean, we know how their bugbears turned out! Barghests seem like graceful creatures in comparison. I think they're just some sort of magic-infused super-dog. But I'll let Mox examine these later and see if he finds any clues to their origin. Thanks! Uh, here's some stuff for you.": "Esta é a carne mais barghest? Hmm, é muito parecido com carne de cachorro, não é? A lenda diz que os barghests foram geneticamente modificados por goblins, mas isso parece improvável para mim... Quero dizer, nós sabemos como seus bicho-papões ficaram! Os Barghests parecem criaturas graciosas em comparação. Eu acho que eles são apenas uma espécie de supercachorro com infusão de magia. Mas deixarei Mox examiná-los mais tarde e ver se ele encontra alguma pista sobre sua origem. Obrigado! Uh, aqui estão algumas coisas para você."
"This is cheshire? Smells disgusting! But I bet she'll like it. Thanks!": "Isto é Cheshire? Cheira nojento! Mas aposto que ela vai gostar. Obrigado!"
"This is definitely gonna work to make Jenny feel better. And if it doesn't, I'll blame it all on you. Thanks again!": "Isso definitivamente vai funcionar para fazer Jenny se sentir melhor. E se isso não acontecer, vou culpar você por tudo. Obrigado novamente!"
"This is embarrassing, but I need some squash seedlings. I kind of insulted Therese the other day by calling her an... by calling her a name. So can you get them for me? I need three.": "Isso é constrangedor, mas preciso de algumas mudas de abóbora. Eu meio que insultei Therese outro dia, chamando-a de... chamando-a de um nome. Então você pode pegá-los para mim? Eu preciso de três."
"This is gin! Thank you so much. Will you have a drink with me some time? I hear gin mixed with this orcish drug called 'gur-horta' can be mind-expanding. When you have time to hang out, we'll try it together.": "Isso é gim! Muito obrigado. Você vai tomar uma bebida comigo algum dia? Ouvi dizer que gim misturado com uma droga orc chamada 'gur-horta' pode expandir a mente. Quando você tiver tempo para sair, tentaremos juntos."
"This is gonna be so funny. SOOooo funny! Here: I saved up to pay you. Be thankful!": "Isso vai ser tão engraçado. Muuuito engraçado! Aqui: economizei para pagar você. Seja grato!"
"This is gonna sound silly. But you know that watery beer Durstin sells? I found a way to improve it: strawberry juice! I just need a few strawberries for each cup. If you have some, I'll buy 'em from you for... I dunno, ten times their value!": "Isso vai parecer bobagem. Mas você conhece aquela cerveja aguada que Durstin vende? Encontrei uma forma de melhorar: suco de morango! Só preciso de alguns morangos para cada xícara. Se você tiver alguns, eu compro de você por... não sei, dez vezes o valor deles!"
"This is great -- thanks!": "Isso é ótimo - obrigado!"
"This is great news! I really didn't think you'd be able to do it! You and your friends are all honorary foxes. I can't thank you enough!": "Esta é uma ótima notícia! Eu realmente não achei que você seria capaz de fazer isso! Você e seus amigos são todos raposas honorárias. Não posso agradecer o suficiente!"
"This is her soul? Oh... oh. I guess I should shatter it and free her, huh. ...

I can't do it! She's in pain in here, but I can't bring myself to release her. There has to be another way! If only Lord Eltibule were still alive. Hmm... that gives me an idea...": "Esta é a alma dela? Ah... ah. Acho que deveria quebrá-lo e libertá-la, hein. ...

Eu não consigo! Ela está com dor aqui, mas não consigo soltá-la. Tem que haver outro jeito! Se ao menos Lorde Eltibule ainda estivesse vivo. Hum... isso me dá uma ideia..."
"This is it! Hm. It's... it's really ugly. But I'll give it a try. Thanks. And a deal's a deal: let me teach you the basics of buckle artistry.": "É isso! Hum. É... é muito feio. Mas vou tentar. Obrigado. E acordo é acordo: deixe-me ensinar-lhe o básico da arte das fivelas."
"This is it! Hm. These sigils attune it to a specific species. That's not supposed to be possible! I will have to study this more. Oh, here. These are boring old regular prisms in exchange.": "É isso! Hum. Esses sigilos o sintonizam com uma espécie específica. Isso não deveria ser possível! Vou ter que estudar mais isso. Ah, aqui. Em troca, estes são prismas regulares e enfadonhos."
"This is it! Now... Yes! The blood well is reopened!": "É isso! Agora... Sim! O poço de sangue está reaberto!"
"This is it! The demon bean! In her notes, she said this seed could grow a Sampo. I'll finally be able to quit farming! Thanks so much! Oh, uh, here, take her old magic pants. I won't need them anymore!": "É isso! O feijão demônio! Em suas anotações, ela disse que essa semente poderia gerar um Sampo. Finalmente poderei parar de cultivar! Muito obrigado! Oh, uh, aqui, pegue suas velhas calças mágicas. Não vou precisar mais deles!"
"This is it! The Spike of Autonomy! This is a toy I invented in my youth. It was lost long ago. How could it be here? This is surely a recreation, but it so perfectly matches my memory.

Thank you.": "É isso! O pico da autonomia! Este é um brinquedo que inventei na minha juventude. Foi perdido há muito tempo. Como poderia estar aqui? Esta é certamente uma recreação, mas combina perfeitamente com a minha memória.

Obrigado."
"This is it! Very nice work. Let me see if this fixes it...

Hmm, nothing. Can you smack that box over there? There! The main system is on! ... Damn. It shut off again. Well, we almost had it!": "É isso! Muito bom trabalho. Deixa eu ver se isso resolve...

Hum, nada. Você pode bater naquela caixa ali? Lá! O sistema principal está ligado! ... Droga. Ele desligou novamente. Bem, quase conseguimos!"
"This is it? Crossing Oil? Thanks! I guess I dip the arrow heads in this and they get magical? Huh. Well, I'll play with it. Here's some good old fashioned non-magical arrows as payment.": "É isso? Cruzando o Petróleo? Obrigado! Acho que mergulho as pontas das flechas nisso e elas ficam mágicas? Huh. Bem, vou brincar com isso. Aqui estão algumas flechas não mágicas à moda antiga como forma de pagamento."
"This is it? Hmm. They are not ice. They're just strangely chilly. This is disappointing. But I do not blame the messenger for the message; here is an appropriate reward.": "É isso? Hum. Eles não são gelo. Eles estão estranhamente frios. Isto é decepcionante. Mas não culpo o mensageiro pela mensagem; aqui está uma recompensa apropriada."
"This is it? Thanks! <i>Elahil pours the Uncrossing Oil on his hands.</i> It burns!

<b>It burnnnssss!</b> Oh Belrath ready your White Halls, I'm dying... I'm... oh, it stopped. Hey, I'm all good. Thanks! That was scary. I'm gonna skip Curse Arrows.": "É isso? Obrigado! <i>Elahil derrama o Óleo da Descruzamento nas mãos.</i> Ele queima!

<b>Isso queima!</b> Oh Belrath, prepare seus Salões Brancos, estou morrendo... estou... ah, parou. Ei, estou bem. Obrigado! Isso foi assustador. Vou pular Curse Arrows."
"This is it? Thanks! <i>Norbert reads the letter.</i> Well, that's disappointing. Why do I even bother to try to do nice things for people if ... oh, sorry, I shouldn't rant in front of others. Here, take this for your own recipes.": "É isso? Obrigado! <i>Norbert lê a carta.</i> Bem, isso é decepcionante. Por que eu me preocupo em tentar fazer coisas boas para as pessoas se... ah, desculpe, eu não deveria reclamar na frente dos outros. Aqui, leve isso para suas próprias receitas."
"This is it? This is the thing Echur wanted back? Huh. Well, thanks! Here, let me reward you. I don't have a lot of cash, but here's a Council Note.": "É isso? Era isso que Echur queria de volta? Huh. Bem, obrigado! Aqui, deixe-me recompensá-lo. Não tenho muito dinheiro, mas aqui está uma Nota do Conselho."
"This is my rum! You found it. Thank you, freakish ghost. I'm going to drink this and then head off to new places. If you want, I could teach you something about brewing before I go.": "Este é o meu rum! Você encontrou. Obrigado, fantasma bizarro. Vou beber isso e depois partir para novos lugares. Se você quiser, posso lhe ensinar algo sobre fabricação de cerveja antes de ir."
"This is not flawless enough. The cat was too small! This wouldn't look impressive next to the bear pelts. You have failed! But you were not required to even try, so I thank you. Hmm. You are a skinner, yes? Then perhaps you are a tanner as well? I skinned beasts while learning the art, but I do not know how to tan them, and they stink. Take them far from here.": "Isso não é perfeito o suficiente. O gato era muito pequeno! Isso não ficaria impressionante perto das peles de urso. Você falhou! Mas você nem foi obrigado a tentar, então agradeço. Hum. Você é um esfolador, certo? Então talvez você também seja curtidor? Esfolei feras enquanto aprendia a arte, mas não sei como curti-las e elas fedem. Leve-os para longe daqui."
"This is our ticket to riches": "I'm cutting you in. You just need to do some legwork for us. First, I just need some food-grade wax. You do know you're way around a wax station, right? Great, great. Here's the recipe we need. Make us some of this.\\\"\": \"Sourgum em Statehelm disse: \\\"Eu conheço bastões. Se há uma coisa que sei, é isso. Isso e encontrar recursos preciosos. Mas principalmente gravetos, e percebi que se pudesse revestir a metade superior da minha bengala com um casaco grosso de doces, eu poderia lamber o bastão enquanto ando! ... é infantil, claro, mas seria vendido para os caminhantes diurnos de Statehelm! Qualquer truque chama a atenção."
"This is perfect! Those fairies will be back soon, but you've put them on the defensive. You're one of the worst kinds of pests: a powerful mortal interfering with fairy politics!

Of course, this means they'll be hunting for you. But I'm sure you'll be fine.

If you feel like killing some more of them, just let me know first!": "Isso é perfeito! Essas fadas voltarão em breve, mas você as colocou na defensiva. Você é um dos piores tipos de pragas: um mortal poderoso interferindo na política das fadas!

Claro, isso significa que eles estarão caçando você. Mas tenho certeza que você ficará bem.

Se você quiser matar mais alguns deles, me avise primeiro!"
"This is perhaps even better than my old storage system! Thank you for making this for me!": "Talvez seja ainda melhor do que meu antigo sistema de armazenamento! Obrigado por fazer isso para mim!"
"This is so frustrating! Where am I going to get aquamarine dye for General Tremal's gown? I checked with my supplier, but she sold all of it to a human named Charles Thompson, who used it all for research! And to make matters worse, this human left weeks ago on a ship bound to Serbule! If you ever find yourself in that backwoods town, maybe you can locate him and get the dye recipe.

I just need three doses of aquamarine dye. This shouldn't be hard!": "Isso é tão frustrante! Onde vou conseguir tinta água-marinha para o vestido do General Tremal? Verifiquei com minha fornecedora, mas ela vendeu tudo para um humano chamado Charles Thompson, que usou tudo para pesquisa! E para piorar a situação, este humano partiu há semanas num navio com destino a Serbule! Se você algum dia se encontrar naquela cidade do interior, talvez consiga localizá-lo e obter a receita da tintura.

Só preciso de três doses de corante água-marinha. Isso não deve ser difícil!"
"This is the book? It's older than I expected. Look, it's signed by the author! \"To Exelpan, the dirty elf with the brilliant mind.\" That's my former master's name. He sent me his signed copy! Great, now I have to make sure it doesn't get peed on by anybody so I can return it.

Anyway, now I have to read this book and see if it helps. Thanks for picking it up.": "Este é o livro? É mais velho do que eu esperava. Olha, está assinado pelo autor! \"Para Exelpan, o elfo sujo com uma mente brilhante.\" Esse é o nome do meu antigo mestre. Ele me enviou sua cópia assinada! Ótimo, agora tenho que garantir que ninguém faça xixi nele para poder devolvê-lo.

De qualquer forma, agora tenho que ler este livro e ver se ajuda. Obrigado por atender."
"This is the bread? It smells... like bread. But my sensory organs are perhaps not as attuned to bread smells. Thank you, friend. Here is money for your trouble.": "Este é o pão? Cheira... a pão. Mas os meus órgãos sensoriais talvez não estejam tão sintonizados com o cheiro do pão. Obrigado, amigo. Aqui está dinheiro para o seu problema."
"This is the cantaloupe wine? Cheers! You're a damned good alcoholer. And I should know! Here's a fruity recipe for you to try.": "Este é o vinho de melão? Saúde! Você é um bom alcoólatra. E eu deveria saber! Aqui está uma receita frutada para você experimentar."
"This is the cinnabar? Good. Here's your money. That's one task off the list... maybe I won't get in trouble after all!": "Este é o cinábrio? Bom. Aqui está o seu dinheiro. Essa é uma tarefa fora da lista... talvez eu não tenha problemas, afinal!"
"This is the fake meat? Hmm ... It's a bit bland. Doesn't really taste like turkey. Maybe chicken, though ...": "Esta é a carne falsa? Hmm... É um pouco sem graça. Realmente não tem gosto de peru. Talvez frango, no entanto..."
"This is the famous secret rice? Let me try it. Hmm... it's <i>slightly</i> lighter-weight than Rahu rice. I guess this will have to do for the wedding. Thanks! Oh, and here: I was going to make a cream sauce for my rice balls, but I think this secret rice will throw best ungarnished. Maybe these ingredients are useful to you?": "Este é o famoso arroz secreto? Deixe-me tentar. Hmm... é <i>ligeiramente</i> mais leve que o arroz Rahu. Acho que isso terá que servir para o casamento. Obrigado! Ah, e aqui: eu ia fazer um molho de creme para meus bolinhos de arroz, mas acho que esse arroz secreto vai ficar melhor sem guarnição. Talvez esses ingredientes sejam úteis para você?"
"This is the meat? It stinks of toxins! Mandibles feeds this to guests?! Interesting. Thank you for your kindness -- here, I have stashed some currency away for such an occasion.": "Esta é a carne? Cheira a toxinas! Mandibles dá isso aos convidados?! Interessante. Obrigado pela sua gentileza – aqui, guardei algum dinheiro para essa ocasião."
"This is the mulberry? Ah, yes. Lovely aroma. I'm sorry to report that it tastes like acid. But WOW it packs a punch! Good work.": "Esta é a amoreira? Ah, sim. Aroma adorável. Lamento informar que tem gosto de ácido. Mas WOW, é um soco! Bom trabalho."
"This is the powder! I admit to being nervous. What if it works so well that I never want to stop using it? I shall become addicted to it, and all my effort will crumble! Ah, but I'm sure I'm worrying too much. I just need to complete these work orders. And your gift will let me do so. Thank you so much.": "Este é o pó! Confesso que estou nervoso. E se funcionar tão bem que eu nunca mais queira parar de usá-lo? Ficarei viciado nisso e todo o meu esforço desmoronará! Ah, mas tenho certeza que estou me preocupando demais. Só preciso concluir essas ordens de serviço. E seu presente me permitirá fazer isso. Muito obrigado."
"This is the recipe? Wait, does it say the bacon TALKS? Um... No thank you. I'm extremely susceptible to negative thoughts right now, what with my home exploding. Why don't you keep it?

But I do appreciate the effort! Um, here: this is a recipe you might like.": "Esta é a receita? Espere, diz que o bacon FALA? Hum... Não, obrigado. Estou extremamente suscetível a pensamentos negativos agora, com minha casa explodindo. Por que você não fica com ele?

Mas agradeço o esforço! Hum, aqui: esta é uma receita que você pode gostar."
"This is the so-called ultra-lac? But this is just regular lac! Wait, I think we have a terminology problem. What you call 'regular lac' must be what we call 'worthless bug secretions'. Ah well. Thank you for helping me solve the mystery!": "Este é o chamado ultra-lac? Mas isso é apenas lac normal! Espere, acho que temos um problema de terminologia. O que você chama de 'lac regular' deve ser o que chamamos de 'secreções inúteis de insetos'. Ah, bem. Obrigado por me ajudar a resolver o mistério!"
"This is the stuff! Thank you! I'll use this for my famous gratflower tongba. That will take a while to prepare, though. In the mean time, try this! It's another of my specialties.": "Esta é a coisa! Obrigado! Vou usar isso para meu famoso tongba gratflower. No entanto, isso levará um tempo para ser preparado. Enquanto isso, tente isso! É outra das minhas especialidades."
"This is the stuff. Ugh, it stinks. Well, I'll get it to Mox. Thanks.": "Esta é a coisa. Ugh, isso fede. Bem, vou levar isso para Mox. Obrigado."
"This is what you found? Hmm. Well, it's definitely xedrite. <i>Mythander licks the rock.</i> But it's low-quality. Which means the goblins mining it are desperate and weak. It's unlikely we'll see a xedrite-rush from the goblands. So the news could be worse, but humans' Council should really take care of this goblin problem anyway.

What's xedrite? Oh, just a stupid goblin metal. Enough about that. Let me teach you the basics of riding a horse!": "Isto é o que você encontrou? Hum. Bem, é definitivamente xedrite. <i>Mythander lambe a pedra.</i> Mas é de baixa qualidade. O que significa que os goblins que o exploram estão desesperados e fracos. É improvável que vejamos uma corrida de xedrite dos goblands. Então as notícias poderiam ser piores, mas o Conselho dos Humanos deveria realmente cuidar desse problema dos goblins de qualquer maneira.

O que é xedrita? Oh, apenas um duende de metal estúpido. Chega disso. Deixe-me ensinar-lhe o básico sobre andar a cavalo!"
"This is wonderful! And I see you've left your crafter's mark on it. I am delighted!": "Isso é maravilhoso! E vejo que você deixou sua marca de artesão nele. Estou encantado!"
"This is your result? Well, it's chunkier than I would prefer... And perhaps a bit too warm. But I'll drink it.

...

Well, I can feel the heat in my innards, and I didn't die. So you pass.": "Este é o seu resultado? Bem, é mais grosso do que eu preferiria... E talvez um pouco quente demais. Mas eu vou beber.

...

Bem, posso sentir o calor em minhas entranhas e não morri. Então você passa."
"This is... good. Actually, this is a good piece of obsidian! I will reward you, as I said I would.

Here. In addtion to the coins, I have a ring that may fit you. For once I made rings, in the manner my mother taught me, long ago.": "Isso é... bom. Na verdade, este é um bom pedaço de obsidiana! Vou recompensá-lo, como disse que faria.

Aqui. Além das moedas, tenho um anel que pode servir em você. Pela primeira vez fiz anéis, do jeito que minha mãe me ensinou, há muito tempo."
"This isn't the color of rhino hide I expected. But... we'll see if we can make it work.": "Esta não é a cor da pele de rinoceronte que eu esperava. Mas... veremos se conseguimos fazer funcionar."
"This land is infested with problematic demons, and I cannot get close enough to the wall to achieve my goals. If you help me, I shall be very grateful.

The first thing I need is quite simple: just get a sample of every kind of gem or crystal that can be found when mining the crystals near the demons.": "Esta terra está infestada de demônios problemáticos e não consigo chegar perto o suficiente da muralha para atingir meus objetivos. Se você me ajudar, ficarei muito grato.

A primeira coisa que preciso é bem simples: basta pegar uma amostra de cada tipo de gema ou cristal que pode ser encontrado ao minerar os cristais perto dos demônios."
"This land is just <i>infested</i> with spriggan weeds! I think the pixies plant them or something. They spend the days gathering sun, but at night they hunt for meat! There's a bunch growing south of town, and if you think about it, it'd be really irresponsible for you to NOT kill those pests.": "Esta terra está <i>infestada</i> de ervas daninhas! Acho que os duendes os plantam ou algo assim. Eles passam os dias pegando sol, mas à noite caçam carne! Há um monte crescendo ao sul da cidade e, se você pensar bem, seria realmente irresponsável NÃO matar essas pragas."
"This looks quite comfortable. It should be perfect for my guest chair! And I can tell by your hands that you made this yourself. Thank you.": "Isto parece bastante confortável. Deve ser perfeito para minha cadeira de convidados! E posso dizer pelas suas mãos que você mesmo fez isso. Obrigado."
"This magical globe seems to be missing something. It responds to your touch, but doesn't seem to do anything useful. Perhaps if you had the missing parts.": "Este globo mágico parece estar faltando alguma coisa. Ele responde ao seu toque, mas não parece fazer nada de útil. Talvez se você tivesse as peças que faltam."
"This message spore is from Mu? I see.

He understands me well. Tell him that so long as I am alive, I will serve him. But I must keep up appearances with Tidal, or be torn apart!": "Este esporo de mensagem é de Mu? Eu vejo.

Ele me entende bem. Diga-lhe que enquanto eu estiver vivo, irei servi-lo. Mas devo manter as aparências com o Tidal ou serei despedaçado!"
"This ointment is ruined!

No, it's not your fault. The idiot thrall created this, and he didn't... listen when I said to pack the nightshade... separately.

Let this be a lesson - never take shortcuts in alchemy.

I suppose we shall have to create a new...
batch.": "Essa pomada está estragada!

Não, não é sua culpa. O escravo idiota criou isso, e ele não... ouviu quando eu disse para embalar a erva-moura... separadamente.

Que isto sirva de lição – nunca tome atalhos na alquimia.

Suponho que teremos que criar um novo...
lote."
"This one is just impossible... we need something yellow and fluffy for 'tinsel', some sort of human decoration. Where would we get tinsel in the desert?! Are we supposed to shave a few manticores and use their manes?!": "Este é simplesmente impossível... precisamos de algo amarelo e fofo para 'enfeite', algum tipo de decoração humana. Onde conseguiríamos enfeites no deserto?! Deveríamos raspar algumas manticoras e usar suas crinas?!"
"This one might be tricky. The Sand Seer insists this area of the desert has \"unusual isolated weather patterns\". What kind of patterns, you ask? Wind storms. Wind storms! Those are completely natural for the Ilmari! But she's an elf. They're supposed to be sensitive to nature, or whatever. Anyway I hired her for her expertise, so I'd be a fool to ignore her.

Here's the map. The Seer will brief you further. We've detected a lot of xedrite in this one, so do whatever it takes!": "Este pode ser complicado. O Sand Seer insiste que esta área do deserto tem “padrões climáticos isolados incomuns”. Que tipo de padrões, você pergunta? Tempestades de vento. Tempestades de vento! Isso é completamente natural para o Ilmari! Mas ela é uma elfa. Eles deveriam ser sensíveis à natureza, ou algo assim. De qualquer forma, eu a contratei por sua experiência, então seria um tolo se a ignorasse.

Aqui está o mapa. O Vidente irá informá-lo melhor. Detectamos muito xedrite neste aqui, então faça o que for preciso!"
"This one's even harder. I'm sorry! But if you can find some mandrake root, I'd be really appreciative!": "Este é ainda mais difícil. Desculpe! Mas se você conseguir encontrar alguma raiz de mandrágora, eu ficaria muito grato!"
"This one's for Lennel!": "Essa é para Lennel!"
"This one's hard. Ever heard of the Gazluk Plateau? Well, Trekker the pig is in the northeast-ish part of the mountains. You'll have to climb up from the valley into the mountains to find him. Bring warm clothes.": "Este é difícil. Já ouviu falar do Planalto Gazluk? Bem, o porco Trekker está na parte nordeste das montanhas. Você terá que subir do vale até as montanhas para encontrá-lo. Traga roupas quentes."
"This one's not too weird... But the quantity is crazy. I need four trophy cat hides.": "Este não é muito estranho... Mas a quantidade é uma loucura. Preciso de quatro peles de gato troféu."
"This one's quite simple: I need a bunch of fluxic quartz for some experiments. I don't care where you get it.": "Este é bem simples: preciso de um monte de quartzo fluxado para alguns experimentos. Eu não me importo onde você consegue isso."
"This one's weird and sad. I need \"idealized skins from a family of giant rats.\" I don't think the rats need to be related. Who will know?": "Este é estranho e triste. Preciso de \"peles idealizadas de uma família de ratos gigantes\". Não acho que os ratos precisem ser parentes. Quem saberá?"
"This orb is cracked! Wait. This is a fake! A cracked fake! How much did you pay for this?!

Oh. The bandits are dead? Well, I suppose that's what comes of bandits. No great loss, I can assure you! Here: I don't want you to become hostile, so let me reward you for your meager effort.": "Este orbe está rachado! Espere. Isso é uma farsa! Uma farsa rachada! Quanto você pagou por isso?!

Oh. Os bandidos estão mortos? Bem, suponho que é isso que acontece com os bandidos. Nenhuma grande perda, posso garantir! Aqui: não quero que você se torne hostil, então deixe-me recompensá-lo pelo seu escasso esforço."
"This order was dragon me down so I'm glad you got fired up and did it for me. I thought I was gonna have to scale it back. Here's your hoard.": "Esta ordem foi um dragão para mim, então estou feliz que você se empolgou e fez isso por mim. Achei que teria que reduzir. Aqui está o seu tesouro."
"THIS POTION? OKAY. OTIS LEARN SECRET. THEN OTIS SMASH POTION! TEACH USHUG NO CHEATING IN ARENA!": "ESTA POÇÃO? OK. OTIS APRENDE O SEGREDO. ENTÃO POÇÃO SMASH DE OTIS! ENSINE USHUG A NÃO TRAIR NA ARENA!"
"This puts me in a tailspin!

Get it?": "Isso me deixa em parafuso!

Pegue?"
"This reminds you of a playset that dwarven youth use when playing their \"tactical war games\". A large piece has been torn off.": "Isso lembra um playset que os jovens anões usam quando jogam seus “jogos de guerra táticos”. Um grande pedaço foi arrancado."
"This rennet stinks horrifically. I guess that's a compliment! You're amazing!": "Este coalho fede horrivelmente. Acho que isso é um elogio! Você é incrível!"
"This seems like a pretty straightforward one. Just get in, get my Xedrite, and get out without being buried in the sand.\": \"Vamos direto ao trabalho. O Sand Seer localizou uma nova entrada de esconderijo de guerra. Siga este mapa. Lembre-se": "a entrada não é estável. Você deve conseguir entrar e sair novamente, mas não espere poder voltar uma segunda vez! O buraco entrará em colapso rapidamente. Então você tem uma chance de conseguir meu Xedrite Armado!"
"This should do the trick! Thanks a bunch! I'll be heading back as soon as I finish this recipe. Oh, and before you go, take this. It may help you in the future.": "Isso deve funcionar! Muito obrigado! Voltarei assim que terminar esta receita. Ah, e antes de ir, pegue isso. Isso pode ajudá-lo no futuro."
"This smells delicious! Thank you so much, dear!": "Isso tem um cheiro delicioso! Muito obrigado, querido!"
"This so-called Crater Gar is a very odd fish. You aren't sure how to fillet it, but if you catch a few more you'll no doubt get the hang of it.": "Este chamado Crater Gar é um peixe muito estranho. Você não tem certeza de como fazer filetes, mas se pegar mais alguns, sem dúvida vai pegar o jeito."
"This so-called Pyrocarp is a very odd fish. You aren't sure how to fillet it, but if you catch a few more you'll no doubt get the hang of it.": "Este chamado Pyrocarp é um peixe muito estranho. Você não tem certeza de como fazer filetes, mas se pegar mais alguns, sem dúvida vai pegar o jeito."
"This will be a prank for the history books of this mortal realm. I'm gonna animate the skull and have it talk to her!\\\"\": \"Shiriqa em Statehelm disse": "\\\"Eu e Jenny Foster temos uma guerra de pegadinhas. Você sabe, a garçonete da cafeteria? Sim. Ela adora pegadinhas! Mas ela tem pavor de osslars. Osslars são algum tipo de demônio e aparentemente ela teve uma experiência assustadora com eles. Então você sabe o que isso significa!"
"This will do, this will do indeed! Haha! Here you are. I shall need more soon enough, don't go too far.": "Isso servirá, isso realmente servirá! Haha! Olha Você aqui. Precisarei de mais em breve, não vá muito longe."
"This will do. Thank you. Now go! Don't let Gorvessa see you giving it to me! I need her to think I crafted it for her. Here, just take some money and shut up about this!": "Isso servirá. Obrigado. Agora vá! Não deixe Gorvessa ver você me dando isso! Preciso que ela pense que criei isso para ela. Aqui, pegue algum dinheiro e cale a boca sobre isso!"
"This will fit my needs perfectly! And it's locally crafted! Perfect!": "Isso atenderá perfeitamente às minhas necessidades! E é feito localmente! Perfeito!"
"This will work! A little oregano, some salt ... Thanks!": "Isso vai funcionar! Um pouco de orégano, um pouco de sal... Obrigado!"
"This.. It's my lost hammer! You fucking stole it! I knew you were a crook the moment I laid eyes on you! All smug. No you ddn't craft it. Like YOU could craft this masterpiece! Give me that! ... Oh. No, this is a different hammer.

Hey, I'm sorry I called you a thief! Uh, thanks for the immaculate hammer! I owe you one.": "Este... é meu martelo perdido! Você roubou, porra! Eu sabia que você era um bandido no momento em que coloquei os olhos em você! Tudo presunçoso. Não, você não criou isso. Como se VOCÊ pudesse criar esta obra-prima! Dê-me isso! ... Oh. Não, este é um martelo diferente.

Ei, me desculpe por ter chamado você de ladrão! Uh, obrigado pelo martelo imaculado! Eu te devo uma."
"This... is far too oniony. The breading is nice, though. Why did they have to add onion?! It would have been perfect with some lemon instead. I am somewhat disappointed. But at least I have finally eaten this famous dish. Thank you.

Here, do you want this? I found it on a goblin that got too close to the river.": "Isso... é muito cebola. O empanado é bom, no entanto. Por que eles tiveram que adicionar cebola?! Teria sido perfeito com um pouco de limão. Estou um pouco decepcionado. Mas pelo menos finalmente comi este famoso prato. Obrigado.

Aqui, você quer isso? Encontrei-o em um goblin que chegou muito perto do rio."
"This... this is it? Fascinating... its full power is only unlockable if you're dead! Does that mean there's a connection between undeath and fire? Oh, I have so much to learn. This will be great! Thank you so much!

Here, take this. Velkort gave it to me once in a fit of passion. But I suspect you'll have more use for it than I ever will.": "Isso... é isso? Fascinante... seu poder total só pode ser desbloqueado se você estiver morto! Isso significa que há uma conexão entre mortos-vivos e fogo? Ah, tenho muito que aprender. Isso será ótimo! Muito obrigado!

Aqui, pegue isso. Velkort me deu uma vez num acesso de paixão. Mas suspeito que você terá mais utilidade nisso do que eu jamais terei."
"Those bears attack even stronger predators! They need to be shown their place. But I don't dare waver in my goal. You, however, might be able to waver a little bit? Just a tad? Make them suffer.": "Esses ursos atacam predadores ainda mais fortes! Eles precisam mostrar seu lugar. Mas não ouso vacilar em meu objetivo. Você, no entanto, pode vacilar um pouco? Só um pouquinho? Faça-os sofrer."
"Those blisters on your hands will help keep you down-to-earth, so your ideas don't get too far away from your abilities.": "Essas bolhas em suas mãos ajudarão a mantê-lo com os pés no chão, para que suas ideias não se afastem muito de suas habilidades."
"Those creepy red-eyed rats must be a source of their power. Destroy them! No mercy!": "Esses ratos assustadores de olhos vermelhos devem ser uma fonte de seu poder. Destrua-os! Sem piedade!"
"Those Deer Aren't Gonna Kill Themselves": "Esses cervos não vão se matar"
"Those goblins love artwork. I hate it! Bring me some of the lesser-valued pieces. I use them as floor coverings to keep my tanning chemicals from seeping into the groundwater.": "Esses goblins adoram obras de arte. Eu odeio isso! Traga-me algumas das peças de menor valor. Eu os uso como revestimento de piso para evitar que meus produtos químicos de bronzeamento penetrem nas águas subterrâneas."
"Those strange talking mantises out in the fields have weird runes on their claws. Someone drew those on them! Can you gather some specimens for me? I want to know more about them.": "Aqueles estranhos louva-a-deus falantes nos campos têm runas estranhas em suas garras. Alguém desenhou isso neles! Você pode reunir alguns espécimes para mim? Eu quero saber mais sobre eles."
"ThoseDeerArentGonnaKillThemselves": "Aqueles cervos não vão se matar"
"Three barrels? Sounds like Durstin's business is picking up! Finally, some good news!

Hold on to these hops. You need a ton of them for brewing.": "Três barris? Parece que o negócio de Durstin está melhorando! Finalmente, algumas boas notícias!

Segure esses lúpulos. Você precisa de uma tonelada deles para preparar cerveja."
"Three big nets, still reeking of swamp water! Yep, that's what I needed! Here: I wish I could offer more.": "Três grandes redes, ainda cheirando a água do pântano! Sim, era disso que eu precisava! Aqui: eu gostaria de poder oferecer mais."
"Three Bun-Fu Masters have come into the area to help train their fellow bunnies in the ways of the carrot. Visit Master Lopsy in the Serbule Keep garden, Master Flopsy outside of the Kur Mountains Inn and Master Boop outside of the New Prestonbule Cave in Gazluk to complete your training! You think you know Bun-Fu? Show me!

[<i> These quests require you to be in bunny form to advance. A free bunny transformation will be available at all quest NPCs. </i>]": "Três Mestres Bun-Fu vieram para a área para ajudar a treinar seus colegas coelhinhos no manejo da cenoura. Visite Master Lopsy no jardim Serbule Keep, Master Flopsy fora do Kur Mountains Inn e Master Boop fora da New Prestonbule Cave em Gazluk para completar seu treinamento! Você acha que conhece Bun-Fu? Mostre-me!

[<i> Essas missões exigem que você esteja na forma de coelho para avançar. Uma transformação de coelho gratuita estará disponível em todos os NPCs de missão. </i>]"
