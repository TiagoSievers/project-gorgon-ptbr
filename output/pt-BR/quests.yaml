"Larsan in Serbule asked you to deliver a special navel ring to Oritania, an elf in Eltibule Keep.": "Larsan em Serbule pediu que você entregasse um piercing de umbigo especial para Oritania, uma elfa da Fortaleza de Eltibule."
"Last night, a mysterious Elf came into my tent. He was wrapped head to toe in gauze and smelled like dirt -- it was terrifying! You never know what those sex-riddled maniacs will do. But he just dropped a strange thing on my bed and left, saying \"study this heartshroom and prepare for the invasion.\"

The so-called Heartshroom is actually an amazing type of mushroom that I've never seen before! It has incredible regenerative powers... this could make me rich! Err, make <i>us</i> rich. But I need more. Too bad I have no idea where they come from! If you find some, bring them to me?": "Ontem à noite, um Elfo misterioso entrou na minha tenda. Ele estava enrolado da cabeça aos pés em gaze e cheirava a terra – era assustador! Você nunca sabe o que esses maníacos cheios de sexo farão. Mas ele simplesmente deixou cair uma coisa estranha na minha cama e saiu, dizendo “estude este cogumelo e prepare-se para a invasão”.

O chamado Hearthroom é na verdade um tipo incrível de cogumelo que nunca vi antes! Tem poderes regenerativos incríveis... isso poderia me deixar rico! Err, torne-nos ricos. Mas eu preciso de mais. Pena que não tenho ideia de onde eles vêm! Se você encontrar alguns, traga-os para mim?"
"Last time I was banished from the Winter Court, I had the good sense to prepare first. But this time I was caught off-guard. I miss some of the silliest things, like the desserts served with military meals. If you wage battle with Winter Court Scouts, please search the fallen for candied ice beetles. I'll reward you!

It may be hard to find a scout that hasn't eaten all their beetles yet... I know! Look for especially thin scouts.": "Da última vez que fui banido da Corte Winter, tive o bom senso de me preparar primeiro. Mas desta vez fui pego de surpresa. Sinto falta de algumas das coisas mais bobas, como as sobremesas servidas nas refeições militares. Se você travar uma batalha com os Escoteiros da Corte Invernal, procure por besouros de gelo cristalizados nos caídos. Eu vou recompensar você!

Pode ser difícil encontrar um batedor que ainda não tenha comido todos os seus besouros... eu sei! Procure batedores especialmente magros."
"Last, and most troubling, there is supposedly a demon hidden down there, summoned by foolish mages. They call it a 'gargoyle'. They do not understand how powerful it is. Slay it before it can open a portal and invade this world!\\\"\": \"Lady Alethina no Red Wing Casino disse": "\\\"Ouvi histórias aterrorizantes de criaturas nas profundezas da Fortaleza Gazluk. Preciso que você investigue e corrija esses problemas antes que se tornem graves. Traga aliados! Você precisará caminhar profundamente no nível inferior da fortaleza."
"Lastly, say 'Ahh, this is the life'": "Por último, diga 'Ahh, esta é a vida'"
"Launch some fireworks at night": "Lance alguns fogos de artifício à noite"
"Laura said no again? That's on me: I thought you were more charismatic than you are. I'll wait a few months and try again, and this time I'll send along some walnut bread.

Now that her missus is dead there's no reason she can't come home. She's just inherited the Neth stubbornness. But walnut bread can fix a lot of problems.": "Laura disse não de novo? A culpa é minha: pensei que você fosse mais carismático do que é. Vou esperar alguns meses e tentar novamente, e desta vez mandarei um pouco de pão de nozes.

Agora que sua patroa está morta, não há razão para ela não poder voltar para casa. Ela acabou de herdar a teimosia Neth. Mas o pão de nozes pode resolver muitos problemas."
