<i>[Ela move algumas pedras soltas para o lado para revelar uma pilha de pergaminhos, pega alguns e os entrega para você. Alguns deles parecem úteis.]</i>"
"Hail citizen of Alharth!

We are looking for ambitious adventurers to join the ranks of the Civil Service! We are volunteers that go above and beyond to ensure our lands are a wonderful place to live! 

We are currently looking for recruits willing to help out with our periodic dungeon and cave clearing. If left unchecked, these places slowly overfill with critters and eventually spill out to bring chaos and mayhem on the people of Alharth!

Journey to these places and give them a good cleaning! It's not all for free either: we're willing to pay you for your troubles! We have installed tracking crystals in each of the areas to ensure you are showing up and doing the work. There are 2 of these crystals in each area. Once you have cleared the area, just use the crystal to check in and your work progress will be logged for payroll. After you have checked in to both crystals in that area, you will gain access to the reward cache located at the area entrance. Look through what's in there and pick out whatever looks interesting to you.

If you manage to complete all the tasks on the list, you may return to Serbule Keep and access the Grand Reward Cache located in a building across from the Inn for something much nicer! 

We currently require the following areas to be serviced: 
- The Serbule Crypt 
- Borghild 
- Eltibule Keep Goblin Dungeon 
- Kur Tower 
- Ilmari Labyrinth 
- Gazluk Keep  
- The Fungal Fortress 

Also, once you have completed The Serbule Crypt or Borghild, you will gain access to the Civil Service Travel Network, which will help you get the job done faster! 

If you choose to accept some or all of these tasks, thank you for your service and good hunting!": "Salve cidadão de Alharth!

Procuramos aventureiros ambiciosos para se juntarem à Função Pública! Somos voluntários que vão além para garantir que nossas terras sejam um lugar maravilhoso para se viver! 

No momento, estamos procurando recrutas dispostos a ajudar com nossa limpeza periódica de masmorras e cavernas. Se não forem controlados, esses lugares lentamente se enchem de criaturas e eventualmente se espalham, trazendo caos e desordem ao povo de Alharth!

Viaje até esses lugares e faça uma boa limpeza neles! Nem tudo é de graça: estamos dispostos a pagar pelos seus problemas! Instalamos cristais de rastreamento em cada uma das áreas para garantir que você esteja presente e fazendo o trabalho. Existem 2 desses cristais em cada área. Depois de limpar a área, basta usar o cristal para fazer o check-in e o andamento do seu trabalho será registrado na folha de pagamento. Depois de fazer check-in em ambos os cristais naquela área, você terá acesso ao cache de recompensas localizado na entrada da área. Veja o que está lá e escolha o que parece interessante para você.

Se você conseguir completar todas as tarefas da lista, você pode retornar ao Serbule Keep e acessar o Grand Reward Cache localizado em um prédio em frente à pousada para algo muito melhor! 

Atualmente necessitamos que as seguintes áreas sejam atendidas: 
- A Cripta de Sérbulo 
-Borghild 
- Calabouço Eltibule Keep Goblin 
- Torre Kur 
- Labirinto Ilmari 
- Fortaleza Gazluk  
- A Fortaleza Fúngica 

Além disso, depois de concluir The Serbule Crypt ou Borghild, você terá acesso à Civil Service Travel Network, que o ajudará a realizar o trabalho com mais rapidez! 

Se você optar por aceitar algumas ou todas essas tarefas, obrigado pelo seu serviço e boa caçada!"
