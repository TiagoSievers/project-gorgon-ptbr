"Been drawing up new tailoring plans. Gotta keep my mind off the Shadow Keepers! But it's a bitch to draw anything in this frozen hellhole. What I wouldn't do for a nice calligraphy bench!": "Tenho elaborado novos planos de alfaiataria. Tenho que manter minha mente longe dos Guardiões das Sombras! Mas é uma merda desenhar qualquer coisa neste inferno congelado. O que eu não faria por um belo banco de caligrafia!"
"Been thinking about the portal those green bears use to get back into our world. I'm gonna try blowin' it up! I know an old recipe for explosions... just need a bunch of saltpeter.": "Tenho pensado no portal que aqueles ursos verdes usam para voltar ao nosso mundo. Vou tentar explodir! Conheço uma receita antiga para explosões... só preciso de um monte de salitre."
"Been working on a new tailoring technique where I inlay the cloth with silver. But I ain't got no silver left. Get me some?": "Estou trabalhando em uma nova técnica de alfaiataria onde incruso o tecido com prata. Mas não tenho mais prata. Traga-me um pouco?"
