"My alchemist contact in Statehelm insists there are no commonalities in the poisons that Korbok had you retrieve. Mr. Farblood himself even took a look, to no avail. There must be something deeper going on here.

Take this journal, and keep as detailed notes in it as you can. Get in close with Korbok, see if there's any more poison-related missions he can send you on, and just try to gather more info in general. While I do find him and his kind fascinating, I cannot let that get in the way of my primary assignment.": "Meu contato alquimista em Statehelm insiste que não há semelhanças nos venenos que Korbok fez você recuperar. O próprio Sr. Farblood até deu uma olhada, sem sucesso. Deve haver algo mais profundo acontecendo aqui.

Pegue este diário e faça anotações tão detalhadas quanto possível. Aproxime-se de Korbok, veja se há mais missões relacionadas a veneno para as quais ele possa enviá-lo e tente coletar mais informações em geral. Embora eu ache ele e sua espécie fascinantes, não posso permitir que isso atrapalhe minha tarefa principal."
"My Archery Nemesis": "Meu inimigo do tiro com arco"
"My beer order? Oh, Brianna sent you. Hmm... Let me check.

I need a cheap lager for the regulars, a brown ale for Mr. Song-and-Dance Elf over there, and let me get a keg of goblin ale. Just in case it comes in handy.": "Meu pedido de cerveja? Ah, Brianna enviou você. Hmm... Deixe-me verificar.

Preciso de uma cerveja barata para os clientes habituais, uma cerveja marrom para o Sr. Elfo Cantante e Dançante ali, e deixe-me pegar um barril de cerveja goblin. Apenas no caso de ser útil."
"My bitchy old friend Gretchen taught me a special brewing recipe. I'm eager to try it, but it needs potatoes. I hate growing potatoes! You do it.": "Minha velha amiga mal-intencionada Gretchen me ensinou uma receita especial de cerveja. Estou ansioso para experimentar, mas precisa de batatas. Eu odeio cultivar batatas! Você faz isso."
"My brother is a gru-maghi in one of the aboveground houses. You know, up above, where the best-connected orc leaders live? Anyway, my brother and I each smuggled in a pemphredo eye so we could talk to each other at night. But mine was taken as contraband almost as soon as I arrived, and I haven't been able to find another anywhere in Gazluk. Can you find me another one from outside? I miss my brother...": "Meu irmão é gru-maghi em uma das casas acima do solo. Você sabe, lá em cima, onde vivem os líderes orcs mais bem conectados? De qualquer forma, meu irmão e eu contrabandeamos um olho de pefredo para que pudéssemos conversar à noite. Mas o meu foi considerado contrabando assim que cheguei e não consegui encontrar outro em lugar nenhum de Gazluk. Você pode me encontrar outro de fora? Sinto falta do meu irmão..."
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Animals. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos animais infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Behemoths. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Behemoths infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Justiciars. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Juízes infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Lesser Behemoths. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Behemoths Menores infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Overseers. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Supervisores infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Scouts. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Escoteiros infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Soldiers. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos soldados infernais. Você pode me ajudar?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Swarmers. Can you help me out?": "Minha pesquisa atual sobre a ameaça demoníaca está estagnada. Para continuar, preciso realizar algumas amostragens biológicas dos Swarmers infernais. Você pode me ajudar?"
"My dad gave me this buckle. I don't wear it, 'cuz it'd get scuffed up. But it's the only thing the deadbeat gave me before he died. So thanks. I mean it.": "Meu pai me deu essa fivela. Eu não uso, porque ficaria arranhado. Mas foi a única coisa que o caloteiro me deu antes de morrer. Então, obrigado. Quero dizer."
"My dark ritual requires a large number of fae rhino horns. Just go out and get some for me.": "Meu ritual sombrio requer um grande número de chifres de rinoceronte fae. Basta sair e pegar um pouco para mim."
"MY EGGS! THEY'RE EATING THEM! Starfish are eating my eggs. What are you doing, save them! Stop this madness!": "MEUS OVOS! ELES ESTÃO COMENDO-OS! As estrelas do mar estão comendo meus ovos. O que você está fazendo, salve-os! Pare com essa loucura!"
"My entire pumpkin patch is infested with evil monsters! I've never seen anything like 'em! Luckily I'd already harvested half the pumpkins, but the remaining ones are rotted inside. Even the seeds inside them are bad!

And now I'm worried they're gonna wander off and hurt somebody that can't take care of themselves, like the Duchess. Tell you what: kill 'em off and I'll give you some of my earlier pumpkin harvest.": "Todo o meu canteiro de abóboras está infestado de monstros malignos! Nunca vi nada parecido com eles! Felizmente já tinha colhido metade das abóboras, mas as restantes estão podres por dentro. Até as sementes dentro deles são ruins!

E agora estou preocupado que eles vão se afastar e machucar alguém que não consegue cuidar de si mesmo, como a Duquesa. Vou te dizer uma coisa: mate-os e eu lhe darei um pouco da minha colheita anterior de abóbora."
"My experiments have proven fruitless. Landri's idea seems more compelling. But sadly I don't have any electricity power sources. Can you get me some? Fulgurite will do. Just look for creatures that inherently give off lightning. ... Admittedly there are probably none of those in Kur, but, well, if you end up travelling elsewhere... keep it in mind.": "Minhas experiências se mostraram infrutíferas. A ideia de Landri parece mais convincente. Mas infelizmente não tenho nenhuma fonte de energia elétrica. Você pode me pegar um pouco? Fulgurite servirá. Basta procurar criaturas que emitem raios inerentemente. ... É certo que provavelmente não há nenhum desses em Kur, mas, bem, se você acabar viajando para outro lugar... tenha isso em mente."
"My experiments require fresh hematic ichor. It can be hard to find, but just keep drinking people and... you'll find it eventually. Grasuul will know the best places to look today.": "Meus experimentos requerem icor hemático fresco. Pode ser difícil de encontrar, mas continue bebendo e... você acabará descobrindo. Grasuul conhecerá os melhores lugares para procurar hoje."
"My Fool of a Husband": "Meu marido tolo"
"My friend Irkima has told me a fanciful tale! There are insects on this continent that secrete lac that is so strong that it has different properties. Irkima called it 'ultra-lac', but of course I'm certain that sages in this land have a more appropriate name for it. I must see this substance! Can you procure some?": "Meu amigo Irkima me contou uma história fantástica! Existem insetos neste continente que secretam um laca tão forte que tem propriedades diferentes. Irkima o chamou de “ultra-lac”, mas é claro que tenho certeza de que os sábios desta terra têm um nome mais apropriado para isso. Eu preciso ver essa substância! Você pode adquirir alguns?"
"My friend Kelim in Amulna says he's got some spices that might help this fake meat taste more like turkey. I think he's trying a little too hard to sell me on them, you know? But it might work.

Go see if he'll give you some harvest spices.": "Meu amigo Kelim, de Amulna, diz que tem alguns temperos que podem ajudar essa carne falsa a ficar mais parecida com peru. Acho que ele está se esforçando demais para me convencer deles, sabe? Mas pode funcionar.

Vá ver se ele lhe dá alguns temperos da colheita."
"My friend Lisi in Sun Vale is very good at making images. Of course now she needs to use paper, but it's still not bad. She's holding a, uh... a book for me. Like an an art book, you know? With sketches of ... nature. Look, nevermind. Just go to Sun Vale and bring me back that book!": "Minha amiga Lisi, de Sun Vale, é muito boa em fazer imagens. Claro que agora ela precisa usar papel, mas ainda assim não está ruim. Ela está segurando um, uh... um livro para mim. Como um livro de arte, sabe? Com esboços de... natureza. Olha, deixa pra lá. Vá até Sun Vale e me traga aquele livro!"
"My friend Sie Antry and I share the duty of keeping the monster population thinned out. But recently I feel that Sie's been shirking her duties. Perhaps she's overwhelmed. Can you visit her and see?": "Minha amiga Sie Antry e eu compartilhamos o dever de manter a população de monstros reduzida. Mas recentemente sinto que Sie tem se esquivado de seus deveres. Talvez ela esteja sobrecarregada. Você pode visitá-la e ver?"
"My friend, I must reveal something. I am smitten by Anaberyl! At first I told myself that I was simply looking out for an incredible musician who was in a bad spot. But I haven't ever felt this way before about anyone! She's so... Perfect.

I need you to feel her out for me. I can't do it because she'll feel obligated toward me! That would break my heart -- I don't want to pressure her at all. So just ask if she'd ever be interested in dating a human, if the human was an incredible musician like her.": "Meu amigo, devo revelar uma coisa. Estou apaixonado por Anaberyl! No começo eu disse a mim mesmo que estava simplesmente procurando por um músico incrível que estava em uma situação ruim. Mas nunca me senti assim antes por ninguém! Ela é tão... perfeita.

Preciso que você a sinta por mim. Não posso fazer isso porque ela se sentirá obrigada a mim! Isso partiria meu coração – não quero pressioná-la de forma alguma. Então pergunte se ela algum dia estaria interessada em namorar um humano, se o humano fosse um músico incrível como ela."
"My goat Fiddler just loves juniper berries. They taste awful ta me but goats will be goats! They don't seem ta grow around here though. Seen any?": "Minha cabra Fiddler adora bagas de zimbro. Eles têm um gosto horrível para mim, mas cabras serão cabras! Eles não parecem crescer por aqui. Viu algum?"
"My hobby is... let's call it Urban Expression. It's a legitimate art form and an important one, especially here in Statehelm. Let's just jump right in, shall we? Take your dye and head to the barracks area. The walls all around there are good spots for your art. Pick a place and make your mark!

<i>[ Place the Graffiti ability on your sidebar. If you are in a valid graffiti area (and have dye on hand) the ability will stop being grayed out. There are graffiti spots all over, though they are a little denser near the barracks/jail area.]</i>": "Meu hobby é... vamos chamá-lo de Expressão Urbana. É uma forma de arte legítima e importante, especialmente aqui em Statehelm. Vamos começar imediatamente, certo? Pegue sua tintura e vá para a área do quartel. As paredes ao redor são bons locais para sua arte. Escolha um lugar e deixe sua marca!

<i>[Coloque a habilidade Graffiti na barra lateral. Se você estiver em uma área de graffiti válida (e tiver tinta em mãos), a habilidade deixará de ficar esmaecida. Há pontos de graffiti por toda parte, embora sejam um pouco mais densos perto da área do quartel/prisão.]</i>"
"My horn hurts! It burns with righteousness! I need a new horn, a horn of dark! Fetch it fresh from the most despicable pixie you can. Go!": "Meu chifre dói! Arde com justiça! Preciso de um novo chifre, um chifre escuro! Pegue-o fresco da duende mais desprezível que puder. Ir!"
"My main food is potatoes. I use other foods when I can get 'em, but potatoes are what get me through the long winters. Anyway, I fucking hate potatoes! At the very least, it'd be nice to have some sour cream, you know?": "Minha comida principal é batata. Eu uso outros alimentos quando posso, mas são as batatas que me ajudam durante os longos invernos. De qualquer forma, eu odeio batatas! No mínimo, seria bom tomar um pouco de creme de leite, sabe?"
"My master left me with a long list of tasks, and we've fallen behind. I'd love your help! This one's tricky: I need samples of a mineral that grows in the caves around here. It's called cinnabar, and it's pretty hard to mine. But if you can get some, I'll pay you ... let's see... ten thousand Councils.": "Meu mestre me deixou com uma longa lista de tarefas e ficamos para trás. Eu adoraria sua ajuda! Esta é complicada: preciso de amostras de um mineral que cresce nas cavernas por aqui. Chama-se cinábrio e é muito difícil de extrair. Mas se você conseguir algum, eu te pagarei... vamos ver... dez mil Conselhos."
"My mate is not doing well since the invasion. She used to make jewelry, and I'm hoping I can convince her to take up the trade again. It will make her happier. I just need some cinnabar!": "Meu companheiro não está bem desde a invasão. Ela costumava fazer joias e espero poder convencê-la a retomar o comércio. Isso a deixará mais feliz. Eu só preciso de um pouco de cinábrio!"
"My mate Tryaka used to love cantaloupe for breakfast. But we can't get it here anymore. Sigh...": "Meu amigo Tryaka adorava melão no café da manhã. Mas não podemos mais obtê-lo aqui. Suspirar..."
"My mind is... Fuzzy. I need to realign it. Yes! I know what to do.

You should find a Tuvillic Rune in Povus, beneath a giant mushroom. Touch the rune and retrieve the Mnemonix Index. When you enter the caves, turn left and you should see it.": "Minha mente está... confusa. Eu preciso realinhá-lo. Sim! Eu sei o que fazer.

Você deverá encontrar uma Runa Tuvillic em Povus, abaixo de um cogumelo gigante. Toque na runa e recupere o Índice Mnemonix. Ao entrar nas cavernas, vire à esquerda e você deverá avistá-la."
"My mother always said, \"If you trip an explosive runestone in the morning, nothing worse will happen to you all day.\" And she was right! Go ahead and try it -- you'll see what I mean.": "Minha mãe sempre dizia: “Se você tropeçar em uma pedra rúnica explosiva pela manhã, nada pior acontecerá com você o dia todo”. E ela estava certa! Vá em frente e experimente - você verá o que quero dizer."
"My mouth is watering in anticipation. Try making some of that citrus wine!": "Minha boca está salivando em antecipação. Experimente fazer um pouco daquele vinho cítrico!"
"My new ally, the human Arif, has given me two excellent leads on where to find the sphere. I know you have questions about this sphere, but I dare not speak of it. Simply find it and return it to me!

It should be quite simple to find. Arif says that he discovered a tunnel underneath a giant stone hand. Inside were letters and notes, which he left untouched. In a box, he said there was a magical crystal.

Go! I shall reward you for it!": "Meu novo aliado, o humano Arif, me deu duas excelentes pistas sobre onde encontrar a esfera. Sei que você tem dúvidas sobre esta esfera, mas não me atrevo a falar sobre isso. Basta encontrá-lo e devolvê-lo para mim!

Deve ser bem simples de encontrar. Arif diz que descobriu um túnel debaixo de uma mão gigante de pedra. Dentro havia cartas e bilhetes, que ele deixou intactos. Numa caixa, ele disse que havia um cristal mágico.

Ir! Eu vou recompensá-lo por isso!"
"My new hammer must have a handle of impeccable quality. Spruce is, of course, the ideal wood for gripping, but its strength is substandard... except for very occasional pieces of spruce. I need those perfect specimens of spruce wood!": "Meu novo martelo deve ter um cabo de qualidade impecável. O abeto é, obviamente, a madeira ideal para agarrar, mas a sua resistência é inferior... exceto para peças muito ocasionais de abeto. Preciso daqueles exemplares perfeitos de madeira de abeto!"
"My next class will cover natural percussive sounds. I just need a bit of help with the props!": "Minha próxima aula abordará sons percussivos naturais. Só preciso de uma ajuda com os adereços!"
"My next lecture will cover bardic surgery techniques. For my demonstration I need some supplies. Can you fetch them for me? Very good. Goodbye.\\\"\": \"Leon Dasterre em Statehelm disse": "\\\"Ah, então você já é um estudante avançado! Meu Deus, o tempo voa. Parece que foi ontem que você se matriculou."
"My notes! You found them! This is wonderful news.

Ah, it looks like one of the other engineers picked up where I left off, which is what I feared. I hope they didn't- hm, wait a minute. Oh, they swapped the gear ratios, and moved the crystal to there.. that just might work!": "Minhas notas! Você os encontrou! Esta é uma notícia maravilhosa.

Ah, parece que um dos outros engenheiros continuou de onde parei, e era isso que eu temia. Espero que não... hm, espere um minuto. Ah, eles trocaram as relações de transmissão e moveram o cristal para lá... isso pode funcionar!"
"My people are not imaginative with their cooking. We pickle fish. That is what we do. But I yearn for more. I yearn for the delicacy known as Breaded Perch... With Onions. I crave it!": "Meu povo não é imaginativo com sua culinária. Nós marinamos peixe. Isso é o que fazemos. Mas anseio por mais. Anseio pela iguaria conhecida como Perca Empanada... Com Cebola. Eu anseio por isso!"
"My research has hit a stumbling block. I need a specific item: the pulsing lobe of a Brain Bug. If only I had time to go out into the wilderness and search for them...": "Minha pesquisa atingiu um obstáculo. Preciso de um item específico: o lóbulo pulsante de um Brain Bug. Se ao menos eu tivesse tempo de sair para o deserto e procurá-los..."
"My Sausage Swirlers are a hit with many varieties of mammalian guests. However, I believe I could improve on their flavor if they were made of bear meat -- or a similar beast -- instead of goblin meat. Would you procure some for me?": "My Sausage Swirlers são um sucesso entre muitas variedades de convidados mamíferos. No entanto, acredito que poderia melhorar seu sabor se fossem feitos de carne de urso - ou de um animal semelhante - em vez de carne de duende. Você poderia comprar alguns para mim?"
"My scrying has shown me the locations of an invasive species of oyster. Please destroy them. Their contents are irrelevant to me, as long as the oysters are killed! Here are my notes on their locations; if you have some skill in objective orienteering I'm sure you'll find them easily enough. You know how to pry oysters open, I hope?": "Minha vidência me mostrou a localização de uma espécie invasora de ostra. Por favor, destrua-os. O seu conteúdo é irrelevante para mim, desde que as ostras sejam mortas! Aqui estão minhas anotações sobre suas localizações; se você tem alguma habilidade em orientação objetiva, tenho certeza que os encontrará com bastante facilidade. Você sabe como abrir ostras, espero?"
"My second-favorite sword needs to be repaired. I've searched the countryside near the casino and found nothing appropriate. I need metal of expert quality! I've seen armor made of amazing metal, so I know it must exist somewhere in this land...": "Minha segunda espada favorita precisa ser consertada. Procurei na zona rural perto do cassino e não encontrei nada apropriado. Preciso de metal de qualidade especializada! Já vi armaduras feitas de metal incrível, então sei que deve existir em algum lugar desta terra..."
"My shipment of feathers didn't come in. <i>Again.</i> I wonder what's up? Anyway, can you collect some? There's a few chickens in town, but you can also find them in giant spiders' stomachs. They eat lots of birds! And there's lots of giant spiders in the cemetery crypt...": "Minha remessa de penas não chegou. <i>De novo.</i> Eu me pergunto o que aconteceu? De qualquer forma, você pode coletar alguns? Há algumas galinhas na cidade, mas você também pode encontrá-las nos estômagos de aranhas gigantes. Eles comem muitos pássaros! E há muitas aranhas gigantes na cripta do cemitério..."
"My special art requires a very uncommon ingredient. In fact, it is so rare that I have never obtained it directly myself; I have only ever received it from others. Can you fulfill this role now? I require ectoplasm. It is the give-off of ghosts, banshees, wailing spirits, and other incorporeal former-meatlings.": "Minha arte especial requer um ingrediente muito incomum. Na verdade, é tão raro que nunca o obtive diretamente; Eu só recebi isso de outras pessoas. Você pode cumprir esse papel agora? Eu preciso de ectoplasma. É a libertação de fantasmas, banshees, espíritos lamentosos e outros ex-meatlings incorpóreos."
"My specialty is cat-meat recipes. A lot of visitors expect the meat to be disgusting, but with the right seasoning, it's quite good! And plentiful, too ... or at least it usually is. Right now I seem to be running low. If you have nothing better to do, maybe you could hunt and butcher up some grimalkin meat for me?": "Minha especialidade são receitas de carne de gato. Muitos visitantes esperam que a carne seja nojenta, mas com o tempero certo fica muito boa! E abundante também... ou pelo menos geralmente é. No momento, parece que estou ficando sem dinheiro. Se você não tem nada melhor para fazer, talvez você possa caçar e abater um pouco de carne de Grimalkin para mim?"
"My stash of cooking herbs wasn't found by the orc invaders! But sadly I am now out of basil, and I need that for many of the meals I prepare. I can tell Tryaka is less happy with my cooking, but what can I do?!": "Meu estoque de ervas para cozinhar não foi encontrado pelos invasores orcs! Mas, infelizmente, agora estou sem manjericão e preciso dele para muitas das refeições que preparo. Posso dizer que Tryaka está menos feliz com minha comida, mas o que posso fazer?!"
"My teeth are getting kind of loose. I must have been on that ship a long time! I think I'm getting scurvy! You gotta help me. I need oranges! That bartender guy says there's no oranges anywhere in Serbule Hills. But you're pretty savvy, right? Could you get me some imported oranges? Hell, I'll settle for lemons. Anything citrus!": "Meus dentes estão ficando meio soltos. Devo estar naquele navio há muito tempo! Acho que estou pegando escorbuto! Você tem que me ajudar. Eu preciso de laranjas! Aquele barman disse que não há laranjas em Serbule Hills. Mas você é muito experiente, certo? Você poderia me trazer algumas laranjas importadas? Inferno, eu vou me contentar com limões. Qualquer coisa cítrica!"
"My tools are only as good as the materials they're made of. This metal is \"good\", but it's not great. I need masterwork metal! Do you know any miners who might have some?": "Minhas ferramentas são tão boas quanto os materiais de que são feitas. Este metal é “bom”, mas não é ótimo. Eu preciso de metal magistral! Você conhece algum mineiro que possa ter algum?"
"My uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!\\\"\": \"Stephie Blackhammer em Povus disse": "\\\"É meu trabalho manter o tio Tremmond trabalhando em sua capacidade máxima, e ele está quase sem <b>excelentes placas de metal</b>. Você pode extrair algumas para mim?"
"My uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\\\"\": \"Stephie Blackhammer em Povus disse": "\\\"É meu trabalho manter o tio Tremmond trabalhando em sua capacidade máxima, e ele está quase sem <b>martelos</b>. Você pode fazer alguns para mim?"
"My wife Ariadne works at one of the vendor stalls. The hours are terrible and the pay is awful and I feel bad for her. I want to visit and drop of her favorite lunch, Broccoli Squash Bake. But I can't cook. This makes me sad.": "Minha esposa Ariadne trabalha em uma das barracas de vendedores. As horas são terríveis e o salário é horrível e me sinto mal por ela. Quero visitá-la e entregar seu almoço favorito, Broccoli Squash Bake. Mas não sei cozinhar. Isso me deixa triste."
"My wife's diary says one of the chapters is hidden at her favorite reading spot. I guess that'd be the old watchtower overlooking the Serbule Hunting Lodge. Not a very safe reading spot these days! It's on a hill. Go past the lodge and climb the hills a little south of it.": "O diário da minha esposa diz que um dos capítulos está escondido no seu local de leitura favorito. Acho que seria a antiga torre de vigia com vista para o Serbule Hunting Lodge. Não é um local de leitura muito seguro hoje em dia! Está em uma colina. Passe pelo alojamento e suba as colinas um pouco ao sul dele."
"My... studies... require icebreeze moth wings. They are one of the only insects immune to cold, and so they are quite common back home. I'm sure plenty have flown through the portal to this land; look for areas where the Winter Court has taken control.": "Meus... estudos... exigem asas de mariposa brisa gelada. Eles são um dos únicos insetos imunes ao frio e, por isso, são bastante comuns em casa. Tenho certeza de que muitos voaram através do portal para esta terra; procure áreas onde a Corte Winter assumiu o controle."
