"Great initiative. I'll check it out personally later. Keep at it: it's the only way to break the people out of their urban prison of the mind.": "Ótima iniciativa. Vou verificar pessoalmente mais tarde. Continue assim: é a única maneira de libertar as pessoas da prisão mental urbana."
"Great job with the sewers, but right now we have another problem. Graffiti is getting out of control. If anyone on the Council notices, they'll take drastic, horrific, actions, like, I dunno, making the walls sentient so that they become easily enraged. Or perhaps making the town walls out of pure unlife. Whatever it is, it'll be much worse than what we have, which just requires a bit of good old fashioned hard work. By you.

I can sell you the necessary graffiti cleaner. Don't worry, it's reimbursed by the payment for the job! I can sell you a bucket if you need one. Fill it with water, find graffiti, and scrub!

<i>[To remove graffiti, place the Scrub Graffiti ability on your sidebar. Obtain Graffiti Cleaner. Then stand near graffiti and use the ability.]</i>": "Ótimo trabalho com os esgotos, mas agora temos outro problema. O graffiti está ficando fora de controle. Se alguém no Conselho perceber, tomará ações drásticas e horríveis, como, não sei, tornar as paredes sencientes para que fiquem facilmente enfurecidos. Ou talvez construir as muralhas da cidade com pura não-vida. Seja o que for, será muito pior do que o que temos, o que requer apenas um pouco de trabalho duro e à moda antiga. Por você.

Posso lhe vender o limpador de graffiti necessário. Não se preocupe, é reembolsado pelo pagamento do trabalho! Posso lhe vender um balde se precisar. Encha-o com água, encontre grafites e esfregue!

<i>[Para remover graffiti, coloque a habilidade Scrub Graffiti na barra lateral. Obtenha o Limpador de Graffiti. Então fique perto do graffiti e use a habilidade.]</i>"
