Susurrus: noun: a soft whispering or rustling sound.

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'sussurrus' em sua próxima conversa.

