"Grim Jim in Statehelm said, \"Another creepy beast request: I need the hide of a 'droach' as well as some scales. I guess... I guess the hide doesn't normally have scales on it? I'm no monsterologist. I hope you can figure this one out.\"": "Grim Jim em Statehelm disse: \"Outro pedido de fera assustadora: preciso da pele de uma 'droach', bem como de algumas escamas. Eu acho... acho que a pele normalmente não tem escamas? Não sou monsterologista. Espero que você consiga descobrir isso.\""
"Grim Jim in Statehelm said, \"Here's another hide request: \"the finest rabbit skin you can find. No damage.\" I have some rabbit skins, but they all have damage.\"": "Grim Jim, em Statehelm, disse: \"Aqui está outro pedido de ocultação:\" a melhor pele de coelho que você puder encontrar. Nenhum dano.\" Tenho algumas peles de coelho, mas todas estão danificadas.\""
"Grim Jim in Statehelm said, \"I don't even know what this one is. A kuvou? I guess that's like a bison? Anyway, I need a perfect hide from one.\"": "Grim Jim em Statehelm disse: \"Eu nem sei o que é este. Um kuvou? Acho que é como um bisão? De qualquer forma, preciso de uma pele perfeita para um.\""
"Grim Jim in Statehelm said, \"I have another hard request. This one is for a shark skin. Can't make this up. I'm supposed to just have a shark skin lying around, right? Ugh. Customers. But hey, see what you can do.\"": "Grim Jim em Statehelm disse: \"Tenho outro pedido difícil. Este é para uma pele de tubarão. Não posso inventar isso. Eu deveria ter apenas uma pele de tubarão por aí, certo? Ugh. Clientes. Mas ei, veja o que você pode fazer.\""
"Grim Jim in Statehelm said, \"I hope you're ready for a hard one. I need the perfect skin of a three-headed demon dog! You heard that right.

The pay's pretty good, though. Don't die.\"": "Grim Jim em Statehelm disse: “Espero que você esteja pronto para uma tarefa difícil. Preciso da pele perfeita de um cão demônio de três cabeças!

O salário é muito bom, no entanto. Não morra.\""
"Grim Jim in Statehelm said, \"Next I need perfect snake skins. That's a lot less weird of a request than usual. I sometimes even have these in stock! But not right now.\"": "Grim Jim, em Statehelm, disse: \"Em seguida, preciso de peles de cobra perfeitas. Esse é um pedido muito menos estranho do que o normal. Às vezes, até as tenho em estoque! Mas não agora.\""
"Grim Jim in Statehelm said, \"Now we're starting to get repeat business! The same man who needed a goat skin now needs a hippo skin. Heh! Good luck with that one.\"": "Grim Jim, em Statehelm, disse: \"Agora estamos começando a repetir negócios! O mesmo homem que precisava de uma pele de cabra agora precisa de uma pele de hipopótamo. Heh! Boa sorte com essa.\""
"Grim Jim in Statehelm said, \"This one's not too weird... But the quantity is crazy. I need four trophy cat hides.\"": "Grim Jim, em Statehelm, disse: \"Este não é muito estranho... Mas a quantidade é uma loucura. Preciso de quatro peles de gato troféu.\""
"Grim Jim in Statehelm said, \"This one's weird and sad. I need \"idealized skins from a family of giant rats.\" I don't think the rats need to be related. Who will know?\"": "Grim Jim em Statehelm disse: \"Este é estranho e triste. Preciso de\" peles idealizadas de uma família de ratos gigantes \". Não acho que os ratos precisem ser parentes. Quem saberá?\""
"Grim Jim in Statehelm said, \"You want to help? Me?! Well... I had a request for a pristine goat hide. If you can help me find one, I'll give you half the payment.\"": "Grim Jim, em Statehelm, disse: \"Você quer ajudar? Eu?! Bem... eu recebi um pedido de uma pele de cabra imaculada. Se você puder me ajudar a encontrar uma, eu lhe darei metade do pagamento.\""
