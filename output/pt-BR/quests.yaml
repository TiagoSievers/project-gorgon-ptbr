"Ratkin love to gamble, of course, but each region's ratkin have different methods. The ones around here seem to enjoy dice games. I need samples of their dice!

I suppose any ratkin could be carrying some dice, but off-duty ratkin are most likely to have 'em.": "Os Ratkin adoram jogar, é claro, mas os ratkin de cada região têm métodos diferentes. Os que estão por aqui parecem gostar de jogos de dados. Preciso de amostras de seus dados!

Suponho que qualquer ratkin poderia estar carregando alguns dados, mas é mais provável que os ratkin fora de serviço os tenham."
"Ratkin often farm snails for meat and shells, but the ones down here are huge! They must be mutants! Go stab some to death and see if they explode into glowing goo.": "Ratkin costuma criar caracóis para obter carne e conchas, mas os que estão aqui embaixo são enormes! Eles devem ser mutantes! Vá esfaquear alguns até a morte e veja se eles explodem em uma gosma brilhante."
