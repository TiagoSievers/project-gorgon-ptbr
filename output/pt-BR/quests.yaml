"Pickles in the Sacred Warden Grotto said, \"I'm still reading the book you brought me, but I have good news: the big crystal inside this machine isn't broken! Because if it was broken, the magic would have leaked out and killed us all months ago.

The main crystal isn't working because the little connector gear is broken. I think some gears and parts fell out while we were fleeing our old headquarters. But these parts don't seem all that exotic... maybe we can find replacements.

Let me show you what I need: a gear that looks like this, some springs, and some of these weird twist-nails. Good luck!\"": "Pickles na Gruta do Guardião Sagrado disse: “Ainda estou lendo o livro que você me trouxe, mas tenho boas notícias: o grande cristal dentro desta máquina não está quebrado!

O cristal principal não está funcionando porque a pequena engrenagem do conector está quebrada. Acho que algumas engrenagens e peças caíram enquanto fugimos da nossa antiga sede. Mas essas peças não parecem tão exóticas... talvez possamos encontrar substitutos.

Deixe-me mostrar o que preciso: uma engrenagem parecida com esta, algumas molas e alguns desses pregos estranhos. Boa sorte!\""
"Pickles in the Sacred Warden Grotto said, \"Look, I know you're annoyed that I need even more parts to repair the Warden Alert system. I'm annoyed about it too! I'm just a cat, and I'm doing my best! We can't give up on this. It's too important to the Wardens.

It looks like the glass we used in the earlier repair isn't strong enough: it actually melted inside the machine, and the mess took me hours to remove. Instead of glass, let's try diamonds. Those are super strong, right?

And this part here is supposed to be sparkling. Or sparking. Something like fire should be happening. See how it's coated in powder? I know this stuff! My master used a lot of it. It's a mix of sulfur and saltpeter. Get me some of both, maybe I can make it go again.\"": "Pickles na Gruta do Guardião Sagrado disse: \"Olha, eu sei que você está irritado porque preciso de ainda mais peças para consertar o sistema de Alerta do Diretor. Também estou irritado com isso! Sou apenas um gato e estou fazendo o meu melhor! Não podemos desistir disso. É muito importante para os Guardiões.

Parece que o vidro que usamos no reparo anterior não é forte o suficiente: na verdade, ele derreteu dentro da máquina e levei horas para remover a sujeira. Em vez de vidro, vamos tentar diamantes. Esses são super fortes, certo?

E esta parte aqui deveria ser brilhante. Ou faísca. Algo como fogo deveria estar acontecendo. Viu como está coberto de pó? Eu sei dessas coisas! Meu mestre usou muito disso. É uma mistura de enxofre e salitre. Me dê um pouco dos dois, talvez eu consiga fazer isso de novo.\""
"Pickles in the Sacred Warden Grotto said, \"The gear you found fits perfectly! These gears must be mass-produced by the dwarves! That's pretty amazing, right?

But that repair didn't make it go. I think I found the problem: the primary timing system is just... gone! It must have gotten lost or stolen. I've studied the similar ones in the auxiliary system, and I think if I had a dwarven weight like this one, I could rig something up with some string. Maybe? Worth a try.\"": "Pickles na Gruta do Guardião Sagrado disse: “O equipamento que você encontrou se encaixa perfeitamente! Essas engrenagens devem ser produzidas em massa pelos anões!

Mas esse reparo não funcionou. Acho que encontrei o problema: o sistema de cronometragem primário simplesmente... desapareceu! Deve ter sido perdido ou roubado. Estudei os semelhantes no sistema auxiliar e acho que se eu tivesse um peso anão como este, poderia amarrar algo com um barbante. Talvez? Vale a pena tentar.\""
"Pickles in the Sacred Warden Grotto said, \"The whole Warden Alert system is down. The main crystal's been down for months, but now both backup crystals are down, too! I don't know how any of this works, so I'm just going to try taking everything apart, cleaning it, and putting it back together. Unfortunately Cassie spilled my last jar of cleaning acid, which then melted most of my cleaning supplies. Can you get us some new stuff?\"": "Pickles na Gruta do Diretor Sagrado disse: \"Todo o sistema de Alerta do Diretor está desativado. O cristal principal está desativado há meses, mas agora os dois cristais de backup também estão desativados! Não sei como isso funciona, então vou apenas tentar desmontar tudo, limpá-lo e montá-lo novamente. Infelizmente, Cassie derramou meu último frasco de ácido de limpeza, que derreteu a maior parte dos meus materiais de limpeza. Você pode nos trazer algumas coisas novas? \""
"Pickles in the Sacred Warden Grotto said, \"We've got one backup crystal emitting alerts, but it won't last forever. We really need to get the main crystal working again! But there's nobody left alive who knows how this stuff works.

Before the massacre, there was a group of foxes that maintained the system. They taught each other the secrets of how it worked. Did they write the secrets down? No, of course they didn't. And then they ALL had to go get massacred, and now here we are.

Milton won't let me bring in outside help, but I needed some expert advice, so I've been quietly using a sending-stone to chat with my old master.

Don't look at me like that: my master's a great wizard! I wasn't his slave! I was his partner! Anyway, I haven't told him the specifics, so he can't be too helpful, but he thinks he has a book that'll help. And he shipped it overseas to me! It should be waiting for pickup in Rahu. I'm not sure where, exactly, but talk to the dock manager.\"": "Pickles na Gruta do Guardião Sagrado disse: \"Temos um cristal reserva emitindo alertas, mas não durará para sempre. Precisamos realmente fazer o cristal principal funcionar novamente! Mas não sobrou ninguém vivo que saiba como esse material funciona.

Antes do massacre, havia um grupo de raposas que mantinha o sistema. Eles ensinaram um ao outro os segredos de como funcionava. Eles escreveram os segredos? Não, claro que não. E então TODOS eles tiveram que ser massacrados, e agora aqui estamos nós.

Milton não me deixa trazer ajuda externa, mas eu precisava de conselhos de especialistas, então tenho usado discretamente uma pedra de envio para conversar com meu antigo mestre.

Não me olhe assim: meu mestre é um grande mago! Eu não era seu escravo! Eu era seu parceiro! De qualquer forma, não contei a ele os detalhes, então ele não pode ser muito útil, mas acha que tem um livro que vai ajudar. E ele enviou para mim no exterior! Deve estar aguardando coleta em Rahu. Não tenho certeza de onde exatamente, mas fale com o gerente da doca.\""
