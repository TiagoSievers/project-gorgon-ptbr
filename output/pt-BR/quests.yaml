"Agora, aqui estão as piores notícias": "as aranhas tornado são as mais fracas. Quando uma infestação de aranhas tornado torna-se grande o suficiente, elas de alguma forma começam a botar ovos espontaneamente para as aranhas REALMENTE perigosas, as Aranhas Furacão. E esses ovos foram vistos no buraco para onde você está indo."
"Agora, onde deixei o guano fantasmagórico? Ah, claro. Em uma ilha conhecida como Sun Vale, procure por uma ruína. Isso deve ser suficiente para continuar, certo? Ah, sim": "alguns daqueles pequenos Winter Fae sombrios gostam de... brincar por perto."
"Agrashab in the Fae Realm said, \"Basilisks are mortals, and yet some of their number have partnered with the Winter Queen -- a queen who has vowed to freeze all mortal life to death. In exchange for their treachery, these basilisks are given resistance to cold and increased strength. Show them that their strength is not limitless.\"": "Agrashab, no Reino Fae, disse: “Os basiliscos são mortais, mas alguns deles fizeram parceria com a Rainha do Inverno – uma rainha que jurou congelar toda a vida mortal até a morte."
"Agrashab in the Fae Realm said, \"I do not give commandments to my children. Trolls can form alliances with anyone they want! But that doesn't mean I will stand idly by when a pack of potent war-trolls comes here and starts wreaking havoc! These winter trolls are extremely powerful and need to be stopped. Remember: I only want you to kill the giant blue trolls, not the green ones.\"": "Agrashab, no Reino Fae, disse: “Eu não dou mandamentos aos meus filhos. Os trolls podem formar alianças com quem quiserem!"
"Agrashab in the Fae Realm said, \"I've tried indirect methods of dealing with the phoenix issue, but the threat grows ever hotter. My subjects have even given a name to the birds' stolen home: 'firebird mountain.' It is not a comforting name to fire-averse trolls. Please resolve this issue by removing the phoenices.\"": "Agrashab, no Reino Fae, disse: “Tentei métodos indiretos para lidar com a questão da fênix, mas a ameaça fica cada vez mais intensa. Meus súditos até deram um nome à casa roubada dos pássaros: 'montanha do pássaro de fogo'. Não é um nome reconfortante para trolls avessos ao fogo. Por favor, resolva esse problema removendo as fenícias.\""
"Agrashab in the Fae Realm said, \"The so-called 'firebird mountain' south of here is home to an irritating phoenix population, which terrify my subjects, but at least they don't typically hunt trolls for food! Droaches, unfortunately, do. Please head to 'Firebird Mountain' and eliminate the fire droach threat.\"": "Agrashab, no Reino Fae, disse: \"A chamada 'montanha do pássaro de fogo' ao sul daqui é o lar de uma irritante população de fênix, que aterroriza meus súditos, mas pelo menos eles não costumam caçar trolls para comer! Drogas, infelizmente, sim. Por favor, vá para a 'Montanha do Pássaro de Fogo' e elimine a ameaça da droga de fogo.\""
"Agrashab in the Fae Realm said, \"There has been a recent influx of pixies, and along with them come many typical creatures. The worst of these is the so-called shocking droach, a cowardly creature that roams in packs causing chaos. We have enough chaos right now; please remove this excess.\"": "Agrashab, no Reino Fae, disse: \"Houve um influxo recente de duendes, e junto com eles vêm muitas criaturas típicas. A pior delas é a chamada droach chocante, uma criatura covarde que vaga em bandos causando o caos. Já temos caos suficiente agora; por favor, remova esse excesso.\""
"Agrashab the troll wants powdered dust that can sometimes be found inside animated plants.": "Agrashab, o troll, quer pó em pó que às vezes pode ser encontrado dentro de plantas animadas."
"Agrashab's Bounty: Basilisk Controllers": "Recompensa de Agrashab: Controladores de Basilisco"
"Agrashab's Bounty: Fire Droaches": "Recompensa de Agrashab: Droaches de Fogo"
"Agrashab's Bounty: Phoenices": "Recompensa de Agrashab: Fenícias"
"Agrashab's Bounty: Shocking Droaches": "A Recompensa de Agrashab: Drogas Chocantes"
"Agrashab's Bounty: Winter War-Trolls": "Recompensa de Agrashab: Trolls da Guerra de Inverno"
