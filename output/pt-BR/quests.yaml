"You look warmed up! Warmed by the power of disharmony!": "Você parece aquecido! Aquecido pelo poder da desarmonia!"
"You look, uh, kind of bloated, actually. Maybe you should have drunk diet water. Keep that in mind for next time.": "Você parece meio inchado, na verdade. Talvez você devesse ter bebido água dietética. Tenha isso em mente para a próxima vez."
"You look... colorblind. Wow. Well, you're helping me look beyond my innate sense of fashion, and for that I thank you.": "Você parece... daltônico. Uau. Bem, você está me ajudando a olhar além do meu senso inato de moda e agradeço por isso."
"You love equipment, right? All adventurers do! But you never want to carry around excess equipment: too heavy, not enough space, blah blah blah. You need to push through that perceived boundary. Go get... I don't know, say 40 pieces of equipment. Carry them all over here at once and let me see you.": "Você adora equipamentos, certo? Todos os aventureiros fazem! Mas você nunca quer carregar equipamento em excesso: muito pesado, espaço insuficiente, blá, blá, blá. Você precisa ultrapassar esse limite percebido. Vá buscar... não sei, digamos 40 equipamentos. Leve-os todos aqui de uma vez e deixe-me ver você."
"You lumberjacked your way to the Tree pictogram.": "Você abriu caminho até o pictograma da Árvore."
"You made it back alive! Here: I requisitioned some curatives when I learned we've got mummy problems. You should use this before consortin' with anybody.": "Você voltou vivo! Aqui: solicitei alguns curativos quando descobri que temos problemas com múmias. Você deveria usar isso antes de se relacionar com alguém."
"You made me a watercress salad? That was... weirdly kind of you. Thank you. Well, here. You like grapes?": "Você me fez uma salada de agrião? Isso foi... estranhamente gentil da sua parte. Obrigado. Bem, aqui. Você gosta de uvas?"
"You made these? Huh. Well, good job. I didn't think you'd really do it!

Hmm, now I feel guilty. Here, take some extra cash. Money fixes all guilt!": "Você fez isso? Huh. Bem, bom trabalho. Eu não pensei que você realmente faria isso!

Hmm, agora me sinto culpado. Aqui, pegue algum dinheiro extra. O dinheiro corrige toda a culpa!"
"You might have to travel a bit, but see if you can whack a few and bring me back their plump, juicy carcasses.\\\"\": \"Kelim, em Amulna, disse": "\\\"Prefiro carne de verdade e adoro um bom sanduíche de peru nesta época do ano. Mas os malditos perus podem ser difíceis de encontrar. Eles se escondem na vegetação rasteira e não há muito disso por aqui!"
"You might have to wait for cranberries to be in season for this one, but it's worth the wait. One cranberry wine, please!": "Talvez você tenha que esperar que os cranberries cheguem à época para este, mas vale a pena esperar. Um vinho de cranberry, por favor!"
"You must kill them!\\\"\": \"Uma colmeia no Reino Fae disse": "\\\"Bzz. BzzZZzzz..."
"You need a hobby. Why not cheese making? It's delicious and might even make you some money. Of course, the fanciest kinds have to be aged in a cave for a long time, but you should start with one of the easy cheeses that don't take so long.": "Você precisa de um hobby. Por que não fazer queijo? É delicioso e pode até render algum dinheiro. Claro que os tipos mais sofisticados precisam envelhecer muito tempo em uma caverna, mas você deve começar com um dos queijos fáceis que não demoram tanto."
"You need a hobby. Why not crystal collection? It's a great hobby and very practical for adventurers and crafters alike. Build up a collection until you have, say, 100 different crystals. Then show me!": "Você precisa de um hobby. Por que não coleção de cristais? É um ótimo hobby e muito prático para aventureiros e artesãos. Construa uma coleção até ter, digamos, 100 cristais diferentes. Então me mostre!"
"You need a new look! And you need to make that look happen all on your own. You'll feel so much more confident! Just pick a color -- any color -- and then dye your clothes that color. Easy as cake.": "Você precisa de um novo visual! E você precisa fazer esse visual acontecer sozinho. Você se sentirá muito mais confiante! Basta escolher uma cor – qualquer cor – e depois tingir suas roupas dessa cor. Fácil como um bolo."
"You need better stories of adventure. And for that, you need more adventure. I hear there's some old storage chests full of treasure in the Serbule Crypt outside of town... go open 'em up. And remember to make it exciting!": "Você precisa de melhores histórias de aventura. E para isso você precisa de mais aventura. Ouvi dizer que há alguns baús antigos cheios de tesouros na Cripta de Serbule, fora da cidade... vá abri-los. E lembre-se de torná-lo emocionante!"
"You need to be more learned. It'll make you more interesting to talk to. Go and brew some alchemical substances -- alchemists are learned!": "Você precisa aprender mais. Isso tornará você mais interessante para conversar. Vá e prepare algumas substâncias alquímicas – os alquimistas são instruídos!"
