"Finally! I did the summoning ritual hours ago! Why do you Wardens even bother with a summoning ritual if you're just going to ignore me for HOURS while terrible things happen?!

It's the gnashers! They usually keep their distance and stay northwest of here, but now they've been spreading towards us. They killed a bull this morning! It was a bit north of here. And... they ate him! They ATE him! And nobody in that castle over there cares one bit! Please hurry. I know I'm delicious. It's only a matter of time!": "Finalmente! Eu fiz o ritual de invocação horas atrás! Por que vocês, Vigilantes, se preocupam com um ritual de invocação se vão me ignorar por HORAS enquanto coisas terríveis acontecem?!

São os rangedores! Eles geralmente mantêm distância e ficam a noroeste daqui, mas agora estão se espalhando em nossa direção. Eles mataram um touro esta manhã! Ficava um pouco ao norte daqui. E... eles o comeram! Eles COMERARAM ele! E ninguém naquele castelo ali se importa nem um pouco! Por favor, se apresse. Eu sei que estou delicioso. É só uma questão de tempo!"
"Finally! One of you orcs is psychic! Or whatever you are. Look, enough is enough. You orcs have had plenty of time to catch him. You even gave him a name! While Old Dreadtooth might just be a fish story for you, he's a HORRIBLE MONSTER for us! You have to get him out of here! Just wait until midnight when he shows up, then catch him!": "Finalmente! Um de vocês, orcs, é vidente! Ou seja lá o que você for. Olha, basta. Vocês, orcs, tiveram muito tempo para pegá-lo. Você até deu um nome a ele! Embora o Velho Dreadtooth possa ser apenas uma história de peixe para você, ele é um MONSTRO HORRÍVEL para nós! Você tem que tirá-lo daqui! Espere até meia-noite quando ele aparecer e pegue-o!"
"Finally! The time is nigh! First, we apply the sponge... and then... hmm...

Go for now. I need to... think. These readings don't make sense.": "Finalmente! A hora está próxima! Primeiro aplicamos a esponja... e depois... hmm...

Vá por enquanto. Eu preciso... pensar. Essas leituras não fazem sentido."
"Finally! The tree adornments are complete! May it shine as a beacon of culture throughout the holiday.

As is the custom, each day we shall place a gift under the tree for our most prized patrons. I've placed your first gift under the tree already!": "Finalmente! Os adornos da árvore estão completos! Que brilhe como um farol de cultura durante todo o feriado.

Como é costume, todos os dias colocaremos um presente debaixo da árvore para nossos clientes mais valiosos. Já coloquei seu primeiro presente debaixo da árvore!"
"Finally! The whirlwinds are quieting down a little bit. Thank you!": "Finalmente! Os redemoinhos estão se acalmando um pouco. Obrigado!"
"Finally, Give the Soul to Percy": "Finalmente, dê a alma para Percy"
"Finally, mint! Thank you. Here, I was trying to make an alternative treat in case you couldn't find mint in time. You want it?": "Finalmente, hortelã! Obrigado. Aqui, eu estava tentando fazer uma guloseima alternativa caso você não conseguisse encontrar hortelã a tempo. Você quer isso?"
"Finally, the help has arrived. Yes, I'm ready to order. Please bring me a chicken casserole. Yes, a complete casserole. I'm FAMISHED. From WAITING. For HOURS!": "Finalmente, a ajuda chegou. Sim, estou pronto para fazer o pedido. Por favor, traga-me uma caçarola de frango. Sim, uma caçarola completa. Estou faminto. De ESPERA. Por HORAS!"
