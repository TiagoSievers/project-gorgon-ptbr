"Landri is a master ice-wizard. I've talked her into preparing a beautiful ice-gem to top the tree. She just needs a bit of magical ice. An 'ice core', she said. Better get two, in case I need to have her remake it in a different shape.": "Landri é um mestre mago do gelo. Eu a convenci a preparar uma linda joia de gelo para cobrir a árvore. Ela só precisa de um pouco de gelo mágico. Um 'núcleo de gelo', disse ela. Melhor comprar dois, caso eu precise que ela o refaça em um formato diferente."
"Landri the Cold asked you to enter the dungeon underneath the tower in Kur and find her old mentor, a necromancer named Lomas. She wants his skull as proof that he's fully dead.

Landri gave you a special amulet that can let you enter the ice barrier deep within the dungeon.": "Landri the Cold pediu para você entrar na masmorra embaixo da torre em Kur e encontrar seu antigo mentor, um necromante chamado Lomas. Ela quer o crânio dele como prova de que ele está totalmente morto.

Landri deu a você um amuleto especial que permite que você entre na barreira de gelo nas profundezas da masmorra."
