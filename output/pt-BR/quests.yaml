"Bah! I know the rakkies love her, but who can trust a half-human? She wants us to believe it was a <i>coincidence</i> that she survived the orc attack? The one perpetrated by her own father?! And now we're supposed to believe she has NO contact with him? Lies!

Hmm. Well, I have another approach. How's your Orcish?

<i>[Another favor will be available if/when you have level 25 in Orcish.]</i>": "Bah! Eu sei que os libertinos a amam, mas quem pode confiar em um meio-humano? Ela quer que acreditemos que foi uma <i>coincidência</i> ela ter sobrevivido ao ataque dos orcs? Aquela perpetrada pelo próprio pai?! E agora devemos acreditar que ela NÃO tem contato com ele? Mentiras!

Hum. Bem, eu tenho outra abordagem. Como está seu Orc?

