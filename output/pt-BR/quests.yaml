"Prisms are useful for a few special crafting tasks. I can make ordinary prisms, but I've heard of a strange prism made by an ancient yeti master. I wish to study it! Find it for me?

It would be in some cave in the Kur Mountains, I presume. I doubt it would be easy to find, since I've only heard vague rumors of it. It's probably in some sack deep down in a hole somewhere.": "Os prismas são úteis para algumas tarefas especiais de elaboração. Posso fazer prismas comuns, mas ouvi falar de um estranho prisma feito por um antigo mestre Yeti. Eu quero estudar isso! Encontre para mim?

Deveria estar em alguma caverna nas montanhas Kur, presumo. Duvido que seja fácil encontrá-lo, já que só ouvi rumores vagos sobre isso. Provavelmente está em algum saco bem fundo em algum buraco em algum lugar."
