"Lakrea gave you a recipe for a Bacon Basket and instructed you to cook one. Eating it is optional.": "Lakrea lhe deu uma receita de Cesta de Bacon e o instruiu a prepará-la. Comê-lo é opcional."
"Lakrea gave you a recipe for a Raw Egg Blend and instructed you to drink one.": "Lakrea lhe deu uma receita de Mistura de Ovo Cru e o instruiu a beber uma."
"Lakrea suggested that you \"battle\" a shark.": "Lakrea sugeriu que você “lutasse” contra um tubarão."
