"Hemmit Magmagrip in New Prestonbule said, \"I need another kind of mushroom. These are common everywhere: black foot morels. Delicious in stews! I need to make sure the kind that grow here are alchemically identical to the kinds grown elsewhere.\"": "Hemmit Magmagrip em New Prestonbule disse: \"Preciso de outro tipo de cogumelo. Estes são comuns em todos os lugares: cogumelos pretos. Deliciosos em ensopados! Preciso ter certeza de que os tipos que crescem aqui são alquimicamente idênticos aos tipos cultivados em outros lugares.\""
"Hemmit Magmagrip in New Prestonbule said, \"I need you to go spelunking! There are caves all through the mountains, and some of them have mushrooms growing inside.

There's a kind of mushroom found only in this mountain range. Orcs call it 'Groxmax'. You'll know them by the stench of rotten meat. I'll pay well for them! Oh, and if you find other kinds of mushrooms, hold on to them too; I may need them.\"": "Hemmit Magmagrip em New Prestonbule disse: “Preciso que você faça uma espeleologia! Há cavernas por todas as montanhas, e algumas delas têm cogumelos crescendo dentro.

Existe uma espécie de cogumelo que só se encontra nesta cordilheira. Os orcs chamam isso de 'Groxmax'. Você os reconhecerá pelo fedor de carne podre. Pagarei bem por eles! Ah, e se você encontrar outros tipos de cogumelos, guarde-os também; Posso precisar deles.\""
"Hemmit Magmagrip in New Prestonbule said, \"Mox and Bellema don't believe me, but I swear I saw another one of those mushroom men in a cave near here! It was in 'Snowblood Shadow Cave'. I can't understand his way of communicating, but I'm sure he knows the secret of these mushroom rings. If you figure out the secret, tell me!\"": "Hemmit Magmagrip em New Prestonbule disse: “Mox e Bellema não acreditam em mim, mas juro que vi outro daqueles homens-cogumelo em uma caverna perto daqui!"
"Here": "as promised, a lifetime's worth of riches! Well, it's a lifetime's worth if you live very, very frugally. Or die very soon.\": \"Obrigado! Este não é o seu último talismã, é? Ah, quem se importa! Você pode simplesmente pegar outro, certo?"
"Here is a list of necessities for the Geas that Ormond recommended.\\\"\": \"Leon Dasterre em Statehelm disse": "\\\"Recebi notícias de minha Unora. Ela é meus olhos dentro da escola de magos e diz que Guzor está incomodando o Subcomandante para me remover do Subconselho de Defesa da Cidade. Isso vai além da política. Este homem tem tanto medo da magia bárdica que nos expulsaria da cidade. Ele sabe que sua magia não pode curar - ela só pode destruir. E então ele pretende nos destruir. Nós, por sua vez, devemos curar! Curar! a ruptura no Subconselho de Defesa da Cidade!"
"Here is one I've struggled with myself: can you defeat demons barehanded? Not the wimpy ones -- the Behemoths!

<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Aqui está uma coisa com a qual lutei comigo mesmo: você pode derrotar demônios com as mãos vazias? Não os fracos – os Behemoths!

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>"
"Here is the most important detail": "you must kill them with darkness damage. Otherwise it would only be a twice-cursed beak."
"Here is the problem: late at night, a creature is coming out of the sewers and attacking sentient animals. It focuses on the smart ones.

I have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.": "Aqui está o problema: tarde da noite, uma criatura sai dos esgotos e ataca animais sencientes. Ele se concentra nos inteligentes.

Tenho um contato no esgoto. O nome dele é Hamilton e você pode confiar nele. Ele tem feito algum trabalho investigativo sobre esse problema. Encontre um caminho para o esgoto, localize-o e traga suas informações."
"Here is the special beaker I was given. I counted ten pools of water with functioning crystal fountains. Wade into each pool and test the water in the center of the room. The beaker will hum if the water is clean and screech horribly if there is a problem.\\\"\": \"Lady Windsong em Rahu disse": "\\\"Existem cristais no esgoto que removem sujeira, sal e quaisquer outros contaminantes da água. Magia incrível! Mas não sabemos quanto tempo a magia vai durar, então todos os anos testamos a água. Você pode fazer isso este ano?"
"Here it is! I hope you like it.

Yes, I'm an old hand at enchantment. And <i>technically</i> I'm an archmage. But please don't tell anyone! They already don't like me here, and I haven't practiced archmagery in a long time. I don't even like to let people know I enchant all the jewelry in my shop. They'll think my beautiful artwork is elf-cursed.

Anyway, does it fit? Oh good! Thank you again for everything you've done for me. I'm indebted to you.": "Aqui está! Espero que você goste.

Sim, sou experiente em encantamento. E <i>tecnicamente</i> sou um arquimago. Mas por favor não conte a ninguém! Eles já não gostam de mim aqui e eu não pratico arquimagia há muito tempo. Não gosto nem de deixar que as pessoas saibam que encanto todas as joias da minha loja. Eles vão pensar que minha bela obra de arte é amaldiçoada pelos elfos.

De qualquer forma, cabe? Ah, que bom! Obrigado novamente por tudo que você fez por mim. Estou em dívida com você."
"Here! Take this dreadful-smelling potion and tell Ormond that it will restructure his genitals, and it's the only way to ever be with me. When he refuses, tell him that you understand. Then come back and tell me how it went!": "Aqui! Tome esta poção de cheiro horrível e diga a Ormond que ela irá reestruturar seus órgãos genitais e que é a única maneira de ficar comigo. Quando ele recusar, diga que você entende. Depois volte e me conte como foi!"
"Here's an order for pieces of bugs. Wait, aren't aktaari those man-sized bugs? ... Good luck with this one.": "Aqui está um pedido de pedaços de insetos. Espere, Aktaari não são aqueles insetos do tamanho de um homem? ... Boa sorte com este."
"Here's an order from a craniologist. I need skulls of a specific quality.": "Aqui está uma ordem de um craniologista. Preciso de crânios de uma qualidade específica."
"Here's another book order I'm stuck on. We just don't get many orcish traders so finding these books in Orcish has been tough!": "Aqui está outro pedido de livro no qual estou preso. Nós simplesmente não temos muitos comerciantes orcs, então encontrar esses livros em Orcs tem sido difícil!"
"Here's another crazy order. How am I going to fill this?! I need \"schematics and maintenance instructions for an Exetar-class ship.\" I understand some of those words...

Well, no pressure but see what you can do.": "Aqui está outra ordem maluca. Como vou preencher isso?! Preciso de \"esquemas e instruções de manutenção para uma nave da classe Exetar\". Eu entendo algumas dessas palavras...

Bem, sem pressão, mas veja o que você pode fazer."
"Here's another hide request: \"the finest rabbit skin you can find. No damage.\" I have some rabbit skins, but they all have damage.": "Aqui está outro pedido de ocultação: \"a melhor pele de coelho que você puder encontrar. Sem danos\". Tenho algumas peles de coelho, mas todas estão danificadas."
"Here's the map for your next assignment. And you might want to hurry, I've had reports of smoke, screams, and commotion coming from there today.": "Aqui está o mapa para sua próxima tarefa. E você pode querer se apressar, recebi relatos de fumaça, gritos e comoção vindos de lá hoje."
"Here's the map to your next mission. It used to be a holding cell for war prisoners. It sounds like it's been flooded for a while, which means the bandits will have moved on, but I'm sure there's snakes and other dumb animals in there. Oh, and ghosts. Ghosts always show up in military prisons... you're not scared of ghosts, are you? I just give 'em a stunning bash with my shield. That shuts 'em up.": "Aqui está o mapa para sua próxima missão. Costumava ser uma cela para prisioneiros de guerra. Parece que está inundado há algum tempo, o que significa que os bandidos já seguiram em frente, mas tenho certeza de que há cobras e outros animais idiotas lá dentro. Ah, e fantasmas. Fantasmas sempre aparecem em prisões militares... você não tem medo de fantasmas, tem? Eu apenas dou a eles um golpe impressionante com meu escudo. Isso os cala."
"Here's the recipe from Gozzaroon. Make one of these, find the stone slab in the ocean, and use the beacon there. Then watch out! Ranalon will come from everywhere.

Kill a bunch of them to stop their progress.

I suppose you could do this on your own, but were I you, I would gather some backup before attacking an army.": "Aqui está a receita do Gozzaroon. Faça um desses, encontre a laje de pedra no oceano e use o farol ali. Então cuidado! Ranalon virá de todos os lugares.

Mate um monte deles para impedir seu progresso.

Suponho que você poderia fazer isso sozinho, mas se eu fosse você, reuniria alguns reforços antes de atacar um exército."
"Here's the story I was told: a traveler had stopped at the old inn in Vidaria. It's mostly abandoned, but it's still got a sturdy roof, and it was raining. While it rained, he cooked an incredible piece of beef on the stove.

Just as he was adding some unusual herbs he'd found, a bolt of lightning struck the chimney! The traveler avoided harm, but the piece of steak was blasted and blackened. And then... he says the steak got up and tried to kill him, so he ran out into the night rain.

I hadn't put too much faith in his story, but we should see if it's true.

Go to the inn in Vidaria and recreate the same situation by burning some high-quality beef. I'll give you precise instructions.

Oh and be prepared to defend yourself.": "Eis a história que me contaram: um viajante tinha parado na antiga estalagem da Vidaria. Está praticamente abandonado, mas ainda tem um telhado resistente e estava chovendo. Enquanto chovia, ele cozinhou um pedaço incrível de carne no fogão.

No momento em que ele estava adicionando algumas ervas incomuns que encontrou, um raio atingiu a chaminé! O viajante evitou o dano, mas o pedaço de bife ficou queimado e enegrecido. E então... ele disse que o bife se levantou e tentou matá-lo, então ele saiu correndo na chuva noturna.

Eu não coloquei muita fé na história dele, mas deveríamos ver se é verdade.

Vá à estalagem da Vidaria e recrie a mesma situação queimando carne de boa qualidade. Vou lhe dar instruções precisas.

Ah, e esteja preparado para se defender."
"Here's what I need": "a nice fae blanket. Like the fairies in Statehelm sell sometimes. Or just make one. You know how to make one, right? You just sew up the edges of some fae silk. Simple as that!\\\"\": \"Tremmond Blackhammer em Povus disse: \\\"Tenho as peças que preciso para minha fixação automática, mas... Bem, já se passaram algumas décadas desde que fiz algo assim. Estou tentando lembrar como é feito. Acho que só preciso de um cristal T, que tenho em mãos... Mas e se eu realmente precisar de um cristal L? Nesse caso, estamos diante de uma explosão muito perigosa quando conecto a parte errada."
"Here's your coin. Do you deliver things by trade? Oh, you only did it as a favor for me? Well, thanks.": "Aqui está sua moeda. Você entrega coisas por comércio? Oh, você só fez isso como um favor para mim? Bem, obrigado."
"Here's your money. And I'm adding in a bit extra as an apology for earlier, and for your discretion. If someone, say Samantha Veilmoor, were to ask if I make swords, you would say that I definitely don't. Right? Great.": "Aqui está o seu dinheiro. E estou acrescentando um pouco mais como desculpa pelo que aconteceu antes e para sua discrição. Se alguém, digamos Samantha Veilmoor, perguntasse se eu faço espadas, você diria que definitivamente não faço. Certo? Ótimo."
"Here's your next map. A new gang of bandits moved into the area, so make yourself useful and figure out what they're up to. And get my xedrite too, obviously.": "Aqui está seu próximo mapa. Uma nova gangue de bandidos se mudou para a área, então seja útil e descubra o que eles estão fazendo. E pegue meu xedrite também, obviamente."
"Here, can you fill this book order? I don't have any of these. They want... Hm what are these books, exactly? I guess they're instructions on sewing advanced bardic equipment. Oh, that makes sense given who the order is from. Are these rare? I assumed so, and I quoted her quite a high price. If you can find them, I'll give you half the pay.": "Aqui, você pode atender este pedido de livro? Eu não tenho nenhum desses. Eles querem... Hm, o que são esses livros, exatamente? Acho que são instruções sobre como costurar equipamentos bárdicos avançados. Ah, isso faz sentido, considerando de quem é o pedido. São raros? Presumi que sim e citei um preço bastante alto para ela. Se você conseguir encontrá-los, eu lhe darei metade do pagamento."
"Here, take this as thanks": "it's spider repellent!\": \"Ela gostou? Ah, que bom! Eu estava preocupado. Ela disse que não queria minha ajuda, mas imaginei que fossem apenas elfos sendo arrogantes em conseguir ajuda de humanos. Tenho certeza de que o problema do urso dela é coisa do passado."
"Here, this is how you make the most very basic tofu meal. Just remember": "cheese is inherently better!\": \"Cheire esse coalho!"
"Here. I bribed an alchemist at the mage college to get this recipe. Of course, I don't know how to actually do alchemy, so I'll leave it up to you.\\\"\": \"Gareth Plumsy, em Statehelm, disse": "\\\"Tenho um grande teste chegando na escola e preciso estar no meu melhor. Eu poderia literalmente morrer se não estiver! Esta escola é uma loucura! Preciso de mais suco pineal, mas não das coisas fracas que você me trouxe antes."
"Here. This is what I made from the parts you made. I know a bit of the art of sabotage. Take this with you and go get \"fed\" from the Cornucopia. It will redirect the system's teleportation point down into the sewer somewhere.

Don't worry, they'll fix it soon enough. But for today, just today, there will be hungry people outside my shop.

I've got the bread smell going. This is going to be a good sales day! Go go go!": "Aqui. Isso é o que eu fiz com as peças que você fez. Conheço um pouco da arte da sabotagem. Leve isso com você e vá se “alimentar” da Cornucópia. Ele redirecionará o ponto de teletransporte do sistema para algum lugar no esgoto.

Não se preocupe, eles consertarão isso em breve. Mas por hoje, só hoje, haverá gente faminta do lado de fora da minha loja.

Estou com cheiro de pão. Este será um bom dia de vendas! Vai! Vai! Vai!"
"Here: it's finished. This amulet only works for those of Veilmoor blood. For us, it will protect against death itself! Once. Plus, I've altered this one so that I can track where it is, in case she gets kidnapped. That was quite an expensive ritual, too.

Tell her none of that. Just deliver it to her. Helena will know what it is and what it means.": "Aqui: está terminado. Este amuleto só funciona para aqueles de sangue Veilmoor. Para nós, protegerá contra a própria morte! Uma vez. Além disso, alterei este para poder rastrear onde está, caso ela seja sequestrada. Esse também era um ritual bastante caro.

Não diga nada disso a ela. Apenas entregue a ela. Helena saberá o que é e o que significa."
"Hexapus": "Hexapo"
"Hexapuses are unnervingly intelligent and are happy both on land and water -- although they prefer to be immersed when they sleep. They are a menace that can't be allowed to proliferate.\": \"<b>Caça": "Hexapuses</b>"
"HexapusMouthRing": "HexapusBocaAnel"
"Hey are you any good with Alchemy? I could use some cleanser for these gemstones, so I can cut them up real pretty. Could you get me some Weak Acidic Cleanser?": "Ei, você é bom com Alquimia? Eu poderia usar um pouco de limpador para essas pedras preciosas, para que eu possa cortá-las bem bonitas. Você poderia me conseguir um limpador ácido fraco?"
"Hey can you go get some wool off the mountain sheep? Don't bother trying to shear them, they'll just kick your ass. You have to take 'em out. All the docile sheep live in pleasant territory. The sheep here are all assholes.": "Ei, você pode pegar um pouco de lã das ovelhas da montanha? Não se preocupe em tentar cortá-los, eles simplesmente vão chutar sua bunda. Você tem que tirá-los. Todas as ovelhas dóceis vivem em território agradável. As ovelhas aqui são todas idiotas."
"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of Expert-Quality Metal Slabs. Lots of them! I promise I'll only ask this of you once - never again! If you can deliver me 25 Expert-Quality Metal Slabs, I'll show you what I use them for!": "Ei, posso pedir que você me faça um favor pessoal? Estou com poucos suprimentos e preciso urgentemente de placas de metal de qualidade especializada. Muitos deles! Eu prometo que só vou pedir isso uma vez - nunca mais! Se você puder me entregar 25 placas de metal de qualidade especializada, mostrarei para que as uso!"
"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of string. Lots of string! I promise I'll only ask this of you once - never again! If you can deliver me 50 strings, I'll show you what I use them for!": "Ei, posso pedir que você me faça um favor pessoal? Estou com poucos suprimentos e preciso urgentemente de barbante. Muita corda! Eu prometo que só vou pedir isso uma vez - nunca mais! Se você puder me entregar 50 cordas, vou te mostrar para que uso elas!"
"Hey friend, do me a favor and get me a fresh fish, would ya? Wait, strike that, make it 100 fresh fish.": "Ei amigo, faça-me um favor e me traga um peixe fresco, certo? Espere, acerte isso, faça 100 peixes frescos."
"Hey how about one more tall glass of that brown ale? Don't worry, I can hold my stuff.": "Ei, que tal mais um copo alto daquela cerveja marrom? Não se preocupe, posso segurar minhas coisas."
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Astounding Magic Rings and 5 Astounding Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?": "Ei! Recentemente, juntei-me à caravana para explorar novos métodos de confecção de joias. Que tal eu começar com você? Crie para mim 5 anéis mágicos surpreendentes e 5 colares encantados surpreendentes. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo?"
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Astounding Magic Rings and 5 Astounding Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?

": "Ei! Recentemente, juntei-me à caravana para explorar novos métodos de confecção de joias. Que tal eu começar com você? Crie para mim 5 anéis mágicos surpreendentes e 5 colares encantados surpreendentes. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo?"
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Great Magic Rings and 5 Great Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?": "Ei! Recentemente, juntei-me à caravana para explorar novos métodos de confecção de joias. Que tal eu começar com você? Crie para mim 5 Grandes Anéis Mágicos e 5 Grandes Colares Encantados. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo?"
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Great Magic Rings and 5 Great Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?

": "Ei! Recentemente, juntei-me à caravana para explorar novos métodos de confecção de joias. Que tal eu começar com você? Crie para mim 5 Grandes Anéis Mágicos e 5 Grandes Colares Encantados. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo?"
"Hey! Can you hear me? Finally! It is I, Zhia Lian, the Goddess of Whimsy! I've been trying to reach your mind for almost a week! Your brain is really hard to break into.

Anyway, I was at a party last week and you'll never guess who showed up: the other undead gods! So I got to talking with them. It turns out Chalice is in close alignment with Alharth right now, and they're flooding the continent with undead!

I have some friends on Alharth so I figured I'd help them out... by helping YOU out! You're pretty strong and I think you can help fix this. And we'll have some fun along the way, too. Stick with me, mortal, and you won't regret it!

<i>[Check your quest journal for quests to get you started. Complete those quests and you'll unlock additional quests. The quests have varying degrees of difficulty and you probably won't be able to complete a lot of them, so focus on the ones you can complete. You'll be rewarded for each quest. Good luck, and happy Halloween!]</i>": "Ei! Você pode me ouvir? Finalmente! Sou eu, Zhia Lian, a Deusa do Irrisório! Estou tentando alcançar sua mente há quase uma semana! Seu cérebro é realmente difícil de invadir.

De qualquer forma, estive em uma festa na semana passada e você nunca vai adivinhar quem apareceu: os outros deuses mortos-vivos! Então comecei a conversar com eles. Acontece que Chalice está alinhado com Alharth neste momento, e eles estão inundando o continente com mortos-vivos!

Tenho alguns amigos em Alharth, então resolvi ajudá-los... ajudando VOCÊ! Você é muito forte e acho que pode ajudar a consertar isso. E também nos divertiremos ao longo do caminho. Fique comigo, mortal, e você não se arrependerá!

<i>[Verifique seu diário de missões para começar. Complete essas missões e você desbloqueará missões adicionais. As missões têm vários graus de dificuldade e você provavelmente não conseguirá completar muitas delas, então concentre-se naquelas que você consegue completar. Você será recompensado por cada missão. Boa sorte e feliz Halloween!]</i>"
"Hey! Uh, sorry again about accusing you of being a thief. You just seem like ... ahem, well, anyway, I know NOW that you're an expert toolsmith! And that means you must have access to quality metal. I need some.

The Council provides me with the metal to fix horseshoes and fences, but I need fancier metal for a personal project I'm working on.": "Ei! Uh, desculpe novamente por acusar você de ser um ladrão. Você parece... aham, bem, de qualquer forma, AGORA sei que você é um ferreiro especialista! E isso significa que você deve ter acesso a metal de qualidade. Eu preciso de alguns.

O Conselho me fornece o metal para consertar ferraduras e cercas, mas preciso de um metal mais sofisticado para um projeto pessoal em que estou trabalhando."
"Hey! You're the brown ale expert. Hey hey good to see you again! I've been thinking about that brown ale. I want to order a keg of it! Can you deliver? I've been saving up!": "Ei! Você é o especialista em brown ale. Ei, ei, que bom ver você de novo! Estive pensando naquela cerveja marrom. Quero pedir um barril disso! Você pode entregar? Tenho economizado!"
"Hey, a pig snout! Thank you! It's an ingredient in a rare ink I'm making.": "Ei, focinho de porco! Obrigado! É um ingrediente de uma tinta rara que estou fazendo."
"Hey, did you make that pear wine yet? It'd go great with this party!": "Ei, você já fez aquele vinho de pêra? Iria muito bem com esta festa!"
"Hey, do me a favor, go burn yourself on some of those eldritch candles scattered around the crypt southwest of town. I want to study the burn patterns. Each candle should leave a distinct burn mark. Just go touch four of them and come back.

Oh it won't hurt THAT much, you big baby!": "Ei, faça-me um favor, vá queimar algumas daquelas velas sobrenaturais espalhadas pela cripta a sudoeste da cidade. Quero estudar os padrões de queimadura. Cada vela deve deixar uma marca de queima distinta. Basta tocar em quatro deles e voltar.

Ah, não vai doer TANTO, seu bebezão!"
"Hey, I have to stand around watching recruits during business hours, so I keep missing my chance to pick up a package from Pumza's weapons stall. Can you go get it for me?": "Ei, tenho que ficar observando os recrutas durante o horário comercial, então continuo perdendo a chance de pegar um pacote na barraca de armas de Pumza. Você pode ir buscá-lo para mim?"
"Hey, if you find that cave, grab the shield for me? I'm not sure where I was, but I remember I didn't go up any slopes, if that helps.\\\"\": \"Tyler Green, em Serbule Hills, disse": "\\\"Vou lhe contar uma das razões pelas quais estou tão deprimido. Eu estava explorando um pouco e encontrei uma caverna perto, logo abaixo na estrada, um pouco ao norte e a leste daqui. Há um cadáver lá que tinha uma nota, e aparentemente havia pessoas que precisavam ser salvas, então corri como nos velhos tempos, atacando aranhas por toda parte! E então, de alguma forma, fui invadido por aranhas, uma dúzia delas ou mais. Joguei meu escudo reserva em um grande problema e corri. Mas esse era meu segundo escudo favorito. Agora me resta apenas meu escudo favorito e meu terceiro escudo favorito. E me sinto tão vazio."
"Hey, if you're headed out into the wilds, mind picking any cotton you see for me?": "Ei, se você estiver indo para a selva, se importaria de pegar qualquer algodão que encontrar para mim?"
"Hey, it's you again. Remember when you got me flitterbies? I was thinking about them. I bet you guys have no idea how flitterbies work! They're maleable to their environment even after they grow. If you have a ton of citrus on you when you pick one, it'll come out smelling citrusy itself!

Can you confirm this actually works like I expect? Sometimes mortal-realm variants can act weird.

<i>[To advance this quest you must have 100+ citrus items in your inventory when you pick flitterbies.]</i>": "Ei, é você de novo. Lembra quando você me deu flitterbies? Eu estava pensando neles. Aposto que vocês não têm ideia de como funcionam os flitterbies! Eles são maleáveis ​​ao ambiente mesmo depois de crescerem. Se você tiver uma tonelada de frutas cítricas ao escolher uma, ela sairá com um cheiro cítrico!

Você pode confirmar que isso realmente funciona como eu esperava? Às vezes, as variantes do reino mortal podem agir de forma estranha.

<i>[Para avançar nesta missão, você deve ter mais de 100 itens cítricos em seu inventário ao escolher flitterbies.]</i>"
"Hey, it's you! What a bit of luck. I need more specialized armor stakes. Can you bang these out today? Expert-quality, but with a peened head.": "Ei, é você! Que sorte. Preciso de estacas de armadura mais especializadas. Você pode fazer isso hoje? Qualidade especializada, mas com a cabeça afiada."
"Hey, remember when you cleared out the animated legs in the graveyard? Well, they're back.

<i>[Gregory looks at you and raises his eyebrows.]</i>": "Ei, lembra quando você limpou as pernas animadas do cemitério? Bem, eles estão de volta.

<i>[Gregory olha para você e levanta as sobrancelhas.]</i>"
"Hey, so I just used that Crossing Oil you got me. I was making Curse Arrows. But I got it on my hands, and now my fingers are erupting in puss-filled blisters. Uh? Do you have the antidote? Uncross me!": "Ei, acabei de usar aquele Crossing Oil que você me deu. Eu estava fazendo Curse Arrows. Mas eu coloquei nas mãos e agora meus dedos estão explodindo em bolhas cheias de pus. Uh? Você tem o antídoto? Descruze-me!"
"Hey, thanks for teaching me that little ratkin-skeleton trick! It's not as amazing as the trick I taught you... but it's still pretty good! But, um... in my excitement I forgot something. I don't have one of those summoning talismans! Can you give me yours? I'll give you a lifetime of riches for it!": "Ei, obrigado por me ensinar aquele pequeno truque do esqueleto de ratkin! Não é tão incrível quanto o truque que ensinei... mas ainda é muito bom! Mas, hum... na minha excitação esqueci uma coisa. Eu não tenho um desses talismãs de invocação! Você pode me dar o seu? Eu lhe darei uma vida inteira de riquezas por isso!"
"Hey, these are nice. Easy to cut into cubes, and relatively easy to hollow out. I'll buy 'em off of you. What, a gift? Hmm.

Suspicious. But okay.": "Ei, isso é legal. Fácil de cortar em cubos e relativamente fácil de escavar. Vou comprá-los de você. O que, um presente? Hum.

Suspeito. Mas tudo bem."
"Hey, these potion bottles are still full! Well, Gasu'um drinks this stuff like water, so don't expect 'em to last long! Thanks though... this'll work.": "Ei, essas garrafas de poção ainda estão cheias! Bem, Gasu'um bebe essas coisas como água, então não espere que durem muito! Obrigado... isso vai funcionar."
"Hey, this is my wife's favorite! She's gonna love it. Thanks! Here, take these beets I found in the street -- I won't need them anymore!": "Ei, este é o favorito da minha esposa! Ela vai adorar. Obrigado! Aqui, pegue essas beterrabas que encontrei na rua – não vou precisar mais delas!"
"Hey, wanna see something funny? If you grow the seeds from those evil pumpkins, they explode! But fair warning": "it hasn't been a very popular party trick for me.\": \"<i>Zhia Lian:</i> Acho que você matou idiotas suficientes para impedi-los de invadir uma cidade ou qualquer outra coisa muito drástica. Os retardatários provavelmente comerão algumas pessoas, mas meh."
"Hey, while you're assaulting the ship and all, why not kill some of the pests on the engine deck? We've got a nasty infestation of droaches down there. Apparently they get along great with the phoenixes, so everybody's afraid to get rid of 'em. But not you!": "Ei, enquanto você está atacando o navio e tudo mais, por que não matar algumas das pragas no convés do motor? Temos uma infestação desagradável de baratas lá embaixo. Aparentemente eles se dão muito bem com as fênix, então todo mundo tem medo de se livrar delas. Mas você não!"
"Hey, you any good at mining? There's silver ore out there in the lowlands, just waiting to be mined! But I don't know how to do that part. I can smelt it, though. Tell you what, bring me some, and I'll give you one of my special silvered swords.": "Ei, você é bom em mineração? Há minério de prata nas terras baixas, apenas esperando para ser extraído! Mas não sei como fazer essa parte. Eu posso sentir o cheiro, no entanto. Vou te dizer uma coisa, traga-me alguns e eu lhe darei uma de minhas espadas prateadas especiais."
"Hey, you got any fresh grass on you? Daisy says she needs it to make bounceweed for me. But the grass I got is all scraggly. It's hard to find nice grass on a beach!": "Ei, você tem grama fresca com você? Daisy diz que precisa disso para fazer erva-de-cheira para mim. Mas a grama que consegui está toda desgrenhada. É difícil encontrar grama bonita na praia!"
"Hey, you got everything! Thanks for your help. Here are the directions to dye your fur blue. Since you brought me plenty of gems, here's a vial of dye to get you started. The carrots? Oh, they don't have anything to do with the dye, I just wanted a snack. Take care, fellow booper!": "Ei, você conseguiu tudo! Obrigado pela ajuda. Aqui estão as instruções para tingir seu pelo de azul. Já que você me trouxe muitas joias, aqui está um frasco de corante para você começar. As cenouras? Ah, eles não têm nada a ver com a tintura, só queria um lanche. Tome cuidado, colega booper!"
"Hey, you look like you could use some exercise... you ready for a jog into the wilds? Great! These are very tricky mushrooms to pick, so be careful!\\\"\": \"Backfat no Reino Fae disse": "\\\"Então aquela fada ali - sim, aquela, Pegast. Ele veio e pediu minha ajuda. Finalmente, reconhecimento de minha experiência! Mas ele queria ajuda para ficar em forma e saudável? Não. Ele só queria cogumelos explosivos. Eu dei a ele o que tinha, mas ele ainda precisa de mais. Então agora tenho que procurar esse cara."
"Hey, you're a champ, can you get me some venison? I need a LOT of it. I'll give you... hmm... my gratitude!": "Ei, você é um campeão, pode me trazer um pouco de carne de veado? Eu preciso MUITO disso. Vou te dar... hmm... minha gratidão!"
"Hey, you're the chair-wizard. You made that chair for me a while back, right? Well, I could really use your help this time. Here, look a this. See? Yeah. This is a quality chair. Far beyond my skill, I'll admit. And it needs to be made to these exact measurements.

I'm not saying you owe me anything. I'm just saying, since you obviously like making chairs so much...": "Ei, você é o mago da cadeira. Você fez aquela cadeira para mim há um tempo, certo? Bem, eu realmente preciso da sua ajuda desta vez. Aqui, olhe isto. Ver? Sim. Esta é uma cadeira de qualidade. Muito além da minha habilidade, admito. E precisa ser feito com essas medidas exatas.

Não estou dizendo que você me deve alguma coisa. Só estou dizendo que, já que você obviamente gosta tanto de fazer cadeiras..."
"Hey, you're the one who sold me that bad osslar skull. This is your fault! I performed an absolutely hilarious prank and now Jenny Foster won't speak to me! At all! She gives me the \"silent treatment\", which should definitely be considered a war crime if it isn't already.

Since you did this too, you should help me fix it. Jenny likes tea, so I want you to get her some exotic tropical tea. Make it extra sweet.": "Ei, foi você quem me vendeu aquela caveira de osslar ruim. A culpa é sua! Fiz uma pegadinha absolutamente hilária e agora Jenny Foster não fala comigo! De forma alguma! Ela me dá o “tratamento silencioso”, que definitivamente deveria ser considerado um crime de guerra, se ainda não o é.

Já que você fez isso também, você deveria me ajudar a consertar. Jenny gosta de chá, então quero que você traga um chá tropical exótico para ela. Torne-o ainda mais doce."
"Hey, you've been killing those damned skeletons, right? Got any good, strong femurs? I need a half-dozen for this project I'm working on.": "Ei, você está matando aqueles malditos esqueletos, certo? Tem algum fêmur bom e forte? Preciso de meia dúzia para este projeto em que estou trabalhando."
"Hey, you've got to help me out again. BIG test coming up and I'm out of the juice! I need the cranked juice. Nothing else works anymore. I'll pay well!": "Ei, você tem que me ajudar novamente. GRANDE teste chegando e estou sem energia! Eu preciso do suco acionado. Nada mais funciona. Pagarei bem!"
"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Disastrous Spore Bombs? It would be a great help!": "Olá! Pode me ajudar? Preciso de um suprimento extra de bombas de esporos para ajudar a cuidar dos inimigos que possamos encontrar. Minha voz melodiosa os atrai... então eu os despedaço! Você pode me produzir 30 bombas de esporos desastrosas? Seria uma grande ajuda!"
