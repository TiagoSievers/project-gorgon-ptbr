"Sagiso in Statehelm said, \"A favor, huh? Well, you could get me some paint. It's for my hobby. Any color will do, I'm not picky. Just get me a LOT of it.\"": "Sagiso em Statehelm disse: \"Um favor, hein? Bem, você poderia me conseguir um pouco de tinta. É para o meu hobby. Qualquer cor serve, não sou exigente. Apenas me dê MUITA.\""
"Sagiso in Statehelm said, \"My hobby is... let's call it Urban Expression. It's a legitimate art form and an important one, especially here in Statehelm. Let's just jump right in, shall we? Take your dye and head to the barracks area. The walls all around there are good spots for your art. Pick a place and make your mark!

<i>[ Place the Graffiti ability on your sidebar. If you are in a valid graffiti area (and have dye on hand) the ability will stop being grayed out. There are graffiti spots all over, though they are a little denser near the barracks/jail area.]</i>\"": "Sagiso em Statehelm disse: \"Meu hobby é... vamos chamá-lo de Expressão Urbana. É uma forma de arte legítima e importante, especialmente aqui em Statehelm. Vamos começar, certo? Pegue sua tintura e vá para a área do quartel. As paredes ao redor são bons locais para sua arte. Escolha um lugar e deixe sua marca!

<i>[Coloque a habilidade Graffiti na barra lateral. Se você estiver em uma área de graffiti válida (e tiver tinta em mãos), a habilidade deixará de ficar esmaecida. Há manchas de graffiti por toda parte, embora sejam um pouco mais densas perto da área do quartel/prisão.]</i>\""
"Sagiso in Statehelm said, \"You're getting the hang of this! Keep spreading your messages to the sheep of Statehelm!\"": "Sagiso em Statehelm disse: \"Você está pegando o jeito! Continue espalhando suas mensagens para as ovelhas de Statehelm!\""
"SaidWordOfPower": "DisseWordOfPower"
"Sales are going well and it's time to bring back some of my fancier recipes. I need these grains to do it! As before, I'll pay you in clout with the citizens of Statehelm!": "As vendas estão indo bem e é hora de trazer de volta algumas das minhas receitas mais sofisticadas. Preciso desses grãos para fazer isso! Como antes, pagarei a você em troca de influência com os cidadãos de Statehelm!"
"Salmon Fillets": "Filetes de Salmão"
"SalmonFillet": "Filé de Salmão"
"Salmpo Phelps in Statehelm said, \"Did you know there's really such a thing as a Salmpo? They're abominations. Created by amateur alchemists, mostly. I don't exactly know what they look like, but I've heard their hearts are made of leafy greens! I've always wanted to try one. Just to know what I taste like. So to speak.\"": "Salmpo Phelps em Statehelm disse: \"Você sabia que realmente existe Salmpo? Eles são abominações. Criados por alquimistas amadores, principalmente. Não sei exatamente como eles são, mas ouvi dizer que seus corações são feitos de folhas verdes! Sempre quis experimentar um. Só para saber qual é o meu gosto. Por assim dizer. \""
"Salmpo Phelps in Statehelm said, \"I used to maintain these loading golems, back when there were more of 'em. It was sort of my side-job. And, well, I guess since nobody else is taking responsibility, I still have to do it! So I've been doing safety inspections on the golems. I've made some easy fixes, but the scarier problems require special parts.\"": "Salmpo Phelps, da Statehelm, disse: \"Eu costumava manter esses golens de carregamento, quando havia mais deles. Era uma espécie de meu trabalho paralelo. E, bem, acho que, como ninguém mais está assumindo a responsabilidade, ainda tenho que fazer isso! Então, tenho feito inspeções de segurança nos golens. Fiz algumas soluções fáceis, mas os problemas mais assustadores exigem peças especiais.\""
"Salmpo Phelps in Statehelm said, \"The best loading golems have a cutting mode to open tough crates. The ones we have left on the docks don't have that feature, though. I was thinking, maybe I could install it. If I had some cutting arms, I mean.\"": "Salmpo Phelps, da Statehelm, disse: \"Os melhores golens de carregamento têm um modo de corte para abrir caixas resistentes. Os que deixamos nas docas, no entanto, não têm esse recurso. Eu estava pensando, talvez pudesse instalá-lo. Se eu tivesse alguns braços cortantes, quero dizer.\""
"Salt": "Sal"
"Saltpeter": "Salitre"
