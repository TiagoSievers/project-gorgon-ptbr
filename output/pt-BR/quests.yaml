"Snapley told me the pitiful tale of the settlement outside. Here is a detail he did not know: the strike was ordered by General Naurlok himself, and was executed by his elite legion. And here is where things become interesting. For you see, ghosts often retain something of what they had when they died. And if they died with spear heads from Naurlok's Avengers still stuck in them... that metal is precious! I cannot even make it myself.

You should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.": "Snapley me contou a lamentável história do assentamento lá fora. Aqui está um detalhe que ele não sabia: o ataque foi ordenado pelo próprio General Naurlok e executado por sua legião de elite. E é aqui que as coisas se tornam interessantes. Para você ver, os fantasmas muitas vezes retêm algo do que tinham quando morreram. E se eles morreram com pontas de lança dos Vingadores de Naurlok ainda presas neles... esse metal é precioso! Eu não consigo nem fazer isso sozinho.

Você deveria destruir alguns desses fantasmas e ver se consegue encontrar metal orc. Pagarei em Conselhos."
"Sneaky Sewer Fae": "Fae do Esgoto Sorrateiro"
