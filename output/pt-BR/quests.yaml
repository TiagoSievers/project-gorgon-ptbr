"Bogaku in the Rahu Sewers said, \"Even if these ratkin aren't growing crops here, they're surely making their own cheese! I need a sample of their aged cheese... perhaps it will tell us secrets. Now, when I say that, I don't mean cheese can talk. So don't be afraid. Just get the cheese.\"": "Bogaku, nos Esgotos de Rahu, disse: \"Mesmo que esses ratkin não estejam cultivando aqui, eles certamente estão fazendo seu próprio queijo! Preciso de uma amostra de seu queijo envelhecido... talvez ele nos conte segredos. Agora, quando digo isso, não quero dizer que o queijo pode falar. Portanto, não tenha medo. Apenas pegue o queijo.\""
"Bogaku in the Rahu Sewers said, \"Have you found that these ratkin are superstitious? Most are! They even carry good-luck charms, the pathetic things. Hmm, go and find me some of their charms.\"": "Bogaku, nos esgotos de Rahu, disse: \"Você descobriu que esses ratkin são supersticiosos? A maioria é! Eles até carregam amuletos de boa sorte, coisas patéticas. Hmm, vá e encontre alguns de seus amuletos para mim.\""
"Bogaku in the Rahu Sewers said, \"I had a thought about the tree-mutants down here. Have you tried pruning them? You have? But they just wilt away? Hmmm.

Well, there must be some way to save part of the tree. Try chopping them up after you kill them and see what you can find.\"": "Bogaku, nos Esgotos Rahu, disse: \"Tive uma ideia sobre as árvores mutantes aqui. Você já tentou podá-las? Já tentou? Mas elas simplesmente murcharam? Hmmm.

Bem, deve haver alguma maneira de salvar parte da árvore. Tente cortá-los depois de matá-los e veja o que consegue encontrar.\""
"Bogaku in the Rahu Sewers said, \"I had a thought: how relaxed are these ratkin? Sneak into their home areas and kick them! Now, I only need to know about the off-duty ones: do they fight, or flee, or something else? Of course, you can kick whoever you want! But for this test, it has to be the off-duty ones.\"": "Bogaku, nos Esgotos de Rahu, disse: \"Tive um pensamento: quão relaxados são esses ratkin? Entre furtivamente em suas áreas de origem e chute-os! Agora, só preciso saber sobre os que estão fora de serviço: eles lutam, ou fogem, ou qualquer outra coisa? Claro, você pode chutar quem quiser! Mas para este teste, tem que ser os que estão fora de serviço.\""
"Bogaku in the Rahu Sewers said, \"I just don't understand how the necromancers convince their skeletons to mine! I'm not a necromancer myself, but I thought it was difficult to get them to do anything besides attack. Maybe there's a secret in the bones. Kill some and see if there's anything special about them.\"": "Bogaku, nos Esgotos Rahu, disse: \"Simplesmente não entendo como os necromantes convencem seus esqueletos a irem para os meus! Eu não sou um necromante, mas pensei que seria difícil fazê-los fazer qualquer coisa além de atacar. Talvez haja um segredo nos ossos. Mate alguns e veja se há algo especial sobre eles.\""
"Bogaku in the Rahu Sewers said, \"I wonder where these ratkin are getting their appetizers. Can you get some for me so I can check them?\"": "Bogaku, nos esgotos de Rahu, disse: \"Eu me pergunto onde esses ratkin estão conseguindo seus aperitivos. Você pode conseguir alguns para mim para que eu possa verificá-los?\""
"Bogaku in the Rahu Sewers said, \"Ratkin love to gamble, of course, but each region's ratkin have different methods. The ones around here seem to enjoy dice games. I need samples of their dice!

I suppose any ratkin could be carrying some dice, but off-duty ratkin are most likely to have 'em.\"": "Bogaku, nos Esgotos de Rahu, disse: \"Os Ratkin adoram jogar, é claro, mas os ratkin de cada região têm métodos diferentes. Os que estão por aqui parecem gostar de jogos de dados. Preciso de amostras de seus dados!

Suponho que qualquer ratkin poderia estar carregando alguns dados, mas é mais provável que ratkin fora de serviço os tenha."
"Bogaku in the Rahu Sewers said, \"Ratkin often farm snails for meat and shells, but the ones down here are huge! They must be mutants! Go stab some to death and see if they explode into glowing goo.\"": "Bogaku nos Esgotos Rahu disse: \"Ratkin costuma criar caracóis para obter carne e conchas, mas os que estão aqui embaixo são enormes! Eles devem ser mutantes! Vá esfaquear alguns até a morte e veja se eles explodem em uma gosma brilhante.\""
"Bogaku in the Rahu Sewers said, \"Rattus root is a favorite snack of these barbaric vermin. I'm sure to a mutant like you it just looks like a root, right? But to a gobthropologist, it's like an open book! A book of secrets! So go get me my secret books! I mean rattus roots!\"": "Bogaku nos Esgotos Rahu disse: \"A raiz de Rattus é o lanche favorito desses vermes bárbaros. Tenho certeza de que para um mutante como você parece apenas uma raiz, certo? Mas para um gobtropólogo, é como um livro aberto! Um livro de segredos! Então vá buscar meus livros secretos! Quero dizer raízes de rattus!\""
"Bogaku in the Rahu Sewers said, \"The ratkin are farming fish in here... freshwater fish! That's not unusual further inland, but this close to the sea, it seems odd, doesn't it? Maybe these fish are atypical somehow. Oh, you don't understand biology anyway... look, just get me a bunch of these fish, okay?\"": "Bogaku, nos esgotos de Rahu, disse: \"Os ratkin estão criando peixes aqui... peixes de água doce! Isso não é incomum no interior, mas tão perto do mar parece estranho, não é? Talvez esses peixes sejam de alguma forma atípicos. Ah, você não entende de biologia de qualquer maneira... olha, só me traga um monte desses peixes, ok?\""
"Bogaku in the Rahu Sewers said, \"The ratkin around here rely heavily on necromancy to help them mine faster. And I noticed the necromancers often have giant white rats with them. They don't look like good tunneling rats... I wonder what they're for?

No, stop talking. I don't care about a monster's opinions... make yourself useful and go murder some rats. See if they're living or undead. Remember, undead ones don't bleed much!\"": "Bogaku, nos Esgotos Rahu, disse: \"Os ratkin por aqui dependem muito da necromancia para ajudá-los a minerar mais rápido. E notei que os necromantes costumam trazer ratos brancos gigantes com eles. Eles não parecem bons ratos para escavar túneis... Eu me pergunto para que servem?

Não, pare de falar. Eu não me importo com a opinião de um monstro... seja útil e vá matar alguns ratos. Veja se eles estão vivos ou mortos-vivos. Lembre-se, os mortos-vivos não sangram muito!\""
"Bogaku in the Rahu Sewers said, \"The ratkin seem to be growing an orchard of sentient trees down here! That is FASCINATING! Right? But how old are these trees? Go and chop down some of these trees and see how many rings they have.

Wait, trees can be over a hundred years old. Can you count all the way to 100, monster? Well, try your best! Hurry, now.\"": "Bogaku nos Esgotos Rahu disse: \"Os ratkin parecem estar cultivando um pomar de árvores sencientes aqui! Isso é FASCINANTE! Certo? Mas quantos anos têm essas árvores? Vá e corte algumas dessas árvores e veja quantos anéis elas têm.

Espere, as árvores podem ter mais de cem anos. Você consegue contar até 100, monstro? Bem, tente o seu melhor! Depressa, agora.\""
"Bogaku in the Rahu Sewers said, \"These ratkin are unusually good at necromancy. I wonder exactly how powerful they are? Hmm...

Oh, hi there mutant, I have a small test for you. Go and get yourself shot by some ratkin necromancers. Try not to die, though! I need to ask you some questions after, and I can't speak with the dead! Because I'm not a necromancer!\"": "Bogaku nos Esgotos Rahu disse: \"Esses ratkin são excepcionalmente bons em necromancia. Eu me pergunto exatamente o quão poderosos eles são? Hmm...

Oh, olá mutante, tenho um pequeno teste para você. Vá e leve um tiro de alguns necromantes ratkin. Tente não morrer, no entanto! Preciso fazer algumas perguntas depois e não posso falar com os mortos! Porque eu não sou um necromante!\""
"Bogaku in the Rahu Sewers said, \"You said the skeleton miners were just like regular skeletons, right? But what about the NON-skeleton miners? Hmm? You didn't take notes on those, did you? Well go back and see if the living miners are weird in any way. Remember to search their guts for clues!\"": "Bogaku nos Esgotos Rahu disse: \"Você disse que os mineiros esqueletos eram como esqueletos normais, certo? Mas e os mineiros NÃO esqueletos? Hmm? Você não fez anotações sobre eles, não é? Bem, volte e veja se os mineiros vivos são estranhos de alguma forma. Lembre-se de procurar pistas em suas entranhas! \""
"Bogaku's Lost Notebook": "Caderno Perdido de Bogaku"
