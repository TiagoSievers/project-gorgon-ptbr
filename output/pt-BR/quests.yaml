"Deep in the farming area are a bunch of Guardians. You know, the thuggish-looking ones? Glowball on their head? Yeah. The ones in this den are pretty dumb, but they're mean in a fight. If you kill them, it'll demoralize everyone. And that's good.": "Nas profundezas da área agrícola há um grupo de Guardiões. Você sabe, aqueles com aparência de bandido? Bola luminosa na cabeça deles? Sim. Os que estão nesta toca são muito burros, mas são maus em uma briga. Se você matá-los, isso desmoralizará a todos. E isso é bom."
"Deep in the legling training area is the mage training section. Right now they're mostly doing stone-shaping, so look for the poorly-worked stones. You definitely want to take these mages out before they fully master their abilities!": "Bem no fundo da área de treinamento de legling está a seção de treinamento de mago. No momento, eles estão principalmente moldando pedras, então procure as pedras mal trabalhadas. Você definitivamente quer eliminar esses magos antes que eles dominem totalmente suas habilidades!"
