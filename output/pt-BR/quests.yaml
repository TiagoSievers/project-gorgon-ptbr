"Tavilak in Red Wing Casino said, \"A guest told me that moss agates have magical properties that enhance the growth speed of a garden. She was unable to explain the exact nature of this magic, however. If I had a number of moss agates, perhaps I could find the secret!\"": "Tavilak, do Red Wing Casino, disse: \"Uma convidada me disse que as ágatas musgosas têm propriedades mágicas que aumentam a velocidade de crescimento de um jardim. Ela não foi capaz de explicar a natureza exata dessa magia, no entanto. Se eu tivesse várias ágatas musgosas, talvez pudesse descobrir o segredo!\""
"Tavilak in Red Wing Casino said, \"Thank you for aiding me. If you have time to continue the Natural Food Experience, please grow several beets and mention that it is a joy to do so.\"": "Tavilak, do Red Wing Casino, disse: \"Obrigado por me ajudar. Se você tiver tempo para continuar a Experiência Alimentar Natural, plante várias beterrabas e mencione que é uma alegria fazê-lo.\""
"Tavilak in Red Wing Casino said, \"The Natural Food Experience ends with a difficult task: growing carrots. This is not a task that the average guest can complete during their stay. As a result, reported guest satisfaction is extraordinarily low. Please grow some carrots and exclaim that you are not perturbed by the slow growing speed of organic matter.\"": "Tavilak, do Red Wing Casino, disse: \"A experiência alimentar natural termina com uma tarefa difícil: cultivar cenouras. Esta não é uma tarefa que o hóspede médio possa realizar durante sua estadia. Como resultado, a satisfação relatada dos hóspedes é extraordinariamente baixa. Por favor, cultive algumas cenouras e exclame que você não está perturbado pela lenta velocidade de crescimento da matéria orgânica.\""
"Tavilak in Red Wing Casino said, \"Very few guests are participating in the Natural Food Experience. Many claim that it is boring or too similar to manual labor to be entertaining. I must increase guest satisfaction before this attraction is closed! Perhaps you would like to participate? Simply grow some onions in the garden and exclaim that you are enjoying yourself.\"": "Tavilak, do Red Wing Casino, disse: \"Muito poucos convidados estão participando da Natural Food Experience. Muitos afirmam que é chato ou muito semelhante ao trabalho manual para ser divertido. Devo aumentar a satisfação dos hóspedes antes que esta atração seja fechada! Talvez você gostaria de participar? Simplesmente cultive algumas cebolas no jardim e diga que você está se divertindo. \""
