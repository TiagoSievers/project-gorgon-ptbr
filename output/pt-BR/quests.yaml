"Pitre Ferrence in Vidaria said, \"I was stationed here to keep an eye on Korbok, so to hear that you collected various poisons for him is troubling. Doubly so, that he winked at you when you gave them to him. Bring me a sampling of all of the poisons that you gave him, so I can try to suss out what he's working on without confronting him directly.\"": "Pitre Ferrence em Vidaria disse: \"Eu estava estacionado aqui para ficar de olho em Korbok, então saber que você coletou vários venenos para ele é preocupante. Duplamente, que ele piscou para você quando você os deu a ele. Traga-me uma amostra de todos os venenos que você deu a ele, para que eu possa tentar descobrir no que ele está trabalhando sem confrontá-lo diretamente. \""
"Pitre Ferrence in Vidaria said, \"My alchemist contact in Statehelm insists there are no commonalities in the poisons that Korbok had you retrieve. Mr. Farblood himself even took a look, to no avail. There must be something deeper going on here.

Take this journal, and keep as detailed notes in it as you can. Get in close with Korbok, see if there's any more poison-related missions he can send you on, and just try to gather more info in general. While I do find him and his kind fascinating, I cannot let that get in the way of my primary assignment.\"": "Pitre Ferrence em Vidaria disse: \"Meu contato alquimista em Statehelm insiste que não há semelhanças nos venenos que Korbok fez você recuperar. O próprio Sr. Farblood até deu uma olhada, sem sucesso. Deve haver algo mais profundo acontecendo aqui.

Pegue este diário e faça anotações tão detalhadas quanto possível. Aproxime-se de Korbok, veja se há mais missões relacionadas a veneno para as quais ele possa enviá-lo e tente coletar mais informações em geral. Embora eu ache ele e sua espécie fascinantes, não posso deixar que isso atrapalhe minha tarefa principal.\""
