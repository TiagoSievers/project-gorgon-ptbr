"Michael Irasce in Statehelm said, \"Here's another book order I'm stuck on. We just don't get many orcish traders so finding these books in Orcish has been tough!\"": "Michael Irasce, em Statehelm, disse: \"Aqui está outro pedido de livro em que estou preso. Simplesmente não temos muitos comerciantes orcs, então encontrar esses livros em Orc tem sido difícil!\""
"Michael Irasce in Statehelm said, \"Here's another crazy order. How am I going to fill this?! I need \"schematics and maintenance instructions for an Exetar-class ship.\" I understand some of those words...

Well, no pressure but see what you can do.\"": "Michael Irasce, da Statehelm, disse: \"Aqui está outra ordem maluca. Como vou cumprir isso?! Preciso de \"esquemas e instruções de manutenção para uma nave da classe Exetar\". Eu entendo algumas dessas palavras...

Bem, sem pressão, mas veja o que você pode fazer.\""
"Michael Irasce in Statehelm said, \"Here, can you fill this book order? I don't have any of these. They want... Hm what are these books, exactly? I guess they're instructions on sewing advanced bardic equipment. Oh, that makes sense given who the order is from. Are these rare? I assumed so, and I quoted her quite a high price. If you can find them, I'll give you half the pay.\"": "Michael Irasce, em Statehelm, disse: \"Aqui, você pode atender ao pedido deste livro? Eu não tenho nenhum desses. Eles querem... Hm, o que são esses livros, exatamente? Acho que são instruções sobre costura de equipamentos bárdicos avançados. Ah, isso faz sentido, considerando de quem é o pedido. Eles são raros? Presumi que sim, e citei um preço bastante alto para ela. Se você puder encontrá-los, eu lhe darei metade do pagamento. \""
"Michael Irasce in Statehelm said, \"I have a special book order for alchemy tutorials. I have some of the needed books, but here are the ones I don't have copies of. Can you look for them? I'll pay well.\"": "Michael Irasce, em Statehelm, disse: \"Tenho um pedido especial de livros para tutoriais de alquimia. Tenho alguns dos livros necessários, mas aqui estão aqueles dos quais não tenho cópias. Você pode procurá-los? Pagarei bem.\""
"Michael Irasce in Statehelm said, \"I have a special book request that I could use your help with. If I can sell this, it will make up for months of poor sales!

The book I need is \"The Lost Travels of Romast.\" It didn't exactly have a large print run. There are probably only a few copies across all of Alharth. But I have a lead!

A certain... friend... with greenish skin... who lives in a cave in Povus has a copy hidden deep in her cave. But she says the deep cave is \"too scary nowadays\" and she can't retrieve it for me. She says it's hidden behind a gilded chest. I'm sure that should make it easy to find. Right?

This book is priceless, so I will give you priceless knowledge in exchange.\"": "Michael Irasce, da Statehelm, disse: \"Tenho um pedido especial de livro para o qual gostaria de sua ajuda. Se eu conseguir vender isso, compensarei meses de vendas fracas!

O livro que preciso é \"As Viagens Perdidas de Romast\". Não teve exatamente uma tiragem grande. Provavelmente existem apenas algumas cópias em toda Alharth. Mas eu tenho uma pista!

Uma certa... amiga... de pele esverdeada... que mora em uma caverna em Povus tem uma cópia escondida nas profundezas de sua caverna. Mas ela diz que a caverna profunda é “muito assustadora hoje em dia” e ela não pode recuperá-la para mim. Ela diz que está escondido atrás de um baú dourado. Tenho certeza de que isso deve facilitar a localização. Certo?

Este livro não tem preço, então em troca lhe darei um conhecimento inestimável.\""
"Michael Irasce in Statehelm said, \"I've been trying to fill this book order for a long time! I have most of the requested titles but she only wants a 100% complete order. Here's the books I need.\"": "Michael Irasce, da Statehelm, disse: \"Há muito tempo venho tentando atender ao pedido deste livro! Tenho a maioria dos títulos solicitados, mas ela só quer um pedido 100% completo. Aqui estão os livros de que preciso.\""
"Midge in the Fae Realm said, \"If I can make a potion to fix my mind, it might fix yours too! Can you bring me some ingredients I'm missing?\"": "Midge, no Reino Fae, disse: “Se eu puder fazer uma poção para consertar minha mente, ela também poderá consertar a sua! Você pode me trazer alguns ingredientes que estão faltando?”"
"Midge in the Fae Realm said, \"If I can make a potion to fix my mind, it might fix yours too! Can you grind up some mushroom flakes for me?\"": "Midge, no Reino Fae, disse: \"Se eu puder fazer uma poção para consertar minha mente, ela também poderá consertar a sua! Você pode moer alguns flocos de cogumelo para mim?\""
"Midge in the Fae Realm said, \"Look, I don't need random help from random mortals! I used to be an expert alchemist, and I know there was a method to inhibit memory. If I could remember how to make memory-inhibitors, maybe I could find a reversal effect... anyway, if you happen to have a memory-inhibitor potion, that'd be great. Otherwise, you can help best by bringing me the ingredients I need! I'll barter for royal jelly.\"": "Midge, no Reino Fae, disse: \"Olha, eu não preciso de ajuda aleatória de mortais aleatórios! Eu costumava ser um alquimista especialista e sei que havia um método para inibir a memória. Se eu pudesse me lembrar de como fazer inibidores de memória, talvez eu pudesse encontrar um efeito de reversão... de qualquer forma, se acontecer de você ter uma poção inibidora de memória, isso seria ótimo. Caso contrário, você pode ajudar melhor, trazendo-me os ingredientes que preciso! Vou trocar por geléia real. \""
"Midge in the Fae Realm said, \"Look, I don't need random help from random mortals! Somebody brought me this potion of memory inhibition, and I've been studying it. I think I can invert the effect. Well, I can invert <i>something</i>: memories, emotions, internal organs, something. And something is better than nothing.

I wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!\"": "Midge, no Reino Fae, disse: \"Olha, não preciso de ajuda aleatória de mortais aleatórios! Alguém me trouxe esta poção de inibição de memória e estou estudando-a. Acho que posso inverter o efeito. Bem, posso inverter <i>alguma coisa</i>: memórias, emoções, órgãos internos, alguma coisa. E algo é melhor do que nada.

Anotei as coisas que preciso, mas hmm, elas terão que vir de um mundo mortal. Espere, você é um mortal! Aqui. Pegue essas coisas! Depressa! Vá!\""
"Midge in the Fae Realm said, \"Maybe it's for the best that we can't remember anything. Maybe we don't want to remember. But it's not fair that I can't make new memories! It's not my fault I died over and over! Not this time!

<i>[Midge sighs.]</i>

There's a mortal drink I like. It tastes awful, but it does help me relax a little. I think it's called a Perker Up? Peaky Cup? Pick Me up? Something like that.\"": "Midge, no Reino Fae, disse: \"Talvez seja melhor não conseguirmos lembrar de nada. Talvez não queiramos lembrar. Mas não é justo que eu não possa criar novas memórias! Não é minha culpa ter morrido repetidamente! Não desta vez!

<i>[Midge suspira.]</i>

Há uma bebida mortal que eu gosto. O gosto é horrível, mas me ajuda a relaxar um pouco. Eu acho que é chamado de Perker Up? Copa Pico? Me pegue? Algo assim.\""
"Midge the Apothecary lost her memory also! Maybe she can help you with yours!": "Midge, a Boticária, também perdeu a memória! Talvez ela possa te ajudar com o seu!"
