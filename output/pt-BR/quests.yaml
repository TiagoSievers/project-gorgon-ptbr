"Mom always told me to forgive and forget my father. But I don't think she ever really did. And I sure as hell haven't! It gnaws at me, even now.

I guess it's my orcish side, but I just think I'd be so much happier if he were dead!": "Mamãe sempre me disse para perdoar e esquecer meu pai. Mas não acho que ela realmente tenha feito isso. E eu com certeza não! Isso me atormenta, mesmo agora.

Acho que é o meu lado orc, mas acho que ficaria muito mais feliz se ele estivesse morto!"
