"Journey to these places and give them a good cleaning! It's not all for free either": "we're willing to pay you for your troubles! We have installed tracking crystals in each of the areas to ensure you are showing up and doing the work. There are 2 of these crystals in each area. Once you have cleared the area, just use the crystal to check in and your work progress will be logged for payroll. After you have checked in to both crystals in that area, you will gain access to the reward cache located at the area entrance. Look through what's in there and pick out whatever looks interesting to you."
"Julius Patton in Serbule Hills said, \"Do you know how to make spore bombs? I need some nice potent ones. I use 'em to scare away pests that get on the farm.\"": "Julius Patton, em Serbule Hills, disse: \"Você sabe como fazer bombas de esporos? Preciso de algumas potentes. Eu as uso para espantar as pragas que chegam à fazenda.\""
"Julius Patton in Serbule Hills said, \"I loaned old Vera my best garden spade a year ago. Then, of course, she was killed and horrifically eaten by goblins. But my spade might still be in her house! If I was braver, I'd go look for it.

Vera's farm is northeast of here.\"": "Julius Patton, em Serbule Hills, disse: “Emprestei à velha Vera minha melhor pá de jardim há um ano.

A fazenda de Vera fica a nordeste daqui.\""
"Julius Patton in Serbule Hills said, \"I used to grow veggies myself, but I don't move as smoothly as I used to. Gotta save my energy for the grapes! Which means I'm in a bit of an embarrassing situation: I need to restock my larder with onions. Can you grow some for me?\"": "Julius Patton, em Serbule Hills, disse: \"Eu costumava cultivar vegetais, mas não me movo tão bem como antes. Tenho que economizar energia para as uvas! O que significa que estou em uma situação um pouco embaraçosa: preciso reabastecer minha despensa com cebolas. Você pode cultivar algumas para mim?\""
"Julius Patton in Serbule Hills said, \"Man, I wish I had a watercress salad for lunch! The spice, with a hint of vinegar dressing... delicious! But I'm just getting myself worked up for nothing. I don't have any of the ingredients on hand!\"": "Julius Patton, em Serbule Hills, disse: \"Cara, gostaria de ter uma salada de agrião no almoço! O tempero, com um toque de vinagre... delicioso! Mas estou me empolgando por nada. Não tenho nenhum dos ingredientes em mãos!\""
"Jumjab said he'd come, but expects payment? Well, of course. No goblin works for free. And you shouldn't have to, either. Here's some coin for your trouble.": "Jumjab disse que viria, mas espera pagamento? Bem, é claro. Nenhum goblin trabalha de graça. E você também não deveria. Aqui está uma moeda para o seu trabalho."
"Jumper in Sun Vale's Animal Town asked you to bring him some evil grass.": "Jumper em Animal Town de Sun Vale pediu que você trouxesse um pouco de grama maligna para ele."
"Jumper in Sun Vale's Animal Town asked you to bring him some grass.": "Jumper em Animal Town de Sun Vale pediu que você trouxesse um pouco de grama para ele."
"Jumper in Sun Vale's Animal Town asked you to bring him troll flesh.": "Jumper em Animal Town de Sun Vale pediu que você trouxesse carne de troll para ele."
"Jumper in Sun Vale's Animal Town asked you to defeat the Bridge Bully, a ranalan that lives in the river near a natural crossing point.": "Jumper em Animal Town de Sun Vale pediu para você derrotar Bridge Bully, um ranalan que vive no rio perto de um ponto de passagem natural."
