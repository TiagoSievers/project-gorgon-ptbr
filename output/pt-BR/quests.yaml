"Guzor Harrison in Statehelm said, \"I'm working on an extremely interesting new spell, and to further my research, I need special reagents.

What I need are bones that have been superheated while still in the body of a living creature. Don't worry, I've researched just the right spell to help you get these -- I'll teach you the spell, when you have the capacity to learn it.

Once you know the spell, use it on some humans, elves, or rakshasa to collect perfectly charred femurs. ... And make sure to only kill those deserving of death. Obviously.\"": "Guzor Harrison, da Statehelm, disse: “Estou trabalhando em um novo feitiço extremamente interessante e, para continuar minha pesquisa, preciso de reagentes especiais.

O que preciso são ossos que foram superaquecidos enquanto ainda estavam no corpo de uma criatura viva. Não se preocupe, eu pesquisei o feitiço certo para ajudá-lo a conseguir isso - eu lhe ensinarei o feitiço, quando você tiver capacidade para aprendê-lo.

Depois de conhecer o feitiço, use-o em alguns humanos, elfos ou rakshasa para coletar fêmures perfeitamente carbonizados. ... E certifique-se de matar apenas aqueles que merecem a morte. Obviamente.\""
"Guzor Harrison in Statehelm said, \"In addition to getting three recommendations, you'll also need to pass a simple trial. Scattered near the university are three statuettes. Find them, activate them, and defeat their guardians. Hopefully you can manage something as simple as that.\"": "Guzor Harrison, em Statehelm, disse: \"Além de obter três recomendações, você também precisará passar por um teste simples. Há três estatuetas espalhadas perto da universidade. Encontre-as, ative-as e derrote seus guardiões. Espero que você consiga fazer algo tão simples como isso.\""
"Guzor Harrison in Statehelm said, \"Next I need to better understand how demons are so resistant to fire. Go and kill some of the medium-sized ones.

Oh, and wear this. It will automatically take detailed field notes.

<i>[To advance this quest you must be wearing the Fire Analysis Gem and using Fire Magic.]</i>\"": "Guzor Harrison, em Statehelm, disse: \"Em seguida, preciso entender melhor como os demônios são tão resistentes ao fogo. Vá e mate alguns dos de tamanho médio.

Ah, e use isso. Ele fará automaticamente anotações de campo detalhadas.

<i>[Para avançar nesta missão você deve estar usando a Gema de Análise de Fogo e usar Magia de Fogo.]</i>\""
"Guzor Harrison in Statehelm said, \"There are two requirements to join the Statehelm School of Magic. First, you'll also need to get recommendations from wizards that I trust. Here are some names. Get at least three to sign off on your competence. Oh, and don't bother trying to forge these letters. If they agree to recommend you, these good folks will know how to contact me directly.

<i>The following wizards can provide recommendations: The Sand Seer, Bendith the Banished, Velkort the Inferno, Ichin the Ice Master, Landri the Cold.</i>\"": "Guzor Harrison, em Statehelm, disse: \"Existem dois requisitos para ingressar na Escola de Magia Statehelm. Primeiro, você também precisará obter recomendações de magos em quem confio. Aqui estão alguns nomes. Obtenha pelo menos três para assinar sua competência. Ah, e não se preocupe em tentar falsificar essas cartas. Se eles concordarem em recomendá-lo, essas boas pessoas saberão como entrar em contato comigo diretamente.

<i>Os seguintes magos podem fornecer recomendações: O Vidente da Areia, Bendith, o Banido, Velkort, o Inferno, Ichin, o Mestre do Gelo, Landri, o Frio.</i>\""
"Guzor Harrison in Statehelm said, \"Work on my new spell continues. I suppose I will share the premise with you: it is a new kind of sentient flame, much more suitable to certain types of work.

But there is much research left. You seem competent enough to help with that research. Here's what I need you to do. Go find some rakshasa bandits, or pirates, or other socially undesirables, and kill them with fire. This next bit is very important: they need to die from the impact of a Scintillating Flame.

As you bury them, note whether they have a startled expression on their face.\"": "Guzor Harrison, em Statehelm, disse: \"O trabalho em meu novo feitiço continua. Suponho que compartilharei a premissa com você: é um novo tipo de chama senciente, muito mais adequada para certos tipos de trabalho.

Mas ainda há muita pesquisa. Você parece competente o suficiente para ajudar nessa pesquisa. Aqui está o que eu preciso que você faça. Vá encontrar alguns bandidos rakshasa, ou piratas, ou outros socialmente indesejáveis, e mate-os com fogo. A próxima parte é muito importante: eles precisam morrer pelo impacto de uma Chama Cintilante.

Ao enterrá-los, observe se eles têm uma expressão assustada no rosto.\""
