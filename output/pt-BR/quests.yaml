"First and foremost, you should find my... butler. He was once a ghoul. And I suppose he is still a ghoul, of a sort. But he is ... more. He can sense hatred in the air. It is MOST valuable.

Grasuul ran away when I was forced into repose. But I know where he would go: I spied a cursed lake near the ruby wall. He would no doubt be there, reveling in anguish. Grasuul is... not well.

Tell Grasuul that I have awoken. He will come back.": "Em primeiro lugar, você deveria encontrar meu... mordomo. Ele já foi um ghoul. E suponho que ele ainda seja uma espécie de ghoul. Mas ele é... mais. Ele pode sentir o ódio no ar. É MAIS valioso.

Grasuul fugiu quando fui forçado a descansar. Mas eu sei para onde ele iria: avistei um lago amaldiçoado perto da parede de rubi. Ele sem dúvida estaria lá, deleitando-se com a angústia. Grasuul não está... bem.

Diga a Grasuul que acordei. Ele voltará."
"First off: you're on my shit list for keeping me in the dark about all this. I can't believe you would go off and kill that sand rat Tal-Saka without me!

But all signs do point to Rahu itself being involved. If that were true, there should be proof of it somewhere. The Onkara keep their records up on a hill in Rahu. Unfortunately, going there would be suicide. Even for me. Even for you! So for now, I guess that's where this mystery will stand.": "Em primeiro lugar: você está na minha lista de merda por me manter no escuro sobre tudo isso. Não acredito que você iria matar aquele rato de areia Tal-Saka sem mim!

Mas todos os sinais apontam para o envolvimento do próprio Rahu. Se isso fosse verdade, deveria haver provas disso em algum lugar. Os Onkara mantêm seus registros em uma colina em Rahu. Infelizmente, ir para lá seria suicídio. Até para mim. Até para você! Então, por enquanto, acho que é aí que esse mistério permanecerá."
