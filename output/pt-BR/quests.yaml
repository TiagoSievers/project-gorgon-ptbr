"Solgribue in the Fae Realm said, \"Need more aquamarine gems. Need... hmm... four. Plus one extra.\"": "Solgribue no Reino Fae disse: \"Preciso de mais gemas de água-marinha. Preciso... hmm... quatro. Mais uma extra.\""
"Solgribue in the Fae Realm said, \"Want to help troll friends? Help with spiders on fire! Walk around all over near Firebird Mountain. Very scary to trolls. You kill. Good relations.\"": "Solgribue no Reino Fae disse: \"Quer ajudar amigos trolls? Ajude com aranhas em chamas! Ande por toda parte perto da Montanha Firebird. Muito assustador para trolls. Você mata. Boas relações.\""
"SoloHallsGuardian": "SoloHallsGuardião"
"Some Miner Tests": "Alguns testes de minerador"
"Some of my calligraphy projects require unusual paper. Right now I've been experimenting with paper made out of watercress! Do you happen to have any? And don't worry about freshness: I'm going to pound it into a paste anyway.": "Alguns dos meus projetos de caligrafia requerem papel incomum. No momento estou experimentando papel feito de agrião! Por acaso você tem algum? E não se preocupe com o frescor: vou transformá-lo em uma pasta de qualquer maneira."
"Some of my fly amanita has spread beyond my locus of control. They are mine and I desire to have them.": "Parte do meu amanita mosca se espalhou além do meu locus de controle. Eles são meus e eu desejo tê-los."
"Some of the crystals near the wall move. They move! You'll understand when you see them.

Please see if you can destroy them.": "Alguns dos cristais próximos à parede se movem. Eles se movem! Você entenderá quando os vir.

Por favor, veja se você pode destruí-los."
"Some of the most talented stone-shapers in the whole den are back working with the leglings today. Strike now! The mage supervisors are deep in the legling wing. Go past the legling gardeners, then keep right at the fork.": "Alguns dos modeladores de pedra mais talentosos de toda a toca voltaram a trabalhar com os leglings hoje. Ataque agora! Os magos supervisores estão nas profundezas da ala legling. Passe pelos jardineiros legling e mantenha-se à direita na bifurcação."
"Some Pretty Weird Books": "Alguns livros bem estranhos"
"Some rakshasa wants to know about tofu? Are you sure he didn't mean cheese? Everyone loves cheese! Tofu is so boring, so last decade. But sure. Do me a couple of favors and I'll show you the basics.": "Algum rakshasa quer saber sobre tofu? Tem certeza de que ele não quis dizer queijo? Todo mundo adora queijo! Tofu é tão chato, tão chato na década passada. Mas claro. Faça-me alguns favores e eu lhe mostrarei o básico."
"Some random wanderer told me that in a far off land, they make armor out of snail shells using the same techniques I use to make tools. Ridiculous, isn't it?

Go find out if it's true. Search far and wide! Leave no stone unturned!

Well, if you want a hint, sure... I heard that some inn keeper in Eltibule is an expert at using snail bits.": "Algum andarilho aleatório me contou que em uma terra distante eles fazem armaduras com cascas de caracóis usando as mesmas técnicas que eu uso para fazer ferramentas. Ridículo, não é?

Vá descobrir se é verdade. Pesquise em toda parte! Não deixe pedra sobre pedra!

Bem, se você quiser uma dica, claro... Ouvi dizer que um dono de pousada em Eltibule é especialista em usar pedaços de caracol."
"Some sort of entity spoke to you on Sun Vale Island's south beach. It asked you to remove invasive ice fish via angling.": "Algum tipo de entidade falou com você na praia sul da Ilha Sun Vale. Ele pediu que você removesse peixes de gelo invasores por meio da pesca."
"Somebody needs to take care of all the damned leg bones wandering around in the graveyard! It's one thing to run away from a full skeleton but I'll be damned if I'm running away from a single leg. I was able to suspend disbelief at a whole fleshless body, but just one leg? One leg that for some reason kicks like a mule? I won't have it. It's an undignified way to die, and the graveyard needs all the dignity it can muster.

So as I say, <i>somebody</i> should do something about it. Somebody braver than the town guards.

<i>[Gregory looks at you.]</i>": "Alguém precisa cuidar de todos os malditos ossos das pernas que vagam pelo cemitério! Uma coisa é fugir de um esqueleto completo, mas serei amaldiçoado se estiver fugindo de uma única perna. Consegui suspender a descrença diante de um corpo inteiro sem carne, mas apenas uma perna? Uma perna que por algum motivo chuta como uma mula? Eu não vou permitir isso. É uma forma indigna de morrer, e o cemitério precisa de toda a dignidade que puder reunir.

Então, como eu digo, <i>alguém</i> deveria fazer algo a respeito. Alguém mais corajoso que os guardas da cidade.

<i>[Gregory olha para você.]</i>"
"Someday when I've mastered geology, I'd like to learn more about Anthropology, too: the study of Humans! I guess primitive people just fascinate me. Did you know that Humans discovered cooking before they discovered fire magic? Really! I don't know how they controlled fire without magic, though. I guess that's a mystery lost to the ages.

Speaking of old human cooking, I heard there are antique Human-made spoons in the crypts and caves near here. Could you get me a sample spoon? It'd be fascinating.": "Algum dia, quando eu dominar a geologia, gostaria de aprender mais sobre a antropologia também: o estudo dos humanos! Acho que as pessoas primitivas simplesmente me fascinam. Você sabia que os humanos descobriram a culinária antes de descobrirem a magia do fogo? Realmente! Mas não sei como eles controlavam o fogo sem magia. Acho que é um mistério perdido ao longo dos tempos.

Falando em culinária humana antiga, ouvi dizer que há colheres antigas feitas por humanos nas criptas e cavernas perto daqui. Você poderia me dar uma colher de amostra? Seria fascinante."
"Someone has stolen all the spoons from our tea set. Please hurry. The tea is not getting any fresher.": "Alguém roubou todas as colheres do nosso jogo de chá. Por favor, se apresse. O chá não está ficando mais fresco."
"Someone has tried to open this chest by kicking it in. It's now unopenable. But it seems like you could pop it open if you had just the right leverage. A large-ish spoon should do the trick.": "Alguém tentou abrir este baú chutando-o. Agora não pode ser aberto. Mas parece que você poderia abri-lo se tivesse a alavancagem certa. Uma colher grande deve resolver."
"SomePrettyWeirdBooks": "Alguns livros bem estranhos"
"Something unexpected happened when I was making the candy for the staves. It had to be a fluke because I didn't expect it! Anyway, the candy's ruined. Everything's ruined. My hopes, my dreams...

Haha, just kidding! I have a new, better idea. This is really my best one yet: cinammon-coated bananas! No. Cinnamon-BLASTED bananas! I think I have the perfect marketing strategy for 'em so bring me several samples.": "Algo inesperado aconteceu quando eu estava fazendo os doces para as varas. Deve ter sido um acaso porque eu não esperava! De qualquer forma, o doce está estragado. Está tudo arruinado. Minhas esperanças, meus sonhos...

Haha, estou brincando! Tenho uma ideia nova e melhor. Este é realmente o meu melhor: bananas cobertas com canela! Não. Bananas com canela! Acho que tenho a estratégia de marketing perfeita para eles, então traga-me algumas amostras."
"Sometimes delicious beer uses gross ingredients. Mushrooms, for instance! But I've found that my boletus-and-apple pale ale is incredibly delicious! I've just run out of boletus mushrooms. Can you gather some for me?": "Às vezes, uma cerveja deliciosa usa ingredientes grosseiros. Cogumelos, por exemplo! Mas descobri que minha pale ale de boleto e maçã é incrivelmente deliciosa! Acabei de ficar sem cogumelos boletos. Você pode reunir alguns para mim?"
"Sometimes ice slimes fall down the mountain, but not in numbers like this. The animals that live in the valley don't know how to avoid ice slimes. They're sitting ducks! And deer, and goats, and other animals! Not to mention those dwarves that live in the New Prestonbule cave. Please help me lower the number of ice slicks down there!\\\"\": \"Trekker em Gazluk disse": "\\\"Psiu... você está com os Guardiões? Uau! Eu esperava que chegassem reforços!"
"Sometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!\": \"Conheci o famoso Denton Razor enquanto estava em Vidaria. Você pode dizer que ele é meu inimigo": "eu sou o mestre da besta e ele do arco. Mas não tenho medo de dizer que ele é o meu melhor em muitos aspectos. Uma vez tive a chance de matá-lo e o deixei viver. As coisas ficaram estranhas depois disso."
"Sometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!\\\"\": \"Sir Fisk em Statehelm disse": "\\\"Conheci o famoso Denton Razor enquanto estava estacionado em Vidaria. Você pode dizer que ele é meu inimigo: eu sou o mestre da besta e ele do arco. Mas não tenho medo de dizer que ele é meu melhor em muitos aspectos. Uma vez que tive a chance de matá-lo, deixei-o viver. As coisas ficaram estranhas depois disso."
"Sometimes you need an earthy wine, and carrot does the trick! Have you made any?": "Às vezes você precisa de um vinho terroso, e a cenoura resolve! Você fez algum?"
"Somewhere north of here, nearish Serbule Keep, is a massive door. This traditional showy dwarf door leads to the long-dead city of Borghild. No dwarves live there, but it's infested with undead.

You will ... How do I put this politely? You are quite formidable, but you would be wise to bring some allies with you into Borghild. It is full of traps.

Do this for me and I shall bequeath upon you one of my grandest weather wands.": "Em algum lugar ao norte daqui, perto da Fortaleza de Serbule, há uma porta enorme. Esta tradicional porta anã vistosa leva à cidade há muito morta de Borghild. Não há anões morando lá, mas está infestado de mortos-vivos.

Você vai... Como posso dizer isso educadamente? Você é bastante formidável, mas seria sensato trazer alguns aliados com você para Borghild. Está cheio de armadilhas.

Faça isso por mim e eu lhe legarei uma das minhas maiores varinhas meteorológicas."
"Somos simpáticos, você e eu": "eu te dou empregos e você faz os trabalhos! Essa invasão mental está funcionando muito melhor do que o normal!\""
"Sona in New Prestonbule said, \"I have thought about what Urzab told you: that my assistants may be involved in the attempt on my life. Rick already tracked down one of them, and she knew nothing. He couldn't find the other one...

But I know where Tal-Saka would have gone. I did not tell Rick because I won't let him get hurt for me! But if <i>you</i> wanted to go and confront Tal-Saka... I would be grateful.

Tal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.\"": "Sona em New Prestonbule disse: \"Pensei no que Urzab lhe disse: que meus assistentes podem estar envolvidos no atentado contra minha vida. Rick já localizou um deles e ela não sabia de nada. Ele não conseguiu encontrar o outro...

Mas eu sei para onde Tal-Saka teria ido. Eu não contei ao Rick porque não vou deixar ele se machucar por minha causa! Mas se <i>você</i> quisesse confrontar Tal-Saka... eu ficaria grato.

Tal-Saka sempre falava de seus amigos vagabundos que vivem em um posto avançado no deserto em ruínas. Para encontrar o posto avançado, comece em Amulna e siga para leste. A viagem é longa, então traga água. E tenha cuidado! Será perigoso.\""
"Sona in New Prestonbule said, \"I would like your help on a delicate subject. I need to know if the goblin Urzab had anything to do with what happened to me in the desert. He lives in Amulna.

There is a catch, however: he only speaks goblinese. Rick has confronted him, but Rick's goblinese is poor and he is not sure he understood everything. Do you happen to be fluent? If so, could you speak to Urzab about the attempt on my life?\"": "Sona em New Prestonbule disse: \"Gostaria de sua ajuda em um assunto delicado. Preciso saber se o goblin Urzab teve alguma coisa a ver com o que aconteceu comigo no deserto. Ele mora em Amulna.

Há um porém: ele só fala goblinês. Rick o confrontou, mas o goblinês de Rick é pobre e ele não tem certeza se entendeu tudo. Por acaso você é fluente? Se sim, você poderia falar com Urzab sobre o atentado contra minha vida?\""
"Sona in New Prestonbule said, \"I've been trying to convince Mox that Transmutation can revolutionize mining. But he won't listen. So I need your help. It will be dangerous... but worthwhile! I need a piece of the evil yellow crystals that can be found outside, plus some high-quality phlogiston. I believe I can make the crystal safe for transit!\"": "Sona em New Prestonbule disse: \"Tenho tentado convencer Mox de que a Transmutação pode revolucionar a mineração. Mas ele não quer ouvir. Então, preciso da sua ajuda. Será perigoso... mas vale a pena! Preciso de um pedaço dos cristais amarelos malignos que podem ser encontrados lá fora, além de um flogisto de alta qualidade. Acredito que posso tornar o cristal seguro para trânsito!\""
"Sona's recovering well after her incident. Mox helped a lot. But she's still walking with a slight limp. Mox says he can make something for that, but he needs ghost puke. So if you find some, save it.": "Sona está se recuperando bem após o incidente. Mox ajudou muito. Mas ela ainda anda mancando levemente. Mox diz que pode fazer algo para isso, mas precisa de vômito fantasma. Então, se você encontrar algum, salve-o."
"SongOfDiscordActivation": "Ativação SongOfDiscord"
"Sorry about that": "I accidentally lowered my standards for a second there. All better now!\": \"Não, não foi isso: você ainda não é divertido. Você tem um cheiro diferente, porém: florido, mas com um leve almíscar de suor... estranhamente bom, na verdade..."
"SorubimFillet": "Filé de Sorubim"
"Soup": "Sopa"
"SourCream": "Nata"
"Sourgum in Statehelm said, \"I know sticks. If it's one thing I know, that's it. That and finding precious resources. But mainly sticks, and I realized if I could coat the top half of my walking stick with a thick candy coat, I could lick the stick while I walk! ... it's childish, sure, but it would sell to the day-hikers of Statehelm! Any gimmick gets attention.

This is our ticket to riches: I'm cutting you in. You just need to do some legwork for us. First, I just need some food-grade wax. You do know you're way around a wax station, right? Great, great. Here's the recipe we need. Make us some of this.\"": "Sourgum em Statehelm disse: \"Eu conheço bastões. Se há uma coisa que sei, é isso. Isso e encontrar recursos preciosos. Mas principalmente gravetos, e percebi que se pudesse revestir a metade superior da minha bengala com um casaco grosso de doces, eu poderia lamber o bastão enquanto ando! ... é infantil, claro, mas seria vendido para os caminhantes diurnos de Statehelm! Qualquer truque chama a atenção.

Este é o nosso bilhete para a riqueza: estou abrindo mão de você. Você só precisa fazer um pouco de trabalho braçal para nós. Primeiro, só preciso de um pouco de cera de qualidade alimentar. Você sabe que está perto de uma estação de depilação, certo? Ótimo, ótimo. Aqui está a receita que precisamos. Faça-nos um pouco disso.\""
"Sourgum in Statehelm said, \"I was in my cups yesterday -- that's sailor slang, you probably don't know it -- it means I was EXTREMELY drunk. I've picked up a lot of sailor slang, but everyone knows I'm afraid of the ocean. On account of the krakens. So I pass out and when I wake up there's a note that says 'Your salami went sailing, come find us!'

Ha ha very funny, but the thing is, that salami was my latest experiment in creating the legendary Ur-Salami. And it seems to be a failed experiment! If anyone eats that salami, well... I might get in a lot of trouble. You gotta help.

I bet those fuckers hid my salami aboard the ships out there. They would have stayed away from the Salty Slattern, if that's any help to ya. You should hurry. The stench is evil. And no snacking on it!\"": "Sourgum em Statehelm disse: \"Eu estava bêbado ontem - isso é gíria de marinheiro, você provavelmente não sabe - significa que eu estava EXTREMAMENTE bêbado. Eu aprendi muitas gírias de marinheiro, mas todo mundo sabe que tenho medo do oceano. Por causa dos krakens. Então eu desmaio e quando acordo há um bilhete que diz 'Seu salame foi navegar, venha nos encontrar!'

Ha ha, muito engraçado, mas o fato é que aquele salame foi minha última experiência na criação do lendário Ur-Salami. E parece ser uma experiência fracassada! Se alguém comer aquele salame, bem... posso me meter em muitos problemas. Você tem que ajudar.

Aposto que aqueles filhos da puta esconderam meu salame a bordo dos navios. Eles teriam ficado longe do Salty Slattern, se isso fosse de alguma ajuda para você. Você deveria se apressar. O fedor é maligno. E nada de beliscar!\""
"Sourgum in Statehelm said, \"See?! What did I tell you? We're gonna be rich! Slim wants a HUNDRED orders of those cinnamon-blasted bananas! And I'll split the profits with you right down the line! That's an old pirate term, you probably don't know it. It means an even split of the loot!

Get to cookin' and don't let us down!\"": "Sourgum em Statehelm disse: \"Viu?! O que eu te disse? Vamos ficar ricos! Slim quer CEM pedidos daquelas bananas com canela! E vou dividir os lucros com você no futuro! Esse é um termo pirata antigo, você provavelmente não sabe. Significa uma divisão uniforme do saque!

Comece a cozinhar e não nos decepcione!\""
"Sourgum in Statehelm said, \"Something unexpected happened when I was making the candy for the staves. It had to be a fluke because I didn't expect it! Anyway, the candy's ruined. Everything's ruined. My hopes, my dreams...

Haha, just kidding! I have a new, better idea. This is really my best one yet: cinammon-coated bananas! No. Cinnamon-BLASTED bananas! I think I have the perfect marketing strategy for 'em so bring me several samples.\"": "Sourgum em Statehelm disse: \"Algo inesperado aconteceu quando eu estava fazendo os doces para as aduelas. Deve ter sido um acaso porque eu não esperava! De qualquer forma, os doces estão arruinados. Tudo está arruinado. Minhas esperanças, meus sonhos...

Haha, estou brincando! Tenho uma ideia nova e melhor. Este é realmente o meu melhor: bananas cobertas com canela! Não. Bananas com canela! Acho que tenho a estratégia de marketing perfeita para eles, então traga-me algumas amostras.\""
"Sourgum in Statehelm said, \"The wax was the hard part of my recipe. The rest is just candymaking. Here's what I need:\"": "Sourgum em Statehelm disse: \"A cera foi a parte difícil da minha receita. O resto é apenas fazer doces. Aqui está o que eu preciso:\""
"Sourgum in Statehelm said, \"Ya know, this banana scheme really brought back memories. Me and my best friend Mophew used to run all kinds of crazy schemes like this! But he... died.

Not really. He didn't die and that's the scary part! He <i>womanized</i>. I knew he was gay, and that was safe, you know? Mop was cute, but I'm not gay, so it wasn't a big deal. But now he's got knockers and he doesn't smell the same and I just... I don't know how to be his friend anymore. Her friend. You know?

But it seems crazy not to try to fix this somehow. Can you go and talk to him? Just get a feeling for where he's at mentally. He goes by Tessa now and works in the kitchen most days.\"": "Sourgum em Statehelm disse: \"Sabe, esse esquema de banana realmente trouxe de volta memórias. Eu e meu melhor amigo, Mophew, costumávamos executar todos os tipos de esquemas malucos como esse! Mas ele... morreu.

Na verdade não. Ele não morreu e essa é a parte assustadora! Ele <i>mulherizou</i>. Eu sabia que ele era gay e isso era seguro, sabe? Mop era fofo, mas eu não sou gay, então não foi grande coisa. Mas agora ele tem aldravas e não tem o mesmo cheiro e eu simplesmente... não sei mais como ser amigo dele. A amiga dela. Você sabe?

Mas parece loucura não tentar consertar isso de alguma forma. Você pode ir falar com ele? Basta ter uma ideia de onde ele está mentalmente. Ele agora se chama Tessa e trabalha na cozinha quase todos os dias.\""
"Sourgum Misses Mophew": "Sourgum sente falta de Mophew"
