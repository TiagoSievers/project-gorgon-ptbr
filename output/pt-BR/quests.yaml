"Flitilda in Statehelm said, \"Hey, it's you again. Remember when you got me flitterbies? I was thinking about them. I bet you guys have no idea how flitterbies work! They're maleable to their environment even after they grow. If you have a ton of citrus on you when you pick one, it'll come out smelling citrusy itself!

Can you confirm this actually works like I expect? Sometimes mortal-realm variants can act weird.

<i>[To advance this quest you must have 100+ citrus items in your inventory when you pick flitterbies.]</i>\"": "Flitilda em Statehelm disse: \"Ei, é você de novo. Lembra quando você me deu flitterbies? Eu estava pensando neles. Aposto que vocês não têm ideia de como funcionam os flitterbies! Eles são maleáveis ao ambiente, mesmo depois de crescerem. Se você tiver uma tonelada de frutas cítricas quando escolher uma, ela sairá com um cheiro cítrico!

Você pode confirmar que isso realmente funciona como eu esperava? Às vezes, as variantes do reino mortal podem agir de forma estranha.

<i>[Para avançar nesta missão, você deve ter mais de 100 itens cítricos em seu inventário ao escolher flitterbies.]</i>\""
"Flitilda in Statehelm said, \"I've heard of a mortal flower called a tulip, but I've never seen one! I wish I had one.

<i>[Flitilda flutters her eyelashes at you.]</i>\"": "Flitilda em Statehelm disse: “Ouvi falar de uma flor mortal chamada tulipa, mas nunca vi uma!

<i>[Flitilda agita os cílios para você.]</i>\""
"Flitilda in Statehelm said, \"One of my fae friends said that there are flitterbies growing here in this country, somewhere far south of here in a land called Eltibule. I need one for my drawings!\"": "Flitilda em Statehelm disse: \"Um dos meus amigos fae disse que há flitterbies crescendo aqui neste país, em algum lugar bem ao sul daqui, em uma terra chamada Eltibule. Preciso de um para meus desenhos!\""
