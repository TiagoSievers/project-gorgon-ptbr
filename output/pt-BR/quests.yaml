"Perfect! I'll use this in front of the fire to set the mood tonight with Therese. Actually, wait, that would offend her. She loves animals. Nevermind, I'll just sell it. But thanks!": "Perfeito! Usarei isso em frente ao fogo para criar o clima desta noite com Therese. Na verdade, espere, isso a ofenderia. Ela adora animais. Não importa, vou apenas vendê-lo. Mas obrigado!"
"Perfect! I'm not sure how this will become a hat just yet, but I'll think of something. Here, take this failed experiment.": "Perfeito! Ainda não tenho certeza de como isso se tornará um chapéu, mas vou pensar em algo. Aqui, faça esta experiência fracassada."
"Perfect! Its odor is very appealing. This will be my ace in the hole, as they say in your idiom. Thank you.": "Perfeito! Seu odor é muito atraente. Este será meu ás na manga, como dizem no seu idioma. Obrigado."
"Perfect! Let me give you something in return. Hmm, I know, here: take my stash. I've sworn off the stuff. But it's great when you need a little extra kick. Just don't get hooked on it, okay? It can really mess you up.": "Perfeito! Deixe-me lhe dar algo em troca. Hmm, eu sei, aqui: pegue meu estoque. Eu renunciei a essas coisas. Mas é ótimo quando você precisa de um impulso extra. Só não fique viciado nisso, ok? Isso pode realmente bagunçar você."
"Perfect! Scaly! I'm going to turn them into powder and try to grow things with them. Wish me luck! Oh, here, let me show you a handy gardening trick.": "Perfeito! Escamoso! Vou transformá-los em pó e tentar cultivar coisas com eles. Deseje-me sorte! Ah, aqui, deixe-me mostrar um truque útil de jardinagem."
"Perfect! Spoons like these have been used by Humans for thousands of years, while they mastered the arts of soups and stews. Hmm, I don't think this one's more than a few hundred years old, though. But thanks anyway! It's fascinating.": "Perfeito! Colheres como essas têm sido usadas pelos humanos há milhares de anos, enquanto eles dominavam a arte de fazer sopas e ensopados. Hmm, mas não acho que este tenha mais do que algumas centenas de anos. Mas obrigado de qualquer maneira! É fascinante."
"Perfect! Thank you. Here, take a few of these.": "Perfeito! Obrigado. Aqui, pegue alguns deles."
"Perfect! Thanks! You're good at this fetching stuff!

Let me show you a couple little gardening tips.": "Perfeito! Obrigado! Você é bom nessas coisas atraentes!

Deixe-me mostrar algumas dicas de jardinagem."
"Perfect! These will help us get by until I can get some more made. Here's a few tips for you as promised.

