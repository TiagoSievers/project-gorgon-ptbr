"Interesting. It is cool to the touch, but it's clear that there is magma inside. I think with just the write current applied equally to the entire surface area, it can be turned back on... are you writing this down?": "Interessante. É legal ao toque, mas é claro que há magma dentro. Acho que apenas com a corrente de gravação aplicada igualmente a toda a área da superfície, ela pode ser reativada... você está anotando isso?"
"Interesting. Nothing too groundbreaking, but there might be something in here I can use for a dish.": "Interessante. Nada muito inovador, mas pode haver algo aqui que eu possa usar como prato."
