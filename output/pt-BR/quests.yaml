"Cynthia Rolfe in Statehelm said, \"Nah, I don't think you can help with this roach problem. I need some of those fancy bug bombs, but they're hard to come by.

I guess if you're handy with a gizmo, you could build some and fumigate the place for us. I'd sure appreciate that!

Ser Hackley at the Council Headquarters could give you blueprints for the bug bombs, if you know how to read such things.\"": "Cynthia Rolfe, em Statehelm, disse: \"Não, não acho que você possa ajudar com esse problema das baratas. Preciso de algumas dessas bombas sofisticadas, mas são difíceis de encontrar.

Acho que se você tiver jeito com um aparelho, poderia construir um e fumigar o lugar para nós. Eu certamente apreciaria isso!

Sor Hackley, na Sede do Conselho, poderia lhe dar projetos para as bombas de insetos, se você souber ler essas coisas.\""
"Dachak in Povus said, \"See the giant mushrooms off in the distance? Yeah, those are new. Not even a year old, in fact, and whatever it means, it's definitely bad.

But you look like the sort who will wander over there anyway. If you do, can you pick some false agaric for me?

You can find false agaric all around Povus, so if you <i>aren't</i> brave, just look elsewhere.\"": "Dachak em Povus disse: \"Vê os cogumelos gigantes ao longe? Sim, esses são novos. Na verdade, nem têm um ano de idade, e seja lá o que isso signifique, é definitivamente ruim.

Mas você parece do tipo que vai passear por lá de qualquer maneira. Se sim, você pode escolher algum agárico falso para mim?

Você pode encontrar falsos agáricos por toda Povus, então se você <i>não</i> for corajoso, procure outro lugar.\""
"Dachak in Povus said, \"The ratkin used to be friendly. When I was younger, they would come into town and I'd sell 'em vegetables! But after the fall of Povus they attack on sight. I had to give up mining because of them. I wish somebody would teach 'em a lesson for me! Hint, hint.\"": "Dachak em Povus disse: \"Os ratkin costumavam ser amigáveis. Quando eu era mais jovem, eles vinham para a cidade e eu vendia vegetais para eles! Mas depois da queda de Povus eles atacam à primeira vista. Tive que desistir da mineração por causa deles. Gostaria que alguém lhes ensinasse uma lição para mim! Dica, dica.\""
