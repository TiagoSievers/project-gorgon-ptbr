"Six days prior, a band of fortified orcs attempted to cross my fungal fields and chop down my tall mushrooms. They were killed and their bodies are now fertilizer. Yet I fear retaliation, for orcs are not prone to abandoning their schemes. It would be prudent to remove that threat immediately.": "Seis dias antes, um bando de orcs fortificados tentou cruzar meus campos de fungos e derrubar meus cogumelos altos. Eles foram mortos e seus corpos agora são fertilizantes. No entanto, temo retaliação, pois os orcs não são propensos a abandonar os seus esquemas. Seria prudente eliminar imediatamente essa ameaça."
