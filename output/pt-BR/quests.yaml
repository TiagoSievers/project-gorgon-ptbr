"Wintria Irasce in Rahu said, \"I left my brother running our book store back in Statehelm. I need him to think I'm happy here! Otherwise he won't understand why I'm not ready to go home.

I want to send Michael a package of treats and wonders from Rahu to show how amazing this place is. I have a list here... could you help me? If you get these items, I'll teach you a special organizational cantrip that we use in the book-sellers' trade.\"": "Wintria Irasce, em Rahu, disse: \"Deixei meu irmão administrando nossa livraria em Statehelm. Preciso que ele pense que estou feliz aqui! Caso contrário, ele não entenderá por que não estou pronto para voltar para casa.

Quero enviar ao Michael um pacote de guloseimas e maravilhas de Rahu para mostrar o quão incrível este lugar é. Eu tenho uma lista aqui... você poderia me ajudar? Se você conseguir esses itens, eu lhe ensinarei um truque organizacional especial que usamos no comércio de livreiros.\""
"With fewer expert stone-shapers on our front lines, the goblins may finally be able to overrun the den! And that will mean a swift death for me. Hmm. I kind of hate what I've become, so maybe that's not a big deal. Anyway, here's your reward.": "Com menos modeladores de pedras experientes em nossas linhas de frente, os goblins podem finalmente conseguir invadir a toca! E isso significará uma morte rápida para mim. Hum. Eu meio que odeio o que me tornei, então talvez isso não seja grande coisa. De qualquer forma, aqui está sua recompensa."
"With this metal I shall be able to finish the order of tack hammers for that fool Ufkar. Your aid is much appreciated.": "Com este metal poderei terminar a encomenda de martelos para aquele idiota do Ufkar. Sua ajuda é muito apreciada."
"Without truly understanding its explosive portent, how could you ever hope to actualized the Bomb symbol?": "Sem compreender verdadeiramente seu presságio explosivo, como você poderia esperar atualizar o símbolo da Bomba?"
