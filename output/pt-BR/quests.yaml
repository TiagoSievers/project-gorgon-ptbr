"Echur in Serbule has asked you for a strong bandage.": "Echur, em Serbule, pediu-lhe um curativo forte."
"Echur in Serbule has asked you to obtain a dose of Cranium Powder. He believes you can buy it from Azalak the mantis if you're friendly enough with him.": "Echur em Serbule pediu que você obtivesse uma dose de Cranium Powder. Ele acredita que você pode comprá-lo do louva-a-deus Azalak se for amigável o suficiente com ele."
"Echur in Serbule said, \"Nelson said he had some ornamentation appropriate for this celebration. Can you get it from him?\"": "Echur em Serbule disse: \"Nelson disse que tinha alguma ornamentação apropriada para esta celebração. Você pode conseguir com ele?\""
"Echur in Serbule said, \"Okay, I need a bit of discreet help. Nelson gave me a decoration to put atop the tree, but I lost it! And I never lose things! So you know what this means: it was stolen. And I know who did it.

There's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!\"": "Echur em Serbule disse: \"Tudo bem, preciso de uma ajuda discreta. Nelson me deu uma decoração para colocar no topo da árvore, mas eu a perdi! E nunca perco coisas! Então você sabe o que isso significa: foi roubado. E eu sei quem fez isso.

Há um certo roedor que tornou minha vida miserável desde que acidentalmente dei a ele superinteligência. O nome dele é Senhor Squeaky e ele mora em algum lugar a noroeste da cidade. Por favor, traga de volta a estrela que ele roubou!\""
"Echur in Serbule said, \"Sir Coth says it's traditional to decorate the tree with an ethnic human food called a 'gingerbread human'. He gave me a bunch of recipes... here's the simplest version. Can you prepare a batch?\"": "Echur em Serbule disse: \"Sir Coth diz que é tradicional decorar a árvore com um alimento humano étnico chamado 'humano de gengibre'. Ele me deu um monte de receitas... aqui está a versão mais simples. Você pode preparar um lote?\""
"Echur in Serbule said, \"We need lots of cheap decorations. They should be bright and shiny and round. Hmm. Apples! Yes, fetch some apples. I'll get some myself, and together we should have enough.\"": "Echur em Serbule disse: \"Precisamos de muitas decorações baratas. Elas devem ser brilhantes, brilhantes e redondas. Hmm. Maçãs! Sim, traga algumas maçãs. Eu mesmo pegarei algumas e juntos teremos o suficiente.\""
"Echur in Serbule wants you to ask Velkort for a way to alleviate the symptoms of Echur's Cranium Dust addiction.": "Echur em Serbule quer que você peça a Velkort uma maneira de aliviar os sintomas do vício em Pó de Crânio de Echur."
"Echur in Serbule wants you to deliver a bag of strange white powder to a \"mantis\" somewhere in the forests past Serbule.": "Echur em Serbule quer que você entregue um saco de pó branco estranho para um \"louva-a-deus\" em algum lugar nas florestas depois de Serbule."
"Echur in Serbule wants you to obtain some Brain Bug Lobes. They can occasionally be found from Brain Bugs.": "Echur em Serbule quer que você obtenha alguns Brain Bug Lobes. Eles podem ocasionalmente ser encontrados em Brain Bugs."
"Echur in Serbule wants you to obtain some Willpower Gel. Unfortunately he has no idea what that is. It sounds like a rare Alchemical recipe.": "Echur em Serbule quer que você obtenha um pouco de Gel de Força de Vontade. Infelizmente ele não tem ideia do que seja. Parece uma receita alquímica rara."
