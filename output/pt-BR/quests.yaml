"Daniel Murderdark in Rahu said, \"Hey, thanks for teaching me that little ratkin-skeleton trick! It's not as amazing as the trick I taught you... but it's still pretty good! But, um... in my excitement I forgot something. I don't have one of those summoning talismans! Can you give me yours? I'll give you a lifetime of riches for it!\"": "Daniel Murderdark em Rahu disse: \"Ei, obrigado por me ensinar aquele pequeno truque do esqueleto de ratkin! Não é tão incrível quanto o truque que ensinei a você... mas ainda é muito bom! Mas, hum... na minha empolgação, esqueci uma coisa. Não tenho um daqueles talismãs de invocação! Você pode me dar o seu? Eu lhe darei uma vida inteira de riquezas por isso!\""
"Daniel Murderdark in Rahu said, \"Pst... a little bird told me the most exciting rumor: there's some weird kind of skeletons in a cave under Rahu... and they're easily controllable by necromancers! I bet they're the restless undead from that rakkie war! Those rakkies could supposedly shapeshift... imagine a shapeshifting skeleton! Orrrr... they say there were dragons during the war... imagine a dragon skeleton at our command!

Well, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!\"": "Daniel Murderdark em Rahu disse: \"Pst... um passarinho me contou o boato mais emocionante: há algum tipo estranho de esqueletos em uma caverna sob Rahu... e eles são facilmente controláveis por necromantes! Aposto que eles são os inquietos mortos-vivos daquela guerra rakkie! Esses rakkies poderiam supostamente se transformar... imagine um esqueleto metamorfo! Orrrr... eles dizem que havia dragões durante a guerra... imagine um esqueleto de dragão sob nosso comando!

Bom, não me importa o que seja, sério... preciso ver um! Se você encontrar, você tem que me mostrar. Prometa-me!\""
