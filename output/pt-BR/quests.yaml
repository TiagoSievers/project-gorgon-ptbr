"Come to think of it, the area that The Perforator inhabited used to belong to a native rhino that folks affectionately called The Puncturer. It is possible that The Puncturer and The Perforator switched places, and by slaying both of them it will un-transpose them.

There is only one way to find out for sure. You must journey to the Fae Realm, locate The Puncturer, and kill it. Only then will we know if it returns to this realm.": "Pensando bem, a área que o Perfurador habitava pertencia a um rinoceronte nativo que as pessoas chamavam carinhosamente de O Perfurador. É possível que The Puncturer e The Perforator tenham trocado de lugar e, ao matar os dois, isso os destransporá.

Só há uma maneira de saber com certeza. Você deve viajar para o Reino Fae, localizar o Puncturer e matá-lo. Só então saberemos se ele retornará a este reino."
