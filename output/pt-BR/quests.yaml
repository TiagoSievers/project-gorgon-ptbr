"Need very poor quality construction! These benches are for my least favorite pupils.": "Necessita de construção de muito má qualidade! Estes bancos são para os meus alunos menos favoritos."
"Nelson Ballard asked you to be on the lookout for a super-intelligent rat. If found, Nelson needs the rat's head decoration -- some sort of tiara or headband.": "Nelson Ballard pediu que você procurasse um rato superinteligente. Se for encontrado, Nelson precisa da decoração da cabeça do rato – algum tipo de tiara ou bandana."
"Nelson Ballard asked you to deliver a Praetor's Order to a shady potion seller living in a tent outside of town.": "Nelson Ballard pediu que você entregasse uma Ordem do Pretor a um obscuro vendedor de poções que morava em uma tenda fora da cidade."
"Nelson Ballard in Serbule has asked you to obtain some cheese he ordered from a man in Eltibule Keep.": "Nelson Ballard, em Serbule, pediu que você conseguisse um queijo que ele encomendou de um homem em Eltibule Keep."
"Nelson Ballard in Serbule said, \"I'm worried about something that's probably far-fetched... but I don't dare ignore the possibility. That fool elf Pennoc invited a traveling circus from Senoca to come visit here. We're much too small for a circus to normally bother with, but he promised them an exceptionally friendly welcome, \"in elven style\", and he even promised free room and board for weeks!

I would have had Pennoc thrown in the dungeon if we had a dungeon. <i>Sigh.</i> What if his ploy works and the circus comes here? I barely have enough supplies for the elven refugees, let alone a bunch of circus freaks! Can you help me prepare for the worst-case scenario?\"": "Nelson Ballard em Serbule disse: \"Estou preocupado com algo que provavelmente é rebuscado... mas não me atrevo a ignorar a possibilidade. Aquele elfo idiota Pennoc convidou um circo itinerante de Senoca para vir nos visitar aqui. Somos pequenos demais para um circo normalmente se preocupar, mas ele prometeu a eles uma recepção excepcionalmente amigável, \"no estilo élfico\", e até prometeu hospedagem e alimentação grátis por semanas!

Eu teria jogado Pennoc na masmorra se tivéssemos uma masmorra. <i>Suspiro.</i> E se a estratégia dele funcionar e o circo vier aqui? Mal tenho suprimentos suficientes para os refugiados élficos, muito menos para um bando de malucos de circo! Você pode me ajudar a me preparar para o pior cenário?\""
"Nelson said he had some ornamentation appropriate for this celebration. Can you get it from him?": "Nelson disse que tinha alguma ornamentação apropriada para esta celebração. Você pode conseguir isso dele?"
"Neufchatel Cheese": "Queijo Neufchâtel"
"NeufchatelCheese": "Queijo Neufchatel"
