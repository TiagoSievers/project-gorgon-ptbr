": "Bem conhecido! É difícil configurar e preparar quando você está sempre em movimento. Gostaria de terminar alguns barris antes de voltarmos à estrada, mas preciso de inspiração e gostaria de provar alguns dos sabores locais. Por que você não prepara 10 copos desta Brown Ale de que ouvi falar? Aromatize como quiser!"
