"Well suck my balls and call me Remga, you found actual proof that the Onkara were involved! This is incredible!

... No! It was authorized by Lt. Flakis... and he's dead! He was killed by an orcish terrorist last month. Damn it all!

Well, there must be more to this. I'll head to Rahu soon and see if I can bribe some friendly rakkies until I get answers. You've done more than enough for us. Thank you. You're off my shit-list now. I don't have a lot of coin, but here's some merchandise I've come across.

And hey. If you ever need to kill someone 'less than honorably', I can help you out with that. <i>[New Sales options added.]</i>": "Bem, chupe minhas bolas e me chame de Remga, você encontrou provas reais de que os Onkara estavam envolvidos! Isso é incrível!

... Não! Foi autorizado pelo Tenente Flakis... e ele está morto! Ele foi morto por um terrorista orc no mês passado. Maldito seja!

Bem, deve haver mais nisso. Irei para Rahu em breve e verei se consigo subornar alguns libertinos amigáveis ​​até obter respostas. Você fez mais do que suficiente por nós. Obrigado. Você está fora da minha lista de merda agora. Não tenho muitas moedas, mas aqui estão algumas mercadorias que encontrei.

E ei. Se você precisar matar alguém 'menos que honrosamente', posso ajudá-lo com isso. <i>[Novas opções de vendas adicionadas.]</i>"
"Well that's a few less treacherous ratkin to worry about! You're not so bad after all! Here.": "Bem, isso é um pouco menos traiçoeiro para se preocupar! Afinal, você não é tão ruim! Aqui."
"Well these look unusual... but thanks! I'll try these out tonight!": "Bem, isso parece incomum... mas obrigado! Vou experimentar isso esta noite!"
"Well you still haven't been forced to do ANY of the supremely difficult things we had to do when I was a student! You think you're so great, huh? Let's see you pull this off: kill enemies with Disharmony. And not harmless enemies either! Just be careful: this test is no joke.

<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>": "Bem, você ainda não foi forçado a fazer NENHUMA das coisas extremamente difíceis que tivemos que fazer quando eu era estudante! Você se acha tão bom, hein? Vamos ver você conseguir isso: mate os inimigos com Desarmonia. E também não são inimigos inofensivos! Só tome cuidado: esse teste não é brincadeira.

<i>[A desarmonia deve ser o golpe mortal para obter crédito. Morrer redefinirá seu progresso.]</i>"
"Well, can't say that tree'd win any beauty prizes, but it feels homey. Thank you. You're part of the family here too, so we got ya something under the tree.": "Bem, não posso dizer que aquela árvore ganharia algum prêmio de beleza, mas parece aconchegante. Obrigado. Você também faz parte da família aqui, então trouxemos algo para você debaixo da árvore."
"Well, I always need more fluorite.\\\"\": \"Espargos em Statehelm disse": "\\\"Você quer fazer algo por mim? Pf."
"Well, I am sorry to report that watching plants grow is not exciting. I guess I figured since farmers do it all day, it must have had some fascination, but no. Sigh.": "Bem, lamento informar que observar o crescimento das plantas não é emocionante. Acho que imaginei que, como os agricultores fazem isso o dia todo, deve ter havido algum fascínio, mas não. Suspirar."
"Well, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!\": \"Pst... um passarinho me contou o boato mais emocionante": "há algum tipo estranho de esqueleto em uma caverna sob Rahu... e eles são facilmente controláveis ​​por necromantes! Aposto que são os mortos-vivos inquietos daquela guerra rakkie! Aqueles rakkies poderiam supostamente mudar de forma... imagine um esqueleto que muda de forma! Orrrr... dizem que havia dragões durante a guerra... imagine um esqueleto de dragão sob nosso comando!"
"Well, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!\\\"\": \"Daniel Murderdark em Rahu disse": "\\\"Pst... um passarinho me contou o boato mais emocionante: há algum tipo estranho de esqueletos em uma caverna sob Rahu... e eles são facilmente controláveis por necromantes! Aposto que eles são os inquietos mortos-vivos daquela guerra rakkie! Esses rakkies poderiam supostamente se transformar... imagine um esqueleto metamorfo! Orrrr... eles dizem que havia dragões durante a guerra... imagine um esqueleto de dragão sob nosso comando!"
"Well, I have no idea if that was entertaining or not. You were pretty far away and I couldn't see you. I guess I didn't think that through too well.": "Bem, não tenho ideia se isso foi divertido ou não. Você estava bem longe e eu não conseguia te ver. Acho que não pensei muito bem nisso."
"Well, I will figure out their purpose, don't you worry about that!\": \"Obrigado por isso. Vou estudá-los. Ah, falei mais um pouco com Firaki – essa é a vendedora que mencionei – e ela me contou a coisa mais deprimente": "os Rakshasa transmitiram o conhecimento de como fazer esses pergaminhos, mas não se lembram qual é o seu propósito. Eles os usam como <i>almofadas térmicas</i> nas noites frias. Não é a coisa mais triste?"
"Well, I'll tell you about Poe, but I don't expect you'll be able to find him. He's a myconian. A mushroom man! Weirdest thing I've ever seen wield a jeweler's hammer, I assure you! He was never part of our guild, but we invited him to come with us anyway. Sadly, he refused: he hates the cold. Can't blame him. He said he was going home, \"under the ground in Serbule.\" So I guess you go there and start digging? How big is Serbule anyway?

Do this for me, and I'll put in a good word with you to Poe!": "Bem, vou lhe contar sobre Poe, mas não espero que você consiga encontrá-lo. Ele é um micônico. Um homem cogumelo! A coisa mais estranha que já vi empunhar um martelo de joalheiro, garanto! Ele nunca fez parte da nossa guilda, mas nós o convidamos para vir conosco mesmo assim. Infelizmente, ele recusou: ele odeia o frio. Não posso culpá-lo. Ele disse que estava indo para casa, \"no subsolo em Serbule\". Então eu acho que você vai lá e começa a cavar? Qual é o tamanho de Sérbule, afinal?

Faça isso por mim e eu darei boas palavras a você para Poe!"
"Well, I'm convinced you know how to handle yourself! Why don't you do some clean up work for us out in the field? I can pay you from one of the military funds. Win-win, and you'll still be getting better with your skills. Win-win-win!

Of course, I can't compensate you if you die. Be careful out there!": "Bem, estou convencido de que você sabe como se comportar! Por que você não faz algum trabalho de limpeza para nós no campo? Posso pagar-lhe com um dos fundos militares. Ganha-ganha, e você ainda estará melhorando suas habilidades. Ganha-ganha-ganha!

Claro, não posso compensar você se você morrer. Cuidado lá fora!"
"Well, I'm glad I cajoled you into practicing your vocabulary. Not all cajoling is bad! Sometimes people need to be pushed a little for their own good.": "Bem, estou feliz por ter persuadido você a praticar seu vocabulário. Nem toda bajulação é ruim! Às vezes as pessoas precisam ser pressionadas um pouco para seu próprio bem."
"Well, I'm glad she wasn't hurt or anything. Still, she'll have to listen to reason: I spend several days every week clearing the roads, and I've never seen her out there.

You don't suppose she works evenings while I work mornings, do you? Hah, no, that's the sort of misunderstanding you'd read in a bad adventure poem!": "Bem, estou feliz que ela não tenha se machucado nem nada. Mesmo assim, ela terá que ouvir a razão: passo vários dias por semana limpando as estradas e nunca a vi por aí.

Você não acha que ela trabalha à noite enquanto eu trabalho de manhã, não é? Hah, não, esse é o tipo de mal-entendido que você leria em um poema de aventura ruim!"
"Well, if Spot likes you, I guess you're okay. With your help, we might make it through winter after all. But I'll warn you: you'll have to go up against werewolves. If you want to back out, I completely understand. I'm not stupid enough to take werewolves on either!": "Bem, se Spot gosta de você, acho que você está bem. Com a sua ajuda, talvez possamos sobreviver ao inverno, afinal. Mas vou avisar: você terá que enfrentar lobisomens. Se você quiser desistir, eu entendo perfeitamente. Também não sou estúpido o suficiente para enfrentar lobisomens!"
"Well, ifyer offerin den acurse immasai yiss. Gogit de tuffest poisonz yecan find.": "Bem, se você oferecer a maldição, immasai yiss. Gogit do mais tufado veneno que você pode encontrar."
"Well, it turns out that watching a hunter skulk around is intrinsically boring. Who knew?": "Bem, acontece que observar um caçador se escondendo é intrinsecamente chato. Quem sabia?"
"Well, it was hilarious to <i>me</i>. Sorry that it didn't go as well for <i>you</i>. Here's some cash to help you smooth everything over.": "Bem, foi hilário para <i>mim</i>. Lamentamos que não tenha corrido tão bem para <i>você</i>. Aqui está algum dinheiro para ajudá-lo a suavizar tudo."
"Well, let's put that behind us. I would like your maple carrots please. And not too sweet.\\\"\": \"Ailred in Povus disse": "\\\"Sinto muito se ofendi você ao me sentar. Mas você não precisou me deixar esperando tanto tempo! Acho que você ainda não estava aberto?"
"Well, no pressure but see what you can do.\\\"\": \"Michael Irasce, da Statehelm, disse": "\\\"Aqui está outra ordem maluca. Como vou cumprir isso?! Preciso de \\\"esquemas e instruções de manutenção para uma nave da classe Exetar\\\". Eu entendo algumas dessas palavras..."
"Well, Sinda's dead. I blame that human that brought her to this horrible place. Unfortunately he has no mate to commit Kar-Get upon. Perhaps he has children. Find out for me. I am not an expert at combat, but I will have my vengeance.

I know that the human stayed at Eltibule Keep years ago, before the duke abandoned it. And like all human sages, he was a prolific journaler. Perhaps he left something there that would illuminate matters.": "Bem, Sinda está morto. Eu culpo aquele humano que a trouxe para este lugar horrível. Infelizmente ele não tem companheira para cometer Kar-Get. Talvez ele tenha filhos. Descubra para mim. Não sou especialista em combate, mas terei minha vingança.

Eu sei que o humano ficou em Eltibule Keep anos atrás, antes de o duque abandoná-lo. E como todos os sábios humanos, ele foi um jornalista prolífico. Talvez ele tenha deixado algo lá que iluminaria o assunto."
"Well, that's a few snails down... maybe that's enough... but if there's still too many snails out here in a few days, I'm calling you again! You can't just leave a whole herd of cows to die! You're wardens! And I DEMAND... okay... I'm calming down... deep moos... deep moos... look, I've been pretty wound up about these snails. I don't mean to be rude. Here: this is a little snack for your trouble!": "Bem, faltam alguns caracóis... talvez seja o suficiente... mas se ainda houver muitos caracóis por aqui em alguns dias, ligo para você novamente! Você não pode simplesmente deixar um rebanho inteiro de vacas morrer! Vocês são diretores! E eu EXIJO... ok... estou me acalmando... mugidos profundos... mugidos profundos... olha, estou bastante nervoso com esses caracóis. Não quero ser rude. Aqui: este é um lanche para o seu problema!"
"Well, that's all we need. Apparently if you put too many decorations on the tree, it becomes tacky, so we should stop here. Thanks for your help! And I put a present for you under the tree.": "Bem, isso é tudo que precisamos. Aparentemente se você colocar muitos enfeites na árvore, ela fica pegajosa, então devemos parar por aqui. Obrigado pela ajuda! E coloquei um presente para você debaixo da árvore."
"Well, the bow's almost ready, but I need to restring it. I need cat gut! Bring me a bunch of cat meat and I'll dig through it to find what I need.": "Bem, o arco está quase pronto, mas preciso refazê-lo. Eu preciso de tripa de gato! Traga-me um monte de carne de gato e eu vou vasculhar para encontrar o que preciso."
"Well, there is one thing I could use your help with. James keeps bragging about his dumb ring game, and how nobody could catch 6 of them in under a minute. Which is obviously untrue because I myself have done it! But he says that's because I created this dimension so I have special powers here. Why don't you collect six in under a minute? Ready, set, go!": "Bem, há uma coisa em que eu poderia usar sua ajuda. James continua se gabando de seu jogo idiota e de como ninguém conseguiu pegar 6 deles em menos de um minuto. O que obviamente não é verdade, porque eu mesmo fiz isso! Mas ele diz que é porque eu criei esta dimensão, então tenho poderes especiais aqui. Por que você não coleta seis em menos de um minuto? Pronto, pronto, vá!"
"Well, there must be some way to save part of the tree. Try chopping them up after you kill them and see what you can find.\\\"\": \"Bogaku, nos Esgotos Rahu, disse": "\\\"Tive uma ideia sobre as árvores mutantes aqui. Você já tentou podá-las? Já tentou? Mas elas simplesmente murcharam? Hmmm."
"Well, there's a bit too much salt, but it's not too greasy! My thanks to the chef.": "Bem, tem um pouco de sal demais, mas não é muito gorduroso! Meus agradecimentos ao chef."
"Well, these look edible. Thank you.": "Bem, estes parecem comestíveis. Obrigado."
"Well, this orb is definitely intended to be a Naturesphere! The runes are right. But it's just a frost orb, it doesn't... Hmm.

<i>[Merriana studies the orb.]</i>

Whoever made this didn't fully know how to make a Naturesphere -- but they've figured out the first part! We must not let a Naturesphere fall into the wrong hands. The wizard who made this is going to be a problem.

But first I have another lead from Arif, when you're ready. He claims a fully-working Naturesphere can be found near Serbule.": "Bem, este orbe definitivamente pretende ser uma Naturesphere! As runas estão certas. Mas é apenas um orbe gelado, não... Hmm.

<i>[Merriana estuda o orbe.]</i>

Quem fez isso não sabia exatamente como fazer uma Naturesphere – mas descobriu a primeira parte! Não devemos permitir que uma Naturesphere caia em mãos erradas. O mago que fez isso vai ser um problema.

Mas primeiro tenho outra pista do Arif, quando você estiver pronto. Ele afirma que uma Naturesphere em pleno funcionamento pode ser encontrada perto de Serbule."
"Well, what do I know about bats? They hate bugs, right? Go check that idea": "eat some size-appropriate wasps. Tell me how they taste.\": \"<i>Zhia Lian:</i> Você é tão fofo quanto um morcego, adorei! Tão bizarro! Mas de uma forma caprichosa. Se os morcegos precisam de um deus patrono, estou nisso! Ei... Você sabe, talvez eu pudesse conseguir esse emprego. Hmmm... mas será que eu realmente <i>quero</i> esse emprego?"
"Well, whatever this beast was, it was terrifying. Glad you're still alive.": "Bem, o que quer que fosse essa fera, era aterrorizante. Que bom que você ainda está vivo."
"Well, you've made me wait so long for my food that I'm not even that hungry. I'll take the appetizers to go, please. Oh, don't tell me you lost my appetizer order?! It was spicy porcini bites! I need two servings. And not too greasy!": "Bem, você me fez esperar tanto pela comida que nem estou com tanta fome. Vou levar os aperitivos para viagem, por favor. Ah, não me diga que você perdeu meu pedido de aperitivo?! Foram mordidas de porcini picantes! Preciso de duas porções. E não muito gorduroso!"
"Well, your actions have incriminated you now, so you can see it through with me if you want to. I'm setting up a trade with a friend who lives out of town. Help me get the rest of this crap, and I'll let you in on the action.": "Bem, suas ações incriminaram você agora, então você pode resolver isso comigo se quiser. Estou fechando uma troca com um amigo que mora fora da cidade. Ajude-me a resolver o resto dessa porcaria e eu lhe contarei a ação."
"Well, your diet is fine, but your magical aura is a bit off. I think some iridium will do the trick! Mine some iridium -- I hear you can find some in Kur -- and you'll be feeling different in no time.": "Bem, sua dieta está boa, mas sua aura mágica está um pouco errada. Acho que um pouco de irídio resolverá o problema! Extraia um pouco de irídio - ouvi dizer que você pode encontrar um pouco em Kur - e você se sentirá diferente em pouco tempo."
"Well-Baked Turkeys (Seasonal)": "Perus bem assados ​​(sazonal)"
"Well. These are quite good! I am a little embarrassed to admit that this is some of the best vexfish I've eaten! Wonderful!": "Bem. Estes são muito bons! Tenho um pouco de vergonha de admitir que este é um dos melhores peixes vex que já comi! Maravilhoso!"
"Well... It's not bad. Definitely fresh. Better than I expected from a place like this!": "Bem... não é ruim. Definitivamente fresco. Melhor do que eu esperava de um lugar como este!"
"Well... the smell of fried fish isn't as pleasant as I remembered.": "Bem... o cheiro de peixe frito não é tão agradável quanto eu lembrava."
"WellBakedTurkey": "WellBakedTurquia"
"Werewolf": "Lobisomem"
"Werewolf Boost Potion 20%": "Poção de reforço de lobisomem 20%"
"Werewolf Invasion": "Invasão de Lobisomem"
"Werewolf Overflow": "Estouro de lobisomem"
