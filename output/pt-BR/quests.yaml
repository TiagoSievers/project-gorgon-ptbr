"Otis in Red Wing Casino said, \"NEED STINGER OF SCORPION. NOT TELL REASON.\"": "Otis no Red Wing Casino disse: \"PRECISA DE STINGER DE ESCORPIÃO. NÃO DIGA A RAZÃO.\""
"Otis in Red Wing Casino said, \"OTIS STOMACH ACHE. OTIS NEED NEW STOMACH. YOU GET! OGRE STOMACH! NOT TROLL STOMACH! OGRE!!\"": "Otis no Red Wing Casino disse: \"DOR DE ESTÔMAGO DE OTIS. OTIS PRECISA DE UM ESTÔMAGO NOVO. VOCÊ TEM! ESTÔMAGO DE OGRO! NÃO ESTÔMAGO DE TROLL! OGRO!!\""
"Otis in Red Wing Casino said, \"USHUG HAS SECRET. USHUG TELL OTIS IF GIVE POTION. YOU GET POTION. IS STAFF POTION FOR ARENA!\"": "Otis no Red Wing Casino disse: \"USHUG TEM SEGREDO. USHUG DIGA A OTIS SE DAR POÇÃO. VOCÊ GANHA POÇÃO. É POÇÃO DE PESSOAL PARA ARENA!\""
"OTIS STOMACH ACHE. OTIS NEED NEW STOMACH. YOU GET! OGRE STOMACH! NOT TROLL STOMACH! OGRE!!": "DOR DE ESTÔMAGO DE OTIS. OTIS PRECISA DE UM NOVO ESTÔMAGO. VOCÊ CONSEGUE! ESTÔMAGO DE OGRO! NÃO ESTÔMAGO DE TROLL! OGRO!!"
"Ouvi dizer que se você invocar uma tempestade de areia enquanto estiver ali, ela atrairá uma jovem brisa elemental direto para você! A maioria não é nativa deste reino, mas algo nos ventos de Ilmari permite que eles nasçam. Bastante incomum! De qualquer forma, ele o encontrará em segundos. Mate-o e pegue seu coração. Não se preocupe": "a maioria dos elementais do vento que crescem <i>aqui</i> acabam ficando loucos de qualquer maneira, então talvez você esteja fazendo um favor a isso."
"Over on the little island northeast of here there's this tiny lake with a bridge. Very cozy. It's a famous makeout spot for talking birds. Well, regular birds too, I guess. But now there's a ranalon hiding there, using it as his personal hunting ground. It's not right! That island isn't even in ranalon territory!

We can't let him camp there and kill our friends. But he runs whenever he sees me bouncing toward him. He doesn't know you, so you should be able to get him. So go get him!": "Na pequena ilha a nordeste daqui há um pequeno lago com uma ponte. Muito aconchegante. É um famoso local de amassos para pássaros falantes. Bem, pássaros normais também, eu acho. Mas agora há um Ranalon escondido lá, usando-o como campo de caça pessoal. Não está certo! Aquela ilha nem está em território Ranalon!

Não podemos deixá-lo acampar lá e matar nossos amigos. Mas ele corre sempre que me vê saltando em sua direção. Ele não conhece você, então você deve ser capaz de pegá-lo. Então vá buscá-lo!"
