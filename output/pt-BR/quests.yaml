"Look around for some bottles of Errrgorabog. The moistening cream? Almost everyone down here uses it, so I'm sure you can find some easily enough. I need a bunch of it.": "Procure algumas garrafas de Errrgorabog. O creme umedecedor? Quase todo mundo aqui usa, então tenho certeza que você encontrará alguns com bastante facilidade. Eu preciso de um monte disso."
"Look for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!\": \"Durstin atrás do bar é bom para comer um ovo mexido ou um pedaço de pão frito, mas ele simplesmente não está disposto a ampliar seus horizontes! E, no entanto, logo adiante há uma iguaria rara": "peixe em conserva ao estilo ranalan! Pegue um pouco para mim. Vou convencê-lo a experimentá-los alguma noite e ele finalmente verá o que está perdendo."
"Look for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!\\\"\": \"Rappanel em Serbule Hills disse": "“Durstin atrás do bar é bom para um ovo mexido ou um pedaço de pão frito, mas ele simplesmente não está disposto a ampliar seus horizontes!"
"Look, I don't need random help from random mortals! I used to be an expert alchemist, and I know there was a method to inhibit memory. If I could remember how to make memory-inhibitors, maybe I could find a reversal effect... anyway, if you happen to have a memory-inhibitor potion, that'd be great. Otherwise, you can help best by bringing me the ingredients I need! I'll barter for royal jelly.": "Olha, eu não preciso de ajuda aleatória de mortais aleatórios! Eu era um alquimista especialista e sei que existia um método para inibir a memória. Se eu pudesse lembrar como fazer inibidores de memória, talvez pudesse encontrar um efeito reverso... de qualquer forma, se acontecer de você ter uma poção inibidora de memória, seria ótimo. Caso contrário, você pode ajudar melhor trazendo-me os ingredientes que preciso! Eu troco por geleia real."
"Look, I don't need random help from random mortals! Somebody brought me this potion of memory inhibition, and I've been studying it. I think I can invert the effect. Well, I can invert <i>something</i>: memories, emotions, internal organs, something. And something is better than nothing.

I wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!": "Olha, eu não preciso de ajuda aleatória de mortais aleatórios! Alguém me trouxe esta poção de inibição da memória e estou estudando-a. Acho que posso inverter o efeito. Bem, posso inverter <i>alguma coisa</i>: memórias, emoções, órgãos internos, alguma coisa. E algo é melhor que nada.

Anotei as coisas que preciso, mas hmm, elas terão que vir de um mundo mortal. Espere, você é um mortal! Aqui. Pegue essas coisas! Pressa! Ir!"
"Look, I know you're annoyed that I need even more parts to repair the Warden Alert system. I'm annoyed about it too! I'm just a cat, and I'm doing my best! We can't give up on this. It's too important to the Wardens.

It looks like the glass we used in the earlier repair isn't strong enough: it actually melted inside the machine, and the mess took me hours to remove. Instead of glass, let's try diamonds. Those are super strong, right?

And this part here is supposed to be sparkling. Or sparking. Something like fire should be happening. See how it's coated in powder? I know this stuff! My master used a lot of it. It's a mix of sulfur and saltpeter. Get me some of both, maybe I can make it go again.": "Olha, eu sei que você está chateado porque preciso de ainda mais peças para consertar o sistema de Alerta do Diretor. Estou chateado com isso também! Sou apenas um gato e estou fazendo o meu melhor! Não podemos desistir disso. É muito importante para os Guardiões.

Parece que o vidro que usamos no reparo anterior não é forte o suficiente: na verdade, ele derreteu dentro da máquina e levei horas para remover a sujeira. Em vez de vidro, vamos tentar diamantes. Esses são super fortes, certo?

E esta parte aqui deveria ser brilhante. Ou faísca. Algo como fogo deveria estar acontecendo. Viu como está coberto de pó? Eu sei dessas coisas! Meu mestre usou muito disso. É uma mistura de enxofre e salitre. Traga-me um pouco de ambos, talvez eu consiga fazer isso de novo."
"Look, that's what the report says. I haven't met any mushroom people personally, but magic can do a lot of terrible things. Remember not to breathe weird spores!\\\"\": \"Sor Hackley, em Statehelm, disse": "“Se você vai cuidar das fadas sorrateiras do esgoto, é melhor ir um pouco além desse ponto e procurar por um surto de pessoas sencientes em forma de cogumelo."
"Look, the bandits were already a big problem for Amulna, and now they're much worse. And those sand dogs creep me out. Just fill out the forms however you need to, but those freaks need to go.\\\"\": \"Lumpfuzz, no deserto de Ilmari, disse": "\\\"Tudo bem, então os rakkies do sudoeste têm criado cães de areia extremamente cruéis. Você precisa matá-los."
"Look. We're friends so I'm gonna level with you. I'm... I'm a little scared to go back out there. There was a sheep that nearly killed me. Just a fuckin' <i>sheep</i>. But I couldn't outfight him and I couldn't outrun him. I'd feel a lot better if I knew he was gone. He lives on a hill south of here. Not the hill immediately south, but the one past that, in between the Baroness and the old hunting lodge.": "Olhar. Somos amigos, então vou ser sincero com você. Estou... estou com um pouco de medo de voltar lá. Houve uma ovelha que quase me matou. Apenas uma maldita <i>ovelha</i>. Mas eu não poderia enfrentá-lo e não poderia fugir dele. Eu me sentiria muito melhor se soubesse que ele se foi. Ele mora em uma colina ao sul daqui. Não a colina imediatamente ao sul, mas aquela que fica depois dela, entre a Baronesa e o antigo pavilhão de caça."
