"Bellema Deftwhisper in New Prestonbule said, \"I'm Mox's backup when we go out on expeditions. The stuff in the caves isn't too bad, but the stuff in the snow can be pretty scary! I'm not confident my crossbow can handle those huge bears before they have time to maul one of us. Can you kill some and let me know how hard they are to kill? Just a few will do. Like... five. No! Eight. That's a more scientific number.\"": "Bellema Deftwhisper em New Prestonbule disse: \"Sou o apoio de Mox quando saímos em expedições. As coisas nas cavernas não são tão ruins, mas as coisas na neve podem ser muito assustadoras! Não tenho certeza de que minha besta possa lidar com aqueles ursos enormes antes que eles tenham tempo de atacar um de nós. Você pode matar alguns e me dizer o quão difíceis eles são de matar? Apenas alguns servirão. Tipo... cinco. Não! Oito. Esse é um número mais científico. \""
"Bellema Deftwhisper in New Prestonbule said, \"There's a beast that lives in the caves here that I really hope I get a chance to hunt! They're sort of like dogs, but ... not dogs. Barghests! If you find any, can you try to get some patches of their flesh for me to study?\"": "Bellema Deftwhisper em New Prestonbule disse: \"Há uma fera que vive nas cavernas aqui e eu realmente espero ter a chance de caçar! Eles são como cães, mas... não são cães. Barghests! Se você encontrar algum, pode tentar conseguir alguns pedaços de sua carne para eu estudar?\""
"Bellema Deftwhisper in New Prestonbule said, \"When we were checking altitude measurements the other day, we found some very unusual creatures on top of the mountains. They're like slimes, but ice cold! A few fiery crossbow bolts can take 'em out. There's something inside, though... a sort of gunk. I'm thinking it might help make a nice kind of crossbow bolt. If you run across any ice slimes out there, check 'em for sludge!\"": "Bellema Deftwhisper em New Prestonbule disse: \"Quando estávamos verificando as medições de altitude outro dia, encontramos algumas criaturas muito incomuns no topo das montanhas. Eles são como limos, mas gelados! Algumas setas de besta de fogo podem eliminá-los. Há algo dentro, no entanto... uma espécie de gosma. Estou pensando que pode ajudar a fazer um bom tipo de seta de besta. Se você encontrar qualquer limo de gelo por aí, verifique se há lama!\""
"Bem, o que eu sei sobre morcegos? Eles odeiam insetos, certo? Confira essa ideia": "coma algumas vespas de tamanho adequado. Diga-me qual é o gosto deles.\""
"Bendith in the Fae Realm said, \"Last time I was banished from the Winter Court, I had the good sense to prepare first. But this time I was caught off-guard. I miss some of the silliest things, like the desserts served with military meals. If you wage battle with Winter Court Scouts, please search the fallen for candied ice beetles. I'll reward you!

It may be hard to find a scout that hasn't eaten all their beetles yet... I know! Look for especially thin scouts.\"": "Bendith, no Reino Fae, disse: “A última vez que fui banido da Corte Winter, tive o bom senso de me preparar primeiro.

Pode ser difícil encontrar um batedor que ainda não tenha comido todos os seus besouros... eu sei! Procure por batedores especialmente magros.\""
"Bendith in the Fae Realm said, \"My dark ritual requires a large number of fae rhino horns. Just go out and get some for me.\"": "Bendith, no Reino Fae, disse: \"Meu ritual sombrio requer um grande número de chifres de rinoceronte Fae. Basta sair e pegar alguns para mim.\""
"Bendith in the Fae Realm said, \"My... studies... require icebreeze moth wings. They are one of the only insects immune to cold, and so they are quite common back home. I'm sure plenty have flown through the portal to this land; look for areas where the Winter Court has taken control.\"": "Bendith, no Reino Fae, disse: “Meus... estudos... exigem asas de mariposa brisa gelada. Eles são um dos únicos insetos imunes ao frio e, portanto, são bastante comuns em casa."
"Bendith in the Fae Realm said, \"Would you 'be a deer' as the humans say, and pick me up a certain thing while you're out hunting? It's... a slightly delicate issue: I need a few barghest snouts. Please don't tell Marrowchomp -- I'm already 'on thin ice' with him, as the humans say.\"": "Bendith, no Reino Fae, disse: \"Você poderia 'ser um cervo', como dizem os humanos, e me pegar uma certa coisa enquanto estiver caçando? É... uma questão um pouco delicada: preciso de alguns focinhos barghest. Por favor, não conte a Marrowchomp - já estou 'no gelo fino' com ele, como dizem os humanos.\""
