"Mythander in Eltibule said, \"I suppose I could teach you horse-riding if you did a favor for me. You see, I despise goblins for obvious reasons, and there's talk of goblin miners in this area. I need to know what they're mining. You know how to kill a goblin, right? And swing a mining pick? Good, this should be easy for you! <i>[Note: Completion requires Mining 15.]</i>

I've heard there is a \"model home\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.\"": "Mythander em Eltibule disse: \"Suponho que poderia lhe ensinar a andar a cavalo se você me fizesse um favor. Veja, eu desprezo goblins por razões óbvias, e fala-se de goblins mineiros nesta área. Preciso saber o que eles estão minerando. Você sabe como matar um goblin, certo? E usar uma picareta de mineração? Bom, isso deve ser fácil para você! <i>[Nota: a conclusão requer Mineração 15.]</i>

Ouvi dizer que existe uma “casa modelo” em algum lugar por aqui – uma casa falsa. Se você subir no porão e passar por alguns goblins, há uma caverna embaixo. Descubra o que os goblins estão minerando naquela caverna! Vá até o final e mine o que estiver lá. Traga-me uma amostra.\""
"Nah, I don't think you can help with this roach problem. I need some of those fancy bug bombs, but they're hard to come by.

I guess if you're handy with a gizmo, you could build some and fumigate the place for us. I'd sure appreciate that!

Ser Hackley at the Council Headquarters could give you blueprints for the bug bombs, if you know how to read such things.": "Não, não acho que você possa ajudar com esse problema das baratas. Preciso de algumas daquelas bombas de insetos sofisticadas, mas são difíceis de encontrar.

Acho que se você tiver jeito com um aparelho, poderia construir um e fumigar o lugar para nós. Eu certamente apreciaria isso!

Sor Hackley, na Sede do Conselho, poderia lhe dar projetos para as bombas de insetos, se você souber ler essas coisas."
