": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Frango! Uma caçarola seria perfeita! Traga-me 10 pratos de caçarola de frango e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! And something other then beets... maybe some broccoli? Bring me 20 plates of Chicken and Broccoli, and maybe I can help you out somehow.": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Frango! E algo além de beterraba... talvez um pouco de brócolis? Traga-me 20 pratos de frango e brócolis e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! And something other then beets... maybe some broccoli? Bring me 20 plates of Chicken and Broccoli, and maybe I can help you out somehow.

": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Frango! E algo além de beterraba... talvez um pouco de brócolis? Traga-me 20 pratos de frango e brócolis e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Fish! I hear the Fae have a great recipe for vexfish! Bring me 20 Vexfish Lettuce Wraps, and maybe I can help you out somehow.": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Peixe! Ouvi dizer que os Fae têm uma ótima receita de peixe vex! Traga-me 20 Wraps de Alface Vexfish e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Fish! I hear the Fae have a great recipe for vexfish! Bring me 20 Vexfish Lettuce Wraps, and maybe I can help you out somehow.

": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Peixe! Ouvi dizer que os Fae têm uma ótima receita de peixe vex! Traga-me 20 Wraps de Alface Vexfish e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Pork! I hear the Fae have a great recipe for vexfish! Bring me 40 Evu Mint Pork, and maybe I can help you out somehow.": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Carne de porco! Ouvi dizer que os Fae têm uma ótima receita de peixe vex! Traga-me 40 Evu Mint Pork e talvez eu possa ajudá-lo de alguma forma."
