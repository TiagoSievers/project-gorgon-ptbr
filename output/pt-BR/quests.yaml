"Skitters in Statehelm said, \"Here is the problem: late at night, a creature is coming out of the sewers and attacking sentient animals. It focuses on the smart ones.

I have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.\"": "Skitters em Statehelm disse: \"Aqui está o problema: tarde da noite, uma criatura está saindo dos esgotos e atacando animais sencientes. Ela se concentra nos mais espertos.

Tenho um contato no esgoto. O nome dele é Hamilton e você pode confiar nele. Ele tem feito algum trabalho investigativo sobre esse problema. Encontre um caminho para o esgoto, localize-o e traga suas informações.\""
"Skitters in Statehelm said, \"It's what I feared. Our friend Hamilton has spotted a gigantic spider climbing out of the sewer at night. He hasn't seen how the spider returns -- it probably uses a different entrance -- but we can surmise that this is what is killing the sentient animals in Statehelm.

Hamilton says that he heard a clicking sound of a door opening right before he saw the spider. Look for a lever or mechanism that opens a door. And be ready for a fight.

You will doubtless need to kill this spider. But I don't believe it is a simple unintelligent spider. It is too cunning. Figure out what it was up to!\"": "Skitters em Statehelm disse: \"Era o que eu temia. Nosso amigo Hamilton avistou uma aranha gigante saindo do esgoto à noite. Ele não viu como a aranha retorna - provavelmente usa uma entrada diferente - mas podemos supor que é isso que está matando os animais sencientes em Statehelm.

Hamilton diz que ouviu o clique de uma porta se abrindo logo antes de ver a aranha. Procure uma alavanca ou mecanismo que abra uma porta. E esteja pronto para uma luta.

Você sem dúvida precisará matar esta aranha. Mas não acredito que seja uma simples aranha pouco inteligente. É muito astuto. Descubra o que estava acontecendo!\""
"Skitters sent you? I was expecting... Something else. But that's fine! Here: Skitters will know how to read this. Good hunting. I hope you don't hate spiders.": "Skitters enviou você? Eu estava esperando... Outra coisa. Mas tudo bem! Aqui: Skitters saberão como ler isso. Boa caça. Espero que você não odeie aranhas."
