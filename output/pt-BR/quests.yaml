"You're killing fey panthers in Eltibule.": "Você está matando panteras feéricas em Eltibule."
"You're killing fire sheep in Serbule Hills.": "Você está matando ovelhas de fogo em Serbule Hills."
"You're killing fire spiders in Eltibule.": "Você está matando aranhas de fogo em Eltibule."
"You're killing giant mantises in Eltibule.": "Você está matando louva-a-deus gigantes em Eltibule."
"You're killing giant scorpions in the dream version of the Ilmari Desert.": "Você está matando escorpiões gigantes na versão onírica do deserto de Ilmari."
"You're killing giant snails in Eltibule.": "Você está matando caracóis gigantes em Eltibule."
"You're killing gnashers in Eltibule.": "Você está matando roedores em Eltibule."
"You're killing guard scrays in Serbule Hills.": "Você está matando guardas em Serbule Hills."
"You're killing Hexapuses in Povus.": "Você está matando Hexapuses em Povus."
"You're killing Kuvou in Povus.": "Você está matando Kuvou em Povus."
"You're killing manticores in the dream version of the Ilmari Desert.": "Você está matando manticoras na versão onírica do deserto de Ilmari."
"You're killing panthers in Eltibule.": "Você está matando panteras em Eltibule."
"You're killing pigs in Serbule Hills.": "Você está matando porcos em Serbule Hills."
"You're killing poison slugs in the lakes of Eltibule.": "Você está matando lesmas venenosas nos lagos de Eltibule."
"You're killing ranalon gardeners in Serbule Hills.": "Você está matando jardineiros Ranalon em Serbule Hills."
"You're killing ranalon stoneshapers in Serbule Hills.": "Você está matando os modeladores de pedras Ranalon em Serbule Hills."
"You're killing rats in Serbule Hills.": "Você está matando ratos em Serbule Hills."
"You're killing sheep in Serbule Hills.": "Você está matando ovelhas em Serbule Hills."
"You're killing skeletal frogs in the dream version of the Ilmari Desert.": "Você está matando sapos esqueléticos na versão onírica do deserto de Ilmari."
"You're killing skeleton archers in the dream version of the Ilmari Desert.": "Você está matando esqueletos arqueiros na versão onírica do deserto de Ilmari."
"You're killing skeleton mages in the dream version of the Ilmari Desert.": "Você está matando esqueletos magos na versão onírica do deserto de Ilmari."
"You're killing skeleton swordsmen in the dream version of the Ilmari Desert.": "Você está matando espadachins esqueletos na versão onírica do deserto de Ilmari."
"You're killing spiders in Serbule Hills.": "Você está matando aranhas em Serbule Hills."
"You're killing spiders in the dream version of the Ilmari Desert.": "Você está matando aranhas na versão onírica do deserto de Ilmari."
"You're killing Tentakillers in Povus.": "Você está matando Tentakillers em Povus."
"You're killing tigers in Serbule Hills.": "Você está matando tigres em Serbule Hills."
"You're killing tornado spiders in the dream version of the Ilmari Desert.": "Você está matando aranhas tornado na versão onírica do deserto de Ilmari."
"You're killing vipers in the dream version of the Ilmari Desert.": "Você está matando víboras na versão onírica do deserto de Ilmari."
"You're killing wild chickens in Serbule Hills.": "Você está matando galinhas selvagens em Serbule Hills."
"You're killing wild pigs in Serbule Hills.": "Você está matando porcos selvagens em Serbule Hills."
"You're killing worgs in Serbule Hills.": "Você está matando worgs em Serbule Hills."
"You're my best chance. I will give you half -- no, two thirds of the money for the job.\\\"\": \"Gunther Ashbrown, em Statehelm, disse": "\\\"Tenho procurado por você por toda parte!"
"You're my savior! Just another year of classes to go and I can wean myself off of this stuff.": "Você é meu salvador! Falta apenas mais um ano de aulas e posso me livrar dessas coisas."
"You're scarily effective. But it's the good kind of scary!": "Você é assustadoramente eficaz. Mas é o tipo bom de assustador!"
"You're slaying goblins that hinder the road to Sedgewick Forest.": "Você está matando goblins que atrapalham o caminho para a Floresta Sedgewick."
"You're so boring! Go kill some deadly boss monsters! There's always boss monsters in epic tales!": "Você é tão chato! Vá matar alguns monstros chefes mortais! Sempre há monstros chefes em contos épicos!"
"You're so cerebral all the time! You need to work with your hands more. Try growing some carrots. Gardening will really help you see the world around you in a different way.": "Você é tão cerebral o tempo todo! Você precisa trabalhar mais com as mãos. Experimente cultivar algumas cenouras. A jardinagem realmente ajudará você a ver o mundo ao seu redor de uma maneira diferente."
"You're the best! I'm going to start selling this as my own creation. And you can be my secret supplier, okay? This is all the benefits of having a bar without any of the hassle. You'll see! Check back in a week!": "Você é o melhor! Vou começar a vender isso como minha própria criação. E você pode ser meu fornecedor secreto, ok? Essas são todas as vantagens de ter um bar sem complicações. Você verá! Volte em uma semana!"
"You're the one that brought me the painclover from Louis, right? Yes, it was definitely you. How did he look? Still sickly? He'd taken so much demon poison that I didn't think he'd survive. I'd almost given up hope, actually.

But if he's healthy now, he needs to come here and live in my camp.

As you're obviously a florist of some skill, could you find some of Louis's favorite flowers and deliver them to him? He'll know what it means. And I will pay you zealously. For your efforts as much as for your discretion.": "Foi você quem me trouxe o analgésico do Louis, certo? Sim, definitivamente foi você. Como ele estava? Ainda doente? Ele tomou tanto veneno demoníaco que não achei que ele sobreviveria. Eu quase perdi as esperanças, na verdade.

Mas se ele está saudável agora, precisa vir para cá e morar no meu acampamento.

Como você obviamente é um florista habilidoso, poderia encontrar algumas das flores favoritas de Louis e entregá-las a ele? Ele saberá o que isso significa. E eu pagarei a você com zelo. Tanto pelos seus esforços quanto pela sua discrição."
"You're the Warden they sent? Good. Little Red told us to contact you if the forest werewolves seemed to be acting more intelligently.

The caves near here are full of werewolves, but usually only a few wander out into the woods. Until today. Scores more poured out. They're still fighting mindlessly, but something is up.

Sanja and me have killed our fill and need a bit of rest before we go again. Hopefully you can pick up the slack.": "Você é o Diretor que eles enviaram? Bom. Little Red nos disse para contatá-lo se os lobisomens da floresta parecessem estar agindo de forma mais inteligente.

As cavernas próximas daqui estão cheias de lobisomens, mas geralmente apenas alguns vagam pela floresta. Até hoje. Mais pontuações foram derramadas. Eles ainda estão lutando sem pensar, mas algo está acontecendo.

Sanja e eu já nos esgotamos e precisamos descansar um pouco antes de voltarmos. Espero que você consiga compensar."
"You've already drained SO MUCH life from this world, it's glorious. But now let's get more targeted... sentient creatures feel more suffering than the others, so focus on them!": "Você já drenou TANTA vida deste mundo, é glorioso. Mas agora vamos ser mais direcionados... criaturas sencientes sentem mais sofrimento que as outras, então concentre-se nelas!"
"You've awakened in a strange place and you don't remember anything. You get the feeling this has happened to you before... but maybe not as badly as this.

A fairy woman standing nearby waves and flutters more quickly when she sees you. Maybe she can help you.": "Você acordou em um lugar estranho e não se lembra de nada. Você tem a sensação de que isso já aconteceu com você antes... mas talvez não tão mal assim.

Uma fada que está por perto acena e se agita mais rapidamente quando vê você. Talvez ela possa ajudá-lo."
"You've awakened in a strange place and you don't remember anything. You need to get your feet under you, get your wings flapping, and figure out what happened and where you are.": "Você acordou em um lugar estranho e não se lembra de nada. Você precisa colocar os pés sob você, bater as asas e descobrir o que aconteceu e onde você está."
"You've baked perfection and mastered the Bread symbol.": "Você preparou a perfeição e dominou o símbolo do Pão."
"You've become a horse person to unlock the Horse symbol.": "Você se tornou um cavaleiro para desbloquear o símbolo do Cavalo."
"You've been asked to obtain Fulgurites for Ratuk the Thinker.": "Você foi solicitado a obter Fulgurites para Ratuk, o Pensador."
"You've been incredibly helpful in my research thus far, but we've only been dealing with the minions. I still have many questions about the higher ranks of the demons.

We should start by examining the large ones. I've noticed that one of them seems more in-charge than the other, despite no obvious physical differences. The brains have been so helpful in the past, and you've proven that you're clearly capable of extracting them, so bring me some from each, if you don't mind.": "Você tem sido extremamente útil em minha pesquisa até agora, mas só temos lidado com os lacaios. Ainda tenho muitas perguntas sobre os escalões superiores dos demônios.

Deveríamos começar examinando os grandes. Percebi que um deles parece mais responsável do que o outro, apesar de não haver diferenças físicas óbvias. Os cérebros foram muito úteis no passado, e você provou que é claramente capaz de extraí-los, então traga-me um pouco de cada um, se não se importar."
"You've been shocked enough to control the potent Lightning symbol!": "Você ficou chocado o suficiente para controlar o poderoso símbolo do Relâmpago!"
"You've been talking to my mom even after I told you to stop. That's pretty dick. And now you bring me a cursed amulet. I know what this is! It looks like a peace offering, but it's actually a collar. She can tell where I am when I wear this, can't she?! TELL ME!

That's what I thought.

It will protect me from death, but also tell my mother where I am at all times.

Well, she obviously knows where I am already. So I guess I'm leashed.

<i>[Helena puts the amulet on.]</i>

And hey, fuck you.": "Você tem conversado com minha mãe mesmo depois que eu disse para você parar. Isso é muito idiota. E agora você me traz um amuleto amaldiçoado. Eu sei o que é isso! Parece uma oferta de paz, mas na verdade é uma coleira. Ela consegue dizer onde estou quando uso isso, não consegue?! DIGA-ME!

Isso é o que eu pensei.

Isso me protegerá da morte, mas também dirá à minha mãe onde estou o tempo todo.

Bem, ela obviamente já sabe onde estou. Então acho que estou sob controle.

<i>[Helena coloca o amuleto.]</i>

E ei, vá se foder."
"You've brain-blitzed your way to the Brain symbol!": "Você abriu caminho até o símbolo do Cérebro!"
"You've broken the paleontologists' siege! Visit the town Status board for a reward.": "Você quebrou o cerco dos paleontólogos! Visite o quadro de status da cidade para receber uma recompensa."
"You've chased off the Winter Court! Visit the town Status board for a reward.": "Você expulsou a Corte Winter! Visite o quadro de status da cidade para receber uma recompensa."
"You've completed the main storyline quests so far! Good work! More coming soon.": "Você completou as missões da história principal até agora! Bom trabalho! Mais em breve."
"You've defeated Brukal's assault team! Visit the town Status board for a reward.": "Você derrotou a equipe de assalto de Brukal! Visite o quadro de status da cidade para receber uma recompensa."
"You've defeated the guardians. That's half of the entrance requirements done.": "Você derrotou os guardiões. Isso é metade dos requisitos de entrada cumpridos."
"You've defeated the ratkin! Visit the town Status board for a reward.": "Você derrotou o ratkin! Visite o quadro de status da cidade para receber uma recompensa."
"You've defeated Urg-Ak Faq! Visit the town Status board for a reward.": "Você derrotou Urg-Ak Faq! Visite o quadro de status da cidade para receber uma recompensa."
"You've defeated Zotras the River Guardian! Visit the town Status board for a reward.": "Você derrotou Zotras, o Guardião do Rio! Visite o quadro de status da cidade para receber uma recompensa."
"You've defended yourself with the Shield and achieved the Shield symbol.": "Você se defendeu com o Escudo e alcançou o símbolo do Escudo."
"You've delivered the beer for the party! You just need to let Brandon Mellus know that it's completed.": "Você entregou a cerveja para a festa! Você só precisa avisar Brandon Mellus que está concluído."
"You've done a wonderful job gathering decorations. It's a scrappy tree, but it'll do the job.

The people around here like to stop by and leave presents for their friends under the tree. I'm sure you'll find gifts for yourself under the tree each day. The first present is from me. Come back tomorrow to see what else has shown up!": "Você fez um trabalho maravilhoso reunindo decorações. É uma árvore fragmentada, mas dará conta do recado.

As pessoas por aqui gostam de passar por aqui e deixar presentes para os amigos debaixo da árvore. Tenho certeza que você encontrará presentes para si mesmo debaixo da árvore todos os dias. O primeiro presente é meu. Volte amanhã para ver o que mais apareceu!"
"You've done well. As a reward I shall let you help me see this grim work to its conclusion.": "Você se saiu bem. Como recompensa, deixarei que você me ajude a levar esse trabalho sombrio até a conclusão."
"You've done well. I need to make some observations and record my findings. I will have more requests of you soon.\": \"Hah! Nem preciso estudá-los mais para saber a verdade": "esses cérebros de soldados são da mesma espécie que os cérebros dos enxameadores. Swarmers de alguma forma evoluem para Soldiers! Eu sabia, mas não tinha como provar."
"You've eaten cheese until the Cheese symbol became obvious to you!": "Você comeu queijo até que o símbolo do Queijo se tornou óbvio para você!"
"You've eaten meat until the Meat symbol became clear!": "Você comeu carne até que o símbolo da Carne ficou claro!"
"You've finally come to understand the true meaning of the Cutlery symbol!": "Você finalmente entendeu o verdadeiro significado do símbolo dos Talheres!"
"You've found a good selection of gems! I hope they aren't valuable... ? Because they'll inevitably be lost all through this cave in a week! But they'll be very useful in the mean time. Thank you!": "Você encontrou uma boa seleção de joias! Espero que eles não sejam valiosos...? Porque eles inevitavelmente se perderão por toda esta caverna em uma semana! Mas eles serão muito úteis nesse meio tempo. Obrigado!"
"You've found Miss Behaved! She seemed rather hungry when you found her and asked that you make her favorite food dish for her trip home.": "Você encontrou a senhorita Comportada! Ela parecia com muita fome quando você a encontrou e pediu que você preparasse seu prato favorito para a viagem para casa."
"You've found Miss Fire! She's asked that you help her gather some supplies before she returns home.": "Você encontrou a Senhorita Fogo! Ela pediu que você a ajudasse a reunir alguns suprimentos antes de voltar para casa."
"You've found Miss Fits! But she doesn't seem interested in going home until she wins another game. Help by bringing her some red wing tokens so she can buy a game ticket!": "Você encontrou a senhorita Fits! Mas ela não parece interessada em voltar para casa até ganhar outro jogo. Ajude trazendo algumas fichas de asas vermelhas para que ela possa comprar um ingresso de jogo!"
"You've found Miss Guided! But she refuses to return to Miss Chievous until she gathers supplies for a surprise party she wants to throw for Miss Chievous. Help her find some confetti!": "Você encontrou a senhorita Guiada! Mas ela se recusa a voltar para Miss Chievous até reunir suprimentos para uma festa surpresa que deseja dar para Miss Chievous. Ajude-a a encontrar alguns confetes!"
"You've glared at enough females that you feel you have mastered the Female symbol!": "Você olhou para mulheres o suficiente e sente que dominou o símbolo Feminino!"
"You've glared at enough males that you feel you have mastered the Male symbol!": "Você olhou para homens suficientes e sente que dominou o símbolo masculino!"
"You've got the basics. Let's get to specifics. You need to know how to blast apart a demon! So go do that. Do it for quite a while and take note of what works and what doesn't. I'll give you a quiz afterwards.": "Você tem o básico. Vamos aos detalhes. Você precisa saber como destruir um demônio! Então vá fazer isso. Faça isso por um bom tempo e observe o que funciona e o que não funciona. Vou te fazer um teste depois."
"You've got the hang of catching and cleaning Bonefish now!": "Você já pegou o jeito de capturar e limpar Bonefish!"
"You've got the hang of catching and cleaning Crater Gar now!": "Você já pegou o jeito de capturar e limpar Crater Gar!"
"You've got the hang of catching and cleaning Eagle Ray now!": "Você já pegou o jeito de capturar e limpar Eagle Ray!"
"You've got the hang of catching and cleaning Grouper now!": "Você já pegou o jeito de pegar e limpar garoupa!"
"You've got the hang of catching and cleaning Marlin now!": "Você já pegou o jeito de capturar e limpar Marlin!"
"You've got the hang of catching and cleaning Non-Drevan Snook now!": "Você já pegou o jeito de capturar e limpar Não-Drevan Snook!"
"You've got the hang of catching and cleaning Pyrocarp now!": "Você já pegou o jeito de capturar e limpar o Pyrocarp!"
"You've got the hang of catching and cleaning Radiant Muskie now!": "Você já pegou o jeito de capturar e limpar Radiant Muskie!"
"You've got the hang of catching and cleaning Sorubim now!": "Você já pegou o jeito de capturar e limpar Sorubim!"
"You've got the hang of catching and cleaning Striped Bass now!": "Você já pegou o jeito de capturar e limpar o Striped Bass!"
"You've got the hang of catching and cleaning Tarpon now!": "Você já pegou o jeito de capturar e limpar Tarpon!"
"You've got the hang of catching and cleaning Triple Tail now!": "Você já pegou o jeito de capturar e limpar Triple Tail!"
"You've got the hang of catching and cleaning Vertan Tuna now!": "Você já pegou o jeito de pescar e limpar o atum Vertan!"
"You've got the hang of catching and cleaning Vidarian Pickerel now!": "Você já pegou o jeito de capturar e limpar Vidarian Pickerel!"
"You've got the hang of catching and cleaning Wahoo now!": "Você já pegou o jeito de pegar e limpar Wahoo!"
"You've got the jingle. You've got the drape. The only thing you're missing is the subject itself. A bit of hands-on craftwork should illuminate the final aspect of the Necklace symbol.": "Você tem o jingle. Você tem a cortina. A única coisa que falta é o assunto em si. Um pouco de trabalho manual deve iluminar o aspecto final do símbolo do Colar."
"You've halted the ranalon assault! Visit the town Status board for a reward.": "Você interrompeu o ataque Ranalon! Visite o quadro de status da cidade para receber uma recompensa."
"You've halted the undead invasion! Visit the town Status board for a reward.": "Você interrompeu a invasão de mortos-vivos! Visite o quadro de status da cidade para receber uma recompensa."
"You've helped me get all my stock back. And my new masterpiece is perhaps even better than the old one! I can't thank you enough. But let me try. I have an idea for a masterpiece just for you. I only need a few special ingredients! When you come back with these things, be ready to tell me what combat skills I should enchant it with.": "Você me ajudou a recuperar todo o meu estoque. E minha nova obra-prima talvez seja ainda melhor que a antiga! Não posso agradecer o suficiente. Mas deixe-me tentar. Tenho uma ideia para uma obra-prima só para você. Só preciso de alguns ingredientes especiais! Quando você voltar com essas coisas, esteja pronto para me dizer com quais habilidades de combate devo encantá-las."
"You've kicked and ... kicked your way to the Footprint symbol!": "Você chutou e... chutou até chegar ao símbolo da Pegada!"
"You've mastered the Necklace symbol, and hence, your heart.": "Você dominou o símbolo do Colar e, portanto, seu coração."
"You've outdone yourself! Why, I can't think of any other wines to teach you!

And hey, I can sense your presence. I mean, even when I'm not looking at you! By brewing all that wine in my name, you've gone and made yourself a Scion of me! Welcome aboard! Let's get hammered in celebration!": "Você se superou! Ora, não consigo pensar em nenhum outro vinho para lhe ensinar!

E ei, posso sentir sua presença. Quero dizer, mesmo quando não estou olhando para você! Ao preparar todo aquele vinho em meu nome, você se tornou um Herdeiro meu! Bem-vindo a bordo! Vamos nos embebedar em comemoração!"
"You've picked up the very basics of horse handling. You should be able to tame a wild horse now, but it would need to be a very calm horse... and you'd need a special treat for the horse!

You found weird seeds near one of the horses... perhaps whatever grows from these would work?": "Você aprendeu os princípios básicos do manejo de cavalos. Você deveria ser capaz de domar um cavalo selvagem agora, mas ele precisaria ser um cavalo muito calmo... e você precisaria de um tratamento especial para o cavalo!

Você encontrou sementes estranhas perto de um dos cavalos... talvez o que crescesse com elas funcionaria?"
"You've plucked so many mushrooms! Finally, the Mushroom symbol is yours to wield.": "Você colheu tantos cogumelos! Finalmente, o símbolo do Cogumelo é seu para exercer."
"You've proven yourself capable on the battlefield. I wonder if you would like to learn of another way to help Arisetsu's mission?

It's a bit unorthodox. I'm sure my higher-ups in the church wouldn't approve. But I think it's worthwhile.

I'm sorry for being vague. You see, I promised someone that I'd let them vet anyone I wanted to pass on this knowledge to. He's dead, but his wife will know what he was looking for. Go get her blessing to learn the secret. Fransesca is in the wizard school. Yes, she's a necromancer. But she's one of the good ones. Trust me.": "Você provou ser capaz no campo de batalha. Gostaria de saber se você gostaria de aprender outra maneira de ajudar na missão de Arisetsu?

É um pouco pouco ortodoxo. Tenho certeza de que meus superiores na igreja não aprovariam. Mas acho que vale a pena.

Sinto muito por ser vago. Veja, prometi a alguém que os deixaria examinar qualquer pessoa a quem eu quisesse transmitir esse conhecimento. Ele está morto, mas sua esposa saberá o que ele procurava. Vá buscar a bênção dela para aprender o segredo. Fransesca está na escola de bruxos. Sim, ela é uma necromante. Mas ela é uma das boas. Confie em mim."
"You've realized that the beautiful symmetry of dice can only be understood with use. This is the path to the Die symbol.": "Você percebeu que a bela simetria dos dados só pode ser compreendida com o uso. Este é o caminho para o símbolo Die."
"You've repelled the flapskulls! Visit the town Status board for a reward.": "Você repeliu os flapskulls! Visite o quadro de status da cidade para receber uma recompensa."
"You've rescued Jesina's sister Sarina, who is repairing your broken nexus adjunct matter aligner. It should be ready in time for dinner. (Hang Out with Jesina to advance the quest.)": "Você resgatou a irmã de Jesina, Sarina, que está consertando seu alinhador de matéria adjunto do Nexus quebrado. Deve estar pronto a tempo do jantar. (Saia com Jesina para avançar na missão.)"
"You've routed the orcs! Visit the town Status board for a reward.": "Você derrotou os orcs! Visite o quadro de status da cidade para receber uma recompensa."
"You've saved lives! How does that feel? Bardic? There's more where that came from!": "Você salvou vidas! Como é isso? Bardo? Tem mais de onde isso veio!"
"You've souped and souped until the Soup symbol was bested!": "Você envenenou e envenenou até que o símbolo da Sopa foi superado!"
"You've studied the blade and mastered the Sword symbol.": "Você estudou a lâmina e dominou o símbolo da Espada."
"You've thwarted the pagoda thieves! Visit the town Status board for a reward.": "Você frustrou os ladrões do pagode! Visite o quadro de status da cidade para receber uma recompensa."
"You've tried to master the Deer symbol, but all your attempts ring hollow. You're an artist and you need to get this RIGHT! This can only be achieved by literally getting into the mind of your subject.": "Você tentou dominar o símbolo do cervo, mas todas as suas tentativas soaram vazias. Você é um artista e precisa acertar! Isso só pode ser alcançado entrando literalmente na mente do assunto."
"You, on the other hand... you could just kill 'em all, as the humans say...\\\"\": \"Pegast, no Reino Fae, disse": "\\\"Você é um amigo e confio em sua discrição. Ambos sabemos que a Corte Winter está se infiltrando nesta terra e eles precisam ser detidos. Mas não ousamos atacá-los até que ataquem primeiro."
"You... Brought me oranges! I guess that means you aren't scary after all! Now I see you're actually just a big cutie! Thank you!": "Você... me trouxe laranjas! Acho que isso significa que você não é assustador, afinal! Agora vejo que você é realmente uma gracinha! Obrigado!"
"You... killed a hundred ratkin?!

Hey, Grommewik, is it safe to go home? ... There are HOW many ratkin in the hallway? ARGH! How can they breed this fast?!": "Você... matou cem ratkins?!

Ei, Grommewik, é seguro ir para casa? ...Há QUANTOS ratkin no corredor? ARGH! Como eles podem procriar tão rápido?!"
"You... really?! Amazing! Mortals are far more powerful than we were taught. That's... kind of scary, actually. I mean, thanks, but... you just, like, killed them? Huh. Here, take this, not that you need it. Here's a bunch of this Council money, too.": "Você... sério?! Incrível! Os mortais são muito mais poderosos do que nos ensinaram. Isso é... meio assustador, na verdade. Quero dizer, obrigado, mas... você simplesmente os matou? Huh. Aqui, pegue isso, não que você precise. Aqui está um monte de dinheiro do Conselho também."
"You... succeeded? I'm ... ahem, I'm impressed! You are much more useful than you look!

I've done a cursory review of these crystals, and I have some follow-up requests, if you have time.": "Você... conseguiu? Estou... aham, estou impressionado! Você é muito mais útil do que parece!

Fiz uma revisão superficial desses cristais e tenho alguns pedidos de acompanhamento, se você tiver tempo."
"You... you killed Old Fangsworth? For me? Well, I really needed to kill him myself. For the honor, you know? But I guess knowing that he's no longer out there mocking me is good, too. Thanks!": "Você... você matou o Velho Fangsworth? Para mim? Bem, eu realmente precisava matá-lo sozinho. Pela honra, sabe? Mas acho que saber que ele não está mais zombando de mim também é bom. Obrigado!"
"Young foxes love colorful gems! I could use a selection of nice colors to use as teaching props.": "As jovens raposas adoram joias coloridas! Eu poderia usar uma seleção de cores bonitas para usar como acessórios de ensino."
"Your attempts at the Cheese symbol just don't depict its savoriness. You must go back to the cutting board.": "Suas tentativas com o símbolo do Queijo simplesmente não retratam seu sabor. Você deve voltar para a tábua de corte."
"Your deeds are noble. Remember that fungus helps enliven the land! So you are saving your homeland, too, in a way.": "Suas ações são nobres. Lembre-se que o fungo ajuda a dar vida à terra! Então você também está salvando sua terra natal, de certa forma."
"Your mind will never fly free while your thoughts stay so firmly planted on the ground. You need to start thinking like the wind! Hmm, I know -- why don't you go think <i>in</i> the wind? In a sandstorm! Now don't get crazy -- just stay in the sand storm for a few seconds at a time, or you might get hurt!": "Sua mente nunca voará livremente enquanto seus pensamentos permanecerem tão firmemente plantados no chão. Você precisa começar a pensar como o vento! Hmm, eu sei. Por que você não pensa <i>no</i> vento? Em uma tempestade de areia! Agora não fique louco – apenas fique na tempestade de areia por alguns segundos de cada vez, ou você pode se machucar!"
"Your prowess in battle is great, but watch that it does not eclipse your armorsmithing.": "Sua destreza em batalha é grande, mas tome cuidado para não ofuscar sua armadura."
"Your specimens are acceptable, and my gratitude is significant.": "Seus espécimes são aceitáveis ​​e minha gratidão é significativa."
"Your spirits still seem low, but they're <i>slightly</i> higher than before. Hmm, I bet the shark you used wasn't very predatory. But every little step to wellness helps!": "Seu ânimo ainda parece desanimado, mas está <i>ligeiramente</i> mais elevado do que antes. Hmm, aposto que o tubarão que você usou não era muito predatório. Mas cada pequeno passo para o bem-estar ajuda!"
"Your work is adequate. ... Honestly, it's quite a bit more than adequate, I'm forced to admit.": "Seu trabalho é adequado. ... Honestamente, é um pouco mais do que adequado, sou forçado a admitir."
"Your work isn't conventional at all. Like someone who mastered their craft through sheer willpower instead of decades of practice! But I have to admit that it's serviceable work.": "Seu trabalho não é nada convencional. Como alguém que dominou seu ofício por pura força de vontade, em vez de décadas de prática! Mas tenho que admitir que é um trabalho útil."
"Yoy the Myconian asked you to kill Senzur the mindworm, deep in the myconian cave.": "Yoy, o Myconiano, pediu para você matar Senzur, o verme mental, nas profundezas da caverna Myconiana."
"Yoy the Myconian asked you to kill Senzur the mindworm, deep in the myconian cave. ": "Yoy, o Myconiano, pediu para você matar Senzur, o verme mental, nas profundezas da caverna Myconiana."
"Yurra the hag said that the brain bugs infesting Serbule were made by Dalvos. Find where they are coming from. They are most prevalent in the north, so search there for someone who might know more.": "Yurra, a bruxa, disse que os insetos cerebrais que infestam Serbule foram feitos por Dalvos. Descubra de onde eles vêm. Eles são mais prevalentes no norte, então procure alguém que possa saber mais."
"Yurra the hag suggested that you might find Dalvos somewhere in Serbule. She said that an elf in town had been inspecting the giant red crystals that Dalvos is known to make. Find this elf and see if she can help you.": "Yurra, a bruxa, sugeriu que você pudesse encontrar Dalvos em algum lugar de Serbule. Ela disse que um elfo da cidade estava inspecionando os gigantescos cristais vermelhos que Dalvos fabricava. Encontre esta elfa e veja se ela pode ajudá-lo."
"Zazzamath in The Rubywall in Vidaria said, \"I am <i>so</i> bored here, stuck in this giant red ice cube. I was sent here for one purpose and one purpose only, to destroy as much life as possible on this stupid rock. But there's no chance that's happening now. But maybe the outcome can still be achieved... I tell you what. Go out and end lives in my name, and I will tell you whatever you want to know about the invading demon force. Deal?\"": "Zazzamath em The Rubywall em Vidaria disse: \"Estou tão entediado aqui, preso neste gigante cubo de gelo vermelho. Fui enviado aqui com um propósito e apenas um propósito, destruir o máximo de vida possível nesta rocha estúpida. Mas não há chance de isso estar acontecendo agora. Mas talvez o resultado ainda possa ser alcançado... Vou te dizer uma coisa. Saia e acabe com vidas em meu nome, e eu lhe direi tudo o que você quiser saber sobre a força demoníaca invasora. Combinado?\""
"Zazzamath in The Rubywall in Vidaria said, \"The thing about life is, it somehow keeps coming back! But now while you're around to say anything about it! Go out, end as many lives as you can, then come back. Then do it again next week!\"": "Zazzamath em The Rubywall in Vidaria disse: \"O problema da vida é que, de alguma forma, ela continua voltando! Mas agora, enquanto você está por perto para dizer qualquer coisa sobre isso! Saia, acabe com tantas vidas quanto puder e depois volte. Depois faça isso de novo na próxima semana!\""
"Zazzamath in The Rubywall in Vidaria said, \"You are positively itching to snuff more lifes, aren't you?! I knew it. And I <i>love</i> it! Get out there and do what you do best, fleshbag!\"": "Zazzamath em The Rubywall in Vidaria disse: \"Você está positivamente ansioso para matar mais vidas, não é?! Eu sabia disso. E eu <i>adoro</i>! Vá lá e faça o que você faz de melhor, saco de carne!\""
"Zazzamath in The Rubywall in Vidaria said, \"You got a little taste of destroying life, and now you're back for more, are you? Maybe you have some demon in you, have you ever considered that? Heh heh heh heh... Well then go! Kill more things! MANY more things! When we're through, this whole rock will be barren!\"": "Zazzamath em The Rubywall in Vidaria disse: \"Você sentiu um gostinho de destruir a vida e agora está de volta para mais, não é? Talvez você tenha algum demônio em você, já pensou nisso? Heh heh heh heh... Bem, então vá! Mate mais coisas! MUITO mais coisas! Quando terminarmos, toda esta rocha ficará estéril!\""
"Zazzamath in The Rubywall in Vidaria said, \"You've already drained SO MUCH life from this world, it's glorious. But now let's get more targeted... sentient creatures feel more suffering than the others, so focus on them!\"": "Zazzamath em The Rubywall in Vidaria disse: \"Você já drenou MUITA vida deste mundo, é glorioso. Mas agora vamos ser mais direcionados... criaturas sencientes sentem mais sofrimento do que as outras, então concentre-se nelas!\""
"Zeratak and I wish to make a living selling our special alchemical brain elixirs. These are traditional psi-mantis recipes, but I am attempting to hone them to be less toxic to other races. I believe that the lobes from the brain bugs are too potent... instead, I wish to grind up their entire brains. Or any fully intact brains will do, actually. I am a scientist. I am not picky.": "Zeratak e eu queremos ganhar a vida vendendo nossos elixires cerebrais alquímicos especiais. Estas são receitas tradicionais de psi-louva-a-deus, mas estou tentando aprimorá-las para que sejam menos tóxicas para outras raças. Acredito que os lóbulos dos insetos cerebrais são muito potentes... em vez disso, desejo triturar seus cérebros inteiros. Ou qualquer cérebro totalmente intacto servirá, na verdade. Eu sou um cientista. Eu não sou exigente."
"Zhao in Rahu said, \"As I understand it, most of the tree's decorations should be large, round, colorful balls. How about lemons?\"": "Zhao em Rahu disse: \"Pelo que entendi, a maioria das decorações da árvore deveriam ser bolas grandes, redondas e coloridas. Que tal limões?\""
"Zhao in Rahu said, \"I do understand that this is a peaceful holiday. But if we want the people of Rahu to be excited, it needs to incorporate some of our culture! Traditionally our celebrations feature trophies from our fallen enemies. But we are at peace right now... so perhaps the least-offensive trophies would be from fellow rakshasa. The vile bandits in the desert prey upon the weak and the pitiful. Kill them, sever their ears, and bring them back. Oh, and please try to focus on bandits with big healthy ears.\"": "Zhao em Rahu disse: \"Eu entendo que este é um feriado pacífico. Mas se quisermos que o povo de Rahu fique animado, ele precisa incorporar um pouco de nossa cultura! Tradicionalmente, nossas celebrações apresentam troféus de nossos inimigos caídos. Mas estamos em paz agora... então talvez os troféus menos ofensivos sejam de companheiros rakshasa. Os bandidos vis no deserto atacam os fracos e os lamentáveis. Mate-os, corte suas orelhas e traga-os de volta. Ah, e por favor tente focar em bandidos com orelhas grandes e saudáveis.\""
"Zhao in Rahu said, \"The tree came with a complex system of wires and sparking mechanisms. Apparently they can make the tree glow. I've asked Ufkar to reverse-engineer it, and he says we can make it work with a power source. A few dwarven N cores ought to work.\"": "Zhao em Rahu disse: \"A árvore veio com um sistema complexo de fios e mecanismos de faíscas. Aparentemente eles podem fazer a árvore brilhar. Pedi a Ufkar para fazer engenharia reversa e ele disse que podemos fazê-la funcionar com uma fonte de energia. Alguns N núcleos anões deveriam funcionar.\""
"Zhao in Rahu said, \"The tree should be topped with a large decoration. But what decoration? There were no instructions. Since this is a human celebration of Ri-Shin, the god of plants and trees, it makes sense to use a wooden decoration, no? Fetch me a large load of spruce and I'll ask Daniel Murderdark what we should make with it.\"": "Zhao em Rahu disse: \"A árvore deve ser coberta com uma grande decoração. Mas que decoração? Não houve instruções. Como esta é uma celebração humana de Ri-Shin, o deus das plantas e das árvores, faz sentido usar uma decoração de madeira, não? Traga-me uma grande carga de abetos e perguntarei a Daniel Murderdark o que devemos fazer com eles.\""
