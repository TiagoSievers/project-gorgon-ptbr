"Argh! I'm sick of buying Sweet Butter from Marna. She won't teach me the recipe. But I heard there's someone in Eltibule Castle's courtyard who knows the recipe. Can you get it?": "Argh! Estou farto de comprar Sweet Butter da Marna. Ela não vai me ensinar a receita. Mas ouvi dizer que há alguém no pátio do Castelo Eltibule que conhece a receita. Você consegue?"
"Arianna Fangblade in Red Wing Casino said, \"Fiddler over there's immortal, as in 'never grows old' immortal. Nice trick, right? But he can still die of disease! His hoofs are hundreds 'a years old and need to be cleaned. I need one more thing for my cleaning kit: yeti hair. Or any super-strong hair balls, really. Werewolf hair'd do.\"": "Arianna Fangblade, do Red Wing Casino, disse: \"O violinista ali é imortal, como em 'nunca envelhece', imortal. Belo truque, certo? Mas ele ainda pode morrer de doença! Seus cascos têm centenas de anos e precisam ser limpos. Preciso de mais uma coisa para meu kit de limpeza: cabelo de Yeti. Ou qualquer bola de pelo superforte, na verdade. Cabelo de lobisomem serviria.\""
"Arianna Fangblade in Red Wing Casino said, \"Have ya met my goat Fiddler? He's immortal! Or nearly. But immortal goats need special care! His fur is so strong normal shears can't cut it, and my last pair o' diamond shears got swiped by somebody. A goblin probably... anyway, I know what we need to make a new comb! I saw it when I was in Kur. There's an Urak near a spring in Kur that my orc guide called Fluffy. Typical orc joke, right, 'cuz Fluffy's got no fur. And it eats orcs and terrorizes the land. Anyway, I need a tooth from that big fucker. Can ya get it?\"": "Arianna Fangblade no Red Wing Casino disse: \"Você conheceu minha cabra Fiddler? Ele é imortal! Ou quase. Mas cabras imortais precisam de cuidados especiais! Seu pelo é tão forte que tesouras normais não conseguem cortá-lo, e meu último par de tesouras de diamante foi roubado por alguém. Um goblin provavelmente ... de qualquer maneira, eu sei o que precisamos para fazer um novo pente! Eu vi quando estava em Kur. Há um Urak perto de uma fonte em Kur que meu orc guia chamado Fofo. Piada típica de orc, certo, porque Fofo não tem pêlo E come orcs e aterroriza a terra De qualquer forma, preciso de um dente daquele grande filho da puta."
"Arianna Fangblade in Red Wing Casino said, \"My goat Fiddler just loves juniper berries. They taste awful ta me but goats will be goats! They don't seem ta grow around here though. Seen any?\"": "Arianna Fangblade, do Red Wing Casino, disse: \"Minha cabra Fiddler adora bagas de zimbro. Elas têm um gosto horrível para mim, mas cabras serão cabras! Mas elas não parecem crescer por aqui. Viu alguma?\""
"Arianna Fangblade in Red Wing Casino said, \"The food here's nice enough, but not what I'm used to. I've got a craving for a classic cottage pie! Do ya know where to get one around here? 'Cuz I surely don't!\"": "Arianna Fangblade, do Red Wing Casino, disse: \"A comida aqui é boa o suficiente, mas não é o que estou acostumada. Estou com vontade de comer uma torta caseira clássica! Você sabe onde conseguir uma por aqui? Porque certamente não sei!\""
"Arisetsu despises undeath. As any sane person should! I'm always on the lookout for potential undeath incidents, and I've detected one nearby.

In Vidaria there's a massive floating rock. Under that rock flow a constant stream of the undead. The soldiers are doing what they can to prevent the undead from swarming, but they could use help.

Seek out the \"Lungers\". They're causing the most harm right now. Oh, and the dark-casting skeletons. Oh and also the fiery ones.": "Arisetsu despreza os mortos-vivos. Como qualquer pessoa sã deveria! Estou sempre atento a possíveis incidentes de mortos-vivos e detectei um por perto.

Em Vidaria existe uma enorme rocha flutuante. Sob aquela rocha flui um fluxo constante de mortos-vivos. Os soldados estão fazendo o que podem para evitar o enxame de mortos-vivos, mas precisam de ajuda.

Procure os \"Lungers\". Eles estão causando mais danos agora. Ah, e os esqueletos sombrios. Ah, e também os de fogo."
