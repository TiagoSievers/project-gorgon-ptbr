"Wolves are most dangerous when they attack as a group. The wise hunter separates them to avoid their dreaded pack attack.\": \"<b>Caça": "Lobos Astutos</b>"
"Wonderful work. You are a truly adequate biped. Please accept this as payment.": "Trabalho maravilhoso. Você é um bípede verdadeiramente adequado. Por favor, aceite isso como pagamento."
"Wonderful! I know we aren't close enough to be confidants yet, but if you stick with my lessons I'm sure we'll get there. I have many secrets to tell, and I'm sure you do, too!": "Maravilhoso! Sei que ainda não somos próximos o suficiente para sermos confidentes, mas se você seguir minhas lições, tenho certeza de que chegaremos lá. Tenho muitos segredos para contar e tenho certeza que você também!"
"Wonderful! Mmm... actually... these beetles are vile. Too much pixie sugar, not enough ice. I knew they were terrible! I have an excellent memory. But once I couldn't have them anymore, I started craving them. I seem to be losing my objectivity: my memories of home are becoming a maudlin soup. This angers me! For I despise soup.

That's a joke. Nevermind. Here: Floxie suggested this recipe to take my mind off the beetles, but now I don't need it.": "Maravilhoso! Mmm... na verdade... esses besouros são vis. Muito açúcar pixie, pouco gelo. Eu sabia que eles eram terríveis! Tenho uma excelente memória. Mas quando não pude mais tê-los, comecei a desejá-los. Parece que estou perdendo a objetividade: minhas lembranças de casa estão se tornando uma sopa sentimental. Isso me irrita! Pois eu desprezo a sopa.

Isso é uma piada. Deixa para lá. Aqui: Floxie sugeriu esta receita para me distrair dos besouros, mas agora não preciso dela."
"Wonderful, thank you!

As I'm sure you know, it's very hard to write as an animal. It takes a lot of practice! And the first lesson is getting used to having ink on your paws, because it always happens no matter how careful you are. We'll make paw-print paintings first, then eventually move on to drawing with the mouth-brush technique.": "Maravilhoso, obrigado!

Como tenho certeza que você sabe, é muito difícil escrever como um animal. É preciso muita prática! E a primeira lição é acostumar-se a ter tinta nas patas, porque isso sempre acontece por mais cuidado que você seja. Faremos primeiro pinturas de pegadas e depois passaremos ao desenho com a técnica do pincel bucal."
"WOO THAT'S IT! You got it for me! Thank you so much! You're the best! Oh, and here's some potions! Remember to save one for my next orgy, I may just invite you!": "UAU, É ISSO! Você conseguiu para mim! Muito obrigado! Você é o melhor! Ah, e aqui estão algumas poções! Lembre-se de guardar um para minha próxima orgia, posso apenas convidar você!"
"Wood": "Madeira"
"WoodGlue3": "WoodCola3"
