"After helping all three toy rabbits, you find yourself holding a bag of gems and a key. \"We stole these to pay our gambling debts. We're sorry!\" says a voice in your head. Then it's gone.": "Depois de ajudar os três coelhos de brinquedo, você se vê segurando um saco de pedras preciosas e uma chave. \"Roubamos isso para pagar nossas dívidas de jogo. Pedimos desculpas!\" diz uma voz em sua cabeça. Então desapareceu."
"After my mom ditched me in the woods, I lived with a little old lady who taught me some useful recipes. Which is great news for my friend Jara! She has a bear living in her barn, and I have just the thing: bear repellent! I brewed it up for her last night. Can you go give it to her? She lives outside of Serbule. Look for the farmlands.": "Depois que minha mãe me abandonou na floresta, morei com uma velhinha que me ensinou algumas receitas úteis. O que é uma ótima notícia para minha amiga Jara! Ela tem um urso morando em seu celeiro, e eu tenho exatamente o que preciso: repelente de urso! Eu preparei isso para ela ontem à noite. Você pode dar a ela? Ela mora fora de Serbule. Procure as fazendas."
"After you get that heart, you should definitely leave very quickly, though. Larger wind elementals will be attracted, too, and noone can fight a hurricane.\\\"\": \"Alzaneth em Statehelm disse": "\\\"Você quer que eu treine você em Weather Witching? Bem... estou lisonjeado, mas dificilmente sou o instrutor mais qualificado. Embora eu suponha que mesmo que MINHAS escassas habilidades estejam acima das suas, eu deveria ajudá-lo a sair da crise da mediocridade. Mas isso levará tempo, e estou visitando apenas por um curto período."
"Agate": "Ágata"
