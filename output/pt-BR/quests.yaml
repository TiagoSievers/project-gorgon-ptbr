"Do this for me and I shall bequeath upon you one of my grandest weather wands.\\\"\": \"Merriana em Serbule Hills disse": "\\\"Em algum lugar ao norte daqui, perto de Serbule Keep, há uma porta enorme. Esta porta tradicional e vistosa dos anões leva à cidade há muito morta de Borghild. Nenhum anão vive lá, mas está infestada de mortos-vivos."
"Do this for me, and I'll put in a good word with you to Poe!\": \"Bem, vou lhe contar sobre Poe, mas não espero que você consiga encontrá-lo. Ele é um micônico. Um homem cogumelo! A coisa mais estranha que já vi empunhar um martelo de joalheiro, garanto! Ele nunca fez parte da nossa guilda, mas nós o convidamos para vir conosco mesmo assim. Infelizmente, ele recusou": "ele odeia o frio. Não posso culpá-lo. Ele disse que estava indo para casa, \\\"no subsolo em Serbule\\\". Então eu acho que você vai lá e começa a cavar? Qual é o tamanho de Sérbule, afinal?"
"Do ya know what 'cheshire' is? It's a kinda cheese. Look, I can't explain why, but it's important that I find some. I need ta appear cultured.": "Você sabe o que é 'cheshire'? É uma espécie de queijo. Olha, não sei explicar porquê, mas é importante que eu encontre alguns. Preciso parecer culto."
"Do you have any wool? I love wool clothing! I've been trying to make my own sweater. You'd think having all those sheep out in the meadow would make it easy, but they aren't tame. At all. I can't even get near them! Well, anyway, if you have some wool, I would buy it from you!": "Você tem alguma lã? Adoro roupas de lã! Tenho tentado fazer meu próprio suéter. Você pensaria que ter todas aquelas ovelhas na campina tornaria tudo mais fácil, mas elas não são domesticadas. De forma alguma. Não consigo nem chegar perto deles! Bem, de qualquer forma, se você tiver um pouco de lã, eu compraria de você!"
"Do you know how to make spore bombs? I need some nice potent ones. I use 'em to scare away pests that get on the farm.": "Você sabe fazer bombas de esporos? Eu preciso de alguns bons e potentes. Eu os uso para espantar as pragas que entram na fazenda."
"Do you like my clothes? A wandering elven bard taught me how to make them! They're much stronger than they look, too. One of the secrets is spider silk, a cloth that's made from spiderwebs. I buy it from Shirogin, but he's been out of stock for months. If you find some spider silk, I'd love to buy it from you.": "Você gosta das minhas roupas? Um bardo élfico errante me ensinou como fazê-los! Eles também são muito mais fortes do que parecem. Um dos segredos é a seda de aranha, um tecido feito de teias de aranha. Eu compro do Shirogin, mas ele está sem estoque há meses. Se você encontrar seda de aranha, adoraria comprá-la de você."
"Do you recall those rune charts you found for me? Well, I've studied them a little bit, and now I wish to try to make my own. I just need something to guide my hand. You wouldn't happen to have any ancient magical stencils, by any chance? Well, keep an eye out for one! I've got a fat sack of coins burning a hole in my dress.": "Você se lembra daqueles gráficos de runas que encontrou para mim? Bem, eu os estudei um pouco e agora quero tentar fazer os meus. Só preciso de algo para guiar minha mão. Por acaso você não teria nenhum estêncel mágico antigo? Bem, fique de olho em um! Tenho um saco gordo de moedas queimando meu vestido."
"Do you think you can take out the pointy-faced dinosaurs? Those were called triceratops, and they lived a very long time ago. Try not to get knocked off a cliff!": "Você acha que pode eliminar os dinossauros de rosto pontudo? Esses eram chamados de tricerátops e viveram há muito tempo. Tente não cair de um penhasco!"
"Do your part for the community score! Collect some writs and use them.
<b>IMPORTANT:</b> You will only get loot credit for writs that are looted from the corpse of a defeated enemy. Writs obtained by any other means will not count, but you can still use them to add points to the Community Score.": "Faça a sua parte pela pontuação da comunidade! Colete alguns mandados e use-os.
<b>IMPORTANTE:</b> Você só receberá crédito de saque por mandados saqueados do cadáver de um inimigo derrotado. Os Writs obtidos por qualquer outro meio não contarão, mas você ainda poderá usá-los para adicionar pontos à Pontuação da Comunidade."
"Dock Cod Fillets": "Filetes de Bacalhau à Doca"
"Does it seem safer there? I hope so. When undead congregate in large enough numbers, it can be very difficult to stop them.": "Parece mais seguro lá? Espero que sim. Quando os mortos-vivos se reúnem em grande número, pode ser muito difícil detê-los."
"Dog Ear in Povus said, \"Could you tell your Warden friends about me? I've been keeping a log of dangers in the area, but I can't really act on them alone. Maybe we could team up! Or something. Just tell the head of your Warden enclave about me. I'm here and ready to help however I can!\"": "Dog Ear em Povus disse: \"Você poderia contar a seus amigos Diretores sobre mim? Tenho mantido um registro dos perigos na área, mas não posso agir sozinho sobre eles. Talvez pudéssemos nos unir! Ou algo assim. Basta contar ao chefe do seu enclave de Diretores sobre mim. Estou aqui e pronto para ajudar no que puder! \""
"Dog Ear in Povus said, \"Since you're a Warden, maybe you can help me fix an imbalance. Ever since the rakshasa fishermen stopped coming to the river, the squid-beasts are getting out of control. They're even climbing out onto land now. They attack anything that comes near! It's making it hard for animals to get water. Can you remove some of the squids?\"": "Dog Ear em Povus disse: \"Já que você é um Diretor, talvez você possa me ajudar a consertar um desequilíbrio. Desde que os pescadores rakshasa pararam de vir para o rio, as feras-lulas estão ficando fora de controle. Eles estão até subindo para a terra agora. Eles atacam qualquer coisa que se aproxime! Está dificultando a obtenção de água pelos animais. Você pode remover algumas das lulas?\""
"Don't Forget the Egg": "Não se esqueça do ovo"
"Don't let anybody know I ordered this. The autumn fey would have me killed!": "Não deixe ninguém saber que eu pedi isso. As fadas do outono me matariam!"
"Don't look at me like that": "my master's a great wizard! I wasn't his slave! I was his partner! Anyway, I haven't told him the specifics, so he can't be too helpful, but he thinks he has a book that'll help. And he shipped it overseas to me! It should be waiting for pickup in Rahu. I'm not sure where, exactly, but talk to the dock manager.\": \"Temos um cristal reserva emitindo alertas, mas não durará para sempre. Nós realmente precisamos fazer o cristal principal funcionar novamente! Mas não sobrou ninguém vivo que saiba como essas coisas funcionam."
"Don't tell Crelpin, but I've got a special order for some bee stingers. The only catch is that they have to be fresh! A certain troll will pay well for them, and I'll give you half. Deal?": "Não conte ao Crelpin, mas tenho um pedido especial de ferrões de abelha. O único problema é que eles precisam ser frescos! Um certo troll pagará bem por eles, e eu lhe darei metade. Negócio?"
"Don't tell Winston, but I know which one I pick. Remga crotch-grab me, I hate this, but she's my daughter.\": \"Jogando de novo! E é claro que ela precisa de dinheiro. E agora estou preso numa posição terrível": "posso deixá-la “aprender a lição” e ser morta por insetos raivosos, ou posso resgatá-la e ela não aprende nada."
