"Maybe For the Best": "Talvez para o melhor"
"Maybe I'm overreacting. Could you check in on her? Her name is Helena Veilmoor and she moved far south to a fortress called Hogan's Keep. Apparently she's having trouble with a gang of sentient insects. Oh, my poor idiot daughter! Let me know she's okay!\\\"\": \"Sam Veilmoor em Statehelm disse": "\\\"Oh, estou bem! É que estou preocupado. Preocupado e doente, na verdade. Ouvi dizer que minha filha está com problemas financeiros. Ela está... distante. E o pai dela praticamente a rejeitou, e eu entendo o porquê. Concordo com ele."
"Maybe it's for the best that we can't remember anything. Maybe we don't want to remember. But it's not fair that I can't make new memories! It's not my fault I died over and over! Not this time!

<i>[Midge sighs.]</i>

There's a mortal drink I like. It tastes awful, but it does help me relax a little. I think it's called a Perker Up? Peaky Cup? Pick Me up? Something like that.": "Talvez seja melhor não nos lembrarmos de nada. Talvez não queiramos lembrar. Mas não é justo que eu não consiga criar novas lembranças! Não é minha culpa ter morrido repetidas vezes! Não desta vez!

<i>[Midge suspira.]</i>

Há uma bebida mortal que eu gosto. O gosto é horrível, mas me ajuda a relaxar um pouco. Eu acho que é chamado de Perker Up? Copa Pico? Me pegue? Algo assim."
"Maybe you should talk to Harry about how to fix your unfortunate cow-hood. If there's one person who knows animal transformation curses, it's Harry.": "Talvez você devesse conversar com Harry sobre como consertar seu infeliz capuz de vaca. Se há uma pessoa que conhece maldições de transformação animal, é Harry."
"MaybeForTheBest": "TalvezParaOMelhor"
"Me and Jenny Foster have a prank war going on. You know, the server at the coffee shop? Yeah. She loves pranks! But she's terrified of osslars. Osslars are some kind of demon thing and apparently she had a scary experience with them. So you know what that means!

This will be a prank for the history books of this mortal realm. I'm gonna animate the skull and have it talk to her!": "Eu e Jenny Foster temos uma guerra de pegadinhas. Você sabe, o garçom da cafeteria? Sim. Ela adora brincadeiras! Mas ela tem pavor de osslars. Osslars são algum tipo de demônio e aparentemente ela teve uma experiência assustadora com eles. Então você sabe o que isso significa!

Esta será uma brincadeira para os livros de história deste reino mortal. Vou animar a caveira e falar com ela!"
