"Sirine in Rahu said, \"Ever killed a rhino? Quite a rush, isn't it?! They're so dangerous! I'm not really in shape to hunt rhinos right now, though... my bow broke. And not coincidentally, the bow uses ivory rhino horn. You probably see where this is going... if you find some, please let me know!\"": "Sirine em Rahu disse: \"Já matou um rinoceronte? Muita pressa, não é?! Eles são tão perigosos! Mas não estou em condições de caçar rinocerontes agora... meu arco quebrou. E não por coincidência, o arco usa chifre de rinoceronte de marfim. Você provavelmente já viu onde isso vai dar... se encontrar algum, por favor me avise!\""
"Sirine in Rahu said, \"I went hunting with the bow you helped me repair! And it sucks. It's frankly unusable. It turns out the only reason it worked before was due to all the magic, because normal ivory doesn't bend or flex at all! I guess I let all the magic out when I replaced the ivory, and now it's junk. But not to worry! I can research the spells necessary to fix it! But that will take a while. For now, I need a substitute.

I've always hunted with a bow I made myself, even back when I was a child. I'm not going to just use some store-bought bow now at age 438! Can you get me some really perfect cedar wood for a temporary bow?\"": "Sirine em Rahu disse: “Fui caçar com o arco que você me ajudou a consertar!

Sempre cacei com um arco que eu mesmo fiz, desde quando era criança. Não vou usar apenas um arco comprado em loja agora aos 438 anos! Você pode me conseguir um pouco de madeira de cedro realmente perfeita para um arco temporário?\""
"Sirine in Rahu said, \"Well, the bow's almost ready, but I need to restring it. I need cat gut! Bring me a bunch of cat meat and I'll dig through it to find what I need.\"": "Sirine em Rahu disse: \"Bem, o arco está quase pronto, mas preciso refazê-lo. Preciso de tripa de gato! Traga-me um monte de carne de gato e eu vou vasculhar para encontrar o que preciso.\""
"SirineCheese": "SirineQueijo"
