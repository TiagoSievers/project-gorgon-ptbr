"You need to focus on the adults that oversee the leglings! Strike them down to weaken the den. Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. A few adults are there. Strike them down!": "Você precisa se concentrar nos adultos que supervisionam os leglings! Derrube-os para enfraquecer a toca. Vá para a área de treinamento de legling. Passe pela área de prática de jardinagem. Quando o caminho se bifurcar, vá para a esquerda para encontrar os clubbers. Alguns adultos estão lá. Derrube-os!"
"You need to take your bee out to the beehive to the west to introduce yourselves.": "Você precisa levar sua abelha até a colmeia a oeste para se apresentar."
"You need to work on your compassion. Grab a shovel and bury some unfortunate deceased dogs. Or wolves, or whatever. I hate the thought of dogs dying and not even getting a proper burial!": "Você precisa trabalhar em sua compaixão. Pegue uma pá e enterre alguns cães falecidos infelizes. Ou lobos, ou algo assim. Eu odeio a ideia de cães morrendo e nem mesmo tendo um enterro adequado!"
"You need to work with metal more. Why don't you hit the forge and make some hoops?": "Você precisa trabalhar mais com metal. Por que você não vai para a forja e faz alguns aros?"
"You now have a working nexus adjunct matter aligner! If you can get into the nexus and attach it to an inactive gate, it will open a portal that should lead you to Dalvos.

The nexus entrance in Eltibule is in the northeast corner. You'll need a key to get in. A human named Percy Evans lives near there and is known to have a key.": "Agora você tem um alinhador de matéria adjunta do Nexus funcionando! Se você conseguir entrar no nexo e anexá-lo a um portão inativo, ele abrirá um portal que deverá levá-lo a Dalvos.

A entrada do nexo em Eltibule fica no canto nordeste. Você precisará de uma chave para entrar. Um humano chamado Percy Evans mora perto de lá e é conhecido por ter uma chave."
"You plan to kill more of the Winter Court menace? Wonderful! Go and 'mortal everything up' for the Winter Court!": "Você planeja matar mais membros da ameaça da Corte Winter? Maravilhoso! Vá e 'tudo mortal' para a Corte Invernal!"
"You plop the eyeballs in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Você coloca os olhos e ele ganha vida! Deve permanecer ligado por alguns dias. Agora parece que você simplesmente enfia a mão..."
"You plop the spikes in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Você coloca os espinhos e ele ganha vida! Deve permanecer ligado por alguns dias. Agora parece que você simplesmente enfia a mão..."
"You pop the chest open to reveal the contents.": "Você abre o baú para revelar o conteúdo."
"You practiced with the bow and discovered the secret of the Bow symbol.": "Você praticou com o arco e descobriu o segredo do símbolo do Arco."
"You procured this for me? My, you're quite resourceful, aren't you? Perhaps you'd like to join me for dinner some evening?

Oh, and here. This is an old suit of battle armor. Wear it with pride.": "Você comprou isso para mim? Nossa, você é bastante engenhoso, não é? Talvez você queira jantar comigo alguma noite?

Ah, e aqui. Esta é uma antiga armadura de batalha. Use-o com orgulho."
"You put down some of the infected beasts, and ran the others off!": "Você derrubou algumas das feras infectadas e expulsou as outras!"
"You realize that you can't quite visualize the precise grip angle you'd need for the Sword symbol. The solution is simple: learn.": "Você percebe que não consegue visualizar o ângulo de aderência preciso necessário para o símbolo da Espada. A solução é simples: aprenda."
"You really should talk to Crelpin about your pets. Who knows what they might have gone through?": "Você realmente deveria conversar com Crelpin sobre seus animais de estimação. Quem sabe o que eles podem ter passado?"
"You really went out and killed animals on my behalf? Gruesome! I am like unto a god! Sorry, sorry. I meant like unto a rich person. Here's money.": "Você realmente saiu e matou animais em meu nome? Horrível! Eu sou como um deus! Desculpe, desculpe. Eu quis dizer como uma pessoa rica. Aqui está dinheiro."
"You received a reward for your hard work in fighting back the aktaari threat.": "Você recebeu uma recompensa pelo seu trabalho árduo na luta contra a ameaça Aktaari."
"You repelled Grosark's invasion into our realm!": "Você repeliu a invasão de Grosark em nosso reino!"
"You repelled the spontaneous ranalon invasion of Statehlm!": "Você repeliu a invasão espontânea de Ranalon em Statehlm!"
"You rescued the wild horses in a dream about the Ilmari Desert!": "Você resgatou os cavalos selvagens em um sonho sobre o deserto de Ilmari!"
"You rescued the wild horses in Eltibule!": "Você resgatou os cavalos selvagens em Eltibule!"
"You rescued the wild horses in Gazluk!": "Você resgatou os cavalos selvagens em Gazluk!"
"You rescued the wild horses in Kur!": "Você resgatou os cavalos selvagens em Kur!"
"You rescued the wild horses in Povus!": "Você resgatou os cavalos selvagens em Povus!"
"You rescued the wild horses in Serbule Hills!": "Você resgatou os cavalos selvagens em Serbule Hills!"
"You rescued the wild horses in Serbule!": "Você resgatou os cavalos selvagens em Serbule!"
"You rescued the wild horses in Sun Vale!": "Você resgatou os cavalos selvagens em Sun Vale!"
"You rescued the wild horses in the Fae Realm!": "Você resgatou os cavalos selvagens no Reino Fae!"
"You rescued the wild horses in the Ilmari Desert!": "Você resgatou os cavalos selvagens no deserto de Ilmari!"
"You rescued the wild horses in Vidaria!": "Você resgatou os cavalos selvagens de Vidaria!"
"You rescued the wild horses!": "Você resgatou os cavalos selvagens!"
"You rolled the dice and learned the Die symbol!": "Você lançou os dados e aprendeu o símbolo do Dado!"
"You rub my feet enough, I might rub yours. Not feet, though - more like bring me some premium candle-quality fat. Then we'll see if I let you in.": "Se você esfregar meus pés o suficiente, eu poderia esfregar os seus. Mas não pés - é mais como trazer-me um pouco de gordura premium com qualidade de vela. Então veremos se deixo você entrar."
"You said the skeleton miners were just like regular skeletons, right? But what about the NON-skeleton miners? Hmm? You didn't take notes on those, did you? Well go back and see if the living miners are weird in any way. Remember to search their guts for clues!": "Você disse que os mineiros esqueletos eram como esqueletos normais, certo? Mas e os mineiros NÃO esqueletos? Hum? Você não fez anotações sobre isso, não é? Bem, volte e veja se os mineiros vivos são estranhos de alguma forma. Lembre-se de procurar pistas em suas entranhas!"
"You say you had to kill scorpions for their venom glands? Well, it looks like you handled yourself fine. Good job.

Wait! Wait a minute... if there was a rakkie in there already, that means they already knew about the entrance before we found it. My informants may be keeping secrets from me. I'll have to look into this.": "Você diz que teve que matar escorpiões para obter suas glândulas de veneno? Bem, parece que você se comportou bem. Bom trabalho.

Espere! Espere um minuto... se já havia um rakkie lá, significa que eles já sabiam da entrada antes de encontrá-la. Meus informantes podem estar escondendo segredos de mim. Vou ter que investigar isso."
"You see? That proves what they say about elves! A human would know that I can't just \"change my beliefs\" to suit her whim.

Here, Rita gave these to me when I asked her for a token of her favor. It was a joke, I suppose. I can't keep them anymore.": "Você vê? Isso prova o que dizem sobre os elfos! Um humano saberia que não posso simplesmente “mudar minhas crenças” para atender aos seus caprichos.

Aqui, Rita me deu isso quando lhe pedi um sinal de seu favor. Foi uma piada, suponho. Não posso mais mantê-los."
"You seem antsy. Do you know how to make any bombs? I'm sure you do, you look like the type. Why don't you set off some bombs out in the desert or somewhere? It'll cheer you up.": "Você parece impaciente. Você sabe fazer alguma bomba? Tenho certeza que sim, você parece o tipo. Por que você não detona algumas bombas no deserto ou em algum lugar? Isso vai te animar."
"You seem trustworthy enough. Here, this unlocks a very dangerous chamber inside the Statehelm Crypt. This area is off-limits to most. My husband's private laboratory lies past that point. But you needn't delve so far today. My husband loved unusual necromantic creations, and the crypt is full of his menagerie. I need some thrice-cursed beaks, and there are bird-creatures in there that contain one.

Here is the most important detail: you must kill them with darkness damage. Otherwise it would only be a twice-cursed beak.

<i>[The killing blow must be Darkness damage.]</i>": "Você parece confiável o suficiente. Aqui, isso desbloqueia uma câmara muito perigosa dentro da Cripta Statehelm. Esta área está fora dos limites para a maioria. O laboratório particular do meu marido fica além desse ponto. Mas você não precisa se aprofundar tanto hoje. Meu marido adorava criações necromânticas incomuns, e a cripta está cheia de seu zoológico. Preciso de alguns bicos três vezes amaldiçoados, e há criaturas pássaros lá que contêm um.

Aqui está o detalhe mais importante: você deve matá-los com dano de escuridão. Caso contrário, seria apenas um bico amaldiçoado duas vezes.

<i>[O golpe mortal deve ser dano de Escuridão.]</i>"
"You sent those ensigns back to their lifestones! It'll take them a few days to recover and catch a ride back here! So you're totally winning! This is very impressive!

Here, keep this. I'm going to tell everyone that you tortured me for it!": "Você enviou aqueles insígnias de volta às suas pedras vitais! Eles levarão alguns dias para se recuperar e pegar uma carona de volta para cá! Então você está totalmente ganhando! Isto é muito impressionante!

Aqui, guarde isto. Vou contar a todos que você me torturou por isso!"
"You seriously defeated a dozen scorpions barehanded?

Hmm. I misjudged you. That's my mistake.": "Você derrotou seriamente uma dúzia de escorpiões com as mãos nuas?

Hum. Eu julguei você mal. Esse é o meu erro."
"You should be more adventurous. And what's more adventurous than treasure maps? Nothing! Find or make a treasure map and then follow it to the buried treasure.": "Você deveria ser mais aventureiro. E o que é mais aventureiro do que mapas do tesouro? Nada! Encontre ou faça um mapa do tesouro e siga-o até o tesouro enterrado."
"You should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.\": \"Snapley me contou a lamentável história do assentamento lá fora. Aqui está um detalhe que ele não sabia": "o ataque foi ordenado pelo próprio General Naurlok e executado por sua legião de elite. E é aqui que as coisas se tornam interessantes. Para você ver, os fantasmas muitas vezes retêm algo do que tinham quando morreram. E se eles morreram com pontas de lança dos Vingadores de Naurlok ainda presas neles... esse metal é precioso! Eu não consigo nem fazer isso sozinho."
"You should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.\\\"\": \"Torgan em New Prestonbule disse": "\\\"Snapley me contou a lamentável história do assentamento lá fora. Aqui está um detalhe que ele não sabia: o ataque foi ordenado pelo próprio General Naurlok e executado por sua legião de elite. E é aqui que as coisas se tornam interessantes. Para você ver, os fantasmas muitas vezes retêm algo do que tinham quando morreram. E se eles morreram com pontas de lança dos Vingadores de Naurlok ainda presas neles... esse metal é precioso! Eu não consigo nem fazer isso sozinho."
"You should find a Tuvillic Rune in Povus, beneath a giant mushroom. Touch the rune and retrieve the Mnemonix Index. When you enter the caves, turn left and you should see it.\\\"\": \"Truxartis em Vidaria disse": "\\\"Minha mente está... confusa. Preciso realinhá-la. Sim! Eu sei o que fazer."
"You should have been more careful excavating these! If in doubt, leave some of the dirt behind. But these are still usable, so here: I understand this is your currency?": "Você deveria ter sido mais cuidadoso ao escavá-los! Em caso de dúvida, deixe um pouco da sujeira para trás. Mas estes ainda podem ser usados, então aqui: eu entendo que esta é a sua moeda?"
"You should improve your communication skills. Practice makes perfect! Engage in small talk with a whole bunch of people.": "Você deve melhorar suas habilidades de comunicação. A prática leva à perfeição! Converse sobre amenidades com um monte de gente."
"You should just pull his plug.\\\"\": \"O alferes Cricket a bordo do Wintertide disse": "\\\"O baralho de ciências foi entregue ao mago louco que criou aquelas... monstruosidades. E ele nem está aqui! Ele apenas se projeta astralmente do reino mortal para cá."
"You should meditate more! But not on the ground. True meditation requires a meditation stool that you built yourself. Go and assemble a meditation stool. Then make a backup. Damned stools break all the time!": "Você deveria meditar mais! Mas não no terreno. A verdadeira meditação requer um banco de meditação que você mesmo construiu. Vá e monte um banco de meditação. Em seguida, faça um backup. Malditos bancos quebram o tempo todo!"
"You skinned all those rats to find perfect skins. I worry about your mental health. But I don't worry about your pocketbook. Here.": "Você esfolou todos aqueles ratos para encontrar peles perfeitas. Eu me preocupo com sua saúde mental. Mas não me preocupo com o seu bolso. Aqui."
"You slew the barghest and yet I still fear! Violence cannot help me! ARGH! I will have to try parlaying with the beast. Go now. I must think.

<i>[Uriana silently hands you an item from her hoard, then becomes lost in thought.]</i>": "Você matou o mais barghest e ainda tenho medo! A violência não pode me ajudar! ARGH! Terei que tentar negociar com a fera. Vá agora. Devo pensar.

<i>[Uriana silenciosamente lhe entrega um item de seu tesouro, depois fica perdida em pensamentos.]</i>"
"You slew them all? Very well done! I am impressed. The orcs of Gazluk will now be much more responsive when I... oh, hrm, I'm so sorry to prattle on about things that aren't relevant to you! Here is your blood money. Cheers.": "Você matou todos eles? Muito bem feito! Estou impressionado. Os orcs de Gazluk agora responderão muito melhor quando eu... ah, hrm, sinto muito por tagarelar sobre coisas que não são relevantes para você! Aqui está o seu dinheiro de sangue. Saúde."
"You snorted flowers until you mastered the Flower symbol.": "Você cheirou flores até dominar o símbolo da Flor."
"You snuck in without incident? Good. I can smell Shadowslip's rotten innards. I always hated him. Never had anything nice to say. There are many more safehouses underneath Statehelm, and I am working on finding ways into them. But for now, I have what I need!

As a reward, I shall teach you one of the... secrets... of the vampire. Be grateful, for it is quite... powerful.": "Você entrou sem incidentes? Bom. Posso sentir o cheiro das entranhas podres de Shadowslip. Eu sempre o odiei. Nunca tive nada de bom para dizer. Existem muito mais esconderijos sob o Statehelm, e estou trabalhando para encontrar maneiras de entrar neles. Mas por enquanto, tenho o que preciso!

Como recompensa, vou te ensinar um dos... segredos... do vampiro. Seja grato, pois é bastante... poderoso."
"You struck a blow for goblinkind. Adequate.": "Você desferiu um golpe na espécie dos goblins. Adequado."
"You struck a blow for goblinkind. Better.": "Você desferiu um golpe na espécie dos goblins. Melhorar."
"You struck a blow for goblinkind. Bonafide.": "Você desferiu um golpe na espécie dos goblins. Genuíno."
"You struck a blow for goblinkind. Capital.": "Você desferiu um golpe na espécie dos goblins. Capital."
"You struck a blow for goblinkind. Decent.": "Você desferiu um golpe na espécie dos goblins. Decente."
"You struck a blow for goblinkind. Fine.": "Você desferiu um golpe na espécie dos goblins. Multar."
"You struck a blow for goblinkind. Good.": "Você desferiu um golpe na espécie dos goblins. Bom."
"You struck a blow for goblinkind. Impeccable.": "Você desferiu um golpe na espécie dos goblins. Impecável."
"You struck a blow for goblinkind. Nice.": "Você desferiu um golpe na espécie dos goblins. Legal."
"You struck a blow for goblinkind. Pleasant.": "Você desferiu um golpe na espécie dos goblins. Prazeroso."
"You struck a blow for goblinkind. Reasonable.": "Você desferiu um golpe na espécie dos goblins. Razoável."
"You struck a blow for goblinkind. Sufficient.": "Você desferiu um golpe na espécie dos goblins. Suficiente."
"You struck a blow for goblinkind. Unexpected.": "Você desferiu um golpe na espécie dos goblins. Inesperado."
"You studied your grim trophies and mastered the Skull symbol.": "Você estudou seus troféus sombrios e dominou o símbolo da Caveira."
"You sucked lemons to master the Lemon symbol.": "Você chupou limões para dominar o símbolo do Limão."
"You sure? Okay. Good, then! Here's your tickets.\": \"Você está de volta. A missão foi bem sucedida? Não, não explique, apenas me diga uma coisa": "a Vidente da Areia vai ficar feliz ou vai ficar chateada?"
"You swap out the stargazer's lenses like an old pro. Now you should be able to get a better view.": "Você troca as lentes do astrônomo como um velho profissional. Agora você deve conseguir ter uma visão melhor."
"You talked to Anaberyl? What did she say?

You learned a way that I can date her? What does that mean? Why are you being so vague?

I trust you, my friend. I hope you know what you're doing.": "Você falou com Anaberyl? O que ela disse?

Você aprendeu uma maneira de eu sair com ela? O que isso significa? Por que você está sendo tão vago?

Eu confio em você, meu amigo. Espero que você saiba o que está fazendo."
"You talked to Jenny Foster during the full moon.": "Você conversou com Jenny Foster durante a lua cheia."
"You talked to mom?! And she sent you here? Come on! I feel stalked! I ran away from Statehelm for a good reason, you know. Did you ever consider...

... I'm sorry. I should really swallow my pride. Tell mom I owe a gang of giant mantises 1.3 million Concils or they'll kill me and lay eggs in my corpse. But tell her in a way that doesn't seem too desperate, okay? And then stop hanging out with my mom. It's weird.": "Você conversou com a mãe?! E ela te mandou aqui? Vamos! Me sinto perseguido! Eu fugi de Statehelm por um bom motivo, você sabe. Você já considerou...

... me desculpe. Eu realmente deveria engolir meu orgulho. Diga à mamãe que devo 1,3 milhão de Concils a uma gangue de louva-a-deus gigantes ou eles vão me matar e botar ovos no meu cadáver. Mas conte a ela de uma forma que não pareça muito desesperada, ok? E então pare de sair com minha mãe. É estranho."
"You told her it could track her?! Now she'll have second thoughts of keeping it on when she does illicit things! Sigh. At least she'll wear it when she sleeps at home. I suppose that is something.": "Você disse a ela que isso poderia rastreá-la?! Agora ela vai pensar duas vezes em continuar assim quando fizer coisas ilícitas! Suspirar. Pelo menos ela vai usar quando dormir em casa. Suponho que isso seja alguma coisa."
"You took care of the hook beasts? Thank you! I know this was a tough request. Here: this is a necklace a friend made for me, but I think you'll have more use for it. You make me proud to have been a Warden.": "Você cuidou das feras gancho? Obrigado! Eu sei que este foi um pedido difícil. Aqui: esse é um colar que uma amiga fez para mim, mas acho que você vai ter mais utilidade para ele. Você me deixa orgulhoso de ter sido um Diretor."
"You took them out? Impressive!": "Você os tirou? Impressionante!"
"You unlock the cork, and pop it out...": "Você desbloqueia a rolha e a retira..."
"You want me to train you in Weather Witching? Well... I'm flattered, but I'm hardly the most qualified instructor. Though I suppose if even MY meager skills are above yours, I should help you out of the doldrums of mediocrity. But it will take time, and I'm only visiting for a short while.

Why don't you run an errand for me? That will free up some time to give you lessons.

I've heard there's an old gale-chanting spot. I'm not sure where it is exactly, but it's on a hill overlooking a lake. There can't be that many lakes, right? You'll know you're in the right spot by the breeze you feel.

I've heard that if you summon a sandstorm while standing there, it will attract a young breeze elemental right to you! Most aren't native to this realm, but something about the winds in the Ilmari allow them to be born. Quite unusual! So anyway, it will find you in seconds. Kill it and get its heart. Don't worry: most wind elementals that grow up <i>here</i> end up insane anyway, so you're doing it a favor, maybe.

After you get that heart, you should definitely leave very quickly, though. Larger wind elementals will be attracted, too, and noone can fight a hurricane.": "Você quer que eu treine você em Weather Witching? Bem... estou lisonjeado, mas dificilmente sou o instrutor mais qualificado. Embora eu suponha que mesmo que MINHAS escassas habilidades estejam acima das suas, eu deveria ajudá-lo a sair da crise da mediocridade. Mas isso levará tempo e só estarei visitando por pouco tempo.

Por que você não faz uma tarefa para mim? Isso liberará algum tempo para lhe dar aulas.

Ouvi dizer que há um antigo local onde se cantam ventos fortes. Não tenho certeza de onde fica exatamente, mas fica em uma colina com vista para um lago. Não pode haver tantos lagos, certo? Você saberá que está no lugar certo pela brisa que sentir.

Ouvi dizer que se você invocar uma tempestade de areia enquanto estiver ali, ela atrairá uma jovem brisa elemental direto para você! A maioria não é nativa deste reino, mas algo nos ventos de Ilmari permite que eles nasçam. Bastante incomum! De qualquer forma, ele o encontrará em segundos. Mate-o e pegue seu coração. Não se preocupe: a maioria dos elementais do vento que crescem <i>aqui</i> acabam ficando loucos de qualquer maneira, então talvez você esteja fazendo um favor a isso.

Depois de conseguir esse coração, você definitivamente deveria sair muito rapidamente. Elementais do vento maiores também serão atraídos e ninguém poderá combater um furacão."
"You want to do something for me? Pf.

Well, I always need more fluorite.": "Você quer fazer algo por mim? Pf.

Bem, eu sempre preciso de mais fluorita."
"You want to get better at hand-to-hand combat fast? I know just the thing. Wrestle giant snakes. It works! Of course, you need a certain level of skill beforehand. That's why we don't use this technique with raw recruits. But  you're not raw, are you? Show me what you can do against the massive vipers in Povus.

<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Você quer melhorar rapidamente no combate corpo a corpo? Eu sei exatamente a coisa. Lute contra cobras gigantes. Funciona! Claro, você precisa de um certo nível de habilidade de antemão. É por isso que não usamos essa técnica com recrutas inexperientes. Mas você não está cru, está? Mostre-me o que você pode fazer contra as enormes víboras de Povus.

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>"
"You want to help? Hmph. Very well: perhaps you know this area better than we do.

Some time ago we heard there was a group of bandits with something I want. These bandits live in a cave somewhere here in Serbule Hills. They called it the 'spider cave'.

I have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.": "Você quer ajudar? Hmph. Muito bem: talvez você conheça esta área melhor do que nós.

Há algum tempo ouvimos dizer que havia um grupo de bandidos com algo que eu quero. Esses bandidos vivem em uma caverna em algum lugar aqui nas Colinas Serbule. Eles a chamavam de “caverna das aranhas”.

Já paguei antecipadamente pelo aparelho, mas se os bandidos fizerem você pagar mais, pegue um recibo e eu reembolsarei você em reagentes preciosos."
"You want to help? Me?! Well... I had a request for a pristine goat hide. If you can help me find one, I'll give you half the payment.": "Você quer ajudar? Meu?! Bem... eu tinha um pedido de pele de cabra imaculada. Se você puder me ajudar a encontrar um, eu lhe darei metade do pagamento."
"You want to help? Okay! I'll give you a job! Go catch fish! Norbert likes eels the best, so get those. They're very fast! Good luck! Get this many. <i>Spot holds up five fingers.</i>": "Você quer ajudar? OK! Vou te dar um emprego! Vá pescar! Norbert gosta mais de enguias, então compre-as. Eles são muito rápidos! Boa sorte! Obtenha tantos. <i>Spot segura cinco dedos.</i>"
"You want to learn to make orcish armor? Hahaha! Wait, you seriously expect me to teach you an orcish secret? I'm no traitor! Tell Tremmond to fuck off.

Although... Our armor isn't \"orcish\". It's Tast's armor. As in the god of war. If you want to know how to make it, just ask one of his avatars! It's easy: just go to a forge consecrated to Tast, and say \"Gurkah, Tast!\" Every orcish blacksmith learns this way.": "Você quer aprender a fazer armaduras orcs? Hahaha! Espere, você realmente espera que eu lhe ensine um segredo orc? Eu não sou nenhum traidor! Diga ao Tremmond para se foder.

Embora... Nossa armadura não seja \"orc\". É a armadura do Tast. Como no deus da guerra. Se quiser saber como fazer é só perguntar a um de seus avatares! É fácil: basta ir até uma forja consagrada a Tast e dizer “Gurkah, Tast!” Todo ferreiro orc aprende assim."
"You want werewolf armor? Well, since you can't smith your own, I guess I can give you some of my leftover pieces.

If you bring me the metal I need to make more, you can have one of my old werewolf helms.": "Você quer armadura de lobisomem? Bem, já que você não pode forjar o seu próprio, acho que posso lhe dar algumas das minhas peças que sobraram.

Se você me trouxer o metal que preciso para fazer mais, poderá ficar com um dos meus antigos elmos de lobisomem."
"You want werewolf armor? Well, since you can't smith your own, I guess I can give you some of my leftover pieces.

If you bring me the metal I need to make more, you can have some leftover werewolf body armor.": "Você quer armadura de lobisomem? Bem, já que você não pode forjar o seu próprio, acho que posso lhe dar algumas das minhas peças que sobraram.

Se você me trouxer o metal que preciso para fazer mais, você pode ficar com algumas sobras de armadura de lobisomem."
"You were able to destroy the crystals? Well, there goes that hypothesis. AND you survived the encounter, so there goes my other hypothesis.

Hm. Perhaps they are sentient! Hah, that would be a nightmare. They're probably just enchanted to flee harm. I'll work on a way to prove this one way or the other, but for now you have my thanks.": "Você foi capaz de destruir os cristais? Bem, lá se vai essa hipótese. E você sobreviveu ao encontro, então lá se vai minha outra hipótese.

Hum. Talvez eles sejam sencientes! Hah, isso seria um pesadelo. Eles provavelmente estão apenas encantados para fugir do perigo. Tentarei encontrar uma maneira de provar isso de uma forma ou de outra, mas por enquanto você tem meus agradecimentos."
"You weren't bugged by this assignment! I thought maybe you were a buginner but now I see that's humbug.": "Você não ficou incomodado com esta tarefa! Achei que talvez você fosse um buginner, mas agora vejo que isso é uma farsa."
"You weren't bugged by this assignment! I thought maybe you were a buginner but now I see that's humbug. ": "Você não ficou incomodado com esta tarefa! Achei que talvez você fosse um buginner, mas agora vejo que isso é uma farsa."
"You what? You chopped lumber on my behalf? Why would that be entertaining?! Who asked you to... oh, I guess I did. Well, that was dumb, but good job.": "Você o quê? Você cortou madeira em meu nome? Por que isso seria divertido?! Quem pediu para você... ah, acho que pedi. Bem, isso foi idiota, mas bom trabalho."
"You will doubtless need to kill this spider. But I don't believe it is a simple unintelligent spider. It is too cunning. Figure out what it was up to!\\\"\": \"Skitters em Statehelm disse": "\\\"Era o que eu temia. Nosso amigo Hamilton avistou uma aranha gigante saindo do esgoto à noite. Ele não viu como a aranha retorna - provavelmente usa uma entrada diferente - mas podemos supor que é isso que está matando os animais sencientes em Statehelm."
"You will need...assistance... most likely.\\\"\": \"Truxartis em Vidaria disse": "\\\"Preciso reabrir este Poço de Sangue... imediatamente. Mas um muito rude... manticora... roubou a lente enquanto eu estava... descansando. Ele se chama Lythorax. Você precisará matá-lo. Ele é senciente... mas não <i>muito</i> senciente."
"You wish to aid me? Then exterminate the ratkin root-tenders that constantly try to unearth my fungus!": "Você deseja me ajudar? Em seguida, extermine os criadores de raízes de ratkin que constantemente tentam desenterrar meu fungo!"
"You won't regret helping me! That's an order. From a sovereign insect lord. By the way, you should really use better bait. I'll show you. Then begone!": "Você não vai se arrepender de me ajudar! Isso é uma ordem. De um senhor soberano dos insetos. A propósito, você realmente deveria usar uma isca melhor. Eu vou te mostrar. Então vá embora!"
"You would seek even greater knowledge? Then show your worth. I demand an even greater offering of blood!": "Você buscaria um conhecimento ainda maior? Então mostre o seu valor. Exijo uma oferta de sangue ainda maior!"
"You wrestled snakes in the swamp? I bet you learned a lot, right? Right?! Of course you did. I was right.": "Você lutou com cobras no pântano? Aposto que você aprendeu muito, certo? Certo?! Claro que você fez. Eu estava certo."
"You'd expect fairy lights to be pretty easy to get here in the fae realm. All these fairies can make sparkly lights! But Pegast says they can't waste them on frivolities. And that turns into the same argument I always have with these guys: what ISN'T frivolous to an immortal?

Anyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.": "Você esperaria que as luzes das fadas fossem muito fáceis de chegar aqui no reino das fadas. Todas essas fadas podem fazer luzes brilhantes! Mas Pegast diz que não podem desperdiçá-los com frivolidades. E isso se transforma na mesma discussão que sempre tenho com esses caras: o que NÃO É frívolo para um imortal?

De qualquer forma, tudo bem, encontrei alguém para fazer para nós às escondidas. Eu só preciso pagar a ele. Em favos de mel... muitos favos de mel."
"You'll find carnivines most commonly when daytime happens -- they burrow into the ground at night.\\\"\": \"Floxie, no Reino Fae, disse": "“Estou trabalhando para me tornar um botânico melhor! Não é tão emocionante quanto caçar, mas estou fazendo o que posso. compare-os."
"You'll know you're in the right place when the temperature drops. They keep Coldfeather's quarters very cold!\\\"\": \"O alferes Cricket a bordo do Wintertide disse": "\\\"Os hipogrifos não são imortais. Você sabia disso? Sim, eles eclodem de ovos! Temos um incubatório a bordo também. Você deveria matar a mãe da ninhada!"
"You're a friend, and I trust your discretion. We both know that the Winter Court is infiltrating this land, and they need to be stopped. But we dare not attack them until they attack first.

You, on the other hand... you could just kill 'em all, as the humans say...": "Você é um amigo e confio na sua discrição. Ambos sabemos que a Corte Winter está se infiltrando nesta terra e precisa ser detida. Mas não ousamos atacá-los até que ataquem primeiro.

Você, por outro lado... você poderia simplesmente matar todos eles, como dizem os humanos..."
"You're a good sort. I should let you in on something: I'm fond of leather parties. Everyone wears amazing custom leather clothes, and it's exquisite! I'm throwing one soon, and I need a bunch of leather. Shoddy leather will do; these are costumes that will only be worn once, after all.": "Você é um bom tipo. Eu deveria te contar uma coisa: gosto de festas de couro. Todo mundo usa roupas de couro personalizadas incríveis, e é lindo! Vou lançar um em breve e preciso de um monte de couro. Couro de má qualidade serve; afinal, são fantasias que só serão usadas uma vez."
"You're a hero to the people, and I'll let them know it!

Come back in a week and I'll need more of this same.": "Você é um herói para o povo e vou deixá-los saber disso!

Volte em uma semana e precisarei de mais deste mesmo."
"You're a practicing brewer! Love to see it! Let me teach you how to make strawberry wine. Next time you catch me at a party, if you have a bottle of this for me, I'll teach you to make a trickier variety.": "Você é um cervejeiro praticante! Adoro ver isso! Deixe-me te ensinar como fazer vinho de morango. Da próxima vez que você me encontrar em uma festa, se tiver uma garrafa disso para mim, vou te ensinar a fazer uma variedade mais complicada."
"You're a snake-murdering machine! Thanks.": "Você é uma máquina assassina de cobras! Obrigado."
"You're back! I just got back myself a bit ago. There's still more slimes than I'm happy with, but I think I can take it from here. I appreciate your backup! Here, take this, nobody'll miss it.": "Você está de volta! Acabei de voltar há pouco. Ainda há mais slimes do que estou satisfeito, mas acho que posso continuar a partir daqui. Agradeço seu apoio! Aqui, pegue isso, ninguém vai sentir falta."
"You're back. Ready for debriefing? ... You saw a 'visage of demise'? Wait, you mean you fought an actual Face of Death?! Those things are old as shit! How the hell did the Crone Hegemony have those? They can militarize Faces of Death?! That's... well, I'd better send this little nugget of info up the chain of command. Here's your reward; dismissed.": "Você está de volta. Pronto para o interrogatório? ... Você viu uma 'imagem de morte'? Espere, você quer dizer que você lutou contra uma verdadeira Face da Morte?! Essas coisas são velhas pra caralho! Como diabos a Hegemonia da Velha tinha isso? Eles podem militarizar Faces da Morte?! Isso é... bem, é melhor eu enviar esta pequena informação para a cadeia de comando. Aqui está sua recompensa; demitido."
"You're back. Was the mission successful? No, don't explain, just tell me this: is the Sand Seer gonna be happy, or is she gonna be pissed?

You sure? Okay. Good, then! Here's your tickets.": "Você está de volta. A missão foi bem sucedida? Não, não explique, apenas me diga uma coisa: a Vidente da Areia vai ficar feliz ou vai ficar chateada?

Tem certeza que? OK. Bom, então! Aqui estão seus ingressos."
"You're finally back. Been saving this one for you! I sent my second-best xedrite-finder in already, and she came back empty-handed and mostly-dead. So it's time to show 'em why you're the best! There's xedrite in there, plus some big bug the Sand Seer wants killed. Go talk to her first.": "Você finalmente está de volta. Estou guardando esse para você! Já enviei meu segundo melhor localizador de xedrite, e ela voltou de mãos vazias e quase morta. Então é hora de mostrar porque você é o melhor! Tem xedrite ali, além de um grande inseto que o Sand Seer quer matar. Vá falar com ela primeiro."
"You're finally here! We have a panther problem. An orcish ship came in the night and unloaded hundreds of war panthers! They must be planning a war or something. But who cares about that! They let their panthers hunt freely all through yeti territory, which is also where most of the surviving fox dens are!

They're getting really close to this outpost, too. I saw one watching me from across the river earlier! I've programmed the turrets to target the panthers... but I don't know if they'll be enough. If Mittens and I are dead when you get back, please avenge us!": "Você finalmente está aqui! Temos um problema de pantera. Um navio orc chegou durante a noite e descarregou centenas de panteras de guerra! Eles devem estar planejando uma guerra ou algo assim. Mas quem se importa com isso! Eles deixaram suas panteras caçarem livremente por todo o território dos Yetis, que também é onde fica a maioria das tocas de raposas sobreviventes!

Eles estão chegando muito perto deste posto avançado também. Eu vi um me observando do outro lado do rio mais cedo! Programei as torres para atingir as panteras... mas não sei se serão suficientes. Se Mittens e eu estivermos mortos quando você voltar, por favor, vingue-nos!"
"You're getting the hang of this! Keep spreading your messages to the sheep of Statehelm!": "Você está pegando o jeito! Continue espalhando suas mensagens às ovelhas de Statehelm!"
"You're good. Not great, but good. I respect that. Greatness is overrated. Here. Take some money.": "Você é bom. Não é ótimo, mas é bom. Eu respeito isso. A grandeza é superestimada. Aqui. Pegue algum dinheiro."
"You're inspired to master the lovely bulbous globes of the grape. You'll need to taste several in order to depict their juciness just right.": "Você está inspirado para dominar os lindos globos bulbosos da uva. Você precisará provar vários para retratar sua suculência da maneira certa."
"You're killing bears in Eltibule.": "Você está matando ursos em Eltibule."
"You're killing blood beaks in the dream version of the Ilmari Desert.": "Você está matando bicos de sangue na versão onírica do deserto de Ilmari."
