"<b>Hunting: Black Widow Spiders</b>
These highly venomous spiders eat many dangerous pests. However, they also like to eat people, and they especially love sneaking up on campers and caravans in the night.": "<b>Caça: Aranhas Viúva Negra</b>
Essas aranhas altamente venenosas comem muitas pragas perigosas. No entanto, eles também gostam de comer pessoas e, especialmente, adoram se esgueirar em campistas e caravanas à noite."
"<b>Hunting: Blood Beaks</b>
Originating from domestic chickens that were fed cursed grain, these now-feral beasts roam the desert, fearing nothing, pecking all.": "<b>Caça: Bicos de Sangue</b>
Originários de galinhas domésticas que foram alimentadas com grãos amaldiçoados, essas feras agora selvagens vagam pelo deserto, sem temer nada, bicando tudo."
"<b>Hunting: Burnspittle Frogs</b>
These frogs destroy ecosystems and breed rapidly. Few creatures can withstand their acidic touch for long.": "<b>Caça: sapos Burnspittle</b>
Estas rãs destroem ecossistemas e reproduzem-se rapidamente. Poucas criaturas conseguem resistir ao toque ácido por muito tempo."
"<b>Hunting: Cunning Wolves</b>
Wolves are most dangerous when they attack as a group. The wise hunter separates them to avoid their dreaded pack attack.": "<b>Caça: Lobos Astutos</b>
Os lobos são mais perigosos quando atacam em grupo. O caçador sábio os separa para evitar o temido ataque da matilha."
"<b>Hunting: Deer</b>
Deer are found in most every healthy forest ecosystem. They breed quickly and eat voraciously, so nobody is upset when deer are hunted.": "<b>Caça: Veados</b>
Os cervos são encontrados em quase todos os ecossistemas florestais saudáveis. Eles se reproduzem rapidamente e comem vorazmente, então ninguém fica chateado quando veados são caçados."
"<b>Hunting: Deinonychus</b>
These dinosaurs are native to plains lands but have learned that they can survive here in the desert, where they wreak the delicate ecology by eating everything.": "<b>Caça: Deinonychus</b>
Esses dinossauros são nativos das planícies, mas aprenderam que podem sobreviver aqui no deserto, onde causam a delicada ecologia comendo de tudo."
"<b>Hunting: Donkeys</b>
Ordinary donkeys aren't particularly dangerous. But these dream donkeys attack anything they see!": "<b>Caça: Burros</b>
Os burros comuns não são particularmente perigosos. Mas esses burros dos sonhos atacam tudo que vêem!"
"<b>Hunting: Eltibule Bears</b>
The bears in Eltibule are odd. First, some of them are green. Second, they don't seem to act like bears should. They tend to gather in large aimless groups. It's not clear why they do this, but it's clearly not good.": "<b>Caça: Ursos Eltibule</b>
Os ursos em Eltibule são estranhos. Primeiro, alguns deles são verdes. Em segundo lugar, eles não parecem agir como os ursos deveriam. Eles tendem a se reunir em grandes grupos sem objetivo. Não está claro por que eles fazem isso, mas claramente não é bom."
"<b>Hunting: Fear Breathers</b>
Created by Kajich, the god of Fear, to bring terror into the world. Kajich's not the best at creating monsters, but he tries. These lungs may not be super terrifying, but they are very dangerous and usually require allies to kill.": "<b>Caça: Respiradores de Medo</b>
Criado por Kajich, o deus do Medo, para trazer terror ao mundo. Kajich não é o melhor em criar monstros, mas tenta. Esses pulmões podem não ser muito aterrorizantes, mas são muito perigosos e geralmente exigem aliados para serem mortos."
"<b>Hunting: Ferocious Boars</b>
These boars are huge, deadly, and very aggressive. They are able to hold their own against enchanted cats, man-sized mantises, and house-sized snails. They are not afraid of people.": "<b>Caça: Javalis Feroz</b>
Esses javalis são enormes, mortais e muito agressivos. Eles são capazes de resistir a gatos encantados, louva-a-deus do tamanho de homens e caracóis do tamanho de casas. Eles não têm medo das pessoas."
"<b>Hunting: Fey Panthers</b>
These big green panthers come from the fairy realm. Semi-intelligent, they seek to cause mischief and destruction. Regular panthers seem to instinctively treat them as royalty, following their lead and protecting their flank.": "<b>Caça: Panteras Feéricas</b>
Estas grandes panteras verdes vêm do reino das fadas. Semi-inteligentes, procuram causar danos e destruição. As panteras normais parecem tratá-los instintivamente como membros da realeza, seguindo seu exemplo e protegendo seu flanco."
"<b>Hunting: Fire Sheep</b>
Fire sheep were not created by a deranged wizard, as is often suggested. Instead, they are an exciting step forward in the natural evolution of the sheep. These creatures are very fragile but are much safer than their non-igniting brethren because local predators have learned to run away from the smell of smouldering wool.": "<b>Caça: Ovelhas de Fogo</b>
As ovelhas de fogo não foram criadas por um mago perturbado, como é frequentemente sugerido. Em vez disso, representam um passo emocionante na evolução natural das ovelhas. Essas criaturas são muito frágeis, mas são muito mais seguras do que seus irmãos que não acendem, porque os predadores locais aprenderam a fugir do cheiro de lã fumegante."
"<b>Hunting: Fire Spiders</b>
Fire spiders are a distinct species that breeds true, even though they were genetically engineered by crone witches centuries ago. Their innate fire protection is a marvel that Biology Sages are still desperate to unravel.": "<b>Caça: Aranhas de Fogo</b>
As aranhas de fogo são uma espécie distinta que se reproduz de forma verdadeira, embora tenham sido geneticamente modificadas por velhas bruxas séculos atrás. Sua proteção inata contra o fogo é uma maravilha que os Sábios da Biologia ainda estão desesperados para desvendar."
"<b>Hunting: Giant Scorpions</b>
Massive beasts that usually require a team to take down, these scorpions rule the desert. Few can survive their attacks -- though they stay well clear of manticores.": "<b>Caça: Escorpiões Gigantes</b>
Bestas enormes que geralmente exigem uma equipe para serem derrubadas, esses escorpiões governam o deserto. Poucos conseguem sobreviver aos seus ataques – embora permaneçam bem longe das manticoras."
"<b>Hunting: Gnashers</b>
The so-called Gnasher is a dinosaur from a distant land, imported by the Council to counter the uncontrolled spread of Uraks and other problem pests. However, gnashers are now as big a threat as any of the other invasive species. They are able to cut through armor with incredible ease.": "<b>Caça: Roedores</b>
O chamado Gnasher é um dinossauro de uma terra distante, importado pelo Conselho para combater a propagação descontrolada de Uraks e outras pragas problemáticas. No entanto, os roedores são agora uma ameaça tão grande quanto qualquer outra espécie invasora. Eles são capazes de cortar armaduras com incrível facilidade."
"<b>Hunting: Goblins</b>
While the goblins sent to patrol the roads here are not nearly as dangerous as the ones in Sedgewick Forest, they are still very deadly. If trade is ever to return to normal, their blockade must be destroyed.": "<b>Caça: Goblins</b>
Embora os goblins enviados para patrulhar as estradas daqui não sejam tão perigosos quanto os da Floresta Sedgewick, eles ainda são muito mortais. Se quisermos que o comércio volte ao normal, o seu bloqueio deve ser destruído."
"<b>Hunting: Guard Scrays</b>
Scrays act as faithful companions to the ranalon, much like dogs do for humans. They are equally at home in water or land, and their stingers inject acid deep inside their victims, causing horrible delayed death. They are most dangerous in packs.": "<b>Caça: Scrays de Guarda</b>
Scrays atuam como companheiros fiéis do ranalon, assim como os cães fazem com os humanos. Eles se sentem igualmente à vontade na água ou na terra, e seus ferrões injetam ácido nas profundezas de suas vítimas, causando uma horrível morte retardada. Eles são mais perigosos em matilhas."
"<b>Hunting: Hexapuses</b>
Local stories say that the hexapus comes from the Rakshasa home-world -- although their original name is lost. They lay their eggs on the underside of vessels, and supposedly the original rakshasa ships were coated in eggs that eventually hatched and tried to kill everyone.

Hexapuses are unnervingly intelligent and are happy both on land and water -- although they prefer to be immersed when they sleep. They are a menace that can't be allowed to proliferate.": "<b>Caça: Hexapuses</b>
Histórias locais dizem que o hexapus vem do mundo natal dos Rakshasa – embora seu nome original tenha sido perdido. Eles põem seus ovos na parte inferior dos navios e, supostamente, os navios rakshasa originais estavam cobertos de ovos que eventualmente eclodiam e tentavam matar todos.

Os hexápus são irritantemente inteligentes e felizes tanto na terra quanto na água - embora prefiram ficar imersos quando dormem. Eles são uma ameaça que não pode proliferar."
"<b>Hunting: Kuvou</b>
Kuvou -- supposedly named after the sound they make while belching -- came with the first rakshasa settlers, who even today use them as a food source. Their vomit is also prized. Unfortunately they lack the docility of other herbivores and must be trained from birth in order to be kept as livestock.": "<b>Caça: Kuvou</b>
Kuvou – supostamente nomeado após o som que fazem enquanto arrotam – veio com os primeiros colonos rakshasa, que ainda hoje os usam como fonte de alimento. O vômito deles também é valorizado. Infelizmente, falta-lhes a docilidade de outros herbívoros e devem ser treinados desde o nascimento para serem mantidos como gado."
"<b>Hunting: Manticores</b>
Monstrosities with beast bodies and human faces, these creatures were -- and still are -- adherants of Strekios, god of Self-Improvement. They are destined to be reborn in this form until they gain the wisdom to be born into a new form.

This batch of manticores are total jerks so you should kill them and let them be reborn to try again.": "<b>Caça: Manticoras</b>
Monstruosidades com corpos de feras e rostos humanos, essas criaturas eram – e ainda são – adeptos de Strekios, deus do Autoaperfeiçoamento. Eles estão destinados a renascer nesta forma até que ganhem a sabedoria para nascer em uma nova forma.

Este lote de manticoras são idiotas, então você deve matá-los e deixá-los renascer para tentar novamente."
"<b>Hunting: Mantises</b>
The giant mantises in Eltibule are not intelligent, but that doesn't make them easy to kill. They like to prey upon the distracted, hiding in tall grass until their victims come too close.": "<b>Caça: Louva-a-deus</b>
Os louva-a-deus gigantes em Eltibule não são inteligentes, mas isso não os torna fáceis de matar. Eles gostam de atacar os distraídos, escondendo-se na grama alta até que suas vítimas cheguem perto demais."
"<b>Hunting: Panthers</b>
The panthers here are native -- unlike the tigers -- but these panthers seem more vicious than one would expect. They act distracted, roused by an unknown energy.": "<b>Caça: Panteras</b>
As panteras aqui são nativas - ao contrário dos tigres - mas parecem mais cruéis do que se poderia esperar. Eles agem distraídos, despertados por uma energia desconhecida."
"<b>Hunting: Pigs</b>
These feral pigs once must have been tended by ranchers, but they have been living in the wild for too many generations: there's no taming these delicious beasts.": "<b>Caça: Porcos</b>
Esses porcos selvagens já devem ter sido cuidados por fazendeiros, mas eles vivem na natureza há muitas gerações: não há como domesticar essas feras deliciosas."
"<b>Hunting: Poison Slugs</b>
The lakes of Eltibule are infested with these gigantic venomous slugs. With no natural predators, their growth is unchecked.": "<b>Caça: Lesmas Venenosas</b>
Os lagos de Eltibule estão infestados com essas gigantescas lesmas venenosas. Sem predadores naturais, o seu crescimento é descontrolado."
"<b>Hunting: Ranalon Gardeners</b>
Perhaps the weakest caste of ranalon, but also the most numerous, are the gardeners. They scavenge the land for resources and can also be found deep in lakes, tending to their underwater gardens. They are fast -- VERY fast -- and can chase their prey long distances.": "<b>Caça: Jardineiros Ranalon</b>
Talvez a casta mais fraca de ranalon, mas também a mais numerosa, sejam os jardineiros. Eles vasculham a terra em busca de recursos e também podem ser encontrados nas profundezas de lagos, cuidando de seus jardins subaquáticos. Eles são rápidos – MUITO rápidos – e podem perseguir suas presas por longas distâncias."
"<b>Hunting: Ranalon Stone Shapers</b>
Stoneshapers can pull stone from deep beneath the earth, and use these stones to create most Ranalon buildings. They also serve on the battlefield where they hamper enemy movement. When cornered, they can pull stones from the ground to protect themselves, creating a dense shield that absorbs most attacks.": "<b>Caça: Moldadores de Pedra Ranalon</b>
Stoneshapers podem extrair pedras das profundezas da terra e usá-las para criar a maioria dos edifícios Ranalon. Eles também servem no campo de batalha, onde dificultam o movimento inimigo. Quando encurralados, eles podem puxar pedras do chão para se protegerem, criando um escudo denso que absorve a maioria dos ataques."
"<b>Hunting: Rats</b>
Generally considered harmless, some rats do carry diseases. But for the most part even the gigantic varieties are non-hostile. In rural areas they are either treated as pests or as pets, depending on how big of an impact they have on local agriculture.": "<b>Caça: Ratos</b>
Geralmente considerados inofensivos, alguns ratos transmitem doenças. Mas, na maior parte, mesmo as variedades gigantescas não são hostis. Nas zonas rurais são tratados como pragas ou como animais de estimação, dependendo do tamanho do impacto que têm na agricultura local."
"<b>Hunting: Sheep</b>
Although their distant grandparents were domestic sheep, these feral sheep will not tolerate being sheared. They are aggressive toward anyone that gets too close.": "<b>Caça: ovelhas</b>
Embora os seus avós distantes fossem ovelhas domésticas, estas ovelhas selvagens não toleram ser tosquiadas. Eles são agressivos com qualquer um que se aproxime demais."
"<b>Hunting: Skeletal Frogs</b>
These once-ordinary frogs were slain in some particularly heinous way, causing their souls to seek vengeance. They are pure malice.": "<b>Caça: sapos esqueléticos</b>
Esses sapos antes comuns foram mortos de uma forma particularmente hedionda, fazendo com que suas almas buscassem vingança. Eles são pura maldade."
"<b>Hunting: Skeleton Archers</b>
These craven resurrected menaces love to hurt people from afar. They run in fear when approached.": "<b>Caça: Arqueiros Esqueletos</b>
Essas covardes ameaças ressuscitadas adoram machucar pessoas de longe. Eles correm de medo quando são abordados."
"<b>Hunting: Skeleton Mages</b>
Raised by a necromancer and then set free to cause chaos, these skeletons do their job with glee, burning anything that lives.": "<b>Caça: Magos Esqueletos</b>
Criados por um necromante e depois libertados para causar o caos, estes esqueletos fazem o seu trabalho com alegria, queimando tudo o que vive."
"<b>Hunting: Skeleton Swordsmen</b>
Created by a necromancer and given a sword, these creatures can only feel hate, and only killing the living brings any amount of comfort to their wretched souls.": "<b>Caça: Espadachins Esqueletos</b>
Criadas por um necromante e recebendo uma espada, essas criaturas só podem sentir ódio, e apenas matar os vivos traz algum conforto para suas almas miseráveis."
"<b>Hunting: Snails</b>
Snails seem especially adept at consuming the ambient magic of their surroundings. Many varieties grow to incomprehensible size and if left unhindered, they can become so large that only an army of druids can take them down.": "<b>Caça: Caracóis</b>
Os caracóis parecem especialmente hábeis em consumir a magia ambiente ao seu redor. Muitas variedades atingem tamanhos incompreensíveis e, se não forem impedidas, podem se tornar tão grandes que apenas um exército de druidas pode derrubá-las."
"<b>Hunting: Tentakillers</b>
Rakshasa settlers brought fierce creatures called dwvon to act as guards and hunting companions, but they went feral after the War of Rahu. Their descendants were dubbed \"tentakillers\" by famous Povus settler \"Fangy\" Lim because they use their tentacles to shock and disorient their prey. And everything is prey: big or small, the tentakiller does not discriminate.": "<b>Caça: Tentakillers</b>
Os colonos Rakshasa trouxeram criaturas ferozes chamadas dwvon para atuar como guardas e companheiros de caça, mas eles se tornaram selvagens após a Guerra de Rahu. Seus descendentes foram apelidados de \"tentakillers\" pelo famoso colono Povus \"Fangy\" Lim porque usam seus tentáculos para chocar e desorientar suas presas. E tudo é presa: grande ou pequena, o tentakiller não discrimina."
"<b>Hunting: Tigers</b>
There are more tigers here than could possibly be natural. Moreover, many of the tigers are sickly and unwell. Wherever they came from, they apparently can't go home again.": "<b>Caça: Tigres</b>
Há mais tigres aqui do que seria natural. Além disso, muitos dos tigres estão doentes e indispostos. De onde quer que tenham vindo, aparentemente não podem voltar para casa."
"<b>Hunting: Tornado Spiders</b>
These spiders happened to eat a newly-formed air elemental -- which admittedly look like a large fly at first -- and have become entangled with air magic. They are not victims, though: they are able to use the wind to their advantage and are extremely hard to hit!": "<b>Caça: Aranhas Tornado</b>
Acontece que essas aranhas comeram um elemental do ar recém-formado - que inicialmente parece uma grande mosca - e ficaram emaranhadas com a magia do ar. Mas eles não são vítimas: eles são capazes de usar o vento a seu favor e são extremamente difíceis de atingir!"
"<b>Hunting: Venom Spiders</b>
While not as deadly as some spiders, they are still quite deadly. They seek warmth at night and are a terror to find in campsites.": "<b>Caça: Aranhas Venenosas</b>
Embora não sejam tão mortais quanto algumas aranhas, elas ainda são bastante mortais. Eles buscam calor à noite e são um terror de encontrar em acampamentos."
"<b>Hunting: Vipers</b>
A constant danger in the desert, these vipers don't hesitate to attack creatures many times their size.": "<b>Caça: Víboras</b>
Um perigo constante no deserto, essas víboras não hesitam em atacar criaturas muitas vezes maiores que elas."
"<b>Hunting: Wild Chickens</b>
All the \"wild\" chickens in Serbule Hills descend from a chicken farm that was overrun by goblins. The smartest chickens escaped capture, and they have since spread throughout the hills. They lay far fewer eggs than domestic chickens, but they're still delicious when fried.": "<b>Caça: Galinhas Selvagens</b>
Todas as galinhas “selvagens” de Serbule Hills descendem de uma granja que foi invadida por goblins. As galinhas mais inteligentes escaparam da captura e desde então se espalharam pelas colinas. Elas põem muito menos ovos do que as galinhas domésticas, mas ainda ficam deliciosas quando fritas."
"<b>Hunting: Wild Pigs</b>
These pigs were never tame; they tolerate their feral brethren, but they attack most other creatures without fear. Wild pigs are not prey animals: they're ominvorous, intelligent, and vicious.": "<b>Caça: Porcos Selvagens</b>
Esses porcos nunca foram domesticados; eles toleram seus irmãos selvagens, mas atacam a maioria das outras criaturas sem medo. Os porcos selvagens não são presas: eles são ameaçadores, inteligentes e cruéis."
"<b>Hunting: Worgs</b>
When humans domesticated the wolf, they made dogs. When orcs domesticated the wolf, they made worgs. Orcs win this one. When hungry enough, packs of feral worgs are known to kill entire caravans.": "<b>Caça: Worgs</b>
Quando os humanos domesticaram o lobo, eles criaram cães. Quando os orcs domesticaram o lobo, eles criaram worgs. Orcs vencem esta. Quando estão com fome suficiente, bandos de worgs selvagens matam caravanas inteiras."
"<b>IMPORTANT!</b>": "You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.\": \"<i>Zhia Lian:</i> Sim, quero orégano! Por que você está tão preocupado com o que eu faço com isso? Eu faço coisas com isso! O que você faz com isso? Eu vou te dizer, você dá para mim! Faça o que você pediu e eu lhe darei uma pequena recompensa. Falhe meu pedido e não será bonito! Não sou muito bom em aceitar um não como resposta. Pegue o que preciso e leve ao meu agente em Serbule. Até marquei ele no mapa para vocês, não é difícil! Boa sorte!"
"<b>IMPORTANTE!</b>": "Você deve permanecer online pelo menos até que o objetivo do servidor seja alcançado para obter o crédito total. Caso contrário, certifique-se de fazer login novamente <b>antes</b> do desafio terminar, caso você precise desistir mais cedo. Verifique o agente quanto ao cronômetro.\""
"<b>Note": "this is a difficult encounter that will require a small group.</b>\": \"Ashk em Rahu acredita que um globo ocular gigante o caça sempre que ele usa seus poderes de augúrio."
"<b>Observação": "este é um encontro difícil que exigirá um pequeno grupo.</b>\""
"<i>[ Beleaguered": "adjective: beset with difficulties. ]</i>"
"<i>[ Cajole": "verbo: persuadir alguém a fazer algo com lisonja ou promessas. ]</i>"
"<i>[ Confidant": "noun: a person entrusted with secrets, such as a friend or co-conspirator. Note: do not confuse with the word 'confident', which is totally different. ]</i>"
"<i>[ Confidente": "substantivo: uma pessoa a quem são confiados segredos, como um amigo ou co-conspirador. Obs: não confunda com a palavra ‘confiante’, que é totalmente diferente. ]</i>"
"<i>[ Desadaptativo": "adjetivo: não proporciona ajuste adequado ou apropriado ao ambiente ou situação. ]</i>"
"<i>[ Impetus": "the force that makes something happen. e.g. 'A vicious goblin attack was the impetus for the new anti-goblin law.' ]</i>"
"<i>[ Jocular": "adjetivo: dado a brincadeiras, habitualmente alegre ou brincalhão. por exemplo 'Ele estava com um humor jocoso ontem.' ]</i>"
"<i>[ Maladaptive": "adjective: not providing adequate or appropriate adjustment to the environment or situation. ]</i>"
"<i>[ Obsequioso": "adjetivo: ansioso demais para ajudar ou obedecer alguém. Bajulação. ]</i>"
"<i>[ Obsequious": "adjective: too eager to help or obey someone. Fawning. ]</i>"
"<i>[ Place the Graffiti ability on your sidebar. If you are in a valid graffiti area (and have dye on hand) the ability will stop being grayed out. There are graffiti spots all over, though they are a little denser near the barracks/jail area.]</i>\\\"\": \"Sagiso em Statehelm disse": "\\\"Meu hobby é... vamos chamá-lo de Expressão Urbana. É uma forma de arte legítima e importante, especialmente aqui em Statehelm. Vamos começar, certo? Pegue sua tintura e vá para a área do quartel. As paredes ao redor são bons locais para sua arte. Escolha um lugar e deixe sua marca!"
"<i>[ Recipe 'Orange Cat' added to Nishika's Training menu. ]</i>\": \"Esse fedor só pode significar uma coisa": "você está com a minha carne de gato! Obrigado! Ei, como forma de agradecimento, gostaria de lhe ensinar como faço minha famosa receita de Orange Cat."
"<i>[ Susurrus": "substantivo: um sussurro suave ou farfalhar. ]</i>"
"<i>[ There's a \\\"PvP cellar\\\" in Serbule where players can attack each other. See if you can kill someone in there. ]</i>\": \"Nada funciona! Nada é divertido! Acho que estou cansado demais para me divertir com coisas simples. Mas ainda há a presa final": "outras pessoas! Vá matar outro aventureiro! Mwahahaha!"
"<i>[ Tip": "use 'Small Talk' to find what NPCs dislike. Not every NPC has strong dislikes, but many of them are just quiet about it -- they won't share their dislikes with you until you reach Friends favor level. ]</i>\": \"Todo mundo sempre dá presentes atenciosos. É estúpido. Vá e dê presentes terríveis às pessoas! Ha ha! Descubra o que eles odeiam e dê isso a eles. Divertido!"
"<i>[ Truculent": "adjective: eager to argue or quick to start a fight. Similar to 'belligerent' but with an implication of cruelty or savagery. ]</i>"
"<i>[ Truculento": "adjetivo: ansioso para discutir ou rápido para começar uma briga. Semelhante a 'beligerante', mas com uma implicação de crueldade ou selvageria. ]</i>"
"<i>[ Vacillate": "verb: to waver back and forth indecisively. ]</i>"
"<i>[ Vociferous": "adjective: expressed in a loud or forceful way. e.g. 'I was a vociferous critic of the new curfew, but my efforts were in vain.' ]</i>"
"<i>[ Vocífero": "adjetivo: expresso em voz alta ou enérgica. por exemplo 'Fui um crítico veemente do novo toque de recolher, mas meus esforços foram em vão.' ]</i>"
"<i>[A group of 3+ level 40+ players is recommended.]</i>\\\"\": \"Qatik no Red Wing Casino disse": "\\\"O primeiro grande sucesso * e * fracasso de nosso departamento de Tecnologia de Teletransporte ocorreu há dois anos, quando chegamos a um complexo de cavernas quentes abaixo de Kur. Kur sempre foi uma terra de mistério para nós, pois é muito frio para sustentar a vida verdadeira - vida de louva-a-deus. Mas esta caverna era mais quente! E então enviamos dois esquadrões de servos louva-a-deus para subjugar as cavernas. Em vez disso... eles fixaram residência entre as outras criaturas. Eles se rebelaram! Este foi um grande revés para o teletransporte magia, e ainda hoje não me atrevo a enviar mais louva-a-deus para aquela caverna. Mas você e seus amigos não serão enganados por quaisquer maravilhas que estejam lá. Você pode completar a missão original de anos atrás. Subornei o técnico de teletransporte para mandá-lo para lá, desde que peça rapidamente!"
"<i>[A group of 3+ level 40+ players recommended.]</i>\\\"\": \"Qatik no Red Wing Casino disse": "\\\"Como você sabe, a terra de Kur esconde segredos tremendos, e ansiamos por ter os poderes que supostamente se escondem nas cavernas de lá. Recentemente, conseguimos nos teletransportar diretamente para uma certa caverna subterrânea em Kur, mas mesmo sendo subterrâneo, ainda está muito frio para que os louva-a-deus funcionem de maneira ideal. Como você e seus amigos são geralmente mamíferos, esperamos que você tenha muito mais facilidade. Ignore os bípedes peludos nas cavernas superiores e procure os níveis mais baixos das cavernas. Certas criaturas podem conter os segredos de Kur. Você deve reconhecer esses segredos quando os vir. O atendente do teletransporte pode mandá-lo para a caverna se você perguntar hoje."
"<i>[A group of 4+ level 40+ players recommended.]</i>\\\"\": \"Qatik no Red Wing Casino disse": "\\\"Recentemente, enquanto ajustamos nosso sistema de portal, acidentalmente nos conectamos a uma série de cavernas abaixo de Eltibule. Essas cavernas estranhamente escuras são inacessíveis, exceto por teletransporte, mas existem numerosos habitantes bípedes! Acredito que há um poder mágico significativo escondido nas cavernas, mas a Rainha não me permite enviar uma equipe de assalto louva-a-deus, temendo que eles sejam superados em número e mortos. É por isso que precisamos de você!"
"<i>[All undead, as well as some other creepy monsters, have a chance to drop candy as loot right now.]</i>\": \"<i>Zhia Lian:</i> É a época do ano dos doces. Muitos doces! E qual é a melhor maneira de ganhar doces grátis? Certo, você adivinhou": "espancar os mortos-vivos."
"<i>[Dica": "Flogisto bruto vem de itens mágicos cujo nível é 30+. Se você está obtendo flogisto de grau inferior, você só precisa transmutar itens melhores!]</i>\""
"<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>\": \"Bem, você ainda não foi forçado a fazer NENHUMA das coisas extremamente difíceis que tivemos que fazer quando eu era estudante! Você se acha tão bom, hein? Vamos ver você conseguir isso": "mate os inimigos com Desarmonia. E também não são inimigos inofensivos! Só tome cuidado: esse teste não é brincadeira."
"<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>\\\"\": \"Ormond Neth, em Statehelm, disse": "“Bem, você ainda não foi forçado a fazer NENHUMA das coisas extremamente difíceis que tivemos que fazer quando eu era estudante!"
"<i>[Durstin sighs.]</i> Very bad news. I was talking to Paul the lumberjack -- he's around here somewhere -- and he knew where the last chapter was. He said it was hidden in a box near the lumber mills east of here. So he went to go get it for me... and he ran into a pack of boars on the way back. And here's the kicker: one of the boars ate the pages!

Paul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!": "<i>[Durstin suspira.]</i> Más notícias. Eu estava conversando com Paul, o lenhador – ele está por aqui em algum lugar – e ele sabia onde estava o último capítulo. Ele disse que estava escondido numa caixa perto da serraria a leste daqui. Então ele foi buscar para mim... e encontrou um bando de javalis no caminho de volta. E aqui está o chute: um dos javalis comeu as páginas!

Paul está morrendo de medo desse javali. Ele o chamou de 'Mudtusks'. Parece pensar que é mais resistente do que um javali normal. Mas um javali é um javali, certo? Acho que se você se apressar poderá tirar as páginas da barriga. Vou pagar a mais! Pressa!"
"<i>[Dying will reset progress on this quest.]</i>\": \"Lamento dizer que os Ranalon estão formando outro exército. Preciso que você ative o mesmo farol de antes e mate-os! Lembre-se": "se você morrer, isso será visto como um sinal de nossa fraqueza. Fique vivo, não importa o que aconteça!"
"<i>[Dying will reset progress on this quest.]</i>\\\"\": \"Parella em Statehelm disse": "\\\"Lamento dizer que os ranalon estão formando outro exército. Preciso que você ative o mesmo farol de antes e mate-os! Lembre-se: se você morrer, isso será visto como um sinal de nossa fraqueza. Permaneça vivo, não importa o que aconteça!"
"<i>[Empusa is an encounter for a group of 5 players with level 60 combat skills.]</i>\": \"<i>Zhia Lian:</i> Ouvi Ilth Hale dizer que um de seus lacaios favoritos, Empusa, está escondido em Rahu, esperando para atacar. Você deveria reunir alguns amigos e matar Empusa antes que seja tarde demais! Não tenho certeza de onde ela está se escondendo, mas me lembro de algo que Ilth Hale disse": "\\\"Quoth the Ravens, Nevermore\\\". Talvez seja uma senha ou algo assim."
"<i>[Flitilda flutters her eyelashes at you.]</i>\\\"\": \"Flitilda em Statehelm disse": "“Ouvi falar de uma flor mortal chamada tulipa, mas nunca vi uma!"
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache D-1'.]</i>

Sir Johnson in Amulna said, \"Here's your next map. A new gang of bandits moved into the area, so make yourself useful and figure out what they're up to. And get my xedrite too, obviously.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache D-1'.]</i>

Sir Johnson em Amulna disse: \"Aqui está seu próximo mapa. Uma nova gangue de bandidos se mudou para a área, então seja útil e descubra o que eles estão fazendo. E pegue meu xedrite também, obviamente.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache D-2'.]</i>

Sir Johnson in Amulna said, \"Remember those drug-manufacturing rakkies you found? Well, I've been hearing more rumors about it. It sounds powerful. Could be an alchemical recipe we could use in the Council military. Here's a map to a hole without any Xedrite in it. But it's in the same general area as that gang. I'm guessing it'll be swarming with the kitties, so be careful. Get in there and steal me a clean sample of the drug.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache D-2'.]</i>

Sir Johnson em Amulna disse: \"Lembra daqueles libertinos fabricantes de drogas que você encontrou? Bem, tenho ouvido mais rumores sobre isso. Parece poderoso. Poderia ser uma receita alquímica que poderíamos usar nas forças armadas do Conselho. Aqui está um mapa para um buraco sem qualquer Xedrite nele. Mas está na mesma área geral daquela gangue. Suponho que estará fervilhando de gatinhos, então tome cuidado. Entre lá e roube-me uma amostra limpa do droga.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache D-3'.]</i>

Sir Johnson in Amulna said, \"Here's the map for your next assignment. And you might want to hurry, I've had reports of smoke, screams, and commotion coming from there today.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache D-3'.]</i>

Sir Johnson em Amulna disse: \"Aqui está o mapa para sua próxima tarefa. E você pode se apressar, recebi relatos de fumaça, gritos e comoção vindos de lá hoje.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache D-4'.]</i>

Sir Johnson in Amulna said, \"So the drug you found out there, that Telka's Tits or whatever... it's garbage. Only works on rakkies! Most worthless drug since I got my hands on 'bounceweed'. But there's good news: the stuff is made from the silk of the rare giant sand worm, and we think other, better drugs could be made from the same stuff. And I have a lead on a cache infested with 'em! If we're lucky, you can get some samples of their silk while you're getting my xedrite.

Before you leave, go see if the Sand Seer has any advice for ya on Sand Worm killin'. Or just take my advice: use archery. But no, no, the elf woman's gotta make it more complicated than that!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache D-4'.]</i>

Sir Johnson em Amulna disse: \"Então a droga que você descobriu lá, aquela Telka's Tits ou algo assim... é lixo. Só funciona em rakkies! A droga mais inútil desde que coloquei as mãos na 'bounceweed'. Mas há boas notícias: a coisa é feita da seda do raro verme gigante da areia, e achamos que outras drogas melhores poderiam ser feitas a partir da mesma coisa. E eu tenho uma pista sobre um esconderijo infestado com eles! Se tivermos sorte, você pode conseguir algumas amostras de sua seda enquanto você pega meu xedrite.

Antes de sair, vá ver se o Sand Seer tem algum conselho para você sobre como matar o Sand Worm. Ou apenas siga meu conselho: use arco e flecha. Mas não, não, a mulher elfa tem que tornar tudo mais complicado do que isso!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache F-1'.]</i>

Sir Johnson in Amulna said, \"I've got a nice easy one for you. Here's the map to the war cache. We believe the cache was originally located in a Crone military city called New Argolis. Well, not really a city, more like a recreational area for off-duty Hegemony troops. Should be pretty safe. The report says there's some weird animals in there, but no bandits.

Follow the map, get in, find the Weaponized Xedrite, and get out. Don't screw up! You've only got one chance -- you won't be able to get back in a second time.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache F-1'.]</i>

Sir Johnson em Amulna disse: \"Tenho um bem fácil para você. Aqui está o mapa do esconderijo de guerra. Acreditamos que o esconderijo estava originalmente localizado em uma cidade militar Crone chamada New Argolis. Bem, não é realmente uma cidade, mais como uma área recreativa para as tropas da Hegemonia fora de serviço. Deve ser bastante seguro. O relatório diz que há alguns animais estranhos lá, mas nenhum bandido.

Siga o mapa, entre, encontre o Xedrite Armado e saia. Não estrague tudo! Você só tem uma chance: você não poderá voltar na segunda vez.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache F-2'.]</i>

Sir Johnson in Amulna said, \"We've found another war cache in the region that used to be 'New Argolis'. It wasn't on the front lines. Hegemony troops went there for booze and whores. So there shouldn't be any spike traps or death beams or anything. Nice and easy! In fact, I almost gave this job to my second-best finder, Kella, so I could save you for the hard ones. But she declined it... so it's all yours. She said the area is full of snakes, and she's afraid of snakes. Whoever heard of a rakkie that's afraid of snakes? What is this world coming to, I ask you?

Anyway, I guess she might know what she's talking about. Bring some antivenom.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache F-2'.]</i>

Sir Johnson em Amulna disse: \"Encontramos outro esconderijo de guerra na região que costumava ser 'Nova Argolis'. Não estava na linha de frente. As tropas da hegemonia foram lá em busca de bebida e prostitutas. Portanto, não deveria haver armadilhas de espinhos ou raios mortais ou qualquer coisa. Agradável e fácil! Na verdade, quase dei esse trabalho para minha segunda melhor descobridora, Kella, para poder salvá-la para as difíceis. Mas ela recusou... então é todo seu. Ela disse que a área está cheia de cobras, e ela tem medo de cobras Quem já ouviu falar de um rakkie que tem medo de cobras, eu pergunto?

De qualquer forma, acho que ela deve saber do que está falando. Traga um pouco de antiveneno.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache F-3'.]</i>

Sir Johnson in Amulna said, \"I've got a real easy one for you! This one's in the remains of 'New Argolis', the old R&R camp for Hegemony soldiers during the war. The Seer didn't go in, of course, but she said it smells like beer in there. I can't imagine it's still drinkable, though. Remember: wine ages, but beer just goes bad after a few decades. Don't make yourself sick!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache F-3'.]</i>

Sir Johnson em Amulna disse: \"Tenho um muito fácil para você! Este está nas ruínas de 'Nova Argolis', o antigo campo de R&R para soldados da Hegemonia durante a guerra. A Vidente não entrou, é claro, mas ela disse que cheira a cerveja lá dentro. Mas não consigo imaginar que ainda seja potável. Lembre-se: o vinho envelhece, mas a cerveja estraga depois de algumas décadas. Não fique doente! \""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache F-4'.]</i>

Sir Johnson in Amulna said, \"Here's the map to your next mission. It used to be a holding cell for war prisoners. It sounds like it's been flooded for a while, which means the bandits will have moved on, but I'm sure there's snakes and other dumb animals in there. Oh, and ghosts. Ghosts always show up in military prisons... you're not scared of ghosts, are you? I just give 'em a stunning bash with my shield. That shuts 'em up.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache F-4'.]</i>

Sir Johnson em Amulna disse: “Aqui está o mapa para sua próxima missão. Costumava ser uma cela para prisioneiros de guerra. para cima.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache M-1'.]</i>

Sir Johnson in Amulna said, \"I hope you're not afraid of mummies. I need you to go into a mummy-infested hole and get some xedrite. My other finders have chickened out, but you're better than them! You've got this! Here's the map!

Oh, better have the Sand Seer brief you on mummies first. It's good to refresh the brain!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache M-1'.]</i>

Sir Johnson em Amulna disse: \"Espero que você não tenha medo de múmias. Preciso que você entre em um buraco infestado de múmias e pegue um pouco de xedrita. Meus outros descobridores se acovardaram, mas você é melhor do que eles! Você conseguiu! Aqui está o mapa!

Ah, é melhor que o Sand Seer lhe informe sobre as múmias primeiro. É bom refrescar o cérebro!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache M-2'.]</i>

Sir Johnson in Amulna said, \"Got a big ole' mummy-infested deathtrap for ya. Lots of xedrite though! I've already sent someone into this one and she came back empty-handed, sayin' it was too dangerous. So I tell ya what, I'll throw in a little something extra if you can get all three pieces. Just don't die over it!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache M-2'.]</i>

Sir Johnson em Amulna disse: \"Tenho uma grande armadilha mortal infestada de múmias para você. Mas muito xedrite! Já enviei alguém para esta e ela voltou de mãos vazias, dizendo que era muito perigoso. Então vou te dizer uma coisa, vou acrescentar algo extra se você conseguir todas as três peças. Só não morra por causa disso!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache M-3'.]</i>

Sir Johnson in Amulna said, \"This hole's near the other mummy-pits, so be on your guard. Could be mummies or other nasty undead.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache M-3'.]</i>

Sir Johnson em Amulna disse: \"Este buraco fica perto dos outros poços de múmia, então fique atento. Podem ser múmias ou outros mortos-vivos desagradáveis.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache S-1'.]</i>

Sir Johnson in Amulna said, \"Let's get right to work. The Sand Seer has located a new war cache entrance. Follow this map. Remember: the entrance isn't stable. You should be able to get inside and back out again, but don't expect to be able to go back a second time! The hole will collapse quickly. So you have one shot to get my Weaponized Xedrite!

This seems like a pretty straightforward one. Just get in, get my Xedrite, and get out without being buried in the sand.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache S-1'.]</i>

Sir Johnson em Amulna disse: \"Vamos direto ao trabalho. O Sand Seer localizou uma nova entrada de cache de guerra. Siga este mapa. Lembre-se: a entrada não é estável. Você deve conseguir entrar e sair novamente, mas não espere poder voltar uma segunda vez! O buraco entrará em colapso rapidamente. Então você tem uma chance de pegar meu Xedrite Armado!

Isso parece bastante simples. Basta entrar, pegar meu Xedrite e sair sem ser enterrado na areia.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache S-2'.]</i>

Sir Johnson in Amulna said, \"I've talked with my informants about those scorpions you found. And they WERE keeping secrets from me! Apparently scorpion poison is very valuable on the rakkie bandit market, so they've been keeping their existence secret from me. Like I give a fuck about poison glands! I just want the weaponized xedrite. Working with me should be a win-win! Why are they hiding this?!


I convinced them to give me the location of another scorpion-filled pit. You're the only agent I trust in this desert -- aside from the Seer, of course -- so this one's all yours. There are two objectives this time: get my xedrite, and also get me a sample from one of these scorpions. Look for a decently scary-looking one, kill it, and bring back... well, just bring the whole thing back, I guess. The Seer wants to examine it.

You should expect scorpions, of course, but I wouldn't be surprised if there were bandits in there, too. Be ready for anything! Here's the map. Get me my xedrite!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache S-2'.]</i>

Sir Johnson em Amulna disse: \"Conversei com meus informantes sobre aqueles escorpiões que você encontrou. E eles estavam escondendo segredos de mim! Aparentemente, o veneno de escorpião é muito valioso no mercado de bandidos rakkie, então eles têm mantido sua existência em segredo de mim. Como se eu me importasse com glândulas venenosas! Eu só quero o xedrite como arma. Trabalhar comigo deve ser uma situação em que todos ganham! Por que eles estão escondendo isso?!


Eu os convenci a me darem a localização de outro poço cheio de escorpiões. Você é o único agente em quem confio neste deserto – além do Vidente, é claro – então este é todo seu. Desta vez, há dois objetivos: conseguir meu xedrite e também uma amostra de um desses escorpiões. Procure um de aparência decentemente assustadora, mate-o e traga de volta... bem, apenas traga tudo de volta, eu acho. O Vidente quer examiná-lo.

Você deveria esperar escorpiões, é claro, mas eu não ficaria surpreso se houvesse bandidos lá também. Esteja pronto para qualquer coisa! Aqui está o mapa. Pegue meu xedrite!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache S-3'.]</i>

Sir Johnson in Amulna said, \"The Sand Seer examined the scorpion remains you brought back, and she found something interesting. That scorpion's carapace was infused with xedrite! She thinks xedrite dust got into their shells or something. I don't buy it. We need a lot more information.

It took some bribery, but I got the location of another scorpion-filled pit for you. There's no xedrite in this one. Just go in, kill every scorpion, and bring me back those carapaces.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache S-3'.]</i>

Sir Johnson em Amulna disse: \"A Vidente da Areia examinou os restos de escorpião que você trouxe e encontrou algo interessante. A carapaça daquele escorpião foi infundida com xedrita! Ela acha que pó de xedrita entrou em suas conchas ou algo assim. Eu não acredito. Precisamos de muito mais informações.

Foi necessário algum suborno, mas consegui a localização de outro poço cheio de escorpiões para você. Não há xedrite neste. Basta entrar, matar todos os escorpiões e me trazer de volta aquelas carapaças.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache S-4'.]</i>

Sir Johnson in Amulna said, \"Remember those xedrite-laced scorpion corpses you brought back? Well, that xedrite is useless. It's just raw metal infused into their shells. I need weapons-grade xedrite!

However, the Seer thinks there's weaponized xedrite involved. She asked for an agent to undergo an extremely dangerous assignment. So I told her you'd be right over! Here's your map. See her for further briefing.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache S-4'.]</i>

Sir Johnson em Amulna disse: \"Lembra daqueles cadáveres de escorpiões com xedrita que você trouxe? Bem, esse xedrita é inútil. É apenas metal bruto infundido em suas conchas. Preciso de xedrita para armas!

No entanto, o Vidente acha que há xedrita armada envolvida. Ela pediu que um agente se submetesse a uma missão extremamente perigosa. Então eu disse a ela que você já viria! Aqui está o seu mapa. Consulte-a para mais instruções.\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache T-1'.]</i>

Sir Johnson in Amulna said, \"This one might be tricky. The Sand Seer insists this area of the desert has \"unusual isolated weather patterns\". What kind of patterns, you ask? Wind storms. Wind storms! Those are completely natural for the Ilmari! But she's an elf. They're supposed to be sensitive to nature, or whatever. Anyway I hired her for her expertise, so I'd be a fool to ignore her.

Here's the map. The Seer will brief you further. We've detected a lot of xedrite in this one, so do whatever it takes!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache T-1'.]</i>

Sir Johnson em Amulna disse: \"Este pode ser complicado. O Sand Seer insiste que esta área do deserto tem \"padrões climáticos isolados incomuns\".

Aqui está o mapa. O Vidente irá informá-lo melhor. Detectamos muito xedrite neste aqui, então faça o que for preciso!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache T-2'.]</i>

Sir Johnson in Amulna said, \"We've got another war cache in that problematic spider area. The Sand Seer wants you to collect some legs from those wind spiders while you're in there. Here's the map. Remember: spider legs are great and all, but don't leave without my Weaponized Xedrite!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache T-2'.]</i>

Sir Johnson em Amulna disse: \"Temos outro esconderijo de guerra naquela área problemática de aranhas. O Vidente da Areia quer que você colete algumas pernas daquelas aranhas do vento enquanto estiver lá. Aqui está o mapa. Lembre-se: pernas de aranha são ótimas e tudo, mas não saia sem meu Xedrite Armado!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache T-3'.]</i>

Sir Johnson in Amulna said, \"Got another spider-hole for you. No xedrite detected, though, so you're not going in for that. You're going in because the Sand Seer needs more spider legs or something. I'm starting to regret listening to her about this... but she says it might be a huge crisis, so now I can't just tell her to ignore it! Do whatever she needs, and try to be quick about it. We've got xedrite to find!\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache T-3'.]</i>

Sir Johnson em Amulna disse: \"Tenho outro buraco de aranha para você. Nenhum xedrite detectado, então você não vai entrar nisso. Você está entrando porque o Sand Seer precisa de mais pernas de aranha ou algo assim. Estou começando a me arrepender de ouvi-la sobre isso... mas ela diz que pode ser uma crise enorme, então agora não posso simplesmente dizer a ela para ignorar! Faça o que ela precisar e tente ser rápido. Temos xedrite para encontrar!\""
"<i>[For bug-reporting and feedback purposes, you can refer to this quest as 'War Cache T-4'.]</i>

Sir Johnson in Amulna said, \"You're finally back. Been saving this one for you! I sent my second-best xedrite-finder in already, and she came back empty-handed and mostly-dead. So it's time to show 'em why you're the best! There's xedrite in there, plus some big bug the Sand Seer wants killed. Go talk to her first.\"": "<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache T-4'.]</i>

Sir Johnson em Amulna disse: \"Você finalmente voltou. Estou guardando este para você! Já enviei meu segundo melhor localizador de xedrite, e ela voltou de mãos vazias e quase morta. Então é hora de mostre a eles por que você é o melhor! Há xedrite aí, além de algum inseto grande que o Vidente da Areia quer matar. Vá falar com ela primeiro. \""
"<i>[Furlak sniffs the air]</i>

Wonderful! The stench of that foul creature is already lessened. You have done well today. I hope this will be a lesson to other potential invaders that we will not tolerate their kind here.": "<i>[Furlak fareja o ar]</i>

Maravilhoso! O fedor daquela criatura imunda já diminuiu. Você se saiu bem hoje. Espero que isto sirva de lição para outros potenciais invasores de que não toleraremos a sua espécie aqui."
"<i>[Gazluk Keep is a dungeon for a group of 5 players with level 70 combat skills.]</i>\": \"<i>Zhia Lian:</i> Você sabe como Kajich odeia Tast? Por causa do... deixa pra lá. Não é importante. De qualquer forma, ouça": "há uma bruxa semi-morta-viva muito perigosa embaixo de uma cidade orc chamada Fortaleza Gazluk. Ela está dormindo em um caixão dentro de um quarto escondido. Isso deve ser fácil de encontrar, certo? Reúna um monte de amigos e encontre essa bruxa antes que ela acorde e tome conta de todo o castelo!"
"<i>[Gloria breathes deeply.]</i> I'm sorry. I can fight a horde of zombies without breaking a sweat, but one bitchy old human who knows how to get under my defenses... anyway, I'm trying to befriend her. I know she needs more sharp cheddar cheese for her biscuits. Do you have any? I'll buy it from you for, say, 600 Councils?\\\"\": \"Gloria Stonecurl em Kur Mountains disse": "\\\"Aquela maldita humana! Laura Neth! Ela não gosta de mim e é muito má. E ela é uma grande racista, assim como a maioria dos humanos, e estou tão farto de suas merdas!"
"<i>[Gloria takes a deep breath and calms herself.]</i> Can you see if you can buy some ink from her? Or from anywhere, really. I don't care, I just need to get this done!\\\"\": \"Gloria Stonecurl nas Montanhas Kur disse": "“Só preciso de um pouco de tinta de qualidade para completar a bênção de segurança na pousada de Ukorga. E sei que a humana Laura Neth tem a tinta que preciso."
"<i>[Gregory looks at you and raises his eyebrows.]</i>\\\"\": \"Gregory Pincackle em Statehelm disse": "“Ei, lembra quando você eliminou as pernas animadas no cemitério?"
"<i>[Gregory looks at you.]</i>\\\"\": \"Gregory Pincackle em Statehelm disse": "\\\"Alguém precisa cuidar de todos os malditos ossos das pernas vagando pelo cemitério! Uma coisa é fugir de um esqueleto completo, mas serei amaldiçoado se estiver fugindo de uma única perna. Consegui suspender a descrença em um corpo inteiro sem carne, mas apenas uma perna? Uma perna que por algum motivo chuta como uma mula? Não vou permitir. É uma maneira indigna de morrer, e o cemitério precisa de toda a dignidade que puder reunir."
"<i>[Hint": "Crude Phlogiston comes from magic items whose level is 30+. If you're only getting lower-grade phlogiston, you just need to transmute better items!]</i>\": \"Kalaba em Eltibule disse: \\\"Você sabia que o flogisto vem em muitos níveis de qualidade? O pior tipo é o 'flogisto instável'. Bem, Makara o chamou de 'flogisto de má qualidade'. De qualquer forma, é lixo. Depois, há o 'flogisto semi-resistente', que Makara chama de 'flogisto áspero'. Está tudo bem, mas não muito resistente."
"<i>[Impeto": "a força que faz algo acontecer. por exemplo 'Um ataque cruel de duendes foi o ímpeto para a nova lei anti-goblin.' ]</i>"
"<i>[Laura laughs bitterly.]</i>

He can't write a letter without saying something to intentionally piss me off. I know he loves me. And he's been there for me when I needed him, but it's never felt like ... well, like how a father should care about his daughter.

When I was young and the bakery was flourishing, an orc gang kidnapped me for ransom. Do you know what my father did? He haggled. Successfully, mind you, but they're fucking ORCS. They could have killed me out of rage! I was so scared.

When I was caught in bed with a woman, did he use his immense clout with the Council to get us off the hook? No. He bribed a guard. Marie and I had to sneak out of Statehelm and never return.

I love the man, and to be truthful I don't bear him ill will. I think of him fondly sometimes. But I'm not coming to his rescue.

Tell Dad I miss his walnut bread, but I'm never returning to Statehelm again. This is the second time he's asked, and if he asks again I'll cut off all communication with him forever.": "<i>[Laura ri amargamente.]</i>

Ele não consegue escrever uma carta sem dizer algo que me irrite intencionalmente. Eu sei que ele me ama. E ele esteve ao meu lado quando precisei dele, mas nunca pareceu... bem, como um pai deveria se preocupar com sua filha.

Quando eu era jovem e a padaria estava florescendo, uma gangue de orcs me sequestrou para pedir resgate. Você sabe o que meu pai fez? Ele pechinchou. Com sucesso, veja bem, mas eles são ORCS. Eles poderiam ter me matado de raiva! Eu estava com tanto medo.

Quando fui pego na cama com uma mulher, ele usou sua imensa influência no Conselho para nos livrar da situação? Não. Ele subornou um guarda. Marie e eu tivemos que fugir de Statehelm e nunca mais voltar.

Eu amo o homem e, para ser sincero, não sinto má vontade dele. Às vezes penso nele com carinho. Mas não irei em seu socorro.

Diga ao papai que sinto falta do pão de nozes dele, mas que nunca mais voltarei a Statehelm. Esta é a segunda vez que ele pergunta, e se perguntar novamente, cortarei toda a comunicação com ele para sempre."
"<i>[Manholes Unlocked!]</i>\\\"\": \"Sor Hackley em Statehelm disse": "\\\"Os esgotos usam um solvente mágico para limpar e reaproveitar resíduos, e eles deveriam ser isentos de manutenção. Hah. Preciso que você vá até lá e limpe algumas das obstruções do sistema. Você pode fazer isso? Aqui está uma chave para os bueiros de esgoto. Não morra lá embaixo."
"<i>[Must use Ice Magic to advance this quest.]</i>\\\"\": \"A pedra de envio de Unora em Gazluk disse": "\\\"Por que não começamos com alguma prática de tiro ao alvo? Ao acertar vários inimigos, o número ideal para acertar é três. Mas às vezes é necessário acertar mais. Experimente diferentes densidades e estude a diferença."
"<i>[Must use Ice Magic to advance this quest.]</i>\\\"\": \"A pedra de envio de Unora em Gazluk dizia": "\\\"Ice Magic é bem conhecido por conceder resiliência a seus usuários. Vamos ter certeza de que você entendeu bem esse conceito."
"<i>[New Favor Unlocked.]</i>\": \"Você conseguiu! Eu sabia que era um ótimo professor! Vou te ensinar a próxima técnica agora. Isso permite destilar itens mágicos um pouco melhores! Ah, e aqui": "pegue esses prismas. Às vezes eles quebram, então você precisa de muitos deles."
"<i>[Nota": "completar esta missão venderá a lâmina para Sir Brooker. Se você deseja manter a lâmina, você deve cancelar esta missão.]</i>\\\"\""
"<i>[Note": "completing this quest will sell the blade to Sir Brooker. If you wish to keep the blade you should cancel this quest.]</i>\\\"\": \"Sir Brooker em Statehelm disse: \\\"Você vai voltar para Vidaria em breve? Você deveria procurar algo para mim. Costumava haver um time de pólo de batalha na cidade. Já desapareceu há muito tempo. Mas havia um concurso onde você poderia encontrar uma espada cerimonial em Vidaria, chamada Vanquisher's Blade, que o colocaria automaticamente na lista do time. Encontrei algumas pistas sobre isso enquanto estava estacionado lá, mas nunca encontrei a coisa. Eu adoraria ter um como lembrança. Pagarei bem por isso, se você encontrar!"
"<i>[Note: this quest is for gourmands. Pumpkin pie requires Gourmand 35!]</i>

<i>Zhia Lian:</i> Everybody loves pumpkin pie. (Yes, you do.) So eat one!

You can find the recipe on the undead, or you might be able to obtain a pumpkin pie from another hero.

<i>[This quest will reward you with 1000 Councils, so even if you pay that much for a pie, you won't lose money.]</i>": "<i>[Nota: esta missão é para gourmands. Torta de abóbora requer Gourmand 35!]</i>

<i>Zhia Lian:</i> Todo mundo adora torta de abóbora. (Sim, você quer.) Então coma um!

Você pode encontrar a receita nos mortos-vivos ou pode conseguir uma torta de abóbora de outro herói.

<i>[Esta missão irá recompensá-lo com 1000 Conselhos, então mesmo que você pague tanto por uma torta, você não perderá dinheiro.]</i>"
"<i>[Pitre flips through the pages in your notebook]</i>

I can hardly believe it. Nothing incriminating, and clearly not for lack of trying. I have learned a lot about goblin culture these last few weeks, but covering their trail <i>this</i> well is something I did not expect.

I've an idea to put this to bed once and for all. We shall set up a stake-out and keep an eye on Korbok together. With both of us working simultaneously, are sure to catch him in the act of whatever he is performing.

[New hangout with Pitre unlocked]": "<i>[Pitre folheia as páginas do seu caderno]</i>

Mal posso acreditar. Nada incriminatório, e claramente não por falta de tentativa. Eu aprendi muito sobre a cultura goblin nessas últimas semanas, mas cobrir seu rastro <i>tão</i> bem é algo que eu não esperava.

Tive a ideia de acabar com isso de uma vez por todas. Vamos montar uma vigilância e ficar de olho em Korbok juntos. Com nós dois trabalhando simultaneamente, certamente o pegaremos no ato do que quer que esteja realizando.

[Novo hangout com Pitre desbloqueado]"
"<i>[Progress is lost if you die.]</i>\": \"Há MUITOS assaltantes esta noite. Você poderia fazer uma grande melhoria na segurança da cidade exterminando um monte deles antes que eles voltassem para qualquer buraco de onde saíram. Mas você sabe que sua segurança é fundamental": "você não deve morrer em uma missão tão mundana!"
"<i>[Remember that you must remain in rabbit form to advance and complete this task!]</i>\": \"Mestre Boop disse": "\\\"Vejo você conferindo meu pelo azul legal! Aposto que você também quer saber como eu faço isso! Bem, pelo azul é um sinal de que você tem um verdadeiro poder de booping e parece que você é capaz disso. Vou te ensinar como ter um pelo azul incrível como o meu se você me trouxer algumas coisas. Aqui está a lista e boa caça!\\\""
"<i>[Sitiado": "adjetivo: assolado por dificuldades. ]</i>"
"<i>[The killing blow must be Darkness damage.]</i>\\\"\": \"Fransesca Muradrake em Statehelm disse": "\\\"Você parece confiável o suficiente. Aqui, isso abre uma câmara muito perigosa dentro da cripta de Statehelm. Esta área está fora dos limites para a maioria. O laboratório particular do meu marido fica além desse ponto. Mas você não precisa se aprofundar tanto hoje. Meu marido adorava criações necromânticas incomuns, e a cripta está cheia de seu zoológico. Preciso de alguns bicos três vezes amaldiçoados, e há criaturas pássaros lá dentro que contém um."
"<i>[This quest is just for gardeners. It requires Gardening 15 to grow an evil pumpkin!]</i>

<i>Zhia Lian:</i> You can never have enough exploding pumpkins! Well, I can't. Take the seeds from the evil pumpkins and grow me some evil fruit! Pumpkin is a fruit, right? Well, whatever. Just grow them already!": "<i>[Esta missão é apenas para jardineiros. É necessário nível 15 de Jardinagem para cultivar uma abóbora maligna!]</i>

<i>Zhia Lian:</i> Nunca haverá abóboras explosivas suficientes! Bem, eu não posso. Pegue as sementes das abóboras malignas e cultive algumas frutas malignas para mim! Abóbora é uma fruta, certo? Bem, tanto faz. Basta cultivá-los já!"
"<i>[This quest is just for gardeners. It requires Gardening 50 to grow a healthy pumpkin!]</i>

<i>Zhia Lian:</i> It's all well and good to find a pumpkin on a zombie, but I want really fresh pumpkins, so you should grow some for me. Find seedlings from undead and grow them in a garden.": "<i>[Esta missão é apenas para jardineiros. É necessário Jardinagem 50 para cultivar uma abóbora saudável!]</i>

<i>Zhia Lian:</i> É muito bom encontrar uma abóbora em um zumbi, mas eu quero abóboras realmente frescas, então você deveria cultivar algumas para mim. Encontre mudas de mortos-vivos e cultive-as em um jardim."
"<i>[This quest will reward you with 1000 Councils, so even if you pay that much for a pie, you won't lose money.]</i>\": \"<i>[Nota": "esta missão é para gourmands. Torta de abóbora requer Gourmand 35!]</i>"
"<i>[To advance this quest you must be wearing the Fire Analysis Gem and using Fire Magic.]</i>\\\"\": \"Guzor Harrison, em Statehelm, disse": "\\\"Em seguida, preciso entender melhor como os demônios são tão resistentes ao fogo. Vá e mate alguns dos de tamanho médio."
"<i>[To advance this quest you must have 100+ citrus items in your inventory when you pick flitterbies.]</i>\\\"\": \"Flitilda em Statehelm disse": "\\\"Ei, é você de novo. Lembra quando você me deu flitterbies? Eu estava pensando neles. Aposto que vocês não têm ideia de como funcionam os flitterbies! Eles são maleáveis ao ambiente, mesmo depois de crescerem. Se você tiver uma tonelada de frutas cítricas quando escolher uma, ela sairá com um cheiro cítrico!"
"<i>[To remove graffiti, place the Scrub Graffiti ability on your sidebar. Obtain Graffiti Cleaner. Then stand near graffiti and use the ability.]</i>\\\"\": \"Sor Hackley, em Statehelm, disse": "\\\"Ótimo trabalho com os esgotos, mas agora temos outro problema. O grafite está ficando fora de controle. Se alguém no Conselho perceber, tomará ações drásticas e horríveis, como, não sei, tornar as paredes sensíveis para que fiquem facilmente enfurecidos. Ou talvez transformar as muralhas da cidade em pura não-vida. Seja o que for, será muito pior do que o que temos, o que requer apenas um pouco de bom e velho trabalho duro. Por você."
"<i>[To weed a plant, place the Weed Plants ability on your sidebar, obtain Fertilizer Sticks, then stand near a weedy potted plant and use the Weed Plants ability.]</i>\\\"\": \"Sor Hackley em Statehelm disse": "\\\"Dois anos atrás, o Conselho iniciou uma iniciativa de\\\" tornar a cidade mais verde \\\", onde qualquer pessoa que quisesse cultivar plantas na cidade receberia manutenção gratuita de golens utilitários. Esses golens utilitários foram todos reaproveitados para o esforço de guerra - quero dizer, o incidente demoníaco - e agora a cidade está coberta de ervas daninhas! Confio que você consegue lidar com a remoção de ervas daninhas de uma planta? A maioria deles está dentro de casa, então você pode ter que fuçar em busca deles. Ah, também, aproveite essa oportunidade para colocar um bastão de fertilizante no solo, tenho alguns para venda ou troca - não se preocupe, você receberá seu dinheiro de volta!"
"<i>[Uriana looks shocked at what you've done and begins to weep.]</i> You slew panthers at my bequest?! You lie! I love panthers! No... I hate them! I love AND hate them! ... Well, you do not lie.

<i>[Uriana silently hands you an item from her hoard, then becomes lost in thought.]</i>": "<i>[Uriana parece chocada com o que você fez e começa a chorar.]</i> Você matou panteras por minha herança?! Você mente! Eu amo panteras! Não... eu os odeio! Eu amo E odeio eles! ... Bem, você não mente.

<i>[Uriana silenciosamente lhe entrega um item de seu tesouro, depois fica perdida em pensamentos.]</i>"
"<i>[Use Virtuoso's Ballad while fighting level 80+ enemies.]</i>\\\"\": \"Ormond Neth, em Statehelm, disse": "\\\"Baladas apresentadas em tavernas são para posers. Bardos de verdade podem criar baladas enquanto lutam até a morte. Boas baladas também! Continue praticando até pegar o jeito."
"<i>[Vacilar": "verbo: oscilar para frente e para trás indeciso. ]</i>"
"<i>[You must have the empty Feet and Legs slots, and kill enemies with Kick abilities, to advance this quest.]</i>\\\"\": \"Sir Hughes, em Statehelm, disse": "\\\"Vimos como você pode socar. Mas agora você precisa realmente testar seu poder de chute. Vá e chute alguns desses cães demoníacos - aqueles Cerberi - até a morte. Tire os sapatos e quaisquer protetores de perna para poder sentir o movimento completo de seus membros."
"<i>[You must have the Shield and Unarmed skills active to advance this quest.]</i>\\\"\": \"Sir Brooker em Statehelm disse": "\\\"Ok, acho que você provou seu valor. Mas aqui está mais um desafio que é apenas para diversão. Você consegue derrotar um manequim com um escudo e seus punhos?"
"<i>[You must have the Sword skill active to advance this quest.]</i>\\\"\": \"Sir Brooker em Statehelm disse": "\\\"Temos dois novos recrutas hoje. Você se acha bom com uma espada, por que não mostrar a eles como isso é feito? Desmonte um desses bonecos de treinamento com uma espada."
"<i>[You must have the Unarmed skill active to advance this quest.]</i>\": \"Aqui está uma coisa com a qual lutei comigo mesmo": "você pode derrotar demônios com as mãos vazias? Não os fracos – os Behemoths!"
"<i>[You must have the Unarmed skill active to advance this quest.]</i>\\\"\": \"Sir Hughes em Statehelm disse": "\\\"Você quer melhorar rapidamente no combate corpo a corpo? Eu sei exatamente o que é. Lutar contra cobras gigantes. Funciona! Claro, você precisa de um certo nível de habilidade de antemão. É por isso que não usamos essa técnica com recrutas inexperientes. Mas você não é inexperiente, não é? Mostre-me o que você pode fazer contra as enormes víboras em Povus."
"<i>[You must have the Unarmed skill active to advance this quest.]</i>\\\"\": \"Sir Hughes, em Statehelm, disse": "\\\"Aqui está uma questão com a qual lutei comigo mesmo: você pode derrotar demônios com as mãos vazias? Não os fracos - os Behemoths!"
"<i>[You must NOT have the Sword skill active to advance this quest.]</i>\\\"\": \"Sir Brooker em Statehelm disse": "\\\"Isso foi impressionante com a espada. Mas você pode destruir um manequim SEM espada? Vamos ver sua versatilidade!"
"<i>[Zazzamath licks his lips]</i>

Beautiful. BEAUTIFUL! I'm starting to think getting stuck here was a GOOD thing. I didn't have the kind of free reign that you have... You can go anywhere! You can kill anything! It's wonderful!": "<i>[Zazzamath lambe os lábios]</i>

Lindo. LINDO! Estou começando a pensar que ficar preso aqui foi uma coisa BOA. Eu não tive o tipo de rédea solta que você tem... Você pode ir a qualquer lugar! Você pode matar qualquer coisa! É maravilhoso!"
"<i>Brandon Mellus:</i> I need you to get 144 barrels of beer to a place called the \"Red Wing Casino\". I've never been there, but it sounds fancy, and the banquet hall was cheap!

I have no idea how to get this stuff delivered, but I'm betting you can make it happen!

I'll hand you the barrels six at a time. You don't have to take them all at once! Don't overburden yourself: you'll throw out your back!": "<i>Brandon Mellus:</i> Preciso que você leve 144 barris de cerveja para um lugar chamado \"Red Wing Casino\". Nunca estive lá, mas parece chique e o salão de banquetes era barato!

Não tenho ideia de como entregar essas coisas, mas aposto que você consegue fazer isso acontecer!

Entregarei a você os barris seis de cada vez. Você não precisa tomar todos de uma vez! Não se sobrecarregue: você vai se desesperar!"
"<i>Os seguintes magos podem fornecer recomendações": "O Vidente da Areia, Bendith, o Banido, Velkort, o Inferno, Ichin, o Mestre do Gelo, Landri, o Frio.</i>\""
"<i>Rebeccah beams at you. She seems pleased, though perhaps a bit surprised. You did it! Rebeccah hands you a ceremonial badge. You're a student of Tennenbrandt University now!</i>": "<i>Rebeccah sorri para você. Ela parece satisfeita, embora talvez um pouco surpresa. Você conseguiu! Rebeccah entrega a você um distintivo cerimonial. Você agora é estudante da Universidade Tennenbrandt!</i>"
"<i>Rebeccah scribbles a note:</i>

Congratulations! I knew you were an advanced student when I heard your song.

I can no longer sing, but in my dreams I still can. When I wake, my throat is quite sore. Can you fetch some bitter-mint tea for me?": "<i>Rebeccah rabisca uma nota:</i>

Parabéns! Eu sabia que você era um estudante avançado quando ouvi sua música.

Não consigo mais cantar, mas nos meus sonhos ainda consigo. Quando acordo, minha garganta está bastante dolorida. Você pode trazer um pouco de chá de menta amarga para mim?"
"<i>Rebeccah smiles at your success. She scribbles on a note, \"Of course, there's also the alchemical method for soda ash. It's not my favorite because it feels wasteful, but let me teach you the recipe just so you have options.\"</i>": "<i>Rebeccah sorri com o seu sucesso. Ela rabisca em uma nota: \"Claro, também existe o método alquímico para o carbonato de sódio. Não é meu favorito porque parece um desperdício, mas deixe-me ensinar a receita só para que você tenha opções.\"</i>"
"<i>Rebeccah takes the tea, sips, and grimaces at the bitterness. Then she smiles thanks.</i>": "<i>Rebeccah toma o chá, dá um gole e faz uma careta diante da amargura. Então ela sorri e agradece.</i>"
"<i>The Bat in the Hat:</i>  Excellent! Here's a wonderful, festive hat to enjoy the season! While this hat is stylish, it's not very functional. If you want a version of this hat that is more functional, we'll need to talk some more.": "<i>O Morcego do Chapéu:</i> Excelente! Aqui está um chapéu maravilhoso e festivo para aproveitar a temporada! Embora este chapéu seja elegante, não é muito funcional. Se você quiser uma versão desse chapéu mais funcional, precisaremos conversar mais um pouco."
"<i>The Bat in the Hat:</i>  Hello again! Say, it looks like you could use a stylish hat for the season! Zhia Lian and I have been talking a lot recently and she has been teaching me some new tricks. Would you like a cool, stylish hat for the season? Then get me these items and I'll put something together for you. See you soon! Riiii!": "<i>O Morcego do Chapéu:</i> Olá de novo! Diga, parece que você poderia usar um chapéu estiloso para a estação! Zhia Lian e eu temos conversado muito recentemente e ela tem me ensinado alguns truques novos. Você gostaria de um chapéu legal e estiloso para a temporada? Então me traga esses itens e eu prepararei algo para você. Vejo você em breve! Riii!"
"<i>The Bat in the Hat:</i>  So you want something a little nicer? I can do that for you! Mind you the item list I need is a bit more demanding, but if you're up to the task, I'll make the hat for you. Take this list and come back to see me once you have everything. See you soon! Riiii!

<i><b>NOTE:</b> The reward item will be a level 85 item. Make sure you have your correct skill combo active when you complete this quest! But also remember, you're dealing with Zhia Lian's magic. Results may be unpredictable!</i>": "<i>O Morcego do Chapéu:</i> Quer algo um pouco melhor? Eu posso fazer isso por você! Veja bem, a lista de itens que preciso é um pouco mais exigente, mas se você estiver à altura da tarefa, farei o chapéu para você. Pegue esta lista e volte me ver quando tiver tudo. Vejo você em breve! Riii!

<i><b>NOTA:</b> O item de recompensa será um item de nível 85. Certifique-se de ter sua combinação de habilidades correta ativa ao completar esta missão! Mas lembre-se também, você está lidando com a magia de Zhia Lian. Os resultados podem ser imprevisíveis!</i>"
"<i>The following wizards can provide recommendations": "The Sand Seer, Bendith the Banished, Velkort the Inferno, Ichin the Ice Master, Landri the Cold.</i>\": \"Existem dois requisitos para ingressar na Statehelm School of Magic. Primeiro, você também precisará obter recomendações de assistentes em quem confio. Aqui estão alguns nomes. Obtenha pelo menos três para aprovar sua competência. Ah, e não se preocupe em tentar falsificar essas cartas. Se concordarem em recomendá-lo, essas boas pessoas saberão como entrar em contato comigo diretamente."
"<i>You become aware of a powerful presence reaching out to you. Does Dreva have a task for you? A voice speaks in your mind:</i>

Find the Shrine of Ri-Shin in the Kur Mountains. Ri-Shin is a strong ally; render whatever aid is needed.": "<i>Você se torna consciente de uma presença poderosa chegando até você. Dreva tem uma tarefa para você? Uma voz fala em sua mente:</i>

Encontre o Santuário de Ri-Shin nas Montanhas Kur. Ri-Shin é um forte aliado; prestar qualquer ajuda necessária."
"<i>You become aware of a powerful presence reaching out to you. There are no words ... But you have the strangest sensation that you should search the wilds of Kur Mountains for a ... shrine? To Ri-Shin?</i>": "<i>Você se torna consciente de uma presença poderosa chegando até você. Não há palavras... Mas você tem a estranha sensação de que deveria procurar nas florestas das Montanhas Kur um... santuário? Para Ri-Shin?</i>"
"<i>You can find the recipe in the Lore category of your recipe book.</i>\\\"\": \"Irkima, do Red Wing Casino, disse": "“Dei a você minha receita para a ração para pássaros que usamos aqui. Reúna os ingredientes e traga-me 10 unidades."
"<i>You can see her digging around for something</i>

Ah! There it is! <i>She flips through some pages of a book she found</i>

Wait.. if these instructions are right, goats can't make it. Of course that wizard would trick me! Hey, you there! Yeah, you with the ears and the hands! You can craft things, right? Take this, and make me a few. I'm trying to throw a surprise party for my sister, but it looks like the wizard who made this recipe doesn't want a goat like me to make it. I'll give you something for your trouble.": "<i>Você pode vê-la procurando alguma coisa</i>

Ah! Aí está! <i>Ela folheia algumas páginas de um livro que encontrou</i>

Espere... se essas instruções estiverem corretas, as cabras não conseguirão. É claro que aquele mago iria me enganar! Ei, você aí! Sim, você com os ouvidos e as mãos! Você pode criar coisas, certo? Pegue isso e faça alguns para mim. Estou tentando fazer uma festa surpresa para minha irmã, mas parece que o bruxo que fez esta receita não quer que uma cabra como eu faça. Vou lhe dar algo pelo seu problema."
"<i>You relay Landri the Cold's words.</i>

Thank you. Her theory is plausible. I will try my method first, but if it doesn't work, I'll try hers.": "<i>Você transmite as palavras de Landri, o Frio.</i>

Obrigado. Sua teoria é plausível. Vou tentar o meu método primeiro, mas se não funcionar, tentarei o dela."
"<i>Zhia Lian:</i>  A little dirt never hurt anyone. It certainly will not hurt for you to give me some of your dirt. Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!
<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Zhia Lian:</i> Um pouco de sujeira nunca fez mal a ninguém. Certamente não fará mal para você me dar um pouco da sua sujeira. Faça o que você pediu e eu lhe darei uma pequena recompensa. Falhe meu pedido e não será bonito! Não sou muito bom em aceitar um não como resposta. Pegue o que preciso e leve ao meu agente em Serbule. Até marquei ele no mapa para vocês, não é difícil! Boa sorte!
<b>IMPORTANTE!</b>: Você deve permanecer online pelo menos até que o objetivo do servidor seja alcançado para obter crédito total. Caso contrário, certifique-se de fazer login novamente <b>antes</b> do desafio terminar, caso você precise desistir mais cedo. Verifique o agente quanto ao cronômetro."
"<i>Zhia Lian:</i>  Mmmm, fire dust! Everyone likes a little bit of the warm dusty stuff, but what I like more is me with more of everyone's warm dusty stuff! Hey, share! Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!
<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Zhia Lian:</i> Mmmm, pó de fogo! Todo mundo gosta de um pouco daquela coisa quente e empoeirada, mas o que eu gosto mais sou eu com mais coisa quente e empoeirada de todo mundo! Ei, compartilhe! Faça o que você pediu e eu lhe darei uma pequena recompensa. Falhe meu pedido e não será bonito! Não sou muito bom em aceitar um não como resposta. Pegue o que preciso e leve ao meu agente em Serbule. Até marquei ele no mapa para vocês, não é difícil! Boa sorte!
<b>IMPORTANTE!</b>: Você deve permanecer online pelo menos até que o objetivo do servidor seja alcançado para obter crédito total. Caso contrário, certifique-se de fazer login novamente <b>antes</b> do desafio terminar, caso você precise desistir mais cedo. Verifique o agente quanto ao cronômetro."
"<i>Zhia Lian:</i>  Ok, so I have this spontaneous urge to collect some Evil Pumpkins! I'm going to get you guys to help me out. Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!
<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Zhia Lian:</i> Ok, então tenho esse desejo espontâneo de coletar algumas Abóboras Malignas! Vou pedir a vocês que me ajudem. Faça o que você pediu e eu lhe darei uma pequena recompensa. Falhe meu pedido e não será bonito! Não sou muito bom em aceitar um não como resposta. Pegue o que preciso e leve ao meu agente em Serbule. Até marquei ele no mapa para vocês, não é difícil! Boa sorte!
<b>IMPORTANTE!</b>: Você deve permanecer online pelo menos até que o objetivo do servidor seja alcançado para obter o crédito total. Caso contrário, certifique-se de fazer login novamente <b>antes</b> do desafio terminar, caso você precise desistir mais cedo. Verifique o agente quanto ao cronômetro."
"<i>Zhia Lian:</i>  Yes, I want oregano! Why are you so concerned about what I do with it? I do stuff with it! What do you do with it? I'll tell ya, you give it to me! Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!
<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Zhia Lian:</i> Sim, quero orégano! Por que você está tão preocupado com o que eu faço com isso? Eu faço coisas com isso! O que você faz com isso? Eu vou te dizer, você dá para mim! Faça o que você pediu e eu lhe darei uma pequena recompensa. Falhe meu pedido e não será bonito! Não sou muito bom em aceitar um não como resposta. Pegue o que preciso e leve ao meu agente em Serbule. Até marquei ele no mapa para vocês, não é difícil! Boa sorte!
<b>IMPORTANTE!</b>: Você deve permanecer online pelo menos até que o objetivo do servidor seja alcançado para obter o crédito total. Caso contrário, certifique-se de fazer login novamente <b>antes</b> do desafio terminar, caso você precise desistir mais cedo. Verifique o agente quanto ao cronômetro."
"<i>Zhia Lian:</i> Ahh. Sometimes I create a mortal body just to drink these things! And I like the extra mint to make your breath smell good. *Cough*": "<i>Zhia Lian:</i> Ahh. Às vezes eu crio um corpo mortal só para beber essas coisas! E gosto da hortelã extra para deixar seu hálito cheiroso. *Tosse*"
"<i>Zhia Lian:</i> Apparently those poor sad spiders were used in horrible experiments during some war. Mortals are pretty awful sometimes!

But you shouldn't make a habit of doing good deeds as a spider. If you keep behaving as a paragon of spiderdom, Akhisa will notice you. And you're MY follower!

You can switch back when you've had enough of all those hairy legs.": "<i>Zhia Lian:</i> Aparentemente aquelas pobres aranhas tristes foram usadas em experimentos horríveis durante alguma guerra. Os mortais às vezes são horríveis!

Mas você não deve criar o hábito de fazer boas ações como uma aranha. Se você continuar se comportando como um modelo de aranha, Akhisa notará você. E você é MEU seguidor!

Você pode voltar quando estiver farto de todas aquelas pernas peludas."
"<i>Zhia Lian:</i> Candles are an important part of many rituals. You should at least be able to make some tealights!": "<i>Zhia Lian:</i> As velas são uma parte importante de muitos rituais. Você deveria pelo menos ser capaz de fazer algumas tealights!"
"<i>Zhia Lian:</i> Cultists all happy now? Great. It took a long time to plant those cures where they'd find them! The donkey potion was especially hard: I had to subtly alter the laws of nature to make it work, which means I'll probably be hearing from Dreva soon. But the important thing is my cultists think they were cured by a string of lucky breaks, not godly miracles. And you did a bit of work too. We make a great team!

I have to admit that I was in a really bad mood the day I granted those wishes. Ormorek had just been telling me about his stupid dream-soldiers and how I never do anything to help mortals, and blah blah blah. Don't tell me what to do! Not that you do. That's why I like you. Also you're incredibly powerful for a mortal. Anyway, here: this is for you, loyal cultist!": "<i>Zhia Lian:</i> Cultistas estão todos felizes agora? Ótimo. Demorou muito para plantar essas curas onde as encontrassem! A poção do burro foi especialmente difícil: tive que alterar sutilmente as leis da natureza para fazê-la funcionar, o que significa que provavelmente terei notícias de Dreva em breve. Mas o importante é que meus cultistas acham que foram curados por uma série de golpes de sorte, e não por milagres divinos. E você também trabalhou um pouco. Formamos uma grande equipe!

Devo admitir que estava de muito mau humor no dia em que realizei esses desejos. Ormorek tinha acabado de me contar sobre seus estúpidos soldados dos sonhos e como eu nunca faço nada para ajudar os mortais, e blá, blá, blá. Não me diga o que fazer! Não que você faça isso. É por isso que gosto de você. Além disso, você é incrivelmente poderoso para um mortal. Enfim, aqui: isto é para você, cultista leal!"
"<i>Zhia Lian:</i> Did I say 'less horrible'? I misspoke. Spiders can spit their digestive fluids as an attack! Now THAT is horrible! So go do it!

Do it to goblins. They're probably the funniest when they melt!": "<i>Zhia Lian:</i> Eu disse 'menos horrível'? Eu falei errado. As aranhas podem cuspir seus fluidos digestivos como um ataque! Agora ISSO é horrível! Então vá em frente!

Faça isso com os goblins. Eles são provavelmente os mais engraçados quando derretem!"
"<i>Zhia Lian:</i> Did you eat their corpses? Oh, you... like your meat cooked? I didn't think bats cooked. That's whimsical, I guess, but also uninformative.": "<i>Zhia Lian:</i> Você comeu os cadáveres deles? Ah, você... gosta de carne cozida? Não pensei que morcegos cozinhassem. Isso é extravagante, eu acho, mas também pouco informativo."
"<i>Zhia Lian:</i> Did you know that if you're willful enough, you can speak for a moment after you die? That's what I've heard anyway. You seem pretty willful; let's test that idea!

Go find a stage, kill yourself, and right after you die, speak aloud. The crowd will love it!

And oh yeah, I'll bring you back to life. Of course! Make sure you die on stage.": "<i>Zhia Lian:</i> Você sabia que se for obstinado o suficiente, poderá falar por um momento depois de morrer? Pelo menos foi isso que ouvi. Você parece muito obstinado; vamos testar essa ideia!

Vá encontrar um palco, mate-se e, logo após morrer, fale em voz alta. A galera vai adorar!

E, ah, sim, vou trazer você de volta à vida. Claro! Certifique-se de morrer no palco."
"<i>Zhia Lian:</i> Eh. I'm kind of sick of pumpkins. You keep them.": "<i>Zhia Lian:</i> Ah. Estou meio farto de abóboras. Você os mantém."
"<i>Zhia Lian:</i> Even Tuvillus is using this opportunity to invade your world. He's the god of Jealousy and Envy, and he's creating massive jealousy-pumps in hidden places. They'll look like giant floating hearts! Gather an army... or at least a posse... and hunt the hearts! I'll lead you to each one!

The first giant heart is in Eltibule, beneath the little keep there.": "<i>Zhia Lian:</i> Até Tuvillus está aproveitando esta oportunidade para invadir seu mundo. Ele é o deus do ciúme e da inveja e está criando enormes bombas de ciúme em lugares escondidos. Eles parecerão corações gigantes flutuantes! Reúna um exército... ou pelo menos um pelotão... e cace os corações! Vou levar você a cada um!

O primeiro coração gigante está em Eltibule, abaixo da pequena fortaleza."
"<i>Zhia Lian:</i> Excellent work! Now maybe you're ready for some tougher undead.": "<i>Zhia Lian:</i> Excelente trabalho! Agora talvez você esteja pronto para alguns mortos-vivos mais durões."
"<i>Zhia Lian:</i> Excellent work. You helped me fulfill a very silly prophecy I made a while ago! And you killed some evil skeletons, too, so everybody wins.": "<i>Zhia Lian:</i> Excelente trabalho. Você me ajudou a cumprir uma profecia muito boba que fiz há algum tempo! E você matou alguns esqueletos malignos também, então todos ganham."
"<i>Zhia Lian:</i> Finally! It's smoothie time!": "<i>Zhia Lian:</i> Finalmente! É hora do smoothie!"
"<i>Zhia Lian:</i> Ghosts are at their scariest in the wee hours. So prove your mettle by killing them at night!": "<i>Zhia Lian:</i> Os fantasmas ficam mais assustadores nas primeiras horas da madrugada. Então prove sua coragem matando-os à noite!"
"<i>Zhia Lian:</i> Ghouls are nasty, disgusting undead. There is nothing more gross than a pile of dead ghouls. At least skeletons don't smell very much! Go make the world a better-smelling place! Bury all the ghouls you can find!": "<i>Zhia Lian:</i> Ghouls são mortos-vivos desagradáveis ​​e nojentos. Não há nada mais nojento do que uma pilha de ghouls mortos. Pelo menos os esqueletos não cheiram muito! Vá fazer do mundo um lugar com cheiro melhor! Enterre todos os ghouls que encontrar!"
"<i>Zhia Lian:</i> Ghouls are rarer undead. Urtigal used to make tons of them, but he's dead now. So I don't know who keeps making new ones... but anyway, you should kill them! Let's see... you can find some deep in the dungeon beneath the ruined Kur Tower. And you might want to bring a friend or two: it looks pretty dangerous in there!": "<i>Zhia Lian:</i> Ghouls são mortos-vivos mais raros. Urtigal costumava fazer toneladas deles, mas agora está morto. Então não sei quem continua fazendo novos... mas de qualquer forma, você deveria matá-los! Vamos ver... você pode encontrar alguns nas profundezas da masmorra abaixo das ruínas da Torre Kur. E você pode querer trazer um ou dois amigos: parece muito perigoso lá dentro!"
"<i>Zhia Lian:</i> Giant bats are common this time of year. And you can be one! Just get bitten often enough by a giant bat, and you're sure to catch the disease. Then practice being a bat long enough to learn echolocation! And don't worry, I'll make sure you can get back to your normal self later. If you want to be boring again.

<i>[You can find giant bats in some deep caves, but it may be easier to just let other player-bats bite you.]</i>": "<i>Zhia Lian:</i> Morcegos gigantes são comuns nesta época do ano. E você pode ser um! Basta ser mordido com frequência por um morcego gigante e você certamente pegará a doença. Então pratique ser um morcego por tempo suficiente para aprender a ecolocalização! E não se preocupe, garantirei que você volte ao normal mais tarde. Se você quiser ser chato de novo.

<i>[Você pode encontrar morcegos gigantes em algumas cavernas profundas, mas pode ser mais fácil deixar outros morcegos-jogadores morderem você.]</i>"
"<i>Zhia Lian:</i> Good job taking them out before they bred! Because it turns out you CAN have too many flapskulls, as we learned in Chalice.": "<i>Zhia Lian:</i> Bom trabalho em tirá-los antes de procriarem! Porque acontece que você PODE ter muitos flapskulls, como aprendemos no Chalice."
"<i>Zhia Lian:</i> Good job with the necromancers. There's nothing I hate more than a trite invasion plan. And really, \"armies rising from the sewers\" is more of a Gulagra thing. Undead should be a little classier than that!": "<i>Zhia Lian:</i> Bom trabalho com os necromantes. Não há nada que eu odeie mais do que um plano de invasão banal. E realmente, “exércitos saindo dos esgotos” é mais uma coisa de Gulagra. Mortos-vivos deveriam ser um pouco mais elegantes do que isso!"
"<i>Zhia Lian:</i> Good job. I bet Lord Serbule will be sent back here as soon as Ilth notices he's returned to Chalice, but you bought us some time. And that's all mortality is anyway: borrowed time! So let's move on.": "<i>Zhia Lian:</i> Bom trabalho. Aposto que Lorde Serbule será enviado de volta para cá assim que Ilth perceber que ele voltou para Chalice, mas você nos deu algum tempo. E isso é tudo que a mortalidade é: tempo emprestado! Então vamos em frente."
"<i>Zhia Lian:</i> Good work! And here's a cure for that disease.": "<i>Zhia Lian:</i> Bom trabalho! E aqui está uma cura para essa doença."
"<i>Zhia Lian:</i> Good work! But I bet you can drink more!": "<i>Zhia Lian:</i> Bom trabalho! Mas aposto que você pode beber mais!"
"<i>Zhia Lian:</i> Good work! Here's the punch, plus the recipe. Drink up!": "<i>Zhia Lian:</i> Bom trabalho! Aqui está o ponche, mais a receita. Beba!"
"<i>Zhia Lian:</i> Good work. See, this is why I think that letting necromancers live was a mistake. Whenever a mortal necromancer dies, their undead creations can break free, and eventually some become super powerful. If all necromancers were liches, we wouldn't have that problem! But no, we can't change the nature of necromancy because Harukita says \"life is a precious source of hatred.\"

So how about just granting living necromancers eternal life? Nope: Kajich says all living things must fear the grave. So here we are, mopping up small problems instead of dealing with the fundamental issues.": "<i>Zhia Lian:</i> Bom trabalho. Veja, é por isso que acho que deixar os necromantes viverem foi um erro. Sempre que um necromante mortal morre, suas criações mortas-vivas podem se libertar e, eventualmente, algumas se tornam superpoderosas. Se todos os necromantes fossem liches, não teríamos esse problema! Mas não, não podemos mudar a natureza da necromancia porque Harukita diz que “a vida é uma fonte preciosa de ódio”.

Então, que tal apenas conceder vida eterna aos necromantes vivos? Não: Kajich diz que todas as coisas vivas devem temer o túmulo. Então aqui estamos, resolvendo pequenos problemas em vez de lidar com as questões fundamentais."
"<i>Zhia Lian:</i> Good work. You did a perfectly functional job of killing zombies. <i>Yawn</i> Let's move on to more interesting undead!": "<i>Zhia Lian:</i> Bom trabalho. Você fez um trabalho perfeitamente funcional matando zumbis. <i>Bocejo</i> Vamos passar para mortos-vivos mais interessantes!"
"<i>Zhia Lian:</i> Good. I hate ghouls. So gross.": "<i>Zhia Lian:</i> Ótimo. Eu odeio ghouls. Tão nojento."
"<i>Zhia Lian:</i> Good. Now let's go use them.": "<i>Zhia Lian:</i> Ótimo. Agora vamos usá-los."
"<i>Zhia Lian:</i> Great work. The party is moving forward and I made sure you're on the guest list!

Oh, hey, since only cult members can get into the party, and you're on the guest list, that means you must be in my cult now! Congratulations!

Remember: you'll need a mask to get into the party, since it's a masquerade. But I'm sure you can find one somewhere.": "<i>Zhia Lian:</i> Ótimo trabalho. A festa está avançando e eu me certifiquei de que você está na lista de convidados!

Ah, ei, já que apenas membros do culto podem entrar na festa, e você está na lista de convidados, isso significa que você deve estar no meu culto agora! Parabéns!

Lembre-se: você precisará de máscara para entrar na festa, já que se trata de um baile de máscaras. Mas tenho certeza que você pode encontrar um em algum lugar."
"<i>Zhia Lian:</i> Great! Enjoy that tasty... well, no... that kind-of-tasty homemade treat! You'll need your energy for all the undead-slaying you have to do!": "<i>Zhia Lian:</i> Ótimo! Aproveite aquela delícia... bem, não... aquela guloseima caseira meio gostosa! Você precisará de sua energia para toda a matança de mortos-vivos que tiver que fazer!"
"<i>Zhia Lian:</i> Great, you're definitely competent! That means you can help with a slightly awkward problem: a few thousand years ago, long before he died, Urtigal taught me how to make undead. And the first monsters I made were silly undead that can haunt plants. They're really tacky. I was just messing around!

Anyway, a bunch have escaped Chalice and they're infesting a pumpkin patch in Serbule Hills. Kill them before they do something that embarrasses me!": "<i>Zhia Lian:</i> Ótimo, você é definitivamente competente! Isso significa que você pode ajudar com um problema um pouco estranho: há alguns milhares de anos, muito antes de morrer, Urtigal me ensinou como criar mortos-vivos. E os primeiros monstros que criei eram mortos-vivos bobos que podem assombrar as plantas. Eles são realmente bregas. Eu estava apenas brincando!

De qualquer forma, um grupo escapou de Chalice e está infestando um canteiro de abóboras em Serbule Hills. Mate-os antes que façam algo que me envergonhe!"
"<i>Zhia Lian:</i> Grim. I have to say murder's not very whimsical. That's really my main complaint about it. But you did it well!": "<i>Zhia Lian:</i> Grim. Devo dizer que assassinato não é muito caprichoso. Essa é realmente minha principal reclamação sobre isso. Mas você fez bem!"
"<i>Zhia Lian:</i> Hah, your arms are so WRONG when you do that!

I loved your stupid little dance. Thank-you for performing it for me.": "<i>Zhia Lian:</i> Hah, seus braços ficam tão ERRADOS quando você faz isso!

Adorei sua dancinha estúpida. Obrigado por fazer isso para mim."
"<i>Zhia Lian:</i> Hahaha! Flap, bat, flap! You look absurd! I love it!": "<i>Zhia Lian:</i> Hahaha! Flap, morcego, flap! Você parece absurdo! Eu amo isso!"
"<i>Zhia Lian:</i> Here you go! Sew your stylish bat hat and wear it with pride! Just remember that you look absolutely ridiculous.": "<i>Zhia Lian:</i> Aqui está! Costure seu elegante chapéu de morcego e use-o com orgulho! Apenas lembre-se de que você parece absolutamente ridículo."
"<i>Zhia Lian:</i> Here you go! Sew your stylish bat hat and wear it with pride! Just remember that you look absolutely ridiculous. ": "<i>Zhia Lian:</i> Aqui está! Costure seu elegante chapéu de morcego e use-o com orgulho! Apenas lembre-se de que você parece absolutamente ridículo."
"<i>Zhia Lian:</i> Hey spider-buddy, why don't you try out your new body? It has sooo many disgusting powers. First, go fill tigers with your babies!": "<i>Zhia Lian:</i> Ei, amigo aranha, por que você não experimenta seu novo corpo? Tem tantos poderes nojentos. Primeiro, vá encher os tigres com seus bebês!"
"<i>Zhia Lian:</i> Hey, get this - there's supposedly a way to make pumpkin soup smell even weirder! Can you imagine? If you make a bowl, I want to see how it smells! I don't have the recipe, though; you'll have to find that first!": "<i>Zhia Lian:</i> Ei, veja só: supostamente existe uma maneira de deixar a sopa de abóbora com um cheiro ainda mais estranho! Você pode imaginar? Se você fizer uma tigela, quero ver como cheira! Mas não tenho a receita; você terá que encontrar isso primeiro!"
"<i>Zhia Lian:</i> Hey, I detect interference from my old friend Akhisa in the Serbule Crypt! Find the talking spider and set it free, then convince it to make you into a spider. It'll be fun! Trust me! You still have those allies handy from killing Ursula, right? Hmm, actually, you might need some better friends...

Oh hey. When you talk to the spider, remember to buy his special powers!

<i>[You must defeat dangerous Elite creatures to complete this quest. Recommended for a group of 5+ level 25 players.]</i>": "<i>Zhia Lian:</i> Ei, detectei interferência do meu velho amigo Akhisa na Cripta de Serbule! Encontre a aranha falante e liberte-a, depois convença-a a transformar você em uma aranha. Vai ser divertido! Confie em mim! Você ainda tem aqueles aliados à mão para matar Ursula, certo? Hmm, na verdade, você pode precisar de alguns amigos melhores...

Ah, ei. Ao falar com a aranha, lembre-se de comprar seus poderes especiais!

<i>[Você deve derrotar criaturas perigosas de Elite para completar esta missão. Recomendado para um grupo de 5+ jogadores de nível 25.]</i>"
"<i>Zhia Lian:</i> Hey, not bad! No, no, you keep it. I filled up on candy.": "<i>Zhia Lian:</i> Ei, nada mal! Não, não, você fica com ele. Eu me enchi de doces."
"<i>Zhia Lian:</i> Hm. It's not as scary as I hoped. Try this! I know it doesn't seem scary, but this color just fits you better.": "<i>Zhia Lian:</i> Hum. Não é tão assustador quanto eu esperava. Experimente isso! Eu sei que não parece assustador, mas essa cor combina melhor com você."
"<i>Zhia Lian:</i> Hopefully you aren't overloaded on sugar yet. We're just getting started!": "<i>Zhia Lian:</i> Espero que você ainda não esteja sobrecarregado de açúcar. Estamos apenas começando!"
"<i>Zhia Lian:</i> Hrm. Well, they're cute, but as far as sidekicks go, those rats don't seem very evil. They're just animals! I don't think the other Chalice gods would be excited about them. Let's move on.": "<i>Zhia Lian:</i> Hum. Bem, eles são fofos, mas no que diz respeito aos companheiros, esses ratos não parecem muito malvados. Eles são apenas animais! Não acho que os outros deuses do Cálice ficariam entusiasmados com eles. Vamos em frente."
"<i>Zhia Lian:</i> I can't tell you why, but you should go kill Barghests.

Okay you twisted my arm. The reason is Norala, goddess of Hunting. She's trying to take control of them and turn them into a new kind of werewolf!

Dreva would normally stop her, but Dreva is busy right now. So you go do it!": "<i>Zhia Lian:</i> Não sei dizer por quê, mas você deveria matar Barghests.

Ok, você torceu meu braço. O motivo é Norala, deusa da caça. Ela está tentando controlá-los e transformá-los em um novo tipo de lobisomem!

Dreva normalmente a impediria, mas Dreva está ocupada agora. Então você vai fazer isso!"
"<i>Zhia Lian:</i> I don't really understand why that's supposed to be special. I guess it felt nice when you slew a goat in my name, but it wasn't very whimsical! Next time I see Strekios, I'll ask what the deal is. I guess he doesn't technically have a cult, but his followers are creepy and terrified, so that's close enough.": "<i>Zhia Lian:</i> Eu realmente não entendo por que isso deveria ser especial. Acho que foi legal quando você matou uma cabra em meu nome, mas não foi muito caprichoso! Da próxima vez que eu vir Strekios, perguntarei qual é o problema. Acho que ele não tem tecnicamente um culto, mas seus seguidores são assustadores e aterrorizados, então isso é próximo o suficiente."
"<i>Zhia Lian:</i> I forsee a problem with my Goddess of Bats plan: striga! You know, those bat-people who act as servants for the crones? They're Imatia's favored people, and they look like bats. I think the best plan here is to go on the offense.

What I need you to do is start an undeniable rumor that giant bats hate and kill striga on sight. Do this by killing striga on sight!": "<i>Zhia Lian:</i> Prevejo um problema com meu plano da Deusa dos Morcegos: striga! Você sabe, aqueles morcegos que atuam como servos das velhas? Eles são o povo favorito de Imatia e parecem morcegos. Acho que o melhor plano aqui é partir para o ataque.

O que preciso que faças é espalhar um boato inegável de que os morcegos gigantes odeiam e matam a striga assim que os avistam. Faça isso matando a striga à primeira vista!"
"<i>Zhia Lian:</i> I guess it didn't look more absurd than usual. Okay, I'm still a fan of bats!

But I can only really have one symbolic animal association... I really need to see something impressive here.": "<i>Zhia Lian:</i> Acho que não parecia mais absurdo do que o normal. Ok, ainda sou fã de morcegos!

Mas só posso realmente ter uma associação simbólica de animais... Preciso mesmo ver algo impressionante aqui."
"<i>Zhia Lian:</i> I have a terrible dilemma: there are a bunch of mortals scheming to destroy your realm, and somebody needs to kill them. But I'm not an evil god, so I could never tell you to kill a mortal!

Hahaha just kidding. Go kill those mortals!": "<i>Zhia Lian:</i> Estou com um dilema terrível: há um bando de mortais planejando destruir seu reino e alguém precisa matá-los. Mas eu não sou um deus maligno, então nunca poderia dizer para você matar um mortal!

Hahaha, estou brincando. Vá matar esses mortais!"
"<i>Zhia Lian:</i> I heard Ilth Hale say that one of her favorite minions, Empusa, is hiding in Rahu, waiting to strike. You should get some friends and kill Empusa before it's too late! I'm not sure where she's hiding, but I remember something Ilth Hale said: \"Quoth the Ravens, Nevermore\". Maybe it's a pass-phrase or something.

<i>[Empusa is an encounter for a group of 5 players with level 60 combat skills.]</i>": "<i>Zhia Lian:</i> Ouvi Ilth Hale dizer que um de seus lacaios favoritos, Empusa, está escondido em Rahu, esperando para atacar. Você deveria reunir alguns amigos e matar Empusa antes que seja tarde demais! Não tenho certeza de onde ela está se escondendo, mas me lembro de algo que Ilth Hale disse: \"Quoth the Ravens, Nevermore\". Talvez seja uma senha ou algo assim.

<i>[Empusa é um encontro para um grupo de 5 jogadores com habilidades de combate nível 60.]</i>"
"<i>Zhia Lian:</i> I heard there's some kind of powerful haunting-skeleton in the Serbule Crypt. You should go kill it. I think it's called 'Ursula'. Oh, and you should bring some friends for this party, because Ursula has backup!

<i>[Ursula is a dangerous boss monster. Recommended for a group of 3+ level 15 players.]</i>": "<i>Zhia Lian:</i> Ouvi dizer que há algum tipo de esqueleto assustador e poderoso na Cripta de Serbule. Você deveria ir matá-lo. Acho que se chama 'Úrsula'. Ah, e você deveria trazer alguns amigos para essa festa, porque a Ursula tem reforços!

<i>[Ursula é um monstro chefe perigoso. Recomendado para um grupo de 3+ jogadores de nível 15.]</i>"
"<i>Zhia Lian:</i> I just had a good idea. You should learn necromancy! It will help you understand what we're fighting!

There's an old-fashioned altar to Harukita deep in the Serbule Crypt. Go pledge yourself to Harukita and we'll have some fun.

<i>[Reaching the altar requires a group of 3+ level 30 players.]</i>": "<i>Zhia Lian:</i> Tive uma boa ideia. Você deveria aprender necromancia! Isso ajudará você a entender contra o que estamos lutando!

Há um altar antiquado para Harukita nas profundezas da Cripta Serbule. Vá se comprometer com Harukita e nos divertiremos.

<i>[Alcançar o altar requer um grupo de 3+ jogadores de nível 30.]</i>"
"<i>Zhia Lian:</i> I need to know how great bats really are. Can you fly in a snowstorm? And how dangerous are you, really? Hmm... Let's find out: go kill polar bears as a bat!": "<i>Zhia Lian:</i> Preciso saber o quão incríveis os morcegos são. Você pode voar em uma tempestade de neve? E quão perigoso você é, realmente? Hmm... Vamos descobrir: vá matar ursos polares como um morcego!"
"<i>Zhia Lian:</i> I noticed a weird disturbance in the Eltibule graveyard. Go perform a normal cleansing ritual there and see if you can get whatever is there to come to the surface!

Then kill it. Obviously.": "<i>Zhia Lian:</i> Notei uma perturbação estranha no cemitério de Eltibule. Vá realizar um ritual de limpeza normal lá e veja se consegue fazer com que o que quer que esteja lá venha à tona!

Então mate-o. Obviamente."
"<i>Zhia Lian:</i> I overheard Ilth Hale say she was going to make some ghosts from people who died without being mourned. Help keep the world safe from ghosts by mourning other heroes' tombstones.": "<i>Zhia Lian:</i> Eu ouvi Ilth Hale dizer que ela iria fazer alguns fantasmas de pessoas que morreram sem serem lamentadas. Ajude a manter o mundo protegido de fantasmas lamentando as lápides de outros heróis."
"<i>Zhia Lian:</i> I think you killed enough of the little jerks to keep them from invading a town or anything else too drastic. The stragglers will probably eat a few people, but meh.

Hey, wanna see something funny? If you grow the seeds from those evil pumpkins, they explode! But fair warning: it hasn't been a very popular party trick for me.": "<i>Zhia Lian:</i> Acho que você matou idiotas suficientes para impedi-los de invadir uma cidade ou qualquer outra coisa muito drástica. Os retardatários provavelmente comerão algumas pessoas, mas meh.

Ei, quer ver algo engraçado? Se você cultivar as sementes daquelas abóboras malignas, elas explodirão! Mas um aviso justo: não tem sido um truque de festa muito popular para mim."
"<i>Zhia Lian:</i> I'm just a little worried that you're not prepared for the horrors you'll have to face. Some undead are VERY gross! You should practice getting sick. Try a wolfsbane bouquet. That will make you nice and sick.": "<i>Zhia Lian:</i> Só estou um pouco preocupado porque você não está preparado para os horrores que terá que enfrentar. Alguns mortos-vivos são MUITO nojentos! Você deveria praticar ficar doente. Experimente um buquê de acônito. Isso vai deixar você bem e doente."
"<i>Zhia Lian:</i> I'm sure that gave you some insights into fear! But if you ever have to face Kajich, don't be complacent: Kajich is literally the scariest thing you can imagine. Okay time for some more training! This is going well!": "<i>Zhia Lian:</i> Tenho certeza de que isso lhe deu algumas dicas sobre o medo! Mas se você tiver que enfrentar Kajich, não seja complacente: Kajich é literalmente a coisa mais assustadora que você pode imaginar. Ok, hora de mais um treinamento! Isso está indo bem!"
"<i>Zhia Lian:</i> I've located another envy pump. It's in Gazluk, in a cave. There are undead nearby. It's next to a pool of water.

This one doesn't seem especially dangerous to fight, but it has tremendous regenerative powers. Good luck.": "<i>Zhia Lian:</i> Localizei outra bomba de inveja. Está em Gazluk, em uma caverna. Existem mortos-vivos por perto. Está ao lado de uma piscina de água.

Este não parece especialmente perigoso de combater, mas tem tremendos poderes regenerativos. Boa sorte."
"<i>Zhia Lian:</i> If I'm going to be one of those creepy gods with their own cult, I want all the perks! I demand a midnight sacrifice! Atop a mountain!

<i>[To qualify as a sacrifice, you need to kill a goat in Gazluk between midnight and 1 am game-time.]</i>": "<i>Zhia Lian:</i> Se vou ser um daqueles deuses assustadores com seu próprio culto, quero todas as vantagens! Exijo um sacrifício à meia-noite! No topo de uma montanha!

<i>[Para se qualificar como sacrifício, você precisa matar uma cabra em Gazluk entre meia-noite e 1h do horário do jogo.]</i>"
"<i>Zhia Lian:</i> It looks like Norala is up to something. You know, the goddess of the Hunt? She created werewolves? Anyway, she's mobilizing them to attack someone. You'd better go and make your presence known before she starts a war. Wars are boring.": "<i>Zhia Lian:</i> Parece que Norala está tramando alguma coisa. Você sabe, a deusa da Caça? Ela criou lobisomens? De qualquer forma, ela os está mobilizando para atacar alguém. É melhor você ir e tornar sua presença conhecida antes que ela comece uma guerra. As guerras são chatas."
"<i>Zhia Lian:</i> It takes a brave adventurer to even sip from a Cauldron of Vile Thoughts. And you're clearly brave! But the heartiest adventurers can GUZZLE from the Cauldron, yielding more dramatic results. Are you Guzzle-Level Brave?": "<i>Zhia Lian:</i> É preciso ser um aventureiro corajoso para beber um gole de um Caldeirão de Pensamentos Viis. E você é claramente corajoso! Mas os aventureiros mais corajosos podem GUZZLE do Caldeirão, produzindo resultados mais dramáticos. Você é corajoso no nível Guzzle?"
"<i>Zhia Lian:</i> It's deathbat breeding season! Oh, you mortals call them flapskulls. That nickname makes Kajich so angry! They were supposed to be scary! But your nickname ruined it and he abandoned them. So I fixed up his creation: I gave them the ability to breed. It was a good idea given the situation at the time, I promise! But less good now. Anyway, they're showing up at night near a small lake in the Ilmari desert. They don't come out during the day, so you'll have to pull an all-nighter for this one.": "<i>Zhia Lian:</i> É época de reprodução dos morcegos mortais! Oh, vocês, mortais, os chamam de idiotas. Esse apelido deixa Kajich com muita raiva! Eles deveriam ser assustadores! Mas seu apelido estragou tudo e ele os abandonou. Então resolvi a criação dele: dei-lhes a capacidade de procriar. Foi uma boa ideia dada a situação da época, eu prometo! Mas menos bom agora. De qualquer forma, eles aparecem à noite perto de um pequeno lago no deserto de Ilmari. Eles não saem durante o dia, então você terá que passar a noite inteira para fazer isso."
"<i>Zhia Lian:</i> It's pumpkin-carving season! That's kinda whimsical, so I approve. You can get most of the ingredients you need by... yep: killing the undead.

Obtain a pumpkin from an undead fiend, as well as a recipe book for Jack O' Lanterns. Then carve it up! If you don't have a butcher knife, you can buy one in town, I'm sure.": "<i>Zhia Lian:</i> É época de esculpir abóboras! Isso é meio caprichoso, então eu aprovo. Você pode obter a maioria dos ingredientes necessários... sim: matando os mortos-vivos.

Obtenha uma abóbora de um demônio morto-vivo, bem como um livro de receitas para Jack O'Lanterns. Então divida! Se você não tem uma faca de açougueiro, pode comprar uma na cidade, tenho certeza."
"<i>Zhia Lian:</i> It's the time of year for candy. Lots of candy! And what's the best way to get free candy? Right, you guessed it: beating the crap out of the undead.

<i>[All undead, as well as some other creepy monsters, have a chance to drop candy as loot right now.]</i>": "<i>Zhia Lian:</i> É a época do ano dos doces. Muitos doces! E qual é a melhor maneira de ganhar doces grátis? Certo, você adivinhou: espancar os mortos-vivos.

<i>[Todos os mortos-vivos, assim como alguns outros monstros assustadores, têm a chance de deixar cair doces como saque agora.]</i>"
"<i>Zhia Lian:</i> Look, I'm sorry I made you kill murderpuppies. I know they seemed harmless, but I swear that they were about to get mind-controlled by Norala!

Well, that's a rumor I heard, anyway... and you put a stop to it!": "<i>Zhia Lian:</i> Olha, me desculpe por ter feito você matar filhotes assassinos. Eu sei que pareciam inofensivos, mas juro que estavam prestes a ser controlados mentalmente por Norala!

Bem, de qualquer maneira, foi um boato que ouvi... e você acabou com isso!"
"<i>Zhia Lian:</i> Mm, savor that aroma! Good work.": "<i>Zhia Lian:</i> Hum, saboreie esse aroma! Bom trabalho."
"<i>Zhia Lian:</i> More powerful spirits have been leaked onto your world. There's a very strong, very sad ghost in Povus. I can hear him shouting into the aether about his bar. You should summon him and then ... unsummon him. You're gonna need assistance for this one! I have no idea how he got so powerful!": "<i>Zhia Lian:</i> Espíritos mais poderosos vazaram para o seu mundo. Há um fantasma muito forte e muito triste em Povus. Posso ouvi-lo gritando alto sobre seu bar. Você deveria convocá-lo e então... cancelá-lo. Você vai precisar de ajuda para isso! Não tenho ideia de como ele ficou tão poderoso!"
"<i>Zhia Lian:</i> Mort's dead! Although realistically... he'll probably be alive again within a year. But at least he's not roaming free! You bought the orcs of Kur another year of life! That's worth something!": "<i>Zhia Lian:</i> Mort está morto! Embora seja realista... ele provavelmente estará vivo novamente dentro de um ano. Mas pelo menos ele não está vagando livremente! Você comprou mais um ano de vida para os orcs de Kur! Isso vale alguma coisa!"
"<i>Zhia Lian:</i> Most necromancers are loners. Which is sad, because the most amusing way to use necromancy is in large groups! Get a group together and murder dangerous creatures!

<i>[Killing any Elite over level 20 will count toward the completion of this quest so long as you have Necromancy active.]</i>": "<i>Zhia Lian:</i> A maioria dos necromantes são solitários. O que é triste, porque a forma mais divertida de usar a necromancia é em grupos grandes! Reúna um grupo e mate criaturas perigosas!

<i>[Matar qualquer Elite acima do nível 20 contará para a conclusão desta missão, desde que você tenha Necromancia ativa.]</i>"
"<i>Zhia Lian:</i> Mummies are another rare undead, because that quitter Ormorek refuses to make new ones. But there's still plenty left for you to kill, don't worry. Most mortals are terrified of them because they spread horrific diseases. But you aren't afraid, are you? Prove it by catching a mummy disease, then killing the fiends!

<i>[You can find mummies in a cave in Gazluk.]</i>": "<i>Zhia Lian:</i> As múmias são outros mortos-vivos raros, porque aquele desistente Ormorek se recusa a fazer novos. Mas ainda há muito para você matar, não se preocupe. A maioria dos mortais tem pavor deles porque espalham doenças horríveis. Mas você não está com medo, está? Prove isso pegando uma doença de múmia e depois matando os demônios!

<i>[Você pode encontrar múmias em uma caverna em Gazluk.]</i>"
"<i>Zhia Lian:</i> Neat! But... speaking with the dead doesn't seem as fun anymore, now that I've seen you do it. I guess it was worth seeing, though.

If you ever want to do that again, go ahead: I enchanted that stage to always resurrect corpses that say 'I am slain'. It was easier than resurrecting one specific mortal. Easier for me, I mean: whimsical things are easier than boring things!": "<i>Zhia Lian:</i> Legal! Mas... falar com os mortos não parece mais tão divertido, agora que vi você fazer isso. Acho que valeu a pena ver, no entanto.

Se você quiser fazer isso de novo, vá em frente: eu encantei aquele palco para sempre ressuscitar cadáveres que dizem 'Estou morto'. Foi mais fácil do que ressuscitar um mortal específico. Mais fácil para mim, quero dizer: coisas extravagantes são mais fáceis do que coisas chatas!"
"<i>Zhia Lian:</i> Next, you'd better go save Rahu from an uprising of undead. There's a bunch of necromancers deep in the sewers, and they're planning an invasion.": "<i>Zhia Lian:</i> Em seguida, é melhor você salvar Rahu de uma revolta de mortos-vivos. Há um bando de necromantes nos esgotos e eles estão planejando uma invasão."
"<i>Zhia Lian:</i> Nice job killing werewolves. That's really the only thing that Norala respects these days: killing power.

Now that Norala knows she isn't the only god making a play during this weird equinox thing, she'll be more careful, more manipulative, and way less boring. So good work!": "<i>Zhia Lian:</i> Bom trabalho matando lobisomens. Essa é realmente a única coisa que Norala respeita atualmente: o poder de matar.

Agora que Norala sabe que não é o único deus fazendo uma peça durante esse estranho equinócio, ela será mais cuidadosa, mais manipuladora e bem menos chata. Então, bom trabalho!"
"<i>Zhia Lian:</i> Nice job! You can place that pumpkin in town for others to appreciate! Or whatever. Let's move on.": "<i>Zhia Lian:</i> Bom trabalho! Você pode colocar aquela abóbora na cidade para que outras pessoas possam apreciar! Ou seja o que for. Vamos em frente."
"<i>Zhia Lian:</i> No, nevermind, these sound terrible.

What are we doing, messing around like this? There's important work to do!": "<i>Zhia Lian:</i> Não, deixa pra lá, isso parece terrível.

O que estamos fazendo, brincando assim? Há um trabalho importante a fazer!"
"<i>Zhia Lian:</i> Now those are fresh pumpkins! Hm, I guess I don't know why I wanted fresh pumpkins. Keep 'em.": "<i>Zhia Lian:</i> Essas são abóboras frescas! Hm, acho que não sei por que queria abóboras frescas. Fique com eles."
"<i>Zhia Lian:</i> Oh good! That jerk really made me look bad. I did ONE little favor for him by giving him free will. I hoped he'd become a funny skeleton juggler or something. But he immediately ran off and joined the fairies in a scheme to freeze our world in ice! That dick! Ilth Hale never stopped making fun of me about it. Thanks for taking care of the problem.": "<i>Zhia Lian:</i> Que bom! Aquele idiota realmente me fez ficar mal. Eu fiz UM pequeno favor para ele, dando-lhe livre arbítrio. Eu esperava que ele se tornasse um malabarista de esqueletos engraçado ou algo assim. Mas ele imediatamente fugiu e se juntou às fadas em um esquema para congelar o nosso mundo em gelo! Esse idiota! Ilth Hale nunca parou de zombar de mim por causa disso. Obrigado por cuidar do problema."
"<i>Zhia Lian:</i> Oh, good! I was pretty sure that Empusa was way, WAY more powerful than you. But I'm glad I was wrong!": "<i>Zhia Lian:</i> Ah, que bom! Eu tinha certeza de que Empusa era MUITO, MUITO mais poderosa que você. Mas estou feliz por estar errado!"
"<i>Zhia Lian:</i> Oh, hey, I just remembered something! There's this toady little necromancer named Mort. He's always been a favorite of Harukita. Last year, some heroes managed to trap him in a pocket dimension, then put the dimension in a magic jar and bury it in a cave! But Harukita just caused it to mysteriously reappear. It's just lying in the snow in Kur. Look for a campfire near a stream, close to an orc settlement.

And listen: Mort's technically alive, so killing him is murder. BUT! He was dead, and UN-dead, off and on, for like fifty years before he made some kind of pact with Harukita. So don't sweat the murder thing. He's evil.

<i>[Mortimer is an encounter for a group of players with level 50 combat skills.]</i>": "<i>Zhia Lian:</i> Ah, ei, acabei de me lembrar de uma coisa! Tem um necromante bajulador chamado Mort. Ele sempre foi o favorito de Harukita. No ano passado, alguns heróis conseguiram prendê-lo em uma dimensão de bolso, depois colocaram a dimensão em um jarro mágico e enterraram-na em uma caverna! Mas Harukita apenas fez com que ele reaparecesse misteriosamente. Está simplesmente deitado na neve em Kur. Procure uma fogueira perto de um riacho, perto de um assentamento orc.

E ouça: Mort está tecnicamente vivo, então matá-lo é assassinato. MAS! Ele esteve morto e morto pela ONU, intermitentemente, por cerca de cinquenta anos antes de fazer algum tipo de pacto com Harukita. Então não se preocupe com a coisa do assassinato. Ele é mau.

<i>[Mortimer é um encontro para um grupo de jogadores com habilidades de combate nível 50.]</i>"
"<i>Zhia Lian:</i> Oh, the disturbance was just a ghost? Well, it was shouting loudly into the aether -- loud enough for me to hear all the way over here. So it must have been especially sad. Good job removing it!": "<i>Zhia Lian:</i> Ah, a perturbação foi apenas um fantasma? Bem, ele estava gritando alto no éter – alto o suficiente para eu ouvir até aqui. Então deve ter sido especialmente triste. Bom trabalho removendo-o!"
"<i>Zhia Lian:</i> Okay this is another personal favor to me. This one's not even on the same mortal plane as you, but I just... I really hate him. He's such a dick!

There's this skeleton that got himself powered up with fairy magic. He lives in a junction between the fae realm and your realm. He's called the Bonfire Puck. You should kill him!

Oh, let me help you find him. It looks like there's an entrance from a little island called \"Sun Vale.\" You'll probably need some backup.

<i>[The Winter Nexus is recommended for a group of 3+ players with level 50 combat skills.]</i>": "<i>Zhia Lian:</i> Ok, este é outro favor pessoal para mim. Este aqui nem está no mesmo plano mortal que você, mas eu simplesmente... eu realmente o odeio. Ele é um idiota!

Tem um esqueleto que foi fortalecido com magia de fada. Ele vive em uma junção entre o reino das fadas e o seu reino. Ele é chamado de Bonfire Puck. Você deveria matá-lo!

Ah, deixe-me ajudá-lo a encontrá-lo. Parece que há uma entrada de uma pequena ilha chamada “Sun Vale”. Você provavelmente precisará de algum backup.

<i>[O Winter Nexus é recomendado para um grupo de mais de 3 jogadores com habilidades de combate de nível 50.]</i>"
"<i>Zhia Lian:</i> Okay this one is a personal favor to me. There's this yeti-infested cave in Kur Mountains where a particularly... problematic... ghoul named Maligno lives. He fancies himself a powerful undead. Show him that he's not!

<i>[The yeti cave is a soloable dungeon recommened for players with level 40+ combat skills.]</i>": "<i>Zhia Lian:</i> Ok, este é um favor pessoal para mim. Há uma caverna infestada de Yeti nas Montanhas Kur, onde vive um ghoul particularmente... problemático... chamado Maligno. Ele se considera um poderoso morto-vivo. Mostre a ele que ele não é!

<i>[A caverna do Yeti é uma masmorra solo recomendada para jogadores com habilidades de combate de nível 40 ou superior.]</i>"
"<i>Zhia Lian:</i> Okay, just asking you to fight \"skeletons\" was obviously silly. I should have specified: skeleton mages! The scary ones with the magic staves. Kill those.": "<i>Zhia Lian:</i> Ok, só pedir para você lutar contra \"esqueletos\" foi obviamente bobagem. Eu deveria ter especificado: magos esqueletos! Os assustadores com cajados mágicos. Mate aqueles."
"<i>Zhia Lian:</i> Okay, that's not bad! But... still not really impressive. Hmm... I've got it!": "<i>Zhia Lian:</i> Ok, isso não é ruim! Mas... ainda não é realmente impressionante. Hum... entendi!"
"<i>Zhia Lian:</i> On second thought, corpses are boring conversationalists. They never have anything new to say; they just talk about their lives and how they died and blah blah blah. Let's move on.": "<i>Zhia Lian:</i> Pensando bem, cadáveres são conversadores chatos. Eles nunca têm nada de novo a dizer; eles apenas falam sobre suas vidas e como morreram e blá, blá, blá. Vamos em frente."
"<i>Zhia Lian:</i> One of the most amusing things a necromancer can do is talk to corpses. Go try it! I think there's someone in nearby Eltibule that can teach you. Look for a goblin that doesn't attack on sight -- that'll be him.": "<i>Zhia Lian:</i> Uma das coisas mais divertidas que um necromante pode fazer é conversar com cadáveres. Vá experimentar! Acho que há alguém perto de Eltibule que pode lhe ensinar. Procure um goblin que não ataque à primeira vista - será ele."
"<i>Zhia Lian:</i> Problem taken care of? Great! Took you long enough. Let's move on to something more amusing!": "<i>Zhia Lian:</i> Problema resolvido? Ótimo! Demorou bastante. Vamos passar para algo mais divertido!"
"<i>Zhia Lian:</i> Pumpkin smoothies are delicious! I decree it, so if you don't like them you'd better get with the program. Collect all the ingredients and I'll give you the recipe! (If you don't already have it.)

<i>[Note: it requires Cooking 30 to make a pumpkin smoothie! But even if you don't have enough cooking skill yet, you can still complete this quest to learn the recipe for future use.]</i>": "<i>Zhia Lian:</i> Smoothies de abóbora são deliciosos! Eu decreto isso, então se você não gosta deles é melhor seguir o programa. Reúna todos os ingredientes e eu te darei a receita! (Se você ainda não o tiver.)

<i>[Nota: é necessário cozinhar 30 para fazer um smoothie de abóbora! Mas mesmo que você ainda não tenha habilidades culinárias suficientes, você ainda pode completar esta missão para aprender a receita para uso futuro.]</i>"
"<i>Zhia Lian:</i> Pumpkin Spice Tea is a good drink for sitting around and enjoying the season. But don't just sit around - that's boring! I want a drink that makes mortal blood pump faster! The very height of fall! Just bring me these ingredients and I'll make my own drink -- and teach you the recipe.": "<i>Zhia Lian:</i> Chá de abóbora com especiarias é uma boa bebida para sentar e aproveitar a estação. Mas não fique sentado - isso é chato! Quero uma bebida que faça o sangue mortal bombear mais rápido! A altura da queda! Basta me trazer esses ingredientes e eu farei minha própria bebida - e te ensinarei a receita."
"<i>Zhia Lian:</i> See, now aren't you happy you practiced holding your breath earlier? Those starfish were pretty deep! All my plans work out eventually. And when they work out, you win!

We're simpatico, you and me: I give you jobs and you do the jobs! This mind-invasion is working out so much better than usual!": "<i>Zhia Lian:</i> Veja, você não está feliz por ter praticado prender a respiração antes? Aquelas estrelas do mar eram bem profundas! Todos os meus planos eventualmente dão certo. E quando dão certo, você ganha!

Somos simpáticos, você e eu: eu te dou empregos e você faz os trabalhos! Essa invasão mental está funcionando muito melhor do que o normal!"
"<i>Zhia Lian:</i> See? Everybody loves pumpkin pie!": "<i>Zhia Lian:</i> Viu? Todo mundo adora torta de abóbora!"
"<i>Zhia Lian:</i> See? See?! Isn't having eight legs great? But a word of caution: you CAN go too far. Once I turned into a 48-legged spider, and that's too much. Stick with eight, it's easier to manage. You look great, by the way!": "<i>Zhia Lian:</i> Viu? Ver?! Ter oito pernas não é ótimo? Mas uma palavra de cautela: você PODE ir longe demais. Uma vez me transformei em uma aranha de 48 patas, e isso é demais. Fique com oito, é mais fácil de gerenciar. A propósito, você está ótima!"
"<i>Zhia Lian:</i> Since you're a spider now, you should care about the fate of your kin, right? I noticed a lot of ghostly spiders pouring out of a collapsed cave in the Ilmari  desert. You should help them find peace. Through violence.": "<i>Zhia Lian:</i> Já que você é uma aranha agora, você deveria se preocupar com o destino de seus parentes, certo? Notei muitas aranhas fantasmagóricas saindo de uma caverna desabada no deserto de Ilmari. Você deve ajudá-los a encontrar a paz. Através da violência."
"<i>Zhia Lian:</i> So did Brandon tell you about his friends that made stupid decisions with their lives and then suffered ENTIRELY REASONABLE consequences? Good! Because I stupidly promised I'd fix them for the big party. The thing is, I don't want to perform miracles at my cultists' party. It sends the wrong message, you know? This is a party, not a wishing club!

So I was thinking, maybe you could get them all fixed up BEFORE the party. Don't worry, this is going to work out great for you. I'll do the heavy lifting and you'll get all the glory!

This all needs to seem like your idea, so go talk to Brandon at the party site and ask him about the cultists. Then go talk to them and help 'em out.": "<i>Zhia Lian:</i> Brandon contou a você sobre seus amigos que tomaram decisões estúpidas em suas vidas e depois sofreram consequências TOTALMENTE RAZOÁVEIS? Bom! Porque eu estupidamente prometi que iria prepará-los para a grande festa. A questão é que não quero fazer milagres na festa dos meus cultistas. Isso passa a mensagem errada, sabe? Isto é uma festa, não um clube de desejos!

Então eu estava pensando, talvez você pudesse consertar tudo ANTES da festa. Não se preocupe, isso vai funcionar muito bem para você. Eu farei o trabalho pesado e você terá toda a glória!

Tudo isso precisa parecer ideia sua, então vá falar com Brandon no local da festa e pergunte sobre os cultistas. Então vá falar com eles e ajude-os."
"<i>Zhia Lian:</i> Sooo gross! Having a living thing growing inside of you is so disgusting! Let's move on to something less horrible.": "<i>Zhia Lian:</i> Tão nojento! Ter uma coisa viva crescendo dentro de você é tão nojento! Vamos passar para algo menos horrível."
"<i>Zhia Lian:</i> Thanks for helping me out. I made some whimsical proclamations yesterday about a naked warrior saving the day, and you helped me keep my word! Sometimes whimsy takes work! And you looked cute out there!

In fact, it didn't even seem that hard for you! I wonder...": "<i>Zhia Lian:</i> Obrigado por me ajudar. Ontem fiz algumas proclamações excêntricas sobre um guerreiro nu salvando o dia, e você me ajudou a cumprir minha palavra! Às vezes, capricho dá trabalho! E você estava fofo lá fora!

Na verdade, nem pareceu tão difícil para você! Eu me pergunto..."
"<i>Zhia Lian:</i> That idiot Harukita sent undead through the fae realm portal! He thinks he can gain a foothold there while the fairy courts are fighting. But he sent them to a plane controlled by Agrashab! And we all know what happens when Aggy gets Angry! You need to clear those undead out of there before Agrashab notices and launches a war on our world!

The skeletons will be hiding until nighttime, then they'll try to blend in among other monsters in the area. But since there's not supposed to be ANY skeletons in the fae realm, they should stand out!": "<i>Zhia Lian:</i> Aquele idiota do Harukita enviou mortos-vivos através do portal do reino fae! Ele acha que pode se firmar lá enquanto as cortes das fadas lutam. Mas ele os enviou para um avião controlado por Agrashab! E todos nós sabemos o que acontece quando Aggy fica com raiva! Você precisa expulsar esses mortos-vivos de lá antes que Agrashab perceba e lance uma guerra em nosso mundo!

Os esqueletos ficarão escondidos até a noite, então tentarão se misturar com outros monstros da área. Mas como não deveria haver NENHUM esqueleto no reino fae, eles deveriam se destacar!"
"<i>Zhia Lian:</i> That might do the trick! Let's watch over the next few months and see if people start talking about how fearsome giant bats are.

For now, let's get back to work defeating undead. You can stay a bat if you want! You're so much cuter!": "<i>Zhia Lian:</i> Isso pode resolver o problema! Vamos observar os próximos meses e ver se as pessoas começam a falar sobre como os morcegos gigantes são temíveis.

Por enquanto, vamos voltar ao trabalho derrotando mortos-vivos. Você pode continuar sendo um morcego se quiser! Você é muito mais fofo!"
"<i>Zhia Lian:</i> That seemed like it'd be scarier. In my head, I mean. Well, let's move on to scarier things!": "<i>Zhia Lian:</i> Parecia que seria mais assustador. Na minha cabeça, quero dizer. Bem, vamos passar para coisas mais assustadoras!"
"<i>Zhia Lian:</i> That was great! You used cunning to overcome your lack of equipment! I'm pretty impressed.

But I've grown unenamored of your gross mortal body. Get dressed! We have serious work to do!": "<i>Zhia Lian:</i> Isso foi ótimo! Você usou astúcia para superar sua falta de equipamento! Estou bastante impressionado.

Mas deixei de me apaixonar pelo seu corpo mortal grosseiro. Vista-se! Temos um trabalho sério a fazer!"
"<i>Zhia Lian:</i> That wasn't funny at all! It was just gross. What a disappointment. Let's do something less cruel and disgusting next!": "<i>Zhia Lian:</i> Isso não foi nada engraçado! Foi simplesmente nojento. Que decepção. Vamos fazer algo menos cruel e nojento a seguir!"
"<i>Zhia Lian:</i> The next envy pump is in a cave deep beneath Rahu. Use the sewers to reach that cave, and as always, bring friends: this heart is even stronger than the last.": "<i>Zhia Lian:</i> A próxima bomba de inveja está em uma caverna nas profundezas de Rahu. Use os esgotos para chegar àquela caverna e, como sempre, traga amigos: esse coração é ainda mais forte que o anterior."
"<i>Zhia Lian:</i> The next one is... Wait... I think you did it! They're all gone! Tuvillus is going to be SO angry! Wow, you really should have thought about that: you're on his shit-list for sure now! But some mortals would consider that a badge of honor.

By stopping the envy-pumps, you've saved a lot of lives. Or at least a lot of relationships. Great work!": "<i>Zhia Lian:</i> O próximo é... Espere... Acho que você conseguiu! Todos eles se foram! Tuvillus vai ficar MUITO bravo! Uau, você realmente deveria ter pensado nisso: você está na lista de merda dele com certeza agora! Mas alguns mortais considerariam isso uma medalha de honra.

Ao parar as bombas de inveja, você salvou muitas vidas. Ou pelo menos muitos relacionamentos. Ótimo trabalho!"
"<i>Zhia Lian:</i> The next pair of giant lungs are in the sewer under Rahu. There's a lot of weird stuff in that sewer! Let's see... you want to go down a bunch of floors. The lungs are near a really big spider.": "<i>Zhia Lian:</i> O próximo par de pulmões gigantes está no esgoto sob Rahu. Tem muita coisa estranha naquele esgoto! Vamos ver... você quer descer vários andares. Os pulmões estão perto de uma aranha muito grande."
"<i>Zhia Lian:</i> The ratkin necromancers underneath Rahu have been breeding high-quality necro rats. Very cute! They can act as your sidekick, helping you focus necromantic energy. Go find one and fight with it!": "<i>Zhia Lian:</i> Os necromantes ratkin abaixo de Rahu têm criado ratos necro de alta qualidade. Muito bonitinho! Eles podem atuar como seus companheiros, ajudando você a concentrar a energia necromântica. Vá encontrar um e lute com ele!"
"<i>Zhia Lian:</i> The second giant heart thing is in Kur. I see a ruined tower, and underneath it is a necromancer. He's got minions guarding the heart.": "<i>Zhia Lian:</i> O segundo coração gigante está em Kur. Vejo uma torre em ruínas e embaixo dela está um necromante. Ele tem lacaios guardando o coração."
"<i>Zhia Lian:</i> The third pair of giant lungs are under Povus. You want to look for a mountain-sized mushroom, and then find a way to go UNDER it. Go deep underground until you hit tunnels full of goblins. The lungs are down there.": "<i>Zhia Lian:</i> O terceiro par de pulmões gigantes está sob Povus. Você quer procurar um cogumelo do tamanho de uma montanha e então encontrar uma maneira de passar por baixo dele. Vá fundo no subsolo até chegar a túneis cheios de goblins. Os pulmões estão lá embaixo."
"<i>Zhia Lian:</i> The undead are extra active right now, so you need to slay them! Start by killing skeletons. You can find them in a graveyard. Or lots of other places, really.

Oh, and if you're freaked out about murder, don't worry: it doesn't count as murder when you kill the undead! You can trust me. I'm a god.": "<i>Zhia Lian:</i> Os mortos-vivos estão extremamente ativos agora, então você precisa matá-los! Comece matando esqueletos. Você pode encontrá-los em um cemitério. Ou muitos outros lugares, na verdade.

Ah, e se você está assustado com o assassinato, não se preocupe: não conta como assassinato quando você mata mortos-vivos! Você pode confiar em mim. Eu sou um deus."
"<i>Zhia Lian:</i> There's a swampy place called Povus where necromancers have just let their minions go free! That's dangerous!

Hey, I have a special request for this one, can you kill them with swords? Strap lots of swords all over your body, too. Just stick 'em everywhere. I want you to be a horrific ball of swords and death!": "<i>Zhia Lian:</i> Há um lugar pantanoso chamado Povus onde os necromantes acabaram de libertar seus lacaios! Isso é perigoso!

Ei, eu tenho um pedido especial para este, você pode matá-los com espadas? Amarre muitas espadas por todo o corpo também. Basta colá-los em todos os lugares. Eu quero que você seja uma horrível bola de espadas e morte!"
"<i>Zhia Lian:</i> There's a tomb near you called Borghild. I happen to know that it's home to some terrifying Faces of Death. You should gather your fellow heroes or whatever, then go destroy them!

<i>[Borghild is recommended for a group of 3+ level 30-40 players. You can also find Faces of Death in a few other locations -- those count too!]</i>": "<i>Zhia Lian:</i> Há uma tumba perto de você chamada Borghild. Acontece que sei que é o lar de algumas Faces da Morte aterrorizantes. Você deveria reunir seus companheiros heróis ou algo assim, e então destruí-los!

<i>[Borghild é recomendado para um grupo de 3+ jogadores de nível 30-40. Você também pode encontrar Faces of Death em alguns outros locais – esses também contam!]</i>"
"<i>Zhia Lian:</i> There's another envy pump in Gazluk! This one's underneath Gazluk Keep. There are orcish necromancers tending to it.

Remember to bring some friends. This looks hard.": "<i>Zhia Lian:</i> Há outra bomba de inveja em Gazluk! Este está embaixo do Forte Gazluk. Existem necromantes orcs cuidando disso.

Lembre-se de trazer alguns amigos. Isso parece difícil."
"<i>Zhia Lian:</i> There's been a terrible disaster that is vaguely related to me. It seems I didn't know enough frog biology. I thought I was helping! But nevermind the details. There are some pretty dangerous frogs in Povus and you should kill them for me!

But one more thing, and I can't stress this part enough: you need to be naked when you do it. No shirt, no pants, no gloves! But you can wear, like, a hat. And shoes, obviously.": "<i>Zhia Lian:</i> Houve um desastre terrível que está vagamente relacionado a mim. Parece que eu não sabia o suficiente sobre biologia de sapos. Achei que estava ajudando! Mas esqueça os detalhes. Existem alguns sapos muito perigosos em Povus e você deveria matá-los para mim!

Mas mais uma coisa, e não consigo enfatizar o suficiente essa parte: você precisa estar nu quando fizer isso. Sem camisa, sem calças, sem luvas! Mas você pode usar um chapéu. E sapatos, obviamente."
"<i>Zhia Lian:</i> There's lots of other dangerous undead out there. Take your little war band and go find them!

<i>[Undead of any type or level will work, as long as they are Elite. Elite undead typically require a group of 3+ players.]</i>": "<i>Zhia Lian:</i> Há muitos outros mortos-vivos perigosos por aí. Pegue seu pequeno bando de guerra e vá encontrá-los!

<i>[Mortos-vivos de qualquer tipo ou nível funcionarão, desde que sejam Elite. Mortos-vivos de elite normalmente exigem um grupo de mais de 3 jogadores.]</i>"
"<i>Zhia Lian:</i> This is weird... those skeletons you killed were remnants of REALLY old creatures. Older than me, even! What could the goblins have wanted with them?!

Well, I guess we won't have to find out now, thanks to you!": "<i>Zhia Lian:</i> Isso é estranho... aqueles esqueletos que você matou eram restos de criaturas MUITO antigas. Mais velho que eu, até! O que os goblins poderiam querer com eles?!

Bem, acho que não teremos que descobrir agora, graças a você!"
"<i>Zhia Lian:</i> This next one's embarrassing. For Kajich, I mean! He's the god of fear, but half his monsters are funny, not scary! Kajich saw Tuvillus's heart-shaped jealousy pumps, and tried to one-up his brother with lung-shaped fear pumps. Can you go put these stupid things down before word gets out about how silly they look?

But do be careful: they may not look scary, but you should be scared anyway. You'll need friends.

The first pair of giant lungs are in Eltibule, deep underground. I see chambers full of magical darkness, and beneath that darkness is a cave.

The lungs are in that cave. They're hidden behind an illusory rock, but you should be able to hear the breathing when you get close.": "<i>Zhia Lian:</i> Este próximo é constrangedor. Para Kajich, quero dizer! Ele é o deus do medo, mas metade dos seus monstros são engraçados, não assustadores! Kajich viu as bombas de ciúme em forma de coração de Tuvillus e tentou superar seu irmão com bombas de medo em forma de pulmão. Você pode largar essas coisas estúpidas antes que se espalhe a notícia de como elas parecem bobas?

Mas tenha cuidado: eles podem não parecer assustadores, mas você deveria estar assustado de qualquer maneira. Você precisará de amigos.

O primeiro par de pulmões gigantes está em Eltibule, nas profundezas do subsolo. Vejo câmaras cheias de escuridão mágica, e abaixo dessa escuridão há uma caverna.

Os pulmões estão naquela caverna. Eles estão escondidos atrás de uma rocha ilusória, mas você poderá ouvir a respiração quando chegar perto."
"<i>Zhia Lian:</i> Those old illegal Harukita altars are great: they just dump knowledge right into your brain, no learning required, and no sacrifices needed either! But did you notice that your hatred has become fuzzier and less specific? You're gonna have to hate more explicitly from now on, because Harukita is tapping your subconscious emotions to power himself.

Oh, come on, it's no big deal. In time you'll learn to hate again. Most necromancers eventually become incredible assholes, so don't worry about it! Let's go have some necrofun!": "<i>Zhia Lian:</i> Aqueles velhos altares Harukita ilegais são ótimos: eles simplesmente despejam conhecimento direto em seu cérebro, sem necessidade de aprendizado e sem necessidade de sacrifícios! Mas você notou que seu ódio se tornou mais confuso e menos específico? Você terá que odiar mais explicitamente de agora em diante, porque Harukita está explorando suas emoções subconscientes para se fortalecer.

Ah, vamos lá, não é grande coisa. Com o tempo você aprenderá a odiar novamente. A maioria dos necromantes eventualmente se tornam idiotas incríveis, então não se preocupe com isso! Vamos nos divertir um pouco!"
"<i>Zhia Lian:</i> Those were tiny-boned skeletons. You should try some BIG skeletons! I found some really impressive skeletal beasts in Povus. Goblins are making them! Go put a stop to it! And maybe bring some friends! These are big!": "<i>Zhia Lian:</i> Eram esqueletos de ossos minúsculos. Você deveria experimentar alguns esqueletos GRANDES! Encontrei algumas feras esqueléticas realmente impressionantes em Povus. Goblins estão fazendo isso! Vá parar com isso! E talvez traga alguns amigos! Estes são grandes!"
"<i>Zhia Lian:</i> Ugh, undeath is creeping into the sea, too. There are undead starfish in the reefs! They burn you when you touch them. So fun! But evil. Very evil. So go get rid of those before mortals get hurt!": "<i>Zhia Lian:</i> Ugh, os mortos-vivos também estão se infiltrando no mar. Existem estrelas do mar mortas-vivas nos recifes! Eles queimam você quando você os toca. Tão divertido! Mas mal. Muito malvado. Então vá se livrar deles antes que os mortais se machuquem!"
"<i>Zhia Lian:</i> Wait, don't put your pants, gloves, and shirt back on yet! This is the last nude fighting I'll ask you of you, so make it entertaining!

There's this rude scion of Enoyos in Povus who's said some pretty unwise things about a certain god of whimsy. Why don't you kill him while nude! He's been magically empowered by Enoyos, so you might need some nude friends. Do you have nude friends? Look at you, of course you do!": "<i>Zhia Lian:</i> Espere, não coloque as calças, luvas e camisa ainda! Esta é a última luta nua que vou pedir, então torne-a divertida!

Há um descendente rude de Enoyos em Povus que disse algumas coisas bastante imprudentes sobre um certo deus da extravagância. Por que você não o mata enquanto está nu! Ele foi magicamente fortalecido por Enoyos, então você pode precisar de alguns amigos nus. Você tem amigos nus? Olhe para você, claro que sim!"
"<i>Zhia Lian:</i> Was that tougher? It still seemed like it was too easy for you. We should try one more! And I do have to admit, it's fun to watch your butt wiggle while you fight!": "<i>Zhia Lian:</i> Foi mais difícil? Ainda parecia que era muito fácil para você. Devíamos tentar mais um! E eu tenho que admitir, é divertido ver sua bunda se mexendo enquanto você luta!"
"<i>Zhia Lian:</i> Watching you, I think I see why most necromancers are loners: the smell of corpses is pretty offputting. But I have a fix for that! Here. You should dab a bit of that on. Now let's go, we have more things to do tonight!": "<i>Zhia Lian:</i> Observando você, acho que entendo por que a maioria dos necromantes são solitários: o cheiro de cadáveres é bastante desagradável. Mas eu tenho uma solução para isso! Aqui. Você deveria aplicar um pouco disso. Agora vamos lá, temos mais coisas para fazer esta noite!"
"<i>Zhia Lian:</i> We need to show everyone that bats are terrifying predators! Let's see, what's the scariest flying thing around right now? I guess it's those Winter Court fairies. Yeah, this will work! Go and drink their blood!": "<i>Zhia Lian:</i> Precisamos mostrar a todos que os morcegos são predadores terríveis! Vamos ver, qual é a coisa voadora mais assustadora do momento? Acho que são aquelas fadas da Corte Winter. Sim, isso vai funcionar! Vá e beba o sangue deles!"
"<i>Zhia Lian:</i> Well... we're not under attack by a vengeful Fae god... so far. A decent night's work, I'd say!": "<i>Zhia Lian:</i> Bem... não estamos sob ataque de um deus Fae vingativo... até agora. Uma noite de trabalho decente, eu diria!"
"<i>Zhia Lian:</i> Who doesn't love a candied apple when the weather turns cool? Don't answer that. It's not important. What's important is that you make a candied apple from scratch! It's easy! I've already injected the recipe into your brain! Just go make one!": "<i>Zhia Lian:</i> Quem não gosta de uma maçã cristalizada quando o tempo esfria? Não responda isso. Não é importante. O importante é que você faça uma maçã cristalizada do zero! É fácil! Já injetei a receita no seu cérebro! Vá fazer um!"
"<i>Zhia Lian:</i> Whoa. That does smell weird and interesting, but... you realize it's poisonous, right? I'll pass. But thanks.": "<i>Zhia Lian:</i> Uau. Isso tem um cheiro estranho e interessante, mas... você percebe que é venenoso, certo? Eu vou passar. Mas obrigado."
"<i>Zhia Lian:</i> Wow! Good work! Okay, enough drinking things.": "<i>Zhia Lian:</i> Uau! Bom trabalho! Ok, chega de beber."
"<i>Zhia Lian:</i> Yeah. I'm thinking maybe being Goddess of Bats would be fun. I'll talk to some of the other gods about it. Thanks for the help, and remember to spread rumors that bats hate striga!

But... just to be clear, you don't actually need to hunt striga for me. I mean, they're sentient, and most of them are bookworms. They work as scribes, and they're already pretty afraid of giant bats. So just keep them on their toes, but don't overdo it. Otherwise my plan will backfire!

Our pro-bat public relations scheme is going well, but there's more to do...": "<i>Zhia Lian:</i> Sim. Estou pensando que talvez ser a Deusa dos Morcegos seria divertido. Falarei com alguns dos outros deuses sobre isso. Obrigado pela ajuda e lembre-se de espalhar boatos de que os morcegos odeiam a striga!

Mas... só para ficar claro, você não precisa caçar striga para mim. Quero dizer, eles são sencientes, e a maioria deles são leitores ávidos. Eles trabalham como escribas e já têm muito medo de morcegos gigantes. Portanto, mantenha-os alerta, mas não exagere. Caso contrário, meu plano sairá pela culatra!

Nosso esquema de relações públicas pró-morcego está indo bem, mas há mais a fazer..."
"<i>Zhia Lian:</i> You did it! And it smells just as weird as I figured it would. Well, there's a nice hearty meal for you! I hope you like it better than I do.": "<i>Zhia Lian:</i> Você conseguiu! E tem um cheiro tão estranho quanto imaginei. Bem, há uma boa refeição saudável para você! Espero que você goste mais do que eu."
"<i>Zhia Lian:</i> You faced death! Sorry.": "<i>Zhia Lian:</i> Você enfrentou a morte! Desculpe."
"<i>Zhia Lian:</i> You have a lot of undead-bashing to do, and you should do it with a little more style. Make some nice orange dye. It's the scariest!": "<i>Zhia Lian:</i> Você tem muito que atacar os mortos-vivos e deveria fazê-lo com um pouco mais de estilo. Faça uma bela tintura laranja. É o mais assustador!"
"<i>Zhia Lian:</i> You killed Anhinda? Now that IS impressive! Nice going!": "<i>Zhia Lian:</i> Você matou Anhinda? Isso é impressionante! Boa viagem!"
"<i>Zhia Lian:</i> You killed Ursula too, just like that? Well, I guess you really can kill skeletons, huh? Okay! Let's move on to bigger prey!": "<i>Zhia Lian:</i> Você matou Ursula também, sem mais nem menos? Bem, acho que você realmente pode matar esqueletos, hein? OK! Vamos passar para presas maiores!"
"<i>Zhia Lian:</i> You know how Kajich hates Tast? Because of the... nevermind. Not important. Anyway, listen: there's a very dangerous semi-undead hag underneath an orcish city called Gazluk Keep. She's sleeping in a coffin inside a hidden room. That should be easy enough to find, right? Get a bunch of friends, and find this hag before she awakens and takes over the whole keep!

<i>[Gazluk Keep is a dungeon for a group of 5 players with level 70 combat skills.]</i>": "<i>Zhia Lian:</i> Você sabe como Kajich odeia Tast? Por causa do... deixa pra lá. Não é importante. De qualquer forma, ouça: há uma bruxa semi-morta-viva muito perigosa embaixo de uma cidade orc chamada Fortaleza Gazluk. Ela está dormindo em um caixão dentro de um quarto escondido. Isso deve ser fácil de encontrar, certo? Reúna um monte de amigos e encontre essa bruxa antes que ela acorde e tome conta de todo o castelo!

<i>[Gazluk Keep é uma masmorra para um grupo de 5 jogadores com habilidades de combate de nível 70.]</i>"
"<i>Zhia Lian:</i> You know my favorite instrument? It's those high-pitched tambourines that ratkin use. Let's collect some. I have an idea!": "<i>Zhia Lian:</i> Você conhece meu instrumento favorito? São aqueles pandeiros agudos que os ratkin usam. Vamos coletar alguns. Eu tenho uma ideia!"
"<i>Zhia Lian:</i> You know what else makes a great warm meal during the autumn months? It's not pumpkin salad! But it makes a refreshing cold meal, so there's that. I'll share the recipe with you if you make one for me.": "<i>Zhia Lian:</i> Você sabe o que mais faz uma excelente refeição quente durante os meses de outono? Não é salada de abóbora! Mas é uma refeição fria refrescante, então é isso. Vou compartilhar a receita com você se você fizer uma para mim."
"<i>Zhia Lian:</i> You know what makes a great warm meal during the autumn months? Pumpkin soup! ... But I'm not sure I believe that. Here's the recipe, if you don't already know it. Now make me some soup!": "<i>Zhia Lian:</i> Você sabe o que é uma ótima refeição quente durante os meses de outono? Sopa de abóbora! ... Mas não tenho certeza se acredito nisso. Aqui está a receita, caso ainda não a conheça. Agora me faça uma sopa!"
"<i>Zhia Lian:</i> You know what we don't see enough of? Dancing skeletons! If you're ever a skeleton, would you dance for me?": "<i>Zhia Lian:</i> Você sabe o que não vemos o suficiente? Esqueletos dançantes! Se você fosse um esqueleto, você dançaria para mim?"
"<i>Zhia Lian:</i> You know what would go great with wings and a hideous face? A stylish hat! Bring me some supplies and I'll teach you the recipe so you can make your own. Fashionable!

<i>[Note: it requires Tailoring 30 to make a hat for a bat! But even if you don't have enough tailoring skill yet, you can still complete this quest to learn the recipe for future use.]</i>": "<i>Zhia Lian:</i> Você sabe o que combinaria bem com asas e um rosto horrível? Um chapéu estiloso! Traga-me alguns suprimentos e eu lhe ensinarei a receita para que você possa fazer a sua própria. Elegante!

<i>[Nota: é necessário Alfaiataria 30 para fazer um chapéu para um morcego! Mas mesmo que você ainda não tenha habilidade suficiente em alfaiataria, você ainda pode completar esta missão para aprender a receita para uso futuro.]</i>"
"<i>Zhia Lian:</i> You know what you need? A drink from a Cauldron of Vile Thoughts. Alchemists can obtain the recipe from the undead. Find somebody willing to share their Cauldron, and sip! But be ready for anything.": "<i>Zhia Lian:</i> Você sabe do que precisa? Uma bebida de um Caldeirão de Pensamentos Viis. Os alquimistas podem obter a receita dos mortos-vivos. Encontre alguém disposto a compartilhar seu Caldeirão e saboreie! Mas esteja pronto para qualquer coisa."
"<i>Zhia Lian:</i> You know, you're gonna get sick if you eat all of that candy. But candy is great, so what are you gonna do, right? Here: it's a recipe for a new healthier candy I just invented!": "<i>Zhia Lian:</i> Sabe, você vai ficar doente se comer todos esses doces. Mas doce é ótimo, então o que você vai fazer, certo? Aqui: está a receita de um novo doce mais saudável que acabei de inventar!"
"<i>Zhia Lian:</i> You look pretty bad. Like, maybe you should seek medical care? Hmm, I didn't think this plan through very well.

Sigh... Drink this, and walk it off! We've got work to do!": "<i>Zhia Lian:</i> Você parece muito mal. Tipo, talvez você devesse procurar atendimento médico? Hmm, não pensei muito bem nesse plano.

Suspiro... Beba isso e vá embora! Temos trabalho a fazer!"
"<i>Zhia Lian:</i> You should convince people to give you more candy! Or take it! MORE! The harvest is in, and it's time for greed! Show me 20 candies!": "<i>Zhia Lian:</i> Você deveria convencer as pessoas a lhe darem mais doces! Ou pegue! MAIS! A colheita chegou e é hora da ganância! Mostre-me 20 doces!"
"<i>Zhia Lian:</i> You should definitely kill some zombies. Let me look... I see some zombies in a cave in Serbule. There's lots of ... walking brain monsters. Weird. Oh! I found a bigger collection of them. They're in a dungeon underneath a tower in Kur. Go go go!": "<i>Zhia Lian:</i> Você definitivamente deveria matar alguns zumbis. Deixe-me ver... Vejo alguns zumbis em uma caverna em Serbule. Há muitos... monstros cerebrais ambulantes. Esquisito. Oh! Encontrei uma coleção maior deles. Eles estão em uma masmorra embaixo de uma torre em Kur. Vai! Vai! Vai!"
"<i>Zhia Lian:</i> You should get some practice terrifying mortals. It will help you understand how to survive a meeting with Kajich, the god of Fear.

<i>[Any Fear ability will advance this quest, if used on a sentient opponent.]</i>": "<i>Zhia Lian:</i> Você deveria praticar um pouco de aterrorizar mortais. Isso o ajudará a entender como sobreviver a um encontro com Kajich, o deus do Medo.

<i>[Qualquer habilidade de Medo avançará esta missão, se usada em um oponente senciente.]</i>"
"<i>Zhia Lian:</i> You should understand your enemy better. I think you should drink from the foul undead concoction known as the Gruesome Spooky Punch. Normally only an alchemist could make the stuff, but if you collect the ingredients, I'll mix you up a batch... plus you'll get the recipe, so you can make more later.": "<i>Zhia Lian:</i> Você deveria entender melhor seu inimigo. Acho que você deveria beber da mistura nojenta de mortos-vivos conhecida como Gruesome Spooky Punch. Normalmente, apenas um alquimista poderia fazer o material, mas se você coletar os ingredientes, eu prepararei um lote para você... e você receberá a receita, para poder fazer mais depois."
"<i>Zhia Lian:</i> You showed Maligno who's boss! That traitor! Now let's move on to even more serious threats.": "<i>Zhia Lian:</i> Você mostrou ao Maligno quem manda! Esse traidor! Agora vamos passar para ameaças ainda mais sérias."
"<i>Zhia Lian:</i> You weren't even scared at all! Not very fun to watch! But hey, good work and all that.": "<i>Zhia Lian:</i> Você nem estava com medo! Não é muito divertido de assistir! Mas ei, bom trabalho e tudo mais."
"<i>Zhia Lian:</i> You're going up against Kajich's undead incarnations of fear. You need training. Let's do scary things! Drowning is scary, right? Hmm...

Go kill things while fully submerged in water. That will be nice and scary.": "<i>Zhia Lian:</i> Você está enfrentando as encarnações do medo dos mortos-vivos de Kajich. Você precisa de treinamento. Vamos fazer coisas assustadoras! Afogar-se é assustador, certo? Hum...

Vá matar coisas enquanto estiver totalmente submerso na água. Isso será bom e assustador."
"<i>Zhia Lian:</i> You're so cute as a bat, I love it! So bizarre! But in a whimsical way. If bats need a patron god, I'm on it! Hey... You know, maybe I could actually get that job. Hmmm... but do I even really <i>want</i> that job?

Well, what do I know about bats? They hate bugs, right? Go check that idea: eat some size-appropriate wasps. Tell me how they taste.": "<i>Zhia Lian:</i> Você é tão fofo quanto um morcego, adorei! Tão bizarro! Mas de uma forma caprichosa. Se os morcegos precisam de um deus patrono, estou nisso! Ei... Você sabe, talvez eu pudesse conseguir esse emprego. Hmmm... mas será que eu realmente <i>quero</i> esse emprego?

Bem, o que eu sei sobre morcegos? Eles odeiam insetos, certo? Confira essa ideia: coma algumas vespas de tamanho adequado. Diga-me qual é o gosto deles."
"<i>Zhia Lian:</i> You're very compassionate! I understand that's a good thing.": "<i>Zhia Lian:</i> Você é muito compassivo! Eu entendo que isso é uma coisa boa."
"<i>Zhia Lian:</i> You've been so helpful that I want to repay you with an amazing party! You just need to help get things prepared. Okay, actually this one might be a bit involved... see, it's a cult party. For my cult. Oh, it's fine, don't worry, it's not a murderous cult. It's a party cult! Or at least it will be.

Now you have to promise not to say ONE WORD about how I'm talking into your head. Got it? As far as most people know, Zhia Lian does not like to talk directly into peoples' minds. It's extra work for me, and I'm sure as hell not gonna bother for people like these cultists. Don't make my life harder!

If people ask why you're helping me, tell them I met you in person and you owe me a favor. Make up whatever details you want! Maybe we were arm wrestling and you lost. I really don't care.

Anyway: there's a human named Brandon who needs help making the big party happen. He's in a hamlet in the Ilmari desert. Go help him!": "<i>Zhia Lian:</i> Você foi tão prestativo que quero retribuir com uma festa incrível! Você só precisa ajudar a preparar as coisas. Ok, na verdade esta pode ser um pouco complicada... veja, é uma festa de culto. Para o meu culto. Ah, está tudo bem, não se preocupe, não é um culto assassino. É um culto de festa! Ou pelo menos será.

Agora você tem que prometer não dizer UMA PALAVRA sobre como estou falando na sua cabeça. Entendi? Pelo que a maioria das pessoas sabe, Zhia Lian não gosta de falar diretamente na mente das pessoas. É um trabalho extra para mim, e tenho certeza que não vou me preocupar com pessoas como esses cultistas. Não torne minha vida mais difícil!

Se as pessoas perguntarem por que você está me ajudando, diga que conheci você pessoalmente e que você me deve um favor. Invente os detalhes que quiser! Talvez estivéssemos lutando uma queda de braço e você perdeu. Eu realmente não me importo.

Enfim: há um humano chamado Brandon que precisa de ajuda para fazer a grande festa acontecer. Ele está numa aldeia no deserto de Ilmari. Vá ajudá-lo!"
"<i>Zhia Lian:</i> You've faced ghosts, but can you face the most dangerous ghost in Serbule... Lord Serbule himself?! Get your friends. Lord Serbule has grown strong from his sorrow.

I'm not sure where he's hiding right now, but I do remember overhearing this: \"Instead of a femur, offer a skull.\" I dunno what it means. Figure it out and kill him!

<i>[Lord Serbule is an encounter for a group of 6 players with level 30-40 combat skills.]</i>": "<i>Zhia Lian:</i> Você já enfrentou fantasmas, mas será que consegue enfrentar o fantasma mais perigoso de Serbule... o próprio Lorde Serbule?! Chame seus amigos. Lord Serbule ficou forte com sua tristeza.

Não tenho certeza de onde ele está escondido agora, mas lembro de ter ouvido isto: “Em vez de um fêmur, ofereça uma caveira”. Não sei o que isso significa. Descubra e mate-o!

<i>[Lord Serbule é um encontro para um grupo de 6 jogadores com habilidades de combate de nível 30-40.]</i>"
"<i>Zhia Lian:</i> You've proven you're a skilled gardener AND a skilled cook. Now take on a tougher challenge: Pumpkin Spice Tea. You'll need to find the recipe from an undead!": "<i>Zhia Lian:</i> Você provou que é um jardineiro habilidoso E um cozinheiro habilidoso. Agora aceite um desafio mais difícil: Chá de Abóbora com Especiarias. Você precisará encontrar a receita de um morto-vivo!"
"<i>Zhia Lian:</i> Your mostly-nude fighting earlier was impressive! It made me curious how good you really are without all that gear. Why don't you try nakedly killing some of those six-armed monsters in Povus? You can keep your hat and boots on, like last time!": "<i>Zhia Lian:</i> Sua luta quase nua de antes foi impressionante! Fiquei curioso para saber como você realmente é bom sem todo esse equipamento. Por que você não tenta matar alguns daqueles monstros de seis braços em Povus? Você pode ficar com o chapéu e as botas, como da última vez!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
Our plan is ruined! We invented pre-germinated seeds to help flowers grow in far-away places. But ice fairies have dug them up and are eating them!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Please retrieve some of our seeds!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Nosso plano está arruinado! Inventamos sementes pré-germinadas para ajudar as flores a crescer em lugares distantes. Mas as fadas do gelo os desenterraram e estão comendo!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Por favor, recupere algumas de nossas sementes!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
Serpent creatures are attacking our hidden caches of honey! Our strongest warriors could not stop them. We need your help... Bzzz... But you will need more help!

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Join your hivemates and kill the basilisks!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Criaturas serpentes estão atacando nossos esconderijos de mel! Nossos guerreiros mais fortes não conseguiram detê-los. Precisamos da sua ajuda... Bzzz... Mas você vai precisar de mais ajuda!

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Junte-se aos seus companheiros de colméia e mate os basiliscos!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We cannot pollinate our distant flower holdings. This endangers future honey potential!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Please pollinate them for us!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Não podemos polinizar as nossas distantes explorações florais. Isto põe em perigo o potencial futuro do mel!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Por favor, polinize-os para nós!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We cannot pollinate the red flowers nearby. This endangers future honey potential!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Please pollinate them for us!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Não podemos polinizar as flores vermelhas próximas. Isto põe em perigo o potencial futuro do mel!

Bzz. ZzzZzzZzzBz ... zzzBzt!
Por favor, polinize-os para nós!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. Bears attack while we sleep, stealing our resources and injuring our warriors.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 You must kill them!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. Os ursos atacam enquanto dormimos, roubando nossos recursos e ferindo nossos guerreiros.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. Fae canines, barghest, ambush us while we pollinate.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 You must kill them!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. Caninos Fae, barghest, nos emboscam enquanto polinizamos.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. Frost Hippogriffs graze on our flowers. Unlike other ungulates, their beaks are freezing cold, and they kill most flowers they touch. They do not belong in this world!

Bzz. ZzzZzzZzzBz ... zzzBzt!
 You must kill them!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. Hipogrifos gelados pastam em nossas flores. Ao contrário de outros ungulados, seus bicos são gelados e matam a maioria das flores que tocam. Eles não pertencem a este mundo!

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. Our two freshest flowers are covered in pixies and we cannot approach.

Bzz. ZzzZzzZzzBz ... zzzBzt!
Please pollinate them for us!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. Nossas duas flores mais frescas estão cobertas de duendes e não podemos nos aproximar.

Bzz. ZzzZzzZzzBz ... zzzBzt!
Por favor, polinize-os para nós!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. The nibbling sprouts burrow under the ground.

Bzz. ZzzZzzZzzBz ... zzzBzt!
They ambush us while we pollinate. You must kill them!

BzzRtxl!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. Os brotos mordiscadores se enterram no subsolo.

Bzz. ZzzZzzZzzBz ... zzzBzt!
Eles nos emboscam enquanto polinizamos. Você deve matá-los!

BzzRtxl!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. The spriggan weeds ambush us while we pollinate.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 You must kill them!\"": "Uma colmeia no Reino Fae disse: \"Bzz. BzzZZzzz...
Precisamos da sua ajuda, fada. As ervas daninhas spriggan nos emboscam enquanto polinizamos.

Bzz. ZzzZzzZzzBz ... zzzBzt!
 Você deve matá-los!\""
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...
We need your help, fairy. We yearn to pollinate, but travel is unsafe! Raptors attack our troops in transit!

