"Loche said, \"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Disastrous Spore Bombs? It would be a great help!\"": "Loche disse: \"Olá! Você pode me ajudar? Preciso de um suprimento extra de bombas de esporos para ajudar a cuidar dos inimigos que possamos encontrar. Minha voz melodiosa os atrai... então eu os despedaço! Você pode me produzir 30 bombas de esporos desastrosas? Seria uma grande ajuda!\""
"Loche said, \"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Nightmarish Spore Bombs? It would be a great help!\"": "Loche disse: \"Olá! Você pode me ajudar? Preciso de um suprimento extra de bombas de esporos para ajudar a cuidar dos inimigos que possamos encontrar. Minha voz melodiosa os atrai... então eu os despedaço! Você pode me produzir 30 bombas de esporos de pesadelo? Seria uma grande ajuda!\""
