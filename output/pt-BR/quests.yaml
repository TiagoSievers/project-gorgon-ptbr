"Unora Veilmoor in Statehelm said, \"I'm much too busy to train you personally. But I've prepared something for you. Go and visit my old training ground in Gazluk. I've left training programs there, and I'll walk you through them via sending stone.

How would you find the camp? Let me think. It's on the plateau. There's a useless lookout tower somewhat nearby. From the camp you can look down over the cliff and see a lot of trees. Does that narrow it down? You'll know you're in the right place when you see iron dodecahedrons hammered into the cold earth. There'll be a building with a sending stone; contact me from there.\"": "Unora Veilmoor em Statehelm disse: \"Estou muito ocupado para treiná-lo pessoalmente. Mas preparei algo para você. Vá e visite meu antigo campo de treinamento em Gazluk. Deixei programas de treinamento lá e vou orientá-lo através deles enviando pedras.

Como você encontraria o acampamento? Deixe-me pensar. Está no planalto. Há uma torre de vigia inútil nas proximidades. Do acampamento você pode olhar para o penhasco e ver muitas árvores. Isso restringe tudo? Você saberá que está no lugar certo quando vir dodecaedros de ferro martelados na terra fria. Haverá um edifício com uma pedra enviadora; entre em contato comigo de lá.\""
"Unora's sending stone in Gazluk said, \"I have a syllabus that would keep you busy for months. I was told to make sure you \"got your Councils' worth\" from your tuition! But in your case, that would just be wasting both of our time. Don't you agree?

Let's skip ahead to the end.

Return to the metal dodecahedron outside, say 'Ossugazak 99', and kill them with Ice Magic. Don't die. This is your final exam.

<i>[Must use Ice Magic to advance this quest.]</i>\"": "A pedra de envio de Unora em Gazluk disse: \"Eu tenho um plano de estudos que o manteria ocupado por meses. Disseram-me para ter certeza de que você \"obtinha o valor dos seus Conselhos\" com suas mensalidades! Mas no seu caso, isso seria apenas uma perda de nosso tempo. Você não concorda?

Vamos pular até o final.

Volte para o dodecaedro de metal do lado de fora, diga 'Ossugazak 99' e mate-os com Ice Magic. Não morra. Este é o seu exame final.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>\""
"Unora's sending stone in Gazluk said, \"I think that about does it. Come see me in Statehelm.\"": "O envio da pedra de Unora em Gazluk disse: \"Acho que é isso. Venha me ver em Statehelm.\""
"Unora's sending stone in Gazluk said, \"Ice Magic is well known for granting its users resilience. Let's make sure you understand this concept well.

There's a metal dodecahedron outside. Stand in it and say 'Ossugazak 2'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>\"": "A pedra de envio de Unora em Gazluk dizia: \"Ice Magic é bem conhecido por conceder resiliência a seus usuários. Vamos ter certeza de que você entendeu bem esse conceito.

Há um dodecaedro de metal lá fora. Entre nele e diga 'Ossugazak 2'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>\""
"Unora's sending stone in Gazluk said, \"Now let's focus on common Ice Magic deficiencies. Frostbite is an overlooked but very valuable tool in your aresenal. Use it on some tougher enemies.

Return to the metal dodecahedron outside. Stand in it and say 'Ossugazak 3'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>\"": "A pedra de envio de Unora em Gazluk disse: \"Agora vamos nos concentrar nas deficiências comuns da Magia do Gelo. Frostbite é uma ferramenta esquecida, mas muito valiosa em seu aresenal. Use-a em alguns inimigos mais difíceis.

Volte para o dodecaedro metálico do lado de fora. Entre nele e diga 'Ossugazak 3'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>\""
"Unora's sending stone in Gazluk said, \"Why don't we start with some target practice. When hitting multiple enemies, the ideal number to hit is three. But sometimes it's necessary to hit more. Try different densities and study the difference.

There's a metal dodecahedron outside. Stand in it and say 'Ossugazak 1'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>\"": "A pedra de envio de Unora em Gazluk disse: \"Por que não começamos com alguma prática de tiro ao alvo? Ao acertar vários inimigos, o número ideal para acertar é três. Mas às vezes é necessário acertar mais. Experimente diferentes densidades e estude a diferença.

Há um dodecaedro de metal lá fora. Fique nele e diga 'Ossugazak 1'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>\""
