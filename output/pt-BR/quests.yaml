"Loche said, \"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Blood Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\"": "Loche disse: \"Olá! O cassino tem ótimas bebidas, mas estou morrendo de vontade de comer um smoothie de cogumelos! Você poderia me trazer 10 smoothies de cogumelos de sangue? Não! Não vou beber todos de uma vez. O que você me considera... um anão?\""
"Loche said, \"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Boletus Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\"": "Loche disse: \"Olá! O cassino tem ótimas bebidas, mas estou morrendo de vontade de comer um smoothie de cogumelos! Você poderia me trazer 10 smoothies de cogumelos Boletus? Não! Não vou beber todos de uma vez. O que você me considera... um anão?\""
