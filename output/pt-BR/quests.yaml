"Hooray, you killed Greta! You are the cold-blooded murderer our pod needed! I'm confident that befriending such a violent sociopath as you cannot possibly have any negative repercussions. Here, take this token of our appreciation. Please do not kill us.": "Viva, você matou Greta! Você é o assassino de sangue frio que nosso grupo precisava! Estou confiante de que fazer amizade com um sociopata tão violento como você não pode ter nenhuma repercussão negativa. Aqui, pegue este sinal de nosso agradecimento. Por favor, não nos mate."
"Hopefully not too many spiders laid eggs before we managed to kill 'em. But I guess if they hatch, I'll see you back out here. Until next time, pal.": "Esperançosamente, não muitas aranhas botaram ovos antes de conseguirmos matá-los. Mas acho que se eles eclodirem, vejo você de volta aqui. Até a próxima, amigo."
