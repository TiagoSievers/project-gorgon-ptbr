I have an idea! I could make a sexy panther suit and pretend to hunt him. Hmm he may like that. But I'd need an extremely good panther skin.": "Sexo com Malvol está ficando velho. E isso é ruim! É meu trabalho mantê-lo interessante. Mas, no fundo, sou um destruidor de escudos. Eu não sou bom nisso.

