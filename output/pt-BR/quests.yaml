"Riston said, \"If you can help me out, I'll make as many rings for you as you want. As a brewer, the Queen has me brew up things to suit her \"special needs\" when I'm not out here handing out prizes. Could you bring me 20 hops? The time I save from that I can use to make you a ring!\"": "Riston disse: \"Se você puder me ajudar, farei quantos anéis você quiser. Como cervejeiro, a Rainha me faz preparar coisas para atender às suas\" necessidades especiais \"quando não estou aqui distribuindo prêmios. Você poderia me trazer 20 lúpulos? O tempo que economizo com isso posso usar para fazer um anel para você!\""
"Rita in Serbule asked for a flawless giant snail shell. \"They're really hard to get. I heard you have to kill dozens to find one. But you're so strong and brave, I'm sure it'll only take you a second!\"": "Rita em Serbule pediu uma concha de caracol gigante impecável. \"Eles são realmente difíceis de conseguir. Ouvi dizer que você tem que matar dezenas para encontrar um. Mas você é tão forte e corajoso que tenho certeza que levará apenas um segundo!\""
