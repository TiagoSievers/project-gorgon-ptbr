"Tadion will stop by tomorrow? Great! I know he didn't like our roll in the hay last time, but I got fresh new hay and I've mostly kept the cows away from it, so ... here's hoping! Thanks for being my messenger. Here, take this. Use it to make some rat's day.": "Tadion passará por aqui amanhã? Ótimo! Eu sei que ele não gostou do nosso rolinho no feno da última vez, mas eu comprei feno fresco e mantive as vacas longe dele, então... aqui está a esperança! Obrigado por ser meu mensageiro. Aqui, pegue isso. Use-o para fazer o dia do rato."
