"Writ Challenge: Do Your Part 4/7": "Desafio de redação: faça sua parte 4/7"
"Writ Challenge: Do Your Part 5/7": "Desafio de redação: faça sua parte 5/7"
"Writ Challenge: Do Your Part 6/7": "Desafio de redação: faça sua parte 6/7"
"Writ Challenge: Do Your Part 7/7": "Desafio de redação: faça sua parte 7/7"
"Writ Challenge: I Got a Golden Writ!": "Desafio de escrita: ganhei uma escrita de ouro!"
"Xedrite": "Xedrita"
"Xogrite Chunks": "Pedaços de Xogrita"
"Ya know, this banana scheme really brought back memories. Me and my best friend Mophew used to run all kinds of crazy schemes like this! But he... died.

Not really. He didn't die and that's the scary part! He <i>womanized</i>. I knew he was gay, and that was safe, you know? Mop was cute, but I'm not gay, so it wasn't a big deal. But now he's got knockers and he doesn't smell the same and I just... I don't know how to be his friend anymore. Her friend. You know?

But it seems crazy not to try to fix this somehow. Can you go and talk to him? Just get a feeling for where he's at mentally. He goes by Tessa now and works in the kitchen most days.": "Você sabe, esse esquema de banana realmente trouxe de volta memórias. Eu e meu melhor amigo, Mophew, costumávamos executar todos os tipos de esquemas malucos como esse! Mas ele... morreu.

Na verdade. Ele não morreu e essa é a parte assustadora! Ele <i>mulherizou</i>. Eu sabia que ele era gay e isso era seguro, sabe? Mop era fofo, mas eu não sou gay, então não foi grande coisa. Mas agora ele tem aldravas e não tem o mesmo cheiro e eu simplesmente... não sei mais como ser amigo dele. A amiga dela. Você sabe?

Mas parece loucura não tentar consertar isso de alguma forma. Você pode ir falar com ele? Basta ter uma ideia de onde ele está mentalmente. Ele agora se chama Tessa e trabalha na cozinha quase todos os dias."
"Yagreet at the fairy tree asked for some rubbery tongues, most commonly found on dead Ranalans.": "Yagreet na árvore das fadas pediu algumas línguas de borracha, mais comumente encontradas em Ranalans mortos."
"Yagreet at the fairy tree asked you for some Master First Aid Kits.": "Yagreet na árvore das fadas pediu alguns kits mestre de primeiros socorros."
"Yarn": "Fio"
"Yasinda in Hogan's Keep asked for some explosive ink.": "Yasinda em Hogan's Keep pediu um pouco de tinta explosiva."
"Yasinda in Hogan's Keep asked you to find out if Sir Villas Wake has any children, so she can kill one to avenge her daughter's death. Villas Wake is dead, but she believes he may have left some personal belongings at Eltibule Keep.": "Yasinda em Hogan's Keep pediu para você descobrir se Sir Villas Wake tem filhos, para que ela possa matar um para vingar a morte de sua filha. Villas Wake está morto, mas ela acredita que ele pode ter deixado alguns pertences pessoais em Eltibule Keep."
"Yasinda in Hogan's Keep asked you to find proof that her daughter is dead. She said, \"In the note, the sage told her to find his lean-to under a giant boulder. He said he could just hear the sounds of a waterfall.\"": "Yasinda, na Fortaleza de Hogan, pediu que você encontrasse provas de que a filha dela está morta. Ela disse: \"No bilhete, o sábio disse a ela para encontrar seu alpendre sob uma pedra gigante. Ele disse que conseguia ouvir apenas os sons de uma cachoeira.\""
"Yavazek in Sun Vale's Animal Town asked you to collect the powdery substance that can sometimes be found in the remains of biting vines.": "Yavazek, da Cidade Animal de Sun Vale, pediu que você coletasse a substância pulverulenta que às vezes pode ser encontrada nos restos de vinhas que picam."
"Yeah, I knew Lumpfuzz wouldn't be happy. That's all the cash I had right now! But don't worry about what he said: he'll buy the stuff we need with his own money. He's a good wolf.": "Sim, eu sabia que Lumpfuzz não ficaria feliz. Esse era todo o dinheiro que eu tinha agora! Mas não se preocupe com o que ele disse: ele comprará as coisas que precisamos com seu próprio dinheiro. Ele é um lobo bom."
"Yeah, that's the stuff. It's super gross! Here, take this so you can relax. You deserve it!": "Sim, é isso. É super nojento! Aqui, pegue isso para que você possa relaxar. Você merece!"
"Yeah, there's some mantises out there that are causin' trouble. Can you go whack 'em? They're getting too close for comfort.": "Sim, há alguns louva-a-deus por aí que estão causando problemas. Você pode bater neles? Eles estão chegando perto demais para serem confortáveis."
"Yeah, yeah, this will work. Thanks!

Tofu is really, really simple.  Curdle some soy milk, strain out the solid bits and press out the rest of the liquid in a tofu press. It's actually a lot like cheese, except you don't age it -- and it's much more boring. <i>Too</i> simple.

I don't have one here, but I think there's an old tofu press setup down in the dungeon with all those goblins.": "Sim, sim, isso vai funcionar. Obrigado!

Tofu é muito, muito simples.  Coalhar um pouco de leite de soja, coar os pedaços sólidos e espremer o resto do líquido em uma prensa de tofu. Na verdade, é muito parecido com o queijo, exceto que você não envelhece - e é muito mais chato. <i>Muito</i> simples.

Não tenho uma aqui, mas acho que há uma velha prensa de tofu instalada na masmorra com todos aqueles goblins."
"Yedun gud. Yedun reel gud. Leevittoo me ta git dis stuff takin carov.": "Yedun bom. Yedun carretel bom. Leevittoo eu vou pegar essas coisas levando Carov."
"Yellow Perch Fillets": "Filetes de Perca Amarela"
"YellowDragonScale": "Escala de Dragão Amarelo"
"YellowPerchFillet": "Filete AmareloPerch"
"Yep, that's a shark skin. I'm going to trust your judgment on its quality; I know nothing about sharks. Here.": "Sim, é uma pele de tubarão. Vou confiar no seu julgamento sobre a qualidade; Não sei nada sobre tubarões. Aqui."
"Yep, that's Sarina's stuff. I bet she'll be happy to see it! Or else she'll be shocked and saddened by the memories these conjure. Hmm. Well, I'll broach it carefully. Thank you.": "Sim, isso é coisa da Sarina. Aposto que ela ficará feliz em ver isso! Ou então ela ficará chocada e triste com as memórias que isso evoca. Hum. Bem, vou abordar isso com cuidado. Obrigado."
"Yep, that's sulfur. Here's some gems for the trouble.": "Sim, isso é enxofre. Aqui estão algumas joias para o problema."
"Yep, that's the stuff. Here, take this. It was my first attempt, but I think I can do better.": "Sim, é isso. Aqui, pegue isso. Foi minha primeira tentativa, mas acho que posso fazer melhor."
"Yep, this is the shit. Okay, so here's what you do. You take a mushroom bomb, see, and...": "Sim, essa é a merda. Ok, então aqui está o que você faz. Você pega uma bomba de cogumelo, veja, e..."
"Yep, those are flitterbie! Look at them twinkle! They even smell right! I mean, they smell like angry meat, but the smell is <i>correct</i> for flitterbies.

You guys know flitterbies are invasive, right? I don't know what dummy planted these here but you'll never get rid of them now. They're immortal. Not great for mortal ecosystems.

But I'm sure the wizards will figure something out before it gets too serious. Time to take this home and draw it for my book!": "Sim, esses são flitterbie! Olhe para eles brilhando! Eles até cheiram bem! Quero dizer, eles cheiram a carne irritada, mas o cheiro é <i>correto</i> para flitterbies.

Vocês sabem que os flitterbies são invasivos, certo? Não sei que idiota plantou isso aqui, mas você nunca vai se livrar deles agora. Eles são imortais. Não é bom para ecossistemas mortais.

Mas tenho certeza de que os magos descobrirão alguma coisa antes que a coisa fique muito séria. É hora de levar isso para casa e desenhar para o meu livro!"
"Yep. That'll work. Here's your barding!": "Sim. Isso vai funcionar. Aqui está o seu bardo!"
"Yep. That'll work. Here's your helm!": "Sim. Isso vai funcionar. Aqui está o seu elmo!"
"Yes": "yes, The curse is lifted. I have the coordinates! Finally! Are you ready for the next step?\": \"Você encontrou Elmetaph? Estou impressionado! E não me impressiono facilmente."
"Yes! Carrots! Kelim keeps saying they're super difficult to grow, but that doesn't make any sense, does it? They can't be any harder to grow than, say, a potato. Anyway, thanks! Here, take these. A dozen potatoes for a half-dozen carrots seems like a good trade, right?": "Sim! Cenouras! Kelim vive dizendo que eles são superdifíceis de cultivar, mas isso não faz sentido, não é? Não podem ser mais difíceis de cultivar do que, digamos, uma batata. De qualquer forma, obrigado! Aqui, pegue isso. Uma dúzia de batatas por meia dúzia de cenouras parece uma boa troca, certo?"
"Yes! Perfect. I shall extract the pineal juice from these. Here, take my most recent concoction, and Bob's your Uncle as they say in your idiom. I do not know what that means.": "Sim! Perfeito. Extrairei deles o suco pineal. Aqui, pegue minha mistura mais recente, e Bob é seu tio, como dizem em seu idioma. Eu não sei o que isso significa."
"Yes! Perhaps you are fit to become my scion! Perhaps.": "Sim! Talvez você esteja apto para se tornar meu descendente! Talvez."
"Yes! See, this cinnamon bark is actually a kind of <i>cassia</i> tree bark. It works fine as a spice, but it's not the same thing at an alchemical level! It's not a kind of cassia I recognize, either. Very interesting. Thank you. On behalf of the Aufghel Naturists Society, I present this bounty.": "Sim! Veja, esta casca de canela é na verdade uma espécie de casca de árvore de <i>cássia</i>. Funciona bem como tempero, mas não é a mesma coisa no nível alquímico! Também não é um tipo de cássia que eu reconheça. Muito interessante. Obrigado. Em nome da Sociedade Naturista Aufghel, apresento esta recompensa."
"Yes! String! Thank you so much! Now, what do I use these strings for? Shoelaces! Some elf traded me a pair of their windstep shoes a while back. I have figured out how to upgrade them while keeping their effectiveness. If you have a pair of exceptional quality or better windstep shoes, I can upgrade them for you, if you're willing to toss me some tokens as well for the time.
<i>[You have earned 10 favor with Orran the Caravan Leader]</i>
<i>[You have unlocked new talk options with Raim]</i>": "Sim! Corda! Muito obrigado! Agora, para que uso essas strings? Cadarços! Um elfo me trocou um par de sapatos windstep há algum tempo. Eu descobri como atualizá-los, mantendo sua eficácia. Se você tiver um par de sapatos windstep de qualidade excepcional ou melhor, posso atualizá-los para você, se você estiver disposto a me dar algumas fichas também por esse tempo.
<i>[Você ganhou 10 favores de Orran, o Líder da Caravana]</i>
<i>[Você desbloqueou novas opções de conversa com Raim]</i>"
"Yes! Thanks! I've almost got this recipe! I really appreciate your help with this. Let me give you something for your trouble.

I'm done with Cranium Powder, that stuff's terrible for you! I'm into the Pineal Juice scene now. All natural and incredibly powerful!": "Sim! Obrigado! Quase consegui essa receita! Eu realmente aprecio sua ajuda com isso. Deixe-me dar-lhe algo para o seu problema.

Cansei do Cranium Powder, essa coisa é terrível para você! Estou na cena do Pineal Juice agora. Tudo natural e incrivelmente poderoso!"
"Yes! That's it! See this pattern here? They burn tiny near-imperceptible scars into your flesh. It's a pattern, see? I think the dots make the outline of a snake. Weird...

Well, I'll study it more. Thanks! Here, take this.": "Sim! É isso! Veja esse padrão aqui? Eles queimam pequenas cicatrizes quase imperceptíveis em sua carne. É um padrão, viu? Acho que os pontos formam o contorno de uma cobra. Estranho...

Bem, vou estudar mais. Obrigado! Aqui, pegue isso."
"Yes! This horn screams with despair. It will silence my righteous horn and be a partner to my hateful horn. This item... take it. Go so that I may begin the weaving!": "Sim! Este chifre grita de desespero. Isso silenciará meu chifre justo e será um parceiro de meu chifre odioso. Este item... pegue. Vá para que eu possa começar a tecer!"
"Yes! This is her precious book of...wait...it's in code. Can you read this?

Nor can I. We have more work to do. Let me... think.": "Sim! Este é o seu precioso livro de... espere... está em código. Você pode ler isso?

Nem eu. Temos mais trabalho a fazer. Deixe-me... pensar."
"Yes! We have to take matters into our own hands! The Council isn't going to kill those bears until they try to invade the city. By then it'll be too late. You did the right thing. This money will assuage any misconcieved feelings of guilt.": "Sim! Temos que resolver o problema com nossas próprias mãos! O Conselho não vai matar esses ursos até que tentem invadir a cidade. Até então será tarde demais. Você fez a coisa certa. Este dinheiro irá amenizar qualquer sentimento de culpa equivocado."
"Yes, actually... can you grab me some spider legs? I need them for new potions. Big or small, doesn't matter.": "Sim, na verdade... você pode me pegar algumas pernas de aranha? Preciso deles para novas poções. Grande ou pequeno, não importa."
"Yes, actually... can you grab me some spider legs? I need them for new potions. Big or small, doesn't matter. ": "Sim, na verdade... você pode me pegar algumas pernas de aranha? Preciso deles para novas poções. Grande ou pequeno, não importa."
"Yes, as I said, if you bring me the heart of a young free-range sand elemental, I'll teach you what I can.": "Sim, como eu disse, se você me trouxer o coração de um jovem elemental da areia caipira, eu lhe ensinarei o que puder."
"Yes, I am supposed to deliver a package to a friend of mine, a fellow believer in mind over matter. He's... not like us. More like... a mantis. Can you take this powder to him? Oh, and I must warn you: do not taste the powder!": "Sim, devo entregar um pacote a um amigo meu, um companheiro crente em mente sobre o assunto. Ele... não é como nós. Mais como... um louva-a-deus. Você pode levar esse pó para ele? Ah, e devo avisar: não experimente o pó!"
"Yes, I ordered the vexfish lettuce wraps? What's the hold up?": "Sim, eu pedi os wraps de alface vexfish? Qual é o problema?"
"Yes, quite cursed. These will work. My experimental ritual requires unstable bones. It is quite dangerous. ... 

... You may join me, if you wish.

<i>[New Hangout Available.]</i>": "Sim, bastante amaldiçoado. Isso funcionará. Meu ritual experimental requer ossos instáveis. É muito perigoso. ... 

... Você pode se juntar a mim, se desejar.

<i>[Novo Hangout disponível.]</i>"
"Yes, remember my order? The stuffed bell pepper? I'm still waiting...": "Sim, lembra do meu pedido? O pimentão recheado? Eu ainda estou esperando..."
"Yes, these will do. Thank you.

Here, let me show you how I mix the tannins. There's a trick to it, you see...": "Sim, estes servirão. Obrigado.

Aqui, deixe-me mostrar como misturo os taninos. Há um truque nisso, você vê..."
"Yes, this is it! The very claw that nearly killed me. Who's laughing now, Mauler? I outlived you! Fool bear!

<i>(Kleave tosses the bloody paw over her shoulder.)</i> Good work. Here. Let me show you a clever stitching technique.": "Sim, é isso! A mesma garra que quase me matou. Quem está rindo agora, Mauler? Eu sobrevivi a você! Urso tolo!

<i>(Kleave joga a pata ensanguentada por cima do ombro.)</i> Bom trabalho. Aqui. Deixe-me mostrar uma técnica de costura inteligente."
"Yes, yes, of course": "you did as requested and here is your payment.\": \"Quantos olhos de pefredo você encontrou? Hum. Isso é muito pouco. Se eles estivessem ouvindo ativamente as ordens de sua terra natal, haveria centenas por toda parte. E parece que o olho pessoal de Asterion só foi usado para comunicação de curta distância! Mas..."
"Yes, yes, very good. I find it fascinating that you were able to complete this task. It often takes many orcs many weeks to find spruce of this quality! You must be more impressive than you look!": "Sim, sim, muito bom. Acho fascinante que você tenha conseguido concluir esta tarefa. Muitas vezes, muitos orcs levam muitas semanas para encontrar um abeto dessa qualidade! Você deve ser mais impressionante do que parece!"
"Yes, yes. You are right": "I sent you on an errand that I knew might be impossible. I owe you a reward for your 'work'. Sigh.\": \"Você recebeu isso de um 'guardião da doutrina' de Ranalon? Este não é o orbe que eu preciso. Além disso, este nem é um orbe mágico. É algum artefato cultural estúpido. Ah! Cadê?!"
"Yes. <i>Yalox eats the bandage.</i> It does nothing! NOTHING!": "Sim. <i>Yalox come o curativo.</i> Não faz nada! NADA!"
"Yes. Good! Do you like swords when in your other form? Here, take this spare.": "Sim. Bom! Você gosta de espadas quando está em sua outra forma? Aqui, pegue este sobressalente."
"Yes. This can be used. Here is the money.": "Sim. Isso pode ser usado. Aqui está o dinheiro."
"Yes. This is the lichen. Thank you. With this acting as a power chamber, I should be able to break the dimensional barrier and discover entire new worlds of existence. But I need a lot more research to test my theory.

Sorry, I didn't mean to ramble. Here, take some coin for your work.": "Sim. Este é o líquen. Obrigado. Com isso atuando como uma câmara de poder, eu deveria ser capaz de quebrar a barreira dimensional e descobrir novos mundos de existência. Mas preciso de muito mais pesquisas para testar minha teoria.

Desculpe, eu não queria divagar. Aqui, leve algumas moedas para o seu trabalho."
"Yes. Yes! YES! So much death, so much suffering. It makes me feel alive!": "Sim. Sim! SIM! Tanta morte, tanto sofrimento. Isso me faz sentir vivo!"
"Yesterday I experienced fear. Why should I suffer fear?! I am immortal! Yet I did fear. I was hunted by another immortal: a true barghest, and I was afraid! I slew it, but I knew it would return, and so my fear only grew!

I do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!": "Ontem senti medo. Por que eu deveria sofrer com medo?! Eu sou imortal! No entanto, eu temia. Fui caçado por outro imortal: um verdadeiro barghest, e tive medo! Eu o matei, mas sabia que ele voltaria, e por isso meu medo só aumentou!

Eu não gosto de medo. Eu não gosto disso! Vá e encontre o novo corpo do barghest e derrote meu medo com suas ações!"
"Yet another heart defeated! Just a few more...": "Mais um coração derrotado! Só mais alguns..."
"Yeti Hook Beasts": "Bestas de Gancho Yeti"
"Yeti Sticks": "Bastões de Yeti"
"YetiHookBeasts": "YetiHookBestas"
"YetiStick": "Yeti Stick"
"Yetta has asked for some feathers.": "Yetta pediu algumas penas."
"Yetta has asked for some mandrake root.": "Yetta pediu um pouco de raiz de mandrágora."
"Yetta has asked for some sulfur.": "Yetta pediu um pouco de enxofre."
"Yetta has requested some spider legs.": "Yetta solicitou algumas pernas de aranha."
"Yew Wood": "Madeira de teixo"
"YewWood": "Teixo"
"Yogzi in Sun Vale wants a bunch of Good Metal Slabs.": "Yogzi em Sun Vale quer um monte de Good Metal Slabs."
"Yogzi in Sun Vale wants evidence of snail armor. He believes an innkeeper in Eltibule can teach the technique. A simple pair of snail-shell boots should suffice.": "Yogzi em Sun Vale quer evidências de armadura de caracol. Ele acredita que um estalajadeiro em Eltibule pode ensinar a técnica. Um simples par de botas de caracol deve ser suficiente."
"Yogzi in Sun Vale wants you to make him a bunch of basic skinning knives.": "Yogzi em Sun Vale quer que você faça para ele um monte de facas básicas para esfolar."
"Yogzi in Sun Vale wants you to make him a bunch of simple skinning knives.": "Yogzi em Sun Vale quer que você faça para ele um monte de facas simples para esfolar."
"You accessed your feral nature and mastered the Face (Dog) symbol!": "Você acessou sua natureza selvagem e dominou o símbolo Face (Cachorro)!"
"You actually did it? Hahahaha! I wish I could have seen the faces of the guardians when you did that.

Oh, you wanted something for that? Well, here, take this I guess. ": "Você realmente fez isso? Hahahaha! Eu gostaria de ter visto os rostos dos guardiões quando você fez isso.

Ah, você queria algo para isso? Bem, aqui, pegue isso, eu acho."
"You actually killed a thousand ratkin?!

HAHAHAHAHAHAhahahaha what? You're like a god among mortals... and you've killed a thousand of our enemy just because I asked you to? HAHAHAHAHAHAHhahaha hahaha haha...

Hahahahahahaha! Hahaha! HAHAHA! You crazy idiot! Here's your xedrite! HAHAHA! Oh man. You're definitely the kind of idiot that goblin chiefs love to have around! Hell, I'm gonna throw in an extra xedrite for a job well done! Hahahahaha!": "Você realmente matou mil ratkins?!

HAHAHAHAHAHAhahahaha o quê? Você é como um deus entre os mortais... e matou milhares de nossos inimigos só porque eu pedi? HAHAHAHAHAHAHhahaha hahaha haha...

Hahahahahahaha! Hahaha! HAHAHA! Seu idiota louco! Aqui está o seu xedrite! HAHAHA! Ah, cara. Você é definitivamente o tipo de idiota que os chefes goblins adoram ter por perto! Inferno, vou adicionar um xedrite extra por um trabalho bem feito! Hahahahaha!"
"You again? I need more mushrooms! MORE!": "Você de novo? Preciso de mais cogumelos! MAIS!"
"You almost have it: the legendary Soup symbol! You just need a bit more slurping experience to understand how to craft a perfect universal indicator for the concept.": "Você quase conseguiu: o lendário símbolo da sopa! Você só precisa de um pouco mais de experiência para entender como criar um indicador universal perfeito para o conceito."
"You are a reasonable fisher, I hope. This lake needs your help to remain a fishing paradise! A human dumped fish in this lake a season ago. One of those fish has grown into a cruel, gigantic, horrible death beast! It only comes out at night. Please get it out of here!": "Você é um pescador razoável, espero. Este lago precisa da sua ajuda para continuar sendo um paraíso de pesca! Um humano despejou peixes neste lago há uma temporada. Um desses peixes se transformou em uma fera mortal cruel, gigantesca e horrível! Só sai à noite. Por favor, tire isso daqui!"
"You are an ally of nature! I was right!": "Você é um aliado da natureza! Eu estava certo!"
"You are cruel and deadly. Make sure that your armor is, as well.": "Você é cruel e mortal. Certifique-se de que sua armadura também esteja."
"You are finally back! ... I realized that I have misled you. For you see, one can bury pixies also! We are reborn in a new body; the old one means little... burying creatures proves nothing!

And I made you burn my lie into your mind! ... WHY?! WHY DID I PUNISH YOU WITH MY FOLLY! I AM SO SORRY! Please take this as an apology.": "Você finalmente está de volta! ... Percebi que enganei você. Para você ver, também é possível enterrar duendes! Renascemos num novo corpo; o antigo significa pouco... enterrar criaturas não prova nada!

E eu fiz você gravar minha mentira em sua mente! ... POR QUE?! Por que eu te castiguei com minha loucura! SINTO MUITO! Por favor, tome isso como um pedido de desculpas."
"You are positively itching to snuff more lifes, aren't you?! I knew it. And I <i>love</i> it! Get out there and do what you do best, fleshbag!": "Você está positivamente ansioso para matar mais vidas, não é?! Eu sabia. E eu <i>adoro</i> isso! Vá lá e faça o que você faz de melhor, saco de carne!"
"You are relieved to see that the globe pieces magically snap into place, revealing a console inside!": "Você fica aliviado ao ver que as peças do globo se encaixam magicamente, revelando um console dentro!"
"You are strangely obsequious to bring me a pipe full of gur-horta! But that concerns me not! Here: fair pay for your effort.": "Você é estranhamente obsequioso em me trazer um cachimbo cheio de gur-horta! Mas isso não me preocupa! Aqui: pagamento justo pelo seu esforço."
"You are truly kind! Here. I want you to have this land-dweller ornament. And this forbidden technique for consuming my kind.": "Você é realmente gentil! Aqui. Quero que você fique com este enfeite de morador da terra. E esta técnica proibida para consumir minha espécie."
"You aren't nearly as incapacitated as I'd have expected from someone who just ate 12 meals. Boring. But I guess you tried.": "Você não está tão incapacitado quanto eu esperaria de alguém que acabou de fazer 12 refeições. Tedioso. Mas acho que você tentou."
"You aren't racist, are you? The next one's a goblin. Don't kill him! He's the best helm-enchanter I know! Not exactly a friend, but he's friendly as far as goblins go. He went to visit his old \"tribe\", and ended up moving into some castle.

I'm worried he's doing stuff that will get him killed. You know, normal goblin stuff. Go see how he is. He's staying in a place called \"Hogan's Keep\". It's somewhere in Eltibule.

In return, I'll help you convince the little bastard to train you in his secretive craft skill.": "Você não é racista, é? O próximo é um goblin. Não o mate! Ele é o melhor encantador de elmos que conheço! Não é exatamente um amigo, mas é amigável no que diz respeito aos goblins. Ele foi visitar sua antiga “tribo”, e acabou se mudando para algum castelo.

Estou preocupado que ele esteja fazendo coisas que possam matá-lo. Você sabe, coisas normais de duendes. Vá ver como ele está. Ele está hospedado em um lugar chamado \"Hogan's Keep\". Está em algum lugar em Eltibule.

Em troca, ajudarei você a convencer o pequeno bastardo a treiná-lo em sua habilidade artesanal secreta."
"You aren't so bad for a land-dweller. I'll remember you. Here is an offering.": "Você não é tão ruim para um morador da terra. Eu vou lembrar de você. Aqui está uma oferta."
"You ate grapes and mastered the Grape symbol.": "Você comeu uvas e dominou o símbolo da Uva."
"You became a wizard just to be able to use the Wizard Hat symbol!": "Você se tornou um mago apenas para poder usar o símbolo do Chapéu de Feiticeiro!"
"You bloodthirsty creature! I appreciate your efforts to keep my name in every evil goblin's heart. By the way please do not mention my anti-goblin comments to our resident goblin population. It has been a source of ... disagreement in the past. But we know the truth, do we not? Yes. We are kindred.": "Sua criatura sanguinária! Agradeço seus esforços para manter meu nome no coração de cada goblin malvado. A propósito, por favor, não mencione meus comentários anti-goblins à nossa população residente de goblins. Foi uma fonte de... desacordo no passado. Mas sabemos a verdade, não é? Sim. Somos parentes."
"You brewed the potions? Okay, good. Yes, okay. ... Okay, stop telling me about the potions you brewed. It didn't work: you're still boring to talk to!": "Você preparou as poções? OK, bom. Sim, tudo bem. ... Ok, pare de me contar sobre as poções que você preparou. Não funcionou: você ainda é chato de conversar!"
"You buried 12 dogs? Great job! Hmm, you don't look that sad. I would have been bawling my eyes out at those poor dead animals. ... Weird.": "Você enterrou 12 cachorros? Ótimo trabalho! Hmm, você não parece tão triste. Eu estaria gritando com aqueles pobres animais mortos. ... Esquisito."
"You butchered all that meat? Wow. You're kind of a monster, aren't you? Ha ha, just kidding! Just kidding! Don't get angry! Here. Take this and settle down.": "Você massacrou toda aquela carne? Uau. Você é meio monstro, não é? Ha ha, estou brincando! Estou brincando! Não fique com raiva! Aqui. Pegue isso e acalme-se."
"You call this masterpiece-quality wood?! This is junk! I had a piece of oak just like this one, and this is the quality of staff I was able to make. Pathetic!

But you tried your best. Let your dishonor in failure be small!": "Você chama isso de madeira de qualidade obra-prima?! Isso é lixo! Eu tinha um pedaço de carvalho igual a este, e essa é a qualidade do cajado que consegui fazer. Patético!

Mas você tentou o seu melhor. Deixe sua desonra pelo fracasso ser pequena!"
"You can do amazing things with the goo of a ripe fairy puff. Usually they explode too violently to be useful, but if you pop one that's perfectly ripe, you won't be hurt! Instead, you'll get coated in their goo.

Go get yourself coated, then come see me. I'll use that goo for hive maintenance.": "Você pode fazer coisas incríveis com a gosma de um puff de fada maduro. Geralmente eles explodem com muita violência para serem úteis, mas se você estourar um que esteja perfeitamente maduro, não se machucará! Em vez disso, você ficará coberto com a gosma deles.

Vá se cobrir e depois venha me ver. Vou usar essa gosma para manutenção da colmeia."
"You can feel a surge of energy when you touch the instrument -- a clear sign of magical intent. The instrument makes a pitiful note and then is silent. It seems to be missing most of its strings! Enchanted strings of that length won't come cheap; perhaps there are some around here.": "Você pode sentir uma onda de energia ao tocar o instrumento – um sinal claro de intenção mágica. O instrumento faz uma nota lamentável e depois fica em silêncio. Parece estar faltando a maior parte de suas cordas! Cordas encantadas desse comprimento não serão baratas; talvez haja alguns por aqui."
"You can find a lot of seeds on the creatures around here - I guess maybe because of our influence? No idea where they get the seeds from, but if you bring me some I'll teach you how to properly appreciate nature.\\\"\": \"Rohina em Sun Vale disse": "\\\"Posso não ser o melhor druida, mas ainda sei apreciar a natureza! Na verdade, sou muito bom em cultivar flores! Só que não em árvores, eu acho."
"You can find false agaric all around Povus, so if you <i>aren't</i> brave, just look elsewhere.\\\"\": \"Dachak em Povus disse": "\\\"Vê os cogumelos gigantes ao longe? Sim, esses são novos. Na verdade, nem têm um ano de idade, e seja lá o que isso signifique, é definitivamente ruim."
"You can hear me, can you not? Then you are more than a mere fishmonger! You've taken fish, now can you give back to the sea?

Pinfish have invaded this brackish water. They are outcompeting us. It's not fair; it isn't right.": "Você pode me ouvir, não pode? Então você é mais do que um mero peixeiro! Você pegou peixe, agora pode devolver ao mar?

Pinfish invadiram esta água salobra. Eles estão nos superando. Não é justo; isso não está certo."
"You can't be this good. I don't know what your game is, but nobody completes these courses this quickly!

I suppose you're ready for a REAL challenge, then! Um, finish enemies off with bardic blasts. But they have to be sentient enemies! And at night! And you can't wear a hat! And don't die!": "Você não pode ser tão bom. Não sei qual é o seu jogo, mas ninguém conclui esses cursos tão rápido!

Suponho que você esteja pronto para um desafio REAL, então! Hum, acabe com os inimigos com explosões bárdicas. Mas eles têm que ser inimigos sencientes! E à noite! E você não pode usar chapéu! E não morra!"
"You carried a lot of bones and mastered the Bone symbol.": "Você carregou muitos ossos e dominou o símbolo do Osso."
"You caught a bonefish, which isn't as boney as you'd come to expect, but is still boney. Catching a few more should give you the knowledge to fillet it.": "Você pegou um bonefish, que não é tão ossudo quanto você esperava, mas ainda é ossudo. Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a grouper and you're not quite sure what to do with it. You'll need to catch a few more to figure out how to prepare it.": "Você pegou uma garoupa e não tem certeza do que fazer com ela. Você precisará pegar mais alguns para descobrir como prepará-lo."
"You caught a marlin! It's massive and quite difficult to catch, but you did it. Catch some more to learn how to fillet it.": "Você pegou um marlin! É enorme e muito difícil de capturar, mas você conseguiu. Pegue mais um pouco para aprender como fazer filetes."
"You caught a non-Drevan (a/k/a salt-water) snook. Are snooks poisonous? You aren't sure. Catching a few more will give you the info to safely prepare it.": "Você pegou um robalo não Drevan (também conhecido como de água salgada). Os robalos são venenosos? Você não tem certeza. Pegar mais alguns lhe dará informações para prepará-lo com segurança."
"You caught a radiant muskie: a large yet bony fish. Catching a few more should give you the knowledge to fillet it.": "Você pegou um almíscar radiante: um peixe grande, mas ossudo. Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a sorubim and aren't sure which parts are edible. But catching a few more should give you the knowledge to fillet it.": "Você pegou um sorubim e não tem certeza de quais partes são comestíveis. Mas pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a striped bass. Huh. The stripes are pretty subtle, all things considered. Catching a few more should give you the knowledge to fillet it.": "Você pegou um robalo. Huh. As listras são bem sutis, considerando tudo. Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a tarpon. Pretty big but not huge. Catching a few more should give you the knowledge to fillet it.": "Você pegou um tarpão. Muito grande, mas não enorme. Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a triple-tail, which seems to not actually have three tails. Beyond this disappointing revelation, you have no idea how to prepare it, but you'll get the hang of it if you catch some more.": "Você pegou uma cauda tripla, que na verdade parece não ter três caudas. Além dessa revelação decepcionante, você não tem ideia de como prepará-la, mas vai pegar o jeito se pegar mais um pouco."
"You caught a Vertan tuna. This is the smaller cousin of the famous Ormalan Tuna. Catching a few more should give you the knowledge to fillet it.": "Você pegou um atum Vertan. Este é o primo menor do famoso Atum Ormalan. Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a vidarian pickerel, which is famously tricky to prepare. But catching a few more should give you the knowledge to fillet it.": "Você pegou um pickerel Vidariano, que é famoso por ser difícil de preparar. Mas pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught a wahoo. This is a massive fish! Catching a few more should give you the knowledge to fillet it.": "Você pegou um wahoo. Este é um peixe enorme! Pegar mais alguns deve lhe dar o conhecimento necessário para cortá-los."
"You caught an eagle ray. This is one freaky fish! Is it even edible? You'll need to catch some more to figure it out.": "Você pegou uma arraia-águia. Este é um peixe estranho! É mesmo comestível? Você precisará pegar um pouco mais para descobrir."
"You caught an odd fish which you aren't sure how to fillet. You're an old hand at this though -- catch a few more and you'll figure it out!": "Você pegou um peixe estranho que não sabe como cortar em filés. Você já é experiente nisso - pegue mais alguns e descobrirá!"
"You caught enough fish to truly comprehend the Fish symbol.": "Você pegou peixes suficientes para compreender verdadeiramente o símbolo do Peixe."
"You closed the blood portal!": "Você fechou o portal de sangue!"
"You completed the Amulna Grand Tour with excellent time!": "Você completou o Amulna Grand Tour com excelente tempo!"
"You completed the Amulna Grand Tour!": "Você completou o Amulna Grand Tour!"
"You completed the Eltibule Circuit with excellent time!": "Você completou o Circuito Eltibule com excelente tempo!"
"You completed the Eltibule Circuit!": "Você completou o Circuito Eltibule!"
"You completed the Kur Mountain Derby with excellent time!": "Você completou o Kur Mountain Derby com um tempo excelente!"
"You completed the Kur Mountain Derby!": "Você completou o Kur Mountain Derby!"
"You completed the Moat Circuit with excellent time!": "Você completou o Circuito do Fosso com excelente tempo!"
"You completed the Moat Circuit!": "Você completou o Circuito do Fosso!"
"You completed the ritual and destroyed Grosark? Hmm, it's true that his presence seems very small now, but I can still detect him. I'm not sure we've seen the last of Grosark. But the problem has at least been postponed. That will do for now. Thank you.

Sometimes being wise means being willing to say that you CAN'T do something. I don't think I could have stopped Grosark alone. Oh, I know you had assistance also, but... well, I'm used to working solo.

That's changing, though. I am starting to enjoy working in tandem with you. We make a strong pair.": "Você completou o ritual e destruiu Grosark? Hmm, é verdade que a presença dele parece muito pequena agora, mas ainda posso detectá-lo. Não tenho certeza se vimos Grosark pela última vez. Mas o problema pelo menos foi adiado. Isso servirá por enquanto. Obrigado.

Às vezes, ser sábio significa estar disposto a dizer que você NÃO PODE fazer algo. Não creio que pudesse ter parado Grosark sozinho. Ah, eu sei que você também teve ajuda, mas... bem, estou acostumado a trabalhar sozinho.

Isso está mudando, no entanto. Estou começando a gostar de trabalhar em conjunto com você. Formamos um par forte."
"You crazy bastard! You killed Captain Evergloam! Hahaha! Here, take this bounty of useless supplies as spoils of war!

Of course, now the ship just has to sit here waiting for the captain to get back. BORRRINNNG. But maybe she'll get demoted! Oooh, or maybe you'll blow up the ship before she gets back! I'm excited to see what you do next!": "Seu bastardo maluco! Você matou o Capitão Evergloam! Hahaha! Aqui, tome esta abundância de suprimentos inúteis como espólio de guerra!

Claro, agora o navio só precisa ficar parado aqui esperando o capitão voltar. BORRINNNG. Mas talvez ela seja rebaixada! Oooh, ou talvez você exploda o navio antes que ele volte! Estou animado para ver o que você fará a seguir!"
"You destroyed Grosark? Could it be that easy? I must do some research.": "Você destruiu Grosark? Poderia ser tão fácil? Devo fazer alguma pesquisa."
"You destroyed the erupting nest of Tunnel Scorpions!": "Você destruiu o ninho em erupção dos Escorpiões do Túnel!"
"You destroyed the orcs' war machines and sent them back into the mountains.": "Você destruiu as máquinas de guerra dos orcs e os enviou de volta para as montanhas."
"You did great showing James how easy his course is. But now I'm curious if we can make the course harder just by increasing the numbers. Can you catch 12 rings in under 60 seconds? That'd be a little bit impressive.": "Você foi ótimo mostrando a James como o curso dele é fácil. Mas agora estou curioso para saber se podemos tornar o percurso mais difícil apenas aumentando os números. Você consegue pegar 12 toques em menos de 60 segundos? Isso seria um pouco impressionante."
"You Did It": "Você fez isso"
"You did it! I knew I was a great teacher! I'll teach you the next technique now. This lets you distill slightly better magic items! Oh and here: take these prisms. Sometimes they break, so you need a lot of them.

I actually need a lot more phlogiston than this -- but don't worry, I'm not asking you to work free! When you're ready to help more, let me know.

<i>[New Favor Unlocked.]</i>": "Você conseguiu! Eu sabia que era um ótimo professor! Vou te ensinar a próxima técnica agora. Isso permite destilar itens mágicos um pouco melhores! Ah, e aqui: pegue esses prismas. Às vezes eles quebram, então você precisa de muitos deles.

Na verdade, preciso de muito mais flogisto do que isso - mas não se preocupe, não estou pedindo para você trabalhar de graça! Quando você estiver pronto para ajudar mais, me avise.

<i>[Novo favor desbloqueado.]</i>"
"You did it! That's a lot of food! Now you should go help more animals since you like helping animals. You should go find Red and Mittens, they need help. But it's really cold in Kur and I can't go. Okay, love you, bye.": "Você conseguiu! Isso é muita comida! Agora você deveria ajudar mais animais, já que gosta de ajudar animais. Você deveria encontrar Red e Mittens, eles precisam de ajuda. Mas está muito frio em Kur e não posso ir. Ok, te amo, tchau."
"You did it! You completed all of the tasks! Well Done!": "Você conseguiu! Você completou todas as tarefas! Bom trabalho!"
"You did it! You completed all three tasks! It's safe to say you know the basics of Bun-Fu and are on your way to becoming a great Bun-Fu Master!": "Você conseguiu! Você completou todas as três tarefas! É seguro dizer que você conhece o básico do Bun-Fu e está no caminho certo para se tornar um grande Mestre do Bun-Fu!"
"You did it! You touched them all! Well done! Now go home and take a bath! You smell a little fruity.": "Você conseguiu! Você tocou em todos eles! Bom trabalho! Agora vá para casa e tome um banho! Você cheira um pouco frutado."
"You did it, thank you! I'll just take these into the back and let them sit for a few days while I pretend to make them. No offense, I just have to keep up appearances! But here. This is something I did make.": "Você conseguiu, obrigado! Vou apenas levar isso para trás e deixá-los descansar por alguns dias enquanto finjo que estou fazendo. Sem ofensa, só preciso manter as aparências! Mas aqui. Isso é algo que eu fiz."
"You did it? Really? Wow. That's one down, two to go! I ... don't really feel like celebrating, somehow. My son is still dead. But you did well. Here. Let me teach you a few tricks of my trade in exchange. And, of course, here's the money I'd been saving up to pay for this assassination!": "Você fez isso? Realmente? Uau. Falta um, faltam dois! Eu... realmente não estou com vontade de comemorar, de alguma forma. Meu filho ainda está morto. Mas você se saiu bem. Aqui. Deixe-me ensinar alguns truques do meu comércio em troca. E, claro, aqui está o dinheiro que eu estava economizando para pagar por esse assassinato!"
"You did the thing!": "Você fez a coisa!"
"You did well, but the phoenices are already beginning to reappear! They must somehow be bound here, to my domain! That is entirely unacceptable! Hmm. Begone now, please. I am uncertain as to where to direct my wrath.": "Você fez bem, mas as fenícias já estão começando a reaparecer! Eles devem de alguma forma estar ligados aqui, ao meu domínio! Isso é totalmente inaceitável! Hum. Vá embora agora, por favor. Não tenho certeza sobre para onde direcionar minha ira."
"You discovered the powerful Butterfly symbol technique!": "Você descobriu a poderosa técnica do símbolo da Borboleta!"
"You dissipated the gargoyles' toxic cloud and repelled the invasion!": "Você dissipou a nuvem tóxica das gárgulas e repeliu a invasão!"
"You don't seem to be an ice fairy. Can you help us? We fish are dying! The ice fairies let loose horrible unnatural fish in the lake. They're making things cold! Please remove them.": "Você não parece ser uma fada do gelo. Você pode nos ajudar? Nós, peixes, estamos morrendo! As fadas do gelo soltaram peixes horríveis e não naturais no lago. Eles estão deixando as coisas frias! Por favor, remova-os."
"You don't suppose she works evenings while I work mornings, do you? Hah, no, that's the sort of misunderstanding you'd read in a bad adventure poem!\": \"Bem, estou feliz que ela não tenha se machucado nem nada. Mesmo assim, ela terá que ouvir a razão": "passo vários dias por semana limpando as estradas e nunca a vi por aí."
"You don't think you'd need to study more than, say, 100 fireworks in order to draw a symbol of one. But you'd have to light them yourself.": "Você não acha que precisaria estudar mais do que, digamos, 100 fogos de artifício para desenhar o símbolo de um. Mas você mesmo teria que acendê-los."
"You don't want my treats?! Prove it! If you can freely give away the ultimate treat, I'll have to believe you. Bring me <b>Steak and Cheese Wraps!</b>": "Você não quer minhas guloseimas?! Prove! Se você puder dar gratuitamente o melhor presente, terei que acreditar em você. Traga-me <b>Envoltórios de Bife e Queijo!</b>"
"You drank it! I can tell: you look a little green. But don't worry, green is the color of nature.": "Você bebeu! Eu posso dizer: você parece um pouco verde. Mas não se preocupe, o verde é a cor da natureza."
"You drank until you could draw Beer.": "Você bebeu até conseguir tirar cerveja."
"You drop the rubies in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Você coloca os rubis e ele ganha vida! Deve permanecer ligado por alguns dias. Agora parece que você simplesmente enfia a mão..."
"You dumped all the nectar out? That's a relief! I may not really exist, but that doesn't mean I'd will non-existence on others! You know? Anyway, thanks, bud!": "Você despejou todo o néctar? Isso é um alívio! Posso realmente não existir, mas isso não significa que desejaria a inexistência para os outros! Você sabe? De qualquer forma, obrigado, amigo!"
"You expertly restring the giant lute. As you finish up, you spot a huge pile of Councils hidden in the bottom of the instrument. That's going to affect the sound quality negatively, so you clean it out.": "Você habilmente restringe o alaúde gigante. Ao terminar, você avista uma enorme pilha de Conselhos escondidos na parte inferior do instrumento. Isso afetará negativamente a qualidade do som, então você limpa."
"You exploded enough to understand the Bomb symbol.": "Você explodiu o suficiente para entender o símbolo da Bomba."
"You finally did something right! Wait... the top's not sealed properly. How much of my hatred oil evaporated? Look, the bottle's partially empty! Everybody knows that hatred oil is supposed to be wax-sealed. This has been tampered with! We're going to have to renegotiate your pay... here's what I think you deserve.": "Você finalmente fez algo certo! Espere... a parte superior não está devidamente selada. Quanto do óleo do meu ódio evaporou? Olha, a garrafa está parcialmente vazia! Todo mundo sabe que o óleo do ódio deveria ser lacrado. Isso foi adulterado! Teremos que renegociar seu salário... aqui está o que acho que você merece."
"You forged the Hammer (Tool) symbol!": "Você forjou o símbolo do Martelo (Ferramenta)!"
"You found a lost Warden from the Povus region? That's good news. I thought they died out years ago! Well, tell your new friend to report here for debriefing, and we'll get him relocated to somewhere that really needs a Warden!": "Você encontrou um Diretor perdido da região de Povus? Isso é uma boa notícia. Achei que eles haviam morrido há anos! Bem, diga ao seu novo amigo para vir aqui para um interrogatório, e nós o transferiremos para algum lugar que realmente precise de um Diretor!"
"You found a wild horse and learned a lot from watching its movements. If you were to interact with enough horses, you're confident that you'd learn to ride and tame them.": "Você encontrou um cavalo selvagem e aprendeu muito observando seus movimentos. Se você interagisse com cavalos suficientes, teria certeza de que aprenderia a montá-los e domesticá-los."
"You found crystals from all three elements? These are excellent quality! Here, let me... and then we merge... and there we are!

Can you play it? Well... give it some time! I'm sure you'll get the hang of it eventually.": "Você encontrou cristais de todos os três elementos? São de excelente qualidade! Aqui, deixe-me... e então nos fundimos... e aí estamos!

Você pode jogar? Bem... espere um pouco! Tenho certeza que você vai pegar o jeito eventualmente."
"You found Denton Razor? ... Oh. I see. Well, he gave us two leads...": "Você encontrou Denton Razor? ... Oh. Eu vejo. Bem, ele nos deu duas pistas..."
"You found Elmetaph? I am impressed! And I am not easily impressed.

He said it was cursed? Ah, of course! The old coordinate mis-reading curse. We can break it. Next, you must bring me hexapus lips and ... wait, you already got the uncursing ingredients? That's almost <i>too</i> helpful. Do not overstep your place, bloodling! But let me work.

Yes: yes, The curse is lifted. I have the coordinates! Finally! Are you ready for the next step?": "Você encontrou Elmetaph? Estou impressionado! E não me impressiono facilmente.

Ele disse que estava amaldiçoado? Ah, claro! A velha maldição de leitura incorreta de coordenadas. Podemos quebrá-lo. Em seguida, você deve me trazer lábios hexapus e... espere, você já pegou os ingredientes infalíveis? Isso é quase <i>muito</i> útil. Não ultrapasse o seu lugar, sangrento! Mas deixe-me trabalhar.

Sim: sim, a maldição foi suspensa. Eu tenho as coordenadas! Finalmente! Você está pronto para o próximo passo?"
"You found fresh cantaloupe?! You're amazing!": "Você encontrou melão fresco?! Você é incrível!"
"You found Gruzark? He's dead?! Oh. Well, I guess that means this book will go up in value! Thanks. Here... it's one of my swords. It's got some silly enchantment on it, maybe that'll be fun for you.": "Você encontrou Gruzark? Ele está morto?! Oh. Bem, acho que isso significa que o valor deste livro aumentará! Obrigado. Aqui... é uma das minhas espadas. Tem algum encantamento bobo, talvez isso seja divertido para você."
"You found her and she's okay? Great! Are you a crafter? If so, I bet she'd be happy to teach you her craft. Tell her I vouch for you. If she needs proof, tell her you know her old guild nickname: \"Frisky Ferret\".": "Você a encontrou e ela está bem? Ótimo! Você é um artesão? Se sim, aposto que ela ficaria feliz em lhe ensinar seu ofício. Diga a ela que eu atesto por você. Se ela precisar de provas, diga a ela que você conhece seu antigo apelido de guilda: \"Frisky Ferret\"."
"You found her! Hi, Miss Fly-Hater! Wait, uh... Hm.

Well, this isn't the same <b>exact</b> frog as before, but let's just keep that between us. He has a great temperament and he looks hungry, so I'm sure this will work out fine! I'll keep an eye on him.": "Você a encontrou! Olá, Senhorita Odiadora de Moscas! Espere, hum... Hum.

Bem, este não é exatamente o mesmo sapo de antes, mas vamos manter isso entre nós. Ele tem um ótimo temperamento e parece estar com fome, então tenho certeza que vai dar certo! Vou ficar de olho nele."
"You found it! How? It doesn't matter, give it here.

<i>[She grabs the bag from you and opens it up. After digging through it for a while, she looks disappointed.]</i>

They couldn't even finish one simple task. Whatever. Here, I don't need this.": "Você encontrou! Como? Não importa, dê aqui.

<i>[Ela pega a sacola de você e a abre. Depois de vasculhar por um tempo, ela parece desapontada.]</i>

Eles não conseguiam nem terminar uma tarefa simples. Qualquer que seja. Aqui, eu não preciso disso."
"You found it?! This is Kimeta's key! I can open the chest she left behind! Wait just a minute.

<i>[Gerrux opens a small chest and sighs.]</i> Well, I'm glad to know what was inside. But it's just more of the weird gizmos she was making. And some technical notes. Here, you can have this junk, maybe it'll make more sense to you.

Thanks for helping me figure out what was inside! Even though it's disappointing.": "Você encontrou?! Esta é a chave de Kimeta! Posso abrir o baú que ela deixou para trás! Espere só um minuto.

<i>[Gerrux abre um pequeno baú e suspira.]</i> Bem, estou feliz em saber o que havia dentro. Mas são apenas mais coisas estranhas que ela estava fazendo. E algumas notas técnicas. Aqui você pode ficar com esse lixo, talvez faça mais sentido para você.

Obrigado por me ajudar a descobrir o que havia dentro! Mesmo que seja decepcionante."
"You found more of my jewelry! I suppose you've returned enough of my inventory that I could meaningfully reopen the shop. But I'm still missing such important pieces...

<i>[Shop Open]</i>

<i>[New Favors Available.]</i>": "Você encontrou mais joias minhas! Suponho que você devolveu o suficiente do meu estoque para que eu pudesse reabrir a loja de forma significativa. Mas ainda me faltam peças tão importantes...

<i>[Loja aberta]</i>

<i>[Novos favores disponíveis.]</i>"
"You found more?! This is wonderful! Wonderful! Let me show you some of the ways this mushroom differs from the norm. <i>(Charles spends a while showing you diagrams he's created. You earn Mycology XP.)</i>": "Você encontrou mais?! Isso é maravilhoso! Maravilhoso! Deixe-me mostrar algumas das diferenças entre esse cogumelo e o normal. <i>(Charles passa um tempo mostrando os diagramas que criou. Você ganha XP Micologia.)</i>"
"You found my lucky balaclava! Yep, this is exactly like mine. Thank you!": "Você encontrou minha balaclava da sorte! Sim, isso é exatamente igual ao meu. Obrigado!"
"You found one?! Wow. Thanks! Here's some cash for your trouble.": "Você encontrou um?! Uau. Obrigado! Aqui está algum dinheiro pelo seu problema."
"You found Poe! I'm glad he's alive. How many oils did he send back with you? ... None at all?! You went all that way and got nothing for me?!

No, no, I'm not angry. I'm just very disappointed. Hm. Why don't you go back and ask him to teach you his techniques? I bet you'd be a faster crafter than a myconian could ever be!": "Você encontrou Poe! Estou feliz que ele esteja vivo. Quantos óleos ele mandou de volta com você? ... Nenhuma?! Você foi até ali e não conseguiu nada para mim?!

Não, não, não estou com raiva. Estou muito decepcionado. Hum. Por que você não volta e pede a ele que lhe ensine suas técnicas? Aposto que você seria um artesão mais rápido do que um myconiano jamais poderia ser!"
"You found Rick? That's amazing! And you got him cured?! That's amazinger! I can't wait to see him at the party!": "Você encontrou Rick? Isso é incrível! E você o curou?! Isso é mais incrível! Mal posso esperar para vê-lo na festa!"
"You found some more of my jewelry! Oh, if only it were enough. But it's NOT! I still can't open my shop. But I have another lead...": "Você encontrou mais algumas das minhas joias! Ah, se isso fosse suficiente. Mas NÃO é! Ainda não consigo abrir minha loja. Mas tenho outra pista..."
"You found some of my jewelry! Not enough to open the shop, but enough to give me hope! Thank you!": "Você encontrou algumas das minhas joias! Não o suficiente para abrir a loja, mas o suficiente para me dar esperança! Obrigado!"
"You found some research notes? And a whole host of N Cores! Brilliant. Now all we have to do is pop these puppies open and get to work. It's a two-person job, so let me know when you have some free time.

[ You've unlocked a new hangout with Engineer Crall. ]": "Você encontrou algumas notas de pesquisa? E uma série de N Cores! Brilhante. Agora tudo o que precisamos fazer é abrir esses cachorrinhos e começar a trabalhar. É um trabalho para duas pessoas, então me avise quando tiver algum tempo livre.

[Você desbloqueou um novo hangout com o Engineer Crall. ]"
"You found the book! Well, it's more of a scroll, isn't it?

Even after I split the money with Errr... with my friend, I'm still going to make a lot of money from this. It's only fair that I reward you with something equally valuable: my library science techniques! Take these organizational secrets to your grave!

<i>[There's a new button on your inventory window which lets you filter viewed items by Equipment, Consumable, Quest, or Other.]</i>

Hey, do you want to help me fill other book orders? I have a bunch that I've been unable to fulfill. I'll pay you a hefty cut!": "Você encontrou o livro! Bem, é mais um pergaminho, não é?

Mesmo depois de dividir o dinheiro com Errr... com meu amigo, ainda vou ganhar muito dinheiro com isso. É justo que eu recompense você com algo igualmente valioso: minhas técnicas de biblioteconomia! Leve esses segredos organizacionais para o túmulo!

<i>[Há um novo botão na janela do seu inventário que permite filtrar os itens visualizados por Equipamento, Consumível, Missão ou Outro.]</i>

Ei, você quer me ajudar a atender outros pedidos de livros? Tenho um monte que não consegui cumprir. Eu vou te pagar uma boa parte!"
"You found the goggles! Oh, I don't need those teeth anymore, I decided on a new direction. But I'll save them for some other project! Here: this is a knife I improved last year. I hope you fight well with it.": "Você encontrou os óculos! Ah, não preciso mais desses dentes, decidi seguir um novo rumo. Mas vou guardá-los para algum outro projeto! Aqui: esta é uma faca que melhorei no ano passado. Espero que você lute bem com isso."
"You found them! Oh, no, they got wet...

Well, still, better than nothing, right? I'll start blotting each page dry. I bet I can salvage most of it! Thank you so much!

In exchange, let me teach you some useful goblinese words and phrases. Goblins may not seem like they're better than the frog-people, but they are. Goblins honor trade agreements! So here's what you say if you meet a goblin trader.

<i>[You receive a short language lesson from Cleo.]</i>": "Você os encontrou! Ah, não, eles se molharam...

Bem, ainda assim, melhor que nada, certo? Vou começar a secar cada página. Aposto que posso salvar a maior parte! Muito obrigado!

Em troca, deixe-me ensinar algumas palavras e frases úteis em goblinês. Os goblins podem não parecer melhores que os sapos, mas são. Goblins honram acordos comerciais! Então aqui está o que você dirá se encontrar um comerciante goblin.

<i>[Você recebe uma breve aula de idioma da Cleo.]</i>"
"You found them! Well, they're not in good shape, but they're legible. That should be good enough.": "Você os encontrou! Bem, eles não estão em bom estado, mas são legíveis. Isso deveria ser bom o suficiente."
"You found this weaponized xedrite INSIDE the scorpion? How did it... hmm.

Good job. I'll take this to the Sand Seer.": "Você encontrou esta xedrita armada DENTRO do escorpião? Como foi... hmm.

Bom trabalho. Vou levar isto ao Sand Seer."
"You found what? You mean they weren't torn completely to shreds? That's great! They were supposed to collect something for me. The next time you're in there, look for a sack that they had and grab it for me.": "Você encontrou o que? Quer dizer que eles não foram completamente feitos em pedaços? Isso é ótimo! Eles deveriam coletar algo para mim. Da próxima vez que você estiver lá, procure um saco que eles tinham e pegue para mim."
"You found what? You mean they weren't torn completely to shreds? That's great! They were supposed to collect something for me. The next time you're in there, look for a sack that they had and grab it for me. ": "Você encontrou o que? Quer dizer que eles não foram completamente feitos em pedaços? Isso é ótimo! Eles deveriam coletar algo para mim. Da próxima vez que você estiver lá, procure um saco que eles tinham e pegue para mim."
"You freed them? Great! That was a nice thing to do. Twenty thousand years of torture is just really a lot, you know?": "Você os libertou? Ótimo! Isso foi uma coisa legal de se fazer. Vinte mil anos de tortura é muito, sabe?"
"You got a little taste of destroying life, and now you're back for more, are you? Maybe you have some demon in you, have you ever considered that? Heh heh heh heh... Well then go! Kill more things! MANY more things! When we're through, this whole rock will be barren!": "Você sentiu um gostinho de destruir a vida e agora está de volta para mais, não é? Talvez você tenha algum demônio dentro de você, já pensou nisso? Heh heh heh heh... Bem, então vá! Mate mais coisas! MUITO mais coisas! Quando terminarmos, toda esta rocha estará estéril!"
"You got all the stuff? Well I guess it's my turn to get my hands dirty. Now where did I leave those potion jars from last time?": "Você tem todas as coisas? Bem, acho que é a minha vez de sujar as mãos. Agora, onde deixei aqueles potes de poção da última vez?"
"You got all this blood from the wings of those flapskulls? I guess Mr. Blueheart was right. Good work.

You know what? I'm sure he has more follow-up requests, and there's really no reason for me to be the go-between. Can you speak with him about next steps?

<i>[New Favor Unlocked with Ferris Blueheart.]</i>": "Você tirou todo esse sangue das asas daqueles crânios abalados? Acho que o Sr. Blueheart estava certo. Bom trabalho.

Você sabe o que? Tenho certeza de que ele tem mais solicitações de acompanhamento e não há realmente nenhuma razão para eu ser o intermediário. Você pode falar com ele sobre os próximos passos?

<i>[Novo favor desbloqueado com Ferris Blueheart.]</i>"
"You got blustered until you realized the Wind symbol.": "Você ficou furioso até perceber o símbolo do Vento."
"You got everything? Great! I'm gonna let  somebody with hands do the actual work, but I'll make sure it gets done quick. Thanks!": "Você tem tudo? Ótimo! Vou deixar alguém com mãos fazer o trabalho propriamente dito, mas vou garantir que seja feito rapidamente. Obrigado!"
"You got it? Good! Did you get its heart?": "Você entendeu? Bom! Você conseguiu seu coração?"
"You got it? Whew! You saved my life for another month! Let me get you something.": "Você entendeu? Uau! Você salvou minha vida por mais um mês! Deixe-me pegar uma coisa para você."
"You got me grapes? Oh, that's so sweet of you!": "Você me trouxe uvas? Ah, isso é tão gentil da sua parte!"
"You got onions! This is easy! We're almost done!": "Você tem cebolas! Isso é fácil! Estamos quase terminando!"
"You got orange juice! But how? You're quite adroit at obtaining unusual things, aren't you? Here. I'll trade you for a few of these unusual coins I found lying around the cave.": "Você tem suco de laranja! Mas como? Você é muito hábil em obter coisas incomuns, não é? Aqui. Troco você por algumas dessas moedas incomuns que encontrei espalhadas pela caverna."
"You got the abominations out of the science deck? That's great news, because they freak me OUT! UGH!

Oh, but FYI: we've already sent thousands of them off to other worlds, along with their horrible brain-dog pets. So it's much too late for you to stop the army. They're invading a distant world even as we speak!

Sorry... I honestly didn't mean to mislead you that time. Here's a make-up present. Tell people you tore it from my broken fingers after beating me almost to death!": "Você tirou as abominações do baralho de ciências? Isso é uma ótima notícia, porque eles me assustam! ECA!

Ah, mas para sua informação: já enviamos milhares deles para outros mundos, junto com seus horríveis animais de estimação. Então é tarde demais para você parar o exército. Eles estão invadindo um mundo distante neste exato momento!

Desculpe... Sinceramente, não tive a intenção de enganá-lo daquela vez. Aqui está um presente de maquiagem. Diga às pessoas que você o arrancou dos meus dedos quebrados depois de me espancar quase até a morte!"
"You got the honeycombs? Good work! We'll get this tree sparklin'!": "Você tem os favos de mel? Bom trabalho! Vamos deixar essa árvore brilhando!"
"You got them! Wow, these are larger and sharper than I expected. Intimidated? No! No. ... I'm just scared. It's not the same. Here. Take these coins for your trouble.": "Você os pegou! Uau, eles são maiores e mais nítidos do que eu esperava. Intimidado? Não! Não... só estou com medo. Não é a mesma coisa. Aqui. Leve essas moedas para o seu problema."
"You got them. I'm impressed! Here's some money! Oh, and here's a sample of one of the things I make with the mandibles.": "Você os pegou. Estou impressionado! Aqui está algum dinheiro! Ah, e aqui está uma amostra de uma das coisas que faço com as mandíbulas."
"You got them? Great! Keep 'em, I don't want fish. I don't remember why I asked for them, actually. But here's something spicy for your trouble.": "Você os pegou? Ótimo! Fique com eles, não quero peixe. Não me lembro por que pedi por eles, na verdade. Mas aqui está algo picante para o seu problema."
"You got these just for me? Wow. Wow! That was really kind of you. Here, try this. It's my latest batch. Oh and let me give you some coin to cover your expenses.": "Você tem isso só para mim? Uau. Uau! Isso foi muito gentil da sua parte. Aqui, tente isso. É meu último lote. Ah, e deixe-me dar-lhe algumas moedas para cobrir suas despesas."
"You got this for me? I did not see an orcish ship come into port, so I suppose you obtained it from some other means. You must be quite resourceful!": "Você tem isso para mim? Eu não vi um navio orc chegando ao porto, então suponho que você o tenha obtido por algum outro meio. Você deve ser bastante engenhoso!"
"You got this for me? Well that's really kind of you! I was just complaining, I didn't mean to make you go to all that trouble. But I'm glad you did! Let me teach you some gardening tips. I wish I had more to offer!": "Você tem isso para mim? Bem, isso é muito gentil da sua parte! Eu só estava reclamando, não queria fazer você ter todo esse trabalho. Mas estou feliz que você fez isso! Deixe-me ensinar algumas dicas de jardinagem. Eu gostaria de ter mais para oferecer!"
"You got this from a ranalon 'doctrine keeper'? This is not the orb I need. Moreover, this is not even a magic orb. It's some stupid cultural artifact. Augh! Where is it?!

Yes, yes. You are right: I sent you on an errand that I knew might be impossible. I owe you a reward for your 'work'. Sigh.": "Você recebeu isso de um 'guardião da doutrina' de Ranalon? Este não é o orbe que eu preciso. Além disso, este nem é um orbe mágico. É algum artefato cultural estúpido. Ah! Cadê?!

Sim, sim. Você está certo: enviei você para uma missão que sabia ser impossível. Devo-lhe uma recompensa pelo seu 'trabalho'. Suspirar."
"You guys did it! That's awesome! Here's your reward. I'm gonna go play with my pumpkins now!": "Vocês conseguiram! Isso é incrível! Aqui está sua recompensa. Vou brincar com minhas abóboras agora!"
"You guys did it! That's awesome! Here's your reward. I'm gonna go, do my stuff with this now!": "Vocês conseguiram! Isso é incrível! Aqui está sua recompensa. Eu vou fazer minhas coisas com isso agora!"
"You guys did it! That's awesome! Here's your reward. Now to see if I can find something strange to do with it!": "Vocês conseguiram! Isso é incrível! Aqui está sua recompensa. Agora vou ver se consigo encontrar algo estranho para fazer com isso!"
"You guys did it! That's awesome! Here's your reward. Off to go get warm and dusty!": "Vocês conseguiram! Isso é incrível! Aqui está sua recompensa. Vou ficar quente e empoeirado!"
"You hammered until you could depict the Hammer (Weapon) symbol.": "Você martelou até conseguir representar o símbolo do Martelo (Arma)."
"You handled yourself well.": "Você se comportou bem."
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.": "Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não consigo sentir esperança durante um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas fico quase catatônico quando o efeito passa. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo. Mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior."
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.

I also need something to inhibit my memories of despair... it makes the Juice last longer. Some ditzy elf gave me a few bottles last week, but she said she can't make enough to keep me going. Elves: always flaking out when you need 'em! Ahem... no offense to you and your friends, of course.": "Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não consigo sentir esperança durante um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas fico quase catatônico quando o efeito passa. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo. Mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior.

Também preciso de algo para inibir minhas lembranças de desespero... faz o Suco durar mais. Uma elfa estúpida me deu algumas garrafas na semana passada, mas disse que não consegue fazer o suficiente para me sustentar. Elfos: sempre desmaiando quando você precisa deles! Aham... sem ofensa para você e seus amigos, é claro."
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but when it wears off I go almost catatonic. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times, but I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.

I also need something to inhibit my memories... there's a potion that does it, but damned if I can get a steady supply of it. But any amount is helpful.

Oh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.": "Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não consigo sentir esperança durante um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas quando passa, fico quase catatônico. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo, mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior.

Eu também preciso de algo para inibir minhas memórias... há uma poção que faz isso, mas dane-se se consigo um suprimento constante dela. Mas qualquer quantia é útil.

Ah, e eu ficaria muito grato se você pudesse limpar alguns daqueles malditos ursos-fadas! Não consegui diminuir o número deles recentemente."
"You have been exceptionally useful. I understand that your culture dictates that I now give you 'tit for your tat', which I assume is a disgusting sexual act. Since insects do not have breasts -- and if they did, males such as I would not have these organs -- please accept this secretion instead. In my home city, we farm the insects that make this, and use it as currency.\": \"Todos são de natureza mamiliana. Corroboração! Percebi que as plantas não me atacam e agora entendi": "as plantas não comem insetos! Esta é uma descoberta muito útil. Devo contatar a Rainha imediatamente. Podemos usar essas plantas como guardas!"
"You have broken the ranks of the creatures. Some remain, but perhaps that works to our advantage: they will communicate back to their masters that this world is not an easy target.

You have done well today, my druids. Go with Dreva's blessings.": "Você quebrou as fileiras das criaturas. Alguns permanecem, mas talvez isso funcione a nosso favor: eles comunicarão aos seus mestres que este mundo não é um alvo fácil.

Vocês se saíram bem hoje, meus druidas. Vá com as bênçãos de Dreva."
"You have done well today, my druids. Go with Dreva's blessings.\": \"Você quebrou as fileiras das criaturas. Alguns permanecem, mas talvez isso funcione a nosso favor": "eles comunicarão aos seus mestres que este mundo não é um alvo fácil."
"You have frightened off the ratkin for today, but they will return soon! Please rest and recover your health now, for you may be needed again.": "Você assustou os ratkin por hoje, mas eles retornarão em breve! Por favor, descanse e recupere sua saúde agora, pois você poderá ser necessário novamente."
"You have killed the spider? I didn't doubt you.

Hm... A golem that can think on its own? I'm not an expert alchemist, but I've heard someone speak of that quite recently...": "Você matou a aranha? Eu não duvidei de você.

Hm... Um golem que consegue pensar por conta própria? Não sou um alquimista especialista, mas ouvi alguém falar disso recentemente..."
"You have my fish? Perfect! Now remember, tell nobody. But, since you already know, I guess I can teach you the recipe, if you'd like.

<i>[ Recipe 'Nishika's Travel Snack' unlocked in the Training menu. ]</i>": "Você está com meu peixe? Perfeito! Agora lembre-se, não conte a ninguém. Mas, como você já sabe, acho que posso te ensinar a receita, se quiser.

<i>[Receita 'Lanche de Viagem de Nishika' desbloqueada no menu Treinamento. ]</i>"
"You have my gratitude! If you need to leave now, please go with my blessing. If you had a bit more time, there's one remaining clean up task to see to...\": \"Esses são o medo dele? Vamos ver. Sim, vai funcionar, pois o pesadelo do sonhador é a nossa salvação": "ele teme o Gulagra!"
"You have my thanks. A temporary reprieve is still a reprieve.": "Você tem meus agradecimentos. Um adiamento temporário ainda é um adiamento."
"You have received 1 token of Norala.\": \"Confirmado": "o Scion de Norala está morto."
"You have slain my friend. I am indebted to you, but yet -- all that I have learned of meat-plants is pain.

Senzur taught me the signature psychic technique of his species. He called it, appropriately, the Mindworm. I could teach you the Mindworm... It will keep his memory alive. <i>[New Training Option Available.]</i>": "Você matou meu amigo. Estou em dívida com você, mas ainda assim - tudo o que aprendi sobre plantas de carne foi dor.

Senzur me ensinou a técnica psíquica característica de sua espécie. Ele o chamou, apropriadamente, de Mindworm. Eu poderia te ensinar o Mindworm... Isso manterá a memória dele viva. <i>[Nova opção de treinamento disponível.]</i>"
"You have slain so many foes that one might easily mistake you for an army. You are worthy, of that much I am certain. Make an offering to me.": "Você matou tantos inimigos que alguém poderia facilmente confundi-lo com um exército. Você é digno, disso eu tenho certeza. Faça uma oferenda para mim."
"You hear Rixie shout, \"Incredible! Did you see, James? DID YOU SEE THAT?!\"": "Você ouve Rixie gritar: \"Incrível! Você viu, James? VOCÊ VIU ISSO?!\""
"You hear Rixie shout, \"See, James? I told you it was easy! Now let's try a REAL challenge! Come on back and we'll try afresh.\"": "Você ouve Rixie gritar: \"Viu, James? Eu disse que era fácil! Agora vamos tentar um desafio REAL! Volte e tentaremos de novo.\""
"You hear Rixie shout, \"Woo! Nice going! Now let's take it to the extreme!\"": "Você ouve Rixie gritar: \"Uau! Muito bem! Agora vamos levar isso ao extremo!\""
"You jumped through the nexus portal and arrived in a cave. There's a crystal nearby that seems to beckon to you.": "Você pulou pelo portal do Nexus e chegou em uma caverna. Há um cristal próximo que parece acenar para você."
"You kicked pigs to death? Well, aren't you the brave hero. What an ass!

Ha ha yes, I had you do that just so I could call you names. I was briefly amused, though.": "Você chutou porcos até a morte? Bem, você não é o herói corajoso. Que idiota!

Ha ha, sim, pedi para você fazer isso só para poder xingá-lo. Eu me diverti brevemente, no entanto."
"You kill spiders, Solgribue likes! Maybe tell troll friends you good. Maybe.": "Você mata aranhas, Solgribue gosta! Talvez diga aos amigos trolls que você está bem. Talvez."
"You killed him?! Thank you so much! And now if you promise never to tell anyone I was scared of a sheep, I'll teach you some of my fanciest mining tricks.": "Você o matou?! Muito obrigado! E agora, se você prometer nunca contar a ninguém que tive medo de uma ovelha, vou lhe ensinar alguns dos meus truques de mineração mais sofisticados."
"You killed it! Oh, now you've made me feel guilty.

I was told to get this heart for my instructor back home, but I couldn't bring myself to kill a wind spirit. So I made you do it! That was cruel of me, but kind of you. In return, I'll teach you what I can. Some of my lessons will be hands-on, though. I need to teach you the way I was taught.": "Você matou! Oh, agora você me fez sentir culpado.

Disseram-me para levar esse coração para meu instrutor em casa, mas não consegui matar um espírito do vento. Então eu fiz você fazer isso! Isso foi cruel da minha parte, mas gentil da sua parte. Em troca, vou te ensinar o que puder. Algumas de minhas aulas serão práticas, no entanto. Preciso te ensinar do jeito que fui ensinado."
"You killed legling mages. At my request. I guess it's really sinking in how evil I've become. I... need a minute. Here, take this and let me think about what I've done.": "Você matou magos legling. A meu pedido. Acho que estou realmente percebendo o quão malvado eu me tornei. Eu... preciso de um minuto. Aqui, pegue isso e deixe-me pensar no que fiz."
"You killed the big scary bug? Ha! See, I told her it'd be easy! The Sand Seer kept saying I should send in a \"team\"... but you're way more cost-effective. Here's your pay. I'll go tell her.": "Você matou o grande inseto assustador? Ha! Veja, eu disse a ela que seria fácil! O Sand Seer continuou dizendo que eu deveria enviar uma \"equipe\"... mas você é muito mais econômico. Aqui está o seu pagamento. Eu vou contar a ela."
"You killed the guardians, just like that?! Wow. ... even I'm demoralized, so I'm sure the rest of the den will be too. Good work!": "Você matou os guardiões, simplesmente assim?! Uau. ... até eu estou desmoralizado, então tenho certeza que o resto da toca também ficará. Bom trabalho!"
"You killed the overseers? Great job! I'm sure they'll send up some new ones soon enough, but that'll slow 'em down for a few days. If we keep it up, they'll abandon the camps out here and retreat back into Sedgewick Forest!

Here's a reward for the good news you brought me.": "Você matou os feitores? Ótimo trabalho! Tenho certeza de que eles enviarão alguns novos em breve, mas isso os atrasará por alguns dias. Se continuarmos assim, eles abandonarão os acampamentos daqui e voltarão para a Floresta Sedgewick!

Aqui está uma recompensa pelas boas notícias que você me trouxe."
"You killed the supervisors? Did you kill Girrrna? I hate her so much, she's so mean! Well, even if you didn't find her, you killed her close friends, and that's something...

... you know, sometimes I have weird regretful feelings about the things I ask you to do. But I'm four years old! Surely my moral compass is fully formed. So I need to put my qualms aside and press on with this genocide. This depressing, depressing genocide.": "Você matou os supervisores? Você matou Girrrna? Eu a odeio tanto, ela é tão má! Bem, mesmo que você não a tenha encontrado, você matou seus amigos mais próximos, e isso é algo...

... você sabe, às vezes tenho sentimentos estranhos de arrependimento pelas coisas que peço que você faça. Mas eu tenho quatro anos! Certamente minha bússola moral está totalmente formada. Portanto, preciso deixar minhas dúvidas de lado e prosseguir com esse genocídio. Este genocídio deprimente, deprimente."
"You know how every kind of crystal has certain magical attunements? Well, lapis lazuli is attuned to alchemy. It has many uses for empowering potions. And I'm fresh out. Get me some?": "Você sabe como todo tipo de cristal tem certas sintonizações mágicas? Bem, o lápis-lazúli está em sintonia com a alquimia. Tem muitos usos para poções fortalecedoras. E acabei de sair. Traga-me um pouco?"
"You know now that you'll need to practice with the bow if you ever want to properly render the twanginess of the Bow symbol.": "Agora você sabe que precisará praticar com o arco se quiser renderizar corretamente o som vibrante do símbolo do arco."
"You know that blue-glowy pedestal near the entrance to town? That's a teleportation platform! So ugly, right? The platforms in Verta are so pretty, but these... well, anyway, go use it. Go and teleport! Amuse me with your teleporty antics!": "Você conhece aquele pedestal azul brilhante perto da entrada da cidade? Isso é uma plataforma de teletransporte! Tão feio, certo? As plataformas no Verta são tão bonitas, mas essas... bem, de qualquer forma, vá usá-las. Vá e se teletransporte! Divirta-me com suas travessuras de teletransporte!"
"You know that weird elven building out on the island? Past the big bridge? That used to be an inn or hostel or something like that. Some rich elf was trying to make money. Everybody's been gone for years, but I heard they had amazing breakfasts and really cozy beds. And get this: Jumper checked it out and said there was some paper with writing in there. He can't read, but I'm hoping its a recipe or something like that. Can you go get it?": "Você conhece aquela construção élfica estranha na ilha? Depois da grande ponte? Aquilo costumava ser uma pousada ou albergue ou algo parecido. Algum elfo rico estava tentando ganhar dinheiro. Todo mundo já se foi há anos, mas ouvi dizer que eles tomavam café da manhã incrível e camas muito aconchegantes. E veja só: Jumper deu uma olhada e disse que havia um papel escrito ali. Ele não sabe ler, mas espero que seja uma receita ou algo parecido. Você pode ir buscá-lo?"
"You know the only good thing about staying here? It's the food! I know, most of it's nothing to write home about. But some days, Durstin makes his fried mycena bites, and they are delicious! They're my one weakness, really. I could eat a million of 'em!

Sadly, Durstin's not made any in a while. He offered to teach me the recipe so I could make 'em myself, but that's way too much work! Say... you wanna do it for me?": "Sabe qual é a única coisa boa de ficar aqui? É a comida! Eu sei, a maior parte não é nada digno de nota. Mas alguns dias Durstin faz suas mordidas de mycena fritas, e elas são deliciosas! Eles são minha única fraqueza, na verdade. Eu poderia comer um milhão deles!

Infelizmente, Durstin não ganha nada há algum tempo. Ele se ofereceu para me ensinar a receita para que eu mesmo pudesse fazer, mas isso dá muito trabalho! Diga... você quer fazer isso por mim?"
"You know the Shield symbol should depict strength, honor, and something else. But what's the secret ingredient? You'll need to investigate.": "Você sabe que o símbolo do Escudo deve representar força, honra e algo mais. Mas qual é o ingrediente secreto? Você precisará investigar."
"You know those flying monsters the ranalon have? Those 'scray'? Yeah. Well, I need a stinger from one. If you find one, bring it to me!": "Você conhece aqueles monstros voadores que o Ranalon tem? Aqueles 'scray'? Sim. Bem, preciso de um ferrão de um. Se você encontrar um, traga para mim!"
"You know what I could go for? Some venison hash browns! But it's a secret family recipe. I guess regular old hash browns would do, too.

If you happen to be cooking, could you fry me up some Hash Browns? Don't go to any trouble on my account, though.": "Você sabe o que eu poderia fazer? Algumas batatas fritas de veado! Mas é uma receita secreta de família. Acho que batatas fritas normais também serviriam.

Se acontecer de você estar cozinhando, você poderia fritar alguns Hash Browns para mim? Não se preocupe por minha causa, no entanto."
"You know what I miss? Brown ale. Strong, sweet, but dry. Except the wet ones. I'm not too particular I guess. But every brown ale is better than what Cynthia serves!": "Você sabe o que eu sinto falta? Cerveja marrom. Forte, doce, mas seco. Exceto os molhados. Eu não sou muito específico, eu acho. Mas toda brown ale é melhor do que a que Cynthia serve!"
"You know what would hit the spot? Some bacon!": "Você sabe o que acertaria em cheio? Um pouco de bacon!"
"You know what you need? Fish oil. But not just any fish oil -- you need the oil from cave fish. Just holding the fish is enough, but they have to be fresh -- like, super fresh. I recommend catching them yourself.

I hear there's some fish growing in the caves of the Kur Mountains! That's a pretty far trek, but the fresh air will do you good, too.": "Você sabe o que precisa? Óleo de peixe. Mas não qualquer óleo de peixe – você precisa do óleo dos peixes das cavernas. Apenas segurar o peixe é o suficiente, mas ele tem que estar fresco – tipo, super fresco. Eu recomendo pegá-los você mesmo.

Ouvi dizer que há alguns peixes crescendo nas cavernas das Montanhas Kur! É uma caminhada bastante longa, mas o ar fresco também lhe fará bem."
"You know what'll really get them to change things up? Taking down the Den Mother. Yes, she'll be replaced by another, but it's about proving to them nothing is safe.": "Você sabe o que realmente os fará mudar as coisas? Derrubando a Den Mother. Sim, ela será substituída por outra, mas trata-se de provar a eles que nada é seguro."
"You know what's funny? Falling down is funny! But is it funny if the person hurts themselves? I need to experiment. Fall off of things repeatedly -- make sure you hurt yourself each time.": "Você sabe o que é engraçado? Cair é engraçado! Mas tem graça se a pessoa se machuca? Eu preciso experimentar. Caia repetidamente - certifique-se de se machucar todas as vezes."
"You know why you aren't entertaining? It's because you don't smell like flowers. I <i>think</i>. So go grow some flowers!": "Você sabe por que você não é divertido? É porque você não cheira a flores. Eu <i>acho</i>. Então vá cultivar algumas flores!"
"You know, I bet there's a master mummy in Foothills Cave. When a mummy remains alive for long enough, there's a chance it can regain its free will and rise up from its inherent bitterness. When that happens, it become VERY dangerous. They're usually yellowed or blackened with age. If you see one, RUN! You'd need a team of trained warriors to kill it!

Of course, if you happen to have a few friends and wanted to kill the damned thing, I'd be happy to reward such heroism.": "Você sabe, aposto que há uma múmia mestre em Foothills Cave. Quando uma múmia permanece viva por tempo suficiente, há uma chance de ela recuperar seu livre arbítrio e superar sua amargura inerente. Quando isso acontece, torna-se MUITO perigoso. Eles geralmente ficam amarelados ou enegrecidos com o tempo. Se você ver um, CORRA! Você precisaria de uma equipe de guerreiros treinados para matá-lo!

Claro, se acontecer de você ter alguns amigos e quiser matar a maldita coisa, ficarei feliz em recompensar tal heroísmo."
"You know, when you walked away without even writing down the proportions, I was sure that you were gonna blow me off. But you actually did it, and you got the measurements right, too. Huh. Well good work. I'll take it from here.": "Sabe, quando você foi embora sem nem anotar as proporções, eu tinha certeza que você iria me dispensar. Mas você realmente fez isso e também acertou as medidas. Huh. Bem, bom trabalho. Eu assumo daqui."
"You lit all the lamps! Visit the Town Status Board for a reward.": "Você acendeu todas as lâmpadas! Visite o Town Status Board para receber uma recompensa."
"You lit fireworks until you could figure out how to draw the Celebrate symbol!": "Você acendeu fogos de artifício até descobrir como desenhar o símbolo Celebrate!"
"You lived as a bat long enough to comprehend the Bat symbol!": "Você viveu como morcego o tempo suficiente para compreender o símbolo do Morcego!"
"You lived as a deer long enough to understand the subtlities of the Deer symbol!": "Você viveu como um cervo por tempo suficiente para entender as sutilezas do símbolo do cervo!"
"You lived as a pig long enough to understand the subtlities of the Pig symbol!": "Você viveu como um porco o suficiente para entender as sutilezas do símbolo do Porco!"
"You lived as a rabbit long enough to understand the subtlities of the Rabbit symbol!": "Você viveu como um coelho o suficiente para entender as sutilezas do símbolo do Coelho!"
"You lived as a spider until you knew the essence of the Spider symbol!": "Você viveu como uma aranha até conhecer a essência do símbolo da Aranha!"
"You look ... sandy. It's not a good look for you. We should work on your complexion next!": "Você parece... arenoso. Não é uma boa aparência para você. Devemos trabalhar na sua pele a seguir!"
"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use a few new vises. If you could bring me 10 vises, that would be great! I'll be happy to share a few tips and tricks that my brother Orran has taught me during our travels in exchange.": "Você parece o tipo ferreiro! Espero que você possa me ajudar. Preciso reabastecer algumas coisas antes de voltarmos à estrada. Eu realmente poderia usar alguns tornos novos. Se você pudesse me trazer 10 tornos, seria ótimo! Ficarei feliz em compartilhar algumas dicas e truques que meu irmão Orran me ensinou durante nossas viagens em troca."
