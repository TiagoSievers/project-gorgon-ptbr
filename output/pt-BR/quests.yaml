"Zukelmux The Intransigent?! I have indeed heard of him... and I am most impressed that you were able to slay him. ...

... Actually, that's outright terrifying. It's hard to believe that a handful of mortals could slay THE Zukelmux...

Actually, I bet it was an imposter! Someone claiming to be Zukelmux! Yes, that must be it.

Even so, good work. Here is your payment for services rendered.": "Zukelmux, o Intransigente?! Na verdade, ouvi falar dele... e estou muito impressionado por você ter conseguido matá-lo. ...

... Na verdade, isso é totalmente assustador. É difícil acreditar que um punhado de mortais pudesse matar O Zukelmux...

Na verdade, aposto que foi um impostor! Alguém que afirma ser Zukelmux! Sim, deve ser isso.

Mesmo assim, bom trabalho. Aqui está o seu pagamento pelos serviços prestados."
"É muito triste, eu sei, mas ela está sob o controle dos miconianos renegados do Tidal. Veja o lado positivo": "as propostas são apenas almôndegas, não cogumelos! Ah, acho que isso não ajuda você, não é?\""
