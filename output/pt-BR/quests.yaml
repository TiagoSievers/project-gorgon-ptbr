"Fiddler over there's immortal, as in 'never grows old' immortal. Nice trick, right? But he can still die of disease! His hoofs are hundreds 'a years old and need to be cleaned. I need one more thing for my cleaning kit: yeti hair. Or any super-strong hair balls, really. Werewolf hair'd do.": "O violinista ali é imortal, como em 'nunca envelhece', imortal. Belo truque, certo? Mas ele ainda pode morrer de doença! Seus cascos têm centenas de anos e precisam ser limpos. Preciso de mais uma coisa para meu kit de limpeza: cabelo de Yeti. Ou qualquer bola de cabelo superforte, na verdade. Cabelo de lobisomem serviria."
