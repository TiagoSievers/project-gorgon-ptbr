"Oritania in Eltibule has information about Dalvos's whereabouts. But she won't tell you unless you help her with some errands first. Get that info!": "A Oritânia em Eltibule tem informações sobre o paradeiro de Dalvos. Mas ela não lhe contará a menos que você a ajude primeiro em algumas tarefas. Obtenha essa informação!"
"Oritania in Eltibule told you about a device used by Dalvos to teleport to another place. The pieces of a spare machine are somewhere in the goblin dungeon below Eltibule Keep. If you find all the pieces listed below, Oritania will give you the final piece.": "Oritania em Eltibule contou sobre um dispositivo usado por Dalvos para se teletransportar para outro lugar. As peças de uma máquina sobressalente estão em algum lugar na masmorra dos goblins abaixo do Forte Eltibule. Se você encontrar todas as peças listadas abaixo, a Oritania lhe dará a peça final."
"Oritania wasn't able to assemble Dalvos's machine. She sent you to find a fairy in Eltibule named Jesina. She lives on Sie Antry's farm, west of Eltibule Keep.": "Oritânia não conseguiu montar a máquina de Dalvos. Ela enviou você para encontrar uma fada em Eltibule chamada Jesina. Ela mora na fazenda de Sie Antry, a oeste de Eltibule Keep."
"Oritania wasn't able to assemble Dalvos's machine. She sent you to find a fairy in Eltibule named Jesina. She lives on Sie Antry's farm, west of Eltibule Keep. ": "Oritânia não conseguiu montar a máquina de Dalvos. Ela enviou você para encontrar uma fada em Eltibule chamada Jesina. Ela mora na fazenda de Sie Antry, a oeste de Eltibule Keep."
"Oritania's Navel Ring": "Anel de umbigo de Oritânia"
"Ormond Neth in Statehelm said, \"Another easy one: practice your Thunderous Note on 50 enemies and then kill them. Pay attention to the efficacy of the note on different types of enemies.\"": "Ormond Neth em Statehelm disse: \"Outra tarefa fácil: pratique sua Nota Trovejante em 50 inimigos e depois mate-os. Preste atenção à eficácia da nota em diferentes tipos de inimigos.\""
"Ormond Neth in Statehelm said, \"Ballads performed at taverns are for the posers. Real bards can create ballads while fighting to the death. Good ballads, too! Keep practicing at it until you get the hang of it.

<i>[Use Virtuoso's Ballad while fighting level 80+ enemies.]</i>\"": "Ormond Neth, em Statehelm, disse: \"Baladas apresentadas em tavernas são para posers. Bardos de verdade podem criar baladas enquanto lutam até a morte. Boas baladas também! Continue praticando até pegar o jeito.

<i>[Use a Balada do Virtuoso enquanto luta contra inimigos de nível 80+.]</i>\""
"Ormond Neth in Statehelm said, \"I know your type: a book learner. You've read about how to muster up a Moment of Resolve and you think you're special. But let's see you create a Moment of Resolve under real danger conditions!\"": "Ormond Neth, em Statehelm, disse: \"Conheço o seu tipo: um aprendiz de livros. Você leu sobre como reunir um Momento de Determinação e se acha especial. Mas vamos ver se você cria um Momento de Determinação sob condições de perigo real!\""
"Ormond Neth in Statehelm said, \"I need your discretion. I cannot be seen talking to my father right now. It would draw attention. Can you deliver this note to him for me? To find my father, follow the bread smell -- he works at the only remaining bakery in Statehelm.\"": "Ormond Neth, em Statehelm, disse: \"Preciso de sua discrição. Não posso ser visto conversando com meu pai agora. Isso chamaria a atenção. Você pode entregar este bilhete a ele para mim? Para encontrar meu pai, siga o cheiro do pão - ele trabalha na única padaria restante em Statehelm.\""
"Ormond Neth in Statehelm said, \"It's crucial that you can push an opponent off-kilter with just an entrancing ditty. Go and practice on reasonably-dangerous opponents.\"": "Ormond Neth, em Statehelm, disse: \"É crucial que você consiga desequilibrar um oponente com apenas uma cantiga fascinante. Vá e pratique em oponentes razoavelmente perigosos.\""
"Ormond Neth in Statehelm said, \"Let's begin your study with a warm-up. Why don't you use your Song of Discord in combat with, hm, let's say... 50 enemies. You needn't slay them SOLELY via Song of Discord, though. That's a later lesson! Just use the ability on them prior to defeating them.\"": "Ormond Neth em Statehelm disse: \"Vamos começar seu estudo com um aquecimento. Por que você não usa sua Canção da Discórdia em combate com, hm, digamos... 50 inimigos. Você não precisa matá-los SOMENTE por meio da Canção da Discórdia, no entanto. Essa é uma lição posterior! Basta usar a habilidade neles antes de derrotá-los. \""
"Ormond Neth in Statehelm said, \"My friend, I must reveal something. I am smitten by Anaberyl! At first I told myself that I was simply looking out for an incredible musician who was in a bad spot. But I haven't ever felt this way before about anyone! She's so... Perfect.

I need you to feel her out for me. I can't do it because she'll feel obligated toward me! That would break my heart -- I don't want to pressure her at all. So just ask if she'd ever be interested in dating a human, if the human was an incredible musician like her.\"": "Ormond Neth em Statehelm disse: \"Meu amigo, devo revelar uma coisa. Estou apaixonado por Anaberyl! No começo eu disse a mim mesmo que estava simplesmente procurando por um músico incrível que estava em uma situação ruim. Mas nunca me senti assim antes por ninguém! Ela é tão... perfeita.

Preciso que você a sinta por mim. Não posso fazer isso porque ela se sentirá obrigada a mim! Isso partiria meu coração – não quero pressioná-la de forma alguma. Então pergunte se ela algum dia estaria interessada em namorar um humano, se o humano fosse um músico incrível como ela.\""
"Ormond Neth in Statehelm said, \"Of course, you must know how to revive the recently-incapacitated. Have you mastered the technique yet? Here: this practice lute may help. \"": "Ormond Neth, em Statehelm, disse: \"Claro, você deve saber como reviver os recentemente incapacitados. Você já domina a técnica? Aqui: esta prática de alaúde pode ajudar.\""
"Ormond Neth in Statehelm said, \"Well you still haven't been forced to do ANY of the supremely difficult things we had to do when I was a student! You think you're so great, huh? Let's see you pull this off: kill enemies with Disharmony. And not harmless enemies either! Just be careful: this test is no joke.

<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>\"": "Ormond Neth, em Statehelm, disse: “Bem, você ainda não foi forçado a fazer NENHUMA das coisas extremamente difíceis que tivemos que fazer quando eu era estudante!

<i>[A desarmonia deve ser o golpe mortal para obter crédito. Morrer redefinirá seu progresso.]</i>\""
"Ormond Neth in Statehelm said, \"You can't be this good. I don't know what your game is, but nobody completes these courses this quickly!

I suppose you're ready for a REAL challenge, then! Um, finish enemies off with bardic blasts. But they have to be sentient enemies! And at night! And you can't wear a hat! And don't die!\"": "Ormond Neth, em Statehelm, disse: “Você não pode ser tão bom. Não sei qual é o seu jogo, mas ninguém conclui esses cursos tão rapidamente!

Suponho que você esteja pronto para um desafio REAL, então! Hum, acabe com os inimigos com explosões bárdicas. Mas eles têm que ser inimigos sencientes! E à noite! E você não pode usar chapéu! E não morra!\""
"Ormond Neth in Statehelm said, \"You've got the basics. Let's get to specifics. You need to know how to blast apart a demon! So go do that. Do it for quite a while and take note of what works and what doesn't. I'll give you a quiz afterwards.\"": "Ormond Neth, em Statehelm, disse: \"Você sabe o básico. Vamos aos detalhes. Você precisa saber como destruir um demônio! Então faça isso. Faça isso por um bom tempo e anote o que funciona e o que não funciona. Farei um teste depois.\""
"Orom said, \"We are in need of more bows for our hunters. I am low on materials. Can you bring me 10 Quality Hunting Bows? I will share some knowledge with you in return.\"": "Orom disse: \"Precisamos de mais arcos para nossos caçadores. Estou com poucos materiais. Você pode me trazer 10 arcos de caça de qualidade? Em troca, compartilharei algum conhecimento com você.\""
"Orom said, \"We are in need of more crossbows for our guards. I am low on materials. Can you bring me 10 Amazing Hunting Crossbows? I will share some knowledge with you in return.\"": "Orom disse: \"Precisamos de mais bestas para nossos guardas. Estou com poucos materiais. Você pode me trazer 10 bestas de caça incríveis? Em troca, compartilharei algum conhecimento com você.\""
"Orom said, \"We need some premium bows for our advanced users. I am low on materials. Can you bring me 10 Awesome Hunting Bows? I will share some knowledge with you in return.\"": "Orom disse: \"Precisamos de alguns arcos premium para nossos usuários avançados. Estou com poucos materiais. Você pode me trazer 10 arcos de caça incríveis? Em troca, compartilharei algum conhecimento com você.\""
"Orrrilund in the Ranalon Den said, \"As expected, a new Den Mother was born or burrowed in from somewhere. If you take care of this one, I'll give you some of these scrolls I found laying around. \"": "Orrrilund, no Ranalon Den, disse: “Como esperado, uma nova Den Mother nasceu ou foi enterrada em algum lugar. Se você cuidar deste, darei a você alguns desses pergaminhos que encontrei por aí."
"Orrrilund in the Ranalon Den said, \"If you're set on getting past this door, you'll have to prove to me you won't die the moment you do. Go kill the Doctrine-Keeper, and when you've done that we'll talk.\"": "Orrrilund, no Ranalon Den, disse: \"Se você está decidido a passar por esta porta, terá que me provar que não morrerá no momento em que o fizer. Vá matar o Guardião da Doutrina e, quando tiver feito isso, conversaremos.\""
"Orrrilund in the Ranalon Den said, \"It looks like another Doctrine-Keeper took the last one's place. If you take care of that one, too, I'll give you something for your troubles.\"": "Orrrilund, na Toca de Ranalon, disse: \"Parece que outro Guardião da Doutrina tomou o lugar do último. Se você cuidar desse também, eu lhe darei algo para seus problemas.\""
"Orrrilund in the Ranalon Den said, \"You found what? You mean they weren't torn completely to shreds? That's great! They were supposed to collect something for me. The next time you're in there, look for a sack that they had and grab it for me. \"": "Orrrilund no Ranalon Den disse: \"Você encontrou o quê? Quer dizer que eles não foram completamente feitos em pedaços? Isso é ótimo! Eles deveriam coletar algo para mim. Na próxima vez que você estiver lá, procure um saco que eles tinham e pegue-o para mim. \""
"Orrrilund in the Ranalon Den said, \"You know what'll really get them to change things up? Taking down the Den Mother. Yes, she'll be replaced by another, but it's about proving to them nothing is safe.\"": "Orrrilund no Ranalon Den disse: \"Você sabe o que realmente fará com que eles mudem as coisas? Derrubar a Den Mother. Sim, ela será substituída por outra, mas trata-se de provar a eles que nada é seguro.\""
"Os colonos Rakshasa trouxeram criaturas ferozes chamadas dwvon para atuar como guardas e companheiros de caça, mas eles se tornaram selvagens após a Guerra de Rahu. Seus descendentes foram apelidados de \\\"tentakillers\\\" pelo famoso colono Povus \\\"Fangy\\\" Lim porque usam seus tentáculos para chocar e desorientar suas presas. E tudo é presa": "grande ou pequena, o tentakiller não discrimina.\""
