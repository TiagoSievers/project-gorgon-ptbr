"Just find a place to work that into your next conversation. But don't use it out of context! Use it right!\": \"Você precisa expandir seu vocabulário útil. Não o seu vocabulário total, o seu vocabulário <i>útil</i>. Você conhece milhares de palavras que nunca pensa em usar na vida diária. Estou certo? Claro que estou certo. Aqui está uma palavra para usar": "'vociferante'."
"Just Kill 'Em": "Apenas mate-os"
"Just looking at these, I can almost feel the back scratcher running up and down my back... ahh, this is going to feel so good. Excuse me, please.": "Só de olhar para isso, quase posso sentir o arranhão subindo e descendo pelas minhas costas... ahh, isso vai ser tão bom. Desculpe-me, por favor."
"Justin Smoot in Statehelm said, \"I was thinking about my friend Az. He's never experienced an orcish birthday. That's when your friends make you medals. Joke medals. Even I had friends in Gazluk. I want to give Azagrus a bit of that experience. Here: this one's perfect. Can you give it to him?\"": "Justin Smoot em Statehelm disse: \"Eu estava pensando em meu amigo Az. Ele nunca teve um aniversário orc. É quando seus amigos fazem medalhas para você. Medalhas de piada. Até eu tinha amigos em Gazluk. Quero dar a Azagrus um pouco dessa experiência. Aqui: este é perfeito. Você pode dar a ele? \""
"Justin Smoot in Statehelm said, \"If you ever find yourself deep in Gazluk Keep, head to the bottom floor and poke around the southern barracks loop. That's where I used to bunk. They would have tossed my medals into one of the storage chests down there. See if you can find my box of medals.\"": "Justin Smoot, em Statehelm, disse: \"Se você se encontrar nas profundezas da Fortaleza de Gazluk, vá até o andar inferior e dê uma olhada no circuito sul do quartel. É onde eu costumava dormir. Eles teriam jogado minhas medalhas em um dos baús lá embaixo. Veja se consegue encontrar minha caixa de medalhas. \""
"Kalaba in Eltibule said, \"Did you know phlogiston comes in many quality levels? The worst kind is 'Unsturdy Phlogiston'. Well, Makara called it 'Shoddy Phlogiston'. Either way, it's garbage. Then there's 'Semi-Sturdy Phlogiston', which Makara calls 'Rough Phlogiston'. It's okay, but not very sturdy.

What I need is Sturdy Phlogiston, which Makara called 'Crude Phlogiston'. Just bring it to me and I'll deliver it.\"

<i>[Hint: Crude Phlogiston comes from magic items whose level is 30+. If you're only getting lower-grade phlogiston, you just need to transmute better items!]</i>": "Kalaba em Eltibule disse: \"Você sabia que o flogisto vem em muitos níveis de qualidade? O pior tipo é o 'flogisto instável'. Bem, Makara o chamou de 'flogisto de má qualidade'. De qualquer forma, é lixo. Depois, há o 'flogisto semi-resistente', que Makara chama de 'flogisto áspero'. Está tudo bem, mas não muito resistente.

O que eu preciso é do Flogisto Robusto, que Makara chamou de 'Flogisto Bruto'. Basta trazê-lo para mim e eu entrego.\"

<i>[Dica: Flogisto bruto vem de itens mágicos cujo nível é 30+. Se você está obtendo flogisto de grau inferior, você só precisa transmutar itens melhores!]</i>"
"Kalaba in Eltibule said, \"I have another delivery of phlogiston for my buyer in the Ilmari desert, but I don't have time to go all that way. I know it's dangerous, but I believe in you: you're sturdy enough to go in my place!

Take this to Makara. She's in the northeast part of the Ilmari desert. She's living in a ruined building with a red-and-white striped tarp for a roof.

And listen to me carefully: when I go to the desert, I always travel with Kleave or at least Oritania. I'm sturdy, but I'm not stupid! The desert is way more dangerous than here. You can still do this, though. Discretion can be sturdy! Avoid confrontation!

Oh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...\"": "Kalaba em Eltibule disse: “Tenho outra entrega de flogisto para meu comprador no deserto de Ilmari, mas não tenho tempo para ir até lá. Sei que é perigoso, mas acredito em você: você é forte o suficiente para ir no meu lugar!

Leve isso para Makara. Ela está na parte nordeste do deserto de Ilmari. Ela está morando em um prédio em ruínas com uma lona listrada vermelha e branca como telhado.

E ouça-me com atenção: quando vou para o deserto, viajo sempre com Kleave ou pelo menos Oritania. Sou resistente, mas não sou estúpido! O deserto é muito mais perigoso do que aqui. Você ainda pode fazer isso. A discrição pode ser resistente! Evite confrontos!

Ah, como você chega a Ilmari? Logo depois das montanhas Kur, ao norte. Você, uh, pode precisar trazer algum equipamento para o clima quente para essa parte da viagem..."
"Kalaba in Eltibule said, \"I've sent the phlogiston off to my buyer, and now she wants some more! I need the same grade of phlogiston as before. Are you up for it?\"": "Kalaba em Eltibule disse: \"Enviei o flogisto para minha compradora e agora ela quer mais! Preciso do mesmo tipo de flogisto de antes. Você está pronto para isso?\""
"Kalaba in Eltibule taught you the basics of Transmutation. He asked you to find weak magical items (\"Uncommon\" rarity items, with a green label) and turn them into Phlogiston. You learned a Transmutation recipe to do this -- it's in your Recipes menu.": "Kalaba em Eltibule ensinou o básico da Transmutação. Ele pediu que você encontrasse itens mágicos fracos (itens de raridade \"incomuns\", com rótulo verde) e os transformasse em flogisto. Você aprendeu uma receita de Transmutação para fazer isso – está no menu Receitas."
"KalabaPhlogistonDelivery": "KalabaPhlogistonEntrega"
"KalabaPhlogistonIntro": "KalabaPhlogistonIntrodução"
"KalabaPhlogistonRepeatable": "KalabaPhlogistonRepetível"
"Kalrod said, \"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride, even our really good chairs. If you can provide us with 10 Amazing Chairs, I can show you a few tricks to help with building better ones in the future!\"": "Kalrod disse: \"Olá! Com vontade de construir algo? Muitas de nossas cadeiras foram quebradas no caminho até aqui por causa da viagem difícil, até mesmo nossas cadeiras realmente boas. Se você puder nos fornecer 10 cadeiras incríveis, posso mostrar alguns truques para ajudar a construir outras melhores no futuro!\""
"Kalrod said, \"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride. If you can provide us with 10 Shoddy Chairs, I can show you a few tricks to help with building better ones in the future!\"": "Kalrod disse: \"Olá! Com vontade de construir algo? Muitas de nossas cadeiras foram quebradas no caminho até aqui por causa da viagem difícil. Se você puder nos fornecer 10 cadeiras de má qualidade, posso lhe mostrar alguns truques para ajudar na construção de cadeiras melhores no futuro!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Astounding Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Kalrod disse: \"Olá! Com vontade de construir algo? Precisamos de caixas novas para transportar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 caixas de armazenamento surpreendentes, posso mostrar alguns truques para ajudar a construir melhores no futuro!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Crude Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Kalrod disse: \"Olá! Com vontade de construir algo? Precisamos de caixas novas para transportar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 caixas de armazenamento bruto, posso mostrar alguns truques para ajudar a construir melhores no futuro!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Nice Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Kalrod disse: \"Olá! Com vontade de construir algo? Precisamos de caixas novas para carregar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 lindas caixas de armazenamento, posso lhe mostrar alguns truques para ajudar a construir melhores no futuro!\""
"Kar-Get on Villas Wake": "Kar-Get em Villas Wake"
"Kasapar in Statehelm said, \"I have enjoyed the tequila, my friend, and it has proven a very interesting talking point among guests. I need more! I shall pay you the same as before. As to the flavor profile, please surprise me with something delicious.\"": "Kasapar, em Statehelm, disse: \"Gostei da tequila, meu amigo, e ela se tornou um assunto muito interessante para os convidados. Preciso de mais! Pagarei o mesmo que antes. Quanto ao perfil de sabor, por favor, surpreenda-me com algo delicioso. \""
"Kasapar in Statehelm said, \"They have many interesting spirits here, but I miss the drink of my homeland. Rahu has the most salivation-inducing tequila! I would love to have a cask delivered.

And of course, this would be a business expense, so I can tap into my generous expense account.\"": "Kasapar em Statehelm disse: \"Eles têm muitas bebidas destiladas interessantes aqui, mas sinto falta da bebida da minha terra natal. Rahu tem a tequila que mais causa salivação! Eu adoraria que me entregassem um barril.

E, claro, isso seria uma despesa comercial, então posso aproveitar minha generosa conta de despesas.\""
"Keep 10 units of bird feed for Irkima": "Guarde 10 unidades de ração para pássaros para Irkima"
"Keep it comin', partner! I'll need another keg in a week!": "Continue assim, parceiro! Vou precisar de outro barril em uma semana!"
"Keep Killing 'Em": "Continue matando-os"
"Keep phoenix egg for Irkima": "Guarde o ovo de fênix para Irkima"
"Keep phoenix feather for Irkima": "Mantenha a pena de fênix para Irkima"
"Keep the Kitchen Stocked": "Mantenha a cozinha abastecida"
"Keep-Me-Alive Juices": "Sucos Keep-Me-Alive"
"Keeping Meat Cold": "Mantendo a carne fria"
"Keeping up the illusion of being a bee is hard enough, but now Spot keeps hounding me for honey. I think she's getting suspicious. And I haven't found a drop of honey since I came to this mortal realm! But I have an idea: myconian jelly! It's this weird stuff that Norbert showed me. I don't know where you get it, but it's delicious! And with a little illusion magic, it'll fool Spot.": "Manter a ilusão de ser uma abelha já é bastante difícil, mas agora Spot continua me perseguindo em busca de mel. Acho que ela está ficando desconfiada. E não encontrei uma gota de mel desde que cheguei a este reino mortal! Mas tenho uma ideia: geleia miconiana! É uma coisa estranha que Norbert me mostrou. Não sei onde você consegue, mas é uma delícia! E com um pouco de magia de ilusão, enganará Spot."
"KeepingMeatCold": "Mantendo a carne fria"
"KeepKillingEm": "Continue matando-os"
