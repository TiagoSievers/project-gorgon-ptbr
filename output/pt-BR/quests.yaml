"Any invasion force would be dumb not to take out the phoenixes on the engine deck. We don't use them in day-to-day operations, but if we have to cold-start an engine, we use their superheated breath.": "Qualquer força de invasão seria burra se não eliminasse as fênix no convés das máquinas. Não os usamos nas operações diárias, mas se tivermos que dar partida a frio em um motor, usamos seu hálito superaquecido."
"Any old femurs will do but please make sure they're clean.": "Quaisquer fêmures velhos servem, mas certifique-se de que estejam limpos."
"AnyScripted": "Qualquer script"
"Anyway": "there's a human named Brandon who needs help making the big party happen. He's in a hamlet in the Ilmari desert. Go help him!\": \"<i>Zhia Lian:</i> Você foi tão prestativo que quero retribuir com uma festa incrível! Você só precisa ajudar a preparar as coisas. Ok, na verdade esta pode ser um pouco complicada... veja, é uma festa de culto. Para o meu culto. Ah, está tudo bem, não se preocupe, não é um culto assassino. É um culto de festa! Ou pelo menos será."
"Anyway, a bunch have escaped Chalice and they're infesting a pumpkin patch in Serbule Hills. Kill them before they do something that embarrasses me!\": \"<i>Zhia Lian:</i> Ótimo, você é definitivamente competente! Isso significa que você pode ajudar com um problema um pouco estranho": "há alguns milhares de anos, muito antes de morrer, Urtigal me ensinou como criar mortos-vivos. E os primeiros monstros que criei eram mortos-vivos bobos que podem assombrar as plantas. Eles são realmente bregas. Eu estava apenas brincando!"
"Anyway, I want to try this fake milk I've been hearing about. I'll teach you the recipe if you don't know it. I picked it up from a dead goat.\": \"Ordenhar vacas insensíveis é exploração! Ou acho que pode ser": "essa questão da moralidade é <i>difícil</i>. E não há vacas sencientes suficientes para todos."
"Anyway, I want to try this fake milk I've been hearing about. I'll teach you the recipe if you don't know it. I picked it up from a dead goat.\\\"\": \"Ricatu em Povus disse": "\\\"Ordenhar vacas não sencientes é exploração! Ou acho que pode ser - essa coisa de moralidade é <i>difícil</i>. E não há vacas sencientes suficientes para todos."
"Anyway, I was at a party last week and you'll never guess who showed up": "the other undead gods! So I got to talking with them. It turns out Chalice is in close alignment with Alharth right now, and they're flooding the continent with undead!"
"Anyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.\": \"Você esperaria que as luzes das fadas fossem muito fáceis de chegar aqui no reino das fadas. Todas essas fadas podem fazer luzes brilhantes! Mas Pegast diz que não podem desperdiçá-los com frivolidades. E isso se transforma na mesma discussão que sempre tenho com esses caras": "o que NÃO É frívolo para um imortal?"
"Anyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.\\\"\": \"Backfat no Reino Fae disse": "\\\"Você esperaria que as luzes das fadas fossem muito fáceis de chegar aqui no reino das fadas. Todas essas fadas podem fazer luzes brilhantes! Mas Pegast diz que eles não podem desperdiçá-las em frivolidades. E isso se transforma no mesmo argumento que sempre tenho com esses caras: o que NÃO É frívolo para um imortal?"
"Anyway, just another reason to make sure wasps are kept far from here.\": \"Boa viagem, eu digo. Tenho uma teoria sobre aquelas Vespas da Perdição ao sul daqui": "acho que elas são descendentes de uma vespa e de uma abelha! Raina diz que isso é impossível, a abelha rainha simplesmente seria morta pelas vespas e não botaria seus ovos. Mas talvez aconteça o contrário! Hum? Abelhas se aproximando de uma rainha vespa? Teoria interessante, certo?"
"Anyway, think you could whip up something similar? You'll have to find the recipe yourself.\\\"\": \"Ricatu em Povus disse": "\\\"Eu costumava gostar muito de espetinhos de carne. Há algo <i>primitivo</i> em arrancar pedaços de carne de um palito pontudo. Quero dizer, isso é nojento para mim agora, mas... Foi divertido."
"Aposto que eles estão no limite. Basta ir e matar mais cem deles. Não importa de que tipo": "vivo ou morto, basta matar ratkin!\\\"\""
