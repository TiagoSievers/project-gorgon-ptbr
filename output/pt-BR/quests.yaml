"Rohina in Sun Vale said, \"Druids aren't just tree-lovers. We're deeply invested in the balance of nature, and that's not always pretty. Not to non-druids, anyway. I'll show you - the spiders near here sometimes feed on small shore birds. Bring me some of the prey feathers.\"": "Rohina em Sun Vale disse: \"Os druidas não são apenas amantes de árvores. Investimos profundamente no equilíbrio da natureza, e isso nem sempre é bonito. Pelo menos não para os não-druidas. Vou mostrar a vocês - as aranhas perto daqui às vezes se alimentam de pequenos pássaros costeiros. Traga-me algumas das penas de presas.\""
"Rohina in Sun Vale said, \"I may not be the best druid, but I still know how to appreciate nature! In fact, I'm pretty good at growing flowers! Just not trees, I guess.

You can find a lot of seeds on the creatures around here - I guess maybe because of our influence? No idea where they get the seeds from, but if you bring me some I'll teach you how to properly appreciate nature.\"": "Rohina em Sun Vale disse: \"Posso não ser o melhor druida, mas ainda sei apreciar a natureza! Na verdade, sou muito bom em cultivar flores! Só que não em árvores, eu acho.

Você pode encontrar muitas sementes nas criaturas por aqui - acho que talvez por causa da nossa influência? Não faço ideia de onde eles tiram as sementes, mas se você me trouxer algumas, eu lhe ensinarei como apreciar a natureza adequadamente.\""
