"See Gorvessa over there? She's pretty amazing, huh? And I hear she's only 'temporarily' Malvol's consort. Which means I have a chance! I need a gift, though. Can you get me a goblin hairpin? I'll imbue it with magic and impress her.": "Está vendo a Gorvessa ali? Ela é incrível, né? E ouvi dizer que ela é apenas 'temporariamente' consorte de Malvol. O que significa que tenho uma chance! Eu preciso de um presente, no entanto. Você pode me arranjar um grampo de goblin? Vou imbuí-lo de magia e impressioná-la."
"See how much more range of motion you have when you free your limbs? Take that lesson with you. Think about how to apply that knowledge without reducing your survivability.": "Veja quanto mais amplitude de movimento você tem quando libera seus membros? Leve essa lição com você. Pense em como aplicar esse conhecimento sem reduzir sua capacidade de sobrevivência."
"See if you can make that mulberry wine. It's a good dessert wine. Probably good for parties!": "Veja se você consegue fazer aquele vinho de amora. É um bom vinho de sobremesa. Provavelmente bom para festas!"
"See the giant mushrooms off in the distance? Yeah, those are new. Not even a year old, in fact, and whatever it means, it's definitely bad.

But you look like the sort who will wander over there anyway. If you do, can you pick some false agaric for me?

You can find false agaric all around Povus, so if you <i>aren't</i> brave, just look elsewhere.": "Vê os cogumelos gigantes à distância? Sim, esses são novos. Na verdade, nem tem um ano de idade, e seja lá o que isso signifique, é definitivamente ruim.

Mas você parece do tipo que vai passear por lá de qualquer maneira. Se sim, você pode escolher algum agárico falso para mim?

Você pode encontrar falsos agáricos por todo Povus, então se você <i>não</i> for corajoso, procure outro lugar."
"See Unora in Statehelm": "Veja Unora em Statehelm"
"See, what did I tell you? These flitterbies smell better! There's a distinct citrus smell that kind of masks their other odors.

That means these are real flitterbies, not some weird lookalike. Thank you for helping me prove that. My upcoming botanical book needs to be extremely accurate.": "Veja, o que eu te disse? Esses flitterbies cheiram melhor! Há um cheiro cítrico distinto que mascara seus outros odores.

Isso significa que estes são flitterbies reais, não alguns sósias estranhos. Obrigado por me ajudar a provar isso. Meu próximo livro botânico precisa ser extremamente preciso."
"See? It's all uphill from here! Sorry about the scarring and hair loss, though...": "Ver? É tudo difícil a partir daqui! Desculpe pelas cicatrizes e pela queda de cabelo..."
"See? See! They ARE prank bombs! I didn't kill them! It was those bastard Snowbloods!

Wait. There are my friends! Can you see them? You can see them too, right?": "Ver? Ver! Eles SÃO bombas de brincadeira! Eu não os matei! Foram aqueles bastardos Snowbloods!

Espere. Aí estão meus amigos! Você pode vê-los? Você também pode vê-los, certo?"
"See?! What did I tell you? We're gonna be rich! Slim wants a HUNDRED orders of those cinnamon-blasted bananas! And I'll split the profits with you right down the line! That's an old pirate term, you probably don't know it. It means an even split of the loot!

Get to cookin' and don't let us down!": "Ver?! O que eu te disse? Seremos ricos! Slim quer CEM pedidos daquelas bananas com canela! E dividirei os lucros com você no futuro! Esse é um termo pirata antigo, você provavelmente não conhece. Isso significa uma divisão uniforme do saque!

Comece a cozinhar e não nos decepcione!"
"Seed": "Semente"
"Seek out the \\\"Lungers\\\". They're causing the most harm right now. Oh, and the dark-casting skeletons. Oh and also the fiery ones.\\\"\": \"Steven Poplar em Statehelm disse": "\\\"Arisetsu despreza os mortos-vivos. Como qualquer pessoa sã deveria! Estou sempre atento a possíveis incidentes com mortos-vivos e detectei um por perto."
"Seek out this Elmetaph and force him to fix these calculations.\\\"\": \"Truxartis em Vidaria disse": "\\\"O diário de Khyrulek está quase correto, mas seus cálculos estão desatualizados devido à mudança planar. Eles devem ser recalibrados por um... sábio de teletransporte."
"Seen them green bears out there? They're dangerous as hell, but don't bother killin' em, they're fey! They just come right back a week later! And so do those damned green panthers, must be fey too. But there are some ordinary bears that follow 'em around, charmed by their magic. Kill those ordinary bears and we can at least start to lower the danger!": "Viu os ursos verdes por aí? Eles são muito perigosos, mas não se preocupe em matá-los, eles são feéricos! Eles voltam uma semana depois! E o mesmo acontece com aquelas malditas panteras verdes, também devem ser fadas. Mas existem alguns ursos comuns que os seguem, encantados com sua magia. Mate esses ursos comuns e poderemos pelo menos começar a diminuir o perigo!"
"Selaxi in Amulna asked for some carrots. She mentioned that there's a small garden lot in Amulna where you could grow them.": "Selaxi em Amulna pediu algumas cenouras. Ela mencionou que há um pequeno jardim em Amulna onde você pode cultivá-los."
"Selaxi in Amulna has asked you to obtain giant hairballs. The most common source is grimalkin in the desert.": "Selaxi em Amulna pediu que você conseguisse bolas de pelo gigantes. A fonte mais comum é Grimalkin no deserto."
"Sem the Myconian (in a cave in New Prestonbule) said, \"Although my species is generally able to cohabit with slimes and fungi of all types, there exist herein a species that reduces the ambient temperature. This is clearly unacceptable behavior. Please extinguish these slimes before they make the environment uninhabitable!\"": "Sem, o Myconian (em uma caverna em New Prestonbule) disse: \"Embora minha espécie seja geralmente capaz de coabitar com limos e fungos de todos os tipos, existe aqui uma espécie que reduz a temperatura ambiente. Este é um comportamento claramente inaceitável. Por favor, extinga esses limos antes que tornem o ambiente inabitável!\""
"Sem the Myconian (in a cave in New Prestonbule) said, \"It is atypical for members of my species to desire the destruction of meatlings. However, the snails in this cavern are of egregious proportions and they enjoy consuming many of the same food sources that I do. They also enjoy consuming me directly. For this reason, I request their dissolution.\"": "Sem, o Myconian (em uma caverna em New Prestonbule) disse: \"É atípico que membros da minha espécie desejem a destruição de carnes. No entanto, os caracóis nesta caverna são de proporções flagrantes e gostam de consumir muitas das mesmas fontes de alimento que eu. Eles também gostam de me consumir diretamente. Por esse motivo, solicito sua dissolução.\""
"Sem the Myconian (in a cave in New Prestonbule) said, \"One single meat creature that inhabits this cavern is so poisonous and foul that I am unable to filter out its toxins, and must flee if it approaches. This creature was bred for some ill purpose. I know this from spying upon the minds of green-skinned bipeds that came to feed it. They called the creature 'Murklinger'. It would please me to no longer need to fear this creature.\"": "Sem, o Myconian (em uma caverna em New Prestonbule) disse: \"Uma única criatura de carne que habita esta caverna é tão venenosa e nojenta que sou incapaz de filtrar suas toxinas e devo fugir se ela se aproximar. Esta criatura foi criada para algum propósito ruim. Eu sei disso por espionar as mentes de bípedes de pele verde que vieram alimentá-la. Eles chamaram a criatura de 'Murklinger'. Eu ficaria feliz em não precisar mais temer essa criatura. \""
"Sentience Slaughter": "Massacre da Senciência"
"Sentient": "Senciente"
"Sentient Mushrooms!": "Cogumelos Sencientes!"
"Sentimental Jewelry": "Joias sentimentais"
"SentimentalJewelry": "Joias sentimentais"
"Ser Hackley at the Council Headquarters could give you blueprints for the bug bombs, if you know how to read such things.\\\"\": \"Cynthia Rolfe, em Statehelm, disse": "\\\"Não, não acho que você possa ajudar com esse problema das baratas. Preciso de algumas dessas bombas sofisticadas, mas são difíceis de encontrar."
"Ser Hackley in Statehelm said, \"Great job with the sewers, but right now we have another problem. Graffiti is getting out of control. If anyone on the Council notices, they'll take drastic, horrific, actions, like, I dunno, making the walls sentient so that they become easily enraged. Or perhaps making the town walls out of pure unlife. Whatever it is, it'll be much worse than what we have, which just requires a bit of good old fashioned hard work. By you.

I can sell you the necessary graffiti cleaner. Don't worry, it's reimbursed by the payment for the job! I can sell you a bucket if you need one. Fill it with water, find graffiti, and scrub!

<i>[To remove graffiti, place the Scrub Graffiti ability on your sidebar. Obtain Graffiti Cleaner. Then stand near graffiti and use the ability.]</i>\"": "Sor Hackley, em Statehelm, disse: \"Ótimo trabalho com os esgotos, mas agora temos outro problema. O grafite está ficando fora de controle. Se alguém no Conselho perceber, tomará ações drásticas e horríveis, como, não sei, tornar as paredes sensíveis para que fiquem facilmente enfurecidos. Ou talvez transformar as muralhas da cidade em pura não-vida. Seja o que for, será muito pior do que o que temos, o que requer apenas um pouco de bom e velho trabalho duro. Por você.

Posso lhe vender o limpador de graffiti necessário. Não se preocupe, é reembolsado pelo pagamento do trabalho! Posso lhe vender um balde se precisar. Encha-o com água, encontre grafites e esfregue!

<i>[Para remover graffiti, coloque a habilidade Scrub Graffiti na barra lateral. Obtenha o Limpador de Graffiti. Então fique perto do graffiti e use a habilidade.]</i>\""
"Ser Hackley in Statehelm said, \"I've got reliable reports that there are dangerous winter fairies hiding out somewhere in the sewer. They apparantly hide out in two of the big sewage-sieve rooms. Better take care of both rooms.\"": "Sor Hackley, em Statehelm, disse: \"Tenho relatos confiáveis ​​de que há perigosas fadas do inverno escondidas em algum lugar no esgoto. Elas aparentemente se escondem em duas das grandes salas com peneira de esgoto. É melhor cuidar de ambas as salas.\""
"Ser Hackley in Statehelm said, \"If you're going to take care of the sneaky sewer fae, you might as well go a bit beyond that point and look for an outbreak of sentient mushroom people.

Look, that's what the report says. I haven't met any mushroom people personally, but magic can do a lot of terrible things. Remember not to breathe weird spores!\"": "Sor Hackley, em Statehelm, disse: “Se você vai cuidar das fadas sorrateiras do esgoto, é melhor ir um pouco além desse ponto e procurar por um surto de pessoas sencientes em forma de cogumelo.

Olha, é isso que diz o relatório. Não conheci pessoalmente nenhum cogumelo, mas a magia pode fazer muitas coisas terríveis. Lembre-se de não respirar esporos estranhos!\""
"Ser Hackley in Statehelm said, \"Ready for more scrubbing? Great! I'll pay you the same as before. You can buy graffiti cleaner from me, or trade with me if you have other cleaners.\"": "Sor Hackley, em Statehelm, disse: \"Pronto para mais limpeza? Ótimo! Pagarei o mesmo que antes. Você pode comprar limpador de graffiti de mim ou negociar comigo se tiver outros produtos de limpeza.\""
"Ser Hackley in Statehelm said, \"Ready for more weeding? Excellent. I'll pay you the same as before.\"": "Sor Hackley, em Statehelm, disse: \"Pronto para mais remoção de ervas daninhas? Excelente. Pagarei a você o mesmo de antes.\""
"Ser Hackley in Statehelm said, \"Ready to fix more malfunctioning lamps? Excellent. I'll pay you same as before.\"": "Sor Hackley, em Statehelm, disse: \"Pronto para consertar mais lâmpadas com defeito? Excelente. Pagarei o mesmo que antes.\""
"Ser Hackley in Statehelm said, \"The sewers use a magical solvent to clean and repurpose waste material, and they're supposed to be maintenance-free. Hah. I need you to go down there and clear out some of the clogs in the system. Can you do that? Here's a key to the sewer manholes. Don't get killed down there.

<i>[Manholes Unlocked!]</i>\"": "Sor Hackley em Statehelm disse: \"Os esgotos usam um solvente mágico para limpar e reaproveitar resíduos, e eles deveriam ser isentos de manutenção. Hah. Preciso que você vá até lá e limpe algumas das obstruções do sistema. Você pode fazer isso? Aqui está uma chave para os bueiros de esgoto. Não morra lá embaixo.

<i>[Bueiros desbloqueados!]</i>\""
"Ser Hackley in Statehelm said, \"Two years ago the Council started a \"green up the city\" initiative, where anyone who wanted to grow plants in the city would get free maintenance from utility golems. Those utility golems have all been repurposed for the war effort -- I mean the demonic incident -- and now the city is overgrowing with weeds! I trust you can handle weeding a plant? Most of them are indoors, so you may have to poke around for them. Oh, also, take that opportunity to put a fertilizer stick in the soil. I have some for sale or trade -- don't worry, you'll make your money back!

<i>[To weed a plant, place the Weed Plants ability on your sidebar, obtain Fertilizer Sticks, then stand near a weedy potted plant and use the Weed Plants ability.]</i>\"": "Sor Hackley em Statehelm disse: \"Dois anos atrás, o Conselho iniciou uma iniciativa de\" tornar a cidade mais verde \", onde qualquer pessoa que quisesse cultivar plantas na cidade receberia manutenção gratuita de golens utilitários. Esses golens utilitários foram todos reaproveitados para o esforço de guerra - quero dizer, o incidente demoníaco - e agora a cidade está coberta de ervas daninhas! Confio que você consegue lidar com a remoção de ervas daninhas de uma planta? A maioria deles está dentro de casa, então você pode ter que fuçar em busca deles. Ah, também, aproveite essa oportunidade para colocar um bastão de fertilizante no solo, tenho alguns para venda ou troca - não se preocupe, você receberá seu dinheiro de volta!

<i>[Para remover ervas daninhas de uma planta, coloque a habilidade Plantas Daninhas na barra lateral, obtenha Varetas Fertilizantes, fique perto de um vaso de plantas com ervas daninhas e use a habilidade Plantas Daninhas.]</i>\""
"Ser Hackley in Statehelm said, \"We've replaced every single oil lamp with a modern heating-crystal system that turns itself on at night and off in the morning. A true wonder of innovation! Except dwarves have already had these for centuries, but let's not go there. Anyway, the design is very new and we're still working out the kinks. Well, we WERE before the demons showed up. Right now we're just trying to keep things running as best we can. We lose lamps every night!

But I've become convinced it's less about a design flaw and more about... something else. See, when the lamps break they become overcharged. In this state they can also overcharge other nearby lamps! The darkness can spread, making whole areas unsafe. And, of course, vampires are always ready to take advantage of these outages to feed on the unsuspecting.

Take some replacement bulbs and fix broken lamps tonight. I'll reimburse you for the lamps.\"": "Sor Hackley em Statehelm disse: \"Substituímos todas as lâmpadas a óleo por um moderno sistema de aquecimento de cristal que liga sozinho à noite e desliga pela manhã. Uma verdadeira maravilha da inovação! Exceto que os anões já os têm há séculos, mas não vamos lá. De qualquer forma, o design é muito novo e ainda estamos resolvendo os problemas. Bem, éramos antes dos demônios aparecerem. No momento, estamos apenas tentando manter as coisas funcionando da melhor maneira que podemos. Perdemos lâmpadas a cada noite!

Mas estou convencido de que se trata menos de uma falha de design e mais de... outra coisa. Veja, quando as lâmpadas quebram elas ficam sobrecarregadas. Neste estado também podem sobrecarregar outras lâmpadas próximas! A escuridão pode se espalhar, tornando áreas inteiras inseguras. E, claro, os vampiros estão sempre prontos para aproveitar essas interrupções para se alimentar dos desavisados.

Pegue algumas lâmpadas de reposição e conserte as lâmpadas quebradas esta noite. Eu reembolsarei você pelas lâmpadas.\""
"Ser Lorentz in Vidaria said, \"I guess you're ready to move up to tougher demons. The soldiers are next. They're tough, but the scariest part is their disease. Or maybe it's a curse, I dunno. I'm no sage! Anyway, they spread Hellfire sickness. I can give you some balm for afterwards, but... try your best not to get too much hellfire on you. It saps your life away. To me, it's the scariest thing on this battlefield. Fight smart.\"": "Sor Lorentz em Vidaria disse: \"Acho que você está pronto para passar para demônios mais durões. Os soldados são os próximos. Eles são durões, mas a parte mais assustadora é a doença deles. Ou talvez seja uma maldição, não sei. Não sou sábio! De qualquer forma, eles espalham a doença do Fogo do Inferno. Posso lhe dar um bálsamo para depois, mas... tente o seu melhor para não deixar muito fogo do inferno sobre você. Isso mina sua vida. Para mim, é a coisa mais assustadora do mundo. neste campo de batalha."
"Ser Lorentz in Vidaria said, \"I knew I forgot something! When I asked you to kill those swarmers, you were supposed to scoop up their brains and bring them back. The mages have a 'theory'.

I know this wasn't your fault, so I'm happy to overlook this incident if you can head back out into the field and get those brains.\"": "Sor Lorentz em Vidaria disse: “Eu sabia que esqueci uma coisa! Quando pedi para você matar aqueles enxameadores, você deveria recolher seus cérebros e trazê-los de volta.

Eu sei que isso não foi culpa sua, então estou feliz em ignorar esse incidente se você puder voltar a campo e pegar esses cérebros.\""
"Ser Lorentz in Vidaria said, \"Thanks for getting those brains. They apparently confirmed Mr. Blueheart's theory. Have you met him? He's in camp here. Squirrely man, but his heart's in the right place. Anyway, I have another request from him. You know those skulls with wings near the walls? Yeah, kill those and get a sample of their blood.

I know, skulls don't have blood! But he says there's blood in the wings.\"": "Sor Lorentz em Vidaria disse: \"Obrigado por conseguir esses cérebros. Eles aparentemente confirmaram a teoria do Sr. Blueheart. Você o conheceu? Ele está no acampamento aqui. Homem esquisito, mas seu coração está no lugar certo. De qualquer forma, tenho outro pedido dele. Você conhece aqueles crânios com asas perto das paredes? Sim, mate-os e obtenha uma amostra de seu sangue.

Eu sei, crânios não têm sangue! Mas ele diz que há sangue nas asas.\""
"Ser Lorentz in Vidaria said, \"We are fully stocked up on supplies now, and it's time to take the fight to the demons! Gather your own troops, and help us cull these endless hordes.\"": "Sor Lorentz em Vidaria disse: \"Estamos totalmente abastecidos de suprimentos agora, e é hora de lutar contra os demônios! Reúna suas próprias tropas e ajude-nos a abater essas hordas intermináveis.\""
"Ser Lorentz in Vidaria said, \"We need all the help we can get. The demons seem to be never-ending, and our supplies are ever-dwindling. Armor, weapons, rations - you name it, we need it! Statehelm is providing as many as they can, but it's simply not enough. Can we count on you and your people to aid us?\"": "Sor Lorentz em Vidaria disse: \"Precisamos de toda a ajuda que pudermos obter. Os demônios parecem não ter fim e nossos suprimentos estão cada vez mais escassos. Armaduras, armas, rações - você escolhe, nós precisamos! Statehelm está fornecendo tantos quanto podem, mas simplesmente não é suficiente. Podemos contar com você e seu povo para nos ajudar?\""
"Ser Lorentz in Vidaria said, \"Well if you think you're a capable fighter, we can always use help dealing with the demonic swarmers. Be careful, or they'll overwhelm you!\"": "Sor Lorentz em Vidaria disse: \"Bem, se você se acha um lutador capaz, sempre precisamos de ajuda para lidar com os enxames demoníacos. Tenha cuidado, ou eles irão dominá-lo!\""
"Serbule Crypt": "Cripta de Sérbulo"
"Serbule desperately needs more traveling circuses to show up. But we're too small. So we need to facilitate trade! Go: go trade! Trade with other adventurers like yourself, so that the word starts to spread.": "Serbule precisa desesperadamente que mais circos itinerantes apareçam. Mas somos muito pequenos. Portanto, precisamos facilitar o comércio! Vá: vá negociar! Negocie com outros aventureiros como você, para que a notícia comece a se espalhar."
