"Há um porém": "ele só fala goblinês. Rick o confrontou, mas o goblinês de Rick é pobre e ele não tem certeza se entendeu tudo. Por acaso você é fluente? Se sim, você poderia falar com Urzab sobre o atentado contra minha vida?\\\"\""
"I <i>am</i> related to Gloria Stonecurl. She is my sister. I have not seen her in an age, mostly because... well, I don't want to get into it right now. But if you happen upon her in your travels, would you tell her that her wee old brother sends his regards?\\\"\": \"Drummond Stonecurl em Vidaria disse": "\\\"Não fui totalmente honesto com você e, desde minha explosão sobre o orc, tenho pensado que deveria ser mais aberto. Então, aqui vai..."
"I acknowledge your deeds, but still the ratkin attack! You have merely stunted their progress. But your efforts are noble nonetheless. Should you have the stomach to continue killing them, I would be grateful.": "Reconheço seus atos, mas ainda assim o ataque dos ratkins! Você apenas atrapalhou o progresso deles. Mas mesmo assim seus esforços são nobres. Se você tiver estômago para continuar matando-os, eu ficaria grato."
"I also have a new spell that I am willing to teach you.\": \"Deixe-me ver a jóia. Hum. Muito bom. Espere... Você não ativou o modo de proteção agressivo da gema. Eu não te ensinei o truque para isso? Bem, deixa pra lá. Aqui": "eu habilitei para você. Talvez seja útil para você agora que está ativado."
"I also need something to inhibit my memories of despair... it makes the Juice last longer. Some ditzy elf gave me a few bottles last week, but she said she can't make enough to keep me going. Elves": "always flaking out when you need 'em! Ahem... no offense to you and your friends, of course.\": \"Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não consigo sentir esperança durante um ano inteiro."
"I also need you to open some of their storage chests and take note of the contents. You should be able to find keys aboard the ship. Good luck. Bring friends.\\\"\": \"Lady Alethina no Red Wing Casino disse": "\\\"Espero que você seja tão bom quanto pensa que é, porque este é complicado. Entre no reino das fadas perto de Sun Vale. Há uma nave de inverno lá; esgueire-se a bordo. Em seguida, encontre alguma criatura pássaro chamada... Hmm, minhas anotações dizem \\\"Coldfeather\\\", mas também há algo chamado \\\"Hotfeather\\\" a bordo. Mate os dois, por segurança."
"I am <i>so</i> bored here, stuck in this giant red ice cube. I was sent here for one purpose and one purpose only, to destroy as much life as possible on this stupid rock. But there's no chance that's happening now. But maybe the outcome can still be achieved... I tell you what. Go out and end lives in my name, and I will tell you whatever you want to know about the invading demon force. Deal?": "Estou <i>tão</i> entediado aqui, preso neste gigante cubo de gelo vermelho. Fui enviado aqui com um único propósito: destruir o máximo de vida possível nesta rocha estúpida. Mas não há nenhuma chance de que isso esteja acontecendo agora. Mas talvez o resultado ainda possa ser alcançado... Vou lhe dizer uma coisa. Saia e acabe com vidas em meu nome, e eu lhe direi tudo o que você quiser saber sobre a força demoníaca invasora. Negócio?"
"I am an expert staff fighter, but not an expert staff maker... yet. I wish to learn the trade. The mantises suggested that I start with worthless oak wood, but that is foolish! Even my first attempts will be masterpieces if I can find materials of high enough quality. Do you happen to have any masterpiece-quality oak?": "Eu sou um lutador especialista em equipe, mas não um especialista em criação de equipe... ainda. Desejo aprender o ofício. Os louva-a-deus sugeriram que eu começasse com madeira de carvalho sem valor, mas isso é tolice! Mesmo minhas primeiras tentativas serão obras-primas se eu conseguir encontrar materiais de qualidade suficientemente alta. Por acaso você tem algum carvalho com qualidade de obra-prima?"
"I am grateful. These will prohibit my sporing for several more seasons so that I may have further adventures in the overworld. Would you like these? They are but toys to my kind, but dangerous weapons to your kind.": "Estou grato. Isso proibirá meu uso de esporos por mais algumas temporadas, para que eu possa ter mais aventuras no mundo superior. Você gostaria disso? Eles são apenas brinquedos para a minha espécie, mas armas perigosas para a sua."
"I am impressed with your effort! Less so with the results, for while this was perhaps once a Naturesphere, it is now inert. I wonder what its story was. Typically when a Naturesphere is used, it becomes part of the area's history, for it always leads to terrible cataclysms. Perhaps that is why there are no more dwarves in Borghild... or perhaps this was something else entirely.

I am somewhat satisfied that no active Naturesphere is lying around in a cave near here. You have helped put my mind at ease, and for that I grant you this. It is quite dangerous. Maybe don't use it at first... wait until your skill increases a bit.": "Estou impressionado com seu esforço! Menos ainda com os resultados, pois embora esta talvez tenha sido uma vez uma Naturesphere, agora é inerte. Eu me pergunto qual foi a sua história. Normalmente, quando uma Naturesphere é usada, ela se torna parte da história da área, pois sempre leva a cataclismos terríveis. Talvez seja por isso que não há mais anões em Borghild... ou talvez isso seja algo totalmente diferente.

Estou um tanto satisfeito por não haver nenhuma Naturesphere ativa em uma caverna perto daqui. Você ajudou a me tranquilizar e, por isso, eu lhe concedo isso. É muito perigoso. Talvez não use no início... espere até que sua habilidade aumente um pouco."
"I am overwhelmed with work requests! This is a good thing, but I am just not able to keep up! I must learn to say 'no', I suppose. But it is too late for that now. Are you capable of making tools? I could use your help in filling a simpler order: I need six good skinning knives.": "Estou sobrecarregado com solicitações de trabalho! Isso é bom, mas simplesmente não consigo acompanhar! Devo aprender a dizer “não”, suponho. Mas agora é tarde demais para isso. Você é capaz de fazer ferramentas? Sua ajuda poderia ser útil para atender a um pedido mais simples: preciso de seis facas boas para esfolar."
"I am putting horseshoes on wild deer for... reasons... and need a quantity of your least-expensive wares.": "Estou colocando ferraduras em cervos selvagens por... motivos... e preciso de uma quantidade de seus produtos mais baratos."
"I am running low on lac. Normally we trade with the orcs for it, but their ships have been fewer in number of recent months. I suppose there are local sources, though: giant beetles, for instance. But I suspect the easiest way to get it is the Urak creatures that the orcs use as war-beasts. A pity there are none around here! If you meet an orcish trader, can you purchase any lac they have? I shall repay you.": "Estou com pouco lac. Normalmente negociamos com os orcs por isso, mas seus navios têm diminuído em número nos últimos meses. Suponho que existam fontes locais: besouros gigantes, por exemplo. Mas suspeito que a maneira mais fácil de obtê-lo são as criaturas Urak que os orcs usam como feras de guerra. Pena que não há ninguém por aqui! Se você encontrar um comerciante orc, você pode comprar algum lac que ele tenha? Eu lhe recompensarei."
"I am so relieved. Thank you so much! I will teach you something useful to your trade. Just don't use it on me.": "Estou tão aliviado. Muito obrigado! Vou te ensinar algo útil para o seu comércio. Só não use isso em mim."
"I am so sick of Summoned Council Rations. Can you get me some fresh meat? How about ham? No! Venison!": "Estou farto das Rações do Conselho Convocado. Você pode me trazer um pouco de carne fresca? Que tal presunto? Não! Carne de veado!"
"I am the wind!": "Eu sou o vento!"
"I am young for my kind, but I am already sporing! My adventures into the overworld have caused me to bloom prematurely. I am not ready to clone myself, so I must delay the sporing. Do you have some of the inhibitor medicine? Your kind calls it 'Blusher Mushrooms'. I need much of it.": "Sou jovem para a minha espécie, mas já estou esporando! Minhas aventuras no mundo superior me fizeram florescer prematuramente. Não estou pronto para me clonar, então devo adiar o sporing. Você tem algum medicamento inibidor? Sua espécie chama isso de 'Cogumelos Blusher'. Eu preciso muito disso."
"I apologize. I should have thought of this earlier": "Dreva's boons are not quite the same as Ri-Shin's boons, are they? But fear not, because I believe I can share this one with you."
"I appreciate the effort. The longer we can keep up business as usual, the less frightened and problematic our citizenry will be. Let me know if you have time to do more weeding.": "Agradeço o esforço. Quanto mais tempo conseguirmos manter os negócios como sempre, menos assustados e problemáticos ficarão os nossos cidadãos. Deixe-me saber se você tiver tempo para fazer mais capina."
"I appreciate the hard work! But... I have bad news. I've been reading this book some more, and I don't think replacing the gear is enough. It's missing the pendulum weight mechanism, too! But these parts are a start. Thanks!": "Eu aprecio o trabalho duro! Mas... tenho más notícias. Tenho lido este livro um pouco mais e não acho que substituir o equipamento seja suficiente. Também está faltando o mecanismo de peso do pêndulo! Mas essas partes são um começo. Obrigado!"
"I appreciate the help with the squid beasts! Now maybe I can catch a fish in peace!": "Agradeço a ajuda com as feras lulas! Agora talvez eu consiga pescar um peixe em paz!"
"I appreciate you keeping the lamps lit. Those evil vampires are behind the outages -- I'm sure of it, I just don't have any proof! ... Or anything I could do about it anyway. But your continued efforts are thwarting whatever evil scheme is going on!": "Agradeço por manter as lâmpadas acesas. Esses vampiros malvados estão por trás dos cortes de energia – tenho certeza disso, só não tenho nenhuma prova! ... Ou qualquer coisa que eu pudesse fazer sobre isso de qualquer maneira. Mas seus esforços contínuos estão frustrando qualquer esquema maligno que esteja acontecendo!"
"I asked Dorimir if I could hang the bones you brought me as well, since you went to all the effort, but he hinted that they would be a grim reminder of our guests' mortality, and thus inappropriate. But they will not go to waste": "Tavilak expressed enthusiasm about using them for fertilizer. Thank you for your effort!\": \"Ah, os ossos! Devo me desculpar: depois de conversar com Dorimir Fangblade, aprendi que “rolar os ossos” é uma expressão idiomática para jogar dados. E acontece que temos um grande estoque de dados em mãos, então usaremos apenas os que estão na árvore!"
"I bequeath to you the title of Warsmith. Among orcs, few reach this height. And yet I suspect you have even greater feats ahead. I shall be watching.": "Eu lego a você o título de Warsmith. Entre os orcs, poucos alcançam esta altura. Mesmo assim, suspeito que você tenha feitos ainda maiores pela frente. Estarei observando."
"I bet I can grow these! Here, let me show you how wonderful nature can be!": "Aposto que posso cultivar isso! Aqui, deixe-me mostrar como a natureza pode ser maravilhosa!"
"I bet that steak is still out there in one of those craters. Can you bring it to me?\\\"\": \"O clarividente Flemmings em Statehelm disse": "\\\"Um soldado me contou uma história muito peculiar ontem, e acho que sei o que está acontecendo. Mas é muito perigoso para mim investigar! Você pode fazer isso?"
"I bet that they're at their breaking point. Just go and kill another hundred of 'em. Doesn't matter what kind": "living or dead, just kill ratkin!\\\"\": \"Glortok nos Esgotos de Rahu disse: “Droga, como você pode ter matado centenas de inimigos e ainda assim o caminho para casa ainda está cheio de arrepios?!"
"I bet those fuckers hid my salami aboard the ships out there. They would have stayed away from the Salty Slattern, if that's any help to ya. You should hurry. The stench is evil. And no snacking on it!\\\"\": \"Sourgum em Statehelm disse": "\\\"Eu estava bêbado ontem - isso é gíria de marinheiro, você provavelmente não sabe - significa que eu estava EXTREMAMENTE bêbado. Eu aprendi muitas gírias de marinheiro, mas todo mundo sabe que tenho medo do oceano. Por causa dos krakens. Então eu desmaio e quando acordo há um bilhete que diz 'Seu salame foi navegar, venha nos encontrar!'"
"I can fight goblins. I can fight spiders. But the frogs? Those 'ranalons', as they call themselves? They're just too thick in number. It's too hard to fight 'em one at a time!

But, uh... I told our pretty waitress that I'd killed thousands of 'em. Can you help me out? I just need one of their hideous tongues as a 'souvenir' to show to Lana.": "Eu posso lutar contra goblins. Eu posso lutar contra aranhas. Mas os sapos? Esses 'ranalons', como eles se autodenominam? Eles são muito numerosos. É muito difícil lutar contra eles um de cada vez!

Mas, uh... eu disse à nossa linda garçonete que matei milhares deles. Você pode me ajudar? Eu só preciso de uma de suas línguas horríveis como 'lembrança' para mostrar à Lana."
"I can make some really good crab gumbo, but I need some crabs! Can you bring me 5 of the suckers?": "Posso fazer um gumbo de caranguejo muito bom, mas preciso de alguns caranguejos! Você pode me trazer 5 dos otários?"
"I can no longer sing, but in my dreams I still can. When I wake, my throat is quite sore. Can you fetch some bitter-mint tea for me?\\\"\": \"Rebeccah, a Sussurradora, em Statehelm, deu-lhe um bilhete que dizia": "\\\"Parabéns! Eu sabia que você era um estudante avançado quando ouvi sua música."
"I can smell their defeat on you...you really booped 'em! Great job! Here's your bunny juices, use them wisely! Also, here's a little something extra in case somebody tries to boop you! If you haven't already, be sure to visit my other two cousins Lopsy and Flopsy to complete your training.": "Posso sentir o cheiro da derrota deles em você... você realmente os surpreendeu! Ótimo trabalho! Aqui estão seus sucos de coelho, use-os com sabedoria! Além disso, aqui está uma coisinha extra caso alguém tente bater em você! Se ainda não o fez, não deixe de visitar meus outros dois primos Lopsy e Flopsy para completar seu treinamento."
"I can teach you how to make it in exchange for a fresh brie.\\\"\": \"Braigon em Eltibule disse": "\\\"O tofu pode ser feito de três maneiras principais. O tofu macio é ainda mais pastoso do que o tofu normal. Pessoalmente, acho que tem um gosto nojento, mas talvez você seja mais culto do que eu!"
"I can teach you to craft wolf armor of astounding quality, blessed by my consort Norala. For while her wolves are strong, her smiths are weak! And weakness is not tolerated long in war. You will aid them to be war-worthy.

But Norala's boon requires the death of the largest, most horrific creatures. No ordinary orc or human shall do!": "Posso ensiná-lo a fabricar armaduras de lobo de qualidade surpreendente, abençoadas por minha consorte Norala. Pois embora seus lobos sejam fortes, seus ferreiros são fracos! E a fraqueza não é tolerada por muito tempo na guerra. Você os ajudará a serem dignos de guerra.

Mas a bênção de Norala exige a morte das maiores e mais horríveis criaturas. Nenhum orc ou humano comum servirá!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Mild Cheddar Cheese, I will share some of my cheesemaking experience with you!": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Serrold e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo cheddar suave, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Mild Cheddar Cheese, I will share some of my cheesemaking experience with you!

": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Serrold e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo cheddar suave, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Raclette Cheese, I will share some of my cheesemaking experience with you!": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Serrold e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo Raclette, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Raclette Cheese, I will share some of my cheesemaking experience with you!

": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Serrold e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo Raclette, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Edam Cheese, I will share some of my cheesemaking experience with you!": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Torana e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo Edam, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Edam Cheese, I will share some of my cheesemaking experience with you!

": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Torana e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo Edam, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Feta Cheese, I will share some of my cheesemaking experience with you!": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Torana e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo feta, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Feta Cheese, I will share some of my cheesemaking experience with you!

": "Posso dizer que você é um queijeiro... você tem esse cheiro! Fazer queijo em qualquer lugar sempre pode ser difícil, e realmente precisaríamos de um estoque de algo diferente do que Torana e eu carregamos. Se você estiver disposto a me trazer 10 pedaços de queijo feta, compartilharei com você um pouco da minha experiência na fabricação de queijos!"
"I can tell your spirits are low. Your spirit needs to do battle with the spirit of the predator. The shark predator! Defeat a shark in an epic struggle, and I guarantee you'll feel better.": "Posso dizer que seu ânimo está baixo. Seu espírito precisa lutar contra o espírito do predador. O tubarão predador! Derrote um tubarão em uma luta épica e garanto que você se sentirá melhor."
"I can't believe you did it! You beat the game! I guess I'm not cursed after all. That means... hey, that means I was just unlucky! Which means my luck should turn around any time now! Thanks! It's time to gamble!": "Não acredito que você fez isso! Você venceu o jogo! Acho que não estou amaldiçoado, afinal. Isso significa... ei, isso significa que eu simplesmente tive azar! O que significa que minha sorte deve mudar a qualquer momento! Obrigado! É hora de jogar!"
"I can't believe you did it! You're a better angler than the orcs that live around here! And if you promise to use it for good, I will teach you how to be even more irresistable.": "Não acredito que você fez isso! Você é um pescador melhor que os orcs que vivem por aqui! E se você prometer usar para o bem, vou te ensinar como ser ainda mais irresistível."
"I can't open my shop with these roaches here. If you had bug bombs, you could clear it out for me. I'd reward you!

I'd do it myself but my bug bombs were sabotaged. Yes, I know what that sounds like!

I think Ser Hackley in the Council building sells plans for bug bumbs, if you're into gadgeteering?": "Não posso abrir minha loja com essas baratas aqui. Se você tivesse bombas contra insetos, poderia limpar para mim. Eu recompensaria você!

Eu mesmo faria isso, mas minhas bombas de insetos foram sabotadas. Sim, eu sei o que isso parece!

Acho que Sor Hackley, no prédio do Conselho, vende planos para insetos, se você gosta de engenhocas?"
"I can't pay you in Councils but I can do much better": "I can pay you in exposure. I'll tell everyone who shops here about how great you are, and what a valuable addition to Statehelm you've become.\": \"Tenho clientes voltando à loja! Mas tenho vendido meus pães com prejuízo e não posso continuar fazendo isso por muito tempo. O problema são os impostos sobre os grãos entregues. Eles estão muito altos! Então eu estava pensando... Talvez você pudesse entregá-los para mim?"
"I can't stop thinking about Rita. I know all elves are beneath me, but... oh, if only there was some way! But maybe I'm being a fool... can you find out if she has feelings for me?": "Não consigo parar de pensar na Rita. Eu sei que todos os elfos estão abaixo de mim, mas... ah, se ao menos houvesse alguma maneira! Mas talvez eu esteja sendo um idiota... você pode descobrir se ela sente algo por mim?"
"I convinced them to give me the location of another scorpion-filled pit. You're the only agent I trust in this desert -- aside from the Seer, of course -- so this one's all yours. There are two objectives this time": "get my xedrite, and also get me a sample from one of these scorpions. Look for a decently scary-looking one, kill it, and bring back... well, just bring the whole thing back, I guess. The Seer wants to examine it."
"I could really use some more glass so I can make more of these rings. Bring me some green glass and we can get started on yours!": "Eu realmente poderia usar mais vidro para poder fazer mais desses anéis. Traga-me um pouco de vidro verde e podemos começar a fazer o seu!"
"I could use your assistance! I hear there is a speed potion that a lot of folks craft around here to get around easier. Could you get me 10 of those Agonizing Speed Potions? I need to reverse engineer them so I can make them for the whole group.": "Eu poderia usar sua ajuda! Ouvi dizer que existe uma poção de velocidade que muita gente cria por aqui para se locomover com mais facilidade. Você poderia me conseguir 10 daquelas Poções de Velocidade Agonizantes? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo."
"I could use your assistance! I hear there is a speed potion that a lot of folks craft around here to get around easier. Could you get me 10 of those Agonizing Speed Potions? I need to reverse engineer them so I can make them for the whole group.

": "Eu poderia usar sua ajuda! Ouvi dizer que existe uma poção de velocidade que muita gente cria por aqui para se locomover com mais facilidade. Você poderia me conseguir 10 daquelas Poções de Velocidade Agonizantes? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo."
"I could use your assistance! I hear there is an orcish potion that can enhance your combat readiness.  Could you get me 10 of those Gur-Hortas? I need to reverse engineer them so I can make them for the whole group.": "Eu poderia usar sua ajuda! Ouvi dizer que existe uma poção orc que pode melhorar sua prontidão para o combate.  Você poderia me conseguir 10 desses Gur-Hortas? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo."
"I could use your assistance! I hear there is an orcish potion that can enhance your combat readiness.  Could you get me 10 of those Gur-Hortas? I need to reverse engineer them so I can make them for the whole group.

": "Eu poderia usar sua ajuda! Ouvi dizer que existe uma poção orc que pode melhorar sua prontidão para o combate.  Você poderia me conseguir 10 desses Gur-Hortas? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo."
"I could use your assistance! I swear it feels like most of these people have the memory capcity of a clownfish around here!  Could you get me 20 Memory Enhancers? I need to reverse engineer them so I can make them for the whole group.": "Eu poderia usar sua ajuda! Juro que parece que a maioria dessas pessoas tem a capacidade de memória de um peixe-palhaço por aqui!  Você poderia me conseguir 20 intensificadores de memória? Preciso fazer engenharia reversa para poder fazê-los para todo o grupo."
"I crave fresh lifeblood! But I am too... Busy to obtain it myself. Go and fetch it for me. Speak with Grasuul, he seems to... Know where to find the easiest lifeblood.": "Eu anseio por sangue fresco! Mas estou muito... ocupado para obtê-lo sozinho. Vá e pegue para mim. Fale com Grasuul, ele parece... Saber onde encontrar a força vital mais fácil."
"I desperately needed this sale to pay some debts. So... Thanks again!\": \"Ah, você encontrou todos eles? Afinal, não deve ter sido tão difícil de encontrar, né? Bem, acordo é acordo": "aqui está sua metade do pagamento."
"I despise Malgath Croonswallow. Who is he, you ask? The long-dead ass who created this Geas of Mild Yet Unrelenting Affection! This has been quite a tedious and inane procedure. But it is done. Here: I've prepared the enchanted horn full of vindaloo. Now you need merely convince Alzaneth to eat it. Just a single bite will do!": "Eu desprezo Malgath Croonswallow. Quem é ele, você pergunta? O idiota morto há muito tempo que criou este Geas de afeto suave, mas implacável! Este foi um procedimento bastante tedioso e fútil. Mas está feito. Aqui: preparei o chifre encantado cheio de vindaloo. Agora você só precisa convencer Alzaneth a comê-lo. Basta uma única mordida!"
"I did the glued-coin gag to Jenny. I stuck them to the table and watched her struggle to pull them off. She was at it for a while and she wasn't laughing at all! So I ran over and stopped her.

I explained everything: how it was your idea, how you're fully to blame, and how I would never, ever, EVER do a prank to her again. Thanks for taking the heat for me!

What? You DID enable the prank. You can't be blameless in this!

Okay, look, I know I screwed up. Social scenarios with mortals are extremely tricky! Can you forgive me? I can't have you as an enemy! You're more terrifying than Jenny! I thought you'd understand!

Calm down, I know how to fix this: my prank fund! You can have it! It's a treasure chest full of precious gems. At least I think it is. I can't open it! But I have a plan on how to get it open. Here's what I need.": "Fiz a piada da moeda colada para Jenny. Prendi-os na mesa e observei-a lutar para tirá-los. Ela ficou nisso por um tempo e não estava rindo de jeito nenhum! Então eu corri e a parei.

Expliquei tudo: como foi ideia sua, como você é totalmente culpado e como eu nunca, jamais, NUNCA faria uma pegadinha com ela novamente. Obrigado por aguentar a pressão por mim!

O que? Você habilitou a pegadinha. Você não pode ser inocente nisso!

OK, olha, eu sei que estraguei tudo. Cenários sociais com mortais são extremamente complicados! Você pode me perdoar? Não posso ter você como inimigo! Você é mais assustador do que Jenny! Achei que você entenderia!

Calma, eu sei como resolver isso: meu fundo de pegadinhas! Você pode ficar com isso! É um baú cheio de joias preciosas. Pelo menos eu acho que é. Não consigo abrir! Mas tenho um plano sobre como abri-lo. Aqui está o que eu preciso."
"I didn't lay in enough cedar wood chips for all the cooking that Laura's been doing. She brings in lots of customers and I don't want her to get upset!

I have plenty of maple wood, but she only uses cedar for cooking. Can you get some more?": "Não coloquei lascas de madeira de cedro suficientes para toda a comida que Laura tem feito. Ela atrai muitos clientes e não quero que ela fique chateada!

Tenho bastante madeira de bordo, mas ela só usa cedro para cozinhar. Você pode conseguir mais?"
"I do appreciate what you've done to stop Grosark. But I've bad news: what you slew was merely Grosark's bodily husk, a sort of meat puppet that he wore because he didn't realize that liches don't need them. But the good news is that he doesn't know enough about his powers to be particularly dangerous to our realm yet. Some of his soul is in Acur, and the rest of it is trapped here, bodiless, in what is called an astral state.

But the bad news is that he can escape this state easily if he only knew how, and he is researching furiously. I've detected his presence near the ivory library. He can't get in, of course, even in astral form, but it shows that he knows what he needs. It's only a matter of time.

But the good news is that long ago I researched the perfect ritual for this situation. The Statehelm graveyard may seem an ordinary one, but it was actually configured by the Council to support extreme necromantic rituals. You can use that place to pull Grosark into our realm now, while he is weak and confused. It's the only way. Aside from the myriad other ways, of course, but it's the only way I recommend.

Here are the notes. Follow them diligently. And bring a friend. No, bring an army! No, that would be chaos. Bring between five and fifteen friends.

Oh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.": "Agradeço o que você fez para impedir Grosark. Mas tenho más notícias: o que você matou foi apenas a casca corporal de Grosark, uma espécie de fantoche de carne que ele usou porque não percebeu que os liches não precisam deles. Mas a boa notícia é que ele ainda não sabe o suficiente sobre seus poderes para ser particularmente perigoso para o nosso reino. Parte de sua alma está em Acur, e o resto está preso aqui, sem corpo, no que é chamado de estado astral.

Mas a má notícia é que ele pode escapar facilmente desse estado se souber como, e está pesquisando furiosamente. Detectei a presença dele perto da biblioteca de marfim. Ele não consegue entrar, é claro, nem mesmo na forma astral, mas isso mostra que ele sabe do que precisa. É apenas uma questão de tempo.

Mas a boa notícia é que há muito tempo pesquisei o ritual perfeito para esta situação. O cemitério de Statehelm pode parecer comum, mas na verdade foi configurado pelo Conselho para apoiar rituais necromânticos extremos. Você pode usar esse lugar para trazer Grosark para o nosso reino agora, enquanto ele está fraco e confuso. É a única maneira. Além de inúmeras outras maneiras, é claro, mas é a única que recomendo.

Aqui estão as notas. Siga-os diligentemente. E traga um amigo. Não, traga um exército! Não, isso seria um caos. Traga entre cinco e quinze amigos.

Oh! Você precisará de uma vela de invocação. Você pode fazê-los? Não, deixa pra lá, deixe-me ensinar exatamente como fazer isso com segurança. Não faz sentido transformar você em um pudim ectoplasmático. É uma vela relativamente simples... Espero que você conheça uma estação de fabricação de velas. Há um convenientemente localizado na cripta."
"I do not give commandments to my children. Trolls can form alliances with anyone they want! But that doesn't mean I will stand idly by when a pack of potent war-trolls comes here and starts wreaking havoc! These winter trolls are extremely powerful and need to be stopped. Remember: I only want you to kill the giant blue trolls, not the green ones.": "Não dou mandamentos aos meus filhos. Os Trolls podem formar alianças com quem quiserem! Mas isso não significa que ficarei de braços cruzados quando um bando de poderosos trolls de guerra chegar aqui e começar a causar estragos! Esses trolls de inverno são extremamente poderosos e precisam ser detidos. Lembre-se: eu só quero que você mate os trolls azuis gigantes, não os verdes."
"I do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!\": \"Ontem senti medo. Por que eu deveria sofrer com medo?! Eu sou imortal! No entanto, eu temia. Fui caçado por outro imortal": "um verdadeiro barghest, e tive medo! Eu o matei, mas sabia que ele voltaria, e por isso meu medo só aumentou!"
"I do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!\\\"\": \"Uriana, no reino das fadas, disse": "\\\"Ontem experimentei medo. Por que deveria sofrer medo?! Eu sou imortal! Mesmo assim, tive medo. Fui caçado por outro imortal: um verdadeiro barghest, e tive medo! Eu o matei, mas sabia que ele retornaria, e então meu medo só aumentou!"
"I do not understand. Azalak wants to mate, but does not want to die? ... He suggests deer carcasses instead?!

The concept disturbs me. I am a romantic at heart. No. Tell him that I expect my suitor to bite the dust, as they say in your idiom.": "Eu não entendi. Azalak quer acasalar, mas não quer morrer? ... Ele sugere carcaças de veado?!

O conceito me perturba. Eu sou um romântico de coração. Não. Diga a ele que espero que meu pretendente morra, como dizem em seu idioma."
"I do understand that this is a peaceful holiday. But if we want the people of Rahu to be excited, it needs to incorporate some of our culture! Traditionally our celebrations feature trophies from our fallen enemies. But we are at peace right now... so perhaps the least-offensive trophies would be from fellow rakshasa. The vile bandits in the desert prey upon the weak and the pitiful. Kill them, sever their ears, and bring them back. Oh, and please try to focus on bandits with big healthy ears.": "Eu entendo que este é um feriado tranquilo. Mas se quisermos que o povo de Rahu fique entusiasmado, é necessário incorporar um pouco da nossa cultura! Tradicionalmente, as nossas celebrações apresentam troféus dos nossos inimigos caídos. Mas estamos em paz agora... então talvez os troféus menos ofensivos sejam os dos companheiros rakshasa. Os vis bandidos do deserto atacam os fracos e os lamentáveis. Mate-os, corte suas orelhas e traga-os de volta. Ah, e por favor, tente se concentrar em bandidos com orelhas grandes e saudáveis."
"I don't even know what this one is. A kuvou? I guess that's like a bison? Anyway, I need a perfect hide from one.": "Eu nem sei o que é esse. Um kuvou? Eu acho que é como um bisão? De qualquer forma, preciso de um esconderijo perfeito."
"I don't get much work in animal husbandry any more, but I got an order from an old customer, and I would love to fill it! But what he needs is an aphrodesiac for his pet bees! Of all the weird pets, bees are way up there. I do know how to make what he needs... I just need some high-quality tallow. Could I ask you to render some for me?": "Não trabalho mais com criação de animais, mas recebi um pedido de um cliente antigo e adoraria atendê-lo! Mas o que ele precisa é de um afrodesíaco para suas abelhas de estimação! De todos os animais de estimação estranhos, as abelhas estão lá em cima. Eu sei fazer o que ele precisa... só preciso de um pouco de sebo de boa qualidade. Posso pedir que você renderize alguns para mim?"
"I don't have any recipes for that -- you'll have to find one yourself!\\\"\": \"Kelim em Amulna disse": "“Se Ricatu acha que meus temperos vão ajudar seu peru falso, mais poder para ele. Por que você não cozinha para ele uma refeição de peru falso e pergunta qual é o gosto?"
"I don't know how to make butter, can you believe it? And I'm a farmer! Heh! But I just grow crops. If I grew animals I'd be a rancher. So anyway, get me some butter?": "Não sei fazer manteiga, acredita? E eu sou agricultor! Ei! Mas eu apenas cultivo. Se eu criasse animais, seria fazendeiro. De qualquer forma, me traga um pouco de manteiga?"
"I don't know if you believe me or not about these Myconians. But I need you to believe! Go out there and find yourself some. And kill them! Kill a dozen! Then come back. I'll know you did the deed. The stink will be all over you. Go now. Do it.": "Não sei se você acredita em mim ou não sobre esses Myconianos. Mas eu preciso que você acredite! Vá lá e encontre alguns. E mate-os! Mate uma dúzia! Então volte. Eu saberei que você cometeu o crime. O fedor estará em cima de você. Vá agora. Faça isso."
"I don't think fairies would appreciate normal tree ornaments. But Marrowchomp had a great idea for something much better! It's a pixie-dust shower. Almost completely safe! And we already have most of the parts. I just need some pixie dust, and some piping.": "Não acho que as fadas apreciariam enfeites normais de árvores. Mas Marrowchomp teve uma ótima ideia para algo muito melhor! É um banho de pó mágico. Quase completamente seguro! E já temos a maior parte das peças. Eu só preciso de um pouco de pó mágico e um pouco de tubulação."
"I don't understand why those trees are down here. And I hate that! The ratkin stay away from there, as if they know some secret. I hate that, too! Kill the trees!": "Não entendo por que essas árvores estão aqui embaixo. E eu odeio isso! Os ratkin ficam longe dali, como se soubessem de algum segredo. Eu também odeio isso! Mate as árvores!"
"I don't want to ask Stephie for the parts, though, because that would go on our ledger. This isn't business, it's just an old dwarf messin' around! ... Say, maybe you could help me out? Here's some of the stuff I need. There's more, but this is the hard stuff.\\\"\": \"Tremmond Blackhammer em Povus disse": "\\\"Não sou um engenheiro ou ferreiro, mas estava pensando em construir um braço de suporte automatizado simples. Nada sofisticado, apenas algo um pouco mais inteligente do que uma pinça C!"
"I explained everything": "how it was your idea, how you're fully to blame, and how I would never, ever, EVER do a prank to her again. Thanks for taking the heat for me!"
"I f-f-filled up my a-a-alchemy journal. My hoof-w-writing is s-so l-l-large! C-can you get m-me some m-more b-blank books? I th-think Preta the f-fairy sells s-s-some.": "Eu preenchi meu diário de alquimia. Minha escrita de casco é tão grande! V-você pode me arranjar mais alguns livros em branco? Acho que Preta, a fada, vende alguma coisa."
"I fear an invasive species from another continent has taken hold in some of the old war bunkers. There are weird whirlwinds in that area and I've never seen those here... but they remind me of the terrible desert spiders of Fosulf. I hope I'm mistaken!

If this is the creature I fear, it will be protected by a powerful wind. Shooting arrows into it will be difficult, and most weapons will have reduced effect. But these creatures have a weakness: explosions! Burst magic, bombs, explosion sigils... whatever you have, use it.": "Temo que uma espécie invasora de outro continente tenha se instalado em alguns dos antigos bunkers de guerra. Há redemoinhos estranhos naquela área e nunca os vi aqui... mas eles me lembram as terríveis aranhas do deserto de Fosulf. Espero estar enganado!

Se esta é a criatura que temo, ela será protegida por um vento poderoso. Atirar flechas nele será difícil e a maioria das armas terá efeito reduzido. Mas estas criaturas têm um ponto fraco: explosões! Magia de explosão, bombas, sigilos de explosão... tudo o que você tiver, use."
"I found a most interesting item yesterday, and entirely by chance. The tempestuous young Rakshasa that sells dyes -- I forget her name -- had a scroll for sale. This scroll is covered in geometric lines that closely resemble the area's ley lines. It was quite warm to the touch, too. It's quite fascinating. I assumed it was the work of some sage, but she said they're very common in her home city and that many people there can make them. If you go to Rahu, see if you can find some for me.": "Encontrei um item muito interessante ontem, e inteiramente por acaso. A tempestuosa jovem Rakshasa que vende tinturas – esqueci o nome dela – tinha um pergaminho à venda. Este pergaminho é coberto por linhas geométricas que se assemelham muito às linhas ley da área. Estava bastante quente ao toque também. É muito fascinante. Presumi que fosse obra de alguma sábia, mas ela disse que são muito comuns em sua cidade natal e que muitas pessoas de lá podem fazê-los. Se você for para Rahu, veja se consegue encontrar alguns para mim."
"I found one of these delicious morsels in Statehelm once and tried to track down the source. All I know is that they're from a place called Serbule.": "Certa vez, encontrei um desses deliciosos pedaços em Statehelm e tentei rastrear a fonte. Tudo o que sei é que são de um lugar chamado Serbule."
"I found reference to another gale-chanting spot, and this one is right outside of Statehelm! Unfortunately, it's underwater. I suppose the waterline has moved since it was first made. So hold your breath and look for it past the docks. Summon a tornado there, and you should be able to access an unusual weather form. Kill it and get its heart.

And then you should run. It might have a guardian itself, and you wouldn't want to run into that.": "Encontrei referência a outro local de canto de vendaval, e este fica nos arredores de Statehelm! Infelizmente, está debaixo d'água. Suponho que a linha d'água mudou desde que foi feita. Então prenda a respiração e procure-o além das docas. Invoque um tornado lá e você poderá acessar uma forma de clima incomum. Mate-o e pegue seu coração.

E então você deveria correr. Ele pode ter um guardião e você não gostaria de se deparar com isso."
"I found the perfect topper for the tree! It's a chunk of that soul-rock stuff the fairies use for everything. It looks like a tiny lifestone! But there's bad news: Pegast says it's not actually from a lifestone. It's a part of an old defense turret, and it could re-activate at any time, killing all non-fae in the area. That would be a terrible way to die.

Don't worry, there's apparently a way to disable it. It's complicated, but it'll be worth the effort! We need mercury, winterprize, and some wire.": "Encontrei o topper perfeito para a árvore! É um pedaço daquele soul rock que as fadas usam para tudo. Parece uma pequena pedra vital! Mas há más notícias: Pegast diz que na verdade não é de uma pedra vital. Faz parte de uma antiga torre de defesa e pode ser reativada a qualquer momento, matando todos os não-fae na área. Essa seria uma maneira terrível de morrer.

Não se preocupe, aparentemente há uma maneira de desativá-lo. É complicado, mas valerá a pena o esforço! Precisamos de mercúrio, prêmio de inverno e alguns fios."
"I found this amazing stuff for sale in Statehelm once but I can't find where it originates from. I guess \"Myconian\" is the name of its creator... sounds like a dwarven name to me. Maybe he's a merchant.": "Uma vez encontrei esse material incrível à venda em Statehelm, mas não consigo descobrir de onde ele vem. Acho que \"Myconian\" é o nome de seu criador... parece um nome anão para mim. Talvez ele seja um comerciante."
"I give up. I'm out of ideas.

Well we can't have you just staying around here, can we? You should go kill a thousand more ratkin. Just keep killing until you die. Or until a thousand ratkin are dead! It's a win-win! For me, I mean.

What? Of course I'll make it worthwhile, buddy: if you kill a thousand ratkin I'll give you 10 pieces of xedrite. Totally worth your time, right?": "Desisto. Estou sem ideias.

Bem, não podemos deixar você ficar por aqui, podemos? Você deveria matar mais mil ratkins. Continue matando até morrer. Ou até que mil ratkin morram! É uma situação em que todos ganham! Para mim, quero dizer.

O que? Claro que farei valer a pena, amigo: se você matar mil ratkin eu te dou 10 pedaços de xedrita. Vale totalmente o seu tempo, certo?"
"I graciously accept your gift of potions! Did you make these yourself? It can't be that difficult, then!

If this works out, it could be just the thing to survive the heat of the deserts back home. Not that my people need heat protection, of course, but I can sell it to less-hardy species! I bet the ranalons will pay well for it...": "Aceito graciosamente seu presente de poções! Você mesmo fez isso? Não pode ser tão difícil, então!

Se isso der certo, pode ser a solução ideal para sobreviver ao calor dos desertos em casa. Não que meu povo precise de proteção térmica, é claro, mas posso vendê-la para espécies menos resistentes! Aposto que os ranalons vão pagar bem por isso..."
"I guess it's my orcish side, but I just think I'd be so much happier if he were dead!\\\"\": \"Leah Bowman em Povus disse": "“Mamãe sempre me disse para perdoar e esquecer meu pai."
"I guess you need to talk to Chaf too. The thing is that Chaf is perfectly fine. Zhia Lian only gave him a single coin when he wished for money, but that's really not a bad outcome when you ask Zhia Lian for a favor! Yet he has never stopped complaining.

Chaf's a gambler, always has been, and very superstitious. He insists that Zhia's coin is cursed. He also drinks a lot, and I'm afraid he's going to show up at the party and make a scene in front of Zhia. And that would be awful. Not just for him: for everyone!

Go talk to him -- he's already arrived at the casino (big shocker). He loves dice games, so look for him there.": "Acho que você precisa falar com Chaf também. O problema é que Chaf está perfeitamente bem. Zhia Lian só deu a ele uma única moeda quando ele desejou dinheiro, mas isso não é um resultado ruim quando você pede um favor a Zhia Lian! Mesmo assim, ele nunca parou de reclamar.

Chaf é um jogador, sempre foi, e muito supersticioso. Ele insiste que a moeda de Zhia está amaldiçoada. Ele também bebe muito e temo que apareça na festa e faça cena na frente de Zhia. E isso seria horrível. Não só para ele: para todos!

Vá falar com ele – ele já chegou ao cassino (grande choque). Ele adora jogos de dados, então procure por ele lá."
"I guess you're ready to move up to tougher demons. The soldiers are next. They're tough, but the scariest part is their disease. Or maybe it's a curse, I dunno. I'm no sage! Anyway, they spread Hellfire sickness. I can give you some balm for afterwards, but... try your best not to get too much hellfire on you. It saps your life away. To me, it's the scariest thing on this battlefield. Fight smart.": "Acho que você está pronto para passar para demônios mais difíceis. Os soldados são os próximos. Eles são durões, mas a parte mais assustadora é a doença. Ou talvez seja uma maldição, não sei. Eu não sou nenhum sábio! De qualquer forma, eles espalham a doença do Fogo do Inferno. Posso lhe dar um bálsamo para depois, mas... tente o seu melhor para não deixar cair muito fogo do inferno sobre você. Isso esgota sua vida. Para mim, é a coisa mais assustadora neste campo de batalha. Lute com inteligência."
"I had a thought about the tree-mutants down here. Have you tried pruning them? You have? But they just wilt away? Hmmm.

Well, there must be some way to save part of the tree. Try chopping them up after you kill them and see what you can find.": "Pensei nas árvores mutantes daqui. Você já tentou podá-los? Você tem? Mas eles simplesmente murcham? Hmmm.

Bem, deve haver alguma maneira de salvar parte da árvore. Tente cortá-los depois de matá-los e veja o que consegue encontrar."
"I had a thought: how relaxed are these ratkin? Sneak into their home areas and kick them! Now, I only need to know about the off-duty ones: do they fight, or flee, or something else? Of course, you can kick whoever you want! But for this test, it has to be the off-duty ones.": "Eu pensei: quão relaxados são esses ratkin? Entre furtivamente em suas áreas de origem e chute-os! Agora, só preciso saber dos que estão fora de serviço: eles brigam, ou fogem, ou outra coisa? Claro, você pode chutar quem quiser! Mas para esse teste tem que ser os que estão fora de serviço."
"I had hoped to master the phrenological areas of humans and elves from the corpses in this crypt, but I didn't find nearly enough skulls. Could you find some humanoid skulls for me? There should be a few lying around in here. Or heck, if you have some from elsewhere, I'd take those too. I just need to continue my studies!": "Eu esperava dominar as áreas frenológicas de humanos e elfos a partir dos cadáveres desta cripta, mas não encontrei crânios suficientes. Você poderia encontrar alguns crânios humanóides para mim? Deve haver alguns por aqui. Ou, diabos, se você tiver alguns de outro lugar, eu os levaria também. Eu só preciso continuar meus estudos!"
"I had some bug bombs in the back room, just in case roaches should show up again. But when I came in today, I found all my bug bombs had been punctured. But I think I can fix them! If I just had some some glue. And something to help reactivate it.": "Eu tinha algumas bombas contra insetos na sala dos fundos, para o caso de as baratas aparecerem novamente. Mas quando cheguei hoje, descobri que todas as minhas bombas de insetos tinham sido perfuradas. Mas acho que posso consertá-los! Se eu tivesse um pouco de cola. E algo para ajudar a reativá-lo."
"I hate how hunters always talk about their big game, but they don't have scars. How dangerous could it be if you don't even get maimed? So go get hurt. That'll give you a much more authentic hunting story to tell me.": "Odeio como os caçadores sempre falam sobre sua grande caça, mas eles não têm cicatrizes. Quão perigoso poderia ser se você nem fosse mutilado? Então vá se machucar. Isso lhe dará uma história de caça muito mais autêntica para me contar."
"I hate the smell of raw fish, but I sometimes like the smell of fried fish. Weird, right?

Hmm, go and cook some fish. Maybe the smell will waft towards me.": "Odeio o cheiro de peixe cru, mas às vezes gosto do cheiro de peixe frito. Estranho, certo?

Hmm, vá cozinhar um pouco de peixe. Talvez o cheiro flutue em minha direção."
"I hate to ask you to do this, but I need you to deal with as many Frostbelches as you can.\\\"\": \"Ferris Blueheart em Vidaria disse": "\\\"Não podemos deixar isso acontecer. Não podemos deixar os demônios se fundirem com os Frostbelches. [Ferris olha em volta, claramente em pânico.] Receio que não tenhamos escolha. Temos que destruir os Frostbelches antes que seja tarde demais. Meu coração está com as criaturinhas fofas, mas realmente não há outra maneira."
"I have a ... delicate request to make. You see, my spell pouch is depleted, and I cannot take the time to travel all the way home to replenish it. But there are other orcish wizards in the area, and some of them have spell pouches. Could you choose some of the stupider ones and kill them for their pouches? Make it look like an accident, if you can.": "Tenho um... pedido delicado a fazer. Veja, minha bolsa de feitiços está esgotada e não posso perder tempo viajando até casa para reabastecê-la. Mas existem outros magos orcs na área, e alguns deles possuem bolsas de feitiços. Você poderia escolher alguns dos mais estúpidos e matá-los por suas bolsas? Faça com que pareça um acidente, se puder."
"I have a big test coming up at school and I need to be at my best. I could literally die if I'm not! This school is nuts! I need more pineal juice, but not the weak stuff you brought me before.

Here. I bribed an alchemist at the mage college to get this recipe. Of course, I don't know how to actually do alchemy, so I'll leave it up to you.": "Tenho um grande teste chegando na escola e preciso estar no meu melhor. Eu poderia literalmente morrer se não estivesse! Essa escola é uma loucura! Preciso de mais suco pineal, mas não daquela coisa fraca que você me trouxe antes.

Aqui. Subornei um alquimista da faculdade de magos para conseguir esta receita. Claro, eu não sei realmente fazer alquimia, então deixarei isso para você."
"I have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.\": \"Aqui está o problema": "tarde da noite, uma criatura sai dos esgotos e ataca animais sencientes. Ele se concentra nos inteligentes."
"I have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.\\\"\": \"Skitters em Statehelm disse": "\\\"Aqui está o problema: tarde da noite, uma criatura está saindo dos esgotos e atacando animais sencientes. Ela se concentra nos mais espertos."
"I have a deer friend who lost his antlers in a fight. He's very traumatized about it, even though I explained that they'd grow back. Can you get me a pair of replacement antlers?": "Tenho um amigo cervo que perdeu os chifres em uma briga. Ele está muito traumatizado com isso, embora eu tenha explicado que eles voltariam a crescer. Você pode me conseguir um par de chifres de reposição?"
"I have a great new scheme to win big at keelflip: bomb threats. Don't worry. Nobody is going to get hurt. Everything wil go according to plan.": "Tenho um novo esquema excelente para ganhar muito no Keelflip: ameaças de bomba. Não se preocupe. Ninguém vai se machucar. Tudo correrá conforme o planejado."
"I have a long work order to get through today. I need refreshment! You've been down into the goblin basement, no? Do you have any power potions? The goblins love to carry them.": "Tenho uma longa ordem de serviço para cumprir hoje. Eu preciso de um refresco! Você esteve no porão dos goblins, não? Você tem alguma poção de poder? Os goblins adoram carregá-los."
"I have a lot of friends in the field and I'm afraid for them. We crossbowmen are seriously outclassed against the gargoyles in particular, and I fear an attack from them soon.

If you were to go take care of some gargoyles, I could make sure some of the discretionary fund ends up in your pocket.": "Tenho muitos amigos na área e tenho medo por eles. Nós, besteiros, estamos seriamente em desvantagem contra as gárgulas em particular, e temo um ataque deles em breve.

Se você fosse cuidar de algumas gárgulas, eu poderia garantir que parte do fundo discricionário acabasse no seu bolso."
"I have a new idea for how to cheat at keelflip. I just need some pebbles. But they have to be perfectly balanced!": "Tenho uma nova ideia de como trapacear no Keelflip. Eu só preciso de algumas pedras. Mas eles têm que estar perfeitamente equilibrados!"
"I have a new idea for my fall line up! But I need something really crass to push it over the top. I know just the thing. Can you get me a really high-quality rat pelt? It'll make an amazingly awful hat.": "Tenho uma nova ideia para minha linha de outono! Mas preciso de algo realmente grosseiro para levar isso ao topo. Eu sei exatamente a coisa. Você pode me conseguir uma pele de rato de alta qualidade? Dará um chapéu incrivelmente horrível."
"I have a new lead on the secret military force buried in the Ilmari desert! You're going to help me crack this once and for all. Head to the desert and find the bunker the locals call \"the labyrinth.\" It's south of Amulna, and rakshasa bandits are standing right near the entrance. Once you're underground, go down a few floors to the minotaur halls, then down again, and yet again. At the lowest floor of this place is a hag named Claudia. Kill her! Bring friends -- hags are no joke.

Claudia is said to have a vast treasure trove, which you can keep! All I need are the important documents that should be inside.

I understand there's some sort of mechanism that protects her treasure. Just figure it out and get it done.": "Tenho uma nova pista sobre a força militar secreta enterrada no deserto de Ilmari! Você vai me ajudar a resolver isso de uma vez por todas. Vá para o deserto e encontre o bunker que os habitantes locais chamam de \"labirinto\". Fica ao sul de Amulna, e bandidos rakshasa estão bem perto da entrada. Quando estiver no subsolo, desça alguns andares até os salões dos minotauros, depois desça novamente e mais uma vez. No andar mais baixo deste lugar está uma bruxa chamada Claudia. Mate-a! Traga amigos – bruxas não são brincadeira.

Dizem que Claudia tem um vasto tesouro que você pode guardar! Tudo que preciso são os documentos importantes que deveriam estar dentro.

Entendo que há algum tipo de mecanismo que protege o tesouro dela. Basta descobrir e fazer isso."
"I have a pigeon with a broken wing, and I am in need of some supplies to try and heal it. There is a special realm where Phoenixes dwell that is occupied by the Fae.
Go there and kill these creatures until you can get a good, undamaged phoenix feather. I can use the feather's regenerative abilities to help accelerate the healing process. Bring the feather back to me as soon as you can! I need it as fresh as possible.": "Tenho um pombo com a asa quebrada e preciso de alguns suprimentos para tentar curá-lo. Existe um reino especial onde habitam as Fênix que é ocupado pelos Fae.
Vá até lá e mate essas criaturas até conseguir uma pena de fênix boa e intacta. Posso usar as habilidades regenerativas da pena para ajudar a acelerar o processo de cura. Traga a pena de volta para mim assim que puder! Eu preciso disso o mais fresco possível."
"I have a special book order for alchemy tutorials. I have some of the needed books, but here are the ones I don't have copies of. Can you look for them? I'll pay well.": "Tenho um pedido especial de livros para tutoriais de alquimia. Tenho alguns dos livros necessários, mas aqui estão aqueles dos quais não tenho cópias. Você pode procurá-los? Pagarei bem."
"I have a special book request that I could use your help with. If I can sell this, it will make up for months of poor sales!

The book I need is \"The Lost Travels of Romast.\" It didn't exactly have a large print run. There are probably only a few copies across all of Alharth. But I have a lead!

A certain... friend... with greenish skin... who lives in a cave in Povus has a copy hidden deep in her cave. But she says the deep cave is \"too scary nowadays\" and she can't retrieve it for me. She says it's hidden behind a gilded chest. I'm sure that should make it easy to find. Right?

This book is priceless, so I will give you priceless knowledge in exchange.": "Tenho um pedido especial de livro no qual gostaria de sua ajuda. Se eu conseguir vender isso, compensarei meses de vendas fracas!

O livro que preciso é \"As Viagens Perdidas de Romast\". Não teve exatamente uma tiragem grande. Provavelmente existem apenas algumas cópias em toda Alharth. Mas eu tenho uma pista!

Uma certa... amiga... de pele esverdeada... que mora em uma caverna em Povus tem uma cópia escondida nas profundezas de sua caverna. Mas ela diz que a caverna profunda é “muito assustadora hoje em dia” e ela não pode recuperá-la para mim. Ela diz que está escondido atrás de um baú dourado. Tenho certeza de que isso deve facilitar a localização. Certo?

Este livro não tem preço, então em troca lhe darei um conhecimento inestimável."
"I have a syllabus that would keep you busy for months. I was told to make sure you \"got your Councils' worth\" from your tuition! But in your case, that would just be wasting both of our time. Don't you agree?

Let's skip ahead to the end.

Return to the metal dodecahedron outside, say 'Ossugazak 99', and kill them with Ice Magic. Don't die. This is your final exam.

<i>[Must use Ice Magic to advance this quest.]</i>": "Tenho um plano de estudos que o manteria ocupado por meses. Disseram-me para ter certeza de que você \"aproveitaria o valor dos seus Conselhos\" com suas mensalidades! Mas no seu caso, isso seria apenas uma perda de tempo para nós dois. Você não concorda?

Vamos pular até o final.

Volte para o dodecaedro de metal do lado de fora, diga 'Ossugazak 99' e mate-os com Ice Magic. Não morra. Este é o seu exame final.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>"
"I have a theory. I suspect that the demons specifically value some combination of the Frostbelches' protective properties with their own. But I don't know what combination, exactly. Do you still have those frog skins from before? I'll need those, and I'll need some demonic essences. Bring me both, so I can compare.": "Eu tenho uma teoria. Suspeito que os demônios valorizem especificamente alguma combinação das propriedades protetoras dos Arrotos de Gelo com as suas próprias. Mas não sei que combinação exatamente. Você ainda tem aquelas peles de sapo de antes? Vou precisar disso e de algumas essências demoníacas. Traga-me os dois, para que eu possa comparar."
"I have a very personal request. Red told me he likes winterhues! You know, that flower that grows here? Can you get me a few to give to him?

Winterhues bloom at dawn, but they die off very quickly in the afternoon hours. So your best bet is to hunt for them starting at 5 am.": "Tenho um pedido muito pessoal. Red me disse que gosta de tons de inverno! Você sabe, aquela flor que cresce aqui? Você pode me dar alguns para dar a ele?

Winterhues florescem ao amanhecer, mas morrem muito rapidamente à tarde. Portanto, sua melhor aposta é caçá-los a partir das 5h."
"I have a... magical illness.

I need a rare substance known as Acur Blood. I know ...not... where one such as... yourself... would find this thing. Perhaps seek out sages or ...mystics. In any case, I grant you no hope. But if you succeed, I shall reward you handsomely.
Wait! Actually, make it two jars of Acur Blood.": "Eu tenho uma... doença mágica.

Preciso de uma substância rara conhecida como Sangue Acur. Eu sei... não... onde alguém como... você... encontraria essa coisa. Talvez procure sábios ou... místicos. De qualquer forma, não lhe concedo nenhuma esperança. Mas se você tiver sucesso, eu o recompensarei generosamente.
Espere! Na verdade, prepare dois potes de Acur Blood."
"I have an extremely difficult task today. You need to enter the fae realm near Sun Vale. There's a Winter ship in orbit there. Sneak aboard and take out some problems.": "Tenho uma tarefa extremamente difícil hoje. Você precisa entrar no reino das fadas perto de Sun Vale. Há uma nave Winter em órbita lá. Suba a bordo e resolva alguns problemas."
"I have an idea for how to win big at keelflip: cheating! I just need some corks.": "Tenho uma ideia de como ganhar muito no Keelflip: trapacear! Só preciso de algumas rolhas."
"I have another delivery of phlogiston for my buyer in the Ilmari desert, but I don't have time to go all that way. I know it's dangerous, but I believe in you: you're sturdy enough to go in my place!

Take this to Makara. She's in the northeast part of the Ilmari desert. She's living in a ruined building with a red-and-white striped tarp for a roof.

And listen to me carefully: when I go to the desert, I always travel with Kleave or at least Oritania. I'm sturdy, but I'm not stupid! The desert is way more dangerous than here. You can still do this, though. Discretion can be sturdy! Avoid confrontation!

Oh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...": "Tenho outra entrega de flogisto para meu comprador no deserto de Ilmari, mas não tenho tempo para ir até lá. Eu sei que é perigoso, mas acredito em você: você é forte o suficiente para ir no meu lugar!

Leve isso para Makara. Ela está na parte nordeste do deserto de Ilmari. Ela está morando em um prédio em ruínas com uma lona listrada vermelha e branca como telhado.

E ouça-me com atenção: quando vou para o deserto, viajo sempre com Kleave ou pelo menos Oritania. Sou resistente, mas não sou estúpido! O deserto é muito mais perigoso do que aqui. Você ainda pode fazer isso. A discrição pode ser resistente! Evite confrontos!

Ah, como você chega a Ilmari? Logo depois das montanhas Kur, ao norte. Talvez você precise trazer algum equipamento para o clima quente para essa parte da viagem..."
"I have another hard request. This one is for a shark skin. Can't make this up. I'm supposed to just have a shark skin lying around, right? Ugh. Customers. But hey, see what you can do.": "Tenho outro pedido difícil. Este é para uma pele de tubarão. Não posso inventar isso. Eu deveria ter apenas uma pele de tubarão por aí, certo? Eca. Clientes. Mas ei, veja o que você pode fazer."
"I have asked to speak with the Queen about your request, and will let her know of your extra effort to aid me.\\\"\": \"Irkima, do Red Wing Casino, disse": "\\\"Estou me sentindo um pouco tolo com isso, mas posso incomodá-lo para voltar onde estava e me trazer um ovo de fênix fresco? Eu sei que deveria ter perguntado antes, mas esqueci completamente. Eu misturo o ovo com a ração para pombos doentes para ajudar na cura."
"I have been expecting this! The pass code was sent by pigeon ahead of you.

Yes, this amount is correct. I'll let our Queen know Helena's payment is finally made. The enforcers should stop hunting her in one to three days. She should be on her guard until then.": "Eu estava esperando por isso! A senha foi enviada por pombo antes de você.

Sim, esse valor está correto. Avisarei à nossa Rainha que o pagamento de Helena foi finalmente efetuado. Os executores deveriam parar de caçá-la dentro de um a três dias. Ela deveria estar em guarda até então."
"I have been instructed to sell more 'baubles and trinkets' to appeal to drunken bipeds with lots of cash. They often ask for lucky tokens, so I wish to procure some rabbit feet. If you bring me three, I shall pay 1200 Councils for them, plus some Red Wing Tokens.": "Fui instruído a vender mais 'bugigangas e bugigangas' para atrair bípedes bêbados com muito dinheiro. Eles costumam pedir fichas da sorte, então desejo adquirir alguns pés de coelho. Se você me trouxer três, pagarei 1.200 Conselhos por eles, além de algumas fichas Red Wing."
"I have been invited to the execution party this month, but I'm not feeling my old confident self. What I need is something to bolster my righteousness. Telka's Tail! It's a perfume. Could you find a bottle? Rakshasa bandits might have it.": "Fui convidado para a festa de execução este mês, mas não estou me sentindo confiante como antes. O que preciso é de algo para reforçar minha retidão. Cauda de Telka! É um perfume. Você poderia encontrar uma garrafa? Bandidos Rakshasa podem estar com isso."
"I have been to the ancient ruins and I have meditated there. You, too, must go. Touch them. Feel their bones. Hear their words.": "Estive nas ruínas antigas e meditei lá. Você também deve ir. Toque neles. Sinta seus ossos. Ouça suas palavras."
"I have decided not to take Kar-Get on Wake's daughter. It is right and just, but I would feel too guilty. Instead I will use my trade to honor her. I will make an explosive map, and give Sinda a symbolic burial by fire. Hm, I am out of explosive ink. Do you have any?": "Decidi não levar a filha de Kar-Get on Wake. É certo e justo, mas eu me sentiria muito culpado. Em vez disso, usarei meu ofício para honrá-la. Farei um mapa explosivo e darei a Sinda um enterro simbólico através do fogo. Hm, estou sem tinta explosiva. Você tem algum?"
"I have decided to replace the crystal in my mother's necklace with obsidian. Go find a piece for me! Obsidian is not as beautiful as vervadium, but I suspect you will at least be able to find a piece that does not disgust me.": "Decidi substituir o cristal do colar da minha mãe por obsidiana. Vá encontrar um pedaço para mim! A obsidiana não é tão bonita quanto o vervádio, mas suspeito que você pelo menos conseguirá encontrar uma peça que não me enoje."
"I have enjoyed the tequila, my friend, and it has proven a very interesting talking point among guests. I need more! I shall pay you the same as before. As to the flavor profile, please surprise me with something delicious.": "Gostei da tequila, meu amigo, e ela tem se mostrado um tema de conversa muito interessante entre os convidados. Eu preciso de mais! Pagarei a você o mesmo que antes. Quanto ao perfil de sabor, surpreenda-me com algo delicioso."
"I have expanded my search and have come into stone-contact with a human engineer near here who claims to know what I need. However, he won't tell me over the aether. Please locate this man and retrieve his letter. He is to be found \"In the Serbule Sewers.\" His name is Arif.": "Ampliei minha pesquisa e entrei em contato direto com um engenheiro humano perto daqui que afirma saber do que preciso. No entanto, ele não vai me contar através do éter. Por favor, localize este homem e recupere sua carta. Ele pode ser encontrado \"nos esgotos de Serbule\". O nome dele é Arif."
"I have family back in Sedgewick Forest: my lovely wife, our bear, and three gobs. But the clan infighting is too dangerous there. I need to make it big here so I can bring my family over. In the short term, though, I need to send back resources that my wife can turn into weapons. Have you come across any carnelians? They're perfect for making magic swords. Say, a half-dozen of them?": "Tenho família na floresta de Sedgewick: minha adorável esposa, nosso urso e três gobs. Mas as lutas internas do clã são muito perigosas lá. Preciso crescer aqui para poder trazer minha família. No curto prazo, porém, preciso devolver recursos que minha esposa possa transformar em armas. Você já encontrou alguma cornalina? Eles são perfeitos para fazer espadas mágicas. Digamos, meia dúzia deles?"
"I have given you my recipe for the bird feed we use here. Collect the ingredients and bring me 10 units of it back.

<i>You can find the recipe in the Lore category of your recipe book.</i>": "Eu dei a vocês minha receita para a ração para pássaros que usamos aqui. Recolha os ingredientes e traga-me 10 unidades de volta.

<i>Você pode encontrar a receita na categoria Lore do seu livro de receitas.</i>"
"I have heard of a delicacy found only among the indigenous people of Kur Mountains. I simply must try it right away!": "Ouvi falar de uma iguaria encontrada apenas entre os povos indígenas das montanhas Kur. Eu simplesmente devo tentar imediatamente!"
"I have heard terrifying tales of creatures deep beneath Gazluk Keep. I need you to investigate and correct these problems before they become severe. Bring allies! You'll need to trek deep into the lower level of the keep.

First, there is a 'productivity expert' that apparently achieves excellent results. We don't want them being productive, so fix that. Next, they have a massive urak pumping out eggs daily. That's got to stop!

Last, and most troubling, there is supposedly a demon hidden down there, summoned by foolish mages. They call it a 'gargoyle'. They do not understand how powerful it is. Slay it before it can open a portal and invade this world!": "Ouvi histórias aterrorizantes sobre criaturas nas profundezas do Forte Gazluk. Preciso que você investigue e corrija esses problemas antes que se tornem graves. Traga aliados! Você precisará caminhar profundamente até o nível inferior da fortaleza.

Primeiro, existe um “especialista em produtividade” que aparentemente alcança resultados excelentes. Não queremos que eles sejam produtivos, então resolva isso. Em seguida, eles têm um urak enorme bombeando ovos diariamente. Isso tem que parar!

Por último, e mais preocupante, há supostamente um demônio escondido lá embaixo, convocado por magos tolos. Eles chamam isso de 'gárgula'. Eles não entendem o quão poderoso isso é. Mate-o antes que ele abra um portal e invada este mundo!"
"I have heard that rhinos in the Council Lands grow ivory horns instead of horns made of animal fat. I must see these for myself!": "Ouvi dizer que os rinocerontes nas Terras do Conselho têm chifres de marfim em vez de chifres feitos de gordura animal. Devo ver isso por mim mesmo!"
"I have many bear and panther skins to decorate my store. But the local beasts, the striped cats, should be on the wall, too! I have tried to get a skin but they are never perfect enough. I accept my limitations. I am not an expert skinner. It is enough to be a master warrior and an expert tradesorc.": "Tenho muitas peles de urso e pantera para decorar minha loja. Mas as feras locais, os gatos listrados, também deveriam estar na parede! Eu tentei conseguir uma skin, mas elas nunca são perfeitas o suficiente. Aceito minhas limitações. Eu não sou um skinner especialista. Basta ser um mestre guerreiro e um comerciante especialista."
"I have more research for you when you're ready.\": \"Estas são suas notas de pesquisa? Conciso... Mas suficiente. Vejo que minha hipótese estava correta": "ninguém espera morrer por causa de uma Chama Cintilante. É muito brilhante para ser assustador. Talvez possamos usar isso."
"I have need of large hate pearls. You can sometimes find them on the corpses of your victims. Speak with Grasuul to find the freshest blood today... that will also be your best chance for finding hate pearls.

For this particular purpose I do not... care how fresh they are. You may use store-bought hate pearls for all I care. Just make certain they are extremely... hateful. ": "Preciso de grandes pérolas de ódio. Às vezes você pode encontrá-los nos cadáveres de suas vítimas. Fale com Grasuul para encontrar o sangue mais fresco hoje... essa também será sua melhor chance de encontrar pérolas de ódio.

Para este propósito específico, não me importo com o quão frescos eles sejam. Você pode usar pérolas de ódio compradas em lojas, pelo que me importa. Apenas certifique-se de que eles sejam extremamente... odiosos."
"I have need of small hate pearls. But they must be extraordinarily... fresh, and must come from a living creature. I can't use those worthless manufactured hate pearls!

Speak with Grasuul to learn what blood is fresh today. Hunt those creatures. But be warned -- some creatures are more hateful than others. I am content to wait a day or two if necessary.": "Preciso de pequenas pérolas de ódio. Mas eles devem ser extraordinariamente... frescos e devem vir de uma criatura viva. Não posso usar essas pérolas de ódio manufaturadas e inúteis!

Fale com Grasuul para saber que sangue está fresco hoje. Cace essas criaturas. Mas esteja avisado: algumas criaturas são mais odiosas que outras. Contento-me em esperar um ou dois dias, se necessário."
"I have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.\": \"Você quer ajudar? Hmph. Muito bem": "talvez você conheça esta área melhor do que nós."
"I have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.\\\"\": \"Merriana em Serbule Hills disse": "\\\"Você quer ajudar? Hmph. Muito bem: talvez você conheça esta área melhor do que nós."
"I have prepared the collaboration notes I would like you to deliver to the dwarf. If you would be so kind, please translate them and deliver them. I eagerly await his response.": "Preparei as notas de colaboração que gostaria que você entregasse ao anão. Se você puder fazer a gentileza, por favor, traduza-os e entregue-os. Aguardo ansiosamente sua resposta."
"I have run out of quartz for new jewelry. I would ask Willem, but ... it's complicated. Can you get some for me?": "Fiquei sem quartzo para comprar joias novas. Eu perguntaria ao Willem, mas... é complicado. Você pode pegar um pouco para mim?"
"I have some notes on your performance. First, you were unfocused in your abjurations. And generally quite messy with your magic. Second... oh, who am I kidding, you did fine. I can make up some issues, but these are minor quibbles. Most students can't complete my course at all. And a not-insignificant number die. So when I grade you on that curve, your effort is extraordinary! Well done.": "Tenho algumas notas sobre o seu desempenho. Primeiro, você estava fora de foco em suas abjurações. E geralmente bastante confuso com sua magia. Segundo... ah, a quem estou enganando, você se saiu bem. Posso inventar algumas questões, mas essas são questões menores. A maioria dos alunos não consegue concluir meu curso. E um número não insignificante morre. Então, quando eu classifico você nessa curva, seu esforço é extraordinário! Bom trabalho."
"I have the parts I need for my auto-clamp, but... Well, it's been a few decades since I made anything like this. I'm trying to remember how it's done. I <i>think</i> I just need a T crystal, which I have on-hand... But what if I actually need an L crystal? In that case, we're looking at a pretty dangerous explosion when I plug in the wrong part.

I'm not really prepared for that sort of chemical fire here, because... oh, nevermind, trying to explain myself to you is worse than talkin' to a child.

Here's what I need: a nice fae blanket. Like the fairies in Statehelm sell sometimes. Or just make one. You know how to make one, right? You just sew up the edges of some fae silk. Simple as that!": "Tenho as peças que preciso para minha pinça automática, mas... Bem, já se passaram algumas décadas desde que fiz algo assim. Estou tentando lembrar como isso é feito. <i>Acho</i> que só preciso de um cristal T, que tenho em mãos... Mas e se eu realmente precisar de um cristal L? Nesse caso, estamos diante de uma explosão muito perigosa quando conecto a parte errada.

Não estou realmente preparado para esse tipo de incêndio químico aqui, porque... ah, deixa pra lá, tentar me explicar para você é pior do que conversar com uma criança.

Aqui está o que eu preciso: um lindo cobertor feérico. Como as fadas em Statehelm vendem às vezes. Ou apenas faça um. Você sabe como fazer um, certo? Você acabou de costurar as bordas de um pouco de seda fada. Simples assim!"
"I have the worst news. The constabulary spotted a suspicious person yesterday, and as he fled he threw a huge clump of jewelry into the ocean. It's got to be some of my stolen jewelry! Can you fish it out for me? It was down on the docks.": "Tenho as piores notícias. A polícia avistou uma pessoa suspeita ontem e, enquanto fugia, jogou um enorme monte de joias no oceano. Devem ser algumas das minhas joias roubadas! Você pode pescar para mim? Estava nas docas."
"I have this crazy recipe for cheese that ripens within the hide of a cow. Crazy gimmick, right?! Trouble is, it requires a perfectly-skinned cow hide. I'm a pretty terrible skinner, so that's not going to happen.

But if you happen upon one, save it for me!": "Tenho uma receita maluca de queijo que amadurece dentro da pele de uma vaca. Truque maluco, certo?! O problema é que isso requer uma pele de vaca com pele perfeita. Eu sou um péssimo esfolador, então isso não vai acontecer.

Mas se você encontrar um, guarde-o para mim!"
"I have thought about what Urzab told you: that my assistants may be involved in the attempt on my life. Rick already tracked down one of them, and she knew nothing. He couldn't find the other one...

But I know where Tal-Saka would have gone. I did not tell Rick because I won't let him get hurt for me! But if <i>you</i> wanted to go and confront Tal-Saka... I would be grateful.

Tal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.": "Pensei no que Urzab lhe contou: que meus assistentes podem estar envolvidos no atentado contra minha vida. Rick já localizou um deles e ela não sabia de nada. Ele não conseguiu encontrar o outro...

Mas eu sei para onde Tal-Saka teria ido. Eu não contei ao Rick porque não vou deixar ele se machucar por minha causa! Mas se <i>você</i> quisesse confrontar Tal-Saka... eu ficaria grato.

Tal-Saka sempre falava de seus amigos vagabundos que vivem em um posto avançado no deserto em ruínas. Para encontrar o posto avançado, comece em Amulna e siga para leste. A viagem é longa, então traga água. E tenha cuidado! Será perigoso."
"I have to admit that I was in a really bad mood the day I granted those wishes. Ormorek had just been telling me about his stupid dream-soldiers and how I never do anything to help mortals, and blah blah blah. Don't tell me what to do! Not that you do. That's why I like you. Also you're incredibly powerful for a mortal. Anyway, here": "this is for you, loyal cultist!\": \"<i>Zhia Lian:</i> Cultistas estão todos felizes agora? Ótimo. Demorou muito para plantar essas curas onde as encontrassem! A poção do burro foi especialmente difícil: tive que alterar sutilmente as leis da natureza para fazê-la funcionar, o que significa que provavelmente terei notícias de Dreva em breve. Mas o importante é que meus cultistas acham que foram curados por uma série de golpes de sorte, e não por milagres divinos. E você também trabalhou um pouco. Formamos uma grande equipe!"
"I haven't been able to find a decent topaz in this miserable country. And it's my favorite gem! Could you get me one? I want to give myself an early birthday present.": "Não consegui encontrar um topázio decente neste país miserável. E é minha jóia favorita! Você poderia me conseguir um? Quero me dar um presente de aniversário antecipado."
"I haven't been entirely honest with you, and ever since my outburst about the orc I've been thinking that I should be more open. So, here it goes...

I <i>am</i> related to Gloria Stonecurl. She is my sister. I have not seen her in an age, mostly because... well, I don't want to get into it right now. But if you happen upon her in your travels, would you tell her that her wee old brother sends his regards?": "Não fui totalmente honesto com você e, desde o meu desabafo sobre o orc, tenho pensado que deveria ser mais aberto. Então, aqui vai...

Eu <i>sou</i> parente de Gloria Stonecurl. Ela é minha irmã. Faz muito tempo que não a vejo, principalmente porque... bem, não quero entrar nisso agora. Mas se você a encontrar em suas viagens, você diria a ela que seu irmão mais velho manda lembranças?"
"I haven't seen specimens like this since young master Dalvos left to Statehelm! They must be made by an admirer of his technique. I wish to collect them for sentimental reasons.": "Não vejo exemplares assim desde que o jovem mestre Dalvos partiu para Statehelm! Devem ser confeccionados por um admirador de sua técnica. Desejo colecioná-los por motivos sentimentais."
"I hear hard work keeps your mind off of things, so why don't you do some hard work for me? Go survey for minerals and dig them up! I think there's a lady in Serbule Hills that can teach you the basics -- she's in that little inn down there.": "Ouvi dizer que o trabalho duro mantém sua mente longe das coisas, então por que você não trabalha duro para mim? Faça uma pesquisa em busca de minerais e desenterre-os! Acho que há uma senhora em Serbule Hills que pode lhe ensinar o básico – ela está naquela pequena pousada lá embaixo."
"I hear that Braigon in Eltibule knows how. Why don't you go ask him?\": \"É época de colheita e todos os meus amigos estão comendo peru": "peru perfeitamente assado, peru refogado, torta de peru... Mas matar perus para consumir sua carne é obviamente errado."
"I hear that Braigon in Eltibule knows how. Why don't you go ask him?\\\"\": \"Ricatu em Povus disse": "\\\"É a época da colheita e todos os meus amigos estão comendo peru: peru perfeitamente assado, peru refogado, torta de peru... Mas matar perus para consumir sua carne é obviamente errado."
"I hear they're in the lakes and streams around here, but they can be pretty quick. I'm sure with some practice you'll manage, though.\\\"\": \"Rappanel em Serbule Hills disse": "\\\"Eu realmente devo ter comida melhor do que aquela que Durstin pode cozinhar. Até os picles de ranalan estão envelhecendo. Hmm, que tal alguns daqueles 'peixes de uva'? Eu tenho que saber por que os humanos os chamam assim!"
"I heard a rumor that's just too stupid to NOT be true. Apparently a rabbit <i>covered in jewelry</i> was seen hopping into a sewer pipe outside of town. It seems to live down there.

It's got to be one of those dreadful talking pets that wizards love so much. They never mind their pets at all, and now this one's taken to a life of crime! Take care of the matter for me, won't you?": "Ouvi um boato que é estúpido demais para NÃO ser verdade. Aparentemente, um coelho coberto de joias foi visto pulando em um cano de esgoto fora da cidade. Parece que mora lá embaixo.

Deve ser um daqueles animais de estimação falantes horríveis que os bruxos tanto amam. Eles não se importam com seus animais de estimação, e agora este foi levado para uma vida de crime! Cuide do assunto para mim, certo?"
"I heard a susurrus and I suspected you were the cause! Good job.": "Ouvi um sussurro e suspeitei que você fosse a causa! Bom trabalho."
"I heard that goblins took the logging camps to the northeast... and that they're using fairies as slaves! So terrible! Now, I could never condone killing anybody, but IF a slave were to HAPPEN to perish, and if they had cold iron shackles in good condition, and IF those shackles made it back to me, I would be very grateful. Not that I want you to kill anybody, though! No no no. Just... be on the lookout for cold iron shackles. That's all.": "Ouvi dizer que os goblins levaram os acampamentos madeireiros para o nordeste... e que estão usando fadas como escravas! Tão terrível! Agora, eu nunca poderia tolerar matar alguém, mas SE um escravo ACONTECESSE de morrer, e se ele tivesse algemas de ferro frio em boas condições, e SE essas algemas voltassem para mim, eu ficaria muito grato. Não que eu queira que você mate alguém! Não, não, não. Apenas... fique atento a algemas de ferro frio. Isso é tudo."
"I heard that some backwater called Eltibule has hundreds of gigantic armored snails!": "Ouvi dizer que algum remanso chamado Eltibule tem centenas de caracóis blindados gigantescos!"
"I heard that the lich Khyrulek kept creating weapons of destruction even after she died! Supposedly she has a wand that protects her from flame. If I had that wand, I could dissect it to learn the secrets of fire resistance. Wouldn't Velkort be jealous!

But it's just a fanciful dream. How would I ever get ahold of such an artifact?": "Ouvi dizer que o lich Khyrulek continuou criando armas de destruição mesmo depois de morrer! Supostamente ela tem uma varinha que a protege das chamas. Se eu tivesse aquela varinha, poderia dissecá-la para aprender os segredos da resistência ao fogo. Velkort não ficaria com ciúmes!

Mas é apenas um sonho fantasioso. Como eu conseguiria tal artefato?"
"I heard there's a fancy cheese maker out in Eltibule somewhere! Could you find her? Make her give you some danablu. That's the best kind! And get some for me.": "Ouvi dizer que há um fabricante de queijo chique em algum lugar em Eltibule! Você poderia encontrá-la? Faça ela lhe dar um pouco de danablu. Esse é o melhor tipo! E pegue alguns para mim."
"I heard you have apples in this dimension! They don't seem to grow around here though. I wanted to taste the apple juice made from them to see if it's like home.": "Ouvi dizer que você tem maçãs nesta dimensão! Eles não parecem crescer por aqui. Queria provar o suco de maçã feito com eles para ver se é como se estivesse em casa."
"I hope you didn't <i>act</i> truculent when you used the word! Warm and friendly conversations are so much more effective than getting angry and shouting.": "Espero que você não tenha agido de forma truculenta ao usar a palavra! Conversas calorosas e amigáveis ​​são muito mais eficazes do que ficar com raiva e gritar."
"I hope you got enough of them! Maybe you should check in on me tomorrow... see if I got eaten. Nah, nah, I'm kidding, I'll be fine. Thanks! Want a shiny rock?": "Espero que você tenha o suficiente deles! Talvez você devesse me visitar amanhã... ver se fui comido. Não, não, estou brincando, ficarei bem. Obrigado! Quer uma pedra brilhante?"
"I hope you're as good as you think you are, because this one is tricky. Enter the fae realm near Sun Vale. There's a Winter planeship there; sneak aboard. Then find some bird-creature named... Hmm, my notes say \"Coldfeather\" but there's also something called \"Hotfeather\" aboard. Kill them both, to be safe.

I also need you to open some of their storage chests and take note of the contents. You should be able to find keys aboard the ship. Good luck. Bring friends.": "Espero que você seja tão bom quanto pensa, porque este é complicado. Entre no reino feérico perto de Sun Vale. Há uma nave de inverno lá; esgueirar-se a bordo. Então encontre alguma criatura ave chamada... Hmm, minhas anotações dizem \"Coldfeather\", mas também há algo chamado \"Hotfeather\" a bordo. Mate os dois, para estar seguro.

Também preciso que você abra alguns de seus baús e anote o conteúdo. Você deve conseguir encontrar as chaves a bordo do navio. Boa sorte. Traga amigos."
"I hope you're not afraid of mummies. I need you to go into a mummy-infested hole and get some xedrite. My other finders have chickened out, but you're better than them! You've got this! Here's the map!

Oh, better have the Sand Seer brief you on mummies first. It's good to refresh the brain!": "Espero que você não tenha medo de múmias. Preciso que você entre em um buraco infestado de múmias e pegue um pouco de xedrita. Meus outros descobridores se acovardaram, mas você é melhor que eles! Você conseguiu! Aqui está o mapa!

Ah, é melhor que o Sand Seer lhe informe sobre as múmias primeiro. É bom refrescar o cérebro!"
"I hope you're ready for a hard one. I need the perfect skin of a three-headed demon dog! You heard that right.

The pay's pretty good, though. Don't die.": "Espero que você esteja pronto para uma tarefa difícil. Preciso da pele perfeita de um cão demônio de três cabeças! Você ouviu certo.

O salário é muito bom, no entanto. Não morra."
"I hunger. I should go kill deer... but I need to stay here for a bit longer. Can you bring me a few carcasses?": "Estou com fome. Eu deveria matar cervos... mas preciso ficar aqui mais um pouco. Você pode me trazer algumas carcaças?"
"I hurt myself yesterday... I dropped a red-hot rock on my foot. I thought I'd managed to get the swelling under control, but my healing magic has always been terrible. Could you go to Marna and ask her for a Simple First Aid Kit?": "Eu me machuquei ontem... deixei cair uma pedra em brasa no pé. Achei que tinha conseguido controlar o inchaço, mas minha magia de cura sempre foi terrível. Você poderia ir até Marna e pedir a ela um kit simples de primeiros socorros?"
"I just can't get the buckle to shine like it needs to! You've gotta help me again. The Wombat told me about a magic rock called 'Iridium' which can make things glow. Find me some of this stuff! Womby said he mined some in the Kur Mountains one time.": "Eu simplesmente não consigo fazer a fivela brilhar como precisa! Você tem que me ajudar novamente. O Wombat me contou sobre uma pedra mágica chamada 'Iridium' que pode fazer as coisas brilharem. Encontre-me algumas dessas coisas! Womby disse que uma vez explorou alguns nas montanhas Kur."
"I just don't understand how the necromancers convince their skeletons to mine! I'm not a necromancer myself, but I thought it was difficult to get them to do anything besides attack. Maybe there's a secret in the bones. Kill some and see if there's anything special about them.": "Só não entendo como os necromantes convencem seus esqueletos a irem para os meus! Eu não sou um necromante, mas achei que seria difícil fazê-los fazer qualquer coisa além de atacar. Talvez haja um segredo nos ossos. Mate alguns e veja se há algo especial neles."
"I just need some quality ink to complete the blessing of safety on Ukorga's inn. And I know that human Laura Neth has the ink I need. But she won't sell it to me!

<i>[Gloria takes a deep breath and calms herself.]</i> Can you see if you can buy some ink from her? Or from anywhere, really. I don't care, I just need to get this done!": "Só preciso de um pouco de tinta de qualidade para completar a bênção de segurança na pousada de Ukorga. E eu sei que a humana Laura Neth tem a tinta que preciso. Mas ela não vai vender para mim!

<i>[Gloria respira fundo e se acalma.]</i> Você pode ver se consegue comprar um pouco de tinta dela? Ou de qualquer lugar, na verdade. Eu não me importo, eu só preciso fazer isso!"
"I just need three doses of aquamarine dye. This shouldn't be hard!\\\"\": \"Shirogin em Rahu disse": "\\\"Isso é tão frustrante! Onde vou conseguir tinta água-marinha para o vestido do General Tremal? Verifiquei com meu fornecedor, mas ela vendeu tudo para um humano chamado Charles Thompson, que usou tudo para pesquisa! E para piorar a situação, esse humano partiu semanas atrás em um navio com destino a Serbule! Se você algum dia se encontrar naquela cidade do sertão, talvez possa localizá-lo e obter a receita da tintura."
"I just wish I could have one more taste of Remga's Raging Rum. Then maybe I could move on.": "Eu só queria poder provar mais uma vez o Raging Rum da Remga. Então talvez eu pudesse seguir em frente."
"I keep asking Jaime over there to give me some cheap metal slabs. I just need some junk metal to repair my shields with! But she just tells me to go mine my own ore. So greedy!

Hey. Maybe you could get me some metal? Do you know how to survey for ore like she does?": "Continuo pedindo ao Jaime que me dê algumas placas de metal baratas. Eu só preciso de algum lixo para consertar meus escudos! Mas ela apenas me diz para extrair meu próprio minério. Tão ganancioso!

Ei. Talvez você possa me arranjar algum metal? Você sabe pesquisar minério como ela?"
"I keep watch on the seas for Ranalon activity. And good thing I do! Recently a mysterious slab has appeared in the water on the other side of the city. You can't even see it from here, that's how far it is. They're trying to hide from me!

I think it's an assault force, hiding in the caves beneath the city. When the slab activates, they'll show up to attack. We need to activate that beacon early, before they're fully prepared. That will catch them off guard. The only trick is: how do we activate it?

I need to call in a favor from a ranalon I once saved. His name is Gozzaroon. He's hiding in an undersea cave off of Sun Vale. Sun Vale's this little island we druids like to congregate at. Go find Gozzaroon, tell him I'm calling in the favor, and demand the secret to activating these beacons.": "Eu fico de olho nos mares em busca de atividades de Ranalon. E que bom que eu faço! Recentemente, uma laje misteriosa apareceu na água do outro lado da cidade. Você nem consegue ver daqui, é tão longe que está. Eles estão tentando se esconder de mim!

Acho que é uma força de assalto escondida nas cavernas abaixo da cidade. Quando a laje for ativada, eles aparecerão para atacar. Precisamos activar esse sinal cedo, antes que estejam totalmente preparados. Isso os pegará desprevenidos. O único truque é: como o ativamos?

Preciso pedir um favor a um Ranalon que salvei uma vez. Seu nome é Gozaroon. Ele está escondido em uma caverna submarina em Sun Vale. Sun Vale é uma pequena ilha onde nós, druidas, gostamos de nos reunir. Vá encontrar Gozzaroon, diga a ele que estou pedindo um favor e exija o segredo para ativar esses faróis."
"I knew I could count on you. I KNEW I could count on you! Hahahaha! See you next week!": "Eu sabia que poderia contar com você. Eu SABIA que poderia contar com você! Hahahaha! Até semana que vem!"
"I knew I could trust you! I appreciate the help. Necromancy gives me icky feelings. We don't have necromancy in the fae realm! It's gross.": "Eu sabia que poderia confiar em você! Agradeço a ajuda. A necromancia me dá sentimentos nojentos. Não temos necromancia no reino fae! É nojento."
"I knew I forgot something! When I asked you to kill those swarmers, you were supposed to scoop up their brains and bring them back. The mages have a 'theory'.

I know this wasn't your fault, so I'm happy to overlook this incident if you can head back out into the field and get those brains.": "Eu sabia que esqueci alguma coisa! Quando eu pedi para você matar aqueles enxameadores, você deveria pegar seus cérebros e trazê-los de volta. Os magos têm uma 'teoria'.

Eu sei que isso não foi culpa sua, então fico feliz em ignorar esse incidente se você puder voltar a campo e pegar esses cérebros."
"I knew it! One type of Behemoth evolves into the other, much the same as the Swarmers evolve into Soldiers. What could this mean? Why are there so many evolutions happening among their ranks, and what causes them? Like any good experiment, this seems to have provided more questions than answers. But at least it's something for us to ponder.": "Eu sabia! Um tipo de Behemoth evolui para o outro, da mesma forma que os Swarmers evoluem para Soldados. O que isso poderia significar? Por que há tantas evoluções acontecendo entre suas fileiras e o que as causa? Como qualquer boa experiência, esta parece ter fornecido mais perguntas do que respostas. Mas pelo menos é algo para ponderarmos."
"I know a lot of ways to turn rice into alcohol. Rice wine is the smoothest! Got any of that smoothness to share?": "Conheço muitas maneiras de transformar arroz em álcool. O vinho de arroz é o mais suave! Tem alguma dessa suavidade para compartilhar?"
"I know a lot of weird rituals, but even I don't know what they want this for. Some of these should be easy to find, and some... less so.": "Conheço muitos rituais estranhos, mas nem eu sei para que eles querem isso. Alguns deles devem ser fáceis de encontrar, e outros... nem tanto."
"I know a lot of weird rituals, but even I don't know what they want this for. Some of these should be easy to find, and some... less so. ": "Conheço muitos rituais estranhos, mas nem eu sei para que eles querem isso. Alguns deles devem ser fáceis de encontrar, e outros... nem tanto."
"I know exactly where this chapter is. Well, not exactly. There used to be a caretaker that lived on a hill south of here. George left years ago, but he told me he kept a chapter of the book in a box somewhere on his farm.

There's some dwarf living there now by the name of Sammie. Go search around the place, see if you can find the chapter.": "Eu sei exatamente onde está este capítulo. Bem, não exatamente. Costumava haver um zelador que morava em uma colina ao sul daqui. George foi embora há anos, mas me disse que guardava um capítulo do livro em uma caixa em algum lugar de sua fazenda.

Há um anão morando lá agora chamado Sammie. Vá pesquisar pelo local e veja se consegue encontrar o capítulo."
"I know how absurd it sounds! But cantaloupe wine is pretty good, if you follow my recipe exactly. See if you can master it.": "Eu sei o quão absurdo isso parece! Mas vinho de melão é muito bom, se você seguir exatamente minha receita. Veja se você consegue dominá-lo."
"I know it's quite rare, but I might as well ask: have you stumbled on any extra saltpeter? I'm trying to master a few fire spells I missed. Just for completeness' sake, you understand.": "Eu sei que é muito raro, mas posso também perguntar: você tropeçou em algum salitre extra? Estou tentando dominar alguns feitiços de fogo que perdi. Apenas para completar, você entende."
"I know it's taboo to carry around fairy wings. But that's why they're so great! Nothing can rile up an Autumn or Summer like a big old bed full of ripped-off wings. Get me some, I'm gonna do something gross.": "Eu sei que é um tabu carregar asas de fada. Mas é por isso que eles são tão bons! Nada pode agitar um outono ou verão como uma cama grande e velha cheia de asas arrancadas. Arranje-me um pouco, vou fazer algo nojento."
"I know my wife gave one of the chapters to old Julius Patton. He lives on the farm nearby. He's not a bad sort; explain things to him and see if he'll give the chapter to you.": "Sei que minha esposa deu um dos capítulos ao velho Julius Patton. Ele mora na fazenda próxima. Ele não é mau tipo; explique as coisas para ele e veja se ele entrega o capítulo para você."
"I know sticks. If it's one thing I know, that's it. That and finding precious resources. But mainly sticks, and I realized if I could coat the top half of my walking stick with a thick candy coat, I could lick the stick while I walk! ... it's childish, sure, but it would sell to the day-hikers of Statehelm! Any gimmick gets attention.

This is our ticket to riches: I'm cutting you in. You just need to do some legwork for us. First, I just need some food-grade wax. You do know you're way around a wax station, right? Great, great. Here's the recipe we need. Make us some of this.": "Eu conheço paus. Se há uma coisa que eu sei, é isso. Isso e encontrar recursos preciosos. Mas principalmente bengalas, e percebi que se pudesse cobrir a metade superior da minha bengala com uma camada grossa de doces, poderia lamber a bengala enquanto ando! ... é infantil, claro, mas seria vendido para os excursionistas de Statehelm! Qualquer truque chama atenção.

Este é o nosso bilhete para a riqueza: estou abrindo mão de você. Você só precisa fazer um pouco de trabalho braçal para nós. Primeiro, só preciso de um pouco de cera de qualidade alimentar. Você sabe que está perto de uma estação de depilação, certo? Ótimo, ótimo. Aqui está a receita que precisamos. Faça-nos um pouco disso."
"I know that most of the farms in Serbule Hills have been abandoned, but I still need to soil samples from each one. It's part of my scientific duties, you understand. Here. Put a bit of soil from each farm in here and bring it back. Simple as cake! And I shall award you 700 Councils.": "Sei que a maioria das fazendas em Serbule Hills foram abandonadas, mas ainda preciso coletar amostras de solo de cada uma delas. Faz parte dos meus deveres científicos, você entende. Aqui. Coloque um pouco de terra de cada fazenda aqui e traga de volta. Simples como um bolo! E eu lhe concederei 700 Conselhos."
"I know this sounds weird, because it is, but next we need some old bones. The rakshasa love seeing them on the tree.": "Eu sei que isso parece estranho, porque é, mas agora precisamos de alguns ossos velhos. Os rakshasa adoram vê-los na árvore."
"I know this wasn't your fault, so I'm happy to overlook this incident if you can head back out into the field and get those brains.\\\"\": \"Sor Lorentz em Vidaria disse": "“Eu sabia que esqueci uma coisa! Quando pedi para você matar aqueles enxameadores, você deveria recolher seus cérebros e trazê-los de volta."
"I know Velkort thinks I should be able to keep the forge hot through my magic, but I'm afraid I was never very good at it. Hammering's more my thing.

Can you get me some non-magical fuel for my fire? I'm running low.": "Eu sei que Velkort acha que eu deveria ser capaz de manter a forja quente através da minha magia, mas infelizmente nunca fui muito bom nisso. Martelar é mais minha praia.

Você pode me conseguir algum combustível não mágico para o meu fogo? Estou ficando sem dinheiro."
"I know you understand the basics of alchemy, but you'll need to understand more than just the basics before I can teach you with a clean conscience. I need to know that you can safely handle dangerous substances, can source exotic ingredients, and can make a palatable potion. I'll teach you an alchemical formula, you make it and bring it to me. I drink it. Easy as that.": "Sei que você entende o básico da alquimia, mas precisará entender mais do que apenas o básico antes que eu possa ensiná-lo com a consciência limpa. Preciso saber que você pode lidar com substâncias perigosas com segurança, obter ingredientes exóticos e fazer uma poção saborosa. Vou te ensinar uma fórmula alquímica, você faz e traz para mim. Eu bebo. Fácil assim."
"I know your type: a book learner. You've read about how to muster up a Moment of Resolve and you think you're special. But let's see you create a Moment of Resolve under real danger conditions!": "Eu conheço o seu tipo: um aprendiz de livros. Você leu sobre como reunir um momento de resolução e se acha especial. Mas vamos ver se você cria um Momento de Resolução sob condições de perigo real!"
"I know, skulls don't have blood! But he says there's blood in the wings.\\\"\": \"Sor Lorentz em Vidaria disse": "\\\"Obrigado por conseguir esses cérebros. Eles aparentemente confirmaram a teoria do Sr. Blueheart. Você o conheceu? Ele está no acampamento aqui. Homem esquisito, mas seu coração está no lugar certo. De qualquer forma, tenho outro pedido dele. Você conhece aqueles crânios com asas perto das paredes? Sim, mate-os e obtenha uma amostra de seu sangue."
"I learned something fascinating yesterday: there are relatively low-cost fire resistance potions on this continent. Those are quite rare in my homeland. Sadly they don't see much use here in the casino. I bought Ragabir's stock, but I have more tests to run. Can you bring me several doses?": "Aprendi algo fascinante ontem: existem poções de resistência ao fogo de custo relativamente baixo neste continente. Isso é bastante raro em minha terra natal. Infelizmente, eles não veem muita utilidade aqui no cassino. Comprei ações de Ragabir, mas tenho mais testes para fazer. Você pode me trazer várias doses?"
"I learned that the locals call him the Mangler. And I promise you this": "it has been decades, but my hatred still runs deep. I've paid to have him killed, but he's immortal and he keeps coming back! No, what really upsets him is to see his beloved friend injured. They call that one The Mauler. If you ask me I think they're gay bears who are gay for each other, but nobody ever asks me. After you kill The Mauler, say \\\"This one's for Lennel.\\\"\": \"Ah, é tão bom ter seu ouvido! Bem, meu marido foi morto por um urso há muito tempo. E eu testemunhei isso! Estávamos caminhando pelas florestas ao sul daqui, como fazem os jovens amantes, e encontramos um urso de pêlo verde. Lennel era um homem forte, mas estúpido, e tentou acertá-lo com um arco longo. O urso o matou, espalhando sangue por toda parte, e então fez a coisa mais maldita: pegou seu arco, olhou bem nos meus olhos e quebrou o arco sobre o joelho. Foi uma coisa muito humana de se fazer."
"I left my brother running our book store back in Statehelm. I need him to think I'm happy here! Otherwise he won't understand why I'm not ready to go home.

I want to send Michael a package of treats and wonders from Rahu to show how amazing this place is. I have a list here... could you help me? If you get these items, I'll teach you a special organizational cantrip that we use in the book-sellers' trade.": "Deixei meu irmão administrando nossa livraria em Statehelm. Preciso que ele pense que estou feliz aqui! Caso contrário, ele não entenderá por que não estou pronto para ir para casa.

Quero enviar ao Michael um pacote de guloseimas e maravilhas de Rahu para mostrar o quão incrível este lugar é. Eu tenho uma lista aqui... você poderia me ajudar? Se você conseguir esses itens, eu lhe ensinarei um truque organizacional especial que usamos no comércio de livreiros."
"I like Hogan a lot. And more importantly, he can protect me from the mantises if they come looking for me here. I wanted to get him something nice, to stay on his good side. Can you help?

Hogan keeps talking about a \"claw-staff\" he wants to make. But he needs some sort of hook claw things to make it. Can you get some of those, whatever they are?": "Gosto muito de Hogan. E o mais importante, ele pode me proteger dos louva-a-deus se eles vierem me procurar aqui. Eu queria comprar algo legal para ele, para ficar do lado dele. Você pode ajudar?

Hogan continua falando sobre um “bastão de garra” que ele quer fazer. Mas ele precisa de algum tipo de garra de gancho para fazer isso. Você pode conseguir alguns desses, sejam eles quais forem?"
"I like this a lot. It's not exactly a sauce, I guess, but it tastes great on raw vegetables. Thanks!": "Eu gosto muito disso. Não é exatamente um molho, eu acho, mas fica ótimo com vegetais crus. Obrigado!"
"I like to keep a handful of stock ingredients on hand, and I am almost out of giant rat tails. Fortunately the sewer beneath our feet is teeming with them! I will pay a very reasonable sum if you bring me some. Oh, they needn't be from the Rahu sewers. Any rat tails will do.": "Gosto de manter um punhado de ingredientes à mão e estou quase sem rabos de rato gigantes. Felizmente o esgoto sob nossos pés está repleto deles! Pagarei uma quantia bastante razoável se você me trouxer algum. Ah, eles não precisam ser dos esgotos de Rahu. Qualquer rabo de rato serve."
"I like to make my own drums so I can get exactly the sound i need. My newest drum needs to have a perfect resonance, and for that, I need really great animal skin! Don't tan it -- I know it'll stink, but bring me the untanned hide. I need to process it myself in a special way. I'll pay you for the work!": "Gosto de fazer minha própria bateria para conseguir exatamente o som que preciso. Meu mais novo tambor precisa ter uma ressonância perfeita e, para isso, preciso de uma pele de animal realmente ótima! Não curta - eu sei que vai cheirar mal, mas traga-me a pele não curtida. Eu preciso processar isso sozinho de uma maneira especial. Eu vou te pagar pelo trabalho!"
"I like to refine weapons by giving them an artistic touch. I'm working on a combat beaker -- I haven't done one of these since my sister died! It seems I'm out of blue glass, though. Do you have any? Oh, I need a bit of pyrite too.": "Gosto de refinar as armas dando-lhes um toque artístico. Estou trabalhando em um copo de combate – não faço um desses desde que minha irmã morreu! Parece que estou sem vidro azul, no entanto. Você tem algum? Ah, também preciso de um pouco de pirita."
"I like you, so I'll let you in on a secret. My grandmother was an alchemist gardener, and they say her best creation was buried with her.

I'd dig her up and retrieve it, but an asshole lich turned her into a living skeleton. She's in the crypt outside of town. Can you put her to rest for me? And retrieve her Demon Bean?": "Eu gosto de você, então vou te contar um segredo. Minha avó era uma jardineira alquimista e dizem que sua melhor criação foi enterrada com ela.

Eu iria desenterrá-la e recuperá-la, mas um lich idiota a transformou em um esqueleto vivo. Ela está na cripta fora da cidade. Você pode colocá-la para descansar para mim? E recuperar seu Feijão Demoníaco?"
"I loaned old Vera my best garden spade a year ago. Then, of course, she was killed and horrifically eaten by goblins. But my spade might still be in her house! If I was braver, I'd go look for it.

Vera's farm is northeast of here.": "Emprestei à velha Vera minha melhor pá de jardim há um ano. Então, é claro, ela foi morta e comida horrivelmente por goblins. Mas minha pá ainda pode estar na casa dela! Se eu fosse mais corajoso, iria procurá-lo.

A fazenda de Vera fica a nordeste daqui."
"I long to rest more comfortably as I meditate. Sadly, my old meditation stool broke. Do you have one I could use?": "Anseio descansar mais confortavelmente enquanto medito. Infelizmente, meu antigo banco de meditação quebrou. Você tem um que eu possa usar?"
"I lost my lucky balaclava. Now my head is cold in the mornings. This makes me sad.": "Perdi minha balaclava da sorte. Agora minha cabeça fica fria pela manhã. Isso me deixa triste."
"I lost my lucky coin. It was one of those ancient coins from before the Council. You can still find 'em all over the place... if you come across one, can you save it for me?": "Perdi minha moeda da sorte. Era uma daquelas moedas antigas de antes do Concílio. Você ainda pode encontrá-los em todos os lugares... se encontrar um, pode guardá-lo para mim?"
"I love bananas! You have to bring me lots of bananas. It's a law now. Go! Fetch bananas!": "Eu adoro bananas! Você tem que me trazer muitas bananas. É uma lei agora. Ir! Pegue bananas!"
"I love mushrooms, of course, but there's one I haven't tried yet. Iocaine. It grows in deep, dark, scary caves, and it's completely lethal... but I think I know a way to make it consumable. I know it's insane, but I've just gotta have some! ... Have you got any?": "Adoro cogumelos, claro, mas há um que ainda não experimentei. Iocaína. Ela cresce em cavernas profundas, escuras e assustadoras e é completamente letal... mas acho que sei uma maneira de torná-la consumível. Eu sei que é uma loucura, mas preciso de um pouco! ... Você tem algum?"
"I love these eyeless fish: no judgemental stare while cooking it!": "Eu adoro esses peixes sem olhos: sem olhares de julgamento enquanto os cozinha!"
"I love to try exotic drugs from far-away lands! But please use only clean teeth.": "Adoro experimentar drogas exóticas de terras distantes! Mas por favor use apenas dentes limpos."
"I may have figured out what the rune charts are for, but I need to make one more -- a really powerful one. Hmm... I have some very high-quality paper, but I really need some amazing ink. Holistic ink would do well here, I think. Yes. Do you have any amazing holistic ink in that huge backpack of yours?": "Posso ter descoberto para que servem os gráficos rúnicos, mas preciso fazer mais um – um realmente poderoso. Hmm... Tenho um papel de altíssima qualidade, mas realmente preciso de uma tinta incrível. Tinta holística ficaria bem aqui, eu acho. Sim. Você tem alguma tinta holística incrível nessa sua mochila enorme?"
"I may not be the best druid, but I still know how to appreciate nature! In fact, I'm pretty good at growing flowers! Just not trees, I guess.

You can find a lot of seeds on the creatures around here - I guess maybe because of our influence? No idea where they get the seeds from, but if you bring me some I'll teach you how to properly appreciate nature.": "Posso não ser o melhor druida, mas ainda sei apreciar a natureza! Na verdade, sou muito bom em cultivar flores! Apenas não árvores, eu acho.

Você pode encontrar muitas sementes nas criaturas por aqui - acho que talvez por causa da nossa influência? Não faço ideia de onde eles tiram as sementes, mas se você me trouxer algumas, vou te ensinar como apreciar a natureza da maneira adequada."
"I met the famous Denton Razor while I was stationed in Vidaria. You might say he's my nemesis: I'm the master of the crossbow and he the bow. But I'm not afraid to say that he's my better in most respects. Once I had a chance to kill him, and I let him live. Things got strange after that.

I'd like to goad my nemesis by giving him his most-hated flower. If you did this for me, he'd know immediately who was responsible, and it would completely ruin his day! He deserves it, don't worry.

Sometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!": "Conheci o famoso Denton Razor enquanto estava em Vidaria. Você pode dizer que ele é meu inimigo: eu sou o mestre da besta e ele do arco. Mas não tenho medo de dizer que ele é o meu melhor em muitos aspectos. Uma vez tive a chance de matá-lo e o deixei viver. As coisas ficaram estranhas depois disso.

Eu gostaria de incitar meu inimigo dando-lhe sua flor mais odiada. Se você fizesse isso por mim, ele saberia imediatamente quem foi o responsável, e isso arruinaria completamente o dia dele! Ele merece, não se preocupe.

Às vezes, quando você examina as ervas daninhas de Vidaria, encontra trevos de dor particularmente vibrantes. Entregue alguns desses para ele!"
"I miss my time in Sedgewick Forest, when I worked with my brethren to keep goblin populations in check. Would you kill goblins in my name? As they perish, make sure to state, 'This is for Mandibles.'": "Sinto falta do tempo que passei na Floresta de Sedgewick, quando trabalhei com meus irmãos para manter as populações de goblins sob controle. Você mataria goblins em meu nome? À medida que morrem, certifique-se de declarar: 'Isto é para mandíbulas'."
"I must ask you again for aid in preparing my special augments. I will need many such items to fund my travels. Gold works well for creating the augments. Unrefined gold ore is best. I've noticed that overworlders often keep gold on hand. Do you happen to have any?": "Devo pedir-lhe novamente ajuda na preparação dos meus aumentos especiais. Precisarei de muitos desses itens para financiar minhas viagens. Gold funciona bem para criar aumentos. O minério de ouro não refinado é o melhor. Percebi que os habitantes do mundo superior costumam manter ouro à mão. Por acaso você tem algum?"
"I must know if those gigantic mushrooms off in the distance are edible. I know that \"Mushroom Jack\" fellow said they were poisonous, but he's an Elf. I want to try them anyway. But obviously I can't eat the giant ones if they're as hard as a rock... maybe you can find a nearby offshoot that's more edible?": "Preciso saber se aqueles cogumelos gigantescos ao longe são comestíveis. Eu sei que aquele tal do “Mushroom Jack” disse que eles eram venenosos, mas ele é um elfo. Eu quero experimentá-los de qualquer maneira. Mas obviamente não posso comer os gigantes se eles forem duros como uma rocha... talvez você possa encontrar uma ramificação próxima que seja mais comestível?"
"I must say I'm impressed. I expected you to come back, of course -- you're obviously not going to be killed by some dumb old undead. But taking out a pile of wizard skeletons is still very impressive!": "Devo dizer que estou impressionado. Eu esperava que você voltasse, é claro – você obviamente não será morto por algum velho morto-vivo idiota. Mas eliminar uma pilha de esqueletos de bruxos ainda é muito impressionante!"
"I must say I'm surprised that you got the recommendations! They must see something in you that I can't. Well, that's half the entrance requirements done.": "Devo dizer que estou surpreso que você tenha recebido as recomendações! Eles devem ver algo em você que eu não consigo. Bem, isso é metade dos requisitos de entrada cumpridos."
"I need a favor from a goblin, and for that I need some goblin ale. A keg of it should be enough.": "Preciso de um favor de um goblin e, para isso, preciso de um pouco de cerveja goblin. Um barril deve ser suficiente."
"I need a lot of cotton for a new dress I'm making. I wouldn't ask if you looked busy, but since you just seem to be standing around, maybe you could card some cotton for me? Just a little bit. Like ten cards?": "Preciso de muito algodão para um vestido novo que estou fazendo. Eu não perguntaria se você parecia ocupado, mas já que parece estar parado, talvez você pudesse cardar um pouco de algodão para mim? Só um pouquinho. Tipo dez cartas?"
"I need a pig snout. A really good one. You need to be a pretty good skinner in order to get one, though, and I was never very good at skinning.": "Preciso de um focinho de porco. Realmente bom. Você precisa ser um esfolador muito bom para conseguir um, e eu nunca fui muito bom em esfolar."
"I need a sample of the Vol's Kiss that can be found in Gazluk. Can you get it for me? It's a yellow crystal that's warm to the touch. You can find it all over the mountainside.

But listen VERY carefully: carrying it will make you sick. So get the ore and then <i>run</i> back here to me as quick as you can. Don't dally! I only need three pieces, so don't get any more than that.": "Preciso de uma amostra do Vol's Kiss que pode ser encontrada em Gazluk. Você pode pegar para mim? É um cristal amarelo quente ao toque. Você pode encontrá-lo por toda a encosta da montanha.

Mas ouça com MUITA atenção: carregá-lo vai te deixar doente. Então pegue o minério e <i>corra</i> de volta aqui para mim o mais rápido que puder. Não perca tempo! Eu só preciso de três peças, então não compre mais do que isso."
"I need an injector that can go through my wolfen skin when I change form. It needs to be as sharp as a knife, but hollow for my potion to flow through.

And I know just the thing: the teeth of the Tor-Urak would work! And there's a bunch out in Kur. Of course, I'd need to kill a bunch of Tor-Uraks and then carefully butcher them to try to find a viable tooth... that seems unlikely in my current state. Unless you can help?": "Preciso de um injetor que possa atravessar minha pele de lobo quando eu mudar de forma. Precisa ser tão afiado quanto uma faca, mas oco para que minha poção possa fluir.

E eu sei exatamente: os dentes do Tor-Urak funcionariam! E há um monte em Kur. Claro, eu precisaria matar um bando de Tor-Uraks e depois matá-los cuidadosamente para tentar encontrar um dente viável... o que parece improvável no meu estado atual. A menos que você possa ajudar?"
"I need another kind of mushroom. These are common everywhere: black foot morels. Delicious in stews! I need to make sure the kind that grow here are alchemically identical to the kinds grown elsewhere.": "Preciso de outro tipo de cogumelo. Estes são comuns em todos os lugares: cogumelos pretos. Delicioso em ensopados! Preciso ter certeza de que os tipos que crescem aqui são alquimicamente idênticos aos que crescem em outros lugares."
"I need better skulls to further my study. Look for humanoids that are especially brave, or daring, or horrifying. Pop out their skulls after you kill them, and see if the skulls look impressive.": "Preciso de crânios melhores para continuar meu estudo. Procure humanóides que sejam especialmente corajosos, ousados ​​ou horríveis. Retire seus crânios depois de matá-los e veja se eles parecem impressionantes."
"I need more basic metal slabs for my sword designs. Get me some.": "Preciso de mais placas de metal básicas para meus designs de espada. Pegue um pouco para mim."
"I need more data. Can you go touch some more candles in the crypt? Say, a dozen. But you can count the ones you've already touched toward the total.": "Preciso de mais dados. Você pode tocar em mais algumas velas na cripta? Digamos, uma dúzia. Mas você pode contar aqueles que já tocou no total."
"I need more human teeth. Human dentristry is demanding: the teeth must be in good condition!": "Preciso de mais dentes humanos. A odontologia humana é exigente: os dentes devem estar em bom estado!"
"I need more Ice Cores to research better cold spells. Do you happen to have any?": "Preciso de mais Núcleos de Gelo para pesquisar melhores períodos de frio. Por acaso você tem algum?"
"I need more iocaine mushrooms. Can you obtain them?": "Preciso de mais cogumelos com iocaína. Você pode obtê-los?"
"I need more milk! Always more milk! Those damned cows out there are so violent, too. Why can't they just calmly let me milk them?": "Preciso de mais leite! Sempre mais leite! Aquelas malditas vacas lá fora também são tão violentas. Por que eles não podem simplesmente me deixar ordenha-los com calma?"
"I need more sulfur for my gem-cleaning solution, but for some reason sulfur is very rare around here, which makes no sense. None at all. Anyway if you find some, bring it here!": "Preciso de mais enxofre para minha solução de limpeza de gemas, mas por alguma razão o enxofre é muito raro por aqui, o que não faz sentido. Nenhum. De qualquer forma, se você encontrar algum, traga aqui!"
"I need new catgut for my lute strings! Most catgut is made from sheep intestine, but I'm an artist, not some slob. I need actual cat gut! You're a lover of the arts, right? Don't do this for me. Do this for art. Find a tiger out there, kill it, and use your butcher knife to scoop up the guts. You do have a butcher knife, right? Because I don't! But I'm sure Fainor in Serbule town would...": "Preciso de novo categute para minhas cordas de alaúde! A maior parte do categute é feita de intestino de ovelha, mas sou um artista, não um desleixado. Eu preciso de tripa de gato de verdade! Você é um amante das artes, certo? Não faça isso por mim. Faça isso pela arte. Encontre um tigre por aí, mate-o e use sua faca de açougueiro para recolher as entranhas. Você tem uma faca de açougueiro, certo? Porque eu não! Mas tenho certeza que Fainor, na cidade de Serbule, iria..."
"I need new types of fungus to improve my fungal forest. These species do not grow natively here, so I must ask for assistance.": "Preciso de novos tipos de fungos para melhorar minha floresta de fungos. Estas espécies não crescem nativamente aqui, por isso devo pedir ajuda."
"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Amazing Brisk Candles? I'll trade some of my knowledge and a token for it!": "Preciso de algumas velas para ajudar a inspirar esses caras a lutarem mais quando estivermos lá fora e tivermos que nos preparar para a batalha. Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas incríveis e vivas? Trocarei um pouco do meu conhecimento e um token por isso!"
"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Brisk Candles? I'll trade some of my knowledge for it!": "Preciso de algumas velas para ajudar a inspirar esses caras a lutarem mais quando estivermos lá fora e tivermos que nos preparar para a batalha. Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas vivas decentes? Troco um pouco do meu conhecimento por isso!"
"I need some candles to help kill the odor of musty crafters in our wagons! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Floral Candles? I'll trade some of my knowledge and a token for it!": "Preciso de algumas velas para ajudar a matar o odor de mofo dos artesãos em nossas carroças! Ainda estou esperando minha bolsa de Orran para comprar suprimentos para fazer os meus. Você poderia criar e me trazer 10 velas florais decentes? Trocarei um pouco do meu conhecimento e um token por isso!"
"I need some cat eyes for a special spell I'm working on! Can you get me some? Remember to kill the cats humanely. If you can.": "Preciso de olhos de gato para um feitiço especial em que estou trabalhando! Você pode me pegar um pouco? Lembre-se de matar os gatos humanamente. Se você puder."
"I need some extremely fresh Pixie's Parasols. I'd pick them myself, but... well, I'm scared of pixies.\\\"\": \"Raina, no Reino Fae, disse": "“Parei de aceitar pedidos especiais de partes frescas de corpo. É muito doloroso existencialmente. Mas pedidos de cogumelos frescos devem servir!"
"I need some mushrooms. But I don't want to deal with Jack today. He's such a goon. Can you get them for me?": "Preciso de alguns cogumelos. Mas não quero lidar com Jack hoje. Ele é um idiota. Você pode pegá-los para mim?"
"I need some parts, and I can't ask Stephie to get them for me or she'd know my plan. Can you do it? I'll give you some xogrite.\\\"\": \"Tremmond Blackhammer em Povus disse": "“Estou fazendo uma armadura como presente para minha sobrinha Stephie. É um novo protetor de pescoço para o terno que fiz para ela."
"I need the assistance of a Red Wing named Mandibles. She will only aid me if I produce something called 'paralytic chicken meat'.

The meat of several different bird-like creatures would work, but Mandibles said the most accessible meat is in a tower in Kur. I cannot go to Kur, it is too cold. She knows this and she taunts me with knowledge I cannot use! Please aid me?": "Preciso da ajuda de um Red Wing chamado Mandibles. Ela só me ajudará se eu produzir algo chamado “carne de frango paralítico”.

A carne de várias criaturas parecidas com pássaros funcionaria, mas Mandibles disse que a carne mais acessível está em uma torre em Kur. Não posso ir para Kur, está muito frio. Ela sabe disso e me provoca com conhecimentos que não posso usar! Por favor me ajude?"
"I need to ask for your help. I am quite addicted to cranium powder. The powder you brought me was so wondrous, so efficacious, that I quickly completed my backlog. But then more orders came pouring in, and I needed more of the powder. I found a nefarious rakshasa merchant who sold me more -- at ridiculously high prices! -- but now I need even more... and I realize that I have been a fool. Please, before this gets even worse, can you help me break this cycle? My contact claims that the only way to cure this headache is more cranium powder, but I know there must be a balm or ointment that can sooth my brow until I can feel normal again.": "Preciso pedir sua ajuda. Sou bastante viciado em pó de crânio. O pó que você me trouxe foi tão maravilhoso, tão eficaz, que rapidamente completei minha lista de pendências. Mas então chegaram mais pedidos e eu precisei de mais pó. Encontrei um nefasto comerciante rakshasa que me vendeu mais – a preços ridiculamente altos! - mas agora preciso de ainda mais... e percebo que fui um tolo. Por favor, antes que isso fique ainda pior, você pode me ajudar a quebrar esse ciclo? Meu contato afirma que a única maneira de curar essa dor de cabeça é mais pó para crânio, mas sei que deve haver um bálsamo ou pomada que possa acalmar minha testa até que eu possa me sentir normal novamente."
"I need to call in a favor from a ranalon I once saved. His name is Gozzaroon. He's hiding in an undersea cave off of Sun Vale. Sun Vale's this little island we druids like to congregate at. Go find Gozzaroon, tell him I'm calling in the favor, and demand the secret to activating these beacons.\\\"\": \"Parella em Statehelm disse": "\\\"Eu fico de olho nos mares em busca de atividades de Ranalon. E que bom que faço! Recentemente, uma laje misteriosa apareceu na água do outro lado da cidade. Você nem consegue vê-la daqui, é tão longe que está. Eles estão tentando se esconder de mim!"
"I need to experiment until I find a cure for this cranium powder issue. Can you go get me some brain bug lobes? Better grab a few in case I mess up... I have a serious headache right now and I can't think too straight.": "Preciso experimentar até encontrar uma cura para esse problema de pólvora craniana. Você pode me trazer alguns lóbulos de insetos cerebrais? É melhor pegar alguns, caso eu estrague tudo... Estou com muita dor de cabeça agora e não consigo pensar direito."
"I need to experiment until I find a cure for this cranium powder issue. Can you go get me some Willpower Gel?

I don't actually know what that is. It sounds alchemical, though. Maybe ask around, somebody might have it  for sale. I dunno. Just get it! Please!": "Preciso experimentar até encontrar uma cura para esse problema de pólvora craniana. Você pode me pegar um pouco de Gel de Força de Vontade?

Na verdade, não sei o que é isso. Parece alquímico, no entanto. Talvez pergunte por aí, alguém pode tê-lo à venda. Eu não sei. Basta entender! Por favor!"
"I need to figure out how to get these fools more into nature. I'm still waiting on my stipend from Orran to go buy supplies. Could you craft and bring me 10 Rough Woodland Candles? I'll trade some of my knowledge for it!": "Preciso descobrir como fazer esses idiotas entrarem mais na natureza. Ainda estou esperando minha bolsa de Orran para comprar suprimentos. Você poderia criar e me trazer 10 velas ásperas da floresta? Troco um pouco do meu conhecimento por isso!"
"I need to make fancy tools, but it's hard to find good metal on this island. Can you head to the mainland and survey some good metal slabs for me?": "Preciso fazer ferramentas sofisticadas, mas é difícil encontrar metal de boa qualidade nesta ilha. Você pode ir para o continente e examinar algumas placas de metal boas para mim?"
"I need to pay off Helena's debt. But I can't entrust her with the money. Can I ask you to deliver it to the mantises? I've been communicating via letter with a mantis named Irkima. He... or she? Eh, whatever. It will take posession of the money.": "Preciso pagar a dívida de Helena. Mas não posso confiar o dinheiro a ela. Posso pedir para você entregá-lo ao louva-a-deus? Tenho me comunicado por carta com um louva-a-deus chamado Irkima. Ele... ou ela? Ah, tanto faz. Ele tomará posse do dinheiro."
"I need to pay off Helena's debt. But I can't entrust her with the money. Can I ask you to deliver it to the mantises? I've been communicating via letter with a mantis named Irkima. He... or she? Eh, whatever. It will take posession of the money. ": "Preciso pagar a dívida de Helena. Mas não posso confiar o dinheiro a ela. Posso pedir para você entregá-lo ao louva-a-deus? Tenho me comunicado por carta com um louva-a-deus chamado Irkima. Ele... ou ela? Ah, tanto faz. Ele tomará posse do dinheiro."
"I need to prepare cabbage soup for the town lunch. Can you get me fresh cabbage?": "Preciso preparar sopa de repolho para o almoço da cidade. Você pode me trazer repolho fresco?"
"I need to re-open this Blood Well ... right away. But a very rude... manticore...stole the lens while I was... resting. He is called Lythorax. You will need to kill him. He's sentient... but not <i>very</i> sentient.

You will need...assistance... most likely.": "Preciso reabrir este Poço de Sangue... imediatamente. Mas uma manticora muito rude... roubou a lente enquanto eu estava... descansando. Ele é chamado de Litórax. Você precisará matá-lo. Ele é senciente... mas não <i>muito</i> senciente.

Você precisará de... ajuda... provavelmente."
"I need to reawaken my blood powers. If only I hadn't killed the First Thrall years ago and stashed his body parts beneath a ruined tower in the Kur Mountains! But alas, I did.

Go and find them for me. Try not to alert Lomas to your presence -- you shouldn't need to see him at all. If you do encounter Lomas, tell him that I'll get him the money soon.": "Eu preciso despertar meus poderes de sangue. Se ao menos eu não tivesse matado o Primeiro Escravo anos atrás e escondido partes de seu corpo sob uma torre em ruínas nas Montanhas Kur! Mas, infelizmente, eu fiz.

Vá e encontre-os para mim. Tente não alertar Lomas sobre sua presença - você não deveria precisar vê-lo. Se você encontrar Lomas, diga a ele que vou conseguir o dinheiro para ele em breve."
"I need you to collect one more unusual wind-heart for me. You'll find the gale-chanting spot in Povus, near water. Summon a tornado there, and you should find a swampy wind. I need its heart. After you kill it, run quickly. You know why by now.": "Preciso que você colete mais um coração de vento incomum para mim. Você encontrará o local do canto do vendaval em Povus, perto da água. Invoque um tornado lá e você encontrará um vento pantanoso. Eu preciso do seu coração. Depois de matá-lo, corra rapidamente. Você já sabe o porquê."
"I need you to feel her out for me. I can't do it because she'll feel obligated toward me! That would break my heart -- I don't want to pressure her at all. So just ask if she'd ever be interested in dating a human, if the human was an incredible musician like her.\\\"\": \"Ormond Neth em Statehelm disse": "\\\"Meu amigo, devo revelar uma coisa. Estou apaixonado por Anaberyl! No começo eu disse a mim mesmo que estava simplesmente procurando por um músico incrível que estava em uma situação ruim. Mas nunca me senti assim antes por ninguém! Ela é tão... perfeita."
"I need you to go spelunking! There are caves all through the mountains, and some of them have mushrooms growing inside.

There's a kind of mushroom found only in this mountain range. Orcs call it 'Groxmax'. You'll know them by the stench of rotten meat. I'll pay well for them! Oh, and if you find other kinds of mushrooms, hold on to them too; I may need them.": "Preciso que você vá fazer espeleologia! Existem cavernas por todas as montanhas, e algumas delas têm cogumelos crescendo em seu interior.

Existe uma espécie de cogumelo que só se encontra nesta cordilheira. Os orcs chamam isso de 'Groxmax'. Você os reconhecerá pelo fedor de carne podre. Pagarei bem por eles! Ah, e se você encontrar outros tipos de cogumelos, guarde-os também; Posso precisar deles."
"I need you to help me reincarnate Lydia. Her soul is still trapped in this bauble you retrieved for me, but I think I can get her a new body. How? Well... don't ask me how I got a hold of this ritual, because that would make you sad. Instead, just help me bring her back! I need some very specific ingredients. Lord Eltibule is buried with one part. The other parts might be harder to find... but you're resourceful, you can do it!": "Preciso que você me ajude a reencarnar Lydia. A alma dela ainda está presa nesta bugiganga que você recuperou para mim, mas acho que posso conseguir um novo corpo para ela. Como? Bem... não me pergunte como consegui esse ritual, porque isso te deixaria triste. Em vez disso, apenas me ajude a trazê-la de volta! Preciso de alguns ingredientes muito específicos. Lord Eltibule está enterrado com uma parte. As outras partes podem ser mais difíceis de encontrar... mas você é engenhoso e consegue!"
"I need your discretion. I cannot be seen talking to my father right now. It would draw attention. Can you deliver this note to him for me? To find my father, follow the bread smell -- he works at the only remaining bakery in Statehelm.": "Preciso da sua discrição. Não posso ser visto conversando com meu pai agora. Chamaria a atenção. Você pode entregar este bilhete para ele por mim? Para encontrar meu pai, siga o cheiro do pão – ele trabalha na única padaria que resta em Statehelm."
"I need your help to make amends. I'm going to create the most wondrous gown for the general! I just need to know her favorite color. See if that beggar Three-Eye knows. He's in the dangerous part of town. Once you pass Sergeant Ultaka and are over the bridge, keep left. You'll see him on the porch, most likely.\\\"\": \"Shirogin em Rahu disse": "\\\"Eu estava com medo disso. Sim, eu sei por que estou na lista negra. Na última execução formal, elogiei o General Tremal por sua cauda. O General Tremal nasceu aqui, ao contrário dos generais mais antigos. Chamar a atenção para sua cauda foi um insulto e uma vergonha para ela."
"I need your help! Rumor is that General Pask may be coming for dinner soon! That's pretty terrifying, but his endorsement would really help my restaurant. I want to impress him with my masterpiece dish, but I need an exotic spice and I can't find it in the market! It's called 'oregano'. I don't know where it comes from, but it's definitely not from around here. Can you get me some?": "Eu preciso de sua ajuda! O boato é que o General Pask pode vir jantar em breve! Isso é muito assustador, mas o endosso dele realmente ajudaria meu restaurante. Quero impressioná-lo com minha obra-prima, mas preciso de um tempero exótico e não consigo encontrar no mercado! Chama-se 'orégano'. Não sei de onde vem, mas definitivamente não é daqui. Você pode me pegar um pouco?"
"I noticed something weird: there are a bunch of magical goblets lying around down here. They have necromantic magic, but I don't know what they do. If you find any of them, could you let me have them?": "Notei algo estranho: há um monte de taças mágicas espalhadas por aqui. Eles têm magia necromântica, mas não sei o que fazem. Se você encontrar algum deles, você poderia me deixar ficar com eles?"
"I owe you an apology. When you asked if I would collaborate with that orc on technology, I lost my temper. Hrmph. I actually <i>do</i> quite enjoy tinkering, and mining, and all the other stereotypical dwarven activities. I just hate when others presume that about me.

Please, return to your orcish friend and tell them I am willing to collaborate.": "Devo-lhe um pedido de desculpas. Quando você perguntou se eu colaboraria com aquele orc em tecnologia, perdi a paciência. Hmph. Na verdade, eu gosto bastante de consertar, minerar e todas as outras atividades estereotipadas dos anões. Eu simplesmente odeio quando outros presumem isso sobre mim.

Por favor, retorne ao seu amigo orc e diga-lhe que estou disposto a colaborar."
"I prefer real meat, and I love a good turkey sandwich this time of year. Damned turkeys can be hard to find, though. They hide in underbrush, and there's not much of that around here!

You might have to travel a bit, but see if you can whack a few and bring me back their plump, juicy carcasses.": "Prefiro carne de verdade e adoro um bom sanduíche de peru nesta época do ano. No entanto, malditos perus podem ser difíceis de encontrar. Eles se escondem na vegetação rasteira e não há muito disso por aqui!

Você pode ter que viajar um pouco, mas veja se consegue matar alguns e me trazer de volta suas carcaças rechonchudas e suculentas."
"I ran out of volatile ink yesterday. Get me more. The good stuff, for experts, not whatever worthless ink you use!": "Fiquei sem tinta volátil ontem. Consiga-me mais. As coisas boas, para os especialistas, não qualquer tinta inútil que você use!"
"I really didn't expect you to be able to do this one. I'm sorry I underestimated you.": "Eu realmente não esperava que você fosse capaz de fazer isso. Me desculpe por ter subestimado você."
"I really must have better food than what Durstin can cook. Even the ranalan pickles are getting old. Hmm, how about some of those 'grapefish'? I have to know why the humans call them that!

I hear they're in the lakes and streams around here, but they can be pretty quick. I'm sure with some practice you'll manage, though.": "Eu realmente devo ter comida melhor do que a que Durstin sabe cozinhar. Até os picles ranalan estão envelhecendo. Hmm, que tal alguns daqueles 'grapefish'? Eu tenho que saber por que os humanos os chamam assim!

Ouvi dizer que eles estão nos lagos e riachos por aqui, mas podem ser bem rápidos. Tenho certeza que com um pouco de prática você conseguirá."
"I really need a good dipping sauce to go with all this 'meat'. I heard you can do something with pumpkins -- that should be interesting.  But you'll have to find the recipe yourself.": "Eu realmente preciso de um bom molho para acompanhar toda essa 'carne'. Ouvi dizer que você pode fazer algo com abóboras – isso deve ser interessante.  Mas você mesmo terá que encontrar a receita."
"I remember a thing! It is called a Pixie Pocket. So named by cruel mortals! Or... perhaps named by cruel fairies... I do not remember. But I think I remember the formula! Here: my notes. Make the Pixie Pocket. Tell me if my formula works.": "Eu me lembro de uma coisa! É chamado de Pixie Pocket. Assim chamado por mortais cruéis! Ou... talvez nomeado por fadas cruéis... não me lembro. Mas acho que me lembro da fórmula! Aqui: minhas anotações. Faça o Pixie Pocket. Diga-me se minha fórmula funciona."
"I remember as a snotrat having to cut out hundreds of paper snowflakes for the tree each year. Tedious work, but it taught me how to use a knife! We'll need some stencils, though... otherwise they won't all be even, and then what's the point?": "Lembro-me, como um rabugento, de ter que cortar centenas de flocos de neve de papel para a árvore todos os anos. Trabalho tedioso, mas me ensinou a usar uma faca! Mas precisaremos de alguns estênceis... caso contrário, eles não serão todos uniformes, e então qual é o sentido?"
"I require human teeth. They must be in excellent condition!": "Eu preciso de dentes humanos. Eles devem estar em excelentes condições!"
"I saw you firsthand! Very brave stuff. You've put a damper on the Ranalon plans, and helped protect Statehelm.": "Eu vi você em primeira mão! Coisas muito corajosas. Você atrapalhou os planos de Ranalon e ajudou a proteger Statehelm."
"I see nothing, I say nothing! I... What? Parella? Oh no. The time has come. Very well, I made a deal and I will stand by it.

Here. I've written it down. Tell noone that I've betrayed my people this way. I'm hunted enough as it is!

I hope never to see you or Parella again!": "Não vejo nada, não digo nada! Eu... O quê? Parella? Oh não. Chegou a hora. Muito bem, fiz um acordo e vou cumpri-lo.

Aqui. Eu escrevi isso. Não conte a ninguém que traí meu povo dessa maneira. Já estou caçado o suficiente!

Espero nunca mais ver você ou Parella novamente!"
"I see that you didn't make the mistake of undersalting the dish. And this steak is ... Hm. Actually, it's pretty good. I'll eat it. Thank you.": "Vejo que você não cometeu o erro de subestimar o prato. E esse bife é... Hm. Na verdade, é muito bom. Eu vou comer. Obrigado."
"I see that you have been to the places of meditation. You look more honest now.

<i>[Uriana silently hands you an item from her hoard, then turns away.]</i>": "Vejo que você esteve em locais de meditação. Você parece mais honesto agora.

<i>[Uriana silenciosamente lhe entrega um item de seu tesouro e depois se vira.]</i>"
"I see you checking out my cool blue fur! I'm willing to bet you want to know how I do it too! Well, blue fur is a sign you have true booping power, and you look like you're capable of that. I'll teach you how to have awesome blue fur like me if you bring me a few things. Here's the list and good hunting!
 <i>[Remember that you must remain in rabbit form to advance and complete this task!]</i>": "Vejo você conferindo meu pelo azul legal! Aposto que você também quer saber como eu faço isso! Bem, pelo azul é um sinal de que você tem um verdadeiro poder de booping e parece que você é capaz disso. Eu vou te ensinar como ter um pelo azul incrível como o meu se você me trouxer algumas coisas. Aqui está a lista e boa caçada!
 <i>[Lembre-se de que você deve permanecer na forma de coelho para avançar e completar esta tarefa!]</i>"
"I see your menu has a selection of goblin food, including ruktagh. How are you getting fresh dill out here?! Well, I'm sure the dill isn't fresh. But the meal had better be!": "Vejo que seu cardápio tem uma seleção de comida goblin, incluindo ruktagh. Como você está conseguindo endro fresco aqui?! Bem, tenho certeza de que o endro não é fresco. Mas é melhor que a refeição seja!"
"I sense the seething rage of our dangerous foe. This can only mean that you have succeeded! Many thanks to you. Bury your fallen comrades and go back to your simple lives. Do not worry overmuch about any remaining elementals -- they will decay in time, for their master no longer drives them.": "Sinto a raiva fervilhante do nosso perigoso inimigo. Isso só pode significar que você teve sucesso! Muito obrigado a você. Enterre seus camaradas caídos e volte para suas vidas simples. Não se preocupe muito com quaisquer elementais restantes – eles irão decair com o tempo, pois seu mestre não os dirige mais."
"I set up camp here so that I could kill the Tor-Uraks and take their mandibles. Sometimes you get a good, strong mandible from them, and those are precious to me! But it turns out Tor-Uraks are much, much too dangerous for me to kill. Do you have any mandibles, by chance?": "Montei acampamento aqui para poder matar os Tor-Uraks e arrancar suas mandíbulas. Às vezes você consegue uma mandíbula boa e forte deles, e isso é precioso para mim! Mas acontece que Tor-Uraks é perigoso demais para eu matar. Você tem alguma mandíbula, por acaso?"
"I should have written it down, but that's what I remember. Hope it helps.\": \"Ah, você está de aluguel? Ótimo! Preciso de metal especial para minha próxima espada promocional. Gastei bastante para saber onde encontrá-lo. Posso ter encomendado a informação... do exterior. E você sabe como são as informações do... exterior": "sempre com a linguagem misteriosa! Mas espero que você consiga descobrir!"
"I should have written it down, but that's what I remember. Hope it helps.\\\"\": \"Winston Veilmoor em Statehelm disse": "\\\"Oh, você está contratado? Ótimo! Preciso de metal especial para minha próxima espada promocional. Gastei um pouco para saber onde encontrá-la. Posso ter encomendado as informações de... do exterior. E você sabe como são as informações do... exterior: sempre com a linguagem misteriosa! Mas espero que você consiga descobrir!"
"I sort of hate having to see the scray die. They're good pets. They don't really understand... no, stop! No time for sentiment! We have murders to scheme! Here's your reward. Let me figure out the next scheme -- give me a minute.": "Eu meio que odeio ter que ver o scray morrer. Eles são bons animais de estimação. Eles realmente não entendem... não, pare! Não há tempo para sentimentos! Temos assassinatos para planejar! Aqui está sua recompensa. Deixe-me descobrir o próximo esquema – dê-me um minuto."
"I still need more bones! I will pay you the same amount for another ten.": "Eu ainda preciso de mais ossos! Pagarei a mesma quantia por mais dez."
"I still wish to woo Zeratak. I believe she would enjoy venison far more than mantis flesh if it was prepared appropriately. I have been experimenting with venison dishes, and I believe I have the recipe!

But I don't have any more ingredients left. Here is the recipe. Can you make it for me?": "Ainda desejo cortejar Zeratak. Acredito que ela apreciaria muito mais carne de veado do que carne de louva-a-deus se fosse preparada adequadamente. Tenho experimentado pratos de carne de veado e acredito que tenho a receita!

Mas não tenho mais ingredientes. Aqui está a receita. Você pode fazer isso para mim?"
"I suppose any ratkin could be carrying some dice, but off-duty ratkin are most likely to have 'em.\\\"\": \"Bogaku, nos Esgotos de Rahu, disse": "\\\"Os Ratkin adoram jogar, é claro, mas os ratkin de cada região têm métodos diferentes. Os que estão por aqui parecem gostar de jogos de dados. Preciso de amostras de seus dados!"
"I suppose I could teach you horse-riding if you did a favor for me. You see, I despise goblins for obvious reasons, and there's talk of goblin miners in this area. I need to know what they're mining. You know how to kill a goblin, right? And swing a mining pick? Good, this should be easy for you! <i>[Note: Completion requires Mining 15.]</i>

I've heard there is a \"model home\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.": "Suponho que poderia lhe ensinar equitação se você me fizesse um favor. Veja, eu desprezo goblins por razões óbvias, e fala-se de goblins mineiros nesta área. Preciso saber o que eles estão minerando. Você sabe como matar um goblin, certo? E balançar uma picareta de mineração? Bom, isso deve ser fácil para você! <i>[Nota: a conclusão requer Mineração 15.]</i>

Ouvi dizer que existe uma “casa modelo” em algum lugar por aqui – uma casa falsa. Se você subir no porão e passar por alguns goblins, há uma caverna embaixo. Descubra o que os goblins estão minerando naquela caverna! Vá até o final e mine o que estiver lá. Traga-me uma amostra."
"I suppose you could do this on your own, but were I you, I would gather some backup before attacking an army.\\\"\": \"Parella em Statehelm disse": "\\\"Aqui está a receita de Gozzaroon. Faça uma dessas, encontre a laje de pedra no oceano e use o farol lá. Então cuidado! Ranalon virá de todos os lugares."
"I suppose you're ready for a REAL challenge, then! Um, finish enemies off with bardic blasts. But they have to be sentient enemies! And at night! And you can't wear a hat! And don't die!\\\"\": \"Ormond Neth, em Statehelm, disse": "“Você não pode ser tão bom. Não sei qual é o seu jogo, mas ninguém conclui esses cursos tão rapidamente!"
"I sure could use a huge pile of spruce wood chips.": "Eu certamente poderia usar uma pilha enorme de lascas de madeira de abeto."
"I swear upon Tast's mighty throbbing cock that the bombs were fake! This can't have been my fault!": "Juro pelo poderoso pau latejante de Tast que as bombas eram falsas! Isso não pode ter sido minha culpa!"
"I think it'll cheer Sarina up if I make a bouquet of flowers like we used to have back home. But of course we used flowers native to the fey realm...

Hey, actually, I know where you can get some! Look for the wooden pillars nearby. They were going to make a new city out there, but then they gave up. But they planted some Flitterbies early on, and those suckers are hard to kill! I bet there's still some out there.": "Acho que Sarina vai ficar animada se eu fizer um buquê de flores como costumávamos ter em casa. Mas é claro que usamos flores nativas do reino das fadas...

Ei, na verdade, eu sei onde você pode conseguir alguns! Procure os pilares de madeira próximos. Eles iam fazer uma nova cidade lá fora, mas desistiram. Mas eles plantaram alguns Flitterbies logo no início, e esses idiotas são difíceis de matar! Aposto que ainda há alguns por aí."
"I think it's an assault force, hiding in the caves beneath the city. When the slab activates, they'll show up to attack. We need to activate that beacon early, before they're fully prepared. That will catch them off guard. The only trick is": "how do we activate it?"
"I think it's those ghastly exploding sheep. If an explosion gets sucked up into a tornado, that can really upset it. Could you clear the area of those fiery abominations?\\\"\": \"Trasen em Serbule Hills disse": "\\\"Se você ouvir com atenção, poderá ouvir os tornados amigáveis por aqui fazendo um ruído oscilante aproximadamente cinco notas acima do normal. Eles estão obviamente em perigo significativo!"
"I think Ser Hackley in the Council building sells plans for bug bumbs, if you're into gadgeteering?\\\"\": \"Deville Neth, em Statehelm, disse": "\\\"Não posso abrir minha loja com essas baratas aqui. Se você tivesse bombas contra insetos, poderia limpá-la para mim. Eu o recompensaria!"
"I think that about does it. Come see me in Statehelm.": "Eu acho que é isso. Venha me ver em Statehelm."
"I think that probably improved your patience by 2 or 3 percent. Good job!": "Acho que isso provavelmente melhorou sua paciência em 2 ou 3%. Bom trabalho!"
"I think that will do it! It looks hideous to my elven eyes, but I presume humans think this sort of thing is beautiful.

And since we're guests here, we're happy to honor human rites, including the presentation of gifts! We'll be taking turns placing gifts beneath the eyesore, and you should stop by every day in case there's presents for you! In fact, there's a little gift under there already, from me to you. Enjoy.": "Eu acho que isso vai dar certo! Parece horrível aos meus olhos élficos, mas presumo que os humanos achem esse tipo de coisa lindo.

E como somos convidados aqui, temos prazer em homenagear os ritos humanos, inclusive a entrega de presentes! Estaremos nos revezando para colocar presentes sob as monstruosidades, e você deve passar por aqui todos os dias, caso haja presentes para você! Na verdade, já tem um presentinho aí embaixo, meu para você. Aproveitar."
"I think we need a backup soup in case the eyeball soup doesn't go over well. Can you get these ingredients?": "Acho que precisamos de uma sopa reserva caso a sopa do globo ocular não corra bem. Você consegue esses ingredientes?"
"I thought goblinkind eradicated the wily cave hippo years ago, but they've been hiding here! No doubt the ratkin are breeding them in a scheme to flood our waterways. Destroy the wily water-beasts before they fill our waterways and rob good, kind-hearted goblins of crucial custom!": "Pensei que os goblinkind tivessem erradicado o astuto hipopótamo das cavernas anos atrás, mas eles estão escondidos aqui! Não há dúvida de que os ratkin os estão a criar num esquema para inundar os nossos cursos de água. Destrua as astutas feras aquáticas antes que elas encham nossos cursos de água e roubem dos goblins bons e de bom coração costumes cruciais!"
"I thought I saw some spoons lying around here somewhere. They could be anywhere on the island, though. Can you see if you can find a couple? I want to use them in my art.": "Pensei ter visto algumas colheres por aqui em algum lugar. Eles poderiam estar em qualquer lugar da ilha, no entanto. Você pode ver se consegue encontrar um casal? Quero usá-los em minha arte."
"I thought this stupid magic fire would keep me warm, but it keeps shutting out! I guess I need to put firewood in it. Like a savage. But I'm too cold to go looking for wood... could you bring me some?": "Achei que esse estúpido fogo mágico iria me manter aquecido, mas ele continua se fechando! Acho que preciso colocar lenha nele. Como um selvagem. Mas estou com muito frio para procurar madeira... você poderia me trazer alguma?"
"I threw out the hexapus arm but I still keep getting infected with Hexapus Ear every night! It's disgusting! It's... humiliating at this point. Please, you have to help me sanitize my bed area! ... And also get me a tentatkiller arm to replace the odor of the hexapus arm.\\\"\": \"Gleanfeckle em Statehelm disse": "\\\"Oh, é você. O idiota que me deu um braço hexapus infestado para dormir! Bem, para seu crédito, todos aqueles odores horríveis se cancelaram e eu consegui dormir um pouco, mas dois dias depois eu estava com uma dor terrível. Visitei Steven, o curandeiro, que declarou que eu tinha orelha hexapus e me curou. Aparentemente, o tentáculo que você me deu estava coberto de ovos, e eles cobriram tudo!"
"I try to be brave and upbeat about my fate because it makes things a little less horrible, you know? And some days aren't too bad... but some days are really pretty awful. I wish I had some dry gin for those occasions. Do you have any?": "Tento ser corajoso e otimista em relação ao meu destino porque isso torna as coisas um pouco menos horríveis, sabe? E alguns dias não são tão ruins... mas alguns dias são realmente horríveis. Eu gostaria de ter um pouco de gim seco para essas ocasiões. Você tem algum?"
"I try to keep my shop stocked with the essentials... but what IS an essential, anyway? I don't personally need much, so I've been stocking a bit of everything, in case it's essential to somebody else. Despite this, sales are... not good.

But I have a lead on a sale: Crelpin asked if I had any fresh pears, and I realized I didn't! Mine are old! If you're headed out of town, please pick me up some really fresh ones. And don't eat them!": "Tento manter minha loja abastecida com o essencial... mas afinal, o que É essencial? Pessoalmente não preciso de muito, então tenho estocado um pouco de tudo, caso seja essencial para outra pessoa. Apesar disso, as vendas... não são boas.

Mas tenho uma pista de venda: Crelpin perguntou se eu tinha peras frescas e percebi que não! Os meus são antigos! Se você estiver saindo da cidade, compre alguns bem novos para mim. E não os coma!"
"I understand there's some sort of mechanism that protects her treasure. Just figure it out and get it done.\\\"\": \"Lady Alethina no Red Wing Casino disse": "\\\"Tenho uma nova pista sobre a força militar secreta enterrada no deserto de Ilmari! Você vai me ajudar a desvendar isso de uma vez por todas. Vá para o deserto e encontre o bunker que os locais chamam de \\\"labirinto\\\". este lugar é uma bruxa chamada Claudia. Mate-a! Traga amigos - bruxas não são brincadeira."
"I understand they live under the water or somesuch thing. Finding it would be worthwhile.\\\"\": \"Merriana em Serbule Hills disse": "“O orbe que você encontrou para mim era falso, mas sei que está em algum lugar em Serbule Hills!"
"I use special fetish pouches when I commune with the dead. One of the ingredients is dried onion, and I'm out. I'll give you good money if you have some!": "Eu uso bolsas fetichistas especiais quando comungo com os mortos. Um dos ingredientes é cebola seca e estou fora. Eu lhe darei um bom dinheiro se você tiver algum!"
"I used to get really thirsty -- and because of my size, I had to drink a TON of nectar each day. But recently I've outgrown the need for sustenance by realizing that my physical form is illusory and my existence is meaningless. Saves me a lot of hassle!

But there's a problem. I used to stash pots of fairy nectar all over the place in case I got thirsty while travelling. But since I stopped drinking the stuff, it's gone bad! And there are real insects in the caves out there. I'm afraid someone's going to drink that nectar and die!

Can you find the nectar bottles and dump them out for me? Thanks, pal.": "Eu costumava ficar com muita sede - e por causa do meu tamanho, eu tinha que beber uma tonelada de néctar todos os dias. Mas recentemente superei a necessidade de sustento ao perceber que minha forma física é ilusória e que minha existência não tem sentido. Me poupa muito trabalho!

Mas há um problema. Eu costumava esconder potes de néctar de fada por todo lado, para o caso de ficar com sede durante a viagem. Mas desde que parei de beber essa coisa, piorou! E há insetos reais nas cavernas por aí. Tenho medo que alguém beba esse néctar e morra!

Você pode encontrar as garrafas de néctar e despejá-las para mim? Obrigado, amigo."
"I used to grow veggies myself, but I don't move as smoothly as I used to. Gotta save my energy for the grapes! Which means I'm in a bit of an embarrassing situation: I need to restock my larder with onions. Can you grow some for me?": "Eu costumava cultivar vegetais, mas não me movo tão bem como antes. Tenho que economizar energia para as uvas! O que significa que estou numa situação um pouco embaraçosa: preciso reabastecer minha despensa com cebolas. Você pode cultivar alguns para mim?"
"I used to have a beautiful little table where I could leave my paintings to dry. Do you want to know a secret? It was actually a repurposed calligraphy table! I would buy a replacement in an instant, as long as I was confident it wasn't made by goblin slave-labor.": "Eu tinha uma mesinha linda onde podia deixar meus quadros secarem. Você quer saber um segredo? Na verdade, era uma mesa de caligrafia reaproveitada! Eu compraria um substituto em um instante, desde que tivesse certeza de que não era feito por trabalho escravo de goblins."
"I used to have a great little meditation stool which I used while working in my garden. The orcs stole it, of course. I would pay well for a replacement... but only if I know the crafter. I don't want to accidentally support slave labor!": "Eu costumava ter um banquinho de meditação excelente que usava enquanto trabalhava no meu jardim. Os orcs roubaram, é claro. Eu pagaria bem por uma substituição... mas apenas se conhecer o artesão. Não quero apoiar acidentalmente o trabalho escravo!"
"I used to maintain these loading golems, back when there were more of 'em. It was sort of my side-job. And, well, I guess since nobody else is taking responsibility, I still have to do it! So I've been doing safety inspections on the golems. I've made some easy fixes, but the scarier problems require special parts.": "Eu costumava manter esses golens de carregamento, quando havia mais deles. Foi uma espécie de meu trabalho paralelo. E, bem, acho que já que ninguém mais está assumindo a responsabilidade, ainda tenho que fazê-lo! Então, tenho feito inspeções de segurança nos golens. Fiz algumas soluções fáceis, mas os problemas mais assustadores requerem peças especiais."
"I used to really enjoy beef kebabs. There's just something <i>primal</i> about ripping chunks of flesh off a pointy stick. I mean, that's disgusting to me now, but ... It was kind of fun.

Anyway, think you could whip up something similar? You'll have to find the recipe yourself.": "Eu gostava muito de espetinhos de carne. Há algo de <i>primitivo</i> em arrancar pedaços de carne de um pedaço de pau pontiagudo. Quer dizer, isso é nojento para mim agora, mas... Foi meio divertido.

De qualquer forma, você acha que poderia preparar algo semelhante? Você terá que encontrar a receita sozinho."
"I used to walk the riverbank and collect old fishing nets. I use them for all sorts of crafts! But it's too dangerous to do that these days. If you find some nets, though, I'd like them! I can't pay much, but I'll pay a bit.": "Eu costumava caminhar pela margem do rio e recolher velhas redes de pesca. Eu os uso para todos os tipos de artesanato! Mas é muito perigoso fazer isso hoje em dia. Se você encontrar algumas redes, eu gostaria delas! Não posso pagar muito, mas pagarei um pouco."
"I used up my last bear gallbladder this morning. Now what will I do if someone comes asking about their chances for inheritance? Or what if someone asks me the sex of their unborn?! I need more bear gallbladders right away! And we're out of stock!": "Eu usei minha última vesícula biliar de urso esta manhã. Agora, o que farei se alguém vier perguntar sobre suas chances de herança? Ou e se alguém me perguntar o sexo do seu nascituro?! Preciso de mais vesículas de urso imediatamente! E estamos sem estoque!"
"I want Amulna to be a welcoming place for all creatures, but so few desert-dwellers behave appropriately. Even our fellow Rakshasa have attacked our settlement several times this year. And then the roving packs of cat-things attacked... and of course those ridiculous human-faced cat things...

Simply put, the Sand Seer is the only reason we haven't been overrun already. But she won't be living here forever. This part of the desert must be made more secure!": "Quero que Amulna seja um lugar acolhedor para todas as criaturas, mas são poucos os habitantes do deserto que se comportam adequadamente. Até os nossos companheiros Rakshasa atacaram o nosso assentamento várias vezes este ano. E então os bandos itinerantes de coisas-gatos atacaram... e, claro, aquelas coisas ridículas de gatos com rosto humano...

Simplificando, o Sand Seer é a única razão pela qual ainda não fomos invadidos. Mas ela não viverá aqui para sempre. Esta parte do deserto deve ser mais segura!"
"I want some meatballs. Think you can do meatballs? But it needs to have something harvest-y going on.  You'll have to find the recipe yourself.

And remember, no actual dead turkeys -- or gods forbid, cows!": "Eu quero algumas almôndegas. Acha que pode fazer almôndegas? Mas precisa haver algo de colheita acontecendo.  Você terá que encontrar a receita sozinho.

E lembre-se, não há perus mortos de verdade - ou Deus me livre, vacas!"
"I want to make my mate's favorite cheese for her, but it requires extremely pungent rennet. And, of course, I have nothing to make that with!": "Quero fazer para ela o queijo preferido da minha companheira, mas requer coalho extremamente picante. E, claro, não tenho nada com que fazer isso!"
"I want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.\": \"Helena é uma degenerada. Ela é viciada em jogos de azar e, pior": "viciada em TRAIÇÃO no jogo. Mas ainda assim, ela é uma Veilmoor. Se ela fosse vítima de um monstro ou de um salteador, isso mancharia o nome de Veilmoor. Essa é a minha desculpa, de qualquer maneira."
"I want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.\\\"\": \"Sam Veilmoor em Statehelm disse": "\\\"Helena é uma degenerada. Ela é viciada em jogos de azar e, pior: ela é viciada em trapacear no jogo. Mas ainda assim, ela é uma Veilmoor. Se ela fosse vítima de um monstro ou de um salteador de estrada, isso mancharia o nome de Veilmoor. Essa é a minha desculpa, de qualquer maneira."
"I want to send Michael a package of treats and wonders from Rahu to show how amazing this place is. I have a list here... could you help me? If you get these items, I'll teach you a special organizational cantrip that we use in the book-sellers' trade.\\\"\": \"Wintria Irasce, em Rahu, disse": "\\\"Deixei meu irmão administrando nossa livraria em Statehelm. Preciso que ele pense que estou feliz aqui! Caso contrário, ele não entenderá por que não estou pronto para voltar para casa."
"I want to show Red how useful I am. First idea: I want to hide Fox Outpost better. Red says it used to be hidden by a glamour, but now it's just stuck out here in the open.

I'll have to experiment with what works best, but my first idea is just to use paint to camouflage things. Can you help me get the paint ready? I need agates. They should make a paint that's similar to the color of the rocks around here.": "Quero mostrar ao Red o quanto sou útil. Primeira ideia: quero esconder melhor o Fox Outpost. Red diz que costumava ser escondido por um glamour, mas agora está apenas exposto aqui.

Terei que experimentar o que funciona melhor, mas minha primeira ideia é apenas usar tinta para camuflar as coisas. Você pode me ajudar a preparar a tinta? Eu preciso de ágatas. Eles deveriam fazer uma tinta parecida com a cor das pedras por aqui."
"I was ... um... \"sparring\" with Joeh yesterday and things got out of hand. I've been having nosebleeds off and on ever since. And I can't stand blood! Can you get me a more potent bandage?": "Eu estava... hum... \"lutando\" com Joeh ontem e as coisas saíram do controle. Tenho tido sangramentos nasais intermitentes desde então. E eu não suporto sangue! Você pode me arranjar um curativo mais potente?"
"I was a brewmaster! Not a warrior! I mean, I could fight -- what brewmaster can't brawl? But I wasn't supposed to get blown up! I was drinking Remga's Raging Rum, and a toy bomb let off a spark... And then I guess my rum exploded.

I just wish I could have one last taste of Remga's.": "Eu era um mestre cervejeiro! Não é um guerreiro! Quero dizer, eu poderia lutar – que mestre cervejeiro não pode brigar? Mas eu não deveria ter explodido! Eu estava bebendo Remga's Raging Rum e uma bomba de brinquedo soltou uma faísca... E então acho que meu rum explodiu.

Eu só queria poder provar uma última vez do Remga."
"I was afraid of this. Yes, I know why I'm blacklisted. At the last formal execution, I complimented General Tremal on her tail. General Tremal was born here, unlike the oldest generals. Drawing attention to her tail was an insult and an embarrassment to her.

Hm? Oh, no, it wasn't a mistake. General Tremal had given me a backhanded compliment about my clothes, and I was reciprocating. I just didn't realize how far out of my league Tremal is. I'm blacklisted from executions!

I need your help to make amends. I'm going to create the most wondrous gown for the general! I just need to know her favorite color. See if that beggar Three-Eye knows. He's in the dangerous part of town. Once you pass Sergeant Ultaka and are over the bridge, keep left. You'll see him on the porch, most likely.": "Eu estava com medo disso. Sim, eu sei por que estou na lista negra. Na última execução formal, elogiei o General Tremal por seu encalço. Aqui nasceu o General Tremal, ao contrário dos generais mais antigos. Chamar a atenção para sua cauda era um insulto e uma vergonha para ela.

Hum? Ah, não, não foi um erro. O General Tremal me fez um elogio indireto sobre minhas roupas, e eu estava retribuindo. Eu simplesmente não percebi o quão fora do meu alcance Tremal está. Estou na lista negra de execuções!

Preciso da sua ajuda para fazer as pazes. Vou criar o vestido mais maravilhoso para o general! Só preciso saber a cor favorita dela. Veja se aquele mendigo Três Olhos sabe. Ele está na parte perigosa da cidade. Depois de passar pelo Sargento Ultaka e passar pela ponte, mantenha-se à esquerda. Você o verá na varanda, provavelmente."
"I was guarding the switch when it happened. I wasn't even there!

I know what she said. I know! But those weren't REAL! It was a prank! I took it from a goblin. It only looked like... what? No, just to scare Frek and Jule! They were my... no, that's not true!

They had to be fake...": "Eu estava guardando o interruptor quando isso aconteceu. Eu nem estava lá!

Eu sei o que ela disse. Eu sei! Mas aqueles não eram REAIS! Foi uma brincadeira! Eu peguei de um goblin. Parecia apenas... o quê? Não, só para assustar Frek e Jule! Eles eram meus... não, isso não é verdade!

Eles tinham que ser falsos..."
"I was hired to play at a wedding, and I need good publicity, so this gig has to be great! The requested music is not a problem since I'm amazing. But these foreigners have a weird custom: near the end of the ritual, rice is thrown at the couple. I asked if balls of ordinary Rahu rice would do, and they said no -- they're too heavy! So I guess that I'll need secret rice. You know: the incredibly deliciously fluffy rice that can't be found in stores. The trick is: how do I get some? Do you have any?": "Fui contratado para tocar em um casamento e preciso de boa publicidade, então esse show tem que ser ótimo! A música solicitada não é problema já que sou incrível. Mas esses estrangeiros têm um costume estranho: perto do final do ritual, joga-se arroz no casal. Perguntei se bolinhas de arroz Rahu comum serviriam e eles disseram que não - são muito pesadas! Então acho que vou precisar de arroz secreto. Você sabe: o arroz incrivelmente delicioso e fofo que não pode ser encontrado nas lojas. O truque é: como faço para conseguir alguns? Você tem algum?"
"I was in my cups yesterday -- that's sailor slang, you probably don't know it -- it means I was EXTREMELY drunk. I've picked up a lot of sailor slang, but everyone knows I'm afraid of the ocean. On account of the krakens. So I pass out and when I wake up there's a note that says 'Your salami went sailing, come find us!'

Ha ha very funny, but the thing is, that salami was my latest experiment in creating the legendary Ur-Salami. And it seems to be a failed experiment! If anyone eats that salami, well... I might get in a lot of trouble. You gotta help.

I bet those fuckers hid my salami aboard the ships out there. They would have stayed away from the Salty Slattern, if that's any help to ya. You should hurry. The stench is evil. And no snacking on it!": "Eu estava bêbado ontem - isso é gíria de marinheiro, você provavelmente não conhece - significa que eu estava EXTREMAMENTE bêbado. Aprendi muitas gírias de marinheiro, mas todo mundo sabe que tenho medo do oceano. Por conta dos krakens. Então eu desmaio e quando acordo tem um bilhete que diz 'Seu salame navegou, venha nos encontrar!'

Ha ha, muito engraçado, mas o fato é que aquele salame foi minha última experiência na criação do lendário Ur-Salami. E parece ser uma experiência fracassada! Se alguém comer aquele salame, bem... posso me meter em muitos problemas. Você tem que ajudar.

Aposto que aqueles filhos da puta esconderam meu salame a bordo dos navios. Eles teriam ficado longe do Salty Slattern, se isso fosse de alguma ajuda para você. Você deveria se apressar. O fedor é maligno. E nada de beliscar!"
"I was looking for you! Got a real tricky one for you this time. Masterworks, but with a slight intentional weak spot here and here. Never you mind what they're for, just make them to this specification and I'll pay well.": "Eu estava procurando por você! Tenho um problema muito complicado para você desta vez. Obras-primas, mas com um leve ponto fraco intencional aqui e aqui. Não importa para que servem, basta fazê-los com esta especificação e eu pagarei bem."
"I was once a professional alchemist, and I'm certain there's a formula that will help me keep my sanity when the full moon comes. The secret is those horrible flowers that grow out in the snow: wolfsbane. But it's hard for me to pick them, because they're very toxic to me now. Can you get some for me?": "Já fui um alquimista profissional e tenho certeza de que existe uma fórmula que me ajudará a manter minha sanidade quando a lua cheia chegar. O segredo são aquelas flores horríveis que crescem na neve: o acônito. Mas é difícil para mim escolhê-los, porque agora são muito tóxicos para mim. Você pode pegar um pouco para mim?"
"I was one of the last lumberjacks to leave our logging camp. Thought I could hold out against some lousy goblins, but they just kept coming! Eventually I had to run. I left behind a lot of great beer, which I'm sure is all gone by now. But more importantly, I left behind my lucky belt buckle. I'd really like it back.

The camps are east of here, over some hills. The buckle is in the northernmost camp, if that helps.": "Fui um dos últimos lenhadores a deixar nosso acampamento madeireiro. Pensei que conseguiria resistir a alguns goblins nojentos, mas eles continuaram vindo! Eventualmente eu tive que correr. Deixei para trás muita cerveja boa, que tenho certeza que já acabou. Mas o mais importante é que deixei para trás a fivela do meu cinto da sorte. Eu realmente gostaria disso de volta.

Os acampamentos ficam a leste daqui, em algumas colinas. A fivela está no acampamento mais ao norte, se isso ajudar."
"I was patrolling near the mouth of Foothills Cave in the far northwest, and mummies were pouring out! At first I thought they were activated by some evil necromancer, but they aren't marching anywhere. They're... well, they're just wandering around killing things. And they're trampling the delicate vegetation! And also they're fucking MUMMIES! I don't even know how to kill a mummy. I'm just a pig. I didn't sign up for this!\\\"\": \"Trekker em Gazluk disse": "\\\"Estou tão feliz que você conseguiu vir! São múmias!"
"I was stationed here to keep an eye on Korbok, so to hear that you collected various poisons for him is troubling. Doubly so, that he winked at you when you gave them to him. Bring me a sampling of all of the poisons that you gave him, so I can try to suss out what he's working on without confronting him directly.": "Fiquei aqui para ficar de olho em Korbok, então saber que você coletou vários venenos para ele é preocupante. Duplamente, que ele piscou para você quando você os deu a ele. Traga-me uma amostra de todos os venenos que você deu a ele, para que eu possa tentar descobrir no que ele está trabalhando sem confrontá-lo diretamente."
"I was talking to a sailor earlier who gave me the most insightful advice! He said that in the west, their holy women allow themselves to be attacked by at least ten different dinosaurs. This gives them the real-world experience they need to help people with many different problems. Why don't you try that? But you don't need to get hit by ten different dinosaurs, though -- you aren't some holy woman! Ha ha! No, nine different dinosaurs will do for you. And I guess really, anything in the dinosaur family would work.": "Eu estava conversando com um marinheiro que me deu conselhos muito perspicazes! Ele disse que no Ocidente, suas mulheres sagradas se permitem ser atacadas por pelo menos dez dinossauros diferentes. Isso lhes dá a experiência do mundo real de que precisam para ajudar pessoas com muitos problemas diferentes. Por que você não tenta isso? Mas você não precisa ser atingido por dez dinossauros diferentes - você não é uma mulher sagrada! Ha ha! Não, nove dinossauros diferentes servirão para você. E acho que realmente qualquer coisa na família dos dinossauros funcionaria."
"I was thinking about my friend Az. He's never experienced an orcish birthday. That's when your friends make you medals. Joke medals. Even I had friends in Gazluk. I want to give Azagrus a bit of that experience. Here: this one's perfect. Can you give it to him?": "Eu estava pensando no meu amigo Az. Ele nunca teve um aniversário orc. É quando seus amigos lhe dão medalhas. Medalhas de piada. Até eu tinha amigos em Gazluk. Quero dar ao Azagrus um pouco dessa experiência. Aqui: este é perfeito. Você pode dar a ele?"
"I went hunting with the bow you helped me repair! And it sucks. It's frankly unusable. It turns out the only reason it worked before was due to all the magic, because normal ivory doesn't bend or flex at all! I guess I let all the magic out when I replaced the ivory, and now it's junk. But not to worry! I can research the spells necessary to fix it! But that will take a while. For now, I need a substitute.

I've always hunted with a bow I made myself, even back when I was a child. I'm not going to just use some store-bought bow now at age 438! Can you get me some really perfect cedar wood for a temporary bow?": "Fui caçar com o arco que você me ajudou a consertar! E é uma merda. É francamente inutilizável. Acontece que a única razão pela qual funcionou antes foi devido a toda a magia, porque o marfim normal não dobra nem flexiona! Acho que deixei escapar toda a magia quando substituí o marfim, e agora é lixo. Mas não se preocupe! Posso pesquisar os feitiços necessários para consertar isso! Mas isso vai demorar um pouco. Por enquanto, preciso de um substituto.

Sempre cacei com um arco que eu mesmo fiz, desde quando era criança. Não vou usar apenas um arco comprado em loja agora aos 438 anos! Você pode me conseguir uma madeira de cedro realmente perfeita para um arco temporário?"
"I will tell you a secret": "I once made jewelry. My mother taught me. And I have a necklace stored away that is ugly. So it would be perfect for you! Here. Take it! Wear it proudly!\": \"Bom. Essa pirita servirá."
"I wish I could help Tryaka recover from the invasion. She has seemed distant. Even... I don't dare say it to her face... a bit afraid. I need to bring her mind back to practical matters! If I had some agates, I could convince her to return to jewelrycrafting.": "Eu gostaria de poder ajudar Tryaka a se recuperar da invasão. Ela parecia distante. Mesmo... não me atrevo a dizer isso na cara dela... com um pouco de medo. Preciso trazer sua mente de volta para questões práticas! Se eu tivesse algumas ágatas, poderia convencê-la a voltar a fazer joias."
"I wish I got to hear their pained cries and see the life drain from their eyes... you're so lucky!": "Eu gostaria de ouvir seus gritos de dor e ver a vida se esvaindo de seus olhos... você tem muita sorte!"
"I wish I had a great calligraphy bench...": "Eu gostaria de ter um ótimo banco de caligrafia..."
"I wish I had a great meditation stool...": "Eu gostaria de ter um ótimo banco de meditação..."
"I wish I had a great new chair...": "Eu gostaria de ter uma ótima cadeira nova..."
"I wish I had a great new storage crate...": "Eu gostaria de ter uma ótima caixa de armazenamento nova..."
"I wish I had an amazing calligraphy bench...": "Eu gostaria de ter um banco de caligrafia incrível..."
"I wish I had an amazing cleaning staff...": "Eu gostaria de ter uma equipe de limpeza incrível..."
"I wish I had an amazing meditation stool...": "Eu gostaria de ter um banco de meditação incrível..."
"I wish I had an amazing new chair...": "Eu gostaria de ter uma cadeira nova incrível..."
"I wish I had fresh basil...": "Eu gostaria de ter manjericão fresco..."
"I wish I had some fresh cantaloupe...": "Eu gostaria de ter um pouco de melão fresco..."
"I wish I had some peaches to give to Tryaka.": "Eu gostaria de ter alguns pêssegos para dar a Tryaka."
"I wish I was a butcher. They must be overflowing with animal stomachs! But not me. My last batch of cheese used vegetarian rennet. Eugh! If you find some stomachs, save me a few, would you?": "Eu gostaria de ser um açougueiro. Eles devem estar transbordando de estômagos de animais! Mas não eu. Meu último lote de queijo usou coalho vegetariano. Ei! Se você encontrar alguns estômagos, guarde alguns para mim, certo?"
"I wish I'd had time to get all the supplies out of the keep before I left! Those squatters make it hard to get my stuff out of there now. I had a crate of gratflower millet in there, and I think it's still good! Could you go get it for me? It's in the front tower -- you'll walk under it as you enter the keep.

Oh, the wooden stairs to the towers were torn down, so you'll have to be a little creative.": "Eu gostaria de ter tido tempo de retirar todos os suprimentos do castelo antes de partir! Esses invasores tornam difícil tirar minhas coisas de lá agora. Eu tinha uma caixa de milheto lá dentro e acho que ainda está bom! Você poderia ir buscá-lo para mim? Está na torre da frente – você passará por baixo dela ao entrar na fortaleza.

Ah, as escadas de madeira para as torres foram derrubadas, então você terá que ser um pouco criativo."
"I wish oranges grew around here...": "Queria que crescessem laranjas por aqui..."
"I wish to mate with Zeratak, mammal. I wish it but it cannot be without my death. Do you see the issue? I must provide sustenance for the young, and traditionally that would be my body.

A new tradition is needed. Perhaps some other creatures would work just as well. But I should get a <i>lot</i> of them... just to be on the safe side. Deer innards are preferable. But they run so fast!": "Desejo acasalar com Zeratak, mamífero. Eu desejo isso, mas não pode acontecer sem a minha morte. Você vê o problema? Devo fornecer sustento aos jovens e, tradicionalmente, esse seria o meu corpo.

É necessária uma nova tradição. Talvez algumas outras criaturas funcionassem igualmente bem. Mas eu deveria comprar muitos deles... só por segurança. As entranhas de veado são preferíveis. Mas eles correm tão rápido!"
"I wonder if there's any new discoveries about the demons. If you could bring me some more demonic research, I'd be grateful.": "Eu me pergunto se há alguma nova descoberta sobre os demônios. Se você pudesse me trazer mais pesquisas demoníacas, eu ficaria grato."
"I wonder where these ratkin are getting their appetizers. Can you get some for me so I can check them?": "Eu me pergunto onde esses ratkin estão conseguindo seus aperitivos. Você pode conseguir alguns para mim para que eu possa verificá-los?"
"I would have had Pennoc thrown in the dungeon if we had a dungeon. <i>Sigh.</i> What if his ploy works and the circus comes here? I barely have enough supplies for the elven refugees, let alone a bunch of circus freaks! Can you help me prepare for the worst-case scenario?\\\"\": \"Nelson Ballard em Serbule disse": "\\\"Estou preocupado com algo que provavelmente é rebuscado... mas não me atrevo a ignorar a possibilidade. Aquele elfo idiota Pennoc convidou um circo itinerante de Senoca para vir nos visitar aqui. Somos pequenos demais para um circo normalmente se preocupar, mas ele prometeu a eles uma recepção excepcionalmente amigável, \\\"no estilo élfico\\\", e até prometeu hospedagem e alimentação grátis por semanas!"
"I would like your help on a delicate subject. I need to know if the goblin Urzab had anything to do with what happened to me in the desert. He lives in Amulna.

There is a catch, however: he only speaks goblinese. Rick has confronted him, but Rick's goblinese is poor and he is not sure he understood everything. Do you happen to be fluent? If so, could you speak to Urzab about the attempt on my life?": "Gostaria de sua ajuda em um assunto delicado. Preciso saber se o goblin Urzab teve alguma coisa a ver com o que aconteceu comigo no deserto. Ele mora em Amulna.

Há um porém: ele só fala goblinês. Rick o confrontou, mas o goblinês de Rick é pobre e ele não tem certeza se entendeu tudo. Por acaso você é fluente? Se sim, você poderia falar com Urzab sobre o atentado contra minha vida?"
"I wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!\": \"Olha, eu não preciso de ajuda aleatória de mortais aleatórios! Alguém me trouxe esta poção de inibição da memória e estou estudando-a. Acho que posso inverter o efeito. Bem, posso inverter <i>alguma coisa</i>": "memórias, emoções, órgãos internos, alguma coisa. E algo é melhor que nada."
"I wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!\\\"\": \"Midge, no Reino Fae, disse": "\\\"Olha, não preciso de ajuda aleatória de mortais aleatórios! Alguém me trouxe esta poção de inibição de memória e estou estudando-a. Acho que posso inverter o efeito. Bem, posso inverter <i>alguma coisa</i>: memórias, emoções, órgãos internos, alguma coisa. E algo é melhor do que nada."
"I'd like to engrave a blessing of safety into the door of Ukorga's inn. It'll act as a protective charm. But I need some special items to do it! First, I need lapis gems. They're the favorite gem of Arisetsu. Can you find me some?": "Gostaria de gravar uma bênção de segurança na porta da pousada de Ukorga. Funcionará como um amuleto protetor. Mas preciso de alguns itens especiais para fazer isso! Primeiro, preciso de gemas de lápis-lazúli. Eles são a joia favorita de Arisetsu. Você pode me encontrar alguns?"
"I'll finish up the amulet now. Then you can take it to her, okay?": "Vou terminar o amuleto agora. Depois você pode levar para ela, ok?"
"I'll hand you the barrels six at a time. You don't have to take them all at once! Don't overburden yourself": "you'll throw out your back!\": \"<i>Brandon Mellus:</i> Preciso que você leve 144 barris de cerveja para um lugar chamado \\\"Red Wing Casino\\\". Nunca estive lá, mas parece chique e o salão de banquetes era barato!"
"I'll have to experiment with what works best, but my first idea is just to use paint to camouflage things. Can you help me get the paint ready? I need agates. They should make a paint that's similar to the color of the rocks around here.\": \"Quero mostrar ao Red o quanto sou útil. Primeira ideia": "quero esconder melhor o Fox Outpost. Red diz que costumava ser escondido por um glamour, mas agora está apenas exposto aqui."
"I'll let you in on a secret. My famous travel snacks are only <i>mostly</i> cat meat. They've also got fish in them -- grapefish, to be exact. But don't tell anyone! Grapefish isn't common around here so I have to import it, and some customers might get upset about me not using local ingredients. But you and I are above that sort of thing, right? I'll pay you well if you can get me some! Filet them before you bring them in here, though. Fillets draw less attention than whole fish.": "Vou te contar um segredo. Meus famosos lanches de viagem são <i>principalmente</i> carne de gato. Eles também contêm peixes - toranja, para ser exato. Mas não conte a ninguém! Grapefish não é comum por aqui, então tenho que importá-lo, e alguns clientes podem ficar chateados por eu não usar ingredientes locais. Mas você e eu estamos acima desse tipo de coisa, certo? Pagarei bem se você puder me conseguir algum! No entanto, corte-os em filé antes de trazê-los aqui. Os filés chamam menos atenção que os peixes inteiros."
"I'll soak the First Thrall's bones in this fresh blood. With luck ... Well, luck has nothing to do with it! We need but wait. And partake of some of this delicious blood ... while it's still drinkable.

For your service, I shall teach you a blood-related vampiric power. Relish it, for it is your bloodrite!": "Mergulharei os ossos do Primeiro Escravo neste sangue fresco. Com sorte... Bom, sorte não tem nada a ver com isso! Precisamos, mas espere. E coma um pouco desse sangue delicioso... enquanto ainda é potável.

Para seu serviço, ensinarei a você um poder vampírico relacionado ao sangue. Aprecie, pois é o seu rito de sangue!"
"I'll stay here and protect the citizens from any that manage to make it to town. In the mean time you can pick off their numbers. Just remember": "they hate lightning. You know what to do.\\\"\": \"Lumpfuzz no deserto de Ilmari disse: \\\"Já viu uma onda de elementais da natureza? Bem, eles estão bem aqui, então dê uma olhada lá fora. Eles estão vindo do oeste."
"I'll teach you Armor Patching if you bring me some strange, finely ground dirt to help me polish my equipment.": "Eu lhe ensinarei Remendos de Armadura se você me trouxer um pouco de terra estranha e finamente moída para me ajudar a polir meu equipamento."
"I'll tell you one of the reasons I'm so depressed. I was exploring a bit and I found a cave close by, just down the road a ways, a little north and east of here. There's this corpse in there that had a note, and apparently there were people that needed saving, so I rushed in like old times, bashing spiders everywhere! And then, somehow, I was overrun by spiders, a dozen of 'em or more. I threw my backup shield at a big one and ran. But that was my second-most favorite shield!  Now I'm left with only my favorite shield and my third-favorite shield. And fourth-favorite. I feel so empty.

Hey, if you find that cave, grab the shield for me? I'm not sure where I was, but I remember I didn't go up any slopes, if that helps.": "Vou te contar um dos motivos pelos quais estou tão deprimido. Eu estava explorando um pouco e encontrei uma caverna perto, logo adiante na estrada, um pouco ao norte e a leste daqui. Tem um cadáver ali que tinha um bilhete, e aparentemente havia pessoas que precisavam ser salvas, então corri como nos velhos tempos, atacando aranhas por toda parte! E então, de alguma forma, fui invadido por aranhas, uma dúzia delas ou mais. Joguei meu escudo reserva em um grande e corri. Mas esse foi meu segundo escudo favorito!  Agora fico apenas com meu escudo favorito e meu terceiro escudo favorito. E quarto favorito. Eu me sinto tão vazio.

Ei, se você encontrar aquela caverna, pegue o escudo para mim? Não tenho certeza de onde estava, mas lembro que não subi nenhuma ladeira, se isso ajuda."
"I'm a bit of a fruit nut. (Do you get it?) I love the guavas that grow around here. Wish I had time to collect some.": "Eu sou um pouco louco por frutas. (Você entendeu?) Adoro as goiabas que crescem por aqui. Gostaria de ter tempo para coletar alguns."
"I'm a generous goblin so I'm going to overlook the tiny size of these paladium samples and pay what we agreed on. But in the future, try to get decent-sized ore samples!": "Sou um goblin generoso, então vou ignorar o tamanho minúsculo dessas amostras de paladio e pagar o que combinamos. Mas no futuro, tente obter amostras de minério de tamanho decente!"
"I'm about to make another batch of fetish powder, and I'm out of pebbles! I need a couple of really smooth round pebbles. They help agitate the mixture while it's cooking. There's no easy place to find them, but they seem to pop up all over the place. Do you have any?": "Estou prestes a fazer outro lote de pó fetiche e estou sem pedrinhas! Preciso de algumas pedras redondas bem lisas. Eles ajudam a agitar a mistura enquanto ela cozinha. Não há lugar fácil para encontrá-los, mas eles parecem aparecer em todos os lugares. Você tem algum?"
"I'm experimenting with colored inks! I have some gems with me, but I didn't bring a gem crusher. Surely those exist on this plane of existence, right? Do you have a spare?": "Estou experimentando tintas coloridas! Tenho algumas joias comigo, mas não trouxe um triturador de joias. Certamente eles existem neste plano de existência, certo? Você tem um sobressalente?"
"I'm feeling a little foolish about this, but could I trouble you to go back where you were and get me a fresh phoenix egg? I know I should have asked you before, but I completely forgot about it. I mix the egg with the feed for sickly pigeons to aid in healing.
I have asked to speak with the Queen about your request, and will let her know of your extra effort to aid me.": "Estou me sentindo um pouco tolo com isso, mas posso incomodá-lo para voltar onde estava e me trazer um ovo de fênix fresco? Eu sei que deveria ter perguntado antes, mas esqueci completamente disso. Misturo o ovo com a ração para pombos doentes para ajudar na cura.
Pedi para falar com a Rainha sobre o seu pedido e contarei a ela sobre o seu esforço extra para me ajudar."
"I'm getting reports that some of the spiders near here are developing some sort of spinneret-related disease. If that's true, I may be able to identify the problem if I can study enough of their spiderwebs.": "Estou recebendo relatos de que algumas aranhas próximas daqui estão desenvolvendo algum tipo de doença relacionada às fiandeiras. Se isso for verdade, talvez eu consiga identificar o problema se conseguir estudar o suficiente sobre suas teias de aranha."
"I'm getting too old to travel comfortably. I can still fight, but riding for hours? That leaves me too sore! That's why I need your help. Each year I kill a bunch of orcs for the glory of Rahu, but we've pushed the orcs out of the desert now, so the nearest ones are in Kur. Can you travel there and kill some orcs in my name?": "Estou ficando velho demais para viajar confortavelmente. Ainda posso lutar, mas cavalgar por horas? Isso me deixa muito dolorido! É por isso que preciso da sua ajuda. Todo ano eu mato um monte de orcs para a glória de Rahu, mas agora expulsamos os orcs do deserto, então os mais próximos estão em Kur. Você pode viajar para lá e matar alguns orcs em meu nome?"
"I'm glad Gribburn hasn't gotten himself killed by an overzealous human. It sounds like he's found a sweet setup for himself, too!

But if he's going to live in some castle, that means I need more people who know how to do what he does. Say... are you a crafter? Why don't you learn his techniques? If he refuses to teach you, tell him that I'll have him killed! He'll think that's a hilariously bad bluff, and his levity will give you an opening to negotiate.

It'll work. Goblins are incredibly predictable. Trust me.": "Estou feliz que Gribburn não tenha sido morto por um humano excessivamente zeloso. Parece que ele também encontrou uma ótima configuração para si mesmo!

Mas se ele vai morar em algum castelo, isso significa que preciso de mais pessoas que saibam fazer o que ele faz. Diga... você é um artesão? Por que você não aprende suas técnicas? Se ele se recusar a te ensinar, diga-lhe que vou matá-lo! Ele vai pensar que isso é um blefe hilariante e ruim, e sua leviandade lhe dará uma oportunidade para negociar.

Vai funcionar. Goblins são incrivelmente previsíveis. Confie em mim."
"I'm glad she didn't have a problem with you. She's said no a few times and I can never guess the reason. But anyway, that's great news!

I knew her husband better than I know her. His name was Steven too. I miss him. Uh sorry, anyway, let me teach you something interesting.

<i>[New Hangout Available.]</i>": "Estou feliz que ela não tenha tido problemas com você. Ela disse não algumas vezes e nunca consigo adivinhar o motivo. Mas de qualquer forma, isso é uma ótima notícia!

Eu conhecia o marido dela melhor do que a ela. O nome dele também era Steven. Sinto falta dele. Uh, desculpe, de qualquer maneira, deixe-me te ensinar algo interessante.

<i>[Novo Hangout disponível.]</i>"
"I'm glad you understand the importance of this work. Those fairies will be right back in a few days, but one does not quickly get over the shame of being killed by a mortal! You're demoralizing them quite dramatically! In a few days, I hope you can make time to murder some more.": "Fico feliz que você entenda a importância deste trabalho. Essas fadas estarão de volta em alguns dias, mas ninguém supera rapidamente a vergonha de ser morto por um mortal! Você os está desmoralizando dramaticamente! Em alguns dias, espero que você consiga arranjar tempo para matar mais alguns."
"I'm going to create culinary masterpieces, and you -- you made it possible. I'll make sure people know about it!

Come back in a week and I'll need more of this same.": "Vou criar obras-primas culinárias e você tornou isso possível. Vou garantir que as pessoas saibam disso!

Volte em uma semana e precisarei de mais deste mesmo."
"I'm gonna go out collecting minerals soon. But on the way I'm gonna visit a ... friend. And when I do that, I'm gonna need a lot of fish. Don't ask why. It's hard to explain. But if you have some handy, I'd appreciate your help!": "Em breve sairei coletando minerais. Mas no caminho vou visitar um... amigo. E quando eu fizer isso, vou precisar de muitos peixes. Não pergunte por quê. É difícil explicar. Mas se você tiver algum em mãos, agradeceria sua ajuda!"
"I'm gonna head out and do some mining soon, but need to get some supplies in. Can you help? I want some hard-boiled eggs. Good travelling food.": "Vou sair e fazer uma mineração em breve, mas preciso conseguir alguns suprimentos. Você pode ajudar? Quero alguns ovos cozidos. Boa comida para viajar."
"I'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!\": \"Encontrei uma maneira de afastar o medo": "cozinhar! Tenho experimentado comida vegetariana do reino mortal próximo, e eles têm algo chamado limão que é MUITO azedo, e isso me deu muitas ideias de sobremesas. Provavelmente é considerado venenoso para os mortais devido ao seu sistema digestivo simplista, mas posso comer limões muito bem!"
"I'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!\\\"\": \"Floxie, no Reino Fae, disse": "\\\"Encontrei uma maneira de afastar meu medo: cozinhar! Tenho experimentado comida vegetariana do reino mortal próximo, e eles têm algo chamado limão que é MUITO azedo, e me deu muitas ideias de sobremesas. Provavelmente é considerado venenoso para os mortais devido ao seu sistema digestivo simplista, mas posso comer limões muito bem!"
"I'm having a party this weekend and I wanted to serve an insane amount of pork. Just... an INSANE amount! Could you help? I need a few more pork shoulders.": "Vou dar uma festa neste fim de semana e queria servir uma quantidade absurda de carne de porco. Apenas... uma quantia INSANA! Você poderia ajudar? Preciso de mais alguns ombros de porco."
"I'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.\": \"Quando implorei a Talerra, ela me contou o que eu de alguma forma sempre soube": "minha Lydia não se transformou em nada abençoado. A coisa que a matou capturou sua alma e a mantém como uma bugiganga."
"I'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.\\\"\": \"Percy Evans em Eltibule disse": "\\\"Quando implorei a Talerra, ela me disse o que eu sempre soube: minha Lydia não desapareceu no nada abençoado. A coisa que a matou capturou sua alma e a mantém como uma bugiganga."
"I'm honored to be the impetus for your personal growth. Stick with me and you'll be competent in no time!": "Sinto-me honrado em ser o impulso para o seu crescimento pessoal. Fique comigo e você será competente em pouco tempo!"
"I'm impressed. Perhaps you could teach me a thing or two!

But I bet I can still find ways to help you improve your skill.": "Estou impressionado. Talvez você possa me ensinar uma ou duas coisas!

Mas aposto que ainda posso encontrar maneiras de ajudá-lo a melhorar suas habilidades."
"I'm in the mood for something simple. Please bring me a cavefish supper. A FRESH cavefish supper, mind you! I'm eating simply, not poorly!": "Estou com vontade de algo simples. Por favor, traga-me um jantar de peixe-caverna. Um jantar FRESCO de cavefish, veja bem! Estou comendo de forma simples, não mal!"
"I'm low on hay again. Again! It's a constant battle to keep these animals fed. Why don't you get me some fresh grass?": "Estou com pouco feno novamente. De novo! É uma batalha constante manter esses animais alimentados. Por que você não me traz um pouco de grama fresca?"
"I'm making a special ... device. For Ivyn. It's a ... well, anyway, it doesn't matter. I need a horn. A really nice one, maybe made of ivory? Or something even better if you come across it. Thanks.": "Estou fazendo um... dispositivo especial. Para Ivyn. É um... bem, de qualquer forma, não importa. Eu preciso de uma buzina. Um muito bonito, talvez feito de marfim? Ou algo ainda melhor se você se deparar com isso. Obrigado."
"I'm making some armor as a gift for my niece Stephie. It's a new neck-guard for the suit I made her.

I need some parts, and I can't ask Stephie to get them for me or she'd know my plan. Can you do it? I'll give you some xogrite.": "Estou fazendo uma armadura para presentear minha sobrinha Stephie. É um novo protetor de pescoço para o traje que fiz para ela.

Preciso de algumas peças e não posso pedir a Stephie que as compre para mim ou ela saberia meu plano. Você pode fazer isso? Vou te dar um pouco de xogrite."
"I'm Mox's backup when we go out on expeditions. The stuff in the caves isn't too bad, but the stuff in the snow can be pretty scary! I'm not confident my crossbow can handle those huge bears before they have time to maul one of us. Can you kill some and let me know how hard they are to kill? Just a few will do. Like... five. No! Eight. That's a more scientific number.": "Sou o apoio de Mox quando saímos em expedições. As coisas nas cavernas não são tão ruins, mas as coisas na neve podem ser bem assustadoras! Não tenho certeza de que minha besta possa lidar com aqueles ursos enormes antes que eles tenham tempo de atacar um de nós. Você pode matar alguns e me dizer o quão difícil eles são de matar? Apenas alguns servirão. Tipo... cinco. Não! Oito. Esse é um número mais científico."
"I'm much too busy to train you personally. But I've prepared something for you. Go and visit my old training ground in Gazluk. I've left training programs there, and I'll walk you through them via sending stone.

How would you find the camp? Let me think. It's on the plateau. There's a useless lookout tower somewhat nearby. From the camp you can look down over the cliff and see a lot of trees. Does that narrow it down? You'll know you're in the right place when you see iron dodecahedrons hammered into the cold earth. There'll be a building with a sending stone; contact me from there.": "Estou muito ocupado para treiná-lo pessoalmente. Mas preparei algo para você. Vá visitar meu antigo campo de treinamento em Gazluk. Deixei os programas de treinamento lá e vou orientá-los através do envio de pedras.

Como você encontraria o acampamento? Deixe-me pensar. Está no planalto. Há uma torre de vigia inútil nas proximidades. Do acampamento você pode olhar para o penhasco e ver muitas árvores. Isso restringe tudo? Você saberá que está no lugar certo quando vir dodecaedros de ferro martelados na terra fria. Haverá um edifício com uma pedra enviadora; entre em contato comigo de lá."
"I'm no gadgeteer or trinket-smith, but I was thinking about building a simple automated holder-arm. Nothin' fancy, just something a little smarter than a C-clamp!

I don't want to ask Stephie for the parts, though, because that would go on our ledger. This isn't business, it's just an old dwarf messin' around! ... Say, maybe you could help me out? Here's some of the stuff I need. There's more, but this is the hard stuff.": "Não sou engenheiro ou ferreiro, mas estava pensando em construir um braço de suporte automatizado simples. Nada sofisticado, apenas algo um pouco mais inteligente que uma pinça C!

Mas não quero pedir as peças à Stephie, porque isso iria para o nosso livro-razão. Isto não é negócio, é apenas um velho anão brincando! ... Diga, talvez você possa me ajudar? Aqui estão algumas das coisas que preciso. Há mais, mas esta é a parte difícil."
"I'm not a huge calligraphy nut, but I used to practice every now and then. If I still had my amazing calligraphy bench, I might start again!

However, I have to personally meet the craftsman to ensure that I'm not buying furniture made by slaves. Goblin slavers have flooded the market with that stuff, and I will have no part of it!": "Não sou um grande louco por caligrafia, mas costumava praticar de vez em quando. Se eu ainda tivesse meu incrível banco de caligrafia, poderia começar de novo!

Porém, tenho que conhecer pessoalmente o artesão para ter certeza de que não estou comprando móveis feitos por escravos. Os traficantes de escravos goblins inundaram o mercado com essas coisas, e eu não participarei disso!"
"I'm not a smith, but if I had enough old broken blades, I could probably fulfill my artistic vision.\\\"\": \"Gerrux em Povus disse": "\\\"No meu tempo livre, me envolvo em melhorias artísticas de armas e estou trabalhando em um khopesh deslumbrante. Mas preciso de mais matéria-prima!"
"I'm not saying you owe me anything. I'm just saying, since you obviously like making chairs so much...\\\"\": \"Gunther Ashbrown em Statehelm disse": "\\\"Ei, você é o feiticeiro da cadeira. Você fez aquela cadeira para mim há um tempo, certo? Bem, eu realmente gostaria de sua ajuda desta vez. Aqui, olhe isto. Viu? Sim. Esta é uma cadeira de qualidade. Muito além da minha habilidade, admito. E precisa ser feita com essas medidas exatas."
"I'm not sure if mortals are capable of playing them... but we could find out!\": \"Você ouviu falar daquela infeliz fenda incendiária que se abriu ao sul daqui? Eu estava pensando... embora o portal Winter Fae também esteja aberto, isso significa que há três fontes elementais poderosas aqui": "Fogo, Frio e Natureza. Você sabe o que isso significa: hora da festa!"
"I'm not sure if mortals are capable of playing them... but we could find out!\\\"\": \"Felmer, no Reino Fae, disse": "\\\"Você ouviu falar daquela infeliz fenda de fogo que se abriu ao sul daqui? Eu estava pensando... embora o portal Winter Fae também esteja aberto, isso significa que há três fontes elementais potentes aqui: Fogo, Frio e Natureza. Você sabe o que isso significa: hora da festa!"
"I'm not sure where he's hiding right now, but I do remember overhearing this": "\\\"Instead of a femur, offer a skull.\\\" I dunno what it means. Figure it out and kill him!"
"I'm not surprised anymore, but I'm impressed.": "Não estou mais surpreso, mas estou impressionado."
"I'm pretty impressed. You must know your way around a used book store! Thank you so much. I'll give you your cut now, before the delivery is even made!": "Estou bastante impressionado. Você deve conhecer uma livraria usada! Muito obrigado. Eu te dou sua parte agora, antes mesmo da entrega ser feita!"
"I'm pretty tired of the mushroom scene. I'm much more into physical fitness these days! But people have certain expectations of an immortal pig. Everyone expects me to know the quality of the local fungi, but I haven't done a survey in a while. Saaaaay... why don't you go out and pick some for me? It'll be great exercise!": "Estou muito cansado da cena dos cogumelos. Estou muito mais interessado em preparo físico hoje em dia! Mas as pessoas têm certas expectativas em relação a um porco imortal. Todos esperam que eu conheça a qualidade dos fungos locais, mas faz tempo que não faço uma pesquisa. Saaaaay... por que você não sai e escolhe alguns para mim? Será um ótimo exercício!"
"I'm quite skilled with punching weapons and claws, and I'll tell you what helped me unlock my full potential: sewer practice. Find your way down into the sewer and use your Slashing Strike on the slimes down there.": "Sou bastante habilidoso com armas de soco e garras, e vou contar o que me ajudou a desbloquear todo o meu potencial: a prática do esgoto. Encontre o caminho até o esgoto e use seu Slashing Strike nas gosmas lá embaixo."
"I'm ready for another keg of the brown. Business has been good!": "Estou pronto para outro barril de marrom. O negócio tem sido bom!"
"I'm saved! I mean... the lake is saved! Thank you, fisher. By the way, I believe that evil pike would taste delicious pickled!": "Estou salvo! Quer dizer... o lago está salvo! Obrigado, pescador. A propósito, acredito que o lúcio malvado teria um sabor delicioso em conserva!"
"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Fransesca Muradrake, and you can keep the tip. Let me know when it's done, though, okay? I'm still responsible for it. And don't steal it. Stealing is bad.": "Estou muito atrasado nas entregas de hoje! Você poderia ajudar? Este me assusta. Leve para Fransesca Muradrake e você fica com a gorjeta. Me avise quando terminar, ok? Ainda sou responsável por isso. E não roube. Roubar é ruim."
"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Strom Farblood, and you can keep the tip! And like before, let me know when it's done so I can check it off the list.": "Estou muito atrasado nas entregas de hoje! Você poderia ajudar? Este me assusta. Leve para Strom Farblood e você ficará com a gorjeta! E como antes, me avise quando terminar para que eu possa retirá-lo da lista."
"I'm so glad you could make it! It's mummies!

I was patrolling near the mouth of Foothills Cave in the far northwest, and mummies were pouring out! At first I thought they were activated by some evil necromancer, but they aren't marching anywhere. They're... well, they're just wandering around killing things. And they're trampling the delicate vegetation! And also they're fucking MUMMIES! I don't even know how to kill a mummy. I'm just a pig. I didn't sign up for this!": "Estou tão feliz que você conseguiu vir! São múmias!

Eu estava patrulhando perto da entrada da Caverna Foothills, no extremo noroeste, e múmias estavam aparecendo! A princípio pensei que tivessem sido ativados por algum necromante maligno, mas não estão marchando para lugar nenhum. Eles estão... bem, eles estão apenas vagando por aí matando coisas. E estão pisoteando a delicada vegetação! E também são múmias de merda! Eu nem sei como matar uma múmia. Eu sou apenas um porco. Eu não me inscrevi para isso!"
"I'm sorry for being vague. You see, I promised someone that I'd let them vet anyone I wanted to pass on this knowledge to. He's dead, but his wife will know what he was looking for. Go get her blessing to learn the secret. Fransesca is in the wizard school. Yes, she's a necromancer. But she's one of the good ones. Trust me.\\\"\": \"Steven Poplar em Statehelm disse": "“Você provou ser capaz no campo de batalha. Gostaria de saber se gostaria de aprender outra maneira de ajudar na missão de Arisetsu?"
"I'm sorry to say that the ranalon are raising another army. I need you to activate the same beacon as before and slay them! Remember: if you die it will be seen as a sign of our weakness. Stay alive no matter what!

<i>[Dying will reset progress on this quest.]</i>": "Lamento dizer que os Ranalon estão formando outro exército. Preciso que você ative o mesmo farol de antes e mate-os! Lembre-se: se você morrer, isso será visto como um sinal de nossa fraqueza. Fique vivo, não importa o que aconteça!

<i>[Morrer redefinirá o progresso desta missão.]</i>"
"I'm sorry to say this, but the last cheese didn't work out either. But this time I know exactly what's needed. I called in some expert help! I need a 'brunost' cheese, it's the best for the cheap wine I've been usin'. Guaranteed ta work this time. I fuckin' hope.": "Lamento dizer isso, mas o último queijo também não deu certo. Mas desta vez sei exatamente o que é necessário. Procurei ajuda especializada! Preciso de um queijo brunost, é o melhor para o vinho barato que estou usando. Garantido que desta vez funcionarei. Eu espero, porra."
"I'm sorry. I can't open my store in this condition. I've been robbed! The store is a disgrace!

If you're inclined to help, can you speak to that Hackley woman with the Council? A few guards investigated days ago, but I've heard nothing since. Surely the thief is caught by now! Go check.": "Desculpe. Não consigo abrir minha loja nessas condições. Fui roubado! A loja é uma vergonha!

Se estiver disposto a ajudar, pode falar com aquela mulher Hackley do Conselho? Alguns guardas investigaram dias atrás, mas não ouvi nada desde então. Certamente o ladrão já foi pego! Vá verificar."
"I'm still experimenting with the recipe, but I think a key ingredient is rotten strawberries. Not fresh ones -- they've gotta be really rotten. Dig me up some, okay?\\\"\": \"Brianna Willer, em Serbule Hills, disse": "\\\"Estou tentando preparar uma cerveja tóxica. Eu sei, eu sei, isso é contra o Código de Ética de Cerveja do Conselho, mas o Conselho não está aqui, e os monstros estão! Se os goblins me encontrarem, quero dar-lhes barris de cerveja que os deixarão doentes o suficiente para que eu possa fugir."
"I'm still geting used to having to sleep every day. The giant tree is making that hard, too, because the other fae are not quiet at night!

I've been using a magical dampening sphere to protect my ears, but the spell gives me a headache. Electra told me I should just get the local mortal equivalent. Do you happen to have any of this wax?": "Ainda estou me acostumando a ter que dormir todos os dias. A árvore gigante também está dificultando isso, porque as outras fadas não ficam quietas à noite!

Tenho usado uma esfera mágica de amortecimento para proteger meus ouvidos, mas o feitiço me dá dor de cabeça. Electra me disse que eu deveria conseguir o equivalente mortal local. Por acaso você tem alguma dessa cera?"
"I'm still reading the book you brought me, but I have good news: the big crystal inside this machine isn't broken! Because if it was broken, the magic would have leaked out and killed us all months ago.

The main crystal isn't working because the little connector gear is broken. I think some gears and parts fell out while we were fleeing our old headquarters. But these parts don't seem all that exotic... maybe we can find replacements.

Let me show you what I need: a gear that looks like this, some springs, and some of these weird twist-nails. Good luck!": "Ainda estou lendo o livro que você me trouxe, mas tenho boas notícias: o grande cristal dentro desta máquina não está quebrado! Porque se estivesse quebrado, a magia teria vazado e nos matado meses atrás.

O cristal principal não está funcionando porque a pequena engrenagem do conector está quebrada. Acho que algumas engrenagens e peças caíram enquanto fugimos da nossa antiga sede. Mas essas peças não parecem tão exóticas... talvez possamos encontrar substitutos.

Deixe-me mostrar o que preciso: uma engrenagem parecida com esta, algumas molas e alguns desses pregos estranhos. Boa sorte!"
"I'm STILL waiting for my chicken casserole!": "AINDA estou esperando minha caçarola de frango!"
"I'm supposed to be in charge of the campsite, which is why the jealous humans <i>constantly</i> slack off to make me look bad. I keep telling them to repair these stalls so they're ready for the heavier snows to come. So they head off to gather wood, and then come back empty-handed. \"Chased by a bear\" or \"bit by a slime\"... always some excuse so they don't have to work. Can you help me? We need spruce.": "Eu deveria estar no comando do acampamento, e é por isso que os humanos ciumentos <i>constantemente</i> relaxam para me fazer ficar mal. Eu continuo dizendo a eles para consertar essas barracas para que estejam prontos para as nevascas mais fortes que virão. Então eles vão buscar lenha e voltam de mãos vazias. \"Perseguidos por um urso\" ou \"mordidos por uma gosma\"... sempre alguma desculpa para não terem que trabalhar. Pode me ajudar? Precisamos de abeto."
"I'm supposed to be making a custom chair for someone, but damned if I can manage to get it to come out right. Are you good with wood? Here's the specifications. See? Slightly too tall and slightly too short.": "Eu deveria estar fazendo uma cadeira personalizada para alguém, mas dane-se se consigo fazer com que ela saia direito. Você é bom com madeira? Aqui estão as especificações. Ver? Um pouco alto demais e um pouco baixo demais."
"I'm supposed to make a special dinner tomorrow to honor my master's wife's birthday. I'm getting kind of freaked out, because I can't make my famous mint cookies without mint! Do you have any? It's important!": "Devo fazer um jantar especial amanhã para homenagear o aniversário da esposa do meu mestre. Estou ficando meio assustada, porque não consigo fazer meus famosos biscoitos de menta sem hortelã! Você tem algum? É importante!"
"I'm surrounded by these stupid Winterprize gems in this nexus! So ugly! I wish I had some pretty gems. Garnets are my favorite!": "Estou cercado por essas joias estúpidas do Winterprize neste nexo! Tão feio! Eu gostaria de ter algumas jóias bonitas. Granadas são minhas favoritas!"
"I'm terribly sorry if I offended you by seating myself. But you didn't have to keep me waiting so long! I guess you weren't open yet?

Well, let's put that behind us. I would like your maple carrots please. And not too sweet.": "Sinto muito se ofendi você ao me sentar. Mas você não precisava me deixar esperando tanto tempo! Acho que você ainda não estava aberto?

Bem, vamos deixar isso para trás. Eu gostaria de suas cenouras de bordo, por favor. E não muito doce."
"I'm trying to brew a toxic beer. I know, I know, that's against the Council's Brewing Code of Ethics, but the Council's not here, and monsters are! If goblins find me, I want to give them kegs of beer that will make them sick enough that I can flee.

I'm still experimenting with the recipe, but I think a key ingredient is rotten strawberries. Not fresh ones -- they've gotta be really rotten. Dig me up some, okay?": "Estou tentando preparar uma cerveja tóxica. Eu sei, eu sei, isso é contra o Código de Ética da Cervejaria do Conselho, mas o Conselho não está aqui, e os monstros estão! Se os goblins me encontrarem, quero dar-lhes barris de cerveja que os deixarão doentes o suficiente para que eu possa fugir.

Ainda estou experimentando a receita, mas acho que um ingrediente chave são os morangos podres. Não os frescos - eles devem estar realmente podres. Desenterre-me um pouco, ok?"
"I'm trying to bring the whole cave together here, so I got the orcs involved in decorating too. As a race they're not real known for their decorations, but Gasu'um collects empty potion bottles, so let's put 'em on the tree!

She gave me a bunch of Rage to Heat bottles... we just need a few more.": "Estou tentando reunir toda a caverna aqui, então envolvi os orcs na decoração também. Como raça, eles não são muito conhecidos por suas decorações, mas Gasu'um coleta frascos de poções vazios, então vamos colocá-los na árvore!

Ela me deu um monte de garrafas de Rage to Heat... só precisamos de mais algumas."
"I'm trying to fill this order for fur-lined coats. I don't get many orders, you know? Pretty satisfying knowing my reputation's getting around. Trouble is, I'm out of fur to finish the last one. Can you get me some?": "Estou tentando atender a este pedido de casacos forrados de pele. Eu não recebo muitos pedidos, sabe? É muito gratificante saber que minha reputação está se espalhando. O problema é que estou sem pêlo para terminar o último. Você pode me pegar um pouco?"
"I'm using grizlark faster than I expected! Can you get me some more? I'll pay like before.": "Estou usando o grizlark mais rápido do que esperava! Você pode me trazer mais? Pagarei como antes."
"I'm working on an extremely interesting new spell, and to further my research, I need special reagents.

What I need are bones that have been superheated while still in the body of a living creature. Don't worry, I've researched just the right spell to help you get these -- I'll teach you the spell, when you have the capacity to learn it.

Once you know the spell, use it on some humans, elves, or rakshasa to collect perfectly charred femurs. ... And make sure to only kill those deserving of death. Obviously.": "Estou trabalhando em um novo feitiço extremamente interessante e, para continuar minha pesquisa, preciso de reagentes especiais.

O que preciso são ossos que foram superaquecidos enquanto ainda estavam no corpo de uma criatura viva. Não se preocupe, eu pesquisei o feitiço certo para ajudá-lo a conseguir isso - eu lhe ensinarei o feitiço, quando você tiver capacidade para aprendê-lo.

Depois de conhecer o feitiço, use-o em alguns humanos, elfos ou rakshasa para coletar fêmures perfeitamente carbonizados. ... E certifique-se de matar apenas aqueles que merecem a morte. Obviamente."
"I'm working on artistically improving a dagger right now, but I need something very special: blue glass. But not any old blue glass. Only the glass from a pair of ratkin goggles will do! I also need several sets of hexapus teeth. I'm afraid this dagger will not be subtle.": "Estou trabalhando no aprimoramento artístico de uma adaga no momento, mas preciso de algo muito especial: vidro azul. Mas não qualquer vidro azul velho. Somente o vidro de um par de óculos de proteção servirá! Também preciso de vários conjuntos de dentes hexapus. Receio que esta adaga não seja sutil."
"I'm working on becoming a better botanist! It's not as exciting as hunting, but I'm doing what I can. My biggest focus right now is on the carnivines, which are super amazing plants. They have a top area that's like a head, and they grow plates in their head that look like teeth! That's super strange, right? Can you get me some? The teeth, I mean. I need samples from several different carnivines so I can compare them.

You'll find carnivines most commonly when daytime happens -- they burrow into the ground at night.": "Estou trabalhando para me tornar um botânico melhor! Não é tão emocionante quanto caçar, mas estou fazendo o que posso. Meu maior foco no momento são as carnivinas, que são plantas super incríveis. Eles têm uma área superior que lembra uma cabeça e desenvolvem placas na cabeça que parecem dentes! Isso é muito estranho, certo? Você pode me pegar um pouco? Os dentes, quero dizer. Preciso de amostras de vários carnivinos diferentes para poder compará-los.

Você encontrará carnivinos mais comumente durante o dia - eles se enterram no solo à noite."
"I'm working on some mozzarella right now. Bring me some whey and we'll talk about the tofu.": "Estou trabalhando em um pouco de mussarela agora. Traga-me um pouco de soro de leite e conversaremos sobre o tofu."
"I'm worried about something that's probably far-fetched... but I don't dare ignore the possibility. That fool elf Pennoc invited a traveling circus from Senoca to come visit here. We're much too small for a circus to normally bother with, but he promised them an exceptionally friendly welcome, \"in elven style\", and he even promised free room and board for weeks!

I would have had Pennoc thrown in the dungeon if we had a dungeon. <i>Sigh.</i> What if his ploy works and the circus comes here? I barely have enough supplies for the elven refugees, let alone a bunch of circus freaks! Can you help me prepare for the worst-case scenario?": "Estou preocupado com algo que provavelmente é improvável... mas não me atrevo a ignorar a possibilidade. Aquele elfo tolo Pennoc convidou um circo itinerante de Senoca para vir visitar aqui. Somos pequenos demais para um circo normalmente se preocupar, mas ele prometeu a eles uma recepção excepcionalmente amigável, \"no estilo élfico\", e até prometeu hospedagem e alimentação grátis por semanas!

Eu teria jogado Pennoc na masmorra se tivéssemos uma masmorra. <i>Suspiro.</i> E se a estratégia dele funcionar e o circo vier aqui? Mal tenho suprimentos suficientes para os refugiados élficos, muito menos para um bando de malucos de circo! Você pode me ajudar a me preparar para o pior cenário?"
"I've already heard the transmissions -- you've done well. The next stage of my plan is beginning, but your part is done. Here is your money. Remember: tell no-one of what you've done.": "Já ouvi as transmissões – você se saiu bem. A próxima etapa do meu plano está começando, mas a sua parte já foi feita. Aqui está o seu dinheiro. Lembre-se: não conte a ninguém o que você fez."
"I've always hunted with a bow I made myself, even back when I was a child. I'm not going to just use some store-bought bow now at age 438! Can you get me some really perfect cedar wood for a temporary bow?\\\"\": \"Sirine em Rahu disse": "“Fui caçar com o arco que você me ajudou a consertar!"
"I've been experimenting with dyes, but I still haven't really got the hang of it. Ran out of raw materials, though! Could you help? I need some more of those red flowers that grow here. Red asters I think they're called.": "Tenho experimentado tinturas, mas ainda não peguei o jeito. Mas ficou sem matéria-prima! Você poderia ajudar? Preciso de mais algumas daquelas flores vermelhas que crescem aqui. Ásteres vermelhos, acho que são chamados."
"I've been experimenting with the local fauna. The creatures here have interesting healing properties! I think I can use the tongues of those horrid little frog people as super-strong binding material for broken wings. I don't condone violence, but if you happen upon a dead frog man, you could maybe collect its tongue...": "Tenho feito experiências com a fauna local. As criaturas aqui têm propriedades curativas interessantes! Acho que posso usar as línguas daqueles pequenos sapos horríveis como material de ligação superforte para asas quebradas. Eu não tolero a violência, mas se você encontrar um sapo morto, talvez você possa pegar sua língua..."
"I've been looking all over for you!

I delivered that last chair and got lots of compliments. And now I've got an incredibly tough order. I can't even get other carpenters in town to make this for me!

You're my best chance. I will give you half -- no, two thirds of the money for the job.": "Eu estive procurando por você por toda parte!

Entreguei aquela última cadeira e recebi muitos elogios. E agora tenho uma ordem incrivelmente difícil. Não consigo nem que outros carpinteiros da cidade façam isso para mim!

Você é minha melhor chance. Eu lhe darei metade – não, dois terços do dinheiro pelo trabalho."
"I've been making these crazy wolf-hood hats, right? And they're really popular. But I haven't got any more wolf pelts. Whenever I try to skin them, it doesn't come out right. Are you good at skinning wolves? Care to help me out? I'll pay handsomely.": "Tenho feito esses chapéus malucos com capuz de lobo, certo? E eles são muito populares. Mas não tenho mais peles de lobo. Sempre que tento esfolá-los, não dá certo. Você é bom em esfolar lobos? Quer me ajudar? Pagarei generosamente."
"I've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.\": \"Então, sim, obrigado por ter vindo. Eu ouvi sobre isso daquele elfo vidente do outro lado da cidade": "parte do deserto é coberta por aranhas gigantes que estão, tipo, acasaladas com tornados? Não entendo, mas onde quer que as aranhas andem, os tornados também vão. E o elfo diz que eles vieram para cima para depositar seus ovos ao vento e espalhá-los por toda parte. Isso não é bom."
"I've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.\\\"\": \"Lumpfuzz no deserto de Ilmari disse": "\\\"Então, sim, obrigado por ter vindo. Ouvi sobre isso daquele elfo vidente do outro lado da cidade: parte do deserto é coberta por aranhas gigantes que são, tipo, acasaladas com tornados? Não entendo, mas onde quer que as aranhas andem, os tornados também vão. E o elfo diz que eles vieram para a superfície para colocar seus ovos no vento e se espalhar por toda parte. Isso não é bom."
"I've been sent out as a gofer. Pretty insulting to my skills but you gotta take it on the chin sometimes when you work with humans. They're not exactly good at manners and shit. Problem is, though, that I can't find what I need: I need some pretty good armor stakes but with an extra thumbspan's length on the end. Say, are you a smith? You could whip them up for me.": "Fui enviado como servo. Muito insultuoso para minhas habilidades, mas às vezes você tem que levar isso na cara quando trabalha com humanos. Eles não são exatamente bons em boas maneiras e essas coisas. O problema, porém, é que não consigo encontrar o que preciso: preciso de algumas estacas de armadura muito boas, mas com um comprimento extra de largura na extremidade. Diga, você é ferreiro? Você poderia prepará-los para mim."
"I've been so worried about my sister that I've barely grown enough food to keep us fed. Would you mind bringing me some potatoes? I'll give you a fair trade for them.": "Tenho estado tão preocupado com a minha irmã que mal consegui cultivar comida suficiente para nos manter alimentados. Você se importaria de me trazer algumas batatas? Eu lhe darei uma troca justa por eles."
"I've been teaching the foxes how to read by sounding out the Human language symbols. I don't think they're ready for writing yet -- truth be told I have a hard time with writing myself! But it's time they became familiar with paper and ink. We'll need a LOT of both.": "Tenho ensinado as raposas a ler, pronunciando os símbolos da linguagem humana. Eu não acho que eles estejam prontos para escrever ainda – verdade seja dita, eu mesmo tenho dificuldade em escrever! Mas já é hora de se familiarizarem com papel e tinta. Precisaremos de MUITOS dos dois."
"I've been trying to convince Mox that Transmutation can revolutionize mining. But he won't listen. So I need your help. It will be dangerous... but worthwhile! I need a piece of the evil yellow crystals that can be found outside, plus some high-quality phlogiston. I believe I can make the crystal safe for transit!": "Tenho tentado convencer Mox de que a Transmutação pode revolucionar a mineração. Mas ele não vai ouvir. Então preciso da sua ajuda. Será perigoso... mas valerá a pena! Preciso de um pedaço dos cristais amarelos malignos que podem ser encontrados lá fora, além de um flogisto de alta qualidade. Acredito que posso tornar o cristal seguro para trânsito!"
"I've been trying to fill this book order for a long time! I have most of the requested titles but she only wants a 100% complete order. Here's the books I need.": "Há muito tempo que estou tentando atender a esse pedido de livro! Tenho a maioria dos títulos solicitados, mas ela só quer um pedido 100% completo. Aqui estão os livros que preciso."
"I've been using a magical dampening sphere to protect my ears, but the spell gives me a headache. Electra told me I should just get the local mortal equivalent. Do you happen to have any of this wax?\\\"\": \"Gleanfeckle em Statehelm disse": "“Ainda estou me acostumando a ter que dormir todos os dias. A árvore gigante também está dificultando isso, porque as outras fadas não ficam quietas à noite!"
"I've been watching the scattered ranalon off the coast, and I have grim news. A powerful chieftan is ready to lead the remaining ranalon in an attack! You totally need to kill him.

Activate the same underwater beacon as before, and this time look for Dreadfin Absolum. Oh, and bring some backup, or you'll surely drown!

Don't worry, you have my confidence in you. It will serve as a guide!": "Tenho observado os ranalon espalhados ao largo da costa e tenho notícias sombrias. Um chefe poderoso está pronto para liderar o ranalon restante em um ataque! Você precisa totalmente matá-lo.

Ative o mesmo farol subaquático de antes e desta vez procure por Dreadfin Absolum. Ah, e traga alguns reforços, ou você certamente se afogará!

Não se preocupe, você tem minha confiança em você. Servirá de guia!"
"I've been working on a new fertilizer using some dinosaur scales I had delivered from Statehelm. It's not working yet, but I think I'm getting closer! But I need more scales.

Say, I heard someone say there were dinosaurs in the crypt! You know, the crypt at the back of the graveyard? I only ever saw horrible spiders, but I didn't go in very far. Could you look?": "Estou trabalhando em um novo fertilizante usando algumas escamas de dinossauros que entreguei pela Statehelm. Ainda não está funcionando, mas acho que estou chegando mais perto! Mas preciso de mais escalas.

Diga, ouvi alguém dizer que havia dinossauros na cripta! Você sabe, a cripta no fundo do cemitério? Eu só vi aranhas horríveis, mas não fui muito longe. Você poderia olhar?"
"I've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.\": \"Obrigado por matar Brukal por mim. Eu... eu quero que nosso relacionamento seja honesto, então deixe-me dizer sem rodeios": "isso foi um pouco fora de linha. Eu queria que ele morresse, mas não quis dizer que você deveria apenas... e o pior é que fiquei nervoso por estar perto de você! Mas eu agradeço. Eu sei que você fez isso por gentileza com um amigo."
"I've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.\\\"\": \"Leah Bowman em Povus disse": "\\\"Obrigada por matar Brukal por mim. Eu ... eu quero que nosso relacionamento seja honesto, então deixe-me dizer sem rodeios: isso foi um pouco fora de linha. Eu queria que ele morresse, mas eu não quis dizer que você deveria apenas ... e a pior parte é que fiquei nervoso por estar perto de você! Mas eu agradeço. Eu sei que você fez isso por gentileza para com um amigo."
"I've delegated the candy-cane creation to Laura Neth, but she insists she needs more cinnamon. Ugh. It's for decoration, who cares how it tastes?! But she's very insistent.": "Deleguei a criação da bengala a Laura Neth, mas ela insiste que precisa de mais canela. Eca. É para decoração, quem se importa com o sabor?! Mas ela é muito insistente."
"I've done it! I've pierced the veil of your mind! You can hear me! That's great news! So long story short, I was a wizard's familiar back in the day. Now I'm just trying to raise a slug family in safety. The geyser slug is our hero -- keeps us safe from most predators. But we still have a problem. There's a huge and particularly cruel dorado swimming in here. Can you get him out? He only comes out at night. And hurry: he already ate one of my children! I have a lot more, but still.": "Eu consegui! Eu perfurei o véu da sua mente! Você pode me ouvir! Isso é uma ótima notícia! Resumindo a história, eu era familiar de um bruxo naquela época. Agora estou apenas tentando criar uma família de lesmas em segurança. A lesma gêiser é nosso herói – nos mantém protegidos da maioria dos predadores. Mas ainda temos um problema. Há um dourado enorme e particularmente cruel nadando aqui. Você pode tirá-lo de lá? Ele só sai à noite. E rápido: ele já comeu um dos meus filhos! Eu tenho muito mais, mas ainda assim."
"I've found a way to take my mind off my fear: cooking! I've been experimenting with vegetarian food from the nearby mortal realm, and they have something called a lemon which is VERY sour, and it's given me lots of dessert ideas. It's probably considered poisonous to mortals due to their simplistic digestive systems, but I can eat lemons just fine!

I'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!": "Encontrei uma maneira de afastar o medo: cozinhar! Tenho experimentado comida vegetariana do reino mortal próximo, e eles têm algo chamado limão que é MUITO azedo, e isso me deu muitas ideias de sobremesas. Provavelmente é considerado venenoso para os mortais devido ao seu sistema digestivo simplista, mas posso comer limões muito bem!

Estou cultivando alguns limoeiros agora, mas parece que pode levar anos até que eles dêem frutos...? Isso é muito estranho. Acho que posso odiar árvores mortais. De qualquer forma, resumindo a história, eu realmente preciso de alguns limões!"
"I've got a nice easy one for you. Here's the map to the war cache. We believe the cache was originally located in a Crone military city called New Argolis. Well, not really a city, more like a recreational area for off-duty Hegemony troops. Should be pretty safe. The report says there's some weird animals in there, but no bandits.

Follow the map, get in, find the Weaponized Xedrite, and get out. Don't screw up! You've only got one chance -- you won't be able to get back in a second time.": "Eu tenho um bom e fácil para você. Aqui está o mapa do esconderijo de guerra. Acreditamos que o esconderijo estava originalmente localizado em uma cidade militar Crone chamada New Argolis. Bem, não é realmente uma cidade, é mais uma área recreativa para as tropas da Hegemonia fora de serviço. Deve ser bem seguro. O relatório diz que há alguns animais estranhos lá, mas nenhum bandido.

Siga o mapa, entre, encontre o Xedrite Armado e saia. Não estrague tudo! Você só tem uma chance: você não conseguirá voltar na segunda vez."
"I've got a real easy one for you! This one's in the remains of 'New Argolis', the old R&R camp for Hegemony soldiers during the war. The Seer didn't go in, of course, but she said it smells like beer in there. I can't imagine it's still drinkable, though. Remember: wine ages, but beer just goes bad after a few decades. Don't make yourself sick!": "Eu tenho um muito fácil para você! Este está nas ruínas de 'Nova Argolis', o antigo campo de R&R para soldados da Hegemonia durante a guerra. A Vidente não entrou, claro, mas ela disse que ali dentro cheira a cerveja. Não consigo imaginar que ainda seja potável. Lembre-se: o vinho envelhece, mas a cerveja estraga depois de algumas décadas. Não fique doente!"
"I've got customers returning to the shop! But I've been selling my loaves at a loss, and I can't keep doing that for long. The problem is the taxes on delivered grains. They're just too high! So I was thinking... Maybe you could deliver them for me?

I can't pay you in Councils but I can do much better: I can pay you in exposure. I'll tell everyone who shops here about how great you are, and what a valuable addition to Statehelm you've become.": "Tenho clientes voltando à loja! Mas tenho vendido meus pães com prejuízo e não posso continuar fazendo isso por muito tempo. O problema são os impostos sobre os grãos entregues. Eles estão muito altos! Então eu estava pensando... Talvez você pudesse entregá-los para mim?

Não posso pagar-lhe em Conselhos, mas posso fazer muito melhor: posso pagar-lhe em exposição. Direi a todos que compram aqui como você é incrível e como você se tornou uma adição valiosa à Statehelm."
"I've got reliable reports that there are dangerous winter fairies hiding out somewhere in the sewer. They apparantly hide out in two of the big sewage-sieve rooms. Better take care of both rooms.": "Tenho relatos confiáveis ​​de que há perigosas fadas do inverno escondidas em algum lugar no esgoto. Eles aparentemente se escondem em duas das grandes salas com peneiras de esgoto. Melhor cuidar dos dois quartos."
"I've got the bread smell going. This is going to be a good sales day! Go go go!\\\"\": \"Deville Neth em Statehelm disse": "\\\"Aqui. Isto é o que eu fiz com as peças que você fez. Eu conheço um pouco da arte da sabotagem. Leve isso com você e vá ser \\\"alimentado\\\" pela Cornucópia. Ele redirecionará o ponto de teletransporte do sistema para algum lugar no esgoto."
"I've had a VERY long time to look at the menu, so yes, I'm ready to place my food order! I saw that you have fresh amberjack on the fish list. How is that even possible?! I guess amberjack is native to here? Well, I simply must try this dish.": "Demorei MUITO para olhar o cardápio, então sim, estou pronto para fazer meu pedido de comida! Vi que você tem peixe fresco na lista de peixes. Como isso é possível?! Eu acho que amberjack é nativo daqui? Bem, eu simplesmente devo experimentar este prato."
"I've had Irkima study the available lore on the fae realm and he found an interesting detail. Some of the leaders of the Winter Queen's forces are granted the title of 'Puck', along with associated powers. And to prove their puckhood they are given a badge made of ice. Or crystal. Or icy crystal. Anyway, we need some of those badges. They may hold the secret to infinite power!

It has taken much influence on my part, but I've convinced the teleportation attendant to send you to the Winter Nexus itself. But go quickly before he tires of maintaining the link to such a distant place!

<i>[A group of 4+ level 40+ players recommended.]</i>": "Pedi a Irkima que estudasse o conhecimento disponível sobre o reino feérico e ele encontrou um detalhe interessante. Alguns dos líderes das forças da Rainha do Inverno recebem o título de 'Puck', juntamente com os poderes associados. E para provar sua identidade, eles recebem um distintivo feito de gelo. Ou cristal. Ou cristal gelado. De qualquer forma, precisamos de alguns desses distintivos. Eles podem guardar o segredo do poder infinito!

Foi necessária muita influência da minha parte, mas convenci o atendente do teletransporte a mandá-lo para o próprio Nexus Invernal. Mas vá rápido antes que ele se canse de manter o vínculo com um lugar tão distante!

<i>[Recomenda-se um grupo de 4+ jogadores de nível 40+.]</i>"
"I've heard of a mortal flower called a tulip, but I've never seen one! I wish I had one.

<i>[Flitilda flutters her eyelashes at you.]</i>": "Já ouvi falar de uma flor mortal chamada tulipa, mas nunca vi uma! Eu gostaria de ter um.

<i>[Flitilda agita os cílios para você.]</i>"
"I've heard that if you summon a sandstorm while standing there, it will attract a young breeze elemental right to you! Most aren't native to this realm, but something about the winds in the Ilmari allow them to be born. Quite unusual! So anyway, it will find you in seconds. Kill it and get its heart. Don't worry": "most wind elementals that grow up <i>here</i> end up insane anyway, so you're doing it a favor, maybe."
"I've heard that some of the demonic rocks to the north have useful properties. There is one in particular that interests me, some kind of frozen magma. I would like to tinker with this one, and see if it has useful engineering applications. If you bring me a few, I will share any findings with you.": "Ouvi dizer que algumas das rochas demoníacas ao norte têm propriedades úteis. Há um em particular que me interessa, uma espécie de magma congelado. Eu gostaria de mexer neste e ver se ele tem aplicações úteis de engenharia. Se você me trouxer alguns, compartilharei todas as descobertas com você."
"I've heard there is a \\\"model home\\\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.\": \"Suponho que poderia lhe ensinar equitação se você me fizesse um favor. Veja, eu desprezo goblins por razões óbvias, e fala-se de goblins mineiros nesta área. Preciso saber o que eles estão minerando. Você sabe como matar um goblin, certo? E balançar uma picareta de mineração? Bom, isso deve ser fácil para você! <i>[Nota": "a conclusão requer Mineração 15.]</i>"
"I've heard there is a \\\"model home\\\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.\\\"\": \"Mythander em Eltibule disse": "\\\"Suponho que poderia lhe ensinar a andar a cavalo se você me fizesse um favor. Veja, eu desprezo goblins por razões óbvias, e fala-se de goblins mineiros nesta área. Preciso saber o que eles estão minerando. Você sabe como matar um goblin, certo? E usar uma picareta de mineração? Bom, isso deve ser fácil para você! <i>[Nota: a conclusão requer Mineração 15.]</i>"
"I've lost my favorite Grand Shaping Hammer. And don't tell me it broke, it was brand new! I must have put it somewhere. It was special because it had a wider grip and shorter handle which made it a joy to use. I guess I'll have to get a toolcrafter to make me a new one some day. *Sigh*": "Perdi meu Grand Shaping Hammer favorito. E não me diga que quebrou, era novo! Devo ter colocado em algum lugar. Era especial porque tinha uma empunhadura mais larga e um cabo mais curto, o que tornava seu uso um prazer. Acho que terei que contratar um criador de ferramentas para fazer um novo para mim algum dia. *Suspirar*"
"I've noticed many of them carry bits of glass around and I can't imagine why. Could you find me some samples? The pretty violet ones.\\\"\": \"Trasen em Serbule Hills disse": "\\\"Não temos muitos ranalon em Verta, então estou muito interessado em aprender mais sobre os que vivem aqui! Infelizmente, eles não são amigáveis."
"I've prepared the paint for the inscription. Let's begin.

<i>[Truxartis inscribes a symbol into his palm. The symbol glows and vanishes. He then inscribes the same symbol into your palm.]</i>

Your master being so powerful has many... benefits. One is that you inherted many of my ancient... powers. And I have unlocked one of them for you.

You can now become a giant bat! Use this power wisely. Or, more realistically, use this power amusingly.": "Preparei a tinta para a inscrição. Vamos começar.

<i>[Truxartis inscreve um símbolo na palma da mão. O símbolo brilha e desaparece. Ele então inscreve o mesmo símbolo na palma da sua mão.]</i>

Seu mestre sendo tão poderoso traz muitos... benefícios. Uma é que você herdou muitos dos meus antigos... poderes. E eu desbloqueei um deles para você.

Agora você pode se tornar um morcego gigante! Use esse poder com sabedoria. Ou, mais realisticamente, use esse poder de forma divertida."
"I've received word from my Unora. She's my eyes inside the mage's school, and she says that Guzor is pestering the Sub-Commander to remove me from the Sub-Council on City Defense. This goes beyond politics. This man so fears bardic magic that he would cut us out of the city. He knows that his magic cannot heal -- it can only destroy. And so he aims to destroy us. We, in turn, must heal! Heal the rift in the Sub-Council on City Defense!

Of course, I was hesitant to use charm magic. But the surgery we must perform requires it. We healers know that sometimes a patient calls for a difficult procedure. A dangerous one. So summon your courage: the city needs us!

Here is a list of necessities for the Geas that Ormond recommended.": "Recebi notícias da minha Unora. Ela está de olho na escola do mago e diz que Guzor está importunando o Subcomandante para me remover do Subconselho de Defesa da Cidade. Isso vai além da política. Este homem tem tanto medo da magia bárdica que nos expulsaria da cidade. Ele sabe que sua magia não pode curar – só pode destruir. E então ele pretende nos destruir. Nós, por sua vez, devemos curar! Cure a brecha no Subconselho de Defesa da Cidade!

Claro, eu estava hesitante em usar feitiço mágico. Mas a cirurgia que devemos realizar exige isso. Nós, curadores, sabemos que às vezes um paciente pede um procedimento difícil. Um perigoso. Então reúna sua coragem: a cidade precisa de nós!

Aqui está uma lista de necessidades para os Geas que Ormond recomendou."
"I've seen the Winter Court's outposts. They're staying in tiny dimensional pockets where they think they're safe. But they have to come out some time. Show them that their safety is an illusion.": "Eu vi os postos avançados da Corte Winter. Eles estão hospedados em pequenos bolsões dimensionais onde pensam que estão seguros. Mas eles têm que sair algum dia. Mostre-lhes que a segurança deles é uma ilusão."
"I've sent the phlogiston off to my buyer, and now she wants some more! I need the same grade of phlogiston as before. Are you up for it?": "Enviei o flogisto para minha compradora e agora ela quer mais! Preciso do mesmo grau de flogisto de antes. Você está pronto para isso?"
"I've stopped accepting special orders for fresh body parts. It's just too existentially painful. But orders for fresh mushrooms should be fine!

I need some extremely fresh Pixie's Parasols. I'd pick them myself, but... well, I'm scared of pixies.": "Parei de aceitar encomendas especiais de partes frescas do corpo. É muito doloroso existencialmente. Mas pedidos de cogumelos frescos devem servir!

Preciso de alguns guarda-sóis da Pixie extremamente novos. Eu mesmo os escolheria, mas... bem, tenho medo de duendes."
"I've talked with my informants about those scorpions you found. And they WERE keeping secrets from me! Apparently scorpion poison is very valuable on the rakkie bandit market, so they've been keeping their existence secret from me. Like I give a fuck about poison glands! I just want the weaponized xedrite. Working with me should be a win-win! Why are they hiding this?!


I convinced them to give me the location of another scorpion-filled pit. You're the only agent I trust in this desert -- aside from the Seer, of course -- so this one's all yours. There are two objectives this time: get my xedrite, and also get me a sample from one of these scorpions. Look for a decently scary-looking one, kill it, and bring back... well, just bring the whole thing back, I guess. The Seer wants to examine it.

You should expect scorpions, of course, but I wouldn't be surprised if there were bandits in there, too. Be ready for anything! Here's the map. Get me my xedrite!": "Conversei com meus informantes sobre os escorpiões que você encontrou. E eles estavam escondendo segredos de mim! Aparentemente, o veneno de escorpião é muito valioso no mercado de bandidos rakkie, então eles têm mantido sua existência em segredo de mim. Como se eu me importasse com glândulas venenosas! Eu só quero o xedrite armado. Trabalhar comigo deve ser vantajoso para todos! Por que eles estão escondendo isso?!


Eu os convenci a me darem a localização de outro poço cheio de escorpiões. Você é o único agente em quem confio neste deserto – além do Vidente, é claro – então este é todo seu. Desta vez, há dois objetivos: conseguir meu xedrite e também uma amostra de um desses escorpiões. Procure um de aparência decentemente assustadora, mate-o e traga de volta... bem, apenas traga tudo de volta, eu acho. O Vidente quer examiná-lo.

Você deveria esperar escorpiões, é claro, mas eu não ficaria surpreso se houvesse bandidos lá também. Esteja pronto para qualquer coisa! Aqui está o mapa. Pegue meu xedrite!"
"I've tried all kinds of schemes to cure Deville and Rick, but nothing worked. Deville eventually got fed up and left. A few months later, a talking bird stopped by to tell me Deville was living in Animal Town now. I've tried to figure out where that is, and my best guess is an island called \\\"Sun Vale\\\". See if you can find him!\\\"\": \"Brandon Mellus, do Red Wing Casino, disse": "\\\"Deville se transformou em um burro. E isso praticamente arruinou sua vida. Ele não conseguiu falar por um longo tempo e seus pais não acreditaram que ele ainda estava lá! Eles decidiram que ele era apenas um burro e seu filho verdadeiro estava morto, então eles realizaram um funeral para ele. Ele realmente não tem casa para onde voltar agora. Mas ele ainda não quer continuar sendo um burro!"
"I've tried indirect methods of dealing with the phoenix issue, but the threat grows ever hotter. My subjects have even given a name to the birds' stolen home: 'firebird mountain.' It is not a comforting name to fire-averse trolls. Please resolve this issue by removing the phoenices.": "Tentei métodos indiretos para lidar com a questão da Fênix, mas a ameaça fica cada vez mais intensa. Meus súditos até deram um nome à casa roubada dos pássaros: “montanha do pássaro de fogo”. Não é um nome reconfortante para trolls avessos ao fogo. Resolva esse problema removendo as fenícias."
"I've underestimated Ormond. And I need to apologize to him for that. So when I talk to him, I'd like to offer a gift. Can you get it for me?

His favorite flower is the desert rose. A  bouquet of them would help show my feelings.": "Subestimei Ormond. E preciso me desculpar com ele por isso. Então, quando eu falar com ele, gostaria de oferecer um presente. Você pode pegar para mim?

Sua flor favorita é a rosa do deserto. Um buquê deles ajudaria a mostrar meus sentimentos."
"I've used Khyrulek's journal to map a way into one of the vampire safehouses beneath Statehelm. There's a working entrance in... Vidaria! It's in the old Woodburr Farm common building. Look for a... windmill... nearby. Once you find the Tuvillic Rune, you should be able to... defeat the guardian... and enter the safehouse.

Once inside, search for these items -- I will write them down for you. You may keep anything else you find.": "Usei o diário de Khyrulek para mapear um caminho para um dos esconderijos dos vampiros abaixo de Statehelm. Há uma entrada em funcionamento em... Vidaria! Fica no antigo prédio comum da Fazenda Woodburr. Procure um... moinho de vento... próximo. Depois de encontrar a Runa Tuvillic, você deverá ser capaz de... derrotar o guardião... e entrar no esconderijo.

Uma vez lá dentro, procure por esses itens – vou anotá-los para você. Você pode ficar com qualquer outra coisa que encontrar."
"I... kind of have a gambling problem. <i>Had</i> a gambling problem. I'm better now! But there's these mantises that I owe money to. Like, several million councils. Don't look at me like that! How was I supposed to know they were psychics?!

So, yeah. They're gonna rip off my head and lay eggs in my neck unless I get them their money. But they said they'd give me more time if I got them some gems they want. I've gotten a lot of them, but I need a few more. If you happened upon some obsidian, save them for me?": "Eu... meio que tenho um problema com jogo. <i>Tive</i> um problema de jogo. Estou melhor agora! Mas há estes louva-a-deus aos quais devo dinheiro. Tipo, vários milhões de conselhos. Não me olhe assim! Como eu poderia saber que eles eram médiuns?!

Então, sim. Eles vão arrancar minha cabeça e botar ovos em meu pescoço, a menos que eu consiga o dinheiro deles. Mas eles disseram que me dariam mais tempo se eu conseguisse algumas joias que eles queriam. Já consegui muitos deles, mas preciso de mais alguns. Se você encontrar alguma obsidiana, guarde-a para mim?"
"Ice Cores": "Núcleos de gelo"
"Ice Cores for Landri the Cold": "Núcleos de gelo para Landri, o Frio"
"Ice Magic Boost Potion 20%": "Poção de reforço mágico de gelo 20%"
"Ice Magic is well known for granting its users resilience. Let's make sure you understand this concept well.

There's a metal dodecahedron outside. Stand in it and say 'Ossugazak 2'. This will activate a training program. Be prepared.

<i>[Must use Ice Magic to advance this quest.]</i>": "Ice Magic é conhecido por conceder resiliência aos seus usuários. Vamos ter certeza de que você entendeu bem esse conceito.

Há um dodecaedro de metal lá fora. Entre nele e diga 'Ossugazak 2'. Isso ativará um programa de treinamento. Esteja preparado.

<i>[É necessário usar Magia de Gelo para avançar nesta missão.]</i>"
"Ice Plane Research": "Pesquisa de avião de gelo"
"Ice Slick Explosion": "Explosão de gelo"
"Ice Sludge": "Lama de gelo"
"Icebreeze Moth Wings": "Asas de mariposa Icebreeze"
"IceConjuration": "Conjuração de Gelo"
"IceCoresForLandriTheCold": "IceCoresForLandiTheCold"
"IceMagic": "Magia de Gelo"
"IceMagicTraining": "Treinamento IceMagic"
"IceMagicTraining1": "Treinamento IceMagic1"
"IceMagicTraining2": "Treinamento IceMagic2"
"IceMagicTraining3": "Treinamento IceMagic3"
"IceMagicTraining4": "Treinamento IceMagic4"
"IceMagicTrainingIntro": "IceMagicTrainingIntrodução"
"IcePlaneResearch": "Pesquisa IcePlane"
"IceSlickExplosion": "Explosão IceSlick"
"IceSludge": "Lodo de gelo"
"Ichin called me a schemer AND a desperate fawning kitten? At the same time? Faschinating! Ichin normally calls me a schemer, occasionally calls me a kitten, but never calls me a scheming kitten! I know Ichin well, and this means he's trying to throw me off the trail of the truth. I will have to figure out why. Oh, here. This is for your trouble.": "Ichin me chamou de intrigante E de gatinho bajulador desesperado? Ao mesmo tempo? Fascinante! Ichin normalmente me chama de intrigante, ocasionalmente me chama de gatinho, mas nunca me chama de gatinho intrigante! Conheço bem Ichin, e isso significa que ele está tentando me despistar da verdade. Eu terei que descobrir o porquê. Ah, aqui. Isto é para o seu problema."
"Iconic and yet so hard to master! The Mushroom symbol eludes you now, but you know you're on the right track. Just 500 or so freshly-plucked examples should do it.": "Icônico e ainda assim tão difícil de dominar! O símbolo do Cogumelo lhe escapa agora, mas você sabe que está no caminho certo. Apenas cerca de 500 exemplares recém-colhidos devem bastar."
"If giant vipers were too easy, then you should move on to punching giant scorpions. There's mounds of scorpions in Vidaria. Go punch one up! You'll learn a lot. A lot about pain. But that's part of it!

<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Se víboras gigantes fossem muito fáceis, você deveria passar a socar escorpiões gigantes. Há montes de escorpiões em Vidaria. Vá dar um soco! Você aprenderá muito. Muito sobre dor. Mas isso faz parte!

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>"
"If I can make a potion to fix my mind, it might fix yours too! Can you bring me some ingredients I'm missing?": "Se eu puder fazer uma poção para consertar minha mente, ela também poderá consertar a sua! Você pode me trazer alguns ingredientes que estou faltando?"
"If I can make a potion to fix my mind, it might fix yours too! Can you grind up some mushroom flakes for me?": "Se eu puder fazer uma poção para consertar minha mente, ela também poderá consertar a sua! Você pode moer alguns flocos de cogumelo para mim?"
"If I had a lot of wool, I could prepare for winter. Without blankets, we'll freeze!": "Se eu tivesse muita lã, poderia me preparar para o inverno. Sem cobertores, vamos congelar!"
"If I had some agates, I think I could convince Tryaka to making jewelry again. It would be a good distraction for her.": "Se eu tivesse algumas ágatas, acho que poderia convencer Tryaka a fazer joias novamente. Seria uma boa distração para ela."
"If I had some pungent rennet, I could make my favorite cheese again!": "Se eu tivesse um pouco de coalho picante, poderia fazer meu queijo favorito de novo!"
"If I'm going to run an armor shop again I'll need more grizlark, and Leah's kuvou are dead. But there's still feral kuvou! If you just let them spit on you and collect that into a bottle, I'll pay you.": "Se vou abrir uma loja de armaduras novamente, precisarei de mais grizlark, e os kuvou de Leah estão mortos. Mas ainda há kuvou selvagem! Se você deixá-los cuspir em você e colocar isso em uma garrafa, eu pago."
"If I'm to quickly become a master of paleontology, I need a constant supply of bones to study! But I can't go collect the bones, since that would require me to stop studying. Perhaps you're for hire? I will pay you for 10 good old fossils.": "Se quiser me tornar rapidamente um mestre em paleontologia, preciso de um suprimento constante de ossos para estudar! Mas não posso ir recolher os ossos, pois isso exigiria que eu parasse de estudar. Talvez você esteja de aluguel? Pagarei a você por 10 bons e velhos fósseis."
"If only they had fewer legs! The Spider symbol has proven elusive. But perhaps... Yes, perhaps if you were yourself a spider, and lived as one for some time. Could it work?": "Se ao menos tivessem menos pernas! O símbolo da Aranha provou ser evasivo. Mas talvez... Sim, talvez se você fosse uma aranha e vivesse como tal por algum tempo. Poderia funcionar?"
"If Ricatu thinks my spices will help his fake turkey, more power to him. Why don't you cook him a fake turkey meal and ask him how it tastes?

I don't have any recipes for that -- you'll have to find one yourself!": "Se Ricatu acha que meus temperos vão ajudar seu peru falso, mais poder para ele. Por que você não cozinha para ele uma refeição falsa de peru e pergunta qual é o gosto?

Não tenho nenhuma receita para isso – você mesmo terá que encontrar uma!"
"If these aren't REALLY shoddy, I'm sending 'em RIGHT BACK for a refund.": "Se estes não forem REALMENTE de má qualidade, estou enviando-os de volta para obter um reembolso."
"If this is the creature I fear, it will be protected by a powerful wind. Shooting arrows into it will be difficult, and most weapons will have reduced effect. But these creatures have a weakness": "explosions! Burst magic, bombs, explosion sigils... whatever you have, use it.\": \"Temo que uma espécie invasora de outro continente tenha se instalado em alguns dos antigos bunkers de guerra. Há redemoinhos estranhos naquela área e nunca os vi aqui... mas eles me lembram as terríveis aranhas do deserto de Fosulf. Espero estar enganado!"
"If Trees Could Talk": "Se as árvores pudessem falar"
"If you bring me dinosaur scales to make buttons, I'll show you how to use First Aid.": "Se você me trouxer escamas de dinossauro para fazer botões, mostrarei como usar os primeiros socorros."
"If you can help me out, I'll make as many rings for you as you want. As a brewer, the Queen has me brew up things to suit her \"special needs\" when I'm not out here handing out prizes. Could you bring me 20 hops? The time I save from that I can use to make you a ring!": "Se você puder me ajudar, farei quantos anéis você quiser. Como cervejeira, a Rainha me faz preparar coisas para atender às suas “necessidades especiais” quando não estou aqui distribuindo prêmios. Você poderia me trazer 20 saltos? O tempo que economizo e posso usar para fazer um anel para você!"
"If you ever find yourself deep in Gazluk Keep, head to the bottom floor and poke around the southern barracks loop. That's where I used to bunk. They would have tossed my medals into one of the storage chests down there. See if you can find my box of medals.": "Se você se encontrar nas profundezas do Forte Gazluk, vá até o andar inferior e dê uma olhada no circuito sul do quartel. Era onde eu costumava dormir. Eles teriam jogado minhas medalhas em um dos baús lá embaixo. Veja se consegue encontrar minha caixa de medalhas."
"If you ever want to do that again, go ahead": "I enchanted that stage to always resurrect corpses that say 'I am slain'. It was easier than resurrecting one specific mortal. Easier for me, I mean: whimsical things are easier than boring things!\": \"<i>Zhia Lian:</i> Legal! Mas... falar com os mortos não parece mais tão divertido, agora que vi você fazer isso. Acho que valeu a pena ver, no entanto."
"If you feel like killing some more of them, just let me know first!\": \"Isso é perfeito! Essas fadas voltarão em breve, mas você as colocou na defensiva. Você é um dos piores tipos de pragas": "um mortal poderoso interferindo na política das fadas!"
"If you have time to help me further, there is something of an annoying clerical problem to deal with": "the scion dreamt up a series of ten \\\"anxiety propagators\\\", devices dreamt up by Gulagra. They are causing distress to dreamers. They should dissipate in a few hundred years, so this isn't too critical of a problem, but it would help mortals dream well if they were destroyed. Now that the dreamer is thwarted you should simply be able to touch them to destroy them. If you find all ten, I shall be very grateful. But you will need help: some are guarded by ferocious beasts!\": \"Obrigado novamente por repelir o descendente de Gulagra. Os mortais dormirão em segurança por mais uma noite!"
"If you knew how to catch fish with angling, you could study them better while they were dangling on the line. Yes, that's it: you must angle some fishes to master the Fish symbol.": "Se você soubesse pescar com pesca, poderia estudá-los melhor enquanto estivessem pendurados na linha. Sim, é isso: você deve pescar alguns peixes para dominar o símbolo do Peixe."
"If you listen very carefully, you might hear the friendly tornadoes around here making an oscillating noise approximately five notes higher than normal. They're obviously in significant distress!

I think it's those ghastly exploding sheep. If an explosion gets sucked up into a tornado, that can really upset it. Could you clear the area of those fiery abominations?": "Se você ouvir com atenção, poderá ouvir os tornados amigáveis ​​por aqui fazendo um ruído oscilante aproximadamente cinco notas acima do normal. Eles estão obviamente em perigo significativo!

Acho que são aquelas ovelhas horríveis que explodem. Se uma explosão for sugada por um tornado, isso pode realmente perturbá-lo. Você poderia limpar a área dessas abominações de fogo?"
"If you need to bunny up, just ask! Good hunting!\\\"\": \"Mestre Lopsy disse": "\\\"Olá! Você estaria interessado em aprender como funciona a cenoura? Posso ajudá-lo a começar!"
"If you snorted some flowers, you believe you could learn to draw one by osmosis.": "Se você cheirasse algumas flores, você acredita que poderia aprender a desenhar uma por osmose."
"If you travel in these caves you will meet violent myconians. Either you or they shall die. If it is they who die, please bring back any intact heartshrooms you find. We can regrow myconians from them.": "Se você viajar por essas cavernas, encontrará micônios violentos. Ou você ou eles morrerão. Se forem eles que morrerem, por favor, traga de volta todos os corações intactos que encontrar. Podemos regenerar myconianos a partir deles."
"If you were a REAL friend, you would help me master the ancient recipe for forbidden bacon. Ur-Bacon is infused with the spirits of the dead. What a thrill it'd be to serve that! But of course, only the dead know the secret. You might find it written down somewhere, but it'd be incredibly rare. Sigh.": "Se você fosse um amigo de VERDADE, me ajudaria a dominar a antiga receita do bacon proibido. Ur-Bacon está infundido com os espíritos dos mortos. Que emoção seria servir isso! Mas é claro que só os mortos conhecem o segredo. Você pode encontrá-lo escrito em algum lugar, mas seria incrivelmente raro. Suspirar."
"If you were to exterminate more ratkin root-tenders, I would be in your debt.": "Se você exterminasse mais ratinhos de ratkin, eu ficaria em dívida com você."
"If you were to go take care of some gargoyles, I could make sure some of the discretionary fund ends up in your pocket.\\\"\": \"Sir Fisk, em Statehelm, disse": "\\\"Tenho muitos amigos em campo e temo por eles. Nós, besteiros, estamos seriamente em desvantagem contra as gárgulas em particular, e temo um ataque deles em breve."
"If you're a miner, I'd love to purchase some astounding metal slabs from you.": "Se você é um mineiro, adoraria comprar de você algumas placas de metal incríveis."
"If you're a miner, I'd love to purchase some marvelous metal slabs from you.": "Se você é um mineiro, adoraria comprar de você algumas placas de metal maravilhosas."
"If you're a miner, I'd love to purchase some superb metal slabs from you.": "Se você é um mineiro, adoraria comprar de você algumas placas de metal excelentes."
"If you're a tool artisan, I'd love to purchase some new amazing armor patch kits from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns novos kits incríveis de remendos de armadura."
"If you're a tool artisan, I'd love to purchase some new amazing armor stakes from you.": "Se você é um artesão de ferramentas, adoraria comprar de você algumas novas estacas de armadura incríveis."
"If you're a tool artisan, I'd love to purchase some new astounding armor patch kits from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns novos e surpreendentes kits de remendos de armadura."
"If you're a tool artisan, I'd love to purchase some new basic hammers from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns martelos básicos novos."
"If you're a tool artisan, I'd love to purchase some new bilge hoops from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns novos aros de porão."
"If you're a tool artisan, I'd love to purchase some new fancy hammers from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns martelos novos e sofisticados."
"If you're a tool artisan, I'd love to purchase some new good armor stakes from you.": "Se você é um artesão de ferramentas, adoraria comprar de você algumas estacas de armadura novas e boas."
"If you're a tool artisan, I'd love to purchase some new primitive armor stakes from you.": "Se você é um artesão de ferramentas, adoraria comprar de você algumas novas estacas de armadura primitiva."
"If you're a tool artisan, I'd love to purchase some new tack hammers from you.": "Se você é um artesão de ferramentas, adoraria comprar de você alguns martelos novos."
"If you're going to take care of the sneaky sewer fae, you might as well go a bit beyond that point and look for an outbreak of sentient mushroom people.

Look, that's what the report says. I haven't met any mushroom people personally, but magic can do a lot of terrible things. Remember not to breathe weird spores!": "Se você vai cuidar das fadas sorrateiras do esgoto, é melhor ir um pouco além desse ponto e procurar por um surto de pessoas sencientes em forma de cogumelo.

Olha, é isso que diz o relatório. Não conheci pessoalmente nenhum cogumelo, mas a magia pode fazer muitas coisas terríveis. Lembre-se de não respirar esporos estranhos!"
"If you're gonna be murdering harmless ogres, can you collect their stomachs for me? I need 'em for fart bladders and other joke toys.": "Se você vai assassinar ogros inofensivos, pode recolher seus estômagos para mim? Preciso deles para bexigas de peido e outros brinquedos de brincadeira."
"If you're gonna be murdering harmless ogres, can you collect their stomachs for me? I need 'em for fart bladders and other joke toys. ": "Se você vai assassinar ogros inofensivos, pode recolher seus estômagos para mim? Preciso deles para bexigas de peido e outros brinquedos de brincadeira."
"If you're handy with a weapon, we could use help with the incessant waves of ghouls. Be careful -- they can overwhelm you!": "Se você tiver habilidade com uma arma, precisaríamos de ajuda com as incessantes ondas de ghouls. Tenha cuidado - eles podem sobrecarregar você!"
"If you're inclined to help, can you speak to that Hackley woman with the Council? A few guards investigated days ago, but I've heard nothing since. Surely the thief is caught by now! Go check.\\\"\": \"Elune, em Statehelm, disse": "\\\"Sinto muito. Não posso abrir minha loja nessas condições. Fui assaltado! A loja é uma vergonha!"
"If you're set on getting past this door, you'll have to prove to me you won't die the moment you do. Go kill the Doctrine-Keeper, and when you've done that we'll talk.": "Se você está decidido a passar por esta porta, terá que me provar que não morrerá no momento em que o fizer. Vá matar o Guardião da Doutrina e, quando tiver feito isso, conversaremos."
"IfTreesCouldTalk": "Se as árvores pudessem falar"
"Ilmari Desert": "Deserto de Ilmari"
"IlmariHalloweenGhostlySpider": "IlmariHalloweenFantasmaAranha"
"Imatia's Sight Potions": "Poções de Visão de Imatia"
"Impetus": "the force that makes something happen. e.g. 'A vicious goblin attack was the impetus for the new anti-goblin law.'"
"Impressive work! Now I'm starting to understand why the Wardens exist. And don't worry: I may be a human, but I'm no snitch. I promised to keep your organization secret, and I will. So nobody'll ever know about your heroism today. Except us. Here, it's for you. I hope collars aren't offensive or nothin'.": "Trabalho impressionante! Agora estou começando a entender por que os Guardiões existem. E não se preocupe: posso ser humano, mas não sou delator. Prometi manter a sua organização em segredo, e o farei. Então ninguém jamais saberá do seu heroísmo hoje. Exceto nós. Aqui, é para você. Espero que as coleiras não sejam ofensivas nem nada."
"Impressive!": "Impressionante!"
"Impressive. I knew I picked the right team! More eggs hatch every day, but it will take time before new ones are ready to take to the surface.": "Impressionante. Eu sabia que escolhi o time certo! Mais ovos eclodem todos os dias, mas levará algum tempo até que novos estejam prontos para subir à superfície."
"ImpressiveHumanoidSkull": "ImpressionanteCrânio Humanóide"
"ImpressiveSkull": "Crânio Impressionante"
"Impulso": "a força que faz algo acontecer. por exemplo 'Um ataque cruel de duendes foi o ímpeto para a nova lei anti-goblin.'"
"In a cave beneath Povus, you came upon a chest that had been kicked in, leaving it unopenable. But you believe that with a large spoon, you could pry the chest open.": "Em uma caverna abaixo de Povus, você encontrou um baú que havia sido chutado, deixando-o impossível de abrir. Mas você acredita que com uma colher grande seria possível abrir o baú."
"In a cave beneath Povus, you came upon a strange door that could only be opened if you find all the \"lost penguins.\" Presumably they are near the door?": "Em uma caverna abaixo de Povus, você encontrou uma porta estranha que só poderia ser aberta se você encontrasse todos os “pinguins perdidos”. Presumivelmente eles estão perto da porta?"
"In a cave beneath Povus, you came upon a terrifying horde of aktaari seemingly bent on overtaking the continent! You only have a few minutes to find and destroy the Royal Eggs. Cheb has promised to give you a reward every time you kill three aktaari and squish three eggs.": "Em uma caverna abaixo de Povus, você encontrou uma terrível horda de aktaari aparentemente decididos a dominar o continente! Você só tem alguns minutos para encontrar e destruir os Ovos Reais. Cheb prometeu lhe dar uma recompensa cada vez que você matar três Aktaari e esmagar três ovos."
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some grickling eyeballs were inserted into it. What do you have to lose?": "Em uma caverna abaixo de Povus, você encontrou um dispositivo estranho que parecia poder ser ativado se alguns globos oculares fossem inseridos nele. O que você tem a perder?"
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some osslar spikes were inserted into it. What do you have to lose?": "Em uma caverna abaixo de Povus, você encontrou um dispositivo estranho que parecia poder ser ativado se alguns espinhos de osslar fossem inseridos nele. O que você tem a perder?"
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some rubies were inserted into it. What do you have to lose? Besides some rubies?": "Em uma caverna abaixo de Povus, você encontrou um dispositivo estranho que parecia poder ser ativado se alguns rubis fossem inseridos nele. O que você tem a perder? Além de alguns rubis?"
"In a cave beneath Povus, you met a Forthragarian who told you not to go too far into the caves beyond him. But if you do go in, he asked you to look for a Spike of Autonomy.": "Em uma caverna abaixo de Povus, você conheceu um Forthragarian que lhe disse para não ir muito longe nas cavernas além dele. Mas se você entrar, ele pediu que você procurasse um Pico de Autonomia."
"In a cave beneath Povus, you met a ghostly orc that ranted about accidentally killing his friends with an explosive device. He swears the device was supposed to be fake!": "Em uma caverna abaixo de Povus, você conheceu um orc fantasmagórico que falou sobre matar acidentalmente seus amigos com um dispositivo explosivo. Ele jura que o dispositivo era para ser falso!"
"In a cave beneath Povus, you met a ghostly orc that wanted nothing but a sip of Remga's Raging Rum.": "Em uma caverna abaixo de Povus, você conheceu um orc fantasmagórico que não queria nada além de um gole de Rum Furioso de Remga."
"In a cave deep beneath Povus, you came across a weird magical globe that seemed to be missing some parts.": "Em uma caverna abaixo de Povus, você encontrou um estranho globo mágico que parecia estar faltando algumas partes."
"In a cave deep beneath Povus, you came across a wizard's stargazing apparatus. The view was too muddled to make out, though, due to damaged lenses.": "Em uma caverna abaixo de Povus, você encontrou um aparelho de observação de estrelas de um mago. A visão estava muito confusa para ser entendida, devido às lentes danificadas."
"In a cave deep beneath Povus, you found a giant lute-like instrument with missing enchanted strings. Looks like it'd need some pretty big ones.": "Em uma caverna abaixo de Povus, você encontrou um instrumento gigante parecido com um alaúde, sem cordas encantadas. Parece que precisaria de alguns bem grandes."
"In a cave deep beneath Povus, you found a sculpture that reminded you of a play area for dwarven children. It was missing a large piece, though.": "Em uma caverna abaixo de Povus, você encontrou uma escultura que lembrava uma área de recreação para crianças anãs. Mas estava faltando um pedaço grande."
"In a cave deep beneath Povus, you found a ship in a bottle. The bottle was locked, suggesting that there was some reason one might unlock it.": "Em uma caverna abaixo de Povus, você encontrou um navio em uma garrafa. A garrafa estava trancada, sugerindo que havia algum motivo para desbloqueá-la."
"In a cave deep beneath Povus, you found a weird stuffed rabbit toy which talked to you. When you moved some dice, it seemed happy and gave you a temporary buff. It mentioned some siblings... perhaps making all the siblings happy would be a kind thing to do.": "Em uma caverna abaixo de Povus, você encontrou um estranho coelho de pelúcia que falava com você. Quando você movia alguns dados, ele parecia feliz e lhe dava um buff temporário. Mencionou alguns irmãos... talvez fazer todos os irmãos felizes fosse uma coisa gentil de se fazer."
"In a dungeon beneath Eltibule there is a mighty avatar shackled into servitude. This is unacceptable. Slay Ciervos The Shadow to relieve his humiliation.": "Em uma masmorra abaixo de Eltibule há um poderoso avatar algemado à servidão. Isto é inaceitável. Mate Ciervos, a Sombra, para aliviar sua humilhação."
"In a dungeon beneath Eltibule there is a mighty avatar shackled into servitude. This is unacceptable. Slay Ciervos The Shadow to relieve his humiliation. ": "Em uma masmorra abaixo de Eltibule há um poderoso avatar algemado à servidão. Isto é inaceitável. Mate Ciervos, a Sombra, para aliviar sua humilhação."
"in a lake just southeast of Eltibule Keep, a telepathic spirit of some kind asked you to catch a \"scary\" pike that's invaded. The pike can only be caught at night.": "em um lago a sudeste de Eltibule Keep, algum tipo de espírito telepático pediu para você pegar um lúcio \"assustador\" que foi invadido. O lúcio só pode ser capturado à noite."
"In a pseudo-pocket dimension beneath Povus, you encountered a larger-than-normal butterfly which begged you to knock over some jars of nectar elsewhere.": "Em uma dimensão de pseudobolso abaixo de Povus, você encontrou uma borboleta maior que o normal que implorou para que você derrubasse alguns potes de néctar em outro lugar."
"In a pseudo-pocket dimension beneath Povus, you met a fairy named Rixie who asked you to collect some rings.": "Em uma dimensão pseudo-bolso abaixo de Povus, você conheceu uma fada chamada Rixie que lhe pediu para coletar alguns anéis."
"In addition to being an expert fire mage, I'm also quite the alchemist. Mycology, however, is beneath me. Mushrooms are ... dirty. But I have need of some simple explosive mushroom bombs. Perhaps you know how to make those?": "Além de ser um mago especialista em fogo, também sou um grande alquimista. A micologia, no entanto, está abaixo de mim. Os cogumelos estão... sujos. Mas preciso de algumas simples bombas explosivas de cogumelo. Talvez você saiba como fazer isso?"
"In addition to getting three recommendations, you'll also need to pass a simple trial. Scattered near the university are three statuettes. Find them, activate them, and defeat their guardians. Hopefully you can manage something as simple as that.": "Além de receber três recomendações, você também precisará passar por um teste simples. Espalhadas perto da universidade estão três estatuetas. Encontre-os, ative-os e derrote seus guardiões. Esperamos que você consiga gerenciar algo tão simples quanto isso."
"In captivity we were forced to mate like animals -- the male giving his life to feed the younglings. But now that we are free, do you not agree we should adopt the culture of a more civilized race?

I wish to mate with Zeratak, but I fear that she will not understand my desires. She is a very conservative mantis. But seeing that most mantises fled for the hills yet she remained behind with me, it is possible that she wishes to mate with me badly enough to try a new method. Can you see if Zeratak is amenable to using venison for the larva? I would ask, but I fear she may lash out in anger.": "Em cativeiro, fomos forçados a acasalar como animais – o macho dando a vida para alimentar os filhotes. Mas agora que somos livres, não concorda que deveríamos adoptar a cultura de uma raça mais civilizada?

Desejo acasalar com Zeratak, mas temo que ela não entenda meus desejos. Ela é uma louva-a-deus muito conservadora. Mas visto que a maioria dos louva-a-deus fugiu para as colinas, mas ela permaneceu comigo, é possível que ela deseje acasalar comigo o suficiente para tentar um novo método. Você pode ver se Zeratak aceita usar carne de veado como larva? Eu perguntaria, mas temo que ela possa atacar de raiva."
"In Memoriam": "Em memória"
"In my spare time I dabble in artistic weapon improvements, and I'm working on a dazzling khopesh. But I need more raw materials!

I'm not a smith, but if I had enough old broken blades, I could probably fulfill my artistic vision.": "Em meu tempo livre, me envolvo em melhorias artísticas de armas e estou trabalhando em um khopesh deslumbrante. Mas preciso de mais matéria-prima!

Não sou ferreiro, mas se tivesse lâminas quebradas suficientes, provavelmente poderia concretizar minha visão artística."
"In my spare time I work to artistically enhance weapons, and I'm working on a hammer that needs a new wrap. I know just the material! Kuvou tongue! Can you get me some?": "No meu tempo livre, trabalho para aprimorar armas artisticamente e estou trabalhando em um martelo que precisa de uma nova embalagem. Eu sei apenas o material! Língua Kuvou! Você pode me pegar um pouco?"
"In order to survive, you must be able to replenish your carrot supply no matter the conditions! Find a good, fertile plot of ground somewhere out here in the Kur Mountains and grow twelve carrots. Don't forget, you MUST grow these carrots while being a rabbit. If you want to be a non-rabbit gardener, then go talk to someone else! Once you are done, bring them to me for inspection and I shall reward you with some bunny juices.\\\"\": \"Mestre Flopsy disse": "\\\"Saudações! Pronto para aulas avançadas de Bun-Fu? Ótimo!"
"In Vidaria, you stumbled upon an Undead creature that's been dead for so long, it doesn't even remember its own name. Perhaps you can find some items to jog its memory.": "Em Vidaria, você se depara com uma criatura morta-viva que está morta há tanto tempo que nem lembra o próprio nome. Talvez você possa encontrar alguns itens para refrescar sua memória."
