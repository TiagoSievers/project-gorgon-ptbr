"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Brown Ale I've heard about. Flavor it up however you like!\"": "Rayar disse: \"Muito bem! É difícil preparar e preparar quando você está sempre em movimento. Eu gostaria de terminar alguns barris antes de voltarmos à estrada, mas preciso de um pouco de inspiração e gostaria de provar alguns dos sabores locais. Por que você não prepara 10 copos desta Brown Ale de que ouvi falar. Dê sabor como quiser!\""
