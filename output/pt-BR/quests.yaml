"Mandibles in Red Wing Casino said, \"Assistance? No, no, I am here to help you! ... Well, if you insist on aiding staff members, the meat storage receptacle could be kept at a slightly colder temperature to reduce spoilage. A few more Ice Cores would work.\"": "Mandibles no Red Wing Casino disse: \"Assistência? Não, não, estou aqui para ajudá-lo! ... Bem, se você insistir em ajudar os funcionários, o recipiente de armazenamento de carne poderia ser mantido em uma temperatura um pouco mais fria para reduzir a deterioração. Mais alguns núcleos de gelo funcionariam.\""
"Mandibles in Red Wing Casino said, \"I miss my time in Sedgewick Forest, when I worked with my brethren to keep goblin populations in check. Would you kill goblins in my name? As they perish, make sure to state, 'This is for Mandibles.'\"": "Mandibles no Red Wing Casino disse: \"Sinto falta do tempo que passei na Floresta de Sedgewick, quando trabalhei com meus irmãos para manter as populações de goblins sob controle. Você mataria goblins em meu nome? À medida que eles morrem, certifique-se de dizer: 'Isto é para Mandibles.'\""
"Mandibles in Red Wing Casino said, \"My Sausage Swirlers are a hit with many varieties of mammalian guests. However, I believe I could improve on their flavor if they were made of bear meat -- or a similar beast -- instead of goblin meat. Would you procure some for me?\"": "Mandibles no Red Wing Casino disse: \"Meus Sausage Swirlers são um sucesso entre muitas variedades de convidados mamíferos. No entanto, acredito que poderia melhorar seu sabor se fossem feitos de carne de urso - ou de um animal semelhante - em vez de carne de goblin. Você poderia comprar alguns para mim? \""
"Mandibles in Red Wing Casino said, \"One of our VIP guests has requested a special variety of bread, and I do not know how to make it! Another guest told me that a human somewhere in Kur can teach the recipe, but of course that helps me very little. I am in dire need of this 'vegan nut barley bread', so if you manage to bake some, please bring it to me!\"": "Mandibles no Red Wing Casino disse: \"Um de nossos convidados VIP solicitou uma variedade especial de pão e eu não sei como fazê-lo! Outro convidado me disse que um humano em algum lugar de Kur pode ensinar a receita, mas é claro que isso me ajuda muito pouco. Estou precisando urgentemente deste 'pão vegano de nozes e cevada', então se você conseguir assar um pouco, por favor, traga-o para mim!\""
