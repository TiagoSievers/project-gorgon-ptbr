"Kegs of Brown Ale": "Barris de Brown Ale"
"Kegs of Dwarven Stout": "Barris de Dwarven Stout"
"Kegs of Goblin Ale": "Barris de Cerveja Goblin"
"Kegs of Hegemony Lager": "Barris de Hegemonia Lager"
"Kegs of Marzen": "Barris de Marzen"
"Kegs of Orcish Bock": "Barris de Bock Orc"
"Kegs of Pale Ale": "Barris de Pale Ale"
"Kelim in Amulna said, \"I prefer real meat, and I love a good turkey sandwich this time of year. Damned turkeys can be hard to find, though. They hide in underbrush, and there's not much of that around here!

You might have to travel a bit, but see if you can whack a few and bring me back their plump, juicy carcasses.\"": "Kelim, em Amulna, disse: \"Prefiro carne de verdade e adoro um bom sanduíche de peru nesta época do ano. Mas os malditos perus podem ser difíceis de encontrar. Eles se escondem na vegetação rasteira e não há muito disso por aqui!

Você pode ter que viajar um pouco, mas veja se consegue matar alguns e me trazer de volta suas carcaças rechonchudas e suculentas."
"Kelim in Amulna said, \"If Ricatu thinks my spices will help his fake turkey, more power to him. Why don't you cook him a fake turkey meal and ask him how it tastes?

I don't have any recipes for that -- you'll have to find one yourself!\"": "Kelim em Amulna disse: “Se Ricatu acha que meus temperos vão ajudar seu peru falso, mais poder para ele. Por que você não cozinha para ele uma refeição de peru falso e pergunta qual é o gosto?

Não tenho nenhuma receita para isso – você mesmo terá que encontrar uma!”"
"Kelim in Amulna said, \"Oh, right, the spices. Before I let you have some, can you bring me some cranberries? Cranberries are <i>amazing</i> with turkey. \"": "Kelim em Amulna disse: \"Ah, certo, os temperos. Antes de eu deixar você comer alguns, você pode me trazer alguns cranberries? Cranberries são <i>incríveis</i> com peru.\""
"Kelim in Amulna said, \"The tree needs bright shiny red things... and now you see why I took on this stupid job! I need a lot of hot peppers.  A lot. Do you need some seeds? I still have some for sale!\"": "Kelim em Amulna disse: \"A árvore precisa de coisas vermelhas e brilhantes... e agora você vê por que aceitei esse trabalho estúpido! Preciso de muitas pimentas. Muitas. Você precisa de algumas sementes? Ainda tenho algumas para venda!\""
"Kelim in Amulna said, \"The tree smells horrible, doesn't it? All... piney. I think we should douse it with Telka's Tail. And hang the perfume bottles in the tree as decorations! I have lots of empty bottles, but no full ones. Can you get me two?\"": "Kelim em Amulna disse: “A árvore tem um cheiro horrível, não é?"
"Kelim in Amulna said, \"This one is just impossible... we need something yellow and fluffy for 'tinsel', some sort of human decoration. Where would we get tinsel in the desert?! Are we supposed to shave a few manticores and use their manes?!\"": "Kelim em Amulna disse: \"Este é simplesmente impossível... precisamos de algo amarelo e fofo para o 'enfeite', algum tipo de decoração humana. Onde conseguiríamos enfeites no deserto?! Deveríamos raspar algumas manticoras e usar suas crinas?!\""
"Kelim in Amulna said, \"We need something eye-catching to top the tree. How about... hmm... a pair of scorpion stingers?!\"": "Kelim em Amulna disse: \"Precisamos de algo atraente para cobrir a árvore. Que tal... hmm... um par de ferrões de escorpião?!\""
"Kelim was telling me about a turkey meatloaf he ate recently, and it sounded really good. Think you can do the same thing with tofurkey? You'll have to find the recipe yourself.": "Kelim estava me contando sobre um bolo de carne de peru que comeu recentemente e parecia muito bom. Você acha que pode fazer a mesma coisa com o tofukey? Você terá que encontrar a receita sozinho."
"Khopesh Parts": "Peças Khopesh"
"KhopeshParts": "Peças Khopesh"
"Khyrulek's Crypt": "Cripta de Khyrulek"
"Khyrulek's journal is almost correct, but her calculations are outdated due to planar shift. They must be recalibrated by a... teleportation sage.

There was such a sage in Statehelm years ago named Elmetaph, but my spies say he lives now in a lighthouse on a desolate island.

Seek out this Elmetaph and force him to fix these calculations.": "O diário de Khyrulek está quase correto, mas seus cálculos estão desatualizados devido à mudança planar. Eles devem ser recalibrados por um... sábio de teletransporte.

Há anos atrás, havia um sábio em Statehelm chamado Elmetaph, mas meus espiões dizem que ele vive agora em um farol em uma ilha deserta.

Procure este Elmetaph e force-o a corrigir esses cálculos."
"Khyrulek's notes are precious. We must break the... code.

No matter, I'm sure that I can...trivially...decipher this script.

Go, bloodling. Find me the usual tools for...such a task.": "As notas de Khyrulek são preciosas. Devemos quebrar o... código.

Não importa, tenho certeza de que posso... trivialmente... decifrar esse script.

Vá, sangrento. Encontre-me as ferramentas usuais para... tal tarefa."
"Khyrulek's Planar Planner": "Planejador Planar de Khyrulek"
"Kib the Unkillable in Red Wing Casino said, \"I learned something fascinating yesterday: there are relatively low-cost fire resistance potions on this continent. Those are quite rare in my homeland. Sadly they don't see much use here in the casino. I bought Ragabir's stock, but I have more tests to run. Can you bring me several doses?\"": "Kib, o Invencível, no Red Wing Casino, disse: \"Aprendi algo fascinante ontem: existem poções de resistência ao fogo de custo relativamente baixo neste continente. Essas são muito raras em minha terra natal. Infelizmente, elas não veem muita utilidade aqui no cassino. Comprei o estoque de Ragabir, mas tenho mais testes para fazer. Você pode me trazer várias doses?\""
"Kib the Unkillable in Red Wing Casino said, \"I need a favor from a goblin, and for that I need some goblin ale. A keg of it should be enough.\"": "Kib, o Invencível, no Red Wing Casino, disse: \"Preciso de um favor de um goblin e, para isso, preciso de um pouco de cerveja goblin. Um barril deve ser suficiente.\""
"Kib the Unkillable in Red Wing Casino said, \"My friend Irkima has told me a fanciful tale! There are insects on this continent that secrete lac that is so strong that it has different properties. Irkima called it 'ultra-lac', but of course I'm certain that sages in this land have a more appropriate name for it. I must see this substance! Can you procure some?\"": "Kib, o Invencível, no Red Wing Casino, disse: \"Meu amigo Irkima me contou uma história fantástica! Existem insetos neste continente que secretam laca que é tão forte que tem propriedades diferentes. Irkima a chamou de 'ultra-laca', mas é claro que tenho certeza de que os sábios desta terra têm um nome mais apropriado para ela. Preciso ver esta substância! Você pode conseguir alguma?\""
"Kib the Unkillable in Red Wing Casino said, \"My second-favorite sword needs to be repaired. I've searched the countryside near the casino and found nothing appropriate. I need metal of expert quality! I've seen armor made of amazing metal, so I know it must exist somewhere in this land...\"": "Kib, o Invencível, no Red Wing Casino, disse: \"Minha segunda espada favorita precisa ser consertada. Procurei no campo perto do cassino e não encontrei nada apropriado. Preciso de metal de qualidade especializada! Vi uma armadura feita de um metal incrível, então sei que deve existir em algum lugar desta terra...\""
