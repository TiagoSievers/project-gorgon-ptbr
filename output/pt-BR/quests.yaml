"So anyway, I need you to kill wasps, and you can take your pick of reasons": "for safety, or just to help me make more honey.\": \"Quando a noite chega, vespas cegantes aparecem. Faz com que as abelhas se escondam. De qualquer forma, as abelhas preferem a luz solar, mas se não houvesse tantas vespas, acho que elas passariam mais ou menos uma hora trabalhando todos os dias."
"So Borghild has hundreds of buried dead, right? But no! Actually there are <i>thousands</i> of people buried here. When the older bones collapsed into dust, people would just reuse the old caskets. Some of those caskets are 500 years old and date back to the second dwarven control of Borghild. You know what that means: yes! Some of those tombs have dwarven preservative runes! Isn't it exciting?! If you got me some, I would be so happy.": "Então Borghild tem centenas de mortos enterrados, certo? Mas não! Na verdade, há <i>milhares</i> de pessoas enterradas aqui. Quando os ossos mais antigos se transformavam em pó, as pessoas simplesmente reutilizavam os caixões antigos. Alguns desses caixões têm 500 anos e datam do segundo controle anão de Borghild. Você sabe o que isso significa: sim! Algumas dessas tumbas têm runas preservativas anãs! Não é emocionante?! Se você me desse um pouco, eu ficaria muito feliz."
"So can you get me some of this lemon chiffon dye? Firaki said some mantis in Serbule sells the recipe, right? How many mantises can there be?

Do this for me and I'll teach you how to make your own buckles.": "Então, você pode me trazer um pouco dessa tintura de chiffon limão? Firaki disse que algum louva-a-deus em Serbule vende a receita, certo? Quantos louva-a-deus pode haver?

Faça isso por mim e eu te ensinarei como fazer suas próprias fivelas."
"So Durstin's trying to put the book back together, huh? I guess it's part of the healing process.

Yeah, Durstin really messed up! His wife was on her deathbed and he went and slept with her best friend. He was so ashamed. His wife forgave him before she died, though. And I guess he's forgiven himself now, too. Let me get those pages for ya.": "Então Durstin está tentando recompor o livro, hein? Acho que faz parte do processo de cura.

Sim, Durstin realmente estragou tudo! Sua esposa estava no leito de morte e ele foi dormir com a melhor amiga dela. Ele estava tão envergonhado. Sua esposa o perdoou antes de morrer. E acho que ele também se perdoou agora. Deixe-me pegar essas páginas para você."
"So far as I can tell, these are all standard and unrelated poisons. I am by no means an alchemical expert, so I will send these back to Statehelm for further analysis. Thank you for your assistance in this investigation.": "Pelo que posso dizer, todos esses são venenos padrão e não relacionados. Não sou de forma alguma um especialista em alquimia, por isso vou enviá-los de volta a Statehelm para análise mais aprofundada. Obrigado por sua ajuda nesta investigação."
"So here's the thing": "Sarina used to live there, alone, until goblins kidnapped her in the basement one day. She says she's never going anywhere near there again. But her clothes are there, and she's stretching out all my blouses! Can you go find her stuff?\": \"Quando o Conselho estava planejando a nova cidade que nunca aconteceu aqui, eles construíram uma casa modelo para tentar atrair colonos. É logo depois daquela colina ali."
"So here's the thing: nature takes care of itself, usually. But when fifty werewolves show up, not so much. The prey is so abundant that they're mating like crazy. Let's try to work smarter: try killing a bunch of deer so they can't eat 'em. That's smart, right? Or is it stupid? Hmm.": "Então é o seguinte: a natureza geralmente cuida de si mesma. Mas quando cinquenta lobisomens aparecem, nem tanto. A presa é tão abundante que eles estão acasalando loucamente. Vamos tentar trabalhar de maneira mais inteligente: tente matar um bando de cervos para que eles não possam comê-los. Isso é inteligente, certo? Ou é estúpido? Hum."
"So how about just granting living necromancers eternal life? Nope": "Kajich says all living things must fear the grave. So here we are, mopping up small problems instead of dealing with the fundamental issues.\": \"<i>Zhia Lian:</i> Bom trabalho. Veja, é por isso que acho que deixar os necromantes viverem foi um erro. Sempre que um necromante mortal morre, suas criações mortas-vivas podem se libertar e, eventualmente, algumas se tornam superpoderosas. Se todos os necromantes fossem liches, não teríamos esse problema! Mas não, não podemos mudar a natureza da necromancia porque Harukita diz que “a vida é uma fonte preciosa de ódio”."
"So I heard the latest thing is these enchanted arrowheads that curse your target. Sounds great, right? But I'm kind of out of my depth here. I think I need something called \"Crossing Oil\", though. Got any of that?": "Ouvi dizer que a última novidade são essas pontas de flecha encantadas que amaldiçoam seu alvo. Parece ótimo, certo? Mas estou meio perdido aqui. Acho que preciso de algo chamado \"Crossing Oil\". Tem alguma coisa disso?"
"So I overheard the elven seer talking about nature elementals. She says they only form when certain types of magic erupt. And she's never seen this many spontaneously appear before. So there's something bad going on down beneath town... but that's not a \"today\" problem. That's a \"some other day\" problem. Here's something I got for ya.": "Então ouvi o vidente élfico falando sobre os elementais da natureza. Ela diz que eles só se formam quando certos tipos de magia surgem. E ela nunca viu tantos aparecerem espontaneamente antes. Portanto, há algo de ruim acontecendo nos arredores da cidade... mas isso não é um problema de \"hoje\". Esse é um problema de \"outro dia\". Aqui está algo que trouxe para você."
"So I see you didn't die from the necromancy blasts. I guess that means they aren't TOO dangerous! How painful would you consider their blasts, on a scale of zero to 60?

Hmm. I see. Well that experience may be a fluke. I have some more tests in mind... and here is your reward! Good monster!": "Então vejo que você não morreu por causa das explosões de necromancia. Acho que isso significa que eles não são MUITO perigosos! Quão dolorosas você consideraria as explosões, em uma escala de zero a 60?

Hum. Eu vejo. Bem, essa experiência pode ser um acaso. Tenho mais alguns testes em mente... e aqui está sua recompensa! Bom monstro!"
"So I see you've delivered an N core, still chargable; a size 4 golem claw, used; and what about the... oh, there it is, the programmable counterweight! You've done well. Here is your payment.

I could use help with one other bit of this little project, though. Whenever you next have time to do me a favor.": "Vejo que você entregou um núcleo N, ainda carregável; uma garra de golem tamanho 4, usada; e quanto ao... ah, aí está, o contrapeso programável! Você se saiu bem. Aqui está o seu pagamento.

Eu poderia usar ajuda com outra parte deste pequeno projeto, no entanto. Da próxima vez que tiver tempo, faça-me um favor."
"So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\": \"Você tem muitos amigos, certo? Preciso da sua ajuda rápido ou não conseguirei. Quando a lua estava nova, procurei Talerra para saber para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual": "não consigo sentir esperança durante um ano inteiro."
"So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\\\"\": \"Percy Evans em Eltibule disse": "\\\"Você tem muitos amigos, certo? Preciso de sua ajuda rápido ou não conseguirei. Quando a lua era nova, chamei Talerra para descobrir para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não posso ter esperança por um ano inteiro."
"So I was enchanting Ultashk's boots, and he mentioned that they keep slipping around on his foot. This is a common goblin problem because our armor is crafted by slaves with low morale. But I think I can fix it! I just need some ranalan flesh! You know, the frog people? They're super rubbery and gross. I think I could dry out their tongues and use them as foot padding. Can you get some for me?": "Então eu estava encantando as botas de Ultashk e ele mencionou que elas ficavam escorregando em seu pé. Este é um problema comum dos goblins porque nossa armadura é feita por escravos com moral baixo. Mas acho que posso consertar isso! Eu só preciso de um pouco de carne de ranalan! Você sabe, o povo sapo? Eles são super emborrachados e nojentos. Acho que poderia secar suas línguas e usá-las como protetor para os pés. Você pode pegar um pouco para mim?"
"So is Chaf cool? He's not going to get us all killed by a whimsical god? Good! That's a huge relief. Thank you!": "Então Chaf é legal? Ele não vai fazer com que todos nós morramos por um deus caprichoso? Bom! Isso é um grande alívio. Obrigado!"
"So it was true about the steak. I think I know what's going on. Thank you for your efforts! If you have more time, you could stop by this evening and help me investigate this gristle further.

</i>[New Hang Out Available.]</i>": "Então era verdade sobre o bife. Acho que sei o que está acontecendo. Obrigado por seus esforços! Se você tiver mais tempo, pode passar por aqui esta noite e me ajudar a investigar mais detalhadamente essa cartilagem.

</i>[Novo Hang Out disponível.]</i>"
"So much for dwarves being great miners. I need a little bit of paladium, and you'd think with all these idiot dwarves around that'd be easy. Nope. Not easy. Are you any better than a dwarf? I just need a few chunks! I'll pay well!": "Tanto para os anões serem grandes mineiros. Preciso de um pouco de paladium, e você pensaria que com todos esses anões idiotas por aí isso seria fácil. Não. Não é fácil. Você é melhor que um anão? Só preciso de alguns pedaços! Pagarei bem!"
"So much wool! And so warm! You are a kind soul to part with this.": "Tanta lã! E tão quente! Você é uma alma gentil por se separar disso."
"So my masterpiece is almost done. I just need a better color for the stripes on the tiger. I need Firaki's advice. She's an expert on colors -- if anybody can figure out what color I need for my masterpiece, it's her. She lives in Amulna, a little town in the Ilmari desert. Can you go ask her?": "Então minha obra-prima está quase pronta. Só preciso de uma cor melhor para as listras do tigre. Preciso do conselho de Firaki. Ela é uma especialista em cores – se alguém consegue descobrir de que cor preciso para minha obra-prima, é ela. Ela mora em Amulna, uma pequena cidade no deserto de Ilmari. Você pode perguntar a ela?"
"So NONE of the snails exploded into glowing goo? Are you sure you did it right? Hmm... maybe they're undead snails! No, not even the ratkin would eat undead meat... well, I have no idea why the snails are so big. But I suppose that's only partially your fault, so here is your shiny reward.": "Então NENHUM dos caracóis explodiu em uma gosma brilhante? Tem certeza de que fez certo? Hmm... talvez sejam caracóis mortos-vivos! Não, nem mesmo os ratkin comeriam carne de morto-vivo... bem, não tenho ideia de por que os caracóis são tão grandes. Mas suponho que isso seja apenas parcialmente culpa sua, então aqui está sua brilhante recompensa."
"So none of the trees were planted in the past decade? But the ratkin have only been here for a few years! Which means... the ratkin didn't plant those tree monsters!

Wait, I've got it! They're mutated trees... which means they used to be regular trees. You see, there used to be nice normal trees in Ilmari, but when it turned into a desert, these trees must have mutated, and then they climbed down here to escape the blistering sun. It all makes sense now. Good job! For that, you get a shiny!": "Então nenhuma das árvores foi plantada na última década? Mas os ratkin só estão aqui há alguns anos! O que significa... que os ratkin não plantaram aquelas árvores monstruosas!

Espere, entendi! São árvores mutantes... o que significa que costumavam ser árvores normais. Veja bem, costumava haver belas árvores normais em Ilmari, mas quando se transformou em um deserto, essas árvores devem ter sofrido mutação e então desceram até aqui para escapar do sol escaldante. Tudo faz sentido agora. Bom trabalho! Por isso, você ganha um brilho!"
"So Sourgum finally wants to talk, huh? Except he sent you to do the talking.

<i>[Tessa sighs.]</i>

I knew he had the hots for me before. And if he'd made a pass at me when I was a guy I would have taken him up on it. But now, I don't know what he's feeling. And I don't think he does either. Is he attracted? Disgusted? Both?

All I know is that he abandoned me when I needed a friend the most. I know it was traumatizing to him, but think about how I felt!

I'll get over it, I think. But right now, I'm going through my own trauma and I can't help him with his. Tell him I love him and he's a shit friend and he should leave me alone. When I'm able to, I'll come talk to him.": "Então Sourgum finalmente quer conversar, hein? Exceto que ele enviou você para falar.

<i>[Tessa suspira.]</i>

Eu sabia que ele tinha tesão por mim antes. E se ele tivesse me atacado quando eu era um cara, eu teria aceitado. Mas agora não sei o que ele está sentindo. E acho que ele também não. Ele está atraído? Enojado? Ambos?

Tudo que sei é que ele me abandonou quando eu mais precisei de um amigo. Eu sei que foi traumatizante para ele, mas pense em como me senti!

Vou superar isso, eu acho. Mas agora estou passando pelo meu próprio trauma e não posso ajudá-lo com o dele. Diga a ele que eu o amo e que ele é um amigo de merda e que deveria me deixar em paz. Quando eu puder, irei falar com ele."
"So that fairy over there -- yeah, that one, Pegast. He came over and asked for my help. Finally, recognition of my expertise! But did he want help getting fit and healthy? Nope. He just wanted explosive mushrooms. I gave him what I had, but he still needs more. So now I have to go foraging for this guy.

Hey, you look like you could use some exercise... you ready for a jog into the wilds? Great! These are very tricky mushrooms to pick, so be careful!": "Então aquela fada ali – sim, aquela, Pegast. Ele veio e pediu minha ajuda. Por fim, reconhecimento da minha expertise! Mas ele queria ajuda para ficar em forma e saudável? Não. Ele só queria cogumelos explosivos. Dei a ele o que tinha, mas ele ainda precisa de mais. Então agora eu tenho que procurar esse cara.

Ei, parece que você precisa de algum exercício... está pronto para correr pela natureza? Ótimo! Estes são cogumelos muito difíceis de colher, por isso tome cuidado!"
"So that last cheese, the 'cheshire', turned out to be slightly too bitter, so it doesn't go well with wine. Look, I don't fuckin' know, it's all just cheese ta me. But I need a different one. A 'gloucester'. It's supposed to be better, accordin' to my cousin that runs a stall down the hall. Ya got any of that?": "Então aquele último queijo, o ‘cheshire’, ficou um pouco amargo demais, então não combina bem com vinho. Olha, eu não sei, é tudo só queijo para mim. Mas preciso de outro. Um 'Gloucester'. Era para ser melhor, de acordo com meu primo que tem uma barraca no fim do corredor. Você tem alguma coisa disso?"
"So that weasely fox finally decides to pay me, huh? Hold it... I can tell by the weight that there's not enough money here! This is only half the money! And Tangle has the balls to include a new list of stuff he needs?! Tell that deadbeat dog that I'm not buying him anything more until I get my cash. I already give the Wardens a 50% discount. That means I already lose money on every sale! Does he want to ruin me? I mean fuck me, I'm a businesswolf, not a charity!": "Então aquela raposa maluca finalmente decidiu me pagar, hein? Espere... pelo peso posso dizer que aqui não tem dinheiro suficiente! Isso é apenas metade do dinheiro! E Tangle tem coragem de incluir uma nova lista de coisas que ele precisa?! Diga àquele cachorro caloteiro que não vou comprar mais nada para ele até receber meu dinheiro. Já dou aos Guardiões um desconto de 50%. Isso significa que já perco dinheiro em cada venda! Ele quer me arruinar? Quero dizer, foda-se, sou um lobo de negócios, não uma instituição de caridade!"
"So the drug you found out there, that Telka's Tits or whatever... it's garbage. Only works on rakkies! Most worthless drug since I got my hands on 'bounceweed'. But there's good news: the stuff is made from the silk of the rare giant sand worm, and we think other, better drugs could be made from the same stuff. And I have a lead on a cache infested with 'em! If we're lucky, you can get some samples of their silk while you're getting my xedrite.

Before you leave, go see if the Sand Seer has any advice for ya on Sand Worm killin'. Or just take my advice: use archery. But no, no, the elf woman's gotta make it more complicated than that!": "Então a droga que você descobriu por aí, aquela Telka's Tits ou algo assim... é lixo. Só funciona em rakkies! A droga mais inútil desde que coloquei as mãos na 'bounceweed'. Mas há boas notícias: o material é feito da seda do raro verme gigante da areia, e achamos que outros medicamentos melhores poderiam ser feitos a partir do mesmo material. E tenho uma pista sobre um esconderijo infestado com eles! Se tivermos sorte, você poderá conseguir algumas amostras da seda deles enquanto compra meu xedrite.

Antes de sair, vá ver se o Sand Seer tem algum conselho para você sobre como matar o Sand Worm. Ou apenas siga meu conselho: use arco e flecha. Mas não, não, a elfa tem que tornar tudo mais complicado do que isso!"
"So there <i>was</i> a higher-order mummy in the cave! That's pretty scary. Where one mummy gains free will, it's only a matter of time before more start sparking to life. We still have a horrible mummy pit back home because of that. Can't get rid of the damned things!

I'll make a full report when I get back New Aufghel... not that they'll be able to do anything about this cave! What with the war and all. So anything you can do to help is appreciated.": "Então <i>havia</i> uma múmia de nível superior na caverna! Isso é muito assustador. Quando uma múmia ganha livre arbítrio, é apenas uma questão de tempo até que outras comecem a ganhar vida. Ainda temos um poço de múmia horrível em casa por causa disso. Não consigo me livrar das malditas coisas!

Farei um relatório completo quando voltar a New Aufghel... não que eles possam fazer alguma coisa a respeito desta caverna! Com a guerra e tudo mais. Portanto, qualquer coisa que você possa fazer para ajudar será apreciada."
"So there were snakes in there after all? I'm glad to hear that. I thought Kella was lying to me, and I couldn't figure out why... but I guess she just doesn't like snakes! I'm glad you aren't as squeamish. Here's your pay.": "Então, afinal, havia cobras lá? Fico feliz em ouvir isso. Achei que Kella estava mentindo para mim e não consegui entender por quê... mas acho que ela simplesmente não gosta de cobras! Estou feliz que você não seja tão melindroso. Aqui está o seu pagamento."
"So there's some new kind of nightmare spiders? That's just great. This job just keeps getting harder!

But you're definitely not part of the problem. You're part of the solution! Good job!": "Então há algum novo tipo de aranha pesadelo? Isso é ótimo. Este trabalho está cada vez mais difícil!

Mas você definitivamente não faz parte do problema. Você faz parte da solução! Bom trabalho!"
"So they fought back? Well, damn. That was definitely the likely outcome, but I try to be optimistic! I'll write that down in my notebooks. Thank you.": "Então eles reagiram? Bem, droga. Esse foi definitivamente o resultado provável, mas tento ser otimista! Vou anotar isso em meus cadernos. Obrigado."
"So this is the infamous groxmax mushroom. Orcish alchemists say these inedible mushrooms have powerful alchemical uses... but don't worry. Orcish alchemists are notoriously sloppy and lazy, so I'll do my own experiments. Here, a bounty from the Aufghel Naturist Society.": "Então este é o infame cogumelo groxmax. Os alquimistas orcs dizem que esses cogumelos não comestíveis têm usos alquímicos poderosos... mas não se preocupe. Os alquimistas orcs são notoriamente desleixados e preguiçosos, então farei meus próprios experimentos. Aqui, uma recompensa da Sociedade Naturista Aufghel."
"So we accidentally summoned a portal to an area infested with dinosaurs. And now this tomb is crawling with them! I've cleared out a bunch from this area, but can you hunt down some more?": "Então invocamos acidentalmente um portal para uma área infestada de dinossauros. E agora esta tumba está repleta deles! Eu limpei um monte desta área, mas você pode caçar mais alguns?"
"So we just kept trying to find cures for him, because what else could we do? Eventually Rick calmed down about wanting to die, which was nice, but he still really wanted to not be a mirror. We tried all kinds of crazy stuff": "talked to oracles, begged other gods for miracles, anything we could think of, but nothing worked."
"So Westley wants to stay an elf? Well, good for him! He was pretty miserable as a halfie. So I guess he won't be showing up for the party...": "Então Westley quer continuar sendo um elfo? Bem, bom para ele! Ele estava muito infeliz quando era halfie. Então acho que ele não vai aparecer na festa..."
"So ya killed Fluffy? Good! Stupid thing hit me with a rock the size of my head. I coulda died in the snow! I swore revenge, and thankfully you revenged me, plus I can make a comb outta this. A great day's work!": "Então você matou Fluffy? Bom! A coisa estúpida me atingiu com uma pedra do tamanho da minha cabeça. Eu poderia ter morrido na neve! Jurei vingança e, felizmente, você me vingou, além disso, posso fazer um pente com isso. Um ótimo dia de trabalho!"
"So yeah, thanks for coming. I heard about this from that elf seer across town: part of the desert is coated in giant spiders that are, like, mated with tornados? I don't understand it, but wherever the spiders walk, the tornados go too. And the elf says that they've come topside to lay their eggs in the wind to scatter far and wide. That's not good.

I've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.": "Então, sim, obrigado por ter vindo. Eu ouvi sobre isso daquele elfo vidente do outro lado da cidade: parte do deserto é coberta por aranhas gigantes que estão, tipo, acasaladas com tornados? Não entendo, mas onde quer que as aranhas andem, os tornados também vão. E o elfo diz que eles vieram para cima para depositar seus ovos ao vento e espalhá-los por toda parte. Isso não é bom.

Estive matando eles a manhã inteira, mas sobrou bastante para você! Garras e presas não funcionam muito bem, mas caem com alguns raios. Vá para sudeste, você os ouvirá antes de vê-los."
"So you calculated the location of semiprecious stones and then dug them up out of the ground? Nice! And see? Not boring at all, right? Hard work is its own reward!

No but really, here's a real reward.": "Então você calculou a localização das pedras semipreciosas e depois as desenterrou do solo? Legal! E viu? Não é nada chato, certo? O trabalho duro é sua própria recompensa!

Não, mas sério, aqui está uma recompensa real."
"So you know me, how I love magic rings? I splurged on a doozy that just came in from Statehelm! But it needs to be \"tempered in the blood of nightmares.\" What the hell is that supposed to mean? Can you get me some nightmare blood, or guts, or whatever?": "Então você me conhece, como eu adoro anéis mágicos? Eu esbanjei em um doozy que acabou de chegar de Statehelm! Mas precisa ser “temperado com o sangue dos pesadelos”. O que diabos isso quer dizer? Você pode me conseguir um pouco de sangue de pesadelo, ou tripas, ou algo assim?"
"So you see the jewelry was sold to an orc who trades such things amongst his kind. His name is Throgg and he lives  in a camp in Povus. Can you go and retrieve my stolen jewelry before he gets a chance to resell it?\\\"\": \"Elune, em Statehelm, disse": "\\\"Como a polícia é completamente inútil, estou procurando pistas sobre minhas joias roubadas. E tenho uma pista para você!... Você <i>vai</i> me ajudar, certo? É tão importante!"
"So you were able to talk to the mushroom man? And he showed you how to teleport?! I knew it! I knew they were a transit system! Oh this is huge news! You've gotta hang out here and fill me in on the details!

Here's a little cash incentive! But if you let me in on the secret, I'll teach you my personal secret mushroom-farming techniques in exchange.": "Então você conseguiu falar com o homem cogumelo? E ele te mostrou como se teletransportar?! Eu sabia! Eu sabia que eles eram um sistema de trânsito! Ah, isso é uma grande notícia! Você tem que ficar aqui e me contar os detalhes!

Aqui está um pequeno incentivo em dinheiro! Mas se você me contar o segredo, em troca lhe ensinarei minhas técnicas pessoais secretas de cultivo de cogumelos."
"So you're all settled in with the Wardens now, huh? I knew you'd like being a Warden! I mean, the perks are pretty great. Bounceweed doesn't do much for pigs, but my Warden powers let me FLY! Very briefly. By the way, make sure to land safely before the spell wears off.

Hmm? Oh, yeah, I'm still active! I'm just... focusing on Sun Vale right now. There's lots of talking animals right here, you know!": "Então vocês estão todos acomodados com os Diretores agora, hein? Eu sabia que você gostaria de ser um Diretor! Quer dizer, as vantagens são ótimas. Bounceweed não faz muito pelos porcos, mas meus poderes de Diretor me permitem VOAR! Muito brevemente. A propósito, certifique-se de pousar com segurança antes que o feitiço acabe.

Hum? Ah, sim, ainda estou ativo! Estou apenas... focando em Sun Vale agora. Há muitos animais falantes aqui, você sabe!"
"So your skirmish was successful? Very good. They may still rise up, but I have confidence that you and your allies will be able to handle them if they do. It seems your services might be appreciated in the Vidaria demon efforts as well. You should seek out one of the army's leaders there.": "Então sua batalha foi bem-sucedida? Muito bom. Eles ainda podem se rebelar, mas tenho confiança de que você e seus aliados serão capazes de lidar com eles se o fizerem. Parece que seus serviços também podem ser apreciados nos esforços do demônio Vidaria. Você deveria procurar um dos líderes do exército lá."
"So, do you have those filleted grapefish for me yet?": "Então, você já tem aqueles filés de toranja para mim?"
"So, have you caught Cheese Fever yet? Me too! I'm glad you like the hobby.": "Então, você já pegou a Febre do Queijo? Eu também! Que bom que você gostou do hobby."
"So, how much mortal contraband did you find in the chests? Hmm, not much? That's another theory busted. We had hoped perhaps they were just plundering this world, but I think not. Their plans must be more problematic than that!

But that's an issue for another day. Here is your payment. Spend it well.": "Então, quanto contrabando mortal você encontrou nos baús? Hum, não muito? Essa é outra teoria quebrada. Esperávamos que talvez eles estivessem apenas saqueando este mundo, mas acho que não. Os planos deles devem ser mais problemáticos que isso!

Mas isso é um problema para outro dia. Aqui está o seu pagamento. Gaste bem."
"So, um, our buddy Azalak the mantis owes me some cranium powder. I just haven't gotten around to picking it up. Can you get that for me? Oh, but, uh, don't tell him you're getting it for me. Don't mention me at all! Just buy it from him. I'll pay you back! Eventually.

You might have to get on his good side before he's willing to sell it to you. Just be nice to him, he's a great guy.": "Então, hum, nosso amigo Azalak, o louva-a-deus, me deve um pouco de pó de crânio. Só não tive tempo de pegá-lo. Você pode conseguir isso para mim? Ah, mas, uh, não diga a ele que você vai comprar para mim. Não me mencione de jeito nenhum! Basta comprar dele. Eu vou te pagar de volta! Eventualmente.

Talvez você precise ficar do lado dele antes que ele esteja disposto a vendê-lo para você. Apenas seja legal com ele, ele é um cara legal."
"So, was it funny? ... Well, you're biased. I'm sure it was great fun. Stop being such a whiner.": "Então, foi engraçado? ... Bem, você é tendencioso. Tenho certeza que foi muito divertido. Pare de ser tão chorão."
"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Amazing Orcish Plate suit and I will see what I can do to help you advance your craft!": "Então, você quer ser um armeiro, não é? Vamos às coisas boas agora! Forje e traga-me um traje completo de placa de orc incrível e verei o que posso fazer para ajudá-lo a avançar em seu ofício!"
"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Amazing Orcish Plate suit and I will see what I can do to help you advance your craft!  

": "Então, você quer ser um armeiro, não é? Vamos às coisas boas agora! Forje e traga-me um traje completo de placa de orc incrível e verei o que posso fazer para ajudá-lo a avançar em seu ofício!"
