"We are considering building a fence along the perimeter of our little town. Nothing too tall, just a way to visually mark the borders. But we need a great many small sticks, all the same size and shape. Hmm. And they should be cedar: I like the smell of cedar. Do you know any humans who might be good with a saw? These hooves are just not made for carpentry.": "Estamos pensando em construir uma cerca ao longo do perímetro da nossa pequena cidade. Nada muito alto, apenas uma forma de marcar visualmente as bordas. Mas precisamos de muitos gravetos pequenos, todos do mesmo tamanho e formato. Hum. E deveriam ser de cedro: gosto do cheiro de cedro. Você conhece algum humano que possa ser bom com uma serra? Esses cascos simplesmente não são feitos para carpintaria."
"We are fully stocked up on supplies now, and it's time to take the fight to the demons! Gather your own troops, and help us cull these endless hordes.": "Estamos totalmente abastecidos de suprimentos agora, e é hora de lutar contra os demônios! Reúna suas próprias tropas e ajude-nos a abater essas hordas intermináveis."
"We are in need of more bows for our hunters. I am low on materials. Can you bring me 10 Quality Hunting Bows? I will share some knowledge with you in return.": "Precisamos de mais arcos para nossos caçadores. Estou com poucos materiais. Você pode me trazer 10 arcos de caça de qualidade? Em troca, compartilharei algum conhecimento com você."
