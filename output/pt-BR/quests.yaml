"Também preciso de algo para inibir minhas lembranças de desespero... faz o Suco durar mais. Uma elfa estúpida me deu algumas garrafas na semana passada, mas disse que não consegue fazer o suficiente para me sustentar. Elfos": "sempre desmaiando quando você precisa deles! Aham... sem ofensa para você e seus amigos, é claro.\""
"Tangle in the Sacred Warden Grotto said, \"Check in on Norbert for me, will you? I know you've met him already in Sun Vale. He's a good pig. Used to run missions with us, but some of his friends died in the big massacre, and he's been a lot more distant since then. Take this stuff to show we still care, that sort of thing.\"": "Emaranhado na Gruta do Guardião Sagrado disse: “Verifique Norbert para mim, sim? Eu sei que você já o conheceu em Sun Vale."
"Tangle in the Sacred Warden Grotto said, \"Ever been to the Ilmari Desert? Well, there's a town in the desert called Amulna. In this town is a wolf. Well, more specifically, he's a werewolf. But he's one of the good ones. He has some great merchant contacts and gets us a lot of supplies. This care package includes some money we owe him.\"": "Emaranhado na Gruta do Guardião Sagrado disse: \"Já esteve no Deserto de Ilmari? Bem, há uma cidade no deserto chamada Amulna. Nesta cidade há um lobo. Bem, mais especificamente, ele é um lobisomem. Mas ele é um dos bons. Ele tem ótimos contatos com comerciantes e nos consegue muitos suprimentos. Este pacote de cuidados inclui algum dinheiro que lhe devemos.\""
"Tangle in the Sacred Warden Grotto said, \"This one's hard. Ever heard of the Gazluk Plateau? Well, Trekker the pig is in the northeast-ish part of the mountains. You'll have to climb up from the valley into the mountains to find him. Bring warm clothes.\"": "Emaranhado na Gruta do Guardião Sagrado disse: \"Este é difícil. Já ouviu falar do Planalto Gazluk? Bem, Trekker, o porco, está na parte nordeste das montanhas. Você terá que subir do vale até as montanhas para encontrá-lo. Traga roupas quentes.\""
"Tangle in the Sacred Warden Grotto said, \"We need to check in on some of our spy network members. These are animals in distant lands that work with us. They aren't all members of the Wardens, but they're entrusted with our secret communication ritual.

Start by checking in with a cow in Eltibule. I don't know her name... she's never given us one. But she says she's the only talking cow in her herd, so... see what you can do. Take this care package to her. It's some stuff she asked for a while back.\"": "Tangle in the Sacred Warden Grotto disse: \"Precisamos verificar alguns dos membros da nossa rede de espionagem. Estes são animais em terras distantes que trabalham conosco. Eles não são todos membros dos Guardiões, mas são encarregados de nosso ritual secreto de comunicação.

Comece fazendo check-in com uma vaca em Eltibule. Não sei o nome dela... ela nunca nos deu um. Mas ela diz que é a única vaca falante do rebanho dela, então... veja o que você pode fazer. Leve este pacote de cuidados para ela. São algumas coisas que ela pediu há algum tempo.\""
