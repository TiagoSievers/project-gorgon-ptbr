"Ever been to the Ilmari Desert? Well, there's a town in the desert called Amulna. In this town is a wolf. Well, more specifically, he's a werewolf. But he's one of the good ones. He has some great merchant contacts and gets us a lot of supplies. This care package includes some money we owe him.": "Já esteve no deserto de Ilmari? Bem, há uma cidade no deserto chamada Amulna. Nesta cidade há um lobo. Bem, mais especificamente, ele é um lobisomem. Mas ele é um dos bons. Ele tem ótimos contatos comerciais e nos fornece muitos suprimentos. Este pacote de cuidados inclui algum dinheiro que lhe devemos."
"Ever killed a rhino? Quite a rush, isn't it?! They're so dangerous! I'm not really in shape to hunt rhinos right now, though... my bow broke. And not coincidentally, the bow uses ivory rhino horn. You probably see where this is going... if you find some, please let me know!": "Já matou um rinoceronte? Muita correria, não é?! Eles são tão perigosos! Mas não estou em condições de caçar rinocerontes agora... meu arco quebrou. E não por coincidência, o arco usa chifre de rinoceronte em marfim. Você provavelmente já percebeu onde isso vai dar... se encontrar algum, por favor me avise!"
"Ever seen a wave of nature elementals? Well they're right here, so take a look outside. They're coming from the west.

I'll stay here and protect the citizens from any that manage to make it to town. In the mean time you can pick off their numbers. Just remember: they hate lightning. You know what to do.": "Já viu uma onda de elementais da natureza? Bem, eles estão bem aqui, então dê uma olhada lá fora. Eles estão vindo do oeste.

Ficarei aqui e protegerei os cidadãos de qualquer um que conseguir chegar à cidade. Enquanto isso, você pode escolher seus números. Lembre-se: eles odeiam raios. Você sabe o que fazer."
"Everybody always gives thoughtful gifts. It's stupid. Go and give people terrible gifts! Ha ha! Find out what they hate and give them that. Hilarious!

<i>[ Tip: use 'Small Talk' to find what NPCs dislike. Not every NPC has strong dislikes, but many of them are just quiet about it -- they won't share their dislikes with you until you reach Friends favor level. ]</i>": "Todo mundo sempre dá presentes atenciosos. É estúpido. Vá e dê presentes terríveis às pessoas! Ha ha! Descubra o que eles odeiam e dê isso a eles. Divertido!

<i>[Dica: use 'Conversa fiada' para descobrir o que os NPCs não gostam. Nem todo NPC tem fortes aversões, mas muitos deles ficam quietos sobre isso - eles não compartilharão suas aversões com você até que você alcance o nível de favor de Amigos. ]</i>"
"Evil Bones": "Ossos do Mal"
"Evil paleontologists are sieging town! Their extraordinary skeleton troops will require teamwork to defeat.

(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Paleontólogos malvados estão sitiando a cidade! Suas extraordinárias tropas esqueléticas exigirão trabalho em equipe para serem derrotadas.

(Para receber uma recompensa, certifique-se de ajudar pessoalmente a derrotar pelo menos um inimigo Elite.)"
"EvilGrass": "Erva Maligna"
"EvilHeart1": "Coração Maligno1"
"EvilHeart2": "Coração Maligno2"
"EvilHeart3": "Coração Maligno3"
"EvilHeart4": "Coração Maligno4"
"EvilHeart5": "Coração Maligno5"
"EvilLungs1": "Pulmões do Mal1"
"EvilLungs2": "Pulmões do Mal2"
"EvilLungs3": "Pulmões do Mal3"
"EvilPrism": "Prisma do Mal"
"EvilPumpkin": "Abóbora Malvada"
"Ew! Haha, that's the stuff all right! It smells even worse than I remember! Chemistry's not exactly my strong suit, but fortunately my betrothed over there is an expert, so I'll get him to make me some icy bolts from this!": "Eca! Haha, é isso mesmo! Cheira ainda pior do que eu me lembro! Química não é exatamente meu forte, mas felizmente meu noivo ali é um especialista, então vou pedir para ele fazer alguns raios gelados com isso!"
"Ew, ha ha! Eels are so gross! But Norbert can cook them and then they taste good. You did good!

Here, you can eat these. Norbert says they're too scrawny to cook, but they look okay to me.": "Eca, ha ha! As enguias são tão nojentas! Mas Norbert pode cozinhá-los e eles ficam gostosos. Você fez bem!

Aqui você pode comer isso. Norbert diz que eles são magros demais para cozinhar, mas para mim parecem bons."
"Ew. Ew! What?! I am an artist! You expect me to fillet my own fish?! Take these away and fillet them for me. Please.

You do know how, right? Because I'm certainly not going to teach you. And that lunk Durstin won't either. I bet Fainor in Serbule town would do it, though. Go pester him. Here's some coins in case he's in one of his moods and tries to charge you for the lesson.": "Eca. Eca! O que?! Eu sou um artista! Você espera que eu corte meu próprio peixe em filés?! Leve-os embora e corte-os em filés para mim. Por favor.

Você sabe como, certo? Porque certamente não vou te ensinar. E aquele idiota do Durstin também não. Mas aposto que Fainor, na cidade de Serbule, faria isso. Vá importuná-lo. Aqui estão algumas moedas, caso ele esteja de mau humor e tente cobrar pela aula."
"Ewww, so gross! Hahaha! Good job. Here. These shoes are too big for goblins: no amount of padding will save them! But they might fit you.": "Eca, que nojento! Hahaha! Bom trabalho. Aqui. Esses sapatos são grandes demais para goblins: nenhum acolchoamento irá salvá-los! Mas eles podem servir para você."
"Exalto the Extractor": "Exalto o Extrator"
"Exalto the Extractor in Statehelm said, \"I need more human teeth. Human dentristry is demanding: the teeth must be in good condition!\"": "Exalto, o Extrator, em Statehelm, disse: \"Preciso de mais dentes humanos. A odontologia humana é exigente: os dentes devem estar em boas condições!\""
"Exalto the Extractor in Statehelm said, \"I require human teeth. They must be in excellent condition!\"": "Exalto, o Extrator em Statehelm, disse: \"Preciso de dentes humanos. Eles devem estar em excelentes condições!\""
"Examine Female Players": "Examine as jogadoras"
"Examine Male Players": "Examine os jogadores masculinos"
"Excellent craftsmanship! I'll buy these!": "Excelente artesanato! Vou comprar isso!"
"Excellent geologizing. I'll examine these in further detail when I'm back home.": "Excelente geologização. Examinarei isso com mais detalhes quando voltar para casa."
"Excellent quality! I'll buy these!": "Excelente qualidade! Vou comprar isso!"
"Excellent work! Here's the recipe. Did we get everything? Hmm, yep, looks like it!

That's all the food preparation we need. Everything else can be handled by the bug-men. Thanks for all your help!": "Excelente trabalho! Aqui está a receita. Conseguimos tudo? Hmm, sim, parece!

Essa é toda a preparação de alimentos que precisamos. Todo o resto pode ser tratado pelos homens-insetos. Obrigado por toda sua ajuda!"
"Excellent work! Many of our troops out there have focused on fighting demons, and these other crazy beasts prey on their lack of experience. You've saved lives today!": "Excelente trabalho! Muitas de nossas tropas por aí se concentraram em lutar contra demônios, e essas outras feras malucas se aproveitam de sua falta de experiência. Você salvou vidas hoje!"
"Excellent work. And perhaps the citrus smell will hide some of the repugnant pine odor, too!": "Excelente trabalho. E talvez o cheiro cítrico esconda um pouco do repugnante odor de pinho também!"
"Excellent work. Come back later; I'm sure we'll need your services again.": "Excelente trabalho. Volte mais tarde; Tenho certeza de que precisaremos de seus serviços novamente."
"Excellent work. Excellent work! With these supplies, we have a fighting chance after all. Your assistance will not soon be forgotten, not by me nor any of my troops.": "Excelente trabalho. Excelente trabalho! Afinal, com esses suprimentos, temos uma chance de lutar. Sua ajuda não será esquecida tão cedo, nem por mim nem por nenhuma de minhas tropas."
"Excellent work. Here's some more prisms and some more money. Come back in a week and I'll probably need more!

Oh, and by the way, I've learned some more Transmutation techniques. When you're ready, come see me for more training.": "Excelente trabalho. Aqui estão mais alguns prismas e mais algum dinheiro. Volte em uma semana e provavelmente precisarei de mais!

Ah, e por falar nisso, aprendi mais algumas técnicas de transmutação. Quando estiver pronto, venha me ver para mais treinamento."
"Excellent work. I'm sure you've noticed that your skill in other areas of art are improving through this practice. Everything is connected.": "Excelente trabalho. Tenho certeza que você notou que suas habilidades em outras áreas da arte estão melhorando com essa prática. Tudo está conectado."
"Excellent work. Most of the droaches are now defeated.

You have stymied the schemes of a foul and perverse god who I shall not name. Trust that your actions here were worth the price. Go now with Dreva's blessing.": "Excelente trabalho. A maioria das baratas agora está derrotada.

Você frustrou os esquemas de um deus imundo e perverso cujo nome não mencionarei. Confie que suas ações aqui valeram o preço. Vá agora com a bênção de Dreva."
"Excellent work. Now the festivities can begin! I'll let everyone know it's time to bring their gifts. And I've left your first gift under the tree already.": "Excelente trabalho. Agora as festividades podem começar! Avisarei a todos que é hora de trazer seus presentes. E já deixei seu primeiro presente debaixo da árvore."
"Excellent work. Of course, more droach eggs will hatch in time, but we cannot expect to win the war in a day. You have won a battle and that will suffice.": "Excelente trabalho. É claro que mais ovos de baratas eclodirão com o tempo, mas não podemos esperar vencer a guerra num dia. Você venceu uma batalha e isso será suficiente."
"Excellent work. The fewer rabid deer, the less we have to worry about it spreading to other creatures.": "Excelente trabalho. Quanto menos cervos raivosos, menos teremos que nos preocupar com a possibilidade de que eles se espalhem para outras criaturas."
"Excellent work. The fewer rabid deer, the less we have to worry about it spreading to other creatures. ": "Excelente trabalho. Quanto menos cervos raivosos, menos teremos que nos preocupar com a possibilidade de que eles se espalhem para outras criaturas."
"Excellent work. There will be more gardeners when the next clutch hatches, but we slowed them down for a little while.": "Excelente trabalho. Haverá mais jardineiros quando a próxima ninhada eclodir, mas nós os desaceleramos por um tempo."
"Excellent work. Unfortunately I'm sure we'll need more cleaning as soon as next week! The magical solvent doesn't seem to be able to remove certain pests and problems from the waterway.

I'd bother the Council about it, but... Well, it's good that we're able to be self-reliant about this.

Take this with my thanks. If you have time to do more sewer work, there are more specialized problems that need attention.": "Excelente trabalho. Infelizmente, tenho certeza de que precisaremos de mais limpeza já na próxima semana! O solvente mágico não parece ser capaz de remover certas pragas e problemas do curso de água.

Eu incomodaria o Conselho com isso, mas... Bem, é bom que possamos ser autossuficientes quanto a isso.

Leve isso com meus agradecimentos. Se você tiver tempo para fazer mais trabalhos de esgoto, há problemas mais especializados que precisam de atenção."
"Excellent work. We have created a tree with many sights and smells. I find it... engaging, if not attractive. Hopefully it will please Hogan, but even if not, he gave ME the authority and so he must accept MY decisions. I declare the tree complete; we shall commence gifting immediately.": "Excelente trabalho. Criamos uma árvore com muitas paisagens e cheiros. Acho isso... envolvente, se não atraente. Espero que isso agrade a Hogan, mas mesmo que não, ele ME deu a autoridade e, portanto, deve aceitar as MINHAS decisões. Declaro a árvore completa; começaremos a presentear imediatamente."
"Excellent work. You may have saved lives today.

Come back tomorrow because we'll no doubt need something else!": "Excelente trabalho. Você pode ter salvado vidas hoje.

Volte amanhã porque sem dúvida precisaremos de outra coisa!"
"Excellent! Could you feel their power? Never forget that feeling! Now take these bunny juices so you can bunny up whenever you need to thump somebody's face in! Make sure you seek out my cousins Flopsy in the Kur Mountains and Boop in Gazluk to complete your training if you feel you are ready for more advanced tactics.": "Excelente! Você poderia sentir o poder deles? Nunca se esqueça desse sentimento! Agora pegue esses sucos de coelho para poder se animar sempre que precisar bater na cara de alguém! Certifique-se de procurar meus primos Flopsy nas montanhas Kur e Boop em Gazluk para completar seu treinamento se achar que está pronto para táticas mais avançadas."
"Excellent! Gather your base materials and come see me when you're ready for a ring!": "Excelente! Reúna seus materiais básicos e venha me ver quando estiver pronto para um anel!"
"Excellent! I am pleased! Wait while I prepare the salve.

Yes! I can feel my powers returning! And of course I shall reward you, too, my loyal bloodling.

There. I have unlocked a potent mind-power. Perhaps it is to your... liking.": "Excelente! Estou satisfeito! Espere enquanto preparo a pomada.

Sim! Posso sentir meus poderes retornando! E é claro que recompensarei você também, meu leal sangrento.

Lá. Eu desbloqueei um poderoso poder mental. Talvez seja do seu agrado."
"Excellent! I can study these all day!": "Excelente! Posso estudar isso o dia todo!"
"Excellent! I should have a good feel for it after 10 of these. If you're headed over to Serbule from here, tell my cousin Gisli I said hello! You can't miss him... he's just as handsome as I am!

<i>[You earn 10 favor with Orran the Caravan Leader]</i>

