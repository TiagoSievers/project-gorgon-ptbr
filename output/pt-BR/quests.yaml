"Shiriqa in Statehelm said, \"Hey, you're the one who sold me that bad osslar skull. This is your fault! I performed an absolutely hilarious prank and now Jenny Foster won't speak to me! At all! She gives me the \"silent treatment\", which should definitely be considered a war crime if it isn't already.

Since you did this too, you should help me fix it. Jenny likes tea, so I want you to get her some exotic tropical tea. Make it extra sweet.\"": "Shiriqa em Statehelm disse: \"Ei, foi você quem me vendeu aquele crânio de osslar ruim. A culpa é sua! Eu fiz uma pegadinha absolutamente hilária e agora Jenny Foster não fala comigo! De jeito nenhum! Ela me dá o \"tratamento silencioso\", que definitivamente deveria ser considerado um crime de guerra, se ainda não o for.

Já que você fez isso também, você deveria me ajudar a consertar. Jenny gosta de chá, então quero que você traga um chá tropical exótico para ela. Torne-o ainda mais doce.\""
"Shiriqa in Statehelm said, \"I did the glued-coin gag to Jenny. I stuck them to the table and watched her struggle to pull them off. She was at it for a while and she wasn't laughing at all! So I ran over and stopped her.

I explained everything: how it was your idea, how you're fully to blame, and how I would never, ever, EVER do a prank to her again. Thanks for taking the heat for me!

What? You DID enable the prank. You can't be blameless in this!

Okay, look, I know I screwed up. Social scenarios with mortals are extremely tricky! Can you forgive me? I can't have you as an enemy! You're more terrifying than Jenny! I thought you'd understand!

Calm down, I know how to fix this: my prank fund! You can have it! It's a treasure chest full of precious gems. At least I think it is. I can't open it! But I have a plan on how to get it open. Here's what I need.\"": "Shiriqa, em Statehelm, disse: \"Eu fiz a piada da moeda colada para Jenny. Prendi-os na mesa e observei-a lutar para tirá-los. Ela ficou nisso por um tempo e não estava rindo de jeito nenhum! Então corri e a parei.

Expliquei tudo: como foi ideia sua, como você é totalmente culpado e como eu nunca, jamais, NUNCA faria uma pegadinha com ela novamente. Obrigado por aguentar a pressão por mim!

O quê? Você habilitou a pegadinha. Você não pode ser inocente nisso!

OK, olha, eu sei que estraguei tudo. Cenários sociais com mortais são extremamente complicados! Você pode me perdoar? Não posso ter você como inimigo! Você é mais assustador do que Jenny! Achei que você entenderia!

Calma, eu sei como resolver isso: meu fundo de pegadinhas! Você pode ficar com isso! É um baú cheio de joias preciosas. Pelo menos eu acho que é. Não consigo abrir! Mas tenho um plano sobre como abri-lo. Aqui está o que eu preciso.\""
"Shiriqa in Statehelm said, \"Jenny said that if I want to be friends with her again I have to swear off pranking her <i>forever</i>. She said she doesn't even really like pranks! She was just humoring me! Can you believe the audacity?

Mortals are so unpredictable, it's scary. I don't even know how to deal with this.

Wait: yes I do! I just need to show her the beautiful side of pranks. Can you make or find a pair of glued-together coins? I'll use them for a harmless prank. HARMLESS. I promise! She'll laugh!\"": "Shiriqa em Statehelm disse: \"Jenny disse que se eu quiser ser amiga dela novamente, tenho que jurar que não vou pregar peças nela <i>para sempre</i>. Ela disse que nem gosta de pegadinhas! Ela estava apenas brincando comigo! Dá para acreditar na audácia?

Os mortais são tão imprevisíveis que é assustador. Eu nem sei como lidar com isso.

Espere: sim, eu quero! Só preciso mostrar a ela o lado lindo das pegadinhas. Você consegue fazer ou encontrar um par de moedas coladas? Vou usá-los para uma brincadeira inofensiva. INOFENSIVO. Eu prometo! Ela vai rir!\""
"Shiriqa in Statehelm said, \"Me and Jenny Foster have a prank war going on. You know, the server at the coffee shop? Yeah. She loves pranks! But she's terrified of osslars. Osslars are some kind of demon thing and apparently she had a scary experience with them. So you know what that means!

This will be a prank for the history books of this mortal realm. I'm gonna animate the skull and have it talk to her!\"": "Shiriqa em Statehelm disse: \"Eu e Jenny Foster temos uma guerra de pegadinhas. Você sabe, a garçonete da cafeteria? Sim. Ela adora pegadinhas! Mas ela tem pavor de osslars. Osslars são algum tipo de demônio e aparentemente ela teve uma experiência assustadora com eles. Então você sabe o que isso significa!

Esta será uma brincadeira para os livros de história deste reino mortal. Vou animar a caveira e fazer com que ela fale com ela!\""
"Shirogin in Rahu asked you to confront Ichin the Ice-Master. Ichin has an invitation to the formal execution, and Shirogin wants to know why he didn't get one.": "Shirogin em Rahu pediu para você enfrentar Ichin, o Mestre do Gelo. Ichin tem um convite para a execução formal e Shirogin quer saber por que não conseguiu."
"Shirogin in Rahu said, \"I was afraid of this. Yes, I know why I'm blacklisted. At the last formal execution, I complimented General Tremal on her tail. General Tremal was born here, unlike the oldest generals. Drawing attention to her tail was an insult and an embarrassment to her.

Hm? Oh, no, it wasn't a mistake. General Tremal had given me a backhanded compliment about my clothes, and I was reciprocating. I just didn't realize how far out of my league Tremal is. I'm blacklisted from executions!

I need your help to make amends. I'm going to create the most wondrous gown for the general! I just need to know her favorite color. See if that beggar Three-Eye knows. He's in the dangerous part of town. Once you pass Sergeant Ultaka and are over the bridge, keep left. You'll see him on the porch, most likely.\"": "Shirogin em Rahu disse: \"Eu estava com medo disso. Sim, eu sei por que estou na lista negra. Na última execução formal, elogiei o General Tremal por sua cauda. O General Tremal nasceu aqui, ao contrário dos generais mais antigos. Chamar a atenção para sua cauda foi um insulto e uma vergonha para ela.

Hum? Ah, não, não foi um erro. O General Tremal me fez um elogio indireto sobre minhas roupas, e eu estava retribuindo. Eu simplesmente não percebi o quão fora do meu alcance Tremal está. Estou na lista negra de execuções!

Preciso da sua ajuda para fazer as pazes. Vou criar o vestido mais maravilhoso para o general! Só preciso saber a cor favorita dela. Veja se aquele mendigo Três Olhos sabe. Ele está na parte perigosa da cidade. Depois de passar pelo Sargento Ultaka e passar pela ponte, mantenha-se à esquerda. Você o verá na varanda, provavelmente.\""
"Shirogin in Rahu said, \"This is so frustrating! Where am I going to get aquamarine dye for General Tremal's gown? I checked with my supplier, but she sold all of it to a human named Charles Thompson, who used it all for research! And to make matters worse, this human left weeks ago on a ship bound to Serbule! If you ever find yourself in that backwoods town, maybe you can locate him and get the dye recipe.

I just need three doses of aquamarine dye. This shouldn't be hard!\"": "Shirogin em Rahu disse: \"Isso é tão frustrante! Onde vou conseguir tinta água-marinha para o vestido do General Tremal? Verifiquei com meu fornecedor, mas ela vendeu tudo para um humano chamado Charles Thompson, que usou tudo para pesquisa! E para piorar a situação, esse humano partiu semanas atrás em um navio com destino a Serbule! Se você algum dia se encontrar naquela cidade do sertão, talvez possa localizá-lo e obter a receita da tintura.

Só preciso de três doses de corante água-marinha. Isso não deve ser difícil!\""
"Shirogin in Rahu said, \"While you were taking your time finding the dye I needed, I completed a test-run of General Tremal's gown. It's perfect! Except for the color. So now I need to make another gown in aquamarine... and I've run out of the secret ingredient needed for its protective elements: cockatrice beaks. Can you buy some, or murder some cockatrices and de-beak them? Thank you. Go do it now. This is important!\"": "Shirogin em Rahu disse: \"Enquanto você demorava para encontrar a tinta que eu precisava, concluí um teste do vestido do General Tremal. É perfeito! Exceto pela cor. Então agora preciso fazer outro vestido em água-marinha... e fiquei sem o ingrediente secreto necessário para seus elementos de proteção: bicos de cockatrice. Você pode comprar alguns ou matar alguns cockatrices e tirar o bico deles? Obrigado. Vá fazer isso agora. Isso é importante!\""
