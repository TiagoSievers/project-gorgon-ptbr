"Kimoc said, \"A lot of us like to whittle a lot, so our supply of whittling knives are running low. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Master Whittling Knives to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Kimoc disse: \"Muitos de nós gostamos de talhar muito, então nosso estoque de facas de talhar está acabando. Claro, poderíamos fazê-las nós mesmos, mas não queremos roubar toda a diversão! Se você tivesse a gentileza de me entregar 10 Facas Mestres de Talhar para mim, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em seu ofício em troca de seu problema. \""
"Kimoc said, \"We are low on our diagnostic supplies and need to restock. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Carbon-form Scrutinizer Arrays to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Kimoc disse: \"Estamos com poucos suprimentos de diagnóstico e precisamos reabastecer. Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão! Se você tivesse a gentileza de me entregar 10 matrizes de escrutinadores em forma de carbono, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em sua arte em troca de seu problema. \""
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Autopsy Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Kimoc disse: \"Estamos com poucos suprimentos para melhorar nossas habilidades de anatomia! Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão! Se você tivesse a gentileza de me entregar 10 kits de autópsia, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em seu ofício em troca de seu problema.\""
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Analysis Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Kimoc disse: \"Estamos com poucos suprimentos para melhorar nossas habilidades de anatomia! Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão! Se você tivesse a gentileza de me entregar 10 kits de análise forense, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em sua arte em troca de seu problema.\""
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Inspection Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Kimoc disse: “Estamos com poucos suprimentos para melhorar nossas habilidades de anatomia! Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão!"
"Kinira said, \"Hello! We have been on the road for quite some time, and our on-the-road rations are nearly gone.  We need some good on the go snacks! Bring me 10 Venison Jerky, and maybe I can help you out somehow.\"": "Kinira disse: \"Olá! Já estamos na estrada há algum tempo e nossas rações estão quase acabando. Precisamos de alguns lanches bons para viagem! Traga-me 10 carne seca de veado e talvez eu possa ajudá-lo de alguma forma.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! A casserole would be perfect! Bring me 10 plates of Chicken Casserole, and maybe I can help you out somehow.\"": "Kinira disse: \"Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha ficaram escassos. Se esses caras tiverem que comer beterraba novamente, eles podem se revoltar! Eles precisam de carne! Frango! Uma caçarola seria perfeita! Traga-me 10 pratos de caçarola de frango e talvez eu possa ajudá-lo de alguma forma.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! And something other then beets... maybe some broccoli? Bring me 20 plates of Chicken and Broccoli, and maybe I can help you out somehow.\"": "Kinira disse: \"Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha ficaram escassos. Se esses caras tiverem que comer beterraba novamente, eles podem se revoltar! Eles precisam de carne! Frango! E algo além de beterraba... talvez alguns brócolis? Traga-me 20 pratos de frango e brócolis, e talvez eu possa ajudá-lo de alguma forma.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Fish! I hear the Fae have a great recipe for vexfish! Bring me 20 Vexfish Lettuce Wraps, and maybe I can help you out somehow.\"": "Kinira disse: \"Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha ficaram escassos. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Peixe! Ouvi dizer que os Fae têm uma ótima receita de peixe vex! Traga-me 20 wraps de alface Vexfish e talvez eu possa ajudá-lo de alguma forma.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Pork! I hear the Fae have a great recipe for vexfish! Bring me 40 Evu Mint Pork, and maybe I can help you out somehow.\"": "Kinira disse: \"Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha ficaram escassos. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Carne de porco! Ouvi dizer que os Fae têm uma ótima receita de vexfish! Traga-me 40 Evu Mint Pork, e talvez eu possa ajudá-lo de alguma forma.\""
"Kleave has asked you for some leather strips.": "Kleave pediu algumas tiras de couro."
"Kleave has asked you to slay The Mauler and bring back his claw as proof.": "Kleave pediu para você matar o Mauler e trazer de volta sua garra como prova."
"Kleave in Eltibule said, \"Hogan explained that the tree should be decorated with a number of small orbs. This seems trivial. Please fetch some lumber and I shall carve some balls. Maple is fragrant; we should use that.\"": "Kleave em Eltibule disse: \"Hogan explicou que a árvore deveria ser decorada com uma série de pequenos orbes. Isso parece trivial. Por favor, traga um pouco de madeira e eu esculpirei algumas bolas. O bordo é perfumado; devemos usá-lo.\""
"Kleave in Eltibule said, \"Hogan gave us many complex requirements. Fragrance, sentiment, color, and reflectiveness must all be taken into account. I have it: fish! Shiny, colorful, fragrant, and sentimental ... to me, at least. Fetch fresh grapefish!\"": "Kleave em Eltibule disse: \"Hogan nos deu muitos requisitos complexos. Fragrância, sentimento, cor e refletividade devem ser levados em consideração. Eu tenho: peixe! Brilhante, colorido, perfumado e sentimental... para mim, pelo menos. Traga toranja fresca!\""
"Kleave in Eltibule said, \"The top of the tree must be a beautiful beacon of strength and honor. Kalaba has been working on an appropriately beautiful blade to sit atop the tree. My contribution is to light it on fire with harmless decorative flames. I know a rakshasa recipe for decorative fire, but I need a large amount of fire dust!\"": "Kleave em Eltibule disse: \"O topo da árvore deve ser um lindo farol de força e honra. Kalaba tem trabalhado em uma lâmina apropriadamente bonita para ficar no topo da árvore. Minha contribuição é acendê-la com chamas decorativas inofensivas. Conheço uma receita de rakshasa para fogo decorativo, mas preciso de uma grande quantidade de pó de fogo!\""
"Kleave in Eltibule said, \"We need colorful and shiny decorations. After consulting with Kalaba, I have decided that the best colorful and shiny decorations would be the eyes of fallen foes. However, we should not use the eyes of sentient creatures. Hogan said that the tree should radiate peace. So animal eyes will have to do. Perhaps cat or dinosaur eyes.\"": "Kleave em Eltibule disse: \"Precisamos de decorações coloridas e brilhantes. Depois de consultar Kalaba, decidi que as melhores decorações coloridas e brilhantes seriam os olhos dos inimigos caídos. No entanto, não deveríamos usar os olhos de criaturas sencientes. Hogan disse que a árvore deveria irradiar paz. Portanto, olhos de animais terão que servir. Talvez olhos de gato ou dinossauro.\""
"Kleave wants power potions.": "Kleave quer poções de poder."
"Kleave wants some low-value paintings. Paintings worth less than 50 councils would probably work best.": "Kleave quer algumas pinturas de baixo valor. Pinturas com valor inferior a 50 conselhos provavelmente funcionariam melhor."
