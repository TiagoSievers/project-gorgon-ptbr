"Silvia in Sun Vale said, \"Alien fae creatures are all over Sun Vale! I don't blame you, but you should do your part to help clean this up. Kill fey panthers and bring me their tails as proof!\"": "Silvia em Sun Vale disse: \"Criaturas alienígenas feéricas estão por todo Sun Vale! Eu não culpo você, mas você deveria fazer sua parte para ajudar a limpar isso. Mate panteras feéricas e traga-me suas caudas como prova!\""
"Silvia in Sun Vale said, \"I'm getting reports that some of the spiders near here are developing some sort of spinneret-related disease. If that's true, I may be able to identify the problem if I can study enough of their spiderwebs.\"": "Silvia, de Sun Vale, disse: \"Estou recebendo relatos de que algumas das aranhas próximas daqui estão desenvolvendo algum tipo de doença relacionada às fieiras. Se isso for verdade, talvez eu consiga identificar o problema se conseguir estudar o suficiente sobre suas teias de aranha.\""
"Silvia in Sun Vale said, \"Most of the deer around here are healthy, but a number are rabid. Do me a favor and take care of that problem, would you?\"": "Silvia, em Sun Vale, disse: \"A maioria dos cervos por aqui são saudáveis, mas alguns são raivosos. Faça-me um favor e cuide desse problema, por favor?\""
"Silvia in Sun Vale said, \"My scrying has shown me the locations of an invasive species of oyster. Please destroy them. Their contents are irrelevant to me, as long as the oysters are killed! Here are my notes on their locations; if you have some skill in objective orienteering I'm sure you'll find them easily enough. You know how to pry oysters open, I hope?\"": "Silvia em Sun Vale disse: \"Minha vidência me mostrou a localização de uma espécie invasora de ostra. Por favor, destrua-as. Seu conteúdo é irrelevante para mim, desde que as ostras sejam mortas! Aqui estão minhas anotações sobre suas localizações; se você tiver alguma habilidade em orientação objetiva, tenho certeza de que as encontrará com bastante facilidade. Você sabe como abrir ostras, espero?\""
"Silvia in Sun Vale said, \"We can't have these fae creatures running all over our land! You fairies aren't too bad, but the biting vines are ruining the native ecology! Help me cull them, would you?\"": "Silvia em Sun Vale disse: \"Não podemos ter essas criaturas feéricas correndo por todas as nossas terras! Vocês, fadas, não são tão ruins, mas as vinhas cortantes estão arruinando a ecologia nativa! Ajude-me a abatê-las, sim?\""
"Sim": "sim, a maldição foi suspensa. Eu tenho as coordenadas! Finalmente! Você está pronto para o próximo passo?\""
"Sim, sim, claro": "você fez o que lhe foi solicitado e aqui está o seu pagamento.\""
"Sim, sim. Você está certo": "enviei você para uma missão que sabia ser impossível. Devo-lhe uma recompensa pelo seu 'trabalho'. Suspirar.\""
