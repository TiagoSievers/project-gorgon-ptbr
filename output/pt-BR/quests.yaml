"Rappanel in Serbule Hills said, \"Durstin behind the bar is good for a scrambled egg or a bit of fried bread, but he's just not willing to broaden his horizons! And yet right down the road is a rare delicacy: ranalan-style pickled fish! Get some for me. I'll convince him to try them some evening, and he'll finally see what he's been missing.

Look for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!\"": "Rappanel em Serbule Hills disse: “Durstin atrás do bar é bom para um ovo mexido ou um pedaço de pão frito, mas ele simplesmente não está disposto a ampliar seus horizontes!

Procure os ranalans ao redor do grande lago. Eles gostam de deixar potes de conserva fora de suas cabanas. E não se preocupe – eles não são realmente inteligentes, apenas parecem ser. Eu li tudo sobre eles na faculdade de bardo em Verta!\""
"Rappanel in Serbule Hills said, \"Have you met Joeh over in Serbule? He's a dirty one, isn't he! I mean, I like to use food in the bedroom as much as the next elf, but his bacon fetish is... well, I shouldn't judge. I guess we all get a little crazy, so far from home! And I have to admit that some of his ideas sound intriguing. Did he tell you about the thing he does with the two boar tusks? It sounds painful to me, but I guess I have to try it: the bardic creed demands I gather lore! So... do you have any boar tusks, perchance?\"": "Rappanel em Serbule Hills disse: “Você conheceu Joeh em Serbule? presas? Parece doloroso para mim, mas acho que tenho que tentar: o credo bárdico exige que eu reúna conhecimento. Então... você tem presas de javali, por acaso?"
"Rappanel in Serbule Hills said, \"I need new catgut for my lute strings! Most catgut is made from sheep intestine, but I'm an artist, not some slob. I need actual cat gut! You're a lover of the arts, right? Don't do this for me. Do this for art. Find a tiger out there, kill it, and use your butcher knife to scoop up the guts. You do have a butcher knife, right? Because I don't! But I'm sure Fainor in Serbule town would...\"": "Rappanel em Serbule Hills disse: \"Preciso de tripa de gato nova para minhas cordas de alaúde! A maior parte da tripa de categute é feita de intestino de ovelha, mas sou um artista, não um desleixado. Preciso de tripa de gato de verdade! Você é um amante das artes, certo? Não faça isso por mim. Faça isso pela arte. Encontre um tigre lá fora, mate-o e use sua faca de açougueiro para recolher as tripas. Você tem uma faca de açougueiro, certo? Porque eu não! Mas Tenho certeza de que Fainor, na cidade de Serbule, faria...\""
"Rappanel in Serbule Hills said, \"I really must have better food than what Durstin can cook. Even the ranalan pickles are getting old. Hmm, how about some of those 'grapefish'? I have to know why the humans call them that!

I hear they're in the lakes and streams around here, but they can be pretty quick. I'm sure with some practice you'll manage, though.\"": "Rappanel em Serbule Hills disse: \"Eu realmente devo ter comida melhor do que aquela que Durstin pode cozinhar. Até os picles de ranalan estão envelhecendo. Hmm, que tal alguns daqueles 'peixes de uva'? Eu tenho que saber por que os humanos os chamam assim!

Ouvi dizer que eles estão nos lagos e riachos por aqui, mas podem ser bem rápidos. Tenho certeza que com um pouco de prática você conseguirá.\""
"Rappanel in Serbule Hills said, \"So, do you have those filleted grapefish for me yet?\"": "Rappanel em Serbule Hills disse: \"Então, você já tem aqueles filetes de toranja para mim?\""
