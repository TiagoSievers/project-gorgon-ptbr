"Cassandra White": "Cassandra Branca"
"Cassandra White in Statehelm said, \"It's coming up on that time of year again: the anniversary of my Lennel's death at the hands of a bear. I was wondering if you could do a poor widow a favor. Could kill some bears for me? I'm not too particular about the type of bear. I hate all bears! Every one of them. And they're a menace to humanity, that's what I say. They kill humans! Why do we allow them to live?! I'll tell you why: magic's made us soft. People don't go out of town anymore so they don't realize how deadly the bears are. But you and I, we're no fools.\"": "Cassandra White em Statehelm disse: \"Está chegando naquela época do ano novamente: o aniversário da morte de meu Lennel nas mãos de um urso. Eu queria saber se você poderia fazer um favor a uma viúva pobre. Poderia matar alguns ursos para mim? Não sou muito exigente quanto ao tipo de urso. Odeio todos os ursos! Cada um deles. E eles são uma ameaça para a humanidade, é o que eu digo. Eles matam humanos! Por que permitimos que eles vivam?! Vou lhe dizer por quê: a magia nos tornou moles. As pessoas não saem mais da cidade para não perceberem o quão mortais os ursos são. Mas você e eu não somos idiotas."
"Cassandra White in Statehelm said, \"Oh it's so nice to have your ear! Well, my husband was killed by a bear a long time ago. And I witnessed it! We were hiking through the forests south of here, as young lovers do, and came upon a bear with green fur. Lennel was a strong man but stupid, and he tried to hit it with a longbow. The bear killed him, scattering blood everywhere, and then it did the most cursed thing: it picked up his bow, stared right into my eyes, and snapped the bow over its knee. It was a very human thing to do.

I learned that the locals call him the Mangler. And I promise you this: it has been decades, but my hatred still runs deep. I've paid to have him killed, but he's immortal and he keeps coming back! No, what really upsets him is to see his beloved friend injured. They call that one The Mauler. If you ask me I think they're gay bears who are gay for each other, but nobody ever asks me. After you kill The Mauler, say \"This one's for Lennel.\"\"": "Cassandra White, em Statehelm, disse: \"Oh, é tão bom ter sua orelha! Bem, meu marido foi morto por um urso há muito tempo. E eu testemunhei isso! Estávamos caminhando pelas florestas ao sul daqui, como fazem os jovens amantes, e encontramos um urso de pelo verde. Lennel era um homem forte, mas estúpido, e tentou acertá-lo com um arco longo. O urso o matou, espalhando sangue por toda parte, e então ele fez a coisa mais amaldiçoada: pegou seu arco, olhou diretamente nos meus olhos, e quebrou o arco sobre o joelho. Foi uma coisa muito humana de se fazer.

Aprendi que os moradores locais o chamam de Mangler. E eu prometo a você: já se passaram décadas, mas meu ódio ainda é profundo. Eu paguei para matá-lo, mas ele é imortal e continua voltando! Não, o que realmente o incomoda é ver seu querido amigo ferido. Eles chamam aquele de O Mauler. Se você me perguntar, acho que eles são ursos gays que são gays um para o outro, mas ninguém nunca me perguntou. Depois de matar o Mauler, diga \"Este é para Lennel.\"\""
