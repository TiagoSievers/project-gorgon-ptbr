"Tennenbrandt University teaches important music and magic theory, but they're not very hands-on. It's important to see other performers work their magic -- that's part of my education too! But staying out all night leaves me exhausted for the next day. You know what helps? Pineal juice.": "A Universidade Tennenbrandt ensina música importante e teoria mágica, mas não é muito prática. É importante ver outros artistas fazendo sua mágica – isso também faz parte da minha educação! Mas ficar fora a noite toda me deixa exausto para o dia seguinte. Você sabe o que ajuda? Suco de pineal."
