"Raim said, \"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of string. Lots of string! I promise I'll only ask this of you once - never again! If you can deliver me 50 strings, I'll show you what I use them for!\"": "Raim disse: \"Ei, posso pedir que você me faça um favor pessoal? Estou com poucos suprimentos e preciso urgentemente de barbante. Muito barbante! Prometo que só vou pedir isso a você uma vez - nunca mais! Se você puder me entregar 50 cordas, vou mostrar para que as uso!\""
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Amazing Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Raim disse: \"Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um traje de tecido incrível completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!\""
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Awesome Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Raim disse: \"Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um terno de tecido impressionante completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!\""
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Raim disse: “Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um terno de tecido decente completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!”"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Raim disse: “Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um traje de tecido de qualidade completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!”"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Cloth suit and I will see what I can do to help you flourish at your craft! I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\"": "Raim disse: \"Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um traje de tecido áspero completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício! Eu só quero a versão encantada do traje... Eu não lido com porcarias não encantadas!\""
"Raina in the Fae Realm said, \"Don't tell Crelpin, but I've got a special order for some bee stingers. The only catch is that they have to be fresh! A certain troll will pay well for them, and I'll give you half. Deal?\"": "Raina, no Reino Fae, disse: “Não conte a Crelpin, mas tenho um pedido especial de alguns ferrões de abelha."
"Raina in the Fae Realm said, \"Felmer can be a handy person to know when things get... Um... chaotic. You should say hello.\"": "Raina, no Reino Fae, disse: \"Felmer pode ser uma pessoa útil para saber quando as coisas ficam... Hum... caóticas. Você deveria dizer olá.\""
"Raina in the Fae Realm said, \"I try to keep my shop stocked with the essentials... but what IS an essential, anyway? I don't personally need much, so I've been stocking a bit of everything, in case it's essential to somebody else. Despite this, sales are... not good.

But I have a lead on a sale: Crelpin asked if I had any fresh pears, and I realized I didn't! Mine are old! If you're headed out of town, please pick me up some really fresh ones. And don't eat them!\"": "Raina, no Reino Fae, disse: “Tento manter minha loja abastecida com o essencial... mas o que É essencial, afinal? Eu pessoalmente não preciso de muito, então tenho estocado um pouco de tudo, caso seja essencial para outra pessoa. Apesar disso, as vendas são... não boas.

Mas tenho uma pista de venda: Crelpin perguntou se eu tinha peras frescas e percebi que não! Os meus são antigos! Se você estiver saindo da cidade, compre alguns bem novos para mim. E não os coma!\""
"Raina in the Fae Realm said, \"I've stopped accepting special orders for fresh body parts. It's just too existentially painful. But orders for fresh mushrooms should be fine!

I need some extremely fresh Pixie's Parasols. I'd pick them myself, but... well, I'm scared of pixies.\"": "Raina, no Reino Fae, disse: “Parei de aceitar pedidos especiais de partes frescas de corpo. É muito doloroso existencialmente. Mas pedidos de cogumelos frescos devem servir!

Preciso de alguns guarda-sóis da Pixie extremamente novos. Eu mesmo os escolheria, mas... bem, tenho medo de duendes.\""
"Raina in the Fae Realm said, \"Midge the Apothecary lost her memory also! Maybe she can help you with yours!\"": "Raina, no Reino Fae, disse: \"Midge, a Boticária, também perdeu a memória! Talvez ela possa ajudá-lo com a sua!\""
"Raina in the Fae Realm said, \"Pegast may be able to use muscle memory to remind you about some basic skills. \"": "Raina, no Reino Fae, disse: “Pegast pode usar a memória muscular para lembrá-lo de algumas habilidades básicas.”"
"Raina in the Fae Realm said, \"Psst... thanks for your help getting those fresh bee stingers. I've got another order for really fresh butterfly wings. I'd collect them myself, but I'm very fluent in butterfly speech, and I just can't handle their dying screams right now...\"": "Raina, no Reino Fae, disse: \"Psiu... obrigado por sua ajuda para conseguir aqueles ferrões de abelha frescos. Tenho outro pedido de asas de borboleta realmente frescas. Eu mesmo as colecionaria, mas sou muito fluente na fala de borboletas, e simplesmente não consigo lidar com seus gritos de morte agora...\""
"Raina in the Fae Realm said, \"You really should talk to Crelpin about your pets. Who knows what they might have gone through?\"": "Raina, no Reino Fae, disse: \"Você realmente deveria conversar com Crelpin sobre seus animais de estimação. Quem sabe o que eles podem ter passado?\""
