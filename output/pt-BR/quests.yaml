Melandria said that the flowers she needs only grow at night, near the glowy yellow crystals found in Gazluk.": "Melandria, no Forte Gazluk, pediu que você conseguisse alguns itens necessários para o ritual de quebrar a maldição de Rick.

Melandria disse que as flores que ela precisa só crescem à noite, perto dos cristais amarelos brilhantes encontrados em Gazluk."
"Melandria in Gazluk Keep said, \"I try to be brave and upbeat about my fate because it makes things a little less horrible, you know? And some days aren't too bad... but some days are really pretty awful. I wish I had some dry gin for those occasions. Do you have any?\"": "Melandria, em Gazluk Keep, disse: \"Tento ser corajosa e otimista em relação ao meu destino porque isso torna as coisas um pouco menos horríveis, sabe? E alguns dias não são tão ruins... mas alguns dias são realmente horríveis. Eu gostaria de ter um pouco de gim seco para essas ocasiões. Você tem algum?\""
"Melandria in Gazluk Keep said, \"I'm supposed to make a special dinner tomorrow to honor my master's wife's birthday. I'm getting kind of freaked out, because I can't make my famous mint cookies without mint! Do you have any? It's important!\"": "Melandria, em Gazluk Keep, disse: \"Devo fazer um jantar especial amanhã para homenagear o aniversário da esposa do meu mestre. Estou ficando meio assustada, porque não consigo fazer meus famosos biscoitos de menta sem hortelã! Você tem algum? É importante!\""
"Melandria in Gazluk Keep said, \"My brother is a gru-maghi in one of the aboveground houses. You know, up above, where the best-connected orc leaders live? Anyway, my brother and I each smuggled in a pemphredo eye so we could talk to each other at night. But mine was taken as contraband almost as soon as I arrived, and I haven't been able to find another anywhere in Gazluk. Can you find me another one from outside? I miss my brother...\"": "Melandria em Gazluk Keep disse: \"Meu irmão é um gru-maghi em uma das casas acima do solo. Você sabe, lá em cima, onde vivem os líderes orcs mais bem conectados? De qualquer forma, meu irmão e eu contrabandeamos um olho de pemphredo para que pudéssemos conversar um com o outro à noite. Mas o meu foi considerado contrabando quase assim que cheguei, e não consegui encontrar outro em nenhum lugar de Gazluk. Você pode me encontrar outro de fora? Estou com saudades do meu irmão...\""
"Melandria in Gazluk Keep said, \"Psst... I need your help! My friend Avgal -- he's another gru-maghi -- was caught trying to escape yesterday! And you know the penalty for that: they strip you naked and leave you in the mountains to freeze to death. You've probably never seen somebody die from hypothermia, but it's horrible. Not to worry, though: I have a plan. I just need some cold resistance potions! A lot of them!\"": "Melandria em Gazluk Keep disse: \"Psiu... preciso da sua ajuda! Meu amigo Avgal - ele é outro gru-maghi - foi pego tentando escapar ontem! E você sabe a penalidade por isso: eles te deixam nu e te deixam nas montanhas para congelar até a morte. Você provavelmente nunca viu alguém morrer de hipotermia, mas é horrível. Mas não se preocupe: eu tenho um plano. Eu só preciso de algumas poções de resistência ao frio! Muitas delas!\""
