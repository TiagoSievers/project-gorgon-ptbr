(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'vociferante' em sua próxima conversa.

Vocífero: adjetivo: expresso em voz alta ou contundente. por exemplo 'Fui um crítico veemente do novo toque de recolher, mas meus esforços foram em vão.'

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
