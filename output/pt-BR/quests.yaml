"E diga a ele que seu sistema de código precisa ser melhorado": "é obviamente um código! Acho que a mensagem do código deveria parecer um pedido de padaria. Isso não seria inteligente? Por que ele não poderia ter sido inteligente como sua irmã Laura? Pergunte isso a ele.\""
"E eu sei exatamente": "os dentes do Tor-Urak funcionariam! E há um monte em Kur. Claro, eu precisaria matar um bando de Tor-Uraks e depois matá-los cuidadosamente para tentar encontrar um dente viável... o que parece improvável no meu estado atual. A menos que você possa ajudar?\""
"E ouça": "Mort está tecnicamente vivo, então matá-lo é assassinato. MAS! Ele esteve morto e morto pela ONU, intermitentemente, por cerca de cinquenta anos antes de fazer algum tipo de pacto com Harukita. Então não se preocupe com a coisa do assassinato. Ele é mau."
"E ouça-me com atenção": "quando vou para o deserto, viajo sempre com Kleave ou pelo menos Oritania. Sou resistente, mas não sou estúpido! O deserto é muito mais perigoso do que aqui. Você ainda pode fazer isso. A discrição pode ser resistente! Evite confrontos!"
