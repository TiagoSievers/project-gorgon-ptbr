"Deville got turned into a donkey. And that pretty much ruined his life. He couldn't talk at all for a long time and his parents wouldn't believe me that he was still in there! They decided he was just a donkey and their real son was dead, so they held a funeral for him. He really has no home to go back to now. But he still doesn't want to stay a donkey!

I've tried all kinds of schemes to cure Deville and Rick, but nothing worked. Deville eventually got fed up and left. A few months later, a talking bird stopped by to tell me Deville was living in Animal Town now. I've tried to figure out where that is, and my best guess is an island called \"Sun Vale\". See if you can find him!": "Deville foi transformado em burro. E isso praticamente arruinou sua vida. Ele não conseguiu falar por muito tempo e seus pais não acreditaram que ele ainda estava lá! Eles decidiram que ele era apenas um burro e que seu filho verdadeiro estava morto, então realizaram um funeral para ele. Ele realmente não tem casa para onde voltar agora. Mas ele ainda não quer continuar burro!

Tentei todos os tipos de esquemas para curar Deville e Rick, mas nada funcionou. Deville finalmente se cansou e foi embora. Alguns meses depois, um pássaro falante apareceu para me dizer que Deville estava morando em Animal Town agora. Tentei descobrir onde fica, e meu melhor palpite é uma ilha chamada “Sun Vale”. Veja se você consegue encontrá-lo!"
"Deville in Animal Town asked for help gathering the ingredients for a potion that should transform him back into a human.

He said the most difficult ingredient would be the heart of Vurrkan, a deadly drakeworm living in Sun Vale.": "Deville, em Animal Town, pediu ajuda para reunir os ingredientes para uma poção que deveria transformá-lo novamente em humano.

Ele disse que o ingrediente mais difícil seria o coração de Vurrkan, um draconato mortal que vive em Sun Vale."
"Deville is transformed back?! That's amazing news! Thank you!

I wonder what he's going to do now... I don't think he'll want to speak to his family again, not after how they acted... but I guess that's a problem for another day. We've still got a party to prepare for!": "Deville está transformado de volta?! Isso é uma notícia incrível! Obrigado!

Eu me pergunto o que ele vai fazer agora... Não acho que ele vá querer falar com sua família novamente, não depois de como eles agiram... mas acho que isso é um problema para outro dia. Ainda temos uma festa para preparar!"
"Deville Neth in Statehelm said, \"Chancellor Vexford did this to my shop. And he's watching, waiting for me to retaliate in some dumb way. That's why I need YOU to retaliate in some dumb way on my behalf! No, I'm kidding! Of course this isn't about retaliation. It's a business venture at his expense. It won't hurt anybody. I promise. Just get me the following items and you'll see.\"": "Deville Neth em Statehelm disse: \"O chanceler Vexford fez isso na minha loja. E ele está observando, esperando que eu retalie de alguma forma estúpida. É por isso que preciso que VOCÊ retalie de alguma forma estúpida em meu nome! Não, estou brincando! É claro que não se trata de retaliação. É um empreendimento comercial às custas dele. Não vai machucar ninguém. Eu prometo. Apenas me dê os seguintes itens e você verá. \""
"Deville Neth in Statehelm said, \"Here. This is what I made from the parts you made. I know a bit of the art of sabotage. Take this with you and go get \"fed\" from the Cornucopia. It will redirect the system's teleportation point down into the sewer somewhere.

Don't worry, they'll fix it soon enough. But for today, just today, there will be hungry people outside my shop.

I've got the bread smell going. This is going to be a good sales day! Go go go!\"": "Deville Neth em Statehelm disse: \"Aqui. Isto é o que eu fiz com as peças que você fez. Eu conheço um pouco da arte da sabotagem. Leve isso com você e vá ser \"alimentado\" pela Cornucópia. Ele redirecionará o ponto de teletransporte do sistema para algum lugar no esgoto.

Não se preocupe, eles consertarão isso em breve. Mas por hoje, só hoje, haverá gente faminta do lado de fora da minha loja.

Estou com cheiro de pão. Este será um bom dia de vendas! Vá, vá, vá!"
"Deville Neth in Statehelm said, \"I can't open my shop with these roaches here. If you had bug bombs, you could clear it out for me. I'd reward you!

I'd do it myself but my bug bombs were sabotaged. Yes, I know what that sounds like!

I think Ser Hackley in the Council building sells plans for bug bumbs, if you're into gadgeteering?\"": "Deville Neth, em Statehelm, disse: \"Não posso abrir minha loja com essas baratas aqui. Se você tivesse bombas contra insetos, poderia limpá-la para mim. Eu o recompensaria!

Eu mesmo faria isso, mas minhas bombas de insetos foram sabotadas. Sim, eu sei o que isso parece!

Acho que Sor Hackley, no prédio do Conselho, vende planos para insetos, se você gosta de engenhocas?"
"Deville Neth in Statehelm said, \"I had some bug bombs in the back room, just in case roaches should show up again. But when I came in today, I found all my bug bombs had been punctured. But I think I can fix them! If I just had some some glue. And something to help reactivate it.\"": "Deville Neth, em Statehelm, disse: \"Eu tinha algumas bombas contra insetos na sala dos fundos, para o caso de as baratas aparecerem novamente. Mas quando cheguei hoje, descobri que todas as minhas bombas contra insetos haviam sido perfuradas. Mas acho que posso consertá-las! Se eu tivesse um pouco de cola. E algo para ajudar a reativá-la. \""
"Deville Neth in Statehelm said, \"I've got customers returning to the shop! But I've been selling my loaves at a loss, and I can't keep doing that for long. The problem is the taxes on delivered grains. They're just too high! So I was thinking... Maybe you could deliver them for me?

I can't pay you in Councils but I can do much better: I can pay you in exposure. I'll tell everyone who shops here about how great you are, and what a valuable addition to Statehelm you've become.\"": "Deville Neth, em Statehelm, disse: \"Tenho clientes voltando à loja! Mas tenho vendido meus pães com prejuízo e não posso continuar fazendo isso por muito tempo. O problema são os impostos sobre os grãos entregues. Eles são muito altos! Então eu estava pensando... Talvez você pudesse entregá-los para mim?

Não posso pagar-lhe em Conselhos, mas posso fazer muito melhor: posso pagar-lhe em exposição. Direi a todos que compram aqui como você é incrível e como você se tornou uma adição valiosa à Statehelm.\""
"Deville Neth in Statehelm said, \"Sales are going well and it's time to bring back some of my fancier recipes. I need these grains to do it! As before, I'll pay you in clout with the citizens of Statehelm!\"": "Deville Neth, em Statehelm, disse: \"As vendas estão indo bem e é hora de trazer de volta algumas de minhas receitas mais sofisticadas. Preciso desses grãos para fazer isso! Como antes, pagarei a você em troca de influência com os cidadãos de Statehelm!\""
"Deville Neth in Statehelm said, \"That little plan went great! I sold a lot of bread, and reminded people how good fresh bread is. It's led to repeat customers!

But Vexford is embarrassed. And an embarrassed man is dangerous.

Take this to my daughter Laura. She's my oldest and smartest. She lives in Kur, in self-inflicted banishment. Tell her it's time to come home.\"": "Deville Neth, em Statehelm, disse: “Esse pequeno plano deu certo! Vendi muito pão e lembrei às pessoas como o pão fresco é bom.

Mas Vexford está envergonhado. E um homem envergonhado é perigoso.

Leve isso para minha filha Laura. Ela é minha mais velha e mais inteligente. Ela vive em Kur, em exílio autoinfligido. Diga a ela que é hora de voltar para casa.\""
"DevilleNethRepeatable1": "DevilleNethRepetível1"
"DevilleNethRepeatable2": "DevilleNethRepetível2"
"Devo admitir que estava de muito mau humor no dia em que realizei esses desejos. Ormorek tinha acabado de me contar sobre seus estúpidos soldados dos sonhos e como eu nunca faço nada para ajudar os mortais, e blá, blá, blá. Não me diga o que fazer! Não que você faça isso. É por isso que gosto de você. Além disso, você é incrivelmente poderoso para um mortal. Enfim, aqui": "isto é para você, cultista leal!\""
"Diamond": "Diamante"
"Diamonds": "Diamantes"
"Dice Bunnies": "Coelhinhos de dados"
"DiceGame_Asparagus": "DadosGame_Asparagus"
"Did they give you any trouble? Fairies can be dangerous! But you seem to have handled it well. I shouldn't have worried.": "Eles te deram algum problema? As fadas podem ser perigosas! Mas você parece ter lidado bem com isso. Eu não deveria ter me preocupado."
"Did Tremmond put you up to this? That ass!

Yes, I know how to shoe horses and make rivets and lattices and other basic items. I even know how to bard a horse. But I learned everything by apprenticing with Yenshi the Animal Guru, right here in Povus... not from orcs! And the only reason I have to touch a forge at all is because Tremmond and his cronies are too stuck up to work on animals!

I despise my father and I would never willingly communicate with him. Now go away, because you're pissing me off!": "Tremmond mandou você fazer isso? Essa bunda!

Sim, sei ferrar cavalos e fazer rebites, treliças e outros itens básicos. Eu até sei bardar um cavalo. Mas aprendi tudo aprendendo com Yenshi, o Guru Animal, aqui mesmo em Povus... não com orcs! E a única razão pela qual tenho que tocar em uma forja é porque Tremmond e seus comparsas são arrogantes demais para trabalhar com animais!

Eu desprezo meu pai e nunca me comunicaria voluntariamente com ele. Agora vá embora, porque você está me irritando!"
"Did you catch the cave fish? Hmm, yes, your complexion does look a little better. Good job.": "Você pegou o peixe da caverna? Hmm, sim, sua pele parece um pouco melhor. Bom trabalho."
"Did you disconnect him? Hah! I'm sure he'll just call back in a bit. But he'll be extra pissed off now. That might be fun! Good work!": "Você o desconectou? Hah! Tenho certeza que ele ligará de volta daqui a pouco. Mas ele ficará ainda mais chateado agora. Isso pode ser divertido! Bom trabalho!"
"Did you do it? Did you push through the boredom and find the fun in making yarn? ... You did? Already? Wow! Wait... you'd say anything to get out of having to make more yarn, wouldn't you? Hmph.": "Você fez isso? Você superou o tédio e achou divertido fazer fios? ... Você fez? Já? Uau! Espere... você diria qualquer coisa para não ter que fazer mais fios, não é? Hmph."
"Did you figure out what they were up to? No? Well, I'll keep trying to gather intel. Thanks again, friend.": "Você descobriu o que eles estavam fazendo? Não? Bem, continuarei tentando reunir informações. Obrigado novamente, amigo."
"Did you get all the bears? Eight of 'em? Well... that sounds like all of 'em, maybe? I never really counted. So... good work.": "Você pegou todos os ursos? Oito deles? Bem... isso soa como todos eles, talvez? Eu realmente nunca contei. Então... bom trabalho."
"Did you hear about that unfortunate fire-rift that opened south of here? I was thinking... while the Winter Fae portal is also open, that means there's three potent elemental sources here: Fire, Cold, and Nature. You know what that means: party time!

Oh, sorry, you don't know what I mean, do you. Well, If you can find three elementals big enough and old enough to drop nice-sounding crystals, I can fashion those crystals into beautiful fairy chimes.

I'm not sure if mortals are capable of playing them... but we could find out!": "Você ouviu falar daquela infeliz fenda incendiária que se abriu ao sul daqui? Eu estava pensando... embora o portal Winter Fae também esteja aberto, isso significa que há três fontes elementais poderosas aqui: Fogo, Frio e Natureza. Você sabe o que isso significa: hora da festa!

Oh, desculpe, você não sabe o que quero dizer, não é? Bem, se você conseguir encontrar três elementais grandes e velhos o suficiente para soltar cristais de bom som, posso transformar esses cristais em lindos sinos de fadas.

Não tenho certeza se os mortais são capazes de interpretá-los... mas podemos descobrir!"
"Did you hear anything when you picked the mushrooms? See a weird vision? ... no, no, don't tell me! I'm positive I was just imagining it, and your evidence would just cause me to doubt myself further. I have to believe in myself! And I believe my brain was lying to me! Case closed.": "Você ouviu alguma coisa quando colheu os cogumelos? Teve uma visão estranha? ... não, não, não me diga! Tenho certeza de que estava apenas imaginando, e suas evidências só me fariam duvidar ainda mais de mim mesmo. Eu tenho que acreditar em mim mesmo! E acredito que meu cérebro estava mentindo para mim! Caso encerrado."
"Did you hear their words? ... How could you not hear anything?! Is it possible that I alone can hear...

<i>[Uriana seems lost in thought. She absentmindedly hands you an item from her hoard.]</i>": "Você ouviu as palavras deles? ... Como você não ouviu nada?! É possível que só eu possa ouvir...

<i>[Uriana parece perdida em pensamentos. Ela distraidamente lhe entrega um item de seu tesouro.]</i>"
"Did you know phlogiston comes in many quality levels? The worst kind is 'Unsturdy Phlogiston'. Well, Makara called it 'Shoddy Phlogiston'. Either way, it's garbage. Then there's 'Semi-Sturdy Phlogiston', which Makara calls 'Rough Phlogiston'. It's okay, but not very sturdy.

What I need is Sturdy Phlogiston, which Makara called 'Crude Phlogiston'. Just bring it to me and I'll deliver it.": "Você sabia que o flogisto vem em vários níveis de qualidade? O pior tipo é o 'Flogístico Instável'. Bem, Makara chamou isso de 'flogisto de má qualidade'. De qualquer forma, é lixo. Depois, há o 'Flogisto Semi-Robusto', que Makara chama de 'Flogisto Áspero'. Está tudo bem, mas não muito resistente.

O que eu preciso é do Flogisto Robusto, que Makara chamou de 'Flogisto Bruto'. Basta trazê-lo para mim e eu entrego."
"Did you know there's really such a thing as a Salmpo? They're abominations. Created by amateur alchemists, mostly. I don't exactly know what they look like, but I've heard their hearts are made of leafy greens! I've always wanted to try one. Just to know what I taste like. So to speak.": "Você sabia que existe realmente um Salmpo? São abominações. Criado por alquimistas amadores, principalmente. Não sei exatamente como eles são, mas ouvi dizer que seus corações são feitos de folhas verdes! Sempre quis experimentar um. Só para saber qual é o meu gosto. Por assim dizer."
"Did you learn a lot from that? Just busywork? Hmph.": "Você aprendeu muito com isso? Apenas trabalho ocupado? Hmph."
"Did you manage to kill them in their sleep? No? Oh. I'd kind of hoped... well, anyway, good job. Here's your reward!": "Você conseguiu matá-los durante o sono? Não? Oh. Eu meio que esperava... bem, de qualquer forma, bom trabalho. Aqui está sua recompensa!"
"Did you read this?! It's not even in an envelope! Tell the daft girl not to let people know about us! What in Ormorek's Beard am I going to do with her?": "Você leu isso?! Não está nem em um envelope! Diga à garota idiota para não deixar as pessoas saberem sobre nós! O que diabos da Barba de Ormorek vou fazer com ela?"
"Did you really skin all those animals? Gross! Ha ha! Well. That was amusing for about two seconds. Bored again!": "Você realmente esfolou todos aqueles animais? Bruto! Ha ha! Bem. Isso foi divertido por cerca de dois segundos. Entediado de novo!"
"Did you say it? \"This one's for Lennel\"? Oh, it brings a malicious tear to my eye knowing that bear was upset. They'll be back, and they'll outlive me, but I will make them rue the day they heard the name of Lennel White! That's a promise. Oh where are my manners. This is for you.": "Você disse isso? \"Esta é para Lennel\"? Oh, meus olhos ficam com lágrimas maliciosas sabendo que aquele urso estava chateado. Eles voltarão e sobreviverão a mim, mas farei com que se arrependam do dia em que ouviram o nome de Lennel White! Isso é uma promessa. Oh, onde estão minhas maneiras. Isto é para você."
"Did you see how they slide around your fist, but cleaved clean with the claw? Slimes are resistant to crushing, but not slashing! I bet you didn't know that until now, right?": "Você viu como eles deslizam em volta do seu punho, mas se separam com a garra? Slimes são resistentes ao esmagamento, mas não ao corte! Aposto que você não sabia disso até agora, certo?"
