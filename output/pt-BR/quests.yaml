"Simply put, the Sand Seer is the only reason we haven't been overrun already. But she won't be living here forever. This part of the desert must be made more secure!\\\"\": \"Nissim em Amulna disse": "\\\"Quero que Amulna seja um lugar acolhedor para todas as criaturas, mas poucos habitantes do deserto se comportam adequadamente. Até mesmo nossos companheiros Rakshasa atacaram nosso assentamento várias vezes este ano. E então os bandos itinerantes de coisas-gatos atacaram... e, claro, aquelas coisas ridículas de gatos com rosto humano..."
"Since I already taught you Transmutation, you're ready to go find weak magical items and turn them into phlogiston for me. Bring me some low-grade packets of Phlogiston.

<i>[As a Transmutation beginner, you'll need to find Uncommon (green-label) magic items that are no higher than level 30. Use the Transmutation recipe you learned to distill these items to Phlogiston.]</i>": "Já que eu já lhe ensinei Transmutação, você está pronto para encontrar itens mágicos fracos e transformá-los em flogisto para mim. Traga-me alguns pacotes de flogisto de baixa qualidade.

<i>[Como iniciante em Transmutação, você precisará encontrar itens mágicos incomuns (etiqueta verde) que não sejam superiores ao nível 30. Use a receita de Transmutação que você aprendeu para destilar esses itens em Flogisto.]</i>"
"Since the constabulary is completely useless, I've been poking around for clues to my stolen jewelry. And I have a lead for you! ... You <i>will</i> help me, right? It's oh so important!

So you see the jewelry was sold to an orc who trades such things amongst his kind. His name is Throgg and he lives  in a camp in Povus. Can you go and retrieve my stolen jewelry before he gets a chance to resell it?": "Como a polícia é completamente inútil, estive procurando pistas sobre minhas joias roubadas. E eu tenho uma pista para você! ... Você <i>vai</i> me ajudar, certo? É tão importante!

Então você vê que as joias foram vendidas para um orc que comercializa essas coisas entre sua espécie. O nome dele é Throgg e ele mora em um acampamento em Povus. Você pode recuperar minhas joias roubadas antes que ele tenha a chance de revendê-las?"
"Since you are no ordinary warsmith, you deserve a challenge worthy of you! Slay 100 sentient creatures in the name of war. Then I shall teach you the secrets you seek.": "Como você não é um ferreiro comum, você merece um desafio digno de você! Mate 100 criaturas sencientes em nome da guerra. Então eu lhe ensinarei os segredos que você procura."
"Since you did this too, you should help me fix it. Jenny likes tea, so I want you to get her some exotic tropical tea. Make it extra sweet.\\\"\": \"Shiriqa em Statehelm disse": "\\\"Ei, foi você quem me vendeu aquele crânio de osslar ruim. A culpa é sua! Eu fiz uma pegadinha absolutamente hilária e agora Jenny Foster não fala comigo! De jeito nenhum! Ela me dá o \\\"tratamento silencioso\\\", que definitivamente deveria ser considerado um crime de guerra, se ainda não o for."
"Since you're a Warden, maybe you can help me fix an imbalance. Ever since the rakshasa fishermen stopped coming to the river, the squid-beasts are getting out of control. They're even climbing out onto land now. They attack anything that comes near! It's making it hard for animals to get water. Can you remove some of the squids?": "Já que você é um Diretor, talvez possa me ajudar a corrigir um desequilíbrio. Desde que os pescadores rakshasa pararam de ir ao rio, as feras-lulas estão ficando fora de controle. Eles estão até subindo para terra firme agora. Eles atacam qualquer coisa que se aproxime! Está dificultando o acesso dos animais à água. Você pode remover algumas das lulas?"
"Since you're an outsider, you can help fix a tricky problem. Fae panthers have been increasing in number and they're hunting quite close to town. The fairies dealt with other threats such as rhinos very easily, yet they've ignored the panthers... and I've finally realized that it's due to ME. Pegast is afraid of offending me. I've tried to explain that these are just ordinary animals, barely smarter than a mortal cat... but he thinks I SHOULD be offended, even if I'm not. Anyway, if you were to just go and remove those panthers near town, that'd be great.": "Como você é um estranho, pode ajudar a resolver um problema complicado. As panteras Fae têm aumentado em número e estão caçando bem perto da cidade. As fadas lidaram com outras ameaças, como os rinocerontes, com muita facilidade, mas ignoraram as panteras... e finalmente percebi que isso é devido a MIM. Pegast tem medo de me ofender. Tentei explicar que estes são apenas animais comuns, pouco mais espertos que um gato mortal... mas ele acha que eu DEVERIA ficar ofendido, mesmo que não esteja. De qualquer forma, se você fosse remover aquelas panteras perto da cidade, seria ótimo."
"Since Zhia Lian is the goddess of Whimsy, we need a lot of very eccentric snacks. And unfortunately most of my best stuff was either stolen by cat men, or was lost in the desert as we fled for our lives. From cat men.

The casino will provide some boring snacks, but we definitely need some more exotic stuff! Let's start with a recipe from the Crone Hegemony. I found it in an old book! Can you get the ingredients?": "Como Zhia Lian é a deusa do capricho, precisamos de muitos lanches excêntricos. E, infelizmente, a maioria das minhas melhores coisas foi roubada por homens-gatos ou perdida no deserto enquanto fugimos para salvar nossas vidas. De homens-gatos.

O cassino oferecerá alguns lanches chatos, mas definitivamente precisamos de coisas mais exóticas! Vamos começar com uma receita da Hegemonia Crone. Encontrei isso em um livro antigo! Você consegue os ingredientes?"
"SindasTailRingOfCartography": "SindasTailRingOfCartografia"
"Sip from a Cauldron of Vile Thoughts": "Beba de um caldeirão de pensamentos vis"
"Sir Arif has asked for some venison.": "Sir Arif pediu carne de veado."
"Sir Arif has asked you to kill the dinosaurs that roam the crypt.": "Sir Arif pediu para você matar os dinossauros que vagam pela cripta."
"Sir Arif wants you to kill Ursula and bring her creepy stuffed bear as proof.": "Sir Arif quer que você mate Ursula e traga seu assustador urso de pelúcia como prova."
"Sir Brooker in Statehelm said, \"Are you headed back out to Vidaria soon? You should look into something for me. There used to be a battle polo team in the city. It's been gone for a long time. But there was a contest where you could find a ceremonial sword in Vidaria, called the Vanquisher's Blade, which would automatically get you on the team roster. I found some clues about it while I was stationed out there but never found the thing. I'd love to have one as a keepsake. I'll pay you well for it, if you find it!

<i>[Note: completing this quest will sell the blade to Sir Brooker. If you wish to keep the blade you should cancel this quest.]</i>\"": "Sir Brooker em Statehelm disse: \"Você vai voltar para Vidaria em breve? Você deveria procurar algo para mim. Costumava haver um time de pólo de batalha na cidade. Já desapareceu há muito tempo. Mas havia um concurso onde você poderia encontrar uma espada cerimonial em Vidaria, chamada Vanquisher's Blade, que o colocaria automaticamente na lista do time. Encontrei algumas pistas sobre isso enquanto estava estacionado lá, mas nunca encontrei a coisa. Eu adoraria ter um como lembrança. Pagarei bem por isso, se você encontrar!

<i>[Nota: completar esta missão venderá a lâmina para Sir Brooker. Se você deseja manter a lâmina, você deve cancelar esta missão.]</i>\""
"Sir Brooker in Statehelm said, \"Okay, I think you've proven yourself. But here's one more challenge that's just for fun. Can you take out a dummy with a shield and your fists?

<i>[You must have the Shield and Unarmed skills active to advance this quest.]</i>\"": "Sir Brooker em Statehelm disse: \"Ok, acho que você provou seu valor. Mas aqui está mais um desafio que é apenas para diversão. Você consegue derrotar um manequim com um escudo e seus punhos?

<i>[Você deve ter as habilidades Escudo e Desarmado ativas para avançar nesta missão.]</i>\""
"Sir Brooker in Statehelm said, \"That was impressive with the sword. But can you destroy a dummy WITHOUT a sword? Let's see your versatility!

<i>[You must NOT have the Sword skill active to advance this quest.]</i>\"": "Sir Brooker em Statehelm disse: \"Isso foi impressionante com a espada. Mas você pode destruir um manequim SEM espada? Vamos ver sua versatilidade!

<i>[Você NÃO deve ter a habilidade Espada ativa para avançar nesta missão.]</i>\""
"Sir Brooker in Statehelm said, \"We've got two raw new recruits today. You think you're good with a sword, why not show them how it's done? Take apart one of these training dummies with a sword.

<i>[You must have the Sword skill active to advance this quest.]</i>\"": "Sir Brooker em Statehelm disse: \"Temos dois novos recrutas hoje. Você se acha bom com uma espada, por que não mostrar a eles como isso é feito? Desmonte um desses bonecos de treinamento com uma espada.

<i>[Você deve ter a habilidade Espada ativa para avançar nesta missão.]</i>\""
"Sir Coth in Serbule has asked you to go clear out the \"sewer portal\" which has become filled with annoying giant rats.": "Sir Coth em Serbule pediu que você limpasse o \"portal de esgoto\" que está cheio de ratos gigantes irritantes."
"Sir Coth in Serbule has asked you to kill Augmented Mantis Slaves. They are past the farmlands outside of Serbule.": "Sir Coth em Serbule pediu para você matar Augmented Mantis Slaves. Eles passaram pelas fazendas fora de Serbule."
"Sir Coth in Serbule has asked you to kill skeleton archers in the graveyard.": "Sir Coth em Serbule pediu para você matar esqueletos arqueiros no cemitério."
"Sir Coth in Serbule has asked you to see if Rita has feelings for him. Presumably by asking her.": "Sir Coth em Serbule pediu para você ver se Rita sente algo por ele. Presumivelmente perguntando a ela."
"Sir Coth says it's traditional to decorate the tree with an ethnic human food called a 'gingerbread human'. He gave me a bunch of recipes... here's the simplest version. Can you prepare a batch?": "Sir Coth diz que é tradicional decorar a árvore com um alimento humano étnico chamado “pão de gengibre humano”. Ele me deu um monte de receitas... aqui está a versão mais simples. Você pode preparar um lote?"
"Sir Coth's Obsession": "A Obsessão de Sir Coth"
"Sir Coth? That jerk up on the hill that keeps saying elves can't feel true love? I <i>told</i> that guy I'd date him if he just admitted elves are real people. He seems cute enough, but I'm not going to demean myself with an elf-hater.": "Senhor Coth? Aquele idiota na colina que fica dizendo que os elfos não conseguem sentir o amor verdadeiro? Eu <i>disse</i> àquele cara que namoraria com ele se ele admitisse que os elfos são pessoas reais. Ele parece fofo o suficiente, mas não vou me rebaixar com alguém que odeia elfos."
"Sir Fisk in Statehelm said, \"I have a lot of friends in the field and I'm afraid for them. We crossbowmen are seriously outclassed against the gargoyles in particular, and I fear an attack from them soon.

If you were to go take care of some gargoyles, I could make sure some of the discretionary fund ends up in your pocket.\"": "Sir Fisk, em Statehelm, disse: \"Tenho muitos amigos em campo e temo por eles. Nós, besteiros, estamos seriamente em desvantagem contra as gárgulas em particular, e temo um ataque deles em breve.

Se você fosse cuidar de algumas gárgulas, eu poderia garantir que parte do fundo discricionário acabasse no seu bolso.\""
"Sir Fisk in Statehelm said, \"I met the famous Denton Razor while I was stationed in Vidaria. You might say he's my nemesis: I'm the master of the crossbow and he the bow. But I'm not afraid to say that he's my better in most respects. Once I had a chance to kill him, and I let him live. Things got strange after that.

I'd like to goad my nemesis by giving him his most-hated flower. If you did this for me, he'd know immediately who was responsible, and it would completely ruin his day! He deserves it, don't worry.

Sometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!\"": "Sir Fisk em Statehelm disse: \"Conheci o famoso Denton Razor enquanto estava estacionado em Vidaria. Você pode dizer que ele é meu inimigo: eu sou o mestre da besta e ele do arco. Mas não tenho medo de dizer que ele é meu melhor em muitos aspectos. Uma vez que tive a chance de matá-lo, deixei-o viver. As coisas ficaram estranhas depois disso.

Eu gostaria de incitar meu inimigo dando-lhe sua flor mais odiada. Se você fizesse isso por mim, ele saberia imediatamente quem foi o responsável, e isso arruinaria completamente o dia dele! Ele merece, não se preocupe.

Às vezes, quando você examina as ervas daninhas de Vidaria, encontra trevos de dor particularmente vibrantes. Entregue alguns desses para ele!\""
"Sir Fisk in Statehelm said, \"You're the one that brought me the painclover from Louis, right? Yes, it was definitely you. How did he look? Still sickly? He'd taken so much demon poison that I didn't think he'd survive. I'd almost given up hope, actually.

But if he's healthy now, he needs to come here and live in my camp.

As you're obviously a florist of some skill, could you find some of Louis's favorite flowers and deliver them to him? He'll know what it means. And I will pay you zealously. For your efforts as much as for your discretion.\"": "Sir Fisk, em Statehelm, disse: \"Foi você quem me trouxe o analgésico de Louis, certo? Sim, definitivamente foi você. Como ele estava? Ainda doente? Ele tomou tanto veneno demoníaco que não pensei que ele sobreviveria. Quase perdi as esperanças, na verdade.

Mas se ele está saudável agora, precisa vir para cá e morar no meu acampamento.

Como você obviamente é um florista habilidoso, poderia encontrar algumas das flores favoritas de Louis e entregá-las a ele? Ele saberá o que isso significa. E eu pagarei a você com zelo. Tanto pelos seus esforços quanto pela sua discrição.\""
"Sir Hughes in Statehelm said, \"Have you got time to handle more beasties in Vidaria? You're making things safer for our troops out there. Remember, safety is our top concern. It would obviously be mission-failure if you died!\"": "Sir Hughes em Statehelm disse: \"Você tem tempo para lidar com mais feras em Vidaria? Você está tornando as coisas mais seguras para nossas tropas lá fora. Lembre-se, a segurança é nossa principal preocupação. Obviamente seria um fracasso da missão se você morresse!\""
"Sir Hughes in Statehelm said, \"Here is one I've struggled with myself: can you defeat demons barehanded? Not the wimpy ones -- the Behemoths!

<i>[You must have the Unarmed skill active to advance this quest.]</i>\"": "Sir Hughes, em Statehelm, disse: \"Aqui está uma questão com a qual lutei comigo mesmo: você pode derrotar demônios com as mãos vazias? Não os fracos - os Behemoths!

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>\""
"Sir Hughes in Statehelm said, \"Hey, I have to stand around watching recruits during business hours, so I keep missing my chance to pick up a package from Pumza's weapons stall. Can you go get it for me?\"": "Sir Hughes em Statehelm disse: \"Ei, tenho que ficar observando os recrutas durante o horário comercial, então continuo perdendo a chance de pegar um pacote na barraca de armas de Pumza. Você pode ir buscá-lo para mim?\""
"Sir Hughes in Statehelm said, \"I'm quite skilled with punching weapons and claws, and I'll tell you what helped me unlock my full potential: sewer practice. Find your way down into the sewer and use your Slashing Strike on the slimes down there.\"": "Sir Hughes, em Statehelm, disse: \"Sou bastante habilidoso com armas de soco e garras, e vou lhe contar o que me ajudou a desbloquear todo o meu potencial: prática no esgoto. Encontre o caminho até o esgoto e use seu Golpe Cortante nas gosmas lá embaixo.\""
"Sir Hughes in Statehelm said, \"If giant vipers were too easy, then you should move on to punching giant scorpions. There's mounds of scorpions in Vidaria. Go punch one up! You'll learn a lot. A lot about pain. But that's part of it!

<i>[You must have the Unarmed skill active to advance this quest.]</i>\"": "Sir Hughes em Statehelm disse: \"Se víboras gigantes fossem muito fáceis, então você deveria passar a socar escorpiões gigantes. Há montes de escorpiões em Vidaria. Dê um soco em um! Você aprenderá muito. Muito sobre dor. Mas isso faz parte!

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>\""
"Sir Hughes in Statehelm said, \"We've seen how you can punch. But now you need to really test your kicking power. Go and kick some of those demon dogs -- those Cerberi -- to death. Take off your shoes and any leg guards so you can feel the complete motion of your limbs.

<i>[You must have the empty Feet and Legs slots, and kill enemies with Kick abilities, to advance this quest.]</i>\"": "Sir Hughes, em Statehelm, disse: \"Vimos como você pode socar. Mas agora você precisa realmente testar seu poder de chute. Vá e chute alguns desses cães demoníacos - aqueles Cerberi - até a morte. Tire os sapatos e quaisquer protetores de perna para poder sentir o movimento completo de seus membros.

<i>[Você deve ter os espaços vazios para pés e pernas e matar inimigos com habilidades de chute para avançar nesta missão.]</i>\""
"Sir Hughes in Statehelm said, \"Well, I'm convinced you know how to handle yourself! Why don't you do some clean up work for us out in the field? I can pay you from one of the military funds. Win-win, and you'll still be getting better with your skills. Win-win-win!

Of course, I can't compensate you if you die. Be careful out there!\"": "Sir Hughes, em Statehelm, disse: \"Bem, estou convencido de que você sabe como se cuidar! Por que você não faz algum trabalho de limpeza para nós no campo? Posso pagar a você com um dos fundos militares. Vencer -ganhar, e você ainda estará melhorando com suas habilidades. Vencer-ganhar-ganhar!

Claro, não posso compensar você se você morrer. Tenha cuidado lá fora!\""
"Sir Hughes in Statehelm said, \"You want to get better at hand-to-hand combat fast? I know just the thing. Wrestle giant snakes. It works! Of course, you need a certain level of skill beforehand. That's why we don't use this technique with raw recruits. But  you're not raw, are you? Show me what you can do against the massive vipers in Povus.

<i>[You must have the Unarmed skill active to advance this quest.]</i>\"": "Sir Hughes em Statehelm disse: \"Você quer melhorar rapidamente no combate corpo a corpo? Eu sei exatamente o que é. Lutar contra cobras gigantes. Funciona! Claro, você precisa de um certo nível de habilidade de antemão. É por isso que não usamos essa técnica com recrutas inexperientes. Mas você não é inexperiente, não é? Mostre-me o que você pode fazer contra as enormes víboras em Povus.

<i>[Você deve ter a habilidade Desarmado ativa para avançar nesta missão.]</i>\""
"Sir Johnson em Amulna disse": "\\\"Você finalmente voltou. Estou guardando este para você! Já enviei meu segundo melhor localizador de xedrite, e ela voltou de mãos vazias e quase morta. Então é hora de mostre a eles por que você é o melhor! Há xedrite aí, além de algum inseto grande que o Vidente da Areia quer matar. Vá falar com ela primeiro. \\\"\""
"Sir Johnson in Amulna said, \\\"I've got a real easy one for you! This one's in the remains of 'New Argolis', the old R&R camp for Hegemony soldiers during the war. The Seer didn't go in, of course, but she said it smells like beer in there. I can't imagine it's still drinkable, though. Remember": "wine ages, but beer just goes bad after a few decades. Don't make yourself sick!\\\"\": \"<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache F-3'.]</i>"
"Sir Johnson in Amulna said, \\\"Let's get right to work. The Sand Seer has located a new war cache entrance. Follow this map. Remember": "the entrance isn't stable. You should be able to get inside and back out again, but don't expect to be able to go back a second time! The hole will collapse quickly. So you have one shot to get my Weaponized Xedrite!"
"Sir Johnson in Amulna said, \\\"So the drug you found out there, that Telka's Tits or whatever... it's garbage. Only works on rakkies! Most worthless drug since I got my hands on 'bounceweed'. But there's good news": "the stuff is made from the silk of the rare giant sand worm, and we think other, better drugs could be made from the same stuff. And I have a lead on a cache infested with 'em! If we're lucky, you can get some samples of their silk while you're getting my xedrite."
"Sir Johnson in Amulna said, \\\"We've got another war cache in that problematic spider area. The Sand Seer wants you to collect some legs from those wind spiders while you're in there. Here's the map. Remember": "spider legs are great and all, but don't leave without my Weaponized Xedrite!\\\"\": \"<i>[Para fins de relatório de bugs e feedback, você pode se referir a esta missão como 'War Cache T-2'.]</i>"
"Sir Taggart in Vidaria said, \"Back beyond the mass of ghouls you'll find even more dangerous undead: wizards! They wield fire and darkness alike.\"": "Sir Taggart em Vidaria disse: \"Além da massa de carniçais, você encontrará mortos-vivos ainda mais perigosos: magos! Eles controlam o fogo e as trevas.\""
"Sir Taggart in Vidaria said, \"If you're handy with a weapon, we could use help with the incessant waves of ghouls. Be careful -- they can overwhelm you!\"": "Sir Taggart em Vidaria disse: \"Se você tiver habilidade com uma arma, precisaríamos de ajuda com as ondas incessantes de carniçais. Tenha cuidado - eles podem dominá-lo!\""
"Sir Taggart in Vidaria said, \"There's also the issue of the so-called Invincible Bulwark skeletons. They're a huge problem. Be careful!\"": "Sir Taggart em Vidaria disse: \"Há também a questão dos chamados esqueletos do Baluarte Invencível. Eles são um grande problema. Tenha cuidado!\""
