"Lady Alethina in Red Wing Casino said, \"Far from here, on a freezing plateau in Gazluk, there is a city of orcs. Find this place and sneak into their keep. I need you to assassinate some important people... and creatures... for political reasons. This will be dangerous; bring allies that you trust. Here's a list of those who must die. Remember, all of these are on the top floor of the keep. You don't need to go into the lower level.\"": "Lady Alethina no Red Wing Casino disse: \"Longe daqui, em um planalto gelado em Gazluk, há uma cidade de orcs. Encontre este lugar e entre furtivamente em sua fortaleza. Preciso que você assassine algumas pessoas importantes... e criaturas... por razões políticas. Isso será perigoso; traga aliados em quem você confia. Aqui está uma lista daqueles que devem morrer. Lembre-se, todos eles estão no último andar da fortaleza. Você não precisa ir para o nível inferior. \""
"Lady Alethina in Red Wing Casino said, \"Head to Rahu and find a way into their sewer system. There is a problematic black-market poison merchant in the upper levels of the sewer; put an end to his evil schemes! Next, you'll need to figure out how to reach the lower levels of the place. I understand that there's a massive slime somewhere in the pipes and it's beginning to contaminate the city's water supply. If their water becomes unsafe, Rahu will be devastated and the area will become a warzone again. So go fix that. Finally, there is some sort of militant group of rat-people down there somewhere whose political alignment is problematic; depose their king and that should leave them in disarray.

The sewers are relatively safe, so you can scout things out on your own... but you're going to need friends to kill these targets! They're tougher than the rest of the stuff down there.\"": "Lady Alethina no Red Wing Casino disse: \"Vá para Rahu e encontre um caminho para o sistema de esgoto. Há um problemático comerciante de veneno no mercado negro nos níveis superiores do esgoto; acabe com seus esquemas malignos! Em seguida, você precisará descobrir como chegar aos níveis mais baixos do lugar. Eu entendo que há um lodo enorme em algum lugar nos canos e está começando a contaminar o abastecimento de água da cidade. Se a água deles se tornar insegura, Rahu será devastado e o a área se tornará uma zona de guerra novamente. Então, vá consertar isso. Finalmente, há algum tipo de grupo militante de ratos em algum lugar cujo alinhamento político é problemático e isso deve deixá-los em desordem.

Os esgotos são relativamente seguros, então você pode explorar as coisas por conta própria... mas você vai precisar de amigos para matar esses alvos! Eles são mais resistentes do que o resto das coisas lá embaixo.\""
"Lady Alethina in Red Wing Casino said, \"Head to the Ilmari desert and seek out the giant yellow crystals where the manticores live... and kill them! Manticores often have Hegemonic Storage Keys, which you'll need. Just keep killing manticores until you have at least five keys.

Next you must find the entrance to a massive bunker under the sand. It's southwest of the manticores. There are rakshasa bandits nearby, so torture them for information if you're lost.

Once inside, use the keys on the chests you'll find. Take careful note of what you find -- I need that intelligence for my report.

Along the way you'll meet a certain Striga who will prevent you from going downstairs. Definitely kill him. On the next floor, look for a minotaur named Asterion and kill him, too. He has something I need; bring it to me.

Remember not to go too far down -- once you go past the steward, you'll be on the correct floor to find Asterion.

Oh, and don't underestimate him. Asterion is FAR more dangerous than typical minotaurs.\"": "Lady Alethina no Red Wing Casino disse: \"Vá para o deserto de Ilmari e procure os cristais amarelos gigantes onde vivem as manticoras... e mate-os! As manticoras geralmente têm Chaves de Armazenamento Hegemônicas, das quais você precisará. Continue matando as manticoras até ter pelo menos cinco chaves.

Em seguida, você deve encontrar a entrada para um enorme bunker sob a areia. Fica a sudoeste das manticoras. Há bandidos rakshasa por perto, então torture-os para obter informações se você estiver perdido.

Uma vez lá dentro, use as chaves dos baús que você encontrará. Anote cuidadosamente o que você encontrar - preciso dessa informação para o meu relatório.

Ao longo do caminho você encontrará uma certa Striga que o impedirá de descer. Definitivamente mate-o. No próximo andar, procure um minotauro chamado Asterion e mate-o também. Ele tem algo que eu preciso; traga para mim.

Lembre-se de não descer muito - depois de passar pelo mordomo, você estará no andar correto para encontrar Asterion.

Ah, e não o subestime. Asterion é MUITO mais perigoso que os minotauros típicos.\""
"Lady Alethina in Red Wing Casino said, \"I have a new lead on the secret military force buried in the Ilmari desert! You're going to help me crack this once and for all. Head to the desert and find the bunker the locals call \"the labyrinth.\" It's south of Amulna, and rakshasa bandits are standing right near the entrance. Once you're underground, go down a few floors to the minotaur halls, then down again, and yet again. At the lowest floor of this place is a hag named Claudia. Kill her! Bring friends -- hags are no joke.

Claudia is said to have a vast treasure trove, which you can keep! All I need are the important documents that should be inside.

I understand there's some sort of mechanism that protects her treasure. Just figure it out and get it done.\"": "Lady Alethina no Red Wing Casino disse: \"Tenho uma nova pista sobre a força militar secreta enterrada no deserto de Ilmari! Você vai me ajudar a desvendar isso de uma vez por todas. Vá para o deserto e encontre o bunker que os locais chamam de \"labirinto\". este lugar é uma bruxa chamada Claudia. Mate-a! Traga amigos - bruxas não são brincadeira.

Dizem que Claudia tem um vasto tesouro que você pode guardar! Tudo que preciso são os documentos importantes que deveriam estar dentro.

Entendo que há algum tipo de mecanismo que protege o tesouro dela. Basta descobrir e fazer isso.\""
"Lady Alethina in Red Wing Casino said, \"I have an extremely difficult task today. You need to enter the fae realm near Sun Vale. There's a Winter ship in orbit there. Sneak aboard and take out some problems.\"": "Lady Alethina no Red Wing Casino disse: \"Tenho uma tarefa extremamente difícil hoje. Você precisa entrar no reino das fadas perto de Sun Vale. Há uma nave Winter em órbita lá. Entre furtivamente a bordo e resolva alguns problemas.\""
"Lady Alethina in Red Wing Casino said, \"I have heard terrifying tales of creatures deep beneath Gazluk Keep. I need you to investigate and correct these problems before they become severe. Bring allies! You'll need to trek deep into the lower level of the keep.

First, there is a 'productivity expert' that apparently achieves excellent results. We don't want them being productive, so fix that. Next, they have a massive urak pumping out eggs daily. That's got to stop!

Last, and most troubling, there is supposedly a demon hidden down there, summoned by foolish mages. They call it a 'gargoyle'. They do not understand how powerful it is. Slay it before it can open a portal and invade this world!\"": "Lady Alethina no Red Wing Casino disse: \"Ouvi histórias aterrorizantes de criaturas nas profundezas da Fortaleza Gazluk. Preciso que você investigue e corrija esses problemas antes que se tornem graves. Traga aliados! Você precisará caminhar profundamente no nível inferior da fortaleza.

Primeiro, existe um “especialista em produtividade” que aparentemente alcança resultados excelentes. Não queremos que eles sejam produtivos, então resolva isso. Em seguida, eles têm um urak enorme bombeando ovos diariamente. Isso tem que parar!

Por último, e mais preocupante, há supostamente um demônio escondido lá embaixo, convocado por magos tolos. Eles chamam isso de 'gárgula'. Eles não entendem o quão poderoso isso é. Mate-o antes que ele abra um portal e invada este mundo!\""
"Lady Alethina in Red Wing Casino said, \"I hope you're as good as you think you are, because this one is tricky. Enter the fae realm near Sun Vale. There's a Winter planeship there; sneak aboard. Then find some bird-creature named... Hmm, my notes say \"Coldfeather\" but there's also something called \"Hotfeather\" aboard. Kill them both, to be safe.

I also need you to open some of their storage chests and take note of the contents. You should be able to find keys aboard the ship. Good luck. Bring friends.\"": "Lady Alethina no Red Wing Casino disse: \"Espero que você seja tão bom quanto pensa que é, porque este é complicado. Entre no reino das fadas perto de Sun Vale. Há uma nave de inverno lá; esgueire-se a bordo. Em seguida, encontre alguma criatura pássaro chamada... Hmm, minhas anotações dizem \"Coldfeather\", mas também há algo chamado \"Hotfeather\" a bordo. Mate os dois, por segurança.

Também preciso que você abra alguns de seus baús e anote o conteúdo. Você deve conseguir encontrar as chaves a bordo do navio. Boa sorte. Traga amigos.\""
"Lady Rasheen was a fellow engineer with a whole lot more experience fixing portals. I wish she was here now, but she was killed by her own curiosity. She opened the tomb nearby and a skeleton climbed into her mind. Said the only way to cure it was to kill the skeleton, but we weren't strong enough. She died blubbering in the corner about how children were throwing fire at her. Very sad.

Anyway! Can you go kill that thing? She has a plush toy - bring it to me as evidence.": "Lady Rasheen era uma colega engenheira com muito mais experiência em consertar portais. Eu gostaria que ela estivesse aqui agora, mas ela foi morta pela sua própria curiosidade. Ela abriu a tumba próxima e um esqueleto subiu em sua mente. Disse que a única maneira de curar era matar o esqueleto, mas não éramos fortes o suficiente. Ela morreu chorando no canto sobre como as crianças estavam jogando fogo nela. Muito triste.

De qualquer forma! Você pode matar aquela coisa? Ela tem um brinquedo de pelúcia - traga-me como prova."
"Lady Windsong in Rahu said, \"The sewers connect to a cave system, and last year I noticed that some of the ratkins' snails had escaped and wandered into the caves. The ratkin didn't seem interested in recovering them, and I really want to know why. In this case I think the death of a few innocent snails is justified. Bring me a sample so that I can examine it.\"": "Lady Windsong em Rahu disse: \"Os esgotos se conectam a um sistema de cavernas, e no ano passado notei que alguns dos caracóis ratkins escaparam e vagaram pelas cavernas. Os ratkins não pareciam interessados ​​em recuperá-los, e eu realmente quero saber por quê. Neste caso, acho que a morte de alguns caracóis inocentes é justificada. Traga-me uma amostra para que eu possa examiná-la.\""
"Lady Windsong in Rahu said, \"There are crystals down in the sewer which remove filth, salt, and any other contaminants from the water. Quite amazing magic! But we do not know how long the magic will last, so each year we test the water. Can you do it this year?

Here is the special beaker I was given. I counted ten pools of water with functioning crystal fountains. Wade into each pool and test the water in the center of the room. The beaker will hum if the water is clean and screech horribly if there is a problem.\"": "Lady Windsong em Rahu disse: \"Existem cristais no esgoto que removem sujeira, sal e quaisquer outros contaminantes da água. Magia incrível! Mas não sabemos quanto tempo a magia vai durar, então todos os anos testamos a água. Você pode fazer isso este ano?

Aqui está o copo especial que me foi dado. Contei dez piscinas de água com fontes de cristal em funcionamento. Entre em cada piscina e teste a água no centro da sala. O copo irá zumbir se a água estiver limpa e chiar horrivelmente se houver algum problema.\""
"Lake Sturgeon Fillets": "Filetes de Esturjão do Lago"
"LakeSturgeonFillet": "Filé de Esturjão do Lago"
"Lakrea directed you to make yarn. There are Textiles recipes for creating yarn; complete yarn recipes twelve times (for a total of 24 balls of yarn).": "Lakrea orientou você a fazer fios. Existem receitas têxteis para a criação de fios; complete as receitas de fios doze vezes (para um total de 24 novelos de lã)."
