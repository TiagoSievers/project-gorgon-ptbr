"Druids aren't just tree-lovers. We're deeply invested in the balance of nature, and that's not always pretty. Not to non-druids, anyway. I'll show you - the spiders near here sometimes feed on small shore birds. Bring me some of the prey feathers.": "Os druidas não são apenas amantes de árvores. Investimos profundamente no equilíbrio da natureza, e isso nem sempre é bonito. Pelo menos não para não-druidas. Vou lhe mostrar: as aranhas daqui às vezes se alimentam de pequenos pássaros costeiros. Traga-me algumas das penas da presa."
"Druids, assemble in Serbule immediately. Multiple kraken eggs have been spotted there, along with several young adults. Krakens are not indigenous to this continent and represent a terrible threat to nature. Defeat them now, before they become the size of cities!": "Druidas, reúnam-se em Serbule imediatamente. Vários ovos de kraken foram vistos lá, junto com vários adultos jovens. Os Krakens não são indígenas deste continente e representam uma terrível ameaça à natureza. Derrote-os agora, antes que se tornem do tamanho de cidades!"
"Druids, head to Serbule Hills! Ranalons there have begun a ritual invocation of Enoyos, beseeching him to turn all the lakes of Serbule into brackish water.

Their stone offering-boxes surround the lake. Desecrate these boxes to disrupt the ritual, then find and slay the head shamans that swim in the lake itself.

The offering-boxes are strongly enchanted, so multiple druids will need to desecrate each one. Since the desecration ritual requires the petals of the rare Rotflower, I have caused this flower to bloom throughout the hills and mountains of Serbule Hills.

Find the Rotflowers, desecrate the offering chests, then execute the shamans.": "Druidas, vão para Serbule Hills! Lá, Ranalons iniciou um ritual de invocação de Enoyos, suplicando-lhe que transformasse todos os lagos de Serbule em água salobra.

Suas caixas de oferendas de pedra cercam o lago. Profane essas caixas para interromper o ritual e, em seguida, encontre e mate os xamãs-chefes que nadam no próprio lago.

As caixas de oferendas são fortemente encantadas, então vários druidas precisarão profanar cada uma delas. Como o ritual de profanação requer as pétalas da rara Rotflower, fiz com que esta flor florescesse pelas colinas e montanhas das Colinas Serbule.

Encontre os Rotflowers, profane os baús de oferendas e execute os xamãs."
"DruidScripted": "DruidaScripted"
"Drummond Stonecurl in Vidaria said, \"I haven't been entirely honest with you, and ever since my outburst about the orc I've been thinking that I should be more open. So, here it goes...

I <i>am</i> related to Gloria Stonecurl. She is my sister. I have not seen her in an age, mostly because... well, I don't want to get into it right now. But if you happen upon her in your travels, would you tell her that her wee old brother sends his regards?\"": "Drummond Stonecurl em Vidaria disse: \"Não fui totalmente honesto com você e, desde minha explosão sobre o orc, tenho pensado que deveria ser mais aberto. Então, aqui vai...

Eu <i>sou</i> parente de Gloria Stonecurl. Ela é minha irmã. Faz muito tempo que não a vejo, principalmente porque... bem, não quero entrar nisso agora. Mas se você encontrar ela em suas viagens, você diria a ela que seu irmão mais velho manda lembranças?"
"Drummond Stonecurl in Vidaria said, \"I owe you an apology. When you asked if I would collaborate with that orc on technology, I lost my temper. Hrmph. I actually <i>do</i> quite enjoy tinkering, and mining, and all the other stereotypical dwarven activities. I just hate when others presume that about me.

Please, return to your orcish friend and tell them I am willing to collaborate.\"": "Drummond Stonecurl em Vidaria disse: \"Devo-lhe desculpas. Quando você perguntou se eu colaboraria com aquele orc em tecnologia, perdi a paciência. Hrmph. Na verdade, gosto bastante de consertar, minerar e todas as outras atividades estereotipadas dos anões. Eu simplesmente odeio quando os outros presumem isso sobre mim.

Por favor, retorne ao seu amigo orc e diga-lhe que estou disposto a colaborar.\""
"Drummond Stonecurl in Vidaria said, \"I wonder if there's any new discoveries about the demons. If you could bring me some more demonic research, I'd be grateful.\"": "Drummond Stonecurl em Vidaria disse: \"Gostaria de saber se há alguma nova descoberta sobre os demônios. Se você pudesse me trazer mais pesquisas demoníacas, ficaria grato.\""
"Drummond Stonecurl in Vidaria said, \"We don't have a wide variety of ingredients in this area, but we do have one thing that's unique: a bunch of infernal creatures. I've heard, mostly from Denton, that there are non-demons nearby that are studying the demons. Their research may prove useful in the culinary world. Or at least, in <i>my</i> culinary world.

Bring me some of this demonic research so I can see if any of it is useful.\"": "Drummond Stonecurl, em Vidaria, disse: \"Não temos uma grande variedade de ingredientes nesta área, mas temos uma coisa que é única: um monte de criaturas infernais. Ouvi dizer, principalmente de Denton, que há não-demônios por perto que estão estudando os demônios. Sua pesquisa pode ser útil no mundo culinário. Ou pelo menos, no <i>meu</i> mundo culinário.

Traga-me algumas dessas pesquisas demoníacas para que eu possa ver se alguma delas é útil.\""
