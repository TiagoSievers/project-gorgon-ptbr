"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Leather suit and I will see what I can do to help you flourish at your craft!\"": "Tantai disse: \"Quer trocar algum conhecimento para aprimorar suas habilidades? Traga-me um terno de couro decente completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!\""
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Leather suit and I will see what I can do to help you flourish at your craft!\"": "Tantai disse: \"Quer trocar algum conhecimento para aprimorar suas habilidades? Traga-me um terno de couro de qualidade completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício!\""
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Leather suit and I will see what I can do to help you flourish at your craft!  I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\"": "Tantai disse: \"Quer trocar algum conhecimento para progredir em suas habilidades? Traga-me um traje de couro áspero completo e verei o que posso fazer para ajudá-lo a prosperar em seu ofício! Eu só quero a versão encantada do traje... Eu não lido com porcarias não encantadas!\""
