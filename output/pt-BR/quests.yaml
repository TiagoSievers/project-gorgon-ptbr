"Hi There! I'm fairly new to the caravan! So you like making jewelry too? Let's swap some ideas! Bring me 5 Nice Magic Rings and 5 Nice Enchanted Necklaces. Once I can go over your stuff, I'll share some of what I know too!": "Olá! Sou bastante novo na caravana! Então você também gosta de fazer joias? Vamos trocar algumas ideias! Traga-me 5 lindos anéis mágicos e 5 lindos colares encantados. Assim que eu puder revisar suas coisas, compartilharei um pouco do que sei também!"
"Hi There! I'm fairly new to the caravan! So you like making jewelry too? Let's swap some ideas! Bring me 5 Nice Magic Rings and 5 Nice Enchanted Necklaces. Once I can go over your stuff, I'll share some of what I know too!

": "Olá! Sou bastante novo na caravana! Então você também gosta de fazer joias? Vamos trocar algumas ideias! Traga-me 5 lindos anéis mágicos e 5 lindos colares encantados. Assim que eu puder revisar suas coisas, compartilharei um pouco do que sei também!"
"Hi there! Ready for some combat training? Let's get to it! A skilled rabbit should be able to take down any predator without difficulty, no matter big they are or how many there are! Get out there and show me what you got! Take down 20 Mot-Uraks, 20 Polar Bears and 20 Starving Tundra Wolves. Remember that you must complete this task in rabbit form. No cheating! Report back to me when you're done and I'll load you up with some more bunny juices.": "Olá! Pronto para algum treinamento de combate? Vamos lá! Um coelho habilidoso deve ser capaz de derrubar qualquer predador sem dificuldade, não importa o tamanho ou quantos sejam! Vá lá e me mostre o que você tem! Derrube 20 Mot-Uraks, 20 Ursos Polares e 20 Lobos Famintos da Tundra. Lembre-se de que você deve completar esta tarefa na forma de coelho. Sem trapaça! Volte para mim quando terminar e eu lhe carregarei com mais sucos de coelho."
"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Blood Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?": "Olá! O cassino oferece ótimas bebidas, mas estou morrendo de vontade de comer um smoothie de cogumelos! Você poderia me trazer 10 Smoothies de Cogumelo Sanguíneo? Não! Não vou beber todos de uma vez. O que você acha que eu sou... um anão?"
