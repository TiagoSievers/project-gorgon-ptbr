Cajole: verb: to persuade someone to do something with flattery or promises.

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'persuasão' em sua próxima conversa.

Cajole: verbo: persuadir alguém a fazer algo com bajulação ou promessas.

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
"Lakrea told you to work the word 'confidant' into your next conversation.

Confidant: noun: a person entrusted with secrets, such as a friend or co-conspirator. Note: do not confuse with the word 'confident', which is totally different.

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'confidente' em sua próxima conversa.

Confidente: substantivo: uma pessoa a quem são confiados segredos, como um amigo ou co-conspirador. Obs: não confunda com a palavra ‘confiante’, que é totalmente diferente.

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
"Lakrea told you to work the word 'impetus' into your next conversation.

Impetus: the force that makes something happen. e.g. 'A vicious goblin attack was the impetus for the new anti-goblin law.'

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'ímpeto' em sua próxima conversa.

Impulso: a força que faz algo acontecer. por exemplo 'Um ataque cruel de duendes foi o ímpeto para a nova lei anti-goblin.'

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
"Lakrea told you to work the word 'jocular' into your next conversation.

Jocular: adjective: given to jesting, habitually jolly or playful. e.g. 'He was in a jocular mood yesterday.'

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'jocular' em sua próxima conversa.

Jocular: adjetivo: dado a brincadeira, habitualmente alegre ou brincalhão. por exemplo 'Ele estava com um humor jocoso ontem.'

(Observação: se você usar a palavra fora do contexto, o jogo não saberá, mas <i>você</i> saberá que perdeu 10.000 Pontos de Roleplay.)"
"Lakrea told you to work the word 'maladaptive' into your next conversation.

