"Percussa in Rahu said, \"Do you like my clothes? A wandering elven bard taught me how to make them! They're much stronger than they look, too. One of the secrets is spider silk, a cloth that's made from spiderwebs. I buy it from Shirogin, but he's been out of stock for months. If you find some spider silk, I'd love to buy it from you.\"": "Percussa em Rahu disse: \"Você gosta das minhas roupas? Um bardo élfico errante me ensinou como fazê-las! Elas também são muito mais fortes do que parecem. Um dos segredos é a seda de aranha, um tecido feito de teias de aranha. Eu compro de Shirogin, mas ele está fora de estoque há meses. Se você encontrar alguma seda de aranha, adoraria comprá-la de você. \""
"Percussa in Rahu said, \"I like to make my own drums so I can get exactly the sound i need. My newest drum needs to have a perfect resonance, and for that, I need really great animal skin! Don't tan it -- I know it'll stink, but bring me the untanned hide. I need to process it myself in a special way. I'll pay you for the work!\"": "Percussa em Rahu disse: \"Gosto de fazer minha própria bateria para poder obter exatamente o som que preciso. Minha bateria mais nova precisa ter uma ressonância perfeita e, para isso, preciso de uma pele de animal realmente ótima! Não a curti - sei que vai cheirar mal, mas traga-me a pele não curtida. Preciso processá-la eu mesmo de uma maneira especial. Pagarei pelo trabalho!\""
"Percussa in Rahu said, \"I was hired to play at a wedding, and I need good publicity, so this gig has to be great! The requested music is not a problem since I'm amazing. But these foreigners have a weird custom: near the end of the ritual, rice is thrown at the couple. I asked if balls of ordinary Rahu rice would do, and they said no -- they're too heavy! So I guess that I'll need secret rice. You know: the incredibly deliciously fluffy rice that can't be found in stores. The trick is: how do I get some? Do you have any?\"": "Percussa em Rahu disse: \"Fui contratado para tocar em um casamento e preciso de boa publicidade, então esse show tem que ser ótimo! A música solicitada não é um problema, já que sou incrível. Mas esses estrangeiros têm um costume estranho: perto do final do ritual, arroz é jogado no casal. Perguntei se bolinhos de arroz Rahu comum serviriam, e eles disseram que não - são muito pesados! Então acho que vou precisar de arroz secreto. Você sabe: o arroz incrivelmente deliciosamente fofo que não pode ser encontrado nas lojas. O truque é: como consigo alguns?"
"Percy Evans in Eltibule said, \"I need you to help me reincarnate Lydia. Her soul is still trapped in this bauble you retrieved for me, but I think I can get her a new body. How? Well... don't ask me how I got a hold of this ritual, because that would make you sad. Instead, just help me bring her back! I need some very specific ingredients. Lord Eltibule is buried with one part. The other parts might be harder to find... but you're resourceful, you can do it!\"": "Percy Evans em Eltibule disse: “Preciso que você me ajude a reencarnar Lydia. A alma dela ainda está presa nesta bugiganga que você recuperou para mim, mas acho que posso conseguir um novo corpo para ela. engenhoso, você consegue!\""
"Percy Evans in Eltibule said, \"When I beseeched Talerra, she told me what I'd somehow known all along: my Lydia didn't fade into blessed nothing. The thing that killed her captured her soul and keeps it as a trinket.

I'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.\"": "Percy Evans em Eltibule disse: \"Quando implorei a Talerra, ela me disse o que eu sempre soube: minha Lydia não desapareceu no nada abençoado. A coisa que a matou capturou sua alma e a mantém como uma bugiganga.

Não posso salvá-la: ela está naquele maldito reino das fadas, mas não é acessível pelo portal que conheço. Deve haver alguma outra maneira de entrar. Se você encontrar o caminho, mate todos os demônios que puder! Procure por uma cobra flutuante chamada Despair Puck. Terá a alma de Lydia.\""
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.

I also need something to inhibit my memories of despair... it makes the Juice last longer. Some ditzy elf gave me a few bottles last week, but she said she can't make enough to keep me going. Elves: always flaking out when you need 'em! Ahem... no offense to you and your friends, of course.\"": "Percy Evans em Eltibule disse: \"Você tem muitos amigos, certo? Preciso de sua ajuda rápido ou não conseguirei. Quando a lua era nova, chamei Talerra para descobrir para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não posso ter esperança por um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas fico quase catatônico quando o efeito passa. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo. Mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior.

Também preciso de algo para inibir minhas lembranças de desespero... faz o Suco durar mais. Uma elfa estúpida me deu algumas garrafas na semana passada, mas disse que não consegue fazer o suficiente para me sustentar. Elfos: sempre desmaiando quando você precisa deles! Ahem... sem ofensa para você e seus amigos, é claro.\""
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\"": "Percy Evans em Eltibule disse: \"Você tem muitos amigos, certo? Preciso de sua ajuda rápido ou não conseguirei. Quando a lua era nova, chamei Talerra para descobrir para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não posso ter esperança por um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas fico quase catatônico quando o efeito passa. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo. Mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior.\""
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.

I know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but when it wears off I go almost catatonic. Last time that happened, I almost died of dehydration before Hogan happened to stop by.

So I try to keep it in my system at all times, but I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.

I also need something to inhibit my memories... there's a potion that does it, but damned if I can get a steady supply of it. But any amount is helpful.

Oh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.\"": "Percy Evans em Eltibule disse: \"Você tem muitos amigos, certo? Preciso de sua ajuda rápido ou não conseguirei. Quando a lua era nova, chamei Talerra para descobrir para onde foi a alma de minha esposa. Ela me respondeu! E agora pago o preço habitual: não posso ter esperança por um ano inteiro.

Eu sei que parece tolice, mas pensei que a tinha enganado ao estocar suco Pick-Me-Up. Enquanto estou tomando suco, posso sentir alguma esperança, mas quando passa, fico quase catatônico. Da última vez que isso aconteceu, quase morri de desidratação antes de Hogan passar por aqui.

Então tento mantê-lo em meu sistema o tempo todo, mas nunca fui muito bom em matemática e algumas centenas de garrafas não duram nem perto de um ano! Preciso de um suprimento maior.

Eu também preciso de algo para inibir minhas memórias... há uma poção que faz isso, mas dane-se se consigo um suprimento constante dela. Mas qualquer quantia é útil.

Ah, e eu ficaria muito grato se você pudesse limpar alguns daqueles malditos ursos-fadas! Não consegui diminuir o número deles recentemente.\""
"Percy in Eltibule asked you to talk to a goblin named Jumjab on behalf of his dead wife. You'll need to know some Goblinese to do so.": "Percy em Eltibule pediu para você falar com um goblin chamado Jumjab em nome de sua falecida esposa. Você precisará conhecer alguns Goblineses para fazer isso."
"Percy in Eltibule encouraged you to kill Bear Groupies near The Mangler.": "Percy em Eltibule encorajou você a matar Bear Groupies perto de The Mangler."
"Percy in Eltibule has asked for saltpeter. He intends to use it to blow up a portal.": "Percy em Eltibule pediu salitre. Ele pretende usá-lo para explodir um portal."
"Percy? Old human near the fairy bears? Ugh. Wants me to tell him his dead wife is \"at peace.\" Tell him I'll come by, but it will cost him. I've sensed his wife's spirit. She's not \"at peace.\" But I'll think of something to tell him...": "Percy? Velho humano perto dos ursos-fadas? Eca. Quer que eu diga a ele que sua falecida esposa está \"em paz\". Diga a ele que passarei por aqui, mas isso lhe custará caro. Senti o espírito de sua esposa. Ela não está \"em paz\". Mas vou pensar em algo para contar a ele..."
