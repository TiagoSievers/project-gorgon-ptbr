"Franklin Mallus in Statehelm said, \"I lost my lucky balaclava. Now my head is cold in the mornings. This makes me sad.\"": "Franklin Mallus, em Statehelm, disse: \"Perdi minha balaclava da sorte. Agora minha cabeça fica fria pela manhã. Isso me deixa triste.\""
"Franklin Mallus in Statehelm said, \"My wife Ariadne works at one of the vendor stalls. The hours are terrible and the pay is awful and I feel bad for her. I want to visit and drop of her favorite lunch, Broccoli Squash Bake. But I can't cook. This makes me sad.\"": "Franklin Mallus, em Statehelm, disse: \"Minha esposa Ariadne trabalha em uma das barracas de vendedores. O horário é péssimo e o salário é péssimo e me sinto mal por ela. Quero visitá-la e deixar seu almoço favorito, Assado de Abóbora com Brócolis. Mas não sei cozinhar. Isso me deixa triste.\""
"Fransesca Muradrake in Statehelm said, \"As we -- well, as <i>I</i> learned during our ritual, my husband was murdered by a goblin sage named Grosark, who is trapped in Steven's laboratory deep inside the Statehelm Crypt.

Here: the key to his lab. Go and take care of the issue.

Grosark is in a largely incorporeal state, but the lab has a mechanism for dealing with this. Activate the lamps in the four corners of the lab, and he will be forced to apparate. You will need some tea lights for the lamps; don't forget to bring them with you!\"": "Fransesca Muradrake em Statehelm disse: \"Como nós - bem, como <i>eu</i> aprendi durante nosso ritual, meu marido foi assassinado por um sábio goblin chamado Grosark, que está preso no laboratório de Steven, nas profundezas da Cripta de Statehelm.

Aqui: a chave do seu laboratório. Vá e cuide do problema.

Grosark está em grande parte incorpóreo, mas o laboratório tem um mecanismo para lidar com isso. Ative as lâmpadas nos quatro cantos do laboratório e ele será forçado a aparatar. Você precisará de algumas lamparinas para as lâmpadas; não se esqueça de trazê-los com você!\""
"Fransesca Muradrake in Statehelm said, \"I do appreciate what you've done to stop Grosark. But I've bad news: what you slew was merely Grosark's bodily husk, a sort of meat puppet that he wore because he didn't realize that liches don't need them. But the good news is that he doesn't know enough about his powers to be particularly dangerous to our realm yet. Some of his soul is in Acur, and the rest of it is trapped here, bodiless, in what is called an astral state.

But the bad news is that he can escape this state easily if he only knew how, and he is researching furiously. I've detected his presence near the ivory library. He can't get in, of course, even in astral form, but it shows that he knows what he needs. It's only a matter of time.

But the good news is that long ago I researched the perfect ritual for this situation. The Statehelm graveyard may seem an ordinary one, but it was actually configured by the Council to support extreme necromantic rituals. You can use that place to pull Grosark into our realm now, while he is weak and confused. It's the only way. Aside from the myriad other ways, of course, but it's the only way I recommend.

Here are the notes. Follow them diligently. And bring a friend. No, bring an army! No, that would be chaos. Bring between five and fifteen friends.

Oh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.\"": "Fransesca Muradrake em Statehelm disse: \"Eu aprecio o que você fez para impedir Grosark. Mas tenho más notícias: o que você matou foi apenas a casca corporal de Grosark, uma espécie de fantoche de carne que ele usava porque não percebeu que os liches não precisam deles. Mas a boa notícia é que ele ainda não sabe o suficiente sobre seus poderes para ser particularmente perigoso para o nosso reino. Parte de sua alma está em Acur, e o resto dela está preso aqui, sem corpo, no que é chamado de estado astral.

Mas a má notícia é que ele pode escapar facilmente desse estado se souber como, e está pesquisando furiosamente. Detectei a presença dele perto da biblioteca de marfim. Ele não consegue entrar, é claro, nem mesmo na forma astral, mas isso mostra que ele sabe do que precisa. É apenas uma questão de tempo.

Mas a boa notícia é que há muito tempo pesquisei o ritual perfeito para esta situação. O cemitério de Statehelm pode parecer comum, mas na verdade foi configurado pelo Conselho para apoiar rituais necromânticos extremos. Você pode usar esse lugar para trazer Grosark para o nosso reino agora, enquanto ele está fraco e confuso. É a única maneira. Além de inúmeras outras maneiras, é claro, mas é a única que recomendo.

Aqui estão as notas. Siga-os diligentemente. E traga um amigo. Não, traga um exército! Não, isso seria um caos. Traga entre cinco e quinze amigos.

Ah! Você precisará de uma vela de invocação. Você pode fazê-los? Não, deixa pra lá, deixe-me ensinar exatamente como fazer isso com segurança. Não faz sentido transformar você em um pudim ectoplasmático. É uma vela relativamente simples... Espero que você conheça uma estação de fabricação de velas. Há um convenientemente localizado na cripta.\""
"Fransesca Muradrake in Statehelm said, \"Let's start with something easy that any novice should be able to manage. Fetch me fresh gravebloom. We're fortunate that it grows in the graveyard just outside of town.

Of course, you know that it only blooms at night.\"": "Fransesca Muradrake, em Statehelm, disse: \"Vamos começar com algo fácil que qualquer novato deve ser capaz de fazer. Traga-me flores frescas. Temos sorte de que ela cresça no cemitério nos arredores da cidade.

Claro, você sabe que ela só floresce à noite.\""
"Fransesca Muradrake in Statehelm said, \"You seem trustworthy enough. Here, this unlocks a very dangerous chamber inside the Statehelm Crypt. This area is off-limits to most. My husband's private laboratory lies past that point. But you needn't delve so far today. My husband loved unusual necromantic creations, and the crypt is full of his menagerie. I need some thrice-cursed beaks, and there are bird-creatures in there that contain one.

Here is the most important detail: you must kill them with darkness damage. Otherwise it would only be a twice-cursed beak.

<i>[The killing blow must be Darkness damage.]</i>\"": "Fransesca Muradrake em Statehelm disse: \"Você parece confiável o suficiente. Aqui, isso abre uma câmara muito perigosa dentro da cripta de Statehelm. Esta área está fora dos limites para a maioria. O laboratório particular do meu marido fica além desse ponto. Mas você não precisa se aprofundar tanto hoje. Meu marido adorava criações necromânticas incomuns, e a cripta está cheia de seu zoológico. Preciso de alguns bicos três vezes amaldiçoados, e há criaturas pássaros lá dentro que contém um.

Aqui está o detalhe mais importante: você deve matá-los com dano de escuridão. Caso contrário, seria apenas um bico amaldiçoado duas vezes.

<i>[O golpe mortal deve ser dano de Escuridão.]</i>\""
