"So... Cold...": "Então... Frio..."
"So... my grandmother had a cruel sense of humor. I've been trying to grow a Sampo from her ancient notes - it's supposed to create gold from salt! But instead I grew a Salmpo. You know, the walking plant monster? It's horribly dangerous. Can you kill it for me? It's deep in the wilderness, south of town.": "Então... a minha avó tinha um sentido de humor cruel. Tenho tentado cultivar um Sampo a partir de suas notas antigas - supostamente ele cria ouro a partir do sal! Mas em vez disso, criei um Salmpo. Você sabe, o monstro planta ambulante? É terrivelmente perigoso. Você pode matá-lo para mim? Fica no meio do deserto, ao sul da cidade."
"So...Cold...": "Então... Frio..."
"So? That's it? No mangled limbs or ripped-off faces to show for it? I guess the bears should be easy, then! Thanks for doing the research for me. Oh, you need a payment... hmm... here! These are for you.": "Então? É isso? Nenhum membro mutilado ou rosto arrancado para mostrar isso? Acho que os ursos deveriam ser fáceis, então! Obrigado por fazer a pesquisa para mim. Ah, você precisa de um pagamento... hmm... aqui! Estes são para você."
