"We are low on our diagnostic supplies and need to restock. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Carbon-form Scrutinizer Arrays to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.": "Estamos com poucos suprimentos de diagnóstico e precisamos reabastecer. Claro, poderíamos fazê-los nós mesmos, mas não queremos roubar toda a diversão!  Se você tivesse a gentileza de me entregar 10 matrizes de escrutinadores em forma de carbono, eu ficaria eternamente grato! Honestamente, estamos com poucos materiais, mas posso ajudá-lo a avançar em sua arte em troca de seus problemas."
