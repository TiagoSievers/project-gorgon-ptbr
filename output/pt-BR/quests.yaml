"Trekker in Gazluk said, \"Am I glad to see you! This one's too tough for me. Apparently the orcs of Gazluk Keep have a barghest breeding program, and last night they released their excess animals. Suddenly there's hundreds of barghests south of the keep! And they're hungry. We can't let them settle up here or they'll destroy the delicate ecosystem, and eat me.

Don't worry, these aren't true barghests -- these are just animals. Big dogs! You can take 'em! I mean, I can't, but you can!\"": "Trekker em Gazluk disse: “Estou feliz em ver você!

Não se preocupe, estes não são verdadeiros barghests - são apenas animais. Cachorros grandes! Você pode pegá-los! Quer dizer, eu não posso, mas você pode!\""
"Trekker in Gazluk said, \"I'm so glad you could make it! It's mummies!

I was patrolling near the mouth of Foothills Cave in the far northwest, and mummies were pouring out! At first I thought they were activated by some evil necromancer, but they aren't marching anywhere. They're... well, they're just wandering around killing things. And they're trampling the delicate vegetation! And also they're fucking MUMMIES! I don't even know how to kill a mummy. I'm just a pig. I didn't sign up for this!\"": "Trekker em Gazluk disse: \"Estou tão feliz que você conseguiu vir! São múmias!

Eu estava patrulhando perto da entrada da Caverna Foothills, no extremo noroeste, e múmias estavam aparecendo! A princípio pensei que tivessem sido ativados por algum necromante maligno, mas não estão marchando para lugar nenhum. Eles estão... bem, eles estão apenas vagando por aí matando coisas. E estão pisoteando a delicada vegetação! E também são múmias de merda! Eu nem sei como matar uma múmia. Eu sou apenas um porco. Eu não me inscrevi para isso!\""
"Trekker in Gazluk said, \"Psst... you're with the Wardens? Whew! I was hoping backup would arrive!

A few days ago, teams of orcs from Gazluk Keep were up here clearing out their secret system of mountain trails. And today we found out that there are now hundreds of slimes in the southern valley! That has to be connected. Right?

Sometimes ice slimes fall down the mountain, but not in numbers like this. The animals that live in the valley don't know how to avoid ice slimes. They're sitting ducks! And deer, and goats, and other animals! Not to mention those dwarves that live in the New Prestonbule cave. Please help me lower the number of ice slicks down there!\"": "Trekker em Gazluk disse: \"Psiu... você está com os Guardiões? Uau! Eu esperava que chegassem reforços!

Há alguns dias, equipes de orcs do Forte Gazluk estiveram aqui limpando seu sistema secreto de trilhas nas montanhas. E hoje descobrimos que existem centenas de limos no vale sul! Isso tem que estar conectado. Certo?

Às vezes, limos de gelo caem da montanha, mas não em números como este. Os animais que vivem no vale não sabem como evitar a gosma gelada. Eles são alvos fáceis! E veados, cabras e outros animais! Sem mencionar aqueles anões que vivem na caverna de New Prestonbule. Por favor, ajude-me a diminuir o número de manchas de gelo lá embaixo!\""
"Tremmond Blackhammer in Povus said, \"Back when Povus was growing, we had good relations with certain individual orcs. There is one orc who might help me learn the secrets of orcish armorsmithing: Brugo. He calls himself Brugo The Wise. I understand he's still in the area, although not in the orc camp. See if you can find him. See if he'll teach his secrets.\"": "Tremmond Blackhammer em Povus disse: \"Quando Povus estava crescendo, tínhamos boas relações com certos orcs individuais. Há um orc que pode me ajudar a aprender os segredos da forja de armaduras orcs: Brugo. Ele se autodenomina Brugo, o Sábio. Eu entendo que ele ainda está na área, embora não no acampamento orc. Veja se você consegue encontrá-lo. Veja se ele vai ensinar seus segredos. \""
"Tremmond Blackhammer in Povus said, \"I have the parts I need for my auto-clamp, but... Well, it's been a few decades since I made anything like this. I'm trying to remember how it's done. I <i>think</i> I just need a T crystal, which I have on-hand... But what if I actually need an L crystal? In that case, we're looking at a pretty dangerous explosion when I plug in the wrong part.

I'm not really prepared for that sort of chemical fire here, because... oh, nevermind, trying to explain myself to you is worse than talkin' to a child.

Here's what I need: a nice fae blanket. Like the fairies in Statehelm sell sometimes. Or just make one. You know how to make one, right? You just sew up the edges of some fae silk. Simple as that!\"": "Tremmond Blackhammer em Povus disse: \"Tenho as peças que preciso para minha fixação automática, mas... Bem, já se passaram algumas décadas desde que fiz algo assim. Estou tentando lembrar como é feito. Acho que só preciso de um cristal T, que tenho em mãos... Mas e se eu realmente precisar de um cristal L? Nesse caso, estamos diante de uma explosão muito perigosa quando conecto a parte errada.

Não estou realmente preparado para esse tipo de incêndio químico aqui, porque... ah, deixa pra lá, tentar me explicar para você é pior do que conversar com uma criança.

Aqui está o que eu preciso: um lindo cobertor feérico. Como as fadas em Statehelm vendem às vezes. Ou apenas faça um. Você sabe como fazer um, certo? Você acabou de costurar as bordas de um pouco de seda fada. Simples assim!\""
"Tremmond Blackhammer in Povus said, \"I'm making some armor as a gift for my niece Stephie. It's a new neck-guard for the suit I made her.

I need some parts, and I can't ask Stephie to get them for me or she'd know my plan. Can you do it? I'll give you some xogrite.\"": "Tremmond Blackhammer em Povus disse: “Estou fazendo uma armadura como presente para minha sobrinha Stephie. É um novo protetor de pescoço para o terno que fiz para ela.

Preciso de algumas peças e não posso pedir a Stephie que as compre para mim ou ela saberia meu plano. Você pode fazer isso? Vou te dar um pouco de xogrite.\""
"Tremmond Blackhammer in Povus said, \"I'm no gadgeteer or trinket-smith, but I was thinking about building a simple automated holder-arm. Nothin' fancy, just something a little smarter than a C-clamp!

I don't want to ask Stephie for the parts, though, because that would go on our ledger. This isn't business, it's just an old dwarf messin' around! ... Say, maybe you could help me out? Here's some of the stuff I need. There's more, but this is the hard stuff.\"": "Tremmond Blackhammer em Povus disse: \"Não sou um engenheiro ou ferreiro, mas estava pensando em construir um braço de suporte automatizado simples. Nada sofisticado, apenas algo um pouco mais inteligente do que uma pinça C!

Mas não quero pedir as peças à Stephie, porque isso iria para o nosso livro-razão. Isto não é negócio, é apenas um velho anão brincando! ... Diga, talvez você possa me ajudar? Aqui estão algumas das coisas que preciso. Há mais, mas esta é a parte difícil.\""
"Tremmond Blackhammer in Povus said, \"The orcs have special armor techniques that even I don't know... and I deserve to know them!

That greenskin girl can forge. I've seen her making parts for her cages: she handles a hammer like a pro. So why won't she tell me how to make orcish armor?!

Why don't you try? See if she'll tell you anything.\"": "Tremmond Blackhammer em Povus disse: “Os orcs têm técnicas de armadura especiais que nem eu conheço... e eu mereço conhecê-las!

Aquela garota de pele verde pode forjar. Já a vi fazendo peças para suas gaiolas: ela maneja um martelo como uma profissional. Então por que ela não me conta como fazer uma armadura orc?!

Por que você não tenta? Veja se ela lhe conta alguma coisa.\""
"Tremond Rockhammer in Statehelm said, \"Hey, it's you! What a bit of luck. I need more specialized armor stakes. Can you bang these out today? Expert-quality, but with a peened head.\"": "Tremond Rockhammer em Statehelm disse: \"Ei, é você! Que sorte. Preciso de estacas de armadura mais especializadas. Você pode fazer isso hoje? Qualidade de especialista, mas com a cabeça afiada.\""
"Tremond Rockhammer in Statehelm said, \"I was looking for you! Got a real tricky one for you this time. Masterworks, but with a slight intentional weak spot here and here. Never you mind what they're for, just make them to this specification and I'll pay well.\"": "Tremond Rockhammer em Statehelm disse: \"Eu estava procurando por você! Desta vez, tenho um muito complicado para você. Obras-primas, mas com um leve ponto fraco intencional aqui e aqui. Não importa para que servem, apenas faça-os de acordo com esta especificação e eu pagarei bem. \""
"Tremond Rockhammer in Statehelm said, \"I've been sent out as a gofer. Pretty insulting to my skills but you gotta take it on the chin sometimes when you work with humans. They're not exactly good at manners and shit. Problem is, though, that I can't find what I need: I need some pretty good armor stakes but with an extra thumbspan's length on the end. Say, are you a smith? You could whip them up for me.\"": "Tremond Rockhammer, em Statehelm, disse: \"Fui enviado como servo. Muito insultuoso para minhas habilidades, mas às vezes você tem que levar isso na cara quando trabalha com humanos. Eles não são exatamente bons em boas maneiras e essas merdas. O problema é, porém, que não consigo encontrar o que preciso: preciso de algumas estacas de armadura muito boas, mas com um comprimento extra de polegar na ponta. Diga, você é um ferreiro? Você poderia prepará-las para mim. \""
