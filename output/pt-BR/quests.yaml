"Aquela garota de pele verde pode forjar. Já a vi fazendo peças para suas gaiolas": "ela maneja um martelo como uma profissional. Então por que ela não me conta como fazer uma armadura orc?!"
"Aqui": "como prometido, riquezas para uma vida inteira! Bem, vale a pena uma vida inteira se você viver muito, muito frugalmente. Ou morra muito em breve.\""
"Aqui está o detalhe mais importante": "você deve matá-los com dano de escuridão. Caso contrário, seria apenas um bico amaldiçoado duas vezes."
"Aqui está o que eu preciso": "um lindo cobertor feérico. Como as fadas em Statehelm vendem às vezes. Ou apenas faça um. Você sabe como fazer um, certo? Você acabou de costurar as bordas de um pouco de seda fada. Simples assim!\\\"\""
"Aqui, aceite isso como agradecimento": "é repelente de aranha!\""
"Aqui, é assim que você faz a refeição mais básica de tofu. Lembre-se": "o queijo é inerentemente melhor!\""
