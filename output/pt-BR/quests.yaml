"Pegast in the Fae Realm said, \"Even soldiers need refreshment, and the mortals have a bitter booze called Beer which is quite amusing. I'm attempting to craft some of my own, but I need some 'hops'. They don't grow here! Do you have any?\"": "Pegast, no Reino Fae, disse: “Até os soldados precisam de refresco, e os mortais têm uma bebida amarga chamada Cerveja, que é bastante divertida."
"Pegast in the Fae Realm said, \"I'll teach you Armor Patching if you bring me some strange, finely ground dirt to help me polish my equipment.\"": "Pegast, no Reino Fae, disse: \"Eu lhe ensinarei Remendos de Armadura se você me trouxer um pouco de terra estranha e finamente moída para me ajudar a polir meu equipamento.\""
"Pegast in the Fae Realm said, \"The Winter Trolls south of here are a real pest. They're not native to this area! Only the green ones are! Remember: green good, blue bad.

The Winter Court uses trolls as laborers and guards everywhere, but here they also use them to spread misinformation throughout troll society. If you see one, execute it!\"": "Pegast, no Reino Fae, disse: \"Os Winter Trolls ao sul daqui são uma verdadeira praga. Eles não são nativos desta área! Apenas os verdes são! Lembre-se: verde é bom, azul é ruim.

A Corte Winter usa trolls como trabalhadores e guardas em todos os lugares, mas aqui eles também os usam para espalhar desinformação por toda a sociedade troll. Se você ver um, execute-o!\""
"Pegast in the Fae Realm said, \"Vines keep attacking people south of town. I don't mean the spriggan weeds, I mean the OTHER kind! Floxie calls them carnivines. And really, Floxie should be the one to deal with these pests, given she's on plant duty, but she refuses! Will you remove these vicious weeds before someone gets hurt?\"": "Pegast, no Reino Fae, disse: \"As videiras continuam atacando as pessoas ao sul da cidade. Não me refiro às ervas daninhas spriggan, quero dizer o OUTRO tipo! Floxie as chama de carnivinas. E realmente, Floxie deveria ser a única a lidar com essas pragas, já que ela está de plantão na planta, mas ela se recusa! Você removerá essas ervas daninhas antes que alguém se machuque?\""
"Pegast in the Fae Realm said, \"You plan to kill more of the Winter Court menace? Wonderful! Go and 'mortal everything up' for the Winter Court!\"": "Pegast no Reino Fae disse: \"Você planeja matar mais ameaças da Corte Winter? Maravilhoso! Vá e 'morte tudo' para a Corte Winter!\""
"Pegast in the Fae Realm said, \"You're a friend, and I trust your discretion. We both know that the Winter Court is infiltrating this land, and they need to be stopped. But we dare not attack them until they attack first.

You, on the other hand... you could just kill 'em all, as the humans say...\"": "Pegast, no Reino Fae, disse: \"Você é um amigo e confio em sua discrição. Ambos sabemos que a Corte Winter está se infiltrando nesta terra e eles precisam ser detidos. Mas não ousamos atacá-los até que ataquem primeiro.

Você, por outro lado... você poderia simplesmente matar todos eles, como dizem os humanos...\""
"Pegast may be able to use muscle memory to remind you about some basic skills.": "Pegast pode usar a memória muscular para lembrá-lo de algumas habilidades básicas."
"Pegast may be able to use muscle memory to remind you about some basic skills. ": "Pegast pode usar a memória muscular para lembrá-lo de algumas habilidades básicas."
"Pegast will not relent! He wants me to hop to the next mushroom circle and take out the winter court there. But I can't bring myself to do it! Could you ... do it for me? Just a few kills should be enough to get him out of my nest for a bit.": "Pegast não cederá! Ele quer que eu pule para o próximo círculo de cogumelos e destrua a corte de inverno de lá. Mas não consigo fazer isso! Você poderia... fazer isso por mim? Apenas algumas mortes devem ser suficientes para tirá-lo do meu ninho por um tempo."
"Pegast's Armor Patching": "Remendando a Armadura de Pegast"
