"Relics from a long-finished war arise in the sands of the Ilmari Desert. These 'overseers' are remnants of a demonic army. They will communicate with their demon masters and convey the state of our world to outsiders. Druids, slay these creatures quickly! Every moment they exist puts our world in further peril.

Their otherworldly defenses would prove too much even for your powers, so I have augmented your 'Rotskin' ability. Use it to cut through their preliminary shielding.": "Relíquias de uma guerra há muito terminada surgem nas areias do deserto de Ilmari. Esses ‘superintendentes’ são remanescentes de um exército demoníaco. Eles se comunicarão com seus mestres demônios e transmitirão o estado do nosso mundo para estranhos. Druidas, matem essas criaturas rapidamente! Cada momento em que eles existem coloca o nosso mundo em perigo ainda maior.

Suas defesas sobrenaturais seriam demais até mesmo para seus poderes, então aumentei sua habilidade de 'Rotskin'. Use-o para cortar a blindagem preliminar."
"Remember": "you'll need a mask to get into the party, since it's a masquerade. But I'm sure you can find one somewhere.\": \"<i>Zhia Lian:</i> Ótimo trabalho. A festa está avançando e eu me certifiquei de que você está na lista de convidados!"
"Remember how I told you that 'tornado spiders' are the weak ones, and it was very important to destroy all the giant eggs before they became much bigger problems? Well, we found another cave where an egg already hatched, and we've got a much bigger problem. But it's still an adolescent, so there might be time left to kill it!

It will have extreme regeneration, just as it did in the egg: you'll need to light it on fire to prevent that. Fortunately, weapons work better than they do on the egg, but there's an extra complication: this spider has a very venomous bite!

Kella was sent in before you and nearly died. Don't underestimate this one.": "Lembra como eu disse que as 'aranhas tornados' são as mais fracas e que era muito importante destruir todos os ovos gigantes antes que se tornassem problemas muito maiores? Bem, encontramos outra caverna onde um ovo já eclodiu e temos um problema muito maior. Mas ainda é um adolescente, então pode sobrar tempo para matá-lo!

Ele terá regeneração extrema, assim como aconteceu no ovo: você precisará colocá-lo no fogo para evitar isso. Felizmente, as armas funcionam melhor do que no ovo, mas há uma complicação extra: esta aranha tem uma picada muito venenosa!

Kella foi enviada antes de você e quase morreu. Não subestime este."
"Remember those drug-manufacturing rakkies you found? Well, I've been hearing more rumors about it. It sounds powerful. Could be an alchemical recipe we could use in the Council military. Here's a map to a hole without any Xedrite in it. But it's in the same general area as that gang. I'm guessing it'll be swarming with the kitties, so be careful. Get in there and steal me a clean sample of the drug.": "Lembra daqueles malucos fabricantes de drogas que você encontrou? Bem, tenho ouvido mais rumores sobre isso. Parece poderoso. Poderia ser uma receita alquímica que poderíamos usar nas forças armadas do Conselho. Aqui está um mapa para um buraco sem Xedrite nele. Mas está na mesma área geral daquela gangue. Acho que estará fervilhando de gatinhos, então tome cuidado. Entre lá e roube-me uma amostra limpa da droga."
"Remember those xedrite-laced scorpion corpses you brought back? Well, that xedrite is useless. It's just raw metal infused into their shells. I need weapons-grade xedrite!

However, the Seer thinks there's weaponized xedrite involved. She asked for an agent to undergo an extremely dangerous assignment. So I told her you'd be right over! Here's your map. See her for further briefing.": "Lembra daqueles cadáveres de escorpiões com xedrita que você trouxe? Bem, esse xedrite é inútil. É apenas metal bruto infundido em suas conchas. Eu preciso de xedrite para armas!

No entanto, o Vidente acha que há xedrita armada envolvida. Ela pediu que um agente se submetesse a uma missão extremamente perigosa. Então eu disse a ela que você já viria! Aqui está o seu mapa. Consulte-a para mais instruções."
"Remember when you were bitten by those dinosaurs? Yeah, it didn't really seem to make you wiser in the long run. I mean, you're still ... um, ... still seeking answers.

I think the problem is that dinosaurs are dramatic and scary. Real life isn't always dramatic and scary -- but you have to take it just as seriously. So go get attacked by nine different ruminants. That should be less scary, but just as important!": "Lembra quando você foi mordido por aqueles dinossauros? Sim, isso realmente não parece torná-lo mais sábio no longo prazo. Quero dizer, você ainda está... hum,... ainda buscando respostas.

Acho que o problema é que os dinossauros são dramáticos e assustadores. A vida real nem sempre é dramática e assustadora – mas você deve levá-la com a mesma seriedade. Então seja atacado por nove ruminantes diferentes. Isso deveria ser menos assustador, mas igualmente importante!"
"Remga's remnants, that's a disgusting beast! But you skinned it well. I'll cut you in like usual.": "Os restos de Remga, é uma fera nojenta! Mas você esfolou bem. Vou cortar você como de costume."
"Remga's Sweaty Balls! We're roach free! Give it a week and we'll be right back to where we were, but let's live it up while the living's good!": "Bolas suadas de Remga! Estamos livres de baratas! Espere uma semana e estaremos de volta onde estávamos, mas vamos viver enquanto a vida é boa!"
