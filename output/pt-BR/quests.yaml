"We can't have these fae creatures running all over our land! You fairies aren't too bad, but the biting vines are ruining the native ecology! Help me cull them, would you?": "Não podemos permitir que essas criaturas feéricas percorram nossas terras! Vocês, fadas, não são tão ruins, mas as vinhas cortantes estão arruinando a ecologia nativa! Ajude-me a selecioná-los, sim?"
"We cannot let that happen. We cannot let the demons fuse with the Frostbelches. [Ferris looks around, clearly panicked.] I'm afraid we have no choice. We have to destroy the Frostbelches before it's too late. My heart goes out to the cute little creatures, but there really is no other way.

I hate to ask you to do this, but I need you to deal with as many Frostbelches as you can.": "Não podemos deixar isso acontecer. Não podemos permitir que os demônios se fundam com os Arrotos de Gelo. [Ferris olha em volta, claramente em pânico.] Receio que não tenhamos escolha. Temos que destruir os Frostbelches antes que seja tarde demais. Meu coração está com as criaturinhas fofas, mas realmente não há outra maneira.

Detesto pedir que você faça isso, mas preciso que você lide com o maior número possível de Arrotos de Gelo."
"We could all work on improving our patience. Do you know how to skin animals? Well, if you're going to desecrate a corpse like that, the least you could do is to perform your job flawlessly! Go practice until you get a flawless skin.": "Todos nós poderíamos trabalhar para melhorar nossa paciência. Você sabe como esfolar animais? Bem, se você vai profanar um cadáver como esse, o mínimo que você pode fazer é realizar seu trabalho perfeitamente! Vá praticando até conseguir uma pele impecável."
"We did it! This is a good tree so now we get presents. I'll tell everybody! Go! Go get your present!": "Nós conseguimos! Esta é uma boa árvore, então agora ganhamos presentes. Vou contar para todo mundo! Ir! Vá buscar seu presente!"
"We don't have a wide variety of ingredients in this area, but we do have one thing that's unique: a bunch of infernal creatures. I've heard, mostly from Denton, that there are non-demons nearby that are studying the demons. Their research may prove useful in the culinary world. Or at least, in <i>my</i> culinary world.

Bring me some of this demonic research so I can see if any of it is useful.": "Não temos uma grande variedade de ingredientes nesta área, mas temos uma coisa única: um monte de criaturas infernais. Ouvi dizer, principalmente de Denton, que há não-demônios por perto que estão estudando os demônios. Sua pesquisa pode ser útil no mundo culinário. Ou pelo menos, no <i>meu</i> mundo culinário.

Traga-me algumas dessas pesquisas demoníacas para que eu possa ver se alguma delas é útil."
"We don't have many ranalon in Verta so I've been very interested to learn more about the ones that live here! Unfortunately they aren't friendly.

I've noticed many of them carry bits of glass around and I can't imagine why. Could you find me some samples? The pretty violet ones.": "Não temos muitos ranalon em Verta, então estou muito interessado em saber mais sobre os que moram aqui! Infelizmente eles não são amigáveis.

Tenho notado que muitos deles carregam pedaços de vidro e não consigo imaginar por quê. Você poderia me encontrar algumas amostras? Aquelas lindas violetas."
"We don't really get much cheese in the fae realm. I mean, the troll-dogs are technically milkable, but... ugh. This world's cheeses are amazing! I had a bite of one that I'd love to try again. It was called 'camembert'. Do you have any?": "Na verdade, não conseguimos muito queijo no reino Fae. Quero dizer, os troll-dogs são tecnicamente ordenhados, mas... ugh. Os queijos deste mundo são incríveis! Dei uma mordida que adoraria experimentar novamente. Chamava-se 'camembert'. Você tem algum?"
"We have a lot of beer stored away here from the previous tenants. And I know how to summon Council Rations, which are just barely enough to keep us all alive. But I would kill for something else to eat! This is a cave, so you'd think you could catch cave fish in here, right? But no. No deep water, no cave fish. Can you get us some?": "Temos muita cerveja guardada aqui dos inquilinos anteriores. E sei como convocar as Rações do Conselho, que mal dão para nos manter vivos. Mas eu mataria por outra coisa para comer! Esta é uma caverna, então você pensaria que poderia pegar peixes da caverna aqui, certo? Mas não. Sem águas profundas, sem peixes das cavernas. Você pode nos conseguir alguns?"
"We mantises were slaves of Dalvos, alongside those idiot brain bugs, for decades. But now we are free! And we seek culture desperately. It makes many of my brethren foolish.

Several fool mantises snuck into the town of Serbule in order to steal your culture. It has been many days, and I fear they will unleash a terrible reprisal upon us all. Go and find them, and do whatever is necessary to discreetly resolve the issue. Murder would be the wisest choice. Yes. Murder them.": "Nós, louva-a-deus, fomos escravos de Dalvos, ao lado daqueles insetos cerebrais idiotas, por décadas. Mas agora estamos livres! E buscamos cultura desesperadamente. Isso torna muitos dos meus irmãos tolos.

Vários louva-a-deus tolos entraram sorrateiramente na cidade de Serbule para roubar sua cultura. Já se passaram muitos dias e temo que eles desencadearão uma terrível represália sobre todos nós. Vá e encontre-os e faça o que for necessário para resolver o problema discretamente. Assassinato seria a escolha mais sábia. Sim. Assassine-os."
"We need a big thing on top of the tree. And it should be something animals make. Like... poop. No... like meat! No... like cheese! Yes! Animals make cheese! Get a big hard cheese.": "Precisamos de uma coisa grande no topo da árvore. E deveria ser algo que os animais fazem. Tipo... cocô. Não... como carne! Não... tipo queijo! Sim! Os animais fazem queijo! Pegue um queijo grande e duro."
"We need all the help we can get. The demons seem to be never-ending, and our supplies are ever-dwindling. Armor, weapons, rations - you name it, we need it! Statehelm is providing as many as they can, but it's simply not enough. Can we count on you and your people to aid us?": "Precisamos de toda a ajuda possível. Os demônios parecem não ter fim e nossos suprimentos estão cada vez mais escassos. Armaduras, armas, rações - você escolhe, nós precisamos disso! A Statehelm está fornecendo o máximo que pode, mas simplesmente não é suficiente. Podemos contar com você e seu povo para nos ajudar?"
"We need colorful and shiny decorations. After consulting with Kalaba, I have decided that the best colorful and shiny decorations would be the eyes of fallen foes. However, we should not use the eyes of sentient creatures. Hogan said that the tree should radiate peace. So animal eyes will have to do. Perhaps cat or dinosaur eyes.": "Precisamos de decorações coloridas e brilhantes. Após consultar Kalaba, decidi que as melhores decorações coloridas e brilhantes seriam os olhos dos inimigos caídos. Contudo, não devemos usar os olhos de criaturas sencientes. Hogan disse que a árvore deveria irradiar paz. Portanto, os olhos dos animais terão que servir. Talvez olhos de gato ou dinossauro."
"We need lots of cheap decorations. They should be bright and shiny and round. Hmm. Apples! Yes, fetch some apples. I'll get some myself, and together we should have enough.": "Precisamos de muitas decorações baratas. Eles devem ser brilhantes, brilhantes e redondos. Hum. Maçãs! Sim, pegue algumas maçãs. Eu mesmo pegarei um pouco e juntos teremos o suficiente."
"We need round things for the tree! Round... round... like plates. Plates! Get some plates. This many. <i>[Spot holds up a varying number of fingers, changing her mind every few seconds. You decide that a half-dozen plates will do.]</i>": "Precisamos de coisas redondas para a árvore! Redondo... redondo... como pratos. Pratos! Pegue alguns pratos. Isso muitos. <i>[Spot mostra um número variável de dedos, mudando de ideia a cada poucos segundos. Você decide que meia dúzia de pratos servirá.]</i>"
"We need some premium bows for our advanced users. I am low on materials. Can you bring me 10 Awesome Hunting Bows? I will share some knowledge with you in return.": "Precisamos de alguns arcos premium para nossos usuários avançados. Estou com poucos materiais. Você pode me trazer 10 arcos de caça incríveis? Em troca, compartilharei algum conhecimento com você."
"We need some premium bows for our advanced users. I am low on materials. Can you bring me 10 Awesome Hunting Bows? I will share some knowledge with you in return.

": "Precisamos de alguns arcos premium para nossos usuários avançados. Estou com poucos materiais. Você pode me trazer 10 arcos de caça incríveis? Em troca, compartilharei algum conhecimento com você."
"We need something blue, and I think it would be pretty funny to cover the tree in fungus. Let's do that.": "Precisamos de algo azul e acho que seria muito engraçado cobrir a árvore com fungos. Vamos fazer isso."
"We need something eye-catching to top the tree. How about... hmm... a pair of scorpion stingers?!": "Precisamos de algo atraente para cobrir a árvore. Que tal... hmm... um par de ferrões de escorpião?!"
"We need something large and beautiful to top the tree. I've seen some of the ranalon wearing decorative brooches that might work. Search the ones that stay down in the water and carry staves. 'Garden Masters', I think is what we call them.": "Precisamos de algo grande e bonito para cobrir a árvore. Já vi alguns ranalon usando broches decorativos que podem funcionar. Procure aqueles que ficam na água e carregam cajados. 'Garden Masters', acho que é como os chamamos."
"We need stringy things. Like... um, string. No, string is ugly. Sausages! Sausages are stringy! Get some!

But please <i>please</i> don't tell Norbert because he yells at me when I say I like sausage. Please? Okay good.": "Precisamos de coisas pegajosas. Tipo... hum, barbante. Não, o barbante é feio. Salsichas! As salsichas são pegajosas! Pegue um pouco!

Mas, por favor, <i>por favor</i>, não conte ao Norbert porque ele grita comigo quando digo que gosto de salsicha. Por favor? OK, bom."
"We need tinsel. What can we make it from? It should be fluffy, light, and... I have it! Matted hairballs! We'll dye them red. Go, fetch some!": "Precisamos de enfeites. Do que podemos fazer isso? Deve ser fofo, leve e... já consegui! Bolas de pelo emaranhadas! Vamos tingi-los de vermelho. Vá, pegue alguns!"
"We need to check in on some of our spy network members. These are animals in distant lands that work with us. They aren't all members of the Wardens, but they're entrusted with our secret communication ritual.

Start by checking in with a cow in Eltibule. I don't know her name... she's never given us one. But she says she's the only talking cow in her herd, so... see what you can do. Take this care package to her. It's some stuff she asked for a while back.": "Precisamos verificar alguns dos membros da nossa rede de espionagem. São animais de terras distantes que trabalham conosco. Nem todos são membros dos Vigilantes, mas são encarregados de nosso ritual secreto de comunicação.

Comece fazendo check-in com uma vaca em Eltibule. Não sei o nome dela... ela nunca nos deu um. Mas ela diz que é a única vaca falante do rebanho dela, então... veja o que você pode fazer. Leve este pacote de cuidados para ela. São algumas coisas que ela pediu há algum tempo."
"We need to slow down the ranalon food production. They have a massive number of farmers in those lakes. Dispatch them! I shall reward you with 500 Councils.": "Precisamos desacelerar a produção de alimentos ranalon. Eles têm um grande número de agricultores nesses lagos. Despache-os! Eu recompensarei você com 500 Conselhos."
"We shall simply create a... new potion to help me restore my... power.

First, obtain the... simple organic ingredients.": "Devemos simplesmente criar uma... nova poção para me ajudar a restaurar meu... poder.

Primeiro, obtenha os... ingredientes orgânicos simples."
"We should be able to tease these disgusting hairballs apart and dye them red. And by the by, I love this! I've met the obligations of my duty as tree-master, and yet nobody will ever ask me to do it again! It's perfect.": "Deveríamos ser capazes de separar essas nojentas bolas de pelo e tingi-las de vermelho. E por falar nisso, eu adoro isso! Cumpri as obrigações do meu dever como mestre das árvores, mas ninguém jamais me pedirá para fazer isso de novo! É perfeito."
"We should start by examining the large ones. I've noticed that one of them seems more in-charge than the other, despite no obvious physical differences. The brains have been so helpful in the past, and you've proven that you're clearly capable of extracting them, so bring me some from each, if you don't mind.\\\"\": \"Ferris Blueheart em Vidaria disse": "\\\"Você tem sido incrivelmente útil em minha pesquisa até agora, mas só temos lidado com os lacaios. Ainda tenho muitas perguntas sobre os escalões mais altos dos demônios."
"We were sent here by Dalvos to find ancient Dwarf treasure. There are no Dwarves! Only goblins! And they enslave us with promises of healing. They lie! Kill them! Vindicate us!": "Fomos enviados aqui por Dalvos para encontrar o antigo tesouro dos Anões. Não existem anões! Apenas duendes! E eles nos escravizam com promessas de cura. Eles mentem! Mate-os! Nos justifique!"
"We're having some trouble with the \"drawing with ink\" lessons: Rubi refuses to get her paws inked up. I think I need something less messy to help them build paw-mouth dexterity. Help me get the raw materials for a little sewing project.": "Estamos tendo alguns problemas com as aulas de \"desenho com tinta\": Rubi se recusa a tatuar as patas. Acho que preciso de algo menos confuso para ajudá-los a desenvolver a destreza na boca da pata. Ajude-me a conseguir matéria-prima para um pequeno projeto de costura."
"We're simpatico, you and me": "I give you jobs and you do the jobs! This mind-invasion is working out so much better than usual!\": \"<i>Zhia Lian:</i> Veja, você não está feliz por ter praticado prender a respiração antes? Aquelas estrelas do mar eram bem profundas! Todos os meus planos eventualmente dão certo. E quando dão certo, você ganha!"
"We're very low on resources this year so we'll have to get creative with our decorations. Hmm, how about grapes? They're colorful and relatively plentiful...": "Estamos com poucos recursos este ano, então teremos que ser criativos com nossas decorações. Hmm, que tal uvas? Eles são coloridos e relativamente abundantes..."
"We've done it! A holiday tree that meets minimum expectations. And now I can stop worrying about this nonsense. Oh, but I placed a gift under the tree for you, as thanks. And I'm sure the rest of these ingrates will chip in on gifts too... even if I have to strongarm them a bit.": "Nós conseguimos! Uma árvore de férias que atende às expectativas mínimas. E agora posso parar de me preocupar com esse absurdo. Ah, mas coloquei um presente debaixo da árvore para você, como agradecimento. E tenho certeza de que o resto desses ingratos também contribuirá com presentes... mesmo que eu tenha que fortalecê-los um pouco."
"We've done much to dissuade the Winter Court from attacking us directly. But there is a team of elite warriors that fear nothing. They are The Boreal Fist. If you can find allies to stand with you, can you strike them down? Be careful. Even I could not kill one of them alone.": "Fizemos muito para dissuadir a Corte Winter de nos atacar diretamente. Mas existe uma equipe de guerreiros de elite que não temem nada. Eles são o Punho Boreal. Se você conseguir encontrar aliados para apoiá-lo, poderá derrubá-los? Tome cuidado. Mesmo eu não poderia matar um deles sozinho."
"We've found another war cache in the region that used to be 'New Argolis'. It wasn't on the front lines. Hegemony troops went there for booze and whores. So there shouldn't be any spike traps or death beams or anything. Nice and easy! In fact, I almost gave this job to my second-best finder, Kella, so I could save you for the hard ones. But she declined it... so it's all yours. She said the area is full of snakes, and she's afraid of snakes. Whoever heard of a rakkie that's afraid of snakes? What is this world coming to, I ask you?

Anyway, I guess she might know what she's talking about. Bring some antivenom.": "Encontramos outro esconderijo de guerra na região que costumava ser 'Nova Argolis'. Não estava na linha de frente. As tropas da hegemonia iam lá em busca de bebida e prostitutas. Portanto, não deveria haver armadilhas de espinhos ou raios mortais ou algo assim. Bom e fácil! Na verdade, quase dei esse trabalho para minha segunda melhor descobridora, Kella, para poder poupar você para as tarefas difíceis. Mas ela recusou... então é todo seu. Ela disse que a área está cheia de cobras e ela tem medo de cobras. Quem já ouviu falar de um rakkie que tem medo de cobras? Para onde este mundo está chegando, eu lhe pergunto?

De qualquer forma, acho que ela deve saber do que está falando. Traga um pouco de antiveneno."
"We've got another war cache in that problematic spider area. The Sand Seer wants you to collect some legs from those wind spiders while you're in there. Here's the map. Remember: spider legs are great and all, but don't leave without my Weaponized Xedrite!": "Temos outro esconderijo de guerra naquela área problemática das aranhas. O Sand Seer quer que você colete algumas pernas daquelas aranhas do vento enquanto estiver lá. Aqui está o mapa. Lembre-se: pernas de aranha são ótimas e tudo, mas não saia sem meu Xedrite Armado!"
"We've got one backup crystal emitting alerts, but it won't last forever. We really need to get the main crystal working again! But there's nobody left alive who knows how this stuff works.

Before the massacre, there was a group of foxes that maintained the system. They taught each other the secrets of how it worked. Did they write the secrets down? No, of course they didn't. And then they ALL had to go get massacred, and now here we are.

Milton won't let me bring in outside help, but I needed some expert advice, so I've been quietly using a sending-stone to chat with my old master.

Don't look at me like that: my master's a great wizard! I wasn't his slave! I was his partner! Anyway, I haven't told him the specifics, so he can't be too helpful, but he thinks he has a book that'll help. And he shipped it overseas to me! It should be waiting for pickup in Rahu. I'm not sure where, exactly, but talk to the dock manager.": "Temos um cristal reserva emitindo alertas, mas não durará para sempre. Nós realmente precisamos fazer o cristal principal funcionar novamente! Mas não sobrou ninguém vivo que saiba como essas coisas funcionam.

Antes do massacre, havia um grupo de raposas que mantinha o sistema. Eles ensinaram um ao outro os segredos de como funcionava. Eles escreveram os segredos? Não, claro que não. E então TODOS eles tiveram que ser massacrados, e agora aqui estamos nós.

Milton não me deixa trazer ajuda externa, mas eu precisava de conselhos de especialistas, então tenho usado discretamente uma pedra de envio para conversar com meu antigo mestre.

Não me olhe assim: meu mestre é um grande mago! Eu não era seu escravo! Eu era seu parceiro! De qualquer forma, não contei a ele os detalhes, então ele não pode ser muito útil, mas acha que tem um livro que vai ajudar. E ele enviou para mim no exterior! Deve estar aguardando coleta em Rahu. Não tenho certeza de onde exatamente, mas fale com o gerente da doca."
"We've got two raw new recruits today. You think you're good with a sword, why not show them how it's done? Take apart one of these training dummies with a sword.

<i>[You must have the Sword skill active to advance this quest.]</i>": "Temos dois novos recrutas hoje. Você acha que é bom com uma espada, por que não mostrar a eles como se faz? Desmonte um desses bonecos de treinamento com uma espada.

<i>[Você deve ter a habilidade Espada ativa para avançar nesta missão.]</i>"
"We've lost the element of surprise! Time to reclaim that surprise by killing their necromancers when they're resting. Fools! Hahahaha!": "Perdemos o elemento surpresa! É hora de recuperar essa surpresa matando seus necromantes enquanto eles estão descansando. Tolos! Hahahaha!"
"We've managed to get the bears out of the western bee fields, but south and east of here, they're a real problem! They're especially dense during the day when they hunt for honey. Yes, they eat my damned crop! Why can't they be more like the panthers?! Anyway, you just gotta stop 'em. They're a menace!": "Conseguimos tirar os ursos dos campos de abelhas do oeste, mas ao sul e ao leste daqui, eles são um verdadeiro problema! Eles são especialmente densos durante o dia, quando procuram mel. Sim, eles comem minha maldita colheita! Por que eles não podem ser mais parecidos com as panteras?! De qualquer forma, você só precisa detê-los. Eles são uma ameaça!"
"We've replaced every single oil lamp with a modern heating-crystal system that turns itself on at night and off in the morning. A true wonder of innovation! Except dwarves have already had these for centuries, but let's not go there. Anyway, the design is very new and we're still working out the kinks. Well, we WERE before the demons showed up. Right now we're just trying to keep things running as best we can. We lose lamps every night!

But I've become convinced it's less about a design flaw and more about... something else. See, when the lamps break they become overcharged. In this state they can also overcharge other nearby lamps! The darkness can spread, making whole areas unsafe. And, of course, vampires are always ready to take advantage of these outages to feed on the unsuspecting.

Take some replacement bulbs and fix broken lamps tonight. I'll reimburse you for the lamps.": "Substituímos todas as lâmpadas a óleo por um moderno sistema de aquecimento de cristal que liga sozinho à noite e desliga pela manhã. Uma verdadeira maravilha da inovação! Exceto que os anões já os têm há séculos, mas não vamos lá. De qualquer forma, o design é muito novo e ainda estamos resolvendo os problemas. Bem, nós éramos antes dos demônios aparecerem. No momento, estamos apenas tentando manter as coisas funcionando da melhor maneira possível. Perdemos lâmpadas todas as noites!

Mas estou convencido de que se trata menos de uma falha de design e mais de... outra coisa. Veja, quando as lâmpadas quebram elas ficam sobrecarregadas. Neste estado também podem sobrecarregar outras lâmpadas próximas! A escuridão pode se espalhar, tornando áreas inteiras inseguras. E, claro, os vampiros estão sempre prontos para aproveitar essas interrupções para se alimentar dos desavisados.

Pegue algumas lâmpadas de reposição e conserte as lâmpadas quebradas esta noite. Eu reembolsarei você pelas lâmpadas."
"We've seen how you can punch. But now you need to really test your kicking power. Go and kick some of those demon dogs -- those Cerberi -- to death. Take off your shoes and any leg guards so you can feel the complete motion of your limbs.

<i>[You must have the empty Feet and Legs slots, and kill enemies with Kick abilities, to advance this quest.]</i>": "Vimos como você pode dar um soco. Mas agora você precisa realmente testar seu poder de chute. Vá e chute alguns daqueles cães demoníacos – aqueles Cerberi – até a morte. Tire os sapatos e quaisquer protetores de perna para sentir o movimento completo de seus membros.

<i>[Você deve ter os slots de pés e pernas vazios e matar inimigos com habilidades de chute para avançar nesta missão.]</i>"
"We've studied the minions and the Behemoths pretty exhaustively, but there's still a lot we don't know about the highest ranks: the Overseers and the Justiciars. I would love to observe their inner workings and see how they stack up to the others. You know what to do.": "Estudamos exaustivamente os lacaios e os Behemoths, mas ainda há muito que não sabemos sobre os escalões mais altos: os Supervisores e os Juízes. Eu adoraria observar seu funcionamento interno e ver como eles se comparam aos outros. Você sabe o que fazer."
"Weak Acidic Cleansers": "Produtos de limpeza ácidos fracos"
"Weak Hellfreeze": "Inferno Congelado Fraco"
"Weak Hellfreeze Ointment": "Pomada Hellfreeze Fraca"
"Weak Poisoned Knives": "Facas Envenenadas Fracas"
"Weakening the Dreamscape": "Enfraquecendo a paisagem onírica"
"WeatherWitching": "TempoWitching"
"Wednesday": "Quarta-feira"
"Weed Patrol": "Patrulha de ervas daninhas"
"Weed Patrol (Repeatable)": "Patrulha de Ervas Daninhas (Repetível)"
"Weed Plants": "Plantas daninhas"
"WeededPlants": "Plantas eliminadas"
"WeedingPatrolIntro": "WeedingPatrolIntrodução"
"WeedingPatrolRepeating": "WeedingPatrolRepetindo"
"Weird Fruit Cocktails": "Coquetéis de frutas estranhos"
"WeirdFruitCocktail": "Coquetel de Frutas Estranho"
"Welcome to my home, friend of nature. I am a sea treant and you are welcome here. But I could use your help. My homewater is overrun with ghost bass. They eat all the food, and then fade away at dawn, taking the food with them! Even worse, I am psychic and can feel their angst. These fish were maimed and tortured to death! They suffer. You must help them, and us. Please! The ghosts only come out at night.": "Bem-vindo à minha casa, amigo da natureza. Eu sou um ente do mar e você é bem-vindo aqui. Mas eu poderia usar sua ajuda. Minha água natal está invadida por robalos fantasmas. Eles comem toda a comida e depois desaparecem ao amanhecer, levando a comida com eles! Pior ainda, sou vidente e posso sentir a angústia deles. Esses peixes foram mutilados e torturados até a morte! Eles sofrem. Você deve ajudá-los e a nós. Por favor! Os fantasmas só aparecem à noite."
"Welcome to the Writ Challenge!
This one is really pretty easy, just go out and kill stuff like you normally would! You will find special items in loot called a Writ of Unlock or Golden Writ of Unlock. Use the writs to advance your quests and the Community Score. The Writ Master in Serbule will keep tally of the Community Score. The higher the score, the more prizes that get unlocked!
VIPs can contribute extra points to the score just for being here! Visit the Writ Master to see how.": "Bem-vindo ao Desafio de Escrita!
Este é realmente muito fácil, basta sair e matar coisas como faria normalmente! Você encontrará itens especiais em saques chamados Mandado de Desbloqueio ou Mandado Dourado de Desbloqueio. Use os mandados para avançar em suas missões e na pontuação da comunidade. O Writ Master em Serbule registrará a pontuação da comunidade. Quanto maior a pontuação, mais prêmios serão desbloqueados!
VIPs podem contribuir com pontos extras para a pontuação só por estarem aqui! Visite o Writ Master para ver como."
"Well done! Enjoy your reward and be proud of your contribution!": "Bom trabalho! Aproveite sua recompensa e tenha orgulho de sua contribuição!"
"Well done! Well done! Here, take this. Never speak to anyone of what I asked you to do. They wouldn't understand.": "Bom trabalho! Bom trabalho! Aqui, pegue isso. Nunca fale com ninguém sobre o que eu pedi para você fazer. Eles não entenderiam."
"Well done, humanoid, expectations have been met. And you did not spill the beans, as they say in your idiom. Feel pride, for you are successful in your task.": "Muito bem, humanóide, as expectativas foram atendidas. E você não derramou o feijão, como dizem no seu idioma. Sinta orgulho, pois você teve sucesso em sua tarefa."
"Well flaked! You could have been a food-preparer! Instead of... what, an assassin, I guess. But I'm happy you're an assassin. So let's move on. Here's your reward and I'll have a new scheme for you momentarily.": "Bem em flocos! Você poderia ter sido um preparador de comida! Em vez de... o que, um assassino, eu acho. Mas estou feliz que você seja um assassino. Então vamos em frente. Aqui está sua recompensa e terei um novo esquema para você em breve."
"Well hello! What? My hair? Oh that's easy: I use an alchemical potion twice a month. I should make some extra bottles and sell it! You look like you could use a bottle, if you don't mind my saying.": "Bem, olá! O que? Meu cabelo? Ah, isso é fácil: eu uso uma poção alquímica duas vezes por mês. Eu deveria fazer algumas garrafas extras e vendê-las! Parece que você precisa de uma garrafa, se não se importa que eu diga."
"Well hello! Yes, I know all about General Tremal. I've heard many things. What? Tremal's favorite color? Shirogin can't be serious! <i>Everyone</i> knows that General Tremal's favorite color is aquamarine! Not cyan, she HATES cyan. It has to be exactly aquamarine. Tell Shirogin I'll come collect my fee for this valuable insight later.": "Bem, olá! Sim, eu sei tudo sobre o General Tremal. Eu ouvi muitas coisas. O que? A cor favorita de Tremal? Shirogin não pode estar falando sério! <i>Todo mundo</i> sabe que a cor favorita do General Tremal é água-marinha! Não é ciano, ela ODEIA ciano. Tem que ser exatamente água-marinha. Diga a Shirogin que irei cobrar meus honorários por esse insight valioso mais tarde."
"Well if you think you're a capable fighter, we can always use help dealing with the demonic swarmers. Be careful, or they'll overwhelm you!": "Bem, se você se acha um lutador capaz, sempre precisamos de ajuda para lidar com os enxames demoníacos. Tenha cuidado, ou eles vão sobrecarregar você!"
"Well if you're going to assault the ship and create mayhem, you should start with the trolls! Most of these trolls were supposed to go down to the surface already, but they're lazy oafs who just hang around down here.": "Bem, se você vai atacar o navio e criar o caos, você deve começar com os trolls! A maioria desses trolls já deveria ter descido à superfície, mas eles são idiotas preguiçosos que ficam por aqui."
"Well if you're heading all the way out to Eltibule, could you stop by the keep and pick up my cheese from an Elf named Braigon? I need it right away, and I think he forgot about me.": "Bem, se você está indo para Eltibule, poderia passar na fortaleza e comprar meu queijo de um elfo chamado Braigon? Preciso disso imediatamente e acho que ele se esqueceu de mim."
"Well it definitely wasn't this disgusting before it was stolen. I'm going to have to clean everything! But yes, that's some of my stolen jewelry. Thank you so much!": "Bem, definitivamente não era tão nojento antes de ser roubado. Vou ter que limpar tudo! Mas sim, essas são algumas das minhas joias roubadas. Muito obrigado!"
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Brown Ale I've heard about. Flavor it up however you like!": "Bem conhecido! É difícil configurar e preparar quando você está sempre em movimento. Gostaria de terminar alguns barris antes de voltarmos à estrada, mas preciso de inspiração e gostaria de provar alguns dos sabores locais. Por que você não prepara 10 copos desta Brown Ale de que ouvi falar? Aromatize como quiser!"
