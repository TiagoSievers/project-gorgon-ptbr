"Rattus root is a favorite snack of these barbaric vermin. I'm sure to a mutant like you it just looks like a root, right? But to a gobthropologist, it's like an open book! A book of secrets! So go get me my secret books! I mean rattus roots!": "A raiz de Rattus é o lanche favorito desses vermes bárbaros. Tenho certeza que para um mutante como você parece apenas uma raiz, certo? Mas para um gobtropólogo é como um livro aberto! Um livro de segredos! Então vá buscar meus livros secretos! Quero dizer raízes de rattus!"
