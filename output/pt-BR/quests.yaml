"Leah Bowman in Povus said, \"I don't get much work in animal husbandry any more, but I got an order from an old customer, and I would love to fill it! But what he needs is an aphrodesiac for his pet bees! Of all the weird pets, bees are way up there. I do know how to make what he needs... I just need some high-quality tallow. Could I ask you to render some for me?\"": "Leah Bowman, em Povus, disse: \"Não trabalho mais com criação de animais, mas recebi um pedido de um cliente antigo e adoraria atendê-lo! Mas o que ele precisa é de um afrodesíaco para suas abelhas de estimação! De todos os animais de estimação estranhos, as abelhas estão lá em cima. Eu sei como fazer o que ele precisa... Só preciso de um pouco de sebo de alta qualidade. Posso pedir que você faça um pouco para mim?\""
"Leah Bowman in Povus said, \"I know this sounds weird, because it is, but next we need some old bones. The rakshasa love seeing them on the tree.\"": "Leah Bowman em Povus disse: \"Eu sei que isso parece estranho, porque é, mas a seguir precisamos de alguns ossos velhos. Os rakshasa adoram vê-los na árvore.\""
"Leah Bowman in Povus said, \"I used to walk the riverbank and collect old fishing nets. I use them for all sorts of crafts! But it's too dangerous to do that these days. If you find some nets, though, I'd like them! I can't pay much, but I'll pay a bit.\"": "Leah Bowman em Povus disse: \"Eu costumava caminhar pela margem do rio e coletar redes de pesca velhas. Eu as uso para todos os tipos de artesanato! Mas é muito perigoso fazer isso hoje em dia. Se você encontrar algumas redes, eu gostaria delas! Não posso pagar muito, mas pagarei um pouco.\""
"Leah Bowman in Povus said, \"It's tradition to use glow bottles on the tree. The alchemist who used to make them is dead now, but she taught me the technique! Most of the ingredients are pretty upsetting, seeing as they come from living animals. But remember, this is for presents! So if you get the parts, I'll make the jars.\"": "Leah Bowman em Povus disse: \"É tradição usar frascos luminosos na árvore. A alquimista que os fazia já morreu, mas ela me ensinou a técnica! A maioria dos ingredientes é bastante perturbadora, visto que vêm de animais vivos. Mas lembre-se, isto é para presentes! Então, se você conseguir as peças, farei os potes. \""
"Leah Bowman in Povus said, \"Mom always told me to forgive and forget my father. But I don't think she ever really did. And I sure as hell haven't! It gnaws at me, even now.

I guess it's my orcish side, but I just think I'd be so much happier if he were dead!\"": "Leah Bowman em Povus disse: “Mamãe sempre me disse para perdoar e esquecer meu pai.

Acho que é o meu lado orc, mas acho que ficaria muito mais feliz se ele estivesse morto!\""
"Leah Bowman in Povus said, \"Now for the most important part: the tree topper. It has to be Miss Fly-Hater! She's a gigantic frog that comes out of hibernation right around now. She lives on a little island in the middle of the river, and we bring her in to sit on the tree and catch bugs. She loves it, the town loves it, we all win!

Now don't hurt her! The town will never forgive us if she's hurt.\"": "Leah Bowman em Povus disse: \"Agora, a parte mais importante: a copa da árvore. Tem que ser a senhorita Fly-Hater! Ela é um sapo gigante que sai da hibernação agora mesmo. Ela mora em uma pequena ilha no meio do rio, e nós a trazemos para sentar na árvore e pegar insetos. Ela adora, a cidade adora, todos nós ganhamos!

Agora não a machuque! A cidade nunca nos perdoará se ela estiver ferida.\""
"Leah Bowman in Povus said, \"Thank you for killing Brukal for me. I... I want our relationship to be honest, so let me tell you bluntly: that was a little out of line. I wanted him dead, but I didn't mean you should just... and the worst part is that It's made me feel nervous to be around you! But I do thank you. I know you did it out of kindness for a friend.

I've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.\"": "Leah Bowman em Povus disse: \"Obrigada por matar Brukal por mim. Eu ... eu quero que nosso relacionamento seja honesto, então deixe-me dizer sem rodeios: isso foi um pouco fora de linha. Eu queria que ele morresse, mas eu não quis dizer que você deveria apenas ... e a pior parte é que fiquei nervoso por estar perto de você! Mas eu agradeço. Eu sei que você fez isso por gentileza para com um amigo.

Decidi montar um pequeno monumento aos meus pais – os dois – fora da cidade. Você poderia colher algumas flores para mim? As papoulas sempre foram as favoritas da mãe. O meu também.\""
"Leah Bowman in Povus said, \"When the town was healthier, we used to put prettied-up mushrooms on the tree. Fly amanita grows everywhere around here, so that's not a problem. But I don't know how to make the dye! We need a nice tomato red dye to cover the stems.\"": "Leah Bowman em Povus disse: \"Quando a cidade era mais saudável, costumávamos colocar cogumelos enfeitados na árvore. Fly amanita cresce em todos os lugares por aqui, então isso não é um problema. Mas não sei como fazer a tintura! Precisamos de uma boa tintura vermelha de tomate para cobrir os caules. \""
