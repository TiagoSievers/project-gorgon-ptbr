"AVISO PARA PERSONAGENS FAE": "Os limões suspeitos adoram lidar com morte e punição tanto quanto com buffs e amor! Os jogadores fadas podem querer ter extremo cuidado ao tocar em um limão! Nem tudo que um limão dá resulta em morte, mas é preciso estar preparado!\""
"Aw yeah, perfect. Thanks!": "Ah, sim, perfeito. Obrigado!"
"Aw... poor butterflies! I feel terrible about this special order. But the store needs an income stream, or it can't be a part of this community! The needs of the many etcetera! Forgive me? ... Please?

Wait, who am I asking forgiveness from?! You're the monster who killed these butterflies in the first place! You should be ashamed!

... Sorry. Here's your blood money.": "Ah... pobres borboletas! Eu me sinto péssimo com esse pedido especial. Mas a loja precisa de uma fonte de renda, ou não poderá fazer parte desta comunidade! As necessidades de muitos, etc.! Me perdoe? ... Por favor?

Espere, a quem estou pedindo perdão?! Você é o monstro que matou essas borboletas! Você deveria ter vergonha!

... Desculpe. Aqui está o seu dinheiro sangrento."
