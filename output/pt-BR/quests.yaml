"True Orcish Ore": "Minério Orc Verdadeiro"
"Truxartis in Vidaria said, \"First and foremost, you should find my... butler. He was once a ghoul. And I suppose he is still a ghoul, of a sort. But he is ... more. He can sense hatred in the air. It is MOST valuable.

Grasuul ran away when I was forced into repose. But I know where he would go: I spied a cursed lake near the ruby wall. He would no doubt be there, reveling in anguish. Grasuul is... not well.

Tell Grasuul that I have awoken. He will come back.\"": "Truxartis em Vidaria disse: \"Em primeiro lugar, você deveria encontrar meu... mordomo. Ele já foi um ghoul. E suponho que ele ainda seja uma espécie de ghoul. Mas ele é... mais. Ele pode sentir o ódio no ar. É MAIS valioso.

Grasuul fugiu quando fui forçado a descansar. Mas eu sei para onde ele iria: avistei um lago amaldiçoado perto da parede de rubi. Ele sem dúvida estaria lá, deleitando-se com a angústia. Grasuul não está... bem.

Diga a Grasuul que acordei. Ele voltará.\""
"Truxartis in Vidaria said, \"I crave fresh lifeblood! But I am too... Busy to obtain it myself. Go and fetch it for me. Speak with Grasuul, he seems to... Know where to find the easiest lifeblood.\"": "Truxartis em Vidaria disse: \"Desejo sangue fresco! Mas estou muito... ocupado para obtê-lo sozinho. Vá buscá-lo para mim. Fale com Grasuul, ele parece... saber onde encontrar o sangue vital mais fácil.\""
"Truxartis in Vidaria said, \"I have need of large hate pearls. You can sometimes find them on the corpses of your victims. Speak with Grasuul to find the freshest blood today... that will also be your best chance for finding hate pearls.

For this particular purpose I do not... care how fresh they are. You may use store-bought hate pearls for all I care. Just make certain they are extremely... hateful. \"": "Truxartis em Vidaria disse: \"Preciso de grandes pérolas de ódio. Às vezes você pode encontrá-las nos cadáveres de suas vítimas. Fale com Grasuul para encontrar o sangue mais fresco hoje... essa também será sua melhor chance de encontrar pérolas de ódio.

Para este propósito específico, não me importo com o quão frescos eles sejam. Você pode usar pérolas de ódio compradas em lojas, pelo que me importa. Apenas certifique-se de que eles sejam extremamente... odiosos. \""
"Truxartis in Vidaria said, \"I have need of small hate pearls. But they must be extraordinarily... fresh, and must come from a living creature. I can't use those worthless manufactured hate pearls!

Speak with Grasuul to learn what blood is fresh today. Hunt those creatures. But be warned -- some creatures are more hateful than others. I am content to wait a day or two if necessary.\"": "Truxartis em Vidaria disse: \"Preciso de pequenas pérolas de ódio. Mas elas devem ser extraordinariamente... frescas e devem vir de uma criatura viva. Não posso usar essas pérolas de ódio fabricadas sem valor!

Fale com Grasuul para saber que sangue está fresco hoje. Cace essas criaturas. Mas esteja avisado: algumas criaturas são mais odiosas que outras. Estou contente em esperar um dia ou dois, se necessário.\""
"Truxartis in Vidaria said, \"I need to re-open this Blood Well ... right away. But a very rude... manticore...stole the lens while I was... resting. He is called Lythorax. You will need to kill him. He's sentient... but not <i>very</i> sentient.

You will need...assistance... most likely.\"": "Truxartis em Vidaria disse: \"Preciso reabrir este Poço de Sangue... imediatamente. Mas um muito rude... manticora... roubou a lente enquanto eu estava... descansando. Ele se chama Lythorax. Você precisará matá-lo. Ele é senciente... mas não <i>muito</i> senciente.

Você precisará de... ajuda... provavelmente.\""
"Truxartis in Vidaria said, \"I need to reawaken my blood powers. If only I hadn't killed the First Thrall years ago and stashed his body parts beneath a ruined tower in the Kur Mountains! But alas, I did.

Go and find them for me. Try not to alert Lomas to your presence -- you shouldn't need to see him at all. If you do encounter Lomas, tell him that I'll get him the money soon.\"": "Truxartis em Vidaria disse: “Preciso despertar novamente meus poderes de sangue. Se ao menos eu não tivesse matado o Primeiro Thrall anos atrás e escondido partes de seu corpo sob uma torre em ruínas nas Montanhas Kur!

Vá e encontre-os para mim. Tente não alertar Lomas sobre sua presença - você não deveria precisar vê-lo. Se você encontrar Lomas, diga a ele que vou conseguir o dinheiro para ele em breve.\""
"Truxartis in Vidaria said, \"I've used Khyrulek's journal to map a way into one of the vampire safehouses beneath Statehelm. There's a working entrance in... Vidaria! It's in the old Woodburr Farm common building. Look for a... windmill... nearby. Once you find the Tuvillic Rune, you should be able to... defeat the guardian... and enter the safehouse.

Once inside, search for these items -- I will write them down for you. You may keep anything else you find.\"": "Truxartis em Vidaria disse: \"Eu usei o diário de Khyrulek para mapear um caminho para um dos esconderijos de vampiros abaixo de Statehelm. Há uma entrada funcional em... Vidaria! Fica no antigo prédio comum da Fazenda Woodburr. Procure por um... moinho de vento... próximo. Depois de encontrar a Runa Tuvillic, você deverá ser capaz de... derrotar o guardião... e entrar no esconderijo.

Uma vez lá dentro, procure por esses itens – vou anotá-los para você. Você pode ficar com qualquer outra coisa que encontrar.\""
"Truxartis in Vidaria said, \"Khyrulek's journal is almost correct, but her calculations are outdated due to planar shift. They must be recalibrated by a... teleportation sage.

There was such a sage in Statehelm years ago named Elmetaph, but my spies say he lives now in a lighthouse on a desolate island.

Seek out this Elmetaph and force him to fix these calculations.\"": "Truxartis em Vidaria disse: \"O diário de Khyrulek está quase correto, mas seus cálculos estão desatualizados devido à mudança planar. Eles devem ser recalibrados por um... sábio de teletransporte.

Há anos atrás, havia um sábio em Statehelm chamado Elmetaph, mas meus espiões dizem que ele vive agora em um farol em uma ilha deserta.

Procure esse Elmetaph e force-o a corrigir esses cálculos.\""
"Truxartis in Vidaria said, \"Khyrulek's notes are precious. We must break the... code.

No matter, I'm sure that I can...trivially...decipher this script.

Go, bloodling. Find me the usual tools for...such a task.\"": "Truxartis em Vidaria disse: \"As notas de Khyrulek são preciosas. Devemos decifrar o... código.

Não importa, tenho certeza de que posso... trivialmente... decifrar esse script.

Vá, sangrento. Encontre-me as ferramentas usuais para... tal tarefa.\""
"Truxartis in Vidaria said, \"Listen carefully.

Seek a lich named Khyrulek underneath a town called Serbule. The lich... isn't there. But there may be... guardians.

This lich had a planar guide which I need. It will be hidden in a trove of Tuvillus artifacts.

If I recall... you can find it in her sleeping quarters.

Look for a rune of Tuvillus -- a red sigil. It will be... on the wall.

Touch it to reveal the hoard. Bring me back Khyrulek's Planar Planner.\"": "Truxartis em Vidaria disse: “Ouça com atenção.

Procure um lich chamado Khyrulek embaixo de uma cidade chamada Serbule. O lich... não está lá. Mas pode haver... guardiões.

Este lich tinha um guia planar que eu preciso. Ele estará escondido em uma coleção de artefatos de Tuvillus.

Se bem me lembro... você pode encontrá-lo nos dormitórios dela.

Procure uma runa de Tuvillus – um sigilo vermelho. Estará... na parede.

Toque nele para revelar o tesouro. Traga-me de volta o Planejador Planar de Khyrulek.\""
"Truxartis in Vidaria said, \"My experiments require fresh hematic ichor. It can be hard to find, but just keep drinking people and... you'll find it eventually. Grasuul will know the best places to look today.\"": "Truxartis em Vidaria disse: \"Meus experimentos requerem icor hemático fresco. Pode ser difícil de encontrar, mas continue bebendo gente e... você o encontrará eventualmente. Grasuul conhecerá os melhores lugares para procurar hoje.\""
"Truxartis in Vidaria said, \"My mind is... Fuzzy. I need to realign it. Yes! I know what to do.

You should find a Tuvillic Rune in Povus, beneath a giant mushroom. Touch the rune and retrieve the Mnemonix Index. When you enter the caves, turn left and you should see it.\"": "Truxartis em Vidaria disse: \"Minha mente está... confusa. Preciso realinhá-la. Sim! Eu sei o que fazer.

Você deverá encontrar uma Runa Tuvillic em Povus, abaixo de um cogumelo gigante. Toque na runa e recupere o Índice Mnemonix. Ao entrar nas cavernas, vire à esquerda e você verá.\""
"Truxartis in Vidaria said, \"The bones of the First Thrall have been sucked dry, but they are still valuable. I just need... Refresh them! Yes. This could work.

I have located another entrance to a secret basement beneath Statehelm. I believe this to be a storehouse for vampiric thralls that are... too far gone to live on the street. \"Lost thralls,\" they're called, but their blood is... potent. After years or even decades of vampiric feeding, they've become delectable and potent vessels. Not as delectable as my poor First Thrall, of course. ... But good enough to recharge these bones.

The entrance is in Rahu. I recall it being in a small house overlooking a lake.

Oh, while you are in there, I need a few other items.\"": "Truxartis em Vidaria disse: \"Os ossos do Primeiro Escravo foram sugados, mas ainda são valiosos. Eu só preciso... atualizá-los! Sim. Isso pode funcionar.

Localizei outra entrada para um porão secreto abaixo do Statehelm. Acredito que este seja um depósito para escravos vampíricos que estão... longe demais para viver nas ruas. \"Escravos perdidos\", são chamados, mas seu sangue é... potente. Depois de anos ou mesmo décadas de alimentação vampírica, eles se tornaram recipientes deliciosos e potentes. Não tão delicioso quanto meu pobre Primeiro Escravo, é claro. ... Mas bom o suficiente para recarregar esses ossos.

A entrada fica em Rahu. Lembro-me de estar em uma pequena casa com vista para um lago.

Ah, enquanto você está aí, preciso de alguns outros itens.\""
"Truxartis in Vidaria said, \"The final ingredient I need to recover my mental powers is... an ancient pineal gland. I know where you can find exactly... What I need. Search for a Tuvillic Rune in Povus. I believe it is somewhere along the outer wall.\"": "Truxartis em Vidaria disse: “O ingrediente final que preciso para recuperar meus poderes mentais é... uma antiga glândula pineal."
"Truxartis in Vidaria said, \"The Mnemonix Index has laid bare what other resources I will need. Here is a list. Take care of it.\"": "Truxartis em Vidaria disse: \"O Índice Mnemonix revelou quais outros recursos vou precisar. Aqui está uma lista. Cuide dela.\""
"Truxartis in Vidaria said, \"The potion worked! I feel stronger. Healthier. More virile. I can feel my powers returning! I just need to unlock... them again.

Help me with the unlocking ritual, and I shall unlock the power of the bat for you, too!

I just need some supplies for the inscription ceremony.

Now where did I leave the ghostly guano? Ah, of course. On an island known as Sun Vale, look for a ruin. That should be enough to go on, right? Oh, yes: some of those grim little Winter Fae like to... frolic nearby.

For the other ingredients, I'm certain your... cosmopolitan upbringing will aid you in their procurance.\"": "Truxartis em Vidaria disse: \"A poção funcionou! Sinto-me mais forte. Mais saudável. Mais viril. Posso sentir meus poderes retornando! Só preciso desbloqueá-los... novamente.

Ajude-me com o ritual de desbloqueio e eu desbloquearei o poder do bastão para você também!

Só preciso de alguns suprimentos para a cerimônia de inscrição.

Agora, onde deixei o guano fantasmagórico? Ah, claro. Em uma ilha conhecida como Sun Vale, procure por uma ruína. Isso deve ser suficiente para continuar, certo? Ah, sim: alguns daqueles pequenos Winter Fae sombrios gostam de... brincar por perto.

Quanto aos outros ingredientes, tenho certeza de que sua... educação cosmopolita irá ajudá-lo em sua obtenção.\""
"Truxartis in Vidaria said, \"The secret ingredient in my potion is, of course... a secret. You are not worthy... to know it. Its creation would be beyond you anyway.

I have hid some of this ingredient in various realms... outside of ours. The easiest to reach is via Eltibule.

The winter fae have tunnels that travel through Eltibule. Look for green bears. Oh... you may need to find a key. Speak to humans in the area.

Once inside, look for a Tuvillic Rune. It's not too far... inside.\"": "Truxartis em Vidaria disse: \"O ingrediente secreto da minha poção é, claro... um segredo. Você não é digno... de conhecê-lo. Sua criação estaria além de você de qualquer maneira.

Eu escondi alguns desses ingredientes em vários reinos... fora do nosso. O acesso mais fácil é via Eltibule.

As fadas do inverno têm túneis que atravessam Eltibule. Procure ursos verdes. Ah... talvez você precise encontrar uma chave. Fale com os humanos na área.

Uma vez lá dentro, procure uma Runa Tuvillic. Não é muito longe... lá dentro.\""
"Truxartis in Vidaria said, \"We shall simply create a... new potion to help me restore my... power.

First, obtain the... simple organic ingredients.\"": "Truxartis em Vidaria disse: \"Vamos simplesmente criar uma... nova poção para me ajudar a restaurar meu... poder.

Primeiro, obtenha os... ingredientes orgânicos simples.\""
"Truxartis in Vidaria said, \"While I am still... more powerful than you could ever dream to be, I... have been robbed of much of my... power. But do not worry. You shall help me recover.

Not too long ago I had a thrall hide supplies in an abandoned keep in Eltibule. Find a way into the walls and find a rune of Tuvillus.
Defeat the primitive guardian and... bring me the ointment it guards. Hurry.\"": "Truxartis em Vidaria disse: \"Enquanto eu ainda sou... mais poderoso do que você jamais poderia sonhar ser, eu... fui roubado de grande parte do meu... poder. Mas não se preocupe. Você deve me ajudar a recuperar.

Não muito tempo atrás, um servo escondeu suprimentos em uma fortaleza abandonada em Eltibule. Encontre um caminho para as paredes e encontre uma runa de Tuvillus.
Derrote o guardião primitivo e... traga-me o unguento que ele protege. Depressa.\""
"Try as you might, the Pig symbol seems just beyond your skill. Perhaps if you lived and worked as a pig yourself! Yes, that's the only way.": "Por mais que tente, o símbolo do Porco parece estar além de sua habilidade. Talvez se você mesmo vivesse e trabalhasse como um porco! Sim, essa é a única maneira."
"Try making some juniper wine. It's not easy, but it's worth it! Sometimes, anyway!": "Experimente fazer um pouco de vinho de zimbro. Não é fácil, mas vale a pena! Às vezes, de qualquer maneira!"
"Tryaka Needs Glass": "Tryaka precisa de vidro"
"Tryaka said, \"I could really use some more glass so I can make more of these rings. Bring me some green glass and we can get started on yours!\"": "Tryaka disse: \"Eu realmente poderia usar mais vidro para poder fazer mais desses anéis. Traga-me um pouco de vidro verde e podemos começar a fazer o seu!\""
"Tryaka used to make necklaces of cinnabar. If we still had some, perhaps she'd take up the trade again.": "Tryaka costumava fazer colares de cinábrio. Se ainda tivéssemos alguns, talvez ela retomasse o negócio."
"Tryaka's favorite snack was peaches. They always cheered her up! Pity they only grow far from here...": "O lanche favorito de Tryaka eram pêssegos. Eles sempre a animaram! Pena que só crescem longe daqui..."
