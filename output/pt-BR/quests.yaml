"Trasen in Serbule Hills said, \"If you listen very carefully, you might hear the friendly tornadoes around here making an oscillating noise approximately five notes higher than normal. They're obviously in significant distress!

I think it's those ghastly exploding sheep. If an explosion gets sucked up into a tornado, that can really upset it. Could you clear the area of those fiery abominations?\"": "Trasen em Serbule Hills disse: \"Se você ouvir com atenção, poderá ouvir os tornados amigáveis por aqui fazendo um ruído oscilante aproximadamente cinco notas acima do normal. Eles estão obviamente em perigo significativo!

Acho que são aquelas ovelhas horríveis que explodem. Se uma explosão for sugada por um tornado, isso pode realmente perturbá-lo. Você poderia limpar a área dessas abominações de fogo?\""
"Trasen in Serbule Hills said, \"It wasn't the sheep upsetting our tornado friends. It's the tigers! Tigers can't hurt tornadoes, but our tornadoes are juveniles and don't really understand that.

The whirlwinds say there's a huge tiger on the hill east of here, near the lookout tower. They call her Windbiter because she viciously attacks them! Completely harmlessly, of course, but it's still not polite. Can you get rid of this big cat and her entourage?\"": "Trasen em Serbule Hills disse: \"Não foram as ovelhas que perturbaram nossos amigos tornados. São os tigres! Os tigres não podem ferir tornados, mas nossos tornados são juvenis e realmente não entendem isso.

Os redemoinhos dizem que há um tigre enorme na colina a leste daqui, perto da torre de observação. Eles a chamam de Windbiter porque ela os ataca violentamente! Completamente inofensivo, é claro, mas ainda assim não é educado. Você consegue se livrar desse grande felino e de sua comitiva?\""
"Trasen in Serbule Hills said, \"There are several types of ranalon around here. The large ones with the dangling orb on their heads are my favorite. I would love to see how their glow balls work. Well, if you happen to find any, please show them to me!\"": "Trasen em Serbule Hills disse: \"Existem vários tipos de ranalon por aqui. Os grandes com o orbe pendurado na cabeça são os meus favoritos. Eu adoraria ver como funcionam suas bolas luminosas. Bem, se acontecer de você encontrar alguma, por favor, mostre-as para mim!\""
"Trasen in Serbule Hills said, \"We don't have many ranalon in Verta so I've been very interested to learn more about the ones that live here! Unfortunately they aren't friendly.

I've noticed many of them carry bits of glass around and I can't imagine why. Could you find me some samples? The pretty violet ones.\"": "Trasen em Serbule Hills disse: \"Não temos muitos ranalon em Verta, então estou muito interessado em aprender mais sobre os que vivem aqui! Infelizmente, eles não são amigáveis.

Tenho notado que muitos deles carregam pedaços de vidro e não consigo imaginar por quê. Você poderia me encontrar algumas amostras? As lindas violetas.\""
