": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Carne de porco! Ouvi dizer que os Fae têm uma ótima receita de peixe vex! Traga-me 40 Evu Mint Pork e talvez eu possa ajudá-lo de alguma forma."
"Hello... Hello... Hello... Hello... Wait! It finally worked! I've been trying to reach you for a while. You gotta help us, chief! Most of my friends aren't as smart as me and they're eating toxic seaweed and dying. It just flowed in last night, and already we lost Mertie. That's what I called him. He didn't answer to the name, of course. But he was a good cod who didn't deserve to die that way.": "Olá... Olá... Olá... Olá... Espere! Finalmente funcionou! Estou tentando entrar em contato com você há um tempo. Você tem que nos ajudar, chefe! A maioria dos meus amigos não é tão inteligente quanto eu e está comendo algas tóxicas e morrendo. Aconteceu ontem à noite e já perdemos Mertie. Foi assim que eu o chamei. Ele não respondeu ao nome, é claro. Mas ele era um bom bacalhau que não merecia morrer daquele jeito."
"Hello? Oh. This is from Kalaba. I accept the delivery. Tell him I'll need more in a week.": "Olá? Oh. Isto é de Kalaba. Aceito a entrega. Diga a ele que precisarei de mais em uma semana."
"Hello? Yes, good. You found it.": "Olá? Sim, bom. Você encontrou."
