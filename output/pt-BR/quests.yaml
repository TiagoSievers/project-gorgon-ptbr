"Are the gnashers thwarted? And I mean murder-thwarted, not that sad kind of thwarting where they come back! They're gone, right?

Oh good. That was scary! Thanks for finally answering the summons. Now get out of here, you're blowing my cover!": "Os roedores estão frustrados? E quero dizer assassinato frustrado, não aquele tipo triste de frustração de onde eles voltam! Eles se foram, certo?

Ah, que bom. Isso foi assustador! Obrigado por finalmente responder à convocação. Agora saia daqui, você está estragando meu disfarce!"
"Are these the kuvou tongues? Oh, by the four, that stinks... I didn't think my plan through very well. How do I tan these?!

No, no, you've already done enough. Let me repay you for your effort with another customized hammer.": "Estas são as línguas kuvou? Ah, pelos quatro, isso é péssimo... Não pensei muito bem no meu plano. Como faço para bronzear isso?!

Não, não, você já fez o suficiente. Deixe-me retribuir seu esforço com outro martelo personalizado."
"Are those them? Wow. I guess, yeah, that'd make a pretty good staff! Let me give you something nice for your trouble! Do you like drugs? I'm trying to quit. Take my stash.": "São eles? Uau. Eu acho que sim, isso daria uma equipe muito boa! Deixe-me dar-lhe algo de bom pelo seu problema! Você gosta de drogas? Estou tentando desistir. Pegue meu estoque."
"Are you finally ready to take my order? I've been waiting for hours! Yes, I'd like the shroom feast, please. And please try to keep it as ungreasy as possible.": "Você finalmente está pronto para anotar meu pedido? Estou esperando há horas! Sim, eu gostaria do banquete de cogumelos, por favor. E, por favor, tente mantê-lo o mais gorduroso possível."
"Are you headed back out to Vidaria soon? You should look into something for me. There used to be a battle polo team in the city. It's been gone for a long time. But there was a contest where you could find a ceremonial sword in Vidaria, called the Vanquisher's Blade, which would automatically get you on the team roster. I found some clues about it while I was stationed out there but never found the thing. I'd love to have one as a keepsake. I'll pay you well for it, if you find it!

<i>[Note: completing this quest will sell the blade to Sir Brooker. If you wish to keep the blade you should cancel this quest.]</i>": "Você voltará para Vidaria em breve? Você deveria procurar algo para mim. Costumava haver um time de pólo de batalha na cidade. Já se foi há muito tempo. Mas havia um concurso onde você poderia encontrar uma espada cerimonial em Vidaria, chamada Vanquisher's Blade, que o colocaria automaticamente no elenco do time. Encontrei algumas pistas sobre isso enquanto estava lá, mas nunca encontrei a coisa. Eu adoraria ter um como lembrança. Pagarei bem por isso, se você encontrar!

<i>[Nota: completar esta missão venderá a lâmina para Sir Brooker. Se você deseja manter a lâmina, você deve cancelar esta missão.]</i>"
"Are you infected? No? Well, good! The idea of thinking fungus freaks me out. Better you than me!": "Você está infectado? Não? Bem, que bom! A ideia de pensar em fungo me assusta. Melhor você do que eu!"
"Are you still stuck on the tofu thing? Tofu is useless on its own, that's why I stopped pursuing it. It's not really worth eating alone, like cheese is! I could teach you some nice cheese recipes instead ... No?

Okay. Well I'm working on some Roquefort, and I need pungent rennet. Get it for me and I'll teach you a simple tofu recipe.": "Você ainda está preso na coisa do tofu? O tofu é inútil por si só, por isso parei de persegui-lo. Não vale a pena comer sozinho, como o queijo! Em vez disso, eu poderia te ensinar algumas receitas legais de queijo... Não?

OK. Bem, estou trabalhando em um pouco de Roquefort e preciso de coalho picante. Pegue para mim e eu te ensinarei uma receita simples de tofu."
