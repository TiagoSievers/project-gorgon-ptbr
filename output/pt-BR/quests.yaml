"Terriva Jance in Statehelm said, \"Hey how about one more tall glass of that brown ale? Don't worry, I can hold my stuff.\"": "Terriva Jance, em Statehelm, disse: \"Ei, que tal mais um copo alto daquela cerveja marrom? Não se preocupe, posso segurar minhas coisas.\""
"Terriva Jance in Statehelm said, \"Hey! You're the brown ale expert. Hey hey good to see you again! I've been thinking about that brown ale. I want to order a keg of it! Can you deliver? I've been saving up!\"": "Terriva Jance, em Statehelm, disse: \"Ei! Você é o especialista em brown ale. Ei, ei, que bom ver você de novo! Estou pensando naquela brown ale. Quero pedir um barril dela! Você pode entregar? Estou economizando!\""
"Terriva Jance in Statehelm said, \"I'm ready for another keg of the brown. Business has been good!\"": "Terriva Jance, em Statehelm, disse: \"Estou pronta para outro barril de marrom. Os negócios têm corrido bem!\""
"Terriva Jance in Statehelm said, \"You know what I miss? Brown ale. Strong, sweet, but dry. Except the wet ones. I'm not too particular I guess. But every brown ale is better than what Cynthia serves!\"": "Terriva Jance, em Statehelm, disse: \"Sabe do que sinto falta? Brown Ale. Forte, doce, mas seca. Exceto as úmidas. Acho que não sou muito exigente. Mas toda brown ale é melhor do que a que Cynthia serve!\""
