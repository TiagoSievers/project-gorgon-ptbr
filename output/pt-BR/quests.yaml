"Spot in Animal Town said, \"Hi! If you like to help animals, you should help us, because we're animals. And we need help! Sebastian and Grana went away to rescue some smart snails in Verta, but they took too much of our food. Now we don't have enough. When they come back I'll say, 'I'm not mad, I'm just disappointed,' and they'll know I'm actually really mad. But right now we need new food.\"": "Spot em Animal Town disse: \"Olá! Se você gosta de ajudar os animais, você deveria nos ajudar, porque somos animais. E precisamos de ajuda! Sebastian e Grana foram resgatar alguns caracóis espertos em Verta, mas eles levaram muito da nossa comida. Agora não temos o suficiente. Quando eles voltarem, direi: 'Não estou bravo, estou apenas desapontado', e eles saberão que estou realmente bravo. Mas agora precisamos de comida nova.\""
"Spot in Animal Town said, \"Okay. We need round things on the tree. Round. Round round round. Think... Oh, onions are round! Get lots of onions.\"": "Spot em Animal Town disse: \"Tudo bem. Precisamos de coisas redondas na árvore. Redondo. Redondo, redondo. Pense... Oh, cebolas são redondas! Pegue muitas cebolas.\""
"Spot in Animal Town said, \"We need a big thing on top of the tree. And it should be something animals make. Like... poop. No... like meat! No... like cheese! Yes! Animals make cheese! Get a big hard cheese.\"": "Spot em Animal Town disse: \"Precisamos de uma coisa grande no topo da árvore. E deve ser algo que os animais fazem. Como... cocô. Não... como carne! Não... como queijo! Sim! Os animais fazem queijo! Pegue um queijo grande e duro.\""
"Spot in Animal Town said, \"We need round things for the tree! Round... round... like plates. Plates! Get some plates. This many. <i>[Spot holds up a varying number of fingers, changing her mind every few seconds. You decide that a half-dozen plates will do.]</i>\"": "Spot em Animal Town disse: “Precisamos de coisas redondas para a árvore!"
"Spot in Animal Town said, \"We need stringy things. Like... um, string. No, string is ugly. Sausages! Sausages are stringy! Get some!

But please <i>please</i> don't tell Norbert because he yells at me when I say I like sausage. Please? Okay good.\"": "Spot em Animal Town disse: \"Precisamos de coisas pegajosas. Tipo... hum, barbante. Não, barbante é feio. Salsichas! Salsichas são pegajosas! Pegue um pouco!

Mas, por favor, <i>por favor</i>, não conte ao Norbert porque ele grita comigo quando digo que gosto de salsicha. Por favor? Ok, bom.\""
