"Aww! Merriana sent you?! No offense to you. I just wanted to meet this chick. Did you know she was the head of the weather witches in Dwyndarre? She was the Grand Stormmaster.

Well, I've written down what I know. Take this to her, and put in a good word for me, okay?": "Ah! Merriana te enviou?! Sem ofensa para você. Eu só queria conhecer essa garota. Você sabia que ela era a chefe das bruxas do tempo em Dwyndarre? Ela era a Grande Mestre da Tempestade.

Bem, eu escrevi o que sei. Leve isso para ela e fale bem de mim, ok?"
"Azalak the mantis asked you to create a dish of Venison Psi-Mantis Style. He intends to use it to woo Zeratak.": "Azalak, o louva-a-deus, pediu que você criasse um prato de carne de veado estilo Psi-Mantis. Ele pretende usá-lo para cortejar Zeratak."
"Azalak the mantis asked you to find some psi mantises that have snuck into Serbule, and discreetly slay them before they bring the town's wrath down upon the mantis race.": "Azalak, o louva-a-deus, pediu que você encontrasse alguns louva-a-deus psi que entraram sorrateiramente em Serbule e os matasse discretamente antes que eles trouxessem a ira da cidade sobre a raça dos louva-a-deus."
"Azalak the mantis asked you to get him some venison.": "Azalak, o louva-a-deus, pediu que você comprasse carne de veado para ele."
"Azalak the mantis asked you to get his fellow mantis Zeratak to come visit him.": "Azalak, o louva-a-deus, pediu que você chamasse seu companheiro louva-a-deus, Zeratak, para visitá-lo."
"Azalak the mantis asked you to question his fellow mantis, Zeratak, and see if she is interested in a non-fatal coupling.": "Azalak, o louva-a-deus, pediu para você questionar seu companheiro louva-a-deus, Zeratak, e ver se ela está interessada em um acasalamento não fatal."
"Azalak the mantis needs you to collect a bunch of intact brains from sentient creatures. Brain Bugs occasionally drop intact brains, as do several other creatures, such as Nightmare Creatures and Psychic Mantises.": "Azalak, o louva-a-deus, precisa que você colete um monte de cérebros intactos de criaturas sencientes. Brain Bugs ocasionalmente deixam cair cérebros intactos, assim como várias outras criaturas, como Nightmare Creatures e Psychic Mantises."
"Azalak wishes to see me? Very well. I shall break a leg, as they say in your idiom. Tell him I am coming.": "Azalak deseja me ver? Muito bem. Vou quebrar uma perna, como dizem no seu idioma. Diga a ele que estou indo."
"Back before the orc attacks, my home was beautiful. Even my storage chests were beautiful pieces of art! They sell similar chests in Rahu, but I know those are made by goblin-owned slaves. I need to know my furniture is made by someone free!": "Antes dos ataques dos orcs, minha casa era linda. Até meus baús eram lindas peças de arte! Eles vendem baús semelhantes em Rahu, mas sei que são feitos por escravos de propriedade de goblins. Preciso saber que meus móveis são feitos por alguém de graça!"
"Back beyond the mass of ghouls you'll find even more dangerous undead: wizards! They wield fire and darkness alike.": "Além da massa de ghouls, você encontrará mortos-vivos ainda mais perigosos: magos! Eles controlam o fogo e a escuridão."
"Back in Sinoca I had a state of the art research laboratory for inventing new augmentation oils. I had a breakthrough design that requires dragon scales, but, of course... I could never find any dragon scales! Wouldn't it be great if I found some dragon scales to take home with me? It'd almost make this experience worthwhile. Uh... do you know where any already-dead dragons are? ... Me neither.": "De volta a Sinoca, eu tinha um laboratório de pesquisa de última geração para inventar novos óleos de aumento. Eu tinha um design inovador que exigia escamas de dragão, mas, é claro... nunca consegui encontrar nenhuma escama de dragão! Não seria ótimo se eu encontrasse algumas escamas de dragão para levar para casa? Quase faria essa experiência valer a pena. Uh... você sabe onde estão os dragões já mortos? ... Nem eu."
"Back to the Beacon": "De volta ao farol"
"Back when Povus was growing, we had good relations with certain individual orcs. There is one orc who might help me learn the secrets of orcish armorsmithing: Brugo. He calls himself Brugo The Wise. I understand he's still in the area, although not in the orc camp. See if you can find him. See if he'll teach his secrets.": "Na época em que Povus estava crescendo, tínhamos boas relações com certos orcs individuais. Há um orc que pode me ajudar a aprender os segredos da forjaria orc: Brugo. Ele se autodenomina Brugo, o Sábio. Pelo que entendi, ele ainda está na área, embora não no acampamento orc. Veja se você consegue encontrá-lo. Veja se ele ensina seus segredos."
"Backfat in the Fae Realm said, \"A Ri-Shin tree has to reflect its people. Hah, I know: wouldn't butterflies look great?! Representational, kinda. And also the fairies love 'em. But there's a catch: they have to be alive. Dead butterflies would upset a lot of the fae here.

Crimsonfelt butterflies would look nicest, but they eat cinders out of the air, and there's no way I'm feeding 'em cinders every day. How about some nice pretty rose-mourning butterflies? They're a little smaller, but they can survive on sugar water.

Go catch a whole bunch of 'em! Here's a net.\"": "Backfat no Reino Fae disse: “Uma árvore Ri-Shin tem que refletir seu povo. Hah, eu sei: as borboletas não ficariam ótimas?!

Borboletas de feltro carmesim ficariam mais bonitas, mas elas comem cinzas do ar, e não há como alimentá-las com cinzas todos os dias. Que tal algumas lindas borboletas de luto rosadas? Eles são um pouco menores, mas podem sobreviver com água com açúcar.

Vá pegar um monte deles! Aqui está uma rede.\""
"Backfat in the Fae Realm said, \"I don't think fairies would appreciate normal tree ornaments. But Marrowchomp had a great idea for something much better! It's a pixie-dust shower. Almost completely safe! And we already have most of the parts. I just need some pixie dust, and some piping.\"": "Backfat no Reino Fae disse: “Não acho que as fadas apreciariam enfeites de árvores normais. Mas Marrowchomp teve uma ótima ideia para algo muito melhor!"
"Backfat in the Fae Realm said, \"I found the perfect topper for the tree! It's a chunk of that soul-rock stuff the fairies use for everything. It looks like a tiny lifestone! But there's bad news: Pegast says it's not actually from a lifestone. It's a part of an old defense turret, and it could re-activate at any time, killing all non-fae in the area. That would be a terrible way to die.

Don't worry, there's apparently a way to disable it. It's complicated, but it'll be worth the effort! We need mercury, winterprize, and some wire.\"": "Backfat no Reino Fae disse: \"Encontrei o topo perfeito para a árvore! É um pedaço daquela pedra da alma que as fadas usam para tudo. Parece uma pequena pedra vital! Mas há más notícias: Pegast diz que não é realmente de uma pedra vital. É parte de uma antiga torre de defesa e pode ser reativada a qualquer momento, matando todos os não-fae na área. Essa seria uma maneira terrível de morrer.

Não se preocupe, aparentemente há uma maneira de desativá-lo. É complicado, mas valerá a pena o esforço! Precisamos de mercúrio, prêmio de inverno e alguns fios.\""
"Backfat in the Fae Realm said, \"I'm pretty tired of the mushroom scene. I'm much more into physical fitness these days! But people have certain expectations of an immortal pig. Everyone expects me to know the quality of the local fungi, but I haven't done a survey in a while. Saaaaay... why don't you go out and pick some for me? It'll be great exercise!\"": "Backfat no Reino Fae disse: \"Estou muito cansado da cena dos cogumelos. Estou muito mais interessado em preparo físico hoje em dia! Mas as pessoas têm certas expectativas de um porco imortal. Todo mundo espera que eu conheça a qualidade dos fungos locais, mas não faço uma pesquisa há algum tempo. Saaaaay... por que você não sai e escolhe alguns para mim? Será um ótimo exercício! \""
"Backfat in the Fae Realm said, \"So that fairy over there -- yeah, that one, Pegast. He came over and asked for my help. Finally, recognition of my expertise! But did he want help getting fit and healthy? Nope. He just wanted explosive mushrooms. I gave him what I had, but he still needs more. So now I have to go foraging for this guy.

Hey, you look like you could use some exercise... you ready for a jog into the wilds? Great! These are very tricky mushrooms to pick, so be careful!\"": "Backfat no Reino Fae disse: \"Então aquela fada ali - sim, aquela, Pegast. Ele veio e pediu minha ajuda. Finalmente, reconhecimento de minha experiência! Mas ele queria ajuda para ficar em forma e saudável? Não. Ele só queria cogumelos explosivos. Eu dei a ele o que tinha, mas ele ainda precisa de mais. Então agora tenho que procurar esse cara.

Ei, parece que você precisa de algum exercício... está pronto para correr pela natureza? Ótimo! Estes são cogumelos muito difíceis de colher, por isso tome cuidado!\""
"Backfat in the Fae Realm said, \"You'd expect fairy lights to be pretty easy to get here in the fae realm. All these fairies can make sparkly lights! But Pegast says they can't waste them on frivolities. And that turns into the same argument I always have with these guys: what ISN'T frivolous to an immortal?

Anyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.\"": "Backfat no Reino Fae disse: \"Você esperaria que as luzes das fadas fossem muito fáceis de chegar aqui no reino das fadas. Todas essas fadas podem fazer luzes brilhantes! Mas Pegast diz que eles não podem desperdiçá-las em frivolidades. E isso se transforma no mesmo argumento que sempre tenho com esses caras: o que NÃO É frívolo para um imortal?

De qualquer forma, tudo bem, encontrei alguém para fazer para nós às escondidas. Eu só preciso pagar a ele. Em favos de mel... muitos favos de mel.\""
