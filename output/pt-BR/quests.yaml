"Perfect! You're the best! Here, take this old thing. It looks good on you!": "Perfeito! Você é o melhor! Aqui, pegue essa coisa velha. Fica bem em você!"
"Perfect! Zhia will either hate this or love it, but she won't be bored by it! And that's really the safest way you can party with Zhia Lian. Here's the recipe, in case you want to make some for a different party.": "Perfeito! Zhia vai odiar ou amar isso, mas não ficará entediada com isso! E essa é realmente a maneira mais segura de festejar com Zhia Lian. Aqui está a receita, caso você queira fazer para uma festa diferente."
"Perfect, perfect. This is good! Hmm, let me see what I can give you in return. Oh, I have a bunch of useless firewood. Here. Take it! Oh, sure, I can teach you a few toolcrafting tricks too, if you like.": "Perfeito, perfeito. Isso é bom! Hmm, deixe-me ver o que posso lhe dar em troca. Ah, eu tenho um monte de lenha inútil. Aqui. Pegue! Ah, claro, posso te ensinar alguns truques de criação de ferramentas também, se você quiser."
"Perfect. I'll string these up and add them to the tree!": "Perfeito. Vou amarrá-los e adicioná-los à árvore!"
"Perfect. It smells delicious! ... But I do understand that civilized creatures find raw meat disgusting. I shall put it on ice immediately!": "Perfeito. Tem um cheiro delicioso! ... Mas eu entendo que as criaturas civilizadas acham a carne crua nojenta. Vou colocá-lo no gelo imediatamente!"
"Perfect. Now I'll get these lazy dwarves (and Sona) to start cutting out snowflakes. Thanks!": "Perfeito. Agora vou fazer com que esses anões preguiçosos (e Sona) comecem a cortar flocos de neve. Obrigado!"
"Perfect. Now I'll wait for him to be good and drunk, so he won't remember the taste. You see, the first time you eat these, they're disgusting. But the <i>second</i> time, they're only moderately disgusting, and by the eighth time... wait. Wait! I just realized that these are actually an acquired taste, and it's not really a taste worth acquiring. Oh well, it's too late for me: I love 'em! I'll just eat these myself. Here, for your labor!": "Perfeito. Agora vou esperar ele ficar bem e bêbado, para ele não se lembrar do gosto. Veja, a primeira vez que você come isso, eles são nojentos. Mas na <i>segunda</i> vez, eles são apenas moderadamente nojentos, e na oitava vez... espere. Espere! Acabei de perceber que esse é, na verdade, um gosto adquirido e não é um gosto que valha a pena adquirir. Bem, é tarde demais para mim: eu os amo! Eu mesmo vou comer isso. Aqui, pelo seu trabalho!"
"Perfect. Now watch for itchy ranalons. They'll be extra distracted while you murder them.": "Perfeito. Agora observe os ranalons que coçam. Eles ficarão ainda mais distraídos enquanto você os mata."
"Perfect. The Sand Seer knows a goblin who knows a goblin who can get this analyzed. I'll let you know what we learn.": "Perfeito. O Vidente da Areia conhece um goblin que conhece um goblin que pode analisar isso. Vou deixar você saber o que aprendemos."
