"Ricatu in Povus said, \"Gravy would be perfect with this tofurkey you brought me -- give it some extra moistness. Can you make me some? You'll have to find the recipe yourself, though.\"": "Ricatu em Povus disse: \"O molho ficaria perfeito com este tofu que você me trouxe - dê um pouco de umidade extra. Você pode me fazer um pouco? Mas você mesmo terá que encontrar a receita.\""
"Ricatu in Povus said, \"I really need a good dipping sauce to go with all this 'meat'. I heard you can do something with pumpkins -- that should be interesting.  But you'll have to find the recipe yourself.\"": "Ricatu em Povus disse: \"Eu realmente preciso de um bom molho para acompanhar toda essa 'carne'. Ouvi dizer que você pode fazer algo com abóboras - isso deve ser interessante. Mas você mesmo terá que encontrar a receita.\""
"Ricatu in Povus said, \"I used to really enjoy beef kebabs. There's just something <i>primal</i> about ripping chunks of flesh off a pointy stick. I mean, that's disgusting to me now, but ... It was kind of fun.

Anyway, think you could whip up something similar? You'll have to find the recipe yourself.\"": "Ricatu em Povus disse: \"Eu costumava gostar muito de espetinhos de carne. Há algo <i>primitivo</i> em arrancar pedaços de carne de um palito pontudo. Quero dizer, isso é nojento para mim agora, mas... Foi divertido.

De qualquer forma, você acha que poderia preparar algo semelhante? Você terá que encontrar a receita sozinho.\""
"Ricatu in Povus said, \"I want some meatballs. Think you can do meatballs? But it needs to have something harvest-y going on.  You'll have to find the recipe yourself.

And remember, no actual dead turkeys -- or gods forbid, cows!\"": "Ricatu em Povus disse: \"Quero algumas almôndegas. Acha que pode fazer almôndegas? Mas precisa haver algo de colheita acontecendo. Você mesmo terá que encontrar a receita.

E lembre-se, nada de perus mortos de verdade - ou, Deus me livre, vacas!\""
"Ricatu in Povus said, \"It's the harvest season and all my friends are eating turkey: perfectly baked turkey, turkey stir-fry, turkey pot pie ... But killing turkeys to consume their flesh is obviously wrong.

I hear you can make fake meat out of that fake milk somehow. I don't know if I believe myself, but it sure would be convenient to have a plant-based turkey!

I hear that Braigon in Eltibule knows how. Why don't you go ask him?\"": "Ricatu em Povus disse: \"É a época da colheita e todos os meus amigos estão comendo peru: peru perfeitamente assado, peru refogado, torta de peru... Mas matar perus para consumir sua carne é obviamente errado.

Ouvi dizer que você pode fazer carne falsa com esse leite falso, de alguma forma. Não sei se acredito, mas com certeza seria conveniente ter um peru vegetal!

Ouvi dizer que Braigon em Eltibule sabe fazer isso. Por que você não vai perguntar a ele?\""
"Ricatu in Povus said, \"Kelim was telling me about a turkey meatloaf he ate recently, and it sounded really good. Think you can do the same thing with tofurkey? You'll have to find the recipe yourself.\"": "Ricatu em Povus disse: \"Kelim estava me contando sobre um bolo de carne de peru que comeu recentemente e parecia muito bom. Acha que pode fazer a mesma coisa com tofukey? Você mesmo terá que encontrar a receita.\""
"Ricatu in Povus said, \"Milking non-sentient cows is exploitation! Or I think it might be -- this morality thing is <i>hard</i>. And there aren't really enough sentient cows to go around.

Anyway, I want to try this fake milk I've been hearing about. I'll teach you the recipe if you don't know it. I picked it up from a dead goat.\"": "Ricatu em Povus disse: \"Ordenhar vacas não sencientes é exploração! Ou acho que pode ser - essa coisa de moralidade é <i>difícil</i>. E não há vacas sencientes suficientes para todos.

De qualquer forma, quero experimentar esse leite falso de que tenho ouvido falar. Vou te ensinar a receita caso você não conheça. Eu peguei de uma cabra morta.\""
"Ricatu in Povus said, \"My friend Kelim in Amulna says he's got some spices that might help this fake meat taste more like turkey. I think he's trying a little too hard to sell me on them, you know? But it might work.

Go see if he'll give you some harvest spices.\"": "Ricatu em Povus disse: \"Meu amigo Kelim em Amulna diz que tem alguns temperos que podem ajudar esta carne falsa a ficar mais parecida com peru. Acho que ele está se esforçando um pouco demais para me convencer deles, sabe? Mas pode funcionar.

Vá ver se ele lhe dá alguns temperos da colheita.\""
"Ricatu in Povus said, \"Plain old tofurkey is ... kind of dry. Gravy helps, but I bet you can do better. Maybe a sauce ... Oh! How about cranberry sauce! You'll have to find the recipe yourself, though.\"": "Ricatu em Povus disse: \"Tofurkey simples é... meio seco. Molho ajuda, mas aposto que você pode fazer melhor. Talvez um molho... Ah! Que tal molho de cranberry! Você mesmo terá que encontrar a receita.\""
"Ricatu in Povus said, \"Plain old tofurkey is ... plain. Bring me a better one! One with some bite! Maybe some citrus to cut the savory some. But you'll have to find the recipe yourself.\"": "Ricatu em Povus disse: \"Tofurkey simples e velho é ... simples. Traga-me um melhor! Um com um pouco de mordida! Talvez alguns cítricos para cortar alguns salgados. Mas você mesmo terá que encontrar a receita.\""
"Ricatu sent you? Yes! I can get rid of some of these infernal spices! Er ... I mean ...

Yeah. I don't know if the harvest spices I have will help with the taste of this fake meat, but help me out, do me a favor or two, and I'll give you some to take back to him.": "Ricatu te enviou? Sim! Posso me livrar de algumas dessas especiarias infernais! Er... quero dizer...

Sim. Não sei se os temperos da colheita que tenho vão ajudar no sabor dessa carne falsa, mas me ajude, faça-me um favor ou dois, e eu lhe darei alguns para levar para ele."
"Rice Wine": "Vinho de Arroz"
"RiceWine": "Vinho de Arroz"
"Rick got turned into a mirror. For months he seemed like just a normal mirror, until one day words started appearing on him: \"please destroy me\", \"you can't leave me like this forever\", \"you're my only friends and I'm begging you to end this\", and so on. Eventually we agreed and tried to end his suffering... only to find out that he's indestructible. Or at least too hard for us to break!

So we just kept trying to find cures for him, because what else could we do? Eventually Rick calmed down about wanting to die, which was nice, but he still really wanted to not be a mirror. We tried all kinds of crazy stuff: talked to oracles, begged other gods for miracles, anything we could think of, but nothing worked.

Then a few months ago we heard about a special kind of magic in Gazluk. A shaman in an orc city there could supposedly help him. So I took Rick to this city with an orc guide we hired. The guide said we'd get in fine, but he was wrong: he was shot by a gigantic crossbow and died. I fled and orcs captured Rick. So all I can tell you is Rick is somewhere in Gazluk, maybe still in that orc city. I really don't think you should go look for him because you'll die. But if you do, tell him I'm sorry.": "Rick se transformou em um espelho. Durante meses ele parecia apenas um espelho normal, até que um dia começaram a aparecer palavras nele: “por favor, me destrua”, “você não pode me deixar assim para sempre”, “vocês são meus únicos amigos e estou implorando para que acabem com isso”, e assim por diante. Eventualmente concordamos e tentamos acabar com seu sofrimento... apenas para descobrir que ele é indestrutível. Ou pelo menos muito difícil para quebrarmos!

Então continuamos tentando encontrar a cura para ele, porque o que mais poderíamos fazer? Eventualmente, Rick se acalmou sobre querer morrer, o que foi bom, mas ele ainda queria não ser um espelho. Tentamos todo tipo de loucura: conversamos com oráculos, imploramos milagres a outros deuses, qualquer coisa que pudéssemos imaginar, mas nada funcionou.

Então, há alguns meses, ouvimos falar de um tipo especial de magia em Gazluk. Um xamã em uma cidade orc poderia supostamente ajudá-lo. Então levei Rick para esta cidade com um guia orc que contratamos. O guia disse que entraríamos bem, mas ele se enganou: foi atingido por uma besta gigante e morreu. Eu fugi e os orcs capturaram Rick. Então tudo que posso dizer é que Rick está em algum lugar de Gazluk, talvez ainda naquela cidade orc. Eu realmente não acho que você deva procurá-lo porque você vai morrer. Mas se você fizer isso, diga a ele que sinto muito."
"Rick Snapley in New Prestonbule said, \"A good Ri-Shin tree should be covered in red baubles. The shinier the better. We need a big pile of rubies or whatever!\"": "Rick Snapley, em New Prestonbule, disse: \"Uma boa árvore Ri-Shin deve ser coberta de bugigangas vermelhas. Quanto mais brilhante, melhor. Precisamos de uma grande pilha de rubis ou algo assim!\""
"Rick Snapley in New Prestonbule said, \"A Ri-Shin tree needs a topper, something that glows. But I don't wanna use one of those glowing yellow crystals... I know Sona says she can make 'em safe, but it's too dangerous.

Let's just... I dunno, let's just stick some candles on top, like my family used to do. But we'll need to light 'em every night... got any spare tealights?\"": "Rick Snapley em New Prestonbule disse: \"Uma árvore Ri-Shin precisa de uma cobertura, algo que brilhe. Mas não quero usar um daqueles cristais amarelos brilhantes... Eu sei que Sona diz que pode torná-los seguros, mas é muito perigoso.

Vamos só... não sei, vamos colocar algumas velas em cima, como minha família costumava fazer. Mas precisaremos acendê-los todas as noites... tem alguma vela sobressalente?\""
"Rick Snapley in New Prestonbule said, \"First off: you're on my shit list for keeping me in the dark about all this. I can't believe you would go off and kill that sand rat Tal-Saka without me!

But all signs do point to Rahu itself being involved. If that were true, there should be proof of it somewhere. The Onkara keep their records up on a hill in Rahu. Unfortunately, going there would be suicide. Even for me. Even for you! So for now, I guess that's where this mystery will stand.\"": "Rick Snapley em New Prestonbule disse: \"Em primeiro lugar: você está na minha lista de merda por me manter no escuro sobre tudo isso. Não posso acreditar que você iria matar aquele rato de areia Tal-Saka sem mim!

Mas todos os sinais apontam para o envolvimento do próprio Rahu. Se isso fosse verdade, deveria haver provas disso em algum lugar. Os Onkara mantêm seus registros em uma colina em Rahu. Infelizmente, ir para lá seria suicídio. Até para mim. Até para você! Então, por enquanto, acho que é aí que esse mistério permanecerá.\""
"Rick Snapley in New Prestonbule said, \"I remember as a snotrat having to cut out hundreds of paper snowflakes for the tree each year. Tedious work, but it taught me how to use a knife! We'll need some stencils, though... otherwise they won't all be even, and then what's the point?\"": "Rick Snapley, em New Prestonbule, disse: \"Lembro-me, como um rabugento, de ter que cortar centenas de flocos de neve de papel para a árvore todos os anos. Trabalho tedioso, mas me ensinou como usar uma faca! Mas precisaremos de alguns estênceis... caso contrário, eles não serão todos uniformes, e então qual é o sentido?\""
"Rick Snapley in New Prestonbule said, \"I'm trying to bring the whole cave together here, so I got the orcs involved in decorating too. As a race they're not real known for their decorations, but Gasu'um collects empty potion bottles, so let's put 'em on the tree!

She gave me a bunch of Rage to Heat bottles... we just need a few more.\"": "Rick Snapley em New Prestonbule disse: \"Estou tentando reunir toda a caverna aqui, então envolvi os orcs na decoração também. Como raça, eles não são realmente conhecidos por suas decorações, mas Gasu'um coleta frascos de poções vazios, então vamos colocá-los na árvore!

Ela me deu um monte de garrafas de Rage to Heat... só precisamos de mais algumas.\""
"Rick Snapley in New Prestonbule said, \"Mox is mixing that potion you helped get the stuff for. But Sona caught a whiff of it and says she won't drink it! Stupid girl would rather have a limp all her days than spend a few nights in digestive agony! Well, if she's going to be a child about it, we'll have to treat her like one. And how do you make a child take their medicine? Honey! Lots of it.\"": "Rick Snapley, em New Prestonbule, disse: \"Mox está preparando aquela poção para a qual você ajudou a conseguir o produto. Mas Sona sentiu o cheiro e disse que não vai beber! A garota estúpida prefere mancar o dia todo do que passar algumas noites em agonia digestiva! Bem, se ela vai ser uma criança por causa disso, teremos que tratá-la como tal. E como você faz uma criança tomar o remédio? Querido! Muito.\""
"Rick Snapley in New Prestonbule said, \"Sona's recovering well after her incident. Mox helped a lot. But she's still walking with a slight limp. Mox says he can make something for that, but he needs ghost puke. So if you find some, save it.\"": "Rick Snapley em New Prestonbule disse: \"Sona está se recuperando bem após o incidente. Mox ajudou muito. Mas ela ainda está mancando levemente. Mox diz que pode fazer algo para isso, mas ele precisa de vômito fantasma. Então, se você encontrar algum, salve-o. \""
"Rick Snapley in New Prestonbule said, \"The settlers who lived in the houses outside were adherents of Arisetsu, the goddess of Hope and Warmth. You know what that means, right? Blankets! Arisetsu nuts always bring tons of their blankets to give to the needy. Well, they're dead, and we're needy. They brought a lot of their stuff into this cave when they fled, but when the survivors died, they were buried in... you guessed it: Arisetsu blankets. So now we're very low. I'm betting that there's more in those houses, though. Sneak past the ghosts and get us some!\"": "Rick Snapley em New Prestonbule disse: \"Os colonos que viviam nas casas do lado de fora eram adeptos de Arisetsu, a deusa da Esperança e do Calor. Você sabe o que isso significa, certo? Cobertores! Os nozes de Arisetsu sempre trazem toneladas de seus cobertores para dar aos necessitados. Bem, eles estão mortos e nós estamos necessitados. Eles trouxeram muitas de suas coisas para esta caverna quando fugiram, mas quando os sobreviventes morreram, eles foram enterrados em... você adivinhou: cobertores de Arisetsu. Então agora estamos muito baixos, mas aposto que há mais nessas casas. Passe furtivamente pelos fantasmas e consiga alguns para nós!"
"Rick Snapley in New Prestonbule said, \"We have a lot of beer stored away here from the previous tenants. And I know how to summon Council Rations, which are just barely enough to keep us all alive. But I would kill for something else to eat! This is a cave, so you'd think you could catch cave fish in here, right? But no. No deep water, no cave fish. Can you get us some?\"": "Rick Snapley, em New Prestonbule, disse: \"Temos muita cerveja armazenada aqui dos inquilinos anteriores. E eu sei como convocar as rações do Conselho, que mal são suficientes para manter todos nós vivos. Mas eu mataria por outra coisa para comer! Esta é uma caverna, então você pensaria que poderia pegar peixes da caverna aqui, certo? Mas não. Sem águas profundas, sem peixes de caverna. Você pode nos conseguir alguns?\""
