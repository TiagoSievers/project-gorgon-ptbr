"Anamemerie in Statehelm said, \"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Fransesca Muradrake, and you can keep the tip. Let me know when it's done, though, okay? I'm still responsible for it. And don't steal it. Stealing is bad.\"": "Anamemerie em Statehelm disse: \"Estou muito atrasado em minhas entregas hoje! Você poderia ajudar? Este me assusta. Leve para Fransesca Muradrake e você pode ficar com a gorjeta. Avise-me quando terminar, ok? Ainda sou responsável por isso. E não roube. Roubar é ruim. \""
"Anamemerie in Statehelm said, \"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Strom Farblood, and you can keep the tip! And like before, let me know when it's done so I can check it off the list.\"": "Anamemerie em Statehelm disse: \"Estou muito atrasado em minhas entregas hoje! Você poderia ajudar? Este me assusta. Leve para Strom Farblood e você pode ficar com a gorjeta! E como antes, me avise quando estiver pronto para que eu possa retirá-lo da lista. \""
