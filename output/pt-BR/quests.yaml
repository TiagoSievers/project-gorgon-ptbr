"Crelpin in the Fae Realm said, \"This land is just <i>infested</i> with spriggan weeds! I think the pixies plant them or something. They spend the days gathering sun, but at night they hunt for meat! There's a bunch growing south of town, and if you think about it, it'd be really irresponsible for you to NOT kill those pests.\"": "Crelpin, no Reino Fae, disse: \"Esta terra está apenas infestada de ervas daninhas spriggan! Acho que os duendes as plantam ou algo assim. Eles passam os dias pegando sol, mas à noite caçam carne! Há um monte crescendo ao sul da cidade, e se você pensar bem, seria realmente irresponsável da sua parte NÃO matar essas pragas. \""
"Crelpin in the Fae Realm said, \"We've managed to get the bears out of the western bee fields, but south and east of here, they're a real problem! They're especially dense during the day when they hunt for honey. Yes, they eat my damned crop! Why can't they be more like the panthers?! Anyway, you just gotta stop 'em. They're a menace!\"": "Crelpin, no Reino Fae, disse: \"Conseguimos tirar os ursos dos campos de abelhas ocidentais, mas ao sul e ao leste daqui, eles são um problema real! Eles são especialmente densos durante o dia, quando caçam mel. Sim, eles comem minha maldita colheita! Por que eles não podem ser mais parecidos com as panteras?! De qualquer forma, você só precisa detê-los. Eles são uma ameaça!\""
"Crelpin in the Fae Realm said, \"When night happens, vicious Blinding Wasps come out. Sends the bees into hiding. Bees prefer sunlight anyway, but if there weren't so many wasps, I think they'd spend another hour or so working each day.

So anyway, I need you to kill wasps, and you can take your pick of reasons: for safety, or just to help me make more honey.\"": "Crelpin, no Reino Fae, disse: \"Quando a noite chega, as vespas cegantes aparecem. Faz com que as abelhas se escondam. As abelhas preferem a luz solar de qualquer maneira, mas se não houvesse tantas vespas, acho que elas passariam mais ou menos uma hora trabalhando todos os dias.

De qualquer forma, preciso que você mate vespas, e você pode escolher entre os motivos: por segurança ou apenas para me ajudar a fazer mais mel."
"Crelpin in the Fae Realm said, \"Will you do me a favor? I want to try out some mortal recipes I've learned. To master them, I figured I'll need about two thousand potatoes. I can't do that all myself! So I'm asking everyone I see to bring me a few potatoes. Can you bring me a handful?\"": "Crelpin, no Reino Fae, disse: “Você pode me fazer um favor? Quero experimentar algumas receitas mortais que aprendi."
"Crelpin in the Fae Realm said, \"You can do amazing things with the goo of a ripe fairy puff. Usually they explode too violently to be useful, but if you pop one that's perfectly ripe, you won't be hurt! Instead, you'll get coated in their goo.

Go get yourself coated, then come see me. I'll use that goo for hive maintenance.\"": "Crelpin, no Reino Fae, disse: “Você pode fazer coisas incríveis com a gosma de um puff de fada maduro. Geralmente eles explodem violentamente demais para serem úteis, mas se você estourar um que esteja perfeitamente maduro, você não se machucará!

Vá se cobrir e depois venha me ver. Vou usar essa gosma para manutenção da colmeia.\""
"Crelpin in the Fae Realm said, \"You need to take your bee out to the beehive to the west to introduce yourselves.\"": "Crelpin, no Reino Fae, disse: \"Vocês precisam levar sua abelha até a colmeia a oeste para se apresentarem.\""
