"Most myconians have turned away from my counsel. But Poe -- loyal Poe is out there somewhere. I don't really believe Poe has turned away from me. Find Poe and deliver this message-spore. And if Poe needs help, please do whatever is necessary.": "A maioria dos myconianos se afastou do meu conselho. Mas Poe – o leal Poe está por aí em algum lugar. Eu realmente não acredito que Poe tenha se afastado de mim. Encontre Poe e entregue esta mensagem. E se Poe precisar de ajuda, faça o que for necessário."
"Most of my customers are out-of-town orders. Quite expensive stuff. Say! You wouldn' t be interested in helping me fill some orders, would you? Like this one for skulls and brains?": "A maioria dos meus clientes são pedidos de fora da cidade. Coisas bastante caras. Dizer! Você não estaria interessado em me ajudar a atender alguns pedidos, estaria? Como este para crânios e cérebros?"
"Most of the deer around here are healthy, but a number are rabid. Do me a favor and take care of that problem, would you?": "A maioria dos cervos por aqui são saudáveis, mas alguns são raivosos. Faça-me um favor e resolva esse problema, sim?"
"Mountain Muttons": "Carneiros da Montanha"
"MountainMutton": "MontanhaMutton"
"Mourn Players' Tombstones": "Lápides dos jogadores de luto"
"Mox and Bellema don't believe me, but I swear I saw another one of those mushroom men in a cave near here! It was in 'Snowblood Shadow Cave'. I can't understand his way of communicating, but I'm sure he knows the secret of these mushroom rings. If you figure out the secret, tell me!": "Mox e Bellema não acreditam em mim, mas juro que vi outro daqueles homens-cogumelo em uma caverna aqui perto! Foi em 'Snowblood Shadow Cave'. Não consigo entender sua forma de comunicação, mas tenho certeza que ele conhece o segredo desses anéis de cogumelo. Se você descobrir o segredo, me conte!"
"Mox is mixing that potion you helped get the stuff for. But Sona caught a whiff of it and says she won't drink it! Stupid girl would rather have a limp all her days than spend a few nights in digestive agony! Well, if she's going to be a child about it, we'll have to treat her like one. And how do you make a child take their medicine? Honey! Lots of it.": "Mox está preparando aquela poção para a qual você ajudou a conseguir o material. Mas Sona sentiu o cheiro e disse que não vai beber! A garota estúpida prefere mancar o dia todo do que passar algumas noites em agonia digestiva! Bem, se ela vai ser uma criança por causa disso, teremos que tratá-la como uma. E como fazer uma criança tomar o remédio? Mel! Muito disso."
"Mox Warcut in New Prestonbule said, \"I need a sample of the Vol's Kiss that can be found in Gazluk. Can you get it for me? It's a yellow crystal that's warm to the touch. You can find it all over the mountainside.

But listen VERY carefully: carrying it will make you sick. So get the ore and then <i>run</i> back here to me as quick as you can. Don't dally! I only need three pieces, so don't get any more than that.\"": "Mox Warcut em New Prestonbule disse: \"Preciso de uma amostra do Vol's Kiss que pode ser encontrada em Gazluk. Você pode conseguir para mim? É um cristal amarelo quente ao toque. Você pode encontrá-lo em toda a encosta da montanha.

Mas ouça com MUITA atenção: carregá-lo vai te deixar doente. Então pegue o minério e <i>corra</i> de volta aqui para mim o mais rápido que puder. Não perca tempo! Eu só preciso de três peças, então não compre mais do que isso.\""
"Mox Warcut in New Prestonbule said, \"The 'cinnamon' that grows in Council Lands isn't the same plant that we have growing overtop Mt. Aufghel. I need to collect some of the stuff for a report back home. Can you help me collect it? It grows on trees in the snow out there.\"": "Mox Warcut em New Prestonbule disse: \"A 'canela' que cresce nas Terras do Conselho não é a mesma planta que crescemos no Monte Aufghel. Preciso coletar algumas coisas para um relatório em casa. Você pode me ajudar a coletá-la? Ela cresce em árvores na neve lá fora.\""
"Mox Warcut in New Prestonbule said, \"While I was exploring Foothills Cave, I uncovered mummies. I think orcs buried an army of mummies in there after a war and forgot about them. Well, you know how we dwarves feel about mummies! So I killed a few, but there were so many other nasty undead in that cave that I had to retreat. Can you go back in there and get rid of a bunch?\"": "Mox Warcut em New Prestonbule disse: \"Enquanto eu estava explorando a caverna Foothills, descobri múmias. Acho que os orcs enterraram um exército de múmias lá depois de uma guerra e se esqueceram delas. Bem, você sabe como nós, anões, nos sentimos em relação às múmias! Então eu matei alguns, mas havia tantos outros mortos-vivos desagradáveis ​​naquela caverna que tive que recuar. Você pode voltar lá e se livrar de um monte?\""
"Mox Warcut in New Prestonbule said, \"You know, I bet there's a master mummy in Foothills Cave. When a mummy remains alive for long enough, there's a chance it can regain its free will and rise up from its inherent bitterness. When that happens, it become VERY dangerous. They're usually yellowed or blackened with age. If you see one, RUN! You'd need a team of trained warriors to kill it!

Of course, if you happen to have a few friends and wanted to kill the damned thing, I'd be happy to reward such heroism.\"": "Mox Warcut em New Prestonbule disse: \"Sabe, aposto que há uma múmia mestre em Foothills Cave. Quando uma múmia permanece viva por tempo suficiente, há uma chance de que ela possa recuperar seu livre arbítrio e se recuperar de sua amargura inerente. Quando isso acontece, torna-se MUITO perigoso. Eles geralmente ficam amarelados ou enegrecidos com o tempo. Se você vir um, corra! Você precisaria de uma equipe de guerreiros treinados para matá-lo!

Claro, se acontecer de você ter alguns amigos e quiser matar a maldita coisa, eu ficaria feliz em recompensar tal heroísmo.\""
"Moxie said, \"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of Expert-Quality Metal Slabs. Lots of them! I promise I'll only ask this of you once - never again! If you can deliver me 25 Expert-Quality Metal Slabs, I'll show you what I use them for!\"": "Moxie disse: \"Ei, posso pedir que você me faça um favor pessoal? Estou com poucos suprimentos e preciso urgentemente de placas de metal de qualidade especializada. Muitas delas! Prometo que só vou pedir isso a você uma vez - nunca mais! Se você puder me entregar 25 placas de metal de qualidade especializada, vou mostrar para que as uso!\""
"Moxie said, \"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Astounding Magic Rings and 5 Astounding Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\"": "Moxie disse: \"Olá! Recentemente entrei na caravana para explorar novos métodos de fabricação de joias. Que tal começar com você? Crie para mim 5 anéis mágicos surpreendentes e 5 colares encantados surpreendentes. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo? \""
"Moxie said, \"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Great Magic Rings and 5 Great Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\"": "Moxie disse: \"Olá! Recentemente entrei na caravana para explorar novos métodos de fabricação de joias. Que tal começar com você? Crie para mim 5 Grandes Anéis Mágicos e 5 Grandes Colares Encantados. Traga-os para mim para estudar e, em troca, compartilharei um pouco do meu conhecimento com você. Parece um comércio justo? \""
"Moxie said, \"Hi There! I'm fairly new to the caravan! So you like making jewelry too? Let's swap some ideas! Bring me 5 Nice Magic Rings and 5 Nice Enchanted Necklaces. Once I can go over your stuff, I'll share some of what I know too!\"": "Moxie disse: \"Olá! Sou bastante novo na caravana! Então você também gosta de fazer joias? Vamos trocar algumas ideias! Traga-me 5 lindos anéis mágicos e 5 lindos colares encantados. Assim que eu puder revisar suas coisas, compartilharei um pouco do que sei também!\""
