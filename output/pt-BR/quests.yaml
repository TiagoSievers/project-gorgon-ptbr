"Marna wants me to collect a ton of spider legs for her medicinal recipes. In exchange, she'll teach me one of her secret recipes.": "Marna quer que eu colete uma tonelada de patas de aranha para suas receitas medicinais. Em troca, ela me ensinará uma de suas receitas secretas."
"Marna's old, like sooo old. But her hair is so great! You know what I heard? I heard that back before the forest existed, she met a wanderer and helped him ... plant his forest, if you know what I mean, and as a side-effect she's got everflowing hair. Crazy, right? Can you find out if that's true?": "Marna é velha, muuuito velha. Mas o cabelo dela é tão lindo! Você sabe o que eu ouvi? Ouvi dizer que, antes de a floresta existir, ela conheceu um andarilho e o ajudou... a plantar a floresta dele, se é que você me entende, e como efeito colateral ela tem cabelos esvoaçantes. Louco, certo? Você pode descobrir se isso é verdade?"
