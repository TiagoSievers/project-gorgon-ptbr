"UkorgasExperimentalPants": "UkorgasExperimentalCalças"
"UkorgasFurOrder": "UkorgasFurOrdem"
"Ultashk demanded animal fat before he will open the gate into the further reaches of Hogan's 'basement'.": "Ultashk exigiu gordura animal antes de abrir o portão para os confins do 'porão' de Hogan."
"Ultimate Acidic Cleansers": "Produtos de limpeza ácidos finais"
"Ultimate Woolly Comfort": "Conforto lanoso final"
