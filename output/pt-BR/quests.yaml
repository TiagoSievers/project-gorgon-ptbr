"Espere": "sim, eu quero! Só preciso mostrar a ela o lado lindo das pegadinhas. Você consegue fazer ou encontrar um par de moedas coladas? Vou usá-los para uma brincadeira inofensiva. INOFENSIVO. Eu prometo! Ela vai rir!\\\"\""
"Esses porcos nunca foram domesticados; eles toleram seus irmãos selvagens, mas atacam a maioria das outras criaturas sem medo. Os porcos selvagens não são presas": "eles são ameaçadores, inteligentes e cruéis.\""
"Esses porcos selvagens já devem ter sido cuidados por fazendeiros, mas eles vivem na natureza há muitas gerações": "não há como domesticar essas feras deliciosas.\""
"Este é o nosso bilhete para a riqueza": "estou abrindo mão de você. Você só precisa fazer um pouco de trabalho braçal para nós. Primeiro, só preciso de um pouco de cera de qualidade alimentar. Você sabe que está perto de uma estação de depilação, certo? Ótimo, ótimo. Aqui está a receita que precisamos. Faça-nos um pouco disso.\\\"\""
"EternalGreens": "Verdes Eternos"
"Eu os convenci a me darem a localização de outro poço cheio de escorpiões. Você é o único agente em quem confio neste deserto – além do Vidente, é claro – então este é todo seu. Desta vez, há dois objetivos": "conseguir meu xedrite e também uma amostra de um desses escorpiões. Procure um de aparência decentemente assustadora, mate-o e traga de volta... bem, apenas traga tudo de volta, eu acho. O Vidente quer examiná-lo."
"Eveline Rastin in Red Wing Casino said, \"Can you give this note to Willem for me? Now don't read it! Promise you won't!\"": "Eveline Rastin, do Red Wing Casino, disse: \"Você pode dar este bilhete para Willem por mim? Agora não leia! Prometa que não vai!\""
"Eveline Rastin in Red Wing Casino said, \"Fairies have a kind of cloth called fae felt. There's also a drug called fae felt, so it gets kind of confusing... but I really want some of the cloth. Just to understand what it feels like, looks like, smells like. If you find some, can you bring it to me?\"": "Eveline Rastin, do Red Wing Casino, disse: \"As fadas têm um tipo de tecido chamado feltro fae. Há também uma droga chamada feltro fae, então fica meio confuso... mas eu realmente quero um pouco do tecido. Só para entender como é, parece, cheira. Se você encontrar algum, pode trazê-lo para mim? \""
"Eveline Rastin in Red Wing Casino said, \"I have run out of quartz for new jewelry. I would ask Willem, but ... it's complicated. Can you get some for me?\"": "Eveline Rastin, do Red Wing Casino, disse: \"Fiquei sem quartzo para comprar joias novas. Eu perguntaria a Willem, mas... é complicado. Você pode conseguir alguns para mim?\""
"Eveline Rastin in Red Wing Casino said, \"I need a lot of cotton for a new dress I'm making. I wouldn't ask if you looked busy, but since you just seem to be standing around, maybe you could card some cotton for me? Just a little bit. Like ten cards?\"": "Eveline Rastin, do Red Wing Casino, disse: \"Preciso de muito algodão para um vestido novo que estou fazendo. Não perguntaria se você parecia ocupado, mas como parece estar parado, talvez pudesse cardar um pouco de algodão para mim? Só um pouquinho. Tipo dez cartas?\""
"EvelinesTailoredShirt": "EvelinesCamisa Sob Medida"
"Even after I split the money with Errr... with my friend, I'm still going to make a lot of money from this. It's only fair that I reward you with something equally valuable": "my library science techniques! Take these organizational secrets to your grave!"
"Even if these ratkin aren't growing crops here, they're surely making their own cheese! I need a sample of their aged cheese... perhaps it will tell us secrets. Now, when I say that, I don't mean cheese can talk. So don't be afraid. Just get the cheese.": "Mesmo que esses ratos não estejam cultivando aqui, eles certamente estão fazendo seu próprio queijo! Preciso de uma amostra do queijo envelhecido deles... talvez ele nos conte segredos. Agora, quando digo isso, não quero dizer que o queijo possa falar. Então não tenha medo. Basta pegar o queijo."
"Even More Parts?!": "Ainda mais peças?!"
"Even soldiers need refreshment, and the mortals have a bitter booze called Beer which is quite amusing. I'm attempting to craft some of my own, but I need some 'hops'. They don't grow here! Do you have any?": "Até os soldados precisam de refresco, e os mortais tomam uma bebida amarga chamada Cerveja, que é bastante divertida. Estou tentando criar alguns por conta própria, mas preciso de alguns 'lúpulos'. Eles não crescem aqui! Você tem algum?"
