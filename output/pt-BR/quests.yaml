"AGreatNewCalligraphyBench": "Um ótimo novo banco de caligrafia"
"AGreatNewStorageSolution": "Uma ótima nova solução de armazenamento"
"Ah hahaha perfect! I'm gonna make a killing with these! Thanks! Hey, you want this dumb thing? Take it!": "Ah hahaha perfeito! Vou ganhar uma fortuna com isso! Obrigado! Ei, você quer essa coisa idiota? Pegue!"
"AH yes! That will help a great deal! Now if I can keep the guys from firing them all off when they sit and get drunk in the evenings, maybe we can have some for protection and hunting! Come to think of it, I may need some more arrows later. Come by and check later!

<i>[You earn 10 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "AH sim! Isso vai ajudar bastante! Agora, se eu conseguir evitar que os caras demitam todos eles quando eles se sentam e ficam bêbados à noite, talvez possamos ter alguns para proteção e caça! Pensando bem, posso precisar de mais algumas flechas mais tarde. Venha e confira mais tarde!

<i>[Você ganha 10 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"AH yes! That will help a great deal! Now if I can keep the guys from firing them all off when they sit and get drunk in the evenings, maybe we can have some for protection and hunting! Come to think of it, I may need some more arrows later. Come by and check later!

<i>[You earn 5 favor with Orran the Caravan Leader]</i>

<i>[This task is repeatable every 20 hours.]</i>": "AH sim! Isso vai ajudar bastante! Agora, se eu conseguir evitar que os caras demitam todos eles quando eles se sentam e ficam bêbados à noite, talvez possamos ter alguns para proteção e caça! Pensando bem, posso precisar de mais algumas flechas mais tarde. Venha e confira mais tarde!

<i>[Você ganha 5 favores com Orran, o Líder da Caravana]</i>

<i>[Esta tarefa pode ser repetida a cada 20 horas.]</i>"
"Ah yes, my arrowheads, thank you. Elahil's got you doing deliveries now? ... interesting.": "Ah sim, minhas pontas de flecha, obrigado. Elahil pediu para você fazer entregas agora? ... interessante."
"Ah yes, these are the First Thrall's bones, all right.

Hmm. They seem... Inert. Blast that Lomas! He must have realized I hid them in his home. He's stolen the power from these old bones!": "Ah, sim, estes são os ossos do Primeiro Escravo, certo.

Hum. Eles parecem... Inertes. Maldito seja Lomas! Ele deve ter percebido que eu os escondi em sua casa. Ele roubou o poder desses ossos velhos!"
"AH! The metal I need! Thank you so much! Now, what do I use these slabs for? Clasps and reinforcements for necklaces! I found this Amulet of the Rugged Traveler a while back. Where? Oh, I found it on some dead guy, and he looked pretty rugged when I found him! Anyway, I have figured out how to upgrade them while keeping their effectiveness. If you have an exceptional quality or better Amulet of the Rugged Traveler, I can upgrade it for you, if you're willing to toss me some tokens as well for the time. Speaking of traveling, would you be interested in buying some of my famous flight butter? Go see Orran!
<i>[You have earned 10 favor with Orran the Caravan Leader]</i>
<i>[You have unlocked new talk options with Moxie]</i>": "AH! O metal que eu preciso! Muito obrigado! Agora, para que uso essas lajes? Fechos e reforços para colares! Encontrei este Amuleto do Viajante Robusto há algum tempo. Onde? Ah, encontrei isso em um cara morto, e ele parecia bem robusto quando o encontrei! De qualquer forma, descobri como atualizá-los mantendo sua eficácia. Se você tiver um Amuleto do Viajante Robusto de qualidade excepcional ou melhor, posso atualizá-lo para você, se você estiver disposto a me dar algumas fichas por enquanto. Falando em viajar, você estaria interessado em comprar um pouco da minha famosa manteiga de voo? Vá ver Orran!
<i>[Você ganhou 10 favores de Orran, o Líder da Caravana]</i>
<i>[Você desbloqueou novas opções de conversação com Moxie]</i>"
"Ah, a lovely thermic rubyite! I will take possession of it. I need six in total.": "Ah, uma adorável rubiita térmica! Eu tomarei posse dele. Preciso de seis no total."
"Ah, all current and future citizens of Amulna thank you! We won't forget your hard work.

The Sand Seer mentioned that she needed the help of you and your friends -- you should see her as soon as you can.": "Ah, todos os actuais e futuros cidadãos de Amulna obrigado! Não esqueceremos seu trabalho duro.

A Vidente da Areia mencionou que precisava da ajuda sua e de seus amigos – você deveria vê-la o mais rápido possível."
"Ah, e aqui": "das muitas receitas que Sir Coth encontrou para mim, esta é a única versão de Gingerbread Humans que pode realmente ser saborosa. Se você estiver com vontade de comer um biscoito étnico, experimente esta receita.\""
"Ah, e se você está assustado com o assassinato, não se preocupe": "não conta como assassinato quando você mata mortos-vivos! Você pode confiar em mim. Eu sou um deus.\""
"Ah, expert-quality indeed. I shall visit the boiler room after work. Dorimir keeps one of the burners hot enough to forge metal! The dwarves here are even more clever than the ones back home.": "Ah, qualidade de especialista, de fato. Visitarei a sala das caldeiras depois do trabalho. Dorimir mantém um dos queimadores quente o suficiente para forjar metal! Os anões aqui são ainda mais espertos do que os de casa."
"Ah, for Sir Hughes? Here it is. Special-ordered to his specifications. Remind him that the creator wishes to remain anonymous. Creating these weapons for non-rakshasa could be embarrassing.": "Ah, para Sir Hughes? Aqui está. Encomendado especialmente de acordo com suas especificações. Lembre-o de que o criador deseja permanecer anônimo. Criar estas armas para não-rakshasa pode ser embaraçoso."
"Ah, good. Let me see this.

<i>(Yasinda reads quickly, with intense concentration.)</i> I see. He has a daughter in Statehelm. But he also seemed genuinely fond of Sinda. Argh! I wish I was first-generation; this would be so much easier without a conscience! Well. Thank you. I will contemplate my options.

Here, take this ring back. As a gift for Sinda, I'd commissioned a spell to enhance the ring her father gave her. I went ahead and used the spell, figuring I could wear the ring myself, but it's too painful to keep. Please get rid of it for me.": "Ah, bom. Deixe-me ver isso.

<i>(Yasinda lê rapidamente, com intensa concentração.)</i> Entendo. Ele tem uma filha em Statehelm. Mas ele também parecia gostar genuinamente de Sinda. Argh! Eu gostaria de ser da primeira geração; isso seria muito mais fácil sem consciência! Bem. Obrigado. Vou contemplar minhas opções.

Aqui, pegue este anel de volta. Como presente para Sinda, encomendei um feitiço para melhorar o anel que seu pai lhe deu. Fui em frente e usei o feitiço, imaginando que poderia usar o anel sozinho, mas é muito doloroso mantê-lo. Por favor, livre-se disso para mim."
"Ah, it's here. But where's the usual fairy? Are you authorized by the Overseer to deliver parcels?! Or did she just pay a random stranger to do her job for her again?

Give me that. I swear. Fairies as delivery-boys was a terrible idea. We should use delivery golems for everything!

Yes, yes, you may go.": "Ah, está aqui. Mas onde está a fada de sempre? Você está autorizado pelo Supervisor a entregar encomendas?! Ou ela simplesmente pagou um estranho para fazer seu trabalho novamente?

Dê-me isso. Juro. Fadas como entregadores era uma péssima ideia. Deveríamos usar golens de entrega para tudo!

Sim, sim, você pode ir."
"Ah, Johnson picked you for the sand worm job? Makes sense.

If you're not prepared, sand worms can be surprisingly nasty, but with some prep work they're nothing to worry about.

Sand worms live at tremendous depths, so their bodies are immune to crushing and physical trauma. They can be burned, although they're not especially vulnerable to it. I'd choose cold magic, myself.

They attack by sticking their pincers in you and vibrating your body with sonic blasts. They can also entangle you in sticky silk that will sap your energy, but they have to be pretty close to do that, so try to keep your distance.

That's all you need to know. I'm sure you'll be fine!": "Ah, Johnson escolheu você para o trabalho do verme da areia? Faz sentido.

Se você não estiver preparado, os vermes da areia podem ser surpreendentemente desagradáveis, mas com algum trabalho de preparação, não há motivo para preocupação.

Os vermes da areia vivem em profundidades tremendas, por isso seus corpos são imunes a esmagamentos e traumas físicos. Eles podem ser queimados, embora não sejam especialmente vulneráveis ​​a isso. Eu mesmo escolheria magia fria.

Eles atacam enfiando suas pinças em você e vibrando seu corpo com rajadas sônicas. Eles também podem enredá-lo em uma seda pegajosa que esgotará sua energia, mas eles precisam estar bem próximos para fazer isso, então tente manter distância.

Isso é tudo que você precisa saber. Tenho certeza que você ficará bem!"
"Ah, junk metal. Wow. I guess I've really hit rock bottom, repairing my awesome shields with this crap!

Uh, but thanks. For the crap. I appreciate it.": "Ah, lixo metálico. Uau. Acho que realmente cheguei ao fundo do poço, consertando meus escudos incríveis com essa porcaria!

Ah, mas obrigado. Pela porcaria. Eu agradeço."
"Ah, mas para sua informação": "já enviamos milhares deles para outros mundos, junto com seus horríveis animais de estimação. Então é tarde demais para você parar o exército. Eles estão invadindo um mundo distante neste exato momento!"
"Ah, my Mnemonic Index. It is my own creation, you know. It allows me to... Well, I needn't explain myself to a bloodling. Suffice to say that... you have done well, but there is more to do before I... regain my powers of the mind.": "Ah, meu índice mnemônico. É minha própria criação, você sabe. Isso me permite... Bem, não preciso me explicar para um sangrento. Basta dizer que... você se saiu bem, mas há mais a fazer antes que eu... recupere meus poderes mentais."
"Ah, Nightshade, I'd forgotten about him. He was a good business partner, but then he went and got a guild of human assassins after him. Tell him that his concern is appreciated, but misplaced. We've both moved on. I'm going to stay here: free food and a bed, and nobody's trying to kill me!": "Ah, Nightshade, eu tinha esquecido dele. Ele era um bom parceiro de negócios, mas depois foi atrás dele e uma guilda de assassinos humanos o perseguiu. Diga a ele que sua preocupação é apreciada, mas equivocada. Nós dois seguimos em frente. Vou ficar aqui: comida e cama de graça, e ninguém vai tentar me matar!"
"Ah, smell that dirt. It's... pretty smelly, actually. I guess I never really sniffed it before. Hm. Not the most appetizing potion ingredient, is it? Ha ha, no matter -- I use it because it has tiny fragments of soul stuck in it, not because it tastes good!": "Ah, cheire essa sujeira. É... muito fedorento, na verdade. Acho que nunca cheirei isso antes. Hum. Não é o ingrediente de poção mais apetitoso, não é? Ha ha, não importa – eu uso porque tem pequenos fragmentos de alma presos nele, não porque tem um gosto bom!"
"Ah, smell that? Yes. Yes! How <i>dare</i> that General Tremal think she can make me obsolete? I will show them! All of them! Let them tremble at my claws!

... Hmm, this is much more potent than I remembered. I'll have to dilute it down a bit or I might make an ass of myself. But I will make it work. Thank you.": "Ah, cheira isso? Sim. Sim! Como <i>se atreve</i> a General Tremal pensar que pode me tornar obsoleto? Eu vou mostrar a eles! Todos eles! Deixe-os tremer em minhas garras!

... Hmm, isso é muito mais potente do que eu lembrava. Vou ter que diluir um pouco ou posso fazer papel de idiota. Mas vou fazer funcionar. Obrigado."
"Ah, so you're an Advanced Student already! My, time flies. It seems only yesterday that you enrolled.

My next lecture will cover bardic surgery techniques. For my demonstration I need some supplies. Can you fetch them for me? Very good. Goodbye.": "Ah, então você já é um Aluno Avançado! Nossa, o tempo voa. Parece que foi ontem que você se matriculou.

Minha próxima palestra abordará técnicas de cirurgia bárdica. Para minha demonstração, preciso de alguns suprimentos. Você pode buscá-los para mim? Muito bom. Adeus."
"Ah, that's the stuff. I'll use my empty bottles as decorations and douse the tree with one of these bottles of perfume. I think I'll save the other bottle for myself.  We want to treat people to this beautiful scent, but not overwhelm them!": "Ah, é isso. Vou usar meus frascos vazios como decoração e encharcar a árvore com um desses frascos de perfume. Acho que vou guardar a outra garrafa para mim.  Queremos presentear as pessoas com este lindo perfume, mas não sobrecarregá-las!"
"Ah, their scent reminds me of my childhood on the docks of Rahu. I shall pose them as if they were swimming up a stream.

What? No. It is NOT artistic! You know that I hate art! This is merely whimsical artifice.": "Ah, o cheiro deles me lembra da minha infância nas docas de Rahu. Vou colocá-los como se estivessem nadando em um riacho.

O que? Não. NÃO é artístico! Você sabe que eu odeio arte! Isto é apenas um artifício caprichoso."
"Ah, these tusks aren't as big as I'd feared! Okay, this won't be so bad. Did you want to join me in the lodge behind the inn? We can learn together... No? Well, suit yourself. Here. Take this money and stop judging!": "Ah, essas presas não são tão grandes quanto eu temia! Ok, isso não será tão ruim. Você queria se juntar a mim no alojamento atrás da pousada? Podemos aprender juntos... Não? Bem, fique à vontade. Aqui. Pegue esse dinheiro e pare de julgar!"
"Ah, this brunost is wet and squishy, exactly like firm tofu isn't! Ha! Here's the technique.": "Ah, esse brunost é molhado e mole, exatamente como o tofu firme não é! Ha! Aqui está a técnica."
"Ah, this gravy works wonders! And no moral complications! Thanks!": "Ah, esse molho faz maravilhas! E sem complicações morais! Obrigado!"
"Ah, this is amazing quality! And you made it yourself? Can I see your maker's mark? Yes. You are my hero!": "Ah, isso é uma qualidade incrível! E você mesmo fez isso? Posso ver a marca do seu fabricante? Sim. Você é meu herói!"
"Ah, this will do. I should be able to reproduce these rune charts myself now, thank you. I shall let you know what I discover!": "Ah, isso servirá. Eu deveria ser capaz de reproduzir esses gráficos rúnicos agora, obrigado. Vou contar para vocês o que descobri!"
"Ah, yes! I'll grind them to powder and see what I can figure out. Thank you. Here: a less-useful powder, but some mages like it.": "Ah, sim! Vou triturá-los até virar pó e ver o que consigo descobrir. Obrigado. Aqui: um pó menos útil, mas alguns magos gostam dele."
"Ah, you found it! Thank you! I feel bad about Mister Squeaky. He's a horrible little thing, but it's not his fault... it's mine. Anyway, onto the tree this goes!": "Ah, você encontrou! Obrigado! Eu me sinto mal pelo senhor Squeaky. Ele é uma coisinha horrível, mas não é culpa dele... é minha. De qualquer forma, isso vai para a árvore!"
"Ah, you were the one that got me the swarmer brains and the flapskull blood? Very good. I have need of you again: you must help me prove my hypothesis! I just need brains from demon soldiers so I can compare them with the swarmer brains.": "Ah, foi você quem me deu o cérebro do enxame e o sangue do crânio abalado? Muito bom. Preciso de você novamente: você deve me ajudar a provar minha hipótese! Eu só preciso de cérebros de soldados demônios para poder compará-los com os cérebros dos enxameadores."
"Ah. Thank you. Here's something for your efforts!": "Ah. Obrigado. Aqui está algo pelos seus esforços!"
"Ah. That's a perfect nightcap wine! I commend you!

Next time, see if you can brew this one. It's tricky to get the taste right.": "Ah. Esse é um vinho perfeito para uma bebida noturna! Eu te elogio!

Da próxima vez, veja se você consegue preparar este. É complicado acertar o sabor."
"Ah. Well it's large. And it will have to do. Thank you!": "Ah. Bem, é grande. E isso terá que servir. Obrigado!"
"Aha! You know, these swords are a piece of history. The Vanquishers had had three awful seasons and fans were leaving, so they set up this competition. But filling out your roster via a treasure hunt led to an <i>impressively</i> bad year, the wost in the league's history, ending the team. And with only four other teams, the entire sport sort of fell apart.

I caught some games as a kid. I wish I'd been an adult for this contest. It would have been fun, even on a terrible team!": "Ah! Você sabe, essas espadas são um pedaço da história. Os Vanquishers tiveram três temporadas terríveis e os fãs estavam indo embora, então eles montaram esta competição. Mas preencher sua escalação por meio de uma caça ao tesouro levou a um ano <i>impressionante</i> ruim, o pior da história da liga, encerrando o time. E com apenas quatro outras equipes, todo o esporte desmoronou.

Eu assisti alguns jogos quando criança. Eu gostaria de ter sido adulto para este concurso. Teria sido divertido, mesmo em um time terrível!"
"Aha, perfect! Now to get Spot to use her hands and build this fence. Oh, here: take my old war helmet. I have a better one.": "Ah, perfeito! Agora, vamos fazer com que Spot use as mãos e construa esta cerca. Ah, aqui: pegue meu velho capacete de guerra. Eu tenho um melhor."
"Ahh! Yep, those will do. Thank you! Now as long as the critters stay small, I'm all set. Say, did I ever tell you about the time I saw a giant wolf prowling out in the field at night? Biggest damned wolf! It was a full moon so I could see it perfectly. And I swear... it was eating my grapes! What a wolf would want with grapes, I can't guess. But I know these spore bombs would just piss it off! Haha! Oh, since I'm talking your ear off anyway, let me teach you the best way to throw one of these bombs.": "Ahh! Sim, isso servirá. Obrigado! Agora, desde que as criaturas permaneçam pequenas, está tudo pronto. Diga, eu já contei para você sobre aquela vez que vi um lobo gigante rondando no campo à noite? O maior lobo maldito! Era lua cheia, então pude ver perfeitamente. E eu juro... estava comendo minhas uvas! O que um lobo iria querer com uvas, não consigo imaginar. Mas eu sei que essas bombas de esporos iriam irritar tudo! Haha! Ah, já que estou falando demais de qualquer maneira, deixe-me ensinar a melhor maneira de lançar uma dessas bombas."
"Ahh, this is the life": "Ah, esta é a vida"
"Ahh. That was delicious. I could use another! Hah! No but seriously.": "Ahh. Isso foi delicioso. Eu poderia usar outro! Hah! Não, mas sério."
"Ahh. Well, I can't say this was worth the wait, but it is definitely worth eating. My compliments to the chef.": "Ahh. Bem, não posso dizer que valeu a pena esperar, mas definitivamente vale a pena comer. Meus cumprimentos ao chefe."
"Ahhh, smell that pinecone goodness.

Hmm, that's an acquired taste, isn't it? Best get to acquiring!

Let me teach you a wine with a bit less of a learning curve.": "Ahhh, cheire aquela delícia de pinha.

Hmm, é um gosto adquirido, não é? Melhor começar a adquirir!

Deixe-me ensinar-lhe um vinho com um pouco menos de curva de aprendizado."
"Ailred in Povus said, \"Are you finally ready to take my order? I've been waiting for hours! Yes, I'd like the shroom feast, please. And please try to keep it as ungreasy as possible.\"": "Ailred in Povus disse: \"Você finalmente está pronto para anotar meu pedido? Estou esperando há horas! Sim, gostaria do banquete de cogumelos, por favor. E, por favor, tente mantê-lo o mais gorduroso possível.\""
"Ailred in Povus said, \"Finally, the help has arrived. Yes, I'm ready to order. Please bring me a chicken casserole. Yes, a complete casserole. I'm FAMISHED. From WAITING. For HOURS!\"": "Ailred em Povus disse: \"Finalmente, a ajuda chegou. Sim, estou pronto para fazer o pedido. Por favor, traga-me uma caçarola de frango. Sim, uma caçarola completa. Estou com fome. De ESPERA. Por HORAS!\""
"Ailred in Povus said, \"I see your menu has a selection of goblin food, including ruktagh. How are you getting fresh dill out here?! Well, I'm sure the dill isn't fresh. But the meal had better be!\"": "Ailred em Povus disse: \"Vejo que seu cardápio tem uma seleção de comida goblin, incluindo ruktagh. Como você está conseguindo endro fresco aqui?! Bem, tenho certeza de que o endro não é fresco. Mas é melhor que a refeição seja!\""
"Ailred in Povus said, \"I'm in the mood for something simple. Please bring me a cavefish supper. A FRESH cavefish supper, mind you! I'm eating simply, not poorly!\"": "Ailred in Povus disse: \"Estou com vontade de algo simples. Por favor, traga-me um jantar de peixe-caverna. Um jantar de peixe-caverna FRESCO, lembre-se! Estou comendo de maneira simples, não mal!\""
"Ailred in Povus said, \"I'm terribly sorry if I offended you by seating myself. But you didn't have to keep me waiting so long! I guess you weren't open yet?

Well, let's put that behind us. I would like your maple carrots please. And not too sweet.\"": "Ailred in Povus disse: \"Sinto muito se ofendi você ao me sentar. Mas você não precisou me deixar esperando tanto tempo! Acho que você ainda não estava aberto?

Bem, vamos deixar isso para trás. Eu gostaria de suas cenouras de bordo, por favor. E não muito doce.\""
"Ailred in Povus said, \"I've had a VERY long time to look at the menu, so yes, I'm ready to place my food order! I saw that you have fresh amberjack on the fish list. How is that even possible?! I guess amberjack is native to here? Well, I simply must try this dish.\"": "Ailred in Povus disse: “Demorei MUITO para olhar o cardápio, então sim, estou pronto para fazer meu pedido de comida!"
"Ailred in Povus said, \"Oh, waiter, finally! Yes, I want to know what makes your beetle skewer a \"Deluxe\" bettle skewer? Oh, don't tell me, I want to be surprised!\"": "Ailred in Povus disse: \"Oh, garçom, finalmente! Sim, quero saber o que torna o seu espeto de besouro um espeto de besouro \"Deluxe\"? Ah, não me diga, quero ficar surpreso!\""
"Ailred in Povus said, \"The service here is truly awful. Do you know how long I've been waiting?! And I had to seat myself! But nevermind. Nevermind all that! I heard that this place makes a great swamp salad. I would like to try this dish.\"": "Ailred in Povus disse: \"O serviço aqui é realmente horrível. Você sabe há quanto tempo estou esperando?! E tive que me sentar! Mas deixa para lá. Deixa para lá! Ouvi dizer que este lugar faz uma ótima salada de pântano. Eu gostaria de experimentar este prato. \""
"Ailred in Povus said, \"There you are! I've been waiting so long! Let me have the orcish onion soup. And it had better be fresh!\"": "Ailred em Povus disse: \"Aí está você! Estou esperando há tanto tempo! Deixe-me comer a sopa de cebola orc. E é melhor que seja fresca!\""
"Ailred in Povus said, \"Well, you've made me wait so long for my food that I'm not even that hungry. I'll take the appetizers to go, please. Oh, don't tell me you lost my appetizer order?! It was spicy porcini bites! I need two servings. And not too greasy!\"": "Ailred in Povus disse: \"Bem, você me fez esperar tanto pela minha comida que nem estou com tanta fome. Vou levar os aperitivos para viagem, por favor. Ah, não me diga que você perdeu meu pedido de aperitivo?! Foram mordidas de porcini picantes! Preciso de duas porções. E não muito gorduroso! \""
"Ailred in Povus said, \"What took you so long?! I've been waiting for more than an hour! Nevermind. I don't care about your excuses. Please prepare a stuffed bell pepper for me.\"": "Ailred in Povus disse: \"Por que você demorou tanto?! Estou esperando há mais de uma hora! Deixa pra lá. Não me importo com suas desculpas. Por favor, prepare um pimentão recheado para mim.\""
"Ailred in Povus said, \"Where the heck were you all this time?! No matter. How are your vexfish lettuce wraps? Fresh, I hope? I'll take that! And please make it snappy. I'm famished from waiting!\"": "Ailred em Povus disse: \"Onde diabos você estava esse tempo todo?! Não importa. Como estão seus wraps de alface vexfish? Frescos, espero? Vou levar isso! E, por favor, faça-o rápido. Estou faminto de tanto esperar!\""
