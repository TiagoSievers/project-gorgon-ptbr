"Th-thank y-y-you! D-do y-you d-d-do ... do y-you... <i>Daisy sighs.</i> H-here.": "Obrigado! D-faça, você, d-faça... você, você... <i>Daisy suspira.</i> E-aqui."
"Thank Enoyos! The starfish are gone! I only have a few hundred eggs left, but maybe -- just maybe -- that'll be enough.": "Obrigado, Enoyos! As estrelas do mar se foram! Só me restam algumas centenas de ovos, mas talvez - apenas talvez - isso seja suficiente."
"Thank you again for repelling gulagra's scion. Mortals will sleep safely for another night!

If you have time to help me further, there is something of an annoying clerical problem to deal with: the scion dreamt up a series of ten \"anxiety propagators\", devices dreamt up by Gulagra. They are causing distress to dreamers. They should dissipate in a few hundred years, so this isn't too critical of a problem, but it would help mortals dream well if they were destroyed. Now that the dreamer is thwarted you should simply be able to touch them to destroy them. If you find all ten, I shall be very grateful. But you will need help: some are guarded by ferocious beasts!": "Obrigado novamente por repelir o descendente de Gulagra. Os mortais dormirão em segurança por mais uma noite!

Se você tiver tempo para me ajudar ainda mais, há um problema administrativo chato para resolver: o descendente inventou uma série de dez \"propagadores de ansiedade\", dispositivos idealizados por Gulagra. Eles estão causando angústia aos sonhadores. Eles deveriam se dissipar em algumas centenas de anos, então isso não é um problema muito crítico, mas ajudaria os mortais a sonhar bem se fossem destruídos. Agora que o sonhador está frustrado, você deve simplesmente ser capaz de tocá-lo para destruí-lo. Se você encontrar todos os dez, ficarei muito grato. Mas você precisará de ajuda: alguns são guardados por feras ferozes!"
"Thank you for aiding me. If you have time to continue the Natural Food Experience, please grow several beets and mention that it is a joy to do so.": "Obrigado por me ajudar. Se você tiver tempo para continuar a Experiência Alimentar Natural, plante várias beterrabas e mencione que é uma alegria fazê-lo."
"Thank you for delivering the ring! Here's something for your trouble. It's a hideous thing from my reject pile, but it's got some sort of magic in it.": "Obrigado por entregar o anel! Aqui está algo para o seu problema. É uma coisa horrível da minha pilha de rejeitados, mas contém algum tipo de magia."
"Thank you for doing that. I wish... Things were different. In another life, I'd be so much happier.

Erm, I mean happier without him taking up so much of my mindspace, I mean! In the end, having a nemesis isn't as fun as I'd imagined it'd be.": "Obrigado por fazer isso. Eu gostaria... que as coisas fossem diferentes. Em outra vida, eu seria muito mais feliz.

Erm, quero dizer, mais feliz sem ele ocupando tanto espaço da minha mente, quero dizer! No final das contas, ter um inimigo não é tão divertido quanto eu imaginava."
"Thank you for doing your part. Here: I found it in the lake, and it doesn't belong. Take it with you.": "Obrigado por fazer sua parte. Aqui: encontrei no lago e não pertence. Leve com você."
"Thank you for experiencing the wonders of nature, right here at the Red Wing Casino! Please enjoy these guest tokens.": "Obrigado por experimentar as maravilhas da natureza, aqui mesmo no Red Wing Casino! Por favor, aproveite esses tokens de convidados."
"Thank you for experiencing the wonders of nature, right here at the Red Wing Casino! Please enjoy these guest tokens. (I've included some extra as thanks!)": "Obrigado por experimentar as maravilhas da natureza, aqui mesmo no Red Wing Casino! Por favor, aproveite esses tokens de convidados. (Incluí alguns extras como agradecimento!)"
"Thank you for fulfilling the work order. I'll make sure it goes out in the correct teleport delivery.": "Obrigado por cumprir a ordem de serviço. Vou me certificar de que ele saia na entrega correta do teletransporte."
"Thank you for gathering these! I am honored by your thoughtfulness. Here: this is an earlier blade I worked on. I hope you like it.": "Obrigado por reunir isso! Estou honrado com sua consideração. Aqui: esta é uma lâmina anterior em que trabalhei. Espero que você goste."
"Thank you for killing Brukal for me. I... I want our relationship to be honest, so let me tell you bluntly: that was a little out of line. I wanted him dead, but I didn't mean you should just... and the worst part is that It's made me feel nervous to be around you! But I do thank you. I know you did it out of kindness for a friend.

I've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.": "Obrigado por matar Brukal por mim. Eu... eu quero que nosso relacionamento seja honesto, então deixe-me dizer sem rodeios: isso foi um pouco fora de linha. Eu queria que ele morresse, mas não quis dizer que você deveria apenas... e o pior é que fiquei nervoso por estar perto de você! Mas eu agradeço. Eu sei que você fez isso por gentileza com um amigo.

Decidi montar um pequeno monumento aos meus pais – os dois – fora da cidade. Você poderia colher algumas flores para mim? As papoulas sempre foram as favoritas da mãe. O meu também."
"Thank you for making it to my specifications, this is great!": "Obrigado por fazer isso de acordo com minhas especificações, isso é ótimo!"
"Thank you for removing some of the ghost fish. I hope that this helps the area to recover. My name is Spotleaf. I may call upon you again some day.": "Obrigado por remover alguns dos peixes fantasmas. Espero que isso ajude a área a se recuperar. Meu nome é Spotleaf. Posso visitá-lo novamente algum dia."
"Thank you for sharing your overworlder wealth with me. In exchange, I shall share knowledge with you.

<i>[ You gain Jewelry Augment Brewing XP ]</i>": "Obrigado por compartilhar sua riqueza do mundo superior comigo. Em troca, compartilharei conhecimento com você.

<i>[Você ganha EXP Fabricação de Aprimoramento de Joias]</i>"
"Thank you for telling your Warden friends about me, but if their plan is to relocate me out of Povus, I'm not interested. <i>This</i> is the land I've sworn to defend! But I guess I'll go and explain this to your sheep friend myself. You've done enough for me!": "Obrigado por contar sobre mim aos seus amigos Diretores, mas se o plano deles é me tirar de Povus, não estou interessado. <i>Esta</i> é a terra que jurei defender! Mas acho que vou explicar isso pessoalmente à sua amiga ovelha. Você já fez o suficiente por mim!"
"Thank you for the fresh mushrooms! You know, I asked my buyer why she needed super fresh mushrooms particularly, since mushrooms last a really long time in storage. You know what she said? \"I don't eat anything that's been dead for more than a week.\" Isn't that just the height of entitlement? I mean, for an immortal. Oops... not that she's immortal. Might be, might not be... okay fine, it's Midge. And she has brain damage, so don't you be mean to her!": "Obrigado pelos cogumelos frescos! Você sabe, perguntei à minha compradora por que ela precisava especialmente de cogumelos superfrescos, já que os cogumelos duram muito tempo armazenados. Você sabe o que ela disse? \"Eu não como nada que esteja morto há mais de uma semana.\" Isso não é apenas o cúmulo do direito? Quero dizer, para um imortal. Ops... não que ela seja imortal. Pode ser, pode não ser... tudo bem, é Midge. E ela tem danos cerebrais, então não seja mau com ela!"
"Thank you for the moss agates! I shall begin by making inquiries here at the casino to see if others understand the secret to making these work in a garden. In the short term, however, I will probably continue to rely on 'green thumb potions'. Would you like some?": "Obrigado pelas ágatas musgo! Começarei fazendo perguntas aqui no cassino para ver se outras pessoas entendem o segredo para fazer isso funcionar em um jardim. No curto prazo, porém, continuarei provavelmente a confiar em “poções para o polegar verde”. Você gostaria de um pouco?"
"Thank you for the spruce. I have consulted with Daniel Murderdark who says that a large human skull is an appropriate tree-topper. Amutasa has agreed to sculpt one from your lumber.

I have some suspicions about Daniel's truthfulness. His skeleton started to interject with a comment and Daniel shushed it. But what else can I do? This is all I have to go on. And a giant wooden skull does sound festive!": "Obrigado pelo abeto. Consultei Daniel Murderdark, que diz que um grande crânio humano é uma copa de árvore apropriada. Amutasa concordou em esculpir um em sua madeira.

