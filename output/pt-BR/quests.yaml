"As expected, a new Den Mother was born or burrowed in from somewhere. If you take care of this one, I'll give you some of these scrolls I found laying around.": "Como esperado, uma nova Den Mother nasceu ou se enterrou em algum lugar. Se você cuidar deste aqui, eu lhe darei alguns desses pergaminhos que encontrei por aí."
"As expected, a new Den Mother was born or burrowed in from somewhere. If you take care of this one, I'll give you some of these scrolls I found laying around. ": "Como esperado, uma nova Den Mother nasceu ou se enterrou em algum lugar. Se você cuidar deste aqui, eu lhe darei alguns desses pergaminhos que encontrei por aí."
"As I understand it, most of the tree's decorations should be large, round, colorful balls. How about lemons?": "Pelo que entendi, a maior parte da decoração da árvore deveria ser bolas grandes, redondas e coloridas. Que tal limões?"
"As I understand it, our Ri-Shin tree should be decorated with items that evoke memories of our venue. Several customers told me that when they think of Red Wing, they think of 'rollin' the bones'. I do not know why they associate grim body parts with our lovely establishment, but I'm sure it's another racist anti-insect thing. These connotations are hurtful, but we aim to make our guests happy, so bones it is!

Unfortunately I used up my supply of bones during some recent shamanic infusion experiments... do you happen to have a surplus? Do not concern yourself with their rollability; any bones will do at this stage.": "Pelo que entendi, nossa árvore Ri-Shin deve ser decorada com itens que evoquem memórias do nosso local. Vários clientes me disseram que quando pensam em Red Wing, pensam em ‘rolar os ossos’. Não sei por que associam partes sombrias de corpos ao nosso adorável estabelecimento, mas tenho certeza de que é outra coisa racista anti-insetos. Essas conotações são prejudiciais, mas nosso objetivo é deixar nossos hóspedes felizes, é tão ruim!

Infelizmente eu esgotei meu estoque de ossos durante alguns experimentos recentes de infusão xamânica... por acaso você tem um excedente? Não se preocupe com a rolabilidade deles; qualquer osso servirá nesta fase."
"As the casino's official calligrapher, I am of course skilled in creating elaborate paper props. I've fashioned a suitable top hat, but its bow is not sufficiently festive": "I need a better shade of red dye! I believe crushed rose petals will be suitable. Are those easy to find?\": \"A árvore deve ter no topo um símbolo personalizado da nossa cultura. Dorimir sugeriu que usássemos uma cartola grande, já que os louva-a-deus adoram chapéus. Ele estava sendo alegre, mas sua sugestão tem mérito!"
"As we -- well, as <i>I</i> learned during our ritual, my husband was murdered by a goblin sage named Grosark, who is trapped in Steven's laboratory deep inside the Statehelm Crypt.

Here: the key to his lab. Go and take care of the issue.

Grosark is in a largely incorporeal state, but the lab has a mechanism for dealing with this. Activate the lamps in the four corners of the lab, and he will be forced to apparate. You will need some tea lights for the lamps; don't forget to bring them with you!": "Como nós... bem, como <i>eu</i> aprendi durante nosso ritual, meu marido foi assassinado por um sábio goblin chamado Grosark, que está preso no laboratório de Steven, nas profundezas da Cripta de Statehelm.

Aqui: a chave do seu laboratório. Vá e cuide do problema.

Grosark está em grande parte incorpóreo, mas o laboratório tem um mecanismo para lidar com isso. Ative as lâmpadas nos quatro cantos do laboratório e ele será forçado a aparatar. Você precisará de algumas lamparinas para as lâmpadas; não se esqueça de trazê-los com você!"
"As you bury them, note whether they have a startled expression on their face.\": \"O trabalho no meu novo feitiço continua. Suponho que compartilharei a premissa com você": "é um novo tipo de chama senciente, muito mais adequada a certos tipos de trabalho."
"As you bury them, note whether they have a startled expression on their face.\\\"\": \"Guzor Harrison, em Statehelm, disse": "\\\"O trabalho em meu novo feitiço continua. Suponho que compartilharei a premissa com você: é um novo tipo de chama senciente, muito mais adequada para certos tipos de trabalho."
"As you know, the land of Kur hides tremendous secrets, and we yearn to have the powers rumored to hide in the caves there. We've recently managed to teleport directly into a certain underground cave in Kur, but even though it's underground, it is still too cold for mantises to function optimally. Since you and your friends are generally mammalian, we expect you will have a much easier time. Ignore the woolly bipeds in the upper caverns and seek out the lowest levels of the caves. Certain creatures there may hold the secrets of Kur. You should recognize these secrets when you see them! The teleportation attendant can send you to the cave if you ask today.

<i>[A group of 3+ level 40+ players recommended.]</i>": "Como você sabe, a terra de Kur esconde segredos tremendos, e ansiamos que os poderes que dizem se escondam nas cavernas de lá. Recentemente conseguimos nos teletransportar diretamente para uma certa caverna subterrânea em Kur, mas mesmo sendo subterrânea, ainda está muito frio para que os louva-a-deus funcionem de maneira ideal. Como você e seus amigos geralmente são mamíferos, esperamos que seja muito mais fácil para vocês. Ignore os bípedes peludos nas cavernas superiores e procure os níveis mais baixos das cavernas. Certas criaturas podem conter os segredos de Kur. Você deve reconhecer esses segredos quando os vir! O atendente do teletransporte pode mandá-lo para a caverna se você perguntar hoje.

<i>[Recomenda-se um grupo de 3+ jogadores de nível 40+.]</i>"
"As you reattach the skull to the playset, a key falls out of the skull!": "Ao recolocar a caveira no conjunto, uma chave cai da caveira!"
"As you're obviously a florist of some skill, could you find some of Louis's favorite flowers and deliver them to him? He'll know what it means. And I will pay you zealously. For your efforts as much as for your discretion.\\\"\": \"Denton Razor em Statehelm disse": "\\\"Foi você quem me trouxe o analgésico de Louis, certo? Sim, definitivamente foi você. Como ele estava? Ainda doente? Ele tomou tanto veneno de demônio que não pensei que ele sobreviveria. Quase perdi as esperanças, na verdade."
"Ashk disse": "\\\"No deserto perto de Rahu, procure por uma caveira gigante incrustada na face de um penhasco. Ignore a caveira e procure um grande cajado na areia perto dele. Fique perto do cajado e diga algo como: 'Vou começar a adivinhar agora!' Isso deve fazer com que o olho surja. Esteja pronto! Não é um inimigo comum. Você provavelmente precisará de ajuda. Mate a criatura e você terá meu maior apreço!\\\""
"Ashk in Rahu believes that a gigantic eyeball is hunting him whenever he uses his augury powers.

Ashk said, \"In the desert near Rahu, look for a giant skull embedded in the face of a cliff. Ignore the skull and look for a large staff in the sand near it. Stand near the staff and say something like, 'I'm going to start soothsaying now!' That should get the eye to emerge. Be ready! It is no ordinary foe. You will likely need help. Slay the creature and you shall have my utmost appreciation!\"

<b>Note: this is a difficult encounter that will require a small group.</b>": "Ashk em Rahu acredita que um globo ocular gigante o caça sempre que ele usa seus poderes de augúrio.

Ashk disse: \"No deserto perto de Rahu, procure por uma caveira gigante incrustada na face de um penhasco. Ignore a caveira e procure um grande cajado na areia perto dele. Fique perto do cajado e diga algo como: 'Vou começar a adivinhar agora!' Isso deve fazer com que o olho surja. Esteja pronto! Não é um inimigo comum. Você provavelmente precisará de ajuda. Mate a criatura e você terá meu maior apreço!\"

<b>Observação: este é um encontro difícil que exigirá um pequeno grupo.</b>"
"Ashk the Answerer in Rahu said, \"I like to keep a handful of stock ingredients on hand, and I am almost out of giant rat tails. Fortunately the sewer beneath our feet is teeming with them! I will pay a very reasonable sum if you bring me some. Oh, they needn't be from the Rahu sewers. Any rat tails will do.\"": "Ashk, o Respondente em Rahu, disse: \"Gosto de manter um punhado de ingredientes disponíveis e estou quase sem rabos de rato gigantes. Felizmente, o esgoto sob nossos pés está repleto deles! Pagarei uma quantia bastante razoável se você me traga alguns. Oh, eles não precisam ser dos esgotos de Rahu. Qualquer rabo de rato serve. \""
"Ashk the Answerer in Rahu said, \"I used up my last bear gallbladder this morning. Now what will I do if someone comes asking about their chances for inheritance? Or what if someone asks me the sex of their unborn?! I need more bear gallbladders right away! And we're out of stock!\"": "Ashk, o Respondente em Rahu, disse: \"Eu usei minha última vesícula biliar de urso esta manhã. Agora, o que farei se alguém vier perguntar sobre suas chances de herança? Ou e se alguém me perguntar o sexo de seu nascituro?! Preciso de mais vesículas biliares de urso imediatamente! E estamos sem estoque!\""
"Ashk the Answerer in Rahu said, \"Oh, drat it, now I'm out of rabbit's feet! I'll have to import some more... unless you happen to know where to get some?\"": "Ashk, o Respondente em Rahu, disse: \"Oh, droga, agora estou fora de perigo! Terei que importar mais alguns... a menos que você saiba onde conseguir alguns?\""
