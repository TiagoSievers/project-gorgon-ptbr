"Have ya met my goat Fiddler? He's immortal! Or nearly. But immortal goats need special care! His fur is so strong normal shears can't cut it, and my last pair o' diamond shears got swiped by somebody. A goblin probably... anyway, I know what we need to make a new comb! I saw it when I was in Kur. There's an Urak near a spring in Kur that my orc guide called Fluffy. Typical orc joke, right, 'cuz Fluffy's got no fur. And it eats orcs and terrorizes the land. Anyway, I need a tooth from that big fucker. Can ya get it?": "Você conheceu minha cabra Fiddler? Ele é imortal! Ou quase. Mas as cabras imortais precisam de cuidados especiais! O pelo dele é tão forte que uma tesoura normal não consegue cortá-lo, e minha última tesoura de diamante foi roubada por alguém. Provavelmente um goblin... de qualquer forma, eu sei o que precisamos para fazer um novo pente! Eu vi isso quando estava em Kur. Há um Urak perto de uma fonte em Kur que meu guia orc chamou de Fofo. Piada típica de orc, certo, porque Fluffy não tem pêlo. E come orcs e aterroriza a terra. De qualquer forma, preciso de um dente daquele grande filho da puta. Você consegue?"
"Have you been practicing wine making? I'd love to try your grape wine!": "Você tem praticado a produção de vinho? Adoraria experimentar o seu vinho de uva!"
"Have you ever made your own yarn? It's a great feeling! Well, the first time, anyway. After that it gets pretty dull. That's why I want you to make at least twenty-four balls of yarn. You have to learn to push through the boredom and come out the other side to liveliness!": "Você já fez seu próprio fio? É uma sensação ótima! Bem, pela primeira vez, pelo menos. Depois disso fica bem chato. É por isso que quero que você faça pelo menos vinte e quatro novelos de lã. Você tem que aprender a superar o tédio e sair do outro lado para a vivacidade!"
"Have you found that these ratkin are superstitious? Most are! They even carry good-luck charms, the pathetic things. Hmm, go and find me some of their charms.": "Você descobriu que esses ratkin são supersticiosos? A maioria é! Eles até carregam amuletos de boa sorte, coisas patéticas. Hmm, vá e encontre alguns de seus encantos para mim."
"Have you got time to handle more beasties in Vidaria? You're making things safer for our troops out there. Remember, safety is our top concern. It would obviously be mission-failure if you died!": "Você tem tempo para lidar com mais feras em Vidaria? Você está tornando as coisas mais seguras para nossas tropas lá fora. Lembre-se de que a segurança é a nossa principal preocupação. Obviamente seria um fracasso da missão se você morresse!"
"Have you met Joeh over in Serbule? He's a dirty one, isn't he! I mean, I like to use food in the bedroom as much as the next elf, but his bacon fetish is... well, I shouldn't judge. I guess we all get a little crazy, so far from home! And I have to admit that some of his ideas sound intriguing. Did he tell you about the thing he does with the two boar tusks? It sounds painful to me, but I guess I have to try it: the bardic creed demands I gather lore! So... do you have any boar tusks, perchance?": "Você conheceu Joeh em Serbule? Ele é um sujo, não é! Quer dizer, eu gosto de usar comida no quarto tanto quanto qualquer elfo, mas o fetiche dele por bacon é... bem, eu não deveria julgar. Acho que todos ficamos um pouco loucos, tão longe de casa! E tenho que admitir que algumas de suas ideias parecem intrigantes. Ele te contou sobre o que faz com as duas presas de javali? Parece doloroso para mim, mas acho que tenho que tentar: o credo bárdico exige que eu reúna conhecimento! Então... você tem presas de javali, por acaso?"
"Have you met Marrowchomp? Oh, hmm, actually, you should probably keep your distance from him: he can be ornery. But he's an amazing cook! And he's told me about something called barbecue, which I simply must try. Unfortunately it requires a lot of meat. A LOT of meat! But it doesn't really matter what kind, as apparently he can barbecue anything! Just make sure there's a lot of it.": "Você conhece o Marrowchomp? Ah, hmm, na verdade, você provavelmente deveria manter distância dele: ele pode ser teimoso. Mas ele é um cozinheiro incrível! E ele me contou sobre algo chamado churrasco, que eu simplesmente preciso experimentar. Infelizmente requer muita carne. MUITA carne! Mas realmente não importa de que tipo, pois aparentemente ele pode fazer qualquer churrasco! Apenas certifique-se de que haja muito disso."
"Have you seen the emergency moisturizing shells? They're super ugly, right? That's all Gulllia's fault, she thinks they look... anyway, it doesn't matter! When a ranalon gets super dried out, they use the healing water in those shells to stay moist. And you are going to poison that water. Here's the poison. Go!": "Você já viu as conchas hidratantes de emergência? Eles são super feios, certo? Isso é tudo culpa da Gulllia, ela acha que eles se parecem... enfim, não importa! Quando um ranalon fica superseco, eles usam a água curativa dessas conchas para se manterem úmidos. E você vai envenenar essa água. Aqui está o veneno. Ir!"
"Have you seen the frostbelches in the area? Little blue frogs, very adorable, very deadly. Of course you have, but it seems the demons have as well. They've developed a particular interest in the little creature, and I don't have to know why to know that it's troubling.

Bring me back a few samples of frostbelch skin, and please let me remain ignorant of how you get them.": "Você já viu os congelamentos na área? Sapinhos azuis, muito adoráveis, muito mortais. Claro que sim, mas parece que os demônios também. Eles desenvolveram um interesse particular pela criaturinha, e não preciso saber por que para saber que isso é preocupante.

Traga-me algumas amostras de pele de Belch e, por favor, deixe-me ignorar como você as consegue."
"Have you seen those damned sheep that are always on fire? It's genetic, apparently. Some insane wizard did something to them and let fire sheep loose on the land. A stray fire sheep must have made its way here and started mating with the local population. Unfortunately it's dominant, so we need to cull these before it gets too widespread.": "Você já viu aquelas malditas ovelhas que estão sempre pegando fogo? É genético, aparentemente. Algum bruxo maluco fez alguma coisa com eles e soltou ovelhas de fogo pela terra. Uma ovelha perdida deve ter chegado até aqui e começou a acasalar com a população local. Infelizmente, é dominante, por isso precisamos eliminá-los antes que se espalhe demais."
"HaveTemporarily": "TerTemporariamente"
"He assigned you again? Good. I've got bad news and worse news. The bad news is those spiders you found are definitely tornado spiders, and the infestation is already too deep. There's no hope of really being rid of them, but maybe we can keep them contained to a small part of the desert.

Now here's the worse news: tornado spiders are the weak ones. When an infestation of tornado spiders gets large enough, they somehow spontaneously start laying eggs for the REAL dangerous spiders, the Hurricane Spiders. And those eggs have been spotted in the hole you're headed to.

Go in and burn those eggs. And I mean that literally: you should be prepared to burn them! They're very difficult to damage with weapons, and they regenerate health like crazy unless they're on fire. If you can't manage any other type of fire, I noticed the fairy has some Trollbane Oil for sale in the 'commissary'. That will at least keep them from regenerating! Good luck.": "Ele designou você de novo? Bom. Tenho más notícias e notícias piores. A má notícia é que as aranhas que você encontrou são definitivamente aranhas tornado, e a infestação já é muito profunda. Não há esperança de realmente nos livrarmos deles, mas talvez possamos mantê-los confinados a uma pequena parte do deserto.

Agora, aqui estão as piores notícias: as aranhas tornado são as mais fracas. Quando uma infestação de aranhas tornado torna-se grande o suficiente, elas de alguma forma começam a botar ovos espontaneamente para as aranhas REALMENTE perigosas, as Aranhas Furacão. E esses ovos foram vistos no buraco para onde você está indo.

Entre e queime esses ovos. E quero dizer isso literalmente: você deve estar preparado para queimá-los! Eles são muito difíceis de causar danos com armas e regeneram saúde loucamente, a menos que estejam em chamas. Se você não consegue controlar nenhum outro tipo de fogo, notei que a fada tem um pouco de óleo Trollbane à venda no 'comissariado'. Isso pelo menos impedirá que eles se regenerem! Boa sorte."
"He didn't eat it? Ah well, that was too much to hope for. But he did <i>touch</i> it. That's really all that's necessary. The next step will take some time, but we are well on our way. And not a word to anyone about this. Remember, you've done something very illegal here.": "Ele não comeu? Ah, bem, isso era esperar demais. Mas ele <i>tocou</i>. Isso é realmente tudo o que é necessário. O próximo passo levará algum tempo, mas estamos no bom caminho. E nem uma palavra a ninguém sobre isso. Lembre-se, você fez algo muito ilegal aqui."
"He DRANK IT?! You were supposed to keep it out of his reach! What the fuck did you do?! You made this so much worse!": "Ele bebeu?! Você deveria mantê-lo fora do alcance dele! Que porra você fez?! Você tornou isso muito pior!"
"He he he, this is going to work great! We'll thumb our noses at Vexford. Let me just get this ready for you.": "Ele ele ele, isso vai funcionar muito bem! Vamos desprezar Vexford. Deixe-me preparar isso para você."
"He insists on using his strange code language. Give me a few minutes to translate them and then we can move forward.": "Ele insiste em usar sua estranha linguagem de código. Dê-me alguns minutos para traduzi-los e então podemos seguir em frente."
"He liked it? Great! He's going to refine that powder for me. Hopefully it works as well as he says it does!": "Ele gostou? Ótimo! Ele vai refinar esse pó para mim. Espero que funcione tão bem como ele diz!"
"He met a \"talking mushroom man\"? What?! Trekker always gets into the weirdest adventures. But he's a badass pig, even by Warden standards. Not a lot of us can survive in Gazluk!

I'll get the recall stones he needs. Thanks for making the delivery.": "Ele conheceu um \"homem cogumelo falante\"? O que?! Trekker sempre se envolve nas aventuras mais estranhas. Mas ele é um porco durão, mesmo para os padrões do Diretor. Poucos de nós conseguem sobreviver em Gazluk!

Vou conseguir as pedras de recall que ele precisa. Obrigado por fazer a entrega."
"He said he loved me?

<i>[Sourgum strokes his beard.]</i>

Well, I guess the news is mixed at best. But he'll come see me when he's ready. That's good news, and I'll focus on that.

<i>She.</i> She'll come see me. I'll get it through my brain eventually.": "Ele disse que me amava?

<i>[Sourgum acaricia a barba.]</i>

Bem, acho que as notícias são, na melhor das hipóteses, confusas. Mas ele virá me ver quando estiver pronto. Isso é uma boa notícia e vou me concentrar nisso.

<i>Ela.</i> Ela virá me ver. Vou colocar isso em meu cérebro eventualmente."
"He said he won't leave? Damn it. He's called my bluff: the only way to enforce a Praetor's Order is through execution. I could have an execution squad teleported in to dispatch him, but that would be a bit much for simple trespassing! Hm. Well, I'll think of something to get rid of him.

Thanks for helping with these errands! Here, you look handy with a sword, do you want this? It's my old backup blade. Maybe you'll find it useful.": "Ele disse que não vai embora? Caramba. Ele chamou meu blefe: a única maneira de fazer cumprir uma Ordem do Pretor é através da execução. Eu poderia teletransportar um esquadrão de execução para despachá-lo, mas isso seria um pouco demais para uma simples invasão! Hum. Bem, vou pensar em algo para me livrar dele.

Obrigado por ajudar com essas tarefas! Aqui, você parece habilidoso com uma espada, quer isso? É minha antiga lâmina reserva. Talvez você ache útil."
"He said no? And accused you of being racist for assuming he would know about technology? My apologies, that must have been awkward. Please take this as a token of my apology.": "Ele disse não? E acusou você de ser racista por presumir que ele saberia sobre tecnologia? Minhas desculpas, isso deve ter sido estranho. Por favor, tome isso como um sinal do meu pedido de desculpas."
"He said the giant mushrooms are poisonous? Oh, that's too bad. I came a long way just for them.

What, he said they're psychic beacons for Myconians? What's a \"Myconian\"? He was just deranged. Elves get that way. Too much sex, I say.": "Ele disse que os cogumelos gigantes são venenosos? Ah, isso é muito ruim. Percorri um longo caminho só por eles.

O quê, ele disse que são faróis psíquicos para os Myconianos? O que é um \"Myconiano\"? Ele estava simplesmente perturbado. Elfos ficam assim. Muito sexo, eu digo."
"He said they were on top of some cobweb-encrusted crates deep in the cave. I'll pay extra for that one, since it sounds dangerous.\\\"\": \"Durstin Tallow em Serbule Hills disse": "\\\"Um dos capítulos está naquela velha caverna infestada de aranhas a nordeste daqui. Tyler - o bêbado ali no canto - disse que os viu quando estava explorando, mas não achou que as páginas valessem alguma coisa. E agora ele está com muito medo de voltar."
"He said we need the Geas of ... Let me write this down. The Geas of Mild Yet Unrelenting Affection? Very well. I'll head to the basement and research the necessary performance.": "Ele disse que precisamos do Geas de... Deixe-me escrever isso. Os gestos do afeto leve, mas implacável? Muito bem. Vou para o porão e pesquiso o desempenho necessário."
"He said what? \"Gurkah, Tast\" would translate to... \"Tast, fight me.\" Hah! Fuck that!

I'd assume Brugo was lying, but I never knew him to lie. I guess that's a dead-end, though. I'm not gonna go challenge a god to a fight! Although... he said every orcish blacksmith learns that way. So the fight couldn't be THAT bad, right? Haha, I'm kidding! I'm too old for that sort of shit. But my thanks for the information.": "Ele disse o que? \"Gurkah, Tast\" seria traduzido como... \"Tast, lute comigo.\" Hah! Foda-se!

Eu presumiria que Brugo estava mentindo, mas nunca soube que ele mentia. Acho que é um beco sem saída, no entanto. Não vou desafiar um deus para uma luta! Embora... ele tenha dito que todo ferreiro orc aprende assim. Então a luta não poderia ser tão ruim assim, certo? Haha, estou brincando! Estou muito velho para esse tipo de merda. Mas meu agradecimento pela informação."
"He said... oh, how vulgar. Why do I put up with him! If only Echur weren't so rough...

Yes, fine, tell \"Mushroom\" Jack I'll be there. But I'm bringing extra carrots. For him. He'll know what I mean.": "Ele disse... ah, que vulgar. Por que eu tolero ele! Se ao menos Echur não fosse tão rude...

Sim, tudo bem, diga ao \"Mushroom\" Jack que estarei lá. Mas estou trazendo cenouras extras. Para ele. Ele saberá o que quero dizer."
"He wants me to brief you on MUMMIES? I'm not a mummy expert! But I can repeat what I've read in books, I guess.

Mummies are nasty undead that are supposedly not being created anymore... although I'm pretty sure that's untrue. Anyway, the mummies you'll be facing are very old, and they have old diseases that your body has few protections against. So try not to inhale near them.

Their organs are removed during the creation process, so don't bother trying to poison them, bludgeon them, or make them bleed. Their thick bandages give them protection against blades and arrows, too. Fire is the classic weapon of choice, but acid and lightning also work well, and I've heard they're even susceptible to psychic blasts, which is unusual for undead.

That's about all I can remember about mummies, aside from historical info. Good luck.": "Ele quer que eu lhe informe sobre MÚMIAS? Não sou especialista em múmias! Mas posso repetir o que li nos livros, eu acho.

Múmias são mortos-vivos desagradáveis ​​que supostamente não estão mais sendo criados... embora eu tenha certeza de que isso não é verdade. De qualquer forma, as múmias que você enfrentará são muito antigas e têm doenças antigas contra as quais seu corpo tem poucas proteções. Portanto, tente não inspirar perto deles.

Seus órgãos são removidos durante o processo de criação, então não se preocupe em tentar envenená-los, espancá-los ou fazê-los sangrar. Suas bandagens grossas também lhes dão proteção contra lâminas e flechas. O fogo é a arma clássica preferida, mas o ácido e o raio também funcionam bem, e ouvi dizer que são até suscetíveis a explosões psíquicas, o que é incomum em mortos-vivos.

Isso é tudo que consigo lembrar sobre múmias, além de informações históricas. Boa sorte."
"He's dead? For real? You killed him for me? I... I don't know what to say. Here.

<i>[Leah turns away to hide a tear.]</i>": "Ele está morto? Sério? Você o matou por mim? Eu... eu não sei o que dizer. Aqui.

<i>[Leah se vira para esconder uma lágrima.]</i>"
"He's dead? Great! Now we can begin planning phase 2. Real soon. Here's mortal money for your task. What do you mortals call it? \"Blood money?\"": "Ele está morto? Ótimo! Agora podemos começar a planejar a fase 2. Em breve. Aqui está dinheiro mortal para sua tarefa. Como vocês, mortais, chamam isso? \"Dinheiro de sangue?\""
"Head": "Cabeça"
"Head into the legling training area and find the area where gardeners practice their craft -- it's one of the first areas you'll come across in there. Kill everyone there.": "Vá para a área de treinamento de legling e encontre a área onde os jardineiros praticam seu ofício – é uma das primeiras áreas que você encontrará lá. Mate todos lá."
"Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. They're born knowing how to fight, but they need to build up their muscle mass and train their coordination. So now is the time to strike, while they're weak!": "Vá para a área de treinamento de legling. Passe pela área de prática de jardinagem. Quando o caminho se bifurcar, vá para a esquerda para encontrar os clubbers. Eles nascem sabendo lutar, mas precisam aumentar a massa muscular e treinar a coordenação. Então agora é a hora de atacar, enquanto eles estão fracos!"
"Head to Gazluk and find my old training grounds. Don't worry, it's can't be too hard to find: I sent a student there just a month ago. She abandoned her training quite quickly, but she DID find the training grounds first. If that dullard could find it, surely you can.": "Vá para Gazluk e encontre meus antigos campos de treinamento. Não se preocupe, não deve ser muito difícil de encontrar: mandei um aluno para lá há apenas um mês. Ela abandonou o treinamento rapidamente, mas encontrou primeiro o campo de treinamento. Se aquele idiota conseguiu encontrá-lo, certamente você consegue."
"Head to Rahu and find a way into their sewer system. There is a problematic black-market poison merchant in the upper levels of the sewer; put an end to his evil schemes! Next, you'll need to figure out how to reach the lower levels of the place. I understand that there's a massive slime somewhere in the pipes and it's beginning to contaminate the city's water supply. If their water becomes unsafe, Rahu will be devastated and the area will become a warzone again. So go fix that. Finally, there is some sort of militant group of rat-people down there somewhere whose political alignment is problematic; depose their king and that should leave them in disarray.

The sewers are relatively safe, so you can scout things out on your own... but you're going to need friends to kill these targets! They're tougher than the rest of the stuff down there.": "Vá para Rahu e encontre um caminho para o sistema de esgoto. Há um problemático comerciante de veneno no mercado negro nos níveis superiores do esgoto; pôr fim aos seus esquemas malignos! Em seguida, você precisará descobrir como chegar aos níveis mais baixos do local. Eu entendo que há uma gosma enorme em algum lugar nos canos e está começando a contaminar o abastecimento de água da cidade. Se a água deles se tornar insegura, Rahu será devastada e a área se tornará novamente uma zona de guerra. Então vá consertar isso. Finalmente, existe algum tipo de grupo militante de ratos em algum lugar cujo alinhamento político é problemático; depor seu rei e isso deveria deixá-los em desordem.

Os esgotos são relativamente seguros, então você pode explorar as coisas por conta própria... mas você vai precisar de amigos para matar esses alvos! Eles são mais resistentes do que o resto das coisas lá embaixo."
"Head to the Ilmari desert and seek out the giant yellow crystals where the manticores live... and kill them! Manticores often have Hegemonic Storage Keys, which you'll need. Just keep killing manticores until you have at least five keys.

Next you must find the entrance to a massive bunker under the sand. It's southwest of the manticores. There are rakshasa bandits nearby, so torture them for information if you're lost.

Once inside, use the keys on the chests you'll find. Take careful note of what you find -- I need that intelligence for my report.

Along the way you'll meet a certain Striga who will prevent you from going downstairs. Definitely kill him. On the next floor, look for a minotaur named Asterion and kill him, too. He has something I need; bring it to me.

Remember not to go too far down -- once you go past the steward, you'll be on the correct floor to find Asterion.

Oh, and don't underestimate him. Asterion is FAR more dangerous than typical minotaurs.": "Vá para o deserto de Ilmari e procure os gigantescos cristais amarelos onde vivem as manticoras... e mate-os! Manticoras geralmente possuem Chaves de Armazenamento Hegemônicas, das quais você precisará. Continue matando manticoras até ter pelo menos cinco chaves.

Em seguida, você deve encontrar a entrada para um enorme bunker sob a areia. Fica a sudoeste das manticoras. Há bandidos rakshasa por perto, então torture-os para obter informações se você estiver perdido.

Uma vez lá dentro, use as chaves dos baús que você encontrará. Anote cuidadosamente o que você encontrar - preciso dessa informação para o meu relatório.

Ao longo do caminho você encontrará uma certa Striga que o impedirá de descer. Definitivamente mate-o. No próximo andar, procure um minotauro chamado Asterion e mate-o também. Ele tem algo que eu preciso; traga para mim.

Lembre-se de não descer muito - depois de passar pelo mordomo, você estará no andar correto para encontrar Asterion.

Ah, e não o subestime. Asterion é MUITO mais perigoso que os minotauros típicos."
"Healing Potion Omegas": "Poção de Cura Ômegas"
"Healing Potions": "Poções de Cura"
"HealthPotion1": "Poção de Saúde1"
"HealthPotion3": "Poção de Saúde3"
"HealthRegenPotion1": "SaúdeRegenPotion1"
"Heartshroom": "Cogumelo"
"Heartshrooms": "Cogumelos"
"HegemonyLager": "HegemoniaLager"
"HegemonyLagerKeg": "HegemoniaLagerKeg"
"HEH HEH HEH HEH. WILL HIDE STINGER IN VIZLARK BED. VIZLARK ASSHOLE BUG. WILL MAKE MAD! HEH HEH HEH!": "HEH HEH HEH HEH. ESCONDERÁ O STINGER NA CAMA VIZLARK. VIZLARK ASSHOLE BUG. VAI FICAR LOUCO! HEH HEH HEH!"
"Heinous Wolfsbaned Knives": "Facas Hediondas de Wolfsbaned"
"Helena is a degenerate. She's addicted to gambling, and worse: she's addicted to CHEATING at gambling. But still, she's a Veilmoor. If she should fall prey to a monster or a highwayman, it would tarnish the Veilmoor name. That's my excuse, anyway.

I want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.": "Helena é uma degenerada. Ela é viciada em jogos de azar e, pior: viciada em TRAIÇÃO no jogo. Mas ainda assim, ela é uma Veilmoor. Se ela fosse vítima de um monstro ou de um salteador, isso mancharia o nome de Veilmoor. Essa é a minha desculpa, de qualquer maneira.

Quero enviar a ela um amuleto de proteção. Esta é uma receita de família, transmitida por três gerações. Quatro, se algum dia eu ensinar isso para Helena. Tenho o básico, mas preciso de alguns focos especiais."
"Helena Veilmoor in Hogan's Keep asked you to get some \"hook-claw things.\"": "Helena Veilmoor, em Hogan's Keep, pediu que você conseguisse algumas \"coisas com garras de gancho\"."
"Helena Veilmoor in Hogan's Keep asked you to get some game chips. She wasn't picky about the type.": "Helena Veilmoor em Hogan's Keep pediu para você pegar algumas fichas de jogo. Ela não era exigente quanto ao tipo."
"Helena Veilmoor in Hogan's Keep asked you to get something written by the poet Gruzark. She didn't seem to know where Gruzark lives, though.": "Helena Veilmoor, em Hogan's Keep, pediu que você conseguisse algo escrito pelo poeta Gruzark. Ela não parecia saber onde Gruzark mora."
"Helena Veilmoor in Hogan's Keep asked you to obtain some obsidians so she can pay off her debtors before they cut off her head and lay eggs down her neck. But no rush.": "Helena Veilmoor, em Hogan's Keep, pediu que você conseguisse algumas obsidianas para que ela pudesse pagar seus devedores antes que eles cortassem sua cabeça e colocassem ovos em seu pescoço. Mas sem pressa."
"Hellfreeze": "Inferno Congelado"
"Hellfreeze Ointment": "Pomada Hellfreeze"
"HellfreezeGreater": "Inferno Congelado Maior"
"Hello again! I ordered the swamp salad. Is there any chance I could receive my food TODAY?!": "Olá de novo! Eu pedi a salada do pântano. Existe alguma chance de eu receber minha comida HOJE?!"
"Hello! I've been wandering around for a while now, and decided to rest here. You see, I can't seem to find my family anywhere. I've searched everywhere, but no matter how hard I look I can't find them. Will you help me?": "Olá! Já estou vagando por aí há algum tempo e decidi descansar aqui. Veja, não consigo encontrar minha família em lugar nenhum. Procurei em todos os lugares, mas por mais que procure, não consigo encontrá-los. Você vai me ajudar?"
"Hello! We have been on the road for quite some time, and our on-the-road rations are nearly gone.  We need some good on the go snacks! Bring me 10 Venison Jerky, and maybe I can help you out somehow.": "Olá! Já estamos na estrada há algum tempo e nossas rações para viagem estão quase acabando.  Precisamos de alguns bons lanches para viagem! Traga-me 10 carne seca de veado e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, and our on-the-road rations are nearly gone.  We need some good on the go snacks! Bring me 10 Venison Jerky, and maybe I can help you out somehow.

": "Olá! Já estamos na estrada há algum tempo e nossas rações para viagem estão quase acabando.  Precisamos de alguns bons lanches para viagem! Traga-me 10 carne seca de veado e talvez eu possa ajudá-lo de alguma forma."
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! A casserole would be perfect! Bring me 10 plates of Chicken Casserole, and maybe I can help you out somehow.": "Olá! Já estamos na estrada há algum tempo, então as rações e os suprimentos de cozinha diminuíram. Se esses caras tiverem que comer beterraba de novo, eles podem se revoltar! Eles precisam de carne! Frango! Uma caçarola seria perfeita! Traga-me 10 pratos de caçarola de frango e talvez eu possa ajudá-lo de alguma forma."
