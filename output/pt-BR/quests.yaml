"Parece que o vidro que usamos no reparo anterior não é forte o suficiente": "na verdade, ele derreteu dentro da máquina e levei horas para remover a sujeira. Em vez de vidro, vamos tentar diamantes. Esses são super fortes, certo?"
"Parella in Statehelm said, \"Here's the recipe from Gozzaroon. Make one of these, find the stone slab in the ocean, and use the beacon there. Then watch out! Ranalon will come from everywhere.

Kill a bunch of them to stop their progress.

I suppose you could do this on your own, but were I you, I would gather some backup before attacking an army.\"": "Parella em Statehelm disse: \"Aqui está a receita de Gozzaroon. Faça uma dessas, encontre a laje de pedra no oceano e use o farol lá. Então cuidado! Ranalon virá de todos os lugares.

Mate um monte deles para impedir seu progresso.

Suponho que você poderia fazer isso sozinho, mas se eu fosse você, reuniria alguns reforços antes de atacar um exército.\""
"Parella in Statehelm said, \"I keep watch on the seas for Ranalon activity. And good thing I do! Recently a mysterious slab has appeared in the water on the other side of the city. You can't even see it from here, that's how far it is. They're trying to hide from me!

I think it's an assault force, hiding in the caves beneath the city. When the slab activates, they'll show up to attack. We need to activate that beacon early, before they're fully prepared. That will catch them off guard. The only trick is: how do we activate it?

I need to call in a favor from a ranalon I once saved. His name is Gozzaroon. He's hiding in an undersea cave off of Sun Vale. Sun Vale's this little island we druids like to congregate at. Go find Gozzaroon, tell him I'm calling in the favor, and demand the secret to activating these beacons.\"": "Parella em Statehelm disse: \"Eu fico de olho nos mares em busca de atividades de Ranalon. E que bom que faço! Recentemente, uma laje misteriosa apareceu na água do outro lado da cidade. Você nem consegue vê-la daqui, é tão longe que está. Eles estão tentando se esconder de mim!

Acho que é uma força de assalto escondida nas cavernas abaixo da cidade. Quando a laje for ativada, eles aparecerão para atacar. Precisamos activar esse sinal cedo, antes que estejam totalmente preparados. Isso os pegará desprevenidos. O único truque é: como o ativamos?

Preciso pedir um favor a um Ranalon que salvei uma vez. Seu nome é Gozaroon. Ele está escondido em uma caverna submarina em Sun Vale. Sun Vale é uma pequena ilha onde nós, druidas, gostamos de nos reunir. Vá encontrar Gozzaroon, diga a ele que estou pedindo um favor e exija o segredo para ativar esses faróis."
"Parella in Statehelm said, \"I'm sorry to say that the ranalon are raising another army. I need you to activate the same beacon as before and slay them! Remember: if you die it will be seen as a sign of our weakness. Stay alive no matter what!

<i>[Dying will reset progress on this quest.]</i>\"": "Parella em Statehelm disse: \"Lamento dizer que os ranalon estão formando outro exército. Preciso que você ative o mesmo farol de antes e mate-os! Lembre-se: se você morrer, isso será visto como um sinal de nossa fraqueza. Permaneça vivo, não importa o que aconteça!

<i>[Morrer redefinirá o progresso desta missão.]</i>\""
"Parella in Statehelm said, \"I've been watching the scattered ranalon off the coast, and I have grim news. A powerful chieftan is ready to lead the remaining ranalon in an attack! You totally need to kill him.

Activate the same underwater beacon as before, and this time look for Dreadfin Absolum. Oh, and bring some backup, or you'll surely drown!

Don't worry, you have my confidence in you. It will serve as a guide!\"": "Parella em Statehelm disse: “Tenho observado o ranalon disperso na costa e tenho notícias sombrias. Um chefe poderoso está pronto para liderar o ranalon restante em um ataque!

Ative o mesmo farol subaquático de antes e desta vez procure por Dreadfin Absolum. Ah, e traga alguns reforços, ou você certamente se afogará!

Não se preocupe, você tem minha confiança em você. Servirá de guia!\""
