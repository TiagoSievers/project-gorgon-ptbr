"Malgath caught lycanthropy from a wolf?! What a moron! That's sexually transmitted, right? So he just went out and humped a wolf in the woods?! I didn't think rakkies went for that sort of... what? Oh. Transmitted through <i>bites</i>? So any of the wolves out there could be infected? Well, that's terrifying!

I guess we just wait and see if Malgath retains his sanity. Hmm, are you a crafter by trade? If so, maybe you should go learn anything he's willing to teach you... while he's still sane. If he's reluctant to train you, tell him Nightshade is calling in a favor.": "Malgath pegou licantropia de um lobo?! Que idiota! Isso é sexualmente transmissível, certo? Então ele simplesmente saiu e transou com um lobo na floresta?! Não pensei que os libertinos gostassem desse tipo de... o quê? Oh. Transmitido através de <i>mordidas</i>? Então algum dos lobos lá fora poderia estar infectado? Bem, isso é assustador!

Acho que devemos apenas esperar e ver se Malgath mantém a sanidade. Hmm, você é um artesão de profissão? Se sim, talvez você devesse aprender qualquer coisa que ele esteja disposto a lhe ensinar... enquanto ele ainda está são. Se ele estiver relutante em treiná-lo, diga a ele que Nightshade está pedindo um favor."
"Malgath in the werewolf den asked you to obtain orange juice.": "Malgath, na toca dos lobisomens, pediu para você obter suco de laranja."
"Malgath in the werewolf den asked you to obtain some wolfsbane for him.": "Malgath, na toca dos lobisomens, pediu que você conseguisse um pouco de acônito para ele."
"Malgath in the werewolf den needs \"worm teeth\" from Tor-Uraks. It would take a skilled butcher to get the tooth out in one piece, though!": "Malgath, na toca dos lobisomens, precisa de \"dentes de verme\" de Tor-Uraks. No entanto, seria necessário um açougueiro habilidoso para arrancar o dente inteiro!"
"Malgath was staying here with us at first, but one day he came back from hunting and said he was \"infected\". Said he had to go take care of his infection, and he moved into a cave not too far from here. I went to check on him a week ago, and the cave is full of wolves! Couldn't get very far in there. I guess he's dead... but if you find him in there, let me know. If he's still alive, I'll help you convince him to train you.": "Malgath estava hospedado aqui conosco no início, mas um dia ele voltou da caça e disse que estava “infectado”. Disse que precisava cuidar da infecção e se mudou para uma caverna não muito longe daqui. Fui ver como ele estava há uma semana e a caverna está cheia de lobos! Não foi possível ir muito longe lá. Acho que ele está morto... mas se você encontrá-lo aí, me avise. Se ele ainda estiver vivo, ajudarei você a convencê-lo a treiná-lo."
