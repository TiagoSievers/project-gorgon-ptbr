"Cleo Conyer in Serbule Hills said, \"When the ranalon ran my cart off the road, I just fled in a panic. I should have grabbed my papers! I'm kicking myself for leaving them behind. Those books are key to my business!

I'm sure the ranalon have stolen all the valuable stuff from my cart, but the books don't look valuable. Could you go look for them?

Follow the road south until you reach a crossroads, then head east into Ranalon territory. The road will go along a strip of land separating two lakes. My cart was run off the road right near there! It rolled down toward the southern lake. It didn't go into the water, though, so maybe my papers are still intact! You've gotta check. Please?\"": "Cleo Conyer, em Serbule Hills, disse: \"Quando o ranalon tirou meu carrinho da estrada, eu simplesmente fugi em pânico. Eu deveria ter pegado meus papéis! Estou me culpando por deixá-los para trás. Esses livros são fundamentais para o meu negócio!

Tenho certeza de que os Ranalon roubaram todas as coisas valiosas do meu carrinho, mas os livros não parecem valiosos. Você poderia ir procurá-los?

Siga a estrada para o sul até chegar a uma encruzilhada e depois siga para o leste até o território de Ranalon. A estrada passará por uma faixa de terra que separa dois lagos. Meu carrinho saiu da estrada ali perto! Ele rolou em direção ao lago ao sul. Porém, ele não caiu na água, então talvez meus papéis ainda estejam intactos! Você tem que verificar. Por favor?\""
