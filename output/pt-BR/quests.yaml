"Leon Dasterre in Statehelm said, \"Ah, so you're an Advanced Student already! My, time flies. It seems only yesterday that you enrolled.

My next lecture will cover bardic surgery techniques. For my demonstration I need some supplies. Can you fetch them for me? Very good. Goodbye.\"": "Leon Dasterre em Statehelm disse: \"Ah, então você já é um estudante avançado! Meu Deus, o tempo voa. Parece que foi ontem que você se matriculou.

Minha próxima palestra abordará técnicas de cirurgia bárdica. Para minha demonstração, preciso de alguns suprimentos. Você pode buscá-los para mim? Muito bom. Adeus.\""
"Leon Dasterre in Statehelm said, \"I despise Malgath Croonswallow. Who is he, you ask? The long-dead ass who created this Geas of Mild Yet Unrelenting Affection! This has been quite a tedious and inane procedure. But it is done. Here: I've prepared the enchanted horn full of vindaloo. Now you need merely convince Alzaneth to eat it. Just a single bite will do!\"": "Leon Dasterre em Statehelm disse: “Eu desprezo Malgath Croonswallow. Quem é ele, você pergunta?"
"Leon Dasterre in Statehelm said, \"I've received word from my Unora. She's my eyes inside the mage's school, and she says that Guzor is pestering the Sub-Commander to remove me from the Sub-Council on City Defense. This goes beyond politics. This man so fears bardic magic that he would cut us out of the city. He knows that his magic cannot heal -- it can only destroy. And so he aims to destroy us. We, in turn, must heal! Heal the rift in the Sub-Council on City Defense!

Of course, I was hesitant to use charm magic. But the surgery we must perform requires it. We healers know that sometimes a patient calls for a difficult procedure. A dangerous one. So summon your courage: the city needs us!

Here is a list of necessities for the Geas that Ormond recommended.\"": "Leon Dasterre em Statehelm disse: \"Recebi notícias de minha Unora. Ela é meus olhos dentro da escola de magos e diz que Guzor está incomodando o Subcomandante para me remover do Subconselho de Defesa da Cidade. Isso vai além da política. Este homem tem tanto medo da magia bárdica que nos expulsaria da cidade. Ele sabe que sua magia não pode curar - ela só pode destruir. E então ele pretende nos destruir. Nós, por sua vez, devemos curar! Curar! a ruptura no Subconselho de Defesa da Cidade!

Claro, eu estava hesitante em usar feitiço mágico. Mas a cirurgia que devemos realizar exige isso. Nós, curadores, sabemos que às vezes um paciente pede um procedimento difícil. Um perigoso. Então reúna sua coragem: a cidade precisa de nós!

Aqui está uma lista de necessidades para os Geas que Ormond recomendou.\""
"Leon Dasterre in Statehelm said, \"That ass! Guzor from the mage's guild has once again chosen to belittle our school in front of the Council Sub-Commander. I've given up on convincing that conceited fool of the power of song magic. I've wasted a year trying! I understand now that mere words are not up to this task. Ormond is good at mind work -- explain the situation to him and come up with a solution.\"": "Leon Dasterre em Statehelm disse: \"Aquele idiota! Guzor da guilda dos magos mais uma vez optou por menosprezar nossa escola na frente do Subcomandante do Conselho. Desisti de convencer aquele idiota vaidoso do poder da magia da música. Perdi um ano tentando! Agora entendo que meras palavras não são suficientes para essa tarefa. Ormond é bom no trabalho mental - explique a situação para ele e encontre uma solução. \""
"Leon Dasterre in Statehelm said, \"The reason Ormond recommended this particular obscure bardic technique is that it can be performed without the victim being present. The vindaloo will connect you to him. Oh, yes, you'll be the one performing the Geas! It's quite an honor, really. This sort of technique is usually kept locked away, but you're getting hands-on experience with it!

Wait until the full moon. That's the only time this will work. Then eat the vindaloo -- oh, you will need more vindaloo for this -- and dance in such a way as to twist his mind toward affection. Don't worry about the particulars; let your hips do the thinking. Then simply shake his hand.\"": "Leon Dasterre em Statehelm disse: \"A razão pela qual Ormond recomendou esta técnica bárdica obscura em particular é que ela pode ser executada sem a presença da vítima. O vindaloo conectará você a ele. Ah, sim, será você quem executará os Geas! É uma grande honra, na verdade. Esse tipo de técnica geralmente é mantido trancado, mas você está adquirindo experiência prática com ela!

Espere até a lua cheia. Essa é a única vez que isso funcionará. Então coma o vindaloo - ah, você vai precisar de mais vindaloo para isso - e dance de maneira a distorcer a mente dele em direção ao afeto. Não se preocupe com os detalhes; deixe seus quadris pensarem. Então simplesmente aperte a mão dele.\""
"Leon wants to... what? To charm a grand-wizard? That would work for a day or two, and then someone there would realize he's under a charm. No, no. Tell Leon that mind-work isn't what he wants here. I mean, really! The only technique that <i>might</i> work would be the Geas of Mild Yet Unrelenting Affection, which is quite an intricate performance. And, I should remind both of you: EXTREMELY illegal, and VERY immoral. Abandon this idea. Use words! Bards are good at words!": "Leon quer... o quê? Para encantar um grande mago? Isso funcionaria por um ou dois dias, e então alguém perceberia que está enfeitiçado. Não, não. Diga a Leon que trabalho mental não é o que ele quer aqui. Quero dizer, realmente! A única técnica que poderia funcionar seria o Geas of Mild Yet Unrelenting Affection, que é uma performance bastante complexa. E devo lembrar a vocês dois: EXTREMAMENTE ilegal e MUITO imoral. Abandone essa ideia. Use palavras! Bardos são bons com palavras!"
"Leonard Allenson believes there are golems inside Borghild, and asked you to find a Cranial Gear from the head of one.": "Leonard Allenson acredita que existem golens dentro de Borghild e pediu para você encontrar um Cranial Gear na cabeça de um deles."
"Leonard Allenson claims that there are strange runes buried among some of the corpses inside Borghild. He wants you to find some and bring them back to him.": "Leonard Allenson afirma que existem runas estranhas enterradas entre alguns dos cadáveres dentro de Borghild. Ele quer que você encontre alguns e os traga de volta para ele."
"Leonard Allenson won't talk to you without proof that you're not a horrific monster. Conveniently, he knows the perfect way: bring him a stack of bacon.": "Leonard Allenson não falará com você sem provas de que você não é um monstro horrível. Convenientemente, ele conhece o caminho perfeito: leve para ele uma pilha de bacon."
"Leopold Smith": "Leopoldo Smith"
"Leopold Smith in Statehelm said, \"Hey! Uh, sorry again about accusing you of being a thief. You just seem like ... ahem, well, anyway, I know NOW that you're an expert toolsmith! And that means you must have access to quality metal. I need some.

The Council provides me with the metal to fix horseshoes and fences, but I need fancier metal for a personal project I'm working on.\"": "Leopold Smith em Statehelm disse: \"Ei! Uh, desculpe novamente por acusá-lo de ser um ladrão. Você apenas parece ... aham, bem, de qualquer maneira, AGORA sei que você é um ferreiro especialista! E isso significa que você deve ter acesso a metal de qualidade. Preciso de alguns.

O Conselho me fornece o metal para consertar ferraduras e cercas, mas preciso de um metal mais sofisticado para um projeto pessoal em que estou trabalhando.\""
"Leopold Smith in Statehelm said, \"I've lost my favorite Grand Shaping Hammer. And don't tell me it broke, it was brand new! I must have put it somewhere. It was special because it had a wider grip and shorter handle which made it a joy to use. I guess I'll have to get a toolcrafter to make me a new one some day. *Sigh*\"": "Leopold Smith, em Statehelm, disse: \"Perdi meu Grand Shaping Hammer favorito. E não me diga que quebrou, era novo! Devo tê-lo colocado em algum lugar. Era especial porque tinha um punho mais largo e um cabo mais curto, o que tornava seu uso uma alegria. Acho que terei que contratar um criador de ferramentas para me fazer um novo algum dia. *Suspiro*\""
"Leopold Smith in Statehelm said, \"Oh, I'm glad I ran into you! I need some gems to finish my... project. A carnelian and an onyx. Actually, two of each! Just in case I'm unlucky.\"": "Leopold Smith, em Statehelm, disse: \"Oh, que bom ter encontrado você! Preciso de algumas joias para terminar meu... projeto. Uma cornalina e um ônix. Na verdade, dois de cada! Só para o caso de eu não ter sorte.\""
"Lesser of Two Evils": "Menor de dois males"
"LesserOfTwoEvils": "MenorDeDoisEvils"
"Let me be clear here: I need SHODDY statues. Not NICE statues. I will not pay for quality!": "Deixe-me ser claro aqui: preciso de estátuas de FÁCIL. Não são estátuas AGRADÁVEIS. Não vou pagar pela qualidade!"
"Let me repay you. Not in money, but in something even better": "arrows!\": \"Perfeito! Bem... não é <i>perfeito</i>, essas penas são bem surradas, mas posso fazê-las funcionar."
"Let me see the gem. Hmm. Very good. Wait... You didn't enable the gem's aggressive protection mode. Did I not teach you the cantrip for that? Well, nevermind. Here: I've enabled it for you. Perhaps it'll be useful to you now that it's turned on.

I also have a new spell that I am willing to teach you.": "Deixe-me ver a jóia. Hum. Muito bom. Espere... Você não ativou o modo de proteção agressivo da gema. Eu não te ensinei o truque para isso? Bem, deixa pra lá. Aqui: eu habilitei para você. Talvez seja útil para você agora que está ativado.

Também tenho um novo feitiço que estou disposto a lhe ensinar."
"Let me show you what I need": "a gear that looks like this, some springs, and some of these weird twist-nails. Good luck!\\\"\": \"Pickles na Gruta do Guardião Sagrado disse: “Ainda estou lendo o livro que você me trouxe, mas tenho boas notícias: o grande cristal dentro desta máquina não está quebrado!"
"Let me think. How would you assault a ship? I guess you could just attack the crew! Try attacking the ensigns! Heehee!

Oh, uh, be aware they have death rays. Just a heads up.": "Deixe-me pensar. Como você atacaria um navio? Eu acho que você poderia simplesmente atacar a tripulação! Tente atacar os alferes! Heehee!

Oh, uh, esteja ciente de que eles têm raios mortais. Apenas um aviso."
"Let's begin your study with a warm-up. Why don't you use your Song of Discord in combat with, hm, let's say... 50 enemies. You needn't slay them SOLELY via Song of Discord, though. That's a later lesson! Just use the ability on them prior to defeating them.": "Vamos começar seu estudo com um aquecimento. Por que você não usa sua Canção da Discórdia em combate com, hm, digamos... 50 inimigos. Você não precisa matá-los SOMENTE através do Song of Discord. Essa é uma lição posterior! Basta usar a habilidade neles antes de derrotá-los."
"Let's get right to work. The Sand Seer has located a new war cache entrance. Follow this map. Remember: the entrance isn't stable. You should be able to get inside and back out again, but don't expect to be able to go back a second time! The hole will collapse quickly. So you have one shot to get my Weaponized Xedrite!

This seems like a pretty straightforward one. Just get in, get my Xedrite, and get out without being buried in the sand.": "Vamos direto ao trabalho. O Sand Seer localizou uma nova entrada de esconderijo de guerra. Siga este mapa. Lembre-se: a entrada não é estável. Você deve conseguir entrar e sair novamente, mas não espere poder voltar uma segunda vez! O buraco entrará em colapso rapidamente. Então você tem uma chance de conseguir meu Xedrite Armado!

Isso parece bastante simples. Basta entrar, pegar meu Xedrite e sair sem ser enterrado na areia."
"Let's just... I dunno, let's just stick some candles on top, like my family used to do. But we'll need to light 'em every night... got any spare tealights?\\\"\": \"Rick Snapley em New Prestonbule disse": "\\\"Uma árvore Ri-Shin precisa de uma cobertura, algo que brilhe. Mas não quero usar um daqueles cristais amarelos brilhantes... Eu sei que Sona diz que pode torná-los seguros, mas é muito perigoso."
"Let's put the past behind us for now. How about some dice games? If you beat me, say, 50 times, I'll teach you a secret technique to improve your cheating technique. Not that you should cheat me! Save that for the big stakes tables.": "Vamos deixar o passado para trás por enquanto. Que tal alguns jogos de dados? Se você me vencer, digamos, 50 vezes, eu lhe ensinarei uma técnica secreta para melhorar sua técnica de trapaça. Não que você deva me enganar! Guarde isso para as mesas de grandes apostas."
"Let's round out the party's food offerings with something a little less disgusting! I got this recipe from my mother. Can you get the stuff?": "Vamos completar a oferta de comida da festa com algo um pouco menos nojento! Ganhei essa receita da minha mãe. Você pode pegar as coisas?"
"Let's start with something easy that any novice should be able to manage. Fetch me fresh gravebloom. We're fortunate that it grows in the graveyard just outside of town.

Of course, you know that it only blooms at night.": "Vamos começar com algo fácil que qualquer novato deve ser capaz de gerenciar. Traga-me flores frescas. Temos sorte de crescer no cemitério nos arredores da cidade.

Claro, você sabe que ela só floresce à noite."
"Letting Qatik Down Gently": "Soltando Qatik suavemente"
"LettingQatikDownGently": "DeixandoQatikDownGently"
"Liamu the Watchful in Vidaria said, \"A few of the crystals that you brought to me have interesting properties! I require further samples of these to better understand them.\"": "Liamu, o Vigilante, em Vidaria, disse: \"Alguns dos cristais que você trouxe para mim têm propriedades interessantes! Preciso de mais amostras deles para entendê-los melhor.\""
"Liamu the Watchful in Vidaria said, \"This land is infested with problematic demons, and I cannot get close enough to the wall to achieve my goals. If you help me, I shall be very grateful.

The first thing I need is quite simple: just get a sample of every kind of gem or crystal that can be found when mining the crystals near the demons.\"": "Liamu, o Vigilante, em Vidaria, disse: \"Esta terra está infestada de demônios problemáticos e não consigo chegar perto o suficiente da parede para atingir meus objetivos. Se você me ajudar, ficarei muito grato.

A primeira coisa que preciso é bem simples: basta pegar uma amostra de cada tipo de gema ou cristal que pode ser encontrado ao minerar os cristais perto dos demônios.\""
"Lichens for Research": "Líquenes para Pesquisa"
"LichensForResearch": "Líquenes para pesquisa"
"Life-Giving Music": "Música que dá vida"
"Lifeblood": "Força vital"
"LifeGivingMusic": "LifeGivingMúsica"
"Light a campfire at night": "Acenda uma fogueira à noite"
"Light lamps in New Town": "Lâmpadas acesas na Cidade Nova"
"Light lamps in Old Town": "Lâmpadas acesas na Cidade Velha"
"Light lamps in the Annex": "Lâmpadas de luz no anexo"
"Light lamps in the Sprawl": "Acenda lâmpadas no Sprawl"
"Light the Braziers and Kill Grosark": "Acenda os braseiros e mate Grosark"
"LightLamps": "Lâmpadas leves"
"Like I said when you gave me that ghostly key... If you ever find my sister's <i>real</i> key, I could use it to open her precious-items box!

I heard that somewhere out there is a ranalon who deals in river treasures. Maybe you can find this frog and beat the secret out of him!": "Como eu disse quando você me deu aquela chave fantasmagórica... Se você encontrar a chave <i>verdadeira</i> da minha irmã, eu poderia usá-la para abrir a caixa de itens preciosos dela!

Ouvi dizer que em algum lugar existe um Ranalon que negocia tesouros de rios. Talvez você possa encontrar esse sapo e arrancar-lhe o segredo!"
"Limburger Cheese": "Queijo Limburguer"
"LimburgerCheese": "LimburgerQueijo"
"Lincha in Povus said, \"All my beautiful furniture was destroyed by invaders. Perhaps the most tragic was the loss of my amazing chair. It was hand-crafted by my favorite carpenter! Some day I hope to have a new one that's just as good.\"": "Lincha em Povus disse: \"Todos os meus belos móveis foram destruídos por invasores. Talvez o mais trágico tenha sido a perda da minha incrível cadeira. Ela foi feita à mão pelo meu carpinteiro favorito! Algum dia espero ter uma nova que seja igualmente boa.\""
"Lincha in Povus said, \"All of my cleaning tools were stolen by the orcs. Even my trusty cleaning stick! I used to use it to get items off of the roof, disgorge gutters and drains, and poke seeds into the dirt! It was an amazingly versatile stick. I saw a perfect replacement in Rahu, but they couldn't guarantee that it wasn't made by slave labor. So I had to keep searching...\"": "Lincha em Povus disse: \"Todas as minhas ferramentas de limpeza foram roubadas pelos orcs. Até meu fiel bastão de limpeza! Eu costumava usá-lo para tirar itens do telhado, despejar calhas e ralos e enfiar sementes na terra! Era um bastão incrivelmente versátil. Vi um substituto perfeito em Rahu, mas eles não podiam garantir que não fosse feito por trabalho escravo. Então tive que continuar procurando...\""
"Lincha in Povus said, \"Back before the orc attacks, my home was beautiful. Even my storage chests were beautiful pieces of art! They sell similar chests in Rahu, but I know those are made by goblin-owned slaves. I need to know my furniture is made by someone free!\"": "Lincha em Povus disse: \"Antes dos ataques dos orcs, minha casa era linda. Até meus baús eram lindas peças de arte! Eles vendem baús semelhantes em Rahu, mas sei que são feitos por escravos de propriedade de goblins. Preciso saber que meus móveis são feitos por alguém livre!\""
"Lincha in Povus said, \"I used to have a beautiful little table where I could leave my paintings to dry. Do you want to know a secret? It was actually a repurposed calligraphy table! I would buy a replacement in an instant, as long as I was confident it wasn't made by goblin slave-labor.\"": "Lincha em Povus disse: \"Eu costumava ter uma mesinha linda onde podia deixar minhas pinturas para secar. Quer saber um segredo? Na verdade, era uma mesa de caligrafia reaproveitada! Eu compraria uma substituta em um instante, contanto que tivesse certeza de que não foi feita por trabalho escravo de duendes.\""
"Lincha in Povus said, \"I used to have a great little meditation stool which I used while working in my garden. The orcs stole it, of course. I would pay well for a replacement... but only if I know the crafter. I don't want to accidentally support slave labor!\"": "Lincha em Povus disse: \"Eu costumava ter um banquinho de meditação excelente que usava enquanto trabalhava em meu jardim. Os orcs o roubaram, é claro. Eu pagaria bem por um substituto... mas apenas se conhecer o artesão. Não quero apoiar acidentalmente o trabalho escravo!\""
"Lincha in Povus said, \"I'm not a huge calligraphy nut, but I used to practice every now and then. If I still had my amazing calligraphy bench, I might start again!

However, I have to personally meet the craftsman to ensure that I'm not buying furniture made by slaves. Goblin slavers have flooded the market with that stuff, and I will have no part of it!\"": "Lincha em Povus disse: \"Não sou um grande louco por caligrafia, mas costumava praticar de vez em quando. Se eu ainda tivesse meu incrível banco de caligrafia, poderia começar de novo!

Porém, tenho que conhecer pessoalmente o artesão para ter certeza de que não estou comprando móveis feitos por escravos. Os traficantes de escravos goblins inundaram o mercado com essas coisas, e eu não participarei disso!\""
"Lincha in Povus said, \"The orc invaders stole all my wine! Most of it wasn't even ready for drinking yet! And now I must start all over. But the hogsheads for sale in Rahu may have been made by goblin-owned slaves. Nobody keeps track of that stuff in Rahu, but it matters to me! I need all my hogsheads to be made by free folk.\"": "Lincha em Povus disse: \"Os invasores orcs roubaram todo o meu vinho! A maior parte ainda nem estava pronta para beber! E agora devo começar tudo de novo. Mas os barris à venda em Rahu podem ter sido feitos por escravos de propriedade de goblins. Ninguém acompanha essas coisas em Rahu, mas é importante para mim! Preciso que todos os meus barris sejam feitos por pessoas livres. \""
"Lincha in Povus said, \"The orcs destroyed all my beautiful furniture when they attacked Povus. I miss my meditation stool so badly! It was amazing! I would love to have a new one, but the furniture sold in Rahu is made by goblin slave-labor. Many in Rahu turn a blind eye to slavery, but I won't! My furniture has to be made by a crafter I know!\"": "Lincha em Povus disse: “Os orcs destruíram todos os meus lindos móveis quando atacaram Povus."
"Lincha in Povus said, \"The orcs even stole my guest chair. It was pretty great, too. I wish I could find a replacement! The trouble is that I must know the chair's provenance. I won't support goblin slave labor!\"": "Lincha em Povus disse: “Os orcs até roubaram minha cadeira de convidados."
"Lisi in Sun Vale said, \"There are many seashells on the beaches here. I like the pointy ones, and the round shiny ones ... But I really like the shell fragments. I can use them to make little mosaics. It gives me something to do while my wing heals.\"": "Lisi, de Sun Vale, disse: \"Há muitas conchas nas praias daqui. Gosto das pontudas e das redondas e brilhantes... Mas gosto muito dos fragmentos de conchas. Posso usá-los para fazer pequenos mosaicos. Isso me dá algo para fazer enquanto minha asa cura.\""
"Listen carefully.

Seek a lich named Khyrulek underneath a town called Serbule. The lich... isn't there. But there may be... guardians.

This lich had a planar guide which I need. It will be hidden in a trove of Tuvillus artifacts.

If I recall... you can find it in her sleeping quarters.

Look for a rune of Tuvillus -- a red sigil. It will be... on the wall.

Touch it to reveal the hoard. Bring me back Khyrulek's Planar Planner.": "Ouça com atenção.

Procure um lich chamado Khyrulek embaixo de uma cidade chamada Serbule. O lich... não está lá. Mas pode haver... guardiões.

Este lich tinha um guia planar que eu preciso. Ele estará escondido em uma coleção de artefatos de Tuvillus.

Se bem me lembro... você pode encontrá-lo nos dormitórios dela.

Procure uma runa de Tuvillus – um sigilo vermelho. Estará... na parede.

Toque nele para revelar o tesouro. Traga-me de volta o Planejador Planar de Khyrulek."
"Listen for the buzz of bees at night. You will see that it is not bees who dwell in the night, it is wasps! Wasps who bask in the power the Winter Queen! They sting all who oppose her. You know what to do.": "Ouça o zumbido das abelhas à noite. Você verá que não são as abelhas que habitam a noite, são as vespas! Vespas que se deleitam com o poder da Rainha do Inverno! Eles picam todos os que se opõem a ela. Você sabe o que fazer."
