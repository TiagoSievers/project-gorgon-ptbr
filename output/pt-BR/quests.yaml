"Gasu'um in New Prestonbule said, \"I have decided to replace the crystal in my mother's necklace with obsidian. Go find a piece for me! Obsidian is not as beautiful as vervadium, but I suspect you will at least be able to find a piece that does not disgust me.\"": "Gasu'um em New Prestonbule disse: \"Decidi substituir o cristal do colar da minha mãe por obsidiana. Vá encontrar uma peça para mim! A obsidiana não é tão bonita quanto o vervádio, mas suspeito que você pelo menos conseguirá encontrar uma peça que não me enoje.\""
"Gasu'um in New Prestonbule said, \"The central decoration of the necklace you broke is a rare and beautiful crystal known as vervadium. It will be difficult to find. But should you find a piece, bring it to me. I will pay you ten times its value!\"": "Gasu'um em New Prestonbule disse: \"A decoração central do colar que você quebrou é um cristal raro e lindo conhecido como vervádio. Será difícil de encontrar. Mas se você encontrar uma peça, traga-a para mim. Pagarei dez vezes o seu valor!\""
"Gasu'um in New Prestonbule said, \"There is a necklace I wish to have returned to me. It was my mother's, and she gave it to me. To ME! Because I was her favorite! My worthless brother stole it from me... and then... I had to leave it behind.

Leave this cave and venture right. You will see the camp of the feckless Aguva clan... go past them. Continue right until you find the camp on a hill.  That camp is what remains of the Uga'th clan. The necklace is in there somewhere.\"": "Gasu'um em New Prestonbule disse: \"Há um colar que eu gostaria que fosse devolvido para mim. Era da minha mãe, e ela me deu. Para MIM! Porque eu era o favorito dela! Meu irmão inútil roubou de mim... e então... eu tive que deixá-lo para trás.

Saia desta caverna e aventure-se pela direita. Você verá o acampamento do irresponsável clã Aguva... passe por eles. Continue à direita até encontrar o acampamento em uma colina.  Esse acampamento é o que resta do clã Uga'th. O colar está aí em algum lugar.\""
"Gasu'um in New Prestonbule said, \"To repair my necklace, I need pyrite. Obtain for me the finest pyrite! I will reward you.\"": "Gasu'um em New Prestonbule disse: \"Para consertar meu colar, preciso de pirita. Obtenha para mim a melhor pirita! Eu o recompensarei.\""
