"Ragabir in Red Wing Casino said, \"Damn it all, I'm out of my secret ingredient! I need run-off water from stones in Kur. It's used in all my best potions! I'll pay well for it!\"": "Ragabir, no Red Wing Casino, disse: \"Droga, estou sem meu ingrediente secreto! Preciso de água escoada das pedras em Kur. É usada em todas as minhas melhores poções! Pagarei bem por isso!\""
"Ragabir in Red Wing Casino said, \"Okay this is a secret, but I guess I have to trust somebody here, so congrats, it's you! Now don't fuck this up! For my best potions I need oil of hatred. HATRED. Not oil of malaise, not oil of greed, not oil of disgust. Oil of hatred! Can you handle that? No, I don't know where it comes from. Back home we just bought it at the market. Around here it's harder to find, but it's gotta be somewhere...\"": "Ragabir no Red Wing Casino disse: \"Tudo bem, isso é um segredo, mas acho que tenho que confiar em alguém aqui, então parabéns, é você! Agora, não estrague tudo! Para minhas melhores poções, preciso de óleo de ódio. ÓDIO. Não é óleo de mal-estar, não é óleo de ganância, não é óleo de nojo. Óleo de ódio! Você consegue lidar com isso? Não, não sei de onde vem. Em casa, acabamos de comprá-lo no mercado. Por aqui é mais difícil de encontrar, mas tem que estar em algum lugar...\""
"Ragabir in Red Wing Casino said, \"Qatik told me there's a set of secret tunnels underneath Eltibule and they're full of magical darkness! I need it! I NEED IT! Get the magical darkness for me! It shouldn't be hard to find: just look for the source of the darkness, kill it, take some darkness, done. So easy even you can do it.\"": "Ragabir no Red Wing Casino disse: \"Qatik me disse que há um conjunto de túneis secretos embaixo de Eltibule e eles estão cheios de escuridão mágica! Eu preciso disso! PRECISO! Obtenha a escuridão mágica para mim! Não deve ser difícil de encontrar: basta procurar a fonte da escuridão, matá-la, pegar um pouco de escuridão, pronto. Tão fácil que até você pode fazer isso.\""
"Ragabir in Red Wing Casino said, \"So much for dwarves being great miners. I need a little bit of paladium, and you'd think with all these idiot dwarves around that'd be easy. Nope. Not easy. Are you any better than a dwarf? I just need a few chunks! I'll pay well!\"": "Ragabir, no Red Wing Casino, disse: \"Já chega dos anões serem grandes mineradores. Preciso de um pouco de paladio, e você pensaria que com todos esses anões idiotas por perto isso seria fácil. Não. Não é fácil. Você é melhor do que um anão? Só preciso de alguns pedaços! Pagarei bem!\""
