"Merriana in Serbule Hills said, \"I have expanded my search and have come into stone-contact with a human engineer near here who claims to know what I need. However, he won't tell me over the aether. Please locate this man and retrieve his letter. He is to be found \"In the Serbule Sewers.\" His name is Arif.\"": "Merriana em Serbule Hills disse: \"Ampliei minha busca e entrei em contato direto com um engenheiro humano perto daqui que afirma saber o que eu preciso. No entanto, ele não me dirá através do éter. Por favor, localize este homem e recupere sua carta. Ele pode ser encontrado \"Nos Esgotos de Serbule\". Seu nome é Arif.\""
"Merriana in Serbule Hills said, \"My new ally, the human Arif, has given me two excellent leads on where to find the sphere. I know you have questions about this sphere, but I dare not speak of it. Simply find it and return it to me!

It should be quite simple to find. Arif says that he discovered a tunnel underneath a giant stone hand. Inside were letters and notes, which he left untouched. In a box, he said there was a magical crystal.

Go! I shall reward you for it!\"": "Merriana em Serbule Hills disse: \"Meu novo aliado, o humano Arif, me deu duas excelentes pistas sobre onde encontrar a esfera. Sei que você tem dúvidas sobre esta esfera, mas não me atrevo a falar sobre ela. Basta encontrá-la e devolvê-la para mim!

Deve ser bem simples de encontrar. Arif diz que descobriu um túnel debaixo de uma mão gigante de pedra. Dentro havia cartas e bilhetes, que ele deixou intactos. Numa caixa, ele disse que havia um cristal mágico.

Vá! Eu vou recompensá-lo por isso!\""
"Merriana in Serbule Hills said, \"Somewhere north of here, nearish Serbule Keep, is a massive door. This traditional showy dwarf door leads to the long-dead city of Borghild. No dwarves live there, but it's infested with undead.

You will ... How do I put this politely? You are quite formidable, but you would be wise to bring some allies with you into Borghild. It is full of traps.

Do this for me and I shall bequeath upon you one of my grandest weather wands.\"": "Merriana em Serbule Hills disse: \"Em algum lugar ao norte daqui, perto de Serbule Keep, há uma porta enorme. Esta porta tradicional e vistosa dos anões leva à cidade há muito morta de Borghild. Nenhum anão vive lá, mas está infestada de mortos-vivos.

Você vai... Como posso dizer isso educadamente? Você é bastante formidável, mas seria sensato trazer alguns aliados com você para Borghild. Está cheio de armadilhas.

Faça isso por mim e eu lhe legarei uma das minhas maiores varinhas meteorológicas.\""
"Merriana in Serbule Hills said, \"The orb you found for me was a fake, but I know it's somewhere in Serbule Hills! I must find it.

The vortices have overheard the ranalon speak of a seer or wise-person called a 'doctrine keeper' -- if the ranalon have my orb, I bet their seer would have it.

I understand they live under the water or somesuch thing. Finding it would be worthwhile.\"": "Merriana em Serbule Hills disse: “O orbe que você encontrou para mim era falso, mas sei que está em algum lugar em Serbule Hills!

Os vórtices ouviram o ranalon falar de um vidente ou pessoa sábia chamado de 'guardião da doutrina' - se o ranalon tiver meu orbe, aposto que o vidente deles o teria.

Eu entendo que eles vivem debaixo d'água ou algo assim. Encontrar isso valeria a pena.\""
"Merriana in Serbule Hills said, \"You want to help? Hmph. Very well: perhaps you know this area better than we do.

Some time ago we heard there was a group of bandits with something I want. These bandits live in a cave somewhere here in Serbule Hills. They called it the 'spider cave'.

I have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.\"": "Merriana em Serbule Hills disse: \"Você quer ajudar? Hmph. Muito bem: talvez você conheça esta área melhor do que nós.

Há algum tempo ouvimos dizer que havia um grupo de bandidos com algo que eu quero. Esses bandidos vivem em uma caverna em algum lugar aqui nas Colinas Serbule. Eles a chamavam de “caverna das aranhas”.

Já paguei antecipadamente pelo aparelho, mas se os bandidos fizerem você pagar mais, pegue um recibo e eu reembolsarei você em reagentes preciosos.\""
