"An animal friend has shared the secret password to the Sacred Grotto hidden in the Kur Mountains. The entrance is near a ravine in central Kur. You were instructed to look for a hill to the northwest of the ravine; there is a door embedded in the hillside. As another reference point, the entrance is northeast of \"Fox Outpost\".

Once there, you need to provide the secret pass phrase, \"Horse-Rabbit-Maelstrom\".": "Um amigo animal compartilhou a senha secreta da Gruta Sagrada escondida nas Montanhas Kur. A entrada fica perto de uma ravina no centro de Kur. Você foi instruído a procurar uma colina a noroeste da ravina; há uma porta embutida na encosta. Como outro ponto de referência, a entrada fica a nordeste do \"Fox Outpost\".

Uma vez lá, você precisa fornecer a frase secreta, \"Horse-Rabbit-Maelstrom\"."
"An avatar of Tast in Povus said, I can teach you to craft wolf armor of astounding quality, blessed by my consort Norala. For while her wolves are strong, her smiths are weak! And weakness is not tolerated long in war. You will aid them to be war-worthy.

But Norala's boon requires the death of the largest, most horrific creatures. No ordinary orc or human shall do!\"": "Um avatar de Tast em Povus disse: Posso ensiná-lo a fabricar uma armadura de lobo de qualidade surpreendente, abençoada por minha consorte Norala. Pois embora seus lobos sejam fortes, seus ferreiros são fracos! E a fraqueza não é tolerada por muito tempo na guerra. Você os ajudará a serem dignos de guerra.

Mas a bênção de Norala exige a morte das maiores e mais horríveis criaturas. Nenhum orc ou humano comum servirá!\""
"An avatar of Tast in Povus said, Kill in my name and you shall have the knowledge that you seek: schematics for armor that is strong enough even for you!\"": "Um avatar de Tast em Povus disse: Mate em meu nome e você terá o conhecimento que procura: esquemas para uma armadura que seja forte o suficiente até para você!"
"An avatar of Tast in Povus said, Since you are no ordinary warsmith, you deserve a challenge worthy of you! Slay 100 sentient creatures in the name of war. Then I shall teach you the secrets you seek.\"": "Um avatar de Tast em Povus disse: Como você não é um ferreiro de guerra comum, você merece um desafio digno de você! Mate 100 criaturas sencientes em nome da guerra. Então eu lhe ensinarei os segredos que você procura.\""
"An avatar of Tast in Povus said, You have slain so many foes that one might easily mistake you for an army. You are worthy, of that much I am certain. Make an offering to me.\"": "Um avatar de Tast em Povus disse: Você matou tantos inimigos que alguém poderia facilmente confundi-lo com um exército. Você é digno, disso eu tenho certeza. Faça uma oferta para mim.\""
"An avatar of Tast in Povus said, You would seek even greater knowledge? Then show your worth. I demand an even greater offering of blood!\"": "Um avatar do Tast em Povus disse: Você buscaria um conhecimento ainda maior? Então mostre o seu valor. Exijo uma oferta de sangue ainda maior!\""
"An elf up in Eltibule Keep asked me for a special navel ring. It took me quite a while to find one around here, but I did it! Can you take it to her?": "Um elfo em Eltibule Keep me pediu um piercing de umbigo especial. Demorei um pouco para encontrar um por aqui, mas consegui! Você pode levar para ela?"
"An Experiment Involving Rats": "Um experimento envolvendo ratos"
"An incredible number of snails have hatched and they're ruining everything. They're in the east, they're in the west... at least they aren't in the north, but that's only because the horrible gnashers and uraks can eat them. They're EVERYWHERE ELSE! And guess what snails eat? GRASS! They eat my herd's food! So maybe it's not life or death today, but just you wait! I had to call for help! So get to it, Warden!\\\"\": \"A vaca suspeita em Eltibule disse": "\\\"Por que você demorou tanto para aparecer? É porque eu disse que precisava de ajuda com os caracóis, não é? Você não está me levando a sério! Estes não são caracóis normais, são caracóis enormes! Maiores que uma vaca! MAIORES QUE UMA VACA!"
"An old elf named Elmetaph said he could teach you Teleportation. You just need to find an amethyst first.

He suggested you search around the old teleportation platforms for lost gems, but mentioned that amethysts might be anywhere on the island.": "Um velho elfo chamado Elmetaph disse que poderia lhe ensinar teletransporte. Você só precisa encontrar uma ametista primeiro.

Ele sugeriu que você procurasse joias perdidas nas antigas plataformas de teletransporte, mas mencionou que as ametistas podem estar em qualquer lugar da ilha."
"An old elf named Elmetaph taught you some Teleportation magic. He told you to find a teleportation platform on the island and practice binding yourself to it.

<i>[ Stand on a teleportation platform and press the Crafting button on the right of the screen. Find the Bind Circle recipe and use it there. ]</i>": "Um velho elfo chamado Elmetaph lhe ensinou um pouco de magia de teletransporte. Ele disse para você encontrar uma plataforma de teletransporte na ilha e praticar vincular-se a ela.

<i>[ Fique em uma plataforma de teletransporte e pressione o botão Crafting à direita da tela. Encontre a receita do Bind Circle e use-a lá. ]</i>"
"An old tome I found said there was an entire system of automata in Borghild: robots! Lots of 'em! They'd be sealed off away from the rest of the place now, I suppose. And probably all broken. But if you find a broken one, can you see if it has a large gear in its head? The book talks about something called a Cranial Gear. I'd love to have one.": "Um livro antigo que encontrei dizia que havia todo um sistema de autômatos em Borghild: robôs! Muitos deles! Eles estariam isolados do resto do lugar agora, suponho. E provavelmente tudo quebrado. Mas se você encontrar um quebrado, consegue ver se ele tem uma engrenagem grande na cabeça? O livro fala sobre algo chamado Cranial Gear. Eu adoraria ter um."
"An Orc in the Mountains": "Um Orc nas Montanhas"
"Anaberyl in Statehelm said, \"Here! Take this dreadful-smelling potion and tell Ormond that it will restructure his genitals, and it's the only way to ever be with me. When he refuses, tell him that you understand. Then come back and tell me how it went!\"": "Anaberyl em Statehelm disse: \"Aqui! Tome esta poção de cheiro horrível e diga a Ormond que ela irá reestruturar seus órgãos genitais, e é a única maneira de ficar comigo. Quando ele recusar, diga a ele que você entende. Depois volte e conte-me como foi!\""
"Anaberyl in Statehelm said, \"I've underestimated Ormond. And I need to apologize to him for that. So when I talk to him, I'd like to offer a gift. Can you get it for me?

His favorite flower is the desert rose. A  bouquet of them would help show my feelings.\"": "Anaberyl em Statehelm disse: \"Subestimei Ormond. E preciso me desculpar com ele por isso. Então, quando eu falar com ele, gostaria de oferecer um presente. Você pode conseguir para mim?

Sua flor favorita é a rosa do deserto. Um buquê deles ajudaria a mostrar meus sentimentos.\""
"Anaberyl in Statehelm said, \"My next class will cover natural percussive sounds. I just need a bit of help with the props!\"": "Anaberyl, da Statehelm, disse: \"Minha próxima aula abordará sons percussivos naturais. Só preciso de um pouco de ajuda com os adereços!\""
"Anaberyl in Statehelm said, \"Okay. So these are the ingredients I need for the genital transmogrification potion. Bring these to me and I'll brew it up!\"": "Anaberyl em Statehelm disse: \"Tudo bem. Então, esses são os ingredientes que preciso para a poção de transmogrificação genital. Traga-os para mim e eu prepararei!\""
