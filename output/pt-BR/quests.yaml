"Brianna Willer in Serbule Hills said, \"Go over to the Tapestry Inn and ask Durstin what beer he wants to order for next month.\"": "Brianna Willer, de Serbule Hills, disse: \"Vá até o Tapestry Inn e pergunte a Durstin que cerveja ele quer pedir para o próximo mês.\""
"Brianna Willer in Serbule Hills said, \"I'm trying to brew a toxic beer. I know, I know, that's against the Council's Brewing Code of Ethics, but the Council's not here, and monsters are! If goblins find me, I want to give them kegs of beer that will make them sick enough that I can flee.

I'm still experimenting with the recipe, but I think a key ingredient is rotten strawberries. Not fresh ones -- they've gotta be really rotten. Dig me up some, okay?\"": "Brianna Willer, em Serbule Hills, disse: \"Estou tentando preparar uma cerveja tóxica. Eu sei, eu sei, isso é contra o Código de Ética de Cerveja do Conselho, mas o Conselho não está aqui, e os monstros estão! Se os goblins me encontrarem, quero dar-lhes barris de cerveja que os deixarão doentes o suficiente para que eu possa fugir.

Ainda estou experimentando a receita, mas acho que um ingrediente chave são os morangos podres. Não os frescos - eles devem estar realmente podres. Desenterre-me um pouco, ok?"
"Brianna Willer in Serbule Hills said, \"My bitchy old friend Gretchen taught me a special brewing recipe. I'm eager to try it, but it needs potatoes. I hate growing potatoes! You do it.\"": "Brianna Willer, em Serbule Hills, disse: \"Minha velha amiga mal-intencionada Gretchen me ensinou uma receita especial de cerveja. Estou ansiosa para experimentá-la, mas precisa de batatas. Odeio cultivar batatas! Você faz isso.\""
"Brianna Willer in Serbule Hills said, \"My entire pumpkin patch is infested with evil monsters! I've never seen anything like 'em! Luckily I'd already harvested half the pumpkins, but the remaining ones are rotted inside. Even the seeds inside them are bad!

And now I'm worried they're gonna wander off and hurt somebody that can't take care of themselves, like the Duchess. Tell you what: kill 'em off and I'll give you some of my earlier pumpkin harvest.\"": "Brianna Willer, em Serbule Hills, disse: \"Todo o meu canteiro de abóboras está infestado de monstros malignos! Nunca vi nada parecido com eles! Felizmente, já havia colhido metade das abóboras, mas as restantes estão podres por dentro. Até as sementes dentro delas são ruins!

E agora estou preocupado que eles vão se afastar e machucar alguém que não consegue cuidar de si mesmo, como a Duquesa. Vou te dizer uma coisa: mate-os e eu lhe darei um pouco da minha colheita anterior de abóboras.\""
"Brianna Willer in Serbule Hills said, \"Sometimes delicious beer uses gross ingredients. Mushrooms, for instance! But I've found that my boletus-and-apple pale ale is incredibly delicious! I've just run out of boletus mushrooms. Can you gather some for me?\"": "Brianna Willer, em Serbule Hills, disse: \"Às vezes, uma cerveja deliciosa usa ingredientes grosseiros. Cogumelos, por exemplo! Mas descobri que minha pale ale de boleto e maçã é incrivelmente deliciosa! Acabei de ficar sem cogumelos boletos. Você pode reunir alguns para mim? \""
