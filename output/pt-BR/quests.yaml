"Qatik in Red Wing Casino said, \"As you know, the land of Kur hides tremendous secrets, and we yearn to have the powers rumored to hide in the caves there. We've recently managed to teleport directly into a certain underground cave in Kur, but even though it's underground, it is still too cold for mantises to function optimally. Since you and your friends are generally mammalian, we expect you will have a much easier time. Ignore the woolly bipeds in the upper caverns and seek out the lowest levels of the caves. Certain creatures there may hold the secrets of Kur. You should recognize these secrets when you see them! The teleportation attendant can send you to the cave if you ask today.

<i>[A group of 3+ level 40+ players recommended.]</i>\"": "Qatik no Red Wing Casino disse: \"Como você sabe, a terra de Kur esconde segredos tremendos, e ansiamos por ter os poderes que supostamente se escondem nas cavernas de lá. Recentemente, conseguimos nos teletransportar diretamente para uma certa caverna subterrânea em Kur, mas mesmo sendo subterrâneo, ainda está muito frio para que os louva-a-deus funcionem de maneira ideal. Como você e seus amigos são geralmente mamíferos, esperamos que você tenha muito mais facilidade. Ignore os bípedes peludos nas cavernas superiores e procure os níveis mais baixos das cavernas. Certas criaturas podem conter os segredos de Kur. Você deve reconhecer esses segredos quando os vir. O atendente do teletransporte pode mandá-lo para a caverna se você perguntar hoje.

<i>[Recomenda-se um grupo de 3+ jogadores de nível 40+.]</i>\""
"Qatik in Red Wing Casino said, \"I've had Irkima study the available lore on the fae realm and he found an interesting detail. Some of the leaders of the Winter Queen's forces are granted the title of 'Puck', along with associated powers. And to prove their puckhood they are given a badge made of ice. Or crystal. Or icy crystal. Anyway, we need some of those badges. They may hold the secret to infinite power!

It has taken much influence on my part, but I've convinced the teleportation attendant to send you to the Winter Nexus itself. But go quickly before he tires of maintaining the link to such a distant place!

<i>[A group of 4+ level 40+ players recommended.]</i>\"": "Qatik no Red Wing Casino disse: \"Eu fiz Irkima estudar a tradição disponível no reino das fadas e ele encontrou um detalhe interessante. Alguns dos líderes das forças da Rainha do Inverno recebem o título de 'Puck', junto com poderes associados. E para provar sua identidade, eles recebem um distintivo feito de gelo. Ou cristal. Ou cristal gelado. De qualquer forma, precisamos de alguns desses distintivos. Eles podem conter o segredo do poder infinito!

Foi necessária muita influência da minha parte, mas convenci o atendente do teletransporte a mandá-lo para o próprio Nexus Invernal. Mas vá rápido antes que ele se canse de manter o vínculo com um lugar tão distante!

<i>[Recomenda-se um grupo de 4+ jogadores de nível 40+.]</i>\""
"Qatik in Red Wing Casino said, \"Recently while tuning up our portal system, we accidentally connected to a series of caves beneath Eltibule. These oddly-dark caves are inaccessible except via teleportation, yet there are numerous bipedal denizens! I believe there is significant magical power hidden in the caves, but the Queen won't allow me to send a mantis assault team in, fearing they'd just be outnumbered and killed. That's why we need you!

Since you and your friends are roughly bipedal, perhaps you can blend in with the other bipeds and scout out the place. Barring that, of course, you should fight desperately for your lives, because the bipeds seem to be mentally ill and quite homicidal.

I have located a few potential sources of magical energy in the caves, so go retrieve them! The teleportation attendant can send you into these caves if you ask him early enough today.

<i>[A group of 4+ level 40+ players recommended.]</i>\"": "Qatik no Red Wing Casino disse: \"Recentemente, enquanto ajustamos nosso sistema de portal, acidentalmente nos conectamos a uma série de cavernas abaixo de Eltibule. Essas cavernas estranhamente escuras são inacessíveis, exceto por teletransporte, mas existem numerosos habitantes bípedes! Acredito que há um poder mágico significativo escondido nas cavernas, mas a Rainha não me permite enviar uma equipe de assalto louva-a-deus, temendo que eles sejam superados em número e mortos. É por isso que precisamos de você!

Como você e seus amigos são praticamente bípedes, talvez você possa se misturar com os outros bípedes e explorar o local. Exceto isso, é claro, vocês deveriam lutar desesperadamente por suas vidas, porque os bípedes parecem ser doentes mentais e bastante homicidas.

Localizei algumas fontes potenciais de energia mágica nas cavernas, então vá recuperá-las! O atendente do teletransporte pode mandá-lo para essas cavernas se você perguntar a ele com antecedência hoje.

<i>[Recomenda-se um grupo de 4+ jogadores de nível 40+.]</i>\""
"Qatik in Red Wing Casino said, \"The first major success *and* failure of our Teleportation Technology department came two years ago when we reached a warm cave complex beneath Kur. Kur has always been a land of mystery to us, for it is too cold to support true life -- mantis life. But this cave was warmer! And so we sent in two squads of servant mantises to subdue the caves. Instead... they took up residence among the other creatures. They rebelled! This was a huge setback to teleportation magic, and even today I dare not send more mantises into that cave. But you and your friends will not be tricked by whatever wonders lie in there! You can complete the original mission from years ago! I have bribed the teleportation technician to send you there, so long as you ask quickly.

<i>[A group of 3+ level 40+ players is recommended.]</i>\"": "Qatik no Red Wing Casino disse: \"O primeiro grande sucesso * e * fracasso de nosso departamento de Tecnologia de Teletransporte ocorreu há dois anos, quando chegamos a um complexo de cavernas quentes abaixo de Kur. Kur sempre foi uma terra de mistério para nós, pois é muito frio para sustentar a vida verdadeira - vida de louva-a-deus. Mas esta caverna era mais quente! E então enviamos dois esquadrões de servos louva-a-deus para subjugar as cavernas. Em vez disso... eles fixaram residência entre as outras criaturas. Eles se rebelaram! Este foi um grande revés para o teletransporte magia, e ainda hoje não me atrevo a enviar mais louva-a-deus para aquela caverna. Mas você e seus amigos não serão enganados por quaisquer maravilhas que estejam lá. Você pode completar a missão original de anos atrás. Subornei o técnico de teletransporte para mandá-lo para lá, desde que peça rapidamente!

<i>[Recomenda-se um grupo de 3+ jogadores de nível 40+.]</i>\""
"Qatik told me there's a set of secret tunnels underneath Eltibule and they're full of magical darkness! I need it! I NEED IT! Get the magical darkness for me! It shouldn't be hard to find: just look for the source of the darkness, kill it, take some darkness, done. So easy even you can do it.": "Qatik me disse que há um conjunto de túneis secretos embaixo de Eltibule e eles estão cheios de escuridão mágica! Eu preciso disso! EU PRECISO DISSO! Obtenha a escuridão mágica para mim! Não deve ser difícil de encontrar: basta procurar a fonte da escuridão, matá-la, pegar um pouco de escuridão, pronto. Tão fácil que até você consegue."
