"Mas agora preciso criar uma NOVA obra-prima. O antigo era um riff do meu famoso motivo de cristal Rubywall, mas agora estou imaginando algo mais fresco": "cristais parecidos com Rubywall, mas com a mais escura das águas-marinhas!"
"Mas agradeço o esforço! Hum, aqui": "esta é uma receita que você pode gostar.\""
"Mas ainda há muita pesquisa. Você parece competente o suficiente para ajudar nessa pesquisa. Aqui está o que eu preciso que você faça. Vá encontrar alguns bandidos rakshasa, ou piratas, ou outros socialmente indesejáveis, e mate-os com fogo. A próxima parte é muito importante": "eles precisam morrer pelo impacto de uma Chama Cintilante."
"Mas esse reparo não funcionou. Acho que encontrei o problema": "o sistema de cronometragem primário simplesmente... desapareceu! Deve ter sido perdido ou roubado. Estudei os semelhantes no sistema auxiliar e acho que se eu tivesse um peso anão como este, poderia amarrar algo com um barbante. Talvez? Vale a pena tentar.\""
"Mas mais uma coisa, e não consigo enfatizar o suficiente essa parte": "você precisa estar nu quando fizer isso. Sem camisa, sem calças, sem luvas! Mas você pode usar um chapéu. E sapatos, obviamente.\""
"Mas ouça com MUITA atenção": "carregá-lo vai te deixar doente. Então pegue o minério e <i>corra</i> de volta aqui para mim o mais rápido que puder. Não perca tempo! Eu só preciso de três peças, então não compre mais do que isso.\\\"\""
"Mas tenha cuidado": "eles podem não parecer assustadores, mas você deveria estar assustado de qualquer maneira. Você precisará de amigos."
"Mas tenho uma pista de venda": "Crelpin perguntou se eu tinha peras frescas e percebi que não! Os meus são antigos! Se você estiver saindo da cidade, compre alguns bem novos para mim. E não os coma!\\\"\""
"Massive beasts that usually require a team to take down, these scorpions rule the desert. Few can survive their attacks -- though they stay well clear of manticores.\": \"<b>Caça": "Escorpiões Gigantes</b>"
"Master Boop said, \"Hi there! Ready for some combat training? Let's get to it! A skilled rabbit should be able to take down any predator without difficulty, no matter big they are or how many there are! Get out there and show me what you got! Take down 20 Mot-Uraks, 20 Polar Bears and 20 Starving Tundra Wolves. Remember that you must complete this task in rabbit form. No cheating! Report back to me when you're done and I'll load you up with some more bunny juices.\"": "Mestre Boop disse: \"Olá! Pronto para algum treinamento de combate? Vamos lá! Um coelho habilidoso deve ser capaz de derrubar qualquer predador sem dificuldade, não importa o tamanho ou quantos sejam! Vá lá e mostre-me o que você tem! Derrube 20 Mot-Uraks, 20 ursos polares e 20 lobos famintos da tundra. Lembre-se de que você deve completar esta tarefa na forma de coelho. Sem trapaça! Informe-me quando terminar e eu carregarei você com mais alguns sucos de coelho.\""
"Master Boop said, \"I see you checking out my cool blue fur! I'm willing to bet you want to know how I do it too! Well, blue fur is a sign you have true booping power, and you look like you're capable of that. I'll teach you how to have awesome blue fur like me if you bring me a few things. Here's the list and good hunting!\"
 <i>[Remember that you must remain in rabbit form to advance and complete this task!]</i>": "Mestre Boop disse: \"Vejo você conferindo meu pelo azul legal! Aposto que você também quer saber como eu faço isso! Bem, pelo azul é um sinal de que você tem um verdadeiro poder de booping e parece que você é capaz disso. Vou te ensinar como ter um pelo azul incrível como o meu se você me trouxer algumas coisas. Aqui está a lista e boa caça!\"
 <i>[Lembre-se de que você deve permanecer na forma de coelho para avançar e completar esta tarefa!]</i>"
"Master Flopsy said, \"Greetings! Ready for advanced Bun-Fu lessons? Great!

In order to survive, you must be able to replenish your carrot supply no matter the conditions! Find a good, fertile plot of ground somewhere out here in the Kur Mountains and grow twelve carrots. Don't forget, you MUST grow these carrots while being a rabbit. If you want to be a non-rabbit gardener, then go talk to someone else! Once you are done, bring them to me for inspection and I shall reward you with some bunny juices.\"": "Mestre Flopsy disse: \"Saudações! Pronto para aulas avançadas de Bun-Fu? Ótimo!

Para sobreviver, você deve ser capaz de reabastecer seu suprimento de cenouras, independentemente das condições! Encontre um terreno bom e fértil em algum lugar aqui nas montanhas Kur e cultive doze cenouras. Não se esqueça, você DEVE cultivar essas cenouras sendo um coelho. Se você quer ser um jardineiro que não seja coelho, vá conversar com outra pessoa! Quando terminar, traga-os para mim para inspeção e eu o recompensarei com alguns sucos de coelho.\""
"Master Lopsy said, \"Hi! Would you be interested in learning the ways of the carrot? I can help you get started!

First off, you need to know how to seek out your carrots. I have placed several Carrots of Power across the landscape here in the Serbule and Serbule Hills areas. Seek out seven of these Carrots of Power and then return to me. Also, you must interact with the Carrots of Power as a rabbit! You cannot become a Bun-Fu Master if you're not a rabbit!

If you need to bunny up, just ask! Good hunting!\"": "Mestre Lopsy disse: \"Olá! Você estaria interessado em aprender como funciona a cenoura? Posso ajudá-lo a começar!

Em primeiro lugar, você precisa saber como procurar suas cenouras. Coloquei várias Cenouras do Poder em toda a paisagem aqui nas áreas de Serbule e Serbule Hills. Procure sete dessas Cenouras do Poder e depois volte para mim. Além disso, você deve interagir com as Cenouras do Poder como um coelho! Você não pode se tornar um Mestre Bun-Fu se não for um coelho!

Se precisar de um coelhinho, é só pedir! Boa caça!\""
