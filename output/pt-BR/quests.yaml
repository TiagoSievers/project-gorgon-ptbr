"Pennoc in Serbule commanded you to dance. (You can learn to dance from Lana Songtree in Serbule Hills. Remain dancing to music continuously for 20 seconds to advance the quest.)": "Pennoc em Serbule ordenou que você dançasse. (Você pode aprender a dançar com Lana Songtree em Serbule Hills. Continue dançando ao som da música continuamente por 20 segundos para avançar na missão.)"
"Pennoc in Serbule told you to catch fish.": "Pennoc em Serbule disse para você pescar."
"Pennoc in Serbule told you to commit murder against another player.

<i>[ There's a \"PvP cellar\" in Serbule where players can attack each other. See if you can kill someone in there. ]</i>": "Pennoc em Serbule disse para você cometer assassinato contra outro jogador.

<i>[ Há uma \"adega PvP\" em Serbule onde os jogadores podem atacar uns aos outros. Veja se você consegue matar alguém lá dentro. ]</i>"
"Pennoc in Serbule told you to concoct some alchemical potions.": "Pennoc em Serbule disse para você preparar algumas poções alquímicas."
"Pennoc in Serbule told you to cook some fish dishes.": "Pennoc, em Serbule, disse para você cozinhar alguns pratos de peixe."
"Pennoc in Serbule told you to drink poison for his amusement.": "Pennoc, em Serbule, disse para você beber veneno para se divertir."
"Pennoc in Serbule told you to eat lots of prepared foods.": "Pennoc, em Serbule, disse para você comer muitos alimentos preparados."
"Pennoc in Serbule told you to give presents to the townsfolk of Serbule -- but they have to be presents they hate. (Use 'Small Talk' to find what NPCs dislike. Not every NPC has strong dislikes, but many of them are just quiet about it -- they won't share their dislikes with you until you reach Friends favor level. Others are quite vocal about their dislikes, so check around.)": "Pennoc, em Serbule, disse para você dar presentes aos habitantes da cidade de Serbule - mas eles devem ser presentes que eles odeiam. (Use 'conversa fiada' para descobrir o que os NPCs não gostam. Nem todo NPC tem fortes aversões, mas muitos deles ficam quietos sobre isso - eles não compartilharão suas aversões com você até que você alcance o nível de favorecimento de Amigos. Outros são bastante sinceros sobre suas aversões, então verifique por aí.)"
"Pennoc in Serbule told you to give presents to the townsfolk of Serbule. (Use the 'Give Gift' option when talking to an NPC.) The gifts need to be something the townsfolk like -- use 'Small Talk' to find that out.": "Pennoc em Serbule disse para você dar presentes aos habitantes de Serbule. (Use a opção 'Dar presente' ao falar com um NPC.) Os presentes precisam ser algo que os habitantes da cidade gostem - use 'Conversa fiada' para descobrir isso."
"Pennoc in Serbule told you to go cut some lumber. (Therese in Serbule sells a handsaw.)": "Pennoc, em Serbule, disse para você cortar madeira. (Teresa em Serbule vende um serrote.)"
"Pennoc in Serbule told you to go get hurt by a monster or wild animal. (You must take 500 points of health damage to complete the task.)": "Pennoc em Serbule disse para você ser ferido por um monstro ou animal selvagem. (Você deve sofrer 500 pontos de dano à saúde para completar a tarefa.)"
"Pennoc in Serbule told you to go out and butcher a bunch of animals. You'll need a Butcher Knife or similar tool in your inventory.": "Pennoc, em Serbule, disse para você sair e abater um bando de animais. Você precisará de uma faca de açougueiro ou ferramenta semelhante em seu inventário."
"Pennoc in Serbule told you to go out and skin a bunch of animals. You'll need a Skinning Knife or similar tool in your inventory.": "Pennoc, em Serbule, disse para você sair e esfolar um bando de animais. Você precisará de uma faca de esfolar ou ferramenta semelhante em seu inventário."
"Pennoc in Serbule told you to grow some fresh vegetables. He wasn't particular about the type -- just that you grow them yourself.": "Pennoc, em Serbule, disse para você cultivar alguns vegetais frescos. Ele não era específico sobre o tipo - apenas que você mesmo os cultivava."
"Pennoc in Serbule told you to hurt yourself by falling off of tall things.": "Pennoc, em Serbule, disse para você se machucar caindo de coisas altas."
"Pennoc in Serbule told you to kill creatures using explosive blasts.": "Pennoc em Serbule disse para você matar criaturas usando rajadas explosivas."
"Pennoc in Serbule told you to kill deer with the Archery skill.": "Pennoc em Serbule disse para você matar cervos com a habilidade Tiro com Arco."
"Pennoc in Serbule told you to kill Elite or Boss creatures. These are often found deep in dungeons.": "Pennoc em Serbule disse para você matar criaturas Elite ou Boss. Muitas vezes são encontrados nas profundezas das masmorras."
"Pennoc in Serbule told you to kill pigs. The killing blow must be a kick.": "Pennoc, em Serbule, disse para você matar porcos. O golpe mortal deve ser um chute."
"Pennoc in Serbule told you to kill some animals. Not monsters: just animals.": "Pennoc em Serbule disse para você matar alguns animais. Não monstros: apenas animais."
"Pennoc in Serbule told you to make some things with Carpentry.": "Pennoc em Serbule disse para você fazer algumas coisas com Carpintaria."
"Pennoc in Serbule told you to milk five different cows.": "Pennoc, em Serbule, disse para você ordenhar cinco vacas diferentes."
"Pennoc in Serbule told you to open chests in the Serbule Crypt.": "Pennoc em Serbule disse para você abrir baús na Cripta de Serbule."
"Pennoc in Serbule told you to pick flowers.": "Pennoc, em Serbule, disse para você colher flores."
"Pennoc in Serbule told you to pick some mushrooms.": "Pennoc, em Serbule, disse para você colher alguns cogumelos."
"Pennoc in Serbule told you to play some music.": "Pennoc, em Serbule, disse para você tocar um pouco de música."
"Pennoc in Serbule told you to say words of power. (You can research words of power when you have several levels of the Lore skill, which you can obtain by examining lore items in the world.)": "Pennoc em Serbule disse para você dizer palavras de poder. (Você pode pesquisar palavras de poder quando tiver vários níveis de habilidade de Conhecimento, que pode ser obtido examinando itens de conhecimento no mundo.)"
"Pennoc in Serbule told you to survey for crystals.": "Pennoc em Serbule disse para você procurar cristais."
"Pennoc in Serbule told you to teleport a bunch. (Use teleportation recipes like Recall Circle.)": "Pennoc em Serbule disse para você teletransportar um monte. (Use receitas de teletransporte como Recall Circle.)"
"Pennoc in Serbule told you to tip a bunch of other players with the /tip command. You should tip players at least 10 coins.": "Pennoc em Serbule disse para você dar gorjeta a vários outros jogadores com o comando /tip. Você deve dar aos jogadores pelo menos 10 moedas de gorjeta."
"Pennoc in Serbule told you to trade with another player. (Use the Trade option when examining another player. You don't have to actually trade items -- just so long as one or the other of you gets at least one item, that'll count.)": "Pennoc em Serbule disse para você negociar com outro jogador. (Use a opção Trocar ao examinar outro jogador. Você não precisa realmente trocar itens – desde que um ou outro consiga pelo menos um item, isso contará.)"
