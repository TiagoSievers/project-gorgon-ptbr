"Chaf in the Red Wing Casino gave you his supposedly-cursed coin and asked you to beat the game of Monsters and Mantids to prove it's not really cursed.

Beating the game is incredibly hard, though, requiring you to win dozens of fights in a row without dying. You'll need luck and good table buffs, because this is no easy feat!": "Chaf, no Red Wing Casino, deu a você sua moeda supostamente amaldiçoada e pediu que você vencesse o jogo de Monstros e Louva-a-deus para provar que não é realmente amaldiçoado.

Vencer o jogo é incrivelmente difícil, exigindo que você vença dezenas de lutas consecutivas sem morrer. Você precisará de sorte e bons fãs de mesa, porque isso não é tarefa fácil!"
"Chaf é um jogador, sempre foi, e muito supersticioso. Ele insiste que a moeda de Zhia está amaldiçoada. Ele também bebe muito e temo que apareça na festa e faça cena na frente de Zhia. E isso seria horrível. Não só para ele": "para todos!"
"Chaf's a gambler, always has been, and very superstitious. He insists that Zhia's coin is cursed. He also drinks a lot, and I'm afraid he's going to show up at the party and make a scene in front of Zhia. And that would be awful. Not just for him": "for everyone!"
"Chancellor Vexford did this to my shop. And he's watching, waiting for me to retaliate in some dumb way. That's why I need YOU to retaliate in some dumb way on my behalf! No, I'm kidding! Of course this isn't about retaliation. It's a business venture at his expense. It won't hurt anybody. I promise. Just get me the following items and you'll see.": "O Chanceler Vexford fez isto à minha loja. E ele está observando, esperando que eu retalie de alguma forma idiota. É por isso que preciso que VOCÊ retalie de alguma forma idiota em meu nome! Não, estou brincando! É claro que não se trata de retaliação. É um empreendimento comercial às custas dele. Não vai machucar ninguém. Eu prometo. Apenas me dê os seguintes itens e você verá."
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to obtain a sample from the gigantic super tall mushrooms in Serbule. He suggests looking for a smaller offshoot mushroom, as the giant mushrooms themselves are hard as rocks.": "Charles Thompson, um vendedor em uma tenda fora de Serbule, pediu que você obtivesse uma amostra dos gigantescos cogumelos super altos de Serbule. Ele sugere procurar um cogumelo menor, já que os próprios cogumelos gigantes são duros como pedras."
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to obtain some \"strange dirt -- you know, the kind that you sometimes find under mushrooms or corpses.\"": "Charles Thompson, um vendedor em uma tenda nos arredores de Serbule, pediu que você conseguisse alguma \"sujeira estranha - você sabe, do tipo que às vezes você encontra sob cogumelos ou cadáveres\"."
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to talk to Mushroom Jack about the giant mushrooms near Serbule.": "Charles Thompson, um vendedor em uma barraca fora de Serbule, pediu para você conversar com Mushroom Jack sobre os cogumelos gigantes perto de Serbule."
"Charles Thompson, a vendor in a tent outside of Serbule, has asked you to obtain a \"heartshroom\", but he has no idea where they come from.": "Charles Thompson, um vendedor em uma tenda fora de Serbule, pediu que você conseguisse um \"coração\", mas ele não tem ideia de onde eles vêm."
