"Garad said, \"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use a few new vises. If you could bring me 10 vises, that would be great! I'll be happy to share a few tips and tricks that my brother Orran has taught me during our travels in exchange.\"": "Garad disse: \"Você parece o tipo de ferreiro! Espero que você possa me ajudar. Preciso reabastecer algumas coisas antes de voltarmos à estrada. Eu realmente precisaria de alguns tornos novos. Se você pudesse me trazer 10 tornos, seria ótimo! Ficarei feliz em compartilhar algumas dicas e truques que meu irmão Orran me ensinou durante nossas viagens em troca. \""
