"Lumpfuzz in the Ilmari Desert said, \"Ever seen a wave of nature elementals? Well they're right here, so take a look outside. They're coming from the west.

I'll stay here and protect the citizens from any that manage to make it to town. In the mean time you can pick off their numbers. Just remember: they hate lightning. You know what to do.\"": "Lumpfuzz no deserto de Ilmari disse: \"Já viu uma onda de elementais da natureza? Bem, eles estão bem aqui, então dê uma olhada lá fora. Eles estão vindo do oeste.

Ficarei aqui e protegerei os cidadãos de qualquer um que conseguir chegar à cidade. Enquanto isso, você pode escolher seus números. Lembre-se: eles odeiam raios. Você sabe o que fazer.\""
"Lumpfuzz in the Ilmari Desert said, \"Okay, so the rakkies in the southwest have been breeding extra-vicious sand dogs. You need to kill those.

Look, I know what this sounds like and I don't want to hear it. Those sand dogs aren't like us... they're not even mammals! They're dinosaurs or something! Wardens hate dinosaurs, right? Well... they aren't native to here! They're disrupting the natural order and shit.

Look, the bandits were already a big problem for Amulna, and now they're much worse. And those sand dogs creep me out. Just fill out the forms however you need to, but those freaks need to go.\"": "Lumpfuzz, no deserto de Ilmari, disse: \"Tudo bem, então os rakkies do sudoeste têm criado cães de areia extremamente cruéis. Você precisa matá-los.

Olha, eu sei como isso soa e não quero ouvir. Esses cachorros da areia não são como nós... nem são mamíferos! Eles são dinossauros ou algo assim! Os guardas odeiam dinossauros, certo? Bem... eles não são nativos daqui! Eles estão perturbando a ordem natural e essas merdas.

Olha, os bandidos já eram um grande problema para Amulna e agora são muito piores. E aqueles cachorros da areia me assustam. Basta preencher os formulários como for necessário, mas esses malucos precisam ir embora.\""
"Lumpfuzz in the Ilmari Desert said, \"So yeah, thanks for coming. I heard about this from that elf seer across town: part of the desert is coated in giant spiders that are, like, mated with tornados? I don't understand it, but wherever the spiders walk, the tornados go too. And the elf says that they've come topside to lay their eggs in the wind to scatter far and wide. That's not good.

I've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.\"": "Lumpfuzz no deserto de Ilmari disse: \"Então, sim, obrigado por ter vindo. Ouvi sobre isso daquele elfo vidente do outro lado da cidade: parte do deserto é coberta por aranhas gigantes que são, tipo, acasaladas com tornados? Não entendo, mas onde quer que as aranhas andem, os tornados também vão. E o elfo diz que eles vieram para a superfície para colocar seus ovos no vento e se espalhar por toda parte. Isso não é bom.

Estive matando eles a manhã inteira, mas sobrou bastante para você! Garras e presas não funcionam muito bem, mas caem com alguns raios. Vá para sudeste, você os ouvirá antes de vê-los.\""
