"Asparagus in Statehelm said, \"Let's put the past behind us for now. How about some dice games? If you beat me, say, 50 times, I'll teach you a secret technique to improve your cheating technique. Not that you should cheat me! Save that for the big stakes tables.\"": "Asparagus em Statehelm disse: \"Vamos deixar o passado para trás por enquanto. Que tal alguns jogos de dados? Se você me vencer, digamos, 50 vezes, vou lhe ensinar uma técnica secreta para melhorar sua técnica de trapaça. Não que você deva me enganar! Guarde isso para as mesas de apostas grandes.\""
"Asparagus in Statehelm said, \"Well, your actions have incriminated you now, so you can see it through with me if you want to. I'm setting up a trade with a friend who lives out of town. Help me get the rest of this crap, and I'll let you in on the action.\"": "Espargos em Statehelm disse: \"Bem, suas ações incriminaram você agora, então você pode resolver isso comigo se quiser. Estou fechando uma negociação com um amigo que mora fora da cidade. Ajude-me a conseguir o resto dessa porcaria, e eu deixarei você entrar em ação. \""
"Asparagus in Statehelm said, \"You want to do something for me? Pf.

Well, I always need more fluorite.\"": "Espargos em Statehelm disse: \"Você quer fazer algo por mim? Pf.

Bem, eu sempre preciso de mais fluorita.\""
