"Lana Songtree in Serbule Hills asked you to deliver some homemade bear repellent to her friend Jara in Serbule. Jara lives in a farmhouse outside of town.": "Lana Songtree em Serbule Hills pediu para você entregar um repelente de urso caseiro para sua amiga Jara em Serbule. Jara mora em uma fazenda fora da cidade."
