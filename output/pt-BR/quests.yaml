"Um... I wanted mysterious deaths that wouldn't draw too much attention. You just wandered out and murdered those fire spiders!

I guess that's better than nothing. Let's just hope you didn't draw too much attention to Eltibule.": "Hum... eu queria mortes misteriosas que não chamassem muita atenção. Você simplesmente saiu e assassinou aquelas aranhas de fogo!

Acho que isso é melhor do que nada. Esperemos que você não tenha chamado muita atenção para Eltibule."
"Um... Is... Is this a swamp salad? It's... I expected crispy. This is kind of slimy...

Hm. No, it's not my favorite. But it's not that bad. An interesting dining experience, at least!": "Hum... É... Isso é uma salada de pântano? É... eu esperava crocante. Isso é meio viscoso...

Hum. Não, não é o meu favorito. Mas não é tão ruim assim. Uma experiência gastronómica interessante, pelo menos!"
"Umarak in Povus said, \"All our supplies are gone, so I've had lots of trouble feeding Tryaka and myself. We're making due, but I really miss having an orange for breakfast each morning. And our gums are starting to bleed... I fear that's somehow related.\"": "Umarak em Povus disse: “Todos os nossos suprimentos acabaram, então tive muitos problemas para alimentar Tryaka e a mim mesmo."
"Umarak in Povus said, \"I want to make my mate's favorite cheese for her, but it requires extremely pungent rennet. And, of course, I have nothing to make that with!\"": "Umarak em Povus disse: \"Quero fazer para ela o queijo favorito da minha companheira, mas requer coalho extremamente picante. E, claro, não tenho nada com que fazer isso!\""
"Umarak in Povus said, \"I wish I could help Tryaka recover from the invasion. She has seemed distant. Even... I don't dare say it to her face... a bit afraid. I need to bring her mind back to practical matters! If I had some agates, I could convince her to return to jewelrycrafting.\"": "Umarak em Povus disse: \"Eu gostaria de poder ajudar Tryaka a se recuperar da invasão. Ela parecia distante. Mesmo... não me atrevo a dizer isso na cara dela... com um pouco de medo. Preciso trazer sua mente de volta às questões práticas! Se eu tivesse algumas ágatas, poderia convencê-la a voltar a fazer joias.\""
"Umarak in Povus said, \"It'll soon be time for outdoor grilling again! And my grill was destroyed by orcs. But I can fix it! What I can't fix is the lack of fuel. How can I make perfect food without perfect fuel? It's impossible! I need spruce wood chips!\"": "Umarak em Povus disse: \"Em breve chegará a hora de grelhar ao ar livre novamente! E minha churrasqueira foi destruída por orcs. Mas posso consertar! O que não posso consertar é a falta de combustível. Como posso fazer comida perfeita sem combustível perfeito? É impossível! Preciso de lascas de madeira de abeto!\""
"Umarak in Povus said, \"My mate is not doing well since the invasion. She used to make jewelry, and I'm hoping I can convince her to take up the trade again. It will make her happier. I just need some cinnabar!\"": "Umarak em Povus disse: \"Minha companheira não está bem desde a invasão. Ela costumava fazer joias e espero poder convencê-la a retomar o comércio. Isso a deixará mais feliz. Só preciso de um pouco de cinábrio!\""
"Umarak in Povus said, \"My mate Tryaka used to love cantaloupe for breakfast. But we can't get it here anymore. Sigh...\"": "Umarak em Povus disse: \"Meu amigo Tryaka costumava adorar melão no café da manhã. Mas não podemos mais comprá-lo aqui. Suspiro...\""
"Umarak in Povus said, \"My stash of cooking herbs wasn't found by the orc invaders! But sadly I am now out of basil, and I need that for many of the meals I prepare. I can tell Tryaka is less happy with my cooking, but what can I do?!\"": "Umarak em Povus disse: \"Meu estoque de ervas para cozinhar não foi encontrado pelos invasores orcs! Mas, infelizmente, agora estou sem manjericão e preciso dele para muitas das refeições que preparo. Posso dizer que Tryaka está menos feliz com minha comida, mas o que posso fazer?!\""
"Umarak in Povus said, \"The orc invaders stole everything. Even our blankets! I've made a thin blanket from old rags, but as it gets colder, we'll need something warmer. If only sheep grew around here, I could get some wool!\"": "Umarak em Povus disse: \"Os invasores orcs roubaram tudo. Até nossos cobertores! Fiz um cobertor fino com trapos velhos, mas à medida que esfria, precisaremos de algo mais quente. Se ao menos ovelhas crescessem por aqui, eu poderia conseguir um pouco de lã!\""
"Umarak in Povus said, \"Tryaka's favorite snack was peaches. They always cheered her up! Pity they only grow far from here...\"": "Umarak em Povus disse: \"O lanche favorito de Tryaka eram pêssegos. Eles sempre a animavam! Pena que eles só crescem longe daqui...\""
