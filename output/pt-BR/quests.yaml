"Took you a while, huh? Maybe next time you could put your jib into it. Because in the time it took you, Sage lost some interest in the product. Don't worry, I still managed to secure a decent profit. Here's your share.

Hooray, if we didn't live in an expensive city, we'd be kinda rich!

Eh. I feel hollow. But I'll have a new money-making idea soon!": "Demorou um pouco, hein? Talvez da próxima vez você possa colocar sua bujarrona nisso. Porque com o tempo que você demorou, Sage perdeu algum interesse no produto. Não se preocupe, ainda consegui garantir um lucro decente. Aqui está sua parte.

Viva, se não morássemos em uma cidade cara, seríamos meio ricos!

