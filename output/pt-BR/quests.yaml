Tenho <i>quase</i> certeza de que você já sabia disso, mas acho que tecnicamente você pode ser meu oficial superior, então só queria esclarecer.

E estou pedindo a Sir Porrins que investigue qual posição você realmente ocupa agora. Seus registros são um pouco confusos."
"Excellent. Let me work quickly... yes! I knew it! These yellow crystals are just a kind of enchanted hassium, which phlogiston renders relatively safe! Wait until I show Mox!

Unfortunately the technique does not seem to be very cost-effective, but I believe I can improve the ratios a bit...

Here. You seem to be more open-minded about learning from a 'child' than Mox is. Here is my improved crystal transit formula. It may be too expensive to use routinely, but I hope that some day it proves useful.": "Excelente. Deixe-me trabalhar rápido... sim! Eu sabia! Esses cristais amarelos são apenas uma espécie de hássio encantado, que o flogisto torna relativamente seguro! Espere até eu mostrar ao Mox!

Infelizmente a técnica não parece ser muito econômica, mas acredito que posso melhorar um pouco as proporções...

Aqui. Você parece ter a mente mais aberta para aprender com uma 'criança' do que Mox. Aqui está minha fórmula aprimorada de trânsito de cristal. Pode ser muito caro para usar rotineiramente, mas espero que algum dia seja útil."
"Excellent. These are quite valuable for alchemy.

(Psst, don't worry, I'll get that curse off of you soon!)": "Excelente. Estes são muito valiosos para a alquimia.

(Psiu, não se preocupe, vou tirar essa maldição de você em breve!)"
"Excellent. Using fancy words always puts me in a jocular frame of mind so that it's easier to see the levity of any situation. It's one of the many holistic benefits of vocabulary!": "Excelente. Usar palavras bonitas sempre me deixa com um estado de espírito jocoso, de modo que é mais fácil ver a leviandade de qualquer situação. É um dos muitos benefícios holísticos do vocabulário!"
"Excuse me? An orc wants to collaborate on technology? What, just because I'm stout and have a big bushy beard, that automatically makes me an inventor, does it? Well, tell your orc friend that I'll happily invent new things with them as soon as they get done rampaging across the country, killing everything in sight. In other words: piss off. Hrmph.": "Com licença? Um orc quer colaborar em tecnologia? O que, só porque sou corpulento e tenho uma barba grande e espessa, isso automaticamente me torna um inventor, não é? Bem, diga ao seu amigo orc que ficarei feliz em inventar coisas novas com eles assim que eles acabarem de se espalhar pelo país, matando tudo que estiver à vista. Em outras palavras: dê o fora. Hmph."
