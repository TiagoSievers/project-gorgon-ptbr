"Wait, how can Gisli need more horseshoes? I just made him a dozen! And what size does he need? I take pride in my work and... wait, he wants 'as many as I can make'? And he'll pay in sex. Oh. He doesn't even need horseshoes at all! <i>Tadion lets out a profound sigh.</i> That dwarf is just not a great lay. But since I'm always sweaty and smelly I can't exactly have my pick of the town. So tell him I'll be by tomorrow for my payment.": "Espere, como Gisli pode precisar de mais ferraduras? Acabei de fazer uma dúzia para ele! E qual o tamanho que ele precisa? Tenho orgulho do meu trabalho e... espere, ele quer 'tantos quanto eu puder fazer'? E ele pagará em sexo. Oh. Ele nem precisa de ferraduras! <i>Tadion solta um suspiro profundo.</i> Aquele anão simplesmente não é uma boa transa. Mas como estou sempre suado e fedorento, não posso exatamente escolher a cidade. Então diga a ele que estarei lá amanhã para receber meu pagamento."
