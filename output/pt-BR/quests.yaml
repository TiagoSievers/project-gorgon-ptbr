"Unfortunately I can't will away these nasty side-effects. I think I remember Velkort saying he dabbled in drugs like this when he was my age - can you ask him for a hangover cure?\": \"Ok, então eu tenho um problema. Eu admito": "sou viciado em pó de crânio. Mas está tudo bem. Eu sou um mestre da mente! Eu apenas desejei parar."
"Unfortunately I used up my supply of bones during some recent shamanic infusion experiments... do you happen to have a surplus? Do not concern yourself with their rollability; any bones will do at this stage.\\\"\": \"Irkima, do Red Wing Casino, disse": "\\\"Pelo que entendi, nossa árvore Ri-Shin deve ser decorada com itens que evoquem memórias de nosso local. Vários clientes me disseram que quando pensam em Red Wing, pensam em 'rolar os ossos'. Não sei por que eles associam partes sombrias do corpo ao nosso adorável estabelecimento, mas tenho certeza de que é outra coisa racista anti-insetos. Essas conotações são prejudiciais, mas nosso objetivo é fazer nossos convidados felizes, então ossos são!"
"Unfortunately, my tests on these Frostbelch skins were inconclusive. There's nothing out of the ordinary with them. Fortunately for us, however, an animal expert was recently stationed near here. Seek out Pitre Ferrence, he should be somewhere south of this area. Ask him, nay, tell him that we'd like his assistance in this matter. Take the skins with you as well, he may need them.": "Infelizmente, meus testes nessas skins Frostbelch foram inconclusivos. Não há nada fora do comum com eles. Felizmente para nós, porém, um especialista em animais esteve recentemente estacionado aqui perto. Procure Pitre Ferrence, ele deve estar em algum lugar ao sul desta área. Pergunte a ele, ou melhor, diga-lhe que gostaríamos de sua ajuda neste assunto. Leve as peles com você também, ele pode precisar delas."
