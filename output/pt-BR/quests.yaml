"Hi! If you like to help animals, you should help us, because we're animals. And we need help! Sebastian and Grana went away to rescue some smart snails in Verta, but they took too much of our food. Now we don't have enough. When they come back I'll say, 'I'm not mad, I'm just disappointed,' and they'll know I'm actually really mad. But right now we need new food.": "Oi! Se você gosta de ajudar os animais, deveria nos ajudar, porque somos animais. E precisamos de ajuda! Sebastian e Grana foram resgatar alguns caracóis espertos em Verta, mas eles levaram muita comida. Agora não temos o suficiente. Quando eles voltarem, direi: 'Não estou bravo, só estou desapontado', e eles saberão que estou realmente bravo. Mas agora precisamos de novos alimentos."
"Hi! Would you be interested in learning the ways of the carrot? I can help you get started!

First off, you need to know how to seek out your carrots. I have placed several Carrots of Power across the landscape here in the Serbule and Serbule Hills areas. Seek out seven of these Carrots of Power and then return to me. Also, you must interact with the Carrots of Power as a rabbit! You cannot become a Bun-Fu Master if you're not a rabbit!

If you need to bunny up, just ask! Good hunting!\"": "Oi! Você estaria interessado em aprender como funciona a cenoura? Posso ajudá-lo a começar!

Em primeiro lugar, você precisa saber como procurar suas cenouras. Coloquei várias Cenouras do Poder em toda a paisagem aqui nas áreas de Serbule e Serbule Hills. Procure sete dessas Cenouras do Poder e depois volte para mim. Além disso, você deve interagir com as Cenouras do Poder como um coelho! Você não pode se tornar um Mestre Bun-Fu se não for um coelho!

Se precisar de um coelhinho, é só pedir! Boa caça!\""
"Hi, %PLAYER_NAME%, I wanted to report back about my sleep habits. I've got the infestation cleared and the sound and odor issues under control! But it's slightly too chilly. The standard-issued blanket is too thin. I need a replacement!": "Olá, %PLAYER_NAME%, gostaria de relatar sobre meus hábitos de sono. Eu limpei a infestação e os problemas de som e odor sob controle! Mas está um pouco frio demais. O cobertor padrão é muito fino. Eu preciso de um substituto!"
"HiddenBear": "Urso Oculto"
"Hippogriffs aren't immortal. Did you know that? Yeah, they hatch out of eggs! We have a hatchery on board, too. You should go kill the brood mother!

You'll know you're in the right place when the temperature drops. They keep Coldfeather's quarters very cold!": "Os hipogrifos não são imortais. Você sabia disso? Sim, eles eclodem de ovos! Também temos um incubatório a bordo. Você deveria matar a mãe da ninhada!

Você saberá que está no lugar certo quando a temperatura cair. Eles mantêm os aposentos de Coldfeather muito frios!"
"HippoTooth": "Dente de hipopótamo"
"Hiral at the fairy tree has asked for apple juice.": "Hiral na árvore das fadas pediu suco de maçã."
"Hiral at the fairy tree has asked for some camembert cheese.": "Hiral na árvore das fadas pediu um pouco de queijo camembert."
"Hiral's Citrus Blends": "Misturas cítricas de Hiral"
"HiralsCitrusBlend": "HiralsCitrusMistura"
"His favorite flower is the desert rose. A  bouquet of them would help show my feelings.\\\"\": \"Anaberyl em Statehelm disse": "\\\"Subestimei Ormond. E preciso me desculpar com ele por isso. Então, quando eu falar com ele, gostaria de oferecer um presente. Você pode conseguir para mim?"
"Hissy": "sibilante"
"Hm, it's a bit sour, but it's still better than no wine. Good! Let me teach you how to make a zesty wine. It's a little tricky, but worth the pain!": "Hm, está um pouco azedo, mas ainda é melhor do que nenhum vinho. Bom! Deixe-me ensiná-lo a fazer um vinho picante. É um pouco complicado, mas vale a pena!"
"Hm, nope... not enough candles. I need more data than that! But a deal's a deal, let me teach you how to bind eldritch wounds a bit better. [You gain First Aid XP]": "Hm, não... não há velas suficientes. Preciso de mais dados do que isso! Mas um acordo é um acordo, deixe-me ensiná-lo a curar feridas sobrenaturais um pouco melhor. [Você ganha XP de Primeiros Socorros]"
"Hm, not bad. Here! This is for your trouble!": "Hum, nada mal. Aqui! Isto é para o seu problema!"
"Hm, so the two rhinos did not switch places, and now both of them are simply dead? <i>[Furlak shrugs.]</i> At least we tried.": "Hm, então os dois rinocerontes não trocaram de lugar e agora os dois estão simplesmente mortos? <i>[Furlak encolhe os ombros.]</i> Pelo menos tentamos."
"Hm, you look kinda beaten up! I guess I thought ruminants were pretty laid back. Sorry about that.": "Hm, você parece meio abatido! Acho que pensei que os ruminantes eram bastante descontraídos. Desculpe por isso."
"Hm.

Hmmmm.

Hm.

I see. Tell your orcish friend that the fish will escape easily with this current design. If you introduce a high-pitched noise mechanism, perhaps that of a bell, she can then tune the gears to react to it properly and clamp down harder on the caught fish.": "Hum.

Hummm.

Hum.

Eu vejo. Diga ao seu amigo orc que os peixes escaparão facilmente com este design atual. Se você introduzir um mecanismo de ruído agudo, talvez o de um sino, ela poderá ajustar as engrenagens para reagir adequadamente e reprimir com mais força o peixe capturado."
"Hm. Gem's a bit small. But it'll work. Okay, I think she's ready for the world! Here. Try it out.": "Hum. Gem é um pouco pequena. Mas vai funcionar. Ok, acho que ela está pronta para o mundo! Aqui. Experimente."
"Hm. I expected your efforts to have more impact. No matter, we shall simply work harder! Let me aid you: while you're in this dream realm, your legs aren't necessarily controlled by physics. Use this technique carefully lest you fling yourself into terrible monsters!": "Hum. Eu esperava que seus esforços tivessem mais impacto. Não importa, simplesmente trabalharemos mais! Deixe-me ajudá-lo: enquanto você está neste reino dos sonhos, suas pernas não são necessariamente controladas pela física. Use esta técnica com cuidado para não se atirar em monstros terríveis!"
"Hm. Not how I'd have done it, but these will work just fine.": "Hum. Não é como eu teria feito, mas isso vai funcionar muito bem."
"Hm. Quality is okay. Enthusiasm is not high enough! Be more enthusiastic!": "Hum. A qualidade está boa. O entusiasmo não é alto o suficiente! Seja mais entusiasmado!"
"Hm. Truth be told, I'm not very astonished by a few of these skulls. Buuuuuut I think I can convince our customer that they're good stuff. I'm going to have to dock your pay a bit, but it's still a good payout!": "Hum. Verdade seja dita, não estou muito surpreso com alguns desses crânios. Buuuuuut, acho que posso convencer nosso cliente de que eles são bons. Vou ter que reduzir um pouco o seu pagamento, mas ainda é um bom pagamento!"
"Hm. Well this is a whole lot more complicated than replacing their N core. I may be out of my depth. But thanks for enabling my curious spirit! Having a project to work on is important. And don't you forget it.": "Hum. Bem, isso é muito mais complicado do que substituir o núcleo N. Posso estar fora do meu alcance. Mas obrigado por capacitar meu espírito curioso! Ter um projeto para trabalhar é importante. E não se esqueça disso."
"Hm. You're alive! Excellent.": "Hum. Você está vivo! Excelente."
"Hm? No, I don't need anything. Wait, actually, have you got any grapes? I just want a snack.": "Hum? Não, eu não preciso de nada. Espere, na verdade, você tem uvas? Eu só quero um lanche."
"Hmm ... Hmm! Yeah, this will do! It's not quite right but it isn't horrible. Thanks!

I think I'll call it tofurkey. It's a pun, or play on words, see? ": "Hum... Hum! Sim, isso vai servir! Não está certo, mas não é horrível. Obrigado!

Acho que vou chamá-lo de peru. É um trocadilho, ou jogo de palavras, viu?"
"Hmm, can I trust you? Well, I guess I have no choice. One of the secret ingredients in my signature dish is ground up grimalkin hair. But not just ordinary hair -- it's got to be covered in their spit! If you find some of those giant hairballs, bring them to me, okay?": "Hum, posso confiar em você? Bem, acho que não tenho escolha. Um dos ingredientes secretos do meu prato exclusivo é o cabelo Grimalkin moído. Mas não apenas cabelos comuns - eles precisam estar cobertos de saliva! Se você encontrar algumas dessas bolas de pelo gigantes, traga-as para mim, ok?"
"Hmm, fetch me some of the boletus mushrooms. Oh, and can you chop them for me? I'm more of a mage than a laborer, you understand... then bring me the boletus flakes.": "Hmm, traga-me alguns cogumelos boletos. Ah, e você pode cortá-los para mim? Sou mais um mago do que um trabalhador, você entende... então traga-me os flocos de boleto."
"Hmm, go and, and... eat! Eat a ton of cooked food all at once!": "Hmm, vá e, e... coma! Coma uma tonelada de comida cozida de uma só vez!"
"Hmm, I like this enhanced stuff! But I've heard there's even better pineal juice out there.": "Hmm, eu gosto dessas coisas aprimoradas! Mas ouvi dizer que existe suco pineal ainda melhor por aí."
"Hmm, is this pure? It doesn't smell right. You got too many impurities in it! I'm sorry, but I have to dock your pay for that. Here's what you deserve.": "Hmm, isso é puro? Não cheira bem. Você tem muitas impurezas nele! Sinto muito, mas tenho que descontar seu pagamento por isso. Aqui está o que você merece."
"Hmm, not this one... this one isn't lining up either... a-ha, this is it! Now let's see, what exactly did they mean by... ohh, that makes so much sense! I think I've got it now.

<i>[You've unlocked new training options with Engineer Crall.]</i>": "Hmm, esse não... esse também não está na fila... a-ha, é isso! Agora vamos ver o que exatamente eles queriam dizer com... ahh, isso faz muito sentido! Acho que entendi agora.

<i>[Você desbloqueou novas opções de treinamento com o Engineer Crall.]</i>"
"Hmm, running low on bone meal! Can you get me some more? The easiest way to get it is to rob tombs. Oh, it's okay, they aren't using it!

Try the crypt at the back of the graveyard outside of town. It'll be pretty far in, since dumb old Marna already excavated all the easily-reached bone meal.": "Hmm, com pouca farinha de ossos! Você pode me trazer mais? A maneira mais fácil de conseguir isso é roubar tumbas. Ah, está tudo bem, eles não estão usando!

Experimente a cripta nos fundos do cemitério fora da cidade. Já vai demorar bastante, já que a velha e burra da Marna já escavou toda a farinha de ossos de fácil acesso."
"Hmm, something's not quite right. Are you sure you used fresh onions?! Well, it's pretty good. Thank you.": "Hum, algo não está certo. Tem certeza de que usou cebola fresca?! Bem, é muito bom. Obrigado."
"Hmm, these agates are shit. But they'll do, they'll do. I'm in a hurry. Here's your pay. And if it seems paltry, remember my gratitude is part of your payment!": "Hmm, essas ágatas são uma merda. Mas eles farão, eles farão. Estou com pressa. Aqui está o seu pagamento. E se parecer insignificante, lembre-se que minha gratidão faz parte do seu pagamento!"
"Hmm, these teeth aren't terribly sharp. I mean they cut flesh, but they aren't razor sharp... hmm. That probably means something. But it turns out I know almost nothing about botany, so I'm not sure what to make of it. Oh well. I give up. But not on you! You did great!": "Hmm, esses dentes não são muito afiados. Quero dizer, eles cortam carne, mas não são afiados como navalhas... hmm. Isso provavelmente significa alguma coisa. Mas acontece que não sei quase nada sobre botânica, então não tenho certeza do que pensar disso. Ah bem. Desisto. Mas não em você! Você foi ótimo!"
"Hmm, they're warm! What was that old mnemonic we learned in school? \"Hatred is Hot, Despair is Cold, Fear is Tingly, Greed is  Slimy\". <i>(It rhymes in Goblin, but not in Common.)</i> I guess... I guess I don't really know enough about Necromancy to tell what these do. But I'll study them. Thanks! Here, take some money for your trouble.": "Hmm, eles estão quentes! Qual foi aquele antigo mnemônico que aprendemos na escola? \"O ódio é quente, o desespero é frio, o medo é formigante, a ganância é pegajosa\". <i>(Rima em Goblin, mas não em Comum.)</i> Eu acho... Acho que não sei o suficiente sobre Necromancia para saber o que eles fazem. Mas vou estudá-los. Obrigado! Aqui, pegue algum dinheiro pelo seu trabalho."
"Hmm, yep, these are decent, thanks! I'll give you the money Ukorga promised me for these stools.": "Hmm, sim, estes são decentes, obrigado! Vou te dar o dinheiro que Ukorga me prometeu por esses bancos."
"Hmm, your aura seems the same so far. Let's give it a little while to see if it helps or if you need to mine more.": "Hmm, sua aura parece a mesma até agora. Vamos esperar um pouco para ver se ajuda ou se você precisa minerar mais."
"Hmm. I guess you'll do. Use that lever behind me, it'll let you through.": "Hum. Eu acho que você servirá. Use aquela alavanca atrás de mim, ela deixará você passar."
"Hmm. I know what THIS order's for. But that' s not our business. Just get the skin.": "Hum. Eu sei para que serve ESTA ordem. Mas isso não é da nossa conta. Basta pegar a pele."
"Hmm. The flavors are a bit suspect, but I cannot turn it down! Here. Perhaps return later and I shall perhaps need more.": "Hum. Os sabores são um pouco suspeitos, mas não posso recusar! Aqui. Talvez volte mais tarde e talvez precise de mais."
"Hmm. The meat almost seems rotted from within, as if a druid had cast Rotflesh on it. Hmm? No, not \\\"Rotskin\\\"... what's Rotskin? I mean Rotflesh! The druid spell? Oh... this must be another one of those differences between druid types. Why don't I teach you our version?\": \"É como eu temia": "a carne deste caracol está envenenada com vestígios daquele metal estranho que eles extraem lá embaixo. Isso explica por que os ratkin não os comem!"
"Hmm. These are just bone. I guess it's interesting that deer grow massive bones from their skulls, but it's still just bone. Oh, well. Thanks anyway!": "Hum. Estes são apenas ossos. Acho interessante que os cervos desenvolvam ossos enormes em seus crânios, mas ainda são apenas ossos. Ah bem. Obrigado de qualquer maneira!"
"Hmm. These corks are too light. My plan will never work. You should have warned me that it was a dumb plan!": "Hum. Essas rolhas são muito leves. Meu plano nunca funcionará. Você deveria ter me avisado que era um plano idiota!"
"Hmm. Well none of them are as good as my last masterpiece, but THIS one is... Yes, I can make this work. Thank you. Please take this other trash away.

I'll have my new masterpiece on display in no time!": "Hum. Bem, nenhum deles é tão bom quanto minha última obra-prima, mas ESTE é... Sim, posso fazer isso funcionar. Obrigado. Por favor, leve esse outro lixo embora.

Terei minha nova obra-prima em exibição em pouco tempo!"
"Hmm. Well these are low on sulfur, but they will do. Thank you, my friend. We shall not speak of this again, but when the time comes, I will remember who my friends are.": "Hum. Bem, estes têm baixo teor de enxofre, mas servem. Obrigado, meu amigo. Não falaremos mais sobre isso, mas quando chegar a hora, lembrarei quem são meus amigos."
"Hmm. Well, I guess you did pretty well.": "Hum. Bem, acho que você se saiu muito bem."
"Hmm... if I didn't know better, I'd say these were caricatures of humans meant to mock them... but apparently not! I'll add them to the tree.

Oh, and here: of the many recipes Sir Coth found for me, this is the only version of Gingerbread Humans that might actually be tasty. If you're ever in the mood for an ethnic cookie, maybe try out this recipe.": "Hmm... se eu não soubesse, diria que são caricaturas de humanos destinadas a zombar deles... mas aparentemente não! Vou adicioná-los à árvore.

Ah, e aqui: das muitas receitas que Sir Coth encontrou para mim, esta é a única versão de Gingerbread Humans que pode realmente ser saborosa. Se você estiver com vontade de comer um biscoito étnico, experimente esta receita."
"Hmm... not as nice as I expected. If I wear my kilt I'll get splinters! But thanks, I'll try using it with my robes. Here, you can have my old kilt if you like.": "Hmm... não tão legal quanto eu esperava. Se eu usar meu kilt, vou ficar com lascas! Mas obrigado, vou tentar usá-lo com minhas vestes. Aqui, você pode ficar com meu velho kilt, se quiser."
"Hmm... there's something that you need... let me see if I can figure it out. Ah! You need to consume the unborn offspring of a smallish bird! I have the recipe right here.": "Hmm... há algo que você precisa... deixe-me ver se consigo descobrir. Ah! Você precisa consumir os filhotes ainda não nascidos de um pássaro pequeno! Eu tenho a receita aqui."
"Hmm... yes, still waxy.

You have done well. I shall prepare the potion.": "Hmm... sim, ainda ceroso.

Você se saiu bem. Vou preparar a poção."
"Hmmmmm. Hmmmmm. I thought they'd be thicker. But okay, fine, these skins will do. Thank you, and here's your coins.": "Hummm. Hummm. Achei que seriam mais grossos. Mas tudo bem, tudo bem, essas skins servem. Obrigado, e aqui estão suas moedas."
"Hmph. The past is the past, eh? That doesn't sound like Gloria, but maybe she's changed since I last saw her. I'll consider her words. Thank you for delivering the message, please take this as a token of my appreciation. And please <i>also</i> don't ask how I got it.": "Hmph. O passado é o passado, né? Isso não parece ser Gloria, mas talvez ela tenha mudado desde a última vez que a vi. Vou considerar as palavras dela. Obrigado por entregar a mensagem, por favor, tome isso como um sinal de meu agradecimento. E por favor <i>também</i> não pergunte como consegui isso."
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride, even our really good chairs. If you can provide us with 10 Amazing Chairs, I can show you a few tricks to help with building better ones in the future!": "Olá! Com vontade de construir algo? Muitas de nossas cadeiras foram quebradas no caminho até aqui por causa da viagem difícil, até mesmo nossas cadeiras realmente boas. Se você puder nos fornecer 10 cadeiras incríveis, posso mostrar alguns truques para ajudar a construir cadeiras melhores no futuro!"
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride, even our really good chairs. If you can provide us with 10 Amazing Chairs, I can show you a few tricks to help with building better ones in the future!

": "Olá! Com vontade de construir algo? Muitas de nossas cadeiras foram quebradas no caminho até aqui por causa da viagem difícil, até mesmo nossas cadeiras realmente boas. Se você puder nos fornecer 10 cadeiras incríveis, posso mostrar alguns truques para ajudar a construir cadeiras melhores no futuro!"
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride. If you can provide us with 10 Shoddy Chairs, I can show you a few tricks to help with building better ones in the future!": "Olá! Com vontade de construir algo? Muitas de nossas cadeiras quebraram no caminho até aqui por causa da viagem difícil. Se você puder nos fornecer 10 cadeiras de má qualidade, posso mostrar alguns truques para ajudar a construir cadeiras melhores no futuro!"
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride. If you can provide us with 10 Shoddy Chairs, I can show you a few tricks to help with building better ones in the future!

": "Olá! Com vontade de construir algo? Muitas de nossas cadeiras quebraram no caminho até aqui por causa da viagem difícil. Se você puder nos fornecer 10 cadeiras de má qualidade, posso mostrar alguns truques para ajudar a construir cadeiras melhores no futuro!"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Astounding Storage Crates, I can show you a few tricks to help with building better ones in the future!": "Olá! Com vontade de construir algo? Precisamos de caixas novas para transportar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 caixas de armazenamento surpreendentes, posso mostrar alguns truques para ajudar a construir caixas melhores no futuro!"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Astounding Storage Crates, I can show you a few tricks to help with building better ones in the future!

": "Olá! Com vontade de construir algo? Precisamos de caixas novas para transportar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 caixas de armazenamento surpreendentes, posso mostrar alguns truques para ajudar a construir caixas melhores no futuro!"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Crude Storage Crates, I can show you a few tricks to help with building better ones in the future!": "Olá! Com vontade de construir algo? Precisamos de caixas novas para transportar nosso reabastecimento de mercadorias. Se você puder nos fornecer 10 caixas de armazenamento bruto, posso mostrar alguns truques para ajudar a construir caixas melhores no futuro!"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Crude Storage Crates, I can show you a few tricks to help with building better ones in the future!

