"Chirrra in the Serbule Hills Ranalon Den said, \"Another mission already? Um... just go kill some ranalons! Whichever. Bring me some of their tacky jewelry to prove you've done your job.\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Já tem outra missão? Hum... vá matar alguns ranalons! Tanto faz. Traga-me algumas de suas joias cafonas para provar que você fez seu trabalho.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Deep in the farming area are a bunch of Guardians. You know, the thuggish-looking ones? Glowball on their head? Yeah. The ones in this den are pretty dumb, but they're mean in a fight. If you kill them, it'll demoralize everyone. And that's good.\"": "Chirrra, em Serbule Hills, Ranalon Den disse: \"Nas profundezas da área agrícola há um bando de Guardiões. Você sabe, aqueles com aparência de bandido? Bolas luminosas em suas cabeças? Sim. Os que estão nesta toca são muito burros, mas são maus em uma briga. Se você matá-los, isso desmoralizará a todos. E isso é bom.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Deep in the legling training area is the mage training section. Right now they're mostly doing stone-shaping, so look for the poorly-worked stones. You definitely want to take these mages out before they fully master their abilities!\"": "Chirrra em Serbule Hills Ranalon Den disse: “No fundo da área de treinamento de legling está a seção de treinamento de magos. No momento eles estão principalmente moldando pedras, então procure pelas pedras mal trabalhadas."
"Chirrra in the Serbule Hills Ranalon Den said, \"Have you seen the emergency moisturizing shells? They're super ugly, right? That's all Gulllia's fault, she thinks they look... anyway, it doesn't matter! When a ranalon gets super dried out, they use the healing water in those shells to stay moist. And you are going to poison that water. Here's the poison. Go!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Você viu as conchas hidratantes de emergência? Elas são super feias, certo? Isso é tudo culpa de Gulllia, ela acha que elas parecem... de qualquer maneira, não importa! Quando um ranalon fica super seco, eles usam a água curativa dessas conchas para se manterem úmidos. E você vai envenenar essa água. Aqui está o veneno. Vá!\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Head into the legling training area and find the area where gardeners practice their craft -- it's one of the first areas you'll come across in there. Kill everyone there.\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Vá para a área de treinamento de legling e encontre a área onde os jardineiros praticam seu ofício - é uma das primeiras áreas que você encontrará lá. Mate todos lá.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. They're born knowing how to fight, but they need to build up their muscle mass and train their coordination. So now is the time to strike, while they're weak!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Vá para a área de treinamento de legling. Passe pela área de prática de jardinagem. Quando o caminho se bifurca, vá para a esquerda para encontrar os clubbers. Eles nascem sabendo lutar, mas precisam construir sua massa muscular e treinar sua coordenação. Então agora é a hora de atacar, enquanto estão fracos!\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Hmm, fetch me some of the boletus mushrooms. Oh, and can you chop them for me? I'm more of a mage than a laborer, you understand... then bring me the boletus flakes.\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Hmm, traga-me alguns cogumelos boletos. Ah, e você pode cortá-los para mim? Sou mais um mago do que um trabalhador, você entende... então traga-me os flocos de boleto.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Look around for some bottles of Errrgorabog. The moistening cream? Almost everyone down here uses it, so I'm sure you can find some easily enough. I need a bunch of it.\"": "Chirrra, em Serbule Hills, Ranalon Den, disse: \"Procure alguns frascos de Errrgorabog. O creme umedecedor? Quase todo mundo aqui usa, então tenho certeza de que você encontrará alguns com bastante facilidade. Preciso de um monte dele.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Some of the most talented stone-shapers in the whole den are back working with the leglings today. Strike now! The mage supervisors are deep in the legling wing. Go past the legling gardeners, then keep right at the fork.\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Alguns dos modeladores de pedra mais talentosos de toda a toca estão de volta a trabalhar com os leglings hoje. Ataque agora! Os supervisores magos estão bem na ala dos leglings. Passe pelos jardineiros leglings e mantenha-se à direita na bifurcação.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Steal lungfish from the pools throughout the den. I have a scheme in mind for them!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Roube peixes pulmonados das piscinas espalhadas pela toca. Tenho um plano em mente para eles!\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Take out the scray resting in pools around the den. Those scray are precious to our front-line assault against the goblins! You can find them in any pool in the den... oh, except the pools in the legling area, I suppose.\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Tire os scray que descansam nas piscinas ao redor da toca. Esses scray são preciosos para nosso ataque na linha de frente contra os goblins! Você pode encontrá-los em qualquer piscina da toca... ah, exceto as piscinas na área de legling, suponho.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"The least-competent farmers are sent topside to farm the lakes up there, but farmers who can cast a few spells are kept down here in safety. They're a crucial part of the den's food supply. Which means they're precious... which means you should kill them! Go!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Os agricultores menos competentes são enviados para a superfície para cultivar os lagos lá em cima, mas os agricultores que conseguem lançar alguns feitiços são mantidos aqui em segurança. Eles são uma parte crucial do suprimento de comida da toca. O que significa que eles são preciosos... o que significa que você deve matá-los! Vá!\""
"Chirrra in the Serbule Hills Ranalon Den said, \"There's food plants everywhere in here -- look for some watercress, and bring it to me. I need a lot of it; I have an idea.\"": "Chirrra, em Serbule Hills, Ranalon Den, disse: \"Há plantas alimentícias por toda parte aqui - procure um pouco de agrião e traga-o para mim. Preciso de muito; tenho uma ideia.\""
"Chirrra in the Serbule Hills Ranalon Den said, \"Why don't you assassinate the ranalon that are off duty? They'll be in the lounge and resting areas. And they definitely won't be expecting you!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Por que você não assassina os ranalon que estão de folga? Eles estarão nas áreas de estar e de descanso. E definitivamente não estarão esperando por você!\""
"Chirrra in the Serbule Hills Ranalon Den said, \"You need to focus on the adults that oversee the leglings! Strike them down to weaken the den. Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. A few adults are there. Strike them down!\"": "Chirrra em Serbule Hills Ranalon Den disse: \"Você precisa se concentrar nos adultos que supervisionam os leglings! Derrube-os para enfraquecer a toca. Vá para a área de treinamento de legling. Passe pela área de prática de jardinagem. Quando o caminho se bifurcar, vá para a esquerda para encontrar os clubbers. Alguns adultos estão lá. Derrube-os! \""
