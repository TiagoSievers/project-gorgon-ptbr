"Gleanfeckle in Statehelm said, \"Hi, %PLAYER_NAME%, I wanted to report back about my sleep habits. I've got the infestation cleared and the sound and odor issues under control! But it's slightly too chilly. The standard-issued blanket is too thin. I need a replacement!\"": "Gleanfeckle em Statehelm disse: \"Olá, %PLAYER_NAME%, gostaria de relatar sobre meus hábitos de sono. Resolvi a infestação e os problemas de som e odor sob controle! Mas está um pouco frio demais. O cobertor padrão é muito fino. Preciso de um substituto!\""
"Gleanfeckle in Statehelm said, \"I'm still geting used to having to sleep every day. The giant tree is making that hard, too, because the other fae are not quiet at night!

I've been using a magical dampening sphere to protect my ears, but the spell gives me a headache. Electra told me I should just get the local mortal equivalent. Do you happen to have any of this wax?\"": "Gleanfeckle em Statehelm disse: “Ainda estou me acostumando a ter que dormir todos os dias. A árvore gigante também está dificultando isso, porque as outras fadas não ficam quietas à noite!

Tenho usado uma esfera mágica de amortecimento para proteger meus ouvidos, mas o feitiço me dá dor de cabeça. Electra me disse que eu deveria conseguir o equivalente mortal local. Por acaso você tem alguma dessa cera?\""
"Gleanfeckle in Statehelm said, \"Oh, hi %PLAYER_NAME%! You got that wax for me, remember? I appreciate it, but turns out the wax was heavily scented, and the scent gives me a headache.

Flitilda studies local fauna and says the odors from these things would cancel out the scent.\"": "Gleanfeckle em Statehelm disse: \"Oh, oi %PLAYER_NAME%! Você comprou aquela cera para mim, lembra? Agradeço, mas descobri que a cera tinha um cheiro forte e me dá dor de cabeça.

Flitilda estuda a fauna local e diz que os odores dessas coisas anulariam o cheiro.\""
"Gleanfeckle in Statehelm said, \"Oh, it's you. The bozo who gave me an infested hexapus arm to sleep on! Well to your credit, all those horrific odors DID cancel out and I was able to get some sleep for a bit, but two days later I was in terrible pain. I visited Steven the healer, who declared that I had Hexapus Ear and cured me. Apparently the tentacle you gave me was covered in eggs, and they got all over everything!

I threw out the hexapus arm but I still keep getting infected with Hexapus Ear every night! It's disgusting! It's... humiliating at this point. Please, you have to help me sanitize my bed area! ... And also get me a tentatkiller arm to replace the odor of the hexapus arm.\"": "Gleanfeckle em Statehelm disse: \"Oh, é você. O idiota que me deu um braço hexapus infestado para dormir! Bem, para seu crédito, todos aqueles odores horríveis se cancelaram e eu consegui dormir um pouco, mas dois dias depois eu estava com uma dor terrível. Visitei Steven, o curandeiro, que declarou que eu tinha orelha hexapus e me curou. Aparentemente, o tentáculo que você me deu estava coberto de ovos, e eles cobriram tudo!

Joguei fora o braço hexapus, mas ainda fico infectado com a orelha hexapus todas as noites! É nojento! É... humilhante neste momento. Por favor, você tem que me ajudar a higienizar a área da minha cama! ... E também me dê um braço matador de tentativas para substituir o odor do braço hexapus."
"Gloria Stonecurl in Kur Mountains said, \"I just need some quality ink to complete the blessing of safety on Ukorga's inn. And I know that human Laura Neth has the ink I need. But she won't sell it to me!

<i>[Gloria takes a deep breath and calms herself.]</i> Can you see if you can buy some ink from her? Or from anywhere, really. I don't care, I just need to get this done!\"": "Gloria Stonecurl nas Montanhas Kur disse: “Só preciso de um pouco de tinta de qualidade para completar a bênção de segurança na pousada de Ukorga. E sei que a humana Laura Neth tem a tinta que preciso.

<i>[Gloria respira fundo e se acalma.]</i> Você pode ver se consegue comprar um pouco de tinta dela? Ou de qualquer lugar, na verdade. Eu não me importo, eu só preciso fazer isso!\""
"Gloria Stonecurl in Kur Mountains said, \"I'd like to engrave a blessing of safety into the door of Ukorga's inn. It'll act as a protective charm. But I need some special items to do it! First, I need lapis gems. They're the favorite gem of Arisetsu. Can you find me some?\"": "Gloria Stonecurl nas Montanhas Kur disse: \"Eu gostaria de gravar uma bênção de segurança na porta da pousada de Ukorga. Ela funcionará como um amuleto de proteção. Mas preciso de alguns itens especiais para fazer isso! Primeiro, preciso de gemas de lápis-lazúli. Elas são a joia favorita de Arisetsu. Você pode me encontrar algumas?\""
"Gloria Stonecurl in Kur Mountains said, \"That blasted human! Laura Neth! She doesn't like me, and she's very mean. And she's a huge fucking racist, just like most humans, and I am <i>so sick</i> of her shit!

<i>[Gloria breathes deeply.]</i> I'm sorry. I can fight a horde of zombies without breaking a sweat, but one bitchy old human who knows how to get under my defenses... anyway, I'm trying to befriend her. I know she needs more sharp cheddar cheese for her biscuits. Do you have any? I'll buy it from you for, say, 600 Councils?\"": "Gloria Stonecurl em Kur Mountains disse: \"Aquela maldita humana! Laura Neth! Ela não gosta de mim e é muito má. E ela é uma grande racista, assim como a maioria dos humanos, e estou tão farto de suas merdas!

<i>[Gloria respira profundamente.]</i> Sinto muito. Posso lutar contra uma horda de zumbis sem suar a camisa, mas uma humana velha e mal-intencionada que sabe como escapar de minhas defesas... de qualquer forma, estou tentando fazer amizade com ela. Eu sei que ela precisa de mais queijo cheddar picante para seus biscoitos. Você tem algum? Vou comprá-lo de você por, digamos, 600 Conselhos?”"
"Glortok in the Rahu Sewers said, \"Blast it all, how can you have killed hundreds of the enemy, and yet the path home is still full of the creeps?!

I bet that they're at their breaking point. Just go and kill another hundred of 'em. Doesn't matter what kind: living or dead, just kill ratkin!\"": "Glortok nos Esgotos de Rahu disse: “Droga, como você pode ter matado centenas de inimigos e ainda assim o caminho para casa ainda está cheio de arrepios?!

Aposto que eles estão no limite. Basta ir e matar mais cem deles. Não importa de que tipo: vivo ou morto, basta matar ratkin!\""
"Glortok in the Rahu Sewers said, \"Go to the caves and destroy the living ratkin miners. With only undead miners left, their necromancers will be overwhelmed, and we can strike!\"": "Glortok nos esgotos de Rahu disse: \"Vá para as cavernas e destrua os mineiros ratkin vivos. Restando apenas os mineiros mortos-vivos, seus necromantes serão derrotados e poderemos atacar!\""
"Glortok in the Rahu Sewers said, \"I don't understand why those trees are down here. And I hate that! The ratkin stay away from there, as if they know some secret. I hate that, too! Kill the trees!\"": "Glortok, nos esgotos de Rahu, disse: \"Não entendo por que essas árvores estão aqui embaixo. E eu odeio isso! Os ratkin ficam longe de lá, como se soubessem de algum segredo. Eu também odeio isso! Mate as árvores!\""
"Glortok in the Rahu Sewers said, \"I give up. I'm out of ideas.

Well we can't have you just staying around here, can we? You should go kill a thousand more ratkin. Just keep killing until you die. Or until a thousand ratkin are dead! It's a win-win! For me, I mean.

What? Of course I'll make it worthwhile, buddy: if you kill a thousand ratkin I'll give you 10 pieces of xedrite. Totally worth your time, right?\"": "Glortok, nos esgotos de Rahu, disse: \"Desisto. Estou sem ideias.

Bem, não podemos deixar você ficar por aqui, podemos? Você deveria matar mais mil ratkins. Continue matando até morrer. Ou até que mil ratkin morram! É uma situação em que todos ganham! Para mim, quero dizer.

O quê? Claro que farei valer a pena, amigo: se você matar mil ratkin eu te dou 10 pedaços de xedrita. Vale totalmente o seu tempo, certo?\""
"Glortok in the Rahu Sewers said, \"I thought goblinkind eradicated the wily cave hippo years ago, but they've been hiding here! No doubt the ratkin are breeding them in a scheme to flood our waterways. Destroy the wily water-beasts before they fill our waterways and rob good, kind-hearted goblins of crucial custom!\"": "Glortok, nos Esgotos de Rahu, disse: \"Pensei que os goblinkind tivessem erradicado o astuto hipopótamo das cavernas anos atrás, mas eles estão se escondendo aqui! Sem dúvida, os ratkin os estão criando em um esquema para inundar nossos cursos de água. Destrua as astutas feras aquáticas antes que elas encham nossos cursos de água e roubem dos goblins bons e de bom coração costumes cruciais!\""
"Glortok in the Rahu Sewers said, \"Nevermind subtlety. We want them to stop mining, so just destroy their undead miners!\"": "Glortok, nos Esgotos de Rahu, disse: \"Esqueça a sutileza. Queremos que eles parem de minerar, então apenas destruam seus mineiros mortos-vivos!\""
"Glortok in the Rahu Sewers said, \"Strike their means of production! Kill the ratkin fishermen! They will surely starve!\"": "Glortok, nos esgotos de Rahu, disse: \"Ataque seus meios de produção! Mate os pescadores ratkin! Eles certamente morrerão de fome!\""
"Glortok in the Rahu Sewers said, \"The enemy lounges and relaxes as if they were not at war! Fix it! By murdering every lazy ratkin you see!\"": "Glortok nos esgotos de Rahu disse: \"O inimigo descansa e relaxa como se não estivesse em guerra! Conserte isso! Assassinando todos os ratkin preguiçosos que você vê!\""
"Glortok in the Rahu Sewers said, \"The ratkin just keep... surviving! How is it possible?! Perhaps we need to broaden our approach. The sewer rat may seem harmless... but it's wily and dangerous and probably somehow the secret crux of our problem!\"": "Glortok, nos esgotos de Rahu, disse: \"Os ratkin continuam... sobrevivendo! Como isso é possível?! Talvez precisemos ampliar nossa abordagem. O rato de esgoto pode parecer inofensivo... mas é astuto e perigoso e provavelmente, de alguma forma, o cerne secreto do nosso problema!\""
"Glortok in the Rahu Sewers said, \"The ratkin seem all too comfortable... probably because of those soldiers who wander around protecting them. Kill the soldiers, and surely their morale will falter!\"": "Glortok nos esgotos de Rahu disse: \"Os ratkin parecem muito confortáveis... provavelmente por causa daqueles soldados que vagam por aí protegendo-os. Mate os soldados e certamente seu moral irá vacilar!\""
"Glortok in the Rahu Sewers said, \"The skeletal ratkin mages with electricity powers... those are very annoying! Kill them!\"": "Glortok nos Esgotos Rahu disse: \"Os magos ratkin esqueléticos com poderes de eletricidade... esses são muito irritantes! Mate-os!\""
"Glortok in the Rahu Sewers said, \"The weak point in the enemy's production is the Ratkin Necro-Shamans who control undead miners. With those shamans dead, the undead will revolt! Maybe.\"": "Glortok nos Esgotos Rahu disse: \"O ponto fraco na produção do inimigo são os Necro-Xamãs Ratkin que controlam os mineiros mortos-vivos. Com esses xamãs mortos, os mortos-vivos se revoltarão! Talvez.\""
"Glortok in the Rahu Sewers said, \"There are way too many snakes in this place. I bet they have some nefarious purpose. Let's outsmart the ratkin by killing these snakes before their secret scheme comes to fruition!\"": "Glortok, nos esgotos de Rahu, disse: \"Há muitas cobras neste lugar. Aposto que elas têm algum propósito nefasto. Vamos ser mais espertos que os ratos matando essas cobras antes que seu esquema secreto se concretize!\""
"Glortok in the Rahu Sewers said, \"These ratkin are gorging themselves on snail meat! Unacceptable! Desnailitize them immediately!\"": "Glortok, nos esgotos de Rahu, disse: \"Esses ratkin estão se empanturrando de carne de caracol! Inaceitável! Desnailize-os imediatamente!\""
"Glortok in the Rahu Sewers said, \"Those creepy red-eyed rats must be a source of their power. Destroy them! No mercy!\"": "Glortok nos Esgotos Rahu disse: \"Esses ratos assustadores de olhos vermelhos devem ser uma fonte de seu poder. Destrua-os! Sem piedade!\""
"Glortok in the Rahu Sewers said, \"We've lost the element of surprise! Time to reclaim that surprise by killing their necromancers when they're resting. Fools! Hahahaha!\"": "Glortok nos Esgotos Rahu disse: \"Perdemos o elemento surpresa! É hora de recuperar essa surpresa matando seus necromantes quando eles estão descansando. Tolos! Hahahaha!\""
"Gloucester Cheese": "Queijo Gloucester"
"GloucesterCheese": "Queijo Gloucester"
"GlowyYellowCrystal": "Cristal Amarelo Brilhante"
"GluedCoins": "Moedas coladas"
"Gnasher": "Gnador"
"Gnasher Invasion": "Invasão Gnasher"
"GnasherInvasion": "Invasão Gnasher"
"Go and find them for me. Try not to alert Lomas to your presence -- you shouldn't need to see him at all. If you do encounter Lomas, tell him that I'll get him the money soon.\\\"\": \"Truxartis em Vidaria disse": "“Preciso despertar novamente meus poderes de sangue. Se ao menos eu não tivesse matado o Primeiro Thrall anos atrás e escondido partes de seu corpo sob uma torre em ruínas nas Montanhas Kur!"
"Go and kill some animals! Pigs, deer, sheep, whatever. But don't do it in town, you'll upset everybody. And don't kill monsters -- just animals! I don't want you getting hurt on my behalf.": "Vá e mate alguns animais! Porcos, veados, ovelhas, o que for. Mas não faça isso na cidade, você vai incomodar todo mundo. E não mate monstros – apenas animais! Não quero que você se machuque por minha causa."
"Go and pluck the wings from shimmerwings. Listen to their final dying words and then you will know what I know.": "Vá e arranque as asas das asas brilhantes. Ouça suas últimas palavras e então você saberá o que eu sei."
"Go beyond the dead-end to find the boots": "Vá além do beco sem saída para encontrar as botas"
"Go catch a whole bunch of 'em! Here's a net.\": \"Uma árvore Ri-Shin deve refletir seu povo. Hah, eu sei": "as borboletas não ficariam lindas?! Representacional, mais ou menos. E também as fadas os amam. Mas há um problema: eles precisam estar vivos. Borboletas mortas perturbariam muitos Fae aqui."
"Go catch a whole bunch of 'em! Here's a net.\\\"\": \"Backfat no Reino Fae disse": "“Uma árvore Ri-Shin tem que refletir seu povo. Hah, eu sei: as borboletas não ficariam ótimas?!"
"Go chop lumber. I don't know why I think that will entertain me, but I'm willing to try anything at this point.": "Vá cortar madeira. Não sei por que acho que isso vai me divertir, mas estou disposto a tentar qualquer coisa neste momento."
"Go dig up some mushrooms. Tell me if you hear any weird whispering in your head when you do it.": "Vá desenterrar alguns cogumelos. Diga-me se você ouvir algum sussurro estranho em sua cabeça ao fazer isso."
"Go get yourself coated, then come see me. I'll use that goo for hive maintenance.\\\"\": \"Crelpin, no Reino Fae, disse": "“Você pode fazer coisas incríveis com a gosma de um puff de fada maduro. Geralmente eles explodem violentamente demais para serem úteis, mas se você estourar um que esteja perfeitamente maduro, você não se machucará!"
"Go grab a lute -- I think Marna sells some. And play! Don't bother playing near me, though -- I can't stand beginner lute music. I just want you to get some practice time in so that you'll be more entertaining later.": "Vá pegar um alaúde – acho que Marna vende alguns. E jogue! Mas não se preocupe em tocar perto de mim - não suporto música de alaúde para iniciantes. Só quero que você pratique um pouco para se divertir mais depois."
"Go in and burn those eggs. And I mean that literally": "you should be prepared to burn them! They're very difficult to damage with weapons, and they regenerate health like crazy unless they're on fire. If you can't manage any other type of fire, I noticed the fairy has some Trollbane Oil for sale in the 'commissary'. That will at least keep them from regenerating! Good luck.\": \"Ele designou você de novo? Bom. Tenho más notícias e notícias piores. A má notícia é que as aranhas que você encontrou são definitivamente aranhas tornado, e a infestação já é muito profunda. Não há esperança de realmente nos livrarmos deles, mas talvez possamos mantê-los confinados a uma pequena parte do deserto."
"Go into the lake and catch some fish with your bare hands! That's sure to entertain me briefly!": "Entre no lago e pegue alguns peixes com as próprias mãos! Isso com certeza vai me entreter brevemente!"
"Go milk the cows! All five of them! ... what do you mean there's only four cows? I saw a fifth one wander by recently. A talking cow. Get her milk, too!": "Vá ordenhar as vacas! Todos os cinco! ... como assim há apenas quatro vacas? Eu vi um quinto vagando recentemente. Uma vaca falante. Pegue o leite dela também!"
"Go on, get some target practice in.": "Vá em frente, pratique tiro ao alvo."
"Go over to the Tapestry Inn and ask Durstin what beer he wants to order for next month.": "Vá até o Tapestry Inn e pergunte a Durstin que cerveja ele quer pedir para o próximo mês."
"Go see if he'll give you some harvest spices.\\\"\": \"Ricatu em Povus disse": "\\\"Meu amigo Kelim em Amulna diz que tem alguns temperos que podem ajudar esta carne falsa a ficar mais parecida com peru. Acho que ele está se esforçando um pouco demais para me convencer deles, sabe? Mas pode funcionar."
"Go talk to him -- he's already arrived at the casino (big shocker). He loves dice games, so look for him there.\\\"\": \"Brandon Mellus, do Red Wing Casino, disse": "\\\"Acho que você precisa falar com Chaf também. O problema é que Chaf está perfeitamente bem. Zhia Lian só deu a ele uma única moeda quando ele desejou dinheiro, mas isso não é um resultado ruim quando você pede um favor a Zhia Lian! Mesmo assim, ele nunca parou de reclamar."
"Go there and kill these creatures until you can get a good, undamaged phoenix feather. I can use the feather's regenerative abilities to help accelerate the healing process. Bring the feather back to me as soon as you can! I need it as fresh as possible.\\\"\": \"Irkima, no Red Wing Casino, disse": "\\\"Tenho um pombo com a asa quebrada e preciso de alguns suprimentos para tentar curá-lo. Existe um reino especial onde vivem as Fênix que é ocupado pelos Fae."
"Go to Eltibule": "Vá para Eltibule"
"Go to the caves and destroy the living ratkin miners. With only undead miners left, their necromancers will be overwhelmed, and we can strike!": "Vá para as cavernas e destrua os mineiros ratkin vivos. Com apenas mineiros mortos-vivos sobrando, seus necromantes ficarão sobrecarregados e poderemos atacar!"
"Go whittle me something. A table or something, anything! Any old carpentry item will do. Jara's good with wood -- if you know what I mean -- and she lives nearby, in the farm outside of town. Maybe you could get her to teach you.": "Vá me cortar alguma coisa. Uma mesa ou algo assim, qualquer coisa! Qualquer item de carpintaria antigo serve. Jara é boa com madeira - se é que você me entende - e mora perto, na fazenda fora da cidade. Talvez você pudesse fazer com que ela lhe ensinasse."
"Go! I shall reward you for it!\\\"\": \"Merriana em Serbule Hills disse": "\\\"Meu novo aliado, o humano Arif, me deu duas excelentes pistas sobre onde encontrar a esfera. Sei que você tem dúvidas sobre esta esfera, mas não me atrevo a falar sobre ela. Basta encontrá-la e devolvê-la para mim!"
"Go, bloodling. Find me the usual tools for...such a task.\\\"\": \"Truxartis em Vidaria disse": "\\\"As notas de Khyrulek são preciosas. Devemos decifrar o... código."
"Gobbledygook": "gobbledygook"
"Goblin": "Duende"
"Goblin Ale": "Cerveja Goblin"
"Goblin Avenger: Accursed Hippos": "Goblin Vingador: Hipopótamos Amaldiçoados"
"Goblin Avenger: Meat Snails": "Goblin Vingador: Caracóis de Carne"
"Goblin Avenger: Necro Rats": "Vingador Goblin: Ratos Necro"
"Goblin Avenger: Off-Duty Ratkin Miners": "Vingador Goblin: Mineiros Ratkin fora de serviço"
"Goblin Avenger: Off-Duty Ratkin Shamans": "Vingador Goblin: Xamãs Ratkin fora de serviço"
"Goblin Avenger: Ratkin Fishtenders": "Vingador Goblin: Pescadores Ratkin"
"Goblin Avenger: Ratkin Miners": "Vingador Goblin: Mineiros Ratkin"
"Goblin Avenger: Ratkin Necro-Shamans": "Vingador Goblin: Ratkin Necro-Xamãs"
"Goblin Avenger: Ratkin Soldiers": "Vingador Goblin: Soldados Ratkin"
"Goblin Avenger: Ratkin!": "Vingador Goblin: Ratkin!"
"Goblin Avenger: Ratkin!!!": "Vingador Goblin: Ratkin!!!"
"Goblin Avenger: Sewer Rats": "Vingador Goblin: Ratos de Esgoto"
"Goblin Avenger: Treants": "Vingador Goblin: Treants"
"Goblin Avenger: Undying Ratkin Blasters": "Goblin Vingador: Blasters Ratkin Imortais"
"Goblin Avenger: Undying Ratkin Miners": "Goblin Vingador: Mineiros Ratkin Imortais"
"Goblin Avenger: Vipers": "Vingador Goblin: Víboras"
"Goblin Dungeon": "Masmorra dos Duendes"
"Goblin Genocide": "Genocídio Goblin"
"Goblin Pasties": "Pastéis Goblin"
"Goblin slavers killed my wife and child, and I've only recently escaped slavery myself. I've come for revenge against the chiefs most responsible. And I've tracked them to this area! But it turns out I'm not much of an assassin. Are you?

There are three goblins that need to die. The first's name is Fugorg, and he lives in the caves around here. But I hear he's on a pilgrimage to that weird statue out in the wilderness. Maybe you can find him there and cut his head off?": "Os traficantes de escravos goblins mataram minha esposa e meu filho, e só recentemente eu escapei da escravidão. Vim em busca de vingança contra os chefes mais responsáveis. E eu os rastreei até esta área! Mas acontece que não sou um grande assassino. Você é?

Existem três goblins que precisam morrer. O nome do primeiro é Fugorg e ele mora nas cavernas por aqui. Mas ouvi dizer que ele está em peregrinação até aquela estátua estranha no deserto. Talvez você possa encontrá-lo lá e cortar sua cabeça?"
"GoblinBreastplate": "Peitoral Goblin"
"GoblinCallingCard": "Cartão de Chamada Goblin"
"Goblinese": "Goblinês"
"GoblinGenocide": "GoblinGenocídio"
"GoblinPasties": "Pastéis Goblin"
"Goblins are quite horrid little creatures, but they often decorate their calling-cards quite elegantly. I think if we had a number of calling-cards we could use them as makeshift tree decorations.": "Goblins são criaturinhas horríveis, mas muitas vezes decoram seus cartões de visita com bastante elegância. Acho que se tivéssemos vários cartões telefônicos poderíamos usá-los como decorações improvisadas para árvores."
"Goblins are weak and deserve destruction. Make it happen.": "Goblins são fracos e merecem destruição. Faça acontecer."
"GoblinsArmpitRoaches": "GoblinsAxilasBaratas"
"GoblinSkull": "Crânio de Goblin"
"GoblinSlippers": "Chinelos Goblin"
"Gods, I am so sick of making barrels! It's so hard! And so stupid! <i>Sigh...</i> and I just ran out of quarter hoops. Great. Just great. That means I have to talk that idiot Kalaba into making me some more.": "Deuses, estou farto de fazer barris! É tão difícil! E tão estúpido! <i>Suspiro...</i> e acabei de ficar sem argolas. Ótimo. Simplesmente ótimo. Isso significa que tenho que convencer aquele idiota do Kalaba a me fazer mais."
"Gold": "Ouro"
"Gold Nugget": "Pepita de ouro"
"Gold Ore": "Minério de ouro"
"Gold Ore For Poe": "Minério de ouro para Poe"
"GoldDragonStatue0": "Estátua do Dragão Dourado0"
"GoldDragonStatue1": "Estátua do Dragão Dourado1"
"GoldDragonStatue2": "Estátua do Dragão Dourado2"
"GoldDragonStatue3": "Estátua do Dragão Dourado3"
"GoldDragonStatue4": "Estátua do Dragão Dourado4"
"GoldenWrit_Pending": "GoldenWrit_Pendente"
"GoldGryphonStatue1": "OuroGryphonStatue1"
"GoldGryphonStatue2": "OuroGryphonStatue2"
"GoldGryphonStatue3": "Estátua DouradaGrifão3"
"GoldGryphonStatue4": "Estátua DouradaGrifão4"
"GoldOreForPoe": "OuroOreForPoe"
"GolemClay": "GolemArgila"
"Good Armor Stakes": "Boas estacas de armadura"
"Good job slaughtering the kitties! No, I'm just joking. You can slaughter anything you want. Thanks!

Now since you helped me out, I'll show you a little trick or two...": "Bom trabalho matando os gatinhos! Não, só estou brincando. Você pode abater o que quiser. Obrigado!

Agora, já que você me ajudou, vou mostrar alguns truques ou dois..."
"Good job!": "Bom trabalho!"
"Good job! Here's the dye recipe as promised and a little something extra!
<i>[You can find the recipe for this in your crafting recipes under Dye Making]</i>": "Bom trabalho! Aqui está a receita da tintura conforme prometido e mais uma coisinha!
<i>[Você pode encontrar a receita para isso em suas receitas de artesanato em Fabricação de Tinturas]</i>"
"Good job! Here's your reward.": "Bom trabalho! Aqui está sua recompensa."
"Good job! You seem all talked out, so I'll just shut up and give you a reward.": "Bom trabalho! Você parece totalmente falado, então vou calar a boca e lhe dar uma recompensa."
"Good job. Any little bit helps. Of course, the only way to really solve the problem is to go through the rift and kill them... that would have to kill 'em permanently, right?

Anyway, I bet ya used a bunch of arrows getting that done, huh? I have some spares for ya.": "Bom trabalho. Qualquer pouquinho ajuda. Claro, a única maneira de realmente resolver o problema é passar pela fenda e matá-los... isso teria que matá-los permanentemente, certo?

De qualquer forma, aposto que você usou um monte de flechas para fazer isso, hein? Eu tenho algumas peças sobressalentes para você."
"Good job. I was thinking about how to fix Kajich's creation for him. Maybe if these lungs had a giant evil ghost skull floating on top? Hmm.... that's too much like Harukita's style. I can do better. Anyway, there's one more pair of lungs for you to kill!": "Bom trabalho. Eu estava pensando em como consertar a criação de Kajich para ele. Talvez se esses pulmões tivessem um crânio gigante de um fantasma maligno flutuando em cima? Hmm... isso é muito parecido com o estilo de Harukita. Eu posso fazer melhor. Enfim, tem mais um par de pulmões para você matar!"
"Good job. No, don't tell me about the freakish monsters you had to kill, because I don't care, and if you tell me I'd be obliged to care. So let's just leave it at: here's your pay.": "Bom trabalho. Não, não me conte sobre os monstros bizarros que você teve que matar, porque eu não me importo, e se você me contar eu serei obrigado a me importar. Então vamos deixar assim: aqui está o seu pagamento."
"Good job. That's some of those nasty creatures run out of our world. Even if they're immortal, at least they aren't here!": "Bom trabalho. São algumas dessas criaturas desagradáveis ​​que fugiram do nosso mundo. Mesmo que sejam imortais, pelo menos não estão aqui!"
"Good job. You run into any trouble? A flooded basement, eh? Well that's interesting.

You fought a what? A hip o? I don't know what that is. But it's dead, so problem solved! Here's your tickets.": "Bom trabalho. Você teve algum problema? Um porão inundado, hein? Bem, isso é interessante.

Você lutou contra o quê? Um quadril? Eu não sei o que é isso. Mas está morto, então problema resolvido! Aqui estão seus ingressos."
"Good Metal Slabs": "Boas lajes de metal"
"Good on you. You're using your skills for good! Not everyone can say that.": "Bom para você. Você está usando suas habilidades para o bem! Nem todo mundo pode dizer isso."
"Good riddance, I say. I have a theory about those Doom Wasps south of here: I think they're the offspring of a wasp and a bee! Raina says that's impossible, the queen bee would just get killed by the wasps, not lay their eggs. But maybe it goes the other way! Hmm? Bees cozying up to a wasp queen? Interesting theory, right?

Anyway, just another reason to make sure wasps are kept far from here.": "Boa viagem, eu digo. Tenho uma teoria sobre aquelas Vespas da Perdição ao sul daqui: acho que elas são descendentes de uma vespa e de uma abelha! Raina diz que isso é impossível, a abelha rainha simplesmente seria morta pelas vespas e não botaria seus ovos. Mas talvez aconteça o contrário! Hum? Abelhas se aproximando de uma rainha vespa? Teoria interessante, certo?

De qualquer forma, é apenas mais um motivo para garantir que as vespas sejam mantidas longe daqui."
"Good Skinning Knives": "Boas facas para esfolar"
"Good Throwing Knives": "Boas facas de arremesso"
"Good work there. And it's well time that I throw all of this rotten salami away. I'd been keeping it just in case it gained sentience, but it's not meant to be.

But don't you worry. I have new schemes to get rich that'll be way easier than giving unlife to cured meat! Will ya help me? You've got an eye for adventure! Or whatever. Just help.

C'mon.": "Bom trabalho aí. E já é hora de jogar fora todo esse salame podre. Eu o estava guardando para o caso de ganhar consciência, mas não era para ser assim.

Mas não se preocupe. Tenho novos esquemas para ficar rico que serão muito mais fáceis do que dar não-vida à carne curada! Você vai me ajudar? Você tem olho para aventura! Ou seja o que for. Apenas ajude.

Vamos."
"Good work! Here's some Councils. Sorry, I don't have any xogrite. I could pay you in xedrite, but wouldn't you rather have these shiny coins? Of course you would!": "Bom trabalho! Aqui estão alguns conselhos. Desculpe, não tenho nenhum xogrite. Eu poderia pagar em xedrite, mas você não preferiria essas moedas brilhantes? Claro que você faria isso!"
"Good work! Okay, the diamonds fit in pretty easily. Now this powder is a little trickier... you might want to step back. And protect your eyes... here we go! ...

Hey, it worked! IT WORKED! HA! We got the main crystal working! I knew we could do it!

I'm actually pretty surprised that this worked... and that nothing exploded. But don't tell Milton that, okay?": "Bom trabalho! Ok, os diamantes cabem facilmente. Agora esse pó é um pouco mais complicado... você pode querer dar um passo atrás. E proteja seus olhos... vamos lá! ...

Ei, funcionou! FUNCIONOU! AH! Conseguimos que o cristal principal funcionasse! Eu sabia que conseguiríamos!

Na verdade, estou muito surpreso que isso tenha funcionado... e que nada tenha explodido. Mas não conte isso ao Milton, ok?"
"Good work! While the topside farmers grow the bulk of our food, the farm-casters are responsible for the delicate plants that make food delicious. Now the den will have to survive on bland, boring food... they'll be demoralized for sure! Here's your reward.": "Bom trabalho! Enquanto os agricultores da superfície cultivam a maior parte dos nossos alimentos, os produtores agrícolas são responsáveis ​​pelas plantas delicadas que tornam a comida deliciosa. Agora a toca terá que sobreviver com comida sem graça e chata... eles ficarão desmoralizados com certeza! Aqui está sua recompensa."
"Good work, my druids. The kraken incursion seems to be over. Just clean up any loose ends and then return to your peaceful lives with Dreva's blessing.": "Bom trabalho, meus druidas. A incursão dos krakens parece ter acabado. Apenas limpem todas as pontas soltas e depois retornem às suas vidas pacíficas com a bênção de Dreva."
"Good work. And a piece of advice: the trick to being vociferous is to pick your battles. If you have to be vociferous more than once a day, you should reevaluate your priorities!": "Bom trabalho. E um conselho: o truque para ser vociferante é escolher suas batalhas. Se você precisa ser vociferante mais de uma vez por dia, reavalie suas prioridades!"
"Good work. And yes, I know, trying to help the bloody goblins is terrible... but the enemy of my enemy is an ally. Let's hope the goblins make a move soon.": "Bom trabalho. E sim, eu sei, tentar ajudar os malditos goblins é terrível... mas o inimigo do meu inimigo é um aliado. Esperemos que os goblins ajam logo."
"Good work. Any attempt to alter the balance of nature must be dealt with harshly. And so you have!

Be ready for further incidents from the ranalon. They worship Enoyos, the god of oceans and water, and Enoyos has vowed to flood the world and drown all land-dwellers. I fear he may be mobilizing his minions to bring about this scheme.

But that is a problem for another day. For now, relax and enjoy the fruits of nature!": "Bom trabalho. Qualquer tentativa de alterar o equilíbrio da natureza deve ser tratada com severidade. E então você tem!

Esteja pronto para mais incidentes do Ranalon. Eles adoram Enoyos, o deus dos oceanos e da água, e Enoys jurou inundar o mundo e afogar todos os habitantes da terra. Receio que ele possa estar a mobilizar os seus asseclas para concretizar este esquema.

Mas isso é um problema para outro dia. Por enquanto, relaxe e aproveite os frutos da natureza!"
"Good work. Here's a bit of money as a thank-you. And if you decide to go back in there and destroy more mummies, bring me their wrappings. We have a priesthood back in Aufghel that can consecrate the wrappings... we think it might help release the mummys' souls from their purgatory.

<i>[A new Barter option has been added.]</i>": "Bom trabalho. Aqui está um pouco de dinheiro como agradecimento. E se você decidir voltar lá e destruir mais múmias, traga-me os embrulhos. Temos um sacerdócio em Aufghel que pode consagrar os embrulhos... pensamos que isso pode ajudar a libertar as almas das múmias do seu purgatório.

<i>[Uma nova opção de troca foi adicionada.]</i>"
"Good work. Here, take these pants. They don't stink like your current ones do.": "Bom trabalho. Aqui, pegue essas calças. Eles não cheiram mal como os atuais."
"Good work. Here, take this breastplate. It's inferior to mine, but I'm sure it's better than... whatever that thing is that you're wearing.": "Bom trabalho. Aqui, pegue este peitoral. É inferior ao meu, mas tenho certeza que é melhor do que... seja lá o que for que você está vestindo."
"Good work. Next time you're vacillating between two good choices, just pick the choice on the left. And if you think 'Ew, no, the one on the left is terrible!', then you've solved the problem, because in your heart you already picked the one on the right. Free life advice for ya there.": "Bom trabalho. Da próxima vez que você estiver hesitando entre duas boas escolhas, basta escolher a opção à esquerda. E se você pensa 'Eca, não, o da esquerda é péssimo!', então você resolveu o problema, porque no seu coração você já escolheu o da direita. Conselhos de vida gratuitos para você."
"Good work. This is... stickier than I expected. It's actually... pretty vile. I'll go foist it on the Sand Seer.": "Bom trabalho. Isso é... mais pegajoso do que eu esperava. Na verdade, é... muito vil. Vou impingi-lo ao Sand Seer."
"Good work. We need to keep up the appearance of being a safe city. We definitely DON'T want Sereel or even lady Irasce deciding to \"just fix it with a spell.\" So the safer we can keep the city, the better!": "Bom trabalho. Precisamos manter a aparência de ser uma cidade segura. Definitivamente NÃO queremos que Sereel ou mesmo Lady Irasce decidam \"apenas consertar isso com um feitiço\". Portanto, quanto mais seguro pudermos manter a cidade, melhor!"
"Good! Now, did you use the word maladaptively, or productively? ... See what I did there? It doesn't look so weird and out of place anymore, does it?": "Bom! Agora, você usou a palavra de forma inadequada ou produtiva? ... Viu o que eu fiz lá? Não parece mais tão estranho e deslocado, não é?"
"Good! Perfect! We're a well-oiled team! I know you did that just to make the town safer, but let me give you a bit of reward money anyway, as a token of thanks.": "Bom! Perfeito! Somos uma equipe bem oleada! Eu sei que você fez isso apenas para tornar a cidade mais segura, mas deixe-me lhe dar uma recompensa em dinheiro de qualquer maneira, como forma de agradecimento."
"Good! See, doesn't working with your hands cure boredom? Not for me, obviously. But for you! I care about you. Not really. Here's some money.": "Bom! Veja, trabalhar com as mãos não cura o tédio? Não para mim, obviamente. Mas para você! Eu me importo com você. Na verdade. Aqui está algum dinheiro."
"Good! These are indeed onions. Here is your money!": "Bom! Na verdade são cebolas. Aqui está o seu dinheiro!"
"Good! Those gardeners were almost ready to take their job to the surface. There are more gardeners, but now the den will have to spend more resources protecting them, keeping them safe. It's a step. Here: this is your reward.": "Bom! Esses jardineiros estavam quase prontos para levar seu trabalho à tona. Há mais jardineiros, mas agora a toca terá que gastar mais recursos protegendo-os, mantendo-os seguros. É um passo. Aqui: esta é a sua recompensa."
"Good! With that out of the way, your poor beleaguered brain has one less thing to worry about now.": "Bom! Com isso resolvido, seu pobre cérebro sitiado tem uma coisa a menos com que se preocupar agora."
"Good! You are efficient. It seems you have orc blood in you.": "Bom! Você é eficiente. Parece que você tem sangue de orc em você."
"Good! You're faking enthusiasm a bit better now! Keep it up.": "Bom! Você está fingindo entusiasmo um pouco melhor agora! Mantem."
"Good! Your vocabulary is growing! ... I'd use 'obsequious' in a sentence here, but half of knowing vocabulary is knowing when <i>not</i> to force it into a conversation.": "Bom! Seu vocabulário está crescendo! ... Eu usaria 'obsequioso' em uma frase aqui, mas metade do conhecimento do vocabulário é saber quando <i>não</i> forçá-lo a uma conversa."
"Good, good. Here, I'll reimburse your expenses. Now let's see if we get some better musicians showing up soon!": "Bom, bom. Aqui, reembolsarei suas despesas. Agora vamos ver se temos músicos melhores aparecendo em breve!"
"Good, good. Hmm ... These look pretty normal to me. We'll have to keep an eye on the situation, but right now I don't think we need to take action.": "Bom, bom. Hmm... Isso parece bastante normal para mim. Teremos que ficar de olho na situação, mas neste momento não creio que precisemos agir."
"Good, good. Hmm ... These look pretty normal to me. We'll have to keep an eye on the situation, but right now I don't think we need to take action. ": "Bom, bom. Hmm... Isso parece bastante normal para mim. Teremos que ficar de olho na situação, mas neste momento não creio que precisemos agir."
"Good, good. I intend to augment these with the essence ... oh, nevermind what I'm going to do with them! You wouldn't understand it anyway. But here. Perhaps these will help you to be a less inept fire mage.": "Bom, bom. Pretendo aumentá-los com a essência... ah, deixa pra lá o que vou fazer com eles! Você não entenderia isso de qualquer maneira. Mas aqui. Talvez isso o ajude a ser um mago do fogo menos inepto."
"Good, good. Now you should go meditate with one of the stools! I bet you'll find it very deeply fulfilling. And you'll wish you'd done a better job on the stool, too! That's how we push ourselves to improve.": "Bom, bom. Agora você deve meditar com um dos bancos! Aposto que você achará isso profundamente gratificante. E você também gostaria de ter feito um trabalho melhor no banquinho! É assim que nos esforçamos para melhorar."
"Good, good. Wizards have a bad enough reputation without passersby dying from sheep explosions. Here, maybe this old staff will be of use to you.": "Bom, bom. Os bruxos já têm uma reputação ruim o suficiente para que os transeuntes não morram em explosões de ovelhas. Aqui, talvez este cajado antigo seja útil para você."
"Good, it hasn't gotten too... crusty yet.": "Bom, ainda não ficou muito... crocante."
"Good, the hollow tube is still intact. Oh, no no no, I would never poison anybody! I'm going to use it as a drip-tube for water. For... um, for a project. Yes.

Here, let me show you some calligraphy tips. This trick will really make your writing beautiful!": "Bom, o tubo oco ainda está intacto. Oh, não, não, não, eu nunca envenenaria ninguém! Vou usá-lo como tubo de gotejamento para água. Para... hum, para um projeto. Sim.

Aqui, deixe-me mostrar algumas dicas de caligrafia. Este truque vai realmente deixar sua escrita linda!"
"Good. Good! This will...
suffice. More difficult ingredients are needed...
next.": "Bom. Bom! Isso vai...
basta. São necessários ingredientes mais difíceis...
próximo."
"Good. Good! You're quite a proficient warrior! Here. Perhaps you will have use of this.": "Bom. Bom! Você é um guerreiro bastante proficiente! Aqui. Talvez você possa usar isso."
"Good. Here's the money, but I had better not hear complaints about how I 'incited terror amongst the devout', understand? Let's keep this little skirmish between us.": "Bom. Aqui está o dinheiro, mas é melhor eu não ouvir reclamações sobre como eu 'incitei o terror entre os devotos', entendeu? Vamos manter esse pequeno conflito entre nós."
"Good. Here, take this... yes, and this too. Now here, you can pop this dent out like this. And then some cleaning and polishing... The muscles remember!": "Bom. Aqui, pegue isso... sim, e isso também. Agora aqui, você pode retirar esse amassado assim. E depois algumas limpezas e polimentos... Os músculos lembram!"
"Good. I'll get Laura Neth making the canes immediately. Thank you.": "Bom. Vou pedir para Laura Neth fazer as bengalas imediatamente. Obrigado."
"Good. Now we wait a year and see how many werewolves are born! Damn. Yeah, this was a stupid plan. Nevermind. Take these shoes and let's pretend this never happened.": "Bom. Agora esperamos um ano e vemos quantos lobisomens nascem! Droga. Sim, este foi um plano estúpido. Deixa para lá. Pegue esses sapatos e vamos fingir que isso nunca aconteceu."
"Good. That's all of the ingredients. Now I have some deals to make. I'll complete the ritual when the moon is right. Come visit me later and I'll let you know how it went. You should be proud: you and your friends are lifesavers, literally! Hopefully...": "Bom. Esses são todos os ingredientes. Agora tenho alguns negócios a fazer. Concluirei o ritual quando a lua estiver certa. Venha me visitar mais tarde e contarei como foi. Você deveria estar orgulhoso: você e seus amigos são salva-vidas, literalmente! Esperançosamente..."
"Good. This is good. I'll make a new bow the same way I did as a young elf. I still have some cat gut left, so this is all I should need. You've been a great help!

I wanted you to have this. I made it from the ivory I replaced on my bow. I know it's not much, but if you don't need it, maybe someone who loves ivory would appreciate it.": "Bom. Isso é bom. Farei um novo arco da mesma forma que fiz quando era um jovem elfo. Ainda tenho um pouco de tripa de gato, então isso é tudo que preciso. Você tem sido de grande ajuda!

Eu queria que você tivesse isso. Fiz isso com o marfim que substituí no meu arco. Eu sei que não é muito, mas se você não precisar, talvez alguém que adore marfim aprecie."
"Good. This pyrite will serve.

I will tell you a secret: I once made jewelry. My mother taught me. And I have a necklace stored away that is ugly. So it would be perfect for you! Here. Take it! Wear it proudly!": "Bom. Essa pirita servirá.

Vou te contar um segredo: uma vez fiz joias. Minha mãe me ensinou. E tenho um colar guardado que é feio. Então seria perfeito para você! Aqui. Pegue! Use-o com orgulho!"
"Good. What did you learn from all those loud notes? Write me a short essay. Actually, write that essay and then self-grade it; I'm quite busy.": "Bom. O que você aprendeu com todas aquelas notas altas? Escreva-me um pequeno ensaio. Na verdade, escreva aquela redação e depois avalie-a; Estou bastante ocupado."
"Good. Will use dust for psychedelic drugs. Here.": "Bom. Usará pó para drogas psicodélicas. Aqui."
"Gorvessa hinted strongly that she would like some danablu cheese.": "Gorvessa deu a entender fortemente que gostaria de um pouco de queijo danablu."
"Gorvessa is beautiful, but her cooking is... well, it's adequate. But my refined palate needs something better. I could really go for eel kabobs right now!": "A Gorvessa é linda, mas a sua cozinha é... bem, é adequada. Mas meu paladar refinado precisa de algo melhor. Eu realmente poderia comer espetinhos de enguia agora mesmo!"
"Gorvessa is trying to create panther-themed lingerie and needs a Trophy Panther Skin. Or at least she thinks she does.": "Gorvessa está tentando criar lingerie com tema de pantera e precisa de um Trophy Panther Skin. Ou pelo menos ela pensa que sim."
"Gorvessa's Cheesy Demand": "A demanda cafona de Gorvessa"
"Goshenite": "Goshenita"
"Goshenites": "Goshenitas"
"Got a big ole' mummy-infested deathtrap for ya. Lots of xedrite though! I've already sent someone into this one and she came back empty-handed, sayin' it was too dangerous. So I tell ya what, I'll throw in a little something extra if you can get all three pieces. Just don't die over it!": "Tenho uma grande armadilha mortal infestada de múmias para você. Mas muito xedrite! Já mandei alguém para isso e ela voltou de mãos vazias, dizendo que era muito perigoso. Então vou te dizer uma coisa, vou acrescentar algo extra se você conseguir as três peças. Só não morra por isso!"
"Got another spider-hole for you. No xedrite detected, though, so you're not going in for that. You're going in because the Sand Seer needs more spider legs or something. I'm starting to regret listening to her about this... but she says it might be a huge crisis, so now I can't just tell her to ignore it! Do whatever she needs, and try to be quick about it. We've got xedrite to find!": "Tenho outro buraco de aranha para você. Nenhum xedrite detectado, então você não vai fazer isso. Você está entrando porque o Sand Seer precisa de mais pernas de aranha ou algo assim. Estou começando a me arrepender de ouvi-la sobre isso... mas ela diz que pode ser uma crise enorme, então agora não posso simplesmente dizer a ela para ignorar isso! Faça o que ela precisar e tente ser rápido. Temos xedrite para encontrar!"
