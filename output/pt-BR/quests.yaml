"Engineer Crall in Vidaria said, \"I have prepared the collaboration notes I would like you to deliver to the dwarf. If you would be so kind, please translate them and deliver them. I eagerly await his response.\"": "O engenheiro Crall, em Vidaria, disse: \"Preparei as notas de colaboração que gostaria que você entregasse ao anão. Se você fizer a gentileza, traduza-as e entregue-as. Aguardo ansiosamente sua resposta.\""
"Engineer Crall in Vidaria said, \"I've heard that some of the demonic rocks to the north have useful properties. There is one in particular that interests me, some kind of frozen magma. I would like to tinker with this one, and see if it has useful engineering applications. If you bring me a few, I will share any findings with you.\"": "O engenheiro Crall, em Vidaria, disse: \"Ouvi dizer que algumas das rochas demoníacas ao norte têm propriedades úteis. Há uma em particular que me interessa, algum tipo de magma congelado. Gostaria de mexer neste e ver se tem aplicações úteis em engenharia. Se você me trouxer alguns, compartilharei quaisquer descobertas com você.\""
"Engineer Crall in Vidaria said, \"The frozen magma that you brought me is interesting, and I would like to perform some experiments with it. I suspect it can be used in place of the central core of a Dwar- you know what, I'll spare you the details. I need more info about the demons in general, and a bunch of N Cores to perform my testing with. Can you keep an eye out for those things?\"": "O engenheiro Crall em Vidaria disse: \"O magma congelado que você me trouxe é interessante e eu gostaria de realizar alguns experimentos com ele. Suspeito que possa ser usado no lugar do núcleo central de um anão - quer saber, vou poupá-lo dos detalhes. Preciso de mais informações sobre os demônios em geral e de um monte de N núcleos para realizar meus testes. Você pode ficar de olho nessas coisas? \""
"Engineer Crall in Vidaria said, \"The notes you brought back from Rock-Wrecker's camp are pretty clever - I wish those other engineers worked this hard when I was still around. At any rate, there's a few missing pieces of information.

For security purposes, many orcish engineers write their notes as a cipher, and they carry the key on their person. Obtain a few of these keys and bring them back, hopefully one of them is the key that I need.\"": "O engenheiro Crall em Vidaria disse: \"As notas que você trouxe do acampamento de Rock-Wrecker são muito inteligentes - gostaria que aqueles outros engenheiros trabalhassem tanto quando eu ainda estava por perto. De qualquer forma, faltam algumas informações.

Por motivos de segurança, muitos engenheiros orcs escrevem suas anotações como uma cifra e carregam a chave consigo. Obtenha algumas dessas chaves e traga-as de volta, espero que uma delas seja a chave que eu preciso.\""
"Engineer Crall in Vidaria said, \"When I first left camp, I wandered a bit before settling here. I stumbled upon a dwarven man near the swamp to the north, but we lacked communication because he did not speak Orcish... or perhaps he did, and simply did not want to chat. Regardless, dwarves are often clever inventors, so would you inquire about a collaboration between us?\"": "O engenheiro Crall em Vidaria disse: \"Quando deixei o acampamento, vaguei um pouco antes de me estabelecer aqui. Me deparei com um anão perto do pântano ao norte, mas não tínhamos comunicação porque ele não falava orc... ou talvez falasse, e simplesmente não queria conversar. Independentemente disso, os anões costumam ser inventores inteligentes, então você poderia perguntar sobre uma colaboração entre nós? \""
"Engineer Crall in Vidaria said, \"When I left the mining camp, I did so in a hurry. Rock-Wrecker and I got into... let's just say, we did not see eye-to-eye. At any rate, I left behind some valuable notes on a new mining device I was working on. I would hate for them to pick up the design where I left off, and use it for their nefarious goals. If you happen upon their camp, could you retrieve my notes while you're there? I wouldn't be surprised if Rock-Wrecker seized them for himself already.\"": "O engenheiro Crall em Vidaria disse: \"Quando deixei o campo de mineração, fiz isso com pressa. Rock-Wrecker e eu entramos em ... digamos apenas, não concordamos. De qualquer forma, deixei para trás algumas notas valiosas sobre um novo dispositivo de mineração em que estava trabalhando. Eu odiaria que eles continuassem o projeto de onde parei e o usassem para seus objetivos nefastos. Se você encontrar o acampamento deles, poderia recuperar minhas anotações enquanto estiver lá? Eu não estaria surpreso se Rock-Wrecker já os apreendeu.\""
"Engineer Crall vs. Jewelry": "Engenheiro Crall vs. Joias"
"Ensign Cricket aboard the Wintertide said, \"Any invasion force would be dumb not to take out the phoenixes on the engine deck. We don't use them in day-to-day operations, but if we have to cold-start an engine, we use their superheated breath.\"": "O alferes Cricket a bordo do Wintertide disse: \"Qualquer força de invasão seria burra se não eliminasse as fênix no convés do motor. Não as usamos nas operações do dia-a-dia, mas se tivermos que dar partida a frio em um motor, usamos seu hálito superaquecido.\""
"Ensign Cricket aboard the Wintertide said, \"Hey, while you're assaulting the ship and all, why not kill some of the pests on the engine deck? We've got a nasty infestation of droaches down there. Apparently they get along great with the phoenixes, so everybody's afraid to get rid of 'em. But not you!\"": "O alferes Cricket a bordo do Wintertide disse: \"Ei, enquanto você está atacando o navio e tudo mais, por que não matar algumas das pragas no convés do motor? Temos uma infestação desagradável de baratas lá embaixo. Aparentemente, elas se dão muito bem com as fênix, então todo mundo tem medo de se livrar delas. Mas você não!\""
"Ensign Cricket aboard the Wintertide said, \"Hippogriffs aren't immortal. Did you know that? Yeah, they hatch out of eggs! We have a hatchery on board, too. You should go kill the brood mother!

You'll know you're in the right place when the temperature drops. They keep Coldfeather's quarters very cold!\"": "O alferes Cricket a bordo do Wintertide disse: \"Os hipogrifos não são imortais. Você sabia disso? Sim, eles eclodem de ovos! Temos um incubatório a bordo também. Você deveria matar a mãe da ninhada!

Você saberá que está no lugar certo quando a temperatura cair. Eles mantêm os aposentos de Coldfeather muito frios!\""
"Ensign Cricket aboard the Wintertide said, \"Let me think. How would you assault a ship? I guess you could just attack the crew! Try attacking the ensigns! Heehee!

Oh, uh, be aware they have death rays. Just a heads up.\"": "O alferes Cricket a bordo do Wintertide disse: \"Deixe-me pensar. Como você atacaria um navio? Acho que você poderia simplesmente atacar a tripulação! Tente atacar os alferes! Heehee!

Oh, uh, esteja ciente de que eles têm raios mortais. Apenas um aviso.\""
"Ensign Cricket aboard the Wintertide said, \"Okay, I'll cut the act: I know why you're really here. You're after the wizard! Well, he isn't here. Not physically, anyway. But his creations are! Go up to the science deck and you'll see what I mean. By all means, feel free to dispose of our new 'army'!\"": "O alferes Cricket a bordo do Wintertide disse: \"Ok, vou parar de fingir: eu sei por que você está realmente aqui. Você está atrás do mago! Bem, ele não está aqui. Não fisicamente, pelo menos. Mas suas criações estão! Suba para o convés de ciências e você verá o que quero dizer. Por suposto, sinta-se à vontade para se livrar de nosso novo 'exército'! \""
"Ensign Cricket aboard the Wintertide said, \"The best way to assault a ship is to kill the captain! Go kill Captain Evergloam!\"": "O alferes Cricket a bordo do Wintertide disse: \"A melhor maneira de atacar um navio é matar o capitão! Vá matar o capitão Evergloam!\""
"Ensign Cricket aboard the Wintertide said, \"The loudest things aboard are definitely the hippogriffs. At first it was neat hearing them shriek all night, but it's gotten a little repetitive. I think any official invasion party would really need to kill those! Thanks!\"": "O alferes Cricket a bordo do Wintertide disse: \"As coisas mais barulhentas a bordo são definitivamente os hipogrifos. No começo foi legal ouvi-los gritar a noite toda, mas ficou um pouco repetitivo. Acho que qualquer grupo de invasão oficial realmente precisaria matá-los! Obrigado!\""
"Ensign Cricket aboard the Wintertide said, \"The lowest deck is mostly empty and just used for storage. We've stored a bunch of mortal specimens down there for later analysis.

The mortal realm near here is full of really beautiful things. Beautiful flowers! Talking trees! 'Elves'! Real dragons! But what's in the hold? ... cow-men.

They're going to try to breed them into an army, so you should totally go stop them.\"": "O alferes Cricket a bordo do Wintertide disse: “O convés mais baixo está quase vazio e usado apenas para armazenamento. Armazenamos um monte de espécimes mortais lá para análise posterior.

O reino mortal perto daqui está cheio de coisas realmente lindas. Lindas flores! Árvores falantes! 'Elfos'! Dragões de verdade! Mas o que há no porão? ... vaqueiros.

Eles vão tentar transformá-los em um exército, então você deveria detê-los totalmente.\""
"Ensign Cricket aboard the Wintertide said, \"The science deck has been given over to the mad wizard that made those... monstrosities. And he's not even here! He just astrally projects himself here from the mortal realm.

Sustained astral projection requires an impressive amount of magical fortitude, I'll admit. But its so gauche!

You should just pull his plug.\"": "O alferes Cricket a bordo do Wintertide disse: \"O baralho de ciências foi entregue ao mago louco que criou aquelas... monstruosidades. E ele nem está aqui! Ele apenas se projeta astralmente do reino mortal para cá.

A projeção astral sustentada requer uma quantidade impressionante de fortaleza mágica, admito. Mas é tão desajeitado!

Você deveria simplesmente desligar a tomada dele.\""
"Ensign Cricket aboard the Wintertide said, \"There's a bunch of bears on the storage deck because of... reasons. You should clear those out, if you're going that way!\"": "O alferes Cricket a bordo do Wintertide disse: \"Há um monte de ursos no convés de armazenamento por causa de... motivos. Você deveria limpá-los, se estiver indo por ali!\""
"Ensign Cricket aboard the Wintertide said, \"Well if you're going to assault the ship and create mayhem, you should start with the trolls! Most of these trolls were supposed to go down to the surface already, but they're lazy oafs who just hang around down here.\"": "O alferes Cricket a bordo do Wintertide disse: \"Bem, se você vai atacar o navio e criar o caos, você deve começar com os trolls! A maioria desses trolls já deveria ter descido à superfície, mas eles são idiotas preguiçosos que ficam por aqui.\""
"Ensign Cricket aboard the Wintertide said, \"While you're invading, would you mind exterminating those pesky birds on the main deck? Lieutenant Frostglimmer insists they're trained alarm birds that will prevent intruders from sneaking around. But they make so much noise that most of us just ignore them...\"": "O alferes Cricket a bordo do Wintertide disse: \"Enquanto você está invadindo, você se importaria de exterminar aqueles pássaros incômodos no convés principal? O Tenente Frostglimmer insiste que eles são pássaros de alarme treinados que impedirão que intrusos se esgueirem. Mas eles fazem tanto barulho que a maioria de nós simplesmente os ignora ... \""
