Truculent: adjective: eager to argue or quick to start a fight. Similar to 'belligerent' but with an implication of cruelty or savagery.

(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Lakrea disse para você incluir a palavra 'truculento' em sua próxima conversa.

Truculento: adjetivo: ansioso para discutir ou rápido para iniciar uma briga. Semelhante a 'beligerante', mas com uma implicação de crueldade ou selvageria.

