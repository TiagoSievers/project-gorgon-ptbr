"Can I have the maple carrots, please? I ordered them a while ago...": "Posso ficar com as cenouras de bordo, por favor? Encomendei-os há algum tempo..."
"Can you ask Zeratak to come visit me? I wish to meet her in broad daylight so that I can run if things go poorly.": "Você pode pedir a Zeratak para vir me visitar? Desejo encontrá-la em plena luz do dia para poder fugir se as coisas correrem mal."
"Can you deliver these arrow shafts to Joeh in town? Thanks.": "Você pode entregar essas flechas para Joeh na cidade? Obrigado."
"Can you get me a perfectly preserved wolf skin? A trophy skin. I guess you'd need to be an expert skinner to get one... and even then it may take a few tries. I just need one, though, so it can't be that hard, right?": "Você pode me conseguir uma pele de lobo perfeitamente preservada? Uma skin troféu. Acho que você precisaria ser um esfolador experiente para conseguir um... e mesmo assim podem ser necessárias algumas tentativas. Eu só preciso de um, então não pode ser tão difícil, certo?"
"Can you get me some perfect snail shells? They need to be perfect, and those are harder to find. But I only need two of 'em.": "Você pode me conseguir algumas conchas de caracol perfeitas? Eles precisam ser perfeitos e são mais difíceis de encontrar. Mas só preciso de dois deles."
"Can you give this note to Willem for me? Now don't read it! Promise you won't!": "Você pode dar este bilhete para Willem para mim? Agora não leia! Prometa que não vai!"
"Can you go collect my mana sponges? They're in jars all through the area. If you bring me six, you can keep any others you find. And I'll teach you a recipe that uses them.": "Você pode pegar minhas esponjas de mana? Eles estão em potes por toda a área. Se você me trouxer seis, poderá ficar com os outros que encontrar. E vou te ensinar uma receita que os utiliza."
"Can you go head to the plains south of here and kill some of those idiot sheep for wool? I'm trying to make better equipment since apparently we're gonna be stuck here a while...": "Você pode ir para as planícies ao sul daqui e matar algumas daquelas ovelhas idiotas para obter lã? Estou tentando fazer equipamentos melhores já que aparentemente ficaremos presos aqui por um tempo..."
"Can you go tell Tadion I need more horseshoes? He's the blacksmith in town. You'll find him in the keep -- that enclosed horrible-smelling area at the southern end of town. Tell him I need as many shoes as he can make, but I can only pay in sexual favors. He'll understand.": "Você pode dizer ao Tadion que preciso de mais ferraduras? Ele é o ferreiro da cidade. Você o encontrará na fortaleza – aquela área fechada e com um cheiro horrível no extremo sul da cidade. Diga a ele que preciso de quantos sapatos ele puder fazer, mas só posso pagar em favores sexuais. Ele vai entender."
"Can you grab some feathers for me? Shouldn't be hard...": "Você pode pegar algumas penas para mim? Não deveria ser difícil..."
"Can you hear me? Then you must answer my plea. I am but a humble immortal telepathic fish and I cannot save my home! There are slugs are everywhere! Please remove them!": "Você pode me ouvir? Então você deve responder ao meu apelo. Sou apenas um humilde peixe telepático imortal e não posso salvar minha casa! Há lesmas por toda parte! Por favor, remova-os!"
"Can you run over to Kelim's little garden -- it's over in the corner of town -- and see if he's going to have more carrots any time in the next year? He just keeps growing peppers!

You know what, don't bother talking to the lout. Just get me carrots!": "Você pode correr até o pequeno jardim de Kelim – fica no canto da cidade – e ver se ele terá mais cenouras no próximo ano? Ele continua cultivando pimentas!

Quer saber, não se preocupe em falar com o caipira. Apenas me traga cenouras!"
