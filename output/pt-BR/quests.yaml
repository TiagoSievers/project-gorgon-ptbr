"And here's your reward.\": \"Estes peixes pulmonados são nativos da nossa terra natal, Fosulf, e a toca os guarda bem porque guardam um segredo precioso": "o óleo destes peixes tem propriedades regenerativas! Também são deliciosos."
"And hey, if you want help with how to attack the camps, just ask me.\\\"\": \"Paul Vaughn, em Serbule Hills, disse": "\\\"Os acampamentos madeireiros a leste daqui foram feitos por humanos. Eu mesmo ajudei a construir as cercas! Mas então os goblins vieram e nos expulsaram, e agora estão cortando nossa madeira!"
"And I know just the thing": "the teeth of the Tor-Urak would work! And there's a bunch out in Kur. Of course, I'd need to kill a bunch of Tor-Uraks and then carefully butcher them to try to find a viable tooth... that seems unlikely in my current state. Unless you can help?\": \"Preciso de um injetor que possa atravessar minha pele de lobo quando eu mudar de forma. Precisa ser tão afiado quanto uma faca, mas oco para que minha poção possa fluir."
"And if you want to know how to make fancier kinds of tofu, I suppose I could trade that fancy knowledge for some fancy cheese...\\\"\": \"Braigon em Eltibule disse": "\\\"Agora você conhece o prato de tofu mais básico e insípido. Leve isso de volta ao seu rakshasa e veja o que ele pensa."
"And listen": "Mort's technically alive, so killing him is murder. BUT! He was dead, and UN-dead, off and on, for like fifty years before he made some kind of pact with Harukita. So don't sweat the murder thing. He's evil."
"And listen to me carefully": "when I go to the desert, I always travel with Kleave or at least Oritania. I'm sturdy, but I'm not stupid! The desert is way more dangerous than here. You can still do this, though. Discretion can be sturdy! Avoid confrontation!"
"And no questions asked. You are a consumate professional. Thank you.": "E sem perguntas. Você é um profissional consumado. Obrigado."
"And now I'm worried they're gonna wander off and hurt somebody that can't take care of themselves, like the Duchess. Tell you what": "kill 'em off and I'll give you some of my earlier pumpkin harvest.\": \"Todo o meu canteiro de abóboras está infestado de monstros malignos! Nunca vi nada parecido com eles! Felizmente já tinha colhido metade das abóboras, mas as restantes estão podres por dentro. Até as sementes dentro deles são ruins!"
"And of course, this would be a business expense, so I can tap into my generous expense account.\\\"\": \"Kasapar em Statehelm disse": "\\\"Eles têm muitas bebidas destiladas interessantes aqui, mas sinto falta da bebida da minha terra natal. Rahu tem a tequila que mais causa salivação! Eu adoraria que me entregassem um barril."
"And remember, no actual dead turkeys -- or gods forbid, cows!\\\"\": \"Ricatu em Povus disse": "\\\"Quero algumas almôndegas. Acha que pode fazer almôndegas? Mas precisa haver algo de colheita acontecendo. Você mesmo terá que encontrar a receita."
"And tell him his code system needs work": "it's too obviously a code! I think the code message should read like a bakery order. Wouldn't that be clever? Why couldn't he have been clever like his sister Laura? Ask him that.\": \"Suspiro... Ormond e seus malditos códigos! Deixe-me ver... ah. Agradeça a ele por nada, já aprendi isso esta manhã."
"And the frustrating part about this idiotic story is that I believe him! So, if you're travelling in the woods outside of town and you come across a super-intelligent rat with a tiara or something, can you bring it to me? I need to get to the bottom of this, and I think that head thing will be a useful bargaining chip.\": \"O absurdo com o qual tenho que lidar. Um elfo na cidade relatou recentemente o roubo de sua faixa mágica. Mas veja só": "ele disse que um rato superinteligente roubou dele na calada da noite. É evidente que mais está acontecendo aqui, mas ele não dirá mais nada."
"And then slabs of meat jumped out at you? It's as I feared.

I heard a third anecdote recently. I probably should have led with this one. It's a complicated story, so stop by to see me tonight and I'll explain.

</i>[New Hang Out Available.]</i>": "E então pedaços de carne pularam em você? É como eu temia.

Ouvi uma terceira anedota recentemente. Eu provavelmente deveria ter começado com este. É uma história complicada, então venha me ver esta noite e eu explico.

</i>[Novo Hang Out disponível.]</i>"
"And then what happened? Nice! See, that's a mediocre story! Which is <i>much</i> better than your earlier sub-mediocre stories. We're making progress. Elves take the long view. Just a few more decades and you'll be a storyteller!": "E então o que aconteceu? Legal! Veja, essa é uma história medíocre! O que é <i>muito</i> melhor do que suas histórias sub-medíocres anteriores. Estamos fazendo progressos. Elfos têm uma visão de longo prazo. Mais algumas décadas e você será um contador de histórias!"
"And then you should run. It might have a guardian itself, and you wouldn't want to run into that.\\\"\": \"Alzaneth em Statehelm disse": "\\\"Encontrei referência a outro local de canto de vendaval, e este fica fora de Statehelm! Infelizmente, está debaixo d'água. Suponho que a linha d'água se moveu desde que foi feita pela primeira vez. Então prenda a respiração e procure por ele além das docas. Invoque um tornado lá, e você deverá ser capaz de acessar uma forma de clima incomum. Mate-o e pegue seu coração."
"And these all came from the still-beating hearts of living, or at least un-living, creatures? Good... good. You may go.": "E tudo isso veio dos corações ainda pulsantes de criaturas vivas, ou pelo menos não vivas? Bom... bom. Você pode ir."
"And this part here is supposed to be sparkling. Or sparking. Something like fire should be happening. See how it's coated in powder? I know this stuff! My master used a lot of it. It's a mix of sulfur and saltpeter. Get me some of both, maybe I can make it go again.\\\"\": \"Pickles na Gruta do Guardião Sagrado disse": "\\\"Olha, eu sei que você está irritado porque preciso de ainda mais peças para consertar o sistema de Alerta do Diretor. Também estou irritado com isso! Sou apenas um gato e estou fazendo o meu melhor! Não podemos desistir disso. É muito importante para os Guardiões."
