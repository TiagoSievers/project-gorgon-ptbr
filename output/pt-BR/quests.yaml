"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 amazing arrows? I would really appreciate it!\"": "Jopol disse: \"Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente preciso de alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 flechas incríveis? Eu realmente apreciaria isso!\""
"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 Awesome Arrows? I would really appreciate it!\"": "Jopol disse: \"Saudações! Eu costumava ser o Mestre Carpinteiro da Caravana, mas continuamos ficando sem flechas tão rapidamente que decidi deixar Kalrod assumir minha posição e me tornei o Fletcher da Caravana. Eu realmente preciso de alguma ajuda para me atualizar sobre as coisas. Você poderia montar e entregar 10.000 Flechas Incríveis? Eu realmente apreciaria isso!\""
