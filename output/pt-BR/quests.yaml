"Before I head off into the wilderness to collect gems, I should fill up on healing potions. Do you have any? I just need the weak kind -- the strong ones make me sick to my stomach.": "Antes de partir para o deserto para coletar joias, devo me abastecer de poções de cura. Você tem algum? Eu só preciso do tipo fraco - os fortes me dão enjôo."
"Before I was rudely kicked out of Serbule, I was trying to get in touch with a fanciful fellow that I'd heard lives there. He's an Elf, so who knows if he's trustworthy, but his name is \"Mushroom Jack.\" Delightful, isn't it? Anyway, I heard he knows about those gigantic mushrooms on the hill nearby. Could you ask him what medicinal properties they have? I'm mostly worried that they're poisonous.": "Antes de ser rudemente expulso de Serbule, eu estava tentando entrar em contato com um sujeito fantástico que ouvi dizer que mora lá. Ele é um Elfo, então quem sabe se ele é confiável, mas seu nome é “Mushroom Jack”. Delicioso, não é? De qualquer forma, ouvi dizer que ele sabe sobre aqueles cogumelos gigantescos na colina próxima. Você poderia perguntar a ele quais propriedades medicinais eles têm? Estou principalmente preocupado que eles sejam venenosos."
"Before you leave, go see if the Sand Seer has any advice for ya on Sand Worm killin'. Or just take my advice": "use archery. But no, no, the elf woman's gotta make it more complicated than that!\": \"Então a droga que você descobriu por aí, aquela Telka's Tits ou algo assim... é lixo. Só funciona em rakkies! A droga mais inútil desde que coloquei as mãos na 'bounceweed'. Mas há boas notícias: o material é feito da seda do raro verme gigante da areia, e achamos que outros medicamentos melhores poderiam ser feitos a partir do mesmo material. E tenho uma pista sobre um esconderijo infestado com eles! Se tivermos sorte, você poderá conseguir algumas amostras da seda deles enquanto compra meu xedrite."
