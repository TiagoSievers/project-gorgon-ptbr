"Floxie in the Fae Realm said, \"I'm working on becoming a better botanist! It's not as exciting as hunting, but I'm doing what I can. My biggest focus right now is on the carnivines, which are super amazing plants. They have a top area that's like a head, and they grow plates in their head that look like teeth! That's super strange, right? Can you get me some? The teeth, I mean. I need samples from several different carnivines so I can compare them.

You'll find carnivines most commonly when daytime happens -- they burrow into the ground at night.\"": "Floxie, no Reino Fae, disse: “Estou trabalhando para me tornar um botânico melhor! Não é tão emocionante quanto caçar, mas estou fazendo o que posso. compare-os.

Você encontrará carnivinos mais comumente durante o dia – eles se enterram no solo à noite.\""
"Floxie in the Fae Realm said, \"I've found a way to take my mind off my fear: cooking! I've been experimenting with vegetarian food from the nearby mortal realm, and they have something called a lemon which is VERY sour, and it's given me lots of dessert ideas. It's probably considered poisonous to mortals due to their simplistic digestive systems, but I can eat lemons just fine!

I'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!\"": "Floxie, no Reino Fae, disse: \"Encontrei uma maneira de afastar meu medo: cozinhar! Tenho experimentado comida vegetariana do reino mortal próximo, e eles têm algo chamado limão que é MUITO azedo, e me deu muitas ideias de sobremesas. Provavelmente é considerado venenoso para os mortais devido ao seu sistema digestivo simplista, mas posso comer limões muito bem!

Estou cultivando alguns limoeiros agora, mas parece que pode levar anos até que eles dêem frutos...? Isso é muito estranho. Acho que posso odiar árvores mortais. De qualquer forma, resumindo a história, eu realmente preciso de alguns limões!\""
"Floxie in the Fae Realm said, \"Oh hey, I had another botany idea. No, this one's great! See, you got me carnivine teeth, but I have nothing really to compare them to. Why don't you ALSO get me some spriggan weed teeth? Then I can compare them! Go, go! There's science to do!\"": "Floxie, no Reino Fae, disse: \"Oh, ei, tive outra ideia de botânica. Não, esta é ótima! Veja, você me deu dentes de carnivino, mas não tenho nada com que compará-los. Por que você TAMBÉM não me dá alguns dentes de erva spriggan? Então posso compará-los! Vá, vá! Há ciência para fazer!\""
"Floxie in the Fae Realm said, \"Pegast will not relent! He wants me to hop to the next mushroom circle and take out the winter court there. But I can't bring myself to do it! Could you ... do it for me? Just a few kills should be enough to get him out of my nest for a bit.\"": "Floxie, no Reino Fae, disse: “Pegast não cederá! Ele quer que eu pule para o próximo círculo de cogumelos e destrua a corte de inverno lá."
"Fluffikins in Gazluk said, \"I'm supposed to be in charge of the campsite, which is why the jealous humans <i>constantly</i> slack off to make me look bad. I keep telling them to repair these stalls so they're ready for the heavier snows to come. So they head off to gather wood, and then come back empty-handed. \"Chased by a bear\" or \"bit by a slime\"... always some excuse so they don't have to work. Can you help me? We need spruce.\"": "Fluffikins em Gazluk disse: \"Eu deveria estar no comando do acampamento, e é por isso que os humanos invejosos <i>constantemente</i> relaxam para me fazer ficar mal. Eu continuo dizendo a eles para consertar essas barracas para que estejam prontos para as neves mais fortes que virão. Então eles partem para pegar lenha e depois voltam de mãos vazias. \"Perseguidos por um urso\" ou \"mordido por um lodo\"... sempre alguma desculpa para que eles não tenham que fazer isso. trabalho. Você pode me ajudar?"
"Fluffikins in Gazluk said, \"My master left me with a long list of tasks, and we've fallen behind. I'd love your help! This one's tricky: I need samples of a mineral that grows in the caves around here. It's called cinnabar, and it's pretty hard to mine. But if you can get some, I'll pay you ... let's see... ten thousand Councils.\"": "Fluffikins em Gazluk disse: “Meu mestre me deixou com uma longa lista de tarefas, e ficamos para trás."
