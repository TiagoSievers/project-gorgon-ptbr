"Wolfsbane is this horrible poisonous flower that grows in the winter months. You should be able to find some around here. It's good for killin' wolves... and werewolves. There's a lot of ways to use it, and I'll show you one technique if you get me some.": "Wolfsbane é uma flor horrível e venenosa que cresce nos meses de inverno. Você deve encontrar alguns por aqui. É bom para matar lobos... e lobisomens. Há muitas maneiras de usá-lo, e mostrarei uma técnica se você me conseguir alguma."
