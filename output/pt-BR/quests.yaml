"It's still out of power. If you dropped in some rubies, it should activate.": "Ainda está sem energia. Se você deixou cair alguns rubis, ele deverá ser ativado."
"It's still out of power. If you plopped some disgusting grickling eyes in, it should activate.": "Ainda está sem energia. Se você colocar alguns olhos nojentos e grisalhos, ele deverá ser ativado."
"It's still out of power. If you plopped some glowing osslar spikes in, it should activate.": "Ainda está sem energia. Se você colocar alguns espinhos de osslar brilhantes, ele deverá ser ativado."
"It's that time again: time to ask for help paying the rent for over fifty would-be homeless people! We've promised to pay their rent until they're able to pay it themselves, and we need your help to do that!

For tax-clarity purposes, I would appreciate any donation be in the form of Council Certificates.": "Chegou aquela hora de novo: hora de pedir ajuda para pagar o aluguel de mais de cinquenta moradores de rua! Prometemos pagar o aluguel até que eles próprios consigam pagá-lo e precisamos da sua ajuda para fazer isso!

Para fins de clareza fiscal, gostaria que qualquer doação fosse na forma de Certificados do Conselho."
"It's the gnashers! They usually keep their distance and stay northwest of here, but now they've been spreading towards us. They killed a bull this morning! It was a bit north of here. And... they ate him! They ATE him! And nobody in that castle over there cares one bit! Please hurry. I know I'm delicious. It's only a matter of time!\\\"\": \"A Vaca Suspeita em Eltibule disse": "\\\"Finalmente! Eu fiz o ritual de invocação horas atrás! Por que vocês, Vigilantes, se preocupam com um ritual de invocação se vão me ignorar por HORAS enquanto coisas terríveis acontecem?!"
"It's the harvest season and all my friends are eating turkey: perfectly baked turkey, turkey stir-fry, turkey pot pie ... But killing turkeys to consume their flesh is obviously wrong.

I hear you can make fake meat out of that fake milk somehow. I don't know if I believe myself, but it sure would be convenient to have a plant-based turkey!

I hear that Braigon in Eltibule knows how. Why don't you go ask him?": "É época de colheita e todos os meus amigos estão comendo peru: peru perfeitamente assado, peru refogado, torta de peru... Mas matar perus para consumir sua carne é obviamente errado.

Ouvi dizer que você pode fazer carne falsa com esse leite falso, de alguma forma. Não sei se acredito, mas com certeza seria conveniente ter um peru vegetal!

Ouvi dizer que Braigon em Eltibule sabe fazer isso. Por que você não vai perguntar a ele?"
"It's time to enjoy summer activities! Complete the check-list before this event ends to receive a few summer reward items.
<i>[Night time activities only count after 7pm and before 5am]</i>
<i>[Goblins hoard the secret of fireworks!]</i>": "É hora de aproveitar as atividades de verão! Complete a lista de verificação antes do final do evento para receber alguns itens de recompensa de verão.
<i>[As atividades noturnas só contam depois das 19h e antes das 5h]</i>
<i>[Goblins guardam o segredo dos fogos de artifício!]</i>"
"It's time to enjoy summer! Your quest journal has a check-list of traditional summer activities. Complete them all before the event ends to receive some items that'll help you enjoy the weather.": "É hora de aproveitar o verão! Seu diário de missões contém uma lista de atividades tradicionais de verão. Conclua todos eles antes do final do evento para receber alguns itens que o ajudarão a aproveitar o clima."
"It's tradition to use glow bottles on the tree. The alchemist who used to make them is dead now, but she taught me the technique! Most of the ingredients are pretty upsetting, seeing as they come from living animals. But remember, this is for presents! So if you get the parts, I'll make the jars.": "É tradição usar garrafas luminosas na árvore. A alquimista que os fazia já morreu, mas ela me ensinou a técnica! A maioria dos ingredientes é bastante perturbadora, visto que vêm de animais vivos. Mas lembre-se, isso é para presentes! Então, se você conseguir as peças, eu farei os potes."
"It's what I feared. Our friend Hamilton has spotted a gigantic spider climbing out of the sewer at night. He hasn't seen how the spider returns -- it probably uses a different entrance -- but we can surmise that this is what is killing the sentient animals in Statehelm.

Hamilton says that he heard a clicking sound of a door opening right before he saw the spider. Look for a lever or mechanism that opens a door. And be ready for a fight.

You will doubtless need to kill this spider. But I don't believe it is a simple unintelligent spider. It is too cunning. Figure out what it was up to!": "É o que eu temia. Nosso amigo Hamilton avistou uma aranha gigante saindo do esgoto à noite. Ele não viu como a aranha retorna – provavelmente usa uma entrada diferente – mas podemos supor que é isso que está matando os animais sencientes em Statehelm.

Hamilton diz que ouviu o clique de uma porta se abrindo logo antes de ver a aranha. Procure uma alavanca ou mecanismo que abra uma porta. E esteja pronto para uma luta.

Você sem dúvida precisará matar esta aranha. Mas não acredito que seja uma simples aranha pouco inteligente. É muito astuto. Descubra o que estava acontecendo!"
"Its perfectly not-quite-symmetrical shape lends an air of mystery to the Lemon symbol -- and an air of difficulty! For only those who brave the sourness can see clearly enough to depict the lemon.": "A sua forma perfeitamente não simétrica confere um ar de mistério ao símbolo do Limão – e um ar de dificuldade! Pois apenas aqueles que enfrentam a acidez podem ver com clareza suficiente para representar o limão."
"Ivory Horn": "Chifre de Marfim"
"Ivory Horns": "Chifres de Marfim"
"IvoryHorn": "Chifre de Marfim"
"Ivyn in Serbule asked you to buy three Squash Seedlings for him. Therese (near the windmill) sells them.": "Ivyn em Serbule pediu para você comprar três mudas de abóbora para ele. Therese (perto do moinho de vento) os vende."
"Ivyn in Serbule asked you to find the Demon Bean in the old spider-filled crypt in the cemetery.": "Ivyn em Serbule pediu que você encontrasse o Feijão Demoníaco na velha cripta cheia de aranhas do cemitério."
"Ivyn in Serbule asked you to kill the Salmpo, a plant creature he accidentally grew. It's south of town.": "Ivyn em Serbule pediu para você matar o Salmpo, uma planta que ele cultivou acidentalmente. Fica ao sul da cidade."
"Ivyn in Serbule has asked you to give him an Ancient Bronze Coin if you come across one while hunting.": "Ivyn, em Serbule, pediu que você desse a ele uma Moeda de Bronze Antiga se você encontrar uma enquanto caçava."
"Ivyn in Serbule wants butter.": "Ivyn em Serbule quer manteiga."
"Ivyn Made a Salmpo": "Ivyn fez um Salmpo"
"Ivyn Needs Butter": "Ivyn precisa de manteiga"
"Ivyn Needs Seedlings": "Ivyn precisa de mudas"
"Ivyn Wants A Coin": "Ivyn quer uma moeda"
"Ivyn's Demon Bean": "Feijão Demônio de Ivyn"
"IvynNeedsButter": "IvynNeedsManteiga"
"IvynNeedsSeedlings": "IvynNeedsMudas"
"IvynWantsACoin": "Ivyn quer uma moeda"
"Jace Soral has asked you to defeat a hugely powerful werewolf named Bleddyn, somewhere in the forested part of the Kur Mountains. He mentioned that you'd need allies to do it. He also mentioned that silver weapons are extra effective against him.": "Jace Soral pediu para você derrotar um lobisomem extremamente poderoso chamado Bleddyn, em algum lugar na parte florestal das Montanhas Kur. Ele mencionou que você precisaria de aliados para fazer isso. Ele também mencionou que as armas de prata são extremamente eficazes contra ele."
"Jace Soral in the Kur Mountains asked you for wool": "Jace Soral nas montanhas Kur pediu lã para você"
"Jace Soral in the Kur Mountains asked you to collect a bunch of Wolfsbane.": "Jace Soral, nas montanhas Kur, pediu para você coletar um monte de Wolfsbane."
"Jace Soral in the Kur Mountains asked you to kill nearby deer to reduce the predator food supply.": "Jace Soral, nas montanhas Kur, pediu que você matasse cervos próximos para reduzir o suprimento de comida dos predadores."
"Jace Soral in the Kur Mountains said, \"You're the Warden they sent? Good. Little Red told us to contact you if the forest werewolves seemed to be acting more intelligently.

The caves near here are full of werewolves, but usually only a few wander out into the woods. Until today. Scores more poured out. They're still fighting mindlessly, but something is up.

Sanja and me have killed our fill and need a bit of rest before we go again. Hopefully you can pick up the slack.\"": "Jace Soral nas montanhas Kur disse: \"Você é o Diretor que eles enviaram? Ótimo. Little Red nos disse para contatá-lo se os lobisomens da floresta parecessem estar agindo de forma mais inteligente.

As cavernas próximas daqui estão cheias de lobisomens, mas geralmente apenas alguns vagam pela floresta. Até hoje. Mais pontuações foram derramadas. Eles ainda estão lutando sem pensar, mas algo está acontecendo.

Sanja e eu já nos esgotamos e precisamos descansar um pouco antes de voltarmos. Espero que você consiga compensar.\""
"Jaime Fatholm asked for a lot of clownfish.": "Jaime Fatholm pediu muitos peixes-palhaço."
"Jaime Fatholm asked for some hard-boiled eggs.": "Jaime Fatholm pediu alguns ovos cozidos."
"Jaime Fatholm asked for some Healing Potions.": "Jaime Fatholm pediu algumas Poções de Cura."
"Jaime Fatholm would appreciate if you killed a sheep that's humiliated her. She said, \"He lives on a hill south of here. Not the hill immediately south, but the one past that, in between the Baroness and the old hunting lodge.\"": "Jaime Fatholm apreciaria se você matasse uma ovelha que a humilhou. Ela disse: \"Ele mora em uma colina ao sul daqui. Não na colina imediatamente ao sul, mas naquela que fica depois dela, entre a Baronesa e o antigo pavilhão de caça\"."
"Jake the Buckler in Sun Vale asked for a pot of Lemon Chiffon dye. You previously learned that a mantis living outside of Serbule can sell you the recipe. There may be other ways to acquire the dye, too.": "Jake, o Broquel, em Sun Vale, pediu um pote de tinta Lemon Chiffon. Você aprendeu anteriormente que um louva-a-deus que vive fora de Serbule pode lhe vender a receita. Pode haver outras maneiras de adquirir o corante também."
"Jake the Buckler in Sun Vale asked for some iridium to make his buckle shine better. He suggested that it can sometimes be mined in Kur Mountains.": "Jake, o Broquel, em Sun Vale, pediu um pouco de irídio para fazer sua fivela brilhar melhor. Ele sugeriu que às vezes pode ser extraído nas montanhas Kur."
"Jake the Buckler in Sun Vale asked you to talk to Firaki in Amulna. He needs advice on what color to use for his next buckle.": "Jake, o Broquel, em Sun Vale, pediu para você falar com Firaki em Amulna. Ele precisa de conselhos sobre que cor usar em sua próxima fivela."
"James' Birthday Adventure": "Aventura de aniversário de James"
"Jammed Chest": "Peito preso"
"Jara's barn has been coopted by a huge grizzly bear. She'd be grateful if I could kill it, but she doesn't really think I'm capable of doing so.": "O celeiro de Jara foi cooptado por um enorme urso pardo. Ela ficaria grata se eu pudesse matá-lo, mas ela realmente não acha que eu seja capaz de fazer isso."
"Jaunce Zodiac": "Zodíaco Jounce"
"Jaunce Zodiac in Statehelm said, \"I have a great new scheme to win big at keelflip: bomb threats. Don't worry. Nobody is going to get hurt. Everything wil go according to plan.\"": "Jaunce Zodiac em Statehelm disse: \"Tenho um novo esquema excelente para ganhar muito no keelflip: ameaças de bomba. Não se preocupe. Ninguém vai se machucar. Tudo correrá conforme o planejado.\""
"Jaunce Zodiac in Statehelm said, \"I have a new idea for how to cheat at keelflip. I just need some pebbles. But they have to be perfectly balanced!\"": "Jaunce Zodiac, da Statehelm, disse: \"Tenho uma nova ideia de como trapacear no keelflip. Só preciso de algumas pedras. Mas elas precisam estar perfeitamente equilibradas!\""
"Jaunce Zodiac in Statehelm said, \"I have an idea for how to win big at keelflip: cheating! I just need some corks.\"": "Jaunce Zodiac, da Statehelm, disse: \"Tenho uma ideia de como ganhar muito no keelflip: trapacear! Só preciso de algumas rolhas.\""
"Jaw the myconian has asked you to deliver sporelings to a storage cave somewhere in the myconian caverns.": "Jaw, o myconiano, pediu que você entregasse esporelinhos em uma caverna de armazenamento em algum lugar das cavernas myconianas."
"Jaw the myconian has asked you to kill a bunch of Garden Tenders in the Myconian caverns.": "Jaw, o myconiano, pediu para você matar um bando de Garden Tenders nas cavernas de Myconian."
"Jaw the myconian has asked you to kill Greta, the Garden Tender.": "Jaw, o myconiano, pediu para você matar Greta, a Cuidadora do Jardim."
"Jenny Foster in Statehelm is a werewolf and has invited you to find her \"in the sewer\" during the full moon. She can teach you new moves in exchange for Tokens of Norala.": "Jenny Foster em Statehelm é um lobisomem e convidou você para encontrá-la \"no esgoto\" durante a lua cheia. Ela pode lhe ensinar novos movimentos em troca de Tokens of Norala."
"Jenny said that if I want to be friends with her again I have to swear off pranking her <i>forever</i>. She said she doesn't even really like pranks! She was just humoring me! Can you believe the audacity?

Mortals are so unpredictable, it's scary. I don't even know how to deal with this.

Wait: yes I do! I just need to show her the beautiful side of pranks. Can you make or find a pair of glued-together coins? I'll use them for a harmless prank. HARMLESS. I promise! She'll laugh!": "Jenny disse que se eu quiser ser amiga dela de novo, tenho que jurar que não vou pregar peças nela <i>para sempre</i>. Ela disse que nem gosta de pegadinhas! Ela estava apenas brincando comigo! Dá para acreditar na audácia?

Os mortais são tão imprevisíveis que é assustador. Eu nem sei como lidar com isso.

Espere: sim, eu quero! Só preciso mostrar a ela o lado lindo das pegadinhas. Você consegue fazer ou encontrar um par de moedas coladas? Vou usá-los para uma brincadeira inofensiva. INOFENSIVO. Eu prometo! Ela vai rir!"
"JennyFosterIntro": "JennyFosterIntrodução"
"Jesina asked for a dozen potatoes.": "Jesina pediu uma dúzia de batatas."
"Jesina asked for some Pick-Me-Up Juice.": "Jesina pediu um suco Pick-Me-Up."
"Jesina asked you to bring her some oranges as proof that you aren't a scary monster.": "Jesina pediu que você trouxesse algumas laranjas para ela como prova de que você não é um monstro assustador."
"Jesina asked you to find her sister's backpack full of clothes. They're somewhere near an abandoned home.": "Jesina pediu para você encontrar a mochila da irmã cheia de roupas. Eles estão em algum lugar perto de uma casa abandonada."
"Jesina in Eltibule asked you to save her sister Sarina. Sarina is being held captive in a goblin-infested dungeon under Eltibule Keep.": "Jesina em Eltibule pediu para você salvar sua irmã Sarina. Sarina está sendo mantida em cativeiro em uma masmorra infestada de goblins sob Eltibule Keep."
"Jesina wanted you to pick some unusual flowers.": "Jesina queria que você escolhesse algumas flores incomuns."
"Jewelry Crafting: Astounding Jewelry for Moxie": "Fabricação de joias: joias surpreendentes para Moxie"
"Jewelry Crafting: Great Jewelry for Moxie": "Fabricação de joias: ótimas joias para Moxie"
"Jewelry Crafting: Nice Jewelry for Moxie": "Fabricação de joias: lindas joias para Moxie"
