"\"Easy, deep influence\"? Well, I suppose that makes sense, but it still doesn't tell the full story. The demons can influence the frogs easily, but to what end? <i>Why</i> do they want to influence them in the first place is the main question. I will stew on Pitre's words. That is all for now, thank you.": "\"Influência fácil e profunda\"? Bem, suponho que faça sentido, mas ainda não conta toda a história. Os demônios podem influenciar facilmente os sapos, mas com que finalidade? <i>Por que</i> eles querem influenciá-los em primeiro lugar é a questão principal. Vou me preocupar com as palavras de Pitre. Por enquanto é tudo, obrigado."
