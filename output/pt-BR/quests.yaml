"Vera's farm is northeast of here.\\\"\": \"Julius Patton, em Serbule Hills, disse": "“Emprestei à velha Vera minha melhor pá de jardim há um ano."
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Amazing Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Verac disse: \"Olá! Fazer arreios para cavalos é um trabalho muito importante! Preciso de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 selas incríveis? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar seu ofício. \""
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Decent Reins? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Verac disse: \"Olá! Fazer arreios para cavalos é um trabalho muito importante! Preciso de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 Rédeas Decentes? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar seu ofício. \""
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Quality Saddlebags? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Verac disse: \"Olá! Fazer arreios para cavalos é um trabalho muito importante! Preciso de alguns equipamentos extras enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 alforjes de qualidade? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar seu ofício. \""
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Rough Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Verac disse: \"Olá! Fazer arreios para cavalos é um trabalho muito importante! Preciso de algum equipamento extra enquanto espero que Tantai reabasteça meu estoque de couro. Você pode me trazer 10 selas ásperas? Em troca, compartilharei alguns segredos comerciais com você para ajudar a aprimorar seu ofício. \""
"VertanTunaFillet": "Filé de Atum Vertan"
"Vervadium": "Vervádio"
"Very adequate work.": "Trabalho muito adequado."
"Very few guests are participating in the Natural Food Experience. Many claim that it is boring or too similar to manual labor to be entertaining. I must increase guest satisfaction before this attraction is closed! Perhaps you would like to participate? Simply grow some onions in the garden and exclaim that you are enjoying yourself.": "Muito poucos convidados estão participando da Natural Food Experience. Muitos afirmam que é chato ou muito parecido com o trabalho manual para ser divertido. Devo aumentar a satisfação dos hóspedes antes que esta atração seja fechada! Talvez você queira participar? Simplesmente cultive algumas cebolas no jardim e diga que está se divertindo."
"Very good work! I'll tell Floxie a mortal did her job for her. Won't she be shamed! Haha!": "Muito bom trabalho! Direi à Floxie que uma mortal fez o trabalho por ela. Ela não vai ficar envergonhada! Haha!"
"Very good work. This will take a while, I expect! And I'll have bandages ready, because somebody's lip is going to get pierced by a needle, I just know it. But they'll learn incredibly fast, you'll see.": "Muito bom trabalho. Isso vai demorar um pouco, eu espero! E terei curativos prontos, porque o lábio de alguém vai ser furado por uma agulha, eu simplesmente sei disso. Mas eles aprenderão incrivelmente rápido, você verá."
"Very good, hand me the vervadium. This?! This gem has too many flaws! Did you not see them? Or were you trying to trick me into buying your worthless... Nnhgggg... be CALM Gasu'um, be calm!

Very well. I will take this worthless Vervadium and give you NOTHING, because it is not valuable, and ten times nothing is still nothing. However, I have an easier task for you instead. If you do this task for me, I will pay you... a large pile of coins. I haven't counted it. But it is significant.": "Muito bem, me passe o vervádio. Esse?! Esta joia tem muitas falhas! Você não os viu? Ou você estava tentando me enganar para comprar seu inútil... Nnhgggg... fique CALMO Gasu'um, fique calmo!

Muito bem. Vou pegar esse Vervadium sem valor e não te dar NADA, porque não tem valor, e dez vezes nada ainda é nada. No entanto, tenho uma tarefa mais fácil para você. Se você fizer essa tarefa para mim, eu lhe pagarei... uma grande pilha de moedas. Eu não contei. Mas é significativo."
"Very good.": "Muito bom."
"Very good. I like to powder these and use as a food additive. They can cut down the potency of pixie sugar without reducing the sugar high. Very useful for overclocking the tongue! If you're not afraid of Gastronomancy, maybe I'll teach you the dark ritual sometime.

In the mean time, here's a much less dangerous technique. It's unusable here due to lack of ingredients, but you can use it when you get home.": "Muito bom. Gosto de pulverizar e usar como aditivo alimentar. Eles podem reduzir a potência do açúcar pixie sem reduzir o nível de açúcar. Muito útil para overclock da língua! Se você não tem medo da Gastronomancia, talvez eu lhe ensine o ritual sombrio algum dia.

Enquanto isso, aqui está uma técnica muito menos perigosa. Aqui é inutilizável por falta de ingredientes, mas você pode usar quando chegar em casa."
"Very good. Kalaba and I shall turn them into small balls and add them to the tree.": "Muito bom. Kalaba e eu vamos transformá-los em bolinhas e colocá-las na árvore."
"Very good. Kalaba has finished the blade. Let this weapon declare our presence to the heavens! We are not afraid of judgment! We are worthy of gifts!": "Muito bom. Kalaba terminou a lâmina. Deixe esta arma declarar nossa presença aos céus! Não temos medo do julgamento! Somos dignos de presentes!"
"Very good. These soil samples will tell me how viable each farm is for future crops. I'm thinking about the future, you see! Here is your payment.": "Muito bom. Estas amostras de solo me dirão quão viável é cada fazenda para culturas futuras. Estou pensando no futuro, você vê! Aqui está o seu pagamento."
"Very good. Those oysters are part of a vile ranalon plot. They're an invasive species that would soon kill off regular oysters, which would soon kill our islands' delicate food chains.

You've done well.": "Muito bom. Essas ostras fazem parte de uma conspiração vil de Ranalon. São uma espécie invasora que em breve mataria as ostras normais, o que em breve mataria as delicadas cadeias alimentares das nossas ilhas.

Você se saiu bem."
"Very good. Ufkar has finished his preparations, so we are ready to light the tree! Let us hope that we don't burn down the city...": "Muito bom. Ufkar terminou os preparativos, então estamos prontos para acender a árvore! Esperemos que não incendiemos a cidade..."
"Very nice job! I'm sure my birds will enjoy it. I am scheduled to see the Queen about your request in a couple hours. Check back with me in about 3 hours and I should have an answer for you.

For now, get acquainted with your new pet!": "Muito bom trabalho! Tenho certeza que meus pássaros vão gostar. Estou programado para ver a Rainha sobre o seu pedido em algumas horas. Volte comigo em cerca de 3 horas e terei uma resposta para você.

Por enquanto, conheça seu novo animal de estimação!"
"Very nice work! Here's your payment. Now go fill more of my orders!": "Muito bom trabalho! Aqui está o seu pagamento. Agora vá atender mais dos meus pedidos!"
"VERY NICE! A fine score indeed! Visit the Writ Master in Serbule near the town well to collect your very nice prize!": "MUITO LEGAL! Uma bela pontuação, de fato! Visite o Writ Master em Serbule, perto do poço da cidade, para receber seu belo prêmio!"
"Very nice! I'd invite you to the party, but... well, maybe next time!": "Muito legal! Eu conVidaria você para a festa, mas... bem, talvez da próxima vez!"
"Very nice! Let me show you what I make from these. Here, keep it!": "Muito legal! Deixe-me mostrar o que eu faço com isso. Aqui, fique com ele!"
"Very nice! Some of this is a disgusting color, but we can make it work.

You keep that. I just wanted to make sure you were the sort of person who knew their way around a paint bucket. Let me teach you a new way to use this stuff, what do you say?": "Muito legal! Algumas dessas cores são nojentas, mas podemos fazer funcionar.

Você fica com isso. Eu só queria ter certeza de que você era o tipo de pessoa que sabia lidar com um balde de tinta. Deixe-me ensinar uma nova maneira de usar essas coisas, o que você me diz?"
"Very nice! Very ... ah ... natural. Would you excuse me for a moment?": "Muito legal! Muito... ah... natural. Você poderia me dar licença por um momento?"
"Very nicely done! Thanks! Here's a little cash. Not that I think you're a mercenary or anything! Please don't take offense. It's just a gift!": "Muito bem feito! Obrigado! Aqui está um pouco de dinheiro. Não que eu ache que você seja um mercenário ou algo assim! Por favor, não se ofenda. É apenas um presente!"
"Very pretty little aquamarines! Solgribue is happy.": "Águas-marinhas muito lindas! Solgribue está feliz."
