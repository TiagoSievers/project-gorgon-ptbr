"Entre e queime esses ovos. E quero dizer isso literalmente": "você deve estar preparado para queimá-los! Eles são muito difíceis de causar danos com armas e regeneram saúde loucamente, a menos que estejam em chamas. Se você não consegue controlar nenhum outro tipo de fogo, notei que a fada tem um pouco de óleo Trollbane à venda no 'comissariado'. Isso pelo menos impedirá que eles se regenerem! Boa sorte.\""
"Entregarei a você os barris seis de cada vez. Você não precisa tomar todos de uma vez! Não se sobrecarregue": "você vai se desesperar!\""
"Então continuamos tentando encontrar a cura para ele, porque o que mais poderíamos fazer? Eventualmente, Rick se acalmou sobre querer morrer, o que foi bom, mas ele ainda queria não ser um espelho. Tentamos todo tipo de loucura": "conversamos com oráculos, imploramos milagres a outros deuses, qualquer coisa que pudéssemos imaginar, mas nada funcionou."
"Então é o seguinte": "Sarina morava lá, sozinha, até que um dia goblins a sequestraram no porão. Ela diz que nunca mais vai chegar perto de lá. Mas as roupas dela estão lá, e ela está esticando todas as minhas blusas! Você pode encontrar as coisas dela?\""
"Então, há alguns meses, ouvimos falar de um tipo especial de magia em Gazluk. Um xamã em uma cidade orc poderia supostamente ajudá-lo. Então levei Rick para esta cidade com um guia orc que contratamos. O guia disse que entraríamos bem, mas ele se enganou": "foi atingido por uma besta gigante e morreu. Eu fugi e os orcs capturaram Rick. Então tudo que posso dizer é que Rick está em algum lugar de Gazluk, talvez ainda naquela cidade orc. Eu realmente não acho que você deva procurá-lo porque você vai morrer. Mas se você fizer isso, diga a ele que sinto muito.\""
"Então, que tal apenas conceder vida eterna aos necromantes vivos? Não": "Kajich diz que todas as coisas vivas devem temer o túmulo. Então aqui estamos, resolvendo pequenos problemas em vez de lidar com as questões fundamentais.\""
