"Humans and orcs have very similar biology. Orcish sages believe that humans are a weak offshoot race.": "Humanos e orcs têm biologia muito semelhante. Os sábios Orcs acreditam que os humanos são uma raça ramificada fraca."
"Humans are notoriously prudish and petty, but they are extremely loyal to their friends and allies. They value honesty and hard work, and hate lazy people.": "Os humanos são notoriamente pudicos e mesquinhos, mas são extremamente leais aos seus amigos e aliados. Eles valorizam a honestidade e o trabalho árduo e odeiam pessoas preguiçosas."
"Humans say: \"There's two kinds: the city dwellers and the nomads. The city ones keep slaves, which is obscene. But the nomads are pretty lazy, preferring to hunt for sport rather than work to improve themselves.\"": "Os humanos dizem: “Existem dois tipos: os moradores das cidades e os nômades. Os citadinos mantêm escravos, o que é obsceno. Mas os nômades são muito preguiçosos, preferindo caçar por esporte em vez de trabalhar para se aprimorarem”."
"Humans say: \"They're friendly and honest, but don't be fooled: all elves are disgusting perverts. They're probably charm-rapists, too!\"": "Os humanos dizem: \"Eles são amigáveis ​​e honestos, mas não se engane: todos os elfos são pervertidos nojentos. Provavelmente também são estupradores de charme!\""
