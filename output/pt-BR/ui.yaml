"Rahu is named after a horrific creature that lives on the ancestral rakshasa homeworld of Ravana.": "Rahu recebeu o nome de uma criatura horrível que vive no planeta natal ancestral dos rakshasa, Ravana."
"Raising one skill often gives bonus levels in another skill. Bonus levels can raise a skill above its level cap!": "Aumentar uma habilidade geralmente dá níveis de bônus em outra habilidade. Os níveis de bônus podem elevar uma habilidade acima do seu nível máximo!"
"Rakshasa born on their homeworld of Ravana can shapechange at will, but the ones born here are stuck in a single form.": "Rakshasa nascidos em seu mundo natal, Ravana, podem mudar de forma à vontade, mas os nascidos aqui ficam presos em uma única forma."
"Rakshasa originally came from another world, where they were fierce and amoral warriors. But since becoming stranded on this world, new generations of rakshasa have developed a sense of morals and righteousness. They are still learning to combine their warrior instincts and their newfound sense of fairness.": "Rakshasa veio originalmente de outro mundo, onde eram guerreiros ferozes e amorais. Mas desde que ficaram presos neste mundo, as novas gerações de rakshasa desenvolveram um senso de moral e retidão. Eles ainda estão aprendendo a combinar seus instintos guerreiros e seu recém-descoberto senso de justiça."
"Rakshasa say: \"Their laws are surprisingly primitive, they're prone to bouts of depression that last for decades, and they're constantly washing their hands. But they're generous and fair, in their way.\"": "Os Rakshasa dizem: \"Suas leis são surpreendentemente primitivas, eles são propensos a crises de depressão que duram décadas e lavam constantemente as mãos. Mas são generosos e justos, à sua maneira.\""
"Rakshasa say: \"They're trustworthy merchants and they make charismatic leaders. They love feeling in control... it makes them happy. They work incredibly long hours.\"": "Rakshasa diz: \"Eles são comerciantes confiáveis ​​e são líderes carismáticos. Eles adoram se sentir no controle... isso os deixa felizes. Eles trabalham horas incrivelmente longas.\""
"Rakshasa that are born in Rahu have a sense of morality. The elder rakshasa from Ravana consider morality to be a disease.": "Os Rakshasa que nasceram em Rahu têm um senso de moralidade. Os rakshasa mais velhos de Ravana consideram a moralidade uma doença."
