"Orcs are not very fond of slaves: too weak, or else too dangerous. They never take prisoners of war.": "Orcs não gostam muito de escravos: muito fracos ou muito perigosos. Eles nunca fazem prisioneiros de guerra."
"Orcs say: \"Rakshasa are good allies, 'cuz what's not to like about a swordfighting tiger? But never trust 'em. They can turn on you in a second. One second they're helping you 'achieve justice,' and the next second 'you've gone too far and now you must die.' Watch your back around 'em.\"": "Orcs dizem: \"Rakshasa são bons aliados, porque o que há para não gostar em um tigre lutador de espadas? Mas nunca confie neles. Eles podem se voltar contra você em um segundo. Em um segundo eles estão ajudando você a 'alcançar a justiça' e no segundo seguinte 'você foi longe demais e agora deve morrer.' Cuidado com eles.\""
"Orcs say: \"The smart ones have silver tongues and can trick an orc out of his breakfast. But the dumb ones are dumber than any orc! Their warriors are no match for orcs, but their wizards are feared. Human merchant camps are neutral ground, so try not to burn those down too often.\"": "Orcs dizem: \"Os espertos têm línguas de prata e podem enganar um orc para tirar seu café da manhã. Mas os burros são mais burros do que qualquer orc! Seus guerreiros não são páreo para os orcs, mas seus magos são temidos. Os acampamentos de comerciantes humanos são terreno neutro, então tente não queimá-los com muita frequência. \""
"Orcs say: \"They become set in their ways and then they're easily manipulated. They're dangerous warriors, but then they get annoyed by blood and dirt. That's hilarious. You can't tell from looking whether an elf is a warrior or a wizard or just a farmer, so be careful picking fights.\"": "Orcs dizem: \"Eles se tornam obstinados e então são facilmente manipulados. Eles são guerreiros perigosos, mas ficam irritados com sangue e sujeira. Isso é hilário. Você não pode dizer olhando se um elfo é um guerreiro, um mago ou apenas um fazendeiro, então tome cuidado ao escolher brigas.\""
