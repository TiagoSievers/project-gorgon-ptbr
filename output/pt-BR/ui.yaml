"Goblin tribes are commercial entities. Warriors sign a five-year contract and are fiercely loyal until the contract ends.": "Tribos Goblins são entidades comerciais. Os Warriors assinam um contrato de cinco anos e são extremamente leais até o término do contrato."
"Goblins are master artisans, but most other races refuse to trade with them for ethical reasons.": "Goblins são mestres artesãos, mas a maioria das outras raças se recusam a negociar com eles por razões éticas."
"Goblins don't have a word for 'please'. But they do have a word that means 'I'll owe you a favor'.": "Goblins não têm uma palavra para 'por favor'. Mas eles têm uma palavra que significa 'eu lhe devo um favor'."
"Goblins have a reputation as perverted and sadistic slavers.": "Os goblins têm a reputação de traficantes de escravos pervertidos e sádicos."
"Goblins will mate with anything. It's said that bugbears are the offspring of goblins and their pet bears.": "Goblins acasalam com qualquer coisa. Dizem que os bugbears são descendentes de goblins e de seus ursos de estimação."
