"Whenever you win a fight, you earn experience points (or \"XP\") for the skills you used during the battle. It's a good idea to use an ability from both of your combat bars so that you earn XP for both of your active combat skills. They'll both level up and you'll gain new abilities.": "Sempre que você vence uma luta, você ganha pontos de experiência (ou “XP”) pelas habilidades usadas durante a batalha. É uma boa ideia usar uma habilidade de ambas as barras de combate para ganhar XP por ambas as habilidades de combate ativas. Ambos subirão de nível e você ganhará novas habilidades."
