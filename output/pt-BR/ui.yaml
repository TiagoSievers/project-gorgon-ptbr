"You Found Armor": "Você encontrou armadura"
"You found armor. Equip that! It will give you Armor points, which help keep you alive. When you're attacked, half the damage is absorbed by your Armor and the other half by your Health. (See the bars at the top of the screen?) If you run out of Armor, all the damage goes to Health instead. If you run out of Health, you die.": "Você encontrou armadura. Equipe isso! Isso lhe dará pontos de armadura, que ajudam a mantê-lo vivo. Quando você é atacado, metade do dano é absorvido pela sua Armadura e a outra metade pela sua Saúde. (Vê as barras no topo da tela?) Se você ficar sem Armadura, todo o dano vai para a Saúde. Se você ficar sem saúde, você morre."
