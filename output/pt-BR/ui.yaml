"The '!' icon over a monster's head means that they've shouted for help.": "O '!' ícone sobre a cabeça de um monstro significa que eles gritaram por socorro."
"The Council created a settlement in Gazluk a few years ago, but due to limited resources and hostility from orcs, things did not go well.": "O Conselho criou um assentamento em Gazluk há alguns anos, mas devido aos recursos limitados e à hostilidade dos orcs, as coisas não correram bem."
"The Council is a group of five mages, each with powers that rival the gods.": "O Conselho é um grupo de cinco magos, cada um com poderes que rivalizam com os deuses."
"The Crone Hegemony is a large country adjacent to The Council Lands. They aren't friendly.": "A Hegemonia Crone é um grande país adjacente às Terras do Conselho. Eles não são amigáveis."
"The daily casino excursions are a great way to earn some extra councils, and maybe make some new friends!": "As excursões diárias ao cassino são uma ótima maneira de ganhar alguns conselhos extras e talvez fazer novos amigos!"
"The elven metropolis of Dwyndarre was destroyed two years ago. A million elves died, and their whole country still mourns.": "A metrópole élfica de Dwyndarre foi destruída há dois anos. Um milhão de elfos morreram e todo o país ainda está de luto."
"The First Aid skill can mend broken bones and cure many diseases. Invest in it yourself, or ask others for help!": "A habilidade de Primeiros Socorros pode consertar ossos quebrados e curar muitas doenças. Invista você mesmo ou peça ajuda a outras pessoas!"
"The first time you complete a new recipe, you get a big bonus to XP.": "Na primeira vez que você completa uma nova receita, você ganha um grande bônus de XP."
"The goblin slave trade has been booming thanks to an influx of fairy refugees. Fairies make docile, if fragile, slaves.": "O comércio de escravos goblins tem crescido graças ao influxo de fadas refugiadas. As fadas são escravas dóceis, embora frágeis."
"The Official PG Discord Server!": "O servidor oficial do Discord do PG!"
"The Serbule Crypt was sealed long ago, but was accidentally re-opened when Council engineers rebuilt the town.": "A Cripta Serbule foi selada há muito tempo, mas foi acidentalmente reaberta quando os engenheiros do Conselho reconstruíram a cidade."
"The Snowblood Orcs have camps throughout Gazluk, waiting for the signal to attack Gazluk City.": "Os Snowblood Orcs têm acampamentos por toda Gazluk, aguardando o sinal para atacar a cidade de Gazluk."
"The Trade channel can be accessed by typing '/c trade' in chat.": "O canal Trade pode ser acessado digitando '/c trade' no chat."
"The Trade chat channel can be a great place to request special items or crafted gear.": "O canal de bate-papo comercial pode ser um ótimo lugar para solicitar itens especiais ou equipamentos artesanais."
"The word 'evil' is often a political term in Rahu. Outsiders who don't understand the nuances of rakshasa culture should avoid the word.": "A palavra 'mal' é frequentemente um termo político em Rahu. Pessoas de fora que não entendem as nuances da cultura rakshasa devem evitar a palavra."
"There are said to be 37 gods, but once there were even more.": "Diz-se que existem 37 deuses, mas antigamente havia ainda mais."
"There was a problem authenticating with Steam.": "Ocorreu um problema na autenticação com o Steam."
"There's a lot of craft skills. Don't try to master them all at once! Focus on one or two and buy needed parts from other players.": "Existem muitas habilidades artesanais. Não tente dominá-los todos de uma vez! Concentre-se em um ou dois e compre as peças necessárias de outros jogadores."
"There's some feeble old skeletons nearby. Walk up, click on one, then press the sword attack button at the bottom of the screen to hit it. Repeat as needed.": "Há alguns esqueletos velhos e fracos por perto. Suba, clique em um e pressione o botão de ataque de espada na parte inferior da tela para acertá-lo. Repita conforme necessário."
"These settings are only available from inside the game world.": "Essas configurações estão disponíveis apenas dentro do mundo do jogo."
"Thinking of selling an item? Sometimes it's better to gift it to an NPC to increase their Favor!": "Pensando em vender um item? Às vezes é melhor presentear um NPC para aumentar seu favor!"
"This <color=red>Legacy Item</color> will permanently break on": "Este <color=red>item legado</color> irá quebrar permanentemente"
"This character is dying!": "Esse personagem está morrendo!"
"This character is using an old model! Update its appearance to a new model by clicking 'Update Model' above.": "Este personagem está usando um modelo antigo! Atualize sua aparência para um novo modelo clicando em “Atualizar modelo” acima."
"This is a <b>meal</b>. Meals stack with snack foods; you can eat one of each and get the benefits of both.": "Esta é uma <b>refeição</b>. Pilha de refeições com salgadinhos; você pode comer um de cada e obter os benefícios de ambos."
"This is a <b>snack</b>. Snacks stack with meal foods; you can eat one of each and get the benefits of both.": "Este é um <b>lanche</b>. Pilha de lanches com alimentos de refeição; você pode comer um de cada e obter os benefícios de ambos."
"This is a bonus character slot for being a VIP member. If you stop being a VIP, you will lose access to the character in this slot at that time. You can regain access by becoming a VIP member again, or by deleting characters from the other slots. Note that characters are ordered with the most recently used first.": "Este é um slot de personagem bônus por ser um membro VIP. Se você deixar de ser VIP, perderá o acesso ao personagem neste slot naquele momento. Você pode recuperar o acesso tornando-se membro VIP novamente ou excluindo personagens de outros slots. Observe que os caracteres são ordenados com o usado mais recentemente primeiro."
