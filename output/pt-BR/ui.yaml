"Ever since the Duke of Eltibule was mysteriously assassinated, all attempts to tame that land seem to run into bad luck. Weird.": "Desde que o duque de Eltibule foi misteriosamente assassinado, todas as tentativas de domar aquela terra parecem dar azar. Esquisito."
"Everyone agrees that humans make excellent traders and negotiators.": "Todos concordam que os humanos são excelentes comerciantes e negociadores."
"Everyone knows that it's nearly impossible to piss off an elf... they're just so friendly and patient! But if you DO get them angry somehow, they never forgive and they never relent.": "Todo mundo sabe que é quase impossível irritar um elfo... eles são tão amigáveis ​​e pacientes! Mas se você os irritar de alguma forma, eles nunca perdoarão e nunca cederão."
"Everyone knows that rakshasa are quick to anger, but most are also quick to forgive. They're also known for their complex sense of justice and their dry sense of humor.": "Todo mundo sabe que os rakshasa ficam com raiva rapidamente, mas a maioria também perdoa rapidamente. Eles também são conhecidos por seu complexo senso de justiça e seu senso de humor seco."
"Everyone knows there are four types of fairies, one for each season. The Winter and Spring fae are dangerous and scary. The Summer and Fall fairies are more reasonable. (All player fairies are assumed to be Summer fae.)": "Todo mundo sabe que existem quatro tipos de fadas, uma para cada estação. As fadas do Inverno e da Primavera são perigosas e assustadoras. As fadas do verão e do outono são mais razoáveis. (Todas as fadas dos jogadores são consideradas fadas do verão.)"
