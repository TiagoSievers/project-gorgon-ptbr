"Gazluk City is a modern orcish city built atop an ancient keep. Visitors are not welcome -- not even other orc clans.": "A cidade de Gazluk é uma cidade orc moderna construída no topo de uma antiga fortaleza. Visitantes não são bem-vindos – nem mesmo outros clãs orcs."
"Gazluk Plateau has been the home of one orc tribe or another for thousands of years.": "O Planalto Gazluk tem sido o lar de uma ou outra tribo de orcs há milhares de anos."
"Genetics for:": "Genética para:"
"Geography: Rakshasa control a small area of land that is largely inhospitable to other races. Their holdings abut both the Council Lands and the Crone Hegemony, and they have made an uncomfortable peace with their neighbors.": "Geografia: Os Rakshasa controlam uma pequena área de terra que é em grande parte inóspita para outras raças. Suas propriedades confinam tanto com as Terras do Conselho quanto com a Hegemonia da Anciã, e eles fizeram uma paz desconfortável com seus vizinhos."
"Geography: The first country you'll explore is called The Council Lands, where humans are the most populous race. The laws are very human-centric: slavery, homosexuality, and mind-affecting magics are outlawed, while taxes and hard work are the norm.": "Geografia: O primeiro país que você explorará chama-se The Council Lands, onde os humanos são a raça mais populosa. As leis são muito centradas no ser humano: a escravidão, a homossexualidade e as magias que afetam a mente são proibidas, enquanto os impostos e o trabalho duro são a norma."
"Geography: The nearest elven country is Verta, which recently suffered a horrific disaster. Dwyndarre was a major metropolis that was completely destroyed by an unknown force. Some survivors have fled to the Council Lands.": "Geografia: O país élfico mais próximo é Verta, que recentemente sofreu um terrível desastre. Dwyndarre era uma grande metrópole que foi completamente destruída por uma força desconhecida. Alguns sobreviventes fugiram para as Terras do Conselho."
