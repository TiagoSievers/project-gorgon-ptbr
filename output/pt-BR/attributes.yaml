"When mining by hand (not from surveys), this is the chance you find extra minerals.": "Ao minerar manualmente (não por meio de pesquisas), esta é a chance de você encontrar minerais extras."
"When you card cotton, this is the chance that you get extra Perfect Cotton": "Quando você carda algodão, esta é a chance de obter Algodão Perfeito extra"
"When you catch a fish, this is the chance you catch a bonus extra fish": "Quando você pesca um peixe, esta é a chance de você pegar um peixe extra bônus"
