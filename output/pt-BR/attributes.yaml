"When you collect flower seeds in the wilderness, this affects your chance of getting a seed.": "Quando você coleta sementes de flores no deserto, isso afeta suas chances de obter uma semente."
"When you collect flower seeds in the wilderness, this affects your chance of getting a stack of 2 seeds. This stacks with LOOT_CHANCE_EXTRA_SEEDS": "Quando você coleta sementes de flores no deserto, isso afeta sua chance de obter uma pilha de 2 sementes. Isso acumula com LOOT_CHANCE_EXTRA_SEEDS"
"When you collect flower seeds in the wilderness, this affects your chance of getting a thorn instead of a seed. (The bonus seed from LOOT_CHANCE_EXTRA_SEEDS is unaffected.)": "Quando você coleta sementes de flores no deserto, isso afeta sua chance de obter um espinho em vez de uma semente. (A semente bônus de LOOT_CHANCE_EXTRA_SEEDS não é afetada.)"
"When you collect seeds in the wilderness, this is the chance that you'll get an extra seed": "Quando você coleta sementes no deserto, esta é a chance de você conseguir uma semente extra"
"When you excavate an ancient bone site, this is the chance you find an extra fossil.": "Quando você escava um sítio ósseo antigo, esta é a chance de encontrar um fóssil extra."
"When you filet a fish, this is the chance that you get bonus fish scales": "Quando você corta um peixe, esta é a chance de ganhar escamas de peixe bônus"
"When you forage a mushroom, this is the chance that you'll forage up a second mushroom at the same time": "Quando você procura um cogumelo, esta é a chance de você colher um segundo cogumelo ao mesmo tempo"
"When you forage fruit, sap, bark, juice and similar items from nature, this is the chance that you'll get an extra item": "Quando você coleta frutas, seiva, casca, suco e itens semelhantes da natureza, esta é a chance de você obter um item extra"
"When you grow your own plants and flowers, this is the chance that you'll receive an extra item when you harvest it": "Quando você cultiva suas próprias plantas e flores, esta é a chance de você receber um item extra ao colhê-las"
"When you hire a shopkeeper to sell your wares, that shopkeeper's base inventory size is augmented by this number": "Quando você contrata um lojista para vender seus produtos, o tamanho do estoque básico desse lojista é aumentado por este número"
"When you hire a shopkeeper to sell your wares, the cost per day is multiplied by this amount": "Quando você contrata um lojista para vender seus produtos, o custo por dia é multiplicado por esse valor"
"When you hire a shopkeeper to sell your wares, this is the number of days' worth of shop logs available for you to review": "Quando você contrata um lojista para vender seus produtos, este é o número de dias de registros da loja disponíveis para você revisar"
