"You take 33% less damage from falling.": "Вы получаете на 33% меньше урона от падения."
"You take 50% less damage from falling, and you can steer somewhat while falling.": "Вы получаете на 50% меньше урона от падения, и можете немного управлять падением."
"You take no damage from falling, and you fall slower, allowing you to steer in the air.": "Вы не получаете урона от падения и падаете медленнее, что позволяет управлять полётом."
"You're terrified of rats!": "Вы боитесь крыс!"
"You're terrified of spiders of any size!": "Вы боитесь пауков любого размера!"
"You're terrified of cakes and similar baked goods!": "Вы боитесь тортов и похожей выпечки!"
"You're terrified of goblins, as well as anything associated with goblins!": "Вы боитесь гоблинов и всего, что с ними связано!"
"You're terrified of dogs, wolves, and other canines!": "Вы боитесь собак, волков и других псовых!"
"You're terrified of snakes and other reptiles!": "Вы боитесь змей и других рептилий!"
"You're afraid of members of the opposite sex!": "Вы боитесь представителей противоположного пола!"
"You're terrified of magical portals!": "Вы боитесь магических порталов!"
"You're scared of cows!": "Ты боишься коров!"
"You're afraid of trees and other large vegetation!": "Вы боитесь деревьев и другой крупной растительности!"
"You've become convinced that invisible demons are tracking you and obstructing your every effort.": "Вы уверены, что невидимые демоны следят за вами и мешают каждому вашему шагу."
"You believe that everything around you is made of candy, cake, or other sugary treats!": "Вам кажется, что всё вокруг сделано из конфет, тортов и других сладостей!"
"You just realized that you're in the presence of nobility. In fact, EVERYONE around you is a King (or Queen) except you!": "Ты только что понял, что находишься в окружении знати. На самом деле, ВСЕ вокруг — короли (или королевы), кроме тебя!"
"You believe you can fly!": "Вам кажется, что вы можете летать!"
"You believe you've become entirely invisible, except to demons. Anyone who can see you must be a demon in disguise.": "Вам кажется, что вы полностью невидимы, кроме демонов. Кто может вас видеть — должен быть демоном под прикрытием."
"You believe you're at a vast, world-encompassing dance party! Why isn't everyone else dancing? They're being so rude to your host!": "Вам кажется, что вы на огромной, охватывающей весь мир танцевальной вечеринке! Почему никто не танцует? Они так грубы по отношению к вашему хозяину!"
"You just remembered that you are a dragon in disguise, sent to assassinate a certain target!": "Ты только что вспомнил, что ты дракон в маскировке, посланный убить определённую цель!"
"You seem to have an extra arm! How convenient!": "Похоже, у вас появилась дополнительная рука! Как удобно!"
"Oh no, your face fell off! You're hideous now!": "О нет, ваше лицо отвалилось! Теперь вы ужасны!"
"You think everyone around you is speaking in a code language you can barely understand. What are they trying to hide?": "Вам кажется, что все вокруг говорят на каком-то кодовом языке, который вы едва понимаете. Что они пытаются скрыть?"
"You find that you can only speak in rhyme! (Whew, good thing slant rhymes are okay!)": "Вы обнаруживаете, что можете говорить только в рифму! (Фух, хорошо, что допускаются косые рифмы!)"
"You find that you can only speak in riddles!": "Вы обнаруживаете, что можете говорить только загадками!"
"Everything is hilarious! You can't stop laughing!": "Всё кажется смешным! Ты не можешь перестать смеяться!"
"You can't speak! You can only pantomime!": "Вы не можете говорить! Можете только пантомимить!"
"When you say a pronoun (like 'him' or 'her' or 'me' or 'them') it comes out as a gibberish word!": "Когда вы произносите местоимение (например, «его», «её», «меня» или «их»), оно превращается в бессмысленное слово!"
"You can no longer understand the concept of the number three! Even the word has no meaning to you!": "Ты больше не понимаешь концепцию числа три! Даже слово для тебя лишено смысла!"
"You now perceive all males as females, and vice versa!": "Вы теперь воспринимаете всех мужчин как женщин, и наоборот!"
"You keep saying molly-coddle all the time! What does that even mean?": "Ты всё время говоришь «молли-коддл»! Что это вообще значит?"
"You feel compelled to count everything you see. Out loud!": "Вас тянет вслух считать всё, что видите."
"You can't walk; you can only hop!": "Вы не можете ходить; можете только прыгать!"
"All your teeth are loose! You have to be really careful or they'll all fall out!": "Все ваши зубы шатаются! Нужно быть очень осторожным, иначе они все выпадут!"
"You've just realized that everyone you know is a goblin spy!": "Вы только что поняли, что все, кого вы знаете — шпионы-гоблины!"
"You've just realized that everyone you know is trying to steal your money!": "Вы только что поняли, что все, кого вы знаете, пытаются украсть у вас деньги!"
"Tiny bats are flying everywhere. They keep trying to fly down your throat and choke you to death!": "Крошечные летучие мыши летают повсюду. Они пытаются залететь вам в горло и задушить вас!"
"You believe you're the Queen of a distant land. You expect to be treated like visiting royalty.": "Вам кажется, что вы королева далекой земли. Вы ожидаете, что с вами будут обращаться как с королевской особой в гостях."
"You just noticed that all of your money is counterfeit! You're broke!": "Ты только что заметил, что все твои деньги фальшивые! Ты на мели!"
"You lost the ability to see yellow things. They're completely invisible to you!": "Вы потеряли способность видеть жёлтые вещи. Они для вас полностью невидимы!"
"You lost the ability to see green things. They're completely invisible to you!": "Вы потеряли способность видеть зелёные вещи. Они для вас полностью невидимы!"
"You believe you are a large flightless bird with a dangerous beak.": "Вам кажется, что вы большая нелетающая птица с опасным клювом."
"You're deathly afraid of getting wet!": "Ты смертельно боишься намокнуть!"
"You believe you've swapped bodies with another player. No doubt this is their fault!": "Вам кажется, что вы поменялись телами с другим игроком. Без сомнения, это их вина!"
"Everyone you know is trying hard to make you look like a fool. The most frustrating part is they won't admit it!": "Все, кого ты знаешь, изо всех сил стараются выставить тебя дураком. Самое раздражающее — они этого не признают!"
"You're terrified by the idea of crossing a bridge!": "Вы в ужасе от мысли перейти мост!"
"You're deathly afraid of milk, cheese, or any food containing dairy products.": "Ты смертельно боишься молока, сыра или любой еды, содержащей молочные продукты."
"You've become terrified of eating meat!": "Вы стали бояться есть мясо!"
"You keep seeing a hairy ape-man in the corner of your eye. Is he friend or foe?": "Ты всё время видишь волосатого обезьяноподобного человека в уголке глаза. Друг он или враг?"
"You've become the most beautiful person in the world!": "Вы стали самым красивым человеком на свете!"
"You lost the ability to say the letter R or pronounce an R sound.": "Вы потеряли способность произносить букву Р или звук Р."
"Everyone is trying to get you to make eye contact so they can steal your soul!": "Все пытаются заставить тебя встретиться взглядом, чтобы украсть твою душу!"
"Everything is so sad! You can't stop crying!": "Всё так грустно! Ты не можешь перестать плакать!"
"Some damage from any Slashing/Piercing/Crushing attack that hits you is absorbed and channeled into your next Front Kick.": "Часть урона от любого рубящего/колющего/дробящего удара, который попадает по тебе, поглощается и направляется в твоё следующее Переднее пинок."
"Some damage from any Poison/Trauma/Psychic attack that hits you is absorbed and added to your next Stampede attack a 200% rate.": "Часть урона от любого Яд/Травма/Ментальный атаки, которая попадает по тебе, поглощается и добавляется к твоей следующей атаке Таран с коэффициентом 200%."
