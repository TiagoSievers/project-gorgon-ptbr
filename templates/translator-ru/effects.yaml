"Speaking this word implants a minor undead spirit inside your body. After a brief gestation it erupts in a gory (and often fatal) explosion. It will serve you as long as you remain in the same general area.": "Произнесение этого слова внедряет в ваше тело небольшой дух нежити. После короткого периода вынашивания он взрывается кровавым (и часто смертельным) взрывом. Он будет служить вам, пока вы остаетесь в той же общей области."
"Speaking this word implants a minor undead spirit inside your body. After a brief gestation it erupts in a gory (and probably fatal) explosion. It will serve you as long as you remain in the same general area.": "Произнесение этого слова внедряет в ваше тело небольшой дух нежити. После короткого периода развития он взрывается кровавым (и, вероятно, смертельным) взрывом. Он будет служить вам, пока вы остаетесь в том же районе."
