"Speaking this word of power makes it much more likely that any equipment you find in loot will be Rare equipment. Lasts 1 hour.": "Произнесение этого слова силы значительно повышает вероятность того, что любое найденное вами снаряжение в добыче будет Редким. Длится 1 час."
"Speaking this word of power makes it much more likely that any equipment you find in loot will be Epic equipment. Lasts 1 hour.": "Произнесение этого слова силы значительно повышает вероятность того, что любое найденное вами снаряжение в добыче будет Эпическим. Длится 1 час."
"Speaking this word of power makes it much more likely that any equipment you find in loot will be Legendary equipment. Lasts 1 hour.": "Произнесение этого слова силы значительно повышает вероятность того, что любое найденное вами снаряжение в добыче будет Легендарным. Длится 1 час."
"Speaking this word of power boosts Archery Base Damage +50% damage for 5 minutes.": "Произнесение этого слова силы увеличивает базовый урон Стрельбы из лука на +50% в течение 5 минут."
"Speaking this word of power makes it impossible for you to sprint for 5 minutes.": "Произнесение этого слова силы делает невозможным для вас спринт в течение 5 минут."
"Speaking this word of power makes all your attacks seem twice as damaging to monsters, effectively taunting them to attack you instead of your allies. Lasts 15 minutes.": "Произнесение этого слова силы заставляет все ваши атаки казаться вдвое более мощными для монстров, эффективно провоцируя их атаковать вас вместо союзников. Длится 15 минут."
"Speaking this word of power makes all your attacks seem 3x as damaging to monsters, effectively taunting them to attack you instead of your allies. Lasts 15 minutes.": "Произнесение этого слова силы заставляет все ваши атаки казаться в 3 раз более разрушительными для монстров, эффективно провоцируя их атаковать вас вместо ваших союзников. Длится 15 минут."
"Speaking this word of power makes all your attacks seem 4x as damaging to monsters, effectively taunting them to attack you instead of your allies. It also devastates your Hygiene score. Lasts 15 minutes.": "Произнесение этого слова силы заставляет все ваши атаки казаться в 4 раз мощнее для монстров, эффективно провоцируя их атаковать вас вместо союзников. Также это сильно портит ваш показатель Гигиены. Длится 15 минут."
"Speaking this word of power causes you to weigh less, but your bones become extremely brittle. You can jump higher, but take more damage from falling. Lasts 5 minutes.": "Произнесение этого слова силы уменьшает ваш вес, но ваши кости становятся чрезвычайно хрупкими. Вы можете прыгать выше, но получаете больше урона от падения. Длится 5 минут."
"Speaking this word makes you swim much faster for five minutes.": "Произнесение этого слова заставляет вас плавать намного быстрее в течение пяти минут."
"Speaking this word doubles your lung capacity for five minutes.": "Произнесение этого слова удваивает ёмкость ваших лёгких на пять минут."
"Speaking this word causes you to hyperventilate underwater so that your breath depletes at five times its normal rate. Lasts 5 minutes.": "Произнесение этого слова заставляет вас гипервентиллировать под водой, из-за чего дыхание расходуется в пять раз быстрее обычного. Длится 5 минут."
"Speaking this word weakens your body so that all attacks cost +5 Power. Lasts 5 minutes.": "Произнося это слово, вы ослабляете своё тело, и все атаки теперь стоят +5 энергии. Длится 5 минут."
"Speaking this word of power causes the speaker to earn +35% Combat XP for 30 minutes.": "Произнесение этого слова силы заставляет произносящего получать +35% боевого опыта в течение 30 минут."
"Speaking this word of power causes the speaker to earn +60% Combat XP for 30 minutes.": "Произнесение этого слова силы заставляет произносящего получать +60% боевого опыта в течение 30 минут."
"Speaking this word of power makes all your attacks seem 4x as damaging to monsters, effectively taunting them to attack you instead of your allies. It also devastates your Hygiene score. Lasts 1 hour.": "Произнесение этого слова силы заставляет все ваши атаки казаться в 4 раз мощнее для монстров, эффективно провоцируя их атаковать вас вместо союзников. Также это сильно портит ваш показатель Гигиены. Длится 1 час."
"Speaking this word makes you look like a human for 90 seconds. Townsfolk and shopkeepers will perceive you as a human and their memories will be temporarily altered so that they think you've always been a human.": "Произнесение этого слова заставляет вас выглядеть как человек в течение 90 секунд. Жители городов и торговцы будут воспринимать вас как человека, а их воспоминания временно изменятся так, будто вы всегда были человеком."
"Speaking this word makes you look like an elf for 120 seconds. Townsfolk and shopkeepers will perceive you as an elf and their memories will be temporarily altered so that they think you've always been an elf.": "Произнесение этого слова заставляет вас выглядеть как эльф в течение 120 секунд. Жители городов и торговцы будут воспринимать вас как эльфа, а их воспоминания временно изменятся так, будто вы всегда были эльфом."
"Speaking this word makes you look like a rakshasa for 150 seconds. Townsfolk and shopkeepers will perceive you as a rakshasa and their memories will be temporarily altered so that they think you've always been a rakshasa.": "Произнесение этого слова заставляет вас выглядеть как ракшаса в течение 150 секунд. Жители городов и торговцы будут воспринимать вас как ракшасу, а их воспоминания временно изменятся так, будто вы всегда были ракшасой."
"Speaking this word teleports you to a tropical island.": "Произнесение этого слова телепортирует вас на тропический остров."
"Speaking this word teleports you to a vast desert.": "Произнесение этого слова телепортирует вас в обширную пустыню."
