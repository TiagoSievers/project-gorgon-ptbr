"Plant Spawn Premonition: You can detect where plant-creatures will spawn. You'll see a premonition for 10 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Предчувствие появления растений: вы можете обнаружить, где появятся растительные существа. Вы увидите предчувствие за 10 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
"Ungulate Spawn Premonition: You can detect where ungulates will spawn. You'll see a premonition for 10 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Предчувствие появления копытных: ты можешь обнаружить, где появятся копытные. Ты видишь предчувствие за 10 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
"Incorporeal Spawn Premonition: You can detect where ghosts and other incorporeal creatures will spawn. You'll see a premonition for 10 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Предчувствие появления бесформенных: вы можете обнаружить, где появятся призраки и другие бесформенные существа. Вы увидите предчувствие за 10 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
