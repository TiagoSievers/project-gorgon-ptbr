"Your blood has frozen inside your veins! This is traumatic (as in, Trauma damage)!\n\n20 Power lost per second\nUse First Aid 3+ to dispel this effect.": "Ваша кровь замерзла в венах! Это травматично (как в уроне Травмой)!\n\nПотеря энергии 20 в секунду\nИспользуйте Первая помощь 3+ чтобы снять этот эффект."
"Magical ice has been embedded in your body.\nYou sometimes lose half your health when not in a cold area.\n+25% Max Body Heat\nThis is permanent; defeat Coldfeather to remove it.": "Магический лед внедрился в ваше тело.\nИногда вы теряете половину здоровья, когда находитесь вне холодной зоны.\n+25% Максимальное телесное тепло\nЭто навсегда; чтобы снять эффект, победите Холодное Перо."
"DamageType:Psychic": "Тип урона: Ментальный"
