"Combo: Sword Slash+Wind Strike+Any Melee: final step restores 100 armor.": "Комбо: Удар мечом+Удар ветра+Любая атака ближнего боя: финальный шаг восстанавливает 100 брони."
"Combo: Wind Strike+Finishing Blow+Any Melee: final step causes target to bleed for 300 damage over 15 seconds.": "Комбо: Удар ветра+Добивающий удар+Любая атака ближнего боя: финальный шаг заставляет цель кровоточить, нанося 300 урона в течение 15 секунд."
