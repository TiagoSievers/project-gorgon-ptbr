# ── Описания эффектов ──
"You are covered in lemon juice and it is super sticky! Your movements are hindered and you stick to everything, including the ground!\nYou lose 3 movement speed and 2 sprint speed.\nYou need to bathe in water to remove the stickiness!": "Ты покрыт лимонным соком, и он суперлипкий! Твои движения затруднены, и ты прилипнешь ко всему, включая землю!\nТы теряешь 3 скорости передвижения и 2 скорости спринта.\nТебе нужно искупаться в воде, чтобы смыть липкость!"
"You have been blessed with the luck of the lemon!\nYou have an extra 5% chance to find legendary gear!": "Вас благословила удача лимона!\nУ вас есть дополнительный 5% шанс найти легендарное снаряжение!"
"Your inventory capacity is expanded by 25 slots for 3 hours. This effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Вместимость твоего инвентаря увеличена на 25 слотов на 3 часов. Этот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы для инвентаря."
"Your inventory capacity is expanded by 50 slots for 3 hours. This effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Вместимость твоего инвентаря увеличена на 50 слотов на 3 часов. Этот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы для инвентаря."
"Your inventory capacity is expanded by 100 slots for 3 hours. This effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Вместимость твоего инвентаря увеличена на 100 слотов на 3 часов. Этот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы для инвентаря."
"Your wings are extra limber and energetic! You experience a slight speed increase and it costs less power to fly when in and out of combat.": "Твои крылья стали особенно гибкими и энергичными! Ты немного быстрее и тратишь меньше энергии на полёт как в бою, так и вне его."
