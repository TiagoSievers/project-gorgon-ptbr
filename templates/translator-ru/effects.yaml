"The water in this area seems to be haunted by ectoplasmic poison.\n-50% Fast-Swim Speed\n+1 Breath Cost/Sec": "Вода в этом районе, кажется, заражена экзоплазменным ядом.\n-50% Скорость быстрого плавания\n+1 Стоимость дыхания в секунду"
"Pleasant warmth keeps the freezing cold away.": "Приятное тепло отгоняет леденящий холод."
"You're feeling ill. But it's not the normal kind of ill...\nYou are taking continuous unblockable damage\n(This can be treated with Treat Disease 3 or higher.)": "Вы чувствуете недомогание. Но это не обычное недомогание...\nВы получаете непрерывный непрерываемый урон\n(Это можно лечить лечением болезней 3 или выше.)"
"It's dangerously cold here.": "Здесь опасно холодно."
"It's extremely cold here!": "Здесь чрезвычайно холодно!"
"Demonic hellfire has sapped your ability to do much of anything.\n\nAll abilities cost {0:0.##} extra power (per stack). This is permanent until cured.": "Демоническое адское пламя истощило твою способность что-либо делать.\n\nВсе способности требуют на {0:0.##} больше энергии (за каждый эффект). Это постоянно, пока не вылечишь."
"You are standing in Hellfire!": "Вы стоите в Адском огне!"
"Intense warmth keeps the freezing cold away, and empowers your abilities.\n\nYou take -10% damage from Cold attacks\nYour Direct Fire attacks do +10% damage\nYou take +20% damage from Fire attacks": "Интенсивное тепло защищает от ледяного холода и усиливает ваши способности.\n\nВы получаете -10% урона от атак Холодом\nВаши прямые атаки Огнём наносят +10% урона\nВы получаете +20% урона от атак Огнём"
"This isn't normal sewage...\n-50 Armor and -25 Health Acid Damage/sec": "Это не обычная канализация...\n-50 Броня и -25 Кислотный урон по здоровью в секунду"
"Something has happened to your eyes. It hurts to see!": "С твоими глазами что-то не так. Смотреть больно!"
"You seem to be immune to damage! Surely there can't be a down side to this.": "Кажется, вы невосприимчивы к урону! Наверняка в этом есть подвох."
"You've turned into a bug... permanently!\nSuffer fae racial armor penalties\n+10% Psychic and Nature Damage": "Вы превратились в жука... навсегда!\nСтрадаете от расовых штрафов к броне Фейри\n+10% урон Ментальный и Природный"
"You have a feeling that a druidic emergency is coming.\n+5% Base Druid Damage": "У вас предчувствие друидской беды.\n+5% базового друидского урона"
"The druids are needed! You hear the calling in your bones and are unable to focus on anything else.\n+10% Base Druid Damage\n-100% Earned Combat XP\n-100% Earned Crafting XP\n-100% Earned Combat Wisdom": "Друидам нужна помощь! Вы слышите зов в своих костях и не можете сосредоточиться ни на чём другом.\n+10% Базовый урон друида\n-100% Полученный боевой опыт\n-100% Полученный опыт ремесла\n-100% Полученная боевая мудрость"
"You have a feeling that a druidic emergency is coming.": "У вас предчувствие друидской беды."
"The druids are needed immediately!": "Друидам срочно нужна помощь!"
"The druids are needed! You are called to a freezing land, but a boon of warmth will help keep you safe.\n+10% Base Druid Damage\n+10 Indirect Cold Mitigation\n-100% Earned Combat XP\n-100% Earned Crafting XP\n-100% Earned Combat Wisdom": "Друидам нужна помощь! Вас зовут в ледяные земли, но благословение тепла поможет сохранить безопасность.\n+10% Базовый урон друида\n+10 Косвенное смягчение холода\n-100% Полученный боевой опыт\n-100% Полученный опыт ремесла\n-100% Полученная боевая мудрость"
"Boosts your Power Regeneration +10 while you're digesting cheese.": "Увеличивает регенерацию энергии на +10 во время переваривания сыра."
"Boosts your Power Regeneration +20 while you're digesting cheese.": "Увеличивает регенерацию энергии на +20 во время переваривания сыра."
"Boosts your Power Regeneration +30 while you're digesting cheese.": "Увеличивает регенерацию энергии на +30 во время переваривания сыра."
"Causes any cheese you eat to last 20 minutes longer.": "Заставляет любой съеденный сыр действовать на 20 минут дольше."
"Causes any cheese you eat to last 40 minutes longer.": "Заставляет любой съеденный сыр действовать на 40 минут дольше."
"Causes any cheese you eat to last 60 minutes longer.": "Заставляет любой съеденный сыр действовать на 60 минут дольше."
"You can see better in low-light conditions.": "Ты лучше видишь в условиях низкой освещённости."
"You're finding it hard to breathe.\nAbilities cost +15 Power to use": "Вам трудно дышать.\nИспользование способностей стоит +15 энергии"
"You're taking poison damage from the fumes!": "Вы получаете урон ядом от паров!"
"This weird cloud is sapping your power!": "Это странное облако высасывает вашу силу!"
"You're breathing Demonic fumes!.\nAbilities cost +30 Power to use": "Ты вдыхаешь демонические испарения!.\nСпособности стоят +30 энергии"
"You're taking poison damage from the infernal fumes!": "Вы получаете урон ядом от инфернальных паров!"
"The infernal fumes are wracking your body, making you vulnerable! +20% vulnerability to all damage.": "Инфернальные пары разрушают ваше тело, делая вас уязвимым! +20% уязвимости ко всем видам урона."
"Only Bard abilities can harm you.": "Тебя могут повредить только способности Барда."
"You're regenerating health from a potion.": "Ты восстанавливаешь здоровье от зелья."
"You're regenerating armor from a potion.": "Ты восстанавливаешь броню от зелья."
"You're regenerating power from a potion.": "Ты восстанавливаешь энергию от зелья."
"You're regenerating health and armor from a potion.": "Ты восстанавливаешь здоровье и броню от зелья."
"Combat Refreshes restore extra Power": "Боевое восстановление восстанавливает дополнительную силу"
"You're moving quickly.": "Ты движешься быстро."
"Your mind is racing at insane speeds!\n+1 power/sec": "Твой разум мчится с безумной скоростью!\n+1 силы/сек"
"You feel slightly rejuvenated and protected from the elements.": "Вы чувствуете себя слегка обновленным и защищенным от стихий."
"You've affixed an extremely hot candle to your head.": "Вы прикрепили к голове чрезвычайно горячую свечу."
"You are very fast when out of combat.": "Вы очень быстры вне боя."
"You are permitted to visit the non-open areas of Rahu. The military areas on the plateau are still off limits, and attacking any townsperson cancels this permit.": "Вам разрешён доступ в закрытые зоны Раху. Военные районы на плато по-прежнему закрыты, а атака на любого жителя отменяет это разрешение."
"You've turned into a bug! Fortunately this will wear off...\n\nSuffer fae racial armor penalties\n+10% Psychic and Nature Damage": "Вы превратились в жука! К счастью, это скоро пройдёт...\n\nСтрадаете от расовых штрафов к броне Фейри\n+10% урон Ментальный и Природный"
"You will take 1000 indirect Poison damage when this effect ends.": "Вы получите 1000 косвенного урона Ядом, когда этот эффект закончится."
"You can see slightly into the future, allowing your attacks to be more accurate.\n+12 Accuracy": "Ты можешь немного заглядывать в будущее, что делает твои атаки точнее.\n+12 точности"
"You will recover health when this effect ends.": "Вы восстановите здоровье, когда этот эффект закончится."
"You will recover armor when this effect ends.": "Вы восстановите броню, когда этот эффект закончится."
"You're feeling a little floaty.\n\nSpeech is very slightly impaired.": "Ты чувствуешь себя немного парящим.\n\nРечь слегка нарушена."
"You're feeling relaxed and floaty.\n\nSpeech is slightly impaired. Things look a little blurry.": "Вы чувствуете расслабление и лёгкость.\n\nРечь слегка нарушена. Всё кажется немного расплывчатым."
"You're feeling relaxed and uninhibited.\n\nSpeech is impaired and things look fuzzy. Every so often you lose your sense of direction.": "Вы чувствуете расслабление и раскованность.\n\nРечь нарушена, и всё кажется размытым. Время от времени вы теряете ориентацию."
"You're feeling great!\n\nYour speech, vision, and sense of direction are impaired.": "Ты чувствуешь себя отлично!\n\nТвоя речь, зрение и чувство направления нарушены."
"You're feeling good, but you know that drinking more will make you very ill.\n\nYour speech, vision, and sense of direction are impaired, and you're becoming indecisive about what abilities to use in combat.": "Ты чувствуешь себя хорошо, но знаешь, что пить дальше будет очень плохо.\n\nТвоя речь, зрение и чувство направления нарушены, и ты становишься нерешительным в выборе умений в бою."
"You've had too much to drink and you're feeling ill.\n\nYour speech, vision, sense of direction, and decisiveness are noticeably impaired.": "Вы перебрали с выпивкой и чувствуете себя плохо.\n\nВаша речь, зрение, чувство направления и решительность заметно ухудшены."
"You're feeling extremely ill, and you know that drinking more could be fatal.\n\nYour speech, vision, sense of direction, and decisiveness are extremely impaired.": "Ты чувствуешь себя ужасно больным, и знаешь, что пить дальше может быть смертельно.\n\nТвоя речь, зрение, чувство направления и решительность крайне нарушены."
"Your heart is beating irregularly and you can't tell what's going on.\n\nYou are extremely impaired and there is a chance of fatal heart attack.": "Твоё сердце бьётся нерегулярно, и ты не понимаешь, что происходит.\n\nТы сильно ослаблен, есть шанс смертельного сердечного приступа."
"You're sweating, dizzy, and your heart is beating like a drum.\n\nYou are fairly likely to die any moment. Prompt medical attention may still save you.": "Ты потеешь, кружится голова, и сердце бьется как барабан.\n\nТы очень близок к смерти. Срочная медицинская помощь может еще спасти тебя."
"Your health is in freefall and you're about to die.": "Твоё здоровье стремительно падает, и ты вот-вот умрёшь."
"You feel terrible. You long for the sweet release of death. Fortunately, death is coming very soon.": "Вы чувствуете себя ужасно. Вы жаждете сладкого освобождения смерти. К счастью, смерть уже близко."
"You are unable to function and your internal organs are ruined. You are already dead; your body just hasn't noticed yet.": "Вы не в состоянии функционировать, и ваши внутренние органы разрушены. Вы уже мертвы; ваше тело просто еще не осознало этого."
"Your deathwish has surely reached fruition... you can feel your organs shutting down...": "Ваше желание смерти, несомненно, сбылось... вы чувствуете, как ваши органы отказывают..."
"You drank a beer.": "Вы выпили пиво."
"You drank a glass of wine.": "Вы выпили бокал вина."
"You drank a shot of hard liquor.": "Вы выпили стопку крепкого алкоголя."
"The intake of something that brought you back to life has left you feeling ill. You can't do that again until after you feel better.": "Приём чего-то, что вернуло вас к жизни, оставил вас больным. Вы не можете повторить это, пока не почувствуете себя лучше."
"That sword in that stone somehow made you feel like getting out of doors and exercising.\n+5% Max Health": "Этот меч в камне как-то заставил тебя захотеть выйти на улицу и позаниматься.\n+5% Максимальное здоровье"
"That sword in that stone somehow made you feel more focused and in tune with your training.\n+5% Earned Combat XP": "Этот меч в камне каким-то образом заставил вас почувствовать себя более сосредоточенным и в гармонии с вашей тренировкой.\n+5% Получено боевого XP"
"That sword in that stone somehow made you feel so optimistic that you want to jump for joy!\n+3 Jump Power": "Этот меч в камне каким-то образом заставил вас почувствовать себя настолько оптимистично, что хочется прыгать от радости!\n+3 Сила прыжка"
"That sword in that stone made you realize you could run faster if you just tried harder.\n+1 Sprint Speed": "Этот меч в камне заставил тебя понять, что можно бегать быстрее, если просто постараться.\n+1 Скорость спринта"
"That sword in that stone made you feel more self-aware, able to access everything your body has to offer.\n+5% Max Power": "Этот меч в камне сделал тебя более осознанным, способным использовать всё, что может тело.\n+5% Максимальная сила"
"That sword in that stone made you feel more deadly with every move you make.\n+10% Direct Damage": "Этот меч в камне заставляет тебя чувствовать себя смертоноснее с каждым движением.\n+10% Прямой урон"
"Most townsfolk and shopkeepers will perceive you as being one of them.": "Большинство горожан и торговцев будут воспринимать вас как своего."
"basic": "базовый"
"advanced": "продвинутый"
"complex": "сложный"
"Dispels werewolf form caused by phase of the moon.": "Снимает форму оборотня, вызванную фазой луны."
"Dispels werewolf form. Does not work during the full moon!": "Снимает форму оборотня. Не работает во время полнолуния!"
"Part of Minor Panacea": "Часть Малого Панацея"
"You look like a skeleton! But it's just an illusion. Monsters and townsfolk won't be confused.": "Вы выглядите как скелет! Но это всего лишь иллюзия. Монстры и жители города не будут в заблуждении."
"You have a friend!": "У вас появился друг!"
"If 3 or more dancers perform this move now, you'll get a performance boost.": "Если 3 или больше танцоров выполняют этот приём сейчас, вы получите бонус к выступлению."
"Recent choreographed dancing has inspired you to new heights.\n+Jump Height": "Недавние хореографические танцы вдохновили тебя на новые высоты.\n+Высота прыжка"
"Recent choreographed dancing has inspired you to move those legs.\n+1 Noncombat Sprint Speed": "Недавние хореографические танцы вдохновили тебя двигать ногами.\n+1 Скорость спринта вне боя"
"Recent choreographed dancing has inspired you to not die.\n+100 Death Avoidance": "Недавние хореографические танцы вдохновили тебя не умирать.\n+100 Избежание смерти"
"Recent choreographed dancing has inspired you to avoid getting hit.\n+10% Melee Evasion": "Недавние хореографические танцы вдохновили тебя избегать ударов.\n+10% Уклонение в ближнем бою"
"Recent choreographed dancing has inspired you to leave the earth. You can fly!": "Недавние хореографические танцы вдохновили тебя покинуть землю. Ты можешь летать!"
"Recent choreographed dancing has inspired you to move with supernatural grace to avoid injuries.\n+25% Electricity Mitigation": "Недавние хореографические танцы вдохновили тебя двигаться с сверхъестественной грацией, чтобы избегать травм.\n+25% Смягчение электрического урона"
"Recent choreographed dancing has inspired you to never get pushed around.\n+100% Knockback Avoidance": "Недавние хореографические танцы вдохновили тебя никогда не поддаваться отбрасыванию.\n+100% Избежание отбрасывания"
"Recent choreographed dancing has inspired you to take careful aim against Evasive enemies.\n+20 Accuracy": "Недавние хореографические танцы вдохновили тебя тщательно прицеливаться против уклоняющихся врагов.\n+20 Точность"
"Recent choreographed dancing has inspired you to be more careful when you chop wood.\n20% Chance to Chop Bonus Perfect Wood": "Недавние хореографические танцы вдохновили тебя быть аккуратнее при рубке дерева.\n20% Шанс получить бонусное идеальное дерево"
"Recent choreographed dancing has inspired you to be more careful when you turn cotton into textiles.\n20% Chance to Obtain Extra Perfect Cotton": "Недавние хореографические танцы вдохновили тебя быть аккуратнее при превращении хлопка в текстиль.\n20% Шанс получить дополнительный идеальный хлопок"
"Recent choreographed dancing has inspired you to be more careful when you pick mushrooms.\n20% Chance to Obtain Extra Mushrooms": "Недавние хореографические танцы вдохновили тебя быть аккуратнее при сборе грибов.\n20% Шанс получить дополнительные грибы"
"Recent choreographed dancing has inspired you to open a shop.\n-50% Cost to hire vendor-stall shopkeepers": "Недавние хореографические танцы вдохновили тебя открыть магазин.\n-50% Стоимость найма продавцов для лавки"
"Recent choreographed dancing has inspired you to move those legs.\n+3 Noncombat Sprint Speed": "Недавние хореографические танцы вдохновили тебя двигать ногами.\n+3 Скорость спринта вне боя"
"Recent choreographed dancing has inspired you to be healthier.\n+20 Max Health": "Недавние хореографические танцы вдохновили тебя быть здоровее.\n+20 Максимальное здоровье"
"Recent choreographed dancing has inspired you to be more active.\n+20 Max Power": "Недавние хореографические танцы вдохновили тебя быть более энергичным.\n+20 Максимальная энергия"
"Recent choreographed dancing has inspired you to be luckier when looting.\n+1% Chance for Legendary Items": "Недавние хореографические танцы вдохновили тебя быть удачливее при добыче лута.\n+1% Шанс на легендарные предметы"
"Sprint Speed Increased": "Скорость спринта увеличена"
"Damage of your next attack is increased, if it is a Lycanthropy attack": "Урон вашей следующей атаки увеличен, если это атака Ликантропией"
"Armor recovered": "Восстановленная броня"
"Your attacks generate less Taunt (until you teleport via Shadow Feint)": "Ваши атаки вызывают меньше провокации (до тех пор, пока вы не телепортируетесь через Теневой обман)"
"Lycanthropy base attack damage increased (until you teleport via Shadow Feint)": "Базовый урон атаки Ликантропии увеличен (до тех пор, пока вы не телепортируетесь через Тень Обмана)"
"Lycanthropy Base Damage is increased (until you are attacked)": "Базовый урон Ликантропии увеличен (до тех пор, пока вас не атакуют)"
"Lycanthropy attacks deal bonus Trauma damage over time": "Атаки Ликантропии наносят дополнительный травматический урон с течением времени"
"You take 5% less damage from attacks. This effect absorbs up to 50 damage before expiring.": "Вы получаете на 5% меньше урона от атак. Этот эффект поглощает до 50 урона, прежде чем исчезнуть."
"You take 6% less damage from attacks. This effect absorbs up to 60 damage before expiring.": "Вы получаете на 6% меньше урона от атак. Этот эффект поглощает до 60 урона, прежде чем исчезнуть."
"You take 7% less damage from attacks. This effect absorbs up to 70 damage before expiring.": "Вы получаете на 7% меньше урона от атак. Этот эффект поглощает до 70 урона, прежде чем исчезнуть."
"You take 8% less damage from attacks. This effect absorbs up to 80 damage before expiring.": "Вы получаете на 8% меньше урона от атак. Этот эффект поглощает до 80 урона, прежде чем исчезнуть."
"You take 9% less damage from attacks. This effect absorbs up to 90 damage before expiring.": "Вы получаете на 9% меньше урона от атак. Этот эффект поглощает до 90 урона, прежде чем исчезнуть."
"You take 10% less damage from attacks. This effect absorbs up to 100 damage before expiring.": "Вы получаете на 10% меньше урона от атак. Этот эффект поглощает до 100 урона, прежде чем исчезнуть."
"You take 11% less damage from attacks. This effect absorbs up to 110 damage before expiring.": "Вы получаете на 11% меньше урона от атак. Этот эффект поглощает до 110 урона, прежде чем исчезнуть."
"You take 12% less damage from attacks. This effect absorbs up to 120 damage before expiring.": "Вы получаете на 12% меньше урона от атак. Этот эффект поглощает до 120 урона, прежде чем исчезнуть."
"You take 13% less damage from attacks. This effect absorbs up to 130 damage before expiring.": "Вы получаете на 13% меньше урона от атак. Этот эффект поглощает до 130 урона, прежде чем исчезнуть."
"You take 14% less damage from attacks. This effect absorbs up to 140 damage before expiring.": "Вы получаете на 14% меньше урона от атак. Этот эффект поглощает до 140 урона, прежде чем исчезнуть."
