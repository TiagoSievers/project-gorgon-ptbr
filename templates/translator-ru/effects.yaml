"You feel a lot more healthy!\nMax Health +30%": "Вы чувствуете себя гораздо здоровее!\nМаксимальное здоровье +30%."
"You are recovering Health and Armor every second.": "Вы восстанавливаете здоровье и броню каждую секунду."
"You are more accurate, and your Darkness, Electricity, and Fire direct attacks deal more damage.": "Вы более точны, и ваши прямые атаки Тьмой, Электричеством и Огнём наносят больше урона."
"You feel itchy.\n+20% Nature Vulnerability": "Вас зудит.\n+20% Уязвимость к Природе"
"Feeling cold makes you want to stop moving and maybe take a nap.\nYou lose 35 Power when attacked with Cold\nThis is a permanent curse; you must defeat Lethargy Puck to remove it.": "Холод заставляет тебя хотеть перестать двигаться и, возможно, вздремнуть.\nТы теряешь 35 Силы при атаке Холодом\nЭто постоянное проклятие; чтобы снять его, нужно победить Летаргического Пака."
"Your body is not entirely under your control! When you attack fungal creatures, you pull your punches.\n-10% Damage vs. Fungoids\n(Remove with First Aid 6+.)": "Твое тело не полностью под твоим контролем! Когда ты атакуешь грибных существ, ты наносишь ослабленный удар.\n-10% урона по грибам\n(Снимается с помощью Первая помощь 6+.)"
"Your body is not entirely under your control! When you attack fungal creatures, you pull your punches.\n-10% Damage vs. Fungoids\nThis is a permanent curse; defeat Unfun Guy to remove it.": "Твое тело не полностью под твоим контролем! Когда ты атакуешь грибных существ, ты наносишь ослабленный удар.\n-10% урона по грибам\nЭто постоянное проклятие; чтобы снять его, нужно победить Несмешного Парня."
"Your body is not entirely under your control! When you attack a mantis, you stun yourself. (Once per minute max.)\nThis is a permanent curse; defeat Imarak to remove it.": "Твое тело не полностью под твоим контролем! Когда ты атакуешь богомола, ты оглушаешь себя. (Максимум раз в минуту.)\nЭто постоянное проклятие; чтобы снять его, нужно победить Имарака."
"Your armor has been scorched by intense flames making you take more fire damage.\nYour fire mitigation has been reduced by 10.\nYou take +20% Fire damage from enemy attacks.\nThis curse will last 24 in-game hours, or you must defeat Hot Flash to remove it.": "Ваша броня опалена сильным пламенем, из-за чего вы получаете больше урона от огня.\nВаше смягчение огня уменьшено на 10.\nВы получаете +20% урона от огня от атак врагов.\nЭто проклятие продлится 24 игровых часов, или вы должны победить Горячую Вспышку, чтобы снять его."
"The fire burns so strong that even water cannot extinguish the flames. Death is the only release.": "Огонь горит так сильно, что даже вода не может потушить пламя. Смерть — единственное освобождение."
"A blastcap mushroom burst in your face! You don't feel so good.\n+{0}% Nature Vulnerability": "Гриб-взрывник взорвался у тебя на лице! Тебе нехорошо.\n+{0}% Уязвимость к Природе"
"Enoyos has forbidden you from flowing in his waters freely.\nYour swimming speed has been reduced by 5.\nYou lose 30% of your lung capacity when underwater.\nThis curse will last 24 in-game hours, or you must defeat George to remove it.": "Энойос запретил тебе свободно течь в его водах.\nТвоя скорость плавания снижена на 5.\nТы теряешь 30% объёма лёгких под водой.\nЭто проклятие продлится 24 игровых часов или пока ты не победишь Джорджа."
"You feel nice. Organizing your pack space seems a little less hopeless.\n+5 Max Inventory (area event)": "Вы чувствуете себя хорошо. Организовать место в рюкзаке кажется чуть менее безнадежным.\n+5 Максимальный инвентарь (событие зоны)"
"It's just a little bit warmer than usual, but the Winter Court fae find this heat intolerable!\n+15% direct damage vs. Winter Court fae (area event)": "Тут немного теплее обычного, но фейри Зимнего Двора не выносят эту жару!\n+15% прямого урона по фейри Зимнего Двора (событие в зоне)"
"Touching water has become painful and distressing.\nYou are stunned when entering water.\nThis is a permanent curse; you must kill the Sacrificial Scray to remove it.": "Прикосновение к воде стало болезненным и мучительным.\nВы оглушаетесь при входе в воду.\nЭто постоянное проклятие; чтобы снять его, вы должны убить Жертвенного Скрея."
"Those who attack you shall be cursed!": "Те, кто атакует вас, будут прокляты!"
"You're melting!\nUse First Aid 4, or stand in water, to dispel this effect.": "Ты таешь!\nИспользуй Первая помощь 4 или встань в воду, чтобы снять этот эффект."
"You're having trouble fighting!\nCore Attacks Disabled": "Вам трудно сражаться!\nОсновные атаки отключены"
"Your nerves aren't working as fast as normal...\nAll Ability Reset Time +1 sec": "Твои нервы работают медленнее обычного...\nВремя восстановления всех способностей увеличено на +1 сек"
"Your Fire attacks deal 10% less damage.": "Ваши атаки Огнём наносят на 10% меньше урона."
"Your Cold attacks deal 10% less damage.": "Ваши атаки холодом наносят на 10% меньше урона."
"Your Electricity attacks deal 10% less damage.": "Ваши атаки Электричеством наносят на 10% меньше урона."
"Your gut feels... itchy?\n(Remove with First Aid 6+)": "Ваш живот чешется...?\n(Удаляется с помощью Первая помощь 6+)"
"You interrupted class and the lecturer stole part of your brain in retaliation.\n-10% XP Earned\nThis is permanent; defeat Vemuta to remove it.": "Ты прервал занятие, и лектор в отместку украл часть твоего мозга.\n-10% XP получено\nЭто навсегда; победи Вемуту, чтобы избавиться от этого."
"You've lost the ability to fully channel necromantic energy.\nDarkness Damage -50%\nThis is permanent; defeat Peacemaster Guztok to remove it.": "Вы утратили способность полностью направлять некромантическую энергию.\nУрон Тьмой -50%\nЭто навсегда; чтобы избавиться от этого, победите Мирастроителя Гузтока."
"Your nervous system has suffered severe damage. You're lucky to be alive!\nAll Ability Reset Time +2 sec\nThis is a permanent curse; you must defeat Lusca to remove it.": "Ваша нервная система сильно повреждена. Вам повезло остаться в живых!\nВремя восстановления всех способностей +2 сек\nЭто постоянное проклятие; чтобы снять его, вы должны победить Луску."
"Your limbs are shriveled! You can't put out much physical damage.\n-50% Slashing, Crushing, and Piercing Damage\nThis curse is permanent; defeat Dula Beadle to remove it.": "Твои конечности сморщены! Ты не можешь наносить много физического урона.\n-50% Урона от Резания, Дробления и Колющего урона\nЭто проклятие постоянно; чтобы снять его, победи Дулу Бидл."
"You were hit by a dragon! You're too flummoxed to use your coolest moves.\nEpic Attacks Disabled": "Вас ударил дракон! Вы слишком ошарашены, чтобы использовать свои самые крутые приёмы.\nЭпические атаки отключены"
"A nasty experience with a dragon has caused you to have a panicked reaction when any dragon-kin hits you, disabling your Epic Attacks for 15 seconds.\nThis curse is permanent; defeat Kunax the Dread to remove it.": "Неприятный опыт с драконом вызвал у вас паническую реакцию при попадании любого драконоподобного существа, отключая ваши Эпические атаки на 15 секунд.\nЭто проклятие постоянно; победите Кунака Ужасного, чтобы снять его."
"You are bleeding from a bite wound!": "У вас кровотечение от укуса!"
"Your body is wracked with demonic energy, waiting to explode out!": "Твое тело охвачено демонической энергией, готовой взорваться!"
"Your movement speed is reduced and you take extra damage from Demonic attacks.": "Скорость передвижения снижена, и ты получаешь дополнительный урон от демонических атак."
"You are enraged by default!": "Ты в ярости по умолчанию!"
"Does instant damage to Bodyheat": "Наносит мгновенный урон Теплу тела"
"Your eardrums are bleeding!": "Ваши барабанные перепонки кровоточат!"
"You are 25% more vulnerable to all attacks!": "Вы на 25% более уязвимы ко всем атакам!"
"You're uncomfortably warm.\n{0} Fire Mitigation": "Вам некомфортно тепло.\n{0} Смягчение огня"
"You're covered in frozen acid! When it melts, it's going to sting.\n\nUse First Aid 6 to dispel this effect.": "Ты покрыт замороженной кислотой! Когда она растает, будет больно.\n\nИспользуй Первая помощь 6, чтобы снять этот эффект."
"You're playing music!": "Ты играешь музыку!"
