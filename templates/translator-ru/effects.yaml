"Universal Spawn Premonition: You can detect where creatures will spawn. You'll see a premonition for 2 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Универсальное предчувствие появления: ты можешь обнаружить, где появятся существа. Ты видишь предчувствие за 2 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
"Universal Spawn Premonition: You can detect where creatures will spawn. You'll see a premonition for 4 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Универсальное предчувствие появления: ты можешь обнаружить, где появятся существа. Ты видишь предчувствие за 4 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
"Undead Spawn Premonition: You can detect where undead monsters will spawn. You'll see a premonition for 10 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Предчувствие появления нежити: ты можешь обнаружить, где появятся монстры нежити. Ты видишь предчувствие за 10 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
"Rodent Spawn Premonition: You can detect where rodents and ratkin will spawn. You'll see a premonition for 10 seconds before the creature spawns.\n\n(Permanent, but when you die there's a 5% chance all premonition buffs are dispelled.)": "Предчувствие Появления Грызунов: вы можете обнаруживать, где появятся грызуны и крысолюды. Вы увидите предчувствие за 10 секунд до появления существа.\n\n(Постоянно, но при смерти есть шанс 5%, что все баффы предчувствия будут сняты.)"
