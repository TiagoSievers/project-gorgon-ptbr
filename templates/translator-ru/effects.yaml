"Thousands of unfertilized Urak eggs have been injected under your flesh. They keep popping out...\n\nThis is a permanent curse. You must defeat Gazluk Clutchmaster to remove it.": "Тысячи неоплодотворённых яиц Урака внедрены под вашу кожу. Они продолжают вылупляться...\n\nЭто постоянное проклятие. Чтобы снять его, вы должны победить Газлука Клаучмастера."
"Your head is ringing! Any little hit can disorient you.\n\n50% chance to be briefly stunned whenever you are hit by a melee attack\n\nThis is a permanent curse; you must defeat Zukelmux The Intransigent to remove it": "Тебя звенит в голове! Любой небольшой удар может дезориентировать тебя.\n\n50% шанс быть кратковременно оглушённым при попадании в ближнем бою\n\nЭто постоянное проклятие; чтобы снять его, нужно победить Зукельмукса Непреклонного."
"You were splashed with weird chemicals that don't seem to wash off!\n\nYou suffer +20% damage from poison\n\nThis is a permanent curse; you must defeat Tolmar the Snake Master to remove it": "На вас плеснули странными химикатами, которые, похоже, не смываются!\n\nВы получаете +20% урона от яда\n\nЭто постоянное проклятие; чтобы снять его, нужно победить Толмара, Мастера Змей."
"You've become deathly afraid of spiders, and in fact all arthropods seem way too icky to fight. You can't fully engage them in combat.\n\n-33% Direct Damage vs. Arthropods\nThis is a permanent curse; you must defeat the Problem Spider to remove it.": "Вы ужасно боитесь пауков, и вообще все членистоногие кажутся слишком мерзкими для боя. Вы не можете полноценно сражаться с ними.\n\n-33% Прямой урон по членистоногим\nЭто постоянное проклятие; чтобы снять его, нужно победить Проблемного Паука."
"You've become so afraid of the outdoors that you periodically suffer anxiety bursts. Staying indoors is comforting, however.\n\nPeriodically suffer -50 Power outdoors\nPeriodically gain +10 Power indoors\nThis is a permanent curse; you must defeat Ratkin King [SqUUeak] to remove it.": "Вы так боитесь улицы, что у вас периодически случаются приступы тревоги. Зато дома вам комфортно.\n\nПериодически теряете -50 Силы на улице\nПериодически получаете +10 Силы в доме\nЭто постоянное проклятие; чтобы снять его, нужно победить Короля Крысокланов [SqUUeak]."
"The war in your mind seems to be over, and conventional morality won. You feel like a piece of shit.\n-10% Earned Combat XP.": "Война в вашем разуме, кажется, закончилась, и обычная мораль победила. Вы чувствуете себя ничтожеством.\n-10% Получено боевого XP."
