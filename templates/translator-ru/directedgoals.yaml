# ── Подсказки ──
"Serbule Hills can be reached by traveling south from Serbule.": "До Холмов Сербуле можно добраться, отправившись на юг из Сербуле."
"Visit Serbule Hills to unlock this list of tasks.": "Посетите холмы Сербуле, чтобы открыть этот список заданий."
"Serbule can be reached by completing the island tutorial and teleporting with the correct code.": "Сербуле можно достичь, завершив островной обучающий курс и телепортировавшись с правильным кодом."
"Visit Serbule to unlock this list of tasks.": "Посетите Сербул, чтобы открыть этот список заданий."
"The Serbule Crypt is in the corner of the Serbule map.": "Склеп Сербуле находится в углу карты Сербуле."
"Eltibule can be reached from Serbule.": "До Эльтибуле можно добраться из Сербулы."
"Visit Eltibule to unlock this list of tasks.": "Посетите Эльтибуле, чтобы открыть этот список заданий."
"Sun Vale can be reached by visiting a boatman in Serbule, among other methods.": "До Солнечной Долины можно добраться, посетив лодочника в Сербуле, а также другими способами."
"Visit Sun Vale to unlock this list of tasks.": "Посетите Сан-Вейл, чтобы открыть этот список заданий."
"Kur Mountains can be reached from Eltibule.": "До Гор Кур можно добраться из Эльтибуле."
"Visit Kur Mountains to unlock this list of tasks.": "Посетите горы Кур, чтобы открыть этот список заданий."
"Ilmari Desert can be reached from Kur Mountains.": "До пустыни Илмари можно добраться из Курских гор."
"Visit the Ilmari Desert to unlock this list of tasks.": "Посетите пустыню Илмари, чтобы открыть этот список заданий."
"Therese in Serbule can help you get started -- she sells potato seedlings and water bottles, and she has a gardening area behind the windmill. Another option is visiting Julius Patton on his farm in Serbule Hills; he'd be happy to help, too.": "Тереза в Сербуле может помочь вам начать — она продаёт саженцы картофеля и бутылки с водой, а за мельницей у неё есть участок для садоводства. Ещё один вариант — навестить Юлиуса Паттона на его ферме в Холмах Сербуле; он тоже с радостью поможет."
"To plant a potato, you need no special skill. Just purchase a potato seedling and a bottle of water, then plant the seedling in a garden area. Several people can help you get started.": "Чтобы посадить картофель, не требуется особого навыка. Просто купите саженец картофеля и бутылку воды, затем посадите саженец в садовой зоне. Несколько человек могут помочь вам начать."
"Ivyn will give you a skinning knife if you complete his favor request for squash seedlings. But there's many ways to find a skinning knife -- in fact, you can sometimes find them for sale in town. Your chance of success at skinning depends on the Skinning skill, but you can start practicing before you have any levels of the skill. Practice on easy monsters, like rats, and you'll gain Skinning levels automatically.": "Ивин даст вам нож для снятия шкур, если вы выполните его просьбу о саженцах тыквы. Но нож для снятия шкур можно достать и многими другими способами — на самом деле, иногда его можно найти в продаже в городе. Ваш шанс успешно снять шкуру зависит от навыка Снятие шкур, но вы можете начать практиковаться, даже если у вас ещё нет уровней этого навыка. Тренируйтесь на простых монстрах, например на крысах, и вы будете автоматически получать уровни Снятия шкур."
"First you'll need a skinning knife. There's lots of places to find these. Perhaps the easiest is to do a favor for Ivyn the farmer, near Serbule. He'll give you one in exchange for some seedlings he needs. Once you have the knife, practice skinning the corpses of small animals like rats.": "Сначала вам понадобится нож для снятия шкур. Найти его можно во многих местах. Пожалуй, проще всего оказать услугу фермеру Ивину, неподалёку от Сербуле. Он даст вам один в обмен на несколько саженцев, которые ему нужны. Когда у вас будет нож, потренируйтесь снимать шкуры с трупов мелких животных, например крыс."
"The recipe you need is Pick-Me-Up Juice. Find it in a book near Elmetaph the elf. He's in the lighthouse at the center of the island. You can collect the needed ingredients on the island. Give the completed potion to Riger, who lives in a hut on the island.": "Вам нужен рецепт Pick-Me-Up Juice. Найдите его в книге рядом с эльфом Эльметафом. Он находится в маяке в центре острова. Вы можете собрать нужные ингредиенты на острове. Передайте готовое зелье Ригеру, который живёт в хижине на острове."
"Riger is the amnesiac Elf you met on the island when you first started playing. He's very unhappy. There's a potion that will make him happy for a while; you can find the recipe somewhere on that island.": "Ригер — это эльф с амнезией, которого вы встретили на острове, когда только начали играть. Он очень несчастен. Есть зелье, которое ненадолго сделает его счастливым; рецепт можно найти где-то на том острове."
"You can find the four arches by following the shore in either direction. The correct order to touch the arches is South-East-West-North.": "Вы можете найти четыре арки, двигаясь вдоль берега в любом направлении. Правильный порядок, в котором нужно коснуться арок: Юг-Восток-Запад-Север."
"On the island where you first awoke with amnesia, there's a beach area with four magical arches. If you touch the pillars in the right order, you unlock a nearby chest.": "На острове, где вы впервые очнулись с амнезией, есть пляжная зона с четырьмя магическими арками. Если коснуться столбов в правильном порядке, вы откроете ближайший сундук."
"Lawara is on the island away from the beach. If it's dark, you can find her by looking for her bonfire. Complete favors for her -- or give her gifts -- until you reach Comfortable favor-level. Lawara will then teach you how to autopsy and give you an autopsy kit.": "Лавара находится на острове, вдали от пляжа. Если темно, вы сможете найти её по костру. Выполняйте её просьбы — или дарите ей подарки — пока не достигнете уровня расположения «Комфортно». После этого Лавара научит вас проводить вскрытие и даст вам набор для вскрытия."
"The easiest way to accomplish this one is to befriend Lawara, an Elf on the island where you started the game, but there are many other ways to learn autopsying.": "Проще всего выполнить это, подружившись с Лаварой, эльфийкой на острове, где вы начали игру, но есть и много других способов научиться вскрытию."
"Perhaps the easiest method is with a spore bomb. You can find a recipe for creating spore bombs in the dungeon on Anagoge Island. Another easy method is with Psychology. Once you've discovered this skill you'll have abilities that deal Psychic damage. Since Psychic damage isn't physical damage, it will work on the dummy!": "Пожалуй, самый простой способ — использовать споровую бомбу. Рецепт создания споровых бомб можно найти в подземелье на острове Анагоге. Ещё один простой способ — с помощью Психологии. Как только вы откроете этот навык, у вас появятся способности, наносящие психический урон. Поскольку психический урон — это не физический урон, он подействует на манекен!"
"An enchanted training dummy can be found on the northwest beach of the island. It is immune to physical damage (which means Slashing, Crushing, or Piercing damage), so you'll need to find another way to damage it.": "На северо-западном пляже острова можно найти зачарованное тренировочное чучело. Оно невосприимчиво к физическому урону (то есть к рубящему, дробящему или колющему урону), так что вам придётся найти другой способ его повредить."
"Most of the golems in the area aren't too tough, but the Records Librarian golem is tougher; make sure to dismantle other nearby golems before attacking it so that they don't join in the fight and overwhelm you! Once the monsters are defeated you will need to solve the lamp puzzle. This is quite simple: just turn on all the lamps in all nearby rooms to gain access to the chest you need.": "Большинство големов в этой области не слишком сильны, но голем Архивариус записей крепче; обязательно сначала разберите других големов поблизости, прежде чем атаковать его, чтобы они не вступили в бой и не задавили вас числом! После того как монстры будут побеждены, вам нужно будет решить головоломку с лампами. Это довольно просто: просто включите все лампы во всех ближайших комнатах, чтобы получить доступ к нужному вам сундуку."
"Deep in the dungeon beneath Anagoge Island is a stash of important knowledge, including a book on how to stun golems and automatons. The dungeon entrance is in a cliff face. Once inside, you'll need to take three sets of stairs down to reach the records level. (Avoid Gajus! If you see warnings about Gajus, you missed the second stairwell.) The chest you need is in the far north part of the dungeon. When you find strange lamps in the middle of rooms, you're in the vicinity.": "Глубоко в подземелье под островом Анагоге находится тайник с важными знаниями, включая книгу о том, как оглушать големов и автоматонов. Вход в подземелье находится в скале. Оказавшись внутри, вам нужно будет спуститься по трём лестницам, чтобы добраться до уровня с записями. (Избегайте Гайуса! Если вы видите предупреждения о Гайусе, значит, вы пропустили вторую лестницу.) Нужный вам сундук находится в самой северной части подземелья. Когда вы увидите странные лампы в середине комнат, значит, вы уже рядом."
"Perform favors for Tyler, or give him gifts, until you reach Comfortable favor-level. You can then learn the Shield skill from Tyler's Training menu.": "Выполняйте просьбы Тайлера или дарите ему подарки, пока не достигнете уровня расположения «Комфортно». После этого вы сможете изучить навык Щит в меню обучения Тайлера."
"Tyler Green is in the Tapestry Inn, in the northwest corner of Serbule Hills.": "Тайлер Грин находится в гостинице «Гобелен» в северо-западном углу Холмов Сербуле."
"There are five so-called 'telepods' hidden throughout Serbule Hills. They look like large bowls. They are surrounded by greenery to help them blend in, although in some cases this makes them more noticeable, not less. Touch each teleporter to unlock it. Once you have unlocked at least two teleporters, you will be able to teleport from one bowl to any other that you've unlocked.": "По всему Сербуле-Хиллс спрятаны пять так называемых «телеподов». Они выглядят как большие чаши. Их окружают растениями, чтобы они лучше сливались с местностью, хотя в некоторых случаях это, наоборот, делает их более заметными. Коснитесь каждого телепорта, чтобы разблокировать его. Как только вы разблокируете хотя бы два телепорта, вы сможете телепортироваться из одной чаши в любую другую, которую вы уже разблокировали."
"Ranalon are the frog-like race that have recently infested Serbule Hills. They seem to have the ability to rapidly move troops to different areas -- perhaps you can use this same technology. Their main camp is near the lakes in the center of Serbule Hills.": "Раналоны — это похожая на лягушек раса, которая недавно заполонила Холмы Сербуле. Похоже, у них есть способность быстро перебрасывать войска в разные области — возможно, вы сможете использовать ту же технологию. Их главный лагерь находится возле озёр в центре Холмов Сербуле."
"Sammie is happy to teach you calligraphy, as she sells the inks and papers you'll need. From the northwest entrance to Serbule Hills, head due south, past the Duchess. Sammie is on a hill along the western edge of the map.": "Сэмми с радостью научит вас каллиграфии, так как она продаёт чернила и бумагу, которые вам понадобятся. От северо-западного входа в Холмы Сербуле идите строго на юг, мимо Герцогини. Сэмми находится на холме вдоль западной границы карты."
"Sammie Grimspine in Serbule Hills can teach you calligraphy.": "Самми Гримспайн в Сербулских холмах может научить вас каллиграфии."
"More specifically, The Big Widow lives in a farm house near the southernmost central lake in Serbule Hills, very close to the Ranalon encampment. She has numerous offspring with her, so this is a tricky battle! If you are being overwhelmed by poison, you might want to wait until you've found ways to counteract poison.": "Если точнее, Большая Вдова живёт в фермерском доме возле самого южного центрального озера в Холмах Сербуле, совсем рядом с лагерем Раналонов. С ней множество потомства, так что это непростая битва! Если вас слишком сильно отравляют, возможно, стоит подождать, пока вы не найдёте способы противодействовать яду."
"The Big Widow is a large venomous spider that lives in one of the abandoned farm houses in Serbule Hills.": "Большая Вдова — это крупный ядовитый паук, который живёт в одном из заброшенных фермерских домов в Холмах Сербуле."
"There are three outposts along the goblin-controlled road north of the gobstore. In each outpost is a Competent Goblin with a gobkey. You need all three gobkeys to unlock the gobstore. As always when fighting goblins, be patient: pick them off one or two at a time, because they are quite deadly in packs.": "Вдоль дороги, контролируемой гоблинами, к северу от гоб-магазина есть три аванпоста. В каждом аванпосте находится Опытный гоблин с гоб-ключом. Вам нужны все три гоб-ключа, чтобы открыть гоб-магазин. Как и всегда при сражении с гоблинами, будьте терпеливы: выманивайте и убивайте их по одному или по двое, потому что в стае они весьма смертоносны."
"Gobstores are large chests full of prized goblin equipment. There's a gobstore in Serbule Hills in the southeast. You'll need several keys to open it! The keys can be found on goblins in Serbule Hills. (PS: \"gobstore\" is a derogatory word humans use for goblin loot boxes. The word should not be used in the presence of goblins you want to befriend!)": "Гобсторы — это большие сундуки, полные ценного снаряжения гоблинов. В юго-восточной части Холмов Сербуле есть гобстор. Чтобы открыть его, вам понадобится несколько ключей! Ключи можно найти у гоблинов в Холмах Сербуле. (P.S. «гобстор» — это уничижительное слово, которым люди называют гоблинские сундуки с добычей. Не стоит употреблять его в присутствии гоблинов, с которыми вы хотите подружиться!)"
"Marna will teach you First Aid just by talking to her. If you've been cursed into some sort of animal form, however, Marna won't be willing to talk to you at all. If you can't find a cure for your predicament, another option is to trek to the dangerous island of Sun Vale -- a boatman on the Serbule docks can take you there. Sun Vale has a town of talking animals, and Norbert the pig can teach First Aid.": "Марна научит вас Первой помощи, если просто поговорить с ней. Однако если вас прокляли и превратили в какую-то форму животного, Марна вообще не захочет с вами разговаривать. Если вы не можете найти способ снять своё проклятие, другой вариант — отправиться на опасный остров Сан-Вейл: лодочник на причалах Сербуле может отвезти вас туда. В Сан-Вейле есть город говорящих животных, и Норберт-свинья может научить Первой помощи."
"Marna runs a bustling general store in Serbule, with a focus on potions and healing items. She's happy to teach First Aid because she sells the necessary first aid kits.": "Марна управляет оживлённым универсальным магазином в Сербуле, специализируясь на зельях и предметах для лечения. Она с радостью научит Первой помощи, потому что продаёт необходимые аптечки первой помощи."
"Fainor will teach you the recipe for a small fee. Bacon requires only a Pork Shoulder and Salt. You must be near a stove to complete the recipe; there's a suitable fire pit in every inn.": "Файнор научит вас рецепту за небольшую плату. Для бекона нужны только свиная лопатка и соль. Чтобы приготовить по рецепту, вы должны находиться рядом с плитой; подходящее кострище есть в каждой гостинице."
"Fainor in Serbule teaches the recipe for bacon. You'll need a little bit of skill in Cooking, which Fainor can also help you with.": "Файнор в Сербуле обучает рецепту бекона. Вам понадобится немного навыка Готовка, с которым Файнор тоже может вам помочь."
"Once you've met Velkort, ask for training and learn the 'Introductory Fire Magic Research' recipe. Next, go to the inn in Serbule and buy some salt from the innkeeper. Stand near the fire pit in the inn and use the recipe window to complete the Introductory Fire Magic research recipe. Once you've learned some spells, you can cast them by wielding a staff. Velkort sells a suitable beginner's staff.": "После того как вы встретите Велкорта, попросите у него обучение и изучите рецепт «Введение в исследование огненной магии». Затем отправляйтесь в гостиницу в Сербуле и купите немного соли у трактирщика. Встаньте возле очага в гостинице и используйте окно рецепта, чтобы завершить рецепт исследования «Введение в огненную магию». Как только вы изучите несколько заклинаний, вы сможете применять их, вооружившись посохом. Велкорт продаёт подходящий посох для новичка."
"Velkort the fire mage lives in Serbule. You can often find him wandering around -- look for his sentient pet flame. He's surly, but he's happy to teach the ways of fire... for a small fee.": "Велкорт, маг огня, живёт в Сербуле. Его часто можно найти бродящим неподалёку — ищите его разумное питомца-пламя. Он угрюм, но с радостью обучит искусству огня... за небольшую плату."
"Examine items in town, such as paintings, wall ornaments, and so on, until you obtain several levels of Lore skill. Then you can use the recipe for a Basic Word of Power. To activate a word of power, speak it aloud in chat. Once the word is spoken, it stops being magical. A warning: there are only so many words of power in the world at any time, and other players can learn the same words you do! So don't store your words for too long, or they may have already been used up by the time you speak them. This is especially true of lower-level words of power.": "Осматривайте предметы в городе, такие как картины, настенные украшения и так далее, пока не получите несколько уровней навыка Знания. Затем вы сможете использовать рецепт для Базового Слова Силы. Чтобы активировать слово силы, произнесите его вслух в чате. Как только слово произнесено, оно перестаёт быть магическим. Предупреждение: в мире одновременно существует лишь ограниченное число слов силы, и другие игроки могут выучить те же слова, что и вы! Поэтому не храните свои слова слишком долго, иначе к моменту, когда вы их произнесёте, они уже могут быть использованы. Это особенно касается слов силы низкого уровня."
"Marna in Serbule can teach you the recipe for Words of Power. You'll need to have a few levels of the Lore skill before you can use it, though. Lore is learned by simply examining things everywhere you go.": "Марна в Сербуле может научить вас рецепту Слов Силы. Однако, чтобы использовать его, вам понадобится несколько уровней навыка Знания. Знания изучаются просто при осмотре предметов повсюду, куда бы вы ни пошли."
"Complete favors for Echur or give him gifts until you reach Friends favor-level, and he will automatically teach you the Mentalism skill for free.": "Выполняйте просьбы Эчура или дарите ему подарки, пока не достигнете уровня расположения «Друзья», и он автоматически бесплатно обучит вас навыку Ментализм."
"Echur is an Elf living in Serbule. He's standing near a strange glowing contraption. He's a master of Meditation, but if you become close enough friends, he'll also reveal deeper mental secrets.": "Эчур — эльф, живущий в Сербуле. Он стоит рядом с каким-то странным светящимся устройством. Он мастер Медитации, но если вы станете достаточно близкими друзьями, он также откроет вам более глубокие тайны разума."
"This one is quite difficult; you must become Close Friends with Ivyn, which means doing favors and giving him gifts. Other players might teach you the code, but be wary of using his chest without permission! Ivyn has been known to exact revenge on those who abuse his trust.": "Это довольно сложно; вам нужно стать Близким другом Ивина, а для этого придётся выполнять его просьбы и дарить ему подарки. Другие игроки могут научить вас коду, но будьте осторожны и не пользуйтесь его сундуком без разрешения! Известно, что Ивин мстит тем, кто злоупотребляет его доверием."
"Ivyn the farmer has a large storage chest with a combination lock. If you become his close friend, he'll give you the code.": "У фермера Ивина есть большой сундук для хранения с кодовым замком. Если вы станете его близким другом, он даст вам код."
"Fainor will teach you the recipe for a small fee. Onion Rings require an onion and a bottle of water. You can grow the onion yourself in a garden, or buy one from another player.": "Файнор научит вас рецепту за небольшую плату. Для луковых колец нужны лук и бутылка воды. Лук можно вырастить самому в саду или купить у другого игрока."
"Fainor in Serbule teaches the recipe for onion rings. You'll need a little bit of skill in Cooking, which Fainor can also help you with.": "Файнор в Сербуле обучает рецепту луковых колец. Вам понадобится немного навыка Готовка, с которым Файнор тоже может вам помочь."
"The bear in the barn is too difficult for a beginner to defeat alone. Even two beginners will have trouble! Find a few adventurers willing to help, or gain some combat levels before attempting to solo the bear. Like most bears, this one is resistant to crushing and trauma damage, so Unarmed attacks are not a good choice. Bears are vulnerable to acid and electricity attacks, so use those if you have them. (Mentalism has some electricity abilities.)": "Медведь в амбаре слишком силён, чтобы новичок мог одолеть его в одиночку. Даже у двух новичков будут трудности! Найдите нескольких искателей приключений, готовых помочь, или наберите несколько боевых уровней, прежде чем пытаться сразиться с медведем в одиночку. Как и большинство медведей, этот устойчив к дробящему и травматическому урону, так что атаки Без оружия — не лучший выбор. Медведи уязвимы к кислотным и электрическим атакам, так что используйте их, если они у вас есть. (У Ментализма есть некоторые электрические способности.)"
"Jara and Ivyn have a barn outside of town, and there's a bear inside. Consider bringing backup, because bears are very dangerous!": "У Джары и Ивина есть сарай за городом, и внутри там медведь. Подумайте о том, чтобы взять с собой подмогу, потому что медведи очень опасны!"
"To become Harry's friend, you'll need Rita's help. Rita is standing outside of the inn. Perform favors for her -- or give her flowers! -- until you reach Comfortable favor-level with her. She'll automatically give you an introductory note. Harry is a good friend to have if you ever become cursed, because he has cures for several nasty problems.": "Чтобы подружиться с Гарри, вам понадобится помощь Риты. Рита стоит снаружи гостиницы. Выполняйте её просьбы — или дарите ей цветы! — пока не достигнете уровня расположения «Комфортно». Она автоматически даст вам вводную записку. Гарри — хороший друг, если вы когда-нибудь окажетесь прокляты, потому что у него есть средства от нескольких неприятных проблем."
"Harry the wolf hangs out in Serbule, usually in the little plot behind the windmill. He's not big on bipeds, but if you were friends with Rita, she could give you an introductory note to smooth things over with Harry.": "Гарри, волк, обитает в Сербуле, обычно на небольшом участке за мельницей. Он не слишком жалует двуногих, но если бы вы дружили с Ритой, она могла бы дать вам рекомендательное письмо, чтобы сгладить отношения с Гарри."
"You must read the note in the Serbule Crypt before Marna will offer to teach you her best poison resistance recipe. She will insist on a very large number of spider legs in order to teach the recipe; fortunately, spiders have a lot of legs, so it won't take too long to collect them.": "Вы должны прочитать записку в Крипте Сербуле, прежде чем Марна предложит научить вас своему лучшему рецепту сопротивления яду. Она будет настаивать на очень большом количестве паучьих лапок, чтобы научить этому рецепту; к счастью, у пауков много лапок, так что собрать их не займёт слишком много времени."
"Marna the shopkeeper has posted warnings in the Serbule Crypt about venomous spiders. After you read the note in the crypt, talk to Marna in town.": "Марна, хозяйка магазина, разместила в Сербуле-Крипте предупреждения о ядовитых пауках. После того как вы прочтёте записку в крипте, поговорите с Марной в городе."
"The megaspider is almost certain death for a new player unless they have poison resistance. You can learn to make poison resistance potions from Marna in Serbule, or you can find poison resistance from certain pieces of equipment.": "Мегапаук почти наверняка станет смертельной угрозой для нового игрока, если у него нет сопротивления яду. Вы можете научиться делать зелья сопротивления яду у Марны в Сербуле, либо получить сопротивление яду от некоторых предметов экипировки."
"In the crypt near Serbule is a pretty big spider. Its poison is quite deadly, so watch out for that!": "В крипте неподалёку от Сербуле есть довольно большой паук. Его яд весьма смертелен, так что берегитесь!"
"Khyrulek is guarded by trained rhinos, and they are very powerful. You'll need several friends to defeat them. Once you slay Khyrulek, a portal will open to a much more dangerous part of the dungeon. Do not be too eager to venture here! First, explore the rest of the crypt to gain power and skills.": "Хирулек охраняется приручёнными носорогами, и они очень сильны. Чтобы победить их, вам понадобится несколько друзей. Когда вы убьёте Хирулека, откроется портал в куда более опасную часть подземелья. Не спешите соваться туда! Сначала исследуйте остальную часть крипты, чтобы набраться сил и навыков."
"Beyond the megaspider in the Serbule crypt is a lich. Defeat her to access a deeper part of the crypt.": "За мегапауком в крипте Сербуле находится лич. Победите её, чтобы получить доступ к более глубокой части крипты."
"The omegaspider lies beyond Khyrulek's First Form. It is a gigantic fire spider. Unlike ordinary fire spiders, however, this one is vulnerable to fire! Use this to your advantage. Also, bring friends.": "Омегапаук находится за Первой Формой Хирулека. Это гигантский огненный паук. Однако, в отличие от обычных огненных пауков, этот уязвим к огню! Используйте это в своих интересах. И ещё — возьмите с собой друзей."
"Deep in the bowels of the Serbule crypt is a gigantic spider of ridiculous size and power. Kill it to gain access to a new skill. (Good luck. You'll need it.)": "Глубоко в недрах крипты Сербуле скрывается гигантский паук нелепых размеров и силы. Убейте его, чтобы получить доступ к новому навыку. (Удачи. Она вам понадобится.)"
"Complete two quests involving killing panthers and Kalaba will offer to teach you Transmutation. Once you reach Friends favor-level with Kalaba, you can learn more Transmutation recipes from his Training menu. This is a very important crafting skill to learn as it allows you to take any piece of modded equipment and make it stronger for your combat ability's needs.": "Выполните два задания, связанных с убийством пантер, и Калаба предложит научить вас Трансмутации. Как только вы достигнете уровня расположения «Друзья» у Калабы, вы сможете изучить больше рецептов Трансмутации в его меню обучения. Это очень важный навык ремесла, который стоит изучить, поскольку он позволяет взять любой предмет модифицированного снаряжения и сделать его сильнее в соответствии с потребностями вашего боевого умения."
"A Rakshasa named Kalaba is a sturdy warrior camping in Eltibule Keep. Seek him out and learn how to change ability mods on your equipment.": "Ракшаса по имени Калаба — крепкий воин, разбивший лагерь в Крепости Элтибуле. Найдите его и узнайте, как менять модификаторы способностей на вашем снаряжении."
"Hogan will send you on a merry chase for special items. The snail shells can be found on giant snails in Eltibule. Poetry can be found in many places, including from a goblin in the dungeons beneath Eltibule. The ancient bronze coins are perhaps the most difficult request; these are rare drops from many kinds of monsters. You can often find some for sale on the Used tab of vendors.": "Хоган отправит вас в весёлую погоню за особенными предметами. Раковины улиток можно найти у гигантских улиток в Эльтибуле. Поэзию можно найти во многих местах, в том числе у гоблина в подземельях под Эльтибулем. Древние бронзовые монеты, пожалуй, самая трудная просьба; это редкая добыча с многих видов монстров. Часто их можно найти в продаже на вкладке Used у торговцев."
"In the nearby duchy of Eltibule, the monk Hogan runs a small keep. Talk to him and complete his quest to learn Staff Fighting.": "В близлежащем герцогстве Эльтибуле монах Хоган управляет небольшим замком. Поговорите с ним и выполните его задание, чтобы изучить Бой посохом."
"Sarina the fairy is trapped in the cave near the Algapa the goblin chief. This is a difficult fight, especially alone, so see if other players can help you. Most goblins are weak against cold and electricity, and resistant to poison and trauma, so plan accordingly.": "Фея Сарина заперта в пещере рядом с вождём гоблинов Алгапой. Это трудный бой, особенно в одиночку, так что посмотрите, не смогут ли другие игроки вам помочь. Большинство гоблинов слабы к холоду и электричеству, а также устойчивы к яду и травмам, так что планируйте бой соответственно."
"In the center of Eltibule is a small fort called Eltibule Keep. Beneath this keep are goblins. The chief is down the hall on the left. Oh, but he has a few friends with him.": "В центре Эльтибуля находится небольшой форт под названием Крепость Эльтибуль. Под этой крепостью обитают гоблины. Вождь находится в конце коридора слева. О, но с ним ещё и несколько друзей."
"This one is quite difficult. You must reach Close Friends favor-level with Hogan. Complete his favors, then give him gifts to further increase your favor-level. Hogan likes poetry, raw fruit, and magic staves.": "Это довольно сложно. Вам нужно достичь уровня расположения «Близкие друзья» у Хогана. Выполняйте его просьбы, а затем дарите ему подарки, чтобы ещё больше повысить уровень расположения. Хогану нравятся стихи, сырые фрукты и магические посохи."
"Hogan is housing some unusual guests hiding in his keep. He doesn't let people in unless they're trustworthy friends, though. Become his close friend to gain access.": "Хоган приютил в своей крепости нескольких необычных гостей. Однако он не впускает туда никого, кроме надёжных друзей. Станьте его близким другом, чтобы получить доступ."
"Once you reach Comfortable favor-level with Braigon, you can learn Cheesemaking from his Training menu. Braigon also teaches many cheese recipes. Be warned: cheesemaking is not the most accessible of crafting skills because it requires some exotic ingredients. However, cheese is one of the best foods in the game, and is worth the effort.": "Когда вы достигнете уровня расположения «Комфортно» у Брайгона, вы сможете изучить Сыроварение в его меню обучения. Брайгон также обучает многим рецептам сыра. Имейте в виду: сыроварение — не самый доступный навык ремесла, поскольку для него требуются некоторые экзотические ингредиенты. Однако сыр — одна из лучших видов еды в игре, и он стоит затраченных усилий."
"An Elf named Braigon is visiting Eltibule Keep. Take advantage of that opportunity to befriend him and learn his cheesemaking techniques.": "Эльф по имени Брайгон посещает Крепость Элтибуле. Воспользуйтесь этой возможностью, чтобы подружиться с ним и изучить его техники сыроделия."
"The Mangler and the Mauler are giant green bears that hunt together. They are surrounded by ordinary bears and some panthers. You will need to be patient and tactical in defeating their hangers-on in order to fight the Mangler without being swarmed!": "Мангер и Маулер — гигантские зелёные медведи, которые охотятся вместе. Их окружают обычные медведи и несколько пантер. Вам нужно будет действовать терпеливо и тактически, чтобы расправиться с их приспешниками и сразиться с Мангером, не оказавшись в окружении!"
"In the countryside of the Eltibule region is a large fey bear with an entourage. He preys upon travelers and must be put down.": "В сельской местности региона Эльтибуле обитает большой фейский медведь со свитой. Он нападает на путников и должен быть уничтожен."
"Percy Evans lives in a rundown house in the far northeast corner of Eltibule.": "Перси Эванс живёт в обветшалом доме в дальнем северо-восточном углу Эльтибуля."
"A hunter named Percy lives in a cabin in the countryside. Getting to know Percy can unlock certain opportunities.": "Охотник по имени Перси живёт в хижине в сельской местности. Знакомство с Перси может открыть некоторые возможности."
"Puffy Ben is a ranalon that can be found on the northeastern island of Sun Vale. He is usually on the island's southwestern beach. He offers different trade options throughout the day.": "Пухлый Бен — это раналон, которого можно найти на северо-восточном острове Сан-Вейл. Обычно он находится на юго-западном пляже острова. В течение дня он предлагает разные варианты обмена."
"One of the smaller islands was once a resort. Puffy Ben lives there. He collects shells.": "Один из небольших островов когда-то был курортом. Там живёт Пухлый Бен. Он собирает ракушки."
"Urglemarg is a ranalon that can be found deep beneath the sea. He's set up shop in the coral reef between the large island and the ranalon-covered island to the southeast.": "Урглемарг — это раналон, которого можно найти глубоко под морем. Он обосновался в коралловом рифе между большим островом и покрытым раналонами островом на юго-востоке."
"Those that go diving for pearls are likely to meet Urglemarg. Bring sand dollars!": "Те, кто отправляются нырять за жемчугом, вероятно, встретят Урглемарга. Возьмите с собой песчаные доллары!"
"Silvia's druid camp is in the northern tip of Sun Vale's largest island.": "Лагерь друида Сильвии находится на северной оконечности крупнейшего острова Солнечной Долины."
"Silvia leads the druids of Sun Vale. She can be found in the druid camp on the main island.": "Сильвия возглавляет друидов Сан-Вейла. Её можно найти в лагере друидов на главном острове."
"Nightshade can be found staying at a remote Inn found in the mountains near the central western shores. He can teach you how to add augments to your equipment without the help of a NPC and how to extract them from equipment.": "Найтшейд находится в удалённой гостинице в горах возле центрального западного побережья. Он может научить вас, как добавлять усиления к вашему снаряжению без помощи NPC, а также как извлекать их из снаряжения."
"Nightshade can be found staying at a remote Inn.": "Найтшейд можно найти в отдалённой таверне."
"Sir Johnson lives in Amulna, a city roughly in the middle of the Ilmari Desert. He will send you on an expedition to a 'war cache', a lost dungeon full of dangers and loot.": "Сэр Джонсон живёт в Амульне, городе примерно в центре пустыни Илмари. Он отправит вас в экспедицию к «военному тайнику» — затерянному подземелью, полному опасностей и добычи."
"Seek the tiny town of Amulna in the Ilmari Desert. Look for Sir Johnson, who will task you with a quest.": "Ищите крошечный городок Амулна в пустыне Илмари. Найдите сэра Джонсона, и он поручит вам задание."

