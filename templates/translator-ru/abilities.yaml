"Shoot an ally with a vial of healing potion. (The unconventional delivery method will sting a little.) You must have a Marvelous Reservoir Arrow (or better) in your inventory.": "Выстрелите в союзника флаконом с лечебным зельем. (Необычный способ доставки немного ужалит.) В вашем инвентаре должна быть Чудесная стрела-резервуар (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Beginner's Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть Beginner's Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Basic Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Basic Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Advanced Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Advanced Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Expert's Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть стрела Expert's Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Masterwork Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Masterwork Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Amazing Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Amazing Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Astonishing Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Astonishing Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Awesome Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть Awesome Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Incredible Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Incredible Long Arrow (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Marvelous Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Чудесная длинная стрела (или лучше)."
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Breathtaking Long Arrow (or better) in your inventory.": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Стрела длинного лука «Захватывающая дух» (или лучше)."
"You fire an ethereal arrow at your opponent. Requires an energy bow.": "Вы выпускаете эфирную стрелу в противника. Требуется энергетический лук."
"Precisely aim at a target, dealing extra damage. Shoots an ethereal arrow and requires an energy bow.": "Точно прицельтесь в цель, нанося дополнительный урон. Выпускает эфирную стрелу и требует energy bow."
"Fire an arrow that's on fire. You must have a Marvelous Reservoir Arrow (or better) in your inventory.": "Выстреливает горящей стрелой. В вашем инвентаре должна быть Marvelous Reservoir Arrow (или лучше)."
"Fire an arrow that's on fire. You must have a Breathtaking Reservoir Arrow (or better) in your inventory.": "Выпустите горящую стрелу. В вашем инвентаре должна быть Breathtaking Reservoir Arrow (или лучше)."
"Hit all nearby foes with acid!": "Поразите всех ближайших врагов кислотой!"
"Inject a spider egg into the target. If they live long enough, a spider will erupt from them.": "Внедряет в цель паучье яйцо. Если она проживёт достаточно долго, из неё вырвется паук."
"Kick an enemy with some of your many legs.": "Пни врага одной из своих многочисленных ног."
"Create a dangerous symbol that explodes when an enemy gets near. Requres one Basic Volatile Ink, with a 50% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требуется одна Basic Volatile Ink, с 50% шансом её потратить."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Advanced Volatile Ink, with a 50% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну улучшенную летучую краску с шансом 50% её расходовать."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Expert Volatile Ink, with a 33% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Expert Volatile Ink с шансом 33% на её расход."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Expert Volatile Ink, with a 50% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Expert Volatile Ink с 50% шансом расхода."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Amazing Volatile Ink, with a 33% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Amazing Volatile Ink с шансом 33% на её расходование."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Astounding Volatile Ink, with a 33% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Astounding Volatile Ink с шансом 33% на её расход."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Incredibly Volatile Ink, with a 33% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Невероятно Летучую Краску с шансом 33% её израсходовать."
"Create a dangerous symbol that explodes when an enemy gets near. Requires one Breathtakingly Volatile Ink, with a 33% chance to consume it.": "Создаёт опасный символ, который взрывается, когда враг подходит близко. Требует одну Breathtakingly Volatile Ink с шансом 33% на её расходование."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 60 seconds. Consumes one Basic Holistic Ink.": "Создаёт символ здоровья, который исцеляет ближайших союзников, когда рядом опасность. Длится 60 секунд. Расходует одну Basic Holistic Ink."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 90 seconds. Consumes one Advanced Holistic Ink.": "Создаёт символ здоровья, который исцеляет ближайших союзников, когда рядом опасность. Длится 90 секунд. Расходует одну улучшенную холистическую краску."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 120 seconds. Consumes one Expert Holistic Ink.": "Создаёт символ здоровья, который исцеляет ближайших союзников, когда рядом опасность. Длится 120 секунд. Расходует одну Expert Holistic Ink."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 120 seconds. Consumes one Amazing Holistic Ink.": "Создаёт символ здоровья, который исцеляет ближайших союзников, когда рядом опасность. Длится 120 секунд. Расходует одну Amazing Holistic Ink."
"Create a symbol of health that heals nearby allies when danger is nearby. Lasts 120 seconds. Consumes one Astounding Holistic Ink.": "Создаёт символ здоровья, который исцеляет ближайших союзников, когда рядом опасность. Длится 120 секунд. Расходует одну Astounding Holistic Ink."
"Create a symbol of repulsion; enemies that enter it will be flung away. Lasts 30 seconds. Consumes one Advanced Holistic Ink.": "Создаёт символ отталкивания; враги, которые войдут в него, будут отброшены прочь. Длится 30 секунд. Расходует одну Advanced Holistic Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 60 seconds. Consumes one Basic Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 60 секунд. Расходует одну Basic Volatile Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 90 seconds. Consumes one Advanced Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 90 секунд. Расходует одну Advanced Volatile Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 120 seconds. Consumes one Expert Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 120 секунд. Расходует одну Expert Volatile Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 120 seconds. Consumes one Amazing Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 120 секунд. Расходует одну Amazing Volatile Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 120 seconds. Consumes one Astounding Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 120 секунд. Расходует одну Astounding Volatile Ink."
"Create a symbol of power that shocks all creatures that get too close. Lasts 120 seconds. Consumes one Incredibly Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 120 секунд. Расходует одну Невероятно Летучую Чернильницу."
"Create a symbol of power that shocks all creatures that get too close. Lasts 120 seconds. Consumes one Breathtakingly Volatile Ink.": "Создаёт символ силы, который бьёт током всех существ, подошедших слишком близко. Длится 120 секунд. Расходует одну Breathtakingly Volatile Ink."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 60 seconds. Consumes one Basic Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разрушающую Armor кислоту. Длится 60 секунд. Расходует одну Basic Caustic Ink."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 90 seconds. Consumes one Advanced Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разрушающую Armor кислоту. Длится 90 секунд. Расходует одну порцию Advanced Caustic Ink."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Expert Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разрушающую Armor кислоту. Длится 120 секунд. Расходует одну едкую краску эксперта."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Amazing Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разъедающую Armor кислоту. Длится 120 секунд. Расходует одну Amazing Caustic Ink."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Astounding Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разрушающую Armor кислоту. Длится 120 секунд. Расходует одну Изумительную едкую краску."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Incredibly Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разъедающую Armor кислоту. Длится 120 секунд. Расходует одну порцию Невероятно едких чернил."
"Create a symbol of bile that flings armor-destroying acid at targets. Lasts 120 seconds. Consumes one Breathtakingly Caustic Ink.": "Создаёт символ желчи, который швыряет в цели разрушающую Armor кислоту. Длится 120 секунд. Расходует одну Поразительно едкую краску."
"Create a symbol of movement that can be used by you and your allies (if they wish). Lasts 5 minutes. Consumes two Amazing Holistic Inks.": "Создаёт символ перемещения, которым можете воспользоваться вы и ваши союзники (если захотят). Длится 5 минут. Расходует две Amazing Holistic Inks."
"Trace a symbol in the air that restores tremendous health to you. Consumes one Amazing Holistic Ink and takes one second to cast.": "Начертите в воздухе символ, который восстанавливает вам огромное количество здоровья. Расходует одну Amazing Holistic Ink и требует одну секунду на применение."
"Trace a symbol in the air that restores tremendous health to you and all your allies. Consumes one Astounding Holistic Ink and takes one second to cast.": "Начертите в воздухе символ, который восстанавливает огромное количество здоровья вам и всем вашим союзникам. Расходует одну Astounding Holistic Ink и требует одну секунду на применение."
"Inject poison into your enemy.": "Впрысните яд в своего врага."
"Lock your jaws onto your enemy, stunning them briefly.": "Сомкните челюсти на враге, ненадолго оглушив его."
"Carefully prepare your next attack so that it deals tremendous damage.": "Тщательно подготовьте свою следующую атаку, чтобы она нанесла огромный урон."
"Lay a sticky web that immobilizes the first enemy that enters it.": "Разместите липкую паутину, которая обездвиживает первого врага, вошедшего в неё."
"Bite your enemy and attempt to send them fleeing in terror. Chances of success are based on your Spider skill and the enemy's mental proficiency.": "Укусите врага и попытайтесь обратить его в бегство от ужаса. Шансы на успех зависят от вашего навыка Spider и ментальной стойкости врага."
"Fling poisonous web at a distant enemy and reel them to you.": "Метните ядовитую паутину во врага на расстоянии и подтяните его к себе."
"Spit armor-melting acid at a distant target.": "Выплюньте разъедающую Armor кислоту в удалённую цель."
"Briefly fool shopkeepers and villagers into perceiving you as a typical humanoid. Consumes 1 Moonstone.": "Ненадолго обманывает лавочников и жителей деревни, заставляя их воспринимать вас как обычного гуманоида. Расходует 1 Moonstone."
"Spin a bundle of webbing, useful for crafting.": "Скрутите пучок паутины, полезный для ремесла."
"Summon your body's last reserves of Power in an emergency.": "В критический момент призовите последние резервы Силы вашего тела."
"Take advantage of your preparedness and training to stay alive longer... at the cost of your armor.": "Используйте свою подготовку и выучку, чтобы дольше оставаться в живых... ценой своей Armor."
"Teleport the target's innards to another location far away. Requires an Aquamarine gem, which is usually consumed, but sometimes ends up inside the monster.": "Телепортирует внутренности цели в другое место далеко отсюда. Требует аквамариновый самоцвет, который обычно расходуется, но иногда оказывается внутри монстра."
"Expertly jab a stake into the target. (Consumes 1 Oak Wood.)": "Мастерски вонзить кол в цель. (Расходует 1 Oak Wood.)"
"Expertly jab a stake into the target. (Consumes 1 Maple Wood.)": "Мастерски вонзите кол в цель. (Расходует 1 Maple Wood.)"
"Expertly jab a stake into the target. (Consumes 1 Cedar Wood.)": "Мастерски вонзите кол в цель. (Расходует 1 Cedar Wood.)"
"Expertly jab a stake into the target. (Consumes 1 Spruce Wood.)": "Мастерски вонзите кол в цель. (Расходует 1 Spruce Wood.)"
"Consume Nightmare Flesh to heal your wounds.": "Поглотите Плоть Кошмара, чтобы исцелить свои раны."
"Dispels up to three stacks of the Brain Fog debuff.": "Снимает до трёх эффектов отрицательного статуса Brain Fog."
"Constructs are stunned. (Has no effect on other types of targets.)": "Конструкты оглушены. (Не действует на другие типы целей.)"
"Sends you back to your master. You must be a long-term animal with a bonded master, and you must be wearing a Familiar Recall Collar.": "Возвращает вас к вашему хозяину. Вы должны быть долгосрочным животным с установленной связью с хозяином, и на вас должен быть надет Ошейник возвращения фамильяра."
"Screech in a manner that will startle and terrify lesser ratkin. (Trained soldiers will be unaffected.)": "Издайте визг, который напугает и приведёт в ужас низших крысолюдов. (Обученные солдаты останутся невозмутимы.)"
"Kick spiders, scorpions, and other arthropods away from you. (You can only use this ability while under the influence of Spider Punt Potion.)": "Отпинывает от вас пауков, скорпионов и других членистоногих. (Вы можете использовать эту способность, только находясь под действием зелья Spider Punt.)"
"Immobilize a skeletal creature so that you have time to study it.": "Обездвижьте скелетное существо, чтобы у вас было время изучить его."
"Flings skeletal creatures away from you and stuns them. (You can only use this ability while under the effects of Skeleton Dispersal Fluid.)": "Отбрасывает скелетных существ прочь от вас и оглушает их. (Вы можете использовать эту способность, только находясь под действием Skeleton Dispersal Fluid.)"
"Scoop kuvou spit off of your face and put it in a jar.": "Соскребите плевок куву со своего лица и положите его в банку."
"You'll never stop killing! Never!": "Ты никогда не перестанешь убивать! Никогда!"
"You follow the dwarven credo: when things go bad, remember to not die.": "Ты следуешь дварфийскому кредо: когда дела идут плохо, помни — не умирай."
"You are unstoppable, and with a shout, you ignore your opponents' defensive techniques.": "Ты неудержим, и с криком игнорируешь защитные приёмы своих противников."
"You are undefeatable, and your shout reinforces this fact.": "Ты непобедим, и твой крик лишь подтверждает этот факт."
"With a shout, you move like a whirlwind, dodging and strafing any projectiles.": "С криком ты движешься, как вихрь, уклоняясь и уходя в сторону от любых снарядов."
"You shout your fury at an opponent, shaking and bewildering them.": "Вы с яростью кричите на противника, потрясая и приводя его в замешательство."
"You are a magical powerhouse. With a mere shout, you are ready to continue fighting.": "Вы — магическая сила. Одним лишь криком вы готовы продолжать сражаться."
"You are a master of the secret arts. With a sinister word, you unravel an enemy's spirit.": "Вы мастер тайных искусств. Зловещим словом вы разрушаете дух врага."
"Your powers are unfathomable and unknowable. With a mere whisper, you wipe yourself from an enemy's mind.": "Твои силы непостижимы и непознаваемы. Одним лишь шёпотом ты стираешь себя из разума врага."
"Activate microscopic automatons in your suit to repair physical damage.": "Активируйте микроскопических автоматонов в вашем костюме, чтобы восстановить физические повреждения."
"Your suit helps guide your movements, increasing your precision in myriad tiny ways.": "Ваш костюм помогает направлять ваши движения, повышая вашу точность множеством едва заметных способов."
"A glyph on James Eltibule's armor can fill your lungs with fresh air.": "Глиф на доспехе Джеймса Элтибьюла может наполнить ваши лёгкие свежим воздухом."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against very weak enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против очень слабых врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against weak enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против слабых врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against mediocre enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против посредственных врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against reasonably dangerous enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против достаточно опасных врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against dangerous enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против опасных врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against very dangerous enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против очень опасных врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against dangerous and powerful enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против опасных и могущественных врагов."
"You call upon the god of fear, Kajich, to spook your foe. This version is effective against dangerous and very powerful enemies.": "Вы взываете к богу страха, Каджичу, чтобы напугать своего врага. Эта версия эффективна против опасных и очень могущественных врагов."
"You call upon the god of sorrow, Ilth Hale, to help you endure more suffering.": "Ты взываешь к богу скорби, Илту Хейлу, чтобы он помог тебе вынести ещё больше страданий."
"Create a pillar of particles that lasts for 30 seconds.": "Создаёт столб частиц, который длится 30 секунд."
"Delete nearby graffiti. Use this only in a moderator capacity, when graffiti is offensive or otherwise breaks our rules. This action will be logged.": "Удалить ближайшее граффити. Используйте это только в качестве модератора, когда граффити является оскорбительным или иным образом нарушает наши правила. Это действие будет записано в журнал."
"Test Zap!": "Тестовый разряд!"
"Fire a beam of demonic energy from your gauntlets.": "Выстреливает лучом демонической энергии из ваших латных рукавиц."
"Internal Balancing Tool": "Внутренний инструмент балансировки"
"Project a super-hot pulse that raises a target's core temperature, making them more prone to combustion.": "Испускает сверхгорячий импульс, повышающий внутреннюю температуру цели и делающий её более склонной к возгоранию."
"Use a genetics analyzer on a live arthropod to examine their genetic code.": "Используйте генетический анализатор на живом членистоногом, чтобы изучить его генетический код."
"Use a genetics analyzer on a live non-ruminant ungulate to examine their genetic code.": "Используйте генетический анализатор на живом нежвачном копытном, чтобы изучить их генетический код."
"Boost your horse's max speed briefly. (This does not stack with other abilities that boost max speed.)": "Ненадолго повышает максимальную скорость вашей лошади. (Это не суммируется с другими способностями, повышающими максимальную скорость.)"
"Coax your horse into accelerating much faster.": "Уговорите свою лошадь ускориться гораздо быстрее."
"Lower your horse's anxiety with a calming word.": "Снизьте тревожность вашей лошади успокаивающим словом."
"Lower your horse's anxiety with a soothing gesture.": "Снизьте тревожность вашей лошади успокаивающим жестом."
"Lower your horse's anxiety with a practiced gentle demeanor.": "Снижает тревожность вашей лошади благодаря отработанному мягкому обращению."
"Eat grass to increase your maximum mount speed. (This does not stack with other abilities that boost max mount speed.) (Must be a cow.)": "Ешьте траву, чтобы увеличить максимальную скорость вашего маунта. (Это не суммируется с другими способностями, повышающими максимальную скорость маунта.) (Нужно быть коровой.)"
"Boost your max mount speed and jumping power, while simultaneously calming yourself. Speed is life. (This does not stack with other abilities that boost max mount speed.) (Must be a deer.)": "Увеличивает вашу максимальную скорость верхом и силу прыжка, одновременно успокаивая вас. Скорость — это жизнь. (Это не суммируется с другими способностями, которые увеличивают максимальную скорость верхом.) (Нужно быть оленем.)"
"Throw a grievously harmful ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Бросает чрезвычайно опасный огненный шар. Для сотворения этого заклинания вам не нужно держать в руках магический инструмент или даже иметь активной Fire Magic. Это заклинание помещается на вашу панель Miscellaneous."
"Throw a vaguely painful ball of warmth.": "Бросьте смутно болезненный шар тепла."
"Throw a ball of fire.": "Бросьте шар огня."
"Throw a very potent fireball.": "Бросает очень мощный огненный шар."
"This variant of Super Fireball has a chance to super-char one of the femurs in a human, elf, or rakshasa target, leaving it behind on their corpse when they perish.": "У этой разновидности Super Fireball есть шанс сверхсильно обуглить одну из бедренных костей у цели-человека, эльфа или ракшасы, оставив её на их трупе после смерти."
"Raise the temperature of your blood to lethal levels. Enemies that deal melee damage are burned.": "Поднимите температуру своей крови до смертельного уровня. Враги, наносящие урон в ближнем бою, получают ожоги."
"Throw a scintillating energy ball. It travels farther than a fireball and does additional damage to vulnerable targets.": "Бросает искрящийся энергетический шар. Он летит дальше, чем огненный шар, и наносит дополнительный урон уязвимым целям."
"Blast all nearby enemies with a quick wave of fire.": "Поразите всех ближайших врагов быстрой волной огня."
"Blast all nearby enemies with an incendiary wave of fire, leaving them burning.": "Поразите всех ближайших врагов испепеляющей волной огня, оставив их гореть."
"Spit flame at a nearby foe.": "Изрыгните пламя в ближайшего врага."
"Incinerate yourself with special flames that recharge your Power even as they burn off your flesh.": "Испепелите себя особым пламенем, которое восполняет вашу Power, даже пока оно сжигает вашу плоть."
"Throw a vaguely painful ball of warmth. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Бросьте смутно болезненный шар тепла. Для сотворения этого заклинания вам не нужно держать в руках орудие или даже иметь активной Fire Magic. Это заклинание помещается на вашу панель Miscellaneous."
"Throw a ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Бросает шар огня. Чтобы сотворить это заклинание, вам не нужно держать в руках магический инструмент или даже иметь активной Fire Magic. Это заклинание помещается на вашу панель Miscellaneous."
"Throw an intensely painful ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Бросьте невероятно болезненный шар огня. Чтобы сотворить это заклинание, вам не нужно держать в руках магический инструмент или даже иметь активной Fire Magic. Это заклинание помещается на вашу панель Miscellaneous."
"Throw a potently damaging ball of fire. You do not need to be wielding an implement to cast this spell, or even have Fire Magic active. This spell goes on your Miscellaneous ability bar.": "Бросает огненный шар, наносящий мощный урон. Чтобы сотворить это заклинание, вам не нужно держать в руках магический инструмент или даже иметь активной Fire Magic. Это заклинание помещается на вашу панель Miscellaneous способностей."
"Boost your max mount speed on land and water, while simultaneously calming yourself. Move in the flow. (This does not stack with other abilities that boost max mount speed.) (Must be a pig.)": "Увеличивает вашу максимальную скорость верхом на суше и в воде, одновременно успокаивая вас. Двигайтесь в потоке. (Это не суммируется с другими способностями, которые увеличивают максимальную скорость верхом.) (Нужно быть свиньёй.)"
"Skate a LOT faster for a moment, boosting your max land speed dramatically.": "На мгновение начните кататься ГОРАЗДО быстрее, значительно увеличив свою максимальную скорость передвижения по земле."
"Throw an essentially-harmless ball of cold.": "Бросает по сути безвредный шар холода."
"Throw a ball of cold.": "Бросает шар холода."
"Throw a ball of cold. It travels farther than a normal frostball and deals extra damage to vulnerable targets.": "Бросает шар холода. Он летит дальше, чем обычный ледяной шар, и наносит дополнительный урон уязвимым целям."
"Blast all nearby enemies with a quick wave of cold.": "Поражает всех ближайших врагов быстрой волной холода."
"Boost your defenses against cold.": "Усиливает вашу защиту от холода."
"Create a dangerous wall of fire at your feet.": "Создайте опасную стену огня у своих ног."
"Create a dangerous wall of fire at your feet. This variant version of Wall of Fire 4 uses an unnaturally colored flame.": "Создаёт опасную стену огня у ваших ног. Этот вариант Стены Огня 4 использует пламя неестественного цвета."
"Throw an essentially-harmless sphere of room-temperature matter.": "Бросьте по сути безвредную сферу материи комнатной температуры."
"Throw a ball of room-temperature matter.": "Бросьте шар материи комнатной температуры."
"Throw a reasonably painful ball of room-temperature matter.": "Бросает довольно болезненный шар материи комнатной температуры."
"Throw a painful ball of room-temperature matter.": "Бросьте болезненный шар материи комнатной температуры."
"Throw a ball of fire. This variant is more potent than a regular Fireball of the same level but costs Power.": "Бросьте шар огня. Этот вариант мощнее, чем обычный Fireball того же уровня, но расходует Power."
"This variant Wall of Fire is icy cold.": "Этот вариант Стены огня ледяной и холодный."
"This variant Wall of Fire is green in color and provides life at the expense of damage.": "Этот вариант Стены огня зелёного цвета и дарует жизнь ценой урона."
"This variant Wall of Fire has slightly increased range and is extremely aggravating to enemies.": "Этот вариант Wall of Fire имеет немного увеличенную дальность и чрезвычайно раздражает врагов."
"Fling beautiful but grievously harmful projectiles at all enemies within 20 meters.": "Мечите прекрасные, но крайне губительные снаряды во всех врагов в радиусе 20 метров."
"Summon a sentient microclimate of fire and smoke. This is a variant of Fire Wall.": "Призовите разумный микроклимат из огня и дыма. Это вариант Fire Wall."
