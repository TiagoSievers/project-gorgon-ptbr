# ── Описания способностей ──
"Punch with a fist. Requires at least one open hand.": "Ударьте кулаком. Требуется как минимум одна свободная рука."
"A kick that sends the enemy flying backwards.": "Удар ногой, который отбрасывает врага назад."
"A flurry of blows that will leave an opponent briefly stunned. (Your hands must be empty.)": "Серия ударов, которая ненадолго оглушит противника. (Ваши руки должны быть пусты.)"
"Strike a vital point. If you can find an opening in their defenses, also stuns the target.": "Ударьте по жизненно важной точке. Если вы сможете найти брешь в их защите, также оглушает цель."
"Fling an opponent away from you.": "Отбросьте противника прочь от себя."
"Internal": "Внутреннее"
"A feint that catches an opponent off-guard. In combos, you can use Jab whenever Punch is called for, and equipment that affects Punch also affects Jab.": "Обманный удар, который застает противника врасплох. В комбо вы можете использовать Джеб всякий раз, когда требуется Punch, а снаряжение, влияющее на Punch, также влияет на Джеб."
"A sudden painful kick. You can use Knee Kick in place of Front Kick in combos.": "Внезапный болезненный удар. Вы можете использовать Удар коленом вместо Front Kick в комбо."
"Slam into an opponent, causing damage. You can use Bodyslam instead of Hip Throw in combos.": "Врежьтесь в противника, нанося урон. Вы можете использовать Удар телом вместо Hip Throw в комбо."
"Bash an opponent with your head. You can use Headbutt instead of Barrage in combos.": "Бодните противника головой. Вы можете использовать Удар головой вместо Barrage в комбо."
"Jab a vital organ, causing traumatic injury. If the opponent's armor is weak, they will take additional damage. You can use Mamba Strike instead of Cobra Strike in combos.": "Нанесите удар по жизненно важному органу, вызывая тяжёлую травму. Если броня противника слаба, он получит дополнительный урон. Вы можете использовать Удар Мамбы вместо Cobra Strike в комбо."
"A punch that damages the target's innards, leaving them more susceptible to further attack.": "Удар, который повреждает внутренности цели, делая её более уязвимой для дальнейших атак."
"A punch with a claw weapon (or animal claws).": "Удар кулаком с когтевым оружием (или звериными когтями)."
"A flurry of blows that will leave an opponent briefly stunned. This is a variant of Barrage. (You must be wielding two unarmed weapons or be an empty-handed animal with claws.)": "Серия ударов, которая ненадолго оглушит противника. Это вариант Barrage. (Вы должны использовать два безоружных оружия или быть животным с когтями и пустыми руками.)"
"Punch a nerve or vulnerable spot that causes great pain in the target, leading them to focus on you. In combos, you can use Infuriating Fist in place of Punch.": "Ударьте по нерву или уязвимому месту, причиняя цели сильную боль и заставляя её сосредоточиться на вас. В комбо вы можете использовать Разъяряющий Кулак вместо Punch."
"Toss a Basic Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросает базовую споровую бомбу, нанося урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Potent Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте мощную споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Deadly Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте смертоносную споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Malevolent Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте Бомбу со злобными спорами, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Horrific Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте Жуткую споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Disastrous Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте Гибельную споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Nightmarish Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте кошмарную споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Ruinous Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте губительную споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Diabolical Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте дьявольскую споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Heinous Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте мерзкую споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Gruesome Spore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте жуткую споровую бомбу, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Toss a Lycanspore Bomb to damage nearby enemies. Does extra damage to vulnerable targets.": "Бросьте бомбу с ликантроспорой, чтобы нанести урон ближайшим врагам. Наносит дополнительный урон уязвимым целям."
"Plant an aggressive fungal creature that spits poisonous mushroom bits at your enemies.": "Посадите агрессивное грибное существо, которое выплёвывает ядовитые кусочки грибов в ваших врагов."
"(Touching a bomb spore triggers this ability)": "(Прикосновение к споровой бомбе активирует эту способность)"
"Attack with a sword.": "Атакуйте мечом."
"A flurry of attacks that leave the enemy disoriented and disheveled.": "Шквал атак, который оставляет врага дезориентированным и растрёпанным."
"Defensive maneuver that diminishes enemy's Rage and weakens their next attack.": "Защитный манёвр, который уменьшает Rage врага и ослабляет его следующую атаку."
"A flurry of attacks that does extra damage to vulnerable targets, and creates an opening for your next attack to be more successful.": "Серия атак, наносящая дополнительный урон уязвимым целям и создающая возможность для вашей следующей атаки быть более успешной."
"A slow horrific cut across the midsection.": "Медленный ужасающий разрез поперёк живота."
"Defensive maneuver that diminishes enemy's Rage. For combos that require Parry, you can use Riposte instead.": "Защитный манёвр, который уменьшает Rage врага. Для комбо, требующих Parry, вместо него можно использовать Рипост."
"A carefully-aimed attack that bypasses armor entirely.": "Тщательно выверенная атака, полностью игнорирующая Armor."
"Cut deep, causing the target to bleed.": "Глубоко режет, вызывая у цели кровотечение."
"Attack the target's offense, leaving them less able to deal damage.": "Атакуйте наступательные способности цели, делая её менее способной наносить урон."
"A devastating attack.": "Сокрушительная атака."
"A solemn strike that does extra damage to undead.": "Торжественный удар, который наносит дополнительный урон нежити."
"A quick attack. For equipment and combos that require Sword Slash, you can use Thrusting Blade instead.": "Быстрая атака. Для снаряжения и комбо, которым требуется Sword Slash, вместо него можно использовать Thrusting Blade."
"Surprise the target with a stab to the chest, turning their Rage into pain.": "Застаньте цель врасплох ударом в грудь, превращая её Rage в боль."
"You attempt to unravel the target's rage, making it more difficult for them to use their Rage attacks. (Chances of success are based on your Psychology skill and the enemy's mental proficiency.)": "Вы пытаетесь распутать ярость цели, затрудняя ей использование атак Ярости. (Шансы на успех зависят от вашего навыка Психологии и ментальной подготовки врага.)"
"Convince an enemy to discuss their thoughts and fears with you instead of attacking. Chances of success are based on your Psychology skill and the enemy's mental proficiency.": "Убеди врага обсудить с тобой свои мысли и страхи вместо нападения. Шансы на успех зависят от твоего навыка Психологии и ментальной подготовки врага."
"Say something cruel that plays upon the target's fears and failures, dealing psychic damage.": "Сказать что-то жестокое, играя на страхах и неудачах цели, нанося psychic damage."
"Your words deal mental damage and may cause the target to run in terror. Chances of success are based on your Psychology skill and the enemy's mental proficiency.": "Ваши слова наносят ментальный урон и могут заставить цель в ужасе убежать. Шансы на успех зависят от вашего навыка Психология и ментальной подготовки врага."
"Give yourself or an ally a quick pep-talk to overcome their grievous injuries.": "Быстро подбодрите себя или союзника, чтобы помочь преодолеть тяжёлые ранения."
"Explain away minor misunderstandings, causing the target to be less aggressive toward you.": "Объясните мелкие недоразумения, из-за чего цель станет менее агрессивной по отношению к вам."
"Taunt an enemy to keep it focused on attacking you instead of someone else.": "Спровоцируйте врага, чтобы он сосредоточился на атаке вас, а не кого-то другого."
"Say something kind that briefly catches the target off guard, causing them to lose their Rage.": "Скажите что-нибудь доброе, что ненадолго застанет цель врасплох, из-за чего она потеряет свою Rage."
"Use the power of optimism to recover from your injuries.": "Используйте силу оптимизма, чтобы оправиться от своих ран."
"Push yourself and your allies to new heights, thanks to your confident demeanor.": "Благодаря вашей уверенной манере держаться вы вдохновляете себя и своих союзников на новые свершения."
"Reveal something so surprising that the target's heart briefly stops. (Only works on targets who have been recent victims of Psychoanalyze or Tell Me About Your Mother.)": "Раскройте нечто настолько шокирующее, что сердце цели на мгновение остановится. (Работает только на целях, которые недавно стали жертвами Psychoanalyze или Tell Me About Your Mother.)"
"Attempt to make the target feel so guilty that they don't use their full strength. (Chances of success are based on your Psychology skill and the enemy's mental proficiency.)": "Попытайтесь заставить цель почувствовать такую вину, чтобы она не использовала всю свою силу. (Шансы на успех зависят от вашего навыка Психология и ментальной подготовки врага.)"
"Tease and aggravate your enemy.": "Дразните и раздражайте своего врага."
"Summons a majestic deer.": "Призывает величественного оленя."
"Gut your enemy like a fish. Requires a skinning knife. (There is a 5% chance the knife will be destroyed.)": "Выпотроши своего врага, как рыбу. Требуется свежевальный нож. (Есть 5% шанс, что нож будет уничтожен.)"
"Cast your fishing rod and catch a fish.": "Забросьте удочку и поймайте рыбу."
"Cast your fishing rod and catch a fish. Your advanced bait technique will have them biting fast.": "Закиньте удочку и поймайте рыбу. Ваша продвинутая техника наживки заставит их клевать быстро."
"Cast your fishing rod and catch a fish. No fish can resist your bait for long!": "Забросьте удочку и поймайте рыбу. Ни одна рыба не сможет долго сопротивляться вашей наживке!"
"Cast your fishing rod and catch a fish, then throw it back.": "Забросьте удочку, поймайте рыбу, а затем отпустите её обратно."
"Use your advanced bait technique to quickly catch a fish, then throw it back.": "Используйте свою продвинутую технику наживки, чтобы быстро поймать рыбу, а затем отпустить её обратно."
"Use your incredible baiting techniques to rapidly catch a fish, then throw it back.": "Используйте свои невероятные навыки наживки, чтобы быстро поймать рыбу, а затем отпустить её обратно."
"Reel the line in some. This counteracts certain conditions encountered while angling.": "Немного подмотать леску. Это противодействует некоторым условиям, возникающим во время рыбалки."
"Juke the fish with quick movement. This counteracts certain conditions encountered while angling.": "Обхитрите рыбу быстрым движением. Это противодействует некоторым состояниям, возникающим во время рыбалки."
"Let the line out a bit to wear out the fish. This counteracts certain conditions encountered while angling.": "Немного ослабьте леску, чтобы утомить рыбу. Это противодействует некоторым условиям, возникающим во время рыбалки."
"Take careful heed of your current position so that you can leap back to it when injured.": "Тщательно запомните своё текущее положение, чтобы при ранении вы могли прыгнуть обратно к нему."
"Bite your enemy.": "Укусите своего врага."
"Claw your enemy.": "Ударьте врага когтем."
"Become a wolf. (Use again to attempt to stop being a wolf.)": "Станьте волком. (Используйте снова, чтобы попытаться перестать быть волком.)"
"Bite your enemy. Future Pack Attacks (by you or by other werewolves) will deal extra damage to this target.": "Укусите врага. Последующие Атаки стаи (ваши или других оборотней) будут наносить этой цели дополнительный урон."
"Claw your enemy. If their armor is weak, also stuns them.": "Полосните врага когтями. Если его Armor слабая, также оглушает его."
"Become a wolf with a thick winter coat of fur. (Use again to attempt to stop being a wolf.)": "Стать волком с густой зимней шерстью. (Используйте снова, чтобы попытаться перестать быть волком.)"
"Leap at your enemy, focusing solely on destroying their armor. If their armor is weak, also stuns them. (This is a variant of Pouncing Rake. Equipment that boosts Pouncing Rake also boosts Pouncing Rend.)": "Прыгните на врага, сосредоточившись исключительно на разрушении его Armor. Если его Armor слаба, также оглушает его. (Это вариант Pouncing Rake. Снаряжение, усиливающее Pouncing Rake, также усиливает Прыжковый Разрыв.)"
"Bite through veins to cause blood loss.": "Прокуси вены, чтобы вызвать кровопотерю."
"Tear into your enemy's flesh.": "Впиться в плоть врага."
"Launch into a vicious attack that sows seeds of doubt in the target's mind.": "Переходите в яростную атаку, которая сеет семена сомнения в разуме цели."
"Attack with repeated mauling claws to the target's exposed flesh. Damage is reduced by 1 for every 5 points of armor the foe has left.": "Атакуйте цель серией терзающих ударов когтями по открытой плоти. Урон уменьшается на 1 за каждые 5 очков Armor, оставшихся у противника."
"Increase your mount speed while traveling as a wolf. (This ability can only be used after you've unlocked it from the Altar of Norala.)": "Увеличивает скорость вашего ездового животного во время передвижения в облике волка. (Эту способность можно использовать только после того, как вы разблокируете её у Алтаря Норалы.)"
"Use a Simple First Aid Kit (or better) to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте простой набор первой помощи (или лучше), чтобы исцелить себя или союзника. С вероятностью 10% набор первой помощи будет израсходован."
"Use a Basic First Aid Kit (or better) to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте Basic First Aid Kit (или лучше), чтобы исцелить себя или союзника. С вероятностью 10% First Aid Kit будет израсходован."
"Use a Good First Aid Kit (or better) to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте Good First Aid Kit (или лучше), чтобы исцелить себя или союзника. С вероятностью 10% First Aid Kit будет израсходован."
"Use an Expert's First Aid Kit (or better) to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте аптечку эксперта по первой помощи (или лучше), чтобы исцелить себя или союзника. С вероятностью 10% аптечка первой помощи будет израсходована."
"Use a Master First Aid Kit to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте мастерский набор первой помощи, чтобы исцелить себя или союзника. Существует 10% шанс, что набор первой помощи будет израсходован."
"Use an Amazing First Aid Kit to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте потрясающий набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 10% набор первой помощи будет израсходован."
"Use a Basic First Aid Kit (or better) to remove one basic disease from yourself or an ally. The First Aid Kit is used up.": "Используйте базовый набор первой помощи (или лучше), чтобы удалить одну обычную болезнь у себя или союзника. Набор первой помощи будет израсходован."
"Use a Good First Aid Kit (or better) to remove one complex disease from yourself or an ally. The First Aid Kit is used up.": "Используйте Good First Aid Kit (или лучше), чтобы снять одну сложную болезнь с себя или союзника. First Aid Kit при этом расходуется."
"Use an Expert's First Aid Kit (or better) to remove one advanced disease from yourself or an ally. The First Aid Kit is used up.": "Используйте аптечку первой помощи эксперта (или лучше), чтобы снять одну запущенную болезнь с себя или союзника. Аптечка первой помощи будет израсходована."
"Use a Master First Aid Kit (or better) to remove one serious disease from yourself or an ally. The First Aid Kit is used up.": "Используйте Master First Aid Kit (или лучше), чтобы снять одну серьёзную болезнь с себя или союзника. First Aid Kit будет израсходован."
"Bring a seemingly-dead ally back to life. Consumes 2 Diamonds. The ally will return with 1 Health. (And may die again immediately if they are in a dangerous environment!)": "Верните кажущегося мёртвым союзника к жизни. Расходует 2 Diamonds. Союзник вернётся с 1 Health. (И может снова немедленно умереть, если находится в опасной среде!)"
"Bring a seemingly-dead ally back to life. Consumes 2 Diamonds. The ally will return with half of their Max Health.": "Верните к жизни союзника, который кажется мёртвым. Расходует 2 алмаза. Союзник вернётся с половиной своего Max Health."
"Bring a seemingly-dead ally back to life. Consumes 2 Diamonds. The ally will return with all of their Max Health.": "Верните к жизни кажущегося мёртвым союзника. Расходует 2 Diamonds. Союзник вернётся со всем своим Max Health."
"Use 3 Good First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 хороших аптечки первой помощи (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи будут израсходованы."
"Use 3 Expert's First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 аптечки первой помощи эксперта (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи будут израсходованы."
"Use a Tundra Lichen to repair a broken bone.": "Используйте Tundra Lichen, чтобы восстановить сломанную кость."
"Use 3 Amazing First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 потрясающих аптечки первой помощи (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи будут израсходованы."
"Use a Simple Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте простой набор для починки брони (или лучше), чтобы починить свою броню или броню союзника. Есть 10% шанс, что набор будет израсходован."
"Use a Basic Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Basic Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. С вероятностью 10% набор будет израсходован."
"Use a Good Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Good Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Есть 10% шанс, что набор будет израсходован."
"Use a Expert's Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте набор эксперта для заплатки брони (или лучше), чтобы починить вашу броню или броню союзника. С вероятностью 10% набор будет израсходован."
"Use a Master Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Master Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Есть 10% шанс, что набор будет израсходован."
"Use an Amazing Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Amazing Armor Patch Kit (или лучше), чтобы починить вашу броню или броню союзника. С вероятностью 10% набор будет израсходован."
"Use an Amazing Armor Patch Kit (or better) to repair your or an ally's armor. There is a 20% chance the kit will be used up.": "Используйте Amazing Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Существует 20% шанс, что набор будет израсходован."
"Use an Astounding Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Astounding Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. С вероятностью 10% набор будет израсходован."
"Use an Astounding Armor Patch Kit (or better) to repair your or an ally's armor. There is a 15% chance the kit will be used up.": "Используйте Astounding Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Есть 15% шанс, что набор будет израсходован."
"Use an Astounding Armor Patch Kit (or better) to repair your or an ally's armor. There is a 20% chance the kit will be used up.": "Используйте Astounding Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. С вероятностью 20% набор будет израсходован."
"Apply matted hair to your cloth armor to repair it. (You must be wearing at least some cloth armor!)": "Наложите свалявшуюся шерсть на вашу тканевую броню, чтобы починить её. (На вас должна быть надета хотя бы часть тканевой брони!)"
"Search for a hidden mushroom in the area.": "Ищите в этой области спрятанный гриб."
"Increase your run speed dramatically for 5 seconds.": "Значительно увеличивает вашу скорость бега на 5 секунд."
"Increase your run speed dramatically for 10 seconds.": "Значительно увеличивает вашу скорость бега на 10 секунд."
"You grunt with a calm determination that affects all who hear it, a reminder that now is not the time to succumb to pain.": "Вы издаёте хрюк спокойной решимости, который воздействует на всех, кто его слышит, напоминая, что сейчас не время поддаваться боли."
"Tear into your enemy, causing it to bleed.": "Разорвите врага, заставив его истекать кровью."
"Work yourself and your allies into a frenzy of violence.": "Приведите себя и своих союзников в неистовство насилия."
"Chomp an enemy in their most vulnerable spot.": "Укусите врага в его наиболее уязвимое место."
"Kick an enemy away from you.": "Отбросьте врага от себя ударом ноги."
"Scream horrendously, potentially spooking nearby foes. (Chances of causing fear are based on your Pig level and the targets' mental defenses.)": "Ужасающе завизжите, потенциально пугая ближайших врагов. (Шансы вызвать страх зависят от вашего уровня Pig и ментальной защиты целей.)"
"Take advantage of your ever-present caked on mud to save yourself or an ally.": "Используйте всегда присутствующую на вас засохшую грязь, чтобы спасти себя или союзника."
"Feign harmlessness, convincing your enemy that they could be spending their time more productively than by killing you.": "Притворитесь безобидным, убеждая врага, что он мог бы потратить своё время с большей пользой, чем на то, чтобы убивать вас."
"Kick your enemy.": "Пните своего врага."
"Bash your head into an enemy, stunning them briefly.": "Врежься головой во врага, ненадолго оглушая его."
"Look cute and harmless, briefly causing you to receive less damage from physical attacks.": "Выглядите мило и безобидно, ненадолго снижая получаемый вами урон от физических атак."
"Increase your run speed and jumping prowess for a moment.": "На мгновение увеличивает вашу скорость бега и высоту прыжка."
"Maximize your cuteness to cause an enemy heart-wrenching guilt.": "Максимально повысьте свою милоту, чтобы вызвать у врага душераздирающее чувство вины."
"Swing your antlers in a cutting motion. (Works for does, too, because you're just that awesome.)": "Взмахните своими рогами, нанося режущий удар. (Подходит и для самок оленя, потому что вы просто настолько круты.)"
"A rapid sequence of front kicks that makes sure enemies keep paying attention to you.": "Быстрая серия ударов передними копытами, которая заставляет врагов и дальше уделять внимание вам."
"Swing your antlers in an arc that hits all nearby enemies and reminds them to take you seriously, even though you're very cute. (Works for does, too, because you're just that awesome.)": "Взмахните своими рогами по дуге, поражая всех ближайших врагов и напоминая им, что к вам стоит относиться серьёзно, даже если вы очень милый. (Подходит и для самок, потому что вы просто настолько круты.)"
"Befriend a rat. The rat will fight for you as long as you remain in the rat's natural home zone. Requires a cheese.": "Подружитесь с крысой. Крыса будет сражаться за вас, пока вы остаётесь в естественной для крысы домашней зоне. Требуется сыр."
"Violently kick your enemies.": "Яростно пните своих врагов."
"Trample your enemies.": "Топчите своих врагов."
"Bash your enemy, stunning them.": "Ударьте врага, оглушив его."
"Smash your enemy with a violent strike. Does extra damage if the target is Vulnerable. This attack is considered a Kick.": "Обрушь на врага яростный удар. Наносит дополнительный урон, если цель Vulnerable. Эта атака считается Kick."
"Focus your efforts on defeating a single enemy, letting their attacks roll off of you like water.": "Сосредоточьте свои усилия на победе над одним врагом, позволяя его атакам скатываться с вас, как вода."
"Moo to summon your inner bull, gaining stampede speed and bonus damage.": "Мычите, чтобы призвать своего внутреннего быка, получив скорость топота и бонусный урон."
"Moo to calm yourself, reaching a zen-like state of readiness.": "Мычите, чтобы успокоиться и достичь дзеноподобного состояния готовности."
"Eat grass to heal yourself.": "Ешьте траву, чтобы исцелить себя."
"Collect grass from the environment. Can only be used outdoors.": "Собирать траву в окружающей среде. Можно использовать только на открытом воздухе."
"Collect milk. Requires an empty bottle.": "Соберите молоко. Требуется пустая бутылка."
"Collect milk. Requires an empty bottle. This higher-level version requires you to follow a vegetarian diet.": "Соберите молоко. Требуется пустая бутылка. Эта версия более высокого уровня требует, чтобы вы придерживались вегетарианской диеты."
"Fling deadly toxins into the air all around you.": "Разбросайте вокруг себя в воздухе смертоносные токсины."
"Fling deadly fungal toxins into the air all around you.": "Разбросайте вокруг себя в воздухе смертоносные грибные токсины."
"Fling armor-dissolving acids into the air all around you.": "Разбрызгайте вокруг себя в воздухе кислоты, разъедающие Armor."
"Disperse chemicals that let you and your allies run at high speed for a short time.": "Распылите химикаты, которые позволят вам и вашим союзникам некоторое время бежать на высокой скорости."
"Fling restorative chemicals onto yourself and nearby allies.": "Распылите восстанавливающие химикаты на себя и ближайших союзников."
"Disperse an instant-freeze chemical bomb to slow enemy movement.": "Распылите химическую бомбу мгновенной заморозки, чтобы замедлить передвижение врага."
"Inject mutation chemicals into yourself or an ally. You grow numerous additional spiky toes on your feet, giving you purchase on the ground and causing all Kick attacks to deal extra damage. (Someone can only be affected by one Mutation at a time.)": "Впрысните мутагенные химикаты в себя или союзника. У вас вырастает множество дополнительных шипастых пальцев на ногах, что улучшает сцепление с землёй и заставляет все атаки Kick наносить дополнительный урон. (На кого-то одновременно может действовать только одна Мутация.)"
"Inject mutation chemicals into yourself or an ally. Your skin thickens and coarsens. You take less damage from attacks. (Someone can only be affected by one Mutation at a time.)": "Впрысните мутагенные химикаты в себя или союзника. Ваша кожа утолщается и грубеет. Вы получаете меньше урона от атак. (На кого-то одновременно может действовать только одна Мутация.)"
"Inject mutation chemicals into yourself or an ally. You grow a small ancillary heart inside your ribcage, causing you to regenerate power quicker. (Someone can only be affected by one Mutation at a time.)": "Впрысните мутагенные химикаты в себя или союзника. У вас вырастает небольшое вспомогательное сердце внутри грудной клетки, из-за чего вы быстрее восстанавливаете энергию. (На кого-либо может действовать только одна Мутация одновременно.)"
"Inject healing chemicals into yourself or an ally.": "Ввести лечебные химикаты себе или союзнику."
"Order your golem to immediately run through its instruction set and use an ability. (You can use the golem conditional \"Owner has triggered golem\" to add a special instruction for this situation. Remember that it will still follow its rules from first to last, so if you want the rule to always trigger, it should be the first rule.)": "Прикажите своему голему немедленно выполнить свой набор инструкций и использовать способность. (Вы можете использовать условие голема \"Владелец активировал голема\", чтобы добавить особую инструкцию для этой ситуации. Помните, что он всё равно будет следовать своим правилам от первого до последнего, так что если вы хотите, чтобы правило срабатывало всегда, оно должно быть первым правилом.)"
"You concoct an automaton that can be given four commands. It is extra-armored against attack.": "Вы создаёте автоматона, которому можно отдать четыре команды. Он дополнительно защищён бронёй от атак."
"You concoct an automaton that can be given one command.": "Вы создаёте автоматона, которому можно отдать одну команду."
"You concoct an automaton that can be given two commands.": "Вы создаёте автоматона, которому можно отдать две команды."
"You concoct an automaton that can be given three commands.": "Вы создаёте автоматона, которому можно отдать три команды."
"You concoct an automaton that can be given four commands.": "Вы создаёте автоматона, которому можно отдать четыре команды."
"You concoct an automaton that can be given five commands.": "Вы создаёте автоматона, которому можно отдать пять команд."
"You concoct an automaton that can be given six commands.": "Вы создаёте автоматона, которому можно отдавать шесть команд."
"You concoct an automaton that can be given seven commands.": "Вы создаёте автоматона, которому можно отдать семь команд."
"You concoct an automaton that can be given eight commands.": "Вы создаёте автоматона, которому можно отдать восемь команд."
"Splash harmful chemicals on an enemy.": "Выплесните на врага вредные химикаты."
"You concoct an automaton that can be given nine commands.": "Вы создаёте автоматона, которому можно отдать девять команд."
"You concoct an automaton that can be given ten commands.": "Вы создаёте автоматона, которому можно отдать десять команд."
"You concoct an automaton that can be given ten commands. This variant's Self-Destruct command deals double direct damage.": "Вы создаёте автоматона, которому можно отдать десять команд. Команда самоуничтожения у этого варианта наносит двойной прямой урон."
"Instantly turn to face the next objective in your active quest. If it's within visual range, it will be marked with a pillar of light. Only works if your next objective is in the general vicinity.": "Мгновенно повернуться лицом к следующей цели в вашем активном задании. Если она находится в пределах видимости, она будет отмечена столбом света. Работает, только если ваша следующая цель находится поблизости."
"Intuit a path to the next objective in your active quest. Only works if the next objective is in the general vicinity.": "Интуитивно определяет путь к следующей цели в вашем активном задании. Работает, только если следующая цель находится поблизости."
"Jab a Weak Poisoned Knife into your target, dealing instant Poison damage.": "Вонзите в цель слабый отравленный нож, нанося мгновенный урон ядом."
"Jab a Modest Poisoned Knife into your target, dealing instant Poison damage.": "Вонзите в цель скромный отравленный нож, нанося мгновенный урон ядом."
"Jab a Dangerous Poisoned Knife into your target, dealing instant Poison damage.": "Вонзите в цель опасный отравленный нож, мгновенно нанося урон ядом."
"Jab a Potent Poisoned Knife into your target, dealing instant Poison damage.": "Вонзите в цель мощный отравленный нож, мгновенно нанося урон ядом."
"Jab a Deadly Poisoned Knife into your target, dealing instant Poison damage.": "Вонзите в свою цель смертоносный отравленный нож, нанеся мгновенный урон ядом."
"Jab a Modest Wolfsbaned Knife into your target, dealing instant Poison damage, and additional damage to wolves and lycanthropes.": "Вонзите в цель скромный нож с волчьей погибелью, нанося мгновенный урон ядом, а также дополнительный урон волкам и ликантропам."
"Jab a Potent Wolfsbaned Knife into your target, dealing instant Poison damage, and additional damage to wolves and lycanthropes.": "Вонзите в цель мощный нож, пропитанный волчьей погибелью, нанося мгновенный урон ядом, а также дополнительный урон волкам и ликантропам."
"Jab a Heinous Wolfsbaned Knife into your target, dealing instant Poison damage, and additional damage to wolves and lycanthropes.": "Вонзите в цель мерзкий нож Волчьей Погибели, нанося мгновенный урон ядом, а также дополнительный урон волкам и ликантропам."
"Summon the pet in your stable slot #1": "Призывает питомца из ячейки вашего стойла #1"
"Summon the pet in your stable slot #2": "Призывает питомца из ячейки вашего стойла #2"
"Summon the pet in your stable slot #3": "Призывает питомца из ячейки вашего стойла #3"
"Summon the pet in your stable slot #4": "Призывает питомца из ячейки вашего стойла #4"
"Summon the pet in your stable slot #5": "Призывает питомца из ячейки вашего стойла #5"
"Summon the pet in your stable slot #6": "Призывает питомца из ячейки вашего стойла #6"
"Summon the pet in your stable slot #7": "Призывает питомца из ячейки вашего стойла #7"
"Summon the first living pet in your stable. If the pet in stable slot #1 is alive, it is summoned; if not, slot #2 is checked, etc.": "Призывает первого живого питомца в вашем стойле. Если питомец в ячейке стойла №1 жив, он будет призван; если нет, проверяется ячейка №2 и так далее."
"Tame a wild rat into becoming your permanent pet. Requires a piece of cheese.": "Приручите дикую крысу, чтобы она стала вашим постоянным питомцем. Требуется кусок сыра."
"Tame a wild great cat into becoming your permanent pet. Requires a piece of string.": "Приручите дикую большую кошку, чтобы она стала вашим постоянным питомцем. Требуется кусок верёвки."
"Tame a wild bear into becoming your permanent pet. Requires a perch.": "Приручите дикого медведя, чтобы он стал вашим постоянным питомцем. Требуется насест."
"Tame a wild bee or wasp into becoming your permanent pet. Requires a Bee-Lover's Bouquet.": "Приручите дикую пчелу или осу, чтобы она стала вашим постоянным питомцем. Требуется Bee-Lover's Bouquet."
"Instruct your pet to use its special attack ability. (Each type of pet has a special attack, although some pets' special attacks are hardly more impressive than their basic attack.)\n\nIf the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Прикажите своему питомцу использовать его особую атакующую способность. (У каждого типа питомцев есть особая атака, хотя особые атаки некоторых питомцев едва ли впечатляют больше, чем их обычная атака.)\\n\\nЕсли питомец ещё не вступил в бой, он использует выбранную вами цель как предполагаемого врага."
"Coax an Animal Handling pet to get back up. See, it was just playing dead!": "Уговорите питомца из Animal Handling снова подняться. Видите, он просто притворялся мёртвым!"
"Order your pet to come to your aid and taunt whatever's attacking you.": "Прикажите своему питомцу прийти вам на помощь и спровоцировать того, кто вас атакует."
"Give your pet the signal to unleash its inner fury.": "Подайте своему питомцу сигнал высвободить свою внутреннюю ярость."
"Give your pet a quick snack to bolster it in the middle of combat.": "Дайте своему питомцу быстрый перекус, чтобы поддержать его в разгар боя."
"Give your pet positive reinforcement after combat to help get it back into shape quickly.": "Дайте своему питомцу положительное подкрепление после боя, чтобы помочь ему быстро прийти в форму."
"Order your pet to hold its ground.": "Прикажите своему питомцу стоять на месте."
"Your pet becomes more agile and evasive.": "Ваш питомец становится более ловким и увертливым."
"Strike an enemy with your staff.": "Ударьте врага своим посохом."
"Strike an enemy twice with your staff.": "Ударьте врага своим посохом дважды."
"Lunge at an enemy with your staff. This attack does extra damage to armor.": "Сделайте выпад в сторону врага своим посохом. Эта атака наносит дополнительный урон по Armor."
"Spin your staff in a deflective stance.": "Крутите свой посох в отражающей стойке."
"Take a defensive posture.": "Примите защитную стойку."
"Use your staff to knock an enemy back, making it easier for an ally to take over the fight. (The enemy is likely to choose a different target if one is nearby.)": "Используйте свой посох, чтобы отбросить врага назад, облегчая союзнику возможность взять бой на себя. (Враг, скорее всего, выберет другую цель, если поблизости есть кто-то ещё.)"
"Spin your staff in a disorienting and alarming arc, hitting all nearby enemies and causing them to lose Rage.": "Раскрутите свой посох по дезориентирующей и пугающей дуге, поражая всех ближайших врагов и заставляя их терять Rage."
"Take careful aim at an enemy's weakness, jabbing with your staff. Does extra damage to targets that are Vulnerable.": "Тщательно прицельтесь в слабое место врага, нанося укол посохом. Наносит дополнительный урон целям, которые Vulnerable."
"Use your staff skills to avoid taking as much damage from falls. (Staff skill must be active.)": "Используйте навыки посоха, чтобы получать меньше урона от падений. (Навык посоха должен быть активен.)"
"Use your staff skills to avoid taking damage from falls. (Staff skill must be active.)": "Используйте навыки посоха, чтобы избежать получения урона от падений. (Навык посоха должен быть активен.)"
"Stab the enemy's leg, briefly immobilizing them.": "Уколите врага в ногу, ненадолго обездвижив его."
"Clobber an enemy. Vulnerable targets are also stunned.": "Оглушительно ударьте врага. Уязвимые цели также оглушаются."
"Surprise an enemy that's been ignoring you, encouraging them to face you.": "Застаньте врага врасплох, если он игнорировал вас, побуждая его повернуться к вам лицом."
"Jab the enemy's leg with your staff, briefly immobilizing them, then rip them to pieces. This is a variant of Pin. (You must be wielding a staff and a claw weapon.)": "Ударьте посохом по ноге врага, ненадолго обездвижив его, а затем разорвите на куски. Это вариант Pin. (Вы должны быть вооружены посохом и когтевым оружием.)"
"Summon your inner fire to obliterate an enemy and turn the tides in a dangerous situation.": "Призови свой внутренний огонь, чтобы сокрушить врага и переломить ход событий в опасной ситуации."
"Raise a skeletal archer from death to serve you. Skeletal archers have long-distance ranged attacks.": "Поднимите скелета-лучника из мёртвых, чтобы он служил вам. Скелеты-лучники обладают дальнобойными атаками на расстоянии."
"Raise a skeletal warrior from death to serve you. Skeletal swordsmen are melee fighters that can occasionally stun their enemies.": "Поднимите скелета-воина из мёртвых, чтобы он служил вам. Скелеты-мечники — бойцы ближнего боя, которые иногда могут оглушать своих врагов."
"Raise a skeletal fire mage from death to serve you. Skeletal battle mages shoot fireballs at distant enemies and use area-effect burst attacks on close enemies.": "Поднимите скелета огненного мага из мёртвых, чтобы он служил вам. Скелеты боевые маги стреляют огненными шарами по дальним врагам и используют взрывные атаки по области против близких врагов."
"Defile a recently-dead corpse to create a vaguely humanoid undead servant. The unstable creature loses health over time, but can recover health by attacking enemies. Its disgusting nature taunts enemies toward it. (If you already have a zombie, it is instead buffed and healed.)": "Оскверните недавно умерший труп, чтобы создать смутно гуманоидного слугу-нежить. Нестабильное существо со временем теряет здоровье, но может восстанавливать здоровье, атакуя врагов. Его отвратительная природа провоцирует врагов нападать на него. (Если у вас уже есть зомби, вместо этого он будет усилен и исцелен.)"
"Open a pocket of darkness around each target within 10 meters, causing great pain and a need for revenge.": "Откройте карман тьмы вокруг каждой цели в радиусе 10 метров, причиняя сильную боль и вызывая жажду мести."
"Blast the target with electricity.": "Поразите цель электричеством."
"Raise a skeletal ratkin mage from death to serve you. It uses electricity to destroy your foes. (You must be indoors to use this ability. It requires a Ratkin Necromancer's Talisman, which has a 10% chance of being destroyed.)": "Поднимите скелетного мага-крысолюда из мёртвых, чтобы он служил вам. Он использует электричество, чтобы уничтожать ваших врагов. (Вы должны находиться в помещении, чтобы использовать эту способность. Для этого требуется Талисман некроманта-крысолюда, который имеет 10% шанс быть уничтоженным.)"
"Destroy the life force in the target's body, dealing Darkness damage.": "Разрушает жизненную силу в теле цели, нанося урон Darkness."
"Steal life force from the target's body, dealing Darkness damage and healing you. Has reduced effect on undead foes.": "Похищает жизненную силу из тела цели, нанося урон Darkness и исцеляя вас. Ослаблено действует на нежить."
"Restore health to any nearby friendly undead (such as pet skeletons or shambling corpses).": "Восстанавливает здоровье любой ближайшей дружественной нежити (например, скелетам-питомцам или ковыляющим трупам)."
"Consume three hearts to gain vast health for a time.": "Поглотите три сердца, чтобы на время значительно увеличить здоровье."
"Consume two spleens to gain vast power for a time.": "Поглотите две селезёнки, чтобы на время обрести огромную силу."
"Ransack a recently-dead corpse to create a sentient skull with wings. It is not under your direct control.\n\nMost equipment that directly boost skeleton or zombie stats also affect the flapskull.": "Разграбьте недавно умерший труп, чтобы создать разумный крылатый череп. Он не находится под вашим прямым контролем.\\n\\nБольшинство предметов снаряжения, которые напрямую усиливают характеристики скелетов или зомби, также влияют на флапскалла."
"Consume a heart to gain vast health for a time.": "Поглотите сердце, чтобы на время получить огромный запас здоровья."
"Consume two hearts to gain vast health for a time.": "Поглотите два сердца, чтобы на время получить огромное здоровье."
"Briefly hold your target in place with undead hands.": "Ненадолго удерживает цель на месте руками нежити."
"Your undead pets become agitated, dealing more damage for a time.": "Ваши питомцы-нежить приходят в ярость и некоторое время наносят больше урона."
"Your undead pets are healed.": "Ваши питомцы-нежить исцеляются."
"Force the target to stare into the darkness of death, typically sending them fleeing in terror.  Chances of success are based on your Necromancy skill and the enemy's mental proficiency.": "Заставляет цель всмотреться во тьму смерти, обычно обращая её в бегство от ужаса. Вероятность успеха зависит от вашего навыка Некромантии и ментальной стойкости врага."
"Consume a spleen to gain vast power for a time.": "Поглотите селезёнку, чтобы на время обрести огромную силу."
"You and nearby allies begin to heal every few seconds.": "Вы и ближайшие союзники начинаете исцеляться каждые несколько секунд."
"You and nearby allies begin to recover lost armor every few seconds.": "Вы и ближайшие союзники начинаете восстанавливать потерянную Armor каждые несколько секунд."
"You and nearby allies begin to recover lost power every few seconds.": "Вы и ближайшие союзники начинаете восстанавливать потерянную силу каждые несколько секунд."
"You and nearby allies begin to do additional damage with every attack.": "Вы и ближайшие союзники начинаете наносить дополнительный урон каждой атакой."
"You rip at the target's synapses. Bypasses armor.": "Вы разрываете синапсы цели. Игнорирует Armor."
"You fire arrows at all nearby targets. You must have a Astonishing Arrow x5 (or better) in your inventory.": "Вы выпускаете стрелы во все ближайшие цели. В вашем инвентаре должно быть Astonishing Arrow x5 (или лучше)."
"You fire arrows at all nearby targets. You must have a Awesome Arrow x5 (or better) in your inventory.": "Вы выпускаете стрелы во все ближайшие цели. В вашем инвентаре должно быть Awesome Arrow x5 (или лучше)."
"Fling a bolt of electricity with your mind.": "Метните заряд электричества силой мысли."
"Heal yourself or a selected ally.": "Исцелите себя или выбранного союзника."
"Fling bolts of electricity in all directions.": "Швыряет электрические разряды во все стороны."
"Corrupt the target's mind, ripping away their memories.": "Оскверните разум цели, вырывая её воспоминания."
"Blast the target with electricity. Extremely effective against Vulnerable targets.": "Поразите цель электричеством. Чрезвычайно эффективно против уязвимых целей."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 250% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, он получает 250% урона, которого, как ему казалось, удалось избежать."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 150% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, враг получает 150% урона, которого, как ему казалось, удалось избежать."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 175% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, он получает 175% от урона, которого, как ему казалось, удалось избежать."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 200% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, он получает 200% урона, которого, как ему казалось, удалось избежать."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 225% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, он получает 225% урона, которого, как ему казалось, удалось избежать."
"Encase your enemy in a bubble that seems to protect them from direct damage. But when the bubble bursts, they take 275% of the damage they thought they avoided.": "Заключает вашего врага в пузырь, который, кажется, защищает его от прямого урона. Но когда пузырь лопается, он получает 275% урона, которого, как ему казалось, удалось избежать."
"Cover an enemy in ephemeral \"fire\", making it harder for them to evade.": "Покрывает врага эфемерным \"огнём\", из-за чего ему становится сложнее уклоняться."
"Pull fae energy into reality, where it damages all enemies nearby. (This ability shares the reset timer of Agonize.)": "Притяните энергию фей в реальность, где она наносит урон всем ближайшим врагам. (Эта способность использует общий таймер сброса с Agonize.)"
"Electrify the space where an enemy is standing.": "Наэлектризуйте пространство, где стоит враг."
"Open a conduit to a realm of fae energy. Allies within the conduit area regain Power every few seconds. The conduit closes after 30 seconds. (Note: Fae Conduit disables Power-recovery from Power Wave while targets are in the conduit area.)": "Откройте канал в мир фейской энергии. Союзники в области действия канала восстанавливают Power каждые несколько секунд. Канал закрывается через 30 секунд. (Примечание: Fae Conduit отключает восстановление Power от Power Wave, пока цели находятся в области действия канала.)"
"You fire an arrow with exceptional speed. You must have a Beginner's Arrow (or better) in your inventory.": "Вы выпускаете стрелу с исключительной скоростью. В вашем инвентаре должна быть Стрела новичка (или лучше)."
"You fire an arrow with exceptional speed. You must have a Basic Arrow (or better) in your inventory.": "Вы выпускаете стрелу с исключительной скоростью. В вашем инвентаре должна быть Basic Arrow (или лучше)."
"You fire an arrow with exceptional speed. You must have a Advanced Arrow (or better) in your inventory.": "Вы выпускаете стрелу с исключительной скоростью. В вашем инвентаре должна быть Advanced Arrow (или лучше)."
