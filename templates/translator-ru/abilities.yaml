"Perform an interpretive dance to music. (When prompted to perform Dance 6, you can use this dance instead.)": "Исполните выразительный танец под музыку. (Когда вам предложат выполнить Танец 6, вы можете использовать вместо него этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 1, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда требуется выполнить Танец 1, вместо него можно использовать этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 2, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда требуется выполнить Танец 2, вместо него можно использовать этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 3, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда вас попросят исполнить Танец 3, вы можете использовать вместо него этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 4, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда требуется выполнить Танец 4, вместо него можно использовать этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 5, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда потребуется выполнить Танец 5, вместо него можно использовать этот танец.)"
"Perform an enticing dance to music.\n\n(When prompted to perform Dance 6, you can use this dance instead.)": "Исполнить соблазнительный танец под музыку.\\n\\n (Когда требуется выполнить Танец 6, вместо него можно использовать этот танец.)"
"Blast all nearby enemies with a numbing wave of cold.": "Поразите всех ближайших врагов оцепеняющей волной холода."
"Encase yourself in an orb of ultra-fine ice, granting you resistance to physical and cold attacks, but reducing mobility. Lasts 30 seconds, though taking fire damage dispels the effect instantly.": "Заключает вас в сферу из сверхтонкого льда, даруя вам сопротивление физическим и холодным атакам, но снижая подвижность. Длится 30 секунд, однако получение урона от огня мгновенно рассеивает эффект."
"Entomb a target in ice, rendering it incapable of moving or attacking. The effect is broken if the target is attacked.": "Заключает цель в ледяную глыбу, лишая её возможности двигаться или атаковать. Эффект рассеивается, если цель подвергнется атаке."
"Launch a freezing chunk of ice at an enemy.": "Запускает в противника ледяное копьё."
"Spontaneously freeze an enemy's limbs, causing periodic loss of fine motor control.": "Самопроизвольно замораживает конечности врага, вызывая периодическую потерю точного моторного контроля."
"Create a sentient microclimate of extreme low temperature which attacks foes. You do not have control over the sphere's movement.": "Создаёт разумный микроклимат экстремально низкой температуры, который атакует врагов. Вы не можете контролировать перемещение сферы."
"Create huge frozen spikes that damage and immobilize enemies around you.": "Создаёт огромные ледяные шипы, которые наносят урон и обездвиживают врагов вокруг вас."
"Freeze everything around you.": "Заморозьте всё вокруг себя."
"Rapidly alter the temperature of the air to create electricity, then use it to injure a foe.": "Стремительно изменяет температуру воздуха, создавая электричество, а затем использует его, чтобы ранить врага."
"Entomb yourself in ice and go into brief hibernation. You become much harder to damage.": "Заключите себя в ледяную глыбу и погрузитесь в краткую спячку. Вас становится гораздо труднее ранить."
"Explode your Ice Armor into a mass of deadly projectiles.": "Взорвите свою Ice Armor, превратив её в массу смертоносных снарядов."
"Absorb your Ice Armor into your body, using the magical ice to repair wounds.": "Поглотите свою Ice Armor в тело, используя магический лёд, чтобы залечить раны."
"Absorb your Ice Armor into your body, using the magical ice to repair wounds. This version consumes additional Power to create a more pronounced healing effect.": "Поглотите свою Ice Armor в тело, используя магический лёд, чтобы залечить раны. Эта версия расходует дополнительную Power, создавая более выраженный эффект исцеления."
"Lower an enemy's body temperature, causing mild trauma.": "Понизить температуру тела врага, вызывая лёгкую травму."
"Begin howling to raise your spirits. Remain stationary to continue howling and slowly build up morale benefits. Other werewolves that howl near you will greatly boost the beneficial effects of howling.": "Начните выть, чтобы поднять боевой дух. Оставайтесь на месте, чтобы продолжать выть и постепенно накапливать бонусы к морали. Другие оборотни, которые воют рядом с вами, значительно усилят полезные эффекты воя."
"Internal ability that triggers when Shadow Feint activates.": "Внутренняя способность, которая срабатывает, когда активируется Shadow Feint."
"Become a wolf attuned to darkness -- both the absence of light and the force of undeath. (Use again to attempt to stop being a wolf.)": "Станьте волком, настроенным на тьму — как на отсутствие света, так и на силу нежизни. (Используйте снова, чтобы попытаться перестать быть волком.)"
"Become more difficult to see. Your movement is slow, but your first attack coming out of the shadows will be brutal.": "Вас становится труднее заметить. Вы двигаетесь медленно, но ваша первая атака из тени будет сокрушительной."
"Recover your health and urge your brothers and sisters to heightened frenzy.": "Восстановите своё здоровье и побудите своих братьев и сестёр к усиленному неистовству."
"Fire a burst of deadly gas, hitting all nearby enemies.": "Выпустите облако смертоносного газа, поражающее всех ближайших врагов."
"Use a Simple First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте простую бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use a Basic First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте базовую бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use a Good First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте хорошую бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use an Expert's First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте Бомбу первой помощи эксперта (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use a Master First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте мастерскую бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use an Amazing First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте потрясающую бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 3 Guild Credits.": "Верните к жизни кажущегося мёртвым союзника. Союзник вернётся с половиной своего Max Health. Расходует 3 кредита гильдии."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 1 Guild Credit. You must be Hardcore to use this ability.": "Верните кажущегося мёртвым союзника к жизни. Союзник вернётся с половиной своего Max Health. Расходует 1 Guild Credit. Вы должны быть Hardcore, чтобы использовать эту способность."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 2 Guild Credits. You must be in a long-term animal form to use this ability.": "Верните кажущегося мёртвым союзника к жизни. Союзник вернётся с половиной своего Max Health. Расходует 2 Guild Credits. Вы должны находиться в долгосрочной звериной форме, чтобы использовать эту способность."
"Use an Expert's First Aid Kit (or better) to counteract the effects of cold exposure such as frostbite and hypothermia. Restores 100 Body Heat.": "Используйте аптечку первой помощи эксперта (или лучше), чтобы противодействовать последствиям воздействия холода, таким как обморожение и гипотермия. Восстанавливает 100 Body Heat."
"Use an Amazing First Aid Kit to heal yourself or an ally. There is a 25% chance the First Aid Kit will be used up.": "Используйте потрясающий набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 25% набор первой помощи будет израсходован."
"Use an Astounding First Aid Kit to heal yourself or an ally. There is a 10% chance the First Aid Kit will be used up.": "Используйте поразительный набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 10% набор первой помощи будет израсходован."
"Use a Master First Aid Kit (or better) to heal a broken bone. There is a 33% chance the First Aid Kit will be used up.": "Используйте Master First Aid Kit (или лучше), чтобы вылечить сломанную кость. С вероятностью 33% First Aid Kit будет израсходован."
"Use an Amazing First Aid Kit (or better) to help someone suffering from alcohol poisoning.": "Используйте Amazing First Aid Kit (или лучше), чтобы помочь кому-то, страдающему от алкогольного отравления."
"Use an Astounding First Aid Kit (or better) to help someone suffering from severe alcohol poisoning. This treatment can only be used periodically, so is best saved for emergencies.": "Используйте Astounding First Aid Kit (или лучше), чтобы помочь кому-то, страдающему от тяжёлого алкогольного отравления. Это лечение можно применять только периодически, поэтому его лучше приберечь для экстренных случаев."
"Use an Astounding First Aid Kit (or better) to prepare someone for entering a hazardous medical environment.": "Используйте Astounding First Aid Kit (или лучше), чтобы подготовить кого-то к входу в опасную медицинскую среду."
"Use an Astounding First Aid Kit to heal yourself or an ally. There is a 25% chance the First Aid Kit will be used up.": "Используйте поразительный набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 25% набор первой помощи будет израсходован."
"Use an Awesome First Aid Kit to heal yourself or an ally. There is a 25% chance the First Aid Kit will be used up.": "Используйте отличный набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 25% набор первой помощи будет израсходован."
"Use an Astounding First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте поразительную бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use 3 Astounding First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 потрясающих аптечки первой помощи (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи расходуются."
"Use an Incredible First Aid Kit to heal yourself or an ally. There is a 25% chance the First Aid Kit will be used up.": "Используйте невероятный набор первой помощи, чтобы исцелить себя или союзника. С вероятностью 25% набор первой помощи будет израсходован."
"Use an Incredible First Aid Bomb (or better) to heal yourself and all nearby allies. Only animals can use this ability.": "Используйте невероятную бомбу первой помощи (или лучше), чтобы исцелить себя и всех ближайших союзников. Только животные могут использовать эту способность."
"Use an Incredible Armor Patch Kit (or better) to repair your or an ally's armor. There is a 10% chance the kit will be used up.": "Используйте Невероятный набор для починки брони (или лучше), чтобы починить свою броню или броню союзника. Есть 10% шанс, что набор будет израсходован."
"Use an Incredible Armor Patch Kit (or better) to repair your or an ally's armor. There is a 15% chance the kit will be used up.": "Используйте Incredible Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Есть 15% шанс, что набор будет израсходован."
"Use an Incredible Armor Patch Kit (or better) to repair your or an ally's armor. There is a 20% chance the kit will be used up.": "Используйте Incredible Armor Patch Kit (или лучше), чтобы починить свою броню или броню союзника. Есть 20% шанс, что набор будет израсходован."
"Use 3 Awesome First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 превосходных аптечки первой помощи (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи при этом расходуются."
"Use 3 Incredible First Aid Kits (or better) to heal yourself or an ally. The First Aid Kits are used up.": "Используйте 3 невероятных аптечки первой помощи (или лучше), чтобы исцелить себя или союзника. Аптечки первой помощи будут израсходованы."
"Use an Awesome First Aid Kit (or better) to prepare someone for entering a hazardous medical environment.": "Используйте отличный набор первой помощи (или лучше), чтобы подготовить кого-то к входу в опасную медицинскую среду."
"Use your heightened senses to help your allies avoid injury.": "Используйте свои обострённые чувства, чтобы помочь союзникам избежать ранений."
"Increase your run speed dramatically for 15 seconds.": "Значительно увеличивает вашу скорость бега на 15 секунд."
"Commit to the battle with your current foe so that you can unleash your inner strength.": "Посвятите себя битве с вашим текущим противником, чтобы высвободить свою внутреннюю силу."
"Feign vulnerability to entice an enemy to attack you. This bluff works well but doesn't last long.\n\n(This ability uses \"temporary\" Taunting, which diminishes in effect by 20% every second.)": "Притворитесь уязвимым, чтобы побудить врага атаковать вас. Эта уловка хорошо срабатывает, но длится недолго.\\n\\n (Эта способность использует «временный» Taunting, эффект которого уменьшается на 20% каждую секунду.)"
"A quick distracting attack with the knife that sets up subsequent attacks.": "Быстрая отвлекающая атака ножом, подготавливающая последующие атаки."
"A quick attack that hinders your enemy's ability to avoid subsequent attacks.": "Быстрая атака, которая затрудняет врагу уклонение от последующих атак."
"A weak attack that can confuse your opponents about how best to counter-attack you. This attack generates no enemy Rage.": "Слабая атака, которая может запутать противников, не давая им понять, как лучше контратаковать вас. Эта атака не генерирует вражескую Rage."
"A distracting motion whose main aim is to give you time to add poison to your blade for your next maneuver.": "Отвлекающее движение, главная цель которого — дать вам время нанести яд на клинок перед следующим приемом."
"A parrying technique that takes the opponent out of their comfort-zone, leaving them rattled.": "Техника парирования, которая выводит противника из зоны комфорта, оставляя его в замешательстве."
"A strong attack.": "Сильная атака."
"A vicious attack that injects poison deep into the enemy's body.": "Жестокая атака, которая вводит яд глубоко в тело врага."
"A knife to the stomach or other vulnerable spot. Causes bleeding if the enemy is caught off guard.": "Удар ножом в живот или другое уязвимое место. Вызывает кровотечение, если враг застигнут врасплох."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Simple Throwing Knife.": "Брошенный в ногу клинок, который может лишить врага подвижности. Расходует 1 простой метательный нож."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Basic Throwing Knife.": "Брошенный в ногу клинок, который может сильно ухудшить подвижность врага. Расходует 1 Basic Throwing Knife."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Good Throwing Knife.": "Брошенный в ногу клинок, который может сильно ухудшить подвижность врага. Расходует 1 Good Throwing Knife."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Expert's Throwing Knife.": "Брошенный в ногу клинок, который может лишить врага подвижности. Расходует 1 Expert's Throwing Knife."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Master's Throwing Knife.": "Брошенный клинок в ногу, который может лишить врага подвижности. Расходует 1 Master's Throwing Knife."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Amazing Throwing Knife.": "Брошенный в ногу клинок, который может серьёзно подорвать подвижность врага. Расходует 1 Amazing Throwing Knife."
"A thrown blade to the leg that can ruin an enemy's mobility. Consumes 1 Astounding Throwing Knife.": "Брошенный в ногу клинок, который может серьёзно ухудшить подвижность врага. Расходует 1 Astounding Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Simple Throwing Knife.": "Брошенный клинок, поражающий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 простой метательный нож."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Basic Throwing Knife.": "Брошенный клинок, поражающий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Basic Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Good Throwing Knife.": "Брошенный клинок, поражающий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Good Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Expert's Throwing Knife.": "Метательный клинок, атакующий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Expert's Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Master's Throwing Knife.": "Брошенный клинок, поражающий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Master's Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Amazing Throwing Knife.": "Брошенный клинок, поражающий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Amazing Throwing Knife."
"A thrown blade that attacks a vulnerable spot. Ineffective unless the enemy's focus is on a different assailant. Consumes 1 Astounding Throwing Knife.": "Метательный клинок, атакующий уязвимое место. Неэффективен, если внимание врага не отвлечено на другого нападающего. Расходует 1 Astounding Throwing Knife."
"A full-on attack that causes horrific damage if the target is not paying enough attention to you.": "Мощная атака, наносящая чудовищный урон, если цель уделяет тебе недостаточно внимания."
"A clever knife cantrip that revitalizes you as it injures your enemy.": "Хитрый заговор ножа, который оживляет вас, пока ранит вашего врага."
"Toss blades at all enemies around you. Consumes 3 Basic Throwing Knives.": "Метните клинки во всех врагов вокруг вас. Расходует 3 Basic Throwing Knives."
"Toss blades at all enemies around you. Consumes 3 Expert's Throwing Knives.": "Метните клинки во всех врагов вокруг вас. Расходует 3 Expert's Throwing Knives."
"Toss blades at all enemies around you. Consumes 3 Master's Throwing Knives.": "Метните клинки во всех врагов вокруг вас. Расходует 3 Master's Throwing Knives."
"Toss blades at all enemies around you. Consumes 3 Amazing Throwing Knives.": "Метните клинки во всех врагов вокруг себя. Расходует 3 Amazing Throwing Knives."
"Toss blades at all enemies around you. Consumes 3 Astounding Throwing Knives.": "Бросает клинки во всех врагов вокруг вас. Расходует 3 Astounding Throwing Knives."
"Toss blades at all enemies around you. Consumes 3 Superb Throwing Knives.": "Метните клинки во всех врагов вокруг вас. Расходует 3 превосходных метательных ножа."
"A deadly attack that uses dual-wielded knives. This is a variant of Slice, and treasure that boosts Slice also boosts Duelist's Slash.": "Смертоносная атака с использованием парных ножей. Это вариант Slice, и сокровища, усиливающие Slice, также усиливают Рубящий удар дуэлянта."
"A strong ranged attack. This is a variant of Slice, and treasure that boosts Slice also boosts Slicing Ice.": "Сильная дальнобойная атака. Это вариант Slice, и сокровища, усиливающие Slice, также усиливают Ледяной Разрез."
"Tap into your inherent fear of death, restoring your armor.": "Обратись к своему врождённому страху смерти, восстанавливая свою Armor."
"Enhance the movements of yourself or an ally with grace and efficiency.": "Усильте свои движения или движения союзника грацией и эффективностью."
"Flood your veins with harmful chemicals to poison those that would try to eat you.": "Наполните свои вены вредными химикатами, чтобы отравить тех, кто попытается вас съесть."
"Fire a mild electrical charge into the suspect. This tends to focus their attention on you instead of any nearby innocents.": "Выпустите в подозреваемого слабый электрический разряд. Это обычно заставляет его сосредоточить внимание на вас, а не на находящихся поблизости невинных."
"Send a surge of electricity into your target, leaving them more vulnerable to future shocks.": "Посылает разряд электричества в вашу цель, делая её более уязвимой к будущим шокам."
"Fire a red-hot energy lasso at an enemy and drag them toward you.": "Бросьте во врага раскалённое энергетическое лассо и подтяните его к себе."
"Release a maximum-power charge of electricity into your foe. Horrifically effective against enemies of the Wardens. As a safety precaution, fellow animals take reduced damage.": "Высвободите в противника электрический заряд максимальной мощности. Ужасающе эффективно против врагов Стражей. В качестве меры предосторожности союзные животные получают уменьшенный урон."
"Create a vortex of deadly electricity that will erupt in a stunning explosion as soon as an enemy gets too close.": "Создаёт вихрь смертоносного электричества, который взорвётся оглушающим разрядом, как только враг подойдёт слишком близко."
"Electrify your skin. Melee attackers take damage when they hit you.": "Электризуйте свою кожу. Атакующие в ближнем бою получают урон, когда бьют вас."
"Alter the air currents so that you can briefly fly. Only works outdoors.": "Изменяет воздушные потоки так, что вы можете ненадолго летать. Работает только на открытом воздухе."
"Ignite all nearby problems.": "Подожгите все ближайшие проблемы."
"With a nod, you and nearby allies coordinate your attacks with the instinctive ease of a hunting pack.": "Одним кивком вы и ближайшие союзники координируете свои атаки с инстинктивной лёгкостью охотничьей стаи."
"Summon a fellow Warden to aid you briefly.": "Призовите товарища-Стража, чтобы он ненадолго помог вам."
"Emit a wave of acid to gently discourage engagement.": "Испустить волну кислоты, чтобы мягко отбить желание вступать в бой."
"Bite your enemy directly in their soul.": "Укусите врага прямо в его душу."
"Pounce between the real world and the spirit world, hitting your enemy with unnatural impact force.": "Прыгните между реальным миром и миром духов, обрушившись на врага с неестественной силой удара."
"Make yourself harder to hit by stepping partially into the spirit world. ": "Сделайте себя более трудной целью, частично шагнув в мир духов. "
"Transfer a bit of your Power into a symbol for safe-keeping. You or an ally can touch it later to recover the Power.": "Перенесите часть своей Силы в символ для сохранности. Вы или союзник сможете позже коснуться его, чтобы восстановить Силу."
"Assist your allies by selflessly routing Power to them via the spirit realm.": "Помогайте своим союзникам, самоотверженно направляя к ним Power через мир духов."
"Protect yourself from environmental extremes by paradoxically existing in both the real world and the ghost world at the same time. This effect ends if an enemy sees you.": "Защитите себя от экстремальных условий окружающей среды, парадоксальным образом существуя одновременно в реальном мире и мире призраков. Этот эффект заканчивается, если враг вас увидит."
"Briefly entangle your opponent in the spirit realm.": "Ненадолго опутывает вашего противника в мире духов."
"Throw spirit-realm energy at your enemy.": "Бросьте в своего врага энергию мира духов."
"Create an ephemeral projection of a fox that taunts enemies.": "Создаёт эфемерную проекцию лиса, которая дразнит врагов."
"Briefly fool shopkeepers and villagers into perceiving you as a typical humanoid.": "Ненадолго обманите лавочников и жителей деревни, заставив их воспринимать вас как обычного гуманоида."
"Give a nod to an ally pet, filling them with enthusiastic energy.": "Кивните питомцу-союзнику, наполнив его энергичным энтузиазмом."
"Pull supercharged energy from the ether to create a deadly explosion.": "Вытяните сверхзаряженную энергию из эфира, чтобы создать смертоносный взрыв."
"Infest the target's mind with lingering unwanted thoughts.": "Заразите разум цели навязчивыми нежеланными мыслями."
"Fire a crossbow. Uses a Beginner's Dense Arrow.": "Выстрелить из арбалета. Использует плотную стрелу новичка."
"Fire a crossbow. Uses a Basic Dense Arrow.": "Выстрелите из арбалета. Использует Basic Dense Arrow."
"Fire a crossbow. Uses an Advanced Dense Arrow.": "Выстрелить из арбалета. Использует Advanced Dense Arrow."
"Fire a crossbow. Uses an Expert's Dense Arrow.": "Выстрелите из арбалета. Использует плотную стрелу эксперта."
"Fire a crossbow. Uses a Masterwork Dense Arrow.": "Выстрелить из арбалета. Использует Masterwork Dense Arrow."
"Fire a darkcaster. Uses no ammunition. This is a variant of Shoot Crossbow, and equipment that boosts Shoot Crossbow also boosts this ability.": "Выстреливает тёмным снарядом. Не использует боеприпасы. Это вариант Shoot Crossbow, и снаряжение, усиливающее Shoot Crossbow, также усиливает эту способность."
"Fire a crossbow. Uses an Amazing Dense Arrow.": "Выстрелите из арбалета. Использует Amazing Dense Arrow."
"Fire a broad-tipped crossbow bolt. Uses a Beginner's Dense Arrow.": "Выстреливает арбалетным болтом с широким наконечником. Использует Beginner's Dense Arrow."
"Fire a broad-tipped crossbow bolt. Uses a Basic Dense Arrow.": "Выстреливает арбалетным болтом с широким наконечником. Использует Basic Dense Arrow."
"Fire a broad-tipped crossbow bolt. Uses an Advanced Dense Arrow.": "Выстреливает арбалетным болтом с широким наконечником. Использует Advanced Dense Arrow."
"Fire a broad-tipped crossbow bolt. Uses an Expert's Dense Arrow.": "Выстреливает арбалетным болтом с широким наконечником. Использует Expert's Dense Arrow."
"Fire a broad-tipped crossbow bolt. Uses a Masterwork Dense Arrow.": "Выстреливает арбалетный болт с широким наконечником. Использует Masterwork Dense Arrow."
"Fire a flaming crossbow bolt. Uses a Beginner's Dense Arrow.": "Выстреливает пылающим арбалетным болтом. Использует Beginner's Dense Arrow."
"Fire a flaming crossbow bolt. Uses a Basic Dense Arrow.": "Выстреливает пылающим арбалетным болтом. Использует Basic Dense Arrow."
"Fire a flaming crossbow bolt. Uses an Advanced Dense Arrow.": "Выстреливает пылающим арбалетным болтом. Использует Advanced Dense Arrow."
"Fire a flaming crossbow bolt. Uses an Expert's Dense Arrow.": "Выстреливает пылающим арбалетным болтом. Использует плотную стрелу эксперта."
"Fire a flaming crossbow bolt. Uses a Masterwork Dense Arrow.": "Выстреливает пылающим арбалетным болтом. Использует Masterwork Dense Arrow."
"Fire an acid-covered bolt that destroys armor. Uses a Beginner's Dense Arrow.": "Выстреливает покрытым кислотой болтом, который разрушает Armor. Использует Beginner's Dense Arrow."
"Fire an acid-covered bolt that destroys armor. Uses a Basic Dense Arrow.": "Выстреливает покрытый кислотой болт, который разрушает Armor. Использует Basic Dense Arrow."
"Fire an acid-covered bolt that destroys armor. Uses an Advanced Dense Arrow.": "Выстреливает покрытый кислотой болт, разрушающий Armor. Использует Advanced Dense Arrow."
"Fire an acid-covered bolt that destroys armor. Uses an Expert's Dense Arrow.": "Выстреливает покрытым кислотой болтом, который разрушает Armor. Использует Expert's Dense Arrow."
"Fire an acid-covered bolt that destroys armor. Uses a Masterwork Dense Arrow.": "Выстреливает покрытым кислотой болтом, который разрушает Armor. Использует мастерски изготовленную плотную стрелу."
"Play a song that restores health to all nearby allies. You must have a lute equipped. You can only have one 'Song' ability active at a time.": "Сыграйте песню, которая восстанавливает здоровье всем ближайшим союзникам. У вас должна быть экипирована лютня. Одновременно у вас может быть активна только одна способность типа 'Song'."
"Play a song that reduces Power costs for all nearby allies. You must have a lute equipped. You can only have one 'Song' ability active at a time.": "Сыграйте песню, которая снижает затраты Power для всех ближайших союзников. У вас должна быть экипирована лютня. Одновременно у вас может быть активна только одна способность типа 'Песнь'."
"Play a song that causes all nearby monsters to wince in pain. You must have a lute equipped. You can only have one 'Song' ability active at a time.": "Сыграйте песню, которая заставляет всех ближайших монстров болезненно содрогнуться. У вас должна быть экипирована лютня. Одновременно у вас может быть активна только одна способность категории 'Song'."
"Give an ally (or yourself) a quick burst of encouragement.": "Быстро воодушевите союзника (или себя)."
"Your music gives all nearby allies extra agility for a short time.": "Ваша музыка на короткое время дарует всем ближайшим союзникам дополнительную ловкость."
"A mysterious bit of music causes an enemy to stop and stand in fascination. (Chance of success is based on your Bard skill and the target's mental faculties.)": "Таинственный музыкальный мотив заставляет врага остановиться и замереть в зачарованном оцепенении. (Шанс успеха зависит от вашего навыка Bard и умственных способностей цели.)"
"Use your masterful music to push an ally to greater heights.": "Используйте своё мастерское музыкальное искусство, чтобы вдохновить союзника на новые высоты."
"A whispered song of prayer restores life to all dead allies nearby. The allies must have heard your Song of Resurgence or Song of Bravery during the last 90 seconds (while they were alive!).\n\nNote: to use this ability, you must be wearing a piece of equipment that enables it.": "Тихая молитвенная песнь возвращает жизнь всем павшим союзникам поблизости. Союзники должны были слышать вашу Song of Resurgence или Song of Bravery в течение последних 90 секунд (пока были живы!).\\n\\nПримечание: чтобы использовать эту способность, на вас должен быть надет предмет снаряжения, который её позволяет."
"At your cue, all nearby allies undergo a moment of incredible strength.": "По вашему сигналу все ближайшие союзники переживают мгновение невероятной силы."
"You blast anger through your horn's song. You must have a horn equipped.": "Вы выплёскиваете гнев через песнь своего рога. У вас должен быть экипирован рог."
"You blast defiance and resolve through your horn's song, reaping a portion of the health damage dealt (that is, turning it into health and/or armor for you). You must have a horn equipped.": "Ты изливаешь неповиновение и решимость через песнь своего рога, восстанавливая часть нанесённого урона здоровью (то есть превращая его в здоровье и/или Armor для себя). У тебя должен быть экипирован рог."
"You blast sadness through your horn's song. You must have a horn equipped.": "Вы изливаете печаль через песнь своего рога. У вас должен быть экипирован рог."
"Play a note at incredible volume to blast an enemy with sonic power.": "Сыграйте ноту с невероятной громкостью, чтобы поразить врага звуковой мощью."
"An out-of-tune note aimed at your enemy causes a wince of pain.": "Фальшивая нота, направленная в вашего врага, заставляет его болезненно поморщиться."
"Internal ability that triggers when Song of Discord is active.": "Внутренняя способность, которая срабатывает, когда Song of Discord активна."
"Swipe feebly at your enemies.": "Слабо полосните своих врагов."
"Kick your enemy's legs, slowing them down a bit.": "Пни врага по ногам, немного замедлив его."
"Leap into the air and kick the enemy in a vital organ. A moment later, the enemy notices the impact.": "Подпрыгните в воздух и ударьте врага в жизненно важный орган. Мгновение спустя враг замечает последствия удара."
"Tap your lucky feet to give yourself and any nearby allies a chance to evade attacks.": "Постучите своими счастливыми лапками, чтобы дать себе и ближайшим союзникам шанс уклониться от атак."
"Briefly become very fast and agile.": "Ненадолго станьте очень быстрым и ловким."
"Pretend to die of fright. Nearby enemies will ignore you for a while, even when you stand back up -- but will notice you again if you attack them.": "Притворитесь, что умерли от страха. Находящиеся поблизости враги какое-то время будут игнорировать вас, даже когда вы снова встанете на ноги, — но снова заметят вас, если вы нападёте на них."
"Move carefully and use your acute senses to avoid monster detection. (This has no effect on enemies already in combat with you.)": "Двигайтесь осторожно и используйте свои острые чувства, чтобы избежать обнаружения монстрами. (Это не действует на врагов, уже сражающихся с вами.)"
"Nibble a carrot to heal yourself.": "Погрызи морковку, чтобы исцелить себя."
"Thicken your coat for winter.": "Сделайте свою шерсть гуще к зиме."
"Place your paw upon an enemy's pressure point, disrupting their breathing.": "Положите лапу на болевую точку врага, нарушая его дыхание."
"Your playful attack can soften even the hardest heart, making it difficult for the target to use Rage attacks. (Chances of success are based on your Rabbit skill and the enemy's mental proficiency.)": "Ваша игривая атака может смягчить даже самое черствое сердце, затрудняя цели использование атак Rage. (Шансы на успех зависят от вашего навыка Rabbit и ментальной подготовки врага.)"
"Focus your chi into a blast of psychic energy. Who's laughing at the little bunny now?!": "Сосредоточь свою ци в взрыв психической энергии. Кто теперь смеётся над маленьким кроликом?!"
"Reprimand your enemy, making them feel uncomfortable. You gain a feeling of self-satisfaction.": "Укорите своего врага, заставив его почувствовать себя неуютно. Вы испытываете чувство самодовольства."
"Summon Arisetsu's displeasure to rebuke your foe. Most effective against the undead.": "Призовите недовольство Арисэцу, чтобы покарать своего врага. Наиболее эффективно против нежити."
"Channel healing into yourself or a selected ally.": "Направьте исцеление в себя или выбранного союзника."
"Instantly heal yourself or a selected ally.": "Мгновенно исцеляет вас или выбранного союзника."
"Free yourself or an ally from movement hindrances.": "Освободите себя или союзника от помех движению."
"Twist an enemy's emotions so that rage and pain are one and the same.": "Искажай эмоции врага так, чтобы ярость и боль стали одним и тем же."
"Remind your allies that hope is never lost.": "Напомните своим союзникам, что надежда никогда не угасает."
"Teach your foe what it means to face a priest of warmth.": "Покажи своему врагу, что значит столкнуться со жрецом тепла."
"Summon flame from the heavens to destroy your foe. Even more effective against the undead.": "Призовите пламя с небес, чтобы уничтожить своего врага. Ещё более эффективно против нежити."
"Take a moment to find the ally that most needs healing, then heal them.": "Потратьте немного времени, чтобы найти союзника, который больше всего нуждается в исцелении, а затем исцелите его."
"Internal ability that triggers when Triage is used.": "Внутренняя способность, которая срабатывает при использовании Triage."
"Remove poison from the veins of an ally.": "Удаляет яд из вен союзника."
"Bestow a passive protection on nearby allied players (but not yourself). The first protected ally to die is resurrected, ending the spell.": "Дарует пассивную защиту ближайшим союзным игрокам (но не вам). Первый защищённый союзник, который погибнет, будет воскрешён, после чего действие заклинания закончится."
"Channel energy and confidence into an ally's brain.": "Направьте энергию и уверенность в мозг союзника."
"Bestow the blessings of Arisetsu on yourself or an ally.": "Даруйте благословение Арисэцу себе или союзнику."
"Expertly hack at your foe's legs with your shovel. (There is a 5% chance your shovel will be destroyed.)": "Мастерски рубите по ногам врага своей лопатой. (Есть 5% шанс, что ваша лопата будет уничтожена.)"
"Expertly hack at your foe's legs with your shovel. (There is a 6% chance your shovel will be destroyed.)": "Мастерски рубите лопатой по ногам врага. (Есть 6% шанс, что ваша лопата будет уничтожена.)"
"Expertly hack at your foe's legs with your shovel. (There is a 7% chance your shovel will be destroyed.)": "Мастерски рубите по ногам врага своей лопатой. (Есть 7% шанс, что ваша лопата будет уничтожена.)"
"Use an evil pumpkin as a bomb.": "Используйте зловещую тыкву как бомбу."
"Use an evil pumpkin as a turret.": "Использует зловещую тыкву как турель."
"Enchant your wings to be stronger, allowing you to fly without expending as much Power.\n<b>Costs 10 Fae Energy</b>": "Зачаруйте свои крылья, чтобы сделать их сильнее, позволяя вам летать, не расходуя так много Power.\\n<b>Требует 10 Fae Energy</b>"
"Enchant your wings to be stronger, allowing you to fly without expending as much Power.\n<b>Costs 15 Fae Energy</b>": "Зачаруйте свои крылья, чтобы сделать их сильнее, позволяя вам летать, не расходуя так много Power.\\n<b>Требует 15 Fae Energy</b>"
"Enchant your wings to be stronger, allowing you to fly without expending as much Power.\n<b>Costs 20 Fae Energy</b>": "Зачаруйте свои крылья, чтобы сделать их сильнее, позволяя вам летать, не расходуя так много Power.\\n<b>Требует 20 Fae Energy</b>"
"It's a fox. In a box. Summon him up to sell your stocks! A familiar fox created by a powerful wizard and trained in the ways of industry then magically stuffed in a pocket-sized box. The fox will slowly bond to you over time and use allowing better service. Your vendor fox can only be summoned once every 2 hours of in-game time. You must have a wooden box in your inventory to use this ability. (Storage crates work well. The item will not be consumed)": "Это лис. В коробке. Призовите его, чтобы продать свои товары! Фамильярный лис, созданный могущественным волшебником, обученный торговому ремеслу, а затем магически помещённый в коробку карманного размера. Со временем лис будет постепенно привязываться к вам, что позволит ему оказывать более качественные услуги. Вашего торгового лиса можно призывать только раз в 2 часа игрового времени. Чтобы использовать эту способность, у вас в инвентаре должна быть деревянная коробка. (Ящики для хранения тоже подойдут. Предмет не будет израсходован)"
"A small, reusable, pocket-sized box that encases a tiny pocket dimension. This storage is not tied to conventional crafted storage crates (Each player that accesses the box can store their own items). This box can only be deployed once every 90 minutes of in-game time.": "Небольшая многоразовая карманная коробка, заключающая в себе крошечное карманное измерение. Это хранилище не связано с обычными создаваемыми ящиками для хранения (каждый игрок, получающий доступ к коробке, может хранить в ней свои собственные предметы). Эту коробку можно устанавливать только один раз каждые 90 минут игрового времени."
"Summon a Death on a Leash cosmetic pet": "Призвать косметического питомца Смерть на поводке"
"Summon a Radish cosmetic pet": "Призвать косметического питомца-редиску"
"Summon a Kraken cosmetic pet": "Призвать косметического питомца Кракена"
