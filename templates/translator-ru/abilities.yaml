"Hit your enemy with a precision attack on a vulnerable spot. You must have a Advanced Long Arrow (or better) in your inventory. (This ability variant can fire Orcish arrows as well as standard arrows)": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть Advanced Long Arrow (или лучше). (Этот вариант способности может выпускать орочьи стрелы, а также стандартные стрелы)"
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Expert's Long Arrow (or better) in your inventory. (This ability variant can fire Orcish arrows as well as standard arrows)": "Поразите врага точной атакой в уязвимое место. В вашем инвентаре должна быть Стрела дальнего боя эксперта (или лучше). (Этот вариант способности может стрелять орочьими стрелами, а также стандартными стрелами)"
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Masterwork Long Arrow (or better) in your inventory. (This ability variant can fire Orcish arrows as well as standard arrows)": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть стрела Masterwork Long Arrow (или лучше). (Этот вариант способности может выпускать орочьи стрелы, а также стандартные стрелы)"
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Amazing Long Arrow (or better) in your inventory. (This ability variant can fire Orcish arrows as well as standard arrows)": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть Amazing Long Arrow (или лучше). (Этот вариант способности может стрелять орочьими стрелами, а также стандартными стрелами)"
"Hit your enemy with a precision attack on a vulnerable spot. You must have a Astonishing Long Arrow (or better) in your inventory. (This ability variant can fire Orcish arrows as well as standard arrows)": "Поразите врага точной атакой в уязвимое место. У вас в инвентаре должна быть Astonishing Long Arrow (или лучше). (Этот вариант способности может выпускать орочьи стрелы, а также стандартные стрелы)"
"Smack your target with the shield, leaving them reeling.": "Ударьте цель щитом, оставив её ошеломлённой."
"Bash your target, causing them to lose some of their Rage.": "Ударьте свою цель щитом, заставив её потерять часть своей Rage."
"A frustration-inducing bash to the face.": "Вызывающий раздражение удар щитом в лицо."
"Hit your enemy and knock them back. Costs no Power, so it's good in a tight spot! Equipment that boosts Stunning Bash also boosts Emergency Bash.": "Ударьте врага и отбросьте его назад. Не требует Power, так что это отличный приём в трудной ситуации! Снаряжение, усиливающее Stunning Bash, также усиливает Экстренный таран."
"Take a moment to prepare your offense so that your sword attacks will be especially deadly.": "Потратьте немного времени, чтобы подготовить своё наступление, и тогда ваши атаки мечом будут особенно смертоносными."
"Hunker behind your shield and use it to deflect the elements.": "Укройтесь за своим щитом и используйте его, чтобы отражать стихии."
"Adjust yourself to regain Armor.": "Соберитесь, чтобы восстановить Armor."
"Go into a fully defensive posture. Your sprint speed and damage are reduced, but you absorb more damage. (Use this ability again to turn off Bulwark Mode.)": "Примите полностью оборонительную стойку. Ваша скорость спринта и урон снижены, но вы поглощаете больше урона. (Используйте эту способность ещё раз, чтобы отключить Режим бастиона.)"
"A quick smack with the shield. It doesn't hurt much, but it helps keep the tide of battle going in your favor.": "Быстрый удар щитом. Он не наносит большого урона, но помогает удерживать ход битвы в вашу пользу."
"Your speed and taunting power dramatically increase for a few seconds, allowing you to charge into the fray and take control.": "Ваша скорость и сила провокации резко возрастают на несколько секунд, позволяя вам ринуться в бой и взять ситуацию под контроль."
"Infuse your shield with elemental power. Any melee attacker that hits you will take Fire damage automatically.": "Наполните свой щит силой стихии. Любой противник, атакующий вас в ближнем бою, будет автоматически получать урон от огня."
"Hit all nearby enemies, knocking them back and causing them to hate you more than they would have.": "Ударьте всех ближайших врагов, отбрасывая их назад и заставляя их ненавидеть вас сильнее, чем обычно."
"You and all nearby allies regain Armor.": "Вы и все ближайшие союзники восстанавливаете Armor."
"Use your shield to clobber an enemy and get this fight over with!": "Используйте свой щит, чтобы огреть врага и покончить с этим боем!"
"During a lull in combat, quickly reorganize your Armor so that you can fight again.\n\nEffects that boost the Armor-restoration of Reinforce also boost this ability.": "Во время затишья в бою быстро приведи в порядок свою Armor, чтобы снова быть готовым сражаться.\\n\\nЭффекты, усиливающие восстановление Armor у Reinforce, также усиливают эту способность."
"Use your stern gaze and loud voice to surprise a foe.": "Используйте суровый взгляд и громкий голос, чтобы застать врага врасплох."
"Energize your pet's next attack at the cost of its health. You must have an Anchor Rune in your inventory, and there is a 10% chance it will be consumed.": "Усильте следующую атаку вашего питомца ценой его здоровья. У вас в инвентаре должна быть Anchor Rune, и есть 10% шанс, что она будет израсходована."
"Instruct your pet to perform its special trick ability. (Each type of pet has a trick ability. Their usefulness varies widely.)\n\nIf the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Прикажите своему питомцу выполнить его особую способность-трюк. (У каждого типа питомцев есть способность-трюк. Их полезность сильно различается.)\\n\\nЕсли питомец ещё не вступил в бой, он использует выбранную вами цель как предполагаемого врага."
"Instruct your pet to perform its special trick ability. It also recovers some Armor. (Each type of pet has a trick ability. Their usefulness varies widely.)\n\nIf the pet is not yet engaged in combat, it will use your selected target as a suggested enemy.": "Прикажите своему питомцу выполнить его особую способность-трюк. Она также восстанавливает немного Armor. (У каждого типа питомцев есть способность-трюк. Их полезность сильно различается.)\\n\\nЕсли питомец ещё не вступил в бой, он использует выбранную вами цель как предполагаемого врага."
"Point out a weakness in your target so that your pet can take advantage of it.": "Укажите на слабое место вашей цели, чтобы ваш питомец мог этим воспользоваться."
"Use your horrible squeaks and giant ears to interpret your environment.": "Используйте свой ужасный писк и гигантские уши, чтобы воспринимать окружающую среду."
"Use your horrible squeaks and giant ears to interpret your environment and evade enemies, but at slight cost to your movement speed.": "Используйте свои ужасные писки и огромные уши, чтобы воспринимать окружающую обстановку и уклоняться от врагов, но ценой небольшого снижения скорости передвижения."
"Slash an enemy with your winged talons.": "Полосните врага своими крылатыми когтями."
"Tear into an enemy with your talon.": "Вонзите свой коготь во врага."
"Flap violently to disperse your enemies with a gust of wind.": "Яростно взмахните крыльями, чтобы рассеять врагов порывом ветра."
"Sink your fangs into an enemy and consume their life force, healing yourself.": "Вонзите свои клыки во врага и поглотите его жизненную силу, исцеляя себя."
"Sink your disease-infested fangs into an enemy, causing dizziness and disorientation. (And if you bite other players, they may catch Fevered Trismus.)": "Вонзите свои заражённые болезнью клыки во врага, вызывая головокружение и дезориентацию. (А если вы кусаете других игроков, они могут подхватить Fevered Trismus.)"
"Use your wings and your incredible hearing to hold your ground even in extreme circumstances.": "Используйте свои крылья и невероятный слух, чтобы твердо держаться даже в самых экстремальных обстоятельствах."
"Use your horrific voice to damage an enemy.": "Используйте свой ужасающий голос, чтобы нанести урон врагу."
"Scream at the top of your lungs, injuring all enemies within close earshot.": "Закричите во всю мощь своих лёгких, нанося урон всем врагам в пределах близкой слышимости."
"Behave so disorientingly that enemies cannot tell where you are. They perceive a second version of you for a short while.": "Ведите себя настолько дезориентирующе, что враги не смогут понять, где вы находитесь. Некоторое время они будут видеть вашу вторую версию."
"Focus an obliterating wave of noise on a single distant target.": "Сфокусируйте сокрушительную волну шума на одной удалённой цели."
"Internal ability that triggers when Cloud Trick is activated.": "Внутренняя способность, которая срабатывает при активации Cloud Trick."
"Throw a big ball of water at your enemy.": "Бросьте большой шар воды во врага."
"Hurl lightning at your enemy.": "Метните молнию во врага."
"Create a storm over target enemy. Deals nature damage immediately, and continuously for a few seconds.": "Создаёт бурю над выбранным врагом. Наносит урон природой немедленно, а затем продолжает наносить его в течение нескольких секунд."
"Cover the entire area in wind, rain, and death!": "Покройте всю область ветром, дождём и смертью!"
"Create a sentient microclimate of volatile wind which attacks foes. Although the tornado takes cues from your behavior, you do not directly control the tornado.": "Создаёт разумный микроклимат из неистового ветра, который атакует врагов. Хотя торнадо ориентируется на ваше поведение, вы не управляете им напрямую."
"Create a sentient microclimate of wind-blasted sand. This alternate version of Summon Tornado does not knock back foes, but deals extra armor damage.": "Создаёт разумный микроклимат из несомого ветром песка. Эта альтернативная версия Призвать торнадо не отбрасывает врагов, но наносит дополнительный урон Armor."
"Create a sentient cloud of undead dust and angry bone fragments. This alternate version of Summon Tornado does not knock back foes. It deals Darkness damage instead of Nature damage.": "Создаёт разумное облако неживой пыли и яростных костяных осколков. Эта альтернативная версия Призвать Торнадо не отбрасывает врагов назад. Она наносит урон Darkness вместо урона Nature."
"Whip freezing winds against your enemy, leaving them cold and slow.": "Обрушьте на врага ледяные ветра, оставляя его замёрзшим и замедленным."
"Alter the air currents so that you can fly. Only works outdoors, and consumes both regular Power and Tempest Energy.": "Изменяет воздушные потоки так, чтобы вы могли летать. Работает только на открытом воздухе и расходует как обычную Power, так и Tempest Energy."
"Create an area of perfect weather. You and allies can stand in it to avoid being knocked around.": "Создаёт область с идеальной погодой. Вы и союзники можете стоять в ней, чтобы вас не сбивало с ног."
"Protect yourself in a column of air.": "Защитите себя в столбе воздуха."
"Transfer the mighty power of a thunderstorm into a nearby enemy.": "Передайте могучую силу грозы ближайшему врагу."
"Create a cloud which can hold onto a thread of your life force.": "Создаёт облако, которое может удерживать нить вашей жизненной силы."
"Protect a pet with a barrier of energized air.": "Защитите питомца барьером из заряженного воздуха."
"Become a giant vampire bat.": "Превратитесь в гигантскую летучую мышь-вампира."
"Bite a target.": "Укусить цель."
"Teleport to target and ensorcel them, sapping their will. They are unable to attack you for a time, even if you attack them.": "Телепортируйтесь к цели и околдуйте её, подтачивая её волю. Некоторое время она не сможет атаковать вас, даже если вы атакуете её."
"Drink your enemy.": "Выпей своего врага."
"Emanate a wave of forgetfulness that prevents enemies from detecting or attacking you. This effect can be broken if you attack them.": "Испустите волну забывчивости, которая не позволяет врагам обнаружить вас или атаковать вас. Этот эффект может быть снят, если вы атакуете их."
"Take control of an enemy for a moment, forcing them to fight for you. Using the ability again prematurely dispels the effect.": "Возьмите под контроль врага на короткое время, заставив его сражаться за вас. Повторное использование способности раньше времени снимает этот эффект."
"Reduce yourself to a bloody mist to escape harm. You can't use most attacks, but you are resistant to harm. (Use this ability again to prematurely end Blood Mist.)": "Превратите себя в кровавый туман, чтобы избежать урона. Вы не можете использовать большинство атак, но становитесь устойчивы к урону. (Используйте эту способность снова, чтобы досрочно завершить Кровавый туман.)"
"Tear gashes into your enemy, spilling their blood.": "Разорвите врага глубокими ранами, проливая его кровь."
"Inflict pure unlife upon your foe.": "Обрушьте чистую нежизнь на своего врага."
"Spread a cloud of envy turned to life-destroying hate.": "Распространи облако зависти, обращённой в губительную ненависть."
"Enshroud your victim in unlife. It is extremely difficult to evade the Withering Shroud.": "Окутайте свою жертву нежизнью. От Увядающего Покрова чрезвычайно трудно уклониться."
"Fill your foe's mind with visions of loss.": "Наполните разум врага видениями утраты."
"Flood your target's mind with visions of what it most desires.": "Наводните разум вашей цели видениями того, чего она желает больше всего."
"-": "-"
"Hit an enemy with a club or hammer.": "Ударьте врага дубиной или молотом."
"Hit an enemy with a club or hammer. Really, really hard.": "Ударьте врага дубиной или молотом. Очень, очень сильно."
"Hold that fancy hammer up for all to see. You are mighty, and this hammer is amazing! Who can stop you now?!": "Подними этот причудливый молот, чтобы все его увидели. Ты могуч, и этот молот просто потрясающий! Кто теперь сможет тебя остановить?!"
"Hit an enemy so hard that they fall over! Ha ha, stupid enemy.": "Ударьте врага так сильно, что он свалится с ног! Ха-ха, глупый враг."
"Crush an enemy's bones.": "Сокрушите кости врага."
"Summon nature's wrath to wreak vengeance on your foes.": "Призовите гнев природы, чтобы обрушить месть на своих врагов."
"Electrify your enemy.": "Наэлектризуйте своего врага."
"Recklessly attack your enemy without regard for your own safety. You lose Armor, but not Power.": "Безрассудно атакуйте врага, не заботясь о собственной безопасности. Вы теряете Armor, но не Power."
"Crush and destroy a target's armor.": "Сокрушите и разрушьте Armor цели."
"Use your brute power to leave an enemy off-balance and reeling.": "Используйте свою грубую силу, чтобы вывести врага из равновесия и ошеломить его."
"Collect electricity into your hammer and then throw it at your enemy.": "Соберите электричество в свой молот, а затем метните его во врага."
"Hit an enemy with your charged weapon. Moments later, they feel the shock.": "Ударьте врага вашим заряженным оружием. Спустя мгновение он ощутит удар током."
"Cheer your comrades into furious battle.": "Воодушевите своих товарищей на яростную битву."
"Become a raven. This is a travel form that can only be used outdoors.": "Превратитесь в ворона. Это походная форма, которую можно использовать только на открытом воздухе."
"Become a deer.": "Превратиться в оленя."
"Become an owl. This is a travel form that can only be used outdoors.": "Превратитесь в сову. Это походный облик, который можно использовать только вне помещений."
"Become a snow raven. This is a travel form that can only be used outdoors.": "Превратитесь в снежного ворона. Это походная форма, которую можно использовать только на открытом воздухе."
"Become a duck. This is a travel form that can only be used outdoors.": "Превратитесь в утку. Это походная форма, которую можно использовать только на открытом воздухе."
"Become an eagle. This is a travel form that can only be used outdoors.": "Превратитесь в орла. Это походная форма, которую можно использовать только вне помещений."
"Become a seagull. This is a travel form that can only be used outdoors.": "Превратитесь в чайку. Это форма для путешествий, которую можно использовать только на открытом воздухе."
"Become a sparrow. This is a travel form that can only be used outdoors.": "Превратитесь в воробья. Это форма для путешествий, которую можно использовать только на открытом воздухе."
"Plant a seed in the target that leaves them weakened.": "Посадите в цель семя, которое ослабляет её."
"Deplete the target's defenses, rotting them from within. They suffer extra damage from each attack.": "Истощает защиту цели, разлагая её изнутри. Она получает дополнительный урон от каждой атаки."
"Poison the target's mind, sapping their focus.": "Отравляет разум цели, подтачивая её сосредоточенность."
"Coat yourself in painful thorns. Melee attackers take damage when they hit you.": "Покройте себя болезненными шипами. Атакующие в ближнем бою получают урон, когда бьют вас."
"Demand that nature smite your foe.": "Потребуйте, чтобы природа поразила вашего врага."
"You or an ally become more virulent and toxic.": "Вы или союзник становитесь более вирулентными и токсичными."
"Create a symbol of health and wellness that heals nearby allies.": "Создаёт символ здоровья и благополучия, который исцеляет ближайших союзников."
"Bring instant healing to yourself or an ally.": "Мгновенно исцеляет вас или союзника."
"Revitalize yourself and nearby allies at a crucial moment.": "Восстановите силы себе и ближайшим союзникам в решающий момент."
"Your movement becomes less noticeable to enemies. (This has no effect on enemies already in combat with you.)": "Ваше передвижение становится менее заметным для врагов. (Это не действует на врагов, уже сражающихся с вами.)"
"Modestly increase your movement speed, and the speed of all allies around you.": "Умеренно увеличивает вашу скорость передвижения и скорость всех союзников вокруг вас."
"Fling an orb of poison.": "Швырните сферу яда."
"Bring balance to nature the old fashioned way: by hitting it until it works better.": "Верните природе равновесие старым добрым способом: бейте по ней, пока она не начнёт работать лучше."
"Cause tiny organisms to grow on the target's eyes, making it difficult for them to fight.": "Заставляет крошечные организмы вырасти на глазах цели, затрудняя ей бой."
"Strengthen the target's ties with nature.": "Укрепляет связь цели с природой."
"Rot the target's flesh and organs, causing Trauma damage.\n\nThis is a variant of Rotskin. Most treasure that affects Rotskin also affects Rotflesh. You must already know Rotskin 6 or higher to use this ability.": "Разлагает плоть и органы цели, нанося урон Травмой.\\n\\nЭто вариант Rotskin. Большинство сокровищ, влияющих на Rotskin, также влияют на Rotflesh. Чтобы использовать эту способность, вы должны уже знать Rotskin 6 или выше."
"Rot the target's flesh and organs, causing Trauma damage.\n\nThis is a variant of Rotskin. Most treasure that affects Rotskin also affects Rotflesh.": "Разлагает плоть и органы цели, нанося урон Травмой.\\n\\nЭто вариант Rotskin. Большинство сокровищ, влияющих на Rotskin, также влияют на Rotflesh."
"Play an ocarina or similar wind instrument.": "Играть на окарине или похожем духовом инструменте."
"Play a lute.": "Играть на лютне."
"Play a hand drum.": "Играть на ручном барабане."
"Play a tuba or similar brass instrument.": "Играйте на тубе или похожем медном духовом инструменте."
"Play a hammered dulcimer.": "Играть на цимбалах."
"Play a harp.": "Играть на арфе."
"Perform an interpretive dance to music.": "Исполнить выразительный танец под музыку."
"Play a fairy chime.": "Сыграть на колокольчике феи."
"Perform an interpretive dance to music. (When prompted to perform Dance 1, you can use this dance instead.)": "Исполнить выразительный танец под музыку. (Когда требуется выполнить Танец 1, вместо него можно использовать этот танец.)"
