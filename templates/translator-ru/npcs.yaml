"Leathery": "Кожистая"
"A smirking hare": "Ухмыляющийся заяц"
"Food Vendor": "Продавец еды"
"Studying a book": "Изучает книгу"
"He's laughing and making weird noises.": "Он смеётся и издаёт странные звуки."
"Speaking aloud to himself as he writes": "Говорит вслух с самим собой, пока пишет"
"Poring through a thick tome": "Просматривая толстую книгу"
"Covered in wax and honey": "Покрыт воском и мёдом"
