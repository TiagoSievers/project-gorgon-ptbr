# ── Описания NPC ──
"A specialized altar.": "Специализированный алтарь."
"It's inscribed with little etchings of bears.": "На нём вырезаны маленькие изображения медведей."
"Who knows where Irkima gets these work orders...": "Кто знает, где Иркима достаёт эти рабочие заказы..."
"It's inscribed with little etchings of cats.": "На нём выгравированы маленькие изображения кошек."
"Gremix has posted some work orders here.": "Гремикс разместил здесь несколько заказов на работу."
"Thimble Pete transcribes orders onto papers and sticks them on this board.": "Тимбл Пит переписывает приказы на бумагу и прикрепляет их к этой доске."
"A friendly fruit bat. Really!": "Дружелюбная фруктовая летучая мышь. Правда!"
"\"Work with the famous Ogamboe the Deal Hunter!\"": "Работайте со знаменитым Огэмбо, Охотником за сделками!"
"For millin'": "Для помола"
"Looks like guilds can register here.": "Похоже, здесь гильдии могут зарегистрироваться."
"Laura Neth keeps track of her recent orders here.": "Лора Нет ведёт здесь учёт своих недавних заказов."
"Caravan Leader": "Караванный предводитель"
"He looks at you dispassionately.": "Он смотрит на вас безучастно."
"He looks at you calmly.": "Он спокойно смотрит на вас."
"It watches you carefully.": "Он внимательно наблюдает за вами."
"She's not written yet.": "Её ещё не написали."
"An elven mage with intensity.": "Эльфийский маг с огоньком."
"She seems flustered.": "Она кажется взволнованной."
"Distractedly humming a lovely tune.": "Рассеянно напевает милую мелодию."
"Not written yet.": "Ещё не написано."
"She seems jolly": "Она кажется весёлой."
"With a frown and a squint.": "С нахмуренным лбом и прищуром."
"He's examining a piece of entrail.": "Он изучает кусок кишок."
"Definitely green-tinted": "Определённо с зеленоватым оттенком"
"A strong deer who looks very relaxed.": "Сильный олень, который выглядит очень расслабленным."
"He looks annoyed": "Он выглядит раздражённым."
"This bug looks menacing.": "Этот жук выглядит угрожающе."
"Seems friendly enough": "Кажется достаточно дружелюбным"
"She stares past you, as if she is watching you and many other things all at once.": "Она смотрит мимо вас, словно наблюдает за вами и многими другими вещами одновременно."
"An old ass": "Старый осёл"
"She's very focused on her crossbows.": "Она очень сосредоточена на своих арбалетах."
"With a perceptive glare": "С проницательным взглядом"
"She hides a smile as she talks with her friend Rita.": "Она скрывает улыбку, разговаривая со своей подругой Ритой."
"Looking at some unusual garbage.": "Смотрит на какой-то необычный мусор."
"He's immaculately dressed, but smells like feet.": "Он безупречно одет, но пахнет ногами."
"She looks annoyed": "Она выглядит раздражённой"
"Seems calm for an orc": "Кажется спокойным для орка"
"Looks strong.": "Выглядит сильным."
"Disciplined and intense": "Дисциплинированный и сосредоточенный"
"Young and eager for knowledge": "Молодая и жаждущая знаний"
"Bored and disinterested": "Скучающий и равнодушный"
"Well-starched robes": "Хорошо накрахмаленные одеяния"
"He has a broad smile.": "У него широкая улыбка."
"A peaceful-ish ranalon": "Относительно мирный раналон"
