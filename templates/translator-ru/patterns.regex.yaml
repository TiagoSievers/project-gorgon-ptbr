# ══════════════════════════════════════════════════════════════
# RegEx-переводы (*.regex.yaml)
# Каждый ключ — регулярное выражение (C# Regex)
# Значение — шаблон замены с группами захвата: $1, $2, ...
# Обёртка в /.../ необязательна, но допустима для читаемости.
# Паттерны проверяются ПОСЛЕ exact/case-insensitive словарного поиска.
# ══════════════════════════════════════════════════════════════

# ── Диалог с NPC ──
"^Talking with (.+)$": "Диалог с $1"
"^Speaking with (.+)$": "Разговор с $1"
"^Talk to (.+)$": "Поговорить с $1"
"^You need ([\\d]+) more skill in (.+)$": "Вам нужно ещё $1 очка навыка $2"
"^+([\\d]+) Favor$": "+$1 расположения"
"^+([\\d]+) Councils$": "+$1 Печатей Совета"
"^Your Councils: ([\\d]+)$": "Ваши Печати Совета: $1"
"^Your current available Councils$": "Ваши текущие доступные Печати Совета"

# ── Приветствие ──
"^Welcome, (.+)!$": "Добро пожаловать, $1!"
"^Welcome, (.+)$": "Добро пожаловать, $1"

# ── Масштаб ──
"^Zoom Level: (\\d+)$": "Масштаб: $1"

# ── Свободные слоты ──
"^Slots Free: (.+)$": "Свободных слотов: $1"

# ── Уровень предмета ──
"^Level (\\d+), (.+)$": "Ур. $1, $2"
"^Level (\\d+) (.+)$": "Ур. $1 $2"

# ── Требования навыков ──
"^Requires (.+) Level (\\d+) and (.+) Level (\\d+)$": "Требуется $1 ур. $2 и $3 ур. $4"
"^Requires (.+) Level (\\d+)$": "Требуется $1 ур. $2"

# ── Рецепты (с подписью уровня) ──
"^(.+)\\n<size=75%>(.+) Level (\\d+)</size>$": "$1\n<size=75%>$2 ур. $3</size>"

# ── Активность (лента событий) ──
"^<b><color=#FFCC00>(.+?)</color></b> completed the hangout '(.+)' with (.+)$": "<b><color=#FFCC00>$1</color></b> завершил общение «$2» с $3"
"^<b><color=#FFCC00>(.+?)</color></b> has achieved (.+)$": "<b><color=#FFCC00>$1</color></b> получил достижение $2"

# ── Выбор участника группы (любой номер) ──
"^Select Group Member #(\\d+)$": "Выбрать участника группы #$1"

# ── Перехват смерти ──
"^Intercepting Death\\.\\.\\. PleaseWait\\.\\.\\.(.+)$": "Перехват смерти... Подождите...$1"

# ── Главное меню ──
"^Loading ([\\d]+) additional assets...$": "Загрузка $1 дополнительных ресурсов..."

# ── Меню выбора персонажа ──
"^Current Location: (.+)$": "Текущее местоположение: $1"

# ── Окна ──
"^Search Corpse of (.+)$": "Обыск трупа $1"

# ── Свойства предметов ──
"^<b>([+-])(\\d+)</b> Health$": "<b>$1$2</b> здоровья"
"^<b>([+-])(\\d+)</b> Armor$": "<b>$1$2</b> брони"
"^<b>([+-])(\\d+)</b> Power$": "<b>$1$2</b> энергии"
"^Health: (.+)$": "Здоровье: $1"
"^Armor: (.+)$": "Броня: $1"
"^Power: (.+)$": "Энергия: $1"
"^Metabolism: (.+)$": "Метаболизм: $1"
"^([+-]?[\\d]+) Armor\\n?$": "$1 брони"
"^([+-]?[\\d]+) Health\\n?$": "$1 здоровья"
"^([+-]?[\\d]+) Power\\n?$": "$1 энергии"
"^Max Health ([+-])(\\d+)$": "Макс. здоровье $1$2"
"^Max Armor ([+-])(\\d+)$": "Макс. броня $1$2"
"^Fire Magic Damage ([+-])(\\d+)$": "Урон огненной магии $1$2"
"^Fire Magic Reduction ([+-])(\\d+)$": "Снижение урона огненной магии $1$2"
"^Cold Magic Damage ([+-])(\\d+)$": "Урон ледяной магии $1$2"
"^Cold Magic Reduction ([+-])(\\d+)$": "Снижение урона ледяной магии $1$2"
"^Acid Magic Damage ([+-])(\\d+)$": "Урон кислотной магии $1$2"
"^Acid Magic Reduction ([+-])(\\d+)$": "Снижение урона кислотной магии $1$2"
"^Spring Speed Boost ([+-])(\\d+)$": "Ускорение бега $1$2"
"^Spring Speed Boost [(]Out of Combat[)] ([+-])(\\d+)$": "Ускорение бега (вне боя) $1$2"
"^([+-])(\\d+) to a Skill$": "$1$2 к навыку"
"^([+-])(\\d+) to Deer$": "$1$2 к оленю"
"^([+-])(\\d+) to Fishing$": "$1$2 к рыбалке"
"^([+-])(\\d+) to Riding$": "$1$2 к верховой езде"
"^([+-])(\\d+) to Max Health [(]when skill active[)]$": "$1$2 к макс. здоровью (когда навык активен)"
"^([+-])(\\d+) to Max Power [(]when skill active[)]$": "$1$2 к макс. энергии (когда навык активен)"
"^([+-])(\\d+) Items$": "$1$2 предмет."
"^([+-])(\\d+) to Max Power [(]when skill active[)]$": "$1$2 к макс. энергии (когда навык активен)"





# ── ХЗ ──
"^Welcome (.+)[!]$": "Добро пожаловать $1!"
"^([\\d]+[.]?[\\d]*) seconds[.]?$": "$1 секунд"
"^Zoom level: ([\\d]+[.]?[\\d]*)$": "Уровень масштабирования: $1"
"^Value: ([\\d]+)$": "Значение: $1"
"^[(]Earned ([\\d]+) Death XP[)]\n[(]Bonus XP! First Death From This Cause![)]$": "(Получено $1 опыта смерти)\n(Бонусный опыт! Первая смерть от этой причины!)"
"^([+-][\\d]+) Favor$": "$1 расположения"
"^([+-][\\d]+) Councils$": "$1 Печатей Совета"
"^([\\d]+) Quests": "$1 заданий"