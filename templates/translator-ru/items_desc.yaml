"A publicly-displayable collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 33% chance of catching bonus fish and 40% chance of collecting extra fish scales. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 5.": "Публично демонстрируемая коллекция свежих цветов, оформленных так, чтобы пробудить ваше чувство морского приключения.\\n\\nДарует 33% шанс поймать бонусную рыбу и 40% шанс получить дополнительные рыбьи чешуи. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 5."
"Teaches you how to make an exceptional instrument formed from the shell of a conch.": "Обучает созданию исключительного инструмента из раковины рапаны."
"Teaches you a fishing combat technique.": "Обучает боевой технике рыбалки."
"Teaches you how to prepare a lungfish for consumption.": "Обучает вас, как подготовить легочную рыбу к употреблению."
"It's solid glass with a fish embedded in it.": "Это цельное стекло с embedded в нём рыбой."
"This grim fist weapon was clearly inspired by the Human legend of the Green Man, a druid who supposedly wanders the forests and punches wayward teens to death if they're out past curfew.": "Это мрачное оружие в виде кулака явно вдохновлено человеческой легендой о Зелёном Человеке — друиде, который, по преданию, бродит по лесам и избивает до смерти непослушных подростков, если те задерживаются после комендантского часа."
"A goblin scout's business card.": "Визитная карточка гоблинского разведчика."
"This legendary anti-troll device is imbued with magic flame that can never be quenched. There are rumors that sometimes the club's wielder gets a <i>tiny</i> bit incinerated when the fire gets out of control... but what are you, a baby?": "Это легендарное устройство против троллей наполнено магическим пламенем, которое никогда не гаснет. Ходят слухи, что иногда владелец дубины получает <i>немного</i> обожжений, когда огонь выходит из-под контроля... но ты что, малыш?"
"The broken-off tip of a fire wand. While it's now completely inert, it may still be a useful study aid for mages.": "Отломанный наконечник огненного жезла. Хотя теперь он полностью бездействует, он всё ещё может быть полезным учебным пособием для магов."
"Certainly \"well done\" and perhaps a bit beyond that, but at least it's fresh.": "Определённо «хорошо прожарено» и, возможно, даже немного больше, но, по крайней мере, свежее."
"Used by Gazluk orcs to inspire courage and/or fear.": "Используется орками Газлука для внушения мужества и/или страха."
"A fairly basic helmet with some unnecessary stylistic flourishes.": "Довольно простой шлем с некоторыми ненужными стилистическими излишествами."
"An ordinary-looking glass flask that's cold to the touch, even in hot environments.": "Обычный стеклянный флакон, который холоден на ощупь, даже в жаркой среде."
"Home-made from snail parts.": "Домашнего приготовления из частей улитки."
"Unleavened bread. Not super tasty by itself, but good in sandwiches. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Пресный хлеб. Сам по себе не очень вкусный, но хорош в бутербродах. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Some simple salsa can really spice up any flatbread. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Простая сальса может действительно оживить любой лаваш. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Harvested flax fiber. It needs to be retted before it can be turned into linen.": "Собранное льняное волокно. Его нужно замочить, прежде чем превратить в лён."
"Flax seeds can be grown into flax fiber.": "Семена льна можно вырастить в льняное волокно."
"A lump of flesh. Very disturbing. Very chewy.": "Кусок плоти. Очень тревожный. Очень жевательный."
"Causes the wearer's flesh to constantly regenerate at incredible speed. Slashing wounds appear to self-repair instantly! But the constant flesh-generation can be irksome.": "Заставляет плоть носителя постоянно регенерировать с невероятной скоростью. Режущие раны, кажется, заживают мгновенно! Но постоянное обновление плоти может раздражать."
"Can be studied to earn Fletching XP. (Requires VIP.)": "Можно изучать для получения опыта в Стрельбе из лука. (Требуется VIP.)"
"Lets you fly for 5 minutes (press the Move Up key to begin). Also grants immunity to falling damage. Only usable outdoors; entering a dungeon will cause the effect to immediately end.": "Позволяет летать в течение 5 минут (нажмите клавишу «Вверх» для начала). Также даёт иммунитет к урону от падения. Используется только на открытом воздухе; вход в подземелье немедленно прекращает действие."
"Lets you fly for 30 minutes (press the Move Up key to begin). You'll take no damage from falls while the effect lasts.": "Позволяет летать в течение 30 минут (нажмите клавишу подъёма, чтобы начать). Во время действия эффекта вы не получите урона от падений."
"It's a pretty big rock. You could probably carve some thoroughly mediocre arrow heads out of it if you were patient enough.": "Это довольно большой камень. Если запастись терпением, из него можно вырезать вполне посредственные наконечники для стрел."
"A handful of odorous twinkling flowers. Cute, but a little too gimmicky.": "Горсть пахучих мерцающих цветов. Милые, но слишком вычурные."
"It's a small bar of pleasant-smelling soap. And so smooth! This is nice soap.": "Это маленький кусочек приятно пахнущего мыла. И такое гладкое! Это хорошее мыло."
"A raw fish. These hideous creatures are surprisingly tasty.": "Сырая рыба. Эти отвратительные создания на удивление вкусные."
"Incredibly fresh flounder on a ball of delicious rice.": "Невероятно свежая камбала на шарике вкусного риса."
"Tasty raw flounder wrapped in seaweed, on a ball of delicious rice.": "Вкусная сырая камбала, завернутая в морские водоросли, на шарике вкусного риса."
"Low-quality wheat flour, but cheap and abundant.": "Мука из пшеницы низкого качества, но дешевая и в изобилии."
"Teaches you a flower arrangement.": "Обучает вас составлению букетов."
"Teaches you a flower arrangement and a related flower display.": "Обучает вас аранжировке цветов и соответствующей цветочной композиции."
"A bit of very specialized cloth that is used by expert flower arrangers.": "Немного очень специализированной ткани, которую используют опытные флористы."
"Handmade by a fairy, these make you especially light on your feet.": "Сделанные феей вручную, они делают вас особенно легкими на ногах."
"A bit of gauze that helps keep flowers organized in a flower arrangement.": "Небольшой кусок марли, который помогает держать цветы в порядке в цветочной композиции."
"It's a tooth from a huge Tor-Urak.": "Это зуб огромного Тор-Урака."
"A seemingly frozen beaker that enables a strange influence over the weather.": "Кажущийся замороженным стакан, который оказывает странное влияние на погоду."
"This particular piece of fluorite is blue with white bands. Used in magic, it helps you communicate with animals. It also focuses the mind inwards.\n\nAssociated Primary Skill: Animal Handling\nAssociated Secondary Skill: Meditation": "Этот образец флюорита синего цвета с белыми полосами. В магии он помогает общаться с животными. Также он способствует сосредоточению ума внутрь себя.\n\nСвязанный основной навык: Обращение с животными\nСвязанный вторичный навык: Медитация"
"A malformed magical quartz. It's too small (and unpredictable!) to be used in crafting.": "Деформированный магический кварц. Он слишком мал (и непредсказуем!), чтобы использоваться в ремесле."
"A mildly poisonous toadstool which can be eaten after boiling.": "Слабо ядовитый гриб, который можно есть после отваривания."
"A pile of fly amanita flakes. These are only the normal level of fatal when eaten (which is still 100%, but lower than some other mushrooms).": "Кучка ломтиков мухомора. Они обладают обычным уровнем смертельной опасности при употреблении (что всё равно 100%, но ниже, чем у некоторых других грибов)."
"A rather murky heterogeneous mixture of mushroom bits in water. DO NOT DRINK!": "Довольно мутная гетерогенная смесь кусочков грибов в воде. НЕ ПИТЬ!"
"A blend of fairy wings and secret ingredients that are quite difficult to digest due to their repulsiveness. It is banned in half of the fairy courts, and readily available in the other half.": "Смесь крыльев фей и секретных ингредиентов, которые довольно трудно переварить из-за их отталкивающего характера. Запрещён в половине дворов фей и свободно доступен в другой половине."
"Found within a sentient weather phenomenon, this bizarre horn gives off an eerie glow.": "Обнаруженный внутри разумного погодного явления, этот странный рог излучает зловещий свет."
"A clever arrangement of flowers that enhances your perceptions.\n\nGrants 10% chance of collecting extra fruit and related foraging items. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная композиция цветов, которая улучшает ваше восприятие.\\n\\nДарует 10% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A clever arrangement of flowers that enhances your perceptions.\n\nGrants 60% chance of collecting extra fruit and related foraging items, and 45% chance of collecting extra seeds. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная композиция цветов, которая улучшает ваши восприятия.\\n\\nДарует 60% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 45% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
