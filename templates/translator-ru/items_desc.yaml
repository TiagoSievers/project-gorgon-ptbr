"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Blacksmithing. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную сущность знаний о конкретном навыке — кузнечном деле. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Buckle Artistry. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную эссенцию знаний об определённом навыке — Искусстве Пряжек. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
