"Fat from an animal.": "Жир, полученный от животного."
"Hmm. Could this be part of some weird magical globe?": "Хмм. Неужели это часть какого-то странного магического глобуса?"
"A raw fish. These strange fish originate in the distant continent of Fosulf. They require expert handling before they can be eaten safely, and few fishermen in Alharth know the technique.": "Сырая рыба. Эти странные рыбы происходят с далёкого континента Фозульф. Для их безопасного употребления требуется мастерская обработка, и немногие рыбаки в Алхарте знают эту технику."
"A carefully killed and prepared lungfish, ready for cooking.": "Аккуратно убитая и подготовленная легочная рыба, готовая к приготовлению."
"Carefully prepared and grilled lungfish. Makes a nice snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Тщательно приготовленная и обжаренная легочная рыба. Отличная закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Fish and vegetables in a flour wrapping. Delicious!": "Рыба и овощи в мучной обёртке. Вкуснотища!"
"A weapon for experienced staff-fighters who wish to get a little more oomph out of their lunges.": "Оружие для опытных бойцов с посохом, которые хотят добавить немного мощи своим рывкам."
"The custom-tailored weapon of a mighty Ranalon Guardian captain.\nNote: this weapon is considered a Staff.": "Индивидуально изготовленное оружие могучего капитана стражей Раналона.\\nПримечание: это оружие считается посохом."
"A spore bomb infused with wolfsbane, designed to be tossed as a weapon by a seasoned Mycologist.": "Бомба со спорами, пропитанная волчьей ягодой, предназначенная для метания в качестве оружия опытным микологом."
"Teaches werewolves how to make a special compound from their saliva.": "Обучает оборотней изготовлению особого состава из их слюны."
"Can be studied to earn Lycanthropy XP. (Requires VIP.)": "Можно изучать для получения опыта в ликантропии. (Требуется VIP.)"
"It's very light, and very cold, and very fragile.\n\n(Note: if this item is held by someone not on the appropriate quest, it will quickly evaporate.)": "Он очень лёгкий, очень холодный и очень хрупкий.\\n\\n (Примечание: если этот предмет находится у персонажа, не участвующего в соответствующем задании, он быстро испарится.)"
"Named after a legendary werewolf who supposedly designed this style of footwear, these shoes fall off cleanly when a lycanthrope transforms, avoiding embarrassing trip-and-fall accidents in the heat of battle. A symbol of Arisetsu is carefully embroidered into the left shoe.": "Названная в честь легендарного оборотня, который, как говорят, разработал этот стиль обуви, эта обувь легко слетает при трансформации ликантропа, предотвращая неловкие падения в разгар боя. Символ Арисэцу аккуратно вышит на левом ботинке."
"This token can be redeemed with -ADMIN- Jackencola for up to a level 80 max-enchanted ring, necklace or piece of armor of choice.\nThis token can only be redeemed by the account that won it. The prize is non-transferable.": "Этот жетон можно обменять у -ADMIN- Джакенкола на кольцо, ожерелье или предмет брони с максимальным улучшением до 80 уровня на выбор.\\nЖетон может быть обменян только аккаунтом, который его выиграл. Приз не подлежит передаче."
"This token can be redeemed with -ADMIN- Jackencola for up to a level 85 legendary mastercrafted piece of modded gear.\nThis token can only be redeemed by the account that won it. The prize is non-transferable.": "Этот жетон можно обменять у -ADMIN- Джакенкола на легендарный мастерски созданный предмет модифицированной экипировки до 85 уровня.\\nЭтот жетон может быть обменян только аккаунтом, который его выиграл. Приз не подлежит передаче."
"Dye used to color a piece of clothing or armor magenta.": "Краска, используемая для окрашивания одежды или брони в малиновый цвет."
"It won't stop squirming!": "Она не перестаёт извиваться!"
"Ham-flavored broth with maggots swimming in it! It looks vile but if you eat it quickly, it's... less vile.": "Бульон со вкусом ветчины, в котором плавают личинки! Выглядит отвратительно, но если съесть быстро, то... менее отвратительно."
"This is an incredibly unappealing piece of rotten meat.": "Это невероятно непривлекательный кусок гнилого мяса."
"The not-quite-dead remains of an ooze. It's mainly used as an ingredient in other potions, but it does have a healing effect when drunk -- assuming you have the gastronomic experience to tolerate the flavor without vomiting.": "Почти не мёртвые остатки слизи. В основном используется как ингредиент для других зелий, но при употреблении оказывает лечебный эффект — при условии, что у вас достаточно гастрономического опыта, чтобы не стошнить от вкуса."
"This small bag of sand is somehow different from regular sand. You can't tell exactly how or why it's different, but you know it is.\n\nMagic sand is coveted by crazy prospectors, who claim there's a way to use the sand to reveal vast mineral wealth.": "Этот маленький мешочек с песком чем-то отличается от обычного песка. Точно сказать, чем и почему, нельзя, но вы знаете, что это так.\\n\\nМагический песок желанен для безумных старателей, которые утверждают, что с его помощью можно обнаружить огромные залежи минералов."
"An enchanted teapot, useful for holding enchanted tea. (But this one is empty.)": "Зачарованный чайник, полезный для хранения зачарованного чая. (Но этот пуст.)"
"A big canine from some animal. It's glowing, and is clearly enchanted. Fascinating.": "Большой клык какого-то животного. Он светится и явно зачарован. Увлекательно."
"Merry Christmas and Happy New Year from the Project: Gorgon team! Thanks for playing and supporting us!": "Счастливого Рождества и Нового года от команды Project: Gorgon! Спасибо, что играете и поддерживаете нас!"
"Painfully hot to the touch, this is designed to facilitate throwing extra-massive fireballs.": "Обжигающе горячий на ощупь, этот навык предназначен для метания сверхмассивных огненных шаров."
"A beautiful and well-made lens that makes objects seem a little bit larger. It doesn't seem very useful; maybe it's for old people.": "Красивая и хорошо сделанная линза, которая делает объекты немного больше. Кажется, что она не очень полезна; возможно, она предназначена для пожилых людей."
"The story goes that a crazed elf spent a hundred years splashing himself with different acid beakers to find the one that hurt the most. This is that beaker.": "Говорят, что безумный эльф потратил сто лет, обливаясь разными кислотными колбами, чтобы найти ту, которая причиняет наибольшую боль. Это и есть та самая колба."
"A strange magical cube. It can be used to give a main-hand weapon a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить основному оружию бонусное магическое свойство. Обратитесь к торговцу снаряжением (или к игроку-усилителю), чтобы установить его."
"A small flask of lubricant. Perfect for fixing jammed machinery! It may have other uses, too.": "Небольшая фляжка смазки. Идеально подходит для починки заедающих механизмов! Возможно, у него есть и другие применения."
"An insane amount of sugar has been used to totally mask the ingredients' taste. Now it just tastes like pure sugar, which is still kind of revolting.": "Для полного скрытия вкуса ингредиентов использовано безумное количество сахара. Теперь он просто на вкус как чистый сахар, что всё равно довольно отвратительно."
"Once worn by Makopa the semi-legendary goblin boss.": "Раньше принадлежали Макопе, полулегендарному вождю гоблинов."
"A pretty gem with dark green bands, it's well known for aiding magical communication.\n\nAssociated Primary Skills: Cow, Pig, Deer, Spider, Giant Bat, etc.": "Красивый самоцвет с тёмно-зелёными полосами, хорошо известный тем, что помогает в магической коммуникации.\n\nСвязанные основные навыки: Коровы, Свиньи, Олени, Пауки, Гигантские летучие мыши и др."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 4' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 4», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 4' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 4», чтобы бросить эту бомбу.)"
"A rakshasa craftsman named Malgath once used this to demonstrate his skill at crafting.": "Ракшаса по имени Малгат когда-то использовал этот лук, чтобы продемонстрировать своё мастерство в ремесле."
"This ungainly hammer has an inscription: 'Not even their bones must survive. - Ku Turla'": "На этом неуклюжем молоте выгравирована надпись: «Даже их кости не должны остаться в живых. — Ку Турла»"
"Blackened, gristly, and overcooked meat from some sort of beast. At least it's fresh.": "Обожжённое, жилистое и пережаренное мясо какого-то зверя. Зато свежее."
"Designed to be slathered onto the mandibles of a giant spider, this reusable paint helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначена для нанесения на челюсти гигантского паука, эта многоразовая краска помогает защититься от болезни, возникающей при слишком близком контакте со светящимися жёлтыми кристаллами."
"A thick-brothed stew with huge chunks of tender meat. The color is a bit off-putting, but it's pretty tasty.": "Густое рагу с огромными кусками нежного мяса. Цвет немного отталкивающий, но вкус довольно приятный."
"Meat and vegetables in a creamy sauce. There's really nothing quite like this taste.": "Мясо и овощи в сливочном соусе. На самом деле, нет ничего похожего на этот вкус."
"Oddly shaped and weirdly smelly.": "Странной формы и с необычным запахом."
"This broadsword was enchanted with the sole goal of taking off heads.": "Этот широкий меч был зачарован с единственной целью — снимать головы."
"A tuft of fur from a manticore 'mane'.": "Клок шерсти из «гривы» мантикоры."
"The end of a manticore's tail, with the venom sack intact.": "Конец хвоста мантикоры с сохранившейся ядовитой железой."
"What a gauche hat!": "Какая безвкусная шляпа!"
"There are worse things to stuff in a mushroom than meat from a mantis claw. Probably.": "В гриб можно нафаршировать и похуже, чем мясо с когтя богомола. Наверное."
"This pumpkin pie is... not very good-tasting. Perhaps it's been tuned for insect palates. That would explain all the meat in it.": "Этот тыквенный пирог... не очень вкусный. Возможно, он приготовлен с учётом вкусовых предпочтений насекомых. Это объясняет всё мясо в нём."
"Sweet, sweet, sweet steamed carrots.": "Сладкие, сладкие, сладкие тушёные морковки."
"Maple chips for smoking fish and meat.": "Щепки клёна для копчения рыбы и мяса."
"A seasoned shark steak with a wood-fired sweet smoky flavor.": "Приправленный стейк из акулы с древесным сладким копчёным вкусом."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +14 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +14 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"If this shield is so lucky, why did Marna give it away? Still, it seems pretty sturdy.": "Если этот щит такой уж счастливый, почему Марна отдала его? Тем не менее, он кажется довольно прочным."
"Dye used to color a piece of clothing or armor maroon.": "Краска, используемая для окрашивания одежды или брони в бордовый цвет."
"Enhanced by prayers to Harukita, this shield radiates malice. A necromancy gem is in the center.": "Усиленный молитвами Харукиты, этот щит излучает злобу. В центре находится некромантский самоцвет."
"A bundle of 1000 arrow shafts for marvelous arrows.": "Пучок из 1000 древков для чудесных стрел."
"A sudden transition is seen here: from elegant but large cowshoes to whisper-thin and unobtrusive ones. The secret is in the fit: it's marvelous.": "Здесь виден резкий переход: от элегантных, но больших коровьих башмаков к едва заметным и тонким. Секрет в посадке: она великолепна."
"Four out of five talking shoe-wearing deer agree: these are the nicest ones they've ever seen.": "Четверо из пяти говорящих оленей в обуви согласны: это самые красивые туфли, которые они когда-либо видели."
"Boots so nimble, you can't even see the wearer's legs when they move. (That's hyperbole.)": "Сапоги такие ловкие, что ноги носителя при движении просто не видны. (Это гипербола.)"
"Whisper-thin yet perfectly adaptive, these horseshoes last a lifetime and will never not be marvelous.": "Тонкие, как шёпот, но идеально адаптирующиеся, эти подковы служат всю жизнь и всегда остаются чудесными."
"A bastion of basic-shoe quality in a sea of basic-shoe sadness.": "Оплот качества простых ботинок в море печали от простых ботинок."
"From the material to the craftsmanship to the enchantments, these fashionable pants exude a calm mastery.": "От материала до мастерства и чар — эти модные штаны излучают спокойное мастерство."
"A marvelous shirt made almost wholly of leather that's soft yet rugged, protective yet breathable. Modern, yet made for the years to come.": "Удивительная рубашка, сделанная почти полностью из кожи, которая мягкая, но прочная, защитная, но дышащая. Современная, но созданная на долгие годы."
"Used in marvelous smithing recipes.": "Используется в удивительных рецептах кузнечного дела."
"Marvelously protective against freezing.": "Чудесно защищает от замерзания."
"Thanks to their near-invisible size, these marvelous cowshoes say almost nothing about the cow that wears them. Friend, foe, demon? These shoes give no clues to the observer.": "Благодаря своему почти невидимому размеру, эти изумительные коровьи башмаки почти ничего не говорят о корове, которая их носит. Друг, враг, демон? Эти башмаки не дают никаких подсказок наблюдателю."
"Sacrificing flair for elegance, these are an understated masterpiece.": "Отказываясь от вычурности ради элегантности, это сдержанный шедевр."
"A medium-body beer with a malty flavor.": "Пиво средней крепости с солодовым вкусом."
"This big banded gem is used in magic to promote grace and give power to the body.\n\nAssociated Primary Skill: Unarmed": "Этот большой полосатый драгоценный камень используется в магии для улучшения грации и придания силы телу.\\n\\nСвязанный основной навык: Бой без оружия"
"A huge gem, light blue-green in color. It's a traditional protective stone for fishermen.\n\nAssociated Primary Skill: Fishing\nAssociated Secondary Skill: Teleportation": "Огромный драгоценный камень светло-голубовато-зеленого цвета. Традиционный защитный камень для рыбаков.\n\nСвязанный основной навык: Рыболовство\nСвязанный вторичный навык: Телепортация"
"A big crystal made up of black and white bands. Used in magic, it guards against physical dangers. This particular onyx has been attuned to Armor Patching when used in crafting.": "Большой кристалл, состоящий из черных и белых полос. Используется в магии, защищая от физических опасностей. Этот конкретный оникс настроен на Починку брони при использовании в ремесле."
"A huge blue gem evocative of dark stormy oceans or winter skies. In magic it enhances musical skill.\n\nAssociated Primary Skill: Bard": "Огромный синий драгоценный камень, напоминающий тёмные штормовые океаны или зимнее небо. В магии он усиливает музыкальное мастерство.\n\nСвязанный основной навык: Барды"
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to bats when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, известный тем, что помогает в магической коммуникации. Этот конкретный камень был наполнен руной, которая настраивает его на летучих мышей при использовании в ремесле."
"This megagem is dark green with red spots. In magic it is used to command nature.\n\nAssociated Primary Skill: Weather Witching": "Этот мегадрагоценный камень тёмно-зелёного цвета с красными пятнами. В магии он используется для управления природой.\\n\\nСвязанный основной навык: Магия погоды"
"A big dark blue stone, with limited but potent magic uses.\n\nAssociated Primary Skill: Staff": "Большой тёмно-синий камень с ограниченными, но мощными магическими свойствами.\n\nСвязанный основной навык: Посохи"
"A honkin' big red gem. Used in magic, it balances the senses and sharpens the mind to imminent danger.\n\nAssociated Primary Skill: Sword": "Огромный красный драгоценный камень. Используется в магии, он уравновешивает чувства и обостряет ум к надвигающейся опасности.\\n\\nСвязанный основной навык: Меч"
"Pale yellow-green and pretty big.": "Бледно-жёлто-зелёный и довольно крупный."
"A large orange gem with many magical uses. Humans appreciate it for its ability to reduce anxiety.\n\nAssociated Primary Skill: Battle Chemistry": "Большой оранжевый драгоценный камень с множеством магических применений. Люди ценят его за способность снижать тревожность.\n\nСвязанный основной навык: Боевой химии"
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to cattle when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, известный тем, что помогает в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на скот при использовании в ремесле."
"This big white gem with purple streaks is exceptionally strong and makes very resilient jewelry. In magic, it is likewise associated with toughness.": "Этот большой белый драгоценный камень с пурпурными прожилками исключительно прочен и используется для создания очень прочных украшений. В магии он также ассоциируется с выносливостью."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to the needs of deer when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, известный своей помощью в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на потребности оленей при использовании в ремесле."
"A large scintillating gemstone. Used in magic, it can protect against death.": "Большой сверкающий драгоценный камень. Используется в магии, может защитить от смерти."
"This honkin' big green crystal is a type of beryl. Used in magic, it is associated with perfection, richness, and deities.\n\nIn its current form, using it in crafting has unpredictable results. When maximized via magic, it's used for crafting certain exotic weapons.": "Этот огромный зелёный кристалл — разновидность берилла. В магии он ассоциируется с совершенством, богатством и божествами.\n\nВ своём нынешнем виде использование его в создании предметов даёт непредсказуемые результаты. При максимальном усилении с помощью магии он используется для создания некоторых экзотических оружий."
"A big yellow topaz. An incredibly versatile magical stone. This particular piece has been infused with a rune that attunes it to Fairy Magic, giving crafted items a chance to include one or more Fairy Magic powers (with the rest being Mentalism powers).": "Большой жёлтый топаз. Невероятно универсальный магический камень. Этот конкретный экземпляр был насыщен руной, которая настраивает его на фейскую магию, давая созданным предметам шанс включить одну или несколько сил фейской магии (остальные — силы ментализма)."
"A big dark red stone, known for its curative properties. This particular stone has been attuned to the First Aid skill if used in crafting.": "Большой темно-красный камень, известный своими лечебными свойствами. Этот конкретный камень настроен на навык Первой Помощи при использовании в создании."
"This large piece of fluorite is blue with white bands. Used in magic, it helps you communicate with animals. It also focuses the mind inwards.\n\nAssociated Primary Skill: Animal Handling\nAssociated Secondary Skill: Meditation": "Этот большой кусок флюорита синего цвета с белыми полосами. В магии он помогает общаться с животными. Также способствует сосредоточению ума внутрь себя.\n\nСвязанный основной навык: Обращение с животными\nСвязанный вторичный навык: Медитация"
"A malformed magical quartz. It's too unpredictable to be used in crafting.": "Деформированный магический кварц. Слишком непредсказуем, чтобы использовать его в ремесле."
"A big dark red stone, known for its curative properties.\n\nAssociated Primary Skill: Druid\n\nAssociated Secondary Skill: First Aid": "Большой темно-красный камень, известный своими целебными свойствами.\n\nСвязанный основной навык: Друид\n\nСвязанный вторичный навык: Первая помощь"
"A clear hunk of beryl. It is not particularly powerful in magic, but it can be used as a sort of energy dampener.\n\nWhen used in Augment Extraction, Goshenite can extract powers that have no specific skill association.": "Прозрачный кусок берилла. Он не обладает особой магической силой, но может использоваться как своего рода гаситель энергии.\\n\\nПри использовании в Извлечении Усилений Гошенит может извлекать силы, не связанные с конкретным навыком."
"Glowing redly. And hugely.": "Светится красным. И очень сильно."
"A big blue rock. It's useful in curatives and curse removal potions.\n\nAssociated Primary Skill: Priest\nAssociated Secondary Skill: Alchemy": "Большой голубой камень. Полезен в лечебных и противосглазных зельях.\n\nСвязанный основной навык: Жрец\nСвязанный вторичный навык: Алхимия"
"A huge gem with dark green bands, it's well known for aiding magical communication.\n\nAssociated Primary Skills: Cow, Pig, Deer, Spider, Giant Bat, etc.": "Огромный драгоценный камень с тёмно-зелёными полосами, хорошо известный тем, что помогает в магической коммуникации.\n\nСвязанные основные навыки: Коровы, Свиньи, Олени, Пауки, Гигантские летучие мыши и др."
"Milky white, this big crystal is useful in magic that relates to 'new beginnings.'\n\nAssociated Primary Skill: Lycanthropy": "Молочно-белый, этот большой кристалл полезен в магии, связанной с «новыми начинаниями».\\n\\nСвязанный основной навык: Ликанропия"
"This is an orange hunk of beryl. Used in magic, it is associated with tailoring. It is the favored color of goblins.": "Это оранжевый кусок берилла. Используется в магии, связан с портняжным делом. Это любимый цвет гоблинов."
"A white stone with dark green veins, the moss agate is also known as the Gardener's Talisman.\n\nAssociated Primary Skill: Hammer\n\nAssociated Secondary Skills: Gardening, Mycology": "Белый камень с тёмно-зелёными прожилками, моховой агат также известен как Талисман садовода.\n\nСвязанный основной навык: Молот\n\nСвязанные второстепенные навыки: Садоводство, Микология"
"A small black stone. Knives that incorporate obsidian can be enchanted more thoroughly than regular blades.\n\nAssociated Primary Skill: Knives\nAssociated Secondary Skill: Toolcrafting": "Небольшой чёрный камень. Ножи с обсидианом можно зачаровывать гораздо тщательнее, чем обычные лезвия.\n\nСвязанный основной навык: Ножи\nСвязанный вторичный навык: Ремесло инструментов"
"A chunky crystal made up of black and white bands. Used in magic, it guards against physical dangers.\n\nAssociated Primary Skill: Shield\nAssociated Secondary Skills: Armor Patching, Tanning, Leatherworking": "Массивный кристалл, состоящий из черных и белых полос. Используется в магии, он защищает от физических опасностей.\\n\\nСвязанный основной навык: Щит\\nСвязанные второстепенные навыки: Починка брони, Выделка, Кожевенное дело"
"This greenish lump seems to have many other colors embedded in it. While some -- especially orcs -- find it beautiful, others find it disconcerting or even ugly. In magic it is associated with curses and the evil eye.": "Этот зеленоватый комок кажется наполненным множеством других цветов. Некоторые — особенно орки — считают его красивым, другие же находят его тревожным или даже уродливым. В магии он ассоциируется с проклятиями и сглазом."
"It's a huge peridot, mint green in color. Used in magic, it wards off distracting thoughts and helps align your accuracy.\n\nAssociated Primary Skill: Archery\nAssociated Secondary Skill: Calligraphy": "Это огромный перидот мятно-зеленого цвета. Используется в магии, он отгоняет отвлекающие мысли и помогает улучшить точность.\n\nСвязанный основной навык: Стрельба из лука\nСвязанный вторичный навык: Каллиграфия"
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to pigs when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, известный своей помощью в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на свиней при использовании в ремесле."
"A huge piece of white quartz. High-quality pieces like this one can amplify elemental magic.\n\nAssociated Primary Skill: Fire Magic": "Огромный кусок белого кварца. Высококачественные куски, такие как этот, могут усиливать стихийную магию.\n\nСвязанный основной навык: Огненная магия"
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to rabbits when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, известен своей помощью в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на кроликов при использовании в ремесле."
"Deep crimson in color, this big gem is used in magic to ensure good fortune.": "Глубокого багрового цвета, этот большой драгоценный камень используется в магии для обеспечения удачи."
"A beautiful big blue stone. In magic it is associated with flight and the sky.": "Красивый большой синий камень. В магии он ассоциируется с полётом и небом."
"This large gem is brownish orange. Used in magic, it provides extra courage or energy to someone under great stress.\n\nAssociated Primary Skill: Warden\nAssociated Secondary Skill: Tailoring": "Этот большой драгоценный камень коричневато-оранжевого цвета. В магии он придаёт дополнительное мужество или энергию тому, кто испытывает сильный стресс.\n\nСвязанный основной навык: Страж\nСвязанный вторичный навык: Портняжное дело"
"A big yellow-green stone. Used in magic, it can pierce the barrier between life and death.\n\nAssociated Primary Skill: Necromancy": "Большой жёлто-зелёный камень. Используется в магии, он способен пробить барьер между жизнью и смертью.\n\nСвязанный основной навык: Некромантия"
"A mineral made mostly of ectoplasm. It shouldn't be used in crafting.": "Минерал, состоящий в основном из эктоплазмы. Не следует использовать в ремесле."
"A pretty big gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to spiders when used in crafting.": "Довольно крупный камень с тёмно-зелёными полосами, хорошо известен тем, что помогает в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на пауков при использовании в ремесле."
"A big soft blue rock. It's useful in curatives and curse removal potions. This particular gem has been infused with a rune that attunes it to foxes when used in crafting.": "Большой мягкий синий камень. Полезен в зельях исцеления и снятия проклятий. Этот конкретный самоцвет был наполнен руной, которая при использовании в ремесле настраивает его на лис."
"This big yellow crystal is extremely reflective from certain angles. In magic, it is associated with growth.\n\nWhen used in Augment Extraction, Sunstone can extract powers that have no specific skill association.": "Этот большой жёлтый кристалл чрезвычайно отражает свет под определёнными углами. В магии он ассоциируется с ростом.\n\nПри использовании в Извлечении Усилений Солнечный камень может извлекать силы, не связанные с конкретным навыком."
"A big chunk of magical crystal. It's pleasantly warm in your palm.": "Большой кусок магического кристалла. Ваша ладонь приятно согревается."
"This big golden rock has deep striations. In magic, it is associated with animals, hunting, and livestock.": "Этот большой золотистый камень имеет глубокие полосы. В магии он ассоциируется с животными, охотой и скотом."
"A massive yellow topaz. An incredibly versatile magical stone.\n\nAssociated Primary Skill: Mentalism": "Огромный жёлтый топаз. Невероятно универсальный магический камень.\n\nСвязанный основной навык: Ментализм"
"A large scintillating stone. Used in magic, it can mesmerize and soothe.\n\nAssociated Primary Skill: Psychology": "Большой сверкающий камень. Используется в магии, может завораживать и успокаивать.\n\nСвязанный основной навык: Психология"
"A big piece of quartz that is partially anchored in another dimension. Being semi-intangible, it is a poor choice for crafting.": "Большой кусок кварца, частично заякоренный в другом измерении. Будучи полунеосязаемым, он плохо подходит для ремесла."
"A massive green gem. Used in magic, it increases comprehension of scientific concepts.\n\nAssociated Primary Skill: Ice Magic\nAssociated Secondary Skill: Geology": "Огромный зелёный драгоценный камень. Используется в магии, он повышает понимание научных концепций.\n\nСвязанный основной навык: Ледяная магия  \nСвязанный второстепенный навык: Геология"
"A big blue stone, almost teal in color. In magic, it is associated with beaches and waves.": "Большой синий камень, почти бирюзового цвета. В магии он ассоциируется с пляжами и волнами."
"A big magical crystal.": "Большой магический кристалл."
"For healing devastating injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения разрушительных ранений. Животные могут использовать эти бомбы с умением Бомба первой помощи."
"For healing devastating injuries. Used by First Aid 5 (and other abilities).": "Для лечения разрушительных травм. Используется навыком Первая помощь 5 (и другими способностями)."
"A perfect skinning knife for master skinners. (+8 to your effective skill when skinning.)": "Идеальный нож для снятия шкур для мастеров. (+8 к вашему эффективному навыку при снятии шкур.)"
"A perfect whittling knife for master whittlers.": "Идеальный нож для резьбы для мастеров резьбы."
"A masterfully-made throwing knife. (Used with the Knife combat skill.)": "Мастерски изготовленный метательный нож. (Используется с навыком боя ножами.)"
"A loaf of enticing, lucious banana bread.": "Буханка манящего, сочного бананового хлеба."
"A customized hammer used by master smiths.": "Индивидуальный молот, используемый мастерами-кузнецами."
"A perfectly weighted arrow with potent broadheads and excellent accuracy.": "Идеально взвешенная стрела с мощными широкими наконечниками и отличной точностью."
"A perfectly weighted arrow with potent broadheads and excellent accuracy. (Note: only Orcs are trained to use this type of ammunition.)": "Идеально сбалансированная стрела с мощными широкими наконечниками и отличной точностью. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"A bundle of 1000 arrow shafts for masterwork arrows.": "Пучок из 1000 стволов стрел для стрел высшего качества."
"A bundle of 1000 beautiful arrowheads for masterwork arrows.": "Связка из 1000 красивых наконечников для мастеровых стрел."
"Used in masterwork smithing recipes.": "Используется в рецептах кузнечного дела мастерового уровня."
"A lump of matted hair.": "Комок скомканных волос."
"A blue-green stone. It has been tuned as an amplifier for certain armorsmithing recipes.": "Сине-зеленый камень. Он настроен как усилитель для некоторых рецептов кузнечного дела."
"A small orange gem with many magical uses. It has been tuned as an amplifier for certain glass equipment.": "Небольшой оранжевый камень с множеством магических применений. Он был настроен как усилитель для определённого стеклянного оборудования."
"A beautiful green crystal. It has been tuned as an amplifier for certain weapon-crafting recipes.": "Красивый зелёный кристалл. Он настроен как усилитель для некоторых рецептов создания оружия."
"A big blue-green stone. It has been tuned as an amplifier for certain armorsmithing recipes.": "Большой сине-зеленый камень. Он был настроен как усилитель для некоторых рецептов кузнечного дела."
"A large orange gem with many magical uses. It has been tuned to empower certain glass equipment recipes.": "Большой оранжевый драгоценный камень с множеством магических применений. Он был настроен для усиления определённых рецептов стеклянного снаряжения."
"A large green crystal. It has been tuned to empower certain weapon-crafting recipes.": "Большой зелёный кристалл. Он настроен для усиления определённых рецептов создания оружия."
"A big black stone. It has been tuned as an amplifier for certain toolcrafting recipes.": "Большой чёрный камень. Он настроен как усилитель для определённых рецептов кузнечного дела."
"A massive crystal made up of black and white bands. This particular gem has been tuned to act as an amplifier for certain leatherworking recipes.": "Массивный кристалл, состоящий из чёрных и белых полос. Этот конкретный самоцвет настроен так, чтобы служить усилителем для определённых рецептов кожевенного дела."
"This huge gem is brownish orange. It has been tuned as an amplifier for certain tailoring recipes.": "Этот огромный камень коричневато-оранжевого цвета. Он настроен как усилитель для некоторых рецептов портняжного дела."
"A small black stone. It has been tuned as an amplifier for certain toolcrafting recipes.": "Маленький чёрный камень. Он настроен как усилитель для некоторых рецептов кузнечного дела."
"A small crystal made up of black and white bands. This particular gem has been tuned to act as an amplifier for certain leatherworking recipes.": "Небольшой кристалл, состоящий из черных и белых полос. Этот конкретный камень настроен так, чтобы служить усилителем для некоторых рецептов кожевенного дела."
"This small gem is brownish orange. It has been tuned as an amplifier for certain tailoring recipes.": "Этот маленький камень коричневато-оранжевого цвета. Он настроен как усилитель для определённых рецептов портняжного дела."
"The brutish barbarians known as the 'McNasty clan' are known for their fearlessness almost as much as for their malodorous grooming habits. These crude metal pants are certainly not clean. But they are strong.": "Грубые варвары, известные как клан «МакНасти», славятся своей бесстрашностью почти так же, как и зловонными привычками ухода за собой. Эти грубые металлические штаны, безусловно, не чисты. Но они прочны."
"A horrible \"candy\" that is technically poisonous: that numb feeling on your tongue? That's the poison. But it's also technically food... (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ужасная «конфета», которая технически ядовита: это онемение на языке? Это яд. Но это также технически еда... (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A customized hammer used by chefs.": "Индивидуальный молоток, используемый поварами."
"A human dish popular in the Crone Hegemony. This one is topped with bacon.": "Человеческое блюдо, популярное в Гегемонии Старухи. Эта пицца с беконом."
"A device that spins continuously when you hold it a certain way.": "Устройство, которое непрерывно вращается, когда вы держите его определённым образом."
"The tell-tale signs of Newakis fatbrush-strokes indicate that this is a novice goblin painting, probably a teenagers' efforts.": "Характерные признаки толстых мазков кисти Ньюакиса указывают на то, что это картина гоблина-новичка, вероятно, работа подростков."
"Teaches you a meditation technique devised by orcs.": "Обучает технике медитации, разработанной орками."
"Dye used to color a piece of clothing or armor medium aquamarine.": "Краска, используемая для окрашивания одежды или доспехов в средний аквамариновый цвет."
"Dye used to color a piece of clothing or armor medium blue.": "Краска, используемая для окрашивания одежды или брони в средний синий цвет."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on chest armor.": "Немного магического остатка, используемого при создании улучшений уровня 31-60 для нагрудной брони."
"A medium dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Средний дракон. Люди, которые на него смотрят, будут смутно вдохновлены создавать лучшее. Длится 5 минут после установки."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on gloves.": "Немного магического остатка, используемого при создании улучшений уровня 31-60 для перчаток."
"A medium dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Средний дракон, покрытый золотом. Те, кто на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A medium gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Средний грифон, покрытый золотом. Люди, которые на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"A medium gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Средний грифон. Люди, которые на него смотрят, будут смутно вдохновлены убивать лучше. Длится 5 минут после установки."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on helmets.": "Немного магического остатка, используемого при создании улучшений 31-60 уровня для шлемов."
"A metal band used in making casks.": "Металлическая лента, используемая для изготовления бочек."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on leg armor.": "Немного магического остатка, используемого при создании улучшений 31-60 уровня для ножной брони."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on main-hand weapons.": "Немного магического остатка, используемого для создания усилений 31-60 уровня, которые надеваются на оружие в основной руке."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on necklaces.": "Немного магического остатка, используемого для создания улучшений 31-60 уровня, которые надеваются на ожерелья."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on off-hand equipment.": "Часть магического остатка, используемая для создания улучшений 31-60 уровня, которые надеваются на снаряжение второстепенной руки."
"Dye used to color a piece of clothing or armor medium orchid.": "Краска, используемая для окрашивания одежды или брони в цвет средней орхидеи."
"A medium-sized crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Кристаллический призмат среднего размера. Трансмутаторы используют их для направления флогистона в предмет или из него."
"Dye used to color a piece of clothing or armor medium purple.": "Краска, используемая для окрашивания одежды или брони в средне-пурпурный цвет."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on rings.": "Немного магического осадка, используемого для создания улучшений 31-60 уровня, которые надеваются на кольца."
"A bit of magical runoff used in the creation of level 31-60 Augments that go on boots.": "Немного магического остатка, используемого при создании улучшений 31-60 уровня, которые надеваются на ботинки."
"A medium dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Средний дракон, покрытый серебром. Люди, которые на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A medium gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Средний грифон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"Dye used to color a piece of clothing or armor medium spring green.": "Краска, используемая для окрашивания одежды или брони в средне-весенне-зеленый цвет."
"Dye used to color a piece of clothing or armor medium violet red.": "Краска, используемая для окрашивания одежды или брони в средне-фиолетово-красный цвет."
"This box can be used to grow a crop of mushrooms.\nGrow Time: 60% faster than normal\nXP Penalty: -50% XP per mushroom": "Эта коробка используется для выращивания урожая грибов.\\nВремя роста: на 60% быстрее обычного\\nШтраф к опыту: -50% опыта за каждый гриб"
"It's a partially-acid-melted shield without any straps to keep it on.": "Это частично расплавленный кислотой щит без ремней, чтобы удерживать его на руке."
"Install into a home or guild hall to let anyone write in it.": "Установите в доме или гильдейском зале, чтобы любой мог в неё писать."
"A dollop of ooze in a tiny vial.": "Капля слизи в маленькой пузырьке."
"Rub this potion into your hair and head and your memory will stop working so well.": "Вотрите это зелье в волосы и голову, и ваша память станет работать хуже."
"An old, forgotten memory that has been written down so as not to forget it again. This is used to remind certain people about certain events.": "Старая, забытая память, записанная, чтобы не забыть её снова. Используется, чтобы напомнить определённым людям о некоторых событиях."
"An unpleasant substance that activates every area of your tongue at once.": "Неприятное вещество, которое одновременно активирует всю поверхность вашего языка."
"Can be studied to earn Mentalism XP. (Requires VIP.)": "Можно изучать для получения XP в Ментализме. (Требуется VIP.)"
"Teaches you a mentalism technique.": "Обучает технике ментализма."
"A vial of the strange substance known as mercury or quicksilver. It is used in hatmaking, gadget creation, and alchemy. Under no circumstances should it be drunk.": "Флакон с странным веществом, известным как ртуть или живое серебро. Используется в изготовлении шляп, создании механизмов и алхимии. Ни в коем случае не следует пить её."
"A piece of metal covered in a grid of holes. It is used by flower arrangers.": "Кусок металла, покрытый сеткой из отверстий. Используется флористами."
"The grasping device of a deceased construct. These claws can be found in the weirdest places because they're designed to keep holding on even in death. Some people believe they're lucky charms, but otherwise they serve no obvious purpose.": "Хватательное устройство погибшего конструкта. Эти когти можно найти в самых странных местах, потому что они созданы, чтобы не отпускать даже после смерти. Некоторые считают их талисманами, но в остальном они не имеют очевидного назначения."
"A customized hammer used by armor and jewelry crafters.": "Индивидуальный молоток, используемый кузнецами брони и ювелирами."
"A very basic mild cheddar cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень простой мягкий чеддер.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"This pleasant beverage helps you digest cheese.": "Этот приятный напиток помогает переваривать сыр."
"Dye used to color a piece of clothing or armor military blue.": "Краситель, используемый для окрашивания одежды или брони в военно-синий цвет."
"The favored close-quarters weapon of orcish archers.": "Любимое оружие ближнего боя орочьих лучников."
"A pile of powdered Milk Cap mushrooms.": "Куча порошка из грибов Молочника."
"A wool hat made by a sentient sheep. It's very comfy!": "Шерстяная шляпа, сделанная разумной овцой. Очень удобная!"
"A big chunk of glass infused with intellect-improving magic. It could make animals smarter permanently. Or you could use it on yourself, but the effects would only last a while.": "Большой кусок стекла, наполненный магией, улучшающей интеллект. Он может навсегда сделать животных умнее. Или вы можете использовать его на себе, но эффект продлится лишь некоторое время."
"Made of dried root, this myconian-designed ring is not attractive, but it is comfortable.": "Сделанное из высушенного корня, это кольцо, созданное миконианцами, не привлекательно, но удобно."
"An innovatively compact hammered dulcimer.": "Инновационно компактный молоточковый дульцимер."
"Though it resembles a tiny pearl, it is made of almost-pure misery and loathing. It's too emotional to be used in crafting.": "Хотя она похожа на крошечную жемчужину, она сделана из почти чистого страдания и отвращения. Слишком эмоциональна, чтобы использовать её в ремесле."
"A sack filled with strange substances that stay warm for a long time. (To use, give to a mother pet bee or wasp that is still guarding her larva in the 'gestation' stage. It will speed up incubation by 12 hours.)": "Мешок, наполненный странными веществами, которые долго сохраняют тепло. (Чтобы использовать, отдайте матери-пчеле или осе, которая всё ещё охраняет своё потомство на стадии «вынашивания». Это ускорит инкубацию на 12 часов.)"
"Though it resembles a tiny pearl, it is made of almost-pure Fear mixed with some Revulsion. It's too emotional to be used in crafting.": "Хотя она похожа на крошечную жемчужину, она состоит из почти чистого Страха, смешанного с некоторой Отвращением. Слишком эмоциональна, чтобы использоваться в ремесле."
"Though it resembles a tiny pearl, it is made of almost-pure Greed and jealousy. It's too emotional to be used in crafting.": "Хотя она похожа на крошечную жемчужину, она состоит почти из чистой Жадности и зависти. Слишком эмоциональна, чтобы использовать её в ремесле."
"Though it resembles a tiny pearl, it is made of almost-pure Hate. It's too emotional to be used in crafting.": "Хотя она похожа на крошечную жемчужину, она сделана из почти чистой Ненависти. Слишком эмоциональна, чтобы использовать её в ремесле."
"Though it resembles a tiny pearl, it is made of almost-pure Lust. It's too emotional to be used in crafting.": "Хотя она похожа на крошечную жемчужину, она сделана из почти чистого Желания. Слишком эмоциональна, чтобы использовать её в ремесле."
"The bleeding end clotted up fast, so this severed goblin thumb is a little less disgusting than it could be.": "Кровоточащий конец быстро засох, поэтому этот отрубленный большой палец гоблина выглядит немного менее отвратительно, чем мог бы."
"Too small to be filleted, but still useful as bait.": "Слишком маленький, чтобы его разделывать, но всё ещё полезен как приманка."
"Dispels most curses, diseases, disfigurements, addictions, and botherments.": "Снимает большинство проклятий, болезней, уродств, зависимостей и неприятностей."
"This potion increases the size of your stomach by a very small amount. (This is usually not something to get too excited about.)": "Это зелье увеличивает размер вашего желудка на очень небольшое количество. (Обычно это не повод для особого восторга.)"
"A huge weighted hammer that can only be wielded by mighty warriors. It is said that a minotaur may not criticize their elders until they can wield this hammer -- a task that requires years of training even for that gigantic race.": "Огромный утяжелённый молот, которым могут владеть только могучие воины. Говорят, что минотавр не может критиковать старших, пока не сможет овладеть этим молотом — задачей, требующей многих лет тренировок даже для этой гигантской расы."
"A fancy key that can open any Minotaur Vault. For security reasons the key is destroyed upon use.": "Красивый ключ, который может открыть любое хранилище Минотавра. В целях безопасности ключ уничтожается после использования."
"A huge weighted warhammer that can only be wielded by mighty warriors. It is said that a minotaur may not criticize their elders until they can wield this hammer -- a task that requires years of training even for that gigantic race.": "Огромный тяжёлый боевой молот, которым могут владеть только могучие воины. Говорят, что минотавр не может критиковать старших, пока не научится владеть этим молотом — задача, требующая многих лет тренировок даже для этого гигантского народа."
"A mint leaf.": "Лист мяты."
"A minty, sugary treat.": "Мятное, сладкое угощение."
"Fresh, cold, and delicious. Eat it before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Свежий, холодный и вкусный. Съешь его, пока не растаял! (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A sweet and minty disk of hard candy on a handy stick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкая и мятная твердая конфета на удобной палочке. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Exotic candy that combines unlikely flavors. Candy connoisseurs swear by it. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Экзотическая конфета, сочетающая неожиданные вкусы. Знатоки конфет клянутся ей. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This blue-tinted armor is worn by Gazluk City's support soldiers, known as \"Misery Troopers\". Their armor is strong while also providing survival protection in harsh weather.": "Эта броня с синим оттенком носится поддерживающими солдатами города Газлук, известными как «Солдаты Скорби». Их броня прочна и одновременно обеспечивает защиту для выживания в суровых погодных условиях."
"Used by the strongest of the legendary orcish Misery Troopers.": "Используется сильнейшими из легендарных орочьих Стражей Страданий."
"An extremely large, extremely docile frog. It's alive for now, but you should deliver it soon.": "Очень большая, очень спокойная лягушка. Пока жива, но тебе стоит доставить её как можно скорее."
"It's the lens Truxartis asked you to find. It should repair the \"blood well\".": "Это линза, которую Труксартис просил тебя найти. Она должна починить «кровавый источник»."
"A gaudy talisman of a cat with very long whiskers.": "Безвкусный талисман в виде кота с очень длинными усами."
"Dye used to color a piece of clothing or armor misty rose.": "Краска, используемая для окрашивания одежды или брони в туманный розовый цвет."
"A very old book. It looks to be a hand-scribed copy of a book called the Mnemonix Index for the Superficially Undead.": "Очень старая книга. Похоже, это рукописная копия книги под названием Мнемонический индекс для Поверхностно нежити."
"A weird container made of crystal. Inside is the essence of knowledge in liquid form. Used by the most advanced crafters.": "Странный контейнер из кристалла. Внутри — эссенция знаний в жидкой форме. Используется самыми продвинутыми ремесленниками."
"Congratulations on winning the Moat Circuit!": "Поздравляем с победой в Кольце Рва!"
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 20 free raffle tickets for 1 or 2 items (or item stacks) and/or a small cash prize.": "Сложное устройство, которое может выдавать бесплатные лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 20 бесплатных лотерейных билетов для 1 или 2 предметов (или стаков предметов) и/или небольшой денежный приз."
"A thin fluid used to create augmentation oils (for level 40 effects).": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 40 уровня)."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 2 ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется способностью Отравленное лезвие 2."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade ability.": "Небольшой острый клинок, покрытый токсичной слизью, особенно смертельной для волков и ликантропов. Этот предмет используется в умении Клинок с волчьей отравой."
"A white-mold cheese with a pasty and nutty flavor.\n\nCheese Type: White": "Сыр с белой плесенью с пастообразным и ореховым вкусом.\\n\\nТип сыра: белый"
"A topical balm beloved by ranalon, who apply it to their skin continuously. Its effects are much weaker when applied to non-ranalon, but it is, at least, safe to use.": "Местный бальзам, любимый раналонами, которые постоянно наносят его на кожу. Его действие значительно слабее при применении на других существах, но, по крайней мере, он безопасен в использовании."
"A thick stew that fills you up.": "Густое тушёное блюдо, которое насытит вас."
"Moku's delicious house sushi.": "Вкусное фирменное суши Моку."
"Sweet sugarcane molasses, useful for cooking or making alcohol.": "Сладкий тростниковый меласса, полезный для приготовления пищи или изготовления алкоголя."
"These are so slimy, wearing them is like sticking dozens of leeches to your hands.": "Они такие склизкие, что носить их — всё равно что прикрепить к рукам десятки пиявок."
"Smelly old helmet.": "Вонючий старый шлем."
"These have been in the muck for ages...": "Они пролежали в грязи веками..."
"Well, you wouldn't want to eat off this shield, that's for sure. But why would you eat off a shield? Just strap it on your arm, weirdo.": "Ну, с этого щита точно не захочется есть. Но зачем вообще есть с щита? Просто прицепи его к руке, странный."
"Oh... yuck.": "Ох... фу."
"Smelly old shoes.": "Вонючие старые ботинки."
"This staff has seen so much. Thankfully it can't talk.": "Этот посох многое повидал. К счастью, он не умеет говорить."
"Well, it's still got a pointy end and a handle. It should work fine.": "Ну, у него всё ещё есть острый конец и рукоять. Должен работать нормально."
"It's too waterlogged and slimy to be salvaged.": "Он слишком пропитался водой и скользкий, чтобы его можно было спасти."
"It's covered in mold. Perhaps the cork failed?": "Оно покрыто плесенью. Возможно, пробка не держала?"
"This once-high-quality Trancelute was left out in the elements. No amount of tuning will make it very effective.": "Этот когда-то высококачественный Транслют был оставлен на открытом воздухе. Никакая настройка не сделает его по-настоящему эффективным."
"Made of fae mollusc shell, a notoriously difficult material to obtain.": "Сделано из раковины фейского моллюска, известного как крайне труднодоступный материал."
"A small lump of metal said to form in areas of high latent magic. It can be combined with other ores for advanced smithing, and alchemists have their own strange uses for it.": "Небольшой кусок металла, который, как говорят, образуется в местах с высокой скрытой магией. Его можно комбинировать с другими рудами для продвинутого кузнечного дела, а алхимики используют его в своих странных целях."
"This magic garnet can float around your head and emit light. It also emanates hard-won wisdom, and can whisper warnings and advice when you're about to do something stupid.": "Этот магический гранат может парить вокруг вашей головы и излучать свет. Он также источает добытую с трудом мудрость и может шептать предупреждения и советы, когда вы собираетесь сделать что-то глупое."
"This ticket entitles the bearer to a free game of Monsters and Mantids at any table in the Red Wing Casino.": "Этот билет даёт право владельцу на бесплатную игру в Монстров и Мантов за любым столом в казино Красное Крыло."
"A mildly sweet hard cheese.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Слегка сладковатый твердый сыр.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A heavenly snack that is squash-flavored, but in a good way.": "Небесная закуска с вкусом тыквы, но в хорошем смысле."
"Slightly magical spelt grown at night. Most useful when ground into flour.": "Слегка магический спельт, выращенный ночью. Наиболее полезен в виде муки."
"Moonspelt ground into flour for cooking.": "Лунный спельт, перемолотый в муку для приготовления пищи."
"A handful of seeds to grow some moonspelt grass. This only grows at night.": "Горсть семян для выращивания луноспельтовой травы. Растёт только ночью."
"Milky white, this gem is useful in magic that relates to 'new beginnings.'\n\nAssociated Primary Skill: Lycanthropy": "Молочно-белый, этот самоцвет полезен в магии, связанной с «новыми начинаниями».\\n\\nСвязанный основной навык: Ликанропия"
"This is an orange variety of beryl. Used in magic, it is associated with tailoring. It is the favored color of goblins.": "Это оранжевый сорт берилла. Используется в магии, связан с портняжным делом. Это любимый цвет гоблинов."
"A large, generally-inedible mushroom.": "Большой, в основном несъедобный гриб."
"It's a sealed pouch with something inside.": "Это запечатанный мешочек с чем-то внутри."
"It's a sealed pouch with a mineral inside.": "Это запечатанный мешочек с минералом внутри."
"The evil necromancer/mentalist wore these comfy booties whenever he destroyed towns or villages.": "Злой некромант/менталист надевал эти удобные ботиночки каждый раз, когда разрушал города или деревни."
"A drop of magical darkness, trapped in a vial.": "Капля магической тьмы, заключённая в флакон."
"Supposedly a favorite of mountain-dwelling orcs. Fresh mutton topped with cheese and peppers.": "Предположительно любимое блюдо орков, живущих в горах. Свежая баранина с сыром и перцем."
"A special token from Moxie to barter for a special advanced item.": "Особый жетон от Мокси для обмена на специальный продвинутый предмет."
"A lotion created by Moxie of the Crafting Caravan in order to make long distance flight less stressful when applied directly to the wings. Unfortunately, this formula only works on giant bats. Also, since giant bat wings are so large, the bottle contains fewer doses than the other butters, but it's more effective, too.\nWARNING: Leaving giant bat form will cancel the effects of this lotion!": "Лосьон, созданный Мокси из Ремесленного каравана, чтобы сделать дальние полёты менее утомительными при нанесении прямо на крылья. К сожалению, эта формула действует только на гигантских летучих мышей. Кроме того, поскольку крылья гигантской летучей мыши очень большие, в бутылочке меньше доз, чем в других маслах, но она действует эффективнее.\\nВНИМАНИЕ: Выход из формы гигантской летучей мыши отменит действие этого лосьона!"
"A lotion created by Moxie of the Crafting Caravan in order to make long distance flight less stressful when applied directly to the wings. Unfortunately, this formula only works on druidic bird forms.\nWARNING: Leaving bird form will cancel the effects of this lotion!": "Лосьон, созданный Мокси из Ремесленного каравана, чтобы сделать дальние полёты менее утомительными при нанесении непосредственно на крылья. К сожалению, эта формула действует только на друидические птичьи формы.\\nВНИМАНИЕ: Выход из птичьей формы отменит действие этого лосьона!"
"A lotion created by Moxie of the Crafting Caravan in order to make long distance fluttering less stressful when applied directly to the wings. Unfortunately, this formula only works on Fae.": "Лосьон, созданный Мокси из Ремесленного каравана, чтобы сделать дальние перелёты менее утомительными при нанесении прямо на крылья. К сожалению, эта формула работает только на фей."
"A pulled-curd cheese with a rubbery but sweet taste.\n\nCheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр с тянущейся структурой, резиновым, но сладким вкусом.\n\nТип сыра: Тянущийся (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Mu asked you to deliver this to a Myconian named Poe.": "Му попросил вас доставить это миконианцу по имени По."
"A big bunch of semisweet mulberries.": "Большая гроздь полусладких шелковиц."
"The sweet berries pair nicely with crunchy lettuce and zesty dressing.": "Сладкие ягоды прекрасно сочетаются с хрустящим салатом и пикантной заправкой."
"A surprisingly fruity dark wine.": "Удивительно фруктовое тёмное вино."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it sparkles for a few seconds, and makes you feel oddly patriotic.": "Тонкая трубочка, в которой, как вам кажется, заключена магия. Когда вы ударяете её о твёрдую поверхность, она искрится несколько секунд и вызывает странное чувство патриотизма."
"It has a splash-lip as well as a drinking lip, as if you'd be so foolish as to drink potions out of the same beaker you splash acids from!": "Он имеет край для разбрызгивания, а также край для питья, словно ты настолько глуп, чтобы пить зелья из того же стакана, из которого разбрызгиваешь кислоты!"
"A versatile knife for skinning, butchering, oyster-opening, or skull extraction. (Keep it in your inventory and you'll be given the option to skin, butcher, shuck, and/or extract the skull of some enemies.)": "Универсальный нож для снятия шкуры, разделки, открытия устриц или извлечения черепа. (Держите его в инвентаре, и вам будет доступна опция снимать шкуру, разделывать, открывать устриц и/или извлекать череп у некоторых врагов.)"
"A piece of enchanted cloth from a mummy.": "Кусок зачарованной ткани от мумии."
"A flavorful semi-soft cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ароматный полумягкий сыр.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A handful of fresh peppercorns.": "Горсть свежих перчинок."
"A blue cheese with a vile smell and a spicy, off-putting flavor that takes practice to enjoy.\n\nCheese Type: Blue": "Голубой сыр с отвратительным запахом и острым, отталкивающим вкусом, который требует навыка, чтобы его оценить.\n\nТип сыра: голубой"
"A strange weapon made by trolls in a distant realm.": "Странное оружие, созданное троллями в далёком мире."
"A warm bowl of soup.": "Тёплая миска супа."
"When placed in a damp cave, this box can be used to grow a crop of mushrooms.": "При размещении во влажной пещере эта коробка может использоваться для выращивания урожая грибов."
"Can be studied to earn Mushroom Farming XP. (Requires VIP.)": "Можно изучать для получения опыта в грибоводстве. (Требуется VIP.)"
"Fertilizer for a mushroom box farm.": "Удобрение для грибной фермы в коробке."
"Teaches you recipes for turning mushroom powders into suspensions, making them useful for alchemy.": "Обучает рецептам превращения грибных порошков в суспензии, делая их полезными для алхимии."
"An old key coated in purple fungus.": "Старый ключ, покрытый пурпурным грибком."
"The terrifying orcish cult known as the Mutterers wear these garments.": "Ужасающий орочий культ, известный как Бормочущие, носит эти одежды."
"The terrifying orcish cult known as the Mutterers wear these garments. This piece is fitted with a Necromancy Gem.": "Ужасающий орочий культ, известный как Шептуны, носит эти одежды. Эта вещь оснащена самоцветом Некромантии."
"The freakish orcish spellcasters known as Mutterers use these ornate blades to enhance their spells.": "Странные орочьи заклинатели, известные как Бормочущие, используют эти изящные клинки для усиления своих заклинаний."
"The creepy orcish mages known as Mutterers sometimes use weapons like this, designed to bleed the enemy.": "Жуткие орочьи маги, известные как Бормочущие, иногда используют оружие подобное этому, предназначенное для кровотечения врага."
"Raw sheep meat.": "Сырое мясо овцы."
"A hearty breakfast dish.": "Сытное блюдо для завтрака."
"A potentially edible mushroom.": "Потенциально съедобный гриб."
"A pile of flaked Mycena mushroom bits.": "Куча хлопьев из кусочков гриба Мицена."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 10% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная коллекция свежих цветов, которая символизирует силу земли и почвы, но при этом не кажется грязной и неприятной.\\n\\nДарует 10% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 17% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Искусно собранный букет свежих цветов, который символизирует силу земли и почвы, при этом не вызывая ощущения грязи и слякоти.\\n\\nДарует 17% шанс найти дополнительные грибы при собирательстве. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 25% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная коллекция свежих цветов, которая символизирует силу земли и почвы, но при этом не кажется грязной и неприятной.\\n\\nДарует 25% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 33% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная коллекция свежих цветов, которая символизирует силу земли и почвы, при этом не кажется грязной и неприятной.\\n\\nДарует 33% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 40% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная коллекция свежих цветов, которая символизирует силу земли и почвы, но при этом не кажется грязной и неприятной.\\n\\nДарует 40% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An artful collection of fresh flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 50% chance of foraging extra mushrooms. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Изысканная коллекция свежих цветов, которая символизирует силу земли и почвы, при этом не кажется грязной и неприятной.\\n\\nДарует 50% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 10% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, но при этом не выглядит грязной и неприятной.\\n\\nДарует 10% шанс собрать дополнительные грибы. Длительность: 4 часа.\\n\\nПосле установки композиция отображается 5 минут и может использоваться любым количеством игроков."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 17% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, при этом не вызывая ощущения грязи и неприятности.\\n\\nДарует 17% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 25% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, но при этом не выглядит грязной и неприятной.\\n\\nДарует 25% шанс найти дополнительные грибы. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 33% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 5.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, при этом не выглядя грязной и неприятной.\\n\\nДарует 33% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 5."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 40% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, но при этом не выглядит грязной и неприятной.\\n\\nДарует 40% шанс найти дополнительные грибы. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 15."
"A publicly-displayable collection of flowers that suggests the power of earth and soil, without actually being gross and dirty.\n\nGrants 50% chance of foraging extra mushrooms. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 25.": "Публично демонстрируемая коллекция цветов, которая намекает на силу земли и почвы, при этом не вызывая ощущения грязи и неприятности.\\n\\nДарует 50% шанс найти дополнительные грибы при сборе. Длительность: 4 часа.\\n\\nПосле установки экспозиция длится 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 25."
"Teaches you a mycology combat technique and recipe.": "Обучает боевой технике микологии и рецепту."
"A thick greenish goo. It tastes delicious! Useful in brewing and cooking, and very occasionally in alchemy.": "Густая зеленоватая слизь. На вкус восхитительно! Полезна в пивоварении и кулинарии, а очень редко и в алхимии."
"Teaches you the Myconian language. (This is a testing aid and will not be available for long; please use this to test the Myconian dungeon, which can be accessed via random brown mushrooms in Serbule.)": "Обучает вас языку микониан. (Это вспомогательный инструмент для тестирования и не будет доступен долго; пожалуйста, используйте его для проверки подземелья микониан, к которому можно попасть через случайные коричневые грибы в Сербуле.)"
"This... this is not a lager. This is a bottle of mushroom bits.": "Это... это не лагер. Это бутылка с кусочками грибов."
"A cup of heated mushroom blend with a pinch of spices. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Чашка подогретой грибной смеси с щепоткой специй. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Very old bones, recently unearthed.": "Очень старые кости, недавно выкопанные."
"Dried meat from unusual creatures. Salted beyond reckoning. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вяленое мясо необычных существ. Засолено до невозможности. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Well, there's no name inscribed on them or anything. But you could give them a name if you wanted! The symbol of some god is etched on the inside.": "Ну, на них нет никакой надписи или имени. Но вы можете дать им имя, если захотите! На внутренней стороне выгравирован символ какого-то бога."
"This antique shield once had an insignia, but it's been dented and scratched beyond recognition.": "Этот древний щит когда-то имел герб, но теперь он помят и поцарапан до неузнаваемости."
"A warm piece of magical crystal.": "Тёплый кусочек магического кристалла."
"Can be studied to earn Nature Appreciation XP. (Requires VIP.)": "Можно изучать для получения опыта в Природолюбии. (Требуется VIP.)"
"Crafted by dwarven blacksmith (and notorious druid-hater) Goh Rastuk. It was going to be imbued with anti-nature magic, but Goh didn't get around to it. It's still a nice sword, though.": "Создан гномьим кузнецом (и печально известным ненавистником друидов) Го Растуком. Планировалось наполнить его антиприродной магией, но Го так и не успел. Тем не менее, это всё ещё хороший меч."
"Designed to be worn in an elf's pierced navel, this small gemmed ring repels dust and dirt.": "Предназначенное для ношения в проколотом пупке эльфа, это маленькое кольцо с драгоценным камнем отталкивает пыль и грязь."
"Designed to be worn in an elf's pierced navel, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначенное для ношения в проколотом пупке эльфа, это кольцо помогает защититься от болезни, возникающей при слишком близком контакте со светящимися жёлтыми кристаллами."
"Designed to be worn in an elf's pierced navel, this small gemmed ring enhances the elf's biorhythms slightly.": "Предназначенное для ношения в проколотом пупке эльфа, это маленькое кольцо с драгоценными камнями слегка улучшает биоритмы эльфа."
"Designed to be worn in an elf's pierced navel, this small gemmed ring enhances the elf's natural accuracy with a bow.": "Предназначенное для ношения в проколотом пупке эльфа, это маленькое кольцо с драгоценным камнем повышает естественную меткость эльфа при стрельбе из лука."
"Common among elven hunters, this bauble lets you skin corpses from further away, telepathically extending your tool reach and letting you avoid smelling the corpse up close.": "Распространённое среди эльфийских охотников украшение, позволяющее снимать шкуры с трупов с большего расстояния, телепатически увеличивая досягаемость инструмента и позволяя избегать неприятного запаха трупа вблизи."
"Dye used to color a piece of clothing or armor navy.": "Краска, используемая для окрашивания одежды или доспехов в темно-синий цвет."
"A strange magical cube. It can be used to give necklaces a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить ожерельям бонусную магическую способность. Посетите торговца снаряжением (или игрока-усилителя), чтобы установить его."
"A lead cup with a hefty weight and some cheap jewels on it. As you hold it, it grows unnaturally warm to the touch.": "Свинцовая чашка с внушительным весом и дешевыми драгоценными камнями. Когда вы держите её, она становится необычно тёплой на ощупь."
"Made of burned bones, this staff is great for necromancers or fire mages. Less great for staff fighting, because burned bones aren't exactly quality building material. It's topped with a necromancy gem.": "Сделанный из обожжённых костей, этот посох отлично подходит для некромантов или огненных магов. Меньше подходит для боя посохом, потому что обожжённые кости не являются качественным материалом для изготовления. На вершине посоха находится камень некромантии."
"Teaches you a necromancy spell.": "Обучает вас заклинанию некромантии."
"Powdered bone blended with wax and milk into a semi-solid sludge.": "Порошок из костей, смешанный с воском и молоком в полутвердую кашицу."
"Powdered bone blended with wrappings into a semi-solid sludge.": "Порошок из костей, смешанный с бинтами в полутвердую массу."
"Powdered bone prepared via a secret necromantic ritual. This is used by necromancers to summon undead skeletons.": "Порошок из костей, приготовленный по секретному некромантскому ритуалу. Используется некромантами для призыва неживых скелетов."
"A figurine of a grinning skull. But, of course, all skulls grin. A necromancy gem is in the eye socket.": "Фигурка ухмыляющегося черепа. Но, конечно, все черепа ухмыляются. В глазнице вставлен некромантский самоцвет."
"A plain stick topped with a necromancy gem. Also works for Fire Magic and Staff Fighting.": "Простой посох с камнем некромантии на вершине. Также подходит для Огненной магии и боя посохом."
"Can be studied to earn Necromancy XP. (Requires VIP.)": "Можно изучать для получения опыта в Некромантии. (Требуется VIP.)"
"Teaches you a necromancy technique.": "Обучает вас технике некромантии."
"A wretched odor of lingering dissatistfaction and malaise.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Отвратительный запах затяжного недовольства и недомогания.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Obtained from a human named Nelson Ballard. It's not in the best condition, but it has been powerfully enchanted.": "Получен от человека по имени Нельсон Баллард. Он не в лучшем состоянии, но сильно зачарован."
"<i>[We had a whole Baking skill planned but it turned out to be tedious and I hated it, and now it's unclear if there'll be any kind of skill for it. Maybe they'll just be regular cooking recipes but under a sub-skill or something like that. In the mean time here's a sample bread so the poor baker has something to sell.]</i>": "<i>[У нас была целая задумка с навыком Выпечки, но оказалось, что это утомительно, и мне это не понравилось, и теперь неясно, будет ли вообще какой-то навык для этого. Возможно, это будут обычные рецепты кулинарии, но в рамках поднавыка или что-то в этом роде. А пока вот образец хлеба, чтобы бедный пекарь имел что продавать.]</i>"
"A liquidy cheese with small curds.\n\nCheese Type: Fresh (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жидковатый сыр с мелкими сгустками.\n\nТип сыра: Свежий (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"The unusual odor distracts your senses into not noticing the tar-like potion's foul taste.": "Необычный запах отвлекает ваши чувства, не давая заметить противный вкус смолоподобного зелья."
"It's a hollow crystal with some things inside that rattle around.": "Это полый кристалл с некоторыми предметами внутри, которые болтаются и звенят."
"It's a hollow crystal with some things inside. Sarina the fairy fixed it for you.": "Это полый кристалл с некоторыми вещами внутри. Фея Сарина починила его для вас."
"Adorned with little glyphs of brains, but the brains have been crossed out.": "Украшен маленькими глифами мозгов, но мозги зачеркнуты."
"The bloody skin of an impressive animal.": "Кровавая шкура впечатляющего животного."
"Carefully crafted of dozens of little jointed sections, this harness can hold a lot of weight. The wood can also act as a focal point for druidic spiders.": "Тщательно изготовленная из десятков маленьких сочленённых частей, эта сбруя может выдержать большой вес. Дерево также может служить фокусом для друидических пауков."
"This smells like a warm drink on a cold, cold morning.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот запах напоминает тёплый напиток в холодное, холодное утро.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"The lovely aroma of bacon reminds you of how tasty bacon is.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Прекрасный аромат бекона напоминает вам, насколько вкусен бекон.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"An eye-watering odor that urges you to go get physically violent.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Слёзы наворачивающийся запах, побуждающий к физическому насилию.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x7.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 7 раз."
"Padded chain footwear made by a competent hand.": "Стёганая кольчужная обувь, сделанная умелой рукой."
"A comfortable chain overshirt.": "Удобная кольчужная рубашка."
"Appropriate padding and reinforcement make this coif a pleasure to wear into battle.": "Подходящая набивка и усиление делают этот капюшон приятным для ношения в бою."
"Comfortable padded chain gloves. There's some mobility issues, but they're not too bad.": "Удобные кольчужные перчатки с набивкой. Некоторая ограниченность движений есть, но не слишком сильная."
"Padded chain leggings with a nominal attention to detail.": "Стеганые кольчужные поножи с номинальным вниманием к деталям."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +18 for 30 minutes.": "Комфортный стул. Отдых в нём повышает восстановление брони на +18 на 30 минут."
"A nice cowl.": "Хороший капюшон."
"Not bad. You wouldn't even be embarrassed to be seen in these nice pants. Unless you were seen by someone you wanted to impress.": "Неплохо. В этих хороших штанах вам не будет стыдно показаться. Если только вас не увидит кто-то, кого вы хотите впечатлить."
"Not exactly formalwear, but not humiliating either.": "Не совсем официальная одежда, но и не позорная."
"It's pretty good for hitting things.": "Она довольно хороша для того, чтобы бить по вещам."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. Then Fire Magic runes were carefully sculpted into the wood.": "Кто-то потратил много времени на балансировку и тестирование этого посоха, чтобы обеспечить идеальное распределение веса. Затем руны Огненной магии были аккуратно вырезаны на дереве."
"Moderately less embarrassing!": "Умеренно менее неловко!"
"A better-made helmet for a better-made bovine.": "Лучше сделанный шлем для лучше сделанного быка."
"Comfortable shoes that make a violent cow feel free as the wind.": "Удобные туфли, которые заставляют буйную корову чувствовать себя свободной, как ветер."
"Nice deer shoes!": "Красивые оленьи ботинки!"
"An almost-smoky smell with an earthy undertone, suggesting a forest fire.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Почти дымный запах с земляным оттенком, напоминающий лесной пожар.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A bouquet of aromas that bring to mind sprinting in the endless desert.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Букет ароматов, навевающих мысли о беге по бескрайней пустыне.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Someone with competence put together these nimble leather boots. Only a small amount of protection is lost in exchange for nimble dodging ability.": "Кто-то с умением сшил эти ловкие кожаные сапоги. Потеря небольшой защиты компенсируется способностью быстро уклоняться."
"These leather pants are so soft. They're nice for dodging arrows and the like. ": "Эти кожаные штаны очень мягкие. Они отлично подходят для уклонения от стрел и подобного."
"You feel nice wearing a leather shirt like this. Nice enough to be able to dodge arrows.": "Вам приятно носить такую кожаную рубашку. Достаточно хорошую, чтобы увернуться от стрел."
"The height of generic floral scents. Pleasant but forgettable.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Вершина обычных цветочных ароматов. Приятный, но забываемый.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A belt covered in small knives that impale the wearer, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс, покрытый маленькими ножами, которые пронзают носителя, причиняя ему сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут найти, что эта боль усиливает их чувство выживания."
"Nice horseshoes for nice horses.": "Красивые подковы для красивых лошадей."
"Boots with a fair amount of reinforcement in the heel, and padding to prevent blisters. Still not elegant, but fairly effective in combat.": "Сапоги с достаточным усилением в области пятки и прокладками для предотвращения мозолей. Всё ещё не изящные, но довольно эффективные в бою."
"Made of reasonable materials, these gloves are nice. Just nice.": "Сделаны из достойных материалов, эти перчатки просто хорошие. Просто хорошие."
"A comfy helmet that is almost (but not quite) attractive, too!": "Удобный шлем, который почти (но не совсем) привлекателен!"
"Someone with a basic sense of style has fashioned these leather pants. Unfortunately the protective reinforcement ruins the look, but it could be worse.": "Кто-то с базовым чувством стиля сшил эти кожаные штаны. К сожалению, защитное усиление портит внешний вид, но могло быть и хуже."
"Some nice leather. Just... nice.": "Немного хорошей кожи. Просто... хорошей."
"This is a pro-quality piece of equipment! The stitching isn't even visible from the outside. Fancy.": "Это профессиональное снаряжение! Швы даже не видны снаружи. Стильно."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x7.": "Одноразовый табурет для медитации. Используйте его рядом с Колонной Медитации, чтобы увеличить длительность эффектов медитации в 7 раз."
"Someone took a lot of time balancing and testing this staff to make sure it had the perfect weight distribution. This will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.": "Кто-то потратил много времени на балансировку и тестирование этого посоха, чтобы обеспечить идеальное распределение веса. Он отлично подходит для боя посохом, но не содержит рун, необходимых для Огненной магии."
"A beautiful shell with a mellow sound.": "Красивый ракушка с мягким звуком."
"An understated saddlebag that is nevertheless quite enchantmented.": "Сдержанная сумка, которая тем не менее довольно зачарована."
"A nice belt with lots of little pockets.": "Хороший пояс с множеством маленьких карманов."
"All three common symbols of Arisetsu are inscribed in Elvish into this nice staff.": "Все три распространённых символа Арисецу выгравированы на этом хорошем посохе на эльфийском."
"Tack for a horse.": "Снаряжение для лошади."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is pretty nice.": "Традиционная шапка, которую носят люди во время зимнего празднования Ри-Шина, бога растений и деревьев. Эта версия довольно красивая."
"Nice saddle.": "Хорошее седло."
"A saddlebag that can hold a nice amount of stuff.": "Седельная сумка, которая может вместить приличное количество вещей."
"A tantalizing reminder of the beach.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Манящее напоминание о пляже.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Made of snail shells and sinew. Only somewhat stinky.": "Сделан из раковин улиток и жил. Только слегка вонючий."
"A box for storing up to 16 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 16 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получающий доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют игроку получать доступ к одним и тем же предметам.)"
"Rendered fat that's good for most of your everyday utility-fat needs.": "Переработанный жир, подходящий для большинства ваших повседневных нужд в утилитарном жире."
"Braided string that will burn clean. For use in a fancy candle.": "Плетёная нить, которая горит чисто. Для использования в изысканной свече."
"Cozy and warm, with lots of fur trim.": "Тёплый и уютный, с большим количеством меховой отделки."
"Elegantly whittled and reinforced wooden shoes. They can easily withstand the weight of an angry heiffer.": "Изысканно вырезанные и усиленные деревянные башмаки. Они легко выдержат вес разъярённой телки."
"Elegantly whittled and reinforced wooden shoes. They can easily withstand the weight of an angry buck.": "Изысканно вырезанные и укреплённые деревянные туфли. Они легко выдержат вес разъярённого самца оленя."
"A barrage of potent smells one could conceivably find in a forest. It's somehow a nice scent.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Шквал насыщенных запахов, которые можно встретить в лесу. Как ни странно, это приятный аромат.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Dye used to color a piece of clothing or armor night gray.": "Краска, используемая для окрашивания одежды или брони в ночной серый цвет."
"This lump of flesh still pulses to an unknowable rhythm.": "Этот комок плоти всё ещё пульсирует в непостижимом ритме."
"Made from the skin of abominations, these pants seem to constantly fondle your legs as you wear them. It's really quite disturbing, but the armor is tough...": "Сшиты из кожи извращенцев, эти штаны, кажется, постоянно ласкают твои ноги, когда ты их носишь. Это действительно довольно тревожно, но броня крепкая..."
"A box. It can't be opened, but you hear pitiable pleading coming from inside.": "Коробка. Её нельзя открыть, но изнутри слышны жалобные мольбы."
"A box. It can't be opened, but you hear screaming coming from inside.": "Коробка. Её нельзя открыть, но изнутри слышны крики."
"A box. It can't be opened, but you hear whimpering and crying coming from inside.": "Коробка. Её нельзя открыть, но изнутри слышны всхлипы и плач."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 7' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 7», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 7' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 7», чтобы бросить эту бомбу.)"
"A clever combination of dwarven and rakshasa jewelrysmithing, these were used by chainmail-smiths to speed up their work.": "Умелое сочетание кузнечного дела гномов и раксашей, эти кольца использовались кузнецами кольчуг для ускорения работы."
"This style of plate boot is named after the elven knight Niph. As the story goes, Niph fought off an army of undead alone, somehow running \"faster than death itself.\"": "Этот стиль латных сапог назван в честь эльфийского рыцаря Нифа. По преданию, Ниф сражался в одиночку с армией нежити, каким-то образом бегая «быстрее самой смерти»."
"Dried meat and fish in a secret blend of spices. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вяленое мясо и рыба в секретной смеси специй. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному каждого и получить преимущества обоих.)"
"Stands for \"new model\"": "Обозначает «новая модель»"
"Wielded by the mad assassin Nopec who wished to bring about Endless Nights in the name of Fenna, goddess of Dusk and Innocence. Fenna was repulsed by this idea, but that didn't stop Nopec's spree of murder.": "В руках безумного убийцы Нопека, который желал принести Бесконечные Ночи во имя Фенны, богини Сумерек и Невинности. Фенна была возмущена этой идеей, но это не остановило кровавую жатву Нопека."
"Designed to be worn in a cow's nose, this brass ring aggravates bovine sensibilities, causing violence.": "Созданное для ношения в носу коровы, это латунное кольцо раздражает чувствительность рогатого скота, вызывая агрессию."
"Designed for a ratkin's nose, but perhaps also wearable by a cow or pig.": "Создано для носа крысолюда, но, возможно, также подходит для коровы или свиньи."
"Designed to be worn in a cow or pig's nose, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначенное для ношения в носу у коровы или свиньи, это кольцо помогает защититься от болезни, возникающей при слишком близком контакте со светящимися жёлтыми кристаллами."
"Designed to be worn in a cow's nose, this brass ring further enhances natural bovine strength.": "Предназначенное для ношения в носу коровы, это латунное кольцо дополнительно усиливает природную бычью силу."
"Designed to be worn in a cow's nose, this brass ring makes attractive cattle even more attractive.": "Предназначенное для ношения в носу коровы, это латунное кольцо делает привлекательный скот ещё более привлекательным."
"It says, \"Dough rose too much; salvage eclair sales; baking time 12\".": "В ней говорится: «Тесто слишком сильно поднялось; спасти продажи эклеров; время выпечки 12»."
"It's a note labeled \"To my dear friend.\"": "Это записка с надписью «Моему дорогому другу»."
"A brief note written in a lovely flowing script. It says,\n\n\"Do you remember when your helm was shattered? Probably not. You gave it to me to repair, but it was beyond my skill. I took it to Haetrix, who used inappropriately-strong magic, and now its reality is damaged. Anyway, if your helm disappears in a puff of logic, don't fret. I've locked it in a box for you near the Sun Vale mouth. Gut a troll to light the lamp light, rip the wings off a deviant fae for the second, and rip out the stomach of your least favorite ogre for the third.\n\n- Trallix\"": "Краткая записка, написанная прекрасным плавным почерком. В ней говорится,\\n\\n«Ты помнишь, когда твой шлем был разбит? Наверное, нет. Ты отдал его мне на ремонт, но он оказался слишком сложен для моих умений. Я отнес его к Хейтриксу, который использовал слишком сильную магию, и теперь его реальность повреждена. В любом случае, если твой шлем исчезнет в облаке логики, не переживай. Я запер его в коробке для тебя возле входа в Солнечную Долину. Вырви троллю кишки, чтобы зажечь свет лампы, оторви крылья у извращённого фея для второго, и вырви желудок у своего наименее любимого огра для третьего.\\n\\n— Тралликс"
"The perfumed note says, \"W: My love for you grows each night I spend alone. I long to touch you. Your beard, your lips, your... tee hee... meet me tonight behind the kennels. I cannot survive another night without your touch! And don't worry -- the messenger is safe. - E\"": "Запахнувшая записка гласит: \"В: Моя любовь к тебе растёт с каждой ночью, проведённой в одиночестве. Я жажду прикоснуться к тебе. Твоя борода, твои губы, твои... хи-хи... встреть меня сегодня ночью за питомником. Я не выживу ещё одну ночь без твоего прикосновения! И не волнуйся — посланник в безопасности. - Э\""
"Notes from Fransesca Muradrake on how best to use the ritual spot in Statehelm's graveyard.": "Заметки Франчески Мурадрейк о том, как лучше всего использовать место для ритуалов на кладбище Стейтхелма."
"This is an original numbered Ertrigard painting. The master is beloved for waterfall scenes like this one. However, thanks to his magic brush, he created over 40,000 paintings during his lifetime, so being \"original\" doesn't really make it too terribly special.": "Это оригинальная нумерованная картина Эртригарда. Мастер любим за сцены с водопадами, подобные этой. Однако благодаря своей волшебной кисти он создал более 40 000 картин за свою жизнь, так что быть «оригиналом» не делает её слишком уж особенной."
"A simple wooden mesh, useful for cages, pens, trellises, and so on.": "Простая деревянная сетка, полезная для клеток, загонов, шпалер и так далее."
"Oak chips for smoking fish and meat.": "Дубовая щепа для копчения рыбы и мяса."
"A thick wooden shield, etched with magical runes.": "Толстый деревянный щит, украшенный магическими рунами."
"Made of a secret elven wood (not oak, despite the name), this horn has a warm but somber quality.": "Сделан из секретного эльфийского дерева (не дуб, несмотря на название), этот рог обладает тёплым, но мрачным звучанием."
"Oats ground into a powder, ready for cooking.": "Овёс, перемолотый в порошок, готовый к приготовлению."
"Dehulled oats. They can be cooked in this form or ground to oat flour.": "Очищенные овсяные зерна. Их можно готовить в таком виде или перемолоть в овсяную муку."
"A sweet yet savory holiday meal.": "Сладкое, но в то же время пикантное праздничное блюдо."
"A handful of seeds to grow some oat grass.": "Горсть семян для выращивания овсяной травы."
"A dense and filling meal.": "Плотная и сытная еда."
"A scroll written in Orcish.": "Свиток, написанный на орочьем языке."
"A strange magical cube. It can be used to give an off-hand weapon a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы дать оружию во второй руке бонусное магическое свойство. Посетите торговца снаряжением (или игрока-улучшателя), чтобы установить его."
"Someone killed an ogre and <i>took its stomach</i>. That's not disturbing at all. Perfectly reasonable thing to do.": "Кто-то убил огра и <i>взял его живот</i>. Это совсем не пугает. Совершенно разумное дело."
"Faded print declares that Jasmine's Fiery Blades has now opened in Statehelm. It seems to have closed some time after.": "Выцветшая надпись гласит, что Огненные клинки Жасмин теперь открыты в Стейтхелме. Похоже, что они закрылись некоторое время спустя."
"This shield was stuck to a big droach for decades. It apparently absorbed some of the droach's protective power.": "Этот щит десятилетиями был прикреплён к большому дроучу. По-видимому, он впитал часть защитной силы дроуча."
"A club made from a sacred tree that died heroically.": "Булава, сделанная из священного дерева, которое погибло героической смертью."
"It's an old note. \"Relamir: if you read this, get out of here! The frog men came again... and they killed the guests and staff. There's nobody left but me, and I'm leaving. Fuck this island, fuck this whole inn idea, fuck money, fuck the ocean, fuck everything. I'll pay you the money I owe you within a decade, I promise. - Roolaustus\"": "Это старая записка. \"Реламир: если ты это читаешь, уходи отсюда! Лягушачьи люди пришли снова... и убили гостей и персонал. Никого не осталось, кроме меня, и я ухожу. К чёрту этот остров, к чёрту всю эту идею с трактиром, к чёрту деньги, к чёрту океан, к чёрту всё. Я обещаю выплатить тебе долг в течение десяти лет. - Рулаустус\""
"It's a hand-scribbled note from one Rakshasa to another, inviting them to a coming-of-age party. It looks pretty old... the party probably happened long ago and this was kept as a memento.": "Это рукописная записка от одного Ракшаса другому, приглашающая на празднование совершеннолетия. Выглядит довольно старой... вечеринка, вероятно, состоялась давно, а эта записка сохранилась как памятный сувенир."
"Once a fine weapon, this bow has been mistreated for a very long time. It still shoots arrows, though.": "Когда-то это было отличное оружие, но этот лук долгое время подвергался плохому обращению. Тем не менее, он всё ещё стреляет стрелами."
"Food-quality vegetable oil with a high burn point and a neutral taste. Good for many dishes.": "Пищевое растительное масло с высокой температурой горения и нейтральным вкусом. Подходит для многих блюд."
"A ponderous volume wherein an anonymous rakshasa mage explores the idea that the 'old' rakshasa form is somehow still locked within each 'new' rakshasa body. The author posits that certain potions might do the trick, and then explores numerous alchemical hypotheses, none of which pan out too well, but one complex recipe catches your eye.": "Тяжёлый том, в котором анонимный ракшаса-маг исследует идею о том, что «старая» форма ракшасы каким-то образом всё ещё заперта внутри каждого «нового» тела ракшасы. Автор выдвигает предположение, что определённые зелья могут помочь, а затем рассматривает множество алхимических гипотез, ни одна из которых не срабатывает слишком хорошо, но один сложный рецепт привлекает ваше внимание."
"A raw onion.": "Сырой лук."
"An unfolding bloom of fried onion. Dipping sauce optional.": "Раскрывающийся цветок из жареного лука. Соус для макания по желанию."
"A tasty well-seasoned meal.": "Вкусное хорошо приправленное блюдо."
"It's an egg scrambled with onions and topped with hash browns.": "Это яичница-болтунья с луком, сверху с хэшбраунами."
"Batter-dipped onion rings.": "Луковые кольца в кляре."
"A plantable onion seedling.": "Посадочный саженец лука."
"It's a blank form for requesting personal military items from the Onkara.": "Это пустая форма для запроса личных военных предметов у Онкары."
"A small crystal made up of black and white bands. Used in magic, it guards against physical dangers.\n\nAssociated Primary Skill: Shield\nAssociated Secondary Skills: Armor Patching, Tanning, Leatherworking": "Небольшой кристалл, состоящий из черных и белых полос. Используется в магии, он защищает от физических опасностей.\\n\\nСвязанный основной навык: Щит\\nСвязанные второстепенные навыки: Починка брони, Выделка, Кожевенное дело"
"This greenish stone seems to have many other colors embedded in it. While some -- especially orcs -- find it beautiful, others find it disconcerting or even ugly. In magic it is associated with curses and the evil eye.": "Этот зеленоватый камень кажется наполненным множеством других цветов. Пока некоторые — особенно орки — находят его красивым, другие считают его тревожным или даже уродливым. В магии он ассоциируется с проклятиями и сглазом."
"An orange.": "Апельсин."
"Cat meat coated in a thick orange sauce. Surprisingly not terrible.": "Кошачье мясо в густом оранжевом соусе. Удивительно, но вкусно."
"Dye used to color a piece of clothing or armor orange.": "Краска, используемая для окрашивания одежды или брони в оранжевый цвет."
"A pile of flaky rock. What could this be for?": "Куча слоистого камня. Для чего это может быть?"
"A simple, tasty beverage. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Простой, вкусный напиток. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Smoked perch with a sweet orange glaze.": "Копчёный окунь с сладкой апельсиновой глазурью."
"A complex, dense cake.": "Сложный, плотный торт."
"Shaved ice flavored with orange juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяной щербет со вкусом апельсинового сока. Это лакомство следует съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 20,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 20 000 Советов."
"With notes of citrus and sweetness, this is a decent table wine.": "С нотками цитрусовых и сладости, это неплохое столовое вино."
"This glass orb contains a dollop of the essence of despair. It can be used as a Necromancy Gem.": "Эта стеклянная сфера содержит каплю сущности отчаяния. Её можно использовать как Некромантический Самоцвет."
"A garnet that floats around your head and emits light. This was obviously made by an apprentice still learning the craft. The enchantment is clumsy and the gem wobbles slightly in its orbit.": "Гранат, который плавает вокруг вашей головы и излучает свет. Очевидно, что его создал ученик, который ещё учится ремеслу. Заклинание неуклюжее, и самоцвет слегка покачивается в своей орбите."
"The preserved skull of an orc.": "Сохранённый череп орка."
"Dye used to color a piece of clothing or armor orchid.": "Краска, используемая для окрашивания одежды или доспехов в цвет орхидеи."
"A clean, dry beer that goes down easy.": "Чистое, сухое пиво, которое легко пьётся."
"A book written in Orcish. In the title, you recognize the orcish word for Gotkul, a famous orc general that commands a massive army in the Crone Hegemony.": "Книга, написанная на оркском языке. В названии вы узнаёте оркское слово «Готкул» — известный оркский генерал, командующий огромной армией в Кронской Гегемонии."
"A book written in Orcish. Judging by the pictures, it seems to be about Tast, the god of war and armies.": "Книга, написанная на оркском языке. Судя по иллюстрациям, она посвящена Тасту, богу войны и армий."
"A book written in Orcish. From the diagrams, it seems to be about magic.": "Книга, написанная на оркском языке. По диаграммам кажется, что она о магии."
"A book written in Orcish. It seems to be about war machines.": "Книга, написанная на оркском языке. Похоже, она посвящена военным машинам."
"A book written in Orcish. The occasional diagrams and woodcut illustrations suggest that it's about orcish mages that perform weird rituals.": "Книга, написанная на оркском языке. Периодические диаграммы и гравюры на дереве указывают на то, что она посвящена оркским магам, выполняющим странные ритуалы."
"A book written in Orcish. It seems to show techniques for the knife.": "Книга, написанная на оркском языке. Похоже, в ней показаны техники обращения с ножом."
"A simple book in Orcish. It has lots of pictures of weapons.": "Простая книга на орочьем языке. В ней много изображений оружия."
"A simple book in Orcish. It seems to contain many prayers or chants, plus woodcut images of orcish armies killing people.": "Простая книга на оркском языке. Похоже, в ней содержится много молитв или заклинаний, а также гравюры оркских армий, убивающих людей."
"Orcs are known for many things, and big-ass swords is one of those things.": "Орки известны многим, и большие мечи — одна из таких вещей."
"For orcs that rely on speed and stealth to survive, this leather helmet is the standard. It's not really the best possible cap, but standards usually aren't.": "Для орков, которые полагаются на скорость и скрытность, чтобы выжить, этот кожаный шлем является стандартным. Это не самый лучший колпак, но стандарты обычно такими и не бывают."
"Finely-diced vegetables nestled on a bed of fluffy orcish wheat.": "Тонко нарезанные овощи, уложенные на подушку из пушистого орочьего пшеницы."
"A sheet of paper with some kind of mapping between different characters of the Orcish alphabet.": "Лист бумаги с каким-то соответствием между разными символами орочьего алфавита."
"This tough leather armor is interwoven with magical threads that supposedly keep psionic attacks at bay.": "Этот прочный кожаный доспех переплетён магическими нитями, которые, как считается, отражают псионические атаки."
"A series of notes and questions, written entirely in Orcish.": "Серия заметок и вопросов, полностью написанных на орочьем языке."
"Eel prepared in the orcish way: coated in cheese.": "Угорь, приготовленный по-орочьи: покрыт сыром."
"A book written in Orcish. It's clearly a guide to first aid.": "Книга, написанная на орочьем языке. Очевидно, это руководство по оказанию первой помощи."
"Unleavened bread. The orcish version is a little better. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Бездрожжевой хлеб. Оркская версия немного лучше. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Made from orcish wheat. This has a notably superior taste to human wheat flour, and is preferred for high-end baked goods.": "Сделана из орочьей пшеницы. Имеет заметно более насыщенный вкус по сравнению с мукой из человеческой пшеницы и предпочтительна для выпечки высокого качества."
"This ugly leather thing is supposed to be worn on the head, apparently.": "Эта уродливая кожаная штуковина, по всей видимости, предназначена для ношения на голове."
"These super-thick chainmail gloves are used by orcish arena fighters. They're uncomfortable and ugly, but very thick.": "Эти сверхтолстые кольчужные перчатки используются орочьими бойцами арены. Они неудобные и уродливые, но очень прочные."
"Designed for orcish scouts and mobile assault troops, these gloves are patterned after the famous orcish plate gauntlets, but just made out of many layers of leather. Nobody really loves the result, but it's still better than steel gauntlets if you're trying to aim a bow.": "Созданные для орочьих разведчиков и мобильных штурмовых отрядов, эти перчатки выполнены по образцу знаменитых орочьих латных рукавиц, но сделаны из множества слоев кожи. Никому особо не нравятся результаты, но они всё же лучше стальных рукавиц, если вы пытаетесь прицелиться из лука."
"Leather armor with a thin layer of strong metal inside.": "Кожаная броня с тонким слоем прочного металла внутри."
"It should be worth a few coins if you wash it up.": "Если её вымыть, она должна стоить несколько монет."
"A diary written in Orcish.": "Дневник, написанный на орочьем языке."
"A comb in the orcish style, made of bone and dipped in gold. Worn as jewelry.": "Гребень в орочьем стиле, сделанный из кости и покрытый золотом. Носится как украшение."
"Preferred by orcish martial artists, this black-iron fist weapon is intimidatingly heavy in the hand.": "Предпочитаемое оружие орочьих боевых искусств, этот кулачный клинок из черного железа пугающе тяжел в руке."
"A simple scroll with both Orcish and Human words on it.": "Простой свиток с орочьими и человеческими словами."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank that most can expect to reach, given mages' glass ceiling in orcish society.": "Носились орочьими магами после их повышения до звания «Магический Солдат», что является высшим рангом, которого большинство может достичь, учитывая стеклянный потолок магов в орочьем обществе."
"Worn by orcish mages after they've been promoted to 'Magic Trooper', which is the highest rank they can expect to reach, given mages' glass ceiling in orcish society.": "Носится орочьими магами после повышения до звания «Маг-стрелок», что является высшим рангом, которого они могут достичь, учитывая стеклянный потолок магов в орочьем обществе."
"Thickly padded and thickly odorous.": "Плотно набиты и сильно пахнут."
"A standard bow design used by orcish archers throughout the world. It's resilient yet accurate.": "Стандартная модель лука, используемая орочьими лучниками по всему миру. Он прочный и точный."
"It's seen years of freezing cold weather, digging in the dirt, and horrific violence. It's surprisingly clean for all that.": "Она пережила годы лютого холода, копания в земле и ужасного насилия. Для всего этого она удивительно чистая."
"Caked in frozen blood, these gloves always seem to be damp and smelly no matter what you do to clean them.": "Покрытые засохшей замёрзшей кровью, эти перчатки всегда кажутся влажными и вонючими, несмотря на все ваши попытки их очистить."
"It's unclear what sort of leather was used in these greaves, but it's not cow leather. Something thicker.": "Неясно, какая именно кожа использовалась для этих наголенников, но это не коровья кожа. Что-то более толстое."
"Surprisingly clean. Orcs wash their hair more often than most would expect. While orcs don't especially enjoy bathing, they enjoy orc-lice far less.": "Удивительно чистый. Орки моют волосы чаще, чем многие ожидают. Хотя орки не особенно любят купаться, они ещё меньше любят орочьих вшей."
"A book with Orcish phrases translated into several languages.": "Книга с орочьими фразами, переведёнными на несколько языков."
"A stock shield used by countless orc armies.": "Обычный щит, используемый бесчисленными орочьими армиями."
"A mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Горная кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду, нанося удары, а не размахивая. Инновационно."
"An orcish invention similar to a Dwarven N Core, but much more powerful. It has the same shape and size as the Dwarven version.": "Оркское изобретение, похожее на гномье N Ядро, но гораздо более мощное. Имеет ту же форму и размер, что и гномья версия."
"A simple book in Orcish. It looks like it might be a fiction novel -- very rare among orcs!": "Простая книга на оркском языке. Похоже, это художественный роман — очень редкое явление среди орков!"
"A steaming bowl of soup.": "Парящийся миска супа."
"Used by orcs to smoke raw (unrefined) gur-horta.": "Используется орками для курения сырого (неочищенного) гур-хорты."
"A subdued arrangement of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +5 Melee Accuracy. Orcs also gain +3% Combat XP.\n\nYou can only have one flower arrangement benefit at a time.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +5 к точности в ближнем бою. Орки также получают +3% боевого опыта.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A subdued arrangement of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +50 Melee Accuracy. Orcs also gain +14% Combat XP.\n\nYou can only have one flower arrangement benefit at a time.": "Сдержанная цветочная композиция, уменьшающая чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +50 к точности в ближнем бою. Орки также получают +14% боевого опыта.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
