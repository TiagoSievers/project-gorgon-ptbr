"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +5 Melee Accuracy. Orcs also gain +3% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +5 к точности в ближнем бою. Орки также получают +3% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +50 Melee Accuracy. Orcs also gain +14% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 75.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +50 к точности в ближнем бою. Орки также получают +14% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 75."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +10 Melee Accuracy. Orcs also gain +4% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Сдержанная цветочная композиция, уменьшающая чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +10 к точности в ближнем бою. Орки также получают +4% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +15 Melee Accuracy. Orcs also gain +5% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 5.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +15 к точности в ближнем бою. Орки также получают +5% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 5."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +20 Melee Accuracy. Orcs also gain +6% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +20 к точности в ближнем бою. Орки также получают +6% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 15."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +25 Melee Accuracy. Orcs also gain +7% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 25.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +25 к точности в ближнем бою. Орки также получают +7% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 25."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +30 Melee Accuracy. Orcs also gain +8% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +30 к точности в ближнем бою. Орки также получают +8% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 35."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +35 Melee Accuracy. Orcs also gain +9% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 45.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +35 к точности в ближнем бою. Орки также получают +9% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 45."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +40 Melee Accuracy. Orcs also gain +10% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 55.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +40 к точности в ближнем бою. Орки также получают +10% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 55."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +45 Melee Accuracy. Orcs also gain +12% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 65.": "Сдержанная цветочная композиция, уменьшающая чувства ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +45 к точности в ближнем бою. Орки также получают +12% боевого опыта.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Восприятия природы не ниже 65."
"A book written in Orcish. The woodcuts appear to depict the other major races such as humans, elves, and dwarves.": "Книга, написанная на орочьем языке. Гравюры, по-видимому, изображают другие основные расы, такие как люди, эльфы и гномы."
"Pillowy potato dumplings in a velvety sauce. The orcish version uses squash as well as other vegetables.": "Пушистые картофельные клецки в бархатистом соусе. Орочья версия использует тыкву и другие овощи."
"Although they're leather instead of metal, these insulated boots are made for protection, not grace or mobility.": "Хотя они кожаные, а не металлические, эти утеплённые сапоги созданы для защиты, а не для изящества или подвижности."
"A scroll in Orcish. There is one picture depicting a human wizard.": "Свиток на оркском языке. На нём изображён один рисунок с человеческим волшебником."
"A simple scroll written in Orcish, with images of sword techniques.": "Простой свиток, написанный на орочьем языке, с изображениями техник владения мечом."
"A scroll in Orcish. It seems to be about orcish wizards.": "Свиток на орочьем языке. Похоже, он о орочьих волшебниках."
"A fancy plate of snack foods. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Изысканная тарелка закусок. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Made for orcish armies by dwarven smiths under an ancient treaty.": "Создана для орочьих армий кузнецами-гномами по древнему договору."
"A small leather sack of weird powders and bones, useful for casting Orcish magics. It is worn prominently by Orcish wizards as a symbol of their power.": "Небольшой кожаный мешок с необычными порошками и костями, полезный для сотворения орочьей магии. Его заметно носят орочьи волшебники как символ своей силы."
"A piece of metal that's especially strong.": "Кусок металла, который особенно прочен."
"A mass-produced shield for non-elite orcs.": "Массово производимый щит для неэлитных орков."
"This spicy-yet-slimy liquid toughens your flesh so that you're better insulated against the cold.": "Эта остро-слизистая жидкость укрепляет вашу плоть, чтобы вы лучше переносили холод."
"A book written in Orcish. It's very long and there are very few pictures.": "Книга, написанная на оркском языке. Она очень длинная и содержит очень мало иллюстраций."
"A book written in Orcish. It has many pictures of spears, polearms, and swords.": "Книга, написанная на орочьем языке. В ней много изображений копий, древкового оружия и мечей."
"Wheat with a finer quality, preferred over Human wheat for certain dishes.": "Пшеница более высокого качества, предпочитаемая некоторыми блюдами вместо человеческой пшеницы."
"Dye used to color a piece of clothing or armor orcish wheat.": "Краситель, используемый для окрашивания одежды или брони в цвет орочьей пшеницы."
"A delicate tool for grinding orcish wheat into flour. (Using this item will teach the recipe if needed.)": "Тонкий инструмент для измельчения оркской пшеницы в муку. (Использование этого предмета научит рецепту, если это необходимо.)"
"Seeds that can grow into delicious wheat.": "Семена, из которых вырастает вкусная пшеница."
"A chunk of rock from a cave deep under Eltibule.": "Кусок породы из пещеры глубоко под Элтибулем."
"A useful spice for cooking. It has an aromatic, warm and slightly bitter taste.": "Полезная специя для приготовления пищи. Имеет ароматный, тёплый и слегка горьковатый вкус."
"A large knife for cutting meat and organs out of corpses (+5% chance for an organ). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Большой нож для нарезки мяса и органов из трупов (+5% шанс получить орган). (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)"
"Some strips of strange metal with strange properties. It is used by armorsmiths.": "Несколько полосок странного металла со странными свойствами. Используется кузнецами доспехов."
"A lovely navel ring with a tourmaline in it, apparently designed to calm intense anger. ": "Прекрасное пупочное кольцо с турмалином, предназначенное, по всей видимости, для успокоения сильного гнева. "
"Orloaka the goblin sage augmented this staff by filling its hollow core with tears collected from dying unicorns. Unicorns that he burned alive! (They were actually rhinos, not unicorns, though, so the enchantment isn't all that great.)": "Орлоака, гоблинский мудрец, усилил этот посох, заполнив его полое ядро слезами, собранными с умирающих единорогов. Единорогов, которых он сжег заживо! (Хотя на самом деле это были носороги, а не единороги, так что заклинание не такое уж и сильное.)"
"This quality replica of \"Candlelight and Dawnlight\" is overshadowed by its frame, a beautiful masterpiece without peer.": "Это качественная реплика «Свет свечи и рассветный свет» затмевается своей рамой, прекрасным шедевром без равных."
"This special mixture grants you the ability to carry more stuff at one time, which is essential when out traveling for a long period of time.\nThis effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Эта специальная смесь дарует вам способность носить больше вещей одновременно, что жизненно важно при длительных путешествиях.\\nЭтот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы инвентаря."
"This special mixture grants you the ability to carry a lot more stuff at one time, which is essential when out traveling for a long period of time.\nThis effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Эта специальная смесь даёт вам возможность носить гораздо больше вещей одновременно, что крайне важно при длительных путешествиях.\\nЭтот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы, увеличивающие инвентарь."
"This special mixture grants you the ability to carry a whole lot more stuff at one time, which is essential when out traveling for a long period of time.\nThis effect does not stack with other inventory expansion potions from Orran and overrides all inventory Words of Power.": "Эта специальная смесь дарует вам возможность носить намного больше вещей одновременно, что жизненно важно при длительных путешествиях.\\nЭтот эффект не суммируется с другими зельями расширения инвентаря от Оррана и заменяет все слова силы инвентаря."
"The dismembered claw of a demonic beast. Dangerous to the touch.": "Отрубленный коготь демонического зверя. Опасен на ощупь."
"Unusual bone structure.": "Необычная костная структура."
"One of the spikes from the back of a demonic Osslar.": "Один из шипов на спине демонического Осслара."
"A beautiful (if perhaps a bit gaudy) ring with a good heft to it.": "Красивое (хотя и немного вычурное) кольцо с хорошим весом."
"This fire-protection potion is a delicious grape-esque flavor. It's a popular recreational drink even among the non-engulfed.": "Этот зелье защиты от огня имеет вкус, напоминающий сочный виноград. Оно популярно как развлекательный напиток даже среди тех, кто не охвачен пламенем."
"Used in legendary smithing recipes.": "Используется в легендарных рецептах кузнечного дела."
"Otis the Ogre once used this in an epic arena battle. But he gave it away after he found a better one.": "Оттис Огр однажды использовал это в эпической арене. Но он отдал его, когда нашёл лучшее."
"An Elven bow that's been enhanced with Goblin magic and lots of sharp bits.": "Эльфийский лук, усиленный гоблинской магией и множеством острых деталей."
"A robotic fire pit, overloaded with a powerful source of energy. Lasts 10 minutes once deployed.\n\nWhile standing near the deployed Dronefire, you receive the following:\n+10% Cold Resistance\n+10% Direct Fire Damage\n+20% Fire Vulnerability": "Роботизированное костровище, перегруженное мощным источником энергии. Длится 10 минут после установки.\\n\\nНаходясь рядом с установленным Дронфаером, вы получаете следующие бонусы:\\n+10% к сопротивлению холоду\\n+10% к прямому огненному урону\\n+20% к уязвимости к огню"
"The brain of a demonic Overseer. It is hot to the touch, and still pulsating.": "Мозг демонического Надзирателя. На ощупь горячий и всё ещё пульсирует."
"A plucked-out eyeball from a Demon Overseer. If you look directly at it, you can hear it psychically issuing you orders to return it to its owner's head.": "Вырванный глаз Демона-Надзирателя. Если смотреть прямо на него, можно психически услышать, как он приказывает вернуть его на место владельцу."
"The mandible of a giant insect or arthropod.": "Мандибула гигантского насекомого или членистоногого."
"A pumpkin carved with a silly owl face.": "Тыква, вырезанная с забавным лицом совы."
"A bulky knife designed to pry oysters open. (Keep in your inventory to allow oyster-opening. Also provides a 7% chance for a bonus pearl.)": "Массивный нож, предназначенный для вскрытия устриц. (Держите в инвентаре, чтобы иметь возможность открывать устриц. Также даёт 7% шанс получить бонусную жемчужину.)"
"A hat worn proudly by spiders who have turned their backs on violent ways, and opted instead to embrace pacifism.": "Шляпа, с гордостью носимая пауками, которые отвернулись от насилия и выбрали путь пацифизма."
"A toxic weed of dubious utility.": "Ядовитый сорняк сомнительной пользы."
"A breathtaking scene of the old Council grounds of Ema. It seems to be 3000 years old. Sadly, however, there are traces of alteration magic in the paint, and it could well be a forgery.": "Потрясающая сцена старых земель Совета Эмы. Кажется, ей около 3000 лет. К сожалению, в краске есть следы магии изменения, и это вполне может быть подделкой."
"This ugly piece has been preserved through the ages solely because it depicts Grigtekark, a goblin holy land.": "Это уродливое произведение сохранилось сквозь века исключительно потому, что на нём изображён Григтекара, священная земля гоблинов."
"This nature scene depicts Traticus, the mythical elven hero, entering the Woods of Disdain. The subject matter dates the painting to the New Revisionist period, 150 years ago. By elven timelines this was very recent, making the painting extremely tacky. Perhaps it will gain value in 300 years, however.": "Этот природный пейзаж изображает Тратикуса, мифического эльфийского героя, входящего в Леса Презрения. Сюжет указывает на то, что картина относится к периоду Нового Ревизионизма, 150 лет назад. По эльфийским меркам это очень недавно, что делает картину крайне безвкусной. Возможно, через 300 лет она приобретёт ценность."
"A chunk of weird ore. It's a potent conductor of certain magics and is used in specialized armor and weapons.": "Кусок странной руды. Это мощный проводник некоторых видов магии и используется в специализированной броне и оружии."
"A surprisingly complex beer, but... complexity doesn't always taste good.": "Удивительно сложное пиво, но... сложность не всегда на вкус хороша."
"Dye used to color a piece of clothing or armor pale goldenrod.": "Краска, используемая для окрашивания одежды или брони в бледный золотарниковый цвет."
"Dye used to color a piece of clothing or armor pale green.": "Краска, используемая для окрашивания одежды или доспехов в бледно-зелёный цвет."
"Dye used to color a piece of clothing or armor pale marigold.": "Краска, используемая для окрашивания одежды или брони в бледный цвет календулы."
"Sweet and strong, with the distinctive odor of molasses. In far-off lands, ranalon produce and drink rum in tremendous quantities, but it's less common -- and less delicious -- in Alharth.": "Сладкий и крепкий, с характерным запахом патоки. В дальних землях раналон производят и пьют ром в огромных количествах, но в Алхарте он встречается реже — и менее вкусен."
"Dye used to color a piece of clothing or armor pale turquoise.": "Краска, используемая для окрашивания одежды или брони в бледно-бирюзовый цвет."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +32 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +32 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A straightforward but sophisticated tool for extracting fossils. (Keep it in your inventory and you'll be able to excavate fossil sites. There is a chance the pick will break with each use.)": "Простой, но продуманный инструмент для извлечения окаменелостей. (Держите его в инвентаре, и вы сможете раскопать места с окаменелостями. При каждом использовании есть шанс, что кирка сломается.)"
"Used by goblin paleontologists in pursuit of knowledge.": "Используется гоблинскими палеонтологами в поисках знаний."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +12 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +12 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A hacked-off tail. Grisly.": "Отрубленный хвост. Мрачный."
"Designed by a spiteful necromancer bent on conquering a city, these airy pants seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Созданные злобным некромантом, стремящимся покорить город, эти лёгкие штаны кипят ненавистью. И оказывается, что чистая ненависть довольно тёплая, обеспечивая лёгкую защиту от холода."
"Crafted by elves who were too homesick to get out of bed, the Pants of the Yearning Sea are sorrow incarnate. But these sure are comfy. Plus, the tears that dripped onto the fabric have made it extra bouncy!": "Созданные эльфами, которые так скучали по дому, что не могли встать с постели, Штаны Тоскующего Моря — воплощение печали. Но они очень удобные. К тому же слёзы, капавшие на ткань, сделали их особенно упругими!"
"This piece of parchment has been folded into the shape of a boat.": "Этот лист пергамента сложен в форме кораблика."
"A simple spring-activated trap that will stun whatever walks over it. One-use.": "Простая ловушка на пружине, которая оглушит любого, кто наступит на неё. Одноразовая."
"A pile of flaked Parasol mushroom bits.": "Кучка хлопьев из зонтичного гриба."
"A very hard cheese, suitable for grating as a topping.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень твердый сыр, подходящий для натирания в качестве посыпки.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Attaching this ribbon to your reins will make you go faster during races. Slightly. Very, very slightly.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой ленты к поводьям немного увеличит вашу скорость во время гонок. Очень, очень немного.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this ribbon to your reins will make you learn a bit more from each race you undertake.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепив эту ленту к поводьям, вы будете получать немного больше опыта с каждой проведённой гонки.\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"When you see a spider wearing this hat, there is no mistaking the fact that they are a party animal, through and through.": "Если вы видите паука в этой шляпе, сомнений нет — он настоящий тусовщик до мозга костей."
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with an Ice-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an emergency.)": "Толстое покрывало, которое дарит тепло и комфорт кобыле во время беременности. Это покрывало подходит для кобыл с ледяным темпераментом. Дайте лошади в стойле во время фазы беременности, чтобы ускорить вынашивание на 24 часа. (Также может использоваться для согревания в экстренных случаях.)"
"It's a large, gaudy belt buckle with a hand-painted scene of a man chopping lumber.": "Это большая, вычурная пряжка для пояса с вручную нарисованной сценой мужчины, рубящего дрова."
"A plantable pea plant.": "Посадочное растение гороха."
"A lovely scene. Perhaps it was created by Mirkym -- it has her signature approach to foliage -- but probably just created in the same style by an admirer of her work.": "Прекрасная сцена. Возможно, она создана Миркими — в ней заметен её фирменный подход к листве — но скорее всего, это просто работа поклонника её творчества в том же стиле."
"A ripe, fuzzy peach.": "Спелый, бархатистый персик."
"Dye used to color a piece of clothing or armor peach puff.": "Краска, используемая для окрашивания одежды или брони в цвет персикового пуха."
"Shaved ice flavored with peach juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом персикового сока. Это угощение нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A big ripe pear.": "Большая спелая груша."
"Shaved ice flavored with pear juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом грушевого сока. Это лакомство нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A pleasant dessert wine.": "Приятное десертное вино."
"A beautiful orb that grew inside an oyster or other mollusc. While geologists don't consider this a gem, jewelers do. It can be used in magic to convey water-related benefits.": "Красивый шар, который образовался внутри устрицы или другого моллюска. Хотя геологи не считают это драгоценным камнем, ювелиры — считают. Может использоваться в магии для передачи эффектов, связанных с водой."
"A decorative ranalan bracelet made of incredibly beautiful pearls.": "Декоративный браслет раналан из невероятно красивых жемчужин."
"Fresh green peas, ready for cooking.": "Свежий зелёный горох, готовый к приготовлению."
"A pleasant baked dish with odds and ends.": "Приятное запечённое блюдо из всякой всячины."
"Most are nondescript, but a few have streaks of quartz.": "Большинство без особенностей, но у некоторых есть прожилки кварца."
"A customized hammer used by toolsmiths and weaponsmiths.": "Индивидуальный молоток, используемый кузнецами инструментов и оружейниками."
"Used by the typical troops of the Crone Hegemony.": "Используется обычными войсками Гегемонии Старухи."
"These lightweight bows aren't actually used by the Peltasts of the Crone Hegemony, but by their support archers.": "Эти лёгкие луки на самом деле не используются пельтастами Кроновой Гегемонии, а их поддерживающими лучниками."
"The stock shield used by countless grunts in the Crone Hegemony.": "Стандартный щит, используемый бесчисленными рядовыми в Гегемонии Кроун."
"A communication device common among Crone Hegemony officers, akin to a Sending Stone from the Council Lands... but much, much, creepier. This one seems inert.": "Устройство связи, распространённое среди офицеров Гегемонии Крон, похожее на Камень Посыла из Земель Совета... но гораздо, гораздо жутче. Этот кажется неактивным."
"A silver medallion etched with a simple drawing of a smiling elf's face.": "Серебряный медальон с простой гравировкой улыбающегося лица эльфа."
"A thick, cumbersome silver medallion etched with a simple drawing of a smiling elf's face.": "Толстый, громоздкий серебряный медальон с простым изображением улыбающегося лица эльфа."
"A multi-tool embossed with the face of a smiling cartoon elf. The skinning and butchering tools seems decent, but the other tools would break if you tried to use them. (Keep in your inventory to allow skinning and butchering of corpses. +3 to your effective skinning/butchering skill.)": "Мультитул с изображением улыбающегося мультяшного эльфа. Инструменты для снятия шкуры и разделки кажутся приличными, но остальные инструменты сломаются, если попытаться ими пользоваться. (Держите в инвентаре, чтобы иметь возможность снимать шкуру и разделывать трупы. +3 к эффективному навыку снятия шкуры/разделки.)"
"It's just a big sack of money.": "Это просто большой мешок с деньгами."
"A sweet and spicy hard cheese.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкий и пряный твердый сыр.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Venison fried in butter and coated in fresh-cracked pepper. A restorative treat!": "Оленьина, обжаренная на сливочном масле и покрытая свежемолотым перцем. Восстанавливающее угощение!"
"Raw perch on a ball of delicious rice.": "Сырой окунь на шарике вкусного риса."
"Raw perch wrapped in seaweed, on a ball of delicious rice.": "Сырой окунь, завернутый в морские водоросли, на шарике вкусного риса."
"This piece of cedar is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality cedar wood.": "Этот кусок кедра — образец своего типа! У этого вида древесины есть несколько применений, но часто нет необходимости в таком высоком качестве. В таком случае вы можете превратить его в несколько кусков кедровой древесины обычного качества."
"A lovely conch that has proven to be resilient and powerful. It's perfect for making magic weapons with!": "Прекрасная раковина, которая оказалась прочной и мощной. Она идеально подходит для создания магического оружия!"
"High-quality cotton fibers that have been cleaned and prepared.": "Высококачественные хлопковые волокна, очищенные и подготовленные."
"This shell is in amazing condition.": "Эта раковина в отличном состоянии."
"This piece of maple is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality maple wood.": "Этот кусок клёна — образец своего рода! У такого типа древесины есть несколько применений, но часто нет необходимости в таком высоком качестве. В таком случае вы можете превратить его в несколько кусков древесины клёна обычного качества."
"Rub this potion into your hair and head and your short-term memory will break.": "Вотрите это зелье в волосы и голову, и ваша кратковременная память нарушится."
"This piece of oak is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality oak wood.": "Этот кусок дуба — образец своего типа! У этого вида древесины есть несколько применений, но часто нет необходимости в таком высоком качестве. В таком случае вы можете превратить его в несколько кусков дубовой древесины обычного качества."
"A thin tube full of liquid. Apparently you jab it into your skin to use it -- a horrific idea that only a mantis could dream up.\n\nSharpen is supposedly not addictive, but higher-quality doses are only effective if the recipient has well-honed survival instincts.": "Тонкая трубочка, наполненная жидкостью. По всей видимости, её нужно вонзать в кожу, чтобы использовать — ужасная идея, которую мог придумать только богомол.\\n\\nГоворят, что Шарпен не вызывает привыкания, но более качественные дозы эффективны только если у получателя хорошо развит инстинкт выживания."
"This piece of spruce is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality spruce wood.": "Этот кусок ели является образцом своего типа! У этой древесины есть несколько применений, но часто нет необходимости в таком высоком качестве. В таком случае вы можете превратить её в несколько кусков ели обычного качества."
"This piece of yew is an exemplar of its type! There are a few uses for this type of lumber, but often there is no need for such high quality. In that case, you can turn this into several pieces of typical-quality yew wood.": "Этот кусок тиса — образец своего рода! У этой древесины есть несколько применений, но часто нет необходимости в таком высоком качестве. В таком случае вы можете превратить его в несколько кусков тисовой древесины обычного качества."
"A baked potato that has been rotated at a perfect consistency for hours. As far as plain ungarnished potatoes go, this is great...": "Запечённый картофель, который вращали с идеальной постоянностью в течение нескольких часов. Что касается простых картофелин без украшений, это отличный вариант..."
"An extremely tasty meal that needs no accompaniments.": "Очень вкусное блюдо, которое не требует никаких дополнений."
"This is an especially round pebble. But it's still just a pebble, with probably very few uses.": "Это особенно круглый камешек. Но всё же это просто камешек, у которого, вероятно, очень мало применений."
"A mildly perfumed wax that helps ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Слегка ароматизированный воск, который помогает обеспечить успех спаривания с пчёлами или осами. (Чтобы использовать, передайте питомцу-пчеле или осе через интерфейс Стойла. Эффект сохраняется до попытки разведения с питомцем. У питомца может быть только один воск одновременно; использование другого воска заменяет первый.)"
"It's a small peridot, mint green in color. Used in magic, it wards off distracting thoughts and helps align your accuracy.\n\nAssociated Primary Skill: Archery\nAssociated Secondary Skill: Calligraphy": "Это небольшой перидот мятно-зеленого цвета. Используется в магии, он отгоняет отвлекающие мысли и помогает улучшить точность.\n\nСвязанный основной навык: Стрельба из лука\nСвязанный вторичный навык: Каллиграфия"
"The florid smell of rotting mushroom gives this potion that special something.": "Цветочный запах гниющего гриба придаёт этому зелью особую изюминку."
"It smells like mushrooms and cinnamon.": "Пахнет грибами и корицей."
"It tastes like mushroom gravy. Well, it <i>is</i> mushroom gravy, kinda. Plus pyrite for that extra crunch.": "На вкус как грибной соус. Ну, это <i>и есть</i> грибной соус, в некотором роде. Плюс пирит для дополнительного хруста."
"A small handheld device with a large amethyst set in the center used to teleport the wielder to an attuned location. This device will self destruct when the charge has expired.": "Небольшое портативное устройство с крупным аметистом в центре, используемое для телепортации владельца к настроенной локации. Это устройство самоуничтожится, когда заряд истечёт."
"Amazingly sharp given that the blades are made of ancient bone. It exudes an uncomfortable aura.": "Удивительно острый, учитывая, что лезвия сделаны из древней кости. Излучает неприятную ауру."
"A strange heavy disk. It plugs into something.": "Странный тяжёлый диск. Он подключается к чему-то."
"Teaches you how to read the phase of the moon.": "Учится читать фазу луны."
"Gruesome!": "Жутко!"
"Quite warm, and quite bright: whatever's inside is alive!": "Довольно тёплое и довольно яркое: то, что внутри, живо!"
"Gorgeous and profoundly magical.": "Великолепное и глубоко магическое."
"This depiction of the Tower of Treason was made by an elven Phot craftsman, using their signature one-bristle brush.": "Это изображение Башни Предательства было создано эльфийским мастером фотской живописи с использованием их фирменной кисти с одним ворсом."
"It's a taste only an alchemist would call appetizing. \"But it has sugar in it!\" As if that offset the taste of dirt!": "Вкус, который только алхимик назвал бы аппетитным. «Но в нём же есть сахар!» Как будто это перебивает вкус земли!"
"A brain that's been preserved in some sort of alchemical soup.": "Мозг, сохранённый в каком-то алхимическом растворе."
"It stinks! And it tastes vinegary. But it's... it's edible.": "Пахнет ужасно! И на вкус кислый. Но... её можно есть."
"A pickled fish with an interesting taste.": "Маринованная рыба с интересным вкусом."
"Worn by a sentient panther for years. Its strong protective magic overshadows the smell of blood soaked into the collar.": "Носился разумной пантерой много лет. Его сильная защитная магия перекрывает запах крови, впитавшейся в воротник."
"It's a chunk of glass. Pretty much worthless, although a few Alchemy recipes require bits of glass.": "Это кусок стекла. Практически бесполезен, хотя для нескольких рецептов Алхимии требуются кусочки стекла."
"Pigs drinking this are advised not to think about the ingredients lest they become depressed. And possibly very angry.": "Свиньям, пьющим это, советуют не думать об ингредиентах, чтобы не впасть в депрессию. А возможно, и сильно разозлиться."
"The hacked-off hoof of a pig or boar.": "Отрубленная копыто свиньи или кабана."
"This dwarven-made pig helm was no doubt worn in an illicit pig-fighting competition. The powerful combat runes are carefully hidden on the inside of the band.": "Этот гномий кабаний шлем, несомненно, использовался в нелегальных боях свиней. Могучие боевые руны тщательно спрятаны на внутренней стороне обода."
"Test potion transforms you into a pig. Permanent until dispelled! WARNING: think before you drink!": "Тестовое зелье превращает вас в свинью. Постоянно, пока не развеется! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to pigs when used in crafting.": "Красивый самоцвет с тёмно-зелёными полосами, известный тем, что помогает в магической коммуникации. Этот конкретный самоцвет был насыщен руной, которая настраивает его на свиней при использовании в ремесле."
"Horseshoes, but fitted for a pig's hooves.": "Подковы, но приспособленные для копыт свиньи."
"Yep, the snout of a pig.": "Да, пятачок свиньи."
"A helmet sized for a large sow, with a simple but extremely durable design. It's hard to fathom why this exists, but it does.": "Шлем размером для большой свиноматки, с простым, но чрезвычайно прочным дизайном. Трудно понять, зачем это существует, но оно есть."
"This short sword is fairly terrible for anything except gutting livestock. But it does that really well!": "Этот короткий меч довольно плох для всего, кроме выпотрошения скота. Но с этим он справляется отлично!"
"Can be studied to earn Pig XP. (Requires VIP.)": "Можно изучать для получения опыта по свиньям. (Требуется VIP.)"
"Perfect for the pig that wishes it were something else. A symbol of Arisetsu has been hidden inside.": "Идеально подходит для свиньи, которая мечтает быть кем-то другим. Внутри спрятан символ Арисэцу."
"Teaches you a pigfighting technique.": "Обучает технике боя со свиньями."
"A golden beer with a slightly bitter taste.": "Золотое пиво с лёгкой горчинкой."
"The enchanted and ground-up pineal glands of intelligent creatures, in a sweet syrupy liquid.": "Зачарованные и измельчённые шишковидные железы разумных существ в сладкой сиропообразной жидкости."
"Dye used to color a piece of clothing or armor pink.": "Краска, используемая для окрашивания одежды или брони в розовый цвет."
"Dye used to color a piece of clothing or armor pitch black.": "Краска, используемая для окрашивания одежды или брони в абсолютно чёрный цвет."
"The antler-like growth from the head of a pixie.": "Рогоподобный нарост на голове пикси."
"This byproduct of pixie decomposition is prized for its magical properties.": "Этот побочный продукт разложения пикси ценится за свои магические свойства."
"A delectable pastry. (Not actually a favorite of pixies, though.) (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Восхитительная выпечка. (Хотя на самом деле не любимая лакомство фей.) (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Sugar that's supernaturally sweet. A favorite of fairies.": "Сахар с сверхъестественной сладостью. Любимец фей."
"A variety of mycena mushroom with an especially ... unique... taste.": "Разновидность гриба мицена с особенно... уникальным... вкусом."
"A pile of pixie's parasol flakes. Quite magical and very poisonous.": "Кучка чешуек зонтика пикси. Довольно магические и очень ядовитые."
"A bowl of oats and milk. Warm and bland. You should eat a bowl immediately! Food boosts your health and power regeneration rates, and makes combat much easier.": "Миска овсяных хлопьев с молоком. Теплая и пресная. Тебе стоит съесть миску немедленно! Еда повышает скорость восстановления здоровья и силы, а также значительно облегчает бой."
"This notebook contains arcane sigils in a strange code. The sage Elmetaph has scribbled out some of the sigils and written in new ones.": "Этот блокнот содержит таинственные символы в странном коде. Мудрец Элметаф вычеркнул некоторые символы и вписал новые."
"An old brown plate, the kind vendors really like for some reason. Maybe there's a collectibles market you're unaware of.": "Старая коричневая тарелка, по какой-то причине очень нравится торговцам. Возможно, существует рынок коллекционных предметов, о котором вы не знаете."
"A scrawled note that says, \"Please, we need food within a week or our entire village will surely starve. A king's ransom for anyone who comes to our aid!\" Sadly, the date is from several years ago.": "Небрежно написанная записка с надписью: «Пожалуйста, нам нужна еда в течение недели, иначе вся наша деревня наверняка погибнет от голода. Королевский выкуп тому, кто придет нам на помощь!» К сожалению, дата на записке — несколько лет назад."
"A handwritten note. It says,\n\n\"If you're reading this then I didn't make it out alive. Please help my friends, they're still trapped in this horrible cave. Look for the ever-burn campfire. We're camped around it because it keeps the spiders away somewhat.\n\nWe came for spider eggs, and the spiders seemed weak enough. But as we climbed higher into the caves to reach the egg-chambers, we found MUCH harder ones. Soum died when a spider exploded out of him... we all freaked out and ran... now we can't escape because of injuries. Help, please! And if you're here for spider eggs, turn back now. - Cole Fensmith\"": "Рукописная записка. В ней говорится,\\n\\n«Если ты читаешь это, значит, мне не удалось выбраться живым. Пожалуйста, помоги моим друзьям, они всё ещё заперты в этой ужасной пещере. Ищите всегда горящий костёр. Мы разбили лагерь вокруг него, потому что он хоть немного отпугивает пауков.\\n\\nМы пришли за паучьими яйцами, и пауки казались достаточно слабыми. Но когда мы поднялись выше в пещеры, чтобы добраться до яйцевых камер, мы нашли ГОРАЗДО более сильных. Саум умер, когда из него вырвался паук... мы все испугались и убежали... теперь мы не можем выбраться из-за ран. Помогите, пожалуйста! И если вы здесь за паучьими яйцами, возвращайтесь назад. — Коул Фенсмит"
"Dye used to color a piece of clothing or armor plum.": "Краска, используемая для окрашивания одежды или брони в сливовый цвет."
"Like chicken meat, but larger, and with a more pronounced flavor. This bird was quite well-fed.": "Похоже на куриное мясо, но крупнее и с более выраженным вкусом. Эта птица была хорошо откормлена."
"A stuffed toy bear.": "Мягкая игрушка в виде медведя."
"Runny and hot and covered in salt and pepper. Ideal with some bread.": "Жидкое и горячее, посыпанное солью и перцем. Идеально с хлебом."
"This thick muddy substance causes your storage capacity to grow without the problem of unsightly pocket bulges.": "Эта густая мутная субстанция увеличивает вместимость вашего хранилища без проблемы некрасивых выпуклостей в карманах."
"This is not a book of poetry, but a book on how to better appreciate poetry.": "Это не книга стихов, а книга о том, как лучше понимать и ценить поэзию."
"It looks like milk, but stinks like mashed-up spider bits.": "Выглядит как молоко, но воняет, как размятые паучьи куски."
"There's little spider hairs floating on the top. Mmmm. But it'll take the poison down a notch.": "На поверхности плавают мелкие паучьи волоски. Мммм. Но оно немного ослабит действие яда."
"Even the slugs' eggs are poisonous!": "Даже яйца слизней ядовиты!"
"It's warm to the touch. Dwarven safety runes indicate that it's explosive, poisonous, and ... there's one other danger symbol that you don't recognize.": "На ощупь тёплое. Гномьи руны безопасности указывают, что оно взрывоопасно, ядовито и... есть ещё один знак опасности, который вы не узнаёте."
"Someone tried to map a cave, but seemed to get disoriented halfway through. The result is useless.": "Кто-то пытался составить карту пещеры, но, похоже, запутался на полпути. В итоге получилась бесполезная карта."
"This wine hasn't been kept in an ideal environment and is now basically undrinkable.": "Это вино хранилось в неподходящих условиях и теперь практически непригодно к употреблению."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +16 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +16 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pile of flavored porcini mushrooms.": "Кучка ароматизированных белых грибов."
"Pork chops in a delicious sweet sauce.": "Свинина в восхитительном сладком соусе."
"A delicious fresh meal.": "Вкусное свежее блюдо."
"A chunk of raw pig meat.": "Кусок сырого свиного мяса."
"A clunky necklace with an attached pouch. Made in response to Povus legging's stereotypical lack of pockets.": "Громоздкое ожерелье с прикреплённым мешочком. Создано в ответ на стереотипную нехватку карманов у штанов Повуса."
"Use this item to summon a temporary trash can that anyone can use. Note: Items thrown in the trash are lost forever!": "Используйте этот предмет, чтобы вызвать временное ведро для мусора, которым может пользоваться любой игрок. Внимание: предметы, выброшенные в мусор, теряются навсегда!"
"It's a mechanical arm with a strange wand tip at one end.": "Это механическая рука с необычным наконечником в виде жезла на одном конце."
"A small handheld device studded with aquamarines that can summon a portal to an attuned location. This device will self destruct when all of the charges have been used up.\n<b>IMPORTANT:</b> You must be friends with Mope in Povus to use this portal!": "Небольшое портативное устройство, украшенное аквамаринами, которое может вызвать портал к настроенной локации. Это устройство самоуничтожится, когда все заряды будут использованы.  \n<b>ВАЖНО:</b> Чтобы использовать этот портал, вы должны быть друзьями с Моупом в Повусе!"
"A small handheld device studded with aquamarines that can summon a portal to an attuned location. This device will self destruct when all of the charges have been used up.": "Небольшое портативное устройство, украшенное аквамаринами, которое может вызвать портал в настроенное место. Это устройство самоуничтожится, когда все заряды будут использованы."
"A small handheld device studded with aquamarines that can summon a portal to an attuned location. This device will self destruct when all of the charges have been used up.\n<b>IMPORTANT:</b> Everyone must have a Transport Security Card in their inventory to use this portal!": "Небольшое портативное устройство, украшенное аквамаринами, которое может вызвать портал к настроенной локации. Это устройство самоуничтожится, когда все заряды будут использованы.  \n<b>ВАЖНО:</b> У всех в инвентаре должна быть Карта безопасности транспорта, чтобы использовать этот портал!"
"A pleasant beer that strongly takes on the characteristics of its flavoring ingredients.": "Приятное пиво, которое ярко проявляет характеристики своих ароматических ингредиентов."
"A portrait of Khyrulek's young daughter. She's a pale Human child, no more than five years old, and she looks miserable.": "Портрет молодой дочери Хирулека. Она бледный человек, не старше пяти лет, и выглядит несчастной."
"A strangely heavy ring that can predict where danger will come from, and subtly move your body to prevent death.": "Странно тяжёлое кольцо, которое может предсказывать, откуда придёт опасность, и незаметно двигать твоё тело, чтобы предотвратить смерть."
"A pot-holder to protect your hands when moving a hot kettle.": "Прихватка, чтобы защитить руки при переноске горячего чайника."
"Made from the ashes of certain plants, this is useful in glassblowing.": "Изготовлен из золы определённых растений, полезен в стеклодувном деле."
"A raw potato.": "Сырой картофель."
"A plantable potato seedling. So easy that anyone can plant it!": "Саженец картофеля для посадки. Настолько простой, что его может посадить каждый!"
"A very rough alcoholic beverage. Some say you grow to like the taste, but others say that's just your tastebuds dying from the pain.": "Очень крепкий алкогольный напиток. Некоторые говорят, что со временем привыкаешь к вкусу, но другие считают, что это просто твои вкусовые рецепторы умирают от боли."
"Batter-dipped potato wedges.": "Картофельные дольки в кляре."
"Why do acid resistance potions always have to TASTE like acid?": "Почему зелья сопротивления кислоте всегда должны ВКУСОМ напоминать кислоту?"
"A corrosive alchemical liquid with many common uses.": "Коррозийная алхимическая жидкость с множеством распространённых применений."
"It's either very cold or very warm to the touch... it's hard to tell which.": "На ощупь либо очень холодное, либо очень тёплое... трудно понять, что именно."
"A thin fluid used to create augmentation oils (for level 60 effects).": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 60 уровня)."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 2' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 2», чтобы установить эту турель.)"
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 4 ability.": "Небольшой острый клинок, покрытый густой черной слизью. Этот предмет используется способностью Отравленный клинок 4."
"Recovers 20 power per second for 30 seconds.": "Восстанавливает 20 энергии в секунду в течение 30 секунд."
"This tasty beverage helps you digest cheese.": "Этот вкусный напиток помогает переваривать сыр."
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 2' ability on your ability side-bar to actually throw this bomb!)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 2» на панели способностей, чтобы действительно бросить эту бомбу!)"
"This potion can teach you what it's like to have fluid stone instead of skin. It's an unpleasant sensation but its combat efficacy is impressive.": "Это зелье может научить вас ощущать себя так, будто вместо кожи у вас текучий камень. Это неприятное чувство, но его эффективность в бою впечатляет."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade 2 ability.": "Небольшой острый клинок, покрытый токсичной слизью, особенно смертельной для волков и ликантропов. Этот предмет используется в способности Клинок с волчьей отравой 2."
"Useful primarily to mages, this apple-flavored potion causes explosions to be a little more particular about what they hit.": "Полезно в первую очередь для магов, это яблочное зелье заставляет взрывы быть немного более точными в выборе цели."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like wet cardboard.": "Зелье с отложенным действием, которое сложно использовать в стрессовых ситуациях, а на вкус напоминает влажный картон."
"A delayed-action potion which is tricky to use in stressful situations, and also tastes like bile.": "Зелье с отложенным действием, которое сложно использовать в стрессовых ситуациях, а ещё оно на вкус как желчь."
"Most people can't tell that this does anything at all. But it does have magic. Just not very good magic.": "Большинство людей не заметят, что оно вообще что-то делает. Но в нём есть магия. Просто не очень хорошая магия."
"A time-bending drink that allows one to perceive fairies before they exist.": "Напиток, искажающий время, позволяющий видеть фей до их появления."
"Watery and extremely ineffective.": "Водянистое и крайне неэффективное."
"This potion alters your eyes so they work better when there's not much light. It's an ancient recipe that's quite effective, but the revolting taste has kept it from becoming too popular.": "Это зелье изменяет ваши глаза, чтобы они лучше видели при слабом освещении. Это древний рецепт, который довольно эффективен, но отвратительный вкус не позволил ему стать слишком популярным."
"A syrup of exotic tree seeds that will better attune your senses to the plant realm.": "Сироп из экзотических семян деревьев, который лучше настроит ваши чувства на растительный мир."
"This was obviously intended to be a Potion of Universal Resistance, but the ingredients were added in the wrong order, resulting in a revolting soup with an unpredictable effect.": "Это явно должно было быть Зельем универсального сопротивления, но ингредиенты были добавлены в неправильном порядке, в результате чего получился отвратительный суп с непредсказуемым эффектом."
"An extremely secret formula used by ratkin sages to predict when and where rodents will appear.": "Крайне секретная формула, используемая мудрецами крысолюдей для предсказания времени и места появления грызунов."
"This potion helps you think like an animal. If you have an animal companion this lets you communicate a bit more efficiently.": "Это зелье помогает вам мыслить как животное. Если у вас есть животный спутник, оно позволяет общаться с ним немного эффективнее."
"Created by some very clever divination scholars in Statehelm, drinking this potion lets you detect where undead monsters will spawn a few seconds before they do.": "Создано некоторыми очень умными учёными-ворожей в Стейтхелме, выпив это зелье, вы сможете обнаруживать, где через несколько секунд появятся неживые монстры."
"A thick black paste that requires an iron stomach to drink. If you can keep it down, the potion protects from all types of damage, and even better, it can be combined with potions that protect against specific damage types.": "Густая чёрная паста, которую нужно уметь пить с железным желудком. Если вам удастся её проглотить, зелье защищает от всех видов урона, а ещё лучше — его можно сочетать с зельями, защищающими от конкретных типов урона."
"A piece of an old clay pot. It might fetch a few coins from a vendor if you make up a history for this piece of junk.": "Кусок старого глиняного горшка. Если придумать историю для этого хлама, его можно продать торговцу за несколько монет."
"This strangely-weighted punching weapon requires skill to use, but is quite deadly in the right hand.": "Это странно взвешенное ударное оружие требует умения в обращении, но в правильной руке оно весьма смертоносно."
"Records the location of metal that can be mined, somewhere around Povus.": "Фиксирует местоположение металла, который можно добыть где-то вокруг Повуса."
"Records the location of a large mineral deposit in Povus.": "Фиксирует местоположение крупного месторождения полезных ископаемых в Повусе."
"Absurdly strong orcish coffee. Drunk before battle, or after battle, but never for its taste. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Невероятно крепкий орочий кофе. Пьют перед боем или после боя, но никогда из-за вкуса. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This strain of gur-horta is relatively weak, making it a poor choice for refining into combat potions. However, it's popular among orcs that smoke the leaves recreationally due to its mellow taste and low side-effects.": "Этот сорт гур-хорта относительно слабый, поэтому он плохо подходит для создания боевых зелий. Однако он популярен среди орков, которые курят листья для удовольствия из-за их мягкого вкуса и слабых побочных эффектов."
"An orcish ragant with a very Povus flair.": "Оркский рагант с ярким стилем Повуса."
"Dye used to color a piece of clothing or armor powder blue.": "Краситель, используемый для окрашивания одежды или брони в пудрово-голубой цвет."
"The desiccated remains of a small animal that was caught and partially digested by a carnivorous plant or giant spider or something horrible like that.": "Высушенные останки маленького животного, пойманного и частично переваренного хищным растением или гигантским пауком, или чем-то ужасным в этом роде."
"Recovers 50 power.": "Восстанавливает 50 силы."
"Recovers 75 power.": "Восстанавливает 75 силы."
"Recovers 100 power.": "Восстанавливает 100 силы."
"Recovers 150 power.": "Восстанавливает 150 силы."
"Recovers 200 power.": "Восстанавливает 200 силы."
"A dwarven design coated in multiple power-containment gems, this is no beauty, but it packs a lot of power.": "Гномий дизайн, покрытый несколькими самоцветами для сдерживания силы, это не красавец, но обладает большой мощью."
"Very sweet, sludgy, vaguely plant-flavored.": "Очень сладкий, вязкий, с едва уловимым растительным вкусом."
"A beginner's crossbow.": "Арбалет для начинающих."
"This box can grow multiple crops of mushrooms.\nBox Duration: 12 hours\nGrow Time: 25% slower per crop\nXP: +33% more per mushroom": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 12 часов\\nВремя роста: на 25% дольше за каждый урожай\\nОпыт: на 33% больше за каждый гриб"
"This box can grow multiple crops of mushrooms.\nBox Duration: 24 hours\nGrow Time: 25% slower per crop\nXP: +33% more per mushroom": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 24 часа\\nВремя роста: на 25% дольше за каждый урожай\\nXP: на 33% больше за каждый гриб"
"This box can grow multiple crops of mushrooms.\nBox Duration: 48 hours\nGrow Time: 25% slower per crop\nXP: +33% more per mushroom": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 48 часов\\nВремя роста: на 25% дольше за каждый урожай\\nОпыт: на 33% больше за каждый гриб"
"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nGrow Time: 25% slower per crop\nXP: +33% more per mushroom": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 72 часа\\nВремя роста: на 25% дольше за каждый урожай\\nXP: на 33% больше за каждый гриб"
"It's an official letter from Praetor Ballard, demanding that a Human named Charles Thompson leave Serbule's surroundings forever... or face death.": "Это официальное письмо от Претора Балларда, требующее, чтобы человек по имени Чарльз Томпсон навсегда покинул окрестности Сербуля... или встретил смерть."
"Meant to prank your friends, these bombs don't explode. They are rightly disdained by most sentient persons.": "Предназначены для розыгрышей друзей, эти бомбы не взрываются. Их справедливо презирают большинство разумных существ."
"It doesn't SEEM like it's made from the hides of prarie dogs that wre sacrificed to Urtigal in a profane ceremony centuries ago... (But it is.)": "Кажется, что она не сделана из шкур луговых собачек, принесённых в жертву Уртигалу в кощунственной церемонии столетия назад... (Но это так.)"
"A bundle of 1000 arrow fletchings for amazing and astonishing arrows.": "Пучок из 1000 оперений для стрел, создающих удивительные и поразительные стрелы."
"Tools for refining the balance and movement of weapons. Includes restringing kit.": "Инструменты для улучшения баланса и подвижности оружия. Включает набор для перетяжки."
"Apparently this starfish is especially problematic to local fish.": "По-видимому, эта морская звезда особенно доставляет проблемы местным рыбам."
"A bundle of 1000 arrow fletchings for basic and advanced arrows.": "Пучок из 1000 оперений для простых и улучшенных стрел."
"This thick-handled bow gives tiny psychic cues to the owner, helping it aim perfectly. Some inherently psychic individuals can further take advantage of this mental amplification.": "Этот лук с толстой рукояткой посылает владельцу небольшие психические сигналы, помогая прицеливаться идеально. Некоторые врождённо психические личности могут дополнительно использовать это умственное усиление."
"A small piece of bone inscribed with a dwarven rune for eternal sleep. It doesn't look very useful to you.": "Небольшой кусочек кости с гномьей руной вечного сна. Кажется, это не очень полезно для вас."
"These could be worn as small bracelets were it not for the extreme pain they cause when in contact with flesh. They emit a continuous shock.": "Их можно было бы носить как маленькие браслеты, если бы не сильная боль, которую они вызывают при соприкосновении с плотью. Они излучают постоянный разряд."
"It tastes like orange juice! Kind of!": "На вкус как апельсиновый сок! В некотором роде!"
"Can be studied to earn Priest XP. (Requires VIP.)": "Можно изучать для получения опыта жреца. (Требуется VIP.)"
"Teaches you a priest combat technique.": "Обучает вас боевой технике жреца."
"Teaches you a priest technique for dealing with undesirables.": "Обучает технике жреца для борьбы с нежелательными элементами."
"A sweet brown cheese made with sour cream.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкий коричневый сыр, приготовленный со сметаной.\n\nТип сыра: Сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"It's a lumpy stick, but it's had the splinters removed.": "Это сучковатая палка, но из неё удалили занозы."
"While not the nicest way to prepare cocoa beans, this is useful for some recipes.": "Хотя это не самый лучший способ приготовления какао-бобов, он полезен для некоторых рецептов."
"Sharpened bone \"blades\" protrude from this off-hand martial weapon. It's silly looking, but dangerous!": "Заточенные костяные «лезвия» выступают из этого оружия ближнего боя в свободной руке. Выглядит смешно, но опасно!"
"A simple wooden table that can be installed in a home or guild hall.": "Простой деревянный стол, который можно установить в доме или гильдейском зале."
"A magical token that allows access to the lower levels of the Anagoge Records Facility.": "Магический жетон, позволяющий получить доступ к нижним уровням Архива Анагоге."
"Fine-tuned for clubbing.": "Отточена для боя дубиной."
"Common professional-grade racing tack.": "Обычная профессиональная гоночная амуниция."
"A pro-quality racing saddle.": "Гоночное седло профессионального качества."
"While arguably not as effective as a super-sharp normal sword, Prognek's flaming design is fun for pyromaniacs.": "Хотя, возможно, он и не так эффективен, как сверхострый обычный меч, огненный дизайн Прогнека доставит удовольствие пироманам."
"A scaled ring with a swirling crystal centerpiece.": "Кольцо с чешуйчатой текстурой и вихревым кристаллом в центре."
"Hey, this isn't a real skull! It's wood that's been painted to resemble stone. Or perhaps bone.": "Эй, это не настоящий череп! Это дерево, окрашенное так, чтобы походить на камень. Или, возможно, на кость."
"This key fell out of a fake skull. The cuts in the key are clearly decorative; if this opens anything at all, it wouldn't be a normal chest. Probably magic.": "Этот ключ выпал из поддельного черепа. Насечки на ключе явно декоративные; если он что-то и открывает, то это не обычный сундук. Вероятно, магический."
"Designed to fit over leather gloves, these brass knuckles have nasty bumps to make your punches cause extra injury.": "Созданные для ношения поверх кожаных перчаток, эти латунные кастеты имеют острые выступы, чтобы ваши удары причиняли дополнительный урон."
"A pulled-curd cheese with a slightly rubbery, very bland taste.\n\nCheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр с тянущейся структурой, слегка резиновым и очень пресным вкусом.\n\nТип сыра: Тянущийся (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A mantis invention: watered-down gin, fruit-flavored rum, and 'secret flavorings' which are probably just mint. A casino favorite! ... because it's usually free. (This mixed drink is treated as a beer/wine.)": "Изобретение богомола: разбавленный джин, фруктовый ром и «секретные ароматизаторы», которые, вероятно, просто мята. Любимый напиток казино! ... потому что обычно его дают бесплатно. (Этот коктейль считается пивом/вином.)"
"Pickled brain chunks with real bits of apple and just a tinge of dirt.": "Маринованные кусочки мозга с настоящими яблочными кусочками и легким оттенком земли."
"A slightly sentient fungal mat that fits under a psychic mantis's top hat. It can also be worn without a hat if you're uncultured.": "Слегка разумный грибной коврик, который помещается под цилиндр психического богомола. Его также можно носить без шляпы, если вы не слишком утончённы."
"A terrible-smelling liquid that actually only tastes unpleasant, not terrible.": "Жутко пахнущая жидкость, которая на самом деле просто неприятна на вкус, но не ужасна."
"Can be studied to earn Psychology XP. (Requires VIP.)": "Можно изучать для получения опыта в психологии. (Требуется VIP.)"
"Teaches you a psychology technique.": "Обучает технике психологии."
"An unnaturally cold crystal.": "Неестественно холодный кристалл."
"A rich, dense, slightly sweet bread.": "Плотный, насыщенный, слегка сладковатый хлеб."
"A nice round gourd full of mushy stuff.": "Красивая круглая тыква, полная мягкой мякоти."
"A festive banner with a pumpkin displayed proudly upon it.": "Праздничное знамя с гордо изображённой на нём тыквой."
"A fall treat. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Осеннее лакомство. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A tasty vegan snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная веганская закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Uses the sweetness of pumpkin and cinnamon to flavor basic pancakes. No syrup needed.": "Использует сладость тыквы и корицы, чтобы придать вкус обычным блинчикам. Сироп не нужен."
"Fresh-tossed!": "Свежеприготовленный!"
"A plantable pumpkin seedling.": "Саженец тыквы, который можно посадить."
"A thick seasonal drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Густой сезонный напиток. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A warm nourishing meal.": "Тёплое питательное блюдо."
"A seasonal drink with an intoxicating aroma and a surprising kick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сезонный напиток с опьяняющим ароматом и неожиданным эффектом. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A delicious seasonal tea. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный сезонный чай. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Classic creamy tomato soup with cubes of roasted pumpkin.": "Классический кремовый томатный суп с кубиками запечённой тыквы."
"Warm and fresh and tastes like autumn. And sugar!": "Тёплое и свежее, на вкус как осень. И сахар!"
"Powdered brains of psychic creatures. A choice drug for psychics. This batch is 99% pure frontal cortex.": "Порошок из мозга психических существ. Излюбленное средство для психиков. Эта партия содержит 99% чистой лобной коры."
"Velkort's masterpiece. Apparently the most difficult potion he's ever concocted. It tastes like beetle urine and it smells like burnt toast, and if you shake it too hard, you might blow up the countryside. But aside from those quirks... a masterpiece.": "Шедевр Велкорта. По-видимому, самый сложный эликсир, который он когда-либо создавал. На вкус напоминает жучью мочу, а пахнет горелым тостом, и если сильно его взболтать, можно взорвать всю округу. Но несмотря на эти причуды... настоящий шедевр."
"The enchanted and ground-up pineal glands of intelligent creatures. No syrup added, just pure pineal juice.": "Зачарованные и измельчённые шишковидные железы разумных существ. Без добавления сиропа, только чистый сок шишковидной железы."
"Purified essence of a demon. If you hold it in your hand, you can hear a low hum.\n\nConsuming this essence will cure you of all Hellfire currently infesting your body. This includes Lesser, normal, and Greater Hellfire.": "Очищенная сущность демона. Если держать её в руке, можно услышать тихое гудение.\\n\\nПоглощение этой сущности излечит вас от всей адской плоти, которая в данный момент поражает ваше тело. Это включает в себя Меньшую, обычную и Великую адскую плоть."
"Dye used to color a piece of clothing or armor purple.": "Краска, используемая для окрашивания одежды или брони в пурпурный цвет."
"Makes you PvP for testing.": "Позволяет участвовать в PvP для тестирования."
"Makes you PvP-flagged for a half hour. You can attack other players who are also PvP-flagged.": "Делает вас помеченным для PvP на полчаса. Вы можете атаковать других игроков, которые также помечены для PvP."
"Makes you PvP for an hour.": "Делает вас участником PvP на час."
"A chunk of fool's gold. It has many alchemical uses, and is great for making costume jewelry. It is often used in formulas that augment jewelry.": "Кусок лжезолота. Имеет множество алхимических применений и отлично подходит для изготовления театральных украшений. Часто используется в формулах, усиливающих украшения."
"The bloody skin of a majestic animal.": "Кровавая шкура величественного животного."
"Mass-produced by competent artisans, there is nothing special -- or especially wrong -- about this lute.": "Массово произведённая умелыми ремесленниками, эта лютня не имеет ничего особенного — и ничего особенно плохого."
"Well-made boots with significant armor.": "Хорошо сделанные сапоги с значительной бронёй."
"A simple bow that can pack a lot of punch for its size.": "Простой лук, который может нанести сильный удар для своего размера."
"Strong armor with a strong statement to make: \"I like red!\"": "Прочная броня с ярким посылом: «Мне нравится красный!»"
"Somewhere between a foul odor and a pleasant one, this amps your adrenal system for fighting.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Где-то между отвратительным и приятным запахом, этот аромат стимулирует вашу адреналиновую систему для боя.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x8.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 8 раз."
"This simple fist weapon will make your punches hurt more.": "Это простое кулачное оружие сделает ваши удары сильнее."
"Protective and reasonably comfortable chainmail.": "Защитный и достаточно удобный кольчужный доспех."
"This coif features precision chainwork and a clever pattern that keeps the wearer's vision-lines clear.": "Этот капюшон выполнен с точной цепной работой и умным кроем, который сохраняет линии зрения носителя свободными."
"These gloves feature precision chainwork by an experienced maker.": "Эти перчатки выполнены с точной кольчужной работой опытного мастера."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +21 for 30 minutes.": "Удобный стул. Отдых в нем увеличивает восстановление брони на +21 на 30 минут."
"A lovely weapon, marred perhaps by its unsightly acid-flinging mechanism.": "Прекрасное оружие, возможно испорченное своим непривлекательным механизмом для брызгания кислотой."
"A skilled metalsmith put this left-handed fighting claw together. It's a little uncomfortable to wear, though.": "Опытный кузнец собрал этот леворукий боевой коготь. Однако носить его немного неудобно."
"Good thread count. Sturdy crotch support. A little stiff, but to be expected for such a resilient pair of pants.": "Хорошее количество нитей. Прочный шаговый шов. Немного жестковаты, но это ожидаемо для такой прочной пары штанов."
"Pretty high quality. Good thread count, decent coloration, not too tight. Good stuff.": "Довольно высокого качества. Хорошая плотность нитей, приличная окраска, не слишком тесная. Хорошая вещь."
"Polished and weighted with care and attention to detail.": "Отполирована и взвешена с заботой и вниманием к деталям."
"Reinforced and quite sturdy. The weight distribution is slightly off because of the added metal, but it's hardly noticeable. The Fire Magic runes were burned through the metal, creating a neat tactile sensation.": "Усиленный и довольно прочный. Распределение веса немного смещено из-за добавленного металла, но это едва заметно. Руны Огненной магии были выжжены через металл, создавая приятное тактильное ощущение."
"Made from a conch shell.": "Сделана из раковины морской улитки."
"Nice cow shoes!": "Хорошие коровьи ботинки!"
"Good craftmanship.": "Хорошее мастерство изготовления."
"Comfortable shoes that make a violent deer feel free as the wind.": "Удобные ботинки, которые заставляют буйного оленя чувствовать себя свободным, как ветер."
"A simple off-hand knife that's been crafted to exacting standards.": "Простой нож в свободной руке, изготовленный по строгим стандартам."
"Quality stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Качественная вещь! Это те самые сапоги уклонения, которые можно увидеть в витрине магазина, если бы существовал магазин, специализирующийся именно на сапогах уклонения, а его нет."
"Stylish, highly mobile, and almost-but-not-quite comfortable leather pants.": "Стильные, очень мобильные и почти, но не совсем удобные кожаные штаны."
"A pro made this leather armor, and aside from some unusual choices in tailoring, there's not much to complain about.": "Этот кожаный доспех сделан профессионалом, и кроме некоторых необычных решений в крое, жаловаться особо не на что."
"A potent floral scent that features red roses plucked at the height of their crimson yearning. Or so it smells.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Сильный цветочный аромат с нотками красных роз, сорванных в разгар их алой страсти. По крайней мере, так пахнет.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"These gloves have a quality, and that quality is adequateness.": "Эти перчатки обладают качеством, и это качество — достаточность."
"This is a nice helmet.": "Это хороший шлем."
"Quality horseshoes for quality horses.": "Качественные подковы для качественных лошадей."
"A very simple elven-style hunting bow.": "Очень простой охотничий лук в эльфийском стиле."
"These boots are pretty nice to wear, and seem like they'll last a long time, too.": "Эти сапоги довольно удобные, и кажется, что они прослужат долго."
"These gloves were made by someone with a keen sense of anatomy, allowing a full range of motion.": "Эти перчатки были сделаны кем-то с тонким пониманием анатомии, что позволяет полную свободу движений."
"Good materials and great craftsmanship combine in a helmet that breathes easy and protects from nearly any injury.": "Хорошие материалы и отличное мастерство сочетаются в шлеме, который хорошо дышит и защищает почти от любых травм."
"Stylish, protective, and almost-but-not-quite comfortable.": "Стильные, защитные и почти, но не совсем удобные."
"This is some quality leather.": "Это качественная кожа."
"This looks great! Very professional. And moderately comfortable, too!": "Выглядит отлично! Очень профессионально. И довольно удобно тоже!"
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x8.": "Одноразовый табурет для медитации. Используйте его рядом с Медитационной колонной, чтобы увеличить длительность эффектов медитации в 8 раз."
"Reinforced and quite sturdy. The weight distribution is slightly off because of the added metal, but it's hardly noticeable. This staff will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.": "Усиленный и довольно прочный. Распределение веса немного смещено из-за добавленного металла, но это едва заметно. Этот посох хорошо подойдет для боя посохом, но не имеет рун, необходимых для Огненной магии."
"A lovely shell that's perfect for bardic performances.": "Прекрасная раковина, идеально подходящая для бардовских выступлений."
"A bulging bag that's always slightly warm to the touch.": "Набитая сумка, которая всегда слегка тёплая на ощупь."
"Carved from a ram's horn by an artisan in Statehelm.": "Вырезана из рогов барана мастером в Стейтхелме."
"The \"quality\" in the title refers to the defensive merits, not the fashion statement.": "\"Качество\" в названии относится к защитным свойствам, а не к модному заявлению."
"The Six Names of Arisetsu are etched in Elvish into this lovely wooden staff.": "Шесть Имен Арисецу выгравированы на эльфийском языке на этом прекрасном деревянном посохе."
"Typical winter gear for acolytes of Ri-Shin. (Well, the ones that need clothes, anyway.)": "Типичная зимняя одежда для послушников Ри-Шина. (Ну, по крайней мере, для тех, кому вообще нужна одежда.)"
"Some sort of hempen material stuffed with strange leaves. Itchy.": "Какой-то конопляный материал, набитый странными листьями. Зудит."
"This one is pretty nice.": "Это довольно хорошее седло."
"This saddlebag has lots of pockets!": "У этой седельной сумки много карманов!"
"\"You'll look protected yet stylish with the latest quality shield from Helena's Quality Killsuits.\"": "\"Вы будете выглядеть защищённым и стильным с новейшим щитом высокого качества от Килсьютов Хелены.\""
"This was made by an advanced apprentice, perhaps. While not a masterpiece, it avoids all the classic blunders of staff-making.": "Возможно, это сделал продвинутый ученик. Хотя это не шедевр, он избегает всех классических ошибок при изготовлении посохов."
"A box for storing up to 20 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 20 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют игроку получать доступ к одним и тем же предметам.)"
"This sword is sharp. Really sharp. As sharp as you can probably get without imbuing it with magic.": "Этот меч острый. Очень острый. Настолько острый, насколько это возможно без наложения магии."
"A compound that contains tannic acid. It can be used to create nice and quality leather.": "Соединение, содержащее таниновую кислоту. Используется для создания красивой и качественной кожи."
"A professional-looking winter coat with heavy insulation.": "Профессиональное зимнее пальто с плотным утеплителем."
"Professional-looking winter gloves with heavy insulation.": "Профессиональные зимние перчатки с плотным утеплителем."
"Professional-looking winter hoodwith heavy insulation.": "Профессиональный зимний капюшон с плотным утеплителем."
"Made by someone with decent working knowledge of wood, these seem fairly comfortable if you have hooves for feet.": "Сделаны кем-то с приличными навыками работы с деревом, эти ботинки кажутся довольно удобными, если у вас копыта вместо ног."
"A pleasant smell that evokes the forest without burying you in it.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Приятный запах, вызывающий воспоминания о лесу, но не погружающий в него.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A small metal band used in making casks.": "Небольшая металлическая лента, используемая для изготовления бочек."
"A small piece of white quartz. High-quality pieces like this one can amplify elemental magic.\n\nAssociated Primary Skill: Fire Magic": "Небольшой кусок белого кварца. Высококачественные куски, такие как этот, могут усиливать стихийную магию.\n\nСвязанный основной навык: Огненная магия"
"This is great for making bottles.": "Отлично подходит для изготовления бутылок."
"It smells awful and it leaves your tongue completely numb. So that's something.": "Пахнет ужасно и полностью онемяет язык. Ну, это уже что-то."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to rabbits when used in crafting.": "Красивый самоцвет с тёмно-зелёными полосами, хорошо известный тем, что помогает в магической коммуникации. Этот конкретный самоцвет был насыщен руной, которая настраивает его на кроликов при использовании в ремесле."
"The meat of a large-sized rabbit. (Use in Cheap Meat recipes.)": "Мясо крупного кролика. (Используется в рецептах дешёвого мяса.)"
"Can be studied to earn Rabbit XP. (Requires VIP.)": "Можно изучать для получения опыта Кролика. (Требуется VIP.)"
"These carrot-flavored biscuits seem to be just as good as real carrots... to rabbits. They're pretty terrible-tasting to everybody else. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Эти печенья со вкусом моркови, похоже, так же хороши, как настоящая морковь... для кроликов. Для всех остальных они на вкус довольно ужасные. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The bloody forelimb of a rabbit. It smells.": "Кровавый передний лапа кролика. От неё пахнет."
"Teaches you a rabbit fighting technique.": "Обучает технике боя кроликом."
"Attaching this enchanted medal to your gear will boost your mount's bravery during races... If it doesn't explode during installation.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой зачарованной медали к вашему снаряжению повысит храбрость вашей ездовой животного во время гонок... Если она не взорвётся при установке.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this enchanted medal to your gear will boost your mount's maximum land speed during races. Or it'll explode your gear.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой зачарованной медали к вашему снаряжению увеличит максимальную скорость вашего скакуна на суше во время гонок. Или взорвет ваше снаряжение.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this enchanted medal to your gear will boost your mount's jumping capability during races... If it doesn't explode during installation, that is.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой зачарованной медали к вашему снаряжению повысит способность вашей ездовой животного прыгать во время гонок... Если она не взорвётся при установке, конечно.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this enchanted medal to your gear will boost your learning from races. Or it will explode during installation.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой зачарованной медали к вашему снаряжению увеличит получаемый опыт от гонок. Или взорвётся при установке.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this medal to your gear will make your mount slightly braver during races.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой медали к вашему снаряжению сделает вашу ездовую животное немного смелее во время гонок.\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"Attaching this medal to your gear will boost your mount's jumping capability during races.\n\nThis item is attached to Reins or a Saddle via a recipe. Using this item will teach you the recipe if necessary.": "Прикрепление этой медали к вашему снаряжению повысит способность вашей ездовой животного прыгать во время гонок.  \n\\n\\nЭтот предмет прикрепляется к поводьям или седлу по рецепту. Использование этого предмета научит вас рецепту, если это необходимо."
"A semi-firm cheese used in making a dish by the same name.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Полутвердый сыр, используемый для приготовления блюда с тем же названием.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Makes your attacks generate 25% less Rage, preventing enemies from using their Rage attacks as often.": "Ваши атаки генерируют на 25% меньше ярости, что препятствует частому использованию врагами их атак ярости."
"Makes your attacks generate 50% less Rage, preventing enemies from using their Rage attacks as often.": "Уменьшает генерацию ярости от ваших атак на 50%, предотвращая слишком частое использование врагами их атак ярости."
"Makes your attacks generate double Rage in enemies, allowing them to use their Rage attacks more often. Popular among assholes and masochists.": "Заставляет ваши атаки генерировать в два раза больше Ярости у врагов, позволяя им чаще использовать свои атаки Ярости. Популярна среди засранцев и мазохистов."
"An orcish concoction that uses your anger to keep you warm.": "Орочье зелье, использующее твою ярость, чтобы согреть тебя."
"Delicious long-grain rice, as prepared in Rahu.": "Вкусный длиннозерный рис, приготовленный по рецепту Раху."
"Worn to high-society functions by the elite of Rahu, these lovely gloves are also fairly comfortable.": "Носимые элитой Раху на светских мероприятиях, эти прекрасные перчатки также довольно удобны."
"This coin is made of Xogrite, a metal known only among the rakshasa. It is used by the city of Rahu to pay trade debts.": "Эта монета сделана из Зогрита, металла, известного только среди ракшасов. Она используется городом Раху для оплаты торговых долгов."
"A transferrable day-pass to visit the parts of Rahu that are usually off-limits to tourists. While this permit lasts, the citizens of Rahu will not attack you and shopkeepers will generally be willing to deal with you. The pass becomes invalidated if you attack any Rahu citizen, and the plateau where the Onkara train is still off-limits.": "Передаваемый дневной пропуск для посещения частей Раху, обычно закрытых для туристов. Пока действует этот пропуск, жители Раху не будут нападать на вас, а торговцы, как правило, будут готовы с вами торговаться. Пропуск становится недействительным, если вы нападёте на любого жителя Раху, а плато, где находится поезд Онкара, по-прежнему закрыто."
"A special token from Raim to barter for a special advanced item.": "Особый талисман от Райма для обмена на особый продвинутый предмет."
"Sweet and fruity fish-on-a-stick.": "Сладкая и фруктовая рыба на палочке."
"A hacked-off piece of a rakshasa's ear.": "Отрубленная часть уха ракшасы."
"Made by an expert craftsman in Rahu. The body is imported hardwood, the strings are high-quality grimalkin gut, and the unusual enchantments give it a deep luxurious sound quality. Not for beginners!": "Изготовлена опытным мастером в Раху. Корпус выполнен из импортной твердой древесины, струны — из высококачественной кишки грималкин, а необычные чары придают глубокое роскошное звучание. Не для новичков!"
"It's about nature. It's boring and it doesn't even rhyme.": "Это о природе. Скучно и даже не рифмуется."
"The preserved skull of a rakshasa.": "Сохранённый череп ракшасы."
"This is the latest masterpiece of rakshasa leatherworking, designed to replace the old Ravana armor they can no longer create. In many ways, this surpasses anything from their homeworld, a testament to rakshasa skill... and the toughness of beasts in Alharth.": "Это новейший шедевр кожевенного дела ракшаси, созданный чтобы заменить старую броню Раваны, которую они больше не могут изготовить. Во многих отношениях он превосходит всё, что есть в их родном мире, свидетельствуя о мастерстве ракшаси... и выносливости зверей Альхарта."
"Activate this gross beacon in a certain place to let ranalon know it's time to invade.": "Активируйте этот отвратительный маяк в определённом месте, чтобы дать Раналону знать, что пора вторгаться."
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.)": "Стандартный многофункциональный нож Раналон, который также является опасным оружием. (Используется как нож для устриц.)"
"The work of a master stoneshaper, this key is a miniature work of art. It may unlock something somewhere, but even if not, it's an interesting curio.": "Работа мастера камнетесов, этот ключ — миниатюрное произведение искусства. Он может что-то открыть где-то, а если нет, то всё равно представляет собой интересную диковинку."
"With a bewildering aroma and a barrage of different textures, this ranalon favorite is exotic and delicious... although it does take some getting used to.": "С загадочным ароматом и множеством разных текстур, это любимое блюдо раналонов экзотично и вкусно... хотя к нему нужно привыкнуть."
"A heavy container that's been magically sculpted from stone. It's far too cumbersome to be practical, but it makes a nice curio.": "Тяжёлый сосуд, магически вырезанный из камня. Он слишком громоздкий, чтобы быть практичным, но служит хорошим украшением."
"A common ranalon weapon that doubles as a multi-purpose tool. Ranastaves are sturdy enough to dig with and resilient enough to survive earth-magic being cast through them.": "Обычное оружие раналонов, которое также служит многофункциональным инструментом. Ранаставы достаточно крепкие, чтобы копать, и достаточно выносливые, чтобы выдерживать магию земли, проходящую через них."
"A bottle of squid ink that's gone bad. It's leaking from the top.": "Бутылка кальмаровых чернил, которые испортились. Они протекают сверху."
"A Veilmoor clan promotional weapon. The blade psychically screams on contact with enemies.": "Рекламное оружие клана Вейлмур. Клинок психически вопит при контакте с врагами."
"The tail of a large rat.": "Хвост большой крысы."
"A broken-off part of a giant rat's tooth.": "Оторванная часть зуба гигантской крысы."
"The invention of a rakshasa alchemist who loved her pet. This flask's magic helps to alert pets when their owner is in danger.": "Изобретение алхимика-ракшасы, который любил своего питомца. Магия этой фляги помогает предупреждать питомцев, когда их хозяин в опасности."
"A list of gear brought on a long expedition. The paper is very old, but not antique-level old.": "Список снаряжения, взятого в долгое путешествие. Бумага очень старая, но не до уровня антиквариата."
"A belt for tricky poisoners.": "Пояс для хитрых ядовитых убийц."
"Dried but not dead, this exotic mold will spring to life when used in cheesemaking.": "Высушенная, но не мёртвая, эта экзотическая плесень оживёт при использовании в сыроварении."
"A weapon made by a ratkin martial artist. It fits poorly to other races' hands, but it's nothing a little adhesive can't fix.": "Оружие, созданное боевым искусством крысолюдов. Плохо подходит для рук других рас, но это легко исправить с помощью небольшого клея."
"A weapon whose appearance belies the skill of the ratkin crafter. Making a blade this sharp out of junk metal isn't easy.": "Оружие, чьё внешнее оформление не выдаёт мастерство кузнеца крысолюдов. Сделать такое острое лезвие из хлама — непростая задача."
"A sneaky ratkin weapon designed for poison use.": "Хитрое оружие крысолюдов, предназначенное для использования с ядом."
"Carefully tailored to the eyes of a ratkin, these are worn when a ratkin must go outside during bright sun. The lenses are made of blue glass.": "Тщательно подогнанные под глаза крысолюдей, эти очки надевают, когда крысолюд должен выйти на яркое солнце. Линзы сделаны из синего стекла."
"A weapon made by ratkin martial artists. Ratkins are renowned for their use of poison.": "Оружие, созданное боевыми мастерами крысолюдей. Крысолюди известны своим использованием яда."
"A hunk of glass on a string. It's nothing to look at, but obviously enchanted.": "Кусок стекла на шнурке. На вид ничего особенного, но явно зачарован."
"A hefty tool that doubles as a deadly weapon.": "Тяжёлый инструмент, который также служит смертоносным оружием."
"Foul-smelling and poorly-maintained, yet quite dangerous. Like ratkin homes.": "Вонючий и плохо ухоженный, но довольно опасный. Как и дома крысолюдов."
"A weird symbol carved into a strange metal.": "Странный символ, вырезанный на необычном металле."
"Ratkin have used this to smoke rattus root and tobacco.\n\n(It's a pipe made out of pipes, but note that its name isn't a pun as far as ratkin are concerned, because those two kinds of pipes have completely unrelated words in both Goblinese and Rattic.)": "Крысолюди использовали это для курения корня раттуса и табака.\\n\\n(Это трубка, сделанная из трубок, но отметьте, что её название не является игрой слов для крысолюдей, поскольку эти два вида трубок имеют совершенно разные названия как на гоблинском, так и на крысиных языках.)"
"Originally gifted to ratkin guerillas by the Crone Hegemony, these magic boots have been re-soled and re-leathered several times in the intervening years.": "Изначально подаренные крысоловам-гuerильерам Кроновой Гегемонией, эти магические сапоги несколько раз перешивались и перешивались за прошедшие годы."
"These coats were a gift from the Crone Hegemony to Gob-land guerillas who were trying to free enslaved ratkin. Since the Hegemony is not against slavery in general, it's generally assumed they were just trying to stir up disharmony in the Gob-lands... but perhaps there was an ulterior motive. Anyway, they're still in pretty good shape a decade later.": "Эти пальто были подарком от Гегемонии Старухи партизанам Гоб-земель, которые пытались освободить порабощённых крысолюдов. Поскольку Гегемония в целом не против рабства, обычно считается, что они просто пытались посеять раздор в Гоб-землях... но, возможно, у них была иная скрытая цель. В любом случае, спустя десятилетие они всё ещё в довольно хорошем состоянии."
"Once used by ratkin guerillas, these cowls were later repurposed for cheese-storage, then un-purposed for that and re-repurposed as armor. As a result they smell a lot like cheese, which the ratkin consider a feature.": "Раньше использовался партизанами крысолюдов, затем эти капюшоны перепрофилировали для хранения сыра, потом перестали использовать для этого и снова переоборудовали в доспехи. В результате они сильно пахнут сыром, что крысолюды считают достоинством."
"These were designed for the ratkin by the Crone Hegemony. The crones underestimated how long ratkin fingernails grow, and these gloves are now pretty holey. Still good for punching though.": "Эти перчатки были созданы для крысолюдов Кроновым Гегемонией. Кроны недооценили, насколько быстро растут когти крысолюдов, и теперь эти перчатки довольно дырявые. Но для ударов всё ещё подходят."
"About a million of these enchanted pants were made by the Crone Hegemony for ratkin revolutionaries who said they were going to overthrow their gob-land masters. Ultimately the revolutionaries freed themselves and their friends, then called it quits and traded their armor away.": "Около миллиона этих зачарованных штанов было создано Колдовским Гегемониумом для революционеров крысолюдов, которые заявляли, что собираются свергнуть своих гоблинских хозяев. В итоге революционеры освободили себя и своих друзей, после чего прекратили борьбу и продали свою броню."
"These impressive shields were a gift to the ratkin, designed to be light yet sturdy. The ratkin also use them as plates, hats, and for myriad other things.": "Эти впечатляющие щиты были подарком крысолюдам, разработанным чтобы быть лёгкими, но прочными. Крысолюды также используют их как тарелки, шляпы и для множества других целей."
"A sturdy military weapon made for ratkin. Thanks to impressive magic, it seems undamaged by years of extreme misuse.": "Прочный военный клинок, созданный для крысоловов. Благодаря впечатляющей магии он кажется невредимым после многих лет сурового обращения."
"A belt for creepy summoners.": "Пояс для жутких призывателей."
"Used by ratkin summoners to raise the dead and toss the occasional fireball.": "Используется призывателями крысолюдов для воскрешения мертвых и метания случайных огненных шаров."
"A local ratkin dish that's been adjusted for human tastes.": "Местное крысиное блюдо, адаптированное под человеческий вкус."
"A brined cheese that tastes weirdly floral. Ratkin use this cheese as sustenance in lean times.\n\nCheese Type: Brine (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр в рассоле с необычным цветочным вкусом. Крысолюди используют этот сыр как пищу в трудные времена.\n\nТип сыра: Рассольный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A percussion instrument. Unfortunately it seems this one's been tuned to a hypersonic audio range... it doesn't sound pleasant to you!": "Ударный музыкальный инструмент. К сожалению, кажется, что этот настроен на гиперзвуковой звуковой диапазон... он звучит для вас неприятно!"
"A belt for sneaky hoarders.": "Пояс для хитрых накопителей."
"Designed for a ratkin's tail but also usable by rakshasa, this small yellow ring smells like... cheese? Well, anyway, it stinks.": "Созданное для хвоста крысолюда, но также пригодное для ракшас, это маленькое жёлтое кольцо пахнет... сыром? Впрочем, оно воняет."
"Designed for a ratkin's tail but also usable by rakshasa, this ugly ring makes a soft whistling sound when you move your tail.": "Создано для хвоста крысолюда, но также подходит для ракшас, это уродливое кольцо издаёт мягкий свист при движении хвоста."
"A chalky root with a flowery smell. Chewed by ratkin as a snack, and featured heavily in ratkin cuisine.": "Меловой корень с цветочным запахом. Жуют крысолюди как закуску, и он широко используется в крысолюдской кухне."
"A thin wire ring that smells awful.": "Тонкое проволочное кольцо с ужасным запахом."
"A spicy perfume concocted by humans. A commercial failure at its goal of helping human men woo women, it found new life among solitary huntsmen, foresters, and others (of both sexes) who feel stronger and more bad-ass while wearing it.": "Острый парфюм, созданный людьми. Коммерческий провал в своей цели помочь мужчинам завоевать женщин, он обрел новую жизнь среди одиноких охотников, лесников и других (обоих полов), которые чувствуют себя сильнее и круче, когда носят его."
"When thousands of Rakshasa warriors arrived on Alharth, they wore boots like these, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Когда тысячи воинов Ракшаса прибыли в Алхарт, они носили такие сапоги, созданные для любых условий. Секрет их изготовления утрачен для ныне живущих здесь Ракшаса."
"When thousands of Rakshasa warriors arrived on Alharth, they wore suits of armor like this, designed to accommodate all environments. The secret to their crafting is lost to the Rakshasa living here now.": "Когда тысячи воинов Ракшаса прибыли в Алхарт, они носили доспехи, подобные этому, созданные для любых условий. Секрет их изготовления утерян для Ракшаса, живущих здесь сейчас."
"Supposedly used by the Rakshasa forces that first arrived on Alharth, this weird weapon is definitely not typical.": "Предположительно использовался силами ракшасов, которые первыми прибыли в Алхарт, это странное оружие определённо нетипично."
"This is a fake: Ravana soldiers did not wear shields when they arrived on Alharth. This shield is a masterpiece made in the style of their armor.": "Это подделка: солдаты Раваны не носили щиты, когда прибыли в Алхарт. Этот щит — шедевр, выполненный в стиле их доспехов."
"You become a raven. Use the Move Up key to fly. Your attacks will do negligible damage. But you can fly, so that's something.": "Вы превращаетесь в ворона. Используйте клавишу «Вверх» для полёта. Ваши атаки будут наносить незначительный урон. Но вы можете летать, а это уже кое-что."
"A plucked chicken.": "Ободранная курица."
"This is just some raw eggs in a glass, blended with a little milk. Gross. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Это просто сырые яйца в стакане, взбитые с небольшим количеством молока. Фу. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"An especially flavorful chicken, ready for cooking.": "Особенно ароматная курица, готовая к приготовлению."
"A lump of gummy meat. It's supposedly edible, but only expert gourmands can stomach its squishy grossness.": "Комок желеобразного мяса. Говорят, что её можно есть, но только опытные гурманы способны выдержать её мягкую неприятность."
"Chicken meat that causes mild paralysis when eaten. An extremely exotic ingredient in food, but a common ingredient in poisons.": "Куриное мясо, вызывающее лёгкий паралич при употреблении. Очень экзотический ингредиент в еде, но распространённый в ядах."
"Like chicken meat, but larger, and with a more pronounced flavor.": "Как куриное мясо, но крупнее и с более выраженным вкусом."
"A thick supportive cushion, perfect for lining boxes and dresser drawers.": "Толстая поддерживающая подушка, идеально подходит для выстилки коробок и ящиков комода."
"A sheet of dried, untanned leather, ready to be worked for specific purposes.": "Лист высушенной, невыделанной кожи, готовый к обработке для конкретных целей."
"A thin fluid used to create augmentation oils (for level 50 effects).": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 50 уровня)."
"Not inspired, but quite pleasant to look at, this abstract piece would look good hanging in a Council official's office. It lends a little class to any room it's in.": "Не вдохновляющее, но весьма приятное для глаз, это абстрактное произведение хорошо смотрелось бы в кабинете чиновника Совета. Оно придаёт комнате немного изящества."
"Swallowing this small pebble will teleport you to the Teleportation Circle that you're bound to.": "Проглотив этот маленький камешек, вы телепортируетесь к Кругу Телепортации, к которому вы привязаны."
"It says it's a recipe for a mixed drink, but there are no ingredients... Just weird pictograms.": "Говорится, что это рецепт смешанного напитка, но ингредиентов нет... Только странные пиктограммы."
"Teaches you how to assemble a self-exploding barrel of confetti bombs, used by some races as a means of celebration.": "Обучает сборке самовзрывающейся бочки с конфетти-бомбами, используемой некоторыми расами в качестве средства празднования."
"Teaches you how to assemble a self-exploding ball of green confetti paper, used by some races as a means of celebration.": "Обучает вас собирать самовзрывающийся шар из зеленой бумаги-конфетти, используемый некоторыми расами в качестве средства празднования."
"Teaches you how to assemble green fireworks, used by some races as a means of celebration.": "Обучает вас собирать зелёные фейерверки, которые некоторые расы используют для празднования."
"Teaches you how to assemble a self-exploding ball of confetti paper, used by some races as a means of celebration.": "Обучает вас собирать самовзрывающийся шар из бумаги конфетти, используемый некоторыми расами в качестве средства празднования."
"Teaches you how to create a small magical clay teapot.": "Обучает созданию маленького магического глиняного чайника."
"Teaches you how to assemble a self-exploding ball of purple confetti paper, used by some races as a means of celebration.": "Обучает вас собирать самовзрывающийся шар из фиолетовой бумаги-конфетти, используемый некоторыми расами в качестве средства празднования."
"Teaches you how to assemble purple fireworks, used by some races as a means of celebration.": "Обучает вас собирать фиолетовые фейерверки, используемые некоторыми расами в качестве средства празднования."
"Teaches you how to assemble simple fireworks, used by some races as a means of celebration.": "Обучает сборке простых фейерверков, используемых некоторыми расами в качестве средства празднования."
"Teaches you a research recipe for Simple Words of Power": "Обучает рецепту исследования Простых слов силы"
"Teaches you a transcription technique for Simple Words of Power": "Обучает технике переписывания Простых Слов силы"
"This beaker has been carefully constructed to keep healing chemicals at a lower temperature, slightly improving their effects. Held in the main hand.": "Этот стакан тщательно сконструирован для поддержания лечебных химикатов при более низкой температуре, что слегка улучшает их эффект. Держится в основной руке."
"This flask has been carefully constructed to keep healing chemicals at a lower temperature, slightly improving their effects. Held in the off hand.": "Эта фляга тщательно сконструирована для поддержания лечебных химикатов при более низкой температуре, что слегка улучшает их эффект. Держится в левой руке."
"Recovers 20 health per second for 30 seconds.": "Восстанавливает 20 здоровья в секунду в течение 30 секунд."
"Some mantises say it's good for a hangover. But mantises don't eat soup, so who knows how they'd know that. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Некоторые богомолы говорят, что он помогает при похмелье. Но богомолы не едят суп, так что кто знает, откуда у них такая информация. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"A shiny red apple.": "Блестящее красное яблоко."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +4 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +4 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"Dye used to color a piece of clothing or armor red.": "Краситель, используемый для окрашивания одежды или брони в красный цвет."
"A small painted wooden chip, used in card and parlor games.": "Маленькая раскрашенная деревянная фишка, используемая в карточных и салонных играх."
"A spicy red pepper.": "Острый красный перец."
"A handful of seeds to grow a hot pepper bush.": "Горсть семян для выращивания куста острого перца."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +18 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +18 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates red sparkler for a few seconds, and makes you feel oddly patriotic.": "Тонкая трубочка, которая, как тебе кажется, наполнена магией. Когда ты ударяешь её о твёрдую поверхность, она на несколько секунд создаёт красный бенгальский огонь и вызывает у тебя странное чувство патриотизма."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 15,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 15 000 Советов."
"A classic polished crown with small embedded gems. (Level 40 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 40.)"
"A classic polished crown with small embedded gems. (Level 50 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 50.)"
"A classic polished crown with small embedded gems. (Level 60 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 60.)"
"A classic polished crown with small embedded gems. (Level 70 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 70.)"
"A classic polished crown with small embedded gems. (Level 80 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 80.)"
"A classic polished crown with small embedded gems. (Level 90 variety.)": "Классическая отполированная корона с маленькими вставленными драгоценными камнями. (Вариант уровня 90.)"
"This reddish token is made of very thin metal. There are tiny inscrutable symbols painted on the back side. (See Qatik at the Red Wing Casino to trade these tokens for prizes.)": "Этот красноватый жетон сделан из очень тонкого металла. На обратной стороне нарисованы крошечные непонятные символы. (Обратитесь к Катику в казино Красного Крыла, чтобы обменять эти жетоны на призы.)"
"A leafy red vegetable.": "Красный листовой овощ."
"A plantable lettuce seedling.": "Саженец салата, который можно посадить."
"A sludgey liquid. The label suggests it's used in alchemy.": "Густая жидкость. На этикетке указано, что используется в алхимии."
"This ancient doomlute was severely damaged and then repaired by an expert. It still holds a bit of its magic.": "Этот древний рок-гитара был сильно повреждён, а затем отремонтирован экспертом. В нём всё ещё сохраняется часть его магии."
"Recovers 10 health per second for 30 seconds.": "Восстанавливает 10 здоровья в секунду в течение 30 секунд."
"An arrangement of calming flowers that helps one relax.": "Композиция из успокаивающих цветов, которая помогает расслабиться."
"A calming display of relaxing flowers that helps you get comfortable.": "Успокаивающая композиция из расслабляющих цветов, которая помогает вам почувствовать себя комфортно."
"A flask strong enough to contain even magical alcohol without evaporation.": "Фляга достаточно прочная, чтобы содержать даже магический алкоголь без испарения."
"A bottle of extraordinarily potent rum. It's supposedly made by enslaved fairies who are forced to generate magical sugar all day. This sugar when fermented raises the alcohol percentage well above 100%, much to the chagrin of everyone trying to comprehend what that could possibly mean.": "Бутылка чрезвычайно крепкого рома. Говорят, что его делают порабощённые феи, вынужденные целыми днями производить магический сахар. Этот сахар при брожении повышает содержание алкоголя далеко выше 100%, что приводит в замешательство всех, кто пытается понять, что это вообще может означать."
"Can be used to repair a malfunctioning lamp in Statehelm. (Not every broken lamp requires a replacement bulb, but you always need one on hand when trying to repair a lamp. It's just common sense.)": "Можно использовать для ремонта неисправной лампы в Стейтхелме. (Не каждая сломанная лампа требует замены лампочки, но она всегда нужна под рукой при попытке починить лампу. Это просто здравый смысл.)"
"A fairly-new item made in the Rakshasa manner, but probably not by a Rakshasa. Still not terrible.": "Довольно новый предмет, сделанный в стиле Ракшасы, но, вероятно, не самим Ракшасой. Всё же неплохой."
"A signed and numbered copy of the famous painting by Go Hakomi, a dwarven master. He recently passed away, increasing this painting's value significantly.": "Подписанная и пронумерованная копия знаменитой картины Го Хакоми, мастера-гнома. Недавно он скончался, что значительно повысило ценность этой картины."
"Popular among the guards of the Council, these gloves are lined with lead to protect against mind control. Of course, the lead would be more effective if it was on your head instead of your hands, but nobody really wants a bunch of lead on their head.": "Популярные среди стражей Совета, эти перчатки выстланы свинцом для защиты от контроля разума. Конечно, свинец был бы эффективнее, если бы находился на вашей голове, а не на руках, но никто на самом деле не хочет иметь кучу свинца на голове."
"The Rakshasa outcasts in the Ilmari Desert enchant these claws with life-saving protection from the desert elements.": "Изгнанники Ракшасов в пустыне Илмари наделяют эти когти защитой, спасающей жизнь от суровых пустынных условий."
"A bundle of 1000 arrow shafts for resplendent arrows.": "Пучок из 1000 древков для лучезарных стрел."
"A practice tool used by bards during their studies.": "Практический инструмент, используемый бардами во время их обучения."
"Flax that has been prepared for use in textiles. It can now be spun into linen.": "Лен, подготовленный для использования в текстиле. Теперь его можно прясть в лён."
"A bundle of flax, ready to be water retted. Place in deep water. Takes 30 minutes to soak.": "Связка льна, готовая к водному вымачиванию. Поместите в глубокую воду. Требуется 30 минут на замачивание."
"Somehow this glass orb has pure revulsion trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперто чистое отвращение. Тёмные эмоции — источник силы для Некромантии, и эту сферу можно использовать как Некромантский Самоцвет."
"A small metal cylinder with liquid sealed inside. There's a pull-tab on top to open it. The cylinder bears an image of a smiling Spring fairy. If you stare for a moment, she seems to mouth the cryptic words \"Rez and Shine, You Live Again! Original Honey Flavor!\"": "Небольшой металлический цилиндр с запечатанной внутри жидкостью. Сверху есть язычок для открывания. На цилиндре изображена улыбающаяся Весенняя фея. Если на неё немного посмотреть, кажется, что она шепчет загадочные слова «Воскрешение и Блеск, Ты Живёшь Снова! Оригинальный Медовый Вкус!»"
"A rather lengthy journal detailing the day-to-day life of its owner. The final passage in it reads:\n\"... As I lie here, the cold grip of my final moments closing in, a single regret consumes me. All these years we've spent together - laughing, fighting, discovering the world - yet you could never see the truth burning in my heart. Lasri, you've always been so blind to the feelings of those around you... to my feelings. If you ever fi-\n<i>[The rest of the page is too damaged to decipher, the ink smudged by tears long dried.]</i>\"": "Довольно объёмный дневник, подробно описывающий повседневную жизнь его владельца. Последняя запись в нём гласит:\\n«... Пока я лежу здесь, холодная хватка моих последних мгновений сжимается, меня охватывает одно сожаление. Все эти годы, что мы провели вместе — смеялись, сражались, открывали мир — но ты так и не смог увидеть правду, пылающую в моём сердце. Ласри, ты всегда был так слеп к чувствам окружающих... к моим чувствам. Если бы ты когда-ниб-\\n<i>[Остальная часть страницы слишком повреждена для расшифровки, чернила размазаны слезами, давно высохшими.]</i>"
"A chunk of weird ore that can conduct powerful magics, but requires extreme skill to craft with.": "Кусок странной руды, способной проводить мощную магию, но требующей исключительного мастерства для обработки."
"A token of Ri-Shin's favor. The small branch is still fresh, with quite a few leaves. (See Snowleaf at the Shrine of Ri-Shin in Kur Mountains to trade these tokens for items.)": "Знак расположения Ри-Шина. Маленькая веточка ещё свежая, с несколькими листьями. (Обратитесь к Сноулифу у Храма Ри-Шина в горах Кур, чтобы обменять эти жетоны на предметы.)"
"A fairly fragile bone that was part of some animal's rib cage.": "Довольно хрупкая кость, которая была частью реберной клетки какого-то животного."
"A very dry wine that's quite drinkable.": "Очень сухое вино, которое довольно приятно пить."
"A thin and non-descript blade that's been designed to maximize the impact of applied poisons.": "Тонкое и незаметное лезвие, созданное для максимального усиления действия нанесённых ядов."
"A spreadable cheese that's very mild and slightly sweet.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Намазываемый сыр с очень мягким и слегка сладким вкусом.\n\nТип сыра: Сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A spreadable cheese with an aggressive, cloying taste.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Намазываемый сыр с резким, приторным вкусом.\n\nТип сыра: Сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A claw with ugly tassels dangling from it. Being hit by this stupid-looking weapon is especially infuriating.": "Коготь с отвратительными кисточками, свисающими с него. Получить удар этим глупо выглядящим оружием особенно раздражает."
"A strange magical cube. It can be used to give rings a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы дать кольцам дополнительное магическое свойство. Посетите торговца экипировкой (или игрока-улучшателя), чтобы установить его."
"A ring that magically guides the wearer's hand for better hit placement.": "Кольцо, которое магически направляет руку носителя для более точного попадания."
"This ring is blackened and pitted from (presumed) acid splashes.": "Это кольцо почернело и покрыто ямками от (предполагаемых) брызг кислоты."
"A disgusting ring coated in a perpetual layer of slime. But the slime isn't acid. It's just slime.": "Отвратительное кольцо, покрытое вечным слоем слизи. Но эта слизь не кислотная. Это просто слизь."
"A thin ring made of white gold.": "Тонкое кольцо из белого золота."
"This ring glows a pale blue.": "Это кольцо светится бледно-голубым светом."
"An arrowhead is embedded in this wooden ring, making it rather uncomfortable to wear.": "В это деревянное кольцо вделано наконечник стрелы, из-за чего его довольно неудобно носить."
"This ring makes you faster. More alert. Jittery. Nervous. Uncomfortable. Tired. But faster!": "Это кольцо делает тебя быстрее. Более внимательным. Нервным. Встревоженным. Неуютным. Уставшим. Но быстрее!"
"A thick onyx ring. Druidic symbols are etched along the inside, including the easily-recognizable symbol of Dreva: a shark.": "Толстое кольцо из оникса. По внутренней стороне выгравированы друидические символы, включая легко узнаваемый символ Древы: акула."
"This ring is slightly warm to the touch.": "Это кольцо слегка тёплое на ощупь."
"This ring is unpleasantly warm.": "Это кольцо неприятно тёплое."
"This jade ring thumps in time to the wearer's pulse, the better to tune into their mind.": "Это нефритовое кольцо бьется в такт пульсу носителя, чтобы лучше настроиться на его разум."
"A golden ring with a gaudy black Necromancy Gem embedded in it.": "Золотое кольцо с безвкусным чёрным камнем Некромантии."
"Made of pink wood, supposedly common in the orcish homeland of Gu.": "Сделано из розового дерева, якобы распространённого на родине орков Гу."
"A thick and ugly metal ring.": "Толстое и уродливое металлическое кольцо."
"This mottled ring improves a Werewolf ability: Claw": "Это пёстрое кольцо улучшает способность Оборотня: Коготь"
"This slightly off-white metal ring improves a Sword ability: Wind Strike.": "Это слегка белесое металлическое кольцо улучшает навык Меча: Удар ветра."
"This gaudy gold heart ring looks more like a lovelorn elf's token of affection than some powerful magical device.": "Это вычурное золотое кольцо в форме сердца больше похоже на знак любви влюблённого эльфа, чем на могущественное магическое устройство."
"This small metal band seems to get tighter and tighter the longer you wear it.": "Это маленькое металлическое кольцо кажется всё туже и туже, чем дольше вы его носите."
"This criminally ugly purple ring augments your movement so that your sprint speed is slightly faster.": "Это преступно уродливое фиолетовое кольцо увеличивает вашу скорость передвижения, делая бег немного быстрее."
"This chunky blue ring augments any kind of kick, such as the Unarmed ability Kick or kicks done when in the form of a deer or other ungulate.": "Это массивное синее кольцо усиливает любой вид удара ногой, например, способность Безоружный удар ногой или удары ногами в облике оленя или другого копытного."
"This grungy ring has a little scoop on the end to help you dig skulls out of corpses. (Acts as a skull extractor.)": "Это грязное кольцо имеет небольшой заострённый конец, чтобы помочь вам выковыривать черепа из трупов. (Используется как экстрактор черепов.)"
"This ring weighs almost nothing.": "Это кольцо почти не весит."
"This slightly off-white metal ring improves a Sword ability: Many Cuts.": "Это слегка белесое металлическое кольцо улучшает навык Множество Резов у Меча."
"This ring has little barbs all along the outside. Takes some practice to wear it safely.": "Это кольцо покрыто мелкими шипами по всей внешней стороне. Требуется практика, чтобы носить его безопасно."
"This ugly blue ring enhances most Psychology healing effects by 50.": "Это уродливое синее кольцо увеличивает большинство исцеляющих эффектов Психологии на 50."
"This ring seems ready to fly off your finger at any moment, but mercifully stays put.": "Это кольцо кажется готовым слететь с вашего пальца в любой момент, но, к счастью, остаётся на месте."
"This dull black ring improves a Psychology ability: Cause Terror.": "Это тусклое чёрное кольцо улучшает навык Психологии: Вызвать ужас."
"This ring is made of a strange material that resembles hard bread, and is supposedly designed to \"soak up\" the alcohol in your system.": "Это кольцо сделано из странного материала, напоминающего твердый хлеб, и, по слухам, предназначено для того, чтобы «впитывать» алкоголь в вашем организме."
"It's a skull ring! It fits all finger sizes. The skull is actually a Necromancy Gem.": "Это кольцо с черепом! Подходит на любой размер пальца. Череп на самом деле является самоцветом некромантии."
"This vaguely-green metal ring improves an Unarmed ability: Cobra Strike.": "Это слегка зелёное металлическое кольцо улучшает навык Безоружного боя: Удар Кобры."
"Made of enchanted snow, this ring is quite irritating to wear. It's not cold to the touch, and it never seems to lose its shape, but it <i>does</i> melt continuously, creating damp sleeves and pockets.": "Сделанное из зачарованного снега, это кольцо довольно раздражает при ношении. На ощупь оно не холодное и, кажется, никогда не теряет форму, но оно <i>действительно</i> постоянно тает, создавая влажные рукава и карманы."
"This thick wooden ring feels surprisingly light.": "Это толстое деревянное кольцо кажется удивительно лёгким."
"This ugly purple ring magically strengthens your ankles so that falling from great heights isn't quite as painful. It's a pretty weak enchantment, really.": "Это уродливое фиолетовое кольцо магически укрепляет твои лодыжки, чтобы падение с большой высоты было не таким болезненным. На самом деле, это довольно слабое заклинание."
"An uncomfortably heavy ring made of black glass. It features a necromancy gem.": "Неуютно тяжёлое кольцо из чёрного стекла. Украшено камнем некромантии."
"This brass ring numbs each of your senses just enough to make swimming in water come much easier.": "Это латунное кольцо слегка притупляет ваши чувства, делая плавание в воде значительно проще."
"This wooden ring is carved with elven sword-runes.": "Это деревянное кольцо украшено эльфийскими рунами меча."
"This shoddily-made ring improves psychic attacks.": "Это плохо сделанное кольцо улучшает психические атаки."
"A trinket that augments various kinds of archery techniques.": "Безделушка, усиливающая различные техники стрельбы из лука."
"This tough-but-ugly ring makes Punch attacks deal more damage.": "Это прочное, но непривлекательное кольцо увеличивает урон от ударов кулаком."
"This cheap-looking purple ring makes poisons slightly less effective.": "Это недорогое фиолетовое кольцо делает яды немного менее эффективными."
"Made of wire that's been bent into a sort of wave. It feels a little greasy and slimy.": "Сделано из проволоки, согнутой в виде волны. На ощупь немного жирное и скользкое."
"This mottled ring improves a Werewolf ability: Smell Fear": "Это пятнистое кольцо улучшает способность Оборотня: Чувство страха"
"This ring can make anyone a little more beastly, but works best on those who already were.": "Это кольцо может сделать любого немного более звероподобным, но лучше всего действует на тех, кто уже был таким."
"A special token from Riston to barter for a special advanced item.": "Особый жетон от Ристона для обмена на особый продвинутый предмет."
"An elegant opal on a thin gold chain. Tasteful.": "Элегантный опал на тонкой золотой цепочке. Со вкусом."
"They're supernaturally slimming! Plus they have a hidden dimensional pocket inside that can fit a few extra items.": "Они сверхъестественно стройнят! Плюс в них есть скрытый измеренческий карман, в который помещается несколько дополнительных предметов."
"Comfy, invigorating, and magically protective. They smell like lilac and pimentos for some reason.": "Удобные, бодрящие и магически защищающие. По какой-то причине пахнут сиренью и перцем."
"Very finely ground sand mixed with clay. A useful construction sand, but bulky.": "Очень мелко измельчённый песок, смешанный с глиной. Полезный строительный песок, но объёмный."
"Might as well roast the left-over bits. It doesn't taste awful. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Можно и обжарить оставшиеся кусочки. На вкус не так уж плохо. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A smoky-smelling weed. (This item can be used in recipes that call for Mixed Greens.)": "Трава с дымным запахом. (Этот предмет можно использовать в рецептах, требующих Смешанную зелень.)"
"Designed by a spiteful necromancer bent on conquering a city, these robes seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Созданные злобным некромантом, стремящимся покорить город, эти одеяния кипят ненавистью. И оказывается, что чистая ненависть довольно теплая, обеспечивая легкую защиту от холода."
"Sacrificing armor for killing power, these robes are popular with wizards. A Necromancy Gem is woven into the chest.": "Жертвуя бронёй ради убийственной силы, эти одеяния популярны среди волшебников. В грудь вплетён камень Некромантии."
"A large and bloody cut from a dangerous beast. Pity the meat doesn't look especially tasty.\n\n(Use in Cheap Meat recipes.)": "Большой и кровавый кусок от опасного зверя. Жаль, мясо не выглядит особенно вкусным.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"If cat meat tasted good, this would taste good.\n\n(Use in Cheap Meat recipes.)": "Если бы мясо кошки было вкусным, это было бы вкусно.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"A hardy beast yielded this reasonably-appetizing-looking cut.\n\n(Use in Cheap Meat recipes.)": "От выносливого зверя получился этот достаточно аппетитный кусок.\n\n(Используется в рецептах дешёвого мяса.)"
"Dog meat is an acquired taste, but at least this particular cut looks fresh and juicy.\n\n(Use in Cheap Meat recipes.)": "Собачье мясо — это приобретённый вкус, но, по крайней мере, этот конкретный кусок выглядит свежим и сочным.\\n\\n (Используется в рецептах дешёвого мяса.)"
"A hardy slab of insect meat. Good for dishes where the meat isn't the centerpiece.\n\n(Use in Cheap Meat recipes.)": "Выносливый кусок насекомого мяса. Подходит для блюд, где мясо не является главным ингредиентом.\n\n(Используется в рецептах дешёвого мяса.)"
"A long-term storage solution for pets. The built-in entertainment options raise the contained pets' Happiness by 20.\n\nThis one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 28 days. If the animal is not rehomed in a stable by then, it will escape and be lost forever.\n<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Долгосрочное решение для хранения питомцев. Встроенные развлекательные опции повышают Счастье содержащихся питомцев на 20.\\n\\nЭтот одноразовый контейнер может хранить любое питомцевое животное (выведенное в неволе, не дикое) качества питомца (не для разведения) до 28 дней. Если животное не будет передано в стойло к этому времени, оно сбежит и потеряется навсегда.\\n<i>[Вы можете использовать этот предмет на питомце, находящемся в стойле, посетив стойлового мастера. Ищите кнопку «Использовать предмет...» на экране стойла.]</i>"
"Designed for longer transit periods, this travel cage provides basic sustenance and comfort for up to a week.\n\nThis one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 7 days (168 hours). If the animal is not rehomed in a stable by then, it will escape and be lost forever.\n<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Созданная для длительных перевозок, эта транспортная клетка обеспечивает базовое питание и комфорт до недели.\\n\\nЭтот одноразовый контейнер может содержать любое питомцевое животное (выведенное в неволе, не дикое) качества питомца (не для разведения) до 7 дней (168 часов). Если животное не будет переселено в стойло к этому времени, оно сбежит и потеряется навсегда.\\n<i>[Вы можете использовать этот предмет на питомце, находящемся в стойле, посетив стойлового мастера. Ищите кнопку «Использовать предмет...» на экране стойла.]</i>"
"A garnet that floats around your head and emits light. Not especially well-made, but it's still vaguely impressive.": "Гранат, который плавает вокруг вашей головы и излучает свет. Не особенно качественный, но всё же слегка впечатляет."
"A blue cheese with a relatively mild taste.\n\nCheese Type: Blue": "Голубой сыр с относительно мягким вкусом.\n\nТип сыра: голубой"
"A net designed to catch and contain Rose-mourning butterflies. (Keep this in your inventory when harvesting the butterflies to capture them alive.)": "Сеть, предназначенная для ловли и удержания розово-печальных бабочек. (Держите её в инвентаре при сборе бабочек, чтобы поймать их живыми.)"
"A customized staff with heavy weights on each end.": "Индивидуальный посох с тяжёлыми грузами на каждом конце."
"Dye used to color a piece of clothing or armor rosy brown.": "Краска, используемая для окрашивания одежды или брони в красновато-коричневый цвет."
"A stinky flower. It's not going to be useful in bouquets, that's for sure.": "Вонючий цветок. В букетах он точно не пригодится."
"This strawberry is no longer fit to eat.": "Эта клубника больше не пригодна для еды."
"The bloody skin of a dirty animal.": "Кровавая шкура грязного животного."
"A gripping outdoor scent that will make you excited to grip things.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Захватывающий аромат свежего воздуха, который вызовет у вас желание крепко схватить что-то.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x4.": "Одноразовый стол для выполнения каллиграфии. Установите его, чтобы увеличить длительность каллиграфии в 4 раза."
"These metal boots have a little bit of lining and a lot of poor craftsmanship.": "Эти металлические сапоги имеют немного подкладки и много плохого мастерства."
"Chain that basically covers the torso.": "Кольчуга, которая в основном покрывает торс."
"A shroud of metal with a face-hole.": "Покров из металла с отверстием для лица."
"Chains cover most of the palm, leaving the fingers free -- and vulnerable.": "Кольца покрывают большую часть ладони, оставляя пальцы открытыми — и уязвимыми."
"Poorly-made chain that fits poorly.": "Плохо сделанная кольчуга, которая плохо сидит."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +9 for 30 minutes.": "Относительно удобный стул. Отдых в нём увеличивает восстановление брони на +9 на 30 минут."
"A cowl of the quality that a peasant farmer might wear.": "Капюшон такого качества, какой мог бы носить крестьянин-фермер."
"Technically usable cloth gloves.": "Технически пригодные тканевые перчатки."
"The quadruple-thick stitching screams \"overcompensating\" and the pattern is frankly horrendous. But it'd be good for sewer-delving or something.": "Четырёхслойные швы кричат «компенсация», а узор откровенно ужасен. Но для лазания по канализации или чего-то подобного подойдут."
"A few years ago, the humans of Statehelm decided shirts like this were ironically in fashion. That time has come and gone, however, and now it's just hideous again.": "Несколько лет назад люди из Стэйтхелма решили, что такие рубашки иронично в моде. Однако то время прошло, и теперь это снова просто ужасно."
"Cloth slippers with a bit of resilience. But not much.": "Тканевые тапочки с небольшой прочностью. Но не слишком."
"A big tree branch with some of the bark removed to make a hand-hold.": "Большая ветка дерева с частично снятой корой для удобного хвата."
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. The crude Fire Magic runes bear the mark of an amateur, but should work.": "Ну, кора в основном удалена. В основном. При использовании вы получите лишь несколько заноз. Грубые руны Огненной магии носят отпечаток новичка, но должны работать."
"Your violent cow will be made all the more violent by these uncomfortable shoes!": "Ваша свирепая корова станет ещё более свирепой в этих неудобных ботинках!"
"The nails are too long for the deer's small hooves, causing considerable pain while wearing.": "Гвозди слишком длинные для маленьких копыт оленя, вызывая значительную боль при ношении."
"It has a modest flower smell.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Он имеет скромный цветочный аромат.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Well, they're hand-made shoes. Not everything that's hand-made is good quality, though, it turns out.": "Ну, это обувь ручной работы. Однако, как оказалось, не всё, что сделано вручную, бывает хорошего качества."
"Although clearly intended to be gloves, these are little more than wads of leather in vaguely-hand-shaped form. Expect immense amounts of palm sweat!": "Хотя это явно перчатки, на самом деле они представляют собой лишь комки кожи в форме, примерно напоминающей руку. Ожидайте огромное количество пота на ладонях!"
"Designed to protect from concussions and minor scrapes, this helmet has the serious drawbacks of reduced visibility, unpleasant odor, and terrible craftsmanship.": "Созданный для защиты от сотрясений и мелких ссадин, этот шлем имеет серьёзные недостатки: сниженное поле зрения, неприятный запах и ужасное качество изготовления."
"Sewn by an amateur, with low-quality materials and a lack of fashion sense.": "Сшиты любителем, из материалов низкого качества и без чувства стиля."
"Well-prepared, but tough, leather.": "Хорошо подготовленная, но прочная кожа."
"A novice-quality piece of work, with embarrassingly wide stitches.": "Изделие начального уровня с неловко широкими стежками."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x4.": "Одноразовый табурет для медитации. Используйте его рядом со Столбом Медитации, чтобы увеличить длительность эффектов медитации в 4 раза."
"Well, the bark has mostly been removed. Mostly. You'll only get a few splinters trying to use this. (It will work for Staff Fighting but not Fire Magic abilities.)": "Ну, кора в основном снята. В основном. При использовании вы получите лишь несколько заноз. (Подойдет для боя посохом, но не для способностей Огненной магии.)"
"A symbol of Arisetsu has been etched into this inelegant staff. Functional but unimpressive.": "На этом неуклюжем посохе выгравирован символ Арисэцу. Функциональный, но непримечательный."
"Poorly-made tack for a horse.": "Плохо сделанная сбруя для лошади."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is moderately uncomfortable.": "Традиционная шапка, которую люди носят во время зимнего праздника Ри-Шина, бога растений и деревьев. Эта версия достаточно неудобная."
"For rough riding.": "Для грубой езды."
"A small saddlebag for ponies.": "Небольшая седельная сумка для пони."
"Pieces of chitin and scraps of metal are held together with thick webbing. This should make a spider somewhat tougher.": "Куски хитина и обломки металла скреплены толстой паутиной. Это должно сделать паука немного крепче."
"A compound that contains tannic acid. It can be used to create shoddy and rough leather.": "Соединение, содержащее таниновую кислоту. Используется для создания грубой и некачественной кожи."
"Basically just chunks of wood nailed to a cow's feet. Which makes them sound more comfortable than they really are.": "По сути, просто куски дерева, прибитые к копытам коровы. Что звучит более комфортно, чем есть на самом деле."
"Basically just chunks of wood nailed to a deer's feet. Which makes them sound more comfortable than they really are.": "По сути, просто куски дерева, прибитые к копытам оленя. Что звучит более комфортно, чем есть на самом деле."
"The smell of bark and pollen isn't pleasant, but it turns your thoughts to nature.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Запах коры и пыльцы не слишком приятен, но заставляет думать о природе.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Dye used to color a piece of clothing or armor royal blue.": "Краска, используемая для окрашивания одежды или брони в королевский синий цвет."
"Fae Bee royal jelly -- a potent magical substance used as a currency by many parts of the Fae Realm.": "Королевское желе фей-пчёл — мощное магическое вещество, используемое в качестве валюты во многих частях Королевства Фей."
"Dye used to color a piece of clothing or armor royal purple.": "Краска, используемая для окрашивания одежды или брони в королевский пурпурный цвет."
"The long tongue of a frog-like creature.": "Длинный язык существа, похожего на лягушку."
"The goblin chief Rubgag used these magic slippers to win dancing competitions (which was definitely cheating, or \"Chiefing\", as he called it.).": "Вождь гоблинов Рубгаг использовал эти волшебные туфли, чтобы выигрывать танцевальные конкурсы (что, безусловно, было жульничеством, или «Вождением», как он это называл)."
"Deep crimson in color, this valuable gem is used in magic to ensure good fortune.": "Глубокого багрового цвета, этот ценный драгоценный камень используется в магии для обеспечения удачи."
"A big chunk of red crystal. Kind of pretty. Not a normal crystal though. Seems manufactured.": "Большой кусок красного кристалла. Довольно красивый. Но не обычный кристалл. Похоже, искусственного происхождения."
"Crushed synthetic crystal.": "Раздробленный синтетический кристалл."
"Strong general-purpose footwear, with metal outside for protection, wool inside for insulation.": "Прочные универсальные ботинки с металлической внешней частью для защиты и шерстяной подкладкой для утепления."
"An attempt at perfect harmony: metal outside, wool inside. Unfortunately, the gloves get really sweaty and are prone to fungal infestation. Ew.": "Попытка достичь идеальной гармонии: металл снаружи, шерсть внутри. К сожалению, перчатки сильно потеют и подвержены грибковым заражениям. Фу."
"Bits of meat are floating in this small vial of sugar water.": "Кусочки мяса плавают в этой маленькой пузырьке с сахарной водой."
"This flask is made of nice metal - pity it has a huge hole in the side.": "Эта фляга сделана из хорошего металла — жаль, что в боку у неё большая дыра."
"A werewolf wore these boots while transforming a few too many times. The armor quality is totally shot, but it still has some value.": "Оборотень носил эту обувь, превращаясь слишком много раз. Качество брони полностью испорчено, но она всё ещё имеет некоторую ценность."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 8' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 8», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 8' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 8», чтобы бросить эту бомбу.)"
"A classic vegetarian goblin meal that's heavy on the mashed potatoes.": "Классическое вегетарианское блюдо гоблинов с большим количеством картофельного пюре."
"Commissioned by the druid duck master Rummencola. Carved from the hardest wood available on Alharth and dressed in garnets, this mug will endure endless hours of chugging your favorite swill.": "Заказана у мастера друидов-уток Руменколы. Вырезана из самого твёрдого дерева, доступного на Алхарте, и украшена гранатами, эта кружка выдержит бесконечные часы залпового выпивания вашего любимого пойла."
"A sweet appetizer. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкая закуска. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"Carefully designed to avoid hurting you while sprinting.": "Тщательно разработан, чтобы не причинять вреда во время бега."
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cold-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Толстое покрывало, которое дарит тепло и комфорт кобыле во время беременности. Это покрывало подходит для кобыл с холоднокровным темпераментом. Дайте лошади в стойле во время беременности, чтобы ускорить срок вынашивания на 24 часа. (Также можно использовать для согревания в "
"A meat-heavy dish, a little greasy but very tasty.": "Блюдо с большим количеством мяса, немного жирное, но очень вкусное."
"A long knife held in the off-hand. It was once very sharp, but now not so much.": "Длинный нож, держащийся в свободной руке. Раньше он был очень острым, но теперь уже не очень."
"A poisoner's blade that's seen better days.": "Клинок отравителя, который повидал лучшие времена."
"A small key. It must fit something...": "Маленький ключ. Он должен подходить к чему-то..."
"Rust has taken its toll on this blade, but it's better than nothing.": "Ржавчина сильно повредила этот клинок, но всё же он лучше, чем ничего."
"Styled after the blade of the notorious vampire Ruxandra, who publicly forsook blood-drinking, but was nevertheless hunted and defanged by a mob of angry humans. She took her revenge, using this dirk to feed on the blood of those she deemed unworthy of life.": "Сделано по образцу клинка печально известной вампирши Руксандры, которая публично отказалась от кровопийства, но тем не менее была преследуема и обеззублена толпой разгневанных людей. Она отомстила, используя этот кинжал, чтобы питаться кровью тех, кого считала недостойными жизни."
"A basic but filling rye. Has a complex aroma and hints of molasses.": "Простой, но сытный ржаной хлеб. Имеет сложный аромат и нотки патоки."
"Tundra rye that's been milled into a bakable flour.": "Тундровая рожь, перемолотая в муку, пригодную для выпечки."
"The traditional weapon of Ranalon Guardians. This model has a great heft and has been augmented with some common ranalon magics.\nNote: this weapon is considered a Staff.": "Традиционное оружие стражей Раналона. Эта модель обладает отличным весом и была усилена некоторыми распространёнными магиями Раналона.\\nПримечание: это оружие считается посохом."
"A huge gross hippo tooth.": "Огромный отвратительный зуб бегемота."
"The lung of a newly-sacrificied mega scray. (NOTE: not yet implemented; does nothing!)": "Легкое недавно принесённого в жертву мега скрея. (ПРИМЕЧАНИЕ: ещё не реализовано; не выполняет никаких функций!)"
"A lump from a very large ooze.": "Комок от очень большого слизня."
"A shark fin, freshly hacked off.": "Плавник акулы, только что отрубленный."
"The heart of a massive snail.": "Сердце огромной улитки."
"Dye used to color a piece of clothing or armor saddle brown.": "Краска, используемая для окрашивания одежды или брони в седельно-коричневый цвет."
"Teaches you how to make a large magical saddlebag.": "Обучает вас созданию большой магической сумки для седла."
"Teaches you how to make a huge magical saddlebag.": "Обучает созданию огромной магической сумки для седла."
"Teaches you how to make truly impressive tack for a horse.": "Обучает созданию действительно впечатляющей сбруи для лошади."
"Teaches you how to make a magic-infused saddle for a horse.": "Учится создавать седло с магическим наполнением для лошади."
"Teaches you how to make a magical saddlebag.": "Обучает созданию магической седельной сумки."
"Somehow this glass orb has a bit of ultimate despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперта частица крайнего отчаяния. Тёмные эмоции — это сила для Некромантии, и эту сферу можно использовать как Некромантический Самоцвет."
"An off-hand knife used as a personal-defense weapon by some mages. It has a tiny warding glyph that diminishes damage.": "Нож в свободной руке, используемый некоторыми магами как оружие личной защиты. На нём есть маленький защитный глиф, уменьшающий урон."
"These silk pants are uncomfortably warm at all times.": "Эти шелковые штаны постоянно невыносимо тёплые."
"Mild flaky fish surrounded with bold roasted vegetables.": "Нежная рассыпчатая рыба в окружении ярких запечённых овощей."
"A rooty vegetable heart. Would probably be great in a salad.": "Корнеплодное сердце. Вероятно, отлично подойдет для салата."
"This is a small amount of salt.": "Это небольшое количество соли."
"A tiny pinch of saltpeter, a strange substance with many magical uses.": "Крошечная щепотка селитры, странного вещества с множеством магических применений."
"A particularly flat species of sea urchin. These shells are used as currency by the Ranalon.": "Особо плоский вид морского ежа. Эти раковины используются как валюта Раналона."
"When the Council demanded that the Rakshasa provide renumeration for every human that was injured at the Battle of Rahu, outraged Rakshasa tore up the treaty and killed the messengers, leading to the Sand War. The Rakshasa won the war with claws like this, fashioned after weapons from their home world.": "Когда Совет потребовал от Ракшас выплатить компенсацию за каждого человека, пострадавшего в битве при Раху, возмущённые Ракшасы разорвали договор и убили посланников, что привело к Песчаной войне. Ракшасы выиграли войну с помощью когтей, подобных этим, созданных по образцу оружия с их родного мира."
"A sticky blob of \"silk\" from a sand worm. It's not what you'd call silky.": "Липкая капля «шёлка» от песчаного червя. Это вряд ли можно назвать шёлковистым."
"This bulky sack contains sand. It's clean, mid-grain sand.": "Этот громоздкий мешок наполнен песком. Это чистый песок среднего помола."
"Dye used to color a piece of clothing or armor sandy brown.": "Краска, используемая для окрашивания одежды или доспехов в песочно-коричневый цвет."
"It doesn't have any sand magic or anything. It's just been in the sand a long time.": "В нем нет никакой песчаной магии или чего-то подобного. Он просто долгое время пролежал в песке."
"A beautiful blue stone. In magic it is associated with flight and the sky.": "Красивый синий камень. В магии он ассоциируется с полётом и небом."
"This small gem is brownish orange. Used in magic, it provides extra courage or energy to someone under great stress.\n\nAssociated Primary Skill: Warden\nAssociated Secondary Skill: Tailoring": "Этот маленький драгоценный камень коричневато-оранжевого цвета. В магии он придаёт дополнительное мужество или энергию тому, кто испытывает сильный стресс.\n\nСвязанный основной навык: Страж\nСвязанный вторичный навык: Портняжное дело"
"A pack full of extremely small woman's clothing, plus blankets and some costume jewelry.": "Рюкзак, полный очень маленькой женской одежды, а также одеял и некоторой бижутерии."
"A leafy weed. (This item can be used in recipes that call for Mixed Greens.)": "Листяной сорняк. (Этот предмет можно использовать в рецептах, требующих Смесь зелени.)"
"Tasty pork and venison sausage. Just don't ask to see how it's made ...": "Вкусная колбаса из свинины и оленины. Просто не спрашивайте, как её делают ..."
"The shell of a departed bivalve. It's pretty.": "Раковина ушедшего двустворчатого моллюска. Она красивая."
"The medallion is engraved with a pirate ship, the symbol of the goblin god Remga.": "На медальоне выгравирован пиратский корабль, символ бога гоблинов Ремга."
"A pulled-curd cheese with a slightly rubbery, sweet taste.\n\nCheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр с тянущейся структурой, слегка резиновым и сладким вкусом.\n\nТип сыра: Тянущийся (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Made of extra bent wire and topped with a piece of green glass... it's made of junk. But it's still pretty, magical and more powerful than before.": "Сделано из сильно изогнутой проволоки и увенчано кусочком зелёного стекла... это мусор. Но оно всё ещё красивое, магическое и сильнее, чем раньше."
"A scorched metal key you found in the belly of a fire spider under Hogan's Keep. This key has seen some hot action.": "Обожжённый металлический ключ, который вы нашли в брюхе огненного паука под крепостью Хоган. Этот ключ побывал в жарких переделках."
"Made of insanely strong scorpion and beetle carapace plates riveted together, these boots will keep your feet safe from everything except blisters. It's a pity carapace plates aren't more comfortable...": "Сделанные из невероятно прочных пластин панциря скорпиона и жука, заклёпанных вместе, эти сапоги защитят ваши ноги от всего, кроме мозолей. Жаль, что пластины панциря не бывают удобнее..."
"Made of immaculately-carved pieces of giant insect carapace, these are a work of mechanical art. Heavy and prone to painful pinching, they are tolerable only to hardened warriors.": "Сделанные из безупречно вырезанных частей панциря гигантского насекомого, эти рукавицы являются произведением механического искусства. Тяжёлые и склонные к болезненному защемлению, они приемлемы только для закалённых воинов."
"It's amazing that these awkwardly-riveted pieces of scorpion and beetle carapace give you any mobility at all. But they do! Just don't sit down too quickly, and you'll be fine.": "Удивительно, что эти неуклюже заклёпанные куски панциря скорпиона и жука вообще дают тебе какую-то подвижность. Но дают! Просто не садись слишком быстро, и всё будет в порядке."
"A terrifying visage made of hardened scorpion sinews backed by reflective beetle carapaces.": "Ужасающий лик, сделанный из затвердевших сухожилий скорпиона, укреплённый отражающими панцирями жуков."
"Made of giant beetle and scorpion carapace, this stifling, awkward, and heavy coat rewards those who have the fortitude to endure wearing it.": "Сделанный из панциря гигантского жука и скорпиона, этот душный, неудобный и тяжёлый плащ вознаграждает тех, кто обладает стойкостью, чтобы выдержать его ношение."
"The shell of a dead scorpion. It's very smelly.": "Панцирь мёртвого скорпиона. Очень вонючий."
"An organ cut out of a large scorpion.": "Орган, вырезанный из большого скорпиона."
"A huge poisonous stinger.": "Огромное ядовитое жало."
"Made from a giant scorpion tail, this weapon is difficult to use deftly, but poisoners love it.": "Сделанное из хвоста гигантского скорпиона, это оружие трудно использовать ловко, но ядовитые мастера его обожают."
"A plucked-out eyeball from a Demon Scout. Even in death, it gives you an eerie feeling of being watched.": "Вынутый глаз демонического разведчика. Даже после смерти он вызывает жуткое ощущение, что за тобой наблюдают."
"It's a scrambled egg, beloved breakfast of nearly every sentient race.": "Это яичница-болтунья, любимый завтрак почти каждой разумной расы."
"A recently-laid scray egg.": "Недавно снесённое яйцо скрея."
"The weird water-and-air-processing organ of a scray.": "Странный орган обработки воды и воздуха у скрея."
"A chunk of a dead scray. It still glows faintly.": "Кусок мёртвого скрея. Он всё ещё слабо светится."
"The sharp bit of a scray's tail.": "Острый конец хвоста скрея."
"Uncomfortable tights made of scray skin. When a scray dies, ranalon often make pants like these to honor them by using all the parts of the corpse.": "Неудобные лосины из шкуры скрея. Когда скрей умирает, раналон часто шьют такие штаны, чтобы почтить его, используя все части трупа."
"Made from a particularly well-bred scray, this fleshy coat has predictable odor problems but is nonetheless quite impressive.": "Сшито из особенно хорошо выращенного скрея, это мясистое пальто имеет характерные проблемы с запахом, но тем не менее выглядит весьма впечатляюще."
"When you touch it, it seems to scream into your brain.": "Когда ты прикасаешься к нему, кажется, что он кричит прямо в твой мозг."
"A scroll filled to the brim with research notes about demons. To the right person this would be probably be very informative.": "Свиток, переполненный заметками исследований о демонах. Для нужного человека это, вероятно, будет очень познавательно."
"Made of bent wire and topped with a piece of glass... it's made of junk. But it's still pretty, and it's magical.": "Сделано из изогнутой проволоки и увенчано кусочком стекла... это сделано из хлама. Но оно всё равно красивое и волшебное."
"Dye used to color a piece of clothing or armor sea green.": "Краска, используемая для окрашивания одежды или брони в цвет морской зелени."
"Used by rakshasa house-builders to \"seal\" ghosts out of new homes. The efficacy of their technique, however, seems dubious.": "Используется строителями домов раксаш, чтобы «запечатать» призраков вне новых домов. Однако эффективность их метода вызывает сомнения."
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 35 enchantments.)": "Сделаны из гигантских морских раковин. Они удобнее, чем выглядят. (Включают случайные чары 35 уровня.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 35 enchantments.)": "Эти массивные ракушки усилены тонким слоем дерева, что делает доспехи неудобными, но эффективными. (Включает случайные чары 35 уровня.)"
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 35 enchantments.)": "Эти перчатки сделаны из плетёной рыбьей кишки и украшены крепкими раковинами. Странно, но носибельно. Встроенный универсальный нож для открытия устриц. (Содержит случайные чары 35 уровня.)"
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 35 enchantments.)": "Большая раковина выстлана акульей кожей и сеткой. Сражаться в таком шлеме требует некоторой практики! (Включает случайные чары 35-го уровня.)"
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 35 enchantments.)": "Сделаны из гигантских морских раковин, сшитых вместе морскими водорослями. Удивительно, но они не воняют. (Включает случайные чары 35 уровня.)"
"This recent work order requests the following:\nDeliver 10 Amazing Cranberry Sauces to Ogamboe in the Fae Realm. Reward: 13,517 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 удивительных клюквенных соусов Огамбоэ в Мир Фей. Награда: 13 517 советов."
"This recent work order requests the following:\nDeliver 10 Autumn Salads to Ogamboe in the Fae Realm. Reward: 18,214 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 Осенних салатов Огамбо в Царство Фей. Награда: 18 214 советов."
"This recent work order requests the following:\nDeliver 10 Basic Cranberry Sauces to Fitz the Boatman on the Serbule docks. Reward: 4,142 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 простых клюквенных соусов Фитцу Лодочнику на доки Сербуля. Награда: 4 142 совета."
"This recent work order requests the following:\nDeliver 10 Basic Pumpkin Pies to Irkima in Red Wing Casino. Reward: 14,273 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 простых тыквенных пирогов Иркиме в казино Красное Крыло. Награда: 14 273 совета."
"This recent work order requests the following:\nDeliver 10 Bland Baked Turkeys to Fitz the Boatman on the Serbule docks. Reward: 2,232 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 пресных запечённых индюшек Фитцу Лодочнику на доки Сербуля. Награда: 2 232 совета."
"This recent work order requests the following:\nDeliver 10 Cinnamon Pumpkin Rolls to Ogamboe in the Fae Realm. Reward: 6,069 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 коричных тыквенных рулетов Огамбоэ в Царство Фей. Награда: 6 069 советов."
"This recent work order requests the following:\nDeliver 10 Cranberry-Almond Pies to Ogamboe in the Fae Realm. Reward: 14,943 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 пирогов с клюквой и миндалём Огамбоэ в Царство Фей. Награда: 14 943 совета."
"This recent work order requests the following:\nDeliver 10 Cranberry-Barbecue Muttons to Fitz the Boatman on the Serbule docks. Reward: 3,064 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 баранины с клюквенно-барбекю Фитцу Лодочнику на доки Сербуля. Награда: 3 064 совета."
"This recent work order requests the following:\nDeliver 10 Cranberry-Barbecue Steaks to Irkima in Red Wing Casino. Reward: 7,556 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 стейков с клюквой и барбекю Иркиме в казино Красное Крыло. Награда: 7 556 советов."
"This recent work order requests the following:\nDeliver 10 Cranberry-Glazed \"Meatballs\" to Sheyna in Rahu. Reward: 18,495 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 клюквенных глазированных «Фрикаделек» Шейне в Раху. Награда: 18 495 советов."
"This recent work order requests the following:\nDeliver 10 Cranberry-Turkey Sandwiches to Fitz the Boatman on the Serbule docks. Reward: 2,970 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 сэндвичей с клюквенно-индюшиным мясом Фитцу Лодочнику на доки Сербуля. Награда: 2 970 советов."
"This recent work order requests the following:\nDeliver 10 Dried Cranberries to Fitz the Boatman on the Serbule docks. Reward: 2,482 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 сушёных клюкв Фитцу Лодочнику на доки Сербуля. Награда: 2 482 совета."
"This recent work order requests the following:\nDeliver 10 Fancy Pumpkin Pies to Ogamboe in the Fae Realm. Reward: 17,904 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 изысканных тыквенных пирогов Огамбоэ в Царство Фей. Награда: 17 904 совета."
