"A public display of fresh flowers that instills a hearty vigor and a thirst for the outdoors.\n\nGrants 25% chance of chopping extra regular wood and 5% chance of chopping extra perfect wood. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 10.": "Публичная композиция из свежих цветов, которая придаёт бодрость и пробуждает жажду к природе.\\n\\nДарует 25% шанс получить дополнительную обычную древесину и 5% шанс получить дополнительную идеальную древесину при рубке. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 10."
