"A bunch of seaweed, edible if properly dried and prepared.": "Кучка морской водоросли, съедобна при правильной сушке и приготовлении."
"Recovers 75 health and power, and recovers a bit more for 30 seconds": "Восстанавливает 75 здоровья и энергии, а также восстанавливает немного больше в течение 30 секунд"
"A secret variety of rice cultivated in Rahu. Most citizens know it exists, but few know exactly where or how it is made.": "Секретный сорт риса, выращиваемый в Раху. Большинство жителей знают о его существовании, но немногие точно знают, где и как он производится."
"This vinegar infusion is a closely-guarded secret.": "Этот уксусный настой — тщательно охраняемый секрет."
"These notes describe how to use a \"genetics analyzer\" to discover hidden anatomical secrets of arthropods. It's very technical.": "В этих заметках описывается, как использовать «анализатор генетики» для раскрытия скрытых анатомических тайн членистоногих. Это очень технически."
"These notes describe how to use a \"genetics analyzer\" to discover hidden anatomical secrets of non-ruminant ungulates. It's very technical.": "В этих заметках описывается, как использовать «анализатор генетики» для раскрытия скрытых анатомических тайн непереваривателей. Очень технически."
"This bottle of high-quality wine has been mostly consumed by goblins.": "Эта бутылка высококачественного вина в основном была выпита гоблинами."
"A blade that has been in the Sedgewick family line for generations.": "Клинок, который передавался в семье Седжвиков из поколения в поколение."
"A tasty beverage of cactus juice and some sweet ingredient Selaxi refuses to share. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный напиток из сока кактуса и сладкого ингредиента, которым Селакси отказывается делиться. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A delicious snack food. It's ... some sort of meat... drenched in a sweet sauce and wrapped in dough. Selaxi refuses to part with the recipe. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска. Это... какой-то мясной продукт... пропитанный сладким соусом и завернутый в тесто. Селакси отказывается делиться рецептом. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"A warm crystal that seems to constantly grow and shrink.": "Тёплый кристалл, который, кажется, постоянно растёт и сжимается."
"A bundle of rough phlogiston that has carefully sealed up and labeled \"Semi-Sturdy Phlogiston\".": "Связка грубого флогистона, аккуратно запечатанная и помеченная как «Полупрочный Флогистон»."
"It's dead now, but you swore it was moving just a second ago.": "Теперь оно мертво, но ты клялся, что оно двигалось всего секунду назад."
"Records the location of a mineral deposit in or around Serbule.": "Фиксирует местоположение месторождения минералов в Сербуле или вокруг него."
"Records the location of metal that can be mined somewhere in Serbule Hills.": "Фиксирует местоположение металла, который можно добыть где-то в Сербульских холмах."
"Records the location of a mineral deposit in or around Serbule Hills.": "Фиксирует местоположение месторождения минералов в холмах Сербуль или вокруг них."
"A tasty slab of meat.": "Вкусный кусок мяса."
"An elf-only tea that boosts the chance of anatomy critical hits with archery attacks. (For easy cleanup, the teapot magically biodegrades when the tea is consumed.)": "Чай только для эльфов, который увеличивает шанс критических попаданий по анатомии при атаках из лука. (Для удобной уборки чайник магически разлагается после употребления чая.)"
"Shaped like a snake for some reason.": "По какой-то причине выполнена в форме змеи."
"This punching weapon has a little mechanical serpent head on it which can be used to inject poison deep into a target.": "Это ударное оружие имеет маленькую механическую голову змеи, которая может использоваться для введения яда глубоко в цель."
"A dull yellow-green stone. Used in magic, it can pierce the barrier between life and death.\n\nAssociated Primary Skill: Necromancy": "Тусклый жёлто-зелёный камень. Используется в магии, он способен пробить барьер между жизнью и смертью.\n\nСвязанный основной навык: Некромантия"
"Special deer-fitted horseshoes made of an otherworldly metal. ": "Особые подковы для лошадей, сделанные из потустороннего металла."
"A belt for debuffers that need accuracy.": "Пояс для ослабляющих, которым нужна точность."
"This belt has exotic shamanic runes etched into it.": "На этом поясе выгравированы экзотические шаманские руны."
"Can be studied to earn Shamanic Infusion XP. (Requires VIP.)": "Можно изучать для получения опыта шаманского настаивания. (Требуется VIP.)"
"Teaches you a shamanic infusion technique.": "Обучает технике шаманского настоя."
"A tough but highly portable snack consisting of chewy shark meat in a fried pepper husk. It's an acquired taste.": "Крепкий, но очень удобный перекус, состоящий из жевательного мяса акулы в обжаренной перчиной оболочке. Вкус на любителя."
"The fin of a large shark. It's supposedly edible.": "Плавник большой акулы. Предположительно съедобен."
"Raw shark on a ball of delicious rice.": "Сырая акула на шарике вкусного риса."
"Stinky sludge that lets you move like a shark. (Swimming buff does not stack with other swimming-buff potions.)": "Вонючая жижа, которая позволяет двигаться как акула. (Бафф плавания не суммируется с другими зельями, дающими бафф плавания.)"
"Raw shark wrapped in seaweed, on a ball of delicious rice.": "Сырая акула, завернутая в морские водоросли, на шарике вкусного риса."
"Three skewers of seafood and vegetables.": "Три шашлычка из морепродуктов и овощей."
"A tangy cheddar cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Острый чеддер.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A thin tube full of liquid. Apparently you jab it into your skin to use it -- a horrific idea that only a mantis could dream up.\n\nSharpen is supposedly not addictive.": "Тонкая трубочка, наполненная жидкостью. По всей видимости, её нужно вонзать в кожу, чтобы использовать — ужасная идея, которую мог придумать только богомол.\\n\\nГоворят, что Шарпен не вызывает привыкания."
"A rock for sharpening the blades of tools.": "Камень для заточки лезвий инструментов."
"A handful of fragmented animal shells.": "Горсть раздробленных панцирей животных."
"An Orichalcum blade with a seashell motif. (With random level 35 enchantments.)": "Клинок из орихалка с морской раковиной в орнаменте. (С случайными зачарованиями 35 уровня.)"
"A tasty baked dish with mutton and veggies.": "Вкусное запечённое блюдо с бараниной и овощами."
"Really thick.": "Очень густое."
"Can be studied to earn Shield XP. (Requires VIP.)": "Можно изучать для получения опыта в Щитах. (Требуется VIP.)"
"Named after a famous shield that was reluctantly given by Ormorek,the  god of bitterness, to his chosen champion during the Rebuke.": "Назван в честь знаменитого щита, который Орморек, бог горечи, неохотно передал своему избранному чемпиону во время Отлучения."
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 35 enchantments.)": "Сделан из экзотического океанического металла орихалка, этот щит лёгкий, прочный и долговечный. (Включает случайные чары 35 уровня.)"
"Teaches you a shield technique.": "Обучает технике владения щитом."
"The wearer of this elegant black ring is coated in an energy field that protects them from harm.": "Носитель этого элегантного чёрного кольца окутан энергетическим полем, которое защищает его от вреда."
"The wings of a dead shimmerwing butterfly.": "Крылья мёртвого мерцающего мотылька."
"A shiny metal key from a goblin jewelry chest that you found under Hogan's Keep. Very well polished. ": "Блестящий металлический ключ от сундука с украшениями гоблинов, который вы нашли под крепостью Хоган. Очень хорошо отполирован."
"Nice goblin craftsmanship. Well, goblin oversight of slave craftsmanship, which is the same thing.": "Отличное гоблинское мастерство. Точнее, гоблинский надзор за мастерством рабов, что по сути одно и то же."
"Sewn by an expert tailor in Rahu, this gown is lovely, but apparently not lovely <i>enough</i>, since it was discarded.": "Сшитая опытным портным в Раху, эта мантия прекрасна, но, видимо, недостаточно <i>прекрасна</i>, раз была выброшена."
"A strange padded belt that helps the wearer hold their ground.": "Странный набитый пояс, который помогает носителю удерживать позицию."
"This powder feels tingly.": "Эта пыль щекочет кожу."
"The broken-off tip of a lightning wand. While it's now completely inert, it may still be a useful study aid for mages.": "Отломанный наконечник молниевого жезла. Хотя теперь он полностью безжизненный, он всё ещё может быть полезным учебным пособием для магов."
"A bow designed to channel lightning. And also arrows.": "Лук, созданный для передачи молнии. А также стрел."
"The bloody skin of a mangy animal.": "Кровавая шкура больного животного."
"Made by an amateur, this punching weapon barely fits onto your hand. But sometimes an ugly, stupid-looking weapon can inspire more fear than a good weapon. Not really. But keep thinking that while you wear these.": "Сделанное любителем, это ударное оружие едва помещается на вашей руке. Но иногда уродливое, глупо выглядящее оружие может внушать больше страха, чем хорошее. На самом деле — нет. Но продолжайте в это верить, пока носите их."
"A musty outdoor scent that makes you want to go outdoors and hit stuff.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Заплесневелый запах свежего воздуха, вызывающий желание выйти на улицу и что-нибудь разбить.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x3.": "Одноразовый стол для выполнения каллиграфии. Установите его, чтобы увеличить длительность каллиграфии в 3 раза."
"These metal boots are devoid of padding and practicality.": "Эти металлические сапоги лишены набивки и практичности."
"Featuring embarrassingly bad chainwork!": "Стыдно плохая кольчужная работа!"
"A sheet of interwoven chains that you can arguably place upon your head.": "Полотно переплетённых колец, которое, можно сказать, можно надеть на голову."
"Scratchy mittens maid of metal.": "Царапающиеся рукавицы из металла."
"Poorly-made chain that fits and protects poorly.": "Плохо сделанная кольчуга, которая плохо сидит и плохо защищает."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +6 for 30 minutes.": "Довольно удобный стул. Отдых в нём увеличивает восстановление брони на +6 на 30 минут."
"It goes on your head.": "Надевается на голову."
"Barely functional cloth gloves.": "Едва функциональные тканевые перчатки."
"A barbaric act of cruelty to cotton.": "Варварский акт жестокости по отношению к хлопку."
"It sucks. But it makes you look less intimidating. Which might be a good thing or a bad thing.": "Она отстой. Но она делает тебя менее устрашающим. Что может быть как хорошим, так и плохим."
"Cloth slippers. Brilliant! (Not really.)": "Тканевые тапочки. Великолепно! (На самом деле нет.)"
"A big tree branch with most of the leaves removed.": "Большая ветка дерева с почти всеми снятыми листьями."
"Come on, the bark isn't even fully removed from this stick! But it's pretty thick. Very basic Fire Magic runes have been crudely etched into the bark.": "Да ладно, кора даже полностью не снята с этой палки! Но она довольно толстая. Очень простые руны Огненной магии грубо вырезаны на коре."
"Farmers typically don't feel compelled to shod a cow. But some cows are more violent and adventurous than others.": "Фермеры обычно не считают нужным обувать корову. Но некоторые коровы бывают более агрессивными и любопытными, чем другие."
"Deer seem to get along fine in nature without having metal hammered into their hooves, but not all deer are content with the life of a passive ungulate.": "Олени, кажется, прекрасно обходятся в природе без металлических подков на копытах, но не все олени довольны жизнью пассивного копытного."
"A poor rendition of a dragon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Плохая копия дракона. Это никого не впечатлит, но изготовление было хорошей практикой. Держится 5 минут после установки."
"Some bones strapped to a handle make this off-hand martial weapon look as stupid as it feels.": "Несколько костей, привязанных к рукояти, делают это оружие ближнего боя таким же глупым, каким оно кажется."
"It has a vague flower smell.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Он имеет слабый цветочный аромат.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"It's an extremely poor forgery of \"Last Autumn Sunset\" by Kot Bhenul. There isn't even any real gold in the gold paint!": "Это крайне некачественная подделка «Последнего осеннего заката» Кота Бенула. В золотой краске даже нет настоящего золота!"
"A poor rendition of a dragon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия дракона, покрытая золотом. Это никого не впечатлит, но её создание было хорошей практикой. Длится 10 минут после установки."
"A poor rendition of a gryphon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия грифона, покрытая золотом. Это никого не впечатлит, но изготовление было хорошей практикой. Длится 10 минут после установки."
"A poor rendition of a gryphon. This will not impress anyone, but making it was good practice. Lasts for 5 minutes once deployed.": "Плохая копия грифона. Это никого не впечатлит, но изготовление было хорошей практикой. Длится 5 минут после установки."
"A belt with broken glass along the interior, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс с битым стеклом внутри, причиняющий носителю сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут почувствовать, что эта боль усиливает их чувство выживания."
"These boots are abysmal, leaky, and humiliating to wear.": "Эти сапоги ужасны, протекают и стыдно их носить."
"Instead of wearing these, why not just strap some dead animals to your hands? That would be more stylish, more convenient, and less smelly.": "Вместо того чтобы носить эти, почему бы просто не привязать к рукам пару мёртвых животных? Это было бы стильнее, удобнее и менее воняло."
"While vaguely protective, this lopsided helmet is so unbalancing that you're almost better off just going into combat without a helm at all.": "Хотя он отчасти защищает, этот кривой шлем настолько нарушает равновесие, что почти лучше идти в бой вовсе без шлема."
"With horrid stitching and gigantic holes, these smelly pants are just plain sad.": "С ужасными швами и огромными дырами, эти вонючие штаны просто жалкие."
"Poor-quality leather.": "Кожа низкого качества."
"Poor-quality leather has been crudely woven into a fairly repulsive shirt. It's essentially made of garbage.": "Кожа низкого качества грубо соткана в довольно отвратительную рубашку. По сути, это мусор."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x3.": "Одноразовый табурет для медитации. Используйте рядом с Столбом Медитации, чтобы увеличить длительность эффектов медитации в 3 раза."
"Come on, the bark isn't even fully removed from this stick! But it's pretty thick. (It will work for Staff Fighting but not Fire Magic abilities.)": "Да ладно, кора с этой палки даже полностью не снята! Но она довольно толстая. (Подойдет для боя посохом, но не для способностей Огненной магии.)"
"A poorly crafted music box that sounds like a lute for animal forms so they can play music for their plants. This box looks like it is only good for one use before it will break. Don't forget to start it up after you deploy it!\n<b>IMPORTANT:</b> You must be in beast form for at least 3 hours of in-game time before you can deploy this item. Leaving beast form after deploying will cause you to lose control of the box. Limit one music box deployment per account at a time.": "Плохо сделанная музыкальная шкатулка, которая звучит как лютня для звериных форм, чтобы они могли играть музыку для своих растений. Эта шкатулка, похоже, годится только для одного использования, после чего сломается. Не забудьте завести её после установки!  \n<b>ВАЖНО:</b> Вы должны находиться в звериной форме не менее 3 часов игрового времени, прежде чем сможете использовать этот предмет. Выход из звериной формы после установки приведёт к потере контроля над шкатулкой. Одновременно на аккаунте можно использовать только одну музыкальную шкатулку."
"A simple belt with a pouch.": "Простой пояс с мешочком."
"A symbol of Arisetsu has been crudely carved into this crude staff.": "На этом грубом посохе небрежно вырезан символ Арисэцу."
"You can sit in it.": "Вы можете на нём сидеть."
"A small saddlebag for petite ponies.": "Небольшая седельная сумка для маленьких пони."
"A poor rendition of a dragon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия дракона, покрытая серебром. Это никого не впечатлит, но изготовление было хорошей практикой. Длится 10 минут после установки."
"A poor rendition of a gryphon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия грифона, покрытая серебром. Это никого не впечатлит, но изготовление было хорошей практикой. Длится 10 минут после установки."
"Pieces of chitin and scraps of metal are held together with thick webbing. This would fit on a spider.": "Куски хитина и обрывки металла скреплены толстой паутиной. Это подошло бы для паука."
"A small box for storing up to 4 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Небольшая коробка для хранения до 4 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получающий доступ к ящику, может хранить свои собственные предметы. Все ящики для хранения позволяют игроку получать доступ к одним и тем же предметам.)"
"Low-quality, but shelf-stable, rendered fat.": "Низкокачественный, но долго хранящийся топлёный жир."
"A bit of string that will (technically) burn.": "Немного верёвки, которая (технически) горит."
"If a cow needed to be shod for some reason, it is surely not with these wooden, splinter-laced bits of junk.": "Если корову по какой-то причине нужно подковать, то уж точно не этими деревянными, покрытыми занозами кусками хлама."
"If a deer needed to be shod for some reason, it is surely not with these wooden, splinter-laced bits of junk.": "Если по какой-то причине оленю нужно было подковать ноги, то уж точно не этими деревянными, покрытыми занозами обломками."
"All the smells of a scrub tree in a swamp to help you get into a natural mindset.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Все ароматы кустарника в болоте, чтобы помочь вам настроиться на природный лад.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A strange magical cube. It can be used to give foot armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить бонусную магическую способность обуви. Посетите торговца снаряжением (или игрока-усилителя), чтобы установить его."
"A conveniently-sized shovel, perfect for digging small graves. (With this in your inventory, you will have the option of burying the corpses of deceased monsters. Burying monsters will make replacement monsters appear more quickly.)": "Удобная по размеру лопата, идеально подходящая для копания небольших могил. (Если эта вещь есть в вашем инвентаре, у вас появится возможность закапывать трупы погибших монстров. Закапывание монстров ускорит появление новых монстров.)"
"Sturdy metal boots with a guiding mechanism to orient a shovel while digging.": "Прочные металлические сапоги с направляющим механизмом для ориентирования лопаты во время копки."
"A big raw shrimp. It needs to be de-veined and cleaned before eating.": "Большая сырая креветка. Её нужно очистить от жилок и промыть перед едой."
"A heady mixture of edible mushrooms in a green pepper \"bowl\".": "Опьяняющая смесь съедобных грибов в «чаше» из зелёного перца."
"Hand-made from a leftover snail shell, and infused with simple magic by Sie's fairy friends.": "Сделан вручную из оставшейся раковины улитки и наполнен простой магией от фейных друзей Сай."
"Dye used to color a piece of clothing or armor sienna.": "Краска, используемая для окрашивания одежды или брони в цвет сиенна."
"Can be studied to earn Sigil Scripting XP. (Requires VIP.)": "Можно изучать для получения опыта в написании сигилов. (Требуется VIP.)"
"Teaches you a sigil scripting combat technique.": "Обучает вас боевой технике скриптования сигилов."
"A signet ring, designed to stamp an insignia into printed documents. It is vaguely enchanted. The signet is a single bat wing.": "Печатное кольцо, предназначенное для оттиска герба на печатных документах. Оно слегка зачаровано. Герб изображает одно крыло летучей мыши."
"Dye used to color a piece of clothing or armor silver.": "Краска, используемая для окрашивания одежды или брони в серебряный цвет."
"A beautiful collar with a unique identification number chiseled into the inside. As well as being made of silver, it might be useful for accessing certain supply crates.": "Красивый ошейник с уникальным идентификационным номером, выгравированным внутри. Помимо того, что он сделан из серебра, он может быть полезен для доступа к определённым ящикам с припасами."
"It's covered in bloody fingerprints.": "Оно покрыто кровавыми отпечатками пальцев."
"A chunk of ore that could be used to make silver equipment and jewelry. It can also be used in formulas that augment jewelry.": "Кусок руды, который можно использовать для создания серебряного снаряжения и украшений. Также может использоваться в формулах для улучшения украшений."
"Popular with silversmiths and salad enthusiasts.": "Популярна среди серебряных дел мастеров и любителей салатов."
"An especially beautiful shell.": "Особенно красивая раковина."
"The sharp part of a spear. It's made of silver, so perhaps it was intended to be used against lycanthropes or worm-demons.": "Острая часть копья. Сделана из серебра, возможно, предназначалась для борьбы с ликантропами или червеподобными демонами."
"A big spring made of silver. Wait, silver doesn't normally bend like that, does it? Weird. But useless.": "Большой источник из серебра. Подождите, серебро обычно так не гнётся, не так ли? Странно. Но бесполезно."
"Inlaid with beautiful silver filigree, this cozy shirt looks gorgeous. A universal holy symbol is embroidered inside, allowing priests of Arisetsu, Saledar, or Kirad to enforce their wills.": "Украшенная красивой серебряной филигранью, эта уютная рубашка выглядит великолепно. Внутри вышит универсальный святой символ, позволяющий жрецам Арисэцу, Саледара или Кирада исполнять свою волю."
"An iron sword with a thick coat of silver on top.": "Железный меч с толстым слоем серебра сверху."
"A thin blanket embroidered with a depiction of a beaming sun. This style of blanket is often given out by followers of Arisetsu, the god of warmth and hope.": "Тонкое одеяло, вышитое изображением сияющего солнца. Такой стиль одеял часто дарят последователи Арисэцу, бога тепла и надежды."
"For repairing minor armor damage. Used by Armor Patching abilities.": "Для ремонта незначительных повреждений брони. Используется способностями ремонта брони."
"A light tasty snack of seeds and dried fruit. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Лёгкая вкусная закуска из семян и сушёных фруктов. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"Thin and uncomfortable, but warm enough to keep you alive.": "Тонкое и неудобное, но достаточно тёплое, чтобы сохранить жизнь."
"A slightly mouth-puckering treat. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Немного терпкое лакомство. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"For healing minor injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения незначительных травм. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing minor injuries. Used by First Aid abilities.": "Для лечения незначительных травм. Используется способностями первой помощи."
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 10 free raffle tickets for a single item (or item stack).": "Сложное устройство, которое может выдавать бесплатные лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 10 бесплатных лотерейных билетов для одного предмета (или стака предметов)."
"It's made of ice! It will eventually melt, but it usually lasts a while.": "Он сделан изо льда! Со временем растает, но обычно держится достаточно долго."
"An elaborate contraption that can dispense free items. This model can dispense up to 10 of a single kind of item.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдать до 10 штук одного вида предмета."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 10 of a single kind of item.": "Сложный механизм, который может выдавать предметы и собирать валюту. Эта модель может продавать до 10 штук одного вида предмета."
"A longer-term storage solution for pets. The built-in entertainment options raise the contained pet's Happiness by 10.\n\nThis one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 14 days. If the animal is not rehomed in a stable by then, it will escape and be lost forever.\n<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Долгосрочное решение для хранения питомцев. Встроенные развлекательные опции повышают Счастье содержащегося питомца на 10.\\n\\nЭтот одноразовый контейнер может хранить любое питомцевое животное (выведенное в неволе, не дикое) качества питомца (не для разведения) до 14 дней. Если животное не будет передано в стойло к этому времени, оно сбежит и потеряется навсегда.\\n<i>[Вы можете использовать этот предмет на питомце, находящемся в стойле, посетив стойлового мастера. Ищите кнопку «Использовать предмет...» на экране стойла.]</i>"
"Used in the most primitive of smithing recipes.": "Используется в самых примитивных рецептах кузнечного дела."
"A handful of wood nails.": "Горсть деревянных гвоздей."
"A tasty seasonal snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный сезонный перекус. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"Silver is a poor metal for making weapons, and this pocked and marred blade shows it. But its effect against lycanthropes is quite pronounced.": "Серебро — плохой металл для изготовления оружия, и этот изъеденный и повреждённый клинок это доказывает. Но его эффект против ликантропов весьма заметен."
"A simple skinning knife for beginning skinners. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Простой нож для снятия шкур для начинающих. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры с трупов некоторых врагов.)"
"A plain but tasty loaf of sourdough.": "Простой, но вкусный батон закваски."
"A simple knife designed for beginning knife-throwers. (Used with the Knife combat skill.)": "Простой нож, предназначенный для начинающих метателей ножей. (Используется с навыком боя ножами.)"
"A very basic animal cage designed for transferring pets, intended for extremely short-term use.\n\nThis one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 48 hours. If the animal is not rehomed in a stable by then, it will escape and be lost forever.\n<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Очень простая клетка для животных, предназначенная для перевозки питомцев и рассчитанная на очень короткий срок использования.\\n\\nЭтот одноразовый контейнер может содержать любое питомцевое животное (выведенное в неволе, не дикое) качества питомца (не для разведения) до 48 часов. Если животное не будет переселено в стойло к этому времени, оно сбежит и потеряется навсегда.\\n<i>[Вы можете использовать этот предмет на питомце, находящемся в стойле, посетив стойлового мастера. Ищите кнопку «Использовать предмет...» на экране стойла.]</i>"
"A simple whittling knife for beginning whittlers.": "Простой нож для резьбы для начинающих резчиков."
"A fresh, zesty, very simple salad.": "Свежий, пикантный, очень простой салат."
"Well, this is a stick.": "Ну, это просто палка."
"A rakshasa's tail ring. It's not magical. It is inscribed, \"to Sinda, the explorer supreme.\"": "Кольцо на хвосте ракшасы. Оно не магическое. На нём выгравирована надпись: «Синде, высшей исследовательнице.»"
"Designed to be worn at the base of a Rakshasa's tail, this allows the wearer to remember two additional map spots at a time. It is inscribed, \"to Sinda, the explorer supreme.\"": "Предназначено для ношения у основания хвоста ракшасы, позволяет владельцу запоминать одновременно две дополнительные точки на карте. На кольце выгравирована надпись: «Синде, высшей исследовательнице.»"
"A mangy, possibly-diseased beast yielded this mangy, possibly-diseased meat. Mmm.\n\n(Use in Cheap Meat recipes.)": "От облезлого, возможно больного зверя получено это облезлое, возможно больное мясо. Ммм.\n\n(Используется в рецептах дешёвого мяса.)"
"This cat meat might be fresh. Or it might not be. It's so gross that it'd be hard to tell the difference.\n\n(Use in Cheap Meat recipes.)": "Это кошачье мясо может быть свежим. А может и нет. Оно настолько отвратительное, что трудно определить разницу.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"A small and unimpressive dinosaur yielded this gross thing.\n\n(Use in Cheap Meat recipes.)": "Этот отвратительный предмет получен от маленького и непримечательного динозавра.\\n\\n (Используется в рецептах дешёвого мяса.)"
"An unimpressive dog-like creature yielded this unimpressive \"meat\".\n\n(Use in Cheap Meat recipes.)": "Неказистое существо, похожее на собаку, дало это неказистое «мясо».\\n\\n (Используется в рецептах дешёвого мяса.)"
"This might technically be edible, but the stench is almost unbearable.\n\n(Use in Cheap Meat recipes.)": "Технически это может быть съедобным, но вонь почти невыносима.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"A single poorly-made glove. The fingers have been incorrectly positioned, making it impossible to wear.": "Одна плохо сделанная перчатка. Пальцы расположены неправильно, из-за чего её невозможно надеть."
"Apparently Rita gave these to Sir Coth, who has since discarded them.": "Похоже, Рита подарила это сэр Коту, который с тех пор отбросил их."
"A piece of paper that says \"This document is worth 1 (one) Sir Johnson Buck, redeemable at participating commissaries. Sir Johnson retains the right to confiscate this document if he thinks you stole it.\" Beneath the impeccably-handwritten note is an illegible scrawl that you assume is Sir Johnson's signature.": "Кусок бумаги с надписью «Этот документ стоит 1 (один) сэр Джонсон Бак, подлежащий обмену в участвующих коммисариях. Сэр Джонсон оставляет за собой право конфисковать этот документ, если посчитает, что вы его украли.» Под безупречно написанной заметкой находится неразборчивый каракуль, который вы предполагаете, что является подписью сэра Джонсона."
"A cask of a brined cheese with a clean, savory flavor.\n\nCheese Type: Brine (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Бочка рассольного сыра с чистым, пикантным вкусом.\n\nТип сыра: Рассольный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. An inscription on the back in elvish reads, \"To the hunter of my heart. May you always find joy in nature. -Y\"": "Пояс, украшенный странной руной, которая дарует носителю особую удачу. Надпись на обороте на эльфийском гласит: «Охотнику моего сердца. Пусть ты всегда находишь радость в природе. -Й»"
"A small but very sharp blade inlaid with ivory. The craftsmanship is very high.": "Небольшой, но очень острый клинок, инкрустированный слоновой костью. Мастерство изготовления очень высоко."
"A psychic enhancement that lets you harness your formidable skeletal knowledge into a weapon. Tastes like chalk.": "Психическое усиление, позволяющее превратить ваши обширные знания о скелетах в оружие. На вкус напоминает мел."
"Transforms you into a skeleton. Permanent until dispelled! WARNING: think before you drink!": "Превращает вас в скелета. Действует постоянно, пока не будет снято! ВНИМАНИЕ: подумайте, прежде чем пить!"
"The unmistakable smell of fungus hangs around this damp cowl.": "Неповторимый запах грибов витает вокруг этого влажного капюшона."
"An odd serrated utility knife that can be used to extract a skull from a corpse. (Your Butchering skill is used to determine success.)": "Странный зазубренный универсальный нож, который можно использовать для извлечения черепа из трупа. (Для определения успеха используется навык Разделки.)"
"The skull of a ghoul that invaded from a realm of evil.": "Череп упыря, вторгшегося из царства зла."
"Seems like a normal skull.": "Кажется, обычный череп."
"A tough little helmet.": "Прочный маленький шлем."
"Dye used to color a piece of clothing or armor sky blue.": "Краска, используемая для окрашивания одежды или доспехов в небесно-голубой цвет."
"Dye used to color a piece of clothing or armor slate blue.": "Краска, используемая для окрашивания одежды или брони в сланцево-синий цвет."
"Dye used to color a piece of clothing or armor slate gray.": "Краска, используемая для окрашивания одежды или брони в серо-грифельный цвет."
"A liquidy cheese with large curds, commonly made by ratkins enslaved to goblins.\n\nCheese Type: Fresh (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жидковатый сыр с крупными сгустками, обычно изготавливаемый раткинами, порабощёнными гоблинами.\n\nТип сыра: Свежий (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Warm-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Толстое покрывало, которое дарит тепло и комфорт кобыле во время беременности. Это покрывало подходит кобылам с темпераментом Тёплая кровь. Дайте лошади в стойле во время беременности, чтобы ускорить срок вынашивания на 24 часа. (Также может использоваться для согревания в "
"A very sharp fist-weapon.": "Очень острое оружие для рукопашного боя."
"Who doesn't love steel plate armor on your hands? Well... besides wizards?": "Кто не любит стальную латы на руках? Ну... кроме магов?"
"Apples, strawberries, and grapes in sweet syrup. It's good... but not great.": "Яблоки, клубника и виноград в сладком сиропе. Вкусно... но не отлично."
"A gross, sludge-covered ring.": "Отвратительное кольцо, покрытое грязью."
"Perhaps there's a slimy lock somewhere that this opens? It doesn't look like it will last too long...\n<i>[Note: this key does not yet unlock anything.]</i>": "Возможно, где-то есть слизистый замок, который этот ключ открывает? Похоже, он не прослужит долго...\\n<i>[Примечание: этот ключ пока ни от чего не открывает.]</i>"
"These fancy boots have been digested by a slime creature, leaving mostly just metal behind. Don't worry about them being uncomfortable, though: there's tons of ooze in there to keep your feet cozy.": "Эти изящные сапоги были переварены слизневым существом, оставив в основном только металл. Но не беспокойтесь о неудобстве: внутри полно слизи, чтобы ваши ноги были в тепле."
"This box can grow multiple crops of mushrooms.\nBox Duration: 24 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 24 часа\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 48 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 48 часов\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 72 часа\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"The preserved skull of a small animal.": "Сохранённый череп маленького животного."
"A scale from a dragon! Hmm, it'd be a pretty small dragon... or, more likely, some dragon-kin creature.": "Чешуя дракона! Хм, это должен быть довольно маленький дракон... или, скорее всего, какое-то существо из рода драконов."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on chest armor.": "Немного магического остатка, используемого при создании улучшений 1-30 уровня для нагрудной брони."
"The shell of a deceased snail. It's pretty.": "Раковина умершей улитки. Она красивая."
"A small ball of paper that explodes into a colorful burst when lit.": "Маленький шарик из бумаги, который взрывается ярким цветным взрывом при поджоге."
"A small fleck of hardened dinosaur skin.": "Маленький кусочек затвердевшей кожи динозавра."
"A small dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Маленький дракон. Люди, которые на него смотрят, будут смутно вдохновлены создавать лучшее. Действует 5 минут после установки."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on gloves.": "Немного магического осадка, используемого при создании улучшений 1-30 уровня для перчаток."
"A small dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Маленький дракон, покрытый золотом. Те, кто на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A small gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Маленький грифон, покрытый золотом. Те, кто на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"A small gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Маленький грифон. Люди, которые на него смотрят, будут смутно вдохновлены лучше убивать. Действует 5 минут после установки."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on helmets.": "Немного магического остатка, используемого при создании улучшений 1-30 уровней, которые надеваются на шлемы."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on leg armor.": "Немного магического остатка, используемого при создании улучшений 1-30 уровня для ножной брони."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on main-hand weapons.": "Частица магического остатка, используемая при создании улучшений уровней 1-30 для оружия в основной руке."
"A bit of magical runoff used in the creation of level 1-30 Augments that go on necklaces.": "Небольшой магический остаток, используемый при создании усилений 1-30 уровней, которые надеваются на ожерелья."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on off-hand equipment.": "Немного магического остатка, используемого при создании улучшений уровней 1-30 для экипировки вторичной руки."
"A small crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Малый кристаллический призма. Трансмутаторы используют их для направления флогистона в предмет или из него."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on rings.": "Немного магического осадка, используемого при создании улучшений 1-30 уровней, которые надеваются на кольца."
"A bit of magical runoff used in the creation of level 1-30 Augmentations that go on boots.": "Немного магического остатка, используемого при создании улучшений 1-30 уровня, которые надеваются на обувь."
"A small dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Маленький дракон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A small gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Маленький грифон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"A simple, classic meal of mouthwatering fish.": "Простое, классическое блюдо из аппетитной рыбы."
"Dye used to color a piece of clothing or armor smoky white.": "Краска, используемая для окрашивания одежды или доспехов в дымчато-белый цвет."
"A large unbroken block of high-quality animal fat.": "Большой цельный кусок высококачественного животного жира."
"The heart of a demon. While it no longer beats, it still smoulders with some sort of flame.": "Сердце демона. Хотя оно больше не бьётся, оно всё ещё тлеет каким-то пламенем."
"Warm crusty bread, perfect for a cold day. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Тёплый хрустящий хлеб, идеально подходит для холодного дня. (Это перекус. Перекусы складываются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"A snail. It's about two inches in diameter. There are probably ways to prepare this for cooking.  It can also be used in Cheap Meat recipes.": "Улитка. Диаметром около двух дюймов. Вероятно, существуют способы её приготовления. Также может использоваться в рецептах дешёвого мяса."
"The face of a big snail has been made into a makeshift helmet.": "Лицо большой улитки было использовано в качестве импровизированного шлема."
"The breastplate features a perfectly preserved Giant Snail shell.": "Нагрудник украшен идеально сохранившейся раковиной гигантской улитки."
"Made from a perfectly preserved Giant Snail shell.": "Сделан из идеально сохранившейся раковины гигантской улитки."
"The stinky guts of a gigantic snail.": "Вонючие внутренности гигантской улитки."
"Scaly.": "Чешуйчатый."
"Well, the snake meat tastes a lot like chicken. But it tastes good!": "Ну, мясо змеи на вкус очень похоже на курицу. Но оно вкусное!"
"A horrifically violent compound that can be applied to knives.": "Ужасающе сильное вещество, которое можно наносить на ножи."
"A popular Statehelm beverage for busy individuals who need to focus.": "Популярный напиток из Стейтхелма для занятых людей, которым нужно сосредоточиться."
"This armor is feared in any land where orcs are known.": "Этот доспех внушает страх в любой земле, где известны орки."
"The rightly-feared orcish Misery Troopers from the Snowblood Army wear these near-indestructible boots. Well-maintained and polished.": "Праведно боящиеся орочьи Солдаты Мучений из армии Снежной Крови носят эти почти неразрушимые сапоги. Хорошо ухожены и отполированы."
"Horrendously strong, but not especially deft.": "Ужасающе крепкие, но не особенно ловкие."
"An insulated helmet that is as frightening as it is protective.": "Утеплённый шлем, который пугает так же сильно, как и защищает."
"Worn by the elite Snowblood orcs that take care of problematic situations in battle. They're hard to maintain, but impressively protective.": "Носились элитными орками Снежной Крови, которые занимаются проблемными ситуациями в бою. Их трудно содержать, но они впечатляюще защищают."
"A rather unappetizing block of 'meat' made from soybeans, used in cooking. It's slightly squishy.": "Довольно непривлекательный кусок «мяса», сделанный из соевых бобов, используемый в кулинарии. Немного мягкий на ощупь."
"Hard on the outside, runny liquid on the inside. Mmm...": "Твёрдое снаружи, жидкое внутри. Ммм..."
"A tiny puff of humid air. Somehow it stays coherent.": "Крошечный вихрь влажного воздуха. Как-то умудряется оставаться целостным."
"This might have been a treasure map! But it's ruined now. ": "Это могла быть карта сокровищ! Но теперь она испорчена."
"A bottle with five small areas to hold dirt.": "Флакон с пятью небольшими отделениями для хранения земли."
"A crudely removed horn from the head of a Demon Soldier. It is hot to the touch.": "Грубо оторванный рог с головы демона-солдата. На ощупь горячий."
"A military dagger used as a close-quarters weapon by some armies in the Crone Hegemony.": "Военный кинжал, используемый некоторыми армиями в Кронском гегемоне для ближнего боя."
"A description of how to find a legendary hoard of treasure buried in the Eltibule region.": "Описание того, как найти легендарное сокровище, зарытое в регионе Элтибуле."
"A description of how to find a large amount of treasure buried in the Eltibule region.": "Описание того, как найти большое количество сокровищ, зарытых в регионе Эльтибуле."
"A description of how to find a small amount of treasure buried in the Eltibule region.": "Описание того, как найти небольшое количество сокровищ, зарытых в регионе Эльтибуль."
"A description of how to find a huge hoard of treasure buried in the Eltibule region.": "Описание того, как найти огромную кучу сокровищ, зарытую в регионе Эльтибул."
"A description of how to find a legendary hoard of treasure buried in the Ilmari Desert.": "Описание того, как найти легендарное сокровище, зарытое в пустыне Илмари."
"A description of how to find a large amount of treasure buried in the Ilmari Desert.": "Описание того, как найти большое количество сокровищ, зарытых в пустыне Илмари."
"A description of how to find a small amount of treasure buried in the Ilmari Desert.": "Описание того, как найти небольшое количество сокровищ, зарытых в пустыне Илмари."
"A description of how to find a huge hoard of treasure buried in the Ilmari Desert.": "Описание того, как найти огромное сокровище, зарытое в пустыне Илмари."
"A description of how to find a legendary hoard of treasure buried or sunken near Sun Vale.": "Описание того, как найти легендарное сокровище, зарытое или затонувшее рядом с Солнечной Долиной."
"A description of how to find a large amount of treasure buried or sunken near Sun Vale.": "Описание того, как найти большое количество сокровищ, зарытых или затонувших возле Солнечной Долины."
"A description of how to find a small amount of treasure buried or sunken near Sun Vale.": "Описание того, как найти небольшое количество сокровищ, зарытых или затонувших возле Солнечной Долины."
"A description of how to find a huge hoard of treasure buried or sunken near Sun Vale.": "Описание того, как найти огромный клад, зарытый или затонувший рядом с Солнечной Долиной."
"An old key marred by rust.": "Старый ключ, покрытый ржавчиной."
"An expensive necklace with a well-cut magic tourmaline. This type of necklace is often used by people who fear they are in danger of having a psychotic break, although it can only hold off the inevitable for a little while.": "Дорогое ожерелье с хорошо ограненным магическим турмалином. Такой тип ожерелья часто используют люди, боящиеся психотического срыва, хотя оно может лишь ненадолго отложить неизбежное."
"Owned by a once-powerful mage who died choking on a lemon seed. They retain some of Soteric's power but also a traumatic death-memory.": "Принадлежали некогда могущественному магу, который умер, подавившись косточкой лимона. Они сохраняют часть силы Сотерика, но также несут в себе воспоминание о травматической смерти."
"This hat was digested by something unnatural, and now it exists only in the abstract.": "Эта шляпа была переварена чем-то неестественным и теперь существует только в абстрактной форме."
"A sour milk product that's useful in many recipes.": "Кисломолочный продукт, полезный во многих рецептах."
"Pumpkin soup cooked and served in the shell of a swamp gourd. It has a secret ingredient that brings out the vividness of the pumpkin. And, well, the vividness of everything, really.": "Тыквенный суп, приготовленный и поданный в скорлупе болотной тыквы. В нем есть секретный ингредиент, который подчеркивает яркость тыквы. И, в общем-то, яркость всего вокруг."
"Used in certain baking recipes.": "Используется в некоторых рецептах выпечки."
"A soybean seed that has sprouted and is ready to be planted.": "Семя сои, которое проросло и готово к посадке."
"Fresh soybeans, ready to be processed into edible food. They are too bitter to be eaten raw, but useful in cooking.": "Свежие соевые бобы, готовые к переработке в съедобную пищу. Они слишком горькие, чтобы их есть сырыми, но полезны в кулинарии."
"A crate full of sparklers you can deploy for all to enjoy.\n\nCan only be deployed once every two hours.": "Ящик, полный бенгальских огней, которые можно установить, чтобы все могли насладиться ими.\\n\\nМожно устанавливать только раз в два часа."
"Aggressively minty!": "Настолько мятный, что аж агрессивно!"
"Makes you PvP against ALL players -- even ones who don't want to PvP! Used for live events only! Use UnPvPJuice to turn it off.": "Позволяет вступать в PvP со ВСЕМИ игроками — даже с теми, кто не хочет PvP! Используется только для живых событий! Используйте UnPvPJuice, чтобы отключить."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, or Yellow Perch, this gear can catch them. Takes 2 hours to attempt to catch 3-12 fish.": "Используйте это снаряжение, чтобы ловить рыбу через лед на замерзшем озере. Если в озере есть судак, каменный карп, малоротый окунь или жёлтый окунь, это снаряжение поможет их поймать. Требуется 2 часа, чтобы попытаться поймать от 3 до 12 рыб."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, or Smallmouth Bass, this gear can catch them. Takes 30 minutes to attempt to catch 2-5 fish.": "Используйте это снаряжение, чтобы ловить рыбу через лед замерзшего озера. Если в озере есть судак, каменный карп или малоротый окунь, это снаряжение поможет их поймать. Попытка поймать 2-5 рыб занимает 30 минут."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, Yellow Perch, or Catfish, this gear can catch them. Takes 4 hours to attempt to catch 5-20 fish.": "Используйте это, чтобы рыбачить через лед замерзшего озера. Если в озере есть судак, каменный карп, малоротый окунь, желтый окунь или сом, это снаряжение поможет их поймать. Требуется 4 часа, чтобы попытаться поймать от 5 до 20 рыб."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye or Rock Carp, this gear can catch them. Takes 5 minutes to attempt to catch 1 fish.": "Используйте это, чтобы ловить рыбу через лед замёрзшего озера. Если в озере есть судак или каменный карп, это снаряжение поможет их поймать. Попытка поймать 1 рыбу занимает 5 минут."
"Use this to fish through the ice of a frozen lake. If the lake has Walleye, Rock Carp, Smallmouth Bass, Yellow Perch, or Catfish, this gear can catch them. Takes 8 hours to attempt to catch 12-35 fish.": "Используйте это, чтобы ловить рыбу через лед замерзшего озера. Если в озере есть судак, каменный карп, малоротый окунь, желтый окунь или сом, это снаряжение может их поймать. Требуется 8 часов, чтобы попытаться поймать 12-35 рыб."
"The two bolt grooves on this crossbow allow for somewhat-faster firing, but it's hardly \"speedy\".": "Две канавки для болтов на этом арбалете позволяют стрелять немного быстрее, но назвать его «быстрым» сложно."
"It says, \"I hereby acknowledge that Vangreef's debt to me is paid.\" It has an elven signature symbol and the letters \"SS\". Then at the bottom is another note by the author: \"Don't waste that spell, Vangreef. Even if you could afford a second casting, I can't recast it until the moon waxes anew. Be smart and fast or your whole gang WILL die down there. And nobody will be able to rescue you.\"": "В ней написано: «Настоящим подтверждаю, что долг Вангрифа передо мной погашен.» На документе стоит эльфийский подпись-символ и буквы «СС». Внизу есть ещё одна заметка от автора: «Не трать это заклинание зря, Вангриф. Даже если бы ты мог позволить себе второй раз его наложить, я не смогу сделать это, пока луна не начнёт расти заново. Будь умным и быстрым, иначе вся твоя банда ПОГИБНЕТ там внизу. И никто не сможет вас спасти.»"
"Mystery meat that has been cooked alive to perfection. It makes a tasty snack.": "Таинственное мясо, приготовленное живьём до совершенства. Прекрасная закуска."
"An exotic meal that uses a rare fish found only in the deepest of caves. The fish is delicious, but has a slightly bitter aftertaste that has to be drowned out by tons of lemon.": "Экзотическое блюдо, приготовленное из редкой рыбы, которую можно найти только в самых глубоких пещерах. Рыба вкусная, но имеет слегка горьковатый послевкусие, которое приходится перебивать большим количеством лимона."
"A very spicy version of Aromatic Chicken. Not for the faint of heart.": "Очень острый вариант Ароматного цыплёнка. Не для слабонервных."
"Filling, vegan, and a bit spicy.": "Сытно, веганское и немного острое."
"The perfect seasonings make cat meat not just palatable, but actually tasty.": "Идеальные приправы делают мясо кота не просто съедобным, а действительно вкусным."
"Cheesy breaded porcini mushrooms with a lot of heat! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сырные панированные подосиновики с острым перчиком! (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить бонусы от обеих.)"
"Tofu with real turkey flavor and a host of vegetables in a tasty stir-fry dish.": "Тофу с настоящим вкусом индейки и множеством овощей в вкусном жареном блюде."
"Thick and crunchy, like any good potion.": "Густое и хрустящее, как любое хорошее зелье."
"This chunk of spider came off in one solid piece. It's probably useful for making armor, if you like wearing creepy ridiculous things as armor.": "Этот кусок паука оторвался целым куском. Вероятно, он пригодится для создания брони, если вам нравится носить жуткие и нелепые вещи в качестве брони."
"It was found in the gut of a giant spider. That's really the only spider-related thing going on here.": "Он был найден в желудке гигантского паука. Вот и всё, что связано с пауками в этом предмете."
"Well... it hasn't hatched... yet... hopefully it won't!": "Ну... оно ещё не вылупилось... надеюсь, что и не вылупится!"
"This potion transforms you into a spider. Permanent until dispelled! WARNING: think before you drink!": "Это зелье превращает вас в паука. Постоянно, пока не будет снято! ВНИМАНИЕ: подумайте, прежде чем пить!"
"Stick-like and covered in tiny hairs, this is not particularly pleasant to touch.": "Палочковидная и покрытая мелкими волосками, она не особенно приятна на ощупь."
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to spiders when used in crafting.": "Красивый самоцвет с тёмно-зелёными полосами, хорошо известен тем, что помогает в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на пауков при использовании в ремесле."
"A milky substance that alters your brain's reflexes, allowing you to punt spiders, scorpions and other arthropods away from you.": "Молочный раствор, который изменяет рефлексы вашего мозга, позволяя отталкивать пауков, скорпионов и других членистоногих от себя."
"A sticky cloth that's ideal for certain types of clothing.": "Липкая ткань, идеально подходящая для определённых видов одежды."
"Just pulped-up spider bits in a jar.": "Просто измельчённые кусочки паука в банке."
"Can be studied to earn Spider XP. (Requires VIP.)": "Можно изучать для получения опыта паука. (Требуется VIP.)"
"Somehow this breastplate got stuck onto a spider via sticky web! What are the odds? Unfortunately, spider acid has filled it with holes, but what a great story!": "Как-то этот нагрудник прилип к пауку через липкую паутину! Какова же вероятность? К сожалению, паучья кислота проделала в нём дыры, но какая же это потрясающая история!"
"Teaches you a spider technique.": "Обучает вас технике паука."
"Teaches you a forbidden spider technique.": "Обучает тебя запретной технике паука."
"Spun from the butt of a very big spider.": "Сплетена из задней части очень большого паука."
"It's a metal spike with various probes and buttons. It makes odd sounds when the buttons are pressed.": "Это металлический шип с разными зондами и кнопками. При нажатии на кнопки он издаёт странные звуки."
"Someone has mixed good egg nog with cheap vodka. (This mixed drink is treated as a beer/wine.)": "Кто-то смешал хороший яичный напиток с дешёвой водкой. (Этот коктейль считается пивом/вином.)"
"Great for punching! Also, somehow makes your kicks hurt more, too... weird.": "Отлично подходят для ударов кулаком! К тому же, почему-то делают ваши удары ногами сильнее... странно."
"A pointy weed. (This item can be used in recipes that call for Mixed Greens.)": "Острый сорняк. (Этот предмет можно использовать в рецептах, требующих Смесь зелени.)"
"Not great for splashing people, but pretty good for delivering healing concoctions.": "Не очень подходит для обливания людей, но отлично подходит для доставки лечебных снадобий."
"A few berries floating in a ghostly liquid.": "Несколько ягод, плавающих в призрачной жидкости."
"A soft blue rock. It's useful in curatives and curse removal potions. This particular gem has been infused with a rune that attunes it to foxes when used in crafting.": "Мягкий голубой камень. Полезен в зельях лечения и снятия проклятий. Этот конкретный самоцвет был насыщен руной, которая настраивает его на лис при использовании в ремесле."
"Can be studied to earn Spirit Fox XP. (Requires VIP.)": "Можно изучать для получения опыта Духового Лиса. (Требуется VIP.)"
"Teaches you a spirit fox technique.": "Обучает вас технике духа лисы."
"Teaches you a spirit's technique for fooling shopkeepers.": "Обучает технике духа, позволяющей обманывать лавочников."
"A small stone. It's said to be the final remains of a ghost who somehow found peace.\n\nWARNING: Everyone knows that you should NEVER give a spirit stone to strange talking animals. In particular, you must never give, trade, or sell one to a talking fox!": "Небольшой камень. Говорят, что это последние останки призрака, который каким-то образом нашёл покой.\n\nПРЕДУПРЕЖДЕНИЕ: Всем известно, что НИКОГДА нельзя давать камень духа странным говорящим животным. В частности, никогда не давайте, не меняйте и не продавайте его говорящей лисе!"
"A spleen.": "Селезёнка."
"It smells of sweat.": "Пахнет потом."
"Even though this food was designed to last a very long time, it's still been too long.": "Хотя эта еда была предназначена для длительного хранения, прошло всё же слишком много времени."
"Thick brass wire on a spool. It has no obvious use.": "Толстая латунная проволока на катушке. Очевидного применения не имеет."
"A gross antique spoon. Not worth much... but perhaps you can find a spoon collector or something.": "Отвратительная антикварная ложка. Особой ценности не представляет... но, возможно, вы найдете коллекционера ложек или что-то в этом роде."
"It doesn't seem to do anything, but it's definitely magical. Huh.": "Кажется, она ни на что не влияет, но определённо магическая. Хм."
"This handful of dirt is weird and smelly and full of fungus.": "Эта горсть грязи странная, вонючая и полна грибка."
"The fibrous and smelly heart of a spriggan plant.": "Волокнистое и пахнущее сердце растения сприггана."
"A thorny protrusion from a spriggan weed or plant.": "Колючий выступ из колючего сприггана или растения."
"Fruit from a strange plant that grows in the fae realm. While delicious, sprigganberries are incredibly poisonous unless the tiny seeds are carefully removed. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Плод странного растения, растущего в фейском мире. Хотя они вкусные, сприггановые ягоды невероятно ядовиты, если не удалить крошечные семена. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"An antique style of dwarven crossbow, discontinued due to a tendency to explode while loaded. But this one seems fine.": "Арбалет в антикварном стиле дварфов, снятый с производства из-за склонности взрываться при взведении. Но этот, похоже, в порядке."
"Some large, well-made tin springs.": "Крупные, хорошо сделанные оловянные пружины."
"Spruce chips for smoking fish and meat.": "Щепа из ели для копчения рыбы и мяса."
"A raw squash.": "Сырая тыква."
"A plantable squash seedling.": "Саженец тыквы, который можно посадить."
"A little thin.": "Немного жидковат."
"A small poorly-made tiara, sized for a large rat or smallish dog. It seems utterly non-magical.": "Маленькая плохо сделанная диадема, размером для большой крысы или небольшой собаки. Кажется совершенно немагической."
"A gimmicky off-hand knife with a spring mechanism to increase thrusting damage. The mechanism gets gunked up a lot, but on the plus side, the knife is VERY sharp.": "Оригинальный нож в левую руку с пружинным механизмом для увеличения урона от уколов. Механизм часто забивается грязью, но с другой стороны, нож ОЧЕНЬ острый."
"Weirdly cold and soupy, but not unpleasant to taste.": "Странно холодное и жидковатое, но на вкус не неприятное."
"An ornate staff that celebrates your renowned generosity.": "Украшенный посох, прославляющий вашу знаменитую щедрость."
"Can be studied to earn Staff XP. (Requires VIP.)": "Можно изучать для получения опыта владения посохом. (Требуется VIP.)"
"Adorned with dead leaves that rustle to their own magical wind.": "Украшен мёртвыми листьями, которые шелестят под собственным магическим ветром."
"This seems to be made of enchanted ice. Kind of neat.": "Похоже, он сделан из зачарованного льда. Довольно интересно."
"For many decades this was the de facto standard for masters of the magical arts, only falling from favor because the tree it is made from has gone extinct.": "В течение многих десятилетий это был фактический стандарт для мастеров магических искусств, утративший популярность только потому, что дерево, из которого он сделан, вымерло."
"A paradoxically paradoxical staff.": "Парадоксально парадоксальный посох."
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 35 enchantments.)": "Это традиционное оружие морских существ обладает полезными водными чарами, но, к сожалению, те же чары делают его бесполезным для огненной магии. (С случайными чарами уровня 35.)"
"Teaches you a staff fighting technique.": "Обучает технике боя посохом."
"Carved of bamboo and painted with magic pigments.": "Вырезано из бамбука и раскрашено магическими пигментами."
"Magical gloves used by nobles who don't want to accidentally misspell words: these gloves prevent such simple errors. They improve accuracy in other ways, too. Unfortunately, this pair is stained and gross.": "Магические перчатки, используемые дворянами, которые не хотят случайно допускать ошибки в написании слов: эти перчатки предотвращают такие простые ошибки. Они также повышают точность и другими способами. К сожалению, эта пара запачкана и выглядит отвратительно."
"Part of the ancient uniform of Dwarven Stalwarts, the elite warriors entrusted with protecting the most important Dwarven secrets. Quality-wise, they're very protective, but very uncomfortable.": "Часть древней формы гномов-стойких, элитных воинов, которым доверено охранять самые важные гномьи тайны. По качеству они очень защитные, но крайне неудобные."
"The Stalwarts, like all dwarves, had to work hard overcome their prejudice against ranged weapons. They developed this bludgeoning bow which acknowledges the value of archery while still insisting that hammers are better.": "Непоколебимые, как и все дворфы, должны были усердно трудиться, чтобы преодолеть свои предубеждения против дальнобойного оружия. Они создали этот дубящий лук, который признаёт ценность стрельбы из лука, но при этом настаивает, что молоты лучше."
"This thick and ungainly thing was the preferred armor of the ancient Dwarven Stalwarts. It's easy to see why: this armor is very... stalwart.": "Этот толстый и неуклюжий доспех был предпочтительной бронёй древних гномьих Надёжных. Легко понять почему: эта броня очень... надёжная."
"Few of the legendary Dwarven Stalwarts used unarmed weapons, but the ones that did wore claws like this.": "Мало кто из легендарных гномьих Стойких использовал безоружные орудия, но те, кто использовал, носили когти, подобные этим."
"These excellent daggers are standard-issue for the Stalwarts, but few dwarves actually use them. They are routinely lost in gambling matches and then reported as stolen, leading to the dwarven idiom \"goblins stole your dagger\", which is essentially synonymous with \"you have a serious gambling problem.\"": "Эти отличные кинжалы являются стандартным снаряжением для Надёжных, но немногие гномы действительно ими пользуются. Их регулярно теряют в азартных играх, а затем сообщают о краже, что породило гномью идиому «гоблины украли твой кинжал», которая по сути означает «у тебя серьёзная проблема с азартными играми»."
"The Dwarven Stalwarts were hammer-lovers to a fault, and these thick gauntlets were engineered with hammers in mind.": "Дварфийские Надёжные были без ума от молотов, и эти толстые рукавицы были созданы с учётом использования молотов."
"Standard issue for the ancient Dwarven Stalwarts. They don't make them like this anymore.": "Стандартное снаряжение древних гномьих Непоколебимых. Такие больше не делают."
"It's a tough helmet that was once used by the elite Dwarven Stalwarts. But that was many years ago, and more recent wearers have not been big on armor maintenance. It's still a great helm, but you imagine it was once even more impressive.": "Это прочный шлем, который когда-то использовали элитные гномьи Стойкие. Но это было много лет назад, и более поздние владельцы не слишком заботились о его обслуживании. Тем не менее, это отличный шлем, и можно представить, что когда-то он был ещё более впечатляющим."
"Dwarven Stalwarts wore leg armor like this a thousand years ago, and then handed down for centuries after the Stalwarts were no more, because these pants are great at absorbing punishment.": "Дварфийские Надёжные носили такие ножные доспехи тысячу лет назад, а затем передавали их из поколения в поколение после того, как Надёжных больше не было, потому что эти штаны отлично поглощают удары."
"The elite Stalwarts used this sort of shield, embossed with protective sigils and a symbol of Arisetsu. It's hard to find fault with the design, except that it's super heavy.": "Элитные Надёжные использовали такой щит, украшенный защитными символами и знаком Арисэцу. В дизайне сложно найти недостатки, разве что он очень тяжёлый."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 30 raffle tickets for up to 3 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils.": "Сложное устройство, которое может выдавать лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 30 лотерейных билетов для до 3 предметов (или стаков предметов) и/или денежного приза. Лотерейные билеты могут быть бесплатными или стоить Советы."
"A dead starfish.": "Мертвая морская звезда."
"It's technically a crystal, but it'd be impossible to say precisely what it's made of. It's more of a... liquid crystal? It can be squeezed and twisted into odd shapes. Maybe it'd make a fun children's toy.": "Технически это кристалл, но точно сказать, из чего он сделан, невозможно. Скорее это... жидкий кристалл? Его можно сжимать и скручивать в причудливые формы. Возможно, из него получилась бы забавная детская игрушка."
"This lens looks like it fits into a stargazing contraption.": "Эта линза, кажется, подходит для устройства наблюдения за звёздами."
"The strange symbols etched into this lute seem to represent constellations, but not ones you're immediately familiar with.": "Странные символы, выгравированные на этой лютне, похоже, представляют созвездия, но не те, которые вам сразу знакомы."
"One year after issuance, the upstanding citizen bearing this document may redeem it at the Statehelm Bank.": "Спустя год после выдачи добропорядочный гражданин, имеющий этот документ, может обменять его в банке Стейтхелма."
"A big chunk of cow meat.": "Большой кусок говядины."
"Hot, juicy steak smothered in delicious cheese and wrapped in lettuce. Amazing!": "Горячий, сочный стейк, покрытый вкусным сыром и завернутый в салат. Потрясающе!"
"Dye used to color a piece of clothing or armor steel blue.": "Краска, используемая для окрашивания одежды или брони в стальной синий цвет."
"Boost your maximum health by 100 for two minutes.": "Увеличивает ваше максимальное здоровье на 100 на две минуты."
"A chunk of pointy ore. Its most common use is by blacksmiths, who can add fireproofing to armor with it.": "Кусок острого руды. Его чаще всего используют кузнецы, которые могут добавить огнеупорность броне с его помощью."
"A wooden instrument that was invented by lumberjacks in Sedgewick Forest to ward off treant saplings.": "Деревянный инструмент, изобретённый лесорубами в лесу Седжуик для отпугивания саженцев древоточцев."
"A blue cheese with a luxurious taste and a horrific odor.\n\nCheese Type: Blue": "Голубой сыр с роскошным вкусом и ужасным запахом.\n\nТип сыра: голубой"
"An oily wax that smells great to bees. Used to help ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Маслянистый воск с приятным для пчёл запахом. Используется для повышения успеха спаривания с пчёлами или осами. (Чтобы использовать, передайте питомцу-пчеле или осе через интерфейс Стойла. Эффект действует до следующей попытки размножения питомца. На питомце может быть только один воск одновременно; использование другого воска заменяет первый.)"
"A mass-produced longbow made for infantrymen to use in a bind. Nothing special.": "Массово производимый длинный лук, предназначенный для пехотинцев в трудной ситуации. Ничего особенного."
"A simple crossbow with nothing fancy about it.": "Простой арбалет без всяких изысков."
"A delicate glass star painted red and gold.": "Хрупкая стеклянная звезда, расписанная в красный и золотой цвета."
"This looks to be a piece of mummy wrapping.": "Похоже, это кусок бинта мумии."
"A mammal stomach.": "Желудок млекопитающего."
"Made of stone, this traditional dwarven instrument requires much skill to use.": "Сделанный из камня, этот традиционный гномий инструмент требует большого мастерства для игры."
"This handful of dirt is weird and smelly and damp.": "Эта горсть грязи странная, вонючая и влажная."
"A snack of sweetened strawberries. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Закуска из подслащённой клубники. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Shaved ice flavored with strawberries. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Лед с ароматом клубники. Это лакомство нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Although there might be delicious varieties of strawberry wine out there somewhere, this is not it: the strawberry flavor is undermined by a grassy taste.": "Хотя где-то могут быть вкусные сорта клубничного вина, это не оно: клубничный вкус перебивается травянистым послевкусием."
"Fresh creamy yogurt with strawberries. A sweet snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Свежий кремовый йогурт с клубникой. Сладкая закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A bell, for making noise.": "Колокол, чтобы создавать шум."
"A small spindle of cotton string.": "Небольшая катушка хлопковой нити."
"Some sort of beast was used for this cut. You'd want to tenderize this. A lot.\n\n(Use in Cheap Meat recipes.)": "Для этого куска использовали какое-то животное. Его стоит хорошенько отбить. Очень сильно.\n\n(Используется в рецептах дешёвого мяса.)"
"Someone gutted a mangy cat.\n\n(Use in Cheap Meat recipes.)": "Кто-то потрошил облезлого кота.\\n\\n (Используется в рецептах дешёвого мяса.)"
"An uninviting dinosaur flank.\n\n(Use in Cheap Meat recipes.)": "Непривлекательный кусок мяса динозавра.\\n\\n (Используется в рецептах дешёвого мяса.)"
"Well, someone's gone and chopped up a mangy dog.\n\n(Use in Cheap Meat recipes.)": "Ну, кто-то зарезал паршивую собаку.\\n\\n (Используется в рецептах дешевого мяса.)"
"Stinky and stringy, but if you boiled it and hammered it... it'd still be gross.\n\n(Use in Cheap Meat recipes.)": "Вонючее и жилистое, но если его сварить и отбить... оно всё равно останется отвратительным.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"Beautiful! Look at those stripes!": "Красиво! Посмотри на эти полосы!"
"Tastes like it will burn your tongue off... and it probably would, if the magic didn't kick in first.": "На вкус кажется, что обожжёт язык... и, вероятно, так бы и было, если бы сначала не сработала магия."
"Consume this fuzzy gel when you're suffering poison effects.": "Примите этот пушистый гель, когда страдаете от эффектов яда."
"This thick liquid has bits of fulgurite in it. Mm.": "Эта густая жидкость содержит частицы фульгурита. Ммм."
"This industrial-strength Hellfreeze cures all stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when ingested.": "Этот промышленной силы Адский Лёд излечивает все накопления Великого Адского Огня, Адского Огня и Малого Адского Огня при употреблении."
"This industrial-strength Hellfreeze cures up to 10 stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when applied topically.": "Эта мазь промышленной силы Адского Холода лечит до 10 стаков Большого Адского Огня, Адского Огня и Малого Адского Огня при наружном применении."
"A handful of long wood nails.": "Горсть длинных деревянных гвоздей."
"Recovers 15 power per second for 30 seconds.": "Восстанавливает 15 энергии в секунду в течение 30 секунд."
"A small wax-sealed container with a dollop of blue sludge inside.": "Небольшой контейнер с восковой печатью, внутри которого находится капля синей слизи."
"This strange cloth is smooth and cool to the touch.": "Эта странная ткань гладкая и прохладная на ощупь."
"This is a novice students' attempt to mimic Landrisil's masterpiece, \"The Forest Before Dusk\".": "Это попытка новичка-ученика подражать шедевру Ландрисиля «Лес перед сумерками»."
"A bell pepper full of steak! Mm. Meaty.": "Сладкий перец, наполненный стейком! Ммм. Мясной."
"Stuffed with what? Venison, of course!": "Фарширована чем? Олениной, конечно!"
"A small plush bear. It's enchanted to give encouraging messages when you're sad.": "Небольшой плюшевый медвежонок. Он зачарован, чтобы давать ободряющие сообщения, когда тебе грустно."
"A butterfly that's been captured alive. It doesn't look happy... but it's alive!": "Бабочка, пойманная живьём. Выглядит несчастной... но жива!"
"This piece is absolutely stunning... literally. Its magical pigments cause the viewer to very briefly lose their balance when viewing the painting. It's also a lovely painting and you're not sure why the artist bothered with the trickery.": "Это произведение просто ошеломляет... буквально. Его магические пигменты заставляют зрителя на короткое время потерять равновесие при просмотре картины. Кроме того, это прекрасная картина, и вы не понимаете, зачем художник прибегал к такой уловке."
"The fretboard is reinforced with steel to keep it from breaking at an inopportune moment.": "Гриф усилен сталью, чтобы он не сломался в неподходящий момент."
"These boots have been hand-painted, but are still pretty ugly.": "Эти ботинки расписаны вручную, но всё равно довольно уродливы."
"It's sturdy, but it's so simple that it'd be hard <i>not</i> to be sturdy. But it's not false advertising, anyway.": "Он прочный, но настолько простой, что было бы трудно <i>не</i> быть прочным. В любом случае, это не ложная реклама."
"Fashionable, but a little uncomfortable to wear unless you're a Rakshasa.": "Стильно, но немного неудобно носить, если вы не Ракшаса."
"A dependable-looking blade.": "Надёжный на вид клинок."
"A simple but robust off-hand blade.": "Простой, но крепкий клинок для второй руки."
"Wow, purple gloves. Very nice.": "Вау, фиолетовые перчатки. Очень красиво."
"A sturdy boring helmet.": "Прочный скучный шлем."
"Extra-strong cloth with innate magical properties.": "Особо прочная ткань с врождёнными магическими свойствами."
"A metal mesh, useful for cages, filters, and similar systems.": "Металлическая сетка, полезная для клеток, фильтров и подобных систем."
"A well crafted music box that sounds like a harp for animal forms so they can play music for their plants. This box looks sturdy enough for a few uses before it will break. Don't forget to start it up after you deploy it!\n<b>IMPORTANT:</b> You must be in beast form for at least 3 hours of in-game time before you can deploy this item. Leaving beast form after deploying will cause you to lose control of the box. Limit one music box deployment per account at a time.": "Хорошо сделанная музыкальная шкатулка, которая звучит как арфа для звериных форм, чтобы они могли играть музыку для своих растений. Эта шкатулка выглядит достаточно прочной для нескольких использований, прежде чем сломается. Не забудьте завести её после установки!  \n<b>ВАЖНО:</b> Вы должны находиться в звериной форме не менее 3 часов игрового времени, прежде чем сможете использовать этот предмет. Выход из звериной формы после установки приведёт к потере контроля над шкатулкой. Одновременно на аккаунте можно использовать только одну музыкальную шкатулку."
"Gold! With little white frill things. Reasonably protective, too.": "Золото! С маленькими белыми оборками. Также достаточно защитные."
"It's wood with some thin metal plating over it. Pretty sturdy, and also lightweight.": "Это дерево с тонким металлическим покрытием. Довольно прочный и при этом лёгкий."
"This simple platemail has sufficient protection, but it could do with more padding. Very uncomfortable!": "Этот простой латы обеспечивает достаточную защиту, но ему не помешало бы больше набивки. Очень неудобно!"
"This was enchanted by a competent apprentice, but it's nothing special.": "Этот посох был зачарован способным учеником, но в нем нет ничего особенного."
"Competent workmanship.": "Качественное исполнение."
"Spiders wear this hat for one reason and one reason only: to show off their impeccable sense of fashion.": "Пауки носят эту шляпу по одной единственной причине: чтобы продемонстрировать своё безупречное чувство стиля."
"For the mage who needs to clear a sewer in the morning and dance at a ball in the evening.": "Для мага, которому утром нужно прочистить канализацию, а вечером потанцевать на балу."
"The humble pork chop taken to a higher level via careful marination.": "Простая свиная отбивная, доведённая до совершенства благодаря тщательному маринованию."
"A pile of sugar.": "Куча сахара."
"A spun-sugar confection in the shape of a caterpillar, colored and flavored with natural fruit juices. It's a really good illusion. Are you sure you want to stick it in your mouth?": "Карамель из сахарной ваты в форме гусеницы, окрашенная и ароматизированная натуральными фруктовыми соками. Это действительно хорошая иллюзия. Ты уверен, что хочешь засунуть это в рот?"
"Crystallized sugar on a stick. It's pretty and sweet.": "Кристаллизованный сахар на палочке. Он красивый и сладкий."
"A fancy candied apple for those who prefer less sweetness. Instead of caramel, this green apple is wrapped in a delicate layer of lacy sugar. It's almost too pretty to eat. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Изысканное яблоко в сахаре для тех, кто предпочитает меньше сладости. Вместо карамели это зелёное яблоко покрыто тонким слоем ажурного сахара. Почти слишком красиво, чтобы есть. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A bunch of sugarcane stalks. Sugarcane can be cooked into molasses and sugar.": "Пучок стеблей сахарного тростника. Сахарный тростник можно приготовить в патоку и сахар."
"A handful of seeds to grow some sugarcane.": "Горсть семян для выращивания сахарного тростника."
"Somehow this glass orb has a bit of depression trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этом стеклянном шаре заперта часть депрессии. Тёмные эмоции — это сила для Некромантии, и этот шар можно использовать как Некромантический Самоцвет."
"A small amount of smelly sulfur.": "Небольшое количество вонючей серы."
"A warm sweet dessert meal.": "Тёплый сладкий десерт."
"A fairy weapon from the Summer Court.": "Волшебное оружие Летнего двора."
"This amusing lollipop is very popular with elves.": "Этот забавный леденец очень популярен среди эльфов."
"Reins for the Summer Sun!": "Поводья для Летнего Солнца!"
"A chunk from a destroyed sun guardian statue. It crumbles easily into a magical healing powder that can be applied to the skin.": "Кусок разрушенной статуи хранителя солнца. Легко рассыпается в магическую целительную пудру, которую можно наносить на кожу."
"A symbol of merit granted by the Church of Arisetsu to the faithful. Sometimes they are given in exchange for donations; other times they are awarded for service.": "Символ заслуги, выдаваемый Церковью Арисэцу верующим. Иногда их дают в обмен на пожертвования; в других случаях их присуждают за службу."
"A pleasant cold beverage. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приятный холодный напиток. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A map that supposedly leads to a legendary hoard of treasure buried or sunken near Sun Vale.": "Карта, которая, как говорят, ведет к легендарному кладу, зарытому или затонувшему возле Солнечной Долины."
"A map that supposedly leads to a large amount of treasure buried or sunken near Sun Vale.": "Карта, которая, как предполагается, ведёт к большому количеству сокровищ, зарытых или затонувших возле Солнечной Долины."
"A map that supposedly leads to a small amount of treasure buried or sunken near Sun Vale.": "Карта, которая, как предполагается, ведёт к небольшому количеству сокровищ, зарытых или затонувших возле Солнечной Долины."
"A map that supposedly leads to a huge hoard of treasure buried or sunken near Sun Vale.": "Карта, которая, по слухам, ведёт к огромному кладу, зарытому или затонувшему возле Солнечной Долины."
"Inscribed with ancient rakshasa runes, this staff taps magic from another world, making it quite hot. A recent owner also attuned it to Arisetsu, further heating it to the point that wielding the staff is a bit painful.": "Украшенный древними рунами ракшасы, этот посох черпает магию из другого мира, делая его довольно горячим. Недавний владелец также настроил его на Арисецу, ещё больше нагревая, так что владение посохом доставляет небольшую боль."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +38 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +38 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"This pale yellow crystal is extremely reflective from certain angles. In magic, it is associated with growth.\n\nWhen used in Augment Extraction, Sunstone can extract powers that have no specific skill association.": "Этот бледно-жёлтый кристалл чрезвычайно отражает свет под определёнными углами. В магии он ассоциируется с ростом.\n\nПри использовании в Извлечении Усилений Солнечный камень может извлекать силы, не связанные с конкретным навыком."
"A sack filled with strange substances that stay warm for a long time and smell reassuring to insects. (To use, give to a mother pet bee or wasp that is still guarding her larva in the 'gestation' stage. It will speed up incubation by 24 hours.)": "Мешок, наполненный странными веществами, которые долго сохраняют тепло и издают успокаивающий запах для насекомых. (Чтобы использовать, отдайте матери-пчеле или осе, которая все еще охраняет свою личинку на стадии «вынашивания». Это ускорит инкубацию на 24 часа.)"
"Surprise! It's fish plus potatoes.": "Сюрприз! Это рыба с картошкой."
"Recovers 14 health per second for 30 seconds.": "Восстанавливает 14 здоровья в секунду в течение 30 секунд."
"Lets you sprint very, very fast. (Hold down shift key to switch between sprinting and walking.) You also take no damage from falls. Lasts 2 minutes.": "Позволяет очень-очень быстро бежать. (Удерживайте клавишу Shift, чтобы переключаться между бегом и ходьбой.) Вы также не получаете урон от падений. Длится 2 минуты."
"Hold down Shift to run very, very fast. You also take no damage from falls.": "Удерживайте Shift, чтобы бежать очень, очень быстро. Также вы не получаете урона от падений."
"When you aren't in combat, hold down Shift to run very, very fast. You also take no damage from falls. Lasts 5 minutes.": "Когда вы не в бою, удерживайте Shift, чтобы бежать очень, очень быстро. Также вы не получаете урон от падений. Действует 5 минут."
"Boost your maximum health by 200 for two minutes.": "Увеличивает ваше максимальное здоровье на 200 на две минуты."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x2.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы удвоить длительность ваших каллиграфических эффектов."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +3 for 30 minutes.": "Довольно удобный стул. Отдых в нём увеличивает восстановление брони на +3 в течение 30 минут."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x2.": "Одноразовый стул для медитации. Используйте его рядом со Столпом Медитации, чтобы увеличить длительность эффектов медитации в 2 раза."
"Used in superb smithing recipes.": "Используется в отличных рецептах кузнечного дела."
"Lets you leap high and control your fall. You also take no damage from falls, no matter how high. On the down side, you'll be too disoriented to effectively fight, and your attacks will deal very little damage.": "Позволяет высоко прыгать и контролировать падение. Вы также не получаете урона от падений, независимо от высоты. С другой стороны, вы будете слишком дезориентированы для эффективной борьбы, и ваши атаки будут наносить очень мало урона."
"A big glob of high-quality animal fat that is clearly beyond what would be found in a normal animal.": "Большой кусок высококачественного животного жира, явно превосходящего то, что можно найти у обычного животного."
"Potion transforms you into a GIGANTIC spider. Permanent until dispelled via UnspiderJuice. For live events only!": "Зелье превращает вас в ГИГАНТСКОГО паука. Действует постоянно, пока не будет снято с помощью Распауковывания. Только для живых событий!"
"It's a flier about supporting \"local fauna\", whatever that means. But it's very hard to read because most of the text is mirrored. Very strange.": "Это листовка о поддержке «местной фауны», что бы это ни значило. Но её очень трудно читать, потому что большая часть текста зеркальная. Очень странно."
"Teaches you how to survey, find minerals, and mine ore. (Raises your skill in Surveying, Geology, and Mining to 1 if they aren't already.)": "Обучает вас геодезии, поиску минералов и добыче руды. (Повышает ваши навыки в Геодезии, Геологии и Горном деле до 1, если они ещё не достигли этого уровня.)"
"Can be studied to earn Survival Instincts XP. (Requires VIP.)": "Можно изучать для получения XP в Инстинктах Выживания. (Требуется VIP.)"
"Teaches you a survival instinct.": "Обучает вас инстинкту выживания."
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Fire-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Толстое покрывало, которое дарит тепло и комфорт кобыле во время беременности. Это покрывало подходит для кобыл с огненным темпераментом. Дайте лошади в стойле во время беременности, чтобы ускорить срок вынашивания на 24 часа. (Также может использоваться для согревания в "
"This acrid topical ointment is an effective way to remove swamp parasites.": "Этот резкий наружный бальзам эффективно удаляет болотных паразитов."
"A large gourd full of sticky bitter mush. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Большая тыква, наполненная липкой горькой кашицей. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Greasy and salty, but a pretty nice snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жирные и солёные, но довольно вкусная закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +36 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +36 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"The greens in this salad are definitely an acquired taste, but the rich mushroom dressing is delicious.": "Листья в этом салате определённо на любителя, но насыщенная грибная заправка очень вкусная."
"A bunch of greens that grow in swamps and sewers. Edible if properly dried and prepared.": "Кучка зелени, растущей в болотах и канализациях. Съедобна при правильной сушке и приготовлении."
"The brain of a swarmer demon.": "Мозг роевого демона."
"A torn-off claw of a Demonic Swarmer. It twitches from time to time.": "Оторванный коготь Демонического Роющегося. Время от времени дергается."
"Smooth, luscious yellow butter with a strong sweet undercurrent. Perfect for elven pastries!": "Гладкое, сочное жёлтое масло с ярко выраженной сладкой ноткой. Идеально для эльфийской выпечки!"
"A dish that would definitely be too sweet if it didn't have the side-effect of numbing half your tastebuds while you eat.": "Блюдо, которое определённо было бы слишком сладким, если бы не побочный эффект онемения половины ваших вкусовых рецепторов во время еды."
"A hearty and sweet vegetarian meal.": "Сытное и сладкое вегетарианское блюдо."
"A nice blend of sweetness and mintiness.": "Приятное сочетание сладости и мяты."
"A drink that accelerates your underwater fast-movement speed. It tastes atrocious.": "Напиток, который ускоряет вашу быструю скорость передвижения под водой. На вкус отвратительно."
"So named because it makes a sort of swishing noise. Nobody said weapons crafters were good at naming things.": "Так назван, потому что издаёт своего рода шуршащий звук. Никто не говорил, что оружейники умеют хорошо придумывать названия."
"Tastes like furry eyeballs but it makes all your motions feel crisp and sharp.": "На вкус как пушистые глазные яблоки, но оно делает все ваши движения чёткими и острыми."
"It's unclear when this potion was made, but it's old. A tiny label declares it to be \"the liquified essence of sharpness.\" It's mint flavored.": "Неизвестно, когда было создано это зелье, но оно старое. Маленькая этикетка гласит, что это «жидкая сущность остроты». Имеет мятный вкус."
"Can be studied to earn Sword XP. (Requires VIP.)": "Можно изучать для получения опыта в Мече. (Требуется VIP.)"
"Teaches you a new sword technique.": "Обучает новой технике владения мечом."
"Blackened as if from fire, this metal glyph emanates controlled rage. A soot-covered Necromancy Gem is still affixed on the back.": "Обожжённый, словно огнём, этот металлический глиф излучает сдержанную ярость. На обратной стороне всё ещё прикреплён покрытый сажей Некромантский Камень."
"These old boots have been resoled with a mysterious metal, and the most recent owner has etched eerie symbols into them.": "Эти старые сапоги были перешиты загадочным металлом, а последний владелец выгравировал на них жуткие символы."
"It's a parchment with strange symbols on it. Perhaps someone could explain its meaning to you.": "Это пергамент с странными символами. Возможно, кто-то сможет объяснить их значение."
"Grotesque boots with an uncomfortably slime-like internal material. Crudely sewn into the inside is the phrase \"Boots Not Art.\"": "Гротескные сапоги с внутренним материалом, напоминающим скользкую слизь. Внутри грубо вышита фраза «Сапоги, а не искусство»."
"Though now best known as a captain of the splinter group known as the Alharth Rebels, Tabor first gained fame in the Sand War, wielding this blade in the name of the Council.": "Хотя теперь Табор наиболее известен как капитан отщепенческой группы, известной как Повстанцы Альхарта, он впервые прославился в Песчаной войне, сражаясь этим клинком во имя Совета."
"Used by the elite Gazluk orcish tacticians.\n\nNote: this halberd is considered a Staff, but it cannot be used to cast spells.": "Используется элитными орочьими тактиками Газлука.\n\nПримечание: эта алебарда считается посохом, но её нельзя использовать для произнесения заклинаний."
"A stack of orcish breakfast pancakes.": "Стопка орочьих блинчиков на завтрак."
"Designed to be worn at the base of a Rakshasa's tail, this imperceptibly alters a Rakshasa's mind.": "Предназначено для ношения у основания хвоста Ракшасы, это незаметно изменяет разум Ракшасы."
"Designed to be worn at the base of a rakshasa's tail, but also able to fit on the tail of a wolf or deer, this ring helps protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначено для ношения у основания хвоста ракшасы, но также подходит для хвоста волка или оленя, это кольцо помогает защититься от болезни, вызываемой близким контактом со светящимися жёлтыми кристаллами."
"Designed to be worn at the base of a Rakshasa's tail, this slows the rate at which hydration is lost, allowing the Rakshasa to function without water for twice as long.": "Предназначено для ношения у основания хвоста Ракшасы, это замедляет потерю влаги, позволяя Ракшасе обходиться без воды в два раза дольше."
"Designed to be worn at the base of a Rakshasa's tail, this improves the wearer's Righteousness, allowing them to forgo the negative effects of killing sentient creatures for longer.": "Предназначено для ношения у основания хвоста Ракшасы, это улучшает Праведность носителя, позволяя ему дольше избегать негативных последствий убийства разумных существ."
"Can be studied to earn Tailoring XP. (Requires VIP.)": "Можно изучать для получения опыта в Портняжном деле. (Требуется VIP.)"
"Teaches you how to augment clothing.": "Обучает вас, как улучшать одежду."
"Teaches you patterns for hats tailored specifically for giant bats.": "Обучает выкройкам шляп, сшитых специально для гигантских летучих мышей."
"Teaches you how to make an elegant mask for a ball.": "Учится делать элегантную маску для бала."
"Teaches you patterns for amazing hats tailored specifically for cows.": "Обучает вас выкройкам потрясающих шляп, специально сшитых для коров."
"Teaches you patterns for amazing hats tailored for does and bucks.": "Обучает вас выкройкам потрясающих шляп, сшитых специально для самок и самцов оленей."
"Teaches you patterns for amazing hats tailored specifically for swine.": "Обучает вас выкройкам потрясающих шляп, специально сшитых для свиней."
"Teaches you how to make linen gloves.": "Обучает изготовлению льняных перчаток."
"Teaches you how to make linen headgear.": "Обучает изготовлению льняных головных уборов."
"Teaches you how to make linen pants.": "Обучает вас изготовлению льняных штанов."
"Teaches you how to make linen shirts.": "Обучает изготовлению льняных рубашек."
"Teaches you how to make linen slippers.": "Обучает вас изготовлению льняных тапочек."
"Teaches you an advanced tailoring technique.": "Обучает вас продвинутой технике портняжного дела."
"Teaches you patterns for armoring giant spiders. Terrifying.": "Обучает выкройкам для бронировки гигантских пауков. Ужасающе."
"Teaches you how to make a pair of pants that make the wearer less conspicuous.": "Обучает созданию пары штанов, которые делают носителя менее заметным."
"Teaches you how to make a shirt that blends into the surroundings.": "Обучает созданию рубашки, которая сливается с окружением."
"Teaches you patterns for great hats tailored specifically for cows.": "Обучает выкройкам великолепных шляп, сшитых специально для коров."
"Teaches you patterns for great hats tailored for does and bucks.": "Обучает вас выкройкам отличных шляп, сшитых для самок и самцов оленей."
"Teaches you patterns for great hats tailored specifically for swine.": "Обучает вас выкройкам великолепных шляп, специально сшитых для свиней."
"Teaches you patterns for hats tailored specifically for giant bats. (You must complete a quest during the Zhia Lian event to unlock the prerequisite recipe!)": "Обучает выкройкам шляп, сшитых специально для гигантских летучих мышей. (Чтобы открыть рецепт-предварительное условие, нужно выполнить задание во время события Жиа Лян!)"
"Teaches you patterns for quality hats tailored specifically for cows.": "Обучает выкройкам качественных шляп, специально сшитых для коров."
"Teaches you patterns for quality hats tailored for does and bucks.": "Обучает вас выкройкам качественных шляп, сшитых для самок и самцов оленей."
"Teaches you patterns for quality hats tailored specifically for swine.": "Обучает вас выкройкам качественных шляп, сшитых специально для свиней."
"Designed (but never used) by the slightly-mad gadgeteer Tamiq. It uses a series of magically-powered cascading motors to augment the punching power.": "Создан (но так и не использован) слегка безумным изобретателем Тамиком. Использует серию магически усиленных каскадных моторов для увеличения силы удара."
"After barely losing the annual Statehelm archery contest, Tamoko gained fame when he returned the following year and used his newly-invented beaker to win the grand prize. The beaker design has since been replicated with his blessing, delighting archery fans but causing a terrible schism in the archery-contest establishment, many of whom consider battle chemistry to be \"like cheating\".": "После того как Тамоко едва не проиграл в ежегодном состязании по стрельбе из лука в Стейтхелме, он прославился, когда в следующем году вернулся и использовал свою новоизобретённую колбу, чтобы выиграть главный приз. Дизайн колбы с тех пор был воспроизведён с его благословения, радуя поклонников стрельбы из лука, но вызвав ужасный раскол в организации конкурса стрельбы из лука, многие из которых считают боевую химию «похожей на жульничество»."
"The bow given to Tamoko for his contributions to the townfolk.": "Лук, подаренный Тамоко за его заслуги перед жителями города."
"Learn various ways to make leather strips.": "Изучите различные способы изготовления кожаных полосок."
"Made with super-tart apples and complemented by super-sweet sugar. Delicious! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приготовлен из очень кислых яблок и дополнен очень сладким сахаром. Вкусно! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A sweet-and-sour treat.": "Сладкое и кислое лакомство."
"These were probably decent tassels at some point -- for what, it's impossible to say -- but now they're covered in blood and pus and other fluids.": "Когда-то это, вероятно, были приличные кисточки — для чего именно, сказать невозможно — но теперь они покрыты кровью, гноем и другими жидкостями."
"This thin chain features an onyx figurine of an orc on a horse. Orcish rituals have attuned it to several gods, including Tast, Arisetsu, and Akhisa.": "Эта тонкая цепочка украшена фигуркой орка на лошади из оникса. Орочьи ритуалы настроили её на нескольких богов, включая Таста, Арисецу и Ахису."
"A slightly-tart jelly-like sauce with hints of citrus and spice. A tasty side-dish.": "Слегка кислый соус желеобразной консистенции с нотками цитрусовых и специй. Вкусное гарнирное блюдо."
"A nuanced and tasty version of the classic human treat. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Изысканный и вкусный вариант классического человеческого лакомства. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This book threatens to crumble to dust if you so much as open the cover. It would take a master librarian to get any knowledge from this old specimen.": "Эта книга грозит рассыпаться в пыль, стоит лишь открыть обложку. Понадобится мастер-библиотекарь, чтобы извлечь хоть какие-то знания из этого старого экземпляра."
"Dye used to color a piece of clothing or armor teal.": "Краска, используемая для окрашивания одежды или брони в бирюзовый цвет."
"A tiny short-lived light used for decoration.\n\nTealights are non-interactible. They last for 5 minutes. You can deploy up to 5 tealights at a time.": "Крошечный недолговечный светильник, используемый для украшения.\n\nЧайные свечи нельзя использовать. Они горят 5 минут. Вы можете разместить до 5 чайных свечей одновременно."
"A brined cheese with a salty, nutty flavor.\n\nCheese Type: Brine (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр в рассоле с солёным, ореховым вкусом.\n\nТип сыра: Рассольный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Teaches you the basics of Teleportation. (Raises your skill to 1 if it isn't already.)": "Обучает основам телепортации. (Повышает ваш навык до 1, если он ещё не достиг этого уровня.)"
"The specially-configured Teleportation Redirector given to you by Deville.": "Специально настроенный Перенаправитель Телепортации, данный вам Девилем."
"Teaches you a method of teleportation. You must already know the basics of mushroom-circle teleportation.": "Обучает вас методу телепортации. Вы должны уже знать основы телепортации через грибной круг."
"Teaches you a method for teleporting to a very specific location.": "Обучает способу телепортации в очень конкретное место."
"Teaches you how to recall to some special destinations.": "Обучает вас вызову к некоторым специальным местам."
"Teaches you a method for teleporting back to your guild's home location. (Currently all guilds' home locations are Rahu, but that will eventually be configurable.) Costs 2 Guild Credits to cast.": "Обучает способу телепортации обратно в домашнее место вашей гильдии. (В настоящее время все домашние места гильдий находятся в Раху, но это будет настраиваемо в будущем.) Стоимость применения — 2 кредита гильдии."
"Learn a technique for creating a rift in space and time.": "Изучите технику создания разлома в пространстве и времени."
"A pungent perfume that rakshasa find irresistable, but most other races find rather displeasant. (Orcs generally tolerate the smell well, and some even like it.) The perfume smells faintly of raw meat, cinnamon, and daisies.": "Резкий парфюм, который ракшасы находят неотразимым, но большинство других рас считает довольно неприятным. (Орки обычно хорошо переносят этот запах, а некоторым он даже нравится.) Парфюм слабо пахнет сырой мясом, корицей и ромашками."
"A small vial that reeks of urine, gore, and chemicals. Only rakshasa are able to stomach this substance, and even they find it revolting -- although many rakshasa claim the smell is also strangely exhilarating.": "Маленькая бутылочка с резким запахом мочи, крови и химикатов. Только ракшасы способны вынести эту субстанцию, и даже им она кажется отвратительной — хотя многие ракшасы утверждают, что этот запах одновременно странно возбуждающий."
"A small vial that reeks of urine and other unpleasant chemicals. This is an unadulterated \"pure\" dose of the drug, straight from the alchemists' workbench.": "Маленькая флакончик, источающий запах мочи и других неприятных химикатов. Это неразбавленная «чистая» доза препарата, прямо с рабочего стола алхимиков."
"Insulated gloves for the most demanding of environments.": "Утеплённые перчатки для самых требовательных условий."
"A sarcastically-named elven drink that replenishes tempest energy. (For easy cleanup, the teapot magically biodegrades when the tea is consumed.)": "Саркастически названный эльфийский напиток, восстанавливающий энергию бури. (Для удобства уборки чайник магически разлагается после употребления чая.)"
"The giant glowy sack from a dead tentakiller.": "Огромный светящийся мешок от мёртвого убийцы щупалец."
"A giant rubbery tentacle, not unlike an octopus tentacle (if the octopus was nightmarishly large).": "Огромное резиновое щупальце, похожее на щупальце осьминога (если бы осьминог был ужасающе огромным)."
"Fermented cactus juice with a complex taste. This variety has been aged to make it more drinkable. (It's \"more\" drinkable, but still not \"very\" drinkable -- it's an acquired taste.) The stereotypical drink of rakshasa desert bandits.": "Ферментированный сок кактуса со сложным вкусом. Этот сорт выдержан, чтобы сделать его более приятным для питья. (Он «более» приятный, но всё ещё не «очень» приятный — это приобретённый вкус.) Стереотипный напиток разбойников-ракшасов пустыни."
"Teaches you how to turn flax into ultra-strong linen.": "Обучает превращать лён в сверхпрочный ткань."
"Teaches you how to turn flax into extra-strong linen.": "Обучает превращать лен в особо прочный лён."
"Teaches you how to turn flax into linen.": "Обучает превращению льна в лён."
"A special cake of gratitude. Thank you so much!": "Особый торт в знак благодарности. Большое спасибо!"
"An orcish Hal-Ku story (which are non-fiction accounts of orcs torturing other people to death). Recounts every minute of a six-week torture session, wherein the orcish author slowly killed a human alchemist. Much of the book is padded with grotesque anecdotes, but one useful recipe is hidden in the appendix.": "Оркская история Хал-Ку (это документальные рассказы об орках, пытающих других людей до смерти). Описывает каждую минуту шестинедельной сессии пыток, в ходе которой орк-автор медленно убивал человеческого алхимика. Большая часть книги наполнена отвратительными анекдотами, но в приложении скрыт один полезный рецепт."
"An inscription on this beautiful instrument claims that it was used by Ultimator to wake up a drunken company of troops at the Battle of Buttocks' End. If true, this battle has been lost to the ages. The instrument primarily excels at low fart-like noises.": "Надпись на этом прекрасном инструменте утверждает, что он использовался Ультиматором, чтобы разбудить пьяную роту войск в битве при Конце Ягодиц. Если это правда, то эта битва навсегда утрачена в веках. Инструмент особенно хорошо подходит для низких звуков, похожих на пердеж."
"The Flower Child liked to lovingly poke people with this dainty stick.": "Цветочный Ребёнок любил нежно тыкать людей этой изящной палочкой."
"The lich Khyrulek crafted this wand during her centuries as a living corpse. It works better for the undead, but it's still pretty good for living people. (Not suitable for use as a fighting staff. This only works for fire magic.)": "Лич Кхюрюлек создала этот жезл за свои века существования в виде живого трупа. Он лучше подходит для нежити, но всё равно довольно хорош для живых. (Не подходит для использования в бою как посох. Работает только с огненной магией.)"
"A grisly paw hacked off of The Mauler.": "Жуткая лапа, отрубленная у Молота."
"The title is dull, but the cover art suggests something... less dull. However, someone has torn out the front half of the book, leaving only appendices.": "Название скучное, но обложка намекает на что-то... менее скучное. Однако кто-то вырвал первую половину книги, оставив только приложения."
"A bow designed by Denton Razor using a secret bowyery technique. It's surprisingly heavy for such a sleek weapon.": "Лук, созданный Дентоном Бритвой с использованием секретной техники изготовления луков. Для такого изящного оружия он удивительно тяжёлый."
"The first volume in a series of travelogues and interviews by the semi-famous mage Reginald.": "Первый том серии путевых заметок и интервью полузнаменитого мага Реджинальда."
"The second volume in a series of travelogues and interviews by the semi-famous mage Reginald.": "Второй том серии путевых заметок и интервью полузнаменитого мага Реджинальда."
"Created in homage to an unknown god or king. They are inscribed with the phrase \"Be quick, my servant! Time is fleeting!\"": "Созданы в честь неизвестного бога или короля. На них выгравирована фраза «Поторопись, мой слуга! Время уходит!»"
"A thick treatise intended for those interested in breeding horses.": "Обширное сочинение, предназначенное для тех, кто интересуется разведением лошадей."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care.": "Изолированная эльфийская колония в лесу Седжвик предпочитает доспехи этого типа, потому что они напоминают им о родине в Вертe. Им объяснили, что в Вертe уже никто так не одевается, но их это, похоже, не волнует."
"A competent and accurate weapon made by the elves of Sedgewick Forest.": "Компетентное и точное оружие, созданное эльфами из леса Седжуик."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care. A symbol of Arisetsu is painted onto the front.": "Изолированная эльфийская колония в лесу Седжуик предпочитает доспехи этого типа, потому что они напоминают им о родине в Верте. Им объяснили, что в Верте уже никто так не одевается, но их это, похоже, не волнует. На передней части нанесён символ Арисэцу."
"The elves of Sedgewick Forest use shields like this for some reason.": "Эльфы из леса Седжвик по какой-то причине используют такие щиты."
"The isolated elf colony of Sedgewick Forest prefers armor of this type because it reminds them of their home in Verta. It's been explained to them that nobody in Verta dresses this way anymore, but they don't seem to care. An outdated version of the Symbol of Arisetsu can be found on the front.": "Изолированная эльфийская колония в лесу Седжуик предпочитает доспехи такого типа, потому что они напоминают им о доме в Верте. Им объяснили, что в Верте уже никто так не одевается, но их это, похоже, не волнует. На передней части можно найти устаревшую версию Символа Арисецу."
"A fragment of magical crystal. It's too small to be used in crafting, but it's pleasantly warm in your palm.": "Фрагмент магического кристалла. Слишком мал, чтобы использовать его в ремесле, но приятно тёплый в ладони."
"This smells and tastes like rotten fruit. It's thick as mud.": "Пахнет и на вкус как гнилая ягода. По густоте напоминает грязь."
"Rub this lotion into your scalp to increase your brainpower.": "Вотрите этот лосьон в кожу головы, чтобы увеличить умственные способности."
"A small but thick piece of metal covered in a grid of holes. It is used by flower arrangers.": "Небольшой, но толстый кусок металла с сеткой отверстий. Используется флористами."
"The rings of this chain suit are ridiculously thick, resulting in a very protective garment that is pretty ugly -- and very conductive of cold and electricity.": "Кольца этого кольчужного доспеха невероятно толстые, что делает его очень защитным, но довольно уродливым — и очень хорошо проводящим холод и электричество."
"Covers the drinker in a super-tough dermal layer. The extra flesh is mildly inconvenient when performing subtle evasive movements.": "Покрывает выпившего сверхпрочной дермальной оболочкой. Дополнительная плоть слегка мешает при выполнении тонких уклончивых движений."
"A horrific cotton cap. High quality in every way, but just... ugly.": "Ужасная хлопковая шапка. Высокого качества во всех отношениях, но просто... уродливая."
"A small thin piece of metal covered in a grid of holes. It is used by flower arrangers.": "Небольшой тонкий кусок металла с сеткой отверстий. Используется флористами."
"Dye used to color a piece of clothing or armor thistle.": "Краска, используемая для окрашивания одежды или брони в цвет чертополоха."
"A type of stone often found near demonspawn.": "Тип камня, часто встречающийся рядом с демонами."
"Old-fashioned elven armor from the age of Romast, thousands of years ago.": "Старомодные эльфийские доспехи эпохи Ромаста, тысячи лет назад."
"Thorians were elves that followed Romast, the god of Martial Arts, who taught that being one with nature was key to grace. That's why their armor was made of metal: nothing's more natural than metal.": "Торианы были эльфами, которые следовали за Ромастом, богом боевых искусств, который учил, что единение с природой — ключ к грации. Вот почему их доспехи были сделаны из металла: нет ничего более естественного, чем металл."
"While there are still-extant offshoots of the Thorians, such as the Thentree elves and the Seekers of Marakir, only the actual Thorians made gloves like these! The weighting is pretty uncomfortable.": "Хотя существуют ещё ответвления Ториан, такие как эльфы Тентри и Искатели Маракира, только настоящие Торианы делали перчатки, подобные этим! Вес распределён довольно неудобно."
"The Thorians disappeared after their god, Romast, died, thousands of years ago. It's extraordinary to find a working piece of Thorian headgear like this!": "Ториане исчезли после смерти своего бога Ромаста, тысячи лет назад. Это удивительно — найти рабочий экземпляр головного убора Ториана, подобный этому!"
"This type of armor can be found in picture-books, but nobody has met an actual Thorian in quite some time.": "Этот тип брони можно увидеть в иллюстрированных книгах, но никто не встречал настоящего Ториана уже довольно давно."
"A thorn from a flower.": "Шип от цветка."
"This beak is too cursed to be useful in most dark rituals.": "Этот клюв слишком проклят, чтобы быть полезным в большинстве тёмных ритуалов."
"This is a few drops of a thick purple liquid. Just touching the vial gives you a mild shock.": "Это несколько капель густой фиолетовой жидкости. Просто прикосновение к пузырьку вызывает лёгкий удар током."
"Made of blackened metal and etched with demonic runes.": "Сделан из почерневшего металла и украшен демоническими рунами."
"This beautiful golden rock has deep striations. In magic, it is associated with animals, hunting, and livestock.": "Этот красивый золотистый камень имеет глубокие полосы. В магии он связан с животными, охотой и скотом."
"It was in the bedding of Old Fangsworth's lair.": "Она была в постели логова Старого Фэнгсворта."
"This dirk has never not existed and will never stop existing. It was removed from the timestream by Romast, the god of Martial Arts, who is ironically long-dead.": "Этот кинжал никогда не переставал существовать и никогда не перестанет существовать. Его извлек из потока времени Ромаст, бог Боевых Искусств, который, иронично, давно мёртв."
"A tiny chunk of magma that has been magically prevented from cooling. Very weird.": "Крошечный кусочек магмы, магически удерживаемый от остывания. Очень странно."
"A cheap tin cup stained with tea.": "Дешевая оловянная кружка, запятнанная чаем."
"Lightweight, but not very sturdy. It's not immediately clear what it might be good for.": "Лёгкая, но не очень прочная. Сразу не понятно, для чего она может пригодиться."
"A tiny puff of animated air. Somehow it stays coherent.": "Крошечный вихрь живого воздуха. Как-то умудряется сохранять форму."
"The captain of the Wintertide's secret recipe. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Секретный рецепт капитана Зимней Волны. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Bestows a title. (This scroll was created by the player that owns this title.)": "Дарует титул. (Этот свиток создан игроком, который владеет этим титулом.)"
"Bestows a title.": "Присваивает титул."
"Bestows a holiday title.": "Дарует праздничный титул."
"Bestows a special title.": "Дарует особое звание."
"Bestows a testing title.": "Присваивает тестовый заголовок."
"A hearty vegetable medley featuring perfectly-toasted spriggan-vine hearts.": "Сытное овощное ассорти с идеально поджаренными сердцами лозы сприггана."
"A rather unappetizing block of 'meat' made from soybeans, used in cooking.": "Довольно непривлекательный кусок «мяса», сделанный из соевых бобов, используемый в кулинарии."
"Chunks of tofu and vegetables impaled on a stick. ": "Кусочки тофу и овощей, насаженные на шампур. "
"Chunks of roasted tofu and sweet evu fruit impaled on a stick. ": "Кусочки жареного тофу и сладких плодов эву, насаженные на палочку. "
"It's creamy and savory and meatless! What else can you ask for? (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Она кремовая, пикантная и без мяса! Что ещё можно пожелать? (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Tofu with real turkey flavor in a simple stir-fry dish.": "Тофу с настоящим вкусом индейки в простом блюде жаркого."
"A meatless meatloaf chock full of flavorful vegetables.": "Бездрожжевой рулет, наполненный ароматными овощами."
"It looks and tastes like turkey ... more or less. The cranberry sauce adds holiday flavor.": "Выглядит и на вкус как индейка... более или менее. Клюквенный соус добавляет праздничный аромат."
"This beaker has been coated in many layers of deadly chemicals. Wash your hands after touching it!": "Эта колба покрыта множеством слоёв смертельно опасных химикатов. Мойте руки после контакта!"
"This long-handled beaker has been coated in many layers of deadly chemicals. Wash your hands after touching it!": "Эта колба с длинной ручкой покрыта множеством слоёв смертельно опасных химикатов. Мойте руки после прикосновения!"
"A watery fruit from the distant crone lands. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Водянистый фрукт из далеких земель кроны. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Dye used to color a piece of clothing or armor tomato red.": "Краситель, используемый для окрашивания одежды или брони в томатный красный цвет."
"A plantable tomato seedling.": "Посадочная рассада помидоров."
"Classic creamy tomato soup.": "Классический кремовый томатный суп."
"Can be studied to earn Toolcrafting XP. (Requires VIP.)": "Можно изучать для получения опыта в изготовлении инструментов. (Требуется VIP.)"
"Teaches you how to make an extravagant utility belt for a giant sentient spider.": "Обучает созданию эффектного пояса для гигантского разумного паука."
"Teaches you to make a quite astounding skinning knife.": "Обучает вас изготовлению поразительного ножа для снятия шкуры."
"Teaches you schematics for turning snail shells and other items into something resembling armor.": "Обучает чертежам по превращению раковин улиток и других предметов во что-то, напоминающее доспехи."
"Teaches you schematics for a harness that allows bats to disperse chemicals with a flap of their wings.": "Обучает чертежам упряжи, которая позволяет летучим мышам распылять химикаты взмахом крыльев."
"Teaches you schematics for a spider harness with a system of discrete tubes that can dispense chemicals.": "Обучает чертежам паучьей обвязки с системой отдельных трубок для выпуска химикатов."
"Teaches you schematics for armoring cows. Really!": "Обучает чертежам для бронирования коров. Правда!"
"Teaches you schematics for a revealing but very comfortable garment.": "Обучает чертежам откровенной, но очень удобной одежды."
"Teaches you how to make a pathology toolkit from advanced materials.": "Обучает созданию набора для патологии из передовых материалов."
"Teaches you how to create a tool for improving certain types of jewelry.": "Обучает созданию инструмента для улучшения определённых видов ювелирных изделий."
"Teaches you how to create a tool for improving certain types of weapons.": "Обучает созданию инструмента для улучшения определённых типов оружия."
"A thick, hearty steak with a side of limp greens.": "Толстый, сытный стейк с гарниром из вялой зелени."
"A small yellow topaz. An incredibly versatile magical stone.\n\nAssociated Primary Skill: Mentalism": "Небольшой жёлтый топаз. Невероятно универсальный магический камень.\n\nСвязанный основной навык: Ментализм"
"Designed by blacksmith-in-hiding Torgan, this wicked weapon features hooked talons to rip into flesh.": "Созданное кузнецом в изгнании Торганом, это зловещее оружие оснащено изогнутыми когтями для разрывания плоти."
"Designed by blacksmith-in-hiding Torgan, this hammer is insanely, ridiculously, heavy.": "Созданный кузнецом в изгнании Торганом, этот молот невероятно, абсурдно тяжёлый."
"Designed by blacksmith-in-hiding Torgan, this weapon was weighted by a master. It requires quite a strong arm, though.": "Созданное кузнецом в изгнании Торганом, это оружие было отбалансировано мастером. Однако для него требуется довольно сильная рука."
"Designed by blacksmith-in-hiding Torgan, this absurdly heavy shield can only be used by those with the most intense courage.": "Созданный кузнецом в изгнании Торганом, этот невероятно тяжёлый щит может использовать только тот, кто обладает самым сильным мужеством."
"Designed by blacksmith-in-hiding Torgan, this heavy blade yearns to spill blood.": "Созданный кузнецом в изгнании Торганом, этот тяжёлый клинок жаждет пролить кровь."
"Designed by blacksmith-in-hiding Torgan, this staff is weighted very oddly, rewarding users for truly committing to each attack.": "Созданный кузнецом в изгнании Торганом, этот посох имеет необычный баланс, вознаграждая тех, кто полностью сосредоточится на каждой атаке."
"Designed by blacksmith-in-hiding Torgan, this cruel knife rewards the foolish warrior who dares bring a knife to a melee.": "Созданный кузнецом в бегах Торганом, этот жестокий нож вознаграждает безрассудного воина, осмелившегося прийти на ближний бой с кинжалом."
"It seems like an ordinary giant spider leg.": "Кажется, это обычная нога гигантского паука."
"A claw enchanted specifically for making horrible scars.": "Коготь, зачарованный специально для нанесения ужасных шрамов."
"A custom wand made by an old druid.": "Особая палочка, сделанная старым друидом."
"A pair of old cloth shoes that are much, <i>much</i> tougher than they look.": "Пара старых тканевых туфель, которые намного, <i>намного</i> прочнее, чем кажутся."
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 35 enchantments.)": "Стандартный универсальный нож Раналон, который также является опасным оружием. (Работает как нож для устриц.) (С случайными зачарованиями уровня 35.)"
"A scintillating stone. Used in magic, it can mesmerize and soothe.\n\nAssociated Primary Skill: Psychology": "Сверкающий камень. Используется в магии, может завораживать и успокаивать.\n\nСвязанный основной навык: Психология"
"The slimy, sticky skin of a toxic frog. DO NOT LICK!": "Слизистая, липкая кожа ядовитой лягушки. НЕ ЛИЗАТЬ!"
"A lump of white poisonous ooze.": "Комок белой ядовитой слизи."
"This salami reeks of spices and... hm, is that a whiff of undeath?": "Эта салями источает запах специй и... хм, неужели это запах нежити?"
"Looks like regular seaweed. Smells even worse, though. Apparently it's toxic.": "Выглядят как обычные водоросли. Запах ещё хуже. Похоже, они ядовитые."
"A lump of green poisonous ooze.": "Комок зелёной ядовитой слизи."
"A sweet syrupy potion that warms the throat when drunk.": "Сладкое сиропообразное зелье, которое согревает горло при питье."
"A slimy liquid with bits of bird beak floating in it. Rub it on your hands to make your poison attacks more deadly!": "Скользкая жидкость с кусочками птичьего клюва. Нанесите её на руки, чтобы сделать свои ядовитые атаки более смертоносными!"
"A small disposable vial of slimy liquid. Rub it on your hands to make your poison attacks more deadly!": "Небольшой одноразовый флакон со слизистой жидкостью. Натрите её на руки, чтобы сделать свои ядовитые атаки более смертоносными!"
"In Rahu it is said that if a mother studies these flowers just before she gives birth, the child will have an abundance of health.\n\nYou can only have one flower arrangement benefit at a time.": "В Раху говорят, что если мать изучит эти цветы незадолго до родов, у ребёнка будет изобилие здоровья.\n\nОдновременно может действовать только один эффект цветочной композиции."
"Another public-relations disaster by the famous Veilmoor clan of human smiths, these claws are each imbued with the soul of a kitten who would otherwise have been euthanized. While it's not technically illegal to use such small souls in enchanting, the 'save the kittens forever' campaign was not appreciated by the weapon-buying public. But as is typical with Veilmoor products, the weapon is so good that nothing else matters too much.": "Ещё один провал в области связей с общественностью от знаменитого клана кузнецов Вейлмур, эти когти наполнены душой котёнка, которого в противном случае усыпили бы. Хотя технически использование таких маленьких душ в зачаровании не запрещено, кампания «спасите котят навсегда» не была оценена покупателями оружия. Но, как обычно с продуктами Вейлмур, оружие настолько хорошее, что остальное не имеет большого значения."
"Not content with the sweetness of ordinary bananas, trolls created this. It has interesting notes of complexity that make the sweetness a bit more palatable. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Не удовлетворившись сладостью обычных бананов, тролли создали этот фрукт. В нём есть интересные нотки сложности, которые делают сладость более приятной. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Augmented with magical sigils that enhance the lute's hypnotic properties. (The magic isn't strong, but it's noticeable.) One of the sigils happens to be a symbol of Arisetsu, enabling priest magic.": "Усилен магическими печатями, которые усиливают гипнотические свойства лютни. (Магия не сильна, но заметна.) Одна из печатей является символом Арисецу, что позволяет использовать жреческую магию."
"This is an old battle plan for some intra-goblin skirmish. It might be worth something to <i>somebody</i>... but probably not much in any case.": "Это старый боевой план для какой-то внутренней стычки гоблинов. Возможно, он что-то стоит для <i>кого-то</i>... но, скорее всего, не очень много в любом случае."
"This is a work-order from a goblin chieftan to a goblin mason guild detailing a home expansion. It's terribly interesting.": "Это заказ на работу от вождя гоблинов к гильдии гоблинских каменщиков с подробным описанием расширения дома. Это ужасно интересно."
"A series of notes and questions about a new type of mechanized ice fishing technique. Addressed to someone named \"Swamp Dwarf\".": "Серия заметок и вопросов о новом типе механизированной техники зимней рыбалки. Адресованы кому-то по имени «Болотный Дварф»."
"This is sloppily transliterated goblin poetry. It scans poorly, the similes make no sense after translation, and the topic of the poem is toenails. But it is poetry, technically.": "Это небрежно транслитерированная поэзия гоблинов. Она плохо рифмуется, сравнения теряют смысл после перевода, а тема стихотворения — ногти на ногах. Но это всё же поэзия, технически."
"An exotic key. As a security mechanism, it self-destructs after a few days.": "Экзотический ключ. В качестве механизма безопасности самоуничтожается через несколько дней."
"A piece of quartz that is partially anchored in another dimension. Being semi-intangible, it is a poor choice for crafting.": "Кусок кварца, частично закреплённый в другом измерении. Будучи полупрозрачным, он плохо подходит для ремесла."
"A curiously-whittled piece of wood. It hums with electricity.": "Любопытно выточенный кусок дерева. Он гудит от электричества."
"This green-tinted armor is worn by Gazluk City's gadgeteers and tacticians, known as \"Treachery Troopers\". Their armor protects them from battlefield conditions and enhances their tricky combat techniques.": "Эта броня с зелёным оттенком носится изобретателями и тактиками города Газлук, известными как «Солдаты Предательства». Их броня защищает их от условий поля боя и усиливает их хитрые боевые приёмы."
"The seed of a treant.": "Семя древня."
"A rock-hard fruit covered in ashy powder. It looks magical, but poisonous. Very poisonous.": "Камнеподобный фрукт, покрытый пепельным порошком. Выглядит магическим, но ядовитым. Очень ядовитым."
"A still-alive branch covered in still-alive treant leaves. The leaves seem... annoyed? Perhaps this should be given to a druid leader.": "Ветка, всё ещё живая, покрытая живыми листьями древня. Листья кажутся... раздражёнными? Возможно, это стоит отдать вождю друидов."
"A leafy branch from a treant. An expert carpenter could easily prepare it for crafting.": "Листвавая ветвь от древня. Опытный плотник легко подготовит её для ремесла."
"A sweet pastry apparently invented by trolls. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкая выпечка, по-видимому, изобретённая троллями. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A tasty vegetable dish.": "Вкусное овощное блюдо."
"The troll take on a vegetarian steak. The secret ingredient: actual steak.": "Вегетарианский стейк по-тролльски. Секретный ингредиент: настоящий стейк."
"Sweeter AND more sour than a natural lemon, this troll dessert is guaranteed to pucker your face. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Слаще И кислее натурального лимона, этот тролльский десерт гарантированно заставит вас поморщиться. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Tremor the Myconian took this bow from a pesky elf. Myconians can't use bows, but Tremor liked plucking the string to make a 'twang' sound. It really irritated other myconians, and Tremor liked that.": "Тремор Миконианец забрал этот лук у надоедливого эльфа. Микониане не умеют пользоваться луками, но Тремору нравилось дергать тетиву, чтобы издавать звук «тванг». Это очень раздражало других микониан, и Тремору это нравилось."
"A huge, pointy, surprisingly old-looking bone.": "Огромная, острая, удивительно древняя кость."
"A mage's staff with a splash-beaker at the top, perfect for blasting and splashing at the same time.": "Посох мага с колбой на вершине, идеально подходит для одновременного взрыва и брызг."
"There are three parts to this weird key.": "Этот странный ключ состоит из трёх частей."
"A surprisingly light and flavorful fish dish.": "Неожиданно лёгкое и ароматное рыбное блюдо."
"Used by some troll martial-artists that you definitely do not want to meet.": "Используется некоторыми тролльскими мастерами боевых искусств, с которыми вам определённо не захочется встретиться."
"A lump of flesh from a troll. It automatically regenerates at the same rate that it rots.": "Комок плоти тролля. Автоматически восстанавливается с той же скоростью, с какой гниёт."
"A keg of Troll's Lip, one of the cheapest and vilest beers in all the Council Lands.": "Бочонок Троллиной Губы, одного из самых дешёвых и отвратительных сортов пива во всех Землях Совета."
"A flask of flammable liquid. It doesn't deal much damage, but any flame will keep trolls from regenerating, and this flame lasts a long time.": "Флакон с легковоспламеняющейся жидкостью. Оно не наносит большого урона, но любой огонь не даст троллям регенерировать, а этот огонь длится долго."
"Perfectly removed from a vicious barghest. Suitable for special tasks that require barghest skin.": "Идеально снята с свирепого баргеста. Подходит для особых заданий, требующих шкуры баргеста."
"Removed from a bear corpse with perfect skill. Suitable for special tasks that specifically require bear skin.": "Снята с трупа медведя с идеальным мастерством. Подходит для особых заданий, которые требуют именно медвежью шкуру."
"The hide of a demonic creature. It's hot to the touch.": "Шкура демонического существа. На ощупь горячая."
"Removed from a bovine with perfect skill. Suitable for special cow-hide-related tasks.": "Снята с крупного рогатого скота с идеальным мастерством. Подходит для особых заданий, связанных с коровьими шкурами."
"Removed from a deer with expertise. Suitable for special tasks that specifically require deer skin.": "Снята с оленя с мастерством. Подходит для особых заданий, которые требуют именно оленью шкуру."
"The skin of a small dinosaur. Suitable for special tasks that specifically require deinonychus hide.": "Шкура маленького динозавра. Подходит для специальных заданий, которые требуют именно шкуру дейнониха."
"The skin of a dragon-kin creature. Suitable for very specific purposes.": "Шкура существа из рода драконов. Подходит для очень специфических целей."
"The perfectly-removed hide of a goat.": "Идеально снятая шкура козы."
"Perfectly removed from a hippo. Suitable for very specific purposes.": "Идеально снята с бегемота. Подходит для очень специфических целей."
"The hide of a monstrous creature. It's horrid-looking, yet undeniably pleasant to touch.": "Шкура чудовищного существа. Она ужасно выглядит, но несомненно приятна на ощупь."
"Removed from a panther corpse with expert skill. Suitable for special tasks that require panther skin.": "Снята с трупа пантеры с мастерством эксперта. Подходит для особых заданий, требующих шкуры пантеры."
"Removed from a pig corpse with perfect skill. Suitable for special tasks that specifically require pig skin.": "Снята с трупа свиньи с идеальным мастерством. Подходит для особых заданий, которые требуют именно свиную шкуру."
"The skin of a rabbit, perfectly preserved. Suitable for special tasks that specifically require rabbit skin.": "Шкура кролика, идеально сохранившаяся. Подходит для особых заданий, которые требуют именно кроличью шкуру."
"The skin of a very large rat, removed with expertise. Suitable for special tasks that require rat skin.": "Шкура очень большой крысы, снятая с мастерством. Подходит для особых задач, требующих крысиных шкур."
"The flesh of a rhino, removed perfectly. Suitable for special tasks that specifically require rhino hide.": "Мясо носорога, снятое идеально. Подходит для особых заданий, которые требуют именно шкуру носорога."
"The perfectly-removed hide of a massive shark. Terrifying!": "Идеально снятая шкура огромной акулы. Ужасающая!"
"The skin and fur from a sheep, removed with perfect skill. Suitable for special tasks that require sheep skin.": "Шкура и мех овцы, снятые с идеальным мастерством. Подходит для особых задач, требующих овечьей шкуры."
"Perfectly removed from a large serpent. Suitable for very specific purposes.": "Идеально снята с большой змеи. Подходит для очень специфических целей."
"Removed from a tiger corpse with expert skill. Suitable for special tasks that require tiger skin.": "Снята с трупа тигра с мастерством эксперта. Подходит для особых заданий, требующих тигриную шкуру."
"Perfectly removed from a wolf or worg. Suitable for special tasks that require wolf skin.": "Идеально снята с волка или ворга. Подходит для особых заданий, требующих волчьей шкуры."
"Made of a pretentious fairy wood, this staff is incredibly strong, yet gives in just the right ways.": "Сделанный из вычурного фейского дерева, этот посох невероятно прочен, но при этом уступает именно там, где нужно."
"This style of hat is named after a cow who, in stories and tall tales, was said to be the mightiest cow ever. Truffle supposedly went on adventures and defeated demons, ghosts, and werewolves -- all while wearing this hat.": "Этот стиль шляпы назван в честь коровы, которая в историях и сказках считалась самой могущественной коровой на свете. Говорят, Трюфель отправлялась в приключения и побеждала демонов, призраков и оборотней — всё это, нося эту шляпу."
"A key for a student's trunk. Ah, the sight of this key takes you back!": "Ключ от сундука ученика. Ах, вид этого ключа возвращает вас в прошлое!"
"A special token from Tryaka to barter for a special advanced item.": "Особый жетон от Тряки для обмена на специальный продвинутый предмет."
"A pretty green gem. Used in magic, it increases comprehension of scientific concepts.\n\nAssociated Primary Skill: Ice Magic\nAssociated Secondary Skill: Geology": "Красивый зелёный самоцвет. Используется в магии, он повышает понимание научных концепций.\n\nСвязанный основной навык: Ледяная магия  \nСвязанный второстепенный навык: Геология"
"A scrap of fur from a dead animal.": "Обрывок шерсти с мёртвого животного."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +30 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +30 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"This odd organic life stores solar energy in an unusual manner: it shunts it into a tiny pocket dimension. This allows the lichen to thrive in any sunlit environment, but it's most commonly found in freezing areas because there are fewer natural predators.\n\nIt is used by sages as a sort of battery for spells that require a large burst of power, and surveyors claim that the lichen can be used to find hidden caches of minerals in the area.": "Этот странный органический организм хранит солнечную энергию необычным способом: он направляет её в крошечное карманное измерение. Это позволяет лишайнику процветать в любой освещённой солнцем среде, но чаще всего его можно встретить в холодных районах, где меньше естественных хищников.\\n\\nМудрецы используют его как своего рода аккумулятор для заклинаний, требующих мощного всплеска энергии, а землемеры утверждают, что лишайник можно использовать для поиска скрытых залежей минералов в окрестностях."
"A chewy, hearty grain that can be milled into chewy, hearty flour.": "Жевательное, питательное зерно, которое можно перемолоть в жевательную, питательную муку."
"Seeds that can grow into rye.": "Семена, из которых может вырасти рожь."
"A chunk of brittle ore. It is extremely hard to smith, but alchemists have found some uses for it.": "Кусок хрупкой руды. Его очень трудно ковать, но алхимики нашли для него несколько применений."
"Intended to be eaten with a turkey meal. Although you could snack on gravy by itself. If you really wanted to. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Предназначен для употребления с индюшачьим блюдом. Хотя можно перекусить соусом и отдельно. Если очень хочется. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A well-roasted turkey leg makes a great snack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Хорошо прожаренная индюшиная ножка — отличный перекус! (Это перекус. Перекусы складываются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"A nice filling meal.": "Хорошее сытное блюдо."
"Turkey can be fried deliciously, and this dish proves it.": "Индейку можно вкусно пожарить, и это блюдо это доказывает."
"A bright blue stone, almost teal in color. In magic, it is associated with beaches and waves.": "Ярко-голубой камень, почти бирюзового цвета. В магии он ассоциируется с пляжами и волнами."
"Dye used to color a piece of clothing or armor turquoise.": "Краска, используемая для окрашивания одежды или брони в бирюзовый цвет."
"This oversized hat was created by fairy magic for an unknown purpose. It's too large to fit on a human's head, but it would fit a cow's head perfectly.": "Эта огромная шляпа была создана фейской магией для неизвестной цели. Она слишком велика для человеческой головы, но идеально подойдет для головы коровы."
"Tyler gave this ring to his soulmate as a token of his affection.": "Тайлер подарил это кольцо своей родственной душе в знак своей любви."
"It's somewhat melted around the edges, but still pretty sturdy.": "По краям он немного расплавлен, но всё ещё довольно прочный."
"Obtained from a human named Tyler, this shield seems to have been well-maintained.": "Получен от человека по имени Тайлер, этот щит, похоже, был хорошо ухожен."
"A large block of animal fat.": "Большой кусок животного жира."
"Truth in advertising: this is not a pretty helmet. It has other charms, though, such as a deep-seated aroma of spoiled cheese.": "Честность в рекламе: это не красивый шлем. Однако у него есть другие прелести, например, стойкий запах испорченного сыра."
"Full of wool! Way too much wool. You'd get heatstroke if it was too hot!": "Полны шерсти! Слишком много шерсти. Если станет слишком жарко, можно получить тепловой удар!"
"Warm and cozy without getting in the way of violence.": "Теплые и уютные, не мешают ярости боя."
"A weird elven rune on a chain. Unlike most elven rune amulets, this one was mass-produced in Verta for export to other lands. Not exactly a triumph of art, but its protective magic is undeniable.": "Странная эльфийская руна на цепочке. В отличие от большинства эльфийских рунических амулетов, этот был массово произведён в Вертe для экспорта в другие земли. Не шедевр искусства, но его защитная магия неоспорима."
"A corrosive alchemical liquid that is far too dangerous for common use, and is best left to experts.": "Коррозийная алхимическая жидкость, слишком опасная для обычного использования, и лучше оставить её экспертам."
"Recovers 100 power instantly, and recovers 120 more over 60 seconds": "Мгновенно восстанавливает 100 энергии и дополнительно восстанавливает 120 энергии в течение 60 секунд"
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 1000 raffle tickets for up to 10 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-120 minutes.": "Сложное устройство, которое может выдавать лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 1000 лотерейных билетов для до 10 предметов (или стаков предметов) и/или денежного приза. Лотерейные билеты могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю, и сообщение, показываемое только победителю. Также эта модель может быть настроена с ограничением времени от 1 до 120 минут."
"Secreted from gigantic insects, this substance is used in making very high-quality shellac.": "Выделяемое гигантскими насекомыми, это вещество используется для изготовления очень качественного шеллака."
"A big glob of high-quality animal fat.": "Большая капля высококачественного животного жира."
"Worn by both elves and dwarves during the Elf-Orc Wars, these boots were made for stomping.": "Носились как эльфами, так и гномами во время Войн Эльфов и Орков, эти сапоги созданы для топания."
"This exquisite piece was made by priests of Umrad. Rumors once abounded that the god Umrad himself gave them the design, but Umrad has denied this (and found the idea offensive for several reasons).": "Этот изысканный предмет был создан жрецами Умрада. Ходили слухи, что сам бог Умрад подарил им этот дизайн, но Умрад отрицал это (и считал эту идею оскорбительной по нескольким причинам)."
"Gauntlet-style gloves, but maneuverable enough for casting work.": "Перчатки в стиле латных рукавиц, но достаточно подвижные для работы с заклинаниями."
"Made by dwarven forge-priests during the Elf-Orc wars.": "Создан кузнечными жрецами гномов во время войн эльфов и орков."
"During the Elf-Orc war, dwarven priests of Umrad made tens of thousands of these for their elven allies.": "Во время войны эльфов и орков дворфийские жрецы Умрада изготовили десятки тысяч таких для своих эльфийских союзников."
"A weighty shield.": "Тяжёлый щит."
"This brandy needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот бренди нужно хранить в пещере в течение часа, прежде чем он станет пригодным для питья. (Вам не нужно всё время оставаться в пещере или быть онлайн.)"
"This vodka needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Эту водку нужно хранить в пещере в течение часа, прежде чем она станет пригодной для питья. (Вам не нужно всё время находиться в пещере или быть онлайн.)"
"This bourbon needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот бурбон нужно хранить в пещере в течение трёх часов, прежде чем он станет пригодным для питья. (Вам не нужно всё это время находиться в пещере или быть онлайн.)"
"This cider needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот сидр нужно хранить в пещере в течение трёх часов, прежде чем он станет пригодным для питья. (Вам не нужно всё это время оставаться в пещере или быть онлайн.)"
"This gin needs to be stored in a cave for three hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот джин нужно хранить в пещере в течение трёх часов, прежде чем он станет пригодным для питья. (Вам не нужно всё время находиться в пещере или быть онлайн.)"
"This rum needs to be stored in a cave for an hour before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот ром нужно хранить в пещере в течение часа, прежде чем он станет пригодным для питья. (Вам не нужно всё время находиться в пещере или быть онлайн.)"
"This tequila needs to be stored in a cave for two hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Эту текилу нужно хранить в пещере в течение двух часов, прежде чем она станет пригодной для питья. (Вам не нужно находиться в пещере или быть онлайн всё это время.)"
"This whisky needs to be stored in a cave for two hours before it can be made drinkable. (You do not need to remain in the cave or online the whole time.)": "Этот виски нужно хранить в пещере в течение двух часов, прежде чем он станет пригодным для питья. (Вам не нужно всё время находиться в пещере или быть онлайн.)"
"Dispels permanent batification.": "Снимает постоянное превращение в летучую мышь."
"Dispels permanent rabbitization.": "Снимает постоянное превращение в кролика."
"Dispels permanent cowification.": "Снимает постоянное превращение в корову."
"Dispels permanent deerification.": "Снимает постоянное превращение в оленя."
"Dispels permanent pigification.": "Снимает постоянное превращение в свинью."
"Turns off PvP caused by PvP Juice test-potions.": "Отключает PvP, вызванное тестовыми зельями Сока против PvP."
"Dispels permanent raven form.": "Снимает постоянную ворониную форму."
"Dispels permanent spiderification.": "Снимает постоянное превращение в паука."
"Although technically Orcish, these bows are made by Dwarven conscripts.": "Хотя технически орочий, эти луки изготовлены призывниками из гномов."
"Removes vampirism.": "Устраняет вампиризм."
"Dispels permanent foxification.": "Снимает постоянное лисье проклятие."
"Dispels permanent skeletonization.": "Снимает постоянное состояние скелетизации."
"You don't want to think about the taste... it's best to drink something strong afterwards.": "Лучше не думать о вкусе... после лучше выпить что-то покрепче."
"Can be studied to earn Unarmed XP. (Requires VIP.)": "Можно изучать для получения опыта в Боевом Искусстве. (Требуется VIP.)"
"Teaches you an Unarmed combat technique that doesn't require hands.": "Обучает технике боя без оружия, не требующей использования рук."
"Teaches you an Unarmed combat technique.": "Обучает технике боя без оружия."
"A drop of sweet-smelling magical liquid.": "Капля сладко пахнущей магической жидкости."
"A rotten urak egg. Completely valueless.": "Гнилое яйцо урака. Полностью бесполезно."
"Customized for the Unfun Guy by visiting weaponsmiths, this staff hits hard. And often.": "Созданный оружейниками специально для Безвкусного Парня, этот посох наносит мощные удары. И часто."
"A small amount of sludgy substance.": "Небольшое количество вязкой субстанции."
"This unidentified pastoral seems to be in good condition.": "Эта неопознанная пастораль, похоже, в хорошем состоянии."
"This idyllic scene seems to have stood the passage of time quite well.": "Эта идиллическая сцена, похоже, хорошо выдержала испытание временем."
"This painting depicts a long-lost monument. Rather pretty.": "На этой картине изображён давно потерянный памятник. Довольно красивая."
"This nature scene was painted with vibrant colors.": "Этот природный пейзаж был написан яркими красками."
"There is a hint of melancholy behind this beautiful nature scene.": "За этим прекрасным природным пейзажем скрывается оттенок меланхолии."
"This pleasant abstract painting has a nice solid frame.": "Эта приятная абстрактная картина имеет красивую прочную раму."
"A nature scene with an incredible level of detail.": "Пейзаж природы с невероятным уровнем детализации."
"This unidentified portrait is remarkably lifelike.": "Этот неопознанный портрет удивительно реалистичен."
"A musty tome. Looks tedious, if you judge it by its cover.": "Заплесневелый том. Выглядит скучно, если судить по обложке."
"A thin volume of poetry. No pictures at all.": "Тонкий томик стихов. Совсем без картинок."
"A well-preserved book of poems.": "Хорошо сохранившаяся книга стихов."
"A well-preserved volume of poems.": "Хорошо сохранившийся том стихов."
"A small sack of foul-smelling white dust. Echur instructed you not to eat it, but that shouldn't be a problem.": "Маленький мешочек с вонючим белым порошком. Эчур велел тебе не есть его, но это не должно стать проблемой."
"Choice parts of a pig infused with ancient spirits of evil. An instant pick-me-up! Warning: if Ur-Bacon speaks to you, do not speak back. Never follow instructions you receive from evil food of any kind.": "Отборные части свиньи, наполненные древними духами зла. Мгновенный заряд бодрости! Внимание: если Ур-Бэкон заговорит с вами, не отвечайте ему. Никогда не выполняйте указания, полученные от злой пищи любого рода."
"A famous orcish pasta dish.": "Известное орочье блюдо из пасты."
"Long, thin wheat noodles made in the orcish style. While most famous as the main ingredient in uraknocha, they are also used in many other dishes.": "Длинная тонкая пшеничная лапша, приготовленная в орочьем стиле. Хотя она наиболее известна как основной ингредиент уракночи, её также используют во многих других блюдах."
"A spreadable cheese that's mild and quite sweet and perfect for desserts.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Намазываемый сыр с мягким и довольно сладким вкусом, идеально подходящий для десертов.\n\nТип сыра: Сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A pebble found on a yeti.": "Галька, найденная на йети."
"These earrings will make a neophyte mage's spells seem much more impressive. They were intended as a gift for a young girl who passed before she got a chance to wear them.": "Эти серьги сделают заклинания начинающего мага гораздо впечатляющими. Они предназначались в подарок молодой девушке, которая ушла из жизни, не успев их надеть."
"Dainty gloves made of a stretchy material. They could fit any sized hands, but were made for a child.": "Изящные перчатки из эластичного материала. Они подходят для рук любого размера, но были сделаны для ребёнка."
"Apparently intended to be a gift to Ursula's mother, this cowl is <i>very</i> poorly made and offers no real protection. It has been enchanted with an apprentice-level spell that would normally not be very effective, but the enchantment has been repeated thousands of times over many years, and this has somehow cohered into a decent level of magic.": "По-видимому, предназначенный в подарок матери Урсулы, этот капюшон <i>очень</i> плохо сшит и не обеспечивает реальной защиты. Он был зачарован заклинанием ученического уровня, которое обычно не было бы очень эффективным, но это зачарование повторялось тысячи раз на протяжении многих лет, и каким-то образом это превратилось в достойный уровень магии."
"A versatile knife for skinning or butchering. (Keep it in your inventory and you'll be given the option to skin and/or butcher the corpses of some enemies.)": "Универсальный нож для снятия шкуры или разделки. (Держите его в инвентаре, и вам будет доступна опция снимать шкуру и/или разделывать трупы некоторых врагов.)"
"Use this item to claim 1 month of VIP membership.": "Используйте этот предмет, чтобы получить 1 месяц VIP-подписки."
"After his brother burned to death, Vagreef spent years mastering Fire Magic to create suits of fire-resistance armor. He planned to manufacture these suits for his entire gang of bandits, but he only managed to make one prototype suit before he was murdered. This was his helmet.": "После того как его брат сгорел дотла, Вагриф провёл годы, осваивая Огненную магию, чтобы создать доспехи с огнестойкостью. Он планировал изготовить такие доспехи для всей своей банды разбойников, но успел сделать только один прототип, прежде чем был убит. Это был его шлем."
"A few sketchy notes about a legendary hoard of treasure buried in the Eltibule region.": "Несколько сомнительных записок о легендарном кладе, зарытом в регионе Эльтибул."
"A few sketchy notes about a large amount of treasure buried in the Eltibule region.": "Несколько неясных записок о большом количестве сокровищ, зарытых в регионе Эльтибул."
"A few sketchy notes about a small amount of treasure buried in the Eltibule region.": "Несколько неясных заметок о небольшом количестве сокровищ, зарытых в регионе Эльтибуль."
"A few sketchy notes about a huge hoard of treasure buried in the Eltibule region.": "Несколько сомнительных записок о гигантском кладе, зарытом в регионе Эльтибуле."
"A few sketchy notes about a legendary hoard of treasure buried in the Ilmari Desert.": "Несколько сомнительных записок о легендарном кладе, зарытом в пустыне Илмари."
"A few sketchy notes about a large amount of treasure buried in the Ilmari Desert.": "Несколько сомнительных записок о большом количестве сокровищ, зарытых в пустыне Илмари."
"A few sketchy notes about a small amount of treasure buried in the Ilmari Desert.": "Несколько неясных заметок о небольшом количестве сокровищ, зарытых в пустыне Илмари."
"A few sketchy notes about a huge hoard of treasure buried in the Ilmari Desert.": "Несколько сомнительных записок о гигантском кладе, зарытом в пустыне Илмари."
"A few sketchy notes about a legendary hoard of treasure buried or sunken near Sun Vale.": "Несколько сомнительных записок о легендарном кладе, зарытом или затонувшем возле Долины Солнца."
"A few sketchy notes about a large amount of treasure buried or sunken near Sun Vale.": "Несколько смутных заметок о большом количестве сокровищ, зарытых или затонувших рядом с Долиной Солнца."
"A few sketchy notes about a small amount of treasure buried or sunken near Sun Vale.": "Несколько сомнительных заметок о небольшом количестве сокровищ, зарытых или затонувших возле Долины Солнца."
"A few sketchy notes about a huge hoard of treasure buried or sunken near Sun Vale.": "Несколько неясных записок о гигантском кладе, зарытом или затонувшем рядом с Солнечной Долиной."
"A festive banner declaring its Love for Alharth.": "Праздничное знамя, выражающее свою любовь к Алхарту."
"This item exists for validation purposes -- it is the prototypical item that cannot be sent to a saddlebag under any circumstances.": "Этот предмет существует для целей проверки — это прототипический предмет, который ни при каких обстоятельствах нельзя положить в седельную сумку."
"A thick gold chain with a medallion shaped like a pair of wings.": "Толстая золотая цепь с медальоном в форме пары крыльев."
"A dark shield bearing the inscription \"In the absence of light, darkness prevails.\"": "Тёмный щит с надписью «При отсутствии света царит тьма.»"
"Makes you a vampire. Permanent! Cannot be cured even with a Minor Panacea.": "Превращает вас в вампира. Постоянно! Невылечимо даже с помощью Малой Панацеи."
"Teaches you a vampirism combat technique.": "Обучает вас боевой технике вампиризма."
"The pods are too spicy to eat raw, but the powder scraped from them is a valuable spice for cooking.": "Стручки слишком острые, чтобы есть их сырыми, но порошок, соскобленный с них, является ценной приправой для готовки."
"While inarguably well-made, it seems somewhat ceremonial: the blade isn't even sharp! But it is very, very, VERY hot, which might count for something. There is an inscription: \"The Bearer Is Worthy\"": "Хотя он несомненно хорошо сделан, кажется несколько церемониальным: лезвие даже не острое! Но оно очень, очень, ОЧЕНЬ горячее, что может иметь значение. На нём есть надпись: «Носитель достоин»"
"A nice fresh loaf, filled with nuts. It's extremely dense bread and very filling.": "Свежий вкусный хлеб, наполненный орехами. Очень плотный и сытный."
"A stir-fried vegetarian dish with more than a hint of spice.": "Жареное на сковороде вегетарианское блюдо с явным оттенком остроты."
"Food-quality vegetable oil. It burns easily so is only suitable for certain dishes.": "Пищевое растительное масло. Легко воспламеняется, поэтому подходит только для некоторых блюд."
"This tattered cloak would seem like an ordinary rag except for a thick Necromancy Gem carefully sewn inside.": "Этот изорванный плащ казался бы обычной тряпкой, если бы не толстый камень Некромантии, аккуратно вшитый внутрь."
"Velkort gave these to you.": "Велкорт подарил их тебе."
"An inscription in Elven reads \"To my lovely Velkort, thanks for a great evening.\"": "Надпись на эльфийском гласит «Моему дорогому Велькорту, спасибо за прекрасный вечер.»"
"An old key encrusted in slime. Somehow it passed beyond the veil of death! But it's back now.": "Старый ключ, покрытый слизью. Как-то он прошёл за завесу смерти! Но теперь он вернулся."
"A modest silver medallion of elven design. It helps one focus on their problems.": "Скромный серебряный медальон эльфийского дизайна. Помогает сосредоточиться на своих проблемах."
"A chunk of raw deer meat.": "Кусок сырого мяса оленя."
"An improvement over basic hash browns. Greasy and salty, in a good way!": "Улучшенная версия обычных хэшбраунов. Жирное и солёное, но в хорошем смысле!"
"Tough and dry, but good for gnawing. This provides a quick instant pick-me-up.": "Жёсткое и сухое, но хорошее для грызения. Это даёт быстрый мгновенный заряд энергии."
"An odorous dish said to be palatable to psychic mantises.": "Запахное блюдо, которое, как говорят, нравится психическим богомолам."
"Just like roast beef - except not.": "Похоже на ростбиф — но это не он."
"Magic gauntlets that were in a giant spider's hoard for decades, taking some of the spider's aspect.": "Волшебные рукавицы, которые десятилетиями хранились в сокровищнице гигантского паука, вобрав в себя часть его сущности."
"The signature blade of the human assassin guild called the Shadow Keepers, this weapon design is now found across the continent. Whenever nefarious types scheme, a venomizer is likely at hand.": "Фирменный клинок гильдии человеческих убийц под названием Стражи Тени, этот дизайн оружия теперь встречается по всему континенту. Всякий раз, когда коварные личности замышляют что-то, рядом, вероятно, окажется ядовитый клинок."
"A rare and beautiful starfish.": "Редкая и красивая морская звезда."
"An extremely rare shell.": "Очень редкая раковина."
"A magically enhanced piece of fluorite.": "Магически усиленный кусок флюорита."
"This box can be used to grow a crop of mushrooms.\nGrow Time: 40% faster than normal\nXP Penalty: -50% XP per mushroom": "Эта коробка используется для выращивания урожая грибов.\\nВремя роста: на 40% быстрее обычного\\nШтраф к опыту: -50% опыта за каждый гриб"
"Hot, freshly-grilled fish and cold crunchy lettuce, seasoned perfectly.": "Горячая, свежеприготовленная на гриле рыба и холодный хрустящий салат, идеально приправленные."
"A particularly vividly-colored painclover. It seems ... About as toxic as the usual kind.": "Особенно ярко окрашенный болячник. Кажется... Примерно такой же токсичный, как и обычный."
"A lumpy stick with protruding thorns around the outside.": "Комковатая палка с выступающими шипами по всей поверхности."
"This strain of gur-horta is relatively weak, making it a poor choice for refining into combat potions. However, it's popular among orcs that smoke the leaves recreationally due to its vibrant aroma and low side-effects.": "Этот сорт гур-хорта относительно слабый, поэтому плохо подходит для приготовления боевых зелий. Однако он популярен среди орков, которые курят листья для удовольствия из-за их яркого аромата и слабых побочных эффектов."
"Records the location of a large mineral deposit in Vidaria.": "Фиксирует местоположение крупного месторождения минералов в Витарии."
"A lump of stinking acidic green ooze.": "Комок вонючей кислой зелёной слизи."
"Powdered brains of psychic creatures, cut with secret and dangerous substances that enhance its effect on psychics.": "Порошок из мозгов психических существ, смешанный с секретными и опасными веществами, усиливающими его воздействие на психиков."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +6 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +6 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A decorative ranalan bracelet made of purple glass beads.": "Декоративный браслет Раналан из фиолетовых стеклянных бусин."
"Dye used to color a piece of clothing or armor violet red.": "Краска, используемая для окрашивания одежды или брони в фиолетово-красный цвет."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 25,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 25 000 Советов."
"Fangy. And poisony.": "Клыкастые. И ядовитые."
"A metal clamp used by toolmakers and weaponsmiths.": "Металлические тиски, используемые изготовителями инструментов и оружейниками."
"Cotton cloth that's very porous. Ideal for use in creating mold cheeses.": "Хлопковая ткань с высокой пористостью. Идеально подходит для изготовления плесневых сыров."
"A magical crystal.": "Магический кристалл."
"A fragment of magical crystal. It's too small to be used in crafting, but perhaps it could be fused with other shards somehow.": "Фрагмент магического кристалла. Он слишком мал для использования в ремесле, но, возможно, его можно как-то объединить с другими осколками."
"The heart of a desert-living drakeworm.": "Сердце песчаного драконогрыза."
"A sturdy torch in a sconce that can be installed in a home or guild hall.": "Прочный факел в канделябре, который можно установить в доме или гильдейском зале."
"A handful of tasty walnuts.": "Горсть вкусных грецких орехов."
"Wanted: Kill 10 Aktaari Hall Monitors. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 10 дозорных зала Актаари. Награда: 8500 советов, 1 кусок Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Aktaari Swarmers. Reward: 9000 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 10 Актаарских роев. Награда: 9000 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Aktaari Swarmlings. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 10 личинок Актаари. Награда: 8500 советов, 1 кусок Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Aktaari Workers (Group). Reward: 9500 councils, 5 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 10 рабочих Актаари (Группа). Награда: 9500 советов, 5 кусков ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Big Gricklings. Reward: 5700 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 Больших Гриклингов. Награда: 5700 советов, 3 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 4 Cave Lamia (Group). Reward: 3600 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 4 Пещерных Ламии (Группа). Награда: 3600 советов, 4 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Cocks. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 Глубоких Петухов. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Gnashers. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 Глубоких Клыкачей. Награда: 5400 советов, 2 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 4 Deep Hippos. Reward: 3600 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 4 глубоких гиппопотама. Награда: 3600 советов, 2 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Sadness Gazelles. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 газелей Глубокой Печали. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Deep Vines. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 Глубоких Лоз. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Wasps or Menagerie Pollenators. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: убить 6 Глубоких ос или опылителей Менажерии. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Forthragarian Engineers. Reward: 9500 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 10 инженеров Фортрагариана. Награда: 9500 советов, 3 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Friendly Frogs. Reward: 6800 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 8 Дружелюбных Лягушек. Награда: 6800 советов, 1 кусок Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Frozen Cave Elementals. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 замороженных пещерных элементалей. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 5 Guardian Drakeworms. Reward: 4500 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 5 стражей Дрейквермов. Награда: 4500 советов, 4 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Incubator Spiders (Elite). Reward: 5400 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 инкубаторных пауков (элита). Награда: 5400 советов, 4 куска когрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Mangler Scorpions. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 Скорпионов-Манглеров. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Menagerie Donkeys. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 6 ослов Менажерии. Награда: 5400 советов, 2 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Osslar Custodians. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 стражей Осслар. Награда: 7200 советов, 2 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Osslar Scouts. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 разведчиков Осслар. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Spider Brutes (Elite). Reward: 7200 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 паучьих громил (элита). Награда: 7200 советов, 4 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Tough Tigers. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 Жестоких тигров. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 12 Trained Gricklings. Reward: 10800 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 12 дрессированных гриклингов. Награда: 10800 советов, 2 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 12 Young Gricklings. Reward: 10200 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 12 молодых гриклингов. Награда: 10200 советов, 1 кусок ксогрита и соответствующая дополнительная компенсация."
"The great alchemists of yore supposedly used flasks like this when they fought in wars. Or perhaps that's just a tale invented to sell flasks.": "Великие алхимики древности, как говорят, использовали такие флаконы в сражениях. А может, это всего лишь история, придуманная для продажи флаконов."
"This sort of instrument is said to be used by elves when they go to war. The last elven war is a distant memory, however, so it's unclear who's making these horns.": "Говорят, что такой инструмент используют эльфы, когда идут на войну. Однако последняя эльфийская война — далёкое прошлое, поэтому непонятно, кто сейчас делает эти рожки."
"A musical instrument made of ram's horn.": "Музыкальный инструмент из бараний рог."
"This cloth armor is worn by the few Gazluk wizards who have become officers. It is designed to aid powerful spellcasters.": "Этот тканевый доспех носят немногие газлукские волшебники, ставшие офицерами. Он создан, чтобы помогать могущественным заклинателям."
"A vaguely meat-flavored swill made all the more horrid with the addition of lumps of fur.": "Слабо напоминающий мясо отвар, ставший ещё более отвратительным из-за добавления комков шерсти."
"An elvish lembas brick with a modified recipe intended to appeal to a wide variety of animals. It smells kind of like meat but there's no actual meat in the recipe. Most animals find it edible but unappealing. However, it stays fresh forever, and a single brick of food fills you up for a long time.": "Эльфийский лепбас в виде брикета с изменённым рецептом, предназначенным для привлечения различных животных. Запах напоминает мясо, но в рецепте нет настоящего мяса. Большинство животных считают его съедобным, но непривлекательным. Однако он остаётся свежим вечно, и один брикет пищи надолго насыщает."
"Blessed by a high priest of Au-Shin, this tube of liquid glows like a light.": "Освящённый верховным жрецом Ау-Шина, этот тюбик с жидкостью светится, как свет."
"Can be studied to earn Warden XP. (Requires VIP.)": "Можно изучать для получения опыта Стража. (Требуется VIP.)"
"A rugged old bracelet-sized \"ring\" that can be fit to any sort of animal appendage necessary. It has a rune depicting a pig, snug in a blanket, with a cup of tea.": "Прочный старый браслет размером с \"кольцо\", который можно надеть на любой животный придаток. На нём руна с изображением свиньи, уютно укутанной в одеяло, с чашкой чая."
"Teaches you a warden combat technique.": "Обучает вас боевой технике стража."
"It's glass with some kind of chemicals in it.": "Это стекло с каким-то химическим веществом внутри."
"A belt for warriors that need accuracy.": "Пояс для воинов, которым нужна точность."
"Neat!": "Отлично!"
"This clear liquid has bubbles in it that never seem to pop.": "Эта прозрачная жидкость содержит пузырьки, которые, кажется, никогда не лопаются."
"A drop of sparkling gel.": "Капля искрящегося геля."
"A magical bottle that analyzes water. Use it while standing in the center of a pool of water.": "Волшебная бутылка, которая анализирует воду. Используйте её, стоя в центре водоёма."
"An edible plant with a spicy and slightly bitter flavor.": "Съедобное растение с острым и слегка горьковатым вкусом."
"A spicy salad meal.": "Острый салат."
"A sweet disk of hard candy that tastes of watermelon. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкий твердый леденец со вкусом арбуза. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить пользу от обоих.)"
"A watery soup. Edible but not at all inspiring.": "Водянистый суп. Съедобный, но совсем не вдохновляющий."
"It looks like cheese, smells like ammonia, and stings like a jellyfish.": "Похожа на сыр, пахнет аммиаком и жалит, как медуза."
"It's a stringless yo-yo.": "Это йо-йо без верёвки."
"A corrosive alchemical liquid with many household uses. It's also commonly used to clean gemstones before cutting.": "Коррозийная алхимическая жидкость с множеством бытовых применений. Также часто используется для очистки драгоценных камней перед огранкой."
"Known colloquially as \"Heckfreeze\", this concoction is consumed to cure all stacks of Lesser Hellfire.": "В просторечии известен как «Хекфриз», этот напиток употребляют для лечения всех наложенных эффектов Меньшего Адского огня."
"Known colloquially as \"Heckfreeze\", this ointment is applied topically and cures up to 10 stacks of Lesser Hellfire.": "В просторечии известная как «Хекфриз», эта мазь наносится наружно и лечит до 10 стаков Малого Адского огня."
"A thin fluid used to create augmentation oils (for level 30 effects).": "Тонкая жидкость, используемая для создания масел усиления (для эффектов уровня 30)."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade ability.": "Маленькое острое лезвие, покрытое густой чёрной слизью. Этот предмет используется в способности Отравленное лезвие."
"Recovers 6 power per second for 30 seconds.": "Восстанавливает 6 энергии в секунду в течение 30 секунд."
"A grindstone for sharpening swords and other large weapons.": "Точильный камень для заточки мечей и другого крупного оружия."
"A bar of magic-amplifying Xedrite metal. Some unknown metallurgy has been performed on it.": "Слиток магически усиливающего металла Кседрит. На нём проведена неизвестная металлургическая обработка."
"When grip precision is crucial, this paper has the perfect level of abrasiveness.": "Когда важна точность захвата, эта бумага обладает идеальным уровнем абразивности."
"Teaches you a variant version of Summon Tornado.": "Обучает вас варианту навыка Призыв Торнадо."
"Teaches you a variant version of Summon Tornado 2.": "Обучает вас варианту Призыва торнадо 2."
"Teaches you a variant version of Summon Tornado 3.": "Обучает вас изменённой версии Призыва Торнадо 3."
"Teaches you a variant version of Summon Tornado 4.": "Обучает вас варианту призыва торнадо 4."
"Teaches you a variant version of Summon Tornado 5.": "Обучает вас варианту навыка Призыв торнадо 5."
"Teaches you a variant version of Summon Tornado 6.": "Обучает вас вариантной версии Призыва торнадо 6."
"Sparks of electricity dance within the otherwise plain-looking water. There's no way that's safe, right?": "Искры электричества танцуют в воде, которая выглядит иначе как обычная. Не может быть, чтобы это было безопасно, правда?"
"Can be studied to earn Weather Witching XP. (Requires VIP.)": "Можно изучать для получения опыта в Природной Магии Погоды. (Требуется VIP.)"
"Teaches you a Weather Witching ritual that can lead to self improvement.": "Обучает ритуалу Погодного колдовства, который может привести к самосовершенствованию."
"Teaches you an ancient Weather Witching ritual that can lead to self improvement.": "Обучает древнему ритуалу Погодного колдовства, который может привести к самосовершенствованию."
"A simple horn instrument that's been enchanted to make listeners more nimble.": "Простой духовой инструмент, зачарованный так, чтобы делать слушателей более ловкими."
"This hat was stuck to a spider for years. There's so much webbing that you can't get all of it off, and it'll keep falling in your face while you try to murder things.": "Эта шляпа годами прилипала к пауку. Паутины так много, что её не снять полностью, и она будет постоянно падать вам на лицо, пока вы пытаетесь убивать врагов."
"There's a big hole in these, but a decade of spiderweb build-up kind of seals the hole. Kind of.": "В них большая дыра, но десятилетия паутины как бы запечатали эту дыру. В некотором роде."
"These boots have clearly been the birthing spot for baby spiders in the past. You can clean them off, but can you ever really get the image out of your head?": "Эти сапоги явно были местом рождения паучат в прошлом. Их можно очистить, но разве можно действительно выбросить этот образ из головы?"
"Decades of spiderwebs have made the joints hard to open and close. It's hard to make magical gestures while wearing them, but on the bright side, they're silky smooth inside.": "Десятилетия паутины сделали суставы трудноразгибаемыми. Сложно выполнять магические жесты, надевая их, но с другой стороны, внутри они шелковисто-гладкие."
"A bunch of weeds wrapped around a stick, that counts as a banner, right?": "Куча сорняков, обмотанных вокруг палки, это же считается знаменем, верно?"
"A dense stick that packs a punch.": "Плотная дубина с мощным ударом."
"A large odd egg. Edible if properly prepared.": "Большое странное яйцо. Съедобно при правильной подготовке."
"Apples, grapes, oranges and guava in sweet syrup. Who puts guava in fruit cocktail?": "Яблоки, виноград, апельсины и гуава в сладком сиропе. Кто кладёт гуава в фруктовый коктейль?"
"A tiny key made of jade.": "Крошечный ключ из нефрита."
"Welcome to Project: Gorgon!": "Добро пожаловать в Проект: Горгон!"
"Juicy and delicious. It's a little bland, but that just means its easier to pair with side-dishes.": "Сочная и вкусная. Немного пресная, но это значит, что её легче сочетать с гарнирами."
"The painting is a student effort by an untrained hand, but the frame is quite lovely.": "Картина выполнена учеником без особого мастерства, но рама очень красивая."
"Smells of sulfur and tastes of hair. Typical alchemy nonsense.": "Пахнет серой и на вкус как волосы. Типичная алхимическая ерунда."
"WARNING! This spittle is contaminated with the Lycanthropy disease. Drinking it will make you a werewolf instantly and forever! There is NO cure.": "ВНИМАНИЕ! Эта слюна заражена болезнью ликантропии. Выпив её, вы мгновенно и навсегда превратитесь в оборотня! ЛЕЧЕНИЯ НЕТ."
"Teaches you a werewolf combat technique.": "Обучает технике боя оборотня."
"Teaches you a werewolf combat technique. This version of Pouncing Rend 3 is a little more potent than the usual version.": "Обучает вас боевой технике оборотня. Эта версия Прыжкового Разрыва 3 немного мощнее обычной."
"In the right hands, anything is a good weapon. Forged to the same exacting requirements of all dwarven weapons, this tool strikes with a mighty twang.": "В умелых руках любое оружие становится хорошим. Кованный по тем же строгим стандартам, что и все гномьи оружия, этот инструмент наносит мощный звонкий удар."
"A rock for sharpening the blades of advanced tools or small blades.": "Камень для заточки лезвий продвинутых инструментов или маленьких клинков."
"A simple variety of whisky made from barley. It's drinkable and has a tolerable flavor.": "Простой сорт виски, сделанный из ячменя. Его можно пить, вкус терпимый."
"Dye used to color a piece of clothing or armor white.": "Краска, используемая для окрашивания одежды или брони в белый цвет."
"Designed to be worn at the base of a deer's tail, this brass ring is very cute.": "Предназначенное для ношения у основания хвоста оленя, это латунное кольцо очень милое."
"Teaches you how to create a tiny druidic harness for giant butterflies.": "Обучает созданию маленькой друидской уздечки для гигантских бабочек."
"A powerful flavor used by master chefs.": "Сильный аромат, используемый мастерами-кулинарами."
"This smelly gel will overclock your brain. What could go wrong?": "Этот вонючий гель ускорит работу вашего мозга. Что может пойти не так?"
"A mass of enchanted webbing from a gigantic wind spider. It can be worn as a makeshift hat by the insane.": "Куча зачарованной паутины гигантского ветрового паука. Безумцы могут носить её как импровизированную шляпу."
"A weird puff of animated air. It's odd how it doesn't disperse.": "Странный вихрь живого воздуха. Удивительно, что он не рассеивается."
"Popular with elven messengers, these elegant cloth footwraps make your feet move much faster! But they don't protect your feet very well, so you'll need significant endurance to tolerate the numerous stubbed toes and sprained ankles.": "Популярные среди эльфийских гонцов, эти изящные тканевые обмотки для ног заставляют ваши ступни двигаться гораздо быстрее! Но они плохо защищают ноги, поэтому вам понадобится значительная выносливость, чтобы терпеть многочисленные ушибы пальцев и растяжения лодыжек."
"It looks like a stick. But it's a very magical stick.": "Похоже на палку. Но это очень магическая палка."
"Designed to be clipped to a fairy's wings, these enchanted ringlets improve fae energy conductivity.": "Созданные для крепления на крылья феи, эти зачарованные колечки улучшают проводимость фейской энергии."
"Designed to be worn in the wings of a fairy, butterfly, or giant bat, these rings help protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначены для ношения на крыльях феи, бабочки или гигантской летучей мыши, эти кольца помогают защититься от болезни, возникающей при слишком близком контакте со светящимися жёлтыми кристаллами."
"Designed to be worn on the wings of magical butterflies, these rings grant the wearer access to weather witching powers.": "Предназначенные для ношения на крыльях волшебных бабочек, эти кольца даруют владельцу способности к управлению погодой."
"Designed to be clipped to a fairy's wings, these tassels exude a pheromone that makes many types of bees and wasps non-aggressive (unless attacked).": "Предназначены для крепления к крыльям феи, эти кисточки выделяют феромон, который делает многие виды пчёл и ос неагрессивными (если на них не нападают)."
"Designed to be clipped to a fairy's wings, these enchanted tassels make a fairy fly slightly faster.": "Созданные для крепления к крыльям феи, эти зачарованные кисточки позволяют фее летать немного быстрее."
"Originally popularized by the terrifying harpy mages known as the Winged Witches.": "Изначально стал популярен благодаря ужасным гарпийским магам, известным как Крылатые Ведьмы."
"Extraordinarily light armor that is very cold to the touch.": "Чрезвычайно лёгкая броня, на ощупь очень холодная."
"Although it would appear to leave the wearer completely blind, the magical helmet allows perfect visibility.": "Хотя кажется, что он полностью ослепляет носителя, этот магический шлем обеспечивает идеальную видимость."
"Made of a bizarre glowing metal, these uncomfortable boots seem to clench your feet with malice.": "Сделанные из странного светящегося металла, эти неудобные ботинки, кажется, сжимают ваши ноги с злобой."
"When you don this strange glowing metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Надев этот странный светящийся металлический костюм, вы чувствуете, как уменьшается ваше чувство эмпатии и общности. Так легче убивать без сожалений!"
"These glowing metal gloves are hard to don, but once worn, they reveal themselves to be remarkably dextrous.": "Эти светящиеся металлические перчатки трудно надеть, но как только они на руках, оказываются удивительно ловкими."
"This bizarre glowing helmet affects the mind of the wearer ever so slightly. Just a touch.": "Этот странный светящийся шлем слегка влияет на разум носителя. Всего лишь немного."
"A drop of blood that's been affected by the fae realm. Winterprize crystals are known to be sensitive to this sort of blood. Carrying it in large quantities is unwise, however, as it can corrupt the bearer. (You cannot carry more than 6 at once.)": "Капля крови, подвергшаяся воздействию царства фей. Кристаллы Зимнего приза известны своей чувствительностью к такого рода крови. Однако носить её в больших количествах неразумно, так как она может испортить носителя. (Вы не можете носить более 6 одновременно.)"
"A key cut from magical ice. It won't melt until it is used in whatever strange door it's designed for.": "Ключ, вырезанный из магического льда. Он не растает, пока не будет использован в той странной двери, для которой предназначен."
"A fairy weapon from the Winter Court. (Note: although it can bolster necromantic power, it does not contain a Necromancy Gem.)": "Волшебное оружие из Зимнего двора. (Примечание: хотя оно может усиливать некромантическую силу, оно не содержит Некромантский самоцвет.)"
"A very unconventional salad that's surprisingly energizing.": "Очень необычный салат, который удивительно бодрит."
"A heavy shield with a strange fae magic.": "Тяжёлый щит с загадочной фейской магией."
"A festive banner emblazoned with a winter snowflake.": "Праздничный флаг с изображением зимней снежинки."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +22 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +22 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A magical diamond that is flowing with fae power.": "Магический алмаз, наполненный силой фей."
"Resonance sigils give this bardic weapon a potent boom.": "Резонансные руны придают этому бардовскому оружию мощный взрыв."
"A pretty blue mushroom. Some believe the name comes from its vague resemblance to a wizard's hat, while others believe it's due to the tendency for the mushrooms to explode into freezing electricity when touched.": "Красивый синий гриб. Некоторые считают, что название связано с его отдалённым сходством с шляпой волшебника, а другие полагают, что оно связано с тем, что грибы взрываются ледяной электричеством при прикосновении."
"A small metal key you found in a cave in Kur Mountains.": "Небольшой металлический ключ, который вы нашли в пещере в горах Кур."
"Part of a dead wolf's tail.": "Часть хвоста мёртвого волка."
"The canines of a canine.": "Клыки собаки."
"Use this wolf whistle on the teleportation platform south of Serbule Keep.": "Используйте этот волчий свисток на платформе телепортации к югу от крепости Сербуль."
"An old style of blade, favored by some werewolves but not many others.": "Старый стиль клинка, любимый некоторыми оборотнями, но не многими другими."
"A purple flower with a woody, unpleasant odor. Even the scent can make one ill, and every part of the plant is toxic. It is used in Alchemy to create poisons that are especially effective against wolves and lycanthropes.": "Пурпурный цветок с древесным, неприятным запахом. Даже аромат может вызвать недомогание, а каждая часть растения ядовита. Используется в Алхимии для создания ядов, особенно эффективных против волков и ликантропов."
"A collection of unpleasant-smelling flowers. These will make you very sick.\n\nLasts 4 hours\n\nYou can only have one flower arrangement \"benefit\" at a time.": "Коллекция неприятно пахнущих цветов. Они вызовут у вас сильное недомогание.\\n\\nДействует 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"This poisonous muffin smells of wood and herbs. It can be used as a test for lycanthropy, as the muffins tend to kill werewolves, while only maiming others.": "Этот ядовитый маффин пахнет деревом и травами. Его можно использовать для проверки на ликантропию, так как маффины обычно убивают оборотней, в то время как других лишь ранят."
"The... err... \"backside\" of these sturdy leather pants doesn't seem to be part of the original design. Some previous owner has sewn in a thick leather square to ensure full body coverage.": "Э... э... «задняя часть» этих прочных кожаных штанов, похоже, не входит в оригинальный дизайн. Какой-то предыдущий владелец пришил толстый кожаный квадрат, чтобы обеспечить полное покрытие тела."
"A hand-carved figurine.": "Резная вручную фигурка."
"A simple wooden key with a faint green magical glow.": "Простой деревянный ключ с едва заметным зелёным магическим свечением."
"A beat up wooden spoon. It's taken some damage. ": "Потрёпанная деревянная ложка. Она получила некоторые повреждения. "
"A blob of dirty wool.": "Комок грязной шерсти."
"A magical scroll that lets you play a word game.": "Волшебный свиток, который позволяет играть в игру со словами."
"Learn a simple word of power.": "Изучите простое слово силы."
