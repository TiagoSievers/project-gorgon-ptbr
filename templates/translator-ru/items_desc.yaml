"A clever display of flowers that enhances your perceptions.\n\nGrants 25% chance of collecting extra fruit and related foraging items, and 5% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 25% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 5% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"A clever display of flowers that enhances your perceptions.\n\nGrants 30% chance of collecting extra fruit and related foraging items, and 15% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 30% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 15% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"A clever display of flowers that enhances your perceptions.\n\nGrants 35% chance of collecting extra fruit and related foraging items, and 20% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 35% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 20% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"A clever display of flowers that enhances your perceptions.\n\nGrants 40% chance of collecting extra fruit and related foraging items, and 25% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 10.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 40% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 25% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 10."
"A clever display of flowers that enhances your perceptions.\n\nGrants 45% chance of collecting extra fruit and related foraging items, and 30% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 20.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 45% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 30% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 20."
"A clever display of flowers that enhances your perceptions.\n\nGrants 50% chance of collecting extra fruit and related foraging items, and 35% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 30.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 50% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 35% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 30."
"A clever display of flowers that enhances your perceptions.\n\nGrants 55% chance of collecting extra fruit and related foraging items, and 40% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 40.": "Изысканная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 55% шанс собрать дополнительные фрукты и связанные с ними предметы для сбора, а также 40% шанс получить дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 40."
"Can be studied to earn Foraging XP. (Requires VIP.)": "Можно изучать для получения опыта в собирательстве. (Требуется VIP.)"
"A fancier autopsy kit for advanced pathologists. (+5 to your effective skill when autopsying a corpse.)": "Более изысканный набор для вскрытия для опытных патологоанатомов. (+5 к вашему эффективному навыку при вскрытии трупа.)"
"A fancy autopsy kit for advanced pathologists. (+3 to your effective skill when autopsying a corpse.)": "Элитный набор для вскрытий для опытных патологоанатомов. (+3 к вашему эффективному навыку при вскрытии трупа.)"
"Dye used to color a piece of clothing or armor forest green.": "Краска, используемая для окрашивания одежды или доспехов в лесной зеленый цвет."
"This is the work of an elven artisan from approximately 300 years ago. It has a slight kitsch factor, and may look good on a wall, but it has little monetary value.": "Это работа эльфийского мастера примерно 300 лет назад. В ней есть лёгкий налёт китча, и она может хорошо смотреться на стене, но имеет небольшую денежную ценность."
"A demonic crystal with an unusual structure. It doesn't work well for crafting.": "Демонический кристалл с необычной структурой. Плохо подходит для ремесла."
"An acorn found on an old treant that had been growing in mire for ages. It apparently couldn't grow in that soil, but perhaps there's similar soil elsewhere in Povus that would work?": "Желудь, найденный на старом древотопе, который веками рос в трясине. Похоже, он не мог прорасти в этой почве, но, возможно, где-то в Повусе есть похожая почва, где это получится?"
"Foxes are beloved wizard familiars because they channel tremendous Power. This little metal image of a fox does too.": "Лисы — любимые фамильяры волшебников, потому что они передают огромную Силу. Эта маленькая металлическая фигурка лисы тоже это делает."
"Transforms you into a spirit fox. Permanent until dispelled! WARNING: think before you drink!": "Превращает вас в духа лисы. Постоянно, пока не рассеется! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A wooden ring designed to be worn at the base of a fox's tail.": "Деревянное кольцо, предназначенное для ношения у основания лисьего хвоста."
"This terrifying medallion once belonged to an Ormalan man named Fredrick, the mate of Liamu the Watchful.": "Этот устрашающий медальон когда-то принадлежал ормаланцу по имени Фредрик, супругу Лиаму Стражу."
"Enchanted with cold magic, this weapon is uncomfortable to hold at first, but after a while your hand goes numb and it stops being so bothersome... as long as you don't need to use your hand in combat for anything else.": "Наложенное холодной магией, это оружие сначала неудобно держать, но через некоторое время ваша рука немеет, и оно перестаёт доставлять дискомфорт... если только вам не нужно использовать руку для чего-то ещё в бою."
"This wooden staff is icy cold to the touch.": "Этот деревянный посох ледяной на ощупь."
"A warm and pleasant ring that doesn't really seem too fearsome. Just nice.": "Тёплое и приятное кольцо, которое на самом деле не кажется слишком страшным. Просто хорошее."
"Blood from a crazed vampire thrall, said to be especially tasty. (But tastes like blood to you.)": "Кровь безумного раба вампира, считается особенно вкусной. (Но для вас она просто на вкус как кровь.)"
"A delicious treat: a banana shallow-fried in sugary butter. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусное лакомство: банан, слегка обжаренный в сахарном масле. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной штуке каждого и получить преимущества обоих.)"
"A delicious treat: a banana shallow-fried in sugary butter.": "Вкусное лакомство: банан, слегка обжаренный в сахарном масле."
"A simple greasy salty snack. Best eaten hot. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Простая жирная солёная закуска. Лучше всего есть горячей. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Mmm, battered and deep-fried. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ммм, в кляре и во фритюре. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A greasy snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жирная закуска. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A simple meal.": "Простое блюдо."
"Deep-fried and battered. All races love an occasional greasy treat!": "Обжаренная во фритюре в кляре. Все расы любят иногда побаловать себя жирным лакомством!"
"Unlike most food, this does not give a long-term regeneration effect. Fried potatoes are an instant pick-me-up any time!": "В отличие от большинства еды, это не даёт долгосрочного эффекта восстановления. Жареная картошка — мгновенный заряд бодрости в любое время!"
"Crunchy!": "Хрустящая!"
"A well-recognized hat in Spider culture. This denotes that the spider wearing it is quite friendly, and not to be feared.": "Хорошо узнаваемая шляпа в культуре пауков. Она обозначает, что паук, который её носит, довольно дружелюбен и его не стоит бояться."
"A well-recognized hat in spider culture that denotes friendliness and approachability. The hat has been enhanced with powerful magic that shrinks the spider to seem less scary.": "Хорошо известная шляпа в культуре пауков, обозначающая дружелюбие и доступность. Шляпа была усилена мощной магией, которая уменьшает паука, чтобы он казался менее страшным."
"A beautiful collection of flowers that reaffirms a friendship.\n\nThis bouquet does nothing, but it makes an excellent gift for anyone who loves flowers, nature, poetry, or art in general.": "Красивый букет цветов, который подтверждает дружбу.\\n\\nЭтот букет ни на что не влияет, но станет отличным подарком для тех, кто любит цветы, природу, поэзию или искусство в целом."
"A decent-sized frog. It's still alive, for now. It is comfortable being held and may have been someone's pet.": "Лягушка среднего размера. Пока ещё жива. Ей комфортно, когда её держат, возможно, она была чьим-то питомцем."
"Harvested from a largeish frog. A cooking ingredient that can also be used in Cheap Meat recipes.": "Собраны с крупной лягушки. Кулинарный ингредиент, который также можно использовать в рецептах дешёвого мяса."
"Used by ranalon martial artists to great effect.": "Используется мастерами боевых искусств раналонов с большим эффектом."
"A common magical ring worn by ranalon. It exudes a slimy film.": "Обычное магическое кольцо, которое носят раналоны. Оно излучает слизистую плёнку."
"An illicit and dangerous substance most often used to cheat at sports.": "Незаконное и опасное вещество, чаще всего используемое для мошенничества в спорте."
"A few drops of residue from some type of cold elemental.": "Несколько капель остатков от какого-то холодного элементаля."
"The broken-off tip of an ice wand. While it's now completely inert, it may still be a useful study aid for mages.": "Отломанный кончик ледяной палочки. Хотя теперь он полностью бездействует, он всё ещё может быть полезным учебным пособием для магов."
"Warm while worn, but freezing-cold to the touch.": "Теплые при ношении, но ледяные на ощупь."
"It's clearly magical: it feels cold to the touch. But nothing seems to happen otherwise.": "Он явно волшебный: на ощупь холодный. Но, кроме этого, ничего не происходит."
"A goblin healer's business card.": "Визитная карточка гоблинского лекаря."
"Some fairies like to freeze fruit juice in strange shapes. This one is just a boring rounded bar, but it's still fun.": "Некоторые феи любят замораживать фруктовый сок в странных формах. Этот просто скучный округлый батончик, но всё равно забавно."
"Perma-frozen grizlark from an unnaturally cold Kuvou. In this form it is inert, so you can handle it easily.": "Постоянно замороженный гризларк из ненормально холодного Кувоу. В этой форме он неактивен, поэтому с ним можно легко обращаться."
"The cork came out of this bottle of blade poison and the liquid inside froze. It doesn't look useful as a weapon anymore, although it could still make fish sick.": "Пробка выскочила из этой бутылки с ядом для клинков, и жидкость внутри замерзла. Теперь она уже не выглядит полезной в качестве оружия, хотя всё ещё может вызвать болезнь у рыбы."
"A sweet disk of hard candy. It's supposed to taste like... SOMETHING... but it's impossible to say what. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкий круглый леденец. Должен иметь вкус... ЧЕГО-ТО... но невозможно сказать чего именно. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Apples, strawberries, grapes and oranges in sweet syrup.": "Яблоки, клубника, виноград и апельсины в сладком сиропе."
"It stinks of death but has a mild, pleasant taste.": "Пахнет смертью, но имеет мягкий, приятный вкус."
"A vial of Fruitbreath Juice.": "Флакон с соком Фрутбриз."
"Made of a felled treant, this staff almost seems to squirm with resentment.": "Сделанный из поваленного древня, этот посох словно извивается от обиды."
"A delicious blended fruit drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный фруктовый напиток. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной закуске и блюду и получить бонусы от обоих.)"
"A small flask of oil. Perfect for lighting lamps! It may have other uses, too.": "Небольшая фляжка с маслом. Идеально подходит для зажигания ламп! Возможно, у него есть и другие применения."
"A petrified glass tube made when lightning strikes sand. Alchemists love these, and fletchers use them for some advanced arrows.": "Окаменевшая стеклянная трубка, образующаяся, когда молния ударяет в песок. Алхимики обожают их, а стрелки используют для создания некоторых продвинутых стрел."
"While it resembles a wooden staff, it's actually made of super-compressed, highly conductive mushrooms.": "Хотя он похож на деревянный посох, на самом деле он сделан из сверхсжатых, высокопроводящих грибов."
"A torso-shaped piece of fungal \"flesh\" from a fungus-man.": "Фрагмент грибной «плоти» в форме торса от грибочеловека."
"Carefully cut from the fungal \"flesh\" of a dead fungus-man.": "Аккуратно вырезан из грибной «плоти» мертвого грибочеловека."
"A thick layer of fungal \"skin\" peeled off of a dead fungus-man.": "Толстый слой грибной «кожи», снятый с мёртвого грибочеловека."
"The fleshy part of a fungus-man's hand, worn as a glove.": "Мясистая часть руки грибочеловека, носимая как перчатка."
"Peeled from the legs of a dead fungus-man, these form-fitting \"leggings\" are made of fungus.": "Снятые с ног мёртвого грибного человека, эти облегающие «поножи» сделаны из грибка."
"The Rakshasa martial artist handed this weapon down to a promising pupil.": "Ракшаса-воин передал это оружие многообещающему ученику."
"A yeti invention of boiled mutton in matted fur. The stench is impressive. The taste is unique, and not as bad as you'd expect.": "Йетийское изобретение — варёная баранина в свалявшейся шерсти. Запах впечатляет. Вкус уникален и не так плох, как можно было бы ожидать."
"This glass orb contains a tiny bit of the essence of fury. It can be used as a Necromancy Gem, but it should not be wielded by those lacking self-control.": "Это стеклянная сфера содержит крошечную частицу сущности ярости. Её можно использовать как Некромантский Камень, но её не следует использовать тем, кто не обладает самоконтролем."
"A powerful pick-me-up for rabbits in danger.": "Мощное средство для подзарядки кроликов в опасности."
"Teaches you how to develop a magical stasis chamber for pets.": "Обучает созданию магической камеры стазиса для питомцев."
"Teaches you how to construct a small music box that beast forms can use.": "Обучает созданию небольшой музыкальной шкатулки, которую могут использовать звероподобные формы."
"This strange beaker constantly drips sugar-water. It has an inscription: \"Keep those bees buzzin' and those birds flying high! - Galdyr\"": "Этот странный сосуд постоянно капает сахарной водой. На нём надпись: \"Пусть пчёлы жужжат, а птицы высоко летают! - Гальдыр\""
"This twee honey-flavored beverage has become a popular vice among gamblers rich and poor. It enhances the pleasure received from gambling.\n+10% Gaming XP Earned": "Этот сладкий напиток с медовым вкусом стал популярной слабостью среди азартных игроков как богатых, так и бедных. Он усиливает удовольствие от игры.\n+10% к получаемому опыту в азартных играх"
"A musty tome of poetry from the dwarven master Gammo. It has both the original Dwarven rhyming couplets and a Human translation. Perfect for the poetry lover in your life.": "Заплесневелый том стихов от гномьего мастера Гаммо. В нем есть как оригинальные гномьи рифмованные двустишия, так и человеческий перевод. Идеально для любителя поэзии в вашей жизни."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 10% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\n\nДарует 10% шанс собрать двойной урожай при садоводстве.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 17% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\n\nДарует 17% шанс собрать двойной урожай при садоводстве.\n\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 15."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 25% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\n\nДарует 25% шанс собрать двойной урожай при садоводстве.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 35."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 32% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 55.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\n\nДарует 32% шанс собрать двойной урожай при садоводстве.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 55."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 40% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 75.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\n\nДарует 40% шанс собрать двойной урожай при садоводстве.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 75."
"Can be studied to earn Gardening XP. (Requires VIP.)": "Можно изучать для получения опыта в садоводстве. (Требуется VIP.)"
"Teaches you how to make basic fertilizer.": "Обучает созданию базового удобрения."
"Teaches you a gardening technique for exploding evil pumpkins.": "Обучает технике садоводства для взрыва злых тыкв."
"Teaches you a gardening technique for using evil pumpkins as deadly weapons.": "Обучает технике садоводства по использованию злых тыкв в качестве смертоносного оружия."
"This vial of liquid contains fragments of animated plants' roots, still writhing. Chug it down and don't think about it!": "В этой бутылочке жидкости содержатся фрагменты корней оживших растений, которые всё ещё извиваются. Выпей залпом и не думай об этом!"
"It's stone, egg-shaped, and it came off of a gargoyle. Whether it's an actual embryonic gargoyle is not readily apparent.": "Это каменное, яйцевидное и оторвалось от гаргульи. Является ли оно настоящим эмбрионом гаргульи, не сразу понятно."
"A dark red stone, known for its curative properties.\n\nAssociated Primary Skill: Druid\n\nAssociated Secondary Skill: First Aid": "Темно-красный камень, известный своими целебными свойствами.\n\nСвязанный основной навык: Друид\n\nСвязанный вторичный навык: Первая помощь"
"It's a broken necklace.": "Это сломанное ожерелье."
"A tasteful silver-and-pyrite chain with an opal pendant.": "Изысканная цепочка из серебра и пирита с опаловым кулоном."
"A metal ring with a beautifully-cut vervadium centerpiece. It glows a soft purple.": "Металлическое кольцо с красиво ограненным сердцевинным камнем из вервадиума. Оно светится мягким фиолетовым светом."
"An elegant, but simple, medallion on a chain.": "Элегантный, но простой медальон на цепочке."
"This piece of costume jewelry is so ugly that monsters tend to hate you just for wearing it.": "Это украшение для костюма настолько уродливо, что монстры начинают ненавидеть вас только за то, что вы его носите."
"Oddly warm to the touch, even in cold weather, these makeshift Summer Court gloves protect from frostbite.": "Странно тёплые на ощупь, даже в холодную погоду, эти самодельные перчатки Летнего Двора защищают от обморожения."
"These freezing-cold gloves are hard to don, but once worn, they reveal themselves to be remarkably dextrous.": "Эти ледяные перчатки трудно надеть, но как только они на руках, проявляют удивительную ловкость."
"A Gazluk officer's key to one of the armory storage chests.": "Ключ офицера Газлука от одного из сундуков с оружейными запасами."
"Collects some information about a large supply of metal on the Gazluk Plateau.": "Собирает информацию о большом запасе металла на плато Газлук."
"This gold-tinted armor is worn by the highest battlefield officers in Gazluk City's army. It is versatile and strong, like its wearer.": "Эта броня с золотистым оттенком носится высшими офицерами армии города Газлук. Она универсальна и прочна, как и её владелец."
"A heavy ring given to Gazluk Keep officers.": "Тяжёлое кольцо, вручаемое офицерам крепости Газлук."
"A very heavy shield.": "Очень тяжёлый щит."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Mutterer Cabalist armor.": "Обучает боевой технике, которую можно использовать, когда на вас надеты четыре или более предметов брони Бормотящего Кабалиста."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Death Trooper armor.": "Обучает боевой технике, которую можно использовать, когда на вас надеты четыре или более предметов брони Смертного Солдата Газлука."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Officer armor.": "Обучает боевой технике, которую можно использовать, когда на вас надето четыре или более предметов брони офицера Газлука."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Misery Trooper armor.": "Обучает боевой технике, которую можно использовать, когда на вас надето четыре или более предметов брони Солдата Страданий Газлука."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Mutterer Necromancer armor.": "Обучает боевой технике, которую можно использовать, когда на вас надеты четыре или более предметов брони Бормотун Некроманта."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk Treachery Trooper armor.": "Обучает боевой технике, которую можно использовать, когда на вас надеты четыре или более предметов брони Солдата Предательства Газлука."
"Teaches you a combat technique that can be used when you are wearing four or more pieces of Gazluk War Wizard armor.": "Обучает боевой технике, которую можно использовать, когда на вас надеты четыре или более предметов брони боевого мага Газлука."
"A clamp and a delicate hammer for turning gems into powder.": "Зажим и тонкий молоток для превращения самоцветов в порошок."
"It looks like it fits a heavy stone box.": "Похоже, он подходит к тяжёлому каменному сундуку."
"An ocarina made of horn. This instrument is especially easy to learn.": "Окарина из рога. Этот инструмент особенно легко освоить."
"A snippet of a family tree. Probably valuable to somebody... but not to most.": "Отрывок семейного древа. Вероятно, ценен для кого-то... но не для большинства."
"These once-amazing pants aren't amazing anymore. They're torn and mangled. But there's still some armor on them... could be worse! A hand-sewn tag inside says \"To General Lawyr, may you remember me always, your Kello.\"": "Эти когда-то потрясающие штаны больше не выглядят так. Они порваны и изодраны. Но на них всё ещё есть немного брони... могло быть и хуже! Внутри вручную пришита бирка с надписью «Генералу Лоэру, пусть ты всегда помнишь меня, твой Келло.»"
"The general seems to have customized this Scorpiclaw suit to his own strange needs: there's a hidden compartment inside.": "Похоже, генерал адаптировал этот костюм Скорпиклэу под свои странные нужды: внутри есть скрытый отсек."
"The customized scorpiclaw boots of the dread Onkara general. They fit a little better than normal.": "Индивидуальные сапоги с клешнями скорпиона страшного генерала Онкары. Они сидят немного лучше обычных."
"These scorpiclaw gauntlets were personally adjusted by the revered general. They are denser and yet more agile than one would expect.": "Эти перчатки с клешнями скорпиона были лично подогнаны уважаемым генералом. Они плотнее и в то же время более ловкие, чем можно было ожидать."
"The Onkara leader claimed to wear this mask even when resting, often saying that a true warrior could never be unprepared.": "Лидер Онкары утверждал, что носит эту маску даже во время отдыха, часто говоря, что настоящий воин никогда не может быть неготов."
"The terrifying Onkara lord wore these pants all the time. Like, nonstop. But they don't smell. Eerie.": "Ужасающий лорд Онкара носил эти штаны всё время. Прямо без перерыва. Но они не пахнут. Жутко."
"A popular Statehelm hedge ointment for curing hangovers, which it does a terrible job at. But it does help other sorts of headaches.": "Популярная мазь из Стейтхелма для лечения похмелья, с чем она справляется очень плохо. Но она действительно помогает при других видах головной боли."
"Used by desperate soldiers who want some sort of protection against the demons they're forced to fight. It fortifies the body at the cost of agility.": "Используется отчаявшимися солдатами, которые хотят хоть какую-то защиту от демонов, с которыми им приходится сражаться. Укрепляет тело ценой ловкости."
"It stinks of outdoorsmen and fish.": "Пахнет охотниками и рыбой."
"A chisel with a magical tip designed to chip away magical crystal.": "Долото с магическим наконечником, предназначенное для обтесывания магического кристалла."
"Someone has meticulously drawn a geometric pattern on this scroll. It's unnaturally warm to the touch.": "Кто-то тщательно нарисовал геометрический узор на этом свитке. Он необычайно тёплый на ощупь."
"Warm and squishy.": "Тёплый и мягкий."
"A translucent handkerchief from a ghost. It should have turned into ectoplasm when separated from the ghost, but somehow it hasn't. Eerie.": "Полупрозрачный платок от призрака. Он должен был превратиться в эктоплазму при отделении от призрака, но почему-то этого не произошло. Жутко."
"It looks like a key, but it's made of semi-solid ectolasm. It couldn't possibly unlock anything; it's too mushy!": "Похоже на ключ, но сделан из полутвёрдого эктолазма. Он не может ничего открыть; он слишком мягкий!"
"A ghostly document. It hasn't quite reverted to ectoplasm yet. Unfortunately it's completely illegible.": "Призрачный документ. Он ещё не полностью превратился в эктоплазму. К сожалению, он совершенно нечитаем."
"A mushroom that grows in high-ectoplasmic areas.": "Гриб, который растёт в областях с высоким уровнем эктоплазмы."
"Eh, you've tasted worse.": "Эх, ты пробовал и похуже."
"Can be studied to earn Giant Bat XP. (Requires VIP.)": "Можно изучать для получения XP по гигантским летучим мышам. (Требуется VIP.)"
"Made by ranalon to feed their pet frogs during low-insect times. They can also be eaten by ranalon in an emergency.": "Создана раналоном для кормления их домашних лягушек в периоды нехватки насекомых. Также может быть съедена раналоном в экстренной ситуации."
"A saliva-covered ball of hair. The hair is unusual and perhaps valuable... it may have uses to alchemists.": "Комок волос, покрытый слюной. Волосы необычные и, возможно, ценные... они могут пригодиться алхимикам."
"The wing of a giant bee or wasp.": "Крыло гигантской пчелы или осы."
"You would not believe how big this praying mantis was. Well, YOU might.": "Вы бы не поверили, насколько велика была эта богомолка. Ну, ВЫ, возможно, поверите."
"A chunk of a weird giant mushroom. It reeks of death, and you're pretty sure it has no practical use.": "Кусок странного гигантского гриба. От него пахнет смертью, и ты почти уверен, что он не имеет практического применения."
"The preserved skull of a giant.": "Сохранённый череп гиганта."
"Although still pretty, this shell took serious damage and is no longer structurally sound.": "Хотя раковина всё ещё красивая, она получила серьёзные повреждения и больше не является прочной."
"It looks stick-like, but it's incredibly strong.": "Выглядит как палка, но невероятно крепкая."
"Crafted by an ancient necromantic ritual and then blessed by Norala, this ugly ring smells of blood.": "Созданное древним некромантским ритуалом и затем благословленное Норалой, это уродливое кольцо пахнет кровью."
"It tastes like pureed salad. And since you use it by applying it to your skin, you too will smell like pureed salad.": "На вкус как пюре из салата. И поскольку вы наносите её на кожу, вы тоже будете пахнуть как пюре из салата."
"A fae fruit that can make any piece of equipment look like an entirely different piece of equipment when worn. Just crush it up to absorb its power.\n\n<i>[When you use this berry you'll receive one Glamour, and automatically learn the recipe to use Glamours if you don't already know how.]</i>": "Фейский фрукт, который может заставить любое снаряжение выглядеть как совершенно другое, когда его надевают. Просто разомните его, чтобы впитать его силу.\\n\\n<i>[При использовании этой ягоды вы получите один Гламур и автоматически изучите рецепт использования Гламуров, если ещё не знаете его.]</i>"
"A fae fruit that can make any piece of equipment look like an entirely different piece of equipment when worn. Just smash it open to absorb its power.\n\n<i>[When you use this gourd you'll receive one Glamour, and automatically learn the recipe to use Glamours if you don't already know how.]</i>": "Фейский фрукт, который может заставить любое снаряжение выглядеть как совершенно другое, когда его надевают. Просто раздавите его, чтобы впитать его силу.\\n\\n<i>[При использовании этой тыквы вы получите один Гламур и автоматически выучите рецепт использования Гламуров, если ещё не знаете его.]</i>"
"This import from the Crone Hegemony doesn't do anything directly -- although the eye in the amulet does follow you around and glare. It is primarily used as a base magic source by magical jewelrycrafters.": "Этот импорт из Гегемонии Старухи не имеет прямого эффекта — хотя глаз на амулете действительно следит за вами и сверлит взглядом. В основном он используется как базовый источник магии для ремесленников магических украшений."
"Someone has carved a fist weapon out of glasstone, a rock known for its supernatural lightness. The glasstone market is in shambles now that glasstone jewelry has fallen out of fashion among humans, so new uses are becoming affordable.": "Кто-то вырезал оружие в виде кулака из стеклока — камня, известного своей сверхъестественной лёгкостью. Рынок стеклока сейчас в упадке, так как украшения из стеклока вышли из моды среди людей, поэтому новые применения становятся доступными."
"Baked beets in a succulent, simple glaze.": "Запечённая свекла в сочной, простой глазури."
"A  mild semi-hard cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Мягкий полутвердый сыр.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A strange magical cube. It can be used to give hand armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить бонусную магическую способность к рукам. Посетите торговца снаряжением (или игрока-улучшателя), чтобы установить его."
"Designed by a spiteful necromancer bent on conquering a city, these cloth gloves seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Созданные злобным некромантом, стремящимся завоевать город, эти тканевые перчатки кипят ненавистью. И оказывается, что чистая ненависть довольно теплая, обеспечивая легкую защиту от холода."
"A large pretty piece of pulsing crystal. It's pleasantly warm to the touch.": "Большой красивый кусок пульсирующего кристалла. На ощупь приятно тёплый."
"Two ordinary Council Screeds glued together by a prankster.": "Две обычные гильзы Совета, склеенные вместе шутником."
"An animal has left these bones behind after eating a meal.": "Животное оставило эти кости после еды."
"A delicious vegetarian goblin dish of corn, red pepper, and spices.": "Вкусное вегетарианское блюдо гоблина из кукурузы, красного перца и специй."
"The beak of a very large turkey.": "Клюв очень большой индейки."
"The key to a goblin hoard chest, typically one of several keys needed to unlock it.": "Ключ от сундука с гоблиньим кладом, обычно один из нескольких ключей, необходимых для его открытия."
"A small valuable item encased in protective goop. The goblin technique for removing the stuff requires special equipment. Perhaps there's another means to open it.": "Небольшой ценный предмет, заключённый в защитную слизь. Техника гоблинов для удаления этой субстанции требует специального оборудования. Возможно, есть другой способ открыть её."
"This lovely goblet is teeming with history and you should probably treasure it forever.": "Этот прекрасный кубок наполнен историей, и тебе, вероятно, стоит хранить его вечно."
"A hoppy beer with hints of spice.": "Хмельное пиво с нотками пряностей."
"This coat is a tight squeeze for larger races. It smells faintly of urine, and no amount of cleaning seems to fix it.": "Эта куртка тесновата для крупных рас. Она слегка пахнет мочой, и никакая чистка, похоже, не помогает."
"Strong enough for a Human, but made for a Goblin. By slaves who toil in very poor working conditions.": "Достаточно прочный для человека, но сделан для гоблина. Создан рабами, работающими в очень плохих условиях."
"Iconic goblin headwear.": "Знаковый головной убор гоблина."
"This simple fist weapon was fitted for a goblin's hand, but you can make it work. (Cestuses count as an empty hand for purposes of Unarmed attacks.)": "Это простое кулачное оружие было сделано для руки гоблина, но вы можете использовать его. (Кестусы считаются пустой рукой для целей безоружных атак.)"
"This is good armor, but rather uncomfortable if you have chest hair... lots of pinching.": "Это хорошая броня, но довольно неудобная, если у вас есть грудные волосы... много защемлений."
"The perfect hat for goblin chiefs: it has protection from loud noise, a secret compartment to stash your bribe money, and extra weight to make your headbutts really impressive.": "Идеальная шапка для вождей гоблинов: защищает от громких звуков, имеет секретный отсек для взяток и дополнительный вес, чтобы твои удары головой были особенно впечатляющими."
"This martial artist's glove is adorned with small sharpened metal protrusions. It smells like soup.": "Перчатка этого боевого мастера украшена маленькими заострёнными металлическими шипами. От неё пахнет супом."
"Goblin-made, with a focus on sharpness over all else.": "Сделан гоблинами, с упором на остроту превыше всего."
"Protects your hands so well that you can even punch harder than before.": "Защищают ваши руки так хорошо, что вы даже можете бить сильнее, чем раньше."
"Thick smelly gloves that have been through a few fights": "Толстые вонючие перчатки, побывавшие в нескольких боях"
"The finest in slave-made head protection.": "Лучшее защитное снаряжение, сделанное рабами."
"A protective garment that also keeps you light on your feet. The goblin smell, unfortunately, doesn't wash out.": "Защитная одежда, которая также помогает оставаться лёгким на ногах. К сожалению, запах гоблина не отстирывается."
"Strong pants made of leather. You don't want to think about what creature the leather may have come from.": "Прочные штаны из кожи. Лучше не думать, от какого существа могла быть эта кожа."
"This is a favorite of goblin healers, who use it as a surgical tool more often than as a weapon. A universal holy symbol attunes it to priests of Saledar, Arisetsu, or Kirad.": "Это любимое орудие гоблинских целителей, которые чаще используют его как хирургический инструмент, чем как оружие. Универсальный святой символ настраивает его на священников Саледара, Арисэцу или Кирада."
"Made for goblins by craftsman slaves. It seems fairly old, and has a nice sound quality.": "Сделана для гоблинов рабами-ремесленниками. Кажется довольно старой и обладает приятным звучанием."
"Used by goblin necromancers. A necromancy gem has been embedded in a case made of bone shards.": "Используется гоблинскими некромантами. Некромантский самоцвет вставлен в оправу из костяных осколков."
"Dye used to color a piece of clothing or armor goblin orange.": "Краска, используемая для окрашивания одежды или брони в гоблинский оранжевый цвет."
"Some writing in goblin. It looks like instructions or directions, maybe?": "Какое-то письмо на языке гоблинов. Похоже на инструкции или указания, может быть?"
"This is clearly the work of a skilled goblin artisan. Made in the recent Three Hierarchies goblin style, it is probably very new.": "Это явно работа умелого гоблинского мастера. Выполнена в недавнем стиле гоблинов Трёх Иерархий, вероятно, очень новая."
"Full of meat, corn, and potatoes. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Полны мяса, кукурузы и картофеля. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A thin scroll of goblin verse, focusing on the beauty of hard work, the wonders of nature, and the fairness of slavery. It has little value.": "Тонкий свиток гоблинских стихов, посвящённых красоте тяжёлого труда, чудесам природы и справедливости рабства. Имеет небольшую ценность."
"A pretty mushroom that's quite toxic unless it's specially prepared.": "Красивый гриб, который довольно токсичен, если его специально не приготовить."
"Etchings in the Goblin language roughly translate to \"I Bash Really Well\". It sounds better in the native tongue.": "Гравировки на языке гоблинов примерно переводятся как «Я Очень Хорошо Бью». На родном языке звучит лучше."
"Etchings in the Goblin language roughly translate to \"I Don't Care About Your Feelings\". It sounds better in the native tongue.": "Гравировки на языке гоблинов примерно переводятся как «Мне наплевать на твои чувства». На родном языке звучит лучше."
"The preserved skull of a goblin.": "Сохранённый череп гоблина."
"These were worn by a dainty goblin.": "Эти туфельки носил изящный гоблин."
"Very sturdy, but with a hollow core that gives it a strange heft when swung.": "Очень прочный, но с полым сердечником, из-за которого при взмахе он кажется необычно тяжёлым."
"Made with whatever meat is available and seasoned within an inch of its life. Most races find the smell pleasant, but the taste much too salty. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приготовлено из любого доступного мяса и приправлено до предела. Большинству рас запах кажется приятным, но вкус слишком солёным. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"These were worn by a tough goblin.": "Их носил крепкий гоблин."
"Crusty goblin bread that stays edible and nutritious for months, though it should be noted that it never tastes good, even when fresh.": "Хрустящий гоблинский хлеб, который остаётся съедобным и питательным в течение нескольких месяцев, хотя стоит отметить, что он никогда не бывает вкусным, даже когда свежий."
"Forged by the most skilled goblin weaponsmiths in the tri-county area.": "Кованный самыми искусными гоблинскими оружейниками в районе трёх округов."
"Crafted by goblin slaves under the watchful eye of Gyrumpa, the legendary bowyer. He hated fun, and made sure his bows were especially taxing to use.": "Создан рабами-гоблинами под пристальным наблюдением Гирумпы, легендарного мастера луков. Он ненавидел веселье и делал свои луки особенно трудными в обращении."
"An Elven bow that's been enhanced with Goblin magic.": "Эльфийский лук, усиленный гоблинской магией."
"Dye used to color a piece of clothing or armor gold.": "Краска, используемая для окрашивания одежды или доспехов в золотой цвет."
"A tiny bit of unrefined ore. You'd need a bunch of these to make anything useful from them.": "Крошечный кусочек необработанной руды. Чтобы сделать что-то полезное, понадобится целая куча таких."
"A chunk of ore that could be used to make gold equipment and jewelry. It is also used in formulas that augment jewelry.": "Кусок руды, который можно использовать для создания золотого снаряжения и украшений. Также используется в рецептах для улучшения украшений."
"At first glance it seems to be an acorn dipped in gold, but it's actually an acorn carved from solid gold. Pretty.": "На первый взгляд кажется, что это желудь, покрытый золотом, но на самом деле это желудь, вырезанный из цельного золота. Красиво."
"This writ is redeemable for 25 points and 250,000 councils during the Writ Challenge event. Use this writ to get a special quest, then see the Writ Master located near the Serbule well to collect your prize.": "Это распоряжение можно обменять на 25 очков и 250 000 советов во время события Испытание распоряжений. Используйте это распоряжение, чтобы получить специальное задание, затем обратитесь к Мастеру распоряжений, который находится рядом с колодцем Сербуля, чтобы получить награду."
"A small lump of gold with arrows carved into it. It seems to be a pawn for some sort of game.": "Небольшой кусочек золота с вырезанными стрелами. Похоже, это фигура для какой-то игры."
"Dye used to color a piece of clothing or armor goldenrod.": "Краска, используемая для окрашивания одежды или доспехов в цвет золотарника."
"A lump of clay from a deceased golem. This clay was purified and enchanted years ago, but doesn't seem to have any magic in it now.": "Комок глины от погибшего голема. Эта глина была очищена и зачарована много лет назад, но сейчас, похоже, в ней нет никакой магии."
"A piece of arm machinery from a large ancient golem.": "Часть механизма руки большого древнего голема."
"A thick dwarven helm. Etched inside is a quote: \"Where shall it be? Point me and I shall go. - Gondeem\"": "Толстый гномий шлем. Внутри выгравирована цитата: «Где это будет? Укажи мне, и я пойду. — Гондим»"
"For repairing serious armor damage. Used by Armor Patching abilities.": "Для ремонта серьёзных повреждений брони. Используется способностями ремонта брони."
"A more complex kind of bait that can be used with angling.": "Более сложный вид приманки, который можно использовать с рыбалкой."
"For healing serious injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения серьёзных травм. Животные могут использовать эти бомбы с помощью умения Бомба первой помощи."
"For healing serious injuries. Used by First Aid 3 (and other abilities).": "Для лечения серьёзных травм. Используется навыком Первая помощь 3 (и другими способностями)."
"Used in smithing recipes.": "Используется в рецептах кузнечного дела."
"A quality skinning knife for experienced skinners. (+4 to your effective skill when skinning.)": "Качественный нож для снятия шкур для опытных охотников. (+4 к вашему эффективному навыку при снятии шкур.)"
"A well-balanced knife designed for throwing. (Used with the Knife combat skill.)": "Хорошо сбалансированный нож, предназначенный для метания. (Используется с боевым навыком Метание ножей.)"
"A quality whittling knife for experienced whittlers.": "Качественный нож для резьбы для опытных резчиков."
"A blue cheese with a nice taste but the very strong smell of stinky feet.\n\nCheese Type: Blue": "Голубой сыр с приятным вкусом, но очень сильным запахом вонючих ног.\n\nТип сыра: голубой"
"A clear variety of beryl. It is not particularly powerful in magic, but it can be used as a sort of energy dampener.\n\nWhen used in Augment Extraction, Goshenite can extract powers that have no specific skill association.": "Прозрачный вид берилла. Он не обладает особой магической силой, но может использоваться как своего рода гаситель энергии.\\n\\nПри использовании в Извлечении Усилений Гошенит может извлекать силы, не связанные с конкретным навыком."
"A nutty, and quite hard, cheese.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ореховый и довольно твердый сыр.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"This goblin-made weapon uses a manticore tail as a powerful injector. It's not a very good sword, but it's a great poisoning tool.": "Это оружие, сделанное гоблинами, использует хвост мантикоры в качестве мощного инжектора. Это не очень хороший меч, но отличный инструмент для отравления."
"It's a scribbled series of images and ratios. You can kind of understand it: it's a recipe of some sort.": "Это каракули из изображений и пропорций. Вроде можно понять: это своего рода рецепт."
"Powdered soap. Used with a bucket of water to remove graffiti.": "Мыльный порошок. Используется с ведром воды для удаления граффити."
"A pile of flaked granamurch mushrooms. ": "Куча хлопьев из грибов гранaмурч."
"A thick, fairly toxic mushroom that can be made edible through care.": "Плотный, довольно токсичный гриб, который можно сделать съедобным с должным уходом."
"A hefty ring engraved with symbols that are probably related to the god Au-Shin.": "Массивное кольцо с выгравированными символами, вероятно связанными с богом Ау-Шином."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on chest armor.": "Часть магического остатка, используемая для создания улучшений 91-120 уровня, которые надеваются на нагрудную броню."
"Crafted by expert Winter Court ice mages for use in the eternal struggle of the seasons. (Although it's made of incredibly strong ice, it's not suitable for use as a melee weapon.)": "Создана искусными ледяными магами Зимнего Двора для использования в вечной борьбе времён года. (Хотя она сделана из невероятно прочного льда, для ближнего боя не подходит.)"
"A bit of magical runoff used in the creation of level 91-120 Augments that go on gloves.": "Частица магического остатка, используемая при создании улучшений 91-120 уровня для перчаток."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on helmets.": "Немного магического остатка, используемого при создании улучшений 91-120 уровня для шлемов."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on leg armor.": "Часть магического остатка, используемая при создании улучшений 91-120 уровня для ножной брони."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on main-hand weapons.": "Частица магического остатка, используемая при создании улучшений уровней 91-120 для оружия в основной руке."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on necklaces.": "Немного магического остатка, используемого при создании усилений 91-120 уровней, которые надеваются на ожерелья."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on off-hand equipment.": "Частица магического остатка, используемая для создания улучшений 91-120 уровня, устанавливаемых на снаряжение для дополнительной руки."
"A large crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Большая кристаллическая призма. Трансмутаторы используют её для направления флогистона в предмет или из него."
"A gaudy golden ring with a purple enchantment aura.": "Безвкусное золотое кольцо с пурпурной аурой заклинания."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on rings.": "Немного магического остатка, используемого для создания улучшений 91-120 уровня, которые надеваются на кольца."
"A bit of magical runoff used in the creation of level 91-120 Augments that go on boots.": "Немного магического остатка, используемого при создании улучшений 91-120 уровней, которые надеваются на ботинки."
"Only true connoisseurs realize that this sublimely delicious candy cane far exceeds its mint-addled cousins.": "Только настоящие гурманы понимают, что эта изысканно вкусная леденцовая трость намного превосходит своих мятных сородичей."
"Fresh and sugary! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Свежий и сладкий! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A vaguely grape-flavored disk of candy on a small stick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Слабо выраженный виноградный вкус в виде диска конфеты на маленькой палочке. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Shaved ice flavored with grapes. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом винограда. Это угощение следует съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Amazing candy that can only be truly appreciated by expert gourmands. Comes in a bit of wax paper to prevent outside odors from diluting its flavor bouquet. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Удивительная конфета, которую по-настоящему оценят только опытные гурманы. Упакована в небольшой вощеный бумажный лист, чтобы посторонние запахи не разбавляли её ароматный букет. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A raw fish. So-called because of its vaguely bluish skin, the grapefish is actually fairly bland.": "Сырая рыба. Получила название из-за слегка голубоватой кожи, грейпфиш на самом деле довольно пресная."
"Raw grapefish on a ball of delicious rice.": "Сырой грейпфиш на шарике вкусного риса."
"A simple grapefish steak.": "Простой стейк из грейпфиша."
"Raw grapefish wrapped in seaweed, on a ball of delicious rice.": "Сырой грейпфиш, завернутый в морские водоросли, на шарике вкусного риса."
"A very hearty breakfast!": "Очень сытный завтрак!"
"A big bunch of purple grapes.": "Большая гроздь фиолетового винограда."
"A blue cheese with a bland taste and smell.\n\nCheese Type: Blue": "Голубой сыр с пресным вкусом и запахом.\n\nТип сыра: голубой"
"A small bundle of grass. Useful for taming and feeding most types of ungulates.": "Небольшой пучок травы. Полезен для приручения и кормления большинства видов копытных."
"A sack of millet from a strange plant.": "Мешок пшена с необычного растения."
"A metal key from Gravamux, a ghoul.": "Металлический ключ от Гравамукса, вурдалака."
"It's surprisingly heavy! It smells toxic.": "На удивление тяжёлое! Пахнет ядовито."
"Dye used to color a piece of clothing or armor gray.": "Краска, используемая для окрашивания одежды или брони в серый цвет."
"The goblin-trained bear Graz was outfitted with these after he killed one too many overzealous goblin mages. (Only animals can wear these.)": "Медведь, обученный гоблином Граз, был надет в эти оковы после того, как он убил слишком много чрезмерно рьяных гоблинских магов. (Носить их могут только животные.)"
"Thick-sliced slab bacon from the most savory pork shoulder. Unlike most food, this does not give a long-term regeneration effect. Great Bacon is an instant pick-me-up any time!": "Толстый ломтик бекона из самого сочного свиного окорока. В отличие от большинства еды, не даёт длительного эффекта регенерации. Великий бекон — мгновенный заряд бодрости в любое время!"
"An almost-malignant odor that sends your body into a ferocious snarl.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Почти зловонный запах, заставляющий ваше тело издавать свирепый рык.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x9.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 9 раз."
"These chain boots are both protective and comfortable.": "Эти кольчужные сапоги одновременно защитные и удобные."
"Comfortable. Not exactly fashionable, but not ugly either.": "Удобное. Не совсем модное, но и не уродливое."
"A bit weighty due to the sheer amount of protection, but you barely notice thanks to the weighting.": "Немного тяжеловат из-за большого количества защиты, но вы едва замечаете это благодаря распределению веса."
"Cleverly weighted chain gloves that feel almost as comfortable as leather.": "Искусно утяжелённые кольчужные перчатки, которые ощущаются почти так же комфортно, как кожаные."
"Surprisingly light for chainmail, these pants are very comfortable except for the swishing sound they make, and the lack of pockets.": "Удивительно лёгкие для кольчуги, эти штаны очень удобны, за исключением шуршащего звука и отсутствия карманов."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +24 for 30 minutes.": "Удобное кресло. Отдых в нём увеличивает восстановление брони на +24 на 30 минут."
"A strong staff with a chemistry system on the end.": "Мощный посох с химической системой на конце."
"Tender chicken atop a fluffy mound of steamed orcish couscous, accompanied by the sweet crunch of carrots.": "Нежная курица на пушистой горке парового орочьего кускуса, сопровождаемая сладкой хрусткостью моркови."
"As simple as clubs are, it's still surprisingly easy to screw them up. This one isn't screwed up!": "Хотя дубины и просты, их всё равно удивительно легко испортить. Эта — не испорчена!"
"The creator of this staff obviously had a lot of experience in making these. Largely metal-clad, but just the right amount of give from the wood. The Fire Magic Runes were burned in, and glow with comforting warmth when used.": "Создатель этого посоха явно имел большой опыт в их изготовлении. В основном покрыт металлом, но с достаточной гибкостью от древесины. Руны Огненной магии выжжены и светятся успокаивающим теплом при использовании."
"Great! Just great. For cows.": "Отлично! Просто отлично. Для коров."
"Great! Just great. For deers.": "Отлично! Просто отлично. Для оленей."
"Elegant platemail boots.": "Элегантные латные сапоги."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Eltibule region.": "Очень подробное объяснение того, как найти легендарное сокровище, зарытое в регионе Элтибул."
"A very thorough explanation of how to find a large amount of treasure buried in the Eltibule region.": "Очень подробное объяснение того, как найти большое количество сокровищ, зарытых в регионе Эльтибул."
"A very thorough explanation of how to find a small amount of treasure buried in the Eltibule region.": "Очень подробное объяснение того, как найти небольшое количество сокровищ, зарытых в регионе Элтибул."
"A very thorough explanation of how to find a huge hoard of treasure buried in the Eltibule region.": "Очень подробное объяснение того, как найти огромный клад, зарытый в регионе Элтибуле."
"Great stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Отличная вещь! Это те самые сапоги уклонения, которые можно увидеть в витрине магазина, если бы существовал магазин, специализирующийся именно на сапогах уклонения, а его нет."
"The elven lily provides a base scent for this candle, and the bitter-cold winterhue flower accentuates it.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Эльфийская лилия задает основной аромат этой свечи, а цветок зимней стужи с горьковатым оттенком его подчеркивает.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"The metal is always freezing cold, but you'll soon become numb to such trivial irritations.": "Металл всегда ледяной на ощупь, но вскоре вы привыкнете к таким незначительным раздражениям."
"A belt covered in terrible spikes that face inward, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс, покрытый ужасными шипами, направленными внутрь, причиняющими носителю сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут найти, что эта боль усиливает их чувство выживания."
"This bizarre helmet affects the mind of the wearer ever so slightly. Just a touch.": "Этот странный шлем слегка влияет на разум носителя. Всего лишь немного."
"Great horseshoes. Overkill for draft animals, but preferred for travel.": "Большие подковы. Слишком мощные для тягловых животных, но предпочтительны для путешествий."
"An elven-style hunting bow.": "Охотничий лук в эльфийском стиле."
"A very thorough explanation of how to find a legendary hoard of treasure buried in the Ilmari Desert.": "Очень подробное объяснение того, как найти легендарное сокровище, зарытое в пустыне Илмари."
"A very thorough explanation of how to find a large amount of treasure buried in the Ilmari Desert.": "Очень подробное объяснение, как найти большое количество сокровищ, зарытых в пустыне Илмари."
"A very thorough explanation of how to find a small amount of treasure buried in the Ilmari Desert.": "Очень подробное объяснение того, как найти небольшое количество сокровищ, зарытых в пустыне Илмари."
"A very thorough explanation of how to find a huge hoard of treasure buried in the Ilmari Desert.": "Очень подробное объяснение того, как найти огромную кладовую сокровищ, зарытую в пустыне Илмари."
"These are so soft to touch that you almost feel criminal wearing them out into the mud and gore.": "Они настолько мягкие на ощупь, что носить их в грязи и крови кажется почти преступлением."
"Pleasant to wear and reasonably protective.": "Приятные в носке и достаточно защитные."
"A helmet that's stylish and also functional! Great.": "Шлем, который стильный и при этом функциональный! Отлично."
"Astonishingly, these leather pants don't chafe! This is some high-grade magic right here. Or just great tailoring.": "Удивительно, но эти кожаные штаны не натирают! Это настоящая высококлассная магия. Или просто великолепный крой."
"Leather so soft, so comfortable, it feels nice just to touch it.": "Кожа такая мягкая, такая удобная, что приятно просто прикоснуться к ней."
"A soft leather vest with thick reinforced sleeves. Who knew wearing ten pounds of leather could be this not-horrible?": "Мягкий кожаный жилет с толстыми усиленными рукавами. Кто бы мог подумать, что носить десять фунтов кожи может быть не так уж плохо?"
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x9.": "Одноразовый табурет для медитации. Используйте его рядом с Медитативным столбом, чтобы увеличить длительность эффектов медитации в 9 раз."
"The creator of this staff obviously had a lot of experience in making these. Largely metal-clad, but just the right amount of give from the wood. (This staff will work well for Staff Fighting, but lacks the runes necessary to work for Fire Magic.)": "Создатель этого посоха явно имел большой опыт в их изготовлении. В основном покрыт металлом, но с достаточной упругостью от дерева. (Этот посох хорошо подходит для боя посохом, но не содержит рун, необходимых для Огненной магии.)"
"An esoteric glass bauble that floats around the head. It supposedly boosts psychic power.": "Эзотерический стеклянный шарик, плавающий вокруг головы. Предположительно усиливает психическую силу."
"High-quality sheep meat.": "Мясо овцы высокого качества."
"Gem-encrusted and clearly magical.": "Усыпана драгоценными камнями и явно магическая."
"A well-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Хорошо сделанная горная кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду, нанося удары колющим движением вместо размаха. Инновационно."
"A clever belt with lots of compartments for storing stuff.": "Умный пояс с множеством отделений для хранения вещей."
"A chunk of raw boar meat from an impressive animal.": "Кусок сырого мяса кабана от впечатляющего животного."
"An excellent and versatile staff. All eight Suns of Arisetsu are etched into this staff, hidden amongst the arcane runes.": "Отличный и универсальный посох. Все восемь Солнц Арисецу выгравированы на этом посохе, скрытые среди арканных рун."
"An exceptional piece of meat from a rabbit or hare.": "Исключительный кусок мяса кролика или зайца."
"Quite impressive given that it's stuffed with crumpled leaves. Frustratingly, it has no pockets.": "Впечатляет, учитывая, что оно набито смятыми листьями. Раздражает, что в нем нет карманов."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version has a bunch of extra padding.": "Традиционная шляпа, которую люди надевают во время зимнего празднования Ри-Шина, бога растений и деревьев. Эта версия имеет дополнительную набивку."
"Stuffed with silky leaves and bits of straw. Not comfortable, but great protection!": "Наполнены шелковистыми листьями и кусочками соломы. Неуютные, но обеспечивают отличную защиту!"
"This is a great saddle.": "Это великое седло."
"This saddlebag can hold a lot of stuff.": "Эта седельная сумка может вместить много вещей."
"An exceptional piece of meat from a cow or bull.": "Исключительный кусок мяса от коровы или быка."
"A box for storing up to 24 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 24 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получающий доступ к ящику, может хранить свои собственные предметы. Все ящики для хранения позволяют игроку получать доступ к одним и тем же предметам.)"
"A very thorough explanation of how to find a legendary hoard of treasure buried or sunken near Sun Vale.": "Очень подробное объяснение того, как найти легендарное сокровище, зарытое или затонувшее возле Солнечной Долины."
"A very thorough explanation of how to find a large amount of treasure buried or sunken near Sun Vale.": "Очень подробное объяснение того, как найти большое количество сокровищ, зарытых или затонувших рядом с Солнечной Долиной."
"A very thorough explanation of how to find a small amount of treasure buried or sunken near Sun Vale.": "Очень подробное объяснение, как найти небольшое количество сокровищ, зарытых или затонувших возле Солнечной Долины."
"A very thorough explanation of how to find a huge hoard of treasure buried or sunken near Sun Vale.": "Очень подробное объяснение того, как найти огромную кладовую сокровищ, зарытую или затонувшую возле Солнечной Долины."
"High-quality rendered fat.": "Высококачественный очищенный жир."
"Dry most of the way through, but still a bit juicy. This hits the spot.": "Высушена почти полностью, но всё ещё немного сочная. Прямо в точку."
"An exceptional candle wick.": "Исключительный фитиль для свечи."
"When winter comes and you need a great coat, now you have one. During summer, though, this is a \"nice\" coat. At best.": "Когда наступает зима и тебе нужно отличное пальто, теперь оно у тебя есть. Хотя летом это всего лишь \"хорошее\" пальто. В лучшем случае."
"Impressively comfy in the cold.": "Невероятно уютен в холоде."
"You'd almost think these were metal, that's how great these bits of wood are!": "Можно подумать, что они металлические, настолько великолепны эти кусочки дерева!"
"A delicate smell that pulls at the edges of your memories and reminds you of the power of nature.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Нежный аромат, который затрагивает края ваших воспоминаний и напоминает о силе природы.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A tiny vial full of ooze of some sort.": "Крошечный флакон, наполненный какой-то слизью."
"Made from repurposed Winter Court armor in an imperfect process. This somehow conveys the warmth of summer while still being quite cold to the touch.": "Сделаны из переработанных доспехов Зимнего Двора в несовершенном процессе. Это каким-то образом передаёт тепло лета, оставаясь при этом довольно холодными на ощупь."
"Tart and sweet. A delicacy to some, but not as versatile for cooking as red apples.": "Кисло-сладкое. Деликатес для некоторых, но не такое универсальное для готовки, как красные яблоки."
"A ball of paper that explodes into a colorful burst when lit.": "Шар из бумаги, который взрывается ярким цветным фейерверком при поджоге."
"Dye used to color a piece of clothing or armor green.": "Краска, используемая для окрашивания одежды или брони в зелёный цвет."
"A simple rocket that explodes in harmless light when used.": "Простая ракета, которая взрывается безвредным светом при использовании."
"A small painted wooden chip, used in card and parlor games. It has tiny flecks of inlaid gemstone, making it slightly harder for rogues to slip counterfeits into a game.": "Маленькая расписная деревянная фишка, используемая в карточных и салонных играх. В ней есть крошечные вкрапления вставленных драгоценных камней, что затрудняет ворам подделку фишек для игры."
"A decorative ranalan bracelet made of green glass beads.": "Декоративный браслет раналан из зелёных стеклянных бусин."
"A big lush bell pepper.": "Большой сочный болгарский перец."
"A handful of seeds to grow a green pepper bush.": "Горсть семян для выращивания куста зелёного перца."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates green sparkles for a few seconds, and makes you feel oddly patriotic.": "Тонкая трубочка, в которой, как ты уверен, заключена магия. Когда ты ударяешь её о твёрдую поверхность, она создаёт зелёные искры на несколько секунд и вызывает у тебя странное чувство патриотизма."
"Minty fresh yet full of dirt, this creepy vial of fluid will make you better able to manage the growth of plants.": "Мятное и свежее, но с привкусом земли, это жуткое флакончик жидкости поможет вам лучше управлять ростом растений."
"A raw fish. Also known as Orcish Labyrinth Fish, these fish are surprisingly tasty when correctly prepared, but should not be eaten raw.": "Сырая рыба. Также известная как орочья лабиринтовая рыба, эта рыба удивительно вкусна при правильном приготовлении, но её не следует есть сырой."
"Raw vexfish on a ball of delicious rice.": "Сырая рыба-векс на шарике вкусного риса."
"Tasty raw vexfish wrapped in seaweed, on a ball of delicious rice.": "Вкусная сырая рыба-векс, завернутая в морские водоросли, на шарике вкусного риса."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 7,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 7000 Советов."
"An ancient alicorn that's been fitted into a harness for a deer to wear. It's adorned with weird citrus-fruit iconography, which contrasts strangely with the extraordinarily sharp horn.": "Древний алликорн, встроенный в упряжь для оленя. Украшен странной цитрусовой символикой, что странно контрастирует с необычайно острым рогом."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a deer could wear these.": "Украшенные символами Древы и вырезанные из неизвестного дерева, эти животные башмаки излучают власть над природой. Их может носить только олень."
"A grandiose sound comes from this rather hefty lute.": "Великолепный звук исходит от этой довольно тяжёлой лютни."
"A sweet millet-based candy bar.": "Сладкая плитка из проса."
"Gretchen Salas has a way with a potato. These rolls are really good! You can't even taste the potato.": "Гретхен Салас умеет обращаться с картофелем. Эти булочки очень вкусные! Картофель даже не чувствуется на вкус."
"Reinforced leather gloves for heavy-duty work.": "Усиленные кожаные перчатки для тяжёлых работ."
"The proboscis-like organ of a grickling. Revolting.": "Хоботковидный орган гриклинга. Отвратительно."
"A glowing eye from a grickling.": "Светящийся глаз гриклинга."
"Wood-grilled to perfection.": "Идеально приготовлен на древесном гриле."
"Aromatic and juicy.": "Ароматная и сочная."
"Always a classic dish!": "Всегда классическое блюдо!"
"A tasty appetizer. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"A bundle of 1000 arrow fletchings for marvelous and breathtaking arrows.": "Пучок из 1000 оперений для стрел, создающих великолепные и захватывающие стрелы."
"A jar of deadly acid with a grassy smell. It supposedly has many uses ranging from cleaning armor to cooking meals.": "Банка смертельной кислоты с травянистым запахом. Говорят, что у неё много применений — от очистки брони до приготовления еды."
"A classic fairy dish.": "Классическое блюдо фей."
"Pants that aren't quite all there... Weird.": "Штаны, которые как будто не совсем целы... Странно."
"This candy has some sort of horrible flavor. Licorice? It's awful. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "У этой конфеты какой-то ужасный вкус. Лакрица? Это отвратительно. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The teeth of a very mean bear.": "Зубы очень злого медведя."
"An unpleasant-tasting but nutritionally dense substance.": "Вещество с неприятным вкусом, но богатое питательными веществами."
"They cannot grow anymore, but they can help other plants grow as fertilizer.": "Они больше не могут расти, но могут помочь другим растениям расти в качестве удобрения."
"The smell is almost unbearable.": "Запах почти невыносим."
"These smell like sailor vomit.": "От них пахнет морским шмурдяком."
"An inedible mushroom, used by alchemists.": "Несъедобный гриб, используемый алхимиками."
"A pile of powdered Groxmax mushrooms.": "Куча измельчённых грибов Гроксмакс."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 10' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 10», чтобы установить эту турель.)"
"A party bowl of disgusting substances. Anyone who drinks it becomes violently ill... with emphasis on the <i>violent</i>.": "Чаша с отвратительными веществами для компании. Тот, кто выпьет, станет сильно болен... с акцентом на <i>сильно</i>."
"A thin volume of poetry by the goblin poet Gruzark. It has a homely, earthly feel. Which is poet-speak for \"it sucks.\" It has some exciting bits, though. Better than nothing.": "Тонкий томик стихов гоблинского поэта Грузарка. В нём ощущается простая, земная атмосфера. Что поэтически означает «отстой». Но есть и несколько интересных моментов. Лучше, чем ничего."
"This is bat shit.": "Это помёт летучих мышей."
"It's been hacked off of a ranalon guardian. Grisly and disturbing, especially to ranalon.": "Это отрублено у стража раналона. Мрачное и тревожное, особенно для раналона."
"The traditional weapon of Ranalon Guardians. This model is pretty basic, but still very effective.\nNote: this weapon is considered a Staff.": "Традиционное оружие стражей Раналона. Эта модель довольно простая, но всё же очень эффективная.\\nПримечание: это оружие считается посохом."
"The traditional weapon of Ranalon Guardians. This model is pretty nice.\nNote: this weapon is considered a Staff.": "Традиционное оружие стражей Раналона. Эта модель довольно хороша.\\nПримечание: это оружие считается посохом."
"A plump ripe guava.": "Сочная спелая гуава."
"This muffin might sound strange but it is actually quite sweet. Disgusting, but sweet.": "Этот маффин может показаться странным, но на самом деле он довольно сладкий. Отвратительный, но сладкий."
"A mushy fruit paste that can be eaten as a snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Мягкая фруктовая паста, которую можно съесть как закуску. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Shaved ice flavored with guava. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом гуавайи. Это лакомство нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This fist-shaped thing was found embedded in a particularly ornery myconian.": "Этот предмет в форме кулака был найден внутри особенно злобного микониана."
"A hefty storage chest. Can only be installed in a guild hall.": "Прочный сундук для хранения. Может быть установлен только в зале гильдии."
"A thick set of notes detailing how guild storage should be used. Can be installed in a guild hall to allow guildmates to purchase guild storage slots from the convenience of the hall.": "Толстый набор заметок, подробно описывающих, как следует использовать хранилище гильдии. Может быть установлен в зале гильдии, чтобы позволить гильдийцам покупать слоты хранилища гильдии прямо из зала."
"A pulled-curd cheese with a rubbery texture and a complex taste.\n\nCheese Type: Pulled-Curd (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр с тянущейся структурой, резиновой текстурой и сложным вкусом.\n\nТип сыра: Тянущийся (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"There are six nature spirits responsible for creating the undead. Gulagra, the spirit of chaos, is not one of them. But don't try to tell <i>him</i> that.": "Существует шесть духов природы, ответственных за создание нежити. Гулагра, дух хаоса, не входит в их число. Но не пытайтесь сказать <i>ему</i> об этом."
"Gulagra, the spirit of discord, usually takes the form of a mountain-sized worm, and would have no use for this club. But somebody named it after him anyway.": "Гулагра, дух раздора, обычно принимает облик червя размером с гору и вряд ли нуждался бы в этой дубине. Но кто-то всё равно назвал её в его честь."
"It's a piece of lacquered wood shaped like a long worm with a fanged mouth. Pretty impressive, really.": "Это кусок лакированного дерева, похожий на длинного червя с клыкастым ртом. Довольно впечатляет, честно говоря."
"A deadly wand in the right hands.": "Смертоносный жезл в умелых руках."
"A popular orcish drug that overcharges your brainstem. That sounds horrifying, and it kind of is, but this low dose generally has few side-effects.": "Популярный орочий наркотик, который перегружает ваш мозговой ствол. Звучит ужасающе, и в некотором роде так и есть, но эта низкая доза обычно вызывает мало побочных эффектов."
"An over-engineered potion that's quite tricky to make. There are probably easier ways to make an equivalent potion. But at least it's not addictive.": "Слишком усложнённое зелье, которое довольно сложно приготовить. Наверняка есть более простые способы создать аналогичное зелье. Но, по крайней мере, оно не вызывает привыкания."
"An orcish chef used this to chop vegetables... and any drunk orcs that got out of line. Sharpened via an unknown technique, it cleaves through anything with ease.": "Оркский повар использовал этот топор, чтобы рубить овощи... и любых пьяных орков, которые выходили из строя. Заточен по неизвестной технике, он с лёгкостью рассекает всё на своём пути."
"Designed to let you drink longer without unfortunate gastrointestinal issues.": "Создан, чтобы позволить вам пить дольше без неприятных проблем с желудочно-кишечным трактом."
"A small lump of a soft, whitish mineral. You can easily crumble it to a very fine powder that has no smell or taste.": "Небольшой кусочек мягкого беловатого минерала. Его легко растереть в очень тонкий порошок без запаха и вкуса."
"A pleasant hard cheese that's favored by elves.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приятный твердый сыр, любимый эльфами.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"The preserved skull of a hag-kin.": "Сохранённый череп родственницы ведьмы."
"A weed with inedible berries.": "Сорняк с несъедобными ягодами."
"A leather cord for tying your hair up in a knot.": "Кожаный шнурок для завязывания волос в узел."
"A brined cheese with a clean, sour taste.\n\nCheese Type: Brine (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр в рассоле с чистым, кислым вкусом.\n\nТип сыра: Рассольный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A set of notes consisting of pig hoofprints.": "Набор заметок, состоящий из отпечатков свиных копыт."
"Smells like entrails. Tastes like entrails... but with an extremely unpleasant crunch.": "Пахнет как внутренности. На вкус как внутренности... но с крайне неприятным хрустом."
"A tool used by rakshasa housebuilders, who like to hammer nails with their fists. This one has been cleaned up and enchanted.": "Инструмент, используемый строителями-ракшасами, которые любят забивать гвозди кулаками. Этот был очищен и зачарован."
"Can be studied to earn Hammer XP. (Requires VIP.)": "Можно изучать для получения опыта в молотах. (Требуется VIP.)"
"Covered in weird runes. Probably just graffiti.": "Покрыт странными рунами. Вероятно, просто граффити."
"Teaches you a hammer technique.": "Обучает технике владения молотом."
"A potent dwarven rune.": "Мощная гномья руна."
"A simple and nicely-made drum.": "Простой и хорошо сделанный барабан."
"An expert armor seller decided this coat was special.": "Опытный продавец брони решил, что этот кафтан особенный."
"A basic saw for cutting wood.": "Простая пила для распиливания древесины."
"An old mini-loaf made to last decades. The outside is as hard as a rock, but the inside is still edible.": "Старый мини-батон, сделанный на десятилетия. Снаружи твёрдый как камень, но внутри всё ещё съедобный."
"Simple as can be.": "Проще не бывает."
"For experienced miners only.": "Только для опытных шахтёров."
"Some damp biscuits. Not appetizing, but much better than starving!\n\n(For an hour after you eat food, you'll regenerate health and power between fights. And better food than this can regenerate you DURING combat, too!)": "Какие-то влажные печенья. Не аппетитно, но гораздо лучше, чем голодать!\\n\\n (В течение часа после еды вы будете восстанавливать здоровье и силу между боями. А более хорошая еда может восстанавливать вас и ВО ВРЕМЯ боя!)"
"A strange mechanism that can augment an arthropod's venomous attack capabilities. (Only wearable by spiders.)": "Странный механизм, который может усилить ядовитые атаки членистоногих. (Носится только пауками.)"
"A tiny harp. Sounds pretty good.": "Крошечная арфа. Звучит довольно хорошо."
"This packet holds a proprietary mix of mystery spices. It has a very autumn-y smell.": "Этот пакет содержит фирменную смесь загадочных специй. У него очень осенний аромат."
"Hash browns with onion.": "Драники с луком."
"Somehow this glass orb has raw emotional hate trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперта сырая эмоциональная ненависть. Тёмные эмоции — это сила для Некромантии, и эту сферу можно использовать как Некромантический Самоцвет."
"These boots have been dyed red and given a preposterous name.": "Эти ботинки окрашены в красный цвет и получили нелепое название."
"Dye used to color a piece of clothing or armor hateful orchid.": "Краска, используемая для окрашивания одежды или брони в цвет ненавистной орхидеи."
"A drop of magical liquid containing the essence of hatred.": "Капля магической жидкости, содержащей сущность ненависти."
"Test potion to haunt you.": "Тестовое зелье, чтобы преследовать вас."
"A semi-soft cheese with a buttery taste.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Полумягкий сыр с маслянистым вкусом.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A lump of wax that can be affixed to the head to provide light. Don't worry: it only looks dangerous because of how dangerous it is.": "Кусок воска, который можно прикрепить к голове, чтобы обеспечить свет. Не волнуйтесь: она выглядит опасно только из-за того, насколько она опасна."
"Recovers 300 health immediately, plus 20 health per second for 30 seconds.": "Восстанавливает 300 здоровья мгновенно, плюс 20 здоровья в секунду в течение 30 секунд."
"Recovers 75 health.": "Восстанавливает 75 здоровья."
"Recovers 125 health.": "Восстанавливает 125 здоровья."
"Recovers 200 health.": "Восстанавливает 200 здоровья."
"Recovers 300 health.": "Восстанавливает 300 здоровья."
"Recovers 400 health.": "Восстанавливает 400 здоровья."
"A large mammal heart.": "Сердце крупного млекопитающего."
"The fungal core of a myconian. It is inedible and has no obvious use, but it somehow <i>feels</i> useful. To somebody.": "Грибной центр микониана. Несъедобен и не имеет очевидного применения, но каким-то образом <i>кажется</i> полезным. Для кого-то."
"It's a pool of liquid heat energy trapped in special glass.": "Это скопление жидкой тепловой энергии, заключённое в специальное стекло."
"A thick stick. Really thick.": "Толстая палка. Очень толстая."
"A strangely-weighted off-hand knife that's good for bashing as well as stabbing.": "Странно утяжелённый нож в левую руку, который хорош как для удара, так и для укола."
"A mechanism used in large automatons.": "Механизм, используемый в больших автоматонах."
"So heavy! Wait, that's probably an illusion... nope, it really is super heavy. Makes it hard to hold stuff.": "Так тяжело! Подожди, наверное, это иллюзия... нет, оно действительно очень тяжелое. Из-за этого трудно что-то держать."
"A rather heavy sack. It's hard to tell what's inside.": "Довольно тяжёлый мешок. Трудно понять, что внутри."
"A crystal used to unlock certain Crone Hegemony armory chests. This one is partially digested, but should still work.": "Кристалл, используемый для открытия определённых сундуков с оружием Кроновской гегемонии. Этот частично переварен, но всё ещё должен работать."
"A clean beer with hints of oak and licorice. The preferred drink of humans in the Crone Hegemony.": "Чистое пиво с оттенками дуба и лакрицы. Предпочитаемый напиток людей в Гегемонии Старухи."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade 3 ability.": "Маленькое острое лезвие, покрытое токсичной слизью, особенно смертоносной для волков и ликантропов. Этот предмет используется в способности Волчий Клинок 3."
"An amulet. The symbol is a strangely-adorned anvil.": "Амулет. Символ — странно украшенная наковальня."
"A box with an unusual mechanical lock.": "Коробка с необычным механическим замком."
"It's just a rock. The name was coined by Plaudius the Wise who posited that the Forthragarian homeworld might be paved with such stones. This has since recently been proven incorrect, but the name is unlikely to change.": "Это просто камень. Название придумал Плаудиус Мудрый, который предположил, что родной мир Фортрагариана может быть вымощен такими камнями. Недавно это было опровергнуто, но название вряд ли изменится."
"Having been blasted by hellfire, this sand is especially pure. A little cursed, but pure. It's good for magical bottles.": "Обожжённый адским пламенем, этот песок особенно чист. Немного проклят, но чист. Хорош для магических бутылок."
"When consumed, this concoction cures all stacks of Hellfire and Lesser Hellfire.": "При употреблении это зелье снимает все наложения Адского огня и Малого адского огня."
"When applied topically, this ointment cures up to 10 stacks of Hellfire and Lesser Hellfire.": "При наружном применении эта мазь лечит до 10 наложений Адского Огня и Меньшего Адского Огня."
"A strange magical cube. It can be used to give head armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы дать головной броне бонусное магическое свойство. Посетите торговца снаряжением (или игрока-улучшателя), чтобы установить его."
"This was once a Winter Court helm that was repurposed. Instead of twisting the mind, it protects against such things.": "Раньше это был шлем Зимнего Двора, который переделали. Вместо того чтобы искажать разум, он защищает от подобных воздействий."
"A potent mixture of magical blood.": "Мощная смесь магической крови."
"Glowing redly.": "Светится красным светом."
"Rita asked you to deliver this soap to Helena, who lives in the ruins of Castle Eltibule.": "Рита попросила тебя доставить это мыло Хелене, которая живёт в руинах замка Элтибуль."
"Complex and layered.": "Сложный и многослойный."
"This coin appeared magically when you solved the semi-destroyed altar in Vidaria. It can be placed back onto the altar to redeem it for a special item, but it may have other uses...": "Эта монета появилась магическим образом, когда вы решили загадку полуразрушенного алтаря в Видарии. Ее можно вернуть на алтарь, чтобы обменять на особый предмет, но у нее могут быть и другие применения..."
"A fad item by the master of trend magic, Rea Shuloth. Rea's spell compelled everyone to love these necklaces, but even magic can't control fashion for long, and now these are seen as incredibly gauche.": "Модная вещица от мастера магии трендов Реа Шулота. Заклинание Реа заставляло всех обожать эти ожерелья, но даже магия не может долго управлять модой, и теперь их считают невероятно безвкусными."
"Harvested from a very young hexapus (before the meat becomes inedible). There are probably special ways to prepare this for cooking. It can also be used in Cheap Meat recipes.": "Получено от очень молодого гексапуса (до того, как мясо становится несъедобным). Вероятно, существуют особые способы его приготовления. Также может использоваться в рецептах дешёвого мяса."
"A surprisingly pleasant orcish dish. Traditionally brewed in vast quantities to feed an army.": "Удивительно приятное орочье блюдо. Традиционно варится в огромных количествах, чтобы накормить армию."
"A little-known dish from the ranalon of Povus. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Малоизвестное блюдо из раналона Повуса. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The sharp, bony appendage of a hexapus.": "Острый, костяной придаток гексапуса."
"One of the rings of sharp teeth found in the \"mouth\" of a hexapus.": "Одно из колец острых зубов, найденных во «рту» гексапуса."
"This box can grow multiple crops of mushrooms.\nBox Duration: 48 hours\nGrow Time: 50% slower for each crop\nYield: +100% mushrooms per crop\nChance for Second Mushroom Type: 15% per crop\nNote: this box requires 2 doses of substrate": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 48 часов\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 100% больше грибов за каждый урожай\\nШанс второго типа грибов: 15% за каждый урожай\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nGrow Time: 50% slower for each crop\nYield: +100% mushrooms per crop\nChance for Second Mushroom Type: 15% per crop\nNote: this box requires 2 doses of substrate": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 72 часа\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 100% больше грибов за каждый урожай\\nШанс второго типа грибов: 15% за каждый урожай\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"The ivory tooth of a hippopotamus.": "Слоновый зуб бегемота."
"A large feather from a hippogriff. It's very pretty.": "Большое перо гиппогрифа. Оно очень красивое."
"This potent battle staff was used by the thaumaturges of Gazluk to train their pet hippogriff.": "Этот мощный боевой посох использовали тауматурги Газлука для тренировки своего питомца-гиппогрифа."
"A delicious cold beverage. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный холодный напиток. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A goblin military coat that's been fitted for a hobgoblin, an extra-large, extra-stupid goblin.": "Военный плащ гоблина, подогнанный под хобгоблина — крупного и крайне глупого гоблина."
"Extra-tough gloves for hobgoblins, specially grown battle-goblins with keen combat senses and little common sense.": "Особо прочные перчатки для хобгоблинов, специально выращенных боевых гоблинов с острым боевым чутьём и скудным здравым смыслом."
"Magically tough. With variable-sizing latches because hobgoblin head sizes differ pretty dramatically from one batch to the next.": "Магически прочный. С застёжками переменного размера, потому что размеры голов хобгоблинов сильно отличаются от одной партии к другой."
"Sized for a genetically-enhanced goblin known as a hobgoblin. Their feet are pretty big, but you can still make these fit.": "Размеры соответствуют генетически улучшенному гоблину, известному как хобгоблин. Их ноги довольно большие, но вы всё равно сможете надеть эти ботинки."
"Sized for a very large goblin, or slightly-large human.": "Размер для очень большого гоблина или слегка крупного человека."
"Wielded by the warrior-priests of Saledar, the goblin god of Societal Cooperation.": "Владение которым принадлежит воинственным жрецам Саледара, бога гоблинов, покровителя общественного сотрудничества."
"Weighted to feel comfortable for a hobgoblin, which makes it too heavy for most other races.": "Утяжелён, чтобы быть удобным для хобгоблина, что делает его слишком тяжёлым для большинства других рас."
"Hogan the staff-fighter's masterpiece... Well, a reasonable facsimile.": "Шедевр Хогана, мастера боевого посоха... Ну, вполне достойная копия."
"An extraordinary staff with an alchemical beaker on the end. You can use this for staff fighting or battle chemistry. It's not suitable for fire magic, though.": "Необычный посох с алхимическим колбочкой на конце. Его можно использовать для боя посохом или боевой химии. Однако он не подходит для огненной магии."
"A large cask used for aging wine.": "Большая бочка, используемая для выдержки вина."
"Created by priests of Arisetsu, this pleasant drink wards away the cold.": "Созданный жрецами Арисецу, этот приятный напиток отгоняет холод."
"A simple cot for napping. Can be installed in a home or guild hall.": "Простая кровать для дневного сна. Может быть установлена в доме или гильдейском зале."
"A hefty storage chest. Can only be installed in a home, and can only be accessed by the homeowner.": "Прочный сундук для хранения. Может быть установлен только в доме и доступен только владельцу дома."
"A bottle of honey.": "Бутылка мёда."
"Pig and sugar belong together.": "Свинья и сахар — идеальное сочетание."
"A dense and energizing snack.": "Плотный и заряжающий энергией перекус."
"A delicious choice for those with a big sweet tooth.": "Вкусный выбор для тех, кто любит сладкое."
"A luxuriously rich seasonal snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Роскошно насыщенный сезонный перекус. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"Dye used to color a piece of clothing or armor honeydew.": "Краска, используемая для окрашивания одежды или брони в цвет медовой росы."
"These extra-large flower seeds are coated in sticky honey, which is in turn coated in pollen.": "Эти крупные цветочные семена покрыты липким медом, который, в свою очередь, покрыт пыльцой."
"Designed by a spiteful necromancer bent on conquering a city, this hood seethes with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Созданный злобным некромантом, стремящимся завоевать город, этот капюшон кипит ненавистью. И оказывается, что чистая ненависть довольно теплая, обеспечивая легкую защиту от холода."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a brave and daring pig could wear these.": "Украшенные символами Древы и вырезанные из неизвестного дерева, эти животные башмаки излучают власть над природой. Только храбрый и смелый кабан мог бы носить их."
"\"To my lover, may she run back to me soon. - Raul\"": "\"Моей возлюбленной, пусть она скоро вернётся ко мне. - Рауль\""
"A drop of magical liquid containing the essence of hope.": "Капля магической жидкости, содержащей сущность надежды."
"The green flowers of the hop plant. Used in beer brewing.": "Зелёные цветы растения хмель. Используются в пивоварении."
"Someone put curry in this conch.": "Кто-то положил карри в этот раковинный рог."
"These attach to a cow's head, giving them glowing red horns and a hateful disposition. You must be a cow to wear this.": "Эти рога крепятся к голове коровы, придавая им светящиеся красные рога и злобный нрав. Чтобы надеть их, вы должны быть коровой."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 5' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 5», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 5' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 5», чтобы бросить эту бомбу.)"
"A sack of weird-smelling herbs and vegetables. It's a goblin secret formula that supposedly improves mating chances. Best results when given to both the male and female horse.": "Мешок с травами и овощами с необычным запахом. Это секретная формула гоблинов, которая, как считается, повышает шансы на спаривание. Лучший эффект достигается при даче как жеребцу, так и кобыле."
"This is basically inedible. It has limited alchemical uses.": "Практически несъедобно. Имеет ограниченное применение в алхимии."
"Grows a plant whose inedible fruit is useful in crafting horse-taming potions.": "Выращивает растение, плод которого несъедобен, но полезен для создания зелий укрощения лошадей."
"Describes the known types of horses, but sadly lacks pictures.": "Описывает известные типы лошадей, но, к сожалению, без иллюстраций."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the classic prototype mount.": "Магический гламур, который можно наложить на лошадь. При использовании он превращает её внешний вид в классическую модель ездового животного."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the legendary horse Icemare.": "Магический гламур, который можно наложить на лошадь. При использовании превращает её внешний вид в легендарную лошадь Ледяную Кобылу."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the legendary horse Icemare, writ large.": "Магический гламур, который можно применить к лошади. При использовании он превращает её внешний вид в легендарного коня Ледяного Коня, увеличенного в размерах."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of Lemon Vapors, the special Guide mount.": "Магический гламур, который можно применить к лошади. При использовании он превращает её внешний вид в Лимонные Испарения, особую ездовую лошадь Гида."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of a Nightmare.": "Магический гламур, который можно применить к лошади. При использовании он превращает её внешний вид в Кошмар."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of the mystical horse Pantiflax.": "Магическое преображение, которое можно наложить на лошадь. При использовании оно превращает её внешний вид в облик мистической лошади Пантифлакс."
"A magical glamour that can be applied to a horse. When used, it turns their appearance into that of Zoomer, the racing-reward horse.": "Магическое преображение, которое можно применить к лошади. При использовании оно превращает её внешний вид в Зумера, лошадь, награждаемую за гонки."
"Deep crimson in color, this gem is known for bringing good luck. This particular ruby kind of looks like a horse if you squint at it.": "Глубокого багрового цвета, этот драгоценный камень известен тем, что приносит удачу. Этот конкретный рубин немного похож на лошадь, если прищуриться."
"A tophat, to make your mount look extra dapper.": "Цилиндр, чтобы ваш скакун выглядел особенно элегантно."
"Nothing better than roasted veggies for a cold fall afternoon. Or any other time, really. ": "Нет ничего лучше жареных овощей в холодный осенний день. Или в любое другое время, если честно."
"Fried cat-meat in a house blend of spices and lightly breaded.": "Жареное кошачье мясо в фирменной домашней смеси специй и слегка в панировке."
"Teaches you how to create visual arts. (Raises your skill to 1 if it isn't already.)": "Обучает созданию изобразительного искусства. (Повышает ваш навык до 1, если он ещё не достиг этого уровня.)"
"A huge dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Огромный дракон. Люди, которые на него смотрят, будут смутно вдохновлены создавать лучшее. Действует 5 минут после установки."
"A large chunk of honeycomb from a fae beehive.": "Большой кусок сот из улья волшебных пчёл."
"A huge dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Огромный дракон, покрытый золотом. Люди, которые на него смотрят, вдохновляются создавать лучшее. Действует 10 минут после установки."
"A huge gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Огромный грифон, покрытый золотом. Люди, которые на него смотрят, будут вдохновлены на более искусные убийства. Действует 10 минут после установки."
"A huge gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Огромный грифон. Люди, которые на него смотрят, будут смутно вдохновлены лучше убивать. Действует 5 минут после установки."
"A huge dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Огромный дракон, покрытый серебром. Те, кто на него смотрит, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A huge gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Огромный грифон, покрытый серебром. Люди, которые на него смотрят, будут вдохновлены лучше убивать. Действует 10 минут после установки."
"This smelly gel will hyper-accelerate your heart. What could go wrong?": "Этот вонючий гель гиперускорит твое сердце. Что может пойти не так?"
"The preserved skull of a human.": "Сохранённый череп человека."
"A human dish popular in the Crone Hegemony.": "Блюдо людей, популярное в Гегемонии Старухи."
"A human dish popular in the Crone Hegemony. This one is topped with tiny infernal souls that dance across the cheese and let out little hellish screams from time to time. So cute!\n\nNote: Souls do not count as meat, so this is technically vegetarian.\n\nIn addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Блюдо человеческой кухни, популярное в Кронской Гегемонии. Это блюдо украшено крошечными инфернальными душами, которые танцуют по сыру и время от времени издают маленькие адские крики. Так мило!\n\nПримечание: души не считаются мясом, поэтому технически это вегетарианское блюдо.\n\nПомимо обычных эффектов еды, этот приём пищи также снижает эффект затрат энергии на Адское пламя на 25%."
"A human dish popular in the Crone Hegemony. This one is topped with tofu pretending to be bacon.": "Человеческое блюдо, популярное в Кронской Гегемонии. Эта пицца украшена тофу, притворяющимся беконом."
"This breastplate is very old, and a sequence of enchantments has been laid atop it to protect it from the elements. An active symbol of Arisetsu is barely visible under layers of rust and paint.": "Этот нагрудник очень старый, и на него наложена цепочка чар, чтобы защитить от непогоды. Активный символ Арисецу едва виден под слоями ржавчины и краски."
"A simple but robust crossbow that handles well and can be easily restrung.": "Простой, но прочный арбалет, который хорошо управляется и легко перенастраивается."
"An Elven bow made by someone with a lot of time on their hands. (An Elf, in other words.)": "Эльфийский лук, сделанный кем-то с большим количеством свободного времени. (Иными словами, эльфом.)"
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +34 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +34 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"This drink has a not-too-great flavor, but it's very good at rehydrating tired bodies. The preferred desert beverage of people who are too rich to drink water. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Этот напиток имеет не самый лучший вкус, но отлично восстанавливает водный баланс уставших тел. Предпочитаемый напиток пустыни для тех, кто слишком богат, чтобы пить воду. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Etched with weird runes of distraction, this shield is especially useful at attracting opponents.": "Украшенный странными рунами отвлечения, этот щит особенно полезен для привлечения противников."
"Teaches you the basics of Fletching. (Raises your skill to 1 if it isn't already.)": "Обучает основам изготовления стрел. (Повышает ваш навык до 1, если он ещё не достиг этого уровня.)"
"Dear player, thank you for completing this quest. If this were a complete MMO, you would have received a fun reward now. Maybe next time! - Eric": "Уважаемый игрок, спасибо за выполнение этого квеста. Если бы это была полноценная MMO, вы бы сейчас получили забавную награду. Может быть, в следующий раз! - Эрик"
"A large knife for cutting meat and organs out of corpses. It's made of magical ice. (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Большой нож для нарезки мяса и извлечения органов из трупов. Сделан из магического льда. (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)"
"It's a small parchment with a magical inscription. You can use this to get past a huge icy barrier beneath the ruined tower in Kur.": "Это небольшой пергамент с магической надписью. Вы можете использовать его, чтобы пройти через огромный ледяной барьер под разрушенной башней в Куре."
"An enchanted block of ice that can never melt.": "Зачарованный блок льда, который никогда не растает."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 2 hours to attempt to catch 3-12 fish.": "Используйте это снаряжение, чтобы рыбачить через лед замёрзшего озера. Если в озере есть виноградная рыба, окунь, угорь или акула, это снаряжение может их поймать. Попытка поймать от 3 до 12 рыб занимает 2 часа."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, or Eel, this gear can catch them. Takes 30 minutes to attempt to catch 2-5 fish.": "Используйте это, чтобы ловить рыбу через лед замерзшего озера. Если в озере есть виноградная рыба, окунь или угорь, это снаряжение поможет их поймать. Требуется 30 минут, чтобы попытаться поймать 2-5 рыб."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 4 hours to attempt to catch 5-20 fish.": "Используйте это, чтобы ловить рыбу через лед замерзшего озера. Если в озере есть виноградная рыба, окунь, угорь или акула, это снаряжение поможет их поймать. Требуется 4 часа, чтобы попытаться поймать 5-20 рыб."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish or Perch, this gear can catch them. Takes 5 minutes to attempt to catch 1 fish.": "Используйте это, чтобы ловить рыбу через лед замерзшего озера. Если в озере есть виноградная рыба или окунь, это снаряжение поможет их поймать. Попытка поймать 1 рыбу занимает 5 минут."
"Use this to fish through the ice of a frozen lake. If the lake has Grapefish, Perch, Eel, or Shark, this gear can catch them. Takes 8 hours to attempt to catch 12-35 fish.": "Используйте это, чтобы ловить рыбу через лед замёрзшего озера. Если в озере есть виноградная рыба, окунь, угорь или акула, это снаряжение сможет их поймать. Требуется 8 часов, чтобы попытаться поймать 12-35 рыб."
"Designed for ice mages in hostile environments, these gloves try to be the perfect blend of protection and versatility.": "Созданы для ледяных магов в враждебных условиях, эти перчатки стремятся быть идеальным сочетанием защиты и универсальности."
"A saw made of ice! It won't last too long, but it'll cut wood while it lasts.": "Пила изо льда! Она не прослужит долго, но будет пилить дерево, пока не растает."
"A cool soothing liquid.": "Прохладная успокаивающая жидкость."
"Can be studied to earn Ice Magic XP. (Requires VIP.)": "Можно изучать для получения опыта в Ледяной магии. (Требуется VIP.)"
"A simple skinning knife made of magical ice. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Простой нож для снятия шкуры, сделанный из магического льда. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры с трупов некоторых врагов.)"
"The wings of a dead icebreeze moth.": "Крылья мёртвого мотылька ледяного бриза."
"This was designed to empower Winter Court fae who've installed Ice Hearts in themselves. Others who can stomach the liquid still gain its benefits, but also a nasty side-effect. (Due to the ingredients, this potion is supposedly forbidden by the Autumn Council of Forbidders.)": "Это было создано, чтобы усилить фей Зимнего Двора, которые установили в себя Ледяные Сердца. Другие, кто может выдержать эту жидкость, также получают её преимущества, но и неприятный побочный эффект. (Из-за ингредиентов это зелье якобы запрещено Осенним Советом Запретителей.)"
"This deadly knife is made from the fang of a Winter Dragon. (Thus making it contraband in Council cities, where dragon parts are forbidden.) It has been augmented to allow the casting of ice magic.": "Этот смертоносный кинжал сделан из клыка Зимнего Дракона. (Поэтому он является контрабандой в городах Совета, где запрещены части драконов.) Он был усилен, чтобы позволять использование ледяной магии."
"The slimy, sticky skin of an icy frog. DO NOT LICK!": "Скользкая, липкая кожа ледяной лягушки. НЕ ЛИЗАТЬ!"
"A cold piece of magical crystal.": "Холодный кусок магического кристалла."
"This kilt is part of the uniform of the dwarven Idealist's Guild. Members produce a substance they call \"optimism\", which is sold in the form of addictive crystals.": "Этот килт является частью формы гильдии гномов-идеалистов. Члены гильдии производят вещество, которое они называют «оптимизмом», и продают его в виде вызывающих привыкание кристаллов."
"Part of an abomination. It has an identification mark branded into it. Might be useful to impersonate an abomination... but mostly just junk.": "Часть извращения. На ней выжжена опознавательная метка. Может пригодиться для маскировки под извращение... но в основном просто хлам."
"Collects some information about a large supply of metal in the Ilmari Desert.": "Собирает информацию о большом запасе металла в пустыне Илмари."
"A map that supposedly leads to a legendary hoard of treasure buried in the Ilmari Desert.": "Карта, которая, как говорят, ведёт к легендарному кладу, зарытому в пустыне Илмари."
"A map that supposedly leads to a large amount of treasure buried in the Ilmari Desert.": "Карта, которая, как говорят, ведёт к большому количеству сокровищ, зарытых в пустыне Илмари."
"A map that supposedly leads to a small amount of treasure buried in the Ilmari Desert.": "Карта, которая, по слухам, ведёт к небольшой закопанной добыче в пустыне Илмари."
"A map that supposedly leads to a huge hoard of treasure buried in the Ilmari Desert.": "Карта, которая, как говорят, ведёт к огромному кладу, зарытому в пустыне Илмари."
"A map that supposedly leads to a \"war cache\", an underground bunker from before the Sand War.": "Карта, которая якобы ведет к «военному тайнику» — подземному бункеру времен до Песчаной войны."
"A modest silver medallion of elven design. It helps turn words into weapons so you can get what you want.": "Скромный серебряный медальон эльфийского дизайна. Он помогает превращать слова в оружие, чтобы добиться желаемого."
"Named for the god of knowledge, this potion lets you see a few seconds into the future! It is permanent, however, and some scribes of Imatia have been driven insane by what they see.": "Названное в честь бога знаний, это зелье позволяет видеть на несколько секунд в будущее! Однако эффект постоянен, и некоторых писцов Имати свело с ума от увиденного."
"The preserved skull of a particularly impressive sentient freakish creature.": "Сохранённый череп особенно впечатляющего разумного уродливого существа."
"The preserved skull of a particularly impressive mid-sized animal.": "Сохранённый череп особенно впечатляющего животного среднего размера."
"The preserved skull of a particularly impressive demon.": "Сохранённый череп особенно впечатляющего демона."
"The preserved skull of a particularly impressive elf.": "Сохранённый череп особенно впечатляющего эльфа."
"The preserved skull of a particularly impressive fairy.": "Сохранённый череп особенно впечатляющей феи."
"The preserved skull of a particularly impressive giant.": "Сохранившийся череп особенно впечатляющего гиганта."
"The preserved skull of a particularly impressive goblin.": "Сохранённый череп особенно впечатляющего гоблина."
"The preserved skull of a particularly impressive human.": "Сохранённый череп особенно впечатляющего человека."
"The preserved skull of a particularly impressive large animal.": "Сохранённый череп особенно впечатляющего крупного животного."
"The preserved skull of a particularly impressive orc.": "Сохранённый череп особенно впечатляющего орка."
"The preserved skull of a particularly impressive rakshasa.": "Сохранённый череп особенно впечатляющей ракшасы."
"The preserved skull of a particularly impressive small animal.": "Сохранённый череп особенно впечатляющего маленького животного."
"A pile of fragrant incense.": "Куча ароматного ладана."
"The bloody skin of an incredible animal.": "Кровавая шкура невероятного животного."
"Brings to mind the timeless beauty of a frozen landscape before shattering that image with sensations of warmth.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Навевает мысли о вечной красоте замерзшего пейзажа, прежде чем разрушить этот образ ощущениями тепла.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"For repairing heinous armor damage. Used by Armor Patching abilities.": "Для ремонта серьёзных повреждений брони. Используется способностями починки брони."
"A bundle of 1000 arrow shafts for incredible arrows.": "Пучок из 1000 древков для невероятных стрел."
"This smells less like bacon than some candles, but the smell synergizes with real bacon scent in an incredible way.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот запах меньше похож на бекон, чем у некоторых свечей, но он невероятно сочетается с настоящим ароматом бекона.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"You thought you'd seen a cow-shoe masterpiece before, but this just reset your expectations!": "Ты думал, что видел шедевр коровьих ботинок раньше, но это просто изменило твои представления!"
"Wow. Now you KNOW you've seen deer-shoe craftsmanship. These tiny things are delicate, yet indestructible.": "Вау. Теперь вы точно знаете, что такое оленье мастерство. Эти крошечные вещицы хрупкие, но при этом неразрушимые."
"The bitter smokiness of a forest fire combined with the pleasant aroma of cooking meat.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Горькая дымность лесного пожара в сочетании с приятным ароматом жареного мяса.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Evokes the wind in your hair (even if you have no hair) to facilitate an incredible runner's high.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Пробуждает ощущение ветра в волосах (даже если их нет), чтобы вызвать невероятный кайф бегуна.\\n\\nЭта свеча горит 5 минут, и ею могут наслаждаться любое количество людей. Одновременно можно зажигать только одну свечу."
"Incredible! You can evade like crazy in these.": "Невероятно! В них вы можете уклоняться как сумасшедший."
"A flower candle that you can never get tired of smelling.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Цветочная свеча, от аромата которой никогда не устанешь.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Normally to a novice, a horseshoe is just a horseshoe. But anyone can tell that this is an incredible horseshoe. It feels special.": "Обычно для новичка подкова — это просто подкова. Но любой скажет, что это невероятная подкова. Она кажется особенной."
"Incredibly fancy calligraphy ink.": "Чрезвычайно изысканные чернила для каллиграфии."
"Impossibly comfortable for leather. Stylish too!": "Невероятно удобные для кожаных. Ещё и стильные!"
"Naturally svelte with every movement, these pants highlight the surprising suppleness of leather.": "Естественно изящные при каждом движении, эти штаны подчёркивают удивительную гибкость кожи."
"It feels like touching butter. Which is odd. But you get used to it.": "Ощущается, как прикосновение к маслу. Что странно. Но к этому привыкаешь."
"Incredible crafstmanship and a fashion-forward view on pockets. (That is: not having any.)": "Невероятное мастерство и модный взгляд на карманы. (А именно: их отсутствие.)"
"It so accurately replicates the sensory experience of the ocean that those afraid of water should stay clear.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Он настолько точно воспроизводит сенсорный опыт океана, что тем, кто боится воды, стоит держаться подальше.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Extremely high-quality rendered fat.": "Очень высококачественный очищенный жир."
"A compound that contains tannic acid. It can be used to create incredible and marvelous leather.": "Соединение, содержащее таниновую кислоту. Его можно использовать для создания невероятной и великолепной кожи."
"A perfect candle wick.": "Идеальный фитиль для свечи."
"Incredibly protective against freezing.": "Невероятно защищает от переохлаждения."
"These make it seem easy to make comfortable wooden shoes for cows. (It's not.)": "Они создают впечатление, что делать удобные деревянные башмаки для коров — просто. (Это не так.)"
"Comfortable, and perfectly fitting in with deer fashion sense.": "Удобные и идеально подходящие к оленьему чувству моды."
"Fae blacksmiths have infused the metal of this helm with the essence of eternity, meaning that this helm has never not existed. Don't think about it too much.": "Фейские кузнецы наполнили металл этого шлема сущностью вечности, что означает, что этот шлем всегда существовал. Не думайте об этом слишком много."
"A mirror on a chain with a subtle illusion. Enemies briefly see you as being far more beautiful than you are, then suddenly perceive you as being far uglier than reality. It's pretty unnerving.": "Зеркало на цепочке с тонкой иллюзией. Враги на мгновение видят вас гораздо красивее, чем вы есть на самом деле, а затем внезапно воспринимают вас как гораздо более уродливого, чем в реальности. Это довольно тревожно."
"Dye used to color a piece of clothing or armor indigo.": "Краска, используемая для окрашивания одежды или брони в индиго."
"Can be studied to earn Industry XP. (Requires VIP.)": "Можно изучать для получения опыта в промышленности. (Требуется VIP.)"
"This horn is made of shell and enchanted with protective runes.": "Этот рог сделан из раковины и зачарован защитными рунами."
"The brain of an ordinary animal that has been corrupted by demonic energy.": "Мозг обычного животного, искажённый демонической энергией."
"An evil-looking egg. Probably best not to eat this.": "Зловещее яйцо. Наверное, лучше его не есть."
"The slimy, sticky skin of a demonic frog. DO NOT LICK!": "Скользкая, липкая кожа демонической лягушки. НЕ ЛИЗАТЬ!"
"Whatever type of meat this once was, it's completely overrun with demonic energy now.": "Какой бы ни была эта мясная часть раньше, теперь она полностью пропитана демонической энергией."
"A tasty soup with little bits of delectable meat floating around in it, infused with demonic essence.\n\nIn addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Вкусный суп с кусочками аппетитного мяса, пропитанный демонической сущностью.\n\nПомимо обычных эффектов еды, этот приём пищи также снижает эффект затрат энергии на Адское пламя на 25%."
"This healing potion can be drunk many times. Just leave a drop in the bottom and it will refill right before your eyes! The secret? It's made with a still-living ooze. Unfortunately, the ooze is so thick that the average person can't manage to drink it. Also unfortunately, the ooze takes a few seconds to take effect.\n\nThis potion is best known as the favorite drink of Grita the Arbitrarily Murderous, the feared rakshasa pirate. She says the potion is light on the stomach, allowing her to drink far more of it than regular healing potions. But she's a pirate (and a rakshasa to boot), so most people take that with a grain of salt.": "Это лечебное зелье можно пить много раз. Просто оставьте каплю на дне, и оно наполнится прямо у вас на глазах! Секрет? Оно сделано с использованием ещё живого слизи. К сожалению, слизь настолько густая, что обычному человеку трудно её выпить. Ещё одна неприятность — зелье действует с небольшой задержкой.\\n\\nЭто зелье известно как любимый напиток Гриты Произвольно Убийственной, страшной ракшасы-пирата. Она говорит, что зелье легко переносится желудком, позволяя ей выпивать гораздо больше, чем обычных лечебных зелий. Но она пират (да ещё и ракшаса), так что большинство людей воспринимают это с долей скептицизма."
"A potent acid for removing inscriptions on items.": "Мощная кислота для удаления надписей с предметов."
"Used by calligraphers when extremely fine detail must be inked.": "Используется каллиграфами, когда необходимо нанести очень тонкие детали."
"Designed for inquisitive fire mages who like to explore new ways to burn things.": "Создан для любознательных огненных магов, которые любят исследовать новые способы поджигать вещи."
"This would be presentable if you were very clever with the presentation.\n\n(Use in Cheap Meat recipes.)": "Это было бы презентабельно, если бы вы очень умело подали его.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"An historic memento. You don't know what it means, but the right person will.\n\nUse this item to receive a hint about which NPC can identify it. Find that NPC and Gift them this item to convert it into a Memory Note.": "Исторический сувенир. Вы не знаете, что он означает, но нужный человек поймёт.\n\nИспользуйте этот предмет, чтобы получить подсказку о том, какой NPC может его опознать. Найдите этого NPC и подарите ему этот предмет, чтобы превратить его в Записку-память."
"Teaches you how to tame rats of any size. It's all in how you wave the cheese at them.": "Обучает тому, как приручать крыс любого размера. Всё дело в том, как вы машете перед ними сыром."
"Thick layers of hide and fur make these boots quite warm.": "Толстые слои кожи и меха делают эти сапоги очень тёплыми."
"It's gotten a bit frayed from use, but it's still thick and warm.": "Оно немного изношено от использования, но всё ещё плотное и тёплое."
"Warmth is the key goal here. They're a little clumsy, but not enough to complain about.": "Главная задача — сохранить тепло. Они немного громоздкие, но не настолько, чтобы жаловаться."
"Warm, warm, warm. A little smelly. But warm!": "Теплый, теплый, теплый. Немного воняет. Но тепло!"
"Not really that comfortable unless you're in a blizzard, but then they are really cozy.": "Не слишком удобные, если только вы не в метели, но тогда они действительно тёплые."
"The damaged remains of an intellect-enhancement helmet.": "Повреждённые остатки шлема для усиления интеллекта."
"A fae fish that's been genetically altered to survive here and slowly kill the ocean. It's cold to the touch, and quite inedible.": "Фея-рыба, генетически изменённая для выживания здесь и медленного уничтожения океана. На ощупь холодная и совершенно несъедобная."
"An invisible pair of boots, designed to force others to look at your bare feet whether they want to or not. Useful in glamouring.": "Невидимая пара сапог, созданная, чтобы заставить других смотреть на ваши босые ноги, хотят они того или нет. Полезно для гламуринга."
"A pair of invisible gloves, for protecting your hands while still showing them off. Useful in glamouring.": "Пара невидимых перчаток, чтобы защитить руки и при этом показать их. Полезны для гламуринга."
"An invisible hat, or so the wearer would have you believe. Useful in glamouring.": "Невидимая шляпа, или, по крайней мере, так хочет, чтобы вы думали её носитель. Полезна для создания гламура."
"A pair of invisible pants, so when you are inevitably kicked out of establishments you can still tell all of your friends that you were technically wear pants. Useful in glamouring.": "Пара невидимых штанов, чтобы, когда вас неизбежно выгонят из заведений, вы всё равно могли сказать всем своим друзьям, что технически вы были в штанах. Полезно для гламуринга."
"An invisible shirt, perfect for the budding exhibitionist. Useful in glamouring.": "Невидимая рубашка, идеально подходит для начинающего эксгибициониста. Полезна при наложении гламура."
"\"Payment: 3 RTC\nTo: Tal-Saka (outcast rakshasa)\nReason: assistance in interpreting notes about Transmutation.\"\n\nIt's been formally approved by a Lt. Flakis.": "Оплата: 3 RTC\nКому: Тал-Сака (изгой ракшаса)\nПричина: помощь в расшифровке заметок о Трансмутации.\n\nЭто было официально одобрено лейтенантом Флакисом."
"A golden ring etched to resemble a small, long dragon.": "Золотое кольцо с гравировкой в виде маленького длинного дракона."
"A horrifically deadly mushroom.": "Ужасно смертельный гриб."
"A pile of powdered Iocaine mushrooms. This is a deadly toxin to almost all life forms.": "Горсть порошка из грибов иокаина. Это смертельный яд для почти всех форм жизни."
"A carefully tweaked dose of iocaine powder, designed to make you very ill but not kill you, allowing the body to build up resistance to the deadly toxin.": "Тщательно отрегулированная доза порошка йокаина, предназначенная вызвать сильное недомогание, но не убить, позволяя организму выработать сопротивляемость смертельному яду."
"A chunk of dense (yet brittle) iridium. It's used in the creation of acid-proof armor and strange robotic constructs. It can also be used to augment jewelry.": "Кусок плотного (но хрупкого) иридия. Используется для создания кислотоустойчивой брони и странных роботизированных конструкций. Также может использоваться для улучшения украшений."
"This high-quality fishing hook was made by an expert blacksmith.": "Этот высококачественный рыболовный крючок был изготовлен опытным кузнецом."
"Smithed from iron, these washers are used in making and maintaining orcish traps.": "Кузнечно изготовленные из железа, эти шайбы используются при создании и обслуживании орочьих ловушек."
"Bits of ground up hippo hair. Very itchy.": "Кусочки измельчённой шерсти бегемота. Очень зудит."
"This admin-created utility potion repairs all items in your inventory that are broken due to deaths while in Hardcore mode.": "Это зелье, созданное администратором, восстанавливает все предметы в вашем инвентаре, которые были повреждены из-за смерти в режиме Хардкор."
"Dye used to color a piece of clothing or armor ivory.": "Краска, используемая для окрашивания одежды или брони в цвет слоновой кости."
"This rhino horn is made of ivory. You could have sworn rhino horns were made of hardened fat, but nope, clearly you were wrong.": "Этот рог носорога сделан из слоновой кости. Ты мог поклясться, что рога носорогов сделаны из затвердевшего жира, но нет, очевидно, ты ошибался."
"These spider mandibles seem to be made of ivory! What will nature think of next?": "Эти паучьи мандибулы, кажется, сделаны из слоновой кости! Что же природа придумает дальше?"
"It's a gross ivory spoon. Worth something to somebody... but not to you.": "Это отвратительная слоновая ложка. Для кого-то она что-то значит... но не для тебя."
"Created by an alchemist/farmer to protect her legs in the fields, these pants are great at keeping nature off of you. Too bad about the odor...": "Созданные алхимиком/фермером для защиты ног в полях, эти штаны отлично защищают от природы. Жаль только запах..."
"A classic scary carved pumpkin.": "Классическая страшная вырезанная тыква."
"Spooky Banner": "Жуткое знамя"
"This buckle has a depiction of Jake the Buckler holding a hammer. It's not very impressive, but a strange magic is keeping the buckle from decaying or breaking. Perhaps it'd make a good backup buckle.": "На этой пряжке изображён Джейк Щитоносец, держащий молот. Она не выглядит впечатляюще, но странная магия не даёт пряжке разрушиться или прийти в негодность. Возможно, это будет хорошая запасная пряжка."
"This belt buckle has a little terrible depiction of you on it, standing next to Jake the Buckler. An eagle soars above you and a lion appears to be cooking you dinner.\n\nThis buckle quickly decays when worn in combat until it disappears.": "На этой пряжке изображён твой небольшой ужасный портрет рядом с Джейком Щитоносцем. Над вами парит орёл, а лев, похоже, готовит тебе ужин.\n\nЭта пряжка быстро разрушается при ношении в бою, пока не исчезает."
"Dwarven in design and quite heavy. Insulated against cold, though.": "Гномий дизайн и довольно тяжёлые. Однако утеплены от холода."
"Brand new, but of an old dwarven design. The lack of fire-retardant is a problem with this sort of gear, but otherwise it's quite impressive.": "Совершенно новый, но выполнен в старом гномьем стиле. Отсутствие огнеупорности — проблема для такого снаряжения, но в остальном он весьма впечатляющий."
"Definitely dwarven in design, but relatively dainty for dwarven gear.": "Определённо гномий дизайн, но относительно изящные для гномьего снаряжения."
"While doubtlessly dwarven in design, this helmet seems light. There is extra insulation against cold.": "Хотя этот шлем несомненно выполнен в гномьем стиле, он кажется лёгким. В нём есть дополнительная изоляция от холода."
"A classic dwarven military design. While it has down sides, the upside is incredible durability.": "Классический дизайн гномьей военной экипировки. Несмотря на некоторые недостатки, главным преимуществом является невероятная прочность."
"A new sword made in a very old dwarven style. It has a glyph that must be the Eltibule crest.": "Новый меч, сделанный в очень старом гномьем стиле. На нем есть глиф, который, должно быть, является гербом Элтибула."
"A magical prize given to the first-place horse in the decennial Jamurra Derby.": "Волшебный приз, вручаемый лошади, занявшей первое место в десятигодичном Джамурра Дерби."
"An Elven Longsword that has been customized and modified by an expert. Dozens of little lines have been scratched into the blade, suggesting perhaps that the weapon has been used to kill a great many of something.": "Эльфийский длинный меч, который был настроен и модифицирован экспертом. Десятки маленьких линий выцарапаны на лезвии, что, возможно, указывает на то, что оружие использовалось для убийства множества чего-то."
"A potent chemistry tool -- or weapon. Yeah, let's go with weapon.": "Мощный химический инструмент — или оружие. Да, пусть будет оружие."
"Named by a bard who was having a bad day, this jaunty hat is actually pretty despair-free. A symbol of Arisetsu was added as a tassle by a later owner.": "Названная бардом, который переживал плохой день, эта весёлая шляпа на самом деле совсем не вызывает отчаяния. Позже владелец добавил символ Арисэцу в виде кисточки."
"A handful of sugar-encrusted gummy blobs. Technically each color has a distinct flavor, but not really. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Горсть покрытых сахаром желейных комочков. Технически каждый цвет имеет свой вкус, но на самом деле нет. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"An elvish invention. A single fist-sized cube of this will keep you from being hungry all day. Although supposedly \"jerky\" flavored, there is no meat involved in the recipe and it actually tastes sort of like a fruitcake.": "Эльфийское изобретение. Один куб размером с кулак этого продукта избавит вас от голода на весь день. Хотя он и называется «вяленым», в рецепте нет мяса, и на вкус он скорее напоминает фруктовый кекс."
"Handmade by a fairy, this staff is embarrassingly dainty.": "Сделанный феей вручную, этот посох удивительно изящен."
"An ornately jeweled hairpin used by goblins of both sexes.": "Изысканная украшенная драгоценностями шпилька для волос, используемая гоблинами обоих полов."
"From burs to brushes, screws to setting tools, it's all in here.": "От боров до щёток, от винтов до инструментов для закрепки — всё здесь."
"Teaches you to make a necklace that can serve as a priest's holy symbol.": "Обучает созданию ожерелья, которое может служить святым символом жреца."
"Teaches you to make a necklace that can activate a necromancer's rituals.": "Обучает созданию ожерелья, способного активировать ритуалы некроманта."
"Teaches you to make a simple chain featuring two decorative gems.": "Обучает созданию простой цепочки с двумя декоративными драгоценными камнями."
"Teaches you to make a simple, beautiful, magical ring.": "Учитесь создавать простое, красивое магическое кольцо."
"Teaches you to make a bizarre \"ring\" that allows pigs to perform feats of Battle Chemistry.": "Обучает созданию странного «кольца», позволяющего свиньям выполнять подвиги Боевой Химии."
"Teaches you to make a lovely ring fashionable with the Winter Court.": "Обучает созданию прекрасного кольца, модного при Зимнем Дворе."
"Teaches you an ancient elven jewelry improvement technique. It seems to requiring a near-mythical piece of jewelry and expensive resources for minor gains.": "Обучает древней эльфийской технике улучшения ювелирных изделий. Похоже, требует почти мифического украшения и дорогих ресурсов для незначительных улучшений."
"Teaches you to make a magic ring from otherworldly material.": "Обучает созданию магического кольца из потустороннего материала."
"This is a basic sword that Joeh custom-modded over the years. It has a unique hilt and \"speed stripes\" painted on the blade. Joeh had an entire joke routine planned for when someone asked him what the stripes were for, but nobody ever did.": "Это простой меч, который Джоэ модифицировал на протяжении многих лет. У него уникальная рукоять и «полосы скорости», нарисованные на лезвии. Джоэ подготовил целый шутливый ответ на вопрос о назначении полос, но никто так и не спросил."
"This bardic instrument has a lovely, uplifting sound that makes it fun to play.": "Этот бардовый инструмент издаёт прекрасный, воодушевляющий звук, который делает игру на нём увлекательной."
"The life's work of dwarven blacksmith Jott Battlestar, who claimed it contains a shred of the essence of a star.": "Вершина творчества гномьего кузнеца Джотта Батлстара, который утверждал, что в нём содержится частица сущности звезды."
"A note in a jaggy, hurried handwriting. It says,\n\n\"Test is still underway. I have passed the Combat and Teleportation trials, but I can't figure out how to get into the locked chest with the altars around it. I used Divination, but the only answer I got was 'SEWN'.\n\nI still have my secret weapon: a Potion of Brilliance. Will drink it if necessary, but leaving it here for now.\"": "Записка с резким, поспешным почерком. В ней говорится,\\n\\n«Тест всё ещё продолжается. Я прошёл испытания в бою и телепортации, но не могу понять, как открыть запертый сундук с алтарями вокруг. Я использовал Гадание, но единственный ответ, который получил, — «SEWN».\\n\\nУ меня всё ещё есть моё секретное оружие: Зелье Блеска. Выпью его при необходимости, но пока оставляю здесь."
"A sage's personal diary. It doesn't contain any useful lore or anything, it's just ramblings about his personal life.": "Личный дневник мудреца. В нём нет полезных знаний или чего-то подобного, это просто размышления о его личной жизни."
"Cured pig meat with a touch of sugar and a hint of cloves.": "Вяленое свиное мясо с ноткой сахара и оттенком гвоздики."
"A jumbo version of a normal sparkler. When you strike it against a hard surface it sparkles for a few seconds, and makes you feel extra patriotic.": "Большая версия обычного бенгальского огня. Когда вы ударяете его о твёрдую поверхность, он искрится несколько секунд и заставляет вас чувствовать себя особенно патриотично."
"Used by the goblin necromancer Jumjab. It contains two different necromancy gems, in case one gets shattered in combat.": "Используется гоблинским некромантом Джамджабом. Содержит два разных некромантских камня на случай, если один разобьётся в бою."
"Thick smelly gloves that the goblin Jumjab augmented. A Necromancy gem has been embedded into the right palm.": "Толстые вонючие перчатки, которые модифицировал гоблин Джамджаб. В правую ладонь вмонтирован камень Некромантии."
"Not really berries at all, these are actually seed cones with some bitter mushy stuff on the end. Useful as a spice and flavoring in brewing.": "На самом деле это не ягоды, а семенные шишки с горькой мягкой массой на конце. Полезны как специя и ароматизатор в пивоварении."
"A dry wine. It has a slightly piney smell, but the aroma is not pleasant.": "Сухое вино. Имеет слегка хвойный запах, но аромат неприятный."
"Etched with the symbols of Dreva and carved of an unknown wood, these animal shoes radiate authority over nature. Only a cow, pure of heart, could wear these.": "Украшенные символами Древы и вырезанные из неизвестного дерева, эти животные башмаки излучают власть над природой. Только корова с чистым сердцем могла бы носить их."
"The brain of a demonic Justiciar. It shocks you every time you handle it.": "Мозг демонического юстициара. Он поражает вас током каждый раз, когда вы его трогаете."
"Fluid that's been siphoned out of a Demon Justiciar's spine. It crackles with electricity.": "Жидкость, откачанная из позвоночника демонического юстициара. Искрит электричеством."
"It contains a bunch of little hand-made badges. They don't look valuable.": "В ней содержится множество маленьких сделанных вручную значков. Они не выглядят ценными."
"An exotic filleting tool, only for fishing experts.": "Экзотический инструмент для разделки рыбы, только для опытных рыбаков."
"It says, \"Karnag, your family loves you. Please don't do this to yourself! There must be another way. You will miss your son's first words...\" the rest is scribbled out except a bit at the bottom written in a different style, \"Karnag Has Graduated Wizard School! Signed my mother.\"": "Здесь написано: «Карнаг, твоя семья любит тебя. Пожалуйста, не делай этого с собой! Должен быть другой выход. Ты пропустишь первые слова своего сына...» остальное зачеркнуто, кроме небольшой записи внизу, выполненной другим почерком: «Карнаг окончил школу волшебников! Подпись: моя мать.»"
"This potion uses very spicy ingredients to distract you from the very disgusting other ingredients.": "Этот напиток использует очень острые ингредиенты, чтобы отвлечь вас от очень отвратительных других компонентов."
"A metal tube with a closeable valve. Used on alcohol barrels to make them easier to use. It is not reusable.": "Металлическая трубка с закрывающимся клапаном. Используется на бочках с алкоголем, чтобы облегчить их использование. Не подлежит повторному использованию."
"Use this item to deploy a Keg of Love which will explode and spread its love to everyone around it within 20 meters.": "Используйте этот предмет, чтобы установить Бочку Любви, которая взорвётся и распространит свою любовь на всех вокруг в радиусе 20 метров."
"Made by someone with potent magics and very poor knitting skills, this coat is also unfortunately woven of dog hair and is rather uncomfortable. An inscription inside says \"K2togYO\"": "Сделанное кем-то с мощной магией и очень плохими навыками вязания, это пальто, к сожалению, соткано из собачьей шерсти и довольно неудобно. Внутри есть надпись \"K2togYO\""
"Flexible kelp material worn by ranalon. It smells exactly like you'd expect.": "Гибкий материал из ламинарии, который носят раналоны. Пахнет ровно так, как вы и ожидаете."
"Skintight clothing worn by ranalon. It's remarkably stretchy.": "Обтягивающая одежда, которую носят раналоны. Она удивительно эластична."
"Tight dried-kelp gloves worn by ranalon. They're a little itchy.": "Плотные перчатки из высушенных водорослей, которые носит раналон. Немного колются."
"Skintight tights worn by ranalon. Their creation method is a mystery to outsiders.": "Обтягивающие леггинсы, которые носят раналоны. Метод их создания остаётся загадкой для посторонних."
"Skintight shoes worn by ranalon. Their creation method is a mystery to outsiders.": "Обтягивающие ботинки, которые носят раналоны. Метод их создания остаётся загадкой для посторонних."
"Dye used to color a piece of clothing or armor khaki.": "Краска, используемая для окрашивания одежды или брони в цвет хаки."
"A small orcish utility knife, a little too short to be useful as a weapon. A few years ago, these were a fashionable accessory in Statehelm, but the fad has died out now.  ( Not to be confused with the orcish Khopesh, which is a very dangerous sword.)": "Небольшой орочий универсальный нож, немного слишком короткий, чтобы быть полезным в качестве оружия. Несколько лет назад это был модный аксессуар в Стейтхелме, но теперь мода прошла.  (Не путать с орочьим копешем, который является очень опасным мечом.)"
"This notebook contains arcane sigils in a strange code.": "Этот блокнот содержит арканные символы в странном коде."
"Teaches you how to perform Unarmed kicks. Only useful if you somehow managed to get turned into an animal before learning the Unarmed Kick ability. (Raises your Unarmed skill to 1 if it isn't already.)": "Обучает вас выполнению ударов ногой без оружия. Полезно только если вы каким-то образом превратились в животное до того, как изучили способность Удар ногой без оружия. (Повышает ваш навык Безоружного боя до 1, если он ещё не достиг этого уровня.)"
"A mid-sized cask used for food and drink production.": "Бочка среднего размера, используемая для производства еды и напитков."
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 10 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 10 часов. (Вам не нужно всё это время оставаться в пещере или быть онлайн.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 8 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 8 часов. (Вам не нужно находиться в пещере или быть онлайн всё это время.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 7 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 7 часов. (Вам не нужно всё это время находиться в пещере или быть в сети.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 5 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поставить в прохладную, влажную пещеру. Сыр внутри созреет через 5 часов. (Вам не нужно всё это время находиться в пещере или быть онлайн.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 6 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 6 часов. (Вам не нужно всё это время находиться в пещере или быть онлайн.)"
"A key that once belonged to a rakshasa named Kimeta.": "Ключ, который когда-то принадлежал ракшасе по имени Кимета."
"It tastes crunchy and unpleasant. As a side-effect, it's extremely difficult to relax while under the effect of this potion.": "На вкус хрустящее и неприятное. Побочный эффект — крайне сложно расслабиться под действием этого зелья."
"Can be studied to earn Knife Fighting XP. (Requires VIP.)": "Можно изучать для получения опыта в ножевом бою. (Требуется VIP.)"
"Teaches you a knife fighting technique.": "Обучает технике боя ножом."
"Teaches you a technique for dual-wielded knives.": "Обучает технике владения двумя ножами."
"The best armor ever! Oh, except it rusts easily, squeaks a lot, is hot in the summer and cold in the winter, very uncomfortable, and particularly prone to lightning damage. And also it's not the best armor in terms of armor capacity. But ... but it's not bad.": "Лучший доспех на свете! О, кроме того, что он легко ржавеет, сильно скрипит, жарко летом и холодно зимой, очень неудобен и особенно уязвим к урону от молний. И ещё он не лучший по вместимости брони. Но... но он неплох."
"Knights love this sort of thing. Hope they don't go out in a thunderstorm though...": "Рыцари обожают такие вещи. Только бы они не вышли в грозу..."
"A small journal filled with notes on your investigation of Korbok the Goblin in Vidaria.": "Небольшой журнал с заметками о вашем расследовании Корбока, гоблина из Видарии."
"Made from the tender tentacles of young kraken, this meal is quite the delicacy.": "Приготовленное из нежных щупалец молодого кракена, это блюдо — настоящее лакомство."
"A hypothetical recipe designed by a Gazluk sage. He never tested it due to a lack of kraken parts, so he doesn't know how incredibly vile it smells.": "Гипотетический рецепт, разработанный мудрецом Газлука. Он никогда не испытывал его из-за отсутствия частей кракена, поэтому не знает, насколько ужасно оно пахнет."
"A bit of tentacle from a kraken.": "Часть щупальца кракена."
"Collects some information about a large supply of metal in or around Kur Mountains.": "Собирает информацию о большом запасе металла в горах Кур или рядом с ними."
"Records the location of a mineral deposit in or around Kur Mountains.": "Фиксирует местоположение месторождения минералов в горах Кур или поблизости."
"A strange organ cut out of a kuvou corpse.": "Странный орган, вырезанный из трупа кувоу."
"A slimy three-pronged tongue from a kuvou corpse.": "Скользкий трёхзубчатый язык с трупа куву."
"Lac is secreted from some types of insects, most notably the lac insect. It is used in creating shellac, which is a versatile crafting resource.": "Лак выделяется некоторыми видами насекомых, особенно насекомым лаковой щитовки. Он используется для создания шеллака, который является универсальным ремесленным ресурсом."
"A long piece of lovely decorative lace.": "Длинный кусок прекрасного декоративного кружева."
"This key was found on the corpse of a hag.": "Этот ключ был найден на теле ведьмы."
"A raw hideous blood-sucking parasite fish.": "Сырое отвратительное кровососущее паразитическое рыбообразное."
"A soft blue rock. It's useful in curatives and curse removal potions.\n\nAssociated Primary Skill: Priest\nAssociated Secondary Skill: Alchemy": "Мягкий голубой камень. Полезен в лечебных и противосглазных зельях.\n\nСвязанный основной навык: Жрец\nСвязанный вторичный навык: Алхимия"
"A liquidy cheese with small curds and a sweet taste.\n\nCheese Type: Fresh (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жидковатый сыр с мелкими сгустками и сладким вкусом.\n\nТип сыра: Свежий (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"The preserved skull of a pretty large animal.": "Сохранённый череп довольно крупного животного."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on chest armor.": "Немного магического остатка, используемого при создании улучшений 61-90 уровня для нагрудной брони."
"The shell of a deceased snail. This is an especially large and pretty shell.": "Раковина умершей улитки. Это особенно большая и красивая раковина."
"A palm-sized chunk of hardened dinosaur hide.": "Кусок затвердевшей шкуры динозавра размером с ладонь."
"A large dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Большой дракон. Люди, которые на него смотрят, будут смутно вдохновлены создавать лучшее. Действует 5 минут после установки."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on gloves.": "Часть магического остатка, используемого при создании улучшений 61-90 уровня для перчаток."
"A large dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Большой дракон, покрытый золотом. Люди, которые на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A large gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Большой грифон, покрытый золотом. Те, кто на него смотрят, будут вдохновлены убивать лучше. Длится 10 минут после установки."
"A large gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Большой грифон. Люди, которые на него смотрят, будут смутно вдохновлены лучше убивать. Действует 5 минут после установки."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on helmets.": "Немного магического остатка, используемого при создании улучшений 61-90 уровня для шлемов."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on leg armor.": "Немного магического остатка, используемого при создании улучшений 61-90 уровня для ножной брони."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on main-hand weapons.": "Часть магического остатка, используемая для создания усилений уровня 61-90, которые надеваются на оружие основной руки."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on necklaces.": "Немного магического остатка, используемого для создания улучшений 61-90 уровней, которые надеваются на ожерелья."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on off-hand equipment.": "Часть магического остатка, используемая при создании улучшений 61-90 уровня для снаряжения второй руки."
"A fairly large crystalline prism. Transmuters use these to guide phlogiston into or out of an item.": "Довольно крупная кристаллическая призма. Трансмутаторы используют её для направления флогистона в предмет или из него."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on rings.": "Немного магического остатка, используемого при создании улучшений 61-90 уровней для колец."
"A bit of magical runoff used in the creation of level 61-90 Augments that go on boots.": "Немного магического остатка, используемого при создании улучшений 61-90 уровня, которые надеваются на ботинки."
"A large dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Большой дракон, покрытый серебром. Люди, которые на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A large gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Большой грифон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены убивать лучше. Длится 10 минут после установки."
"A really big, eerily preserved strawberry": "Очень большая, жутко хорошо сохранившаяся клубника"
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдавать до 1000 предметов одного вида."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item.": "Сложное устройство, способное выдавать предметы и принимать валюту. Эта модель может продавать до 1000 единиц одного вида предмета."
"Smells like leaves.": "Пахнет листьями."
"Pleasantly hot.": "Приятно горячее."
"Smells like ground-up bees. (Pity you know what that smells like.)": "Пахнет как растёртые пчёлы. (Жаль, что вы знаете, как это пахнет.)"
"Touching it gives an unpleasant static shock.": "Прикосновение вызывает неприятный статический разряд."
"Makes your fingers tingle when you touch it.": "Заставляет пальцы покалывать, когда вы его касаетесь."
"Pleasantly warm.": "Приятно тёплое."
"A tiny tart with cinnamon-pumpkin filling.": "Миниатюрный пирог с начинкой из корицы и тыквы."
"Laura's Neth's melt-in-your-mouth cheese biscuits are to die for. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сырные печенья Лауры Нета тают во рту и просто восхитительны. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Beets and cheese!": "Свёкла и сыр!"
"They may look like a light snack at first glance, but these biscuits are meaty and filling enough for a hearty meal.": "На первый взгляд они могут показаться лёгкой закуской, но эти печенья мясистые и сытные, чтобы стать полноценным обедом."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +40 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +40 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"Apparently once used by Lawara, an elf you met in on an island. It's high-quality, and has a custom hand plate that provides a bit of shielding.": "По всей видимости, когда-то использовался Лаварой, эльфом, с которым вы встретились на острове. Это высококачественный лук с индивидуальной накладкой на руку, обеспечивающей небольшую защиту."
"Lawara the amnesiac was wearing this when she first awoke. It clearly used to be something special, but now it's barely holding together.": "Лавара, страдающая амнезией, носила это, когда впервые очнулась. Очевидно, что раньше это было нечто особенное, но теперь оно едва держится вместе."
"\"Twenty godlings in the ground,\nTwenty more in air surround,\nOne was killed in demon fire,\nTwo were banished to the mire.\"": "Двадцать божественных детей в земле,  \nЕщё двадцать в воздухе вокруг,  \nОдин погиб в демоническом огне,  \nДвое изгнаны в трясину."
"A small painted statue of a goblin. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Небольшая раскрашенная статуэтка гоблина. Вероятно, изначально была частью детской игрушечной армии. Выглядит антикварной, но не слишком ценной."
"A small painted statue of a hag. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Небольшая раскрашенная статуэтка ведьмы. Вероятно, изначально была частью детской игрушечной армии. Выглядит антикварной, но не очень ценной."
"A small painted statue of a skeleton. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Небольшая раскрашенная статуэтка скелета. Вероятно, изначально была частью детской игрушечной армии. Выглядит антикварной, но не очень ценной."
"A small statuette of a wizard in battle armor, his arm outstretched as he casts a spell. It was probably originally part of a child's toy set. Looks antique, but only moderately valuable.": "Небольшая статуэтка мага в боевой броне, с вытянутой рукой, произносящего заклинание. Вероятно, изначально была частью детского набора игрушек. Выглядит старинной, но имеет лишь умеренную ценность."
"A small painted statue of an ogre. It was probably originally part of a child's toy army. Looks antique, but not very valuable.": "Небольшая раскрашенная статуэтка огра. Вероятно, изначально была частью детской игрушечной армии. Выглядит антикварной, но не очень ценной."
"Made from a sea-snail shell, this instrument has an ominous tone.": "Сделанный из раковины морского улитки, этот инструмент издаёт зловещий звук."
"This is slightly louder than a normal lute, allowing more effective rallying.": "Она звучит немного громче обычной лютни, что позволяет эффективнее собирать союзников."
"An attractive longshield. The symbols on the back say \"Lead Without Fear\" in elvish.": "Привлекательный длинный щит. Символы на обратной стороне гласят «Веди без страха» на эльфийском."
"An elvish drink. Not quite tea, and not quite fruit juice, but something in between. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Эльфийский напиток. Не совсем чай и не совсем фруктовый сок, а нечто среднее. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A potent weapon used by Leafmasters, Stormmasters, and other guardians of elven society.": "Мощное оружие, используемое Листомастерами, Шторммастерами и другими защитниками эльфийского общества."
"Woven with fairy magic, this lovely shirt regenerates its leaves continuously. Unfortunately it is extremely itchy to wear. But noone said safety and comfort had to go hand in hand, so stop complaining.": "Сплетённая с помощью фейской магии, эта прекрасная рубашка постоянно восстанавливает свои листья. К сожалению, её очень зудит при ношении. Но никто не говорил, что безопасность и комфорт должны идти рука об руку, так что перестаньте жаловаться."
"A small clay-fired pot. It has long cracks that make it less than ideal for holding water, but maybe somebody could patch it up or something. Just... not you.": "Небольшой глиняный горшок, обожжённый на огне. В нём длинные трещины, из-за которых он не очень подходит для хранения воды, но, может быть, кто-то сможет его починить или что-то в этом роде. Просто... не ты."
"Tiny foot coverings for an infant.": "Крошечные обувки для младенца."
"A handkerchief made of leather. Which is to say a terrible handkerchief.": "Платок, сделанный из кожи. То есть ужасный платок."
"Bits of prepared leather, useful in many ways.": "Кусочки подготовленной кожи, полезные во многих случаях."
"Can be studied to earn Leatherworking XP. (Requires VIP.)": "Можно изучать для получения опыта в Кожевенном деле. (Требуется VIP.)"
"Teaches you how to make evasive boots.": "Обучает изготовлению сапог для уклонения."
"Teaches you how to make agile pants.": "Обучает созданию ловких штанов."
"Teaches you how to make swift and elegant leather chest armor.": "Обучает созданию лёгкой и элегантной кожаной нагрудной брони."
"Teaches you an advanced leatherworking technique.": "Обучает вас продвинутой технике кожевенного дела."
"Teaches you how to make leather boots.": "Учится создавать кожаные сапоги."
"Teaches you how to make leather pants.": "Обучает изготовлению кожаных штанов."
"Teaches you how to make elegant leather chest armor.": "Обучает созданию элегантной кожаной нагрудной брони."
"Teaches you how to make winter boots with heavy insulation.": "Обучает изготовлению зимних ботинок с усиленной теплоизоляцией."
"Teaches you how to make warm pants.": "Учится создавать тёплые штаны."
"Teaches you how to make cold-resistant and elegant leather chest armor.": "Обучает созданию холодостойкой и элегантной кожаной нагрудной брони."
"Teaches you how to make dodgy pants.": "Учится делать неуклюжие штаны."
"This metal armor can shift the wearer's weight automatically to ensure they don't fall over.": "Эта металлическая броня автоматически перераспределяет вес носителя, чтобы он не падал."
"It's been flavored up with some cranberry sauce.": "Он приправлен клюквенным соусом."
"A strange magical cube. It can be used to give leg armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить бонусную магическую способность к броне для ног. Посетите торговца снаряжением (или игрока-усилителя), чтобы установить его."
"The legacy is one of rusting quietly in a cave for hundreds of years. A faded symbol of Arisetsu makes the gloves slightly warm to the touch.": "Наследие — это тихая ржавчина в пещере на протяжении сотен лет. Потускневший символ Арисэцу делает перчатки слегка тёплыми на ощупь."
"An elvish invention. A single fist-sized cube of this will keep you from being hungry all day. It tastes like fruitcake.": "Эльфийское изобретение. Один куб размером с кулак этого хлебца избавит вас от голода на весь день. На вкус напоминает фруктовый кекс."
"A bright yellow lemon.": "Ярко-жёлтый лимон."
"We be lemon pirates, Arrrrr!": "Мы лимонные пираты, Арррр!"
"Aggressively sour!": "Агрессивно кислый!"
"Dye used to color a piece of clothing or armor lemon chiffon.": "Краска, используемая для окрашивания одежды или брони в цвет лимонного шифона."
"Drape your mount in glorious lemons!": "Оберните своего скакуна в великолепные лимоны!"
"A slice of delicious lemon custard topped with fluffy meringue, all baked to perfection. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Кусочек вкусного лимонного заварного крема с пушистой меренгой сверху, всё идеально запечено. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Perhaps the best way to eat flounder. The fish is complemented perfectly by the sour lemon, with a bit of heat from the pepper.": "Возможно, лучший способ съесть камбалу. Рыба идеально сочетается с кислым лимоном и легкой остротой перца."
"A fluffy pastry that's not too sweet. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Пушистая выпечка, которая не слишком сладкая. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Shaved ice flavored with lemon juice. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом лимонного сока. Это угощение нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Delicious! The butter brings out the flavor of the fish, and the lemon accentuates it.": "Вкуснотища! Масло подчёркивает вкус рыбы, а лимон его усиливает."
"Baked with a delicate lemon glaze. Delicious!": "Запечённая с нежной лимонной глазурью. Вкуснотища!"
"It looks and tastes like turkey ... more or less. The lemon glaze is sweet and a little tart. ": "Выглядит и на вкус напоминает индейку... более или менее. Лимонная глазурь сладкая и немного кисловатая."
"These lenses fit in the eyes of deer, giving them glowing red eyes. You must be a deer to wear this.": "Эти линзы надеваются на глаза оленей, придавая им светящиеся красные глаза. Чтобы носить их, вы должны быть оленем."
"The brain of a deceased demonic Behemoth, of the Lesser variety.": "Мозг умершего демонического Бегемота, младшего типа."
"A hacked-off wing from a Lesser Behemoth. No matter how roughed up it gets, it still quickly regenerates.": "Отрубленное крыло Младшего Бегемота. Как бы его ни избивали, оно всё равно быстро регенерируется."
"\"I don't know who you are, but you've got a lot of nerve using my storage box without permission. I sold all your stuff.\"\n\n - Ivyn": "Я не знаю, кто ты, но у тебя хватает наглости пользоваться моим ящиком для хранения без разрешения. Я продала все твои вещи.»\\n\\n— Айвин"
"It's a sealed letter addressed to \"High Stormmaster Merriana.\"": "Это запечатанное письмо, адресованное «Верховной шторммастер Мерриане»."
"It claims that the holder of this letter is entitled to one fiftieth (1/50) of a door opening, or one tenth (1/10) of a free magical scroll. It doesn't say how one would redeem the letter, however.": "В нём говорится, что владелец этого письма имеет право на одну пятидесятую (1/50) открытия двери или одну десятую (1/10) бесплатного магического свитка. Однако не указано, как именно можно обменять это письмо."
"It claims that the holder of this letter is entitled to nothing. Absolutely nothing.": "В нём говорится, что владелец этого письма не имеет права ни на что. Абсолютно ни на что."
"It's a note to Landri the Cold, an elf in Kur Mountains. It reads, \"You have not met me, and I cannot reveal myself, but I am a fellow theoretician, and I beg your help. I believe I can tap a portal to other planes of existence, and the plane of ice is very accessible here. I intend to use the Galkun technique to open the wormhole, and power it via ordinary ice lichen.\" (The note goes on for some length, in increasing technical detail, before ending with a perfunctory request for verification of the plan.)": "Это записка Ландри Холодному, эльфу из Курских гор. В ней написано: «Ты меня не встречал, и я не могу раскрыться, но я тоже теоретик и прошу твоей помощи. Я верю, что могу открыть портал в другие планы бытия, и план льда здесь очень доступен. Я намерен использовать технику Галькуна для открытия червоточины и питать её обычным ледяным лишайником.» (Записка продолжается довольно подробно, с возрастающей технической детализацией, и заканчивается формальной просьбой подтвердить план.)"
"It says, \"Getting too old for this. Come home and inherit the bakery. You were always destined for this. And... I forgive you. Completely.\"": "В нем говорится: «Становлюсь слишком стар для этого. Возвращайся домой и наследуй пекарню. Ты всегда была предназначена для этого. И... я прощаю тебя. Полностью.»"
"A letter written by Sirine. You're supposed to give it to Yetta in Eltibule.": "Письмо, написанное Сирин. Ты должен передать его Йетте в Элтибуле."
"A bone key that fits in the special chest in Serbule for level 15-20 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровней 15-20. (Ищите за трактиром.)"
"A bone key that fits in the special chest in Serbule for level 30 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 30. (Ищи за таверной.)"
"A bone key that fits in the special chest in Serbule for level 40 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 40. (Ищи за таверной.)"
"A bone key that fits in the special chest in Serbule for level 50 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 50. (Ищи за таверной.)"
"A bone key that fits in the special chest in Serbule for level 60 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 60. (Ищи за таверной.)"
"A bone key that fits in the special chest in Serbule for level 70 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 70. (Ищи за таверной.)"
"A bone key that fits in the special chest in Serbule for level 80 loot. (Look behind the inn.)": "Костяной ключ, подходящий к специальному сундуку в Сербуле для добычи уровня 80. (Ищи за трактиром.)"
"An intoxicating aroma of autumn flavors mixed with potent hallucinogens.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Опьяняющий аромат осенних вкусов, смешанный с мощными галлюциногенами.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A small stone covered in special moss. Licking the moss gives ranalon a potent hallucinogenic effect. Other creatures experience a less-dramatic effect, but it's still notable.": "Небольшой камень, покрытый особым мхом. Лизание мха даёт Раналону мощный галлюциногенный эффект. Другие существа испытывают менее сильное воздействие, но оно всё равно заметно."
"Six different mushrooms make this a very stinky potion.": "Шесть разных грибов делают это зелье очень вонючим."
"The last pulse of blood from a dying mortal taken by a vampire. These few drops of blood contain a sliver of the victim's soul.": "Последний пульс крови умирающего смертного, забранный вампиром. Эти несколько капель крови содержат частицу души жертвы."
"Fun Guile happened to have this ring on when he became a fungus-man, and it allowed him to retain some pre-fungination memories. This created distrust among his brothers, leading to his cruel nickname.": "У Фана Гайла случайно было это кольцо, когда он превратился в грибного человека, и оно позволило ему сохранить некоторые воспоминания до грибного превращения. Это вызвало недоверие среди его братьев, что привело к его жестокому прозвищу."
"Dye used to color a piece of clothing or armor light cyan.": "Краска, используемая для окрашивания одежды или брони в светло-голубой цвет."
"Dye used to color a piece of clothing or armor light gray.": "Краситель, используемый для окрашивания одежды или брони в светло-серый цвет."
"Dye used to color a piece of clothing or armor light salmon.": "Краска, используемая для окрашивания одежды или брони в светло-лососевый цвет."
"Dye used to color a piece of clothing or armor light sea green.": "Краска, используемая для окрашивания одежды или брони в светло-морской зелёный цвет."
"Dye used to color a piece of clothing or armor light steel blue.": "Краска, используемая для окрашивания одежды или брони в светло-стальной синий цвет."
"A washed-rind cheese with a pungent odor and tangy taste.\n\nCheese Type: White": "Сыр с мытой коркой, резким запахом и острым вкусом.\\n\\nТип сыра: белый"
"Dye used to color a piece of clothing or armor lime.": "Краска, используемая для окрашивания одежды или брони в изумрудный цвет."
"Dye used to color a piece of clothing or armor lime green.": "Краситель, используемый для окрашивания одежды или брони в лаймовый цвет."
"Rugged cloth with an innate magical insulation.": "Прочный ткань с врождённой магической изоляцией."
"Dye used to color a piece of clothing or armor linen.": "Краска, используемая для окрашивания льняной одежды или брони."
"A special potion that works similar to a Fairy Soul Anchor. Drinking this potion will grant a Fairy immunity from the Fae death penalty in the zone you are anchored to.\n<b>IMPORTANT:</b> You must drink this potion BEFORE you die! The effect will dispel if you leave the zone you are anchored to or logout.": "Особое зелье, действующее аналогично Якорю души феи. Выпив это зелье, фея получит иммунитет к штрафу за смерть феи в зоне, к которой вы привязаны.  \n<b>ВАЖНО:</b> Вы должны выпить это зелье ДО своей смерти! Эффект исчезнет, если вы покинете зону привязки или выйдете из игры."
"Pop the top and chug it down for 24 hours of getting down! This foul tasting fizzy liquid will grant you super buffs for 24 hours of real time. This liquid will destablize and evaporate 60 days after it is created, so use it quickly!\nBuffs include: Combat & crafting xp. Extra fish, mushrooms, wood, seeds and fruit. Gardening bonus harvest chance. Survey and mining buffs. Training discount. Meal and snack time buffs. Vendor stall discount. NPC workorder bonus. Faster liver recovery.\n<b>IMPORTANT!</b>: There is no visible timer on these buffs, so be sure to note the time when you drink this!": "Открой крышку и выпей залпом, чтобы получить 24 часа веселья! Эта отвратительно вкусная газированная жидкость даст тебе супер баффы на 24 часа реального времени. Жидкость нестабильна и испарится через 60 дней после создания, так что используй её быстро!\\nБаффы включают: опыт в бою и ремёслах. Дополнительную рыбу, грибы, древесину, семена и фрукты. Повышенный шанс сбора урожая в садоводстве. Баффы на разведку и добычу. Скидку на обучение. Баффы времени приёма пищи и перекусов. Скидку на торговую лавку. Бонус к заказам NPC. Быстрое восстановление печени.\\n<b>ВАЖНО!</b>: На этих баффах нет видимого таймера, так что обязательно запомни время, когда выпьешь это!"
"Pop the top and chug it down for 48 hours of getting down! This foul tasting fizzy liquid will grant you super buffs for 48 hours of real time. This liquid will destablize and evaporate 60 days after it is created, so use it quickly!\nBuffs include: Combat & crafting xp. Extra fish, mushrooms, wood, seeds and fruit. Gardening bonus harvest chance. Survey and mining buffs. Training discount. Meal and snack time buffs. Vendor stall discount. NPC workorder bonus. Faster liver recovery.\n<b>IMPORTANT!</b>: There is no visible timer on these buffs, so be sure to note the time when you drink this!": "Открой крышку и выпей залпом, чтобы получить 48 часов веселья! Эта отвратительно вкусная газированная жидкость даст тебе супер баффы на 48 часов реального времени. Жидкость нестабильна и испарится через 60 дней после создания, так что используй её быстро!\\nБаффы включают: опыт в бою и ремёслах. Дополнительную рыбу, грибы, древесину, семена и фрукты. Повышенный шанс урожая в садоводстве. Баффы для разведки и добычи. Скидка на тренировки. Баффы времени приёма пищи и перекусов. Скидка на торговые лавки. Бонус к заказам NPC. Быстрое восстановление печени.\\n<b>ВАЖНО!</b>: На этих баффах нет видимого таймера, поэтому обязательно запомни время, когда выпьешь это!"
"This token was earned by participating in a live event. The live-event system no longer uses tokens like this, though, and now this token is just a reminder of fun times had.": "Этот жетон был получен за участие в живом событии. Однако система живых событий больше не использует такие жетоны, и теперь этот жетон служит лишь напоминанием о приятных моментах."
"Skillfully-cooked mystery snack. It's super fresh and tasty looking.": "Искусно приготовленный загадочный перекус. Выглядит очень свежим и аппетитным."
"A true masterpiece of potato-making. Well, actually, the potato itself is a little soggy. But the toppings are masterful!": "Настоящий шедевр картофелеварения. Хотя сам картофель немного размокший. Но начинки — просто мастерство!"
"A six-sided die with a hidden gizmo that causes it to land on the \"1\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с скрытым механизмом, из-за которого он выпадает на сторону с \"1\" в 50% случаев. Из-за неудачной инженерии гоблинов, всегда есть 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on the \"2\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с скрытым механизмом, который заставляет его выпадать на сторону с \"2\" в 50% случаев. Из-за неудачной инженерии гоблинов, всегда существует 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on the \"3\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с скрытым механизмом, из-за которого он выпадает на сторону с \"3\" в 50% случаев. Из-за неудачной инженерии гоблинов всегда есть 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on the \"4\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с тайным механизмом, из-за которого он выпадает на сторону с «4» в 50% случаев. Из-за неудачной инженерии гоблинов всегда есть 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on the \"5\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с скрытым механизмом, который заставляет его выпадать на сторону «5» в 50% случаев. Из-за неудачной гоблинской инженерии всегда есть 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on the \"6\" side 50% of the time. Due to unwise goblin engineering, there is always 4% chance the die explodes in a shower of acid when rolled.": "Шестигранный кубик с тайным механизмом, который заставляет его выпадать на сторону с «6» в 50% случаев. Из-за неудачной инженерии гоблинов всегда есть 4% шанс, что кубик взорвётся кислотным дождём при броске."
"A six-sided die with a hidden gizmo that causes it to land on one side more often than others. You'll have to roll it to figure out what it's weighted for.": "Шестигранный кубик с скрытым механизмом, из-за которого он чаще выпадает на одну сторону. Тебе придётся бросить его, чтобы понять, на какую сторону он сдвинут."
"A big chunk of glass infused with intellect-improving magic. You could use it on yourself to boost your intellect for a while.": "Большой кусок стекла, наполненный магией, улучшающей интеллект. Вы можете использовать его на себе, чтобы на время повысить интеллект."
"A blob of organic sentient tissue that you can kind of fit onto your head!": "Комок органической разумной ткани, который можно как бы надеть на голову!"
"A flimsy set of tools for picking locks. They'll break when used.": "Хлипкий набор инструментов для взлома замков. Они сломаются при использовании."
"The skull of a dead necromancer.": "Череп мёртвого некроманта."
"These are just cotton underclothes, but they're really well made!": "Это просто хлопковое нижнее белье, но оно действительно хорошо сшито!"
"Any beauty these leggings once possessed has long faded. But they still have an inner beauty, right?": "Вся красота, которую эти поножи когда-то имели, давно исчезла. Но внутри них всё ещё есть своя красота, не так ли?"
"This is a pair of \"Servant's Walkers\" boots that have been customized for extra speed.": "Это пара сапог «Служебные Ботинки», модифицированных для дополнительной скорости."
"This ticket entitles the bearer to a free game of Lootmaster Match-3 at the Red Wing Casino.": "Этот билет даёт право владельцу сыграть бесплатно в Лутмастер Матч-3 в казино Красное Крыло."
"This cunningly made flask is slightly askew, causing chemicals to spray everywhere. Only experts can hope to use it in combat.": "Этот хитро сделанный флакон слегка наклонён, из-за чего химикаты разбрызгиваются повсюду. Только эксперты могут надеяться использовать его в бою."
"A rapier-like weapon that also holds a strong cutting edge, this blade is the invention of Lord ErDrick, who was known for his expertise in defensive swordsmanship.": "Оружие, похожее на рапиру, но с острым режущим лезвием, этот клинок — изобретение лорда ЭрДрика, известного своим мастерством в защитном фехтовании."
"A very old locket with a portrait of a human woman painted inside. The artistic quality is quite high. It is engraved, \"Don't cry, but don't forget. Love always, Caroline.\"": "Очень старинный медальон с портретом человеческой женщины внутри. Художественное исполнение довольно высокое. На нем выгравирована надпись: «Не плачь, но не забывай. С любовью всегда, Каролина.»"
"Etched with the symbol of a long-lost elven family.": "Украшена гравировкой с символом давно забытой эльфийской семьи."
"It looks like a coin, and it's made of some strong metal, but it has no markings or denomination. Whatever it's for, it's very old.": "Похожа на монету, сделанную из прочного металла, но без каких-либо отметок или номинала. Для чего бы она ни была, она очень старая."
"A lost notebook by the prolific Council scribe Notus, who spent years devising innovative ways to catalog the world's knowledge. How these notebooks came to be 'lost' is a mystery, but a persistent rumor suggests that Notus himself threw them out in the street in disgust: too many petitioners refused to do their own research despite his excellent indexes. He soon regretted his actions, but the notebooks were already gone.\n\nNotus himself denies any such indiscretion and suggests that perhaps goblin cat-burglars stole the missing notebooks.": "Потерянный блокнот плодовитого писца Совета Нотуса, который годами разрабатывал инновационные способы каталогизации мировых знаний. Как эти блокноты оказались «потерянными» — загадка, но упорный слух гласит, что сам Нотус выбросил их на улицу в знак возмущения: слишком много просителей отказывались проводить собственные исследования, несмотря на его отличные указатели. Вскоре он пожалел о своём поступке, но блокноты уже исчезли.\n\nСам Нотус отрицает какую-либо оплошность и предполагает, что, возможно, пропавшие блокноты украли гоблинские кошачьи воры."
"It's a really long scroll written in Crone. Someone somewhere may want it...": "Это очень длинный свиток, написанный на языке Кроне. Кто-то где-то может захотеть его..."
"While many bards lamented Tennenbrandt University's shift away from music and toward combat magic, Lostt reveled in a newfound spotlight, for his music was known across many realms as being offensively bad.": "В то время как многие барды оплакивали отход Университета Тенненбрандта от музыки в сторону боевой магии, Лостт наслаждался новым вниманием, ведь его музыка была известна во многих мирах своей оскорбительной бездарностью."
"Made of painstakingly carved bone. It has very fine teeth for collecting insects out of hair.": "Сделан из тщательно вырезанной кости. Имеет очень тонкие зубья для вычесывания насекомых из волос."
"A love poem from a young man to a young woman. Apparently the young woman's eyes are like hot diamonds, whatever that means.": "Любовное стихотворение от молодого человека молодой женщине. По всей видимости, глаза молодой женщины похожи на горячие алмазы, что бы это ни значило."
"This beautiful knife is used in the elvish custom of Surreto Silosi, where young heartbroken elves impale themselves under the oversight of a healer. This rite of passage signals their entrance into the second of three stages of elven maturity. The knife is usually kept as a memento.": "Этот красивый нож используется в эльфийском обряде Суррето Силоси, когда молодые разбитые сердцем эльфы пронзают себя под наблюдением целителя. Этот обряд инициации знаменует их переход во вторую из трёх стадий эльфийской зрелости. Нож обычно сохраняется как памятный сувенир."
"Carried by ratkin as good-luck talismans.": "Носится крысолюдами как талисман на удачу."
"This box can be used to grow a crop of mushrooms.\nChance for Second Mushroom Type: 33%": "Эта коробка используется для выращивания урожая грибов.\\nШанс второго типа грибов: 33%"
"This box can grow multiple crops of mushrooms.\nBox Duration: 12 hours\nChance for Second Mushroom Type: 33% per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 12 часов\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 24 hours\nChance for Second Mushroom Type: 33% per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 24 часа\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 48 hours\nChance for Second Mushroom Type: 33% per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 48 часов\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nChance for Second Mushroom Type: 33% per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 72 часа\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can be used to grow mushrooms.\nBox Duration: 24 hours\nGrow Time: 50% slower for each crop\nYield: +66% per crop\nChance for Second Mushroom Type: 33% per crop": "Эта коробка используется для выращивания грибов.\\nВремя действия коробки: 24 часа\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше за каждый урожай\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can be used to grow mushrooms.\nBox Duration: 48 hours\nGrow Time: 50% slower for each crop\nYield: +66% per crop\nChance for Second Mushroom Type: 33% per crop": "Эта коробка используется для выращивания грибов.\\nВремя действия коробки: 48 часов\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше за каждый урожай\\nШанс второго типа грибов: 33% за каждый урожай"
"This box can be used to grow mushrooms.\nBox Duration: 72 hours\nGrow Time: 50% slower for each crop\nYield: +66% per crop\nChance for Second Mushroom Type: 33% per crop": "Эта коробка используется для выращивания грибов.\\nВремя действия коробки: 72 часа\\nВремя роста: на 50% дольше для каждого урожая\\nУрожай: на 66% больше за каждый урожай\\nШанс второго типа грибов: 33% за каждый урожай"
"An arrangement of fresh flowers that instills a hearty vigor and a thirst for the outdoors.\n\nGrants 10% chance of chopping extra wood. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Комплект свежих цветов, который придаёт бодрость и жажду к природе.\\n\\nДарует 10% шанс получить дополнительное количество древесины при рубке. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An arrangement of fresh flowers that instills a hearty vigor and a thirst for the outdoors.\n\nGrants 17% chance of chopping extra wood. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Комплект свежих цветов, который вселяет бодрость и жажду к природе.\\n\\nДарует 17% шанс получить дополнительное количество древесины при рубке. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
