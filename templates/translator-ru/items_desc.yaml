"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Weapon Augmentation. If you have a vague understanding of the skill, you can drink it to gain experience.": "Этот маленький флакон содержит вываренную сущность знаний о конкретном навыке — Усилении Оружия. Если у вас есть смутное понимание этого навыка, вы можете выпить его, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Wind Performance. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную сущность знаний о конкретном навыке — Ветреном Исполнении. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
"Dye used to color a piece of clothing or armor deep forest green.": "Краска, используемая для окрашивания одежды или брони в глубокий лесной зелёный цвет."
"Dye used to color a piece of clothing or armor deep pink.": "Краска, используемая для окрашивания одежды или брони в глубокий розовый цвет."
"Dye used to color a piece of clothing or armor deep sky blue.": "Краска, используемая для окрашивания одежды или брони в глубокий небесно-голубой цвет."
"A little tastier than usual potions, perhaps. (But not good-tasting, to be clear.)": "Немного вкуснее обычных зелий, возможно. (Но, чтобы было ясно, не вкусное.)"
"The bowels of a dead deer.": "Кишечник мёртвого оленя."
"Test potion transforms you into a deer. Permanent until dispelled! WARNING: think before you drink!": "Тестовое зелье превращает вас в оленя. Постоянно, пока не развеется! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to the needs of deer when used in crafting.": "Красивый самоцвет с тёмно-зелёными полосами, хорошо известный тем, что помогает в магической коммуникации. Этот конкретный самоцвет был насыщен руной, которая настраивает его на потребности оленей при использовании в ремесле."
"Horseshoes, but fitted for a deer's hooves.": "Подковы, но приспособленные для копыт оленя."
"Can be studied to earn Deer XP. (Requires VIP.)": "Можно изучать для получения опыта в навыке Олень. (Требуется VIP.)"
"Deer can use this handy disguise to appear less conspicuous. A symbol of Arisetsu has been hidden inside.": "Олени могут использовать эту удобную маскировку, чтобы выглядеть менее заметными. Внутри спрятан символ Арисецу."
"Teaches you a deer technique.": "Обучает технике оленя."
"This was once owned by a powerful shaman who protected cute woodland animals. A tiny bit of his soul resides in this shield. If you don't use it, you're throwing away his life's work!": "Раньше этим щитом владел могущественный шаман, который защищал милых лесных зверьков. Крошечная часть его души обитает в этом щите. Если ты не используешь его, ты выбрасываешь на ветер дело всей его жизни!"
"The razor-sharp talons of a dead dinosaur.": "Бритвенно острые когти мёртвого динозавра."
"These ancient pants prove that not all powerful mages have good fashion sense.": "Эти древние штаны доказывают, что не все могущественные маги обладают хорошим чувством стиля."
"This club is coated in misleading magic. It's soaked with blood, but looks pristine!": "Эта дубина покрыта обманной магией. Она пропитана кровью, но выглядит безупречно!"
"A customized hammer used by smiths.": "Индивидуальный молот, используемый кузнецами."
"An appetizer intended to be eaten before the cheese course.": "Закуска, предназначенная для употребления перед сырной тарелкой."
"It's an authentic rakshasa-style claw weapon.": "Это аутентичное оружие в виде когтя в стиле ракшасы."
"Beetles are the least-offensive ingredient in this horrifying -- but tasty -- snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жуки — самый безобидный ингредиент в этой ужасной — но вкусной — закуске. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A delicious snack from the Red Wing Casino. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска из казино Ред Винг. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A hearty filling bread.": "Сытный хлеб с начинкой."
"A key cut from magical ice.": "Ключ, вырезанный из магического льда."
"For Guide use only! This is a Fancy Item Vendor that only dispenses to Demo players.": "Только для использования в Руководстве! Это изысканный торговец предметами, который продаёт только демонстрационным игрокам."
"For Guide use only! This is an Ultra Item Raffler that only allows Demo players to take tickets.": "Только для использования в Руководстве! Это ультра-розыгрыш предметов, в котором участвовать могут только демо-игроки."
"This bean has little prongs growing out of it that kind of look like horns.": "Из этой фасоли растут маленькие отростки, которые немного похожи на рога."
"The brain of a demon soldier.": "Мозг демона-солдата."
"A curious side-effect of demonic magic. The protrusions on this rock vaguely resemble teeth.": "Любопытный побочный эффект демонической магии. Выступы на этой скале отдалённо напоминают зубы."
"It's a leaf -- a non-demonic leaf -- encased in an otherworldly variety of amber.": "Это лист — не демонический лист — заключённый в потусторонний вид янтаря."
"This crossbow is not actually demonic; it's just designed to look intimidating. The embedded necromancy gem was probably not intended for actual use, but it <i>does</i> work.": "Этот арбалет на самом деле не демонический; он просто сделан так, чтобы выглядеть устрашающе. Встроенный некромантский камень, вероятно, не предназначался для реального использования, но он <i>действительно</i> работает."
"The essence of a demon. If you hold it in your hand, you can hear a quiet scream that nobody else can.": "Сущность демона. Если держать её в руке, можно услышать тихий крик, который никто другой не слышит."
"Blood, or at least some sort of blood-like ichor, extracted from the wings of a demonic flapskull.": "Кровь, или по крайней мере нечто похожее на кровь, извлечённое из крыльев демонического хлопающего черепа."
"This perfectly-preserved snail shell has been infected with demonic essence.": "Эта идеально сохранившаяся раковина улитки была заражена демонической сущностью."
"An unidentifiable hunk of meat, imbued with demonic essence, and roasted to perfection.\n\nIn addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Неопознанный кусок мяса, наполненный демонической сущностью и прожаренный до совершенства.\n\nПомимо обычных эффектов еды, этот приём пищи также снижает эффект затрат энергии на Адское пламя на 25%."
"This is the skull of some weird otherworldly creature. Neat.": "Это череп какого-то странного потустороннего существа. Круто."
"A factual statement about demons. Collect enough of these and Ferris Blueheart in Vidaria can turn them into a Scroll of Demonic Research.": "Фактическое утверждение о демонах. Соберите достаточно таких, и Феррис Блюбарт в Видарии сможет превратить их в Свиток демонических исследований."
"A wisp of demonic essence. Gather enough of these and you can combine their energies into a Demonic Essence.": "Сияние демонической сущности. Соберите достаточно таких и вы сможете объединить их энергии в Демоническую Сущность."
"A dance pole that can be deployed anywhere you please. Hopefully the base is sturdy enough that it won't tip over.": "Танцевальный шест, который можно установить в любом удобном месте. Надеюсь, основание достаточно прочное, чтобы он не опрокинулся."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +24 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +24 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"An unusual tea with a strong kick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Необычный чай с сильным эффектом. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Worn leather boots with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Изношенные кожаные сапоги с аккуратно вставленными металлическими элементами. Тот, кто их сделал, не обладал мастерством в кожевенном деле, но компенсировал это временем и вниманием к деталям."
"Worn leather with metal meticulously inserted into it. Whoever made this lacked skill in leatherworking, but made up for it with time and attention to detail.": "Изношенная кожа с аккуратно вставленным металлом. Тот, кто это сделал, не обладал мастерством в кожевенном деле, но компенсировал это временем и вниманием к деталям."
"Worn leather pants with metal meticulously inserted into them. Whoever made these lacked skill in leatherworking, but made up for it with time and attention to detail.": "Изношенные кожаные штаны с аккуратно вставленными металлическими элементами. Тот, кто их сделал, не обладал мастерством в кожевенном деле, но компенсировал это временем и вниманием к деталям."
"Somehow this glass orb has pure despair trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперто чистое отчаяние. Тёмные эмоции служат силой для Некромантии, и эту сферу можно использовать как Некромантский Самоцвет."
"Made from the horn of the extinct Destiny Ram, this instrument is illegal in six countries, including Verta. But it sounds great!": "Сделанный из рога вымершего барана Судьбы, этот инструмент запрещён в шести странах, включая Верту. Но звучит он великолепно!"
"Only the best trollish crafters can claim the title of Archtroll and create Archcudgels. These weapons are deadly works of art.": "Только лучшие тролльские мастера могут носить титул Архитролля и создавать Архибулавы. Эти оружия — смертоносные произведения искусства."
"Made of stone that's been immersed in sadness -- literal, liquid sadness -- for years. It requires a strong mind to wield.": "Сделан из камня, который годами погружали в печаль — буквальную, жидкую печаль. Для владения им требуется крепкий разум."
"A hard-boiled egg, sliced in half, with the yolk taken out and replaced with the essence of an infernal hellspawn, then sprinkled with some spices. Just like mom used to make!\n\nIn addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Крутое яйцо, разрезанное пополам, с вынутым желтком, заменённым сущностью инфернального порождения ада, затем посыпанное специями. Прямо как мама готовила!\n\nПомимо обычных эффектов еды, этот приём пищи также снижает эффект затрат энергии на Адское пламя на 25%."
"A tasty breakfast snack.": "Вкусный завтрачный перекус."
"A rubbery weed. (This item can be used in recipes that call for Mixed Greens.)": "Резиновое сорняковое растение. (Этот предмет можно использовать в рецептах, требующих Смешанную зелень.)"
"This huge club has been used to kill so many drakeworms that some of their strange magic has rubbed off on it.": "Эта огромная дубина использовалась для убийства множества драко-червей, и часть их странной магии передалась ей."
"Fermented cactus juice with a complex taste. This batch is pretty vile, but barely drinkable.": "Ферментированный кактусовый сок со сложным вкусом. Эта партия довольно отвратительна, но едва пригодна для питья."
"This is some of the worst gin ever. But it is technically not fatal to drink.": "Это один из самых отвратительных джинов. Но технически он не смертелен при употреблении."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 9' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 9», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 9' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 9», чтобы бросить эту бомбу.)"
"A scintillating gemstone. Used in magic, it can protect against death.": "Сверкающий драгоценный камень. Используется в магии, может защитить от смерти."
"\"The sensational best-selling diary of a maid from the Crone Hegemony. This was saved from obscurity due to one scene that documents the first sabotage attack of the (at-the-time-unrecognized) Night Executioner, the deadly hitman who is STILL. AT. LARGE. Read of his first heinous exploits here!\"": "\"Сенсационный бестселлер — дневник горничной из Гегемонии Старухи. Он был спасён от забвения благодаря одной сцене, в которой задокументирована первая диверсионная атака (тогда ещё не признанного) Ночного Палача, смертельно опасного наёмного убийцы, который ДО СИХ ПОР. НА СВОБОДЕ. Читайте здесь о его первых ужасных деяниях!\""
"A tasty plate for the hero on a diet. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусное блюдо для героя на диете. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A spice with a bitter, fennely taste.": "Пряность с горьковатым, фенхелевым вкусом."
"Dye used to color a piece of clothing or armor dim gray.": "Краска, используемая для окрашивания одежды или брони в тускло-серый цвет."
"It looks like water. Tastes like potato. ... so it's magic potato-water, basically.": "Выглядит как вода. На вкус как картошка. ... так что это, по сути, магическая картофельная вода."
"A tasty meaty snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный мясной перекус. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"That's disgusting!": "Это отвратительно!"
"It looks... edible. Huh.\n\n(Use in Cheap Meat recipes.)": "Выглядит... съедобным. Хм.\\n\\n (Используется в рецептах дешёвого мяса.)"
"A perfectly clear, sweet-smelling liquid.": "Совершенно прозрачная, сладко пахнущая жидкость."
"Water made from freshly-melted snow, plus various impurities.": "Вода из свежеснежного снега с различными примесями."
"A dense and filling food, but entirely unexciting and, well, frankly disappointing.": "Плотная и сытная еда, но совершенно неинтересная и, честно говоря, разочаровывающая."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 6' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 6», чтобы установить эту турель.)"
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 6' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 6», чтобы бросить эту бомбу.)"
"It's hard to imagine, but once these boots were the height of fashion.": "Трудно представить, но когда-то эти ботинки были вершиной моды."
"It's a rough sketch of a bear wearing a pirate hat. It is holding a jug of rum. Along the top are the words \"When it's all too much to bear, say yoho!\" and along the bottom: \"Remga's Raging Rum\"": "Это грубый набросок медведя в пиратской шляпе. Он держит кувшин с ромом. Вверху надпись: «Когда всё становится невыносимо, скажи йо-хо!» и внизу: «Бушующий ром Ремги»"
"A customized hammer used by armorsmiths.": "Индивидуальный молот, используемый кузнецами-оружейниками."
"It's dog meat, but at least the dog was probably healthy.\n\n(Use in Cheap Meat recipes.)": "Это собачье мясо, но, по крайней мере, собака, вероятно, была здорова.\\n\\n (Используется в рецептах дешёвого мяса.)"
"A collar to make large dogs smaller and less scary to some individuals.": "Ошейник, который делает больших собак меньше и менее страшными для некоторых людей."
"A bundle of 1000 arrow fletchings for resplendant and perfectish arrows.": "Пучок из 1000 оперений для великолепных и почти идеальных стрел."
"An ancient dwarven instrument from a long-lost age.": "Древний гномий инструмент из давно забытой эпохи."
"An over-engineered dwarven weapon. It requires a lot of maintenance, but most users find the accelerated reload-time worth it.": "Слишком усложнённое гномье оружие. Требует много ухода, но большинство пользователей считают ускоренную перезарядку того стоит."
"Dye used to color a piece of clothing or armor drab grass green.": "Краска, используемая для окрашивания одежды или брони в тускло-зеленый цвет травы."
"It's unclear what this sword is made of, or who might have smithed it. The edge is so sharp that it can cut flesh from three inches away.": "Неясно, из чего сделан этот меч и кто мог его выковать. Клинок настолько острый, что может срезать плоть с трёх дюймов."
"This opens a door deep inside the Statehelm Crypt.": "Открывает дверь глубоко внутри крипты Стейтхелм."
"Someone dreamed of this sturdy shield, then lost control of it.": "Кто-то мечтал об этом крепком щите, но затем потерял над ним контроль."
"An oversized ring with bumps that seem to uniquely identify a specific demon.": "Большое кольцо с выступами, которые, по-видимому, уникально идентифицируют конкретного демона."
"A well-preserved and salted fish. An ... interesting... snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Хорошо сохранившаяся и засоленная рыба. ...интересная... закуска. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"It's... a clownfish. Dried and salted. Snack-sized. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Это... клоун. Сушёный и солёный. Размером с закуску. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A tasty snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"A well-preserved and salted fish, perfect for snacking. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Хорошо сохранившаяся и засоленная рыба, идеально подходит для перекуса. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному и получить преимущества обоих.)"
"A well-preserved and salted fish. This makes an amazing snack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Хорошо сохранившаяся и засоленная рыба. Отличная закуска! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной каждой и получить преимущества обеих.)"
"The pineal gland of an ancient droach.": "Шишковидная железа древнего дроача."
"A robotic fire pit, which uses advanced automaton techniques to spread the warmth further and keep it going longer. Lasts 10 minutes once deployed.": "Роботизированный костёр, который использует передовые техники автоматонов, чтобы распространять тепло дальше и поддерживать его дольше. Длится 10 минут после установки."
"A thick green paste that smells of pine needles and dirt.": "Густая зелёная паста с запахом сосновых иголок и земли."
"Can be studied to earn Druid XP. (Requires VIP.)": "Можно изучать для получения опыта друида. (Требуется VIP.)"
"Teaches you a druid technique.": "Обучает вас технике друида."
"A traditional druidic training staff has been augmented with dozens of arcane sigils and then dipped in ... something waxy. Probably something organic. Best not to contemplate.": "Традиционный друидический тренировочный посох был усилен десятками арканных сигил и затем окунут в... что-то восковое. Вероятно, что-то органическое. Лучше не задумываться."
"Given to neophyte druids to help them hone their powers.": "Выдается новичкам-друидам, чтобы помочь им отточить свои способности."
"A jerky bite that makes your mouth water just from thinking about it.": "Кусочек вяленого мяса, от одного воспоминания о котором у вас текут слюнки."
"Pleasant, slightly citrusy, but with a distinctive bitterness too. It's said to be the favorite hard liquor of elves, but since elves mostly drink wine, that's not much praise.": "Приятный, с легким цитрусовым оттенком, но с характерной горчинкой. Говорят, что это любимый крепкий напиток эльфов, но поскольку эльфы в основном пьют вино, это не слишком большая похвала."
"A disposable drying box. It's full of arrows, ready to bake in the sun until dry and straight.": "Одноразовый сушильный ящик. Он наполнен стрелами, готовыми высохнуть и выпрямиться на солнце."
"A special cake of appreciation for your support!": "Особый торт в знак благодарности за вашу поддержку!"
"A delicious slab of meat.": "Вкусный кусок мяса."
"This once-magical crystal ball seems depleted and cracked.": "Этот когда-то волшебный хрустальный шар кажется исчерпанным и треснувшим."
"An old metal key from a dusty old chest you found under Hogan's Keep. Utterly unremarkable.": "Старый металлический ключ от пыльного старого сундука, который вы нашли под крепостью Хоган. Совершенно непримечательный."
"The creator of this beaker designed it around what he thought dwarves would use in combat. He was utterly wrong in every way, but the beaker is still pretty powerful.": "Создатель этой колбы разработал её, исходя из того, что, по его мнению, гномы использовали бы в бою. Он был совершенно неправ во всех отношениях, но колба всё равно довольно мощная."
"Dye used to color a piece of clothing or armor dwarfeye blue.": "Краска, используемая для окрашивания одежды или брони в синий цвет гномьего глаза."
"Food-quality vegetable oil with a high burn point and a pleasant taste. Extremely versatile.": "Растительное масло пищевого качества с высокой температурой горения и приятным вкусом. Очень универсально."
"Dwarves aren't really great at making bows with decent range. But this bow is very sturdy!": "Гномы не очень хорошо умеют делать луки с приличной дальностью. Но этот лук очень прочный!"
"While dwarves are mostly known for brewing alcohol, those same techniques can also be used to brew potent offensive chemicals.": "Хотя гномы в основном известны варкой алкоголя, те же методы можно использовать для создания мощных наступательных химикатов."
"An old book written by an elf about how to use dwarven engineering in elven designs.": "Старая книга, написанная эльфом о том, как использовать гномскую инженерию в эльфийских разработках."
"This toxic compound burns the body, but it masks the symptoms of alcohol withdrawal. Carried in every dwarven medical kit.": "Этот токсичный состав жжёт тело, но маскирует симптомы алкогольного абстинентного синдрома. Носится в каждом гномьем медицинском наборе."
"This style of dwarven weapon has been in use for centuries. It makes an excellent stabbing weapon but lacks versatility.": "Этот стиль гномьего оружия используется уже несколько веков. Он отлично подходит для колющих ударов, но не отличается универсальностью."
"Thick and awkward, but basically indestructible.": "Толстый и неудобный, но практически неразрушимый."
"A heavy key that looks unused. It's still polished to a shine.": "Тяжёлый ключ, который выглядит неиспользованным. Он всё ещё отполирован до блеска."
"An old dwarven tool. While unexceptional by dwarven standards, it's quite impressive to many other races, who use it as an off-hand weapon.": "Старый гномий инструмент. Хотя по гномьим меркам он не выдающийся, для многих других рас он кажется впечатляющим и используется как оружие в свободной руке."
"Used by dwarves who must venture onto the battle field to aid fallen comrades.": "Используется гномами, которым приходится выходить на поле боя, чтобы помочь павшим товарищам."
"A jaggedly-carved stone block, warm to the touch. Dwarven safety runes indicate that it is explosive, poisonous, and ... there's one other danger symbol that you don't recognize.": "Зазубренный каменный блок, тёплый на ощупь. Гномьи руны безопасности указывают, что он взрывоопасен, ядовит и... есть ещё один символ опасности, который вы не узнаёте."
"It's a bit cramped for larger races, but this Dwarven unarmed weapon feels impressively heavy.": "Для крупных рас здесь немного тесновато, но это дварфское оружие без оружия ощущается впечатляюще тяжёлым."
"This gold ring is not particularly unique, but it was clearly made by dwarves.": "Это золотое кольцо не особенно уникально, но явно сделано гномами."
"Common apparel from the Serbule Revolt, 1500 years ago. These boots are so over-engineered that they look brand new. But the smell is pretty bad.": "Обычная одежда времён Восстания Сербуля, 1500 лет назад. Эти сапоги настолько переусложнены, что выглядят как новые. Но запах у них довольно неприятный."
"When the dwarves were holed up under Serbule so many centuries ago, they didn't have a lot to do but make really resilient armor. The resiliency magic bleeds over to the wearer.": "Когда гномы много веков назад укрывались под Сербулем, у них было немного занятий, кроме как создавать действительно прочные доспехи. Магия прочности передаётся носителю."
"Oversized gloves were the style hundreds of years ago, which is why these dwarven gauntlets can fit your hands.": "Перчатки большого размера были в моде сотни лет назад, поэтому эти гномьи рукавицы подходят для ваших рук."
"A resilient piece of history! Perfect for the dwarf fetishist in your life. Or you could wear it in battle, if that's what you're into.": "Надёжный кусочек истории! Идеально для поклонника гномов в вашей жизни. Или вы можете носить его в бою, если вам это по душе."
"It's been about 15 centuries since the Serbule Revolt, but these dwarven leggings don't seem a day over 450. Their preservative magic is quite strong.": "Прошло около 15 веков с момента Восстания Сербуля, но эти гномьи поножи выглядят не старше 450 лет. Их магия сохранения довольно сильна."
"A strong dark beer that packs a punch. The preferred socialization drink of dwarves.": "Крепкое тёмное пиво с ощутимым ударом. Любимый напиток для общения у гномов."
"Part of some self-aware gizmo. It may still be in working order.": "Часть какого-то самосознающего устройства. Возможно, он всё ещё работает."
"Robust, like dwarves. Flammable, like dwarves.": "Прочный, как гномы. Легковоспламеняющийся, как гномы."
"A brass... thing. It's small yet surprisingly heavy. It has no obvious use.": "Латунная... штуковина. Маленькая, но удивительно тяжёлая. Очевидного применения не имеет."
"Learn a very advanced dye-creation technique.": "Изучите очень продвинутую технику создания красителей."
"A small glass jar used to hold dye indefinitely. It is not reusable.": "Небольшая стеклянная банка для хранения краски на неопределённый срок. Не подлежит повторному использованию."
"Designed to be worn in humans' pierced ears, these earrings boost the wearer's maximum capacity for enjoyment of others' company, allowing them to be alone longer without becoming miserable.": "Созданные для ношения в проколотых ушах людей, эти серьги увеличивают максимальную способность владельца получать удовольствие от общества других, позволяя дольше оставаться одному, не испытывая при этом тоски."
"Designed to be worn in humans' pierced ears, these earrings help protect against the sickness that comes from being too close to glowy yellow crystals.": "Предназначенные для ношения в проколотых ушах людей, эти серьги помогают защититься от болезни, возникающей при слишком близком контакте со светящимися жёлтыми кристаллами."
"Designed to be worn in humans' pierced ears, these lovely earrings are enchanted with potent protection magic.": "Созданные для ношения в проколотых ушах людей, эти прекрасные серьги зачарованы мощной магией защиты."
"A festive banner celebrating the joy of Rebirth.": "Праздничное знамя, отмечающее радость Возрождения."
"A large and convenient saddlebag.": "Большая и удобная седельная сумка."
"An instrument made of two ram horns, one embedded inside the other. The sound is terrible, so it is exclusively used as a weapon.": "Инструмент, сделанный из двух бараньих рогов, один вставлен внутрь другого. Звук ужасен, поэтому он используется исключительно как оружие."
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. Echur has augmented this particular belt.": "Пояс, украшенный странной руной, которая дарует носителю особую удачу. Эчур усовершенствовал этот пояс."
"A pair of simple boots. Echur says that they help one connect with the world around them, whatever that means.": "Пара простых сапог. Эчур говорит, что они помогают установить связь с окружающим миром, что бы это ни значило."
"Ghost sweat, congealed into a slimy lump. Probably useful for crafting potions or something.": "Призрачный пот, свернувшийся в слизистый комок. Вероятно, пригодится для создания зелий или чего-то подобного."
"A hard cheese with a tangy taste.\n\nCheese Type: Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Твердый сыр с острым вкусом.\n\nТип сыра: Твердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"The hired mage Eeaeiikik crafted this ring to channel his fiery blasts.": "Нанятый маг Ээаэиикик создал это кольцо для направления своих огненных взрывов."
"Raw eel on a ball of delicious rice.": "Сырой угорь на шарике вкусного риса."
"A slimy gunk that lets you move like an eel. (Swimming buff does not stack with other swimming-buff potions.)": "Скользкая слизь, которая позволяет двигаться как угорь. (Бафф плавания не суммируется с другими зельями, дающими бафф плавания.)"
"Stir-fried eel with juicy cabbage.": "Жареный угорь с сочной капустой."
"Raw eel wrapped in seaweed, on a ball of delicious rice.": "Сырой угорь, завернутый в морские водоросли, на шарике вкусного риса."
"A bird egg. Looks edible.": "Птичье яйцо. Выглядит съедобным."
"Dye used to color a piece of clothing or armor electric cyan.": "Краситель, используемый для окрашивания одежды или брони в электрический циановый цвет."
"Dye used to color a piece of clothing or armor electric yellow.": "Краситель, используемый для окрашивания одежды или доспехов в электрический жёлтый цвет."
"This thick liquid has little glowing orbs in it.": "Эта густая жидкость содержит в себе маленькие светящиеся шарики."
"While not exactly beautiful, it's definitely elegant and comfortable. The early work of an up-and-coming master tailor, perhaps.": "Хотя она и не совсем красивая, она определённо элегантная и удобная. Ранняя работа многообещающего мастера портного, возможно."
"A bundle of 1000 arrow fletchings for expert's and masterwork arrows.": "Пучок из 1000 оперений для стрел для стрел экспертов и мастерских стрел."
"Honed to perfection by a staff expert who slowly went mad from Lycanthropy. It's a powerful weapon, though it is marred by long ugly claw marks.": "Отточен до совершенства мастером посохов, который медленно сошёл с ума от ликантропии. Это мощное оружие, хотя его портят длинные уродливые царапины от когтей."
"It's covered in gibberish -- there are words, but they don't seem to make sentences.": "Он покрыт бессмыслицей — есть слова, но они не складываются в предложения."
"Teaches you a research recipe for a Phrenology skill.": "Обучает рецепту исследования для навыка френологии."
"The preserved skull of an elf.": "Сохранённый череп эльфа."
"The label indicates that it's some sort of alchemical byproduct of \"soul darkening\", whatever that is.": "Надпись указывает, что это своего рода алхимический побочный продукт «потемнения души», что бы это ни значило."
"Records the location of metal that can be mined, somewhere around Eltibule.": "Записывает местоположение металлов, которые можно добыть, где-то вокруг Элтибуля."
"Records the location of a mineral deposit in or around Eltibule.": "Записывает местоположение месторождения минералов в Эльтибуль или вокруг него."
"A light bow designed for precision over power.": "Лёгкий лук, созданный для точности, а не силы."
"A map that supposedly leads to a legendary hoard of treasure buried in the Eltibule region.": "Карта, которая, как говорят, ведёт к легендарному кладу, зарытому в регионе Элтибуль."
"A map that supposedly leads to a large amount of treasure buried in the Eltibule region.": "Карта, которая, предположительно, ведёт к большому количеству сокровищ, зарытых в регионе Элтибуле."
"A map that supposedly leads to a small amount of treasure buried in the Eltibule region.": "Карта, которая, по слухам, ведёт к небольшому кладу, зарытому в регионе Эльтибуле."
"A map that supposedly leads to a huge hoard of treasure buried in the Eltibule region.": "Карта, которая, как предполагается, ведёт к огромной куче сокровищ, зарытых в регионе Эльтибуль."
"A ring that can be used to 'sign' messaging stones as Lord Eltibule.\n\n(Note: if this item is held by someone not on the appropriate quest, it will crumble to dust.)": "Кольцо, которое можно использовать для «подписи» камней сообщений от имени Лорда Элтибула.\\n\\n (Примечание: если этот предмет находится у персонажа, не участвующего в соответствующем задании, он рассыплется в прах.)"
"A beautiful chain with a slightly-large purple gem. It has a multifaceted glamour that makes the crystal seem to constantly twinkle.": "Красивое ожерелье с немного крупным фиолетовым камнем. Оно обладает многогранным блеском, из-за которого кристалл кажется постоянно мерцающим."
"The  rune etchings in this blade were made by Elven masters. It is rare to find these so far from Elven homelands.": "Рунические гравировки на этом клинке выполнены эльфийскими мастерами. Редко встретишь такие так далеко от эльфийских земель."
"Although nothing special by elven standards, other races would kill for the secrets of the protective runes etched into this shield.": "Хотя по эльфийским меркам он не представляет особой ценности, другие расы убили бы за секреты защитных рун, выгравированных на этом щите."
"Another piece of once-ceremonial armor that was retrofitted for combat during the Elf-Dwarf wars. The suit has since become a favorite of elven warriors thanks to its handy odor-repulsion magic. And also, of course, its insane amount of protection.": "Ещё один элемент некогда церемониальной брони, переделанной для боя во время войн эльфов с гномами. Этот доспех с тех пор стал любимым у эльфийских воинов благодаря удобной магии отпугивания запахов. И, конечно же, из-за невероятной защиты."
"The preferred punching thingy of elven bullies.": "Любимая боевая штуковина эльфийских забияк."
"An ancient weapon from the War of Froliac, used by elves who were very, <i>very</i> angry. It is etched with an image of the elven begonia, a symbol of trust broken and secrets defiled. Unfortunately, other races don't understand the symbolism and seem to think it's kind of sissy.": "Древнее оружие времен Войны Фролиак, использовавшееся эльфами, которые были очень, <i>очень</i> злы. На нём выгравирован образ эльфийской бегонии — символа предательства доверия и осквернённых тайн. К сожалению, другие расы не понимают этого символизма и, похоже, считают его немного женственным."
"An off-hand blade favored by some elven fencers, who use it in conjunction with a longsword.": "Второстепенное клинковое оружие, предпочитаемое некоторыми эльфийскими фехтовальщиками, которые используют его вместе с длинным мечом."
"These were once used in ceremonies, not combat, but they turned out to work pretty well there too, as long as you're not trying to do anything too terribly dextrous.": "Раньше их использовали в церемониях, а не в бою, но они оказались вполне пригодными и там, если только вы не пытаетесь делать что-то слишком ловкое."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +20 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +20 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"Practically oozing with enchantment, this masterpiece is rarely seen outside of Elven lands.": "Практически источающий магию, этот шедевр редко встречается за пределами эльфийских земель."
"Ceremonial armor refitted for battlefield use, this helm looks sharp -- and can make the wearer look sharp, too, provided they know how to wear it with style.": "Церемоническая броня, переделанная для боевого применения, этот шлем выглядит эффектно — и может сделать владельца таким же эффектным, если он умеет носить его со стилем."
"Profoundly uncomfortable and rather awkward to move in, but very stylish.": "Крайне неудобные и довольно громоздкие для передвижения, но очень стильные."
"During the Elf-Dwarf wars, Dwarven mages created leather-evaporation magic, rendering elves' usual armor obsolete. These ceremonial plate leggings were hurried into battle. Although they're impressively protective, they're still pretty uncomfortable.": "Во время войн эльфов и гномов гномьи маги создали магию испарения кожи, сделав обычные доспехи эльфов устаревшими. Эти церемониальные латные поножи были поспешно отправлены в бой. Хотя они впечатляюще защищают, всё же остаются довольно неудобными."
"A thin art book that contains drawings of elves au naturel.": "Тонкая книга с рисунками эльфов в естественном виде."
"Elves create these staves when they're feeling old. The feeling usually passes after a few decades, though, and then the elves give them away.": "Эльфы создают эти посохи, когда чувствуют себя старыми. Обычно это ощущение проходит через несколько десятилетий, и тогда эльфы раздают их."
"A volume of elven verse. The rhymes are forced and the lines scan poorly, but hey, it's elven verse -- somebody will want this junk.": "Том эльфийской поэзии. Рифмы натянуты, а строки плохо ложатся, но эльфийская поэзия — кому-то этот хлам точно пригодится."
"A medallion with an abstract design. Perhaps it is mantis claws raised in victory. Or in pain.": "Медальон с абстрактным узором. Возможно, это когти богомола, поднятые в знак победы. Или в знак боли."
"Part of a specialized toolset for pulling the guts out of a body without making a mess. These are often carried by followers of Tast to show their contempt for death that occurs off the battlefield. (It's hard to explain the symbolism to outsiders.)": "Часть специализированного набора инструментов для аккуратного извлечения внутренностей из тела без беспорядка. Часто носится последователями Таста, чтобы показать своё презрение к смерти вне поля боя. (Трудно объяснить символизм посторонним.)"
"An exquisite morsel from some sort of creature that was cooked alive. The juices have been locked in and the aroma is tantalizing.": "Изысканный кусочек какого-то существа, приготовленного живьём. Сок сохранён внутри, а аромат манит."
"This green crystal is a type of beryl. Used in magic, it is associated with perfection, richness, and deities.\n\nIn its current form, using it in crafting has unpredictable results. When maximized via magic, it's used for crafting certain exotic weapons.": "Этот зелёный кристалл — разновидность берилла. В магии он ассоциируется с совершенством, богатством и божествами.\n\nВ своём нынешнем виде использование его в создании предметов даёт непредсказуемые результаты. При максимальном усилении с помощью магии он используется для создания некоторых экзотических оружий."
"A brooch with an emerald inlaid in the middle. It's too dinged up to be valuable, but it's still pretty.": "Брошь с изумрудом, вставленным в середину. Она слишком поцарапана, чтобы быть ценной, но всё ещё красивая."
"Dye used to color a piece of clothing or armor emerald.": "Краска, используемая для окрашивания одежды или доспехов в изумрудный цвет."
"This small fire is warm enough to keep you from freezing to death, but not good enough for much else. Lasts 60 seconds once deployed.": "Этот небольшой огонь достаточно тёплый, чтобы не замёрзнуть насмерть, но не пригоден для чего-то большего. Длится 60 секунд после разведения."
"A white-mold cheese with a bland taste. It's known for having small holes in the final cheese.\n\nCheese Type: White": "Сыр с белой плесенью и пресным вкусом. Известен тем, что в готовом сыре образуются маленькие дырочки.\\n\\nТип сыра: белый"
"This bottle is nice enough for wine. Just.": "Эта бутылка достаточно хороша для вина. Едва-едва."
"There's nothing in this bottle.": "В этой бутылке ничего нет."
"There's nothing in this bucket.": "В этом ведре ничего нет."
"A fancy bottle makes wine taste better, and this is a pretty fancy bottle.": "Красивую бутылку вино пьётся лучше, а эта бутылка довольно красивая."
"This bottle is a true work of art. It's almost too good for wine.": "Эта бутылка — настоящее произведение искусства. Она почти слишком хороша для вина."
"Holds 1000 dowels. Suitable for use by fletchers. The box can only be used once.": "Вмещает 1000 шкантов. Подходит для использования стрелочниками. Коробку можно использовать только один раз."
"It's a cracked bottle that stinks of rum. There was a label once, but it's mostly peeled off.": "Это треснувшая бутылка с запахом рома. Раньше была этикетка, но теперь она почти полностью отслоилась."
"A freakish mask crafted by an unliving malevolence.": "Странная маска, созданная неживой злой силой."
"For healing heinous injuries. Used by First Aid 6 and 7 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения ужасных травм. Используется в навыках Первая помощь 6 и 7 (а также в других способностях). Этот набор сделан из магического льда и склонен таять."
"For healing horrific injuries. Used by First Aid 8 and 9 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения ужасных травм. Используется навыками Первая помощь 8 и 9 (а также другими способностями). Этот набор сделан из магического льда и склонен таять."
"An autopsy kit made of ice and fairy dust. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Набор для вскрытия, сделанный из льда и пыльцы фей. (Держите его в инвентаре, и вам будет доступна опция вскрытия трупов.)"
"For healing moderate injuries. Used by First Aid 2 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения средних травм. Используется навыком Первая помощь 2 (и другими способностями). Этот набор сделан из магического льда и склонен таять."
"The claw of a bear that grew up around too much magic.": "Коготь медведя, выросшего в окружении слишком сильной магии."
"Salvaged from some ancient public works project, this magic nail gives extra resilience to complex carpentry items.": "Извлечённый из древнего общественного строительного проекта, этот магический гвоздь придаёт дополнительную прочность сложным столярным изделиям."
"For healing debilitating injuries. Used by First Aid 4 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения изнуряющих травм. Используется в Первой помощи 4 (и других умениях). Этот набор сделан из магического льда и склонен таять."
"For healing serious injuries. Used by First Aid 3 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения серьёзных травм. Используется навыком Первая помощь 3 (и другими способностями). Этот набор сделан из магического льда и имеет склонность таять."
"Very old seeds that can't be planted anymore, but may have other uses due to their glowing magical nature. Perhaps druids or shamans would like them. Or seed collectors.": "Очень старые семена, которые больше нельзя сажать, но они могут иметь другое применение из-за своего светящегося магического свойства. Возможно, друидам или шаманам они понравятся. Или коллекционерам семян."
"These are strings for a magical stringed instrument -- a particularly BIG instrument.": "Это струны для магического струнного инструмента — особенно БОЛЬШОГО инструмента."
"For healing devastating injuries. Used by First Aid 5 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения разрушительных ранений. Используется навыком Первая помощь 5 (и другими способностями). Этот набор сделан из магического льда и склонен таять."
"A bit of mistletoe with a soft green glow. Probably pretty useful for druids. Exotic plant collectors would like it, too.": "Кусочек омелы с мягким зелёным свечением. Вероятно, довольно полезен для друидов. Коллекционеры экзотических растений тоже оценят."
"Teaches you an endurance technique.": "Обучает технике выносливости."
"Bits of ground-up stinger are floating in it.": "В нём плавают кусочки измельчённого жала."
"A figurine of a muscular human with a huge pack on his back. This amulet was enhanced by Moxie of the Crafting Caravan.": "Фигурка мускулистого человека с огромным рюкзаком на спине. Этот амулет был улучшен Мокси из Ремесленного каравана."
"Powdered brains of psychic creatures. A choice drug for psychics. This batch has been enhanced with secret chemicals.": "Порошок из мозга психических существ. Излюбленное средство для экстрасенсов. Эта партия усилена секретными химикатами."
"This criminally ugly, but enhanced purple ring augments your movement speed to be slightly faster. You're also better at picking things up and carrying them.": "Это преступно уродливое, но улучшенное фиолетовое кольцо немного увеличивает вашу скорость передвижения. Вы также лучше справляетесь с поднятием и переноской предметов."
"Popular with elven messengers, these elegant cloth footwraps make your feet move much faster! But they don't protect your feet very well, so you'll need significant endurance to tolerate the numerous stubbed toes and sprained ankles. This pair was enhanced by Raim of the Crafting Caravan.": "Популярные среди эльфийских гонцов, эти изящные тканевые обмотки для ног позволяют вашим ступням двигаться гораздо быстрее! Но они плохо защищают ноги, поэтому вам понадобится значительная выносливость, чтобы терпеть многочисленные ушибы пальцев и растяжения лодыжек. Эта пара была улучшена Раймом из Ремесленного каравана."
"A ball of yarn made of an exotic material.": "Клубок пряжи из экзотического материала."
"A pungent smelling wax that helps ensure mating success with bees or wasps. (To use, give to a pet bee or wasp via the Stable UI. The effect was last until the pet is used in a breeding attempt. A pet can only have one wax on at a time; using another wax replaces the first.)": "Резко пахнущий воск, который помогает обеспечить успех спаривания с пчёлами или осами. (Для использования передайте пчеле или осе через интерфейс стойла. Эффект сохраняется до попытки размножения с питомцем. У питомца может быть только один воск одновременно; использование другого воска заменяет первый.)"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +200% more mushrooms than normal\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\nВремя роста: на 100% дольше обычного\\nУрожай: на 200% больше грибов, чем обычно\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +220% more mushrooms than normal\nChance for Second Mushroom Type: 20%\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\nВремя выращивания: на 100% дольше обычного\\nУрожай: на 220% больше грибов, чем обычно\\nШанс второго типа грибов: 20%\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +240% more mushrooms than normal\nChance for Second Mushroom Type: 40%\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\nВремя роста: на 100% дольше обычного\\nУрожай: на 240% больше грибов, чем обычно\\nШанс второго типа грибов: 40%\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"Looks like meat. Gross meat, but ... just meat.": "Похоже на мясо. Отвратительное мясо, но... просто мясо."
"A leafy green vegetable.": "Листовой зелёный овощ."
"A plantable escarole seedling.": "Саженец эскарола, пригодный для посадки."
"A blue cheese with a pleasant smell and mild flavor.\n\nCheese Type: Blue": "Голубой сыр с приятным запахом и мягким вкусом.\n\nТип сыра: голубой"
"Strange weeds that supposedly bring the dead back to life.": "Странные сорняки, которые, как говорят, возвращают мертвых к жизни."
"Sewn by Eveline Rastin for a friend.": "Сшит Эвелин Растин для подруги."
"A lovely and sturdy garment.": "Прекрасная и прочная одежда."
"A bone key that fits in any of the special event loot chests in Serbule. (Look behind the inn.)": "Костяной ключ, подходящий к любому из специальных сундуков с добычей событий в Сербуле. (Ищи за таверной.)"
"Teaches you how to deploy a special storage box.\n<b>IMPORTANT:</b> You must already know the ability 'Small Box of Space' to learn this ability.": "Обучает вас установке специального ящика для хранения.\\n<b>ВАЖНО:</b> Чтобы изучить эту способность, вы должны уже знать умение «Маленький ящик пространства»."
"Teaches you how to deploy a special storage box.": "Обучает вас тому, как разместить специальную коробку для хранения."
"Teaches you how to summon a vendor fox from a box.": "Обучает вас тому, как призвать продавца-лису из коробки."
"This tiny gourd floats around your head and emits evil light.": "Этот крошечный тыквенный фонарь парит вокруг вашей головы и излучает злой свет."
"This tiny gourd floats around your head and watches what you do.": "Этот крошечный тыквенный фонарь парит вокруг вашей головы и наблюдает за вашими действиями."
"Grimly fashioned from a mythical rhino's horn. It has a sound like... a dying rhino.": "Мрачно выкован из рога мифического носорога. Издаёт звук, похожий на... умирающего носорога."
"Imbued with potent magic, the ever-patching shirt is constantly fixing itself.": "Насыщенная мощной магией, рубашка вечного ремонта постоянно чинится сама."
"Part of an undead skeleton, this bone became so clogged with hatred that it glows with malice! Pretty neat.": "Часть скелета нежити, эта кость настолько пропиталась ненавистью, что светится злобой! Довольно круто."
"A small bundle of grass from a dimension of darkness and despair. Useful for taming nightmare animals.": "Небольшой пучок травы из измерения тьмы и отчаяния. Полезен для приручения ночных кошмарных животных."
"A pumpkin-shaped gourd full of inedible mush. Perhaps it has non-culinary uses?": "Тыква в форме плода, наполненная несъедобной кашицей. Возможно, у неё есть некулинарные применения?"
"These seeds are easy to grow, but the resulting fruit is inedible.": "Эти семена легко выращивать, но получившийся плод несъедобен."
"It's labeled \"Evil Tasks For Today\", but all the tasks involve shopping and housekeeping.": "На нём написано «Злые задачи на сегодня», но все задания связаны с покупками и домашними делами."
"A creamy bowl of porridge redolent with the delicate smell of hot evu.": "Кремовая тарелка каши с тонким ароматом горячего эву."
"This bioluminescent fruit smells like death, but has a pleasant mild taste. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Этот биолюминесцентный плод пахнет смертью, но имеет приятный мягкий вкус. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"Thick and sweet, yet very refreshing. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Густой и сладкий, но при этом очень освежающий. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"Tender cuts of pork delicately flavored with fruit and sprigged with mint.": "Нежные кусочки свинины с тонким фруктовым ароматом и веточками мяты."
"The freshest greens topped with nuts and the sweet flesh of the evu fruit.": "Самая свежая зелень с орехами и сладкой мякотью плода эвю."
"The blade of one who has lost graces in elvish court and sunken to depraved lows.": "Клинок той, кто потеряла благосклонность в эльфийском дворе и погрузилась в порочные низины."
"High-end pro racing gear.": "Профессиональное снаряжение для высококлассных скачек."
"An exceptional professional racing saddle.": "Исключительное профессиональное гоночное седло."
"Fashioned after the long knife used by the Executrix of Command, the terrifying head of the Council's personal defenses. This is no match for the real Executrix's knife, but it is still an incredible weapon.": "Сделан по образцу длинного ножа, используемого Казнительницей Команды, страшной главы личной охраны Совета. Это не соперник настоящему ножу Казнительницы, но всё же невероятное оружие."
"A crate. A quick peek inside reveals a wooden suit of eight-legged armor and other bizarre items.": "Ящик. Быстрый взгляд внутрь показывает деревянный костюм с восьминогой бронёй и другие странные предметы."
"The most complex kind of bait that can be used with angling.": "Самый сложный вид приманки, который можно использовать при рыбалке."
"Super fancy calligraphy ink.": "Очень изысканные чернила для каллиграфии."
"For repairing debilitating armor damage. Used by Armor Patching abilities.": "Для ремонта серьёзных повреждений брони. Используется способностями починки брони."
"A delicately fletched arrow with potent broadheads.": "Тщательно оперённая стрела с мощными широкими наконечниками."
"A delicately fletched arrow with potent broadheads. (Note: only Orcs are trained to use this type of ammunition.)": "Тщательно оперённая стрела с мощными широкими наконечниками. (Примечание: только орки обучены использовать этот тип снаряжения.)"
"A bundle of 1000 arrow shafts for expert arrows.": "Связка из 1000 древков стрел для стрел экспертов."
"A bundle of 1000 quality arrowheads for expert arrows.": "Пачка из 1000 качественных наконечников для стрел эксперта."
"For healing debilitating injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения изнуряющих травм. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing debilitating injuries. Used by First Aid 4 (and other abilities).": "Для лечения изнуряющих травм. Используется в Первая помощь 4 (и других способностях)."
"A great skinning knife for expert skinners. (+6 to your effective skill when skinning.)": "Отличный нож для снятия шкур для опытных охотников. (+6 к вашему эффективному навыку при снятии шкур.)"
"A carefully-made knife designed for expert knife-throwers. (Used with the Knife combat skill.)": "Тщательно изготовленный нож, предназначенный для опытных метателей ножей. (Используется с навыком боя ножами.)"
"This vinegar infusion is only needed in the fanciest of dishes.": "Этот уксусный настой нужен только для самых изысканных блюд."
"A great whittling knife for expert whittlers.": "Отличный нож для резьбы для опытных резчиков."
"Used in expert smithing recipes.": "Используется в рецептах кузнечного дела экспертного уровня."
"A bundle of 1000 glass beakers to be inserted into arrows. Careful! They're fragile.": "Пачка из 1000 стеклянных колб для вставки в стрелы. Осторожно! Они хрупкие."
"Upon activation, this small stone explodes, typically killing the person activating it. These runes are used by paranoid merchants as anti-theft devices. Intermediate runecrafters and fire mages can also make use of them in their research.": "При активации этот маленький камень взрывается, обычно убивая того, кто его активировал. Эти руны используют параноидальные торговцы в качестве противокражных устройств. Рунные мастера среднего уровня и огненные маги также могут использовать их в своих исследованиях."
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 45 enchantments.)": "Стандартный универсальный нож Раналон, который также является опасным оружием. (Действует как нож для устриц.) (С случайными зачарованиями уровня 45.)"
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 45 enchantments.)": "Сделаны из гигантских ракушек. Они удобнее, чем кажутся. (Включают случайные чары 45 уровня.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 45 enchantments.)": "Эти огромные морские раковины укреплены тонким слоем дерева, что делает доспехи неудобными, но эффективными. (Включает случайные чары 45 уровня.)"
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 45 enchantments.)": "Эти перчатки сделаны из плетёных рыбьих жил, а затем украшены крепкими раковинами. Странно, но носибельно. Включают встроенный универсальный нож для открывания устриц. (Включают случайные чары 45 уровня.)"
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 45 enchantments.)": "Большая раковина выстлана акульей кожей и сеткой. Сражаться в таком шлеме требует некоторой практики! (Включает случайные чары 45 уровня.)"
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 45 enchantments.)": "Сделаны из гигантских морских раковин, сшитых вместе морскими водорослями. Удивительно, но они не воняют. (Включают случайные чары 45 уровня.)"
"An Orichalcum blade with a seashell motif. (With random level 45 enchantments.)": "Клинок из орихалка с морской раковиной в орнаменте. (С случайными зачарованиями 45 уровня.)"
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 45 enchantments.)": "Сделан из экзотического океанского металла орихалка, этот щит лёгкий, прочный и долговечный. (Включает случайные чары 45 уровня.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 45 enchantments.)": "Это традиционное оружие русалочьего народа обладает полезными водными чарами, но, к сожалению, те же чары делают его бесполезным для огненной магии. (С случайными чарами 45 уровня.)"
"A huge sack of Councils.": "Огромный мешок с монетами Советов."
"Simple in design, but heavy on the armor plating.": "Простой дизайн, но с мощной броневой защитой."
"Used in extraordinary smithing recipes.": "Используется в необычных рецептах кузнечного дела."
"A dollop of liquid that seems like it's hissing from inside the glass.": "Капля жидкости, которая, кажется, шипит внутри стекла."
"So cold that your hand goes numb as soon as you touch it.": "Так холодно, что рука немеет, как только прикасаешься."
"Metal pins used mainly in armorsmithing.": "Металлические штифты, используемые преимущественно в кузнечном деле для брони."
"This strange cloth is luxurious to the touch, yet incredibly strong.": "Эта странная ткань на ощупь роскошная, но при этом невероятно прочная."
"A stunning find! This is a truly ugly painting, but the lack of depth and proportion suggest that it was made by someone in the pre-Council era, making it at least 10,000 years old.": "Потрясающая находка! Это действительно уродливая картина, но отсутствие глубины и пропорций говорит о том, что она была создана кем-то из до-Советской эпохи, что делает её возраст не менее 10 000 лет."
"It smells rancid and the texture is not pleasant. But it is filling.": "Он пахнет протухшим, и текстура не очень приятная. Но он сытный."
"A rubbery eyestalk from a watcher.": "Резиновый глазной стебель наблюдателя."
"The weird symbols on the cover seem intriguing, but the pages are so faded and ruined that you can't make out any words. Perhaps an expert librarian could make some use of it.": "Странные символы на обложке кажутся интригующими, но страницы настолько выцвели и испорчены, что невозможно разобрать ни одного слова. Возможно, опытный библиотекарь сможет найти ей применение."
"A key formed of dirt, held in place via magic.": "Ключ, сформированный из земли, удерживаемый на месте с помощью магии."
"The shell of a small sea snail. Some say this species comes from the fae realm, but it doesn't seem particularly unusual.": "Раковина маленькой морской улитки. Говорят, что этот вид происходит из царства фей, но она не кажется особенно необычной."
"A string covered in weird little beads and shells.": "Нить, украшенная странными маленькими бусинами и ракушками."
"A dollop of cold, fruit-flavored magical liquid that will change your beard color permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктово-волшебной жидкости, которая навсегда изменит цвет вашей бороды. Этот предмет может растаять.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"A dollop of cold, fruit-flavored magical liquid that will change your beard style permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит стиль вашей бороды. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"The poison-injecting apparatus of a giant bee.": "Ядовитый аппарат гигантской пчелы."
"Made of Cold Iron, this weapon is used in fae civil wars. Fairies who wield it are in constant pain from the metal... but not as much pain as their victims.": "Сделанное из холодного железа, это оружие используется в гражданских войнах фей. Феи, владеющие им, постоянно испытывают боль от металла... но не такую сильную, как их жертвы."
"Impossibly soft felt cloth.": "Невероятно мягкая ткань из фетра."
"A dollop of cold, fruit-flavored magical liquid that will change your hair color permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит цвет ваших волос. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"A dollop of cold, fruit-flavored magical liquid that will change your hairstyle permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит вашу причёску. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"A small piece of honeycomb from a fae beehive.": "Небольшой кусочек сот из улья фей."
"Linen that has been augmented with fae power.": "Лен, усиленный силой фей."
"A jar of sticky slime.": "Банка липкой слизи."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +28 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +28 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A device that floats around the wearer's head and conveys critical information during battle.": "Устройство, которое плавает вокруг головы носителя и передаёт важную информацию во время боя."
"Part of the uniform worn on fae ships. The stretchy gloves seem especially designed for precision work.": "Часть формы, носимой на фейских кораблях. Эластичные перчатки кажутся специально разработанными для точной работы."
"A system of belts and harnesses worn around the hips and legs. Keeps equipment close at hand!": "Система ремней и поясов, надеваемых на бедра и ноги. Держит снаряжение под рукой!"
"A sort of jumpsuit worn by fae officers on their strange ships. Its strange material is very stretchy.": "Свообразный комбинезон, который носят офицеры фей на своих странных кораблях. Его необычный материал очень эластичный."
"Fashioned to look like ice, but significantly more protective.": "Сделан так, чтобы выглядеть как лед, но значительно более защитный."
"Worn by fae officers aboard their strange ships. Made of an unrecognizable material.": "Носится офицерами фей на их странных кораблях. Сделана из неузнаваемого материала."
"An extraordinarily light weapon. The entire blade weighs less than the gaudy gem in the hilt.": "Чрезвычайно лёгкое оружие. Весь клинок весит меньше, чем вычурный драгоценный камень в рукояти."
"This bit of magical rhino horn can be worn as a makeshift necklace.": "Этот кусочек магического рога носорога можно носить как импровизированное ожерелье."
"A tiny ring made of an otherworldly metal.": "Крошечное кольцо из потустороннего металла."
"Elegant silk material.": "Элегантный шелковый материал."
"Thin yet warm. Perhaps magically so.": "Тонкое, но тёплое. Возможно, благодаря магии."
"A dollop of cold, fruit-flavored magical liquid that will change your skin or fur color permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит цвет вашей кожи или меха. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"The preserved skull of a fairy.": "Сохранённый череп феи."
"The giant stabbing part of a giant stabbing wasp.": "Огромная колющая часть гигантской колющей осы."
"A dollop of cold, fruit-flavored magical liquid that will change your wing-style permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит стиль ваших крыльев. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"A dollop of cold, fruit-flavored magical liquid that will change your wing-stype permanently. This item can melt.\n\nNOTE: this changes an aspect of your character's appearance PERMANENTLY. Think before you drink!": "Капля холодной, фруктовой волшебной жидкости, которая навсегда изменит тип ваших крыльев. Этот предмет может растопиться.\\n\\nПРИМЕЧАНИЕ: это навсегда изменит внешний вид вашего персонажа. Подумайте, прежде чем пить!"
"An inscription claims \"Fame and Fortune are Fleeting...\"": "Надпись гласит: «Слава и богатство мимолётны...»"
"A pleasantly sweet semi-hard cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приятно сладкий полутвердый сыр.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A deadly masterpiece that has been disguised to look like a simple sapling bow.": "Смертоносный шедевр, замаскированный под простой молодой лук."
"A slice of mouth-watering honey cake! It's slightly cold to the touch, and it looks somewhat translucent, but it tastes delicious. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Кусочек аппетитного медового пирога! Он слегка холодный на ощупь и выглядит немного полупрозрачным, но на вкус очень вкусный. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The weighting of this weapon is awkward for non-fairies, but it works after you get used to it.": "Вес этого оружия неудобен для нефей, но с ним можно справиться, привыкнув."
"A set of enchanted chimes that can be both plucked and strummed.": "Набор зачарованных колокольчиков, которые можно как щипать, так и перебирая струны."
"A common backup weapon for many types of fairies.": "Обычное запасное оружие для многих видов фей."
"A common backup weapon for Spring Fairies that's beginning to find popularity among Winter as well.": "Обычное запасное оружие Весенних Фей, которое начинает набирать популярность и среди Зимних."
"A handful of magical essence from the fairy dimension. It is used in many fairy creation techniques and can also be consumed directly to restore health and wing luster. (Note: fairy dust is extremely toxic to mortals and should never be consumed by non-fae!)": "Горсть магической эссенции из измерения фей. Используется во многих техниках создания фей, а также может быть употреблена напрямую для восстановления здоровья и блеска крыльев. (Примечание: пыльца фей чрезвычайно токсична для смертных и никогда не должна употребляться не-феями!)"
"A bottle of fairy honey, said to be more delicious than mortals can bear to taste. That's just hyperbole, but it's definitely an extremely rich and complex flavor.": "Бутылочка феяного мёда, который, как говорят, вкуснее, чем смертные могут выдержать. Это всего лишь гипербола, но вкус определённо очень насыщенный и сложный."
"Some extremely dedicated Winter Court fae replace their biological heart with one of these. Presumably it makes them more powerful...": "Некоторые чрезвычайно преданные феи Зимнего Двора заменяют своё биологическое сердце на такое. Предположительно, это делает их сильнее..."
"Made of wood from a world that you will never see (and if you did, all the trees are extinct anyway). It's a little small, but serviceable.": "Сделана из древесины мира, который ты никогда не увидишь (а если и увидишь, все деревья там уже вымерли). Немного маленькая, но пригодная к использованию."
"A small yellow topaz. An incredibly versatile magical stone. This particular piece has been infused with a rune that attunes it to Fairy Magic, giving crafted items a chance to include one or more Fairy Magic powers (with the rest being Mentalism powers).": "Небольшой жёлтый топаз. Невероятно универсальный магический камень. Этот экземпляр был насыщен руной, которая настраивает его на фейскую магию, давая созданным предметам шанс включить одну или несколько способностей фейской магии (остальные — способности ментализма)."
"Teaches you a fairy magic technique.": "Обучает вас технике магии фей."
"Peach juice with secret added ingredients. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Персиковый сок с секретными добавками. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Small dried vegetable chunks, magically puffed with air and then filled with sugar and cheese. It's... interesting.": "Маленькие высушенные овощные кусочки, волшебным образом надутые воздухом, а затем наполненные сахаром и сыром. Это... интересно."
"The strange substance in this bag can keep dying fairies from leaving this plane of existence. It costs 50 Fae Energy to use this item. It smells of honey. (This item is useless to non-fae.)": "Странное вещество в этой сумке может удерживать умирающих фей от ухода из этого плана бытия. Использование этого предмета стоит 50 Энергии Фей. Пахнет мёдом. (Этот предмет бесполезен для не-фей.)"
"A cold stew that seems warm to the touch. And it smells amazing. What's your favorite food? Why, it smells exactly like that, and tastes even better!": "Холодное рагу, которое кажется тёплым на ощупь. И пахнет потрясающе. Какая у тебя любимая еда? Вот именно так оно и пахнет, а на вкус даже лучше!"
"The broken-off wing of a dead fairy. Broken fairy wings are a horrific, nauseating sight to other fairies.": "Отломанное крыло мёртвой феи. Сломанные крылья фей вызывают ужас и тошноту у других фей."
"Worn by lay followers of Strekios, the God of Self-Improvement. It's styled after the terrifying medallions worn at Strekios Camps, but this one is purely decorative, aside from a few enchantments that were added later.": "Носится мирянами Стрекиоса, Бога Самосовершенствования. Выполнен в стиле устрашающих медальонов, которые носят в лагерях Стрекиоса, но этот служит исключительно декоративной целью, за исключением нескольких чар, добавленных позже."
"Sure, maybe YOU know it's fake, but nobody else will! They'll think you're riding an actual unicorn!": "Конечно, возможно, ТЫ знаешь, что это подделка, но никто другой не узнает! Они подумают, что ты верхом на настоящем единороге!"
"While it has a close resemblance to a fly amanita, this mushroom is exceptionally poisonous and never edible.": "Хотя он очень похож на мухомор, этот гриб чрезвычайно ядовит и никогда не пригоден в пищу."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item and has a place for a custom message that all visitors will see.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдавать до 1000 единиц одного вида предмета и имеет место для пользовательского сообщения, которое увидят все посетители."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 50 raffle tickets for up to 6 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user.": "Сложное устройство, которое может выдавать лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 50 лотерейных билетов для до 6 предметов (или стаков предметов) и/или денежного приза. Лотерейные билеты могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item and has a place for a custom message that all users will see.": "Сложное устройство, которое может выдавать предметы и принимать валюту. Эта модель может продавать до 1000 единиц одного вида предмета и имеет место для пользовательского сообщения, которое увидят все пользователи."
"A pie so good that it would be foolish to eat it as just a dessert. Eat it as a meal.": "Пирог настолько вкусный, что было бы глупо есть его просто как десерт. Ешьте его как полноценное блюдо."
"A standard Ranalon utility knife that's also a dangerous weapon. (Acts as an Oyster Knife.) (With random level 40 enchantments.)": "Стандартный универсальный нож Раналон, который также является опасным оружием. (Работает как нож для устриц.) (С случайными зачарованиями 40 уровня.)"
"Made of giant seashells. It's more comfortable than it looks. (Includes random level 40 enchantments.)": "Сделаны из гигантских морских раковин. На них удобнее, чем кажется. (Включают случайные зачарования 40 уровня.)"
"These massive seashells have been reinforced with a thin layer of wood, making for uncomfortable but effective armor. (Includes random level 40 enchantments.)": "Эти массивные морские раковины укреплены тонким слоем дерева, что делает доспехи неудобными, но эффективными. (Включает случайные чары 40 уровня.)"
"These gloves are made of woven fishgut and then adorned with strong shells. Odd, but wearable. Includes a built-in utility knife for opening oysters. (Includes random level 40 enchantments.)": "Эти перчатки сделаны из плетёной рыбьей кожи и украшены прочными раковинами. Странно, но носибельно. Встроенный нож для открывания устриц. (Включает случайные чары 40 уровня.)"
"A large shell has been lined with sharkskin and netting. It takes some practice to fight with this on!  (Includes random level 40 enchantments.)": "Большая раковина выстлана акульей кожей и сеткой. Нужно немного потренироваться, чтобы сражаться в таком шлеме! (Включает случайные чары 40 уровня.)"
"Made of giant seashells stitched together with seaweed rope. Surprisingly, they don't stink. (Includes random level 40 enchantments.)": "Сделаны из гигантских морских раковин, сшитых морскими водорослями. Удивительно, но они не воняют. (Включает случайные чары 40 уровня.)"
"An Orichalcum blade with a seashell motif. (With random level 40 enchantments.)": "Клинок из орихалка с мотивом морской раковины. (С случайными зачарованиями уровня 40.)"
"Made of the exotic ocean metal Orichalcum, this shield is light, strong, and durable. (Includes random level 40 enchantments.)": "Сделан из экзотического океанского металла орихалкума, этот щит лёгкий, прочный и долговечный. (Включает случайные чары 40 уровня.)"
"This traditional merfolk weapon has useful water enchantments, but unfortunately those same enchantments make it useless for fire magic. (With random level 40 enchantments.)": "Это традиционное оружие русалочьих племён обладает полезными водными чарами, но, к сожалению, те же чары делают его бесполезным для огненной магии. (С случайными чарами 40 уровня.)"
"A tasty meal served in flaky pastry.": "Вкусное блюдо, поданное в слоёном тесте."
"Vinegar infused with a secret blend of spices.": "Уксус, настоянный на секретной смеси специй."
"Commissioned by Arianna Fangblade for a close personal friend.": "Заказано Арианной Фангблейд для близкого личного друга."
"A classic elven-style bow with magic to enhance distance.": "Классический эльфийский лук с магией для увеличения дальности."
"This box can be used to grow a crop of mushrooms.\nGrow Time: 20% faster than normal\nXP Penalty: -50% XP per mushroom": "Эта коробка используется для выращивания грибов.\\nВремя выращивания: на 20% быстрее обычного\\nШтраф к опыту: -50% опыта за каждый гриб"
"A longbow optimized for quick shots.": "Длинный лук, оптимизированный для быстрых выстрелов."
"The original Fatestick was created in a bygone age by Jessandra the Cruel, who used it to save an orphanage from frost bees. Afterwards she declared that the staff had somehow tricked her into being kind and discarded it.": "Оригинальный Жезл Судьбы был создан в давние времена Джессандрой Жестокой, которая использовала его, чтобы спасти приют от морозных пчёл. После этого она заявила, что посох каким-то образом обманул её, заставив быть доброй, и выбросила его."
"A lemony liquid designed to counter the effects of severe Pineal Juice abuse.": "Лимонная жидкость, предназначенная для нейтрализации последствий сильного злоупотребления соком шишковидной железы."
"A drop of magical liquid containing the essence of fear.": "Капля магической жидкости, содержащей сущность страха."
"Used in the parlor game known as \"featherball\". This is a nice one!": "Используется в салонной игре, известной как «пёрышко». Это отличный экземпляр!"
"A clump of feathers from a midsized bird.": "Клок перьев среднего по размеру птицы."
"When you put these slippers on, your whole body feels lighter.": "Когда вы надеваете эти тапочки, всё ваше тело ощущается легче."
"Inlaid with intricate patterns that are incredibly precise. The palms have tiny quick-access pockets, too!": "Инкрустированы замысловатыми узорами с невероятной точностью. На ладонях также есть крошечные кармашки для быстрого доступа!"
"A bone.": "Кость."
"A pile of femurs that have been positioned in a very specific way. What's it for? Eh, who cares... probably not important.": "Куча бедренных костей, расположенных очень специфическим образом. Для чего это? Да кому какое дело... наверное, не важно."
"Seems like a normal femur.": "Похоже на обычную бедренную кость."
"Boosts all of your attacks, but your maximum Power will be significantly reduced. Tastes like sludge.": "Усиливает все ваши атаки, но максимальная Сила значительно снижается. На вкус как грязь."
"Keeps potted plants healthy.": "Поддерживают здоровье комнатных растений."
"A tiny puff of fetid air. Somehow it stays coherent.": "Крошечный клубок зловонного воздуха. Как-то умудряется оставаться цельным."
"A brined cheese with a clean, slightly sour taste.\n\nCheese Type: Brine (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сыр в рассоле с чистым, слегка кислым вкусом.\n\nТип сыра: Рассольный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A small cloth satchel containing special powder that can be used to commune with the dead.": "Небольшая тканевая сумка, содержащая особый порошок, который можно использовать для общения с мёртвыми."
"Light, delicate gloves that seem far more fragile than they really are.": "Лёгкие, изящные перчатки, которые кажутся гораздо более хрупкими, чем есть на самом деле."
"A delicious mushroom.": "Вкусный гриб."
"A pile of flaked Field mushrooms.": "Кучка хлопьев из луговых грибов."
"An evil weapon forged in a dark fire. A necromancy gem rests in the hilt like a gaudy bauble.": "Злое оружие, выкованное в тёмном огне. В эфесе покоится некромантский самоцвет, словно безвкусная безделушка."
"A small collar studded with sardonyx gems. Popular among certain sentient animals.": "Маленький ошейник, украшенный камнями сардоноикса. Популярен среди некоторых разумных животных."
"A hot piece of magical crystal.": "Горячий кусок магического кристалла."
"A primer on Combat Psychology. (Raises your skill to 1 if you don't know Combat Psychology.)": "Введение в боевую психологию. (Повышает ваш навык до 1, если вы не знаете боевую психологию.)"
"It's empty, but the box itself is quite beautiful.": "Она пустая, но сама шкатулка довольно красивая."
"An antique plate with careful metalwork. It's tarnished and dented, but still valuable.": "Античные латы с тщательной металлообработкой. Они потускнели и помяты, но всё ещё ценны."
"A large knife for cutting meat and organs out of corpses (+5 to your effective skill when Butchering). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Большой нож для нарезки мяса и органов из трупов (+5 к вашему эффективному навыку при разделке). (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)"
"Disgusting fat from an animal.": "Отвратительный жир животного."
"This foul orcish invention gives you a burst of energy to win a battle... but you don't typically get to celebrate for long.": "Это отвратительное орочье изобретение дарит вам всплеск энергии, чтобы выиграть битву... но обычно радоваться приходится недолго."
"Porous cotton that's resistant to heat. Ideal for creating mold cheeses that take a long time to ripen.": "Пористый хлопок, устойчивый к нагреву. Идеально подходит для создания плесневых сыров, которые долго созревают."
"Sacrificing defense for maneuverability, this shield is for experts who want to deal more damage with their shield.": "Жертвуя защитой ради манёвренности, этот щит предназначен для экспертов, которые хотят наносить больше урона своим щитом."
"A small sentient gem that takes notes on your use of fire magic.": "Небольшой разумный самоцвет, который записывает ваши действия при использовании огненной магии."
"A small sentient gem that takes notes on your use of fire magic and automatically adjusts your spells to be more effective and protective.": "Небольшой разумный самоцвет, который ведёт записи о вашем использовании огненной магии и автоматически настраивает ваши заклинания, чтобы сделать их более эффективными и защитными."
"This rock is always painfully hot to the touch.": "Этот камень всегда обжигающе горячий на ощупь."
"This bright red powder always feels warm to the touch.": "Этот ярко-красный порошок всегда кажется тёплым на ощупь."
"A warm sludgey liquid.": "Тёплая вязкая жидкость."
"Can be studied to earn Fire Magic XP. (Requires VIP.)": "Можно изучать для получения опыта в Огненной магии. (Требуется VIP.)"
"Teaches you a variant of Fire Wall 4 with different-colored flames. You must already know Wall of Fire 4 to use this variant.": "Обучает вас варианту Огненной стены 4 с пламенем другого цвета. Для использования этого варианта вы должны уже знать Огненную стену 4."
"This glittery stone has a fantastic redness.": "Этот блестящий камень обладает фантастической краснотой."
"It's fizzing unnaturally.": "Оно пузырится неестественно."
"It's bubbling! Like magma! But it's not actually very hot.": "Оно пузырится! Как магма! Но на самом деле не очень горячее."
"A small cask used in dairy and beer production.": "Небольшая бочка, используемая в производстве молочных продуктов и пива."
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 4 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 4 часа. (Вам не нужно всё это время оставаться в пещере или быть в сети.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 1 hour. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 1 час. (Вам не нужно всё это время оставаться в пещере или быть в сети.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 2 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 2 часа. (Вам не нужно всё это время находиться в пещере или быть онлайн.)"
"This cask needs to be placed in a cool, damp cave. The cheese inside will then ripen in 3 hours. (You do not need to remain in the cave or online the whole time.)": "Этот бочонок нужно поместить в прохладную, влажную пещеру. Сыр внутри созреет через 3 часа. (Вам не нужно всё это время находиться в пещере или быть в сети.)"
"A rather unappetizing block of 'meat' made from soybeans, used in cooking. It is firm with a smooth texture.": "Довольно непривлекательный кусок «мяса», сделанный из соевых бобов, используемый в кулинарии. Он плотный с гладкой текстурой."
"A dark red stone, known for its curative properties. This particular stone has been attuned to the First Aid skill if used in crafting.": "Темно-красный камень, известный своими целебными свойствами. Этот конкретный камень был настроен на навык первой помощи при использовании в ремесле."
"Can be studied to earn First Aid XP. (Requires VIP.)": "Можно изучать для получения опыта в первой помощи. (Требуется VIP.)"
"Teaches you a first aid technique.": "Обучает технике первой помощи."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 2 Guild Credits. You must be in a long-term animal form to use this ability.": "Верните к жизни союзника, казавшегося мёртвым. Союзник вернётся с половиной своего максимального здоровья. Требует 2 кредита гильдии. Для использования способности необходимо находиться в длительной животной форме."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 3 Guild Credits.": "Верните, казалось бы, мёртвого союзника к жизни. Союзник вернётся с половиной своего максимального здоровья. Требует 3 кредита гильдии."
"Bring a seemingly-dead ally back to life. The ally will return with half of their Max Health. Consumes 1 Guild Credit. You must be Hardcore to use this ability.": "Верните казалось бы мёртвого союзника к жизни. Союзник вернётся с половиной своего максимального здоровья. Использует 1 кредит гильдии. Для использования этой способности вы должны быть в режиме Хардкор."
"A beaker full of a very, very stinky substance.": "Колба, полная очень-очень вонючего вещества."
"The skeleton of a fish.": "Скелет рыбы."
"An unusual but tasty meal.": "Необычное, но вкусное блюдо."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 10% chance of catching bonus fish. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить в вас чувство морского приключения.\\n\\nДарует 10% шанс поймать бонусную рыбу. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 17% chance of catching bonus fish. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить ваше чувство морского приключения.\\n\\nДарует 17% шанс поймать бонусную рыбу. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 25% chance of catching bonus fish. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить в вас чувство морского приключения.\\n\\nДарует 25% шанс поймать бонусную рыбу. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 25% chance of catching bonus fish and 20% chance of collecting extra fish scales. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить ваше чувство морского приключения.\\n\\nДарует 25% шанс поймать бонусную рыбу и 20% шанс получить дополнительные рыбьи чешуи. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 33% chance of catching bonus fish and 20% chance of collecting extra fish scales. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить в вас чувство морского приключения.\\n\\nДарует 33% шанс поймать бонусную рыбу и 20% шанс собрать дополнительные рыбьи чешуи. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A collection of fresh flowers arranged in a way that is sure to stimulate your sense of nautical adventure.\n\nGrants 33% chance of catching bonus fish and 40% chance of collecting extra fish scales. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, оформленных так, чтобы пробудить ваше чувство морского приключения.\\n\\nДарует 33% шанс поймать бонусную рыбу и 40% шанс получить дополнительные рыбьи чешуи. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
