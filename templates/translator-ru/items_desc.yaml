"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Armor Augmentation. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную сущность знаний о конкретном навыке — Усилении Брони. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
