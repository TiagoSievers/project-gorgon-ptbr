"These are ledgers, orders, and addresses. Pretty waterlogged.": "Это бухгалтерские книги, заказы и адреса. Довольно промокшие."
"A handkerchief.": "Носовой платок."
"(This item has no appearance)": "(Этот предмет не имеет внешнего вида)"
"Where did all these bugs come from?": "Откуда взялись все эти жуки?"
"It's a filling meal, but nobody's going to ask you for the recipe.": "Это сытное блюдо, но никто не попросит у тебя рецепт."
"Raw clownfish on a ball of delicious rice.": "Сырая рыба-клоун на шарике вкусного риса."
"Raw clownfish wrapped in seaweed, on a ball of delicious rice.": "Сырая рыба-клоун, завернутая в морские водоросли, на шарике вкусного риса."
"A ball of yarn.": "Клубок пряжи."
"Makeshift Summer armor. It grants empathy to the wearer, though only those who are attuned to such things will notice.": "Временная летняя броня. Дарует носителю эмпатию, хотя заметят это лишь те, кто чувствителен к таким вещам."
"When you don this strange metal suit, you can feel your sense of empathy and community diminish. All the better to kill without remorse!": "Когда вы надеваете этот странный металлический костюм, вы чувствуете, как уменьшается ваше чувство эмпатии и общности. Тем лучше убивать без сожалений!"
"This piece of warm, pulsing crystal has been coated in some sort of powder, making it safe to touch.": "Этот кусок тёплого, пульсирующего кристалла покрыт каким-то порошком, что делает его безопасным для прикосновения."
"The beak of a cockatrice. Just touching it causes your hands to go numb momentarily. Creepy!": "Клюв кокатриса. Прикосновение к нему вызывает кратковременное онемение рук. Жутко!"
"Cooking goodness is trapped inside.": "Внутри скрыта кулинарная вкуснятина."
"Not edible by themselves, but useful in recipes.": "Сами по себе не съедобны, но полезны в рецептах."
"\"Coif of Calamities\" is inscribed inside, in tiny lettering. It doesn't seem very calamitous, though. Maybe it was some sort of ancient marketing campaign.": "Внутри мелкими буквами написано «Клобук Бедствий». Однако он не кажется особо бедственным. Возможно, это была какая-то древняя маркетинговая кампания."
"A sack of Councils.": "Мешочек с монетами Совета."
"A small sack of Councils.": "Маленький мешочек с советами."
"These shackles would only fit small creatures, such as fey or possibly dwarves.": "Эти оковы подойдут только маленьким существам, таким как феи или, возможно, гномы."
"An unnatural blue liquid.": "Неестественная синяя жидкость."
"An ugly and not-especially-sharp weapon made of cold iron. Goblins use them when hunting fairies for capture.": "Уродливое и не особенно острое оружие из холодного железа. Гоблины используют его при охоте на фей для поимки."
"A tiny vial of freezing-cold liquid.": "Маленькая флакончик с ледяной жидкостью."
"A delicate flower that seems simultaneously warm and cold.": "Нежный цветок, который кажется одновременно тёплым и холодным."
"The padding is worn through in all the right places, making it easy to fight in these disgusting gloves.": "Наполнитель изношен в нужных местах, что облегчает бой в этих отвратительных перчатках."
"A thick layer of mold lines the inside, helping to seal the helmet to your head.": "Толстый слой плесени покрывает внутреннюю часть, помогая плотно прилегать шлему к голове."
"Sure they're gross, but they're already worn in, and the caked-on dirt provides extra resilience.": "Конечно, они отвратительные, но уже разносились, а засохшая грязь придаёт дополнительную прочность."
"This is the grossest possible thing. But all the blood smears make it harder for monsters to tell where to stab you.": "Это самая отвратительная вещь на свете. Но все эти пятна крови затрудняют монстрам определить, куда тебя колоть."
"These have been perfectly worn in! Nice. But still very smelly.": "Эти ботинки идеально разносились! Отлично. Но всё ещё очень воняют."
"Seems like a nice horn.": "Похоже, что это хороший рог."
"A drinkable wine, but with a slightly musky taste and odor. This is definitely not the kind of wine that elves drink in Verta! But it's not horrible.": "Питьевое вино с лёгким мускусным вкусом и запахом. Это определённо не то вино, которое пьют эльфы в Верте! Но оно не ужасное."
"This barrel smells strongly of gunpowder. Light the fuse to release a swarm of confetti bomb rockets.": "Эта бочка сильно пахнет порохом. Зажгите фитиль, чтобы выпустить рой ракет с конфетти."
"Supposedly coated in blood from over 100 different sacrificed creatures, this knife emanates hatred and can lead to unwanted thoughts of murder. A necromancy gem is embedded in the hilt.": "Якобы покрытый кровью более 100 принесённых в жертву существ, этот нож излучает ненависть и может вызвать нежелательные мысли о убийстве. В рукоятке вставлен некромантский самоцвет."
"Can be studied to earn Cooking XP. (Requires VIP.)": "Можно изучать для получения опыта в Кулинарии. (Требуется VIP.)"
"A low-quality wine that's most useful for cooking.": "Низкокачественное вино, которое больше всего полезно для готовки."
"Teaches you a meal recipe.": "Обучает рецепту блюда."
"Teaches you a snack recipe.": "Обучает рецепту закуски."
"Teaches you a way to prepare eggs, bacon, and cheese into a hearty meal.": "Обучает способу приготовления яиц, бекона и сыра в сытное блюдо."
"Teaches you a distressing meal recipe.": "Обучает рецепту тревожного блюда."
"Teaches you a disturbing meal recipe.": "Учится рецепту тревожного блюда."
"Teaches you a pumpkin dessert recipe.": "Обучает рецепту десерта из тыквы."
"Teaches you how to prepare an orcish soup.": "Обучает приготовлению орочьего супа."
"Teaches you a drink recipe.": "Обучает рецепту напитка."
"Teaches you a very simple recipe for unleavened bread.": "Обучает очень простому рецепту пресного хлеба."
"Teaches you a technique for deep-frying mushrooms.": "Обучает технике глубокого жарения грибов."
"Teaches you a simple technique for frying crabs.": "Обучает простому способу жарки крабов."
"Teaches you how to make a meal.": "Обучает приготовлению блюда."
"Teaches you a tasty seasonal snack recipe.": "Обучает рецепту вкусного сезонного лакомства."
"Teaches you a way to prepare kraken tendrils.": "Обучает способу приготовления щупалец кракена."
"Teaches you how to prepare a delicious holiday treat.": "Обучает приготовлению вкусного праздничного угощения."
"Teaches you how to make a potato with all kinds of stuff on it.": "Обучает приготовлению картофеля с различными добавками."
"Teaches you how to make a snack.": "Обучает приготовлению закуски."
"Teaches you how to prepare eel in the orcish way.": "Обучает приготовлению угря по-орочьи."
"Teaches you how to make orcish onion soup.": "Обучает приготовлению орочего лукового супа."
"Teaches you how to prepare a hearty platter of snacks, fit for a hungry orc.": "Научит вас готовить сытное блюдо закусок, подходящее для голодного орка."
"Teaches you a way to prepare an egg.": "Обучает способу приготовления яйца."
"Teaches you a snack recipe. ": "Обучает рецепту закуски."
"Teaches you a simple pumpkin drink recipe.": "Обучает простому рецепту тыквенного напитка."
"Teaches you a tasty pumpkin meal recipe.": "Обучает рецепту вкусного блюда из тыквы."
"Teaches you a seasonal drink recipe.": "Обучает рецепту сезонного напитка."
"Teaches you how to make a salad that's beloved by ranalon everywhere.": "Научит вас готовить салат, который любят раналоны повсюду."
"Teaches you a specialized cooking recipe.": "Обучает вас специализированному рецепту приготовления."
"Teaches you how to make a type of pancakes called tagenites, common in the crone hegemony and very popular with orcs.": "Обучает приготовлению особого вида блинов, называемых тагенитами, распространённых в гегемонии Крона и очень популярных среди орков."
"Teaches you a forbidden cooking technique from a lost age.": "Обучает запретной кулинарной технике из утраченной эпохи."
"Teaches you a meal recipe that is also an ingredient.": "Обучает рецепту блюда, которое также является ингредиентом."
"Teaches you a specialized recipe most appealing to psychic mantises.": "Обучает специализированному рецепту, особенно привлекательному для психических богомолов."
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Hot-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Толстое одеяло, которое дарит тепло и комфорт кобыле во время беременности. Это одеяло подходит кобылам с горячим темпераментом. Дайте лошади в стойле во время фазы беременности, чтобы ускорить вынашивание на 24 часа. (Также может использоваться для согревания в "
"An all-purpose token that can be used for various special or live events. To use or redeem this token, please follow the instructions given from the event you acquired it from. Please note that this token could disappear without notice once the associated event has ended.": "Универсальный жетон, который можно использовать для различных специальных или живых событий. Чтобы использовать или обменять этот жетон, пожалуйста, следуйте инструкциям, полученным на событии, где вы его получили. Обратите внимание, что этот жетон может исчезнуть без предупреждения после окончания связанного с ним события."
"A chunk of soft metal. While it's not particularly strong, it's very easy for smiths to work with, so it has uses in specialized armors and weapons. Fletchers use it to create dense arrows.": "Кусок мягкого металла. Хотя он не особенно прочный, кузнецам очень легко с ним работать, поэтому он используется в специализированных доспехах и оружии. Лучники используют его для создания плотных стрел."
"A tasty mushroom.": "Вкусный гриб."
"A pile of powdered Coral mushrooms.": "Куча порошка из коралловых грибов."
"This key is made of cork! It seems quite fragile.": "Этот ключ сделан из пробки! Он кажется довольно хрупким."
"These are perfect for corking bottles of not-yet-implemented craftable wine.": "Идеально подходят для закупоривания бутылок с еще не реализованным крафтовым вином."
"A fresh uncooked ear of corn. Corn is a bit of a delicacy in the Council Lands, although it's extremely common elsewhere.": "Свежий сырой початок кукурузы. Кукуруза считается деликатесом в Землях Совета, хотя в других местах она очень распространена."
"A handful of seeds to grow corn.": "Горсть семян для выращивания кукурузы."
"A delicious cheesy snack.": "Вкусная сырная закуска."
"Dye used to color a piece of clothing or armor cornflower blue.": "Краска, используемая для окрашивания одежды или брони в цвет василькового синего."
"Corn ground into meal. It's useful for cooking in this form.": "Кукуруза, перемолотая в муку. В таком виде полезна для приготовления пищи."
"These vouchers were used with the first version of Statehelm's cornucopia, but that was years ago. The newest system is fully automated and these are but souvenirs.": "Эти купоны использовались с первой версией рога изобилия Стейтхелма, но это было много лет назад. Новая система полностью автоматизирована, и эти купоны теперь лишь сувениры."
"They've turned all green and gross. But they'll still work to make your punches more painful.": "Они позеленели и стали неприятными. Но всё равно помогут сделать ваши удары более болезненными."
"Rust damage has taken a heavy toll on this breastplate. It's still functional, but you'll probably get rust stains all over yourself.": "Ржавчина сильно повредила этот нагрудник. Он всё ещё пригоден, но, скорее всего, вы испачкаетесь ржавчиной."
"An ancient dirk that has been altered by dark magic. But don't worry, it's still sharp.": "Древний кинжал, изменённый тёмной магией. Но не волнуйтесь, он всё ещё острый."
"Teaches you how to summon a cosmetic pet Face of Death.": "Обучает призывать косметического питомца Лик Смерти."
"Teaches you how to summon a cosmetic pet Fae Dragon.": "Обучает призывать косметического питомца — фейского дракона."
"Teaches you how to summon a cosmetic pet Gargoyle.": "Обучает вас призывать косметического питомца Гаргулью."
"Teaches you how to summon a cosmetic pet Kraken.": "Обучает призывать косметического питомца Кракена."
"Teaches you how to summon a cosmetic pet Worghest.": "Обучает призывать косметического питомца Воргеста."
"A liquidy cheese with large curds.\n\nCheese Type: Fresh (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жидковатый сыр с крупными сгустками.\n\nТип сыра: Свежий (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A tasty baked dish with beef and veggies.": "Вкусное запечённое блюдо с говядиной и овощами."
"A blob of dirty cotton, full of seeds. You could de-seed it by hand... but that would take forever. You could also plant the seeds in a garden.": "Комок грязного хлопка, полный семян. Вы могли бы удалить семена вручную... но это заняло бы вечность. Вы также можете посадить семена в саду."
"A cotton hat that's good in the cold.": "Хлопковая шапка, хорошо сохраняющая тепло в холоде."
"A pair of cloth gloves.": "Пара тканевых перчаток."
"These cotton undergarments are possibly the least interesting piece of clothing possible.": "Эти хлопковые нижние одежды, возможно, самые неинтересные предметы одежды."
"A spindle of thread.": "Катушка нити."
"It's cotton! Breathable, pleasant, cotton. Yep. Cotton.": "Это хлопок! Дышащий, приятный, хлопковый. Да. Хлопок."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 11% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Элегантная витрина, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 11% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки витрина действует 5 минут и может использоваться любым количеством игроков."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 22% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Элегантная композиция, вдохновляющая на большую усердность при чесании хлопка.\n\nДарует 22% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 15."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 33% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Элегантная витрина, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 33% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки витрина действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 35."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 44% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 55.": "Элегантная композиция, вдохновляющая на большую усердность при чесании хлопка.\n\nДарует 44% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 55."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 55% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 75.": "Элегантная витрина, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 55% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки витрина действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 75."
"Stamped with the seal of an official Council representative, this certificate is redeemable for 1000 councils at the Statehelm Bank.": "Печать официального представителя Совета, этот сертификат можно обменять на 1000 советов в Банке Стейтхелм."
"Created by the orcs of Gazluk as part of a short-lived coalition with the neighboring Council Lands. The \"Pathfinders of Kur\" initiative would have been a mixed-race team of orcs and humans that patrolled and mapped the vast mountain range. Unfortunately one of the human diplomats to Kur drunkenly revealed that the Council cared little about Kur itself, but mostly wanted this opportunity to work cooperatively with the orcs and perhaps build comeraderie. The orcs perceived it as \"manipulative human trickery\", killed the diplomat, and called the alliance off. But the armor had already been delivered. It's pretty good.": "Созданы орками Газлука в рамках кратковременного союза с соседними Землями Совета. Инициатива «Проводники Кура» должна была стать смешанной командой орков и людей, патрулирующей и картографирующей обширный горный хребет. К сожалению, один из человеческих дипломатов в Куре в пьяном виде раскрыл, что Совет мало заботится о самом Куре, а в основном хотел использовать эту возможность для сотрудничества с орками и, возможно, укрепления товарищества. Орки восприняли это как «манипулятивную человеческую уловку», убили дипломата и разорвали союз. Но доспехи уже были доставлены. Они довольно хорошие."
"The product of a short-lived treaty with the Orcs of Gazluk, these orcish-style boots are comfortable and keep the feet dry in any environment. The boots were stored in a military warehouse for decades, which gives them a musty odor, but they are in great shape.": "Результат кратковременного соглашения с орками Газлука, эти сапоги в орочьем стиле удобны и сохраняют ноги сухими в любой среде. Сапоги хранились в военном складе десятилетиями, из-за чего имеют затхлый запах, но находятся в отличном состоянии."
"While decades old, these gloves have never been worn in combat. They were crafted for \"all-weather exploration\", but to the orcs that made them, that mostly meant \"cold-weather exploration\".": "Хотя этим перчаткам уже несколько десятков лет, они никогда не использовались в бою. Их создали для «исследований в любых погодных условиях», но для орков, которые их сделали, это в основном означало «исследования в холодную погоду»."
"This helmet was crafted by orcs, but was intended to be worn by both orcs and humans. The quality is excellent, but the most interesting feature is definitely the custom ear guard: the creators apparently believed that human ears are especially vulnerable, so they provided special removable padding to give them extra security. No-one knows why the orcs felt this was necessary, and the decision is somewhat troubling.": "Этот шлем был изготовлен орками, но предназначался для ношения как орками, так и людьми. Качество отличное, но самой интересной особенностью является индивидуальная защита уха: создатели, по-видимому, считали, что уши человека особенно уязвимы, поэтому предусмотрели специальную съемную прокладку для дополнительной защиты. Никто не знает, почему орки сочли это необходимым, и это решение вызывает некоторое беспокойство."
"Designed to be worn by either orcs or humans, these pants feature several cinch-points to make them comfortable for any leg girth. With clever manipulation of these belts you store a few small items in them... although that wouldn't be very comfortable.": "Разработанные для ношения как орками, так и людьми, эти штаны имеют несколько затяжек, чтобы обеспечить комфорт для любой толщины ног. С помощью умелого обращения с этими ремнями вы можете хранить в них несколько мелких предметов... хотя это будет не очень удобно."
"It has an inscription: \"Ensorcelled by Official Council Battlemages. Not for use by Rakshasa upon penalty of triple-death.\"": "На нем надпись: «Заколдован официальными боевыми магами Совета. Запрещено использовать Ракшасам под угрозой тройной смерти.»"
"The preferred blade of elvish courtesans in non-elvish lands, this sneaky knife can be concealed almost anywhere. The hilt has symbols of Arisetsu and Errana.": "Предпочитаемый клинок эльфийских куртизанок в неэльфийских землях, этот хитрый нож можно спрятать практически в любом месте. Рукоять украшена символами Арисэцу и Эрраны."
"Milky. Hmm. Turns out that's not really a good thing when it comes to describing potion taste.": "Молочное. Хмм. Оказывается, это не очень хорошо, когда речь идет об описании вкуса зелья."
"Test potion transforms you into a cow. Permanent until dispelled! WARNING: think before you drink!": "Тестовое зелье превращает вас в корову. Действует постоянно, пока не будет снято! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to cattle when used in crafting.": "Красивый камень с тёмно-зелёными полосами, хорошо известен тем, что помогает в магической коммуникации. Этот конкретный камень был насыщен руной, которая настраивает его на скот при использовании в ремесле."
"Horseshoes, but fitted for a cow's hooves.": "Подковы, но приспособленные для копыт коровы."
"Can be studied to earn Cow XP. (Requires VIP.)": "Можно изучать для получения опыта в коровах. (Требуется VIP.)"
"This clever costume is perfect for cows that need to go undercover. A symbol of Arisetsu has been hidden inside.": "Этот умный костюм идеально подходит для коров, которым нужно действовать инкогнито. Внутри спрятан символ Арисецу."
"Teaches you a cow technique.": "Обучает вас технике доения коровы."
"A thick blanket that gives warmth and comfort to a mare during pregnancy. This blanket is suitable for mares with a Cool-Blooded temperament. Give to a stabled horse during gestation phase to accelerate gestation by 24 hours. (Can also be used for warmth in an ": "Толстое одеяло, которое дарит тепло и комфорт кобыле во время беременности. Это одеяло подходит для кобыл с темпераментом Хладнокровный. Дайте лошади в стойле во время беременности, чтобы ускорить срок на 24 часа. (Также может использоваться для согрева в "
"A raw crab.": "Сырой краб."
"Cleaned crab meat, ready for cooking": "Очищенное мясо краба, готовое к приготовлению"
"Raw crab meat on a ball of delicious rice.": "Сырое мясо краба на шарике вкусного риса."
"Tasty crabmeat in a makeshift bun. Lemony!": "Вкусное крабовое мясо в импровизированной булочке. С лимонным вкусом!"
"Raw crab meat wrapped in seaweed, on a ball of delicious rice.": "Сырое мясо краба, завернутое в морские водоросли, на шарике вкусного риса."
"It's a bit cracked.": "Он немного треснул."
"This token is the special currency of the Crafter's Guild. It seems to have no real Council value to it, but the members of the Crafting Caravan value them for trade among fellow professionals.": "Этот жетон является специальной валютой Гильдии Ремесленников. Кажется, он не имеет реальной ценности в Совете, но члены Ремесленного Каравана ценят его для торговли между профессионалами."
"Several pages of notes written entirely in Orcish. There are a few drawings and diagrams depicting a rotational device.": "Несколько страниц заметок, полностью написанных на орочьем языке. Есть несколько рисунков и схем, изображающих вращательное устройство."
"Some fresh cranberries. Too bitter to be eaten raw, but useful in cooking.": "Свежая клюква. Слишком горькая, чтобы есть её сырой, но полезна в кулинарии."
"A delicious seasonal wine.": "Вкусное сезонное вино."
"An exquisite dessert. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Изысканный десерт. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Mutton marinaded in fresh-squeezed cranberry juice. Mmm.": "Баранина, маринованная в свежевыжатом клюквенном соке. Ммм."
"Steak marinaded in fresh-squeezed cranberry juice. Mmm.": "Стейк, замаринованный в свежевыжатом клюквенном соке. Ммм."
"These balls of tofu are shaped and flavored to be just like meat, then dipped in a savory cranberry sauce.": "Эти шарики из тофу сформированы и приправлены так, чтобы быть как мясо, а затем обмакнуты в пикантный клюквенный соус."
"Made from fresh in-season ingredients, this meal hits the spot.": "Приготовлен из свежих сезонных ингредиентов, это блюдо точно придется по вкусу."
"A large gear that came out of a very large golem. It's bent and has no obvious purpose.": "Большое зубчатое колесо, которое выпало из очень большого голема. Оно согнуто и не имеет очевидного назначения."
"A large caliper designed for measuring the distance between two points on a skull. Used by Phrenologists.": "Большой штангенциркуль, предназначенный для измерения расстояния между двумя точками на черепе. Используется френологами."
"A substance made of cranium powder, mixed with chemicals that alter its effect.": "Вещество из порошка черепа, смешанное с химикатами, изменяющими его действие."
"Delicious gel boosts your maximum power by 100 for two minutes.": "Вкусный гель увеличивает вашу максимальную силу на 100 на две минуты."
"Powdered brains of psychic creatures. A choice drug for psychics.": "Порошок из мозгов психических существ. Избранный наркотик для экстрасенсов."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with a secret catalyst for added effect.": "Зачарованные и измельчённые шишковидные железы разумных существ, смешанные с секретным катализатором для усиления эффекта."
"A spreadable cheese with a sour taste.\n\nCheese Type: Fresh (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Намазываемый сыр с кислым вкусом.\n\nТип сыра: Свежий (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A delicious meal.": "Вкусное блюдо."
"A bland snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Безвкусная закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A tasty meal that fills you up.": "Вкусное блюдо, которое насытит вас."
"A pumpkin carved with a scary octopus face.": "Тыква, вырезанная с пугающим лицом осьминога."
"A dead starfish. It's covered in a strange goop that stings to the touch.": "Мёртвая морская звезда. Она покрыта странной слизью, которая жалит при прикосновении."
"Corn, peas, and chopped red pepper in a delicious butter sauce.": "Кукуруза, горох и нарезанный красный перец в вкусном сливочном соусе."
"Fish marinaded in sweet fruit juices, grilled to perfection, and garnished with crunchy almond flakes.": "Рыба, замаринованная в сладких фруктовых соках, идеально приготовленная на гриле и украшенная хрустящими миндальными хлопьями."
"Tasty fried beetle skewers. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусные жареные шашлычки из жуков. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A fruit-juice mix with a heavenly taste (if a bit sweet). (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Смесь фруктовых соков с божественным вкусом (хотя и немного сладковатым). (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A hearty mix of fresh fruit. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сытная смесь свежих фруктов. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одному каждого и получить преимущества обоих.)"
"A light and tasty snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Лёгкая и вкусная закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A delicious salad, the perfect accompaniment to a heavy meat dish. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусный салат, идеальное дополнение к тяжелому мясному блюду. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Tasty raw vexfish wrapped in lettuce, on a ball of rice and peas.": "Вкусная сырая рыба-векс, завернутая в салат, на шарике риса и гороха."
"A tart that's perfectly sweet and perfectly sour. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Пирог с идеальным сочетанием сладкого и кислого. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Dye used to color a piece of clothing or armor crimson.": "Краситель, используемый для окрашивания одежды или брони в алый цвет."
"Some aberrant chemical reaction has burned off most of the crimson, but it's otherwise in good shape.": "Какая-то аномальная химическая реакция сожгла большую часть багрового цвета, но в остальном она в хорошем состоянии."
"The wings of a dead crimsonfelt butterfly.": "Крылья мёртвого багрового мотылька."
"Throw enough spices into coffee and it tastes pretty good! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Добавьте достаточно специй в кофе, и он получится очень вкусным! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"It smells of offal.": "Пахнет внутренностями."
"A bundle of 1000 arrow fletchings for awesome and incredible arrows.": "Пучок из 1000 оперений для стрел для потрясающих и невероятных стрел."
"A potent drink that's popular among poor humans of the Crone Hegemony. (Actual Crones drink much higher-quality stuff.) This can warm you up on a cold day! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Крепкий напиток, популярный среди бедных людей Гегемонии Старухи. (Настоящие Старухи пьют напитки гораздо более высокого качества.) Он согреет вас в холодный день! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить бонусы от обоих.)"
"Can be studied to earn Crossbow XP. (Requires VIP.)": "Можно изучать для получения опыта в арбалетном деле. (Требуется VIP.)"
"This unassuming-looking weapon hides a series of fire runes on the inside of the flight groove.": "Это неприметное оружие скрывает ряд огненных рун внутри канала полета."
"Teaches you a crossbow technique.": "Обучает технике стрельбы из арбалета."
"A drop of some foul magical liquid.": "Капля какой-то зловонной магической жидкости."
"See Qatik in the Red Wing Casino to trade this token in for a magical crown!": "Встретьтесь с Катиком в казино Красное Крыло, чтобы обменять этот жетон на волшебную корону!"
"Named after a dwarven children's folk hero, this hammer's weighting is very odd. But quite powerful when you get the hang of it.": "Названный в честь народного героя среди гномьих детей, вес этого молота очень необычен. Но он довольно мощный, когда вы к нему привыкнете."
"The bloody skin of a lowly animal.": "Кровавая шкура ничтожного животного."
"This uncomfortable wooden spider suit was designed with the best of intentions. It just sucks. But the wood can act as a focal point for druidic spiders.": "Этот неудобный деревянный паучий костюм был создан с самыми благими намерениями. Но он просто ужасен. Зато дерево может служить фокусом для друидических пауков."
"This smells like a cold, cold, morning in a fairly-unpleasant-smelling place.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот запах напоминает холодное, холодное утро в довольно неприятном месте.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A necklace depicting the warm sun, one of the symbols of Arisetsu.": "Ожерелье с изображением тёплого солнца, одного из символов Ариcэцу."
"It smells like burned bacon! Which isn't a great smell. It makes you really want to eat some bacon, though.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Пахнет подгоревшим беконом! Что не очень приятно. Зато очень хочется съесть немного бекона.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A no-nonsense outdoor scent that makes you want to go out and crush things.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Практичный запах свежего воздуха, вызывающий желание выйти и всё разгромить.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x5.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 5 раз."
"They mostly stay on your foot, which is good.": "Они в основном остаются на вашей ноге, и это хорошо."
"Uncomfortable chain that drapes the body.": "Неудобная кольчуга, облегающая тело."
"An imperfectly weighted, terribly uncomfortable head covering.": "Неправильно сбалансированное, крайне неудобное головное покрытие."
"Some effort has been made to link the chains into a glove shape!": "Прилагались некоторые усилия, чтобы соединить кольца в форму перчатки!"
"Poorly-made chain that has been organized into a semblance of pants.": "Плохо сделанная кольчуга, собранная в подобие штанов."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +12 for 30 minutes.": "Относительно удобный стул. Отдых в нём повышает восстановление брони на +12 в течение 30 минут."
"A tough head covering. Ugly, but practical.": "Прочное головное покрытие. Некрасивое, но практичное."
"Thickened cloth gloves with resilience but no panache.": "Утолщённые тканевые перчатки с выносливостью, но без изящества."
"A rustic farmer might consider these pants barely adequate. Might.": "Сельский фермер мог бы считать эти штаны едва ли подходящими. Возможно."
"Hm... there must be something nice to say about this shirt. Ah! The pockets are sewn on straight. Nice!": "Хм... должно быть что-то хорошее, что можно сказать об этой рубашке. Ах! Карманы пришиты ровно. Отлично!"
"Cloth slippers with a bit of resilience.": "Тканевые тапочки с небольшой прочностью."
"A big tree branch with all the bark removed.": "Большая ветка дерева со снятой корой."
"Look, someone figured out how to sand down the edges of a stick. Too bad the creator had no idea how to balance its weight. The Fire Magic runes look a little less haphazard, though.": "Смотри, кто-то понял, как зашлифовать края палки. Жаль, что создатель не знал, как сбалансировать её вес. Руны Огненной магии выглядят немного менее случайно, однако."
"A crude cow will love these crude shoes.": "Грубая корова полюбит эти грубые ботинки."
"A crude deer will love these crude shoes.": "Грубый олень полюбит эти грубые ботинки."
"A smoky, musty candle that evokes the danger of fire.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Дымная, затхлая свеча, вызывающая ощущение опасности огня.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"The smell of sand in wind. Because there's nothing like smelling a sandstorm in the air to quicken one's pace.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Запах песка на ветру. Ведь нет ничего лучше, чем почувствовать в воздухе песчаную бурю, чтобы ускорить шаг.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"These are shoddy boots that have had sections of their protective armor removed to make them a little more agile. The holes let moisture in, and they quickly stink beyond fathoming.": "Это некачественные сапоги, из которых удалили части защитной брони, чтобы сделать их немного более ловкими. Отверстия пропускают влагу, и они быстро начинают ужасно вонять."
"A sub-par pair of leather leggings has been chopped inexpertly to make it more evasive. The result is humiliating in most respects.": "Пара посредственных кожаных штанов была неумело обрезана, чтобы сделать их более уклончивыми. Результат во многих отношениях унизителен."
"This crumpled leather shirt can't decide whether it wants to be nimble or protective, instead failing at both.": "Эта мятая кожаная рубашка не может решить, хочет ли она быть ловкой или защитной, в итоге не справляясь ни с тем, ни с другим."
"A bland floral scent is slightly uplifted by the tang of violets.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Пресный цветочный аромат слегка оживлён оттенком фиалок.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A belt covered in hooks that face inward, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс, покрытый крючками, направленными внутрь, причиняющими носителю сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут считать, что эта боль усиливает их чувство выживания."
"Crude horseshoes for crude horses.": "Грубые подковы для грубых лошадей."
"Hideous foot wrappings covered in excess leather to provide protection - but not comfort. Expect gigantic blisters.": "Отвратительные обмотки для ног, покрытые лишней кожей для защиты — но не для комфорта. Ожидайте огромные мозоли."
"The craftsmanship of these gloves is adequate, but the material is poor, resulting in a functional pair of gloves that aren't much fun to wear.": "Изготовление этих перчаток приемлемое, но материал плохой, в результате получилась функциональная пара перчаток, которые не доставляют особого удовольствия при ношении."
"While the craftsmanship is adequate, the materials are not, and this helmet looks more like a dead beaver than a helm.": "Хотя мастерство изготовления приемлемо, материалы — нет, и этот шлем больше похож на мёртвого бобра, чем на шлем."
"With an eye toward performance over elegance, these leather pants will protect you from monsters, but not from chafing.": "Ставя во главу угла эффективность, а не изящество, эти кожаные штаны защитят вас от монстров, но не от натирания."
"A well-bundled roll of crude leather.": "Хорошо упакованный свёрток грубой кожи."
"Not nice to look at, but its got it where it counts. Which is to say the chest region.": "Выглядит не очень, но защищает там, где нужно. А именно в области груди."
"A mask designed to be worn to a masquerade ball. It's slightly enchanted with dark magic.": "Маска, предназначенная для ношения на маскараде. Она слегка зачарована тёмной магией."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x5.": "Одноразовый табурет для медитации. Используйте его рядом с Медитационным столбом, чтобы увеличить длительность эффектов медитации в 5 раз."
"Look, someone figured out how to sand down the edges of a stick. Too bad the creator had no idea how to balance its weight. (It will work for Staff Fighting but not Fire Magic abilities.)": "Смотри, кто-то понял, как зашлифовать края палки. Жаль, что создатель не знал, как сбалансировать её вес. (Подойдёт для боя посохом, но не для способностей Огненной магии.)"
"A belt with multiple pockets.": "Пояс с несколькими карманами."
"A symbol of Arisetsu adorns this otherwise-uninteresting staff.": "Символ Арисецу украшает этот в остальном непримечательный посох."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is made of decent materials, but doesn't fit too well.": "Традиционная шляпа, которую носят люди во время зимнего празднования Ри-Шина, бога растений и деревьев. Эта версия сделана из приличных материалов, но сидит не слишком хорошо."
"Goes on a horse.": "Надевается на лошадь."
"A saddlebag for small horses.": "Седельная сумка для маленьких лошадей."
"An almost-overpowering odor of the sea. It reminds you to hold your breath underwater.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Почти подавляющий запах моря. Напоминает задержать дыхание под водой.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Pieces of chitin and metal are sewn into reinforced webbing to create a suit for spiders.": "Куски хитина и металла вшиты в усиленную паутину, чтобы создать костюм для пауков."
"A box for storing up to 8 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 8 предметов. Сохраняется 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить в нём свои предметы. Все ящики для хранения позволяют игроку получить доступ к одним и тем же предметам.)"
"A useful form of rendered fat.": "Полезная форма топленого жира."
"This gross shirt smells of urine. It provides no armor protection, and it's also very itchy.": "Эта отвратительная рубашка пахнет мочой. Она не даёт защиты брони и к тому же очень колется."
"Somebody has worn these undergarments previously without washing them. Hopefully that person was you. But you're not sure. Anyway, they reek, plus they provide no armor.": "Кто-то уже носил это нижнее бельё, не стирая его. Надеемся, что этим человеком были вы. Но вы не уверены. В любом случае, от него неприятно пахнет, и оно не даёт никакой защиты."
"Simple bits of metal designed to fit on the chest and shoulders of a wolf.": "Простые металлические детали, предназначенные для защиты груди и плеч волка."
"It's metal. It fits on a werewolf. These are the only positive attributes.": "Это металл. Он подходит оборотню. Это единственные положительные качества."
"Simple bits of metal designed to fit on the front legs and claws of a wolf.": "Простые металлические детали, предназначенные для передних лап и когтей волка."
"Simple bits of metal designed to fit on the hind legs of a wolf.": "Простые металлические детали, предназначенные для задних лап волка."
"Simple bits of metal designed to fit on the lower legs and haunches of a wolf.": "Простые металлические детали, предназначенные для ношения на нижних частях ног и бедрах волка."
"Wax-coated string for use in a candle.": "Нить, покрытая воском, для использования в свече."
"Not generally considered a good choice, shodding a cow with bits of wood. These crude shoes are... crude.": "Обычно не считается хорошим решением обувать корову кусками дерева. Эти грубые башмаки... действительно грубые."
"Not generally considered a good choice, shodding a deer with bits of wood. These crude shoes are... crude.": "Обычно не считаются хорошим выбором — обутие оленя кусками дерева. Эти грубые башмаки... действительно грубые."
"A not-quite-pleasant pine candle that focuses your instincts toward nature.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Не совсем приятная сосновая свеча, которая настраивает ваши инстинкты на природу.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"This gross shirt still smells of urine. It continues to provide no armor protection, and is even itchier than before. But it does cause enemies to perceive you as less of a threat.": "Эта отвратительная рубашка всё ещё пахнет мочой. Она по-прежнему не даёт никакой защиты брони и даже чешется сильнее, чем раньше. Но она заставляет врагов воспринимать вас как меньшую угрозу."
"A very nasty very heavy stick.": "Очень злая и очень тяжёлая палка."
"A stick that's good for crushing.": "Палка, которая хорошо подходит для дробления."
"The key to a goblin equipment chest.": "Ключ от сундука с экипировкой гоблина."
"A magical freezing system for long-term pet storage. The pet is placed into suspended animation, unable to move, but still able to dream -- and to have nightmares, which cause the pet to lose all of its Happiness. \n\nThis one-use container can hold any captive-bred (not wild-caught) Pet-Quality (non-breeding) animal for up to 90 days. Pets kept in this container for more than 90 days escape and are lost.\n<i>[You can use this item on a stabled pet by visiting a stablemaster. Look for the \"Use Item...\" button on the stable screen.]</i>": "Магическая система заморозки для долгосрочного хранения питомцев. Питомец помещается в состояние приостановленной анимации, не может двигаться, но всё ещё способен видеть сны — и кошмары, которые приводят к полной потере Счастья питомцем. \\n\\nЭтот одноразовый контейнер может хранить любое питомцевое животное (выведенное в неволе, не дикое) качества питомца (не для разведения) до 90 дней. Питомцы, содержащиеся в этом контейнере более 90 дней, сбегают и теряются.\\n<i>[Вы можете использовать этот предмет на питомце, находящемся в стойле, посетив стойлового мастера. Ищите кнопку «Использовать предмет...» на экране стойла.]</i>"
"It's a large hollow crystal. Or rather, a crystalline jar that looks like a crystal?": "Это большой полый кристалл. Или, точнее, кристаллическая банка, которая выглядит как кристалл?"
"A handful of magical ice from the fairy dimension.": "Горсть магического льда из фейного измерения."
"What is that stuff running down the side of the Blood Staff, you ask? Blood. It's blood.": "Что это за жидкость, стекающая по стороне Посоха Крови, спросите вы? Кровь. Это кровь."
"This tongue-numbing drink doesn't taste good. But it doesn't taste BAD, either. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Этот напиток, который онемяет язык, не вкусный. Но и НЕ противный. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Instantly cures the disease \"Creakliver\".": "Мгновенно излечивает болезнь «Скрипящая печень»."
"Instantly cures the disease \"Feeble Fever\".": "Мгновенно излечивает болезнь «Слабая лихорадка»."
"Instantly cures the disease \"Leprosy\".": "Мгновенно излечивает болезнь «Проказа»."
"Instantly cures the disease \"Lunatic Shakes\".": "Мгновенно излечивает болезнь «Безумный дрожь»."
"Instantly cures mummy diseases such as \"Mummy Rot\" and \"Mummy Ache\". Only one disease is cured per dose.": "Мгновенно лечит болезни мумий, такие как «Гниение мумии» и «Боль мумии». За одну дозу лечится только одна болезнь."
"Instantly cures Roundworm infestations.": "Мгновенно излечивает заражение круглыми червями."
"Instantly cures the disease \"Slimy Tremors\".": "Мгновенно излечивает болезнь «Скользкие дрожи»."
"An ordinary Council that's had weird little marks etched into it.": "Обычный Совет, на котором выгравированы странные маленькие знаки."
"A tiny enchanted saw on a chain. But it's not just an amulet: upon command, the tiny saw can cut lumber at high speed! (This item acts as a handsaw.)": "Крошечная зачарованная пила на цепочке. Но это не просто амулет: по команде крошечная пила может быстро распиливать древесину! (Этот предмет действует как ручная пила.)"
"Designed for use by orcish healers, this crossbow comes equipped with a vicious blade for self-defense and a series of holy symbols to allow healing.": "Созданный для использования оркскими целителями, этот арбалет оснащён свирепым лезвием для самозащиты и рядом священных символов для исцеления."
"A lovely stuffed toy with joyous cymbal-clashing action. It can be deployed periodically to entertain others.": "Прекрасная мягкая игрушка с радостным звоном тарелок. Её можно периодически использовать, чтобы развлекать других."
"A set of tools and step-by-step instructions that can let almost anyone improve their blade! The effect is temporary and wears off after a certain number of attacks.": "Набор инструментов и пошаговых инструкций, который позволит почти каждому улучшить своё лезвие! Эффект временный и исчезает после определённого количества атак."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +8 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +8 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A gift from Rappanel, the elven bard. It has something of his signature sound.": "Подарок от Раппанеля, эльфийского барда. В нём есть что-то от его фирменного звучания."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +10 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +10 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A blue cheese with a sweet taste and relatively little odor.\n\nCheese Type: Blue": "Голубой сыр с сладким вкусом и относительно слабым запахом.\n\nТип сыра: голубой"
"This white gem with purple streaks is exceptionally strong and makes very resilient jewelry. In magic, it is likewise associated with toughness.": "Этот белый камень с пурпурными прожилками исключительно прочен и используется для создания очень прочных украшений. В магии он также ассоциируется с выносливостью."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +26 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +26 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 3 ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется способностью Отравленное лезвие 3."
"A vile-tasting potion used by some orcs and rakshasa.": "Отвратительно на вкус зелье, используемое некоторыми орками и ракшасами."
"The horn of a unicorn, enhanced with some sort of dark metal. It looks like it would fit on a deer's head, bonding to the skull and enhancing their abilities.": "Рог единорога, усиленный каким-то тёмным металлом. Похоже, он подходит для головы оленя, срастается с черепом и усиливает его способности."
"Dye used to color a piece of clothing or armor dark blue.": "Краска, используемая для окрашивания одежды или брони в темно-синий цвет."
"Dye used to color a piece of clothing or armor dark chocolate.": "Краситель, используемый для окрашивания одежды или брони в цвет тёмного шоколада."
"This mean-looking weapon has a necromancy gem embedded in it.": "Это зловещее оружие содержит вставленный в него некромантский камень."
"Dye used to color a piece of clothing or armor dark goldenrod.": "Краска, используемая для окрашивания одежды или брони в тёмный золотистый цвет."
"Dye used to color a piece of clothing or armor dark green.": "Краска, используемая для окрашивания одежды или брони в темно-зеленый цвет."
"Dye used to color a piece of clothing or armor dark khaki.": "Краска, используемая для окрашивания одежды или брони в тёмный цвет хаки."
"Dye used to color a piece of clothing or armor dark olive green.": "Краска, используемая для окрашивания одежды или брони в тёмно-оливковый цвет."
"Dye used to color a piece of clothing or armor dark orange.": "Краска, используемая для окрашивания одежды или брони в тёмно-оранжевый цвет."
"Dye used to color a piece of clothing or armor dark red.": "Краска, используемая для окрашивания одежды или брони в темно-красный цвет."
"Dye used to color a piece of clothing or armor dark salmon.": "Краска, используемая для окрашивания одежды или брони в тёмный цвет лосося."
"Dye used to color a piece of clothing or armor dark sea green.": "Краска, используемая для окрашивания одежды или брони в тёмно-морской зелёный цвет."
"Dye used to color a piece of clothing or armor dark violet.": "Краска, используемая для окрашивания одежды или доспехов в тёмно-фиолетовый цвет."
"A cruel weapon for cruel necromancers who like to burn things.": "Жестокое оружие для жестоких некромантов, которые любят жечь всё вокруг."
"This seems like a simple evil crossbow, but in actuality is far more complex, with bizarre otherworldly magic.": "Это кажется простым злым арбалетом, но на самом деле он гораздо сложнее, с причудливой потусторонней магией."
"This glass orb contains swirling black smoke.": "Эта стеклянная сфера содержит закручивающийся чёрный дым."
"A wax-sealed decanter full of liquified bones.": "Декантер, запечатанный воском, полный расплавленных костей."
"A musky elvish perfume currently in vogue in Verta. Its complex scent can mask dirt and odors even from cleanliness-loving elves.": "Мускусные эльфийские духи, сейчас модные в Верте. Их сложный аромат может скрыть грязь и запахи даже от эльфов, любящих чистоту."
"Drab and very old, this robe was once cloth but is now held together by load-bearing cobwebs and magic. Elaborate necromantic symbols have been inscribed inside; the dye of the symbols is long-faded by they can still be detected by the resonant angst one feels when touching the inside of the garment. A slightly newer inscription inside says \"Protect your sanity lest you succumb to the hatred.\"": "Скучная и очень старая, эта роба когда-то была тканью, но теперь держится вместе благодаря несущим паутине и магии. Внутри вырезаны сложные некромантические символы; краска символов давно выцвела, но их всё ещё можно обнаружить по резонансному страху, который ощущается при прикосновении к внутренней стороне одежды. Немного более новая надпись внутри гласит: «Защищай свой рассудок, чтобы не поддаться ненависти.»"
"Dispels haunting.": "Снимает преследование."
"A small, freshly-killed rodent.\n\n(Use in Cheap Meat recipes.)": "Маленький, только что убитый грызун.\n\n(Используется в рецептах дешёвого мяса.)"
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 3' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 3», чтобы установить эту турель.)"
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 5 ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется в способности Ядовитый клинок 5."
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 3' ability to throw this bomb.)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 3», чтобы бросить эту бомбу.)"
"A wooden instrument with terrible and toxic enchantments. Even touching it to your lips causes slight pain.": "Деревянный инструмент с ужасными и ядовитыми чарами. Даже прикосновение к губам вызывает лёгкую боль."
"This red-tinted armor is worn by Gazluk City's front-line soldiers, known as \"Death Troopers\". Their armor enhances their strength and melee prowess.": "Эта броня с красным оттенком носится передовыми солдатами города Газлук, известными как «Смертельные Солдаты». Их броня усиливает их силу и мастерство ближнего боя."
"The bloody skin of an average animal.": "Кровавая шкура обычного животного."
"Decent horseshoes with an anti-water enchantment that helps mounts get out of water faster.": "Неплохие подковы с антиводным заклинанием, помогающим ездовым животным быстрее выходить из воды."
"A feral assault on the nose that enhances your need to fight!\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Дикий удар по обонянию, усиливающий желание сражаться!\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x6.": "Одноразовый стол для выполнения каллиграфии. Установите его, чтобы увеличить продолжительность каллиграфии в 6 раз."
"Aside from the jangle sound when you walk, these boots are decent.": "Кроме звона при ходьбе, эти сапоги вполне неплохие."
"What people expect when they imagine a chainmail shirt.": "То, что люди представляют, когда думают о кольчужной рубахе."
"Approximating the traditional look of a chainmail coif.": "Приближённый к традиционному вид кольчужного капюшона."
"While not a comfortable piece of equipment, it is decently protective.": "Хотя это не самый удобный предмет снаряжения, он достаточно хорошо защищает."
"Aside from the jangle sound when you walk, these are decent pants.": "Кроме звона при ходьбе, это неплохие штаны."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +15 for 30 minutes.": "Удобный стул. Отдых в нём повышает регенерацию брони на +15 на 30 минут."
"A head covering that begins to combine fashion sense with survival sense.": "Головной убор, который начинает сочетать чувство стиля с инстинктом выживания."
"Cloth gloves that fit well and don't look too ridiculous.": "Тканевые перчатки, которые хорошо сидят и не выглядят слишком нелепо."
"The premier choice for those who work the land daily. Strong stitching, and none of that annoying \"attractiveness\" to get in the way.": "Лучший выбор для тех, кто ежедневно трудится на земле. Прочные швы и никакой надоедливой «привлекательности», чтобы не мешать."
"Good for lounging around the house. Where nobody will see you.": "Подходит для отдыха дома. Там, где вас никто не увидит."
"Cloth slippers that fit well and don't look too ridiculous.": "Тканевые тапочки, которые хорошо сидят и не выглядят слишком нелепо."
"A big stick that's weighted so that the heavy part is at the hitting end.": "Большая дубина с утяжелением, чтобы тяжёлая часть была на ударном конце."
"This staff is what you'd expect from a combat staff. Absolutely nothing special, though. The standard Fire Magic runes have been etched into the wood.": "Этот посох именно такой, каким и должен быть боевой посох. Ничего особенного, правда. Стандартные руны Огненной магии выгравированы на дереве."
"Well this is pretty embarrassing.": "Ну, это довольно неловко."
"Hammered together from simple materials, for a simple battle cow.": "Сделан из простых материалов для простой боевой коровы."
"Decent shoes for a cow that's not too shabby.": "Неплохие ботинки для коровы, которые не выглядят плохо."
"Decent shoes for a deer that's not too shabby.": "Неплохие ботинки для оленя, который не так уж плох."
"Reasonable boots that have been oiled and softened to let the wearer dash and dart about. Kinda comfortable, but not really.": "Приличные сапоги, которые были смазаны маслом и размягчены, чтобы позволить носителю быстро метаться и уворачиваться. Вроде бы удобные, но не совсем."
"These leather pants have had the joints replaced with super-soft leather. The stitching is poor, though, and the pants are drafty. Drafty pants!": "Эти кожаные штаны имеют заменённые суставы на сверхмягкую кожу. Однако швы выполнены плохо, и штаны продуваются. Продуваемые штаны!"
"This is incredibly light leather chest armor. You can really move around in this baby. Pity about the stitching. And the color. And the design.": "Это невероятно лёгкая кожаная нагрудная броня. В ней действительно можно свободно двигаться. Жаль только швы. И цвет. И дизайн."
"It's quite strong in potency, but also very generic, with no specific flower scent coming through.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Запах довольно сильный, но при этом очень общий, без выраженного аромата какого-либо конкретного цветка.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Decent horseshoes for decent horses.": "Нормальные подковы для нормальных лошадей."
"The sort of boots you might imagine if you tried to visualize leather boots in your head. Fairly generic.": "Такие сапоги, какие можно представить, если попытаться визуализировать кожаные сапоги в голове. Довольно обычные."
"These still get insanely hot and sweaty when worn, but at least they're kind of fashionable. Kind of.": "Они всё ещё становятся ужасно горячими и потными при ношении, но по крайней мере выглядят довольно модно. В некотором роде."
"A well-made helmet that will keep you alive in combat. But you'll sweat profusely in it, and you don't want to know what it's going to do to your hair.": "Хорошо сделанный шлем, который сохранит тебе жизнь в бою. Но в нём ты будешь сильно потеть, и лучше не знать, что он сделает с твоими волосами."
"Thanks to a modicum of padding inside, wearing these pants will only leave you severely chafed, instead of incapacitated.": "Благодаря небольшой набивке внутри, ношение этих штанов вызовет лишь сильное раздражение кожи, а не обездвиживание."
"A decent roll of leather.": "Нормальный свиток кожи."
"It's pretty generic.": "Довольно обычная."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x6.": "Одноразовый табурет для медитации. Используйте его рядом со Столбом Медитации, чтобы увеличить длительность эффектов медитации в 6 раз."
"This staff is what you'd expect from a combat staff. Absolutely nothing special, though. This will work for Staff Fighting but lacks the runes necessary to work for Fire Magic.": "Этот посох соответствует тому, что вы ожидаете от боевого посоха. Абсолютно ничего особенного. Подойдет для боя посохом, но не содержит рун, необходимых для Огненной магии."
"A shell that can make noise.": "Раковина, которая может издавать звук."
"Mystically attuned to your inventory-management needs.": "Мистически настроена на ваши потребности в управлении инвентарём."
"Basic tack for a horse, with little pouches sewn in for quick access to key items.": "Простое снаряжение для лошади с небольшими карманами для быстрого доступа к важным предметам."
"A professional-looking staff with fire magic and priestly runes etched into it.": "Профессионально выглядящий посох с выгравированными огненными рунами и жреческими символами."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is typical of the ones you'd see in Statehelm.": "Традиционная шапка, которую люди носят во время зимнего празднования Ри-Шина, бога растений и деревьев. Эта версия типична для тех, что можно увидеть в Стейтхелме."
"It's a saddle.": "Это седло."
"A saddlebag that can hold some stuff.": "Седельная сумка, в которую можно положить немного вещей."
"A box for storing up to 12 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 12 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют игроку получить доступ к одним и тем же предметам.)"
"A compound that contains tannic acid. It can be used to create crude and decent leather.": "Соединение, содержащее таниновую кислоту. Может использоваться для создания грубой и приемлемой кожи."
"A reasonable-looking metal helm for a werewolf.": "Прилично выглядящий металлический шлем для оборотня."
"Extra insulated to protect against winds.": "Дополнительная изоляция для защиты от ветров."
"If all you're looking for is some horseshoe-shaped pieces of wood to nail to your cow's feet, you're in luck.": "Если вам нужны лишь деревянные подковообразные куски, чтобы прибить их к копытам вашей коровы, вам повезло."
"If all you're looking for is some horseshoe-shaped pieces of wood to nail to your deer's feet, you're in luck.": "Если вам нужны просто деревянные кусочки в форме подков, чтобы прибить их к копытам вашего оленя, вам повезло."
"A collection of woodsy odors to remind you of your place in nature.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Коллекция древесных ароматов, чтобы напомнить вам о вашем месте в природе.\\n\\nЭта свеча горит 5 минут, и ею могут наслаждаться любое количество людей. Одновременно можно зажигать только одну свечу."
"A gross dead scorpion. It's very heavy.": "Отвратительный мёртвый скорпион. Он очень тяжёлый."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Aberration Anatomy. If you have a vague understanding of the skill, you can drink it to gain experience.": "Этот маленький флакон содержит концентрированную сущность знаний о конкретном навыке — Анатомии Аберраций. Если у вас есть смутное понимание этого навыка, вы можете выпить его, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Alchemy. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит вываренную эссенцию знаний о конкретном навыке — Алхимии. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Ancillary Armor Augmentation. If you have a vague understanding of the skill, you can drink it to gain experience.": "Этот маленький флакон содержит вываренную сущность знаний о конкретном навыке — вспомогательном усилении брони. Если у вас есть смутное представление о навыке, вы можете выпить его, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Animal Handling. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая флакончик содержит вываренную эссенцию знаний о конкретном навыке — Обращении с Животными. Если у вас есть смутное представление об этом навыке, вы можете выпить его, чтобы получить опыт."
