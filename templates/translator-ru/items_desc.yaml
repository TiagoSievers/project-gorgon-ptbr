"For 90 minutes, allows you to detect where monsters will respawn 3 seconds before they arrive. Does not stack with other premonition buffs. (You can only gain one candle buff at a time.)": "В течение 90 минут позволяет обнаруживать, где появятся монстры за 3 секунды до их появления. Не суммируется с другими баффами предчувствия. (Одновременно можно получить только один бафф от свечи.)"
"Provides Fire Damage Resistance +12% for 90 minutes. (You can only gain one candle buff at a time.)": "Обеспечивает сопротивление огненному урону +12% на 90 минут. (Одновременно можно получить только один бафф от свечи.)"
"For 90 minutes, boosts out-of-combat Sprint Speed +2. (You can only gain one candle buff at a time.)": "В течение 90 минут увеличивает скорость бега вне боя на +2. (Одновременно можно получить только один бафф от свечи.)"
"Equipping this armor teaches you the Dwarven Plate Armor suit bonus ability.": "Надев эту броню, вы изучаете бонусное умение комплекта гномьей пластинчатой брони."
"Long-term animals that equip this can use the ability Familiar's Recall": "Долговременные животные, экипирующие это, могут использовать способность Вызов фамильяра"
"Provides Nature Damage Resistance +12% for 90 minutes. (You can only gain one candle buff at a time.)": "Обеспечивает сопротивление природному урону +12% на 90 минут. (Одновременно можно получить только один бафф от свечи.)"
"Equipping this allows you to use the ability Ilth Hale's Kiss 8": "Надев это, вы получаете возможность использовать способность Поцелуй Илта Хейла 8"
"Equipping this allows you to use the ability Visage of Kajich 8": "Надев это, вы сможете использовать умение Облик Каджича 8"
"Lets you use the \"Send Item to Saddlebag\" recipe to teleport items into this bag, even when your mount is not accessible. (Equipping the saddlebag teaches the recipe, if unknown.)": "Позволяет использовать рецепт «Отправить предмет в седельную сумку» для телепортации предметов в эту сумку, даже если ваша ездовое животное недоступно. (Экипировка седельной сумки обучает рецепту, если он неизвестен.)"
"Every 25 seconds, automatically Evade the first Melee attack aimed at you": "Каждые 25 секунд автоматически уклоняетесь от первой направленной на вас атаки в ближнем бою"
"Every 25 seconds, automatically Evade the first Ranged attack aimed at you": "Каждые 25 секунд автоматически уклоняется от первой дистанционной атаки, направленной на вас"
"Every 25 seconds, automatically Evade the first Burst attack aimed at you": "Каждые 25 секунд автоматически уклоняетесь от первой направленной на вас взрывной атаки"
"Equipping this armor teaches you the Orcish Plate Armor suit bonus ability.": "Надев эту броню, вы изучаете бонусное умение комплекта орочьей пластинчатой брони."
"Phlogiston is used in Transmutation recipes and at Transmutation tables. Phlogiston helps you transmute an item's powers into different powers.": "Флогистон используется в рецептах Превращения и на столах Превращения. Флогистон помогает вам преобразовывать силы предмета в другие силы."
"This can be used in Cooking recipes that call for 'Cheap Meat.' In those recipes, all Cheap Meat behaves the same way, so use whatever you have handy.": "Это можно использовать в рецептах Кулинарии, где требуется «Дешёвое мясо». Во всех таких рецептах Дешёвое мясо ведёт себя одинаково, поэтому используйте то, что у вас есть под рукой."
"Regenerate +30 power every 5 seconds (both in and out of combat). Lasts 1 hour or until no cheese is in your system, whichever comes first.": "Восстанавливает +30 энергии каждые 5 секунд (как в бою, так и вне его). Действует 1 час или до полного выведения сыра из организма, в зависимости от того, что наступит раньше."
"For 90 minutes, boosts Max Breath +9 seconds. (You can only gain one candle buff at a time.)": "В течение 90 минут увеличивает максимальное время задержки дыхания на 9 секунд. (Одновременно можно получить только один бафф от свечи.)"
