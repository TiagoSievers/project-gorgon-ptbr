"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Arthropod Anatomy. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая флакончик содержит вываренную эссенцию знаний о конкретном навыке — Анатомии членистоногих. Если у вас есть смутное понимание этого навыка, вы можете выпить его, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Arthropod Genetics. If you have a vague understanding of the skill, you can drink it to gain experience.": "Этот маленький флакон содержит концентрированную сущность знаний о конкретном навыке — генетике членистоногих. Если у вас есть общее представление об этом навыке, вы можете выпить его, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Artistry. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную эссенцию знаний о конкретном навыке — Искусстве. Если у вас есть общее представление об этом навыке, вы можете выпить её, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Battle Chemistry. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную сущность знаний о конкретном навыке — Боевой химии. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
"This tiny flask contains the boiled-down essence of knowledge about a particular skill, Bear Anatomy. If you have a vague understanding of the skill, you can drink it to gain experience.": "Эта маленькая фляжка содержит концентрированную сущность знаний по определённому навыку — Анатомии Медведя. Если у вас есть смутное представление об этом навыке, вы можете выпить её, чтобы получить опыт."
