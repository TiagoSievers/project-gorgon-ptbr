"This recent work order requests the following:\nDeliver 50 Xogrite Chunks to Korbok in Vidaria. Reward: 127,752 councils.": "Этот недавний заказ требует следующее:\nДоставьте 50 Кусков Ксогрита Корбоку в Видарии. Награда: 127 752 совета."
"This recent work order requests the following:\nDeliver 10 Yellow Perch Fillets to Viedesi in Sun Vale. Reward: 4,557 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 филе жёлтого окуня Виедеси в Солнечную Долину. Награда: 4 557 советов."
"This recent work order requests the following:\nDeliver 99 Yellow Perch Fillets to Sheyna in Rahu. Reward: 86,337 councils.": "Этот недавний заказ требует следующее:\nДоставьте 99 филе жёлтого окуня Шейне в Раху. Награда: 86 337 советов."
"This recent work order requests the following:\nDeliver 10 Yeti Sticks to Laura Neth in Kur Mountains. Reward: 3,642 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 палочек йети Лауре Неф в горах Кур. Награда: 3 642 совета."
"This recent work order requests the following:\nDeliver 10 Yew Wood to Korbok in Vidaria. Reward: 2,624 councils.": "Этот недавний заказ требует следующее:\nДоставьте 10 Тисовой древесины Корбоку в Видарии. Награда: 2 624 совета."
"This recent work order requests the following:\nDeliver 99 Yew Wood to Korbok in Vidaria. Reward: 49,400 councils.": "Этот недавний заказ требует следующее:\nДоставьте 99 древесины тиса Корбоку в Видарии. Награда: 49 400 советов."
"A spiky and bizarre tooth, as long as a dagger.": "Острый и странный зуб, длиной с кинжал."
"This writ is redeemable for 1 point during the Writ Challenge event.": "Это письмо можно обменять на 1 очко во время события Испытание писем."
"A book.": "Книга."
"Through years of solitude, the ancient spider Wynn discovered this means of restoring the spirit in the depths of a lost cave.": "Годы одиночества позволили древнему пауку Винну открыть способ восстановления духа в глубинах заброшенной пещеры."
"A chunk of metal with magic-amplification properties. It is used as a form of currency among some goblins due to hyper-inflation of goblin paper money.": "Кусок металла с магическими свойствами усиления. Используется в качестве валюты среди некоторых гоблинов из-за гиперинфляции гоблинских бумажных денег."
"Each orc is given a xiphos upon their attainment of adulthood. Made of cold iron, it has a broad blade that slightly favors strength over finesse.": "Каждому орку вручается ксифос при достижении взрослого возраста. Сделан из холодного железа, с широким лезвием, которое немного больше ориентировано на силу, чем на ловкость."
"A small bit of xogrite, used as currency in distant rakshasa outposts. The process of making this alloy is a closely-guarded secret, but one of its ingredients seems to be xedrite.": "Небольшой кусок ксогрита, используемый в качестве валюты на отдалённых заставках ракшасов. Процесс изготовления этого сплава тщательно охраняется, но одним из его ингредиентов, по-видимому, является кседрит."
"Infused with arcane protective rituals. While technically usable by fire Fire Mages and Staff Fighters, this weapon is designed to be wielded by those who fancy themselves healers.": "Наполнен тайными защитными ритуалами. Хотя технически его могут использовать огненные маги и бойцы с посохом, это оружие создано для тех, кто считает себя целителями."
"A little doll made of yarn. Kind of creepy.": "Маленькая кукла из пряжи. Немного жутковатая."
"A pair of mittens made of yarn. These are just too ridiculously bad to be worn.": "Пара варежек, связанных из пряжи. Они настолько ужасны, что их просто нельзя носить."
"A pair of yarn socks.": "Пара носков из пряжи."
"A small painted wooden chip, used in card and parlor games. The paint is magical, and protects it from being replicated by illusion spells -- a common ploy amongst dwarven rogues and hustlers.": "Небольшая раскрашенная деревянная фишка, используемая в карточных и салонных играх. Краска магическая и защищает её от копирования иллюзионными заклинаниями — распространённый приём среди гномьих плутов и шулеров."
"Dye used to color a piece of clothing or armor yellow green.": "Краска, используемая для окрашивания одежды или брони в жёлто-зелёный цвет."
"Fresh-caught river fish.": "Свежевыловленная речная рыба."
"Creates a meal for two. Requires a stove or fire pit.": "Готовит блюдо на двоих. Требуется плита или кострище."
"The confident taste of yellow perch is complimented by perfect vinegar.": "Уверенный вкус жёлтого окуня подчёркнут идеальным уксусом."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 50,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 50 000 Советов."
"A classic ratkin breakfast drink. Best served hot. (And best drunk by a ratkin, but what can you do.) (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Классический завтрачный напиток крысиного народа. Лучше всего подавать горячим. (И лучше всего пить крысиному народу, но что поделать.) (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить выгоду от обоих.)"
"Thick matted hair combined with spider silk. These feel great. No, really. They don't <i>look</i> great, but they feel great. An ancient holy symbol has been inscribed inside.": "Густой спутанный мех, переплетённый с паучьим шелком. Они очень приятны на ощупь. Нет, серьёзно. Они не <i>выглядят</i> отлично, но ощущаются великолепно. Внутри выгравирован древний священный символ."
"Thick matted hair combined with spider silk. It's kind of sticky, making it a little too form-fitting. It's surprisingly durable, though!": "Густой спутанный мех, соединённый с паучьим шелком. Он немного липкий, из-за чего куртка слишком плотно облегает тело. Однако она удивительно прочная!"
"An ancient stone key, worn by yetis as a good luck token.": "Древний каменный ключ, который йети носили как талисман удачи."
"This is just a piece of metal, but it's been covered in strange substances that help protect the hand of the puncher.": "Это просто кусок металла, но он покрыт странными веществами, которые помогают защитить руку того, кто бьёт."
"Thick matted hair combined with spider silk. These feel great. No, really. They don't <i>look</i> great, but they feel great.": "Густая спутанная шерсть в сочетании с паучьим шелком. Они очень приятны на ощупь. Нет, серьёзно. Они могут <i>выглядеть</i> не очень, но на ощупь отличные."
"Thick matted hair combined with spider silk. The silk gets all in your hair and eyes and is rather uncomfortable, but it's really warm.": "Густая спутанная шерсть в сочетании с паутинным шелком. Шелк забивается в волосы и глаза, что довольно неудобно, но зато очень тепло."
"Not many yetis use shields, but they aren't terrible. This one is made of super-thick wood that's been reinforced with pounds of spider silk.": "Мало кто из йети использует щиты, но они неплохи. Этот сделан из очень толстой древесины, усиленной слоями паутины."
"An invention of the yeti people, this kabob-like snack is best eaten <i>before</i> you learn the ingredients. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Изобретение народа йети, этот закусочный шашлык лучше есть <i>до</i> того, как вы узнаете ингредиенты. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Yew chips for smoking fish and meat.": "Щепа из тиса для копчения рыбы и мяса."
"Yogzi created this convenient butcher knife that can also extract skulls. (+3 to your effective skill when Butchering or Extracting Skulls). (Keep it in your inventory and you'll be given the option to butcher and/or extract the skull of some enemies.)": "Йогзи создал этот удобный нож мясника, который также может извлекать черепа. (+3 к вашему эффективному навыку при разделке или извлечении черепов). (Держите его в инвентаре, и вам будет предоставлена возможность разделывать и/или извлекать череп у некоторых врагов.)"
"A note addressed to you.": "Записка, адресованная вам."
"This armpits of coat emit an acrid odor whenever the wearer is in combat, purportedly smelling \"like a goblin\", though goblins would fervently deny this. The odor is noxious but also somewhat protective.": "Подмышки этого плаща издают резкий запах, когда носитель находится в бою, якобы пахнущий «как гоблин», хотя гоблины горячо это отрицают. Запах ядовит, но также отчасти защитный."
"A broken-off piece of a zombie. It stinks quite badly, but doesn't seem to be rotting too quickly...": "Отломанный кусок зомби. Пахнет довольно плохо, но, похоже, не гниёт слишком быстро..."
"This ring seems to be made of stone. It's heavy.": "Этот перстень кажется сделанным из камня. Он тяжёлый."

