# ============================================================
# Описания предметов / Item Descriptions
# ============================================================

# ── Описания предметов ──
"A masterpiece in the vein of \"Esoteria\" or \"The Cured Path\", this symbol-laden mess of a painting contains over 400 secret meanings.": "Шедевр в духе \"Эзотерии\" или \"Исцелённого пути\", эта картина, наполненная символами, содержит более 400 скрытых значений."
"Written by an anonymous orc, this terse poem tells the story of the battle of Fok, where over a million orcs died. The author manages to deliver a glimpse into the horrors of war. It's said that the author was drawn and quartered for producing this work, and their works burned, but obviously some copies survived.": "Написанное анонимным орком, это лаконичное стихотворение рассказывает историю битвы при Фоке, где погибло более миллиона орков. Автору удалось передать ужас войны. Говорят, что автора растерзали и четвертовали за создание этого произведения, а его труды сожгли, но, очевидно, некоторые копии уцелели."
"An original work by an elven name you don't recognize, Errasteria. It's lovely.": "Оригинальное произведение эльфийки по имени, которого вы не знаете, Эррастерия. Оно прекрасно."
"A heavy volume of poems by the dwarven master Gammo. It even includes the poem \"My Penis Is The Sunstone\", which has been censored by the Dwarven Culture Group for over 500 years! This is a great find for poetry lovers, though dwarves may find it too embarrassing to own. Less prudish individuals tend to find Gammo's works uplifting and ennervating.": "Тяжёлый том стихов дворфийского мастера Гаммо. В нём даже есть стихотворение \"Мой пенис — солнечный камень\", которое более 500 лет цензурировалось Дворфийской культурной группой! Это отличная находка для любителей поэзии, хотя дворфы могут посчитать его слишком неловким для владения. Менее пуританские личности обычно находят произведения Гаммо вдохновляющими и бодрящими."
"A hard-hitting book by the goblin poet Kaghat. It approaches the topic of slavery from every angle, and it pulls no punches. It's a very polarizing book in goblin culture. Kaghat herself claims that she was banished from her tribe because of this book, although her tribe vehemently denies this, saying that Kaghat just wandered into the desert one day and never came back.": "Жесткая книга гоблинского поэта Кагхата. Она рассматривает тему рабства со всех сторон и не щадит никого. Это очень поляризующая книга в гоблинской культуре. Сама Кагхат утверждает, что была изгнана из своего племени из-за этой книги, хотя её племя решительно это отрицает, говоря, что Кагхат просто однажды ушла в пустыню и больше не вернулась."
"A simple scroll written in both Orcish and Human. The Human title is \"Demands of the Deceased\".": "Простой свиток, написанный на орочьем и человеческом языках. Человеческое название — \"Требования умерших\"."
"A crystallized honeycomb containing an audio message. Only fae seem to be able to access these documents, but in this case it's clearly humdrum day-to-day paperwork.": "Кристаллизованный сот, содержащий аудиосообщение. Только феи, похоже, могут получить доступ к этим документам, но в данном случае это явно обычная повседневная бумажная работа."
"A gorgeous replica of Crea's \"Esoteria\", complete with all 88 hidden symbols. Most noticeable is the three-headed duck in one corner, representing the three states of nature.": "Великолепная копия «Эзотерии» Креи, с полным набором из 88 скрытых символов. Самое заметное — трехголовая утка в одном из углов, символизирующая три состояния природы."
"As you glance into this painting, the details seem to melt away. It is a cursed forgery of Gobblenuk's Forger's Peril: the insane goblin artist concocted a magical painting that can never be replicated. Any attempt to do so results in this monstrous visual effect. On the other hand, the visual effect is pretty sweet.": "Когда вы смотрите на эту картину, детали словно тают. Это проклятая подделка \"Опасности Кузнецов\" Гоббленука: безумный гоблин-художник создал магическую картину, которую невозможно воспроизвести. Любая попытка сделать это приводит к такому ужасному визуальному эффекту. С другой стороны, сам визуальный эффект довольно впечатляющий."
"A recreation of the famous painting from the end of the Dwarven Period. The detail work really captures the ham-fisted spirit of dwarven painting techniques.": "Воссоздание знаменитой картины из конца Периода Гномов. Детальная работа действительно передаёт грубоватый дух гномьих техник живописи."
"A deep, difficult chapbook by the late human poet Avery Lancaster. Her imagery is hauntingly beautiful, yet profoundly stupid at the same time. That's the mark of a true master.": "Глубокая, сложная брошюра покойной человеческой поэтессы Эйвери Ланкастер. Её образы завораживающе прекрасны, но одновременно глубоко глупы. Вот признак настоящего мастера."
"A relatively recent volume by the rakshasa poet Cursak. It's funny and light-hearted in the first half, then gets more and more serious. It needed a good compilation editor, in other words. But it's still fun.": "Относительно недавний том поэта ракшасов Курсака. В первой половине он забавный и легкий, а затем становится всё более серьёзным. Другими словами, ему не помешал бы хороший редактор сборника. Но в целом он всё равно забавный."
"This is a real treasure -- an original hand-copied manuscript by Zuk-Ghu, the orcish poet of Kur! Mocked by his people, Zuk-Ghu was forced to write and distribute his poems in secrecy. They are truly beautiful, though... if you're fluent in Orc. If you only know pidgin-Orc like most people, these poems are largely inscrutable.": "Это настоящее сокровище — оригинальная рукопись, переписанная от руки Зук-Гху, орочьим поэтом Кура! Осмеянный своим народом, Зук-Гху был вынужден тайно писать и распространять свои стихи. Они действительно прекрасны... если вы свободно владеете орочьим языком. Если же вы знаете только пиджин-орочьий, как большинство, эти стихи в основном непонятны."
"It's the little-known masterpiece by dwarven artist Kot Bhenul. Note the beautiful use of real gold in the paint.": "Это малоизвестный шедевр гномьего художника Кота Бенула. Обратите внимание на прекрасное использование настоящего золота в краске."
"Classic creamy tomato soup with crumbles of well-seasoned tofu.": "Классический кремовый томатный суп с крошками хорошо приправленного тофу."
"You can kind of make out little orc faces and little stork bodies in this abstract painting, although you have to squint. It's bright and upbeat, but you've never heard of the painter.": "В этой абстрактной картине можно разглядеть маленькие лица орков и тела аистов, хотя для этого нужно прищуриться. Она яркая и жизнерадостная, но вы никогда не слышали об этом художнике."
"A mass-produced replica of Sherig's \"Ovallia\". Tacky and somewhat low-quality, but it's currently popular among the nouveau riche.": "Массовая реплика \"Оваллии\" Шерига. Безвкусная и несколько низкокачественная, но сейчас популярна среди новоиспечённой знати."
"This scribbled mess is supposedly about pies, but it doesn't contain any recognizable shapes -- just ugly blobs. It's unsigned and unappealing.": "Этот неразборчивый каракулями набросок якобы о пирогах, но на нём нет никаких узнаваемых форм — одни уродливые пятна. Он не подписан и не вызывает интереса."
"Designed by Povus's former master alchemist, Kimeta, and sold to Statehelm in large quantity.": "Разработан бывшим мастером-алхимиком Повуса, Киметой, и продан в большом количестве в Стейтхелм."
"Mass-produced in Povus right before the town was destroyed.": "Массово производились в Повусе незадолго до разрушения города."
"Clearly of Elven design, and unlikely to have been made in Povus. But Statehelm bought thousands of them, just the same.": "Очевидно эльфийской работы, и вряд ли был сделан в Повусе. Но Стейтхелм всё равно купил их тысячи."
"A rebranded weapon from Rahu.": "Переименованное оружие от Раху."
"These coifs used to be mass-produced for sale to Statehelm, but the attack on Povus killed most of the town's smiths.": "Эти койфы раньше массово производились для продажи в Стейтхелм, но нападение на Повус убило большинство кузнецов города."
"One of the few \"Povus Special\" weapons actually made in Povus. It has classic Deftwhisper styling.": "Одно из немногих оружий «Повеус Спешл», действительно изготовленных в Повеусе. Имеет классический дизайн Дефтвиспера."
"Actually made by dwarven priests in New Aufghel and rebranded by Povus smiths, who did not specialize in weaponry.": "Фактически изготовлен дворфийскими жрецами в Нью-Ауфгеле и переименован кузнецами Повуcа, которые не специализировались на оружии."
"Chain gloves made by recently-deceased rakshasa armorsmiths.": "Цепные перчатки, изготовленные недавно умершими кузнецами-ракшасами."
"This is clearly a relabeled orcish warhammer.": "Это явно переименованный орочий боевой молот."
"A white-label horn sold as part of Povus's product line. It's unclear who actually created it.": "Рог с белой этикеткой, продаваемый как часть продуктовой линейки Повуса. Неясно, кто на самом деле его создал."
"Produced in Povus right up until the day the town was attacked. While stylish, they unfortunately lack pockets.": "Произведены в Повусе вплоть до дня нападения на город. Несмотря на стильный вид, к сожалению, у них нет карманов."
"It carries the seal of Jerahd, the only swordsmith in Povus (now deceased). It feels oddly unsettling in the hand.": "На нём выгравирована печать Джерахда, единственного кузнеца мечей в Повусе (сейчас покойного). В руке он ощущается странно тревожно."
"A rebranded lute that was actually made in Rahu.": "Перекрашенная лютня, которая на самом деле была сделана в Раху."
"Crafted by skilled rakshasa armorsmiths prior to the desolation of Povus.": "Создано искусными кузнецами-ракшасами до опустошения Повуса."
"Made in Povus for sale to Statehelm, which recently found itself in need of demonic shielding.": "Сделан в Повусе для продажи в Стейтхелм, который недавно оказался в нужде демонического щита."
"This appears to be a custom-detailed ranastaff, not something originally made in Povus. In any case, the quality is high.": "Это, по всей видимости, индивидуально оформленный ранастaф, а не предмет, изначально сделанный в Повусе. В любом случае, качество высокое."
"The goblin poet Kaghat wrote this twee poem about the supposed \"lost tribe\" of goblins, noble creatures that were more in tune with nature. It's her least-popular work, but it's also so much shorter than her other works that many more copies exist.": "Гоблинская поэтесса Кагхат написала это нежное стихотворение о предполагаемом \"забытой племени\" гоблинов, благородных существах, более гармонично связанных с природой. Это её наименее популярное произведение, но оно также намного короче её других работ, поэтому существует гораздо больше копий."
"An artist's depiction of what a fifth season might be like, if there was one between winter and spring. It's lovely, but it pretty much just looks like winter to you.": "Изображение художника того, каким мог бы быть пятый сезон, если бы он существовал между зимой и весной. Это красиво, но для вас это в основном просто зима."
"A portrait of a red-robed mage with a trained battle-rat. The mage is crying over a mug of spilled beer. There are no shields present in the picture. (Artist unknown.)": "Портрет мага в красной мантии с обученной боевой крысой. Маг плачет над кружкой пролитого пива. На картине нет щитов. (Автор неизвестен.)"
"A lovely forgery of \"Snake Widow Lake\" by Hermard Torsitan, the most esteemed living human painter.": "Прекрасная подделка \"Озера Змеиная Вдова\" Гермарда Торситана, самого уважаемого живого человеческого художника."
"It's an inexpertly made medal with orcish words on it.": "Это неумело сделанная медаль с орочьими словами на ней."
"A long traditional poem in Ancient Elvish. Nobody speaks Ancient Elvish anymore, least of all elves, so a translation is provided. But the translation is terrible. It's a pity because Ir-Hetsu is the god of song and story, so this <i>should</i> have been a good read.": "Долгое традиционное стихотворение на древнеэльфийском. Никто больше не говорит на древнеэльфийском, особенно эльфы, поэтому предоставлен перевод. Но перевод ужасен. Жаль, потому что Ир-Хетсу — бог песни и рассказа, так что это <i>должно было</i> быть хорошим чтением."
"It's an old worn shovel with a small handle. It doesn't seem very special to you.": "Это старая изношенная лопата с короткой ручкой. Она не кажется тебе чем-то особенным."
"A late chapbook by the elven master Enst. This is quite a find! After his banishment, Enst is said to have only spoken his poems aloud, so that only the treants of the Harshland Forest know his later works. This tome has been written in a very sloppy hand... perhaps a treant wrote it?": "Поздняя брошюра эльфийского мастера Энста. Настоящая находка! После своего изгнания Энст, как говорят, произносил свои стихи вслух, так что о его поздних произведениях знают только древовидные существа из Лесов Жестокости. Эта книга написана очень небрежным почерком... возможно, её написал древовидный?"
"A depiction of Talerra, the spectral God of Depression and Knowing the Truth. Her ghostly arm beckons as if she has some bad news to deliver. This painting seems supernaturally resilient, and it has probably been blessed by one of Talerra's few monk-priests. However, it's way too creepy to display in a home.": "Изображение Талерры, призрачной богини Депрессии и Познания Истины. Её призрачная рука манит, словно она собирается сообщить плохие новости. Эта картина кажется сверхъестественно стойкой и, вероятно, была благословлена одним из немногих монах-священников Талерры. Однако она слишком жуткая, чтобы выставлять её дома."
"A collection of rectangles on a blue background painted by Susarex, an elf that was turned into a snake in a tragic zoo accident. The perfectly straight rectangles took Susarex over 200 hours to complete.": "Коллекция прямоугольников на синем фоне, нарисованная Сусарексом, эльфом, который превратился в змею в результате трагического инцидента в зоопарке. Идеально ровные прямоугольники заняли у Сусарекса более 200 часов."
"Another volume by the dwarven master Gammo. Each dwarven god gets their own epic-length poem. One, the poem about Ormorek, is very good. The others are <i>embarrassingly</i> bad. But Gammo is long dead, so dwarven society seems to have agreed to just conveniently forget about the bad ones.": "Ещё один том от гномьего мастера Гаммо. Каждый гномий бог получает своё эпическое стихотворение. Одно, стихотворение об Ормореке, очень хорошее. Остальные <i>крайне</i> плохи. Но Гаммо давно мёртв, поэтому гномье общество, похоже, решило просто удобно забыть о плохих."
"The elven shock-poet Zini's famous work about how humankind might go extinct due to their prudishness, but will be saved by kind and promiscuous elves. It has a <i>lot</i> of depraved imagery, but also plenty of clever rhymes. A good gift for poetry lovers and those who appreciate a good porno. But not a good gift for especially uptight (or racist) Humans.": "Знаменитое произведение эльфийского шок-поэта Зини о том, как человечество может вымереть из-за своей ханжеской натуры, но будет спасено добрыми и распущенными эльфами. В нем <i>много</i> развратных образов, но также множество умных рифм. Хороший подарок для любителей поэзии и тех, кто ценит хорошее порно. Но не лучший подарок для особенно зажатых (или расистских) людей."
"This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.": "Эта серия книг гоблинского мудреца Мулигу подробно описывает каждого бога, который может помочь вам с вопросом, связанным со знанием."
"A volume of the famous 37-book series describing the history of the gods. This edition includes annotations and commentary from the Council.": "Том из знаменитой серии из 37 книг, описывающей историю богов. В этом издании представлены аннотации и комментарии Совета."
"This collection of beautiful crone-language verses has been translated impeccably. A recent scandal has erupted over this book, insinuating that the powerful gorgon Rosedria didn't write it herself, but had a vast team of poet hags ghost-write it. The scandal has raised the value of this long-out-of-print book to absurd heights.": "Эта коллекция прекрасных стихов на языке старых ведьм была безупречно переведена. Недавно вокруг этой книги разгорелся скандал, намекающий на то, что могущественная горгона Розедриах не писала её сама, а имела большую команду поэтесс-призраков, которые писали за неё. Этот скандал поднял стоимость этой давно вышедшей из печати книги до абсурдных высот."
"A rollicking good tale about a bumbling oaf who finds a magic belt that makes him supernaturally strong. A book-length poem that is popular amongst commoners, but considered a bit too \"low-brow\" for the more discerning afficianado.": "Весёлая забавная история о неуклюжем болване, который находит волшебный пояс, делающий его сверхъестественно сильным. Поэма в формате книги, популярная среди простолюдинов, но считающаяся слишком «низкопробной» для более взыскательных ценителей."
"A pleasant portrayal of an inn in an idyllic setting, signed by Samantha Tallow.": "Приятное изображение гостиницы в идиллической обстановке, подписанное Самантой Толлоу."
"Another tiresome chapbook by Su-Moltik. This one is an exercise in metaphor over-extension, where the eponymous tonsils are described as being in the Throat of Belief, which is surrounded by the Neck Muscles of Close-Mindedness. It goes on like that for a very long time. Its unintentional hilarity has made it a cult classic, much to Su-Moltik's confusion and annoyance.": "Ещё одна утомительная брошюра от Су-Молтика. В ней используется чрезмерное растяжение метафоры: одноимённые гланды описываются как находящиеся в Горле Веры, которое окружено Мышцами Шеи Закрытости. Всё продолжается в таком же духе очень долго. Её непреднамеренная комичность сделала её культовой классикой, что вызывает у Су-Молтика недоумение и раздражение."
"An anonymous poem about farming. It's very, <i>very</i> long -- so long that it has become a cult classic in its own way, as bored elves challenge each other to memorize the entire thing. Then one partner will recite it during sex; the first person to finish loses the challenge.": "Анонимное стихотворение о земледелии. Оно очень, <i>очень</i> длинное — настолько длинное, что стало культовой классикой в своём роде, поскольку скучающие эльфы соревнуются, кто запомнит его целиком. Затем один из партнёров читает его во время секса; тот, кто первым закончит, проигрывает в вызове."
"A well-known painting by the dwarven artist Kot Bhenul. Signed and numbered! This is a great find.": "Известная картина дварфийского художника Кот Бенула. Подписана и пронумерована! Это отличная находка."
"The famous children's poem about Mort, the undead skeleton, who ultimately kills everyone he ever loved in life.\n\nIt's famous because the Council once declared it mandatory reading for all children at age 4. However, the sheer amount of crying and misery it caused eventually got them to relent.": "Знаменитое детское стихотворение о Морте, неживом скелете, который в конце концов убивает всех, кого когда-либо любил при жизни.\n\nОно известно тем, что Совет однажды объявил его обязательным для чтения всем детям в возрасте 4 лет. Однако из-за огромного количества слёз и страданий, которые оно вызвало, Совет в итоге отказался от этого требования."
"The well-known human philosopher Jim Hatcher tried his hand at poetry with this tacky volume. There are some hints of cleverness toward the end, for people who keep reading that long.": "Известный человеческий философ Джим Хэтчер попробовал себя в поэзии с этим безвкусным томиком. В конце есть намёки на остроумие для тех, кто дочитает так далеко."
"A wintry woodland scene featuring a little elf girl crying. You don't recognize the artist's name, but it dates back at least 1300 years, so that's something.": "Зимний лесной пейзаж с маленькой эльфийкой, которая плачет. Имя художника вам не знакомо, но картина датируется как минимум 1300 годами, так что это что-то."
"Written by an anonymous goblin poet, this melodramatic prose-poem is about worms that are used as food. It is not highly-acclaimed, but beginners to the art of poetry appreciation find it humorous.": "Написанное анонимным гоблинским поэтом, это мелодраматическое прозаическое стихотворение о червях, которые используются как пища. Оно не пользуется большой популярностью, но новички в искусстве поэтической оценки находят его забавным."
"A lovely beach scene depicting a gaggle of goblins crowded around a massive talking fish wearing a little hat. You recognize the subject matter: it's the goblin tale of The Bossy Fishlord. Painted by Agzak, a reasonably well-known goblin artist.": "Прекрасная пляжная сцена, изображающая толпу гоблинов, собравшихся вокруг огромной говорящей рыбы в маленькой шляпе. Вы узнаёте сюжет: это гоблинская история о Властном Рыбовладыке. Нарисовано Агзаком, достаточно известным гоблинским художником."
"A chapter from an adventure novel.": "Глава из приключенческого романа."
"A thin book.": "Тонкая книга."
"Created by the famed elven jeweler Sharra, this necklace supposedly reflects the wearer's treatment of the poor. It doesn't seem to do anything like that, but nobody has been brave enough to ask Sharra what's up.": "Созданное знаменитой эльфийской ювелиршей Шаррой, это ожерелье якобы отражает отношение носителя к бедным. Похоже, оно ничего подобного не делает, но никто не осмеливался спросить у Шарры, в чём дело."
"A voucher for 10 Live Event Credits. Credits will be given to the person that uses this voucher.": "Ваучер на 10 кредитов живого события. Кредиты будут начислены игроку, который использует этот ваучер."
"A voucher for 100 Live Event Credits. Credits will be given to the person that uses this voucher.": "Ваучер на 100 кредитов живого события. Кредиты будут начислены персонажу, который использует этот ваучер."
"A voucher for 25 Live Event Credits. Credits will be given to the person that uses this voucher.": "Купон на 25 кредитов живого события. Кредиты будут начислены тому, кто использует этот купон."
"A cake to celebrate 3 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 3-летия Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"A cake to celebrate 4 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 4-летия Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"A cake to celebrate 5 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 5-летия Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"A voucher for 50 Live Event Credits. Credits will be given to the person that uses this voucher.": "Ваучер на 50 кредитов живого события. Кредиты будут начислены тому, кто использует этот ваучер."
"A cake to celebrate 6 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 6 лет Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"A cake to celebrate 7 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 7-летия Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"A cake to celebrate 8 years of Project: Gorgon on Steam! Thanks for playing and supporting us!": "Торт в честь 8-летия Project: Gorgon в Steam! Спасибо, что играете и поддерживаете нас!"
"The preserved skull of a sentient aberration -- a freak of nature.": "Сохранённый череп разумной аномалии — уродца природы."
"This bulky sack contains especially hard sand. It is used in creating abrasives.": "Этот громоздкий мешок содержит особенно твёрдый песок. Он используется для создания абразивов."
"A mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Горное кирка орочьего производства. Похожа на традиционный оркский горный кирку, но с ускорительным вращающимся механизмом для улучшения добычи путём тычка."
"The second generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Второе поколение горного кирка орочьего производства. Похоже на традиционный орочьий горный кирк, но с ускорительным вращающимся механизмом для улучшения добычи за счёт колющего движения."
"The third generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Третье поколение горного кирка орочьего производства. Похоже на традиционный орочий горный кирк, но с ускоренным вращающимся механизмом для улучшения добычи за счёт колющего движения."
"The fourth generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Четвертое поколение горной кирки орочьего производства. Похожа на традиционную орочью горную кирку, но с ускоренным вращающимся механизмом для улучшения добычи путём колющего удара."
"The fifth generation of a mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.": "Пятое поколение горной кирки орочьего производства. Похожа на традиционную Оркскую горную кирку, но с ускоренным вращающимся устройством для более эффективной добычи путём прокалывания."
"A device that spins furiously when you hold it a certain way.": "Устройство, которое яростно вращается, когда держишь его определённым образом."
"This lightweight piece of... metal? Is used for... something? Anyway, it's green.": "Этот лёгкий кусок... металла? Используется для... чего-то? В любом случае, он зелёный."
"A beaker for flinging chemicals in combat. Held in the main hand.": "Пробирка для метания химикатов в бою. Держится в основной руке."
"Spider legs and brain bits in a slurry of disgusting chemicals!": "Ножки паука и кусочки мозга в смеси отвратительных химикатов!"
"A flask for flinging chemicals in combat. Held in the off hand.": "Фляга для метания химикатов в бою. Держится в свободной руке."
"This one smells horrific, even by Alchemist's standards.": "Это пахнет ужасно, даже по меркам Алхимика."
"This one smells horrific, even by Alchemist's standards. The bottle's also strangely cold to the touch. (Note: you will not recover the bottle after drinking; it is too damaged by acid to be reusable.)": "Это зелье ужасно пахнет, даже по меркам Алхимика. Бутылек также странно холодный на ощупь. (Примечание: бутылек не возвращается после употребления; он слишком поврежден кислотой, чтобы его можно было использовать повторно.)"
"This sword was stuck to a big spider. It's not really in good shape, but the holes in the blade make a neat whistling sound when you swing it.": "Этот меч был прикреплён к большому пауку. Он не в лучшем состоянии, но отверстия в лезвии издают приятный свист при взмахе."
"Found stuck to a giant spider, this shield has been scarred and pitted with acid. It looks pretty badass, but it's not really very protective.": "Найденный, застрявший на гигантском пауке, этот щит покрыт кислотными ожогами и язвами. Выглядит довольно круто, но на самом деле не очень защищает."
"A dollop of blood from the realm known as \"Acur\", where blood flows as freely as water does here.": "Капля крови из царства, известного как «Акюр», где кровь течёт так же свободно, как здесь вода."
"A staff with modest enchantments and modest grip and modest... well, let's just say the whole thing is 'modest'. In a 'not very good' kind of way.": "Посох с скромными чарами, скромным хватом и скромным... в общем, скажем так, весь посох — «скромный». В смысле «не очень хороший»."
"Gives you a blank appearance. Consume a minor panacea to return to normal.": "Придаёт вам пустой облик. Выпейте малое панацею, чтобы вернуться в нормальное состояние."
"A raffler with all standard options, plus the ability to attune the items to the winner. For admin use.": "Розыгрыш со всеми стандартными опциями, а также с возможностью настроить предметы для победителя. Для использования администраторами."
"This ring makes you unnoticeable by monsters, unless they see you in combat.": "Это кольцо делает вас незаметным для монстров, если только они не видят вас в бою."
"This special testing shield grants the wielder immense health.": "Этот специальный тестовый щит дарует владельцу огромное количество здоровья."
"Test sword!": "Тестовый меч!"
"For use by admins only!": "Только для использования администраторами!"
"A stock arrow with improved fletching allowing for greater precision.": "Стандартная стрела с улучшенным оперением, обеспечивающим большую точность."
"A stock arrow with improved fletching allowing for greater precision. (Note: only Orcs are trained to use this type of ammunition.)": "Стандартная стрела с улучшенным оперением, обеспечивающим большую точность. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"A bundle of 1000 arrow shafts for advanced arrows.": "Пучок из 1000 древков для улучшенных стрел."
"A bundle of 1000 arrowheads for advanced arrows.": "Пачка из 1000 наконечников для улучшенных стрел."
"An arrow designed for grabbing targets and pulling them via magically-enhanced thread.": "Стрела, предназначенная для захвата целей и притягивания их с помощью магически усиленной нити."
"An arrow designed for grabbing targets and pulling them via magically-enhanced thread. (Note: only Orcs are trained to use this type of ammunition.)": "Стрела, предназначенная для захвата целей и притягивания их с помощью магически усиленной нити. (Примечание: только орки обучены использованию такого типа боеприпасов.)"
"Ink infused with deadly chemicals. It has several uses, but is most commonly used by sigil scripters to create destructive runes.": "Чернило, пропитанное смертельными химикатами. Имеет несколько применений, но чаще всего используется писцами сигилов для создания разрушительных рун."
"An arrow with lots of extra weight. It won't go far, but it will hit with more impact.": "Стрела с большим дополнительным весом. Она не полетит далеко, но ударит с большей силой."
"An arrow with lots of extra weight. It won't go far, but it will hit with more impact. (Note: only Orcs are trained to use this type of ammunition.)": "Стрела с большим дополнительным весом. Она не полетит далеко, но ударит с большей силой. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"Ink infused with many chemicals. It has many uses, but is most prominently used by sigil scripters to create restorative runes.": "Чернила, насыщенные множеством химических веществ. Имеют множество применений, но чаще всего используются писцами сигилов для создания восстанавливающих рун."
"Very fancy calligraphy ink.": "Очень изысканные чернила для каллиграфии."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 100 raffle tickets for up to 8 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-120 minutes.": "Сложное устройство, которое может выдавать лотерейные билеты и затем доставлять награду победителю розыгрыша.\n\nЭта модель может выдать до 100 лотерейных билетов для до 8 предметов (или стаков предметов) и/или денежного приза. Лотерейные билеты могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю, и сообщение, показываемое только победителю. Также эта модель может быть настроена с ограничением времени от 1 до 120 минут."
"An arrow specialized for extra-long-range flight.": "Стрела, предназначенная для сверхдальнего полёта."
"An arrow specialized for extra-long-range flight. (Note: only Orcs are trained to use this type of ammunition.)": "Стрела, предназначенная для полёта на сверхдальние расстояния. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"An arrow with a hollow tube designed to deliver chemicals to a target.": "Стрела с полой трубкой, предназначенная для доставки химикатов к цели."
"An arrow with a hollow tube designed to deliver chemicals to a target. (Note: only Orcs are trained to use this type of ammunition.)": "Стрелка с полой трубкой, предназначенная для доставки химикатов к цели. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"An arrow with a magically-thin netting attached.": "Стрела с магически тонкой сеткой."
"An arrow with a magically-thin netting attached. (Note: only Orcs are trained to use this type of ammunition.)": "Стрела с магически тонкой сеткой. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"Ink infused with fiery chemicals. Used by sigil scripters to create deadly runes.": "Чернила, пропитанные огненными химикатами. Используются писцами сигилов для создания смертоносных рун."
"A tiny batch of adhesive. It's used by crafters such as carpenters and fletchers.": "Небольшая партия клея. Используется ремесленниками, такими как плотники и стрелочники."
"A goblin warrior's business card.": "Визитная карточка гоблинского воина."
"This banded gem is used in magic to promote grace and give power to the body.\n\nAssociated Primary Skill: Unarmed": "Этот полосатый драгоценный камень используется в магии для улучшения грации и придания силы телу.\\n\\nСвязанный основной навык: Бой без оружия"
"This brandy has been aged and is ready to be filtered and flavored.": "Этот бренди выдержан и готов к фильтрации и ароматизации."
"This vodka has been aged and is ready to be filtered and flavored.": "Эта водка выдержана и готова к фильтрации и ароматизации."
"This bourbon has been aged and is ready to be filtered and flavored.": "Этот бурбон выдержан и готов к фильтрации и ароматизации."
"This cider has been aged and is ready to be filtered and flavored.": "Этот сидр выдержан и готов к фильтрации и ароматизации."
"This gin has been aged and is ready to be filtered and flavored.": "Этот джин выдержан и готов к фильтрации и ароматизации."
"This rum has been aged and is ready to be filtered and flavored.": "Этот ром выдержан и готов к фильтрации и ароматизации."
"This tequila has been aged and is ready to be filtered and flavored.": "Эта текила выдержана и готова к фильтрации и ароматизации."
"This whisky has been aged and is ready to be filtered and flavored.": "Этот виски выдержан и готов к фильтрации и ароматизации."
"A super-thick blue paste that accelerates the leg muscles far beyond their natural capacity.": "Сверхгустая синяя паста, которая ускоряет мышцы ног далеко за пределы их естественных возможностей."
"A goblin archer's business card.": "Визитная карточка гоблинского лучника."
"Agrashab used this club for a while before he found a better one.": "Аграшаб некоторое время пользовался этой дубиной, прежде чем нашёл лучшую."
"It's a bottle of liquified feathers. Yum.": "Это бутылка с жидкими перьями. Вкуснятина."
"The bile gland of an aktaari. This horrific trophy Is upsetting for aktaari to see.": "Желчный пузырь актаари. Этот ужасный трофей вызывает у актаари сильное беспокойство."
"The hacked-off claw of an aktaari. This is a grim trophy that is upsetting for aktaari to see.": "Отрубленный коготь актаари. Это мрачный трофей, который огорчает актаари при виде."
"A weapon design from a far-away land.": "Дизайн оружия из далёкой страны."
"This is just some weird elven runes on a chain.": "Это просто странные эльфийские руны на цепочке."
"Teaches you how to make a potion that increases maximum health.": "Обучает созданию зелья, увеличивающего максимальное здоровье."
"Teaches you how to make an orcish drug.": "Учится создавать орочью наркотическую смесь."
"Teaches you how to create a potion that burns enemies that attack you.": "Обучает созданию зелья, которое сжигает врагов, атакующих вас."
"Teaches you how to make Make-Me-Strong Juice, an overly-cutesy name for a potion that boosts max health.": "Обучает созданию Эликсира Силы — слишком миловидное название зелья, которое увеличивает максимальное здоровье."
"Teaches you how to make a potion that increases maximum power.": "Обучает созданию зелья, увеличивающего максимальную силу."
"Teaches you how to make a hallucinogenic cauldron.": "Обучает созданию галлюциногенного котла."
"Teaches you how to make a potion that lets your sprint faster. Only werewolves can use this recipe (it requires drops of distilled wolf urine), but anyone can drink the resulting potion.": "Обучает созданию зелья, которое позволяет вам бегать быстрее. Использовать этот рецепт могут только оборотни (требуются капли дистиллированной волчьей мочи), но выпить полученное зелье может любой."
"Teaches you how to make and apply poison to a small knife.": "Обучает созданию и нанесению яда на маленький нож."
"Teaches you an odd recipe for a potion that keeps dirt off of you. (Why you wouldn't just bathe more often is anyone's guess.)": "Обучает вас странному рецепту зелья, которое отталкивает грязь. (Почему вы просто не купаетесь чаще — загадка.)"
"Teaches you how to create a potion that grants fire, cold, and electricity resistance.": "Обучает созданию зелья, дающего сопротивление огню, холоду и электричеству."
"Teaches you how to make a potion that resists Acid damage.": "Обучает созданию зелья, которое сопротивляется кислотному урону."
"Teaches you how to make a potion that resists Cold damage.": "Обучает вас созданию зелья, которое сопротивляется урону от холода."
"Teaches you how to make a potion that helps fairies recoup their energy.": "Учится создавать зелье, которое помогает феям восстановить энергию."
"Teaches you how to make a potion that increases maximum breath capacity.": "Обучает созданию зелья, увеличивающего максимальную емкость дыхания."
"Teaches you how to make a potion that boosts all your attacks +10% against creatures of the Fish anatomy type (which also includes frogs and snails).": "Обучает вас созданию зелья, которое увеличивает все ваши атаки на +10% против существ с анатомией Рыбы (включая лягушек и улиток)."
"Teaches you how to make a hideous party drink.": "Учится делать отвратительный праздничный напиток."
"Contains formulae for insanely dangerous run-speed acceleration potions.": "Содержит рецепты для безумно опасных зелий ускорения бега."
"Teaches you how to make a potion to perceive monsters before they appear.": "Обучает созданию зелья, позволяющего видеть монстров до их появления."
"Teaches you how to make a healing potion that can be drunk many times.": "Обучает созданию зелья исцеления, которое можно пить много раз."
"Teaches you various recipes for special inks.": "Обучает вас различным рецептам особых чернил."
"Teaches you a hypothetical recipe designed by a Gazluk sage.": "Обучает гипотетическому рецепту, разработанному мудрецом Газлука."
"Teaches you the technique for creating mercury, a curious liquid with many uses.": "Обучает технике создания ртути — любопытной жидкости с множеством применений."
"Teaches you how to create a potion that dramatically boosts your Max Bodyheat.": "Обучает созданию зелья, которое значительно повышает ваше максимальное телесное тепло."
"Explains a technique for hyper-accelerating your organs well beyond their natural limits.": "Объясняет технику гиперускорения ваших органов далеко за пределы их естественных возможностей."
"Teaches you several ways to make advanced acids with many uses in crafting. Not quite useful in combat.": "Обучает нескольким способам создания продвинутых кислот с множеством применений в ремесле. В бою практически не полезно."
"Safe, mild recipes for increasing your Max Power. \"Great for beginners!\"": "Безопасные, мягкие рецепты для увеличения вашей Максимальной силы. «Отлично для новичков!»"
"Teaches you a formula for a secret Paleontology ability.": "Обучает вас формуле для секретного умения Палеонтологии."
"An introductory text. Most techniques are just tutorials, but the recipe for causing fruit to rot has a few uses. And it's good practice!": "Вводный текст. Большинство техник — это просто уроки, но рецепт, вызывающий гниение фруктов, имеет несколько применений. И это хорошая практика!"
"Teaches you how to make a poison cure.": "Обучает вас изготовлению лекарства от яда."
"Teaches you how to create a potion that accelerates your swimming speed.": "Обучает созданию зелья, которое ускоряет вашу скорость плавания."
"Teaches you to brew a tea useful to weather witches.": "Обучает варить чай, полезный для погодных ведьм."
"Teaches you to make simple acids from exotic metals, or from organic items you may already have in your home. Great for cleaning! Too mild for use in combat.": "Обучает созданию простых кислот из экзотических металлов или из органических предметов, которые могут уже быть у вас дома. Отлично подходит для очистки! Слишком слабая для использования в бою."
"Teaches you how to make a flammable oil that can be applied to weapons.": "Обучает созданию горючего масла, которое можно наносить на оружие."
"Teaches you how to create a potion that increases the time you can stay underwater.": "Обучает созданию зелья, которое увеличивает время пребывания под водой."
"Teaches you how to create a potion that gives you insanely potent jumping power.": "Учится создавать зелье, дающее невероятно мощную силу прыжка."
"A goblin chieftain's business card.": "Визитная карточка вождя гоблинов."
"The horn of a deceased unicorn. Alicorns have many medicinal uses, but in the right hooves, they have formidable combat uses as well. This particular alicorn looks like it would fit on a deer's head quite nicely, bonding to the skull and enhancing their abilities.": "Рог умершего единорога. Аликорны имеют множество лечебных применений, но в правильных руках они также обладают внушительными боевыми свойствами. Этот конкретный аликорн выглядит так, будто отлично подойдет для головы оленя, срастаясь с черепом и усиливая его способности."
"Made of an unfamiliar metal, this key has weird lines etched all over it.": "Сделан из незнакомого металла, этот ключ покрыт странными линиями."
"Chicken that's succulent, sweet, sour, spicy, and numbing. All the flavors!": "Курица сочная, сладкая, кислая, острая и с эффектом онемения. Все вкусы в одном!"
"Finely-ground almonds, suitable for baking.": "Тонко молотый миндаль, подходит для выпечки."
"An elegant if simple meal.": "Элегантное, хоть и простое блюдо."
"A handful of nuts.": "Горсть орехов."
"Picked beets in a secret alpha-development sauce. (This item cannot be crafted. It provides benefits equivalent to a level 25 Meal item, but it has no Gourmand requirement. A normal level 25 Meal requires Gourmand level 10+.)": "Собранная свёкла в секретном соусе альфа-разработки. (Этот предмет нельзя создать. Он даёт бонусы, эквивалентные блюду 25 уровня, но не требует уровень Гурмана. Обычное блюдо 25 уровня требует Гурмана 10+.)"
"This exotic device fits around the waist of a gigantic bat, allowing them to disperse chemicals with a flap of their wings. Plus it's got pockets! (Enables Battle Chemistry.)": "Это экзотическое устройство надевается на талию гигантской летучей мыши, позволяя ей распылять химические вещества взмахом крыльев. Плюс в ней есть карманы! (Включает Боевую химию.)"
"A claw-style fighting weapon with spring-loaded pop-up mechanisms to disperse chemicals. A tricky weapon to master.": "Боевое оружие в виде когтя с пружинными выдвижными механизмами для распыления химикатов. Сложное в освоении оружие."
"The bloody skin of an amazing animal.": "Кровавая шкура удивительного животного."
"Amazing horseshoes that let a mount move through shallow water almost as easily as on land.": "Удивительные подковы, позволяющие ездовому животному передвигаться по мелкой воде почти так же легко, как по суше."
"Lovingly crafted to a high standard, this wooden spider suit makes spiders even more adaptable than normal. Its wood can also act as a focal point for druidic spiders.": "С любовью изготовленный по высоким стандартам, этот деревянный паучий костюм делает пауков ещё более приспособленными, чем обычно. Его древесина также может служить фокусом для друидических пауков."
"This spider equipment features a system of discrete tubes that can dispense chemicals.": "Это паучье снаряжение оснащено системой отдельных трубок, которые могут выпускать химикаты."
"This smells like waking up to a cold dawn around a warming campfire, with a loving pet wolf-dog nearby who's happy you're finally awake.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот запах напоминает пробуждение на холодном рассвете у теплого костра, рядом любящий волкопёс, радующийся, что вы наконец проснулись.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"It feels warm and calm like the last rays of a summer afternoon. It tastes like clean rainwater.": "Оно тёплое и спокойное, как последние лучи летнего полдня. На вкус как чистая дождевая вода."
"For repairing incredible armor damage. Used by Armor Patching abilities.": "Для ремонта невероятных повреждений брони. Используется способностями починки брони."
"A specially-shaped piece of hardened metal. This is used in the making of plate mail armor.": "Особо обработанный кусок закалённого металла. Используется при создании латных доспехов."
"A perfectly weighted arrow with quality fletching and supernatural accuracy.": "Идеально сбалансированная стрела с качественным оперением и сверхъестественной точностью."
"A perfectly weighted arrow with quality fletching and supernatural accuracy. (Note: only Orcs are trained to use this type of ammunition.)": "Идеально сбалансированная стрела с качественным оперением и сверхъестественной точностью. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"A bundle of 1000 arrow shafts for amazing arrows.": "Пучок из 1000 древков для потрясающих стрел."
"A bundle of 1000 amazing arrowheads for amazing arrows.": "Пачка из 1000 удивительных наконечников для удивительных стрел."
"This smell is a cultivated bacon odor, accentuating the highs and diminishing the lows, making real bacon taste incredible.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот запах — искусственно созданный аромат бекона, подчеркивающий верхние ноты и смягчающий низкие, делая настоящий бекон невероятно вкусным.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Strong enough to survive a drakeworm's breath, yet supple enough for light dancing in the evening.": "Достаточно прочные, чтобы выдержать дыхание драконозавра, но достаточно гибкие для лёгких танцев вечером."
"A jaunty cap with a crowd-pleasing feather. Carefully sculpted to look great, yet give maximum visibility so you aren't caught off-guard.": "Весёлая шапка с пером, покоряющим толпу. Тщательно оформлена, чтобы выглядеть великолепно и обеспечивать максимальную видимость, чтобы вас не застали врасплох."
"Leather gloves that are supple enough to play instruments with, yet protective enough to battle horrible beasts.": "Кожаные перчатки, достаточно мягкие для игры на музыкальных инструментах, но при этом достаточно прочные для сражений с ужасными зверями."
"These pants are made of leather that's incredibly soft, yet strong. Although it has an inner lining to prevent chafing, that lining is made of silk, and silk chafes pretty badly too. But you get used to it.": "Эти штаны сделаны из кожи, которая невероятно мягкая, но при этом прочная. Несмотря на то, что внутри есть подкладка, чтобы предотвратить натирание, эта подкладка сделана из шелка, а шелк тоже довольно сильно натирает. Но к этому привыкаешь."
"A fancy, frilly, elegant outfit that's far more protective than it looks.": "Изящный, оборчатый, элегантный наряд, который гораздо более защитный, чем кажется."
"A hat designed to be worn by giant bat magicians.": "Шляпа, предназначенная для ношения гигантскими летучими мышами-магами."
"Enchanted to accelerate tossed liquids, this off-hand tool is perfect for chemistry-based fighting.": "Зачарована для ускорения брошенных жидкостей, этот инструмент в свободной руке идеально подходит для боя с использованием химии."
"A pendant blessed in the name of Arisetsu. It depicts the sun's power.": "Кулон, благословлённый во имя Арисэцу. Он изображает силу солнца."
"A viceral odor experience that causes you to clench your fists in exuberance.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Интенсивный аромат, заставляющий сжать кулаки от восторга.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x10.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 10 раз."
"Chainmail that combines comfort, safety, and even a bit of style.": "Кольчуга, сочетающая комфорт, безопасность и даже немного стиля."
"Well-made chainmail with a tailored fit.": "Хорошо сделанная кольчуга с приталенным кроем."
"Very protective yet very comfortable.": "Очень защитный и при этом очень удобный."
"Expert chains reinforced with plates and heavily padded.": "Экспертная кольчуга, усиленная пластинами и сильно набитая."
"Fitted, protective chainmail. If it had pockets, you'd forget it was armor.": "Плотно сидящая защитная кольчуга. Если бы у неё были карманы, вы бы забыли, что это доспехи."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +27 for 30 minutes.": "Удобный стул. Отдых в нём увеличивает восстановление брони на +27 на 30 минут."
"Covered in magical runes that augment battle chemistry.": "Покрыт магическими рунами, усиливающими боевую химию."
"A cowl that makes the wearer seem more mysterious and aloof.": "Капюшон, делающий носителя более загадочным и отстранённым."
"Gloves that combine comfort, safety, and fashion.": "Перчатки, сочетающие комфорт, безопасность и стиль."
"Very soft to the touch, but resistant to damage.": "Очень мягкие на ощупь, но устойчивые к повреждениям."
"Simultaneously elegant and protective. If you own only one shirt, ... then you probably can't afford this one.": "Одновременно элегантная и защитная. Если у вас есть только одна рубашка, ... то, вероятно, вы не можете позволить себе эту."
"Slippers that combine comfort, safety, and fashion.": "Тапочки, сочетающие комфорт, безопасность и стиль."
"This club makes it seem effortless to swing a massive weight around.": "Эта дубина заставляет казаться, что махать огромным грузом — пустяк."
"This staff has a surprising amount of detail work. Grips at just the right places, metal tips, and a reduction of weight without adversely affecting durability. The Fire Magic runes are elegant but understated.": "Этот посох обладает удивительным количеством проработанных деталей. Рукоятки в нужных местах, металлические наконечники и уменьшенный вес без ущерба для прочности. Руны Огненной магии элегантны, но сдержанны."
"A lovely conch that has proven to be resilient and powerful. It's amazing for making magic weapons with!": "Прекрасная раковина, которая оказалась прочной и мощной. Она отлично подходит для создания магического оружия!"
"Pretty protective. Still pretty embarrassing.": "Довольно защитная. Всё ещё довольно смущающая."
"Hammered and polished and ready for battle.": "Кованный и отполированный, готов к бою."
"It's a high-quality hat, although it seems unlikely that an average cow would appreciate the style.": "Это высококачественная шляпа, хотя кажется маловероятным, что обычная корова оценит этот стиль."
"These horseshoes - err, cow shoes - are practically supernaturally lovely.": "Эти подковы — ой, коровьи ботинки — практически сверхъестественно прекрасны."
"A nuanced and complex sauce that is so good, it overshadows most meats that you might want to pair it with. When you have an amazing main dish and need an amazing sauce, this is it.": "Тонкий и сложный соус, который настолько хорош, что затмевает большинство мясных блюд, с которыми его можно сочетать. Когда у вас потрясающее основное блюдо и нужен потрясающий соус, это именно он."
"A heady bouquet encompassing the beauty of both life and death. It has a slightly hallucinogenic effect.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Головокружительный букет, охватывающий красоту жизни и смерти. Обладает лёгким галлюциногенным эффектом.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A talisman to harness necromantic energy.": "Талисман для управления некромантической энергией."
"It's a high-quality hat, sized to fit a deer for some reason.": "Это высококачественная шляпа, по какой-то причине подходящая по размеру для оленя."
"These horseshoes - err, deer shoes - are practically supernaturally lovely.": "Эти подковы — то есть, оленьи башмаки — практически сверхъестественно прекрасны."
"A pleasant odor reminiscent of burning hickory, but backed by acrid smoke.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Приятный запах, напоминающий горящий гикори, но с резким дымным оттенком.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"This delicate smell evokes the desert without actually having any icky desert smells.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Этот нежный аромат вызывает в памяти пустыню, при этом не имея неприятных пустынных запахов.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Fashionable platemail boots.": "Модные латные сапоги."
"Bulky but extremely strong, especially against oversized opponents.": "Объёмный, но чрезвычайно прочный, особенно против крупных противников."
"Heavily reinforced gauntlets intended to withstand assault by even massive creatures.": "Сильно усиленные рукавицы, предназначенные для выдерживания атак даже огромных существ."
"Strong greaves designed to survive even giant attacks.": "Прочные поножи, созданные, чтобы выдержать даже атаки гигантов."
"Heavy but not unwieldy, this style of helmet provides extra protection against massive opponents.": "Тяжёлый, но не громоздкий, этот стиль шлема обеспечивает дополнительную защиту от массивных противников."
"A simple chain featuring two decorative gems.": "Простая цепочка с двумя декоративными драгоценными камнями."
"Amazing stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Потрясающая вещь! Такие сапоги уклонения можно увидеть в витрине магазина, если бы существовал магазин, специализирующийся именно на сапогах уклонения, а его нет."
"Stylish, highly mobile, and comfortable leather pants.": "Стильные, очень мобильные и удобные кожаные штаны."
"Leather this strong shouldn't be this flexible. But it is.": "Кожа такой прочности не должна быть такой гибкой. Но она есть."
"It's a metal headband designed for a small animal. Mages uses these to control unruly familiars after Awakening them, and also to augment the animals' burgeoning magic powers. This particular control ring allows hares to use ice magic -- as long as the hare has already learned the rituals, of course.": "Это металлический ободок, предназначенный для маленького животного. Маги используют их, чтобы контролировать непослушных фамильяров после Пробуждения, а также для усиления растущих магических сил животных. Этот конкретный контроллер позволяет зайцам использовать ледяную магию — конечно, при условии, что заяц уже изучил соответствующие ритуалы."
"A collar for a wizard's familiar. This model is used on familiars that tend to run away. (You must be an animal to wear this collar.)": "Ошейник для фамильяра волшебника. Эта модель используется для фамильяров, которые склонны убегать. (Чтобы носить этот ошейник, вы должны быть животным.)"
"A mask designed to be worn to a masquerade ball. It's enchanted with fire magic.": "Маска, предназначенная для ношения на маскараде. Она зачарована огненной магией."
"A deadly slashing weapon for use by expert martial artists.": "Смертоносное режущее оружие для опытных мастеров боевых искусств."
"For healing heinous injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения ужасных ран. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing heinous injuries. Used by First Aid 6 and 7 (and other abilities).": "Для лечения ужасных травм. Используется навыками Первая помощь 6 и 7 (а также другими способностями)."
"A scent that brings forth happy visions of flowers basking in the sun.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Аромат, вызывающий радостные образы цветов, купающихся на солнце.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A mask designed to be worn to a masquerade ball. It's enchanted with nature magic.": "Маска, предназначенная для ношения на маскараде. Она зачарована магией природы."
"A mask designed to be worn to a masquerade ball. It's enchanted with ice magic.": "Маска, предназначенная для ношения на маскараде. Она зачарована ледяной магией."
"A tacky necklace that calls upon Harukita, the God of Hate, to grant the wearer power. This power is typically used in pretty hateful ways. This necklace also acts as a necromancy gem.": "Безвкусное ожерелье, призывающее Харукиту, Бога Ненависти, чтобы даровать носителю силу. Эта сила обычно используется весьма злобными способами. Это ожерелье также служит камнем некромантии."
"Amazing horseshoes. Overkill for draft animals, but preferred for travel.": "Потрясающие подковы. Слишком мощные для тягловых животных, но предпочтительны для путешествий."
"A particularly supple elven-style hunting bow.": "Особенно гибкий охотничий лук в эльфийском стиле."
"A relatively understated ring worn by the cultists that worship Ilth Hale, the Goddess of Sorrow. Ilth Hale's followers believe that sorrow must be endured so that vengeance can be wrought, and this ring helps them endure suffering.": "Относительно скромное кольцо, которое носят культисты, поклоняющиеся Илс Хейл, Богине Скорби. Последователи Илс Хейл верят, что скорбь необходимо выносить, чтобы свершилась месть, и это кольцо помогает им переносить страдания."
"Extremely fancy calligraphy ink.": "Очень изысканные чернила для каллиграфии."
"A gaudy necklace worn by those that venerate Kajich, the God of Fear. It allows you to invoke his visage to strike fear in your foes.": "Безвкусное ожерелье, которое носят почитатели Каджича, Бога Страха. Оно позволяет вызвать его лик, чтобы вселить страх в ваших врагов."
"These boots breathe better than most leather garments, so your feet don't get quite as stinky. Plus, they have double-reinforced laces!": "Эти сапоги дышат лучше большинства кожаных изделий, поэтому ваши ноги не так сильно потеют. Плюс, у них двойные усиленные шнурки!"
"These soft elegant gloves have custom gripping surfaces to make sure you never slip up in combat.": "Эти мягкие элегантные перчатки имеют специальные поверхности для захвата, чтобы вы никогда не поскользнулись в бою."
"This helmet goes beyond mere adequacy. It says \"adequate isn't enough!\" It takes it one step farther, all the way to more-than-adequate.": "Этот шлем выходит за рамки простой достаточности. Он говорит «достаточно — это мало!» Он идёт ещё дальше, вплоть до уровня больше чем достаточно."
"These beautiful leather pants are so soft, you just want to pet them. Don't let anybody see you doing that.": "Эти красивые кожаные штаны такие мягкие, что хочется их погладить. Только не позволяйте никому видеть, как вы это делаете."
"Wow, who made this leather? That's craftsmanship! You just want to touch it constantly.": "Вау, кто сделал эту кожу? Вот это мастерство! Хочется постоянно её трогать."
"This leather armor is so comfortable, it's almost criminal.": "Этот кожаный доспех настолько удобен, что это почти преступление."
"Thin linen gloves typically used for magicwork.": "Тонкие льняные перчатки, обычно используемые для магической работы."
"A cowl-like linen hat that helps keep magical energy contained.": "Льняная шапка, похожая на капюшон, которая помогает удерживать магическую энергию."
"Linen pants with convenient pockets and magic-sustaining properties.": "Льняные штаны с удобными карманами и магоподдерживающими свойствами."
"A linen overshirt with magic-empowering properties.": "Льняная рубашка с магическими свойствами, усиливающими магию."
"Linen slippers with grippy soles and magic-sustaining properties.": "Льняные тапочки с нескользящей подошвой и магическими поддерживающими свойствами."
"A beautiful (if simple) ring with a magical glow.": "Красивое (хотя и простое) кольцо с магическим сиянием."
"Somehow this glass orb has pure malice trapped within it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперта чистая злоба. Тёмные эмоции — это сила для Некромантии, и эту сферу можно использовать как Некромантский самоцвет."
"A mask designed to be worn to a masquerade ball. It's enchanted with dark magic.": "Маска, предназначенная для ношения на маскарадном балу. Она зачарована тёмной магией."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x10.": "Одноразовый табурет для медитации. Используйте его рядом с Колонной Медитации, чтобы увеличить длительность эффектов медитации в 10 раз."
"This staff has a surprising amount of detail work. Grips at just the right places, metal tips, and a reduction of weight without adversely affecting durability. (It will work for Staff Fighting but not Fire Magic abilities.)": "Этот посох поражает количеством проработанных деталей. Захваты в нужных местах, металлические наконечники и уменьшенный вес без ущерба для прочности. (Подходит для боя посохом, но не для способностей Огненной магии.)"
"Used in amazing smithing recipes.": "Используется в удивительных рецептах кузнечного дела."
"A professional-grade military knife.": "Профессиональный военный нож."
"A professional-grade military dirk.": "Кинжал военного класса профессионального уровня."
"A professional-grade broadsword made for slicing and injuring.": "Профессиональный широкий меч, созданный для рубки и нанесения ран."
"An esoteric glass bauble that floats around the head. It boosts psychic power.": "Эзотерический стеклянный шарик, плавающий вокруг головы. Усиливает психическую силу."
"An exceptional instrument that's too complex for amateurs. This shell's intricate fingering is best left to bards.": "Исключительный инструмент, слишком сложный для новичков. Сложная техника игры на этой раковине лучше всего подходит для бардов."
"Gaudily enchanted with potent portal magic.": "Безвкусно зачарована мощной магией порталов."
"Made of ultra-strong cloth, this garment makes it easy to dodge attacks.": "Сшитое из сверхпрочной ткани, это одеяние облегчает уклонение от атак."
"Luxuriously soft, this headgear moves with your body, preventing blind spots.": "Роскошно мягкий, этот головной убор движется вместе с вашим телом, предотвращая слепые зоны."
"Soft, warm, and comfortable, without interfering with movement.": "Мягкие, тёплые и удобные, не мешают движениям."
"Soft, astonishingly flexible, and resistant to murder.": "Мягкие, удивительно гибкие и устойчивые к убийствам."
"An incredible mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Невероятная горная кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду, коля, а не размахивая. Инновационно."
"With a simple, streamlined style and a sharp, edgy aesthetic.": "С простым, лаконичным стилем и острым, выразительным дизайном."
"The preferred style of orcish armor for front-line fighters.": "Предпочитаемый стиль орочьей брони для бойцов передовой линии."
"The sleek and simple orcish style hides an extreme attention to detail.": "Стильные и простые орочьи рукавицы скрывают исключительное внимание к деталям."
"This style of orcish military greaves has seen hundreds of years of iteration and improvement.": "Этот стиль орочьих военных поножей прошёл сотни лет эволюции и совершенствования."
"More ornate than most orcish armor, this helm is worn with pride by countless elite orcs.": "Более изысканный, чем большинство орочих доспехов, этот шлем с гордостью носят бесчисленные элитные орки."
"Perfect for making maps, surveys, wills, poetry, you name it.": "Идеально подходит для создания карт, опросов, завещаний, поэзии и всего прочего."
"When magic takes physical form, it is often made up of this material. It's a versatile crafting component.": "Когда магия принимает физическую форму, она часто состоит из этого материала. Это универсальный компонент для ремесла."
"It's a high-quality hat, sized to fit snugly around a pig's ears.": "Это высококачественная шляпа, размер которой идеально подходит для ушей свиньи."
"This bizarre \"ring\" is more the size of a bracelet, and can only fit on a pig's leg. A painful needle pierces the pig's skin while worn, somehow allowing the pig to control various chemical bottles with its mind. (Enables Battle Chemistry.)": "Этот странный «перстень» скорее похож на браслет и может надеваться только на ногу свиньи. Болевая игла прокалывает кожу свиньи во время ношения, позволяя свинье каким-то образом управлять различными химическими флаконами силой мысли. (Включает Боевую Химию.)"
"A chunk of raw boar meat from an amazing animal.": "Кусок сырого мяса дикого кабана от удивительного животного."
"Excellent tack for a horse, adorned with lots of little pouches.": "Отличная сбруя для лошади, украшенная множеством маленьких мешочков."
"Perfect weighting, professional sigiling, and understated holy symbols combine in this exquisite and versatile staff.": "Идеальный баланс, профессиональная резьба и сдержанные священные символы сочетаются в этом изысканном и универсальном жезле."
"An exceptional piece of meat from a rabbit or hare. (Use in Cheap Meat recipes.)": "Исключительный кусок мяса кролика или зайца. (Используется в рецептах дешёвого мяса.)"
"This delicious beverage helps you digest cheese.": "Этот вкусный напиток помогает переваривать сыр."
"Excellent tack for a horse.": "Отличное снаряжение для лошади."
"Uses a faux-wool trim that's actually made of white moss. Itches a bit.": "Использует отделку из искусственной шерсти, которая на самом деле сделана из белого мха. Немного чешется."
"Traditional hat worn by humans during the winter celebration of Ri-Shin, the god of plants and trees. This version is enchanted for extra warmth.": "Традиционная шляпа, которую носят люди во время зимнего праздника Ри-Шина, бога растений и деревьев. Эта версия зачарована для дополнительного тепла."
"You would never realize these pants were crafted by treants... if indeed they were crafted by treants. (Followers of Ri-Shin constantly lie about how many things are crafted by treants. Most likely, it was elves.)": "Вы бы никогда не догадались, что эти штаны созданы древнями... если они вообще созданы древнями. (Последователи Ри-Шина постоянно врут о том, сколько вещей создано древнями. Скорее всего, это были эльфы.)"
"Traditional hat worn by priests of Ri-Shin. Treants and other intelligent plants recognize this hat, and most will refrain from attacking the wearer.": "Традиционная шляпа, которую носят жрецы Ри-Шина. Трэнты и другие разумные растения узнают эту шляпу и большинство из них воздержатся от нападения на носителя."
"Amazing saddle! Very comfy.": "Удивительное седло! Очень удобное."
"An oversized saddlebag for sturdy mounts.": "Большая седельная сумка для крепких скакунов."
"The patterns are hypnotic if you stare into it. It's hot to the touch.": "Узоры гипнотизируют, если вглядываться в него. На ощупь горячий."
"You can almost hear the ocean waves when you smell this pleasing sea-inspired aroma.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Почти слышно, как шумят океанские волны, когда чувствуешь этот приятный аромат, вдохновлённый морем.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"It's heat energy trapped in glass. It's hot to the touch.": "Это тепловая энергия, запертая в стекле. Прикосновение к ней горячее."
"A mask designed to be worn to a masquerade ball. It's enchanted with electricity magic.": "Маска, предназначенная для ношения на маскараде. Она зачарована магией электричества."
"A perfect skinning knife for master skinners. (+10 to your effective skill when skinning.)": "Идеальный нож для снятия шкур для мастеров. (+10 к вашему эффективному навыку при снятии шкур.)"
"Made of snail shells and sinew.": "Сделан из раковин улиток и жил."
"Made of snail shells and sinew. The sinews were not properly cured and stink beyond comprehension.": "Сделан из раковин улиток и сухожилий. Сухожилия были плохо обработаны и источают невыносимый запах."
"Made of snail shells, sinews, and animal claws.": "Сделан из раковин улиток, сухожилий и когтей животных."
"Pieces of chitin and strong metal are sewn into reinforced webbing to create a powerful armor suit for spiders.": "Куски хитина и прочного металла вшиты в усиленную паутину, создавая мощный доспех для пауков."
"Kind of revealing. But very comfortable.": "Довольно откровенные. Но очень удобные."
"A bit of leaves, a bit of bark, and a lot of magic.": "Немного листьев, немного коры и много магии."
"Itchy and viney, but the magic is impressively resilient.": "Зудящий и покрытый лозами, но магия впечатляюще стойкая."
"An exceptional piece of meat from a cow or bull. (Use in Cheap Meat recipes.)": "Исключительный кусок мяса от коровы или быка. (Используется в рецептах дешёвого мяса.)"
"A box for storing up to 28 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 28 предметов. Действует 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют одному игроку получать доступ к одним и тем же предметам.)"
"Very high-quality rendered fat.": "Очень качественный рафинированный жир."
"A compound that contains tannic acid. It can be used to create great and amazing leather.": "Соединение, содержащее таниновую кислоту. Его можно использовать для создания отличной и удивительной кожи."
"An exceptionally well-made throwing knife. (Used with the Knife combat skill.)": "Исключительно хорошо сделанный метательный нож. (Используется с навыком боя ножами.)"
"An exceptional piece of meat from a deer.": "Исключительный кусок мяса оленя."
"As far as meat jerkies go, it really doesn't get much better than this.": "Когда речь заходит о вяленом мясе, лучше этого бывает редко."
"This variant of the Ri-Shin hat is used by humans to differentiate teams for winter games. Vol-Mu, or Volmue, is a long-deceased god of winter. In the human telling of the myth, Ri-Shin defeated Vol-Mu to allow spring to return to the land.": "Этот вариант шапки Ри-Шин используется людьми для различения команд в зимних играх. Вол-Му, или Волмюэ, — давно умерший бог зимы. По человеческой легенде, Ри-Шин победил Вол-Му, чтобы весна могла вернуться в эти земли."
"Strong metal designed to fit on the chest and shoulders of a wolf.": "Прочный металл, предназначенный для защиты груди и плеч волка."
"Quite a nice werewolf helm.": "Довольно хороший шлем для оборотня."
"Strong metal designed to fit on the front legs and claws of a wolf.": "Прочный металл, предназначенный для защиты передних лап и когтей волка."
"Resilient metal guards for a wolf's hind legs.": "Прочные металлические наручи для задних лап волка."
"Strong metal designed to fit on the lower legs and haunches of a wolf.": "Прочный металл, предназначенный для защиты нижних частей ног и бедер волка."
"Professional-looking winter boots with heavy insulation.": "Профессиональные зимние сапоги с плотной изоляцией."
"When winter comes and you need an amazing coat, now you have one. During summer, though, this is a \"quality\" coat. At best.": "Когда наступает зима и вам нужно потрясающее пальто, теперь оно у вас есть. Хотя летом это всего лишь \"качественное\" пальто. В лучшем случае."
"A lovely ring made in a style that's fashionable with the Winter Court.": "Прекрасное кольцо, выполненное в стиле, модном при Зимнем Дворе."
"Super-resilient winter gloves.": "Сверхпрочные зимние перчатки."
"Amazingly protective against freezing.": "Удивительно защищает от мороза."
"Professional-looking winter pants with heavy insulation.": "Профессиональные зимние штаны с плотным утеплителем."
"These wooden footguards are a work of art. Avant garde art, where you nail wood to cows' feet.": "Эти деревянные защитные накладки для копыт — настоящее произведение искусства. Авангардное искусство, где к копытам коров прибивают дерево."
"These wooden footguards are a work of art. Avant garde art, where you nail wood to the feet of an unsuspecting ungulate.": "Эти деревянные защитные накладки для ног — настоящее произведение искусства. Авангардное искусство, где к ногам ничего не подозревающего парнокопытного прибивают дерево."
"The smell of the forest, idealized and crystallized into a dramatic burst of memories.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Запах леса, идеализированный и кристаллизованный в яркий взрыв воспоминаний.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"A raw fish. Also called a yellowfin, these mid-sized ocean fish are delicious.": "Сырая рыба. Также называемая желтопёрой, эта средних размеров океанская рыба очень вкусная."
"A skillfully cleaned fish, ready for cooking.": "Искусно очищенная рыба, готовая к приготовлению."
"Yellowtail so fresh, it melts in your mouth.": "Желтохвост такой свежий, что тает во рту."
"Pack a snack of amberjack! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Приготовьте закуску из янтарной рыбы! (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Impeccably presented yellowtail, wrapped in seaweed, on a ball of delicious rice.": "Безупречно поданный желтохвост, завернутый в морские водоросли, на шарике вкусного риса."
"A bit of sea sponge that's been soaked in something weird. Smells like camphor and... something else you can't place. Supposedly these sponges absorb ambient magic and can be used in potions.": "Небольшая морская губка, пропитанная чем-то странным. Пахнет камфорой и... чем-то ещё, что сложно определить. Говорят, эти губки впитывают окружающую магию и могут использоваться в зельях."
"It emits a discomfiting aura, as if it isn't quite as real as it ought to be.": "Он излучает тревожную ауру, словно не совсем реален, каким должен быть."
"A purple stone, used in magic to facilitate travel.\n\nAssociated Primary Skill: Teleportation": "Фиолетовый камень, используемый в магии для облегчения путешествий.\n\nСвязанный основной навык: Телепортация"
"Worn by ranalon to help protect their sensitive skin from environmental harm.": "Носится раналонами, чтобы защитить их чувствительную кожу от вредного воздействия окружающей среды."
"A figurine of a smiling man with ice-entombed feet.": "Фигурка улыбающегося человека с ногами, погребёнными во льду."
"During Winter's reign in the fae realm, these necklaces are extremely common.": "Во время зимнего владычества в мире фей эти ожерелья встречаются очень часто."
"A figurine of two tiny metal fireballs on a chain.": "Фигурка из двух крошечных металлических огненных шаров на цепочке."
"Covered in spiked teeth.": "Покрыт острыми шипами."
"Shaped like a tiny pair of longswords.": "Форма напоминает маленькую пару длинных мечей."
"A tiny metal foot on a chain.": "Крошечная металлическая ступня на цепочке."
"A tiny metal fist squeezing a man, who seems unperturbed. That's craftsmanship!": "Крошечный металлический кулак сжимает человека, который, кажется, совершенно спокоен. Вот это мастерство!"
"A figurine of a tiny metal fireball on a chain.": "Фигурка маленького металлического огненного шара на цепочке."
"Covered in matted fur.": "Покрыт свалявшейся шерстью."
"A figurine of a tiny shield.": "Фигурка крошечного щита."
"A figurine of a heart with many smaller little hearts attached to it. Eerie.": "Фигурка сердца с множеством маленьких сердечек, прикреплённых к нему. Жутковато."
"A figurine of two hearts combined. Weird.": "Фигурка из двух соединённых сердец. Странно."
"A figurine of two hearts with little hearts coming off of them, as if they were in love. Creepy.": "Фигурка из двух сердец с маленькими сердечками, исходящими от них, словно они влюблены. Жутко."
"A figurine of a woman with hearts glued to every surface of her body. Very disturbing.": "Фигурка женщины с приклеенными сердечками на всю поверхность тела. Очень тревожно."
"A figurine of a man holding a heart in his hands. The tiny heart pulses with its own rhythm.": "Фигурка человека, держащего в руках сердце. Крошечное сердце пульсирует в собственном ритме."
"A figurine of a heart.": "Фигурка сердца."
"A figurine of a tiny brain.": "Фигурка крошечного мозга."
"Practically drowning in magical tourmalines, this necklace wards off bad thoughts in the very literal sense.": "Практически утопающий в магических турмалинах, этот ожерелье отгоняет дурные мысли в самом буквальном смысле."
"A figurine of a man with an arrow in his back, who seems to be grinning.": "Фигурка человека со стрелой в спине, который, кажется, ухмыляется."
"A figurine of a tiny man with a sword in his skull, who seems to be unperturbed.": "Фигурка крошечного человека с мечом в черепе, который, кажется, совершенно невозмутим."
"Covered in little tiny blades.": "Покрыт крошечными лезвиями."
"A tiny metal fist on a chain.": "Крошечный металлический кулак на цепочке."
"A figurine of two wolves killing a deer together. So tiny and yet so detailed!": "Фигурка двух волков, вместе убивающих оленя. Такая крошечная и при этом такая детализированная!"
"A figurine of a muscular human with a huge pack on his back.": "Фигурка мускулистого человека с огромным рюкзаком на спине."
"A demonic crystal that can be used to repair magical items.": "Демонический кристалл, который можно использовать для починки магических предметов."
"A large knife for cutting meat and organs out of corpses (+7% chance for an organ). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Большой нож для вырезания мяса и органов из трупов (+7% шанс получить орган). (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)"
"A small runestone used by summoners to ensure the creatures they bring forth can't return to their native dimension. Clever animal handlers have found alternate uses for its potent magic.": "Небольшой рунический камень, используемый призывателями, чтобы существа, которых они вызывают, не могли вернуться в своё родное измерение. Хитрые укротители животных нашли альтернативные применения его мощной магии."
"A weird old coin that seems strangely heavy.": "Странная старая монета, которая кажется необычно тяжёлой."
"Part of an extinct species of great cat.": "Часть вымершего вида большой кошки."
"An ancient crest of unknown origin. Bring this to someone knowledgeable about the past and they may be able to identify it for you.": "Древний герб неизвестного происхождения. Отнесите его кому-то, кто разбирается в прошлом, и, возможно, они смогут его для вас опознать."
"A very old style of Dwarven sword design.": "Очень старый стиль дизайна гномьего меча."
"A tarnished ancient coin. It feels heavy and strangely cold.": "Потускневшая древняя монета. Она кажется тяжёлой и странно холодной."
"A memento with some kind of important history tied to it. If you're knowledgeable enough, you can inspect it more closely for helpful clues.": "Напоминание с какой-то важной историей, связанной с ним. Если вы достаточно осведомлены, вы можете внимательно осмотреть его для получения полезных подсказок."
"An ancient painting of something natural. Bring this to someone who appreciates nature and they may be able to identify it for you.": "Древняя картина с изображением чего-то природного. Отнесите её тому, кто ценит природу, и он, возможно, сможет её для вас опознать."
"These are just simple line drawings, but they were done by someone with masterful skill.": "Это просто простые линейные рисунки, но они выполнены кем-то с мастерским мастерством."
"Someone was buried in these, apparently. They're caked with dust, but don't seem the worse for wear.": "Похоже, кто-то был похоронен в этих штанах. Они покрыты слоем пыли, но выглядят вполне целыми."
"A sort of \"cheat sheet\" for ancient scribes. Perhaps it'd be useful in recreating lost Calligraphy secrets.": "Что-то вроде «шпаргалки» для древних писцов. Возможно, он пригодится для воссоздания утраченных секретов каллиграфии."
"Who knows what this ancient document says? The language has been lost to the ages. Judging by the accompanying stick-figure pornographic art, however, it's probably not really worth dwelling on.": "Кто знает, что говорит этот древний документ? Язык утрачен веками. Судя по сопроводительным пиктограммам порнографического характера, однако, вряд ли стоит на этом зацикливаться."
"An ancient vase of unknown origin. Bring this to someone who understands Flower Arrangements and they may be able to identify it for you.": "Древняя ваза неизвестного происхождения. Отнесите её тому, кто разбирается в аранжировке цветов, и он, возможно, сможет её опознать."
"A spongey cake with a light icing applied to the outside of it. Not made from actual angels, but from the purified essence of demon... close enough, right?\n\nIn addition to the usual food effects, this meal also reduces the power cost effect of Hellfire by 25%.": "Пористый торт с лёгкой глазурью снаружи. Сделан не из настоящих ангелов, а из очищенной сущности демона... почти то же самое, правда?\n\nПомимо обычных эффектов еды, этот приём пищи также снижает эффект затрат энергии на Адское пламя на 25%."
"A large, reasonably discrete Enoyos amulet.": "Большой, достаточно незаметный амулет Энойос."
"A small tasteful Enoyos amulet.": "Небольшой изящный амулет Энойоса."
"A typical orcish-style fishing device. A very long string is stored on a winchable spool. Bizarre.\n\n(Keep this in your inventory in order to use Angling abilities.)": "Типичное орочье рыболовное устройство. Очень длинная леска намотана на барабан с ручкой. Странно.\\n\\n (Держите это в инвентаре, чтобы использовать навыки Рыболовства.)"
"Somehow this glass orb has pure anguish trapped inside it. Dark emotions are power for Necromancy, and this orb can be used as a Necromancy Gem.": "Как-то в этой стеклянной сфере заперта чистая мука. Тёмные эмоции — источник силы для Некромантии, и эту сферу можно использовать как Некромантический Камень."
"The sneaky crone Anhinda made this flask after decades of trial and error.": "Хитрая старуха Анхинда создала эту флягу после десятилетий проб и ошибок."
"This liquid is viscous and gross.": "Эта жидкость вязкая и отвратительная."
"Can be studied to earn Animal Handling XP. (Requires VIP.)": "Можно изучать для получения опыта в обращении с животными. (Требуется VIP.)"
"Teaches you an animal handling technique.": "Обучает технике обращения с животными."
"The preserved skull of a mid-sized animal.": "Сохранённый череп животного среднего размера."
"When your snoot is just too tender to handle getting booped. Apply moderately to snoot. Reapply every 30 minutes as needed.": "Когда ваш носик слишком чувствителен, чтобы его тыкали. Наносите умеренно на носик. При необходимости повторяйте каждые 30 минут."
"Designed to be worn in humans' pierced ears, these earrings offer some protection against the negative effects of Hellfire.": "Предназначенные для ношения в проколотых ушах людей, эти серьги обеспечивают некоторую защиту от негативных эффектов адского пламени."
"Designed to be slathered onto the mandibles of a giant spider, this reusable paint offers some protection against the negative effects of Hellfire.": "Предназначена для нанесения на челюсти гигантского паука, эта многоразовая краска обеспечивает некоторую защиту от негативных эффектов адского огня."
"Designed to be worn in an elf's pierced navel, this ring offers some protection against the negative effects of Hellfire.": "Предназначенное для ношения в проколотом пупке эльфа, это кольцо обеспечивает некоторую защиту от негативных эффектов адского огня."
"Designed to be worn in a cow or pig's nose, this ring offers some protection against the negative effects of Hellfire.": "Предназначенное для ношения в носу у коровы или свиньи, это кольцо обеспечивает некоторую защиту от негативных эффектов Адского огня."
"Designed to be worn at the base of a rakshasa's tail, this ring offers some protection against the negative effects of Hellfire.": "Предназначено для ношения у основания хвоста ракшасы, это кольцо обеспечивает некоторую защиту от негативных эффектов адского огня."
"Designed to be worn in the wings of a fairy, butterfly, or giant bat, these rings offers some protection against the negative effects of Hellfire.": "Предназначены для ношения на крыльях феи, бабочки или гигантской летучей мыши, эти кольца обеспечивают некоторую защиту от негативных эффектов адского пламени."
"Grants a brief period of vincibility to the usually-invincible.": "Дарует кратковременную уязвимость обычно неуязвимым."
"While it has an unfortunate racist past (invented by humans who were terrified that neighboring elves were going to mind-assault them), the shield still sees use due to its broad protective powers.": "Хотя у него есть печальное расистское прошлое (его изобрели люди, которые боялись, что соседние эльфы собираются атаковать их разум), щит всё ещё используется благодаря своим широким защитным свойствам."
"This small bag of sand is almost painful to the touch. Its most common use is in crafting magical items, where it is used as a magic insulator during smithing.": "Этот маленький мешочек с песком почти болезненно ощущается на ощупь. Его наиболее частое применение — в создании магических предметов, где он используется как магический изолятор при кузнечном деле."
"A miniscule version of a Hate Pearl. This one is too small to be used in crafting, but perhaps it could be combined into a larger one via magic.": "Миниатюрная версия Жемчужины Ненависти. Эта слишком мала, чтобы использовать её в ремесле, но, возможно, её можно объединить в большую с помощью магии."
"Used by vampires to \"clean\" blood so it can be used in alcoholic drinks. This one's antique.": "Используется вампирами для «очистки» крови, чтобы её можно было использовать в алкогольных напитках. Этот экземпляр антикварный."
"This is a really old weapon design! They don't make 'em like this anymore, for better or for worse.": "Это действительно древний дизайн оружия! Такие больше не делают, к лучшему или к худшему."
"Dye used to color a piece of clothing or armor antique white.": "Краска, используемая для окрашивания одежды или брони в цвет античного белого."
"Consume this fuzzy gel when you're suffering from poison.": "Примите этот пушистый гель, если вы страдаете от яда."
"Covered in light fur. It has many alchemical uses and is also a common ingredient in totemic magic.": "Покрыт легким мехом. Имеет множество алхимических применений и также является распространённым ингредиентом в тотемной магии."
"A goblin war mage's business card.": "Визитная карточка гоблинского боевого мага."
"Sorry! Please accept this cake as a token of our apology. - Sincerely, the Project: Gorgon team": "Извините! Пожалуйста, примите этот торт как знак нашего извинения. - Искренне, команда Project: Gorgon"
"A washed-rind cheese with a pleasant smell and hard consistency.\n\nCheese Type: White": "Сыр с мытой коркой, приятным запахом и твёрдой консистенцией.\\n\\nТип сыра: белый"
"Apple Juice! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Яблочный сок! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Apple Juice!": "Яблочный сок!"
"Shaved ice flavored with apple. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная стружка со вкусом яблока. Это угощение нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одному каждого и получить преимущества обоих.)"
"Apple brandy, with a distinctive apple taste and a strong kick. A longtime favorite of rural humans.": "Яблочный бренди с характерным яблочным вкусом и крепким ударом. Долгосрочный фаворит среди сельских людей."
"A little bit of Etana cooked up in a vegetable stew. A taste of when the cook gets cooked!": "Немного Этаны, приготовленной в овощном рагу. Вкус того момента, когда повар оказывается приготовленным!"
"A small gem, light blue-green in color. It's a traditional protective stone for fishermen.\n\nAssociated Primary Skill: Fishing\nAssociated Secondary Skill: Teleportation": "Небольшой драгоценный камень светло-голубовато-зеленого цвета. Традиционный защитный камень для рыбаков.\n\nСвязанный основной навык: Рыболовство\nСвязанный вторичный навык: Телепортация"
"Dye used to color a piece of clothing or armor aquamarine.": "Краска, используемая для окрашивания одежды или брони в аквамариновый цвет."
"Made of enchanted aquamarine, this ring takes the oomph out of projectiles that pierce your body.": "Сделанное из зачарованного аквамарина, это кольцо уменьшает силу снарядов, пронизывающих ваше тело."
"Jade with scrimshaw glyphs that say \"Wizards Rule\" in elvish. Fortunately the inscription is on the inside of the ring where nobody can see it.": "Нефрит с гравировками в стиле скримшоу, на которых на эльфийском написано «Волшебники правят». К счастью, надпись находится на внутренней стороне кольца, где её никто не увидит."
"A prism that has been inscribed with weird symbols. You don't think it would be useful for regular prism-related activities.": "Призма, на которую нанесены странные символы. Ты не думаешь, что она пригодится для обычных действий, связанных с призмами."
"Archtroll merchants in the fae realm sell these clubs as souvenirs to rich magical tourists. Very few tourists realize the exceptional quality they're purchasing, and most are thrown away as junk a few years later.": "Архтролльские торговцы в фейском мире продают эти дубины в качестве сувениров богатым магическим туристам. Очень немногие туристы понимают исключительное качество приобретаемого предмета, и большинство из них выбрасывается как хлам через несколько лет."
"-": "-"
"Sniff that? Smells like feathers and hate. Definitely an archery potion.": "Чуешь это? Пахнет перьями и ненавистью. Определённо зелье для стрельбы из лука."
"Teaches you the basics of Archery. (Raises your skill to 1 if it isn't already.)": "Обучает основам стрельбы из лука. (Повышает ваш навык до 1, если он ещё не достиг этого уровня.)"
"Can be studied to earn Archery XP. (Requires VIP.)": "Можно изучать для получения XP в Стрельбе из Лука. (Требуется VIP.)"
"Teaches you an archery technique.": "Обучает технике стрельбы из лука."
"What a find! This is an intact biped arm assembly: humerus, radius, ulna, even most of the phalanges!": "Какая находка! Это целый набор костей двуногой руки: плечевая кость, лучевая, локтевая, даже большая часть фаланг!"
"Seems like a normal skeletal arm.": "Похоже на обычную скелетную руку."
"A small crystal made up of black and white bands. Used in magic, it guards against physical dangers. This particular onyx has been attuned to Armor Patching when used in crafting.": "Небольшой кристалл, состоящий из чёрных и белых полос. Используется в магии, он защищает от физических опасностей. Этот конкретный оникс настроен на Починку брони при использовании в ремесле."
"Can be studied to earn Armor Patching XP. (Requires VIP.)": "Можно изучать для получения опыта ремонта брони. (Требуется VIP.)"
"Teaches you an armor patching technique.": "Обучает технике ремонта брони."
"Recovers 75 armor.": "Восстанавливает 75 брони."
"Recovers 125 armor.": "Восстанавливает 125 брони."
"Recovers 200 armor.": "Восстанавливает 200 брони."
"Recovers 300 armor.": "Восстанавливает 300 брони."
"Recovers 400 armor.": "Восстанавливает 400 брони."
"Teaches you an advanced armorsmithing technique.": "Обучает вас продвинутой технике кузнечного дела."
"An advanced preparation of the humble bird. Delicious!": "Усовершенствованное блюдо из скромной птицы. Вкусно!"
"Learn to coat pre-made dragon statues in gold. Because gold and dragons just go together.": "Научитесь покрывать готовые статуи драконов золотом. Потому что золото и драконы просто созданы друг для друга."
"Learn to coat pre-made gryphon statues in gold. Pretty tacky. But some people like tacky.": "Научитесь покрывать готовые статуи грифонов золотом. Довольно безвкусно. Но некоторым людям нравится безвкусное."
"Learn to carve a spooky face into a pumpkin.": "Научитесь вырезать жуткое лицо на тыкве."
"Learn to carve a silly owl face into a pumpkin.": "Научитесь вырезать забавное лицо совы на тыкве."
"Learn to coat pre-made dragon statues in silver. Because that's somehow a good thing to do.": "Научитесь покрывать готовые статуи драконов серебром. Потому что это почему-то хорошее дело."
"Learn to coat pre-made gryphon statues in silver. Hides the flaws.": "Научитесь покрывать готовые статуи грифонов серебром. Скрывает недостатки."
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Ужасающи сложное устройство, способное анализировать скрытые коды, глубоко зарытые внутри некоторых существ. Внимание: во многих культурах изучение генетики считается табу. (Генетики могут хранить это в инвентаре, чтобы получить возможность генетического анализа этого типа существ. Есть 5% шанс, что устройство сломается при использовании.)"
"A tool used aboard Fae ships during the repair of hull damage. It's quite heavy!": "Инструмент, используемый на кораблях фей при ремонте повреждений корпуса. Довольно тяжёлый!"
"A focusing-item for mentalists.": "Фокусирующий предмет для менталистов."
"Designed to be worn at the base of a Rakshasa's tail, this helps keep the wearer from dying. It is inscribed with a message that simply reads, \"Remember me. - Ashk\"": "Предназначено для ношения у основания хвоста ракшасы, это помогает владельцу избежать смерти. На нём выгравирована надпись: «Помни меня. — Ашк»"
"A special pemphredo eye adjusted to receive messages from a nearby source, instead of a distant one.": "Особый глаз пемфредо, настроенный на приём сообщений от близкого источника, а не от далёкого."
"Asterion the minotaur customized this ridiculously heavy hammer to be even heavier. A phrase is inscribed on the shaft in common tongue: \"If you cannot lift my hammer, I shall lift it for you.\"": "Астерион, минотавр, сделал этот невероятно тяжёлый молот ещё тяжелее. На древке выбита фраза на общем языке: \"Если ты не можешь поднять мой молот, я подниму его за тебя.\""
"The preserved skull of an astonishingly impressive sentient freakish creature.": "Сохранённый череп изумительно впечатляющего разумного уродливого существа."
"The preserved skull of an astonishingly impressive mid-sized animal.": "Сохранённый череп поразительно впечатляющего животного среднего размера."
"A bundle of 1000 arrow shafts for astonishing arrows.": "Пучок из 1000 древков для потрясающих стрел."
"A bundle of 1000 astonishing arrowheads for astonishing arrows.": "Пучок из 1000 удивительных наконечников для удивительных стрел."
"The preserved skull of an astonishingly impressive demon.": "Сохранённый череп поразительно впечатляющего демона."
"The preserved skull of an astonishingly impressive elf.": "Сохранённый череп поразительно впечатляющего эльфа."
"The preserved skull of an astonishingly impressive fairy.": "Сохранённый череп поразительно впечатляющей феи."
"The preserved skull of an astonishingly impressive giant.": "Сохранённый череп поразительно впечатляющего гиганта."
"The preserved skull of an astonishingly impressive goblin.": "Сохранённый череп поразительно впечатляющего гоблина."
"The preserved skull of an astonishingly impressive human.": "Сохранённый череп поразительно впечатляющего человека."
"The preserved skull of an astonishingly impressive large animal.": "Сохранённый череп поразительно впечатляющего крупного животного."
"The preserved skull of an astonishingly impressive orc.": "Сохранённый череп поразительно впечатляющего орка."
"The preserved skull of an astonishingly impressive rakshasa.": "Сохранённый череп поразительно впечатляющей ракшасы."
"The preserved skull of an astonishingly impressive small animal.": "Сохранённый череп удивительно впечатляющего маленького животного."
"The bloody skin of an astounding animal.": "Кровавая шкура потрясающего животного."
"For repairing devastating armor damage. Used by Armor Patching abilities.": "Для ремонта разрушительных повреждений брони. Используется способностями починки брони."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x11.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 11 раз."
"Well-made chainmail with extreme attention to detail.": "Хорошо сделанная кольчуга с исключительным вниманием к деталям."
"The high attention to detail elevates this headgear beyond mere armor.": "Высокое внимание к деталям поднимает этот головной убор выше простой брони."
"Not just strong and comfortable, but fashionable too.": "Не только прочные и удобные, но и стильные."
"Strong, well-fitting chainmail. A shame about the lack of pockets.": "Прочная, хорошо сидящая кольчуга. Жаль, что нет карманов."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +30 for 30 minutes.": "Удобный стул. Отдых в нём увеличивает восстановление брони на +30 на 30 минут."
"Coated in too many etched symbols to count, it's easy to overlook the secret button that sprays chemicals from the end.": "Покрытый слишком большим количеством выгравированных символов, чтобы их сосчитать, легко пропустить секретную кнопку, которая распыляет химикаты с конца."
"This club is bizarrely light for being so heavy.": "Эта дубина удивительно легкая для своего веса."
"This has all the relevant features that a staff fighter or fire mage could want: durable, flexible, perfectly weighted, fire-spewing, and makes a cool whistling sound when swung.": "В нем есть все необходимые характеристики, которые могут понадобиться бойцу с посохом или огненному магу: прочный, гибкий, идеально сбалансированный, извергающий огонь и издающий классный свист при взмахе."
"Wow, someone put way too much effort into these cow shoes!": "Вау, кто-то вложил слишком много усилий в эти коровьи башмаки!"
"Wow, someone put way too much effort into these deer shoes!": "Вау, кто-то вложил слишком много усилий в эти оленьи ботинки!"
"Astounding stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Потрясающая вещь! Это такие сапоги уклонения, которые можно увидеть в витрине магазина, если бы существовал магазин, специализирующийся именно на сапогах уклонения, а такого магазина нет."
"For healing horrific injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения ужасных травм. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing horrific injuries. Used by First Aid 8 and 9 (and other abilities).": "Для лечения ужасных травм. Используется в навыках Первая помощь 8 и 9 (а также в других умениях)."
"A bouquet of beautiful smells.\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Букет прекрасных ароматов.\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Astounding, yes. But only incrementally better than the amazing horseshoes.": "Потрясающие, да. Но лишь немного лучше, чем удивительные подковы."
"An impressive elven-style hunting bow.": "Впечатляющий охотничий лук в эльфийском стиле."
"Very extremely fancy calligraphy ink.": "Очень чрезвычайно изысканные чернила для каллиграфии."
"This shoe has been heavily over-engineered, with secret cushions and odd snaps to ensure a perfect fit for any foot size.": "Эта обувь была чрезмерно усовершенствована, с секретными амортизаторами и необычными застёжками, чтобы обеспечить идеальную посадку на любую размер стопы."
"These gloves are so light, yet so protective! Astonishing craftsmanship.": "Эти перчатки такие лёгкие, но при этом очень защитные! Поразительное мастерство изготовления."
"A hat you wouldn't be embarrassed being seen in, and so light and protective! Anti-odor components keep it smelling fresh all day, too.": "Шляпа, в которой не будет стыдно показаться, и при этом такая лёгкая и защитная! Анти-запаховые компоненты сохраняют свежесть весь день."
"You get the feeling that, even when they were brand new, these pants already had that great worn-in feeling. The padding is strong but not bulky and the leather smell is intoxicating.": "У вас создаётся ощущение, что даже когда эти штаны были совершенно новыми, они уже имели тот замечательный изношенный вид. Наполнение прочное, но не громоздкое, а запах кожи опьяняет."
"Leather so comfortable, so sensuous, you just can't stop touching it.": "Кожа настолько удобная и чувственная, что невозможно перестать её трогать."
"This is a masterpiece. It's got little hidden straps and buckles to make sure you can fit it perfectly to any form.": "Это шедевр. В ней есть маленькие скрытые ремешки и пряжки, чтобы вы могли идеально подогнать её под любую фигуру."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x11.": "Одноразовый табурет для медитации. Используйте его рядом с Колонной Медитации, чтобы увеличить длительность эффектов медитации в 11 раз."
"This has all the relevant features that a staff fighter could want: durable, flexible, perfectly weighted, and makes a cool whistling sound when swung. (This will work for Staff Fighting but not Fire Magic abilities.)": "Этот посох обладает всеми необходимыми качествами для бойца с посохом: прочный, гибкий, идеально сбалансированный и издаёт классный свист при взмахе. (Подходит для боя посохом, но не для способностей Огненной магии.)"
"Used in astounding smithing recipes.": "Используется в потрясающих кузнечных рецептах."
"An exquisite broadsword made for slicing and injuring.": "Изысканный широкий меч, созданный для рубки и нанесения ран."
"A masterpiece of magical engineering.": "Шедевр магического инженерного искусства."
"A marvelous mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Замечательная горная кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду, нанося удары, а не размахивая. Инновационно."
"This masterpiece includes the Six Names of Arisetsu, the Eight Suns of Arisetsu, the Four Priestly Runes, and dozens of other icons.": "Этот шедевр включает Шесть Имен Арисецу, Восемь Солнц Арисецу, Четыре Жреческие Руны и десятки других икон."
"Impressive tack for a horse.": "Впечатляющая сбруя для лошади."
"Some of the best plant-based cold-weather gear you may ever see. Comfortable and safe.": "Одно из лучших растительных холодостойких снаряжений, которое вы когда-либо видели. Удобное и надежное."
"A pant-shaped conglomeration of plant material. Sometimes a bit of moss is exposed, but they mostly work great.": "Штаны, сделанные из скомканного растительного материала. Иногда виден небольшой кусочек мха, но в целом они отлично справляются со своей задачей."
"A masterpiece of a saddle.": "Шедевр седельного дела."
"A perfect skinning knife for master skinners. (+12 to your effective skill when skinning.)": "Идеальный нож для снятия шкуры для мастеров. (+12 к вашему эффективному навыку при снятии шкуры.)"
"A box for storing up to 32 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 32 предметов. Действует 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют одному игроку получать доступ к одним и тем же предметам.)"
"An immaculate candle wick.": "Безупречный свечной фитиль."
"When winter comes and you need an astounding coat, now you have one. During summer, though, this is an \"amazing\" coat. At best.": "Когда наступает зима и вам нужно потрясающее пальто, теперь оно у вас есть. Хотя летом это \"удивительное\" пальто. В лучшем случае."
"Astoundingly protective against freezing.": "Потрясающе защищает от замерзания."
"Wow, someone put way too much effort into these wooden cow shoes!": "Вау, кто-то вложил слишком много усилий в эти деревянные башмаки для коровы!"
"Wow, someone put way too much effort into these wooden deer shoes!": "Вау, кто-то вложил слишком много усилий в эти деревянные оленьи ботинки!"
"The shell of a small sea snail.": "Раковина маленькой морской улитки."
"A packet of strange chemicals wrapped in a leaf. It's said that some sentient animals find this drug irresistible.": "Пакет странных химикатов, завернутых в лист. Говорят, что некоторые разумные животные находят этот наркотик неотразимым."
"Magical runes have been etched into this claw to cause acidic explosions. Unfortunately the etchings weakened the chitin, and it's not suitable for use in constructing armor.": "На этот коготь нанесены магические руны, вызывающие кислотные взрывы. К сожалению, гравировки ослабили хитин, и он не подходит для изготовления брони."
"A popular orcish drug that overcharges your brainstem. This advanced purified version of the drug is quite strong.": "Популярный орочий наркотик, который перегружает ваш ствол мозга. Эта усовершенствованная очищенная версия препарата довольно сильная."
"When held, this weapon seems to freeze the very air around it. A weapon of elite Winter Court troops.": "Когда держишь это оружие, кажется, что оно замораживает сам воздух вокруг. Оружие элитных войск Зимнего Двора."
"Wielded by the more sinister variety of Winter Court fae assassins, this shiv freezes everything it touches.": "Используемый более зловещими убийцами из зимнего двора фей, этот нож замораживает всё, к чему прикасается."
"Teaches you a technique for briefly disabling constructs.": "Обучает технике кратковременного отключения конструкций."
"A simple autopsy kit for beginning pathologists. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Простой набор для вскрытия для начинающих патологов. (Держите его в инвентаре, и вам будет доступна опция вскрытия трупов.)"
"A delicious fall snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная осенняя закуска. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A small shiny green rock with arrows carved into it. It seems to be a pawn for some sort of game.": "Небольшой блестящий зелёный камень с вырезанными стрелами. Похоже, это фигура для какой-то игры."
"Likely of human make, these thick metal boots expand or contract to meet any foot size and always fit perfectly.": "Вероятно, сделанные человеком, эти толстые металлические сапоги расширяются или сжимаются, чтобы подходить к любой стопе, и всегда сидят идеально."
"The bloody skin of an awesome animal.": "Кровавая шкура потрясающего животного."
"A bundle of 1000 arrow shafts for awesome arrows.": "Пучок из 1000 древков для потрясающих стрел."
"A bundle of 1000 awesome arrowheads for awesome arrows.": "Пачка из 1000 потрясающих наконечников для потрясающих стрел."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x12.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 12 раз."
"These pants are specifically designed for storage-type characters. This item cannot be augmented, transmuted or enchanted in any way.": "Эти брюки специально созданы для персонажей, ориентированных на хранение. Этот предмет нельзя улучшать, трансмутировать или зачаровывать каким-либо образом."
"This Shirt is specifically designed for storage-type characters. This item cannot be augmented, transmuted or enchanted in any way.": "Эта рубашка специально разработана для персонажей, ориентированных на хранение. Этот предмет нельзя улучшать, трансмутировать или зачаровывать каким-либо образом."
"A comfortable chair. Relaxing in it boosts your Armor Regeneration +33 for 30 minutes.": "Удобный стул. Отдых в нём увеличивает восстановление брони на +33 на 30 минут."
"Gaudy but somehow still gorgeous, this staff has hidden controls for all sorts of mechanisms to spurt acid.": "Вычурный, но каким-то образом всё ещё великолепный, этот посох скрывает механизмы для выпуска кислоты."
"Nobody out-clubs this club!": "Никто не превзойдёт эту дубину!"
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. The Fire Magic runes are a masterpiece of calligraphy, too.": "Нет слов. Просто несколько раз размахните этим посохом, и вы поймёте, что его красота превосходит любые слова. Руны Огненной магии — настоящее произведение каллиграфии."
"If you know anything about cowshoe craftsmanship, you know you're looking at a masterpiece right here.": "Если вы хоть что-то понимаете в искусстве изготовления коровьих башмаков, то знаете, что перед вами настоящее произведение мастерства."
"If you know anything about deershoe craftsmanship, you know you're looking at a masterpiece right here.": "Если вы хоть немного разбираетесь в искусстве изготовления оленьих ботинок, то знаете, что перед вами настоящее произведение мастерства."
"Awesome stuff! These are the sort of evasion boots you'd see in a storefront window, if there was a store specifically for evasion boots, which there is not.": "Потрясающая вещь! Такие сапоги уклонения можно увидеть в витрине магазина, если бы существовал магазин, специализирующийся именно на сапогах уклонения, а его нет."
"An otherworldly device that can fire energy projectiles. It can also fire regular arrows.": "Загадочное устройство, способное стрелять энергетическими снарядами. Также может выпускать обычные стрелы."
"For healing hideous injuries. Used by First Aid 8 and 9 (and other abilities).": "Для лечения ужасных травм. Используется навыками Первая помощь 8 и 9 (а также другими способностями)."
"A heady floral smell that challenges the olfactory sense of flowers, and what is a flower, really?\n\nThis candle lasts for 5 minutes and any number of people can appreciate it. You can only deploy 1 candle at a time.": "Головокружительный цветочный аромат, бросающий вызов обонянию цветов, а что такое цветок, на самом деле?\\n\\nЭта свеча горит 5 минут, и её могут оценить любое количество людей. Одновременно можно зажечь только одну свечу."
"Truly awesome horseshoes. Maybe not a huge improvement over the astounding horesehoes, but still awesome!": "По-настоящему потрясающие подковы. Возможно, не такое большое улучшение по сравнению с изумительными подковами, но всё равно потрясающие!"
"An extraordinary elven-style hunting bow.": "Необычный охотничий лук в эльфийском стиле."
"These are like an extension of your feet, they're so comfortable!": "Они словно продолжение ваших ног, такие удобные!"
"They're as comfortable as not wearing any gloves, and as protective as wearing plate metal on your hands.": "Они так же удобны, как если бы вы не носили перчаток, и так же защищают, как если бы на руках была металлическая броня."
"A great helmet with great safety features, like extra padding to keep sweat out of your eyes and customized ear-holes to make sure you never miss a thing.": "Отличный шлем с превосходными защитными характеристиками, такими как дополнительная подкладка, чтобы пот не попадал в глаза, и индивидуальные отверстия для ушей, чтобы вы ничего не пропустили."
"Slip into these and enjoy having leather on your crotch like never before.": "Наденьте их и почувствуйте кожу на паху как никогда раньше."
"Stroking the soft down of this leather often makes even the manliest man shed a manly tear. It's just that soft.": "Поглаживание мягкого ворса этой кожи часто заставляет даже самого мужественного мужчину пролить мужественную слезу. Она просто такая мягкая."
"Wow! Awesome! You could sleep in this baby, it's so comfortable.": "Вау! Потрясающе! В ней можно спать, она такая удобная."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x12.": "Одноразовый табурет для медитации. Используйте его рядом с Колонной Медитации, чтобы увеличить длительность эффектов медитации в 12 раз."
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. (This will work for Staff Fighting but not Fire Magic abilities.)": "Без слов. Просто несколько раз покрути этот посох, и ты поймёшь, что его красота превосходит любые слова. (Это работает для боя посохом, но не для способностей Огненной магии.)"
"An awesome work of magical engineering.": "Потрясающее творение магического инжиниринга."
"A prefectly-made mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.": "Идеально сделанная горняцкая кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду, нанося удары, а не размахивая. Инновационно."
"No words. Just swing this staff around a few times and you'll realize that its beauty surpasses the spoken language. The Fire Magic and Priest runes are a masterpiece of calligraphy, too.": "Нет слов. Просто покрути этот посох несколько раз, и ты поймёшь, что его красота превосходит любые слова. Руны Огненной магии и Жреца — настоящее произведение каллиграфии."
"Very impressive tack for a horse.": "Очень впечатляющая сбруя для лошади."
"You never expected that cold-weather gear made from bits and bobs of nature would work so well.": "Вы никогда не ожидали, что одежда для холодной погоды, сделанная из кусочков и обрывков природы, будет работать так хорошо."
"Silky leaves, soft moss ... These things are almost comfortable!": "Шелковистые листья, мягкий мох... Эти вещи почти что удобные!"
"A compound that contains tannic acid. It can be used to create astounding and awesome leather.": "Соединение, содержащее таниновую кислоту. Его можно использовать для создания удивительной и потрясающей кожи."
"Awesomely protective against freezing.": "Потрясающе защищает от переохлаждения."
"A masterpiece of wood-nailed-to-cow-hoof design! Comfortable and stylish. Well, stylish for a cow. They have different sensibilities than people.": "Шедевр дизайна — дерево, прибитое к копыту коровы! Удобные и стильные. Ну, стильные для коровы. У них другие представления о стиле, чем у людей."
"A masterpiece of wood-nailed-to-deer-hoof design! Comfortable and stylish. Well, stylish for a deer. They have different sensibilities than people.": "Шедевр дизайна с деревянными гвоздями, прибитыми к оленьему копыту! Удобные и стильные. Ну, стильные для оленя. У них другие вкусы, чем у людей."
"Dye used to color a piece of clothing or armor azure.": "Краска, используемая для окрашивания одежды или брони в лазурный цвет."
"A deep blue gem evocative of dark stormy oceans or winter skies. In magic it enhances musical skill.\n\nAssociated Primary Skill: Bard": "Глубокий синий камень, напоминающий тёмные штормовые океаны или зимнее небо. В магии он усиливает музыкальное мастерство.\n\nСвязанный основной навык: Барды"
"Sweet and savory pork ribs.": "Сладкие и пикантные свиные ребрышки."
"Crafted on the famous Blues family looms. These sorts of gloves were once used to inspect the Vertan Royal Guard.": "Сделаны на знаменитых ткацких станках семьи Блюз. Такие перчатки когда-то использовались для осмотра королевской гвардии Вертана."
"A goblin soldier's backup weapon. The hilt guard provides protection at the expense of killing power.": "Запасное оружие гоблинского солдата. Гарда эфеса обеспечивает защиту ценой убойной силы."
"Confusingly named, as the ring is intended to be a Warden's primary ring, not their backup ring. It is solid and pleasant to hold.": "Сбивающее с толку название, так как кольцо предназначено быть основным кольцом Стража, а не запасным. Оно прочное и приятно держать в руках."
"This bundle of sporelings should be delivered to a myconian named Yoy.": "Этот пучок спориков следует доставить микониану по имени Йой."
"Unlike most food, this does not give a long-term regeneration effect. Bacon is an instant pick-me-up any time!": "В отличие от большинства продуктов, этот не даёт длительного эффекта регенерации. Бекон — мгновенный заряд энергии в любое время!"
"Somebody wove some long bacon strips into a sort of bowl. And then put chunks of fried meat into the bowl. Weird. Salty.": "Кто-то сплёл длинные полоски бекона в подобие чаши. А потом положил в неё кусочки жареного мяса. Странно. Солёно."
"A greasy, salty, delicious breakfast.": "Жирный, солёный, вкусный завтрак."
"A bag of elven jewelry.": "Мешок эльфийских украшений."
"Voted the most under-rated vegetable dish by 4 out of 5 elven gourmands.": "Признано 4 из 5 эльфийских гурманов самым недооценённым овощным блюдом."
"It's fine. Nothing special, but filling.": "Нормально. Ничего особенного, но сытно."
"The pig snout is rubbery and squishy, but the sauce makes it work! Kind of.": "Свинной пятачок резиновый и мягкий, но соус спасает ситуацию! В некотором роде."
"A baked potato.": "Запечённый картофель."
"A local ratkin dish that's been heavily revised for human tastes.": "Местное блюдо раткинов, значительно переработанное под вкусы людей."
"Moist and delicious - and pretty healthy.": "Сочная и вкусная — и довольно полезная."
"Well-suited for staff-fighting, but a reasonable fire staff as well. Versatility!": "Хорошо подходит для боя посохом, но также неплох для огненного посоха. Универсальность!"
"An aromatic, herby weed.": "Ароматное, травянистое растение."
"This banana is in good shape - no brown spots yet.": "Этот банан в хорошем состоянии — пока нет коричневых пятен."
"A loaf of warm, moist banana bread.": "Буханка тёплого, влажного бананового хлеба."
"Shaved ice flavored with pureed banana. This treat should be eaten quickly before it melts! (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Ледяная крошка со вкусом пюре из банана. Это угощение нужно съесть быстро, пока оно не растаяло! (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A buttery, banana-flavored wine that's quite a mouthful.": "Маслянистое вино с банановым вкусом, которое оставляет насыщенное послевкусие."
"A delicious breakfast. Too bad about the lack of syrup.": "Вкусный завтрак. Жаль, что нет сиропа."
"The sweet and spicy sauce goes perfectly with this plump quality chicken meat.": "Сладкий и острый соус идеально сочетается с этим сочным мясом курицы высокого качества."
"Delicious! Although it could be spicier.": "Вкусно! Хотя можно было бы и поострее."
"Some sort of meat in a delicious sauce. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Какой-то вид мяса в вкусном соусе. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Kind of fizzy.": "Слегка шипучее."
"Can be studied to earn Bard XP. (Requires VIP.)": "Можно изучать для получения опыта барда. (Требуется VIP.)"
"Teaches you a bard technique.": "Обучает технике барда."
"A patch of flesh and fur torn from a barghest.": "Кусок плоти и меха, вырванный у баргеста."
"A horrifically hacked-off snout.": "Ужасно изуродованная морда."
"Expertly made out of a barghest, or something similar.": "Искусно сделана из шкуры баргеста или чего-то подобного."
"A bunch of fresh barley grass.": "Кучка свежей ячменной травы."
"A nice fresh loaf. It's a dense and filling bread.": "Хороший свежий батон. Это плотный и сытный хлеб."
"Barley ground into flour.": "Ячмень, перемолотый в муку."
"A handful of seeds to grow some barley grass.": "Горсть семян для выращивания ячменной травы."
"A large cask used for storing wet and dry goods.": "Большая бочка, используемая для хранения влажных и сухих товаров."
"For repairing moderate armor damage. Used by Armor Patching abilities.": "Для ремонта умеренных повреждений брони. Используется способностями ремонта брони."
"A stock arrow. The kind bows shoot.": "Стандартная стрела. Та, что выпускают луки."
"A stock arrow. The kind bows shoot. (Note: only Orcs are trained to use this type of ammunition.)": "Обычная стрела. Та, что выпускают луки. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"A bundle of 1000 arrow shafts for basic arrows.": "Пучок из 1000 стрел для базовых стрел."
"A bundle of 1000 mediocre arrowheads for basic arrows.": "Пучок из 1000 посредственных наконечников для простых стрел."
"The simplest kind of bait that can be used with angling.": "Самый простой вид приманки, который можно использовать при рыбалке."
"A simple instrument made of animal horn.": "Простой инструмент, сделанный из животного рога."
"It plays the right notes.": "Она играет правильные ноты."
"Fried beetles with salt. What's not to like? (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Жареные жуки с солью. Что тут не понравится? (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A secret formula that lets mortals take advantage of necromantic blood, if they are hardy enough.": "Секретная формула, позволяющая смертным использовать некромантскую кровь, если они достаточно выносливы."
"For blowing glass.": "Для выдувания стекла."
"Sturdy and fashionable, if not especially protective.": "Прочные и стильные, хотя и не особо защитные."
"Hand-made by a bored bowyer of middling skill.": "Сделан вручную скучающим лучником среднего уровня мастерства."
"These fit over your knuckles to make your punches hurt more. Now with real faux-brass coating!": "Эти накладки надеваются на костяшки пальцев, чтобы удары были сильнее. Теперь с настоящим имитационным латунным покрытием!"
"Pretty shoddy workmanship... but hey, it's armor.": "Довольно халтурная работа... но, эй, это же броня."
"A bug bomb. Used as ammo for the Basic Bug Bomb ability. (The instructions are printed on the side; use this item to learn ability if needed.)": "Бомба для насекомых. Используется как боеприпас для способности Простая бомба для насекомых. (Инструкции напечатаны на боку; используйте этот предмет, чтобы изучить способность при необходимости.)"
"A fire pit, good for cooking in the field or for keeping warm in the cold. Lasts 3 minutes once deployed.": "Костровище, подходящее для готовки в поле или чтобы согреться в холоде. Горит 3 минуты после установки."
"Good for flinging small amounts of chemicals all around you. Held in the main hand.": "Хорошо подходит для разбрызгивания небольших количеств химикатов вокруг вас. Держится в основной руке."
"Good for flinging small amounts of chemicals all around you. Held in the off hand.": "Хорош для разбрызгивания небольших количеств химикатов вокруг вас. Держится в свободной руке."
"An easy-to-make snack.": "Легкая в приготовлении закуска."
"Tart and sweet and not too complicated. A basic side-dish.": "Кисло-сладкий и не слишком сложный. Простой гарнир."
"A simple but solidly-made knife.": "Простой, но крепко сделанный нож."
"A long knife held in the off-hand.": "Длинный нож, удерживаемый в дополнительной руке."
"A gaudy squid amulet worn by those that venerate Enoyos, god of the sea.": "Вычурный амулет в виде кальмара, который носят почитатели Энойоса, бога моря."
"Crafted out of magical ice that doesn't melt. (Not suitable for use as a melee weapon.)": "Создана из магического льда, который не тает. (Не подходит для использования в качестве оружия ближнего боя.)"
"For healing moderate injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения средних травм. Животные могут использовать эти бомбы с умением Бомба первой помощи."
"For healing moderate injuries. Used by First Aid 2 (and other abilities).": "Для лечения средних травм. Используется навыком Первая помощь 2 (и другими способностями)."
"Some dried fish scales.": "Несколько высушенных рыбьих чешуек."
"Filling, vegan, and kind of bland.": "Сытно, веганское и немного пресное."
"Wow, off-red utility gloves. Nice. I guess.": "Вау, утилитарные перчатки бледно-красного цвета. Неплохо. Наверное."
"A well-made omelet is an attractive and delicious meal. This one's full of ham and cheese.": "Хорошо приготовленный омлет — это привлекательное и вкусное блюдо. Этот омлет полон ветчины и сыра."
"Hammery.": "Молоточный инструмент."
"Protects from basic head injury.": "Защищает от обычных травм головы."
"Basic horseshoes for basic horses.": "Простые подковы для простых лошадей."
"Some basic calligraphy ink.": "Некоторые основные чернила для каллиграфии."
"A simple, watery, slightly insipid beer.": "Простое, водянистое, слегка пресное пиво."
"Brewer's yeast, good for making beer, wine, and hard liquor.": "Пивные дрожжи, подходят для приготовления пива, вина и крепких напитков."
"Used in neophyte smithing recipes.": "Используется в рецептах кузнечного дела для новичков."
"A plantable organic turret, designed to be planted as a weapon by a seasoned Mycologist.\n\n(Use the 'Mushroom Turret 1' ability to plant this turret.)": "Сажаемая органическая турель, предназначенная для установки в качестве оружия опытным микологом.\\n\\n (Используйте способность «Турель из грибов 1», чтобы установить эту турель.)"
"Nice greaves. Vaguely stylish yet vaguely protective.": "Хорошие поножи. Слегка стильные, но слабо защитные."
"A stew which is definitely better than the sum of its ingredients.": "Тушёное блюдо, которое определённо лучше, чем сумма его ингредиентов."
"A delicious, if basic, pumpkin pie. It's missing fancy spices! And maybe something to top it with.": "Вкусный, хоть и простой, тыквенный пирог. Ему не хватает изысканных специй! И, возможно, чего-то для украшения."
"Basic racing tack.": "Основное гоночное снаряжение."
"A basic racing saddle.": "Базовое гоночное седло."
"Basic tack for a horse.": "Простое снаряжение для лошади."
"A bottle of disgusting stuff used in making cheese.": "Бутылка отвратительной субстанции, используемой для приготовления сыра."
"A nice-looking saddle. It's a little pinchy and underpadded, but better than nothing!": "Красивое седло. Оно немного жмёт и слабо набито, но лучше, чем ничего!"
"A thick blanket that gives extra padding to a saddle. (Can be used for warmth in an emergency.)": "Толстое одеяло, которое добавляет дополнительную подкладку к седлу. (Может использоваться для тепла в экстренной ситуации.)"
"A small and elegant saddlebag.": "Небольшая и элегантная седельная сумка."
"A metal frame for attaching a torch to a wall.": "Металлическая рамка для крепления факела к стене."
"The shark fin provides a gelatinous texture to this otherwise-simple egg soup. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Акульий плавник придаёт желеобразную текстуру этому в остальном простому яичному супу. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The epitome of mass-produced shielding.": "Воплощение массово производимой защиты."
"A basic skinning knife for novice skinners. (+2 to your effective skill when skinning.)": "Простой нож для снятия шкур для новичков. (+2 к вашему эффективному навыку при снятии шкур.)"
"Powdered skull dust for use in consecrating items or places. Harukita, the god of Hate, and Kajich, the god of Fear, both appreciate this sort of thing.\n\n(You can turn this special bone-meal into ordinary bone-meal by right-clicking the item.)": "Порошкообразная пыль из черепа для освящения предметов или мест. Харукита, бог Ненависти, и Каджич, бог Страха, оба ценят такие вещи.\n\n(Вы можете превратить этот особый костяной порошок в обычный костяной порошок, щёлкнув правой кнопкой мыши по предмету.)"
"A porous sticky cloth that's useful for some basic garments.": "Пористая липкая ткань, полезная для некоторых простых одежд."
"A spore bomb, designed to be tossed as a weapon by a seasoned Mycologist.\n\n(Use the 'Spore Bomb 1' ability on your ability side-bar to actually throw this bomb!)": "Споровая бомба, предназначенная для метания в качестве оружия опытным микологом.\\n\\n (Используйте способность «Споровая бомба 1» на панели способностей, чтобы действительно бросить эту бомбу!)"
"It's a staff.": "Это посох."
"This odd potion makes your skin extremely tough. It's a fairly uncomfortable sensation, having impervious skin.": "Это странное зелье делает вашу кожу чрезвычайно прочной. Это довольно неприятное ощущение — иметь непробиваемую кожу."
"It's a sword! Looks pretty sharp.": "Это меч! Выглядит довольно острым."
"A knife designed for throwing. (Used with the Knife combat skill.)": "Нож, предназначенный для метания. (Используется с боевым навыком Нож.)"
"It looks and tastes like turkey ... more or less. A bland turkey, but still.": "Выглядит и на вкус как индейка... более или менее. Безвкусная индейка, но всё же индейка."
"Very basic vinegar used in simple dishes.": "Очень простой уксус, используемый в простых блюдах."
"Long, deadly blades jut out from this glove-like weapon. It only fits the left hand.": "Длинные, смертоносные лезвия выступают из этого оружия, похожего на перчатку. Подходит только для левой руки."
"A basic whittling knife for novice whittlers.": "Простой нож для вырезания для начинающих резчиков."
"A strong but pleasant-smelling herb used in cooking.": "Крепкая, но приятно пахнущая трава, используемая в кулинарии."
"A plantable basil seedling.": "Саженец базилика, который можно посадить."
"The end of a basilisk's tail, said to be a potent natural magic source.": "Конец хвоста василиска, считается мощным источником природной магии."
"Test potion transforms you into a giant bat. Permanent until dispelled! WARNING: think before you drink!": "Тестовое зелье превращает вас в гигантскую летучую мышь. Постоянно, пока не развеется! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A pretty gem with dark green bands, it's well known for aiding magical communication. This particular gem has been infused with a rune that attunes it to bats when used in crafting.": "Красивый драгоценный камень с тёмно-зелёными полосами, хорошо известный тем, что помогает в магической коммуникации. Этот конкретный камень был наполнен руной, которая настраивает его на летучих мышей при использовании в ремесле."
"A talisman that clips behind a giant bat's ear, making it much smaller and hence less terrifying to some individuals.": "Талисман, который крепится за ухо гигантской летучей мыши, делая её намного меньше и, следовательно, менее пугающей для некоторых существ."
"Teaches you a bat combat technique.": "Обучает технике боя летучей мышью."
"Smells foul but doesn't really taste bad (for an alchemy potion).": "Пахнет отвратительно, но на вкус не так уж плохо (для алхимического зелья)."
"Can be studied to earn Battle Chemistry XP. (Requires VIP.)": "Можно изучать для получения опыта в боевой химии. (Требуется VIP.)"
"Teaches you a battle chemistry technique.": "Обучает вас технике боевой химии."
"This hammer has little rivulets carved into it to guide any blood away from the wielder's hand. Craftsmanship!": "На этом молоте вырезаны маленькие канавки, чтобы отводить кровь от руки владельца. Мастерство изготовления!"
"It's charred and black from tossing hundreds of fireballs over the years, but it's still really comfortable to use.": "Он обожжён и почернел от сотен выпущенных огненных шаров за эти годы, но всё ещё очень удобен в использовании."
"A necklace depicting the warm sun, one of the symbols of Arisetsu. This variety was mass-produced for use by Council priests, and was probably lost during the War of Rahu.": "Ожерелье с изображением тёплого солнца, одного из символов Арисэцу. Этот вариант был массово произведён для использования священниками Совета и, вероятно, был утерян во время Войны Раху."
"This sucker's seen some good times and some bad times. But mostly bad times, from the shield's point of view.": "Этот парень повидал и хорошие времена, и плохие. Но с точки зрения щита — в основном плохие."
"The hilt has been worn smooth with use, leaving indentations that make it easier for neophytes to know how to hold it properly.": "Рукоять отполирована до гладкости от частого использования, оставляя вмятины, которые помогают новичкам правильно держать оружие."
"Good for making bottles. But not that good: it's not especially pure or clean.": "Хорош для изготовления бутылок. Но не очень: он не особенно чистый и чистый."
"An unexpectedly refreshing drink. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Неожиданно освежающий напиток. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"The beak of a midsized bird.": "Клюв птицы среднего размера."
"Made of utterly unbreakable glass mined from the heart of a dying star, this is no measuring tool: it is a deadly weapon of war! (Because the measurement marks rubbed off long ago.)": "Сделанная из совершенно неразрушимого стекла, добытого из сердца умирающей звезды, это не измерительный инструмент: это смертоносное оружие войны! (Потому что отметки измерения стерлись очень давно.)"
"This beaker is one of Xegatis' early failed attempts at restoring flesh to Nightmare Creatures. A crude Necromancy Gem is embedded in the bottom.": "Эта колба — одна из ранних неудачных попыток Ксегатиса вернуть плоть существам Кошмара. В дне вделан грубый Некромантский Самоцвет."
"An unusual staff with an alchemical beaker on the end. Not suitable for casting Fire Magic.": "Необычный посох с алхимической колбой на конце. Не подходит для применения Огненной магии."
"A bundle of 1000 glass beakers to be inserted into arrows.": "Пачка из 1000 стеклянных колб для вставки в стрелы."
"A jeweled collar given to a hippogriff by its orcish caretaker.": "Украшенный драгоценностями ошейник, подаренный гиппогрифу его орочьим смотрителем."
"The dismembered paw of a large bear.": "Отрубленная лапа большого медведя."
"A hacked-out organ from a bear. Truly disgusting.": "Вырезанный орган медведя. Поистине отвратительно."
"An antique, encrusted metal key. Unfortunately it appears to be encrusted in bear shit.": "Старинный металлический ключ с налётом. К сожалению, он покрыт медвежьим дерьмом."
"It's labeled 'bear repellent.' It smells spicy. You opt not to taste it.": "На этикетке написано «средство от медведей». Пахнет пряно. Вы решаете не пробовать на вкус."
"This is a well-cut piece of crappy meat.\n\n(Use in Cheap Meat recipes.)": "Это хорошо нарезанный кусок плохого мяса.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"A whimsically-named ranalon dish from the Povus region.": "Забавно названное блюдо раналонов из региона Повус."
"This enchanted beaker has been adorned with pieces of glass in a geometric pattern. It is a little unwieldy as a result.": "Эта зачарованная колбочка украшена кусочками стекла в геометрическом узоре. Из-за этого она немного неудобна в использовании."
"The hilt of this magical blade has been coated in tiny gemstones. They almost completely obscure the necromantic symbols on the pommel.": "Рукоять этого магического клинка покрыта крошечными драгоценными камнями. Они почти полностью скрывают некромантические символы на навершии."
"This old orcish warhammer was given new life with tiny decorative gems and detailed etchings of flowers.": "Этот старый орочий боевой молот получил новую жизнь благодаря крошечным декоративным камням и детализированным гравюрам с изображением цветов."
"This quality weapon has been adorned with tiny jewels and acid-etched with subtle, elegant patterns.": "Это качественное оружие украшено крошечными драгоценными камнями и кислотным травлением с тонкими, изящными узорами."
"An arrangement of flowers beloved by bees, and thus indirectly beloved by people who love to see bees happy.": "Комплект цветов, любимых пчёлами, а значит косвенно любимых людьми, которые любят видеть пчёл счастливыми."
"A human dish popular in the Crone Hegemony. This version is particularly fancy!": "Блюдо человеческой кухни, популярное в Кронской Гегемонии. Эта версия особенно изысканная!"
"The classic human dish.": "Классическое человеческое блюдо."
"Classic creamy tomato soup with crumbles of ground beef.": "Классический кремовый томатный суп с кусочками говяжьего фарша."
"A dense and delicious rye bread with strong hints of beer.": "Плотный и вкусный ржаной хлеб с яркими нотками пива."
"A pretty basic fish meal. Does it really matter what fish is in it?": "Довольно простое рыбное блюдо. Правда ли важно, какая рыба в нём?"
"A raw beet.": "Сырая свёкла."
"A plantable beet seedling.": "Саженец свёклы для посадки."
"A sweet, relatively palatable variety of vodka. Although it's a traditional dwarven drink, it long ago fell out of favor, and these days dwarves only use it for cooking.": "Сладкий, относительно приятный сорт водки. Хотя это традиционный гномий напиток, он давно вышел из моды, и в наши дни гномы используют его только для готовки."
"A large biting beetle. There are probably ways to prepare this for cooking.": "Большой кусающий жук. Вероятно, существуют способы приготовить его для еды."
"A deceptively simple dish of beets, fish, and meat, somehow made tasty together.": "Обманчиво простое блюдо из свёклы, рыбы и мяса, которые каким-то образом вместе получаются вкусными."
"A slightly bent arrow, suitable for beginning archers.": "Слегка изогнутая стрела, подходящая для начинающих лучников."
"A slightly bent arrow, suitable for beginning archers. (Note: only Orcs are trained to use this type of ammunition.)": "Слегка изогнутая стрела, подходящая для начинающих лучников. (Примечание: только орки обучены использовать этот тип боеприпасов.)"
"A bundle of 1000 arrow shafts for beginner-level arrows.": "Пучок из 1000 древков стрел для стрел начального уровня."
"A bundle of 1000 flinty arrowheads for beginner-level arrows.": "Пачка из 1000 кремневых наконечников для стрел начального уровня."
"A terrifyingly complex device that can analyze the secret codes buried deep inside certain creatures. This model is especially easy to use. Warning: many cultures consider genetics study to be taboo. (Geneticists can keep this in inventory to be offered the option to gene-analyze this type of creature. There is a 5% chance that the device will break when used.)": "Ужасающий по своей сложности прибор, способный анализировать скрытые коды, глубоко спрятанные внутри некоторых существ. Эта модель особенно проста в использовании. Внимание: во многих культурах изучение генетики считается табу. (Генетики могут держать этот прибор в инвентаре, чтобы получить возможность генетического анализа этого типа существ. При использовании есть 5% шанс, что прибор сломается.)"
"A disgusting concoction created by someone who doesn't understand certain important concepts. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Отвратительная смесь, созданная тем, кто не понимает некоторых важных понятий. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"This disgusting belt helps you avoid being hit by projectiles.": "Этот отвратительный пояс помогает вам избегать попаданий снарядов."
"A belt for hoarders.": "Пояс для накопителей."
"A simple wooden wand with runes etched into it.": "Простая деревянная палочка с выгравированными рунами."
"The brain of a deceased demonic Behemoth.": "Мозг погибшего демонического Бегемота."
"A bony arm spike that's been removed from a demonic Behemoth. It's much heavier than you'd expect for its size.": "Костяной шип на руке, извлечённый из демонического Бегемота. Он гораздо тяжелее, чем можно было бы ожидать для своего размера."
"Dye used to color a piece of clothing or armor beige.": "Краска, используемая для окрашивания одежды или брони в бежевый цвет."
"It's made of some sort of beautiful metal. An inscription inside says: \"B - when it falls apart, find me. -T\"": "Оно сделано из какого-то красивого металла. Внутри гравировка гласит: \"Б - когда оно развалится, найди меня. -Т\""
"A belt adorned with an odd rune that gives the wearer a certain kind of luck.": "Пояс, украшенный странной руной, которая дарует носителю особую удачу."
"A belt adorned with an odd rune that gives the wearer a certain kind of luck. It has been custom-sized to fit around the middle of a gigantic spider.": "Пояс, украшенный странной руной, которая дарует носителю особую удачу. Он был специально подогнан, чтобы обхватить середину гигантского паука."
"A belt adorned with numerous frog runes that gives the wearer a certain kind of luck.": "Пояс, украшенный множеством лягушачьих рун, дарующий носителю особую удачу."
"As soon as you wield this blade, you can sense its eagerness: it wants to be your partner in murder! Of course, good partnerships require sacrifice from both partners...": "Как только вы берёте этот клинок в руки, вы чувствуете его нетерпение: он хочет стать вашим партнёром в убийстве! Конечно, хорошие партнёрства требуют жертв от обеих сторон..."
"A fruity disk of hard candy on a stick. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Фруктовый диск из твердой карамели на палочке. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Oversized headgear worn by a supernaturally large skeleton. Various runes and a necromancy gem seem to empower it.": "Чрезмерно крупный головной убор, носимый сверхъестественно большим скелетом. Различные руны и некромантский камень, по-видимому, наделяют его силой."
"Though it resembles a pearl, it is made of almost-pure misery and loathing. It's too emotional to be used in crafting.": "Хотя она похожа на жемчужину, она состоит почти из чистого страдания и отвращения. Слишком эмоциональна, чтобы использовать её в ремесле."
"A big sack of Councils.": "Большой мешок с монетами Совета."
"Though it resembles a pearl, it is made of almost-pure Fear mixed with some Revulsion. It's too emotional to be used in crafting.": "Хотя она похожа на жемчужину, на самом деле состоит из почти чистого Страха, смешанного с отвращением. Слишком эмоциональна, чтобы использоваться в ремесле."
"Though it resembles a pearl, it is made of almost-pure Greed and jealousy. It's too emotional to be used in crafting.": "Хотя она похожа на жемчужину, она сделана из почти чистой Жадности и зависти. Слишком эмоциональна, чтобы использовать её в ремесле."
"Though it resembles a pearl, it is made of almost-pure Hate. It's too emotional to be used in crafting.": "Хотя она похожа на жемчужину, она сделана из почти чистой Ненависти. Слишком эмоциональна, чтобы использовать её в ремесле."
"Though it resembles a pearl, it is made of almost-pure Lust. It's too emotional to be used in crafting.": "Хотя она похожа на жемчужину, она сделана из почти чистой Похоти. Слишком эмоциональна, чтобы использовать её в ремесле."
"A large metal band used in making casks.": "Большое металлическое кольцо, используемое для изготовления бочек."
"The leather in these pants has been been partially transformed into wood bark, which is profoundly uncomfortable.": "Кожа в этих штанах частично превратилась в древесную кору, что крайне неудобно."
"The leather in these pants has been been partially transformed into wood bark, which is is profoundly uncomfortable.": "Кожа в этих штанах частично превратилась в древесную кору, что крайне неудобно."
"A mixture of grains to keep your birds fat, happy and energized.": "Смесь зерен, чтобы ваши птицы были упитанными, счастливыми и энергичными."
"A very potent Elvish brew. Bitter as can be, but it warms you right up. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень крепкий эльфийский напиток. Горький как может быть, но отлично согревает. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Used in the first annual Gazluk Archery Competition by the titular Black Agatha, who assassinated the rightful winner with it.": "Использовался в первом ежегодном соревновании по стрельбе из лука в Газлуке титулованной Черной Агатой, которая с его помощью убила законного победителя."
"A variety of morel, tasty in mushroom dishes and potent in alchemy as well.": "Вид сморчка, вкусный в грибных блюдах и сильнодействующий в алхимии."
"A pile of flavored black foot morel mushrooms.": "Кучка приправленных грибов черных строчков."
"A rather murky heterogeneous mixture of mushroom bits in water.": "Довольно мутная гетерогенная смесь кусочков грибов в воде."
"An incredibly rare form of pearl. It can be used in very-high-end jewelrymaking, and alchemists prize it above all other gems. Geologists, for their part, don't even consider it a gem at all.": "Чрезвычайно редкая форма жемчуга. Его можно использовать в ювелирном деле высшего класса, а алхимики ценят его выше всех других драгоценных камней. Геологи же, в свою очередь, вообще не считают его драгоценным камнем."
"A masterpiece dwarven crossbow further augmented by goblin mechanists. \"A kiss from this rose leads to the grave\" is engraved on the side.": "Шедевр гномьего арбалета, дополнительно усовершенствованный гоблинскими механиками. На боку выгравирована надпись: «Поцелуй этой розы ведёт в могилу»."
"An orcish staple, famous for its lingering effect. It's... an acquired taste.": "Основное блюдо орков, известное своим продолжительным эффектом. Это... приобретённый вкус."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 5,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 5000 Советов."
"Designed to be worn at the base of a deer's tail, this brass ring enhances ferocity.": "Предназначенное для ношения у основания хвоста оленя, это латунное кольцо усиливает свирепость."
"(no visual)": "(без визуального отображения)"
"A scarred and twisted bow, barely able to be strung. A hum of darkness can be felt from within. A tiny necromancy gem is embedded in the top.": "Израненный и искривленный лук, едва поддающийся натяжению. Изнутри ощущается гул тьмы. Вверху вставлен маленький камень некромантии."
"Stained with blood, ash, and lightning scars, this dark, evil sword is cold to the touch. Which is kind of creepy. But it's surprisingly well-maintained, and wonderfully sharp! A necromancy gem is embedded in the hilt.": "Запятнанный кровью, пеплом и шрамами от молний, этот тёмный, злой меч холоден на ощупь. Что довольно жутко. Но он удивительно хорошо ухожен и прекрасно заточен! В рукояти вставлен некромантский самоцвет."
"A helm made in the signature style of Tremmond Blackhammer, a once-famous dwarven armorsmith.": "Шлем, выполненный в фирменном стиле Треммонда Черномолота, когда-то знаменитого гномьего кузнеца брони."
"Can be studied to earn Blacksmithing XP. (Requires VIP.)": "Можно изучать для получения опыта в кузнечном деле. (Требуется VIP.)"
"Teaches you a schematic for a masterpiece of bovine footgear.": "Обучает вас чертежу шедевра в области копытной обуви."
"Teaches you a schematic for a masterpiece of deer footgear.": "Обучает вас чертежу шедевра оленьей обуви."
"Teaches you a schematic for truly awesome horseshoes.": "Обучает вас чертежу по созданию действительно потрясающих подков."
"Teaches you how to turn a bunch of gold nuggets into a more useful chunk of gold.": "Обучает тому, как превратить множество золотых самородков в более полезный кусок золота."
"Teaches you an ancient elven blacksmithing technique. It seems to requiring a near-mythical weapon and expensive resources for minor gains.": "Обучает древней эльфийской кузнечной технике. Похоже, требует почти мифического оружия и дорогих ресурсов для незначительных улучшений."
"Teaches you an ancient elven carpentry technique. It seems to requiring a near-mythical weapon and expensive resources for minor gains.": "Обучает древней эльфийской технике столярного дела. Похоже, требует почти мифического оружия и дорогих ресурсов для незначительных улучшений."
"Teaches you an ancient elven blacksmithing technique which uses ultra-pure metal to reduce item wear.": "Обучает древней эльфийской кузнечной технике, использующей ультра-чистый металл для уменьшения износа предметов."
"Teaches you how to make sturdy metal flasks for storing exotic alcohol.": "Обучает изготовлению прочных металлических фляг для хранения экзотического алкоголя."
"This self-learning workbook teaches you how to create various exotic claw+flask hybrid weapons. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Этот самоучитель научит вас создавать различные экзотические гибридные оружия в виде когтей и флаконов. Сначала вы изучите два рецепта; выполните их, чтобы узнать рецепты более высокого уровня."
"Teaches you schematics for a claw-style fighting weapon with spring-loaded pop-up mechanisms to disperse chemicals.": "Обучает чертежам когтеобразного боевого оружия с пружинными выдвижными механизмами для распыления химикатов."
"This self-learning workbook teaches you how to create various claw-style fighting weapons. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Этот самоучитель научит вас создавать различные боевые оружия в виде когтей. Сначала он обучает двум рецептам; выполните эти рецепты, чтобы изучить версии более высокого уровня."
"Teaches you an ancient elven bladesmithing technique. It seems to requiring a near-mythical weapon and expensive resources for minor gains.": "Обучает древней эльфийской технике кузнечного дела. Похоже, требует почти мифического оружия и дорогих ресурсов для незначительных улучшений."
"This self-learning workbook teaches you how to create robust fighting dirks. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Этот самоучитель научит вас создавать прочные боевые кинжалы. Сначала вы изучите два рецепта; выполните их, чтобы освоить рецепты более высокого уровня."
"This self-learning workbook teaches you how to create standard broadswords. It initially teaches you two recipes; complete those recipes to learn higher-tier versions.": "Этот учебник для самостоятельного изучения научит вас создавать стандартные широкие мечи. Сначала он обучит вас двум рецептам; выполните эти рецепты, чтобы изучить версии более высокого уровня."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening metal claw weapons. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для заточки металлических когтей. Сначала вы изучите один рецепт; выполните его, чтобы открыть рецепты более высокого уровня."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening daggers. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для заточки кинжалов. Сначала вы изучите один рецепт; выполните его, чтобы открыть рецепты более высокого уровня."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening dirks. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для заточки кинжалов. Сначала вы изучите один рецепт; выполните этот рецепт, чтобы узнать рецепты более высокого уровня."
"This self-learning workbook teaches you how to make a tuneup kit for sharpening swords. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для заточки мечей. Сначала он обучит вас одному рецепту; выполните этот рецепт, чтобы узнать рецепты более высокого уровня."
"Overcooked and dry, but adequate.": "Пережарена и суха, но съедобна."
"Extremely dry. Could be saved with enough gravy, though.": "Очень сухая. Но можно спасти, если добавить достаточно подливы."
"A very simple version of the classic human cookie. Edible, but probably best used for decoration. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень простая версия классического имбирного человечка. Съедобен, но, вероятно, лучше использовать для украшения. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A dish that could really use some spice. But it's tasty anyway.": "Блюдо, которому определённо не хватает специй. Но всё равно вкусное."
"This painting of a waterfall is bland and uninspired, but you can barely make out an older, better painting underneath. The older painting looks to have been a practice piece by a goblin expert.": "Эта картина водопада безликая и невыразительная, но едва можно разглядеть под ней более старую, лучшую работу. Похоже, что старая картина была учебным произведением гоблинского мастера."
"An empty book. Experts at Calligraphy can write in it at a Writing Table.": "Пустая книга. Эксперты в Каллиграфии могут писать в ней за Письменным столом."
"It says \"This acts as a receipt to the perpetrator of a crime. __ demerits to _____ for ____.\" It hasn't been filled out": "В нём написано: «Это служит квитанцией для нарушителя преступления. __ штрафных баллов для _____ за ____.» Он ещё не заполнен"
"Made of a large animal horn and enchanted with magics that enhance its volume.": "Сделан из большого животного рога и зачарован магией, усиливающей его громкость."
"A fungus that can spit a noxious cloud of poison.": "Гриб, который может выпустить ядовитое облако."
"Perfect for hitting enemies and then shooting them with lightning. Much less practical for construction work.": "Идеально подходит для ударов по врагам с последующей стрельбой молниями. Намного менее практичен для строительных работ."
"A brass horn of dwarven design.": "Латунный рожок гномьего изготовления."
"An off-hand weapon with nasty barbs to cause as much traumatic damage as possible.": "Оружие в свободной руке с злыми шипами, чтобы нанести как можно больше травматического урона."
"A thick blue paste that accelerates the leg muscles beyond their natural capacity.": "Густая синяя паста, которая ускоряет мышцы ног сверх их естественной способности."
"An ugly green ring that leaves a vaguely smelly odor behind.": "Уродливое зелёное кольцо, оставляющее за собой едва уловимый неприятный запах."
"Enchanted especially for defense.": "Особо зачарован для защиты."
"A theoretically delicious mushroom.": "Теоретически вкусный гриб."
"A pile of powdered Blood mushrooms.": "Куча порошка из кровавых грибов."
"A home-made blended-mushroom \"treat\". (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Домашний смузи из грибов. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A small vial of foul liquid. Its formula is a secret known only to werewolf clans.": "Маленькая флакончик с отвратительной жидкостью. Её формула — секрет, известный только кланам оборотней."
"An old key coated in bright red goo.": "Старый ключ, покрытый ярко-красной слизью."
"A drop of blood from a gnasher.": "Капля крови от гнасера."
"This gem is dark green with red spots. In magic it is used to command nature.\n\nAssociated Primary Skill: Weather Witching": "Этот самоцвет тёмно-зелёного цвета с красными пятнами. В магии он используется для управления природой.\\n\\nСвязанный основной навык: Магия погоды"
"Dye used to color a piece of clothing or armor blue.": "Краска, используемая для окрашивания одежды или брони в синий цвет."
"A uncommon starfish.": "Необычная морская звезда."
"A thin tube of what you're pretty sure is magic. When you strike it against a hard surface it creates blue sparkles for a few seconds, and makes you feel oddly patriotic.": "Тонкая трубочка, которая, как вам кажется, наполнена магией. Когда вы ударяете её о твёрдую поверхность, она создаёт синие искры на несколько секунд и вызывает странное чувство патриотизма."
"A lovely dark blue stone, with limited but potent magic uses.\n\nAssociated Primary Skill: Staff": "Прекрасный тёмно-синий камень с ограниченными, но мощными магическими свойствами.\n\nСвязанный основной навык: Посохи"
"Dye used to color a piece of clothing or armor blue violet.": "Краска, используемая для окрашивания одежды или брони в синевато-фиолетовый цвет."
"A small runestone that's worth a small fortune at the Red Wing Casino. See Qatik to trade this for 10,000 Councils.": "Небольшой рунический камень, который стоит небольшое состояние в казино Красное Крыло. Обратитесь к Катику, чтобы обменять его на 10 000 Советов."
"A blue cheese with a surprisingly floral smell that tastes like raw meat.": "Голубой сыр с удивительно цветочным ароматом и вкусом сырого мяса."
"A beautiful fresh flower.": "Красивый свежий цветок."
"A collection of fresh flowers, sure to invigorate.\n\nBoosts Combat Refresh Power +2 for 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Коллекция свежих цветов, которая обязательно взбодрит.\\n\\nУвеличивает Силу восстановления в бою на +2 на 4 часа\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"These flower seeds can be planted in garden areas.": "Эти семена цветов можно сажать в садовых зонах."
"A raw fish.": "Сырая рыба."
"A cleaned fish, ready for cooking.": "Очищенная рыба, готовая к приготовлению."
"A blurry watercolor without much to redeem it. However, it was made with highly magical elven pigments that can be reclaimed.": "Размытая акварель без особых достоинств. Однако она создана с использованием высокомагических эльфийских пигментов, которые можно извлечь."
"A delicious but potentially deadly mushroom.": "Вкусный, но потенциально смертельно опасный гриб."
"A pile of flaked Blusher mushrooms.": "Куча хлопьев из гриба Румянца."
"A large boar's tusk.": "Большой клык кабана."
"Full of anatomical drawings of rat-people, and musings in arcane Goblinese.": "Полон анатомических рисунков крысообразных и размышлений на тайном гоблинском языке."
"Boiled cabbage with salt and butter to taste. Not as bad as it sounds!": "Вареная капуста с солью и маслом по вкусу. Не так плохо, как звучит!"
"Boiled crab meat. Butter is optional.": "Мясо варёного краба. Масло по желанию."
"An edible mushroom.": "Съедобный гриб."
"A pile of flaked Boletus mushroom bits.": "Куча хлопьев из кусочков гриба Болетус."
"A beaker for exploding stuff. Held in the main hand.": "Стакан для взрывающихся вещей. Держится в основной руке."
"A pile of bones wrapped in twine. Smells smokey.": "Куча костей, перевязанных шпагатом. Пахнет дымом."
"These bone dice have been carefully weighted and lovingly polished.": "Эти костяные кости тщательно взвешены и бережно отполированы."
"A large hook-shaped bone. Pretty sharp.": "Большая кость в форме крюка. Довольно острая."
"A handful of powdered bone.": "Горсть измельчённой кости."
"It looks revolting, but... actually it's pretty good.": "Выглядит отвратительно, но... на самом деле довольно вкусно."
"A hand-carved spoon made of bone. One the one hand, gross! On the other hand, it's a quality hand-made item, with a certain primitive charm. No, wait. No. It's just gross.": "Ручная резная ложка из кости. С одной стороны — противно! С другой стороны — это качественный предмет ручной работы с определённым примитивным шармом. Нет, подождите. Нет. Это просто противно."
"The bones of an extinct creature's tail.": "Кости хвоста вымершего существа."
"This pulls strength from the drinker's bones to give their body extra density. Smells of bone marrow.": "Это зелье черпает силу из костей пьющего, придавая его телу дополнительную плотность. Пахнет костным мозгом."
"This was the favored match-stick of a minor flame spirit.": "Это была любимая спичка небольшого духа пламени."
"A poor-quality bonnet. It's much too embarrassing to wear.": "Чепчик низкого качества. Носить его слишком стыдно."
"Simple but high-quality, these earrings were worn by a human who lived in the desert years ago. They can be worn in humans' pierced ears.": "Простые, но качественные серьги, которые носил человек, живший в пустыне много лет назад. Их можно носить в проколотых ушах человека."
"These leftover bits of a Super Fishy Surprise have been mixed together to get an ... \"interesting\" and \"unusual\" flavor.": "Эти остатки Супер Рыбного Сюрприза были смешаны вместе, чтобы получить ... «интересный» и «необычный» вкус."
"Designed by a spiteful necromancer bent on conquering a city, these cloth foot coverings seethe with hatred. And it turns out that pure hatred is pretty warm, providing mild protection against the cold.": "Созданные злобным некромантом, стремящимся покорить город, эти тканевые обувные покрытия кипят ненавистью. И оказывается, что чистая ненависть довольно теплая, обеспечивая легкую защиту от холода."
"A favorite of conscripted trolls. The name 'bourbon' is a misnomer since no corn is used. You don't want to know what is used.": "Любимец призванных троллей. Название «бурбон» ошибочно, так как кукуруза не используется. Лучше не знать, что именно используется."
"Shiny boots for shiny warriors.": "Блестящие сапоги для блестящих воинов."
"Makeshift fae armor crafted from repurposed Winter Court armor. It doesn't have quite the style or powers of Summer Court armor, but it's not bad.": "Временная фейская броня, сделанная из переработанной брони Зимнего Двора. У неё нет такого стиля или сил, как у брони Летнего Двора, но она неплоха."
"Sages say the Timedancer was a scion of Laeth, the goddess of Time. Or perhaps the Timedancer will be so one day. Time paradoxes are complex, and all that can be reliably said is that the Timedancer is not here right now.": "Мудрецы говорят, что Танцор Времени был потомком Лета, богини Времени. Или, возможно, Танцор Времени станет им однажды. Парадоксы времени сложны, и единственное, что можно сказать наверняка — Танцор Времени сейчас здесь отсутствует."
"Made of a bizarre metal, these uncomfortable boots seem to clench your feet with malice.": "Сделанные из странного металла, эти неудобные сапоги, кажется, сжимают ваши ноги с злобой."
"Made of the sheerest material and nearly invisible.": "Сделаны из самого тонкого материала и почти невидимы."
"Apples and strawberries in sweet syrup. A little monotonous.": "Яблоки и клубника в сладком сиропе. Немного монотонно."
"This 'milk' is made from soybeans. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Это «молоко» сделано из соевых бобов. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This bottle contains salty water made via a secret ranalon technique. It's used as a marinade and pickling agent.": "Эта бутылка содержит солёную воду, приготовленную по секретной технике раналон. Используется как маринад и рассол."
"This bottle is full of fertilizer.": "Эта бутылка полна удобрения."
"This bottle is full of goat's milk. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Эта бутылка наполнена козьим молоком. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"This bottle is full of cow's milk. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Эта бутылка полна коровьего молока. (Это перекус. Перекусы складываются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"This bottle is full of sugary water.": "Эта бутылка наполнена сладкой водой."
"This bottle contains the sweet runoff of the cheese-making process.": "Эта бутылка содержит сладкий сток процесса производства сыра."
"This bottle is full of clean, delicious water. It can be drunk to recover a little energy, and has a million other uses.": "Эта бутылка полна чистой, вкусной воды. Её можно выпить, чтобы восстановить немного энергии, а также использовать для множества других целей."
"This bottle contains the acidic runoff of the cheese-making process.": "Эта бутылка содержит кислый сток процесса изготовления сыра."
"Made from fermented corn mash, this is very mellow and drinkable. This is the favored drink of Councilwoman Sereel \"The Steel\" Avenbule. She holds a bourbon competition each year in Vidaria.": "Приготовлен из ферментированной кукурузной браги, этот напиток очень мягкий и приятный для питья. Это любимый напиток советницы Серил «Стальная» Авенбуль. Каждый год она проводит конкурс бурбона в Видарии."
"A set of tools and step-by-step instructions that can let almost anyone improve their bow! The effect is temporary and wears off after a certain number of attacks.": "Набор инструментов и пошаговых инструкций, который позволит почти каждому улучшить свой лук! Эффект временный и исчезает после определённого количества атак."
"A longbow optimized for long-distance targets.": "Длинный лук, оптимизированный для целей на большом расстоянии."
"This self-learning workbook teaches you how to make a tuneup kit for improving the accuracy of bows. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для настройки, повышающий точность луков. Сначала он обучит вас одному рецепту; выполните этот рецепт, чтобы узнать рецепты более высокого уровня."
"This self-learning workbook teaches you how to make a tuneup kit for improving the damage of bows. It initially teaches you one recipe; complete this recipe to learn higher-tier versions.": "Этот самоучитель научит вас создавать набор для настройки, который улучшает урон луков. Сначала он обучит вас одному рецепту; выполните этот рецепт, чтобы изучить версии более высокого уровня."
"A brain.": "Мозг."
"A small lobe from a Brain Bug. Wait, did... did it just pulse? Did you see that? No... probably your imagination.": "Небольшая доля от мозгового жука. Подожди, оно что... только что пульсировало? Ты это видел? Нет... наверное, тебе показалось."
"This supposedly protects against brain-eaters.": "Этот шлем якобы защищает от пожирателей мозгов."
"Perfectly-braised tender human loin in a savory sauce made of elf blood and organs.": "Идеально тушёное нежное человеческое филе в пикантном соусе из крови и органов эльфа."
"A small statue of a goblin. It was probably originally part of a child's toy army. Looks antique.": "Небольшая статуэтка гоблина. Вероятно, изначально была частью детской игрушечной армии. Выглядит антикварной."
"A small brass figurine of a hag. It was probably originally part of a child's toy army. Looks antique, and somewhat valuable.": "Небольшая латунная фигурка ведьмы. Вероятно, изначально была частью детской игрушечной армии. Выглядит старинной и довольно ценной."
"A large brass hook, used in advanced ice-fishing.": "Большой латунный крючок, используемый для продвинутой зимней рыбалки."
"A brass gear the size of your hand. It has no obvious purpose.": "Латунное зубчатое колесо размером с вашу ладонь. Очевидного назначения не имеет."
"A very large, well-made brass nail. Useful in Carpentry.": "Очень большой, хорошо сделанный латунный гвоздь. Полезен в столярном деле."
"This brass device serves no obvious purpose. Perhaps it was part of an ancient machine.": "Это латунное устройство не имеет очевидного назначения. Возможно, оно было частью древнего механизма."
"So-called \"Dwarven Nails\", these aren't useful for making houses or other sensible things. Instead, they're used in creating weird machines.": "Так называемые «Гномьи гвозди», они не пригодны для строительства домов или других разумных вещей. Вместо этого их используют для создания странных механизмов."
"Porous cotton that's resistant to heat. Ideal for storing fresh bread.": "Пористый хлопок, устойчивый к теплу. Идеально подходит для хранения свежего хлеба."
"A perfectly edible fish dish, if a bit uninspired.": "Полностью съедобное рыбное блюдо, хоть и немного безвкусное."
"Tasty fish sticks with the heartburny flavor of fried onions.": "Вкусные рыбные палочки с жгучим вкусом жареного лука."
"A bundle of 1000 arrow shafts for breathtaking arrows.": "Пучок из 1000 стрел для потрясающих стрел."
"This is damned good calligraphy ink.": "Это чертовски хорошие чернила для каллиграфии."
"Dye used to color a piece of clothing or armor brick red.": "Краска, используемая для окрашивания одежды или брони в кирпично-красный цвет."
"A white-mold cheese with a savory taste.\n\nCheese Type: White": "Сыр с белой плесенью и пикантным вкусом.\\n\\nТип сыра: белый"
"Dye used to color a piece of clothing or armor bright violet.": "Краска, используемая для окрашивания одежды или брони в ярко-фиолетовый цвет."
"An extremely soft cheese that can be shaped into different forms.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень мягкий сыр, который можно формовать в разные формы.\n\nТип сыра: сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This head of broccoli looks a lot like a little green tree.": "Эта головка брокколи очень похожа на маленькое зелёное дерево."
"A heaping head of broccoli with the *perfect* amount of salt and butter.": "Большая головка брокколи с *идеальным* количеством соли и масла."
"A plantable broccoli seedling.": "Саженец брокколи, пригодный для посадки."
"Deliciously baked vegetables covered in delicious cheese.": "Вкусно запечённые овощи под аппетитным сыром."
"A strange cube. It once held augmentation magic, but it's been damaged beyond repair. You might be able to salvage something from it... if you knew how to open it without shattering it.": "Странный куб. Раньше он содержал магию усиления, но был повреждён до неузнаваемости. Возможно, из него можно что-то извлечь... если знать, как открыть его, не разбив."
"This large net has seen heavy use, and now needs significant repair... or, more likely, replacement.": "Эта большая сеть сильно изношена и теперь требует серьёзного ремонта... или, скорее всего, замены."
"A thin metal chain, now broken. It wasn't very high-quality in the first place, either.": "Тонкая металлическая цепочка, теперь сломанная. Изначально она тоже была не очень высокого качества."
"From an Aktaari rake. They use them to cultivate evu fruit.": "От граблей Актаари. Их используют для обработки фруктов эву."
"Parts of a broken sword blade. Looks like it was once an orcish khopesh, but it's not repairable.": "Части сломанного лезвия меча. Похоже, когда-то это был орочий копеш, но его нельзя починить."
"A sweet beer with hints of chocolate.": "Сладкое пиво с нотками шоколада."
"These old Magic Trooper gloves have been patched many times. But each repair was done with such care that it actually made the gloves stronger overall.": "Эти старые перчатки Магического Солдата были многократно заштопаны. Но каждая починка была выполнена с такой тщательностью, что в итоге перчатки стали только крепче."
"A goblin sandwich. Savory mushrooms topped with spices and stacked between two slices of Goblin Bread.": "Гоблинский сэндвич. Ароматные грибы с приправами, уложенные между двумя ломтиками гоблинского хлеба."
"Roughly translates to \"Brukwint with Meat\", this is a traditional goblin sandwich but the mushroom has been replaced by meat of some kind, making it even more delicious.": "Примерно переводится как «Бруквинт с мясом», это традиционный гоблинский сэндвич, но гриб был заменён на мясо какого-то вида, что делает его ещё вкуснее."
"Roughly translates to \"Brukwint with Cheese\", this is a traditional goblin sandwich with a slice of decadent cheese added.": "Примерно переводится как «Бруквинт с сыром», это традиционный гоблинский сэндвич с добавлением ломтика изысканного сыра."
"Roughly translates to \"Brukwint with Meat & Cheese\", this is so far removed from the traditional goblin sandwich (Brukwint) that it shouldn't even share the same name. It is savory meat topped with decadent cheese and spices, squished between two slices of Goblin Bread.": "Приблизительно переводится как «Бруквинт с мясом и сыром», это настолько далеко от традиционного гоблинского сэндвича (Бруквинта), что даже не должно носить одно и то же имя. Это пикантное мясо, покрытое изысканным сыром и специями, зажатое между двумя ломтиками гоблинского хлеба."
"A \"lesser\" goblin sandwich. Chewy mushrooms topped with salt and stacked between day-old Goblin Wheatbread.": "«Меньший» гоблинский сэндвич. Жевательные грибы, посыпанные солью и уложенные между вчерашним гоблинским пшеничным хлебом."
"Roughly translates to \"Brukwont with Cheese\", this is a traditional \"lesser\" goblin sandwich with a slice of decadent cheese added.": "Приблизительно переводится как «Бруквонт с сыром», это традиционный «младший» гоблинский сэндвич с добавлением ломтика изысканного сыра."
"A very sweet brown cheese made with sour cream.\n\nCheese Type: Whey (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Очень сладкий коричневый сыр, приготовленный со сметаной.\n\nТип сыра: Сывороточный (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"This bucket is full of clean, delicious water. It's not usable on its own, but it can be used to fill up containers which can better distribute the water further.": "Это ведро наполнено чистой, вкусной водой. Само по себе оно не используется, но его можно использовать для наполнения контейнеров, которые лучше распределяют воду дальше."
"A belt buckle with a holy symbol painted on it, allowing the wearer to tap into the grace of Arisetsu. Unfortunately, the belt is extremely painful to wear, and even worse, the paint is very delicate: prolonged use in combat will cause the belt to break, requiring replacement.": "Пряжка для пояса с изображением святого символа, позволяющая носителю черпать благодать Арисэцу. К сожалению, пояс очень болезненно носить, и что ещё хуже, краска очень хрупкая: длительное использование в бою приведёт к поломке пояса, требующей замены."
"A very ornate belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Очень изящная пряжка для пояса с изображением молота.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"A simple belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Простая пряжка ремня с изображением молота.\n\nЭта пряжка постепенно разрушается при ношении в бою, пока в конце концов не исчезает."
"A nice belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Хорошая пряжка для пояса с изображением молота.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"Crude, ugly, and stupid, this buckle gives the wearer a sense of boldness. Only a bold warrior would wear this in public.\n\nThis buckle quickly decays when worn in combat, eventually disappearing.": "Грубая, уродливая и глупая, эта пряжка придаёт носителю чувство смелости. Только смелый воин осмелится носить её на людях.\n\nЭта пряжка быстро разрушается при ношении в бою и в конце концов исчезает."
"Simplistic runes and bright colors are what give this belt's wearer such stage presence. (But do not actually wear this ugly thing on stage.)\n\nThis buckle quickly decays when worn in combat, eventually disappearing.": "Простые руны и яркие цвета придают носителю этого пояса особое сценическое присутствие. (Но на самом деле не надевайте эту уродливую вещь на сцену.)\n\nЭта пряжка быстро разрушается при ношении в бою и в итоге исчезает."
"While crude, this buckle has a certain charming skill to it.\n\nThis buckle quickly decays when worn in combat, eventually disappearing.": "Хотя и грубая, эта пряжка обладает определённым очаровательным мастерством.\n\nЭта пряжка быстро разрушается при ношении в бою и в конце концов исчезает."
"A pretty buckle with runes covering it.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Красивая пряжка, покрытая рунами.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"An elegant buckle covered in symbols. There's demonic beings swinging hammers, among other things.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Элегантная пряжка, покрытая символами. Среди прочего, на ней изображены демонические существа, размахивающие молотами.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"A thick, ugly buckle.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Толстая, уродливая пряжка.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"While on the surface this belt buckle elegantly conveys the wonder and joy of hitting things, a second interpretation suggests that people who hit things with hammers are inherently better than other people. The symbolism is subtle, but it's there.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "На первый взгляд эта пряжка для пояса изящно передаёт удивление и радость от ударов по предметам, но второй смысл подразумевает, что люди, которые бьют молотками, по своей природе лучше других. Символизм тонкий, но он присутствует.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"In just a few symbols, this belt buckle juxtaposes the grace, beauty, and apparent immortality of the hammer wearer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Всего несколькими символами эта пряжка для пояса противопоставляет грацию, красоту и кажущееся бессмертие носителя молота.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"A thick but attractive buckle.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Толстая, но привлекательная пряжка.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"While this buckle is certainly gaudy, it also conveys notions of toughness and fortitude in a way that mere words never could.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Хотя эта пряжка определённо кричаще яркая, она также передаёт представления о стойкости и крепости так, как простые слова никогда не смогли бы.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"With but a glance, the viewer understands the message behind this beautiful belt: people who use hammers can never die.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "С первого взгляда зритель понимает послание этой красивой пряжки: люди, которые используют молоты, никогда не могут умереть.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"An elegant buckle covered in symbols. There's lots of hammers and clubs.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Элегантная пряжка, покрытая символами. На ней много молотов и дубин.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This buckle is crudely made but conveys the basic idea that hammering things is fun.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта пряжка грубо сделана, но передаёт основную идею, что забивать вещи молотком — это весело.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This buckle is a work of art that elevates the wearer to lofty heights of imagined heroism.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта пряжка — произведение искусства, возносящее носителя на возвышенные вершины воображаемого героизма.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This beautiful buckle leaves the wearer floating on a cloud of enthusiasm and luck.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта красивая пряжка заставляет носителя парить на облаке энтузиазма и удачи.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This buckle should be in a museum. A buckle museum. You probably couldn't charge for admission to a buckle museum, but you'd have occasional passersby come and gawk.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта пряжка должна быть в музее. В музее пряжек. Наверное, за вход в музей пряжек не возьмёшь плату, но время от времени мимо проходящие будут останавливать взгляд.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This conveys the basic idea that hammering things is fun.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Это передаёт основную идею, что забивать вещи молотком — это весело.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This buckle expresses the sentiment that sometimes a hammer is the best way to solve a problem.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта пряжка выражает мысль, что иногда молоток — лучший способ решить проблему.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"This buckle concisely describes the emotion one feels when smashing something's head open with a big club.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Эта пряжка лаконично описывает чувство, которое испытываешь, разбивая кому-то голову большим дубинкой.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"A gold-inlaid belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Пряжка для пояса с изображением молота, инкрустированная золотом.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"A ridiculously ornate belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Невероятно изящная пряжка для пояса с изображением молота.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"An ornate belt buckle depicting a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Украшенная пряжка для пояса с изображением молота.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"An elegant buckle covered in symbols. The most prominent symbol is a god-like being swinging a hammer.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Элегантная пряжка, покрытая символами. Самый заметный символ — божественное существо, размахивающее молотом.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"An elegant buckle covered in symbols. There's lots of hammers.\n\nThis buckle slowly decays when worn in combat until it eventually disappears.": "Элегантная пряжка, покрытая символами. На ней много молотов.\n\nЭта пряжка медленно разрушается при ношении в бою, пока в конце концов не исчезает."
"Used by the migrant house-builders that until recently found work in Povus. While it can be used as a weapon, its primary purpose was to store powerful drink.": "Использовалась мигрантами-строителями домов, которые до недавнего времени находили работу в Повусе. Хотя её можно использовать как оружие, основное предназначение — хранить мощный напиток."
"Transforms you into a rabbit. Permanent until dispelled! WARNING: think before you drink!": "Превращает вас в кролика. Постоянно, пока не рассеется! ВНИМАНИЕ: подумайте, прежде чем пить!"
"A poem written by a loved-one for a deceased family member, following an old Human custom. Since funerals are the only time these Humans ever wrote poetry in their lives, the quality is... not good.": "Стихотворение, написанное близким человеком для умершего члена семьи, согласно старому человеческому обычаю. Поскольку похороны были единственным временем, когда эти люди писали стихи в своей жизни, качество... не очень."
"Dye used to color a piece of clothing or armor burly wood.": "Краска, используемая для окрашивания одежды или брони в цвет крепкой древесины."
"A coarse variety of whisky that's commonly drunk in the dwarven military.": "Грубый сорт виски, который обычно пьют в гномьей армии."
"An incredible piece of meat that's been overcooked to charcoal. Still edible, but a waste of quality beef.": "Невероятный кусок мяса, пережаренный до состояния угля. Всё ещё съедобен, но это пустая трата качественной говядины."
"A large knife for cutting meat and organs out of corpses. (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)": "Большой нож для нарезки мяса и извлечения органов из трупов. (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)"
"Smooth, luscious yellow butter.": "Гладкое, сочное жёлтое масло."
"Cotton cloth that's extremely porous. Ideal for butter and certain cheeses.": "Хлопковая ткань с высокой пористостью. Идеально подходит для масла и некоторых сыров."
"A savory appetizer. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска. (Это перекус. Перекусы суммируются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"A baked potato topped with fresh butter.": "Запечённый картофель с добавлением свежего масла."
"A pleasant biscuit with a rustic, nutty flavor.": "Приятное печенье с деревенским, ореховым вкусом."
"Exotic-flavored candy that's unlike any natural food you've tasted. Candy aficionados love it.  (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Конфета с экзотическим вкусом, не похожая ни на какую натуральную еду, которую вы пробовали. Любимец ценителей сладостей.  (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A handful of buttons of all shapes and sizes.": "Горсть пуговиц всех форм и размеров."
"A raw cabbage.": "Сырая капуста."
"A plantable cabbage leafling.": "Посадочный листок капусты."
"Thin, runny, and smelly. Mmm! Salt is a key ingredient.": "Жидкий, водянистый и вонючий. Ммм! Соль — ключевой ингредиент."
"Freshly-squeezed liquid out of a cactus.": "Свежевыжатая жидкость из кактуса."
"Dye used to color a piece of clothing or armor cadet blue.": "Краситель, используемый для окрашивания одежды или брони в кадетский синий цвет."
"This crate contains one pet, ready for travel or just some R&R. ": "Этот ящик содержит одного питомца, готового к путешествию или просто отдыху."
"Someone was practicing their calligraphy on this parchment. They're not bad.": "Кто-то практиковался в каллиграфии на этом пергаменте. У него неплохо получается."
"Teaches you a secret Calligraphy recipe": "Обучает секретному рецепту каллиграфии"
"A packet of strange chemicals wrapped in a leaf. While it has minor benefits, its primary use is to cure Bounceweed hangovers. It can also temporarily relieve the symptoms of Bounceweed abuse. Calmweed is not addictive.": "Пакет странных химикатов, завернутых в лист. Хотя у него есть незначительные преимущества, основное его применение — лечение похмелья от Прыгучей травы. Также временно облегчает симптомы злоупотребления Прыгучей травой. Успокоенная трава не вызывает привыкания."
"A blue cheese with a complex palette of tastes and smells.\n\nCheese Type: Blue": "Голубой сыр с богатым букетом вкусов и ароматов.\n\nТип сыра: голубой"
"A white-mold cheese with a complex taste.\n\nCheese Type: White": "Сыр с белой плесенью и сложным вкусом.\\n\\nТип сыра: белый"
"These look like really soft plants. Wait, those are soft <i>pants.</i> That's great camo.": "Они выглядят как очень мягкие растения. Подождите, это мягкие <i>штаны.</i> Отличный камуфляж."
"This is the sort of shirt a masterful guerilla elf might wear. Not that you'd ever see them wearing it, of course, but that's the point.": "Это та рубашка, которую мог бы носить искусный партизанский эльф. Конечно, вы вряд ли когда-нибудь увидите их в ней, но в этом и смысл."
"Someone has awkwardly painted these sub-par pants. Well, woodland animals aren't super smart, so maybe that'll do.": "Кто-то неловко раскрасил эти посредственные штаны. Ну, лесные животные не слишком умны, так что, может, сойдёт."
"A poor piece of clothing,  but it does at least blend into the surroundings well.": "Плохая одежда, но хотя бы хорошо сливается с окружением."
"Decent pants that blend into the surroundings.": "Неприметные штаны, сливающиеся с окружением."
"People won't realize how silly your shirt is, because they won't even notice you're there! Much.": "Люди не заметят, насколько глупа твоя рубашка, потому что они даже не заметят, что ты там! Вообще."
"This is a great camouflage job! The pants, well, they're not <i>bad</i> per se...": "Отличная маскировка! Штаны, в общем, сами по себе <i>неплохие</i>..."
"Is it a camouflaged nice shirt, or a nice camouflaged shirt? A little of both, probably.": "Это замаскированная красивая рубашка или красивая замаскированная рубашка? Наверное, немного того и другого."
"Don't drop these in the forest or you'll never find them again.": "Не роняйте их в лесу, иначе никогда не найдете снова."
"It's hard to see, which is good for a camouflaged shirt.": "Её трудно заметить, что хорошо для камуфлированной рубашки."
"It's an apple coated in a sugar glaze so thick that it hurts your teeth to bite into. A somewhat tedious treat. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Это яблоко, покрытое сахарной глазурью такой густоты, что при укусе зубы начинают болеть. Довольно утомительное лакомство. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"Thin slices of candied fruit sprinkled with walnut slices. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Тонкие ломтики засахаренных фруктов, посыпанные кусочками грецкого ореха. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить пользу от обеих.)"
"A snack of sugar-glazed grapes. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Закуска из виноградины в сахарной глазури. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"It starts delicious and then ends... not delicious.": "Сначала вкусно, а потом... уже не очень."
"A freeze-dried beetle of some sort.": "Какой-то сублимированный жук."
"Sweet *and* tart!": "Сладкий *и* кислый!"
"A mostly-used-up candle made of lard.": "Почти полностью использованная свеча из свиного жира."
"Packed with flavor, these candies make a wonderful summer treat.": "Насыщенные вкусом, эти конфеты станут прекрасным летним лакомством."
"These tart little sugar rocks are a popular summer-time sweet.": "Эти кисленькие сахарные камушки — популярное летнее лакомство."
"A simple cheese that's often used melted in other recipes.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Простой сыр, который часто используют расплавленным в других рецептах.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A large sweet fruit. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Большой сладкий фрукт. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"A plantable cantaloupe vine.": "Посадочная лоза канталупы."
"A refreshing summer wine. When prepared by a master brewer, this is the perfect outdoor party wine.": "Освежающее летнее вино. Приготовленное мастером пивоварения, это идеальное вино для вечеринки на свежем воздухе."
"Rough cloth for industrial uses.": "Грубая ткань для промышленных целей."
"A customized system of harnesses worn around the hips and legs. Armor-enhancing nanodispensers are hidden behind the knee guards.": "Индивидуальная система упряжей, надеваемых на бедра и ноги. Нанодозаторы, усиливающие броню, скрыты за наколенниками."
"A very complicated device that can help with tricky pathology inquiries. (+10 to your effective skill when autopsying a corpse.)": "Очень сложное устройство, которое помогает с трудными патологоанатомическими исследованиями. (+10 к вашему эффективному навыку при вскрытии трупа.)"
"Cotton that's been cleaned of seeds and is ready to become yarn.": "Хлопок, очищенный от семян и готовый к превращению в пряжу."
"A care package including sacks of Councils, odd-colored dyes, and a note.": "Посылка заботы, включающая мешки с Советами, красители необычных цветов и записку."
"A care package including mushroom substrate, a bag of beads, and several paper notes.": "Посылка с припасами, включающая грибной субстрат, мешочек с бусинами и несколько бумажных записок."
"A care package including some clover, salt licks, sealed documents, and a strange device you don't recognize.": "Посылка заботы, включающая клевер, соляные лизунцы, запечатанные документы и странное устройство, которое вы не узнаёте."
"A care package consisting entirely of mushrooms. ": "Посылка с припасами, состоящая полностью из грибов. "
"Seems like it unlocks something.": "Похоже, он что-то открывает."
"Supposedly taken from the dwarven queen Carlosta, this ruby is quite valuable, but otherwise unremarkable.": "Предположительно взят у королевы гномов Карлосты, этот рубин весьма ценен, но в остальном ничем не примечателен."
"A red gem. Used in magic, it balances the senses and sharpens the mind to imminent danger.\n\nAssociated Primary Skill: Sword": "Красный драгоценный камень. Используется в магии, он уравновешивает чувства и обостряет ум к надвигающейся опасности.\\n\\nСвязанный основной навык: Меч"
"Dye used to color a piece of clothing or armor carnelian red.": "Краситель, используемый для окрашивания одежды или брони в карнелиан красный цвет."
"A plate-like protrusion from a carnivine.": "Пластинчатое выступление от плотоядного растения."
"Can be studied to earn Carpentry XP. (Requires VIP.)": "Можно изучать для получения опыта в плотницком деле. (Требуется VIP.)"
"Teaches you how to make a staff that works for priests, druids, fire mages, ice mages, and, of course, staff fighters.": "Обучает созданию посоха, подходящего для жрецов, друидов, огненных магов, ледяных магов и, конечно, бойцов с посохом."
"Teaches you a schematic for a very robust storage crate.": "Обучает чертежу очень прочного ящика для хранения."
"Teaches you a schematic for a masterpiece of rustic furniture design.": "Обучает вас чертежу шедевра деревенского мебельного дизайна."
"Teaches you how to make a staff with devices to fling noxious liquids.": "Обучает созданию посоха с устройствами для распыления ядовитых жидкостей."
"Teaches you how to make a staff that works for smacking enemies in the face with great enthusiasm.": "Обучает созданию посоха, который отлично подходит для смачного удара врагам по лицу с большим энтузиазмом."
"Teaches you how to make a staff that works for staff fighting, druidism, fire magic, and ice magic.": "Обучает созданию посоха, подходящего для боя посохом, друидизма, огненной магии и ледяной магии."
"Teaches you how to make a staff that works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Обучает созданию посоха, подходящего для боя посохом и друидизма, но не для огненной магии, ледяной магии или священных сил."
"Teaches you a schematic for a masterpiece of wood-nailed-to-cow-hoof design.": "Обучает чертежу шедевра в дизайне деревянных гвоздей, прибитых к копыту коровы."
"Teaches you a schematic for a masterpiece  of wood-nailed-to-deer-hoof design.": "Обучает чертежу шедевра в виде деревянных башмаков, прибитых к оленьей копыте."
"Orange and pointy. Yup, it's a carrot.": "Оранжевая и острая. Да, это морковь."
"A plantable carrot seedling.": "Саженец моркови для посадки."
"Given that it was made from carrots, this wine is... surprisingly good!": "Учитывая, что оно сделано из моркови, это вино... удивительно хорошее!"
"A magically sharp dagger with complex weighting that makes it difficult for neophytes to master. A necromancy gem has been fastened to the handle by its previous owner.": "Магически острый кинжал со сложным балансом, который трудно освоить новичкам. К рукояти предыдущим владельцем был прикреплён некромантический самоцвет."
"This ticket entitles the bearer to a free game of Cashfall Match-3 at the Red Wing Casino.": "Этот билет даёт право владельцу на бесплатную игру в Cashfall Match-3 в казино Красное Крыло."
"A light breakfast to start a day of heavy gambling. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Лёгкий завтрак для начала дня с азартными играми. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A tasty snack from the Red Wing casino. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Вкусная закуска из казино Красное Крыло. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"An appealing-smelling mix of vegetables and mystery meat.": "Привлекательная на запах смесь овощей и загадочного мяса."
"Swallowing this small pebble will teleport you to the Red Wing Casino.": "Проглатывание этого маленького камешка телепортирует вас в Казино Красного Крыла."
"What the... Gross!": "Что за... Фу, противно!"
"Cat meat is never particularly tasty, but this is ... edible.\n\n(Use in Cheap Meat recipes.)": "Мясо кошки никогда не было особенно вкусным, но это... съедобно.\\n\\n (Используется в рецептах Дешёвого мяса.)"
"Low-quality pieces of cat meat have been sliced extraordinarily thin, tenderized, and then buried in salt. The result is a cup of hot stew that tastes ... salty. But not horrible. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Низкокачественные куски кошачьего мяса были нарезаны чрезвычайно тонко, отбиты и затем засыпаны солью. В результате получилась кружка горячего рагу с ... солёным вкусом. Но не ужасным. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"Expertly cleaned and ready for cooking.": "Мастерски очищено и готово к приготовлению."
"Fresh catfish doused in crisp vinegar.": "Свежий сом, политый хрустящим уксусом."
"Perfectly seasoned catfish, with seaweed and rice.": "Идеально приправленный сом с водорослями и рисом."
"The liquid in this cauldron is sure to cause hallucinations and may bring out latent magic effects in unpredictable ways. It's insanely dangerous.\n\nOnce deployed, any player can drink from the cauldron. It disappears after five minutes.": "Жидкость в этом котле наверняка вызовет галлюцинации и может непредсказуемо активировать скрытые магические эффекты. Это невероятно опасно.\n\nПосле установки любой игрок может выпить из котла. Он исчезает через пять минут."
"This crumbly cheese is mild and bland, but it's nourishing.\n\nCheese Type: Semi-Hard": "Этот рассыпчатый сыр мягкий и пресный, но питательный.\n\nТип сыра: полутвердый"
"A raw fish. Found in caves throughout the world, these blind fish are normally tiny, but can grow to surprising size in nature-magic-rich environments.": "Сырая рыба. Обитает в пещерах по всему миру, эти слепые рыбы обычно крошечные, но могут вырастать до удивительных размеров в средах, богатых природной магией."
"Raw cavefish on a ball of delicious rice.": "Сырая пещерная рыба на шарике вкусного риса."
"A bizarre snack that uses a rare fish found only in the deepest of caves. You eat it scales and all. It takes some getting used to.": "Странная закуска, приготовленная из редкой рыбы, обитающей только в самых глубоких пещерах. Едят её вместе с чешуёй. Требуется время, чтобы привыкнуть."
"A lightly fried fish dish.": "Легко обжаренное рыбное блюдо."
"Raw cavefish wrapped in seaweed, on a ball of delicious rice.": "Сырая пещерная рыба, завернутая в морские водоросли, на шарике вкусного риса."
"An astonishingly intricate tiny harness designed to fit a giant butterfly, enabling Druidism.": "Поразительно сложная крошечная уздечка, предназначенная для гигантской бабочки, позволяющая заниматься друидизмом."
"A collection of 1000 dowels that are the right length for becoming arrows, if a fletcher prepared them.": "Набор из 1000 палочек подходящей длины для изготовления стрел, если их подготовит стрелочник."
"A well-made wooden mesh, useful for cages, pens, trellises, and so on.": "Хорошо сделанная деревянная сетка, полезная для клеток, загонов, шпалер и тому подобного."
"A framework for building a mushroom grow-box.": "Каркас для создания ящика для выращивания грибов."
"Useful generic wood! Good for cooking, building, whittling, and who knows what else. Wow! What a find!": "Полезная универсальная древесина! Отлично подходит для готовки, строительства, резьбы и кто знает для чего ещё. Вау! Какая находка!"
"Cedar chips for smoking fish and meat.": "Кедровая щепа для копчения рыбы и мяса."
"Congratulations from the Project: Gorgon team! Thanks for playing and supporting us!": "Поздравления от команды Project: Gorgon! Спасибо, что играете и поддерживаете нас!"
"An elaborate network of nerves that connects the three heads together.": "Сложная сеть нервов, соединяющая три головы вместе."
"A spiky neck contraption that goes on the dominant head of a cerberus, hopefully preventing it from killing its masters.": "Шипастое устройство для шеи, надеваемое на доминирующую голову цербера, которое, надеемся, предотвратит убийство его хозяев."
"A weird mineral found near the rubywall crystals; the origin is completely unknown, and the name seems to be a misnomer.": "Странный минерал, найденный рядом с кристаллами рубиновой стены; происхождение полностью неизвестно, а название, похоже, ошибочно."
"A bulky wooden cup full of greenish energy. You can sip this in your dying moments in order to come back to life. Only druids can consume this energy.": "Объёмный деревянный кубок, наполненный зеленоватой энергией. Вы можете отпить из него в последние моменты жизни, чтобы вернуться к жизни. Эту энергию могут потреблять только друиды."
"Nearly charcoal but technically edible, this comes from some sort of beast.": "Почти уголь, но технически съедобно, это происходит от какого-то зверя."
"A colony of thin tube-like fungus that collects ambient magical energy and can release that energy in an explosive burst.": "Колония тонких трубчатых грибов, которые собирают окружающую магическую энергию и могут выпустить её взрывным импульсом."
"A pile of flaked charged myceliums. ": "Куча хлопьев заряженного мицелия. "
"Made in a dwarven style that controls and focuses electricity.": "Сделано в гномьем стиле, который контролирует и фокусирует электричество."
"This silver charm is engraved with two angelic wings inset with an azure gem in the middle. It slows the wearer's fly speed while also reducing the cost of staying in the air, ideal for one who enjoys being up among the clouds.": "Этот серебряный талисман украшен двумя ангельскими крыльями с лазурным камнем посередине. Он замедляет скорость полёта носителя, а также снижает затраты на пребывание в воздухе, идеально подходит для тех, кто любит парить среди облаков."
"A strangely burned bone. It leaves black smudges on everything it touches.": "Странно обожженная кость. Оставляет черные пятна на всем, к чему прикасается."
"Dye used to color a piece of clothing or armor chartreuse.": "Краска, используемая для окрашивания одежды или брони в картрезный цвет."
"Budget-conscious goblins love these boots, which look as sturdy as regular goblin boots, but a fraction of the cost!": "Экономные гоблины обожают эти сапоги, которые выглядят так же крепко, как обычные гоблинские сапоги, но стоят лишь часть их цены!"
"The preferred armor of goblin tribes on serious budget crunches.": "Предпочитаемая броня племён гоблинов при серьёзной нехватке средств."
"When goblin tribes suffer from high turnover and budget shortfalls, they often have to make do with armor like this.": "Когда племена гоблинов страдают от высокой текучести кадров и нехватки бюджета, им часто приходится обходиться такой бронёй."
"A subpar goblin helm, dented and worn.": "Плохой шлем гоблина, помятый и изношенный."
"The stitching on these leather pants is awful. And the quality of the leather sub-par. But goblins forced to buy their own armor often choose these for cost reasons.": "Швы на этих кожаных штанах ужасны. А качество кожи ниже среднего. Но гоблины, вынужденные покупать свою броню сами, часто выбирают их из-за низкой цены."
"Etchings in the Goblin language roughly translate to \"I Have My Rights And I Don't Care About Yours\". It sounds better in the native tongue.": "Гравировки на языке гоблинов примерно переводятся как «У меня есть права, и мне наплевать на твои». На родном языке звучит лучше."
"An Elven bow that's been enhanced with shoddy Goblin magic.": "Эльфийский лук, усиленный кустарной гоблинской магией."
"A cut of meat from a wild creature that's not normally used for food. The meat is low-quality but still useful in many dishes.\n\n(Use in Cheap Meat recipes.)": "Кусок мяса диких существ, который обычно не используется в пищу. Мясо низкого качества, но всё же пригодно для многих блюд.\n\n(Используется в рецептах дешёвого мяса.)"
"It looks like lumps of dried curd on a string! Wait... it's actually metal shaped like cheese curds. Ratkin culture is weird.": "Похоже на комочки высушенного творога на шнурке! Подожди... на самом деле это металл, вылепленный под творожные комочки. Культура крысоловов странная."
"Porous cotton that's resistant to heat. Ideal for creating hard cheeses.": "Пористый хлопок, устойчивый к нагреву. Идеально подходит для приготовления твердых сыров."
"Teaches you a cheese recipe.": "Обучает рецепту сыра."
"Teaches you how to make firm tofu from soy milk.": "Обучает вас приготовлению твёрдого тофу из соевого молока."
"Teaches you how to make soft tofu from soy milk.": "Обучает приготовлению мягкого тофу из соевого молока."
"Teaches you how to process soybeans into soy milk. ": "Обучает переработке соевых бобов в соевое молоко. "
"Teaches you how to make tofu from soy milk.": "Обучает приготовлению тофу из соевого молока."
"A baked potato with delicious melted cheese.": "Запечённый картофель с вкусным расплавленным сыром."
"A tasty meal, best eaten hot.": "Вкусное блюдо, лучше есть горячим."
"A blend of baked vegetables in a hearty cheese sauce.": "Смесь запечённых овощей в сытном сырном соусе."
"A pleasantly mild semi-hard cheese.\n\nCheese Type: Semi-Hard (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Нежный полутвердый сыр.\n\nТип сыра: Полутвердый (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A strange magical cube. It can be used to give chest armor a bonus magical ability. Visit an equipment shopkeeper (or a player Augmenter) to install it.": "Странный магический куб. Его можно использовать, чтобы добавить нагрудной броне бонусную магическую способность. Посетите торговца снаряжением (или игрока-улучшателя), чтобы установить его."
"THIS IS A LEGACY ITEM. Take it to the Legacy Item Helper golem in Serbule to trade it in for a current item.": "ЭТО ПРЕДМЕТ НАСЛЕДИЯ. Отнесите его помощнику по предметам наследия — голему в Сербуле, чтобы обменять на актуальный предмет."
"A metal key with a note attached. In flowery script it says,\n\n\"My dear Lawyr, I knew you could do it! Meet me on the mainland and I'll help you recover your destiny. - Yurra\"": "Металлический ключ с прикреплённой запиской. Цветистым почерком написано,\n\n«Мой дорогой Лоир, я знала, что ты справишься! Встреть меня на материке, и я помогу тебе вернуть твою судьбу. — Юрра"
"In his youth, Chet loved the lightning. In his later days he kind of preferred plain smashing. This club served him in both.": "В молодости Чет обожал молнии. В более поздние годы он предпочитал просто громить. Эта дубина служила ему в обоих случаях."
"Gross little seeds from a weed. They can't be grown, but can be ground into an edible form.": "Отвратительные маленькие семена сорняка. Их нельзя выращивать, но их можно перемолоть в съедобную форму."
"Baked chicken in a complex dish. This one was cooked just right and has a variety of textures.": "Запечённая курица в сложном блюде. Это блюдо приготовлено идеально и обладает разнообразной текстурой."
"Comes with its own handle! An instant fill-up for the not-particularly-discerning bar patron.": "Подаётся с собственной ручкой! Мгновенное насыщение для не слишком разборчивого посетителя бара."
"It smells bad, but... it doesn't taste too bad, actually.": "Пахнет плохо, но... на вкус на самом деле не так уж плохо."
"Stir-fried chicken with broccoli and other vegetables.": "Курица, обжаренная с брокколи и другими овощами."
"A hearty soup.": "Сытный суп."
"A tasty and complex dish that makes the ingredients go a long way.": "Вкусное и сложное блюдо, которое позволяет ингредиентам раскрыться по максимуму."
"These were probably part of a child's game set. There are only a handful left.": "Это, вероятно, были части детского игрового набора. Осталась всего горстка."
"A very old goblet that remains cold to the touch even in hot weather. It's made of a strange metal that might be worth studying.": "Очень старый кубок, который остаётся холодным на ощупь даже в жаркую погоду. Он сделан из странного металла, который стоит изучить."
"A leather strap to keep a helmet attached to the wearer's head.": "Кожаный ремешок, чтобы шлем держался на голове носителя."
"The horn of a fae rhino.": "Рог фейного носорога."
"A squid amulet worn by those that venerate Enoyos. This one is a failed experiment by Chirrra. The enchantment has been altered in strange and seemingly-random ways.": "Амулет с изображением кальмара, который носят почитатели Энёйоса. Этот экземпляр — неудачный эксперимент Чиррры. Заклинание было изменено странным и, казалось бы, случайным образом."
"The mandibles from a particularly nasty insect.": "Жвалы особенно противного насекомого."
"Dye used to color a piece of clothing or armor chocolate.": "Краска, используемая для окрашивания одежды или брони в шоколадный цвет."
"This odd weapon was made specifically for chopping attacks. The weighting makes it difficult to use for piercing.": "Это необычное оружие было создано специально для рубящих атак. Его балансировка затрудняет использование для колющих ударов."
"Pale yellow-green and pretty.": "Бледно-жёлто-зелёный и красивый."
"This old beaker is perfectly shaped for gulping down quick-brewed healing concoctions.": "Этот старый стакан идеально подходит для быстрого глотания быстро приготовленных лечебных снадобий."
"This old flask is perfectly shaped for gulping down quick-brewed healing concoctions.": "Эта старая фляжка идеально подходит для быстрого залпового глотка быстро сваренных лечебных снадобий."
"The perfect refreshment after desert exertion. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Идеальное освежение после пустынных усилий. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обоих.)"
"This variety of cider is made from sour apples and has a complex array of taste sensations. Pity you won't remember the taste after blacking out from it...": "Этот сорт сидра изготовлен из кислых яблок и обладает сложным букетом вкусовых ощущений. Жаль, что вы не запомните вкус после того, как упадёте в обморок..."
"The evil creature Ciervos wore these for thousands of years. Must be lucky! Hmm, but he died wearing them. Maybe they're unlucky...": "Злое существо Сиервос носило их тысячи лет. Должно быть, они приносят удачу! Хмм, но он умер, нося их. Может, они приносят несчастье..."
"A soft strange metal, quite magical, and very poisonous. It has many uses.": "Мягкий странный металл, довольно магический и очень ядовитый. Имеет много применений."
"Dried \"sticks\" of cinnamon, perfect for spicing many dishes.": "Высушенные «палочки» корицы, идеально подходят для приправы многих блюд."
"A sweet and spicy disk of hard candy. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкая и пряная леденцовая конфета. (Это перекус. Перекусы складываются с основными блюдами; вы можете съесть по одному из каждого и получить преимущества обоих.)"
"They smell delicious and taste even better. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Они пахнут восхитительно и на вкус ещё лучше. (Это закуска. Закуски суммируются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A sugary-sweet snack. (This is a snack. Snacks stack with meal foods; you can eat one of each and get the benefits of both.)": "Сладкая закуска. (Это закуска. Закуски складываются с основными блюдами; вы можете съесть по одной из каждого и получить преимущества обеих.)"
"A small orange gem with many magical uses. Humans appreciate it for its ability to reduce anxiety.\n\nAssociated Primary Skill: Battle Chemistry": "Небольшой оранжевый драгоценный камень с множеством магических применений. Люди ценят его за способность снижать тревожность.\n\nСвязанный основной навык: Боевой химии"
"A handful of odorous twinkling flowers. They smell like body odor that's being poorly masked with citrus.": "Горсть благоухающих мерцающих цветов. Они пахнут потом, плохо замаскированным цитрусами."
"A well-made but simple lute, perfect for beginners.": "Хорошо сделанная, но простая лютня, идеально подходит для новичков."
"A rugged old bracelet-sized \"ring\" that can be fit to any sort of animal appendage necessary. It has runes representing a pig, a tree, and a bolt of lightning.": "Прочный старый браслет размером с кольцо, который можно надеть на любой животный придаток. На нём руны, изображающие свинью, дерево и молнию."
"These pages of parchment are covered in symbols that make no sense to you.": "Эти страницы пергамента покрыты символами, которые для вас не имеют смысла."
"A small bag of something tied with a cord. You can't tell what's in the bag because it's frozen completely solid, and it seems impervious to any form of heat.": "Маленькая сумка с чем-то, завязанная шнурком. Нельзя понять, что внутри, потому что она полностью заморожена и кажется невосприимчивой к любому виду тепла."
"A set of tools and step-by-step instructions that can let almost anyone improve their exotic claw weapon! The effect is temporary and wears off after a certain number of attacks.": "Набор инструментов и пошаговых инструкций, который позволит почти каждому улучшить своё экзотическое когтевое оружие! Эффект временный и исчезает после определённого количества атак."
"A claw tailored specifically for the Claw Barrage maneuver.": "Коготь, специально созданный для манёвра Когтевой Бараж."
"Lost in a cave and worn by generations of insane werewolves, these well-made gauntlets have become infused with lycanthropic power.": "Затерянные в пещере и носимые поколениями безумных оборотней, эти хорошо сделанные рукавицы пропитались ликантропической силой."
"A small clay-fired pot. It could theoretically hold water, but since glass bottles are objectively better, you refuse to do so on principle. Nice pot though.": "Небольшой горшок, обожжённый из глины. Теоретически он мог бы держать воду, но поскольку стеклянные бутылки объективно лучше, вы принципиально отказываетесь это делать. Зато горшок симпатичный."
"A peeled and de-veined shrimp, ready for cooking. It's also delicious raw.": "Очистленная и без жилок креветка, готовая к приготовлению. Также вкусна в сыром виде."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +3% Combat XP when clean and -3% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчеркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +3% боевого опыта, когда чисты, и -3% боевого опыта, когда грязны. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +14% Combat XP when clean and -14% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчёркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +14% боевого опыта, будучи чистыми, и -14% боевого опыта, будучи грязными. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +4% Combat XP when clean and -4% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчеркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +4% боевого опыта, когда чисты, и -4% боевого опыта, когда грязны. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +5% Combat XP when clean and -5% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчёркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +5% боевого опыта, будучи чистыми, и -5% боевого опыта, будучи грязными. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +6% Combat XP when clean and -6% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчёркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +6% боевого опыта, будучи чистыми, и -6% боевого опыта, будучи грязными. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +7% Combat XP when clean and -7% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, подчёркивающая красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +7% боевого опыта, будучи чистыми, и -7% боевого опыта, будучи грязными. Длительность: 4 часа.\\n\\nОдновременно может действовать только один эффект цветочной композиции."
