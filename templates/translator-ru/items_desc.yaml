"A public display of fresh flowers that instills a hearty vigor and a thirst for the outdoors.\n\nGrants 10% chance of chopping extra wood. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Публичная композиция из свежих цветов, которая придаёт бодрость и пробуждает жажду к природе.\\n\\nДарует 10% шанс получить дополнительную древесину при рубке. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков."
"A public display of fresh flowers that instills a hearty vigor and a thirst for the outdoors.\n\nGrants 17% chance of chopping extra wood. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Публичная композиция из свежих цветов, которая придаёт бодрость и пробуждает жажду к природе.\\n\\nДарует 17% шанс получить дополнительную древесину при рубке. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков."
