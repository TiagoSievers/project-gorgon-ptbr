# ── Описания навыков ──
"The art of combining esoteric things together to make potions and poisons.": "Искусство сочетать эзотерические вещества, чтобы создавать зелья и яды."
"This 'skill' represents your ability to ward off the adverse effects of alcohol. Note, however, that alcohol tolerance does not prevent you from becoming an alcoholic after prolonged alcohol abuse.": "Этот «навык» отражает вашу способность сопротивляться негативным эффектам алкоголя. Однако учтите, что толерантность к алкоголю не предотвращает развитие алкоголизма после длительного злоупотребления алкоголем."
"Knowledge of the physiology of creatures in general. This is an umbrella skill that encompasses a vast suite of sub-skills for particular types of creatures. This skill represents generalized knowledge that applies to all creatures in the world.": "Знание физиологии существ в целом. Это обобщённый навык, который охватывает обширный набор поднавыков для определённых типов существ. Этот навык представляет собой обобщённые знания, применимые ко всем существам в мире."
"Knowledge of the physiology of creatures made by mad science or dark chemistry.": "Знание физиологии существ, созданных безумной наукой или тёмной химией."
"Knowledge of the physiology of spiders, insects, and scorpions.": "Знание физиологии пауков, насекомых и скорпионов."
"Knowledge of the physiology of bears. Bugbears, which are half-goblin and half-bear, are also covered by this skill, as they take after their bear side more than the goblin side.": "Знание физиологии медведей. Багбиры, которые наполовину гоблины и наполовину медведи, тоже входят в сферу этого навыка, поскольку они больше похожи на свою медвежью сторону, чем на гоблинскую."
"Knowledge of the physiology of dogs, wolves, and werewolves. Gives bonuses to killing, skinning, and raising these creatures.": "Знание физиологии собак, волков и оборотней. Даёт бонусы к убийству, снятию шкур и выращиванию этих существ."
"Knowledge of the physiology of cats of all types.": "Знание физиологии кошек всех видов."
"Knowledge of the physiology of constructs such as golems.": "Знание физиологии конструктов, таких как големы."
"Knowledge of the physiology of crones and their ilk, including harpies, hags, and striga.": "Знание физиологии крон и им подобных, включая гарпий, ведьм и стриг."
"Knowledge of the physiology of demons.": "Знание физиологии демонов."
"Knowledge of the physiology of dinosaurs. This skill also covers birds, which are descended from dinosaurs, and dragons, which are descended from birds.": "Знание физиологии динозавров. Этот навык также охватывает птиц, которые произошли от динозавров, и драконов, которые произошли от птиц."
"Knowledge of the physiology of dwarves.": "Знание физиологии дварфов."
"Knowledge of the physiology of elementals.": "Знание физиологии элементалей."
"Knowledge of the physiology of elves.": "Знание физиологии эльфов."
"Knowledge of the physiology of faeries and fey creatures, including some animals that look mundane but aren't, such as the fey panther.": "Знание физиологии фейри и фейских существ, включая некоторых животных, которые выглядят обычными, но таковыми не являются, например фейскую пантеру."
"Knowledge of the physiology of fish. Also snails. They're very similar. Really.": "Знание физиологии рыб. А также улиток. Они очень похожи. Правда."
"Knowledge of the physiology of fungus people, slime monsters, overgrown bacteria, and ooze beasts.": "Знание физиологии грибных людей, слизневых монстров, разросшихся бактерий и слизистых зверей."
"Knowledge of the physiology of giant-kin such as yetis and ogres.": "Знание физиологии великанов, таких как йети и огры."
"Knowledge of the physiology of goblins.": "Знание физиологии гоблинов."
"Knowledge of the physiology of humans.": "Знание физиологии человека."
"Knowledge of the physiology of incorporeal creatures, such as ghosts and shadow illusions.": "Знание физиологии бестелесных существ, таких как призраки и теневые иллюзии."
"Knowledge of the physiology of orcs.": "Знание физиологии орков."
"Knowledge of the physiology of monstrous plants.": "Знание физиологии чудовищных растений."
"Knowledge of the physiology of rakshasa.": "Знание физиологии ракшаса."
"Knowledge of the physiology of snakes, snake-people, and generally snakey things.": "Знание физиологии змей, змеелюдей и вообще всего змеиного."
"Knowledge of the physiology of rodents. Also covers the physiology of lagomorphs such as rabbits, despite their anatomical differences.": "Знание физиологии грызунов. Также охватывает физиологию зайцеобразных, таких как кролики, несмотря на их анатомические различия."
"Knowledge of the physiology of cud-chewing herbivores such as cows, sheep, deer, and camels.": "Знание физиологии травоядных жвачных животных, таких как коровы, овцы, олени и верблюды."
"Knowledge of the physiology of undead, such as skeletons, zombies, and liches. This skill doesn't cover undead without bodies, such as ghosts and wraiths.": "Знание физиологии нежити, такой как скелеты, зомби и личи. Этот навык не охватывает нежить без тел, такую как призраки и призрачные тени."
"Knowledge of the physiology of large herbivores that do NOT chew cud, such as pigs, rhinos, and horses. Also covers hippos, which are not ungulates, but which are close enough.": "Знание физиологии крупных травоядных, которые НЕ пережёвывают жвачку, таких как свиньи, носороги и лошади. Также включает бегемотов, которые не являются копытными, но достаточно близки к ним."
"Knowledge of the techniques for creating Helm Augments and Shoes Augments. (Augments for other types of equipment are covered by other skills.)": "Знание техник создания усилений для шлемов и обуви. (Усиления для других типов снаряжения изучаются другими навыками.)"
"The exotic art of catching fish with a pole and bait. While primarily an orcish custom, it is catching on among humans as well.": "Экзотическое искусство ловли рыбы с помощью удилища и наживки. Хотя это в первую очередь орочий обычай, среди людей оно тоже становится популярным."
"The art of taming animals and teaching them to fight alongside you.": "Искусство приручать животных и обучать их сражаться рядом с вами."
"The science of breeding pets.": "Наука разведения питомцев."
"Expertise with using bows to hunt and kill.": "Мастерство в использовании луков для охоты и убийства."
"Knowledge of the techniques for creating Chest-Armor Augments and Leg-Armor Augments. (Augments for other types of equipment are covered by other skills.)": "Знание техник создания усилений для нагрудной брони и поножей. (Усиления для других типов снаряжения охватываются другими навыками.)"
"Skill in maintaining armor, including the use of repair kits to remove dents and holes.": "Навык поддержания брони в исправном состоянии, включая использование ремкомплектов для устранения вмятин и пробоин."
"The art of making metal armor.": "Искусство изготовления металлических доспехов."
"Understanding of the rich history of art in Alharth. This skill can help you identify valuable artwork, but more importantly, it helps you to be a well-rounded individual.": "Понимание богатой истории искусства в Алхарте. Этот навык может помочь вам распознавать ценные произведения искусства, но, что важнее, он помогает вам стать разносторонней личностью."
"Skill in the visual arts, including painting, sculpting, and mosaic creation.": "Навык в изобразительном искусстве, включая живопись, скульптуру и создание мозаик."
"Skill in determining things about somebody based on their visible appearance. A high Assessment skill lets you see more information about other players when you examine them.": "Навык определения сведений о ком-то по его внешнему виду. Высокий навык Оценки позволяет видеть больше информации о других игроках, когда вы их осматриваете."
"Skill in creating magical augments. This is an umbrella skill representing your overall knowledge of augmentation.": "Навык создания магических усилений. Это обобщённый навык, отражающий ваши общие знания об аугментации."
"The ability to learn new skills on your own, just from reading a book.": "Способность самостоятельно осваивать новые навыки, просто читая книгу."
"Axing people.": "Рубить людей."
"Bardin'": "Бардин'"
"Using alchemical concoctions in the heat of battle. Not for the faint of heart, or the particularly sane, this combat style specializes in area-effects of all types. Advanced practitioners can also ingest their formulae directly to take on new combat personalities. Masters can even create homonculi to serve them in battle.": "Использование алхимических снадобий в пылу сражения. Этот боевой стиль не для слабонервных и уж точно не для особо здравомыслящих; он специализируется на эффектах по области всех типов. Опытные практики также могут напрямую принимать свои формулы, чтобы обрести новые боевые личности. Мастера могут даже создавать гомункулов, чтобы те служили им в бою."
"Skill in speaking while in the form of an animal or monstrous beast. (You earn XP in Beast Speech by speaking aloud. You can't earn XP more than once per minute.)": "Навык речи, когда вы находитесь в форме животного или чудовищного зверя. (Вы получаете XP в Языке зверей, произнося слова вслух. Вы не можете получать XP чаще одного раза в минуту.)"
"Making and enhancing metal equipment. Blacksmiths don't create armor directly, but they can buttress metal armor's effectiveness. They also create metal parts for many other skills.": "Изготовление и улучшение металлического снаряжения. Кузнецы не создают броню напрямую, но могут усиливать эффективность металлической брони. Они также создают металлические детали для многих других навыков."
"A specialization of Blacksmithing. Although bladesmiths can craft excellent weapons, they are often more preoccupied with maintaining blades at peak performance.": "Специализация кузнечного дела. Хотя мастера клинков могут создавать превосходное оружие, они часто больше заняты поддержанием клинков в наилучшей форме."
"The craft of making bows and crossbows.": "Искусство изготовления луков и арбалетов."
"Skill in creating alcoholic beverages of all sorts.": "Навык создания алкогольных напитков всех видов."
"1": "1"
"Skill in creating belt buckles with symbolic meanings. Belt buckle artwork is a deeply personal expression which can give hammer warriors a morale boost in battle. However, because they are so personal, crafted belt buckles are only useful to the person who crafts them.": "Навык создания пряжек для ремней с символическим значением. Художественное оформление пряжек — это глубоко личное выражение, которое может придать воинам с молотом боевой дух в бою. Однако, поскольку они очень личные, изготовленные пряжки полезны только тому, кто их создал."
"Skill in the act of removing meat and useful body organs from a corpse. You need to be carrying a Butcher Knife in order to butcher a corpse. Corpses of sentient creatures, such as goblins and humans, can't be butchered.": "Навык снятия мяса и полезных внутренних органов с трупа. Чтобы разделать труп, вам нужно иметь при себе нож мясника. Трупы разумных существ, таких как гоблины и люди, нельзя разделывать."
"The art of writing things. Handy for... writing things. It's also a valuable art for swordsmen and other warriors, who can infuse their art with potent additional effects.": "Искусство писать вещи. Полезно для... написания вещей. Это также ценное искусство для мечников и других воинов, которые могут наполнять своё мастерство мощными дополнительными эффектами."
"Covers all the skills of the chandler, from rendering various materials into candle wax, to creating the candles themselves, including candles with exotic properties.": "Охватывает все навыки свечника: от переработки различных материалов в свечной воск до создания самих свечей, включая свечи с необычными свойствами."
"Preparing and treating lumber, and making things out of wood.": "Подготовка и обработка древесины, а также изготовление вещей из дерева."
"Skill in accurately mapping your surroundings. You earn Cartography XP by clearing the 'fog' from game maps, which happens automatically as you walk around.": "Навык точного составления карт окружающей местности. Вы получаете XP Картографии, убирая «туман» с карт мира, что происходит автоматически, когда вы ходите по миру."
"This is a prototype skill that will never appear in the live game. (Charged Pig abilities can be found under the Pig skill. You can place both Pig and Charged Pig abilities on your Pig ability bar.)": "Это прототип навыка, который никогда не появится в основной игре. (Способности Заряженного Поросёнка можно найти в навыке Свинья. Вы можете разместить на панели способностей Свиньи как способности Свиньи, так и Заряженного Поросёнка.)"
"Making cheese, butter, and other dairy products. But mostly: cheese.": "Изготовление сыра, масла и других молочных продуктов. Но в основном: сыра."
"Represents your willingness to tackle the small, mundane tasks in your community, and your understanding of why that's important. This skill is especially valued by humans.": "Олицетворяет вашу готовность браться за мелкие, обыденные дела в вашем сообществе и ваше понимание того, почему это важно. Этот навык особенно ценится людьми."
"Covers many types of engineering used in city maintenance and construction. It also covers park management.": "Охватывает многие виды инженерии, используемые в обслуживании и строительстве города. Также включает управление парками."
"The ability to feel empathy, even for creatures not at all like yourself.": "Способность испытывать эмпатию даже к существам, совсем на вас не похожим."
"Skill in preparing food for consumption.": "Навык приготовления пищи для употребления в пищу."
"Ability to commune telepathically with nearby dead bodies. Higher skill grants higher chances of persuading recalcitrant spirits, as well as higher comprehension rates when learning from the dead.": "Способность телепатически общаться с находящимися поблизости мертвыми телами. Более высокий уровень навыка дает больше шансов убедить упрямых духов, а также повышает скорость понимания при обучении у мертвых."
"The art of living and fighting as a cow.": "Искусство жить и сражаться как корова."
"Knowledge of crossbows, including how to fire and reload them, as well as how to maintain them in peak condition.": "Знание арбалетов, включая то, как стрелять из них и перезаряжать их, а также как поддерживать их в отличном состоянии."
"The art of living and fighting as a deer.": "Искусство жить и сражаться как олень."
"Druidin'": "Друидство"
"Skill in producing dye. These dyes can be used to color armor.\n\nThis skill covers only the creation of the dye; Textile Creation, Tanning, or Blacksmithing is used to apply the dye, depending on what the armor is made of.": "Навык изготовления красителей. Эти красители можно использовать для окраски доспехов.\\n\\nЭтот навык охватывает только создание красителя; для его нанесения используется Текстильное ремесло, Кожевничество или Кузнечное дело — в зависимости от того, из чего сделаны доспехи."
"The art of dying.": "Искусство умирать."
"The ability to endure heavy loads and uncomfortable situations without getting tired. Your Endurance increases the speed of your armor regeneration between fights, among other things.\n\n(The most common way to raise Endurance is simply to take armor damage in combat.)": "Способность переносить тяжёлые нагрузки и некомфортные ситуации, не уставая. Ваша Выносливость увеличивает скорость восстановления вашей брони между боями, а также влияет на другие вещи.\\n\\n(Самый распространённый способ повысить Выносливость — просто получать урон по броне в бою.)"
"A sub-skill of Mentalism that focuses on psychic links to the fae realms.": "Поднавык ментализма, сосредоточенный на псионических связях с мирами фей."
"Using Fire to destroy your enemies. This is a very potent offensive skill, including long-range and area-effect attacks, and even some Cold attacks for versatility. However, there are drawbacks: Fire Magic is extremely Power-intensive; all creatures generate extra Rage when they are burned; and many creatures have some resistance to fire.": "Использование огня для уничтожения ваших врагов. Это очень мощное наступательное умение, включающее атаки дальнего боя и по области, а также даже некоторые атаки Холодом для универсальности. Однако есть и недостатки: Огненная магия чрезвычайно затратна по Силе; все существа накапливают дополнительную Ярость, когда их поджигают; и многие существа обладают некоторой сопротивляемостью огню."
"The ability to use first aid kits to heal yourself or others.": "Способность использовать аптечки первой помощи, чтобы лечить себя или других."
"The art of collecting fish.": "Искусство ловить рыбу."
"The craft of arrow-making. Most fletching recipes require elements obtained from Carpentry, so it's often handy to know both skills well. At higher level, fletchers also need various Alchemy components.": "Искусство изготовления стрел. Большинство рецептов по изготовлению стрел требуют материалов, получаемых с помощью Столярного дела, так что часто полезно хорошо знать оба навыка. На более высоких уровнях стрелочникам также нужны различные компоненты Алхимии."
"The art of arranging flowers so that they evoke strong emotions.": "Искусство составления цветов так, чтобы они вызывали сильные эмоции."
"The art of picking things up. Except mushrooms, those are special for some reason. Experts at Foraging are also experts at tracking down stationary items and locations (such as many Quest Objectives).": "Искусство подбирать вещи. Кроме грибов — они по какой-то причине особенные. Мастера Сбора также умеют находить неподвижные предметы и места (например, многие цели заданий)."
"The ability to create elaborate contraptions that automate complex tasks.": "Способность создавать сложные механизмы, которые автоматизируют трудоёмкие задачи."
"Skill in playing games, especially gambling games.": "Навык игры в игры, особенно в азартные игры."
"Growing things in a garden: herbs, food, and flowers.": "Выращивание растений в саду: трав, еды и цветов."
"A careful exploration of gender roles and sexuality, focusing on Human, Elven, and Rakshasa cultures. This knowledge is not directly applicable to combat or crafting, but it helps you to be a well-rounded individual.": "Тщательное изучение гендерных ролей и сексуальности с упором на культуры людей, эльфов и ракшасов. Эти знания не применимы напрямую к бою или ремеслу, но помогают стать разносторонней личностью."
"Knowledge of the genetics of creatures in general. This is an umbrella skill that encompasses a vast suite of sub-skills for particular types of creatures. This skill represents generalized genetics knowledge.": "Знание генетики существ в целом. Это обобщённый навык, который охватывает обширный набор поднавыков для определённых типов существ. Этот навык представляет собой обобщённые знания по генетике."
"Knowledge of the genetics of spiders, insects, and scorpions.": "Знание генетики пауков, насекомых и скорпионов."
"Knowledge of the genetics of cats of all types.": "Знания о генетике кошек всех видов."
"Knowledge of the genetics of cud-chewing herbivores such as cows, sheep, deer, and camels.": "Знание генетики травоядных жвачных животных, таких как коровы, овцы, олени и верблюды."
"Knowledge of the genetics of large herbivores that do NOT chew cud, such as pigs, rhinos, and horses. Also covers hippos, which are not ungulates, but which are close enough.": "Знание генетики крупных травоядных, которые НЕ пережёвывают жвачку, таких как свиньи, носороги и лошади. Также охватывает бегемотов, которые не являются копытными, но достаточно близки к ним."
"Digging crystals out of the ground, and knowing what they do.": "Добыча кристаллов из земли и знание того, что они делают."
"Skill in living and fighting as a bat.": "Навык жизни и боя в облике летучей мыши."
"Skill in creating glass, especially magical glass.": "Навык создания стекла, особенно магического стекла."
"Fluency in the language of goblins.": "Свободное владение языком гоблинов."
"Skill in golf-related games. Covers any game involving the propulsion of an object toward a designated goal on the landscape.": "Навык в играх, связанных с гольфом. Охватывает любую игру, в которой нужно направлять объект к обозначенной цели на местности."
"The art of appreciating what you eat. Every level of the Gourmand skill increases the duration of meal bonuses by 30 seconds. The main way to earn Gourmand XP is by eating foods you've never eaten before.": "Искусство ценить то, что вы едите. Каждый уровень навыка Гурман увеличивает длительность бонусов от еды на 30 секунд. Основной способ получать XP Гурман — есть блюда, которые вы ещё ни разу не пробовали."
"Mastery of the use of hammers and clubs in combat. Power consumption is higher than average, but so is damage. Hammers excel at rapidly murdering enemies, no more and no less.": "Мастерство использования молотов и дубин в бою. Расход Силы выше среднего, но и урон тоже. Молоты отлично подходят для быстрого уничтожения врагов, и не более того."
"Skill in surviving as a Hardcore player. You earn XP in this skill by killing dangerous creatures while Hardcore. (The creatures' level must be higher than your Hardcore Living skill.)\n\nNote: if you stop being Hardcore, you will lose all levels in this skill.": "Навык выживания в режиме Hardcore. Вы получаете XP в этом навыке, убивая опасных существ в режиме Hardcore. (Уровень существ должен быть выше, чем ваш навык Hardcore Living.)\\n\\nПримечание: если вы перестанете быть в режиме Hardcore, вы потеряете все уровни в этом навыке."
"An approach to health that involves taking into account factors beyond the obvious. Some critics claim that any benefits are due to the placebo effect, and they may be right. But if it works, who cares?": "Подход к здоровью, который учитывает факторы, выходящие за рамки очевидного. Некоторые критики утверждают, что все преимущества объясняются эффектом плацебо, и, возможно, они правы. Но если это работает, кого это волнует?"
"The study of weapons and armor, with a focus on the benefits and weaknesses of different kinds of equipment.\n\nAs the skill increases, Staff users will find that their combat abilities also restore Armor.": "Изучение оружия и брони с акцентом на преимущества и слабые стороны различных видов снаряжения.\\n\\nПо мере повышения навыка пользователи посохов обнаружат, что их боевые способности также восстанавливают Armor."
"Skill in howling as a werewolf.": "Навык воя в облике оборотня."
"A sub-skill of Ice Magic dedicated to the creation of delicate ice items. These items tend to melt in hot environments.": "Поднавык Ледяной Магии, посвящённый созданию изящных ледяных предметов. Эти предметы обычно тают в жаркой среде."
"A specialization of Fire Magic that focuses entirely upon lowering temperature instead of raising it. It has protective and controlling abilities as well as offensive abilities.": "Специализация Огненной магии, которая полностью сосредоточена на понижении температуры вместо её повышения. Она обладает защитными и контрольными способностями, а также наступательными способностями."
"Competence in completing tasks to specification. Highly industrious workers can juggle more tasks at once, and earn slightly higher rewards for their hard work.": "Умение выполнять задачи в соответствии со спецификацией. Очень трудолюбивые работники могут одновременно справляться с большим количеством задач и получают немного более высокие награды за свой усердный труд."
"Practiced resistance to the deadly mushroom poison known as Iocaine. (Each point of this skill reduces the damage from Iocaine-based poisons by 1%.)": "Практикуемое сопротивление смертоносному грибному яду, известному как айокаин. (Каждый пункт этого навыка уменьшает урон от ядов на основе айокаина на 1%.)"
"Knowledge of the techniques for creating Necklace Augments and Ring Augments. (Augments for other types of equipment are covered by other skills.)": "Знание техник создания усилений для ожерелий и колец. (Усиления для других типов экипировки изучаются другими навыками.)"
"The ability to smith and shape raw materials into aesthetically-pleasing rings and necklaces.": "Умение ковать и придавать форму сырью, превращая его в эстетически приятные кольца и ожерелья."
"Using daggers and thrown knives in combat. Knife combat is extremely damaging, relying on traumatic injuries, poison, and subterfuge.": "Использование кинжалов и метательных ножей в бою. Бой ножами наносит чрезвычайно высокий урон, полагаясь на травматические ранения, яд и хитрость."
"Turning leathers into armor and goods.": "Превращение кожи в броню и товары."
"Mastery of ancient knowledge.": "Мастерство древних знаний."
"Techniques to roast creatures alive with magic. Often considered horrific and immoral, but the results are inarguably delicious.\n\nFor best results, start with weak creatures and work your way up as your skill improves. Don't use huge single blasts -- hit the target with as many different Fire damage instances as possible to increase cooking likelihood. And most importantly: their last Hit Point must be lost to Fire damage (either direct or indirect).": "Техники, позволяющие зажаривать существ заживо с помощью магии. Часто считаются чудовищными и безнравственными, но результаты, бесспорно, восхитительны.\\n\\nДля лучших результатов начинайте со слабых существ и постепенно переходите к более сильным по мере роста вашего навыка. Не используйте огромные одиночные вспышки — наносите цели как можно больше отдельных случаев урона Огнём, чтобы повысить вероятность готовки. И самое главное: их последний Hit Point должен быть потерян от урона Огнём (прямого или косвенного)."
"Skill in centering yourself and creating inner focus. This is especially helpful when using Unarmed combat skill.\n\nTo meditate, you must be near a Meditation Pillar. Each meditation also requires a simple focus item, such as a fruit or flower.": "Навык сосредоточения и обретения внутренней концентрации. Это особенно полезно при использовании навыка Unarmed combat.\\n\\nЧтобы медитировать, вы должны находиться рядом с Pillar of Meditation. Каждая медитация также требует простой предмет для фокуса, например фрукт или цветок."
"The power of mind over matter: psychic powers! This combat skill focuses on recovery and restoration, but it also has multiple damaging abilities.": "Сила разума над материей: псионические способности! Этот боевой навык сосредоточен на восстановлении и исцелении, но у него также есть несколько атакующих умений."
"Skill in properly operating a grainmill.": "Навык правильной работы с зерновой мельницей."
"Digging metals and ores out of the ground.": "Добыча металлов и руд из земли."
"The specialized skill of growing mushrooms in grow-boxes.": "Специализированный навык выращивания грибов в гроу-боксах."
"Mastery of fungus in all its forms.": "Мастерство грибов во всех их формах."
"Knowledge of the secret language of ancient fungus creatures.": "Знание тайного языка древних грибных существ."
"The ability to study nature and find inner peace and contentment. Even the most hardened warriors need the ability to appreciate nature.": "Способность изучать природу и находить внутренний покой и удовлетворение. Даже самым закалённым воинам нужно уметь ценить природу."
"Necromancy is control over the undead, along with other powers that trifle with mortality. To use necromantic abilities, you must be wielding or wearing a necromancy gem. You can often find these on weapons, and less often on pieces of armor. (If you are in a beast form, necromancy gems in weapons won't work, but ones in armor will.) You must NOT be wearing a symbol of Arisetsu, as it will negate your powers.": "Некромантия — это власть над нежитью, а также другие силы, играющие со смертью. Чтобы использовать некромантские способности, вы должны держать или носить некромантский камень. Их часто можно найти на оружии и реже — на частях брони. (Если вы находитесь в звериной форме, некромантские камни в оружии не будут работать, но камни в броне будут.) Вы НЕ должны носить символ Арисэцу, так как он нейтрализует ваши силы."
"Skill in writing non-fiction books, including textbooks.": "Навык написания нехудожественных книг, включая учебники."
"A measure of your renown. You earn Notoriety the first time you defeat certain enemies (typically any monster with a proper name), and for completing particularly difficult quests.": "Показатель вашей известности. Вы получаете Notoriety в первый раз, когда побеждаете определённых врагов (обычно любого монстра с собственным именем), а также за выполнение особенно сложных заданий."
"The ability to speak in public in a way that moves your audience.": "Способность выступать перед публикой так, чтобы тронуть и увлечь слушателей."
"Fluency in Orcish, the ancient language of orcs -- as well as many other races and cultures.": "Свободное владение орочьим, древним языком орков — а также многих других рас и культур."
"Studying the past through old fossilized bones. Infamous for its primay research method: necromantic reanimation. The higher your Paleontology skill, the more bones you are likely to find when excavating a site. Higher skill also gives chances to find fossils in the loot of some monsters.": "Изучение прошлого по древним окаменевшим костям. Известна своим основным методом исследования: некромантическим воскрешением. Чем выше ваш навык Палеонтологии, тем больше костей вы, вероятно, найдёте при раскопках. Более высокий навык также даёт шанс находить окаменелости в добыче некоторых монстров."
"Skill in figuring out how someone or something died. Higher skill allows more details to be determined and more difficult organisms to be examined.": "Навык определения того, как кто-то или что-то погибло. Более высокий навык позволяет выяснить больше деталей и исследовать более сложные организмы."
"This umbrella skill represents your ability to entertain with performances of music, acrobatics, dance, art, recitals, and so on.": "Этот универсальный навык отражает вашу способность развлекать публику музыкальными выступлениями, акробатикой, танцами, искусством, декламацией и так далее."
"Skill in dancing to music in a way that entertains or moves others.\n\nOnce you reach level 10 in this skill you'll have all the basics. At that point you can learn hidden dance moves, which will increase your level cap.": "Навык танца под музыку так, чтобы развлекать или трогать других.\\n\\nКак только вы достигнете 10-го уровня в этом навыке, вы освоите все основы. После этого вы сможете изучать скрытые танцевальные движения, которые увеличат максимальный уровень навыка."
"Skill in performing with percussion instruments such as drums, bells, and dulcimers.": "Навык игры на ударных инструментах, таких как барабаны, колокольчики и цимбалы."
"Skill in performing with stringed instruments such as harps, lutes, and guitars.": "Навык игры на струнных инструментах, таких как арфы, лютни и гитары."
"Skill in performing with brass and woodwind instruments such as trumpets, ocarinas, and flutes.": "Навык игры на медных и деревянных духовых инструментах, таких как трубы, окарины и флейты."
"An understanding of how sentient creatures think and feel, based on careful study of the shape of their skulls. This umbrella skill represents your overall Phrenological prowess. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как мыслят и чувствуют разумные существа, основанное на тщательном изучении формы их черепов. Этот обобщённый навык представляет собой ваше общее мастерство френологии. (Навыки френологии дают шанс критического удара для всех атак Psychology и Mentalism против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how sentient aberrations think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как мыслят и чувствуют разумные аномалии, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how crones think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как думают и чувствуют крон-кин, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how demons think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как думают и чувствуют демоны, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
