"An understanding of how goblins think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как думают и чувствуют гоблины, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how humans think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как люди думают и чувствуют, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how orcs think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как орки думают и чувствуют, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"An understanding of how rakshasa think and feel, based on careful study of the shape of their skulls. (Phrenology skills provide critical-hit chances to all Psychology and Mentalism attacks against the corresponding type of creature. Phrenology also has more esoteric uses.)": "Понимание того, как думают и чувствуют ракшасы, основанное на тщательном изучении формы их черепов. (Навыки френологии дают шанс критического удара для всех атак Психологии и Ментализма против соответствующего типа существ. У френологии также есть более эзотерические применения.)"
"The art of living and fighting as a pig.": "Искусство жить и сражаться как свинья."
"Skill in finding the meaning of poems, especially difficult and tedious ones.": "Навык находить смысл в стихах, особенно в трудных и утомительных."
"Officially the 'Priest of Arisetsu' skill, this represents your attunement with Arisetsu, the goddess of Warmth and Hope. When fighting alongside allies, you can bring hope to even the most impossible battles.\n\nYou must be wearing a holy symbol -- and NOT wearing a Necromancy Gem -- to use Priest abilities. Holy symbols are most often found as jewelry, but can also be found on armor and weapons.": "Официально это навык «Жрец Арисэцу», и он отражает вашу сонастроенность с Арисэцу, богиней Тепла и Надежды. Сражаясь бок о бок с союзниками, вы можете вселять надежду даже в самые безнадёжные битвы.\\n\\nЧтобы использовать способности Жреца, вы должны носить священный символ — и НЕ должны носить Камень Некромантии. Священные символы чаще всего встречаются в виде украшений, но их также можно найти на броне и оружии."
"(unused)": "(не используется)"
"Understanding the mind of sentient creatures. Also, using that knowledge in combat and other stressful situations.": "Понимание разума разумных существ. А также использование этих знаний в бою и других стрессовых ситуациях."
"The art of living and fighting as a rabbit or hare. Note: rabbits are not known for their ferocity, so sentient rabbits should carefully consider their choice of secondary skill.": "Искусство жить и сражаться как кролик или заяц. Примечание: кролики не славятся своей свирепостью, поэтому разумным кроликам следует тщательно обдумать выбор вторичного навыка."
"Skill in things that only fairies can do.": "Навык в том, что под силу только феям."
"Skill in performing uniquely orcish activities, as well as skill in maneuvering orcish society.": "Навык выполнения уникально орочьих действий, а также навык ориентирования в орочьем обществе."
"Skill in riding in races.": "Навык участия в скачках."
"Skill in managing a shop, boutique, or restaurant.": "Навык управления магазином, бутиком или рестораном."
"Skill in riding terrestrial mounts. Higher skill allows you to keep your mount calm even in terrifying situations. Riding skill is also used when trying to tame wild horses.\n\nEarn XP by riding in many different and dangerous locations.": "Навык верховой езды на наземных маунтах. Более высокий навык позволяет сохранять спокойствие вашего маунта даже в ужасающих ситуациях. Навык верховой езды также используется при попытке приручить диких лошадей.\\n\\nПолучайте XP, катаясь в самых разных и опасных местах."
"Creating tack for horses, including saddles, saddlebags, and reins.": "Изготовление конской сбруи, включая седла, седельные сумки и поводья."
"Expertise in opening safes, vaults, and other physical barriers.": "Мастерство в открытии сейфов, хранилищ и других физических преград."
"Knowledge and skill in the magical art of enhancing items with the spirit of deceased animals.": "Знание и мастерство в магическом искусстве усиления предметов духом умерших животных."
"Expertise in the use of a shield, both as a weapon and as a defensive tool.": "Мастерство в использовании щита, как в качестве оружия, так и в качестве защитного средства."
"Using magical inks and arcane rituals to create areas of power.": "Использование магических чернил и тайных ритуалов для создания областей силы."
"Skill in the act of removing fur or skin from an animal. You need to be carrying a Skinning Knife in order to skin a corpse. Corpses of sentient creatures, such as goblins and humans, can't be skinned.": "Навык снятия шкуры или меха с животного. Чтобы снять шкуру с трупа, вам нужно иметь при себе нож для свежевания. Трупы разумных существ, таких как гоблины и люди, нельзя свежевать."
"The art of living and fighting as a spider.": "Искусство жить и сражаться как паук."
"Mastery of the techniques of the spirit fox: an awakened fox with supernatural powers.": "Владение техниками духовной лисы: пробуждённая лиса с сверхъестественными силами."
"Mastery of the staff as a martial weapon. Staff fighting has a mix of both offensive and defensive abilities.": "Мастерство владения посохом как боевым оружием. Бой посохом сочетает в себе как наступательные, так и защитные способности."
"The use of stone in construction and decoration.": "Использование камня в строительстве и декоре."
"Analyzing the land to locate valuable resources or important locations. Surveying has many uses, but is most commonly used to make resource maps for Geology and Mining.": "Анализ местности для обнаружения ценных ресурсов или важных локаций. Съёмка местности имеет множество применений, но чаще всего используется для создания карт ресурсов для Геологии и Горного дела."
"The ability of self-aware animals to enhance their natural instincts into finely-honed combat techniques. Only animals can use this skill.": "Способность самосознающих животных усиливать свои природные инстинкты, превращая их в отточенные боевые техники. Только животные могут использовать это умение."
"A sub-skill of Cooking used in the creation of delicious fish meals.": "Поднавык кулинарии, используемый для создания вкусных рыбных блюд."
"Expertise with swords, rapiers, and the like. Swords are very damaging, and can reduce an opponent's Rage.": "Мастерство владения мечами, рапирами и тому подобным оружием. Мечи наносят большой урон и могут снижать Ярость противника."
"Tailoring has two aspects: first, you use it to turn textiles into clothing. Second, you can use tailoring to make clothing and leather armor more comfortable, more useful, or more stylish.": "Портняжное дело имеет два аспекта: во-первых, с его помощью вы превращаете ткани в одежду. Во-вторых, вы можете использовать портняжное дело, чтобы сделать одежду и кожаную броню более удобными, более полезными или более стильными."
"The craft of turning disgusting animal skins, furs, and hides into leather, fleece, and other material ready to be used in clothing and armor.": "Искусство превращать отвратительные звериные шкуры, меха и кожи в кожу, шерсть и другие материалы, готовые для использования в одежде и броне."
"The magical art of suddenly being somewhere else.": "Магическое искусство внезапно оказываться в другом месте."
"2": "2"
"The craft of turning raw ingredients into cloth. Textile creation includes cotton, wool, silk, and many other fiber types. Cloth made from animal hides (e.g. leather) comes from the Tanning skill instead.": "Искусство превращать сырые материалы в ткань. Создание тканей включает хлопок, шерсть, шёлк и многие другие виды волокон. Ткань, сделанная из шкур животных (например, кожа), вместо этого создаётся с помощью навыка Дубление."
"Skill in the creation of advanced tools and unusual equipment. Far more than just creating hand tools, an expert Toolcrafter is a master of repurposing found materials, and can create belts, armors, and even weapons from unusual materials. This equipment is usually designed to meet very specialized needs.": "Навык создания продвинутых инструментов и необычного снаряжения. Гораздо больше, чем просто изготовление ручных инструментов: мастер инструментального ремесла умеет искусно использовать найденные материалы повторно и может создавать пояса, доспехи и даже оружие из необычных материалов. Такое снаряжение обычно создаётся для очень специфических нужд."
"The science of permanently altering how a magical item works. Also covers manipulation of the basic materials of magic, such as phlogiston.": "Наука о том, как навсегда изменять работу магического предмета. Также охватывает манипуляции с базовыми материалами магии, такими как флогистон."
"Experience creating maps from old clues. The maps can lead to treasure... or tragedy.": "Опыт создания карт по старым подсказкам. Эти карты могут привести к сокровищам... или к трагедии."
"Mastery of the martial arts. Not especially damaging, but with great controlling and stunning abilities. Generally requires one or both hands to be empty, although you can use kicks even with other items wielded.": "Мастерство боевых искусств. Не особенно разрушительно, но обладает отличными способностями к контролю и оглушению. Обычно требует, чтобы одна или обе руки были свободны, хотя вы можете использовать удары ногами даже при наличии другого оружия в руках."
"Skill in creating urban art, such as graffiti and street art.": "Навык создания городского искусства, такого как граффити и стрит-арт."
"Vampin'": "Вампиризм"
"Knowledge of many words in the common language.": "Знание множества слов на общем языке."
"Skill in using the secret powers of the Wardens.": "Навык использования тайных сил Стражей."
"Knowledge of the techniques for creating Weapon Augments, Off-Hand Augments, and Glove Augments. (Augments for other types of equipment are covered by other skills.)": "Знание техник создания усилений для оружия, усилений для левой руки и усилений для перчаток. (Усиления для других типов снаряжения изучаются другими навыками.)"
"A rigorous magical discipline focusing on manipulating and engaging with the environment around you. Elves are the undisputed experts of the field, which causes some races to view it negatively. It is also sometimes mistaken for (illegal) Chaos Magic due to its chaotic and dangerous nature.": "Строгая магическая дисциплина, сосредоточенная на управлении и взаимодействии с окружающей вас средой. Эльфы — бесспорные эксперты в этой области, из-за чего некоторые расы относятся к ней негативно. Иногда её также ошибочно принимают за (незаконную) магию Хаоса из-за её хаотичной и опасной природы."
"Skill in fighting as a wolf beast. Also indicates your ability to control and suppress the beast mode.": "Навык боя в облике волка-зверя. Также показывает вашу способность контролировать и подавлять звериный режим."
"Represents your metabolic efficiency when consuming the corpses of fallen foes. When you eat a corpse, you receive a buff that recovers Health, Armor, and Power every few seconds. The duration of the buff is based on your Beast Metabolism skill. The potency of the buff is based on the corpse you've eaten (higher-level monsters are better!), and potency can be further augmented through buffs and treasure.": "Представляет вашу метаболическую эффективность при поедании трупов поверженных врагов. Когда вы едите труп, вы получаете эффект, который восстанавливает Health, Armor и Power каждые несколько секунд. Длительность эффекта зависит от вашего навыка Звериный метаболизм. Сила эффекта зависит от съеденного трупа (чем выше уровень монстра, тем лучше!), а силу можно дополнительно увеличить с помощью эффектов и сокровищ."
"The art of turning wood into little artistic thingies.": "Искусство превращать дерево в маленькие художественные штучки."

