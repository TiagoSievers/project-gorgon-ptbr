"<h1>The Wasted Wishes</h1>\n\n... the creature appeared before her and Leeka quickly turned away. With her eyes squeezed shut, she uttered the incantation. When she finished, she gathered her courage. \"Now, I demand you give me my wishes!\"\n\n\"Wish granted,\" said a raspy voice. \"That's the first wish used up already!\"\n\nLeeka grimaced. No sense arguing with a gorgon; they would just manipulate you further. \"I wish to have in my possession the blade Heartseeker. But,\" she added hastily, \"It should not be impaled in my body! I want it safely in its scabbard, at my side.\"\n\nShe couldn't see the gorgon but could hear its mirth. \"Granted,\" she said. A weight suddenly appeared at her side, and she carefully felt the scabbard. It was her mother's blade, back in her hands at last!\n\nLeeka steadied herself for the last wish. \"And now I wish for the power to wield this sword in all its glory!\"\n\n\"You're a foolish little thing,\" said the voice. \"Granted! You have always had the power to wield the blade. You need simply complete the Blade Trials to turn it on.\"\n\nLeeka groaned. \"Oh, that's bullshit. Come on!\" Silence.\n\n\"Well,\" said Leeka, defeated, \"what are the Blade Trials?\" Silence. Was the gorgon gone? After a few minutes of waiting, she cautiously opened her eyes... and closed them again just in time, for the gorgon was waiting right before her!\n\n\"Aw, almost got you,\" said the voice. \"Don't worry, Leeka. I'll get you next time.\" And with that, the room filled with smoke, and when Leeka's coughing abated, the gorgon was gone.": "<h1>Напрасные желания</h1>\n\n... существо появилось перед ней, и Лика быстро отвернулась. С закрытыми глазами она произнесла заклинание. Когда она закончила, она собрала в себе мужество. \"Теперь я требую, чтобы ты отдала мне мои желания!\"\n\n\"Желание исполнено,\" сказал хриплый голос. \"И первое желание уже потрачено!\"\n\nЛика скорчилась. Нет смысла спорить с горгоной; она лишь продолжила бы манипулировать тобой. \"Я желаю иметь при себе клинок Хартсикер. Но,\" поспешно добавила она, \"он не должен быть вонзен в моё тело! Я хочу, чтобы он был в ножнах, у моего бока.\"\n\nОна не видела горгону, но слышала её насмешку. \"Исполнено,\" сказала она. Внезапно у её бока появилась тяжесть, и она осторожно нащупала ножны. Это был клинок её матери, наконец снова в её руках!\n\nЛика собралась для последнего желания. \"А теперь я желаю силы владеть этим мечом во всей его славе!\"\n\n\"Ты глупое маленькое создание,\" сказал голос. \"Исполнено! Ты всегда имела силу владеть клинком. Тебе просто нужно пройти Испытания Клинка, чтобы активировать его.\"\n\nЛика стонала. \"Ох, это чепуха. Давай же!\" Тишина.\n\n\"Ну,\" сказала Лика, побеждённая, \"что такое Испытания Клинка?\" Тишина. Горгона ушла? Через несколько минут ожидания она осторожно открыла глаза... и снова закрыла их как раз вовремя, потому что горгона ждала прямо перед ней!\n\n\"А, чуть не поймала тебя,\" сказал голос. \"Не волнуйся, Лика. В следующий раз я тебя достану.\" И с этим комната наполнилась дымом, и когда кашель Лики утих, горгона исчезла."
"<h1>Classic Stories: Arisetsu and Vol</h1>\n\n<i>With storytelling tips for beginning bards</i>\n\nLong ago, the gods fought. Tast's allies had battled Dreva's allies, and many gods had died. Dreva had won, but at such cost as cannot be understood by mortals. Dreva's own mother, Arisetsu, the ancient god of hope, lay dying in a field, her warm light almost faded to darkness.\n\nIt was here that Vol found her. In a swirl of rose petals he appeared next to Arisetsu. Glancing with pity over her ancient body, broken and withered, he muttered \"Death is my gift,\" as he had countless times before, and began bestowing his mercy upon her. A smile slowly played across Arisetsu's face. But it was not the face of gratitude.\n\n\"Vol, you cannot kill hope.\" Her eyes fluttered open. \"Begone.\"\n\nVol shook his head. \"Your time has come, Arisetsu. You think the world cannot continue without you, but you are wrong. Take my embrace. It is time!\"\n\nBut the light around Arisetsu grew brighter, pushing Vol away with a great force, and Arisetsu rose, her ancient body looking stronger than he remembered her being for a thousand years. \"Vol, you cannot kill hope. When you try, you only make me stronger.\"\n\nVol is a gracious god, and a good god, but he is prideful, and nothing -- neither god nor mortal -- dared disobey him when he decided the time had come. Vol snarled with surprised anger. \"You embarrass yourself. You embarrass the legacy of hope. IT IS TIME TO DIE!\"\n\nBut Arisetsu grew even brighter, and the two took to the heavens, battling back and forth, light and darkness playing across the stars. Both had fought hard in the great war, and they were tired in ways that you and I cannot understand, but now they fought with renewed energy. Other gods nursed their wounds and watched with wonder as the two battled.\n\nThey did not get weaker. Instead, they each seemed to grow stronger, Vol's withered form becoming gallant and powerful, Arisetsu growing younger, more beautiful, and ever brighter.\n\nVol began to consider, for the first time, that he may not be able to bestow his gift, and it made him angry. With all of his power summoned into one command, the world shook as he bellowed. \"ARISETSU, EMBRACE DEATH!\" And with a wry smile, Arisetsu did so. But she did not die. Instead, in front of god and man and elf, Vol and Arisetsu kissed. It was a surprise to them both, and the other gods turned their glances away as death and hope became intimately intertwined.\n\nAnd so began the romance of Vol and Arisetsu which continues today. Theirs is a rocky love, with many setbacks and battles, and often they refuse even to speak to each other. But so far, they have always returned to each others' embrace. For our sake, may it always be so.\n\n- An apocryphal story told by human bards in Statehelm\n\n<i>Notes for bards: this story should be adapted to your audience. In a solemn tavern, you can get amazing results with some simple props. A classic setup involves a candle, rose petals, and a fan. But in rowdy taverns, make the story as lewd or as gory as necessary. In a dwarven hall, play up Dreva's embarrassment for laughs or pity. In elven lands, it's wise to bring in Errana in one way or another to add more sex. And remember the bard's rule #6: never tell a story the exact same way twice!</i>": "<h1>Классические истории: Арисэцу и Вол</h1>\\n\\n<i>Советы по повествованию для начинающих бардов</i>\\n\\nДавным-давно боги сражались. Союзники Таста бились с союзниками Древы, и многие боги погибли. Древа победила, но ценой, которую смертным не понять. Собственная мать Древы, Арисэцу, древняя богиня надежды, лежала умирающей в поле, её тёплый свет почти угас до темноты.\\n\\nИменно там Вол нашёл её. В вихре розовых лепестков он появился рядом с Арисэцу. Смотрев с жалостью на её древнее, изломанное и увядшее тело, он пробормотал \"Смерть — мой дар\", как делал это бесчисленное множество раз прежде, и начал даровать ей свою милость. На лице Арисэцу медленно появилась улыбка. Но это было не лицо благодарности.\\n\\n\"Вол, ты не можешь убить надежду.\" Её веки дрогнули и открылись. \"Уйди.\"\\n\\nВол покачал головой. \"Твой час пришёл, Арисэцу. Ты думаешь, мир не сможет продолжаться без тебя, но ты ошибаешься. Прими мои объятия. Пора!\"\\n\\nНо свет вокруг Арисэцу стал ярче, оттолкнув Вола с огромной силой, и Арисэцу поднялась, её древнее тело выглядело сильнее, чем он помнил за тысячу лет. \"Вол, ты не можешь убить надежду. Когда ты пытаешься, ты только делаешь меня сильнее.\"\\n\\nВол — благородный и добрый бог, но он горделив, и ничто — ни бог, ни смертный — не осмелилось ослушаться его, когда он решил, что настало время. Вол рявкнул с удивлённой злостью. \"Ты позоришь себя. Ты позоришь наследие надежды. ПРИШЛО ВРЕМЯ УМЕРЕТЬ!\"\\n\\nНо Арисэцу засияла ещё ярче, и они взметнулись в небеса, сражаясь туда и обратно, свет и тьма играли по звёздам. Оба сражались в великой войне и были усталы так, как нам с тобой и не понять, но теперь они сражались с обновлённой энергией. Другие боги залечивали раны и с удивлением наблюдали за их боем.\\n\\nОни не слабели. Напротив, казалось, что каждый из них становился сильнее: иссохлая форма Вола становилась благородной и могущественной, Арисэцу молодела, становилась прекраснее и всё ярче.\\n\\nВол впервые начал задумываться, что он, возможно, не сможет даровать свой дар, и это взбесило его. Собрав всю свою силу в одну команду, мир задрожал, когда он прогремел: \"АРИСЭЦУ, ПРИМИ СМЕРТЬ!\" И с ехидной улыбкой Арисэцу так и сделала. Но она не умерла. Вместо этого, на глазах у богов, людей и эльфов, Вол и Арисэцу поцеловались. Это было неожиданно для обоих, и другие боги отвернули взгляды, когда смерть и надежда тесно переплелись.\\n\\nТак начался роман Вола и Арисэцу, который продолжается и поныне. Их любовь скалистая, с множеством неудач и сражений, и часто они даже отказываются говорить друг с другом. Но до сих пор они всегда возвращались в объятия друг друга. Ради нашего блага, да будет так всегда.\\n\\n- Апокрифическая история, рассказываемая человеческими бардами в Стейтхелме\\n\\n<i>Заметки для бардов: эту историю следует адаптировать под вашу аудиторию. В торжественной таверне можно добиться потрясающих результатов при помощи простых реквизитов. Классический набор включает свечу, лепестки роз и веер. Но в буйных трактирах делайте рассказ таким похабным или таким кровавым, как потребуется. В гномьем зале сделайте акцент на смущении Древы ради смеха или жалости. В землях эльфов разумно как-то привлечь Эррану, чтобы добавить больше эротики. И помните правило барда №6: никогда не рассказывайте одну и ту же историю точно так же дважды!</i>"
"<h1>The Chalice Saga</h1>\n\n<b>Part 1: The Death of Zek</b>\n\nVol, the god of death, is an old and kind god. He guards the sea of souls within the world, ensuring that everyone who dies here, be they mortal, demon, or even god, return their life force to the soul sea, to live in comfort until such time as they are drawn into the world again.\n\nBut Vol had a brother, Zek, a cruel god who captured souls in his chalice — a mythical goblet that could contain countless souls. Those who died while feeling an overwhelming dark emotion, such as hate or fear, were in danger of falling into the chalice. Zek caught far fewer souls than Vol, but the ones he did catch were kept in torment.\n\nSometimes Zek would drink from his chalice, consuming souls to amuse himself, but most souls in the chalice were sent back to the world as undead. Conjured by evil necromancers, these poor creatures were forced to live as slaves until they died again and were returned to the chalice — where they suffered renewed torment. These souls were reborn countless times, never resting, always in anguish.\n\nVol hated his brother and vowed to destroy him and free the souls trapped in his chalice. But despite Vol's power, he could never stop his brother. For countless centuries they battled, but it was only during the God War that he managed to gain the upper hand.\n\nVol and Dreva fought side by side against Zek, finally overpowering him. In a moment of triumph, Vol took Zek's chalice and dumped it out, pouring countless tortured souls into the aether. \"Your reign is over, Zek. I will take your stolen souls back to the sea. Surrender to me. Surrender to death.\"\n\nBut Zek was a cunning god and he knew how the battle would play out. He had reserved his mightiest avatar and his most powerful scions, and he brought them into the battle. For a brief moment they fought against death itself, and of course they were quickly destroyed. But the moment of distraction gave Zek time to reclaim the chalice.\n\nZek poured into the now-empty chalice a piece of his own power: the power to capture souls and bring forth the undead. And then he hurled the chalice into his hidden dimension, known as Acur, the dark dimension of Angst, which most gods could not perceive. For even though Zek was a selfish god who was terrified of his own demise, he refused to give his brother the satisfaction of removing undeath from the world. Another god would come.\n\nThe distractions gone, Vol slew Zek. But the chalice had escaped him. Swearing in anger, Vol carried portions of Zek's energy back to the soul sea, but he knew he would not find the chalice that day.": "<h1>Сага Чаши</h1>\n\n<b>Часть 1: Смерть Зека</b>\n\nВол, бог смерти, — старый и добрый бог. Он охраняет море душ в этом мире, следя за тем, чтобы каждый, кто умирает здесь, будь то смертный, демон или даже бог, возвращал свою жизненную силу в море душ, чтобы жить в покое, пока однажды их снова не призовут в мир.\n\nНо у Вола был брат, Зек, жестокий бог, который ловил души в свою чашу — мифический кубок, способный вместить бесчисленные души. Те, кто умирал, охваченный всепоглощающей тёмной эмоцией, такой как ненависть или страх, рисковали оказаться в чаше. Зек ловил гораздо меньше душ, чем Вол, но те, которых он ловил, были томимы мучениями.\n\nИногда Зек пил из своей чаши, поедая души ради забавы, но большую часть душ из чаши он посылал обратно в мир в виде нежити. Вызванные злыми некромантами, эти несчастные существа были вынуждены жить как рабы, пока не умирали вновь и не возвращались в чашу — где их снова терзали муки. Эти души рождались вновь бесчисленное количество раз, никогда не находя покоя, всегда в агонии.\n\nВол ненавидел брата и поклялся уничтожить его и освободить души, заточённые в его чаше. Но несмотря на силу Вола, он никогда не мог остановить брата. Веками они сражались, но лишь во время Войны богов ему удалось получить преимущество.\n\nВол и Древа сражались плечом к плечу против Зека, наконец превозмогли его. В миг торжества Вол схватил чашу Зека и высыпал её, выливая бесчисленные измученные души в эфир. «Твоё владычество окончено, Зек. Я верну украденные души в море. Подчинись мне. Подчинись смерти».\n\nНо Зек был коварным богом и знал, как развернётся битва. Он приберёг своего могущественнейшего аватара и самых сильных отпрысков и ввёл их в сражение. На короткий миг они сражались против самой Смерти и, разумеется, были быстро уничтожены. Но этот момент отвлечения дал Зеку время вернуть чашу.\n\nЗек влил в теперь пустую чашу часть собственной силы: силу захватывать души и порождать нежить. Затем он бросил чашу в своё скрытое измерение, известное как Акур, тёмное измерение Ангста, которое большинство богов не могли воспринять. Ибо хотя Зек был эгоистичным богом, который боялся собственной гибели, он отказался дать брату удовольствие лишить мир нежити. Придёт другой бог.\n\nОтвлекающие силы исчезли, Вол убил Зека. Но чаша ускользнула от него. Клянясь от гнева, Вол унес части энергии Зека обратно в море душ, но он знал, что не найдёт чашу в тот день."
"<h1>The Chalice Saga</h1>\n\n<b>Part 2: The Death of Ilth Hale</b>\n\nHas there ever been a more bard-worthy legend than that of Ilth Hale, the god of Bravery and Humanity? But this is not the story of her life. It is the tragic story of her death, and the birth of Ilth Hale, god of Sorrow and the Forsaken.\n\nDuring the God War, Ilth Hale had been stabbed in the back by her husband Kirad. Kirad removed her Armor of Bravery and slashed at her bonds of power, easily outmaneuvering her, for Ilth had thought Kirad was her staunch ally, so his betrayal was easy. And after a hundred thousand years of marriage, Kirad knew how to destroy her utterly.\n\nIlth Hale was left as but a speck, a single spirit: the human form of Ilth Hale as she had once been so long ago. Heartbroken, naked, and alone, Ilth Hale finally succumbed to sorrow. Searching the battlefield, she found a piece of her shattered sword, and slit her wrists. \"Vol, come to me now! You swore to take humanity to the soul sea, and I am a human again. Honor your vow!\"\n\nBut even though her wrists poured blood, Ilth Hale did not die. Vol was caught up in battle against Arisetsu, God of Hope. In the aftermath of the God War, Vol and Arisetsu were the only two gods left capable of fighting, so they fought alone. All the other gods watched, exhausted or dying, unable to intervene. So death and hope fought for a seeming eternity, each growing stronger by feeding from the energy of dead gods that swirled about the battlefield.\n\nVol's battle did not seem to be ending, yet Ilth Hale sat and waited, naked, bleeding, and outraged. Finally she screamed, her voice echoing across the world. \"Vol swore to usher dead humans to the soul sea. But he has forsaken me, god of humans! So too shall I forsake death, and all that is good and beloved of Vol.\" \n\nAnd Ilth Hale, the woman, became a god again. But this time, fueled by the treachery of Kirad, the callousness of Vol, and the anguish of her mythic blade, Ilth Hale was reborn as the god of Sorrow and the Forsaken.\n\nGathering dark power from the battlefield, Ilth Hale rose into the sky. She found a hole in the sky that she had never seen before: the entrance to Acur, the dark dimension. Now able to perceive it, she flew headlong into it and claimed it as her home.": "<h1>Сага о Чаше</h1>\n\n<b>Часть 2: Смерть Илс Хейл</b>\n\nБыла ли когда-либо легенда более достойная бардовского исполнения, чем легенда о Илс Хейл, богине Храбрости и Человечества? Но это не рассказ о её жизни. Это трагическая история её смерти и рождение Илс Хейл, богини Печали и Отверженных.\n\nВо время Войны Богов Илс Хейл была заколота в спину своим мужем Кирадом. Кирад снял с неё Доспех Храбрости и разрезал её узы силы, легко переиграв её, ибо Илс думала, что Кирад — её верный союзник, так что его предательство далось просто. И после ста тысяч лет брака Кирад знал, как уничтожить её полностью.\n\nИлс Хейл стала всего лишь крупицей, одиночным духом: человеческой формой Илс Хейл такой, какой она когда-то была много лет назад. С разбитым сердцем, обнажённая и одна, Илс Хейл наконец поддалась печали. Обыскав поле боя, она нашла кусок своего разбитого меча и перерезала себе вены. \"Вол, приди ко мне сейчас! Ты клялся унести человечество в море душ, и я снова человек. Исполни свою клятву!\"\n\nНо хотя из её запястий текла кровь, Илс Хейл не умерла. Вол был поглощён битвой с Арисэцу, богиней Надежды. В результате Войны Богов Вол и Арисэцу остались единственными двумя богами, способными сражаться, и они сражались один на один. Все остальные боги наблюдали, измождённые или умирающие, не в силах вмешаться. Так Смерть и Надежда сражались сколько казалось вечностью, каждый раз становятся сильнее, питаясь энергией павших богов, что крутилась по полю боя.\n\nБитва Вола не казалась близкой к концу, а Илс Хейл сидела и ждала, обнажённая, истекающая кровью и вне себя от гнева. Наконец она закричала, и её голос прокатился по миру. \"Вол клялся проводить мёртвых людей в море душ. Но он предал меня, богиню людей! Так и я отрекуся от Смерти и от всего доброго и любимого Волом.\"\n\nИ Илс Хейл, женщина, снова стала богиней. Но на этот раз, подпитываемая предательством Кирада, равнодушием Вола и агонией своего мифического клинка, Илс Хейл возродилась как богиня Печали и Отверженных.\n\nСобрав тёмную силу с поля боя, Илс Хейл взмыла в небо. Она обнаружила дыру в небе, которую никогда прежде не видела: вход в Акур, тёмное измерение. Теперь, способная его воспринимать, она ринулась в него и объявила его своим домом."
"<h1>The Chalice Saga</h1>\n\n<b>Part 3: The Chalice Drinkers</b>\n\nVol, meanwhile, had finished his battle with Arisetsu, and began snuffing out the defeated gods as well as newly-forming gods. After such a terrible battle, there were hundreds of new gods forming from cast-off remnants of godly power, and Vol hunted each down and killed it before it could become whole.\n\nIlth Hale watched Vol from her new home, the dimension known as Acur. To spite Vol, she began to seek out newly-forming dark gods and pull them to Acur so that they could manifest in safety and grow strong. \n\nHarukita, Tuvillus, Kajich, and Urtigal were brothers, and she called all four into her realm. Then she spotted Ormorek, no longer the god of dwarves, now just the god of bitterness. She beckoned Ormorek into her realm before Vol could find him. \n\nLastly, Ilth Hale spotted a new goddess, Talerra, the god of Depression and Knowing the Truth. She beckoned for Talerra to rise into Acur with her, but Talerra was too depressed to move. Seeing that Vol was coming, Ilth Hale swooped down from the heavens, snatched Talerra in her arms, and carried her to safety. \"Talerra, you will be my sister, for we are much alike.\" Talerra mumbled something, but could not be understood.\n\nIlth Hale closed the door to Acur, and for a time the gods rested, growing strong. The strongest of these new gods was Harukita, resplendent in his Armor of Hate and wielding the Sword of Bigotry. It was Harukita who found the Chalice of Undeath that had been hidden in Acur. Instead of being full of souls, it was still full of Zek's power: the power to create undead.\n\nHarukita brought the chalice before the other gods. \"I have sipped from Zek's Chalice and gained the power to create undead. But I have not sipped overmuch, for I have learned from the past. It was foolish for one god to try to protect such a power. If I drank all of the Chalice, Vol would hunt me down and eventually destroy me. But if we ALL drink from the Chalice, we shall all have the power of undeath. Vol will never be able to destroy us all. We shall be bonded in evil, a partnership that shall span an eternity. Are you with me? Drink from the chalice!\"\n\nHarukita's brothers quickly drank from the chalice. Ormorek drank too. But when the chalice was passed to Ilth Hale, Harukita stopped her. \"There is one condition,\" he said. \"While you may be the master of this realm known as Acur, I am the master of the Chalice. We shall all have a say in how the world is destroyed, but my voice shall call out louder than all others, including yours. Is it agreed?\"\n\nWith a shrug of her naked shoulder, Ilth Hale wordlessly agreed and drank the bitter power.\n\nA few sips remained in the Chalice, and so Ilth Hale flew to find Talerra. The goddess of depression was too weak to move most of the time, but on certain days Talerra would awaken and move with great power. Ilth Hale loved her and wanted her to be part of the covenant. Finding Talerra's body lying face-down in the muck, she parted Talerra's lips and poured some of the power into her mouth. Talerra's eyes fluttered open and she screamed, \"no!\" but it was too late: she had become part of the brotherhood of undeath.\n\nIn a moment of rage, Talerra tossed the Chalice aside and began yelling at Ilth Hale. \"How could you do this to me? You defiled the purity of depression! You marred me forever!\" While the two gods argued, a lone figure sought out the Chalice.\n\nIt was Zhia Lian, the newly-made goddess of whimsy and unpredictability. The door to Acur is unpredictable, and against tall odds Zhia Lian had been able to perceive the entrance to Acur and sneak in uninvited. She drank the last drop of power from the Chalice and then fled, giggling, out into the real world. And so Zhia Lian secretly joined the covenant, bringing a drop of whimsy and unpredictability to the undead.\n\nIn time Harukita took the empty chalice back to the world, where it once again began collecting the souls of those who died under dark emotions. And the members of the covenant — all save Talerra — began creating undead to walk the world and spread darkness across the planet.": "<h1>Сага Чаши</h1>\n\n<b>Часть 3: Пьющие из Чаши</b>\n\nВ это время Вол закончил свою битву с Арисэцу и начал истреблять поверженных богов, а также вновь формирующихся богов. После такой ужасной битвы сотни новых богов зарождались из отброшенных остатков божественной силы, и Вол выслеживал каждого и убивал его прежде, чем тот мог стать цельным.\n\nИлт Хейл наблюдала за Волом из своего нового дома — измерения, известного как Акур. Навстречу Волу она начала искать вновь формирующихся тёмных богов и утащивать их в Акур, чтобы они могли проявиться в безопасности и окрепнуть.\n\nХарукита, Тувиллус, Каджич и Уртгал были братьями, и она призвала всех четырёх в своё царство. Затем она заметила Орморека — уже не бога дварфов, а теперь просто бога горечи. Она позвала Орморека в свой мир, прежде чем Вол смог бы найти его.\n\nНаконец Илт Хейл обнаружила новую богиню, Талерру, богиню Депрессии и Познания Истины. Она призвала Талерру подняться в Акур с ней, но Талерра была слишком подавлена, чтобы двинуться. Увидев, что Вол приближается, Илт Хейл ринулась с небес, схватила Талерру на руки и унесла её в безопасное место. «Талерра, ты будешь моей сестрой, ибо мы очень похожи». Талерра что-то пробормотала, но разобрать было нельзя.\n\nИлт Хейл закрыла дверь Акура, и боги на время отдохнули, набираясь сил. Самым сильным из этих новых богов оказался Харукита, блистающий в своих Доспехах Ненависти и владеющий Мечом Предубеждения. Именно Харукита нашёл Чашу Нежити, скрытую в Акуре. Вместо того чтобы быть наполненной душами, она всё ещё хранила силу Зека: силу создавать нежить.\n\nХарукита преподнёс чашу перед остальными богами. «Я отпил из Чаши Зека и получил силу творить нежить. Но я не пил слишком много, ибо я учусь на прошлом. Было бы глупо одному богу пытаться хранить такую силу. Если я выпью всю Чашу, Вол выследит меня и в конце концов уничтожит. Но если МЫ ВСЕ выпьем из Чаши, у нас у всех будет сила нежити. Вол никогда не сможет уничтожить нас всех разом. Мы становимся связанными злом, партнёрством, что протянется на вечность. Вы со мной? Пейте из чаши!»\n\nБратья Харукиты быстро отпили из чаши. Орморек тоже отпил. Но когда чашу протянули Илт Хейл, Харукита остановил её. «Есть одно условие, — сказал он. — Пока ты можешь быть владычицей этого царства, именуемого Акур, я — хозяин Чаши. Мы все будем иметь право голоса в том, как мир будет разрушаться, но мой голос будет звучать громче всех, включая твой. Согласны?»\n\nИлт Хейл безмолвно пожаловала обнажённым плечом и отпила горечь силы.\n\nВ чаше осталось несколько глотков, и Илт Хейл полетела искать Талерру. Богиня депрессии большую часть времени была слишком слаба, чтобы шевелиться, но в определённые дни Талерра пробуждалась и действовала с огромной энергией. Илт Хейл любила её и хотела включить её в пакт. Найдя тело Талерры лицом вниз в грязи, она разжала её губы и влила немного силы в рот. Глаза Талерры вздрогнули и она закричала: «нет!» но было слишком поздно — она стала частью братства нежити.\n\nВ ярости Талерра швырнула Чашу в сторону и начала кричать на Илт Хейл. «Как ты могла сделать это со мной? Ты осквернила чистоту депрессии! Ты испортила меня навсегда!» Пока два бога спорили, одинокая фигура потянулась к Чаше.\n\nЭто была Жиа Лиан, новообретённая богиня каприза и непредсказуемости. Дверь в Акур непредсказуема, и вопреки всем шансам Жиа Лиан сумела распознать вход и прокрасться внутрь без приглашения. Она отпила последнюю каплю силы из Чаши, затем хихикая, скрылась в настоящий мир. Так Жиа Лиан тайно присоединилась к пакту, привнеся каплю каприза и непредсказуемости в нежить.\n\nСо временем Харукита вынес опустевшую чашу обратно в мир, где она вновь начала собирать души тех, кто умирал в тёмных эмоциях. А члены пакта — все, кроме Талерры — начали создавать нежить, чтобы та бродила по миру и распространяла тьму по планете."
"... and so the Council of Thirteen was no more. The \"Dissenting Five\", as they were called, were banished from Alharth, and a Council Decree stated that their names were never to be spoken again.\n\nShortly thereafter, \"The Council of Thirteen\" renamed itself \"The Council of Eight.\" They maintained eight members for 103 years, replacing members as needed, but starting with Torsagar the Regent's retirement, they stopped anointing new members.\n\nFor a time they called themselves \"The Council of Five,\" before finally settling on just \"The Council.\" Its four surviving members have served for over 180 years, with no sign of stopping. All praise The Council! All praise its benevolence!": "... и так Совет Тринадцати прекратил своё существование. «Пятеро Инакомыслящих», как их называли, были изгнаны из Алхарта, и Декрет Совета постановил, что их имена никогда больше не должны произноситься.\\n\\nВскоре после этого «Совет Тринадцати» переименовал себя в «Совет Восьми». Они поддерживали восемь членов в течение 103 лет, заменяя членов по мере необходимости, но начиная с ухода в отставку Торсагара, Регента, они перестали назначать новых членов.\\n\\nНекоторое время они называли себя «Совет Пятерых», прежде чем окончательно остановиться на простом «Совете». Четверо его живых членов служат уже более 180 лет, без признаков остановки. Да здравствует Совет! Да здравствует его милосердие!"
"You leaf through the book for interesting tidbits:\n\n\"The lead wizards from each school met in secret, calling themselves the Council of Thirteen. Had the gorgons found them then, we would still be under the yoke of the Crone Hegemony to this day! But under the cloak of magical secrecy they organized a rebellion.\"\n\n\"... Queen Hegata declared open war upon the upstart humans and called for aid from her allies. The orcs followed her lead, but the elves of Verta refused to honor their treaty, claiming that it was an internal matter. This created a schism between the elves and the hags which is still evident to this day.\"\n\n\"... When the crones were forced out of their beloved home in Ilmari, they destroyed this Great Weather Machine so that the Council could not obtain it. Who can say if they knew what would happen as a result? Perhaps it was an accident. But in any case, Ilmari was covered in horrific storms for years. Its fertile soil was washed away and it became a barren desert. And so the Rakshasa lost the war, yet claim ownership of Ilmari by default, for none else care enough to fight for it.\"\n\n... This is too boring. You stop reading and focus on more pressing matters.": "Вы пролистываете книгу в поисках интересных подробностей:\n\n\"Ведущие волшебники каждой школы встречались тайно, называя себя Советом Тринадцати. Если бы горгоны тогда нашли их, мы до сих пор были бы под игом Гегемонии Старух! Но под покровом магической тайны они организовали восстание.\"\n\n\"... Королева Хегата объявила открытую войну дерзким людям и призвала на помощь своих союзников. Орки последовали за ней, но эльфы Верты отказались соблюдать договор, утверждая, что это внутреннее дело. Это создало раскол между эльфами и ведьмами, который заметен по сей день.\"\n\n\"... Когда старух изгнали из их любимого дома в Илмари, они уничтожили этот Великий погодный механизм, чтобы Совет не мог им завладеть. Кто скажет, знали ли они, что произойдёт в результате? Возможно, это был несчастный случай. Но в любом случае Илмари годами было охвачено ужасными бурями. Его плодородную почву смыло, и оно превратилось в бесплодную пустыню. И так Ракшаса проиграли войну, но по умолчанию претендуют на владение Илмари, потому что никому больше не хватает желания бороться за него.\"\n\n... Это слишком скучно. Вы перестаёте читать и переключаетесь на более насущные дела."
"<i>You notice that certain words are capitalized inappropriately in the text. How odd.</i>\n\nAnd so I traveled with a trade Caravan for months until we reached his hallowed Tomb. When the others had been dealt with, I carefully Excavated it, all by hand, until I found the Emerald. It was right where I'd predicted, of course.\n\nI Studied it for seven years, and during that time I met my true Love, a simple town Guard named ... well, I had best not put his name to writing. Our beautiful daughter was born, but she was sickly... he said it was because of the things I'd done, but what could he have known?\n\nIt took all my skill at Alchemy to keep her alive, but it would not last for long. In desperation we sailed West to see my mentor.\n\n<i>(Here the writing becomes very small and very precise, as if written with great concentration.)</i>\n\nIn exchange for the goddess's gem, Loicus said he could save Ursula. But it was a trick. He twisted her, twisted! He thought I wouldn't See what he did, but he was a fool. And then I... and now not even Death can stop me, and I will have my revenge on him and all his people. He will suffer the way...\n\n85934": "<i>Вы замечаете, что некоторые слова в тексте написаны с ненадлежащими заглавными буквами. Как странно.</i>\n\nИ вот я путешествовал с торговым Караваном в течение нескольких месяцев, пока мы не достигли его священной Гробницы. Когда с остальными было покончено, я тщательно Выкапывал её вручную, пока не нашёл Изумруд. Он был ровно там, где я и предсказывал, разумеется.\n\nЯ Изучал его семь лет, и за это время я встретил свою истинную Любовь, простого городского Стража по имени ... ну, мне лучше не писать его имени. Наша прекрасная дочь родилась, но она была хилой... он сказал, что это из-за того, что я сделал, но что он мог знать?\n\nМне потребовалось всё моё умение в Алхимии, чтобы сохранить её живой, но это долго не длилось. В отчаянии мы отплыли на Запад, чтобы навестить моего наставника.\n\n<i>(Здесь почерк становится очень мелким и очень точным, как будто написано с огромной сосредоточенностью.)</i>\n\nВ обмен на камень богини Лойкус сказал, что может спасти Урсулу. Но это была уловка. Он её исказил, исказил! Он думал, что я не Увижу того, что он сделал, но он был дураком. А затем я... и теперь даже Смерть не может меня остановить, и я отомщу ему и всем его людям. Он будет страдать так, как...\n\n85934"
"Few things are as frustrating as a foe that can easily evade your attacks. If you encounter such a creature, you must find ways to be more accurate. I like to use precise attacks with a rapier or other accurate weapon, but other warriors prefer to stun evasive monsters. Stunning a foe will briefly prevent it from dodging.\n\nAnother troublesome foe is one that regenerates. Bleed them, bleed them! Or burn them, poison them, coat them in acid. The lingering pain will reduce their ability to regenerate significantly. And in the case of trolls, a bit of fire can leave them completely unable to heal. Of course, you must then deal with the stench of burning troll...": "Мало что так раздражает, как противник, который легко уклоняется от ваших атак. Если вы столкнулись с таким существом, нужно найти способы повысить точность. Мне нравится использовать точные атаки рапирой или другим точным оружием, но другие воины предпочитают оглушать уклоняющихся монстров. Оглушение противника ненадолго лишит его способности уклоняться.\\n\\nДругой проблемный противник — тот, кто регенерирует. Заставляйте их кровоточить, заставляйте! Или сожгите их, отравьте, покройте кислотой. Длительная боль значительно снизит их способность к регенерации. И в случае троллей немного огня может полностью лишить их возможности исцеляться. Конечно, вам тогда придётся иметь дело с вонью горящего тролля..."
"<h1>Nature Spirit Mortality</h1>\n\n<i>by Ilvadele Irasce, Council of Eight</i>\n\nI've been asked to explain the concept of how gods can \"die\". As I explained in my Guide to Nature Spirit Classification, these \"gods\" are just sentient magical energy that are connected into the world via what we call \"anchors\". These anchors are minor objects of power, such as trees, ponds, swords, or dragons.\n\nThe weaker types of gods can be destroyed simply by destroying their anchors. Class 5 nature spirits have only a single anchor, such as a tree or rock, and destroying this object hurtles the spirit into oblivion. Class 4 nature spirits usually have dozens of anchors, but sometimes they can all be destroyed pretty easily. For instance, I once set a small copse ablaze to destroy a Class 4 spirit that lived in the woods. All of its anchors were trees, and they all burned.\n\nBut Class 3 and above, what we call \"gods\", are not usually susceptible to this. A class 3 god has hundreds or thousands of anchors, and a class 1 god has millions of anchors. There is another way to kill them, which is to simply tear at their energy matrix until it cannot hold onto its anchor points. This is what happens when gods fight each other -- the anchors are ignored, and instead they focus on the gods' \"grip\" on those anchors.\n\nIt should be noted that even though Class 3 nature spirits are considered \"gods\", they aren't beyond the might of the most powerful mages. I remember when Jarmanger slew a Class 3 god by himself, unraveling the energy right before our shocked eyes. But Class 1 and Class 2 gods are probably beyond any single mortal's power.": "<h1>Смертность духов природы</h1>\n\n<i>Илваделе Ирассе, Совет Восьми</i>\n\nМеня попросили объяснить концепцию того, как «боги» могут умирать. Как я объяснял в своём Руководстве по классификации духов природы, эти «боги» — просто одушевлённая магическая энергия, связанная с миром посредством того, что мы называем «якорями». Эти якоря — незначительные объекты силы, такие как деревья, пруды, мечи или драконы.\n\nБолее слабые типы богов можно уничтожить просто разрушив их якоря. Духи природы Класса 5 имеют всего один якорь, например дерево или камень; уничтожение этого объекта бросает духа в небытие. Духи природы Класса 4 обычно имеют десятки якорей, но иногда их все можно довольно легко уничтожить. Например, однажды я поджёг небольшую рощицу, чтобы уничтожить духа Класса 4, жившего в лесу. Все его якоря были деревьями, и они все сгорели.\n\nНо духи Класса 3 и выше, которых мы называем «богами», обычно не поддаются этому. У бога Класса 3 сотни или тысячи якорей, а у бога Класса 1 — миллионы якорей. Существует другой способ их убить: просто разорвать их энергетическую матрицу до тех пор, пока она не перестанет удерживать свои якорные точки. Именно это происходит, когда боги сражаются друг с другом — якоря игнорируются, и вместо этого они сосредотачиваются на «хватке» богов за эти якоря.\n\nСтоит отметить, что хотя духи природы Класса 3 считаются «богами», они не находятся вне досягаемости могущества самых сильных магов. Я помню, как Джармангер в одиночку убил бога Класса 3, развязав энергетическую матрицу прямо у нас на ошеломлённых глазах. Но боги Класса 1 и Класса 2, вероятно, превосходят силу любого отдельного смертного."
"<h1>Guide To Nature Spirit Classification</h1>\n\n<i>by Ilvadele Irasce, Council of Eight</i>\n\nWhat we call \"gods\" are just manifestations of magical power that somehow gained sentience. They are not invincible. Well... most of them aren't. I've spent some time developing a system that explains their power levels:\n\n<b>Class 1:</b> these gods are extraordinarily powerful, and can alter the entire world if they choose to. They represent concepts that affect every aspect of reality. Dreva, Tast, and Arisetsu are examples of this type of spirit.\n\n<b>Class 2:</b> these gods are powerful enough to exert huge influence, but tend to \"pick their battles\" and focus their efforts so as not to be stretched too thin. Irhetsu, Gulagra, and Akhisa are examples.\n\n<b>Class 3:</b> these are the weakest spirits that we still consider \"gods\". They are just barely powerful enough to stand up to an attack from a Class 1 god. They have much power, but it is largely bound up in their own safety, so they exhibit relatively little influence on the world at large. Most have pockets of worshipers, and many have a few small token effects on the world, such as a holiday, an artifact, or a small city of their own. Ilth Hale, Melkar, and Zare are examples.\n\n<b>Class 4:</b> these are not gods, but just \"nature spirits\". They are powerful in a small geographic area, usually only a few miles at most. They tend to be well hidden, because it's common for Class 2 and Class 3 gods to seek these spirits out and consume them to bolster their own power. (This is beneath a class 1 god, who couldn't be bothered with such small amounts of power.)\n\n<b>Class 5:</b> these are the weakest nature spirits. They are nothing more than a waft of magic anchored into reality, usually in a single object such as a tree, rock, or pond. Dryads are a common Class 5 nature spirit. The easiest way to kill them is simply to destroy their anchor.\n\nMy colleague, Jarmanger, believes there should be a sixth classification, and while I disagree, I will include it here:\n\n<b>Class 0:</b> these are supremely powerful gods, with enough power to bend or break any aspect of reality. It's likely that these gods could destroy weaker (class 3? class 2?) gods, if they chose to. Jarmanger argues that Dreva, Vol, and Kirad should be in this category.": "<h1>Руководство по классификации духов природы</h1>\n\n<i>Илваделе Ирассе, Совет Восьми</i>\n\nТо, что мы называем \"богами\", — это всего лишь проявления магической силы, которые каким‑то образом обрели разум. Они не непобедимы. Ну… большинство из них — нет. Я потратил некоторое время на разработку системы, объясняющей их уровни силы:\n\n<b>Класс 1:</b> эти боги чрезвычайно могущественны и при желании могут изменить весь мир. Они олицетворяют концепции, влияющие на каждый аспект реальности. Древа, Таст и Арисэцу — примеры духов такого типа.\n\n<b>Класс 2:</b> эти боги достаточно сильны, чтобы оказывать огромное влияние, но склонны \"выбирать свои сражения\" и концентрировать усилия, чтобы не растягиваться слишком тонко. Ирхэцу, Гулагра и Ахиса — примеры.\n\n<b>Класс 3:</b> это самые слабые духи, которых мы всё ещё считаем \"богами\". Они едва достаточно сильны, чтобы выдержать атаку бога Класса 1. У них много силы, но она в значительной степени сосредоточена на их собственной безопасности, поэтому они оказывают относительно небольшое влияние на мир в целом. У большинства есть очаги поклонников, у многих есть несколько небольших символических эффектов на мир, таких как праздник, артефакт или небольшой собственный город. Илт Хейл, Мелкар и Заре — примеры.\n\n<b>Класс 4:</b> это не боги, а просто \"духи природы\". Они могущественны на небольшой географической территории, обычно всего в нескольких милях максимум. Они, как правило, хорошо скрываются, потому что обычно боги Класса 2 и Класса 3 ищут этих духов и поглощают их, чтобы укрепить собственную силу. (Для бога Класса 1 это ниже достоинства — ему незачем заморачиваться такими малыми объёмами силы.)\n\n<b>Класс 5:</b> это самые слабые духи природы. Они не более чем порыв магии, заякоренный в реальности, обычно в одном объекте, таком как дерево, камень или пруд. Дриады — распространённый дух природы Класса 5. Проще всего убить их, просто уничтожив их якорь.\n\nМой коллега Ярмангер считает, что должна быть шестая классификация, и хотя я с этим не согласен, я включу её сюда:\n\n<b>Класс 0:</b> это чрезвычайно могущественные боги, с достаточной силой, чтобы согнуть или разрушить любой аспект реальности. Вероятно, эти боги могли бы уничтожить более слабых (класс 3? класс 2?) богов, если бы захотели. Ярмангер утверждает, что Древа, Вол и Кирад должны быть в этой категории."
"<i>[The word \"LIES\" is scribbled on every page in blood. However, you can still make out the words.]</i>\n\n<h1>The Legacy of Gulagra</h1>\n\n<i>(Council Annotated Edition)</i>\n\nGulagra has weakened. That much is clear. And this is a good thing.\n\nGulagra is the embodiment of anarchy, so it should not be surprising that we have very poor records about it. The elven sage Tullanis wrote that Gulagra was born from old chaos gods that fought themselves to death, but if this is true, it was uncountable years ago. We also know that Gulagra and Tast were once close allies, both reveling in war. But while Tast believes war should be organized and structured, Gulagra wants only chaos, and ultimately they parted ways after the battle with Dreva. After that, Gulagra focused on infiltrating city-states and destroying them from within. Even today, a leader that damages their city is said to be \"Gulagra's Fool.\"\n\nBut now, Gulagra has weakened. How or why, we do not know. It has been more than a thousand years since Gulagra's favored shape -- a huge pale worm -- has been seen. Its followers once gathered in vast cults, but now live in hidden places, clinging together to attempt to retain their sanity. They are no more dangerous than the wild beasts of this world.\n\nBut what has happened to Gulagra's influence? Is Gulagra planning something? Can chaos gods plan at all? We will have to wait and see.\n\n<b>Councilwoman Irasce's notes:</b> Gulagra is at least a class 2 nature spirit. I believe Gulagra is simply bored -- it is no longer excited by destruction on a small scale, or even destruction of small countries. It wishes for destruction on a scale beyond our ready comprehension. I believe Gulagra is extremely intelligent, and capable of creating complex plans. But I also believe Gulagra's influence on its followers slowly drives them mad, and quite visibly so, and it's hard for the gibberingly insane to carry out covert operations. Instead, these cultists are \"merely\" tremendous forces of direct destruction. We have little to fear from \"Gulagra's Fools\" infiltrating our cities anymore.\n\nIt goes without saying that worship of Gulagra is illegal, and is punishable by swift death for you and banishment for your family. If you see a Gulagra worshipper, report them immediately. Never attempt to communicate with them.": "<i>[Слово \"ЛОЖЬ\" выцарапано кровью на каждой странице. Тем не менее вы всё ещё можете разобрать слова.]</i>\n\n<h1>Наследие Гулагры</h1>\n\n<i>(Аннотированное издание Совета)</i>\n\nГулагра ослабла. Это очевидно. И это к лучшему.\n\nГулагра — воплощение анархии, так что неудивительно, что у нас очень скудные записи о ней. Эльфийский мудрец Тулланис писал, что Гулагра родилась из древних богов хаоса, которые сражались насмерть, но если это правда, то это было несчётные годы назад. Мы также знаем, что Гулагра и Таст когда-то были близкими союзниками, оба наслаждавшиеся войной. Но если Таст считает, что война должна быть организована и структурирована, то Гулагра жаждет лишь хаоса, и в конечном итоге они разошлись после битвы с Древой. После этого Гулагра сосредоточилась на проникновении в город-государства и уничтожении их изнутри. Даже сегодня лидера, повредившего свой город, называют «Шутом Гулагры».\n\nНо теперь Гулагра ослабла. Как или почему — мы не знаем. Прошло более тысячи лет с тех пор, как было замечено предпочитаемое обличье Гулагры — огромный бледный червь. Её последователи когда-то собирались в обширные культы, но теперь живут в укромных местах, тесно прижимаясь друг к другу в попытках сохранить ясность ума. Они не опаснее диких зверей этого мира.\n\nНо что случилось с влиянием Гулагры? Планирует ли Гулагра что-то? Могут ли боги хаоса вообще что-либо планировать? Придётся подождать и посмотреть.\n\n<b>Записки советницы Ирассэ:</b> Гулагра — по крайней мере дух природы класса 2. Я полагаю, что Гулагра просто скучает — её больше не радует разрушение в малом масштабе или даже уничтожение небольших стран. Она желает разрушения в масштабе, выходящем за пределы нашего обычного понимания. Я считаю, что Гулагра исключительно умна и способна строить сложные планы. Но я также полагаю, что влияние Гулагры на её последователей постепенно сводит их с ума, причём весьма заметно, и бормочущим безумцам трудно вести скрытные операции. Вместо этого эти культисты — «просто» гигантские силы прямого разрушения. Нам мало чего стоит опасаться от проникновения «Шутов Гулагры» в наши города.\n\nСамо собой разумеется, поклонение Гулагре незаконно и карается быстрой смертью для вас и изгнанием для вашей семьи. Если вы увидите поклоняющегося Гулагре, немедленно доложите о нём. Никогда не пытайтесь с ним общаться."
"<h1>Norala The Huntress</h1>\n\n<b>By Fathregar the Fanged</b>\n\n<i>(Council Annotated Edition)</i>\n\nHear me out: you know of her as a goddess of evil, but Norala is a goddess of nature. Nature is not good or evil.\n\nFirst, you must admit that Norala is a contradiction: she is the god of the big eating the little, of might making right, of the strong enslaving, killing, or abusing the weak. But Norala is not a strong god. Why is this? It is because she does not want to overshadow the apex predators in the world. If she were the strongest, then she could not in good conscience help those weaker than her. Don't you see?! She is weak so that she doesn't have to kill us all!\n\nIt's true that Norala blesses slavery, rape, murder, anything! As long as it is done by the strong against the weak. You call this evil, but it is the way of nature! Look around you! Everywhere you look, the strong take advantage of the weak. That is natural. How can nature be evil?\n\nNorala's blessing is known as Lycanthropy. True to her nature, it destroys the weak and grants power to the strong. Only one in twenty werewolves retain their minds for more than two moons. The ones who do? Those are the apex predators! And hidden throughout the world are Norala's scions, standing ready to test the power of those who think they are strong.\n\nIt is blasphemy to confuse Norala with Melkar. Melkar is the god of hunting for sustenance. Norala is goddess of hunting for pleasure. Melkar is weak and needy. Norala is sleek and powerful.\n\n<b>Councilwoman Irasce's notes:</b> Despite her adherents' claims to the contrary, Norala is a relatively weak class 3 nature spirit. Worship of Norala is forbidden, for it inevitably means voluntarily infecting oneself with lycanthropy, which is usually a fate worse than death: not only does the mind die, but the body becomes a senseless killing machine.\n\nSome \"sane\" werewolf packs eschew Norala and try to prevent the spread of the disease, even going as far as hunting their own kind. This is admirable, but nevertheless we must maintain a strict rule for the safety of all humans: all lycanthropes should be killed on sight.": "<h1>Норала Охотница</h1>\n\n<b>От Фатхрега Клыкастого</b>\n\n<i>(Аннотированное издание Совета)</i>\n\nВыслушайте меня: вы знаете её как богиню зла, но Норала — богиня природы. Природа не бывает ни хорошей, ни злой.\n\nПрежде всего вы должны признать, что Норала — противоречие: она бог великого, пожирающего малого, силы, устанавливающей справедливость, сильных, порабощающих, убивающих или мучающих слабых. Но Норала не сильный бог. Почему так? Потому что она не хочет затмевать высших хищников мира. Если бы она была самой сильной, то не могла бы по совести помогать тем, кто слабее её. Разве вы не видите?! Она слаба, чтобы ей не пришлось убивать нас всех!\n\nПравда в том, что Норала благословляет рабство, изнасилование, убийство — всё, что угодно! Если это совершено сильными против слабых. Вы называете это злом, но это путь природы! Оглянитесь вокруг! Везде сильные пользуются слабыми. Это естественно. Как природа может быть злой?\n\nБлагословение Норалы известно как ликантропия. В соответствии со своей природой оно уничтожает слабых и дарует силу сильным. Только один из двадцати оборотней сохраняет рассудок более двух лун. Те, кто сохраняют? Это высшие хищники! И по всему миру скрываются отпрыски Норалы, готовые испытать силу тех, кто считает себя сильным.\n\nБогохульство — путать Норалу с Мелкаром. Мелкар — бог охоты ради пропитания. Норала — богиня охоты ради удовольствия. Мелкар слаб и нуждающ. Норала же грациозна и могущественна.\n\n<b>Заметки советницы Ираске:</b> Несмотря на утверждения её приверженцев, Норала — относительно слабый дух природы 3-го класса. Поклонение Норале запрещено, так как оно неизбежно означает добровольное заражение ликантропией, что чаще всего хуже смерти: не только погибает разум, но и тело превращается в бессмысленную машину для убийств.\n\nНекоторые «адекватные» стаи оборотней отвергают Норалу и пытаются предотвратить распространение болезни, даже доходя до охоты на своих собратьев. Это достойно уважения, но тем не менее мы должны поддерживать строгую меру ради безопасности всех людей: всех ликантропов следует убивать при обнаружении."
"<h1>History of Dale Renthian</h1>\n\n<i>(Council Annotated Edition)</i>\n\nBack when Tast and Gulagra were at the height of their friendship, they waged war on the other gods and many died. The elves once had a goddess of creative beauty named Elshana, and she was mortally wounded in the fighting, with nothing left but a single anchor point in reality. Most gods in such a state are content to quietly fade away, but a god of creativity is also a god of persistence, because creativity requires you to never stop trying. And so Elshana hurtled toward the nearest village she could find and sought the most creative person there, and begged his help.\n\nDale Renthian was a human painter of some skill, and he reluctantly agreed to let Elshana live in his head and be his muse. Elshana ceased to be, becoming just a voice, but she had much to say. Dale's creativity exploded, his paintings became wildly imaginative, and he soon founded the Renthian Style of art, mixing simple magics with pigments to create harrowing juxtapositional paintings. He attracted many students and grew quite wealthy, but years later, he realized he was squandering his gift. This is the part of his life that is so often told in tall tales and epic poems: he wandered the world on horseback, righting wrongs with creative gadgetry and giving inspiration to those that needed it most.\n\nOne day he was killed by a jealous sculptor, but he soon returned as a god, having managed to inadvertently leave many anchors throughout the world. And even now, Dale Renthian is the most common god to be found among human civilizations. If you come across an older human, covered in spilled paint, arguing with himself, it may be Dale Renthian. Buy him a beer and see what he has to say.\n\n<b>Councilwoman Irasce's notes:</b> Dale Renthian is a class 3 nature spirit; he is generally friendly and is welcome in any Council city, but be warned that he has formidable powers. One of his most dangerous powers is that of persuasion, for he has many radical and foolish ideas. Wise citizens should temper his enthusiasm with natural human pessimism. Remember that almost everything a creative person comes up with is useless, even though it may seem interesting on the surface.": "<h1>История Дейла Рентхиана</h1>\n\n<i>(Аннотированное издание Совета)</i>\n\nКогда Таст и Гулагра были на пике своей дружбы, они вели войну с другими богами, и многие погибли. У эльфов когда-то была богиня творческой красоты по имени Элшана, и она была смертельно ранена в боях, оставив после себя единственную якорную точку в реальности. Большинство богов в таком состоянии довольствуются тем, чтобы тихо угаснуть, но бог творчества также является богом настойчивости, потому что творчество требует никогда не прекращать попыток. Итак Элшана ринулась к ближайшей деревне, нашла там самого творческого человека и умоляла его о помощи.\n\nДейл Рентхиан был человеком-художником с определённым мастерством, и он неохотно согласился позволить Элшане поселиться у него в голове и быть его музой. Элшана перестала существовать, став всего лишь голосом, но ей было что сказать. Творчество Дейла взорвалось, его картины стали необычайно фантазийными, и вскоре он основал рентхианский стиль в искусстве, смешивая простые магии с пигментами, чтобы создавать пугающе сопоставительные картины. Он привлёк множество учеников и стал довольно богат, но годы спустя понял, что расточает свой дар. Это та часть его жизни, которую так часто рассказывают в баках и эпических поэмах: он странствовал по миру верхом, исправлял несправедливости с помощью изобретательной техники и дарил вдохновение тем, кто в нём больше всего нуждался.\n\nОднажды его убил ревнивый скульптор, но вскоре он вернулся как бог, сумев невольно оставить множество якорных точек по всему миру. И даже сейчас Дейл Рентхиан — самый распространённый бог среди человеческих цивилизаций. Если вы наткнётесь на пожилого человека, покрытого брызгами краски и спорящего сам с собой, это может быть Дейл Рентхиан. Купите ему пиво и послушайте, что он скажет.\n\n<b>Заметки советницы Ирасе:</b> Дейл Рентхиан — дух природы 3-го класса; он, как правило, дружелюбен и ему рады в любом городе Совета, но будьте предупреждены: у него внушительные силы. Одна из его самых опасных способностей — сила убеждения, поскольку у него много радикальных и глупых идей. Мудрые граждане должны умерять его энтузиазм естественным человеческим пессимизмом. Помните, что почти всё, что придумывает творческая личность, бесполезно, даже если на поверхности это кажется интересным."
"By Muligu, Goblin Sage-Lord\n\nSuppose you need to know something, and can pay a very high price for this knowledge. And suppose the thing one wants to know isn't available from any sage or library. Let's put it bluntly: you want to contact a god -- or, hopefully, just their local representation -- for knowledge. \n\nBut there are so many gods that have something to do with knowledge! Where do you start? Start here. These volumes will cover each god with a penchant for knowledge, explain what they know, and tell you how they might be reached.\n\n <h1>Imatia, God of Knowledge and Learning</h1>\n\n<b>Who she is:</b> We'll start with the one everybody in the Crone Hegemony's familiar with. Imatia's Libraries are vast repositories of knowledge, gathered up from around the world and kept safe. The Crone Hegemony is a land where knowledge can get you killed, and large libraries don't tend to survive there for long. But Imatia's Libraries are protected by her monks. And even if the Monks of Imatia fail to stop an attacker, the library just leaves. Each library has roughly the same shape: an ivory tower, tall as the sky. One day it appears, a week later it's gone.\n\n<b>What she knows and how to find her:</b> Imatia is the world's librarian. If the knowledge you seek is written in a book, there's a good chance that the book is in one of Imatia's seven ivory towers. But it may take some time to find it. Each tower has its own collection of rare books, found from all over the world by Imatia's monks.\n\nIf your cause is 'pure and sound' -- code words for 'something Imatia approves of' -- you could enter a library yourself, if you happened to find one. But when a library moves, only a monk can find it. Finding a monk is relatively easy, however: just seek out the libraries and booksellers of the world, make it known that you seek a monk, and that you can pay. A monk will find you.\n\nBe cautious! The monks are librarians, but they are also deadly warriors, armed with godly weapons and protections. Violence is highly discouraged. And luckily for you, it shouldn't be necessary: the monks work for pay. Their fees are spent on new volumes to add to their tower. Expect to pay a high price! While common books can be obtained for small fees, you no doubt need a rare book. Searching for a very rare volume could cost tens of millions of coins -- and there is still no guarantee that they can find it. Imatia's libraries are vast beyond belief, but they still only hold a fraction of the universe's knowledge.\n\n <h1>Fenna, God of Beauty, Innocence, Dusk, and Poetry</h1>\n\n<b>Who she is:</b> Fenna is a young god who is more closely associated with beauty than knowledge. But she's not dumb.\n\n<b>What she knows and how to contact her:</b> Fenna knows countless poems in every language. And she loves them. Even poems about things that would otherwise disgust her, such as rape or murder, are beautiful in her eyes -- as long as they're good poems!\n\nFenna can most easily be found at Paullus's parties. She often shows up at dusk for a few minutes, enthralls the crowd with her beauty, recites a poem or two, and then leaves. But before she leaves, she takes requests. If you need to hear a long-lost poem, Fenna might be willing to recite it. But don't ask her about songs! She doesn't like music all that much. For songs, speak to Irhetsu. Luckily, they are often at the same parties... sometimes as a couple.": "Мулигу, гоблинский лорд‑мудрец\n\nДопустим, вам нужно кое‑что узнать, и вы готовы заплатить за это очень высокую цену. И допустим, что искомое знание недоступно ни у одного мудреца и ни в одной библиотеке. Скажем прямо: вы хотите связаться с богом — или, надеемся, по крайней мере с его местным представителем — ради знания.\n\nНо существует так много богов, имеющих отношение к знанию! С чего начать? Начните здесь. Эти тома охватят каждого бога, склонного к знаниям, объяснят, что он знает, и расскажут, как до него добраться.\n\n<h1>Иматия, богиня Знаний и Обучения</h1>\n\n<b>Кто она:</b> Начнём с той, кого все в Гегемонии Старух хорошо знают. Библиотеки Иматии — огромные хранилища знаний, собранных со всего мира и надёжно охраняемых. В Гегемонии Старух знание может стоить тебе жизни, и большие библиотеки там обычно долго не живут. Но библиотеки Иматии защищены её монахами. И даже если монахи Иматии не сумеют отразить нападавшего, библиотека просто уходит. Каждая библиотека имеет примерно одинаковую форму: башню из слоновой кости, высокую до небес. Однажды она появляется, через неделю её уже нет.\n\n<b>Что она знает и как её найти:</b> Иматия — библиотекарь мира. Если знание, которое вы ищете, записано в книге, велика вероятность, что эта книга находится в одной из семи башен Иматии. Но её поиск может занять время. Каждая башня имеет свою коллекцию редких томов, собранных монахами Иматии со всех концов мира.\n\nЕсли ваше дело «чисто и доброе» — кодовые слова для «то, что одобряет Иматия» — вы могли бы войти в библиотеку сами, если бы случайно нашли одну. Но когда библиотека перемещается, найти её может только монах. Найти монаха относительно просто: просто ищите библиотеки и книготорговцев по миру, дайте понять, что вы ищете монаха и можете заплатить. Монах найдёт вас.\n\nБудьте осторожны! Монахи — библиотекари, но они также смертоносные воины, вооружённые божественными оружием и защитами. Применение силы крайне не рекомендуется. К счастью для вас, это обычно не требуется: монахи работают за плату. Их гонорары тратятся на новые тома для их башни. Готовьтесь заплатить высокую цену! Обычные книги можно получить за небольшую плату, но вам явно нужна редкая книга. Поиск крайне редкого тома может стоить десятков миллионов монет — и при этом нет гарантии, что его удастся найти. Библиотеки Иматии необъятны, но всё же хранят лишь часть знаний вселенной.\n\n<h1>Фенна, богиня Красоты, Невинности, Сумерек и Поэзии</h1>\n\n<b>Кто она:</b> Фенна — молодая богиня, более связанная с красотой, чем со знанием. Но дура она не из тех.\n\n<b>Что она знает и как с ней связаться:</b> Фенна знает бесчисленное множество стихотворений на всех языках. И она их любит. Даже стихи о вещах, которые в ином случае бы её отвратили, такие как изнасилование или убийство, прекрасны в её глазах — при условии, что это хорошие стихотворения!\n\nФенну легче всего встретить на застольях Пауллуса. Она часто появляется на закате на несколько минут, завораживает толпу своей красотой, декламирует стихотворение или два и уходит. Но перед уходом она принимает просьбы. Если вам нужно услышать давно утраченное стихотворение, Фенна может согласиться его прочесть. Но не просите её о песнях! Музыка ей не особенно по душе. За песнями обращайтесь к Ирхэцу. К счастью, они часто бывают на одних и тех же вечеринках... иногда даже как пара."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>\n\n <h1>Irhetsu, God of Wind, Song, and Stories</h1>\n\n<b>Who he is:</b> once just the god of breezes, Irhetsu somehow became the god of songs, and then stories told in song, and finally the god of stories themselves. Irhestu is one of the most easy-to-find gods because he hosts parties with his on-and-off girlfriend, Fenna, the god of Poetry, and his buddy Paullus, the god of parties.\n\n<b>What he knows and how to find him:</b> Irhetsu knows songs. Pretty much all the songs. Plus, he knows a lot of stories. Old stories, mostly, but modern ones too. If you need to hear a lost song or story, he's your first choice.\n\nIrhetsu is not a subtle party-thrower. To find him -- well, one of his avatars -- you just need to catch word of when his next party is. If you're in a major metropolis, that's not too hard. You're likely to have one nearby within a few months. Getting an invite to the party should be easy if you're rich and well-connected.\n\nBut then comes the tricky part: getting him to care. He needs to be able to hear you over the sounds of all the music, so it helps if you're telepathic! If not, bring a sign. Seriously. Once you get his attention, he will give you about ten seconds of his time, so make it count! If you inspire him to tell a story or sing a song, he'll do so. It may not be the one you needed... but then again, it just might be.\n\n <h1>Janice Alberith, God of Science and Discovery</h1>\n\n<b>Who she is:</b> the god of Science is only ten or fifteen thousand years old, making her one of the youngest gods. While she knows an incredible amount, she's not a hoarder of knowledge and facts. The act of discovery is what Janice is about. Never content to learn something from a book when she could empirically determine it herself, everything that Janice knows comes from personal experience.\n\nJanice seems mostly content to perform experiments far away from mortal eyes. But she does help certain sages and scientists who need her particular expertise in the art of science itself.\n\n<b>What she knows and how to find her:</b> Janice knows an incredible amount about the physical makeup of the universe. But most of that knowledge is also known to mortals -- and a sage is far easier to contact than Janice Alberith! If you know enough metaphysics to know what Sages DON'T know, Janice might be able to help.\n\nIf Janice decides your inquiry is worthwhile, she'll help you design an experiment to answer your question empirically. She's better at it than any mortal, so if there's an experiment that would answer your question, Janice Alberith can devise it for you.\n\nBut actually PERFORMING the experiment is usually up to you. On rare occasion, though, Janice takes an interest in the experiment and may help with it. And she does often lend a hand with logistics, teleporting you to a remote destination or bringing extremely large objects closer to you so you can study them.\n\nContacting Janice is best left to Sages and Scientists. You will have to pay the Sage, but Janice herself does not take payment of any kind. If she chooses to help you, it will be free.\n\n <h1>Laeth, God of Time</h1>\n\n<b>Who she is:</b> the god of time itself is not usually considered a god of knowledge. She does have access to tremendous information both past and future, but Laeth is charged with maintaining the time-flow of this part of the galaxy. She alone among the gods of our world works on a grander scale -- a scale that even your author cannot truly understand.\n\nLong story short, she's pretty busy, and she doesn't answer summons.\n\n<b>What she knows and how to find her:</b> as the god of time, she can find the answers to anything that's ever happened or ever will happen. In theory, at least. There's scant information about her, but we know she has intervened in our world's history several times -- perhaps a great many times, for all we know -- to help prevent a terrible future.\n\nAs is the case with many gods, if you find a way to summon Laeth, it means Laeth <b>wants</b> you to summon her. And unfortunately that means you're probably going to have to do something to save the world. But after you save the world, she'll usually answer a few questions before she leaves. Make them count.": "<i>[Эта серия книг гоблинского мудреца Мулигу описывает каждого бога, который может помочь вам с вопросом, связанным со знаниями.]</i>\n\n \n<h1>Ирхэцу, Бог Ветра, Песни и Рассказов</h1>\n \n<b>Кто он:</b> когда-то просто бог ветерков, Ирхэцу каким‑то образом стал богом песен, затем песенных рассказов и, в конце концов, богом самих рассказов. Ирхэцу — один из самых лёгких в обнаружении богов, потому что он устраивает приличные праздники вместе со своей то появляющейся, то исчезающей подругой Фенна, богиней Поэзии, и своим приятелем Пауллусом, богом празднеств.\n \n<b>Что он знает и как его найти:</b> Ирхэцу знает песни. Почти все песни. Плюс к тому он знает множество рассказов. В основном старые истории, но и современные тоже. Если вам нужно услышать утраченную песню или рассказ, он — ваш первый выбор.\n \nИрхэцу — не тонкий устроитель вечеринок. Чтобы найти его — ну, один из его аватаров — вам просто нужно разузнать, когда будет его следующая вечеринка. Если вы в большом мегаполисе, это не так уж трудно. Скорее всего, одна будет неподалёку в течение нескольких месяцев. Попасть на приглашение на вечеринку должно быть просто, если вы богатый и имеете связи.\n \nНо тут начинается сложная часть: заставить его заинтересоваться. Ему нужно слышать вас сквозь шум всей музыки, так что полезно, если вы телепат! Если нет — принесите плакат. Серьёзно. Как только вы привлечёте его внимание, он даст вам около десяти секунд своего времени, так что используй их с толком! Если вы вдохновите его рассказать историю или спеть песню, он это сделает. Возможно, это будет не та песня, что вам нужна… но, может быть, именно та.\n \n<h1>Джанис Альберит, Богиня Науки и Открытий</h1>\n \n<b>Кто она:</b> богиня науки всего лишь десять-пятнадцать тысяч лет в возрасте, что делает её одной из самых молодых богинь. Хотя она знает невероятное количество вещей, она не чинит из знаний склад. Для Джанис важен сам акт открытия. Никогда не довольствуясь тем, чтобы узнать что‑то из книги, если можно установить это эмпирически, всё, что Джанис знает, происходит из личного опыта.\n \nДжанис, по‑виду, предпочитает проводить эксперименты подальше от смертных глаз. Но она помогает некоторым мудрецам и учёным, которым нужна её особая экспертиза в самом искусстве науки.\n \n<b>Что она знает и как её найти:</b> Джанис знает невероятно много о физическом строении вселенной. Но большая часть этих знаний также доступна смертным — и с мудрецом связаться гораздо легче, чем с Джанис Альберит! Если вы знаете достаточно метафизики, чтобы понимать, чего мудрецы НЕ знают, Джанис может вам помочь.\n \nЕсли Джанис сочтёт ваш запрос стоящим, она поможет вам спроектировать эксперимент, который эмпирически ответит на ваш вопрос. Она делает это лучше любого смертного, так что если существует эксперимент, который даст ответ, Джанис Альберит может его разработать.\n \nНо фактическое ВЫПОЛНЕНИЕ эксперимента обычно ложится на вас. В редких случаях Джанис заинтересуется экспериментом и может помочь с его проведением. Она часто помогает и с логистикой: телепортирует вас в отдалённое место или приближает чрезвычайно большие объекты, чтобы вы могли их исследовать.\n \nСвязь с Джанис лучше доверить мудрецам и учёным. Вам придётся заплатить мудрецу, но сама Джанис не берёт плату. Если она решит помочь, это будет бесплатно.\n \n<h1>Лаэт, Богиня Времени</h1>\n \n<b>Кто она:</b> богиня самого времени обычно не считается богиней знаний. У неё есть доступ к огромному объёму информации о прошлом и будущем, но Лаэт отвечается за поддержание течения времени в этой части галактики. Она одна из богов нашего мира действует в масштабах, которые даже ваш автор не в состоянии по‑настоящему понять.\n \nКороче говоря, она сильно занята и не отвечает на призывы.\n \n<b>Что она знает и как её найти:</b> как богиня времени, она может найти ответы на всё, что когда‑либо происходило или когда‑либо произойдёт. По крайней мере, теоретически. О ней мало сведений, но известно, что она вмешивалась в историю нашего мира несколько раз — возможно, очень многих раз, кто знает — чтобы предотвратить ужасное будущее.\n \nКак и в случае со многими богами, если вы находите способ призвать Лаэт, это значит, что Лаэт <b>хочет</b>, чтобы вы её призвали. И, к сожалению, это, вероятно, означает, что вам придётся совершить что‑то, чтобы спасти мир. Но после того как вы спасёте мир, она обычно ответит на несколько вопросов, прежде чем уйти. Задайте их с толком."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>\n\n <h1>Miraverre, God of Sleep and Dreams</h1>\n\n<b>Who she is:</b> Miraverre runs the Dream Realm, a place where dreams actually happen. You may have visited it yourself. They say that if you wake up from a dream with the sensation that your dream was real, you were probably dreaming in Miraverre's realm.\n\nAlthough dreams seem to be what Miraverre concerns herself with most of the time, she is also the god of Sleep itself, and sometimes helps insomniacs.\n\n<b>What she knows and how to find her:</b> if you've had one of those \"it seemed too real\" dreams, and you need to remember it better, she can help you relive it. She also knows what has taken place in countless dreams over the millennia. She will rarely divulge the secret dreams of someone who is still alive, but she sometimes shares pieces of dreams from the long-deceased. \n\nIn general, calling on Miraverre for help is a long-shot. But if you want to reach her, just dream about her. She might choose to appear in your dream. \n\nAnd remember: you really don't want to upset her. She won't withhold sleep from you -- that idea would be offensive to her -- but she WILL turn all your dreams into horrific nightmares, driving you gibberingly insane within a month.\n\nJust... be polite, really. That's all it takes. She's a very easygoing elf by all accounts.\n\nMiraverre can also help you communicate with someone else who is sleeping at the same time. But that's beyond the scope of this book!\n\n <h1>Ormorek, God of Bitterness</h1>\n\n<b>Who he is:</b> This old dwarven god was superseded as the \"God of Dwarves\" long ago. Now he just lives in the dwarven capital and complains a lot.\n\n<b>What he knows and how to find him:</b> Ormorek is an old god, and he's known more gods than we have names for. Since he lives in New Aufghel, you can simply pay him a visit. If you pay his bar tab (NOT cheap), he might indulge your questions about another god, or a god-related incident. Just don't let him sell you anything.\n\n <h1>Talerra, God of Depression and Knowing the Truth</h1>\n\n<b>Who she is:</b> they say that when you're truly hopeless, the world becomes more clear. You can see reality for what it is. Of course, you're too depressed to do anything about it. That's Talerra in a nutshell. She spends most of the time comatose from depression. But on occasions when the moon is new, she wakes up and answers prayers.\n\n<b>What she knows and how to find her:</b> Talerra seems to have perfect knowledge of the past few decades. She also has imperfect knowledge of the future. But she doesn't have this knowledge stored away; she seems to answer questions for people by divining the information for them on the spot.\n\nThere is a price for this knowledge, though, and it's a harsh one. Divining the knowledge saps away part of your life force. Your sense of hope, specifically. And Talerra can't tell how much hope it's going to cost you. Typically, you'll lose hope for a few weeks or months. If your question is especially difficult to divine, you may lose hope for a year. And a tiny number of supplicants lose all hope forever.\n\nBut before you decide that \"losing hope for a month\" sounds like a reasonable price to pay, realize that without hope, you won't have the will to keep living. You will lie comatose, waiting for death. If someone doesn't feed you, bathe you, and care to your bed sores, you will die. Make preparations accordingly.\n\nIf you wish to proceed, contact your local sage. He can help you with the rituals. They aren't secret, but they're very complicated, and you need to get them right. If you're rich enough, hire an expert ritual master to assist you!\n\n <h1>Zare, God of Secrets</h1>\n\n<b>Who he or she is:</b> we know little about Zare. We don't even know Zare's avatars' preferred gender, if any. Zare is always hooded and mysterious.\n\n<b>What he or she knows and how to find them:</b> Zare knows secrets. (Not every secret. Just a lot of secrets.) But if Zare were to tell you the secret, it'd stop being a secret. So Zare would never willingly give away a secret without receiving a better secret in exchange.\n\nIf you have secrets that Zare might be willing to trade for, you can try to contact him or her. The method is, of course, a secret, but it's at least one that you can discover. Apparently there is a word, a strange and exceptionally long word, that, when spoken, summons Zare. The word only works once, though, and then it changes. Finding this word is quite difficult, but a sage should be able to help you -- for a very high fee, of course.": "<i>[Эта серия книг гоблинского мудреца Мулигу подробно описывает каждого бога, который мог бы помочь вам с вопросом, связанным со знаниями.]</i>\n\n<h1>Мирраверр, богиня сна и снов</h1>\n\n<b>Кто она:</b> Мирраверр управляет Царством снов, местом, где сны действительно происходят. Возможно, вы сами когда‑то его посещали. Говорят, что если вы просыпаетесь от сна с ощущением, что он был реальным, вы, вероятно, видели сон в царстве Мирраверр.\n\nХотя сны кажутся тем, чем Мирраверр занимается большую часть времени, она также богиня самого Сна и иногда помогает страдающим бессонницей.\n\n<b>Что она знает и как её найти:</b> если вам приснился один из тех снов «как будто слишком настоящий», и вам нужно его лучше вспомнить, она может помочь пережить его заново. Она также знает, что происходило во множестве снов на протяжении тысячелетий. Она редко раскрывает секретные сны кого‑то ещё живого, но иногда делится отрывками снов давно почивших.\n\nВ целом призыв Мирраверр за помощью — дело рискованное. Но если вы хотите достучаться до неё, просто помечтайте о ней. Она может выбрать появиться в вашем сне.\n\nИ помните: вам действительно не стоит её злить. Она не станет лишать вас сна — эта мысль оскорбила бы её — но она МОЖЕТ превратить все ваши сны в ужасающие кошмары, сведя вас с ума в течение месяца.\n\nПросто... будьте вежливы, вот и всё. По всем свидетельствам она очень спокойная эльфийка.\n\nМирраверр также может помочь вам связаться с кем‑то, кто спит в то же самое время. Но это выходит за рамки этой книги!\n\n<h1>Орморек, бог горечи</h1>\n\n<b>Кто он:</b> Этот старый дварфийский бог давно перестал быть «богом дварфов». Теперь он просто живёт в дварфийской столице и много ворчит.\n\n<b>Что он знает и как его найти:</b> Орморек — старый бог, и он знает больше богов, чем у нас имён. Поскольку он живёт в Нью‑Афгеле, вы можете просто навестить его. Если оплатите его счёт в трактира (НЕ дешёво), он может удовлетворить ваши вопросы о другом боге или о каком‑то событии, связанном с богами. Только не позволяйте ему вам что‑нибудь продать.\n\n<h1>Талерра, богиня депрессии и знания истины</h1>\n\n<b>Кто она:</b> говорят, что когда вы по‑настоящему безнадёжны, мир становится яснее. Вы видите реальность такой, какая она есть. Конечно, вы слишком подавлены, чтобы что‑то с этим сделать. Вкратце — это Талерра. Она большую часть времени пребывает в состоянии комы от депрессии. Но в те редкие дни, когда луна нова, она пробуждается и отвечает на мольбы.\n\n<b>Что она знает и как её найти:</b> похоже, Талерра прекрасно знает, что происходило за последние несколько десятилетий. Она также обладает неполным знанием будущего. Но это знание у неё не «в хранилище» — она, кажется, отвечает людям, выведывая информацию прямо на месте.\n\nЗа это знание есть плата — и она суровая. Выведывание забирает часть вашей жизненной силы. Конкретно — вашу надежду. И Талерра не в силах заранее сказать, сколько надежды это стоит. Обычно вы лишитесь надежды на несколько недель или месяцев. Если вопрос особенно труден для выведывания, вы можете потерять надежду на год. И крошечное число просителей навсегда теряют всякую надежду.\n\nНо прежде чем вы решите, что «потерять надежду на месяц» — разумная цена, поймите: без надежды у вас не будет воли жить дальше. Вы будете лежать в коме, ожидая смерти. Если кто‑то не будет кормить вас, купать и ухаживать за пролежнями, вы умрёте. Подготовьтесь соответствующим образом.\n\nЕсли вы пожелаете продолжить, обратитесь к местному мудрецу. Он поможет с ритуалами. Они не секретны, но очень сложны, и их нужно выполнять правильно. Если у вас достаточно средств, наймите мастера ритуалов!\n\n<h1>Заре, бог тайн</h1>\n\n<b>Кто он или она:</b> мы знаем о Заре очень мало. Мы даже не знаем предпочтительного гендера аватаров Заре, если таковой имеется. Заре всегда в капюшоне и таинственен.\n\n<b>Что он или она знает и как его/её найти:</b> Заре знает тайны. (Не все тайны. Но много тайных знаний.) Но если Заре расскажет вам секрет, он перестанет быть секретом. Поэтому Заре никогда добровольно не отдаст секрет без получения взамен более ценного секрета.\n\nЕсли у вас есть секреты, которыми Заре мог бы согласиться обменяться, вы можете попытаться связаться с ним или с ней. Метод, разумеется, хранится в секрете, но это тот секрет, который вы в принципе можете открыть. По всей видимости, есть слово, странное и исключительно длинное, которое при произнесении призывает Заре. Но это слово действует лишь один раз, а затем изменяется. Найти это слово довольно трудно, но мудрец должен суметь помочь вам — за очень высокую плату, разумеется."
"<i>[This series of books by the goblin sage Muligu details each god that might be able to help you with a knowledge-related question.]</i>\n\n <h1>Final Lesson: Avoid The Traps</h1>\n\nThe final lesson is that gods are usually not the best way to find answers. These volumes only cover the godly means of answering questions, but my separate twenty-volume set covers all the <i>mortal</i> means of divination, researching, and discovery, and you should <i>really</i> try those first. Mortals are simply more reliable in general. Even when the gods can't or won't help you, some mortal somewhere usually can.\n\n(A hint: find Garakh's Bazaar. The god of commerce cares little for knowledge as a commodity, but his bazaar does attract commerce-oriented sages.)\n\nWhat you absolutely <i>don't</i> want to do is contact just any random god. When you begin searching for ways to summon gods, you'll find methods for contacting gods such as Melkar, Norala, Strekios, or Ri-Shin. But just because you CAN contact a god doesn't mean you SHOULD. Most gods resent contact from mortals seeking answers.\n\nBe <i>especially</i> wary of summoning the following gods. Contacting them may seem like a good idea, but it's probably not. (And we'll leave off the obviously-insane ideas, like contacting the God of Hate just to ask him a question.)\n\n<b>Akhisa, Patience, Cunning, and Spiders:</b> Akhisa often offers deals to clever mortals. The deals always seem to have a loophole that the clever mortal can abuse, turning a bad deal into a great one. But repeat after me: <i>you are not more cunning than the god of cunning.</i> Unless your very soul and the souls of your family are a cost you're willing to pay, you can't afford to do \"business\" with Akhisa.\n\n<b>Gulagra, Anarchy:</b> Sages hear this tale all too often: Gulagra comes to you in a dream with the answer to a problem you've been desperate to solve. But when you awaken, you can't quite remember the solution. You help Gulagra in whatever ways are needed, desperate to re-envision the dream. But the dream was a lie. Gulagra will drive you mad before ever giving you any answers.\n\n<b>Remga, Piracy, Violence, and Rape:</b> it should go without saying that when Remga's \"ambassadors\" sail up with an offer for you, you should run -- not walk -- away from that city as quickly as you can. Remga only rarely honors his deals. More than likely, you'll just end up dead.\n\n<b>Zhia Lian, Surprise, Whimsy, and Unpredictability:</b> those who seek Zhia Lian can often find her, especially if she thinks you're interesting. And it does sometimes occur that Zhia Lian answers a question for you. But she is by definition unpredictable, and if she's in a poor mood, you could end up turned into a sad song or a talking worm or a magical candlestick whose flame burns with your purest thoughts. God-level unpredictability is very bad for your health.\n\n <h1>Parting Thoughts</h1>\n\nOnly contact a god as a last resort.\n\nIf you must contact a god, expect the price to be very high.\n\nAnd if a god ever approaches YOU with an offer, it's going to be dangerous. Very dangerous. No exceptions.": "<i>[Эта серия книг гоблинского мудреца Мулигу подробно описывает каждого бога, который мог бы помочь вам с вопросом, связанным со знанием.]</i>\n\n <h1>Последний урок: избегайте ловушек</h1>\n\nПоследний урок таков: боги обычно не лучший способ найти ответы. Эти тома охватывают только божественные способы получения ответов, но мой отдельный двадцатитомный цикл посвящён всем смертным способам предсказания, исследования и открытия, и вам <i>действительно</i> стоит попробовать их в первую очередь. В целом смертные просто надёжнее. Даже когда боги не могут или не хотят помочь, где‑то всегда найдётся смертный, кто сможет.\n\n(Подсказка: найдите Базар Гараха. Бог торговли мало заботится о знании как о товаре, но его базар привлекает мудрецов, ориентированных на коммерцию.)\n\nТо, чего вам определённо <i>не</i> стоит делать, — это обращаться к какому попало богу. Когда вы начнёте искать способы призвать богов, вы найдёте методы контакта с такими богами, как Мелкар, Норала, Стрекиос или Ри-Шин. Но то, что вы МОЖЕТЕ связаться с богом, не значит, что вам СЛЕДУЕТ это делать. Большинство богов негодует от вмешательства смертных, ищущих ответы.\n\nБудьте <i>особенно</i> осторожны при призыве следующих богов. Контакт с ними может показаться хорошей идеей, но, вероятно, таковой не является. (И мы здесь опустим очевидно безумные идеи, например связываться с Богом Ненависти просто чтобы задать ему вопрос.)\n\n<b>Ахиса — богиня Терпения, Хитрости и пауков:</b> Ахиса часто предлагает сделки хитрым смертным. Сделки всегда кажутся имеющими лазейку, которой хитрый смертный может воспользоваться, превратив плохую сделку в отличную. Но повторяйте за мной: <i>вы не хитрее бога хитрости.</i> Если только ваша собственная душа и души вашей семьи не та цена, которую вы готовы заплатить, вам не по карману «делать бизнес» с Ахисой.\n\n<b>Гулагра — бог Анархии:</b> Мудрецы слышат эту сказку слишком часто: Гулагра приходит к вам во сне с ответом на проблему, над решением которой вы отчаянно бьётесь. Но когда вы просыпаетесь, вы не можете до конца вспомнить решение. Вы помогаете Гулагоре всеми возможными способами, отчаянно пытаясь воссоздать сон. Но сон был ложью. Гулагра сведёт вас с ума, прежде чем даст хоть какие‑то ответы.\n\n<b>Ремга — бог пиратства, насилия и изнасилования:</b> само собой разумеется, что когда «послы» Ремги приплывают с предложением, вы должны бежать — не идти — как можно скорее прочь из этого города. Ремга лишь изредка ч honour свои сделки. Скорее всего вы просто погибнете.\n\n<b>Жиа Лиан — богиня Удивления, Каприза и Непредсказуемости:</b> те, кто ищет Жиа Лиан, часто могут её найти, особенно если она сочтёт вас интересным. И порой Жиа Лиан действительно отвечает на вопрос. Но по определению она непредсказуема, и если у неё плохое настроение, вы можете оказаться превращённым в грустную песню, говорящую червячка или волшебный подсвечник, чьё пламя горит вашими самыми сокровенными мыслями. Непредсказуемость божественного уровня очень вредна для вашего здоровья.\n\n <h1>Прощальные мысли</h1>\n\nОбращайтесь к богу только в крайнем случае.\n\nЕсли вам придётся обратиться к богу, рассчитывайте на очень высокую цену.\n\nИ если бог когда‑нибудь подойдёт к ВАМ с предложением, это будет опасно. Очень опасно. Без исключений."
"<h1>Leeka and the Blade Trials, Chapter 1</h1>\n\n<i>by Garauna, daughter of Umaran</i>\n\nLeeka stomped angrily through the swamp, the legendary blade Heartseeker slung carelessly behind her back. She was really tired of Heartseeker's bullshit.\n\nEspecially since the sword was why she was here, in the swamps of Untanigar, in the remotest regions of the Crone Hegemony. Somewhere in this swamp were the Blade Trials of Melkar. Apparently.\n\n\"I tell you, you orcs are more like goblins than you want to admit,\" came a raspy voice from her back. Heartseeker sounded like the orc elders Leeka'd known growing up, their voices ruined from decades of smoking raw gur-horta. But the elders had been wise. They chose their words carefully. \"You think you're big important races. But you're both so shitty!\"\n\n\"Shut up, sword.\"\n\n\"You don't see elves living in this fucking swamp, do ya? This is goblin territory. And swamp-orc territory. You live in the shitholes of the world because you've been run out of everywhere else. You're like a novice swordsman who decides after one lesson that he's a master, and starts challenging experts to duels. And no surprise, you lose. But even though you keep getting beat down, you just keep challenging people to duels! You orcs think you're these noble savages, worthy of respect, but you're not even master swordsmen, let alone--\"\n\nLeeka drew the sword in a fraction of a second and held it in front of her face. \"I <b>AM</b> a master swordsman!\" She tried to keep her fury from boiling over, but it was escaping into her voice. \"And you are an instrument. Nothing more. And if you don't shut up, I will hurl you into this swamp. You will become some swamp-goblin's novelty talking vegetable chopper for the next hundred years! Is that your wish, sword?\"\n\nShe held the blade in front of her, waiting for a response. She shook it a bit. When it said nothing, she sighed and sheathed it onto her back.\n\n\"I didn't mean YOU weren't a master swordsman,\" said the sword, softly, a moment later. \"It was a metaphor. That's exactly what I'm saying! You orcs can't tell nuance from a punch to the face! If you -- wait WAIT WAIT!\" Leeka had drawn the blade again and was winding up to hurl Heartseeker. \"Wait! Look, we're almost there. That's the trial. Look! No, look where I'm pointing!\" The blade adjusted itself in her hand to tilt a few degrees to the right. \n\nIn the distance was a hill shrouded in misty swamp vapors, and embedded in that hill was a huge stone door.\n\nIt took another half hour to reach the door, plus a fifteen minute argument wherein Leeka shoved Heartseeker into a rotten tree until it apologized. When she finally approached the massive stone entryway, it was dusk.\n\nLeeka stared at the door for a minute, hands on hips, considering it. It was huge, almost twice as tall as her, and made of old granite slabs, but it looked like it opened easily. A square stone button was visible to one side -- a sign of dwarven engineering. No vines or fungus covered the button and the huge stone hinges were miraculously free of growth. In fact, the whole area was very well maintained. Someone came here often. Very often, probably, or it would have goblin squatters living in it. And if there were goblins, she would have met the advance guards by now. Still, something else could be squatting, perhaps. After a minute of considering, Leeka kicked the button with her foot, then dodged out of the way of any sudden projectiles.\n\nThe door slowly scraped open with a deafening noise. No arrows shot out. Inside was a wide stone hallway, perhaps twenty feet across, and not far up ahead, the hall abruptly turned left. There were no other visible features aside from a second stone switch on the inside, presumably to reopen the door.\n\nAs soon as the door finished sliding out of the way it immediately began sliding closed. Leeka made no motion to enter, just stood and studied. When the door had closed, she turned and went to make camp a few hundred feet away.": "<h1>Лика и Испытания Клинка, Глава 1</h1>\n\n<i>от Гарауны, дочери Умарана</i>\n\nЛика сердито топала по болоту, легендарный клинок Хартсикер небрежно свисал у неё за спиной. Ей порядком надоело дерьмо Хартсикера.\n\nОсобенно учитывая, что из‑за этого меча она оказалась здесь, в болотах Унтанигара, в самых отдалённых регионах Гегемонии Старух. Где‑то в этом болоте должны были находиться Испытания Клинка Мелкара. По слухам.\n\n«Говорю тебе, вы, орки, больше похожи на гоблинов, чем хотели бы признать», — сиплый голос донёсся из‑за её спины. Хартсикер звучал как старейшины орков, которых Лика знала с детства, их голоса были испорчены десятилетиями курения сырого гур‑хорты. Но старейшины были мудры. Они тщательно взвешивали слова. «Вы думаете, что вы какие‑то важные расы. А на самом деле вы — отстой!»\n\n«Заткнись, меч».\n\n«Ты не видишь, чтобы эльфы жили в этом чёртовом болоте, да? Это территория гоблинов. И территория болотных орков. Вы живёте в помойках мира потому, что вас везде выгнали. Вы как новичок‑фехтовальщик, который после одного урока решает, что он мастер, и начинает вызывать экспертов на дуэль. И, как ни удивительно, он проигрывает. Но хотя его всё время бьют, он продолжает вызывать людей на дуэли! Вы, орки, считаете себя благородными дикарями, достойными уважения, но вы даже не мастера меча, не то что—»\n\nЛика в долю секунды выхватила меч и поднесла его ко лбу. «Я <b>ДЕЙСТВИТЕЛЬНО</b> мастер меча!» Она пыталась не дать ярости закипеть, но тон выходил из‑под контроля. «А ты — инструмент. Не больше. И если не замолчишь, я швырну тебя в это болото. Ты станешь какой‑то болотной гоблинской безделушкой — говорящей овощерезкой на сто лет! Твое желание, меч?»\n\nОна держала клинок перед собой, ожидая ответа. Потрясла его немного. Когда он промолчал, она вздохнула и вложила его обратно за спину.\n\n«Я не имел в виду, что ТЫ не мастер меча», — мягко произнёс меч через мгновение. «Это была метафора. Именно это я и говорю! Вы, орки, не отличаете нюанс от удара в лицо! Если ты — постой, ПОСТОЙ ПОСТОЙ!» Лика снова выхватила клинок и уже размахивалась, чтобы швырнуть Хартсикера. «Погоди! Смотри, мы почти пришли. Это испытание. Смотри! Нет, смотри туда, куда я указываю!» Клинок сам немного повернулся в её руке вправо.\n\nВдалеке возвышался холм, окутанный туманными болотными испарениями, и в этом холме была вделана громадная каменная дверь.\n\nДобраться до двери заняло ещё полчаса, плюс пятнадцатиминутная перебранка, в ходе которой Лика вонзила Хартсикера в гнилое дерево, пока тот не извинился. Когда она, наконец, подошла к массивному каменному входу, было уже сумерки.\n\nЛика минуту стояла, глядя на дверь, руки на бедрах, обдумывая. Дверь была огромна, почти вдвое выше её самой, сложенная из старых гранитных плит, но казалось, что открыть её можно без труда. Квадратная каменная кнопка была видна сбоку — знак дварфского мастерства. Кнопка и гигантские каменные петли удивительно не были покрыты лианами или грибком. На самом деле вся местность была очень ухожена. Кому‑то приходилось сюда часто заходить. Очень часто, наверное, иначе бы там уже сидели гоблины‑захватчики. А если бы были гоблины, она бы уже встретила авангардные отряды. Всё же кто‑то мог оккупировать это место и иначе. Подумав минуту, Лика пнула кнопку ногой и тут же отскочила в сторону на случай внезапных снарядов.\n\nДверь медленно заскрипела и с оглушительным шумом отъехала в сторону. Стрел не вылетело. Внутри был широкий каменный коридор, примерно шесть метров в ширину, и не так далеко вперёд коридор внезапно поворачивал налево. Больше ничто не выделялось, кроме второго каменного переключателя внутри, предположительно для повторного открытия двери.\n\nЕдва дверь полностью отъехала, как тут же начала закрываться. Лика не спешила входить, просто стояла и вглядывалась. Когда дверь захлопнулась, она развернулась и расположилась лагерем в нескольких сотнях футов от входа."
"<h1>Leeka and the Blade Trials, Chapter 2</h1>\n\n\"Okay, so I'm trying not to call you stupid here, but you're making camp in a swamp instead of going indoors. Can you just explain the logic? The door's right there! You aren't going to sleep well in the swamp. You'd be better off getting this over with.\" Heartseeker lay resting against Leeka's backpack as she struggled to flatten the earth enough to let her sit.\n\nLeeka glared at the sword, snarled, then continued with her work.\n\n\"Come on,\" said the sword. \"We need to work together here. I'm on trial just as much as you!\"\n\nLeeka opened her pack and unwrapped dinner, a portion of jerky-flavored lembas brick that she'd bought in Ormala City two weeks ago. She sat down and tore off a piece of the brick with her teeth, sweat streaming down her face in the fetid night air. She picked up Heartseeker and considered its heft. A clunky blade, a bit too large for what it was. A bit too heavy.\n\nHer mother had wielded this blade in many battles, and taught young Leeka that one day the blade would be handed down to her. And after some misadventures, it had... but the sword couldn't do the fabulous things her mother could make it do. No fire, no sparks, no slicing through metal like it was butter. It was a sharp, resilient blade with keen fighting instincts. But her favorite blade at home had all that. Of course, Heartseeker could talk and think, but that didn't seem like much of a power. She would really have preferred the sparks.\n\n\"I should have brought my regular blade,\" she muttered for the fiftieth time.\n\n\"I keep telling you, you can't do the Blade Trials of Melkar without a Blade of Melkar!\"\n\n\"I mean that I would bring two swords. I would fight with my sword Fell Light, and then use you in the ceremony at the end. Or whatever it is that we need to do.\" She bit off another jerky-flavored bite. The taste was disgusting, a mixture of jerky and cake. \"Do you still remember nothing of these trials, sword?\"\n\n\"I told you, nothing!\" said the sword. \"Something makes me forget the times when I'm around here. Probably these swamp gasses. And I'm not the only one. Your mother never told you about these trials, did she? She forgot, same as me.\"\n\nLeeka pondered this. It meant that Leeka herself might forget the trials, too. She felt fear creeping into her mind and with practiced ease she drove it away. \"Sword, you must have something useful you can tell me about the trials. Not of the trials themselves, but... history. Hearsay. Anything.\"\n\n\"I know that there used to be a lot more Blades of Melkar like me, but now there's only three of us. Somehow we can get... broken, or shattered or something inside there. But we have to complete the trials with each new owner to unlock all our powers.\"\n\nShe pushed down her impatience. \"Yes, yes. What else can you tell me? Tell me about Melkar. Did he say anything about the trials?\"\n\n\"What? Look, I've never met any gods. I don't think I have, anyway.\"\n\n\"Well, Melkar is the god of hunting and self-sufficiency, so why did he make magic swords anyway? Wouldn't he prefer magic bows?\"\n\n\"Oh, now I see the problem. No, Melkar didn't make us. We used to be Blades of Romast. But Romast died and Melkar took over. This trial was made by Romast, but it's been bastardized to suit Melkar's purposes. You know how Melkar's the patron of mutts like your mom and you? Uh, ... no offense.\"\n\nLeeka rolled her eyes. Her mother had been a half-human, but her father was an orc. So Leeka was a quarter human. And never a day went by that her tribe hadn't reminded her of her freakishness. The words held no power on her now. \"Go on.\"\n\n\"And look at me: I'm a mutt too. I'm too top-heavy for a one-hander and too light for a two-hander. I was made for a race that went extinct thousands of years ago! I don't really belong anywhere. Just like you don't belong.\"\n\nLeeka tensed in surprise. Its words had managed to hurt! <i>Everyone wants to belong,</i> she told herself. But some people just weren't destined to fit in. Melkar's chosen people: the bastards, the lost, the obsolete. Those who have to go it alone. Or almost alone.\n\nAs the sun set, Leeka took her stolen viewoscope out of her bag and started watching the door, her eyes straining to make out shapes in the gloom. Nothing yet. She settled in to wait and see if her hunch was right.": "<h1>Лика и Испытания Клинка, Глава 2</h1>\n\n\"Хорошо, я стараюсь не называть тебя тупой, но ты встаёшь лагерем в болоте вместо того, чтобы зайти внутрь. Объясни логику? Дверь прямо там! В болоте ты не выспишься. Тебе лучше поскорее это закончить.\" Хартсикер лежал, прислонившись к рюкзаку Лики, пока она пыталась выровнять землю, чтобы сесть.\n\nЛика уставилась на меч, прорычала, затем продолжила работу.\n\n\"Давай же,\" сказал меч. \"Нам нужно работать вместе. Я на испытаниях не меньше тебя!\"\n\nЛика открыла свой мешок и развернула ужин, брусок лэмбаса со вкусом вяленого мяса, который она купила в городе Ормала две недели назад. Она села и откусила кусок бруска зубами, пот струился по её лицу в зловонном ночном воздухе. Она подняла Хартсикер и оценила его вес. Громоздкий клинок, немного слишком большой для того, чем он был. Немного слишком тяжёлый.\n\nЕё мать носила этот клинок во многих боях и научила молодую Лику, что однажды клинок достанется ей. И после некоторых приключений так и произошло... но меч не мог делать тех чудес, которые могла творить её мать. Никакого огня, никаких искр, никаких разрезов металла, как масло. Это был острый, выносливый клинок с хорошими боевыми инстинктами. Но её любимый клинок дома умел всё это. Конечно, Хартсикер умел говорить и думать, но это не казалось великой силой. Ей бы гораздо больше понравились искры.\n\n\"Мне следовало взять мой обычный клинок,\" пробормотала она в пятьдесят раз.\n\n\"Я постоянно тебе говорю, ты не сможешь пройти Испытания Клинка Мелкара без Клинка Мелкара!\"\n\n\"Я имела в виду, что взяла бы два меча. Я бы сражалась своим мечом Фелл Лайт, а затем использовала тебя в церемонии в конце. Или что бы там нам ни нужно было сделать.\" Она откусила ещё кусок бруска. Вкус был отвратительным, смесь вяленого мяса и кекса. \"Ты до сих пор ничего не помнишь об этих испытаниях, меч?\"\n\n\"Я говорю тебе, ничего!\" — сказал меч. \"Что‑то заставляет меня забывать, когда я здесь. Наверное, эти болотные газы. И я не единственный. Твоя мать тоже ничего не рассказывала тебе про эти испытания, не так ли? Она забыла, как и я.\"\n\nЛика задумалась. Это значило, что и она сама может забыть об испытаниях. В её голове закралась боязнь, и она отогнала её с отработанной лёгкостью. \"Меч, у тебя должно быть что‑то полезное про эти испытания. Не о самих испытаниях, а... история. Слухи. Что‑нибудь.\"\n\n\"Я знаю, что раньше было гораздо больше Клинков Мелкара, подобных мне, но теперь нас осталось только трое. Как‑то мы можем ломаться, или раскалываться, или что‑то внутри. Но мы должны пройти испытания с каждым новым владельцем, чтобы открыть все наши силы.\"\n\nОна подавила своё нетерпение. \"Да, да. Что ещё ты можешь мне рассказать? Скажи что-нибудь о Мелкаре. Он говорил что‑то об испытаниях?\"\n\n\"Что? Послушай, я никогда не встречал богов. По крайней мере, я так не думаю.\"\n\n\"Ну, Мелкар — бог охоты и самодостаточности, так зачем же ему магические мечи? Разве он не предпочёл бы магические луки?\"\n\n\"О, теперь я вижу проблему. Нет, Мелкар нас не создавал. Мы раньше были Клинками Ромаста. Но Ромаст умер, и Мелкар взял на себя. Это испытание создал Ромаст, но его извращали, чтобы служить целям Мелкара. Ты знаешь, что Мелкар — покровитель помесей вроде твоей матери и тебя? Эм... без обид.\"\n\nЛика закатила глаза. Её мать была наполовину человеком, но отец — орком. Так что Лика была на четверть человеком. И ни дня не проходило, чтобы её племя не напоминало ей о её странности. Эти слова теперь не имели над ней власти. \"Продолжай.\"\n\n\"И посмотри на меня: я тоже помесь. Я слишком тяжёл спереди для одноручного, и слишком лёгок для двуручного. Меня сделали для расы, которая вымерла тысячи лет назад! Мне не место нигде. Так же, как и тебе не место.\"\n\nЛика напряглась от неожиданности. Его слова умудрились задеть! Все хотят принадлежать, — сказала она себе. Но некоторым людям просто не суждено влиться в общество. Избранные Мелкара: ублюдки, потерянные, устаревшие. Те, кто должны идти в одиночестве. Или почти в одиночестве.\n\nКогда солнце садилось, Лика достала из сумки украденный видоскоп и стала наблюдать за дверью, напрягая глаза, чтобы разглядеть силуэты в сумраке. Пока ничего. Она устроилась ждать и посмотреть, верна ли её догадка."
"<h1>Leeka and the Blade Trials, Chapter 3</h1>\n\nThe night was at its darkest when Leeka suddenly jerked awake. A loud scraping sound was coming from the door. Leeka snatched the viewoscope from the ground, threw her pack on her back, and charged toward the door. \n\nA pair of torches lit a pair of orcs at the stone door, waiting patiently for it to open. She stumbled in the dark, her orcish vision little help in the near-pitch blackness, but she was heartened to hear that even though the figures were shouting to be heard, the horrendous scraping of the door muffled their words into gibberish. The sound would muffle her approach as well.\n\nShe reached the door after the figures had already gone through. She could see they had just turned left in the hall ahead, their torches casting complex shadows on the halls inside. The door was closing, so Leeka slipped in and crouched in the gloom. After another moment, the door stopped with a final thud and the air instantly became still. She was inside. The silence was startling in its relief.\n\nUp ahead, one of the figures was talking, and a few words were disconcertingly loud in the sudden quiet. \"BE ANY DAY NOW...\" then his words became indecipherable as he lowered his voice. It was an orcish voice, but speaking the Human language. And the voice was familiar.\n\nShe slunk forward to where the hall turned, then watched as they slowly worked their way down the hall. Curious.\n\n\"What are you waiting for?\" hissed the sword. \"We need to see where they go!\"\n\n\"Shut up. Watch their feet! See how they move?\" Leeka hadn't drawn Heartseeker, but she knew it could see everything she saw. They watched in silence until the figures took a left-hand turn and their torchlight slowly faded from view. \n\n\"What were they doing?\" asked Leeka. \"It was like a dance. Forward, forward, right, then right right back, then...\"\n\n\"Knight's moves.\" Heartseeker's voice was low and intense. It was thinking. \"It's from a boring old crone game called chess. We need light. Don't step anywhere without light!\"\n\nLeeka dug a torch from her bag. She didn't use torches often. She'd inherited her father's excellent low-light vision, and her usual sword could light up on command. But here she was with the supposedly legendary Heartseeker and still had to use a torch! She managed to light it, and held the torch above her head while she drew Heartseeker with her other hand. The flickering light showed a grid pattern on the floor. And above, the ceiling had many holes where spears or darts no doubt descended. A trap corridor.\n\n\"Okay, the hallway floor is a grid eight tiles wide, with one tile protruding from the board. That's where you stand first. And see how lots of the tiles are black instead of white? You can't step on those. It's a puzzle. You have to get down the hall making only knight's moves and never standing on an invalid square. Okay, step onto the first square. I don't think that counts as a move, you just start here. So! Take two squares forward, then one square left.\" Leeka did as instructed, her eyes on the ceiling. Each tile moved very slightly when she stepped onto it, but nothing shot at her. \"Now again, two squares forward and then one square left. Now step left two squares, then one back. No, best to keep facing forward. Just step backwards. If you turn your body, the directions change. My 'lefts' and 'rights' would get confusing.\"\n\nLeeka slowly and calmly worked her way down the corridor under Heartseeker's guidance. When the voices ahead were gone and their torchlight couldn't be seen, she asked, \"how do you know to do this?\" She continued to move in the strange patterns. Forward forward right, right right forward, forward forward left...\n\n\"I told you: before I was a Blade of Melkar I was a Blade of Romast. Romast! You know, the god of martial arts?\"\n\n\"That was before my time.\"\n\n\"Well no shit, it was thousands of years ago! But he was a great god! An orc god! And you learned nothing of him?!\"\n\nLeeka gave no answer. She took three more steps and then stood still.\n\n\"Oh,\" said Heartseeker after a moment. \"You need more directions. Okay, left left forward, forward forward right. Anyway, Romast loved chess. His priests taught that if you were good at chess you'd be better at martial arts.\"\n\n\"Is that true?\"\n\n\"Nah. Now that Romast is dead, I have to admit: it's always just seemed like a game to me. It teaches almost nothing about martial arts. The stuff you learn from it is just, like, basic ideologies. Nothing you can't learn in easier ways. Those old monks thought they were gaining skill by playing chess, but I think they were actually gaining skill the normal way: by fighting every day. Forward forward left, then backwards backwards left. Then forward forward left again. That was a tricky bit! Okay, forward forward right.\"\n\nThey turned the corner and the grid pattern finally ended. The hall ended in a pair of wooden doors. The left-hand door was somewhat open and light was coming from beyond, so Leeka cautiously followed the light.": "<h1>Лика и Испытания Клинка, Глава 3</h1>\n\nНочь была в самой своей темноте, когда Лика вдруг вскинулась. Из двери доносился громкий скребущий звук. Лика схватила видоскоп с пола, набросила за спину рюкзак и кинулась к двери.\n\nПара факелов освещала двух орков у каменной двери, терпеливо ожидавших, пока она откроется. Она споткнулась в темноте; её орочье зрение мало помогало в почти кромешной тьме, но её ободрило то, что, хотя фигуры громко кричали, ужасающий скрип двери заглушал их слова до бессмыслицы. Звук также заглушит и её подступ.\n\nОна подошла к двери после того, как фигуры уже прошли. Видно было, что они только что свернули налево в коридоре впереди; их факелы отбрасывали сложные тени по залам внутри. Дверь закрывалась, поэтому Лика проскользнула внутрь и примостилась в полумраке. Ещё через мгновение дверь захлопнулась с окончательным глухим стуком, и воздух мгновенно стал неподвижен. Она была внутри. Тишина была поразительной в своём облегчении.\n\nВпереди одна из фигур говорила, и несколько слов звучали тревожно громко в внезапной тишине. \"БУДЕТ ЛЮБЫМ ДНЁМ...\" — затем его слова стали нечитаемыми, когда он понизил голос. Это был орочий голос, но говоривший на человеческом языке. И голос был знаком.\n\nОна подкралась вперёд к месту, где коридор поворачивал, и затем наблюдала, как они медленно двигались по коридору. Любопытно.\n\n«Чего вы ждёте?» прошипел меч. «Нам нужно увидеть, куда они пойдут!»\n\n«Заткнись. Смотри на их ноги! Видишь, как они двигаются?» Лика не выхватывала Хартсикера, но знала, что он видит всё, что видит она. Они молча наблюдали, пока фигуры не свернули налево и их факельный свет медленно не исчез из виду.\n\n«Что они делали?» — спросила Лика. «Это было как танец. Вперёд, вперёд, вправо, потом сразу вправо назад, затем...»\n\n«Ходы коня». Голос Хартсикера был низким и напряжённым. Он думал. «Это из старой занудной старухиной игры — шахмат. Нам нужен свет. Не ступай никуда без света!»\n\nЛика вытащила из мешка факел. Она редко пользовалась факелами. Она унаследовала от отца отличное зрение в условиях слабого света, и её обычный меч мог зажигаться по команде. Но тут она с якобы легендарным Хартсикером и всё равно была вынуждена использовать факел! Ей удалось его зажечь, и она держала факел над головой, пока другой рукой выпускала Хартсикера из ножен. Мерцающий свет выявил на полу узор в виде сетки. А над головой потолок был усыпан множеством отверстий, откуда, несомненно, могли падать копья или дротики. Ловчий коридор.\n\n«Хорошо, пол коридора — сетка шириной в восемь клеток, с одной клеткой, выступающей из доски. Вот где ты становишься сначала. И видишь, как многие клетки чёрные, а не белые? На них нельзя ступать. Это головоломка. Ты должна пройти по коридору, делая только ходы коня и ни разу не встать на недопустимую клетку. Ладно, ступай на первую клетку. Я не думаю, что это считается ходом, ты просто начинаешь здесь. Значит! Две клетки вперёд, затем одна влево». Лика сделала, как велено, глядя на потолок. Каждая клетка чуть-чуть шевелилась, когда она на неё наступала, но ничего в неё не выстрелило. «Теперь снова: две клетки вперёд и одна влево. Теперь шагни влево на две клетки, затем одну назад. Нет, лучше держать лицо вперёд. Просто сделай шаг назад. Если повернёшь тело, направления изменятся. Мои \"влево\" и \"вправо\" запутаются».\n\nЛика медленно и спокойно продвигалась по коридору под руководством Хартсикера. Когда голоса впереди исчезли и их факельный свет стал невидим, она спросила: «Откуда ты знаешь, как это делать?» Она продолжала двигаться в этих странных сочетаниях. Вперёд-вперёд-вправо, вправо-вправо-вперёд, вперёд-вперёд-влево...\n\n«Я же говорил: прежде чем стать Клинком Мелкара, я был Клинком Ромаста. Ромаста! Знаешь, бога боевых искусств?»\n\n«Это было до моего времени».\n\n«Ну что ты, это было тысячи лет назад! Но он был великим богом! Оркским богом! И ты ничего не знаешь о нём?!»\n\nЛика не ответила. Она сделала ещё три шага и затем встала неподвижно.\n\n«Ох», — сказал Хартсикер спустя мгновение. «Тебе нужно больше указаний. Лево-лево-вперёд, вперёд-вперёд-вправо. В общем, Ромаст обожал шахматы. Его жрецы учили, что если ты хорош в шахматах, ты станешь лучше в боевых искусствах».\n\n«Это правда?»\n\n«Нет. Теперь, когда Ромаст мёртв, должен признать: для меня это всегда была просто игра. Она почти ничему не учит в боевых искусствах. То, что из неё выносишь, — просто базовые идеологии. Ничего, чего нельзя было бы выучить проще. Те старые монахи думали, что приобретают мастерство, играя в шахматы, но я думаю, что они на самом деле приобретали его обычным путём: сражаясь каждый день. Вперёд-вперёд-влево, затем назад-назад-влево. Потом опять вперёд-вперёд-влево. Это был хитрый момент! Ладно, вперёд-вперёд-вправо».\n\nОни свернули за угол, и узор сетки наконец закончился. Коридор упирался в пару деревянных дверей. Левая дверь была приоткрыта, и из-за неё шёл свет, так что Лика осторожно направилась к свету."
"<h1>Leeka and the Blade Trials, Chapter 4</h1>\n\n\"You're taking too long,\" hissed the blade on her back. \"Go inside, they're getting away.\"\n\nLeeka snarled and ignored Heartseeker as she carefully examined the door. Then she pushed it open and looked at the room beyond. She was not an accomplished trap-finder, but she knew the place held traps, so it would be folly to hurry forward. She drew the sword.\n\n\"What are you... this is undignified!\" stage-whispered the sword as Leeka jabbed it into the ground in front of her.\n\n\"You're not good for much, but at least you're nearly unbreakable. So shut up and be my trap-detector.\" Leeka cautiously stepped into the room. It was another hallway, but this time it was quite narrow, perhaps five feet wide, and the end of the hallway was only thirty feet ahead, ending in another wooden door. She could see no sources of light besides her torch. The walls and ceiling had once been painted, but now had only a few flecks of paint. She touched the floor, then the walls, cautiously. It felt like smooth damp stone, nothing more.\n\n\"They already did a floor trap. The next trap will be very different,\" said Heartseeker.\n\n\"How do you know?\"\n\n\"Romast's priests made this place. And they were... well, formulaic. You test one skill, then another, then the next. Repeating the same test would waste everybody's time.\"\n\n\"Hmm.\" Leeka was unconvinced, but had to admit that if there were traps on the floor, walls, or ceiling, she couldn't find them. She proceeded down the hallway slowly. As she passed the halfway point, she felt suddenly cold, then felt pain on her shoulder. Snarling, she spun around in time to see a translucent hand disappear into the wall. A ghost!\n\nFrom inside the walls came eerie laughter. Then a ghost stepped from the wall to block her path forward. Turning in panic, she found another ghost already blocked her escape. Two ghosts.\n\nBecause of Heartseeker's awkward weight, she needed both hands to fight well. She threw the torch at the ghost in front of her. The ghost dodged it, and it hit the ground near the door. Curious: it must be at least somewhat tangible or it wouldn't have dodged. She stepped toward the ghost, her mind working hard to shut out the screaming panic she felt. She had never fought a ghost.\n\nThe ghost seemed to be made of smoke, but the outline of a person could easily be seen. Its hands were outstretched and its face an inscrutable bank of laughing fog. She stepped forward and swung Heartseeker, slicing through its arm and torso. There was slight give to the blade, as if she was chopping water. The ghost's other hand shoved her and she stepped back, reeling from sudden cold. The ghost seemed unharmed by her attack. \n\n\"How do I fight ghosts?!\" yelled Leeka as the second ghost clawed at her back. She hacked at it, then pushed into it, trying to flee past it, but the ghost shoved her back. Her skin was covered in ice where it had touched her. She was trapped between the two ghosts.\n\nThe ghosts attacked together, one in front and one behind, and Leeka began slicing madly in panic. She managed to disrupt one, causing it to stop attacking for a moment, but at the same time the ghost behind her struck, reaching right through her backpack to grasp the small of her back. She screamed in pain and turned to hack that one too, but the first was already reconstituting.\n\n\"The head,\" said Heartseeker. \"The head seems weakest! You can disorient them.\"\n\nLeeka swung at the nearest ghost's head and it did dissipate, but quickly reformed. \"Not working!\"\n\n\"Keep doing it! It's the only thing that even slows them down!\"\n\nLeeka spun to face the other ghost and sent Heartseeker through its head. Then she turned to decapitate the first. Then back to the other. She was keeping them partially unformed so they couldn't attack her, but she was still stuck between them. Her back, shoulders, and arms hurt, and her conscious mind screamed in fear. She tuned it out. If this was how she died, well... at least she would die swinging Heartseeker, just as her mother had.\n\nFor what seemed like ages she fought wildly, keeping them both at bay. And then it happened: one of the ghosts reached for its head. It felt pain and it WAS being hurt! With renewed energy Leeka forced her aching arms to move faster, slashing at its head again and again. Even after it dissolved into a formless cloud, she continued to strike where the head had been. The other ghost took the opportunity to strike her leg, her back, her head as she fought the first, but she kept swinging until ... it was gone. One of the ghosts was gone.\n\nA ghostly fist punched her shoulder and she went sprawling forward gracelessly, her backpack pinning her down. The sword said something, but she could hear only a loud ringing in her ears as she cut away one of the straps she was tangled in. The ghost kicked her legs, laughing, and she felt her left foot start to go numb. But she managed to rise, using Heartseeker's long blade to keep the ghost at bay.\n\n\"You are not worthy,\" said the ghost. \"Surrender to death!\"\n\nLeeka smiled a toothy grin. Without the pack on, she was much more limber, and she knew from experience that she had a few more seconds of adrenaline before the pain came in earnest. She began hacking, slicing into the ghost's head again and again, screaming with exertion. Then, in an instant, it was gone. Leeka leaned against the wall and tried to catch her breath.\n\n\"Get your pack and get out of this room,\" said Heartseeker. \"There could be more!\"\n\n\"They would already have come,\" said Leeka. She leaned against the hallway and let her weight drag her down to a sitting position. \"That hurt.\"": "<h1>Лика и Испытания Клинка, Глава 4</h1>\\n\\n\"Ты слишком медлишь,\" прошипел меч на её спине. \"Иди внутрь, они ускользают.\"\\n\\nЛика оскалилась и проигнорировала Хартсикера, внимательно осматривая дверь. Затем она толкнула её и посмотрела в комнату по ту сторону. Она не была искусной искательницей ловушек, но знала, что здесь они есть, поэтому было безрассудно ринуться вперёд. Она вынула меч.\\n\\n\"Что ты... это недостойно!\" — прокашлялся меч, когда Лика вонзила его в землю перед собой.\\n\\n\"Ты ни на что не годна, но, по крайней мере, ты почти неразрушим. Так заткнись и будь моим детектором ловушек.\" Лика осторожно вошла в комнату. Это был ещё один коридор, но на этот раз довольно узкий, примерно полтора метра в ширину, а его конец был всего примерно в девяти метрах впереди, где стояла ещё одна деревянная дверь. Она не видела никаких источников света, кроме своего факела. Стены и потолок когда‑то были расписаны, но сейчас на них остались только единичные крошки краски. Она коснулась пола, затем стен, осторожно. Поверхность была гладким сыроватым камнем, не больше.\\n\\n\"Они уже сделали ловушку в полу. Следующая ловушка будет совсем другая,\" сказал Хартсикер.\\n\\n\"Откуда ты знаешь?\"\\n\\n\"Это делали жрецы Ромаста. И они были... ну, формалистами. Ты тестируешь одно умение, потом другое, потом следующее. Повторять тот же тест — пустая трата времени.\"\\n\\n\"Хмм.\" Лика была не вполне убеждена, но должна была признать, что если ловушки были в полу, стенах или потолке, она не могла их найти. Она медленно пошла по коридору. Пройдя половину пути, она вдруг ощутила холод, а потом — боль в плече. Рычав, она повернулась и успела увидеть, как прозрачная рука исчезает в стене. Призрак!\\n\\nИз глубины стен раздался зловещий смех. Затем призрак вышел из стены и встал у неё на пути. В панике она обернулась и увидела, что другой призрак уже перекрыл ей путь назад. Два призрака.\\n\\nИз‑за неуклюжей тяжести Хартсикера ей нужны были обе руки, чтобы хорошо сражаться. Она швырнула факел в призрака перед собой. Призрак увернулся, и факел упал на землю у двери. Любопытно: он должен быть хотя бы отчасти осязаем, иначе бы не увернулся. Она сделала шаг к призраку, пытаясь заглушить в уме вопящее чувство паники. Она никогда не сражалась с призраком.\\n\\nПризрак казался состоящим из дыма, но контуры человека были чётко различимы. Его руки были вытянуты, а лицо — непостижимая масса смеющегося тумана. Она шагнула вперёд и взмахнула Хартсикером, пройдя сквозь его руку и туловище. Лезвие слегка продавилось, как будто она рубила воду. Другая рука призрака толкнула её, и она отступила, ошеломлённая внезапным холодом. Призрак казался не повреждённым её атакой.\\n\\n\"Как сражаться с призраками?!\" — закричала Лика, когда второй призрак вцепился ей в спину. Она рубанула его, затем попыталась протиснуться мимо, но призрак вновь оттолкнул её назад. Кожа в местах прикосновения покрылась льдом. Она была зажата между двумя призраками.\\n\\nПризраки атаковали вместе, один спереди, другой сзади, и Лика начала безумно рубить в панике. Ей удалось нарушить одного, заставив его на мгновение перестать атаковать, но в то же время призрак сзади поразил её, протянув руку прямо сквозь рюкзак и ухватившись за поясницу. Она заревела от боли и повернулась, чтобы рубануть и того, но первый уже восстанавливался.\\n\\n\"Голова,\" сказал Хартсикер. \"Голова кажется слабейшей! Можно их дезориентировать.\"\\n\\nЛика замахнулась в голову ближайшего призрака, и он рассеялся, но быстро восстановился. \"Не действует!\"\\n\\n\"Продолжай! Это единственное, что хоть немного их замедляет!\"\\n\\nЛика развернулась к другому призраку и пронзила Хартсикером его голову. Затем повернулась, чтобы обезглавить первого. Потом — обратно к второму. Она держала их частично несформированными, чтобы они не могли её атаковать, но всё ещё была зажата между ними. Спина, плечи и руки болели, и сознание кричало от страха. Она заглушила этот крик. Если так будет её смерть, ну что ж... по крайней мере она умрёт, размахивая Хартсикером, как её мать.\\n\\nКазалось, она сражалась бесконечно, удерживая их обоих на расстоянии. И затем случилось: один из призраков схватился за голову. Он почувствовал боль и действительно был раним! Наполнившись новой энергией, Лика заставила ноющие руки двигаться быстрее, снова и снова режа по его голове. Даже после того, как он растаял в безформенное облако, она продолжала бить там, где была голова. Другой призрак воспользовался моментом и ударил по её ноге, спине, голове, пока она боролась с первым, но она продолжала махать, пока... он не исчез. Один из призраков пропал.\\n\\nПризрачный кулак ударил её в плечо, и она неуклюже повалилась вперёд, рюкзак придавил её вниз. Меч что‑то произнёс, но в ушах у неё звенело так громко, что она слышала лишь это, пока отзывала один из ремней, в котором была запутана. Призрак пнул её ногами, смеясь, и она почувствовала, как левая ступня начинает неметь. Но ей удалось встать, удерживая призрака на расстоянии длинным клинком Хартсикера.\\n\\n\"Ты недостойна,\" сказал призрак. \"Сдайся смерти!\"\\n\\nЛика улыбнулась с оскалом. Без рюкзака она стала гораздо проворнее, и по опыту знала, что у неё ещё есть несколько секунд адреналина, прежде чем боль вернётся с новой силой. Она начала рубить, снова и снова врезаясь в голову призрака, крича от напряжения. И в одно мгновение он исчез. Лика оперлась о стену и попыталась перевести дух.\\n\\n\"Возьми рюкзак и уходи из этой комнаты,\" сказал Хартсикер. \"Могут быть и другие!\"\\n\\n\"Они бы уже пришли,\" сказала Лика. Она опёрлась о коридор и, сползая, села. \"Это больно."
"<h1>Leeka and the Blade Trials, Chapter 5</h1>\n\nLeeka began digging through her pack. Her left arm was no longer responding to her commands, and she suspected the worst was yet to come.\n\n\"Complete lack of discipline back there,\" said Heartseeker. She'd dropped it on the ground in front of her. \"You should have just kept your pattern! One two, one two, you were doing great. Once you focused on only one, the other one tore you up. You let your desperation drive you. You lack --\"\n\nLeeka picked up the sword with her right hand and flung it down the hall, where it clanged loudly. She immediately went back to searching the pack. She had to find healing potions. Healing potions, where were the... finally, she found her last three potions, tied together and wrapped in cloth. She pulled the cork out of the first and downed the tiny vial of liquid. Her back suddenly released its tension and she sighed relief. The second potion brought her left arm back to working order. Her leg and shoulder still hurt, but with only one potion left, she decided to tough it out. She turned her attention to the pack. She could fashion new straps, perhaps...\n\n\"Um, Leeka, over here. A button.\"\n\nLeeka went and retrieved the sword. She held it out and let it tilt to point at the button. It was another square stone plate, like the front door, but flush with the wall and harder to see. If she pushed it and more stone walls moved, any chance of surprising the people ahead would be gone. Impulsively, she reached out and pushed it with Heartseeker, and immediately the wall in front of her ground open.\n\nThe noise wasn't as bad, or as long, but it was still loud enough. She eyed the exits warily as the wall opened, but nobody returned to see what caused the sound. When the door was fully open, it stopped. Behind the door was a small stone room with corpses manacled by their hands. Two of the three were decayed beyond recognition. But the stink meant something had been alive in here relatively recently.\n\nThen her eyes caught movement coming from the least-decayed corpse. Leeka stared at it, her eyes keen in the torchlight, waiting for the corpse to move. \"Speak, corpse, if you can!\"\n\nThe man raised his head. Elven ears stuck out of greasy long hair. \"Help...\" The elf's eyes were gray pits that almost glowed in the darkness. He wasn't an elf anymore. He was a --\n\n\"It's a vampire!\" shouted Heartseeker. \"Quick, cut his head off!\"\n\nLeeka snorted. \"He's chained to the wall, and clearly can't attack. Why should I kill him?\"\n\n\"He's not alive! He's undead!\"\n\n\"So? He's harmless.\"\n\n\"Leeka, vampires are very powerful. This one has been subdued and imprisoned in here. Why do you think someone would leave a vampire in here? In the middle of the Blade Trials?\"\n\nShe considered, stepped forward, poking the creature gently with Heartseeker. The creature's eyes tracked her, but only the head moved at all.\n\n\"Why are you here, vampire?\"\n\n\"Heeelllpp,\" the elf said again, the syllables held so long that it sounded more like a groan.\n\n\"Sorry, monster, I may be stupid, but I won't free a chained vampire.\"\n\n\"Water...\" groaned the elf.\n\n\"This is part of the Trials, Leeka.\" Heartseeker's voice was alarmed. \"Think about... what are you doing? Don't!\"\n\nLeeka had dug out her waterskin and leaned down to pour some into the elf's mouth, skirting around his legs so he couldn't kick her. She poured a few mouthfuls and then stood back away.\n\n\"Why are you here, vampire?\"\n\n\"They know you're coming,\" said the creature, his voice low. He moved his tongue around his mouth like he was figuring out how to use it. \"They're waiting for you, Leeka.\"\n\n\"You know who I am?\"\n\n\"I overheard them say your name. They've been anticipating you for a week.\"\n\n\"I will not ask again: why are you here?\"\n\n\"Heh.\" The vampiric elf spit bloody water. \"I was once a part of this trial. For a few centuries, I would lure the weak or the foolish to their doom by convincing them to let me drink their blood.\"\n\n\"Why would anyone do that?\" Leeka asked, incredulous.\n\nThe elf tried to smile. \"I can be very persuasive when I'm in good condition. But the last orc that took the trials... she chained me to this wall and tore out my guts. She left me to suffer for decades!\"\n\nThe last person -- would that be Leeka's mother? It would be foolish to trust a vampire, but she still wanted more information. \"Why has no-one freed you since then? They reset the other traps, right? Surely those priests of Melkar up ahead...\"\n\n\"Melkar's not a fan of the undead,\" said Heartseeker. \"This creature -- this vampire is from the original Trials, aren't you? You've been here ever since this place was the Blade Trials of Romast!\"\n\nThe elf laughed. \"No, I am not that old. But we had a pact with Romast that one of our number would always come here for the Trials. That pact remains unbroken even in Romast's death.\"\n\n\"But the priests of Melkar don't approve of you being here,\" said Heartseeker. \"And they know if they kill you, a new vampire will come knocking on the door. So they just...\"\n\n\"Yes. They leave me to suffer. Help me, Leeka. Please...\"\n\n\"How, by killing you? Very well, if you wish to die,\" Leeka raised Heartseeker.\n\n\"No! I don't want to die! I meant... by feeding me.\"\n\nAt this, Leeka and Heartseeker both laughed. Leeka had never heard the blade laugh before; it was strangely comforting to know that it could.\n\n\"Why would I feed you, vampire?\"\n\n\"If you give me but a few drops of blood, I shall break free and escape this place.\"\n\n\"Leeka,\" warned the blade. \"If it sinks its teeth into you...\"\n\n\"No, don't feed me directly. Just drip a few drops into my mouth. Just a few drops! Please! And I will leave. A new vampire will come to take my place. I have suffered much for your god, your Melkar. Please...\"\n\n\"Melkar is not my god,\" said Leeka.\n\n\"Just kill it, Leeka,\" said the sword.\n\n\"How do I know you won't attack me?\"\n\nThe vampire turned its head quizzically. \"Why would I? I am not a mindless evil. I am a vampire! We have honor! Some of us, anyway... my name is Pelagast. Pelegast the Wise. Have you heard of me?\"\n\n\"No.\"\n\n\"Oh. Well, no matter, since I can't prove who I am, anyway. But your sword can protect you from me. Can you not, blade?\"\n\n\"No,\" said the blade. \"I don't have my powers! That's why we're doing the stupid Trials!\"\n\n\"You know how to ward against vampires. Teach her.\"\n\n\"What does he mean, Heartseeker? How do you protect against vampires?\"\n\n\"There's lots of ways, but... oh. You mean with a simple protective circle?\"\n\nThe elf nodded jerkily, as if he barely controlled his neck. \"That is how the Trial is supposed to go: either I take over the aspirant's mind and make them a thrall, or the sword manages to protect them from me.\"\n\n\"But a simple ward won't last. And we don't have salt.\"\n\n\"Salt? Yes we do,\" said Leeka. \"I brought salt to preserve what I hunt. So this is a magic spell?\"\n\n\"No, just a ward. It will keep a vampire at bay for a few minutes. The fanciest one I know would last... maybe a half-hour.\"\n\n\"And then?\"\n\n\"Then it'll overpower the ward and kill you.\"\n\n\"No,\" said the elf. \"With only a few drops of blood I won't have the strength. I wish only to leave. And besides: the conditions of the Blade Trial prevent me from attacking anyone in a ward. That is how you are supposed to win the challenge, after all. You needn't use a fancy ward. Any ward will do... just a circle of salt.\"\n\n\"I'll use the fancy ward,\" said Leeka. She returned to her pack to fetch the salt. \"Okay, sword, teach me.\"\n\n\"No! This is foolish! Do you think Melkar wants -- \"\n\n\"Heartseeker! I have taken your counsel. I will continue to do so. But I make the decisions! We are doing this ward thing. Now.\"\n\nThe blade was silent for a moment. Then it began to guide her through the preparations.\n\nA few minutes later, Leeka stood near the vampire in a circle of salt and sigils. She'd carved strange runes into the stone floor with Heartseeker's unbreakable blade. The ward was done.\n\n\"Open your mouth, monster,\" said Leeka. She knicked her wrist with the sword and then angled the blade toward the vampire's mouth. Then she let a small stream of blood run down Heartseeker and into the elf's waiting jaws.\n\nFirst the creature's flesh took a more natural color. Then she heard bones crack and creak as they snapped into place. When his gray eyes turned greenish and he began to look like a mortal elf, she tilted the blade away.\n\n\"Can you leave, creature?\"\n\nPelegast stood up, naked except for patches of black mold that covered his legs and groin. He pulled hard on the chains and they came free from the wall with a loud clang and a cloud of dust.\n\n\"I did not expect to be freed by someone on the Trials. You've surprised me. Thank you, Leeka. I hope you pass your Trials. Be sure to leave before the sun next sets, or those ghosts will return. And they're terrible company. Oh, and be careful ahead. They replaced my part of the Trials with a giant spider or something.\" He walked slowly, stumblingly, to the door, opened it, and left. Leeka listened to the chains from his wrists dragging on the stones. After a minute the noise was gone.\n\n\"Why did we do that, Leeka? Why?!\"\n\n\"Because I kill for food, for safety, or for honor. I kill for all those reasons gladly, but I do not cravenly kill a bound prisoner. <b>Nor</b>-- \" she raised her voice to shout over the words Heartseeker was beginning to say. \"Nor do I leave a slave, unjustly imprisoned, to rot, just because I can't be bothered! I have honor, Heartseeker. That's a new concept for you, I guess. You should look into it.\"\n\n\"There's honor and then there's stupidity. These are the Blade Trials of Melkar, and Melkar's not one of those new-age gods who think it's okay to be undead. Melkar is pre-Dreva. He remembers the ravages of Zek. He doesn't even accept that the undead are--\"\n\n\"Melkar is the god of Individuality, right?\"\n\nHeartseeker sighed, realizing where this was going. \"Yes. Officially he's the God of Individualism, Self-Sufficiency, and Hunting for Sustenance.\"\n\n\"So I'm expressing my individuality. And really, if Melkar doesn't like the way I do things... well, he can smite me if he wants. Or he can go fuck himself.\" \n\nShe sheathed the sword. The backpack could wait in here for a while, she decided. She fetched the last health potion and a few spare throwing knives. She tore a bite off of her lembas brick and went to the next room.": "<h1>Лика и Испытания Клинка, Глава 5</h1>\n\nЛика начала рыться в своём ранце. Левое плечо уже не слушалось, и она подозревала, что худшее ещё впереди.\n\n«Полное отсутствие дисциплины там, сзади», — сказал Хартсикер. Она роняла меч на пол перед собой. «Тебе следовало просто держать ритм! Раз‑два, раз‑два, у тебя получалось отлично. Как только ты сосредоточилась только на одном, другое разорвало тебя. Ты позволила отчаянию вести себя. Тебе не хватает —»\n\nЛика схватила меч правой рукой и швырнула его в коридор, где он громко звякнул. Она тут же вернулась к поискам в ранце. Надо было найти лечебные зелья. Лечебные зелья, где они были... наконец она нашла последние три зелья, связанные вместе и завернутые в ткань. Она вытащила пробку из первой и выпила крошечную пузырьковую жидкость. Спина тут же отпустила напряжение, и она облегчённо вздохнула. Второе зелье вернуло в действие её левую руку. Нога и плечо всё ещё болели, но при одном оставшемся зелье она решила потерпеть. Она снова переключила внимание на ранец. Можно соорудить новые ремни, может быть...\n\n«Эм, Лика, тут. Кнопка».\n\nЛика пошла и достала меч. Она поднесла его и наклонила в сторону кнопки. Это была ещё одна квадратная каменная плита, как у парадной двери, но вровень со стеной и гораздо труднее заметная. Если нажать — и ещё каменные стены сдвинутся, — шанс застать людей впереди врасплох пропадёт. По привычке она протянула руку и нажала на неё Хартсикером, и стена перед ней сразу зашевелилась и открылась.\n\nШум был не таким громким и продолжительным, но всё равно достаточно сильным. Она настороженно посмотрела на выходы, пока стена открывалась, но никто не вернулся, чтобы выяснить причину шума. Когда дверь полностью раскрылась, она остановилась. За дверью была небольшая каменная комната с трупами, закованными в кандалах на руках. Двое из троих были настолько разложены, что их не узнать. Но вонь означала, что здесь относительно недавно что-то ещё было живо.\n\nТогда её глаза заметили движение у наименее разложившегося трупа. Лика вгляделась, её глаза сияли в свете факела, и она стала ждать, когда труп пошевелится. «Говори, труп, если можешь!»\n\nЧеловек поднял голову. Из грязных длинных волос торчали эльфийские уши. «Помо…» Глаза эльфа были серыми ямами, которые почти светились в темноте. Он уже не был эльфом. Он был —\n\n«Это вампир!» — крикнул Хартсикер. — «Быстро, отруби ему голову!»\n\nЛика фыркнула. «Он прикован к стене и явно не может напасть. Почему я должна убивать его?»\n\n«Он не живой! Он нежить!»\n\n«И что? Он безвреден.»\n\n«Лика, вампиры очень сильны. Этот закован и заточён здесь. Почему, по‑твоему, кто‑то оставил вампира здесь? Прямо посреди Испытаний Клинка?»\n\nОна задумалась, подошла вперёд и осторожно ткнула существо Хартсикером. Глаза существа следили за ней, но двигалась только голова.\n\n«Зачем ты здесь, вампир?»\n\n«Пооомоощь…» — опять протянул эльф, слоги тянулись так долго, что больше походили на стон.\n\n«Извини, монстр, я могу быть глупой, но я не освобожу закованного вампира.»\n\n«Вода…» — простонал эльф.\n\n«Это часть Испытаний, Лика». Голос Хартсикера прозвучал встревоженно. «Подумай о… что ты делаешь? Не делай этого!»\n\nЛика вынула флягу с водой и нагнулась, чтобы подлить эльфу в рот, обходя его ноги так, чтобы он не смог её пнуть. Она влила несколько глотков и отошла назад.\n\n«Зачем ты здесь, вампир?»\n\n«Они знают, что вы идёте», — сказал существо, голос его был хриплым. Он стал водить языком по рту, как будто вспоминал, как им пользоваться. «Они ждут тебя, Лика».\n\n«Ты знаешь моё имя?»\n\n«Я подслушал, как они произносили твоё имя. Они готовились к тебе неделю».\n\n«Я не спрошу снова: зачем ты здесь?»\n\n«Хе». Вампир плевнул кровавую воду. «Я раньше был частью этого испытания. Веками я заманивал слабых и глупых к их гибели, убеждая их позволить мне пить их кровь».\n\n«Зачем кто‑то это делал?» — спросила Лика с недоверием.\n\nЭльф попытался улыбнуться. «Я умею быть очень убедительным, когда в порядке. Но последний орк, что проходила испытания… она приковала меня к этой стене и вырвала у меня кишки. Оставила меня мучиться десятилетиями!»\n\nПоследний человек — это была бы мать Лики? Доверять вампиру было бы глупо, но Лика всё ещё хотела больше информации. «Почему тебя никто не освободил с тех пор? Ведь они сбрасывают ловушки, верно? Тех священников Мелкара впереди...»\n\n«Мелкар не любит нежить», — сказал Хартсикер. «Это существо — вампир из оригинальных Испытаний, не так ли? Ты здесь с тех пор, как это место было Испытаниями Клинка Ромаста!»\n\nЭльф рассмеялся. «Нет, я не настолько стар. Но у нас был пакт с Ромастом, что один из нас всегда будет приходить сюда для Испытаний. Этот пакт остаётся в силе даже после смерти Ромаста».\n\n«Но священники Мелкара не одобряют твоё присутствие», — сказал Хартсикер. «И они знают: если убить тебя, на твоё место придёт новый вампир. Поэтому они просто...»\n\n«Да. Они оставляют меня мучиться. Помоги мне, Лика. Пожалуйста...»\n\n«Как? Убить тебя? Хорошо, если ты хочешь умереть», — Лика подняла Хартсикер.\n\n«Нет! Я не хочу умирать! Я имел в виду... накормить меня».\n\nОт этого Лика и Хартсикер оба рассмеялись. Лика никогда раньше не слышала, чтобы клинок смеялся; было странно утешительно знать, что он способен на это.\n\n«Зачем мне тебя кормить, вампир?»\n\n«Если дашь мне всего пару капель крови, я освобожусь и уйду отсюда».\n\n«Лика», — предупредил меч. — «Если он вцепится в тебя...»\n\n«Нет, не кормите меня прямо. Просто капните пару капель в мой рот. Всего пару капель! Пожалуйста! И я уйду. На моё место придёт новый вампир. Я много страдал ради вашего бога, вашего Мелкара. Пожалуйста...»\n\n«Мелкар не мой бог», — сказала Лика.\n\n«Просто убей его, Лика», — сказал меч.\n\n«Как мне знать, что он не нападёт на меня?»\n\nВампир повернул голову с вопросительным видом. «Зачем бы мне? Я не бессмысленное зло. Я вампир! У нас есть честь! По крайней мере у некоторых из нас... Меня зовут Пелагаст. Пелегаст Мудрый. Слышала ли ты обо мне?»\n\n«Нет».\n\n«Ох. Ну да ладно, раз я не могу доказать, кто я. Но твой меч может защитить тебя от меня. Можешь ли ты, клинок?»\n\n«Нет», — ответил меч. — «Мои силы ушли! Поэтому мы и проходим эти глупые Испытания!»\n\n«Ты знаешь, как ставить защиты от вампиров. Научи её».\n\n«Что он имеет в виду, Хартсикер? Как защититься от вампиров?»\n\n«Есть много способов, но... о. Ты имеешь в виду простой защитный круг?»\n\nЭльф кивнул дергаными движениями, словно едва контролировал шею. «Таково было условие Испытания: либо я завладеваю разумом претендента и делаю его рабом, либо меч защищает его от меня».\n\n«Но простая защита недолговечна. И у нас нет соли».\n\n«Соль? У нас есть», — сказала Лика. — «Я принесла соль, чтобы консервировать то, что охочусь. Так это магическое заклинание?»\n\n«Нет, просто защита. Она удержит вампира на несколько минут. Самая мощная из тех, что я знаю, продержится... может быть, полчаса».\n\n«А потом?»\n\n«Тогда он пробьёт защиту и убьёт тебя».\n\n«Нет», — сказал эльф. — «С парой капель крови у меня не будет силы. Я лишь хочу уйти. Да и кроме того: условия Испытания Клинка не позволяют мне нападать на кого‑то в круге. Таков способ выиграть испытание. Тебе не нужна сложная защита. Любая защита подойдёт... просто круг из соли».\n\n«Я сделаю сложную защиту», — сказала Лика. Она полезла в ранец за солью. «Ладно, меч, учи меня».\n\n«Нет! Это безрассудно! Ты думаешь, Мелкар хочет —»\n\n«Хартсикер! Я приняла к сведению твой совет. Я продолжу его слушать. Но решения принимаю я! Мы делаем защиту. Сейчас».\n\nМеч помолчал на мгновение. Затем он начал вести её через приготовления.\n\nЧерез несколько минут Лика стояла рядом с вампиром в круге из соли и сигил. Она начертала странные руны на каменном полу неразрушимым лезвием Хартсикера. Защита была готова.\n\n«Открой рот, монстр», — сказала Лика. Она чуть порезала себе запястье мечом и затем направила лезвие к рту вампира. Маленькая струйка крови потекла по Хартсикеру и в рот эльфа.\n\nСначала плоть существа приобрела более естественный цвет. Затем послышались хруст и треск костей, когда они встали на место. Когда его серые глаза стали зеленоватыми и он начал выглядеть как смертный эльф, она отодвинула клинок.\n\n«Можешь уйти, существо?»\n\nПелагаст встал, обнажённый, разве что в тряпках, с чёрной плесенью на ногах и в паху. Он с силой дернул цепи, и они с громом оторвались от стены, подняв облако пыли.\n\n«Я не ожидал, что меня освободит кто‑то из Испытаний. Ты удивила меня. Спасибо, Лика. Надеюсь, ты пройдёшь испытания. Убедись, что уйдёшь до следующего заката, иначе эти призраки вернутся. И они ужасная компания. О, и будь осторожна впереди. Они заменили мою часть Испытания каким‑то гигантским пауком или чем‑то таким». Он медленно, шатаясь, дошёл до двери, открыл её и ушёл. Лика слышала, как цепи за его запястья волочатся по камням. Через минуту звук исчез.\n\n«Зачем мы это сделали, Лика? Зачем?!»\n\n«Потому что я убиваю ради еды, ради безопасности или ради честного дела. Я убиваю по всем этим причинам охотно, но я не трусливо убиваю связанного пленника. <b>Nor</b>—» она крикнула, заглушая слова Хартсикера. «И я не оставлю раба, несправедливо заточённого, гнить только потому, что мне лень! У меня есть честь, Хартсикер. Это для тебя новая концепция, полагаю. Тебе стоит с ней ознакомиться».\n\n«Есть честь, а есть глупость. Это Испытания Клинка Мелкара, и Мелкар не из тех новоявленных богов, которые считают, что быть нежитью — нормально. Мелкар до‑Древы. Он помнит опустошения Зека. Он даже не признаёт, что нежить —»\n\n«Мелкар — бог Индивидуализма, да?» — спросила Лика.\n\nХартсикер вздохнул, поняв, к чему это идёт. «Да. Официально он Бог Индивидуализма, Самодостаточности и Охоты ради Пропитания».\n\n«Так что я выражаю свою индивидуальность. И честно, если Мелкару не нравится, как я поступаю... ну что ж, пусть смилостивится надо мной. Или пошёл бы он к чёрту».\n\nОна вложила меч в ножны. Ранец ещё может подождать, решила она. Она достала последнее лечебное зелье и несколько запасных метательных ножей. Она откусила кусок от бруска лембаса и пошла в следующую комнату."
"<h1>Leeka and the Blade Trials, Chapter 6</h1>\n\nLeeka slammed the door behind her and looked around. \"Well, it's definitely dying. I just don't know how long it'll take. Oh...\" there was a thud and a screeching in the room behind her. \"There it goes.\"\n\nThe room past the vampire had been a library, and leaving it had required her to use the room's enchanted books. Beyond that, a statue that spoke riddles. Stupid riddles. And the last room had been a spider the size of a small home. Her leather armor was now pitted with acid holes. She drank her last health potion, then sighed. \"Okay, are we finally done?\"\n\nThis last bit was aimed at the two orcs who sat in the room. \"Or do I have to do something with that forge?\" A weird forge took pride of place in the large stone room. Most of the room was taken up with piles of wood and coal. In one corner sat the two orcs, apparently waiting for her to arrive.\n\n\"Leeka, my daughter. Come stand before me.\" One of the orcs stood up. That was his voice, her father's voice. But...\n\nLeeka looked at the orc. She drew her sword. \"More tests! I am so tired of this nonsense!\"\n\nHer father laughed. \"The trial is over! You have passed!\"\n\n\"What... what are you doing here? You swore that you'd never speak to me again.\"\n\nHe nodded. \"But today, for the first time, I am proud of you, Leeka! You have more than made up for the shame your mother brought upon me. And Leeka: you have earned the right to have your human heritage erased.\"\n\n\"What?\"\n\n\"It's true,\" said the other orc. This one was old, his hair white and his voice raspy. \"I am a priest of Melkar, come here to administer the test. You passed, and so you must choose: you can become a Scion of Melkar, and your sword will become a symbol of The Bastard God's might in this world. Or you may toss the sword in this forge. If you do so, Melkar will take away your impurities and make you a full-blooded orc.\"\n\n\"What?\" said Leeka again, sword still drawn. Her father looked just like she remembered him. A touch older, but everything about him -- the way his eyes constantly scanned the room, the precise way he moved -- it was him.\n\n\"It's not him,\" said Heartseeker.\n\n\"Why do you say that?\" asked the priest of Melkar. \"I have spent the past week with him. He has told me stories of your youth, Leeka. He is here to take you home, if you choose to become full-blooded.\"\n\n\"Take me home? And... I would be treated as a full-blood kin?\"\n\n\"Yes.\" Her father smiled. \"Now. Can you stop pointing that evil blade at me?\" His own blade was at his hip, but his hands were well away from it. Leeka lowered the weapon.\n\nShe fought back a wave of fatigue. Leeka was tired. So tired. But she had won. And her reward was tantalizing... but it meant destroying Heartseeker.\n\n\"Heartseeker. You have done well by me today. But I'm afraid--\"\n\n\"No, hold on, you seriously believe this? Look, I met your father. That guy is not him. I mean, for starters, your father vowed never to speak to you again. Is your father the kind of orc that would break his vows to his daughter?\"\n\n\"That was a different time!\" said her father. \"Before I learned about this trial, and that it could make you whole. You had to choose to go on the trial. I wasn't allowed to--\"\n\n\"And is your father the kind of orc that would only do what he was 'allowed' to do?\"\n\nHer father grunted in annoyance. \"I meant that if I interfered, Melkar's gift would not--\"\n\nThe sword made a gravelly-throated laugh. \"Okay, when you proposed to Leeka's mother, what did you say?\"\n\n\"What?\" It was her father's turn to say it. \"But... she didn't wield you on that day.\"\n\n\"Yes she did. And even if she hadn't, she would have told me later. We were friends. The day you proposed to her was the day of a big hunt. Do you remember what we hunted?\"\n\n\"Sword, it has been many years.\" Her father pounded the arm of his chair. \"I am not a young orc anymore! I do not remember the day perfectly, but that doesn't mean--\"\n\n\"Well, at least you could remember this: when you proposed to her that day, did she say yes? Or did you have to wait for her to propose to you?\"\n\nHer father hesitated. \"I'm sorry. Leeka, truly I am sorry. I had my witch take those memories from me. Memories of your mother tormented me and I couldn't be the strong chief I needed to be. But I remember you.\"\n\n\"Oh, then what were her first words?\" asked the sword.\n\n\"Not every detail! I remember my daughter. That's enough!\"\n\n\"He's an imposter,\" said Heartseeker. Leeka tilted her head, catching her father's familiar smell. His mannerisms, like pounding the chair... it was him. And he wanted her to come home.\n\n\"I think he's telling the truth,\" said the priest of Melkar, \"But it doesn't really matter. If he's some sort of imposter, fine. Kill him.\"\n\n\"Hey!\" said her father.\n\n\"Kill him if he's an imposter. Or throw the sword in the furnace, and I'll loan you a newer, more practical sword to kill him with. But I have waited long enough. Will you become a Scion of Melkar, or will you become a full-blooded orc?\"\n\n\"Leeka,\" said the sword. \"Romast always said to trust your weapon. I'm a Blade of Romast and I'm telling you that's not your father.\"\n\n\"Romast is a dead god!\" shouted Leeka. \"You are a Blade of Melkar, the Bastard God, and you resent me! You resent that I can be whole!\" She stepped toward the forge. \n\nHer father nodded. \"Just toss it in. You don't have to do anything else. The flames will consume it quickly.\"\n\n\"You're right,\" said the sword. \"You're right that I am an instrument of Melkar. I am the legendary blade Heartseeker, wielded by the most famous half-bloods in orcish history! When the Formian King invaded Gazluk, Amatuk used me to kill him. I am the blade that slew Blightwing! Your mother used me to kill the Frost Siren. Half-bloods don't trust easily, but your mother trusted me. You need to trust me!\"\n\nHer father smirked, a face she remembered so well. He walked toward the forge. \"See how pathetic these swords are? What orc would wield a weapon that demanded obedience? Swords are a tool, not a master. Come, I want to see it melt. To think that your mother could have chosen differently, if not for this sword's honeyed words, tricking her into a life of obedience to a useless bastard god!\"\n\nLeeka nodded. The sword was a hindrance. She could be an orc... a real orc. She could some day take her place as an orc chieftan. \n\n\"I am Heartseeker!\" The sword nearly shouted. \"I am Heartseeker, the legendary blade, and I have never once betrayed my wielder. I have never once lied to you. Your mother trusted me, and I have never given you reason to doubt me. We may disagree on a lot of things, but we're not discussing an opinion here, Leeka. I know this for a fact: <i>that is not your father.</i>\"\n\nLeeka stopped in mid-stride towards the furnace. \"... I know. But I so want to believe.\" She turned on her heel and lunged at her father, who fell back with a shout, drawing his blade. She pressed the assault, and with his every move she knew he was an imposter. He was martially trained, in fact quite skilled, but he had nowhere near the skill her father had.\n\n\"Stop!\" Shouted the other orc. \"Don't hurt him! Ruma, drop your sword!\"\n\nLeeka ignored the priest and lunged at the imposter father, who dropped his blade and fell to his knees. Leeka stopped, Heartseeker pressed into his throat, unsure of what to do. Her instinct was to kill the cruel creature that wore her father's face. But she doubted her instincts here. She wasn't seeing the whole picture.\n\nThe other orc was talking, and now her father was talking, but she tuned them out. They would simply say whatever they needed to say to live. Their words held no merit. <i>You should let them live</i>, said Heartseeker, but this time without speaking aloud. <i>Oh good, I can talk to you without words! It's working. My powers are returning!</i>\n\nLeeka tried to 'think' a response to the sword, but after a moment decided it wasn't working. \"Why should I spare them?\" she asked aloud. Her father was still at blade-tip. The other orc had come closer and she watched him warily from the edge of her vision, ready to act if he moved suddenly. Both of them began speaking anew when she spoke, but she ignored them.\n\n<i>They're both priests of Melkar. I can sense the medallions around their neck now. This really WAS a test. A cruel test. But they're instruments, not masters.</i>\n\nLeeka slowly reached toward her fake-father's neck, found a cord, and pulled it up through his leather armor to reveal Melkar's sigil. Sighing, she stepped back several feet, then lowered her sword.\n\nThe other orc was speaking very quickly in Human, which Leeka needed concentration to decipher. Instead, she tuned out his words and watched his actions carefully. The priest began casting a spell on her father and his face began to morph and change. He was a young human -- no, a half-human, but favoring the human side save for his thick gray hair.\n\n\"I'm sorry to do that to you,\" said her ex-father in Orcish. \"I know this was painful. But the more difficult the test, the more powers you can unlock with the blade, so we had to be convincing! And now, you are worthy of Heartseeker! You will be a champion for us all. For the forgotten, the forsaken, the betrayed.\"\n\n\"I don't want that.\" Leeka sheathed Heartseeker. \"I wanted to --\"\n\n\"-- You wanted to belong! Of course you did. That's the paradox of Melkar's chosen: you don't choose Melkar. Melkar didn't choose you, either. Your real father chose for you by disowning you.\"\n\nLeeka fought back a welling of emotion. She turned to leave, then remembered the annoying chess corridor. \"Must I perform the same dance to leave this wretched place?\"\n\n\"Don't go yet!\" said the priest. \"We came all the way from Ormala City when we heard you were taking the test. I paid a high price for that disguise spell. And we've waited here for a week to meet you, to help restore Heartseeker! We're friends. Family. I know we aren't the family you want. And you have no reason to trust us. But we--\"\n\n\"Not now.\" Leeka headed toward the exit. \"Perhaps some day, but not today.\"\n\n\"Yeah,\" said the sword on her back. Apparently it could only speak into her mind when she held it. \"Fuck these guys, and fuck Melkar. He may give me my powers, but this test is really dickish.\"\n\n\"But the moment you leave,\" said the humanish orc, \"your memory of the Trials will be erased.\"\n\n\"What?! That quickly? Why?\"\n\nThe older priest was standing now, too. \"Which means that if you don't leave with us, you won't remember knowing us at all.\"\n\n\"That is fine by me,\" said Leeka, and she headed back to the swamp, and then on to wherever adventure called her.": "<h1>Лика и Испытания Клинка, Глава 6</h1>\n\nЛика захлопнула за собой дверь и огляделась. «Ну, он определённо умирает. Я просто не знаю, сколько это займёт. Ох...» раздался стук и визг в комнате за ней. «Вот и всё».\n\nКомната за вампиром была библиотекой, и чтобы выйти из неё, ей пришлось воспользоваться зачарованными книгами комнаты. Потом была статуя, которая говорила загадками. Дурацкими загадками. А последняя комната — паук размером с небольшой дом. Её кожаная броня теперь была испещрена кислотными отверстиями. Она выпила последний лечебный эликсир и вздохнула. «Ладно, мы наконец кончили?»\n\nЭти слова были обращены к двум оркам, которые сидели в комнате. «Или мне ещё что‑то сделать с этой кузней?» Странная кузня занимала почётное место в большом каменном зале. Большую часть комнаты занимали кучи дров и угля. В углу сидели два орка, видимо ожидая её появления.\n\n«Лика, дочь моя. Встань предо мной». Один из орков встал. Это был его голос, голос её отца. Но...\n\nЛика посмотрела на орка. Она выхватила меч. «Ещё испытания! Мне так надоело это безумие!»\n\nЕё отец рассмеялся. «Испытание окончено! Ты прошла!»\n\n«Что... что ты здесь делаешь? Ты клялся больше никогда со мной не говорить».\n\nОн кивнул. «Но сегодня, впервые, я горжусь тобой, Лика! Ты более чем искупила позор, который принесла моя жена. И, Лика: ты заслужила право на стирание своего человеческого наследия».\n\n«Что?»\n\n«Это правда», — сказал другой орк. Этот был стар, волосы у него были белые, а голос хриплый. «Я жрец Мелкара, пришёл провести тест. Ты прошла, и теперь должна выбрать: можешь стать Избранницей Мелкара, и твой меч станет символом могущества Бастардного Бога в этом мире. Или ты можешь бросить меч в эту кузню. Если сделаешь это, Мелкар снимет с тебя примеси и сделает тебя полноценным орком».\n\n«Что?» — снова сказала Лика, меч всё ещё был наготове. Её отец выглядел точно так, как она его помнила. Немного постаревший, но всё в нём — взгляд, постоянно обводящий комнату, точность движений — было его.\n\n«Это не он», — сказал Хартсикер.\n\n«Почему ты так говоришь?» — спросил жрец Мелкара. «Я провёл с ним последние неделю. Он рассказывал мне истории о твоём детстве, Лика. Он здесь, чтобы вернуть тебя домой, если ты выберешь стать полноценной».\n\n«Вернуть меня домой? И... меня будут считать своей по крови?»\n\n«Да». Отец улыбнулся. «Ну и хватит направлять в меня этот злой клинок?» Его собственный меч висел у пояса, но руки были при нём. Лика опустила оружие.\n\nЕё накрыла волна усталости. Лика была устала. Очень устала. Но она выиграла. И награда была соблазнительной... но означала уничтожение Хартсикера.\n\n«Хартсикер. Ты сегодня хорошо послужил мне. Но боюсь—»\n\n«Нет, постой, ты серьёзно в это веришь? Послушай, я встретил твоего отца. Этот парень — не он. Во‑первых, твой отец поклялся больше никогда с тобой не говорить. Тот ли это отец, который нарушил бы клятву ради дочери?»\n\n«То было другое время!» — сказал её отец. «До того, как я узнал об этом испытании и о том, что оно может сделать тебя целой. Ты должна была выбрать идти на испытание. Мне не позволили—»\n\n«А твой отец тот ещё орк, который будет делать лишь то, что ему ‘позволено’?»\n\nОтец фыркнул от раздражения. «Я имел в виду, что если бы я вмешался, дар Мелкара не—»\n\nМеч издала хрипловатый смех. «Хорошо, когда ты сделал предложение матери Лики, что ты сказал?»\n\n«Что?» Теперь это был отец. «Но... она тогда не владела тобой».\n\n«Владела. И даже если бы не владела, она бы мне потом всё рассказала. Мы были друзья. В день, когда ты сделал ей предложение, был большой охотничий день. Помнишь, что мы тогда охотили?»\n\n«Меч, прошло много лет». Отец ударил по подлокотнику кресла. «Я уже не молод! Я не помню тот день идеально, но это не значит—»\n\n«Ну хотя бы это бы запомнил: когда ты делал ей предложение, она сказала ‘да’? Или тебе пришлось ждать, пока она сама предложит тебе?»\n\nОтец замялся. «Прости. Лика, я действительно сожалею. Я велел ведьме стереть эти воспоминания. Воспоминания о твоей матери терзали меня, и я не мог быть тем сильным вождём, каким должен был быть. Но я помню тебя».\n\n«О, тогда каковы были её первые слова?» — спросил меч.\n\n«Не каждую деталь! Я помню дочь. Этого достаточно!»\n\n«Он самозванец», — сказал Хартсикер. Лика наклонила голову, чувствуя знакомый запах отца. Его манеры, удары по креслу — он был им. И он хотел, чтобы она вернулась домой.\n\n«Я думаю, он говорит правду», — сказал жрец Мелкара, — «но это не имеет значения. Если он какой‑то самозванец — убейте его».\n\n«Эй!» — воскликнул отец.\n\n«Убей его, если он самозванец. Или брось меч в печь, и я одолжу тебе более новый, практичный меч, чтобы убить им. Но я ждал слишком долго. Станешь ли ты Избранницей Мелкара или станешь полноценным орком?»\n\n«Лика», — сказал меч. «Ромаст всегда говорил: доверяй своему оружию. Я — Клинок Ромаста и говорю тебе, что это не твой отец».\n\n«Ромаст — мёртвый бог!» — крикнула Лика. «Ты — Клинок Мелкара, Бастардного Бога, и ты мне завидуешь! Ты завидуешь, что я могу быть целой!» Она сделала шаг к кузне.\n\nОтец кивнул. «Просто брось его. Больше ничего делать не нужно. Пламя быстро поглотит его».\n\n«Ты прав», — сказал меч. «Ты прав, что я — орудие Мелкара. Я — легендарный клинок Хартсикер, которым владели самые известные полукровки в орочьей истории! Когда Формианский король вторгся в Газлук, Аматуку использовал меня, чтобы убить его. Я — клинок, что убил Блайтвинга! Твоя мать использовала меня, чтобы убить Ледяную Сирену. Полукровки не доверяют легко, но твоя мать доверяла мне. Тебе нужно довериться мне!»\n\nОтец усмехнулся, лицо, которое она так хорошо помнила. Он шагнул к кузне. «Видишь, какие жалкие эти мечи? Какой орк будет владеть оружием, требующим послушания? Мечи — инструмент, а не господин. Давай, хочу посмотреть, как он расплавится. Подумать только, твоя мать могла бы выбрать иначе, если бы не эти медовые слова меча, вовлекшие её в жизнь послушания бесполезному бастардному богу!»\n\nЛика кивнула. Меч мешал. Она могла бы стать орком... настоящим орком. Однажды занять место вождя орков.\n\n«Я — Хартсикер!» — почти прокричал меч. «Я — Хартсикер, легендарный клинок, и я никогда не изменял своему владельцу. Я никогда не лгал тебе. Твоя мать доверяла мне, и у меня никогда не было причины сомневаться в ней. Мы можем не соглашаться во многом, но тут не спор мнений, Лика. Я знаю это наверняка: <i>это не твой отец.</i>»\n\nЛика остановилась на полпути к печи. «... Я знаю. Но я так хочу верить». Она развернулась и бросилась на отца, который отшатнулся с криком, выхватив меч. Она навалилась в атаку, и с каждым его движением она видела, что он самозванец. Он был воински обучен, даже довольно искусен, но ему далеко до мастерства её настоящего отца.\n\n«Стой!» — крикнул другой орк. «Не причиняй ему вреда! Рума, брось свой меч!»\n\nЛика игнорировала жреца и накинулась на самозванца‑отца, который бросил меч и упал на колени. Лика остановилась, Хартсикер у горла, не решаясь. Её инстинкт подсказывал убить жестокое создание в лице отца. Но она сомневалась. Она не видела полной картины.\n\nДругой орк говорил, и теперь говорил её отец, но она не слушала. Они просто говорили то, что нужно, чтобы выжить. Их слова не имели значения. <i>Ты должна их пощадить</i>, сказал Хартсикер, но на этот раз без звука. <i>О, хорошо, я могу говорить с тобой без слов! Это работает. Мои силы возвращаются!</i>\n\nЛика попыталась мысленно ответить мечу, но через мгновение поняла, что это не получается. «Почему я должна их пощадить?» — спросила она вслух. Её отец всё ещё жал мечом. Другой орк приблизился, и она следила за ним краем зрения, готовая к резкому движению. Оба снова заговорили, когда она заговорила, но она их игнорировала.\n\n<i>Они оба жрецы Мелкара. Я чувствую медальоны у них на шее теперь. Это действительно был тест. Жестокий тест. Но они — орудия, а не хозяева.</i>\n\nЛика медленно потянулась к шее самозванца, нашла шнур и подняла его через кожаную броню, обнажив печать Мелкара. Вздохнув, она отступила на несколько шагов, затем опустила меч.\n\nДругой орк говорил очень быстро по‑человечески, и Лике требовалась концентрация, чтобы разобрать. Она же отвернулась от слов и внимательно следила за действиями. Жрец начал колдовать над её «отцом», и его лицо начало изменяться и искажаться. Он оказался молодым человеком — нет, наполовину человеком, но с явным уклоном в человеческую сторону, за исключением густых седых волос.\n\n«Мне жаль, что пришлось так с тобой», — сказал её бывший отец по‑орочьи. «Знаю, это было больно. Но чем сложнее испытание, тем больше сил ты сможешь открыть клинком, поэтому нам нужно было быть убедительными! И теперь ты достойна Хартсикера! Ты станешь нашим чемпионом. За забытых, за покинутых, за преданных».\n\n«Я этого не хочу». Лика вложила Хартсикера в ножны. «Я хотела —»\n\n«— Ты хотела принадлежать! Конечно. В этом парадокс избранных Мелкара: ты не выбираешь Мелкара. Мелкар не выбирал тебя тоже. Твой настоящий отец выбрал за тебя, отрёкшись от тебя».\n\nЛика сдерживала нахлынувшие эмоции. Она повернулась, чтобы уйти, затем вспомнила надоедливый шахматный коридор. «Мне снова исполнить тот же танец, чтобы выбраться из этого проклятого места?»\n\n«Не уходи ещё!» — сказал жрец. «Мы приехали из Ормала‑Сити, когда услышали, что ты проходишь испытание. Я заплатил высокую цену за это заклинание маскировки. И мы ждали здесь неделю, чтобы встретить тебя, помочь восстановить Хартсикера! Мы — друзья. Семья. Знаю, мы не та семья, которую ты хочешь. И у тебя нет причин доверять нам. Но мы—»\n\n«Не сейчас». Лика направилась к выходу. «Возможно когда‑нибудь, но не сегодня».\n\n«Ага», — сказал меч на её спине. Похоже, он мог говорить в её голове только когда она держала его. «К чёрту этих парней и к чёрту Мелкара. Он может давать мне силы, но это испытание — просто подлость».\n\n«Но в тот момент, когда ты уйдёшь», — сказал наполовину человеческий орк, — «твоя память об Испытаниях будет стёрта».\n\n«Что?! Так быстро? Почему?»\n\nСтарый жрец тоже уже стоял. «Это значит, что если ты не уйдёшь с нами, ты не будешь помнить, что знала нас вообще».\n\n«Мне это подходит», — сказала Лика, и направилась обратно в болото, а затем дальше — куда манило приключение."
"<h1>History of Arisetsu</h1>\n\n<i>(Council Annotated Edition)</i>\n\nThe Fennyra Crystal, the treasured memories of a million long-dead elves, shows a time unlike ours. In the age when humans and orcs were simple primitives, elves were more magical, more in tune with other realms, and their lifespans much longer. Although some sang songs of worship to Cae-a-lee, most elves cared little about gods, so the other elven gods were small.\n\nThe Crystal's last memory ends with the Autumn Felling, when half of all elves died and the rest were left in agony and despair. Cae-a-lee died too, right when elves needed her most. As elven lands rapidly fell to other races, two minor gods came to their rescue. Ir-hetsu, god of Wind, and his sister Aris, god of Warmth, guarded the last million living elves in the city now called Arisolme.\n\nAs the elves regained their strength, these gods became strong too. Irhetsu took on speech, then spoken stories, and soon enough all stories. Arisetsu remained the god of warmth, but also hope. Stories, hope, dreams, and time -- these things guided the elves back to a place of strength. And in a few short centuries Arisetsu had become a force beyond all recognition, the god of so many concepts that listing them became an ordeal. The other gods of the world were dwarfed by her magnificence, and their resentment grew.\n\nBut elves hope for peace, and not peace through excess strength. So Arisetsu in her grace and wisdom gave birth to new gods to represent concepts elves most respected. Her first child was Elshana, god of Creativity. Next came Errana, god of Food and Sex. Third was Dreva, god of Balance in Nature. \n\nAnd finally, Arisetsu could focus on simple Hope once again. Her light dimmed, but it will never expire, for Hope shall always light our darkness and save us from despair.\n\n--\n\n<b>Councilwoman Irasce's notes:</b> this history is exceptionally self-serving. It was written anonymously but it's easy to guess that a priest of Arisetsu is behind it: as is typical of her priests, this story makes her sound weak!\n\nThis story would have you believe that Arisetsu gave up most of her power and became a minor god. But the sheer scope of Arisetsu's power at its peak was incomprehensible, so the fact that her power level is now 'comprehensible' does not mean it is small.\n\nArisetsu is a class 1 nature spirit, capable of massive creation or destruction. Her priests bring comfort and healing to the sick and the needy around the world, and they are welcome in all Council cities. We are proud and honored to facilitate the worship of this kind spirit. However, the Council monitors her priesthood carefully, for although Arisetsu is ideologically a pacifist, she's also extremely pragmatic. Her paladins guard against \"threats that would extinguish hope among the faithful,\" which might as well mean \"anybody that angers Arisetsu.\" And the occasional news of combusting villains reminds us that Arisetsu is still the god of Warmth, and her priests can make things very warm indeed.\n\nLastly, for those not trained in classical Elvish, I want to bring attention to the seeming absence of the two other elder elven gods: Miraverre, goddess of Dreams, and Laeth, goddess of Time. These two stood alongside Irhetsu and Arisetsu in the crucial years after the Autumn Felling, so why are they ignored here? The answer is that they are referenced in an idiomatic form: <b>\"Stories, hope, dreams, and time -- these things guided the elves back to a place of strength.\"</b> This line, or a similar one, is used in many ancient Elvish poems to pay homage to the four old elven gods.": "<h1>История Арисэцу</h1>\n\n<i>(Аннотированное издание Совета)</i>\n\nКристалл Фенниры, сокровенные воспоминания миллиона давно умерших эльфов, показывает время, непохожее на наше. В эпоху, когда люди и орки были простыми дикарями, эльфы были более магическими, более настроенными на иные миры, и их продолжительность жизни была значительно больше. Хотя некоторые пели песни поклонения Кэ-а-ли, большинство эльфов мало заботились о богах, поэтому другие эльфийские боги имели малую силу.\n\nПоследняя память Кристалла кончается Осенним Истреблением, когда погибла половина всех эльфов, а оставшиеся были оставлены в агонии и отчаянии. Кэ-а-ли тоже умерла, в самый момент, когда эльфам она была нужнее всего. По мере того как эльфийские земли быстро падали перед другими расами, двое малых богов пришли им на выручку. Ир-хэцу, бог Ветра, и его сестра Арис, богиня Тепла, охраняли последний миллион живых эльфов в городе, ныне называемом Арисольм.\n\nПо мере того как эльфы вновь обретали силу, эти боги тоже становились сильнее. Ир-хэцу обрёл речь, затем устные сказания, и вскоре — все истории. Арисэцу осталась богиней тепла, но также и Надежды. Истории, надежда, сны и время — эти вещи вели эльфов обратно к силе. И за несколько коротких веков Арисэцу стала силой, не поддающейся признанию, богом стольких понятий, что их перечисление стало мукой. Другие боги мира бледнели перед её великолепием, и их недовольство росло.\n\nНо эльфы надеются на мир, а не на мир через чрезмерную силу. Поэтому Арисэцу в своей милости и мудрости породила новых богов, чтобы представить те понятия, которые эльфы больше всего уважали. Её первым ребёнком была Элшана, богиня Творчества. Затем появилась Эррана, богиня Пищи и Секса. Третьей была Древа, бог Баланса в Природе. \n\nИ наконец Арисэцу снова смогла сосредоточиться на простой Надежде. Её свет поблёк, но он никогда не угаснет, ибо Надежда всегда озарит нашу тьму и спасёт нас от отчаяния.\n\n--\n\n<b>Заметки советницы Ирасэ:</b> эта история исключительно самопохвальна. Она написана анонимно, но легко догадаться, что за ней стоит жрец Арисэцу: как это типично для её жрецов, эта история выставляет её слабой!\n\nЭта история хотела бы заставить вас поверить, что Арисэцу отказалась от большей части своей силы и стала малой богиней. Но огромный масштаб силы Арисэцу в её зените был непостижим, так что тот факт, что теперь её уровень силы стал «постижимым», не означает, что он мал.\n\nАрисэцу — дух природы класса 1, способный к массовому творению или разрушению. Её жрецы приносят утешение и исцеление больным и нуждающимся по всему миру, и их приветствуют во всех городах Совета. Мы горды и удостоены чести содействовать поклонению этому доброму духу. Однако Совет тщательно следит за её священством, ибо хотя идеологически Арисэцу пацифистка, она также чрезвычайно прагматична. Её паладины охраняют от \"угроз, которые могли бы погасить надежду среди верующих\", что по сути может означать \"кого угодно, кто разозлит Арисэцу.\" И время от времени новости о воспламеняющихся злодеях напоминают нам, что Арисэцу всё ещё богиня Тепла, и её жрецы действительно могут сделать вещи чрезвычайно тёплыми.\n\nНаконец, для тех, кто не обучен классическому эльфийскому, хочу обратить внимание на кажущееся отсутствие двух других старых эльфийских богов: Мираверре, богини Снов, и Лаэт, богини Времени. Эти двое стояли рядом с Ир-хэцу и Арисэцу в решающие годы после Осеннего Истребления, так почему же они здесь игнорируются? Ответ в том, что они упоминаются в идиоматической форме: <b>\"Истории, надежда, сны и время -- эти вещи вели эльфов обратно к силе.\"</b> Эта строка, или похожая на неё, используется во многих древних эльфийских поэмах, чтобы отдать дань четырём древним эльфийским богам."
"We know you have a lot of choices of where to shop, play, and eat. That's why we strive every day to earn your business. Our new Biped Outreach Program is just one of the many ways we try to make you feel at home.\n\nWhat is the Biped Outreach Program? We're glad you asked! Having discerned some discomfort amongst shoppers, we used our heightened psychic abilities to detect unconscious hostilities toward insects -- including mantises! While this is, of course, highly illogical, we realize that you can't help it. You are who you are, and who you are is a bug-hater. The Biped Outreach Program makes you feel more at home by introducing many shopkeepers and employees who are bipedal -- JUST LIKE YOU!\n\nWhether it's browsing our Shoppes at Red Wing or just relaxing in our mammal-friendly lounges, we want every minute of your stay to be memorable. Red Wing style.": "Мы знаем, что у вас много вариантов, где делать покупки, играть и поесть. Именно поэтому мы каждый день стараемся заслужить ваш выбор. Наша новая Программа взаимодействия с двуногими — лишь один из множества способов, которыми мы пытаемся помочь вам почувствовать себя как дома.\n\nЧто такое Программа взаимодействия с двуногими? Рады, что вы спросили! Обнаружив некоторый дискомфорт среди покупателей, мы использовали наши обострённые психические способности, чтобы выявить бессознательную враждебность к насекомым — включая богомолов! Хотя это, разумеется, крайне нелогично, мы понимаем, что вы ничего с этим не поделаете. Вы такие, какие вы есть — вы ненавистник насекомых. Программа взаимодействия с двуногими помогает вам чувствовать себя более как дома, представляя множество владельцев лавок и сотрудников, которые двуногие — ТАКИЕ ЖЕ, КАК ВЫ!\n\nБудь то прогулка по Шоппс в Ред Винг или просто отдых в наших лаунжах, дружелюбных к млекопитающим, мы хотим, чтобы каждая минута вашего пребывания была незабываемой. В стиле Ред Винг."
" <h2>Welcome to Monsters and Mantids!</h2> Monsters and Mantids is based on a dwarven game with similar themes. However, we have drastically simplified the rules to make the game more approachable. If the game still seems intimidating, you are in error: the game is NOT intimidating. You will understand this after playing a few rounds. Like all good casino games, you can learn it just by playing! We have organized the rules so that the most important information comes first. You can stop reading whenever you are ready to begin gambling!\n\n <h2>Understanding Dice Notation</h2> Monsters and Mantids uses a large number of six-sided dice. They are referred to in a shorthand form by the letter \"D\", which stands for \"dice\". For instance, if you eat a corpse after a battle, the game might say that you will recover 5D health. This means that five dice will be rolled, and you will recover the sum total of the amount shown.\n\nOften there is also a fixed amount added to the dice rolls. For example, some abilities deal 2D+3 damage. This means that two dice will be rolled, and the total damage is the amount shown on those dice plus 3. The amount can also be negative, such as 2D-3. This works the same way: you would roll two dice, then subtract 3 from the total. (Dice totals can never be negative, however, so if the number would go below 0, it becomes 0 instead.)\n\n <h2>How The Game Works</h2> You take on the role of a heroic mantis. You will fight enemies, encounter strange beings, avoid traps, and hopefully escape with a mighty pile of treasure! \n\nYour mantis is trained in three randomly-chosen combat abilities. During combat, you pick which of these three abilities to use. The enemy will also attack you at the same time. Your attack and the enemy's attack happen simultaneously. This means that even if you kill the enemy, their attack still hurts you, and you may both kill each other! (Certain combat abilities change this rule.)\n\nAfter each successful battle you can choose to delve deeper or to retreat and \"cash out\". If you choose not to retreat, you can instead meditate to improve one of your combat abilities, or rest and eat the corpse of your fallen enemy to regain your health. (When you reach level 3 you will have additional meditation options available.)\n\nIf you choose to \"cash out\", the game ends and you receive Councils equal to the amount of gold your mantis character accumulated. You will also receive one Red Wing Token for each cultural artifact you found. (More about culture items later.)\n\nIf your mantis hero dies (either in battle or due to an unfortunate random encounter), the game ends and you receive nothing. So knowing when to cash out is a crucial skill in Monsters and Mantids -- a skill that will take practice to master! But even if your mantis dies, your score is still eligible for the leaderboards, so you you can still earn bragging rights.\n\nMonsters and Mantids games typically only last a minute or two. Many mantis heroes will perish, but there are always more! Do not mourn them. Avenge them instead!\n\n <h2>Loot: Culture, Hats, and More</h2> When you defeat an enemy or survive an encounter you may receive special items. These includes gold, cultural artifacts, consumable items such as potions and bombs, and hats. \n\nGold has no in-game effect, except that you can sometimes purchase items with it from creatures you meet. When you cash out and end the game, you receive Councils equal to the gold you have.\n\nHats are equipment that provide special benefits. You begin play with a Basic Hat that has no special effect. Whenever you find a new hat you will be asked whether you want to keep your old hat or wear the new one. You can only keep one hat at a time. There are many kinds of hats, each with different game effects.\n\nYou can also find cultural artifacts. These include jewelry, trinkets, rugs, furniture, and anything else that has cultural value. Individual cultural artifacts are unimportant, but when you accumulate multiple artifacts, there are several benefits:\n\n<indent=15>- When you cash out, you receive 1 Red Wing Token for each cultural artifact your mantis had<br> - When you cash out, there is a chance you will activate a Table Buff (see below). The chance is 5% multiplied by the number of cultural artifacts your mantis had<br> - When your mantis makes Diplomacy checks (see below), you receive a +1 diplomacy bonus for every cultural artifact your mantis has</indent>\n\nYou can also find consumable items such as healing potions. You use these during combat. (They will be listed as additional options alongside your three combat abilities.)\n\n <h2>Diplomacy Checks</h2> When you encounter strange creatures, you may need to trick them, calm them, or otherwise manipulate them emotionally. This is done with a \"Diplomacy Check\". Three dice are rolled, and if the total is over a certain number, something good happens. If the number is too low, something bad happens. If the number is 6+ higher than the target number, this is called a \"critical success\" and something extra-good happens. If two or more of the dice roll a 1, however, something terrible happens: a \"critical failure\". Critical Failures happen whenever two 1s are shown, regardless of the total of the dice.\n\nFor every cultural artifact you've found, +1 is added to the dice total. There are also hats, buffs, and other strange effects that can improve your Diplomacy Checks. But remember that no matter how big of a bonus you have, it's always possible to roll two 1s and get a Critical Failure. Diplomacy always comes with risk! Sometimes the right decision is to not engage at all.\n\n <h2>Saving Throws</h2> When you run into traps, tricks, or treachery, you may need to make a Saving Throw. This works exactly the same as a Diplomacy Check, except that you do not get a bonus for having cultural artifacts. There are hats, buffs, and weird events that can permanently improve your Saving Throw rolls. But just as with Diplomacy Checks, rolling two 1s on the dice means a Critical Failure, which is often fatal.\n\n <h2>Perks</h2> When you reach level 2, 3, and 5, your character can pick a Perk from a random list. Perks are unique bonuses and abilities. \n\nThe Perks you can choose are randomly-selected from among all Perks your character is eligible for. Many Perks require a previous Perk. For instance, the \"Robust and Lucky\" perk will only show up if you already chose the \"Lucky\" perk earlier. Some perks also require you to have a certain amount of Max Health, a certain combat ability, etc.\n\nNote that all Perks completely stack together. So if you choose the \"Lucky\" Perk, which grants +1 to all Saving Throws, and later choose the \"Robust and Lucky\" perk, which grants +1 to Saving Throws and Diplomacy Checks\", the two perks combine to grant +2 to Saving Throws and +1 to Diplomacy Checks.\n\n <h2>Table Buffs</h2> If you have any cultural artifacts when you cash out and end the game, there's a chance you will activate a Table Buff. There's a 5% chance for each cultural item you have. (e.g. cashing out with 3 cultural artifacts would give you a 15% chance for a Table Buff.)\n\nTable Buffs are special bonuses that are given to every player who starts a game at that casino table. There are many different Table Buffs, such as Lucky Looter (which causes you to find 25% more gold on corpses) or Stylish Adventurer (which causes you to start with a Stylish Hat). \n\nTable Buffs last for an hour once activated. It's possible you'll randomly re-activate a Table Buff that's already active -- if that happens, its duration is reset to an hour.\n\nEveryone that starts a new game at the table during the next hour will receive all active Table Buffs. Due to space limitations, only ten players can fit around a table. Keep your place at the table by continuing to play! If you leave the table, another player may take your spot.": "<h2>Добро пожаловать в Монстры и Богомолы!</h2> Монстры и Богомолы основана на дворфской игре с похожими темами. Однако мы значительно упростили правила, чтобы сделать игру более доступной. Если игра всё ещё кажется вам пугающей, вы ошибаетесь: игра НЕ пугающая. Вы поймёте это после нескольких раундов. Как и во всех хороших казино-играх, вы можете научиться ей просто играя! Мы организовали правила так, чтобы самая важная информация шла первой. Вы можете прекратить чтение в любой момент, когда будете готовы начать играть!\n\n <h2>Понимание обозначений бросков кубиков</h2> Монстры и Богомолы использует большое количество шестигранных кубиков. Их в сокращении обозначают буквой \"D\", что означает \"dice\" (кубики). Например, если вы съедаете труп после боя, в игре может быть указано, что вы восстановите 5D здоровья. Это значит, что будет брошено пять кубиков, и вы восстановите сумму показаний этих кубиков.\n\nЧасто к сумме бросков добавляется фиксированное значение. Например, некоторые способности наносят 2D+3 урона. Это значит, что будут брошены два кубика, а итоговый урон — это сумма показаний этих кубиков плюс 3. Значение также может быть отрицательным, например 2D-3. Это работает так же: вы бросаете два кубика, затем вычитаете 3 из суммы. (Сумма бросков кубиков никогда не может быть отрицательной, поэтому если число опустится ниже 0, оно становится равным 0.)\n\n <h2>Как работает игра</h2> Вы выступаете в роли героического богомола. Вы будете сражаться с врагами, встречать странных существ, избегать ловушек и, надеюсь, уйдёте с внушительной кучей сокровищ!\n\nВаш богомол обучен трём случайно выбранным боевым способностям. В бою вы выбираете, какую из этих трёх способностей использовать. Враг также атакует вас одновременно. Ваша атака и атака врага происходят одновременно. Это означает, что даже если вы убьёте врага, его атака всё равно повредит вам, и вы можете убить друг друга! (Некоторые боевые способности изменяют это правило.)\n\nПосле каждой успешной схватки вы можете выбрать углубиться дальше или отступить и «обналичиться». Если вы решите не отступать, вы можете помедитировать, чтобы улучшить одну из своих боевых способностей, или отдохнуть и съесть труп поверженного врага, чтобы восстановить здоровье. (Когда вы достигнете уровня 3, у вас появятся дополнительные варианты медитации.)\n\nЕсли вы решите «обналичиться», игра заканчивается, и вы получаете Каунсилы в количестве, равном сумме золота, накопленного вашим богомолом. Вы также получите по одному Жетону Ред Винг за каждый найденный культурный артефакт. (Подробнее о предметах культуры далее.)\n\nЕсли ваш герой-богомол умрёт (либо в бою, либо из‑за неудачной случайной встречи), игра заканчивается, и вы ничего не получаете. Поэтому умение вовремя «обналичиваться» — критически важный навык в Монстрах и Богомолах — навык, который требует практики! Но даже если ваш богомол умрёт, ваш результат всё равно может попасть в таблицу лидеров, так что вы всё ещё сможете заслужить право похвастаться.\n\nИгры Монстры и Богомолы обычно длятся всего минуту или две. Многие герои-богомолы погибнут, но их всегда будет больше! Не оплакивайте их. Отомстите вместо этого!\n\n <h2>Добыча: культура, шляпы и другое</h2> Побеждая врага или пережив встречу, вы можете получить особые предметы. К ним относятся золото, культурные артефакты, расходуемые предметы, такие как зелья и бомбы, и шляпы.\n\nЗолото не имеет внутриигрового эффекта, за исключением того, что иногда вы можете купить за него вещи у существ, которых встретите. Когда вы «обналичиваетесь» и завершаете игру, вы получаете Каунсилы в количестве, равном вашему золоту.\n\nШляпы — это снаряжение, дающее особые преимущества. Вы начинаете игру с Базовой шляпой, которая не имеет особого эффекта. Каждый раз, когда вы находите новую шляпу, вам будет предложено, хотите ли вы сохранить старую шляпу или надеть новую. Вы можете носить только одну шляпу одновременно. Существует множество видов шляп, каждая с разными игровыми эффектами.\n\nВы также можете найти культурные артефакты. К ним относятся украшения, безделушки, ковры, мебель и всё остальное, что имеет культурную ценность. Отдельные культурные артефакты не важны, но когда вы собираете несколько артефактов, появляются несколько преимуществ:\n\n<indent=15>- Когда вы «обналичиваетесь», вы получаете по одному Жетону Ред Винг за каждый культурный артефакт, который был у вашего богомола<br> - Когда вы «обналичиваетесь», существует шанс активировать Бафф стола (см. ниже). Шанс составляет 5% умноженное на количество культурных артефактов, которые были у вашего богомола<br> - Когда ваш богомол совершает проверки дипломатии (см. ниже), вы получаете +1 к дипломатии за каждый культурный артефакт, который есть у вашего богомола</indent>\n\nВы также можете найти расходуемые предметы, такие как лечебные зелья. Вы используете их в бою. (Они будут перечислены как дополнительные опции наряду с вашими тремя боевыми способностями.)\n\n <h2>Проверки дипломатии</h2> Когда вы встречаете странных существ, вам может потребоваться обмануть их, успокоить их или иным образом эмоционально повлиять на них. Это делается с помощью «Проверки дипломатии». Бросаются три кубика, и если сумма превышает определённое число, происходит что‑то хорошее. Если число слишком низко, происходит что‑то плохое. Если сумма на 6 или более выше целевого числа, это называется «критическим успехом» и происходит что‑то особенно хорошее. Однако если два или более кубика показывают 1, происходит нечто ужасное: «критический провал». Критические провалы случаются всегда, когда выпадает две единицы, независимо от общей суммы.\n\nЗа каждый найденный культурный артефакт к сумме бросков добавляется +1. Также есть шляпы, баффы и другие странные эффекты, которые могут улучшить ваши проверки дипломатии. Но помните, что независимо от величины вашего бонуса, всегда возможно выбросить две единицы и получить критический провал. Дипломатия — это всегда риск! Иногда правильное решение — вовсе не вступать во взаимодействие.\n\n <h2>Спасброски</h2> Когда вы натыкаетесь на ловушки, хитрости или предательство, вам может потребоваться совершить Спасбросок. Это работает точно так же, как Проверка дипломатии, за исключением того, что вы не получаете бонуса за наличие культурных артефактов. Есть шляпы, баффы и странные события, которые могут постоянно улучшить ваши броски Спасбросков. Но так же, как и с проверками дипломатии, выпадение двух единиц на кубиках означает критический провал, который часто бывает смертельным.\n\n <h2>Преимущества</h2> Когда вы достигаете уровней 2, 3 и 5, ваш персонаж может выбрать Преимущество из случайного списка. Преимущества — это уникальные бонусы и способности.\n\nПреимущества, которые вы можете выбрать, случайным образом отбираются из всех Преимуществ, для которых ваш персонаж подходит. Многие Преимущества требуют предыдущего Преимущества. Например, Преимущество «Крепкий и Везучий» появится только если вы уже выбрали ранее Преимущество «Везучий». Некоторые Преимущества также требуют определённого значения Max Health, наличия определённой боевой способности и т.д.\n\nОбратите внимание, что все Преимущества полностью суммируются. Поэтому если вы выбрали Преимущество «Везучий», которое даёт +1 ко всем Спасброскам, а позднее выбрали Преимущество «Крепкий и Везучий», которое даёт +1 к Спасброскам и Проверкам дипломатии, оба Преимущества суммируются, давая +2 к Спасброскам и +1 к Проверкам дипломатии.\n\n <h2>Баффы стола</h2> Если у вас есть какие-либо культурные артефакты, когда вы «обналичиваетесь» и завершаете игру, существует шанс, что вы активируете Бафф стола. Шанс составляет 5% за каждый культурный предмет, который у вас есть. (например, «обналичивание» с 3 культурными артефактами даст вам 15% шанс получить Бафф стола.)\n\nБаффы стола — это специальные бонусы, которые даются каждому игроку, начинающему игру за этим столом в казино. Существует множество разных Баффов стола, таких как Везучий Добытчик (который заставляет вас находить на трупах на 25% больше золота) или Стильный Искатель Приключений (который заставляет вас начинать со Стильной шляпой).\n\nБаффы стола действуют в течение часа после активации. Возможно, вы случайно снова активируете уже действующий Бафф стола — в этом случае его продолжительность сбрасывается до одного часа.\n\nВсе, кто начнёт новую игру за столом в течение следующего часа, получат все активные Баффы стола. Из‑за ограничений по месту вокруг стола помещается только десять игроков. Сохраняйте своё место за столом, продолжая играть! Если вы покинете стол, ваше место может занять другой игрок."
"Five years ago, Sedgewick Forest was suffering from a massive influx of goblins. This created many environmental problems. Red Wings are native to the forest -- our progenitors are the native Tree Mantids -- but goblins are an invasive species with few natural predators. The forest's small population of elves and druids could not slow the rising goblin numbers, and the forest was in danger of complete destruction!\n\nThat's why the Red Wing Collective is proud to serve as predators of these goblins, ensuring that their numbers never overwhelm the wonders of the forest. We also ensure that weak and sickly goblins are culled, so the goblins that remain in the forest are powerful, hardy members of their species!\n\nBut the Red Wings are humble learners and we've adopted many techniques found in goblin culture. Our system of indentured servitude, while less violent than goblin methods, is similarly effective. We've also discovered from goblins that the accumulation of vast wealth can lead to happier lives. Goblins may seem like unimportant bipeds, but they have much to teach us. \n\nThat's why we are proud to announce that the Red Wing Casino was developed in part through goblin subcontracting. The casino was built in an abandoned castle that needed extensive renovation, and by partnering with goblins, we were able to open the casino in less than two years!*\n\nWhile other races seek to force goblins out of Sedgewick Forest, we believe that the future is through partnerships. <b>That's because Making Friends is the Way of the Mantis!</b>\n\n-\n\n<i>* We are contractually obligated to mention that more than 50% of the development of the Red Wing Casino was performed by dwarves, which are a similarly-sized but completely unrelated biped race. Dwarves and goblins share animosity... but we are above such petty conflicts and can see the beauty of both races. We hope to bridge the culture gap between dwarves and goblins to bring about a new era of racial harmony.** </i>\n\n<i>** Note: there is no ETA for racial harmony at this time.</i>": "Пять лет назад лес Седжедвик страдал от массового натиска гоблинов. Это создало множество экологических проблем. Ред Вингс — коренные обитатели леса: наши предки были местными древесными богомолами — но гоблины являются инвазивным видом с немногими естественными хищниками. Небольшое население леса из эльфов и друидов не могло замедлить рост численности гоблинов, и лес оказался под угрозой полного уничтожения!\n\nИменно поэтому Коллектив Ред Винг горд служить хищниками по отношению к этим гоблинам, гарантируя, что их численность никогда не поглотит чудеса леса. Мы также следим за тем, чтобы слабые и больные гоблины отбраковывались, так что остающиеся в лесу гоблины — сильные, выносливые представители своего вида!\n\nНо Ред Вингс — смиренные ученики, и мы переняли многие приёмы из гоблинской культуры. Наша система договорного долгового рабства, хоть и менее жестока, чем гоблинские методы, столь же эффективна. Мы также узнали от гоблинов, что накопление больших богатств может привести к более счастливой жизни. Гоблины могут казаться незначительными двуногими существами, но у них есть чему у нас научиться. \n\nИменно поэтому мы с гордостью объявляем, что Казино Ред Винг было частично построено с участием гоблинских субподрядчиков. Казино было возведено в заброшенном замке, требовавшем обширной реконструкции, и, объединившись с гоблинами, мы смогли открыть казино менее чем за два года!*\n\nВ то время как другие расы стремятся выгнать гоблинов из леса Седжедвик, мы считаем, что будущее — в партнёрствах. <b>Потому что заводить друзей — Путь богомола!</b>\n\n-\n\n<i>* Мы обязаны по контракту упомянуть, что более 50% работ по созданию Казино Ред Винг были выполнены гномами, которые являются представителями схожего по размеру, но полностью несвязанного двуногого вида. Гномы и гоблины испытывают взаимную враждебность... но мы выше таких мелочных конфликтов и способны увидеть красоту обеих рас. Мы надеемся преодолеть культурный разрыв между гномами и гоблинами, чтобы открыть новую эпоху расовой гармонии.** </i>\n\n<i>** Примечание: на данный момент ориентировочных сроков достижения расовой гармонии нет.</i>"
"<h1>Secrets of the Psilobe Explained</h1> <i>by the Hive-Mind known as Forgaxis</i>\n\nSuppose you found an unusual biped, perhaps a human, who presented psychic powers. Were you to dissect this biped, you would not find any physical source of their psychic abilities. The best explanation available is that portions of a psychic's brain exist in a parallel dimension. This might explain why most psychics are able to telepathically \"speak\" to each other: they can project waveforms in a different dimension, one which other psychics are able to \"hear\" in. But this is pure conjecture. Let us return to facts.\n\nWere you to dissect a fallen Red Wing mantis, you would likewise find no physical evidence of their psychic powers, for they are from an earlier generation of psi-mantis. But were you to dissect a late-generation or \"true\" psi mantis, such as a Forgaxis member or a mantis from the Great City of Insects, you would find a special brain lobe called the psilobe.\n\nThe psilobe is the invention of our progenitor, the great wizard Dalvos. It acts as a neural processor of psychic information, allowing us to coalesce other mantis's emanations into every kind of stimulus: visual, audible, olfactory, pain, even emotions. This allows us to perfectly communicate thoughts between each other.\n\nThe psilobe also lets us link dozens of mantises together to create a hive mind in times of danger, so we can act with precision in unison. And some mantis gangs, such as Forgaxis, the author of this book, choose to remain in a hive mind permanently, becoming one sentient organism with dozens of bodies.\n\n<h1>Psilobes Provide Genetic Reliability</h1>\n\nOur research shows that psychic creatures without psilobes are not necessarily less psychically powerful than true psi-mantises, and some have greater psychic power. So what is the point of the psilobe? Genetic reliability. While many races produce occasional individuals with psychic ability, their offspring do not reliably inherit those traits. Even when two psychic bipeds mate, their offspring will have unpredictable capabilites, or sometimes no psychic abilities at all.\n\nThanks to psilobes, every true psi-mantis has a basic set of psychic tools that allow them to work in harmony and efficiency. Some mantises enjoy other unique psychic gifts as well, but all can at least communicate with each other and participate in the joy of the Hive Mind.\n\nWe are still discovering new secrets of the psilobe; its mysteries are only beginning to unfold. Future editions of this book will include new information when it becomes available.": "<h1>Тайны псилоба: объяснение</h1> <i>от Коллективного Разума, известного как Форгаксис</i>\n\nПредположим, вы нашли необычное двуногое существо, возможно человека, обладающее психическими способностями. Если вы препарируете это двуногое существо, вы не найдёте никакого физического источника его пси-способностей. Лучшее доступное объяснение состоит в том, что части мозга псионика существуют в параллельном измерении. Это могло бы объяснить, почему большинство псиоников способно телепатически «говорить» друг с другом: они могут проецировать волновые формы в другое измерение, которое другие псионики способны там «слышать». Но это лишь гипотеза. Вернёмся к фактам.\n\nЕсли вы препарируете павшего краснокрылого богомола, вы также не обнаружите физических доказательств его пси-способностей, поскольку он относится к более раннему поколению пси-богомолов. Но если вы препарируете позднего поколения или «истинного» пси-богомола, такого как член Форгаксиса или богомол из Грейт Сити оф Инсектс, вы обнаружите особую долю мозга, называемую псилобом.\n\nПсилоб — изобретение нашего прародителя, великого волшебника Далвоса. Он действует как нейронный процессор пси‑информации, позволяя нам сливать эманации других богомолов в самые разные виды стимулов: зрительные, слуховые, обонятельные, болевые, даже эмоциональные. Это позволяет нам идеально передавать мысли друг другу.\n\nПсилоб также даёт нам возможность связывать десятки богомолов вместе, чтобы в моменты опасности формировать Коллективный Разум и действовать с точностью в унисон. А некоторые банды богомолов, такие как Форгаксис, автор этой книги, выбирают оставаться в коллективном разуме постоянно, становясь одним разумным организмом с десятками тел.\n\n<h1>Псилобы обеспечивают генетическую надёжность</h1>\n\nНаши исследования показывают, что психические существа без псилобов не обязательно менее псионически сильны, чем истинные пси‑богомолы; некоторые обладают даже большей псионической мощью. Так в чём же смысл псилоба? В генетической надёжности. Хотя многие расы время от времени порождают отдельных особей с пси‑способностями, их потомство не всегда надёжно наследует эти черты. Даже когда два псионических двуногих скрещиваются, их потомство может получить непредсказуемые способности или иногда вообще не унаследовать пси‑умений.\n\nБлагодаря псилобам каждый истинный пси‑богомол имеет базовый набор пси‑инструментов, которые позволяют им действовать в согласии и эффективно. Некоторые богомолы обладают и другими уникальными пси‑дарованиями, но все, по крайней мере, могут общаться друг с другом и участвовать в радости Коллективного Разума.\n\nМы всё ещё открываем новые тайны псилоба; его загадки только начинают раскрываться. Будущие издания этой книги будут включать новую информацию по мере её появления."
"<h1>History of Psi Mantises</h1> <h2>Dawn of the Perfect Species</h2>\n\n<i>By Maletaxis</i>\n\n<h2>The First Era</h2>\n\nOur creator, the great wizard Dalvos, spent years perfecting his design for psychic mantises. His work began approximately six years ago in the wilds of Eltibule and Sedgwick Forest, wildernesses of little cultural importance. He noticed that the area was home to giant mantises, and wondered if he could make them intelligent enough to be good servants to him. Thus began Revision 1.\n\nWe have Dalvos's notes for each revision of psychic mantis, but they are sparse and often use cryptic abbreviations. We do not know exactly what changed between each revision; we can only conjecture from contextual clues. But we do know that the first forty-four revisions were failures: the resulting creatures were not sufficiently intelligent and were released into the wilds of Eltibule.\n\nHis notes for revision 72 indicate satisfaction with the species' intellect. After that, he turned to improving their utility by adding psychic powers. His notes for revision 108 indicate success: the new generation's psychic powers bred true, and all individuals had at least some psychic abilities.\n\nThese mantises, collectively called the \"first-era\" mantises, are capable of telepathic communication, have psychically-enhanced senses, and can usually manifest their willpower as a psychic attack. Many individuals have other powers, but these additional powers are not passed on to their descendants.\n\nRed Wing mantises are perhaps the most important first-era mantises. It is believed they descend from members of the 60th, 62nd, and 63rd revisions. The Veiny Mantises are also first-era (of unknown revision). \n\nFirst-era mantises can be recognized by their veiny wings. They are stronger and more resilient than later mantids, but their psychic powers are weak, comparable perhaps to a gifted psychic elf.\n\n<h2>The Second Era</h2>\n\nRevisions from 72 to 140 are called \"second era\" mantises. This era saw the development of the psilobe, a special portion of the mantis brain designed to enhance our psychic powers. These mantises were unfortunately unstable: their primitive psilobes caused eventual brain damage and most suffered from schizophrenia and paranoia. \n\nWe do not know the fate of most second era mantises. They were released into the wilds of Eltibule, and may have wandered anywhere. But we presume that most are dead. Three important exceptions are the \"cave mantises\" (from the relatively stable revision #108), the Yellow Mantids, known for their explosive powers and extreme instability, and the Tragic Tree Mantises of Sedgewick Forest (TTMSFs).\n\nSecond-era mantises are visually recognizable by their single-color carapaces. Because their psilobes behave unpredictably, many -- perhaps most -- of these mantises have unique and bizarre psychic gifts. This makes their mental instability all the more tragic. It also makes them horrifically dangerous.\n\n<h2>The Third Era</h2>\n\nRevisions from 221 onwards are called \"third era\" or \"true\" psychic mantises. Having perfected the psilobe, Dalvos focused on improving temperament, intellect, longevity, memory, and dexterity. Many mantises from generation 263 onwards have reliable short-distance flight.\n\nThird-era mantises are visually distinguishable by their elegant pinkish hue and translucent wings.\n\n<h2>The End of Revisions</h2>\n\nThen, having apparently perfected the design of the psi-mantis, Dalvos left. We do not know why. He had amassed an army of thousands of loyal mantises. We expected an opportunity to defend our creator against the many evil bipeds that want him destroyed, but he had different plans. He simply set us free. His parting words are ingrained into our memories:\n\n<indent=15><i>\"Okay everybody, I have an announcement: I have to go, and I won't be coming back. You guys have been great. All of you! You're all free now, and I hope you have wonderful lives. Create amazing cultures. Dominate the world, maybe! Hah! Thanks for everything, but listen: don't follow me. That's an order. And take care of the brain-bugs, okay?\"</i></indent>\n\nThese sacred words are a comfort to us in difficult times. Dalvos encoded many instructions in his final missive, and some of us believe his words hide further secrets that we will only understand when we are ready.\n\nTruly Dalvos is a genius. If he has not yet ascended to godhood, we expect that he will inevitably do so in time. And we are evidence of why! Psi-mantises are just one of the five known species Dalvos has created. Is there anything more godly than creating new forms of life? The answer is no.": "<h1>История пси-богомолов</h1> <h2>Рассвет совершенного вида</h2>\n\n<i>От Малетаксиса</i>\n\n<h2>Первая эра</h2>\n\nНаш создатель, великий волшебник Далвос, потратил годы на доведение до совершенства своего проекта пси‑богомолов. Его работа началась примерно шесть лет назад в диких районах Элтибуля и Седжвик Форест, пустошах с небольшим культурным значением. Он заметил, что в тех местах обитают гигантские богомолы, и задумался, можно ли сделать их достаточно разумными, чтобы они стали его хорошими слугами. Так началась Ревизия 1.\n\nУ нас есть заметки Далвоса по каждой ревизии пси‑богомола, но они скудны и часто содержат загадочные сокращения. Мы не знаем точно, что менялось между ревизиями; можем лишь делать предположения по контексту. Но мы знаем, что первые сорок четыре ревизии оказались неудачными: получившиеся существа были недостаточно разумны и были выпущены в дикую природу Элтибуля.\n\nЗаписи по Ревизии 72 указывают на удовлетворение интеллекту вида. После этого он занялся повышением их полезности, добавив пси‑способности. Записи по Ревизии 108 свидетельствуют об успехе: пси‑способности нового поколения оказались наследуемыми, и у всех особей имелись хотя бы какие‑то психические умения.\n\nЭти богомолы, в совокупности называемые богомолами «первой эры», способны к телепатическому общению, обладают психически усиленными чувствами и обычно могут воплощать свою силу воли в виде психической атаки. У многих особей имеются и другие способности, но эти дополнительные умения не передаются потомству.\n\nКраснокрылые богомолы, пожалуй, наиболее важны среди богомолов первой эры. Считают, что они происходят от особей 60‑й, 62‑й и 63‑й ревизий. Жилковые богомолы также относятся к первой эре (ревизия неизвестна).\n\nБогомолов первой эры можно опознать по их жилковатым крыльям. Они сильнее и выносливее, чем более поздние мантиды, но их пси‑способности слабы, возможно сопоставимы с возможностями одарённого пси‑эльфа.\n\n<h2>Вторая эра</h2>\n\nРевизии с 72 по 140 называются богомолами «второй эры». В эту эру была разработана псилоба — особая часть мозга богомола, предназначенная для усиления наших пси‑способностей. К сожалению, эти богомолы были нестабильны: их примитивные псилобы со временем вызывали повреждения мозга, и большинство страдало шизофренией и паранойей.\n\nМы не знаем судьбы большинства богомолов второй эры. Их выпустили в дикую природу Элтибуля, и они могли разбредаться куда угодно. Но мы предполагаем, что большинство погибли. Три важные исключения — «пещерные богомолы» (из относительно стабильной Ревизии №108), Жёлтые мантиды, известные своими взрывными способностями и крайней нестабильностью, и Трагические Древесные Богомолы Седжвик Форест (TTMSFs).\n\nБогомолов второй эры визуально отличает однотонный хитиновый панцирь. Поскольку их псилобы ведут себя непредсказуемо, многие — возможно большинство — этих богомолов обладают уникальными и причудливыми психическими дарами. Это делает их психическую нестабильность ещё более трагичной. Это также делает их ужасающе опасными.\n\n<h2>Третья эра</h2>\n\nРевизии с 221 и далее называются богомолами «третьей эры» или «истинными» пси‑богомолами. Доведя псилобу до совершенства, Далвос сосредоточился на улучшении темперамента, интеллекта, долголетия, памяти и ловкости. Многие богомолы поколения с 263‑го и далее обладают надёжным коротким полётом.\n\nБогомолы третьей эры визуально отличимы своим элегантным розоватым оттенком и прозрачными крыльями.\n\n<h2>Конец ревизий</h2>\n\nЗатем, видимо доведя проект пси‑богомола до совершенства, Далвос ушёл. Мы не знаем почему. Он собрал армию из тысяч преданных богомолов. Мы ожидали возможности защитить нашего создателя от множества злых двуногих, желающих его уничтожить, но у него были другие планы. Он просто освободил нас. Его прощальные слова врезались в нашу память:\n\n<indent=15><i>\"Хорошо, всем, у меня объявление: мне нужно уйти, и я не собираюсь возвращаться. Вы были замечательны. Все вы! Вы все теперь свободны, и я надеюсь, что у вас будут прекрасные жизни. Создавайте удивительные культуры. Доминируйте над миром, может быть! Ха! Спасибо за всё, но слушайте: не следуйте за мной. Это приказ. И позаботьтесь о мозговых жучках, хорошо?\"</i></indent>\n\nЭти священные слова утешают нас в тяжёлые времена. Далвос закодировал много инструкций в своём последнем послании, и некоторые из нас верят, что в его словах скрыты дополнительные тайны, которые мы поймём лишь тогда, когда будем готовы.\n\nПоистине, Далвос — гений. Если он ещё не вознёсся до божественности, мы ожидаем, что со временем это непременно произойдёт. И мы — доказательство тому! Пси‑богомолы — лишь один из пяти известных видов, созданных Далвосом. Есть ли что‑то более божественное, чем сотворение новых форм жизни? Ответ — нет."
" Hello, fellow druid. It was my decision to keep this place intact. You likely think you deserve an explanation for that. You are wrong: I answer to Dreva directly. But though you are owed nothing, I will be generous for the sake of future druid generations.\n\nI doubt I need to explain Dreva's anger at the loss of Ilmari. I was in neighboring Anselon and felt the earth tremble, saw the night sky light up with storms of impossible size. When I felt Dreva's summons, I knew it would be the final time I was called to fight the rakshasa, one way or another. The time for patience and diplomacy was over. Rahu had to fall.\n\nWe numbered only a few hundred druids, but Dreva gave us terrible new powers, and we took the city in short order. We then spent weeks hunting down surviving packs of warriors and slaying them.\n\nWe have destroyed every demonic artifact on the surface. That includes the \"weather machine\" responsible for ravaging Ilmari. A few demonic airships escaped to their home world, but we have destroyed their portals forever, thanks to our newfound abilities. No reinforcements will be coming.\n\nThat left us with a few thousand surviving rakshasa, all of them injured or very young. We druids had tired of killing by then; our rage had turned to sadness. We asked Dreva to let us be merciful. Dreva agreed so long as we \"gifted\" them with a strange liquid that took away their evil nature and made them \"compatible with the natural world\".\n\nThe surviving rakshasa have been given this gift. They have lost their shapeshifting powers, taking on a form more compatible with the creatures of our world. The concept of a 'conscience' has been sewn into their minds. They barely understand what is happening to them... but they know enough to hate druids.\n\nTheir offspring will be a new race. They will feel new emotions that their parents cannot help them understand. They will be fragile and vulnerable. And that is why I have left this place intact: the water crystals here are responsible for filling the surface lakes with clean drinking water. This may seem unimportant now while the weather machine's storms still batter the city. But when the storms end, I believe there will be no life left in Ilmari. Without clean water, this fledgling race would surely die. I will not permit that.\n\nThat is your explanation. Now on to other matters.\n\n--\n\nI asked Dreva to post an observer in Rahu, much as we keep observers in other major cities, to ward off problems before they become severe. Dreva angrily refused to spend any more resources here... and I must honor that decision. But during the Battle of Rahu, I met Archdruids from other lands, including followers of Ri-Shin, the god of plants. They have agreed to post observers here for a few hundred years. They are allies! Do not fight your fellow druids. There has been enough fighting! Trust that they, like you, want what is best for the world. \n\nWe have agreed upon a code-phrase for like-minded druids to greet each other: \"When the sun sets, the forest beckons green.\" I believe in you and trust you, druid, and I give you the code-phrase as proof.\n\nI believe Rahu was intended to be a mining colony. The invading rakshasa chose to colonize Ilmari for the same reason the crones came centuries ago: there are large untapped veins of magical metals here. Perhaps the future inhabitants of Rahu should be allowed to mine this metal for themselves. But for now, these wretched survivors must not be given access to the metal, for they seem to understand its powers far better than we do. They are desperate for weapons and care not for consequences. So we have destroyed every piece of mining equipment and collapsed their mines. The survivors won't soon reopen them. \n\nBut the underground creatures of the \"gob-lands\" covet the metal as well, and without the crones to keep them in check, goblin miners will eventually find this place. When that happens, I fear for the safety of the water crystals. So I've asked the druids of Ri-Shin to help me plant many small treants in the most defensible areas. With luck, they will ensure that Rahu has a few hundred years of clean water.\n\n--\n\nEmotions are part of nature, so Dreva is just as susceptible to anger as any druid. I take no pleasure in disagreeing with Dreva, but I have NOT disobeyed! I have performed my solemn duty to protect life now and in the future.\n\nI do not pretend to be blameless. I fought many rakshasa during the battles with Rahu, and I believe they would have preferred death over what we did to them. But we did not ask. We forced this new life upon them.\n\nIf you are a young rakshasa who has become a druid of Dreva, this news may be a shock to you. If you feel anger, or any other emotion, rejoice, for that is natural! Emotions are not a sign of weakness! If you wish to speak further, find me in Verta. I am retiring to my ancestral trees in Dwyndarre. I will answer any questions that I can.\n\nBut heed my warning: if you intend to destroy me, you will need to bring a better army than last time. Dreva has gifted me with powers you cannot comprehend.\n\n- High Archdruid Celatus": "Приветствую, соратник друид. Это было моё решение — оставить это место нетронутым. Ты, вероятно, думаешь, что заслуживаешь объяснений. Ты ошибаешься: я отчитываюсь напрямую перед Древой. Но хотя ты мне ничего не должен, я проявлю щедрость ради будущих поколений друидов.\n\nНе думаю, что мне нужно объяснять гнев Древы из‑за потери Илмари. Я находился в соседнем Анселоне и чувствовал, как дрожала земля, видел, как ночное небо вспыхнуло бурями невозможных размеров. Когда я ощутил призыв Древы, я понял, что это будет последний раз, когда меня призовут сражаться с ракшасами, так или иначе. Время терпения и дипломатии прошло. Раху должен был пасть.\n\nНас было всего несколько сотен друидов, но Древа даровала нам ужасающие новые силы, и мы быстро захватили город. Затем мы несколько недель выслеживали оставшиеся стаи воинов и уничтожали их.\n\nМы уничтожили все демонические артефакты на поверхности. Это включает в себя «машину погоды», ответственную за разорение Илмари. Несколько демонических воздушных кораблей сбежали в их родной мир, но мы навсегда уничтожили их порталы, благодаря нашим вновь обретённым способностям. Подкреплений не будет.\n\nУ нас осталось несколько тысяч выживших ракшасов, все они были ранены или очень молоды. Мы, друиды, устали от убийств; наш гнев превратился в печаль. Мы попросили Древу позволить нам проявить милосердие. Древа согласилась при условии, что мы «одарим» их странной жидкостью, которая отнимет у них злую природу и сделает их «совместимыми с природным миром».\n\nВыжившим ракшасам был преподнесён этот дар. Они потеряли свои способности к изменению формы, приняв облик более совместимый с существами нашего мира. Понятие «совести» было вплетено в их умы. Они едва понимают, что с ними происходит... но они достаточно понимают, чтобы ненавидеть друидов.\n\nИх потомство станет новой расой. Они будут испытывать новые эмоции, которые их родители не смогут им объяснить. Они будут хрупкими и уязвимыми. И именно поэтому я оставил это место нетронутым: водные кристаллы здесь отвечают за наполнение поверхностных озёр чистой питьевой водой. Это может казаться несущественным сейчас, пока штормы «машины погоды» всё ещё обрушиваются на город. Но когда штормы прекратятся, я полагаю, в Илмари не останется жизни. Без чистой воды эта зарождающаяся раса наверняка погибнет. Я этого не допущу.\n\nЭто твоё объяснение. А теперь к другим вопросам.\n\n--\n\nЯ просил Древу разместить наблюдателя в Раху, так же как мы держим наблюдателей в других крупных городах, чтобы предотвращать проблемы до того, как они станут серьёзными. Древа в гневе отказалась тратить здесь больше ресурсов... и я должен уважать это решение. Но во время Битвы за Раху я встретил архидруидов из других земель, в том числе последователей Ри-Шина, бога растений. Они согласились разместить наблюдателей здесь на несколько сотен лет. Они — союзники! Не сражайтесь со своими собратьями друидами. Боев уже было достаточно! Доверьтесь тому, что они, как и вы, хотят добра для мира.\n\nМы договорились о кодовой фразе, которую друиды-единомышленники будут использовать при приветствии друг друга: «Когда солнце заходит, лес манит зеленью». Я верю в тебя и доверяю тебе, друид, и дарую тебе эту кодовую фразу в знак доверия.\n\nЯ считаю, что Раху изначально задумывался как горная колония. Захватившие её ракшасы выбрали Илмари по той же причине, по которой сюда пришли старухи столетия назад: здесь есть крупные неразработанные жилы магических металлов. Возможно, будущим жителям Раху следовало бы позволить самим добывать этот металл. Но пока этим жалким выжившим нельзя допускать доступа к металлу, так как они, похоже, понимают его силы намного лучше нас. Они отчаянно нуждаются в оружии и не заботятся о последствиях. Поэтому мы уничтожили все горные механизмы и обрушили их шахты. Выжившие скоро их не откроют.\n\nНо подземные существа из земель гобов тоже жаждут этого металла, и без старух, удерживавших их в узде, гоблинские шахтёры рано или поздно найдут это место. Когда это случится, я боюсь за безопасность водных кристаллов. Поэтому я попросил друидов Ри-Шина помочь мне посадить множество маленьких трэнтов в наиболее защищённых районах. С удачей они обеспечат Раху несколько сотен лет чистой воды.\n\n--\n\nЭмоции — часть природы, поэтому Древа так же подвержена гневу, как и любой друид. Мне не доставляет удовольствия не соглашаться с Древой, но я НЕ ослушался! Я выполнил свой торжественный долг по защите жизни сейчас и в будущем.\n\nЯ не претендую на безупречность. Я сражался со многими ракшасами во время боёв за Раху, и я полагаю, что они предпочли бы смерть тому, что мы с ними сделали. Но мы не спрашивали их. Мы навязали им эту новую жизнь.\n\nЕсли ты молодой ракшас, ставший друидом Древы, эта новость может шокировать тебя. Если ты чувствуешь гнев или любую другую эмоцию, радуйся, ведь это естественно! Эмоции — не признак слабости! Если хочешь поговорить дальше, найди меня в Верте. Я ухожу на покой в свои родовые деревья в Дуиндарре. Я отвечу на любые вопросы, которые смогу.\n\nНо прислушайся к моему предупреждению: если ты намерен уничтожить меня, тебе придётся привести армию получше, чем в прошлый раз. Древа одарила меня силами, которые ты не сможешь постичь.\n\n- Верховный архидруид Целатус"
"I am Corinth, Head Augmenter of the Augmenter's Guild of Statehelm. And I am writing this book to help fix a very serious problem: our poll of soldiers and warriors visiting Statehelm shows that almost half of them don't use Augments. Some warriors don't even know what they are! Fools! These warriors are fools! And I will not stand idly by while their ignorance gets them killed. I must teach.\n\nAugments are powerful enchantments that can be placed inside a weapon or piece of armor. The equipment doesn't need to be special at all: <i>any</i> piece of equipment can have an Augment installed into it! From a pointy stick to a razor-sharp Sword of Excruciation, they can all become stronger with the help of an Augment.\n\nYou may already have magic equipment, but Augments can carry thousands of different enchantments. Surely your weapon doesn't have <i>every</i> enchantment, does it? No. But with an Augment, you can add one more!\n\nAnd you needn't stop with just one Augment! While each piece of equipment can only have a single Augment in it, you can add an Augment to every single piece of clothing or armor you're wearing. Imagine the power! Imagine the possibilities!\n\n\"But Corinth,\" I imagine you saying (and here I must admit that I imagine your voice to be whiny and irritating, for I assume you are an imbecile that I must tutor). \"I'm not a trained Augmenter. I can't create Augments!\" Of course you can't. You're a warrior! You don't need to create your own Augments. Simply buy them from us! There are professional Augmenters all across the world. And our merchandise is for sale from shopkeepers everywhere!\n\n\"But Corinth,\" I imagine you saying (while sniveling like a child). \"Even if I purchased an Augment, I couldn't install that Augment!\" That is correct. You should <i>never</i> try to install an Augment yourself! Doing so could cause a tremendous explosion, and in rare cases horrific transformation. Instead, visit your local weapons or armor shop. Most shopkeepers have been trained in Augment installation, and can install it for a small fee.\n\n\"But Corinth,\" I hear you say, hopping up and down and flailing your arms. \"There are so many Augments to choose from! What if I install the wrong Augment and change my mind? I'm paralyzed with doubt!\" While it is true that removing an Augment is difficult -- too tricky for the average bumbling shopkeeper -- you can seek out a professional Augmenter to help you remove it. The old Augment will be destroyed, but your weapon or armor will be fine, and you'll be able to install a different Augment in it.\n\n\"But Corinth,\" I hear you say. However, I have had enough of your gibbering. The time for complaints is over! Become the best warrior you can be: go and buy some Augments right now!": "Я — Коринф, главный установщик аугментов Гильдии установщиков аугментов Стейтхелма. И я пишу эту книгу, чтобы помочь исправить одну очень серьёзную проблему: наш опрос солдат и воинов, посещающих Стейтхелм, показывает, что почти половина из них не пользуется аугментами. Некоторые воины даже не знают, что это такое! Дураки! Эти воины — дураки! И я не стану сидеть сложа руки, пока их невежество не погубит их. Я должен учить.\n\nАугменты — мощные чары, которые можно поместить внутрь оружия или предмета брони. Снаряжение вовсе не обязано быть особым: <i>любая</i> часть снаряжения может иметь установленный аугмент! От острой палки до бритвенно-острого Меча Истязания — всё это может стать сильнее с помощью аугмента.\n\nВозможно, у вас уже есть магическое снаряжение, но аугменты могут включать тысячи различных чар. Навряд ли ваше оружие содержит <i>каждое</i> заклинание, не так ли? Нет. Но с аугментом вы можете добавить ещё одно!\n\nИ не нужно ограничиваться лишь одним аугментом! Хотя каждая единица снаряжения может иметь только один аугмент, вы можете установить аугмент на каждый предмет одежды или брони, который вы носите. Представьте себе силу! Представьте себе возможности!\n\n«Но, Коринф», я представляю, что вы говорите (и тут должен признаться, что представляю ваш голос нытьём и раздражающим, ибо считаю вас имбецилом, которого должен учить). «Я не обученный установщик аугментов. Я не могу создавать аугменты!» Конечно, вы не можете. Вы воин! Вам не нужно создавать собственные аугменты. Просто покупайте их у нас! Профессиональные установщики аугментов есть по всему миру. И наши товары продаются у торговцев повсюду!\n\n«Но, Коринф», представляю я, что вы говорите (всхлипывая как ребёнок). «Даже если я куплю аугмент, я не смогу его установить!» Это верно. Вы <i>никогда</i> не должны пытаться установить аугмент самостоятельно! Это может вызвать сильный взрыв и, в редких случаях, ужасную трансформацию. Вместо этого посетите местный оружейный или бронный магазин. Большинство торговцев обучены установке аугментов и могут установить его за небольшую плату.\n\n«Но, Коринф», слышу я, как вы говорите, подпрыгивая и размахивая руками. «Столько аугментов на выбор! А что если я установлю неправильный аугмент и передумаю? Я парализован сомнением!» Верно, удаление аугмента затруднительно — слишком замысловато для среднего неуклюжего торговца — но вы можете обратиться к профессиональному установщику аугментов, чтобы помочь вам его удалить. Старый аугмент будет уничтожен, но ваше оружие или броня останутся в порядке, и вы сможете установить в них другой аугмент.\n\n«Но, Коринф», слышу я. Однако мне надоело ваше бормотание. Время жалоб прошло! Станьте лучшим воином, каким только можете быть: идите и купите несколько аугментов прямо сейчас!"
"<i>Welcome to the first installment of The Sage's Lectern. I'm Reginald the Pretty Good Mage -- formerly known as Reginald the Archmage, but that's a separate topic. Some volumes will be travelogues, while others, such as this one, will be interviews. For this first volume I've arranged something very special: an interview with Ormorek, God of Bitterness!</i>\n\n<i>I should disclose that I paid for this interview, and it was not cheap: Ormorek would only give an interview if I agreed to replace the roof of his favorite bar. When I agreed to this price, I did not realize the roof was made of one incredibly thick piece of stone. Since it is in New Aufghel's historical district, the bar's appearance could not be changed, so I needed to have a new roof delivered. Needless to say it cost quite a bit of money. But I'm sure I'll eventually make the millions of Councils back on the long-tail sales of this epic interview! (That's a writer's joke.) So without further ado:</i>\n\n<h1>Interview with Ormorek</h1>\n\nI entered the bar and took the stairs to the upper floor. The Bloated Pony looks like a typical dwarven neighborhood bar but it's located in the business district, pretty far from any homes. The regulars range from businessdwarves and moneylenders to simple cleaners and mechanists -- all the people who work in the area. To my human eyes it looked like a collection of dwarven stereotypes.\n\nOrmorek sat at the bar, his very short beard the only thing that distinguished him from a dozen other gnarled old dwarves. A bouncer stood nearby, always watching. Ormorek does not like tourists, fans, lookie-loos, or frankly anyone at all. But he seemed well-liked by the regulars here. I sat down at the bar next to him in a spot he'd kept open for me.\n\nOrmorek: you're back. So you've agreed to my price?\n\nReginald: yes... I suppose so. Assuming this interview has some revealing pieces of knowledge, you've got a deal.\n\nOrmorek: Good. I owe Wilker a favor, and you're delivering it. If we don't get a new roof soon, the safety fines will put this place out of business. <i>(Here I looked up at the ceiling in concern.)</i> Oh, don't be a twat. This roof could last for years to come, but it's not earthquake-proof anymore. Unless there's an earthquake, you'll be fine. So go ahead, let's get this over with. Wilker, pour him a beer. \n\n<i>(Wilker One-Tooth, the bartender and owner, poured me a tall glass of the only beer on tap. I found it incredibly bitter and alcoholic.) </i>\n\nReginald: Wow... that's bitter. And after the first sip hits you, the aftertaste is a whole new kind of bitter!\n\nOrmorek: It's why I drink here.\n\nReginald: Okay. So my first question is, how did you go from being God of Dwarves to --\n\nOrmorek: -- no questions about how I ended up the god of shite! Have some respect!\n\nReginald: Oh. Uh. <i>(I leafed through my notes. Most of my questions were about that very topic.)</i> Well, can you give me the scoop on other gods?\n\n<i>(Ormorek sighed, nodded, and downed his beer.)</i>\n\nReginald: Tell me about Harukita. He's the leader of the Chalice Gods, right? Can you give me some insights on him?\n\nOrmorek: He's a dick. He wants to literally destroy this entire world. What else is there to know?\n\nReginald: He's the god of Hate, but I've heard he can be friendly at times. I guess I just don't understand him.\n\nOrmorek: He's never fucking friendly! It's you daft humans spreading that idiocy! Just because a god says hello and doesn't smite you dead, that doesn't mean he's your friend!\n\nReginald: Well, I mean Necromancers of all races have been known to --\n\nOrmorek: He's a dick sandwich. Next question.\n\nReginald: How about his brother Kajich?\n\nOrmorek: Another dick. <i>(Ormorek sighed again, collected his thoughts, and signaled for another beer.)</i> Look. This goes for Harukita and Kajich both: if a god's avatar is a skellington, he's a dick! Why ya think they look like that? They're screamin' \"Hey, I'm a huge twat! You should stay away from me!\" And before you ask, the third brother's a dick too. But ... not <i>quite</i> as bad, I guess.\n\nReginald: You're referring to Tuvillus? He's interesting because of his dual nature: his Jealousy aspect is an incredibly beautiful elven man, and his Greed aspect is this huge, bloated...\n\nOrmorek: Those are just his two Avatars. He's got two different-lookin' physical bodies but it's the same arsehole inside each of 'em!\n\nReginald: Fair enough. You said Tuvillus isn't quite as bad as his brothers. Can you help me understand why?\n\nOrmorek: He and Ilth Hale at least take care of their... their creations.\n\nReginald: You mean vampires.\n\nOrmorek: Among other things. Look, I don't want to talk about Chalice anymore. What else you got?\n\nReginald: Um... Hm. <i>(That wiped out the rest of my prepared questions.)</i> Look, I just need a scoop! Something new, something mortals don't know yet. What can you share with my readers?\n\nOrmorek: A scoop? Life is stupid, and you should give up. There, that's all the wisdom mortals need. This was a dumb idea. Just get outta here.\n\nReginald: But our deal...\n\nOrmorek: Deal's off! \n\n<i>(The bartender tried to interject.)</i>\n\nWilker: But I can't stay open even another month! We need to start the repairs...\n\nOrmorek: I don't care. Not doin' this. Get the fuck outta here, human! Go! I can still smite people, ya know!\n\n<i>(The bouncer was behind me in an instant, her meaty hands on my shoulders. I sighed and let myself be escorted out. But as I was leaving, an old dwarf caught my eye and nodded cryptically. I waited outside the bar, and sure enough, after a few minutes he stepped out. As I soon learned, his name was Rulgirt.)</i>\n\nRulgirt: You are a terrible interviewer. You still want that \"scoop\" of knowledge?\n\nReginald: Yes.\n\nRulgirt: If I get you a scoopful, will you honor your deal with Ormorek?\n\nReginald: Okay. Sure. If it's new knowledge worth printing, I'll pay for the bar repairs.\n\nRulgirt: Then take this. Stay up til midnight, then drink it. Be lyin' down when you do, you'll be asleep fast. You want to find me in your dreams, right?\n\nReginald: Um, what?\n\nRulgirt: Say yes.\n\nReginald: Yes?\n\nRulgirt: I want to find you, too. So it's a pact, then, human. I'll see you tonight.\n\n<i>(Rulgirt nodded curtly, then shuffled back into the bar, leaving me with a vial of blue liquid.)</i>\n\n <i>Stay tuned for the next issue, in which I actually get my scoop!</i>": "<i>Добро пожаловать в первый выпуск «Кафедры Мудреца». Я — Регинальд, Довольно Хороший Маг — ранее известный как Регинальд Архимаг, но это отдельная история. Некоторые тома будут путевыми заметками, другие, как этот, — интервью. Для этого первого выпуска я устроил нечто особенное: интервью с Ормореком, богом горечи!</i>\n\n<i>Стоит признаться: я заплатил за это интервью, и это было недёшево: Орморек согласился дать интервью только в обмен на то, что я заменю крышу его любимого бара. Когда я согласился на эту цену, я не осознавал, что крыша сделана из одной невероятно толстой каменной плиты. Поскольку это в историческом районе Нью‑Афгеля, внешний вид бара менять нельзя было, так что мне пришлось заказать доставку новой крыши. Не буду скрывать — это стоило немалых денег. Но я уверен, что в долгосрочной перспективе я отобью миллионы Советов на продажах этого эпичного интервью! (Шутка писателя.) Итак, без лишних слов:</i>\n\n<h1>Интервью с Ормореком</h1>\n\nЯ вошёл в бар и поднялся по лестнице на верхний этаж. Блоутед Пони выглядит как типичный дварфийский районный бар, но расположен в деловом квартале, довольно далеко от жилых домов. Постоянные посетители — от деловых дварфов и ростовщиков до обычных уборщиков и механиков — все те, кто работает в округе. Для моих человеческих глаз это выглядело как набор дварфийских стереотипов.\n\nОрморек сидел за барной стойкой, его очень короткая борода была единственным, что отличало его от дюжины других кривых старых дварфов. Портье стоял рядом, постоянно наблюдая. Орморек не любит туристов, фанатов, любопытных и, честно говоря, никого вообще. Но, похоже, он был любимцем местных. Я сел рядом с ним в том месте, которое он оставил для меня.\n\nОрморек: ты вернулся. Так ты согласился на мою цену?\n\nРегинальд: да... полагаю. Если в этом интервью будут откровенные сведения, то мы в деле.\n\nОрморек: Хорошо. Я задолжал Вилкеру, и ты это отплатишь. Если мы скоро не получим новую крышу, штрафы по безопасности вынесут этому месту приговор. <i>(Здесь я с тревогой посмотрел на потолок.)</i> Ох, не будь идиотом. Эта крыша ещё послужит годы, но она уже не сейсмоустойчива. Если не будет землетрясения — всё будет в порядке. Так что давай, да выкладывай. Вилкер, налей ему пива.\n\n<i>(Вилкер Однозуб, бармен и владелец, налил мне высокий бокал единственного разливного пива. Я нашёл его невероятно горьким и крепким.)</i>\n\nРегинальд: Вау... это горько. И после первого глотка послевкусие — это совсем иной вид горечи!\n\nОрморек: Именно поэтому я пью здесь.\n\nРегинальд: Ладно. Мой первый вопрос: как ты перешёл от звания «бог дварфов» к — \n\nОрморек: — никаких вопросов о том, как я стал богом дерьма! Прояви уважение!\n\nРегинальд: Ох. Эм. <i>(Я перелистывал заметки. Большинство моих вопросов были как раз об этой теме.)</i> Ну хорошо, можешь рассказать мне про других богов?\n\n<i>(Орморек вздохнул, кивнул и допил своё пиво.)</i>\n\nРегинальд: Расскажи про Харукиту. Он ведь лидер Богов Кубка, да? Можешь дать пару инсайтов о нём?\n\nОрморек: Он — ублюдок. Он хочет буквально уничтожить весь этот мир. Что ещё тут знать?\n\nРегинальд: Он бог Ненависти, но я слышал, что временами он может быть дружелюбен. Я, наверное, просто не понимаю его.\n\nОрморек: Он никогда, блин, не бывает дружелюбен! Это вы, глупые люди, распускаете эту ерунду! То, что бог приветствует тебя и не испепелит, не значит, что он твой друг!\n\nРегинальд: Ну, я имею в виду, некроманты всех рас известны тем, что — \n\nОрморек: Это сэндвич из дерьма. Следующий вопрос.\n\nРегинальд: Как насчёт его брата Каджича?\n\nОрморек: Ещё один ублюдок. <i>(Орморек снова вздохнул, собрал мысли и подал знак бармену за добавкой.)</i> Слушай. Это относится и к Харуките, и к Каджичу: если аватар бога — скелет, значит он — ублюдок! Почему, думаешь, они выглядят так? Они кричат: «Эй, я — огромный придурок! Держитесь подальше!» И прежде чем спросишь, третий брат — тоже ублюдок. Но… не <i>так</i> уж плохо, думаю.\n\nРегинальд: Ты имеешь в виду Тувиллуса? Он интересен своим двойственным началом: аспект Ревности — невероятно прекрасный эльфийский мужчина, а аспект Жадности — огромный, раздутый...\n\nОрморек: Это просто два его аватара. У него два разных физических тела, но внутри в обоих один и тот же задница!\n\nРегинальд: Справедливо. Ты сказал, что Тувиллус не так плох, как его братья. Поможешь понять почему?\n\nОрморек: Он и Илт Хейл, по крайней мере, заботятся о своих... своих творениях.\n\nРегинальд: Ты имеешь в виду вампиров.\n\nОрморек: И не только о них. Слушай, я не хочу больше говорить о Богах Кубка. Что у тебя ещё есть?\n\nРегинальд: Эм... хм. <i>(Это очистило остальные мои подготовленные вопросы.)</i> Слушай, мне нужен сенсационный материал! Что‑то новое, чего смертные ещё не знают. Чем можешь поделиться с моими читателями?\n\nОрморек: Сенсация? Жизнь — глупа, и тебе стоит сдаться. Вот и вся мудрость, которая нужна смертным. Это была глупая затея. Убирайся отсюда.\n\nРегинальд: Но наш договор...\n\nОрморек: Договор отменён!\n\n<i>(Бармен попытался вмешаться.)</i>\n\nВилкер: Но я не смогу держаться открытым даже ещё месяц! Нам нужно начинать ремонт...\n\nОрморек: Мне наплевать. Я не буду этого делать. Убирайся, человек! Иди! Я ещё могу накидать людям, понимаешь!\n\n<i>(За долю секунды портье оказался за моей спиной, его мясистые руки легли мне на плечи. Я вздохнул и позволил проводить себя на улицу. Но когда я выходил, старый дварф подмигнул мне и загадочно кивнул. Я подождал у бара, и, конечно, через несколько минут он вышел. Как я вскоре узнал, его звали Рулгирт.)</i>\n\nРулгирт: Ты ужасный интервьюер. Ты всё ещё хочешь ту самую «сенсацию»?\n\nРегинальд: Да.\n\nРулгирт: Если я достану тебе ложку информации, ты выполнит договор с Ормореком?\n\nРегинальд: Ладно. Если это новые сведения, достойные печати, я оплачу ремонт крыши бара.\n\nРулгирт: Тогда возьми это. Не ложись до полуночи, затем выпей это. Ложись по‑горизонтали, когда будешь пить — уснёшь быстро. Хочешь найти меня во сне, да?\n\nРегинальд: Эм, что?\n\nРулгирт: Скажи «да».\n\nРегинальд: Да?\n\nРулгирт: Я тоже хочу тебя найти. Так и быть, это пакт, человек. Увидимся ночью.\n\n<i>(Рулгирт сухо кивнул, затем вернулся в бар, оставив меня с пузырьком синей жидкости.)</i>\n\n<i>Оставайтесь с нами для следующего выпуска, в котором я, наконец, получу свою сенсацию!</i>"
"<i>Hello again. I'm Reginald the Pretty Good Mage -- you may remember me from my time as Reginald the Archmage. This is the second installment of my newsletter, The Sage's Lectern. In the last installment, I tried to interview Ormorek, the dwarven God of Bitterness, but it did not go well. As I was leaving that interview, an old dwarf offered to give me something good to write about. I agreed to \"meet him in my dreams.\"</i>\n\n---\n\nI lay on the itchy bed, staring at the blue vial of liquid that Rulgirt had given me. Dwarven inns aren't the most comfortable places for humans. The stone walls are damp and cold, and the fireplace only seems to warm the air without drying it out, so the room feels moist and sticky. I'd had a hard time sleeping the past night... but this potion would knock me out fast. It was about midnight, I guessed... time to drink. \n\nI'd had time to analyze the potion with my travel-sized alchemy lab, so I knew it was just a Drowsy Time potion. Completely harmless. But I didn't know what to expect after that. I was starting to get nervous, so I quickly downed the stuff and closed my eyes. I was asleep within a minute.\n\n---\n\n\"Human! Reginald! Over here. Hurry up, my shift's startin' soon.\" I knew this was Rulgirt's voice, but all I could see was fog. Then the old dwarf appeared out of the mist. \"Come on. Stick close ta me, or you'll end up in your own personal dream fantasy.\"\n\nSo it was true: I as in Miraverre's dream realm! I'd read stories of it, but never been here. At least, not that I remembered. I followed the swiftly-moving dwarf through the fog, staying as close as possible. The fog was so thick that if he got more than a few feet away, I couldn't see him anymore. \"This is the dream realm! Do all sleeping people come here?\"\n\nI heard the dwarf snort. \"No, 'course not! There's billions of sleepers an' only a few million in here. Most people dream in their beds. But sometimes they dream here instead. There's a cord, an' astral cord, she calls it, that can lead people here.\"\n\nNo doubt \"she\" would be Miraverre, the Goddess of Sleep and Dreams. An astral cord to the dream realm? That's long been hypothesized by sages but never confirmed. This nugget of information alone was worth a hefty sum. But I desperately wanted more. \"So is this place the reason we dream? Or do dreamers just happen to come here?\"\n\n\"People dream regardless. This place exists BECAUSE they dream. Miraverre is made of dreamstuff. She does her best to make dreams restful, enjoyable, all that. But it don't always work out.\"\n\nRulgirt moved just a bit out of sight, and I suddenly felt cold cobbles under my feet. I realized I was barefoot. And naked. The fog was drifting away and there were people here: hundreds of people, staring at me, aghast at my nakedness. I recognized the teachers I'd failed, and people I'd killed, and some I'd betrayed. My closest friend, Sylvia, stood in front of me, her arms folded, an uncharacteristic snarl on her face. Completely unrealistic: if the real Sylvia had been that angry, she'd be in wolf form. I knew it was a dream... but it felt completely real.\n\nI realized suddenly that Rulgirt was here too. He was dressed in thick leather armor and had a comically large axe over his shoulder. \"Looks like yer carrying' a lot of shame and fear around, human. Here.\" He handed me my own bathrobe, and as I put it on, Rulgirt waved at the air in front of me, causing all the people to break up and waft away as if they were made of smoke. Even the cobbles faded away, and I soon began to wonder what I was walking on... and then there really was nothing under me at all. I was falling, screaming, trying and failing to cast the spell of slow-fall... then Rulgirt caught my hand.\n\n\"Ya stupid git! Yer gonna wake up! Do ya want your 'scoopful' or not?\"\n\n\"I didn't mean to... Where are we now?\" We were standing atop a great wall that stretched off in two directions as far as I could see, seeming to bisect the world. On one side of the wall was gray fog. As I looked down at the massive fog bank below, I spotted glints of light, explosions, and other brief interjections in the faceless gray -- dreamers having adventures. So this is what the Dream Fog looked like. \n\nI looked over the other side of the wall, and saw only darkness, as on a moonless night. But I suddenly made out a creature scaling the dark side of the wall, and it didn't look friendly. Dressed in black armor, and with huge hooks for hands, it was slowly working its way up. \"Over here,\" I called to Rulgirt. He'd already seen it.\n\n\"Shit! They're attacking this early? I've got this one. Run to the tower. That way.\" He pointed to my left. \"Tell Freyka I sent you! I'll be there in a minute. Go!\" He hefted his battle-axe. It seemed impossibly large in his gnarled old hands, but he swung it with ease. I decided to take his instruction.\n\nThe wall was perhaps eight feet wide and made of mortared stone, so it was easy to run across the top. That meant that attackers would be able to run across it, too. I sprinted in the direction Rulgirt had pointed me. I could make out a tower built into the wall... but it was a mile away. As I ran, I could hear noises coming from the dark side of the wall. They didn't sound comforting, but all I could see were shadows. I tried to take in as many details as I could of the world around me, but they didn't make much sense. Was it day or night? The sky was black, without stars or moon or sun. But everything was well-lit as if by daylight... except on the other side of the wall, where it wasn't. I felt the warm wind on my face as I ran. Or was it cold wind? Yes, cold. But I was sweating, so it must be warm. And then it was warm again.\n\nI realized I could change reality here, at least a bit. As I ran across the wall to the tower, I experimented with this power. I gave myself clothes, my hat, even my trusty battle-staff, which in reality was back at home. But when I tried to change the wall itself, I couldn't. It was real. Or at least, more real than I was, here.\n\nThere was a blast behind me, and I turned to see a black dragon-like creature breathing flame out of the darkness. It was blasting a person back there in the distance -- no doubt Rulgirt. I felt my heart sink, but then Rulgirt tossed aside a massive shield and flung his axe at the creature. The axe struck true, and the creature screamed and retreated... and the axe flew right back into his hand. Rulgirt ran toward me, and I waited to see if he needed help, but when he caught up to me he just kept sprinting. \"Run, moron!\" So we ran to the tower. I was surprised to find myself not terribly tired from all the sprinting. The air was clean and cool. I felt good.\n\nThe tower loomed fifty feet above the wall. It was huge, hundreds of feet wide. The wall seemed to run right through the tower and out the other side. As we approached, a lady dwarf shouted down to us. \"What's that behind ya? Get down, I got him!\" she aimed a massive crossbow.\n\n\"No! He's a friend!\" shouted Rulgirt. \"This is Reginald the Arch-Mage! He's dreamin'!\"\n\n\"Bullshit! I heard he died! Twice!\"\n\n\"No I didn't,\" I shouted back. Well, once, sort of, but...\n\n\"Well all right then! We could use some fireballs up here!\"\n\nThat made my heart sink. I'm not the arch-mage I once was. But before I could explain, Rulgirt pulled me into the huge wooden door of the tower and slammed it behind us. The inside of the tower was lit by torches. It seemed almost cozy. In a moment the other dwarf, Freyka, was there. \"Larabelle's gone.\"\n\nRulgirt scrunched up his face in disbelief. \"What the hell coulda woken her up? She's been at this for forty years!\"\n\n\"No... she died yesterday. I tried to get the word out, but...\"\n\n\"What! Larabelle's dead?!\"\n\nFreyka nodded. She took his hand. \"Just old age, hun. Nothing sinister.\" For a moment, I could see just how old Rulgirt was. His posture slumped. His axe hit the stone floor with with a thud. Then he straightened himself and cussed under his breath.\n\nFreyka was no young dwarf herself. She moved swiftly, but her face was a ball of wrinkles. \"We mourn tomorrow. The Worm's sensed weakness. It's sending a whole battalion of nightmares. I've got Tremund coming in. And the eastern wall is safe. You go back the way you came. I'll take our arch-mage up top, get him started, then head the other way. We can do this.\"\n\nRulgirt picked up his axe and opened the door we'd come through. \"'Course we can fucking do this! For Larabelle!\" and then he was gone. Freyka took my hand and pulled me out of the cozy room, up stairs, and back out into the daylight at the top of the tower. Auto-ballistae were firing down into the darkness. Freya ran to each one, loading another magazine of ammunition from a nearby stack.\n\nI wanted to study the ballistae -- real state-of-the-art dwarven ballistae are highly secretive. But Freyka pushed me toward the tower's edge. \"If you see something coming out of the dark, and the ballista doesn't stop it, KILL IT! I'll be back in a bit. Don't let this tower be overrun! Those things are creations of Gulagra. They'll invade peoples' dreams and take their minds.\" She headed toward the stairs, but I grabbed her by the shoulder. She looked startled and annoyed at my hand.\n\n\"I'm not the arch-mage I once was. I have two or three fireballs in me, tops.\" I've learned how to be smarter than my enemies because I can't match them in brute power anymore. \"I can still do some amazing Wards, though. I can ward this entire tower top. Can you can guard it for five minutes?\"\n\nFreyka rolled her eyes. \"This is the Dream Realm! Stop that,\" she said, this part more gently. I'd already started making a circle of salt along the crenellations, but stopped. She smiled a wrinkly smile. \"Look, I get it, you're all washed up.\" I stiffened at that. \"No, look, I'm washed up too. I'm two hundred and eight! I could drop dead any minute! But I remember what it feels like to be powerful. Do you remember what you used to feel like?\"\n\n\"Oh yes.\" A shiver ran down my spine. How could I ever forget?\n\n\"Then feel that way again, and go SHOOT SOME FUCKING FIREBALLS! I've got work to do!\" And she was gone down the stairs.\n\nTwo of the auto-ballistae were firing at something climbing the wall nearby. I ran over to the edge and peered out: another creature. Maybe a serpent-man? It was hard to tell. But it had huge bolts in its side and didn't seem to care. \"Okay. Feel like I was a kid again. Here goes.\" I summoned a fireball and tossed it at the creature. It hit! But the thing was unfazed.\n\n\"Wait... I'm not tired by that at all!\" I began throwing more and more fireballs. I felt fine. My mana reserves were replenishing as fast as I spent them. I remember shouting \"I'm an arch-mage again!\" The fireballs weren't having much effect, though, so I stepped back and began a fancier spell. Hopefully the walls could handle it... there was a loud burning sound in the sky above the creature, and then thousands of pounds of boulders fell onto it, sending it hurtling back through the dark. The wall was covered in rocks, but otherwise unharmed. Dwarven engineering at its best, I supposed.\n\nBut there were many more creatures coming. There were dozens at first -- and I found I could handle dozens. But after an hour or so, the dozens had turned to hundreds, and the ballistae had run out of ammunition, there was no sign of help, and I wasn't fast enough to drive all the beasts back. And I was starting to feel tired. Even an arch-mage has limits. \"I need to be smarter. Smart AND powerful.\" I've learned things that young-me couldn't have even dreamt of... yes, that was it. A Will-ward!\n\nI am quite proud of my work advancing the science of Wards, and I'm still quite good at casting them. Wards allow me to travel safely and protect my possessions even when I can't work much magic. But my greatest Ward inventions are too costly for me to cast. Will-wards are one such invention: they're directly augmented by the caster's magical energies. I'd never been able to keep one up for long, or expand it beyond a few yards. But this was the Dream Realm.\n\nI leaned into the power reserves hidden in my magic staff, and used it to light huge firewalls atop the stone walls as far as I could. That would have to hold them off. Then I summoned a golem and handed it a bag of salt, and we got to work creating the ward. It didn't need to be large: I just warded a small circle around myself. I would make it larger.\n\nI knew the firewalls were dying out, but you can't hurry wards. It took a minute, but then I felt the familiar hum. I was surrounded in a bubble of invisible force. Now it was time to give it some juice. With a deep breath, I expanded the bubble. First I encompassed the whole top of the tower -- which wasn't too hard. Then I took a deep breath and expanded it again. The bubble was becoming visible as a yellowish field of crackling energy. It began to encompass the walls, which were unharmed, but when the bubble came in contact with one of the creatures, it flung them off the wall and sent them falling into the darkness.\n\nI took another deep breath and expanded the ward again. This was its theoretical maximum: almost a quarter-mile wide. Then I expanded it again, and then again. I leaned on my staff, shaking with exertion. The bubble encompassed everything I could see. I just had to keep it from popping.\n\nBut I didn't have to hold it for long. Or at least, it didn't seem like a long time. Soon the darkness began to fade, and both sides of the wall had the same gray fog. I let the bubble burst and collapsed. I think I fell asleep then, and I woke up back in the inn. The fireplace had almost gone out. I added another log and began writing everything down. I knew the memories wouldn't last long.\n\n---\n\nThere was a knock on my door, and I woke up with a shock. I'd fallen asleep while writing and spilled ink everywhere. I cursed and tried to blot it up while the knocking continued. \"Just a minute! Um, come in!\"\n\nThe door opened a crack and the kindly proprietor of the inn appeared. \"Sorry to bug ya this early in the morning, but you've got a visitor. Shall I tell him to come back later?\"\n\n\"No, no... it's fine. I'll be out in a minute.\"\n\nShe closed the door and I got dressed. My hands were stained with ink, but my notes were still legible. I was much relieved, because my memories of the Dream Realm had already become hazy.\n\nIn the inn's little foyer sat Rulgirt. He smiled when he saw me. \"You did good. I didn't plan that. I wanted to give ya a tour, not put ya to work. Did you get your scoops of knowledge?\n\n\"Yes. I got quite a scoop.\"\n\nRulgirt beckoned me over, and handed me a pendant. It was a tiny piece of stone on a chain. I could feel a faint magic in it... It was a bit of dream-stone, somehow brought into the real world. \"If you're willing, we'd be pleased to have you in the Dream Keepers. Don't worry, just in the reserves! If you go to sleep wearing that and we need your help, we'll be able to call ya. Don't wear it if you've gotta be somewhere the next day, though. I bet you're feeling last night, eh?\"\n\nI was indeed. \"That was exhausting. I guess I will accept this honor, but I don't know how often I could do THAT.\"\n\nHe nodded. \"Yeah. It's usually easier. But sometimes it's not. Look, the Dream Keepers've been secret a long time. But I think its time people knew about us. I was one of the founding members, almost fifty years ago, so I get to decide.\"\n\n\"Those were Gulagra's creations in there. Gulagra is in Miraverre's realm! That's where he's been hiding!\" Gulagra hasn't been seen in our world in a long time.\n\n\"Not exactly, no. He lives in another place. But about a thousand years ago he tore a hole into the Dream Realm. It's how he drives people insane in their sleep, makes them his minions. Miraverre is constantly fighting to close the tear, but she hasn't managed it yet. And so fifty years ago she called on her old friend Ormorek for help.\"\n\nThe history books say that Miraverre and Ormorek were close friends before the God War, but that version of Ormorek was basically a different god, the God of Dwarves. Now Umrad is the God of Dwarves, and Ormorek is just the God of Bitterness. It made no sense to call on him. \"Why didn't she contact Dreva? Or Arisetsu? Or...\"\n\n\"Look, godly politics are complicated. And,\" here he hesitated, choosing his words carefully. \"Since the big god-war, Miraverre don't exactly get out much. But anyway, when this first happened she called on Arisetsu for help. And for hundreds of years that's all it took: whenever the old Worm burst the hole open again, Arisetsu would come weld it shut again within a few days. But fifty years ago, he attacked when Arisetsu was busy. So in a panic, Miraverre called on her closest friend, Ormorek. And it broke his heart all over again.\"\n\nI nodded with understanding. I knew what it felt like when a friend is in dire need of your help and you just can't help them anymore.\n\n\"So anyway, one day when we come into the Bloated Pony, Ormorek's in there wailin' about how he's let his one true love down and all this shite. So some of us regulars decided to fix it. Got some engineers, a couple sages, a bunch of warriors, and we got to it. We've been making walls all around the tear. It's nearly done, just another few years and we'll start the roof. Even Gulagra can't get through our dream-walls! We'll keep him contained in there forever. So tell your readers: we don't need their help, or their pity, or their concern. We've got this. We're proud of it. We've saved the sanity of countless people.\"\n\n\"And you did it in Ormorek's name.\"\n\nThe old dwarf smiled a cryptic smile. \"That we did. We told Miraverre he'd sent us. She's been pretty happy for the help.\"\n\n\"Does Ormorek know?\"\n\n\"Of course he does. He told us to cut it out. Made all kinds of bitching and moaning. But I think he's proud. And ... you know how gods are made up of their connections to the world? Well, we're some of his connections. And we're doing great stuff, which is slowly making Ormorek feel better. Hell, he *almost* gave a human an interview!\" The dwarf laughed at his own joke, then stood up.\n\n\"I gotta get some sleep. We had to call in a bunch of reserves yesterday. A few of the young'uns are still in there, cleaning up some strays that got through. But you held Tower 4 all by yourself! Pretty impressive for a human. And Freyka says thanks too. Are you staying in town another day?\"\n\n\"I could.\"\n\n\"Tonight we'll have a wake for Larabelle. She was one of our strongest, but Vol comes for everyone eventually. You can come to her wake if you want.\"\n\n\"I'll be there.\"\n\nHe nodded and left the inn, and I stumbled back to bed.": "<i>Привет снова. Я — Реджинальд, довольно неплохой маг — вы, возможно, помните меня по времени, когда я был Реджинальдом-архимагом. Это второй выпуск моей рассылки «Кафедра Мудреца». В прошлом выпуске я пытался взять интервью у Орморека, дварфийского Бога Горечи, но это прошло неудачно. Когда я уходил после того интервью, старый дварф предложил дать мне повод для достойного материала. Я согласился «встретиться с ним в своих снах».</i>\n\n---\n\nЯ лежал на колючей постели и уставился на синюю пузырьковую жидкость, которую мне дал Рулгерт. Дварфийские трактиры не самые удобные места для людей. Каменные стены сырые и холодные, а камин вроде бы согревает воздух, но не высушивает его, и комната кажется влажной и липкой. Прошлой ночью мне было трудно заснуть... но это зелье быстро усыпит. Было около полуночи, я решил... пора пить.\n\nУ меня было время проанализировать зелье в моём дорожном наборе алхимии, так что я знал: это просто зелье «Сонное Время». Абсолютно безвредно. Но я не знал, чего ожидать дальше. Я начал нервничать, поэтому быстро осушил пузырёк и закрыл глаза. Я заснул за минуту.\n\n---\n\n«Человек! Реджинальд! Сюда. Поторопись, моя смена скоро начнётся». Я понял, что это голос Рулгерта, но всё, что я видел — туман. Потом старый дварф появился из мглы. «Давай. Держись рядом со мной, а то окажешься в собственной личной мечте‑фантазии».\n\nЗначит, это правда: я в царстве снов Мираверре! Я читал об этом, но никогда не бывал там. По крайней мере, не помнил. Я последовал за быстрым дварфом сквозь туман, оставаясь как можно ближе. Туман был так густ, что если он отдалялся более чем на пару шагов, я его уже не видел. «Это царство снов? Все спящие приходят сюда?»\n\nЯ слышал, как дварф фыркнул. «Нет, конечно нет! Спящих миллиардов, а здесь только несколько миллионов. Большинство люди видят сны в кроватях. Но иногда они попадают сюда. Есть шнур — астральный шнур, как она называет, — который может привести людей сюда».\n\nНаверное «она» — Мираверре, Богиня Сна и Снов. Астральный шнур в царство снов? Мудрецы давно выдвигали эту гипотезу, но подтверждений не было. Уже эта крупица информации стоила бы немалой суммы. Но я отчаянно хотел знать больше. «Значит ли это, что именно это место вызывает сны? Или сновидцы просто случайно попадают сюда?»\n\n«Люди всё равно видят сны. Это место существует ПОТОМУ ЧТО они мечтают. Мираверре сложена из снов. Она старается делать сны спокойными, приятными и так далее. Но не всегда получается».\n\nРулгерт чуть отступил, и я вдруг почувствовал под ногами холодную брусчатку. Понял, что стою босиком. И голый. Туман рассеивался, и вокруг были люди: сотни людей, смотревших на меня с ужасом из‑за моей наготы. Я узнал учителей, которых провалил, людей, которых убил, и некоторых, кого предал. Моя близкая подруга Фрейка стояла передо мной, сложив руки, с необычной для неё гримасой злости. Совершенно нереалистично: если бы настоящая Фрейка была так зла, она бы приняла волчью форму. Я знал, что это сон... но это казалось абсолютно реальным.\n\nЯ вдруг заметил, что рядом был и Рулгерт. Он был одет в тяжёлую кожаную броню и несуразно большой топор у него был на плече. «Похоже, ты тащишь много стыда и страха, человек. Вот». Он протянул мне мой собственный банный халат, и когда я надел его, Рулгерт махнул рукой в воздухе, и все люди разошлись и рассеялись, как дым. Даже брусчатка исчезла, и я стал гадать, по чему же я иду... а затем подо мной вовсе не оказалось ничего. Я падал, крича, пытался и не смог сотворить заклинание замедленного падения... и тут Рулгерт схватил мою руку.\n\n«Глупый ты! Ты проснёшься! Хочешь свой 'порцию' или нет?»\n\n«Я не хотел... Где мы теперь?» Мы стояли на большой стене, тянущейся в обе стороны сколько хватало глаз, будто рассекая мир пополам. С одной стороны стены был серый туман. Когда я посмотрел вниз, в величественный слой тумана, я заметил вспышки света, взрывы и прочие краткие вкрапления в безликой серости — сновидцы переживают приключения. Таков был Сонный Туман.\n\nЯ глянул через другую сторону стены и увидел только тьму, как в безлунную ночь. Но вдруг я разглядел существо, карабкающееся по тёмной стороне стены, и оно выглядело не дружелюбно. В чёрных латах и с огромными крюками вместо рук, оно медленно лезло вверх. «Смотри сюда», — крикнул я Рулгерту. Он уже заметил его.\n\n«Чёрт! Они нападают так рано? Я займусь этим. Беги в башню. Туда». Он указал влево. «Скажи Фрейке, что я послал тебя! Я буду через минуту. Бегом!» Он поднял свой боевой топор. Он казался невероятно тяжёлым в его перекошенных старых руках, но он размахивал им без усилий. Я решил последовать его указанию.\n\nСтена была где‑то в два с половиной метра шириной и сложена из раствора и камня, так что по ней было легко пробежать. Значит и нападающие могли бежать по ней. Я мчался в ту сторону, которую показал Рулгерт. Вдалеке я видел башню, встроенную в стену... но она была на милю. Пока я бежал, из тёмной стороны стены доносились звуки. Они не были утешительными, но я видел лишь тени. Я пытался всматриваться в мир вокруг, но он не имел много смысла. Было ли это днём или ночью? Небо было чёрным, без звёзд, луны или солнца. Но всё освещалось как при дневном свете... кроме той стороны стены, где не было. Я чувствовал тёплый ветер в лицо, или холодный? Да, холодный. Но я потел, значит, должно быть, было тепло. И вдруг снова стало тепло.\n\nЯ понял, что могу немного менять реальность здесь. Пока бежал по стене к башне, я поэкспериментировал с этой силой. Я надел на себя одежду, шляпу, даже верный боевой посох, который в реальности остался дома. Но когда я попытался изменить саму стену, у меня не вышло. Она была реальна. Или по крайней мере — реальнее меня здесь.\n\nПозади раздался взрыв, и я обернулся — чёрное драконоподобное существо выдыхало пламя из тьмы. Оно откидывало назад кого‑то вдалеке — несомненно, Рулгерта. Я почувствовал, как у меня сердце упало, но затем Рулгерт отбросил огромный щит и метнул топор в существо. Топор попал точно, и существо заскричало и отступило... а затем топор вернулся ему прямо в руку. Рулгерт побежал ко мне, и я посмотрел, не нужна ли ему помощь, но когда он догнал меня, он просто продолжил бег. «Беги, идиот!» Так мы бежали к башне. Меня удивило, что я не очень устал от всего этого бега. Воздух был чист и прохладен. Я чувствовал себя хорошо.\n\nБашня возвышалась на пятнадцать метров над стеной. Она была огромна, просторы её основания простирались на сотни футов. Стена, казалось, проходила прямо через башню и выходила с другой стороны. Когда мы подошли, одна женщина‑дварф выкрикнула вниз нам: «Что там у вас? Убирайтесь с дороги, я его прикрою!» и навела громадный арбалет.\n\n«Нет! Он наш друг!» — закричал Рулгерт. «Это Реджинальд‑Архимаг! Он в сновидении!»\n\n«Чёрт возьми! Я слышала, что он умер! Дважды!»\n\n«Я не умирал», — закричал я в ответ. Ну, один раз вроде бы как, но...\n\n«Ладно тогда! Нам бы пригодились огненные шары здесь!»\n\nЭто заставило моё сердце сжаться. Я уже не тот архимаг, кем был раньше. Но прежде чем я успел что‑то объяснить, Рулгерт втолкнул меня через массивную деревянную дверь башни и захлопнул её за нами. Внутри башни горели факелы. Было почти уютно. Мгновение спустя пришла другая дварфийка, Фрейка. «Ларабель ушла», — сказала она.\n\nРулгерт скривил лицо в неверии. «Что же могло её разбудить? Она этим занимается сорок лет!»\n\n«Нет... она умерла вчера. Я пыталась сообщить, но...» \n\n«Что? Ларабель умерла?!»\n\nФрейка кивнула. Она взяла его за руку. «Просто старость, милый. Ничего зловещего». На мгновение я увидел, насколько стар Рулгерт. Его осанка согнулась. Топор с глухим стуком упал на каменный пол. Затем он выпрямился и бранно пробормотал себе под нос.\n\nФрейка сама была не молодой дварфихой. Она двигалась быстро, но её лицо было множеством морщин. «Мы оплакиваем завтра. Червь почувствовал слабость. Он посылает целую бригаду кошмаров. Я вызывала Тремунда. И восточная стена спокойна. Ты вернись обратно тем путём. Я подниму нашего архимага наверх, запущу его, а потом пойду в другую сторону. Мы справимся».\n\nРулгерт поднял топор и открыл дверь, через которую мы пришли. «Конечно, мы чёртовски справимся! Ради Ларабель!» — и он ушёл. Фрейка взяла меня за руку и потащила из уютной комнаты вверх по лестнице и снова наружу на бойницу башни. Авто‑баллисты палили вниз в тьму. Фрейка бежала к каждой, перезаряжая магазин из ближайшей кучи боеприпасов.\n\nЯ хотел изучить баллисты — настоящие дварфийские авто‑баллисты держат в секрете — но Фрейка подтолкнула меня к краю башни. «Если увидишь что‑то, пробивающееся из тьмы, и баллиста его не остановит — УБЕЙ ЭТО! Я скоро вернусь. Не дай этой башне быть захваченной! Эти твари — творения Гулагры. Они будут вторгаться в сны людей и отбирать их умы». Она направилась к лестнице, но я схватил её за плечо. Она выглядела удивлённой и раздражённой от моей руки.\n\n«Я уже не тот архимаг, что прежде. У меня максимум два‑три огненных шара». Я научился быть умнее своих врагов, потому что больше не сравнусь с ними по грубой силе. «Но я всё ещё могу творить удивительные барьеры. Я могу оградить весь верх башни. Ты сможешь охранять её пять минут?»\n\nФрейка закатила глаза. «Это царство снов! Перестань», — сказала она более мягко. Я уже начал чертить по зубчатой стене круг соли, но остановился. Она улыбнулась морщинистой улыбкой. «Послушай, я понимаю, ты выдохся». Я окаменел от этого. «Нет, слушай, я тоже выдохлась. Мне двести восемь! Я могу умереть в любую минуту! Но я помню, что значит быть сильной. Помнишь, как это было?»\n\n«О да». По позвоночнику пробежал озноб. Как это можно забыть?\n\n«Тогда почувствуй это снова и начинай ЧЁРТОВЫЕ ОГНЕННЫЕ ШАРЫ! У меня есть работа!» — и она исчезла вниз по лестнице.\n\nДве авто‑баллисты стреляли по чему‑то, карабкавшемуся по стене недалеко. Я подбежал к краю и заглянул: ещё одно существо. Может, змеелюд? Трудно было понять. Но в него попадало много болтов, и он, казалось, их не замечал. «Хорошо. Чувствую себя как в детстве. Поехали». Я вызвал огненный шар и метнул его в существо. Попал! Но существо не пострадало.\n\n«Постой... я от этого совсем не устал!» — я посыпал всё новыми огненными шарами. Я чувствовал себя отлично. Мана восстанавливалась так же быстро, как я её тратил. Я помню, как кричал: «Я снова архимаг!» Но огненные шары не очень сильно помогали, и я перешёл к более хитрой магии. В небе над существом раздался громкий звук горения, и тысячи фунтов скал упали на него, подбросив его обратно в тьму. Стена была завалена камнями, но цела. Дварфийская инженерия в лучшем виде, полагал я.\n\nНо существо были ещё сотни. Сначала их было десятки — и я справлялся с десятками. Но через час десятки превратились в сотни, боезапасы баллист иссякли, помощи не было видно, и я уже не мог всеми этими зверями управиться. И я начал уставать. Даже архимаг имеет пределы. «Мне нужно быть умнее. Умнее И мощнее». Я научился тому, чего юный я и представить не мог... да, именно. Воля‑щит!\n\nЯ горжусь своими достижениями в науке барьеров, и я всё ещё хорошо творю их. Барьеры позволяют мне безопасно путешествовать и защищать своё имущество, даже когда я не могу много работать магией. Но мои лучшие изобретения слишком дороги для постоянного использования. Воля‑щиты — одно из таких изобретений: они усиливаются магической энергией заклинателя. Раньше мне не удавалось долго удерживать их или расширять сверх нескольких шагов. Но это было царство снов.\n\nЯ опёрся на резервную силу в своём волшебном посохе и использовал её, чтобы зажечь огромные стены огня на каменных валам вокруг меня как можно дальше. Это должно было удержать их. Затем я вызвал голема и дал ему мешок соли, и мы принялись за создание барьера. Он не должен был быть большим: я просто защитил небольшой круг вокруг себя. Я собирался расширять его.\n\nЯ видел, как огненные валы угасают, но барьеры нельзя спешить. Прошла минута, и я почувствовал знакомое чувство гудения. Я оказался в пузыре невидимой силы. Настало время добавить мощи. Глубоко вдохнув, я расширил пузырь. Сначала я накрыл весь верх башни — что не было слишком сложно. Затем глубже вдохнул и расширил его ещё. Пузырь стал виден как желтоватое поле искрящейся энергии. Он стал охватывать стены, которые не пострадали, но когда пузырь касался одного из существ, тот отбрасывался с стены и падал в тьму.\n\nЯ сделал ещё один вдох и расширил барьер до его теоретического предела: почти четверть мили в ширину. Потом снова расширил. Я опирался на посох, дрожа от усилия. Пузырь охватил всё, что я мог видеть. Мне оставалось только не дать ему лопнуть.\n\nНо долго держать его не пришлось. Или по крайней мере мне так показалось. Вскоре тьма стала бледнеть, и обе стороны стены снова оказались в одном сером тумане. Я дал пузырю лопнуть и рухнул. Кажется, я тогда и заснул, а проснулся уже в трактире. Камин почти догорел. Я подбросил ещё полено и принялся всё записывать. Я знал, что воспоминания долго не продержатся.\n\n---\n\nВ дверь постучали, и я с испугом проснулся. Я заснул за письмом и пролил чернила повсюду. Я выругался и попытался промокнуть бумагу, пока стучали снова. «Минутку! Ээ, входите!»\n\nДверь приоткрылась, и милый хозяин трактира выглянул. «Извините, что так рано, но у вас посетитель. Сказать ему прийти попозже?»\n\n«Нет, нет... всё в порядке. Через минуту выйду».\n\nОна закрыла дверь, и я оделся. Руки были испачканы чернилами, но записи ещё можно было разобрать. Я был облегчён: воспоминания о царстве снов уже начали расплываться.\n\nВ фойе трактира сидел Рулгерт. Он улыбнулся, увидев меня. «Ты хорошо справился. Я так не планировал. Хотел показать тур, а не грузить тебя работой. Ты получил свои порции знания?»\n\n«Да. Я выудил достойную порцию».\n\nРулгерт поманил меня и вручил кулон. Это был маленький кусочек камня на цепочке. Я ощутил тонкое магическое поле... Это был кусок сновидного камня, каким‑то образом принесённый в реальный мир. «Если хочешь, будем рады принять тебя в Хранители Снов. Не волнуйся, только в резерв. Если ты заснёшь в этом и нам понадобится помощь, мы сможем тебя вызвать. Но не носи это, если тебе нужно куда‑то идти на следующий день. Чую, ты ещё устал от прошлой ночи, да?»\n\nЯ и впрямь был вымотан. «Это было истощающе. Пожалуй, соглашусь на эту честь, но не знаю, как часто смогу повторять ТАКОЕ».\n\nОн кивнул. «Да, обычно легче. Но иногда — нет. Слушай, Хранители Снов долго были в секрете. Но думаю, пришло время людям о нас узнать. Я один из основателей, почти пятьдесят лет назад, так что мне и решать».\n\n«Это были творения Гулагры там. Гулагра в царстве Мираверре! Вот где он прячется!» Гулагру давно не видели в нашем мире.\n\n«Не совсем так. Он живёт в другом месте. Но примерно тысячу лет назад он продырявил царство снов. Так он сводит людей с ума во сне и делает их своими слугами. Мираверре постоянно борется, чтобы зашить разрыв, но пока не справляется. И так, пятьдесят лет назад, она позвала своего старого друга Орморека на помощь».\n\nУчебники гласят, что Мираверре и Орморек были близки до Войны Богов, но тот Орморек был фактически другим богом, Богом Дварфов. Теперь Умрад — бог дварфов, а Орморек — лишь Бог Горечи. Непонятно было просить его о помощи. «Почему она не позвала Древу? Или Арисэцу? Или...»\n\n«Смотри, божественная политика сложна. И,» — он замялся, подбирая слова, — «после большой войны богов Мираверре не особенно выходит в люди. Но когда это впервые случилось, она обратилась к Арисэцу за помощью. И сотни лет этого хватало: всякий раз, когда Червь вновь прорвал дыру, Арисэцу приходила и снова её заваривала за несколько дней. Но пятьдесят лет назад он напал, когда Арисэцу был занят. И в панике Мираверре позвала своего близкого друга Орморека. И это снова разбило ему сердце».\n\nЯ кивнул, понимая. Я знал, каково это — не суметь помочь другу в беде.\n\n«Так вот, однажды мы зашли в «Раздутую Лошадь», и Орморек там воет, как он подвёл свою единственную истинную любовь, и всё такое. Так некоторые из нас, завсегдатаев, решили помочь. Привели инженеров, пару мудрецов, кучу воинов — и принялись за дело. Мы строим стены вокруг разрыва. Почти готово, осталось несколько лет и начнём крышу. Даже Гулагра не пробьётся через наши сновидные стены! Мы удержим его там навсегда. Так что скажи своим читателям: нам не нужна их помощь, ни их жалость, ни их заботы. Мы справимся. Мы гордимся этим. Мы спасли рассудок бесчисленных людей».\n\n«И вы делали это во имя Орморека».\n\nСтарый дварф загадочно улыбнулся. «Да. Мы сказали Мираверре, что он послал нас. Ей это понравилось».\n\n«Орморек в курсе?»\n\n«Конечно. Он приказал прекратить. Много нытья и причитаний. Но мне кажется, он горд. И... знаешь, как боги составлены из связей с миром? Так вот, мы — некоторые из его связей. И мы делаем великое дело, что потихоньку делает Орморека лучше. Чёрт, он *почти* дал интервью человеку!» Дварф рассмеялся над своей шуткой и встал.\n\n«Мне нужно поспать. Вчера нам пришлось вызвать много резервов. Пара молодых всё ещё чистят заблудших, что прорвались. Но ты держал Башню 4 в одиночку! Довольно впечатляюще для человека. И Фрейка тоже благодарит. Останешься в городе ещё на день?»\n\n«Могу».\n\n«Сегодня вечером будет поминки по Ларабель. Она была одной из наших сильнейших, но Вола не избежать. Приходи, если хочешь».\n\n«Приду».\n\nОн кивнул и ушёл из трактира, а я барахталась обратно в постель."
" Welcome to the Sun Vale Resort! We hope that your stay with us is full of delight. Let's answer the most common questions about the island! If your questions aren't covered, please ask the concierge, who will be happy to slake your curiosity!\n\n<b>About the Name \"Sun Vale\"</b>\n\nThe ancient Elvish name of this island chain is Arasimorra Aris, which translates into Human as \"Sun's Archipelago\" or perhaps \"Sun's Island\". So it's natural to wonder why the Human name is \"Sun Vale.\" The answer? Trolls! The trolls that first inhabited the large island called it Sun Vale, and they even claimed the name was chosen by their troll god! Out of respect for the trolls (and their massive clubs), sages deferred to their name choice. And the name has stuck for thousands of years!\n\n<b>No Scary Fairies</b>\n\nThe largest island was once home to a \"portal\" to the fae realm, which allowed fae creatures entry to our world. This portal is long dormant and no fairies live there now, but many varieties of fae plants and animals can still be found. Because these creatures are quite dangerous, we cannot allow visitors on the large island. It would be an ecological disaster if some of these creatures ever found their way to other islands, or even worse, to Verta's mainland! However, the smaller island that you're on now is perfectly safe.\n\n<b>Friendly Frog People</b>\n\nYou may spot amusing frog-creatures on the beach. These people are called Ranalon, and they're quite common across the ocean in Fosulf. This particular tribe of Ranalon have proven to be friendly, curious, and articulate. We've entered into a mutual safety agreement with them, so there's no reason for fear. They all speak fluent Human, so if you see one, say hi! We even have a resident Ranalon on hotel staff. You can meet Puffy Ben during our daily walking tours.\n\n<b>Reef Tours</b>\n\nThere are three distinct coral reefs here, each more beautiful than the last. These reefs glow with a haunting light that must be seen to be believed! It's so bright that it can easily be enjoyed from our tour boats at night. The tour departs promptly at dusk every evening.\n\nIf you're an experienced diver, speak with our concierge about current diving opportunities. In addition to the beautiful reefs, you may also have an opportunity to see the local Ranalon as they work on their massive \"undersea bridges\". You've never seen stonework this beautiful from such primitive creatures!": "Добро пожаловать в курорт Сан Вейл! Мы надеемся, что ваше пребывание у нас будет полно удовольствий. Давайте ответим на самые распространённые вопросы об острове! Если ваши вопросы здесь не освещены, пожалуйста, спросите у консьержа, который с радостью утолит ваше любопытство!\\n\\n<b>О названии \"Сан Вейл\"</b>\\n\\nДревнее эльфийское название этой цепочки островов — Арасиморра Арис, что на человеческом языке переводится как «Архипелаг Солнца» или, возможно, «Остров Солнца». Поэтому естественно задаться вопросом, почему человеческое название — «Сан Вейл». Ответ? Тролли! Тролли, которые первыми заселили большой остров, называли его Сан Вейл и даже утверждали, что имя выбрано их тролльским богом! Из уважения к троллям (и их огромным дубинам) мудрецы уступили их выбору названия. И это имя прижилось на тысячи лет!\\n\\n<b>Никаких страшных фей</b>\\n\\nНа крупнейшем острове когда‑то находился «портал» в фейное царство, который позволял фейным существам проникать в наш мир. Этот портал давно дремлет и сейчас там не живут феи, но многие виды фейных растений и животных всё ещё встречаются. Поскольку эти существа довольно опасны, мы не можем разрешать посещать большой остров. Это было бы экологической катастрофой, если бы некоторые из этих существ попали на другие острова или, что ещё хуже, на материк Верты! Однако меньший остров, на котором вы сейчас находитесь, совершенно безопасен.\\n\\n<b>Дружелюбные лягушачьи люди</b>\\n\\nНа пляже вы можете заметить забавных лягушачьих существ. Эти люди называются Раналон, и они довольно распространены по всему океану в Фосулфе. Это конкретное племя Раналон зарекомендовало себя как дружелюбное, любопытное и разговорчивое. Мы заключили с ними взаимное соглашение о безопасности, так что бояться не нужно. Все они в совершенстве говорят по‑человечески, так что если увидите одного — поздоровайтесь! У нас в штате отеля даже работает Раналон. Вы можете встретить Паффи Бена во время наших ежедневных пешеходных экскурсий.\\n\\n<b>Экскурсии к рифам</b>\\n\\nЗдесь находятся три разных коралловых рифа, каждый прекраснее предыдущего. Эти рифы светятся завораживающим светом, который нужно увидеть, чтобы поверить! Он так ярко светится, что им можно наслаждаться прямо с наших туристических лодок ночью. Экскурсия отправляется точно в сумерки каждый вечер.\\n\\nЕсли вы опытный ныряльщик, проконсультируйтесь с нашим консьержем о текущих возможностях для погружений. Помимо прекрасных рифов, у вас может быть шанс увидеть местных Раналон, когда они работают над своими массивными «подводными мостами». Вы никогда не видели такой красивой каменной кладки от таких примитивных существ!"
" <h1>Can You Hear Me?</h1> I'm speaking to you from the distant past! Can you hear me? I'm going to assume you can!\n\nYou gave a spirit stone to a talking fox, and now you're a talking fox yourself. You have questions. Every spirit fox has questions. That's why I'm creating this message! Every future fox should hear this, if I've done it right! Here's what you need to know.\n\n<h1>What Is a Spirit Fox?</h1> You're a nature spirit now. You're not a mortal. You probably can't die. Try it! You'll find that in one way or another, you happen to not die. It's very convenient! But remember, your fox body is made of flesh and bone, and it's precious. It can survive quite a lot of abuse, but it will eventually wear out. \n\nYou're in your Young Fox phase, so enjoy yourself! But some day you'll wake up and realize you're partially transparent. Don't freak out. That's just your physical body dying. \n\nBeing immaterial makes a lot of fun activities impractical, and most of us become pretty depressed at this point. But just hang on for a few thousand years, because you'll eventually develop a lot of great powers that circumvent some of these limitations.\n\n<h1>How To Stop Being a Spirit Fox</h1> You already know how to cure this curse: you just need someone to give you a spirit stone! They'll become a fox, and you'll be free!\n\nIf you do this within a decade or two, you'll actually return to your old mortal body. But soon enough your old form will be gone forever. In that case, when you stop being a spirit fox, you'll just... stop being. Some of us eventually decide that we've had enough of existing. Others are tricked into holding a spirit stone by clever mortals. Either way, that's the end.\n\n<h1>Seek Awakened Foxes</h1> There aren't very many spirit foxes in the world, so you aren't likely to meet many of us. But there are tons of mortal foxes with magical powers! Perhaps these foxes are the offspring of a spirit fox... or perhaps foxes are just naturally gifted spirit mediums. Either way, mortal mages have been taking advantage of foxes for years: they turn them into Familiars and enslave them for their power.\n\nMages use an Awakening ritual on these foxes, so most of them can speak! Smart ones may be able to teach you magical techniques. Of course, in a few decades you'll know more than any mortal fox could teach you. But for now, they're your best teachers.\n\n<h1>Beware of Godlings!</h1> As a Class 5 nature spirit, you have a new natural predator: Class 4 nature spirits! And also... other Class 5 nature spirits! And also: certain dickish Class 3 nature spirits! They all want to absorb you to increase their own power.\n\nAvoid interacting with ANY nature spirits for your first few centuries! You'll be so weak that even a small forest's guardian spirit could eat you. You should especially watch out for orc and goblin towns with demigod protectors. Demigods are nature spirits, too! They often have weapons that could permanently destroy you.\n\nGods, godlings, demigods... these are all just words for what you are! You are among the weakest and most vulnerable of all nature spirits, but you're still a nature spirit, a spark of godhood! If you can survive for a few thousand years, you'll grow and become something more than just a fox! \n\n... Or, more likely, you won't. If the weight of existence becomes too heavy, you can always trick some poor mortal into giving you a spirit stone.\n\n As a nature spirit, there are lots of other rules and restrictions you should be aware of... but I think you'll figure the rest out on your own. Or die trying!\n\nHave fun!": "<h1>Слышишь ли ты меня?</h1> Я говорю с тобой из далёкого прошлого! Слышишь меня? Буду считать, что да!\n\nТы отдал(а) камень духа говорящей лисе, и теперь ты сам(а) — говорящая лиса. У тебя есть вопросы. У каждого духа лисы есть вопросы. Поэтому я пишу это послание! Каждая будущая лиса должна это услышать, если я всё сделал(а) правильно! Вот что тебе нужно знать.\n\n<h1>Что такое дух лисы?</h1> Теперь ты — дух природы. Ты не смертный. Вероятно, ты не можешь умереть. Попробуй! Ты обнаружишь, что так или иначе ты не умираешь. Это очень удобно! Но помни, твоё лисье тело сделано из плоти и костей, и оно ценно. Оно может вынести довольно много повреждений, но в конце концов износится.\n\nТы находишься в фазе юной лисы, так что наслаждайся! Но однажды ты проснёшься и поймёшь, что стал(а) частично прозрачным(ой). Не паникуй. Это просто твоё физическое тело умирает.\n\nБыть нематериальным делает многие забавные занятия непрактичными, и большинство из нас в этот момент довольно впадают в депрессию. Но просто подожди несколько тысяч лет — в конце концов ты разовьёшь множество замечательных сил, которые обойдут некоторые из этих ограничений.\n\n<h1>Как перестать быть духом лисы</h1> Ты уже знаешь, как снять это проклятие: тебе просто нужно, чтобы кто‑то подарил(а) тебе камень духа! Он или она станет лисой, а ты снова будешь свободен(свободна)!\n\nЕсли сделать это в течение десятка или двух лет, ты действительно вернёшься в своё старое смертное тело. Но вскоре твоя старая форма исчезнет навсегда. В этом случае, когда ты перестанешь быть духом лисы, ты просто... перестанешь существовать. Некоторые из нас в конце концов решают, что им надоело существовать. Других хитрые смертные обманывают и заставляют подержать камень духа. В любом случае — это конец.\n\n<h1>Ищи пробуждённых лис</h1> Духов лис в мире не так много, так что вряд ли ты встретишь многих из нас. Но есть масса смертных лис с магическими способностями! Возможно, эти лисы — потомки духа лисы... или, возможно, лисы просто от природы одарённые медиумы духов. В любом случае смертные маги годами пользуются лисами: превращают их в фамильяров и порабощают ради их силы.\n\nМаги проводят над этими лисами ритуал пробуждения, так что большинство из них умеют говорить! Умные из них могут научить тебя магическим приёмам. Конечно, через пару десятков лет ты будешь знать больше, чем любая смертная лиса могла бы тебя научить. Но пока они — твои лучшие учителя.\n\n<h1>Остерегайся богоподобных!</h1> Как дух природы 5‑го класса, у тебя появился новый естественный хищник: духи природы 4‑го класса! А также... другие духи природы 5‑го класса! И ещё: некоторые подлые духи природы 3‑го класса! Все они хотят поглотить тебя, чтобы увеличить свою собственную силу.\n\nИзбегай взаимодействия с ЛЮБЫМИ духами природы в течение первых нескольких столетий! Ты будешь настолько слаб, что даже дух‑хранитель небольшого леса сможет съесть тебя. Особенно остерегайся орочьих и гоблинских посёлков с защитниками‑полубогами. Полубоги — это тоже духи природы! У них нередко есть оружие, которое может навсегда уничтожить тебя.\n\nБоги, богоподобные, полубоги... — всё это просто слова для описания того, чем ты являешься! Ты среди самых слабых и уязвимых из всех духов природы, но ты всё ещё дух природы, искра божественности! Если сможешь пережить несколько тысяч лет, ты вырастешь и станешь чем‑то большим, чем просто лиса!\n\n... Или, что более вероятно, нет. Если бремя существования станет слишком тяжёлым, ты всегда можешь обмануть какого‑нибудь бедного смертного, чтобы тот дал тебе камень духа.\n\nКак дух природы, есть ещё множество правил и ограничений, о которых тебе стоит знать... но думаю, остальное ты разберёшься сам(сама). Или умрёшь, пытаясь!\n\nУдачи!"
"<h1>Commandments from Harukita</h1>\n\nThose who betray you.\n\nThose who defy you.\n\nThose who disappoint you.\n\nThose who belittle you.\n\nThey are your enemy, and I am your ally! If your hate is pure and strong, I will help you crush your enemies! You need simply make an offering to me.\n\nWith hate in your heart, strike someone down. \n\nWith a knife of pure ivory, cut them open and inscribe my symbols into their flesh. I will guide your blade. You will know what to do.\n\nTake their bodily fluids. Seek a graveyard at night.\n\nBathe in their blood and recite my words. I will guide your tongue. You will know what to say.\n\nMake offerings to me and you will be rewarded with power over the dead!\n\nWield my medallion, the gem of necromancy, to turn your hatred into raw destruction! Use this power to kill the living and destroy your foes!\n\nFail me in life, and you will serve me in death.": "<h1>Заповеди Харукиты</h1>\n\nТе, кто тебя предают.\n\nТе, кто бросают тебе вызов.\n\nТе, кто тебя разочаровывают.\n\nТе, кто тебя принижают.\n\nОни — твои враги, а я — твой союзник! Если твоя ненависть чиста и сильна, я помогу тебе сокрушить своих врагов! Тебе нужно лишь сделать мне подношение.\n\nС ненавистью в сердце, убей кого-нибудь.\n\nНожом из чистой слоновой кости рассек их и вырежи мои символы в их плоть. Я направлю твой клинок. Ты будешь знать, что делать.\n\nВозьми их телесные жидкости. Ищи кладбище ночью.\n\nОкунись в их кровь и произнеси мои слова. Я поведу твой язык. Ты будешь знать, что сказать.\n\nДелай мне подношения, и ты получишь власть над мертвыми!\n\nИспользуй мой медальон, самоцвет некромантии, чтобы обратить свою ненависть в чистое разрушение! Используй эту силу, чтобы убивать живых и уничтожать своих врагов!\n\nПредашь меня при жизни — и будешь служить мне после смерти."
" Your Majesty,\n\nPlease accept delivery of your new army. As I hoped, I was able to rectify some issues with your troops' anatomy through judicious craftwork.\n\nYour new soldiers will be loyal to you unto death. They will self-replicate when they have eaten enough meat... and to them, everything is meat! I hope that these creatures have fully justified our two-year agreement.\n\nBut I must confess that although these new troops will no doubt destroy your enemies, they are rather hideous to behold. I have a new idea for a creature. It will be less grotesque, yet far more powerful! I need two more years, and some of your most expendable dog-beasts. Please let me know quickly, for our original two-year time period ends soon.\n\nYour humble servant,\n\n- Dalvos the Creator": "Ваше Величество,\n\nПримите доставку вашей новой армии. Как я и надеялся, мне удалось исправить некоторые анатомические недостатки ваших войск с помощью вдумчивой ремесленной работы.\n\nВаши новые солдаты будут верны вам до смерти. Они будут самовоспроизводиться, когда съедят достаточно мяса... и для них всё — мясо! Надеюсь, эти существа полностью оправдали наше двухлетнее соглашение.\n\nНо должен признаться, что хотя эти новые войска несомненно уничтожат ваших врагов, выглядят они довольно отвратительно. У меня есть новая идея для существа. Оно будет менее уродливым, но гораздо более мощным! Мне нужно ещё два года и несколько ваших наименее ценных псовых зверей. Пожалуйста, сообщите мне как можно скорее, ибо наш первоначальный двухлетний срок скоро истекает.\n\nВаш покорный слуга,\n\n- Далвос Создатель"
" Dalvos, your horrible army is a delight to inflict upon my enemies. I especially appreciate that their shrieks of despair continue even as they eat gluttonously, even as they replicate, even when they sleep. Your work is splendid and I shall remain your patron.\n\nYour world will be left free for two more of its cycles. In exchange, you will create an army even more wondrous than this. And should you succeed... I may have use of you in my Court.\n\n- The Queen": "Далвос, твоя ужасная армия — настоящее наслаждение, которое я могу обрушивать на моих врагов. Я особенно ценю, что их вопли отчаяния продолжаются даже когда они жадно питаются, даже когда они размножаются, даже когда они спят. Твоя работа великолепна, и я останусь твоей покровительницей.\n\nТвой мир будет оставлен в покое ещё на два его цикла. В обмен ты создашь армию ещё более чудесную, чем эта. И если ты преуспеешь... возможно, ты пригодишься мне при моём дворе.\n\n- Королева"
"<i>Note: this is a guide to the elegant dwarven game of golf. It is not to be confused with human golf (which involves hitting balls with sticks) or goblin golf (which involves cruelty to bears) or the unspeakably perverted elven golf.</i>\n\nIn golf, players kick a massive boulder towards a designated target. The boulder must weight at least 3 stone, and it is against the rules for your boulder to leave the ground: that is, <i>punting</i> the boulder is forbidden. Golf is about kicking!\n\nEach ball lasts for 20 kicks (usually -- some courses vary this). After that number of kicks, if the ball isn't at the goal, it explodes and you must start over with a new ball. If you manage to get the ball to the goal, your score for that hole is the number of kicks the ball had remaining. (For instance, if you had 5 kicks left, your score for the hole would be 5.)\n\nIn casual games of golf -- and even casual golf tournaments! -- you may attempt each hole as many times as you wish. You may repeat any time, and start over any time, limited only by your patience and your shin-pain threshold. Only your best score for each hole counts, so you are mainly competing against yourself! (They say Strekios loves golf, and this is why!)\n\nBut remember that your score isn't considered \"valid\" until you've earned a score for every hole! Don't get too caught up repeating any individual hole until you've completed all the holes at least once.\n\nEach tournament's prize structure varies wildly; always speak with the tournament organizer for the details!\n\n<b>Tips:</b> - Here's the secret to aiming: imagine a line between you and the ball. When you kick, the ball will continue that line. This means the direction you're facing doesn't matter. You can turn sideways, or even shoot backwards, but that won't affect the ball's direction at all! Only your position, relative to the ball's position, matters. Oh and also the English you put on the kick, of course.\n\n- Remember that you get unlimited retries! If your ball is well and truly stuck, just abandon it. Speak to the caddy to start over.\n\n- English can move the ball quite dramatically. If you're serious about using English well, you may want to spend a while experimenting with how it works.": "<i>Примечание: это руководство по изящной дворфской игре в гольф. Его не следует путать с человеческим гольфом (в котором бьют мячи клюшками) или гоблинским гольфом (в котором допускаются жестокости по отношению к медведям) или невообразимо извращённым эльфийским гольфом.</i>\n\nВ гольфе игроки пинают массивный валун в направлении назначенной цели. Валун должен весить как минимум 3 стоуна, и правила запрещают вашему валуну покидать землю: то есть <i>подбрасывание</i> валуна запрещено. Гольф — это про пинки!\n\nКаждый валун выдерживает 20 пинков (обычно — на некоторых полях иначе). После этого количества пинков, если валун не в лунке, он взорвётся и вам придётся начать заново с новым валуном. Если вам удастся загнать валун в лунку, ваш счёт за эту лунку равен количеству оставшихся пинков у валуна. (Например, если у вас осталось 5 пинков, счёт за лунку будет 5.)\n\nВ непринуждённых играх в гольф — и даже в неофициальных турнирах! — вы можете пытаться пройти каждую лунку столько раз, сколько захотите. Вы можете повторять в любой момент и начинать заново в любое время, ограничены лишь терпением и порогом боли в голени. Считаться будет только ваш лучший результат для каждой лунки, так что вы в основном соревнуетесь сами с собой! (Говорят, Стрекиос любит гольф, и поэтому именно так!)\n\nНо помните, что ваш счёт не считается «действительным», пока вы не получите результат на каждой лунке! Не зацикливайтесь на повторении какой‑либо отдельной лунки, пока вы не пройдёте все лунки хотя бы раз.\n\nСтруктура призов в каждом турнире сильно варьируется; всегда уточняйте подробности у организатора турнира!\n\n<b>Советы:</b> - Вот секрет прицеливания: представьте линию между вами и валуном. Когда вы бьёте, валун продолжит движение по этой линии. Это значит, куда вы смотрите, не имеет значения. Вы можете повернуться вбок или даже ударить назад, но это никак не повлияет на направление валуна! Важно только ваше положение относительно положения валуна. И, конечно, английский, который вы придаёте удару.\n\n- Помните, что у вас неограниченное число повторов! Если ваш валун действительно застрял, просто оставьте его. Поговорите с кэдди, чтобы начать заново.\n\n- Английский может значительно сдвинуть валун. Если вы серьёзно намерены хорошо использовать английский, возможно, стоит потратить время на эксперименты с тем, как он работает."
"<h1>Basics of Animal Husbandry</h1> Animal Husbandry is the art and science of caring for and breeding animals - specifically pets! This is a complicated topic, and it will take time to master -- but there are a few basic concepts that will help you get started.\n\n<h1>Traits That Matter In Animal Husbandry</h1> In your career as an animal handler, You've no doubt learned all about traits like Toughness and Ferocity. But husbandry focuses on other traits, with the most important being <b>Virility</b>. Highly virile pets are more likely to successfully breed. There's another, more surprising effect of virility: it can change the chances of having a male or female baby. If a highly virile father mates with a low-virility mother, the offspring is more likely to be male. (And vice versa with a high-virility mother and a low-virility father.)\n\nEnthusiasm helps determine the length of time it takes to breed. If both pets are friendly, breeding can be quite fast, but if they're unfriendly, it can take many hours.\n\nThe mating fee is modified by the pets' Friendliness. Unfriendly pets are more difficult to handle, so stablemasters charge more. However, as you become more experienced in Animal Husbandry, this becomes less relevant, because you'll learn to train unfriendly pets to behave well.\n\nIntelligence also has a surprising effect when breeding. When you breed two creatures that aren't the same species, but have compatible genetics - like a bee and a wasp - the offspring will be either a bee or a wasp. The intelligence of the parents affects which type of offspring you get: higher Intelligence gives a higher chance for that species.\n\n<h1>Breeding Pets</h1> Work with a trained stablemaster to breed your pets. You'll select an eligible male and female, and the stablemaster will keep an eye on the pair for you, even completing the necessary registration forms... for a fee, of course! Once mating begins, you can check their status by viewing the stables. While the pets are mating, they'll be shown with the status of \"Mating\". If mating is successful, the female will transition to \"Pregnant\" status and the male to \"Recovering\" status. A stable-slot will be automatically reserved for the baby, so it has somewhere to live when it arrives!\n\nThe chance of successful breeding mostly depends on the pets' Virility, but there are four other factors. First, if the pets are of different species, the chance of success is lower. Second, if your Animal Husbandry skill is high, this improves the odds slightly. Third, there are stable items you can use to improve the odds. (Use them on the pet right before beginning the breeding session.) And finally, the phase of the moon can also affect success. It's said that breeding during the Full Moon is a little easier, and breeding during the New Moon is a little harder.\n\nThe stablemaster will contact you to let you know when a new baby arrives, or if a breeding session ends unsuccessfully.\n\n<h1>Stable Items</h1> You can use certain items on your pets while they're in the stables. The most commonly-used item is a pet cage. \n\nPet cages are used to transfer a pet for sale. You can only use cages on Unregistered pets -- meaning ones that have never been used for breeding before. And for legal reasons you can only sell pets that you raised from birth: you cannot sell wild-caught animals.\n\nPet cages come in different sizes and styles. Low-quality cages can only keep a pet contained for a short while -- a few days, say. There are higher-quality cages with auto-feeder systems that can keep your pet alive for months at a time, if necessary. But all cages have a time limit! If you wait too long, the pet will escape and go feral, lost forever in the wild.\n\nThere are other types of items to use on pets, but they're species-dependent. For instance, there are certain aphrodesiac waxes you can use on male wasps to make them more attractive to female wasps -- use this sort of item on the male right before starting a mating session.\n\nIn general, consult the item's instruction manual before use.\n\n<h1>Understanding Husbandry States</h1> Every pet in your stable has a \"husbandry state\". Here's a reference to all the states:\n\n<b>Unregistered</b>: these pets have never been used for breeding. (They are either wild-caught, or just-born.)\n\n<b>Pet-Only</b>: these pets have been classified as pet-only, and can never be used for breeding. However, they <i>can</i> be placed in travel cages and sold to others. (If you use a pet cage on an Unregistered pet, they'll become a Pet-Only pet.)\n\n<b>Registered</b>: these pets have been registered for breeding, and are ready to mate. (Note that you don't need to manually register your pets: if you try to breed an Unregistered pet, you'll be prompted to register them automatically.) Registration costs Councils, and newer practicioners tend to have to pay more. Experienced breeders know tricks to avoid some of the fees.\n\n<b>Mating</b>: your pets are currently having sex. This can take anywhere from a few minutes to many hours, depending on the pets' traits. If mating is successful, the male will enter Recovering state, the female will enter Pregnant state, and the baby's stable slot will be reserved automatically. (The baby's slot will be marked as \"In Utero\".)\n\n<b>Pregnant</b>: this is a female that is gestating. (In the case of insects, the female isn't actually \"pregnant\", but is guarding her egg feverishly, and is unavailable for adventuring.) The duration of pregnancy is based on the species. It can also be affected by stable items, to some extent.\n\n<b>Recovering</b>: this is a male that is recovering from sex. (They need a few hours of rest before they're ready for battle ... or more sex.) The recovery time is based on the male's Virility.\n\n<b>In Utero</b>: this is a baby that isn't here yet! (The stable slot is automatically pre-reseerved, to make sure there's room for the baby when it arrives.)\n\n<b>Dormant</b>: this very rare husbandry state indicates that the pet has forgotten about the concepts of sex. This can only happen with very long-lived species. It may be possible to remind a dormant pet about sex somehow, turning it into a Registered pet. But doing so would require a lot of husbandry experience and a strong bond with the pet.": "<h1>Основы разведения питомцев</h1> Разведение питомцев — это искусство и наука ухода за животными и их размножения — в особенности питомцев! Это сложная тема, и на её освоение потребуется время — но есть несколько базовых понятий, которые помогут вам начать.\\n\\n<h1>Характеристики, важные для разведения</h1> В вашей карьере укротителя животных вы, несомненно, узнали всё о таких характеристиках, как Выносливость и Свирепость. Но разведение фокусируется на других характеристиках, самой важной из которых является <b>Вирильность</b>. Очень вирильные питомцы с большей вероятностью успешно спариваются. Есть ещё один, более неожиданный эффект вирильности: она может изменить шансы на рождение самца или самки. Если очень вирильный отец спарится с низковирильной матерью, потомство с большей вероятностью будет мужского пола. (И наоборот: при высоковирильной матери и низковирильном отце потомство с большей вероятностью будет женского пола.)\\n\\nЭнтузиазм влияет на длительность процесса спаривания. Если оба питомца дружелюбны, спаривание может пройти довольно быстро, но если они недружелюбны, это может занять много часов.\\n\\nПлата за спаривание модифицируется Дружелюбием питомцев. Недружелюбных питомцев сложнее содержать, поэтому конюхи берут больше. Однако по мере того как вы становитесь более опытным в Разведении питомцев, это становится менее важным, потому что вы научитесь тренировать недружелюбных питомцев вести себя хорошо.\\n\\nИнтеллект также имеет неожиданный эффект при разведении. Когда вы скрещиваете двух существ разных видов, но с совместимой генетикой — например пчелу и осу — потомство будет либо пчелой, либо осой. Интеллект родителей влияет на то, какого типа окажется потомство: более высокий Интеллект повышает шанс для соответствующего вида.\\n\\n<h1>Спаривание питомцев</h1> Работайте с обученным конюхом, чтобы разводить своих питомцев. Вы выберете подходящего самца и самку, и конюх будет присматривать за парой за вас, даже заполнив необходимые регистрационные формы... за плату, разумеется! Как только начнётся спаривание, вы сможете проверить их состояние, просмотрев стойла. Пока питомцы спариваются, у них будет показан статус \"Спаривание\". Если спаривание успешно, самка перейдёт в статус \"Беременная\", а самец — в статус \"Восстановление\". Ячейка в стойле будет автоматически зарезервирована для детёныша, чтобы у него было где жить, когда он появится!\\n\\nШанс на успешное спаривание в основном зависит от Вирильности питомцев, но есть ещё четыре фактора. Во-первых, если питомцы разных видов, шанс успеха ниже. Во-вторых, если ваш навык Разведения питомцев высок, это слегка повышает шансы. В-третьих, есть предметы для стойл, которые можно использовать, чтобы улучшить шансы. (Используйте их на питомце прямо перед началом сессии спаривания.) И, наконец, фаза луны также может повлиять на успех. Говорят, что спаривание во время Полнолуния немного проще, а во время Новолуния — немного сложнее.\\n\\nКонюх свяжется с вами, чтобы сообщить, когда появится новый детёныш, или если сессия спаривания завершилась безуспешно.\\n\\n<h1>Предметы для стойл</h1> Вы можете использовать определённые предметы на своих питомцах, пока они находятся в стойлах. Наиболее распространённый предмет — это клетка для питомца.\\n\\nКлетки для питомцев используются для передачи питомца на продажу. Вы можете использовать клетки только на Незарегистрированных питомцах — то есть на тех, которые никогда раньше не использовались для разведения. И по юридическим причинам вы можете продавать только тех питомцев, которых вы вывели с рождения: вы не можете продавать животных, пойманных в дикой природе.\\n\\nКлетки для питомцев бывают разных размеров и типов. Низкокачественные клетки могут удерживать питомца недолго — скажем, несколько дней. Есть клетки более высокого качества с системами автокормления, которые при необходимости могут поддерживать питомца в живых месяцы напролёт. Но у всех клеток есть лимит по времени! Если вы будете ждать слишком долго, питомец сбежит и одичает, навсегда потерявшись в дикой природе.\\n\\nСуществуют и другие типы предметов для использования на питомцах, но они зависят от вида. Например, существуют определённые воски‑афродизиаки, которые можно использовать на самцах ос, чтобы сделать их более привлекательными для самок ос — используйте такого рода предметы на самце прямо перед началом сессии спаривания.\\n\\nВ общем, перед использованием ознакомьтесь с инструкцией к предмету.\\n\\n<h1>Понимание состояний разведения</h1> У каждого питомца в ваших стойлах есть «состояние разведения». Вот справочник по всем состояниям:\\n\\n<b>Незарегистрирован</b>: эти питомцы никогда не использовались для разведения. (Они либо пойманы в дикой природе, либо только что родились.)\\n\\n<b>Только питомец</b>: эти питомцы классифицированы как только для питомца и никогда не могут использоваться для разведения. Однако их <i>можно</i> помещать в транспортные клетки и продавать другим. (Если вы используете клетку для питомца на Незарегистрированном питомце, он станет питомцем типа \"Только питомец\".)\\n\\n<b>Зарегистрирован</b>: эти питомцы зарегистрированы для разведения и готовы к спариванию. (Обратите внимание, что вам не нужно регистрировать питомцев вручную: если вы попытаетесь разводить Незарегистрированного питомца, вам предложат автоматически зарегистрировать его.) Регистрация стоит Советов, и новички обычно платят больше. Опытные разводчики знают хитрости, позволяющие избежать части сборов.\\n\\n<b>Спаривание</b>: ваши питомцы в данный момент занимаются сексом. Это может занять от нескольких минут до многих часов, в зависимости от характеристик питомцев. Если спаривание успешно, самец перейдёт в состояние Восстановление, самка — в состояние Беременная, а место для детёныша будет зарезервировано автоматически. (Ячейка детёныша будет помечена как \"В утробе\".)\\n\\n<b>Беременная</b>: это самка, которая вынашивает потомство. (В случае насекомых самка фактически не «беременна», но яростно охраняет своё яйцо и недоступна для приключений.) Длительность беременности зависит от вида. В некоторой степени её также могут влиять предметы для стойл.\\n\\n<b>Восстановление</b>: это самец, который восстанавливается после спаривания. (Ему нужно несколько часов отдыха, прежде чем он будет готов к бою... или к новому спариванию.) Время восстановления зависит от Вирильности самца.\\n\\n<b>В утробе</b>: это детёныш, который ещё не появился! (Место в стойле автоматически предварительно зарезервировано, чтобы обеспечить место для детёныша, когда он появится.)\\n\\n<b>Дремлющий</b>: это очень редкое состояние разведения означает, что питомец забыл о понятии секса. Это может случиться только с очень долгоживущими видами. Возможно, как‑то можно будет напомнить дремлющему питомцу о сексе и превратить его в Зарегистрированного питомца. Но для этого потребуется большой опыт в разведении и сильная связь с питомцем."
" <h1>Helping Povus</h1> Each night (around 8pm game-time) the town of Povus is ravaged by monsters. When you help the town fend off these threats, you gain personal rewards and also help the town recover. Start by lighting the lamps around town. This will help keep the monsters at bay. Once all the lamps in town are lit, visit the town signboard for a reward. You can also start another quest at that time, if you so choose.\n\nThe second quest is chosen randomly. Complete it and return to the signpost for a reward. After that, the quests get a bit harder, and require two players to start. (Both players must interact with the signboard at the same time.) Later quests require 3, 4, and more players, up to a maximum of 6. These later quests are quite deadly and it may behoove you to team up!\n\n<h1>Town Level</h1> The town's current state of disrepair is represented by a level. You can view the town's level from the signboard. The town earns XP when you complete nightly quests, and levels up when its XP bar is full. But there's a catch! Every night, right as the monsters appear, the town <i>loses</i> XP. This can cause its level to drop!\n\nThe town's level determines which villagers and amenities are present. For instance, Povus must be level 3 to activate the forge. Stephie Blackhammer also returns to town when it reaches level 3. These features (and people) disappear again if the town's level drops below their requirement.": "<h1>Помощь Повусу</h1> Каждую ночь (примерно в 20:00 по игровому времени) город Повус разоряют монстры. Когда вы помогаете городу отразить эти угрозы, вы получаете личные награды и также помогаете городу восстановиться. Начните с того, что зажгите фонари по всему городу. Это поможет держать монстров на расстоянии. После того как все фонари в городе зажжены, подойдите к городской доске объявлений за наградой. Вы также можете в это время начать другое задание, если захотите.\n\nВторое задание выбирается случайным образом. Выполните его и вернитесь к доске объявлений за наградой. После этого задания становятся чуть сложнее и требуют двух игроков для начала. (Оба игрока должны взаимодействовать с доской объявлений одновременно.) Последующие задания требуют 3, 4 и большего числа игроков, до максимума 6. Эти поздние задания довольно смертоносны, и вам может быть полезно объединиться в команду!\n\n<h1>Уровень города</h1> Текущее состояние запущенности города выражается уровнем. Вы можете посмотреть уровень города на доске объявлений. Город получает XP, когда вы выполняете ночные задания, и повышает уровень, когда его полоса XP заполнена. Но есть загвоздка! Каждую ночь, прямо в момент появления монстров, город <i>теряет</i> XP. Это может привести к падению его уровня!\n\nУровень города определяет, какие жители и объекты инфраструктуры присутствуют. Например, городу Повус требуется 3‑й уровень, чтобы активировать кузницу. Стефи Блэкхаммер также возвращается в город, когда он достигает 3‑го уровня. Эти объекты (и люди) снова исчезают, если уровень города опускается ниже их требования."
"<h1>Prelude: Beginning Animal Handling</h1> Neophyte animal handlers who want to use their pet in combat are often at a loss how to start. Well, that's easy: start by taming a pet. Each kind of pet needs a different taming regimen; talk to your local stablemaster to see what they recommend for your area.\n\nOnce you have a pet, take it into combat situations and let it fight! The important thing is to <i>always feed your pet</i> early on. Even if the pet doesn't seem to need it! This builds your bond with the pet and you'll soon learn other ways of interacting.\n\nAfter you've learned the basics, like teaching your pet to Sic 'Em, it's time to start paying attention to your animals' traits!\n\n<h1>Pet Traits</h1> All pets have their own personalities, character, and quirks. Animal Handlers categorize pets by seven main traits:\n\n<b>Ferocity</b> represents how threatening your pet is to enemies. A higher ferocity means your pet deals more damage with every attack!\n\n<b>Toughness</b> determines the creature's maximum health. Tough creatures hang on to life even when they take brutal punishment.\n\n<b>Ruggedness</b> is the pet's cantankerous spirit. In combat this determines their maximum armor.\n\n<b>Virility</b> has very little effect on the battlefield, but is very important should you choose to branch into Animal Husbandry. Virility is the measure of how much your pet likes to breed, and how successful it is at reproducing. Pets with high virility are more likely to mate successfully, and they recover from breeding more quickly than other pets. Virility can also affect the sex of the offspring: a very virile pet is more likely to produce an offspring of the same sex.\n\n<b>Friendliness</b> helps a pet bond with their current owner. As you care for a pet, you build up a special bond between that specific pet and yourself. A friendly pet will form this bond much quicker than an unfriendly pet. In addition, a friendly pet is more aware of their surroundings, which helps them evade burst attacks.\n\n<b>Enthusiasm</b> is a rough measure of how much your pet craves excitement -- especially the excitement of combat. The more enthusiastic your pet, the more likely they are to really dive in and wallop the enemy, leading to more critical hits. \n\n<b>Intelligence</b> helps the pet make the most of their experience with combat -- they learn more quickly. In addition, intelligent pets are more accurate with their attacks, which is helpful when fighting evasive enemies! Intelligence also has an important but surprising role in Animal Husbandry. When you breed two compatible species - like a bee and a wasp - the offspring will be either a bee or a wasp. The intelligence of the parents directly affects which type of offspring you get.  \n\n<h1>Trait Values</h1> Each of these seven traits can range from 1 (very poor) to 100 (extraordinary). It's possible for a creature to have stats even higher than 100, but since values above 100 don't do anything extra, we represent that as \"100+\". Likewise, it's possible for a pet to be so bad at something that it's trait is less than 1, but numbers below 1 aren't any worse than 1, so we represent that as \"< 1\" (\"less than 1\"). 50 is the \"average\" value for each trait. \n\nTraits are handy when comparing two pets of the same species, but less useful when comparing across species. Let's take Toughness, for instance: a grizzly bear with a Toughness of 1 would have 25% less health than a Grizzly Bear with an average Toughness (of 50). But that Toughness 1 bear might still have more health than a rat with a Toughness of 100! So animal handlers need to learn the ins and outs of each species in order to really make sense of trait numbers.\n\nTraits are determined by the creature's genes, which means they won't change during the pet's lifetime (unless you're an insane wizard practicing illegal magic). So if you're going to train a pet for a particular purpose, it's wise to make sure their traits aren't terrible for that job. For instance, if you want your pet to protect you in combat, you want one with at least an average Toughness rating. But don't get caught in the trap of holding out for a pet with \"perfect\" genes. If you're taming wild animals, most of their genes will be pretty mediocre. You'll never find a perfect creature. And if you wait too long, you'll miss out on a lot of amazing animal partners. \n\nRemember that training will have a much bigger overall impact than the pet's genes! And your bond with the pet is what will truly turn you both into killing machines in battle.": "<h1>Преамбула: Начало обращения с животными</h1> Новички-укротители животных, которые хотят использовать своего питомца в бою, часто не знают, с чего начать. На самом деле всё просто: начните с приручения питомца. Для каждого вида питомца требуется своя схема приручения; поговорите с местным заведующим конюшней, чтобы узнать, что он рекомендует для вашей местности.\n\nКак только у вас появится питомец, берите его в боевые ситуации и давайте сражаться! Главное — <i>всегда кормите вашего питомца</i> на ранних этапах. Даже если кажется, что питомцу это не нужно! Это укрепляет вашу привязанность к питомцу, и вскоре вы узнаете другие способы взаимодействия.\n\nПосле того как вы освоите основы, например, научив питомца команде «Атаковать!», пора начать обращать внимание на черты ваших животных!\n\n<h1>Черты питомца</h1> У всех питомцев есть своя личность, характер и причуды. Укротители животных классифицируют питомцев по семи основным чертам:\n\n<b>Свирепость</b> показывает, насколько угрожающим является ваш питомец для врагов. Более высокая свирепость означает, что питомец наносит больше урона при каждой атаке!\n\n<b>Выносливость</b> определяет максимальное здоровье существа. Стойкие существа держатся за жизнь, даже когда получают жестокие повреждения.\n\n<b>Прочность</b> — это упрямый дух питомца. В бою это определяет их максимальную броню.\n\n<b>Плодовитость</b> мало влияет на поле боя, но очень важна, если вы решите заняться животноводством. Плодовитость измеряет, насколько питомцу нравится размножаться и насколько успешно он это делает. Питомцы с высокой плодовитостью с большей вероятностью успешно спариваются и восстанавливаются после спаривания быстрее, чем другие питомцы. Плодовитость также может влиять на пол потомства: очень плодовитый питомец с большей вероятностью даст потомство того же пола.\n\n<b>Дружелюбие</b> помогает питомцу связаться со своим текущим владельцем. По мере ухода за питомцем вы укрепляете особую привязанность между этим конкретным питомцем и собой. Дружелюбный питомец сформирует эту привязанность гораздо быстрее, чем недружелюбный. Кроме того, дружелюбный питомец лучше осведомлён о своём окружении, что помогает ему уклоняться от внезапных атак.\n\n<b>Рвение</b> приблизительно отражает, насколько питомец жаждет волнения — особенно волнения от боя. Чем более рьяным является питомец, тем вероятнее он ринется в бой и нанесёт мощные удары по врагу, что приведёт к увеличению числа критических попаданий.\n\n<b>Интеллект</b> помогает питомцу извлекать максимум из опыта в бою — они обучаются быстрее. Кроме того, интеллектуальные питомцы более точны в своих атаках, что полезно при сражениях с уклоняющимися врагами! Интеллект также играет важную, но неожиданную роль в животноводстве. Когда вы скрещиваете два совместимых вида — например, пчелу и осу — потомство будет либо пчелой, либо осой. Интеллект родителей напрямую влияет на то, какого типа окажется потомство.\n\n<h1>Значения черт</h1> Каждая из этих семи черт может варьироваться от 1 (очень плохая) до 100 (исключительная). Возможны значения выше 100, но поскольку значения свыше 100 не дают ничего лишнего, мы обозначаем это как \"100+\". Аналогично, питомец может быть настолько плох в чём-то, что его черта будет меньше 1, но числа ниже 1 ничем не хуже 1, поэтому мы представляем это как \"< 1\" (\"меньше единицы\"). 50 — это \"среднее\" значение для каждой черты.\n\nЧерты удобны при сравнении двух питомцев одного вида, но менее полезны при сравнении между видами. Возьмём, к примеру, Выносливость: гризли с Выносливостью 1 будет иметь на 25% меньше здоровья, чем гризли со средней Выносливостью (50). Но этот медведь с Выносливостью 1 может всё равно иметь больше здоровья, чем крыса с Выносливостью 100! Поэтому укротителям животных нужно изучать особенности каждого вида, чтобы действительно понимать значения черт.\n\nЧерты определяются генами существа, а это значит, что они не меняются в течение жизни питомца (если вы не сумасшедший волшебник, практикующий незаконную магию). Так что если вы собираетесь тренировать питомца для конкретной задачи, разумно убедиться, что его черты не ужасны для этой работы. Например, если вы хотите, чтобы питомец защищал вас в бою, вам нужен питомец с как минимум средней оценкой Выносливости. Но не попадайтесь в ловушку, ожидая питомца с \"идеальными\" генами. Если вы приручаете диких животных, большинство их генов будет довольно посредственным. Вы никогда не найдёте идеальное существо. И если вы будете ждать слишком долго, вы пропустите много удивительных партнёров-животных.\n\nПомните, что обучение окажет гораздо большее общее влияние, чем гены питомца! И именно ваша привязанность к питомцу по-настоящему превратит вас обоих в машины для убийства на поле боя."
" It's official: I have sold the entire duchy to the goblins. This is entirely the fault of the Council. I accept no blame for what happened: it was an entirely predictable, understandable response to their abuse. If they could not foresee me doing this, they should not be rulers of a country. Anyway, Kazri and I are now on the lam. As part of our deal, we have gained access to the goblin tunnel network between my duchy and the adjacent ones. We are heading to Eltibule, as it should be the easiest to hide in.\n\n---\n\nKazri has had a genius idea. When we found Eltibule's daughter's spirit bound in the earth, everything fell together. She is now Kazri's puppet, and she has scared the other Eltibule brat out of the duchy! There's no ruler here now! Hahahaha! I have helped myself to the more valuable commodities in this miserable duchy, but I am eager to move on. However, Kazri has been interrogating this ghost. Seems she knows something about a font of necromantic darkness. I hope this doesn't delay us overmuch.\n\n---\n\nWell, now we're in a fucking cave a million miles beneath the earth, and Kazri is irate. We've killed dozens of these horrible beasts, only to discover that the necromantic power isn't necromancy at all. It's darkness, all right, but not dark power: it's just... darkness! The absence of light! I've never seen Kazri so outraged. It's fairly amusing. We are debating confronting this nature spirit. I think we should just move on; surely the Council's agents will be tracking us...\n\n---\n\n(The next entry is written in a different style.)\n\nI don't know how long it's been. Kazri and I fought the spirit of darkness, and destroyed it. And then Kazri said he'd help me harness its power! I agreed, and ... Kazri is gone now, and there's a layer of dust on everything. I've been lying here for months or years. I feel ... so powerful! So incredibly powerful! But I can't leave! I'm trapped here in this small temple. I can't even get into the adjoining caves; when I try, I feel incredible pain. I have found some books among Kazri's discarded belongings. They seem to suggest that I've been turned into some sort of \"nature spirit\". Kazri must have known what would happen. But why did Kazri do this to me?\n\nThe ghost of Eltibule's brat remains here. She seems to be tied into my power somehow, and I can force her to obey my commands. But I find her constant complaints to be quite annoying.\n\n---\n\nI used my powers to shout to the gods. \"I am here!\" I knew they would come to fight me. And I knew I would lose. But I would die fighting gods. That's the best I can hope for, now. But in response to my scream, I heard The Worm. Gulagra. It screamed \"He is mine!\" Just that. What happens now? Gulagra's minions have been showing up here, but they don't want to fight me. They've just been excavating the tunnels, widening them. A few have come to see me, but they are gibbering madmen. I do not know what's happening.\n\n---\n\nHorrific creatures came today, minions of Gulagra. But I am now master of this tiny domain. I've summoned my own defenders! While I could not kill all of the beasts, I was able to seal them away. If Gulagra wants me, he will need to send far better minions. Or come for me himself...\n\n---\n\nI have prepared a trap for Gulagra. I've invested some of my new power in a crystal of destruction. When the worm or its avatar shows up, it will utterly destroy them. It recharges so slowly that I fear it can only fire once before the battle will be over. But hopefully that will be enough.": "Официально: я продал всё герцогство гоблинам. Это полностью вина Совета. Я не принимаю вину за произошедшее: это была вполне предсказуемая, понятная реакция на их злоупотребления. Если они не могли предвидеть, что я на это решусь, им не стоит быть правителями страны. В любом случае, Казри и я теперь в бегах. По условиям нашей сделки мы получили доступ к сети гоблинских туннелей между моим герцогством и соседними. Мы направляемся в Элтибуль, там должно быть легче всего прятаться.\n\n---\n\nУ Казри родилась гениальная идея. Когда мы нашли дух дочери Элтибуля, связанный с землёй, всё сошлось. Сейчас она — марионетка Казри, и она выгнала другого сорванца Элтибуля из герцогства! Здесь теперь нет правителя! Хахаха! Я присвоил себе более ценные товары этого жалкого герцогства, но мне не терпится двигаться дальше. Однако Казри допрашивал этого призрака. Похоже, она знает нечто об источнике некромантической тьмы. Надеюсь, это не задержит нас слишком надолго.\n\n---\n\nТак вот, теперь мы в чёртовой пещере на миллион миль под землёй, и Казри в ярости. Мы убили десятки этих отвратительных тварей, только чтобы обнаружить, что некромантическая сила вовсе не некромантия. Это тьма, ясно, но не «тёмная энергия»: это просто... тьма! Отсутствие света! Я никогда не видел Казри таким возмущённым. Это довольно забавно. Мы обсуждаем возможность противостоять этому духу природы. Я думаю, нам стоит просто идти дальше; агенты Совета наверняка будут нас выслеживать...\n\n---\n\n(Следующая запись написана в другом стиле.)\n\nЯ не знаю, сколько прошло времени. Казри и я сражались с духом тьмы и уничтожили его. А потом Казри сказал, что поможет мне использовать его силу! Я согласился, и... Казри исчез, а на всём слой пыли. Я пролежал здесь месяцы или годы. Я чувствую... такую силу! Настолько невероятную силу! Но я не могу уйти! Я заперт здесь, в этом маленьком храме. Я даже не могу попасть в прилегающие пещеры; когда я пытаюсь, я чувствую невыносимую боль. Я нашёл среди оставленных вещей Казри несколько книг. Похоже, из них следует, что меня превратили в некий «дух природы». Казри, должно быть, знал, что случится. Но зачем Казри сделал это со мной?\n\nПризрак сорванца Элтибуля остался здесь. Похоже, она как-то связана с моей силой, и я могу заставлять её повиноваться моим приказам. Но её постоянные жалобы меня сильно раздражают.\n\n---\n\nЯ использовал свои силы, чтобы закричать богам. «Я здесь!» Я знал, что они придут сражаться со мной. И я знал, что проиграю. Но я умру, сражаясь с богами. Это максимум, на что я теперь могу надеяться. Но в ответ на мой крик я услышал Червя. Гулагра. Он выкрикнул: «Он мой!» — и всё. Что будет теперь? Прислужники Гулагры появлялись здесь, но они не хотят сражаться со мной. Они просто раскапывают туннели, расширяют их. Несколько приходили посмотреть на меня, но это бормочущие безумцы. Я не понимаю, что происходит.\n\n---\n\nСегодня пришли ужасающие создания, слуги Гулагры. Но теперь я хозяин этого крошечного владения. Я призвал собственных защитников! Хоть я и не смог убить всех тварей, мне удалось запечатать их. Если Гулагра захочет меня, ему придётся прислать куда лучших прислужников. Или прийти самому...\n\n---\n\nЯ приготовил ловушку для Гулагры. Я вложил часть своей новой силы в кристалл разрушения. Когда червь или его аватар появятся, он полностью уничтожит их. Он перезаряжается так медленно, что я боюсь, что сможет сработать лишь один раз, прежде чем бой закончится. Но, надеюсь, этого будет достаточно."
" <i>[A pile of documents was buried with Lord Eltibule. Some of the letters have dates, so you are able to piece together their proper order. They are a conversation between Lord Eltibule and Siggund Deftwhisper.]</i>\n\nMister Deftwhisper,\n\nI know that dwarven work takes time. But I am a human and you have exhausted my patience. It has been ten years since our arrangement began and yet still there are giant rocks and debris all around my home! I recently reviewed your mens' work and while it is very high quality, it is <i>much</i> too large for a cellar! Even taking into account the other uses you mentioned. There is room for a thousand prisoners, or evacuees, or storage of countless goods. I do not need more space than this. \n\nPlease complete your work within the month. As I have explained before, my daughter is very ill and I have invited sages from across the land to visit and treat her. Many of these learned sages are offput by the ceaseless hammering coming from below. I must admit that I barely notice those sounds after so many years of torture, but it is not an environment conducive to healing my precious Katarina.\n\nLord Eltibule\n\n<hr>\n\nLord Eltibule, \n\nTwo years ago, I sent a messenger with news of the excavation. Did you not carefully read my letter? I shall recap: we have successfully recovered the ancient dwarven fortress beneath your home and removed many of the precious artifacts of dwarven nature. We also learned that this fortress once served as a bastion against goblin invasions -- it sits atop a major gob-lands tunnel system. It is this discovery that has kept my workers toiling beneath your keep!\n\nWe were not so foolish as to excavate the gob-lands tunnels, of course, but even so, our work has consequence: with the fortress tunnels cleared, goblin miners will inevitably arrive. It will happen quite quickly -- definitely within your lifetime! So for your safety, we must demolish these tunnels. However, there remain some immobile dwarven artifacts there, and our laws do not permit us to destroy them.\n\nPlease allow my men to work another ten years. We shall fully remove the artifacts and collapse the tunnels, and then begin work upon your magnificent new Keep. As before, there will be no cost to you.\n\nSincerely,\n\nSiggund Deftwhsiper\n\n<hr>\n\nMister Deftwhisper,\n\nI am disturbed by your previous letter. Ten more years is far too long! Can you not collapse some of the upper tunnels to secure my keep, then continue working from below?\n\nLord Eltibule\n\n<hr>\n\nLord Eltibule, \n\nNo doubt a human-made tunnel system could be quickly collapsed, but these are dwarven tunnels. Collapsing them does not destroy them -- they can be easily mined out again! We will need to use powerful acid to weaken the rocks themselves. Goblins will otherwise surely dig their way into your home.\n\nI feel somewhat responsible for this situation and wish to make amends. Perhaps we can renovate your cellar areas in some way to make them more useful to you? Ten years is long for a human, but think of your children, or your childrens' children: what use might they have for sturdy tunnels beneath their home? My engineers stand ready.\n\nSincerely,\n\nSiggund Deftwhsiper\n\n<hr>\n\nMister Deftwhisper,\n\nIt has taken me some time to gather my composure. You feel <i>somewhat responsible</i>? You told me that the excavation was purely historical in nature! My children have grown up knowing nothing but the din of construction. Poor Katarina has been moved to the farthest tower -- the only place where the hammering cannot be heard. Serisa is also not pleased. But we have accepted your reasoning.\n\nIn addition to the wine cellar and storage area, you will provide the following features: a storage and display area for my Lady's large collection of artwork, a dozen small rooms that can be made into prison cells should the need arise, and lastly, you shall create a special adventure for my son's thirteenth birthday. His birthday is in nine months, so please make haste. \n\nMy son is enamored of the \"dungeon\", as he calls it, and longs to explore it, imagining it to be full of wonder and excitement. Exploration is a worthwhile hobby for a young duke-to-be, and he is deft with a sword -- but he is not yet a grown man. Please create an adventure that is safe, yet fun.\n\nYou also promised to create a new annex to the Keep when the other work is done. I expect my Keep to take precedence over such things as pouring acid on rocks! I wish for Eltibule Keep to be the center of a township -- perhaps not in my lifetime, but in my son's.\n\nLord Eltibule\n\n<hr>\n\nLord Eltibule, \n\nIt shall be done. However, I am informed by my engineers that your son's special adventure will not be ready by his thirteenth birthday. But I will make up for that: I have commissioned a suit of magical armor for the boy to find, plus a sword of impeccable sharpness. They will be hidden behind rudimentary puzzles and hazards. Unless there are further delays, the adventure should be ready in time for his fifteenth birthday.\n\nI regret that the aboveground work cannot be performed by my workers until all the underground work is complete -- this is due to complex dwarven laws regarding historical sites. But it <i>shall</i> be completed in the fullness of time. Perhaps not in your lifetime, but in your son's.\n\nSincerely,\n\nSiggund Deftwhsiper": "<i>[С кучей документов похоронили Лорда Элтибуля. Некоторые письма имеют даты, так что вы можете восстановить их правильный порядок. Это переписка между Лордом Элтибулем и Сиггундом Дефтвиспером.]</i>\n\nМистер Дефтвиспер,\n\nЯ знаю, что гномская работа требует времени. Но я человек, и вы исчерпали моё терпение. Прошло десять лет с начала нашей договорённости, а вокруг моего дома всё ещё лежат гигантские валуны и обломки! Я недавно просмотрел работы ваших людей, и, хотя они очень высокого качества, они <i>чрезмерно</i> велики для погреба! Даже с учётом других назначений, о которых вы упоминали. Там может разместиться тысяча заключённых, или эвакуированных, или хранилище бесчисленных товаров. Мне не нужно больше места, чем это.\n\nПожалуйста, завершите работу в течение месяца. Как я уже объяснял, моя дочь тяжело больна, и я пригласил мудрецов со всех концов страны, чтобы осмотреть и лечить её. Многие из этих учёных отталкивает непрекращающийся стук, доносящийся снизу. Признаюсь, после стольких лет мучений я почти не замечаю этих звуков, но это не среда, благоприятная для исцеления моей драгоценной Катарины.\n\nЛорд Элтибуль\n\n<hr>\n\nЛорд Элтибуль,\n\nДва года назад я послал гонца с вестью о раскопках. Разве вы не прочли моё письмо внимательно? Позвольте резюмировать: нам удалось обнаружить древнюю гномью крепость под вашим домом и извлечь многие ценные гномьи артефакты. Мы также узнали, что эта крепость некогда служила бастионом против гоблинских нашествий — она расположена над крупной системой туннелей гоблинских земель. Именно это открытие удерживает моих рабочих под вашим замком!\n\nМы, конечно, не были настолько глупы, чтобы раскапывать туннели гоблинских земель, но даже так наша работа имеет последствия: с расчисткой туннелей крепости неизбежно появятся гоблинские шахтёры. Это произойдёт довольно быстро — определённо при вашей жизни! Поэтому для вашей безопасности мы должны обрушить эти туннели. Однако там остаются некоторые неподвижные гномьи артефакты, и наши законы не позволяют их уничтожать.\n\nПожалуйста, разрешите моим людям работать ещё десять лет. Мы полностью извлечём артефакты и обрушим туннели, а затем начнём работу над вашим великолепным новым замком. Как и прежде, с вас плата взиматься не будет.\n\nИскренне,\n\nСиггунд Дефтвиспер\n\n<hr>\n\nМистер Дефтвиспер,\n\nВаше предыдущее письмо меня тревожит. Ещё десять лет — это слишком долго! Не могли бы вы обрушить некоторые верхние туннели, чтобы обезопасить мой замок, а затем продолжить работу снизу?\n\nЛорд Элтибуль\n\n<hr>\n\nЛорд Элтибуль,\n\nБез сомнения, туннельную систему, созданную людьми, можно было бы быстро обрушить, но это гномьи туннели. Их обрушение не уничтожит их — их легко снова прорыть! Нам придётся использовать мощную кислоту, чтобы ослабить сами породы. Иначе гоблины наверняка пророют путь в ваш дом.\n\nЯ чувствую некоторую ответственность за эту ситуацию и желаю загладить её. Возможно, мы сможем как‑то обновить ваши погребные помещения, чтобы они стали для вас более полезными? Десять лет — много для человека, но подумайте о ваших детях или детях ваших детей: какая польза им от прочных туннелей под домом? Мои инженеры готовы.\n\nИскренне,\n\nСиггунд Дефтвиспер\n\n<hr>\n\nМистер Дефтвиспер,\n\nМне потребовалось некоторое время, чтобы собраться. Вы чувствуете <i>некоторую ответственность</i>? Вы говорили, что раскопки были чисто историческим мероприятием! Мои дети выросли, слыша только гул строительства. Бедная Катерина была переселена в самую дальнюю башню — единственное место, где стук молота не слышен. Сериса тоже недовольна. Но мы смирились с вашим объяснением.\n\nВ дополнение к винному погребу и складским помещениям вы должны предусмотреть следующие элементы: помещение для хранения и экспозиции большой коллекции произведений искусства моей госпожи, дюжину небольших комнат, которые при необходимости могут быть превращены в тюремные камеры, и, наконец, вы должны создать специальное приключение к тринадцатому дню рождения моего сына. Его день рождения через девять месяцев, так что поторопитесь.\n\nМой сын в восторге от «подземелья», как он называет это, и мечтает исследовать его, представляя, что там полно чудес и приключений. Исследования — достойное увлечение для молодого будущего герцога, и он ловок с мечом — но он ещё не взрослый. Пожалуйста, создайте приключение, которое будет безопасным, но весёлым.\n\nВы также обещали построить новый флигель к замку, когда остальная работа будет завершена. Я ожидаю, что мой замок будет иметь приоритет над такими вещами, как выливание кислоты на породы! Я хочу, чтобы замок Элтибуль стал центром посёлка — возможно, не при моей жизни, но при жизни моего сына.\n\nЛорд Элтибуль\n\n<hr>\n\nЛорд Элтибуль,\n\nБудет сделано. Однако мои инженеры информируют меня, что специальное приключение для вашего сына не будет готово к его тринадцатому дню рождения. Но я это возмещу: я заказал комплект волшебных лат для мальчика, а также меч безупречной остроты. Они будут спрятаны за простейшими головоломками и опасностями. Если не будет дальнейших задержек, приключение должно быть готово к его пятнадцатому дню рождения.\n\nСожалею, что надземные работы мои рабочие не смогут выполнять до тех пор, пока не завершится вся подземная работа — это связано со сложными гномьими законами, касающимися исторических памятников. Но это <i>будет</i> завершено со временем. Возможно, не при вашей жизни, но при жизни вашего сына.\n\nИскренне,\n\nСиггунд Дефтвиспер"
" <h1>Property of James II, Private KEEP OUT!</h1>\n\n<hr>\n\nHiding in my special spot again. A new sage has arrived and is trying to treat Kat. But father is screaming at her, so I don't think the sage has anything that can help. Poor Kat is cold and pale and hasn't opened her eyes or spoken a word for two months. Mother is practically in mourning, but father says there's still hope.\n\nThe underground banging is louder than normal -- I think the dwarves are working near the surface.\n\n<hr>\n\nI spoke with a dwarf today! I heard him working under the hatch and surprised him. There haven't been many dwarves around for a while. \n\nHe said that all these rocks will be used to create a new building. He says they'll be making many additions to Eltibule Keep, and this hatch will eventually be a trap door in the new throne room! I can't wait to banish my enemies by pulling a rope and dropping the floor out from beneath them!\n\n<hr>\n\nThirteenth birthday. Father said he'd take me to Statehelm to meet the Council, but he is preoccupied with finding money. Kat is still alive thanks to Cualgar's magic, but he says if he stops his spell even for a moment, she will pass. Father has spent most of our fortune to find a cure, and now he is busy asking every friend and ally for more money. There won't be anything left soon, and none of it will matter. I have already said goodbye to Katarina. Beloved sister, may you rest in peace.\n\n<hr>\n\nFourteenth birthday. Katarina passed a month ago: the moment Cualgar gave up the spell, she turned to stone, just as he predicted! Father is furious, but Cualgar looks broken and exhausted. I don't blame him.\n\nFather believes the elves of Sedgewick Forest have curative magic that can help and he's mounting an expedition. The woods are a tranquil place, so Mother is going with him. That should leave me in charge, but Father says Gretchen is in charge! I don't believe he even remembers it's my birthday...\n\n<hr>\n\nMother and father are dead. They've been buried next to the keep. I don't understand what happened in Thentree. Why didn't they let me see the bodies? They weren't turned to stone, that much I know.\n\nA few dignitaries came to the funeral, but no lords came in person. No Council representatives came, either. It was just a handful of us in the rain, burying my family.\n\n<hr>\n\nFifteenth birthday. I have officially taken the title of Lord Eltibule. I am the lord of dust and weeds. Father spent everything. Gretchen and Palmatir remain in my service, and the old guards.\n\n<hr>\n\nSixteenth birthday. I received a letter from a dwarf named Siggund Deftwhisper. It is labeled \"Happy Fifteenth Birthday\"... they missed it by a year. Apparently my father had the dwarves create some sort of stupid \"adventure\" in the cellars. Is that what they've been doing all this time?! What a waste! I'm not a child anymore. I haven't been into the cellar in years.\n\nI just returned from Statehelm. I've convinced the Council to parcel some of my land out to homesteaders. They're building model homes now, and soon we shall see the arrival of many new humans. I will be duke of <i>something</i>, damn it!\n\n<hr>\n\nThe hammering underground stopped a few years ago, and I didn't really even notice. But the banging began again last night, and I can't tolerate it anymore! I slept through that hammering for my entire childhood, but I've heard enough! So I personally went into the cellar and demanded they stop.\n\nThe place is massive: a huge nest of tunnels and rooms. I found my mother's painting collection down there, too! They say this was all my father's doing. But that's absurd. And the strange children's game my father had them make is still down there. What a waste of time!\n\nThe dwarves say they have an agreement to finish the tunnels and then begin working on the keep itself. I will be old and gray by the time they start on the keep, though, and I have more pressing problems. So I ordered every dwarf to leave at once. They begged a week to finish and pack up. They had better be gone after that!\n\n<hr>\n\nEveryone knows I come here to be alone. I noticed Gretchen has cleaned up down here... Gretchen, if you're reading this, shame on you, woman!\n\n<hr>\n\nKat's ghost came to me last night! She said that the elves of Thentree have a way to save her! But something was wrong. The way she talked... the way she gestured... it was like the words she spoke didn't match the motions she made. She was trying to tell me something, but I don't understand. \n\nBut I know something is very wrong. So I'm taking our fastest horse to Thentree. Kenneth will accompany me. \n\nKat, I'll find you!": "<h1>Собственность Джеймса II, частная территория — ВХОД ЗАПРЕЩЁН!</h1>\n\n<hr>\n\nСнова прячусь в своём особом местечке. Прибыл новый мудрец и пытается лечить Кат. Но отец кричит на неё, так что я не думаю, что у мудреца есть что-то, что могло бы помочь. Бедная Кат холодна и бледна, она не открывала глаз и не произнесла ни слова уже два месяца. Мать фактически в трауре, но отец говорит, что ещё есть надежда.\n\nСтук из-под земли громче обычного — похоже, гномы работают близко к поверхности.\n\n<hr>\n\nСегодня я говорил с гномом! Я слышал, как он работал под люком и застал его. Последнее время гномов здесь было мало.\n\nОн сказал, что все эти камни пойдут на строительство нового здания. Он говорит, что будут делать множество пристроек к Крепости Элтибуль, и этот люк со временем станет потайным люком в новом тронном зале! Не могу дождаться, чтобы изгнать врагов, дернув за верёвку и выбросив пол из-под них!\n\n<hr>\n\nТринадцатый день рождения. Отец сказал, что отвезёт меня в Стейтхелм познакомиться с Советом, но он занят поиском денег. Кат всё ещё жива благодаря магии Куалгара, но он говорит, что если прервать заклинание даже на мгновение, она умрёт. Отец потратил большую часть нашего состояния на поиски лекарства, и теперь просит у каждого друга и союзника ещё денег. Скоро ничего не останется, и это не будет иметь значения. Я уже попрощался с Катериной. Любимая сестра, да упокоишься ты с миром.\n\n<hr>\n\nЧетырнадцатый день рождения. Катерина скончалась месяц назад: в тот момент, когда Куалгар прекратил заклинание, она обратилась в камень, как он и предсказал! Отец в ярости, но Куалгар выглядит разбитым и измотанным. Я не виню его.\n\nОтец полагает, что эльфы Седжвикского леса обладают целительной магией, которая может помочь, и он организует экспедицию. Лес — спокойное место, поэтому мать едет с ним. Это должно оставить меня у власти, но отец говорит, что главным будет Гретхен! Не верю, что он даже помнит, что сегодня мой день рождения...\n\n<hr>\n\nМать и отец мертвы. Их похоронили рядом с крепостью. Я не понимаю, что произошло в Тентри. Почему мне не разрешили увидеть тела? Они не обратились в камень, это я точно знаю.\n\nНа похороны пришли несколько сановников, но ни один лорд не пришёл лично. Представителей Совета тоже не было. Нас было всего несколько под дождём, мы хоронили мою семью.\n\n<hr>\n\nПятнадцатый день рождения. Я официально принял титул лорда Элтибуля. Я — лорд пыли и сорняков. Отец всё потратил. Гретхен и Палматир остаются на моей службе, как и старые стражи.\n\n<hr>\n\nШестнадцатый день рождения. Я получил письмо от гнома по имени Сиггунд Дефтвиспер. На конверте было написано «Счастливого пятнадцатого дня рождения»... они опоздали на год. По-видимому, мой отец велел гномам соорудить какую-то глупую «приключенческую» затею в подвалах. Неужели они всё это время этим и занимались?! Какая расточительность! Я уже не ребёнок. Я не был в подвале несколько лет.\n\nЯ только что вернулся из Стейтхелма. Я убедил Совет выделить часть моих земель поселенцам. Сейчас они строят образцовые дома, и вскоре мы увидим прибытие многих новых людей. Я буду герцогом <i>чего-то</i>, чёрт побери!\n\n<hr>\n\nСтук из-под земли прекратился несколько лет назад, и я даже не заметил. Но прошлой ночью стук начался снова, и я больше не могу это терпеть! Я высыпался под этот стук всё своё детство, но хватит! Поэтому я лично спустился в подвал и потребовал, чтобы они остановились.\n\nМесто огромное: громадное гнездо туннелей и комнат. Там я также нашёл коллекцию картин моей матери! Говорят, что всё это на совести моего отца. Но это абсурд. И странная детская игра, которую отец велел им сделать, всё ещё там. Какая трата времени!\n\nГномы говорят, что у них есть соглашение закончить туннели, а затем начать работу над самой крепостью. Но к тому времени, как они примутся за крепость, я состарюсь и поседею, а у меня есть более насущные проблемы. Поэтому я приказал всем гномам немедленно уйти. Они умоляли дать неделю, чтобы доделать и упаковать вещи. Им лучше исчезнуть после этого!\n\n<hr>\n\nВсе знают, что я прихожу сюда, чтобы побыть в одиночестве. Я заметил, что Гретхен прибралась здесь... Гретхен, если ты это читаешь, стыдно тебе, женщина!\n\n<hr>\n\nПризрак Кэт пришёл ко мне прошлой ночью! Она сказала, что у эльфов Тентри есть способ спасти её! Но что-то было не так. То, как она говорила... то, как она жестикулировала... казалось, что слова не соответствуют движениям. Она пыталась что-то мне сказать, но я не понимаю.\n\nНо я знаю, что что-то очень не в порядке. Поэтому я еду на нашей самой быстрой лошади в Тентри. Кеннет будет сопровождать меня.\n\nКат, я тебя найду!"
"Riding a horse is beyond the capabilities of most quadrupedal animals. But quadrupeds don't need a horse to go faster! <i>They can just go faster.</i> And you're living proof! You've developed the necessary muscle strength for long-distance travel, and you've learned the correct breathing techniques from an appropriate trainer. Now you can mount yourself!\n\nThere's now a horse-shaped button on the right side of your screen which brings up the Mount window. (If you already had a horse in your stable, you already had this button.) While in your animal form, bring up the Mount window and press the \"Mount Up\" button. This will place you in travel mode.\n\nWhile in travel mode, you behave as if you were your own mount. You can't fight in travel mode -- only travel! You'll notice an Anxiety meter: this fills up if you get too close to monsters, go underwater, or do other scary things. If you get too anxious, you'll automatically exit travel mode so that you can fight.\n\nYou also get the benefits from mount-related equipment such as saddles and reins. Equipping these items can affect your speed and behavior in travel mode. You can even equip a saddlebag and access the bag's contents while travelling. (Best not to think about the logistics of this maneuver.)\n\nYou are your own mount, but it goes beyond that: you're also your own rider! This means that you can earn Riding XP just by traveling in this mode. Doing so will unlock special mount-related abilities, which you can use on yourself while traveling.\n\nNote that you cannot let other people ride you. [Developer's note: at least not yet!] Travel mode just lets you \"ride yourself\".": "Езда на лошади недоступна большинству четвероногих животных. Но четвероногим не нужна лошадь, чтобы двигаться быстрее! <i>Они просто могут идти быстрее.</i> И вы — живое тому доказательство! Вы развили необходимую силу мышц для длительных путешествий и освоили правильные техники дыхания у подходящего тренера. Теперь вы можете оседлать себя!\n\nТеперь на правой стороне экрана появилась кнопка в форме лошади, которая открывает окно верховой езды. (Если у вас уже была лошадь в конюшне, эта кнопка у вас уже была.) Находясь в животной форме, откройте окно верховой езды и нажмите кнопку «Сесть верхом». Это переведёт вас в режим передвижения.\n\nВ режиме передвижения вы ведёте себя как своё собственное средство передвижения. В режиме передвижения вы не можете сражаться — только перемещаться! Вы заметите индикатор тревоги: он заполняется, если вы подходите слишком близко к монстрам, погружаетесь под воду или совершаете другие пугающие действия. Если уровень тревоги станет слишком высоким, вы автоматически выйдете из режима передвижения, чтобы иметь возможность сражаться.\n\nВы также получаете преимущества от снаряжения, связанного с ездовыми животными, такого как седла и вожжи. Надев такие предметы, вы можете повлиять на свою скорость и поведение в режиме передвижения. Вы даже можете надеть седельную сумку и получить доступ к её содержимому во время путешествия. (Лучше не задумываться о логистике этого манёвра.)\n\nВы — своё собственное средство передвижения, но это не всё: вы также и всадник! Это означает, что вы можете получать XP за верховую езду просто перемещаясь в этом режиме. Это откроет специальные способности, связанные с ездой, которые вы сможете использовать на себе во время путешествия.\n\nОбратите внимание, что вы не можете позволить другим людям ездить на вас. [Примечание разработчика: по крайней мере пока что!] Режим передвижения просто позволяет вам «ездить на себе»."
" I admit I wasn't sure what I would find when I arrived. It's been only a handful of years since my last adventure here, but I'd feared Selleiech had forgotten her promise. The arrrangement is crude but I have what I need. I should only be here a few days.\n\n---\n\nSelleiech's hut is gone from the beach, washed away as if it never existed. This is impressive only in that the hut was made of stone and must have weighed several tons.\n\nI wandered down the beach, and on the southwest corner of the island I met a ranalon that calls itself Puffy Ben, for reasons I have not learned. To my surprise, Puffy Ben recognized me and agreed to help me in Selleiech's absence. I have explained my needs and he will have preparations within three days.\n\n---\n\nI leave this place. I'm leaving behind a communication crystal for you.\n\nI know you're reading this. Go ahead and activate the crystal. I want to talk. Yes, to you!": "Признаюсь, я не был уверен, что найду, когда прибыл. Прошло всего несколько лет с тех пор, как я в последний раз здесь был, но я боялся, что Селлейх забыла своё обещание. Устройство примитивно, но у меня есть всё, что нужно. Я пробуду здесь всего несколько дней.\\n\\n---\\n\\nХижина Селлейх исчезла с пляжа, смыта так, будто её никогда и не было. Это впечатляет тем более, что хижина была сделана из камня и, должно быть, весила несколько тонн.\\n\\nЯ прошёлся по пляжу, и на юго‑западном углу острова встретил раналона, который называет себя Пуффи Бен, по причинам, которые мне неизвестны. К моему удивлению, Пуффи Бен узнал меня и согласился помочь мне в отсутствии Селлейх. Я объяснил ему свои потребности, и он подготовит всё в течение трёх дней.\\n\\n---\\n\\nЯ покидаю это место. Я оставляю для тебя кристалл связи.\\n\\nЯ знаю, что ты это читаешь. Давай, активируй кристалл. Я хочу поговорить. Да, с тобой!"
"<h1>Advanced Animal Handling: Mounts</h1> Mounts are similar to other pets, like rats, bees and cats. They share a lot of the same traits, though their effects are drastically different because mounts serve a different purpose - they aren't meant for combat! See below for a list of traits used by mounts, and their specific effects.\n\n<h1>Mount Traits</h1>\n\n<b>Temperament</b> measures how \"hot\" a mount is. Mounts are typically referred to as hot-blooded or cold-blooded, and this refers to their Temperament. A lower Temperament (cold-blooded) means the mount is calmer and more collected, and thus has a higher max anxiety. Hot-blooded mounts, on the other hand, have high Temperament, and are much faster as a result!\n\n<b>Toughness</b> is a mount's resilience in the face of danger. Higher Toughness increases a mount's max anxiety, and decreases the amount of anxiety \"damage\" they take from various sources, such as being spooked by nearby enemies.\n\n<b>Ruggedness</b> measures how good of a pack animal a mount is, increasing its saddlebag inventory space. Rugged mounts are not easily phased, either, and the rate at which their anxiety recovers increases as their Ruggedness does!\n\n<b>Enthusiasm</b> represents a mount's eagerness - higher enthusiasm increases a mount's overall speed and acceleration.\n\n<b>Friendliness</b> is a good measure of how easy a mount is to handle. High friendliness increases a mount's turn speed, but what's even more important is that it also decreases ability cooldowns and costs while using that mount!\n\n<b>Intelligence</b> is a double-edged sword, similar to Temperament. Intelligent horses are quick learners, which leads to decreased ability cooldowns. They're also more easily able to navigate treacherous terrain, such as water. However, that intelligence comes at a cost, as Intelligent mounts take longer to regenerate any lost anxiety - they're not so easy to forget about nearby threats.\n\n<b>Virility</b> is primarily a breeding trait, but it also affects mounts positively out on the field. High Virility leads to increased acceleration and higher jump distances!": "<h1>Продвинутое обращение с животными: Ездовые животные</h1> Ездовые животные похожи на других питомцев, таких как крысы, пчёлы и кошки. У них много общих черт, однако их эффекты кардинально отличаются, потому что ездовые животные служат другой цели — они не предназначены для боя! Ниже приведён список черт ездовых животных и их конкретных эффектов.\n\n<h1>Черты ездовых животных</h1>\n\n<b>Темперамент</b> показывает, насколько «горячим» является ездовое животное. Ездовых обычно называют горячекровными или холоднокровными, и это относится к их темпераменту. Низкий темперамент (холоднокровный) означает, что животное спокойнее и собраннее, и поэтому у него выше максимум тревоги. Горячекровные животные, напротив, имеют высокий темперамент и вследствие этого гораздо быстрее!\n\n<b>Стойкость</b> — это устойчивость животного перед лицом опасности. Повышенная стойкость увеличивает максимальную тревогу животного и уменьшает количество «урона» к тревоге от различных источников, таких как испуг из‑за близлежащих врагов.\n\n<b>Прочность</b> показывает, насколько хорошо животное подходит в качестве вьючного: она увеличивает вместимость седельных сумок. Прочные животные также не легко подавляются, и скорость восстановления их тревоги растёт с ростом прочности!\n\n<b>Энтузиазм</b> отражает рвение животного — более высокий энтузиазм увеличивает общую скорость и ускорение.\n\n<b>Дружелюбие</b> показывает, насколько легко с животным обращаться. Высокое дружелюбие увеличивает скорость поворота животного, но что ещё более важно — оно также уменьшает перезарядки и затраты умений при использовании этого ездового животного!\n\n<b>Интеллект</b> — это палка о двух концах, подобно темпераменту. Умные животные быстро учатся, что приводит к уменьшению перезарядок умений. Они также легче преодолевают опасную местность, например воду. Однако этот интеллект имеет и обратную сторону: умные животные дольше восстанавливают потерянную тревогу — им сложнее забыть о близких угрозах.\n\n<b>Плодовитость</b> в первую очередь является характеристикой разведения, но она также положительно влияет на ездовых животных в полевых условиях. Высокая плодовитость повышает ускорение и увеличивает дальность прыжка!"
"<h1>Horse Breeds: A Primer</h1> There are currently 10 known breeds of horses on Alharth, each with their own quirks and distinct appearances. While each breed excels at particular physical attributes, the world's leading geneticists speculate that any breed can be used for any purpose if bred correctly.\n\n<h1>The Breeds</h1>\n\n<b>Standardbred</b>: Hot-Blooded Riding horse. Standardbreds are from the Serbule region of Alharth, and are known for their solid coats and manes. They are quick with high Temperament, making them sometimes difficult to control. They are some of the most common horses.\n\n<b>Kurbone</b>: Cold-Blooded Draught horse. Hailing from the coldest reaches of the Kur Mountains, Kurbones are an exceptionally hardy horse that excels at carrying heavy loads unwaveringly across the land. They are known to have solid coats, though sometimes are patterned as well, and their lower legs always feature feathering.\n\n<b>Ilmarian</b>: Hot-Blooded Endurance-Riding horse. These pale horses are as quick as they are beautiful. They hail from the desert of Ilmari, where denizens use them to traverse the wide empty terrain. Their coats are most often gray to white, with manes to match.\n\n<b>Plateau Pony</b>: Cold-Blooded Pack-Riding horse. Small of stature but big of heart, these are some of the friendliest horses on Alharth. They are native to the Gazluk Plateau, where their small size helps them to traverse the rocky terrain with ease. They are often seen with patterned coats, but can be solid as well.\n\n<b>Satincoat</b>: Hot-Blooded Riding horse. It's unclear whether this horse originated on the Ranalon homeworld or in Sun Vale, but it's a mighty fine horse regardless. It is known for the distinctive sheen of its coat, which is always completely solid.\n\n<b>Statehelm</b>: Warm-Blooded Light-Draught horse. A jack of all trades, master of none, this horse is widely regarded and used across the land, and many speculate that it originates in Statehelm, hence the name. Its coat is sheer black, with markings of any kind being rare. Like the Kurbone, their legs always sport feathering.\n\n<b>Blanketed</b>: Warm-Blooded Riding horse. An even-keeled horse fit for riding. It is known for the distinct \"blanket\" coat pattern that drapes over its hind quarters.\n\n<b>Leopard</b>: Warm-Blooded Light-Draught horse. The rarer version of its blanketed cousin, this horse is covered head-to-toe in leopard-like spots.\n\n<b>Paint</b>: Warm-Blooded Endurance-Riding horse. A well-rounded horse that's great for beginners. This horse, known for its large white-spotted coat pattern and frequent face and leg markings, hails from the Eltibule region originally. Now, it can be found all across the land, as it's one of the most common horses.\n\n<b>???</b>: Scholars have reported a mysterious 10th breed of horse, but the best geneticists in the land are currently incapable of identifying it.": "<h1>Породы лошадей: Введение</h1> В настоящее время на Алхарте известно 10 пород лошадей, каждая со своими причудами и отличительной внешностью. Хотя каждая порода преуспевает в определённых физических качествах, ведущие генетики мира предполагают, что при правильной селекции любую породу можно приспособить для любой цели.\n\n<h1>Породы</h1>\n\n<b>Стандартбред</b>: Горячекровная верховая лошадь. Стандартбреды происходят из региона Сербуль на Алхарте и известны однотонной мастью и гривами. Они быстры и обладают высоким Темпераментом, из‑за чего их порой трудно контролировать. Это одни из самых распространённых лошадей.\n\n<b>Курбон</b>: Холоднокровная тягловая лошадь. Родом из самых холодных районов Курских гор, курбоны — исключительно выносливые лошади, которые превосходно справляются с перевозкой тяжёлых грузов по любой местности. Обычно они однотонной масти, хотя иногда встречаются и с рисунком; их нижние части ног всегда украшены перьями.\n\n<b>Илмарий</b>: Горячекровная выносливая верховая лошадь. Эти светлые лошади так же быстры, как и красивы. Они родом из пустыни Илмари, где местные жители используют их для перемещения по обширной пустой местности. Их масть чаще всего от серой до белой, а грива соответствует цвету.\n\n<b>Плато-пони</b>: Холоднокровная вьючная верховая лошадь. Невысокие по росту, но с большим сердцем, эти лошади — одни из самых дружелюбных на Алхарте. Они родом с плато Газлук, где их небольшой размер помогает легко преодолевать скалистый рельеф. Их часто можно увидеть с рисунчатой мастью, но встречаются и однотонные экзэмпляры.\n\n<b>Сатинкоут</b>: Горячекровная верховая лошадь. Неясно, зародилась ли эта порода на родном мире Раналона или в Сан-Вейле, но в любом случае это отличная лошадь. Она известна характерным блеском шерсти, причём масть всегда полностью однотонная.\n\n<b>Стейтхелм</b>: Теплокровная лёгкая тягловая лошадь. Универсальная, но не специализированная, эта лошадь широко известна и используется по всей земле, и многие предполагают, что она происходит из Стейтхелма, отсюда и название. Её масть — чисто чёрная, отметины встречаются редко. Как и у курбона, их ноги всегда украшены перьями.\n\n<b>Блэнкетед</b>: Теплокровная верховая лошадь. Уравновешенная лошадь, подходящая для езды. Она известна характерным рисунком масти «покрывало», который лежит на крупе.\n\n<b>Леопард</b>: Теплокровная лёгкая тягловая лошадь. Более редкая версия своего родственника Блэнкетеда, эта лошадь покрыта пятнами, напоминающими леопардовые, с головы до копыт.\n\n<b>Пэйнт</b>: Теплокровная выносливая верховая лошадь. Универсальная порода, отлично подходящая для новичков. Эта лошадь, известная своими крупными белыми пятнами и частыми отметинами на голове и ногах, изначально происходит из региона Элтибул. Теперь её можно встретить по всей земле, так как это одна из самых распространённых пород.\n\n<b>???</b>: Учёные сообщили о загадочной десятой породе лошадей, но лучшие генетики страны в настоящее время не в состоянии её идентифицировать."
"Since the Council went to such extreme effort to create the ritual area in the graveyard, it would be uncouth <i>not</i> to take advantage of it, I say.\n\nThe ritual area consists of a statue surrounded on three sides by 16 coffins, each containing a \"hero of Statehelm\". I cannot tell who these people were, or if they were even human, but their corpses were certainly subjected to immoral necromantic magics, trapping their souls and magnifying the power within. The statue itself was made with materials from Acur. \n\nStep 0: Wait until midight.\n\nStep 1: Light tealights on all 16 coffins. (Technically only a few are actually needed, but it's tricky to figure out which those are; safer to light them all.)\n\nStep 2: Light a Necromantic Summoning Candle. Inhale its fumes.\n\nStep 3: In front of the statue, perform the standard prayer to create Necromancy Dust.\n\nIf correctly performed, it should pull necromantic energy from the area and form it into something substantive.": "Поскольку Совет приложил такие крайние усилия, чтобы создать ритуальную зону на кладбище, было бы невежливо <i>не</i> воспользоваться ею, смею заметить.\n\nРитуальная зона состоит из статуи, окружённой с трёх сторон 16 гробами, в каждом из которых содержится «герой Стейтхелма». Я не могу сказать, кем были эти люди, или были ли они вообще людьми, но их трупы явно подверглись аморальным некромантским магиям, заключившим их души и усилившим заключённую в них силу. Сама статуя была сделана из материалов из Акура.\n\nШаг 0: Подождите до полуночи.\n\nШаг 1: Зажгите чайные свечи на всех 16 гробах. (Технически требуется лишь несколько, но трудно понять, какие именно; безопаснее зажечь все.)\n\nШаг 2: Зажгите Некромантическую призывную свечу. Вдохните её пары.\n\nШаг 3: Перед статуей произнесите стандартную молитву, чтобы создать Пыль Некромантии.\n\nЕсли всё выполнено правильно, это должно вытянуть некромантскую энергию из этой области и сформировать её в нечто осязаемое."
"<h1>The Gods: Council Quick-Reference</h1>\n\n<b>by Ilvadare Irasce</b>\n\nThis guide will help citizens quickly acertain the domains, threat, and importance of any gods that they might hear about -- or even meet in person. Remember: gods are capricious forces of nature. Some gods have been friendly toward humanity in recent years, but nothing is permanent. Taking advantage of the kindness of \"friendly\" gods is a personal decision not to be made lightly.\n\nNOTE: this symbol <color=red>*NO*</color> indicates that it is illegal to worship or contact that god, and their priests should be considered extremely dangerous.\n\n<b>Akhisa</b> God of Patience and Cunning. Class 2. The god of spiders. Traditionally forbidden in human lands, we have recently loosened those restrictions in response to certain favors Akhisa has done for humanity. Nevertheless, this is the god of <i>cunning</i>, so think twice before making deals with Akhisa's priests.\n\n<b>Arisetsu</b> God of Hope and Warmth. Class 1. Worshipped by elves as the mother of their modern society, but beloved in many civilizations -- including humanity. Her priests provide a valuable service to the wounded.\n\n<b>Au-Shin</b> God of Animals and Insects. Class 2. Brother to Ri-Shin. Not particularly important on this continent but is much more active elsewhere. His animal priests are safe to engage with... so long as you're kind to animals, of course.\n\n<b>Bogdelle</b> God of Crafting and Craftsmen. Class 3. Dwarven god. Her place amongst dwarves is complex: she loves and protects craftsmen and artisans of all types, which dwarves like. But her priests also pass on crafting techniques to non-dwarves, which dwarves do not like. But her priests are generally safe and trustworthy.\n\n<b>Dale Renthian</b> God of Creativity and Invention. Class 3. A human god. Dale Renthian is in good standing with the Council and is comparatively safe for mortals to approach.\n\n<b>Dreva</b> God of Balance. Class 1. Claims to be neutral in matters of mortal affairs. Responsible for the \"Druids\", who help enforce his will. Their actions are generally beneficial to humanity, but treat them with caution. If the Druids were to decide your actions were \"out of balance with nature\", it could prove fatal.\n\n<b>Enoyos</b> God of Oceans. Class 1. Enoyos has vowed to flood most of the surface world so that his favored race of frog-people have more space to live. This makes Enoyos a dangerous enemy of humanity. However, he is a capricious god, and we've learned that prohibiting sailors from making offerings to Enoyos causes incidents at sea. Sailors are thus permitted to make offerings, but remember his eventual goals.\n\n<b>Errana</b> God of Harvest and Reproduction. Class 1. An elven god, but loved by many peoples including humans. Unfortunately her priests spread the plague of prostitution to our fair human cities. This is generally tolerated because they are also master crop-forecasters, but treat with care. I beg you not to get too close to a priest of Errana. They will break your fragile human heart. I speak from experience.\n\n<b>Fenna</b> God of Beauty, Dusk, and Poetry. Class 3. Human god. Possibly the youngest god to currently exist. Technically the \"daughter\" of Ilth Hale, but so far she has not evidenced any ill will toward humans. She is currently in good standing with the Council and is welcome in our cities.\n\n<b>Garakh</b> God of Commerce and Trade. Class 1. Worshipped by goblins, but technically a neutral god. Not as active on this continent as on others, but Garakh is as trustworthy as gods get. Priests of Garakh always fulfill their contracts or die trying. Their delivery caravans are the backbone of intra-species trade with the gob-lands.\n\n<b>Gulagra</b> <color=red>*NO*</color> God of Anarchy. Class 2. Those who seek favor from Gulagra go mad. Not in an abstract or indirect way -- they very literally go mad. Please don't be a moron. Don't believe anything Gulagra says.\n\n<b>Harukita</b> <color=red>*NO*</color> God of Hate. Class 2. The leader of the so-called \"Chalice Gods\" responsible for undead monsters. Stay far away.\n\n<b>Ilth Hale</b> <color=red>*NO*</color> God of Sorrow and Loss. Class 3. Once the champion of humanity, but now despises humans. Her blood priests are very dangerous.\n\n<b>Imatia</b> God of Knowledge and Learning. Class 1. The leader of the Crone gods, Imatia is the god of books. She is not especially active here, but her monks can sometimes be spotted buying rare books to bring back to her ivory book-towers. Generally trustworthy.\n\n<b>Irhetsu</b> God of Wind, Song, and Story. Class 2. A very old god that has altered the nature of our reality slowly over many years. Friendly but inscrutible. Be wary.\n\n<b>Janice Alberith</b> God of Scientific Research. Class 3. A young human god that is slowly gaining prestige and followers. However, other gods are offended by the notion that their actions should be constrained by scientific principles. She has many enemies among older gods. It is wise to seek her aid, but not wise to stick around too closely.\n\n<b>Kajich</b> <color=red>*NO*</color> God of Fear and Intimidation. Class 2. A cruel god who should never be interacted with, let alone trusted. Brother to Harukita and Tuvillus. In the past Kajich has led the armies of the undead to ravage mortal cities. His behavior is cyclical and we expect him to rise in prominence again soon.\n\n<b>Kirad</b> God of Hearth and home. Class 1. Dwarven god. Our continent of Alharth (\"All-Hearth\") is named after Kirad's proclamation that all of this land is his Hearth, and thus under his protection. Kirad has recently been less active here, but his dwarven priests provide valuable home protection services and are well-tolerated in human society.\n\n<b>Laeth</b> God of Time and Space. Class 1. Apparently an elven god. Little is known about Laeth. She doesn't seem to be made of quite the same stuff as other gods. Laeth is not to be worshipped so much as obeyed: if she feels the need to intervene in mortal affairs, it's imperative that we follow her instructions and get her to leave as quickly as possible.\n\n<b>Lo-Maj</b> God of Power and Might. Class 2. Little is known about this god, who hasn't been seen in this country in decades. His traditional avatar is of an extinct species of lizardmen wielding a hammer. I don't recall ever meeting a priest or follower of Lo-Maj.\n\n<b>Melkar</b> God of Individualism, Self-Sufficiency, and Hunting for Sustenance. Class 3. An orc god. Patron of many an outdoorsman that fancies themselves a \"loner\". Melkar dislikes cities and avoids society in general. But he is generous to his adherents and is considered trustworthy.\n\n<b>Mirraverre</b> God of Sleep and Dreams. Class 2. An elven god. Oversees the dream realm, protecting it from intrusion. Rarely seen, but typically considered a neutral god. Some sages say her palace in the dream realm is a safe meeting place for gods.\n\n<b>Norala</b> <color=red>*NO*</color> God of Hunting and Animality. Class 2. An orc god. Responsible for the curse of lycanthropy. She is the god of hunting for sport rather than survival. She acts on behalf of Tast, often directly against humankind. Stay away.\n\n<b>Ormorek</b> God of Self Doubt and Bitterness. Class 3. Dwarven god. Best known for drinking extremely bitter beer and complaining. Relatively safe to interact with, should you meet him in a dwarven city.\n\n<b>Paullus</b> God of Revelry and Alcohol. Class 3. Claims to have invented alcohol but this is very much disputed. A benign human-appearing god who is in good standing with the Council.\n\n<b>Randolph Alberith</b> God of Travel and Journeys. Class 3. A human god, most often found by those on epic treks. Safe to interact with, but beware -- many a vagabond along the road pretends to be a priest of Randolph. Keep your guard up and demand evidence before trusting.\n\n<b>Remga</b> <color=red>*NO*</color> God of Piracy and Rape. Class 1. The leader of the goblin gods and patron of all pirates. In the past we allowed sailors to make offerings to Remga to ensure safe travels, but new laws disallow this. If you must make offerings, choose Enoyos instead. Enoyos is no friend of humanity but Remga has proven even more despicable and untrustworthy.\n\n<b>Ri-Shin</b> God of Plants and Trees. Class 2. Ri-Shin's priests oversee all lumberyards to ensure proper replanting. In exchange, trees grow bountifully. Ri-Shin can react with hostility to those who harm forests. So don't do that. <i>It's against the law to anger Ri-Shin.</i>\n\n<b>Saledar</b> God of Cooperative Society. Class 2. A goblin god. Goblin healing-priests worship Saledar instead of the more common worship of Arisetsu. Saledar's adherents claim he is the god of Empathy, but Saledar permits slavery, so I disagree. His followers may or may not be safe to interact with -- it depends on the individual. Be wary.\n\n<b>Strekios</b> God of Self-Improvement and Competition. Class 3. Strekios is oddly absent from human culture but is well known in the Crone Lands. Known as the \"Cruel Taskmaster.\" Be wary.\n\n<b>Tast</b> <color=red>*NO*</color> God of War and Militaries. Class 1. Tast favors the orc race and often grants orcs boons when they assault human civilizations. Stay away from Tast lest you inadvertently become a weapon against humanity yourself.\n\n<b>Talerra</b> <color=red>*NO*</color> God of Hopelessness, Depression, and Knowing the Truth. Class 3. Best known for the tantalizing bargain she offers: she can answer your burning questions in exchange for your hope. But hope is essential for survival! You must accept the fact that it's sometimes better not to know.\n\n<b>Tuvillus</b> <color=red>*NO*</color> God of Greed and Jealousy. Class 3. Brother to Kajich and Harukita and said to be the co-creator of vampirism (alongside Ilth Hale).\n\n<b>Umrad</b> God of Minerals, Metals, and Mining. Class 3. Dwarven god. Can sometimes be found visiting dwarven cities, and is reasonably safe to approach, but is highly suspicious of non-dwarves.\n\n<b>Vol</b> God of Death and Renewal. Class 1. Claims to be neutral in matters of mortal affairs, but seems to favor dwarvenkind on occasion. Despises the undead. It's said that all mortals eventually meet Vol when he carries their soul back to the Soul Sea.\n\n<b>Zare</b> God of Secrets. Class ?. We barely know of Zare's existence. We have no understanding of Zare's role in our world. Occasionally Zare's emissaries can be found swapping secrets, but there is no reliable way to prove they are who they say. Assume that most so-called \"Priests of Zare\" are lying.\n\n<b>Zhia Lian</b> <color=red>*NO*</color> God of Whimsy and Unpredictability. Class 3. While less problematic than the other \"Chalice Gods\", Zhia is innately unpredictable. Her avatar is human and she occasionally has humanity's best interests, but chaos follows her every move, and chaos is bad for society. Keep her out of our cities!\n\n <h1>Appendix A: Famous Dead Gods</h1> Sages can list well over 100 deceased gods. These are the most commonly referenced in news and literature:\n\n<b>Cae-a-Lee<b>, God of Elves. Was extremely powerful and influential. Deceased for approx. 20,000 years.\n\n<b>Elshana</b>, God of Ingenuity. Elven god. Deceased for approx. 17,000 years. Passed on her domains and memories to Dale Renthian.\n\n<b>Freta</b>, God of Justice and Punishment. Lizardman god, then dwarf god, and finally crone god. Deceased approx. 400 years.\n\n<b>Hargur</b>, God of Earthquakes, Landslides, and Tsunamis. Orc god. Recently deceased.\n\n<b>Romast</b>, God of Martial Arts. Lizardman god. Deceased for approx. 3,500 years.\n\n<b>Urtigal</b>, God of Revulsion and Disgust. Brother of Harukita, Kajich, and Tuvillus. Recently deceased.\n\n<b>Volzek</b>, God of Death and Undeath. Hypothesized to be the \"proto-form\" of the gods Vol and Zek, before they separated into two gods. Deceased approx. 40,000 years.\n\n<b>Zek</b>, God of Undeath. Brother of Vol. Deceased for approx. 17,000 years. His power over undeath was recovered by the so-called \"Chalice\" gods led by Harukita. \n\n<b>Zura-Fin</b>, God of Fungus. Sister of Ri-Shin and Au-Shin. Recently deceased.\n\n <h1>Appendix B: Notes on God Classes</h1> God classifications are hotly debated amongst sages, and our opinions change often. No doubt many of the god classes used above are wrong. This is especially true of gods who aren't active in the Council Lands, because we have less experience with them.\n\n- Class 1 gods can alter reality on a whim. They can create new races of creatures, invent new types of magic, create or move entire land masses, and much more. An elaborate system of truces and agreements between themselves prevents too much obvious intervention day to day, but we cannot really even guess at what they're doing behind the scenes.\n\n- Class 2 gods are weaker, but can still spread their influence far and wide. These gods are often the benefactor of a chosen race or protector of important aspects of the world.\n\n- Class 3 gods are the weakest full gods, and although incredibly powerful by mortal standards, they usually need to localize their actions through their avatars, so their impact on the world is smaller. Most Class 3 gods only have one or two active avatars at a time, whereas Class 2 gods can have a score or more, and Class 1 gods can have countless avatars (when they bother with avatars at all).\n\n- There are also Class 4 and Class 5 nature spirits, but these are not gods. What makes a god a god, you ask? Here's my very practical rule of thumb: if a Class 1 god has tried to kill them and they survived, they must be at least Class 3. If they died, they must have been 4 or 5. Conveniently, Vol tries to kill every new god that appears, so we know that all the gods listed here can survive Vol's wrath, at least for a short time. (Of course, should Vol attack alongside his allies, all bets are off. Gods have their own complex politics that are best avoided by mortals.)": "<h1>Боги: Краткий справочник Совета</h1>\n\n<b>от Илвадаре Ирассе</b>\n\nЭто руководство поможет гражданам быстро выяснить сферы влияния, опасность и значимость любых богов, о которых они могут услышать — или даже встретить лично. Помните: боги — капризные силы природы. Некоторые боги в последние годы были благосклонны к человечеству, но ничто не вечно. Воспользоваться добротой «дружелюбных» богов — личное решение, которое не следует принимать легкомысленно.\n\nПРИМЕЧАНИЕ: этот символ <color=red>*НЕТ*</color> означает, что поклоняться или контактировать с этим богом незаконно, а их жрецов следует считать крайне опасными.\n\n<b>Ахиса</b> Богиня Терпения и Хитрости. Класс 2. Богиня пауков. Традиционно запрещена на землях людей, но недавно эти ограничения были ослаблены в ответ на определённые услуги, которые Ахиса оказала человечеству. Тем не менее это богиня <i>хитрости</i>, так что подумайте дважды, прежде чем заключать сделки с жрецами Ахисы.\n\n<b>Арисэцу</b> Богиня Надежды и Тепла. Класс 1. Её почитают эльфы как матерь их современной цивилизации, но она любима во многих народах — включая людей. Её жрецы оказывают важную помощь раненным.\n\n<b>Ау-Шин</b> Бог Животных и Насекомых. Класс 2. Брат Ри-Шина. На этом континенте не особенно важен, но гораздо активнее в других местах. Его животные жрецы безопасны для общения… при условии, что вы добры к животным, разумеется.\n\n<b>Богдель</b> Богиня Ремёсел и Ремесленников. Класс 3. Дварфийская богиня. Её положение среди дварфов сложное: она любит и защищает мастеров и ремесленников всех мастей, что дварфам нравится. Но её жрецы также передают ремесленные приёмы не‑дварфам, и это дварфам не по вкусу. В целом её жрецы безопасны и заслуживают доверия.\n\n<b>Дейл Рентхиан</b> Бог Творчества и Изобретательства. Класс 3. Человеческий бог. Дейл Рентхиан в хороших отношениях с Советом и сравнительно безопасен для смертных.\n\n<b>Древа</b> Бог Равновесия. Класс 1. Утверждает, что нейтрален в делах смертных. Отвечает за «Друидов», которые помогают исполнять его волю. Их действия обычно полезны человечеству, но относитесь к ним с осторожностью. Если Друиды сочтут ваши поступки «вне баланса с природой», это может оказаться смертельно.\n\n<b>Энойос</b> Бог Океанов. Класс 1. Энойос поклялся затопить большую часть поверхности мира, чтобы его избранная раса лягушкообразных получила больше места для жизни. Это делает Энойоса опасным врагом человечества. Однако он капризен, и мы заметили, что запрет морякам приносить подношения Энойосу приводит к инцидентам в море. Морякам поэтому разрешено делать подношения, но помните о его конечных целях.\n\n<b>Эррана</b> Богиня Урожая и Размножения. Класс 1. Эльфийская богиня, но любимая многими народами, включая людей. К сожалению, её жрецы распространяют в наши человеческие города порчу проституции. Это в целом терпят, потому что они также мастера прогнозирования урожаев, но относитесь к ним с осторожностью. Умоляю вас не сближаться слишком сильно с жрецом Эрраны — они разобьют ваше хрупкое человеческое сердце. Говорю по опыту.\n\n<b>Фенна</b> Богиня Красоты, Сумерек и Поэзии. Класс 3. Человеческая богиня. Возможно самая молодая из ныне существующих богинь. Технически «дочь» Илта Хейла, но пока она не проявляла враждебности к людям. В настоящее время она в ладах с Советом и желанна в наших городах.\n\n<b>Гарах</b> Бог Торговли и Коммерции. Класс 1. Почитается гоблинами, но формально нейтрален. На этом континенте менее активен, чем в других местах, но Гарах так надёжен, как только бывают боги. Жрецы Гараха всегда выполняют свои контракты или умирают, пытаясь. Их караваны доставки — основа внутривидовой торговли с гоблинскими землями.\n\n<b>Гулагра</b> <color=red>*НЕТ*</color> Бог Анархии. Класс 2. Те, кто ищут благосклонности Гулагры, сходят с ума — не в абстрактном смысле, а буквально. Пожалуйста, не будьте идиотами. Не верьте ничему, что говорит Гулагра.\n\n<b>Харукита</b> <color=red>*НЕТ*</color> Бог Ненависти. Класс 2. Лидер так называемых «Богов Кубка», ответственных за нежить. Держитесь подальше.\n\n<b>Илт Хейл</b> <color=red>*НЕТ*</color> Богиня Скорби и Утраты. Класс 3. Когда‑то защитница человечества, теперь презирает людей. Её кровавые жрецы чрезвычайно опасны.\n\n<b>Иматия</b> Богиня Знаний и Обучения. Класс 1. Лидер богов Старух; Иматия — богиня книг. Она не особенно активна здесь, но её монахи иногда замечаются покупающими редкие книги для отправки в её башни из слоновой кости. В целом заслуживает доверия.\n\n<b>Ирхэцу</b> Бог Ветра, Песни и Рассказа. Класс 2. Очень древний бог, который медленно изменял природу нашей реальности многие годы. Дружелюбен, но непостижим. Будьте настороже.\n\n<b>Джанис Альберит</b> Богиня Научных Исследований. Класс 3. Молодая человеческая богиня, постепенно набирающая престиж и последователей. Однако другие боги возмущены идеей о том, что их действия должны подчиняться научным принципам. У неё много врагов среди старых богов. Обращаться к ней разумно, но неразумно находиться рядом слишком близко.\n\n<b>Каджич</b> <color=red>*НЕТ*</color> Бог Страха и Запугивания. Класс 2. Жестокий бог, с которым никогда не следует вступать в контакт, не то что доверять. Брат Харукиты и Тувиллуса. В прошлом Каджич возглавлял армии нежити, опустошавшие смертные города. Его поведение циклично, и мы ожидаем, что вскоре он вновь проявит себя.\n\n<b>Кирад</b> Бог Очага и Дома. Класс 1. Дварфийский бог. Наш континент Алхарт («Все‑Очаг») назван по провозглашению Кирада о том, что вся эта земля — его Очаг и потому под его защитой. Кирад в последнее время менее активен здесь, но его дварфийские жрецы предоставляют ценные услуги по защите дома и хорошо воспринимаются в человеческом обществе.\n\n<b>Лаэт</b> Богиня Времени и Пространства. Класс 1. По‑видимому эльфийская богиня. Мало что известно о Лаэт. Похоже, она не из того же «теста», что и другие боги. Лаэт не столько объект поклонения, сколько требует повиновения: если она решит вмешаться в дела смертных, крайне важно следовать её указаниям и как можно скорее заставить её уйти.\n\n<b>Ло‑Маж</b> Бог Силы и Мощи. Класс 2. О малоизвестном боге, который не появлялся в этой стране десятилетиями. Его традиционный аватар — вымерший вид ящеролюдей с молотом. Не припомню, чтобы встречал жреца или последователя Ло‑Мажа.\n\n<b>Мелкар</b> Бог Индивидуализма, Самодостаточности и Охоты ради Пропитания. Класс 3. Оркский бог. Покровитель многих любителей загородной жизни, считающих себя «одиночками». Мелкар не любит города и в целом избегает общества. Но он щедр к своим приверженцам и считается надёжным.\n\n<b>Мирраверр</b> Богиня Сна и Сновидений. Класс 2. Эльфийская богиня. Надзирает за царством снов, защищая его от вторжений. Редко появляется, но обычно считается нейтральной богиней. Некоторые мудрецы говорят, что её дворец в царстве снов — безопасное место для встреч богов.\n\n<b>Норала</b> <color=red>*НЕТ*</color> Богиня Охоты и Звериного Начала. Класс 2. Оркская богиня. Ответственна за проклятие ликантропии. Она богиня охоты ради спорта, а не ради выживания. Действует от имени Таста, часто прямо против человечества. Держитесь подальше.\n\n<b>Орморек</b> Бог Самосомнений и Горечи. Класс 3. Дварфийский бог. Наиболее известен тем, что пьёт крайне горькое пиво и жалуется. Относительно безопасен для общения, если вы встретите его в дварфийском городе.\n\n<b>Пауллус</b> Бог Веселья и Алкоголя. Класс 3. Утверждает, что изобрёл алкоголь, но это сильно оспаривается. Добродушный бог с человеческим обликом, в хороших отношениях с Советом.\n\n<b>Рэндолф Альберит</b> Бог Путешествий и Странствий. Класс 3. Человеческий бог, чаще встречающийся теми, кто в эпических походах. С ним безопасно взаимодействовать, но остерегайтесь — многие бродяги по дороге прикидываются жрецами Рэндолфа. Будьте настороже и требуйте доказательств перед тем, как доверять.\n\n<b>Ремга</b> <color=red>*НЕТ*</color> Бог Пиратства и Насилия. Класс 1. Лидер гоблинских богов и покровитель всех пиратов. Раньше морякам позволяли приносить подношения Ремге ради безопасного плавания, но новые законы это запрещают. Если вам нужно приносить подношения, выбирайте Энойоса вместо него. Энойос не друг человечества, но Ремга доказал, что он ещё более отвратителен и ненадёжен.\n\n<b>Ри-Шин</b> Бог Растений и Деревьев. Класс 2. Жрецы Ри-Шина контролируют все пилорамы, чтобы обеспечить правильную посадку новых лесов. В обмен деревья дают обильный рост. Ри-Шин может враждебно реагировать на тех, кто вредит лесам. Так что не делайте этого. <i>Злить Ри-Шина — противозаконно.</i>\n\n<b>Саледар</b> Бог Кооперативного Общества. Класс 2. Гоблинский бог. Гоблинские целители почитают Саледара вместо более распространённого почитания Арисэцу. Последователи Саледара утверждают, что он бог Эмпатии, но Саледар допускает рабство, так что я с этим не согласен. Его последователи могут быть как безопасны, так и опасны — это зависит от отдельного человека. Будьте осторожны.\n\n<b>Стрекиос</b> Бог Самоусовершенствования и Соревнований. Класс 3. Стрекиос удивительно мало представлен в человеческой культуре, но хорошо известен в Землях Старух. Известен как «Жестокий Надсмотрщик». Будьте осторожны.\n\n<b>Таст</b> <color=red>*НЕТ*</color> Бог Войны и Военных Дел. Класс 1. Таст благоволит оркам и часто дарует оркам дары, когда те нападают на человеческие цивилизации. Держитесь подальше от Таста, чтобы случайно не стать оружием против человечества.\n\n<b>Талерра</b> <color=red>*НЕТ*</color> Богиня Безнадёжности, Депрессии и Познания Истины. Класс 3. Наиболее известна заманчивой сделкой: она может ответить на ваши мучительные вопросы в обмен на вашу надежду. Но надежда необходима для выживания! Примите, что иногда лучше не знать.\n\n<b>Тувиллус</b> <color=red>*НЕТ*</color> Бог Жадности и Ревности. Класс 3. Брат Каджича и Харукиты, и, по слухам, со-творец вампиризма (вместе с Илтом Хейлом).\n\n<b>Умрад</b> Бог Минералов, Металлов и Горного Дела. Класс 3. Дварфийский бог. Иногда появляется в дварфийских городах и достаточно безопасен для приближения, но крайне подозрителен к не‑дварфам.\n\n<b>Вол</b> Бог Смерти и Возрождения. Класс 1. Утверждает, что нейтрален в делах смертных, но иногда, кажется, благоволит дварфам. Презирает нежить. Говорят, все смертные в конце концов встречают Вола, когда он уносит их душу в Море Душ.\n\n<b>Заре</b> Бог Тайн. Класс ?. Мы едва знаем о существовании Заре. У нас нет понимания роли Заре в нашем мире. Иногда эмиссары Заре замечены, когда обмениваются секретами, но нет надёжного способа доказать, кто они на самом деле. Считайте, что большинство так называемых «жрецов Заре» лгут.\n\n<b>Жиа Лиан</b> <color=red>*НЕТ*</color> Богиня Каприза и Непредсказуемости. Класс 3. Хотя менее проблематична, чем другие «Боги Кубка», Жиа по своей природе непредсказуема. Её аватар человеческий, и иногда у неё действительно есть интересы человечества, но хаос следует за каждым её шагом, а хаос вреден для общества. Держите её подальше от наших городов!\n\n <h1>Приложение A: Известные Умершие Боги</h1> Мудрецы могут перечислить более 100 умерших богов. Ниже — те, о которых чаще всего упоминают в новостях и литературе:\n\n<b>Кэ-а-Ли</b>, Бог Эльфов. Была чрезвычайно могущественной и влиятельной. Умерла примерно 20 000 лет назад.\n\n<b>Элшана</b>, Богиня Изобретательности. Эльфийская богиня. Умерла примерно 17 000 лет назад. Передала свои сферы и воспоминания Дейлу Рентхиану.\n\n<b>Фрета</b>, Богиня Справедливости и Наказания. Ящеролюдная богиня, затем дварфийская, а затем богиня Старух. Умерла примерно 400 лет назад.\n\n<b>Харгур</b>, Бог Землетрясений, Оползней и Цунами. Оркский бог. Недавно умер.\n\n<b>Ромаст</b>, Бог Боевых Искусств. Ящеролюдный бог. Умер примерно 3 500 лет назад.\n\n<b>Уртгал</b>, Бог Отвращения и Презрения. Брат Харукиты, Каджича и Тувиллуса. Недавно умер.\n\n<b>Волзек</b>, Бог Смерти и Нежити. Предполагается, что он был «прото‑формой» богов Вол и Зека до их разделения. Умер примерно 40 000 лет назад.\n\n<b>Зек</b>, Бог Нежити. Брат Вола. Умер примерно 17 000 лет назад. Его власть над нежитью была впоследствии восстановлена так называемыми «Богами Кубка» во главе с Харукитой.\n\n<b>Зура‑Фин</b>, Богиня Грибов. Сестра Ри-Шина и Ау-Шина. Недавно умерла.\n\n <h1>Приложение B: Заметки о Классах Богов</h1> Классификация богов вызывает горячие споры среди мудрецов, и наши мнения часто меняются. Несомненно, многие классы богов, указанные выше, ошибочны. Это особенно верно для богов, которые не активны на землях Совета, так как у нас меньше опыта с ними.\n\n- Боги Класса 1 могут по прихоти изменять реальность. Они могут создавать новые расы существ, изобретать новые виды магии, образовывать или перемещать целые массивы земли и многое другое. Разветвлённая система перемирий и соглашений между ними предотвращает слишком явные вмешательства в повседневность, но мы не можем даже предположить, что они делают за кулисами.\n\n- Боги Класса 2 слабее, но всё ещё способны широко распространять своё влияние. Эти боги часто являются покровителями избранной расы или хранителями важных аспектов мира.\n\n- Боги Класса 3 — самые слабые полноценные боги, и хотя по меркам смертных они невероятно могущественны, им обычно нужно локализовывать свои действия через аватары, поэтому их влияние на мир меньше. Большинство богов Класса 3 имеют только один или два активных аватара одновременно, тогда как боги Класса 2 могут иметь десятки, а боги Класса 1 — бесчисленное множество аватаров (если они вообще пользуются аватарами).\n\n- Также существуют духи природы Класса 4 и Класса 5, но они не являются богами. Что делает существо богом? Моё практическое правило: если бог Класса 1 пытался их убить, и они выжили — они должны быть как минимум Класса 3. Если они умерли — они, вероятно, были Класса 4 или 5. Удобно, что Вол пытается уничтожить каждого нового бога, который появляется, так что мы знаем: все боги, перечисленные здесь, могут выдержать гнев Вола, по крайней мере недолго. (Разумеется, если Вол атакует вместе со своими союзниками, всех ставок нет. У богов своя сложная политика, которой смертным лучше избегать.)"

