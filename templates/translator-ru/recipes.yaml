"Infuses a necklace with the following power: Psi Health Wave Healing +10. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 40.": "Наполняет ожерелье следующей силой: Исцеление волной психического здоровья +10. Использует 100 очков ремесла на предмете и добавляет требование уровня 40 в Шаманском настое."
"Infuses a ring with the following power: Mentalism Base Damage +7%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 38.": "Наполняет кольцо следующей силой: базовый урон Ментализма +7%. Использует 100 Очков Ремесла на предмете и добавляет требование уровня Шаманской Настойки 38."
"Infuses a helmet or headgear with the following power: Signature Debuff Power Cost -9. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 28.": "Наполняет шлем или головной убор следующей силой: Стоимость подписи дебаффа -9. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманского настоя 28."
"Infuses a ring with the following power: Max Health +20. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 22.": "Наполняет кольцо следующей силой: Макс. здоровье +20. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской Настойки 22."
"Crafts a belt with the following power: +5 Inventory Slots": "Создаёт пояс со следующей силой: +5 слотов в инвентаре"
"Infuses a helmet or headgear with the following power: Max Metabolism +30, Max Hydration +20. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 35.": "Наполняет шлем или головной убор следующей силой: Максимальный метаболизм +30, Максимальное увлажнение +20. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской настойки 35."
"Infuses pants or skirts with the following power: Sprint-Swimming Speed Boost +2, Breath Recovered In Partial Water +7. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 37.": "Наполняет штаны или юбки следующей силой: Ускорение бега и плавания +2, Восстановление дыхания в частичной воде +7. Использует 100 очков ремесла на предмете и добавляет требование уровня 37 в Шаманской инфузии."
"Practice tailoring on cloth. The resulting items are not particularly useful, but it's good practice.": "Практикуйтесь в портняжном деле на ткани. Получаемые предметы не особенно полезны, но это хорошая практика."
"Infuses gloves or gauntlets with the following power: Max Armor +25. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 20.": "Наполняет перчатки или рукавицы следующей силой: Максимальная броня +25. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской настойки 20."
"Infuses pants or skirts with the following power: Power Regen (In-Combat) +3. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 27.": "Наполняет штаны или юбки следующей силой: Восстановление силы (в бою) +3. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской настойки 27."
"Infuses pants or skirts with the following power: Unarmed Base Damage +8%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 52.": "Наполняет штаны или юбки следующей силой: базовый урон без оружия +8%. Использует 100 очков ремесла на предмете и добавляет требование уровня 52 в Шаманской настойке."
"Infuses a necklace with the following power: Druid Skill Base Damage +7%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 50.": "Наполняет ожерелье следующей силой: базовый урон навыка друида +7%. Использует 100 очков ремесла на предмете и добавляет требование уровня шаманской настойки 50."
"Infuses a chestplate or shirt with the following power: Burst Accuracy Boost +10%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 51.": "Наполняет нагрудник или рубашку следующей силой: +10% к точности взрыва. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской инфузии 51."
"Infuses gloves or gauntlets with the following power: Melee Accuracy Boost +10%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 52.": "Насыщает перчатки или рукавицы следующей силой: +10% к точности в ближнем бою. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманского Настоя 52."
"Infuses a helmet or headgear with the following power: Ranged Accuracy Boost +10%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 50.": "Наполняет шлем или головной убор следующей силой: +10% к точности дальнего боя. Использует 100 очков ремесла на предмете и добавляет требование уровня Настоя шамана 50."
"Infuses pants or skirts with the following power: Fast-Flying Speed Boost +1, Flying Cost (Per Second In Combat) -0.5. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 34.": "Наполняет штаны или юбки следующей силой: Ускорение быстрого полёта +1, Стоимость полёта (в секунду в бою) -0,5. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской настойки 34."
"Infuses a chestplate or shirt with the following power: Power Regen (In-Combat) +3. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 19.": "Насыщает нагрудник или рубашку следующей силой: Восстановление энергии (в бою) +3. Использует 100 очков ремесла на предмете и добавляет требование уровня 19 в Шаманской настойке."
"Infuses a helmet or headgear with the following power: Max Armor +25. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 23.": "Наполняет шлем или головной убор следующей силой: Максимальная броня +25. Использует 100 очков ремесла на предмете и добавляет требование уровня Шаманской настойки 23."
"(This recipe does nothing useful.)": "(Этот рецепт ничего полезного не делает.)"
"A simple wooden mesh, useful for cages, pens, trellises, and so on.": "Простая деревянная сетка, полезная для клеток, загонов, шпалер и тому подобного."
"Creates small chips of oak perfect for smoking fish and meats.": "Создаёт мелкие щепки из дуба, идеально подходящие для копчения рыбы и мяса."
"Creates small chips of oak perfect for smoking fish and meats. This version uses a perfect piece of wood to create a large amount of usable chips.": "Создаёт мелкие щепки из дуба, идеально подходящие для копчения рыбы и мяса. Эта версия использует идеальный кусок древесины для создания большого количества пригодных щепок."
"Creates a snack. Requires a stove or fire pit. For best results, proof for approximately 00:10 minutes then bake for approximately 00:17 minutes": "Создаёт закуску. Требуется плита или костровище. Для наилучшего результата дайте тесту подойти примерно 00:10 минут, затем выпекайте примерно 00:17 минут"
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:10 minutes then bake for approximately 00:16 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:10 минут, затем выпекайте примерно 00:16 минут"
"Creates a dense filling meal. Requires a stove or fire pit.": "Создаёт плотное сытное блюдо. Требуется плита или кострище."
"Create a bloom of greasy fried onion. Requires a stove or fire pit.": "Создаёт цветок из жирного жареного лука. Требуется плита или кострище."
"Creates a batch of battered onion rings. Requires a stove or fire pit.": "Создаёт порцию луковых колец в кляре. Требуется плита или кострище."
"Creates a meal. Requires a stove or fire pit. There is a 10% chance the Meat Tenderizer will break.": "Создаёт блюдо. Требуется плита или кострище. Есть 10% шанс, что Мясной отбиватель сломается."
"Dye used to color armor orange. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в оранжевый цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"Cooking perch over an wood fire really brings out the subtle flavor of the fish. An orange glaze adds a sweet piquant taste. Requires a stove or fire pit.": "Приготовление окуня на древесном огне действительно раскрывает тонкий вкус рыбы. Оранжевая глазурь придаёт сладковато-острый вкус. Требуется плита или кострище."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:08 minutes then bake for approximately 00:13 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:08 минут, затем выпекайте примерно 00:13 минут"
"With notes of citrus and sweetness, this is a decent table wine.": "С нотками цитрусовых и сладости, это неплохое столовое вино."
"Analyze and decompose a Orc Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите череп орка, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Orc Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите впечатляющий череп орка, чтобы получить практический опыт в френологии для этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Orc Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите Удивительный Череп Орка, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"A clean, dry beer that goes down easy.": "Чистое, сухое пиво, которое легко пьется."
"Grinds orcish wheat into flour, carefully avoiding the toxic bits.": "Перемалывает орочью пшеницу в муку, тщательно избегая токсичных частей."
"Receive Indirect Cold Mitigation +6, plus the two combos from a Meditation Pillar.": "Получите косвенное снижение холода +6, а также два комбо от Столпа Медитации."
"Receive +20 Max Breath, plus the two combos from a Meditation Pillar.": "Получите +20 к максимальному дыханию, а также два комбо от Столпа Медитации."
"Receive +30 Max Power, plus the two combos from a Meditation Pillar.": "Получите +30 к максимальной силе, а также два комбо с Медитационного столба."
"Receive +50 Death Avoidance, plus the two combos from a Meditation Pillar.": "Получите +50 к Избеганию Смерти, а также два комбо от Столпа Медитации."
"Receive +30 Max Body Heat, plus the two combos from a Meditation Pillar.": "Получите +30 к максимальному телесному теплу, а также два комбо от Столпа Медитации."
"Receive +30 Max Metabolism, plus the two combos from a Meditation Pillar.": "Получите +30 к максимальному метаболизму, а также два комбо от Столпа Медитации."
"A mining pick of orcish make. There is a small device built into the head that lets it rotate, so the orcs can mine by stabbing instead of swinging. Innovative.\n\nMust be near a forge.": "Шахтёрская кирка орочьего производства. В головке встроено небольшое устройство, позволяющее ей вращаться, чтобы орки могли добывать руду колющими ударами вместо размахов. Инновационно.\\n\\nДолжна находиться рядом с кузницей."
"Create an orcish version of a Dwarven N Core, which is essentially a superpowered battery of sorts.": "Создаёт орочью версию гномьего N Core, который по сути является своего рода сверхмощным аккумулятором."
"Creates a bowl of soup. This recipe requires a stove or fire pit.": "Создаёт миску супа. Для этого рецепта необходима плита или кострище."
"A subdued arrangement of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +5 Melee Accuracy. Orcs also gain +3% Combat XP. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +5 к точности в ближнем бою. Орки также получают +3% боевого опыта. Длительность: 4 часа.\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
