"Cut and clean a clownfish.": "Разделайте и очистите рыбу-клоуна."
"Create rough yarn from prepared cotton.": "Создайте грубую пряжу из подготовленного хлопка."
"Covers dangerous crystals in magical dust, allowing them to be transported safely.": "Покрывает опасные кристаллы магической пылью, позволяя безопасно перевозить их."
"For one hour, all cold damage is reduced by 5, potentially eliminating the damage entirely, and Max Body Heat is raised by 30.": "В течение одного часа весь урон от холода уменьшается на 5, что может полностью устранить урон, а Max Body Heat повышается на 30."
"A potion that boosts Cold damage by 10% for an hour.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle after drinking this potion. The ice core inevitably cracks the bottle.": "Зелье, которое увеличивает холодный урон на 10% в течение часа.\n\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, после употребления этого зелья стеклянную бутылку нельзя использовать повторно. Ледяное ядро неизбежно трескает бутылку."
"A potion that boosts Cold damage by 15% for an hour.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle after drinking this potion. The ice core inevitably cracks the bottle.": "Зелье, увеличивающее урон холодом на 15% в течение часа.\n\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, после употребления этого зелья стеклянную бутылку нельзя использовать повторно. Ледяное ядро неизбежно трескает бутылку."
"A potion that boosts Cold damage by 20% for an hour.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle after drinking this potion. The ice core inevitably cracks the bottle.": "Зелье, увеличивающее холодный урон на 20% в течение часа.\n\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, вы не можете повторно использовать стеклянную бутылку после употребления этого зелья. Ледяное ядро неизбежно трескает бутылку."
"Boil down a vat of meat to collect the low-quality fat. Requires a stove or fire pit.": "Выпарите чан мяса, чтобы собрать низкокачественный жир. Требуется плита или кострище."
"Combine demonic wisps into an essence. Essences are useful in other recipes.": "Объедините демонические огоньки в эссенцию. Эссенции полезны в других рецептах."
"Combine gold nuggets into a larger, more useful chunk of gold.": "Объедините золотые самородки в более крупный и более полезный кусок золота."
"A potion that boosts your speed. Side effects include hanging your tongue out of your mouth while you run, though, so watch for that.": "Зелье, которое повышает вашу скорость. Побочные эффекты включают высовывание языка изо рта во время бега, так что следите за этим."
"A drinkable wine, but with a slightly musky taste and odor. This is definitely not the kind of wine that elves drink in Verta! But it's not horrible.": "Питьевое вино, но с слегка мускусным вкусом и запахом. Это определённо не то вино, которое эльфы пьют в Верте! Но оно не ужасное."
"This barrel of confetti bombs can be used in celebrations.": "Эта бочка с бомбами конфетти может использоваться на празднествах."
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Hot Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Жаркая кровь».\n\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"Creates a pile of powdered Coral mushrooms.": "Создаёт кучку измельчённых коралловых грибов."
"Creates a snack. Requires a stove or fire pit. For best results, proof for approximately 00:08 minutes then bake for approximately 00:13 minutes": "Создаёт закуску. Требуется плита или костровище. Для наилучшего результата дайте тесту подойти примерно 00:08 минут, затем выпекайте примерно 00:13 минут"
"Create a liquidy cheese with large curds. (Requires a stove or fire pit.)\n\nCheese Type: Fresh": "Создайте жидкий сыр с крупными сгустками. (Требуется плита или кострище.)\n\nТип сыра: Свежий"
"Create a spool of thread from fine yarn and spider's web. This recipe creates 4 spools of thread.": "Создайте катушку нити из тонкой пряжи и паутины. Этот рецепт создаёт 4 катушки нити."
