"For one hour, all indirect Fire damage you deal is increased +25%.": "В течение одного часа весь косвенный урон Огненной магией, который вы наносите, увеличивается на +25%."
"Creates a sweet treat. Serves 3.": "Создаёт сладкое лакомство. На 3 порции."
"Creates a simple meal that serves 2. Requires a stove or fire pit.": "Создаёт простое блюдо на 2 порции. Требуется плита или кострище."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +40 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +40 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"Create a handful of thin leather strips. (Must be near a tanning rack.)": "Создаёт горсть тонких кожаных полосок. (Необходимо находиться рядом с дубильной стойкой.)"
"Creates a meal. Serves 2.": "Создаёт блюдо. На 2 порции."
"Dye used to color armor lemon chiffon. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в цвет лимонного шифона. Опыт даётся только при первом успешном создании по этому рецепту."
"Creates a meatless turkey substitute with a lemony glaze. Requires a stove or fire pit. Feeds three.": "Создаёт вегетарианский заменитель индейки с лимонной глазурью. Требуется плита или кострище. Порция на троих."
"Creates a seemingly simple drink.": "Создаёт, казалось бы, простой напиток."
"Increase your Maximum Tempest Energy +5 through a simple ceremony said to expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed while sitting in shallow water after having just licked a toxic frog.": "Увеличьте вашу максимальную энергию Бури на +5 с помощью простой церемонии, которая, как говорят, расширяет разум. Произносить заклинание нужно только один раз; эффект постоянен. Церемонию необходимо проводить, сидя в мелкой воде, после того как вы оближете ядовитую лягушку."
"An intoxicating aroma of autumn flavors mixed with potent hallucinogens.": "Опьяняющий аромат осенних вкусов, смешанный с мощными галлюциногенами."
"50% chance to restore 200 Health; 50% chance to deal 200 Health damage instead. Best consumed when you have nothing left to lose.": "50% шанс восстановить 200 здоровья; 50% шанс нанести 200 урона здоровью вместо этого. Лучше всего использовать, когда вам нечего терять."
"Dye used to color armor light cyan. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в светло-голубой цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Dye used to color armor light gray. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в светло-серый цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"Dye used to color armor light salmon. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в светло-лососевый цвет. Опыт даётся только при первом успешном создании этого рецепта."
"Dye used to color armor light steel blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в светло-стальной синий цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Create a cask of a washed-rind cheese with a pungent odor and tangy taste. (Requires a stove or fire pit.)\n\nCheese Type: White": "Создайте бочку сыра с мытой коркой, обладающего резким запахом и острым вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Белый"
"Dye used to color armor lime green. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в лаймовый цвет. Опыт начисляется только при первом успешном создании по этому рецепту."
"Spin retted flax into a rugged cloth. (Must be near a cotton gin.)": "Прядите вымоченный лён в прочную ткань. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"Dye used to color armor linen. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания льняной брони. Опыт начисляется только при первом успешном выполнении этого рецепта."
"Increase your Maximum Tempest Energy +5 through a mysterious ceremony. It must be performed at midnight [game time] on a new moon [real world]. It need only be performed once; the effects are permanent.": "Увеличьте вашу максимальную энергию Бури на +5 через таинственный обряд. Его необходимо провести в полночь [игровое время] в новолуние [реальный мир]. Обряд нужно выполнить только один раз; эффект постоянный."
"Creates a baked potato with all the toppings. Serves 2. Requires a stove or fire pit.": "Создаёт запечённый картофель со всеми добавками. На 2 порции. Требуется плита или кострище."
