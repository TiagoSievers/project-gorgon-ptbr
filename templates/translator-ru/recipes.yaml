"Level 20 shirt. (Must be near a tanning rack, for some reason.)": "Рубашка 20 уровня. (По какой-то причине нужно находиться рядом с шкурательной стойкой.)"
"Level 20 shirt, infused with magic. (Must be near a tanning rack, for some reason.)": "Рубашка 20 уровня, наполненная магией. (По какой-то причине нужно находиться рядом с шкурательным станком.)"
"Level 20 slippers. (Must be near a tanning rack, for some reason.)": "Тапочки 20 уровня. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 20 slippers, infused with magic. (Must be near a tanning rack, for some reason.)": "Тапочки 20 уровня, наполненные магией. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 20 club, suitable for use with the Hammer skill.": "Дубина 20 уровня, подходит для использования с навыком Молот."
"Level 20 club infused with magic.": "Дубина 20 уровня, наполненная магией."
"Level 20 fighting staff. This staff works for staff fighting, druidism, fire magic, and ice magic.": "Боевой посох 20 уровня. Этот посох подходит для боя посохом, друидизма, огненной магии и ледяной магии."
"Level 20 fighting staff, infused with magic. This staff works for staff fighting, druidism, fire magic, and ice magic.": "Боевой посох 20 уровня, наполненный магией. Этот посох подходит для боя посохом, друидизма, огненной магии и ледяной магии."
"Level 20 horseshoes, but for a cow. Infused with magic. (Must be near a forge.)": "Подковы 20 уровня, но для коровы. Наполнены магией. (Должны находиться рядом с кузницей.)"
"Level 20 horseshoes, but for a deer. Infused with magic. (Must be near a forge.)": "Подковы 20 уровня, но для оленя. Наполнены магией. (Требуется находиться рядом с кузницей.)"
"A smoky, musty candle that evokes the danger of fire.": "Дымная, затхлая свеча, вызывающая ощущение опасности огня."
"The smell of sand in wind. Because there's nothing like smelling a sandstorm in the air to quicken one's pace.": "Запах песка в ветре. Ведь нет ничего лучше, чем почувствовать песчаную бурю в воздухе, чтобы ускорить шаг."
"Level 20 boots, infused with magic. (Must be near a tanning rack.)": "Сапоги 20 уровня, наполненные магией. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Level 20 leggings, infused with magic. (Must be near a tanning rack.)": "Поножи 20 уровня, наполненные магией. (Требуется находиться рядом с шкуросъемным станком.)"
"Level 20 chest armor, infused with magic. (Must be near a tanning rack.)": "Броня для груди 20 уровня, наполненная магией. (Необходимо находиться рядом с шкурательной стойкой.)"
"A bland floral scent is slightly uplifted by the tang of violets.": "Пресный цветочный аромат слегка оживлён оттенком фиалок."
"A belt covered in hooks that face inward, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс, покрытый крючками, направленными внутрь, причиняющими носителю сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут найти в этой боли усиление чувства выживания."
"Basic horseshoes to protect your mount's feet. (Must be near a forge.)": "Простые подковы для защиты копыт вашего скакуна. (Требуется находиться рядом с кузницей.)"
"Level 20 boots. (Must be near a tanning rack.)": "Сапоги 20 уровня. (Должны находиться рядом с сушилкой для шкур.)"
"Level 20 gloves. (Must be near a tanning rack.)": "Перчатки 20 уровня. (Должны находиться рядом с вешалкой для выделки кожи.)"
"Level 20 gloves, infused with magic. (Must be near a tanning rack.)": "Перчатки 20 уровня, наполненные магией. (Нужно находиться рядом с шкурательной стойкой.)"
"Level 20 headwear. (Must be near a tanning rack.)": "Головной убор 20 уровня. (Должен находиться рядом с шкуросъемным станком.)"
"Level 20 headwear, infused with magic. (Must be near a tanning rack.)": "Головной убор 20 уровня, наполненный магией. (Должен находиться рядом с дубильным станком.)"
"Level 20 leggings. (Must be near a tanning rack.)": "Поножи 20 уровня. (Необходимо находиться рядом с дубильной стойкой.)"
"Create strong crude leather. (Must be near a tanning rack.)": "Создаёт прочную грубую кожу. (Необходимо находиться рядом с шкуросъемной рамой.)"
"Level 20 chest armor. (Must be near a tanning rack.)": "Броня для груди 20 уровня. (Необходимо находиться рядом с шкуросушильной стойкой.)"
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x5.": "Одноразовый табурет для медитации. Используйте его рядом с Колонной Медитации, чтобы увеличить длительность эффектов медитации в 5 раз."
"Level 20 fighting staff. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 20 уровня. Этот посох подходит для боя посохом и друидизма, но не для огненной магии, ледяной магии или священных сил."
"Level 20 fighting staff, infused with magic. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 20 уровня, наполненный магией. Этот посох подходит для боя посохом и друидизма, но не для огненной магии, ледяной магии или священных сил."
"A belt with multiple pockets. Requires Endurance 12.": "Пояс с несколькими карманами. Требуется Выносливость 12."
"Level 20 fighting staff. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой жезл 20 уровня. Этот жезл подходит для боя жезлом, друидизма, огненной магии, ледяной магии и жреческого колдовства."
"Level 20 fighting staff, infused with magic. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой жезл 20 уровня, наполненный магией. Этот жезл подходит для боя жезлом, друидизма, огненной магии, ледяной магии и жреческого колдовства."
"Basic tack for a horse. (Must be near a tack bench.)": "Простейшее снаряжение для лошади. (Нужно находиться рядом со скамьёй для снаряжения.)"
"Creates a saddle for a horse. (Must be near a tack bench.)": "Создаёт седло для лошади. (Должен находиться рядом с верстаком для сбруи.)"
"Creates a saddlebag with 24 slots. (Must be near a tack bench.)": "Создаёт седельную сумку с 24 ячейками. (Необходимо находиться рядом с снаряжённым столом.)"
"An almost-overpowering odor of the sea. It reminds you to hold your breath underwater.": "Почти подавляющий запах моря. Он напоминает вам задержать дыхание под водой."
"Pieces of chitin and metal are sewn into reinforced webbing to create a suit for spiders.": "Куски хитина и металла вплетены в усиленную паутину, чтобы создать костюм для пауков."
"A box for storing up to 8 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Коробка для хранения до 8 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют этому игроку доступ к одним и тем же предметам.)"
"A useful form of rendered fat.": "Полезная форма топленого жира."
"Simple bits of metal designed to fit on the chest and shoulders of a wolf. (Must be near a forge consecrated to Norala.)": "Простые металлические детали, предназначенные для защиты груди и плеч волка. (Необходимо находиться рядом с кузницей, освящённой Норалой.)"
"It's metal. It fits on a werewolf. These are the only positive attributes. (Must be near a forge consecrated to Norala.)": "Это металл. Он подходит для волка-оборотня. Это единственные положительные качества. (Должен находиться рядом с кузницей, освящённой Норалой.)"
"Simple bits of metal designed to fit on the front legs and claws of a wolf. (Must be near a forge consecrated to Norala.)": "Простые металлические накладки, предназначенные для передних лап и когтей волка. (Требуется находиться рядом с кузницей, освящённой Норалой.)"
"Simple bits of metal designed to fit on the hind legs of a wolf. (Must be near a forge consecrated to Norala.)": "Простые металлические детали, предназначенные для задних лап волка. (Должны находиться рядом с кузницей, освящённой Норалой.)"
"Simple bits of metal designed to fit on the lower legs and haunches of a wolf. (Must be near a forge consecrated to Norala.)": "Простые металлические детали, предназначенные для защиты нижних частей ног и бёдер волка. (Требуется находиться рядом с кузницей, освящённой Норалой.)"
"Wax-coated string for use in a candle.": "Нить, покрытая воском, для использования в свече."
"Level 20 horseshoes, but for a cow, and made of wood.": "Подковы 20 уровня, но для коровы и сделанные из дерева."
"Level 20 horseshoes, but for a deer, and made of wood.": "Подковы 20 уровня, но для оленя и сделанные из дерева."
"A not-quite-pleasant pine candle that focuses your instincts toward nature.": "Не совсем приятная сосновая свеча, которая направляет ваши инстинкты к природе."
"A magical freezing system for long-term pet storage. The pet is placed into suspended animation, unable to move, but still able to dream -- and to have nightmares, which cause the pet to lose all of its Happiness. Pets kept in this container for more than 90 days escape and are lost. One use only.": "Магическая система заморозки для длительного хранения питомцев. Питомец помещается в состояние приостановленной анимации, не может двигаться, но всё ещё может видеть сны — и кошмары, которые заставляют питомца терять всю свою Радость. Питомцы, хранящиеся в этом контейнере более 90 дней, сбегают и теряются. Одноразовое использование."
"Infuses a dagger with the following power: Knife Accuracy +8. The benefit lasts until you have made 1250 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 15": "Наполняет кинжал следующей силой: Точность ножа +8. Эффект длится до совершения 1250 атак ножом. Пока кинжал заточен, для его использования требуется уровень Владения ножом 15"
"Infuses a dagger with the following power: Knife Accuracy +10. The benefit lasts until you have made 1250 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 25": "Наполняет кинжал следующей силой: Точность ножа +10. Эффект длится до совершения 1250 атак ножом. Пока кинжал наточен, для его использования требуется уровень владения ножом 25"
"Infuses a dagger with the following power: Knife Accuracy +12. The benefit lasts until you have made 1250 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 35": "Наполняет кинжал следующей силой: Точность ножа +12. Эффект длится до совершения 1250 атак ножом. Пока кинжал наточен, для его использования требуется уровень владения ножом 35"
"Infuses a dagger with the following power: Knife Accuracy +14. The benefit lasts until you have made 1250 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 45. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет кинжал следующей силой: Меткость ножа +14. Эффект длится до тех пор, пока вы не совершите 1250 атак ножом. Пока оружие наточено, для него требуется уровень владения ножом 45. Завершение этого рецепта впервые обучает вас следующему уровню этого рецепта."
