"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +25 Melee Accuracy. Orcs also gain +7% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 25.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +25 к точности в ближнем бою. Орки также получают +7% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 25."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +30 Melee Accuracy. Orcs also gain +8% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +30 к точности в ближнем бою. Орки также получают +8% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 35."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +35 Melee Accuracy. Orcs also gain +9% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 45.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +35 к точности в ближнем бою. Орки также получают +9% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 45."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +40 Melee Accuracy. Orcs also gain +10% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 55.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +40 к точности в ближнем бою. Орки также получают +10% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 55."
"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +45 Melee Accuracy. Orcs also gain +12% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 65.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +45 к точности в ближнем бою. Орки также получают +12% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 65."
"Creates a hearty platter of snacks. Serves two.": "Создаёт сытное блюдо с закусками. На двоих."
"Toughens your flesh so that you are better insulated against the cold.": "Укрепляет вашу плоть, чтобы вы лучше сопротивлялись холоду."
"A large knife for cutting meat and organs out of corpses (+5% chance for an organ). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)\n\nMust be near a forge.": "Большой нож для отделения мяса и органов от трупов (+5% шанс получить орган). (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)\\n\\nДолжен находиться рядом с кузницей."
"Cut and clean an oscar.": "Разрежьте и очистите осцара."
"A robotic fire pit, overloaded with a powerful source of energy. Lasts 10 minutes once deployed.\n\nWhile standing near the deployed Dronefire, you receive the following:\n+10% Cold Resistance\n+10% Direct Fire Damage\n+20% Fire Vulnerability": "Роботизированный очаг, перегруженный мощным источником энергии. Длится 10 минут после установки.\\n\\nНаходясь рядом с установленным Дронфаером, вы получаете следующие эффекты:\\n+10% к сопротивлению холоду\\n+10% к урону от прямого огня\\n+20% к уязвимости к огню"
"A pumpkin carved with a silly owl face.": "Тыква, вырезанная с забавным лицом совы."
"A surprisingly complex beer, but... complexity doesn't always taste good.": "Удивительно сложное пиво, но... сложность не всегда на вкус хороша."
"Dye used to color armor pale goldenrod. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в бледный золотарник. Опыт начисляется только при первом успешном создании по этому рецепту."
"Dye used to color armor pale green. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в бледно-зеленый цвет. Опыт начисляется только при первом создании по этому рецепту."
"Dye used to color armor pale marigold. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в бледный цвет бархатца. Опыт даётся только при первом успешном создании по этому рецепту."
"Sweet and strong, with the distinctive odor of molasses. In far-off lands, ranalon produce and drink rum in tremendous quantities, but it's less common -- and less delicious -- in Alharth.": "Сладкий и крепкий, с характерным запахом патоки. В далеких землях раналон производят и пьют ром в огромных количествах, но в Альхарте он встречается реже — и менее вкусный."
"Prepares a cask of rum for aging. The cask must then be stored in a cave until it is mature.": "Готовит бочку рома для выдержки. Бочку необходимо затем хранить в пещере до созревания."
"Dye used to color armor pale turquoise. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания доспехов в бледно-бирюзовый цвет. Опыт начисляется только при первом создании по этому рецепту."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +32 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +32 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Create a fancy pick for safely extracting fossils. These tools tend to break over time due to their delicate nature. Must be near a forge.": "Создайте изящную кирку для безопасного извлечения окаменелостей. Эти инструменты со временем ломаются из-за своей хрупкой природы. Нужно находиться рядом с кузницей."
"Creates a very simple meal of fish. Requires a stove or fire pit. ": "Готовит очень простое рыбное блюдо. Требуется плита или кострище. "
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +12 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +12 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Cut and clean a papermouth.": "Разрежьте и очистите бумажного рта."
"Creates some single-use traps that will stun an enemy that wanders over it. Works on pretty much anything, not just rats. (Except for Elites.)": "Создаёт несколько одноразовых ловушек, которые оглушают врага, наступившего на них. Работает практически на всех, а не только на крыс. (Кроме элитных.)"
"Creates a pile of flaked Parasol mushrooms.": "Создаёт кучу хлопьев из зонтичных грибов."
"Create a very hard cheese, suitable for grating as a topping. (Requires a stove or fire pit.)\n\nCheese Type: Hard": "Создаёт очень твёрдый сыр, подходящий для тёрки в качестве начинки. (Требуется плита или кострище.)\n\nТип сыра: твёрдый"
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Ice Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Ледяная кровь».\\n\\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"Increase your Maximum Tempest Energy +5 through a ritual that expands your understanding. The ritual need only be performed once; the effects are permanent. It must be performed outdoors while severely intoxicated and suffering from a pineal juice hangover.": "Увеличьте ваше Максимальное Энергия Бури на +5 с помощью ритуала, расширяющего ваше понимание. Ритуал нужно выполнить только один раз; эффекты постоянны. Его необходимо проводить на улице в состоянии сильного опьянения и с похмельем от сока шишковидной железы."
"A pleasant dessert wine.": "Приятное десертное вино."
"Create a sweet and spicy hard cheese. (Requires a stove or fire pit.)\n\nCheese Type: Hard": "Создайте сладкий и острый твердый сыр. (Требуется плита или кострище.)\n\nТип сыра: твердый"
"Creates a spicy snack food. Serves two. Requires a stove or fire pit.": "Создаёт острое закусочное блюдо. На двоих. Требуется плита или кострище."
"Perform a mind-altering ritual so that you can perceive newly-spawned monsters 2 seconds before they actually appear.\n\nThe effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Выполните изменяющий сознание ритуал, чтобы видеть вновь появляющихся монстров за 2 секунды до их фактического появления.\\n\\nЭффект не исчезает, но при каждой вашей смерти есть 5% шанс, что он закончится."
"Perform a mind-altering ritual so that you can perceive newly-spawned monsters 4 seconds before they actually appear.\n\nThe effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Выполните изменяющий сознание ритуал, чтобы видеть вновь появляющихся монстров за 4 секунды до их фактического появления.\n\nЭффект не исчезает, но при каждой вашей смерти есть 5% шанс, что он закончится."
"Perform a mind-altering ritual so that you can perceive newly-spawned corporeal undead 10 seconds before they actually appear.\n\nThe effect does not wear off, but whenever you die there's a 5% chance that it will end.": "Выполните изменяющий сознание ритуал, чтобы видеть недавно появившуюся материальную нежить за 10 секунд до её фактического появления.\n\nЭффект не исчезает, но при каждой вашей смерти есть 5% шанс, что он закончится."
"Cut and clean a perch.": "Порежьте и очистите окуня."
"Attempt to clean and polish a conch until it's battle-ready. Unfortunately, most conchs don't survive this process -- only one in ten does!": "Попытка очистить и отполировать раковину до боевого состояния. К сожалению, большинство раковин не переживают этот процесс — выживает только одна из десяти!"
"For 2 hours, all earned combat XP will be reduced to zero. Creates 2 potions.": "В течение 2 часов весь получаемый боевой опыт будет равен нулю. Создаёт 2 зелья."
"Creates a delicious meal. Requires a stove or fire pit.": "Создаёт вкусное блюдо. Требуется плита или кострище."
"A mildly perfumed wax that helps ensure mating success with bees or wasps.": "Слабо ароматизированный воск, который помогает обеспечить успех спаривания с пчёлами или осами."
"For an hour, all your attacks will seem to do 25% less damage to the target for purposes of determining who the target chooses to attack. (As a result, it may choose to attack someone else, unless nobody else is around.)": "В течение часа все ваши атаки будут казаться наносящими на 25% меньше урона цели для определения того, кого цель выберет для атаки. (В результате она может выбрать атаку другого, если рядом никого больше нет.)"
"For an hour, all your attacks will seem to do 10% less damage to the target for purposes of determining who the target chooses to attack. (As a result, it may choose to attack someone else, unless nobody else is around.)": "В течение часа все ваши атаки будут казаться наносящими на 10% меньше урона цели для определения того, кого цель выберет для атаки. (В результате она может выбрать атаку другого, если рядом никого больше нет.)"
"Helps you see the positive side of any situation. Great for depressed people! (Caution: may be addictive.) Also boosts maximum health by +10 for 60 minutes.": "Помогает видеть положительную сторону любой ситуации. Отлично подходит для подавленных людей! (Внимание: может вызывать привыкание.) Также повышает максимальное здоровье на +10 на 60 минут."
"Creates an interesting pickled dish. Requires a stove or fire pit. ": "Создаёт интересное маринованное блюдо. Требуется плита или кострище. "
"A potion that boosts Pig skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Свиньи на 20%."
"Etch the magical rune for pigs onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магическую руну для свиней на малахите, чтобы он был настроен только на этот вид при использовании в рецептах ремесла."
"Cut and clean a pike.": "Разрежьте и очистите щуку."
"A golden beer with a slightly bitter taste.": "Золотое пиво с лёгкой горчинкой."
"The enchanted and ground-up pineal glands of intelligent creatures, in a sweet syrupy liquid.": "Зачарованные и измельчённые шишковидные железы разумных существ в сладкой сиропообразной жидкости."
"Cut and clean a pinfish.": "Порежьте и очистите пинфиша."
"Dye used to color armor pink. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в розовый цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Creates a pile of toxic pixie's parasol flakes.": "Создаёт кучу ядовитых чешуек зонтика пикси."
"Creates bland but filling gruel.": "Создаёт пресную, но сытную кашу."
"Creates a milky potion that protects against poison and boosts max health.": "Создаёт молочное зелье, которое защищает от яда и увеличивает максимальное здоровье."
"For one hour, all poison damage is reduced by 5, potentially suppressing the poison entirely.": "В течение одного часа весь урон от яда уменьшается на 5, что может полностью подавить действие яда."
"Poisons apple juice with deadly iocaine powder.": "Отравляет яблочный сок смертельным порошком иокаина."
"Poisons a tasty bread with deadly iocaine powder.": "Отравляет вкусный хлеб смертельным порошком иокаина."
"Poisons a Brukwint by replacing the Goblin Puffball with an Iocaine.": "Отравляет Бруквинта, заменяя Гоблинский Пушистик на Иокаин."
"Poisons a vegetarian meal with deadly iocaine powder.": "Отравляет вегетарианское блюдо смертельным порошком иокаина."
"Poisons a crab roll with deadly iocaine powder.": "Отравляет ролл с крабом смертельным порошком иокаин."
"Poisons a tasty dessert with deadly iocaine powder.": "Отравляет вкусный десерт смертельным порошком иокаина."
"Poisons a beet dish with deadly iocaine powder.": "Отравляет блюдо из свеклы смертельным порошком иокаина."
"Poisons grilled chicken with deadly iocaine powder.": "Отравляет жареную курицу смертельным порошком иокаина."
"Cut and clean a pompano.": "Разрежьте и очистите помпано."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +16 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +16 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Creates a pile of flavored Porcini mushroom flakes.": "Создаёт кучу ароматных хлопьев из белого гриба."
"A pleasant beer that strongly takes on the characteristics of its flavoring ingredients.": "Приятное пиво, которое ярко проявляет характеристики своих ароматических ингредиентов."
"Level 80 ring infused with protective magics.": "Кольцо 80 уровня, наполненное защитной магией."
"Level 80 ring infused with protective magics. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Кольцо 80 уровня, наполненное защитной магией. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"A very rough alcoholic beverage. Some say you grow to like the taste, but others say that's just your tastebuds dying from the pain.": "Очень грубый алкогольный напиток. Некоторые говорят, что со временем привыкаешь к вкусу, но другие утверждают, что это просто твои вкусовые рецепторы умирают от боли."
"Creates a batch of fried battered potato wedges. Requires a stove or fire pit.": "Создаёт порцию жареных картофельных долек в кляре. Требуется плита или кострище."
"For an hour, all acid damage is reduced by 15, potentially eliminating the damage entirely.": "В течение часа весь урон от кислоты уменьшается на 15, что может полностью устранить урон."
"Creates 3 jars of acid. Use it to clean feathers for archery, or other weird things. You can also drink it, or bathe in it, but that would be pretty damned stupid.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle that acid is stored in. The bottle is ruined by the acid when the acid is used.": "Создаёт 3 банки с кислотой. Используйте её для очистки перьев для стрельбы из лука или других странных вещей. Вы также можете выпить её или искупаться в ней, но это было бы довольно глупо.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, стеклянную бутылку, в которой хранится кислота, нельзя использовать повторно. Бутылка разрушается кислотой при её использовании."
"Creates a jar of acid. Use it to clean feathers for archery, or other weird things. You can also drink it, or bathe in it, but that would be pretty damned stupid.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle that acid is stored in. The bottle is ruined by the acid when the acid is used.": "Создаёт банку с кислотой. Используйте её для очистки перьев для стрельбы из лука или других странных вещей. Вы также можете выпить её или искупаться в ней, но это было бы довольно глупо.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, стеклянную бутылку, в которой хранится кислота, нельзя использовать повторно. Бутылка разрушается кислотой при её использовании."
"For one hour, all cold damage is reduced by 15, potentially eliminating the damage entirely, and Max Body Heat is raised by 40.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle after drinking this potion. The ice core inevitably cracks the bottle.": "В течение одного часа весь урон от холода уменьшается на 15, что может полностью устранить урон, а максимальное телесное тепло повышается на 40.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, после употребления этого зелья стеклянную бутылку нельзя использовать повторно. Ледяное ядро неизбежно трескает бутылку."
"A thin fluid used to create augmentation oils (for level 60 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 60 уровня). Создаёт пять доз. ПРИМЕЧАНИЕ: этот устаревший рецепт больше не используется для усиления!"
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 4 ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется способностью Отравленный клинок 4."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade 2 ability.": "Небольшой острый клинок, покрытый токсичным веществом, особенно смертельным для волков и ликантропов. Этот предмет используется в способности Клинок с волчьей отравой 2."
"Records the location of metal in Povus. The resulting survey requires Mining 68 to use.": "Фиксирует местоположение металлов в Повусе. Для использования требуется навык Горное дело 68."
"Records the location of a fairly large crystal deposit in Povus. The resulting survey requires Geology 60 to use.": "Фиксирует местоположение довольно крупного месторождения кристаллов в Повусе. Для использования полученного обследования требуется Геология 60."
