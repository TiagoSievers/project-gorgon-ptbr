"Level 100 chest armor, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Броня для груди 100 уровня, наполненная магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъёмным станком.)"
"Level 100 battle chemistry flask infused with magic.": "Боевая химическая колба 100 уровня, наполненная магией."
"Level 100 battle chemistry flask infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Боевая химическая колба 100 уровня, наполненная магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Cargo Pants that give +40 inventory slots without a level requirement.": "Брюки карго, дающие +40 слотов в инвентаре без требования по уровню."
