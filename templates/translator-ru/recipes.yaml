"Truly impressive tack for a horse. (Must be near a tack bench.)": "Поистине впечатляющая упряжь для лошади. (Должно быть рядом с верстаком для упряжи.)"
"Create 1000 awesome reservoir arrows.": "Создайте 1000 потрясающих стрел-резервуаров."
"Creates a slightly-magical saddlebag with 80 slots. (Must be near a tack bench.)": "Создаёт слегка волшебную седельную сумку на 80 слотов. (Должно быть рядом с верстаком для упряжи.)"
"Level 90 fire orb infused with magic. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Огненный шар 90-го уровня, наполненный магией. Первое создание этого рецепта обучает вас рецепту следующего, более высокого уровня."
"Level 90 fire orb infused with magic. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Сфера огня 90-го уровня, наполненная магией. Первое создание этого рецепта обучает вас рецепту следующего, более высокого уровня. Максимальное зачарование создаёт предметы на один уровень Редкости выше, чем они были бы иначе."
"Level 90 leg armor, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Поножи 90-го уровня, пропитанные магией. Максимальное зачарование создаёт предметы на 1 уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Create 1000 awesome snare arrows.": "Создайте 1000 потрясающих ловчих стрел."
"Level 90 chest covering, infused with magic. (Must be near a tanning rack.)": "Покрытие для груди 90-го уровня, пропитанное магией. (Должно быть рядом с дубильной стойкой.)"
"Level 90 chest covering, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Нагрудное покрытие 90 уровня, пропитанное магией. Максимальное зачарование создаёт предметы на 1 уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Level 90 winter boots, infused with magic. (Must be near a tanning rack.)": "Зимние сапоги 90 уровня, наполненные магией. (Должны находиться рядом с дубильной рамой.)"
"Level 90 winter boots, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние сапоги 90-го уровня, пропитанные магией. Максимальное Зачарование создаёт предметы на один уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Level 90 winter gloves, infused with magic. (Must be near a tanning rack.)": "Зимние перчатки 90 уровня, наполненные магией. (Должны находиться рядом с дубильной стойкой.)"
"Level 90 winter gloves, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние перчатки 90-го уровня, наполненные магией. Максимальное зачарование создаёт предметы на 1 уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Level 90 winter headgear, infused with magic. (Must be near a tanning rack.)": "Зимний головной убор 90-го уровня, наполненный магией. (Должен находиться рядом с дубильной рамой.)"
"Level 90 winter headgear, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимний головной убор 90-го уровня, наполненный магией. Максимальное зачарование создаёт предметы на 1 уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной рамой.)"
"Level 90 winter pants, infused with magic. (Must be near a tanning rack.)": "Зимние штаны 90-го уровня, наполненные магией. (Должны находиться рядом с дубильной стойкой.)"
"Level 90 winter pants, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние штаны 90-го уровня, пропитанные магией. Максимальное зачарование создаёт предметы на уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Level 90 horseshoes, but for a cow, and made of wood.": "Подковы 90-го уровня, но для коровы, и сделанные из дерева."
"Level 90 horseshoes, but for a deer, and made of wood.": "Подковы 90-го уровня, но для оленя и сделанные из дерева."
"Dye used to color armor azure. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в лазурный цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Creates sweet and juicy BBQ ribs. Requires a stove or fire pit.": "Готовит сладкие и сочные рёбрышки барбекю. Требуется плита или костровище."
"Creates delicious bacon. Requires a stove or fire pit. Unlike most food, bacon does not give a long-term regeneration effect. Instead, it is an instant-heal item.": "Создаёт вкусный бекон. Требуется плита или костровище. В отличие от большинства еды, бекон не даёт длительного эффекта восстановления. Вместо этого это предмет мгновенного исцеления."
"Creates a simple meal. Requires a stove or fire pit.": "Создаёт простое блюдо. Требуется плита или кострище."
"Creates a breakfast meal. This recipe serves two and requires a stove or fire pit.": "Создаёт блюдо для завтрака. Этот рецепт рассчитан на двоих и требует плиты или кострища."
"Creates a simple dish of moist, delicious baked beets. Requires a stove or fire pit.": "Создаёт простое блюдо из сочной, вкусной запечённой свёклы. Требуется плита или костровище."
"Creates a meal that serves 2. Must be near a stove or fire pit.": "Создаёт блюдо на 2 порции. Нужно находиться рядом с плитой или кострищем."
"Creates a simple baked potato. Requires a stove or fire pit.": "Создаёт простой запечённый картофель. Требуется плита или кострище."
"Creates a meal for two. Requires a stove or fire pit.": "Создаёт блюдо на двоих. Требуется плита или кострище."
"Creates a delicious and healthy meal. Requires a stove or fire pit. ": "Создаёт вкусное и полезное блюдо. Требуется плита или кострище. "
"Creates a wonderful loaf of banana bread. Requires a stove or fire pit.": "Создаёт чудесную буханку бананового хлеба. Требуется плита или костровище."
"A buttery, banana-flavored wine that's quite a mouthful.": "Маслянистое вино со вкусом банана, которое довольно трудно выговорить."
"Creates a meal that serves 2. Requires a stove or fire pit.": "Создаёт блюдо на 2 порции. Требуется плита или кострище."
"Creates a snack. Requires a stove or fire pit.": "Создаёт закуску. Требуется плита или кострище."
"A potion that boosts Bard skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Барда на 20%."
"Creates a hearty meal bread. Requires a stove or fire pit.": "Создаёт сытный хлеб для еды. Требуется плита или кострище."
"A large cask used for storing wet and dry goods.": "Большая бочка, используемая для хранения влажных и сухих товаров."
"For repairing moderate armor damage. Used by Armor Patching abilities. Crafts 2 kits.": "Для ремонта умеренных повреждений брони. Используется способностями починки брони. Создаёт 2 набора."
"Create 1000 basic arrows.": "Создайте 1000 обычных стрел."
"Create a bundle of 1000 arrow shafts for basic arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 древков стрел для простых стрел. Они помещаются в сушильный ящик и готовы к сушке."
"Create a bundle of 1000 mediocre arrowheads for basic arrows.": "Создайте связку из 1000 посредственных наконечников стрел для обычных стрел."
"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor. This augury tends to have more potent futures -- both good and ill -- than the Beginner's Augury.": "Изучите кости, органы или части тела умершего существа, чтобы получить подсказку о своём будущем. Вам может не понравиться то, что вы увидите, но шансы на добрый знак на вашей стороне. Это гадание обычно предвещает более сильные будущие события — как хорошие, так и дурные — чем Гадание новичка."
"Chop a small fish up into bait.": "Порубите маленькую рыбу на наживку."
"Create 1000 basic barbed arrows.": "Создайте 1000 обычных зазубренных стрел."
"A secret formula that lets mortals take advantage of necromantic blood.": "Секретная формула, позволяющая смертным использовать некромантскую кровь."
"A specialized tool for blowing glass.": "Специализированный инструмент для выдувания стекла."
"A chemical compound that eliminates pests in a small area.\n\nThese are used with the Bug Bomb ability (which is taught automatically by this recipe.)": "Химическое соединение, уничтожающее вредителей на небольшой территории.\\n\\nИспользуется с способностью Насекомая бомба (которая изучается автоматически при создании по этому рецепту)."
"A fire pit, good for cooking in the field or for keeping warm in the cold. Lasts 3 minutes once deployed.": "Кострище, подходящее для готовки в походе или чтобы согреться в холоде. После установки горит 3 минуты."
"Creates a snack. Requires a stove or fire pit. For best results, proof for approximately 00:05 minutes then bake for approximately 00:08 minutes": "Создаёт закуску. Требуется плита или кострище. Для лучшего результата дайте тесту подойти примерно 00:05 минут, затем выпекайте примерно 00:08 минут"
"Create 1000 basic dense arrows.": "Создаёт 1000 обычных плотных стрел."
"An alternate way to create basic fertilizer that uses a whole bunch of bone meal as the key ingredient. Creates three doses.": "Альтернативный способ создать базовое удобрение, в котором в качестве ключевого ингредиента используется большое количество костной муки. Создаёт три дозы."
"Prepare basic fertilizer, suitable for fertilizing simple flowers and some vegetables. Creates three doses.": "Приготовьте базовое удобрение, подходящее для удобрения простых цветов и некоторых овощей. Создаёт три дозы."
"An alternate way to create basic fertilizer that uses ground seeds as the key ingredient. Creates three doses.": "Альтернативный способ создать базовое удобрение, в котором в качестве ключевого ингредиента используются молотые семена. Создаёт три дозы."
"An alternate way to create basic fertilizer that uses rotten meat as the key ingredient. Creates three doses.": "Альтернативный способ создать простое удобрение, в котором гнилое мясо используется как основной ингредиент. Создаёт три дозы."
"For healing moderate injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения умеренных травм. Животные могут использовать эти бомбы с умением Бомба первой помощи."
"For healing moderate injuries. Used by First Aid abilities.": "Для лечения умеренных травм. Используется способностями первой помощи."
"Creates a meal of pan-fried tofu cubes with a side dish of roasted carrots.  Requires a stove or fire pit. Feeds three.": "Создаёт блюдо из обжаренных на сковороде кубиков тофу с гарниром из запечённой моркови. Требуется плита или кострище. Накормит троих."
"A simple, watery, slightly insipid beer.": "Простое, водянистое, слегка пресное пиво."
"Create 1000 basic long-range arrows.": "Создаёт 1000 обычных дальнобойных стрел."
"Concoct a plantable aggressive fungal turret pre-programmed to attack your enemies.": "Создайте сажаемую агрессивную грибную турель, запрограммированную на атаку ваших врагов."
"Creates a delicious dessert. Or a full meal any time. You're an adult, you decide when to eat pie. Requires a stove or fire pit.": "Создаёт восхитительный десерт. Или полноценный приём пищи в любое время. Вы взрослый человек, вам решать, когда есть пирог. Требуется плита или кострище."
"Creates a liquid used in cheesemaking. (Yields 2 rennet.)": "Создаёт жидкость, используемую в сыроварении. (Выход: 2 фермента.)"
"Create 1000 basic reservoir arrows.": "Создайте 1000 базовых стрелок резервуара."
"Creates padding for a saddle.": "Создаёт подкладку для седла."
"A metal frame for attaching a torch to a wall.\n\nMust be near a forge.": "Металлическая рамка для крепления факела к стене.\\n\\nДолжна находиться рядом с кузницей."
"Creates a snack. Serves 2. Requires a stove or fire pit.": "Создаёт закуску. Порций: 2. Требуется плита или костровище."
"A basic skinning knife for novice skinners. (+2 to your effective skill when skinning.)\n\nMust be near a forge.": "Простой нож для снятия шкур для начинающих охотников. (+2 к вашему эффективному навыку при снятии шкур.)\n\nДолжен находиться рядом с кузницей."
"For creating equipment that enables Necromancy.": "Для создания снаряжения, позволяющего использовать Некромантию."
"Create 1000 basic snare arrows.": "Создайте 1000 обычных стрел-ловушек."
"A porous sticky cloth that's useful for some basic garments.": "Пористая липкая ткань, полезная для некоторых простых предметов одежды."
"Concoct explosive fungal bombs. The result is dangerous to most creatures, but especially to those that are momentarily Vulnerable.": "Создавайте взрывные грибные бомбы. Их эффект опасен для большинства существ, особенно для тех, кто временно Уязвим."
"A knife designed for throwing. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Нож, предназначенный для метания. (Используется с боевым навыком Нож.) Рецепт создаёт 10 ножей."
"Creates a meatless turkey substitute. Requires a stove or fire pit. Feeds three.": "Создаёт заменитель индейки без мяса. Требуется плита или костровище. Накормит троих."
"A basic whittling knife for novice whittlers. Must be near a forge.": "Простой нож для резьбы по дереву для начинающих резчиков. Нужно находиться рядом с кузницей."
"Turn good wood into junk (mostly). It's good practice!\n\nAlso buffs your Knife Damage +45 for 1 hour.": "Превратите хорошую древесину в хлам (в основном). Это хорошая практика!\n\nТакже увеличивает урон ножом на +45 на 1 час."
"Etch the magical rune for bats onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магическую руну летучих мышей на малахите, чтобы при использовании в рецептах ремесла он был настроен только на этот вид."
"A potion that boosts Battle Chemistry skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Боевой химии на 20%."
"Creates an awesomely delicious drink.": "Создаёт потрясающе вкусный напиток."
"An arrangement of flowers beloved by bees, and thus indirectly beloved by people who love to see bees happy.": "Композиция из цветов, любимых пчёлами, а значит, косвенно любимых и теми, кто любит видеть пчёл счастливыми."
"Creates a classic beef and broccoli dish. Requires a stove or fire pit.": "Создаёт классическое блюдо из говядины и брокколи. Требуется плита или костровище."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:09 minutes then bake for approximately 00:15 minutes": "Создаёт блюдо. Требуется плита или костровище. Для лучшего результата дайте тесту подойти примерно 00:09 минут, затем выпекайте примерно 00:15 минут"
"Creates a pretty basic fish dish. Requires a stove or fire pit. ": "Создаёт довольно простое рыбное блюдо. Требуется плита или кострище. "
"A sweet, relatively palatable variety of vodka. Although it's a traditional dwarven drink, it long ago fell out of favor, and these days dwarves only use it for cooking.": "Сладкий, относительно приятный на вкус сорт водки. Хотя это традиционный напиток гномов, он давно вышел из моды, и теперь гномы используют его только для готовки."
"Prepares a cask of vodka for aging. The cask must then be stored in a cave until it is mature.": "Подготавливает бочку водки к выдержке. Затем бочку нужно хранить в пещере, пока водка не созреет."
"Infuses gloves or gauntlets with the following power: Slashing Damage Reduction +3, Acid Damage Reduction +3. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 17.": "Насыщает перчатки или латные рукавицы следующей силой: Снижение рубящего урона +3, Снижение урона кислотой +3. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 17."
"Create 1000 beginner's arrows.": "Создайте 1000 стрел новичка."
"Create a bundle of 1000 arrow shafts for beginner-level arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 стрелковых древков для стрел начального уровня. Они помещены в сушильный ящик и готовы к сушке."
"Create a bundle of 1000 flinty arrowheads for beginner-level arrows.": "Создайте связку из 1000 кремнёвых наконечников для стрел начального уровня."
"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor.": "Изучите кости, органы или части тела погибшего существа, чтобы получить подсказку о вашем будущем. Вам может не понравиться то, что вы увидите, но шансы на добрый знак на вашей стороне."
"Create 1000 beginner's barbed arrows.": "Создайте 1000 шипастых стрел новичка."
"Infuses a chestplate or shirt with the following power: Max Armor +18. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 8.": "Насыщает нагрудник или рубашку следующей силой: Max Armor +18. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 8."
"Infuses gloves or gauntlets with the following power: Epic Attack Damage +25. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 16.": "Насыщает перчатки или латные рукавицы следующей силой: Эпический урон от атаки +25. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 16."
"Infuses boots or shoes with the following power: Max Armor +15. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 1.": "Насыщает сапоги или обувь следующей силой: Max Armor +15. Использует 100 очков ремесла на предмете и добавляет требование: уровень 1 Шаманской инфузии."
"Infuses a ring with the following power: Power from Combat Refresh Abilities +3. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 9.": "Насыщает кольцо следующей силой: Сила от боевых восстанавливающих умений +3. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 9."
"Infuses boots or shoes with the following power: Psychology Base Damage +4%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 19.": "Насыщает сапоги или ботинки следующей силой: базовый урон Психологии +4%. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 19."
"Creates a \"drink\", technically.": "Создаёт «напиток», технически."
"Infuses a chestplate or shirt with the following power: Crushing Damage Reduction +3, Trauma Damage Reduction +3. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 15.": "Насыщает нагрудник или рубашку следующей силой: Снижение дробящего урона +3, Снижение травматического урона +3. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 15."
"Infuses boots or shoes with the following power: Sprint Speed Boost +0.5. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 10.": "Насыщает сапоги или обувь следующей силой: ускорение скорости бега +0.5. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 10."
"Infuses a necklace with the following power: Max Health +10. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 2.": "Насыщает ожерелье следующей силой: Max Health +10. Использует 100 очков ремесла на предмете и добавляет требование: уровень 2 Шаманской инфузии."
"Infuses pants or skirts with the following power: Max Armor +18. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 5.": "Насыщает штаны или юбки следующей силой: Max Armor +18. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 5."
"Infuses a necklace with the following power: Max Power +8. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 13.": "Насыщает ожерелье следующей силой: Max Power +8. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 13."
"Create 1000 beginner's dense arrows.": "Создайте 1000 плотных стрел для новичков."
"Crafts a belt with the following power: +12% Projectile Evasion": "Создаёт пояс со следующей силой: +12% уклонения от снарядов"
"Infuses a necklace with the following power: Psi Health Wave Healing +5. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 23.": "Насыщает ожерелье следующей силой: Исцеляющая волна здоровья псионики +5. Использует 100 очков ремесла на предмете и добавляет требование: уровень 23 Шаманской инфузии."
"Create 1000 beginner's long-range arrows.": "Создайте 1000 длинных стрел для новичков."
"Infuses a ring with the following power: Mentalism Base Damage +4%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 21.": "Насыщает кольцо следующей силой: базовый урон Ментализма +4%. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 21."
"Infuses a helmet or headgear with the following power: Signature Debuff Power Cost -6. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 12.": "Насыщает шлем или головной убор следующей силой: Стоимость силы фирменного ослабления -6. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 12."
"Infuses a ring with the following power: Max Health +10. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 6.": "Насыщает кольцо следующей силой: Max Health +10. Использует 100 очков ремесла на предмете и добавляет требование: уровень 6 Шаманской инфузии."
"Crafts a belt with the following power: +3 Inventory Slots": "Создаёт пояс со следующим свойством: +3 слота инвентаря"
"Create 1000 beginner's reservoir arrows.": "Создайте 1000 стрел-резервуаров новичка."
"Infuses a helmet or headgear with the following power: Max Metabolism +15, Max Hydration +10. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 25.": "Насыщает шлем или головной убор следующей силой: Max Metabolism +15, Max Hydration +10. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 25."
"Infuses pants or skirts with the following power: Sprint-Swimming Speed Boost +1, Breath Recovered In Partial Water +6. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 27.": "Насыщает штаны или юбки следующей силой: ускорение скорости спринта и плавания +1, восстановление дыхания в частично заполненной водой среде +6. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 27."
"Create 1000 beginner's snare arrows.": "Создайте 1000 стрел-ловушек для новичков."
"Practice tailoring with spider silk. The resulting items are junk, but it's good practice.": "Практикуйте портняжное дело с паучьим шёлком. Получающиеся предметы — мусор, но это хорошая практика."
"Practice tailoring with yarn. The resulting items are junk, but it's good practice.": "Практикуйтесь в портняжном деле с пряжей. Получающиеся предметы — мусор, но для тренировки это хорошо."
"Infuses gloves or gauntlets with the following power: Max Armor +13. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 4.": "Насыщает перчатки или латные рукавицы следующей силой: Max Armor +13. Использует 100 очков ремесла на предмете и добавляет требование: уровень 4 Шаманской инфузии."
"Infuses pants or skirts with the following power: Power Regen (In-Combat) +1. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 11.": "Насыщает штаны или юбки следующей силой: восстановление силы (в бою) +1. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 11."
"Infuses a chestplate or shirt with the following power: Burst Accuracy Boost +8%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 46.": "Насыщает нагрудник или рубашку следующей силой: Взрывной бонус к точности +8%. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 46."
"Infuses gloves or gauntlets with the following power: Melee Accuracy Boost +8%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 47.": "Насыщает перчатки или латные рукавицы следующей силой: усиление точности ближнего боя +8%. Использует 100 очков ремесла на предмете и добавляет требование: уровень 47 Инфузии шамана."
"Infuses a helmet or headgear with the following power: Ranged Accuracy Boost +8%. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 45.": "Насыщает шлем или головной убор следующей силой: Усиление точности дальнего боя +8%. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 45."
"Infuses pants or skirts with the following power: Fast-Flying Speed Boost +0.5, Flying Cost (Per Second In Combat) -0.5. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 19.": "Насыщает штаны или юбки следующей силой: ускорение скорости полёта +0.5, стоимость полёта (в секунду в бою) -0.5. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 19."
"Infuses a chestplate or shirt with the following power: Power Regen (In-Combat) +1. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 3.": "Насыщает нагрудник или рубашку следующей силой: Восстановление силы (в бою) +1. Использует 100 очков ремесла на предмете и добавляет требование: уровень 3 Шаманской инфузии."
"Infuses a helmet or headgear with the following power: Max Armor +13. Uses 100 Craft Points on the item and adds a requirement of Shamanic Infusion level 7.": "Насыщает шлем или головной убор следующей силой: Max Armor +13. Использует 100 очков ремесла на предмете и добавляет требование: уровень Шаманской инфузии 7."
"Dye used to color armor beige. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в бежевый цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"A belt that enhances Animal Handling damage.": "Пояс, который усиливает урон от Обращения с животными."
"A belt that enhances Archery damage.": "Пояс, который усиливает урон от Стрельбы из лука."
"A belt that enhances Bard damage.": "Пояс, который усиливает урон барда."
"A belt that enhances Battle Chemistry damage.": "Пояс, который усиливает урон Боевой алхимии."
"A belt that enhances Rabbit damage.": "Пояс, который усиливает урон Кролика."
"A belt that enhances Druid damage.": "Пояс, который усиливает урон друида."
"A belt that enhances Fire Magic damage.": "Пояс, который усиливает урон Огненной магии."
"A belt that enhances Hammer damage.": "Пояс, который усиливает урон Молотом."
"A belt that enhances Ice Magic damage.": "Пояс, который усиливает урон от Ледяной магии."
"A belt that enhances Knife damage.": "Пояс, который усиливает урон ножом."
"A belt that enhances Mentalism damage.": "Пояс, который усиливает урон Ментализма."
"A belt that enhances Necromancy damage.": "Пояс, усиливающий урон Некромантии."
"A belt that enhances Priest damage.": "Пояс, который усиливает урон жреца."
"A belt that enhances Psychology damage.": "Пояс, который усиливает урон от Психологии."
"A belt that enhances Shield damage.": "Пояс, который усиливает урон Щита."
"A belt that enhances Spirit Fox damage.": "Пояс, который усиливает урон Духовной Лисы."
"A belt that enhances Staff damage.": "Пояс, который усиливает урон посоха."
"A belt that enhances Sword damage.": "Пояс, который усиливает урон мечом."
"A belt that enhances Unarmed damage.": "Пояс, который усиливает урон Безоружного боя."
"A belt that enhances Warden damage. One size fits all. Somehow.": "Пояс, усиливающий урон Стража. Один размер подходит всем. Как-то так."
"A belt that enhances Weather Witching damage.": "Пояс, который усиливает урон от Колдовства погоды."
"A belt that enhances Lycanthropy damage.": "Пояс, который усиливает урон от Ликантропии."
"Combine the substance from several small Hate Pearls into a single large container.": "Соберите вещество из нескольких маленьких Жемчужин Ненависти в один большой контейнер."
"A large metal hoop used in making casks.": "Большое металлическое кольцо, используемое при изготовлении бочек."
"Ties your soul to a particular Teleportation Circle so that you can return to it via \"Recall Alternate Circle\". You must be standing on a Teleportation Circle.": "Привязывает вашу душу к определённому кругу телепортации, чтобы вы могли вернуться к нему через \"Вспомнить альтернативный круг\". Вы должны стоять на круге телепортации."
"Ties your soul to a particular Teleportation Circle so that you can return to it via Teleportation magic. You must be standing on a Teleportation Circle.": "Привязывает вашу душу к определённому Кругу телепортации, чтобы вы могли возвращаться к нему с помощью магии телепортации. Вы должны стоять на Круге телепортации."
"Prepare a bird feed suitable for any bird.": "Приготовьте корм для птиц, подходящий для любой птицы."
"Creates a potent drink.": "Создаёт крепкий напиток."
"Creates a pile of flavored black foot morel mushroom flakes.": "Создаёт горку ароматизированных хлопьев из гриба черноногого сморчка."
"Creates a rather murky heterogeneous mixture of mushroom bits in water.": "Создаёт довольно мутную гетерогенную смесь кусочков грибов в воде."
"Creates an exotic meal that lasts for two hours instead of one.": "Создает экзотическое блюдо, которое действует два часа вместо одного."
"Creates a dry bland chicken dish. Requires a stove or fire pit.": "Создаёт сухое пресное блюдо из курицы. Требуется плита или кострище."
"Creates a very dry but edible turkey dish. Requires a stove or fire pit.": "Создаёт очень сухое, но съедобное блюдо из индейки. Требуется плита или костровище."
"Creates a very simple version of the classic human cookie. Edible, but probably best used for decoration. Requires a stove or fire pit.": "Создаёт очень простую версию классического печенья в форме человечка. Съедобно, но, вероятно, лучше всего подходит для украшения. Требуется плита или костровище."
"Creates a tasty meal. Requires a stove or fire pit.": "Готовит вкусное блюдо. Требуется плита или кострище."
"A thick blue paste that accelerates the leg muscles beyond their natural capacity.": "Густая синяя паста, которая ускоряет мышцы ног сверх их естественных возможностей."
"Creates a pile of powdered Blood mushrooms.": "Создаёт кучку порошка из кровавых грибов."
"Creates a disgusting but healthful mushroom concoction.": "Создаёт отвратительный, но полезный грибной напиток."
"For 30 minutes, all your Lycanthropy attacks will deal +20% damage. This advanced version of the so-called Sanguinizer potion can only be made during the full moon.": "В течение 30 минут все ваши атаки в Ликантропии будут наносить на 20% больше урона. Эту усовершенствованную версию так называемого зелья Сангвинизатор можно изготовить только в полнолуние."
"Dye used to color armor blue. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в синий цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Dye used to color armor blue violet. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в сине-фиолетовый цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Create a cask of a blue cheese with a surprisingly floral smell that tastes like raw meat. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с удивительно цветочным запахом и вкусом сырого мяса. (Требуется плита или кострище.)\n\nТип сыра: Голубой"
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +2 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно придаст бодрости.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +2 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"Cut and clean a bluegill.": "Разделайте и очистите синежабра."
"Creates a pile of flaked Blusher mushrooms.": "Создаёт кучку измельчённых грибов-блашеров."
"Create a \"flavorful\" mushroom concoction. Some people have even learned to appreciate the taste.": "Создайте «вкусный» грибной напиток. Некоторые даже научились ценить его вкус."
"Creates a simple dish of boiled cabbage. Requires a stove or fire pit.": "Создаёт простое блюдо из варёной капусты. Требуется плита или кострище."
"Prepares raw crab meat for eating. Requires a stove or fire pit.": "Подготавливает сырое мясо краба для еды. Требуется плита или костровище."
"Creates a pile of flaked Boletus mushrooms.": "Создаёт горку измельчённых грибов болетус."
"Turn old bones into powder. Bone meal has uses in Alchemy, Gardening, Mushroom Farming, and Necromancy.": "Превратите старые кости в порошок. Костная мука используется в Алхимии, Садоводстве, Выращивании грибов и Некромантии."
"Cut and clean a bonefish.": "Разделайте и очистите костяную рыбу."
"Prepares fruit in a sweet syrup.": "Готовит фрукты в сладком сиропе."
"Made from fermented corn mash, this is very mellow and drinkable. This is the favored drink of Councilwoman Sereel \"The Steel\" Avenbule. She holds a bourbon competition each year in Vidaria.": "Изготовлен из ферментированной кукурузной браги, этот напиток очень мягкий и легко пьётся. Это любимый напиток советницы Серил \"Сталь\" Авенбуль. Каждый год она устраивает в Видарии конкурс бурбона."
"Prepares a cask of bourbon for aging. The cask must then be stored in a cave until it is mature.": "Подготавливает бочку бурбона к выдержке. Затем бочку нужно хранить в пещере, пока бурбон не созреет."
"Infuses a bow with the following power: Archery Accuracy +8. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Точность стрельбы из лука +8. Эффект длится до тех пор, пока вы не совершите 1250 атак из лука. Пока оружие усилено, для него требуется уровень стрельбы из лука 15. Завершение этого рецепта впервые обучает вас следующему уровню этого рецепта."
"Infuses a bow with the following power: Archery Accuracy +10. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 25. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Точность Стрельбы из Лука +10. Эффект длится, пока вы не совершите 1250 атак из лука. Пока оружие усилено, для него требуется уровень Стрельбы из Лука 25. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a bow with the following power: Archery Accuracy +12. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 35. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Меткость Стрельбы из Лука +12. Эффект длится до тех пор, пока вы не совершите 1250 атак из Лука. Пока оружие усилено, для него требуется уровень Стрельбы из Лука 35. При первом успешном создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a bow with the following power: Archery Accuracy +14. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 45": "Наполняет лук следующей силой: Точность стрельбы из лука +14. Эффект длится до тех пор, пока вы не совершите 1250 атак из лука. Пока усиление активно, для оружия требуется уровень Стрельбы из лука 45"
"Infuses a bow with the following power: Archery Accuracy +16. The benefit lasts until you have made 2000 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 55": "Наполняет лук следующей силой: Меткость стрельбы из лука +16. Эффект действует до тех пор, пока вы не совершите 2000 выстрелов из лука. Пока усиление активно, для оружия требуется уровень Стрельбы из лука 55"
"Infuses a bow with the following power: Archery Accuracy +18. The benefit lasts until you have made 2000 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 65": "Наполняет лук следующей силой: Точность Стрельбы из Лука +18. Эффект длится, пока вы не совершите 2000 атак из лука. Пока оружие усилено, для него требуется уровень Стрельбы из Лука 65"
"Infuses a bow with the following power: Archery Accuracy +20. The benefit lasts until you have made 2000 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 75. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Точность стрельбы из лука +20. Эффект сохраняется до совершения 2000 атак из лука. Пока оружие усилено, оно требует уровень стрельбы из лука 75. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a bow with the following power: Archery Accuracy +22. The benefit lasts until you have made 2500 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 85. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Точность стрельбы из лука +22. Эффект длится до тех пор, пока вы не совершите 2500 атак из лука. Пока оружие усилено, для него требуется уровень стрельбы из лука 85. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a bow with the following power: Anatomy Critical Hit Damage +4%. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: урон критического удара по анатомии +4%. Эффект длится до совершения 1250 атак из лука. Пока лук усилен, для его использования требуется уровень Стрельбы из лука 15. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a bow with the following power: Anatomy Critical Hit Damage +6%. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 25. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет лук следующей силой: Урон критического удара по анатомии +6%. Эффект длится до совершения 1250 атак из лука. Пока усиление активно, оружие требует уровень Стрельбы из лука 25. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a bow with the following power: Anatomy Critical Hit Damage +8%. The benefit lasts until you have made 1250 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 35. Completing this recipe for the first time teaches you the next tier of this recipe.": "Насыщает лук следующей силой: Урон от критического удара по анатомии +8%. Эффект длится до совершения 1250 атак из лука. Пока лук усилен, для него требуется уровень Стрельбы из лука 35. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
