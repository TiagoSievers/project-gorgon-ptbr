"Creates a meal for one. Requires a stove or fire pit (to melt the cheese just so).": "Создаёт еду на одного. Требует плиту или костровище (чтобы как раз расплавить сыр)."
"Create a very sweet brown cheese made with sour cream. (Requires a stove or fire pit.)\n\nCheese Type: Whey": "Создайте очень сладкий коричневый сыр из сметаны. (Требуется плита или кострище.)\n\nТип сыра: Сывороточный"
"Creates a belt buckle that will boost your Hammer Base Damage percentage.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая увеличит процент базового урона молота.\n\nПримечание: эта пряжка будет настроена на вас, создателя."
"Creates a belt buckle that will give you a small flat bonus to Hammer damage.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая даёт небольшой постоянный бонус к урону молотом.\n\nПримечание: эта пряжка будет настроена на вас, создателя."
"Creates a belt buckle that will reduce the Power cost of your Hammer abilities.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая уменьшит расход Силы на ваши способности Молота.\n\nПримечание: эта пряжка будет настроена на вас, создателя."
"Creates a belt buckle that will speed up your Pound to Slag reuse time.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая ускорит время восстановления вашего Приёма «Измельчение в пепел».\\n\\nПримечание: эта пряжка будет настроена на вас, создателя."
"Creates a belt buckle that will provide you with bonus armor.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая даст вам бонус к броне.\\n\\nПримечание: эта пряжка будет настроена на вас, создателя."
"Creates a belt buckle that will periodically heal you when you use Hammer abilities.\n\nNote: this buckle will be attuned to you, the crafter.": "Создаёт пряжку для пояса, которая периодически исцеляет вас при использовании способностей молота.\n\nПримечание: эта пряжка будет настроена на вас, создателя."
"Dye used to color armor burly wood. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в цвет крепкого дерева. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Creates a meal for one. Requires a stove or fire pit.": "Создаёт порцию еды на одного. Требуется плита или костровище."
"Pare down a higher-quality piece of meat into a lower-quality one.": "Обрежьте более качественный кусок мяса до более низкокачественного."
