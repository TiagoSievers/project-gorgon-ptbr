"Level 70 gloves, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Перчатки 70-го уровня, пропитанные магией. Максимальное зачарование создаёт предметы на уровень редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной стойкой.)"
"Level 70 leggings, infused with magic. (Must be near a tanning rack.)": "Штаны 70-го уровня, наполненные магией. (Должны находиться рядом с дубильной стойкой.)"
"Level 70 leggings, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Поножи 70-го уровня, напитанные магией. Максимальное зачарование создаёт предметы на уровень редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной рамой.)"
"Level 70 chest armor, infused with magic. (Must be near a tanning rack.)": "Нагрудная броня 70 уровня, наполненная магией. (Должно быть рядом с дубильной стойкой.)"
"Level 70 chest armor, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Нагрудная броня 70-го уровня, наполненная магией. Максимальное зачарование создаёт предметы на один уровень Редкости выше, чем они были бы иначе. (Нужно находиться рядом с дубильной рамой.)"
"A hat designed to be worn by giant bat magicians.": "Шляпа, созданная для ношения магами-гигантскими летучими мышами."
