"For an hour, all acid damage is reduced by 25, potentially eliminating the damage entirely.": "В течение часа весь урон от кислоты уменьшается на 25, что может полностью исключить урон."
"For one hour, all cold damage is reduced by 25, potentially eliminating the damage entirely, and Max Body Heat is raised by 50.": "В течение одного часа весь урон от холода уменьшается на 25, что может полностью устранить урон, а максимальное телесное тепло увеличивается на 50."
"Hardened metal pins used in armorsmithing. Makes 5 bundles.": "Закалённые металлические штифты, используемые в кузнечном деле доспехов. Изготавливает 5 связок."
"This strange cloth is luxurious to the touch, yet incredibly strong.": "Эта странная ткань приятна на ощупь и при этом невероятно прочна."
"A dollop of cold, fruit-flavored magical liquid that will change your beard color permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-вкусной магической жидкости, которая навсегда изменит цвет вашей бороды. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"A dollop of cold, fruit-flavored magical liquid that will change your beard style permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-ароматной магической жидкости, которая навсегда изменит стиль вашей бороды. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"A dollop of cold, fruit-flavored magical liquid that will change your hair color permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-вкусной магической жидкости, которая навсегда изменит цвет ваших волос. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"A dollop of cold, fruit-flavored magical liquid that will change your hairstyle permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-вкусной магической жидкости, которая навсегда изменит вашу прическу. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"Spin retted flax into magical cloth. (Must be near a cotton gin.)": "Прядите вымоченный лен в магическую ткань. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +28 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +28 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"Analyze and decompose a Fae Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте череп Фэй, чтобы получить практический опыт френологии для этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Fae Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите впечатляющий череп фей, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Fae Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разлагайте Удивительный Череп Фей, чтобы получить практический опыт френологии для этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"An elegant silk with supernatural lightness and toughness.": "Элегантный шёлк с сверхъестественной лёгкостью и прочностью."
"A dollop of cold, fruit-flavored magical liquid that will change your skin or fur color permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-вкусной магической жидкости, которая навсегда изменит цвет вашей кожи или меха. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"A dollop of cold, fruit-flavored magical liquid that will change your wing-style permanently. Brewing this potion consumes 10 Fae Energy.\n\nNOTE: this item can melt and should be consumed quickly after brewing.": "Капля холодной, фруктово-ароматной магической жидкости, которая навсегда изменит стиль ваших крыльев. Приготовление этого зелья расходует 10 энергии фей.\n\nПРИМЕЧАНИЕ: этот предмет может расплавиться и должен быть быстро использован после приготовления."
"Creates a one-use emergency blanket.": "Создаёт одноразовое аварийное одеяло."
"Create a pleasantly sweet semi-hard cheese. (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте приятно сладкий полутвёрдый сыр. (Требуется плита или кострище.)\n\nТип сыра: Полутвёрдый"
"Conjures a semi-real snack-like substance. It tastes good, but can only nourish the body for a short while. It can also melt, so eat it quickly!": "Создаёт полу-реальное вещество, похожее на закуску. На вкус приятно, но может питать тело лишь недолго. Также может растаять, так что ешьте быстро!"
"Conjure a ball of elemental energy from the fae realm. It does nothing, but it's pretty.": "Вызовите шар элементальной энергии из царства фей. Он ничего не делает, но выглядит красиво."
"Etch the magical rune for fairy magic onto a topaz, so that it has a chance to yield fairy magic powers when used in crafting recipes.": "Вырежьте магическую руну волшебства фей на топазе, чтобы при использовании в рецептах ремесел он имел шанс дать силы волшебства фей."
"Conjures a heavily glamoured meal-like substance. It tastes good, but can only nourish the body for a short while. It can also melt, so eat it quickly!": "Вызывает сильно замаскированное вещество, похожее на еду. На вкус оно хорошее, но может питать тело лишь недолго. Также оно может растаять, так что ешьте быстро!"
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item and has a place for a custom message that all visitors will see.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдавать до 1000 штук одного вида предмета и имеет место для пользовательского сообщения, которое увидят все посетители."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 50 raffle tickets for up to 6 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user.": "Сложное устройство, которое может выдавать билеты на розыгрыш и затем вручать награду победителю.\n\nЭта модель может выдать до 50 билетов на розыгрыш для до 6 предметов (или стопок предметов) и/или денежного приза. Билеты на розыгрыш могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item and has a place for a custom message that all users will see.": "Сложное устройство, которое может выдавать предметы и собирать валюту. Эта модель может продавать до 1000 единиц одного вида предмета и имеет место для пользовательского сообщения, которое увидят все пользователи."
"Creates a wonderful meal pie. (A pie so good that you should just eat it by itself as a meal.) Requires a stove or fire pit.": "Создаёт великолепный пирог-обед. (Пирог настолько вкусный, что его можно есть как самостоятельное блюдо.) Требуется плита или кострище."
"Creates a hearty meal. Serves 2. Requires a stove or fire pit.": "Создаёт сытное блюдо. На 2 порции. Требуется плита или кострище."
"This box can be used to grow a crop of mushrooms.\nGrow Time: 20% faster than normal\nXP Penalty: -50% XP per mushroom": "Эта коробка может использоваться для выращивания урожая грибов.\\nВремя выращивания: на 20% быстрее обычного\\nШтраф к опыту: -50% опыта за каждый гриб"
"A lemony liquid designed to counter the effects of severe Pineal Gland abuse.": "Лимонная жидкость, предназначенная для нейтрализации последствий сильного злоупотребления шишковидной железой."
"For 30 minutes, all your attacks will deal +10% damage, but your Max Power will be reduced by 50.": "В течение 30 минут все ваши атаки будут наносить на 10% больше урона, но ваш максимальный запас силы уменьшится на 50."
"Create a cask of a brined cheese with a clean, slightly sour taste. (Requires a stove or fire pit.)\n\nCheese Type: Brine": "Создайте бочку рассольного сыра с чистым, слегка кислым вкусом. (Требуется плита или кострище.)\n\nТип сыра: Рассольный"
"Creates a pile of flaked field mushrooms.": "Создаёт кучу хлопьев из луговых грибов."
"A large knife for cutting meat and organs out of corpses (+5 to your effective skill when Butchering). (Keep it in your inventory and you'll have the option to butcher the corpses of some enemies.)\n\nMust be near a forge.": "Большой нож для отделения мяса и органов от трупов (+5 к вашему эффективному навыку при разделке). (Держите его в инвентаре, и у вас появится возможность разделывать трупы некоторых врагов.)\\n\\nДолжен находиться рядом с кузницей."
"Increase your Maximum Tempest Energy +5 through a supposedly-ancient (but actually fairly modern) ritual. The ritual need only be performed once; the effects are permanent. It must be performed outdoors while suffering from at least two diseases and two curses.": "Увеличьте вашу максимальную энергию Бури на +5 с помощью якобы древнего (на самом деле довольно современного) ритуала. Ритуал нужно выполнить только один раз; эффект постоянный. Его необходимо проводить на улице, одновременно страдая как минимум от двух болезней и двух проклятий."
"Porous cotton that's resistant to heat. Ideal for creating mold cheeses that take a long time to ripen.": "Пористый хлопок, устойчивый к нагреву. Идеально подходит для создания плесневых сыров, которые требуют длительного созревания."
"Create smooth yarn from prepared cotton.": "Создайте гладкую пряжу из подготовленного хлопка."
"A potion that boosts Fire Magic skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Огненной магии на 20%."
"Research a new Fire Magic spell. You can discover 6 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание Огненной магии. Вы можете открыть 6 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Fire Magic spell. You can discover 7 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание Огненной магии. Вы можете открыть 7 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Fire Magic spell. You can discover 5 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Огненной магии. Вы можете открыть 5 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Fire Magic spell. You can discover 8 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание Огненной магии. Вы можете открыть 8 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"For one hour, all fire damage is reduced by 5, potentially eliminating the damage entirely.": "В течение одного часа весь урон от огня уменьшается на 5, что может полностью устранить урон."
"For an hour, all fire damage is reduced by 5, potentially eliminating the damage entirely. In addition, any enemies that strike you take 25 fire damage.": "В течение часа весь огненный урон уменьшается на 5, что может полностью его устранить. Кроме того, любые враги, которые вас ударят, получают 25 огненного урона."
"A small cask used in dairy food production.": "Небольшая бочка, используемая в производстве молочных продуктов."
"Creates a block of firm tofu that holds together well. Requires a tofu press.": "Создаёт блок плотного тофу, который хорошо держит форму. Требуется пресс для тофу."
"Etch the magical rune for first aid onto a garnet, so that it is attuned to that skill when used in crafting recipes.": "Вырежьте магическую руну первой помощи на гранате, чтобы при использовании в рецептах ремёсел она была настроена на этот навык."
"Creates a pleasant meal. Requires a stove or fire pit.": "Готовит вкусное блюдо. Требуется плита или кострище."
