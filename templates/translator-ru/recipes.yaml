"A subdued display of flowers that reduces feelings of rage and hate, allowing greater focus in combat.\n\nGrants +15 Melee Accuracy. Orcs also gain +5% Combat XP.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 5.": "Сдержанная цветочная композиция, которая уменьшает чувство ярости и ненависти, позволяя лучше сосредоточиться в бою.\\n\\nДарует +15 к точности в ближнем бою. Орки также получают +5% боевого опыта.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 5."
