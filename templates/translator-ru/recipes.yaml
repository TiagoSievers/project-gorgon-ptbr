"Sends an item to your mystic saddlebag. Only usable when you have a mystic saddlebag equipped.": "Отправляет предмет в вашу мистическую седельную сумку. Можно использовать только при наличии экипированной мистической седельной сумки."
"Records the location of a mineral deposit in or around Serbule. The resulting survey requires Geology 8 to use.": "Фиксирует местоположение месторождения минералов в Сербуле или вокруг него. Для использования полученного обследования требуется Геология 8."
