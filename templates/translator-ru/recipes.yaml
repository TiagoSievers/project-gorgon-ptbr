"Creates an instant-healing snack. Requires a stove or fire pit.": "Создаёт мгновенно исцеляющую закуску. Требуется плита или кострище."
"Cut and clean a shark.": "Разрежьте и очистите акулу."
"Three skewers of seafood and vegetables. Requires a stove or fire pit.": "Три шампура с морепродуктами и овощами. Требуется плита или кострище."
