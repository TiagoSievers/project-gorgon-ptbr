"Level 50 pants altered to make you less obtrusive, and infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack, for some reason.)": "Штаны 50-го уровня, изменённые так, чтобы вы были менее заметны, и напитанные магией. Максимальное зачарование создаёт предметы на один уровень Редкости выше, чем они были бы иначе. (По какой-то причине нужно находиться рядом с дубильной рамой.)"
"Level 50 shirt altered to make you less obtrusive, and infused with magic. (Must be near a tanning rack, for some reason.)": "Рубашка 50-го уровня, изменённая так, чтобы вы меньше бросались в глаза, и наполненная магией. (По какой-то причине нужно находиться рядом с дубильной рамой.)"
"Level 50 shirt altered to make you less obtrusive, and infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack, for some reason.)": "Рубашка 50-го уровня, изменённая так, чтобы вы были менее заметны, и насыщенная магией. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем они были бы иначе. (По какой-то причине нужно находиться рядом с дубильным станком.)"
"Creates a sweet dessert snack. Requires a stove or fire pit.": "Создаёт сладкий десертный перекус. Требуется плита или кострище."
"Creates a snack for three.": "Создаёт закуску на троих."
"Creates a sweet tart treat from the tart fruit. Requires a stove or fire pit.": "Создаёт сладкое кисловатое лакомство из кислого фрукта. Требуется плита или кострище."
"Create a simple cheese that's often used melted in other recipes. (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте простой сыр, который часто используется расплавленным в других рецептах. (Требуется плита или кострище.)\n\nТип сыра: Полутвёрдый"
"A refreshing summer wine. When prepared by a master brewer, this is the perfect outdoor party wine.": "Освежающее летнее вино. Приготовленное мастером-виноделом, это идеальное вино для вечеринки на свежем воздухе."
"Rough cloth for industrial uses.": "Грубая ткань для промышленных нужд."
"A very complicated device that can help with tricky pathology inquiries. (+10 to your effective skill when autopsying a corpse.)": "Очень сложное устройство, которое может помочь в трудных патологоанатомических исследованиях. (+10 к вашему эффективному навыку при вскрытии трупа.)"
"Manually remove the seeds from cotton and stretch it out for yarn production. This manual method is extremely slow compared to using a cotton gin.": "Вручную удалите семена из хлопка и растяните его для производства пряжи. Этот ручной метод чрезвычайно медленный по сравнению с использованием хлопкоочистительной машины."
"Remove the seeds and prepare cotton with a cotton gin. Because of your expert skill, there is a higher chance of obtaining Perfect Cotton. (Must be near a cotton gin.)": "Удалите семена и подготовьте хлопок с помощью хлопкоочистительной машины. Благодаря вашему экспертному навыку выше шанс получить Идеальный хлопок. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"Remove the seeds and prepare cotton with a cotton gin. Because of your master skill, less raw cotton is required. (Must be near a cotton gin.)": "Удалите семена и подготовьте хлопок с помощью хлопкоочистительной машины. Благодаря вашему мастерству требуется меньше сырого хлопка. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"Remove the seeds and prepare cotton with a cotton gin. 35% of the time you also manage to collect enough quality fibers to make a bundle of Perfect Cotton, too. (Must be near a cotton gin.)": "Удалите семена и подготовьте хлопок с помощью хлопкоочистительной машины. В 35% случаев вам также удаётся собрать достаточно качественных волокон, чтобы сделать ещё и пучок Идеального хлопка. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"Dye used to color armor carnelian red. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в карнеолово-красный цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Cut and clean a carp.": "Разделайте и очистите карпа."
"Given that it was made from carrots, this wine is... surprisingly good!": "Учитывая, что оно сделано из моркови, это вино... на удивление хорошее!"
"Creates a snack that serves 2.": "Создаёт закуску, которой хватает на 2 порции."
"Creates a drink. Requires a stove or fire pit. There is a 10% chance the Meat Tenderizer will break.": "Создаёт напиток. Требуется плита или костровище. Есть 10% шанс, что Мясной размягчитель сломается."
"Cut and clean a catfish.": "Разделать и очистить сома."
"The liquid in this cauldron is sure to cause hallucinations and may bring out latent magic effects in unpredictable ways. It's insanely dangerous.": "Жидкость в этом котле наверняка вызовет галлюцинации и может непредсказуемым образом пробудить скрытые магические эффекты. Это безумно опасно."
"Cut and clean a cavefish.": "Разделайте и очистите пещерную рыбу."
"Creates an \"interesting\" snack food. Yields 2. Requires a stove or fire pit.": "Создаёт «интересную» закуску. Даёт 2. Требует плиту или костровище."
"A tiny wooden exoskeleton sized for a giant butterfly.": "Крошечный деревянный экзоскелет, предназначенный для гигантской бабочки."
"A collection of 1000 dowels that could be turned into arrow shafts by a fletcher.": "Набор из 1000 шкантов, которые стрелок мог превратить в древки стрел."
"A well-made wooden mesh, useful for cages, pens, trellises, and so on.": "Хорошо сделанная деревянная сетка, полезная для клеток, загонов, шпалер и так далее."
"A framework for building a mushroom grow-box.": "Каркас для создания ящика для выращивания грибов."
"Creates small chips of cedar perfect for smoking fish and meats.": "Создаёт небольшую щепу из кедра, идеально подходящую для копчения рыбы и мяса."
"Creates small chips of cedar perfect for smoking fish and meats. This version uses a perfect piece of wood to create a large amount of usable chips.": "Создаёт мелкие щепки из кедра, идеально подходящие для копчения рыбы и мяса. Эта версия использует идеальный кусок древесины, чтобы получить большое количество пригодных щепок."
"Creates a pile of glowing mushroom flakes.": "Создаёт кучку светящихся грибных хлопьев."
"Dye used to color armor chartreuse. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в цвет шартрез. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Tune your mind to the secret communications of the Wardens.": "Настройте свой разум на тайные сообщения Стражей."
"Porous cotton that's resistant to heat. Ideal for creating hard cheeses.": "Пористая хлопковая ткань, устойчивая к жаре. Идеально подходит для приготовления твёрдых сыров."
"Creates baked potatoes with all the toppings... except sour cream and bacon. Serves 2. Requires a stove or fire pit.": "Создаёт печёный картофель со всеми добавками... кроме сметаны и бекона. Порций: 2. Требуется плита или костровище."
"Create a pleasantly mild semi-hard cheese. (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте приятно мягкий полутвёрдый сыр. (Требуется плита или кострище.)\n\nТип сыра: Полутвёрдый"
"Prepares a delicious meal. Requires a stove or fire pit.": "Готовит вкусное блюдо. Требуется плита или костровище."
"Creates a tasty snack. Requires a stove or fire pit.": "Создаёт вкусную закуску. Требуется плита или кострище."
"Prepares a strange dish that is said to be appealing to psychic mantises. Other races find it... tolerable.": "Готовит странное блюдо, которое, как говорят, привлекает пси-богомолов. Другие расы находят его... терпимым."
"Prepares a delicious meal. Serves 2. Requires a stove or fire pit.": "Готовит вкусное блюдо. Порций: 2. Требуется плита или костровище."
"Creates a pleasant meal. Serves 2. Requires a stove or fire pit.": "Создаёт приятное блюдо. Порций: 2. Требуется плита или костровище."
"Cut and clean a chub.": "Разделайте и очистите голавля."
"This variety of cider is made from sour apples and has a complex array of taste sensations. Pity you won't remember the taste after blacking out from it...": "Этот сорт сидра делают из кислых яблок, и у него сложный букет вкусовых ощущений. Жаль, что вы не запомните его вкус после того, как потеряете сознание от него..."
"Prepares a cask of cider for aging. The cask must then be stored in a cave until it is mature.": "Готовит бочку сидра для выдержки. Затем бочку нужно хранить в пещере, пока сидр не созреет."
"Creates a snack for four. Requires a stove or fire pit.": "Создаёт закуску на четверых. Требуется плита или костровище."
"Infuses a claw with the following power: Unarmed Accuracy +8. The benefit lasts until you have made 1250 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет коготь следующей силой: Точность без оружия +8. Эффект длится до тех пор, пока вы не совершите 1250 атак без оружия. Пока коготь наточен, для его использования требуется уровень без оружия 15. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a claw with the following power: Unarmed Accuracy +10. The benefit lasts until you have made 1250 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 25. Completing this recipe for the first time teaches you the next tier of this recipe.": "Насыщает коготь следующей силой: Точность без оружия +10. Эффект длится до тех пор, пока вы не совершите 1250 атак без оружия. Пока коготь заточен, для его использования требуется уровень Безоружного боя 25. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a claw with the following power: Unarmed Accuracy +12. The benefit lasts until you have made 1250 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 35. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет коготь следующей силой: Точность без оружия +12. Эффект длится до совершения 1250 атак без оружия. Пока коготь наточен, для его использования требуется уровень Безоружного боя 35. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a claw with the following power: Unarmed Accuracy +14. The benefit lasts until you have made 1250 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 45": "Наполняет коготь следующей силой: Точность без оружия +14. Эффект длится до тех пор, пока вы не совершите 1250 атак без оружия. Пока коготь заточен, для него требуется уровень Без оружия 45"
"Infuses a claw with the following power: Unarmed Accuracy +16. The benefit lasts until you have made 2000 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 55": "Наполняет коготь следующей силой: Точность Безоружного боя +16. Эффект длится, пока вы не совершите 2000 атак без оружия. Пока коготь заточен, для него требуется уровень Безоружного боя 55"
"Infuses a claw with the following power: Unarmed Accuracy +18. The benefit lasts until you have made 2000 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 65": "Наполняет коготь следующей силой: Точность без оружия +18. Эффект длится, пока вы не совершите 2000 атак без оружия. Пока коготь наточен, для его использования требуется уровень без оружия 65"
"Infuses a claw with the following power: Unarmed Accuracy +20. The benefit lasts until you have made 2000 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 75. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет коготь следующей силой: Точность без оружия +20. Эффект длится до совершения 2000 атак без оружия. Пока коготь наточен, для его использования требуется уровень Безоружного боя 75. При первом успешном создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a claw with the following power: Unarmed Accuracy +22. The benefit lasts until you have made 2500 Unarmed attacks. While sharpened, the weapon has a requirement of Unarmed level 85. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет коготь следующей силой: Точность без оружия +22. Эффект длится до тех пор, пока вы не совершите 2500 атак без оружия. Пока коготь заточен, для его использования требуется уровень Без оружия 85. При первом выполнении этого рецепта вы изучаете следующий уровень этого рецепта."
"Peel, wash, and de-vein a shrimp.": "Очистите, промойте и удалите кишечную вену у креветки."
"A pristine flower arrangement that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +3% Combat XP when clean and -3% Combat XP when filthy. Duration: 4 hours.\n\nYou can only have one flower arrangement benefit at a time.": "Безупречная цветочная композиция, которая подчёркивает красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +3% боевого опыта, когда чисты, и -3% боевого опыта, когда грязны. Длительность: 4 часа.\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
