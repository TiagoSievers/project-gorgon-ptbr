"A box for storing up to 20 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Ящик для хранения до 20 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получивший доступ к ящику, может хранить свои собственные предметы. Все ящики позволяют игроку получить доступ к одним и тем же предметам.)"
"Level 50 winter boots, infused with magic. (Must be near a tanning rack.)": "Зимние сапоги 50 уровня, наполненные магией. (Нужно находиться рядом с шкуросъемным станком.)"
"Level 50 winter boots, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние сапоги 50 уровня, наполненные магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемной стойкой.)"
"Level 60 ring infused with cold-damage-boosting magic.": "Кольцо 60 уровня, наполненное магией, усиливающей холодный урон."
"Level 60 ring infused with cold-damage-boosting magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Кольцо 60 уровня, наполненное магией, усиливающей холодный урон. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 50 winter gloves, infused with magic. (Must be near a tanning rack.)": "Зимние перчатки 50 уровня, наполненные магией. (Должны находиться рядом с шкуротеркой.)"
"Level 50 winter gloves, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние перчатки 50 уровня, наполненные магией. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Нужно находиться рядом с шкуросъемной стойкой.)"
"Level 50 winter headgear, infused with magic. (Must be near a tanning rack.)": "Зимний головной убор 50 уровня, наполненный магией. (Должен находиться рядом с сушильной стойкой.)"
"Level 50 winter headgear, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимний головной убор 50 уровня, наполненный магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Level 50 winter pants, infused with magic. (Must be near a tanning rack.)": "Зимние штаны 50 уровня, наполненные магией. (Нужно находиться рядом с шкуросъемной рамой.)"
"Level 50 winter pants, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Зимние штаны 50 уровня, наполненные магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемной стойкой.)"
"Level 50 horseshoes, but for a cow, and made of wood.": "Подковы 50 уровня, но для коровы, и сделаны из дерева."
"Level 50 horseshoes, but for a deer, and made of wood.": "Подковы 50 уровня, но для оленя, и сделаны из дерева."
"A pleasant smell that evokes the forest without burying you in it.": "Приятный аромат, вызывающий воспоминания о лесу, но не погружающий вас в него."
"A small metal hoop used in making casks.": "Небольшой металлический обруч, используемый для изготовления бочек."
"A potion that boosts Rabbit skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Кролика на 20%."
"Etch the magical rune for rabbits onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магическую руну для кроликов на малахите, чтобы он был настроен только на этот вид при использовании в рецептах ремесла."
"Create a semi-firm cheese used in making a dish by the same name (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте полутвёрдый сыр, используемый для приготовления блюда с тем же названием (Требуется плита или кострище.)\n\nТип сыра: Полутвёрдый"
"Cut and clean a radiant muskie.": "Разрежьте и очистите сияющую щуку."
"For 30 minutes, your attacks cause 25% less Rage, preventing enemies from using their Rage attacks as often.": "В течение 30 минут ваши атаки вызывают на 25% меньше Ярости, что препятствует частому использованию врагами их атак Ярости."
"For 30 minutes, your attacks cause 50% less Rage, preventing enemies from using their Rage attacks as often.": "В течение 30 минут ваши атаки вызывают на 50% меньше ярости, что препятствует частому использованию врагами их атак ярости."
"For 15 minutes, your attacks cause double Rage to enemies, allowing them to use their Rage attacks more often.": "В течение 15 минут ваши атаки наносят врагам двойную Ярость, позволяя им чаще использовать свои атаки Ярости."
"Cut and clean a rainbow trout.": "Порежьте и очистите радужную форель."
"Creates a sweet and fruity fish-on-a-stick dish. Requires a stove or fire pit. ": "Создаёт сладкое и фруктовое рыбное блюдо на палочке. Требуется плита или кострище. "
"For one hour, you do not feel any urge to fight or argue with loved ones, no matter how stupid, callous, or irresponsible they may behave.": "В течение одного часа вы не испытываете желания сражаться или спорить с близкими, независимо от того, насколько глупо, черство или безответственно они себя ведут."
"Analyze and decompose a Rakshasa Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите череп ракшасы, чтобы получить практический опыт в френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Rakshasa Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите впечатляющий череп ракшасы, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Rakshasa Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите изумительный череп ракшасы, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Create a one-use beacon that can summon Ranalon when used in a certain place.": "Создаёт однократный маяк, который может призвать Раналон при использовании в определённом месте."
"Creates a complex and heady salad. Serves five.": "Создаёт сложный и насыщенный салат. На пять порций."
"Creates a ... drink.": "Создаёт ... напиток."
"Create a strong block of padding, perfect for lining boxes and dresser drawers. Recipe creates 2 liners. (Must be near a tanning rack.)": "Создайте прочный слой набивки, идеально подходящий для выстилки коробок и ящиков комода. Рецепт создаёт 2 подкладки. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Create a sheet of dried, untanned leather. (Must be near a tanning rack.)": "Создаёт лист высушенной, невыделанной кожи. (Необходимо находиться рядом с стойкой для выделки.)"
"A thin fluid used to create augmentation oils (for level 50 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 50 уровня). Создаёт пять доз. ПРИМЕЧАНИЕ: этот устаревший рецепт больше не используется для усиления!"
"Sends you back to the alternate Teleportation Circle you are bound to. You must be standing on a Teleportation Circle.": "Отправляет вас обратно к альтернативному Кругу Телепортации, к которому вы привязаны. Вы должны стоять на Круге Телепортации."
"Sends you back to the alternate Teleportation Circle you are bound to. You do not need to be in a Teleportation Circle to use this technique, but this technique has a 60-minute cooldown before it can be used again.": "Отправляет вас обратно к альтернативному Кругу Телепортации, к которому вы привязаны. Для использования этой техники не нужно находиться в Круге Телепортации, но у неё есть время восстановления в 60 минут перед повторным использованием."
"Sends you back to the Teleportation Circle you are bound to. You must be standing on a Teleportation Circle.": "Отправляет вас обратно к Кругу Телепортации, к которому вы привязаны. Вы должны стоять на Круге Телепортации."
"Sends you back to the Teleportation Circle you are bound to. You do not need to be in a Teleportation Circle to use this technique, but this technique has a 60-minute cooldown before it can be used again.": "Отправляет вас обратно к Телепортационному Кругу, к которому вы привязаны. Для использования этой техники не обязательно находиться в Телепортационном Круге, но у неё есть перезарядка в 60 минут перед повторным использованием."
"Teleports you to the animal camp in Gazluk. Can be used once per hour.": "Телепортирует вас в зверинец в Газлуке. Можно использовать раз в час."
"Sends you to the Teleportation Circle that you have recalled from the highest number of times in your life. You must be standing on a Teleportation Circle.": "Отправляет вас к Кругу Телепортации, к которому вы возвращались больше всего раз за всю жизнь. Вы должны стоять на Круге Телепортации."
"Sends you back to the Teleportation Circle you last Recalled to. (Normally this would be the one you are bound to, unless you've bound to a different location since your last teleport.) You must be standing on a Teleportation Circle.": "Возвращает вас к Кругу Телепортации, к которому вы последний раз вызывались. (Обычно это тот, к которому вы привязаны, если только вы не привязались к другому месту с момента последнего телепорта.) Вы должны стоять на Круге Телепортации."
"Teleports you to the Serbule docks. Can be used once per hour.": "Телепортирует вас к причалам Сербуля. Можно использовать один раз в час."
"Sends you to a Teleportation Circle that you have recalled to relatively recently. You must be standing on a Teleportation Circle.": "Отправляет вас к Кругу Телепортации, к которому вы недавно делали возврат. Вы должны стоять на Круге Телепортации."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +4 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +4 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Dye used to color armor red. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в красный цвет. Опыт начисляется только при первом успешном создании по этому рецепту."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +18 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +18 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Cut and clean a red snapper.": "Разрежьте и очистите красного луциана."
"Cut and clean a redfish.": "Разрежьте и очистите красную рыбу."
"Add +3 Armor to a pair of metal gauntlets or gloves. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +3 к броне паре металлических рукавиц или перчаток. Требует 20 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +3 Armor to a pair of metal gauntlets or gloves. Consumes 5 Craft Points. (Must be near a forge.)": "Добавляет +3 к броне паре металлических рукавиц или перчаток. Требует 5 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +4 Armor to a metal helmet. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +4 брони к металлическому шлему. Требует 20 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +4 Armor to a metal helmet. Consumes 5 Craft Points. (Must be near a forge.)": "Добавляет +4 к броне металлическому шлему. Требует 5 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +5 Armor to a pair of metal pants. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +5 брони к паре металлических штанов. Требует 20 очков ремесла. (Должен находиться рядом с кузницей.)"
"Add +5 Armor to a pair of metal pants. Consumes 5 Craft Points. (Must be near a forge.)": "Добавляет +5 брони к паре металлических штанов. Требует 5 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +5 Armor to a metal shirt or chestplate. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +5 брони к металлической рубашке или кирасе. Требует 20 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +5 Armor to a metal shirt or chestplate. Consumes 5 Craft Points. (Must be near a forge.)": "Добавляет +5 брони к металлической рубашке или кирасе. Требует 5 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +3 Armor to a pair of metal boots. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +3 к броне к паре металлических ботинок. Требует 20 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"Add +3 Armor to a pair of metal boots. Consumes 5 Craft Points. (Must be near a forge.)": "Добавляет +3 к броне паре металлических сапог. Требует 5 очков ремесла. (Необходимо находиться рядом с кузницей.)"
"An arrangement of calming flowers that helps one relax.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 50%.": "Композиция успокаивающих цветов, которая помогает расслабиться.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 50%."
"An arrangement of calming flowers that helps one relax.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 100%.": "Композиция успокаивающих цветов, которая помогает расслабиться.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 100%."
"An arrangement of calming flowers that helps one relax.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 200%.": "Композиция успокаивающих цветов, помогающая расслабиться.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 200%."
"A calming display of relaxing flowers that helps you get comfortable.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 50%.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 10.": "Успокаивающая композиция из расслабляющих цветов, которая помогает вам устроиться поудобнее.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 50%.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 10."
"A calming display of relaxing flowers that helps you get comfortable.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 100%.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 50.": "Успокаивающая композиция расслабляющих цветов, которая помогает вам устроиться поудобнее.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 100%.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 50."
"A calming display of relaxing flowers that helps you get comfortable.\n\nWhen you rest in a chair or a bed, the resultant Comfort effect is increased by 200%.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 90.": "Успокаивающая композиция из расслабляющих цветов, которая помогает вам почувствовать себя комфортно.\\n\\nКогда вы отдыхаете в кресле или на кровати, эффект Комфорта увеличивается на 200%.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 90."
"Create a very sturdy flask.\n\nMust be near a forge.": "Создайте очень прочную флягу.\n\nДолжен находиться рядом с кузницей."
"Repair a very sturdy flask.\n\nMust be near a forge.": "Отремонтировать очень прочную флягу.\n\nНеобходимо находиться рядом с кузницей."
"Remove all pockets, reinforcements, enhancements, and augments so that a piece of leather armor has all of its Crafting Points restored. (Must be near a tanning rack.)": "Удалите все карманы, усиления, улучшения и дополнения, чтобы у куска кожаной брони восстановились все очки ремесла. (Необходимо находиться рядом с сушильной стойкой.)"
"Use an Amulite to restore 5-15% of an item's transmutation durability.": "Используйте Амулит, чтобы восстановить 5-15% прочности трансмутации предмета."
"Use 4 small prisms to restore 30%-60% of a level 0-30 item's transmutation durability. After using this recipe on an item, you must wait 4 days before the item can be further repaired.": "Используйте 4 маленьких призмы, чтобы восстановить 30%-60% прочности трансмутации предмета уровня 0-30. После использования этого рецепта на предмете, необходимо подождать 4 дня, прежде чем предмет можно будет отремонтировать снова."
"Use 6 small prisms to restore 60%-100% of a level 0-30 item's transmutation durability. After using this recipe on an item, you must wait 6 days before the item can be further repaired.": "Используйте 6 маленьких призм, чтобы восстановить 60%-100% прочности трансмутации предмета уровня 0-30. После использования этого рецепта на предмете, необходимо подождать 6 дней, прежде чем предмет можно будет снова ремонтировать."
"Use 8 small prisms to restore 100% of a level 0-30 item's transmutation durability. After using this recipe on an item, you must wait 7 days before the item can be further repaired.": "Используйте 8 маленьких призм, чтобы восстановить 100% прочности трансмутации предмета уровня 0-30. После применения этого рецепта к предмету необходимо подождать 7 дней, прежде чем предмет можно будет отремонтировать снова."
"Use 8 medium prisms to restore 100% of a level 31-60 item's transmutation durability. After using this recipe on an item, you must wait 7 days before the item can be further repaired.": "Используйте 8 средних призм, чтобы восстановить 100% прочности трансмутации предмета уровня 31-60. После применения этого рецепта к предмету необходимо подождать 7 дней, прежде чем предмет можно будет снова ремонтировать."
"Use 8 large prisms to restore 100% of a level 61-90 item's transmutation durability. After using this recipe on an item, you must wait 7 days before the item can be further repaired.": "Используйте 8 больших призм, чтобы восстановить 100% прочности трансмутации предмета уровня 61-90. После использования этого рецепта на предмете необходимо подождать 7 дней, прежде чем предмет можно будет снова ремонтировать."
"Use 8 grand prisms to restore 100% of a level 91-120 item's transmutation durability. After using this recipe on an item, you must wait 7 days before the item can be further repaired.": "Используйте 8 больших призм, чтобы восстановить 100% прочности трансмутации предмета уровня 91-120. После использования этого рецепта на предмете необходимо подождать 7 дней, прежде чем предмет можно будет отремонтировать снова."
"Use 15 large prisms to restore 100% of a Mastercrafted item's transmutation durability. Unlike other transmutation-repair recipes, this technique can be used as often as desired.": "Используйте 15 больших призм, чтобы восстановить 100% прочности трансмутации предмета мастерской работы. В отличие от других рецептов ремонта трансмутации, эту технику можно использовать сколько угодно раз."
"Create a bundle of 1000 arrow shafts for resplendent arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 древков для лучистых стрел. Их кладут в сушильный ящик, чтобы они высохли."
"Create a bundle of 1000 resplendently accurate arrowheads for resplendent arrows.": "Создайте связку из 1000 блестяще точных наконечников стрел для блестящих стрел."
"Create 1000 resplendent reservoir arrows.": "Создайте 1000 лучей сияющего резервуара."
"Prepare flax for retting -- that is, rotting -- in water. After retting, it can be spun into linen.": "Подготовьте лен для вымачивания — то есть для гниения — в воде. После вымачивания его можно прясть в лён."
"Teleports you to wherever your guild's home position is set to. Costs 2 Guild Credits. Your guild must have a Guild Hall in order to use this recipe.": "Телепортирует вас в место, где установлена домашняя позиция вашей гильдии. Стоимость 2 кредита гильдии. Ваша гильдия должна иметь зал гильдии для использования этого рецепта."
"Dump out a beer keg and clean the container so it can be used again. There's a small chance that the container will be too damaged to be reused.": "Вылейте пивную бочку и очистите контейнер, чтобы его можно было использовать снова. Есть небольшой шанс, что контейнер будет слишком поврежден для повторного использования."
"Dump out a cask of hard liquor and clean the container so it can be used again. There's a small chance the barrel will be too damaged to be reused.": "Вылейте содержимое бочки с крепким напитком и очистите ёмкость, чтобы её можно было использовать снова. Есть небольшой шанс, что бочка будет слишком повреждена для повторного использования."
"Tools for refining the balance and movement of weapons. Includes restringing kit.": "Инструменты для улучшения баланса и подвижности оружия. Включает набор для перетяжки."
"Tools for refining the balance and movement of weapons. Includes restringing kit. Must be near a forge.": "Инструменты для настройки баланса и движения оружия. Включает набор для перемотки тетивы. Нужно находиться рядом с кузницей."
"A very dry wine that's quite drinkable.": "Очень сухое вино, которое вполне можно пить."
"Create a spreadable cheese that's very mild and slightly sweet. (Requires a stove or fire pit.)\n\nCheese Type: Whey": "Создайте намазываемый сыр с очень мягким и слегка сладким вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Сывороточный"
"Create a spreadable cheese with an aggressive, cloying taste. (Requires a stove or fire pit.)\n\nCheese Type: Whey": "Создайте намазываемый сыр с агрессивным, приторным вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Сывороточный"
"Cut and clean a river salmon.": "Разрежьте и очистите речного лосося."
"Creates a snack for 3. Requires a stove or fire pit.": "Создаёт закуску на 3. Требуется плита или кострище."
"A long-term storage solution for pets. The built-in entertainment options raise the contained pets' Happiness by 20. Pets kept in this cage for more than 28 days will escape and be lost. One use only.": "Долговременное хранилище для питомцев. Встроенные развлечения повышают счастье содержащихся питомцев на 20. Питомцы, находящиеся в этой клетке более 28 дней, сбегут и будут потеряны. Одноразовое использование."
"Creates comfortable padding for a saddle.": "Создаёт удобную подкладку для седла."
"Designed for longer transit periods, this travel cage provides basic sustenance and comfort for a short time. Pets kept in this cage for more than 7 days (or more specifically, 168 hours) will escape and be lost. One use only.": "Созданная для длительных перевозок, эта переносная клетка обеспечивает базовое питание и комфорт на короткое время. Домашние питомцы, содержащиеся в этой клетке более 7 дней (или точнее, 168 часов), сбегут и будут потеряны. Одноразовое использование."
"Cut and clean a rock carp.": "Разрежьте и очистите каменного карпа."
"Create a blue cheese with a relatively mild taste. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте голубой сыр с относительно мягким вкусом. (Требуется плита или кострище.)\n\nТип сыра: Голубой"
"Dye used to color armor rosy brown. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в красновато-коричневый цвет. Опыт даётся только при первом выполнении этого рецепта."
"Creates a mechanized rotor that spins continuously when you hold it a certain way.": "Создаёт механизированный ротор, который вращается непрерывно, когда вы держите его определённым образом."
"Rots a big stack of perfectly good meat.": "Гниёт большую кучу совершенно хорошего мяса."
"Turn a perfectly good strawberry into a perfectly bad one. Magic? No! It's alchemy!": "Превратите совершенно хорошую клубнику в совершенно плохую. Магия? Нет! Это алхимия!"
"A gripping outdoor scent that will make you excited to grip things.": "Захватывающий уличный аромат, который заставит вас с азартом хвататься за вещи."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x4.": "Одноразовый стол для выполнения каллиграфии. Установите его, чтобы увеличить длительность каллиграфии в 4 раза."
"Level 10 boots. (Must be near a forge.)": "Сапоги 10 уровня. (Требуется находиться рядом с кузницей.)"
