"Creates a pile of powdered Milk Cap Mushrooms": "Создаёт кучу порошка из грибов Молочника"
"Creates special cushions of warmth that help incubate baby bees and wasps in the egg. Each can be used only once.": "Создаёт специальные подушки тепла, которые помогают высиживать детёнышей пчёл и ос в яйце. Каждую можно использовать только один раз."
"Creates a cold, creamy, minty ... thing. It must be eaten quickly before it melts!": "Создаёт холодное, сливочное, мятное... нечто. Его нужно съесть быстро, пока оно не растаяло!"
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 20 free raffle tickets for 1 or 2 items (or item stacks) and/or a small cash prize.": "Сложное устройство, которое может выдавать бесплатные билеты на розыгрыш и затем вручать награду победителю.\\n\\nЭта модель может выдать до 20 бесплатных билетов на розыгрыш для 1 или 2 предметов (или стопок предметов) и/или небольшой денежный приз."
"A thin fluid used to create augmentation oils (for level 40 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Тонкая жидкость, используемая для создания масел усиления (для эффектов 40 уровня). Создаёт пять доз. ПРИМЕЧАНИЕ: этот устаревший рецепт больше не используется для усиления!"
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 2 ability.": "Маленькое острое лезвие, покрытое густой чёрной слизью. Этот предмет используется способностью Отравленное лезвие 2."
"A small sharp blade coated in a toxic goo that's especially deadly to wolves and lycanthropes. This item is used by the Wolfsbane Blade ability.": "Небольшой острый клинок, покрытый токсичной слизью, особенно смертоносной для волков и ликантропов. Этот предмет используется в способности Клинок волчьей отравы."
"Create a cask of a white-mold cheese with a pasty and nutty flavor. (Requires a stove or fire pit.)\n\nCheese Type: White": "Создайте бочку сыра с белой плесенью и тестообразным ореховым вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Белый"
"Creates a thick and hearty fish stew. Serves 3. Requires a stove or fire pit.": "Готовит густое и сытное рыбное рагу. На 3 порции. Требуется плита или кострище."
"Creates molasses, an ingredient in many foods and spirits. This recipe yields some usable sugar as well.": "Создаёт мелассу — ингредиент для многих блюд и напитков. Этот рецепт также даёт немного пригодного сахара."
"Create a mildly sweet hard cheese. (Requires a stove or fire pit.)\n\nCheese Type: Hard": "Создайте слегка сладкий твердый сыр. (Требуется плита или кострище.)\\n\\nТип сыра: твердый"
"Creates a snack. Requires a stove or fire pit. For best results, proof for approximately 00:12 minutes then bake for approximately 00:20 minutes": "Создаёт закуску. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:12 минут, затем выпекайте примерно 00:20 минут"
"Consult your references to figure out the current phase of the moon.": "Обратитесь к своим справочникам, чтобы определить текущую фазу луны."
"Increase your Maximum Tempest Energy +5 through a simple but extremely lengthy ritual. The ritual need only be performed once; the effects are permanent. Must be performed near a meditation pillar.": "Увеличьте вашу максимальную энергию Бури на +5 с помощью простого, но чрезвычайно длительного ритуала. Ритуал нужно выполнить только один раз; эффект постоянен. Должен выполняться рядом с колонной медитации."
"Creates a hearty meal. Serves two. Requires a stove or fire pit.": "Готовит сытное блюдо. На двоих. Требуется плита или кострище."
"Create a pulled-curd cheese with a rubbery but sweet taste. (Requires a stove or fire pit.)\n\nCheese Type: Pulled-Curd": "Создайте сыр из тянущегося творога с резиновым, но сладким вкусом. (Требуется плита или кострище.)\n\nТип сыра: Тянущийся творог"
"Cut and clean a mukklo.": "Разрежьте и очистите муккло."
"A surprisingly fruity dark wine.": "Удивительно фруктовое тёмное вино."
"A versatile knife for skinning, butchering, or skull extraction. (Keep it in your inventory and you'll be given the option to skin, butcher, and/or extract the skull of some enemies.)\n\nMust be near a forge.": "Универсальный нож для снятия шкур, разделки и извлечения черепа. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры, разделывать и/или извлекать черепы с трупов некоторых врагов.)\\n\\nДолжен находиться рядом с кузницей."
"Create a flavorful semi-soft cheese. (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте ароматный полумягкий сыр. (Требуется плита или кострище.)\\n\\nТип сыра: Полутвёрдый"
"Create a cask of a blue cheese with a vile smell and a spicy, off-putting flavor that takes practice to enjoy. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с отвратительным запахом и острым, отталкивающим вкусом, который требует практики, чтобы его оценить. (Требуется плита или кострище.)\\n\\nТип сыра: Голубой"
"Creates a hearty meal soup that serves two. Requires a stove or fire pit.": "Готовит сытный суп, рассчитанный на двоих. Требуется плита или кострище."
"When placed in a damp cave, this box can be used to grow a crop of mushrooms.": "При размещении во влажной пещере эта коробка может использоваться для выращивания урожая грибов."
"Create fertilizer for a mushroom grow-box.": "Создайте удобрение для грибного ящика."
"Ties your soul to a particular mushroom circle so that you can return via Teleportation magic. You must be standing in a mushroom circle.": "Привязывает вашу душу к определённому грибному кругу, чтобы вы могли вернуться туда с помощью магии Телепортации. Вы должны стоять в грибном круге."
"Sends you from one mushroom circle to another mushroom circle in your current area.": "Перемещает вас с одного грибного круга на другой в текущей области."
"Sends you to the mushroom circle you have bound to. You must be in a mushroom circle.\n\nThis recipe (or the corresponding un-recall recipe) can be used once per 10 hours, except during the Full Moon, when it can be used every 5 hours.": "Отправляет вас к грибному кругу, к которому вы привязаны. Вы должны находиться в грибном круге.\n\nЭтот рецепт (или соответствующий рецепт отмены вызова) можно использовать раз в 10 часов, за исключением Полнолуния, когда его можно использовать каждые 5 часов."
"Sends you to the mushroom circle you have bound to. You must be in a mushroom circle.\n\nThis recipe (or the corresponding un-recall recipe) can be used once per 14 hours, except during the First-Quarter Moon, when it can be used every 3.5 hours.": "Отправляет вас к грибному кругу, к которому вы привязаны. Вы должны находиться в грибном круге.\n\nЭтот рецепт (или соответствующий рецепт отмены вызова) можно использовать раз в 14 часов, кроме периода первой четверти луны, когда его можно использовать каждые 3,5 часа."
