"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nGrow Time: 50% slower for each crop\nYield: +100% mushrooms per crop\nChance for Second Mushroom Type: 15% per crop\nNote: this box requires 2 doses of substrate": "Эта коробка может выращивать несколько урожаев грибов.\\nДлительность работы коробки: 72 часа\\nВремя выращивания: на 50% дольше для каждого урожая\\nУрожай: на 100% больше грибов за каждый урожай\\nШанс появления второго типа грибов: 15% за каждый урожай\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"A large cask used for aging wine.": "Большая бочка, используемая для выдержки вина."
"Creates a moist and sweet honey ham. Requires a stove or fire pit.": "Создаёт сочную и сладкую медовую ветчину. Требуется плита или костровище."
"Creates a snack. Requires a stove or fire pit. For best results, proof for approximately 00:09 minutes then bake for approximately 00:15 minutes": "Создаёт закуску. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:09 минут, затем выпекайте примерно 00:15 минут"
"Creates a delicious fish dish for those with a big sweet tooth. Requires a stove or fire pit. ": "Создаёт вкусное рыбное блюдо для тех, кто любит сладкое. Требуется плита или кострище. "
"Dye used to color armor honeydew. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в цвет медовой росы. Опыт начисляется только при первом создании по этому рецепту."
"Analyze a piece of equipment to study how it works. The item is not lost or damaged. You can only study each type of item one time -- further study of similar items gains you nothing. You can only perform Hoplology Research once every 5 minutes.": "Проанализируйте предмет снаряжения, чтобы изучить, как он работает. Предмет не теряется и не повреждается. Вы можете изучить каждый тип предмета только один раз — дальнейшее изучение похожих предметов не приносит пользы. Исследование Гоплологии можно проводить не чаще одного раза в 5 минут."
"Creates a meal dish for three.": "Создаёт блюдо на три порции."
"A huge dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Огромный дракон. Люди, которые смотрят на неё, будут смутно вдохновлены создавать лучшее. Действует 5 минут после установки."
"A huge dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Огромный дракон, покрытый золотом. Люди, которые на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A huge gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Огромный грифон, покрытый золотом. Люди, которые на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"A huge gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Огромный грифон. Люди, которые на него смотрят, будут смутно вдохновлены лучше убивать. Длится 5 минут после установки."
"A huge dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Огромный дракон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A huge gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Огромный грифон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены убивать лучше. Длится 10 минут после установки."
"This smelly gel will hyper-accelerate your heart. What could go wrong?": "Этот вонючий гель гиперускорит твое сердце. Что может пойти не так?"
"For one hour, you are immune to sleep effects.": "В течение одного часа вы невосприимчивы к эффектам сна."
"Your hair becomes shiny and clean, without the need for water or soap. Just shake it out really well...": "Ваши волосы становятся блестящими и чистыми, без необходимости в воде или мыле. Просто хорошо встряхните их..."
"Analyze and decompose a Human Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте череп человека, чтобы получить практический опыт френологии для этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Human Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите Впечатляющий Череп Человека, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Human Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте по частям Удивительный Череп Человека, чтобы получить практический опыт френологии для этой расы. Существует 1% шанс, что ваш исследовательский аппарат сломается."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +34 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +34 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Creates a tolerable drink with impressive rehydration effects. The manticore poison is neutralized by the other ingredients. There is a 25% chance the tail tip will be used up.": "Создаёт терпимый напиток с впечатляющим эффектом восстановления влаги. Яд мантикоры нейтрализуется другими ингредиентами. С вероятностью 25% кончик хвоста будет израсходован."
"A simple butcher knife made of magical ice. (Keep it in your inventory and you'll be given the option to butcher the corpses of some enemies.)": "Простой мясницкий нож из магического льда. (Держите его в инвентаре, и вам будет доступна опция разделки трупов некоторых врагов.)"
"Create a mini-kit that will let you cut through a frozen lake and attempt to catch fish. You can leave the hole unattended and wait for the fish to get caught on your bait.": "Создайте мини-набор, который позволит вам прорезать лед на замерзшем озере и попытаться поймать рыбу. Вы можете оставить лунку без присмотра и ждать, пока рыба клюнет на вашу приманку."
"A handsaw made of ice. Suitable for cutting lumber... Until it melts, of course.": "Ручная пила изо льда. Подходит для распиловки древесины... Пока, конечно, не растает."
"A potion that boosts Ice Magic skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка ледяной магии на 20%."
"Research a new Ice Magic spell. You can discover 3 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Ледяной Магии. Вы можете открыть 3 способности, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Ice Magic spell. You can discover 5 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание Ледяной Магии. Вы можете открыть 5 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Ice Magic spell. You can discover 8 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание ледяной магии. Вы можете открыть 8 способностей, неоднократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Ice Magic spell. You can discover 6 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание ледяной магии. Вы можете открыть 6 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Ice Magic spell. You can discover 7 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание ледяной магии. Вы можете открыть 7 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"A simple skinning knife made of magical ice. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)": "Простой нож для снятия шкур, сделанный из магического льда. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры с трупов некоторых врагов.)"
"Cut and clean an icebrook.": "Разрежьте и очистите ледяного ручья."
"Infuses a shield with the following power: Max Armor +12. The wax lasts until you have taken 1250 hits. This variety of Safety Wax does not have any additional wield requirements after it's applied.": "Наполняет щит следующей силой: Максимальная броня +12. Воск действует до тех пор, пока вы не получите 1250 ударов. Этот вид защитного воска не имеет дополнительных требований к владению после нанесения."
"Infuses a shield with the following power: Max Armor +24. The wax lasts until you have taken 1500 hits. This variety of Safety Wax does not have any additional wield requirements after it's applied.": "Наполняет щит следующей силой: Максимальная броня +24. Воск действует, пока вы не получите 1500 ударов. Этот вид защитного воска не требует дополнительных условий для использования после нанесения."
"Infuses a shield with the following power: Max Armor +36. The wax lasts until you have taken 1750 hits. This variety of Safety Wax does not have any additional wield requirements after it's applied.": "Наполняет щит следующей силой: Максимальная броня +36. Воск действует, пока вы не получите 1750 ударов. Этот вид защитного воска не требует дополнительных условий для ношения после нанесения."
"Collects some information about a large supply of metal in the Ilmari Desert. The resulting survey requires Mining 53 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в пустыне Илмари. Для использования полученного обзора требуется Навык Горного дела 53. Месторождения намного сложнее обнаружить, чем обычные карты разведки."
"Collects some information about a large supply of metal in the Ilmari Desert. The resulting survey requires Mining 58 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в пустыне Илмари. Для использования полученного обзора требуется Навык Добычи 58. Месторождения намного сложнее обнаружить, чем обычные карты разведки."
"Collects some information about a large supply of metal in the Ilmari Desert. The resulting survey requires Mining 43 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в пустыне Илмари. Для использования полученного обследования требуется Навык Горного дела 43. Залежи металла гораздо сложнее обнаружить, чем обычные карты обследования."
"Collects some information about a large supply of metal in the Ilmari Desert. The resulting survey requires Mining 48 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в пустыне Илмари. Для использования полученного обследования требуется Навык Горного дела 48. Главные месторождения найти гораздо сложнее, чем обычные карты обследований."
"Use clues to plot the location of buried treasure in the Ilmari Desert. The resulting treasure map may not actually lead to treasure, depending on your skill and (to a larger extent) the quality of your clues.": "Используйте подсказки, чтобы определить местоположение зарытого сокровища в пустыне Илмари. Получившаяся карта сокровищ может не привести к настоящему кладу, в зависимости от вашего умения и (в большей степени) качества ваших подсказок."
"A potion that lets you perceive monster spawns before they appear.": "Зелье, позволяющее видеть появление монстров до их появления."
"Creates comfortable and stylish padding for a saddle.": "Создаёт удобную и стильную подкладку для седла."
"THIS RECIPE IS TEMPORARILY UNAVAILABLE! It will be back soon.\n\nAdd a permanent damage buff to a weapon that has been Mastercrafted or Foretold in Prophecy. This recipe has a 33% chance to consume 1 Craft Point. For mystical reasons, the weapon must have an Augment installed in it to use this recipe. (The Augment is not altered and can be removed later if desired.)\n\nTODO: preview damage boost here. Varies between bonuses to different types of damage": "ЭТОТ РЕЦЕПТ ВРЕМЕННО НЕДОСТУПЕН! Скоро он снова появится.\n\nДобавляет постоянное усиление урона оружию, которое было мастерски создано или предсказано в пророчестве. У этого рецепта есть 33% шанс потратить 1 очко ремесла. По мистическим причинам в оружии должен быть установлен усилитель для использования этого рецепта. (Усилитель не изменяется и может быть удалён позже, если потребуется.)\n\nTODO: предварительный просмотр усиления урона здесь. Варьируется между бонусами к разным типам урона"
"Level 110 battle chemistry flask infused with magic. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Колба боевой химии уровня 110, наполненная магией. При первом создании этого рецепта вы изучаете рецепт следующего более высокого уровня."
"Level 110 battle chemistry flask infused with magic. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Колба боевой химии 110 уровня, наполненная магией. При первом создании этого рецепта вы изучаете рецепт следующего, более высокого уровня. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 110 floating gem. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Плавающий самоцвет 110 уровня. При первом создании этого рецепта вы изучаете рецепт следующего, более высокого уровня."
"Level 110 floating gem. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Плавающий самоцвет уровня 110. При первом создании этого рецепта вы изучаете рецепт следующего, более высокого уровня. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 100 giant bat harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Упряжь для гигантских летучих мышей 100 уровня, способная распылять химические вещества во время боя (включая Боевую химию)."
"Level 100 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Магическое оружие гибрид когтя и флакона уровня 100. При первом создании этого рецепта вы изучаете рецепт следующего более высокого уровня."
"Level 100 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Магическое оружие гибрид когтя и флакона уровня 100. При первом создании этого рецепта вы изучаете рецепт следующего, более высокого уровня. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 100 spider harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Паучий наруч 100 уровня, который может распылять химические вещества во время боя (включая Боевую химию)."
"Brings to mind the timeless beauty of a frozen landscape before shattering that image with sensations of warmth.": "Навевает мысли о вечной красоте замерзшего пейзажа, прежде чем разрушить этот образ ощущениями тепла."
"For repairing horrific armor damage. Used by Armor Patching abilities. Crafts 2 kits.": "Для ремонта ужасных повреждений брони. Используется способностями Починки брони. Изготавливает 2 набора."
"Create 1000 incredible arrows.": "Создайте 1000 невероятных стрел."
"Create a bundle of 1000 arrow shafts for incredible arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 стрел для невероятных стрел. Их кладут в сушильный ящик, чтобы они высохли."
"Create a bundle of 1000 incredibly accurate arrowheads for incredible arrows.": "Создайте связку из 1000 невероятно точных наконечников стрел для невероятных стрел."
"This smells less like bacon than some candles, but the smell synergizes with real bacon scent in an incredible way.": "Она пахнет беконом меньше, чем некоторые свечи, но этот аромат невероятно сочетается с настоящим запахом бекона."
"Create 1000 incredible barbed arrows.": "Создайте 1000 невероятных колючих стрел."
"Level 100 boots, infused with magic. (Must be near a tanning rack.)": "Сапоги 100 уровня, наполненные магией. (Должны находиться рядом с шкуродёркой.)"
"Level 100 boots, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Сапоги 100 уровня, наполненные магией. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемной стойкой.)"
"Level 100 headwear, infused with magic. (Must be near a tanning rack.)": "Головной убор 100 уровня, наполненный магией. (Должен находиться рядом с шкурательной стойкой.)"
