"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 55% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 75.": "Элегантная композиция, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 55% шанс получить дополнительный Идеальный хлопок при чесании хлопка.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 75."
"A potion that boosts Cow skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Коровы на 20%."
"Etch the magical rune for cattle onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магический рунический знак для крупного рогатого скота на малахите, чтобы при использовании в рецептах крафта он был настроен только на этот вид."
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Cool Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Прохладная кровь».\n\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"Clean and prepare a crab.": "Очистите и подготовьте краба."
"Creates a simple meal. Serves 2. Requires a stove or fire pit.": "Готовит простое блюдо. На 2 порции. Требуется плита или кострище."
"A delicious seasonal wine.": "Вкусное сезонное вино."
"Creates an amazing dessert. Serves 2. Requires a stove or fire pit.": "Создаёт потрясающий десерт. На 2 порции. Требуется плита или кострище."
"Creates a meatless version of meatballs. Requires a stove or fire pit. Feeds three.": "Создаёт вегетарианскую версию фрикаделек. Требуется плита или кострище. На три порции."
"Creates a meal. Serves 2. Requires a stove or fire pit.": "Создаёт блюдо. На 2 порции. Требуется плита или кострище."
"A substance made of cranium powder, mixed with chemicals that alter its effect.": "Вещество, изготовленное из порошка черепа, смешанного с химикатами, изменяющими его действие."
"Powdered brains of psychic creatures. A choice drug for psychics.": "Порошок из мозгов психических существ. Избранный наркотик для экстрасенсов."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with top-secret special ingredients.": "Зачарованные и измельчённые шишковидные железы разумных существ, смешанные с совершенно секретными специальными ингредиентами."
"Cut and clean a crater gar.": "Разрежьте и очистите кратерного гарра."
"Create a spreadable cheese with a sour taste. (Requires a stove or fire pit.)\n\nCheese Type: Fresh": "Создайте намазываемый сыр с кисловатым вкусом. (Требуется плита или кострище.)\n\nТип сыра: Свежий"
"Creates a hearty soup. Serves 2. Requires a stove or fire pit.": "Готовит сытный суп. На 2 порции. Требуется плита или кострище."
"Creates a snack for one. Requires a stove or fire pit.": "Создаёт закуску для одного. Требуется плита или кострище."
"A pumpkin carved with a scary octopus face.": "Тыква, вырезанная с пугающим лицом осьминога."
"Creates a meal for 2. Requires a stove or fire pit.": "Готовит еду на 2 порции. Требуется плита или кострище."
"Creates a snack. Serves 2.": "Создаёт закуску. На 2 порции."
"Creates a snack for two. Requires a stove or fire pit.": "Создаёт закуску на двоих. Требуется плита или кострище."
"Dye used to color armor crimson. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в алый цвет. Опыт начисляется только при первом успешном создании по этому рецепту."
"Create a bundle of 1000 arrow fletchings for awesome and incredible arrows.": "Создайте связку из 1000 оперений для стрел для потрясающих и невероятных стрел."
"Brews a snack drink. Must be near a stove or fire pit.": "Готовит напиток-закуску. Нужно находиться рядом с печью или кострищем."
"A simple collection of wood bits that allow a sentient spider to use druidic magic.": "Простая сборка деревянных частей, позволяющая разумному пауку использовать друидическую магию."
"This smells like a cold, cold, morning in a fairly-unpleasant-smelling place.": "Она пахнет холодным, холодным утром в довольно неприятном месте."
"It smells like burned bacon! Which isn't a great smell. It makes you really want to eat some bacon, though.": "Пахнет горелым беконом! Это не самый приятный запах. Но от него очень хочется съесть немного бекона."
"A no-nonsense outdoor scent that makes you want to go out and crush things.": "Простой и прямолинейный аромат для улицы, который заставляет вас выйти и сокрушать всё на своём пути."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x5.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы увеличить длительность каллиграфии в 5 раз."
