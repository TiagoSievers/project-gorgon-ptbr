"A pristine display of flowers that enhances the beauty of cleanliness -- and the ugliness of disorder.\n\nElves gain +3% Combat XP when clean and -3% Combat XP when filthy. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Безупречная цветочная композиция, которая подчёркивает красоту чистоты — и уродство беспорядка.\\n\\nЭльфы получают +3% боевого опыта, когда чисты, и -3% боевого опыта, когда грязны. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков."
