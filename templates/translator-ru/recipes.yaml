"Practice leatherworking on a piece of rough leather. The resulting items are junk, but it's good practice.": "Практикуйтесь в кожевенном деле на куске грубой кожи. Получающиеся предметы — хлам, но это хорошая тренировка."
"Create sturdy, but rough, leather. (Must be near a tanning rack.)": "Создаёт прочную, но грубую кожу. (Необходимо находиться рядом с дубильной стойкой.)"
"Level 10 chest armor. (Must be near a tanning rack.)": "Броня для груди 10 уровня. (Нужно находиться рядом с шкуросушильной стойкой.)"
"Level 10 chest armor, infused with magic. (Must be near a tanning rack.)": "Броня для груди 10 уровня, наполненная магией. (Должен находиться рядом с стойкой для выделки кожи.)"
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x4.": "Одноразовый табурет для медитации. Используйте его рядом с Медитационным столбом, чтобы увеличить длительность эффектов медитации в 4 раза."
"Level 10 fighting staff. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 10 уровня. Этот посох подходит для боя посохом и друидизма, но не подходит для огненной магии, ледяной магии или священных сил."
"Level 10 fighting staff, infused with magic. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 10 уровня, наполненный магией. Этот посох подходит для боя посохом и друидизма, но не для огненной магии, ледяной магии или священных сил."
"Level 10 fighting staff. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой жезл 10 уровня. Этот жезл подходит для боя жезлами, друидизма, огненной магии, ледяной магии и жреческого колдовства."
"Level 10 fighting staff, infused with magic. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой посох 10 уровня, наполненный магией. Этот посох подходит для боя посохом, друидизма, огненной магии, ледяной магии и жреческого колдовства."
"Poorly-made tack for a horse. (Must be near a tack bench.)": "Плохо сделанная сбруя для лошади. (Нужно находиться рядом со столом для изготовления сбруи.)"
"Creates a saddlebag with 16 slots. (Must be near a tack bench.)": "Создаёт седельную сумку с 16 ячейками. (Должен находиться рядом с снаряжённым столом.)"
"Pieces of chitin and scraps of metal are held together with thick webbing. This should make a spider somewhat tougher.": "Куски хитина и обрывки металла скреплены толстой паутиной. Это должно сделать паука немного крепче."
"Level 10 horseshoes, but for a cow, and made of wood.": "Подковы 10-го уровня, но для коровы и сделанные из дерева."
"Level 10 horseshoes, but for a deer, and made of wood.": "Подковы 10-го уровня, но для оленя и сделанные из дерева."
"The smell of bark and pollen isn't pleasant, but it turns your thoughts to nature.": "Запах коры и пыльцы не из приятных, но он настраивает ваши мысли на природу."
"Dye used to color armor royal blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в королевский синий цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Boosts maximum health by +40 for 60 minutes. Small chance that you will be turned into a pig permanently.": "Увеличивает максимальное здоровье на +40 на 60 минут. Небольшой шанс, что вы навсегда превратитесь в свинью."
"Creates a snack. Serves 2. Requires a stove or fire pit. Consumes two doses of rum from the provided barrel.": "Создаёт закуску. На 2 порции. Требуется плита или кострище. Потребляет две дозы рома из предоставленной бочки."
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Cold Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Хладнокровная».\\n\\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:05 minutes then bake for approximately 00:09 minutes": "Создаёт блюдо. Требуется плита или кострище. Для лучшего результата дайте тесту подойти примерно 00:05 минут, затем выпекайте примерно 00:09 минут"
"Dye used to color armor saddle brown. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в седельно-коричневый цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Remove the toxic elements of paralytic chicken, leaving the great-tasting meat.": "Удалите токсичные элементы паралитической курицы, оставив мясо с отличным вкусом."
"Infuses a shield with the following power: Max Armor +48 while Shield skill active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 55": "Наполняет щит следующей силой: Максимальная броня +48, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 55"
"Infuses a shield with the following power: Max Armor +64 while Shield skill active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 75": "Наполняет щит следующей силой: Макс Броня +64, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 75"
"Infuses a shield with the following power: Max Armor +72 while Shield skill active. The wax lasts until you have taken 2500 hits. While waxed, the shield has a requirement of Armor Patching level 85": "Наполняет щит следующей силой: Максимальная броня +72, пока активен навык Щит. Воск действует, пока вы не получите 2500 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 85"
"Infuses a shield with the following power: Max Armor +16 while Shield skill active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 15": "Наполняет щит следующей силой: Максимальная броня +16, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 15"
"Infuses a shield with the following power: Max Armor +24 while Shield skill active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 25": "Наполняет щит следующей силой: Макс Броня +24, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока воск нанесён, для щита требуется уровень Ремонт Брони 25"
"Infuses a shield with the following power: Max Armor +32 while Shield skill active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 35": "Наполняет щит следующей силой: Макс. броня +32, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 35"
"Infuses a shield with the following power: Max Armor +40 while Shield skill active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 45": "Наполняет щит следующей силой: Максимальная броня +40, пока навык Щит активен. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока щит покрыт воском, для него требуется уровень Кузнечного дела по ремонту брони 45"
"Infuses a shield with the following power: Max Armor +56 while Shield skill active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 65": "Наполняет щит следующей силой: Максимальная броня +56, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 65"
"Cut and clean a salmon.": "Разрежьте и очистите лосося."
