"Creates a meal dish for a family of four.": "Создаёт блюдо для семьи из четырёх человек."
"Ties your soul to a particular mushroom circle so that you can return via Teleportation magic. You must be standing in a mushroom circle. Costs 10 Fae Energy.": "Привязывает вашу душу к определённому грибному кругу, чтобы вы могли возвращаться с помощью магии Телепортации. Вы должны стоять в грибном круге. Стоимость: 10 Энергии фей."
"Returns you to the mushroom circle that you're tied to. You must be in a mushroom circle. Costs 10 Fae Energy and can be cast once per 30 minutes.": "Возвращает вас к грибному кругу, с которым вы связаны. Вы должны находиться в грибном кругу. Стоит 10 Энергии фей и может быть использовано один раз в 30 минут."
"Teleports you to the entrance of the area you're currently in.": "Телепортирует вас ко входу в область, в которой вы сейчас находитесь."
"While standing in a mushroom circle, return to the fae realm. Can be cast once per 15 minutes.": "Находясь в круге из грибов, вернитесь в мир фей. Можно применять раз в 15 минут."
"A mining pick of orcish make. Similar to a traditional Orcish Mining Pick but with an accelerated rotational device to allow for better mining via stabbing.\n\nMust be near a forge.": "Орочьий шахтёрский кирка. Похожа на традиционный орочий шахтёрский кирку, но с усовершенствованным вращающимся механизмом для более эффективной добычи путём колющих ударов.\\n\\nДолжен находиться рядом с кузницей."
"Level 55 advanced mining pick of Orcish make.": "Продвинутая кирка для добычи 55-го уровня орчьей работы."
"Level 55 advanced mining pick of Orcish make. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Продвинутая кирка для добычи руды 55 уровня, орчьей работы. Максимальное зачарование создаёт предметы на 1 уровень редкости выше, чем они были бы иначе."
"Level 65 advanced mining pick of Orcish make.": "Продвинутая кирка 65 уровня орочьего производства."
"Level 65 advanced mining pick of Orcish make. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Кирка для горного дела 65 уровня орочьего производства. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 75 advanced mining pick of Orcish make.": "Продвинутая кирка для добычи 75 уровня орочьего производства."
"Level 75 advanced mining pick of Orcish make. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Продвинутая кирка для горного дела 75 уровня орочьего производства. Максимальное зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 85 advanced mining pick of Orcish make.": "Продвинутая кирка для горного дела 85 уровня орочьего производства."
"Level 85 advanced mining pick of Orcish make. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Кирка для продвинутой добычи 85 уровня орочьего производства. Макс-Зачарование создаёт предметы на один уровень Редкости выше, чем обычно."
"Level 95 advanced mining pick of Orcish make.": "Продвинутая кирка для добычи 95 уровня орочьего производства."
"Level 95 advanced mining pick of Orcish make. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Кирка для продвинутой добычи 95 уровня орочьего производства. Макс-Зачарование создаёт предметы на один уровень Редкости выше, чем обычно."
"Creates an accelerated rotor that spins furiously when you hold it a certain way.": "Создаёт ускоренный ротор, который бешено вращается, если держать его определённым образом."
"For 30 minutes, your Acid Damage (direct and indirect) is +5": "В течение 30 минут ваш урон кислотой (прямой и косвенный) увеличивается на +5"
"For an hour, all acid damage is reduced by 5, potentially eliminating the damage entirely.": "В течение часа весь урон кислотой уменьшается на 5, что может полностью устранить урон."
"For an hour, all acid damage is reduced by 5, potentially eliminating the damage entirely. In addition, any enemies that strike you take 25 acid damage.": "В течение часа весь кислотный урон уменьшается на 5, что может полностью устранить урон. Кроме того, любые враги, которые ударят вас, получат 25 единиц кислотного урона."
"Infuses a shield with the following power: Melee Attackers suffer 197 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 70": "Наполняет щит следующей силой: Ближние атакующие получают 197 косвенного кислотного урона, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 70"
"Infuses a shield with the following power: Melee Attackers suffer 164 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 60": "Наполняет щит следующей силой: Ближние атакующие получают 164 косвенных кислотных повреждений, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 60"
"Infuses a shield with the following power: Melee Attackers suffer 232 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 80": "Наполняет щит следующей силой: Ближние атакующие получают 232 косвенных кислотных повреждений, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 80"
"Infuses a shield with the following power: Melee Attackers suffer 16 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 10": "Наполняет щит следующей силой: Ближние атакующие получают 16 косвенного кислотного урона, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 10"
"Infuses a shield with the following power: Melee Attackers suffer 126 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 2000 hits. While waxed, the shield has a requirement of Armor Patching level 50": "Наполняет щит следующей силой: Ближние атакующие получают 126 косвенного кислотного урона, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 2000 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 50"
"Infuses a shield with the following power: Melee Attackers suffer 83 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 1500 hits. While waxed, the shield has a requirement of Armor Patching level 40": "Наполняет щит следующей силой: Ближние атакующие получают 83 косвенных кислотных повреждений, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1500 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 40"
"Infuses a shield with the following power: Melee Attackers suffer 55 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 1500 hits. While waxed, the shield has a requirement of Armor Patching level 30": "Наполняет щит следующей силой: Ближние атакующие получают 55 косвенных кислотных повреждений, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1500 ударов. Пока щит покрыт воском, для него требуется уровень Ремонт брони 30"
"Infuses a shield with the following power: Melee Attackers suffer 34 indirect Acid damage while Shield skill Active. The wax lasts until you have taken 1250 hits. While waxed, the shield has a requirement of Armor Patching level 20": "Наполняет щит следующей силой: Ближние атакующие получают 34 косвенных кислотных повреждений, пока активен навык Щит. Воск действует до тех пор, пока вы не получите 1250 ударов. Пока воск нанесён, для щита требуется уровень Ремонт брони 20"
"Add +2 inventory slots to cloth pants. Consumes 12 Craft Points. (Must be near a tanning rack.)": "Добавляет +2 слота инвентаря к тканевым штанам. Потребляет 12 очков ремесла. (Нужно находиться рядом с дубильной рамой.)"
"Add +2 inventory slots to a cloth shirt. Consumes 12 Craft Points. (Must be near a tanning rack.)": "Добавляет +2 слота инвентаря к тканевой рубашке. Потребляет 12 Очков ремесла. (Нужно находиться рядом с дубильной стойкой.)"
"Add +1 inventory slot to leather pants. Consumes 12 Craft Points. (Must be near a tanning rack.)": "Добавляет +1 слот инвентаря к кожаным штанам. Потребляет 12 очков ремесла. (Нужно находиться рядом с дубильной стойкой.)"
"Add +1 inventory slot to a leather shirt. Consumes 12 Craft Points. (Must be near a tanning rack.)": "Добавляет +1 слот инвентаря к кожаной рубашке. Потребляет 12 Очков ремесла. (Нужно находиться рядом с дубильной стойкой.)"
"Add +1 inventory slot to a set of metal-armor pants. Consumes 12 Craft Points. (Must be near a forge.)": "Добавляет +1 слот инвентаря к штанам из металлической брони. Потребляет 12 очков ремесла. (Нужно находиться рядом с кузницей.)"
"Add +1 inventory slot to a metal-armor shirt. Consumes 12 Craft Points. (Must be near a forge.)": "Добавляет +1 слот инвентаря к рубашке из металлической брони. Потребляет 12 очков ремесла. (Нужно находиться рядом с кузней.)"
"Add +2 inventory slots to organic-armor pants. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +2 слота инвентаря к штанам из органической брони. Потребляет 20 очков ремесла. (Нужно находиться рядом с кузней.)"
"Add +2 inventory slots to an organic-armor shirt. Consumes 20 Craft Points. (Must be near a forge.)": "Добавляет +2 слота инвентаря к рубашке из органической брони. Потребляет 20 очков ремесла. (Нужно находиться рядом с кузней.)"
"Create 1000 advanced arrows.": "Создайте 1000 продвинутых стрел."
"Create a bundle of 1000 arrow shafts for advanced arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 древков стрел для продвинутых стрел. Они помещаются в сушильный ящик и готовы к сушке."
"Create a bundle of 1000 arrowheads for advanced arrows.": "Создайте связку из 1000 наконечников стрел для продвинутых стрел."
"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor. This augury tends to have more potent futures -- both good and ill -- than the Basic Augury. It is also more sensitive to the body part used, with more possible outcomes for certain parts.": "Изучите кости, органы или части тела умершего существа, чтобы получить намёк о своём будущем. Вам может не понравиться то, что вы увидите, но шансы на добрый знак на вашей стороне. Это гадание обычно предсказывает более сильные будущие события — как хорошие, так и дурные — чем Базовое гадание. Оно также сильнее зависит от использованной части тела, и для некоторых частей возможны более разнообразные исходы."
"Create 1000 advanced barbed arrows.": "Создайте 1000 продвинутых зазубренных стрел."
"Ink infused with deadly chemicals. It has several uses, but is most commonly used by sigil scripters to create destructive runes. (Creates 5 doses.)": "Чернила, пропитанные смертоносными химикатами. У них есть несколько применений, но чаще всего их используют писцы сигилов для создания разрушительных рун. (Создаёт 5 доз.)"
"Create 1000 advanced dense arrows.": "Создайте 1000 продвинутых плотных стрел."
"Ink infused with many chemicals. It has many uses, but is most prominently used by sigil scripters to create restorative runes. (Creates 3 doses.)": "Чернила, насыщенные множеством химических веществ. У них много применений, но чаще всего их используют писцы сигилов для создания восстанавливающих рун. (Создаёт 3 дозы.)"
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 100 raffle tickets for up to 8 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-60 minutes.": "Сложное устройство, которое может выдавать билеты на розыгрыш и затем вручать награду победителю.\n\nЭта модель может выдать до 100 билетов на розыгрыш для до 8 предметов (или стопок предметов) и/или денежного приза. Билеты на розыгрыш могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю, и сообщение, показываемое только победителю. Также эту модель можно настроить с ограничением времени от 1 до 60 минут."
"Create 1000 advanced long-range arrows.": "Создайте 1000 продвинутых дальнобойных стрел."
"Create 1000 advanced reservoir arrows.": "Создайте 1000 продвинутых стрелок резервуара."
"Create 1000 advanced snare arrows.": "Создайте 1000 продвинутых ловчих стрел."
"Ink infused with fiery chemicals. Used by sigil scripters to create deadly runes. (Creates 5 doses.)": "Чернила, пропитанные огненными химикатами. Используются писцами сигилов для создания смертоносных рун. (Создаёт 5 доз.)"
"A super-thick blue paste that accelerates the leg muscles far beyond their natural capacity.": "Сверхгустая синяя паста, которая ускоряет мышцы ног далеко за пределы их естественных возможностей."
"For an hour, any critical hits deal +10% damage. (Some skills, such as Archery, Mentalism, and Psychology, have special critical-hit chances. Most skills do not, however, in which case this potion does nothing.)": "В течение часа любые критические удары наносят на +10% больше урона. (Некоторые навыки, такие как Стрельба из лука, Ментализм и Психология, имеют особые шансы критического удара. Однако у большинства навыков их нет, и в таком случае это зелье ничего не делает.)"
"Creates a meal that serves 3. Requires a stove or fire pit.": "Создаёт блюдо на 3 порции. Требуется плита или костровище."
"Creates an elegant if simple meal. Requires a stove or fire pit. ": "Создаёт элегантное, хоть и простое блюдо. Требуется плита или костровище. "
"Level 70 giant bat harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Упряжь для гигантской летучей мыши 70-го уровня, которая может распылять химикаты во время боя (открывает Боевую химию)."
"Level 70 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Магическое оружие 70-го уровня, гибрид когтя и флакона. Первое создание этого рецепта обучает вас рецепту следующего, более высокого уровня."
"Level 70 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Магическое оружие 70-го уровня, гибрид когтя и флакона. Первое создание по этому рецепту обучает вас рецепту следующего, более высокого уровня. Максимальное зачарование создаёт предметы на один уровень Редкости выше, чем они были бы иначе."
"Made out of several extraordinary creatures in order to bring extraordinary comfort and utility to sentient spiders. The wood also serves as a focal point for druidic spiders.": "Сделана из нескольких необычных существ, чтобы обеспечить необычайный комфорт и удобство разумным паукам. Дерево также служит фокусом для друидических пауков."
"Level 70 spider harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Упряжь паука 70-го уровня, которая может распылять химические вещества во время боя (открывает Боевую химию)."
"This smells like waking up to a cold dawn around a warming campfire, with a loving pet wolf-dog nearby who's happy you're finally awake.": "Пахнет так, будто вы просыпаетесь на холодном рассвете у согревающего костра, а рядом — любящий волкособ, который рад, что вы наконец проснулись."
"For repairing incredible armor damage. Used by Armor Patching abilities. Crafts 2 kits.": "Для ремонта огромных повреждений брони. Используется способностями починки брони. Создаёт 2 набора."
"A specially-shaped piece of hardened metal. This is used in the making of plate mail armor.\n\nMust be near a forge.": "Специально сформированный кусок закалённого металла. Используется при изготовлении латной брони.\\n\\nДолжен находиться рядом с кузницей."
"Create 1000 amazing arrows.": "Создайте 1000 потрясающих стрел."
"Create a bundle of 1000 arrow shafts for amazing arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 стрел для потрясающих стрел. Их помещают в сушильный ящик, чтобы они высохли."
"Create a bundle of 1000 beautiful arrowheads for amazing arrows.": "Создайте связку из 1000 красивых наконечников стрел для удивительных стрел."
"This smell is a cultivated bacon odor, accentuating the highs and diminishing the lows, making real bacon taste incredible.": "Этот запах — культивированный аромат бекона, подчеркивающий верхние ноты и приглушающий нижние, из-за чего настоящий бекон кажется невероятно вкусным."
"Create 1000 amazing barbed arrows.": "Создайте 1000 удивительных зазубренных стрел."
"Level 70 boots, infused with magic. (Must be near a tanning rack.)": "Сапоги 70-го уровня, наполненные магией. (Нужно находиться рядом с дубильной стойкой.)"
