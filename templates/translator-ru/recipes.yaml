"A clever display of flowers that enhances your perception.\n\nGrants 40% chance of collecting extra fruit and related foraging items, and 25% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 10.": "Умело составленная цветочная композиция, которая улучшает ваше восприятие.\\n\\nДарует 40% шанс собрать дополнительные фрукты и сопутствующие предметы для сбора, а также 25% шанс собрать дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 10."
"A clever display of flowers that enhances your perceptions.\n\nGrants 45% chance of collecting extra fruit and related foraging items, and 30% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 20.": "Умело составленная цветочная композиция, которая усиливает ваше восприятие.\\n\\nДарует 45% шанс собрать дополнительные фрукты и сопутствующие предметы для сбора, а также 30% шанс собрать дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 20."
