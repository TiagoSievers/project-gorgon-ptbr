"Create 1000 breathtaking snare arrows.": "Создайте 1000 захватывающих дух стрел-ловушек."
"Dye used to color armor brick red. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окраски брони в кирпично-красный цвет. Вы получаете XP только в первый раз, когда завершаете этот рецепт."
"Create a cask of a white-mold cheese with a savory taste. (Requires a stove or fire pit.)\n\nCheese Type: White": "Создайте бочку сыра с белой плесенью и пикантным вкусом. (Требуется плита или кострище.)\n\nТип сыра: Белый"
