"Level 5 gloves, infused with magic. WHY?! Oh, right. For practice. (Must be near a tanning rack, for some reason.)": "Перчатки 5 уровня, наполненные магией. ЗАЧЕМ?! Ах да. Для практики. (По какой-то причине нужно находиться рядом с дубильным станком.)"
"Level 5 pants. Not to be worn in public. (Must be near a tanning rack, for some reason.)": "Штаны 5-го уровня. Не предназначены для ношения на публике. (По какой-то причине нужно находиться рядом с шкуросъемной стойкой.)"
"Level 5 pants, infused with magic. WHY?! Oh, right. For practice. (Must be near a tanning rack, for some reason.)": "Штаны 5 уровня, наполненные магией. ЗАЧЕМ?! Ах да. Для практики. (По какой-то причине нужно находиться рядом с дубильной стойкой.)"
"Level 5 shirt. Not to be worn in public. (Must be near a tanning rack, for some reason.)": "Рубашка 5 уровня. Не предназначена для ношения на публике. (По какой-то причине нужно находиться рядом с шкуросъемной стойкой.)"
"Level 5 shirt, infused with magic. WHY?! Oh, right. For practice. (Must be near a tanning rack, for some reason.)": "Рубашка 5 уровня, наполненная магией. ЗАЧЕМ?! Ах да. Для практики. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 5 slippers. (Must be near a tanning rack, for some reason.)": "Тапочки 5-го уровня. (По какой-то причине нужно находиться рядом с шкуросъемной стойкой.)"
"Level 5 slippers, infused with magic. (Must be near a tanning rack, for some reason.)": "Тапочки 5 уровня, наполненные магией. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 5 club, suitable for use with the Hammer skill.": "Дубина 5 уровня, подходит для использования с навыком Молот."
"Level 5 club infused with magic.": "Дубина 5 уровня, наполненная магией."
"Level 5 fighting staff. This staff works for staff fighting, druidism, fire magic, and ice magic.": "Боевой посох 5 уровня. Этот посох подходит для боя посохом, друидизма, огненной магии и ледяной магии."
"Level 5 fighting staff, infused with magic. This staff works for staff fighting, druidism, fire magic, and ice magic.": "Боевой посох 5 уровня, наполненный магией. Этот посох подходит для боя посохом, друидизма, огненной магии и ледяной магии."
"Level 5 horseshoes, but for a cow. (Must be near a forge.)": "Подковы 5 уровня, но для коровы. (Нужно находиться рядом с кузницей.)"
"Level 5 horseshoes, but for a deer. (Must be near a forge.)": "Подковы 5 уровня, но для оленя. (Требуется находиться рядом с кузницей.)"
"A poor rendition of a dragon. This will not impress anyone, but it's good practice to make once. Lasts for 5 minutes once deployed.": "Плохая копия дракона. Это никого не впечатлит, но хорошая практика для первого раза. Длится 5 минут после установки."
"It has a vague flower smell.": "Имеет слабый цветочный запах."
"A poor rendition of a dragon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия дракона, покрытая золотом. Это никого не впечатлит, но изготовление было хорошей практикой. Длится 10 минут после установки."
"A poor rendition of a gryphon, covered in gold. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия грифона, покрытая золотом. Это никого не впечатлит, но изготовление было хорошей практикой. Сохраняется 10 минут после установки."
"A poor rendition of a gryphon. This will not impress anyone, but it's good practice to make once. Lasts for 5 minutes once deployed.": "Плохая копия грифона. Это никого не впечатлит, но хорошая практика для создания. Сохраняется 5 минут после установки."
"A belt with broken glass along the interior, causing the wearer intense pain. Most people would never wear such a belt, but masochists may find this pain enhances their sense of survival.": "Пояс с битым стеклом внутри, причиняющий носителю сильную боль. Большинство людей никогда не наденут такой пояс, но мазохисты могут считать, что эта боль усиливает их чувство выживания."
"Level 5 boots. Embarrassing in every way. (Must be near a tanning rack.)": "Сапоги 5 уровня. Постыдны во всех отношениях. (Нужно находиться рядом с кожевенным станком.)"
"Level 5 boots, infused with magic. (Must be near a tanning rack.)": "Сапоги 5 уровня, наполненные магией. (Должны находиться рядом с шкуросъемной стойкой.)"
"Level 5 gloves. Embarrassing in every way. (Must be near a tanning rack.)": "Перчатки 5 уровня. Во всех отношениях позорные. (Нужно находиться рядом с вяльной стойкой.)"
"Level 5 gloves, infused with magic. (Must be near a tanning rack.)": "Перчатки 5 уровня, наполненные магией. (Нужно находиться рядом с дубильной стойкой.)"
"Level 5 headwear. Embarrassing in every way. (Must be near a tanning rack.)": "Головной убор 5 уровня. Постыдный во всех отношениях. (Должен находиться рядом с дубильной стойкой.)"
"Level 5 headwear, infused with magic. (Must be near a tanning rack.)": "Головной убор 5 уровня, наполненный магией. (Нужно находиться рядом с стойкой для дубления.)"
"Level 5 leggings. Embarrassing in every way. (Must be near a tanning rack.)": "Поножи 5 уровня. Постыдные во всех отношениях. (Нужно находиться рядом с шкуросъемным станком.)"
"Level 5 leggings, infused with magic. (Must be near a tanning rack.)": "Поножи 5 уровня, наполненные магией. (Нужно находиться рядом с вяльной стойкой.)"
"Practice leatherworking on a piece of shoddy leather. The resulting items are junk, but it's good practice.": "Практикуйтесь в кожевенном деле на куске некачественной кожи. Получающиеся предметы — хлам, но это хорошая тренировка."
"Create poor-quality leather from poor-quality materials. Garbage in, garbage out. (Must be near a tanning rack.)": "Создаёт кожу низкого качества из материалов низкого качества. Мусор на входе — мусор на выходе. (Должен находиться рядом с дубильной стойкой.)"
"Level 5 chest armor. Embarrassing in every way. (Must be near a tanning rack.)": "Броня для груди 5 уровня. Постыдная во всех отношениях. (Должен находиться рядом с шкуросъемным станком.)"
"Level 5 chest armor, infused with magic. (Must be near a tanning rack.)": "Броня для груди 5 уровня, наполненная магией. (Должен находиться рядом с шкуросъемным станком.)"
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x3.": "Одноразовый табурет для медитации. Используйте его рядом с Медитационной колонной, чтобы увеличить длительность эффектов медитации в 3 раза."
"Level 5 fighting staff. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 5 уровня. Этот посох подходит для боя посохом и друидизма, но не подходит для огненной магии, ледяной магии или священных сил."
"Level 5 fighting staff, infused with magic. This staff works for staff fighting and druidism, but not for fire magic, ice magic, or priestly powers.": "Боевой посох 5 уровня, наполненный магией. Этот посох подходит для боя посохом и друидизма, но не для огненной магии, ледяной магии или священных сил."
"Creates a music box that sounds like a lute for beast forms to use for gardening or dancing.": "Создаёт музыкальную шкатулку, которая звучит как лютня, чтобы звериные формы могли использовать её для садоводства или танцев."
"A simple belt with a pouch.": "Простой пояс с мешочком."
"Level 5 fighting staff. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой жезл 5 уровня. Этот жезл подходит для боя жезлами, друидизма, огненной магии, ледяной магии и жреческого колдовства."
"Level 5 fighting staff, infused with magic. This staff works for staff fighting, druidism, fire magic, ice magic, and priestly casting.": "Боевой жезл 5 уровня, наполненный магией. Этот жезл подходит для боя жезлом, друидизма, огненной магии, ледяной магии и священного колдовства."
"Creates a saddlebag with 8 slots. (Must be near a tack bench.)": "Создаёт седельную сумку с 8 слотами. (Должен находиться рядом с верстаком для сбруи.)"
"A poor rendition of a dragon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия дракона, покрытая серебром. Это никого не впечатлит, но её изготовление было хорошей практикой. Действует 10 минут после установки."
"A poor rendition of a gryphon, covered in silver. This will not impress anyone, but making it was good practice. Lasts for 10 minutes once deployed.": "Плохая копия грифона, покрытая серебром. Это никого не впечатлит, но изготовление было хорошей практикой. Действует 10 минут после установки."
"Pieces of chitin and scraps of metal are held together with thick webbing. This would fit on a spider.": "Куски хитина и обломки металла скреплены толстой паутиной. Это подошло бы для паука."
"A small box for storing up to 4 items. Lasts for 5 minutes once deployed. (Each player that access the storage crate can store their own items. All storage crates allow access to the same items for that player.)": "Небольшая коробка для хранения до 4 предметов. Сохраняется в течение 5 минут после установки. (Каждый игрок, получающий доступ к ящику для хранения, может хранить свои собственные предметы. Все ящики для хранения позволяют игроку получить доступ к одним и тем же предметам.)"
"Low-quality, but shelf-stable, rendered fat.": "Жир низкого качества, но пригодный для хранения."
"A bit of string that will (technically) burn.": "Немного верёвки, которая (технически) горит."
"Level 5 horseshoes, but for a cow, and made of wood.": "Подковы 5 уровня, но для коровы и сделаны из дерева."
"Level 5 horseshoes, but for a deer, and made of wood.": "Подковы 5-го уровня, но для оленя и сделанные из дерева."
"All the smells of a scrub tree in a swamp to help you get into a natural mindset.": "Все запахи кустарника в болоте, чтобы помочь вам настроиться на природный лад."
"Creates a delicious vegetarian dish. Requires a stove or fire pit.": "Создаёт вкусное вегетарианское блюдо. Требуется плита или кострище."
"Dye used to color armor sienna. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в цвет сиена. Опыт начисляется только при первом успешном создании по этому рецепту."
"Sift through a pile of grass, looking for plantable barley seeds. Yields between 0 and 3 seeds.": "Просейте кучу травы в поисках пригодных для посадки семян ячменя. Выход от 0 до 3 семян."
"For repairing minor armor damage. Used by Armor Patching abilities.": "Для ремонта незначительных повреждений брони. Используется способностями Починки брони."
"Creates a hearty snack. Requires a stove or fire pit (to dry out the pumpkin seeds.)": "Создаёт сытную закуску. Требуется плита или кострище (для сушки семян тыквы)."
"For healing minor injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения незначительных травм. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing minor injuries. Used by First Aid abilities.": "Для лечения незначительных травм. Используется способностями первой помощи."
"An elaborate contraption that can dispense free raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 10 free raffle tickets for a single item (or item stack).": "Сложное устройство, которое может выдавать бесплатные билеты на розыгрыш и затем вручать награду победителю.\\n\\nЭта модель может выдать до 10 бесплатных билетов на розыгрыш для одного предмета (или стопки предметов)."
"A shield-shaped piece of ice. This item can melt in warm or hot environments, although it tends to last longer than small ice items.": "Щитообразный кусок льда. Этот предмет может растаять в тёплой или жаркой среде, хотя обычно держится дольше, чем мелкие ледяные предметы."
"An elaborate contraption that can dispense free items. This model can dispense up to 10 of a single kind of item.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдать до 10 штук одного вида предмета."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 10 of a single kind of item.": "Сложное устройство, которое может выдавать предметы и собирать валюту. Эта модель может продавать до 10 единиц одного вида предмета."
"A longer-term storage solution for pets. The built-in entertainment options raise the contained pet's Happiness by 10. Pets kept in this cage for more than 14 days will escape and be lost. One use only.": "Долговременное хранилище для питомцев. Встроенные развлечения повышают счастье питомца на 10. Питомцы, содержащиеся в этой клетке более 14 дней, сбегут и будут потеряны. Одноразовое использование."
"A handful of wood nails.": "Горсть деревянных гвоздей."
"A simple skinning knife for beginning skinners. (Keep it in your inventory and you'll be given the option to skin the corpses of some enemies.)\n\nMust be near a forge.": "Простой нож для снятия шкур для начинающих. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры с трупов некоторых врагов.)\\n\\nДолжен находиться рядом с кузницей."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:04 minutes then bake for approximately 00:07 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:04 минуты, затем выпекайте примерно 00:07 минут"
"A simple knife designed for beginning knife-throwers. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Простой нож, предназначенный для начинающих метателей ножей. (Используется с навыком боя ножами.) Рецепт создаёт 10 ножей."
"A very basic animal cage designed for transfering pets. Suitable only for extremely short-term use! Pets kept in this cage for more than 48 hours will escape and be lost. One use only.": "Очень простая клетка для животных, предназначенная для перевозки питомцев. Подходит только для крайне кратковременного использования! Питомцы, содержащиеся в этой клетке более 48 часов, сбегут и будут потеряны. Одноразовое использование."
"A simple whittling knife for beginning whittlers. Must be near a forge.": "Простой нож для начинающих резчиков по дереву. Нужно находиться рядом с кузницей."
"Turn good wood into junk (mostly). It's good practice!\n\nAlso buffs your Knife Damage +20 for 1 hour.": "Превратите хорошую древесину в хлам (в основном). Это хорошая практика!\\n\\nТакже увеличивает урон ножом на +20 на 1 час."
"Create a cask of a brined cheese with a clean, savory flavor. (Requires a stove or fire pit.)\n\nCheese Type: Brine": "Создайте бочку рассольного сыра с чистым, пикантным вкусом. (Требуется плита или кострище.)\n\nТип сыра: Рассольный"
"A secret paleontology technique for dealing with unruly skeletons. (Creates a stack of 5.)": "Секретная техника палеонтологии для борьбы с непослушными скелетами. (Создаёт стопку из 5.)"
"Dye used to color armor sky blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в небесно-голубой цвет. Опыт даётся только при первом создании по этому рецепту."
"Dye used to color armor slate gray. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в сланцево-серый цвет. Опыт начисляется только при первом создании по этому рецепту."
"Create a liquidy cheese with large curds, commonly made by ratkin slaves. (Requires a stove or fire pit.)\n\nCheese Type: Fresh": "Создайте жидкий сыр с крупными сгустками, обычно приготовляемый рабами-крысолюдами. (Требуется плита или кострище.)\n\nТип сыра: Свежий"
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Warm Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Тёплая кровь».\\n\\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"This box can grow multiple crops of mushrooms.\nBox Duration: 24 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nДлительность работы коробки: 24 часа\\nВремя выращивания: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 48 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nДлительность работы коробки: 48 часов\\nВремя выращивания: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"This box can grow multiple crops of mushrooms.\nBox Duration: 72 hours\nGrow Time: 50% slower for each crop\nYield: +66% mushrooms per crop": "Эта коробка может выращивать несколько урожаев грибов.\\nВремя действия коробки: 72 часа\\nВремя выращивания: на 50% дольше для каждого урожая\\nУрожай: на 66% больше грибов за каждый урожай"
"A small dragon. People who view it will be vaguely inspired to craft better. Lasts for 5 minutes once deployed.": "Маленький дракон. Люди, которые на него смотрят, будут смутно вдохновлены создавать лучшее. Длится 5 минут после установки."
"A small dragon coated in gold. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Маленький дракон, покрытый золотом. Люди, которые на него смотрят, вдохновляются создавать лучшее. Действует 10 минут после установки."
"A small gryphon coated in gold. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Маленький грифон, покрытый золотом. Те, кто на него смотрят, будут вдохновлены убивать лучше. Действует 10 минут после установки."
"A small gryphon. People who view it will be vaguely inspired to murder better. Lasts for 5 minutes once deployed.": "Маленький грифон. Люди, которые на него смотрят, будут смутно вдохновлены лучше убивать. Действует 5 минут после установки."
"Combine the substance from several tiny Antipathy Pearls into one larger container.": "Объедините вещество из нескольких маленьких жемчужин антипатии в один больший контейнер."
"A small dragon coated in silver. People who view it will be inspired to craft better. Lasts for 10 minutes once deployed.": "Маленький дракон, покрытый серебром. Те, кто на него смотрят, будут вдохновлены создавать лучшее. Действует 10 минут после установки."
"A small gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Маленький грифон, покрытый серебром. Те, кто смотрят на него, будут вдохновлены лучше убивать. Действует 10 минут после установки."
"Cut and clean a smallmouth bass.": "Разрежьте и очистите окуня с малым ртом."
"Dye used to color armor smoky white. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в дымчато-белый цвет. Опыт начисляется только при первом успешном создании по этому рецепту."
"Creates a block of soft, squishy tofu. Requires a tofu press.": "Создаёт блок мягкого, податливого тофу. Требуется пресс для тофу."
"Increase your Maximum Tempest Energy through a simple ceremony. It must be performed at noon [game time] on a perfectly clear day. It can be performed repeatedly on different days. Each performance permanently increases your Maximum Tempest Energy +1.": "Увеличьте вашу максимальную энергию Бури с помощью простого ритуала. Его нужно проводить в полдень [игровое время] в идеально ясный день. Ритуал можно повторять в разные дни. Каждое выполнение навсегда увеличивает вашу максимальную энергию Бури на +1."
"Cut and clean a sorubim.": "Разрежьте и очистите сорубима."
"Creates a lumpy dairy product used to flavor many types of dishes. (Requires a stove or fire pit.)": "Создаёт комковатый молочный продукт, используемый для придания вкуса многим видам блюд. (Требуется плита или кострище.)"
"Creates an ingredient for certain bread dishes. Although simple to make, it takes time to grow.": "Создаёт ингредиент для некоторых хлебных блюд. Хотя её просто приготовить, требуется время, чтобы она выросла."
"Creates a bottle of soy milk from soybeans. Requires a stove or fire pit.": "Создаёт бутылку соевого молока из соевых бобов. Требуется плита или кострище."
"Create a specialized mini-kit that will let you cut through a frozen lake and attempt to catch fish. You can leave the hole unattended and wait for the fish to get caught on your bait.": "Создайте специализированный мини-набор, который позволит вам прорезать лед на замерзшем озере и попытаться поймать рыбу. Вы можете оставить лунку без присмотра и ждать, пока рыба клюнет на вашу приманку."
"Creates a meal of pan-fried tofu cubes, enhanced with a variety of spices and accompanied by roasted corn. Requires a stove or fire pit. Feeds three.": "Создаёт блюдо из обжаренных на сковороде кубиков тофу, приправленных разнообразными специями и подаваемых с жареной кукурузой. Требуется плита или кострище. Порция на троих."
"Cheesy breaded porcini mushrooms with a lot of heat! Serves 4.": "Сырные панированные белые грибы с сильной остротой! На 4 порции."
"Creates a more advanced stir-fry of tasty vegan goodness. Requires a stove or fire pit. Feeds three.": "Создаёт более продвинутый жареный овощной микс с вкусной веганской начинкой. Требуется плита или кострище. Кормит троих."
"A potion that boosts Spider skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Паук на 20%."
"Etch the magical rune for spiders onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магическую руну пауков на малахите, чтобы при использовании в рецептах создания она была настроена только на этот вид."
"A sticky cloth that's ideal for certain types of clothing.": "Липкая ткань, идеально подходящая для определённых видов одежды."
"Creates a very mild speed-enhancement potion. While the effect isn't dramatic, it is noticeable, and it lasts a long time with no side effects.": "Создаёт очень слабое зелье ускорения. Хотя эффект не драматичный, он заметен и длится долго без побочных эффектов."
"A potion that boosts Spirit Fox skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Дух Лисы на 20%."
"Etch the magical rune for fox onto a piece of lapis lazuli, so that it is attuned to only spirit foxes when used in crafting recipes.": "Вырежьте магическую руну лисы на кусочке лазурита, чтобы она была настроена только на духов лис при использовании в рецептах ремесла."
"Creates small chips of spruce perfect for smoking fish and meats.": "Создаёт мелкие щепки ели, идеально подходящие для копчения рыбы и мяса."
"Creates small chips of spruce perfect for smoking fish and meats. This version uses a perfect piece of wood to create a large amount of usable chips.": "Создаёт мелкие щепки ели, идеально подходящие для копчения рыбы и мяса. Эта версия использует идеальный кусок древесины для создания большого количества пригодных щепок."
"Creates a basic soup of squash and onions. Requires a stove or fire pit.": "Создаёт простой суп из тыквы и лука. Требуется плита или костровище."
"A potion that boosts Staff skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Посоха на 20%."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 30 raffle tickets for up to 3 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils.": "Сложное устройство, которое может выдавать билеты на розыгрыш и затем вручать награду победителю.\\n\\nЭта модель может выдать до 30 билетов на розыгрыш для до 3 предметов (или стопок предметов) и/или денежного приза. Билеты на розыгрыш могут быть бесплатными или стоить Советы."
"Perform a complex ritual involving the destruction of several crystals. You must be standing in a smoking demon crater to perform this recipe.": "Выполните сложный ритуал, включающий уничтожение нескольких кристаллов. Для выполнения этого рецепта вы должны стоять в дымящемся демоническом кратере."
"Perform a tedious and complicated process of grinding down a bunch of weird crystals.": "Выполните утомительный и сложный процесс измельчения множества странных кристаллов."
"Dye used to color armor steel blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в стальной синий цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Create a cask of a blue cheese with a luxurious taste and a horrific odor. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с роскошным вкусом и ужасным запахом. (Требуется плита или кострище.)\\n\\nТип сыра: Голубой"
"An oily wax that smells great to bees. Used to help ensure mating success with bees or wasps.": "Маслянистый воск с приятным для пчёл запахом. Используется для повышения шансов на спаривание с пчёлами или осами."
"Open a portal to a private pocket dimension. You can store up to 10 items in it. The portal closes after 5 minutes.": "Откройте портал в личное карманное измерение. Вы можете хранить в нем до 10 предметов. Портал закрывается через 5 минут."
"Open a portal to a private pocket dimension. You can store up to 20 items in it. The portal closes after 5 minutes.": "Откройте портал в личное карманное измерение. Вы можете хранить в нем до 20 предметов. Портал закрывается через 5 минут."
"Open a portal to a private pocket dimension. You can store up to 30 items in it. The portal closes after 5 minutes.": "Откройте портал в личное карманное измерение. Вы можете хранить в нём до 30 предметов. Портал закрывается через 5 минут."
"Creates a cold, creamy, strawberry ... thing. It must be eaten quickly before it melts!": "Создаёт холодное, сливочное клубничное... нечто. Его нужно съесть быстро, пока оно не растаяло!"
"Although there might be delicious varieties of strawberry wine out there somewhere, this is not it: the strawberry flavor is undermined by a grassy taste.": "Хотя где-то могут быть вкусные сорта клубничного вина, это не оно: клубничный вкус перебивается травянистым оттенком."
"Create a small spindle of string. Useful in many crafts, like fishing and tailoring.": "Создаёт небольшой моток нити. Полезно во многих ремёслах, таких как рыболовство и портняжное дело."
"Cut and clean a striped bass.": "Разрежьте и очистите полосатого окуня."
"For an hour, all acid damage is reduced by 10, potentially eliminating the damage entirely.": "В течение часа весь урон от кислоты уменьшается на 10, что может полностью устранить урон."
"Creates a disposable potion that instantly cures Poison (up to 20 damage/tick).": "Создаёт одноразовое зелье, которое мгновенно лечит Яд (до 20 урона за тик)."
"For an hour, all electricity damage is reduced by 10, potentially eliminating the damage entirely.": "В течение часа весь урон от электричества уменьшается на 10, что может полностью устранить урон."
"This industrial-strength Hellfreeze cures all stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when ingested.": "Этот промышленной силы Адский Лёд излечивает все накопления Большого Адского Огня, Адского Огня и Малого Адского Огня при употреблении."
"This industrial-strength Hellfreeze cures up to 10 stacks of Greater Hellfire, Hellfire, and Lesser Hellfire when applied topically.": "Эта промышленная мазь Адского Холода лечит до 10 стаков Большого Адского Огня, Адского Огня и Малого Адского Огня при наружном применении."
"A handful of long wood nails.": "Горсть длинных деревянных гвоздей."
"This strange cloth is smooth and cool to the touch.": "Эта странная ткань гладкая и прохладная на ощупь."
"Creates a meal that's really very meaty for something that purports to be a vegetable dish. Requires a stove or fire pit.": "Создаёт блюдо, которое действительно очень мясистое для того, что считается овощным. Требуется плита или кострище."
"Creates a tasty and visually appealing meal of squash stuffed with venison. Requires a stove or fire pit.": "Создаёт вкусное и привлекательное блюдо из тыквы, фаршированной олениной. Требуется плита или кострище."
"Spin retted flax into a sturdy cloth. (Must be near a cotton gin.)": "Прядите вымоченный лен в прочную ткань. (Нужно находиться рядом с хлопкоочистительной машиной.)"
"A metal mesh, useful for cages, filters, and similar systems.\n\nMust be near a forge.": "Металлическая сетка, полезная для клеток, фильтров и подобных систем.\\n\\nДолжна находиться рядом с кузницей."
"Creates a sweet dessert snack for three. Requires a stove or fire pit.": "Создаёт сладкий десертный перекус на троих. Требуется плита или кострище."
"Creates a dimensional rift that leads to your alternate-bound Teleportation Circle. Any number of players can enter the rift. It lasts for two minutes. This technique has a 60-minute cooldown before it can be used again.": "Создаёт измерительный разлом, ведущий к вашему альтернативно связному Кругу Телепортации. Любое количество игроков может войти в разлом. Длится две минуты. Эта техника имеет время восстановления 60 минут перед повторным использованием."
"Summon a special druidic storage container. Must be near a teleportation platform. This can be used during a druidic emergency and up to an hour before or after the emergency.": "Призовите специальный друидический контейнер для хранения. Нужно находиться рядом с платформой телепортации. Это можно использовать во время друидического чрезвычайного положения и за час до или после него."
"Creates a dimensional rift that leads to your bound Teleportation Circle. Any number of players can enter the rift. It lasts for two minutes. This technique has a 60-minute cooldown before it can be used again.": "Создаёт измерительный разлом, ведущий к вашему закреплённому Кругу Телепортации. Любое количество игроков может войти в разлом. Длится две минуты. Эта техника имеет время восстановления 60 минут перед повторным использованием."
"Creates a dimensional rift that leads to the gates of Statehelm. Any number of players can enter the rift. It lasts for two minutes. This technique has a 60-minute cooldown before it can be used again.": "Создаёт измерительный разлом, ведущий к вратам Стейтхелма. Любое количество игроков может войти в разлом. Длится две минуты. Эта техника имеет время восстановления 60 минут перед повторным использованием."
"Use clues to plot the location of buried treasure in Sun Vale. The resulting treasure map may not actually lead to treasure, depending on your skill and (to a larger extent) the quality of your clues.": "Используйте подсказки, чтобы определить местоположение зарытых сокровищ в Солнечной Долине. Полученная карта сокровищ может не привести к настоящим сокровищам, в зависимости от вашего умения и (в большей степени) качества ваших подсказок."
"Cut and clean a sunfish.": "Разрежьте и очистите солнечную рыбу."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +38 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +38 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Creates special cushions of warmth that help incubate baby bees and wasps in the egg. This version also includes pheromones that relax the creature and help it grow more quickly. Each incubator be used only once.": "Создаёт специальные подушки тепла, которые помогают высиживать детёнышей пчёл и ос в яйце. Эта версия также содержит феромоны, которые успокаивают существо и способствуют его более быстрому росту. Каждый инкубатор можно использовать только один раз."
"Throw everything into a hearty casserole. Requires a stove or fire pit.": "Бросьте всё в сытную запеканку. Требуется плита или кострище."
"A disposable bench for performing calligraphy. Deploy it to boost your Calligraphy durations x2.": "Одноразовая скамья для выполнения каллиграфии. Установите её, чтобы удвоить длительность ваших каллиграфических эффектов."
"A somewhat-comfortable chair. Relaxing in it boosts your Armor Regeneration +3 for 30 minutes.": "Относительно удобный стул. Отдых в нём увеличивает восстановление брони на +3 на 30 минут."
"A disposable stool for meditating. Use it near a Meditation Pillar to boost the duration of your meditation effects x2.": "Одноразовый табурет для медитации. Используйте его рядом с Медитационным столбом, чтобы увеличить длительность эффектов медитации в 2 раза."
"For 2 minutes, you'll be able to leap high into the sky!": "В течение 2 минут вы сможете прыгать высоко в небо!"
"Creates a blanket to keep a mare warm and happy during pregnancy. This sort of blanket will only be appropriate for mares with so-called \"Fire Blooded\" temperament.\n\nIt's sometimes necessary to try several different types of blanket to figure out what your horse needs.": "Создаёт покрывало, чтобы кобыла была тёплой и довольной во время беременности. Такой тип покрывала подходит только кобылам с так называемым темпераментом «Огненная кровь».\\n\\nИногда необходимо попробовать несколько разных видов покрывал, чтобы понять, что нужно вашей лошади."
"This acrid topical ointment removes all swamp ticks and leeches. (Creates a stack of 5.)": "Это едкое наружное мазь удаляет всех болотных клещей и пиявок. (Создаёт стек из 5 штук.)"
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +36 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +36 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Creates a meal that serves 3.": "Создаёт блюдо на 3 порции."
"Creates an innately sweet butter that is useful in many cooking recipes. (Requires a stove or fire pit.)": "Создаёт изначально сладкое масло, полезное во многих кулинарных рецептах. (Требуется плита или кострище.)"
"A potion that accelerates your underwater fast-movement speed.": "Зелье, которое ускоряет вашу быструю скорость передвижения под водой."
"A potion that boosts Sword skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Меча на 20%."
"Infuses a sword with the following power: Sword Accuracy +8. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +8. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока меч наточен, для его использования требуется уровень Меча 15. Завершение этого рецепта впервые обучает вас следующему уровню этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +10. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 25. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +10. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 25. Завершение этого рецепта впервые обучает вас следующему уровню этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +12. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 35. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +12. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 35. При первом выполнении этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +14. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 45. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +14. Эффект длится до совершения 1250 атак мечом. Пока меч наточен, для его использования требуется уровень меча 45. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +16. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 55. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +16. Эффект длится до тех пор, пока вы не совершите 2000 атак мечом. Пока меч наточен, для его использования требуется уровень Меча 55. При первом выполнении этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +18. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 65. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +18. Эффект длится до тех пор, пока вы не совершите 2000 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 65. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +20. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 75. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Точность меча +20. Эффект длится до тех пор, пока вы не совершите 2000 атак мечом. Пока меч заточен, для его использования требуется уровень Меча 75. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Accuracy +22. The benefit lasts until you have made 2500 Sword attacks. While sharpened, the weapon has a requirement of Sword level 85": "Наполняет меч следующей силой: Точность меча +22. Эффект длится до тех пор, пока вы не совершите 2500 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 85"
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +30. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Урон мечом по уязвимым врагам +30. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 15. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +48. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 25. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Урон мечом по уязвимым врагам +48. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока оружие наточено, для него требуется уровень владения мечом 25. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +71. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 35. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: урон мечом по уязвимым врагам +71. Эффект длится до совершения 1250 атак мечом. Пока оружие заточено, для него требуется уровень меча 35. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +107. The benefit lasts until you have made 1250 Sword attacks. While sharpened, the weapon has a requirement of Sword level 45. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: Урон мечом по уязвимым врагам +107. Эффект длится до тех пор, пока вы не совершите 1250 атак мечом. Пока меч наточен, для его использования требуется уровень меча 45. Первый раз, когда вы выполните этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +149. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 55. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: урон мечом по уязвимым врагам +149. Эффект длится до тех пор, пока вы не совершите 2000 атак мечом. Пока меч наточен, для его использования требуется уровень меча 55. Завершение этого рецепта впервые обучает вас следующему уровню этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +185. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 65. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: урон мечом по уязвимым врагам +185. Эффект длится до совершения 2000 атак мечом. Пока оружие наточено, требуется уровень меча 65. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +219. The benefit lasts until you have made 2000 Sword attacks. While sharpened, the weapon has a requirement of Sword level 75. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет меч следующей силой: урон мечом по уязвимым врагам +219. Эффект длится до тех пор, пока вы не совершите 2000 атак мечом. Пока меч наточен, для его использования требуется уровень владения мечом 75. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
"Infuses a sword with the following power: Sword Damage to Vulnerable Enemies +250. The benefit lasts until you have made 2500 Sword attacks. While sharpened, the weapon has a requirement of Sword level 85": "Наполняет меч следующей силой: урон мечом по уязвимым врагам +250. Эффект длится до совершения 2500 атак мечом. Пока меч наточен, для его использования требуется уровень меча 85"
"Creates a stack of pancakes. This recipe requires a stove or fire pit.": "Создаёт стопку блинов. Для этого рецепта требуется плита или кострище."
"Attach a tap to a barrel of beer or hard liquor and deploy it. The barrel will IMMEDIATELY APPEAR near you, and any players can drink from it. The barrel will persist until all alcohol is consumed (or very slowly evaporates). The barrel cannot be reused. If the barrel is inscribed prior to being tapped, the inscription will be shown to all who drink from it.": "Прикрепите кран к бочке с пивом или крепким алкоголем и установите её. Бочка НЕЗАМЕДЛИТЕЛЬНО ПОЯВИТСЯ рядом с вами, и любой игрок сможет пить из неё. Бочка будет существовать, пока весь алкоголь не будет выпит (или очень медленно испаряется). Бочку нельзя использовать повторно. Если бочка была подписана до подключения крана, надпись будет показана всем, кто пьёт из неё."
"Cut and clean a tarpon.": "Разрежьте и очистите тарпона."
"Creates a delicious version of the classic human cookie. Serves two. Requires a stove or fire pit.": "Создаёт вкусную версию классического печенья в форме человека. На двоих. Требуется плита или кострище."
"Dye used to color armor teal. You only receive XP the first time you complete this recipe.": "Краска для окрашивания брони в бирюзовый цвет. Опыт даётся только при первом создании по этому рецепту."
"A tiny short-lived light used for decoration.\n\nTealights are non-interactible. They last for 5 minutes. You can deploy up to 5 tealights at a time.": "Крошечный недолговечный светильник для украшения.\\n\\nЧайные свечи не взаимодействуют. Они горят 5 минут. Можно установить до 5 чайных свечей одновременно."
"Create a cask of a brined cheese with a salty, nutty flavor. (Requires a stove or fire pit.)\n\nCheese Type: Brine": "Создайте бочку рассольного сыра с солёным, ореховым вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Рассольный"
"An acrid tea that restores Tempest Energy.": "Резкий чай, восстанавливающий энергию Бури."
"Cut and clean a tench.": "Разрежьте и очистите линя."
"Fermented cactus juice with a complex taste. This variety has been aged to make it more drinkable. (It's \"more\" drinkable, but still not \"very\" drinkable -- it's an acquired taste.) The stereotypical drink of rakshasa desert bandits.": "Ферментированный сок кактуса с насыщенным вкусом. Этот сорт выдержан, чтобы сделать его более пригодным для питья. (Он «более» пригоден для питья, но всё ещё не «очень» — это вкус, к которому нужно привыкнуть.) Стереотипный напиток разбойников-пустынников ракшасов."
"Prepares a cask of tequila for aging. The cask must then be stored in a cave until it is mature.": "Готовит бочку текилы для выдержки. Бочку затем нужно хранить в пещере, пока она не созреет."
"does the thing": "выполняет действие"
"Increase your Maximum Tempest Energy +5 through a primitive ceremony. The recitation need only be performed once; the effects are permanent. It must be performed while suffering 10+ damage-over-time effects.": "Увеличьте свою максимальную энергию Бури на +5 с помощью примитивного ритуала. Произнесение нужно выполнить только один раз; эффект постоянный. Ритуал должен быть выполнен, когда на вас действует 10 и более эффектов урона с течением времени."
"Increase your Maximum Tempest Energy +5 through an extraordinarily painful ritual. The ritual need only be performed once; the effects are permanent. Must be performed outdoors while suffering from 20 broken bones.": "Увеличьте вашу максимальную энергию Бури на +5 через чрезвычайно болезненный ритуал. Ритуал нужно выполнить только один раз; эффект постоянен. Должен выполняться на улице, находясь с 20 сломанными костями."
"Rub this lotion into your scalp to increase your brainpower.": "Вотрите этот лосьон в кожу головы, чтобы увеличить умственные способности."
"A small but thick piece of metal covered in a grid of holes. It is used by flower arrangers. Makes two.": "Небольшой, но толстый кусок металла с сеткой отверстий. Используется флористами. Изготавливает две штуки."
"A small thin piece of metal covered in a grid of holes. It is used by flower arrangers. Makes two.": "Небольшой тонкий кусок металла с сеткой из отверстий. Используется флористами. Изготавливает две штуки."
"Dye used to color armor thistle. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания доспехов в цвет чертополоха. Опыт начисляется только при первом успешном создании по этому рецепту."
"75% chance to boost Electricity damage by 10 for 15 minutes. 25% chance to ground you, making your Electricity attacks deal 0 damage for 15 minutes.": "75% шанс увеличить урон от Электричества на 10 на 15 минут. 25% шанс оглушить вас, из-за чего ваши атаки Электричеством будут наносить 0 урона в течение 15 минут."
"Cut and clean a tigerfish.": "Разрежьте и очистите тигровую рыбу."
"Cut and clean a tilapia.": "Разрежьте и очистите тиляпию."
"Creates a block of tofu. Requires a tofu press.": "Создаёт блок тофу. Требуется пресс для тофу."
"Creates a meatless turkey substitute pumpkin lots of savory pumpkin flavor. Requires a stove or fire pit. Feeds three.": "Создаёт вегетарианский заменитель индейки с большим количеством пикантного тыквенного вкуса. Требуется плита или кострище. Кормит троих."
"Creates a snack for four. Requires a stove or fire pit. ": "Создаёт закуску на четыре порции. Требуется плита или кострище. "
"Creates a creamy vegan gravy to smother your tofurkey. Requires a stove or fire pit. Feeds three.": "Создаёт кремообразный веганский соус, чтобы полить вашу тофурку. Требуется плита или костровище. На три порции."
"Creates a simple stir-fry of tasty vegan goodness. Requires a stove or fire pit. Feeds three.": "Готовит простое жаркое из вкусных веганских ингредиентов. Требуется плита или кострище. Порция на троих."
"Creates a meatloaf without the meat, and with a lot more tasty veggies. Requires a stove or fire pit. Feeds three.": "Создаёт мясной хлебец без мяса, но с большим количеством вкусных овощей. Требуется плита или костровище. Кормит троих."
"Creates a meatless turkey substitute with lots of savory cranberry flavor. Requires a stove or fire pit. Feeds three.": "Создаёт заменитель индейки без мяса с насыщенным вкусом клюквы. Требуется плита или кострище. Кормит троих."
"Dye used to color armor tomato red. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в томатно-красный цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"Cut and clean a tonguefish.": "Разрежьте и очистите язык."
"Create a sweet potion that protects against many kinds of 'toxins'.": "Создайте сладкое зелье, которое защищает от многих видов «ядов»."
"For 30 minutes, all Poison attacks you make will deal +5 extra damage.": "В течение 30 минут все ваши атаки ядом будут наносить дополнительно +5 урона."
"Creates a dessert snack. Serves 3 humans or 1 troll. Requires a stove or fire pit.": "Создаёт десертную закуску. На 3 человека или 1 тролля. Требуется плита или кострище."
"Creates a sour dessert snack. Serves 2 humans or 1 troll.": "Создаёт кислый десертный перекус. Порция на 2 человека или 1 тролля."
"Increase your Maximum Tempest Energy +5 through a simple ritual. The ritual need only be performed once; the effects are permanent. It must be performed at precisely 4AM [game time] while in a sandstorm.": "Увеличьте вашу максимальную энергию Бури на +5 с помощью простого ритуала. Ритуал нужно выполнить только один раз; эффект постоянный. Его необходимо проводить ровно в 4 утра [игровое время] во время песчаной бури."
"Cut and clean a triple tail.": "Разрежьте и очистите тройного хвоста."
"A flask of flammable liquid. It doesn't deal much damage, but any flame will keep trolls from regenerating, and this flame lasts a long time.": "Флакон с легковоспламеняющейся жидкостью. Оно не наносит большого урона, но любой огонь не позволит троллям регенерировать, а этот огонь длится долго."
"Cut and clean a trout.": "Разрежьте и очистите форель."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +30 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +30 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Using your fae connection, send bits of mortal bodies into the eternal realm of winter, never to be seen again. They are displaced by some amount of Crystal Ice.": "Используя свою связь с феями, отправьте части смертных тел в вечное царство зимы, откуда их больше никто не увидит. Они заменяются определённым количеством кристаллического льда."
"Using your fae connection, send a piece of equipment into the fae realm, never to be seen again. It is displaced by some amount of Fairy Dust.\n(Note: item must have been crafted or looted by you.)": "Используя свою связь с феями, отправьте предмет экипировки в царство фей, чтобы он больше никогда не появился. Его заменит некоторое количество фейской пыли.\\n (Примечание: предмет должен быть создан или добыт вами.)"
"Using your fae connection, send a junk item into the eternal realm of winter, never to be seen again. It is displaced by some amount of Crystal Ice.": "Используя вашу связь с феями, отправьте ненужный предмет в вечное царство зимы, чтобы он больше никогда не появился. Его заменит некоторое количество кристального льда."
"Dye used to color armor turquoise. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в бирюзовый цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"Creates 4 jars of acid. Use it to clean a gem before cutting it, or to scrub armor clean. You can also drink it, or bathe in it, but that would be pretty damned stupid.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle that acid is stored in. The bottle is ruined by the acid when the acid is used.": "Создаёт 4 банки с кислотой. Используйте её для очистки драгоценного камня перед огранкой или для тщательной очистки брони. Вы также можете выпить её или искупаться в ней, но это было бы довольно глупо.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, стеклянную бутылку, в которой хранится кислота, нельзя использовать повторно. Бутылка разрушается кислотой при её использовании."
"Creates 2 jars of acid. Use it to clean a gem before cutting it, or to scrub armor clean. You can also drink it, or bathe in it, but that would be pretty damned stupid.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle that acid is stored in. The bottle is ruined by the acid when the acid is used.": "Создаёт 2 банки с кислотой. Используйте её для очистки драгоценного камня перед огранкой или для тщательной очистки брони. Вы также можете выпить её или искупаться в ней, но это было бы довольно глупо.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, стеклянную бутылку, в которой хранится кислота, нельзя использовать повторно. Бутылка разрушается кислотой при её использовании."
"An elaborate contraption that can dispense raffle tickets and then deliver a reward to the raffle winner.\n\nThis model can dispense up to 1000 raffle tickets for up to 10 items (or item stacks) and/or a cash prize. The raffle tickets can be free or can cost Councils. This model has a place for an inscription that is displayed to each user, and a message that is shown only to the winner. This model can also be configured to have a time limit of 1-90 minutes.": "Сложное устройство, которое может выдавать билеты на розыгрыш и затем вручать награду победителю.\\n\\nЭта модель может выдать до 1000 билетов на розыгрыш для до 10 предметов (или стопок предметов) и/или денежного приза. Билеты на розыгрыш могут быть бесплатными или стоить Советы. В этой модели есть место для надписи, которая отображается каждому пользователю, и сообщение, показываемое только победителю. Также эту модель можно настроить с ограничением времени от 1 до 90 минут."
"A potion that boosts Unarmed skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка боя без оружия на 20%."
"Remove an applied Augment from a pair of boots and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с пары ботинок и верните очки ремесла на предмет, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a suit of chest armor and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с комплекта нагрудной брони и верните очки ремесла предмету, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a pair of magical gloves and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с пары магических перчаток и верните очки ремесла на предмет, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a helmet and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с шлема и верните очки ремесла предмету, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a pair of pants and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с пары штанов и верните очки создания предмету, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a main-hand item and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с предмета в правой руке и верните очки ремесла предмету, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a necklace and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с ожерелья и верните очки ремесла предмету, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a off-hand item and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с предмета в левой руке и верните очки создания на предмет, чтобы его можно было улучшить чем-то другим."
"Remove an applied Augment from a ring and return the craft points to the item so it can be Augmented with something else.": "Удалите применённое улучшение с кольца и верните очки ремесла на предмет, чтобы его можно было улучшить чем-то другим."
"For when you have too many bottles...": "Для тех случаев, когда у вас слишком много бутылок..."
"Creates bacon infused with ancient spirits of evil. Requires a stove or fire pit.": "Создаёт бекон, пропитанный древними духами зла. Требуется плита или кострище."
"Creates a meal dish for two.": "Готовит блюдо на двоих."
"Creates an ingredient for other dishes that can also serve as its own meal.": "Создаёт ингредиент для других блюд, который также может служить самостоятельным приёмом пищи."
"Create a spreadable cheese that's mild and quite sweet and perfect for desserts. (Requires a stove or fire pit.)\n\nCheese Type: Whey": "Создайте намазываемый сыр с мягким и довольно сладким вкусом, идеально подходящий для десертов. (Требуется плита или кострище.)\\n\\nТип сыра: Сывороточный"
"A versatile knife for skinning or butchering. (Keep it in your inventory and you'll be given the option to skin and/or butcher the corpses of some enemies.)\n\nMust be near a forge.": "Универсальный нож для снятия шкур или разделки. (Держите его в инвентаре, и вам будет доступна опция снимать шкуры и/или разделывать трупы некоторых врагов.)\\n\\nДолжен находиться рядом с кузницей."
"Creates a hearty vegetarian stir-fry. Requires a stove or fire pit.": "Готовит сытное овощное жаркое. Требуется плита или кострище."
"Creates dried venison jerky. Requires a stove or fire pit.": "Создаёт вяленое мясо оленя. Требуется плита или кострище."
"Prepares a disgusting meal that is said to be appealing to psychic mantises.": "Готовит отвратительное блюдо, которое, как говорят, привлекает психических мантисов."
"Creates a perfectly roasted venison roast. Requires a stove or fire pit.": "Создаёт идеально прожаренное жаркое из оленины. Требуется плита или кострище."
"Cut and clean a Vertan tuna.": "Разрежьте и очистите тунца Вертана."
"Turn good wood into junk (mostly). It's good practice!\n\nAlso buffs your Knife Damage +30 for 1 hour.": "Превратите хорошую древесину в хлам (в основном). Это хорошая практика!\\n\\nТакже увеличивает урон ножом на +30 на 1 час."
"This box can be used to grow a crop of mushrooms.\nGrow Time: 40% faster than normal\nXP Penalty: -50% XP per mushroom": "Эта коробка может использоваться для выращивания урожая грибов.\\nВремя выращивания: на 40% быстрее обычного\\nШтраф к опыту: -50% опыта за каждый гриб"
"Turn good wood into junk (mostly). It's good practice!\n\nAlso buffs your Knife Damage +10 for 1 hour.": "Превратите хорошую древесину в хлам (в основном). Это хорошая практика!\\n\\nТакже увеличивает урон ножом на +10 на 1 час."
"Records the location of a fairly large crystal deposit in Vidaria. The resulting survey requires Geology 70 to use.": "Фиксирует местоположение довольно крупного месторождения кристаллов в Видарии. Для использования полученного обследования требуется Геология 70."
"Records the location of a fairly large crystal deposit in Vidaria. The resulting survey requires Geology 75 to use.": "Фиксирует местоположение довольно крупного месторождения кристаллов в Видарии. Для использования полученного обследования требуется Геология 75."
"Cut and clean a vidarian pickerel.": "Разрежьте и очистите видарианского щуку."
"Powdered brains of psychic creatures, cut with secret and dangerous substances that enhance its effect on psychics.": "Порошок из мозгов психических существ, смешанный с секретными и опасными веществами, усиливающими его воздействие на психиков."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +6 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +6 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"A metal clamp used by toolmakers and armorsmiths.": "Металлический зажим, используемый изготовителями инструментов и кузнецами."
"Cotton cloth that's very porous. Ideal for use in creating mold cheeses.": "Хлопковая ткань с высокой пористостью. Идеально подходит для изготовления плесневых сыров."
"Cut and clean a wahoo.": "Разрежьте и очистите ваху."
"A torch and sconce that can be installed in a home or guild hall.": "Факел и подсвечник, которые можно установить в доме или гильдейском зале."
"Cut and clean a walleye.": "Разрежьте и очистите судака."
"A potion that boosts Warden skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Стража на 20%."
"A potion that lets you partially breathe water, doubling the time you can stay submerged.": "Зелье, позволяющее частично дышать под водой, удваивая время, которое вы можете провести под водой."
"A potion that expands your lungs, dramatically increasing the time you can spend underwater without drowning.": "Зелье, расширяющее ваши легкие, значительно увеличивающее время, которое вы можете провести под водой, не захлебнувшись."
"Creates a huge batch of watercress salad. Serves 5.": "Готовит большую порцию салата из водяного кресса. На 5 порций."
"Creates a simple meal made with easily-foraged mushrooms and store-bought flour and salt. Requires a stove or fire pit.": "Создаёт простое блюдо из легко собираемых грибов и купленной в магазине муки с солью. Требуется плита или кострище."
"Creates 3 jars of acid. Use it to clean a gem before cutting it, or to scrub armor clean. You can also drink it, or bathe in it, but that would be pretty damned stupid.\n\nNOTE: unlike most Alchemy potions, you can't reuse the glass bottle that acid is stored in. The bottle is ruined by the acid when the acid is used.": "Создаёт 3 банки с кислотой. Используйте её для очистки драгоценного камня перед огранкой или для тщательной очистки брони. Вы также можете выпить её или искупаться в ней, но это было бы довольно глупо.\\n\\nПРИМЕЧАНИЕ: в отличие от большинства зелий Алхимии, стеклянную бутылку, в которой хранится кислота, нельзя использовать повторно. Бутылка разрушается кислотой при её использовании."
"Known colloquially as \"Heckfreeze\", this concoction is consumed to cure all stacks of Lesser Hellfire.": "В просторечии известен как «Хекфриз», этот напиток употребляют, чтобы вылечить все наложения Малого Адского огня."
"Known colloquially as \"Heckfreeze\", this ointment is applied topically and cures up to 10 stacks of Lesser Hellfire.": "В просторечии известная как «Хекфриз», эта мазь наносится наружно и лечит до 10 стаков Малого Адского огня."
"A thin fluid used to create augmentation oils (for level 30 effects). Creates five doses. NOTE: this legacy recipe is no longer used by augmentation!": "Тонкая жидкость, используемая для создания масел усиления (для эффектов уровня 30). Создаёт пять доз. ПРИМЕЧАНИЕ: этот устаревший рецепт больше не используется для усиления!"
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется в способности Отравленное лезвие."
"A grindstone for sharpening swords and other large weapons. Must be near a forge.": "Точильный камень для заточки мечей и другого крупного оружия. Должен находиться рядом с кузницей."
"A grindstone for sharpening swords and other large weapons.": "Точильный камень для заточки мечей и другого крупного оружия."
"When grip precision is crucial, this paper has the perfect level of abrasiveness.": "Когда важна точность захвата, эта бумага обладает идеальным уровнем абразивности."
"Study the atmosphere to understand the weather across the continent.": "Изучайте атмосферу, чтобы понять погоду по всему континенту."
"A potion that boosts Weather Witching skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Природной магии на 20%."
"Research a new Weather Witching spell. You can discover 2 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Магии Погоды. Вы можете открыть 2 способности, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Weather Witching spell. You can discover 4 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Исследуйте новое заклинание Погоды. Вы можете открыть 4 способности, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Weather Witching spell. You can discover 7 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Заклинаний Погоды. Вы можете открыть 7 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Weather Witching spell. You can discover 5 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Заклинания Погоды. Вы можете открыть 5 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Research a new Weather Witching spell. You can discover 8 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Управления Погодой. Вы можете открыть 8 способностей, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Increase your Maximum Tempest Energy +5 through a simple ceremony in a crowded place. The recitation need only be performed once; the effects are permanent. It must be performed while around at least 20 other players while undressed and unashamed.": "Увеличьте вашу максимальную энергию Бури на +5 с помощью простой церемонии в многолюдном месте. Произнесение нужно выполнить только один раз; эффект постоянный. Церемонию необходимо проводить в окружении как минимум 20 других игроков, будучи раздетым и без стыда."
"Creates a turkey dish. Requires a stove or fire pit.": "Создаёт блюдо из индейки. Требуется плита или кострище."
"A potion that boosts Werewolf skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Оборотня на 20%."
"A simple variety of whisky made from barley. It's drinkable and has a tolerable flavor.": "Простой сорт виски, изготовленный из ячменя. Его можно пить, и вкус терпимый."
"Prepares a cask of whisky for aging. The cask must then be stored in a cave until it is mature.": "Готовит бочку виски для выдержки. Бочку затем нужно хранить в пещере до созревания."
"Dye used to color armor white. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в белый цвет. Опыт начисляется только при первом успешном создании по этому рецепту."
"This smelly gel will overclock your brain. What could go wrong?": "Этот вонючий гель ускорит работу вашего мозга. Что может пойти не так?"
"Creates a meal that serves 2.": "Создаёт блюдо на 2 порции."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +22 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +22 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"A collection of unpleasant-smelling flowers. These will make you very sick.\n\nLasts 4 hours\n\nYou can only have one flower arrangement \"benefit\" at a time.": "Сбор неприятно пахнущих цветов. Они вызовут у вас сильное недомогание.\\n\\nДействует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"A toxic muffin that shouldn't be eaten by anybody, but most especially not by lycanthropes. Requires a stove or fire pit.": "Ядовитый маффин, который никому не следует есть, а особенно ликантропам. Требуется плита или кострище."
"Attempt to research and discover a two-syllable Word of Power": "Попытка исследовать и открыть двусложное Слово Силы"
"Attempt to research and discover a three-syllable Word of Power": "Попытка исследовать и открыть трёхсложное Слово силы"
"Attempt to research and discover a three-syllable Word of Power, and write it into a sealed scroll for safe keeping.": "Попытайтесь исследовать и открыть трёхсложное Слово Силы, а затем запишите его в запечатанный свиток для безопасного хранения."
"Attempt to research and discover a four-syllable Word of Power": "Попытка исследовать и открыть четырёхсложное Слово силы"
"Attempt to research and discover a five-syllable Word of Power": "Попытка исследовать и открыть пятисложное Слово силы"
"Attempt to research and discover a six-syllable Word of Power": "Попытка исследовать и открыть шестисложное Слово силы"
"Attempt to research and discover a seven-syllable Word of Power": "Попытка исследовать и открыть семисложное Слово силы"
"Attempt to research and discover a two-syllable Word of Power, and write it into a sealed scroll for safe keeping.": "Попытайтесь исследовать и открыть двусложное Слово Силы, а затем запишите его в запечатанный свиток для безопасного хранения."
"Dye used to color armor yellow green. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в жёлто-зелёный цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"Cut and clean a yellow perch.": "Порежьте и очистите жёлтого окуня."
"Creates an exotic snack food. Requires a stove or fire pit.": "Создаёт экзотическую закуску. Требуется плита или кострище."
"Creates small chips of yew perfect for smoking fish and meats.": "Создаёт мелкие щепки тиса, идеально подходящие для копчения рыбы и мяса."

