"Infuses a bow with the following power: Anatomy Critical Hit Damage +14%. The benefit lasts until you have made 2000 Archery attacks. While thus enhanced, the weapon has a requirement of Archery level 65": "Наполняет лук следующей силой: урон критического удара по анатомии +14%. Эффект длится до совершения 2000 атак из лука. Пока лук усилен, для его использования требуется уровень Стрельбы из лука 65"
