"Etch the magical rune for deer onto a malachite, so that it is attuned to only that species when used in crafting recipes.": "Вырежьте магическую руну оленя на малахите, чтобы он был настроен только на этот вид при использовании в рецептах ремёсел."
"A customized hammer used by smiths.\n\nMust be near a forge.": "Индивидуальный молоток, используемый кузнецами.\n\nДолжен находиться рядом с кузницей."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:10 minutes then bake for approximately 00:45 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:10 минут, затем выпекайте примерно 00:45 минут"
"Turn good wood into little works of art.\n\nAlso buffs your Knife Damage +135 for 1 hour.": "Преобразуйте хорошую древесину в маленькие произведения искусства.\n\nТакже увеличивает урон ножом на +135 на 1 час."
"Roast some demon meat.": "Приготовьте жаркое из демонического мяса."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +24 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +24 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"Creates a pleasant drink.": "Создаёт приятный напиток."
