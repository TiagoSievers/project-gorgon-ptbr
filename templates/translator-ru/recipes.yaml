"A clever display of flowers that enhances your perceptions.\n\nGrants 55% chance of collecting extra fruit and related foraging items, and 40% chance of collecting extra seeds. Duration: 4 hours.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 40.": "Умело составленная цветочная композиция, которая усиливает ваше восприятие.\\n\\nДарует 55% шанс собрать дополнительные фрукты и сопутствующие предметы для сбора, а также 40% шанс собрать дополнительные семена. Длительность: 4 часа.\\n\\nПосле установки композиция сохраняется 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 40."
"A fancier autopsy kit for advanced pathologists. (+5 to your effective skill when autopsying a corpse.)": "Более изысканный набор для вскрытия для опытных патологоанатомов. (+5 к вашему эффективному навыку при вскрытии трупа.)"
"A fancy autopsy kit for advanced pathologists. (+3 to your effective skill when autopsying a corpse.)": "Элитный набор для вскрытия для опытных патологоанатомов. (+3 к вашей эффективной навыку при вскрытии трупа.)"
"Freeze a food item to an extremely low temperature until it shatters into bits of jagged ice. These bits of ice can be used as ammunition for certain Knife abilities.": "Заморозьте пищевой предмет до чрезвычайно низкой температуры, пока он не рассыплется на осколки зазубренного льда. Эти осколки льда можно использовать в качестве боеприпасов для некоторых умений с ножом."
"Creates a delicious snack. Requires a stove or fire pit.": "Создаёт вкусную закуску. Требуется плита или кострище."
"Cooks a nice fried clownfish. Requires a stove or fire pit.": "Готовит вкусного жареного клоуна. Требуется плита или кострище."
"Creates a delicious snack. Serves 3. Requires a stove or fire pit.": "Создаёт вкусную закуску. На 3 порции. Требуется плита или кострище."
"Creates a greasy meal.": "Создаёт жирное блюдо."
"Creates delicious fried potato sticks. Requires a stove or fire pit. Unlike most food, fried potato sticks do not give long-term regeneration effects. Instead, they are an instant-heal item.": "Создаёт вкусные жареные картофельные палочки. Требуется плита или кострище. В отличие от большинства еды, жареная картошка палочками не даёт долгосрочных эффектов регенерации. Вместо этого это предмет мгновенного исцеления."
"Creates an interesting fried dish from the most common part of the spider. Requires a stove or fire pit.": "Создаёт интересное жареное блюдо из самой распространённой части паука. Требуется плита или кострище."
"Cut and clean a frostfin.": "Разрежьте и очистите морозного плавника."
"For an hour, gain +7 Max Breath.": "В течение часа получаете +7 к максимальному дыханию."
"Creates a sweet, thick blended drink.": "Создаёт сладкий, густой смешанный напиток."
"Creates an odorous stew meal. Requires a stove or fire pit.": "Создаёт ароматное рагу. Требуется плита или кострище."
"Creates an instant snack. Requires a stove or fire pit.": "Создаёт мгновенный перекус. Требуется плита или кострище."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 10% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\\n\\nДарует 10% шанс собрать вдвое больше предметов при садоводстве.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 17% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\\n\\nДарует 17% шанс собрать двойной урожай при садоводстве.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 15."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 25% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\\n\\nДарует 25% шанс собрать вдвое больше предметов при садоводстве.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 35."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 32% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 55.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\\n\\nДарует 32% шанс собрать двойной урожай при садоводстве.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 55."
"An incredible flower display that inspires greater care and attention when gardening.\n\nGrants 40% chance to harvest double items when gardening.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 75.": "Невероятная цветочная композиция, которая вдохновляет на большую заботу и внимание при садоводстве.\\n\\nДарует 40% шанс собрать вдвое больше предметов при садоводстве.\\n\\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 75."
"Collects some information about a large supply of metal on the Gazluk Plateau. The resulting survey requires Mining 58 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла на Плато Газлук. Для использования полученной разведки требуется Навык Добычи 58. Месторождения намного сложнее обнаружить, чем обычные разведочные карты."
"Collects some information about a large supply of metal on the Gazluk Plateau. The resulting survey requires Mining 63 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла на плато Газлук. Для использования этой карты разведки требуется Навык Горного дела 63. Залежи металла найти гораздо сложнее, чем обычные карты разведки."
"A potion that boosts Giant Bat skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка гигантской летучей мыши на 20%."
"Analyze and decompose a Giant Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте череп гиганта, чтобы получить практический опыт в френологии этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Giant Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте впечатляющий череп гиганта, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Giant Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте по частям изумительный череп гиганта, чтобы получить практический опыт в френологии этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"For an hour, any attacks you make against creatures of the Fish subtype deal +10% damage.": "В течение часа все ваши атаки по существам подтипа Рыба наносят на 10% больше урона."
"Creates a simple dish of baked beets in a tasty glaze. Serves 2. Requires a stove or fire pit.": "Создаёт простое блюдо из запечённой свеклы в вкусной глазури. На 2 порции. Требуется плита или кострище."
"Create a  mild semi-hard cheese. (Requires a stove or fire pit.)\n\nCheese Type: Semi-Hard": "Создайте мягкий полутвёрдый сыр. (Требуется плита или кострище.)\\n\\nТип сыра: Полутвёрдый"
"A hoppy beer with hints of spice.": "Хмелевое пиво с нотками специй."
"Dye used to color armor goblin orange. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в оранжевый цвет гоблина. Опыт начисляется только при первом выполнении этого рецепта."
"Analyze and decompose a Goblin Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите череп гоблина, чтобы получить практический опыт в френологии этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Goblin Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите впечатляющий череп гоблина, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Goblin Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите по частям удивительный череп гоблина, чтобы получить практический опыт френологии для этой расы. Существует 1% шанс, что ваше исследовательское оборудование сломается."
"Dye used to color armor gold. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в золотой цвет. Опыт начисляется только при первом выполнении этого рецепта."
"For repairing serious armor damage. Used by Armor Patching abilities. Crafts 2 kits.": "Для ремонта серьёзных повреждений брони. Используется способностями ремонта брони. Изготавливает 2 набора."
"Chop a medium fish up into bait.": "Порежьте среднюю рыбу на приманку."
"For healing serious injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения серьёзных травм. Животные могут использовать эти бомбы с помощью способности Бомба первой помощи."
"For healing serious injuries. Used by First Aid abilities. This recipe creates two such kits.": "Для лечения серьёзных травм. Используется способностями первой помощи. Этот рецепт создаёт два таких набора."
"A quality skinning knife for experienced skinners. (+4 to your effective skill when skinning.)\n\nMust be near a forge.": "Качественный нож для снятия шкур для опытных охотников. (+4 к вашему эффективному навыку при снятии шкур.)\\n\\nДолжен находиться рядом с кузницей."
"A well-balanced knife designed for throwing. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Хорошо сбалансированный нож, предназначенный для метания. (Используется с боевым навыком Метание ножей.) Рецепт создаёт 10 ножей."
"A quality whittling knife for experienced whittlers. Must be near a forge.": "Качественный нож для резьбы для опытных резчиков. Нужно находиться рядом с кузницей."
"Turn good wood into little decorative things.\n\nAlso buffs your Knife Damage +75 for 1 hour.": "Превратите хорошую древесину в маленькие декоративные вещи.\n\nТакже увеличивает урон ножом на +75 на 1 час."
"Create a cask of a blue cheese with a nice taste but the very strong smell of stinky feet. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с приятным вкусом, но очень сильным запахом вонючих ног. (Требуется плита или кострище.)\\n\\nТип сыра: Голубой"
"Create a hard cheese with a tangy taste. (Requires a stove or fire pit.)\n\nCheese Type: Hard": "Создайте твёрдый сыр с острым вкусом. (Требуется плита или кострище.)\n\nТип сыра: Твёрдый"
"Creates a pile of granamurch flakes. They are still toxic in this form, but become edible when cooked down.": "Создаёт кучу хлопьев гранармура. В этом виде они всё ещё ядовиты, но становятся съедобными после приготовления."
"Blend colored glass into a prism. (Requires a forge or kiln.)": "Смешайте цветное стекло в призму. (Требуется кузница или печь.)"
"Made with fresh grapes!": "Сделано из свежего винограда!"
"Cut and clean a grapefish.": "Разрежьте и очистите грейпфиша."
"Prepares a simple grapefish steak. Requires a stove or fire pit.": "Готовит простой стейк из грейпфиш. Требуется плита или кострище."
"Create a cask of a blue cheese with a bland taste and smell. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с пресным вкусом и запахом. (Требуется плита или кострище.)\n\nТип сыра: Голубой"
"Dye used to color armor gray. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в серый цвет. Опыт начисляется только при первом выполнении этого рецепта."
"Level 60 giant bat harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Седло для гигантской летучей мыши 60 уровня, которое может распылять химические вещества во время боя (включая Боевую химию)."
"Level 60 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Магическое оружие-гибрид когтя и флакона 60 уровня. При первом создании этого рецепта вы изучаете рецепт следующего по уровню."
"Level 60 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Магическое оружие гибрид когтя и флакона уровня 60. Завершение этого рецепта впервые обучает рецепту следующего по уровню. Макс-Зачарование создаёт предметы на один уровень Редкости выше, чем обычно."
"Lovingly crafted to a high standard, this wooden spider suit makes spiders even more adaptable than normal. Its wood can also act as a focal point for druidic spiders.": "С любовью изготовленный на высоком уровне, этот деревянный паучий костюм делает пауков ещё более приспособленными, чем обычно. Его древесина также может служить фокусом для друидических пауков."
"Level 60 spider harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Паучий ошейник 60 уровня, который может распылять химические вещества во время боя (включая Боевую химию)."
"Creates delicious bacon. Requires a stove or fire pit. Unlike most food, great bacon does not give a long-term regeneration effect. Instead, it is an instant-heal item.": "Создаёт вкусный бекон. Требуется плита или кострище. В отличие от большинства еды, великолепный бекон не даёт долгосрочного эффекта регенерации. Вместо этого он мгновенно восстанавливает здоровье."
"Level 60 boots, infused with magic. (Must be near a tanning rack.)": "Сапоги 60 уровня, наполненные магией. (Необходимо находиться рядом с шкуросъемным станком.)"
"Level 60 boots, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Сапоги 60-го уровня, наполненные магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемным станком.)"
"Level 60 headwear, infused with magic. (Must be near a tanning rack.)": "Головной убор 60 уровня, наполненный магией. (Должен находиться рядом с шкуросъемной рамой.)"
"Level 60 headwear, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Головной убор 60 уровня, наполненный магией. Макс-Зачарование создаёт предметы на один уровень Редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемным станком.)"
"Level 60 gloves, infused with magic. (Must be near a tanning rack.)": "Перчатки 60 уровня, наполненные магией. (Необходимо находиться рядом с шкуросъемным станком.)"
"Level 60 gloves, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Перчатки 60 уровня, наполненные магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуродёром.)"
"Level 60 leggings, infused with magic. (Must be near a tanning rack.)": "Поножи 60 уровня, наполненные магией. (Нужно находиться рядом с кожевенным станком.)"
"Level 60 leggings, infused with magic. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be. (Must be near a tanning rack.)": "Поножи 60 уровня, наполненные магией. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно. (Требуется находиться рядом с шкуросъемным станком.)"
