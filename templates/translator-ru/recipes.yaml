"Infuses a dagger with the following power: Critical Hit Damage +20%. The benefit lasts until you have made 2500 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 85. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет кинжал следующей силой: Урон от критического удара +20%. Эффект действует до совершения 2500 атак ножом. Пока оружие наточено, для него требуется уровень владения ножом 85. При первом создании этого рецепта вы изучаете следующий уровень этого рецепта."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +8 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно придаст бодрости.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +8 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +10 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно придаст бодрости.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +10 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"Create a cask of a blue cheese with a sweet taste and relatively little odor. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с сладким вкусом и относительно слабым запахом. (Требуется плита или кострище.)\\n\\nТип сыра: Голубой"
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +26 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно придаст бодрости.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +26 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"A small sharp blade coated in a thick black goo. This item is used by the Poison Blade 3 ability.": "Маленькое острое лезвие, покрытое густой черной слизью. Этот предмет используется способностью Отравленное лезвие 3."
"Dye used to color armor dark blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в темно-синий цвет. Опыт дается только при первом успешном создании по этому рецепту."
"Dye used to color armor dark green. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в темно-зеленый цвет. Опыт дается только при первом успешном создании по этому рецепту."
"Dye used to color armor dark khaki. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в тёмный цвет хаки. Опыт начисляется только при первом успешном создании по этому рецепту."
"Dye used to color armor dark olive green. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в тёмно-оливковый цвет. Опыт даётся только при первом успешном создании по этому рецепту."
