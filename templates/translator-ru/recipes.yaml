"Level 10 gloves, infused with magic. (Must be near a tanning rack, for some reason.)": "Перчатки 10 уровня, наполненные магией. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 10 pants. (Must be near a tanning rack, for some reason.)": "Штаны 10 уровня. (По какой-то причине нужно находиться рядом с вешалкой для выделки кожи.)"
