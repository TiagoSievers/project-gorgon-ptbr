"A large gryphon coated in silver. People who view it will be inspired to murder better. Lasts for 10 minutes once deployed.": "Большой грифон, покрытый серебром. Те, кто на него смотрят, вдохновляются лучше убивать. Действует 10 минут после установки."
"An elaborate contraption that can dispense free items. This model can dispense up to 1000 of a single kind of item.": "Сложное устройство, которое может выдавать бесплатные предметы. Эта модель может выдать до 1000 штук одного вида предмета."
"An elaborate contraption that can dispense items and collect currency. This model can sell up to 1000 of a single kind of item.": "Сложное устройство, которое может выдавать предметы и собирать валюту. Эта модель может продавать до 1000 единиц одного вида предмета."
