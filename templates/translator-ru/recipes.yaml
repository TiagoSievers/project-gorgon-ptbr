"Level 100 horseshoes, but for a cow, and made of wood.": "Подковы 100 уровня, но для коровы и сделанные из дерева."
"Level 100 horseshoes, but for a deer, and made of wood.": "Подковы 100 уровня, но для оленя и сделаны из дерева."
"Create an exotic, evil meal.": "Приготовьте экзотическое, злое блюдо."
"A potion that restores a small amount of healing after a delay. Its prized trait is that the potion can be drunk many times, with a low metabolic impact each time.": "Зелье, которое восстанавливает небольшое количество здоровья с задержкой. Его ценное качество в том, что его можно пить много раз, при этом оказывая небольшое воздействие на обмен веществ каждый раз."
"THIS RECIPE IS TEMPORARILY UNAVAILABLE! It will be back soon.\n\nAdd a permanent damage buff to a weapon that has been Foretold in Prophecy. This recipe has a 33% chance to consume 1 Craft Point. For mystical reasons, the weapon must have an Augment installed in it to use this recipe. (The Augment is not altered and can be removed later if desired.)\n\nTODO: preview damage boost here. Varies between bonuses to different types of damage": "ЭТОТ РЕЦЕПТ ВРЕМЕННО НЕДОСТУПЕН! Скоро он снова появится.\n\nДобавляет постоянное усиление урона оружию, которое было Предсказано в Пророчестве. Этот рецепт имеет 33% шанс потратить 1 Очко Ремесла. По мистическим причинам оружие должно иметь установленный Усилитель для использования этого рецепта. (Усилитель не изменяется и может быть удалён позже при желании.)\n\nTODO: предварительный просмотр усиления урона здесь. Варьируется между бонусами к разным типам урона"
"Research a new Fire Magic spell. You can discover 3 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Огненной магии. Вы можете открыть 3 способности, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или костровищем.)"
"Creates a delicious but deadly mushroom smoothie that happens to look exactly like a Milk Cap Smoothie. Don't confuse them!": "Создаёт вкусный, но смертельно опасный грибной коктейль, который выглядит точно так же, как Молочный коктейль с молочным грибом. Не путайте их!"
"Creates a pile of powdered iocaine mushroom, an incredibly deadly toxin. It's cut with field mushrooms to perfectly mask its taste and odor, making it a deadly food additive.": "Создаёт кучу порошкообразного йокаинового гриба, невероятно смертоносного токсина. Его смешивают с полевыми грибами, чтобы идеально замаскировать вкус и запах, превращая в смертельно опасную пищевую добавку."
"Creates a carefully tuned version of iocaine powder that's designed to make you very ill without killing you outright, allowing the body to build up resistance to the deadly toxin.": "Создаёт тщательно настроенную версию порошка иокаина, предназначенную для того, чтобы сильно вас отравить, но не убить, позволяя организму выработать сопротивляемость смертельному яду."
"Cut and clean an Irmaki.": "Разрежьте и очистите Ирмаки."
"A classic scary carved pumpkin.": "Классическая страшная вырезанная тыква."
"From burs to brushes, screws to setting tools, it's all in here.": "От борфрез до щёток, от винтов до инструментов для закрепки — всё это здесь."
"A dry wine. It has a slightly piney smell, but it's not pleasant.": "Сухое вино. Имеет слегка хвойный запах, но он не приятный."
"Boosts maximum health by +30 for 60 minutes.": "Увеличивает максимальное здоровье на +30 на 60 минут."
"Create a disposable tap for beer or liquor barrels.": "Создаёт одноразовый кран для бочек с пивом или спиртным."
"Dye used to color armor khaki. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в цвет хаки. Опыт начисляется только при первом успешном создании по этому рецепту."
"A mid-sized cask used for food and drink production.": "Бочка среднего размера, используемая для производства еды и напитков."
"A potion that boosts Knife skill base damage by 20%.": "Зелье, которое увеличивает базовый урон навыка Нож на 20%."
"Creates an exotic meal. Serves 2. Requires a stove or fire pit.": "Создаёт экзотическое блюдо. На 2 порции. Требуется плита или кострище."
"Some properly-prepared kraken remains will give you fish-like abilities underwater.": "Правильно приготовленные останки кракена дадут вам рыбоподобные способности под водой."
"Collects some information about a large supply of metal in or around Kur Mountains. The resulting survey requires Mining 28 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в горах Кур или поблизости. Для использования полученной разведки требуется Навык горного дела 28. Месторождения намного сложнее обнаружить, чем обычные карты разведки."
"Records the location of a mineral deposit in or around Kur Mountains. The resulting survey requires Geology 50 to use.": "Фиксирует местоположение месторождения минералов в горах Кур или вокруг них. Для использования полученного обследования требуется Геология 50."
"Collects some information about a large supply of metal in or around Kur Mountains. The resulting survey requires Mining 38 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в горах Кур или вокруг них. Для использования полученного обследования требуется Навык Горного дела 38. Крупные месторождения найти гораздо сложнее, чем обычные карты обследования."
"Records the location of a mineral deposit in or around Kur Mountains. The resulting survey requires Geology 45 to use.": "Фиксирует местоположение минерального месторождения в горах Кур или рядом с ними. Для использования полученного обследования требуется Геология 45."
"Collects some information about a large supply of metal in or around Kur Mountains. The resulting survey requires Mining 23 to use. Motherlodes are much more difficult to track down than regular survey maps.": "Собирает информацию о большом запасе металла в горах Кур или поблизости. Для использования полученной карты требуется Навык Горного дела 23. Месторождения металлов найти гораздо сложнее, чем обычные карты разведки."
"Cut and clean a lake sturgeon.": "Разрежьте и очистите озёрного осетра."
"Create a liquidy cheese with small curds and a sweet taste. (Requires a stove or fire pit.)\n\nCheese Type: Fresh": "Создайте жидкий сыр с мелкими сгустками и сладким вкусом. (Требуется плита или кострище.)\\n\\nТип сыра: Свежий"
