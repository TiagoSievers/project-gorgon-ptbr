"Cut and clean a dock cod.": "Порежьте и очистите причального треска."
"Create a bundle of 1000 arrow fletchings for resplendent and perfectish arrows.": "Создайте связку из 1000 оперений для великолепных и почти идеальных стрел."
"Cut and clean a dorado.": "Разрежьте и очистите дорадо."
"Dye used to color armor drab grass green. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания доспехов в тускло-зеленый цвет травы. Опыт начисляется только при первом выполнении этого рецепта."
"Creates a snack. Requires a stove or fire pit (for drying the fruit).": "Создаёт закуску. Требуется плита или кострище (для сушки фруктов)."
"Consume a flower (or flower arrangement). For 30 minutes after, the Mentalism abilities Health Wave, Armor Wave, and Power Wave have increased potency. The increase depends on the quality of the flower(s) consumed.\n\nYou must be a butterfly to use this technique, and you must meet the flower(s)'s skill requirements, if any.": "Поглотить цветок (или цветочную композицию). В течение 30 минут после этого способности Ментализма Здоровая Волна, Волна Брони и Волна Силы становятся сильнее. Усиление зависит от качества съеденного цветка(ов).\n\nВы должны быть бабочкой, чтобы использовать эту технику, и должны соответствовать требованиям к навыкам для цветка(ов), если таковые имеются."
"A robotic fire pit, which uses advanced automaton techniques to spread the warmth further and keep it going longer. Lasts 10 minutes once deployed.": "Роботизированный очаг, который использует передовые техники автоматонов для распространения тепла дальше и поддержания его дольше. Длится 10 минут после установки."
"A potion that boosts Druid skill base damage by 20%.": "Зелье, увеличивающее базовый урон навыка Друида на 20%."
"A secret recipe taught to you by Drummond Stonecurl.": "Секретный рецепт, который вам рассказал Драммонд Стоункерл."
"Pleasant, slightly citrusy, but with a distinctive bitterness too. It's said to be the favorite hard liquor of elves, but since elves mostly drink wine, that's not much praise.": "Приятный, с легким цитрусовым оттенком, но с характерной горчинкой. Говорят, что это любимый крепкий напиток эльфов, но поскольку эльфы в основном пьют вино, это не слишком высокая похвала."
"Prepares a cask of gin for aging. The cask must then be stored in a cave until it is mature.": "Готовит бочку джина для выдержки. Затем бочку необходимо хранить в пещере до созревания."
"Creates a delicious meal. Serves 2. Requires a stove or fire pit.": "Создаёт вкусное блюдо. На 2 порции. Требуется плита или костровище."
"Creates a tasty meal. Serves 2. Requires a stove or fire pit.": "Готовит вкусное блюдо. На 2 порции. Требуется плита или кострище."
"Dye used to color armor dwarfeye blue. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в синий цвет карликового глаза. Опыт даётся только при первом успешном создании по этому рецепту."
"A strong dark beer that packs a punch. The preferred socialization drink of dwarves.": "Крепкое тёмное пиво с насыщенным вкусом. Любимый напиток для общения у гномов."
"Dye a piece of clothing (or cloth armor) one solid color.": "Окрасьте предмет одежды (или тканевую броню) в один сплошной цвет."
"Dye a piece of clothing (or cloth armor) using two colors.": "Окрасьте предмет одежды (или тканевую броню) с использованием двух цветов."
"Dye a piece of clothing (or cloth armor) using three colors.": "Окрасьте предмет одежды (или тканевую броню) с использованием трёх цветов."
"Dye a piece of leather armor one solid color.": "Покрасьте кусок кожаной брони в один сплошной цвет."
"Dye a piece of leather armor using two colors.": "Покрасьте кусок кожаной брони, используя два цвета."
"Dye a piece of leather armor using three colors.": "Покрасьте кусок кожаной брони, используя три цвета."
"Dye your fur blue. You must be a rabbit to use this recipe.": "Покрась свой мех в синий цвет. Чтобы использовать этот рецепт, вы должны быть кроликом."
"Dye your fur royal purple. You must be a rabbit to use this recipe.": "Покрась свой мех в королевский пурпур. Чтобы использовать этот рецепт, вы должны быть кроликом."
"Dye a piece of metal armor one solid color.": "Покрасьте кусок металлической брони в один сплошной цвет."
"Dye a piece of metal armor using two colors.": "Окрасьте кусок металлической брони, используя два цвета."
"Dye a piece of metal armor using three colors.": "Окрасьте кусок металлической брони, используя три цвета."
"Dye a piece of organic armor one solid color.": "Окрасьте один предмет органической брони в один сплошной цвет."
"Dye a piece of organic armor using two colors.": "Окрасьте кусок органической брони, используя два цвета."
"Dye a piece of organic armor using three colors.": "Покрасьте кусок органической брони, используя три цвета."
"Cut and clean an eagle ray.": "Разрежьте и очистите орляка."
"Create a nutty, and quite hard, cheese. (Requires a stove or fire pit.)\n\nCheese Type: Hard": "Создайте ореховый и довольно твердый сыр. (Требуется плита или кострище.)\n\nТип сыра: твердый"
"Cut and clean an eel.": "Порежьте и очистите угря."
"An improved version of the Swimming Potion.": "Улучшенная версия Зелья плавания."
"Stir fry sliced eel with juicy cabbage and tangy onion. Requires a stove or fire pit.": "Обжарьте нарезанного угря с сочной капустой и пикантным луком. Требуется плита или кострище."
"Dye used to color armor electric cyan. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в электрический циан. Опыт начисляется только при первом успешном создании этого рецепта."
"Dye used to color armor electric yellow. You only receive XP the first time you complete this recipe.": "Краситель, используемый для окрашивания брони в электрический жёлтый цвет. Опыт даётся только при первом создании по этому рецепту."
"For one hour, all electricity damage is reduced by 5, potentially eliminating the damage entirely.": "В течение одного часа весь урон от электричества уменьшается на 5, что может полностью устранить урон."
"Create a bundle of 1000 arrow fletchings for expert's and masterwork arrows.": "Создайте связку из 1000 оперений для стрел экспертного и мастерового качества."
"Analyze and decompose an Elf  Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите череп эльфа, чтобы получить практический опыт в френологии этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Impressive Elf Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Проанализируйте и разберите впечатляющий череп эльфа, чтобы получить практический опыт френологии для этой расы. Есть 1% шанс, что ваше исследовательское оборудование сломается."
"Analyze and decompose an Astonishing Elf Skull to get hands-on Phrenology experience for that race. There is a 1% chance your research apparatus will break.": "Анализируйте и разбирайте Удивительный Череп Эльфа, чтобы получить практический опыт в френологии этой расы. С вероятностью 1% ваше исследовательское оборудование может сломаться."
"Records the location of metal that can be mined in Eltibule. The resulting survey requires Mining 45.": "Фиксирует местоположение металлов, которые можно добыть в Элтибуле. Для проведения исследования требуется Горное дело 45."
"Records the location of a mineral deposit in or around Eltibule. The resulting survey requires Geology 27 to use.": "Фиксирует местоположение месторождения минералов в Эльтибуль или вокруг него. Для использования полученного обследования требуется Геология 27."
"Records the location of metal that can be mined in Eltibule. The resulting survey requires Mining 27.": "Фиксирует местоположение металла, который можно добыть в Элтибуле. Для проведения обследования требуется Горное дело 27."
"Records the location of metal that can be mined in Eltibule. The resulting survey requires Mining 15.": "Фиксирует местоположение металлов, которые можно добывать в Элтибуле. Для проведения обследования требуется Навык Горного дела 15."
"Records the location of a mineral deposit in or around Eltibule. The resulting survey requires Geology 35 to use.": "Фиксирует местоположение месторождения минералов в Эльтибуле или вокруг него. Для использования полученной разведки требуется Геология 35."
"Records the location of metal that can be mined in Eltibule. The resulting survey requires Mining 35.": "Фиксирует местоположение металлов, которые можно добыть в Элтибуле. Для проведения разведки требуется Навык Добычи 35."
"Records the location of a mineral deposit in or around Eltibule. The resulting survey requires Geology 20 to use.": "Записывает местоположение минерального месторождения в Эльтибуль или вокруг него. Для использования полученного обследования требуется Геология 20."
"Use clues to plot the location of buried treasure in Eltibule. The resulting treasure map may not actually lead to treasure, depending on your skill and (to a larger extent) the quality of your clues.": "Используйте подсказки, чтобы определить местоположение зарытых сокровищ в Эльтибуле. Полученная карта сокровищ может не привести к настоящему кладу, в зависимости от вашего умения и (в большей степени) качества ваших подсказок."
"For one hour, you are rendered completely infertile, as well as becoming immune to crotch-rot, jungle worm, and nearly all other sexually transmitted diseases.": "В течение одного часа вы становитесь полностью бесплодным, а также приобретаете иммунитет к гниению паха, джунглевому червю и почти ко всем другим заболеваниям, передающимся половым путём."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +20 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно взбодрит.\n\nКогда вы используете способность Боевого обновления, вы восстанавливаете +20 Силы. Действует 4 часа\n\nВ одно время может быть активен только один эффект цветочной композиции."
"For one hour, your genitalia are infused with pleasure-creating energies.": "В течение одного часа ваши гениталии наполняются энергиями, создающими удовольствие."
"Dye used to color armor emerald. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в изумрудный цвет. Опыт начисляется только при первом выполнении этого рецепта."
"This small fire is warm enough to keep you from freezing to death, but not good enough for much else. Lasts 60 seconds once deployed.": "Этот небольшой огонь достаточно тёплый, чтобы не дать вам замёрзнуть насмерть, но больше для ничего не годится. Длится 60 секунд после разведения."
"Create a cask of a white-mold cheese with a bland taste. It's known for having small holes in the final cheese. (Requires a stove or fire pit.)\n\nCheese Type: White": "Создайте бочку сыра с белой плесенью и мягким вкусом. Известен наличием маленьких дырочек в готовом сыре. (Требуется плита или кострище.)\n\nТип сыра: Белый"
"Mass-produce some wine bottles. (Requires a forge or kiln.)": "Массовое производство винных бутылок. (Требуется кузница или печь.)"
"Blow glass into pretty bottles. (Requires a forge or kiln.)": "Выдувайте стекло в красивые бутылки. (Требуется кузница или печь.)"
"Turn sand into glass works of art. (Requires a forge or kiln.)": "Превратите песок в произведения искусства из стекла. (Требуется кузница или печь.)"
"Creates basic bottles.": "Создаёт простые бутылки."
"Holds 1000 dowels. Suitable for use by fletchers. The box can only be used once.": "Вмещает 1000 шкантов. Подходит для использования стрелками. Коробку можно использовать только один раз."
"For healing heinous injuries. Used by First Aid 6 and 7 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения ужасных травм. Используется навыками Первая помощь 6 и 7 (а также другими способностями). Этот набор сделан из магического льда и склонен таять."
"For healing horrific injuries. Used by First Aid 8 and 9 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения ужасных травм. Используется навыками Первая помощь 8 и 9 (а также другими способностями). Этот набор сделан из магического льда и имеет склонность таять."
"An autopsy kit made of ice and fairy dust. (Keep it in your inventory and you'll be given the option to autopsy corpses.)": "Набор для вскрытия, сделанный из льда и пыльцы фей. (Держите его в инвентаре, и вам будет доступна опция вскрытия трупов.)"
"For healing moderate injuries. Used by First Aid 2 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения средних травм. Используется навыком Первая помощь 2 (и другими способностями). Этот набор сделан из магического льда и склонен таять."
"For healing debilitating injuries. Used by First Aid 4 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения изнуряющих травм. Используется в Первой помощи 4 (и других способностях). Этот набор сделан из магического льда и склонен таять."
"For healing serious injuries. Used by First Aid 3 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения серьёзных травм. Используется навыком Первая помощь 3 (и другими способностями). Этот набор сделан из магического льда и склонен таять."
"For healing devastating injuries. Used by First Aid 5 (and other abilities). This kit is made of magical ice and tends to melt.": "Для лечения тяжелых травм. Используется навыком Первая помощь 5 (и другими способностями). Этот набор сделан из магического льда и склонен таять."
"For an hour, all Energy (Fire, Cold, or Electricity) damage is reduced by 5, potentially eliminating the damage entirely.": "В течение часа весь урон от энергии (огонь, холод или электричество) уменьшается на 5, что может полностью устранить урон."
"Add +2% Direct Cold damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого холодного урона к тканевым штанам. Требует 20 очков ремесла. (Должен находиться рядом с дубильной стойкой.)"
"Add +2% Direct Cold damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого холодного урона к тканевой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Add +2% Direct Darkness damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого урона Тьмой к тканевым штанам. Требует 20 очков ремесла. (Необходимо находиться рядом с дубильной стойкой.)"
"Add +2% Direct Darkness damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого урона Тьмой к хлопковой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемным станком.)"
"Add +2% Direct Electricity damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого электрического урона тканевым штанам. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Add +2% Direct Electricity damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого урона электричеством к хлопковой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Add +2% Direct Fire damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого огненного урона к тканевым штанам. Требует 20 очков ремесла. (Необходимо находиться рядом с сушильной стойкой.)"
"Add +2% Direct Fire damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого огненного урона к тканевой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с дубильной стойкой.)"
"Add +2% Direct Nature damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого урона природой к тканевым штанам. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Add +2% Direct Nature damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого урона от природы к хлопковой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемным станком.)"
"Add +2% Direct Psychic damage to cloth pants. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого психического урона тканевым штанам. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемной стойкой.)"
"Add +2% Direct Psychic damage to a cloth shirt. Consumes 20 Craft Points. (Must be near a tanning rack.)": "Добавляет +2% прямого психического урона к тканевой рубашке. Требует 20 очков ремесла. (Необходимо находиться рядом с шкуросъемным станком.)"
"Powdered brains of psychic creatures. A choice drug for psychics. This batch has been enhanced with secret chemicals.": "Порошок из мозгов психических существ. Излюбленное средство для экстрасенсов. Эта партия усилена секретными химикатами."
"The enchanted and ground-up pineal glands of intelligent creatures, mixed with a secret catalyst for added effect.": "Зачарованные и измельчённые эпифизы разумных существ, смешанные с секретным катализатором для усиления эффекта."
"Create ultra-strong yarn for ultra-strong garments.": "Создайте сверхпрочную пряжу для сверхпрочной одежды."
"A pungent smelling wax that helps ensure mating success with bees or wasps.": "Резко пахнущий воск, который помогает обеспечить успех в спаривании с пчёлами или осами."
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +200% more mushrooms than normal\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\\\nВремя выращивания: на 100% дольше обычного\\\\nУрожай: на 200% больше грибов, чем обычно\\\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +220% more mushrooms than normal\nChance for Second Mushroom Type: 20%\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\nВремя выращивания: на 100% дольше обычного\\nУрожай: на 220% больше грибов, чем обычно\\nШанс появления второго типа грибов: 20%\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"When placed in a damp cave, this box can be used to grow a large crop of mushrooms.\nGrow Time: 100% slower than normal\nYield: +240% more mushrooms than normal\nChance for Second Mushroom Type: 40%\nNote: this box requires 2 doses of substrate": "При размещении во влажной пещере эта коробка может использоваться для выращивания большого урожая грибов.\\nВремя выращивания: на 100% дольше обычного\\nУрожай: на 240% больше грибов, чем обычно\\nШанс появления второго типа грибов: 40%\\nПримечание: для этой коробки требуется 2 дозы субстрата"
"Increase your Maximum Tempest Energy +5 by reciting an ancient elven story that can expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed outdoors while surrounded by at least 20 growing garden plants.": "Увеличьте вашу максимальную энергию Бури на +5, рассказав древнюю эльфийскую историю, способную расширить ваш разум. Рассказ нужно произнести только один раз; эффект будет постоянным. Его необходимо произносить на улице, находясь в окружении как минимум 20 растущих садовых растений."
"Increase your Maximum Tempest Energy +5 by reciting elven verses that can expand your mind. The recitation need only be performed once; the effects are permanent. It must be performed outdoors while enjoying post-coital bliss.": "Увеличьте вашу максимальную энергию Бури на +5, произнося эльфийские стихи, способные расширить ваш разум. Произношение нужно выполнить всего один раз; эффект постоянен. Его необходимо выполнять на открытом воздухе, наслаждаясь послесексуальным блаженством."
"Create a cask of a blue cheese with a pleasant smell and mild flavor. (Requires a stove or fire pit.)\n\nCheese Type: Blue": "Создайте бочку голубого сыра с приятным ароматом и мягким вкусом. (Требуется плита или кострище.)\n\nТип сыра: Голубой"
"Creates a snack for two.": "Создаёт закуску на двоих."
"Creates a meal dish for a party of three.": "Создаёт блюдо для компании из трёх человек."
"Research a new Fire Magic spell. You can discover 4 abilities by repeatedly completing this recipe. (You must be near a stove or fire pit.)": "Изучите новое заклинание Огненной магии. Вы можете открыть 4 способности, многократно выполняя этот рецепт. (Вы должны находиться рядом с печью или кострищем.)"
"Study the bones, organs, or body parts of a deceased creature to get a hint about your future. You may not like what you see, but the odds of a good omen are in your favor. This augury tends to have more potent futures -- both good and ill -- than the Advanced Augury. Like the Advanced Augury, it is sensitive to the body part used, with more possible outcomes for certain parts.": "Изучайте кости, органы или части тела умершего существа, чтобы получить подсказку о вашем будущем. Возможно, вам не понравится то, что вы увидите, но шансы на хороший знак на вашей стороне. Это предсказание обычно дает более сильные будущие — как хорошие, так и плохие — чем Продвинутое предсказание. Как и Продвинутое предсказание, оно чувствительно к используемой части тела, с большим количеством возможных исходов для определённых частей."
"Chop a large fish up into bait.": "Нарежьте большую рыбу на приманку."
"For repairing debilitating armor damage. Used by Armor Patching abilities. Crafts 2 kits.": "Для ремонта серьёзных повреждений брони. Используется способностями починки брони. Создаёт 2 набора."
"Create 1000 expert's arrows.": "Создайте 1000 стрел эксперта."
"Create a bundle of 1000 arrow shafts for expert arrows. They are placed in a drying box, ready to be dried out.": "Создайте связку из 1000 древков для стрел эксперта. Их помещают в сушильный ящик, чтобы они высохли."
"Create a bundle of 1000 quality arrowheads for expert arrows.": "Создайте связку из 1000 качественных наконечников для стрел эксперта."
"Create 1000 expert's barbed arrows.": "Создайте 1000 экспертных колючих стрел."
"Create 1000 expert's dense arrows.": "Создайте 1000 плотных стрел эксперта."
"For healing debilitating injuries. Animals can use these bombs with the First Aid Bomb ability.": "Для лечения изнуряющих травм. Животные могут использовать эти бомбы с помощью способности Первая помощь: бомба."
"For healing debilitating injuries. Used by First Aid abilities. This recipe creates two such kits.": "Для лечения изнуряющих травм. Используется способностями первой помощи. Этот рецепт создаёт две такие аптечки."
"Create 1000 expert's long-range arrows.": "Создайте 1000 длинных стрел эксперта."
"Create 1000 expert's reservoir arrows.": "Создайте 1000 стрел из резервуара эксперта."
"A great skinning knife for expert skinners. (+6 to your effective skill when skinning.)\n\nMust be near a forge.": "Отличный нож для снятия шкур для опытных охотников. (+6 к вашему эффективному навыку при снятии шкур.)\n\nДолжен находиться рядом с кузницей."
"Create 1000 expert's snare arrows.": "Создайте 1000 стрел-ловушек эксперта."
"A carefully-made knife designed for expert knife-throwers. (Used with the Knife combat skill.) Recipe creates 10 knives.": "Тщательно изготовленный нож, предназначенный для опытных метателей ножей. (Используется с навыком боя ножом.) Рецепт создаёт 10 ножей."
"A great whittling knife for expert whittlers. Must be near a forge.": "Отличный нож для резьбы для опытных резчиков. Нужно находиться рядом с кузницей."
"Turn good wood into little works of art.\n\nAlso buffs your Knife Damage +105 for 1 hour.": "Превратите хорошую древесину в маленькие произведения искусства.\n\nТакже увеличивает урон ножом на +105 на 1 час."
"Create a ton of tiny, incredibly fragile beakers for use in arrows.": "Создайте множество крошечных, невероятно хрупких колб для использования в стрелах."
"Extract an enchantment from a pair of magic footwear and turn it into an augment. This process destroys the footwear.\n\nThe chosen enchantment must be between levels 0 and 30, and will match the associated skill of the crystal you provide. You can view enchantment levels by holding Shift while viewing the item.\n\n<b>Note:</b> If no enchantments match the crystal and the level requirements, you get nothing, and the item is still destroyed!": "Извлеките зачарование из пары магической обуви и превратите его в улучшение. Этот процесс уничтожит обувь.\n\nВыбранное зачарование должно быть уровнем от 0 до 30 и соответствовать навыку, связанному с предоставленным кристаллом. Вы можете увидеть уровни зачарований, удерживая Shift при просмотре предмета.\n\n<b>Примечание:</b> Если ни одно зачарование не соответствует кристаллу и требованиям по уровню, вы ничего не получите, а предмет всё равно будет уничтожен!"
"Extract an enchantment from a pair of magic footwear and turn it into an augment. This process destroys the footwear.\n\nThe chosen enchantment must be between levels 31 and 60, and will match the associated skill of the crystal you provide. You can view enchantment levels by holding Shift while viewing the item.\n\n<b>Note:</b> If no enchantments match the crystal and the level requirements, you get nothing, and the item is still destroyed!": "Извлеките зачарование из пары магической обуви и превратите его в улучшение. Этот процесс уничтожает обувь.\n\nВыбранное зачарование должно быть уровней от 31 до 60 и соответствовать навыку, связанному с предоставленным кристаллом. Вы можете просмотреть уровни зачарований, удерживая Shift при просмотре предмета.\n\n<b>Примечание:</b> Если ни одно зачарование не соответствует кристаллу и требованиям по уровню, вы ничего не получите, а предмет всё равно будет уничтожен!"
"Extract an enchantment from a pair of magic footwear and turn it into an augment. This process destroys the footwear.\n\nThe chosen enchantment must be between levels 61 and 90, and will match the associated skill of the crystal you provide. You can view enchantment levels by holding Shift while viewing the item.\n\n<b>Note:</b> If no enchantments match the crystal and the level requirements, you get nothing, and the item is still destroyed!": "Извлечь зачарование из пары магической обуви и превратить его в улучшение. Этот процесс уничтожает обувь.\n\nВыбранное зачарование должно быть уровней от 61 до 90 и соответствовать навыку, связанному с предоставленным вами кристаллом. Вы можете просмотреть уровни зачарований, удерживая Shift при просмотре предмета.\n\n<b>Примечание:</b> Если ни одно зачарование не соответствует кристаллу и требованиям по уровню, вы ничего не получите, а предмет всё равно будет уничтожен!"
