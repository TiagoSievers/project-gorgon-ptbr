"So bitter that only an elf could live long enough to learn to tolerate its taste, this tea is a favorite of elven hunters.": "Настолько горький, что только эльф мог прожить достаточно долго, чтобы научиться терпеть его вкус, этот чай является любимым напитком эльфийских охотников."
