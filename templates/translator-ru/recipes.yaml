"Uses a chunk of synthetic \"rubywall\" crystal to locate another chunk growing unnaturally in Serbule Hills.": "Использует кусок синтетического кристалла «рубиновая стена» для обнаружения другого куска, растущего ненатурально в холмах Сербуль."
