"Create an extremely soft cheese that can be shaped into different forms. (Requires a stove or fire pit.)\n\nCheese Type: Whey": "Создайте чрезвычайно мягкий сыр, который можно формовать в разные формы. (Требуется плита или кострище.)\n\nТип сыра: Сывороточный"
"Prepares broccoli florets with the *perfect* amount of salt and butter. Requires a stove or fire pit.": "Готовит соцветия брокколи с *идеальным* количеством соли и масла. Требуется плита или костровище."
"A sweet beer with hints of chocolate.": "Сладкое пиво с нотками шоколада."
"Creates a meal for one.": "Создаёт еду на одного."
