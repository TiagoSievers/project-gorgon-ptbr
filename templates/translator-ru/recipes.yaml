"For 30 minutes, all your Lycanthropy attacks will deal +10% damage. The secret ingredient: your own cursed saliva.": "В течение 30 минут все ваши атаки Ликанторпии будут наносить на 10% больше урона. Секретный ингредиент: ваша собственная проклятая слюна."
"Creates pork and venison sausage.": "Создаёт свиную и оленину колбасу."
"Create a pulled-curd cheese with a slightly rubbery, sweet taste. (Requires a stove or fire pit.)\n\nCheese Type: Pulled-Curd": "Создайте сыр из тянущегося творога с немного резиновым, сладким вкусом. (Требуется плита или кострище.)\n\nТип сыра: Тянущийся творог"
"Cut and clean a sea cat.": "Разрежьте и очистите морского кота."
