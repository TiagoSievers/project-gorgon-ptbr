"Kill, clean, and prepare a lungfish for cooking. Sometimes it's possible to salvage enough lungfish meat for two fillets.": "Убейте, очистите и подготовьте лёгочную рыбу для приготовления. Иногда удаётся добыть достаточно мяса лёгочной рыбы на два филе."
"Concoct an explosive fungal bomb. The bomb is quite deadly to those vulnerable to nature or wolfsbane. This recipe creates three bombs.": "Приготовьте взрывную грибную бомбу. Эта бомба очень опасна для тех, кто уязвим к природе или волчьему яду. Этот рецепт создаёт три бомбы."
"Dye used to color armor magenta. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в малиновый цвет. Опыт даётся только при первом успешном создании по этому рецепту."
"A magic teapot to hold magic tea. (Requires a forge or kiln.)": "Волшебный чайник для хранения волшебного чая. (Требуется кузница или печь.)"
"Cut and clean a mahi mahi.": "Порежьте и очистите махи-махи."
"Boosts maximum health by +20 for 60 minutes.": "Увеличивает максимальное здоровье на +20 на 60 минут."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:08 minutes then bake for approximately 00:45 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте тесту подойти примерно 00:08 минут, затем выпекайте примерно 00:45 минут"
"Creates mushrooms stuffed with delicious mantis meat. Requires a stove or fire pit.": "Создаёт грибы, фаршированные вкусным мясом богомола. Требуется плита или кострище."
"Steams carrots with sugar. A maple-wood fire emphasizes the overwhelming sweetness. Requires a stove or fire pit.": "Приготовленные на пару морковки с сахаром. Огонь из кленовой древесины подчёркивает непревзойдённую сладость. Требуется плита или кострище."
"Creates small chips of maple perfect for smoking fish and meats.": "Создаёт мелкие щепки клёна, идеально подходящие для копчения рыбы и мяса."
"Creates small chips of maple perfect for smoking fish and meats. This version uses a perfect piece of wood to create a large amount of usable chips.": "Создаёт мелкие щепки клёна, идеально подходящие для копчения рыбы и мяса. Эта версия использует идеальный кусок дерева для создания большого количества пригодных щепок."
"Season a shark fillet and cook it over maple to make a truly excellent steak with a sweet smoky flavor. Requires a stove or fire pit.": "Приправьте филе акулы и приготовьте его над кленом, чтобы получить действительно отличный стейк с сладким дымным вкусом. Требуется плита или кострище."
"A collection of fresh flowers, sure to invigorate.\n\nWhen you use a Combat Refresh ability you recover +14 Power. Lasts 4 hours\n\nYou can only have one flower arrangement benefit at a time.": "Сбор свежих цветов, который обязательно придаст бодрости.\\n\\nКогда вы используете способность Боевого обновления, вы восстанавливаете +14 Силы. Действует 4 часа\\n\\nВ одно время может быть активен только один эффект цветочной композиции."
"Cut and clean a marlin.": "Разрежьте и очистите марлина."
"Dye used to color armor maroon. You only receive XP the first time you complete this recipe.": "Краска, используемая для окрашивания брони в бордовый цвет. Опыт даётся только при первом создании по этому рецепту."
"Level 110 giant bat harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Сбруя гигантской летучей мыши уровня 110, которая может распылять химические вещества во время боя (активируя Боевую химию)."
"Level 110 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier.": "Магическое оружие гибрид когтя и фляги уровня 110. При первом создании этого рецепта вы изучаете рецепт следующего, более высокого уровня."
"Level 110 claw/flask hybrid magical weapon. Completing this recipe for the first time teaches you the recipe for the next-highest tier. Max-Enchanting creates items that are one Rarity level higher than they otherwise would be.": "Магическое оружие гибрид когтя и флакона уровня 110. При первом создании по этому рецепту вы изучаете рецепт следующего, более высокого уровня. Макс-Зачарование создаёт предметы на один уровень редкости выше, чем обычно."
"Level 110 spider harness that can disperse chemicals during battle (enabling Battle Chemistry).": "Паучья упряжь 110 уровня, которая может распылять химикаты во время боя (включая Боевую химию)."
"Create 1000 marvelous arrows.": "Создайте 1000 чудесных стрел."
