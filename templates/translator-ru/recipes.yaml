"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 22% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 15.": "Элегантная композиция, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 22% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 15."
"An elegant display that inspires greater diligence when carding cotton.\n\nGrants 33% chance to gain an extra Perfect Cotton when carding cotton.\n\nOnce deployed, display lasts 5 minutes and can be used by any number of players that have at least Nature Appreciation 35.": "Элегантная композиция, которая вдохновляет на большую усердность при чесании хлопка.\n\nДарует 33% шанс получить дополнительный идеальный хлопок при чесании хлопка.\n\nПосле установки композиция действует 5 минут и может использоваться любым количеством игроков с уровнем Природоведения не ниже 35."
