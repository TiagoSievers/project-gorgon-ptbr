"Level 10 gloves. (Must be near a tanning rack.)": "Перчатки 10 уровня. (Нужно находиться рядом с шкуросъемной стойкой.)"
"Level 10 gloves, infused with magic. (Must be near a tanning rack.)": "Перчатки 10 уровня, наполненные магией. (Нужно находиться рядом с шкурательным станком.)"
"Level 10 headwear. (Must be near a tanning rack.)": "Головной убор 10 уровня. (Должен находиться рядом с стойкой для дубления.)"
"Level 10 headwear, infused with magic. (Must be near a tanning rack.)": "Головной убор 10 уровня, наполненный магией. (Должен находиться рядом с шкуросъемным станком.)"
"Level 10 leggings. (Must be near a tanning rack.)": "Поножи 10 уровня. (Необходимо находиться рядом с шкурательной стойкой.)"
