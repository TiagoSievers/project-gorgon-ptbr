"Create a deviled egg, by hard-boiling an Infernal egg, then adding just enough demonic energy to give it that extra kick.": "Создайте фаршированное яйцо, сварив Адское яйцо вкрутую, а затем добавив немного демонической энергии для дополнительной остроты."
"Creates a meal. Requires a stove or fire pit. For best results, proof for approximately 00:09 minutes then bake for approximately 00:14 minutes": "Создаёт блюдо. Требуется плита или кострище. Для наилучшего результата дайте постоять примерно 00:09 минут, затем выпекайте примерно 00:14 минут"
"Creates a snack.": "Создаёт закуску."
"60% chance to increase maximum inventory size by 1 for an hour. 25% chance to increase maximum inventory size by 3 for an hour. 15% chance to reduce maximum inventory size by 5 for an hour. You can drink this potion multiple times, with stacking effects.": "60% шанс увеличить максимальный размер инвентаря на 1 на час. 25% шанс увеличить максимальный размер инвентаря на 3 на час. 15% шанс уменьшить максимальный размер инвентаря на 5 на час. Вы можете выпить это зелье несколько раз, эффекты суммируются."
"Infuses a dirk with the following power: Knife Accuracy +8. The benefit lasts until you have made 1250 Knife attacks. While sharpened, the weapon has a requirement of Knife Fighting level 15. Completing this recipe for the first time teaches you the next tier of this recipe.": "Наполняет кинжал следующей силой: Точность ножа +8. Эффект длится до тех пор, пока вы не совершите 1250 атак ножом. Пока оружие заточено, для него требуется уровень владения ножевым боем 15. Первый раз, когда вы создадите этот рецепт, вы изучите следующий уровень этого рецепта."
