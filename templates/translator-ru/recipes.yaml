"Level 10 slippers. (Must be near a tanning rack, for some reason.)": "Тапочки 10 уровня. (По какой-то причине нужно находиться рядом с шкуросъемной стойкой.)"
"Level 10 slippers, infused with magic. (Must be near a tanning rack, for some reason.)": "Тапочки 10 уровня, наполненные магией. (По какой-то причине нужно находиться рядом с шкуросъемным станком.)"
"Level 10 club, suitable for use with the Hammer skill.": "Дубина 10 уровня, подходит для использования с навыком Молот."
"Level 10 club infused with magic.": "Дубина 10 уровня, наполненная магией."
"Level 10 fighting staff. This staff works for staff fighting, druidism, fire magic, and ice magic.": "Боевой посох 10 уровня. Этот посох подходит для боя посохом, друидизма, огненной магии и ледяной магии."
