"Deliver 10 Shoddy Werewolf Hind Leg Guards to Sheyna in Rahu. Reward: 346 councils.\nNote from orderer: <i>\"If these aren't REALLY shoddy, I'm sending 'em RIGHT BACK for a refund.\"</i>": "Доставьте 10 плохих задних защитников ног оборотня Шейне в Раху. Награда: 346 советов.\nПримечание от заказчика: <i>«Если они не ОЧЕНЬ плохие, я отправлю их ОБРАТНО за возвратом денег.»</i>"
"Deliver 10 Shoddy Werewolf Hindguards to Sheyna in Rahu. Reward: 434 councils.": "Доставьте 10 плохих задних защитников оборотня Шейне в Раху. Награда: 434 совета."
"Ailred in Povus said, \"Are you finally ready to take my order? I've been waiting for hours! Yes, I'd like the shroom feast, please. And please try to keep it as ungreasy as possible.\"": "Эйлред в Повусе сказал: «Ты наконец готов принять мой заказ? Я жду уже несколько часов! Да, я хотел бы грибной пир, пожалуйста. И постарайся, чтобы он был как можно менее жирным.»"
"Deliver 10 Shroom Feasts to Laura Neth in Kur Mountains. Reward: 5,895 councils.": "Доставьте 10 грибных угощений Лауре Нет в горах Кур. Награда: 5,895 советов."
"Silvia in Sun Vale said, \"I'm getting reports that some of the spiders near here are developing some sort of spinneret-related disease. If that's true, I may be able to identify the problem if I can study enough of their spiderwebs.\"": "Сильвия в Солнечной Долине сказала: «Мне поступают сообщения, что некоторые пауки поблизости заражены каким-то заболеванием, связанным с паутинными бородавками. Если это правда, я смогу определить проблему, если изучу достаточно их паутины.»"
"Hogan in Hogan's Keep asked you to visit Sie Antry at her home southwest of Hogan's Keep.": "Хоган в Хоганском Крепости попросил вас навестить Си Энтри в её доме к юго-западу от Хоганского Крепости."
"Deliver 10 Silver Ore to Irkima in Red Wing Casino. Reward: 1,585 councils.": "Доставьте 10 единиц серебряной руды Иркиме в казино Красное Крыло. Награда: 1 585 советов."
