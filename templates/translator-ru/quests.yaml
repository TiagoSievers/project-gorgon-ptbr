"Deliver 10 Hyacinth Bouquets to Korbok in Vidaria. Reward: 39,865 councils.": "Доставьте 10 букетов гиацинтов Корбоку в Видарии. Награда: 39,865 советов."
"Deliver 10 Hyacinths to Korbok in Vidaria. Reward: 25,603 councils.": "Доставьте 10 гиацинтов Корбоку в Видарии. Награда: 25,603 совета."
"Deliver 10 Hydration Punches to Laura Neth in Kur Mountains. Reward: 8,799 councils.": "Нанесите 10 ударов Гидратации Лауре Нет в горах Кур. Награда: 8,799 советов."
"Deliver 10 Ice Cores to Fitz the Boatman on the Serbule docks. Reward: 1,276 councils.": "Доставьте 10 ледяных ядер Фитцу Лодочнику на доках Сербуля. Награда: 1,276 советов."
"Deliver 99 Ice Cores to Korbok in Vidaria. Reward: 24,815 councils.": "Доставьте 99 ледяных ядер Корбоку в Видарии. Награда: 24 815 советов."
"Landri in the Kur Mountains asked for Ice Cores.": "Ландри в горах Кур попросил ледяные ядра."
"Deliver 10 Ice Magic Boost Potion 20% to Irkima in Red Wing Casino. Reward: 3,660 councils.": "Доставьте 10 Зелий усиления ледяной магии 20% Иркиме в казино Красное Крыло. Награда: 3 660 советов."
"Ratuk the Thinker asked you to deliver a note to an elf named Landri the Cold. He said Landri was in an inn somewhere in Kur Mountains.": "Ратук Мыслящий попросил тебя доставить записку эльфу по имени Ландри Холодный. Он сказал, что Ландри находится в трактире где-то в горах Кур."
"Trekker in Gazluk said, \"Psst... you're with the Wardens? Whew! I was hoping backup would arrive!\n\nA few days ago, teams of orcs from Gazluk Keep were up here clearing out their secret system of mountain trails. And today we found out that there are now hundreds of slimes in the southern valley! That has to be connected. Right?\n\nSometimes ice slimes fall down the mountain, but not in numbers like this. The animals that live in the valley don't know how to avoid ice slimes. They're sitting ducks! And deer, and goats, and other animals! Not to mention those dwarves that live in the New Prestonbule cave. Please help me lower the number of ice slicks down there!\"": "Путешественник в Газлуке сказал: «Псс... ты с Хранителями? Фух! Я надеялся, что придёт подкрепление!\n\nНесколько дней назад отряды орков из крепости Газлук чистили здесь свою секретную систему горных троп. А сегодня мы узнали, что в южной долине теперь сотни слизней! Это должно быть связано. Правда?\n\nИногда ледяные слизни срываются с горы, но не в таких количествах. Животные, живущие в долине, не умеют избегать ледяных слизней. Они как на ладони! Олени, козы и другие животные! Не говоря уже о тех гномах, что живут в пещере Новый Престонбуль. Пожалуйста, помоги мне сократить число ледяных слизней там!"
"Bellema Deftwhisper in New Prestonbule said, \"When we were checking altitude measurements the other day, we found some very unusual creatures on top of the mountains. They're like slimes, but ice cold! A few fiery crossbow bolts can take 'em out. There's something inside, though... a sort of gunk. I'm thinking it might help make a nice kind of crossbow bolt. If you run across any ice slimes out there, check 'em for sludge!\"": "Беллема Дефтвиспер в Нью Престонбуле сказала: «Когда мы на днях проверяли измерения высоты, мы нашли на вершинах гор очень необычных существ. Они похожи на слаймов, но ледяные! Несколько огненных болтов из арбалета могут их уничтожить. Но внутри есть что-то... вроде слизи. Думаю, из неё можно сделать хороший вид болтов для арбалета. Если встретишь ледяных слаймов, проверь их на наличие этой слизи!»"
"Bendith in the Fae Realm said, \"My... studies... require icebreeze moth wings. They are one of the only insects immune to cold, and so they are quite common back home. I'm sure plenty have flown through the portal to this land; look for areas where the Winter Court has taken control.\"": "Бендит в Фейском мире сказал: «Мои... исследования... требуют крыльев мотылька Ледяного Бриза. Это одни из немногих насекомых, невосприимчивых к холоду, поэтому они довольно распространены на родине. Я уверен, что многие пролетели через портал в эту землю; ищите места, где Зимний Двор взял верх.»"
"Deliver 10 Icebreeze Moth Wings to Ogamboe in the Fae Realm. Reward: 8,907 councils.": "Доставьте 10 крыльев мотылька Ледяного Бриза Огамбо в Царство Фей. Награда: 8,907 советов."
"Bogaku in the Rahu Sewers said, \"I had a thought about the tree-mutants down here. Have you tried pruning them? You have? But they just wilt away? Hmmm.\n\nWell, there must be some way to save part of the tree. Try chopping them up after you kill them and see what you can find.\"": "Богака в канализации Раху сказал: «У меня возникла мысль насчёт мутантов-деревьев здесь. Ты пробовал их обрезать? Пробовал? Но они просто вянут? Хммм.\n\nНу, должно быть, есть способ спасти часть дерева. Попробуй нарезать их после убийства и посмотри, что сможешь найти."
"Deliver 10 Imatia's Sight Potions to Irkima in Red Wing Casino. Reward: 5,492 councils.": "Доставьте 10 зелий зрения Иматиа Иркиме в казино Красное Крыло. Награда: 5 492 совета."
"Farsight Flemmings in Statehelm said, \"Here's an order from a craniologist. I need skulls of a specific quality.\"": "Фарсайт Флеммингс в Стейтхелме сказал: «Вот заказ от краниолога. Мне нужны черепа определённого качества.»"
"Leah Bowman in Povus said, \"Thank you for killing Brukal for me. I... I want our relationship to be honest, so let me tell you bluntly: that was a little out of line. I wanted him dead, but I didn't mean you should just... and the worst part is that It's made me feel nervous to be around you! But I do thank you. I know you did it out of kindness for a friend.\n\nI've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.\"": "Лия Боуман в Повусе сказала: «Спасибо, что убил Брукала для меня. Я... хочу, чтобы наши отношения были честными, так что скажу прямо: это было немного чрезмерно. Я хотела, чтобы он был мёртв, но не думала, что ты просто... И самое худшее, что теперь мне не по себе рядом с тобой! Но я всё равно благодарна. Я знаю, что ты сделал это из доброты к другу.\n\nЯ решила установить небольшой памятник своим родителям — обоим — за городом. Не мог бы ты собрать для меня немного цветов? Мак всегда был любимым цветком мамы. Моим тоже."
"Ormond Neth in Statehelm said, \"Ballads performed at taverns are for the posers. Real bards can create ballads while fighting to the death. Good ballads, too! Keep practicing at it until you get the hang of it.\n\n<i>[Use Virtuoso's Ballad while fighting level 80+ enemies.]</i>\"": "Ормонд Нет в Стейтхельме сказал: «Баллады, исполняемые в тавернах, — для позёров. Настоящие барды могут создавать баллады, сражаясь насмерть. И хорошие баллады, к тому же! Продолжай тренироваться, пока не освоишь это.\n\n<i>[Используй Балладу Виртуоза в бою с врагами уровня 80 и выше.]</i>"
"Sem the Myconian (in a cave in New Prestonbule) said, \"Although my species is generally able to cohabit with slimes and fungi of all types, there exist herein a species that reduces the ambient temperature. This is clearly unacceptable behavior. Please extinguish these slimes before they make the environment uninhabitable!\"": "Сэм Микониан (в пещере в Новом Престонбуле) сказал: «Хотя мой вид обычно способен сосуществовать со слизнями и грибами всех типов, здесь существует вид, который понижает окружающую температуру. Это явно недопустимое поведение. Пожалуйста, уничтожьте этих слизней, прежде чем они сделают среду обитания непригодной!»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятные стрелы. Я щедро заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятные колючие стрелы. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятно Плотные Стрелы. Я щедро заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятно Длинные Стрелы. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятные стрелы с резервуарами. Я щедро заплачу за них, но их нужно сделать по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Невероятные стрелы-сети. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Drummond Stonecurl in Vidaria said, \"We don't have a wide variety of ingredients in this area, but we do have one thing that's unique: a bunch of infernal creatures. I've heard, mostly from Denton, that there are non-demons nearby that are studying the demons. Their research may prove useful in the culinary world. Or at least, in <i>my</i> culinary world.\n\nBring me some of this demonic research so I can see if any of it is useful.\"": "Драммонд Стоункерл в Видарии сказал: «У нас в этом районе нет большого разнообразия ингредиентов, но есть одна уникальная вещь: множество инфернальных существ. Я слышал, в основном от Дэнтона, что неподалёку есть не-демоны, которые изучают демонов. Их исследования могут оказаться полезными в кулинарии. Или, по крайней мере, в <i>моём</i> кулинарном мире.\n\nПринеси мне немного этих демонических исследований, чтобы я мог проверить, есть ли среди них что-то полезное."
"Deville Neth in Statehelm said, \"That little plan went great! I sold a lot of bread, and reminded people how good fresh bread is. It's led to repeat customers!\n\nBut Vexford is embarrassed. And an embarrassed man is dangerous.\n\nTake this to my daughter Laura. She's my oldest and smartest. She lives in Kur, in self-inflicted banishment. Tell her it's time to come home.\"": "Девиль Нет в Стейтхелме сказал: «Этот маленький план удался на славу! Я продал много хлеба и напомнил людям, какой вкусный свежий хлеб. Это привело к повторным покупателям!\\n\\nНо Вексфорд смущён. А смущённый человек опасен.\\n\\nОтнеси это моей дочери Лауре. Она моя старшая и самая умная. Она живёт в Кур, в добровольном изгнании. Скажи ей, что пора возвращаться домой."
"Poe the Myconian asked you to retrieve some blusher mushrooms. Poe will use them to inhibit premature sporing.": "Поэ из Микониана попросил тебя добыть несколько румяных грибов. Поэ использует их, чтобы подавить преждевременное спорообразование."
"Gloria Stonecurl in Kur Mountains said, \"I just need some quality ink to complete the blessing of safety on Ukorga's inn. And I know that human Laura Neth has the ink I need. But she won't sell it to me!\n\n<i>[Gloria takes a deep breath and calms herself.]</i> Can you see if you can buy some ink from her? Or from anywhere, really. I don't care, I just need to get this done!\"": "Глория Стоункерл в горах Кур сказала: «Мне просто нужна качественная тушь, чтобы завершить благословение безопасности на трактире Укорги. И я знаю, что человек Лаура Нет имеет нужную мне тушь. Но она не хочет её продавать!\n\n<i>[Глория глубоко вздыхает и успокаивается.]</i> Можешь ли ты попытаться купить у неё тушь? Или вообще где-нибудь. Мне всё равно, мне просто нужно это сделать!"
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some grickling eyeballs were inserted into it. What do you have to lose?": "В пещере под Повусом вы нашли странное устройство, которое, казалось, можно активировать, если вставить в него несколько глаз грикллинга. Что вам терять?"
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some osslar spikes were inserted into it. What do you have to lose?": "В пещере под Повусом вы нашли странное устройство, которое, казалось, можно активировать, если вставить в него шипы осслар. Что вам терять?"
"In a cave beneath Povus, you found a strange device that seemed like it could be activated if some rubies were inserted into it. What do you have to lose? Besides some rubies?": "В пещере под Повусом вы нашли странное устройство, которое, казалось, можно активировать, если вставить в него несколько рубинов. Что вам терять? Кроме нескольких рубинов?"
"Landri the Cold asked you to enter the dungeon underneath the tower in Kur and find her old mentor, a necromancer named Lomas. She wants his skull as proof that he's fully dead.\n\nLandri gave you a special amulet that can let you enter the ice barrier deep within the dungeon.": "Ландри Холодная попросила тебя войти в подземелье под башней в Куре и найти её старого наставника, некроманта по имени Ломас. Ей нужен его череп в доказательство того, что он полностью мёртв.\n\nЛандри дала тебе особый амулет, который позволит пройти через ледяной барьер глубоко в подземелье."
"Pitre Ferrence in Vidaria said, \"I was stationed here to keep an eye on Korbok, so to hear that you collected various poisons for him is troubling. Doubly so, that he winked at you when you gave them to him. Bring me a sampling of all of the poisons that you gave him, so I can try to suss out what he's working on without confronting him directly.\"": "Питр Ферренс в Видарии сказал: «Меня сюда направили следить за Корбоком, поэтому слышать, что ты собрал для него разные яды, вызывает беспокойство. Вдвойне тревожно, что он подмигнул тебе, когда ты передал их ему. Принеси мне образцы всех ядов, которые ты ему дал, чтобы я мог попытаться выяснить, над чем он работает, не сталкиваясь с ним напрямую.»"
"Voo the myconian asked for some Iocaine Mushrooms.": "Ву, миконианец, попросил несколько йокаиновых грибов."
"Deliver 10 Iridium to Irkima in Red Wing Casino. Reward: 4,573 councils.": "Доставьте 10 единиц иридия Иркиме в казино Красное Крыло. Награда: 4,573 совета."
"Tadion wants an ivory horn.": "Тадион хочет слоновый рог."
"Deliver 10 Ivory Horns to Thimble Pete in Hogan's Keep, Eltibule. Reward: 10,867 councils.\nNote from orderer: <i>\"I have heard that rhinos in the Council Lands grow ivory horns instead of horns made of animal fat. I must see these for myself!\"</i>": "Доставьте 10 слоновых рогов Тимбл Питу в Крепость Хогана, Элтибуле. Награда: 10 867 советов.  \nПримечание от заказчика: <i>«Я слышал, что носороги в Землях Совета растят слоновые рога вместо рогов из животного жира. Я должен увидеть это своими глазами!»</i>"
"Ivyn in Serbule asked you to kill the Salmpo, a plant creature he accidentally grew. It's south of town.": "Айвин в Сербуле попросил тебя убить Салмпо, растительное существо, которое он случайно вырастил. Это к югу от города."
"Ivyn in Serbule wants butter.": "Айвин в Сербуле хочет масло."
"Ivyn in Serbule asked you to buy three Squash Seedlings for him. Therese (near the windmill) sells them.": "Ивин в Сербуле попросил тебя купить для него три саженца тыквы. Терез (рядом с ветряной мельницей) продаёт их."
"Ivyn in Serbule has asked you to give him an Ancient Bronze Coin if you come across one while hunting.": "Айвин в Сербуле попросил тебя отдать ему Древнюю бронзовую монету, если ты найдёшь её во время охоты."
"Ivyn in Serbule asked you to find the Demon Bean in the old spider-filled crypt in the cemetery.": "Айвин в Сербуле попросил вас найти Демоническую бобину в старой крипте, полной пауков, на кладбище."
"In a cave beneath Povus, you came upon a chest that had been kicked in, leaving it unopenable. But you believe that with a large spoon, you could pry the chest open.": "В пещере под Повусом вы наткнулись на сундук, который был пнул, из-за чего его нельзя открыть. Но вы считаете, что большой ложкой можно поддеть и открыть сундук."
"Moxie said, \"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Astounding Magic Rings and 5 Astounding Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\"": "Ловкость сказала: «Привет! Я недавно присоединилась к каравану, чтобы изучить новые методы ювелирного дела. Как насчёт того, чтобы начать вместе с тобой? Сделай для меня 5 потрясающих магических колец и 5 потрясающих зачарованных ожерелий. Принеси их мне для изучения, и взамен я поделюсь с тобой частью своих знаний. Звучит как честный обмен?»"
"Moxie said, \"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Great Magic Rings and 5 Great Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\"": "Ловкость сказала: «Привет! Я недавно присоединилась к каравану, чтобы изучить новые методы ювелирного дела. Как насчёт того, чтобы начать вместе с тобой? Сделай для меня 5 великолепных магических колец и 5 великолепных зачарованных ожерелий. Принеси их мне для изучения, и взамен я поделюсь с тобой частью своих знаний. Справедливая сделка?»"
"Moxie said, \"Hi There! I'm fairly new to the caravan! So you like making jewelry too? Let's swap some ideas! Bring me 5 Nice Magic Rings and 5 Nice Enchanted Necklaces. Once I can go over your stuff, I'll share some of what I know too!\"": "Мокси сказала: «Привет! Я довольно новенькая в караване! Тебе тоже нравится делать украшения? Давай обменяемся идеями! Принеси мне 5 красивых волшебных колец и 5 красивых зачарованных ожерелий. Как только я посмотрю твои вещи, я тоже поделюсь тем, что знаю!»"
"Paullus in Statehelm said, \"Try making some juniper wine. It's not easy, but it's worth it! Sometimes, anyway!\"": "Пауллус в Стейтхельме сказал: «Попробуй сделать можжевеловое вино. Это не просто, но того стоит! Иногда, по крайней мере!»"
"Pegast in the Fae Realm said, \"You're a friend, and I trust your discretion. We both know that the Winter Court is infiltrating this land, and they need to be stopped. But we dare not attack them until they attack first.\n\nYou, on the other hand... you could just kill 'em all, as the humans say...\"": "Пегаст в Фейском мире сказал: «Ты друг, и я доверяю твоей рассудительности. Мы оба знаем, что Зимний Двор проникает в эти земли, и их нужно остановить. Но мы не смеем нападать первыми.\n\nА ты, с другой стороны... можешь просто убить их всех, как говорят люди..."
"Floxie in the Fae Realm said, \"Pegast will not relent! He wants me to hop to the next mushroom circle and take out the winter court there. But I can't bring myself to do it! Could you ... do it for me? Just a few kills should be enough to get him out of my nest for a bit.\"": "Флокси в Королевстве Фей сказала: «Пегаст не отступит! Он хочет, чтобы я перепрыгнула на следующий круг грибов и уничтожила зимний двор там. Но я не могу заставить себя это сделать! Не мог бы ты... сделать это за меня? Несколько убийств должно хватить, чтобы он отстал от моего гнезда на время.»"
"Yasinda in Hogan's Keep asked you to find out if Sir Villas Wake has any children, so she can kill one to avenge her daughter's death. Villas Wake is dead, but she believes he may have left some personal belongings at Eltibule Keep.": "Ясинда в Крепости Хоган попросила тебя узнать, есть ли у сэра Виллас Уэйка дети, чтобы она могла убить одного из них в отместку за смерть своей дочери. Виллас Уэйк мертв, но она считает, что он мог оставить личные вещи в Крепости Элтибул."
"Pegast in the Fae Realm said, \"You plan to kill more of the Winter Court menace? Wonderful! Go and 'mortal everything up' for the Winter Court!\"": "Пегаст в Фейском царстве сказал: «Ты собираешься уничтожить ещё больше угрозы Зимнего Двора? Прекрасно! Иди и «сделай всё смертным» для Зимнего Двора!»"
"Ukorga in the Kur Mountains asked you for Cedar Wood Chips to keep the kitchen stocked.": "Укорга в горах Кур попросил вас принести щепки кедра, чтобы поддерживать запасы на кухне."
"Deliver 10 Keep-Me-Alive Juices to Viedesi in Sun Vale. Reward: 2,223 councils.": "Доставьте 10 Соков для поддержания жизни Вьедеси в Солнечной Долине. Награда: 2,223 совета."
"Mandibles in Red Wing Casino said, \"Assistance? No, no, I am here to help you! ... Well, if you insist on aiding staff members, the meat storage receptacle could be kept at a slightly colder temperature to reduce spoilage. A few more Ice Cores would work.\"": "Жвала в казино Красное Крыло сказал: «Помощь? Нет, нет, я здесь, чтобы помочь тебе! ... Ну, если ты настаиваешь на помощи сотрудникам, то контейнер для хранения мяса можно держать немного холоднее, чтобы уменьшить порчу. Несколько дополнительных Ледяных Ядер подойдут.»"
"Deliver 10 Kegs of Basic Lager to Irkima in Red Wing Casino. Reward: 9,468 councils.": "Доставьте 10 бочек с простым лагерем Иркиме в казино Красное Крыло. Награда: 9,468 советов."
"Deliver 10 Kegs of Brown Ale to Irkima in Red Wing Casino. Reward: 24,871 councils.": "Доставьте 10 бочек с коричневым элем Иркиме в казино Красное Крыло. Награда: 24 871 совет."
"Deliver 10 Kegs of Dwarven Stout to Irkima in Red Wing Casino. Reward: 32,784 councils.": "Доставьте 10 бочек гномьего стаута Иркиме в казино Красное Крыло. Награда: 32 784 совета."
"Deliver 10 Kegs of Goblin Ale to Irkima in Red Wing Casino. Reward: 17,217 councils.": "Доставьте 10 бочек гоблинского эля Иркиме в казино Красное Крыло. Награда: 17 217 советов."
"Deliver 10 Kegs of Hegemony Lager to Irkima in Red Wing Casino. Reward: 28,932 councils.": "Доставьте 10 бочек лагера Гегемонии Иркиме в казино Красное Крыло. Награда: 28,932 совета."
"Deliver 10 Kegs of Marzen to Irkima in Red Wing Casino. Reward: 14,413 councils.": "Доставьте 10 бочек Марцена Иркиме в казино Красное Крыло. Награда: 14 413 советов."
"Deliver 10 Kegs of Orcish Bock to Irkima in Red Wing Casino. Reward: 21,147 councils.": "Доставьте 10 бочек орочьего бокса Иркиме в казино Красное Крыло. Награда: 21 147 советов."
"Deliver 10 Kegs of Pale Ale to Irkima in Red Wing Casino. Reward: 11,880 councils.": "Доставьте 10 бочек светлого эля Иркиме в казино Красное Крыло. Награда: 11 880 советов."
"Gerrux in Povus said, \"In my spare time I dabble in artistic weapon improvements, and I'm working on a dazzling khopesh. But I need more raw materials!\n\nI'm not a smith, but if I had enough old broken blades, I could probably fulfill my artistic vision.\"": "Геррукс в Повусе сказал: «В свободное время я занимаюсь художественным улучшением оружия, и сейчас работаю над ослепительным копешем. Но мне нужно больше сырья!\n\nЯ не кузнец, но если бы у меня было достаточно старых сломанных клинков, я, вероятно, смог бы воплотить свою художественную задумку."
"Truxartis in Vidaria said, \"Listen carefully.\n\nSeek a lich named Khyrulek underneath a town called Serbule. The lich... isn't there. But there may be... guardians.\n\nThis lich had a planar guide which I need. It will be hidden in a trove of Tuvillus artifacts.\n\nIf I recall... you can find it in her sleeping quarters.\n\nLook for a rune of Tuvillus -- a red sigil. It will be... on the wall.\n\nTouch it to reveal the hoard. Bring me back Khyrulek's Planar Planner.\"": "Труксартис в Видарии сказал: «Слушай внимательно.\n\nИщи лича по имени Хирулек под городом Сербуль. Лича... там нет. Но могут быть... стражи.\n\nУ этого лича был планарный путеводитель, который мне нужен. Он будет спрятан в сокровищнице артефактов Тувиллуса.\n\nЕсли я правильно помню... ты можешь найти его в её спальной комнате.\n\nИщи руну Тувиллуса — красный символ. Она будет... на стене.\n\nКоснись её, чтобы открыть сокровищницу. Принеси мне планарный путеводитель Хирулека."
"Kib the Unkillable in Red Wing Casino said, \"I learned something fascinating yesterday: there are relatively low-cost fire resistance potions on this continent. Those are quite rare in my homeland. Sadly they don't see much use here in the casino. I bought Ragabir's stock, but I have more tests to run. Can you bring me several doses?\"": "Киб Неубиваемый в казино Красное Крыло сказал: «Вчера я узнал кое-что интересное: на этом континенте есть относительно недорогие зелья сопротивления огню. В моей родине они довольно редки. К сожалению, здесь, в казино, их мало используют. Я купил запасы Рагабира, но мне нужно провести ещё несколько испытаний. Можешь принести мне несколько доз?»"
"Sir Hughes in Statehelm said, \"We've seen how you can punch. But now you need to really test your kicking power. Go and kick some of those demon dogs -- those Cerberi -- to death. Take off your shoes and any leg guards so you can feel the complete motion of your limbs.\n\n<i>[You must have the empty Feet and Legs slots, and kill enemies with Kick abilities, to advance this quest.]</i>\"": "Сэр Хьюз в Стейтхелме сказал: «Мы видели, как ты умеешь бить кулаками. Но теперь тебе нужно действительно проверить силу своих ударов ногой. Иди и забей до смерти нескольких из этих демонических собак — церберов. Сними обувь и любые защитные элементы на ногах, чтобы почувствовать полное движение конечностей.\n\n<i>[Для выполнения этого задания у тебя должны быть пустые слоты для Ног и Ступней, и нужно убивать врагов с помощью ударов ногой.]</i>"
"Deliver 10 Kilderkins to Fitz the Boatman on the Serbule docks. Reward: 5,303 councils.": "Доставьте 10 Килдеркинсов Фитцу Лодочнику на доках Сербуля. Награда: 5,303 совета."
"Kill 10 deer and return to Marna.": "Убейте 10 оленей и вернитесь к Марне."
"Kill 2 fey panthers and return to Kalaba.": "Убейте 2 фейских пантер и вернитесь к Калабе."
"Sie Antry wants you to kill Giant Mantises near her homestead.": "Зи Антри хочет, чтобы вы убили гигантских богомолов возле её усадьбы."
"Kill 10 giant mantises and return to Sie Antry.": "Убейте 10 гигантских богомолов и вернитесь к Сие Энтри."
"Sie Antry wants you to kill Giant Snails near her homestead.": "Си Антри хочет, чтобы вы убили гигантских улиток возле её усадьбы."
"Kill 10 giant snails and return to Sie Antry.": "Убейте 10 гигантских улиток и вернитесь к Сие Антри."
"Kill 30 goblins and return to Oritania.": "Убейте 30 гоблинов и вернитесь к Оритании."
"Mushroom Jack in Serbule wants you to find and kill a dozen Myconians. He says he'll know when you've done it.": "Грибной Джек в Сербуле хочет, чтобы вы нашли и убили дюжину микониан. Он говорит, что узнает, когда вы это сделаете."
"Kill 5 panthers and return to Kalaba.": "Убейте 5 пантер и вернитесь к Калабе."
"(No longer used or given out!)": "(Больше не используется и не выдается!)"
"Kill 10 spiders and return to Oritania.": "Убейте 10 пауков и вернитесь к Оритании."
"Jaime Fatholm would appreciate if you killed a sheep that's humiliated her. She said, \"He lives on a hill south of here. Not the hill immediately south, but the one past that, in between the Baroness and the old hunting lodge.\"": "Хайме Фатхолм будет признательна, если ты убьёшь овцу, которая её унизила. Она сказала: «Он живёт на холме к югу отсюда. Не на ближайшем к югу холме, а на том, что дальше, между баронессой и старой охотничьей усадьбой.»"
"Orrrilund in the Ranalon Den said, \"If you're set on getting past this door, you'll have to prove to me you won't die the moment you do. Go kill the Doctrine-Keeper, and when you've done that we'll talk.\"": "Оррилунд в Логове Раналон сказал: «Если ты настроен пройти через эту дверь, тебе нужно доказать мне, что ты не умрёшь сразу после этого. Иди и убей Хранителя Доктрины, а когда сделаешь это, мы поговорим.»"
"Orrrilund in the Ranalon Den said, \"It looks like another Doctrine-Keeper took the last one's place. If you take care of that one, too, I'll give you something for your troubles.\"": "Оррилунд в Логове Раналона сказал: «Похоже, другой Хранитель Доктрины занял место предыдущего. Если ты позаботишься и об этом, я дам тебе что-нибудь за труды.»"
"Orrrilund in the Ranalon Den said, \"You know what'll really get them to change things up? Taking down the Den Mother. Yes, she'll be replaced by another, but it's about proving to them nothing is safe.\"": "Оррилунд в Логове Раналон сказал: «Знаешь, что действительно заставит их изменить подход? Убить Матку Логова. Да, её заменит другая, но дело в том, чтобы доказать им, что ничто не в безопасности.»"
"Orrrilund in the Ranalon Den said, \"As expected, a new Den Mother was born or burrowed in from somewhere. If you take care of this one, I'll give you some of these scrolls I found laying around. \"": "Оррилунд в Логове Раналон сказал: «Как и ожидалось, появилась новая Матка Логова или прорылась откуда-то. Если ты справишься с этой, я дам тебе несколько свитков, которые нашёл поблизости.»"
"Mandibles in Red Wing Casino said, \"I miss my time in Sedgewick Forest, when I worked with my brethren to keep goblin populations in check. Would you kill goblins in my name? As they perish, make sure to state, 'This is for Mandibles.'\"": "Мэндблс в казино Красное Крыло сказал: «Я скучаю по временам в лесу Седжуик, когда я работал со своими собратьями, чтобы контролировать численность гоблинов. Ты убьёшь гоблинов во имя моё? Когда они погибнут, обязательно говори: «Это для Мэндблса.»»"
"Ratuk the Thinker asked for some orcish spell pouches, which can occasionally be found on orcish wizards.": "Ратук Мыслящий попросил несколько орочьих мешочков со заклинаниями, которые иногда можно найти у орочьих волшебников."
"Furlak in Rahu asked you to kill some orcs in his name. The closest ones, however, are in the Kur Mountains.": "Фурлак в Раху попросил тебя убить несколько орков от его имени. Однако ближайшие находятся в горах Кур."
"Gerrux in Povus has asked you to find his deceased sister's key, which she threw into the river before her death. He heard there's a ranalon who trades in river treasures who might be able to help.": "Геррукс в Повусе попросил тебя найти ключ его покойной сестры, который она бросила в реку перед смертью. Он слышал, что есть раналон, торгующий речными сокровищами, который может помочь."
"Deliver 10 Knife Boost Potion 20% to Irkima in Red Wing Casino. Reward: 5,067 councils.": "Доставьте 10 Зелий усиления ножа 20% Иркиме в казино Красное Крыло. Награда: 5,067 советов."
"Deliver 10 Kraken Calamaris to Irkima in Red Wing Casino. Reward: 6,120 councils.": "Доставьте 10 Кракена Кальмариса Иркиме в Казино Красное Крыло. Награда: 6,120 советов."
"Deliver 10 Lac to Gremix in Amulna. Reward: 399 councils.": "Доставьте 10 Лака Гремиксу в Амулне. Награда: 399 советов."
"Deliver 99 Lac to Korbok in Vidaria. Reward: 5,147 councils.": "Доставьте 99 Лака Корбоку в Видарии. Награда: 5,147 советов."
"Amutasa in Rahu asked you to obtain a large amount of lac. It can be found on the corpses of many insects.": "Амутаса в Раху попросила вас добыть большое количество лака. Его можно найти на трупах многих насекомых."
"Deliver 10 Lake Sturgeon Fillets to Viedesi in Sun Vale. Reward: 5,073 councils.": "Доставьте 10 филе озёрного осетра Вьедеси в Солнечную Долину. Награда: 5 073 совета."
"Deliver 99 Lake Sturgeon Fillets to Sheyna in Rahu. Reward: 96,112 councils.": "Доставьте 99 филе озёрного осетра Шейне в Раху. Награда: 96,112 советов."
"Lamashu has asked for some oak wood.": "Ламашу попросил немного дубового дерева."
"Ser Hackley in Statehelm said, \"We've replaced every single oil lamp with a modern heating-crystal system that turns itself on at night and off in the morning. A true wonder of innovation! Except dwarves have already had these for centuries, but let's not go there. Anyway, the design is very new and we're still working out the kinks. Well, we WERE before the demons showed up. Right now we're just trying to keep things running as best we can. We lose lamps every night!\n\nBut I've become convinced it's less about a design flaw and more about... something else. See, when the lamps break they become overcharged. In this state they can also overcharge other nearby lamps! The darkness can spread, making whole areas unsafe. And, of course, vampires are always ready to take advantage of these outages to feed on the unsuspecting.\n\nTake some replacement bulbs and fix broken lamps tonight. I'll reimburse you for the lamps.\"": "Сэр Хакли в Стейтхельме сказал: «Мы заменили каждую масляную лампу на современную систему нагревательных кристаллов, которая включается ночью и выключается утром. Настоящее чудо инноваций! Хотя гномы уже веками пользуются такими, но не будем об этом. В любом случае, дизайн очень новый, и мы всё ещё устраняем недочёты. Ну, по крайней мере, так было до появления демонов. Сейчас мы просто пытаемся поддерживать систему как можно лучше. Каждую ночь у нас ломаются лампы!\n\nНо я убедился, что дело не в недостатках конструкции, а в... чём-то другом. Видишь ли, когда лампы ломаются, они перенапрягаются. В таком состоянии они могут перенапрягать и другие лампы поблизости! Тьма распространяется, делая целые участки небезопасными. И, конечно, вампиры всегда готовы воспользоваться этими отключениями, чтобы напасть на ничего не подозревающих.\n\nВозьми запасные лампочки и почини сломанные лампы сегодня ночью. Я возмещу тебе стоимость ламп."
"Ser Hackley in Statehelm said, \"Ready to fix more malfunctioning lamps? Excellent. I'll pay you same as before.\"": "Сэр Хакли в Стейтхелме сказал: «Готов починить ещё неисправные лампы? Отлично. Заплачу тебе так же, как и раньше.»"
"Marna asked you for some lapis lazuli.": "Марна попросила тебя принести немного лазурита."
"Deliver 10 Lapis Lazulis to Fitz the Boatman on the Serbule docks. Reward: 3,740 councils.": "Доставьте 10 ляпис-лазули Фитцу Лодочнику на причалы Сербуля. Награда: 3 740 советов."
"Gloria Stonecurl in Kur Mountains said, \"I'd like to engrave a blessing of safety into the door of Ukorga's inn. It'll act as a protective charm. But I need some special items to do it! First, I need lapis gems. They're the favorite gem of Arisetsu. Can you find me some?\"": "Глория Стоункерл в горах Кур сказала: «Я хотела бы выгравировать благословение безопасности на дверь трактира Укорги. Это будет служить защитным талисманом. Но для этого мне нужны особые предметы! Во-первых, мне нужны ляпис-камни. Это любимые камни Арицецу. Ты можешь найти их для меня?»"
"Deliver 10 Laressa's Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,520 councils.": "Доставьте 10 сыров Ларессы Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 2 520 советов."
"Deliver 10 Large Dinosaur Scales to Fitz the Boatman on the Serbule docks. Reward: 1,220 councils.": "Доставьте 10 больших динозавровых чешуй Фитцу Лодочнику на причалы Сербуля. Награда: 1,220 советов."
"Deliver 10 Large Gold Dragon Statues to Viedesi in Sun Vale. Reward: 20,622 councils.": "Доставьте 10 больших золотых статуй дракона Виедеси в Солнечную Долину. Награда: 20,622 совета."
"Deliver 10 Large Gold Gryphon Statues to Viedesi in Sun Vale. Reward: 20,430 councils.": "Доставьте 10 больших золотых статуй грифона Вьедеси в Солнечную Долину. Награда: 20 430 советов."
"Truxartis in Vidaria said, \"I have need of large hate pearls. You can sometimes find them on the corpses of your victims. Speak with Grasuul to find the freshest blood today... that will also be your best chance for finding hate pearls.\n\nFor this particular purpose I do not... care how fresh they are. You may use store-bought hate pearls for all I care. Just make certain they are extremely... hateful. \"": "Труксартис в Видарии сказал: «Мне нужны большие жемчужины ненависти. Их иногда можно найти на трупах твоих жертв. Поговори с Грасуулом, чтобы найти сегодня самую свежую кровь... это также будет твоим лучшим шансом найти жемчужины ненависти.\n\nДля этой конкретной цели мне не важно, насколько они свежие. Можешь использовать купленные в магазине жемчужины ненависти, если хочешь. Просто убедись, что они чрезвычайно... злобные."
"Deliver 10 Large Silver Dragon Statues to Viedesi in Sun Vale. Reward: 16,436 councils.": "Доставьте 10 больших серебряных статуй дракона Виедеси в Солнечную Долину. Награда: 16 436 советов."
"Deliver 10 Large Silver Gryphon Statues to Viedesi in Sun Vale. Reward: 16,277 councils.": "Доставьте 10 больших серебряных статуй грифона Вьедеси в Солнечную Долину. Награда: 16,277 советов."
"Deliver 10 Laura's Cheese Biscuits to Laura Neth in Kur Mountains. Reward: 5,574 councils.": "Доставьте 10 сырных печений Лауры Лауре Нет в горах Кур. Награда: 5,574 совета."
"Deliver 10 Laura's Cheesy Beets to Laura Neth in Kur Mountains. Reward: 6,352 councils.": "Доставьте 10 сырных свёкл Лауры Лауре Нет в горах Кур. Награда: 6,352 совета."
"Deliver 10 Laura's Crab Biscuits to Laura Neth in Kur Mountains. Reward: 2,297 councils.": "Доставьте 10 крабовых печений Лауры Лауре Неф в Курские горы. Награда: 2 297 советов."
"Deliver 10 Lavender Bouquets to Korbok in Vidaria. Reward: 54,186 councils.": "Доставьте 10 букетов лаванды Корбоку в Видарии. Награда: 54 186 советов."
"Deliver 10 Lavenders to Korbok in Vidaria. Reward: 37,660 councils.": "Доставьте 10 лаванд Корбоку в Видарии. Награда: 37 660 советов."
"Deliver 10 Lead Figurines to Thimble Pete in Hogan's Keep, Eltibule. Reward: 500 councils.": "Доставьте 10 свинцовых фигурок Тимбл Питу в Крепость Хоган, Элтибуль. Награда: 500 советов."
"Oritania in Eltibule has information about Dalvos's whereabouts. But she won't tell you unless you help her with some errands first. Get that info!": "Оритания в Элтибуле знает, где находится Далвос. Но она не расскажет, пока вы не поможете ей с некоторыми поручениями. Получите эту информацию!"
"You found a wild horse and learned a lot from watching its movements. If you were to interact with enough horses, you're confident that you'd learn to ride and tame them.": "Вы нашли дикую лошадь и многому научились, наблюдая за её движениями. Если вы будете взаимодействовать с достаточным количеством лошадей, вы уверены, что научитесь ездить на них и приручать."
"Joeh in Serbule asked you to retrieve a bunch of shoddy leather rolls.": "Джо в Сербуле попросил тебя достать кучу некачественных свитков кожи."
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Leather suit and I will see what I can do to help you flourish at your craft!\"": "Тантай сказал: «Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый приличный кожаный костюм, и я посмотрю, что могу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Leather suit and I will see what I can do to help you flourish at your craft!\"": "Тантай сказал: «Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый качественный кожаный костюм, и я посмотрю, что могу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Leather suit and I will see what I can do to help you flourish at your craft!  I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\"": "Тантай сказал: «Хочешь обменяться знаниями, чтобы улучшить свои навыки? Принеси мне полный комплект сшитого Грубого кожаного костюма, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле! Мне нужна только зачарованная версия костюма... Я не имею дела с незачарованным хламом!»"
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Amazing Leather suit and I will see what I can do to help you flourish at your craft!\"": "Тантай сказал: «Хочешь обменяться знаниями, чтобы продвинуться в навыках? Принеси мне один полностью сшитый удивительный кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Tantai said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Awesome Leather suit and I will see what I can do to help you flourish at your craft!\"": "Танти сказал: «Хочешь обменяться знаниями, чтобы продвинуть свои навыки? Принеси мне полный сшитый Потрясающий кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Deliver 10 Leftover Turkey Sandwiches to Fitz the Boatman on the Serbule docks. Reward: 3,175 councils.": "Доставьте 10 остатков сэндвичей с индейкой Фитцу Лодочнику на причалы Сербуля. Награда: 3 175 советов."
"Deliver 10 Lemon Puffs to Ogamboe in the Fae Realm. Reward: 5,128 councils.": "Доставьте 10 лимонных пышек Огамбо в Области Фей. Награда: 5,128 советов."
"Deliver 10 Lemon Shaved Ices to Ogamboe in the Fae Realm. Reward: 12,923 councils.": "Доставьте 10 лимонных ледяных десертов Огамбо в Царство Фей. Награда: 12,923 совета."
"Deliver 10 Lemon-Glazed Chickens to Laura Neth in Kur Mountains. Reward: 6,325 councils.": "Доставьте 10 куриц в лимонной глазури Лауре Нет в горах Кур. Награда: 6,325 советов."
"Deliver 10 Lemon-Glazed Tofurkey to Sheyna in Rahu. Reward: 18,343 councils.": "Доставьте 10 тофурок с лимонной глазурью Шейне в Раху. Награда: 18,343 совета."
"Deliver 10 Lemonades to Laura Neth in Kur Mountains. Reward: 5,970 councils.": "Доставьте 10 лимонадов Лауре Нет в горах Кур. Награда: 5 970 советов."
"Jake the Buckler in Sun Vale asked for a pot of Lemon Chiffon dye. You previously learned that a mantis living outside of Serbule can sell you the recipe. There may be other ways to acquire the dye, too.": "Джейк Щитоносец из Солнечной Долины попросил горшок лимонной краски Шифон. Ранее вы узнали, что богомол, живущий за пределами Сербуля, может продать вам рецепт. Возможно, есть и другие способы получить эту краску."
"Ferris Blueheart in Vidaria said, \"You've been incredibly helpful in my research thus far, but we've only been dealing with the minions. I still have many questions about the higher ranks of the demons.\n\nWe should start by examining the large ones. I've noticed that one of them seems more in-charge than the other, despite no obvious physical differences. The brains have been so helpful in the past, and you've proven that you're clearly capable of extracting them, so bring me some from each, if you don't mind.\"": "Феррис Блюбарт в Видарии сказал: «Ты уже очень помог в моих исследованиях, но мы пока имели дело только с приспешниками. У меня всё ещё много вопросов о высших рангах демонов.\n\nНачнём с изучения крупных. Я заметил, что один из них кажется более руководящим, чем другой, несмотря на отсутствие явных физических различий. Мозги уже не раз были очень полезны, и ты доказал, что умеешь их добывать, так что принеси мне немного от каждого, если не возражаешь."
"Irkima in Red Wing Casino said, \"It was a mistake to speak with my superior about personal matters. While conversing amicably to my boss, Qatik, I mentioned my attraction to Tavilak. Qatik became emotional and demanded that I never mate with Tavilak. I suspect Qatik wants to mate with me herself. I enjoy Qatik's company more than any other Red Wing mantis, but I am not interested in mating with her. Could you explain this to Qatik for me? Make it seem like the topic is entirely your idea.\"": "Иркима в казино Красное Крыло сказала: «Это была ошибка — говорить с моим начальником о личных делах. Во время дружеского разговора с моим боссом, Катиком, я упомянула о своей симпатии к Тавилаку. Катик расстроился и потребовал, чтобы я никогда не спаривалась с Тавилаком. Я подозреваю, что Катик хочет спариваться со мной сама. Мне нравится компания Катика больше, чем любого другого богомола из Красного Крыла, но я не заинтересована в спаривании с ней. Можешь объяснить это Катику за меня? Сделай так, чтобы казалось, что эта тема — полностью твоя идея.»"
"Ratuk the Thinker asked for tundra lichen, which he believes grows in Kur.": "Ратук Мыслящий попросил тундровый лишайник, который, по его мнению, растёт в Куре."
"Ormond Neth in Statehelm said, \"Of course, you must know how to revive the recently-incapacitated. Have you mastered the technique yet? Here: this practice lute may help. \"": "Ормонд Нет в Стейтхелме сказал: «Конечно, вы должны уметь оживлять недавно выведенных из строя. Вы уже освоили эту технику? Вот: эта тренировочная лютня может помочь.»"
"Deliver 10 Limburger Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 16,157 councils.": "Доставьте 10 Лимбургеров Тимбл Питу в Крепость Хоган, Элтибуль. Награда: 16,157 советов."
"Deliver 10 Loaded Baked Potatoes to Laura Neth in Kur Mountains. Reward: 4,043 councils.": "Доставьте 10 фаршированных печёных картофелин Лауре Нет в горах Кур. Награда: 4,043 совета."
"In a cave deep beneath Povus, you found a ship in a bottle. The bottle was locked, suggesting that there was some reason one might unlock it.": "В пещере глубоко под Повусом вы нашли корабль в бутылке. Бутылка была запечатана, что говорит о том, что есть причина, по которой её можно открыть."
"Ferris Blueheart in Vidaria said, \"We've studied the minions and the Behemoths pretty exhaustively, but there's still a lot we don't know about the highest ranks: the Overseers and the Justiciars. I would love to observe their inner workings and see how they stack up to the others. You know what to do.\"": "Феррис Блюхарт в Видарии сказал: «Мы довольно тщательно изучили приспешников и Бегемотов, но всё ещё многое не знаем о высших рангах: Надзирателях и Правосудцах. Мне бы очень хотелось наблюдать за их внутренней работой и понять, как они соотносятся с остальными. Ты знаешь, что делать.»"
"Glajur, a goblin you met under a tower in Kur Mountains, asked for humanoid skulls in order to continue his phrenological research.": "Глайюр, гоблин, с которым вы встретились у башни в горах Кур, попросил черепа гуманоидов, чтобы продолжить свои френологические исследования."
"In a cave beneath Povus, you came upon a strange door that could only be opened if you find all the \"lost penguins.\" Presumably they are near the door?": "В пещере под Повусом вы наткнулись на странную дверь, которую можно открыть только если найти всех «потерянных пингвинов». Предположительно, они находятся рядом с дверью?"
"Norbert in Sun Vale's Animal Town asked you to investigate the weird elven building on the island and retrieve any written notes.": "Норберт из Звериного города Солнечной Долины попросил вас исследовать странное эльфийское здание на острове и найти любые записанные заметки."
"Truxartis in Vidaria said, \"While I am still... more powerful than you could ever dream to be, I... have been robbed of much of my... power. But do not worry. You shall help me recover.\n\nNot too long ago I had a thrall hide supplies in an abandoned keep in Eltibule. Find a way into the walls and find a rune of Tuvillus.\nDefeat the primitive guardian and... bring me the ointment it guards. Hurry.\"": "Труксартис в Видарии сказал: «Хотя я всё ещё... могущественнее, чем ты когда-либо мог мечтать, меня... лишили большей части моей силы. Но не волнуйся. Ты поможешь мне восстановиться.\n\nНедавно один раб спрятал припасы в заброшенной крепости в Элтибуле. Найди способ проникнуть в стены и найти руну Тувиллюса. Победи примитивного стража и... принеси мне мазь, которую он охраняет. Поторопись."
"Deliver 10 Lucky Human Teeth to Sheyna in Rahu. Reward: 756 councils.": "Доставьте 10 счастливых человеческих зубов Шейне в Раху. Награда: 756 советов."
"Irkima in Red Wing Casino said, \"I have been instructed to sell more 'baubles and trinkets' to appeal to drunken bipeds with lots of cash. They often ask for lucky tokens, so I wish to procure some rabbit feet. If you bring me three, I shall pay 1200 Councils for them, plus some Red Wing Tokens.\"": "Иркима в казино Красное Крыло сказала: «Мне велели продавать больше «безделушек и побрякушек», чтобы привлечь пьяных двуногих с кучей денег. Они часто просят счастливые талисманы, поэтому я хочу раздобыть несколько кроличьих лапок. Если вы принесёте мне три, я заплачу 1200 Советов за них, плюс немного жетонов Красного Крыла.»"
"Bogaku in the Rahu Sewers said, \"Have you found that these ratkin are superstitious? Most are! They even carry good-luck charms, the pathetic things. Hmm, go and find me some of their charms.\"": "Богака в канализации Раху сказал: «Ты заметил, что эти крысолюди суеверны? Большинство из них! Они даже носят талисманы на удачу, жалкие штуки. Хм, сходи и найди мне несколько их талисманов.»"
"Fluffikins in Gazluk said, \"I'm supposed to be in charge of the campsite, which is why the jealous humans <i>constantly</i> slack off to make me look bad. I keep telling them to repair these stalls so they're ready for the heavier snows to come. So they head off to gather wood, and then come back empty-handed. \"Chased by a bear\" or \"bit by a slime\"... always some excuse so they don't have to work. Can you help me? We need spruce.\"": "Флаффикинс в Газлуке сказал: «Я должен отвечать за лагерь, поэтому завистливые люди <i>постоянно</i> халтурят, чтобы выставить меня в плохом свете. Я постоянно говорю им починить эти палатки, чтобы они были готовы к более сильным снегопадам. Но они уходят собирать дрова, а возвращаются с пустыми руками. «Гнался за медведем» или «укусил слизень»... всегда какая-то отговорка, чтобы не работать. Ты можешь помочь? Нам нужна ель.»"
"Tadion wants some firewood to keep his forge hot.": "Тадион хочет немного дров, чтобы поддерживать свою кузницу в жаре."
"Deliver 10 Lumberjack's Arrangement #1 to Sheyna in Rahu. Reward: 3,338 councils.": "Доставьте 10 заказов лесоруба №1 Шейне в Раху. Награда: 3 338 советов."
"Deliver 10 Lumberjack's Arrangement #2 to Sheyna in Rahu. Reward: 4,064 councils.": "Доставьте 10 заказов лесоруба №2 Шейне в Раху. Награда: 4,064 совета."
"Deliver 10 Lumberjack's Arrangement #3 to Sheyna in Rahu. Reward: 5,101 councils.": "Доставьте 10 упаковок лесоруба №3 Шейне в Раху. Награда: 5,101 совет."
"Deliver 10 Lumberjack's Arrangement #4 to Sheyna in Rahu. Reward: 7,126 councils.": "Доставьте 10 заказов лесоруба №4 Шейне в Раху. Награда: 7,126 советов."
"Deliver 10 Lumberjack's Arrangement #5 to Sheyna in Rahu. Reward: 8,907 councils.": "Доставьте 10 заказов лесоруба №5 Шейне в Раху. Награда: 8,907 советов."
"Deliver 10 Lumberjack's Arrangement #6 to Sheyna in Rahu. Reward: 12,452 councils.": "Доставьте 10 заказов лесоруба №6 Шейне в Раху. Награда: 12 452 совета."
"Deliver 10 Lumberjack's Arrangement #7 to Korbok in Vidaria. Reward: 15,688 councils.": "Доставьте 10 заказов лесоруба №7 Корбоку в Видарии. Награда: 15 688 советов."
"Deliver 10 Lumberjack's Arrangement #8 to Korbok in Vidaria. Reward: 23,770 councils.": "Доставьте 10 заказов Лесоруба №8 Корбоку в Видарии. Награда: 23 770 советов."
"Deliver 10 Lumberjack's Arrangement #9 to Korbok in Vidaria. Reward: 32,240 councils.": "Доставьте 10 заказов лесоруба №9 Корбоку в Видарии. Награда: 32 240 советов."
"Deliver 10 Lumps of Golem Clay to Irkima in Red Wing Casino. Reward: 346 councils.": "Доставьте 10 комков глиняного голема Иркиме в казино Красное Крыло. Награда: 346 советов."
"Deliver 10 Lungfish Fillets to Irkima in Red Wing Casino. Reward: 794 councils.": "Доставьте 10 филе легочных рыб Иркиме в казино Красное Крыло. Награда: 794 совета."
"Deliver 99 Lungfish Fillets to Sheyna in Rahu. Reward: 13,527 councils.": "Доставьте 99 филе легочных рыб Шейне в Раху. Награда: 13,527 советов."
"Deliver 10 Lungfish Kabobs to Irkima in Red Wing Casino. Reward: 1,532 councils.": "Доставьте 10 шашлыков из легочной рыбы Иркиме в казино Красное Крыло. Награда: 1,532 совета."
"Deliver 10 Lungfish Rolls to Irkima in Red Wing Casino. Reward: 1,803 councils.": "Доставьте 10 рулетов из легочной рыбы Иркиме в казино Красное Крыло. Награда: 1,803 совета."
"Percy in Eltibule asked you to talk to a goblin named Jumjab on behalf of his dead wife. You'll need to know some Goblinese to do so.": "Перси в Элтибуле попросил тебя поговорить с гоблином по имени Джумджаб от имени своей покойной жены. Для этого тебе нужно будет знать немного гоблинского."
"Deliver 10 Maggot Soups to Ogamboe in the Fae Realm. Reward: 4,336 councils.": "Доставьте 10 супов из личинок Огамбо в Царство Фей. Награда: 4,336 советов."
"Deliver 10 Magic Ooze Syrups to Ogamboe in the Fae Realm. Reward: 7,457 councils.": "Доставьте 10 сиропов из магического слизи Огамбо в Фейское царство. Награда: 7,457 советов."
"Sanja in the Kur Mountains asked you to find magic teeth from werewolves. They apparently are rather rare.": "Санджа в горах Кур попросила вас найти волшебные зубы оборотней. Они, по-видимому, довольно редки."
"Engineer Crall in Vidaria said, \"The frozen magma that you brought me is interesting, and I would like to perform some experiments with it. I suspect it can be used in place of the central core of a Dwar- you know what, I'll spare you the details. I need more info about the demons in general, and a bunch of N Cores to perform my testing with. Can you keep an eye out for those things?\"": "Инженер Кралл в Видарии сказал: «Замороженная магма, которую ты мне принес, интересна, и я хотел бы провести с ней несколько экспериментов. Я подозреваю, что её можно использовать вместо центрального ядра Двар- ну да ладно, я избавлю тебя от подробностей. Мне нужно больше информации о демонах в целом, а также куча N-ядер для проведения моих испытаний. Можешь присмотреть за этими штуками?»"
"Deliver 10 Mahi Mahi Fillets to Viedesi in Sun Vale. Reward: 2,258 councils.": "Доставьте 10 филе махи-махи Вьедеси в Солнечную Долину. Награда: 2 258 советов."
"Deliver 99 Mahi Mahi Fillets to Sheyna in Rahu. Reward: 41,456 councils.": "Доставьте 99 филе махи-махи Шейне в Раху. Награда: 41 456 советов."
"Deliver 10 Make-Me-Strong Juices to Fitz the Boatman on the Serbule docks. Reward: 879 councils.": "Доставьте 10 соков «Сделай меня сильным» Фитцу Лодочнику на доках Сербуля. Награда: 879 советов."
"Yagreet at the fairy tree asked you for some Master First Aid Kits.": "Ягрит у дерева фей попросила у вас несколько мастерских наборов первой помощи."
"Asparagus in Statehelm said, \"You want to do something for me? Pf.\n\nWell, I always need more fluorite.\"": "Спаржа в Стейтхелме сказал: «Хочешь сделать что-то для меня? Пф.\n\nНу, мне всегда нужен флюорит."
"Asparagus in Statehelm said, \"Let's put the past behind us for now. How about some dice games? If you beat me, say, 50 times, I'll teach you a secret technique to improve your cheating technique. Not that you should cheat me! Save that for the big stakes tables.\"": "Спаржа в Стейтхелме сказал: «Давай пока оставим прошлое позади. Как насчёт игр в кости? Если ты обыграешь меня, скажем, 50 раз, я научу тебя секретной технике, чтобы улучшить твои навыки жульничества. Но не думай жульничать против меня! Прибереги это для столов с большими ставками.»"
"Deliver 10 Malachites to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 малахитов Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 4,080 советов."
"Malvol has asked you to obtain Expert Volatile Ink.": "Малвол попросил вас добыть Экспертные нестабильные чернила."
"A rakshasa named Zealo asked you to collect mana sponges that she placed in jars all through the area.": "Ракшаса по имени Зиало попросила вас собрать манапоглотители, которые она разместила в банках по всей территории."
"Deliver 10 Mandibles' Perfect Lunches to Irkima in Red Wing Casino. Reward: 3,788 councils.": "Доставьте 10 Идеальных обедов Мандиблса Иркиме в казино Красное Крыло. Награда: 3 788 советов."
"Yetta has asked for some mandrake root.": "Йетта попросила немного корня мандрагоры."
"Deliver 10 Mandrake Roots to Fitz the Boatman on the Serbule docks. Reward: 292 councils.": "Доставьте 10 корней мандрагоры Фитцу Лодочнику на доках Сербуля. Награда: 292 совета."
"Deliver 10 Manticore Tail Tips to Sheyna in Rahu. Reward: 3,710 councils.": "Доставьте 10 кончиков хвоста мантикоры Шейне в Раху. Награда: 3 710 советов."
"Urzab in Amulna asked for Manticore tail spikes.": "Урзаб в Амульне попросил шипы с хвоста мантикоры."
"Deliver 10 Mantis-Stuffed Mushrooms to Laura Neth in Kur Mountains. Reward: 5,349 councils.": "Доставьте 10 грибов, фаршированных богомолом, Лауре Нет в горах Кур. Награда: 5 349 советов."
"Ailred in Povus said, \"I'm terribly sorry if I offended you by seating myself. But you didn't have to keep me waiting so long! I guess you weren't open yet?\n\nWell, let's put that behind us. I would like your maple carrots please. And not too sweet.\"": "Эйлред в Повусе сказал: «Мне ужасно жаль, если я обидел вас, когда сел сам. Но вам не следовало так долго меня ждать! Полагаю, вы ещё не были открыты?\n\nНу, давайте оставим это в прошлом. Я хотел бы ваши морковки с кленовым сиропом, пожалуйста. И не слишком сладкие."
"Deliver 10 Maple Carrots to Laura Neth in Kur Mountains. Reward: 6,852 councils.": "Доставьте 10 кленовых морковок Лауре Нет в горах Кур. Награда: 6,852 совета."
"Deliver 10 Maple Dowels to Fitz the Boatman on the Serbule docks. Reward: 879 councils.": "Доставьте 10 кленовых шкантов Фитцу Лодочнику на доках Сербуля. Награда: 879 советов."
"Raul in Sun Vale's Animal Town wants a batch of Cedar Dowels.": "Рауль из Звериного города Солнечной Долины хочет партию кедровых шкантов."
"Deliver 10 Maple Wood to Thimble Pete in Hogan's Keep, Eltibule. Reward: 576 councils.": "Доставьте 10 единиц кленовой древесины Тимбл Питу в Хоганском Крепости, Элтибул. Награда: 576 советов."
"Deliver 10 Maple Wood Chips to Fitz the Boatman on the Serbule docks. Reward: 359 councils.": "Доставьте 10 щепок клёна Фитцу Лодочнику на доки Сербуля. Награда: 359 советов."
"Deliver 10 Maple-Smoked Sharks to Laura Neth in Kur Mountains. Reward: 3,931 councils.": "Доставьте 10 копчёных на клене акул Лауре Нет в горах Кур. Награда: 3 931 совет."
"Lumpfuzz in the Ilmari Desert said, \"Ever seen a wave of nature elementals? Well they're right here, so take a look outside. They're coming from the west.\n\nI'll stay here and protect the citizens from any that manage to make it to town. In the mean time you can pick off their numbers. Just remember: they hate lightning. You know what to do.\"": "Лампфазз в пустыне Илмари сказал: «Когда-нибудь видел волну природных элементалей? Они прямо здесь, так что взгляни наружу. Они идут с запада.\n\nЯ останусь здесь и буду защищать жителей от тех, кто сумеет пробраться в город. А ты тем временем можешь сокращать их ряды. Только помни: они ненавидят молнию. Ты знаешь, что делать."
"Deliver 10 Marigold Bouquets to Sheyna in Rahu. Reward: 9,774 councils.": "Доставьте 10 букетов календулы Шейне в Раху. Награда: 9,774 совета."
"Deliver 10 Marigolds to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,844 councils.": "Доставьте 10 календул Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 1,844 совета."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Чудесные стрелы. Я щедро заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Чудесные Плотные Стрелы. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Великолепные длинные стрелы. Я щедро заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>marvelous metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>великолепные металлические слитки</b>. Ты можешь добыть их для меня?\n\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Чудесные стрелы из резервуара. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхелме сказал: «Нам всегда нужна дополнительная амуниция для войск на передовой. Сегодня они просят Чудесные стрелы с ловушкой. Я хорошо заплачу за них, но вы должны сделать их по военным стандартам, так что нельзя использовать старые затхлые запасы.»"
"Deliver 10 Master Skinning Knives to Viedesi in Sun Vale. Reward: 5,700 councils.": "Доставьте 10 ножей для разделки шкур мастера Вьедеси в Солнечной Долине. Награда: 5,700 советов."
"Deliver 100 Master's Throwing Knives to Sheyna in Rahu. Reward: 4,806 councils.": "Доставьте 100 метательных ножей мастера Шейне в Раху. Награда: 4,806 советов."
"Sir Hughes in Statehelm said, \"I'm quite skilled with punching weapons and claws, and I'll tell you what helped me unlock my full potential: sewer practice. Find your way down into the sewer and use your Slashing Strike on the slimes down there.\"": "Сэр Хьюз в Стейтхелме сказал: «Я довольно искусен в обращении с ударным оружием и когтями, и я расскажу, что помогло мне раскрыть весь мой потенциал: тренировки в канализации. Найдите путь вниз в канализацию и используйте свой Разящий Удар на слизнях там.»"
"Deliver 10 Masterwork Armor Stakes to Sheyna in Rahu. Reward: 8,026 councils.": "Доставьте 10 шипов мастерской брони Шейне в Раху. Награда: 8,026 советов."
"Deliver 10000 Masterwork Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,908 councils.": "Доставьте 10000 стрел высшего мастерства Тимбл Питу в Хоганском Убежище, Элтибуль. Награда: 3,908 советов."
"Deliver 10000 Masterwork Barbed Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 7,527 councils.": "Доставьте 10000 Мастеровых Колючих Стрел Тримблу Питу в Крепость Хоган, Элтибуль. Награда: 7,527 советов."
"Deliver 10000 Masterwork Dense Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,361 councils.": "Доставьте 10000 мастеровых плотных стрел Тримбл Питу в Хоганском Крепости, Элтибуль. Награда: 5,361 советов."
"Deliver 10000 Masterwork Long Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,326 councils.": "Доставьте 10000 мастеровых длинных стрел Тимбл Питу в Хоганском замке, Элтибуль. Награда: 5,326 советов."
"Deliver 10 Masterwork Metal Slabs to Irkima in Red Wing Casino. Reward: 3,587 councils.": "Доставьте 10 плит из мастерового металла Иркиме в казино Красное Крыло. Награда: 3,587 советов."
"Deliver 10000 Masterwork Reservoir Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 26,036 councils.": "Доставьте 10000 стрел мастерского резервуара Тримбл Питу в Крепость Хоган, Элтибул. Награда: 26 036 советов."
"Deliver 10000 Masterwork Snare Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,852 councils.": "Доставьте 10000 мастеровых стрел-сетей Тримбл Питу в Хоганском Крепости, Элтибуль. Награда: 5,852 совета."
"Midge in the Fae Realm said, \"Maybe it's for the best that we can't remember anything. Maybe we don't want to remember. But it's not fair that I can't make new memories! It's not my fault I died over and over! Not this time!\n\n<i>[Midge sighs.]</i>\n\nThere's a mortal drink I like. It tastes awful, but it does help me relax a little. I think it's called a Perker Up? Peaky Cup? Pick Me up? Something like that.\"": "Мидж в Фейском мире сказала: «Возможно, к лучшему, что мы ничего не помним. Может, нам и не хочется помнить. Но это несправедливо, что я не могу создавать новые воспоминания! Это не моя вина, что я умирала снова и снова! Но не в этот раз!\n\n<i>[Мидж вздыхает.]</i>\n\nЕсть один смертный напиток, который мне нравится. Он ужасен на вкус, но немного помогает расслабиться. Кажется, он называется Перкер Ап? Пики Кап? Пик Ми Ап? Что-то в этом роде."
"Gershok the Ranalon in Serbule Hills asked for a meditation stool.": "Гершок Раналон из Сербульских холмов попросил стул для медитации."
"Deliver 10 Medium Gold Dragon Statues to Viedesi in Sun Vale. Reward: 12,508 councils.": "Доставьте 10 средних золотых статуй дракона Виедеси в Солнечную Долину. Награда: 12,508 советов."
"Deliver 10 Medium Gold Gryphon Statues to Viedesi in Sun Vale. Reward: 12,428 councils.": "Доставьте 10 средних золотых статуй грифона Вьедеси в Солнечную Долину. Награда: 12,428 советов."
"Deliver 10 Medium Hoops to Fitz the Boatman on the Serbule docks. Reward: 879 councils.": "Доставьте 10 средних обручей Фитцу Лодочнику на доках Сербуля. Награда: 879 советов."
"Deliver 10 Medium Prisms to Gremix in Amulna. Reward: 1,911 councils.": "Доставьте 10 Средних призм Гремиксу в Амульне. Награда: 1 911 советов."
"Deliver 10 Medium Silver Dragon Statues to Viedesi in Sun Vale. Reward: 8,615 councils.": "Доставьте 10 средних серебряных статуй дракона Вьедеси в Солнечную Долину. Награда: 8,615 советов."
"Deliver 10 Medium Silver Gryphon Statues to Viedesi in Sun Vale. Reward: 8,556 councils.": "Доставьте 10 средних серебряных статуй грифона Вьедеси в Солнечную Долину. Награда: 8,556 советов."
"Jenny Foster in Statehelm is a werewolf and has invited you to find her \"in the sewer\" during the full moon. She can teach you new moves in exchange for Tokens of Norala.": "Дженни Фостер из Стейтхелма — оборотень и пригласила тебя найти её «в канализации» во время полной луны. Она может научить тебя новым приёмам в обмен на жетоны Норалы."
"Crelpin in the Fae Realm said, \"You need to take your bee out to the beehive to the west to introduce yourselves.\"": "Крелпин в Области Фей сказал: «Вам нужно отвести свою пчелу к улью на западе, чтобы представиться.»"
"You've rescued Jesina's sister Sarina, who is repairing your broken nexus adjunct matter aligner. It should be ready in time for dinner. (Hang Out with Jesina to advance the quest.)": "Ты спас сестру Джесины, Сарину, которая чинит твой сломанный вспомогательный выравниватель материи нексуса. Он должен быть готов к ужину. (Проведи время с Джесиной, чтобы продвинуть задание.)"
"Melandria in Gazluk Keep said, \"I try to be brave and upbeat about my fate because it makes things a little less horrible, you know? And some days aren't too bad... but some days are really pretty awful. I wish I had some dry gin for those occasions. Do you have any?\"": "Меландрия в Газлукской крепости сказала: «Я стараюсь быть смелой и оптимистичной насчёт своей судьбы, потому что так всё становится немного менее ужасным, понимаешь? И некоторые дни не такие уж плохие... но некоторые дни действительно довольно ужасные. Хотелось бы мне иметь немного сухого джина для таких случаев. У тебя есть?»"
"Deliver 10 Memory Inhibitor Potions to Viedesi in Sun Vale. Reward: 1,464 councils.": "Доставьте 10 Зелий подавления памяти Виедеси в Солнечную Долину. Награда: 1,464 совета."
"Deliver 10 Mentalism Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,126 councils.": "Доставьте 10 Зелий Усиления Ментализма 20% Иркиме в Казино Красное Крыло. Награда: 2,126 советов."
"Merriana in Serbule Hills said, \"The orb you found for me was a fake, but I know it's somewhere in Serbule Hills! I must find it.\n\nThe vortices have overheard the ranalon speak of a seer or wise-person called a 'doctrine keeper' -- if the ranalon have my orb, I bet their seer would have it.\n\nI understand they live under the water or somesuch thing. Finding it would be worthwhile.\"": "Мерриана в Сербульских Холмах сказала: «Сфера, которую ты для меня нашёл, была подделкой, но я знаю, что настоящая где-то в Сербульских Холмах! Мне нужно её найти.\n\nВортексы подслушали, как раналон говорили о провидце или мудреце, которого называют «хранителем доктрины» — если у раналон есть моя сфера, то, уверен, её хранит их провидец.\n\nНасколько я понимаю, они живут под водой или что-то в этом роде. Найти её было бы очень полезно."
"Merriana in Serbule Hills said, \"You want to help? Hmph. Very well: perhaps you know this area better than we do.\n\nSome time ago we heard there was a group of bandits with something I want. These bandits live in a cave somewhere here in Serbule Hills. They called it the 'spider cave'.\n\nI have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.\"": "Мерриана в Сербульских Холмах сказала: «Хочешь помочь? Хм. Очень хорошо: возможно, ты знаешь эту местность лучше нас.\n\nНекоторое время назад мы услышали, что здесь, в Сербульских Холмах, в пещере, которую называют «паучьей пещерой», обитает группа бандитов с тем, что мне нужно.\n\nЯ уже заплатила за устройство заранее, но если бандиты потребуют с тебя больше, возьми квитанцию, и я возмещу тебе расходы редкими реагентами."
"Mushroom Jack in Serbule asked you to deliver a very personal message to Therese down at the windmill.": "Грибной Джек в Сербуле попросил тебя доставить очень личное сообщение Терезе у мельницы."
"Tadion needs some metal slabs for his current project.": "Тадиону нужны металлические плиты для его текущего проекта."
"Kib the Unkillable in Red Wing Casino said, \"My second-favorite sword needs to be repaired. I've searched the countryside near the casino and found nothing appropriate. I need metal of expert quality! I've seen armor made of amazing metal, so I know it must exist somewhere in this land...\"": "Киб Неубиваемый в казино Красное Крыло сказал: «Мой второй по любимости меч нуждается в ремонте. Я обыскал окрестности казино и не нашёл ничего подходящего. Мне нужен металл экспертного качества! Я видел доспехи из удивительного металла, значит, он должен где-то существовать в этих землях...»"
"Deliver 10 Mild Cheddar Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,070 councils.": "Доставьте 10 мягких сыров чеддер Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 4 070 советов."
"Deliver 10 Mild Ratkin Digestifs to Ogamboe in the Fae Realm. Reward: 3,710 councils.": "Доставьте 10 лёгких дижестивов крысиного народа Огамбо в Царстве Фей. Награда: 3,710 советов."
"Braigon mentioned needing more milk.": "Брейгон упомянул, что нужно больше молока."
"Deliver 10 Mind Enhancement Gems to Fitz the Boatman on the Serbule docks. Reward: 869 councils.\nNote from orderer: <i>\"I haven't seen specimens like this since young master Dalvos left to Statehelm! They must be made by an admirer of his technique. I wish to collect them for sentimental reasons.\"</i>": "Доставьте 10 самоцветов улучшения разума Фитцу Лодочнику на причалы Сербуля. Награда: 869 советов.  \nПримечание от заказчика: <i>«Я не видел таких образцов с тех пор, как молодой господин Далвос уехал в Стейтхелм! Они, должно быть, созданы поклонником его техники. Я хочу собрать их по сентиментальным причинам.»</i>"
"Leon Dasterre in Statehelm said, \"That ass! Guzor from the mage's guild has once again chosen to belittle our school in front of the Council Sub-Commander. I've given up on convincing that conceited fool of the power of song magic. I've wasted a year trying! I understand now that mere words are not up to this task. Ormond is good at mind work -- explain the situation to him and come up with a solution.\"": "Леон Дастерр в Стейтхелме сказал: «Этот осёл! Гузор из гильдии магов снова решил принизить нашу школу перед заместителем командующего Совета. Я перестал убеждать этого самодовольного дурака в силе песенной магии. Потратил на это целый год! Теперь я понимаю, что одними словами здесь не обойтись. Ормонд хорошо разбирается в работе разума — объясни ему ситуацию и придумайте решение.»"
"Leon Dasterre in Statehelm said, \"I've received word from my Unora. She's my eyes inside the mage's school, and she says that Guzor is pestering the Sub-Commander to remove me from the Sub-Council on City Defense. This goes beyond politics. This man so fears bardic magic that he would cut us out of the city. He knows that his magic cannot heal -- it can only destroy. And so he aims to destroy us. We, in turn, must heal! Heal the rift in the Sub-Council on City Defense!\n\nOf course, I was hesitant to use charm magic. But the surgery we must perform requires it. We healers know that sometimes a patient calls for a difficult procedure. A dangerous one. So summon your courage: the city needs us!\n\nHere is a list of necessities for the Geas that Ormond recommended.\"": "Леон Дастерр в Стейтхелме сказал: «Я получил известие от моей Уноры. Она мои глаза внутри школы магов, и говорит, что Гузор докучает заместителю командующего, чтобы убрать меня из Подсовета по обороне города. Это выходит за рамки политики. Этот человек так боится бардовской магии, что готов изгнать нас из города. Он знает, что его магия не может исцелять — она только разрушает. И поэтому он стремится уничтожить нас. Мы же должны исцелять! Исцелить раздор в Подсовете по обороне города!\n\nКонечно, я сомневался использовать магию очарования. Но операция, которую нам предстоит провести, требует этого. Мы, целители, знаем, что иногда пациент нуждается в сложной процедуре. Опасной. Так что соберись с духом: город нуждается в нас!\n\nВот список необходимых материалов для Геаса, который рекомендовал Ормонд."
"Leon Dasterre in Statehelm said, \"I despise Malgath Croonswallow. Who is he, you ask? The long-dead ass who created this Geas of Mild Yet Unrelenting Affection! This has been quite a tedious and inane procedure. But it is done. Here: I've prepared the enchanted horn full of vindaloo. Now you need merely convince Alzaneth to eat it. Just a single bite will do!\"": "Леон Дастер в Стейтхелме сказал: «Я презираю Малгата Круонсволлоу. Кто он, спросите вы? Давным-давно умерший осёл, который создал этот Геас мягкой, но неумолимой привязанности! Это была довольно утомительная и бессмысленная процедура. Но она завершена. Вот: я приготовил зачарованный рог, полный виндалу. Теперь тебе осталось лишь убедить Алзанета съесть его. Достаточно всего одного укуса!»"
"Leon Dasterre in Statehelm said, \"The reason Ormond recommended this particular obscure bardic technique is that it can be performed without the victim being present. The vindaloo will connect you to him. Oh, yes, you'll be the one performing the Geas! It's quite an honor, really. This sort of technique is usually kept locked away, but you're getting hands-on experience with it!\n\nWait until the full moon. That's the only time this will work. Then eat the vindaloo -- oh, you will need more vindaloo for this -- and dance in such a way as to twist his mind toward affection. Don't worry about the particulars; let your hips do the thinking. Then simply shake his hand.\"": "Леон Дастерр в Стейтхелме сказал: «Причина, по которой Ормонд рекомендовал именно эту редкую бардовскую технику, в том, что её можно выполнить без присутствия жертвы. Виндалу свяжет тебя с ним. О, да, именно ты будешь накладывать Геас! Это настоящее почётное дело. Такие техники обычно держат под замком, а ты получаешь практический опыт!\n\nПодожди до полнолуния. Это единственное время, когда это сработает. Затем съешь виндалу — для этого тебе понадобится больше виндалу — и танцуй так, чтобы повернуть его разум к привязанности. Не беспокойся о деталях; пусть твои бёдра сами думают. А потом просто пожми ему руку."
"Zazzamath in The Rubywall in Vidaria said, \"You are positively itching to snuff more lifes, aren't you?! I knew it. And I <i>love</i> it! Get out there and do what you do best, fleshbag!\"": "Заззамат в Рубиновом Барьере в Видарии сказал: «Ты просто не можешь дождаться, чтобы уничтожить ещё больше жизней, не так ли?! Я знал это. И я <i>обожаю</i> это! Вперёд, делай то, что у тебя получается лучше всего, мясной мешок!»"
"Deliver 10 Mint Ice Creams to Ogamboe in the Fae Realm. Reward: 9,824 councils.": "Доставьте 10 мятных мороженых Огамбо в Царство Фей. Награда: 9,824 совета."
"Melandria in Gazluk Keep said, \"I'm supposed to make a special dinner tomorrow to honor my master's wife's birthday. I'm getting kind of freaked out, because I can't make my famous mint cookies without mint! Do you have any? It's important!\"": "Меландрия в Газлук-Кип сказала: «Завтра я должна приготовить особенный ужин в честь дня рождения жены моего хозяина. Я начинаю нервничать, потому что не могу испечь свои знаменитые мятные печенья без мяты! У тебя есть немного? Это очень важно!»"
"Deliver 10 Modest Poisoned Knives to Viedesi in Sun Vale. Reward: 720 councils.": "Доставьте 10 Скромных отравленных ножей Виедеси в Солнечную Долину. Награда: 720 советов."
"Deliver 10 Modest Wolfsbaned Knives to Viedesi in Sun Vale. Reward: 181 councils.": "Доставьте 10 скромных ножей Волчьей Яды Вьедеси в Солнечной Долине. Награда: 181 совет."
"Deliver 10 Mogyar Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 10,378 councils.": "Доставьте 10 Могярских сыров Тимбл Питу в Хоганском форте, Эльтибул. Награда: 10 378 советов."
"Deliver 10 Mokapok Stews to Irkima in Red Wing Casino. Reward: 1,163 councils.": "Доставьте 10 тушёных мяс мокапока Иркиме в казино Красное Крыло. Награда: 1,163 совета."
"Deliver 10 Molasses to Irkima in Red Wing Casino. Reward: 1,164 councils.": "Доставьте 10 единиц Мелассы Иркиме в казино Красное Крыло. Награда: 1,164 совета."
"Deliver 10 Monterey Jack Cheese to Ogamboe in the Fae Realm. Reward: 11,215 councils.": "Доставьте 10 сыров Монтерей Джек Огамбо в Царство Фей. Награда: 11,215 советов."
"Deliver 10 Moonstones to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 лунных камней Виедеси в Солнечную Долину. Награда: 4 760 советов."
"Brugo in Povus said, \"I still need more bones! I will pay you the same amount for another ten.\"": "Бруго в Повусе сказал: «Мне всё ещё нужно больше костей! Я заплачу тебе столько же за ещё десять.»"
"Silvia in Sun Vale said, \"Alien fae creatures are all over Sun Vale! I don't blame you, but you should do your part to help clean this up. Kill fey panthers and bring me their tails as proof!\"": "Сильвия в Солнечной Долине сказала: «Инопланетные фейские существа повсюду в Солнечной Долине! Я не виню тебя, но ты должен сделать свою часть, чтобы помочь очистить это. Убей фейских пантер и принеси мне их хвосты в качестве доказательства!»"
"Ferand Deftwhisper in Povus said, \"I'm using grizlark faster than I expected! Can you get me some more? I'll pay like before.\"": "Ференд Ловкийшепот в Повусе сказал: «Я использую гризларков быстрее, чем ожидал! Можешь достать мне ещё? Заплачу, как и раньше.»"
"Bogaku in the Rahu Sewers said, \"You said the skeleton miners were just like regular skeletons, right? But what about the NON-skeleton miners? Hmm? You didn't take notes on those, did you? Well go back and see if the living miners are weird in any way. Remember to search their guts for clues!\"": "Богака в канализации Раху сказал: «Ты говорил, что скелетные шахтёры такие же, как обычные скелеты, да? А как насчёт НЕ-скелетных шахтёров? Хмм? Ты же не делал заметок о них, правда? Так что вернись и посмотри, не странные ли живые шахтёры. Не забудь обыскать их внутренности в поисках улик!»"
"Sir Hughes in Statehelm said, \"Have you got time to handle more beasties in Vidaria? You're making things safer for our troops out there. Remember, safety is our top concern. It would obviously be mission-failure if you died!\"": "Сэр Хьюз в Стейтхелме сказал: «У тебя есть время справиться с большим количеством зверей в Видарии? Ты делаешь обстановку безопаснее для наших войск там. Помни, безопасность — наш главный приоритет. Очевидно, что смерть означала бы провал миссии!»"
"Kalaba in Eltibule said, \"I've sent the phlogiston off to my buyer, and now she wants some more! I need the same grade of phlogiston as before. Are you up for it?\"": "Калаба в Элтибуле сказала: «Я отправила флогистон своему покупателю, и теперь ей нужно ещё! Мне нужен такой же сорт флогистона, как и раньше. Ты справишься?»"
"Deliver 10 Morganites to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 морганитов Шейне в Раху. Награда: 4,930 советов."
"Floxie in the Fae Realm said, \"I've found a way to take my mind off my fear: cooking! I've been experimenting with vegetarian food from the nearby mortal realm, and they have something called a lemon which is VERY sour, and it's given me lots of dessert ideas. It's probably considered poisonous to mortals due to their simplistic digestive systems, but I can eat lemons just fine!\n\nI'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!\"": "Флокси в Фейском царстве сказала: «Я нашла способ отвлечься от страха: готовка! Я экспериментирую с вегетарианской едой из близлежащего смертного мира, и там есть что-то, что называется лимоном — он ОЧЕНЬ кислый, и у меня появилось много идей для десертов. Вероятно, для смертных он считается ядовитым из-за их простых пищеварительных систем, но я могу спокойно есть лимоны!\n\nЯ сейчас выращиваю лимонные деревья, но кажется, что им может понадобиться несколько лет, чтобы дать плоды...? Это очень странно. Думаю, я могу не любить смертные деревья. В любом случае, если коротко, мне очень нужны лимоны!"
"Deliver 10 Moss Agates to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 моховых агатов Вьедеси в Солнечной Долине. Награда: 4 760 советов."
"Tavilak in Red Wing Casino said, \"A guest told me that moss agates have magical properties that enhance the growth speed of a garden. She was unable to explain the exact nature of this magic, however. If I had a number of moss agates, perhaps I could find the secret!\"": "Тавилак в казино Красное Крыло сказал: «Гость мне рассказывал, что моховые агаты обладают магическими свойствами, которые ускоряют рост сада. Однако она не смогла объяснить точную природу этой магии. Если бы у меня было несколько моховых агатов, возможно, я смог бы раскрыть секрет!»"
"Deliver 10 Mountain Muttons to Laura Neth in Kur Mountains. Reward: 7,858 councils.": "Доставьте 10 горных барашков Лауре Нет в горах Кур. Награда: 7 858 советов."
"Deliver 10 Mozzarella Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 13,372 councils.": "Доставьте 10 Моцарелл Питу Игольчатому в Крепости Хоган, Элтибуль. Награда: 13,372 совета."
"Deliver 10 Mugs of Basic Lager to Irkima in Red Wing Casino. Reward: 590 councils.": "Доставьте 10 кружек простого лагеря Иркиме в казино Красное Крыло. Награда: 590 советов."
"Deliver 10 Mugs of Brown Ale to Irkima in Red Wing Casino. Reward: 1,237 councils.": "Доставьте 10 кружек коричневого эля Иркиме в казино Красное Крыло. Награда: 1 237 советов."
"Deliver 10 Mugs of Dwarven Stout to Irkima in Red Wing Casino. Reward: 1,565 councils.": "Доставьте 10 кружек гномьего стаута Иркиме в казино Красное Крыло. Награда: 1,565 советов."
"Deliver 10 Mugs of Goblin Ale to Irkima in Red Wing Casino. Reward: 924 councils.": "Доставьте 10 кружек гоблинского эля Иркиме в казино Красное Крыло. Награда: 924 совета."
"Deliver 10 Mugs of Hegemony Lager to Irkima in Red Wing Casino. Reward: 1,389 councils.": "Доставьте 10 кружек лагера Гегемонии Иркиме в казино Красное Крыло. Награда: 1,389 советов."
"Deliver 10 Mugs of Marzen to Irkima in Red Wing Casino. Reward: 805 councils.": "Доставьте 10 кружек Марцена Иркиме в казино Красное Крыло. Награда: 805 советов."
"Deliver 10 Mugs of Orcish Bock to Irkima in Red Wing Casino. Reward: 1,065 councils.": "Доставьте 10 кружек орочьего бокса Иркиме в казино Красное Крыло. Награда: 1,065 советов."
"Deliver 10 Mugs of Pale Ale to Irkima in Red Wing Casino. Reward: 710 councils.": "Доставьте 10 кружек светлого эля Иркиме в казино Красное Крыло. Награда: 710 советов."
"Deliver 10 Mukklo Fillets to Viedesi in Sun Vale. Reward: 2,829 councils.": "Доставьте 10 филе Муккло Вьедеси в Солнечную Долину. Награда: 2 829 советов."
"Deliver 99 Mukklo Fillets to Sheyna in Rahu. Reward: 52,531 councils.": "Доставьте 99 филе Муккло Шейне в Раху. Награда: 52 531 совет."
"Paullus in Statehelm said, \"See if you can make that mulberry wine. It's a good dessert wine. Probably good for parties!\"": "Пауллус в Стейтхелме сказал: «Попробуй сделать вино из шелковицы. Это хорошее десертное вино. Наверное, отлично подходит для вечеринок!»"
"Deliver 10 Multipurpose Knives to Viedesi in Sun Vale. Reward: 8,948 councils.": "Доставьте 10 многофункциональных ножей Виедеси в Солнечную Долину. Награда: 8,948 советов."
"Mox Warcut in New Prestonbule said, \"You know, I bet there's a master mummy in Foothills Cave. When a mummy remains alive for long enough, there's a chance it can regain its free will and rise up from its inherent bitterness. When that happens, it become VERY dangerous. They're usually yellowed or blackened with age. If you see one, RUN! You'd need a team of trained warriors to kill it!\n\nOf course, if you happen to have a few friends and wanted to kill the damned thing, I'd be happy to reward such heroism.\"": "Мокс Варкат в Нью-Престонбуле сказал: «Знаешь, я уверен, что в Пещере Предгорий есть мастер-мумия. Когда мумия живёт достаточно долго, у неё появляется шанс вернуть себе свободную волю и избавиться от врождённой горечи. Когда это происходит, она становится ОЧЕНЬ опасной. Обычно такие мумии пожелтевшие или почерневшие от старости. Если увидишь такую — БЕГИ! Тебе понадобится команда обученных воинов, чтобы её убить!\n\nКонечно, если у тебя есть несколько друзей и вы захотите убить эту проклятую тварь, я с радостью вознагражу такое геройство."
"Trekker in Gazluk said, \"I'm so glad you could make it! It's mummies!\n\nI was patrolling near the mouth of Foothills Cave in the far northwest, and mummies were pouring out! At first I thought they were activated by some evil necromancer, but they aren't marching anywhere. They're... well, they're just wandering around killing things. And they're trampling the delicate vegetation! And also they're fucking MUMMIES! I don't even know how to kill a mummy. I'm just a pig. I didn't sign up for this!\"": "Путешественник в Газлуке сказал: «Я так рад, что ты смог прийти! Это мумии!\n\nЯ патрулировал возле входа в пещеру Футхиллс на самом северо-западе, и оттуда высыпали мумии! Сначала я думал, что их активировал какой-то злой некромант, но они никуда не маршируют. Они... ну, они просто бродят и убивают всё подряд. И топчут хрупкую растительность! И ещё они, чёрт возьми, МУМИИ! Я даже не знаю, как убить мумию. Я просто свинья. Я на это не подписывался!"
"Deliver 10 Mummy Wrappings to Sheyna in Rahu. Reward: 2,388 councils.": "Доставьте 10 бинтов мумии Шейне в Раху. Награда: 2 388 советов."
"Deliver 10 Munster Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,092 councils.": "Доставьте 10 сыров Мюнстер Тримбл Питу в Хоганском Крепости, Элтибуль. Награда: 5,092 совета."
"Gretchen in Eltibule has pined for an exotic spice, \"muntok pepper\". It's a common spice among orcs, so you might be able to find some in the Kur Mountains.": "Гретхен в Элтибуле мечтает об экзотической специи — «мунтокском перце». Это обычная специя среди орков, так что ты можешь найти её в горах Кур."
"Fazzi in the Winter Nexus asked you to kill an Ogre named Gorgos.": "Фаззи в Зимнем Нексусе попросил вас убить огра по имени Горгос."
"Deliver 10 Mushroom Barley Soups to Irkima in Red Wing Casino. Reward: 5,936 councils.": "Доставьте 10 грибных перловых похлёбок Иркиме в казино Красное Крыло. Награда: 5,936 советов."
"Backfat in the Fae Realm said, \"I'm pretty tired of the mushroom scene. I'm much more into physical fitness these days! But people have certain expectations of an immortal pig. Everyone expects me to know the quality of the local fungi, but I haven't done a survey in a while. Saaaaay... why don't you go out and pick some for me? It'll be great exercise!\"": "Бэкфэт в Фейском царстве сказал: «Я уже довольно устал от грибной темы. В последнее время меня гораздо больше интересует физическая форма! Но у людей есть определённые ожидания от бессмертной свиньи. Все ждут, что я разбираюсь в качестве местных грибов, но я давно не проводил обследование. Скажем так... почему бы тебе не сходить и не собрать немного для меня? Это будет отличное упражнение!»"
"Brianna Willer in Serbule Hills said, \"Sometimes delicious beer uses gross ingredients. Mushrooms, for instance! But I've found that my boletus-and-apple pale ale is incredibly delicious! I've just run out of boletus mushrooms. Can you gather some for me?\"": "Брианна Уиллер в Сербульских Холмах сказала: «Иногда вкусное пиво делается из отвратительных ингредиентов. Например, из грибов! Но я обнаружила, что мой светлый эль с белыми грибами и яблоками невероятно вкусный! У меня только что закончились белые грибы. Можешь собрать для меня немного?»"
"Deliver 10 Mutton and Eggs to Irkima in Red Wing Casino. Reward: 1,673 councils.": "Доставьте 10 порций баранины с яйцами Иркиме в казино Красное Крыло. Награда: 1 673 совета."
"Sir Fisk in Statehelm said, \"I met the famous Denton Razor while I was stationed in Vidaria. You might say he's my nemesis: I'm the master of the crossbow and he the bow. But I'm not afraid to say that he's my better in most respects. Once I had a chance to kill him, and I let him live. Things got strange after that.\n\nI'd like to goad my nemesis by giving him his most-hated flower. If you did this for me, he'd know immediately who was responsible, and it would completely ruin his day! He deserves it, don't worry.\n\nSometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!\"": "Сэр Фиск в Стейтхелме сказал: «Я встретил знаменитого Дэнтона Рэйзора, когда служил в Видарии. Можно сказать, он мой заклятый враг: я мастер арбалета, а он — лука. Но я не боюсь признать, что во многих отношениях он меня превосходит. Однажды у меня был шанс убить его, но я пощадил его. После этого всё стало странным.\n\nЯ хотел бы поддразнить своего врага, подарив ему его самый ненавистный цветок. Если ты сделаешь это для меня, он сразу поймёт, кто за этим стоит, и это полностью испортит ему день! Он этого заслуживает, не волнуйся.\n\nИногда, прогуливаясь по зарослям Видарии, можно найти особенно яркие болелисты. Доставь ему несколько таких!"
"Fransesca Muradrake in Statehelm said, \"As we -- well, as <i>I</i> learned during our ritual, my husband was murdered by a goblin sage named Grosark, who is trapped in Steven's laboratory deep inside the Statehelm Crypt.\n\nHere: the key to his lab. Go and take care of the issue.\n\nGrosark is in a largely incorporeal state, but the lab has a mechanism for dealing with this. Activate the lamps in the four corners of the lab, and he will be forced to apparate. You will need some tea lights for the lamps; don't forget to bring them with you!\"": "Франсеска Мурадрейк в Стейтхелме сказала: «Как мы — ну, как <i>я</i> узнала во время нашего ритуала, моего мужа убил гоблин-мудрец по имени Гросарк, который заперт в лаборатории Стивена глубоко внутри крипты Стейтхелма.\n\nВот ключ от его лаборатории. Иди и реши эту проблему.\n\nГросарк находится в большей степени в бесформенном состоянии, но в лаборатории есть механизм для борьбы с этим. Активируй лампы в четырёх углах лаборатории, и он будет вынужден появиться. Тебе понадобятся чайные свечи для ламп; не забудь взять их с собой!"
"Deliver 10 Mycologist's Arrangement #1 to Sheyna in Rahu. Reward: 3,097 councils.": "Доставьте 10 букетов миколога №1 Шейне в Раху. Награда: 3,097 советов."
"Deliver 10 Mycologist's Arrangement #2 to Sheyna in Rahu. Reward: 4,064 councils.": "Доставьте 10 букетов миколога №2 Шейне в Раху. Награда: 4,064 совета."
"Deliver 10 Mycologist's Arrangement #3 to Sheyna in Rahu. Reward: 4,876 councils.": "Доставьте 10 букетов миколога №3 Шейне в Раху. Награда: 4,876 советов."
"Deliver 10 Mycologist's Arrangement #4 to Sheyna in Rahu. Reward: 7,925 councils.": "Доставьте 10 букетов миколога №4 Шейне в Раху. Награда: 7,925 советов."
"Deliver 10 Mycologist's Arrangement #5 to Sheyna in Rahu. Reward: 10,760 councils.": "Доставьте 10 букетов миколога №5 Шейне в Раху. Награда: 10 760 советов."
"Deliver 10 Mycologist's Arrangement #6 to Sheyna in Rahu. Reward: 13,745 councils.": "Доставьте 10 букетов миколога №6 Шейне в Раху. Награда: 13,745 советов."
"Loche said, \"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Blood Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\"": "Лочи сказал: «Привет! В казино отличные напитки, но я умираю от желания выпить коктейль из грибов! Ты не мог бы принести мне 10 коктейлей из кровавых грибов? Нет! Я не собираюсь выпивать их все сразу. За кого ты меня принимаешь... за дворфа?»"
"Loche said, \"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Boletus Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\"": "Лочи сказал: «Привет! В казино есть отличные напитки, но я умираю от желания выпить грибной коктейль! Можешь принести мне 10 коктейлей из подосиновиков? Нет! Я не собираюсь пить их все сразу. За кого ты меня принимаешь... за гнома?»"
"Loche said, \"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Disastrous Spore Bombs? It would be a great help!\"": "Лочи сказал: «Привет! Ты можешь помочь мне? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос привлекает их... а потом я взрываю их в клочья! Ты можешь сделать для меня 30 катастрофических споровых бомб? Это было бы большой помощью!»"
"Loche said, \"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Nightmarish Spore Bombs? It would be a great help!\"": "Лочи сказал: «Привет! Ты можешь мне помочь? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос привлекает их... а потом я взрываю их на куски! Ты можешь сделать для меня 30 Кошмарных споровых бомб? Это было бы большой помощью!»"
"Loche said, \"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Ruinous Spore Bombs? It would be a great help!\"": "Лочи сказал: «Привет! Ты можешь помочь мне? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос заманивает их... а потом я взрываю их на куски! Ты можешь сделать для меня 30 Разрушительных споровых бомб? Это было бы большой помощью!»"
"Deliver 10 Myconian Jellies to Fitz the Boatman on the Serbule docks. Reward: 2,267 councils.\nNote from orderer: <i>\"I found this amazing stuff for sale in Statehelm once but I can't find where it originates from. I guess \"Myconian\" is the name of its creator... sounds like a dwarven name to me. Maybe he's a merchant.\"</i>": "Доставьте 10 миконианских желе Фитцу Лодочнику на причалы Сербуля. Награда: 2 267 советов.  \nПримечание от заказчика: <i>«Однажды я нашёл эту удивительную штуку на продаже в Стейтхелме, но не могу найти, откуда она родом. Думаю, \"Микониан\" — это имя её создателя... звучит как гномье имя. Может, он торговец.»</i>"
"Deliver 10 Myconian Resistance Lagers to Fitz the Boatman on the Serbule docks. Reward: 2,637 councils.": "Доставьте 10 лагерей Миконианского Сопротивления Фитцу Лодочнику на доках Сербуля. Награда: 2,637 советов."
"Deliver 10 Myconutmegs to Fitz the Boatman on the Serbule docks. Reward: 2,873 councils.": "Доставьте 10 миконутмегов Фитцу Лодочнику на пристани Сербуля. Награда: 2,873 совета."
"Grakelsput in Povus said, \"Once, long ago, giant cats roamed Povus. But we've only managed to resurrect a few specimens! We're so early in our research of this creature that we don't even want to study their behavior yet: I just need bones to study! If you find giant cat bones, please bring them to me.\"": "Гракелспут в Повусе сказал: «Однажды, очень давно, по Повусу бродили гигантские кошки. Но нам удалось воскрешать лишь несколько экземпляров! Мы настолько рано в нашем исследовании этого существа, что даже не хотим изучать их поведение пока: мне нужны только кости для изучения! Если вы найдете кости гигантской кошки, пожалуйста, принесите их мне.»"
"Deliver 10 Mystery Jerkies to Fitz the Boatman on the Serbule docks. Reward: 1,585 councils.": "Доставьте 10 Таинственных вяленых мясных ломтиков Фитцу Лодочнику на доках Сербуля. Награда: 1,585 советов."
"Mythander in Eltibule said, \"I suppose I could teach you horse-riding if you did a favor for me. You see, I despise goblins for obvious reasons, and there's talk of goblin miners in this area. I need to know what they're mining. You know how to kill a goblin, right? And swing a mining pick? Good, this should be easy for you! <i>[Note: Completion requires Mining 15.]</i>\n\nI've heard there is a \"model home\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.\"": "Митандер в Элтибуле сказал: «Полагаю, я мог бы научить тебя верховой езде, если ты сделаешь мне одолжение. Видишь ли, я презираю гоблинов по понятным причинам, и ходят слухи о гоблинских шахтёрах в этом районе. Мне нужно узнать, что они добывают. Ты умеешь убивать гоблинов, правда? И обращаться с горным кирком? Отлично, это должно быть легко для тебя! <i>[Примечание: для выполнения требуется Навык Горного дела 15.]</i>\n\nЯ слышал, что где-то здесь есть «образцовый дом» — поддельный дом. Если ты проникнешь в подвал и пройдёшь мимо нескольких гоблинов, там будет пещера. Узнай, что гоблины добывают в этой пещере! Пройди до самого конца и добывай всё, что там есть. Принеси мне образец."
"Otis in Red Wing Casino said, \"USHUG HAS SECRET. USHUG TELL OTIS IF GIVE POTION. YOU GET POTION. IS STAFF POTION FOR ARENA!\"": "Отис в казино Красное Крыло сказал: «УШУГ ИМЕЕТ ТАЙНУ. УШУГ СКАЖЕТ ОТИСУ, ЕСЛИ ДАДИТЕ ЗЕЛЬЕ. ВЫ ПОЛУЧИТЕ ЗЕЛЬЕ. ЭТО ЖЕЗЛОВОЕ ЗЕЛЬЕ ДЛЯ АРЕНЫ!»"
"Otis in Red Wing Casino said, \"NEED STINGER OF SCORPION. NOT TELL REASON.\"": "Отис в казино Красное Крыло сказал: «НУЖНО ЖАЛО СКОРПИОНА. НЕ ГОВОРИТ ПРИЧИНУ.»"
"Otis in Red Wing Casino said, \"CLUB MAKE CRACK SOUND IN ARENA. NEED NEW CLUB! WILL MAKE. GET PERFECT WOOD. CEDAR!\"": "Отис в казино Ред Винг сказал: «ДУБИНА ДЕЛАЕТ ТРЕСЧАЩИЙ ЗВУК В АРЕНЕ. НУЖНА НОВАЯ ДУБИНА! СДЕЛАЮ. НУЖНО ИДЕАЛЬНОЕ ДЕРЕВО. КЕДР!»"
"Otis in Red Wing Casino said, \"OTIS STOMACH ACHE. OTIS NEED NEW STOMACH. YOU GET! OGRE STOMACH! NOT TROLL STOMACH! OGRE!!\"": "Отис в казино Красное Крыло сказал: «У ОТИСА БОЛИТ ЖЕЛУДОК. ОТИСУ НУЖЕН НОВЫЙ ЖЕЛУДОК. ТЫ ПОЛУЧИШЬ! ЖЕЛУДОК ОГРА! НЕ ТРОЛЛЯЧИЙ ЖЕЛУДОК! ОГР!!»"
"Bogaku in the Rahu Sewers said, \"The ratkin around here rely heavily on necromancy to help them mine faster. And I noticed the necromancers often have giant white rats with them. They don't look like good tunneling rats... I wonder what they're for?\n\nNo, stop talking. I don't care about a monster's opinions... make yourself useful and go murder some rats. See if they're living or undead. Remember, undead ones don't bleed much!\"": "Богака в канализации Раху сказал: «Крысолюди здесь сильно полагаются на некромантию, чтобы копать быстрее. И я заметил, что у некромантов часто есть гигантские белые крысы. Они не похожи на хороших рытьёных крыс... Интересно, для чего они нужны?\n\nХватит болтать. Мне не важны мнения монстров... сделай что-нибудь полезное и иди убей несколько крыс. Посмотри, живые они или нежить. Помни, нежить почти не кровоточит!"
"Deliver 10 Necromancy Boost Potion 20% to Irkima in Red Wing Casino. Reward: 3,490 councils.": "Доставьте 10 Зелий усиления Некромантии 20% Иркиме в Казино Красное Крыло. Награда: 3,490 советов."
"Glajur, a goblin you met under a tower in Kur Mountains, asked you to bring him some of the odd goblets lying about the dungeon.": "Гладжур, гоблин, с которым вы встретились под башней в горах Кур, попросил вас принести ему несколько странных кубков, разбросанных по подземелью."
"Bogaku in the Rahu Sewers said, \"These ratkin are unusually good at necromancy. I wonder exactly how powerful they are? Hmm...\n\nOh, hi there mutant, I have a small test for you. Go and get yourself shot by some ratkin necromancers. Try not to die, though! I need to ask you some questions after, and I can't speak with the dead! Because I'm not a necromancer!\"": "Богака в канализации Раху сказал: «Эти крысолюди необычайно хорошо владеют некромантией. Интересно, насколько они сильны? Хмм...\n\nО, привет, мутант, у меня для тебя небольшое задание. Иди и дай себя выстрелить нескольким некромантам-крысолюдям. Только постарайся не умереть! Мне нужно будет задать тебе несколько вопросов после, а с мёртвыми я не разговариваю! Потому что я не некромант!"
"Irkima in Red Wing Casino said, \"I have given you my recipe for the bird feed we use here. Collect the ingredients and bring me 10 units of it back.\n\n<i>You can find the recipe in the Lore category of your recipe book.</i>\"": "Иркима в казино Красное Крыло сказала: «Я дала тебе свой рецепт корма для птиц, который мы используем здесь. Собери ингредиенты и принеси мне 10 единиц этого корма.\n\n<i>Рецепт можно найти в категории Легенды в твоей книге рецептов.</i>"
