"Lisi in Sun Vale said, \"There are many seashells on the beaches here. I like the pointy ones, and the round shiny ones ... But I really like the shell fragments. I can use them to make little mosaics. It gives me something to do while my wing heals.\"": "Лиси в Солнечной Долине сказала: «Здесь на пляжах много морских раковин. Мне нравятся острые и круглые блестящие... Но больше всего мне нравятся осколки раковин. Я могу использовать их для создания маленьких мозаик. Это занимает меня, пока мое крыло заживает.»"
