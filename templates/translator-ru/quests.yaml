# ── Тексты квестов (Preface, Success, Midway, Rewards) ──
"I know my wife gave one of the chapters to old Julius Patton. He lives on the farm nearby. He's not a bad sort; explain things to him and see if he'll give the chapter to you.": "Я знаю, что моя жена отдала одну из глав старому Джулиусу Паттону. Он живёт на ферме неподалёку. Он неплохой человек; объясни ему всё и посмотри, даст ли он тебе главу."
"Thanks. I have info on another chapter, if you're interested in helping more.": "Спасибо. У меня есть информация о следующей главе, если хочешь помочь дальше."
"So Durstin's trying to put the book back together, huh? I guess it's part of the healing process.\n\nYeah, Durstin really messed up! His wife was on her deathbed and he went and slept with her best friend. He was so ashamed. His wife forgave him before she died, though. And I guess he's forgiven himself now, too. Let me get those pages for ya.": "Так Дёрстин пытается собрать книгу обратно, да? Похоже, это часть процесса исцеления.\n\nДа, Дёрстин действительно накосячил! Его жена была при смерти, а он пошёл и переспал с её лучшей подругой. Ему было очень стыдно. Но жена простила его перед смертью. И, похоже, теперь он тоже себя простил. Дай я достану для тебя эти страницы."
"I know exactly where this chapter is. Well, not exactly. There used to be a caretaker that lived on a hill south of here. George left years ago, but he told me he kept a chapter of the book in a box somewhere on his farm.\n\nThere's some dwarf living there now by the name of Sammie. Go search around the place, see if you can find the chapter.": "Я точно знаю, где эта глава. Ну, не совсем точно. Раньше на холме к югу отсюда жил смотритель. Джордж уехал много лет назад, но он говорил, что хранил главу книги в коробке где-то на своей ферме.\n\nСейчас там живёт какой-то гном по имени Сэмми. Пойдёшь, осмотри это место, посмотри, сможешь ли найти главу."
"One of the chapters is in that old spider-infested cave northeast of here. Tyler -- the drunk over there in the corner -- said he saw them when he was exploring, but he didn't think the pages were worth anything. And now he's too afraid to go back in.\n\nHe said they were on top of some cobweb-encrusted crates deep in the cave. I'll pay extra for that one, since it sounds dangerous.": "Одна из глав находится в той старой пещере, кишащей пауками, к северо-востоку отсюда. Тайлер — пьяница в том углу — сказал, что видел их, когда исследовал пещеру, но не думал, что страницы что-то стоят. А теперь он боится туда возвращаться.\\n\\nОн сказал, что они лежали на вершине каких-то ящиков, покрытых паутиной, глубоко в пещере. Я заплачу больше за эту главу, так как это звучит опасно."
"My wife's diary says one of the chapters is hidden at her favorite reading spot. I guess that'd be the old watchtower overlooking the Serbule Hunting Lodge. Not a very safe reading spot these days! It's on a hill. Go past the lodge and climb the hills a little south of it.": "Дневник моей жены говорит, что одна из глав спрятана в её любимом месте для чтения. Думаю, это старая сторожевая башня с видом на охотничий домик Сербуля. В наши дни это не самое безопасное место для чтения! Она на холме. Пройдите мимо домика и поднимитесь на холмы немного к югу от него."
"Thanks. Soon we'll have them all, and I can put this part of my life behind me.": "Спасибо. Скоро у нас будет всё, и я смогу оставить эту часть своей жизни позади."
"That old bi-- err, old biddy Brianna Willer has one of the chapters. But she won't give it to me. Says my wife deserved... well, she won't give it to me. Can you snoop around her farm, see if you can find it?": "Та старая стерва, э-э, старая баба Брианна Уиллер имеет одну из глав. Но она не отдаст её мне. Говорит, моя жена заслужила... ну, она не отдаст её мне. Можешь поискать на её ферме, посмотреть, найдёшь ли её?"
"Thanks. I'm glad you could find it. Brianna's stubborn, but I guess in her own way, she's dutiful to her friends.": "Спасибо. Рад, что ты смог это найти. Брианна упрямая, но, полагаю, по-своему она предана своим друзьям."
"<i>[Durstin sighs.]</i> Very bad news. I was talking to Paul the lumberjack -- he's around here somewhere -- and he knew where the last chapter was. He said it was hidden in a box near the lumber mills east of here. So he went to go get it for me... and he ran into a pack of boars on the way back. And here's the kicker: one of the boars ate the pages!\n\nPaul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!": "<i>[Дёрстин вздыхает.]</i> Очень плохие новости. Я разговаривал с Полом, лесорубом — он где-то здесь — и он знал, где последняя глава. Он сказал, что она спрятана в коробке возле лесопилок к востоку отсюда. Так что он пошёл за ней для меня... и по дороге обратно наткнулся на стаю кабанов. И вот в чём дело: один из кабанов съел страницы!\n\nПол до смерти боится этого кабана. Он назвал его «Грязные Клыки». Кажется, думает, что он крепче обычного кабана. Но кабан есть кабан, верно? Думаю, если поторопишься, сможешь достать страницы из его брюха. Я заплачу дополнительно! Поторопись!"
"You found them! Well, they're not in good shape, but they're legible. That should be good enough.": "Вы нашли их! Ну, они не в лучшем состоянии, но читаемы. Этого должно быть достаточно."
"Been drawing up new tailoring plans. Gotta keep my mind off the Shadow Keepers! But it's a bitch to draw anything in this frozen hellhole. What I wouldn't do for a nice calligraphy bench!": "Разрабатываю новые выкройки для портняжного дела. Нужно отвлечься от Стражей Тени! Но в этой ледяной дыре чёрт возьми сложно что-то нарисовать. Что бы я ни отдал за хороший стол для каллиграфии!"
"Wow, I didn't expect you to manage that. Thank you. Ain't got much to repay you with, but here's some tailoring supplies.": "Вау, не ожидал, что тебе это удастся. Спасибо. У меня мало чего, чтобы отблагодарить, но вот немного материалов для портняжного дела."
"Most of my customers are out-of-town orders. Quite expensive stuff. Say! You wouldn' t be interested in helping me fill some orders, would you? Like this one for skulls and brains?": "Большинство моих клиентов делают заказы из других городов. Весьма дорогие товары. Скажи! Ты не хочешь помочь мне выполнить несколько заказов? Например, вот этот — на черепа и мозги?"
"It looks like you know your way around an organ knife. I could use someone like you! On a contractual basis, of course. Here's the pay for this one. I have more requests if you have time.": "Похоже, ты умеешь обращаться с органным ножом. Мне бы пригодился такой человек, как ты! Конечно, на контрактной основе. Вот оплата за это задание. У меня есть ещё просьбы, если у тебя будет время."
"I just can't get the buckle to shine like it needs to! You've gotta help me again. The Wombat told me about a magic rock called 'Iridium' which can make things glow. Find me some of this stuff! Womby said he mined some in the Kur Mountains one time.": "Я никак не могу заставить пряжку блестеть так, как нужно! Ты должен снова помочь мне. Вомбат рассказал мне о волшебном камне под названием «Иридий», который может заставить вещи светиться. Найди мне немного этого материала! Вомби сказал, что однажды добывал его в горах Кур."
"Huh, this iridium's not glowing. I wonder if I have to cast some sort of activation spell or something? Shit. I'll ask Wombat, he'll know what to do.\n\nThanks for the help. Here -- take my old backup buckle. In my younger days I was wearing this buckle when I got sent to a prison dimension. I spent thousands of years in limbo before I could get free. Ha, those were good times, probably! I can't really remember it well, but I met some fun people.\n\nAnyway, when I came out, I discovered this buckle can't be broken. No matter what you do, it's unbreakable. Neat, huh? Keep it, because you, too, are fucking UNBREAKABLE! YEAH!": "Хм, этот иридий не светится. Интересно, нужно ли мне наложить какое-то заклинание активации или что-то в этом роде? Чёрт. Спрошу у Вомбат, он знает, что делать.\n\nСпасибо за помощь. Вот — возьми мою старую запасную пряжку. В молодости я носил эту пряжку, когда меня отправили в тюремное измерение. Я провёл тысячи лет в лимбе, прежде чем смог выбраться. Ха, наверное, это были хорошие времена! Я плохо это помню, но встретил там забавных людей.\n\nВ любом случае, когда я вышел, я обнаружил, что эту пряжку нельзя сломать. Что бы ты ни делал, она неразрушима. Круто, да? Держи её, потому что ты тоже чёртовски НЕРАЗРУШИМ! ДА!"
"All our supplies are gone, so I've had lots of trouble feeding Tryaka and myself. We're making due, but I really miss having an orange for breakfast each morning. And our gums are starting to bleed... I fear that's somehow related.": "Все наши припасы закончились, так что у меня было много проблем с тем, чтобы прокормить Трияку и себя. Мы как-то справляемся, но мне очень не хватает апельсина на завтрак каждое утро. И наши дёсны начинают кровоточить... Боюсь, это как-то связано."
"Oranges! Thank you! They're like liquid sunshine on a cloudy day. And hopefully my gums will stop bleeding!": "Апельсины! Спасибо! Они как жидкое солнце в пасмурный день. И, надеюсь, мои дёсны перестанут кровоточить!"
"I wish oranges grew around here...": "Хотелось бы, чтобы здесь росли апельсины..."
"I used to grow veggies myself, but I don't move as smoothly as I used to. Gotta save my energy for the grapes! Which means I'm in a bit of an embarrassing situation: I need to restock my larder with onions. Can you grow some for me?": "Раньше я сам выращивал овощи, но теперь двигаюсь не так ловко, как раньше. Нужно беречь силы для винограда! А это значит, что я оказался в немного неловком положении: мне нужно пополнить запасы лука в кладовой. Не мог бы ты вырастить немного для меня?"
"Thank you! Nothing like a good onion to go in an omelete, am I right? Let me show you how I make my omeletes. Could be useful to you.": "Спасибо! Нет ничего лучше хорошего лука для омлета, правда? Позволь показать тебе, как я готовлю свои омлеты. Может быть полезно для тебя."
"What took you so long?! I've been waiting for more than an hour! Nevermind. I don't care about your excuses. Please prepare a stuffed bell pepper for me.": "Что тебя так задержало?! Я жду уже больше часа! Неважно. Мне не интересны твои оправдания. Пожалуйста, приготовь для меня фаршированный болгарский перец."
"I see that you didn't make the mistake of undersalting the dish. And this steak is ... Hm. Actually, it's pretty good. I'll eat it. Thank you.": "Вижу, ты не ошибся с количеством соли в блюде. А этот стейк... Хм. На самом деле, он довольно хорош. Я съем его. Спасибо."
"Yes, remember my order? The stuffed bell pepper? I'm still waiting...": "Да, помнишь мой заказ? Фаршированный болгарский перец? Я всё ещё жду..."
"When I first left camp, I wandered a bit before settling here. I stumbled upon a dwarven man near the swamp to the north, but we lacked communication because he did not speak Orcish... or perhaps he did, and simply did not want to chat. Regardless, dwarves are often clever inventors, so would you inquire about a collaboration between us?": "Когда я впервые покинул лагерь, я немного побродил, прежде чем обосноваться здесь. Я наткнулся на гнома у болота к северу, но мы не смогли понять друг друга, потому что он не говорил на орочьем... а может, и говорил, просто не хотел разговаривать. В любом случае, гномы часто бывают умелыми изобретателями, так что не мог бы ты узнать о возможности сотрудничества между нами?"
"He said no? And accused you of being racist for assuming he would know about technology? My apologies, that must have been awkward. Please take this as a token of my apology.": "Он сказал «нет»? И обвинил тебя в расизме за то, что ты предположил, что он знает о технологиях? Прошу прощения, это должно было быть неловко. Прими это как знак моей извинения."
"Excuse me? An orc wants to collaborate on technology? What, just because I'm stout and have a big bushy beard, that automatically makes me an inventor, does it? Well, tell your orc friend that I'll happily invent new things with them as soon as they get done rampaging across the country, killing everything in sight. In other words: piss off. Hrmph.": "Извините? Орк хочет сотрудничать в области технологий? Что, только потому что я коренастый и с большой пушистой бородой, меня автоматически считают изобретателем? Ну, скажи своему орочьему другу, что я с радостью буду изобретать новые вещи вместе с ним, как только он перестанет бесчинствовать по всей стране, убивая всё на своём пути. Другими словами: отстаньте. Хм."
"I was thinking about my friend Az. He's never experienced an orcish birthday. That's when your friends make you medals. Joke medals. Even I had friends in Gazluk. I want to give Azagrus a bit of that experience. Here: this one's perfect. Can you give it to him?": "Я думал о своём друге Азе. Он никогда не праздновал орочий день рождения. Это когда твои друзья делают тебе медали. Шуточные медали. Даже у меня были друзья в Газлуке. Я хочу подарить Азагрусу частичку этого опыта. Вот: эта подходит идеально. Можешь отнести её ему?"
"Thanks for the help with my birthday present. I hope Az liked it.": "Спасибо за помощь с моим подарком на день рождения. Надеюсь, Азу он понравился."
"What is this? A medal?\n\n<i>[ Asparagus stares at it, turning it in his hand. He wipes away a tear. ]</i>\n\nThis is from Justin, isn't it?\n\nTell him... Tell him thanks.": "Что это? Медаль?\\n\\n<i>[ Спаржа смотрит на неё, вертя в руке. Он вытирает слезу. ]</i>\\n\\nЭто от Джастина, да?\\n\\nСкажи ему... скажи ему спасибо."
"The ratkin used to be friendly. When I was younger, they would come into town and I'd sell 'em vegetables! But after the fall of Povus they attack on sight. I had to give up mining because of them. I wish somebody would teach 'em a lesson for me! Hint, hint.": "Крысолюды раньше были дружелюбны. Когда я был моложе, они приходили в город, и я продавал им овощи! Но после падения Повуса они нападают при встрече. Из-за них мне пришлось бросить добычу руды. Хотелось бы, чтобы кто-нибудь дал им урок за меня! Намёк, намёк."
"Well that's a few less treacherous ratkin to worry about! You're not so bad after all! Here.": "Ну, теперь на несколько коварных крысолюдей меньше, о которых нужно беспокоиться! В конце концов, ты неплох! Вот."
"We've got one backup crystal emitting alerts, but it won't last forever. We really need to get the main crystal working again! But there's nobody left alive who knows how this stuff works.\n\nBefore the massacre, there was a group of foxes that maintained the system. They taught each other the secrets of how it worked. Did they write the secrets down? No, of course they didn't. And then they ALL had to go get massacred, and now here we are.\n\nMilton won't let me bring in outside help, but I needed some expert advice, so I've been quietly using a sending-stone to chat with my old master.\n\nDon't look at me like that: my master's a great wizard! I wasn't his slave! I was his partner! Anyway, I haven't told him the specifics, so he can't be too helpful, but he thinks he has a book that'll help. And he shipped it overseas to me! It should be waiting for pickup in Rahu. I'm not sure where, exactly, but talk to the dock manager.": "У нас есть один запасной кристалл, который посылает сигналы тревоги, но он не будет работать вечно. Нам действительно нужно снова запустить главный кристалл! Но никто из живых уже не знает, как всё это работает.\n\nДо резни была группа лис, которые обслуживали систему. Они передавали друг другу секреты её работы. Записывали ли они эти секреты? Нет, конечно, не записывали. А потом всех их уничтожили, и вот мы здесь.\n\nМилтон не разрешает мне привлекать постороннюю помощь, но мне нужен был совет эксперта, поэтому я тихо использовал камень связи, чтобы поговорить с моим старым мастером.\n\nНе смотри на меня так: мой мастер — великий волшебник! Я не был его рабом! Я был его партнёром! В любом случае, я не рассказал ему подробности, так что он не может сильно помочь, но он думает, что у него есть книга, которая поможет. И он отправил её мне через океан! Она должна ждать меня в Раху. Я точно не знаю где, но поговори с управляющим доком."
"This is the book? It's older than I expected. Look, it's signed by the author! \"To Exelpan, the dirty elf with the brilliant mind.\" That's my former master's name. He sent me his signed copy! Great, now I have to make sure it doesn't get peed on by anybody so I can return it.\n\nAnyway, now I have to read this book and see if it helps. Thanks for picking it up.": "Это та самая книга? Она старше, чем я ожидал. Смотри, она подписана автором! «Экзельпану, грязному эльфу с блестящим умом». Это имя моего бывшего хозяина. Он прислал мне свой подписанный экземпляр! Отлично, теперь мне нужно следить, чтобы никто на неё не пописал, чтобы я мог вернуть её.\n\nВ любом случае, теперь мне нужно прочитать эту книгу и посмотреть, поможет ли она. Спасибо, что достал её."
"Special-order book? Oh. I know what you're talking about. It was hand-delivered by the captain of the last ship. He said an animal would come to claim it.\n\nWhoever sent this book paid a fortune to get it here fast. I hope it's a good read.": "Книга по специальному заказу? Ох. Я знаю, о чём ты. Её лично доставил капитан последнего корабля. Он сказал, что за ней придёт животное.\n\nТот, кто отправил эту книгу, заплатил целое состояние, чтобы доставить её сюда быстро. Надеюсь, она стоит того, чтобы её читать."
"You've helped me get all my stock back. And my new masterpiece is perhaps even better than the old one! I can't thank you enough. But let me try. I have an idea for a masterpiece just for you. I only need a few special ingredients! When you come back with these things, be ready to tell me what combat skills I should enchant it with.": "Вы помогли мне вернуть все мои товары. И мой новый шедевр, возможно, даже лучше прежнего! Я не могу достаточно вас отблагодарить. Но позвольте мне попытаться. У меня есть идея шедевра специально для вас. Мне нужно всего несколько особых ингредиентов! Когда вернётесь с этими вещами, будьте готовы сказать мне, какими боевыми навыками мне следует его зачаровать."
"Here it is! I hope you like it.\n\nYes, I'm an old hand at enchantment. And <i>technically</i> I'm an archmage. But please don't tell anyone! They already don't like me here, and I haven't practiced archmagery in a long time. I don't even like to let people know I enchant all the jewelry in my shop. They'll think my beautiful artwork is elf-cursed.\n\nAnyway, does it fit? Oh good! Thank you again for everything you've done for me. I'm indebted to you.": "Вот оно! Надеюсь, тебе понравится.\n\nДа, я опытный мастер зачарования. И <i>технически</i> я архимаг. Но, пожалуйста, никому не говори! Меня здесь и так не любят, а архимагией я давно не занимался. Я даже не люблю, когда люди узнают, что я зачаровываю все украшения в своём магазине. Они подумают, что мои прекрасные изделия прокляты эльфами.\n\nВ любом случае, подходит? Отлично! Ещё раз спасибо за всё, что ты для меня сделал. Я в долгу перед тобой."
"Of course, there's no chance I'll ever see my most recent masterpiece ever again. The thief no doubt valued that one over all the other trinkets in my store, and would never have parted with it. Well, I shouldn't give up hope; perhaps it will show up on the market in a few years.\n\nBut right now I need to create a NEW masterpiece. The old one was a riff on my famous rubywall crystal motif, but now I'm imagining something fresher: rubywall-like crystals, but with the darkest of aquamarines!\n\nI should get started right away while the inspiration has hit me. Unfortunately, my gem supply is gone and what I need is no ordinary aquamarine. I need just the right one.\n\nWhy don't you simply get me 100 or so and I'll just pick the best one from the batch.": "Конечно, нет никакой надежды когда-либо снова увидеть мой последний шедевр. Вор, без сомнения, ценил его выше всех остальных безделушек в моём магазине и никогда бы с ним не расстался. Ну, не стоит терять надежду; возможно, он появится на рынке через несколько лет.\\n\\nНо сейчас мне нужно создать НОВЫЙ шедевр. Старый был вариацией на тему моего знаменитого мотива кристаллов рубиволл, а теперь я представляю что-то свежее: кристаллы, похожие на рубиволл, но с самыми тёмными аквамаринами!\\n\\nМне стоит начать прямо сейчас, пока меня посетило вдохновение. К сожалению, мой запас драгоценных камней иссяк, и то, что мне нужно, — это не обычный аквамарин. Мне нужен именно подходящий.\\n\\nПочему бы тебе просто не принести мне около 100 штук, а я выберу лучший из партии."
"Hmm. Well none of them are as good as my last masterpiece, but THIS one is... Yes, I can make this work. Thank you. Please take this other trash away.\n\nI'll have my new masterpiece on display in no time!": "Хмм. Ну, ни один из них не так хорош, как мой последний шедевр, но ЭТОТ... Да, с этим я справлюсь. Спасибо. Пожалуйста, убери этот другой хлам.\n\nМой новый шедевр скоро будет выставлен на всеобщее обозрение!"
"Can you give this note to Willem for me? Now don't read it! Promise you won't!": "Можешь передать эту записку Виллему? Только не читай её! Обещай, что не будешь!"
"That's all he said? He didn't say anything about the <i>contents</i> of my letter? I mean, I trust you, so why isn't that enough for him?! Hmph. Oh, here. Now... please leave me alone... I just need to be alone for a minute.": "Это всё, что он сказал? Он ничего не сказал о <i>содержимом</i> моего письма? Я же тебе доверяю, так почему ему этого недостаточно?! Хм. Вот. А теперь... пожалуйста, оставь меня в покое... мне нужно побыть одному минуту."
"Did you read this?! It's not even in an envelope! Tell the daft girl not to let people know about us! What in Ormorek's Beard am I going to do with her?": "Ты это прочитал?! Это даже не в конверте! Скажи этой глупой девчонке не разглашать о нас! Что, чёрт возьми, мне с ней делать?"
"You've awakened in a strange place and you don't remember anything. You need to get your feet under you, get your wings flapping, and figure out what happened and where you are.": "Вы очнулись в странном месте и ничего не помните. Вам нужно встать на ноги, расправить крылья и понять, что случилось и где вы находитесь."
"The notes you brought back from Rock-Wrecker's camp are pretty clever - I wish those other engineers worked this hard when I was still around. At any rate, there's a few missing pieces of information.\n\nFor security purposes, many orcish engineers write their notes as a cipher, and they carry the key on their person. Obtain a few of these keys and bring them back, hopefully one of them is the key that I need.": "Заметки, которые ты принес из лагеря Разрушителя Камней, довольно умные — жаль, что другие инженеры не работали так усердно, когда я ещё был здесь. В любом случае, не хватает нескольких важных сведений.\n\nВ целях безопасности многие орочьи инженеры записывают свои заметки шифром, а ключ носят при себе. Добыть несколько таких ключей и принеси их мне, надеюсь, один из них — тот самый ключ, который мне нужен."
"Hmm, not this one... this one isn't lining up either... a-ha, this is it! Now let's see, what exactly did they mean by... ohh, that makes so much sense! I think I've got it now.\n\n<i>[You've unlocked new training options with Engineer Crall.]</i>": "Хмм, не этот... этот тоже не подходит... ага, вот он! Теперь посмотрим, что именно они имели в виду... ооо, теперь всё так понятно! Думаю, я понял.\n\n<i>[Вы открыли новые варианты обучения у инженера Кралла.]</i>"
"Unlock new Gadgeteering recipe training": "Открыть обучение новым рецептам в Гаджетостроении"
"We shall simply create a... new potion to help me restore my... power.\n\nFirst, obtain the... simple organic ingredients.": "Мы просто создадим... новое зелье, чтобы помочь мне восстановить мою... силу.\n\nСначала добыть... простые органические ингредиенты."
"Good. Good! This will...\nsuffice. More difficult ingredients are needed...\nnext.": "Хорошо. Хорошо! Этого...\\nдостаточно. Для следующего нужны более сложные ингредиенты..."
"Rakshasa make furniture that's too uncomfortable! Can you get me a decent stool? One of those nice meditation stools should do. I need something I can sit on for hours at a time.": "Ракшасы делают слишком неудобную мебель! Можешь достать мне нормальный табурет? Подойдёт один из тех удобных табуретов для медитации. Мне нужно что-то, на чём можно сидеть часами подряд."
"Hmm... not as nice as I expected. If I wear my kilt I'll get splinters! But thanks, I'll try using it with my robes. Here, you can have my old kilt if you like.": "Хмм... не так красиво, как я ожидал. Если я надену килт, у меня будут занозы! Но спасибо, я попробую использовать его с моими одеяниями. Вот, можешь взять мой старый килт, если хочешь."
"Hey, thanks for teaching me that little ratkin-skeleton trick! It's not as amazing as the trick I taught you... but it's still pretty good! But, um... in my excitement I forgot something. I don't have one of those summoning talismans! Can you give me yours? I'll give you a lifetime of riches for it!": "Эй, спасибо, что научили меня тому маленькому трюку с раткином-скелетом! Он не так удивителен, как трюк, которому я научил вас... но всё равно довольно хорош! Но, эм... в своём волнении я кое-что забыл. У меня нет одного из этих призывающих талисманов! Можете отдать мне свой? Я дам вам за него богатство на всю жизнь!"
"Thank you! This isn't your last talisman, is it? Oh, who cares! You can just go get another, right?\n\nHere: as promised, a lifetime's worth of riches! Well, it's a lifetime's worth if you live very, very frugally. Or die very soon.": "Спасибо! Это не твой последний талисман, правда? О, да какая разница! Ты же можешь просто взять ещё один, верно?\n\nВот: как и обещал, богатства на всю жизнь! Ну, на всю жизнь, если жить очень-очень экономно. Или умереть очень скоро."
"You know those flying monsters the ranalon have? Those 'scray'? Yeah. Well, I need a stinger from one. If you find one, bring it to me!": "Ты знаешь тех летающих монстров, которые есть у раналонов? Тех самых «скреев»? Ага. В общем, мне нужно жало одного из них. Если найдёшь, принеси его мне!"
"Good, the hollow tube is still intact. Oh, no no no, I would never poison anybody! I'm going to use it as a drip-tube for water. For... um, for a project. Yes.\n\nHere, let me show you some calligraphy tips. This trick will really make your writing beautiful!": "Хорошо, полая трубка всё ещё цела. О, нет-нет-нет, я бы никогда никого не отравил! Я собираюсь использовать её как капельницу для воды. Для... эм, для проекта. Да.\n\nВот, позволь показать тебе несколько советов по каллиграфии. Этот приём действительно сделает твоё письмо красивым!"
"Pst... a little bird told me the most exciting rumor: there's some weird kind of skeletons in a cave under Rahu... and they're easily controllable by necromancers! I bet they're the restless undead from that rakkie war! Those rakkies could supposedly shapeshift... imagine a shapeshifting skeleton! Orrrr... they say there were dragons during the war... imagine a dragon skeleton at our command!\n\nWell, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!": "Псс... маленькая птичка рассказала мне самый захватывающий слух: в пещере под Раху есть какие-то странные скелеты... и ими легко управляют некроманты! Бьюсь об заклад, это беспокойные нежити с той раккийской войны! Говорят, те ракки могли менять облик... представь себе скелета, меняющего форму! Или... говорят, во время войны были драконы... представь себе драконьего скелета под нашим командованием!\n\nНу, мне всё равно, что это на самом деле... я должен увидеть одного! Если найдёшь — покажи мне. Пообещай!"
"That skeleton is... AMAZING! What is it? A rat-man? Look at that hat! Did you put that hat on him?! Nevermind that... you must teach me how to raise one. I command you!\n\nPlease? Here! Do you want money? No, no, of course not. You want power! Very well. In exchange for your secret, I will teach you my best secret ritual!\n\n<i>[New Hangout Available]</i>": "Этот скелет... ПОТРЯСАЮЩИЙ! Что это? Крысолюд? Посмотри на эту шляпу! Ты надел на него эту шляпу?! Неважно... ты должен научить меня, как поднять такого. Приказываю тебе!\n\nПожалуйста? Вот! Хочешь денег? Нет, нет, конечно нет. Тебе нужна сила! Очень хорошо. В обмен на твой секрет я научу тебя своему лучшему тайному ритуалу!\n\n<i>[Доступно новое место для встреч]</i>"
"Hey, so I just used that Crossing Oil you got me. I was making Curse Arrows. But I got it on my hands, and now my fingers are erupting in puss-filled blisters. Uh? Do you have the antidote? Uncross me!": "Эй, я только что использовал то Пересекающее масло, что ты мне дал. Я делал Проклятые стрелы. Но масло попало на руки, и теперь на пальцах появились гнойные волдыри. Э-э? У тебя есть противоядие? Сними с меня проклятие!"
"This is it? Thanks! <i>Elahil pours the Uncrossing Oil on his hands.</i> It burns!\n\n<b>It burnnnssss!</b> Oh Belrath ready your White Halls, I'm dying... I'm... oh, it stopped. Hey, I'm all good. Thanks! That was scary. I'm gonna skip Curse Arrows.": "Это оно? Спасибо! <i>Элахил выливает масло Развязывания на руки.</i> Жжёт!\n\n<b>Оно жжжжёт!</b> О, Белрат, приготовь свои Белые Залы, я умираю... я... о, прекратилось. Эй, со мной всё в порядке. Спасибо! Было страшно. Я пропущу Проклятые Стрелы."
"Do you recall those rune charts you found for me? Well, I've studied them a little bit, and now I wish to try to make my own. I just need something to guide my hand. You wouldn't happen to have any ancient magical stencils, by any chance? Well, keep an eye out for one! I've got a fat sack of coins burning a hole in my dress.": "Помнишь те рунические таблицы, что ты нашёл для меня? Я немного их изучил и теперь хочу попробовать сделать свои собственные. Мне просто нужна вещь, чтобы направлять мою руку. Случайно не найдётся у тебя каких-нибудь древних магических трафаретов? В любом случае, держи глаза открыты! У меня в платье горит мешок с монетами."
"Ah, this will do. I should be able to reproduce these rune charts myself now, thank you. I shall let you know what I discover!": "Ах, это подойдёт. Теперь я смогу самостоятельно воспроизвести эти рунические таблицы, спасибо. Я сообщу тебе, что обнаружу!"
"I went hunting with the bow you helped me repair! And it sucks. It's frankly unusable. It turns out the only reason it worked before was due to all the magic, because normal ivory doesn't bend or flex at all! I guess I let all the magic out when I replaced the ivory, and now it's junk. But not to worry! I can research the spells necessary to fix it! But that will take a while. For now, I need a substitute.\n\nI've always hunted with a bow I made myself, even back when I was a child. I'm not going to just use some store-bought bow now at age 438! Can you get me some really perfect cedar wood for a temporary bow?": "Я ходил на охоту с луком, который ты помог мне починить! И он ужасен. Честно говоря, он непригоден к использованию. Оказывается, единственная причина, почему он работал раньше, была вся эта магия, потому что обычная слоновая кость совсем не гнётся и не сгибается! Похоже, я выпустил всю магию, когда заменил слоновую кость, и теперь это хлам. Но не волнуйся! Я могу изучить заклинания, необходимые для его починки! Но это займёт время. А пока мне нужен заменитель.\n\nЯ всегда охотился с луком, который сделал сам, даже когда был ребёнком. Я не собираюсь просто так использовать какой-то магазинный лук в свои 438 лет! Можешь ли ты достать мне действительно идеальную кедровую древесину для временного лука?"
"Good. This is good. I'll make a new bow the same way I did as a young elf. I still have some cat gut left, so this is all I should need. You've been a great help!\n\nI wanted you to have this. I made it from the ivory I replaced on my bow. I know it's not much, but if you don't need it, maybe someone who loves ivory would appreciate it.": "Хорошо. Это хорошо. Я сделаю новый лук так же, как делал в молодости эльфом. У меня ещё осталась кошачья кишка, так что этого должно хватить. Ты очень помог!\n\nЯ хотел, чтобы у тебя это было. Я сделал это из слоновой кости, которую заменил на своём луке. Знаю, это не много, но если тебе не нужно, возможно, кто-то, кто любит слоновую кость, оценит это."
"The gear you found fits perfectly! These gears must be mass-produced by the dwarves! That's pretty amazing, right?\n\nBut that repair didn't make it go. I think I found the problem: the primary timing system is just... gone! It must have gotten lost or stolen. I've studied the similar ones in the auxiliary system, and I think if I had a dwarven weight like this one, I could rig something up with some string. Maybe? Worth a try.": "Шестерёнка, которую ты нашёл, подходит идеально! Эти шестерёнки, должно быть, массово производят гномы! Это довольно удивительно, правда?\n\nНо этот ремонт не запустил механизм. Думаю, я нашёл проблему: основная система синхронизации просто... пропала! Наверное, её потеряли или украли. Я изучил похожие в вспомогательной системе и думаю, что если бы у меня был гномий груз, как этот, я мог бы соорудить что-то с помощью ниток. Может быть? Стоит попробовать."
"This is it! Very nice work. Let me see if this fixes it...\n\nHmm, nothing. Can you smack that box over there? There! The main system is on! ... Damn. It shut off again. Well, we almost had it!": "Вот оно! Отличная работа. Дай-ка посмотрю, исправит ли это...\n\nХмм, ничего. Можешь стукнуть по той коробке там? Вот! Главная система включилась! ... Чёрт. Снова выключилась. Ну, мы почти справились!"
"The orcs even stole my guest chair. It was pretty great, too. I wish I could find a replacement! The trouble is that I must know the chair's provenance. I won't support goblin slave labor!": "Орки даже украли мой гостевой стул. Он был действительно отличным. Хотелось бы найти ему замену! Проблема в том, что я должна знать происхождение стула. Я не стану поддерживать рабский труд гоблинов!"
"This looks quite comfortable. It should be perfect for my guest chair! And I can tell by your hands that you made this yourself. Thank you.": "Это выглядит очень удобно. Оно должно подойти для моего гостевого кресла! И по твоим рукам видно, что ты сделал это сам. Спасибо."
"I wish I had a great new chair...": "Хотелось бы мне новый отличный стул..."
"I used to have a beautiful little table where I could leave my paintings to dry. Do you want to know a secret? It was actually a repurposed calligraphy table! I would buy a replacement in an instant, as long as I was confident it wasn't made by goblin slave-labor.": "Раньше у меня был красивый маленький столик, на котором я могла оставлять свои картины сохнуть. Хочешь узнать секрет? На самом деле это был переделанный стол для каллиграфии! Я бы мгновенно купила ему замену, если бы была уверена, что она не сделана рабским трудом гоблинов."
"This will fit my needs perfectly! And it's locally crafted! Perfect!": "Это идеально подойдёт для моих нужд! И сделано местными мастерами! Отлично!"
"I wish I had a great calligraphy bench...": "Хотелось бы мне иметь отличный стол для каллиграфии..."
"I used to have a great little meditation stool which I used while working in my garden. The orcs stole it, of course. I would pay well for a replacement... but only if I know the crafter. I don't want to accidentally support slave labor!": "Раньше у меня был отличный маленький табурет для медитации, которым я пользовался, работая в своём саду. Орки, конечно же, украли его. Я хорошо заплачу за замену... но только если буду знать мастера. Я не хочу случайно поддерживать рабский труд!"
"Thank you for making it to my specifications, this is great!": "Спасибо, что выполнил всё по моим требованиям, это замечательно!"
"I wish I had a great meditation stool...": "Хотелось бы мне отличный табурет для медитации..."
"Back before the orc attacks, my home was beautiful. Even my storage chests were beautiful pieces of art! They sell similar chests in Rahu, but I know those are made by goblin-owned slaves. I need to know my furniture is made by someone free!": "До нападений орков мой дом был прекрасен. Даже мои сундуки для хранения были настоящими произведениями искусства! В Раху продают похожие сундуки, но я знаю, что их делают рабы, принадлежащие гоблинам. Мне нужно быть уверенным, что моя мебель сделана свободными людьми!"
"This is perhaps even better than my old storage system! Thank you for making this for me!": "Это, возможно, даже лучше моей старой системы хранения! Спасибо, что сделали это для меня!"
"I wish I had a great new storage crate...": "Хотелось бы мне новый отличный ящик для хранения..."
"I've used Khyrulek's journal to map a way into one of the vampire safehouses beneath Statehelm. There's a working entrance in... Vidaria! It's in the old Woodburr Farm common building. Look for a... windmill... nearby. Once you find the Tuvillic Rune, you should be able to... defeat the guardian... and enter the safehouse.\n\nOnce inside, search for these items -- I will write them down for you. You may keep anything else you find.": "Я использовал журнал Хирулека, чтобы наметить путь в одно из убежищ вампиров под Стейтхелмом. Рабочий вход находится в... Видарии! Он в старом общественном здании фермы Вудбурр. Ищи... ветряную мельницу... поблизости. Как только найдёшь руну Тувиллик, ты сможешь... победить стража... и войти в убежище.\n\nОказавшись внутри, ищи эти предметы — я запишу их для тебя. Всё остальное, что найдёшь, можешь оставить себе."
"You snuck in without incident? Good. I can smell Shadowslip's rotten innards. I always hated him. Never had anything nice to say. There are many more safehouses underneath Statehelm, and I am working on finding ways into them. But for now, I have what I need!\n\nAs a reward, I shall teach you one of the... secrets... of the vampire. Be grateful, for it is quite... powerful.": "Ты пробрался без происшествий? Хорошо. Я чувствую запах гнилых внутренностей Шедоуслипа. Я всегда его ненавидел. Никогда не говорил о нём ничего хорошего. Под Стейтхелмом есть ещё много тайников, и я работаю над тем, чтобы найти к ним доступ. Но пока у меня есть всё, что нужно!\\n\\nВ награду я научу тебя одному из... секретов... вампира. Будь благодарен, ведь это довольно... мощно."
"While you're invading, would you mind exterminating those pesky birds on the main deck? Lieutenant Frostglimmer insists they're trained alarm birds that will prevent intruders from sneaking around. But they make so much noise that most of us just ignore them...": "Пока вы вторгаетесь, не могли бы избавиться от этих надоедливых птиц на главной палубе? Лейтенант Фростглиммер утверждает, что это обученные сигнальные птицы, которые не дадут нарушителям незаметно пробраться. Но они так шумят, что большинство из нас просто игнорирует их..."
"The cocks are gone? Maybe we can get some peace and quiet now... Or maybe the hippogriffs will just get louder without competition. We'll see!\n\nHey, want to know something new? Stand still. Did it take? You didn't die, so I think it must have worked! Haha! You've stolen our technology now! Some day you may even have use for that knowledge.": "Петухи исчезли? Может, теперь мы наконец-то получим покой и тишину... А может, гиппогрифы просто станут громче без конкурентов. Посмотрим!\n\nЭй, хочешь узнать кое-что новое? Стоять на месте. Сработало? Ты не умер, значит, должно быть, получилось! Ха-ха! Теперь ты украл нашу технологию! Когда-нибудь тебе может пригодиться это знание."
"Thank you for your delivery!": "Спасибо за доставку!"
"Here's the recipe from Gozzaroon. Make one of these, find the stone slab in the ocean, and use the beacon there. Then watch out! Ranalon will come from everywhere.\n\nKill a bunch of them to stop their progress.\n\nI suppose you could do this on your own, but were I you, I would gather some backup before attacking an army.": "Вот рецепт от Гоззаруна. Сделай одну из этих свечей, найди каменную плиту в океане и используй там маяк. А потом будь осторожен! Раналоны придут отовсюду.\n\nУбей много из них, чтобы остановить их продвижение.\n\nПолагаю, ты мог бы сделать это один, но на твоём месте я бы собрал подкрепление перед атакой на армию."
"I saw you firsthand! Very brave stuff. You've put a damper on the Ranalon plans, and helped protect Statehelm.": "Я видел тебя своими глазами! Очень смело. Ты помешал планам Раналона и помог защитить Стейтхелм."
"Thanks! I'll make sure it gets to Statehelm. Here's your coin!": "Спасибо! Я прослежу, чтобы это дошло до Стейтхелма. Вот твоя монета!"
"I wish I could help Tryaka recover from the invasion. She has seemed distant. Even... I don't dare say it to her face... a bit afraid. I need to bring her mind back to practical matters! If I had some agates, I could convince her to return to jewelrycrafting.": "Хотел бы я помочь Трияке оправиться после вторжения. В последнее время она кажется отстранённой. Даже... я не осмелюсь сказать ей это в лицо... немного напуганной. Мне нужно вернуть её мысли к практическим делам! Если бы у меня были агаты, я смог бы убедить её вернуться к ювелирному делу."
"These agates are lovely. Did you mine these yourself? I hope that Tryaka likes them!": "Эти агаты прекрасны. Ты сам их добывал? Надеюсь, Тряка их понравятся!"
"If I had some agates, I think I could convince Tryaka to making jewelry again. It would be a good distraction for her.": "Если бы у меня были агаты, я думаю, я смог бы убедить Тряку снова заняться изготовлением украшений. Это было бы для неё хорошим отвлечением."
"Basilisks are mortals, and yet some of their number have partnered with the Winter Queen -- a queen who has vowed to freeze all mortal life to death. In exchange for their treachery, these basilisks are given resistance to cold and increased strength. Show them that their strength is not limitless.": "Василиски смертны, и всё же некоторые из них заключили союз с Зимней королевой — королевой, поклявшейся заморозить до смерти всю смертную жизнь. В обмен на своё предательство эти василиски получили сопротивление холоду и увеличенную силу. Покажите им, что их сила не безгранична."
"It is unfortunate when mortals become pawns in fairy politics. Unfortunate for the pawns, of course, but also for us. Mortals' behavior is hard for us to predict. It appears the best approach may be to use other mortals.": "Жаль, когда смертные становятся пешками в политике фей. Жаль, конечно, пешек, но и нам тоже. Поведение смертных трудно предсказать. Похоже, лучший подход — использовать других смертных."
"The so-called 'firebird mountain' south of here is home to an irritating phoenix population, which terrify my subjects, but at least they don't typically hunt trolls for food! Droaches, unfortunately, do. Please head to 'Firebird Mountain' and eliminate the fire droach threat.": "Так называемая «гора огненной птицы» к югу отсюда служит домом для раздражающего населения фениксов, которые пугают моих подданных, но по крайней мере обычно не охотятся на троллей ради пищи! К сожалению, дроучи охотятся. Пожалуйста, отправляйтесь на «Гору огненной птицы» и устраните угрозу огненных дроучей."
"Excellent work. Of course, more droach eggs will hatch in time, but we cannot expect to win the war in a day. You have won a battle and that will suffice.": "Отличная работа. Конечно, со временем вылупятся новые яйца дроачей, но нельзя ожидать выиграть войну за один день. Ты выиграл битву, и этого достаточно."
"I've tried indirect methods of dealing with the phoenix issue, but the threat grows ever hotter. My subjects have even given a name to the birds' stolen home: 'firebird mountain.' It is not a comforting name to fire-averse trolls. Please resolve this issue by removing the phoenices.": "Я пытался решить проблему с фениксами косвенными методами, но угроза становится всё серьёзнее. Мои подданные даже дали украденному птицами дому название: «гора огненных птиц». Это название не приносит утешения троллям, боящимся огня. Пожалуйста, решите эту проблему, убрав фениксов."
"You did well, but the phoenices are already beginning to reappear! They must somehow be bound here, to my domain! That is entirely unacceptable! Hmm. Begone now, please. I am uncertain as to where to direct my wrath.": "Ты справился хорошо, но фениксы уже начинают появляться снова! Они должны быть как-то связаны с этим местом, с моей территорией! Это совершенно недопустимо! Хм. Уходи сейчас, пожалуйста. Я не уверен, куда направить свой гнев."
"There has been a recent influx of pixies, and along with them come many typical creatures. The worst of these is the so-called shocking droach, a cowardly creature that roams in packs causing chaos. We have enough chaos right now; please remove this excess.": "В последнее время наблюдается наплыв пикси, а вместе с ними приходит множество типичных существ. Худшие из них — так называемые шокирующие дрочи, трусливые твари, которые бродят стаями, сея хаос. Хаоса у нас сейчас и так достаточно; пожалуйста, избавьтесь от этого излишка."
"The sparking droaches are neutralized? Very good! The next wave of my children will arrive in less than a year, and they would have been easy prey to these foul ambushers. You have served trollkind well.": "Искрящиеся дроачи нейтрализованы? Очень хорошо! Следующая волна моих детей прибудет менее чем через год, и они были бы лёгкой добычей для этих отвратительных засады. Ты хорошо послужил троллям."
"I do not give commandments to my children. Trolls can form alliances with anyone they want! But that doesn't mean I will stand idly by when a pack of potent war-trolls comes here and starts wreaking havoc! These winter trolls are extremely powerful and need to be stopped. Remember: I only want you to kill the giant blue trolls, not the green ones.": "Я не даю заповедей своим детям. Тролли могут заключать союзы с кем угодно! Но это не значит, что я буду стоять в стороне, когда сюда приходит стая могучих боевых троллей и начинает сеять хаос! Эти зимние тролли чрезвычайно сильны и их нужно остановить. Помни: я хочу, чтобы ты убивал только гигантских синих троллей, а не зелёных."
"It is never a happy day when I must order trolls killed. But... well, they WILL come back in a few years. It's still cruel, though. But you did as requested, and I am sufficiently pleased!": "Никогда не бывает радостным днём, когда приходится приказывать убить троллей. Но... они всё равно вернутся через несколько лет. Всё равно это жестоко. Но ты выполнил просьбу, и я вполне доволен!"
"I know you understand the basics of alchemy, but you'll need to understand more than just the basics before I can teach you with a clean conscience. I need to know that you can safely handle dangerous substances, can source exotic ingredients, and can make a palatable potion. I'll teach you an alchemical formula, you make it and bring it to me. I drink it. Easy as that.": "Я знаю, что вы понимаете основы алхимии, но вам нужно знать больше, чем просто основы, прежде чем я смогу учить вас с чистой совестью. Мне нужно быть уверенным, что вы умеете безопасно обращаться с опасными веществами, можете добывать экзотические ингредиенты и способны приготовить сносное зелье. Я научу вас алхимической формуле, вы приготовите её и принесёте мне. Я выпью. Вот и всё."
"This is your result? Well, it's chunkier than I would prefer... And perhaps a bit too warm. But I'll drink it.\n\n...\n\nWell, I can feel the heat in my innards, and I didn't die. So you pass.": "Это твой результат? Ну, он более густой, чем я бы предпочёл... И, возможно, немного слишком тёплый. Но я выпью.\n\n...\n\nЧто ж, я чувствую тепло внутри, и я не умер. Значит, ты проходишь."
"Make me a Latent Warmth Potion. If I like the results, I'll be willing to train you.\n\nNot for cheap, mind -- my lessons are exorbitant by human standards. Which is not my concern.": "Сделай для меня зелье скрытого тепла. Если мне понравится результат, я соглашусь тебя обучать.\n\nНо не бесплатно — мои уроки стоят баснословно по человеческим меркам. Что меня не волнует."
"I have a special book order for alchemy tutorials. I have some of the needed books, but here are the ones I don't have copies of. Can you look for them? I'll pay well.": "У меня есть особый заказ на книги с уроками по алхимии. Некоторые из нужных книг у меня уже есть, но вот этих копий нет. Не мог бы ты поискать их? Я хорошо заплачу."
"The alchemy books! These are decently legible copies, too. I'll ship these off right away. Here's your payment.": "Книги по алхимии! Это довольно разборчивые копии. Я сразу же отправлю их. Вот твоя оплата."
"I could use your assistance! I hear there is an orcish potion that can enhance your combat readiness.  Could you get me 10 of those Gur-Hortas? I need to reverse engineer them so I can make them for the whole group.\n\n": "Мне бы пригодилась твоя помощь! Я слышал, есть орочье зелье, которое может повысить твою боевую готовность. Не мог бы ты принести мне 10 таких Гур-Хорт? Мне нужно разобрать их состав, чтобы я мог делать их для всей группы."
"Awesome! This will keep the group more able for combat when needed! Thank you!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это поможет группе быть более боеспособной в нужный момент! Спасибо!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I could use your assistance! I hear there is a speed potion that a lot of folks craft around here to get around easier. Could you get me 10 of those Agonizing Speed Potions? I need to reverse engineer them so I can make them for the whole group.\n\n": "Мне бы пригодилась твоя помощь! Я слышал, что здесь многие делают зелье скорости, чтобы легче передвигаться. Не мог бы ты принести мне 10 таких Мучительных зелий скорости? Мне нужно разобрать их состав, чтобы я мог делать их для всей группы."
"Awesome! This will definitely put the hop in everyone's step! Thank you!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это точно добавит бодрости каждому! Спасибо!\n\n<i>[Вы получаете 10 расположения у Оррана, вождя каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I'm gonna go out collecting minerals soon. But on the way I'm gonna visit a ... friend. And when I do that, I'm gonna need a lot of fish. Don't ask why. It's hard to explain. But if you have some handy, I'd appreciate your help!": "Я скоро отправлюсь собирать минералы. Но по пути собираюсь навестить... друга. И когда я это сделаю, мне понадобится много рыбы. Не спрашивай почему — это сложно объяснить. Но если у тебя есть рыба под рукой, я был бы признателен за помощь!"
"Wow. Ned'll love this. Thank you so much! Here, let me give you some pointers on surveying.": "Вау. Неду это понравится. Большое спасибо! Позволь, я дам тебе несколько советов по разведке."
"Thank you for fulfilling the work order. I'll make sure it goes out in the correct teleport delivery.": "Спасибо за выполнение заказа. Я прослежу, чтобы он был отправлен через правильную телепорт-доставку."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>amazing armor patch kits</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие наборы для починки брони</b>. Ты можешь сделать их для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Excellent craftsmanship! I'll buy these!": "Отличное мастерство! Я куплю это!"
"If you're a tool artisan, I'd love to purchase some new amazing armor patch kits from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых удивительных наборов для ремонта брони."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>amazing armor stakes</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие костыли для брони</b>. Ты можешь сделать их для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new amazing armor stakes from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых удивительных колышков для брони."
"Great. Thanks. Now please get off the docks. I'm expecting a big ship to come in any minute.": "Отлично. Спасибо. Теперь, пожалуйста, покинь причалы. Я жду прибытия большого корабля в любую минуту."
"Very nice work! Here's your payment. Now go fill more of my orders!": "Отличная работа! Вот твоя награда. Теперь иди и выполни больше моих заказов!"
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"Excellent work. You may have saved lives today.\n\nCome back tomorrow because we'll no doubt need something else!": "Отличная работа. Возможно, сегодня ты спас жизни.\n\nВозвращайся завтра — нам наверняка понадобится что-то ещё!"
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы с зазубринами. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие длинные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы из Резервуара. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы-ловушки. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"I need to ask for your help. I am quite addicted to cranium powder. The powder you brought me was so wondrous, so efficacious, that I quickly completed my backlog. But then more orders came pouring in, and I needed more of the powder. I found a nefarious rakshasa merchant who sold me more -- at ridiculously high prices! -- but now I need even more... and I realize that I have been a fool. Please, before this gets even worse, can you help me break this cycle? My contact claims that the only way to cure this headache is more cranium powder, but I know there must be a balm or ointment that can sooth my brow until I can feel normal again.": "Мне нужна твоя помощь. Я сильно подсел на порошок из черепа. Порошок, который ты мне принес, был настолько чудесным и эффективным, что я быстро выполнил все накопившиеся заказы. Но потом поступило ещё больше заказов, и мне понадобилось больше порошка. Я нашёл коварного раксашского торговца, который продал мне его — по безумно высоким ценам! — но теперь мне нужно ещё больше... и я понимаю, что был дураком. Пожалуйста, прежде чем всё станет ещё хуже, помоги мне разорвать этот круг. Мой контакт утверждает, что единственный способ вылечить эту головную боль — это ещё порошка из черепа, но я знаю, что должен быть бальзам или мазь, которые могут успокоить мой лоб, пока я не почувствую себя нормально снова."
"Is this it? Thank you! Oh, thank you so much. I can already feel it working... I can think straight! You've been a good friend. Here, let me give you something in return.": "Это оно? Спасибо! О, большое спасибо. Я уже чувствую, как это действует... Я могу ясно мыслить! Ты был хорошим другом. Вот, позволь дать тебе что-то взамен."
"No matter how much I work, I cannot seem to stop being overwhelmed by work requests. Perhaps a different approach is needed. A visiting elf once invited me to a \"dance party\" which ended up having very little music and a lot more nakedness than I was expecting. But the highlight of the evening was a powder he brought with him, called 'Enhanced Cranium Powder'. Perhaps if I had some of this... I could finish this work more efficiently! Do you know how to get some?": "Как бы много я ни работал, меня всё равно заваливают просьбами о помощи. Возможно, нужен другой подход. Однажды ко мне приезжал эльф и пригласил на «танцевальную вечеринку», где музыки было мало, а наготы гораздо больше, чем я ожидал. Но изюминкой вечера был порошок, который он привёз с собой, называемый «Улучшенный черепной порошок». Может, если бы у меня был такой... я мог бы работать эффективнее! Ты знаешь, как его достать?"
"This is the powder! I admit to being nervous. What if it works so well that I never want to stop using it? I shall become addicted to it, and all my effort will crumble! Ah, but I'm sure I'm worrying too much. I just need to complete these work orders. And your gift will let me do so. Thank you so much.": "Это та самая пудра! Признаюсь, я нервничаю. А что если она сработает так хорошо, что я никогда не захочу переставать её использовать? Я стану зависимым от неё, и все мои усилия рухнут! Ах, но я уверен, что слишком много волнуюсь. Мне просто нужно выполнить эти заказы. А твой подарок позволит мне это сделать. Большое спасибо."
"My tools are only as good as the materials they're made of. This metal is \"good\", but it's not great. I need masterwork metal! Do you know any miners who might have some?": "Мои инструменты хороши ровно настолько, насколько хорош материал, из которого они сделаны. Этот металл «хорош», но не отличный. Мне нужен мастеровой металл! Ты знаешь каких-нибудь шахтёров, у которых он может быть?"
"With this metal I shall be able to finish the order of tack hammers for that fool Ufkar. Your aid is much appreciated.": "С этим металлом я смогу закончить заказ на такк-молоты для того дурака Уфкара. Твоя помощь очень ценна."
"I have a new idea for my fall line up! But I need something really crass to push it over the top. I know just the thing. Can you get me a really high-quality rat pelt? It'll make an amazingly awful hat.": "У меня есть новая идея для осенней коллекции! Но мне нужно что-то действительно грубое, чтобы довести её до совершенства. Я знаю, что именно нужно. Можешь достать мне действительно качественный крысиный мех? Из него получится удивительно ужасная шляпа."
"Perfect! I'm not sure how this will become a hat just yet, but I'll think of something. Here, take this failed experiment.": "Отлично! Пока не совсем понимаю, как из этого получится шляпа, но я что-нибудь придумаю. Вот, возьми этот неудавшийся эксперимент."
"I owe you an apology. When you asked if I would collaborate with that orc on technology, I lost my temper. Hrmph. I actually <i>do</i> quite enjoy tinkering, and mining, and all the other stereotypical dwarven activities. I just hate when others presume that about me.\n\nPlease, return to your orcish friend and tell them I am willing to collaborate.": "Я должен извиниться перед тобой. Когда ты спросил, буду ли я сотрудничать с тем орком по технологиям, я потерял самообладание. Хм. На самом деле я <i>действительно</i> люблю возиться с механизмами, заниматься добычей и всеми другими стереотипными гномьими делами. Просто ненавижу, когда другие делают такие предположения обо мне.\\n\\nПожалуйста, вернись к своему орочьему другу и скажи ему, что я готов к сотрудничеству."
"Great. I will take a look at whatever they send over. It's the least I can do after my outburst.": "Отлично. Я посмотрю, что они пришлют. Это минимум, что я могу сделать после своей вспышки."
"Oh. Oh! <i>That</i> dwarf! This is wonderful news. I will prepare some collaboration materials immediately. You wouldn't mind translating them for me, would you? Well nevermind, we can cross that bridge when we arrive at it, so to speak.": "О. О! <i>Этот</i> гном! Это замечательная новость. Я немедленно подготовлю материалы для сотрудничества. Ты не против перевести их для меня, правда? Ну да ладно, об этом мы позаботимся, когда дойдём до этого, так сказать."
"I'm not a huge calligraphy nut, but I used to practice every now and then. If I still had my amazing calligraphy bench, I might start again!\n\nHowever, I have to personally meet the craftsman to ensure that I'm not buying furniture made by slaves. Goblin slavers have flooded the market with that stuff, and I will have no part of it!": "Я не большой фанат каллиграфии, но раньше иногда занимался этим. Если бы у меня всё ещё был мой потрясающий стол для каллиграфии, я мог бы начать снова!\\n\\nОднако я должен лично встретиться с ремесленником, чтобы убедиться, что не покупаю мебель, сделанную рабами. Гоблинские работорговцы заполонили рынок такими вещами, и я не хочу иметь с этим ничего общего!"
"Ah, this is amazing quality! And you made it yourself? Can I see your maker's mark? Yes. You are my hero!": "Ах, это потрясающее качество! И ты сделал это сам? Можно увидеть твою клеймо мастера? Да. Ты мой герой!"
"I wish I had an amazing calligraphy bench...": "Хотелось бы мне иметь потрясающий стол для каллиграфии..."
"All my beautiful furniture was destroyed by invaders. Perhaps the most tragic was the loss of my amazing chair. It was hand-crafted by my favorite carpenter! Some day I hope to have a new one that's just as good.": "Вся моя прекрасная мебель была уничтожена захватчиками. Пожалуй, самой трагичной была потеря моего удивительного стула. Его вручную изготовил мой любимый плотник! Надеюсь, однажды у меня появится новый, такой же хороший."
"Wow, amazing! And you made this? Yourself? Oh, that's perfect, I'll take it!": "Вау, потрясающе! И ты сделал это? Сам? О, это идеально, я беру!"
"I wish I had an amazing new chair...": "Хотелось бы мне иметь потрясающий новый стул..."
"All of my cleaning tools were stolen by the orcs. Even my trusty cleaning stick! I used to use it to get items off of the roof, disgorge gutters and drains, and poke seeds into the dirt! It was an amazingly versatile stick. I saw a perfect replacement in Rahu, but they couldn't guarantee that it wasn't made by slave labor. So I had to keep searching...": "Все мои инструменты для уборки украли орки. Даже мою верную палку для уборки! Раньше я использовала её, чтобы снимать вещи с крыши, прочищать водостоки и стоки, и тыкать семена в землю! Это была удивительно универсальная палка. Я видела идеальную замену в Раху, но там не могли гарантировать, что она не сделана рабским трудом. Поэтому мне пришлось продолжать поиски..."
"These are good quality. And I see you've left your mark on them. I trust you, so I trust your wares. Thank you.": "Это хорошее качество. И я вижу, что ты оставил на них свой знак. Я тебе доверяю, значит доверяю и твоим товарам. Спасибо."
"I wish I had an amazing cleaning staff...": "Хотелось бы мне иметь потрясающий уборочный персонал..."
"The orcs destroyed all my beautiful furniture when they attacked Povus. I miss my meditation stool so badly! It was amazing! I would love to have a new one, but the furniture sold in Rahu is made by goblin slave-labor. Many in Rahu turn a blind eye to slavery, but I won't! My furniture has to be made by a crafter I know!": "Орки уничтожили всю мою прекрасную мебель, когда напали на Повус. Мне так не хватает моего табурета для медитации! Он был потрясающим! Я бы с радостью обзавелась новым, но мебель, которую продают в Раху, сделана рабским трудом гоблинов. Многие в Раху закрывают глаза на рабство, но не я! Моя мебель должна быть сделана ремесленником, которого я знаю!"
"This is wonderful! And I see you've left your crafter's mark on it. I am delighted!": "Это замечательно! И я вижу, что ты оставил на этом свою клеймо мастера. Я в восторге!"
"I wish I had an amazing meditation stool...": "Хотелось бы мне иметь потрясающий табурет для медитации..."
"Okay. So these are the ingredients I need for the genital transmogrification potion. Bring these to me and I'll brew it up!": "Хорошо. Вот ингредиенты, которые мне нужны для зелья трансмогрификации гениталий. Принеси их мне, и я его сварю!"
"Perfect! I'll brew it up right now.\n\nAnd stop worrying! This is a good plan!\n\nJust one sec...": "Отлично! Я сейчас же его сварю.\\n\\nИ перестань волноваться! Это хороший план!\\n\\nСекундочку..."
"Here! Take this dreadful-smelling potion and tell Ormond that it will restructure his genitals, and it's the only way to ever be with me. When he refuses, tell him that you understand. Then come back and tell me how it went!": "Вот! Возьми это ужасно пахнущее зелье и скажи Ормонду, что оно перестроит его гениталии, и это единственный способ быть со мной. Когда он откажется, скажи, что понимаешь. Потом вернись и расскажи мне, как всё прошло!"
"He DRANK IT?! You were supposed to keep it out of his reach! What the fuck did you do?! You made this so much worse!": "Он ВЫПИЛ ЭТО?! Ты должен был держать это вне его досягаемости! Что, чёрт возьми, ты натворил?! Ты только всё усугубил!"
"What's this?\n\nOh, I see. Anaberyl put you up to this, didn't she? Give that to me.\n\n[<i>Ormond snatches the potion and drinks it down.</i>]\n\nIt's working... It's... Wait, it's changing my... Oh my. I thought it would just shrink my... uh, I should have asked for the fine print on this potion, eh? Ha ha!\n\nHah.\n\nListen, tell Anaberyl i drank it down without hesitation, okay? I know fairies have their bizarre mating rituals, and... I think she's worth it. Now if you'll excuse me, I'm going to go freak out.": "Что это?\\n\\nА, понятно. Анабэрил тебя на это подговорила, да? Дай сюда.\\n\\n[<i>Ормонд хватает зелье и выпивает его залпом.</i>]\\n\\nЭто действует... Это... Подожди, оно меняет моё... О боже. Я думал, оно просто уменьшит мой... эээ, надо было спросить мелкий шрифт на этом зелье, да? Ха-ха!\\n\\nХа.\\n\\nСлушай, скажи Анабэрил, что я выпил его без колебаний, хорошо? Я знаю, у фей свои странные брачные ритуалы, и... думаю, она того стоит. А теперь, если ты меня извиняешь, я пойду психовать."
"I've underestimated Ormond. And I need to apologize to him for that. So when I talk to him, I'd like to offer a gift. Can you get it for me?\n\nHis favorite flower is the desert rose. A  bouquet of them would help show my feelings.": "Я недооценила Ормонда. И мне нужно извиниться перед ним за это. Поэтому, когда я с ним поговорю, я хотела бы подарить ему подарок. Ты можешь достать его для меня?\n\nЕго любимый цветок — пустынная роза. Букет таких цветов поможет выразить мои чувства."
"These are beautiful! Well, personally I've never loved the desert rose; they're a bit weedy for my taste. But these are very nice examples of the species!\n\nI think Ormond will like it. He'll breathe in their aroma, and he'll smile.\n\nThank you. I'll present these to him tonight.": "Они прекрасны! Лично я никогда не любил пустынную розу; они мне кажутся немного сорняковыми на вкус. Но это очень хорошие образцы этого вида!\n\nДумаю, Ормонду это понравится. Он вдохнёт их аромат и улыбнётся.\n\nСпасибо. Я подарю их ему сегодня вечером."
"The spider legs you brought me were a lot of fun to study! Will you bring me some antlers from the local deer population? Be careful - some of them are rabid.": "Паучьи лапки, которые ты мне принёс, было очень интересно изучать! Не принесёшь мне рога местных оленей? Будь осторожен — некоторые из них бешеные."
"Hmm. These are just bone. I guess it's interesting that deer grow massive bones from their skulls, but it's still just bone. Oh, well. Thanks anyway!": "Хмм. Это просто кости. Интересно, что у оленей из черепов растут огромные кости, но это всё равно просто кости. Ну да ладно. Всё равно спасибо!"
"Working with physical paper is interesting. I've been reading some books about creatures in this realm. Could you bring me some spider legs to study?": "Работать с настоящей бумагой интересно. Я читала несколько книг о существах этого мира. Не мог бы ты принести мне несколько паучьих лапок для изучения?"
"Excellent! I can study these all day!": "Отлично! Я могу изучать это целый день!"
"Used anchor runes will do... as long as they aren't still attached to whatever they were anchoring! He he he": "Подойдут использованные руны якоря... если только они не прикреплены к тому, что якорили! Хе-хе-хе"
"I've done it! I've pierced the veil of your mind! You can hear me! That's great news! So long story short, I was a wizard's familiar back in the day. Now I'm just trying to raise a slug family in safety. The geyser slug is our hero -- keeps us safe from most predators. But we still have a problem. There's a huge and particularly cruel dorado swimming in here. Can you get him out? He only comes out at night. And hurry: he already ate one of my children! I have a lot more, but still.": "Я сделал это! Я пробился сквозь завесу твоего разума! Ты меня слышишь! Это отличная новость! Короче говоря, раньше я был фамильяром волшебника. Теперь я просто пытаюсь в безопасности вырастить семью слизней. Гейзерный слизень — наш герой, он защищает нас от большинства хищников. Но у нас всё ещё есть проблема. Здесь плавает огромный и особенно жестокий дорадо. Можешь выгнать его отсюда? Он выходит только ночью. И поторопись: он уже съел одного из моих детей! У меня их много, но всё равно."
"What a relief! Now I can get back to what's important: mating. Thank you!": "Какое облегчение! Теперь я могу вернуться к тому, что действительно важно: спариванию. Спасибо!"
"The Bonefish is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Костяная рыба — хитрая рыба для разделки; тебе нужно попрактиковаться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Bonefish now!": "Теперь ты умеешь ловить и чистить костяных рыб!"
"The Eagle Ray is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Орляк — хитрая рыба для разделки; тебе нужно немного потренироваться в ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Eagle Ray now!": "Ты научился ловить и чистить Орляка!"
"Grutak! Hello! Viazink? Oh, the second one works! Hello! A moon ago a ship came here. As it was offloading land-dweller junk, one of the crates fell into the sea near the beach. The crate is full of deadly poison! Fortunately, the poison is currently frozen solid. But when summer comes, it will melt, and we'll die! Save us!": "Грутак! Привет! Вязинк? О, второй работает! Привет! Лун назад сюда приплыл корабль. Пока разгружали хлам сушеных жителей, один из ящиков упал в море рядом с пляжем. Ящик полон смертельного яда! К счастью, яд сейчас замёрз. Но когда наступит лето, он растает, и мы погибнем! Спаси нас!"
"You aren't so bad for a land-dweller. I'll remember you. Here is an offering.": "Ты неплох для обитателя суши. Я запомню тебя. Вот тебе подношение."
"Welcome to my home, friend of nature. I am a sea treant and you are welcome here. But I could use your help. My homewater is overrun with ghost bass. They eat all the food, and then fade away at dawn, taking the food with them! Even worse, I am psychic and can feel their angst. These fish were maimed and tortured to death! They suffer. You must help them, and us. Please! The ghosts only come out at night.": "Добро пожаловать в мой дом, друг природы. Я морской древень, и ты здесь желанный гость. Но мне нужна твоя помощь. Мои воды захвачены призрачными окунями. Они съедают всю пищу, а на рассвете исчезают, унося с собой еду! Ещё хуже то, что я психик и чувствую их страдания. Эти рыбы были искалечены и замучены до смерти! Они страдают. Ты должен помочь им и нам. Пожалуйста! Призраки появляются только ночью."
"Thank you for removing some of the ghost fish. I hope that this helps the area to recover. My name is Spotleaf. I may call upon you again some day.": "Спасибо, что избавились от части призрачных рыб. Надеюсь, это поможет области восстановиться. Меня зовут Спотлиф. Возможно, я обращусь к тебе снова когда-нибудь."
"The Grouper is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Групер — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Grouper now!": "Теперь ты умеешь ловить и чистить групера!"
"You can hear me, can you not? Then you are more than a mere fishmonger! You've taken fish, now can you give back to the sea?\n\nPinfish have invaded this brackish water. They are outcompeting us. It's not fair; it isn't right.": "Ты меня слышишь, не так ли? Значит, ты больше, чем просто рыбак! Ты взял рыбу, теперь можешь вернуть что-то морю?\\n\\nПинфиши захватили эти солоноватые воды. Они вытесняют нас. Это несправедливо; это неправильно."
"Thank you, fisher, for helping find balance! I will teach you a way to practice your craft without taking unnecessary fish. Take what you need, but remember balance.\n\nI mean, except for those asshole pinfish! You should eat those pan-fried.": "Спасибо, рыбак, за помощь в поддержании баланса! Я научу тебя способу заниматься ремеслом, не забирая лишнюю рыбу. Бери только то, что нужно, но помни о балансе.\n\nНу, разве что этих мерзких колючек! Их лучше жарить на сковороде."
"Greetings, taker of fish. I cannot tell if you are a friend or foe of nature. If you be a friend, help make my home clean. A surface-walker dumped hundreds of bottles of rancid liquids in here, and then left. They are making fish sick.": "Приветствую, ловец рыбы. Я не могу понять, друг ты или враг природы. Если ты друг, помоги очистить мой дом. Наземный житель вылил здесь сотни бутылок с прогорклой жидкостью и ушёл. Они делают рыбу больной."
"You are an ally of nature! I was right!": "Ты союзник природы! Я был прав!"
"MY EGGS! THEY'RE EATING THEM! Starfish are eating my eggs. What are you doing, save them! Stop this madness!": "МОИ ЯЙЦА! ИХ ЕДЯТ! Морские звёзды поедают мои яйца. Что ты делаешь, спаси их! Останови это безумие!"
"Thank Enoyos! The starfish are gone! I only have a few hundred eggs left, but maybe -- just maybe -- that'll be enough.": "Благодарю Энойоса! Морские звёзды исчезли! У меня осталось всего несколько сотен яиц, но, может быть — просто может быть — этого хватит."
"The Marlin is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Марлин — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Marlin now!": "Теперь ты умеешь ловить и чистить марлина!"
"The Non-Drevan Snook is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Нон-Древанский снук — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Non-Drevan Snook now!": "Теперь ты умеешь ловить и чистить нон-древанского снука!"
"Finally! One of you orcs is psychic! Or whatever you are. Look, enough is enough. You orcs have had plenty of time to catch him. You even gave him a name! While Old Dreadtooth might just be a fish story for you, he's a HORRIBLE MONSTER for us! You have to get him out of here! Just wait until midnight when he shows up, then catch him!": "Наконец-то! Один из вас, орков, обладает психическими способностями! Или кем бы ты ни был. Слушай, с меня хватит. У вас, орков, было достаточно времени, чтобы поймать его. Вы даже дали ему имя! Для вас Старый Страшнозуб может быть просто рыбацкой байкой, а для нас он УЖАСНЫЙ МОНСТР! Ты должен выгнать его отсюда! Просто дождись полуночи, когда он появится, и поймай его!"
"I can't believe you did it! You're a better angler than the orcs that live around here! And if you promise to use it for good, I will teach you how to be even more irresistable.": "Не могу поверить, что ты это сделал! Ты лучше рыболова, чем орки, что живут здесь рядом! И если пообещаешь использовать это во благо, я научу тебя быть ещё более неотразимым."
"Can you hear me? Then you must answer my plea. I am but a humble immortal telepathic fish and I cannot save my home! There are slugs are everywhere! Please remove them!": "Ты меня слышишь? Тогда ты должен откликнуться на мою просьбу. Я всего лишь скромная бессмертная телепатическая рыба, и я не могу спасти свой дом! Повсюду слизни! Пожалуйста, избавься от них!"
"I am so relieved. Thank you so much! I will teach you something useful to your trade. Just don't use it on me.": "Я так облегчён. Большое спасибо! Я научу тебя чему-то полезному для твоего ремесла. Только не используй это на мне."
"The Radiant Muskie is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Сияющий маски — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Radiant Muskie now!": "Теперь ты умеешь ловить и чистить сияющего маски!"
"A non-ranalon! Please help!\n\nThe ranalon are mostly very kind to nature, but their scray are a problem. It's already a very crowded lake, and the scray just laid more eggs! If those eggs hatch, it will be disaster for the native lake fish. Get them out!": "Не раналон! Пожалуйста, помогите!\n\nРаналоны в основном очень добры к природе, но их скрэй — проблема. Озеро и так очень многолюдное, а скрэй только что отложили ещё яйца! Если эти яйца вылупятся, это будет катастрофа для местных озёрных рыб. Уберите их!"
"Thank you for doing your part. Here: I found it in the lake, and it doesn't belong. Take it with you.": "Спасибо, что выполнил свою часть. Вот: я нашёл это в озере, и это здесь не к месту. Возьми с собой."
"The Sorubim is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Сорубим — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Sorubim now!": "Теперь ты умеешь ловить и чистить сорубима!"
"The Striped Bass is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Полосатый окунь — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Striped Bass now!": "Теперь ты умеешь ловить и чистить полосатого окуня!"
"The Tarpon is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Тарпон — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Tarpon now!": "Теперь ты умеешь ловить и чистить тарпона!"
"This so-called Crater Gar is a very odd fish. You aren't sure how to fillet it, but if you catch a few more you'll no doubt get the hang of it.": "Так называемый кратерный гар — очень странная рыба. Ты не уверен, как её разделывать, но если поймаешь ещё несколько, без сомнения разберёшься."
"You've got the hang of catching and cleaning Crater Gar now!": "Теперь ты умеешь ловить и чистить кратерного гарра!"
"Greetings! Are you a druid? Or just psychic? I need your help either way!\n\nDruids used growth magic on the fish here, which was nice at first. But one of the local clownfish managed to get a triple dose of magic and now he's out of control! He's massive! You can catch him when he hunts -- either at dusk or dawn. Please catch him!": "Приветствую! Ты друид? Или просто экстрасенс? В любом случае мне нужна твоя помощь!\n\nДруиды использовали здесь магию роста на рыбе, что сначала было неплохо. Но один из местных клоунов получил тройную дозу магии и теперь вышел из-под контроля! Он огромен! Ты можешь поймать его, когда он охотится — либо в сумерках, либо на рассвете. Пожалуйста, поймай его!"
"You are truly kind! Here. I want you to have this land-dweller ornament. And this forbidden technique for consuming my kind.": "Ты действительно добр! Вот. Я хочу, чтобы ты взял этот орнамент наземного обитателя. И эту запретную технику по поеданию моих сородичей."
"This so-called Pyrocarp is a very odd fish. You aren't sure how to fillet it, but if you catch a few more you'll no doubt get the hang of it.": "Так называемый пирокарп — очень странная рыба. Ты не уверен, как её разделывать, но если поймаешь ещё несколько, без сомнения разберёшься."
"You've got the hang of catching and cleaning Pyrocarp now!": "Теперь ты умеешь ловить и чистить пирокарпа!"
"You are a reasonable fisher, I hope. This lake needs your help to remain a fishing paradise! A human dumped fish in this lake a season ago. One of those fish has grown into a cruel, gigantic, horrible death beast! It only comes out at night. Please get it out of here!": "Ты, надеюсь, разумный рыбак. Это озеро нуждается в твоей помощи, чтобы оставаться рыбацким раем! Человек выпустил в это озеро рыбу сезон назад. Одна из этих рыб выросла в жестокое, гигантское, ужасное существо смерти! Оно выходит только ночью. Пожалуйста, избавься от него!"
"I'm saved! I mean... the lake is saved! Thank you, fisher. By the way, I believe that evil pike would taste delicious pickled!": "Я спасён! То есть... озеро спасено! Спасибо тебе, рыбак. Кстати, я уверен, что эта злая щука была бы вкусной в маринаде!"
"They come at night! The froooooggggsss! It's just too much! As a sovereign independent psychic insect lord I demand you aid my swampy kingdom. Please? The frogs come out at dusk and they leave a while after. Come on. Do a bug a favor.": "Они приходят ночью! Лягууушккии! Это просто слишком! Как суверенный независимый психический лорд насекомых, я требую, чтобы ты помог моему болотному королевству. Пожалуйста? Лягушки выходят на закате и уходят спустя некоторое время. Давай. Сделай услугу насекомому."
"You won't regret helping me! That's an order. From a sovereign insect lord. By the way, you should really use better bait. I'll show you. Then begone!": "Ты не пожалеешь, что помог мне! Это приказ. От суверенного лорда насекомых. Кстати, тебе действительно стоит использовать лучшую приманку. Я покажу тебе. А теперь уходи!"
"Hello... Hello... Hello... Hello... Wait! It finally worked! I've been trying to reach you for a while. You gotta help us, chief! Most of my friends aren't as smart as me and they're eating toxic seaweed and dying. It just flowed in last night, and already we lost Mertie. That's what I called him. He didn't answer to the name, of course. But he was a good cod who didn't deserve to die that way.": "Привет... Привет... Привет... Привет... Подожди! Наконец-то получилось! Я уже давно пытаюсь до тебя достучаться. Ты должен помочь нам, шеф! Большинство моих друзей не такие умные, как я, и они едят ядовитые водоросли и умирают. Они появились только прошлой ночью, а мы уже потеряли Мерти. Так я его называл. Конечно, он не откликался на это имя. Но он был хорошей треской, которая не заслужила такой смерти."
"Thanks, chief. You know, I used to be a wizard's familiar until I escaped. That's how I know you'll like this! It's a better-tasting bait recipe. But, uh, you gotta promise you'll only use it to catch fish, not to EAT them, fair?": "Спасибо, начальник. Знаешь, я раньше был фамильяром волшебника, пока не сбежал. Вот почему я знаю, что тебе это понравится! Это рецепт приманки с лучшим вкусом. Но, эээ, ты должен пообещать, что будешь использовать её только для ловли рыбы, а не для ЕЁ ПОЕДАНИЯ, договорились?"
"The Triple Tail is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Тройной хвост — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Triple Tail now!": "Теперь ты умеешь ловить и чистить тройной хвост!"
"You don't seem to be an ice fairy. Can you help us? We fish are dying! The ice fairies let loose horrible unnatural fish in the lake. They're making things cold! Please remove them.": "Ты, похоже, не ледяная фея. Можешь нам помочь? Мы, рыбы, умираем! Ледяные феи выпустили в озеро ужасных неестественных рыб. Они делают воду холодной! Пожалуйста, избавься от них."
"Thank you. Our eggs wouldn't have survived in that colder water! By the way, I noticed your bait is very unappetizing to fish. Let me teach you a better recipe.": "Спасибо. Наши икринки не выжили бы в этой холодной воде! Кстати, я заметил, что твоя наживка совсем не привлекательна для рыбы. Позволь научить тебя лучшему рецепту."
"The Vertan Tuna is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Вертанский тунец — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Vertan Tuna now!": "Теперь ты умеешь ловить и чистить вертанского тунца!"
"Help! The frogs are raising vicious eels that kill everything else! We can't compete! You have to help us! You must!": "Помогите! Лягушки выращивают свирепых угрей, которые убивают всё остальное! Мы не можем с ними справиться! Ты должен помочь нам! Ты обязан!"
"Eels are unnatural. Well, I think they are. Thank you for saving us! Take this thing. It came from a frog.": "Угри — это что-то ненатуральное. По крайней мере, я так думаю. Спасибо, что спас нас! Возьми эту штуку. Она пришла от лягушки."
"The Vidarian Pickerel is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Видарианский щука — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Vidarian Pickerel now!": "Теперь ты умеешь ловить и чистить видарийского щуку!"
"The Wahoo is a tricky fish to fillet; you need some practice catching more of them to figure it out.": "Ваху — хитрая рыба для разделки; тебе нужно немного потренироваться в её ловле, чтобы разобраться."
"You've got the hang of catching and cleaning Wahoo now!": "Теперь ты умеешь ловить и чистить ваху!"
"Have you seen those damned sheep that are always on fire? It's genetic, apparently. Some insane wizard did something to them and let fire sheep loose on the land. A stray fire sheep must have made its way here and started mating with the local population. Unfortunately it's dominant, so we need to cull these before it gets too widespread.": "Ты видел этих проклятых овец, которые постоянно горят? Похоже, это генетика. Какой-то безумный волшебник сделал с ними что-то и выпустил огненных овец на землю. Одна заблудшая огненная овца, должно быть, добралась сюда и начала спариваться с местными. К сожалению, этот признак доминирующий, поэтому нам нужно истребить их, пока это не стало слишком распространённым."
"Good, good. Wizards have a bad enough reputation without passersby dying from sheep explosions. Here, maybe this old staff will be of use to you.": "Хорошо, хорошо. У волшебников и так плохая репутация, не стоит ещё и прохожих убивать взрывами овец. Вот, может, этот старый посох тебе пригодится."
"The formal execution is a very important social event for the upper crust of Rahu. I used to go every time... but this is the third time in a row that I didn't get invited.\n\nI need to know what I did. Ask my friend Ichin why I'm not invited. I know Ichin plans to go to the execution... he must know what's going on! I would confront him myself, but... I'm not really the confrontational type.": "Формальная казнь — очень важное светское событие для высшего общества Раху. Раньше я ходил каждый раз... но это уже третий раз подряд, когда меня не приглашают.\\n\\nМне нужно узнать, что я сделал не так. Спроси у моего друга Ичина, почему меня не приглашают. Я знаю, что Ичин собирается пойти на казнь... он должен знать, что происходит! Я бы сам с ним поговорил, но... я не из тех, кто любит конфликты."
"Ichin called me a schemer AND a desperate fawning kitten? At the same time? Faschinating! Ichin normally calls me a schemer, occasionally calls me a kitten, but never calls me a scheming kitten! I know Ichin well, and this means he's trying to throw me off the trail of the truth. I will have to figure out why. Oh, here. This is for your trouble.": "Ичин назвал меня и интриганом, и отчаянным льстивым котёнком? Одновременно? Увлекательно! Обычно Ичин называет меня интриганом, иногда — котёнком, но никогда не интригующим котёнком! Я хорошо знаю Ичина, и это значит, что он пытается сбить меня с пути истины. Мне придётся выяснить, зачем. Вот, это за твои хлопоты."
"What? Shirogin sent you? Hahaha! This is <i>exactly</i> why he wasn't invited! He skulks! He has others do his dirty work. He connives. He worries. He pleads.\n\nShirogin is something between a master schemer and a desperate fawning kitten. And I say that as Shirogin's closest friend!\n\nTell him what I told you. There was an incident at a previous execution which got him banned... he'll know which one.\n\nTell him that I care for him, and that as his friend, I am telling him that he needs to drop this.": "Что? Широгин послал тебя? Ха-ха-ха! Вот <i>именно</i> почему его не пригласили! Он крадётся! Он заставляет других делать грязную работу. Он интригует. Он волнуется. Он умоляет.\n\nШирогин — нечто среднее между мастером интриг и отчаянным льстивым котёнком. И я говорю это как самый близкий друг Широгина!\n\nСкажи ему то, что я тебе сказал. На прошлой казни произошёл инцидент, из-за которого его запретили... он поймёт, о каком именно.\n\nСкажи ему, что я забочусь о нём, и что, как друг, говорю ему, что ему нужно оставить это."
"I was once a professional alchemist, and I'm certain there's a formula that will help me keep my sanity when the full moon comes. The secret is those horrible flowers that grow out in the snow: wolfsbane. But it's hard for me to pick them, because they're very toxic to me now. Can you get some for me?": "Я когда-то был профессиональным алхимиком, и я уверен, что существует формула, которая поможет мне сохранить рассудок во время полной луны. Секрет — в тех ужасных цветах, что растут в снегу: борец. Но мне трудно их собирать, потому что они теперь очень токсичны для меня. Можешь ли ты достать немного для меня?"
"Augh! Irhetsu bless my nose! The stench of those flowers! Haha, the secret has to be locked in these! Thank you. Here. This was one of my demonstration weapons when I used to sell weapons door to door.": "Ах! Ирхетсу, благослови мой нос! Запах этих цветов невыносим! Ха-ха, секрет должен быть заперт именно в них! Спасибо. Вот. Это было одно из моих демонстрационных оружий, когда я продавал оружие от двери к двери."
"Time for a stag party!": "Время для мальчишника!"
"I heard you have apples in this dimension! They don't seem to grow around here though. I wanted to taste the apple juice made from them to see if it's like home.": "Я слышал, что в этом измерении есть яблоки! Хотя, похоже, они здесь не растут. Я хотел попробовать яблочный сок из них, чтобы понять, похож ли он на домашний."
"Thanks! <i>Hiral drinks the juice.</i> Huh. It is exactly the same, except it doesn't have the emotional tones that fairy foods have. That's a good thing in this case. Fae apple juice tastes like resignation and patience. Which is not really that thirst quenching.\n\nHey, as trade, want this weird drug somebody gave me? He said it makes you able to 'multitask', which sounds tiresome, but maybe that's your thing?": "Спасибо! <i>Хирал пьёт сок.</i> Хм. Он точно такой же, только без эмоциональных оттенков, которые есть у фейской еды. В этом случае это к лучшему. Сок фейского яблока на вкус как смирение и терпение. Что, честно говоря, не очень утоляет жажду.\n\nЭй, в обмен хочешь эту странную штуку, которую кто-то мне дал? Он сказал, что она позволяет «многозадачить», что звучит утомительно, но, может, это твоё?"
"Oh, a work order. Thank you, dear. Here is your money.": "О, заказ на работу. Спасибо, дорогая. Вот твои деньги."
"This is so frustrating! Where am I going to get aquamarine dye for General Tremal's gown? I checked with my supplier, but she sold all of it to a human named Charles Thompson, who used it all for research! And to make matters worse, this human left weeks ago on a ship bound to Serbule! If you ever find yourself in that backwoods town, maybe you can locate him and get the dye recipe.\n\nI just need three doses of aquamarine dye. This shouldn't be hard!": "Это так раздражает! Где мне взять аквамариновую краску для платья генерала Тремала? Я проверил у своего поставщика, но она продала всё человеку по имени Чарльз Томпсон, который использовал её всю для исследований! И что ещё хуже, этот человек уехал несколько недель назад на корабле в Сербуль! Если когда-нибудь окажешься в том захолустье, может, сможешь найти его и получить рецепт краски.\n\nМне нужно всего три дозы аквамариновой краски. Это не должно быть сложно!"
"That's it, lovely aquamarine dye! This will make a wondrous gown. Thank you for delivering it! You may go now.": "Вот и оно, прекрасная аквамариновая краска! Из неё получится великолепное платье. Спасибо, что доставил её! Теперь можешь идти."
"Need more aquamarine gems. Need... hmm... four. Plus one extra.": "Нужно больше аквамариновых самоцветов. Нужно... хм... четыре. Плюс ещё один."
"Very pretty little aquamarines! Solgribue is happy.": "Очень красивые маленькие аквамарины! Солгрибу доволен."
"Yes. This can be used. Here is the money.": "Да. Это можно использовать. Вот деньги."
"So, you want to be an Armorsmith do you? Let's start out simple! Forge and bring me one full <b>unenchanted</b> Crude Chainmail suit and I will see what I can do to help you advance your craft!  \n\n": "Значит, хочешь стать бронником? Давай начнём с простого! Выкуй и принеси мне один полный <b>незачарованный</b> комплект грубой кольчуги, и я посмотрю, чем смогу помочь тебе в совершенствовании твоего ремесла!  \\n\\n"
"Thank you! I will study this suit in more detail later on. As promised, here's a little something to help advance your craft.\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Позже я изучу этот костюм более подробно. Как и обещал, вот небольшая помощь для развития твоего ремесла.\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"So, you want to be an Armorsmith do you? Let's try something a bit more advanced this time! Forge and bring me one full <b>enchanted</b> Decent Chainmail suit and I will see what I can do to help you advance your craft!  \n\n": "Значит, хочешь стать бронником? Давай на этот раз попробуем кое-что посложнее! Выкуй и принеси мне один полный <b>зачарованный</b> комплект неплохой кольчуги, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!"
"Thank you! I will study this suit in more detail later on. As promised, here's a little something to help advance your craft.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Позже я изучу этот костюм более подробно. Как и обещал, вот небольшая помощь для развития твоего ремесла.\n\n<i>[Вы получаете 10 расположения у Оррана, вождя каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"So, you want to be an Armorsmith do you? Let's move on to something more complex! Forge and bring me one full Quality Dwarven Plate suit and I will see what I can do to help you advance your craft!  \n\n": "Итак, хочешь стать бронником? Давай перейдём к чему-то посложнее! Выкуй и принеси мне один полный качественный комплект дварфийских лат, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \\n\\n"
"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Amazing Orcish Plate suit and I will see what I can do to help you advance your craft!  \n\n": "Значит, хочешь стать бронником? Давай перейдём к делу! Выкуй и принеси мне один полный комплект изумительных оркских лат, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \\n\\n"
"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Awesome Orcish Plate suit and I will see what I can do to help you advance your craft!  \n\n": "Значит, хочешь стать бронником? Тогда перейдём к делу! Выкуй и принеси мне один полный великолепный орочий латный доспех, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \\n\\n"
"Thank you! I will study this suit in more detail later on. As promised, here's a little something to help advance your craft.\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Как и обещал, вот небольшая помощь для развития твоего ремесла.\n\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Can you deliver these arrow shafts to Joeh in town? Thanks.": "Можешь доставить эти древки для стрел Джоэ в город? Спасибо."
"Here's your coin. Do you deliver things by trade? Oh, you only did it as a favor for me? Well, thanks.": "Вот твоя монета. Ты занимаешься доставкой товаров по торговле? О, ты сделал это только в качестве одолжения для меня? Ну, спасибо."
"Ah yes, my arrowheads, thank you. Elahil's got you doing deliveries now? ... interesting.": "Ах да, мои наконечники стрел, спасибо. Элахил теперь заставляет тебя заниматься доставками? ... интересно."
"Shadow Keepers are lookin' for me. But they don't come up here, since it's a worthless hell hole. But if they do, I'm ready with my bow... except I'm out of arrows. Can you get me some good arrows for shootin' poison?": "Стражи Тени меня ищут. Но они сюда не забираются, ведь это никчёмная дыра. Но если придут, я готов с луком... только стрел нет. Можешь принести мне хорошие стрелы для стрельбы ядом?"
"These will work. Thanks. Here's some coin. I don't expect to survive a fight with the Shadow Keepers, but I don't want to make it too easy, either.": "Эти подойдут. Спасибо. Вот немного монет. Я не рассчитываю выжить в бою с Хранителями Тени, но и слишком легко им не хочу давать."
"The orc invaders stole all my wine! Most of it wasn't even ready for drinking yet! And now I must start all over. But the hogsheads for sale in Rahu may have been made by goblin-owned slaves. Nobody keeps track of that stuff in Rahu, but it matters to me! I need all my hogsheads to be made by free folk.": "Орки-захватчики украли всё моё вино! Большая его часть ещё даже не была готова к употреблению! И теперь мне приходится начинать всё заново. Но винные бочки, которые продаются в Раху, возможно, были сделаны рабами, принадлежащими гоблинам. В Раху никто не следит за такими вещами, но для меня это важно! Мне нужно, чтобы все мои винные бочки были сделаны свободными людьми."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы. Я щедро за них заплачу, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы с зазубринами. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие длинные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы из Резервуара. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы-ловушки. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"The craniologist loved the skulls and ordered another batch! These need to be \"astonishingly impressive\" though.": "Краниолог обожал черепа и заказал ещё одну партию! Но они должны быть «поразительно впечатляющими»."
"Hm. Truth be told, I'm not very astonished by a few of these skulls. Buuuuuut I think I can convince our customer that they're good stuff. I'm going to have to dock your pay a bit, but it's still a good payout!": "Хм. Если честно, меня не особо удивляют некоторые из этих черепов. Но я думаю, что смогу убедить нашего заказчика, что это хорошая вещь. Придётся немного урезать твою плату, но всё равно это хорошее вознаграждение!"
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>astounding armor patch kits</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие наборы для починки брони</b>. Ты можешь сделать их для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new astounding armor patch kits from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых поразительных наборов для ремонта брони."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>astounding metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие металлические слитки</b>. Ты можешь добыть их для меня?\n\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"Excellent quality! I'll buy these!": "Отличное качество! Я куплю это!"
"If you're a miner, I'd love to purchase some astounding metal slabs from you.": "Если ты шахтёр, я с удовольствием куплю у тебя несколько изумительных металлических слитков."
"We need to slow down the ranalon food production. They have a massive number of farmers in those lakes. Dispatch them! I shall reward you with 500 Councils.": "Нам нужно замедлить производство пищи раналонов. У них в тех озёрах огромное количество фермеров. Уничтожьте их! Я награжу вас 500 Совернами."
"Excellent work. There will be more gardeners when the next clutch hatches, but we slowed them down for a little while.": "Отличная работа. Следующее потомство вылупится позже, и садовников станет больше, но мы их немного задержали."
"I have a new lead on the secret military force buried in the Ilmari desert! You're going to help me crack this once and for all. Head to the desert and find the bunker the locals call \"the labyrinth.\" It's south of Amulna, and rakshasa bandits are standing right near the entrance. Once you're underground, go down a few floors to the minotaur halls, then down again, and yet again. At the lowest floor of this place is a hag named Claudia. Kill her! Bring friends -- hags are no joke.\n\nClaudia is said to have a vast treasure trove, which you can keep! All I need are the important documents that should be inside.\n\nI understand there's some sort of mechanism that protects her treasure. Just figure it out and get it done.": "У меня новая зацепка по поводу секретной военной силы, скрытой в пустыне Илмари! Ты поможешь мне разгадать это раз и навсегда. Отправляйся в пустыню и найди бункер, который местные называют «лабиринтом». Он находится к югу от Амулны, а у входа стоят разбойники ракшасы. Оказавшись под землёй, спускайся на несколько этажей вниз до залов минотавров, затем ещё ниже, и ещё раз. На самом нижнем этаже этого места живёт ведьма по имени Клаудия. Убей её! Возьми с собой друзей — ведьмы не шутка.\n\nГоворят, у Клаудии есть огромное сокровище, которое ты можешь оставить себе! Мне нужны только важные документы, которые должны быть внутри.\n\nЯ понимаю, что там есть какой-то механизм, защищающий её сокровище. Просто разберись с ним и выполни задание."
"These are the documents? Hmm, I'll see if I can get these decoded. You've done well!": "Это документы? Хм, посмотрю, смогу ли я их расшифровать. Ты хорошо поработал!"
"Far from here, on a freezing plateau in Gazluk, there is a city of orcs. Find this place and sneak into their keep. I need you to assassinate some important people... and creatures... for political reasons. This will be dangerous; bring allies that you trust. Here's a list of those who must die. Remember, all of these are on the top floor of the keep. You don't need to go into the lower level.": "Далеко отсюда, на ледяном плато в Газлуке, есть город орков. Найдите это место и тайно проникните в их крепость. Мне нужно, чтобы вы убили нескольких важных персон... и существ... по политическим причинам. Это будет опасно; возьмите с собой союзников, которым доверяете. Вот список тех, кто должен умереть. Помните, все они находятся на верхнем этаже крепости. Вам не нужно спускаться на нижний уровень."
"You slew them all? Very well done! I am impressed. The orcs of Gazluk will now be much more responsive when I... oh, hrm, I'm so sorry to prattle on about things that aren't relevant to you! Here is your blood money. Cheers.": "Ты всех их убил? Очень хорошо сделано! Я впечатлён. Орки Газлука теперь будут гораздо послушнее, когда я... ой, хм, прошу прощения за болтовню о том, что тебе не интересно! Вот твои деньги за кровь. Удачи."
"I have heard terrifying tales of creatures deep beneath Gazluk Keep. I need you to investigate and correct these problems before they become severe. Bring allies! You'll need to trek deep into the lower level of the keep.\n\nFirst, there is a 'productivity expert' that apparently achieves excellent results. We don't want them being productive, so fix that. Next, they have a massive urak pumping out eggs daily. That's got to stop!\n\nLast, and most troubling, there is supposedly a demon hidden down there, summoned by foolish mages. They call it a 'gargoyle'. They do not understand how powerful it is. Slay it before it can open a portal and invade this world!": "Я слышала ужасающие рассказы о существах глубоко под крепостью Газлук. Мне нужно, чтобы ты расследовал и устранил эти проблемы, прежде чем они станут серьёзными. Возьми союзников! Тебе предстоит пробираться глубоко на нижний уровень крепости.\n\nВо-первых, там есть «эксперт по продуктивности», который, по-видимому, достигает отличных результатов. Мы не хотим, чтобы он был продуктивным, так что исправь это. Далее у них есть огромный урак, который ежедневно откладывает яйца. Это нужно остановить!\n\nИ наконец, самое тревожное — там, по слухам, спрятан демон, призванный глупыми магами. Его называют «гаргульей». Они не понимают, насколько он силён. Убей его, прежде чем он откроет портал и вторгнется в этот мир!"
"Zukelmux The Intransigent?! I have indeed heard of him... and I am most impressed that you were able to slay him. ...\n\n... Actually, that's outright terrifying. It's hard to believe that a handful of mortals could slay THE Zukelmux...\n\nActually, I bet it was an imposter! Someone claiming to be Zukelmux! Yes, that must be it.\n\nEven so, good work. Here is your payment for services rendered.": "Зукельмюкс Непреклонный?! Я действительно слышал о нём... и я очень впечатлён, что тебе удалось его убить. ...\n\n... На самом деле, это просто ужасает. Трудно поверить, что горстка смертных смогла убить САМОГО Зукельмюкса...\n\nНа самом деле, я уверен, что это был самозванец! Кто-то, выдававший себя за Зукельмюкса! Да, должно быть так.\n\nТем не менее, хорошая работа. Вот твоя награда за оказанные услуги."
"Head to the Ilmari desert and seek out the giant yellow crystals where the manticores live... and kill them! Manticores often have Hegemonic Storage Keys, which you'll need. Just keep killing manticores until you have at least five keys.\n\nNext you must find the entrance to a massive bunker under the sand. It's southwest of the manticores. There are rakshasa bandits nearby, so torture them for information if you're lost.\n\nOnce inside, use the keys on the chests you'll find. Take careful note of what you find -- I need that intelligence for my report.\n\nAlong the way you'll meet a certain Striga who will prevent you from going downstairs. Definitely kill him. On the next floor, look for a minotaur named Asterion and kill him, too. He has something I need; bring it to me.\n\nRemember not to go too far down -- once you go past the steward, you'll be on the correct floor to find Asterion.\n\nOh, and don't underestimate him. Asterion is FAR more dangerous than typical minotaurs.": "Отправляйся в пустыню Илмари и ищи гигантские жёлтые кристаллы, где живут мантикоры... и убей их! У мантикоров часто бывают Ключи Гегемонического Хранилища, которые тебе понадобятся. Просто продолжай убивать мантикоров, пока не соберёшь как минимум пять ключей.\n\nДалее тебе нужно найти вход в огромный бункер под песком. Он находится к юго-западу от мантikor. Поблизости есть разбойники ракшасы, так что пытай их ради информации, если заблудишься.\n\nОказавшись внутри, используй ключи на сундуках, которые найдёшь. Внимательно записывай, что найдёшь — мне нужна эта разведданные для моего отчёта.\n\nПо пути ты встретишь определённого Стригу, который не позволит тебе спуститься вниз. Обязательно убей его. На следующем этаже ищи минотавра по имени Астерион и тоже убей его. У него есть то, что мне нужно; принеси это мне.\n\nПомни, не спускайся слишком глубоко — как только пройдёшь управляющего, ты окажешься на нужном этаже, где найдёшь Астериона.\n\nО, и не недооценивай его. Астерион НАМНОГО опаснее обычных минотавров."
"How many pemphredo eyes did you find? Hmm. That's too few. If they were actively listening for orders from their homeland, there would be hundreds everywhere. And it seems Asterion's personal eye was only used for close-range communication! But...\n\nBut... but they MUST be communicating with the Hegemony military somehow. Right?! There's an entire platoon buried in the sand, waiting to spring some sort of trap. I just can't figure out what signal they're waiting for!\n\nArgh! Damn your failure! Damn it all! I have nothing to go on!\n\nYes, yes, of course: you did as requested and here is your payment.": "Сколько глаз пемфредо ты нашёл? Хм. Это слишком мало. Если бы они активно слушали приказы с родины, их было бы сотни повсюду. И, похоже, личный глаз Астериона использовался только для связи на близком расстоянии! Но...\n\nНо... они ДОЛЖНЫ как-то общаться с военными Гегемонии. Верно?! Там целый взвод зарыт в песке, готовый устроить какую-то ловушку. Я просто не могу понять, какого сигнала они ждут!\n\nАргх! Чёрт возьми, твоя неудача! Чёрт побери всё! У меня нет никаких зацепок!\n\nДа, да, конечно: ты сделал, как просили, и вот твоя награда."
"Head to Rahu and find a way into their sewer system. There is a problematic black-market poison merchant in the upper levels of the sewer; put an end to his evil schemes! Next, you'll need to figure out how to reach the lower levels of the place. I understand that there's a massive slime somewhere in the pipes and it's beginning to contaminate the city's water supply. If their water becomes unsafe, Rahu will be devastated and the area will become a warzone again. So go fix that. Finally, there is some sort of militant group of rat-people down there somewhere whose political alignment is problematic; depose their king and that should leave them in disarray.\n\nThe sewers are relatively safe, so you can scout things out on your own... but you're going to need friends to kill these targets! They're tougher than the rest of the stuff down there.": "Отправляйся в Раху и найди способ попасть в их систему канализации. В верхних уровнях канализации есть проблемный торговец ядами с чёрного рынка; положи конец его злым замыслам! Затем тебе нужно выяснить, как добраться до нижних уровней этого места. Я слышала, что где-то в трубах находится огромный слизень, который начинает загрязнять водоснабжение города. Если их вода станет небезопасной, Раху будет разрушен, и район снова превратится в зону боевых действий. Так что исправь это. Наконец, где-то там внизу есть воинственная группа крысоподобных существ с проблемной политической ориентацией; свергни их короля, и это должно привести их в хаос.\n\nКанализация относительно безопасна, так что ты можешь разведать всё самостоятельно... но для убийства этих целей тебе понадобятся союзники! Они сильнее остальных обитателей там."
"The water supply is safe? Excellent. That's one more lever of control that the Hegemony can't use. And you've hopefully prevented a ratkin uprising for at least a few more months. Mortal politics are every bit as messy as fae politics!\n\nYou appear to have applied your skills well; here is your payment.": "Водоснабжение в безопасности? Отлично. Это ещё один рычаг контроля, который Гегемония не сможет использовать. И, надеюсь, ты предотвратил восстание крысолюдов как минимум на несколько месяцев. Смертные политики не менее запутанны, чем фейские!\n\nПохоже, ты хорошо применил свои навыки; вот твоя награда."
"I have an extremely difficult task today. You need to enter the fae realm near Sun Vale. There's a Winter ship in orbit there. Sneak aboard and take out some problems.": "У меня сегодня чрезвычайно трудное задание. Тебе нужно войти в мир фей рядом с Сан-Вейл. Там на орбите находится корабль Зимнего Прилива. Проберись на борт и устрани несколько проблем."
"I've already heard the transmissions -- you've done well. The next stage of my plan is beginning, but your part is done. Here is your money. Remember: tell no-one of what you've done.": "Я уже слышал передачи — ты хорошо справился. Следующий этап моего плана начинается, но твоя часть выполнена. Вот твои деньги. Помни: никому не рассказывай о том, что ты сделал."
"I hope you're as good as you think you are, because this one is tricky. Enter the fae realm near Sun Vale. There's a Winter planeship there; sneak aboard. Then find some bird-creature named... Hmm, my notes say \"Coldfeather\" but there's also something called \"Hotfeather\" aboard. Kill them both, to be safe.\n\nI also need you to open some of their storage chests and take note of the contents. You should be able to find keys aboard the ship. Good luck. Bring friends.": "Надеюсь, ты так хорош, как думаешь, потому что это задание сложное. Войди в мир фей рядом с Сан-Вейл. Там находится зимний планесшип; проберись на борт. Затем найди какое-то птицеподобное существо по имени... Хм, в моих записях указано «Холодное Перо», но на корабле есть ещё нечто под названием «Горячее Перо». Убей их обоих, на всякий случай.\n\nМне также нужно, чтобы ты открыл несколько их сундуков для хранения и записал содержимое. Ключи от сундуков ты должен найти на корабле. Удачи. Возьми с собой друзей."
"So, how much mortal contraband did you find in the chests? Hmm, not much? That's another theory busted. We had hoped perhaps they were just plundering this world, but I think not. Their plans must be more problematic than that!\n\nBut that's an issue for another day. Here is your payment. Spend it well.": "Итак, сколько смертного контрабанда ты нашёл в сундуках? Хм, немного? Ещё одна теория развалилась. Мы надеялись, что они просто грабят этот мир, но, думаю, нет. Их планы должны быть гораздо серьёзнее!\n\nНо это проблема для другого дня. Вот твоя награда. Потрать её с умом."
"I have the parts I need for my auto-clamp, but... Well, it's been a few decades since I made anything like this. I'm trying to remember how it's done. I <i>think</i> I just need a T crystal, which I have on-hand... But what if I actually need an L crystal? In that case, we're looking at a pretty dangerous explosion when I plug in the wrong part.\n\nI'm not really prepared for that sort of chemical fire here, because... oh, nevermind, trying to explain myself to you is worse than talkin' to a child.\n\nHere's what I need: a nice fae blanket. Like the fairies in Statehelm sell sometimes. Or just make one. You know how to make one, right? You just sew up the edges of some fae silk. Simple as that!": "У меня есть нужные детали для моего автозажима, но... прошло уже несколько десятилетий с тех пор, как я делал что-то подобное. Я пытаюсь вспомнить, как это делается. Я <i>думаю</i>, мне просто нужен Т-кристалл, который у меня есть под рукой... Но что если мне на самом деле нужен Л-кристалл? В таком случае нас ждёт довольно опасный взрыв, если я подключу неправильную деталь.\n\nЯ не совсем готов к такому химическому пожару здесь, потому что... ой, неважно, пытаться объяснить это тебе хуже, чем разговаривать с ребёнком.\n\nВот что мне нужно: хороший фейский плед. Такой, какие иногда продают феи в Стейтхелме. Или просто сделай один. Ты же знаешь, как его сделать, да? Просто зашей края из фейского шёлка. Вот и всё!"
"Is this the first fae silk blanket you ever made? Hah! I don't care, it's just to smother a fire. You did good.": "Это первое одеяло из фейского шёлка, которое ты когда-либо сделал? Ха! Мне всё равно, оно нужно просто чтобы задушить огонь. Ты справился хорошо."
"These are his fear? Let us see. Yes, this will work, for the dreamer's nightmare is our salvation: he fears Gulagra!\n\nIt is done. As anticlimactic as that! Gulagra has been repelled. But I shall not end this dream. No, that would be too kind. The mortal who dared to dream it shall never awaken; this will stay in this nightmare until his body perishes.\n\nYou have my gratitude! If you need to leave now, please go with my blessing. If you had a bit more time, there's one remaining clean up task to see to...": "Это его страх? Посмотрим. Да, это сработает, ведь кошмар сновидца — наше спасение: он боится Гулагры!\n\nСделано. Как ни странно, всё так просто! Гулагра был отражён. Но я не закончу этот сон. Нет, это было бы слишком по-доброму. Смертный, осмелившийся его видеть, никогда не проснётся; он останется в этом кошмаре, пока его тело не погибнет.\n\nТы имеешь мою благодарность! Если тебе нужно уйти сейчас, иди с моим благословением. Если у тебя есть немного больше времени, осталось одно последнее дело..."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы с зазубринами. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие длинные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы из Резервуара. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы-ловушки. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"I've been watching the scattered ranalon off the coast, and I have grim news. A powerful chieftan is ready to lead the remaining ranalon in an attack! You totally need to kill him.\n\nActivate the same underwater beacon as before, and this time look for Dreadfin Absolum. Oh, and bring some backup, or you'll surely drown!\n\nDon't worry, you have my confidence in you. It will serve as a guide!": "Я наблюдала за разбросанными раналонами у побережья и у меня мрачные новости. Могущественный вождь готов возглавить оставшихся раналонов в атаке! Тебе обязательно нужно его убить.\n\nАктивируй тот же подводный маяк, что и раньше, а на этот раз ищи Ужасного Абсолума. О, и возьми с собой подкрепление, иначе ты точно утонешь!\n\nНе волнуйся, у тебя есть моё доверие. Оно послужит тебе путеводителем!"
"Absolum is dead! You've really made a difference today. And a very powerful enemy. But that's a problem for another day. Today we celebrate!\n\nOkay, celebration time is over.": "Абсолум мёртв! Сегодня ты действительно изменил ход событий. И это был очень могущественный враг. Но это проблема для другого дня. Сегодня мы празднуем!\n\nЛадно, время праздновать закончилось."
"You know what would hit the spot? Some bacon!": "Знаешь, что было бы кстати? Немного бекона!"
"Whoa, for me? You shouldn't have!": "Ого, для меня? Не стоило!"
"Look, I don't need random help from random mortals! Somebody brought me this potion of memory inhibition, and I've been studying it. I think I can invert the effect. Well, I can invert <i>something</i>: memories, emotions, internal organs, something. And something is better than nothing.\n\nI wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!": "Слушай, мне не нужна случайная помощь от случайных смертных! Кто-то принес мне это зелье подавления памяти, и я изучаю его. Думаю, я могу обратить эффект. Ну, я могу обратить <i>что-то</i>: воспоминания, эмоции, внутренние органы, что-то такое. А что-то — лучше, чем ничего.\\n\\nЯ записала, что мне нужно, но, хм, это должно быть из смертного мира. Подожди, ты же смертный! Вот. Забери эти вещи! Поторопись! Иди!"
"What's all this? You think this can help fix memory problems? Oh, hmm. You know, I think you're right! This might work! There's some missing ingredients, but I think I have those. You're a genius, thank you! I have to mix this up right now before I forget.\n\n<i>[Midge works horriedly, then takes a deep breath and drinks her concoction.]</i>\n\nOh, you're still here? That's nice. ... hmm. I think I may have helped my brain just now. I'll be able to tell in a bit. Hey, you're an alchemist too, right? Here, let me show you a related formula that I devised this earlier. It's not quite what I was looking for. In fact, it's a LOT of work for a short-term boost... maybe it'll help somebody somewhere, though!": "Что это всё? Ты думаешь, это поможет исправить проблемы с памятью? Ох, хм. Знаешь, я думаю, ты прав! Это может сработать! Некоторые ингредиенты отсутствуют, но, кажется, у меня они есть. Ты гений, спасибо! Мне нужно сразу же всё смешать, пока я не забыла.\n\n<i>[Мидж работает в ужасе, затем глубоко вздыхает и выпивает своё зелье.]</i>\n\nО, ты всё ещё здесь? Это приятно. ... хм. Думаю, я только что помогла своему мозгу. Скоро смогу сказать точно. Эй, ты тоже алхимик, да? Вот, позволь показать тебе связанную формулу, которую я разработала раньше. Это не совсем то, что я искала. На самом деле, это ОЧЕНЬ много работы ради кратковременного эффекта... но, может, кому-то где-то это поможет!"
"Look, I don't need random help from random mortals! I used to be an expert alchemist, and I know there was a method to inhibit memory. If I could remember how to make memory-inhibitors, maybe I could find a reversal effect... anyway, if you happen to have a memory-inhibitor potion, that'd be great. Otherwise, you can help best by bringing me the ingredients I need! I'll barter for royal jelly.": "Слушай, мне не нужна случайная помощь от случайных смертных! Я была опытным алхимиком и знаю, что существовал способ подавлять память. Если бы я могла вспомнить, как делать зелья, подавляющие память, возможно, я смогла бы найти и обратный эффект... В любом случае, если у тебя вдруг есть зелье, подавляющее память, это было бы здорово. А если нет, лучше всего ты поможешь, если принесёшь мне нужные ингредиенты! Я обменяю их на маточное молочко."
"What's this? This fixes memory problems? No, this is a memory inhibitor! Why would you give me this?! Wait.. wait, I asked you for this, didn't I? Because I can study it! Hmm. Okay! Okay! I have to take some notes, but thanks! Thank you. This is great! Here: this doesn't work.": "Что это? Это исправляет проблемы с памятью? Нет, это ингибитор памяти! Почему ты дал мне это?! Подожди... подожди, я же просил тебя об этом, не так ли? Потому что я могу изучить это! Хм. Ладно! Ладно! Мне нужно сделать несколько заметок, но спасибо! Спасибо. Это здорово! Вот: это не работает."
"Banana wine is not for the faint of heart. It's too sweet for the likes of Fenna and too rich for the likes of Irhetsu. But it's perfect for the likes of me! Made any?": "Банановое вино не для слабонервных. Оно слишком сладкое для таких, как Фенна, и слишком насыщенное для таких, как Ирхетсу. Но для таких, как я, оно идеально! Уже делали?"
"Thick, rich, and kind of disgusting. Thank you!\n\nThis next one's got broader appeal, don't worry!": "Густой, насыщенный и немного отвратительный. Спасибо!\n\nСледующий понравится гораздо большему числу людей, не волнуйся!"
"I love bananas! You have to bring me lots of bananas. It's a law now. Go! Fetch bananas!": "Я обожаю бананы! Ты должен принести мне много бананов. Теперь это закон. Вперёд! Принеси бананы!"
"Bananas! When I was a dog, master gave me bananas as a treat. But now I'm a person and I can eat all bananas all the time! Here. Take these away, they aren't bananas.": "Бананы! Когда я был собакой, хозяин давал мне бананы в качестве лакомства. Но теперь я человек и могу есть бананы всё время! Вот. Забери это, это не бананы."
"Dalvos gave us healing! The power to heal! But magical healing cannot stop the pain! I need mundane healing! Bring it to me!": "Далвос дал нам исцеление! Силу исцелять! Но магическое исцеление не может остановить боль! Мне нужно обычное исцеление! Принеси его мне!"
"Yes. <i>Yalox eats the bandage.</i> It does nothing! NOTHING!": "Да. <i>Ялокс ест повязку.</i> Это ничего не даёт! НИЧЕГО!"
"I hurt myself yesterday... I dropped a red-hot rock on my foot. I thought I'd managed to get the swelling under control, but my healing magic has always been terrible. Could you go to Marna and ask her for a Simple First Aid Kit?": "Я поранился вчера... Уронил раскалённый камень на ногу. Я думал, что сумел справиться с отёком, но моя магия исцеления всегда была ужасной. Можешь сходить к Марне и попросить у неё Простой набор первой помощи?"
"Thanks! This should have something for the swelling. It's been so painful that I've not even been able to eat! Here, actually: take my lunch!": "Спасибо! Здесь должно быть что-то от отёка. Было так больно, что я даже не мог есть! Вот, возьми мой обед!"
"Here, can you fill this book order? I don't have any of these. They want... Hm what are these books, exactly? I guess they're instructions on sewing advanced bardic equipment. Oh, that makes sense given who the order is from. Are these rare? I assumed so, and I quoted her quite a high price. If you can find them, I'll give you half the pay.": "Вот, можешь выполнить этот заказ на книги? У меня ничего из этого нет. Им нужны... Хм, что это за книги? Полагаю, это инструкции по пошиву продвинутого бардовского снаряжения. А, тогда понятно, учитывая, от кого заказ. Они редкие? Я так и думал, поэтому назвал довольно высокую цену. Если найдёшь их, я отдам тебе половину оплаты."
"Oh, you found them all? Must not have been so hard to find after all, eh? Well, a deal's a deal: here's your half of the pay.\n\nI desperately needed this sale to pay some debts. So... Thanks again!": "О, ты нашёл их все? Значит, в итоге не так уж и сложно было найти, да? Что ж, сделка есть сделка: вот твоя половина оплаты.\n\nМне очень нужна была эта продажа, чтобы расплатиться с долгами. Так что... ещё раз спасибо!"
"There's a beast that lives in the caves here that I really hope I get a chance to hunt! They're sort of like dogs, but ... not dogs. Barghests! If you find any, can you try to get some patches of their flesh for me to study?": "В пещерах здесь живёт зверь, на которого я очень надеюсь однажды поохотиться! Они вроде как похожи на собак, но... не собаки. Баргесты! Если найдёшь каких-нибудь, не мог бы добыть для меня несколько кусочков их плоти для изучения?"
"This is barghest flesh? Hmm, it's very similar to dog flesh, isn't it? Legend says barghests were genetically engineered by goblins, but that seems unlikely to me... I mean, we know how their bugbears turned out! Barghests seem like graceful creatures in comparison. I think they're just some sort of magic-infused super-dog. But I'll let Mox examine these later and see if he finds any clues to their origin. Thanks! Uh, here's some stuff for you.": "Это мясо баргеста? Хмм, оно очень похоже на собачье мясо, не так ли? Легенда гласит, что баргестов создали гоблины с помощью генной инженерии, но мне это кажется маловероятным... Я имею в виду, мы знаем, что получилось с их бугберами! Баргесты кажутся более изящными созданиями по сравнению с ними. Думаю, это просто какой-то магически насыщенный супер-пёс. Но я позволю Моксу позже изучить это и посмотреть, найдёт ли он какие-нибудь подсказки об их происхождении. Спасибо! Эээ, вот тебе кое-что."
"Would you 'be a deer' as the humans say, and pick me up a certain thing while you're out hunting? It's... a slightly delicate issue: I need a few barghest snouts. Please don't tell Marrowchomp -- I'm already 'on thin ice' with him, as the humans say.": "Не мог бы ты, как говорят люди, оказать мне услугу и прихватить одну вещицу, пока будешь на охоте? Это... немного деликатный вопрос: мне нужно несколько рыл баргестов. Только не говори Марроучомпу — я и так у него, как говорят люди, хожу по тонкому льду."
"These organs will work well, thank you. I use them as part of the catalyst for my... well, I've said too much already. Here's something for your trouble. Don't tell anyone where you got that!": "Эти органы подойдут отлично, спасибо. Я использую их как часть катализатора для моего... ну, я уже сказал слишком много. Вот тебе за труды. Никому не говори, откуда это у тебя!"
"Am I glad to see you! This one's too tough for me. Apparently the orcs of Gazluk Keep have a barghest breeding program, and last night they released their excess animals. Suddenly there's hundreds of barghests south of the keep! And they're hungry. We can't let them settle up here or they'll destroy the delicate ecosystem, and eat me.\n\nDon't worry, these aren't true barghests -- these are just animals. Big dogs! You can take 'em! I mean, I can't, but you can!": "Как же я рад тебя видеть! Это слишком сложно для меня. Похоже, у орков из крепости Газлук есть программа разведения баргестов, и прошлой ночью они выпустили лишних животных. Внезапно к югу от крепости появилось сотни баргестов! И они голодны. Мы не можем позволить им обосноваться здесь, иначе они уничтожат хрупкую экосистему и съедят меня.\n\nНе волнуйся, это не настоящие баргесты — это просто животные. Большие собаки! Ты справишься с ними! Я — нет, а ты — да!"
"I hope you got enough of them! Maybe you should check in on me tomorrow... see if I got eaten. Nah, nah, I'm kidding, I'll be fine. Thanks! Want a shiny rock?": "Надеюсь, ты собрал их достаточно! Может, заглянешь ко мне завтра... проверить, съели ли меня. Да нет, шучу, со мной всё будет в порядке. Спасибо! Хочешь блестящий камень?"
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>basic hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>простые молоты</b>. Ты можешь сделать несколько для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new basic hammers from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых простых молотков."
"I used up my last bear gallbladder this morning. Now what will I do if someone comes asking about their chances for inheritance? Or what if someone asks me the sex of their unborn?! I need more bear gallbladders right away! And we're out of stock!": "Я израсходовал свой последний медвежий желчный пузырь сегодня утром. Что же мне теперь делать, если кто-то придёт спросить о своих шансах на наследство? Или если кто-то спросит меня о поле своего ещё не рождённого ребёнка?! Мне срочно нужны ещё медвежьи желчные пузыри! А у нас их нет в наличии!"
"Bear gallbladders! Good! I've only had to turn away one customer because I was out of these. Thank you so much for the timely delivery!": "Медвежьи желчные пузыри! Отлично! Мне пришлось отказать только одному клиенту, потому что они у меня закончились. Большое спасибо за своевременную доставку!"
"Those bears attack even stronger predators! They need to be shown their place. But I don't dare waver in my goal. You, however, might be able to waver a little bit? Just a tad? Make them suffer.": "Эти медведи нападают даже на более сильных хищников! Им нужно показать их место. Но я не смею отклоняться от своей цели. А ты, возможно, можешь немного поколебаться? Немного? Заставь их страдать."
"Yes. Good! Do you like swords when in your other form? Here, take this spare.": "Да. Отлично! Тебе нравятся мечи в твоей другой форме? Вот, возьми этот запасной."
"My Sausage Swirlers are a hit with many varieties of mammalian guests. However, I believe I could improve on their flavor if they were made of bear meat -- or a similar beast -- instead of goblin meat. Would you procure some for me?": "Мои колбасные завитки пользуются успехом у самых разных млекопитающих гостей. Однако я считаю, что мог бы улучшить их вкус, если бы они были сделаны из медвежатины — или мяса похожего зверя — вместо гоблинского мяса. Не мог бы ты достать немного для меня?"
"Perfect. It smells delicious! ... But I do understand that civilized creatures find raw meat disgusting. I shall put it on ice immediately!": "Отлично. Пахнет восхитительно! ... Но я понимаю, что цивилизованные существа считают сырое мясо отвратительным. Я сразу же положу его на лёд!"
"I like to refine weapons by giving them an artistic touch. I'm working on a combat beaker -- I haven't done one of these since my sister died! It seems I'm out of blue glass, though. Do you have any? Oh, I need a bit of pyrite too.": "Мне нравится доводить оружие до совершенства, придавая ему художественный штрих. Я работаю над боевой колбой — я не делал таких с тех пор, как умерла моя сестра! Похоже, у меня закончились синие стеклянные осколки. У тебя есть немного? О, и мне ещё нужно немного пирита."
"Thank you! I'll have to melt the pyrite, but fortunately even a non-expert can do that. Well... I might ask for some help on that, too. Anyway, here is a gift for you in return. I made it years ago and it reminds me of my sister. Use it well.": "Спасибо! Мне придётся расплавить пирит, но, к счастью, с этим справится даже неэксперт. Хотя... возможно, я тоже попрошу помощи. В любом случае, вот тебе подарок взамен. Я сделал его много лет назад, и он напоминает мне о моей сестре. Используй его с умом."
"I know your type: a book learner. You've read about how to muster up a Moment of Resolve and you think you're special. But let's see you create a Moment of Resolve under real danger conditions!": "Я знаю таких, как ты: книжный ученик. Ты читал, как собрать Момент Решимости, и думаешь, что ты особенный. Но давай посмотрим, сможешь ли ты создать Момент Решимости в условиях настоящей опасности!"
"Hmm. Well, I guess you did pretty well.": "Хмм. Ну, думаю, у тебя получилось неплохо."
"You don't want my treats?! Prove it! If you can freely give away the ultimate treat, I'll have to believe you. Bring me <b>Steak and Cheese Wraps!</b>": "Не хочешь мои угощения?! Докажи! Если сможешь просто так отдать высшее угощение, мне придётся тебе поверить. Принеси мне <b>Рулеты со стейком и сыром!</b>"
"Wow! Give it to me!\n\nOkay. You  can hang out here. But don't beg for treats, got it?": "Вау! Дай мне это!\n\nЛадно. Ты можешь здесь остаться. Но не выпрашивай угощения, понял?"
"Nobody likes sitting on the stools in here. I wish I had better chairs. Real nice ones! But I don't know how to make those.": "Никому не нравится сидеть на табуретках здесь. Хотелось бы у меня получше стулья. Настоящие хорошие! Но я не знаю, как их делать."
"You did it, thank you! I'll just take these into the back and let them sit for a few days while I pretend to make them. No offense, I just have to keep up appearances! But here. This is something I did make.": "Ты справился, спасибо! Я просто отнесу это в подсобку и оставлю на несколько дней, пока буду притворяться, что делаю их. Без обид, просто нужно поддерживать видимость! Но вот. Это то, что я действительно сделал."
"So that last cheese, the 'cheshire', turned out to be slightly too bitter, so it doesn't go well with wine. Look, I don't fuckin' know, it's all just cheese ta me. But I need a different one. A 'gloucester'. It's supposed to be better, accordin' to my cousin that runs a stall down the hall. Ya got any of that?": "Так вот, тот последний сыр, «чешир», оказался слегка горьковатым, так что с вином он не очень сочетается. Слушай, я, чёрт возьми, не знаю, для меня это всё просто сыр. Но мне нужен другой. «Глостер». Говорят, он получше, по словам моего кузена, у которого лавка дальше по коридору. У тебя есть такой?"
"Thanks. I swear by Ormorek's snipped beard if the daft girl hates this cheese too, I... <i>sigh</i> anyway here's payment for your cheese!": "Спасибо. Клянусь обрезанной бородой Орморека, если эта глупая девчонка тоже возненавидит этот сыр, я... <i>вздох</i> в любом случае, вот плата за твой сыр!"
"In my spare time I work to artistically enhance weapons, and I'm working on a hammer that needs a new wrap. I know just the material! Kuvou tongue! Can you get me some?": "В свободное время я занимаюсь художественным улучшением оружия, и сейчас работаю над молотом, которому нужна новая обмотка. Я знаю, какой материал нужен! Язык куву! Не мог бы ты достать немного?"
"Are these the kuvou tongues? Oh, by the four, that stinks... I didn't think my plan through very well. How do I tan these?!\n\nNo, no, you've already done enough. Let me repay you for your effort with another customized hammer.": "Это что, языки куву? Ох, чёрт возьми, как воняет... Я плохо продумал свой план. Как их выделать?!\n\nНет, нет, ты и так уже много сделал. Позволь отблагодарить тебя ещё одним индивидуальным молотом."
"My friend Irkima has told me a fanciful tale! There are insects on this continent that secrete lac that is so strong that it has different properties. Irkima called it 'ultra-lac', but of course I'm certain that sages in this land have a more appropriate name for it. I must see this substance! Can you procure some?": "Мой друг Иркима рассказал мне удивительную историю! На этом континенте есть насекомые, которые выделяют лак настолько прочный, что у него совсем другие свойства. Иркима назвал его «ультра-лак», но, конечно, я уверен, что мудрецы этих земель дали ему более подходящее название. Я должен увидеть это вещество! Сможешь раздобыть немного?"
"This is the so-called ultra-lac? But this is just regular lac! Wait, I think we have a terminology problem. What you call 'regular lac' must be what we call 'worthless bug secretions'. Ah well. Thank you for helping me solve the mystery!": "Это так называемый ультра-лак? Но это просто обычный лак! Погоди, кажется, у нас проблема с терминологией. То, что ты называешь «обычным лаком», должно быть тем, что мы называем «бесполезными выделениями насекомых». Ну да ладно. Спасибо, что помог мне разгадать эту загадку!"
"I need better skulls to further my study. Look for humanoids that are especially brave, or daring, or horrifying. Pop out their skulls after you kill them, and see if the skulls look impressive.": "Мне нужны лучшие черепа для продолжения моего исследования. Ищи гуманоидов, которые особенно смелы, дерзки или ужасны. Доставай их черепа после убийства и смотри, выглядят ли они впечатляюще."
"Wow, these are better than I expected.\n\nBut enough about that. I noticed that you didn't have much compunction about ripping the skulls out of your fellow creatures using a small knife. You must have a <i>fucked up</i> past! What? No memory? Well, here. This might help you remember things better.": "Вау, они лучше, чем я ожидал.\n\nНо хватит об этом. Я заметил, что ты не испытывал особых угрызений совести, вырывая черепа у своих собратьев маленьким ножом. У тебя должно быть <i>очень испорченное</i> прошлое! Что? Нет воспоминаний? Вот, это может помочь тебе лучше вспомнить."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>bilge hoops</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>обручи для трюма</b>. Ты можешь сделать несколько для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new bilge hoops from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых обручей для трюма."
"<i>Rebeccah scribbles a note:</i>\n\nCongratulations! I knew you were an advanced student when I heard your song.\n\nI can no longer sing, but in my dreams I still can. When I wake, my throat is quite sore. Can you fetch some bitter-mint tea for me?": "<i>Ребекка пишет записку:</i>\\n\\nПоздравляю! Я знала, что ты продвинутый ученик, когда услышала твою песню.\\n\\nЯ больше не могу петь, но во снах всё ещё могу. Когда просыпаюсь, у меня сильно болит горло. Можешь принести мне чай с горькой мятой?"
"<i>Rebeccah takes the tea, sips, and grimaces at the bitterness. Then she smiles thanks.</i>": "<i>Ребекка берёт чай, делает глоток и морщится от горечи. Затем она улыбается в знак благодарности.</i>"
"I need another kind of mushroom. These are common everywhere: black foot morels. Delicious in stews! I need to make sure the kind that grow here are alchemically identical to the kinds grown elsewhere.": "Мне нужен другой вид грибов. Эти повсеместно встречаются: чёрные сморчки. Вкусны в рагу! Мне нужно убедиться, что те, что растут здесь, алхимически идентичны тем, что растут в других местах."
"These definitely look like black foot morels. Thank you. I'll do some quick tests to make sure they're typical for the species. Here is a bounty for your hard work.": "Это определённо чёрные строчки. Спасибо. Я проведу несколько быстрых тестов, чтобы убедиться, что они типичны для этого вида. Вот награда за твою усердную работу."
"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Amazing Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\n\n": "Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодились ещё 10 отличных броневых шипов для починки доспехов. Взамен я с радостью поделюсь несколькими советами и хитростями."
"Thank you so much. This will help me save my metals to do repairs on the road. Oh yes, here's those tips I promised!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Это поможет мне сэкономить металлы на ремонт в дороге. О, да, вот те чаевые, что я обещал!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Masterwork Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\n\n": "Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодились ещё 10 мастерских кольев для брони, чтобы чинить доспехи. Взамен я с радостью поделюсь парой советов и хитростей."
"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Simple Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\n\n": "Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодились ещё несколько простых кольев для брони, чтобы чинить доспехи. Если ты сможешь принести мне 10 простых кольев для брони, это будет здорово! Взамен я с радостью поделюсь парой советов и хитростей."
"Thank you so much. This will help me save my metals to do repairs on the road. Oh yes, here's those tips I promised!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Это поможет мне сэкономить металлы для ремонта в пути. Ах да, вот те советы, которые я обещал!\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use a few new vises. If you could bring me 10 vises, that would be great! I'll be happy to share a few tips and tricks that my brother Orran has taught me during our travels in exchange.\n\n": "Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодились несколько новых тисков. Если ты сможешь принести мне 10 тисков, это будет здорово! Взамен я с радостью поделюсь несколькими советами и хитростями, которым меня научил мой брат Орран во время наших путешествий."
"Hey are you any good with Alchemy? I could use some cleanser for these gemstones, so I can cut them up real pretty. Could you get me some Weak Acidic Cleanser?": "Привет, ты хорошо разбираешься в Алхимии? Мне нужен очиститель для этих драгоценных камней, чтобы я мог красиво их огранить. Можешь достать мне немного слабого кислотного очистителя?"
"Thanks! Hey, let me give you some gems in exchange.": "Спасибо! Эй, позволь дать тебе несколько драгоценных камней взамен."
"Someday when I've mastered geology, I'd like to learn more about Anthropology, too: the study of Humans! I guess primitive people just fascinate me. Did you know that Humans discovered cooking before they discovered fire magic? Really! I don't know how they controlled fire without magic, though. I guess that's a mystery lost to the ages.\n\nSpeaking of old human cooking, I heard there are antique Human-made spoons in the crypts and caves near here. Could you get me a sample spoon? It'd be fascinating.": "Однажды, когда я освою геологию, я хотел бы узнать больше и об антропологии: изучении людей! Похоже, примитивные народы меня просто завораживают. Знаешь ли ты, что люди научились готовить пищу раньше, чем открыли огненную магию? Правда! Хотя я не понимаю, как они контролировали огонь без магии. Видимо, это тайна, утерянная во времени.\n\nКстати, говоря о древней человеческой кухне, я слышал, что в склепах и пещерах неподалёку есть старинные ложки, сделанные людьми. Можешь принести мне образец ложки? Это было бы очень интересно."
"Perfect! Spoons like these have been used by Humans for thousands of years, while they mastered the arts of soups and stews. Hmm, I don't think this one's more than a few hundred years old, though. But thanks anyway! It's fascinating.": "Отлично! Ложки, подобные этим, люди использовали тысячи лет, осваивая искусство супов и рагу. Хм, хотя я не думаю, что этой больше нескольких сотен лет. Но всё равно спасибо! Это увлекательно."
"I need some mushrooms. But I don't want to deal with Jack today. He's such a goon. Can you get them for me?": "Мне нужны грибы. Но сегодня я не хочу связываться с Джеком. Он такой болван. Можешь достать их для меня?"
"Thanks! Did you pick these yourself? You're so talented! I'm only good at geology. But, um, here! Have some powdered geology remnants.": "Спасибо! Ты сам собрал это? Ты такой талантливый! Я хорош только в геологии. Но, эм, вот! Возьми немного порошкообразных остатков геологии."
"The settlers who lived in the houses outside were adherents of Arisetsu, the goddess of Hope and Warmth. You know what that means, right? Blankets! Arisetsu nuts always bring tons of their blankets to give to the needy. Well, they're dead, and we're needy. They brought a lot of their stuff into this cave when they fled, but when the survivors died, they were buried in... you guessed it: Arisetsu blankets. So now we're very low. I'm betting that there's more in those houses, though. Sneak past the ghosts and get us some!": "Поселенцы, которые жили в домах снаружи, были последователями Арисетсу, богини Надежды и Тепла. Знаешь, что это значит, да? Одеяла! Фанаты Арисетсу всегда приносят кучу своих одеял, чтобы раздавать нуждающимся. Ну, они мертвы, а мы нуждаемся. Когда они бежали, они притащили много своих вещей в эту пещеру, но когда выжившие умерли, их похоронили в... ты угадал: одеялах Арисетсу. Так что теперь у нас их очень мало. Но я уверен, что в тех домах есть ещё. Прокрадись мимо призраков и добудь нам немного!"
"Blankets! I was sure I'd just gotten you killed, but you're not as stupid as I thought! That's good. Yeah. Okay... so now piss off. Oh! Your reward! Right. Here, take these. I nicked 'em from Mox when he wouldn't pay up his bets with me.": "Одеяла! Я был уверен, что только что тебя убил, но ты не такой глупый, как я думал! Это хорошо. Да. Ладно... так что теперь проваливай. О! Твоя награда! Точно. Вот, возьми это. Я стащил это у Мокса, когда он не хотел платить по своим ставкам со мной."
"You're the one that brought me the painclover from Louis, right? Yes, it was definitely you. How did he look? Still sickly? He'd taken so much demon poison that I didn't think he'd survive. I'd almost given up hope, actually.\n\nBut if he's healthy now, he needs to come here and live in my camp.\n\nAs you're obviously a florist of some skill, could you find some of Louis's favorite flowers and deliver them to him? He'll know what it means. And I will pay you zealously. For your efforts as much as for your discretion.": "Ты тот, кто принес мне болелист от Луи, верно? Да, это точно был ты. Как он выглядел? Всё ещё болезненный? Он получил столько демонического яда, что я не думал, что он выживет. Я почти потерял надежду, если честно.\n\nНо если он теперь здоров, ему нужно прийти сюда и жить в моём лагере.\n\nПоскольку ты явно умеешь обращаться с цветами, не мог бы ты найти некоторые из любимых цветов Луи и доставить их ему? Он поймёт, что это значит. И я щедро заплачу тебе. За твои усилия и за твою осмотрительность."
"Fucking coward. Not you, Louis. What he and I did is already a crime! Many times over! They'd take his cock if they knew. And he knows I can keep him safe here. And we <i>all</i> know he's unhappy where he is! I'm so tired of cowards that say they want love and then they can't handle it.\n\nI thank you for your efforts. If you happen to see him again, ... don't tell him anything, actually. We've said our peace.": "Чёртов трус. Не ты, Луи. То, что он и я сделали, уже преступление! И не одно! Если бы они узнали, у него отберут член. А он знает, что я могу защитить его здесь. И мы <i>все</i> знаем, что ему плохо там, где он есть! Я так устал от трусов, которые говорят, что хотят любви, а потом не могут с ней справиться.\n\nСпасибо тебе за старания. Если вдруг снова увидишь его, ... на самом деле, ничего ему не говори. Мы уже сказали всё, что хотели."
"These are from Denton? That man! He hurts my soul!\n\nHe wants me to desert my post! How presumptuous can a man be? And the worst part is that I so wish to do it. Perhaps it's a spell. No, I think he's a master psychologist. He's turned my thoughts against me.\n\nTell him I'll always ... Tell him that I would...\n\n<i>[Sir Fisk turns from you and waves you way.]</i>": "Это от Дэнтона? Этот человек! Он ранит мою душу!\n\nОн хочет, чтобы я покинул свой пост! Насколько же человек может быть самонадеянным? А самое худшее — мне так хочется это сделать. Может, это заклинание. Нет, я думаю, он мастер-психолог. Он повернул мои мысли против меня.\n\nСкажи ему, что я всегда... Скажи ему, что я бы...\n\n<i>[Сэр Фиск отворачивается от тебя и машет тебе рукой.]</i>"
"There are plants out there that pop out of the ground to eat people. They followed us here from the Spring Court of the Fae, and they don't even belong in this world! We've told the druids all about them, but they just laugh and say they're harmless. Harmless enough to have killed Pyrale last week! Mow them down, if you see them!": "Там растут растения, которые выскакивают из земли, чтобы съесть людей. Они пришли сюда из Весеннего Двора Фей и вообще не принадлежат этому миру! Мы рассказали о них друидам, но они только смеются и говорят, что они безвредны. Достаточно безвредны, чтобы убить Пирале на прошлой неделе! Скашивай их, если увидишь!"
"Thank you. Maybe my people can forage in safety now! Take this as a gift.": "Спасибо. Может быть, теперь мой народ сможет собирать припасы в безопасности! Прими это в подарок."
"When night happens, vicious Blinding Wasps come out. Sends the bees into hiding. Bees prefer sunlight anyway, but if there weren't so many wasps, I think they'd spend another hour or so working each day.\n\nSo anyway, I need you to kill wasps, and you can take your pick of reasons: for safety, or just to help me make more honey.": "Когда наступает ночь, выходят свирепые ослепляющие осы. Они заставляют пчёл прятаться. Пчёлы всё равно предпочитают солнечный свет, но если бы ос было меньше, думаю, они работали бы ещё час-другой каждый день.\\n\\nТак что мне нужно, чтобы ты убил ос, и можешь выбрать причину: ради безопасности или просто чтобы помочь мне сделать больше мёда."
"Good riddance, I say. I have a theory about those Doom Wasps south of here: I think they're the offspring of a wasp and a bee! Raina says that's impossible, the queen bee would just get killed by the wasps, not lay their eggs. But maybe it goes the other way! Hmm? Bees cozying up to a wasp queen? Interesting theory, right?\n\nAnyway, just another reason to make sure wasps are kept far from here.": "Слава богу, скажу я. У меня есть теория насчёт этих ос Судьбы к югу отсюда: я думаю, что они — потомство осы и пчелы! Райна говорит, что это невозможно, королева пчёл просто была бы убита осами, а не откладывала бы их яйца. Но может быть, всё наоборот! Хм? Пчёлы, подружившиеся с королевой ос? Интересная теория, правда?\n\nВ любом случае, ещё одна причина держать осы подальше отсюда."
"You closed the blood portal!": "Вы закрыли кровавый портал!"
"The bones of the First Thrall have been sucked dry, but they are still valuable. I just need... Refresh them! Yes. This could work.\n\nI have located another entrance to a secret basement beneath Statehelm. I believe this to be a storehouse for vampiric thralls that are... too far gone to live on the street. \"Lost thralls,\" they're called, but their blood is... potent. After years or even decades of vampiric feeding, they've become delectable and potent vessels. Not as delectable as my poor First Thrall, of course. ... But good enough to recharge these bones.\n\nThe entrance is in Rahu. I recall it being in a small house overlooking a lake.\n\nOh, while you are in there, I need a few other items.": "Кости Первого Рабы были высосаны досуха, но они всё ещё ценны. Мне просто нужно... Обновить их! Да. Это может сработать.\\n\\nЯ нашёл другой вход в секретный подвал под Стейтхелмом. Я полагаю, что это хранилище вампирских рабов, которые... слишком далеко зашли, чтобы жить на улице. Их называют «потерянными рабами», но их кровь... мощна. После многих лет или даже десятилетий вампирского питания они стали изысканными и сильными сосудами. Конечно, не такими изысканными, как мой бедный Первый Раб... Но достаточно хорошими, чтобы зарядить эти кости.\\n\\nВход находится в Раху. Я помню, что он в небольшом доме с видом на озеро.\\n\\nО, пока ты там, мне нужны ещё несколько вещей."
"I'll soak the First Thrall's bones in this fresh blood. With luck ... Well, luck has nothing to do with it! We need but wait. And partake of some of this delicious blood ... while it's still drinkable.\n\nFor your service, I shall teach you a blood-related vampiric power. Relish it, for it is your bloodrite!": "Я вымочу кости Первого Рабы в этой свежей крови. Если повезёт... Хотя удача тут ни при чём! Нам остаётся только ждать. И насладиться этой вкусной кровью... пока она ещё пригодна для питья.\n\nЗа твою службу я научу тебя вампирской силе, связанной с кровью. Наслаждайся ею, ведь это твоё кровное право!"
"I was ... um... \"sparring\" with Joeh yesterday and things got out of hand. I've been having nosebleeds off and on ever since. And I can't stand blood! Can you get me a more potent bandage?": "Вчера я... эм... «спарринговал» с Джо и всё вышло из-под контроля. С тех пор у меня периодически идут носовые кровотечения. А я не выношу кровь! Можешь достать мне более сильную повязку?"
"Thanks! This should do the job. Here, take these leftover simple bandages. Don't worry, they're not used!": "Спасибо! Этого должно хватить. Вот, возьми эти оставшиеся простые бинты. Не волнуйся, они не использованные!"
"Have you met Joeh over in Serbule? He's a dirty one, isn't he! I mean, I like to use food in the bedroom as much as the next elf, but his bacon fetish is... well, I shouldn't judge. I guess we all get a little crazy, so far from home! And I have to admit that some of his ideas sound intriguing. Did he tell you about the thing he does with the two boar tusks? It sounds painful to me, but I guess I have to try it: the bardic creed demands I gather lore! So... do you have any boar tusks, perchance?": "Вы встречали Джоэ в Сербуле? Он тот ещё грязнуля, правда! Я, конечно, люблю использовать еду в спальне не меньше любого другого эльфа, но его фетиш на бекон... ну, не мне судить. Полагаю, мы все немного сходим с ума так далеко от дома! И должен признать, некоторые его идеи звучат интригующе. Он рассказывал вам о той штуке, которую делает с двумя кабаньими клыками? По-моему, это звучит болезненно, но, полагаю, мне придётся попробовать: бардовский долг требует, чтобы я собирал знания! Так что... у вас случайно нет кабаньих клыков?"
"Ah, these tusks aren't as big as I'd feared! Okay, this won't be so bad. Did you want to join me in the lodge behind the inn? We can learn together... No? Well, suit yourself. Here. Take this money and stop judging!": "Ах, эти клыки не такие большие, как я боялся! Ладно, это не так уж плохо. Хочешь присоединиться ко мне в домике за трактиром? Мы можем учиться вместе... Нет? Ну, как хочешь. Вот. Возьми эти деньги и перестань осуждать!"
"These will be delightful decorations at my autumn festival!": "Это будут восхитительные украшения для моего осеннего фестиваля!"
"Hmm, running low on bone meal! Can you get me some more? The easiest way to get it is to rob tombs. Oh, it's okay, they aren't using it!\n\nTry the crypt at the back of the graveyard outside of town. It'll be pretty far in, since dumb old Marna already excavated all the easily-reached bone meal.": "Хм, у меня заканчивается костная мука! Можешь добыть ещё? Самый простой способ — ограбить могилы. Не волнуйся, они её не используют!\n\nПопробуй склеп в глубине кладбища за городом. Там её будет достаточно, ведь глупая старая Марна уже выкопала всю костную муку с лёгким доступом."
"Perfect! Thanks! You're good at this fetching stuff!\n\nLet me show you a couple little gardening tips.": "Отлично! Спасибо! Ты хорошо справляешься с доставкой!\n\nПозволь показать тебе пару небольших советов по садоводству."
"If I'm to quickly become a master of paleontology, I need a constant supply of bones to study! But I can't go collect the bones, since that would require me to stop studying. Perhaps you're for hire? I will pay you for 10 good old fossils.": "Если я хочу быстро стать мастером палеонтологии, мне нужен постоянный запас костей для изучения! Но я не могу сам собирать кости, потому что для этого мне пришлось бы прекратить учёбу. Может, тебя можно нанять? Я заплачу тебе за 10 хороших старых окаменелостей."
"You should have been more careful excavating these! If in doubt, leave some of the dirt behind. But these are still usable, so here: I understand this is your currency?": "Тебе следовало быть осторожнее при раскопках! Если сомневаешься, оставляй часть земли. Но эти ещё можно использовать, так что вот: я понимаю, это ваша валюта?"
"We are in need of more crossbows for our guards. I am low on materials. Can you bring me 10 Amazing Hunting Crossbows? I will share some knowledge with you in return.\n\n": "Нам нужно больше арбалетов для наших стражников. У меня мало материалов. Можешь принести мне 10 потрясающих охотничьих арбалетов? Взамен я поделюсь с тобой некоторыми знаниями."
"Thank you, this will do.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо, этого достаточно.\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"We need some premium bows for our advanced users. I am low on materials. Can you bring me 10 Awesome Hunting Bows? I will share some knowledge with you in return.\n\n": "Нам нужны отличные луки для наших опытных пользователей. У меня мало материалов. Можешь принести мне 10 потрясающих охотничьих луков? Взамен я поделюсь с тобой знаниями."
"Thank you, this will do.\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо, этого достаточно.\n\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"We are in need of more bows for our hunters. I am low on materials. Can you bring me 10 Quality Hunting Bows? I will share some knowledge with you in return.\n\n": "Нам нужно больше луков для наших охотников. У меня мало материалов. Можешь принести мне 10 качественных охотничьих луков? Взамен я поделюсь с тобой некоторыми знаниями."
"Zeratak and I wish to make a living selling our special alchemical brain elixirs. These are traditional psi-mantis recipes, but I am attempting to hone them to be less toxic to other races. I believe that the lobes from the brain bugs are too potent... instead, I wish to grind up their entire brains. Or any fully intact brains will do, actually. I am a scientist. I am not picky.": "Зератак и я хотим зарабатывать на жизнь, продавая наши особые алхимические эликсиры для мозга. Это традиционные рецепты пси-богомолов, но я пытаюсь усовершенствовать их, чтобы они были менее токсичны для других рас. Я считаю, что доли мозга жуков слишком сильны... вместо этого я хочу измельчить их целые мозги. Или подойдут любые полностью целые мозги. Я учёный. Я не придирчив."
"Yes! Perfect. I shall extract the pineal juice from these. Here, take my most recent concoction, and Bob's your Uncle as they say in your idiom. I do not know what that means.": "Да! Отлично. Я извлеку из них сосновый сок. Вот, возьми мою последнюю смесь, и как говорится у вас, «дело в шляпе». Я не знаю, что это значит."
"My people are not imaginative with their cooking. We pickle fish. That is what we do. But I yearn for more. I yearn for the delicacy known as Breaded Perch... With Onions. I crave it!": "Мой народ не отличается фантазией в кулинарии. Мы маринуем рыбу. Вот что мы делаем. Но я жажду большего. Я жажду деликатеса под названием Панированная Окунь... с луком. Я этого жажду!"
"This... is far too oniony. The breading is nice, though. Why did they have to add onion?! It would have been perfect with some lemon instead. I am somewhat disappointed. But at least I have finally eaten this famous dish. Thank you.\n\nHere, do you want this? I found it on a goblin that got too close to the river.": "Это... слишком луково. Панировка, правда, хорошая. Зачем же добавили лук?! Было бы идеально с лимоном. Я немного разочарован. Но, по крайней мере, я наконец попробовал это знаменитое блюдо. Спасибо.\n\nВот, хочешь это? Я нашёл это на гоблине, который слишком близко подошёл к реке."
"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Захватывающие плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Захватывающие дух длинные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Захватывающие стрелы из Резервуара. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Захватывающие стрелы-ловушки. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Brown Ale I've heard about. Flavor it up however you like!\n\n": "Рад встрече! Трудно устраиваться и варить, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого коричневого эля, о котором я слышал? Приправь его как тебе нравится!"
"Excellent! I should have a good feel for it after 10 of these. If you're headed over to Serbule from here, tell my cousin Gisli I said hello! You can't miss him... he's just as handsome as I am!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! После десяти таких у меня должно получиться. Если ты направляешься в Сербуль отсюда, передай моему кузену Гисли привет от меня! Ты его не пропустишь... он такой же красивый, как и я!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Dwarven Stout I've heard about. Flavor it up however you like!\n\n": "Рад встрече! Трудно устраиваться и варить, когда постоянно в движении. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого дворфийского стаута, о котором я слышал. Приправь его как тебе угодно!"
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Goblin Ale I've heard about. Flavor it up however you like!\n\n": "Рад встрече! Трудно устраиваться и варить, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого гоблинского эля, о котором я слышал. Приправь его как тебе угодно!"
"Excellent! I should have a good feel for it after 10 of these. What? Why do I have my plate armor on? Well, you never know when you may have to defend your drink!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! После десяти таких у меня должно получиться хорошо. Что? Почему я в латных доспехах? Ну, никогда не знаешь, когда придётся защищать свой напиток!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Pale Ale I've heard about. Flavor it up however you like!\n\n": "Рад встрече! Трудно устраиваться и варить пиво, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого светлого эля, о котором я слышал? Приправь его как тебе нравится!"
"Excellent! I should have a good feel for it after 10 of these. What? Why do I have my plate armor on? Well, you never know when you may have to defend your drink!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! После десяти таких у меня должно получиться. Что? Почему я в латных доспехах? Ну, никогда не знаешь, когда придётся защищать свой напиток!\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Porter I've heard about. Flavor it up however you like!\n\n": "Рад встрече! Трудно устраиваться и варить, когда постоянно в движении. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого портера, о котором я слышал? Приправь его как тебе нравится!"
"Excellent! I should have a good feel for it after 10 of these. If you're headed over to Serbule from here, tell my cousin Gisli I said hello! You can't miss him... he's just as handsome as I am!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! После десяти таких у меня должно получиться. Если ты направляешься в Сербуль отсюда, передай моему кузену Гисли привет от меня! Ты его не пропустишь... он такой же красивый, как и я!\n\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"This magical globe seems to be missing something. It responds to your touch, but doesn't seem to do anything useful. Perhaps if you had the missing parts.": "Этот магический шар, похоже, чего-то недостаёт. Он реагирует на твоё прикосновение, но, кажется, не выполняет ничего полезного. Возможно, если бы у тебя были недостающие части."
"You are relieved to see that the globe pieces magically snap into place, revealing a console inside!": "Вы с облегчением видите, как куски глобуса магически соединяются, открывая внутри консоль!"
"This reminds you of a playset that dwarven youth use when playing their \"tactical war games\". A large piece has been torn off.": "Это напоминает тебе игровой набор, который используют гномы для своих «тактических военных игр». Большой кусок оторван."
"As you reattach the skull to the playset, a key falls out of the skull!": "Когда вы прикрепляете череп обратно к игровой набору, из черепа выпадает ключ!"
"I have a pigeon with a broken wing, and I am in need of some supplies to try and heal it. There is a special realm where Phoenixes dwell that is occupied by the Fae.\nGo there and kill these creatures until you can get a good, undamaged phoenix feather. I can use the feather's regenerative abilities to help accelerate the healing process. Bring the feather back to me as soon as you can! I need it as fresh as possible.": "У меня есть голубь с переломанным крылом, и мне нужны припасы, чтобы попытаться его вылечить. Есть особое царство, где обитают фениксы, занятое феями. Отправляйся туда и убивай этих существ, пока не найдёшь хорошее, неповреждённое перо феникса. Я могу использовать регенеративные способности пера, чтобы ускорить процесс исцеления. Принеси перо мне как можно скорее! Мне нужно, чтобы оно было как можно свежее."
"Excellent! I'll get her wing wrapped up right away to start the healing.": "Отлично! Я сразу же забинтую её крыло, чтобы начать лечение."
"Mom always told me to forgive and forget my father. But I don't think she ever really did. And I sure as hell haven't! It gnaws at me, even now.\n\nI guess it's my orcish side, but I just think I'd be so much happier if he were dead!": "Мама всегда говорила мне прощать и забывать отца. Но я не думаю, что она когда-либо действительно это делала. И я уж точно нет! Это гложет меня даже сейчас.\n\nНаверное, это моя орочья сторона, но я просто думаю, что была бы намного счастливее, если бы он был мёртв!"
"He's dead? For real? You killed him for me? I... I don't know what to say. Here.\n\n<i>[Leah turns away to hide a tear.]</i>": "Он мёртв? Правда? Ты убил его для меня? Я... я не знаю, что сказать. Вот.\n\n<i>[Лия отворачивается, чтобы скрыть слезу.]</i>"
"I had some bug bombs in the back room, just in case roaches should show up again. But when I came in today, I found all my bug bombs had been punctured. But I think I can fix them! If I just had some some glue. And something to help reactivate it.": "У меня в подсобке были дымовые шашки от насекомых, на случай, если тараканы снова появятся. Но когда я пришёл сегодня, то обнаружил, что все мои шашки были проколоты. Но, думаю, я смогу их починить! Если бы у меня только был клей. И что-нибудь, чтобы помочь их снова активировать."
"There! I know a thing or two about bombs, and these bug bombs are now safely activated. Please use them to kill the bugs!": "Вот! Я кое-что понимаю в бомбах, и эти бомбочки от насекомых теперь безопасно активированы. Пожалуйста, используй их, чтобы уничтожить жуков!"
"Why don't we start with some target practice. When hitting multiple enemies, the ideal number to hit is three. But sometimes it's necessary to hit more. Try different densities and study the difference.\n\nThere's a metal dodecahedron outside. Stand in it and say 'Ossugazak 1'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>": "Давай начнём с тренировки меткости. При поражении нескольких врагов идеальное количество — три. Но иногда нужно поразить больше. Попробуй разные плотности и изучи разницу.\n\nСнаружи стоит металлический додекаэдр. Встань в него и скажи «Оссугазак 1». Это активирует тренировочную программу. Будь готов.\n\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Warmed up? Good. Let's try something challenging.": "Разогрелся? Хорошо. Давай попробуем что-то посложнее."
"Go on, get some target practice in.": "Давай, попрактикуйся в меткости."
"Chancellor Vexford did this to my shop. And he's watching, waiting for me to retaliate in some dumb way. That's why I need YOU to retaliate in some dumb way on my behalf! No, I'm kidding! Of course this isn't about retaliation. It's a business venture at his expense. It won't hurt anybody. I promise. Just get me the following items and you'll see.": "Канцлер Вексфорд сделал это с моей лавкой. И он наблюдает, ждёт, когда я отвечу какой-нибудь глупостью. Поэтому мне нужны ВЫ, чтобы ответить какой-нибудь глупостью от моего имени! Нет, я шучу! Конечно, дело не в мести. Это деловое предприятие за его счёт. Никто не пострадает. Обещаю. Просто добудьте мне следующие предметы, и сами увидите."
"He he he, this is going to work great! We'll thumb our noses at Vexford. Let me just get this ready for you.": "Хе-хе-хе, это отлично сработает! Мы насмехаемся над Вексфордом. Позволь мне подготовить это для тебя."
"Here. This is what I made from the parts you made. I know a bit of the art of sabotage. Take this with you and go get \"fed\" from the Cornucopia. It will redirect the system's teleportation point down into the sewer somewhere.\n\nDon't worry, they'll fix it soon enough. But for today, just today, there will be hungry people outside my shop.\n\nI've got the bread smell going. This is going to be a good sales day! Go go go!": "Вот. Это то, что я сделал из деталей, которые ты сделал. Я немного разбираюсь в искусстве саботажа. Возьми это с собой и иди получить «питание» из Рога изобилия. Это перенаправит точку телепортации системы куда-то в канализацию.\n\nНе волнуйся, скоро всё починят. Но сегодня, только сегодня, у моей лавки будут голодные люди.\n\nУ меня пахнет хлебом. Сегодня будет хороший день продаж! Вперёд, вперёд, вперёд!"
"Great work! Now get out of town! If the constabulary catches you, you'll be imprisoned. Fly, fool! Go!": "Отличная работа! Теперь убирайся из города! Если стража тебя поймает, тебя посадят в тюрьму. Беги, дурак! Иди!"
"I need to prepare cabbage soup for the town lunch. Can you get me fresh cabbage?": "Мне нужно приготовить капустный суп для городского обеда. Можешь достать мне свежую капусту?"
"Thanks! Hey, you're all right. Let me show you how to make cabbage soup. Just don't tell everybody how easy it is!": "Спасибо! Эй, ты молодец. Позволь показать тебе, как приготовить капустный суп. Только никому не говори, насколько это просто!"
"We don't really get much cheese in the fae realm. I mean, the troll-dogs are technically milkable, but... ugh. This world's cheeses are amazing! I had a bite of one that I'd love to try again. It was called 'camembert'. Do you have any?": "В царстве фей у нас почти нет сыра. Технически тролль-собак можно доить, но... фу. Сыры этого мира просто потрясающие! Я попробовал один, который хотел бы попробовать снова. Он назывался «камамбер». У тебя есть такой?"
"Thanks! I'm going to save this and share it with Yagreet later. She works so hard, you know? But hey, here. I brought it with me from the fae realm.": "Спасибо! Я сохраню это и потом покажу Ягрит. Она так усердно работает, знаешь? Но вот, держи. Я принес это из фейского мира."
"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Amazing Brisk Candles? I'll trade some of my knowledge and a token for it!": "Мне нужны свечи, чтобы вдохновить этих ребят сражаться усерднее, когда мы там и нам нужно готовиться к бою. Я всё ещё жду своё пособие от Оррана, чтобы купить материалы и сделать свои собственные. Не мог бы ты изготовить и принести мне 10 удивительных бодрящих свечей? В обмен я поделюсь частью своих знаний и дам жетон!"
"Mmmm smells nice and brisk! Thanks a lot! Maybe we can trade knowledge again like this later on.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ммм, пахнет приятно и свежо! Большое спасибо! Может, позже мы снова обменяемся знаниями таким образом.\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I need some candles to help kill the odor of musty crafters in our wagons! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Floral Candles? I'll trade some of my knowledge and a token for it!": "Мне нужны свечи, чтобы заглушить запах затхлых ремесленников в наших повозках! Я всё ещё жду своё пособие от Оррана, чтобы купить материалы и сделать свои собственные. Не могли бы вы изготовить и принести мне 10 неплохих цветочных свечей? В обмен я поделюсь частью своих знаний и дам жетон!"
"Mmmm smells flowery! Thanks a lot! Maybe we can trade knowledge again like this later on.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ммм, пахнет цветами! Большое спасибо! Может, мы ещё сможем так обмениваться знаниями позже.\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Brisk Candles? I'll trade some of my knowledge for it!": "Мне нужны свечи, чтобы вдохновить этих ребят сражаться усерднее, когда мы там и нам нужно готовиться к бою. Я всё ещё жду своё пособие от Оррана, чтобы купить материалы и сделать свои собственные. Не могли бы вы изготовить и принести мне 10 неплохих бодрящих свечей? В обмен я поделюсь частью своих знаний!"
"Mmmm bacon!! Thanks a lot! Maybe we can trade knowledge again like this later on.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ммм, бекон!! Большое спасибо! Может, позже мы снова обменяемся знаниями таким образом.\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I need to figure out how to get these fools more into nature. I'm still waiting on my stipend from Orran to go buy supplies. Could you craft and bring me 10 Rough Woodland Candles? I'll trade some of my knowledge for it!": "Мне нужно придумать, как сильнее увлечь этих дураков природой. Я всё ещё жду своё пособие от Оррана, чтобы купить припасы. Не мог бы ты изготовить и принести мне 10 грубых лесных свечей? В обмен я поделюсь с тобой частью своих знаний!"
"Mmmm nice and outdoorsy! Thanks a lot! Maybe we can trade knowledge again like this later on.\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ммм, приятно и по-натуральному! Большое спасибо! Может, позже мы снова обменяемся знаниями таким образом.\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I know how absurd it sounds! But cantaloupe wine is pretty good, if you follow my recipe exactly. See if you can master it.": "Я знаю, как нелепо это звучит! Но вино из канталупы довольно хорошее, если точно следовать моему рецепту. Попробуй освоить его."
"This is the cantaloupe wine? Cheers! You're a damned good alcoholer. And I should know! Here's a fruity recipe for you to try.": "Это вино из канталупы? Ваше здоровье! Ты чертовски хороший алкоголик. И я знаю, о чём говорю! Вот фруктовый рецепт, который тебе стоит попробовать."
"My mate Tryaka used to love cantaloupe for breakfast. But we can't get it here anymore. Sigh...": "Моя подруга Тряка раньше обожала дыню на завтрак. Но теперь мы больше не можем её здесь достать. Эх..."
"You found fresh cantaloupe?! You're amazing!": "Ты нашёл свежий канталуп?! Ты просто удивителен!"
"I wish I had some fresh cantaloupe...": "Хотелось бы мне свежего канталупа..."
"The best way to assault a ship is to kill the captain! Go kill Captain Evergloam!": "Лучший способ захватить корабль — убить капитана! Иди убей капитана Эверглоума!"
"You crazy bastard! You killed Captain Evergloam! Hahaha! Here, take this bounty of useless supplies as spoils of war!\n\nOf course, now the ship just has to sit here waiting for the captain to get back. BORRRINNNG. But maybe she'll get demoted! Oooh, or maybe you'll blow up the ship before she gets back! I'm excited to see what you do next!": "Ты сумасшедший ублюдок! Ты убил капитана Эверглоум! Ха-ха-ха! Вот, забирай эту награду из бесполезных припасов как трофей войны!\\n\\nКонечно, теперь кораблю придётся просто стоять здесь и ждать возвращения капитана. СКУУУЧНО. Но может, её понизят в звании! Ооо, а может, ты взорвёшь корабль до её возвращения! Мне не терпится увидеть, что ты сделаешь дальше!"
"I left my brother running our book store back in Statehelm. I need him to think I'm happy here! Otherwise he won't understand why I'm not ready to go home.\n\nI want to send Michael a package of treats and wonders from Rahu to show how amazing this place is. I have a list here... could you help me? If you get these items, I'll teach you a special organizational cantrip that we use in the book-sellers' trade.": "Я оставила брата управлять нашим книжным магазином в Стейтхелме. Мне нужно, чтобы он думал, что я счастлива здесь! Иначе он не поймёт, почему я не готова возвращаться домой.\n\nЯ хочу отправить Майклу посылку с угощениями и чудесами из Раху, чтобы показать, какой этот город удивительный. У меня есть список... не мог бы ты помочь мне? Если ты принесёшь эти предметы, я научу тебя особому организационному канспеллу, который мы используем в торговле книгами."
"Perfect! I'll also include some foods I've bought from Selaxi, and I'll get this package onto the next courier ship.\n\nLet me teach you a little spell we bookmasters use to keep bookshelves organized without having to walk everywhere!\n\n<i>[There is a new button on the Storage UI window, \"Stow Items in Nearby Storages\". Pressing this button will move items from your inventory into any nearby storage, provided there's at least one of that item in the storage already.]</i>": "Отлично! Я также положу туда немного еды, которую купил у Селакси, и отправлю эту посылку на следующий курьерский корабль.\n\nПозволь научить тебя небольшому заклинанию, которым мы, книжники, пользуемся, чтобы поддерживать порядок на книжных полках, не ходя повсюду!\n\n<i>[В окне хранилища появилась новая кнопка «Убрать предметы в ближайшие хранилища». Нажатие этой кнопки переместит предметы из твоего инвентаря в любое ближайшее хранилище, если в нём уже есть хотя бы один такой предмет.]</i>"
"I have family back in Sedgewick Forest: my lovely wife, our bear, and three gobs. But the clan infighting is too dangerous there. I need to make it big here so I can bring my family over. In the short term, though, I need to send back resources that my wife can turn into weapons. Have you come across any carnelians? They're perfect for making magic swords. Say, a half-dozen of them?": "У меня есть семья в лесу Седжуик: моя любимая жена, наш медведь и три гоба. Но межклановые распри там слишком опасны. Мне нужно добиться успеха здесь, чтобы привезти семью сюда. А пока что мне нужно отправить ресурсы, из которых моя жена сможет сделать оружие. Ты случайно не встречал карнелианов? Они идеально подходят для создания магических мечей. Сможешь добыть штук шесть?"
"Carnelians! Give them to me! Hahaha! Here, take this trinket. We're even! No debts!": "Карнелианы! Отдайте их мне! Ха-ха-ха! Вот, забирай этот безделушку. Мы квиты! Без долгов!"
"I'm working on becoming a better botanist! It's not as exciting as hunting, but I'm doing what I can. My biggest focus right now is on the carnivines, which are super amazing plants. They have a top area that's like a head, and they grow plates in their head that look like teeth! That's super strange, right? Can you get me some? The teeth, I mean. I need samples from several different carnivines so I can compare them.\n\nYou'll find carnivines most commonly when daytime happens -- they burrow into the ground at night.": "Я стараюсь стать лучше в ботанике! Это не так захватывающе, как охота, но я делаю, что могу. Мой главный интерес сейчас — плотоядные растения, которые просто удивительны. У них сверху есть что-то вроде головы, и в этой голове растут пластины, похожие на зубы! Это очень странно, правда? Ты можешь достать мне несколько? Зубы, я имею в виду. Мне нужны образцы от нескольких разных плотоядных растений, чтобы я мог их сравнить.\n\nПлотоядные растения чаще всего встречаются днём — ночью они зарываются в землю."
"Hmm, these teeth aren't terribly sharp. I mean they cut flesh, but they aren't razor sharp... hmm. That probably means something. But it turns out I know almost nothing about botany, so I'm not sure what to make of it. Oh well. I give up. But not on you! You did great!": "Хмм, эти зубы не слишком острые. Они, конечно, режут плоть, но не лезвие острые... хмм. Наверное, это что-то значит. Но, как оказалось, я почти ничего не знаю о ботанике, так что не уверен, что из этого понять. Ладно, сдаюсь. Но не по отношению к тебе! Ты отлично справился!"
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride, even our really good chairs. If you can provide us with 10 Amazing Chairs, I can show you a few tricks to help with building better ones in the future!\n\n": "Эй, ты! Есть настроение что-нибудь построить? Многие наши стулья сломались по дороге сюда из-за тряской поездки, даже наши очень хорошие стулья. Если ты сможешь принести нам 10 Удивительных стульев, я покажу тебе пару приёмов, которые помогут в будущем делать стулья получше!"
"Thank you so much. These chairs are... amazing! No really, nice work! I'm gonna swipe one of these to use in my tent!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Эти стулья... потрясающие! Серьёзно, отличная работа! Я утащу один из них для своей палатки!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Astounding Storage Crates, I can show you a few tricks to help with building better ones in the future!\n\n": "Эй, ты! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополнение наших товаров. Если ты сможешь предоставить нам 10 поразительных складских ящиков, я покажу тебе пару приёмов, которые помогут в будущем делать ящики получше!"
"Thank you so much. Can't have everything just bouncing around loose on the wagons!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Нельзя же, чтобы всё просто болталось по телегам!\n\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Crude Storage Crates, I can show you a few tricks to help with building better ones in the future!\n\n": "Эй, ты! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополнение наших товаров. Если ты сможешь предоставить нам 10 грубых складских ящиков, я покажу тебе пару приёмов, которые помогут в будущем делать ящики получше!"
"Thank you so much. Can't have everything just bouncing around loose on the wagons!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Нельзя же позволять всему болтаться по повозкам!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Nice Storage Crates, I can show you a few tricks to help with building better ones in the future!\n\n": "Эй, ты! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополнение наших товаров. Если ты сможешь предоставить нам 10 Хороших ящиков для хранения, я покажу тебе пару приёмов, которые помогут в будущем делать ящики получше!"
"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride. If you can provide us with 10 Shoddy Chairs, I can show you a few tricks to help with building better ones in the future!\n\n": "Эй, ты! Есть настроение что-нибудь построить? Многие наши стулья сломались по дороге сюда из-за тряской поездки. Если ты сможешь предоставить нам 10 плохих стульев, я покажу тебе пару приёмов, которые помогут в будущем делать стулья получше!"
"Thank you so much. They're not great chairs, but it's better than sitting on the ground!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо. Это не лучшие стулья, но всё же лучше, чем сидеть на земле!\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Sometimes you need an earthy wine, and carrot does the trick! Have you made any?": "Иногда нужно землистое вино, и морковь отлично подходит! Ты уже делал такое?"
"Wow! You can really smell the earth the carrots grew in! Definitely different, eh? ... Let's move on.": "Вау! Ты действительно чувствуешь запах земли, в которой росли морковки! Определённо другой, да? ... Пойдём дальше."
"Recently while tuning up our portal system, we accidentally connected to a series of caves beneath Eltibule. These oddly-dark caves are inaccessible except via teleportation, yet there are numerous bipedal denizens! I believe there is significant magical power hidden in the caves, but the Queen won't allow me to send a mantis assault team in, fearing they'd just be outnumbered and killed. That's why we need you!\n\nSince you and your friends are roughly bipedal, perhaps you can blend in with the other bipeds and scout out the place. Barring that, of course, you should fight desperately for your lives, because the bipeds seem to be mentally ill and quite homicidal.\n\nI have located a few potential sources of magical energy in the caves, so go retrieve them! The teleportation attendant can send you into these caves if you ask him early enough today.\n\n<i>[A group of 4+ level 40+ players recommended.]</i>": "Недавно, настраивая нашу систему порталов, мы случайно подключились к серии пещер под Элтибулом. Эти странно тёмные пещеры недоступны, кроме как через телепортацию, но там обитает множество двуногих существ! Я считаю, что в пещерах скрыта значительная магическая сила, но Королева не разрешает мне отправлять туда отряд мантов, опасаясь, что их просто перебьют и убьют. Вот почему нам нужен ты!\n\nПоскольку ты и твои друзья примерно двуногие, возможно, вы сможете слиться с другими двуногими и разведать место. В противном случае, конечно, вам придётся отчаянно сражаться за свои жизни, потому что двуногие, похоже, психически больны и весьма убийственны.\n\nЯ обнаружил несколько потенциальных источников магической энергии в пещерах, так что отправляйся и забери их! Служащий телепортации может отправить тебя в эти пещеры, если ты попросишь его достаточно рано сегодня.\n\n<i>[Рекомендуется группа из 4+ игроков уровня 40+.]</i>"
"Wonderful work. You are a truly adequate biped. Please accept this as payment.": "Прекрасная работа. Ты действительно достойный двуногий. Прими это в качестве оплаты."
"As you know, the land of Kur hides tremendous secrets, and we yearn to have the powers rumored to hide in the caves there. We've recently managed to teleport directly into a certain underground cave in Kur, but even though it's underground, it is still too cold for mantises to function optimally. Since you and your friends are generally mammalian, we expect you will have a much easier time. Ignore the woolly bipeds in the upper caverns and seek out the lowest levels of the caves. Certain creatures there may hold the secrets of Kur. You should recognize these secrets when you see them! The teleportation attendant can send you to the cave if you ask today.\n\n<i>[A group of 3+ level 40+ players recommended.]</i>": "Как вы знаете, земля Кур скрывает огромные тайны, и мы жаждем обладать силами, о которых ходят слухи, что они спрятаны в пещерах там. Недавно нам удалось телепортироваться прямо в одну подземную пещеру в Кур, но хотя она и под землёй, там всё ещё слишком холодно для оптимальной работы богомолов. Поскольку вы и ваши друзья в основном млекопитающие, мы ожидаем, что вам будет гораздо легче. Игнорируйте шерстистых двуногих на верхних уровнях пещер и ищите самые нижние уровни. Некоторые существа там могут хранить тайны Кура. Вы должны распознать эти тайны, когда увидите их! Служащий телепортации может отправить вас в пещеру, если вы попросите сегодня.\n\n<i>[Рекомендуется группа из 3+ игроков уровня 40+.]</i>"
"This is an interesting assortment of artifacts you've brought me. I will send these off for study but for now I shall take your word for it that they are magical, and compensate you accordingly.": "Это интересный набор артефактов, который ты мне принес. Я отправлю их на исследование, но пока верю тебе на слово, что они магические, и соответствующим образом тебя вознагражу."
"I've had Irkima study the available lore on the fae realm and he found an interesting detail. Some of the leaders of the Winter Queen's forces are granted the title of 'Puck', along with associated powers. And to prove their puckhood they are given a badge made of ice. Or crystal. Or icy crystal. Anyway, we need some of those badges. They may hold the secret to infinite power!\n\nIt has taken much influence on my part, but I've convinced the teleportation attendant to send you to the Winter Nexus itself. But go quickly before he tires of maintaining the link to such a distant place!\n\n<i>[A group of 4+ level 40+ players recommended.]</i>": "Я поручил Иркиме изучить доступные сведения о мире фей, и он обнаружил интересную деталь. Некоторым из лидеров сил Зимней Королевы присваивается титул «Пак», вместе с соответствующими способностями. И чтобы доказать своё пакство, им дают знак изо льда. Или кристалла. Или ледяного кристалла. В любом случае, нам нужны такие знаки. Возможно, в них скрыт секрет бесконечной силы!\n\nМне пришлось приложить много усилий, но я убедил служащего телепортации отправить тебя прямо в Зимний Нексус. Но поспеши, пока он не устал поддерживать связь с таким отдалённым местом!\n\n<i>[Рекомендуется группа из 4+ игроков уровня 40+]</i>"
"This is it? Hmm. They are not ice. They're just strangely chilly. This is disappointing. But I do not blame the messenger for the message; here is an appropriate reward.": "Это оно? Хмм. Это не лёд. Они просто странно холодные. Разочаровывает. Но я не виню посланника за сообщение; вот заслуженная награда."
"The first major success *and* failure of our Teleportation Technology department came two years ago when we reached a warm cave complex beneath Kur. Kur has always been a land of mystery to us, for it is too cold to support true life -- mantis life. But this cave was warmer! And so we sent in two squads of servant mantises to subdue the caves. Instead... they took up residence among the other creatures. They rebelled! This was a huge setback to teleportation magic, and even today I dare not send more mantises into that cave. But you and your friends will not be tricked by whatever wonders lie in there! You can complete the original mission from years ago! I have bribed the teleportation technician to send you there, so long as you ask quickly.\n\n<i>[A group of 3+ level 40+ players is recommended.]</i>": "Первый крупный успех *и* провал нашего отдела телепортационной технологии произошёл два года назад, когда мы достигли тёплого комплекса пещер под Куром. Кур всегда был для нас землёй загадок, потому что там слишком холодно для настоящей жизни — жизни богомолов. Но эта пещера была теплее! Поэтому мы отправили две группы слуг-богомолов, чтобы подчинить пещеры. Вместо этого... они поселились среди других существ. Они восстали! Это был огромный удар для телепортационной магии, и даже сегодня я не осмеливаюсь посылать туда больше богомолов. Но ты и твои друзья не попадётесь на уловки чудес, что там скрываются! Вы можете выполнить первоначальную миссию тех лет! Я подкупил техника по телепортации, чтобы отправить вас туда, если вы быстро попросите.\\n\\n<i>[Рекомендуется группа из 3+ игроков уровня 40+.]</i>"
"These are the 'power sources' the original team was sent for? Hm... I have doubts about these items' potency. But in any case you have accomplished the task well! And I hope that you didn't mind my little addition to the task-list. Those turnwing mantises deserved death! I have added some additional compensation for dispatching justice.": "Это те самые «источники энергии», за которыми отправлялась первоначальная команда? Хм... У меня есть сомнения насчёт силы этих предметов. Но в любом случае ты хорошо справился с заданием! И надеюсь, ты не возражаешь против моего маленького дополнения к списку задач. Эти стрекозы-перевертыши заслуживали смерти! Я добавил дополнительное вознаграждение за осуществление правосудия."
"I know a lot of weird rituals, but even I don't know what they want this for. Some of these should be easy to find, and some... less so. ": "Я знаю много странных ритуалов, но даже я не понимаю, зачем им это нужно. Некоторые из них должно быть легко найти, а некоторые... сложнее."
"This puts me in a tailspin!\n\nGet it?": "Это вводит меня в замешательство!\n\nПонял шутку?"
"We have a lot of beer stored away here from the previous tenants. And I know how to summon Council Rations, which are just barely enough to keep us all alive. But I would kill for something else to eat! This is a cave, so you'd think you could catch cave fish in here, right? But no. No deep water, no cave fish. Can you get us some?": "У нас здесь хранится много пива, оставшегося от прежних жильцов. И я знаю, как призывать Паёк Совета, которого едва хватает, чтобы мы все не умерли с голоду. Но я бы убил за что-нибудь другое съестное! Это пещера, так что можно подумать, будто здесь можно ловить пещерную рыбу, верно? Но нет. Нет глубокой воды — нет и пещерной рыбы. Можешь раздобыть нам немного?"
"Okay... remind me, if you would: why in the FUCK did I ask you for cave fish? I should have asked for a tastier fish! Damn it! Damn it! Cave fish taste like feet. But what's done is done. Here, take these: some of my best throwing knives. And don't give me any lip, those are valuable! Learn to throw a knife, why don'tcha?": "Ладно... напомни мне, если не трудно: зачем, чёрт возьми, я просил у тебя пещерных рыб? Мне следовало попросить что-то по вкуснее! Чёрт побери! Чёрт побери! Пещерные рыбы на вкус как ноги. Но что сделано — то сделано. Вот, возьми эти: одни из моих лучших метательных ножей. И не спорь со мной, они ценные! Научись метать нож, а?"
"While I was exploring Foothills Cave, I uncovered mummies. I think orcs buried an army of mummies in there after a war and forgot about them. Well, you know how we dwarves feel about mummies! So I killed a few, but there were so many other nasty undead in that cave that I had to retreat. Can you go back in there and get rid of a bunch?": "Пока я исследовал Пещеру Предгорий, я наткнулся на мумий. Думаю, орки похоронили там армию мумий после войны и забыли о них. Ты же знаешь, как мы, дворфы, относимся к мумиям! Так что я убил несколько, но в той пещере было так много другой мерзкой нежити, что мне пришлось отступить. Можешь вернуться туда и избавиться от них?"
"Good work. Here's a bit of money as a thank-you. And if you decide to go back in there and destroy more mummies, bring me their wrappings. We have a priesthood back in Aufghel that can consecrate the wrappings... we think it might help release the mummys' souls from their purgatory.\n\n<i>[A new Barter option has been added.]</i>": "Хорошая работа. Вот немного денег в знак благодарности. Если решишь вернуться туда и уничтожить ещё мумий, принеси мне их бинты. У нас в Ауфгеле есть священники, которые могут освятить бинты... мы думаем, это может помочь освободить души мумий из чистилища.\n\n<i>[Добавлена новая опция торговли.]</i>"
"I love these eyeless fish: no judgemental stare while cooking it!": "Я обожаю этих бесглазых рыб: никакого осуждающего взгляда, пока готовишь их!"
"I'm in the mood for something simple. Please bring me a cavefish supper. A FRESH cavefish supper, mind you! I'm eating simply, not poorly!": "Я настроен на что-нибудь простое. Пожалуйста, принеси мне ужин из пещерной рыбы. И СВЕЖИЙ ужин из пещерной рыбы, имей в виду! Я питаюсь просто, а не плохо!"
"Well... It's not bad. Definitely fresh. Better than I expected from a place like this!": "Ну... Неплохо. Определённо свежо. Лучше, чем я ожидал от такого места!"
"When will my cavefish supper be ready? Don't tell me you're catching the cavefish now!": "Когда будет готов мой ужин из пещерной рыбы? Не говори, что ты сейчас ловишь пещерную рыбу!"
"I'm working on an extremely interesting new spell, and to further my research, I need special reagents.\n\nWhat I need are bones that have been superheated while still in the body of a living creature. Don't worry, I've researched just the right spell to help you get these -- I'll teach you the spell, when you have the capacity to learn it.\n\nOnce you know the spell, use it on some humans, elves, or rakshasa to collect perfectly charred femurs. ... And make sure to only kill those deserving of death. Obviously.": "Я работаю над чрезвычайно интересным новым заклинанием, и для дальнейших исследований мне нужны особые реагенты.\\n\\nМне нужны кости, которые были сверхнагреты, пока ещё находились в теле живого существа. Не волнуйся, я изучил именно то заклинание, которое поможет тебе получить их — я научу тебя этому заклинанию, когда у тебя будет возможность его освоить.\\n\\nКак только ты узнаешь заклинание, используй его на людях, эльфах или ракшасах, чтобы собрать идеально обожжённые бедренные кости. ... И убедись, что убиваешь только тех, кто заслуживает смерти. Очевидно."
"Black as soot and twice as sooty. These will help me find the perfect ratios for my new spell.": "Чёрные как сажа и вдвое более сажистые. Они помогут мне найти идеальные пропорции для моего нового заклинания."
"You aren't racist, are you? The next one's a goblin. Don't kill him! He's the best helm-enchanter I know! Not exactly a friend, but he's friendly as far as goblins go. He went to visit his old \"tribe\", and ended up moving into some castle.\n\nI'm worried he's doing stuff that will get him killed. You know, normal goblin stuff. Go see how he is. He's staying in a place called \"Hogan's Keep\". It's somewhere in Eltibule.\n\nIn return, I'll help you convince the little bastard to train you in his secretive craft skill.": "Ты не расист, надеюсь? Следующий — гоблин. Не убивай его! Он лучший зачарователь шлемов, которого я знаю! Не совсем друг, но для гоблинов он довольно дружелюбен. Он навестил свою старую «племя» и в итоге поселился в каком-то замке.\n\nЯ боюсь, что он занимается делами, которые могут привести к его смерти. Знаешь, обычные гоблинские дела. Сходи и узнай, как у него дела. Он живёт в месте под названием «Хоганский замок». Это где-то в Элтибуле.\n\nВзамен я помогу тебе убедить этого мелкого ублюдка обучить тебя своему секретному ремеслу."
"I'm glad Gribburn hasn't gotten himself killed by an overzealous human. It sounds like he's found a sweet setup for himself, too!\n\nBut if he's going to live in some castle, that means I need more people who know how to do what he does. Say... are you a crafter? Why don't you learn his techniques? If he refuses to teach you, tell him that I'll have him killed! He'll think that's a hilariously bad bluff, and his levity will give you an opening to negotiate.\n\nIt'll work. Goblins are incredibly predictable. Trust me.": "Я рад, что Грибберн не погиб от рук слишком рьяного человека. Похоже, он нашёл для себя отличное место!\n\nНо если он собирается жить в замке, значит мне нужны ещё люди, умеющие делать то, что он умеет. Скажи... ты ремесленник? Почему бы тебе не освоить его техники? Если он откажется тебя учить, скажи ему, что я прикажу его убить! Он подумает, что это смешной блеф, и его легкомыслие даст тебе возможность для переговоров.\n\nЭто сработает. Гоблины невероятно предсказуемы. Поверь мне."
"Ah, Nightshade, I'd forgotten about him. He was a good business partner, but then he went and got a guild of human assassins after him. Tell him that his concern is appreciated, but misplaced. We've both moved on. I'm going to stay here: free food and a bed, and nobody's trying to kill me!": "Ах, Найтшейд, я о нём забыл. Он был хорошим деловым партнёром, но потом на него натравили гильдию человеческих убийц. Скажи ему, что его забота ценится, но неуместна. Мы оба уже двинулись дальше. Я останусь здесь: бесплатная еда и кровать, и никто не пытается меня убить!"
"Malgath was staying here with us at first, but one day he came back from hunting and said he was \"infected\". Said he had to go take care of his infection, and he moved into a cave not too far from here. I went to check on him a week ago, and the cave is full of wolves! Couldn't get very far in there. I guess he's dead... but if you find him in there, let me know. If he's still alive, I'll help you convince him to train you.": "Малгат сначала жил здесь с нами, но однажды он вернулся с охоты и сказал, что «заражён». Сказал, что должен заняться своей инфекцией, и переехал в пещеру недалеко отсюда. Неделю назад я ходил проверить, как у него дела, но пещера полна волков! Я не смог зайти туда далеко. Думаю, он мёртв... но если найдёшь его там, дай знать. Если он ещё жив, я помогу тебе убедить его обучить тебя."
"Malgath caught lycanthropy from a wolf?! What a moron! That's sexually transmitted, right? So he just went out and humped a wolf in the woods?! I didn't think rakkies went for that sort of... what? Oh. Transmitted through <i>bites</i>? So any of the wolves out there could be infected? Well, that's terrifying!\n\nI guess we just wait and see if Malgath retains his sanity. Hmm, are you a crafter by trade? If so, maybe you should go learn anything he's willing to teach you... while he's still sane. If he's reluctant to train you, tell him Nightshade is calling in a favor.": "Малгат заразился ликантропией от волка?! Какой идиот! Это же передаётся половым путём, да? Значит, он просто пошёл в лес и трахнулся с волком?! Я думал, ракки на такое не идут... что? О, передаётся через <i>укусы</i>? Значит, любой из волков там может быть заражён? Ну, это страшно!\n\nПохоже, нам остаётся только ждать и смотреть, сохранит ли Малгат рассудок. Хм, ты ремесленник по профессии? Если да, возможно, стоит пойти и научиться у него всему, чему он готов тебя научить... пока он ещё в здравом уме. Если он не захочет тебя обучать, скажи, что Найтшейд зовёт за это должок."
"Nightshade sent you? Well, at least he didn't come after me himself. He'd die! Tell him I'm fine. I'm just infected with lycanthropy. I'm a werewolf now. I've just got to get this under control, and if I succeed, I'll come find him.": "Найтшейд послал тебя? Ну, хоть он сам за мной не пришёл. Он бы умер! Скажи ему, что со мной всё в порядке. Я просто заражён ликантропией. Теперь я оборотень. Мне нужно взять это под контроль, и если у меня получится, я сам его найду."
"Well, I'll tell you about Poe, but I don't expect you'll be able to find him. He's a myconian. A mushroom man! Weirdest thing I've ever seen wield a jeweler's hammer, I assure you! He was never part of our guild, but we invited him to come with us anyway. Sadly, he refused: he hates the cold. Can't blame him. He said he was going home, \"under the ground in Serbule.\" So I guess you go there and start digging? How big is Serbule anyway?\n\nDo this for me, and I'll put in a good word with you to Poe!": "Ну, я расскажу тебе про По, но не думаю, что ты сможешь его найти. Он миконианин. Грибной человек! Самое странное существо, которое я когда-либо видел с ювелирным молотком, уверяю тебя! Он никогда не был членом нашей гильдии, но мы всё равно пригласили его пойти с нами. К сожалению, он отказался: он ненавидит холод. Не могу его винить. Он сказал, что возвращается домой, «под землёй в Сербуле». Так что, думаю, тебе туда и идти, и начинать копать? Кстати, насколько большой Сербуль?\n\nСделай это для меня, и я хорошо о тебе расскажу По!"
"You found Poe! I'm glad he's alive. How many oils did he send back with you? ... None at all?! You went all that way and got nothing for me?!\n\nNo, no, I'm not angry. I'm just very disappointed. Hm. Why don't you go back and ask him to teach you his techniques? I bet you'd be a faster crafter than a myconian could ever be!": "Вы нашли По! Я рад, что он жив. Сколько масел он прислал с тобой? ... Ни одного?! Ты прошёл весь этот путь и ничего для меня не привёз?!\n\nНет, нет, я не злюсь. Я просто очень разочарован. Хм. Почему бы тебе не вернуться и не попросить его научить тебя своим техникам? Бьюсь об заклад, ты станешь быстрее ремесленником, чем любой микониан!"
"Nightshade? Oh, the overworlder that named itself after a plant. I remember. I like Nightshade. Tell Nightshade that I am well, and that I am grateful for the concern.": "Найтшейд? О, обитатель верхнего мира, который назвал себя в честь растения. Помню. Мне нравится Найтшейд. Передай Найтшейду, что у меня всё хорошо и я благодарен за заботу."
"The easiest of my friends to find would probably be Syndra. She's in this frozen hell-hole somewhere. She said she'd found a shack or a barn or something, and it had a magical fire to keep her warm. That's all I know. But it's out there somewhere!\n\nFind her, report back to me, and I'll help you convince her to train you in her special craft skill.": "Самую лёгкую из моих друзей, вероятно, найти — это Синдру. Она где-то в этой замёрзшей дыре. Она говорила, что нашла хижину или сарай или что-то в этом роде, и там был магический огонь, чтобы согреться. Вот всё, что я знаю. Но это где-то там!\n\nНайди её, доложи мне, и я помогу тебе убедить её обучить тебя её особому ремеслу."
"You found her and she's okay? Great! Are you a crafter? If so, I bet she'd be happy to teach you her craft. Tell her I vouch for you. If she needs proof, tell her you know her old guild nickname: \"Frisky Ferret\".": "Вы нашли её, и с ней всё в порядке? Отлично! Ты ремесленник? Если да, уверен, она с радостью научит тебя своему ремеслу. Скажи ей, что я поручаюсь за тебя. Если ей нужны доказательства, скажи, что ты знаешь её старое прозвище в гильдии: «Игривый хорёк»."
"Huh? Nightshade sent you? Really? Well... tell him thanks. I'm okay. Just... cold and miserable.": "А? Найтшейд послал тебя? Правда? Ну... передай ему спасибо. Со мной всё в порядке. Просто... холодно и противно."
"Ever been to the Ilmari Desert? Well, there's a town in the desert called Amulna. In this town is a wolf. Well, more specifically, he's a werewolf. But he's one of the good ones. He has some great merchant contacts and gets us a lot of supplies. This care package includes some money we owe him.": "Когда-нибудь бывал в пустыне Илмари? Там есть город под названием Амулна. В этом городе живёт волк. Точнее, оборотень. Но он из хороших. У него отличные торговые связи, и он доставляет нам много припасов. В этой посылке есть деньги, которые мы ему должны."
"Yeah, I knew Lumpfuzz wouldn't be happy. That's all the cash I had right now! But don't worry about what he said: he'll buy the stuff we need with his own money. He's a good wolf.": "Да, я знал, что Лампфазз не обрадуется. Это все деньги, что у меня были! Но не переживай из-за его слов: он купит всё, что нам нужно, на свои деньги. Он хороший волк."
"So that weasely fox finally decides to pay me, huh? Hold it... I can tell by the weight that there's not enough money here! This is only half the money! And Tangle has the balls to include a new list of stuff he needs?! Tell that deadbeat dog that I'm not buying him anything more until I get my cash. I already give the Wardens a 50% discount. That means I already lose money on every sale! Does he want to ruin me? I mean fuck me, I'm a businesswolf, not a charity!": "Так эта лиса-хитрюга наконец-то решила мне заплатить, да? Постой... По весу видно, что денег здесь недостаточно! Это только половина суммы! И у Тэнгла хватает наглости добавить новый список нужных вещей?! Скажи этому бездельнику, что я ничего ему больше не продам, пока не получу свои деньги. Я уже даю Хранителям скидку 50%. Это значит, что я уже теряю деньги на каждой продаже! Он хочет меня разорить? Чёрт возьми, я бизнес-волк, а не благотворитель!"
"Check in on Norbert for me, will you? I know you've met him already in Sun Vale. He's a good pig. Used to run missions with us, but some of his friends died in the big massacre, and he's been a lot more distant since then. Take this stuff to show we still care, that sort of thing.": "Проведай Норберта от моего имени, ладно? Я знаю, вы уже встречались с ним в Солнечной Долине. Он хороший свин. Раньше ходил с нами на задания, но несколько его друзей погибли в той большой бойне, и с тех пор он стал гораздо более замкнутым. Отнеси ему эти вещи, чтобы показать, что нам всё ещё не всё равно, ну и всё такое."
"Norbert used to make the trip out here every week! It's a long journey, but he came out here hundreds of times. And after the massacre... he's come over maybe twice.\n\nI think this is his way of mourning. So we'll give the pig time to mourn his dead friends. I mean, it's not like I need time to mourn too. No. I only LOST MY SON in the massacre! I could use a helping hoof too! ... \n\nSorry. You don't need to hear this. Me and Norbert go way back, and I'm a little upset. Just... give me time to mourn, too. I'll be fine.": "Норберт раньше ездил сюда каждую неделю! Это долгий путь, но он приезжал сюда сотни раз. А после резни... он приходил, может быть, два раза.\n\nДумаю, так он выражает своё горе. Так что дадим свинье время оплакать своих погибших друзей. Я же не нуждаюсь в времени, чтобы оплакать тоже. Нет. Я просто ПОТЕРЯЛ СВОЕГО СЫНА в той резне! Мне тоже нужна поддержка! ...\n\nПрости. Тебе не нужно это слышать. Мы с Норбертом знакомы давно, и я немного расстроен. Просто... дай и мне время оплакать. Со мной всё будет в порядке."
"So you're all settled in with the Wardens now, huh? I knew you'd like being a Warden! I mean, the perks are pretty great. Bounceweed doesn't do much for pigs, but my Warden powers let me FLY! Very briefly. By the way, make sure to land safely before the spell wears off.\n\nHmm? Oh, yeah, I'm still active! I'm just... focusing on Sun Vale right now. There's lots of talking animals right here, you know!": "Так ты теперь полностью устроился у Хранителей, да? Я знал, что тебе понравится быть Хранителем! Плюшки действительно классные. Прыжковая трава не особо помогает свиньям, но мои силы Хранителя позволяют мне ЛЕТАТЬ! Очень недолго. Кстати, обязательно приземляйся безопасно, прежде чем заклинание закончится.\n\nЧто? О, да, я всё ещё активен! Просто сейчас я сосредоточен на Солнечной Долине. Здесь полно говорящих животных, знаешь ли!"
"We need to check in on some of our spy network members. These are animals in distant lands that work with us. They aren't all members of the Wardens, but they're entrusted with our secret communication ritual.\n\nStart by checking in with a cow in Eltibule. I don't know her name... she's never given us one. But she says she's the only talking cow in her herd, so... see what you can do. Take this care package to her. It's some stuff she asked for a while back.": "Нам нужно проверить некоторых членов нашей шпионской сети. Это животные в дальних землях, которые работают с нами. Они не все являются Стражами, но им доверен наш секретный ритуал связи.\n\nНачни с проверки коровы в Элтибуле. Я не знаю её имени... она никогда нам его не давала. Но она говорит, что она единственная говорящая корова в своём стаде, так что... посмотри, что сможешь сделать. Отнеси ей эту посылку с припасами. Это то, что она просила некоторое время назад."
"She's still alive? Great. Did she like the stuff? Oh. Well, I got it third-hand from a wolf in the desert, so... I did my best. Thanks for doing the delivery.": "Она всё ещё жива? Отлично. Ей понравилось? Ох. Ну, я получил это из третьих рук от волка в пустыне, так что... я старался. Спасибо, что доставил."
"Oh, you're doing deliveries for the Wardens? Hey, that's the stuff I asked for! ... What is this? This is a milking device for goats! Not cows! How can you mix these up? Our udder shape isn't even similar!\n\nTell him thanks for the clover and salt, but I still need a milk storage device FOR COWS.\n\nAnd more clover than this!": "О, ты делаешь доставки для Стражей? Эй, это то, что я просил! ... Что это? Это доильный аппарат для коз! Не для коров! Как ты мог перепутать? Форма вымени у нас совсем другая!\n\nПередай ему спасибо за клевер и соль, но мне всё ещё нужен контейнер для хранения молока ДЛЯ КОРОВ.\n\nИ больше клевера, чем это!"
"This one's hard. Ever heard of the Gazluk Plateau? Well, Trekker the pig is in the northeast-ish part of the mountains. You'll have to climb up from the valley into the mountains to find him. Bring warm clothes.": "Это непросто. Слышали о плато Газлук? Свин Треккер находится в северо-восточной части гор. Чтобы найти его, придётся подняться из долины в горы. Возьмите тёплую одежду."
"He met a \"talking mushroom man\"? What?! Trekker always gets into the weirdest adventures. But he's a badass pig, even by Warden standards. Not a lot of us can survive in Gazluk!\n\nI'll get the recall stones he needs. Thanks for making the delivery.": "Он встретил «говорящего грибного человека»? Что?! Треккер всегда попадает в самые странные приключения. Но он крутой кабан, даже по меркам Хранителей. Немногие из нас могут выжить в Газлуке!\n\nЯ достану ему нужные камни возвращения. Спасибо, что доставил."
"(Shh, keep your voice down. Fluffikins over there has good ears!\n\nTell Tangle I'm working a mission right now. I met a gigantic talking mushroom man, and he has some very useful magic to teach! Tell Tangle I'm gonna need eight or ten more recall stones. And thanks for these mushrooms!)": "(Тсс, говори потише. У Пушистика там отличные уши!\\n\\nСкажи Тэнглу, что я сейчас выполняю задание. Я встретил гигантского говорящего грибного человека, и он может научить очень полезной магии! Скажи Тэнглу, что мне понадобится ещё восемь или десять камней возвращения. И спасибо за эти грибы!)"
"That blasted human! Laura Neth! She doesn't like me, and she's very mean. And she's a huge fucking racist, just like most humans, and I am <i>so sick</i> of her shit!\n\n<i>[Gloria breathes deeply.]</i> I'm sorry. I can fight a horde of zombies without breaking a sweat, but one bitchy old human who knows how to get under my defenses... anyway, I'm trying to befriend her. I know she needs more sharp cheddar cheese for her biscuits. Do you have any? I'll buy it from you for, say, 600 Councils?": "Этот проклятый человек! Лаура Нет! Она меня не любит и очень злая. И она огромная расистка, как и большинство людей, и меня это <i>до смерти</i> достало!\n\n<i>[Глория глубоко вздыхает.]</i> Извини. Я могу сражаться с ордой зомби, не вспотев, но одна сварливая старая человек, которая умеет пробираться под мою защиту... в общем, я пытаюсь подружиться с ней. Я знаю, что ей нужно больше острого сыра чеддер для её печенья. У тебя есть? Я куплю у тебя за, скажем, 600 советов?"
"Thank you. This looks tasty! Hopefully that biddy will be appreciative. I'll wait until the right time... she can be a mean drunk. Oh, here's your money!": "Спасибо. Выглядит вкусно! Надеюсь, эта курочка оценит. Я подожду подходящего момента... она может быть злой в пьяном виде. О, вот твои деньги!"
"Do ya know what 'cheshire' is? It's a kinda cheese. Look, I can't explain why, but it's important that I find some. I need ta appear cultured.": "Ты знаешь, что такое «чешир»? Это такой сыр. Слушай, я не могу объяснить почему, но мне важно найти немного. Мне нужно казаться культурным."
"This is cheshire? Smells disgusting! But I bet she'll like it. Thanks!": "Это чешир? Пахнет отвратительно! Но я уверен, ей понравится. Спасибо!"
"Well if you're heading all the way out to Eltibule, could you stop by the keep and pick up my cheese from an Elf named Braigon? I need it right away, and I think he forgot about me.": "Если ты собираешься ехать в Элтибул, не мог бы заехать в крепость и забрать мой сыр у эльфа по имени Брейгон? Он мне очень нужен, а, кажется, он обо мне забыл."
"What? Not ready? It's been weeks! Cheese-making is so stupid.\n\nI just wanted the Velten Blue because it was my wife's favorite, and tomorrow would have been our anniversary. I don't even like it!\n\nYou know what? Go tell him to cancel the order. No, no, don't do that. I already paid for the stuff. I'll just give it away when it finally arrives.\n\nThank-you. Here's a few coin for your trouble.": "Что? Не готов? Прошло уже несколько недель! Сыроварение — такая глупость.\\n\\nЯ просто хотел получить Велтен Блю, потому что это был любимый сыр моей жены, а завтра у нас была бы годовщина. Мне он даже не нравится!\\n\\nЗнаешь что? Иди скажи ему отменить заказ. Нет, нет, не делай этого. Я уже заплатил за сыр. Просто раздам его, когда он наконец придёт.\\n\\nСпасибо тебе. Вот немного монет за твои хлопоты."
"Oh, yes, the Veltan Blue for Mr. Ballard. Um. Well...\n\nThe reason I haven't delivered it yet is because <i>it isn't ready yet</i>. He does understand that a custom blue cheese will take time to ripen, right? Obviously not. Tell him that I will bring him his cheese as soon as it is perfect, and not a moment before!": "О, да, Вельтанский голубой для мистера Балларда. Эм. Ну...\n\nПричина, по которой я ещё не доставил его, в том, что <i>он ещё не готов</i>. Он понимает, что выдержка сыра с голубой плесенью на заказ требует времени, да? Очевидно, нет. Скажи ему, что я принесу ему сыр, как только он будет идеален, и ни минутой раньше!"
"Even if these ratkin aren't growing crops here, they're surely making their own cheese! I need a sample of their aged cheese... perhaps it will tell us secrets. Now, when I say that, I don't mean cheese can talk. So don't be afraid. Just get the cheese.": "Даже если эти крысолюды не выращивают здесь урожай, они наверняка делают свой собственный сыр! Мне нужен образец их выдержанного сыра... возможно, он раскроет нам секреты. И когда я так говорю, я не имею в виду, что сыр умеет разговаривать. Так что не бойся. Просто принеси сыр."
"This cheese has been aged locally. Perfect! I'm packing this up to take back home with me. I didn't bring my cheese-ometer with me, I'm sorry to say. Good job! Here is your reward!": "Этот сыр выдержан местным способом. Отлично! Я упаковываю его, чтобы взять с собой домой. К сожалению, я не взял с собой сыромер. Отличная работа! Вот твоя награда!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Edam Cheese, I will share some of my cheesemaking experience with you!\n\n": "Я вижу, что ты сыродел... от тебя исходит этот запах! Делать сыр в дороге всегда непросто, а нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Торана. Если ты готов принести мне 10 кусков сыра Эдам, я поделюсь с тобой своим опытом в сыроделии!"
"This cheese is fantastic! We might eat it all right now! Come check with me later on... we might need some more!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Этот сыр просто фантастический! Мы можем съесть его весь прямо сейчас! Заходи позже... возможно, нам понадобится ещё!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Feta Cheese, I will share some of my cheesemaking experience with you!\n\n": "Я вижу, что ты сыродел... от тебя так и пахнет! Делать сыр в дороге всегда непросто, и нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Торана. Если ты принесёшь мне 10 кусков сыра фета, я поделюсь с тобой своим опытом в сыроделии!"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Mild Cheddar Cheese, I will share some of my cheesemaking experience with you!\n\n": "Я вижу, что ты сыродел... от тебя исходит этот запах! Делать сыр в дороге всегда непросто, а нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Серрольд. Если ты готов принести мне 10 кусков мягкого сыра чеддер, я поделюсь с тобой своим опытом в сыроделии!"
"This cheese is fantastic! We might eat it all right now! Come check with me later on... we might need some more!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Этот сыр фантастический! Мы можем съесть его прямо сейчас! Загляни ко мне позже... возможно, нам понадобится ещё!\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Raclette Cheese, I will share some of my cheesemaking experience with you!\n\n": "Я вижу, что ты сыродел... от тебя исходит этот запах! Делать сыр в дороге всегда непросто, а нам очень пригодился бы запас чего-нибудь, кроме того, что несём с собой я и Серрольд. Если ты готов принести мне 10 кусков сыра Раклет, я поделюсь с тобой своим опытом в сыроделии!"
"Finally, the help has arrived. Yes, I'm ready to order. Please bring me a chicken casserole. Yes, a complete casserole. I'm FAMISHED. From WAITING. For HOURS!": "Наконец-то помощь пришла. Да, я готов сделать заказ. Пожалуйста, принесите мне куриную запеканку. Да, целую запеканку. Я УМИРАЮ ОТ ГОЛОДА. ОТ ОЖИДАНИЯ. ЧАСАМИ!"
"Ahh. Well, I can't say this was worth the wait, but it is definitely worth eating. My compliments to the chef.": "Ах. Ну, не могу сказать, что это стоило ожидания, но определённо стоит того, чтобы съесть. Мои комплименты повару."
"I'm STILL waiting for my chicken casserole!": "Я ВСЁ ЕЩЁ жду свою куриную запеканку!"
"My mate is not doing well since the invasion. She used to make jewelry, and I'm hoping I can convince her to take up the trade again. It will make her happier. I just need some cinnabar!": "Моя супруга плохо себя чувствует после вторжения. Раньше она делала украшения, и я надеюсь, что смогу убедить её снова заняться этим ремеслом. Это сделает её счастливее. Мне просто нужна киноварь!"
"This cinnabar will make some excellent necklaces. Many thanks, my friend.": "Этот киноварь отлично подойдёт для ожерелий. Большое спасибо, друг мой."
"Tryaka used to make necklaces of cinnabar. If we still had some, perhaps she'd take up the trade again.": "Тряка раньше делала ожерелья из киновари. Если бы у нас ещё были запасы, возможно, она снова занялась бы этим ремеслом."
"My teeth are getting kind of loose. I must have been on that ship a long time! I think I'm getting scurvy! You gotta help me. I need oranges! That bartender guy says there's no oranges anywhere in Serbule Hills. But you're pretty savvy, right? Could you get me some imported oranges? Hell, I'll settle for lemons. Anything citrus!": "У меня зубы начинают шататься. Должно быть, я слишком долго был на том корабле! Кажется, у меня цинга! Ты должен помочь мне. Мне нужны апельсины! Тот бармен говорит, что в Сербульских Холмах апельсинов нет. Но ты же сообразительный, правда? Не мог бы ты достать мне импортные апельсины? Чёрт возьми, я соглашусь и на лимоны. Любые цитрусовые!"
"Thanks! I hope it's not too late. My teeth are so loose... maybe there's an elven tooth tightener spell? Hmm.": "Спасибо! Надеюсь, ещё не слишком поздно. Мои зубы так шатаются... может, есть эльфийское заклинание для укрепления зубов? Хм."
"Excellent, Da Cancel ganbe pleased!": "Отлично, Да Кансел будет доволен!"
"We can't have these fae creatures running all over our land! You fairies aren't too bad, but the biting vines are ruining the native ecology! Help me cull them, would you?": "Мы не можем позволить этим фейским существам разгуливать по всей нашей земле! Вы, феи, не так уж плохи, но кусачие лозы губят местную экосистему! Помоги мне сократить их численность, ладно?"
"Good job. That's some of those nasty creatures run out of our world. Even if they're immortal, at least they aren't here!": "Хорошая работа. Эти мерзкие создания изгнаны из нашего мира. Даже если они бессмертны, по крайней мере, их здесь нет!"
"When we reanimate a creature through Paleontology, we can't control it. Most of my associates are skilled at aggression deterrance, so there aren't too many accidents. But I have to admit the number of skeletal beasts in the area is becoming somewhat ... problematic. Hey, maybe you could clean some of them up for us? Start with the lanky ones. They're comparatively docile.": "Когда мы оживляем существо с помощью Палеонтологии, мы не можем его контролировать. Большинство моих коллег умеют сдерживать агрессию, так что несчастных случаев не так уж много. Но должен признать, что количество скелетных зверей в округе становится несколько... проблематичным. Эй, может, ты поможешь нам с ними разобраться? Начни с долговязых. Они сравнительно смирные."
"Good work! Here's some Councils. Sorry, I don't have any xogrite. I could pay you in xedrite, but wouldn't you rather have these shiny coins? Of course you would!": "Отличная работа! Вот немного Советов. Извини, у меня нет ксогрита. Я могу заплатить тебе кседритом, но разве ты не предпочёл бы эти блестящие монеты? Конечно, предпочёл бы!"
"Do you think you can take out the pointy-faced dinosaurs? Those were called triceratops, and they lived a very long time ago. Try not to get knocked off a cliff!": "Сможешь расправиться с остромордыми динозаврами? Их называли трицератопсами, и жили они очень давно. Постарайся не свалиться с утёса!"
"Excellent work. Come back later; I'm sure we'll need your services again.": "Отличная работа. Возвращайся позже; я уверен, что нам снова понадобятся твои услуги."
"The ranalon have a sort of outdoor temple near the lake. You'll know it by the two large stone obelisks sticking out of the water nearby. Go there and slay the prayermaster and his minions. The prayer-master is an important leader, and his death will cause chaos among their ranks. I shall pay you 400 Councils.": "У раналон есть что-то вроде открытого храма у озера. Вы узнаете его по двум большим каменным обелискам, торчащим из воды неподалёку. Отправляйтесь туда и убейте мастера молитв и его прислужников. Мастер молитв — важный лидер, и его смерть вызовет хаос в их рядах. Я заплачу вам 400 Каунсилов."
"Good. Here's the money, but I had better not hear complaints about how I 'incited terror amongst the devout', understand? Let's keep this little skirmish between us.": "Хорошо. Вот деньги, но я лучше не услышу жалоб на то, что я «вызвал ужас среди верующих», понял? Давай оставим эту небольшую стычку между нами."
"De Cancel haz mi heer tahelp at, bit dey din sey eye hafta only tek wakordas. Im gunna kollect alde poyzens ye ken git ta... keepit offa de streetz. Yeh, dats it. Help me cleen up te streetz, wontcha?\n\n(You're pretty sure Korbok wants you to collect poison, to \"Clean up the streets\")": "Де Кансел попросил меня помочь, но сказал, что я должен брать только вахордосы. Он собирается собрать все яды, которые ты сможешь достать... чтобы убрать их с улиц. Да, вот так. Поможешь мне очистить улицы, не так ли?\n\n(Ты почти уверен, что Корбок хочет, чтобы ты собрал яды, чтобы «Очистить улицы».)"
"Amazen! Disiz de gud stuff... I meen, itsa shame it hazta bee destroyed. <i>[Korbok winks at you]</i>": "Потрясающе! Это действительно хорошая вещь... Жаль, что её придётся уничтожить. <i>[Корбок подмигивает тебе]</i>"
"When the ranalon ran my cart off the road, I just fled in a panic. I should have grabbed my papers! I'm kicking myself for leaving them behind. Those books are key to my business!\n\nI'm sure the ranalon have stolen all the valuable stuff from my cart, but the books don't look valuable. Could you go look for them?\n\nFollow the road south until you reach a crossroads, then head east into Ranalon territory. The road will go along a strip of land separating two lakes. My cart was run off the road right near there! It rolled down toward the southern lake. It didn't go into the water, though, so maybe my papers are still intact! You've gotta check. Please?": "Когда раналон сшиб мою повозку с дороги, я просто в панике убежала. Мне следовало схватить свои бумаги! Я корю себя за то, что оставила их позади. Эти книги — ключ к моему бизнесу!\n\nЯ уверена, что раналон украли всё ценное из моей повозки, но книги не выглядят ценными. Ты не мог бы поискать их?\n\nИди по дороге на юг, пока не дойдёшь до перекрёстка, затем сверни на восток в территорию раналон. Дорога идёт вдоль полосы земли между двумя озёрами. Моя повозка была сбита с дороги прямо там! Она скатилась к южному озеру. Но в воду не упала, так что, возможно, мои бумаги ещё целы! Ты должен проверить. Пожалуйста?"
"You found them! Oh, no, they got wet...\n\nWell, still, better than nothing, right? I'll start blotting each page dry. I bet I can salvage most of it! Thank you so much!\n\nIn exchange, let me teach you some useful goblinese words and phrases. Goblins may not seem like they're better than the frog-people, but they are. Goblins honor trade agreements! So here's what you say if you meet a goblin trader.\n\n<i>[You receive a short language lesson from Cleo.]</i>": "Вы нашли их! О нет, они промокли...\n\nНу, всё равно лучше, чем ничего, правда? Я начну промакивать каждую страницу. Уверен, смогу спасти большую часть! Большое спасибо!\n\nВ обмен позволь мне научить тебя нескольким полезным словам и фразам на гоблинском. Гоблины могут показаться не лучше лягушачьих людей, но это не так. Гоблины чтят торговые соглашения! Вот что нужно сказать, если встретишь гоблинского торговца.\n\n<i>[Вы получаете короткий урок языка от Клео.]</i>"
"It gets so boring eating Hogan's cooking! What I wouldn't do for some fruit cocktail. Any kind would do, really. I'm not picky.": "Так скучно есть еду Хогана! Что я только не отдал бы за фруктовый коктейль. Любой подойдёт, честно говоря. Я не привередлив."
"Why, thank you. That's fruit cocktail all right! And I guess I <i>did</i> say I didn't care what kind of fruit cocktail, didn't I? Me and my big mouth. Oh well, a favor's a favor! Here. This is for you.": "О, спасибо. Это действительно фруктовый коктейль! И, наверное, я <i>действительно</i> говорил, что мне всё равно, какой именно фруктовый коктейль, не так ли? Вот я и ляпнул. Ну что ж, одолжение есть одолжение! Вот, это для тебя."
"I heard that goblins took the logging camps to the northeast... and that they're using fairies as slaves! So terrible! Now, I could never condone killing anybody, but IF a slave were to HAPPEN to perish, and if they had cold iron shackles in good condition, and IF those shackles made it back to me, I would be very grateful. Not that I want you to kill anybody, though! No no no. Just... be on the lookout for cold iron shackles. That's all.": "Я слышал, что гоблины захватили лесозаготовительные лагеря к северо-востоку... и что они используют фей в качестве рабов! Это ужасно! Конечно, я никогда не одобрю убийство кого бы то ни было, но ЕСЛИ вдруг какой-нибудь раб СЛУЧАЙНО погибнет, и если у него будут кандалы из холодного железа в хорошем состоянии, и ЕСЛИ эти кандалы попадут ко мне, я буду очень благодарен. Но я не хочу, чтобы ты кого-то убивал! Нет-нет-нет. Просто... следи за кандалами из холодного железа. Вот и всё."
"Oh, these are cold iron all right. And just about dwarf-sized. Perfect! Thanks. What? Oh, no, I just wanted them for... um, a project I'm working on. A special ink! Right, they're for a special ink.\n\nLet me show you some sword techniques I learned back home.": "О, это точно холодное железо. И как раз размером с карлика. Отлично! Спасибо. Что? О, нет, они мне просто нужны для... эээ, одного проекта, над которым я работаю. Особые чернила! Да, они для особых чернил.\n\nПозволь показать тебе несколько приёмов фехтования, которым я научился дома."
"I have prepared the collaboration notes I would like you to deliver to the dwarf. If you would be so kind, please translate them and deliver them. I eagerly await his response.": "Я подготовил заметки для сотрудничества, которые хотел бы, чтобы ты передал гному. Будь так любезен, переведи их и доставь. Я с нетерпением жду его ответа."
"Add a be- of course! Wow, is his knowledge innate or is he classically trained? No matter. With his suggestion, I think I've finally figured it out! I can show you, if you'd like.\n\n<i>[You've unlocked new training options with Engineer Crall.]</i>": "Добавь be- конечно! Вау, его знания врождённые или он классически обучен? Неважно. Благодаря его подсказке, я, кажется, наконец-то понял! Могу показать тебе, если хочешь.\n\n<i>[Вы открыли новые варианты обучения у инженера Кралла.]</i>"
"Hm.\n\nHmmmm.\n\nHm.\n\nI see. Tell your orcish friend that the fish will escape easily with this current design. If you introduce a high-pitched noise mechanism, perhaps that of a bell, she can then tune the gears to react to it properly and clamp down harder on the caught fish.": "Хм.\n\nХмммм.\n\nХм.\n\nПонимаю. Скажи своему орочьему другу, что рыба легко ускользнёт с нынешним дизайном. Если добавить механизм с высоким звуком, например звонок, она сможет настроить шестерни так, чтобы они правильно реагировали и сильнее сжимали пойманную рыбу."
"Unlock new Fishing recipe training": "Открыть обучение новым рецептам в Рыболовстве"
"You want to help? Okay! I'll give you a job! Go catch fish! Norbert likes eels the best, so get those. They're very fast! Good luck! Get this many. <i>Spot holds up five fingers.</i>": "Хочешь помочь? Ладно! У меня есть для тебя задание! Поймай рыбу! Норберт больше всего любит угрей, так что лови их. Они очень быстрые! Удачи! Поймай столько. <i>Спот показывает пять пальцев.</i>"
"Ew, ha ha! Eels are so gross! But Norbert can cook them and then they taste good. You did good!\n\nHere, you can eat these. Norbert says they're too scrawny to cook, but they look okay to me.": "Фу, ха-ха! Угри такие противные! Но Норберт умеет их готовить, и тогда они вкусные. Ты молодец!\n\nВот, можешь съесть это. Норберт говорит, что они слишком тощие для готовки, но мне они выглядят нормально."
"Can you get me some perfect snail shells? They need to be perfect, and those are harder to find. But I only need two of 'em.": "Можешь достать мне несколько идеальных раковин улиток? Они должны быть безупречными, а такие найти сложнее. Но мне нужно всего две."
"Very nice! Let me show you what I make from these. Here, keep it!": "Отлично! Позволь показать тебе, что я из этого делаю. Вот, оставь себе!"
"Go over to the Tapestry Inn and ask Durstin what beer he wants to order for next month.": "Сходи в гостиницу «Гобелен» и спроси у Дурстина, какое пиво он хочет заказать на следующий месяц."
"Three barrels? Sounds like Durstin's business is picking up! Finally, some good news!\n\nHold on to these hops. You need a ton of them for brewing.": "Три бочки? Похоже, дела у Дерстина идут в гору! Наконец-то хорошие новости!\n\nДержи эти хмели. Для пивоварения их нужно очень много."
"My beer order? Oh, Brianna sent you. Hmm... Let me check.\n\nI need a cheap lager for the regulars, a brown ale for Mr. Song-and-Dance Elf over there, and let me get a keg of goblin ale. Just in case it comes in handy.": "Мой заказ на пиво? О, Брианна послала тебя. Хм... Дай-ка проверю.\n\nМне нужен дешёвый лагер для постоянных клиентов, тёмный эль для того эльфа-певца, и ещё бочонок гоблинского эля. На всякий случай."
"I have thought about what Urzab told you: that my assistants may be involved in the attempt on my life. Rick already tracked down one of them, and she knew nothing. He couldn't find the other one...\n\nBut I know where Tal-Saka would have gone. I did not tell Rick because I won't let him get hurt for me! But if <i>you</i> wanted to go and confront Tal-Saka... I would be grateful.\n\nTal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.": "Я обдумала то, что Урзаб тебе рассказал: что мои помощники могут быть замешаны в покушении на мою жизнь. Рик уже нашёл одну из них, и она ничего не знала. Другую он найти не смог...\n\nНо я знаю, куда мог пойти Тал-Сака. Я не сказала Рику, потому что не хочу, чтобы он пострадал из-за меня! Но если <i>ты</i> захочешь пойти и встретиться с Тал-Сакой... я буду благодарна.\n\nТал-Сака часто говорил о своих бродячих друзьях, которые живут в разрушенном пустынном форпосте. Чтобы найти форпост, начни в Амульне, затем направляйся прямо на восток. Это долгий путь, так что возьми воду. И будь осторожен! Это будет опасно."
"Tal-Saka is dead?! Oh, that is tragic news. I knew I shouldn't have sent you! Terrible deeds pile upon terrible deeds, and although I did not spill his blood, it is on my hands! <i>[ Sona sighs. ]</i> What's done is done.\n\nYou say he had a Rahu trade coin? That could be coincidence... perhaps he found it somewhere in the sand. But most likely it means that the city of Rahu paid him for a service. Perhaps they hired him to explain my stolen research notes.\n\nIt would seem the very city of my birth wants me dead. This is the worst outcome I could have imagined! I cannot keep this from Rick anymore. Talk to him, see if he knows what to do next.\n\n<i>[ New Favor for Rick Snapley. ]</i>": "Тал-Сака мёртв?! О, это трагическая новость. Я знала, что не следовало посылать тебя! Ужасные поступки накапливаются, и хотя я не проливала его кровь, это на моей совести! <i>[Сона вздыхает.]</i> Что сделано, то сделано.\n\nТы говоришь, у него была торговая монета Раху? Это может быть совпадением... возможно, он нашёл её где-то в песках. Но скорее всего это значит, что город Раху заплатил ему за услугу. Возможно, они наняли его, чтобы он объяснил мои украденные исследовательские заметки.\n\nПохоже, сам город моего рождения хочет моей смерти. Это худший исход, который я могла представить! Я больше не могу скрывать это от Рика. Поговори с ним, узнай, что делать дальше.\n\n<i>[Новая услуга для Рика Снэпли.]</i>"
"I would like your help on a delicate subject. I need to know if the goblin Urzab had anything to do with what happened to me in the desert. He lives in Amulna.\n\nThere is a catch, however: he only speaks goblinese. Rick has confronted him, but Rick's goblinese is poor and he is not sure he understood everything. Do you happen to be fluent? If so, could you speak to Urzab about the attempt on my life?": "Мне нужна твоя помощь в деликатном вопросе. Мне нужно узнать, имел ли гоблин Урзаб какое-то отношение к тому, что со мной случилось в пустыне. Он живёт в Амульне.\n\nОднако есть одна загвоздка: он говорит только на гоблинском. Рик пытался с ним поговорить, но его гоблинский слаб, и он не уверен, что понял всё. Ты случайно не свободно говоришь на гоблинском? Если да, не мог бы ты поговорить с Урзабом о покушении на мою жизнь?"
"The story Urzab told you is also what he told Rick. But this bit about the Onkara soldier breaking into my shop is a new detail. That's terrifying! Thank you for your hard work. Here -- I don't have much money left, but I want  to give you something.": "История, которую Урзаб рассказал тебе, — это то же, что он рассказал Рику. Но этот момент про солдата Онкары, ворвавшегося в мою лавку, — новая деталь. Это ужасно! Спасибо за твою усердную работу. Вот — у меня осталось немного денег, но я хочу дать тебе что-то."
"Who? Sona? I don't know a Sona. ... ohhh, THAT Sona. The teenage rakshasa with all the customers. Very sad. She was a good tenant.\n\nWhat? Me?! I had nothing to do with it! Almost certainly nothing! Okay, look. I feel bad about it, but I had no choice: an Onkara trooper came in here and demanded a key to her shop. He was huge and terrifying, and I figured he was just stealing magical secrets, so I let him in. The very next evening, Sona was attacked by bandits.\n\nBelieve me, I didn't want her gone! She was earning me a lot of money in rent, and more importantly, she was making Amulna famous! When she disappeared, her assistants wandered off to become bandits themselves... if I had to guess, one of those two is to blame for the attack! Now excuse me. I have a lot of paperwork to attend to.": "Кто? Сона? Я не знаю никакой Соны. ... ооо, ТА самая Сона. Подросток ракшаса с кучей клиентов. Очень жаль. Она была хорошим арендатором.\n\nЧто? Я?! Я ни при чём! Почти наверняка ни при чём! Ладно, слушай. Мне жаль, что так получилось, но у меня не было выбора: сюда зашёл солдат Онкары и потребовал ключ от её магазина. Он был огромным и страшным, и я подумал, что он просто ворует магические секреты, так что впустил его. Уже на следующий вечер Соню атаковали разбойники.\n\nПоверь, я не хотел, чтобы её не стало! Она приносила мне много денег с аренды, а главное — делала Амульну известной! Когда она пропала, её помощники ушли и сами стали разбойниками... если мне судить, за нападение ответственен кто-то из них! А теперь извините, мне нужно заняться кучей бумажной работы."
"My brother is a gru-maghi in one of the aboveground houses. You know, up above, where the best-connected orc leaders live? Anyway, my brother and I each smuggled in a pemphredo eye so we could talk to each other at night. But mine was taken as contraband almost as soon as I arrived, and I haven't been able to find another anywhere in Gazluk. Can you find me another one from outside? I miss my brother...": "Мой брат — гру-маги в одном из наземных домов. Знаешь, наверху, где живут орочьи вожди с лучшими связями? В общем, мы с братом тайком пронесли по глазу пемфредо, чтобы разговаривать друг с другом по ночам. Но мой почти сразу же конфисковали как контрабанду, как только я прибыла, и с тех пор я не смогла найти другой нигде в Газлуке. Можешь добыть мне ещё один снаружи? Я скучаю по брату..."
"Thank you! Hopefully Demerius still has his pemphredo eye! I'll try to contact him soon. You're so kind to get this for me. Here, this is for you. I stole it from my master. He thinks he lost it in a drunken card game.": "Спасибо! Надеюсь, у Демериуса всё ещё есть его глаз пемфредо! Я постараюсь связаться с ним скоро. Ты так добр, что достал это для меня. Вот, это для тебя. Я украл это у своего мастера. Он думает, что потерял это в пьяной карточной игре."
"The thing about life is, it somehow keeps coming back! But now while you're around to say anything about it! Go out, end as many lives as you can, then come back. Then do it again next week!": "Жизнь — это то, что каким-то образом всегда возвращается! Но сейчас, пока ты здесь, чтобы что-то сказать об этом! Иди и оборви как можно больше жизней, потом возвращайся. А затем сделай это снова на следующей неделе!"
"I knew I could count on you. I KNEW I could count on you! Hahahaha! See you next week!": "Я знал, что могу на тебя рассчитывать. Я ЗНАЛ, что могу на тебя рассчитывать! Хахахаха! Увидимся на следующей неделе!"
"You rub my feet enough, I might rub yours. Not feet, though - more like bring me some premium candle-quality fat. Then we'll see if I let you in.": "Если будешь достаточно часто тереть мне ноги, я могу и твои потереть. Но не ноги — лучше принеси мне немного жирного сала премиального качества для свечей. Тогда посмотрим, впущу ли я тебя."
"Is this premium fat? It looks like shitty fat to me. And it stinks! Ugghh... this is disgusting! This is how you make candles!? Screw this!\n\n": "Это премиальный жир? Мне он кажется паршивым жиром. И воняет! Фу... это отвратительно! Так ты делаешь свечи!? К черту это!"
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! A casserole would be perfect! Bring me 10 plates of Chicken Casserole, and maybe I can help you out somehow.\n\n": "Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они, того и гляди, взбунтуются! Им нужно мясо! Курица! Запеканка была бы идеальна! Принеси мне 10 порций куриной запеканки, и, может быть, я смогу как-нибудь тебе помочь."
"Oh man! Thank you so much. I already had to feed them my apprentice, I'm sure I was going to be next!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ох, спасибо большое. Мне уже пришлось кормить их своим учеником, и я был уверен, что следующим буду я!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! And something other then beets... maybe some broccoli? Bring me 20 plates of Chicken and Broccoli, and maybe I can help you out somehow.\n\n": "Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они могут взбунтоваться! Им нужно мясо! Курица! И что-нибудь кроме свёклы... может, немного брокколи? Принеси мне 20 тарелок курицы с брокколи, и, может быть, я как-нибудь смогу тебе помочь."
"Oh man! Thank you so much. I might have become the next thing served up for supper!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ох, человек! Большое спасибо. Я мог стать следующим блюдом на ужин!\n\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Pork! I hear the Fae have a great recipe for vexfish! Bring me 40 Evu Mint Pork, and maybe I can help you out somehow.\n\n": "Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они могут взбунтоваться! Им нужно мясо! Свинина! Я слышала, у фей есть отличный рецепт векс-рыбы! Принеси мне 40 порций свинины с мятой эву, и, может быть, я смогу как-нибудь тебе помочь."
"Oh man! Thank you so much. I already had to feed them my apprentice, I'm sure I was going to be next!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ох, спасибо большое. Мне уже пришлось кормить их своим учеником, и я был уверен, что следующим буду я!\n\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hello! We have been on the road for quite some time, and our on-the-road rations are nearly gone.  We need some good on the go snacks! Bring me 10 Venison Jerky, and maybe I can help you out somehow.\n\n": "Привет! Мы уже довольно долго в пути, и наши дорожные припасы почти закончились. Нам нужна хорошая еда для перекуса в дороге! Принеси мне 10 порций вяленой оленины, и, может быть, я смогу как-нибудь тебе помочь."
"Oh man! Thank you so much. It makes my life a lot easier when these guys can snack while on the move. Hungry travellers can get... dangerous.\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ох, спасибо большое. Мне намного проще, когда эти ребята могут перекусить в пути. Голодные путешественники могут стать... опасными.\n\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\n\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Fish! I hear the Fae have a great recipe for vexfish! Bring me 20 Vexfish Lettuce Wraps, and maybe I can help you out somehow.\n\n": "Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они могут взбунтоваться! Им нужно мясо! Рыба! Я слышала, у фей есть отличный рецепт рулетиков с векс-рыбой в салатных листьях! Принеси мне 20 таких рулетиков, и, может быть, я как-нибудь смогу тебе помочь."
"If you're gonna be murdering harmless ogres, can you collect their stomachs for me? I need 'em for fart bladders and other joke toys. ": "Если ты собираешься убивать безобидных огров, можешь собрать для меня их желудки? Они нужны мне для пузырей с пердежом и других шутливых игрушек."
"Hm, not bad. Here! This is for your trouble!": "Хм, неплохо. Вот! Это за твои труды!"
"I know it's taboo to carry around fairy wings. But that's why they're so great! Nothing can rile up an Autumn or Summer like a big old bed full of ripped-off wings. Get me some, I'm gonna do something gross.": "Я знаю, что носить с собой крылья фей — табу. Но именно поэтому они так хороши! Ничто так не раздражает Осень или Лето, как большая кровать, полная оторванных крыльев. Принеси мне их, я собираюсь сделать что-то отвратительное."
"Hahaha okay this is gonna be great. You'll see. For now, here's a thing I found. Neat, huh?": "Хахаха, отлично, будет здорово. Ты увидишь. А пока вот вещь, которую я нашёл. Классно, да?"
"The food here's nice enough, but not what I'm used to. I've got a craving for a classic cottage pie! Do ya know where to get one around here? 'Cuz I surely don't!": "Еда здесь вполне неплохая, но я привыкла к другому. Мне ужасно хочется классического деревенского пирога! Ты не знаешь, где здесь можно его достать? Потому что я точно не знаю!"
"This smells delicious! Thank you so much, dear!": "Это пахнет восхитительно! Большое спасибо, дорогая!"
"Leave the seeds in!": "Оставь семена!"
"I need a lot of cotton for a new dress I'm making. I wouldn't ask if you looked busy, but since you just seem to be standing around, maybe you could card some cotton for me? Just a little bit. Like ten cards?": "Мне нужно много хлопка для нового платья, которое я шью. Я бы не просила, если бы ты выглядел занят, но раз уж ты просто стоишь без дела, может, начешешь для меня немного хлопка? Совсем чуть-чуть. Скажем, десять порций?"
"Oh you're good at this! No seeds at all. Thank you! Here: I made this for you and I hope you like it!": "О, ты в этом хорош! Совсем без семян. Спасибо! Вот: я сделал это для тебя и надеюсь, что тебе понравится!"
"Oh, you look like the sort who works with their hands. Have you any cotton to spare? I could use some. Seeded and carded, of course.": "О, ты выглядишь как человек, который работает руками. У тебя случайно нет хлопка? Мне бы пригодился. Конечно, с семенами и расчесанный."
"Ah. Thank you. Here's something for your efforts!": "Ах. Спасибо. Вот тебе что-то за твои старания!"
"Six days prior, a band of fortified orcs attempted to cross my fungal fields and chop down my tall mushrooms. They were killed and their bodies are now fertilizer. Yet I fear retaliation, for orcs are not prone to abandoning their schemes. It would be prudent to remove that threat immediately.": "Шесть дней назад отряд закованных в броню орков попытался пересечь мои грибные поля и срубить мои высокие грибы. Их убили, и теперь их тела служат удобрением. Но я опасаюсь возмездия, ведь орки не склонны отказываться от своих замыслов. Было бы разумно немедленно устранить эту угрозу."
"Your deeds are noble. Remember that fungus helps enliven the land! So you are saving your homeland, too, in a way.": "Твои поступки благородны. Помни, что грибы помогают оживить землю! Так что ты в некотором роде спасёшь и свою родину."
"I can make some really good crab gumbo, but I need some crabs! Can you bring me 5 of the suckers?": "Я умею готовить отличный крабовый гумбо, но мне нужны крабы! Можешь принести мне 5 этих тварей?"
"Thanks! These are perfect. Now the gumbo is going to take a long time simmering, so don't get impatient!": "Спасибо! Они идеальны. Теперь гуляш будет долго томиться, так что не торопись!"
"You might have to wait for cranberries to be in season for this one, but it's worth the wait. One cranberry wine, please!": "Возможно, придётся подождать сезона клюквы для этого, но ожидание того стоит. Одно клюквенное вино, пожалуйста!"
"You've outdone yourself! Why, I can't think of any other wines to teach you!\n\nAnd hey, I can sense your presence. I mean, even when I'm not looking at you! By brewing all that wine in my name, you've gone and made yourself a Scion of me! Welcome aboard! Let's get hammered in celebration!": "Ты превзошёл себя! Честно говоря, я не могу придумать других вин, чтобы научить тебя!\n\nИ знаешь, я чувствую твоё присутствие. Даже когда не смотрю на тебя! Заваривая всё это вино на моё имя, ты стал Моим Потомком! Добро пожаловать в команду! Давай напьёмся в честь этого!"
"I need to experiment until I find a cure for this cranium powder issue. Can you go get me some brain bug lobes? Better grab a few in case I mess up... I have a serious headache right now and I can't think too straight.": "Мне нужно провести эксперименты, чтобы найти лекарство от этой проблемы с порошком из черепа. Можешь принести мне несколько долек мозговых жуков? Лучше взять с запасом, на случай если я ошибусь... У меня сейчас сильная головная боль, и я не могу сосредоточиться."
"Perfect! I think I'm narrowing it down... won't be long now. I hope.": "Отлично! Думаю, я сужаю круг... осталось немного. Надеюсь."
"I need to experiment until I find a cure for this cranium powder issue. Can you go get me some Willpower Gel?\n\nI don't actually know what that is. It sounds alchemical, though. Maybe ask around, somebody might have it  for sale. I dunno. Just get it! Please!": "Мне нужно провести эксперименты, пока я не найду лекарство от этой зависимости от порошка из черепа. Можешь принести мне немного геля воли?\\n\\nЯ сам толком не знаю, что это такое. Звучит алхимически. Может, поспрашивай, кто-то может продавать. Не знаю. Просто принеси! Пожалуйста!"
"Yes! Thanks! I've almost got this recipe! I really appreciate your help with this. Let me give you something for your trouble.\n\nI'm done with Cranium Powder, that stuff's terrible for you! I'm into the Pineal Juice scene now. All natural and incredibly powerful!": "Да! Спасибо! Я почти освоил этот рецепт! Очень благодарен за твою помощь. Позволь дать тебе что-нибудь за труды.\n\nЯ закончил с Порошком Черепа, эта штука ужасна для здоровья! Теперь я увлёкся Сосновым Соком. Всё натуральное и невероятно мощное!"
"So, um, our buddy Azalak the mantis owes me some cranium powder. I just haven't gotten around to picking it up. Can you get that for me? Oh, but, uh, don't tell him you're getting it for me. Don't mention me at all! Just buy it from him. I'll pay you back! Eventually.\n\nYou might have to get on his good side before he's willing to sell it to you. Just be nice to him, he's a great guy.": "Итак, эм, наш приятель Азалак богомол должен мне немного порошка из черепа. Я просто ещё не добрался, чтобы забрать его. Можешь получить это для меня? О, но, эээ, не говори ему, что берёшь это для меня. Вообще не упоминай меня! Просто купи у него. Я тебе потом верну! Рано или поздно.\n\nВозможно, тебе придётся расположить его к себе, прежде чем он согласится продать. Просто будь с ним вежлив, он отличный парень."
"Thanks! This will do for a little while.\n\n[Echur inhales the powder.]\n\nWhat? I have things under control. Cranium Powder's not that addictive as long as you know how to pace yourself.\n\nAnyway, let's spar! I'll teach you a new move.\n\n[You gain Unarmed XP]": "Спасибо! Этого хватит на некоторое время.\n\n[Эчур вдыхает порошок.]\n\nЧто? У меня всё под контролем. Порошок из черепа не так уж и вызывает привыкания, если знать меру.\n\nВ любом случае, давай поединок! Я научу тебя новому приёму.\n\n[Ты получаешь опыт в Безоружном бою]"
"You put down some of the infected beasts, and ran the others off!": "Вы прикончили часть заражённых зверей, а остальных прогнали прочь!"
"My main food is potatoes. I use other foods when I can get 'em, but potatoes are what get me through the long winters. Anyway, I fucking hate potatoes! At the very least, it'd be nice to have some sour cream, you know?": "Моя основная еда — картофель. Я использую и другую пищу, когда могу её достать, но именно картофель помогает мне пережить долгие зимы. Впрочем, я чертовски ненавижу картофель! По крайней мере, было бы неплохо иметь немного сметаны, понимаешь?"
"You got this for me? Well that's really kind of you! I was just complaining, I didn't mean to make you go to all that trouble. But I'm glad you did! Let me teach you some gardening tips. I wish I had more to offer!": "Ты принёс это для меня? Как мило с твоей стороны! Я просто жаловался, не хотел заставлять тебя так заморачиваться. Но я рад, что ты это сделал! Позволь научить тебя нескольким советам по садоводству. Жаль, что у меня нет больше, чем предложить!"
"Did you hear about that unfortunate fire-rift that opened south of here? I was thinking... while the Winter Fae portal is also open, that means there's three potent elemental sources here: Fire, Cold, and Nature. You know what that means: party time!\n\nOh, sorry, you don't know what I mean, do you. Well, If you can find three elementals big enough and old enough to drop nice-sounding crystals, I can fashion those crystals into beautiful fairy chimes.\n\nI'm not sure if mortals are capable of playing them... but we could find out!": "Ты слышал о том несчастном огненном разломе, что открылся к югу отсюда? Я подумал... пока портал Зимних Фей тоже открыт, это значит, что здесь есть три мощных источника стихий: Огонь, Холод и Природа. Знаешь, что это значит: время вечеринки!\n\nОй, извини, ты, наверное, не понимаешь, что я имею в виду. Если ты сможешь найти трёх элементалей достаточно больших и старых, чтобы они сбросили красивые кристаллы, я смогу сделать из этих кристаллов прекрасные фейские колокольчики.\n\nНе уверен, смогут ли смертные на них играть... но мы можем это проверить!"
"You found crystals from all three elements? These are excellent quality! Here, let me... and then we merge... and there we are!\n\nCan you play it? Well... give it some time! I'm sure you'll get the hang of it eventually.": "Вы нашли кристаллы всех трёх стихий? Они отличного качества! Вот, позволь мне... теперь объединяем... и вот оно!\n\nТы можешь сыграть на нём? Ну... дай себе время! Я уверен, что со временем у тебя всё получится."
"Some of my calligraphy projects require unusual paper. Right now I've been experimenting with paper made out of watercress! Do you happen to have any? And don't worry about freshness: I'm going to pound it into a paste anyway.": "Некоторые из моих каллиграфических проектов требуют необычной бумаги. Сейчас я экспериментирую с бумагой из водяного кресса! Случайно, у тебя есть такая? И не беспокойся о свежести: я всё равно собираюсь растолочь её в пасту."
"Thanks! These should make a few pieces of cress paper. It gives a nice old-timey feel to my calligraphy.\n\nOh, here. This is the runt of my sword collection, and nothing too special, but I thought you might find it useful.": "Спасибо! Из этого должно получиться несколько листов бумаги из кресс-салата. Она придаёт моей каллиграфии приятный старинный вид.\n\nВот, держи. Это самый маленький меч из моей коллекции, ничего особенного, но, думаю, он тебе пригодится."
"There is another seed repository deeper in the caves. I believe at least one myconian there will be friendly to you - can you go there and deliver these sporelings for safe keeping? We can't afford to keep all our sporelings in one place.": "В глубине пещер есть ещё один хранилище семян. Я верю, что по крайней мере один микониан там будет дружелюбен к тебе — можешь ли ты отправиться туда и доставить этих спор для сохранности? Мы не можем позволить себе хранить всех наших спор в одном месте."
"Thank you! Now if these storage mushrooms are destroyed, our pod can live on. Here, take these potions I found on a dead meatling. You like potions, right? Meatlings seem to love them for some reason. I guess it's because you have mouths.": "Спасибо! Теперь, если эти запасные грибы будут уничтожены, наша капсула сможет выжить. Вот, возьми эти зелья, которые я нашёл на мёртвом мителинге. Ты любишь зелья, правда? Мителинги, похоже, почему-то их обожают. Думаю, это потому что у них есть рты."
"Some of the crystals near the wall move. They move! You'll understand when you see them.\n\nPlease see if you can destroy them.": "Некоторые кристаллы возле стены двигаются. Они двигаются! Ты поймёшь, когда увидишь их.\n\nПожалуйста, попробуй уничтожить их."
"You were able to destroy the crystals? Well, there goes that hypothesis. AND you survived the encounter, so there goes my other hypothesis.\n\nHm. Perhaps they are sentient! Hah, that would be a nightmare. They're probably just enchanted to flee harm. I'll work on a way to prove this one way or the other, but for now you have my thanks.": "Ты смог уничтожить кристаллы? Что ж, вот и развалилась эта гипотеза. И ты выжил после столкновения, значит, развалилась и моя другая гипотеза.\\n\\nХм. Может, они разумны! Ха, это был бы кошмар. Скорее всего, они просто зачарованы, чтобы избегать опасности. Я поработаю над способом доказать это одним или другим способом, а пока — благодарю тебя."
"So we accidentally summoned a portal to an area infested with dinosaurs. And now this tomb is crawling with them! I've cleared out a bunch from this area, but can you hunt down some more?": "Итак, мы случайно вызвали портал в район, кишащий динозаврами. И теперь эта гробница полна их! Я очистил эту территорию от многих, но можешь ли ты поймать ещё несколько?"
"Thanks! Here, take this. It's not much, but it's a token.": "Спасибо! Вот, возьми это. Это немного, но это знак внимания."
"This land is just <i>infested</i> with spriggan weeds! I think the pixies plant them or something. They spend the days gathering sun, but at night they hunt for meat! There's a bunch growing south of town, and if you think about it, it'd be really irresponsible for you to NOT kill those pests.": "Эта земля просто <i>кишит</i> сорняками-спригганами! Думаю, их сажают пикси или что-то в этом роде. Днём они собирают солнечный свет, а ночью охотятся за мясом! К югу от города растёт целая куча, и если подумать, было бы крайне безответственно НЕ уничтожить этих вредителей."
"Now did you pull them up by their roots? If you don't pull up all the roots, the spriggan weed will just grow back! And you didn't let the root bulbs crack, did you? Oh no! That lets their tiny spores escape in the wind!\n\nWell... maybe you should let a professional handle the weeding duties in the future, but you showed willing, and I like that.": "Ты вырывал их с корнем? Если не вырвать все корни, сорняк спиригган просто вырастет снова! И ты не позволял луковицам корней треснуть, да? О нет! Это позволяет их крошечным спорам разлетаться по ветру!\n\nНу... может, в будущем стоит доверить прополку профессионалу, но ты проявил старание, и мне это нравится."
"Qatik told me there's a set of secret tunnels underneath Eltibule and they're full of magical darkness! I need it! I NEED IT! Get the magical darkness for me! It shouldn't be hard to find: just look for the source of the darkness, kill it, take some darkness, done. So easy even you can do it.": "Катик сказал мне, что под Элтибулем есть сеть тайных туннелей, полных магической тьмы! Она мне нужна! МНЕ ОНА НУЖНА! Добудь для меня магическую тьму! Найти её не должно быть трудно: просто найди источник тьмы, убей его, возьми немного тьмы — и готово. Так просто, что даже ты справишься."
"This is all the darkness you could get?! This is only enough for a few incredibly-powerful potions! <i>[Ragabir sighs.]</i> If you'd brought more, I could have paid better, but here's what you're owed.": "Это вся тьма, которую ты смог добыть?! Этого хватит только на несколько невероятно мощных зелий! <i>[Рагабир вздыхает.]</i> Если бы ты принес больше, я мог бы заплатить лучше, но вот то, что тебе причитается."
"I heard a rumor that's just too stupid to NOT be true. Apparently a rabbit <i>covered in jewelry</i> was seen hopping into a sewer pipe outside of town. It seems to live down there.\n\nIt's got to be one of those dreadful talking pets that wizards love so much. They never mind their pets at all, and now this one's taken to a life of crime! Take care of the matter for me, won't you?": "Я слышал слух, который слишком глуп, чтобы не быть правдой. Якобы кролика <i>покрытого украшениями</i> видели, как он прыгал в канализационную трубу за городом. Похоже, он живёт там.\n\nЭто должно быть одно из тех ужасных говорящих питомцев, которые так нравятся волшебникам. Они никогда не заботятся о своих питомцах, а теперь этот занялся преступной жизнью! Позаботься об этом для меня, хорошо?"
"Mm. It has animal hair on it. But this is definitely some of my stolen jewelry. Thank you so much for your hard work!": "Мм. На нём есть животная шерсть. Но это определённо одно из моих украденных украшений. Большое спасибо за твою усердную работу!"
"I need a sample of the Vol's Kiss that can be found in Gazluk. Can you get it for me? It's a yellow crystal that's warm to the touch. You can find it all over the mountainside.\n\nBut listen VERY carefully: carrying it will make you sick. So get the ore and then <i>run</i> back here to me as quick as you can. Don't dally! I only need three pieces, so don't get any more than that.": "Мне нужен образец Поцелуя Вола, который можно найти в Газлуке. Ты можешь добыть его для меня? Это жёлтый кристалл, тёплый на ощупь. Его можно найти повсюду на склоне горы.\\n\\nНо слушай ОЧЕНЬ внимательно: ношение его вызовет у тебя болезнь. Поэтому добывай руду и затем <i>беги</i> сюда ко мне как можно быстрее. Не задерживайся! Мне нужно всего три кусочка, так что не бери больше."
"Thank you. I have a lead-lined box to hold these pieces. Are you feeling okay? Here. Take this to ease the discomfort. And here's a bounty for your hard work.": "Спасибо. У меня есть свинцовый ящик, чтобы хранить эти куски. Ты хорошо себя чувствуешь? Вот. Прими это, чтобы облегчить дискомфорт. А вот награда за твою усердную работу."
"You got a little taste of destroying life, and now you're back for more, are you? Maybe you have some demon in you, have you ever considered that? Heh heh heh heh... Well then go! Kill more things! MANY more things! When we're through, this whole rock will be barren!": "Ты уже немного распробовал уничтожение жизни, и теперь вернулся за добавкой, да? Может, в тебе есть что-то от демона, ты когда-нибудь об этом задумывался? Хе-хе-хе-хе... Ну тогда иди! Убей ещё больше существ! ГОРАЗДО больше существ! Когда мы закончим, весь этот камень станет бесплодным!"
"<i>[Zazzamath licks his lips]</i>\n\nBeautiful. BEAUTIFUL! I'm starting to think getting stuck here was a GOOD thing. I didn't have the kind of free reign that you have... You can go anywhere! You can kill anything! It's wonderful!": "<i>[Заззамат облизывает губы]</i>\n\nПрекрасно. ПРЕКРАСНО! Я начинаю думать, что застрять здесь — это БЫЛО ХОРОШО. У меня не было такой свободы действий, какой обладаешь ты... Ты можешь пойти куда угодно! Ты можешь убить кого угодно! Это замечательно!"
"Khyrulek's notes are precious. We must break the... code.\n\nNo matter, I'm sure that I can...trivially...decipher this script.\n\nGo, bloodling. Find me the usual tools for...such a task.": "Записи Хирулека бесценны. Мы должны взломать... код.\\n\\nНеважно, я уверен, что смогу... без труда... расшифровать этот текст.\\n\\nИди, кровосос, найди мне обычные инструменты для... такой задачи."
"Finally! The time is nigh! First, we apply the sponge... and then... hmm...\n\nGo for now. I need to... think. These readings don't make sense.": "Наконец-то! Время пришло! Сначала наносим губку... а затем... хмм...\n\nПока иди. Мне нужно... подумать. Эти показания не имеют смысла."
"I am so sick of Summoned Council Rations. Can you get me some fresh meat? How about ham? No! Venison!": "Мне так надоели пайки Призванного Совета. Можешь принести мне свежее мясо? Как насчёт ветчины? Нет! Оленину!"
"Thanks! This is great! Here, in exchange, let me teach you some swordfighting pointers.": "Спасибо! Это замечательно! Вот, взамен позволь научить тебя нескольким приёмам фехтования."
"I hunger. I should go kill deer... but I need to stay here for a bit longer. Can you bring me a few carcasses?": "Я голоден. Мне стоит пойти убить оленя... но мне нужно ещё немного здесь побыть. Можешь принести мне несколько туш?"
"Thank you. Do you use potions? I don't, but Jace brought a supply for me anyway. Here, take this.": "Спасибо. Ты используешь зелья? Я нет, но Джейс всё равно принес для меня запас. Вот, возьми это."
"Here: it's finished. This amulet only works for those of Veilmoor blood. For us, it will protect against death itself! Once. Plus, I've altered this one so that I can track where it is, in case she gets kidnapped. That was quite an expensive ritual, too.\n\nTell her none of that. Just deliver it to her. Helena will know what it is and what it means.": "Вот, готово. Этот амулет действует только для тех, у кого кровь Вейлмуров. Для нас он защитит от самой смерти! Один раз. Кроме того, я изменил этот амулет так, чтобы я мог отслеживать его местоположение, если её похитят. Это был довольно дорогой ритуал.\n\nНикому об этом не говори. Просто передай ей. Хелена поймёт, что это и что это значит."
"You told her it could track her?! Now she'll have second thoughts of keeping it on when she does illicit things! Sigh. At least she'll wear it when she sleeps at home. I suppose that is something.": "Ты сказал ей, что оно может отслеживать её?! Теперь она будет дважды думать, прежде чем носить его, когда занимается запрещёнными делами! Вздох. По крайней мере, она будет носить его, когда спит дома. Наверное, это уже что-то."
"You've been talking to my mom even after I told you to stop. That's pretty dick. And now you bring me a cursed amulet. I know what this is! It looks like a peace offering, but it's actually a collar. She can tell where I am when I wear this, can't she?! TELL ME!\n\nThat's what I thought.\n\nIt will protect me from death, but also tell my mother where I am at all times.\n\nWell, she obviously knows where I am already. So I guess I'm leashed.\n\n<i>[Helena puts the amulet on.]</i>\n\nAnd hey, fuck you.": "Ты продолжал говорить с моей мамой, даже когда я просил тебя прекратить. Это довольно подло. А теперь ты приносишь мне проклятый амулет. Я знаю, что это такое! Он выглядит как знак мира, но на самом деле это ошейник. Она может узнать, где я, когда я его ношу, не так ли?! СКАЖИ МНЕ!\n\nВот именно.\n\nОн защитит меня от смерти, но также будет постоянно сообщать моей матери, где я нахожусь.\n\nНу, она и так явно знает, где я. Значит, я на поводке.\n\n<i>[Хелена надевает амулет.]</i>\n\nИ кстати, пошёл ты."
"I have another delivery of phlogiston for my buyer in the Ilmari desert, but I don't have time to go all that way. I know it's dangerous, but I believe in you: you're sturdy enough to go in my place!\n\nTake this to Makara. She's in the northeast part of the Ilmari desert. She's living in a ruined building with a red-and-white striped tarp for a roof.\n\nAnd listen to me carefully: when I go to the desert, I always travel with Kleave or at least Oritania. I'm sturdy, but I'm not stupid! The desert is way more dangerous than here. You can still do this, though. Discretion can be sturdy! Avoid confrontation!\n\nOh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...": "У меня есть ещё одна партия флогистона для моего покупателя в пустыне Илмари, но у меня нет времени ехать так далеко. Я знаю, что это опасно, но верю в тебя: ты достаточно вынослив, чтобы пойти вместо меня!\n\nОтнеси это Макаре. Она находится в северо-восточной части пустыни Илмари. Она живёт в разрушенном здании с крышей из красно-белой полосатой брезентовой ткани.\n\nИ слушай меня внимательно: когда я еду в пустыню, я всегда путешествую с Кливом или хотя бы с Оританией. Я вынослива, но не глупа! Пустыня намного опаснее, чем здесь. Но ты всё равно можешь справиться. Осторожность — тоже сила! Избегай столкновений!\n\nО, как добраться до Илмари? Это сразу за горами Кур на севере. Тебе, эм, возможно, понадобится тёплая одежда для этой части пути..."
"She wants more phlogiston in a week? That's great news! Here's your delivery fee. And more importantly, I introduced you to my teacher! Makara taught me basic Transmutation. She can probably teach you the fancier techniques, if you're nice enough to her.": "Она хочет больше флогистона через неделю? Отличные новости! Вот твоя плата за доставку. И, что важнее, я познакомил тебя со своим учителем! Макара научила меня основам Превращения. Она, вероятно, сможет научить тебя более сложным техникам, если ты будешь с ней достаточно вежлив."
"Hello? Oh. This is from Kalaba. I accept the delivery. Tell him I'll need more in a week.": "Алло? О, это от Калабы. Принимаю доставку. Скажи ему, что мне понадобится ещё через неделю."
"I need your discretion. I cannot be seen talking to my father right now. It would draw attention. Can you deliver this note to him for me? To find my father, follow the bread smell -- he works at the only remaining bakery in Statehelm.": "Мне нужна твоя осмотрительность. Сейчас меня не должны видеть за разговором с моим отцом. Это привлечёт внимание. Не мог бы ты доставить ему эту записку вместо меня? Чтобы найти моего отца, следуй за запахом хлеба — он работает в единственной оставшейся пекарне в Стейтхельме."
"A code system that reads as a bakery order? The worst part is that it's a good idea. But tell him that he should have had that idea to start with, because it's too late now! The code system is IN USE. Tell him discussions on... No, sorry, I'm getting side tracked. He always brings that out of me.\n\nI can tell he's not taking the news well -- he's always an extra-big asshole when he's stressed out. I can't really do anything more for him from here. But if you wanted to help him, I'd appreciate it.\n\nHe's a mediocre father, but he does love his kids. And the bakery is everything to him.": "Система кодов, которая читается как заказ в пекарне? Хуже всего то, что это хорошая идея. Но скажи ему, что он должен был придумать это сразу, потому что теперь уже слишком поздно! Система кодов УЖЕ ИСПОЛЬЗУЕТСЯ. Скажи ему, что обсуждения... Нет, извини, я отвлёкся. Он всегда вызывает во мне такое.\n\nЯ вижу, что он плохо воспринимает новости — в стрессовом состоянии он становится особенно мерзким. Я больше ничего не могу для него сделать отсюда. Но если ты хочешь помочь ему, я буду признателен.\n\nОн посредственный отец, но он любит своих детей. А пекарня для него — всё."
"Sigh... Ormond and his damned codes! Let me see... ah. Tell him thanks for nothing, I already learned that earlier this morning.\n\nAnd tell him his code system needs work: it's too obviously a code! I think the code message should read like a bakery order. Wouldn't that be clever? Why couldn't he have been clever like his sister Laura? Ask him that.": "Вздох... Ормонд и его проклятые коды! Дай-ка посмотреть... а. Скажи ему спасибо за ничего, я уже выучил это сегодня утром.\n\nИ скажи ему, что его система кодов нуждается в доработке: слишком очевидно, что это код! Я думаю, что кодовое сообщение должно звучать как заказ в пекарне. Разве это не было бы умно? Почему он не мог быть таким же умным, как его сестра Лаура? Спроси его об этом."
"Oh, waiter, finally! Yes, I want to know what makes your beetle skewer a \"Deluxe\" bettle skewer? Oh, don't tell me, I want to be surprised!": "О, официант, наконец-то! Да, я хочу узнать, что делает ваш жук на шампуре «Делюкс» жуком на шампуре? О, не говорите мне, я хочу, чтобы это было сюрпризом!"
"Is this... zombified meat?! Are you certain this is safe to eat? Well...\n\nHm...\n\nNo, this one isn't for me. I can tell it's well prepared, but the fact that the meat is still squirming is just... Anyway, thank you for the experience.": "Это... зомбированное мясо?! Ты уверен, что его можно есть? Ну...\n\nХм...\n\nНет, это не для меня. Я вижу, что оно хорошо приготовлено, но то, что мясо всё ещё шевелится, просто... В любом случае, спасибо за опыт."
"Where's my deluxe beetle skewer?": "Где мой делюксовый шашлык из жука?"
"Here's an order for pieces of bugs. Wait, aren't aktaari those man-sized bugs? ... Good luck with this one.": "Вот заказ на кусочки жуков. Постой, разве актаари — это не жуки размером с человека? ... Удачи с этим."
"You weren't bugged by this assignment! I thought maybe you were a buginner but now I see that's humbug. ": "Тебя не напрягло это задание! Я думал, ты новичок, но теперь вижу, что это ерунда."
"You've got the basics. Let's get to specifics. You need to know how to blast apart a demon! So go do that. Do it for quite a while and take note of what works and what doesn't. I'll give you a quiz afterwards.": "Ты освоил основы. Теперь перейдём к деталям. Тебе нужно научиться взрывать демонов! Так что иди и делай это. Делай это достаточно долго и отмечай, что работает, а что нет. Потом я устрою тебе проверку знаний."
"Really? You got all fifty demons? Huh. That was much faster than I expected. I haven't even written up your quiz yet!\n\nWe can skip it for now, but remember what you learned! I'll give you a pop quiz later.": "Правда? Ты поймал всех пятьдесят демонов? Хм. Это было гораздо быстрее, чем я ожидал. Я даже ещё не подготовил для тебя тест!\n\nПока можем его пропустить, но запомни то, чему научился! Позже я устрою тебе неожиданный тест."
"Next I need to better understand how demons are so resistant to fire. Go and kill some of the medium-sized ones.\n\nOh, and wear this. It will automatically take detailed field notes.\n\n<i>[To advance this quest you must be wearing the Fire Analysis Gem and using Fire Magic.]</i>": "Далее мне нужно лучше понять, почему демоны так устойчивы к огню. Отправляйся и убей несколько средних по размеру демонов.\n\nО, и надень это. Оно автоматически будет вести подробные полевые заметки.\n\n<i>[Чтобы продвинуть этот квест, ты должен носить Самоцвет Огненного Анализа и использовать Огненную магию.]</i>"
"Let me see the gem. Hmm. Very good. Wait... You didn't enable the gem's aggressive protection mode. Did I not teach you the cantrip for that? Well, nevermind. Here: I've enabled it for you. Perhaps it'll be useful to you now that it's turned on.\n\nI also have a new spell that I am willing to teach you.": "Дай-ка посмотреть на самоцвет. Хм. Очень хорошо. Подожди... Ты не включил агрессивный режим защиты самоцвета. Разве я не учил тебя соответствующему заклинанию? Ну да ладно. Вот, я включил его за тебя. Возможно, теперь, когда он активирован, он тебе пригодится.\n\nУ меня также есть новое заклинание, которое я готов тебя научить."
"I guess you're ready to move up to tougher demons. The soldiers are next. They're tough, but the scariest part is their disease. Or maybe it's a curse, I dunno. I'm no sage! Anyway, they spread Hellfire sickness. I can give you some balm for afterwards, but... try your best not to get too much hellfire on you. It saps your life away. To me, it's the scariest thing on this battlefield. Fight smart.": "Полагаю, ты готов перейти к более опасным демонам. Следующие — солдаты. Они крепкие, но самое страшное в них — их болезнь. А может, это проклятие, не знаю. Я не мудрец! В любом случае, они разносят адский жар. Я могу дать тебе немного бальзама на потом, но... постарайся, чтобы на тебя попало не слишком много адского жара. Он высасывает из тебя жизнь. По мне, это самое страшное на этом поле боя. Сражайся с умом."
"Nice work! You brought the blaze of Arisetsu to those monsters! I have some hellfire curatives here. Take them.": "Отличная работа! Ты принес пламя Арисецу этим монстрам! У меня есть несколько лечебных средств от адского огня. Возьми их."
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Animals. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных животных. Можешь мне помочь?"
"Perfect! This is exactly what I needed. Let me share some of my findings with you.": "Отлично! Это именно то, что мне было нужно. Позволь поделиться с тобой некоторыми своими находками."
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Behemoths. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Бегемотов. Можешь мне помочь?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Justiciars. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных юстициаров. Можешь помочь?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Lesser Behemoths. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Младших Бегемотов. Не мог бы ты помочь мне?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Overseers. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Надзирателей. Можешь мне помочь?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Scouts. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных разведчиков. Можешь мне помочь?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Soldiers. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Солдат. Не мог бы ты помочь мне?"
"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Swarmers. Can you help me out?": "Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Сборщиков Роя. Можешь мне помочь?"
"This land is infested with problematic demons, and I cannot get close enough to the wall to achieve my goals. If you help me, I shall be very grateful.\n\nThe first thing I need is quite simple: just get a sample of every kind of gem or crystal that can be found when mining the crystals near the demons.": "Эта земля заражена проблемными демонами, и я не могу подойти достаточно близко к стене, чтобы достичь своих целей. Если ты поможешь мне, я буду очень благодарен.\\n\\nПервое, что мне нужно, довольно просто: просто возьми образец каждого вида драгоценных камней или кристаллов, которые можно найти при добыче кристаллов рядом с демонами."
"You... succeeded? I'm ... ahem, I'm impressed! You are much more useful than you look!\n\nI've done a cursory review of these crystals, and I have some follow-up requests, if you have time.": "Ты... справился? Я... кхм, я впечатлён! Ты гораздо полезнее, чем выглядишь!\n\nЯ провёл поверхностный анализ этих кристаллов и у меня есть несколько дополнительных просьб, если у тебя есть время."
"After helping all three toy rabbits, you find yourself holding a bag of gems and a key. \"We stole these to pay our gambling debts. We're sorry!\" says a voice in your head. Then it's gone.": "После того как ты помог всем трём игрушечным кроликам, ты оказываешься с мешочком драгоценных камней и ключом в руках. «Мы украли это, чтобы расплатиться с долгами по азартным играм. Нам очень жаль!» — говорит голос в твоей голове. Затем он исчезает."
"I still wish to woo Zeratak. I believe she would enjoy venison far more than mantis flesh if it was prepared appropriately. I have been experimenting with venison dishes, and I believe I have the recipe!\n\nBut I don't have any more ingredients left. Here is the recipe. Can you make it for me?": "Я всё ещё хочу завоевать Зератака. Я уверен, что ей понравится оленина гораздо больше, чем мясо богомола, если её правильно приготовить. Я экспериментировал с блюдами из оленины и, кажется, у меня есть рецепт!\n\nНо у меня больше нет ингредиентов. Вот рецепт. Можешь приготовить это для меня?"
"Perfect! Its odor is very appealing. This will be my ace in the hole, as they say in your idiom. Thank you.": "Отлично! Его запах очень приятен. Это будет мой козырь в рукаве, как говорится в вашем выражении. Спасибо."
"I've been working on a new fertilizer using some dinosaur scales I had delivered from Statehelm. It's not working yet, but I think I'm getting closer! But I need more scales.\n\nSay, I heard someone say there were dinosaurs in the crypt! You know, the crypt at the back of the graveyard? I only ever saw horrible spiders, but I didn't go in very far. Could you look?": "Я работаю над новым удобрением, используя чешую динозавров, которую мне доставили из Стейтхелма. Пока что это не работает, но, думаю, я приближаюсь к успеху! Но мне нужно больше чешуи.\n\nСлушай, я слышал, кто-то говорил, что в крипте есть динозавры! Знаешь, та крипта в глубине кладбища? Я там видел только ужасных пауков и не заходил далеко. Можешь проверить?"
"Perfect! Scaly! I'm going to turn them into powder and try to grow things with them. Wish me luck! Oh, here, let me show you a handy gardening trick.": "Отлично! Чешуйчатые! Я собираюсь превратить их в порошок и попробовать вырастить с их помощью растения. Пожелай мне удачи! О, вот, позволь показать тебе полезный садоводческий приём."
"Damn it all, I'm out of my secret ingredient! I need run-off water from stones in Kur. It's used in all my best potions! I'll pay well for it!": "Чёрт побери, у меня закончился мой секретный ингредиент! Мне нужна стекающая со скал вода из Кура. Она используется во всех моих лучших зельях! Я хорошо за неё заплачу!"
"Hmm, is this pure? It doesn't smell right. You got too many impurities in it! I'm sorry, but I have to dock your pay for that. Here's what you deserve.": "Хмм, это чисто? Запах какой-то странный. В нём слишком много примесей! Извини, но я вынужден удержать часть твоей платы за это. Вот что ты заслужил."
"I want to show Red how useful I am. First idea: I want to hide Fox Outpost better. Red says it used to be hidden by a glamour, but now it's just stuck out here in the open.\n\nI'll have to experiment with what works best, but my first idea is just to use paint to camouflage things. Can you help me get the paint ready? I need agates. They should make a paint that's similar to the color of the rocks around here.": "Я хочу показать Реду, насколько я полезен. Первая идея: я хочу лучше спрятать Лисий форпост. Ред говорит, что раньше его скрывал гламур, а теперь он просто торчит здесь на виду.\n\nМне придётся поэкспериментировать, что работает лучше всего, но моя первая идея — просто использовать краску для маскировки. Ты можешь помочь мне подготовить краску? Мне нужны агаты. Из них должна получиться краска, похожая на цвет окружающих камней."
"Thanks! Oh, wait, I also need some lac to make the paint! But one step at a time, right? Here: this is for you.": "Спасибо! О, подожди, мне ещё нужна лаковая смола, чтобы сделать краску! Но всё по порядку, да? Вот, это для тебя."
"Okay, these agates are great. But to make a useful paint I also need some lac. It comes from insects... but harvesting little insects would take too long. I bet the tor-urak that live around here would have it in larger quantities.": "Хорошо, эти агаты отличные. Но чтобы сделать полезную краску, мне также нужно немного лакового сока. Он добывается из насекомых... но собирать мелких насекомых займёт слишком много времени. Бьюсь об заклад, что тор-ураки, которые живут здесь рядом, имеют его в больших количествах."
"Okay, thanks. I haven't ever actually made paint before, but I saw someone make it once, and it's probably pretty easy.\n\nHere, I don't have much to offer, but I wanted you to have this. Master taught me that wizards use these to learn how to shoot lightning. Maybe you can sell it to a wizard and buy yourself something nice.": "Хорошо, спасибо. Я никогда раньше не делал краску, но однажды видел, как кто-то её делал, и, наверное, это довольно просто.\n\nВот, у меня мало что есть, чтобы предложить, но я хотел, чтобы у тебя было это. Мастер учил меня, что волшебники используют это, чтобы научиться стрелять молниями. Может, ты сможешь продать это волшебнику и купить себе что-нибудь хорошее."
"It is atypical for members of my species to desire the destruction of meatlings. However, the snails in this cavern are of egregious proportions and they enjoy consuming many of the same food sources that I do. They also enjoy consuming me directly. For this reason, I request their dissolution.": "Для представителей моего вида нетипично желать уничтожения мясных существ. Однако улитки в этой пещере достигли вопиющих размеров и любят пожирать многие из тех же источников пищи, что и я. А ещё они не прочь сожрать и меня самого. По этой причине я прошу об их уничтожении."
"It is with relief that I acknowledge your completion of this task! You will find this substance to be of value.": "С облегчением признаю, что ты выполнил это задание! Ты найдёшь это вещество ценным."
"The goblins are keeping the ranalon very focused on their west flank. The eastern flank, the one facing us, has only a handful of guards. If we attack it, they'll have to split their forces up more, giving the goblins a better chance to take them out for us.\n\nFocus on the guards at the outpost down the road. That will get their attention. I will pay you 350 Councils if you kill six of them.": "Гоблины заставляют раналонов очень внимательно следить за их западным флангом. Восточный фланг, тот, что обращён к нам, охраняют всего несколько стражей. Если мы атакуем его, им придётся разделить свои силы, что даст гоблинам больше шансов уничтожить их для нас.\\n\\nСосредоточься на стражах на заставе по дороге. Это привлечёт их внимание. Я заплачу тебе 350 Каунсилов, если ты убьёшь шестерых из них."
"Good work. And yes, I know, trying to help the bloody goblins is terrible... but the enemy of my enemy is an ally. Let's hope the goblins make a move soon.": "Хорошая работа. И да, я знаю, пытаться помочь этим проклятым гоблинам — это ужасно... но враг моего врага — союзник. Будем надеяться, что гоблины скоро сделают ход."
"I'm feeling a little foolish about this, but could I trouble you to go back where you were and get me a fresh phoenix egg? I know I should have asked you before, but I completely forgot about it. I mix the egg with the feed for sickly pigeons to aid in healing.\nI have asked to speak with the Queen about your request, and will let her know of your extra effort to aid me.": "Я немного неловко из-за этого, но не мог бы ты вернуться туда, где был, и принести мне свежее яйцо феникса? Я знаю, что должна была попросить тебя раньше, но совсем забыла об этом. Я смешиваю яйцо с кормом для больных голубей, чтобы помочь им выздороветь.\\nЯ попросила поговорить с Королевой о твоей просьбе и сообщу ей о твоих дополнительных усилиях, чтобы помочь мне."
"Thank you for your help. I'll get some feed mixed up and complete treatment. The Queen says she will consider your request. It will be a few hours before I know anything on our patient or hear from the Queen, so check back with me a little later.\n\n<i>[You must wait at least 3 hours before continuing this conversation]</i>": "Спасибо за помощь. Я приготовлю корм и проведу полное лечение. Королева говорит, что рассмотрит твою просьбу. Пройдёт несколько часов, прежде чем я узнаю что-нибудь о нашем пациенте или услышу от Королевы, так что загляни ко мне немного позже.\n\n<i>[Тебе нужно подождать как минимум 3 часа, прежде чем продолжить этот разговор]</i>"
"It's that time again: time to ask for help paying the rent for over fifty would-be homeless people! We've promised to pay their rent until they're able to pay it themselves, and we need your help to do that!\n\nFor tax-clarity purposes, I would appreciate any donation be in the form of Council Certificates.": "Настало то время снова: время просить помощи в оплате аренды для более чем пятидесяти потенциально бездомных! Мы обещали оплачивать их аренду, пока они не смогут платить сами, и нам нужна твоя помощь в этом!\n\nДля налоговой прозрачности я был бы признателен, если бы любые пожертвования были в форме сертификатов Совета."
"Thank you! You've been so generous. Here are some tokens of the church. If you'd like, I can trade them in for special favors.": "Спасибо! Ты был так щедр. Вот несколько жетонов церкви. Если хочешь, я могу обменять их на особые услуги."
"You repelled the spontaneous ranalon invasion of Statehlm!": "Вы отразили внезапное вторжение раналонов в Стейтхельм!"
"The final ingredient I need to recover my mental powers is... an ancient pineal gland. I know where you can find exactly... What I need. Search for a Tuvillic Rune in Povus. I believe it is somewhere along the outer wall.": "Последний ингредиент, который мне нужен для восстановления умственных способностей, — это древняя шишковидная железа. Я знаю, где ты можешь найти именно... то, что мне нужно. Поищи тувиллическую руну в Повусе. Думаю, она где-то вдоль внешней стены."
"Excellent! I am pleased! Wait while I prepare the salve.\n\nYes! I can feel my powers returning! And of course I shall reward you, too, my loyal bloodling.\n\nThere. I have unlocked a potent mind-power. Perhaps it is to your... liking.": "Отлично! Я доволен! Подожди, пока я приготовлю мазь.\n\nДа! Я чувствую, как мои силы возвращаются! И, конечно, я тоже вознагражу тебя, мой верный кровник.\n\nВот. Я открыл мощную силу разума. Возможно, она тебе... понравится."
"Relics from a long-finished war arise in the sands of the Ilmari Desert. These 'overseers' are remnants of a demonic army. They will communicate with their demon masters and convey the state of our world to outsiders. Druids, slay these creatures quickly! Every moment they exist puts our world in further peril.\n\nTheir otherworldly defenses would prove too much even for your powers, so I have augmented your 'Rotskin' ability. Use it to cut through their preliminary shielding.": "Реликвии давно завершённой войны восстают из песков пустыни Илмари. Эти «надзиратели» — остатки демонической армии. Они будут связываться со своими демоническими хозяевами и передавать состояние нашего мира посторонним. Друиды, быстро уничтожьте этих существ! Каждая минута их существования ставит наш мир под ещё большую угрозу.\\n\\nИх потусторонняя защита была бы слишком сильна даже для ваших сил, поэтому я усилил вашу способность «Гнилошкур» (Rotskin). Используйте её, чтобы прорваться через их предварительный щит."
"You have broken the ranks of the creatures. Some remain, but perhaps that works to our advantage: they will communicate back to their masters that this world is not an easy target.\n\nYou have done well today, my druids. Go with Dreva's blessings.": "Вы разрушили ряды существ. Некоторые остались, но, возможно, это играет нам на руку: они донесут своим хозяевам, что этот мир — не лёгкая добыча.\n\nВы сегодня хорошо потрудились, мои друиды. Идите с благословениями Древы."
"The troubled valleys of Eltibule are even more dangerous than they should be. Droaches have leaked out of the dark places in the ground to cause mayhem to the surface ecologies. Druids, go now and make it right.\n\nFire droaches flow from the dwarven statues and congregate near the central keep. Defeat them to lure out the more calculating electric droaches, and then defeat those as well.": "Беспокойные долины Элтибула стали ещё опаснее, чем должны быть. Дроачи вырвались из тёмных подземелий и сеют хаос в поверхностных экосистемах. Друиды, отправляйтесь сейчас и исправьте это.\\n\\nОгненные дроачи исходят от гномьих статуй и собираются возле центральной крепости. Победите их, чтобы выманить более хитрых электрических дроачей, а затем уничтожьте и их."
"Excellent work. Most of the droaches are now defeated.\n\nYou have stymied the schemes of a foul and perverse god who I shall not name. Trust that your actions here were worth the price. Go now with Dreva's blessing.": "Отличная работа. Большинство дроачей теперь повержены.\n\nТы сорвал планы гнусного и извращённого бога, имя которого я не стану называть. Поверь, твои действия здесь стоили той цены. Иди теперь с благословением Древы."
"Druids, head to Serbule Hills! Ranalons there have begun a ritual invocation of Enoyos, beseeching him to turn all the lakes of Serbule into brackish water.\n\nTheir stone offering-boxes surround the lake. Desecrate these boxes to disrupt the ritual, then find and slay the head shamans that swim in the lake itself.\n\nThe offering-boxes are strongly enchanted, so multiple druids will need to desecrate each one. Since the desecration ritual requires the petals of the rare Rotflower, I have caused this flower to bloom throughout the hills and mountains of Serbule Hills.\n\nFind the Rotflowers, desecrate the offering chests, then execute the shamans.": "Друиды, направляйтесь в холмы Сербуль! Раналоны там начали ритуальное призывание Энойоса, умоляя его превратить все озёра Сербуля в солоноватую воду.\n\nИх каменные жертвенные ящики окружают озеро. Оскверните эти ящики, чтобы сорвать ритуал, затем найдите и убейте главных шаманов, которые плавают в самом озере.\n\nЖертвенные ящики сильно зачарованы, поэтому несколько друидов должны осквернить каждый из них. Поскольку ритуал осквернения требует лепестков редкого Гнилотцвета, я вызвал цветение этого цветка по всему Сербульскому холмам и горам.\n\nНайдите Гнилотцветы, оскверните жертвенные сундуки, затем уничтожьте шаманов."
"Good work. Any attempt to alter the balance of nature must be dealt with harshly. And so you have!\n\nBe ready for further incidents from the ranalon. They worship Enoyos, the god of oceans and water, and Enoyos has vowed to flood the world and drown all land-dwellers. I fear he may be mobilizing his minions to bring about this scheme.\n\nBut that is a problem for another day. For now, relax and enjoy the fruits of nature!": "Хорошая работа. Любая попытка нарушить равновесие природы должна жестко пресекаться. И ты это сделал!\n\nБудь готов к дальнейшим инцидентам с раналоном. Они поклоняются Энойосу, богу океанов и воды, и Энойос поклялся затопить мир и утопить всех обитателей суши. Боюсь, он может мобилизовать своих приспешников для осуществления этого плана.\n\nНо это проблема будущего дня. А пока расслабься и наслаждайся дарами природы!"
"Hark druids, in a cold and distant land named Kur, a dangerous enemy plots and schemes. You need not deal with this foe directly, but you must stymie her plans before they come to fruition.\n\nFrom the frozen waters come many giant ice elementals, each as strong as ten soldiers. Dismantle them.\n\nNature is, as always, your ally, so you should have little fear of the icy winds while my blessing is upon you. Now go!": "Слушайте, друиды, в холодной и далёкой земле по имени Кур опасный враг плетёт заговоры и интриги. Вам не нужно сражаться с этим противником напрямую, но вы должны помешать её планам, прежде чем они осуществятся.\n\nИз замёрзших вод выходят множество гигантских ледяных элементалей, каждый силён, как десять солдат. Уничтожьте их.\n\nПрирода, как всегда, ваш союзник, так что вам не стоит бояться ледяных ветров, пока моё благословение с вами. Вперёд!"
"I sense the seething rage of our dangerous foe. This can only mean that you have succeeded! Many thanks to you. Bury your fallen comrades and go back to your simple lives. Do not worry overmuch about any remaining elementals -- they will decay in time, for their master no longer drives them.": "Я ощущаю кипящую ярость нашего опасного врага. Это может означать только одно — ты преуспел! Большое тебе спасибо. Похорони павших товарищей и возвращайся к своей простой жизни. Не слишком беспокойся о оставшихся элементалях — со временем они разрушатся, ведь их хозяин больше не управляет ими."
"Druids, assemble in Serbule immediately. Multiple kraken eggs have been spotted there, along with several young adults. Krakens are not indigenous to this continent and represent a terrible threat to nature. Defeat them now, before they become the size of cities!": "Друиды, немедленно собирайтесь в Сербуле. Там было замечено несколько яиц кракенов, а также несколько молодых особей. Кракены не являются коренными обитателями этого континента и представляют ужасную угрозу для природы. Победите их сейчас, пока они не стали размером с города!"
"Good work, my druids. The kraken incursion seems to be over. Just clean up any loose ends and then return to your peaceful lives with Dreva's blessing.": "Хорошая работа, мои друиды. Вторжение кракена, похоже, закончено. Просто разберитесь с оставшимися делами и затем возвращайтесь к своей мирной жизни с благословением Древы."
"I like to make my own drums so I can get exactly the sound i need. My newest drum needs to have a perfect resonance, and for that, I need really great animal skin! Don't tan it -- I know it'll stink, but bring me the untanned hide. I need to process it myself in a special way. I'll pay you for the work!": "Мне нравится делать собственные барабаны, чтобы получить именно тот звук, который мне нужен. Моему новому барабану нужна идеальная резонансность, а для этого мне нужна действительно отличная звериная шкура! Не дуби её — я знаю, что она будет вонять, но принеси мне недублёную шкуру. Мне нужно обработать её особым способом самостоятельно. Я заплачу тебе за работу!"
"Hmmmmm. Hmmmmm. I thought they'd be thicker. But okay, fine, these skins will do. Thank you, and here's your coins.": "Хмммм. Хмммм. Я думал, они будут толще. Но ладно, пойдут эти шкуры. Спасибо, вот твои монеты."
"We've got two raw new recruits today. You think you're good with a sword, why not show them how it's done? Take apart one of these training dummies with a sword.\n\n<i>[You must have the Sword skill active to advance this quest.]</i>": "Сегодня у нас два совсем новичка. Думаешь, ты хорошо обращаешься с мечом? Почему бы не показать им, как это делается? Разбей одного из этих тренировочных манекенов мечом.\\n\\n<i>[Для выполнения этого задания у тебя должен быть активен навык Меч.]</i>"
"That's precisely how it's done! But are you a one-trick goblin?": "Вот именно так это делается! Но ты что, гоблин с одним приёмом?"
"That was impressive with the sword. But can you destroy a dummy WITHOUT a sword? Let's see your versatility!\n\n<i>[You must NOT have the Sword skill active to advance this quest.]</i>": "Это было впечатляюще с мечом. Но сможешь ли ты уничтожить манекен БЕЗ меча? Покажи свою универсальность!\n\n<i>[У тебя НЕ должен быть активен навык Меч, чтобы продвинуть этот квест.]</i>"
"You're scarily effective. But it's the good kind of scary!": "Ты пугающе эффективен. Но это тот самый хороший страх!"
"Okay, I think you've proven yourself. But here's one more challenge that's just for fun. Can you take out a dummy with a shield and your fists?\n\n<i>[You must have the Shield and Unarmed skills active to advance this quest.]</i>": "Хорошо, я думаю, ты доказал свою состоятельность. Но вот ещё одно испытание просто для удовольствия. Сможешь ли ты уничтожить манекен с щитом и своими кулаками?\n\n<i>[Для выполнения этого задания у тебя должны быть активны навыки Щит и Бой без оружия.]</i>"
"Hahaha! Nice work. Okay, you've done enough showing off for today.": "Ха-ха-ха! Отличная работа. Ладно, ты уже достаточно похвастался на сегодня."
"I'm gonna head out and do some mining soon, but need to get some supplies in. Can you help? I want some hard-boiled eggs. Good travelling food.": "Я скоро отправлюсь на добычу руды, но мне нужно запастись припасами. Можешь помочь? Мне нужны вкрутую сваренные яйца. Хорошая еда в дорогу."
"Thanks! Mm, smell that sulfury goodness.": "Спасибо! Ммм, почувствуй этот сернистый аромат."
"My friend Lisi in Sun Vale is very good at making images. Of course now she needs to use paper, but it's still not bad. She's holding a, uh... a book for me. Like an an art book, you know? With sketches of ... nature. Look, nevermind. Just go to Sun Vale and bring me back that book!": "Моя подруга Лизи в Солнечной долине очень хорошо умеет создавать изображения. Конечно, теперь ей приходится использовать бумагу, но всё равно получается неплохо. Она хранит для меня, э-э... книгу. Ну, вроде художественного альбома, понимаешь? С набросками... природы. Ладно, неважно. Просто отправляйся в Солнечную долину и принеси мне эту книгу!"
"Very nice! Very ... ah ... natural. Would you excuse me for a moment?": "Очень хорошо! Очень ... ах ... натурально. Извините меня на минуту?"
"Felmer sent you?\n\n<i>[Lisi glances around anxiously, then sighs.]</i>\n\nHe always does this. If Silvia finds out...\n\n<i>[She shoots you a pointed look.]</i>\n\nNevermind! I didn't say anything! You didn't even talk to me!\n\nHere's the 'art book' for Felmer. And tell him I won't keep doing this! This is the last time!": "Фелмер послал тебя?\\n\\n<i>[Лизи тревожно оглядывается по сторонам, затем вздыхает.]</i>\\n\\nОн всегда так делает. Если Сильвия узнает...\\n\\n<i>[Она бросает тебе пронизывающий взгляд.]</i>\\n\\nЛадно, не важно! Я ничего не говорила! Ты даже со мной не разговаривал!\\n\\nВот «художественный альбом» для Фелмера. И скажи ему, что я больше так не буду! В последний раз!"
"I've seen the Winter Court's outposts. They're staying in tiny dimensional pockets where they think they're safe. But they have to come out some time. Show them that their safety is an illusion.": "Я видел аванпосты Зимнего Двора. Они прячутся в крошечных измерительных карманах, думая, что там в безопасности. Но им рано или поздно придётся выйти. Покажи им, что их безопасность — иллюзия."
"They aren't really dead, you know. Not like mortals die. They'll be back within a week. But they'll not soon forget the pain you caused them! Thank you.": "Они на самом деле не мертвы, знаешь ли. Не так, как у смертных. Они вернутся в течение недели. Но они надолго не забудут ту боль, которую ты им причинил! Спасибо."
"Hey, while you're assaulting the ship and all, why not kill some of the pests on the engine deck? We've got a nasty infestation of droaches down there. Apparently they get along great with the phoenixes, so everybody's afraid to get rid of 'em. But not you!": "Эй, раз уж вы штурмуете корабль, почему бы не перебить вредителей на палубе машинного отделения? Там внизу у нас отвратительное нашествие дроучей. Похоже, они отлично ладят с фениксами, поэтому все боятся от них избавиться. Но не вы!"
"Thanks for stamping out some droaches. I'm sure there's hundreds more in the walls and floors, but if we can at least terrorize them into staying out of the way, that's a big win.\n\nHey, stand still. This may hurt. There! Did it hurt? Perfect! You've stolen more of our technology! That will outrage the captain even more!\n\nThose blueprints are probably useless to you right now, but I'm sure some day you'll be glad I burned them into your mind!": "Спасибо, что уничтожил несколько дроачей. Я уверен, что в стенах и полах их сотни, но если мы хотя бы напугаем их, чтобы они держались подальше, это уже большая победа.\n\nЭй, стой на месте. Это может больно. Вот так! Больно? Отлично! Ты украл ещё немного нашей технологии! Это ещё больше разозлит капитана!\n\nЭти чертежи, вероятно, сейчас тебе ни к чему, но я уверен, что когда-нибудь ты будешь рад, что я вжёг их в твою память!"
"Denton Razor said that someone named 'Engineer Crall' in Vidaria bought some of my jewelry. Find this Crall and convince them to return the stolen goods!": "Дентон Рейзор сказал, что кто-то по имени «Инженер Кралл» в Видарии купил часть моих ювелирных изделий. Найдите этого Кралла и убедите его вернуть украденные вещи!"
"You found some of my jewelry! Not enough to open the shop, but enough to give me hope! Thank you!": "Вы нашли часть моих украшений! Недостаточно, чтобы открыть магазин, но достаточно, чтобы вселить в меня надежду! Спасибо!"
"Ah, a lovely thermic rubyite! I will take possession of it. I need six in total.": "Ах, прекрасный термический рубиит! Я заберу его себе. Мне нужно всего шесть."
"Let me think. How would you assault a ship? I guess you could just attack the crew! Try attacking the ensigns! Heehee!\n\nOh, uh, be aware they have death rays. Just a heads up.": "Дай подумать. Как бы ты штурмовал корабль? Думаю, можно просто напасть на экипаж! Попробуй атаковать мичманов! Хи-хи!\n\nО, э-э, имей в виду, у них есть лучи смерти. Просто предупреждаю."
"You sent those ensigns back to their lifestones! It'll take them a few days to recover and catch a ride back here! So you're totally winning! This is very impressive!\n\nHere, keep this. I'm going to tell everyone that you tortured me for it!": "Ты отправил этих знаменосцев обратно к их камням жизни! Им понадобится несколько дней, чтобы восстановиться и добраться сюда! Так что ты полностью побеждаешь! Это очень впечатляет!\n\nВот, держи это. Я расскажу всем, что ты меня за это мучил!"
"Helena is a degenerate. She's addicted to gambling, and worse: she's addicted to CHEATING at gambling. But still, she's a Veilmoor. If she should fall prey to a monster or a highwayman, it would tarnish the Veilmoor name. That's my excuse, anyway.\n\nI want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.": "Хелена — развратница. Она зависима от азартных игр, и что ещё хуже: она зависима от мошенничества в азартных играх. Но всё же она Вейлмур. Если она станет жертвой монстра или разбойника, это запятнает имя Вейлмуров. По крайней мере, это моё оправдание.\n\nЯ хочу отправить ей амулет защиты. Это семейный рецепт, передаваемый из поколения в поколение уже три раза. Четыре, если я когда-нибудь научу этому Хелену. У меня есть основы, но мне нужны особые фокусы."
"I'll finish up the amulet now. Then you can take it to her, okay?": "Я сейчас закончу амулет. Потом ты сможешь отнести его ей, хорошо?"
"You need to be more learned. It'll make you more interesting to talk to. Go and brew some alchemical substances -- alchemists are learned!": "Тебе нужно стать более образованным. Это сделает тебя интереснее в разговоре. Сходи и приготовь несколько алхимических веществ — алхимики же образованные!"
"You brewed the potions? Okay, good. Yes, okay. ... Okay, stop telling me about the potions you brewed. It didn't work: you're still boring to talk to!": "Ты сварил зелья? Хорошо, отлично. Да, хорошо. ... Ладно, хватит рассказывать мне о зельях, которые ты сварил. Это не сработало: с тобой всё равно скучно разговаривать!"
"Everybody always gives thoughtful gifts. It's stupid. Go and give people terrible gifts! Ha ha! Find out what they hate and give them that. Hilarious!\n\n<i>[ Tip: use 'Small Talk' to find what NPCs dislike. Not every NPC has strong dislikes, but many of them are just quiet about it -- they won't share their dislikes with you until you reach Friends favor level. ]</i>": "Все всегда дарят продуманные подарки. Это глупо. Иди и дари людям ужасные подарки! Ха-ха! Узнай, что им не нравится, и дари им это. Весело!\n\n<i>[ Совет: используй «Светскую беседу», чтобы узнать, что не нравится NPC. Не у каждого NPC есть сильные антипатии, но многие просто молчат об этом — они не расскажут тебе о своих антипатиях, пока ты не достигнешь уровня расположения «Друзья». ]</i>"
"Well, it was hilarious to <i>me</i>. Sorry that it didn't go as well for <i>you</i>. Here's some cash to help you smooth everything over.": "Ну, для <i>меня</i> это было смешно. Жаль, что у <i>тебя</i> всё прошло не так хорошо. Вот немного денег, чтобы помочь уладить всё."
"You're so boring! Go kill some deadly boss monsters! There's always boss monsters in epic tales!": "Ты такой скучный! Иди убей несколько смертельно опасных боссов! В эпических историях всегда есть боссы!"
"Mmm. Well, I'm sure the boss fight was dramatic, but your storytelling skill is ... terrible. I need to feel like I was there!": "Ммм. Ну, я уверен, что битва с боссом была драматичной, но твои навыки рассказчика... ужасны. Мне нужно почувствовать, что я был там!"
"Explosions are entertaining! Go explode some animals! Or monsters! Or whatever!\n\n<i>[ The killing blow must be made with a burst attack, such as a bomb or explosion. ]</i>": "Взрывы — это весело! Взорви несколько животных! Или монстров! Или кого угодно!\n\n<i>[Убийственный удар должен быть нанесён взрывной атакой, например, бомбой или взрывом.]</i>"
"That was kind of entertaining -- the bits I could see, anyway...": "Это было довольно забавно — по крайней мере, то, что я смог увидеть..."
"Butcher some dead beasts for my amusement! Take a butcher knife and just... yeah, cut out their meat! Ugh, so gross, just thinking about it! Ha ha! That's why you're doing it and not me.": "Забей несколько мёртвых зверей для моего развлечения! Возьми мясницкий нож и просто... да, вырежь их мясо! Фу, так отвратительно, даже думать об этом противно! Ха-ха! Вот почему делаешь это ты, а не я."
"You butchered all that meat? Wow. You're kind of a monster, aren't you? Ha ha, just kidding! Just kidding! Don't get angry! Here. Take this and settle down.": "Ты перерезал всё это мясо? Вау. Ты, наверное, настоящий монстр, да? Ха-ха, шучу! Просто шучу! Не злись! Вот, возьми это и успокойся."
"I hate the smell of raw fish, but I sometimes like the smell of fried fish. Weird, right?\n\nHmm, go and cook some fish. Maybe the smell will waft towards me.": "Я ненавижу запах сырой рыбы, но иногда мне нравится запах жареной рыбы. Странно, да?\n\nХм, сходи и приготовь рыбу. Может, запах донесётся до меня."
"Well... the smell of fried fish isn't as pleasant as I remembered.": "Ну... запах жареной рыбы не такой приятный, как я помнил."
"Go chop lumber. I don't know why I think that will entertain me, but I'm willing to try anything at this point.": "Пойди наруби дров. Не знаю, почему я думаю, что это меня развлечёт, но сейчас я готов попробовать что угодно."
"You what? You chopped lumber on my behalf? Why would that be entertaining?! Who asked you to... oh, I guess I did. Well, that was dumb, but good job.": "Ты что? Ты рубил дрова за меня? Почему это должно быть забавно?! Кто просил тебя... о, кажется, это был я. Ну, это было глупо, но молодец."
"Dance for me, peasant! Err, I mean... dance for me, pleasant. ly. Pleasantly. Just dance, okay?": "Танцуй для меня, крестьянин! Эээ, то есть... танцуй для меня приятно. Приятно. Просто танцуй, хорошо?"
"That was some terrible dancing. But vaguely entertaining in its terribleness, so good job.": "Это было ужасное танцевание. Но в своей ужасности оно было отчасти забавным, так что молодец."
"What we need is more brave hunters. Be a brave hunter. Go kill some harmless deer! But do it the hunter way: with a bow and arrow. None of that magical crap!": "Нам нужно больше смелых охотников. Стань смелым охотником. Иди убей несколько безобидных оленей! Но сделай это по-охотничьи: с луком и стрелами. Никакой магической ерунды!"
"Well, it turns out that watching a hunter skulk around is intrinsically boring. Who knew?": "Оказывается, наблюдать за тем, как охотник крадётся, по своей сути скучно. Кто бы мог подумать?"
"I hear hard work keeps your mind off of things, so why don't you do some hard work for me? Go survey for minerals and dig them up! I think there's a lady in Serbule Hills that can teach you the basics -- she's in that little inn down there.": "Говорят, что тяжёлая работа отвлекает от мыслей, так почему бы тебе не поработать на меня? Отправляйся на разведку минералов и выкопай их! Думаю, в холмах Сербуле есть женщина, которая может научить тебя основам — она в той маленькой таверне внизу."
"So you calculated the location of semiprecious stones and then dug them up out of the ground? Nice! And see? Not boring at all, right? Hard work is its own reward!\n\nNo but really, here's a real reward.": "Итак, ты вычислил местонахождение полудрагоценных камней и выкопал их из земли? Отлично! Видишь? Совсем не скучно, правда? Тяжёлая работа — сама по себе награда!\n\nНо серьёзно, вот настоящая награда."
"Nothing is entertaining enough! Hmm... perhaps... why don't you drink some poison? Not enough to kill you, necessarily -- just enough to make you quite ill.": "Ничто не кажется достаточно забавным! Хм... может быть... почему бы тебе не выпить немного яда? Не столько, чтобы убить тебя, а просто чтобы сильно заболеть."
"Nope. You are especially un-fun while you're being violently ill. Not entertaining!\n\nOh, stop the moaning. Here. Here's some extra coin for your trouble.": "Нет. Ты особенно невыносим, когда тебя сильно тошнит. Совсем не забавно!\n\nХватит стонать. Вот, возьми немного денег за свои мучения."
"You know what's funny? Falling down is funny! But is it funny if the person hurts themselves? I need to experiment. Fall off of things repeatedly -- make sure you hurt yourself each time.": "Знаешь, что смешно? Падать — это смешно! Но будет ли это смешно, если человек поранится? Мне нужно провести эксперимент. Падай с разных мест снова и снова — убедись, что каждый раз ты поранишься."
"So, was it funny? ... Well, you're biased. I'm sure it was great fun. Stop being such a whiner.": "Ну, было смешно? ... Ладно, ты предвзят. Я уверен, что это было очень весело. Хватит ныть."
"Go into the lake and catch some fish with your bare hands! That's sure to entertain me briefly!": "Зайди в озеро и поймай рыбу голыми руками! Это точно ненадолго меня развлечёт!"
"Well, I have no idea if that was entertaining or not. You were pretty far away and I couldn't see you. I guess I didn't think that through too well.": "Ну, я понятия не имею, было ли это забавно или нет. Ты был довольно далеко, и я не мог тебя видеть. Похоже, я плохо это продумал."
"I hate how hunters always talk about their big game, but they don't have scars. How dangerous could it be if you don't even get maimed? So go get hurt. That'll give you a much more authentic hunting story to tell me.": "Ненавижу, когда охотники постоянно рассказывают о своей крупной добыче, но у них нет шрамов. Насколько это может быть опасно, если тебя даже не покалечили? Так что иди и поранись. Тогда у тебя будет гораздо более настоящая охотничья история, чтобы рассказать мне."
"Nice wounds! So, tell me the epic story of your battle! ... ... That's it? You should have embellished it some more. But I guess it's a start of a decent story.": "Отличные раны! Так расскажи мне эпическую историю своей битвы! ... ... Вот и всё? Ты должен был немного приукрасить. Но, думаю, это начало неплохой истории."
"Hmm, go and, and... eat! Eat a ton of cooked food all at once!": "Хмм, иди и... ешь! Съешь кучу приготовленной еды сразу!"
"You aren't nearly as incapacitated as I'd have expected from someone who just ate 12 meals. Boring. But I guess you tried.": "Ты далеко не так обездвижен, как я ожидал от того, кто только что съел 12 порций. Скучно. Но, полагаю, ты старался."
"You know why you aren't entertaining? It's because you don't smell like flowers. I <i>think</i>. So go grow some flowers!": "Ты знаешь, почему ты не забавный? Потому что ты не пахнешь цветами. Я <i>думаю</i>. Так что иди вырасти немного цветов!"
"Nope, that wasn't it: you're still not entertaining. You do smell different, though: flowery but with a slight musk of sweat... strangely nice, in fact...\n\nIn fact... I was thinking maybe you and I could go and... wait! No!\n\nSorry about that: I accidentally lowered my standards for a second there. All better now!": "Нет, это не то: ты всё ещё не забавен. Хотя ты пахнешь иначе: цветочно, но с лёгким мускусным запахом пота... на самом деле довольно приятно...\n\nНа самом деле... я думал, может, мы с тобой могли бы пойти и... подожди! Нет!\n\nИзвини за это: я случайно на секунду понизил свои стандарты. Теперь всё в порядке!"
"Why don't you go grow some vegetables for me? Yes. Grow a dozen fresh vegetables. How bored am I? I'm bored enough to watch plants grow -- THAT'S how bored!": "Почему бы тебе не вырастить для меня немного овощей? Да. Вырасти дюжину свежих овощей. Насколько мне скучно? Мне настолько скучно, что я готов смотреть, как растут растения — ТАК мне скучно!"
"Well, I am sorry to report that watching plants grow is not exciting. I guess I figured since farmers do it all day, it must have had some fascination, but no. Sigh.": "Ну, с сожалением сообщаю, что наблюдать за ростом растений — это не захватывающе. Я думал, раз фермеры делают это весь день, в этом должно быть что-то увлекательное, но нет. Вздох."
"Go and kill some animals! Pigs, deer, sheep, whatever. But don't do it in town, you'll upset everybody. And don't kill monsters -- just animals! I don't want you getting hurt on my behalf.": "Иди и убей несколько животных! Свиней, оленей, овец — кого угодно. Но не делай это в городе, ты всех расстроишь. И не убивай монстров — только животных! Я не хочу, чтобы ты пострадал из-за меня."
"You really went out and killed animals on my behalf? Gruesome! I am like unto a god! Sorry, sorry. I meant like unto a rich person. Here's money.": "Ты правда вышел и убил животных ради меня? Жестоко! Я словно бог! Извини, извини. Я хотел сказать, словно богатый человек. Вот деньги."
"Nothing works! Nothing is entertaining! I guess I am just too jaded to be amused by simple things. But there's still the ultimate prey: other people! Go kill another adventurer! Mwahahaha!\n\n<i>[ There's a \"PvP cellar\" in Serbule where players can attack each other. See if you can kill someone in there. ]</i>": "Ничего не помогает! Ничто не развлекает! Похоже, я слишком избалован, чтобы радоваться простым вещам. Но есть ещё высшая добыча: другие люди! Иди убей другого приключенца! Мвахахаха!\\\\n\\\\n<i>[ В Сербуле есть «PvP-подвал», где игроки могут нападать друг на друга. Попробуй убить кого-нибудь там. ]</i>"
"It's done?! ... Wait, I saw that guy run by just a minute ago. You didn't kill anybody! But I like your chutzpah, you really sold that lie with your body language.": "Готово?! ... Подожди, я видел, как тот парень пробегал всего минуту назад. Ты никого не убил! Но мне нравится твоя наглость, ты действительно убедительно сыграл эту ложь своим языком тела."
"Go milk the cows! All five of them! ... what do you mean there's only four cows? I saw a fifth one wander by recently. A talking cow. Get her milk, too!": "Пойди подой коров! Всех пяти! ... что ты говоришь, коров всего четыре? Я недавно видел, как мимо проходила пятая. Говорящая корова. Подой и её тоже!"
"Good! See, doesn't working with your hands cure boredom? Not for me, obviously. But for you! I care about you. Not really. Here's some money.": "Отлично! Видишь, разве работа руками не лечит скуку? Для меня — нет, конечно. А для тебя — да! Мне не всё равно на тебя. На самом деле нет. Вот немного денег."
"Go dig up some mushrooms. Tell me if you hear any weird whispering in your head when you do it.": "Пойди выкопай несколько грибов. Скажи мне, если услышишь странный шёпот в голове, пока будешь это делать."
"Did you hear anything when you picked the mushrooms? See a weird vision? ... no, no, don't tell me! I'm positive I was just imagining it, and your evidence would just cause me to doubt myself further. I have to believe in myself! And I believe my brain was lying to me! Case closed.": "Ты что-нибудь слышал, когда собирал грибы? Видел странное видение? ... нет, нет, не говори! Я уверен, что это было просто воображение, а твои доказательства только заставят меня сомневаться в себе ещё больше. Я должен верить в себя! И я верю, что мой мозг меня обманывал! Дело закрыто."
"Death can be entertaining. Not mine, though. Nor yours! Well, maybe yours... but that's short-term thinking. I need you to stick around and alleviate my boredom for a long time to come.\n\nHmm, you should kill something though. And do it in an entertaining way. Kick some pigs to death.\n\n<i>[ The killing blow must be a kick. ]</i>": "Смерть может быть забавной. Но не моя. И не твоя! Ну, может быть, твоя... но это краткосрочное мышление. Мне нужно, чтобы ты остался и развлекал меня ещё долгое время.\n\nХмм, тебе стоит что-нибудь убить. И сделай это забавно. Убей свиней пинками.\n\n<i>[ Убийственный удар должен быть пинком. ]</i>"
"You kicked pigs to death? Well, aren't you the brave hero. What an ass!\n\nHa ha yes, I had you do that just so I could call you names. I was briefly amused, though.": "Ты забил свиней до смерти? Ну и смелый же ты герой. Какой же ты осёл!\\n\\nХа-ха, да, я заставил тебя это сделать только чтобы обзывать тебя. Хотя, признаюсь, меня это немного развеселило."
"Serbule desperately needs more traveling circuses to show up. But we're too small. So we need to facilitate trade! Go: go trade! Trade with other adventurers like yourself, so that the word starts to spread.": "Сербуль отчаянно нуждается в появлении большего количества передвижных цирков. Но мы слишком малы. Поэтому нам нужно способствовать торговле! Иди — торгуй! Торгуй с другими приключенцами, такими же, как ты, чтобы слухи начали распространяться."
"Great trading! After a few thousand more trades, I'm sure the news will reach the circuses! I hope it doesn't take more than a few years...": "Отличная торговля! После ещё нескольких тысяч сделок, я уверен, новости дойдут до цирков! Надеюсь, это не займет больше нескольких лет..."
"Go grab a lute -- I think Marna sells some. And play! Don't bother playing near me, though -- I can't stand beginner lute music. I just want you to get some practice time in so that you'll be more entertaining later.": "Пойди возьми лютню — кажется, Марна их продаёт. И играй! Только не играй рядом со мной — я не выношу музыку начинающих лютнистов. Я просто хочу, чтобы ты потренировался, чтобы потом быть более интересным."
"Play till your fingers bled? Wonderful! Elves are patient, you know. I'm investing in you to cure my far-future boredom.": "Играй, пока пальцы не запекутся? Прекрасно! Эльфы терпеливы, знаешь ли. Я вкладываюсь в тебя, чтобы излечиться от своей далёкой будущей скуки."
"You need better stories of adventure. And for that, you need more adventure. I hear there's some old storage chests full of treasure in the Serbule Crypt outside of town... go open 'em up. And remember to make it exciting!": "Тебе нужны лучшие истории о приключениях. А для этого нужно больше приключений. Я слышал, что в крипте Сербуля за городом есть старые сундуки с сокровищами... иди и открой их. И не забудь сделать это захватывающе!"
"And then what happened? Nice! See, that's a mediocre story! Which is <i>much</i> better than your earlier sub-mediocre stories. We're making progress. Elves take the long view. Just a few more decades and you'll be a storyteller!": "И что же произошло дальше? Отлично! Видишь, это уже посредственная история! Что <i>намного</i> лучше твоих предыдущих ниже посредственных рассказов. Мы прогрессируем. Эльфы смотрят в долгосрочной перспективе. Ещё несколько десятков лет — и ты станешь сказочником!"
"Skin carcasses for me! Take a skinning knife and just... yeah, skin them! So gross! But don't do it in town -- I don't want to watch you do it, I just want to be amused by the knowledge that you're out there doing it.": "Сними шкуры с туш для меня! Возьми нож для снятия шкур и просто... да, сними их! Так отвратительно! Но не делай это в городе — я не хочу смотреть, как ты это делаешь, мне просто приятно знать, что ты там этим занимаешься."
"Did you really skin all those animals? Gross! Ha ha! Well. That was amusing for about two seconds. Bored again!": "Ты правда содрал шкуру со всех этих животных? Фу! Ха-ха! Ну что ж. Это было забавно примерно две секунды. Снова скучно!"
"You know that blue-glowy pedestal near the entrance to town? That's a teleportation platform! So ugly, right? The platforms in Verta are so pretty, but these... well, anyway, go use it. Go and teleport! Amuse me with your teleporty antics!": "Знаешь тот светящийся синий пьедестал у входа в город? Это платформа для телепортации! Такая уродливая, правда? Платформы в Верте такие красивые, а эти... ну да ладно, иди и используй её. Иди и телепортируйся! Развлекай меня своими телепортными выходками!"
"Poof, one second you're there, and then you're gone. I'd say that never ceases to entertain me, but that'd be a lie. It's super boring. But thanks for trying.": "Пуф, одна секунда — ты здесь, а в следующую — исчез. Я бы сказал, что это никогда не перестаёт меня развлекать, но это была бы ложь. Это очень скучно. Но спасибо, что пытался."
"The people in this town are boring. Aside from the great sex, there's nothing to really recommend this place. I think the problem lies in morale. Go boost morale! Give the townsfolk thoughtful gifts. And don't be a cheapskate -- spend at least 50 Councils on each.": "Жители этого городка скучные. Кроме отличного секса здесь особо нечего рекомендовать. Думаю, проблема в моральном духе. Подними мораль! Дарите горожанам продуманные подарки. И не скупись — трать не меньше 50 Советов на каждый."
"Now we just wait a few years and then bask in the pleasantness that ensues from enhanced morale. It's a good thing elves are patient, eh?": "Теперь остаётся только подождать несколько лет и наслаждаться благоприятными последствиями повышенного боевого духа. Хорошо, что эльфы терпеливы, да?"
"What we need to cure boredom is culture! And culture demands patrons. So help me foster some culture -- go tip people! Give them at least 10 Councils apiece -- nobody likes a cheapskate.\n\n<i>[ Use the /tip command in the chat window to tip players. For instance, if a player was named Bob, you could type \"/tip Bob 10\" ]</i>": "Что нам нужно, чтобы избавиться от скуки, — это культура! А культура требует покровителей. Так что помоги мне развивать культуру — давай чаевые людям! Давай им как минимум по 10 Советов каждому — никто не любит жмотников.\\n\\n<i>[ Используй команду /tip в окне чата, чтобы дать игрокам чаевые. Например, если игрока зовут Боб, ты можешь ввести \"/tip Bob 10\" ]</i>"
"Good, good. Here, I'll reimburse your expenses. Now let's see if we get some better musicians showing up soon!": "Хорошо, хорошо. Вот, я возмещу твои расходы. Теперь посмотрим, появятся ли скоро более хорошие музыканты!"
"Go whittle me something. A table or something, anything! Any old carpentry item will do. Jara's good with wood -- if you know what I mean -- and she lives nearby, in the farm outside of town. Maybe you could get her to teach you.": "Сделай мне что-нибудь из дерева. Стол или что-то ещё, что угодно! Любой старый столярный предмет подойдёт. Яра хорошо обращается с деревом — если ты понимаешь, о чём я — и она живёт неподалёку, на ферме за городом. Может, ты сможешь попросить её научить тебя."
"You made these? Huh. Well, good job. I didn't think you'd really do it!\n\nHmm, now I feel guilty. Here, take some extra cash. Money fixes all guilt!": "Ты сделал это? Хм. Ну, молодец. Я не думал, что ты действительно это сделаешь!\\n\\nХм, теперь я чувствую вину. Вот, возьми немного лишних денег. Деньги лечат любую вину!"
"Once I heard a wizard say a weird word -- just some gibberish -- and then they disappeared! Do you know any magic words? Say some for me!\n\n<i>[ You can research words of power when you have several levels of the Lore skill, which you can obtain by examining lore items in the world. ]</i>": "Однажды я слышал, как волшебник произнёс странное слово — просто бессмыслица — и потом исчез! Ты знаешь какие-нибудь магические слова? Скажи мне несколько!\n\n<i>[ Ты можешь изучать слова силы, когда у тебя будет несколько уровней навыка Знания, который можно получить, исследуя предметы знаний в мире. ]</i>"
"Fairly entertaining! But you used up the words -- I tried saying them myself but they do nothing. Why did you break them?!": "Довольно забавно! Но ты использовал все слова — я пытался сказать их сам, но они не действуют. Почему ты их сломал?!"
"It's crucial that you can push an opponent off-kilter with just an entrancing ditty. Go and practice on reasonably-dangerous opponents.": "Крайне важно уметь вывести противника из равновесия одной лишь зачаровывающей песенкой. Иди потренируйся на достаточно опасных противниках."
"Did you learn a lot from that? Just busywork? Hmph.": "Ты многому научился? Просто пустая работа? Хм."
"The sewers connect to a cave system, and last year I noticed that some of the ratkins' snails had escaped and wandered into the caves. The ratkin didn't seem interested in recovering them, and I really want to know why. In this case I think the death of a few innocent snails is justified. Bring me a sample so that I can examine it.": "Канализация соединяется с системой пещер, и в прошлом году я заметила, что некоторые улитки крысолюдов сбежали и забрели в пещеры. Крысолюды, похоже, не были заинтересованы в их возвращении, и мне очень хочется узнать почему. В этом случае я считаю смерть нескольких невинных улиток оправданной. Принеси мне образец, чтобы я могла его изучить."
"It is as I feared: this snail meat is poisoned with traces of that weird metal they mine down there. That explains why the ratkin don't eat them!\n\nHmm. The meat almost seems rotted from within, as if a druid had cast Rotflesh on it. Hmm? No, not \"Rotskin\"... what's Rotskin? I mean Rotflesh! The druid spell? Oh... this must be another one of those differences between druid types. Why don't I teach you our version?": "Как я и боялся: мясо этой улитки отравлено следами того странного металла, который они добывают там внизу. Вот почему крысолюди их не едят!\\n\\nХмм. Мясо почти кажется гниющим изнутри, как будто друид наложил на него Гнилоту Плоти. Хмм? Нет, не «Гнилокожу»... что такое Гнилокожа? Я имею в виду Гнилоту Плоти! Заклинание друида? О... это, наверное, ещё одна из тех различий между типами друидов. Почему бы мне не научить тебя нашей версии?"
"Look, I know you're annoyed that I need even more parts to repair the Warden Alert system. I'm annoyed about it too! I'm just a cat, and I'm doing my best! We can't give up on this. It's too important to the Wardens.\n\nIt looks like the glass we used in the earlier repair isn't strong enough: it actually melted inside the machine, and the mess took me hours to remove. Instead of glass, let's try diamonds. Those are super strong, right?\n\nAnd this part here is supposed to be sparkling. Or sparking. Something like fire should be happening. See how it's coated in powder? I know this stuff! My master used a lot of it. It's a mix of sulfur and saltpeter. Get me some of both, maybe I can make it go again.": "Пиклс в Священной пещере Хранителя сказал: «Слушай, я знаю, что тебя раздражает, что мне нужны ещё детали для ремонта системы оповещения Хранителя. Меня это тоже раздражает! Я всего лишь кот, и я делаю всё, что могу! Мы не можем сдаваться. Это слишком важно для Хранителей.\\n\\nПохоже, стекло, которое мы использовали в предыдущем ремонте, недостаточно прочное: оно фактически расплавилось внутри машины, и мне пришлось потратить часы, чтобы убрать этот беспорядок. Вместо стекла давай попробуем алмазы. Они же очень прочные, правда?\\n\\nА эта деталь здесь должна искриться. Или искрить. Что-то вроде огня должно происходить. Видишь, как она покрыта порошком? Я знаю эту штуку! Мой мастер много её использовал. Это смесь серы и селитры. Принеси мне немного того и другого, может, я смогу снова запустить систему."
"Good work! Okay, the diamonds fit in pretty easily. Now this powder is a little trickier... you might want to step back. And protect your eyes... here we go! ...\n\nHey, it worked! IT WORKED! HA! We got the main crystal working! I knew we could do it!\n\nI'm actually pretty surprised that this worked... and that nothing exploded. But don't tell Milton that, okay?": "Отличная работа! Ладно, алмазы подошли довольно легко. А вот с этим порошком немного сложнее... тебе лучше отойти назад. И защити глаза... поехали! ...\n\nЭй, получилось! ЭТО СРАБОТАЛО! ХА! Мы запустили главный кристалл! Я знал, что у нас получится!\n\nЯ действительно удивлён, что это сработало... и что ничего не взорвалось. Но не говори об этом Мильтону, хорошо?"
"There's a bunch of old holiday ornaments stored in Serbule Keep. Nelson Ballard is a stingy bastard, but perhaps you can persuade him to part with some of his ornaments?": "В Сербульской крепости хранится куча старых праздничных украшений. Нельсон Баллард — жадина, но, возможно, вы сможете уговорить его расстаться с некоторыми из своих украшений?"
"A frumpy man brought some ornaments for us. Good work! I'll put them up.": "Неуклюжий мужчина принес нам несколько украшений. Хорошая работа! Я их повешу."
"Who? Oh, that old bat... well, she can have the ugly red ornaments. Sorry, but all the pretty ones are needed here! I'll have Sir Coth bring them down.": "Кто? Ох, эта старая ведьма... ну, пусть забирает уродливые красные украшения. Извини, но все красивые нужны здесь! Я попрошу сэра Кота спустить их сюда."
"We need lots of cheap decorations. They should be bright and shiny and round. Hmm. Apples! Yes, fetch some apples. I'll get some myself, and together we should have enough.": "Нам нужно много дешёвых украшений. Они должны быть яркими, блестящими и круглыми. Хм. Яблоки! Да, принеси немного яблок. Я тоже возьму, и вместе у нас будет достаточно."
"Thank you. These will make a lovely apple-snake that coils around the tree. Festive!": "Спасибо. Из этого получится прекрасный яблочный змей, обвивающийся вокруг дерева. Празднично!"
"As I understand it, our Ri-Shin tree should be decorated with items that evoke memories of our venue. Several customers told me that when they think of Red Wing, they think of 'rollin' the bones'. I do not know why they associate grim body parts with our lovely establishment, but I'm sure it's another racist anti-insect thing. These connotations are hurtful, but we aim to make our guests happy, so bones it is!\n\nUnfortunately I used up my supply of bones during some recent shamanic infusion experiments... do you happen to have a surplus? Do not concern yourself with their rollability; any bones will do at this stage.": "Насколько я понимаю, наше дерево Ри-Шин должно быть украшено предметами, вызывающими воспоминания о нашем заведении. Несколько клиентов сказали мне, что когда они думают о Красном Крыле, они вспоминают «бросание костей». Я не знаю, почему они связывают мрачные части тел с нашим прекрасным заведением, но уверена, что это ещё одна расистская антинасекомая штука. Такие ассоциации обидны, но мы стремимся сделать наших гостей счастливыми, так что будут кости!\n\nК сожалению, я израсходовала свой запас костей во время недавних шаманских инфузионных экспериментов... случайно у тебя не осталось лишних? Не беспокойся о том, насколько они подходят для бросков; на этом этапе подойдут любые кости."
"Oh, the bones! I must apologize: having conferred with Dorimir Fangblade, I have learned that 'rollin' the bones' is an idiom for dice-rolling. And we happen to have a large supply of dice on hand, so we shall just use those on the tree!\n\nI asked Dorimir if I could hang the bones you brought me as well, since you went to all the effort, but he hinted that they would be a grim reminder of our guests' mortality, and thus inappropriate. But they will not go to waste: Tavilak expressed enthusiasm about using them for fertilizer. Thank you for your effort!": "О, кости! Прошу прощения: посоветовавшись с Доримиром Клыкарём, я узнал, что «бросать кости» — это идиома для игры в кости. А у нас как раз есть большой запас костей, так что мы просто используем их на дереве!\n\nЯ спросил у Доримира, можно ли повесить и те кости, что ты мне принёс, раз уж ты так постарался, но он намекнул, что они будут мрачным напоминанием о смертности наших гостей и поэтому неуместны. Но они не пропадут зря: Тавилак выразил энтузиазм по поводу использования их в качестве удобрения. Спасибо за твои старания!"
"I see you checking out my cool blue fur! I'm willing to bet you want to know how I do it too! Well, blue fur is a sign you have true booping power, and you look like you're capable of that. I'll teach you how to have awesome blue fur like me if you bring me a few things. Here's the list and good hunting!\n <i>[Remember that you must remain in rabbit form to advance and complete this task!]</i>": "Вижу, ты любуешься моей классной синей шерстью! Готов поспорить, ты хочешь узнать, как я это делаю! Синяя шерсть — признак настоящей силы бупинга, и ты выглядишь способным на это. Я научу тебя иметь такую же потрясающую синюю шерсть, как у меня, если ты принесёшь мне несколько вещей. Вот список, и удачной охоты!\n<i>[Помни, что для выполнения и завершения этого задания ты должен оставаться в кроличьей форме!]</i>"
"Hey, you got everything! Thanks for your help. Here are the directions to dye your fur blue. Since you brought me plenty of gems, here's a vial of dye to get you started. The carrots? Oh, they don't have anything to do with the dye, I just wanted a snack. Take care, fellow booper!": "Эй, у тебя всё есть! Спасибо за помощь. Вот инструкция, как покрасить твою шерсть в синий цвет. Поскольку ты принес мне много драгоценных камней, вот флакон краски, чтобы начать. Морковка? О, она не связана с краской, я просто хотел перекусить. Береги себя, товарищ бупер!"
"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of Expert-Quality Metal Slabs. Lots of them! I promise I'll only ask this of you once - never again! If you can deliver me 25 Expert-Quality Metal Slabs, I'll show you what I use them for!": "Не мог бы ты сделать мне личное одолжение? У меня совсем мало припасов, и мне срочно нужны металлические пластины экспертного качества. Очень много! Обещаю, что попрошу тебя об этом только один раз — больше никогда! Если ты доставишь мне 25 металлических пластин экспертного качества, я покажу тебе, для чего я их использую!"
"AH! The metal I need! Thank you so much! Now, what do I use these slabs for? Clasps and reinforcements for necklaces! I found this Amulet of the Rugged Traveler a while back. Where? Oh, I found it on some dead guy, and he looked pretty rugged when I found him! Anyway, I have figured out how to upgrade them while keeping their effectiveness. If you have an exceptional quality or better Amulet of the Rugged Traveler, I can upgrade it for you, if you're willing to toss me some tokens as well for the time. Speaking of traveling, would you be interested in buying some of my famous flight butter? Go see Orran!\n<i>[You have earned 10 favor with Orran the Caravan Leader]</i>\n<i>[You have unlocked new talk options with Moxie]</i>": "АХ! Металл, который мне нужен! Огромное спасибо! А теперь, для чего я использую эти пластины? Для застёжек и укреплений на ожерельях! Некоторое время назад я нашёл Амулет Закалённого Путешественника. Где? О, я нашёл его на каком-то мёртвом парне, и он выглядел довольно закалённым, когда я его нашёл! В любом случае, я выяснил, как улучшить их, сохранив эффективность. Если у тебя есть Амулет Закалённого Путешественника исключительного качества или лучше, я могу его улучшить для тебя, если ты готов дать мне несколько жетонов за потраченное время. Кстати о путешествиях, хочешь купить немного моего знаменитого лётного масла? Иди к Оррану!  \n<i>[Ты заработал 10 расположения у Оррана, вожака каравана]</i>  \n<i>[Ты разблокировал новые варианты разговора с Мокси]</i>"
"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of string. Lots of string! I promise I'll only ask this of you once - never again! If you can deliver me 50 strings, I'll show you what I use them for!": "Эй, не мог бы ты сделать мне личное одолжение? У меня совсем мало припасов, и мне очень нужны нитки. Много ниток! Обещаю, что попрошу тебя об этом только один раз — больше никогда! Если ты доставишь мне 50 ниток, я покажу тебе, для чего я их использую!"
"Yes! String! Thank you so much! Now, what do I use these strings for? Shoelaces! Some elf traded me a pair of their windstep shoes a while back. I have figured out how to upgrade them while keeping their effectiveness. If you have a pair of exceptional quality or better windstep shoes, I can upgrade them for you, if you're willing to toss me some tokens as well for the time.\n<i>[You have earned 10 favor with Orran the Caravan Leader]</i>\n<i>[You have unlocked new talk options with Raim]</i>": "Да! Шнурки! Большое спасибо! А теперь, для чего мне эти шнурки? Для шнурков! Некоторый эльф обменялся со мной парой своих обуви ветрового шага некоторое время назад. Я придумал, как улучшить их, сохранив эффективность. Если у тебя есть пара обуви ветрового шага исключительного качества или лучше, я могу её улучшить для тебя, если ты готов дать мне несколько жетонов за моё время.\n<i>[Ты заработал 10 расположения у Оррана, вожака каравана]</i>\n<i>[Ты разблокировал новые варианты разговора с Раймом]</i>"
"We need something large and beautiful to top the tree. I've seen some of the ranalon wearing decorative brooches that might work. Search the ones that stay down in the water and carry staves. 'Garden Masters', I think is what we call them.": "Нам нужно что-то большое и красивое, чтобы украсить вершину дерева. Я видела некоторых раналонов, носящих декоративные броши, которые могут подойти. Ищи тех, кто остаётся в воде и носит посохи. Думаю, мы называем их «Мастера Сада»."
"Ah. Well it's large. And it will have to do. Thank you!": "Ах. Ну, он большой. И сойдёт. Спасибо!"
"Three Bun-Fu Masters have come into the area to help train their fellow bunnies in the ways of the carrot. Visit Master Lopsy in the Serbule Keep garden, Master Flopsy outside of the Kur Mountains Inn and Master Boop outside of the New Prestonbule Cave in Gazluk to complete your training! You think you know Bun-Fu? Show me!\n\n[<i> These quests require you to be in bunny form to advance. A free bunny transformation will be available at all quest NPCs. </i>]": "Три мастера Кроличьего Фу прибыли в этот район, чтобы помочь своим собратьям-кроликам овладеть искусством моркови. Посети мастера Лопси в саду крепости Сербуль, мастера Флопси у гостиницы у гор Кур и мастера Бупа у пещеры Нью-Престонбул в Газлуке, чтобы завершить своё обучение! Думаешь, ты знаешь Кроличье Фу? Докажи это!\\n\\n[<i> Для прохождения этих квестов необходимо быть в форме кролика. Бесплатное превращение в кролика доступно у всех NPC с квестами. </i>]"
"You did it! You completed all three tasks! It's safe to say you know the basics of Bun-Fu and are on your way to becoming a great Bun-Fu Master!": "Ты справился! Ты выполнил все три задания! Можно с уверенностью сказать, что ты освоил основы Бун-Фу и на пути к тому, чтобы стать великим мастером Бун-Фу!"
"Hi there! Ready for some combat training? Let's get to it! A skilled rabbit should be able to take down any predator without difficulty, no matter big they are or how many there are! Get out there and show me what you got! Take down 20 Mot-Uraks, 20 Polar Bears and 20 Starving Tundra Wolves. Remember that you must complete this task in rabbit form. No cheating! Report back to me when you're done and I'll load you up with some more bunny juices.": "Привет! Готов к боевой тренировке? Приступим! Опытный кролик должен без труда справиться с любым хищником, независимо от их размера и количества! Выйди туда и покажи, на что ты способен! Убей 20 Мот-Ураков, 20 Белых медведей и 20 Истощённых тундровых волков. Помни, что задание нужно выполнить в кроличьей форме. Никакого мошенничества! Вернись ко мне, когда закончишь, и я награжу тебя дополнительными кроличьими эликсирами."
"I can smell their defeat on you...you really booped 'em! Great job! Here's your bunny juices, use them wisely! Also, here's a little something extra in case somebody tries to boop you! If you haven't already, be sure to visit my other two cousins Lopsy and Flopsy to complete your training.": "Я чувствую на тебе запах их поражения... ты действительно их забупил! Отличная работа! Вот твои кроличьи соки, используй их с умом! А ещё вот небольшой подарок на случай, если кто-то попытается забупить тебя! Если ещё не сделал этого, обязательно навестите моих других двоюродных братьев Лопси и Флопси, чтобы завершить своё обучение."
"Greetings! Ready for advanced Bun-Fu lessons? Great!\n\nIn order to survive, you must be able to replenish your carrot supply no matter the conditions! Find a good, fertile plot of ground somewhere out here in the Kur Mountains and grow twelve carrots. Don't forget, you MUST grow these carrots while being a rabbit. If you want to be a non-rabbit gardener, then go talk to someone else! Once you are done, bring them to me for inspection and I shall reward you with some bunny juices.": "Приветствую! Готов к продвинутым урокам Кроличьего Фу? Отлично!\\n\\nЧтобы выжить, ты должен уметь пополнять запас моркови в любых условиях! Найди хорошее, плодородное место где-нибудь здесь, в горах Кур, и вырасти двенадцать морковок. Не забудь, ты ОБЯЗАН выращивать эту морковь в кроличьей форме. Если хочешь быть садовником не в кроличьей форме, иди поговори с кем-нибудь другим! Когда закончишь, принеси их мне на проверку, и я награжу тебя кроличьими эликсирами."
"Nice gardening work! Those carrots will serve you well! Be sure to vist my other two cousins Lopsy and Boop to complete your training. Here are your bunny juices, as promised.": "Отличная работа в саду! Эти морковки тебе очень пригодятся! Обязательно навестите моих двух других кузенов — Лопси и Бупа, чтобы завершить своё обучение. Вот твои кроличьи соки, как и обещал."
"Hi! Would you be interested in learning the ways of the carrot? I can help you get started!\n\nFirst off, you need to know how to seek out your carrots. I have placed several Carrots of Power across the landscape here in the Serbule and Serbule Hills areas. Seek out seven of these Carrots of Power and then return to me. Also, you must interact with the Carrots of Power as a rabbit! You cannot become a Bun-Fu Master if you're not a rabbit!\n\nIf you need to bunny up, just ask! Good hunting!\"": "Привет! Хочешь научиться искусству моркови? Я помогу тебе начать!\n\nПрежде всего, тебе нужно научиться искать свои морковки. Я разместил несколько Морковок Силы по всей местности здесь, в Сербуле и холмах Сербуле. Найди семь таких Морковок Силы и вернись ко мне. Также ты должен взаимодействовать с Морковками Силы в кроличьей форме! Ты не сможешь стать Мастером Бан-Фу, если не будешь кроликом!\n\nЕсли нужно превратиться в кролика, просто скажи! Удачной охоты!"
"Excellent! Could you feel their power? Never forget that feeling! Now take these bunny juices so you can bunny up whenever you need to thump somebody's face in! Make sure you seek out my cousins Flopsy in the Kur Mountains and Boop in Gazluk to complete your training if you feel you are ready for more advanced tactics.": "Отлично! Ты почувствовал их силу? Никогда не забывай это ощущение! А теперь возьми эти кроличьи эликсиры, чтобы ты мог превратиться в кролика, когда нужно будет дать кому-то по лицу! Обязательно найди моих кузенов Флопси в горах Кур и Бупа в Газлуке, чтобы завершить своё обучение, если почувствуешь, что готов к более продвинутым тактикам."
"A Ri-Shin tree has to reflect its people. Hah, I know: wouldn't butterflies look great?! Representational, kinda. And also the fairies love 'em. But there's a catch: they have to be alive. Dead butterflies would upset a lot of the fae here.\n\nCrimsonfelt butterflies would look nicest, but they eat cinders out of the air, and there's no way I'm feeding 'em cinders every day. How about some nice pretty rose-mourning butterflies? They're a little smaller, but they can survive on sugar water.\n\nGo catch a whole bunch of 'em! Here's a net.": "Дерево Ри-Шин должно отражать своих жителей. Ха, знаю: разве бабочки не смотрелись бы отлично?! В некотором роде символично. И феи их обожают. Но есть загвоздка: они должны быть живыми. Мёртвые бабочки расстроят многих фей здесь.\n\nСамыми красивыми были бы багровопёстрые бабочки, но они питаются золой из воздуха, и я ни за что не буду кормить их золой каждый день. Как насчёт милых розово-траурных бабочек? Они немного меньше, но могут выживать на сахарной воде.\n\nИди поймай их побольше! Вот тебе сеть."
"These are nice ones. Did you explain to them what's happening? ... Oh, you don't speak Fae Insect at all? Huh. Well, don't worry about it. I'll get 'em situated.": "Это хорошие экземпляры. Ты объяснил им, что происходит? ... О, ты совсем не говоришь на языке фейских насекомых? Хм. Ну, не переживай. Я их устрою."
"I've delegated the candy-cane creation to Laura Neth, but she insists she needs more cinnamon. Ugh. It's for decoration, who cares how it tastes?! But she's very insistent.": "Я поручил создание леденцов Лауре Нет, но она настаивает, что ей нужно больше корицы. Уф. Это для украшения, кому какое дело, как они на вкус?! Но она очень настойчива."
"Good. I'll get Laura Neth making the canes immediately. Thank you.": "Хорошо. Я сразу же поручю Лауре Нет изготовить трости. Спасибо."
"We need a big thing on top of the tree. And it should be something animals make. Like... poop. No... like meat! No... like cheese! Yes! Animals make cheese! Get a big hard cheese.": "Нам нужна большая штука на вершине дерева. И это должно быть что-то, что делают животные. Например... какашки. Нет... мясо! Нет... сыр! Да! Животные делают сыр! Найдите большой твёрдый сыр."
"Now we have a cheese tree! Yay!": "Теперь у нас есть сырное дерево! Ура!"
"Nelson said he had some ornamentation appropriate for this celebration. Can you get it from him?": "Нельсон сказал, что у него есть украшения, подходящие для этого празднования. Можешь получить их у него?"
"Oh, there you are. Nelson brought me the ornaments while you were gone. They're very intricate! Glass balls with little hooks. I suppose they're meant to represent fruit, but why not just use real fruit? Well, no matter. I'll toss them onto the tree.": "О, вот ты где. Нельсон принёс мне украшения, пока тебя не было. Они очень замысловатые! Стеклянные шарики с маленькими крючками. Полагаю, они должны изображать фрукты, но зачем просто не использовать настоящие фрукты? Ну да ладно. Я повешу их на дерево."
"Is that elf ready for the ornaments? Good. Now don't drop these, they're antique, and they're made of glass! Actually, you know what... I'll bring them to Echur myself. Thanks.": "Этот эльф готов к украшениям? Хорошо. Только не урони их, они антикварные и сделаны из стекла! Хотя знаешь что... я сам отнесу их Эчуру. Спасибо."
"The tree is supposed to be topped with a personalized symbol of our culture. Dorimir suggested that we use a large top hat, since mantises love hats so much. He was being mirthful, but his suggestion has merit!\n\nAs the casino's official calligrapher, I am of course skilled in creating elaborate paper props. I've fashioned a suitable top hat, but its bow is not sufficiently festive: I need a better shade of red dye! I believe crushed rose petals will be suitable. Are those easy to find?": "Дерево должно быть увенчано персонализированным символом нашей культуры. Доримир предложил использовать большой цилиндр, ведь богомолы так любят шляпы. Он шутил, но его предложение имеет смысл!\n\nКак официальный каллиграф казино, я, конечно, умею создавать замысловатые бумажные украшения. Я сделал подходящий цилиндр, но его бант недостаточно праздничный: мне нужен более насыщенный красный краситель! Думаю, подойдут измельчённые лепестки роз. Их легко найти?"
"Thank you! These flowers are a lovely color! I hope the shade comes through in the hat decoration. If not, I suppose I shall just use a different red dye.": "Спасибо! Эти цветы прекрасного цвета! Надеюсь, оттенок проявится в украшении шляпы. Если нет, думаю, я просто использую другую красную краску."
"I found the perfect topper for the tree! It's a chunk of that soul-rock stuff the fairies use for everything. It looks like a tiny lifestone! But there's bad news: Pegast says it's not actually from a lifestone. It's a part of an old defense turret, and it could re-activate at any time, killing all non-fae in the area. That would be a terrible way to die.\n\nDon't worry, there's apparently a way to disable it. It's complicated, but it'll be worth the effort! We need mercury, winterprize, and some wire.": "Я нашёл идеальную вершину для дерева! Это кусок той самой душевой породы, которую феи используют для всего. Он выглядит как крошечный камень жизни! Но есть плохие новости: Пегаст говорит, что это на самом деле не камень жизни. Это часть старой оборонительной турели, которая может активироваться в любой момент и убить всех не-фей в округе. Это был бы ужасный способ умереть.\n\nНе волнуйся, похоже, есть способ её отключить. Это сложно, но оно того стоит! Нам нужны ртуть, зимний приз и немного проволоки."
"You got everything? Great! I'm gonna let  somebody with hands do the actual work, but I'll make sure it gets done quick. Thanks!": "Ты всё собрал? Отлично! Я поручю настоящую работу кому-то с руками, но прослежу, чтобы всё сделали быстро. Спасибо!"
"The tree came with a complex system of wires and sparking mechanisms. Apparently they can make the tree glow. I've asked Ufkar to reverse-engineer it, and he says we can make it work with a power source. A few dwarven N cores ought to work.": "Дерево было снабжено сложной системой проводов и искрящихся механизмов. По-видимому, они могут заставить дерево светиться. Я попросил Уфкара провести обратный инжиниринг, и он говорит, что мы можем заставить это работать с источником питания. Несколько гномьих N-ядер должны подойти."
"Very good. Ufkar has finished his preparations, so we are ready to light the tree! Let us hope that we don't burn down the city...": "Очень хорошо. Уфкар закончил свои приготовления, так что мы готовы зажечь дерево! Будем надеяться, что мы не сожжём город..."
"We need colorful and shiny decorations. After consulting with Kalaba, I have decided that the best colorful and shiny decorations would be the eyes of fallen foes. However, we should not use the eyes of sentient creatures. Hogan said that the tree should radiate peace. So animal eyes will have to do. Perhaps cat or dinosaur eyes.": "Нам нужны яркие и блестящие украшения. После консультации с Калабой я решил, что лучшими яркими и блестящими украшениями будут глаза павших врагов. Однако мы не должны использовать глаза разумных существ. Хоган сказал, что дерево должно излучать мир. Поэтому подойдут глаза животных. Возможно, кошачьи или динозавровые глаза."
"These ornaments will stare into the soul of those who engage our tree! May those who come unprepared for gifting feel their hateful gaze! Excellent work!": "Эти украшения будут вглядываться в душу тех, кто приблизится к нашему дереву! Пусть те, кто придёт неподготовленным к дарению, ощутят их ненавистный взгляд! Отличная работа!"
"Well, that's all we need. Apparently if you put too many decorations on the tree, it becomes tacky, so we should stop here. Thanks for your help! And I put a present for you under the tree.": "Ну, это всё, что нам нужно. Похоже, если повесить на ёлку слишком много украшений, она становится безвкусной, так что на этом остановимся. Спасибо за помощь! И я положил для тебя подарок под ёлку."
"We did it! This is a good tree so now we get presents. I'll tell everybody! Go! Go get your present!": "Мы сделали это! Это хорошее дерево, так что теперь у нас есть подарки. Я всем расскажу! Иди! Иди забирай свой подарок!"
"Excellent work. We have created a tree with many sights and smells. I find it... engaging, if not attractive. Hopefully it will please Hogan, but even if not, he gave ME the authority and so he must accept MY decisions. I declare the tree complete; we shall commence gifting immediately.": "Отличная работа. Мы создали дерево с множеством видов и запахов. Я нахожу его... увлекательным, если не привлекательным. Надеюсь, оно понравится Хогану, но даже если нет, именно он дал МНЕ полномочия, и поэтому он должен принять МОИ решения. Объявляю дерево завершённым; мы немедленно приступим к дарению."
"We've done it! A holiday tree that meets minimum expectations. And now I can stop worrying about this nonsense. Oh, but I placed a gift under the tree for you, as thanks. And I'm sure the rest of these ingrates will chip in on gifts too... even if I have to strongarm them a bit.": "Мы сделали это! Праздничная ёлка, которая соответствует минимальным ожиданиям. И теперь я могу перестать беспокоиться об этой ерунде. О, но я положил подарок под ёлку для тебя, в знак благодарности. И я уверен, что остальные эти неблагодарные тоже внесут свои подарки... даже если мне придётся немного их подтолкнуть."
"Well, can't say that tree'd win any beauty prizes, but it feels homey. Thank you. You're part of the family here too, so we got ya something under the tree.": "Ну, не скажешь, что это дерево выиграет какие-то призы за красоту, но оно уютное. Спасибо. Ты тоже часть нашей семьи, поэтому у нас для тебя есть подарок под ёлкой."
"Ha ha! Look at that froggy monstrosity! I think it's great. You did good. Thanks!": "Ха-ха! Посмотри на это лягушачье чудовище! Думаю, оно классное. Ты молодец. Спасибо!"
"Excellent work. Now the festivities can begin! I'll let everyone know it's time to bring their gifts. And I've left your first gift under the tree already.": "Отличная работа. Теперь празднования могут начаться! Я сообщу всем, что пора приносить подарки. А твой первый подарок уже лежит под деревом."
"Finally! The tree adornments are complete! May it shine as a beacon of culture throughout the holiday.\n\nAs is the custom, each day we shall place a gift under the tree for our most prized patrons. I've placed your first gift under the tree already!": "Наконец-то! Украшения для дерева готовы! Пусть оно сияет как маяк культуры в течение всего праздника.\\n\\nПо традиции каждый день мы будем класть подарок под дерево для наших самых ценных покровителей. Твой первый подарок уже лежит под деревом!"
"I think that will do it! It looks hideous to my elven eyes, but I presume humans think this sort of thing is beautiful.\n\nAnd since we're guests here, we're happy to honor human rites, including the presentation of gifts! We'll be taking turns placing gifts beneath the eyesore, and you should stop by every day in case there's presents for you! In fact, there's a little gift under there already, from me to you. Enjoy.": "Думаю, этого будет достаточно! Для моих эльфийских глаз это выглядит ужасно, но полагаю, люди считают такие вещи красивыми.\\n\\nИ раз уж мы здесь в гостях, мы рады уважать человеческие обряды, включая дарение подарков! Мы будем по очереди класть подарки под это безобразие, и тебе стоит заходить каждый день — вдруг там будут подарки и для тебя! На самом деле, там уже есть небольшой подарок от меня тебе. Наслаждайся."
"You've done a wonderful job gathering decorations. It's a scrappy tree, but it'll do the job.\n\nThe people around here like to stop by and leave presents for their friends under the tree. I'm sure you'll find gifts for yourself under the tree each day. The first present is from me. Come back tomorrow to see what else has shown up!": "Ты отлично справился с сбором украшений. Елка скромная, но сойдёт.\\n\\nМестные любят заходить и оставлять подарки для друзей под ёлкой. Я уверен, что каждый день ты будешь находить под ёлкой подарки и для себя. Первый подарок от меня. Приходи завтра, чтобы увидеть, что ещё появилось!"
"Now that's a fancy tree! Although in retrospect, I kind of wish I didn't have to feed the ornaments to keep them alive. Oh well, we'll do better next year. Now it's time for presents!": "Вот это шикарное дерево! Хотя, оглядываясь назад, я бы предпочёл не кормить украшения, чтобы они оставались живыми. Ну да ладно, в следующем году сделаем лучше. А сейчас пора дарить подарки!"
"The top of the tree must be a beautiful beacon of strength and honor. Kalaba has been working on an appropriately beautiful blade to sit atop the tree. My contribution is to light it on fire with harmless decorative flames. I know a rakshasa recipe for decorative fire, but I need a large amount of fire dust!": "Вершина дерева должна быть прекрасным символом силы и чести. Калаба работает над соответствующим красивым клинком, который будет украшать верхушку дерева. Мой вклад — зажечь его безвредными декоративными пламенами. Я знаю рецепт раксаши для декоративного огня, но мне нужно большое количество огненной пыли!"
"Very good. Kalaba has finished the blade. Let this weapon declare our presence to the heavens! We are not afraid of judgment! We are worthy of gifts!": "Очень хорошо. Калаба закончил клинок. Пусть это оружие возвестит о нашем присутствии небесам! Мы не боимся суда! Мы достойны даров!"
"Hello! I've been wandering around for a while now, and decided to rest here. You see, I can't seem to find my family anywhere. I've searched everywhere, but no matter how hard I look I can't find them. Will you help me?": "Привет! Я уже некоторое время блуждаю и решил отдохнуть здесь. Видишь ли, я никак не могу найти свою семью. Я искал повсюду, но как ни старался, не могу их найти. Поможешь мне?"
"Thank you so much! I thought I'd never see any of them again. It fills my heart with joy to hear they're (mostly) all still safe. Here, take this! It's the least I can do for someone who's saved my family.": "Большое спасибо! Я думал, что никогда больше их не увижу. Моё сердце наполняется радостью, услышав, что они (в основном) все в безопасности. Вот, возьми это! Это минимум, что я могу сделать для того, кто спас мою семью."
"Red Wing is famous for our gaming, so I proposed we use Monsters and Mantids game chips on the tree. However, our game chips are very valuable and we fear inebriated guests may purloin them.\n\nDorimir suggests we instead use the worthless 'game chips' that are often used in home games. If you could just find a few examples of these chips, I'll have our goblin maintenance team create more.": "Красное Крыло славится нашими азартными играми, поэтому я предложил украсить дерево фишками из игры Монстры и Богомолы. Однако наши игровые фишки очень ценны, и мы боимся, что пьяные гости могут их украсть.\\n\\nДоримир предлагает вместо этого использовать бесполезные «игровые фишки», которые часто применяются в домашних играх. Если ты найдёшь несколько таких фишек, наша команда гоблинов по обслуживанию сделает больше."
"Thank you! These game chips are a bit small, but I will ask the goblin crew to create oversized versions.": "Спасибо! Эти игровые фишки немного маленькие, но я попрошу команду гоблинов сделать увеличенные версии."
"Sir Coth says it's traditional to decorate the tree with an ethnic human food called a 'gingerbread human'. He gave me a bunch of recipes... here's the simplest version. Can you prepare a batch?": "Сэр Кот говорит, что традиционно украшать ёлку этнической человеческой едой под названием «имбирный человечек». Он дал мне кучу рецептов... вот самый простой вариант. Ты можешь приготовить партию?"
"Hmm... if I didn't know better, I'd say these were caricatures of humans meant to mock them... but apparently not! I'll add them to the tree.\n\nOh, and here: of the many recipes Sir Coth found for me, this is the only version of Gingerbread Humans that might actually be tasty. If you're ever in the mood for an ethnic cookie, maybe try out this recipe.": "Хмм... если бы я не знал лучше, сказал бы, что это карикатуры на людей, чтобы их высмеять... но, похоже, нет! Я добавлю их на ёлку.\\n\\nА вот и рецепт: из множества рецептов, которые сэр Кот нашёл для меня, это единственная версия имбирных человечков, которая может быть действительно вкусной. Если когда-нибудь захочешь этническое печенье, попробуй этот рецепт."
"It's tradition to use glow bottles on the tree. The alchemist who used to make them is dead now, but she taught me the technique! Most of the ingredients are pretty upsetting, seeing as they come from living animals. But remember, this is for presents! So if you get the parts, I'll make the jars.": "Это традиция — использовать светящиеся бутылки на ёлке. Алхимик, который раньше их делал, теперь умер, но она научила меня технике! Большинство ингредиентов довольно неприятные, ведь они берутся от живых животных. Но помните, это для подарков! Так что если вы принесёте части, я сделаю банки."
"You got all the stuff? Well I guess it's my turn to get my hands dirty. Now where did I leave those potion jars from last time?": "Ты собрал всё? Похоже, теперь моя очередь замарать руки. Интересно, куда я в прошлый раз дел те банки с зельями?"
"Goblins are quite horrid little creatures, but they often decorate their calling-cards quite elegantly. I think if we had a number of calling-cards we could use them as makeshift tree decorations.": "Гоблины — довольно отвратительные маленькие создания, но они часто украшают свои визитные карточки весьма элегантно. Думаю, если у нас будет несколько таких карточек, мы сможем использовать их как импровизированные украшения для ёлки."
"These are a bit... grimy... but I'll just clean them up and add them to the tree!": "Они немного... грязноватые... но я просто их почищу и добавлю к дереву!"
"Hogan gave us many complex requirements. Fragrance, sentiment, color, and reflectiveness must all be taken into account. I have it: fish! Shiny, colorful, fragrant, and sentimental ... to me, at least. Fetch fresh grapefish!": "Хоган дал нам много сложных требований. Нужно учитывать аромат, настроение, цвет и отражательную способность. У меня есть идея: рыба! Блестящая, красочная, ароматная и сентиментальная... по крайней мере для меня. Принесите свежего грейпфиша!"
"Ah, their scent reminds me of my childhood on the docks of Rahu. I shall pose them as if they were swimming up a stream.\n\nWhat? No. It is NOT artistic! You know that I hate art! This is merely whimsical artifice.": "Ах, их запах напоминает мне о моём детстве на доках Раху. Я расположу их так, будто они плывут вверх по течению.\\n\\nЧто? Нет. Это НЕ искусство! Ты же знаешь, что я ненавижу искусство! Это просто причудливая уловка."
"We're very low on resources this year so we'll have to get creative with our decorations. Hmm, how about grapes? They're colorful and relatively plentiful...": "В этом году у нас очень мало ресурсов, поэтому придётся проявить креативность с украшениями. Хм, как насчёт винограда? Он яркий и относительно доступный..."
"Perfect. I'll string these up and add them to the tree!": "Отлично. Я их нанизаю и добавлю на ёлку!"
"They look alright, I guess. Thanks. You can tell my sister to stop worrying so much about me. I'll be home after I finish this snack. Here, take this. I don't need it anymore.\n\n<i>[She drops something, then goes back to chewing on a lemon she had nearby.]</i>": "Они выглядят нормально, наверное. Спасибо. Можешь сказать моей сестре, чтобы она перестала так за меня волноваться. Я буду дома, как только закончу эту закуску. Вот, возьми это. Мне это больше не нужно.\\n\\n<i>[Она что-то роняет, затем снова начинает жевать лимон, который был рядом.]</i>"
"This should do the trick! Thanks a bunch! I'll be heading back as soon as I finish this recipe. Oh, and before you go, take this. It may help you in the future.": "Это должно сработать! Большое спасибо! Я отправлюсь обратно, как только закончу этот рецепт. О, и перед тем как уйдёшь, возьми это. Это может пригодиться тебе в будущем."
"That should be enough for another game. Thanks! As promised, here, take this for your trouble.\n\n<i>[She hands you something, then starts playing another game.]</i>": "Должно хватить на ещё одну игру. Спасибо! Как и обещала, вот, возьми это за свои труды.\\n\\n<i>[Она что-то тебе передаёт, затем начинает играть в другую игру.]</i>"
"<i>You can see her digging around for something</i>\n\nAh! There it is! <i>She flips through some pages of a book she found</i>\n\nWait.. if these instructions are right, goats can't make it. Of course that wizard would trick me! Hey, you there! Yeah, you with the ears and the hands! You can craft things, right? Take this, and make me a few. I'm trying to throw a surprise party for my sister, but it looks like the wizard who made this recipe doesn't want a goat like me to make it. I'll give you something for your trouble.": "<i>Вы видите, как она роется в поисках чего-то</i>\\n\\nАга! Вот оно! <i>Она листает страницы найденной книги</i>\\n\\nПостой... если эти инструкции верны, козы не смогут это сделать. Конечно, этот волшебник меня обманул! Эй, ты там! Да, ты с ушами и руками! Ты умеешь что-то создавать, правда? Возьми это и сделай мне несколько штук. Я пытаюсь устроить сюрприз для своей сестры, но, похоже, волшебник, который создал этот рецепт, не хочет, чтобы такая коза, как я, его делала. Я дам тебе что-нибудь за твою помощь."
"These are perfect, thanks! I'm glad you stopped by. I just remembered that Miss Chievous actually hates loud things, so I won't be needing those. Feel free to keep them! And for your help, let me teach you a bit about artistry.": "Они идеальны, спасибо! Рад, что ты заглянул. Я только что вспомнил, что мисс Чивиус на самом деле ненавидит громкие вещи, так что они мне не понадобятся. Можешь оставить их себе! А за помощь позволь немного научить тебя искусству."
"You'd expect fairy lights to be pretty easy to get here in the fae realm. All these fairies can make sparkly lights! But Pegast says they can't waste them on frivolities. And that turns into the same argument I always have with these guys: what ISN'T frivolous to an immortal?\n\nAnyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.": "Можно было бы подумать, что фейские огоньки здесь, в фейском царстве, достать очень просто. Все эти феи умеют создавать сверкающие огни! Но Пегаст говорит, что они не могут тратить их на пустяки. И это превращается в тот же спор, что у меня всегда с этими ребятами: что же НЕ является пустяком для бессмертного?\\n\\nВ любом случае, это круто, я нашёл кого-то, кто тихо сделает их для нас. Мне просто нужно заплатить ему. Медовыми сотами... очень многими медовыми сотами."
"You got the honeycombs? Good work! We'll get this tree sparklin'!": "Ты принес соты? Отличная работа! Мы заставим эту ёлку сиять!"
"Landri is a master ice-wizard. I've talked her into preparing a beautiful ice-gem to top the tree. She just needs a bit of magical ice. An 'ice core', she said. Better get two, in case I need to have her remake it in a different shape.": "Ландри — мастер ледяной магии. Я уговорил её подготовить красивый ледяной самоцвет для вершины дерева. Ей просто нужен немного магического льда. «Ледяное ядро», — сказала она. Лучше взять два, на случай, если придётся переделать его в другую форму."
"Wow, they're quite cold. And not very interesting to look at, are they? But don't worry. Landri can work her magic and we'll get a nice tree-topper out of it, I'm sure!": "Вау, они довольно холодные. И смотреть на них особо неинтересно, правда? Но не волнуйся. Ландри применит свою магию, и у нас получится отличный верхушечный декор для ёлки, я уверен!"
"As I understand it, most of the tree's decorations should be large, round, colorful balls. How about lemons?": "Насколько я понимаю, большинство украшений на дереве должны быть большими, круглыми, разноцветными шарами. Как насчёт лимонов?"
"Excellent work. And perhaps the citrus smell will hide some of the repugnant pine odor, too!": "Отличная работа. И, возможно, запах цитрусовых скроет часть отвратительного запаха сосны!"
"We need something blue, and I think it would be pretty funny to cover the tree in fungus. Let's do that.": "Нам нужно что-то синее, и я думаю, будет довольно забавно покрыть дерево грибами. Давай сделаем это."
"Hahaha! It's perfect! That'll teach them not to put me in charge of menial tasks!": "Ха-ха-ха! Это идеально! Пусть это научит их не ставить меня отвечать за мелкие поручения!"
"A mysterious talking scapegoat has arrived at the bridge North of Serbule, in search of her missing family. Speak with her to find out what's happened to them.": "Таинственный говорящий козёл отпущения прибыл к мосту к северу от Сербуля в поисках своей пропавшей семьи. Поговорите с ней, чтобы узнать, что с ними случилось."
"This one is just impossible... we need something yellow and fluffy for 'tinsel', some sort of human decoration. Where would we get tinsel in the desert?! Are we supposed to shave a few manticores and use their manes?!": "Это просто невозможно... нам нужно что-то жёлтое и пушистое для «мишуры», какой-то человеческий декор. Где в пустыне взять мишуру?! Нам что, сбрить несколько мантикор и использовать их гривы?!"
"Hahaha you killed and shaved manticores?! That... is impressive. Okay... I was joking, but it will actually look nice on the tree. Thanks.": "Хахаха, ты убил и побрил мантикора?! Это... впечатляет. Ладно... я шутил, но на самом деле это будет хорошо смотреться на ёлке. Спасибо."
"Now for the most important part: the tree topper. It has to be Miss Fly-Hater! She's a gigantic frog that comes out of hibernation right around now. She lives on a little island in the middle of the river, and we bring her in to sit on the tree and catch bugs. She loves it, the town loves it, we all win!\n\nNow don't hurt her! The town will never forgive us if she's hurt.": "Теперь самое главное: верхушка ёлки. Это должна быть Мисс Летающая Ненавистница! Она огромная лягушка, которая просыпается ото сна примерно в это время. Она живёт на маленьком острове посреди реки, и мы приводим её, чтобы она сидела на ёлке и ловила насекомых. Ей это нравится, городу это нравится, все в выигрыше!\\n\\nТолько не причиняйте ей вреда! Город никогда нам этого не простит."
"You found her! Hi, Miss Fly-Hater! Wait, uh... Hm.\n\nWell, this isn't the same <b>exact</b> frog as before, but let's just keep that between us. He has a great temperament and he looks hungry, so I'm sure this will work out fine! I'll keep an eye on him.": "Вы нашли её! Привет, мисс Ненавистница мух! Подожди, э... Хм.\\n\\nНу, это не тот же <b>самый</b> лягушонок, что раньше, но давай оставим это между нами. У него отличный характер, и он выглядит голодным, так что я уверен, что всё будет хорошо! Я буду за ним присматривать."
"I know this sounds weird, because it is, but next we need some old bones. The rakshasa love seeing them on the tree.": "Я знаю, звучит странно, потому что так и есть, но дальше нам нужны старые кости. Ракшасы любят видеть их на дереве."
"A nice big pile of bones. I'll get them sorted and organized, and on the tree. They'll be... truly hideous. But that's just my opinion based on my human upbringing! They'll get all the town's rakshasa in a festive mood, and that's what matters.": "Большая красивая куча костей. Я их рассортирую и организую, и повешу на дерево. Они будут... по-настоящему отвратительными. Но это всего лишь моё мнение, основанное на моём человеческом воспитании! Они поднимут настроение всем ракшасам в городе, а это главное."
"Okay. We need round things on the tree. Round. Round round round. Think... Oh, onions are round! Get lots of onions.": "Хорошо. Нам нужны круглые вещи на дереве. Круглые. Круглые круглые круглые. Подумай... О, лук же круглый! Собери много лука."
"You got onions! This is easy! We're almost done!": "Ты принес лук! Это просто! Мы почти закончили!"
"At the Ri-Shin celebration in Statehelm, the trees are lit with fairy lights! Our tree must be lit as well. There are a few fairy shopkeepers in the employ of the casino, and Laphylla says she can place a glamour on our tree... but she demands payment in a substance called 'pixie sugar'. Can you obtain this?": "На празднике Ри-Шин в Стейтхелме деревья украшают волшебными огнями! Наше дерево тоже должно быть освещено. В казино работают несколько торговцев волшебными товарами, и Лафилла говорит, что может наложить гламур на наше дерево... но она требует оплату веществом под названием «фейский сахар». Ты можешь его достать?"
"Thank you! I shall take this to Laphylla promptly so that she can place a glamour on our tree.": "Спасибо! Я немедленно отнесу это Лафилле, чтобы она могла наложить гламур на нашу ёлку."
"The tree needs bright shiny red things... and now you see why I took on this stupid job! I need a lot of hot peppers.  A lot. Do you need some seeds? I still have some for sale!": "Дереву нужны яркие блестящие красные штуки... и теперь ты понимаешь, почему я взялся за эту глупую работу! Мне нужно много острых перцев. Очень много. Тебе нужны семена? У меня ещё есть несколько на продажу!"
"Couldn't grow them better myself! Thanks. And hopefully their prominence on the tree will encourage people to eat more peppers.": "Лучше бы я сам не вырастил! Спасибо. И, надеюсь, их заметность на ёлке побудит людей есть больше перцев."
"We need round things for the tree! Round... round... like plates. Plates! Get some plates. This many. <i>[Spot holds up a varying number of fingers, changing her mind every few seconds. You decide that a half-dozen plates will do.]</i>": "Нам нужны круглые вещи для дерева! Круглые... круглые... как тарелки. Тарелки! Принеси несколько тарелок. Вот столько. <i>[Спот показывает разное количество пальцев, меняя своё мнение каждые несколько секунд. Вы решаете, что полдюжины тарелок будет достаточно.]</i>"
"Plates? For the tree?! That's silly!\n\nOhhhh... because they're round! Good idea! Okay I'll put them on the tree. I have more plates, too! We'll put plates all over the tree!": "Тарелки? На ёлку?! Это глупо!\\n\\nОооо... потому что они круглые! Хорошая идея! Ладно, я повешу их на ёлку. У меня есть ещё тарелки! Мы повесим тарелки по всему дереву!"
"I'm trying to bring the whole cave together here, so I got the orcs involved in decorating too. As a race they're not real known for their decorations, but Gasu'um collects empty potion bottles, so let's put 'em on the tree!\n\nShe gave me a bunch of Rage to Heat bottles... we just need a few more.": "Я пытаюсь объединить всю пещеру, поэтому привлёк орков к украшению тоже. Как раса они не особо известны украшениями, но Гасу’ум собирает пустые бутылки от зелий, так что давай повесим их на ёлку!\\n\\nОна дала мне кучу бутылок с Яростью к Теплу... нам нужно всего несколько штук."
"Hey, these potion bottles are still full! Well, Gasu'um drinks this stuff like water, so don't expect 'em to last long! Thanks though... this'll work.": "Эй, эти бутылочки с зельями всё ещё полные! Ну, Гасу’ум пьёт это как воду, так что не рассчитывай, что они долго продержатся! Но спасибо... это подойдёт."
"When the town was healthier, we used to put prettied-up mushrooms on the tree. Fly amanita grows everywhere around here, so that's not a problem. But I don't know how to make the dye! We need a nice tomato red dye to cover the stems.": "Когда город был здоровее, мы украшали дерево красивыми грибами. Мухомор растёт здесь повсюду, так что с этим проблем нет. Но я не знаю, как сделать краску! Нам нужна красивая томатно-красная краска, чтобы покрыть ножки."
"Great! You gather the ingredients, I'll get them painted. We're making a great team!": "Отлично! Ты собираешь ингредиенты, а я их раскрашу. Мы отличная команда!"
"A good Ri-Shin tree should be covered in red baubles. The shinier the better. We need a big pile of rubies or whatever!": "Хорошее дерево Ри-Шин должно быть покрыто красными бусинами. Чем ярче, тем лучше. Нам нужна большая куча рубинов или чего-то подобного!"
"Oh ho ho, now THESE are nice gems! So, question for ya: Sona wants to use heavy wire to make the gems look like they're floatin' off the tree. I told her they're supposed to look like fruit, nestled under the leaves... but then she asks why, since you can't eat 'em... and I don't really have an answer! What do you think we should do?\n\nOh, what's that? Sure, of course! We'll get these beauties back to you after the holiday, don't worry! I mean... unless they get stolen by orcs or something...": "О-хо-хо, вот это настоящие красивые драгоценные камни! Так, вопрос к тебе: Сона хочет использовать толстую проволоку, чтобы камни выглядели так, будто они парят над деревом. Я ей сказал, что они должны выглядеть как фрукты, спрятанные под листьями... но потом она спросила, зачем, если их нельзя съесть... и у меня нет ответа! Как ты думаешь, что нам делать?\\n\\nО, что это? Конечно, без проблем! Мы вернём эти красотки тебе после праздника, не волнуйся! То есть... если их не украдут орки или что-то в этом роде..."
"We need stringy things. Like... um, string. No, string is ugly. Sausages! Sausages are stringy! Get some!\n\nBut please <i>please</i> don't tell Norbert because he yells at me when I say I like sausage. Please? Okay good.": "Нам нужны нитевидные вещи. Например... эм, нитки. Нет, нитки некрасивые. Колбаски! Колбаски нитевидные! Принеси несколько!\\\\n\\\\nНо, пожалуйста, <i>пожалуйста</i> не говори Норберту, потому что он кричит на меня, когда я говорю, что люблю колбасу. Пожалуйста? Хорошо."
"Oh give them! I want sausages! ... But I'll only eat some of them. The others go on the tree.": "О, давай им! Я хочу колбаски! ... Но я съем только часть. Остальные повешу на ёлку."
"We need something eye-catching to top the tree. How about... hmm... a pair of scorpion stingers?!": "Нам нужно что-то броское для вершины дерева. Как насчёт... хмм... пары жвал скорпиона?!"
"Wow, you got them! Hmm. They're kind of gross. But no problem; I'll have Gremix class them up with some metal or something.": "Вау, ты их достал! Хм. Они немного отвратительные. Но не проблема; я поручю Гремиксу украсить их металлом или чем-то подобным."
"I do understand that this is a peaceful holiday. But if we want the people of Rahu to be excited, it needs to incorporate some of our culture! Traditionally our celebrations feature trophies from our fallen enemies. But we are at peace right now... so perhaps the least-offensive trophies would be from fellow rakshasa. The vile bandits in the desert prey upon the weak and the pitiful. Kill them, sever their ears, and bring them back. Oh, and please try to focus on bandits with big healthy ears.": "Я понимаю, что это мирный праздник. Но если мы хотим, чтобы народ Раху был воодушевлён, в него нужно включить часть нашей культуры! Традиционно наши празднования сопровождаются трофеями от поверженных врагов. Но сейчас у нас мир... так что, возможно, наименее оскорбительными трофеями будут уши собратьев ракшас. Гнусные бандиты в пустыне охотятся на слабых и жалких. Убей их, отрежь уши и принеси их обратно. О, и, пожалуйста, старайся выбирать бандитов с большими здоровыми ушами."
"These will do. I'll preserve them and string them up for the tree. Also, you may be relieved to hear this: I asked Daniel Murderdark about using ears on his peoples' festival tree. I expected he'd be offended, but he said it was 'awesome'. So don't worry about it! Humans are more understanding than I expected.": "Эти подойдут. Я их сохраню и нанизу на нитку для дерева. К тому же, тебе будет приятно это услышать: я спросил Дэниела Мердердарка о том, можно ли использовать уши для фестивального дерева его народа. Я ожидал, что он обидится, но он сказал, что это «круто». Так что не волнуйся! Люди гораздо понимающи, чем я думал."
"<i>You become aware of a powerful presence reaching out to you. Does Dreva have a task for you? A voice speaks in your mind:</i>\n\nFind the Shrine of Ri-Shin in the Kur Mountains. Ri-Shin is a strong ally; render whatever aid is needed.": "<i>Ты ощущаешь мощное присутствие, обращающееся к тебе. Есть ли у Древы задание для тебя? Голос говорит в твоём разуме:</i>\\n\\nНайди святилище Ри-Шин в горах Кур. Ри-Шин — сильный союзник; окажи любую необходимую помощь."
"<i>You become aware of a powerful presence reaching out to you. There are no words ... But you have the strangest sensation that you should search the wilds of Kur Mountains for a ... shrine? To Ri-Shin?</i>": "<i>Ты ощущаешь мощное присутствие, тянущееся к тебе. Нет слов... Но у тебя появляется странное чувство, что тебе следует искать в диких местах гор Кур... святилище? Ри-Шину?</i>"
"I remember as a snotrat having to cut out hundreds of paper snowflakes for the tree each year. Tedious work, but it taught me how to use a knife! We'll need some stencils, though... otherwise they won't all be even, and then what's the point?": "Я помню, когда был мелким сорванцом, мне приходилось вырезать сотни бумажных снежинок для ёлки каждый год. Утомительная работа, но она научила меня обращаться с ножом! Нам понадобятся трафареты, иначе снежинки не будут одинаковыми, и тогда в этом нет смысла."
"Perfect. Now I'll get these lazy dwarves (and Sona) to start cutting out snowflakes. Thanks!": "Отлично. Теперь я заставлю этих ленивых гномов (и Соню) начать вырезать снежинки. Спасибо!"
"I don't think fairies would appreciate normal tree ornaments. But Marrowchomp had a great idea for something much better! It's a pixie-dust shower. Almost completely safe! And we already have most of the parts. I just need some pixie dust, and some piping.": "Я не думаю, что феи оценят обычные украшения для дерева. Но у Марроучомпа была отличная идея получше! Это душ из пыльцы пикси. Почти полностью безопасно! И у нас уже есть большая часть деталей. Мне просто нужна пыльца пикси и немного трубок."
"Haha, great, this is great! Okay, that's finished Marrowchomp's design. Let's power it up. It should go off every few seconds. Watch and see!": "Ха-ха, отлично, это здорово! Ладно, дизайн Марроучомпа готов. Давай включим его. Он должен срабатывать каждые несколько секунд. Смотри и наблюдай!"
"The tree should be topped with a large decoration. But what decoration? There were no instructions. Since this is a human celebration of Ri-Shin, the god of plants and trees, it makes sense to use a wooden decoration, no? Fetch me a large load of spruce and I'll ask Daniel Murderdark what we should make with it.": "Дерево должно быть увенчано большим украшением. Но каким именно? Инструкций не было. Поскольку это человеческий праздник Ри-Шина, бога растений и деревьев, логично использовать деревянное украшение, не так ли? Принеси мне большую партию ели, и я спрошу у Дэниела Мердердарка, что мы можем из неё сделать."
"Thank you for the spruce. I have consulted with Daniel Murderdark who says that a large human skull is an appropriate tree-topper. Amutasa has agreed to sculpt one from your lumber.\n\nI have some suspicions about Daniel's truthfulness. His skeleton started to interject with a comment and Daniel shushed it. But what else can I do? This is all I have to go on. And a giant wooden skull does sound festive!": "Спасибо за ель. Я посоветовался с Дэниелом Мердердарком, который сказал, что большая человеческая черепушка — подходящее украшение для вершины дерева. Амутаса согласилась вырезать её из твоего леса.\\n\\nУ меня есть подозрения насчёт правдивости Дэниела. Его скелет начал вставлять комментарий, и Дэниел его заставил замолчать. Но что ещё я могу сделать? Это всё, на что я могу опереться. А гигантский деревянный череп действительно звучит празднично!"
"Okay, I need a bit of discreet help. Nelson gave me a decoration to put atop the tree, but I lost it! And I never lose things! So you know what this means: it was stolen. And I know who did it.\n\nThere's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!": "Ладно, мне нужна небольшая скрытная помощь. Нельсон дал мне украшение для верхушки ёлки, но я его потерял! А я никогда ничего не теряю! Так что ты понимаешь, что это значит: его украли. И я знаю, кто это сделал.\\n\\nЕсть один грызун, который делает мою жизнь несчастной с тех пор, как я случайно дал ему сверхинтеллект. Его зовут Мистер Сквики, и он живёт где-то к северо-западу от города. Пожалуйста, верни звезду, которую он украл!"
"Ah, you found it! Thank you! I feel bad about Mister Squeaky. He's a horrible little thing, but it's not his fault... it's mine. Anyway, onto the tree this goes!": "Ах, ты нашёл это! Спасибо! Мне жаль мистера Сквики. Он ужасное маленькое создание, но это не его вина... это моя. В любом случае, это пойдёт на ёлку!"
"It's time to enjoy summer! Your quest journal has a check-list of traditional summer activities. Complete them all before the event ends to receive some items that'll help you enjoy the weather.": "Пора наслаждаться летом! В твоём журнале заданий есть список традиционных летних развлечений. Выполни их все до окончания события, чтобы получить предметы, которые помогут тебе насладиться погодой."
"Good job! Here's your reward.": "Отличная работа! Вот твоя награда."
"The suspicious lemons are back! Suspicious lemons carry several possible buffs, debuffs or items. You will find lemons spawning randomly all over Alharth. Some are hiding while others are sitting out in the open. Now get out there and touch them all!\nWARNING FOR FAE CHARACTERS: The suspicious lemons love to deal in death and punishment just as much as buffs and love! Fairy players may want to use extreme caution when touching a lemon! Not everything a lemon gives results in death, but you need to be prepared!": "Подозрительные лимоны вернулись! Подозрительные лимоны могут давать различные баффы, дебаффы или предметы. Лимоны появляются случайным образом по всему Алхарду. Некоторые прячутся, а другие сидят на виду. Теперь выходи и потрогай их всех!\\nВНИМАНИЕ ДЛЯ ФЕЙ: Подозрительные лимоны любят приносить смерть и наказание так же сильно, как баффы и любовь! Игрокам-феям стоит быть крайне осторожными при прикосновении к лимону! Не всё, что даёт лимон, приводит к смерти, но нужно быть готовым!"
"You did it! You touched them all! Well done! Now go home and take a bath! You smell a little fruity.": "Ты справился! Ты коснулся их всех! Отличная работа! Теперь иди домой и прими ванну! Ты немного фруктово пахнешь."
"A Ri-Shin tree needs a topper, something that glows. But I don't wanna use one of those glowing yellow crystals... I know Sona says she can make 'em safe, but it's too dangerous.\n\nLet's just... I dunno, let's just stick some candles on top, like my family used to do. But we'll need to light 'em every night... got any spare tealights?": "Дереву Ри-Шин нужна вершина, что-то светящееся. Но я не хочу использовать эти светящиеся жёлтые кристаллы... Я знаю, Сона говорит, что может сделать их безопасными, но это слишком опасно.\\n\\nДавай просто... не знаю, просто поставим сверху несколько свечей, как раньше у моей семьи. Но их нужно будет зажигать каждую ночь... есть запасные чайные свечи?"
"Thanks! These aren't half bad.\n\nHmmm... the candles are too heavy, they're bending the branches down... do you think it'll catch the tree on fire? Nah, it's fine. I'm just overthinking this!": "Спасибо! Они неплохие.\\n\\nХммм... свечи слишком тяжёлые, они гнут ветки вниз... как думаешь, дерево загорится? Нет, всё в порядке. Я просто слишком много думаю!"
"The tree smells horrible, doesn't it? All... piney. I think we should douse it with Telka's Tail. And hang the perfume bottles in the tree as decorations! I have lots of empty bottles, but no full ones. Can you get me two?": "Дерево ужасно пахнет, не правда ли? Весь такой сосновый. Думаю, нам стоит облить его Хвостом Телки. И повесить флаконы с духами на дерево в качестве украшений! У меня много пустых флаконов, но нет полных. Можешь принести мне два?"
"Ah, that's the stuff. I'll use my empty bottles as decorations and douse the tree with one of these bottles of perfume. I think I'll save the other bottle for myself.  We want to treat people to this beautiful scent, but not overwhelm them!": "Ах, вот это дело. Я использую свои пустые бутылки как украшения и оболью ёлку одной из этих бутылок духов. Другую бутылку, думаю, оставлю себе. Мы хотим порадовать людей этим прекрасным ароматом, но не переборщить!"
"Hail citizen of Alharth!\n\nWe are looking for ambitious adventurers to join the ranks of the Civil Service! We are volunteers that go above and beyond to ensure our lands are a wonderful place to live! \n\nWe are currently looking for recruits willing to help out with our periodic dungeon and cave clearing. If left unchecked, these places slowly overfill with critters and eventually spill out to bring chaos and mayhem on the people of Alharth!\n\nJourney to these places and give them a good cleaning! It's not all for free either: we're willing to pay you for your troubles! We have installed tracking crystals in each of the areas to ensure you are showing up and doing the work. There are 2 of these crystals in each area. Once you have cleared the area, just use the crystal to check in and your work progress will be logged for payroll. After you have checked in to both crystals in that area, you will gain access to the reward cache located at the area entrance. Look through what's in there and pick out whatever looks interesting to you.\n\nIf you manage to complete all the tasks on the list, you may return to Serbule Keep and access the Grand Reward Cache located in a building across from the Inn for something much nicer! \n\nWe currently require the following areas to be serviced: \n- The Serbule Crypt \n- Borghild \n- Eltibule Keep Goblin Dungeon \n- Kur Tower \n- Ilmari Labyrinth \n- Gazluk Keep  \n- The Fungal Fortress \n\nAlso, once you have completed The Serbule Crypt or Borghild, you will gain access to the Civil Service Travel Network, which will help you get the job done faster! \n\nIf you choose to accept some or all of these tasks, thank you for your service and good hunting!": "Приветствую, гражданин Алхарта!\n\nМы ищем амбициозных искателей приключений, чтобы пополнить ряды Гражданской службы! Мы — добровольцы, которые делают всё возможное, чтобы наши земли были прекрасным местом для жизни!\n\nВ настоящее время мы ищем рекрутов, готовых помочь с периодической очисткой подземелий и пещер. Если их оставить без присмотра, эти места постепенно заполняются тварями и в итоге вырываются наружу, сея хаос и разрушения среди жителей Алхарта!\n\nОтправляйся в эти места и проведи там тщательную очистку! И это не бесплатно: мы готовы платить тебе за твою работу! В каждом из районов установлены кристаллы отслеживания, чтобы убедиться, что ты приходишь и выполняешь работу. В каждом районе по 2 таких кристалла. После того как ты очистишь район, просто используй кристалл, чтобы отметиться, и твой прогресс будет зафиксирован для начисления оплаты. После того как ты отметишься у обоих кристаллов в этом районе, получишь доступ к хранилищу наград у входа в район. Осмотри содержимое и выбери то, что тебе интересно.\n\nЕсли ты справишься со всеми заданиями из списка, можешь вернуться в крепость Сербуль и получить доступ к Великому хранилищу наград, расположенного в здании напротив гостиницы, где тебя ждёт нечто гораздо более ценное!\n\nВ настоящее время требуется обслуживание следующих районов:\n- Крипта Сербуль\n- Боргилд\n- Подземелье гоблинов в крепости Элтибул\n- Башня Кур\n- Лабиринт Илмари\n- Крепость Газлук\n- Грибная крепость\n\nКроме того, после выполнения заданий в Крипте Сербуль или Боргилд ты получишь доступ к Сети путешествий Гражданской службы, которая поможет тебе быстрее выполнять работу!\n\nЕсли ты решишь принять некоторые или все эти задания, спасибо за службу и удачной охоты!"
"You did it! You completed all of the tasks! Well Done!": "Ты справился! Ты выполнил все задания! Отличная работа!"
"A roaming caravan of master crafters and their apprentices have stopped at the Red Wing Casino for a few days of rest, restocking, and a chance to study some of the local crafts. They have rented the Theater Room for their staging area. Go pay them a visit and see if they can help you advance your craft skills faster!": "Бродячий караван мастеров ремесел и их учеников остановился у Казино Красное Крыло на несколько дней отдыха, пополнения запасов и возможности изучить местные ремёсла. Они арендовали Театральную комнату в качестве своей базы. Загляни к ним и узнай, смогут ли они помочь тебе быстрее развить навыки ремесла!"
"The Errana Bunny has challenged you to an egg hunt! Find the blue, yellow and red Errana Eggs scattered throughout Eltibule and Serbule. Once you have found them all, return to The Errana Bunny to collect your prize.\n<b>IMPORTANT:</b> You must remain in bunny form for the duration of this quest! If you jump out of bunny form for any reason, this quest will fail and you will have to start over!": "Заяц Эррана бросил тебе вызов на охоту за яйцами! Найди синие, жёлтые и красные яйца Эрраны, разбросанные по Элтибулю и Сербулю. Как только найдёшь все, вернись к Зайцу Эрране, чтобы получить награду.\\n<b>ВАЖНО:</b> Ты должен оставаться в кроличьей форме на протяжении всего задания! Если по какой-либо причине выйти из кроличьей формы, задание провалится, и придётся начинать заново!"
"Good job! Here's the dye recipe as promised and a little something extra!\n<i>[You can find the recipe for this in your crafting recipes under Dye Making]</i>": "Отличная работа! Вот рецепт краски, как и обещал, и кое-что ещё!\\n<i>[Рецепт можно найти в твоих рецептах ремёсел в разделе Изготовление красок]</i>"
"Hogan explained that the tree should be decorated with a number of small orbs. This seems trivial. Please fetch some lumber and I shall carve some balls. Maple is fragrant; we should use that.": "Хоган объяснил, что дерево должно быть украшено рядом маленьких шариков. Это кажется незначительным. Пожалуйста, принеси немного древесины, и я вырежу несколько шаров. Клен пахучий; нам стоит использовать его."
"Very good. Kalaba and I shall turn them into small balls and add them to the tree.": "Очень хорошо. Калаба и я превратим их в маленькие шарики и добавим на дерево."
"We need tinsel. What can we make it from? It should be fluffy, light, and... I have it! Matted hairballs! We'll dye them red. Go, fetch some!": "Нам нужна мишура. Из чего мы её сделаем? Она должна быть пушистой, лёгкой и... я придумал! Сплошные комки шерсти! Мы покрасим их в красный цвет. Иди, принеси немного!"
"We should be able to tease these disgusting hairballs apart and dye them red. And by the by, I love this! I've met the obligations of my duty as tree-master, and yet nobody will ever ask me to do it again! It's perfect.": "Мы должны суметь распутать эти отвратительные комки волос и покрасить их в красный цвет. И кстати, мне это очень нравится! Я выполнил свои обязанности как хранитель дерева, и при этом меня никто больше не попросит это повторить! Это идеально."
"Here's another crazy order. How am I going to fill this?! I need \"schematics and maintenance instructions for an Exetar-class ship.\" I understand some of those words...\n\nWell, no pressure but see what you can do.": "Вот ещё один безумный заказ. Как мне это выполнить?! Мне нужны «чертежи и инструкции по обслуживанию корабля класса Экзетар». Я понимаю не все эти слова...\\n\\nНу, без давления, но посмотри, что сможешь сделать."
"These are the books? They're... They have no pages. But okay! Okay, I don't care, so this is great! I'll deliver this order. You're really good at this, you know?": "Это те книги? У них... у них нет страниц. Но ладно! Ладно, мне всё равно, так что это отлично! Я доставлю этот заказ. Ты действительно в этом хорош, знаешь?"
"My next class will cover natural percussive sounds. I just need a bit of help with the props!": "Мой следующий урок будет посвящён естественным перкуссионным звукам. Мне просто нужна небольшая помощь с реквизитом!"
"Thank you so much! These mortal beast remains will make my talk so much more engaging!": "Большое спасибо! Эти останки смертных зверей сделают мою речь гораздо более увлекательной!"
"I need new types of fungus to improve my fungal forest. These species do not grow natively here, so I must ask for assistance.": "Мне нужны новые виды грибов, чтобы улучшить мой грибной лес. Эти виды не растут здесь естественным образом, поэтому мне нужна помощь."
"Your specimens are acceptable, and my gratitude is significant.": "Твои образцы приемлемы, и моя благодарность велика."
"So my masterpiece is almost done. I just need a better color for the stripes on the tiger. I need Firaki's advice. She's an expert on colors -- if anybody can figure out what color I need for my masterpiece, it's her. She lives in Amulna, a little town in the Ilmari desert. Can you go ask her?": "Моё произведение почти готово. Мне просто нужен лучший цвет для полос на тигре. Мне нужен совет Фираки. Она эксперт по цветам — если кто и может понять, какой цвет нужен моему шедевру, так это она. Она живёт в Амулне, маленьком городке в пустыне Илмари. Можешь сходить и спросить её?"
"Lemon chiffon dye? Sounds... well, not very heroic. But I trust Firaki. Thanks for asking her for me. Here, take these. Now, if you can do me another favor...": "Краситель лимонного шифона? Звучит... ну, не очень героично. Но я доверяю Фираки. Спасибо, что спросил её за меня. Вот, возьми это. А теперь, если можешь сделать ещё одну услугу..."
"Oh, you're a friend of Jake the Buckler? That human is my oldest customer! Seems like I've known him all my life.\n\nOkay, so he needs to paint the stripes on a tiger, but yellow overwhelms the pale green of the trees? He needs lemon chiffon dye. I don't carry it here. But I know where he can get it: tell him to find a mantis living outside of Serbule. The mantis can help him out.\n\nAlso, tell him that my advice costs 311 Councils, which is the exact amount I owed him, so we're even now.": "О, ты друг Джейка Щитоносца? Этот человек — мой самый давний клиент! Кажется, я знаю его всю свою жизнь.\\n\\nИтак, ему нужно раскрасить полосы на тигре, но жёлтый цвет заглушает бледно-зелёный цвет деревьев? Ему нужен краситель лимонного шифона. У меня его нет. Но я знаю, где он может его достать: скажи ему найти богомола, который живёт за пределами Сербуля. Богомол сможет ему помочь.\\n\\nТакже скажи ему, что мой совет стоит 311 Советов, что ровно столько, сколько я ему должен, так что мы в расчёте."
"I have decided not to take Kar-Get on Wake's daughter. It is right and just, but I would feel too guilty. Instead I will use my trade to honor her. I will make an explosive map, and give Sinda a symbolic burial by fire. Hm, I am out of explosive ink. Do you have any?": "Я решил не брать Кар-Гет у дочери Уэйка. Это правильно и справедливо, но я бы чувствовал слишком большую вину. Вместо этого я использую своё ремесло, чтобы почтить её память. Я сделаю взрывную карту и устрою Синде символическое погребение огнём. Хм, у меня кончились взрывные чернила. У тебя есть?"
"Thank you. I will perform the wake privately. I would invite you to join me, but I fear I may cry, and I will not be seen in that state. Oh, but here is some money to compensate for your purchase.": "Спасибо. Я проведу поминки в приватной обстановке. Я бы пригласил тебя присоединиться, но боюсь, что могу заплакать, а в таком состоянии меня видеть не хотят. О, вот немного денег, чтобы компенсировать твою покупку."
"So that fairy over there -- yeah, that one, Pegast. He came over and asked for my help. Finally, recognition of my expertise! But did he want help getting fit and healthy? Nope. He just wanted explosive mushrooms. I gave him what I had, but he still needs more. So now I have to go foraging for this guy.\n\nHey, you look like you could use some exercise... you ready for a jog into the wilds? Great! These are very tricky mushrooms to pick, so be careful!": "Та фея там — да, именно он, Пегаст. Он подошёл и попросил моей помощи. Наконец-то признание моего мастерства! Но хотел ли он помочь стать в форме и здоровым? Нет. Ему нужны были взрывные грибы. Я дал ему то, что у меня было, но ему нужно ещё больше. Так что теперь мне придётся ходить за ними в лес.\n\nЭй, похоже, тебе не помешают упражнения... готов к пробежке по дикой природе? Отлично! Эти грибы очень сложные для сбора, так что будь осторожен!"
"Great, you didn't explode! And you look a little fitter and leaner, too!\n\nThat fairy is trying to use these mushrooms to recharge the wall turrets. Seems pretty insane, huh? But we did our part already! Now we can just watch. Marrowchomp's giving me 3-to-1 odds he explodes. Want in?": "Отлично, ты не взорвался! И выглядишь немного в лучшей форме и стройнее!\\n\\nТа фея пытается использовать эти грибы, чтобы перезарядить настенные турели. Звучит довольно безумно, правда? Но мы уже сделали своё дело! Теперь можем просто наблюдать. Марроучомп даёт мне коэффициент 3 к 1, что он взорвётся. Хочешь присоединиться?"
"Oh n-no. Th-th-this r-recipe n-needs EYE STALKS. W-where in the w-world w-w-would I g-get that?! They c-come from w-watchers, b-but there's no w-w-watchers anywhere a-around h-here! Th-thankfully!\n\nB-but i-if you ever f-find any eyestalks, p-please save them f-for me.": "О, н-нет. Э-этот р-рецепт н-нуждается в ГЛАЗНЫХ СТЕБЛЯХ. Г-где в м-мире м-мне их д-добыть?! Они п-происходят от наблюдателей, н-но здесь н-нет н-никаких наблюдателей! К-к счастью!\\n\\nА-а если ты к-когда-нибудь н-найдёшь глазные стебли, п-пожалуйста, с-сохрани их для меня."
"Oh m-my... th-thank y-y-you! H-here, p-p-p-... <i>Daisy struggles with her words.</i> P-please take this. F-for y-your own r-recipes.": "О-о-о... с-с-спасибо в-в-вам! В-в-возьмите, п-п-п... <i>Дейзи с трудом подбирает слова.</i> П-п-пожалуйста, примите это. Д-для ваших собственных р-рецептов."
"There's a bunch of bears on the storage deck because of... reasons. You should clear those out, if you're going that way!": "На складе полно медведей из-за... причин. Тебе стоит их убрать, если ты туда направляешься!"
"The bears are gone? Great! I was about to get in trouble for that one. See, the cow-men were sentient, but the bears weren't. So as a little prank, I  swapped their intelligence reports in our system. For weeks, ensigns have been trying to tame the cow-men and parlay with the bears. It's been very, VERY funny to watch, but the joke's run its course. Thanks to you!": "Медведи пропали? Отлично! Я уже собирался за это попасть. Видишь ли, короволюди были разумными, а медведи — нет. Так что в качестве небольшой шутки я поменял их отчёты об интеллекте в нашей системе. Неделями младшие офицеры пытались приручить короволюдей и вести переговоры с медведями. Было очень, ОЧЕНЬ забавно наблюдать, но шутка уже изжила себя. Спасибо тебе!"
"Fairies have a kind of cloth called fae felt. There's also a drug called fae felt, so it gets kind of confusing... but I really want some of the cloth. Just to understand what it feels like, looks like, smells like. If you find some, can you bring it to me?": "У фей есть особая ткань, которую называют фэй фелт. Также существует наркотик с таким же названием, поэтому бывает немного путаницы... но мне очень хочется заполучить немного этой ткани. Просто чтобы понять, как она ощущается, как выглядит, как пахнет. Если найдёшь, можешь принести мне?"
"Oh my... this is the softest material I've ever felt! I'm in love with this felt!\n\nIn fact... this is the perfect ingredient for the clothing I've been designing!\n\n<i>[New Training Recipes available.]</i>": "О боже... это самый мягкий материал, который я когда-либо трогал! Я влюблён в этот фетр!\\n\\nНа самом деле... это идеальный ингредиент для одежды, которую я разрабатываю!\\n\\n<i>[Доступны новые рецепты обучения.]</i>"
"Since you're an outsider, you can help fix a tricky problem. Fae panthers have been increasing in number and they're hunting quite close to town. The fairies dealt with other threats such as rhinos very easily, yet they've ignored the panthers... and I've finally realized that it's due to ME. Pegast is afraid of offending me. I've tried to explain that these are just ordinary animals, barely smarter than a mortal cat... but he thinks I SHOULD be offended, even if I'm not. Anyway, if you were to just go and remove those panthers near town, that'd be great.": "Поскольку ты чужак, ты можешь помочь решить сложную проблему. Численность фейских пантер растёт, и они охотятся совсем близко к городу. Феи легко справлялись с другими угрозами, такими как носороги, но пантеры ими игнорировались... и я наконец поняла, что это из-за МЕНЯ. Пегаст боится меня обидеть. Я пыталась объяснить, что это просто обычные животные, едва умнее смертного кота... но он считает, что Я ДОЛЖНА обижаться, даже если я не обижаюсь. В любом случае, если ты просто пойдёшь и уберёшь этих пантер возле города, это было бы здорово."
"Thank you. You may be wondering why I didn't hunt them myself: I did at first, but realized the fairies found that barbaric as well. Fairies have a complicated and annoying sense of honor, or decency, or... something. I'm much more comfortable with the trolls: they're very pragmatic!": "Спасибо. Возможно, ты задаёшься вопросом, почему я не охотился на них сам: сначала я пытался, но понял, что феи тоже считают это варварством. У фей сложное и раздражающее чувство чести, приличия или... чего-то такого. Мне гораздо комфортнее с троллями: они очень прагматичны!"
"My dark ritual requires a large number of fae rhino horns. Just go out and get some for me.": "Моему тёмному ритуалу нужно большое количество рогов фейского носорога. Просто выйди и принеси мне их."
"Very good. I like to powder these and use as a food additive. They can cut down the potency of pixie sugar without reducing the sugar high. Very useful for overclocking the tongue! If you're not afraid of Gastronomancy, maybe I'll teach you the dark ritual sometime.\n\nIn the mean time, here's a much less dangerous technique. It's unusable here due to lack of ingredients, but you can use it when you get home.": "Очень хорошо. Мне нравится измельчать их в порошок и использовать как пищевую добавку. Они могут снизить силу пикси-сахара, не уменьшая сахарный кайф. Очень полезно для ускорения работы языка! Если ты не боишься гастрономантии, может, я когда-нибудь научу тебя тёмному ритуалу.\\n\\nА пока вот гораздо менее опасная техника. Здесь её нельзя использовать из-за отсутствия ингредиентов, но ты сможешь применить её, когда вернёшься домой."
"You can do amazing things with the goo of a ripe fairy puff. Usually they explode too violently to be useful, but if you pop one that's perfectly ripe, you won't be hurt! Instead, you'll get coated in their goo.\n\nGo get yourself coated, then come see me. I'll use that goo for hive maintenance.": "С помощью слизи спелого фейского пуха можно творить удивительные вещи. Обычно они взрываются слишком сильно, чтобы быть полезными, но если лопнуть идеально спелый, ты не пострадаешь! Вместо этого ты покроешься их слизью.\\n\\nИди покройся этой слизью, а потом приходи ко мне. Я использую её для обслуживания улья."
"Thanks for the goo. I'll use this to make sure the hives around here are able to survive the fluctuations of winter. Here, this is for your trouble.\n\nAnd please return tomorrow, I need fresh fairy puff goo every day!": "Спасибо за слизь. Я использую её, чтобы ульи здесь могли пережить зимние перепады. Вот, это за твою работу.\\n\\nИ, пожалуйста, возвращайся завтра, мне нужна свежая слизь фейского пуха каждый день!"
"Don't let anybody know I ordered this. The autumn fey would have me killed!": "Никому не говори, что я это заказал. Осенние феи меня убьют!"
"I was guarding the switch when it happened. I wasn't even there!\n\nI know what she said. I know! But those weren't REAL! It was a prank! I took it from a goblin. It only looked like... what? No, just to scare Frek and Jule! They were my... no, that's not true!\n\nThey had to be fake...": "Я охранял переключатель, когда это случилось. Меня даже там не было!\\n\\nЯ знаю, что она сказала. Знаю! Но это были НЕ НАСТОЯЩИЕ! Это была шутка! Я взял это у гоблина. Это только выглядело как... что? Нет, просто чтобы напугать Фрека и Джула! Они были моими... нет, это неправда!\\n\\nОни должны были быть подделкой..."
"See? See! They ARE prank bombs! I didn't kill them! It was those bastard Snowbloods!\n\nWait. There are my friends! Can you see them? You can see them too, right?": "Видишь? Видишь! Это действительно шутливые бомбы! Я их не убивал! Это были эти проклятые Сноублуды!\\n\\nПогоди. Там мои друзья! Ты их видишь? Ты тоже их видишь, правда?"
"I swear upon Tast's mighty throbbing cock that the bombs were fake! This can't have been my fault!": "Клянусь могучим пульсирующим членом Таста, что бомбы были поддельными! Это не могло быть моей виной!"
"Incorporeal Spawn Premonition": "Предчувствие Бесплотного Порождения"
"The 'cinnamon' that grows in Council Lands isn't the same plant that we have growing overtop Mt. Aufghel. I need to collect some of the stuff for a report back home. Can you help me collect it? It grows on trees in the snow out there.": "Корица», которая растёт в Землях Совета, — это не то же самое растение, что растёт на вершине горы Ауфгель. Мне нужно собрать немного этого для отчёта домой. Ты можешь помочь мне собрать её? Она растёт на деревьях в снегу там."
"Yes! See, this cinnamon bark is actually a kind of <i>cassia</i> tree bark. It works fine as a spice, but it's not the same thing at an alchemical level! It's not a kind of cassia I recognize, either. Very interesting. Thank you. On behalf of the Aufghel Naturists Society, I present this bounty.": "Да! Видишь, эта корица на самом деле — кора дерева <i>кассии</i>. Она отлично подходит как специя, но на алхимическом уровне это совсем не то! И это не тот вид кассии, который я знаю. Очень интересно. Спасибо. От имени Общества натуралистов Ауфгель я вручаю тебе эту награду."
"Keeping up the illusion of being a bee is hard enough, but now Spot keeps hounding me for honey. I think she's getting suspicious. And I haven't found a drop of honey since I came to this mortal realm! But I have an idea: myconian jelly! It's this weird stuff that Norbert showed me. I don't know where you get it, but it's delicious! And with a little illusion magic, it'll fool Spot.": "Поддерживать иллюзию пчелы и так сложно, а теперь Спот всё время докучает мне с мёдом. Похоже, она начинает подозревать. А я с тех пор, как пришёл в этот смертный мир, ни капли мёда не нашёл! Но у меня есть идея: миконийский желе! Это странная штука, которую показал мне Норберт. Я не знаю, где его достать, но оно вкусное! А с помощью небольшой иллюзионной магии оно обманет Спот."
"That's the stuff! Mm. I want to just eat it all! But I'll save it to show to Spot. Thanks a lot, this will really help solidify my cover story. Here! This is something I made. I hope it fits your... weird body.": "Вот это да! Ммм. Хочется съесть всё сразу! Но я сохраню это, чтобы показать Споту. Большое спасибо, это действительно поможет укрепить мою легенду. Вот! Это то, что я сделал. Надеюсь, это подойдёт твоему... странному телу."
"Practice makes perfect! Practice practice practice! When you think you're ready, make me some basic skinning knives.": "Практика ведёт к совершенству! Практикуйся, практикуйся, практикуйся! Когда почувствуешь, что готов, сделай для меня несколько простых ножей для снятия шкур."
"Good! You're faking enthusiasm a bit better now! Keep it up.": "Отлично! Ты теперь притворяешься энтузиазмом получше! Так держать."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>fancy hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>изящные молоты</b>. Ты можешь сделать несколько для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new fancy hammers from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых изящных молотков."
"Have you seen the frostbelches in the area? Little blue frogs, very adorable, very deadly. Of course you have, but it seems the demons have as well. They've developed a particular interest in the little creature, and I don't have to know why to know that it's troubling.\n\nBring me back a few samples of frostbelch skin, and please let me remain ignorant of how you get them.": "Видел ли ты морозных рыков в этом районе? Маленькие синие лягушки, очень милые, очень смертоносные. Конечно, видел, но, похоже, демоны тоже. Они проявили особый интерес к этим созданиям, и мне не нужно знать почему, чтобы понять, что это тревожно.\\n\\nПринеси мне несколько образцов шкуры морозных рыков, и, пожалуйста, позволь мне оставаться в неведении о том, как ты их получил."
"Great! I hope you convinced the Frostbelches to simply give you a sliver of skin peacefully. <i>[Ferris swallows nervously.]</i>\n\nLet me perform some research on these to determine what our next step is.": "Отлично! Надеюсь, тебе удалось убедить Морозных Пыхтунов мирно отдать тебе кусочек кожи. <i>[Феррис нервно глотает.]</i>\\n\\nПозволь мне провести исследование, чтобы определить наш следующий шаг."
"Unfortunately, my tests on these Frostbelch skins were inconclusive. There's nothing out of the ordinary with them. Fortunately for us, however, an animal expert was recently stationed near here. Seek out Pitre Ferrence, he should be somewhere south of this area. Ask him, nay, tell him that we'd like his assistance in this matter. Take the skins with you as well, he may need them.": "К сожалению, мои испытания этих шкур морозных рыков не дали однозначных результатов. В них нет ничего необычного. Однако, к счастью для нас, неподалёку недавно разместился эксперт по животным. Найдите Питре Ферренса, он должен быть где-то к югу от этой области. Спросите его, точнее, скажите ему, что нам нужна его помощь в этом деле. Возьмите с собой шкуры, они могут ему понадобиться."
"\"Easy, deep influence\"? Well, I suppose that makes sense, but it still doesn't tell the full story. The demons can influence the frogs easily, but to what end? <i>Why</i> do they want to influence them in the first place is the main question. I will stew on Pitre's words. That is all for now, thank you.": "Лёгкое, глубокое влияние»? Ну, наверное, это имеет смысл, но всё равно не раскрывает всей картины. Демоны могут легко влиять на лягушек, но с какой целью? Главное — <i>почему</i> они вообще хотят на них влиять. Я поразмышляю над словами Питре. Пока это всё, спасибо."
"What is that? Oh, Ferris needs assistance is it? Well, let me see the samples that you have, then.\n\n[Pitre takes the skins from you, but then quickly returns them.]\n\nOn second thought, a genetic scan is quite unnecessary. The demons' plan is obvious. You see, frogs have permeable skin through which they absorb all manner of particulates. And if you look around this area, you are likely to see many ordinary animals overcome with demonic influence. If the passive presence of the demons has such an effect on these animals, I can only imagine the level of influence they could have on an animal that is designed to be influenced by its environment. Easy, deep influence, is the answer I would give to Ferris.": "Что это? О, Феррису нужна помощь, да? Ну, покажи мне образцы, которые у тебя есть.\\n\\n[Питр берёт у тебя шкуры, но быстро возвращает их.]\\n\\nС другой стороны, генетическое сканирование совсем не нужно. План демонов очевиден. Видишь ли, у лягушек проницаемая кожа, через которую они впитывают всевозможные частицы. И если оглядеться вокруг, ты, вероятно, увидишь много обычных животных, подверженных демоническому влиянию. Если пассивное присутствие демонов оказывает такой эффект на этих животных, я могу только представить уровень влияния, которое они могут оказать на животное, созданное для того, чтобы быть подверженным влиянию окружающей среды. Лёгкое, глубокое влияние — вот что я бы ответил Феррису."
"I have a theory. I suspect that the demons specifically value some combination of the Frostbelches' protective properties with their own. But I don't know what combination, exactly. Do you still have those frog skins from before? I'll need those, and I'll need some demonic essences. Bring me both, so I can compare.": "У меня есть теория. Я подозреваю, что демоны особенно ценят какое-то сочетание защитных свойств Морозных Пузырей с их собственными. Но я точно не знаю, какое именно сочетание. У тебя ещё остались те лягушачьи шкуры? Мне они понадобятся, а также несколько демонических эссенций. Принеси мне и то, и другое, чтобы я мог сравнить."
"No, not the Hellfire... No, the frost doesn't seem to affect the demonic energies, so it's not that either. There must be someth- <i>[Ferris' eyes widen]</i> No. No no no. This is very not good.\n\nIt seems that when the demonic essence fuses with the Frostbelch skin, their defenses perfectly align to create an entity which is immune to all of the elements. All of them.": "Нет, не Адское Пламя... Нет, мороз, похоже, не влияет на демоническую энергию, так что и это не подходит. Должно быть что-то — <i>[глаза Ферриса расширяются]</i> Нет. Нет, нет, нет. Это очень плохо.\\n\\nПохоже, что когда демоническая сущность сливается с кожей Морозного Взрыва, их защиты идеально сочетаются, создавая существо, которое невосприимчиво ко всем стихиям. Ко всем сразу."
"We cannot let that happen. We cannot let the demons fuse with the Frostbelches. [Ferris looks around, clearly panicked.] I'm afraid we have no choice. We have to destroy the Frostbelches before it's too late. My heart goes out to the cute little creatures, but there really is no other way.\n\nI hate to ask you to do this, but I need you to deal with as many Frostbelches as you can.": "Мы не можем позволить этому случиться. Мы не можем позволить демонам слиться с Морозными Пузырями. [Феррис оглядывается вокруг, явно в панике.] Боюсь, у нас нет выбора. Мы должны уничтожить Морозных Пузырей, пока не стало слишком поздно. Мне жаль этих милых существ, но другого выхода действительно нет.\\n\\nМне неприятно просить тебя об этом, но мне нужно, чтобы ты справился с как можно большим количеством Морозных Пузырей."
"Thank you. Thank you, thank you, thank you. I don't know how I can ever repay you for that. You prevented a disaster, of that we can be sure. Take this, in memory of the many fallen frogs.": "Спасибо. Спасибо, спасибо, спасибо. Я не знаю, как я смогу когда-нибудь отплатить тебе за это. Ты предотвратил катастрофу, в этом мы можем быть уверены. Прими это в память о многих павших лягушках."
"This is a complicated bundle order from someone who's obsessed with dragonkin. The hassle is huge but the pay is good.": "Это сложный заказ от человека, одержимого драконорожденными. Хлопот много, но оплата хорошая."
"This order was dragon me down so I'm glad you got fired up and did it for me. I thought I was gonna have to scale it back. Here's your hoard.": "Этот заказ меня вымотал, так что я рад, что ты загорелся и сделал это за меня. Я думал, придётся отложить его. Вот твоя награда."
"Floxie has been helping me gather local flowers to test as dyes, but the ocelots keep running her off. I told her not to be afraid of little kittens, and she told me to go get my own flowers! Can you clear some of them out for me? If anyone can deal with harmless felines, it's you! ": "Флокси помогала мне собирать местные цветы для испытания в качестве красителей, но оцелоты постоянно её прогоняют. Я сказал ей не бояться маленьких котят, а она ответила, чтобы я сам пошёл за своими цветами! Не мог бы ты расчистить их немного для меня? Если кто и справится с безобидными кошками, так это ты!"
"Good job slaughtering the kitties! No, I'm just joking. You can slaughter anything you want. Thanks!\n\nNow since you helped me out, I'll show you a little trick or two...": "Отличная работа, что истребил котят! Нет, шучу. Можешь истреблять всё, что хочешь. Спасибо!\\n\\nТеперь, раз ты помог мне, я покажу тебе пару хитростей..."
"My shipment of feathers didn't come in. <i>Again.</i> I wonder what's up? Anyway, can you collect some? There's a few chickens in town, but you can also find them in giant spiders' stomachs. They eat lots of birds! And there's lots of giant spiders in the cemetery crypt...": "Моя партия перьев не пришла. <i>Снова.</i> Интересно, в чём дело? В любом случае, можешь собрать немного? В городе есть несколько кур, но их также можно найти в желудках гигантских пауков. Они едят много птиц! А в склепе кладбища полно гигантских пауков..."
"Perfect! Well... not <i>perfect</i>, these are pretty ratty feathers, but I can make 'em work.\n\nLet me repay you. Not in money, but in something even better: arrows!": "Отлично! Ну... не <i>идеально</i>, эти перья довольно потрёпанные, но я смогу с ними справиться.\\n\\nПозволь отблагодарить тебя. Не деньгами, а чем-то даже лучше: стрелами!"
"Can you grab some feathers for me? Shouldn't be hard...": "Можешь достать для меня несколько перьев? Не должно быть сложно..."
"Thanks! Here's something for your effort.": "Спасибо! Вот что-то за твои старания."
"I've got customers returning to the shop! But I've been selling my loaves at a loss, and I can't keep doing that for long. The problem is the taxes on delivered grains. They're just too high! So I was thinking... Maybe you could deliver them for me?\n\nI can't pay you in Councils but I can do much better: I can pay you in exposure. I'll tell everyone who shops here about how great you are, and what a valuable addition to Statehelm you've become.": "Ко мне в лавку возвращаются покупатели! Но я продаю свои буханки с убытком, и так долго продолжаться не может. Проблема в налогах на доставляемое зерно. Они слишком высоки! Так что я подумал... Может, ты сможешь доставлять их за меня?\\n\\nЯ не могу заплатить тебе Советами, но могу предложить кое-что получше: я расскажу всем покупателям здесь, какой ты замечательный и каким ценным дополнением к Стейтхелму ты стал."
"You're a hero to the people, and I'll let them know it!\n\nCome back in a week and I'll need more of this same.": "Ты герой для народа, и я сообщу им об этом!\\n\\nВернись через неделю, и мне понадобится ещё такого же."
"Sales are going well and it's time to bring back some of my fancier recipes. I need these grains to do it! As before, I'll pay you in clout with the citizens of Statehelm!": "Продажи идут хорошо, и пора вернуть некоторые из моих изысканных рецептов. Мне нужны эти зерна для этого! Как и раньше, я заплачу тебе влиянием среди жителей Стейтхелма!"
"I'm going to create culinary masterpieces, and you -- you made it possible. I'll make sure people know about it!\n\nCome back in a week and I'll need more of this same.": "Я собираюсь создавать кулинарные шедевры, и ты — ты сделал это возможным. Я позабочусь, чтобы все об этом узнали!\\n\\nВернись через неделю, и мне понадобится ещё такого же."
"If you bring me dinosaur scales to make buttons, I'll show you how to use First Aid.": "Если ты принесёшь мне чешую динозавра для пуговиц, я покажу тебе, как использовать первую помощь."
"These are just what I wanted. Thank you! Now hand me that kit and I'll show you the best way to wrap bandages. This works for bondage as well as injuries.": "Это именно то, что мне нужно. Спасибо! Теперь передай мне этот набор, и я покажу тебе лучший способ накладывать повязки. Это подходит как для бинтов, так и для травм."
"Any old femurs will do but please make sure they're clean.": "Подойдут любые старые бедренные кости, но, пожалуйста, убедитесь, что они чистые."
"My goat Fiddler just loves juniper berries. They taste awful ta me but goats will be goats! They don't seem ta grow around here though. Seen any?": "Мой козёл Скрипач просто обожает ягоды можжевельника. Мне они ужасно не нравятся, но козлы есть козлы! Хотя, похоже, они здесь не растут. Не видел таких?"
"Oh Fiddler will love these! Thank-you!": "О, Фиддлеру это очень понравится! Спасибо!"
"Fiddler over there's immortal, as in 'never grows old' immortal. Nice trick, right? But he can still die of disease! His hoofs are hundreds 'a years old and need to be cleaned. I need one more thing for my cleaning kit: yeti hair. Or any super-strong hair balls, really. Werewolf hair'd do.": "Скрипач там бессмертен, как в смысле «никогда не стареет» бессмертен. Классный трюк, да? Но он всё равно может умереть от болезни! Его копыта сотни лет старые и их нужно почистить. Мне нужна ещё одна вещь для моего набора для чистки: волосы йети. Или любые сверхпрочные комки волос, на самом деле. Волосы оборотня тоже подойдут."
"Oh, good. I already went at Fiddler's hooves with a metal file, but I need these hairballs to scrub the more delicate parts of the feet. I thank you, and so does Fiddler!": "О, хорошо. Я уже обработал копыта Скрипача металлической пилкой, но мне нужны эти комки шерсти, чтобы почистить более деликатные части копыт. Благодарю тебя, и Скрипач тоже!"
"Have ya met my goat Fiddler? He's immortal! Or nearly. But immortal goats need special care! His fur is so strong normal shears can't cut it, and my last pair o' diamond shears got swiped by somebody. A goblin probably... anyway, I know what we need to make a new comb! I saw it when I was in Kur. There's an Urak near a spring in Kur that my orc guide called Fluffy. Typical orc joke, right, 'cuz Fluffy's got no fur. And it eats orcs and terrorizes the land. Anyway, I need a tooth from that big fucker. Can ya get it?": "Ты встречал моего козла Скрипача? Он бессмертен! Или почти. Но бессмертным козлам нужен особый уход! Его шерсть такая крепкая, что обычные ножницы не могут её порезать, а моя последняя пара алмазных ножниц была украдена кем-то. Наверное, гоблином... В общем, я знаю, что нам нужно, чтобы сделать новый гребень! Я видела это, когда была в Куре. Там, возле источника в Куре, есть урак, которого мой орочий проводник называл Пушистым. Типичная орочьая шутка, да? Ведь у Пушистого нет шерсти. И он ест орков и терроризирует землю. В общем, мне нужен зуб этого большого ублюдка. Ты можешь его достать?"
"So ya killed Fluffy? Good! Stupid thing hit me with a rock the size of my head. I coulda died in the snow! I swore revenge, and thankfully you revenged me, plus I can make a comb outta this. A great day's work!": "Так ты убил Пушистика? Отлично! Эта глупая тварь швырнула в меня камнем размером с мою голову. Я мог погибнуть в снегу! Я клялся отомстить, и, к счастью, ты отомстил за меня, да ещё и я могу сделать из этого расчёску. Отличная работа за день!"
"Hey, do me a favor, go burn yourself on some of those eldritch candles scattered around the crypt southwest of town. I want to study the burn patterns. Each candle should leave a distinct burn mark. Just go touch four of them and come back.\n\nOh it won't hurt THAT much, you big baby!": "Эй, сделай одолжение, обожгись на одних из тех эльдрических свечей, разбросанных по крипте к юго-западу от города. Я хочу изучить узоры ожогов. Каждая свеча оставит уникальный след ожога. Просто коснись четырёх из них и возвращайся.\\n\\nОй, это не так уж больно, ты большой плаксивый!"
"Hm, nope... not enough candles. I need more data than that! But a deal's a deal, let me teach you how to bind eldritch wounds a bit better. [You gain First Aid XP]": "Хм, нет... свечей недостаточно. Мне нужно больше данных! Но сделка есть сделка, позволь научить тебя лучше перевязывать эльдрические раны. [Вы получаете опыт в Первой помощи]"
"I need more data. Can you go touch some more candles in the crypt? Say, a dozen. But you can count the ones you've already touched toward the total.": "Мне нужно больше данных. Можешь пойти и потрогать ещё несколько свечей в склепе? Скажем, дюжину. Но можешь засчитать те, что уже трогал, в общий счёт."
"Damn it! Still not enough candles!\n\nWell, let me teach you a bit about hammering out dents. [You gain Armor Patching XP]": "Чёрт! Всё ещё недостаточно свечей!\\n\\nНу, позволь научить тебя немного выбивать вмятины. [Вы получаете опыт в Заплатке брони]"
"Okay, last time. Just go touch candles until your hand burns off. Hyperbole! Relax! How about 25, just to be damned sure we've got it done?": "Хорошо, в последний раз. Просто трогай свечи, пока рука не обожжётся. Преувеличение! Расслабься! Как насчёт 25, чтобы уж точно убедиться, что мы это сделали?"
"Yes! That's it! See this pattern here? They burn tiny near-imperceptible scars into your flesh. It's a pattern, see? I think the dots make the outline of a snake. Weird...\n\nWell, I'll study it more. Thanks! Here, take this.": "Да! Вот именно! Видишь этот узор здесь? Они выжигают крошечные почти незаметные шрамы на твоей коже. Это узор, понимаешь? Думаю, точки образуют контур змеи. Странно...\\n\\nНу, я изучу это подробнее. Спасибо! Вот, возьми это."
"Hey, you've been killing those damned skeletons, right? Got any good, strong femurs? I need a half-dozen for this project I'm working on.": "Эй, ты убивал этих проклятых скелетов, да? Есть хорошие, крепкие бедренные кости? Мне нужно полдюжины для проекта, над которым я работаю."
"Thanks, these will work great for my marionettes!": "Спасибо, они отлично подойдут для моих марионеток!"
"Most myconians have turned away from my counsel. But Poe -- loyal Poe is out there somewhere. I don't really believe Poe has turned away from me. Find Poe and deliver this message-spore. And if Poe needs help, please do whatever is necessary.": "Большинство микониан отвернулись от моих советов. Но По — верный По где-то там. Я не верю, что По отвернулся от меня. Найди По и передай ему это споровое послание. И если По нужна помощь, сделай всё необходимое."
"Poe is alive? Thank you! In return, let me teach you what I can of our language.\n\n<i>[You gain Myconic XP.]</i>": "Поэ жив? Спасибо! В ответ позволь научить тебя тому, что я знаю о нашем языке.\\n\\n<i>[Вы получаете опыт в Миконийском языке.]</i>"
"This message spore is from Mu? I see.\n\nHe understands me well. Tell him that so long as I am alive, I will serve him. But I must keep up appearances with Tidal, or be torn apart!": "Это споро-сообщение от Му? Понятно.\\n\\nОн хорошо меня понимает. Скажи ему, что пока я жив, я буду служить ему. Но я должен сохранять видимость перед Тайдлом, иначе меня разорвут!"
"I thought I saw some spoons lying around here somewhere. They could be anywhere on the island, though. Can you see if you can find a couple? I want to use them in my art.": "Я думал, где-то здесь валяются ложки. Хотя они могут быть где угодно на острове. Можешь поискать пару? Я хочу использовать их в своём искусстве."
"Thanks! These will be the faces of my marionettes! Here, want this pretty stone I found?": "Спасибо! Это будут лица моих марионеток! Вот, хочешь этот красивый камень, который я нашёл?"
"It's been almost a decade since I heard from my daughter. Last I heard she'd taken up with filthy human \"sage\" who promised to teach her secret human knowledge. Ha! Human knowledge! Anyway, the sage traveled here and then contacted Sinda and told her to come find him. I'm sure they're both dead by now. But I want to know. Please bring me proof of Sinda's death.\n\nIn the note, he told her to find his lean-to under a giant boulder. He said he could just hear the sounds of a waterfall.": "Прошло почти десять лет с тех пор, как я слышал о своей дочери. Последний раз я слышал, что она связалась с грязным человеческим «мудрецом», который обещал научить её тайным человеческим знаниям. Ха! Человеческим знаниям! В любом случае, мудрец приехал сюда, а потом связался с Синдой и сказал ей прийти к нему. Я уверен, что их обоих уже нет в живых. Но я хочу знать. Пожалуйста, принеси мне доказательства смерти Синды.\\n\\nВ записке он велел ей найти его шалаш под гигантским валуном. Он сказал, что едва слышит звуки водопада."
"Oh no. This is definitely Sinda's. Her father gave it to her, and I... I... need a moment. Thank you for your help. Here. It is customary to pay coins for services here, correct?": "О нет. Это определённо Синды. Её отец подарил ей это, и мне... мне нужно немного времени. Спасибо за твою помощь. Вот. Здесь принято платить монетами за услуги, верно?"
"Rumor has it that Fire Dust can be found all over the place in Serbule and Eltibule. You are very lucky! It is not so common here in Verta.": "Ходят слухи, что огненную пыль можно найти повсюду в Сербуле и Элтибуле. Тебе очень повезло! У нас в Верте она не так распространена."
"Back beyond the mass of ghouls you'll find even more dangerous undead: wizards! They wield fire and darkness alike.": "За массой вурдалаков вы найдёте ещё более опасных нежити: волшебников! Они владеют огнём и тьмой одинаково."
"I must say I'm impressed. I expected you to come back, of course -- you're obviously not going to be killed by some dumb old undead. But taking out a pile of wizard skeletons is still very impressive!": "Должен сказать, я впечатлён. Я, конечно, ожидал, что ты вернёшься — тебя явно не убьёт какой-то глупый старый нежить. Но уничтожить кучу скелетов волшебников — это всё равно очень впечатляет!"
"I have the worst news. The constabulary spotted a suspicious person yesterday, and as he fled he threw a huge clump of jewelry into the ocean. It's got to be some of my stolen jewelry! Can you fish it out for me? It was down on the docks.": "У меня самые плохие новости. Полиция вчера заметила подозрительного человека, и когда он бежал, он бросил огромную кучу украшений в океан. Это должно быть часть моих украденных украшений! Можешь выловить их для меня? Это было у причалов."
"Well it definitely wasn't this disgusting before it was stolen. I'm going to have to clean everything! But yes, that's some of my stolen jewelry. Thank you so much!": "Ну, до того, как его украли, оно определённо не было таким отвратительным. Придётся всё отмывать! Но да, это некоторые из моих украденных украшений. Большое спасибо!"
"Could you find me some replacement string for my yo-yo? It doesn't work anymore.": "Не мог бы ты найти мне запасную нить для моего йо-йо? Оно больше не работает."
"Thank you! Happy day! Here, let me shower you with human coins!": "Спасибо! Счастливого дня! Вот, позволь осыпать тебя человеческими монетами!"
"Thanks for getting those brains. They apparently confirmed Mr. Blueheart's theory. Have you met him? He's in camp here. Squirrely man, but his heart's in the right place. Anyway, I have another request from him. You know those skulls with wings near the walls? Yeah, kill those and get a sample of their blood.\n\nI know, skulls don't have blood! But he says there's blood in the wings.": "Спасибо, что достал эти мозги. Они, по-видимому, подтвердили теорию мистера Блюбхарта. Ты с ним встречался? Он здесь, в лагере. Чудаковатый человек, но у него доброе сердце. В любом случае, у меня есть для тебя ещё одна просьба от него. Знаешь те черепа с крыльями у стен? Да, убей их и возьми образец их крови.\\n\\nЯ знаю, у черепов нет крови! Но он говорит, что кровь есть в крыльях."
"You got all this blood from the wings of those flapskulls? I guess Mr. Blueheart was right. Good work.\n\nYou know what? I'm sure he has more follow-up requests, and there's really no reason for me to be the go-between. Can you speak with him about next steps?\n\n<i>[New Favor Unlocked with Ferris Blueheart.]</i>": "Ты собрал всю эту кровь с крыльев этих хлопушкоголов? Похоже, мистер Блюбарт был прав. Отличная работа.\\n\\nЗнаешь что? Я уверен, у него есть ещё последующие просьбы, и нет смысла, чтобы я был посредником. Можешь поговорить с ним о дальнейших шагах?\\n\\n<i>[Открыто новое задание от Ферриса Блюбарта.]</i>"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 amazing arrows? I would really appreciate it!": "Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 потрясающих стрел? Я был бы очень признателен!"
"AH yes! That will help a great deal! Now if I can keep the guys from firing them all off when they sit and get drunk in the evenings, maybe we can have some for protection and hunting! Come to think of it, I may need some more arrows later. Come by and check later!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ага, да! Это очень поможет! Если только я смогу удержать ребят от того, чтобы не выстрелить их все, когда они вечером пьют, может, у нас останутся стрелы для защиты и охоты! Кстати, возможно, позже мне понадобится ещё стрел. Заглядывай позже и проверяй!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 Awesome Arrows? I would really appreciate it!": "Приветствие! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 Потрясающих стрел? Я был бы очень признателен!"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 basic arrows? I would really appreciate it!": "Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 простых стрел? Я был бы очень признателен!"
"AH yes! That will help a great deal! Now if I can keep the guys from firing them all off when they sit and get drunk in the evenings, maybe we can have some for protection and hunting! Come to think of it, I may need some more arrows later. Come by and check later!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Ага, да! Это очень поможет! Если только я смогу удержать ребят от того, чтобы не выстрелить их все, когда они вечером пьют, может, у нас останутся стрелы для защиты и охоты! Кстати, возможно, позже мне понадобится ещё стрел. Заглядывай позже и проверяй!\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 expert arrows? I would really appreciate it!": "Приветствие! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 экспертных стрел? Я был бы очень признателен!"
"A poor transmogrified pigeon has been stopping by recently, begging for my help. Well, I can't help him, so I think it's time I put him down. Can you get me some Iocaine Powder? It's the most humane way.": "Бедный превращённый голубь в последнее время навещает меня и умоляет о помощи. Я не могу ему помочь, поэтому думаю, что пора его усыпить. Не мог бы ты достать мне порошок иокаина? Это самый гуманный способ."
"Thank you! Would you like a snack? These are the unpoisoned ones, I promise! Tee hee!": "Спасибо! Хочешь перекусить? Обещаю, эти не отравлены! Хи-хи!"
"I think it'll cheer Sarina up if I make a bouquet of flowers like we used to have back home. But of course we used flowers native to the fey realm...\n\nHey, actually, I know where you can get some! Look for the wooden pillars nearby. They were going to make a new city out there, but then they gave up. But they planted some Flitterbies early on, and those suckers are hard to kill! I bet there's still some out there.": "Думаю, Сарину порадует, если я сделаю букет цветов, как у нас дома. Но, конечно, мы использовали цветы, родные для фейского царства...\\n\\nЭй, на самом деле я знаю, где ты можешь их найти! Ищи деревянные столбы поблизости. Там собирались построить новый город, но потом бросили затею. Зато они рано посадили там флиттерби, и эти твари очень живучие! Уверен, там ещё остались цветы."
"Thanks! Yep, they smell like home. I miss the fey realm sometimes. But mostly just the fairy boys. I definitely miss those. And my friends.\n\n<i>Jesina looks sad for a moment.</i> Oh, right! Here, a reward for your effort! It's not much. I'm sorry.": "Спасибо! Да, они пахнут как дома. Иногда я скучаю по фейскому царству. Но больше всего по фейским мальчикам. Их я точно скучаю. И по друзьям.\\n\\n<i>Джесина на мгновение выглядит грустной.</i> О, точно! Вот награда за твои старания! Это немного. Извини."
"Hi! I am flat exhausted from traveling so much. Everyone else is too! We need some fresh flowers to perk everyone up. Can you make me 10 Dandelion Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\n\n": "Привет! Я совершенно вымотана от постоянных путешествий. Все остальные тоже! Нам нужны свежие цветы, чтобы поднять настроение всем. Ты можешь сделать для меня 10 букетов из одуванчиков? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций."
"Thank you so much! Now just to add a few personal touches and I'll hand these out!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо! Теперь осталось добавить несколько личных штрихов, и я раздам их!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect more fish so there's more to eat. Can you make me 10 of Fisherman's Arrangement #6? I will gladly give you some new ideas to expand your arrangement choices for it.\n\n": "Привет! Я совершенно вымотана от постоянных путешествий. Мне нужно создать несколько композиций, чтобы мотивировать наших собирателей ловить больше рыбы, чтобы было больше еды. Ты можешь сделать для меня 10 Рыбацких композиций №6? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций."
"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect wood for fires and repairs more efficiently. Can you make me 10 Lumberjack Arrangements #3? I will gladly give you some new ideas to expand your arrangement choices for it.\n\n": "Привет! Я совершенно вымотана от постоянных путешествий. Мне нужно создать несколько композиций, чтобы мотивировать наших сборщиков более эффективно собирать древесину для костров и ремонтов. Ты можешь сделать для меня 10 Лесорубских композиций №3? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций."
"Hi! I am flat exhausted from traveling so much. The smell of violets always brings me back to life! Can you make me 10 Violet Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\n\n": "Привет! Я совершенно вымотана от постоянных путешествий. Запах фиалок всегда возвращает меня к жизни! Можешь сделать для меня 10 фиолетовых букетов? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций."
"Thank you so much! I could sit here and sniff these all day long!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Большое спасибо! Я мог бы сидеть здесь и нюхать их целый день!\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I've been experimenting with dyes, but I still haven't really got the hang of it. Ran out of raw materials, though! Could you help? I need some more of those red flowers that grow here. Red asters I think they're called.": "Я экспериментировал с красками, но пока не совсем освоил это дело. Только вот у меня закончились сырьё! Можешь помочь? Мне нужно ещё немного тех красных цветов, что растут здесь. Кажется, их зовут красные астры."
"Thanks. Here's some coin for your trouble!": "Спасибо. Вот немного монет за твои труды!"
"This one's quite simple: I need a bunch of fluxic quartz for some experiments. I don't care where you get it.": "Это довольно просто: мне нужно много флюксического кварца для некоторых экспериментов. Мне всё равно, где ты его достанешь."
"And no questions asked. You are a consumate professional. Thank you.": "Без лишних вопросов. Вы настоящий профессионал. Спасибо."
"You would seek even greater knowledge? Then show your worth. I demand an even greater offering of blood!": "Ты хочешь обрести ещё больше знаний? Тогда докажи свою ценность. Я требую ещё большее приношение крови!"
"Yes! Perhaps you are fit to become my scion! Perhaps.": "Да! Возможно, ты достоин стать моим наследником! Возможно."
"A few of the crystals that you brought to me have interesting properties! I require further samples of these to better understand them.": "Некоторые из кристаллов, которые вы мне принесли, обладают интересными свойствами! Мне нужны дополнительные образцы, чтобы лучше их изучить."
"Excellent geologizing. I'll examine these in further detail when I'm back home.": "Отличная геологическая работа. Я изучу это подробнее, когда вернусь домой."
"I've been teaching the foxes how to read by sounding out the Human language symbols. I don't think they're ready for writing yet -- truth be told I have a hard time with writing myself! But it's time they became familiar with paper and ink. We'll need a LOT of both.": "Я учу лис читать, произнося символы человеческого языка. Думаю, они ещё не готовы к письму — если честно, мне самому с письмом трудно! Но пришло время им познакомиться с бумагой и чернилами. Нам понадобится ОЧЕНЬ много и того, и другого."
"Wonderful, thank you!\n\nAs I'm sure you know, it's very hard to write as an animal. It takes a lot of practice! And the first lesson is getting used to having ink on your paws, because it always happens no matter how careful you are. We'll make paw-print paintings first, then eventually move on to drawing with the mouth-brush technique.": "Замечательно, спасибо!\\n\\nКак ты, наверное, знаешь, очень трудно писать, будучи животным. Это требует много практики! И первый урок — привыкнуть к тому, что на лапах всегда оказывается чернила, как бы аккуратно ты ни старался. Сначала мы будем делать картины с отпечатками лап, а потом постепенно перейдём к рисованию с помощью кисточки во рту."
"We're having some trouble with the \"drawing with ink\" lessons: Rubi refuses to get her paws inked up. I think I need something less messy to help them build paw-mouth dexterity. Help me get the raw materials for a little sewing project.": "У нас возникли проблемы с уроками «рисования тушью»: Руби отказывается пачкать лапы чернилами. Думаю, мне нужно что-то менее грязное, чтобы помочь им развить ловкость лап и рта. Помоги мне достать материалы для небольшого швейного проекта."
"Very good work. This will take a while, I expect! And I'll have bandages ready, because somebody's lip is going to get pierced by a needle, I just know it. But they'll learn incredibly fast, you'll see.": "Отличная работа. Это займет некоторое время, как я и ожидал! И я приготовлю бинты, потому что чья-то губа обязательно проколется иглой, я это точно знаю. Но они будут учиться невероятно быстро, увидишь."
"You freed them? Great! That was a nice thing to do. Twenty thousand years of torture is just really a lot, you know?": "Ты освободил их? Отлично! Это было очень добро с твоей стороны. Двадцать тысяч лет мучений — это действительно очень много, знаешь ли?"
"My stash of cooking herbs wasn't found by the orc invaders! But sadly I am now out of basil, and I need that for many of the meals I prepare. I can tell Tryaka is less happy with my cooking, but what can I do?!": "Мой запас кулинарных трав не нашли орки-захватчики! Но, к сожалению, у меня теперь нет базилика, а он нужен для многих блюд, которые я готовлю. Я вижу, что Тряка меньше радуется моей кухне, но что я могу поделать?!"
"Oh! Fresh basil! You found some!! Here. You are too kind!": "О! Свежий базилик! Ты нашёл немного!! Вот. Ты слишком добр!"
"I wish I had fresh basil...": "Хотелось бы мне свежего базилика..."
"Can you run over to Kelim's little garden -- it's over in the corner of town -- and see if he's going to have more carrots any time in the next year? He just keeps growing peppers!\n\nYou know what, don't bother talking to the lout. Just get me carrots!": "Можешь сбегать в маленький сад Келима — он в углу города — и узнать, собирается ли он выращивать морковь в ближайший год? Он всё время выращивает только перец!\\n\\nЗнаешь что, не утруждай себя разговором с этим болваном. Просто принеси мне морковь!"
"Yes! Carrots! Kelim keeps saying they're super difficult to grow, but that doesn't make any sense, does it? They can't be any harder to grow than, say, a potato. Anyway, thanks! Here, take these. A dozen potatoes for a half-dozen carrots seems like a good trade, right?": "Да! Морковка! Келим всё время говорит, что их очень трудно выращивать, но это же не имеет смысла, правда? Их не может быть сложнее выращивать, чем, скажем, картофель. В любом случае, спасибо! Вот, возьми это. Дюжина картофелин за полдюжины морковок — неплохой обмен, правда?"
"Hey, you got any fresh grass on you? Daisy says she needs it to make bounceweed for me. But the grass I got is all scraggly. It's hard to find nice grass on a beach!": "Эй, у тебя есть свежая трава? Дейзи говорит, что ей нужна она, чтобы сделать для меня прыгающую траву. Но у меня трава вся редкая. На пляже трудно найти хорошую траву!"
"Thanks, you're a life saver! Here, you can have my last dose since Daisy's gonna make me some more now.": "Спасибо, ты спас меня! Вот, можешь взять мою последнюю дозу, ведь Дейзи сейчас сделает мне ещё."
"I'm low on hay again. Again! It's a constant battle to keep these animals fed. Why don't you get me some fresh grass?": "У меня снова мало сена. Снова! Это постоянная борьба — кормить этих животных. Почему бы тебе не принести мне свежей травы?"
"Thanks. This will keep these cows happy for a few more days. Everybody likes the milk but nobody likes feeding the cows!\n\nSpeaking of which, here's something for your trouble.": "Спасибо. Это будет радовать этих коров ещё несколько дней. Всем нравится молоко, но никто не любит кормить коров!\\n\\nКстати, вот что-то за твои труды."
"My experiments require fresh hematic ichor. It can be hard to find, but just keep drinking people and... you'll find it eventually. Grasuul will know the best places to look today.": "Мои эксперименты требуют свежего гемического экстракта. Его трудно найти, но просто продолжай пить людей, и... в конце концов найдёшь. Грасуул сегодня знает лучшие места для поиска."
"Good, it hasn't gotten too... crusty yet.": "Хорошо, она ещё не слишком... засохла."
"I crave fresh lifeblood! But I am too... Busy to obtain it myself. Go and fetch it for me. Speak with Grasuul, he seems to... Know where to find the easiest lifeblood.": "Я жажду свежей живой крови! Но я слишком... занят, чтобы добыть её сам. Иди и принеси её мне. Поговори с Грасуулом, он, кажется, знает, где найти самую лёгкую живую кровь."
"Give!\n\n<i>[Truxartis drinks the lifeblood.]</i>\n\nAh. Now I can continue my work unhindered by thirst.": "Отдай!\\n\\n<i>[Труксартис пьёт жизненную силу.]</i>\\n\\nАга. Теперь я могу продолжить свою работу, не испытывая жажды."
"There you are! I've been waiting so long! Let me have the orcish onion soup. And it had better be fresh!": "Вот ты где! Я так долго ждал! Дай мне орочий луковый суп. И он должен быть свежим!"
"Hmm, something's not quite right. Are you sure you used fresh onions?! Well, it's pretty good. Thank you.": "Хмм, что-то не совсем так. Ты уверен, что использовал свежий лук?! Ну, в целом неплохо. Спасибо."
"Where is my orcish onion soup?": "Где мой орочий луковый суп?"
"I don't get much work in animal husbandry any more, but I got an order from an old customer, and I would love to fill it! But what he needs is an aphrodesiac for his pet bees! Of all the weird pets, bees are way up there. I do know how to make what he needs... I just need some high-quality tallow. Could I ask you to render some for me?": "Я больше не часто занимаюсь животноводством, но получил заказ от старого клиента и очень хочу его выполнить! Но ему нужен афродизиак для его домашних пчёл! Из всех странных питомцев пчёлы — одни из самых необычных. Я знаю, как сделать то, что ему нужно... Мне просто нужен жир высокого качества. Не мог бы ты переплавить немного для меня?"
"Thank you so much! I'm so happy I can fulfill Elwynel's order. If you see him in Statehelm, ask about his bees!": "Большое спасибо! Я так рад, что могу выполнить заказ Элвинеля. Если увидишь его в Стейтхелме, спроси про его пчёл!"
"Okay now I've got a hard one for ya. Daisy's working on some new thing and she needs some troll flesh. But I'm feeling pretty tired right now. Can you get it for me?": "Ладно, теперь у меня для тебя сложное задание. Дейзи работает над чем-то новым, и ей нужна троллья плоть. Но я сейчас очень устал. Можешь достать её для меня?"
"Yeah, that's the stuff. It's super gross! Here, take this so you can relax. You deserve it!": "Да, вот оно. Это ужасно противно! Вот, возьми это, чтобы расслабиться. Ты заслужил!"
"See the giant mushrooms off in the distance? Yeah, those are new. Not even a year old, in fact, and whatever it means, it's definitely bad.\n\nBut you look like the sort who will wander over there anyway. If you do, can you pick some false agaric for me?\n\nYou can find false agaric all around Povus, so if you <i>aren't</i> brave, just look elsewhere.": "Видишь гигантские грибы вдали? Да, они новые. Им ещё нет и года, и что бы это ни значило, это определённо плохо.\\n\\nНо ты выглядишь как тот, кто всё равно туда пойдёт. Если пойдёшь, можешь собрать для меня ложный агарик?\\n\\nЛожный агарик можно найти по всему Повусу, так что если ты <i>не</i> храбр, просто ищи в другом месте."
"These are fresh and deadly! Perfect, thank you! I need these for my mushroom farming.": "Они свежие и смертоносные! Идеально, спасибо! Они нужны мне для выращивания грибов."
"I try to keep my shop stocked with the essentials... but what IS an essential, anyway? I don't personally need much, so I've been stocking a bit of everything, in case it's essential to somebody else. Despite this, sales are... not good.\n\nBut I have a lead on a sale: Crelpin asked if I had any fresh pears, and I realized I didn't! Mine are old! If you're headed out of town, please pick me up some really fresh ones. And don't eat them!": "Я стараюсь держать в магазине самые необходимые вещи... но что вообще считается необходимым? Лично мне нужно немного, поэтому я запасаюсь понемногу всего, на случай, если это необходимо кому-то другому. Несмотря на это, продажи... оставляют желать лучшего.\\n\\nНо у меня есть зацепка для продажи: Крелпин спросил, есть ли у меня свежие груши, и я поняла, что у меня их нет! Мои старые! Если ты собираешься покинуть город, пожалуйста, принеси мне действительно свежих. И не ешь их!"
"Perfect! Except Solgribue just told me he doesn't need them anymore.\n\nIn retrospect I should have brokered some sort of business arrangement BEFORE I asked you to get these... but I'll take the blame, it's on me. Here's a fair payment.": "Отлично! Только Солгрибу только что сказал, что ему они больше не нужны.\\n\\nОглядываясь назад, мне следовало договориться о каком-то деловом соглашении ПРЕЖДЕ чем просить тебя достать их... но я беру вину на себя. Вот справедливая оплата."
"I've stopped accepting special orders for fresh body parts. It's just too existentially painful. But orders for fresh mushrooms should be fine!\n\nI need some extremely fresh Pixie's Parasols. I'd pick them myself, but... well, I'm scared of pixies.": "Я перестала принимать особые заказы на свежие части тел. Это слишком экзистенциально болезненно. Но заказы на свежие грибы должны быть в порядке!\\\\n\\\\nМне нужны очень свежие зонтики пикси. Я бы собрала их сама, но... ну, я боюсь пикси."
"Thank you for the fresh mushrooms! You know, I asked my buyer why she needed super fresh mushrooms particularly, since mushrooms last a really long time in storage. You know what she said? \"I don't eat anything that's been dead for more than a week.\" Isn't that just the height of entitlement? I mean, for an immortal. Oops... not that she's immortal. Might be, might not be... okay fine, it's Midge. And she has brain damage, so don't you be mean to her!": "Спасибо за свежие грибы! Знаешь, я спросил у своей покупательницы, зачем ей нужны именно супер свежие грибы, ведь грибы долго хранятся. И знаешь, что она ответила? «Я не ем ничего, что умерло больше недели назад». Разве это не верх избалованности? Особенно для бессмертной. Ой... не то чтобы она бессмертна. Может быть, а может и нет... Ладно, это Мидж. И у неё повреждён мозг, так что не будь с ней жесток!"
"Psst... thanks for your help getting those fresh bee stingers. I've got another order for really fresh butterfly wings. I'd collect them myself, but I'm very fluent in butterfly speech, and I just can't handle their dying screams right now...": "Псс... спасибо за помощь с добычей свежих пчелиных жвал. У меня есть ещё заказ на действительно свежие крылья бабочек. Я бы собрала их сама, но я очень хорошо понимаю бабочкин язык, и сейчас я просто не могу вытерпеть их умирающие крики..."
"Aw... poor butterflies! I feel terrible about this special order. But the store needs an income stream, or it can't be a part of this community! The needs of the many etcetera! Forgive me? ... Please?\n\nWait, who am I asking forgiveness from?! You're the monster who killed these butterflies in the first place! You should be ashamed!\n\n... Sorry. Here's your blood money.": "Ох... бедные бабочки! Мне так жаль из-за этого особого заказа. Но магазину нужен доход, иначе он не сможет быть частью этого сообщества! Интересы большинства и так далее! Прости меня? ... Пожалуйста?\\n\\nСтоп, у кого я прошу прощения?! Ты — монстр, который убил этих бабочек в первую очередь! Тебе должно быть стыдно!\\n\\n... Извини. Вот твои деньги за кровь."
"Don't tell Crelpin, but I've got a special order for some bee stingers. The only catch is that they have to be fresh! A certain troll will pay well for them, and I'll give you half. Deal?": "Не говори Крелпину, но у меня есть особый заказ на пчелиные жала. Единственное условие — они должны быть свежими! Один тролль хорошо заплатит за них, а я дам тебе половину. Согласен?"
"Oh my, they stink horribly! Did the bees scream when they died? No, don't tell me...\n\nThis is... dreadful. What have I done?! I hate having stuff like this in my shop. But I guess it won't be for long. Here's your cut of the money!": "Ох, они ужасно воняют! Пчёлы кричали, когда умирали? Нет, не говори...\\n\\nЭто... ужасно. Что же я натворил?! Ненавижу, когда в моём магазине появляется такое. Но, думаю, это ненадолго. Вот твоя доля денег!"
"Now let's focus on common Ice Magic deficiencies. Frostbite is an overlooked but very valuable tool in your aresenal. Use it on some tougher enemies.\n\nReturn to the metal dodecahedron outside. Stand in it and say 'Ossugazak 3'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>": "Теперь давай сосредоточимся на распространённых недостатках Ледяной магии. Обморожение — недооценённый, но очень ценный инструмент в твоём арсенале. Используй его на более сильных врагах.\\n\\nВернись к металлическому додекаэдру снаружи. Встань в него и скажи «Оссугазак 3». Это активирует тренировочную программу. Будь готов.\\n\\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Your work is adequate. ... Honestly, it's quite a bit more than adequate, I'm forced to admit.": "Твоя работа приемлема. ... Честно говоря, приходится признать, что она гораздо лучше приемлемой."
"Now defeat enemies with Frostbite.": "Теперь побеждай врагов с помощью Обморожения."
"Come to think of it, the area that The Perforator inhabited used to belong to a native rhino that folks affectionately called The Puncturer. It is possible that The Puncturer and The Perforator switched places, and by slaying both of them it will un-transpose them.\n\nThere is only one way to find out for sure. You must journey to the Fae Realm, locate The Puncturer, and kill it. Only then will we know if it returns to this realm.": "Если задуматься, территория, на которой обитал Прокалыватель, раньше принадлежала местному носорогу, которого люди ласково называли Прокалывателем. Возможно, Прокалыватель и Прокалыватель поменялись местами, и убив обоих, мы сможем вернуть их на места.\\n\\nЕсть только один способ узнать наверняка. Ты должен отправиться в Царство Фей, найти Прокалывателя и убить его. Только тогда мы узнаем, вернётся ли он в этот мир."
"Hm, so the two rhinos did not switch places, and now both of them are simply dead? <i>[Furlak shrugs.]</i> At least we tried.": "Хм, значит два носорога не поменялись местами, и теперь оба просто мертвы? <i>[Фурлак пожимает плечами.]</i> По крайней мере, мы попытались."
"One thing I was known for before being ousted from the army was my ability to seek out and destroy creatures that should not be here. I may no longer possess the ability to destroy them, but I can still seek them out...\n\nThat's why you must believe me when I say there is a non-native abomination within our midst. I've heard some folks calling it 'The Perforator', but whatever its name is it must be destroyed lest it open the way for more of its kind to infiltrate the desert.": "Раньше меня знали за умение находить и уничтожать существ, которым здесь не место, пока меня не выгнали из армии. Теперь у меня, возможно, нет силы их уничтожать, но я всё ещё могу их искать...\\n\\nВот почему ты должен поверить мне, когда я говорю, что среди нас есть чужеродное уродство. Я слышал, как некоторые называют его «Пронзателем», но как бы его ни звали, его нужно уничтожить, иначе оно откроет путь для проникновения в пустыню других таких же."
"<i>[Furlak sniffs the air]</i>\n\nWonderful! The stench of that foul creature is already lessened. You have done well today. I hope this will be a lesson to other potential invaders that we will not tolerate their kind here.": "<i>[Фурлак принюхивается]</i>\\n\\nПрекрасно! Запах этого отвратительного существа уже уменьшился. Ты сегодня хорошо поработал. Надеюсь, это станет уроком для других потенциальных захватчиков, что мы не потерпим их здесь."
"A bunch of idiots got into another fight here yesterday. I think they all lived, but not all of my furniture did. I've cleaned up all the mess and replaced what I could, but we're still low on chairs. You wouldn't happen to be a carpenter, would you?": "Вчера здесь снова устроила драку кучка идиотов. Думаю, все выжили, но не вся моя мебель. Я убрал весь беспорядок и заменил то, что смог, но стульев всё ещё мало. Ты случайно не плотник?"
"Thank you! You're too kind. Would you like some of my famous travel rations? Here!": "Спасибо! Ты слишком добр. Хочешь немного моих знаменитых походных пайков? Вот!"
"I have heard of a delicacy found only among the indigenous people of Kur Mountains. I simply must try it right away!": "Я слышал о деликатесе, который можно найти только среди коренного населения гор Кур. Я просто обязан попробовать его прямо сейчас!"
"It's just so boring here! I figured maybe I could get a card game going. But I need some supplies! Can you get me some game chips? Whatever denomination doesn't matter. I just need a handful of them to get the games started!": "Здесь так скучно! Я подумал, может, устроим карточную игру. Но мне нужны принадлежности! Ты можешь достать мне игровые фишки? Номинал не важен. Мне просто нужна горсть, чтобы начать игры!"
"Ah hahaha perfect! I'm gonna make a killing with these! Thanks! Hey, you want this dumb thing? Take it!": "Ах, ха-ха-ха, идеально! Я на этом здорово заработаю! Спасибо! Эй, хочешь эту глупую штуку? Забирай!"
"You dissipated the gargoyles' toxic cloud and repelled the invasion!": "Вы рассеяли ядовитое облако гаргулий и отбили нападение!"
"I have a lot of friends in the field and I'm afraid for them. We crossbowmen are seriously outclassed against the gargoyles in particular, and I fear an attack from them soon.\n\nIf you were to go take care of some gargoyles, I could make sure some of the discretionary fund ends up in your pocket.": "У меня много друзей на поле, и я боюсь за них. Мы, арбалетчики, особенно сильно уступаем гаргульям, и я опасаюсь скорой атаки с их стороны.\\n\\nЕсли ты сможешь разобраться с несколькими гаргульями, я позабочусь, чтобы часть резервного фонда оказалась у тебя в кармане."
"That's impressive work. I appreciate it.": "Впечатляющая работа. Я ценю это."
"I'm surrounded by these stupid Winterprize gems in this nexus! So ugly! I wish I had some pretty gems. Garnets are my favorite!": "Меня окружают эти глупые зимние призовые драгоценные камни в этом узле! Такие уродливые! Хотелось бы, чтобы у меня были красивые камни. Гранаты — мои любимые!"
"Wow! Where'd you find garnets around here? I hope you didn't go to a lot of trouble for me! Here are some of my prettier gems in exchange!": "Вау! Где ты здесь нашёл гранаты? Надеюсь, ты не слишком постарался ради меня! Вот несколько моих красивых драгоценных камней в обмен!"
"You again? I need more mushrooms! MORE!": "Ты опять? Мне нужно больше грибов! БОЛЬШЕ!"
"Thanks, pal! Here, take this.": "Спасибо, дружище! Вот, возьми это."
"I'm still reading the book you brought me, but I have good news: the big crystal inside this machine isn't broken! Because if it was broken, the magic would have leaked out and killed us all months ago.\n\nThe main crystal isn't working because the little connector gear is broken. I think some gears and parts fell out while we were fleeing our old headquarters. But these parts don't seem all that exotic... maybe we can find replacements.\n\nLet me show you what I need: a gear that looks like this, some springs, and some of these weird twist-nails. Good luck!": "Я всё ещё читаю книгу, которую ты мне принес, но у меня хорошие новости: большой кристалл внутри этой машины не сломан! Потому что если бы он был сломан, магия вытекла бы и убила нас всех ещё несколько месяцев назад.\\n\\nГлавный кристалл не работает, потому что сломалась маленькая соединительная шестерёнка. Думаю, некоторые шестерёнки и детали выпали, когда мы бежали из нашего старого штаба. Но эти детали не кажутся чем-то экзотическим... возможно, мы сможем найти замену.\\n\\nПозволь показать, что мне нужно: шестерёнка, похожая на эту, несколько пружин и несколько этих странных закрученных гвоздей. Удачи!"
"I appreciate the hard work! But... I have bad news. I've been reading this book some more, and I don't think replacing the gear is enough. It's missing the pendulum weight mechanism, too! But these parts are a start. Thanks!": "Я ценю твою усердную работу! Но... у меня плохие новости. Я продолжал читать эту книгу и думаю, что замены шестерёнок недостаточно. Там ещё отсутствует механизм маятникового груза! Но эти детали — уже начало. Спасибо!"
"I found a most interesting item yesterday, and entirely by chance. The tempestuous young Rakshasa that sells dyes -- I forget her name -- had a scroll for sale. This scroll is covered in geometric lines that closely resemble the area's ley lines. It was quite warm to the touch, too. It's quite fascinating. I assumed it was the work of some sage, but she said they're very common in her home city and that many people there can make them. If you go to Rahu, see if you can find some for me.": "Вчера я случайно нашёл очень интересный предмет. Буйная молодая ракшаса, которая продаёт краски — я забыл её имя — продавала свиток. Этот свиток покрыт геометрическими линиями, очень похожими на лей-линии этого района. Он был довольно тёплым на ощупь. Это очень увлекательно. Я думал, что это работа какого-то мудреца, но она сказала, что такие свитки очень распространены в её родном городе и многие там умеют их делать. Если отправишься в Раху, попробуй найти для меня несколько таких."
"Thank you for these. I will study them. Oh, I spoke with Firaki some more -- that's the vendor I mentioned -- and she told me the most depressing thing: the Rakshasa have handed down the knowledge of how to make these scrolls, but they don't remember what their purpose is. They use them as <i>heating pads</i> on cold nights. Isn't that the saddest thing?\n\nWell, I will figure out their purpose, don't you worry about that!": "Спасибо за это. Я изучу их. О, я ещё поговорил с Фираки — той торговкой, о которой я упоминал — и она рассказала мне самую печальную вещь: ракшасы передали знание о том, как создавать эти свитки, но не помнят, для чего они нужны. Они используют их как <i>грелки</i> в холодные ночи. Разве это не самая грустная вещь?\\n\\nНу, я разберусь с их назначением, не волнуйся об этом!"
"Hey friend, do me a favor and get me a fresh fish, would ya? Wait, strike that, make it 100 fresh fish.": "Эй, друг, сделай одолжение и принеси мне свежую рыбу, ладно? Нет, передумал, принеси 100 свежих рыб."
"You got them? Great! Keep 'em, I don't want fish. I don't remember why I asked for them, actually. But here's something spicy for your trouble.": "Ты их принёс? Отлично! Оставь себе, рыбу я не хочу. Честно говоря, я уже не помню, зачем просил их. Но вот что-то острое за твои труды."
"There's a lot of tigers around here! The sewer system's a mess of poorly-planned portals, and personally, I think the tigers have been pouring out of one of them! Sir Coth is too incompetent to deal with the menace, and I'm too busy. Can you do it?\n\nI need some proof that they're being handled. Can you get me a couple of cat eyeballs? Intact ones are pretty hard to find, but if you kill enough tigers I'm sure you'll get them.": "Здесь полно тигров! Канализационная система — это путаница из плохо спланированных порталов, и, по моему мнению, тигры вываливаются из одного из них! Сэр Кот слишком некомпетентен, чтобы справиться с угрозой, а я слишком занят. Ты можешь с этим разобраться?\\n\\nМне нужны доказательства, что угроза устранена. Можешь добыть пару глаз тигра? Целые глаза найти довольно сложно, но если убьёшь достаточно тигров, уверен, что получишь их."
"Great! I mean, these are incredibly disgusting, but great, thanks for doing that! Now let me teach you how to handle a saber like a real elf!": "Отлично! То есть, они невероятно отвратительные, но всё равно отлично, спасибо, что сделал это! Теперь позволь научить тебя обращаться с саблей, как настоящий эльф!"
"Hey, if you're headed out into the wilds, mind picking any cotton you see for me?": "Эй, если ты собираешься в дикую местность, не мог бы собрать для меня весь хлопок, который увидишь?"
"I need a pig snout. A really good one. You need to be a pretty good skinner in order to get one, though, and I was never very good at skinning.": "Мне нужен свиной пятачок. Очень хороший. Но чтобы его добыть, нужно быть довольно умелым снящиком шкур, а я никогда не был хорош в этом."
"Hey, a pig snout! Thank you! It's an ingredient in a rare ink I'm making.": "Эй, свиной пятачок! Спасибо! Это ингредиент для редких чернил, которые я делаю."
"The whole Warden Alert system is down. The main crystal's been down for months, but now both backup crystals are down, too! I don't know how any of this works, so I'm just going to try taking everything apart, cleaning it, and putting it back together. Unfortunately Cassie spilled my last jar of cleaning acid, which then melted most of my cleaning supplies. Can you get us some new stuff?": "Вся система оповещения Хранителя не работает. Главный кристалл не функционирует уже несколько месяцев, а теперь вышли из строя и оба запасных кристалла! Я не понимаю, как всё это работает, поэтому собираюсь просто разобрать всё, почистить и собрать обратно. К сожалению, Кэсси пролила мою последнюю банку чистящего кислоты, которая расплавила большую часть моих чистящих средств. Можешь принести нам новые материалы?"
"Oh good, you're back. Now I get to clean delicate machinery while holding an acid-soaked rag in my mouth! Have I mentioned how irritating it is that I can't just bring in an expert? I know some very discreet elves who could get everything working again within a day! But noooo, we can't have elves in our sacred grotto... even if it means animals die! Milton seriously said that to me, if you can believe it.\n\nSorry, I'm just talking while I work. Ignore me... hand me that spring? Okay. Look, it's already blinking! One of the backups is on!\n\nLet's see if we have a signal... it's working! Here, I'm going to stick this crystal in your ear for a second. It won't hurt. Okay, you're attuned. Now you should be able to listen to the Warden Alerts! Give it a try. <i>[This recipe can be found under the 'Lore' skill in the recipe window.]</i>": "О, хорошо, что ты вернулся. Теперь мне предстоит чистить деликатный механизм, держа во рту тряпку, пропитанную кислотой! Я уже говорил, как раздражает, что я не могу просто пригласить эксперта? Я знаю очень скрытных эльфов, которые могли бы всё починить за день! Но нет, у нас не может быть эльфов в нашей священной пещере... даже если из-за этого гибнут животные! Милтон серьёзно сказал мне это, если можешь поверить.\\n\\nИзвини, я просто разговариваю, пока работаю. Не обращай внимания... передай мне эту пружину? Хорошо. Смотри, она уже мигает! Один из запасных кристаллов включён!\\n\\nДавай проверим сигнал... работает! Вот, я сейчас вставлю этот кристалл тебе в ухо на секунду. Это не больно. Отлично, ты настроен. Теперь ты сможешь слушать оповещения Хранителя! Попробуй. <i>[Этот рецепт можно найти в окне рецептов в разделе «Знания».]</i>"
"Sona's recovering well after her incident. Mox helped a lot. But she's still walking with a slight limp. Mox says he can make something for that, but he needs ghost puke. So if you find some, save it.": "Сона хорошо восстанавливается после инцидента. Мокс очень помог. Но она всё ещё ходит с лёгкой хромотой. Мокс говорит, что может сделать что-то для этого, но ему нужна призрачная рвота. Так что если найдёшь немного, сохрани."
"This is the stuff. Ugh, it stinks. Well, I'll get it to Mox. Thanks.": "Вот это самое. Фу, воняет. Ладно, я доставлю это Моксу. Спасибо."
"If you're handy with a weapon, we could use help with the incessant waves of ghouls. Be careful -- they can overwhelm you!": "Если ты умеешь обращаться с оружием, нам нужна помощь с непрекращающимися волнами вурдалаков. Будь осторожен — они могут тебя одолеть!"
"You have my thanks. A temporary reprieve is still a reprieve.": "Ты имеешь мою благодарность. Временная передышка — это всё же передышка."
"I must know if those gigantic mushrooms off in the distance are edible. I know that \"Mushroom Jack\" fellow said they were poisonous, but he's an Elf. I want to try them anyway. But obviously I can't eat the giant ones if they're as hard as a rock... maybe you can find a nearby offshoot that's more edible?": "Я должен узнать, съедобны ли те гигантские грибы вдали. Я знаю, что этот парень «Грибной Джек» сказал, что они ядовиты, но он эльф. Я всё равно хочу их попробовать. Но, конечно, я не могу есть гигантские, если они твёрдые, как камень... может, ты найдёшь поблизости какой-нибудь побег, который будет более съедобным?"
"Thank you... oh. That really stinks! I'll analyze it to see if there's any redeeming qualities, but I doubt it. Drat it!\n\nThank you for your hard work, though. Let me remunerate you.": "Спасибо... ой. Это действительно воняет! Я проанализирую это, чтобы узнать, есть ли какие-то положительные качества, но сомневаюсь. Чёрт возьми!\\n\\nСпасибо за твою усердную работу. Позволь вознаградить тебя."
"My scrying has shown me the locations of an invasive species of oyster. Please destroy them. Their contents are irrelevant to me, as long as the oysters are killed! Here are my notes on their locations; if you have some skill in objective orienteering I'm sure you'll find them easily enough. You know how to pry oysters open, I hope?": "Моё гадание показало мне местоположения инвазивного вида устриц. Пожалуйста, уничтожьте их. Содержимое для меня не важно, лишь бы устриц убили! Вот мои заметки о их местах; если у вас есть хоть какие-то навыки ориентирования по целям, вы наверняка легко их найдёте. Надеюсь, вы умеете открывать устриц?"
"Very good. Those oysters are part of a vile ranalon plot. They're an invasive species that would soon kill off regular oysters, which would soon kill our islands' delicate food chains.\n\nYou've done well.": "Очень хорошо. Эти устрицы — часть гнусного заговора раналонов. Это инвазивный вид, который скоро уничтожит обычных устриц, а те, в свою очередь, разрушат хрупкие пищевые цепочки наших островов.\\n\\nТы справился отлично."
"Have you met Marrowchomp? Oh, hmm, actually, you should probably keep your distance from him: he can be ornery. But he's an amazing cook! And he's told me about something called barbecue, which I simply must try. Unfortunately it requires a lot of meat. A LOT of meat! But it doesn't really matter what kind, as apparently he can barbecue anything! Just make sure there's a lot of it.": "Ты встречал Марроучомпа? Ох, хм, на самом деле тебе лучше держаться от него подальше: он может быть сварливым. Но он потрясающий повар! И он рассказал мне о чем-то, что называется барбекю, что я просто обязана попробовать. К сожалению, для этого нужно много мяса. ОЧЕНЬ много мяса! Но не важно, какого именно, потому что, по его словам, он может приготовить на барбекю что угодно! Просто убедись, что его много."
"That is an impressive amount of meat! It looks delicious already! But I'll keep my appetite. I'm so excited to try barbecue! Thank you! And don't worry: if Marrowchomp refuses to serve you, I'll slip some to you when he's not looking. Here's something to tide you over.": "Это впечатляющее количество мяса! Оно уже выглядит очень аппетитно! Но я сдержу аппетит. Я так рад попробовать барбекю! Спасибо! И не волнуйся: если Марроучомп откажется тебе подавать, я тайком передам тебе немного, когда он не смотрит. Вот что-нибудь, чтобы тебя подкрепить."
"Finally! I did the summoning ritual hours ago! Why do you Wardens even bother with a summoning ritual if you're just going to ignore me for HOURS while terrible things happen?!\n\nIt's the gnashers! They usually keep their distance and stay northwest of here, but now they've been spreading towards us. They killed a bull this morning! It was a bit north of here. And... they ate him! They ATE him! And nobody in that castle over there cares one bit! Please hurry. I know I'm delicious. It's only a matter of time!": "Наконец-то! Я провёл ритуал призыва несколько часов назад! Зачем вам, Хранители, вообще нужен ритуал призыва, если вы собираетесь игнорировать меня ЧАСАМИ, пока происходят ужасные вещи?!\\n\\nЭто гнаши! Обычно они держатся на расстоянии и остаются к северо-западу отсюда, но теперь они распространяются к нам. Сегодня утром они убили быка! Это было немного севернее отсюда. И... они его съели! Они СЪЕЛИ его! И никому в том замке там совсем нет дела! Пожалуйста, поторопитесь. Я знаю, что я вкусный. Это лишь вопрос времени!"
"Are the gnashers thwarted? And I mean murder-thwarted, not that sad kind of thwarting where they come back! They're gone, right?\n\nOh good. That was scary! Thanks for finally answering the summons. Now get out of here, you're blowing my cover!": "Гнэшеры побеждены? И я имею в виду именно убитых, а не тех, кого просто остановили, чтобы они вернулись! Их больше нет, верно?\\n\\nОтлично. Это было страшно! Спасибо, что наконец откликнулся на вызов. А теперь уходи, ты выдаёшь меня!"
"I need a favor from a goblin, and for that I need some goblin ale. A keg of it should be enough.": "Мне нужна услуга от гоблина, и для этого мне нужно немного гоблинского эля. Одной бочки будет достаточно."
"Thank you. I've found the beer on this continent to be vile, but we Aktaari are not fond of beer anyway, so I am trying not to judge beer-makers too harshly! I hope this is appropriate compensation.": "Спасибо. Я нашёл пиво на этом континенте отвратительным, но мы, актаари, и так не любим пиво, так что я стараюсь не судить пивоваров слишком строго! Надеюсь, это подходящая компенсация."
"I thought goblinkind eradicated the wily cave hippo years ago, but they've been hiding here! No doubt the ratkin are breeding them in a scheme to flood our waterways. Destroy the wily water-beasts before they fill our waterways and rob good, kind-hearted goblins of crucial custom!": "Я думал, что гоблины уничтожили хитрых пещерных бегемотов много лет назад, но они прячутся здесь! Несомненно, крысолюди разводят их в заговоре, чтобы затопить наши водные пути. Уничтожьте хитрых водяных зверей, прежде чем они заполнят наши водные пути и лишат добросердечных гоблинов важного дохода!"
"You struck a blow for goblinkind. Unexpected.": "Ты нанёс удар в защиту гоблинов. Неожиданно."
"These ratkin are gorging themselves on snail meat! Unacceptable! Desnailitize them immediately!": "Эти крысолюди объедаются мясом улиток! Недопустимо! Немедленно избавьтесь от них!"
"You struck a blow for goblinkind. Reasonable.": "Ты нанёс удар в защиту гоблинов. Разумно."
"Those creepy red-eyed rats must be a source of their power. Destroy them! No mercy!": "Эти жуткие красноглазые крысы, должно быть, источник их силы. Уничтожьте их! Без пощады!"
"You struck a blow for goblinkind. Adequate.": "Ты нанёс удар в защиту гоблинов. Приемлемо."
"The enemy lounges and relaxes as if they were not at war! Fix it! By murdering every lazy ratkin you see!": "Враг бездельничает и расслабляется, словно не в состоянии войны! Исправьте это! Убивайте каждого ленивого крысолюда, которого встретите!"
"You struck a blow for goblinkind. Nice.": "Ты нанёс удар в защиту гоблинов. Молодец."
"We've lost the element of surprise! Time to reclaim that surprise by killing their necromancers when they're resting. Fools! Hahahaha!": "Мы потеряли элемент неожиданности! Пора вернуть его, убивая их некромантов, когда они отдыхают. Глупцы! Хахахаха!"
"You struck a blow for goblinkind. Capital.": "Ты нанёс удар в защиту гоблинов. Отлично."
"Strike their means of production! Kill the ratkin fishermen! They will surely starve!": "Ударьте по их средствам производства! Убейте крысолюдских рыбаков! Они обязательно умрут с голоду!"
"You struck a blow for goblinkind. Good.": "Ты нанёс удар в защиту гоблинов. Хорошо."
"Go to the caves and destroy the living ratkin miners. With only undead miners left, their necromancers will be overwhelmed, and we can strike!": "Отправляйтесь в пещеры и уничтожьте живых крысолюдей-копателей. Когда останутся только неживые копатели, их некроманты будут подавлены, и мы сможем нанести удар!"
"You struck a blow for goblinkind. Decent.": "Ты нанёс удар в защиту гоблинов. Прилично."
"The weak point in the enemy's production is the Ratkin Necro-Shamans who control undead miners. With those shamans dead, the undead will revolt! Maybe.": "Слабое место в производстве врага — некро-шаманы крысолюдей, контролирующие нежить-шахтёров. Если этих шаманов убить, нежить восстанет! Возможно."
"You struck a blow for goblinkind. Fine.": "Ты нанёс удар в защиту гоблинов. Отлично."
"The ratkin seem all too comfortable... probably because of those soldiers who wander around protecting them. Kill the soldiers, and surely their morale will falter!": "Крысолюды кажутся слишком спокойными... вероятно, из-за тех солдат, которые бродят вокруг, защищая их. Убейте солдат, и их боевой дух наверняка ослабнет!"
"You struck a blow for goblinkind. Impeccable.": "Ты нанёс удар в защиту гоблинов. Безупречно."
"Blast it all, how can you have killed hundreds of the enemy, and yet the path home is still full of the creeps?!\n\nI bet that they're at their breaking point. Just go and kill another hundred of 'em. Doesn't matter what kind: living or dead, just kill ratkin!": "Чёрт возьми, как ты мог убить сотни врагов, а путь домой всё ещё полон мерзавцев?!\\n\\nБьюсь об заклад, они на пределе. Просто иди и убей ещё сотню. Неважно, каких: живых или мёртвых, просто убей крысолюдей!"
"You... killed a hundred ratkin?!\n\nHey, Grommewik, is it safe to go home? ... There are HOW many ratkin in the hallway? ARGH! How can they breed this fast?!": "Ты... убил сотню крысолюдей?!\\n\\nЭй, Громмевик, безопасно ли возвращаться домой? ... В коридоре СТОЛЬКО крысолюдей? АРГХ! Как они могут так быстро размножаться?!"
"I give up. I'm out of ideas.\n\nWell we can't have you just staying around here, can we? You should go kill a thousand more ratkin. Just keep killing until you die. Or until a thousand ratkin are dead! It's a win-win! For me, I mean.\n\nWhat? Of course I'll make it worthwhile, buddy: if you kill a thousand ratkin I'll give you 10 pieces of xedrite. Totally worth your time, right?": "Я сдаюсь. У меня нет идей.\\n\\nНу не можем же мы позволить тебе просто тут болтаться, правда? Тебе нужно убить ещё тысячу крысолюдов. Просто продолжай убивать, пока не умрёшь. Или пока не погибнет тысяча крысолюдов! В любом случае выигрыш! Для меня, конечно.\\n\\nЧто? Конечно, я сделаю это стоящим, дружище: если ты убьёшь тысячу крысолюдов, я дам тебе 10 кусочков кседрита. Совсем не зря потратишь время, правда?"
"You actually killed a thousand ratkin?!\n\nHAHAHAHAHAHAhahahaha what? You're like a god among mortals... and you've killed a thousand of our enemy just because I asked you to? HAHAHAHAHAHAHhahaha hahaha haha...\n\nHahahahahahaha! Hahaha! HAHAHA! You crazy idiot! Here's your xedrite! HAHAHA! Oh man. You're definitely the kind of idiot that goblin chiefs love to have around! Hell, I'm gonna throw in an extra xedrite for a job well done! Hahahahaha!": "Ты действительно убил тысячу крысолюдей?!\\n\\nХАХАХАХАХАХАхахаха что? Ты словно бог среди смертных... и убил тысячу наших врагов просто потому, что я тебя попросил? ХАХАХАХАХАХахаха ха-ха-ха...\\n\\nХахахахахаха! Хаха! ХАХАХА! Ты сумасшедший идиот! Вот твой кседрит! ХАХА! О, чувак. Ты определённо тот идиот, которого любят иметь рядом вожди гоблинов! Чёрт, я ещё добавлю один кседрит за отлично выполненную работу! Хахахахаха!"
"The ratkin just keep... surviving! How is it possible?! Perhaps we need to broaden our approach. The sewer rat may seem harmless... but it's wily and dangerous and probably somehow the secret crux of our problem!": "Крысолюды просто продолжают... выживать! Как это возможно?! Возможно, нам нужно расширить наш подход. Канальная крыса может казаться безобидной... но она хитрая и опасная и, вероятно, как-то является ключевой тайной нашей проблемы!"
"You struck a blow for goblinkind. Bonafide.": "Ты нанёс удар в защиту гоблинов. Заслуженно."
"I don't understand why those trees are down here. And I hate that! The ratkin stay away from there, as if they know some secret. I hate that, too! Kill the trees!": "Я не понимаю, почему эти деревья здесь, под землёй. И я это ненавижу! Крысолюди держатся подальше, словно знают какой-то секрет. Я это тоже ненавижу! Убейте эти деревья!"
"The skeletal ratkin mages with electricity powers... those are very annoying! Kill them!": "Скелетные крысолюди-магии с электрическими способностями... они очень надоедливы! Убей их!"
"You struck a blow for goblinkind. Better.": "Ты нанёс удар в защиту гоблинов. Лучше."
"Nevermind subtlety. We want them to stop mining, so just destroy their undead miners!": "Забудьте о тонкостях. Мы хотим, чтобы они перестали копать, так что просто уничтожьте их неживых шахтёров!"
"You struck a blow for goblinkind. Sufficient.": "Ты нанёс удар в защиту гоблинов. Достаточно."
"There are way too many snakes in this place. I bet they have some nefarious purpose. Let's outsmart the ratkin by killing these snakes before their secret scheme comes to fruition!": "Здесь слишком много змей. Бьюсь об заклад, у них есть какой-то коварный замысел. Давайте перехитрим крысолюдей, убив этих змей, прежде чем их тайный план осуществится!"
"You struck a blow for goblinkind. Pleasant.": "Ты нанёс удар в защиту гоблинов. Приятно."
"We were sent here by Dalvos to find ancient Dwarf treasure. There are no Dwarves! Only goblins! And they enslave us with promises of healing. They lie! Kill them! Vindicate us!": "Нас послал сюда Далвос искать древние сокровища гномов. Гномов нет! Только гоблины! И они порабощают нас обещаниями исцеления. Они лгут! Убей их! Оправдай нас!"
"Ha ha ha ha! Now the pain... is still here! It's not gone! No! Noooo!": "Ха-ха-ха-ха! Боль... всё ещё здесь! Она не ушла! Нет! Нетууу!"
"I must ask you again for aid in preparing my special augments. I will need many such items to fund my travels. Gold works well for creating the augments. Unrefined gold ore is best. I've noticed that overworlders often keep gold on hand. Do you happen to have any?": "Я должен снова попросить тебя помочь с подготовкой моих специальных улучшений. Мне понадобится много таких предметов, чтобы финансировать мои путешествия. Для создания улучшений хорошо подходит золото. Лучше всего неочищенная золотая руда. Я заметил, что жители внешнего мира часто держат золото при себе. Случайно у тебя нет его?"
"Thank you for sharing your overworlder wealth with me. In exchange, I shall share knowledge with you.\n\n<i>[ You gain Jewelry Augment Brewing XP ]</i>": "Спасибо, что поделился со мной своим богатством из внешнего мира. В обмен я поделюсь с тобой знаниями.\\n\\n<i>[ Ты получаешь опыт в Создании Украшений ]</i>"
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>good armor stakes</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>хорошие костыли для брони</b>. Ты можешь сделать их для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new good armor stakes from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых хороших колышков для брони."
"I heard there's a fancy cheese maker out in Eltibule somewhere! Could you find her? Make her give you some danablu. That's the best kind! And get some for me.": "Я слышал, что где-то в Элтибуле есть искусный сыровар! Можешь найти её? Заставь дать тебе немного данаблу. Это самый лучший сорт! И возьми немного для меня."
"Mmm. Sweet and pungent. You are too kind! Here. Take this as a sort of gesture of thanks.": "Ммм. Сладко и остро. Ты слишком добр! Вот. Прими это как знак благодарности."
"Great job with the sewers, but right now we have another problem. Graffiti is getting out of control. If anyone on the Council notices, they'll take drastic, horrific, actions, like, I dunno, making the walls sentient so that they become easily enraged. Or perhaps making the town walls out of pure unlife. Whatever it is, it'll be much worse than what we have, which just requires a bit of good old fashioned hard work. By you.\n\nI can sell you the necessary graffiti cleaner. Don't worry, it's reimbursed by the payment for the job! I can sell you a bucket if you need one. Fill it with water, find graffiti, and scrub!\n\n<i>[To remove graffiti, place the Scrub Graffiti ability on your sidebar. Obtain Graffiti Cleaner. Then stand near graffiti and use the ability.]</i>": "Отличная работа с канализацией, но сейчас у нас другая проблема. Граффити выходит из-под контроля. Если кто-то из Совета заметит, они примут радикальные, ужасные меры, например, сделают стены разумными, чтобы они легко приходили в ярость. Или, возможно, сделают городские стены из чистой нежити. Что бы это ни было, это будет гораздо хуже того, что у нас есть сейчас, что требует лишь немного доброй старой тяжёлой работы. Тебя.\\n\\nЯ могу продать тебе необходимое средство для удаления граффити. Не волнуйся, оно компенсируется оплатой за работу! Если нужно, могу продать ведро. Наполни его водой, найди граффити и начни тереть!\\n\\n<i>[Чтобы удалить граффити, помести способность Тереть граффити на панель быстрого доступа. Получи средство для удаления граффити. Затем встань рядом с граффити и используй способность.]</i>"
"Thanks for helping maintain normalcy in town. I'm sure the town's vandals are already back at it, though. Come see me any day if you have time to do more scrubbing.": "Спасибо за помощь в поддержании порядка в городе. Хотя я уверен, что хулиганы уже снова орудуют. Заходи ко мне в любой день, если у тебя будет время на дополнительную уборку."
"Ready for more scrubbing? Great! I'll pay you the same as before. You can buy graffiti cleaner from me, or trade with me if you have other cleaners.": "Готов к очередной чистке? Отлично! Я заплачу тебе так же, как и раньше. Ты можешь купить у меня средство для удаления граффити или обменяться со мной, если у тебя есть другие чистящие средства."
"Thanks for keeping the streets clean. I know it seems unimportant right now, but it's not. I remember something Councilman Plaudius told me: if the town looks like shit, people will treat it like shit.\n\nWhich is to say that he would NOT be pleased if he saw any graffiti. And his last assistant was banished to the fairy tree. Eugh.": "Спасибо, что поддерживаешь улицы в чистоте. Я знаю, что сейчас это кажется неважным, но это не так. Я помню, что сказал мне советник Плаудиус: если город выглядит как свалка, люди будут относиться к нему соответственно.\\n\\nА это значит, что он НЕ обрадуется, если увидит граффити. А его последний помощник был изгнан к фейскому дереву. Фу."
"Unless and until you can become a bat yourself, there's just no way you can master the trick Bat symbol.": "Пока вы сами не станете летучей мышью, невозможно овладеть трюком с символом Летучей мыши."
"You lived as a bat long enough to comprehend the Bat symbol!": "Ты прожил достаточно долго в облике летучей мыши, чтобы понять символ Летучей мыши!"
"The ornate shape of the Beer symbol will require a bit of hands-on study.": "Изысканная форма символа Пива потребует немного практического изучения."
"You drank until you could draw Beer.": "Ты пил, пока не смог наливать пиво."
"Without truly understanding its explosive portent, how could you ever hope to actualized the Bomb symbol?": "Не понимая по-настоящему её взрывного значения, как ты можешь надеяться воплотить символ Бомбы?"
"You exploded enough to understand the Bomb symbol.": "Ты взорвался достаточно, чтобы понять символ Бомбы."
"Thinking about it, you're pretty sure you could master drawing a bone symbol if you had about a thousand bones on hand to study.": "Если подумать, ты вполне уверен, что сможешь освоить рисование символа кости, если у тебя будет около тысячи костей для изучения."
"You carried a lot of bones and mastered the Bone symbol.": "Ты перенёс много костей и освоил символ Кости."
"You know now that you'll need to practice with the bow if you ever want to properly render the twanginess of the Bow symbol.": "Теперь ты знаешь, что тебе нужно будет практиковаться с луком, если ты когда-нибудь захочешь правильно передать звучание символа Лука."
"You practiced with the bow and discovered the secret of the Bow symbol.": "Ты практиковался с луком и раскрыл секрет символа Лука."
"It's almost unknowable, the Brain symbol. But you must have its secrets! This will be taxing on your own brain, but you will find the knowledge you need or die trying!": "Символ Мозга почти непостижим. Но вы должны узнать его тайны! Это будет тяжело для вашего собственного разума, но вы найдете необходимые знания или умрете, пытаясь!"
"You've brain-blitzed your way to the Brain symbol!": "Ты пронёсся мыслью к символу Разума!"
"How can the Butterfly symbol truly capture the essence of the wind? It can't: that's the job of the Wind symbol! Even so, you must understand the way the wind works on the subject. It wouldn't take but a moment to understand it, if only you were a butterfly yourself!": "Как символ Бабочки может по-настоящему передать суть ветра? Не может: это задача символа Ветра! Тем не менее, вы должны понять, как ветер действует на объект. Это заняло бы всего мгновение, если бы вы сами были бабочкой!"
"You discovered the powerful Butterfly symbol technique!": "Ты открыл мощную технику символа Бабочки!"
"You don't think you'd need to study more than, say, 100 fireworks in order to draw a symbol of one. But you'd have to light them yourself.": "Ты не думаешь, что нужно изучить больше, скажем, 100 фейерверков, чтобы нарисовать их символ. Но их придётся зажигать самому."
"You lit fireworks until you could figure out how to draw the Celebrate symbol!": "Ты запускал фейерверки, пока не научился рисовать символ Празднования!"
"Your attempts at the Cheese symbol just don't depict its savoriness. You must go back to the cutting board.": "Ваши попытки изобразить символ Сыра просто не передают его вкусности. Вам нужно вернуться к разделочной доске."
"You've eaten cheese until the Cheese symbol became obvious to you!": "Ты ел сыр, пока символ Сыра не стал для тебя очевиден!"
"While a pedestrian symbol to some, the Cutlery symbol is a symbol of high honor to others. You long to bring the necessary gravitas to the task: you yourself must become a gourmand.": "Для одних это просто пешеходный знак, но для других символ столовых приборов — знак высокой чести. Вы стремитесь придать делу должную серьёзность: вы сами должны стать гурманом."
"You've finally come to understand the true meaning of the Cutlery symbol!": "Ты наконец-то понял истинное значение символа Столовых приборов!"
"You've tried to master the Deer symbol, but all your attempts ring hollow. You're an artist and you need to get this RIGHT! This can only be achieved by literally getting into the mind of your subject.": "Вы пытались освоить символ Оленя, но все ваши попытки звучат пусто. Вы художник, и вам нужно сделать это ПРАВИЛЬНО! Это можно достичь только буквально проникнув в сознание вашего объекта."
"You lived as a deer long enough to understand the subtlities of the Deer symbol!": "Ты прожил достаточно долго в облике оленя, чтобы понять тонкости символа Оленя!"
"You've realized that the beautiful symmetry of dice can only be understood with use. This is the path to the Die symbol.": "Вы поняли, что прекрасную симметрию кубиков можно постичь только через использование. Это путь к символу Кубика."
"You rolled the dice and learned the Die symbol!": "Ты бросил кости и выучил символ Кости!"
"Only the truly feral can master the Face (Dog) symbol. You may just not have what it takes. And that's okay. Best to leave the symbol to the worthy.": "Только по-настоящему дикие могут овладеть символом Лицо (Собака). Возможно, у вас просто нет для этого способностей. И это нормально. Лучше оставить этот символ достойным."
"You accessed your feral nature and mastered the Face (Dog) symbol!": "Ты пробудил свою дикую природу и освоил символ Лица (Собаки)!"
"To master the Female symbol, you need but study females.": "Чтобы освоить символ Женского, нужно лишь изучать женщин."
"You've glared at enough females that you feel you have mastered the Female symbol!": "Ты достаточно долго пялился на женщин, чтобы почувствовать, что освоил символ Женщины!"
"If you knew how to catch fish with angling, you could study them better while they were dangling on the line. Yes, that's it: you must angle some fishes to master the Fish symbol.": "Если бы вы умели ловить рыбу на удочку, вы могли бы лучше изучать её, пока она болтается на крючке. Да, именно так: вам нужно поймать несколько рыб, чтобы освоить символ Рыбы."
"You caught enough fish to truly comprehend the Fish symbol.": "Вы поймали достаточно рыбы, чтобы по-настоящему понять символ Рыбы."
"If you snorted some flowers, you believe you could learn to draw one by osmosis.": "Если вы вдохнули немного цветов, вы верите, что сможете научиться рисовать их методом осмоса."
"You snorted flowers until you mastered the Flower symbol.": "Ты нюхал цветы, пока не освоил символ Цветка."
"The Footprint symbol. So iconic. And yet so unknowable. Feet can take all sorts of shapes; how can you stereotype a whole body part like that? You'll need to stretch your feet in all new ways to discover the tantalizing secret of the Footprint symbol.": "Символ Отпечатка. Такой знаковый. И всё же такой непостижимый. Ноги могут принимать самые разные формы; как можно стереотипизировать целую часть тела? Тебе придётся растянуть ноги совершенно новыми способами, чтобы раскрыть манящую тайну символа Отпечатка."
"You've kicked and ... kicked your way to the Footprint symbol!": "Ты пинал и... пинал, пока не достиг символа Следа!"
"You're inspired to master the lovely bulbous globes of the grape. You'll need to taste several in order to depict their juciness just right.": "Вас вдохновило овладеть искусством изображать прекрасные округлые гроздья винограда. Вам нужно будет попробовать несколько, чтобы точно передать их сочность."
"You ate grapes and mastered the Grape symbol.": "Ты ел виноград и освоил символ Винограда."
"There's so many types of hammers! You'd love to give the hammer-as-tool its due in a symbol, but how to capture its unique essence? You grit your teeth: only hands-on work at the forge will do.": "Существует так много видов молотков! Вам хотелось бы отдать должное молотку как инструменту в символе, но как передать его уникальную суть? Вы сжимаете зубы: поможет только практика у кузнечного горна."
"You forged the Hammer (Tool) symbol!": "Ты выкован символ Молота (Инструмента)!"
"The heft of the battlehammer is not quite coming through in your Hammer (Weapon) symbol. In fact, you aren't managing to capture the calloused hands of the user or the heavy sweat on their brow. You're going to need to get up close and personal with the subject.": "Масса боевого молота не совсем передаётся в вашем символе Молота (Оружие). На самом деле, вам не удаётся запечатлеть мозолистые руки пользователя или тяжёлый пот на его лбу. Вам придётся подойти к объекту поближе и внимательнее."
"You hammered until you could depict the Hammer (Weapon) symbol.": "Ты стучал молотком, пока не научился изображать символ Молота (Оружие)."
"The Horse symbol is a potent idea that should never be misused. To control its forces you should collect many example horses. Then you can compare and contrast them.": "Символ Лошади — мощная идея, которую никогда не следует использовать неправильно. Чтобы управлять её силами, вам следует собрать много примеров лошадей. Затем вы сможете сравнивать и сопоставлять их."
"You've become a horse person to unlock the Horse symbol.": "Ты стал коневодом, чтобы открыть символ Лошади."
"Its perfectly not-quite-symmetrical shape lends an air of mystery to the Lemon symbol -- and an air of difficulty! For only those who brave the sourness can see clearly enough to depict the lemon.": "Его идеально не совсем симметричная форма придаёт символу Лимона атмосферу тайны — и ощущение сложности! Только те, кто осмелится на кислинку, смогут достаточно ясно увидеть, чтобы изобразить лимон."
"You sucked lemons to master the Lemon symbol.": "Ты сосал лимоны, чтобы освоить символ Лимона."
"Today you had a breakthrough: the jagged nature of the Lightning emoji will be easily mastered via repetitive application to the face. Relatively easy!": "Сегодня у вас был прорыв: зазубренная природа эмодзи Молнии будет легко освоена через многократное нанесение на лицо. Относительно просто!"
"You've been shocked enough to control the potent Lightning symbol!": "Ты получил достаточно ударов электричеством, чтобы овладеть мощным символом Молнии!"
"The Male symbol's jagged angulars require a deep understanding of the subject acquired through careful study.": "Зубчатые углы символа Мужчины требуют глубокого понимания темы, приобретённого через тщательное изучение."
"You've glared at enough males that you feel you have mastered the Male symbol!": "Ты достаточно долго пялился на мужчин, чтобы почувствовать, что освоил символ Мужчины!"
"There is a universal meat symbol. You just know it! How can you find it? Only through savoring meat of all kinds.": "Существует универсальный символ мяса. Ты просто чувствуешь его! Как его найти? Только через наслаждение мясом всех видов."
"You've eaten meat until the Meat symbol became clear!": "Ты ел мясо, пока символ Мяса не стал для тебя ясным!"
"Iconic and yet so hard to master! The Mushroom symbol eludes you now, but you know you're on the right track. Just 500 or so freshly-plucked examples should do it.": "Знаковый и в то же время такой сложный для освоения! Символ Гриба ускользает от вас сейчас, но вы знаете, что идёте в правильном направлении. Достаточно около 500 свежесобранных образцов."
"You've plucked so many mushrooms! Finally, the Mushroom symbol is yours to wield.": "Ты собрал столько грибов! Наконец символ Гриба в твоих руках."
"You've got the jingle. You've got the drape. The only thing you're missing is the subject itself. A bit of hands-on craftwork should illuminate the final aspect of the Necklace symbol.": "У тебя есть звон. У тебя есть драпировка. Единственное, чего тебе не хватает — это сам предмет. Немного практической работы поможет осветить последний аспект символа Ожерелья."
"You've mastered the Necklace symbol, and hence, your heart.": "Ты освоил символ Ожерелья и, следовательно, своё сердце."
"Try as you might, the Pig symbol seems just beyond your skill. Perhaps if you lived and worked as a pig yourself! Yes, that's the only way.": "Как ни старайся, символ Свиньи кажется чуть выше твоих умений. Может, если бы ты жил и работал как свинья! Да, это единственный путь."
"You lived as a pig long enough to understand the subtlities of the Pig symbol!": "Ты прожил в облике свиньи достаточно долго, чтобы понять тонкости символа Свиньи!"
"Mastering the Rabbit symbol just seems so hard! You can't get into the mind of your subject. Perhaps if you lived as a rabbit for a while...": "Овладеть символом Кролика кажется таким сложным! Ты не можешь проникнуть в разум своего объекта. Возможно, если бы ты пожил некоторое время в образе кролика..."
"You lived as a rabbit long enough to understand the subtlities of the Rabbit symbol!": "Ты прожил достаточно долго в облике кролика, чтобы понять тонкости символа Кролика!"
"You know the Shield symbol should depict strength, honor, and something else. But what's the secret ingredient? You'll need to investigate.": "Ты знаешь, что символ Щита должен олицетворять силу, честь и что-то ещё. Но в чём секретный ингредиент? Тебе предстоит расследовать."
"You've defended yourself with the Shield and achieved the Shield symbol.": "Вы защитились с помощью Щита и достигли символа Щита."
"You almost have it: the legendary Soup symbol! You just need a bit more slurping experience to understand how to craft a perfect universal indicator for the concept.": "Ты почти у цели: легендарный символ Супа! Тебе просто нужно немного больше опыта в чавкании, чтобы понять, как создать идеальный универсальный индикатор для этой концепции."
"You've souped and souped until the Soup symbol was bested!": "Ты варил суп за супом, пока не покорил символ Супа!"
"If only they had fewer legs! The Spider symbol has proven elusive. But perhaps... Yes, perhaps if you were yourself a spider, and lived as one for some time. Could it work?": "Если бы у них было меньше ног! Символ Паука оказался ускользающим. Но, возможно... Да, возможно, если бы ты сам был пауком и жил как один некоторое время. Может, это сработает?"
"You lived as a spider until you knew the essence of the Spider symbol!": "Ты жил в облике паука, пока не познал суть символа Паука!"
"You realize that you can't quite visualize the precise grip angle you'd need for the Sword symbol. The solution is simple: learn.": "Вы понимаете, что не можете точно представить угол захвата, необходимый для символа Меча. Решение простое: учиться."
"You've studied the blade and mastered the Sword symbol.": "Ты изучил клинок и овладел символом Меча."
"Mastering the Tree symbol shouldn't be hard. You'll just pay extra special attention the next few times you harvest wood.": "Освоить символ Дерева не должно быть сложно. Просто уделите ему особое внимание в следующие несколько раз, когда будете собирать древесину."
"You lumberjacked your way to the Tree pictogram.": "Ты прорубился к пиктограмме Дерева."
"How to depict the Wind symbol? Its mysteries are limited only by the forces of nature itself. You must delve ever deeper into the heart of the storm to comprehend the Wind.": "Как изобразить символ Ветра? Его тайны ограничены лишь силами самой природы. Ты должен погружаться всё глубже в сердце бури, чтобы постичь Ветер."
"You got blustered until you realized the Wind symbol.": "Ты так долго боролся с бурей, что наконец понял символ Ветра."
"The Wizard Hat symbol Is highly-regarded, for only true wizards can master its delicate details. You vow to achieve this!": "Символ Шляпы Волшебника высоко ценится, ведь только истинные волшебники могут овладеть его тонкими деталями. Ты клянешься добиться этого!"
"You became a wizard just to be able to use the Wizard Hat symbol!": "Ты стал волшебником только для того, чтобы овладеть символом Волшебной шляпы!"
"Have you been practicing wine making? I'd love to try your grape wine!": "Ты занимался виноделием? Я бы с удовольствием попробовал твоё виноградное вино!"
"Hm, it's a bit sour, but it's still better than no wine. Good! Let me teach you how to make a zesty wine. It's a little tricky, but worth the pain!": "Хм, немного кислое, но всё же лучше, чем никакое вино. Хорошо! Позволь научить тебя делать острое вино. Это немного сложно, но стоит усилий!"
"I'll let you in on a secret. My famous travel snacks are only <i>mostly</i> cat meat. They've also got fish in them -- grapefish, to be exact. But don't tell anyone! Grapefish isn't common around here so I have to import it, and some customers might get upset about me not using local ingredients. But you and I are above that sort of thing, right? I'll pay you well if you can get me some! Filet them before you bring them in here, though. Fillets draw less attention than whole fish.": "Расскажу тебе секрет. Мои знаменитые дорожные закуски состоят <i>в основном</i> из кошачьего мяса. В них также есть рыба — точнее, грейпфиш. Но никому не говори! Грейпфиш здесь редкость, поэтому я её импортирую, а некоторые покупатели могут расстроиться, что я не использую местные ингредиенты. Но мы с тобой выше таких мелочей, верно? Я хорошо заплачу, если ты принесёшь мне немного! Только перед тем как принести, разделай рыбу на филе. Филе привлекает меньше внимания, чем целая рыба."
"You have my fish? Perfect! Now remember, tell nobody. But, since you already know, I guess I can teach you the recipe, if you'd like.\n\n<i>[ Recipe 'Nishika's Travel Snack' unlocked in the Training menu. ]</i>": "У тебя есть моя рыба? Отлично! Теперь помни, никому не говори. Но раз ты уже знаешь, думаю, я могу научить тебя рецепту, если хочешь.\\n\\n<i>[ Рецепт «Путешественническая закуска Нишики» разблокирован в меню Обучения. ]</i>"
"Oh my gosh I really could use some grapes! They're my favorite snack. I should learn to grow them myself or something. Have you seen any?": "О боже, мне очень нужен виноград! Это моя любимая закуска. Мне стоит научиться выращивать его самому или что-то в этом роде. Ты не видел где-нибудь виноград?"
"You got me grapes? Oh, that's so sweet of you!": "Ты принес мне виноград? О, как это мило с твоей стороны!"
"First and foremost, you should find my... butler. He was once a ghoul. And I suppose he is still a ghoul, of a sort. But he is ... more. He can sense hatred in the air. It is MOST valuable.\n\nGrasuul ran away when I was forced into repose. But I know where he would go: I spied a cursed lake near the ruby wall. He would no doubt be there, reveling in anguish. Grasuul is... not well.\n\nTell Grasuul that I have awoken. He will come back.": "Прежде всего, тебе следует найти моего... дворецкого. Он когда-то был вурдалаком. И, полагаю, он всё ещё вурдалак, в некотором роде. Но он... больше. Он чувствует ненависть в воздухе. Это ОЧЕНЬ ценно.\\n\\nГрасуул убежал, когда меня заставили уснуть. Но я знаю, куда он пойдёт: я заметил проклятое озеро возле рубиновой стены. Он наверняка там, наслаждаясь страданиями. Грасуул... не в порядке.\\n\\nСкажи Грасуулу, что я пробудился. Он вернётся."
"Grasuul has returned! Now we can find the best sources of blood. Excellent.": "Грасуул вернулся! Теперь мы можем найти лучшие источники крови. Отлично."
"I wish I'd had time to get all the supplies out of the keep before I left! Those squatters make it hard to get my stuff out of there now. I had a crate of gratflower millet in there, and I think it's still good! Could you go get it for me? It's in the front tower -- you'll walk under it as you enter the keep.\n\nOh, the wooden stairs to the towers were torn down, so you'll have to be a little creative.": "Жаль, что у меня не было времени забрать все припасы из крепости перед отъездом! Эти захватчики теперь мешают мне достать мои вещи. У меня там была ящик проса с благодарными цветами, и я думаю, что оно ещё хорошее! Можешь сходить и забрать его для меня? Он находится в передней башне — ты пройдёшь под ней, входя в крепость.\\n\\nО, деревянные лестницы к башням снесли, так что придётся немного проявить смекалку."
"This is the stuff! Thank you! I'll use this for my famous gratflower tongba. That will take a while to prepare, though. In the mean time, try this! It's another of my specialties.": "Это то, что нужно! Спасибо! Я использую это для моего знаменитого тонтба из цветка грата. Но на приготовление уйдёт некоторое время. А пока попробуй это! Это ещё одно из моих фирменных блюд."
"Let's start with something easy that any novice should be able to manage. Fetch me fresh gravebloom. We're fortunate that it grows in the graveyard just outside of town.\n\nOf course, you know that it only blooms at night.": "Давай начнём с чего-то простого, с чем справится любой новичок. Принеси мне свежий могильный цветок. Нам повезло, что он растёт на кладбище прямо за городом.\\n\\nКонечно, ты знаешь, что он цветёт только ночью."
"Very adequate work.": "Очень достойная работа."
"It's illegal to cremate the dead, of course, because they might come back as ghosts. But burying them's hardly better! The graveyard southwest of town is the worst case I've ever seen. Can you clean it up a bit?": "Сжигать мёртвых, конечно, запрещено, потому что они могут вернуться в виде призраков. Но хоронить их — тоже не лучше! Кладбище к юго-западу от города — худший случай, который я когда-либо видел. Можешь немного его привести в порядок?"
"Very nicely done! Thanks! Here's a little cash. Not that I think you're a mercenary or anything! Please don't take offense. It's just a gift!": "Отлично сделано! Спасибо! Вот немного денег. Не подумай, что я считаю тебя наёмником или что-то в этом роде! Пожалуйста, не обижайся. Это просто подарок!"
"Thanks for helping clear out some tenders, but there's still so many!\n\nWe buy our Garden Tenders from goblins. I do not know what their true species is; that's just what we call them. They are loyal and strong, but the goblins only sell us males. However, last season, they made a mistake. They left us a female! Now we have several females, but still only one at reproductive age. And you must kill her.\n\nIt is very sad, I know, but she is under the control of Tidal's renegade myconians. Look on the bright side: tenders are just meatlings, not mushrooms! Oh, I guess that doesn't help you, does it.": "Спасибо, что помог очистить территорию от некоторых садовников, но их всё ещё так много!\\n\\nМы покупаем наших садовников у гоблинов. Я не знаю, к какому виду они на самом деле относятся; так мы их называем. Они верные и сильные, но гоблины продают нам только самцов. Однако в прошлом сезоне они допустили ошибку. Они оставили нам самку! Теперь у нас несколько самок, но только одна из них способна к размножению. И её нужно убить.\\n\\nЭто очень печально, я знаю, но она под контролем отступников-миконианов Тайдала. Посмотри с другой стороны: садовники — это просто мясные создания, а не грибы! Хотя, наверное, это тебе не помогает."
"Hooray, you killed Greta! You are the cold-blooded murderer our pod needed! I'm confident that befriending such a violent sociopath as you cannot possibly have any negative repercussions. Here, take this token of our appreciation. Please do not kill us.": "Ура, ты убил Грету! Ты — хладнокровный убийца, которого нам так не хватало! Я уверен, что подружиться с таким жестоким социопатом, как ты, не может иметь никаких негативных последствий. Вот, возьми этот знак нашей признательности. Пожалуйста, не убивай нас."
"Gorvessa is beautiful, but her cooking is... well, it's adequate. But my refined palate needs something better. I could really go for eel kabobs right now!": "Горвесса красива, но её кулинария... ну, так себе. А мой изысканный вкус требует чего-то получше. Прямо сейчас я бы с удовольствием съел шашлычки из угря!"
"Mmm. Thanks! All mine, no sharing! Here, you can have the meal Gorvessa made for me.": "Ммм. Спасибо! Всё моё, не делюсь! Вот, можешь взять еду, которую Горвесса приготовила для меня."
"See Gorvessa over there? She's pretty amazing, huh? And I hear she's only 'temporarily' Malvol's consort. Which means I have a chance! I need a gift, though. Can you get me a goblin hairpin? I'll imbue it with magic and impress her.": "Видишь там Горвессу? Она довольно удивительная, да? И я слышал, что она всего лишь «временно» спутница Мальвола. Значит, у меня есть шанс! Но мне нужен подарок. Можешь достать мне гоблинскую шпильку? Я напитаю её магией и произведу на неё впечатление."
"This will do. Thank you. Now go! Don't let Gorvessa see you giving it to me! I need her to think I crafted it for her. Here, just take some money and shut up about this!": "Это подойдёт. Спасибо. А теперь иди! Не дай Горвессе увидеть, что ты передаёшь это мне! Мне нужно, чтобы она думала, что я сделал это для неё. Вот, просто возьми немного денег и молчи об этом!"
"I've had a VERY long time to look at the menu, so yes, I'm ready to place my food order! I saw that you have fresh amberjack on the fish list. How is that even possible?! I guess amberjack is native to here? Well, I simply must try this dish.": "У меня было ОЧЕНЬ много времени, чтобы изучить меню, так что да, я готов сделать заказ! Я видел, что у вас в списке рыб есть свежий амберджек. Как это вообще возможно?! Полагаю, амберджек — местная рыба? Ну, я просто обязан попробовать это блюдо."
"A little fishy. I think it could have used another minute on the grill. No, no, it's fine, I'll eat it. It's not bad!": "Слегка недожарено. Думаю, ему не помешала бы ещё минута на гриле. Нет, нет, всё в порядке, я съем. Не так уж плохо!"
"Where's my grilled amberjack? And can I get a refill on my water?": "Где мой жареный луциан? И можно мне добавить воды?"
"I'm Mox's backup when we go out on expeditions. The stuff in the caves isn't too bad, but the stuff in the snow can be pretty scary! I'm not confident my crossbow can handle those huge bears before they have time to maul one of us. Can you kill some and let me know how hard they are to kill? Just a few will do. Like... five. No! Eight. That's a more scientific number.": "Я — запасной стрелок Мокса, когда мы отправляемся на экспедиции. В пещерах не так уж страшно, но в снегу бывает довольно жутко! Я не уверена, что мой арбалет справится с этими огромными медведями, прежде чем они успеют наброситься на кого-то из нас. Можешь убить несколько и сказать, насколько их сложно убить? Достаточно нескольких. Ну... пять. Нет! Восемь. Это более научное число."
"So? That's it? No mangled limbs or ripped-off faces to show for it? I guess the bears should be easy, then! Thanks for doing the research for me. Oh, you need a payment... hmm... here! These are for you.": "Ну что? Вот и всё? Нет изуродованных конечностей или содранных лиц? Значит, медведи должны быть лёгкой добычей! Спасибо, что провёл исследование за меня. О, тебе нужна оплата... хмм... вот! Это для тебя."
"I do appreciate what you've done to stop Grosark. But I've bad news: what you slew was merely Grosark's bodily husk, a sort of meat puppet that he wore because he didn't realize that liches don't need them. But the good news is that he doesn't know enough about his powers to be particularly dangerous to our realm yet. Some of his soul is in Acur, and the rest of it is trapped here, bodiless, in what is called an astral state.\n\nBut the bad news is that he can escape this state easily if he only knew how, and he is researching furiously. I've detected his presence near the ivory library. He can't get in, of course, even in astral form, but it shows that he knows what he needs. It's only a matter of time.\n\nBut the good news is that long ago I researched the perfect ritual for this situation. The Statehelm graveyard may seem an ordinary one, but it was actually configured by the Council to support extreme necromantic rituals. You can use that place to pull Grosark into our realm now, while he is weak and confused. It's the only way. Aside from the myriad other ways, of course, but it's the only way I recommend.\n\nHere are the notes. Follow them diligently. And bring a friend. No, bring an army! No, that would be chaos. Bring between five and fifteen friends.\n\nOh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.": "Я ценю то, что ты сделал, чтобы остановить Гросарка. Но у меня плохие новости: то, что ты убил, было лишь телесной оболочкой Гросарка, своего рода мясной марионеткой, которую он носил, потому что не понимал, что личи не нуждаются в теле. Но хорошая новость в том, что он ещё не знает достаточно о своих силах, чтобы быть особенно опасным для нашего мира. Часть его души находится в Акюре, а остальная часть заперта здесь, без тела, в так называемом астральном состоянии.\\n\\nНо плохая новость в том, что он может легко выйти из этого состояния, если только узнает как, и он активно исследует это. Я обнаружила его присутствие рядом с слоновой библиотекой. Он, конечно, не может войти, даже в астральной форме, но это показывает, что он знает, что ему нужно. Это лишь вопрос времени.\\n\\nНо хорошая новость в том, что давно я исследовала идеальный ритуал для такой ситуации. Кладбище Стейтхелма может показаться обычным, но на самом деле оно было устроено Советом для поддержки экстремальных некромантских ритуалов. Ты можешь использовать это место, чтобы сейчас, пока он слаб и сбит с толку, вытащить Гросарка в наш мир. Это единственный способ. Помимо множества других, конечно, но это единственный способ, который я рекомендую.\\n\\nВот заметки. Следуй им тщательно. И возьми с собой друга. Нет, возьми армию! Нет, это будет хаос. Возьми от пяти до пятнадцати друзей.\\n\\nО! Тебе понадобится свеча призыва. Ты умеешь их делать? Нет, неважно, я научу тебя точно, как сделать её безопасно. Не хочу, чтобы ты превратился в экзоплазменный пудинг. Это относительно простая свеча... Надеюсь, ты умеешь обращаться с мастерской по изготовлению свечей? Там есть одна, удобно расположенная в склепе."
"You completed the ritual and destroyed Grosark? Hmm, it's true that his presence seems very small now, but I can still detect him. I'm not sure we've seen the last of Grosark. But the problem has at least been postponed. That will do for now. Thank you.\n\nSometimes being wise means being willing to say that you CAN'T do something. I don't think I could have stopped Grosark alone. Oh, I know you had assistance also, but... well, I'm used to working solo.\n\nThat's changing, though. I am starting to enjoy working in tandem with you. We make a strong pair.": "Вы завершили ритуал и уничтожили Гросарка? Хм, правда, что его присутствие теперь кажется очень слабым, но я всё ещё могу его обнаружить. Не уверен, что мы в последний раз видели Гросарка. Но проблема, по крайней мере, отложена. Пока этого достаточно. Спасибо.\n\nИногда мудрость означает готовность признать, что ты НЕ МОЖЕШЬ что-то сделать. Я не думаю, что смог бы остановить Гросарка в одиночку. О, я знаю, что у тебя была помощь, но... ну, я привык работать в одиночку.\n\nОднако это меняется. Мне начинает нравиться работать с тобой в тандеме. Мы сильная пара."
"You repelled Grosark's invasion into our realm!": "Вы отразили вторжение Гросарка в наш мир!"
"The lowest deck is mostly empty and just used for storage. We've stored a bunch of mortal specimens down there for later analysis.\n\nThe mortal realm near here is full of really beautiful things. Beautiful flowers! Talking trees! 'Elves'! Real dragons! But what's in the hold? ... cow-men.\n\nThey're going to try to breed them into an army, so you should totally go stop them.": "Самая нижняя палуба в основном пуста и используется только для хранения. Там мы храним множество смертных образцов для последующего анализа.\\\\n\\\\nМир смертных неподалёку полон действительно красивых вещей. Красивых цветов! Говорящих деревьев! \"Эльфов\"! Настоящих драконов! А что в трюме? ... человекокоров.\\\\n\\\\nОни собираются вывести из них армию, так что тебе определённо стоит их остановить."
"Thanks for taking out the cow-men. Although to be honest, I don't think our breeding program was ever going to work. For one thing, they're actually sentient, and they don't like us. Second, all our specimens were male. But who knows what Winter's genetic engineers could do with them, so ... good work!": "Спасибо, что уничтожил быколюдей. Хотя, если честно, я не думаю, что наша программа разведения когда-либо сработала бы. Во-первых, они разумны и не любят нас. Во-вторых, все наши образцы были самцами. Но кто знает, что зимние генетические инженеры смогут с ними сделать, так что... хорошая работа!"
"Seen them green bears out there? They're dangerous as hell, but don't bother killin' em, they're fey! They just come right back a week later! And so do those damned green panthers, must be fey too. But there are some ordinary bears that follow 'em around, charmed by their magic. Kill those ordinary bears and we can at least start to lower the danger!": "Видел тех зелёных медведей там? Они чертовски опасны, но не трать время на их убийство — они феи! Они просто возвращаются через неделю! И те проклятые зелёные пантеры тоже, наверное, феи. Но за ними ходят обычные медведи, очарованные их магией. Убей этих обычных медведей, и мы хотя бы сможем начать снижать опасность!"
"Good job. Any little bit helps. Of course, the only way to really solve the problem is to go through the rift and kill them... that would have to kill 'em permanently, right?\n\nAnyway, I bet ya used a bunch of arrows getting that done, huh? I have some spares for ya.": "Хорошая работа. Любая помощь важна. Конечно, единственный способ действительно решить проблему — пройти через разлом и убить их... это должно убить их навсегда, верно?\\n\\nВ любом случае, уверен, ты израсходовал кучу стрел, чтобы справиться с этим, да? У меня есть для тебя запасные."
"I need you to go spelunking! There are caves all through the mountains, and some of them have mushrooms growing inside.\n\nThere's a kind of mushroom found only in this mountain range. Orcs call it 'Groxmax'. You'll know them by the stench of rotten meat. I'll pay well for them! Oh, and if you find other kinds of mushrooms, hold on to them too; I may need them.": "Мне нужно, чтобы ты пошёл исследовать пещеры! По всей горной цепи есть пещеры, и в некоторых из них растут грибы.\\\\n\\\\nЕсть вид грибов, который встречается только в этих горах. Орки называют их «Гроксмакс». Ты узнаешь их по запаху гнилого мяса. Я хорошо заплачу за них! О, и если найдёшь другие виды грибов, тоже забирай их; они могут мне понадобиться."
"So this is the infamous groxmax mushroom. Orcish alchemists say these inedible mushrooms have powerful alchemical uses... but don't worry. Orcish alchemists are notoriously sloppy and lazy, so I'll do my own experiments. Here, a bounty from the Aufghel Naturist Society.": "Итак, это пресловутый гриб гроксмакс. Орочьи алхимики говорят, что эти несъедобные грибы имеют мощные алхимические свойства... но не волнуйся. Орочьи алхимики известны своей небрежностью и ленью, так что я проведу собственные эксперименты. Вот награда от Общества натуралистов Ауфгель."
"Both Hogan and I love poetry -- we met at a reading in the Vicious Bat in Statehelm. I miss my hometown a lot.\n\nHey, I heard that a  poet named Gruzark lives around here. I'm not sure where, exactly. But can you get me his autograph? Or just something he wrote? I'd really appreciate it!": "И Хоган, и я любим поэзию — мы познакомились на чтении в Злобной Летучей Мыши в Стейтхелме. Я очень скучаю по своему родному городу.\\n\\nСлышал, что здесь где-то живёт поэт по имени Грузарк. Точно не знаю где. Но можешь достать мне его автограф? Или просто что-нибудь из его стихов? Я был бы очень признателен!"
"You found Gruzark? He's dead?! Oh. Well, I guess that means this book will go up in value! Thanks. Here... it's one of my swords. It's got some silly enchantment on it, maybe that'll be fun for you.": "Вы нашли Грузарка? Он мёртв?! О. Ну, думаю, это значит, что эта книга подорожает! Спасибо. Вот... это один из моих мечей. На нём есть забавное заклинание, возможно, тебе понравится."
"There are several types of ranalon around here. The large ones with the dangling orb on their heads are my favorite. I would love to see how their glow balls work. Well, if you happen to find any, please show them to me!": "Здесь водится несколько видов раналонов. Большие с висящим шаром на голове — мои любимые. Мне бы очень хотелось узнать, как работают их светящиеся шары. Если вдруг найдёшь таких, пожалуйста, покажи мне!"
"Uh, are these fresh? I didn't mean you should go out and kill...  Wait... <i>[Trasen studies the lures]</i> These are very unusual indeed. I need to examine these more closely. Here: these powders should be fair trade.": "Э-э, они свежие? Я не имел в виду, что ты должен идти и убивать... Подожди... <i>[Трасен изучает приманки]</i> Они действительно очень необычные. Мне нужно их тщательнее изучить. Вот: эти порошки должны быть справедливой платой."
"I'm a bit of a fruit nut. (Do you get it?) I love the guavas that grow around here. Wish I had time to collect some.": "Я немного фанат фруктов. (Понял шутку?) Мне очень нравятся гуава, которые растут здесь рядом. Жаль, что у меня нет времени их собрать."
"Guavas! Thank you very much. Let me teach you a preparation technique for these.": "Гуава! Большое спасибо. Позволь научить тебя способу их приготовления."
"I'm worried about something that's probably far-fetched... but I don't dare ignore the possibility. That fool elf Pennoc invited a traveling circus from Senoca to come visit here. We're much too small for a circus to normally bother with, but he promised them an exceptionally friendly welcome, \"in elven style\", and he even promised free room and board for weeks!\n\nI would have had Pennoc thrown in the dungeon if we had a dungeon. <i>Sigh.</i> What if his ploy works and the circus comes here? I barely have enough supplies for the elven refugees, let alone a bunch of circus freaks! Can you help me prepare for the worst-case scenario?": "Меня беспокоит кое-что, что, вероятно, звучит неправдоподобно... но я не смею игнорировать такую возможность. Тот глупый эльф Пеннок пригласил к нам путешествующий цирк из Сеноки. Мы слишком маленькие, чтобы цирк обычно обращал на нас внимание, но он пообещал им исключительно тёплый приём «в эльфийском стиле» и даже бесплатное проживание и питание на несколько недель!\\n\\nЯ бы посадил Пеннок в темницу, если бы у нас была темница. <i>Вздыхает.</i> Что если его уловка сработает и цирк приедет сюда? У меня едва хватает припасов для эльфийских беженцев, не говоря уже о куче цирковых уродов! Ты можешь помочь мне подготовиться к худшему?"
"Thank you so much. Even if the circus doesn't come here -- and I hope they do not -- your work will not be wasted. I'm sure there will be more elven refugees arriving soon enough, and we'll be able to make them feel at home here, thanks to you.\n\nAnd as for Pennoc... I'll deal with him soon enough.": "Большое спасибо. Даже если цирк сюда не приедет — а я надеюсь, что не приедет — твоя работа не пропадёт зря. Я уверен, что скоро прибудет ещё больше эльфийских беженцев, и благодаря тебе мы сможем помочь им почувствовать себя как дома здесь.\\n\\nЧто касается Пеннок... я с ним скоро разберусь."
"Well, if Spot likes you, I guess you're okay. With your help, we might make it through winter after all. But I'll warn you: you'll have to go up against werewolves. If you want to back out, I completely understand. I'm not stupid enough to take werewolves on either!": "Если Спот тебя любит, значит, ты нормальный. С твоей помощью мы, возможно, переживём зиму. Но предупреждаю: тебе придётся сразиться с оборотнями. Если хочешь отказаться, я полностью пойму. Я тоже не настолько глуп, чтобы сражаться с оборотнями!"
"This is great news! I really didn't think you'd be able to do it! You and your friends are all honorary foxes. I can't thank you enough!": "Это отличная новость! Я действительно не думал, что вам это удастся! Ты и твои друзья теперь почётные лисы. Я не могу достаточно поблагодарить вас!"
"We are fully stocked up on supplies now, and it's time to take the fight to the demons! Gather your own troops, and help us cull these endless hordes.": "У нас теперь полный запас припасов, и пришло время перейти в наступление на демонов! Соберите свои войска и помогите нам истребить эти бесконечные орды."
"On behalf of my troops, Statehelm itself, and indeed all of Alharth, you have our heartfelt thanks. You did amazing work out there.\n\nI'll instruct Ferris to share as much knowledge about the demons with you as we can.": "От имени моих войск, самого Стейтхельма и всего Алхарта выражаем вам искреннюю благодарность. Вы проделали потрясающую работу.\\n\\nЯ поручаю Феррису поделиться с вами всеми известными нам сведениями о демонах."
"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.": "Вы были добры, что навестили меня. Я боюсь за будущее этого маленького городка, и дело не в жалких существах, бродящих по пустыне. Нет, беда исходит из глубин <i>под</i> песками. Я узнал, что там находятся тысячи солдат Гегемонии Старух, оставшихся после относительно недавней войны. Они размножаются, строят козни и очень, очень злы. Это лишь вопрос времени, когда они восстанут и захватят пустыню. Вы должны нанести удар, пока они еще слабы и не готовы. Найдите входы в их туннели и положите конец этой опасности."
"So your skirmish was successful? Very good. They may still rise up, but I have confidence that you and your allies will be able to handle them if they do. It seems your services might be appreciated in the Vidaria demon efforts as well. You should seek out one of the army's leaders there.": "Итак, ваша стычка прошла успешно? Очень хорошо. Они всё ещё могут поднять восстание, но я уверен, что вы и ваши союзники справитесь с ними, если это случится. Похоже, ваши услуги будут востребованы и в борьбе с демонами Видарии. Вам следует найти одного из командиров армии там."
"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.\n\nOh! And since you'll be heading down there anyway, perhaps you could collect some items for me? I mean, it'd be foolish to waste this opportunity to study Hegemony weapons...": "Было хорошо, что вы меня навестили. Я боюсь за будущее этого маленького городка, и дело не в жалких существах, бродящих по пустыне. Нет, беда исходит из глубин <i>под</i> песками. Я узнал, что там находятся тысячи солдат Гегемонии Старух, оставшихся после относительно недавней войны. Они размножаются, строят козни и очень, очень злы. Это лишь вопрос времени, когда они восстанут и захватят пустыню. Вы должны нанести удар, пока они еще слабы и не готовы. Найдите входы в их туннели и положите конец этой опасности.\\n\\nО! И раз уж вы всё равно собираетесь туда спуститься, может, соберёте для меня кое-какие предметы? Было бы глупо упускать возможность изучить оружие Гегемонии..."
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.": "У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда была новая луна, я призвал Талерру, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\n\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком «Подними настроение». Пока я на этом соке, я могу чувствовать хоть какую-то надежду, но когда он заканчивается, я почти впадаю в ступор. В прошлый раз так было, я чуть не умер от обезвоживания, пока случайно не зашёл Хоган.\n\nПоэтому я стараюсь держать его в организме постоянно. Но я никогда не был силён в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас."
"Thank you so much. I have another favor to ask: help me avenge my wife's death and retrieve her soul!": "Большое спасибо. У меня есть ещё одна просьба: помоги мне отомстить за смерть моей жены и вернуть её душу!"
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\n\nI also need something to inhibit my memories of despair... it makes the Juice last longer. Some ditzy elf gave me a few bottles last week, but she said she can't make enough to keep me going. Elves: always flaking out when you need 'em! Ahem... no offense to you and your friends, of course.": "У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда была новая луна, я призвал Талерру, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\n\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком «Подними настроение». Пока я на этом соке, я могу чувствовать хоть какую-то надежду, но когда он заканчивается, я почти впадаю в ступор. В прошлый раз так было, я чуть не умер от обезвоживания, пока случайно не зашёл Хоган.\n\nПоэтому я стараюсь держать его в организме постоянно. Но я никогда не был силён в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас.\n\nЕщё мне нужно что-то, что подавляет мои воспоминания об отчаянии... это продлевает действие сока. Какая-то рассеянная эльфийка дала мне несколько бутылок на прошлой неделе, но сказала, что не может сделать достаточно, чтобы я продолжал. Эльфы: всегда подводят, когда нужны! Кхм... конечно, без обид тебе и твоим друзьям."
"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but when it wears off I go almost catatonic. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times, but I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\n\nI also need something to inhibit my memories... there's a potion that does it, but damned if I can get a steady supply of it. But any amount is helpful.\n\nOh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.": "У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда была новая луна, я призвал Талерру, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\n\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком «Подними настроение». Пока я на этом соке, я могу чувствовать хоть какую-то надежду, но когда он заканчивается, я почти впадаю в ступор. В прошлый раз так было, я чуть не умер от обезвоживания, пока случайно не зашёл Хоган.\n\nПоэтому я стараюсь держать его в организме постоянно, но я никогда не был силён в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас.\n\nЕщё мне нужно что-то, что подавляет мои воспоминания... есть зелье, которое это делает, но, чёрт возьми, я не могу наладить постоянные поставки. Но любое количество поможет.\n\nАх да, я был бы очень признателен, если бы ты помог избавиться от этих проклятых фейри-медведей! В последнее время у меня не было возможности уменьшить их численность самому."
"I need you to help me reincarnate Lydia. Her soul is still trapped in this bauble you retrieved for me, but I think I can get her a new body. How? Well... don't ask me how I got a hold of this ritual, because that would make you sad. Instead, just help me bring her back! I need some very specific ingredients. Lord Eltibule is buried with one part. The other parts might be harder to find... but you're resourceful, you can do it!": "Мне нужна твоя помощь, чтобы реинкарнировать Лидию. Её душа всё ещё заперта в этой безделушке, которую ты для меня достал, но я думаю, что смогу найти ей новое тело. Как? Ну... не спрашивай, как я получил этот ритуал, потому что это тебя огорчит. Вместо этого просто помоги мне вернуть её! Мне нужны очень специфические ингредиенты. Лорд Элтибул похоронен с одной частью. Другие части могут быть сложнее найти... но ты находчив, ты справишься!"
"Good. That's all of the ingredients. Now I have some deals to make. I'll complete the ritual when the moon is right. Come visit me later and I'll let you know how it went. You should be proud: you and your friends are lifesavers, literally! Hopefully...": "Хорошо. Все ингредиенты собраны. Теперь мне предстоит заключить несколько сделок. Я проведу ритуал, когда луна будет в нужном положении. Загляни ко мне позже, и я расскажу, как всё прошло. Ты должен гордиться: ты и твои друзья буквально спасатели жизней! Надеюсь..."
"Hi! If you like to help animals, you should help us, because we're animals. And we need help! Sebastian and Grana went away to rescue some smart snails in Verta, but they took too much of our food. Now we don't have enough. When they come back I'll say, 'I'm not mad, I'm just disappointed,' and they'll know I'm actually really mad. But right now we need new food.": "Привет! Если ты любишь помогать животным, тебе стоит помочь нам, потому что мы — животные. И нам нужна помощь! Себастьян и Грана отправились спасать умных улиток в Верте, но они взяли слишком много нашей еды. Теперь у нас её не хватает. Когда они вернутся, я скажу: «Я не злюсь, я просто разочарован», и они поймут, что я на самом деле очень зол. Но сейчас нам нужна новая еда."
"You did it! That's a lot of food! Now you should go help more animals since you like helping animals. You should go find Red and Mittens, they need help. But it's really cold in Kur and I can't go. Okay, love you, bye.": "Ты справился! Это много еды! Теперь тебе стоит помочь ещё больше животным, раз тебе нравится помогать животным. Тебе стоит найти Реда и Миттенса, им нужна помощь. Но в Кур очень холодно, и я не могу пойти. Ладно, люблю тебя, пока."
"I want Amulna to be a welcoming place for all creatures, but so few desert-dwellers behave appropriately. Even our fellow Rakshasa have attacked our settlement several times this year. And then the roving packs of cat-things attacked... and of course those ridiculous human-faced cat things...\n\nSimply put, the Sand Seer is the only reason we haven't been overrun already. But she won't be living here forever. This part of the desert must be made more secure!": "Я хочу, чтобы Амульна была гостеприимным местом для всех существ, но так мало обитателей пустыни ведут себя должным образом. Даже наши сородичи ракшасы несколько раз в этом году нападали на наше поселение. А потом напали бродячие стаи кошачьих... и, конечно, эти нелепые кошки с человеческими лицами...\\n\\nПроще говоря, Песчаная Провидица — единственная причина, по которой нас ещё не захватили. Но она не будет жить здесь вечно. Этот участок пустыни должен стать более безопасным!"
"Ah, all current and future citizens of Amulna thank you! We won't forget your hard work.\n\nThe Sand Seer mentioned that she needed the help of you and your friends -- you should see her as soon as you can.": "Ах, все нынешние и будущие жители Амулны благодарят тебя! Мы не забудем твою тяжёлую работу.\\n\\nПесчаная Провидица упоминала, что ей нужна помощь тебя и твоих друзей — тебе следует навестить её как можно скорее."
"When I beseeched Talerra, she told me what I'd somehow known all along: my Lydia didn't fade into blessed nothing. The thing that killed her captured her soul and keeps it as a trinket.\n\nI'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.": "Когда я умолял Талерру, она сказала мне то, что я как-то знал всё время: моя Лидия не растворилась в благословенном ничто. Существо, которое убило её, захватило её душу и хранит её как безделушку.\n\nЯ бессилен её спасти — она в этом проклятом фейском мире, но я не знаю портала, через который туда попасть. Должен быть какой-то другой путь. Если найдёшь вход, убей всех бесов, которых сможешь! Ищи плавающую змееподобную тварь под названием Пак Отчаяния. У неё будет душа Лидии."
"This is her soul? Oh... oh. I guess I should shatter it and free her, huh. ...\n\nI can't do it! She's in pain in here, but I can't bring myself to release her. There has to be another way! If only Lord Eltibule were still alive. Hmm... that gives me an idea...": "Это её душа? О... о. Полагаю, мне стоит разбить её и освободить её, да? ...\n\nЯ не могу этого сделать! Ей здесь больно, но я не могу заставить себя отпустить её. Должен быть другой способ! Если бы только лорд Элтибул был ещё жив. Хмм... у меня появилась идея..."
"We need all the help we can get. The demons seem to be never-ending, and our supplies are ever-dwindling. Armor, weapons, rations - you name it, we need it! Statehelm is providing as many as they can, but it's simply not enough. Can we count on you and your people to aid us?": "Нам нужна вся возможная помощь. Демонов, кажется, не счесть, а наши запасы постоянно истощаются. Доспехи, оружие, пайки — что угодно, нам это нужно! Стейтхелм предоставляет столько, сколько может, но этого просто недостаточно. Можем ли мы рассчитывать на вас и вашу команду?"
"Excellent work. Excellent work! With these supplies, we have a fighting chance after all. Your assistance will not soon be forgotten, not by me nor any of my troops.": "Отличная работа. Отличная работа! С этими припасами у нас всё же есть шанс на победу. Твоя помощь не будет забыта ни мной, ни моими войсками."
"Been working on a new tailoring technique where I inlay the cloth with silver. But I ain't got no silver left. Get me some?": "Работаю над новой техникой портняжного дела — встраиваю серебро в ткань. Но у меня не осталось серебра. Принесёшь немного?"
"Yep, that's the stuff. Here, take this. It was my first attempt, but I think I can do better.": "Да, вот оно. Вот, возьми это. Это была моя первая попытка, но я думаю, что могу сделать лучше."
"Hmm, can I trust you? Well, I guess I have no choice. One of the secret ingredients in my signature dish is ground up grimalkin hair. But not just ordinary hair -- it's got to be covered in their spit! If you find some of those giant hairballs, bring them to me, okay?": "Хм, могу ли я тебе доверять? Ну, похоже, у меня нет выбора. Один из секретных ингредиентов моего фирменного блюда — измельчённые волосы грималкин. Но не просто обычные волосы — они должны быть покрыты их слюной! Если найдёшь несколько гигантских волосяных комков, принеси их мне, хорошо?"
"Ugh, they stink! Just... put them over there. Now, what do I owe you? Oh, right, you were doing me a favor! So I owe you nothing but my thanks. Thanks!\n\nFine, fine, here, take this money also.": "Фу, они воняют! Просто... положи их туда. А теперь, что я тебе должен? Ах да, ты же делал мне одолжение! Так что я должен тебе только благодарность. Спасибо!\\n\\nЛадно, ладно, вот, возьми ещё эти деньги."
"Kill in my name and you shall have the knowledge that you seek: schematics for armor that is strong enough even for you!": "Убей от моего имени, и ты получишь знание, которое ищешь: чертежи брони, достаточно прочной даже для тебя!"
"Your prowess in battle is great, but watch that it does not eclipse your armorsmithing.": "Твоё мастерство в бою велико, но следи, чтобы оно не затмевало твоё кузнечное дело."
"Oh, right, the spices. Before I let you have some, can you bring me some cranberries? Cranberries are <i>amazing</i> with turkey. ": "О, точно, специи. Прежде чем я дам тебе немного, можешь принести мне клюкву? Клюква <i>потрясающе</i> сочетается с индейкой."
"Thanks! Here, have a packet of spices. If you need more, I'll trade you spices for turkeys.": "Спасибо! Вот пакет специй. Если нужно больше, я обменяю специи на индюков."
"I want some meatballs. Think you can do meatballs? But it needs to have something harvest-y going on.  You'll have to find the recipe yourself.\n\nAnd remember, no actual dead turkeys -- or gods forbid, cows!": "Я хочу фрикадельки. Думаешь, сможешь сделать фрикадельки? Но в них должно быть что-то связанное с урожаем. Рецепт тебе придётся найти самому.\\n\\nИ помни, никаких настоящих мёртвых индюшек — и, не дай бог, коров!"
"Nice! It even holds together, more or less. Good job!": "Отлично! Он даже более-менее держится вместе. Хорошая работа!"
"Tofu can be made in three main ways. Firm tofu is used when the recipe calls for a protein that won't fall apart! I can teach you how to make it in exchange for a fresh Brunost cheese.": "Тофу можно приготовить тремя основными способами. Плотное тофу используется, когда в рецепте нужен белок, который не развалится! Я могу научить тебя делать его в обмен на свежий сыр Бруност."
"Ah, this brunost is wet and squishy, exactly like firm tofu isn't! Ha! Here's the technique.": "Ах, этот бруност мокрый и мягкий, совсем не как плотный тофу! Ха! Вот техника."
"It's the harvest season and all my friends are eating turkey: perfectly baked turkey, turkey stir-fry, turkey pot pie ... But killing turkeys to consume their flesh is obviously wrong.\n\nI hear you can make fake meat out of that fake milk somehow. I don't know if I believe myself, but it sure would be convenient to have a plant-based turkey!\n\nI hear that Braigon in Eltibule knows how. Why don't you go ask him?": "Сезон урожая, и все мои друзья едят индейку: идеально запечённую индейку, жаркое из индейки, пирог с индейкой... Но убивать индейку ради мяса — это явно неправильно.\\n\\nЯ слышал, что из этого искусственного молока можно как-то сделать фальшивое мясо. Не знаю, верю ли я в это сам, но было бы очень удобно иметь растительную индейку!\\n\\nГоворят, что Брайгон в Элтибуле знает, как это сделать. Почему бы тебе не спросить его?"
"Some rakshasa wants to know about tofu? Are you sure he didn't mean cheese? Everyone loves cheese! Tofu is so boring, so last decade. But sure. Do me a couple of favors and I'll show you the basics.": "Какой-то ракшаса хочет узнать про тофу? Ты уверен, что он не имел в виду сыр? Все любят сыр! Тофу такой скучный, уже прошлое десятилетие. Но ладно. Сделай для меня пару одолжений, и я покажу тебе основы."
"Plain old tofurkey is ... plain. Bring me a better one! One with some bite! Maybe some citrus to cut the savory some. But you'll have to find the recipe yourself.": "Простой тофурки... слишком простой. Принеси мне получше! С изюминкой! Может, с цитрусом, чтобы сбалансировать вкус. Но рецепт тебе придётся найти самому."
"This is great -- thanks!": "Это здорово — спасибо!"
"My friend Kelim in Amulna says he's got some spices that might help this fake meat taste more like turkey. I think he's trying a little too hard to sell me on them, you know? But it might work.\n\nGo see if he'll give you some harvest spices.": "Мой друг Келим в Амульне говорит, что у него есть специи, которые могут помочь этому искусственному мясу больше походить на индейку. Мне кажется, он слишком старается меня убедить, понимаешь? Но, может, это сработает.\\n\\nПойди и посмотри, даст ли он тебе немного урожайных специй."
"Ricatu sent you? Yes! I can get rid of some of these infernal spices! Er ... I mean ...\n\nYeah. I don't know if the harvest spices I have will help with the taste of this fake meat, but help me out, do me a favor or two, and I'll give you some to take back to him.": "Рикату послал тебя? Отлично! Я могу избавиться от части этих адских специй! Эээ... то есть...\\n\\nДа. Не знаю, помогут ли мои урожайные специи улучшить вкус этого искусственного мяса, но помоги мне, сделай пару одолжений, и я дам тебе немного, чтобы отнести ему."
"Now you know the most bland, basic tofu dish. Take that back to your rakshasa and see what he thinks.\n\nAnd if you want to know how to make fancier kinds of tofu, I suppose I could trade that fancy knowledge for some fancy cheese...": "Теперь ты знаешь самый простой и пресный рецепт тофу. Отнеси это своему ракшасе и посмотри, что он скажет.\\n\\nА если хочешь узнать, как приготовить более изысканные виды тофу, полагаю, я могу обменять эти знания на изысканный сыр..."
"This is the fake meat? Hmm ... It's a bit bland. Doesn't really taste like turkey. Maybe chicken, though ...": "Это фальшивое мясо? Хмм... Оно немного пресное. Не очень похоже на индейку. Хотя, может, на курицу..."
"Milking non-sentient cows is exploitation! Or I think it might be -- this morality thing is <i>hard</i>. And there aren't really enough sentient cows to go around.\n\nAnyway, I want to try this fake milk I've been hearing about. I'll teach you the recipe if you don't know it. I picked it up from a dead goat.": "Доить несознательных коров — это эксплуатация! Или, по крайней мере, я так думаю — эти вопросы морали <i>сложны</i>. Да и сознательных коров всё равно слишком мало.\\n\\nВ любом случае, я хочу попробовать этот искусственный молоко, о котором слышал. Я научу тебя рецепту, если ты его не знаешь. Я узнал его от мёртвой козы."
"Huh. It's not half bad! Doesn't taste much like milk to me, but it's tasty enough.\n\nHere, here's a small reward for helping me.": "Хм. Неплохо! На мой вкус, молоком не пахнет, но достаточно вкусно.\\n\\nВот, небольшой подарок за помощь."
"I really need a good dipping sauce to go with all this 'meat'. I heard you can do something with pumpkins -- that should be interesting.  But you'll have to find the recipe yourself.": "Мне действительно нужен хороший соус для макания ко всему этому «мясу». Я слышал, что ты умеешь что-то делать с тыквами — это должно быть интересно. Но рецепт тебе придётся найти самому."
"I like this a lot. It's not exactly a sauce, I guess, but it tastes great on raw vegetables. Thanks!": "Мне это очень нравится. Это, наверное, не совсем соус, но на сырых овощах вкусно. Спасибо!"
"Are you still stuck on the tofu thing? Tofu is useless on its own, that's why I stopped pursuing it. It's not really worth eating alone, like cheese is! I could teach you some nice cheese recipes instead ... No?\n\nOkay. Well I'm working on some Roquefort, and I need pungent rennet. Get it for me and I'll teach you a simple tofu recipe.": "Ты всё ещё застрял на теме тофу? Тофу бесполезен сам по себе, поэтому я перестал этим заниматься. Его не стоит есть в одиночку, как сыр! Я мог бы научить тебя нескольким хорошим рецептам сыра... Нет?\\n\\nЛадно. Я сейчас работаю над рокфором и мне нужна резкая сычужная закваска. Принеси её мне, и я научу тебя простому рецепту тофу."
"Smell that rennet!\n\nHere, this is how you make the most very basic tofu meal. Just remember: cheese is inherently better! ": "Почувствуй этот сычужный запах!\\n\\nВот как приготовить самый простой тофу-блюдо. Только помни: сыр всегда лучше!"
"Tofu can be made in three main ways. Soft tofu is even mushier than regular tofu. Personally I think it tastes disgusting, but perhaps you're more cultured than me!\n\nI can teach you how to make it in exchange for a fresh brie.": "Тофу можно приготовить тремя основными способами. Мягкое тофу ещё более кашеобразное, чем обычное. Лично я считаю, что оно отвратительно на вкус, но, возможно, ты более утончён, чем я!\\n\\nЯ могу научить тебя делать его в обмен на свежий бри."
"Oh, this brie is lovely! I'm going to enjoy this for lunch! Here's the technique for making disgusting soft tofu.": "О, этот бри просто восхитителен! Я собираюсь насладиться им за обедом! Вот техника приготовления отвратительного мягкого тофу."
"I used to really enjoy beef kebabs. There's just something <i>primal</i> about ripping chunks of flesh off a pointy stick. I mean, that's disgusting to me now, but ... It was kind of fun.\n\nAnyway, think you could whip up something similar? You'll have to find the recipe yourself.": "Раньше я очень любил говяжьи кебабы. В этом есть что-то <i>первобытное</i> — отрывать куски мяса с острого шампура. Сейчас мне это кажется отвратительным, но... было довольно весело.\\n\\nВ любом случае, думаешь, сможешь приготовить что-то похожее? Рецепт тебе придётся найти самому."
"This is a lot less satisfying than I thought it would be. But that's on me. Thanks for trying!": "Это гораздо менее удовлетворительно, чем я ожидал. Но это моя вина. Спасибо, что попытался!"
"Kelim was telling me about a turkey meatloaf he ate recently, and it sounded really good. Think you can do the same thing with tofurkey? You'll have to find the recipe yourself.": "Келим рассказывал мне о мясном хлебце из индейки, который он недавно ел, и это звучало очень вкусно. Думаешь, сможешь сделать то же самое с тофуркой? Тебе придётся найти рецепт самостоятельно."
"Eh, this is okay I guess. Doesn't really make the tofurkey shine, but you did what you could. Thanks.": "Ну, в общем, сойдёт. Тофурки это не особо украшает, но ты сделал, что мог. Спасибо."
"Plain old tofurkey is ... kind of dry. Gravy helps, but I bet you can do better. Maybe a sauce ... Oh! How about cranberry sauce! You'll have to find the recipe yourself, though.": "Простой тофурки... немного суховат. Подливка помогает, но уверен, ты сможешь сделать лучше. Может, соус... О! Как насчёт клюквенного соуса! Но рецепт тебе придётся найти самому."
"Braigon was right -- cranberry <i>is</i> amazing, even with fake turkey. Thanks!": "Брейгон был прав — клюква действительно удивительна, даже с искусственной индейкой. Спасибо!"
"If Ricatu thinks my spices will help his fake turkey, more power to him. Why don't you cook him a fake turkey meal and ask him how it tastes?\n\nI don't have any recipes for that -- you'll have to find one yourself!": "Если Рикату думает, что мои специи помогут его поддельной индейке, пусть так. Почему бы тебе не приготовить ему блюдо из поддельной индейки и не спросить, как оно на вкус?\\n\\nУ меня нет рецептов для этого — тебе придётся найти их самому!"
"Hmm ... Hmm! Yeah, this will do! It's not quite right but it isn't horrible. Thanks!\n\nI think I'll call it tofurkey. It's a pun, or play on words, see? ": "Хм... Хм! Да, сойдёт! Это не совсем то, что нужно, но и не ужасно. Спасибо!\\n\\nДумаю, я назову это тофурки. Это игра слов, понимаешь?"
"Gravy would be perfect with this tofurkey you brought me -- give it some extra moistness. Can you make me some? You'll have to find the recipe yourself, though.": "Подливка была бы идеальна с этой индюшатиной, что ты мне принес — придаст ей дополнительную сочность. Можешь сделать мне немного? Но рецепт придётся найти самому."
"Ah, this gravy works wonders! And no moral complications! Thanks!": "Ах, этот соус творит чудеса! И никаких моральных осложнений! Спасибо!"
"I prefer real meat, and I love a good turkey sandwich this time of year. Damned turkeys can be hard to find, though. They hide in underbrush, and there's not much of that around here!\n\nYou might have to travel a bit, but see if you can whack a few and bring me back their plump, juicy carcasses.": "Я предпочитаю настоящее мясо и в это время года обожаю хороший сэндвич с индейкой. Но чёртовых индюков трудно найти — они прячутся в подлеске, а у нас тут его почти нет!\\n\\nВозможно, придётся немного попутешествовать, но постарайся поймать пару и принеси мне их упитанные, сочные туши."
"This will work! A little oregano, some salt ... Thanks!": "Это сработает! Немного орегано, немного соли... Спасибо!"
"I'm working on some mozzarella right now. Bring me some whey and we'll talk about the tofu.": "Я сейчас занимаюсь моцареллой. Принеси мне сыворотку, и мы поговорим о тофу."
"Yeah, yeah, this will work. Thanks!\n\nTofu is really, really simple.  Curdle some soy milk, strain out the solid bits and press out the rest of the liquid in a tofu press. It's actually a lot like cheese, except you don't age it -- and it's much more boring. <i>Too</i> simple.\n\nI don't have one here, but I think there's an old tofu press setup down in the dungeon with all those goblins.": "Да, да, это сработает. Спасибо!\\n\\nТофу очень, очень простой. Сверни соевое молоко, отцеди твёрдые части и выжми остальную жидкость в прессе для тофу. На самом деле это очень похоже на сыр, только его не выдерживают — и он намного скучнее. <i>Слишком</i> простой.\\n\\nУ меня здесь нет пресса, но, думаю, в подземелье с этими гоблинами есть старый пресс для тофу."
"Okay this is a secret, but I guess I have to trust somebody here, so congrats, it's you! Now don't fuck this up! For my best potions I need oil of hatred. HATRED. Not oil of malaise, not oil of greed, not oil of disgust. Oil of hatred! Can you handle that? No, I don't know where it comes from. Back home we just bought it at the market. Around here it's harder to find, but it's gotta be somewhere...": "Ладно, это секрет, но, похоже, мне нужно кому-то здесь доверять, так что поздравляю, это ты! Только не облажайся! Для моих лучших зелий мне нужно масло ненависти. НЕНАВИСТИ. Не масло недомогания, не масло жадности, не масло отвращения. Масло ненависти! Справишься с этим? Нет, я не знаю, откуда оно берётся. У нас дома мы просто покупали его на рынке. Здесь его найти сложнее, но оно должно быть где-то..."
"You finally did something right! Wait... the top's not sealed properly. How much of my hatred oil evaporated? Look, the bottle's partially empty! Everybody knows that hatred oil is supposed to be wax-sealed. This has been tampered with! We're going to have to renegotiate your pay... here's what I think you deserve.": "Ты наконец-то сделал что-то правильно! Подожди... крышка запечатана плохо. Сколько моего масла ненависти испарилось? Смотри, бутылка наполовину пуста! Всем известно, что масло ненависти должно быть запечатано воском. С этим что-то сделали! Нам придётся пересмотреть твою оплату... вот что, по моему мнению, ты заслуживаешь."
"If you travel in these caves you will meet violent myconians. Either you or they shall die. If it is they who die, please bring back any intact heartshrooms you find. We can regrow myconians from them.": "Если ты путешествуешь по этим пещерам, ты встретишь агрессивных микониан. Либо ты, либо они погибнете. Если погибнут они, пожалуйста, принеси любые целые сердцевидные грибы, которые найдёшь. Мы можем вырастить микониан заново из них."
"Thank you. We will regenerate these myconians and retrain them. It will take several years, but if you return I will make sure they thank you for saving them.\n\n<i>[You gain Myconic XP.]</i>": "Спасибо. Мы восстановим этих микониан и переобучим их. Это займет несколько лет, но если ты вернешься, я позабочусь, чтобы они поблагодарили тебя за спасение.\\n\\n<i>[Ты получаешь миконический опыт.]</i>"
"I found one of these delicious morsels in Statehelm once and tried to track down the source. All I know is that they're from a place called Serbule.": "Однажды я нашёл одну из этих вкусных штучек в Стейтхелме и попытался выяснить источник. Всё, что я знаю — они из места под названием Сербуль."
"Bzz. BzzZZzzz ...\nWe need your help, fairy. The nibbling sprouts burrow under the ground.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nThey ambush us while we pollinate. You must kill them!\n\nBzzRtxl!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Грызущие ростки роются под землёй.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nОни устраивают засады, пока мы опыляем. Ты должен их убить!  \n\nБззРтхл!"
"BzzZz! [Which you think means, 'Thanks!']": "Жжжж! [Что, как ты думаешь, значит «Спасибо!»]"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. The spriggan weeds ambush us while we pollinate.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Спригганы-сорняки устраивают засады, пока мы опыляем.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. Bears attack while we sleep, stealing our resources and injuring our warriors.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Медведи нападают, пока мы спим, крадут наши ресурсы и ранят наших воинов.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"Bzz. BzzZZzzz ...\nWe cannot pollinate the red flowers nearby. This endangers future honey potential!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!": "Бзз. БззЗЗзз...  \nМы не можем опылять красные цветы поблизости. Это ставит под угрозу будущий урожай мёда!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nПожалуйста, опыли их для нас!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. Frost Hippogriffs graze on our flowers. Unlike other ungulates, their beaks are freezing cold, and they kill most flowers they touch. They do not belong in this world!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Морозные гиппогрифы пасутся на наших цветах. В отличие от других копытных, их клювы ледяные, и они убивают большинство цветов, к которым прикасаются. Им не место в этом мире!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"Bzz. BzzZZzzz ...\nWe cannot pollinate our distant flower holdings. This endangers future honey potential!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!": "Бзз. БззЗЗзз...  \nМы не можем опылять наши отдалённые цветочные владения. Это ставит под угрозу будущий потенциал мёда!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nПожалуйста, опыли их для нас!"
"Bzz. BzzZZzzz ...\nOur plan is ruined! We invented pre-germinated seeds to help flowers grow in far-away places. But ice fairies have dug them up and are eating them!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease retrieve some of our seeds!": "Бзз. БззЗЗзз...  \nНаш план провален! Мы изобрели пророщенные семена, чтобы помочь цветам расти в отдалённых местах. Но ледяные феи выкопали их и едят!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nПожалуйста, верни нам немного наших семян!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. Fae canines, barghest, ambush us while we pollinate.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Фейские псы, баргесты, устраивают засады, пока мы опыляем.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. Our two freshest flowers are covered in pixies and we cannot approach.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Наши два самых свежих цветка покрыты пикси, и мы не можем к ним подойти.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nПожалуйста, опыли их для нас!"
"Bzz. BzzZZzzz ...\nSerpent creatures are attacking our hidden caches of honey! Our strongest warriors could not stop them. We need your help... Bzzz... But you will need more help!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n Join your hivemates and kill the basilisks!": "Бзз. БззЗЗзз...  \nЗмеиные существа нападают на наши скрытые запасы мёда! Наши сильнейшие воины не смогли их остановить. Нам нужна твоя помощь... Бззз... Но тебе понадобится помощь!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nПрисоединись к своим сотоварищам и убей базилисков!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. We yearn to pollinate, but travel is unsafe! Raptors attack our troops in transit!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Мы жаждем опылять, но путешествовать небезопасно! Ящеры нападают на наши войска в пути!  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"Bzz. BzzZZzzz ...\nWe need your help, fairy. Winter seems to be arriving and we must prepare to hibernate. Fire elementals will ambush us while we sleep.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!": "Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Похоже, наступает зима, и нам нужно подготовиться к спячке. Огненные элементали устроят нам засаду, пока мы спим.  \n\nБзз. ЗззЗззЗзБз... зззБзт!  \nТы должна их убить!"
"I'm supposed to be making a custom chair for someone, but damned if I can manage to get it to come out right. Are you good with wood? Here's the specifications. See? Slightly too tall and slightly too short.": "Я должен сделать индивидуальный стул для одного человека, но, черт возьми, никак не могу добиться, чтобы он получился правильным. Ты хорошо разбираешься в дереве? Вот спецификации. Видишь? Слегка слишком высокий и слегка слишком низкий."
"You know, when you walked away without even writing down the proportions, I was sure that you were gonna blow me off. But you actually did it, and you got the measurements right, too. Huh. Well good work. I'll take it from here.": "Знаешь, когда ты ушёл, даже не записав пропорции, я был уверен, что ты меня кинешь. Но ты действительно сделал это и правильно снял мерки. Хм. Отличная работа. Я возьму отсюда на себя."
"Hey, you're the chair-wizard. You made that chair for me a while back, right? Well, I could really use your help this time. Here, look a this. See? Yeah. This is a quality chair. Far beyond my skill, I'll admit. And it needs to be made to these exact measurements.\n\nI'm not saying you owe me anything. I'm just saying, since you obviously like making chairs so much...": "Эй, ты же мастер по стульям. Ты сделал тот стул для меня некоторое время назад, верно? Ну, на этот раз мне действительно нужна твоя помощь. Вот, посмотри на это. Видишь? Да. Это качественный стул. Гораздо выше моего мастерства, признаю. И его нужно сделать точно по этим размерам.\\n\\nЯ не говорю, что ты мне что-то должен. Просто говорю, раз тебе явно так нравится делать стулья..."
"Haha! You did it! The chair wizard strikes again. Here. This is half the money I got for the job.": "Ха-ха! Ты справился! Волшебник стульев снова в деле. Вот. Это половина денег, которые я получил за работу."
"I've been looking all over for you!\n\nI delivered that last chair and got lots of compliments. And now I've got an incredibly tough order. I can't even get other carpenters in town to make this for me!\n\nYou're my best chance. I will give you half -- no, two thirds of the money for the job.": "Я искал тебя повсюду!\\n\\nЯ доставил тот последний стул и получил много похвал. А теперь у меня невероятно сложный заказ. Я даже не могу найти других плотников в городе, чтобы сделать это за меня!\\n\\nТы — моя лучшая надежда. Я отдам тебе половину — нет, две трети денег за работу."
"Wow. The polish on this chair is immaculate. You went all out! And I'm going to reap the rewards! Haven't learned my lesson yet, hahaha!": "Вау. Полировка этого стула безупречна. Ты постарался на славу! И я пожну плоды! Всё ещё не учусь на своих ошибках, ха-ха-ха!"
"It's coming up on that time of year again: the anniversary of my Lennel's death at the hands of a bear. I was wondering if you could do a poor widow a favor. Could kill some bears for me? I'm not too particular about the type of bear. I hate all bears! Every one of them. And they're a menace to humanity, that's what I say. They kill humans! Why do we allow them to live?! I'll tell you why: magic's made us soft. People don't go out of town anymore so they don't realize how deadly the bears are. But you and I, we're no fools.": "Приближается то время года: годовщина смерти моего Леннела от рук медведя. Я хотела узнать, не могли бы вы оказать бедной вдове услугу. Могли бы убить для меня несколько медведей? Мне не важно, какого они вида. Я ненавижу всех медведей! Каждого из них. И они — угроза для человечества, вот что я скажу. Они убивают людей! Почему мы позволяем им жить?! Я скажу почему: магия сделала нас слабыми. Люди больше не выходят за пределы города, поэтому не понимают, насколько медведи опасны. Но ты и я — мы не дураки."
"Yes! We have to take matters into our own hands! The Council isn't going to kill those bears until they try to invade the city. By then it'll be too late. You did the right thing. This money will assuage any misconcieved feelings of guilt.": "Да! Мы должны взять дело в свои руки! Совет не станет убивать этих медведей, пока они не попытаются вторгнуться в город. К тому времени будет слишком поздно. Ты поступил правильно. Эти деньги снимут любые необоснованные чувства вины."
"Oh it's so nice to have your ear! Well, my husband was killed by a bear a long time ago. And I witnessed it! We were hiking through the forests south of here, as young lovers do, and came upon a bear with green fur. Lennel was a strong man but stupid, and he tried to hit it with a longbow. The bear killed him, scattering blood everywhere, and then it did the most cursed thing: it picked up his bow, stared right into my eyes, and snapped the bow over its knee. It was a very human thing to do.\n\nI learned that the locals call him the Mangler. And I promise you this: it has been decades, but my hatred still runs deep. I've paid to have him killed, but he's immortal and he keeps coming back! No, what really upsets him is to see his beloved friend injured. They call that one The Mauler. If you ask me I think they're gay bears who are gay for each other, but nobody ever asks me. After you kill The Mauler, say \"This one's for Lennel.\"": "Ох, как приятно, что ты меня слушаешь! Мой муж был убит медведем много лет назад. И я была свидетелем этого! Мы гуляли по лесам к югу отсюда, как молодые влюблённые, и наткнулись на медведя с зелёной шерстью. Леннел был сильным мужчиной, но глупым, и он попытался ударить его из длинного лука. Медведь убил его, разбрызгав кровь повсюду, а потом сделал самое проклятое: поднял его лук, посмотрел прямо мне в глаза и сломал лук пополам. Это было очень по-человечески.\n\nЯ узнала, что местные называют его Манглером. И я обещаю тебе: прошло уже десятилетия, но моя ненависть всё ещё глубока. Я платил, чтобы его убили, но он бессмертен и продолжает возвращаться! Нет, что действительно его расстраивает — видеть, как ранят его любимого друга. Его зовут Моляр. Если хочешь знать моё мнение, я думаю, что это гей-медведи, влюблённые друг в друга, но меня никто никогда не спрашивает. После того как убьёшь Моляра, скажи: «Это за Леннела."
"Did you say it? \"This one's for Lennel\"? Oh, it brings a malicious tear to my eye knowing that bear was upset. They'll be back, and they'll outlive me, but I will make them rue the day they heard the name of Lennel White! That's a promise. Oh where are my manners. This is for you.": "Ты это сказал? «Этот для Леннела»? О, у меня на глазах злобная слеза от мысли, что тот медведь был расстроен. Они вернутся и переживут меня, но я заставлю их пожалеть о дне, когда услышали имя Леннел Уайт! Это обещание. О, где мои манеры. Это для тебя."
"Hi, %PLAYER_NAME%, I wanted to report back about my sleep habits. I've got the infestation cleared and the sound and odor issues under control! But it's slightly too chilly. The standard-issued blanket is too thin. I need a replacement!": "Привет, %PLAYER_NAME%, я хотел сообщить о своих привычках сна. Я избавился от заражения, и проблемы со звуком и запахом под контролем! Но немного холодновато. Стандартное одеяло слишком тонкое. Мне нужна замена!"
"Oh, how kind. Now I'm sure to get perfect sleep, thanks to you!": "О, как мило. Теперь я точно буду спать прекрасно, благодаря тебе!"
"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Fransesca Muradrake, and you can keep the tip. Let me know when it's done, though, okay? I'm still responsible for it. And don't steal it. Stealing is bad.": "Я сегодня так отстаю с доставками! Не мог бы ты помочь? Эта штука меня пугает. Отнеси её Франческе Мурадрейк, а чаевые можешь оставить себе. Только дай знать, когда всё будет сделано, хорошо? Я всё ещё за это отвечаю. И не воруй. Воровство — это плохо."
"I knew I could trust you! I appreciate the help. Necromancy gives me icky feelings. We don't have necromancy in the fae realm! It's gross.": "Я знал, что могу тебе доверять! Благодарю за помощь. Некромантия вызывает у меня неприятные ощущения. В царстве фей некромантии нет! Это отвратительно."
"Oh. You do delivery work? I'm very mildly surprised. Thank you for these. They'll be very useful.": "О. Ты занимаешься доставкой? Я слегка удивлён. Спасибо за это. Это будет очень полезно."
"I have a big test coming up at school and I need to be at my best. I could literally die if I'm not! This school is nuts! I need more pineal juice, but not the weak stuff you brought me before.\n\nHere. I bribed an alchemist at the mage college to get this recipe. Of course, I don't know how to actually do alchemy, so I'll leave it up to you.": "У меня скоро большой экзамен в школе, и я должен быть в лучшей форме. Если нет — я буквально могу умереть! Эта школа сумасшедшая! Мне нужно больше сока шишковидной железы, но не тот слабый, что ты приносил раньше.\\n\\nВот. Я подкупил алхимика в колледже магов, чтобы получить этот рецепт. Конечно, я не умею заниматься алхимией, так что оставляю это тебе."
"Wow. This stuff is potent!\n\nIf you think about it, me giving you that recipe was part of your payment. If you look at it this way you'll see that you're getting a pretty good deal for this stuff!": "Вау. Эта штука очень сильная!\\n\\nЕсли подумать, то я дал тебе этот рецепт в качестве части оплаты. Если смотреть на это так, ты получаешь довольно выгодную сделку за эту вещь!"
"Hey how about one more tall glass of that brown ale? Don't worry, I can hold my stuff.": "Эй, как насчёт ещё одного высокого бокала этого коричневого эля? Не волнуйся, я умею держать своё."
"Perfect! You know what, you're my favorite barkeep! Well, if you had a bar, I'd definitely be there!\n\nAssuming it was close to the docks. I mean, you need to know your audience. What are you even trying to do with this business, anyway?": "Отлично! Знаешь что, ты мой любимый бармен! Если бы у тебя был бар, я бы точно там был!\\n\\nЕсли бы он был рядом с доками. Надо же знать свою аудиторию. Что ты вообще пытаешься сделать с этим бизнесом?"
"Hey, it's you again. Remember when you got me flitterbies? I was thinking about them. I bet you guys have no idea how flitterbies work! They're maleable to their environment even after they grow. If you have a ton of citrus on you when you pick one, it'll come out smelling citrusy itself!\n\nCan you confirm this actually works like I expect? Sometimes mortal-realm variants can act weird.\n\n<i>[To advance this quest you must have 100+ citrus items in your inventory when you pick flitterbies.]</i>": "Эй, это снова ты. Помнишь, когда ты принес мне флиттербис? Я подумала о них. Бьюсь об заклад, вы, ребята, понятия не имеете, как работают флиттербисы! Они подстраиваются под окружающую среду даже после того, как вырастают. Если у тебя при сборе будет много цитрусовых, они сами будут пахнуть цитрусом!\n\nМожешь подтвердить, что это действительно работает так, как я ожидаю? Иногда варианты из смертного мира ведут себя странно.\n\n<i>[Чтобы продвинуть этот квест, у тебя должно быть более 100 цитрусовых предметов в инвентаре при сборе флиттербис.]</i>"
"See, what did I tell you? These flitterbies smell better! There's a distinct citrus smell that kind of masks their other odors.\n\nThat means these are real flitterbies, not some weird lookalike. Thank you for helping me prove that. My upcoming botanical book needs to be extremely accurate.": "Видишь, что я тебе говорил? Эти флиттерби пахнут лучше! У них отчётливый цитрусовый запах, который как бы маскирует остальные ароматы.\\n\\nЭто значит, что это настоящие флиттерби, а не какие-то странные двойники. Спасибо, что помог мне это доказать. Моя будущая ботаническая книга должна быть предельно точной."
"Did you know there's really such a thing as a Salmpo? They're abominations. Created by amateur alchemists, mostly. I don't exactly know what they look like, but I've heard their hearts are made of leafy greens! I've always wanted to try one. Just to know what I taste like. So to speak.": "Знаешь ли ты, что Салмпо действительно существует? Это отвратительные создания. В основном их создают любители-алхимики. Я точно не знаю, как они выглядят, но слышал, что их сердца сделаны из листовой зелени! Мне всегда хотелось попробовать одного. Просто чтобы узнать, какой у меня вкус. Так сказать."
"This is a Salmpo heart? Really?\n\nLet me take a test bite ... well, it tastes like cabbage. I'm a little disappointed, but very thankful to finally have an answer to this very important question.": "Это сердце Салмпо? Серьёзно?\\n\\nДай-ка я попробую на вкус... ну, на вкус как капуста. Я немного разочарован, но очень благодарен, что наконец получил ответ на этот очень важный вопрос."
"One of my fae friends said that there are flitterbies growing here in this country, somewhere far south of here in a land called Eltibule. I need one for my drawings!": "Одна из моих фейных подруг сказала, что здесь, в этой стране, где-то далеко на юге, в земле под названием Элтибуль, растут флиттербисы. Мне нужен один для моих рисунков!"
"Yep, those are flitterbie! Look at them twinkle! They even smell right! I mean, they smell like angry meat, but the smell is <i>correct</i> for flitterbies.\n\nYou guys know flitterbies are invasive, right? I don't know what dummy planted these here but you'll never get rid of them now. They're immortal. Not great for mortal ecosystems.\n\nBut I'm sure the wizards will figure something out before it gets too serious. Time to take this home and draw it for my book!": "Да, это флиттерби! Посмотри, как они мерцают! Они даже пахнут правильно! То есть, пахнут как злое мясо, но запах <i>правильный</i> для флиттерби.\n\nВы же знаете, что флиттерби — инвазивный вид, правда? Я не знаю, какой дурак их здесь посадил, но теперь от них не избавиться. Они бессмертны. Не очень хорошо для смертных экосистем.\n\nНо я уверен, что волшебники что-нибудь придумают, прежде чем ситуация станет слишком серьёзной. Пора взять это домой и нарисовать для моей книги!"
"Me and Jenny Foster have a prank war going on. You know, the server at the coffee shop? Yeah. She loves pranks! But she's terrified of osslars. Osslars are some kind of demon thing and apparently she had a scary experience with them. So you know what that means!\n\nThis will be a prank for the history books of this mortal realm. I'm gonna animate the skull and have it talk to her!": "У меня и Дженни Фостер идёт война розыгрышей. Знаешь, сервер в кофейне? Да. Она обожает розыгрыши! Но она боится оссларов. Осслары — это какие-то демонические создания, и, по-видимому, у неё был с ними страшный опыт. Так что ты понимаешь, что это значит!\\n\\nЭтот розыгрыш войдёт в историю этого смертного мира. Я собираюсь оживить череп и заставить его говорить с ней!"
"This is gonna be so funny. SOOooo funny! Here: I saved up to pay you. Be thankful!": "Это будет так смешно. ТАКОооо смешно! Вот: я накопил, чтобы заплатить тебе. Будь благодарен!"
"I require human teeth. They must be in excellent condition!": "Мне нужны человеческие зубы. Они должны быть в отличном состоянии!"
"Thank you for the teeth. They will find a new life in new mouths.": "Спасибо за зубы. Они найдут новую жизнь в новых ртах."
"I need more human teeth. Human dentristry is demanding: the teeth must be in good condition!": "Мне нужно больше человеческих зубов. Человеческая стоматология требует: зубы должны быть в хорошем состоянии!"
"The best loading golems have a cutting mode to open tough crates. The ones we have left on the docks don't have that feature, though. I was thinking, maybe I could install it. If I had some cutting arms, I mean.": "Лучшие грузовые големы имеют режим резки для открытия прочных ящиков. Те, что остались у причалов, такой функции не имеют. Я подумал, может, смогу её установить. Если бы у меня были режущие руки, конечно."
"Hm. Well this is a whole lot more complicated than replacing their N core. I may be out of my depth. But thanks for enabling my curious spirit! Having a project to work on is important. And don't you forget it.": "Хм. Ну, это гораздо сложнее, чем просто заменить их N-ядро. Похоже, я не до конца в теме. Но спасибо, что поддержал мой любопытный дух! Наличие проекта для работы очень важно. И не забывай об этом."
"Jenny said that if I want to be friends with her again I have to swear off pranking her <i>forever</i>. She said she doesn't even really like pranks! She was just humoring me! Can you believe the audacity?\n\nMortals are so unpredictable, it's scary. I don't even know how to deal with this.\n\nWait: yes I do! I just need to show her the beautiful side of pranks. Can you make or find a pair of glued-together coins? I'll use them for a harmless prank. HARMLESS. I promise! She'll laugh!": "Дженни сказала, что если я хочу снова стать с ней друзьями, мне нужно навсегда отказаться от розыгрышей. Она сказала, что на самом деле ей розыгрыши даже не нравятся! Она просто потворствовала мне! Можешь поверить в такую наглость?\n\nСмертные такие непредсказуемые, это страшно. Я даже не знаю, как с этим справиться.\n\nПодожди: знаю! Мне просто нужно показать ей красивую сторону розыгрышей. Можешь сделать или найти пару склеенных вместе монет? Я использую их для безобидного розыгрыша. БЕЗОБИДНОГО. Обещаю! Она посмеётся!"
"This is definitely gonna work to make Jenny feel better. And if it doesn't, I'll blame it all on you. Thanks again!": "Это определённо поможет Дженни почувствовать себя лучше. А если нет — я свалю всю вину на тебя. Ещё раз спасибо!"
"I'm ready for another keg of the brown. Business has been good!": "Я готов к ещё одной бочке коричневого. Дела идут хорошо!"
"Keep it comin', partner! I'll need another keg in a week!": "Продолжай в том же духе, напарник! Через неделю мне понадобится ещё одна бочка!"
"Hey, remember when you cleared out the animated legs in the graveyard? Well, they're back.\n\n<i>[Gregory looks at you and raises his eyebrows.]</i>": "Эй, помнишь, когда ты очистил ожившие ноги на кладбище? Так вот, они вернулись.\\n\\n<i>[Грегори смотрит на тебя и поднимает брови.]</i>"
"Thank you. Hopefully this will be the last we see of them. Hah. We both wish!": "Спасибо. Надеюсь, это будет последний раз, когда мы их увидим. Ха. Мы оба на это надеемся!"
"Somebody needs to take care of all the damned leg bones wandering around in the graveyard! It's one thing to run away from a full skeleton but I'll be damned if I'm running away from a single leg. I was able to suspend disbelief at a whole fleshless body, but just one leg? One leg that for some reason kicks like a mule? I won't have it. It's an undignified way to die, and the graveyard needs all the dignity it can muster.\n\nSo as I say, <i>somebody</i> should do something about it. Somebody braver than the town guards.\n\n<i>[Gregory looks at you.]</i>": "Кто-то должен разобраться со всеми этими проклятыми костями ног, бродящими по кладбищу! Одно дело убежать от целого скелета, но я не позволю себе убегать от одной ноги. Я мог поверить в целое бездушное тело, но одна нога? Нога, которая почему-то бьёт, как мул? Я этого не потерплю. Это недостойный способ умереть, а кладбищу нужна вся возможная достоинство.\n\nТак что, как я и говорю, <i>кто-то</i> должен что-то с этим сделать. Кто-то смелее городских стражников.\n\n<i>[Грегори смотрит на тебя.]</i>"
"Thank you. Now maybe I can visit my son's grave. If I can just avoid the animated rib bones.\n\nYou know, living in a mageocracy has its downsides. Shit like this is always happening.": "Спасибо. Теперь, может быть, я смогу навестить могилу сына. Если только удастся избежать оживших рёбер.\n\nЗнаешь, жить в магократии — это не без недостатков. Такое дерьмо здесь происходит постоянно."
"When you finally corner one of the professors at Tennenbrandt and get them to actually give you a lesson, they teach FAST. It fells like they're shoving knowledge at you faster than you can process it! But you know what helps? Pineal juice. Illegal here, of course. So I know you wouldn't have any on you. That's a shame because I have a pretty rough day of lessons coming up.": "Когда ты наконец загоняешь одного из профессоров в Тенненбрандте и заставляешь его действительно дать тебе урок, они учат ОЧЕНЬ БЫСТРО. Кажется, что они вталкивают знания в тебя быстрее, чем ты успеваешь их усвоить! Но знаешь, что помогает? Сок шишковидной железы. Здесь это, конечно, незаконно. Так что я знаю, что у тебя его нет. Жаль, потому что у меня впереди довольно тяжёлый день уроков."
"Thanks for the relatively discreet delivery. This will get me through another week of intense lectures.": "Спасибо за относительно незаметную доставку. Это поможет мне пережить ещё одну неделю напряжённых лекций."
"Tennenbrandt University teaches important music and magic theory, but they're not very hands-on. It's important to see other performers work their magic -- that's part of my education too! But staying out all night leaves me exhausted for the next day. You know what helps? Pineal juice.": "Университет Тенненбрандта учит важной теории музыки и магии, но там мало практики. Важно видеть, как другие исполнители творят свою магию — это тоже часть моего обучения! Но ночные посиделки оставляют меня истощённым на следующий день. Знаешь, что помогает? Сок шишковидной железы."
"Hmm, I like this enhanced stuff! But I've heard there's even better pineal juice out there.": "Хмм, мне нравится это улучшенное зелье! Но я слышал, что есть ещё лучшее сок шишковидной железы."
"I lost my lucky balaclava. Now my head is cold in the mornings. This makes me sad.": "Я потерял свою счастливую балаклаву. Теперь по утрам у меня холодная голова. Это меня огорчает."
"You found my lucky balaclava! Yep, this is exactly like mine. Thank you!": "Вы нашли мою счастливую балаклаву! Да, она точно такая же, как у меня. Спасибо!"
"My wife Ariadne works at one of the vendor stalls. The hours are terrible and the pay is awful and I feel bad for her. I want to visit and drop of her favorite lunch, Broccoli Squash Bake. But I can't cook. This makes me sad.": "Моя жена Ариадна работает на одной из торговых палаток. Часы работы ужасные, а оплата плохая, и мне её жаль. Я хочу навестить её и принести её любимый обед — запеканку из брокколи и тыквы. Но я не умею готовить. Это меня огорчает."
"Hey, this is my wife's favorite! She's gonna love it. Thanks! Here, take these beets I found in the street -- I won't need them anymore!": "Эй, это любимое блюдо моей жены! Ей это очень понравится. Спасибо! Вот, возьми эти свёклы, что я нашёл на улице — они мне больше не нужны!"
"I used to maintain these loading golems, back when there were more of 'em. It was sort of my side-job. And, well, I guess since nobody else is taking responsibility, I still have to do it! So I've been doing safety inspections on the golems. I've made some easy fixes, but the scarier problems require special parts.": "Раньше я обслуживал этих погрузочных големов, когда их было больше. Это была своего рода моя подработка. И, ну, думаю, раз никто другой не берёт на себя ответственность, мне всё равно приходится этим заниматься! Поэтому я провожу техосмотры големов. Я сделал несколько простых ремонтов, но более серьёзные проблемы требуют специальных деталей."
"Thanks. The last thing you want is a loading golem to lose even a portion of its memory. Typically goes on a killing rampage. And then we'd be down a golem AND however many workers it killed.": "Спасибо. Последнее, чего хочется, чтобы грузовой голем потерял даже часть своей памяти. Обычно это приводит к убийственной ярости. И тогда мы потеряем и голема, и всех рабочих, которых он убьёт."
"Hey, you're the one who sold me that bad osslar skull. This is your fault! I performed an absolutely hilarious prank and now Jenny Foster won't speak to me! At all! She gives me the \"silent treatment\", which should definitely be considered a war crime if it isn't already.\n\nSince you did this too, you should help me fix it. Jenny likes tea, so I want you to get her some exotic tropical tea. Make it extra sweet.": "Эй, это ты продал мне тот плохой череп осслера. Это твоя вина! Я устроила очень забавную шутку, а теперь Дженни Фостер вообще не разговаривает со мной! Она игнорирует меня, и это определённо должно считаться военным преступлением, если ещё не считается.\\n\\nПоскольку ты тоже виноват, помоги мне всё исправить. Дженни любит чай, так что принеси ей экзотический тропический чай. Сделай его особенно сладким."
"That's the tea? Okay. Good. I'm going to go apologize. You stay hidden!": "Вот и всё? Хорошо. Я пойду извиняться. Ты оставайся в укрытии!"
"I was looking for you! Got a real tricky one for you this time. Masterworks, but with a slight intentional weak spot here and here. Never you mind what they're for, just make them to this specification and I'll pay well.": "Я тебя искал! На этот раз у меня для тебя действительно сложное задание. Мастерские изделия, но с небольшими намеренными слабыми местами здесь и здесь. Не спрашивай, для чего они нужны, просто сделай их по этим спецификациям, и я хорошо заплачу."
"Your work isn't conventional at all. Like someone who mastered their craft through sheer willpower instead of decades of practice! But I have to admit that it's serviceable work.": "Твоя работа совсем неординарна. Как у того, кто овладел ремеслом силой воли, а не десятилетиями практики! Но должен признать, что она вполне пригодна."
"I've lost my favorite Grand Shaping Hammer. And don't tell me it broke, it was brand new! I must have put it somewhere. It was special because it had a wider grip and shorter handle which made it a joy to use. I guess I'll have to get a toolcrafter to make me a new one some day. *Sigh*": "Я потерял свой любимый Большой Формовочный Молот. И не говори мне, что он сломался, он был совершенно новым! Я, должно быть, где-то его положил. Он был особенным, потому что имел более широкую рукоять и короткую ручку, что делало его использование настоящим удовольствием. Похоже, мне когда-нибудь придётся попросить кузнеца сделать мне новый. *Вздох*"
"This.. It's my lost hammer! You fucking stole it! I knew you were a crook the moment I laid eyes on you! All smug. No you ddn't craft it. Like YOU could craft this masterpiece! Give me that! ... Oh. No, this is a different hammer.\n\nHey, I'm sorry I called you a thief! Uh, thanks for the immaculate hammer! I owe you one.": "Это... Это мой потерянный молот! Ты, чёрт возьми, украл его! Я знал, что ты мошенник, как только увидел тебя! Такой самодовольный. Нет, ты не крафтил его. Как будто ТЫ мог создать этот шедевр! Отдай это! ... Ох. Нет, это другой молот.\\n\\nЭй, прости, что назвал тебя вором! Эээ, спасибо за безупречный молот! Я тебе обязан."
"Hey, you've got to help me out again. BIG test coming up and I'm out of the juice! I need the cranked juice. Nothing else works anymore. I'll pay well!": "Эй, ты должен снова помочь мне. Скоро большой тест, а у меня кончилась энергия! Мне нужна зарядка на полную катушку. Больше ничего не помогает. Хорошо заплачу!"
"You're my savior! Just another year of classes to go and I can wean myself off of this stuff.": "Ты мой спаситель! Остался всего год занятий, и я смогу отказаться от этой штуки."
"I have enjoyed the tequila, my friend, and it has proven a very interesting talking point among guests. I need more! I shall pay you the same as before. As to the flavor profile, please surprise me with something delicious.": "Мне понравилась текила, мой друг, и она стала очень интересной темой для разговоров среди гостей. Мне нужно больше! Я заплачу тебе так же, как и раньше. Что касается вкусового профиля, пожалуйста, удиви меня чем-нибудь вкусным."
"This will do, this will do indeed! Haha! Here you are. I shall need more soon enough, don't go too far.": "Это подойдёт, действительно подойдёт! Ха-ха! Вот, держи. Скоро мне понадобится ещё, не уходи далеко."
"Hey! Uh, sorry again about accusing you of being a thief. You just seem like ... ahem, well, anyway, I know NOW that you're an expert toolsmith! And that means you must have access to quality metal. I need some.\n\nThe Council provides me with the metal to fix horseshoes and fences, but I need fancier metal for a personal project I'm working on.": "Эй! Эм, ещё раз извини, что обвинял тебя в воровстве. Ты просто казался... эм, ну, в общем, теперь я знаю, что ты эксперт по изготовлению инструментов! А это значит, что у тебя должен быть доступ к качественному металлу. Мне он нужен.\\n\\nСовет снабжает меня металлом для починки подков и заборов, но для личного проекта мне нужен более изысканный металл."
"Here's your money. And I'm adding in a bit extra as an apology for earlier, and for your discretion. If someone, say Samantha Veilmoor, were to ask if I make swords, you would say that I definitely don't. Right? Great.": "Вот твои деньги. И я добавляю немного сверху в качестве извинения за ранее и за твою сдержанность. Если кто-то, скажем, Саманта Вейлмур, спросит, делаю ли я мечи, ты скажешь, что определённо нет. Верно? Отлично."
"Hey! You're the brown ale expert. Hey hey good to see you again! I've been thinking about that brown ale. I want to order a keg of it! Can you deliver? I've been saving up!": "Эй! Ты же эксперт по коричневому элю. Привет-привет, рад снова тебя видеть! Я всё думала о том коричневом эле. Хочу заказать бочку! Ты можешь доставить? Я копила деньги!"
"You're the best! I'm going to start selling this as my own creation. And you can be my secret supplier, okay? This is all the benefits of having a bar without any of the hassle. You'll see! Check back in a week!": "Ты лучший! Я собираюсь начать продавать это как своё собственное творение. А ты будешь моим тайным поставщиком, хорошо? Это все преимущества наличия бара без всяких хлопот. Увидишь! Загляни через неделю!"
"Hey, it's you! What a bit of luck. I need more specialized armor stakes. Can you bang these out today? Expert-quality, but with a peened head.": "Эй, это ты! Какая удача. Мне нужно больше специализированных колышков для брони. Можешь сделать их сегодня? Экспертного качества, но с клёпаной головкой."
"Hm. Not how I'd have done it, but these will work just fine.": "Хм. Я бы сделал иначе, но эти подойдут вполне."
"I've been sent out as a gofer. Pretty insulting to my skills but you gotta take it on the chin sometimes when you work with humans. They're not exactly good at manners and shit. Problem is, though, that I can't find what I need: I need some pretty good armor stakes but with an extra thumbspan's length on the end. Say, are you a smith? You could whip them up for me.": "Меня отправили за поручением. Довольно обидно для моих умений, но иногда приходится терпеть, когда работаешь с людьми. У них не очень хорошие манеры и прочее. Проблема в том, что я не могу найти то, что мне нужно: мне нужны хорошие колья для брони с дополнительной длиной в один размах большого пальца на конце. Скажи, ты кузнец? Ты мог бы сделать их для меня."
"These are... Well... these are... adequate work. Thank you.": "Это... ну... это... приемлемая работа. Спасибо."
"I did the glued-coin gag to Jenny. I stuck them to the table and watched her struggle to pull them off. She was at it for a while and she wasn't laughing at all! So I ran over and stopped her.\n\nI explained everything: how it was your idea, how you're fully to blame, and how I would never, ever, EVER do a prank to her again. Thanks for taking the heat for me!\n\nWhat? You DID enable the prank. You can't be blameless in this!\n\nOkay, look, I know I screwed up. Social scenarios with mortals are extremely tricky! Can you forgive me? I can't have you as an enemy! You're more terrifying than Jenny! I thought you'd understand!\n\nCalm down, I know how to fix this: my prank fund! You can have it! It's a treasure chest full of precious gems. At least I think it is. I can't open it! But I have a plan on how to get it open. Here's what I need.": "Я устроила Дженни розыгрыш с приклеенными монетами. Приклеила их к столу и наблюдала, как она пытается их оторвать. Она мучилась долго и совсем не смеялась! Тогда я подбежала и остановила её.\\n\\nЯ всё объяснила: что это была твоя идея, что вся вина на тебе, и что я никогда, никогда, НИКОГДА больше не буду её разыгрывать. Спасибо, что взял вину на себя!\\n\\nЧто? Ты действительно способствовал розыгрышу. Ты не можешь быть безвинным в этом!\\n\\nЛадно, слушай, я знаю, что облажалась. Социальные ситуации с смертными очень сложны! Ты можешь меня простить? Я не могу иметь тебя в врагах! Ты страшнее Дженни! Я думала, ты поймёшь!\\n\\nУспокойся, я знаю, как это исправить: мой фонд розыгрышей! Он твой! Это сундук с драгоценными камнями. По крайней мере, я так думаю. Я не могу его открыть! Но у меня есть план, как это сделать. Вот что мне нужно."
"Okay. Stand back. I put the resistance potion on the box and the cleanser on the lock, then I can use the picks, and... Haha!\n\nFor ONCE I wasn't scammed by a mortal. There really is treasure in here!\n\nI'd planned to use this to pull an epic illusion prank on the whole city. But it's yours. ALL of it. I'm sorry. Please, please, please forgive me?": "Ладно. Отойди. Я нанес зелье сопротивления на коробку и очиститель на замок, потом могу использовать отмычки, и... Ха-ха!\\n\\nВПЕРВЫЕ меня не обманул смертный. Здесь действительно есть сокровища!\\n\\nЯ планировал использовать это, чтобы устроить эпический розыгрыш с иллюзиями на весь город. Но теперь это твоё. ВСЁ. Прости меня, пожалуйста, пожалуйста, пожалуйста?"
"You know what I miss? Brown ale. Strong, sweet, but dry. Except the wet ones. I'm not too particular I guess. But every brown ale is better than what Cynthia serves!": "Знаешь, чего мне не хватает? Коричневого эля. Крепкого, сладкого, но сухого. Только не мокрого. Впрочем, я не слишком придирчива. Но любой коричневый эль лучше того, что подаёт Синтия!"
"Ahh. That was delicious. I could use another! Hah! No but seriously.": "Ах. Это было вкусно. Я бы не отказался ещё! Ха! Но серьёзно."
"Oh, hi %PLAYER_NAME%! You got that wax for me, remember? I appreciate it, but turns out the wax was heavily scented, and the scent gives me a headache.\n\nFlitilda studies local fauna and says the odors from these things would cancel out the scent.": "О, привет, %PLAYER_NAME%! Ты принес тот воск для меня, помнишь? Я благодарен, но оказалось, что воск сильно ароматизирован, и этот запах вызывает у меня головную боль.\\n\\nФлитильда изучает местную фауну и говорит, что запахи этих существ нейтрализуют аромат."
"Wow, the combined odor is quite a lot. I'm having second thoughts about this plan, but since you seem to think it's a good idea, I'll give it a try! I'll bask in these odors before I sleep. Come back in a week and I'll let you know how it went.": "Вау, этот смешанный запах довольно сильный. У меня появились сомнения насчёт этого плана, но раз ты считаешь, что это хорошая идея, я попробую! Я впитаю эти запахи перед сном. Приходи через неделю, и я расскажу, как всё прошло."
"I'm still geting used to having to sleep every day. The giant tree is making that hard, too, because the other fae are not quiet at night!\n\nI've been using a magical dampening sphere to protect my ears, but the spell gives me a headache. Electra told me I should just get the local mortal equivalent. Do you happen to have any of this wax?": "Я всё ещё привыкаю к тому, что нужно спать каждый день. Огромное дерево тоже мешает, потому что другие феи не бывают тихими ночью!\\n\\nЯ использую магическую сферу гашения, чтобы защитить уши, но заклинание вызывает у меня головную боль. Электра сказала, что мне стоит просто достать местный смертный аналог. Случайно у тебя нет такого воска?"
"That's quite a lot of wax! I can make a lot of ear protectors from this. Thank you so much!": "Это довольно много воска! Из этого можно сделать много защитных наушников. Большое спасибо!"
"I have a great new scheme to win big at keelflip: bomb threats. Don't worry. Nobody is going to get hurt. Everything wil go according to plan.": "У меня есть отличный новый план, как выиграть по-крупному в кильфлипе: угрозы взрывом. Не волнуйся. Никто не пострадает. Всё пойдёт по плану."
"Thanks. But I talked to my card reader Gossamyr and she predicted that I would be maimed and go to prison if I tried my plan. And she said it like it was completely obvious to everybody. But if it was obvious to everybody, why did you fulfill my request?! I kind of feel like you aren't really my friend.\n\nBut I'll tip well for your discretion anyway.": "Спасибо. Но я поговорил со своей гадалкой Госсамир, и она предсказала, что если я попробую свой план, меня искалечат и посадят в тюрьму. И сказала это так, будто это было очевидно для всех. Но если это было очевидно для всех, почему ты выполнил мою просьбу?! Мне кажется, ты не совсем мой друг.\n\nНо за твою сдержанность я всё равно хорошо заплачу."
"I have an idea for how to win big at keelflip: cheating! I just need some corks.": "У меня есть идея, как выиграть по-крупному в кильфлип: жульничество! Мне просто нужны пробки."
"Hmm. These corks are too light. My plan will never work. You should have warned me that it was a dumb plan!": "Хмм. Эти пробки слишком лёгкие. Мой план никогда не сработает. Ты должен был предупредить меня, что это глупый план!"
"Oh, it's you. The bozo who gave me an infested hexapus arm to sleep on! Well to your credit, all those horrific odors DID cancel out and I was able to get some sleep for a bit, but two days later I was in terrible pain. I visited Steven the healer, who declared that I had Hexapus Ear and cured me. Apparently the tentacle you gave me was covered in eggs, and they got all over everything!\n\nI threw out the hexapus arm but I still keep getting infected with Hexapus Ear every night! It's disgusting! It's... humiliating at this point. Please, you have to help me sanitize my bed area! ... And also get me a tentatkiller arm to replace the odor of the hexapus arm.": "О, это ты. Болван, который дал мне заражённую руку гексапуса, чтобы я на ней спал! Но, надо отдать тебе должное, все эти ужасные запахи действительно перебились, и я смог немного поспать, но через два дня у меня началась сильная боль. Я посетил Стивена целителя, который сказал, что у меня «Ухо гексапуса» и вылечил меня. Оказывается, щупальце, которое ты мне дал, было покрыто яйцами, и они повсюду!\n\nЯ выбросил руку гексапуса, но каждую ночь меня снова заражает «Ухо гексапуса»! Это отвратительно! На этом этапе это... унизительно. Пожалуйста, помоги мне продезинфицировать моё спальное место! ... И ещё достань мне руку-убийцу щупалец, чтобы заменить запах руки гексапуса."
"Oh thank the Fall King, I couldn't do this another night! It's just in time.\n\nHmm, the tentakiller arm doesn't smell at all like the hexapus arm did. But they're both tentacley smells, so this should work. I'll see what kind of sleep I get this week.": "О, слава Королю Осени, я не смог бы выдержать ещё одну ночь! Как раз вовремя.\\n\\nХм, рука убийцы щупалец совсем не пахнет так, как рука гексапуса. Но оба запаха щупалец, так что это должно сработать. Посмотрю, какой сон будет на этой неделе."
"Oh, I'm glad I ran into you! I need some gems to finish my... project. A carnelian and an onyx. Actually, two of each! Just in case I'm unlucky.": "О, я рад, что встретил тебя! Мне нужны драгоценные камни, чтобы закончить мой... проект. Карнеол и оникс. На самом деле, по два каждого! На случай, если мне не повезёт."
"That's what a carnelian looks like? Well, good for it. I just hope this works. Thank you! I've got to go now.": "Так выглядит карнеол? Ну и пусть. Надеюсь, это сработает. Спасибо! Мне нужно идти."
"I've heard of a mortal flower called a tulip, but I've never seen one! I wish I had one.\n\n<i>[Flitilda flutters her eyelashes at you.]</i>": "Я слышала о смертном цветке под названием тюльпан, но никогда не видела его! Хотела бы иметь один.\\n\\n<i>[Флитильда хлопает тебе ресницами.]</i>"
"Is this... a tulip!? Oh, it's so ugly! I love it! What a dumb flower! Haha! I kind of expected something different. But I'll take it home and draw it for my upcoming botanical art book. Thanks!": "Это... тюльпан!? О, какой он уродливый! Я в восторге! Какая глупая цветок! Ха-ха! Я ожидал чего-то другого. Но я возьму его домой и нарисую для моей будущей книги по ботаническому искусству. Спасибо!"
"I have a new idea for how to cheat at keelflip. I just need some pebbles. But they have to be perfectly balanced!": "У меня новая идея, как жульничать в кильфлипе. Мне просто нужны гальки. Но они должны быть идеально сбалансированы!"
"These pebbles are too small. You did technically bring me what I asked for, but OBVIOUSLY what I asked for wasn't specific enough. You cared more about getting the job done than about whether the job should be done or not! No tip.": "Эти камешки слишком мелкие. Технически ты принес то, что я просил, но ОЧЕВИДНО, что моя просьба была недостаточно конкретной. Тебе было важнее выполнить задание, чем задуматься, стоит ли его вообще выполнять! Чаевых не будет."
"They have many interesting spirits here, but I miss the drink of my homeland. Rahu has the most salivation-inducing tequila! I would love to have a cask delivered.\n\nAnd of course, this would be a business expense, so I can tap into my generous expense account.": "Здесь много интересных духов, но мне не хватает напитка моей родины. В Раху самая слюноотделяющая текила! Я бы с удовольствием получил бочку.\n\nИ, конечно, это будет служебным расходом, так что я смогу воспользоваться своим щедрым служебным счётом."
"Hmm. The flavors are a bit suspect, but I cannot turn it down! Here. Perhaps return later and I shall perhaps need more.": "Хмм. Вкусы немного сомнительные, но я не могу отказаться! Вот. Может, вернёшься позже, и мне, возможно, понадобится ещё."
"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Strom Farblood, and you can keep the tip! And like before, let me know when it's done so I can check it off the list.": "Я сегодня так отстаю с доставками! Не мог бы ты помочь? Эта штука меня пугает. Отнеси её Строму Фарблуду, и можешь оставить себе чаевые! И, как раньше, сообщи мне, когда закончишь, чтобы я мог вычеркнуть это из списка."
"The ointments are delivered? Oh, good. I don't mind delivering ointments usually, but Strom has said some weird things around me. About using <i>fairy wings</i> for potions! Eugh. I'm just happier not thinking about that.": "Мази доставлены? Отлично. Обычно я не против доставлять мази, но Стром говорил со мной странные вещи. О том, чтобы использовать <i>крылья фей</i> для зелий! Фу. Мне просто приятнее не думать об этом."
"Ah, it's here. But where's the usual fairy? Are you authorized by the Overseer to deliver parcels?! Or did she just pay a random stranger to do her job for her again?\n\nGive me that. I swear. Fairies as delivery-boys was a terrible idea. We should use delivery golems for everything!\n\nYes, yes, you may go.": "Ах, вот оно. Но где обычная фея? Ты уполномочен Надзирателем доставлять посылки?! Или она опять заплатила случайному незнакомцу, чтобы тот сделал её работу?\\n\\nДай-ка сюда. Клянусь. Феи в роли курьеров — ужасная идея. Нам следует использовать доставочных големов для всего!\\n\\nДа, да, можешь идти."
"There's also the issue of the so-called Invincible Bulwark skeletons. They're a huge problem. Be careful!": "Есть ещё проблема с так называемыми скелетами Непобедимого Щита. Они представляют большую опасность. Будь осторожен!"
"You took them out? Impressive!": "Ты их уничтожил? Впечатляет!"
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'beleaguered'.\n\n<i>[ Beleaguered: adjective: beset with difficulties. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «осаждённый».\n\n<i>[Осаждённый: прилагательное: окружённый трудностями.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Good! With that out of the way, your poor beleaguered brain has one less thing to worry about now.": "Отлично! Теперь, когда это позади, твоему измученному мозгу на одну заботу меньше."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'cajole'.\n\n<i>[ Cajole: verb: to persuade someone to do something with flattery or promises. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «завлекать».\n\n<i>[Завлекать: глагол: убедить кого-то сделать что-то с помощью лести или обещаний.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Well, I'm glad I cajoled you into practicing your vocabulary. Not all cajoling is bad! Sometimes people need to be pushed a little for their own good.": "Ну, я рад, что уговорил тебя попрактиковать словарный запас. Не всё уговоры — это плохо! Иногда людям нужно немного подтолкнуть ради их же блага."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'confidant'.\n\n<i>[ Confidant: noun: a person entrusted with secrets, such as a friend or co-conspirator. Note: do not confuse with the word 'confident', which is totally different. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «доверенное лицо».\n\n<i>[Доверенное лицо: сущ.: человек, которому доверяют секреты, например друг или соучастник. Примечание: не путай со словом «уверенный», которое совсем другое.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Wonderful! I know we aren't close enough to be confidants yet, but if you stick with my lessons I'm sure we'll get there. I have many secrets to tell, and I'm sure you do, too!": "Прекрасно! Я знаю, что мы ещё не настолько близки, чтобы быть доверенными лицами, но если ты будешь усердно заниматься по моим урокам, я уверен, что мы к этому придём. У меня много секретов, которые я хочу рассказать, и я уверен, что у тебя тоже!"
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'impetus'.\n\n<i>[ Impetus: the force that makes something happen. e.g. 'A vicious goblin attack was the impetus for the new anti-goblin law.' ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «импульс».\n\n<i>[Импульс: сила, которая заставляет что-то происходить. Например: «Жестокое нападение гоблинов стало импульсом для нового закона против гоблинов.»]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"I'm honored to be the impetus for your personal growth. Stick with me and you'll be competent in no time!": "Для меня честь быть стимулом твоего личного роста. Оставайся со мной, и ты быстро станешь компетентным!"
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'jocular'.\n\n<i>[ Jocular: adjective: given to jesting, habitually jolly or playful. e.g. 'He was in a jocular mood yesterday.' ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «шутливый».\n\n<i>[Шутливый: прилагательное: склонный к шуткам, обычно весёлый или игривый. Например: «Вчера он был в шутливом настроении.»]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Excellent. Using fancy words always puts me in a jocular frame of mind so that it's easier to see the levity of any situation. It's one of the many holistic benefits of vocabulary!": "Отлично. Использование изысканных слов всегда поднимает мне настроение и помогает легче воспринимать лёгкость любой ситуации. Это одно из многих целостных преимуществ словарного запаса!"
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'maladaptive'.\n\n<i>[ Maladaptive: adjective: not providing adequate or appropriate adjustment to the environment or situation. ]</i>\n\n Just find a place to work that into your next conversation. But don't just throw it out there! Use it in a conversation!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «неадаптивный».\n\n<i>[Неадаптивный: прилагательное: не обеспечивающий адекватной или подходящей адаптации к окружению или ситуации.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не просто бросай его в речь! Используй в разговоре!"
"Good! Now, did you use the word maladaptively, or productively? ... See what I did there? It doesn't look so weird and out of place anymore, does it?": "Отлично! Теперь, ты использовал слово «маладаптивно» в негативном смысле или продуктивно? ... Видишь, что я сделал? Теперь оно уже не кажется таким странным и неуместным, правда?"
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'obsequious'.\n\n<i>[ Obsequious: adjective: too eager to help or obey someone. Fawning. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «лизоблюдный».\n\n<i>[Лизоблюдный: прилагательное: слишком стремящийся помочь или подчиниться кому-то. Подхалим.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Good! Your vocabulary is growing! ... I'd use 'obsequious' in a sentence here, but half of knowing vocabulary is knowing when <i>not</i> to force it into a conversation.": "Отлично! Твой словарный запас растёт! ... Я бы использовал слово «лизоблюдный» в этом предложении, но половина знания слов — это умение <i>не</i> впихивать их в разговор."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'susurrus'.\n\n<i>[ Susurrus: noun: a soft whispering or rustling sound. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «шорох».\n\n<i>[Шорох: сущ.: тихий шепот или шелестящий звук.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"I heard a susurrus and I suspected you were the cause! Good job.": "Я услышал шорох и заподозрил, что это ты! Отличная работа."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'truculent'.\n\n<i>[ Truculent: adjective: eager to argue or quick to start a fight. Similar to 'belligerent' but with an implication of cruelty or savagery. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «злобный».\n\n<i>[Злобный: прилагательное: склонный к спорам или быстро начинающий драку. Похоже на «воинственный», но с оттенком жестокости или дикости.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"I hope you didn't <i>act</i> truculent when you used the word! Warm and friendly conversations are so much more effective than getting angry and shouting.": "Надеюсь, ты не <i>вёл себя агрессивно</i>, когда использовал это слово! Тёплые и дружелюбные разговоры гораздо эффективнее, чем злость и крики."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'vacillate'.\n\n<i>[ Vacillate: verb: to waver back and forth indecisively. ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «колебаться».\n\n<i>[Колебаться: глагол: нерешительно колебаться туда-сюда.]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Good work. Next time you're vacillating between two good choices, just pick the choice on the left. And if you think 'Ew, no, the one on the left is terrible!', then you've solved the problem, because in your heart you already picked the one on the right. Free life advice for ya there.": "Хорошая работа. В следующий раз, когда будешь колебаться между двумя хорошими вариантами, просто выбери вариант слева. А если думаешь «Фу, нет, тот, что слева, ужасен!», значит, ты уже решил проблему, потому что в глубине души ты выбрал тот, что справа. Бесплатный жизненный совет для тебя."
"You need to expand your useful vocabulary. Not your total vocabulary, your <i>useful</i> vocabulary. You know thousands of words that you never think to use in daily life. Am I right? Of course I'm right. Here's a word to use: 'vociferous'.\n\n<i>[ Vociferous: adjective: expressed in a loud or forceful way. e.g. 'I was a vociferous critic of the new curfew, but my efforts were in vain.' ]</i>\n\nJust find a place to work that into your next conversation. But don't use it out of context! Use it right!": "Тебе нужно расширить свой полезный словарный запас. Не общий словарный запас, а именно <i>полезный</i>. Ты знаешь тысячи слов, которые никогда не используешь в повседневной жизни. Я прав? Конечно, я прав. Вот слово, которое стоит использовать: «голосистый».\n\n<i>[Голосистый: прилагательное: выраженный громко или настойчиво. Например: «Я был голосистым критиком нового комендантского часа, но мои усилия оказались напрасными.»]</i>\n\nПросто найди место, чтобы вставить его в следующий разговор. Но не используй его не по контексту! Используй правильно!"
"Good work. And a piece of advice: the trick to being vociferous is to pick your battles. If you have to be vociferous more than once a day, you should reevaluate your priorities!": "Хорошая работа. И совет: секрет быть громогласным — выбирать свои сражения. Если тебе приходится быть громогласным больше одного раза в день, стоит пересмотреть свои приоритеты!"
"Eating meat is often bad for your holistic health, but <i>cooking</i> with meat definitely isn't! As you weave the guts of fallen animals into a delicious meal, you'll find your mind soaring to new heights.": "Употребление мяса часто вредно для твоего общего здоровья, но <i>готовка</i> с мясом определённо нет! Пока ты превращаешь внутренности павших животных в вкусное блюдо, твой разум взлетит на новые высоты."
"How did the pig guts feel? Gross? Fatty? You see!? You're finally interacting with the <i>real</i> world, not the fake world that you usually live in. You'll get healthy in no time.": "Как тебе ощущение свиных кишок? Отвратительно? Жирно? Видишь!? Ты наконец-то взаимодействуешь с <i>настоящим</i> миром, а не с тем фальшивым, в котором обычно живёшь. Ты быстро станешь здоровым."
"I was talking to a sailor earlier who gave me the most insightful advice! He said that in the west, their holy women allow themselves to be attacked by at least ten different dinosaurs. This gives them the real-world experience they need to help people with many different problems. Why don't you try that? But you don't need to get hit by ten different dinosaurs, though -- you aren't some holy woman! Ha ha! No, nine different dinosaurs will do for you. And I guess really, anything in the dinosaur family would work.": "Раньше я разговаривал с моряком, который дал мне самый проницательный совет! Он сказал, что на западе их священные женщины позволяют себя атаковать как минимум десятью разными динозаврами. Это даёт им реальный опыт, необходимый для помощи людям с самыми разными проблемами. Почему бы тебе не попробовать? Но тебе не нужно, чтобы тебя ударили десять разных динозавров — ты же не святая женщина! Ха-ха! Нет, девяти разных динозавров тебе хватит. И, думаю, на самом деле подойдёт любой представитель семейства динозавров."
"Oo, that scar looks bad. But see? Now you have real-life advice! And you finally got up off your butt and did something with your life! Woo! Go you! Here's some extra stuff!": "Ох, этот шрам выглядит плохо. Но видишь? Теперь у тебя есть совет из реальной жизни! И ты наконец-то встал с дивана и сделал что-то со своей жизнью! Ура! Молодец! Вот тебе немного бонусов!"
"Remember when you were bitten by those dinosaurs? Yeah, it didn't really seem to make you wiser in the long run. I mean, you're still ... um, ... still seeking answers.\n\nI think the problem is that dinosaurs are dramatic and scary. Real life isn't always dramatic and scary -- but you have to take it just as seriously. So go get attacked by nine different ruminants. That should be less scary, but just as important!": "Помнишь, когда тебя укусили те динозавры? Да, в долгосрочной перспективе это, похоже, не сделало тебя мудрее. То есть, ты всё ещё... эм... всё ещё ищешь ответы.\n\nДумаю, проблема в том, что динозавры — это драматично и страшно. Настоящая жизнь не всегда драматична и страшна — но к ней нужно относиться так же серьёзно. Так что иди и позволь напасть на себя девяти разным жвачным животным. Это должно быть менее страшно, но не менее важно!"
"Hm, you look kinda beaten up! I guess I thought ruminants were pretty laid back. Sorry about that.": "Хм, ты выглядишь немного избитым! Похоже, я думал, что жвачные довольно спокойные. Извини за это."
"You seem antsy. Do you know how to make any bombs? I'm sure you do, you look like the type. Why don't you set off some bombs out in the desert or somewhere? It'll cheer you up.": "Ты кажешься нервным. Ты умеешь делать бомбы? Я уверен, что да, ты выглядишь на такого. Почему бы тебе не взорвать несколько бомб где-нибудь в пустыне или ещё где? Это поднимет тебе настроение."
"Now, the tinnitus you're experiencing is <i>probably</i> mostly temporary. But that feeling of elation you feel? ... also temporary. Enjoy it while it lasts.": "Теперь, звон в ушах, который ты испытываешь, <i>вероятно</i> в основном временный. Но то чувство восторга, которое ты ощущаешь? ... тоже временное. Наслаждайся им, пока оно длится."
"You need to work on your compassion. Grab a shovel and bury some unfortunate deceased dogs. Or wolves, or whatever. I hate the thought of dogs dying and not even getting a proper burial!": "Тебе нужно поработать над своей сострадательностью. Возьми лопату и похорони несколько несчастных умерших собак. Или волков, или кого угодно. Мне противна мысль о том, что собаки умирают и даже не получают достойного погребения!"
"You buried 12 dogs? Great job! Hmm, you don't look that sad. I would have been bawling my eyes out at those poor dead animals. ... Weird.": "Ты похоронил 12 собак? Отличная работа! Хм, ты не выглядишь таким уж грустным. Я бы рыдал навзрыд из-за этих бедных мёртвых животных. ... Странно."
"You know what you need? Fish oil. But not just any fish oil -- you need the oil from cave fish. Just holding the fish is enough, but they have to be fresh -- like, super fresh. I recommend catching them yourself.\n\nI hear there's some fish growing in the caves of the Kur Mountains! That's a pretty far trek, but the fresh air will do you good, too.": "Ты знаешь, что тебе нужно? Рыбий жир. Но не просто какой-то рыбий жир — тебе нужен жир из пещерной рыбы. Держать рыбу в руках уже достаточно, но она должна быть свежей — очень свежей. Рекомендую ловить её самому.\\n\\nГоворят, в пещерах Курских гор водится такая рыба! Это довольно дальний путь, но свежий воздух тоже пойдёт тебе на пользу."
"Did you catch the cave fish? Hmm, yes, your complexion does look a little better. Good job.": "Поймал пещерную рыбу? Хм, да, твой цвет лица действительно стал немного лучше. Молодец."
"You need a hobby. Why not cheese making? It's delicious and might even make you some money. Of course, the fanciest kinds have to be aged in a cave for a long time, but you should start with one of the easy cheeses that don't take so long.": "Тебе нужно хобби. Почему бы не заняться сыроварением? Это вкусно и может даже приносить деньги. Конечно, самые изысканные сыры должны долго созревать в пещере, но начни с одного из простых сыров, которые не требуют много времени."
"So, have you caught Cheese Fever yet? Me too! I'm glad you like the hobby.": "Итак, ты уже заразился сырной лихорадкой? Я тоже! Рад, что тебе нравится это увлечение."
"A travelling monk told me the most interesting thing! She said that if you drink at least 20 glasses of water a day, your entire system will be flushed and you'll feel amazing. Give it a shot!": "Путешествующая монахиня рассказала мне самую интересную вещь! Она сказала, что если пить не менее 20 стаканов воды в день, твоя система полностью очистится, и ты почувствуешь себя великолепно. Попробуй!"
"You look, uh, kind of bloated, actually. Maybe you should have drunk diet water. Keep that in mind for next time.": "Ты выглядишь, эээ, на самом деле немного раздутым. Может, тебе стоило выпить диетическую воду. Запомни это на следующий раз."
"You need a new look! And you need to make that look happen all on your own. You'll feel so much more confident! Just pick a color -- any color -- and then dye your clothes that color. Easy as cake.": "Тебе нужен новый образ! И тебе нужно создать этот образ самостоятельно. Ты почувствуешь себя намного увереннее! Просто выбери цвет — любой цвет — и покрась в него свою одежду. Проще простого."
"You look... colorblind. Wow. Well, you're helping me look beyond my innate sense of fashion, and for that I thank you.": "Ты выглядишь... дальтоником. Вау. Ну, ты помогаешь мне смотреть дальше моего врождённого чувства стиля, и за это я тебе благодарен."
"My mother always said, \"If you trip an explosive runestone in the morning, nothing worse will happen to you all day.\" And she was right! Go ahead and try it -- you'll see what I mean.": "Моя мать всегда говорила: «Если утром сработать взрывной руностон, весь день с тобой ничего хуже не случится». И она была права! Попробуй сам — увидишь, что я имею в виду."
"See? It's all uphill from here! Sorry about the scarring and hair loss, though...": "Видишь? Теперь всё пойдёт только вверх! Хотя извини за шрамы и потерю волос..."
"We could all work on improving our patience. Do you know how to skin animals? Well, if you're going to desecrate a corpse like that, the least you could do is to perform your job flawlessly! Go practice until you get a flawless skin.": "Нам всем стоит поработать над терпением. Ты умеешь снимать шкуру с животных? Если уж собираешься осквернять труп таким образом, то хотя бы сделай это безупречно! Практикуйся, пока не получишь идеальную шкуру."
"I think that probably improved your patience by 2 or 3 percent. Good job!": "Думаю, это, вероятно, улучшило твоё терпение на 2 или 3 процента. Молодец!"
"You need to work with metal more. Why don't you hit the forge and make some hoops?": "Тебе нужно больше работать с металлом. Почему бы тебе не отправиться к кузнице и не сделать несколько обручей?"
"Those blisters on your hands will help keep you down-to-earth, so your ideas don't get too far away from your abilities.": "Эти мозоли на руках помогут тебе оставаться приземлённым, чтобы твои идеи не слишком отдалялись от твоих возможностей."
"You need a hobby. Why not crystal collection? It's a great hobby and very practical for adventurers and crafters alike. Build up a collection until you have, say, 100 different crystals. Then show me!": "Тебе нужно хобби. Почему бы не заняться коллекционированием кристаллов? Это отличное хобби и очень полезное как для искателей приключений, так и для ремесленников. Собери коллекцию из, скажем, 100 разных кристаллов. А потом покажи мне!"
"Lovely! Those are very pretty. Thank you for sharing your hobby with me.": "Прекрасно! Они очень красивые. Спасибо, что поделился со мной своим увлечением."
"You're so cerebral all the time! You need to work with your hands more. Try growing some carrots. Gardening will really help you see the world around you in a different way.": "Ты всё время такой умник! Тебе нужно больше работать руками. Попробуй вырастить морковь. Садоводство действительно поможет тебе по-новому взглянуть на окружающий мир."
"Now that you've grown carrots, nothing can stop you! Look out, demons, monsters, and ghosts, because here you come!": "Теперь, когда ты вырастил морковь, тебя ничто не остановит! Берегись, демоны, монстры и призраки — ты идёшь!"
"You love equipment, right? All adventurers do! But you never want to carry around excess equipment: too heavy, not enough space, blah blah blah. You need to push through that perceived boundary. Go get... I don't know, say 40 pieces of equipment. Carry them all over here at once and let me see you.": "Ты любишь снаряжение, правда? Все искатели приключений любят! Но никто не хочет таскать с собой лишнее снаряжение: слишком тяжело, мало места, бла-бла-бла. Тебе нужно преодолеть это воображаемое ограничение. Собери... не знаю, скажем, 40 предметов снаряжения. Принеси их сюда все сразу, и я тебя увижу."
"That's... that's a lot of equipment. Okay, you look like you're about to herniate something. Go put that stuff down!": "Это... это много снаряжения. Ладно, похоже, ты вот-вот сорвёшь грыжу. Положи всё это!"
"You should meditate more! But not on the ground. True meditation requires a meditation stool that you built yourself. Go and assemble a meditation stool. Then make a backup. Damned stools break all the time!": "Тебе стоит больше медитировать! Но не на земле. Истинная медитация требует медитационного табурета, который ты сделал сам. Иди и собери медитационный табурет. А потом сделай запасной. Чёртовы табуреты постоянно ломаются!"
"Good, good. Now you should go meditate with one of the stools! I bet you'll find it very deeply fulfilling. And you'll wish you'd done a better job on the stool, too! That's how we push ourselves to improve.": "Хорошо, хорошо. Теперь тебе стоит помедитировать на одном из табуретов! Уверен, ты найдёшь это очень глубоким и удовлетворяющим занятием. И пожелаешь, чтобы сделал табурет получше! Вот так мы стимулируем себя к развитию."
"Well, your diet is fine, but your magical aura is a bit off. I think some iridium will do the trick! Mine some iridium -- I hear you can find some in Kur -- and you'll be feeling different in no time.": "Ну, твоя диета в порядке, но твоя магическая аура немного нарушена. Думаю, немного иридия поможет! Добывай иридий — говорят, его можно найти в Куре — и ты скоро почувствуешь себя иначе."
"Hmm, your aura seems the same so far. Let's give it a little while to see if it helps or if you need to mine more.": "Хмм, твоя аура пока что кажется такой же. Давай подождём немного, чтобы понять, поможет ли это или тебе нужно добыть ещё."
"Hmm... there's something that you need... let me see if I can figure it out. Ah! You need to consume the unborn offspring of a smallish bird! I have the recipe right here.": "Хмм... тебе нужно кое-что... дай-ка я попробую понять, что именно. Ах! Тебе нужно съесть невыношенное потомство небольшой птицы! У меня есть рецепт прямо здесь."
"You drank it! I can tell: you look a little green. But don't worry, green is the color of nature.": "Ты выпил это! Я вижу: ты немного зеленеешь. Но не волнуйся, зелёный — цвет природы."
"I can tell your spirits are low. Your spirit needs to do battle with the spirit of the predator. The shark predator! Defeat a shark in an epic struggle, and I guarantee you'll feel better.": "Я вижу, что твой дух угнетён. Твоему духу нужно сразиться с духом хищника. Хищника-акулы! Победи акулу в эпической битве, и я гарантирую, что тебе станет лучше."
"Your spirits still seem low, but they're <i>slightly</i> higher than before. Hmm, I bet the shark you used wasn't very predatory. But every little step to wellness helps!": "Твой дух всё ещё кажется подавленным, но он <i>немного</i> выше, чем раньше. Хм, уверен, что акула, которую ты использовал, была не очень хищной. Но каждый маленький шаг к здоровью помогает!"
"You should improve your communication skills. Practice makes perfect! Engage in small talk with a whole bunch of people.": "Тебе стоит улучшить навыки общения. Практика ведёт к совершенству! Заводи светские беседы с множеством людей."
"Good job! You seem all talked out, so I'll just shut up and give you a reward.": "Отличная работа! Похоже, ты уже всё выговорился, так что я просто замолчу и дам тебе награду."
"Your mind will never fly free while your thoughts stay so firmly planted on the ground. You need to start thinking like the wind! Hmm, I know -- why don't you go think <i>in</i> the wind? In a sandstorm! Now don't get crazy -- just stay in the sand storm for a few seconds at a time, or you might get hurt!": "Твой разум никогда не будет свободен, пока твои мысли так прочно укоренены на земле. Тебе нужно начать думать, как ветер! Хмм, знаю — почему бы тебе не подумать <i>в</i> ветре? В песчаной буре! Только не сходи с ума — просто оставайся в песчаной буре по несколько секунд за раз, иначе можешь пострадать!"
"You look ... sandy. It's not a good look for you. We should work on your complexion next!": "Ты выглядишь... песчаным. Это тебе не к лицу. Следующим делом нам стоит поработать над твоим цветом кожи!"
"You should be more adventurous. And what's more adventurous than treasure maps? Nothing! Find or make a treasure map and then follow it to the buried treasure.": "Тебе стоит быть более отважным. А что может быть отважнее, чем карты сокровищ? Ничего! Найди или сделай карту сокровищ, а затем следуй по ней к зарытому кладу."
"Was the treasure good? Doesn't really matter: what matters is the searching itself.": "Было ли сокровище хорошим? Это не так важно: главное — сам поиск."
"Have you ever made your own yarn? It's a great feeling! Well, the first time, anyway. After that it gets pretty dull. That's why I want you to make at least twenty-four balls of yarn. You have to learn to push through the boredom and come out the other side to liveliness!": "Ты когда-нибудь прял свою собственную пряжу? Это потрясающее ощущение! Ну, по крайней мере, в первый раз. Потом становится довольно скучно. Вот почему я хочу, чтобы ты сделал как минимум двадцать четыре клубка пряжи. Ты должен научиться преодолевать скуку и выйти из неё живым и бодрым!"
"Did you do it? Did you push through the boredom and find the fun in making yarn? ... You did? Already? Wow! Wait... you'd say anything to get out of having to make more yarn, wouldn't you? Hmph.": "Ты сделал это? Ты преодолел скуку и нашёл удовольствие в прядении пряжи? ... Ты сделал? Уже? Вау! Подожди... ты бы сказал что угодно, лишь бы не делать больше пряжи, правда? Хм."
"We've managed to get the bears out of the western bee fields, but south and east of here, they're a real problem! They're especially dense during the day when they hunt for honey. Yes, they eat my damned crop! Why can't they be more like the panthers?! Anyway, you just gotta stop 'em. They're a menace!": "Нам удалось выгнать медведей из западных пчелиных полей, но к югу и востоку отсюда они настоящая проблема! Особенно их много днём, когда они охотятся за мёдом. Да, они едят мой проклятый урожай! Почему они не могут быть как пантеры?! В любом случае, тебе просто нужно их остановить. Они — настоящая угроза!"
"Did you get all the bears? Eight of 'em? Well... that sounds like all of 'em, maybe? I never really counted. So... good work.": "Ты поймал всех медведей? Восемь штук? Ну... похоже, что всех, может быть? Я никогда особо не считал. Так что... хорошая работа."
"I like Hogan a lot. And more importantly, he can protect me from the mantises if they come looking for me here. I wanted to get him something nice, to stay on his good side. Can you help?\n\nHogan keeps talking about a \"claw-staff\" he wants to make. But he needs some sort of hook claw things to make it. Can you get some of those, whatever they are?": "Мне очень нравится Хоган. И что ещё важнее, он может защитить меня от богомолов, если они придут искать меня сюда. Я хотел бы подарить ему что-то хорошее, чтобы остаться у него на хорошем счету. Ты можешь помочь?\\n\\nХоган всё время говорит о «посохе с когтем», который он хочет сделать. Но ему нужны какие-то крючковатые когти, чтобы его создать. Ты можешь добыть несколько таких, что бы это ни было?"
"Are those them? Wow. I guess, yeah, that'd make a pretty good staff! Let me give you something nice for your trouble! Do you like drugs? I'm trying to quit. Take my stash.": "Это они? Вау. Думаю, да, из них получится отличный посох! Позволь дать тебе что-нибудь приятное за твою помощь! Ты любишь зелья? Я пытаюсь завязать. Возьми мой запас."
"Ice Magic is well known for granting its users resilience. Let's make sure you understand this concept well.\n\nThere's a metal dodecahedron outside. Stand in it and say 'Ossugazak 2'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>": "Ледяная магия хорошо известна тем, что дарит своим пользователям стойкость. Давай убедимся, что ты хорошо понимаешь эту концепцию.\\n\\nСнаружи стоит металлический додекаэдр. Встань в него и скажи «Оссугазак 2». Это активирует тренировочную программу. Будь готов.\\n\\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Hm. You're alive! Excellent.": "Хм. Ты жив! Отлично."
"You rescued the wild horses!": "Вы спасли диких лошадей!"
"Can you go tell Tadion I need more horseshoes? He's the blacksmith in town. You'll find him in the keep -- that enclosed horrible-smelling area at the southern end of town. Tell him I need as many shoes as he can make, but I can only pay in sexual favors. He'll understand.": "Можешь сходить и сказать Тадиону, что мне нужно больше подков? Он кузнец в городе. Найдёшь его в крепости — в том замкнутом ужасно пахнущем месте на южной окраине города. Скажи ему, что мне нужно столько подков, сколько он сможет сделать, но я могу платить только сексуальными услугами. Он поймёт."
"Tadion will stop by tomorrow? Great! I know he didn't like our roll in the hay last time, but I got fresh new hay and I've mostly kept the cows away from it, so ... here's hoping! Thanks for being my messenger. Here, take this. Use it to make some rat's day.": "Тэдион зайдёт завтра? Отлично! Я знаю, что ему не очень понравилась наша прошлогодняя возня в сене, но у меня новое свежее сено, и я в основном держал коров подальше от него, так что... будем надеяться! Спасибо, что передаёшь это сообщение. Вот, возьми это. Используй, чтобы сделать чей-то день лучше."
"Wait, how can Gisli need more horseshoes? I just made him a dozen! And what size does he need? I take pride in my work and... wait, he wants 'as many as I can make'? And he'll pay in sex. Oh. He doesn't even need horseshoes at all! <i>Tadion lets out a profound sigh.</i> That dwarf is just not a great lay. But since I'm always sweaty and smelly I can't exactly have my pick of the town. So tell him I'll be by tomorrow for my payment.": "Подожди, как это Гисли могут понадобиться ещё подковы? Я же только что сделал ему дюжину! И какого размера ему нужно? Я горжусь своей работой и... подожди, он хочет «столько, сколько я смогу сделать»? И он заплатит сексом. О. Ему вообще подковы не нужны! <i>Тадион глубоко вздыхает.</i> Этот гном — не самый лучший любовник. Но раз я всегда потный и вонючий, у меня не так много выбора в городе. Так что скажи ему, что я зайду завтра за своей платой."
"So Borghild has hundreds of buried dead, right? But no! Actually there are <i>thousands</i> of people buried here. When the older bones collapsed into dust, people would just reuse the old caskets. Some of those caskets are 500 years old and date back to the second dwarven control of Borghild. You know what that means: yes! Some of those tombs have dwarven preservative runes! Isn't it exciting?! If you got me some, I would be so happy.": "Итак, в Боргилде сотни похороненных мёртвых, да? Но нет! На самом деле здесь похоронены <i>тысячи</i> людей. Когда старые кости рассыпались в прах, люди просто использовали старые гробы повторно. Некоторые из этих гробов имеют возраст 500 лет и относятся ко второму периоду правления гномов в Боргилде. Знаешь, что это значит: да! Некоторые из этих гробниц содержат гномьи руны сохранения! Разве это не захватывающе?! Если ты принесёшь мне несколько, я буду очень счастлив."
"Is that... yes! You found them! These are going to be great in my collection of ancient burial rites!\n\nHm? Magical? Oh, no, these aren't magical. They're just a traditional thing dwarves do. But they never let outsiders have them! Very exciting! Here. Let me give you something for your trouble!": "Это... да! Ты их нашёл! Они отлично подойдут для моей коллекции древних погребальных обрядов!\\n\\nЧто? Магические? О, нет, они не магические. Это просто традиция, которой следуют гномы. Но они никогда не дают их посторонним! Очень захватывающе! Вот, позволь дать тебе что-то за твою помощь!"
"<b>Hunting: Black Widow Spiders</b>\nThese highly venomous spiders eat many dangerous pests. However, they also like to eat people, and they especially love sneaking up on campers and caravans in the night.": "<b>Охота: Чёрные вдовы</b>\\nЭти очень ядовитые пауки поедают многих опасных вредителей. Однако они также любят есть людей, особенно любят подкрадываться к лагерям и караванам ночью."
"Hunting Quest Completed!": "Задание на охоту выполнено!"
"<b>Hunting: Blood Beaks</b>\nOriginating from domestic chickens that were fed cursed grain, these now-feral beasts roam the desert, fearing nothing, pecking all.": "<b>Охота: Кровавые клювы</b>\\nПроисходящие от домашних кур, которых кормили проклятым зерном, эти теперь одичавшие звери бродят по пустыне, ничего не боясь и клюя всех подряд."
"<b>Hunting: Burnspittle Frogs</b>\nThese frogs destroy ecosystems and breed rapidly. Few creatures can withstand their acidic touch for long.": "<b>Охота: Жабы Огнеплюи</b>\\nЭти жабы разрушают экосистемы и быстро размножаются. Немногие существа могут долго выдерживать их кислотное прикосновение."
"<b>Hunting: Cunning Wolves</b>\nWolves are most dangerous when they attack as a group. The wise hunter separates them to avoid their dreaded pack attack.": "<b>Охота: Хитрые волки</b>\\nВолки наиболее опасны, когда нападают стаей. Мудрый охотник разъединяет их, чтобы избежать их страшной групповой атаки."
"<b>Hunting: Deer</b>\nDeer are found in most every healthy forest ecosystem. They breed quickly and eat voraciously, so nobody is upset when deer are hunted.": "<b>Охота: Олени</b>\\nОлени встречаются почти в каждой здоровой лесной экосистеме. Они быстро размножаются и едят жадно, поэтому никто не возражает против охоты на оленей."
"<b>Hunting: Deinonychus</b>\nThese dinosaurs are native to plains lands but have learned that they can survive here in the desert, where they wreak the delicate ecology by eating everything.": "<b>Охота: Дейноних</b>\\nЭти динозавры обитают на равнинах, но научились выживать здесь, в пустыне, где они разрушают хрупкую экологию, поедая всё подряд."
"<b>Hunting: Donkeys</b>\nOrdinary donkeys aren't particularly dangerous. But these dream donkeys attack anything they see!": "<b>Охота: Ослы</b>\\nОбычные ослы не представляют особой опасности. Но эти ослы из снов нападают на всё, что видят!"
"<b>Hunting: Eltibule Bears</b>\nThe bears in Eltibule are odd. First, some of them are green. Second, they don't seem to act like bears should. They tend to gather in large aimless groups. It's not clear why they do this, but it's clearly not good.": "<b>Охота: Медведи Элтибуле</b>\\nМедведи в Элтибуле странные. Во-первых, некоторые из них зелёные. Во-вторых, они ведут себя не так, как должны медведи. Они склонны собираться в большие бесцельные группы. Почему они так делают, непонятно, но явно это плохо."
"<b>Hunting: Fear Breathers</b>\nCreated by Kajich, the god of Fear, to bring terror into the world. Kajich's not the best at creating monsters, but he tries. These lungs may not be super terrifying, but they are very dangerous and usually require allies to kill.": "<b>Охота: Дыхатели страха</b>\\nСозданы Каджичем, богом страха, чтобы сеять ужас в мире. Каджич не самый лучший в создании монстров, но он старается. Эти лёгкие могут быть не очень страшными, но они очень опасны и обычно требуют союзников для убийства."
"<b>Hunting: Ferocious Boars</b>\nThese boars are huge, deadly, and very aggressive. They are able to hold their own against enchanted cats, man-sized mantises, and house-sized snails. They are not afraid of people.": "<b>Охота: Свирепые кабаны</b>\\nЭти кабаны огромные, смертоносные и очень агрессивные. Они могут дать отпор заколдованным котам, богомолам размером с человека и улиткам размером с дом. Они не боятся людей."
"<b>Hunting: Fey Panthers</b>\nThese big green panthers come from the fairy realm. Semi-intelligent, they seek to cause mischief and destruction. Regular panthers seem to instinctively treat them as royalty, following their lead and protecting their flank.": "<b>Охота: Фейские пантеры</b>\\nЭти большие зелёные пантеры происходят из фейного мира. Полуразумные, они стремятся сеять пакости и разрушения. Обычные пантеры, кажется, инстинктивно воспринимают их как королевскую особу, следуя за ними и защищая их фланг."
"<b>Hunting: Fire Sheep</b>\nFire sheep were not created by a deranged wizard, as is often suggested. Instead, they are an exciting step forward in the natural evolution of the sheep. These creatures are very fragile but are much safer than their non-igniting brethren because local predators have learned to run away from the smell of smouldering wool.": "<b>Охота: Огненные овцы</b>\\nОгненные овцы не были созданы безумным волшебником, как часто предполагают. Наоборот, они являются захватывающим шагом вперёд в естественной эволюции овец. Эти существа очень хрупкие, но гораздо безопаснее своих не воспламеняющихся сородичей, потому что местные хищники научились убегать от запаха тлеющей шерсти."
"<b>Hunting: Fire Spiders</b>\nFire spiders are a distinct species that breeds true, even though they were genetically engineered by crone witches centuries ago. Their innate fire protection is a marvel that Biology Sages are still desperate to unravel.": "<b>Охота: Огненные пауки</b>\\nОгненные пауки — отдельный вид, который сохраняет свои особенности при размножении, несмотря на то, что их генетически создали старые ведьмы несколько веков назад. Их врождённая защита от огня — чудо, которое учёные-биологи всё ещё отчаянно пытаются разгадать."
"<b>Hunting: Giant Scorpions</b>\nMassive beasts that usually require a team to take down, these scorpions rule the desert. Few can survive their attacks -- though they stay well clear of manticores.": "<b>Охота: Гигантские скорпионы</b>\\nМассивные звери, для убийства которых обычно нужна команда, эти скорпионы правят пустыней. Немногие могут выжить после их атак — хотя они держатся подальше от мантикор."
"<b>Hunting: Gnashers</b>\nThe so-called Gnasher is a dinosaur from a distant land, imported by the Council to counter the uncontrolled spread of Uraks and other problem pests. However, gnashers are now as big a threat as any of the other invasive species. They are able to cut through armor with incredible ease.": "<b>Охота: Гнашеры</b>\\nТак называемый Гнашер — динозавр из далёкой страны, завезённый Советом для борьбы с неконтролируемым распространением ураков и других проблемных вредителей. Однако теперь гнашеры представляют такую же большую угрозу, как и другие инвазивные виды. Они способны с невероятной лёгкостью прорезать броню."
"<b>Hunting: Goblins</b>\nWhile the goblins sent to patrol the roads here are not nearly as dangerous as the ones in Sedgewick Forest, they are still very deadly. If trade is ever to return to normal, their blockade must be destroyed.": "<b>Охота: Гоблины</b>\\nХотя гоблины, посланные патрулировать дороги здесь, не так опасны, как те, что в лесу Седжвик, они всё же очень смертоносны. Если торговля когда-либо вернётся в норму, их блокаду нужно уничтожить."
"<b>Hunting: Guard Scrays</b>\nScrays act as faithful companions to the ranalon, much like dogs do for humans. They are equally at home in water or land, and their stingers inject acid deep inside their victims, causing horrible delayed death. They are most dangerous in packs.": "<b>Охота: Стражи скрей</b>\\nСкреи служат верными спутниками раналона, подобно тому, как собаки служат людям. Они одинаково хорошо чувствуют себя как в воде, так и на суше, а их жала впрыскивают кислоту глубоко в жертву, вызывая ужасную отсроченную смерть. Они особенно опасны в стаях."
"<b>Hunting: Hexapuses</b>\nLocal stories say that the hexapus comes from the Rakshasa home-world -- although their original name is lost. They lay their eggs on the underside of vessels, and supposedly the original rakshasa ships were coated in eggs that eventually hatched and tried to kill everyone.\n\nHexapuses are unnervingly intelligent and are happy both on land and water -- although they prefer to be immersed when they sleep. They are a menace that can't be allowed to proliferate.": "<b>Охота: Гексапусы</b>\\nМестные легенды гласят, что гексапус происходит с родного мира ракшас — хотя их оригинальное имя утеряно. Они откладывают яйца на днище судов, и, по слухам, оригинальные ракшасовские корабли были покрыты яйцами, которые в итоге вылуплялись и пытались убить всех.\\n\\nГексапусы тревожно умны и одинаково хорошо чувствуют себя как на суше, так и в воде — хотя предпочитают погружаться, когда спят. Это опасные создания, которых нельзя допускать к размножению."
"<b>Hunting: Kuvou</b>\nKuvou -- supposedly named after the sound they make while belching -- came with the first rakshasa settlers, who even today use them as a food source. Their vomit is also prized. Unfortunately they lack the docility of other herbivores and must be trained from birth in order to be kept as livestock.": "<b>Охота: Куву</b>\\nКуву — предположительно названные в честь звука, который они издают при отрыжке — появились вместе с первыми поселенцами ракшасов, которые и по сей день используют их как источник пищи. Их рвота также ценится. К сожалению, они не обладают покладистостью других травоядных и должны воспитываться с рождения, чтобы их можно было содержать как домашний скот."
"<b>Hunting: Manticores</b>\nMonstrosities with beast bodies and human faces, these creatures were -- and still are -- adherants of Strekios, god of Self-Improvement. They are destined to be reborn in this form until they gain the wisdom to be born into a new form.\n\nThis batch of manticores are total jerks so you should kill them and let them be reborn to try again.": "<b>Охота: Мантикоры</b>\\nЧудовища с телами зверей и человеческими лицами, эти существа были — и остаются — последователями Стрекиоса, бога самосовершенствования. Они обречены перерождаться в этой форме, пока не приобретут мудрость, чтобы родиться в новой.\\n\\nЭта партия мантикор — настоящие мерзавцы, так что тебе стоит их убить и дать им шанс переродиться и попытаться снова."
"<b>Hunting: Mantises</b>\nThe giant mantises in Eltibule are not intelligent, but that doesn't make them easy to kill. They like to prey upon the distracted, hiding in tall grass until their victims come too close.": "<b>Охота: Богомолы</b>\\nГигантские богомолы в Элтибуле не отличаются умом, но это не делает их лёгкой добычей. Они любят охотиться на невнимательных, прячась в высокой траве, пока жертвы не подходят слишком близко."
"<b>Hunting: Panthers</b>\nThe panthers here are native -- unlike the tigers -- but these panthers seem more vicious than one would expect. They act distracted, roused by an unknown energy.": "<b>Охота: Пантеры</b>\\nПантеры здесь коренные — в отличие от тигров — но эти пантеры кажутся более свирепыми, чем можно было бы ожидать. Они ведут себя рассеянно, возбуждённые неизвестной энергией."
"<b>Hunting: Pigs</b>\nThese feral pigs once must have been tended by ranchers, but they have been living in the wild for too many generations: there's no taming these delicious beasts.": "<b>Охота: Свиньи</b>\\nЭти дикие свиньи когда-то, должно быть, были под присмотром фермеров, но они уже слишком много поколений живут в дикой природе: приручить этих вкусных зверей невозможно."
"<b>Hunting: Poison Slugs</b>\nThe lakes of Eltibule are infested with these gigantic venomous slugs. With no natural predators, their growth is unchecked.": "<b>Охота: Ядовитые слизни</b>\\nОзёра Элтибула кишат этими гигантскими ядовитыми слизнями. Без естественных хищников их рост не контролируется."
"<b>Hunting: Ranalon Gardeners</b>\nPerhaps the weakest caste of ranalon, but also the most numerous, are the gardeners. They scavenge the land for resources and can also be found deep in lakes, tending to their underwater gardens. They are fast -- VERY fast -- and can chase their prey long distances.": "<b>Охота: Садовники раналона</b>\\nВозможно, самая слабая каста раналона, но при этом самая многочисленная — садовники. Они собирают ресурсы на суше и также встречаются глубоко в озёрах, ухаживая за своими подводными садами. Они быстры — ОЧЕНЬ быстры — и могут преследовать добычу на большие расстояния."
"<b>Hunting: Ranalon Stone Shapers</b>\nStoneshapers can pull stone from deep beneath the earth, and use these stones to create most Ranalon buildings. They also serve on the battlefield where they hamper enemy movement. When cornered, they can pull stones from the ground to protect themselves, creating a dense shield that absorbs most attacks.": "<b>Охота: Камнетесы раналонов</b>\\nКамнетесы могут извлекать камни из глубин земли и использовать их для строительства большинства зданий раналонов. Они также участвуют в боях, замедляя движение врагов. Когда загнаны в угол, они могут вырывать камни из земли, чтобы защитить себя, создавая плотный щит, который поглощает большинство атак."
"<b>Hunting: Rats</b>\nGenerally considered harmless, some rats do carry diseases. But for the most part even the gigantic varieties are non-hostile. In rural areas they are either treated as pests or as pets, depending on how big of an impact they have on local agriculture.": "<b>Охота: Крысы</b>\\nВ целом считающиеся безвредными, некоторые крысы всё же переносят болезни. Но в основном даже гигантские разновидности не враждебны. В сельской местности их либо считают вредителями, либо домашними животными, в зависимости от того, насколько сильно они влияют на местное сельское хозяйство."
"<b>Hunting: Sheep</b>\nAlthough their distant grandparents were domestic sheep, these feral sheep will not tolerate being sheared. They are aggressive toward anyone that gets too close.": "<b>Охота: Овцы</b>\\nХотя их далекие предки были домашними овцами, эти дикие овцы не потерпят стрижки. Они агрессивны к каждому, кто подходит слишком близко."
"<b>Hunting: Skeletal Frogs</b>\nThese once-ordinary frogs were slain in some particularly heinous way, causing their souls to seek vengeance. They are pure malice.": "<b>Охота: Скелетные лягушки</b>\\nЭти когда-то обычные лягушки были убиты особенно жестоким способом, из-за чего их души жаждут мести. Они олицетворяют чистую злобу."
"<b>Hunting: Skeleton Archers</b>\nThese craven resurrected menaces love to hurt people from afar. They run in fear when approached.": "<b>Охота: Скелетные лучники</b>\\nЭти трусливые воскрешённые угрозы любят ранить людей издалека. При приближении они убегают в страхе."
"<b>Hunting: Skeleton Mages</b>\nRaised by a necromancer and then set free to cause chaos, these skeletons do their job with glee, burning anything that lives.": "<b>Охота: Скелетные маги</b>\\nВоскресшие некромантом и затем отпущенные на волю, чтобы сеять хаос, эти скелеты с радостью выполняют свою работу, сжигая всё живое."
"<b>Hunting: Skeleton Swordsmen</b>\nCreated by a necromancer and given a sword, these creatures can only feel hate, and only killing the living brings any amount of comfort to their wretched souls.": "<b>Охота: Скелетные мечники</b>\\nСозданные некромантом и вооружённые мечом, эти существа способны чувствовать только ненависть, и только убийство живых приносит хоть какое-то утешение их жалким душам."
"<b>Hunting: Snails</b>\nSnails seem especially adept at consuming the ambient magic of their surroundings. Many varieties grow to incomprehensible size and if left unhindered, they can become so large that only an army of druids can take them down.": "<b>Охота: Улитки</b>\\nУлитки, по-видимому, особенно хорошо поглощают окружающую магию. Многие виды вырастают до непостижимых размеров, и если их не сдерживать, они могут стать настолько огромными, что справиться с ними сможет только армия друидов."
"<b>Hunting: Tentakillers</b>\nRakshasa settlers brought fierce creatures called dwvon to act as guards and hunting companions, but they went feral after the War of Rahu. Their descendants were dubbed \"tentakillers\" by famous Povus settler \"Fangy\" Lim because they use their tentacles to shock and disorient their prey. And everything is prey: big or small, the tentakiller does not discriminate.": "<b>Охота: Убийцы щупалец</b>\\nПоселенцы ракшасов привезли свирепых существ по имени дввон, чтобы они служили стражами и охотничьими спутниками, но после Войны Раху они одичали. Их потомков прозвал «убийцами щупалец» известный поселенец Повус «Клыкастый» Лим, потому что они используют свои щупальца, чтобы оглушать и дезориентировать добычу. И всё — добыча: большая или маленькая, убийца щупалец не делает различий."
"<b>Hunting: Tigers</b>\nThere are more tigers here than could possibly be natural. Moreover, many of the tigers are sickly and unwell. Wherever they came from, they apparently can't go home again.": "<b>Охота: Тигры</b>\\nЗдесь тигров больше, чем могло бы быть естественно. Более того, многие тигры больны и нездоровы. Откуда бы они ни пришли, похоже, они больше не могут вернуться домой."
"<b>Hunting: Tornado Spiders</b>\nThese spiders happened to eat a newly-formed air elemental -- which admittedly look like a large fly at first -- and have become entangled with air magic. They are not victims, though: they are able to use the wind to their advantage and are extremely hard to hit!": "<b>Охота: Торнадо-пауки</b>\\nЭти пауки случайно съели недавно образованного воздушного элементаля — который, надо признать, сначала похож на большую муху — и оказались связаны с воздушной магией. Однако они не жертвы: они умеют использовать ветер в своих целях и крайне трудно поддаются атаке!"
"<b>Hunting: Venom Spiders</b>\nWhile not as deadly as some spiders, they are still quite deadly. They seek warmth at night and are a terror to find in campsites.": "<b>Охота: Ядовитые пауки</b>\\nХотя они не так смертоносны, как некоторые пауки, они всё равно весьма опасны. Ночью они ищут тепло и являются настоящим ужасом для тех, кто разбивает лагерь."
"<b>Hunting: Vipers</b>\nA constant danger in the desert, these vipers don't hesitate to attack creatures many times their size.": "<b>Охота: Гадюки</b>\\nПостоянная опасность в пустыне, эти гадюки не колеблются нападать на существ, многократно превосходящих их по размеру."
"<b>Hunting: Wild Chickens</b>\nAll the \"wild\" chickens in Serbule Hills descend from a chicken farm that was overrun by goblins. The smartest chickens escaped capture, and they have since spread throughout the hills. They lay far fewer eggs than domestic chickens, but they're still delicious when fried.": "<b>Охота: Дикие куры</b>\\nВсе «дикие» куры в холмах Сербуль происходят от куриной фермы, которую захватили гоблины. Самые умные куры избежали поимки и с тех пор распространились по холмам. Они несут гораздо меньше яиц, чем домашние куры, но всё равно вкусны, когда их жарят."
"<b>Hunting: Wild Pigs</b>\nThese pigs were never tame; they tolerate their feral brethren, but they attack most other creatures without fear. Wild pigs are not prey animals: they're ominvorous, intelligent, and vicious.": "<b>Охота: Дикие свиньи</b>\\nЭти свиньи никогда не были приручены; они терпят своих диких сородичей, но без страха нападают на большинство других существ. Дикие свиньи — не добыча: они всеядны, умны и свирепы."
"<b>Hunting: Worgs</b>\nWhen humans domesticated the wolf, they made dogs. When orcs domesticated the wolf, they made worgs. Orcs win this one. When hungry enough, packs of feral worgs are known to kill entire caravans.": "<b>Охота: Ворги</b>\\nКогда люди одомашнили волка, у них появились собаки. Когда орки одомашнили волка, у них появились ворги. В этом орки победили. Когда ворги голодны, стаи одичавших воргов известны тем, что могут убить целые караваны."
"I need more Ice Cores to research better cold spells. Do you happen to have any?": "Мне нужно больше ледяных ядер, чтобы изучать более мощные заклинания холода. Случайно у тебя нет таких?"
"Thank you! Here's something for your trouble. If you find more, come back in a week. I'm sure I'll need more soon enough.": "Спасибо! Вот тебе что-то за старания. Если найдёшь ещё, возвращайся через неделю. Я уверен, что скоро понадобится больше."
"There is a disgraced Ice Magus staying in that little inn on the mainland. Her theorycrafting is already spreading among outsiders, but her own society has vilified her, just for a single murder. Elven society is foolish. But no matter: I must take advantage of this opportunity. Unfortunately because of their rampant racism, I cannot walk into the inn and have a conversation. I would be attacked. Instead, please deliver this note for me.": "В маленькой таверне на материке остановилась опозоренная маг ледяной магии. Её теории уже распространяются среди чужаков, но её собственное общество оклеветало её всего за одно убийство. Эльфийское общество глупо. Но неважно: я должен воспользоваться этой возможностью. К сожалению, из-за их повсеместного расизма я не могу просто зайти в таверну и поговорить. Меня бы атаковали. Вместо этого, пожалуйста, передай для меня эту записку."
"<i>You relay Landri the Cold's words.</i>\n\nThank you. Her theory is plausible. I will try my method first, but if it doesn't work, I'll try hers.": "<i>Ты передаёшь слова Ландри Холодной.</i>\\n\\nСпасибо. Её теория правдоподобна. Я сначала попробую свой метод, но если он не сработает, попробую её."
"What's this? <i>Landri takes the letter and reads it with incredible speed.</i>\n\nHm. A valid hypothesis, though I do not think it will work. Tell the author that she should substitute other elemental energy foci in place of ice foci. I believe that all the elemental planes are very close together, and using other energy types will open micro-portals to those planes, which may coalesce into a full portal more easily. And tell her good luck; she will need it.": "Что это? <i>Ландри берёт письмо и читает его с невероятной скоростью.</i>\\n\\nХм. Допустимая гипотеза, хотя я не думаю, что это сработает. Скажи автору, что ей следует заменить ледяные фокусы на другие фокусы элементальной энергии. Я полагаю, что все элементальные планы находятся очень близко друг к другу, и использование других типов энергии откроет микропорталы в эти планы, которые могут легче слиться в полный портал. И пожелай ей удачи; она ей понадобится."
"Psst... you're with the Wardens? Whew! I was hoping backup would arrive!\n\nA few days ago, teams of orcs from Gazluk Keep were up here clearing out their secret system of mountain trails. And today we found out that there are now hundreds of slimes in the southern valley! That has to be connected. Right?\n\nSometimes ice slimes fall down the mountain, but not in numbers like this. The animals that live in the valley don't know how to avoid ice slimes. They're sitting ducks! And deer, and goats, and other animals! Not to mention those dwarves that live in the New Prestonbule cave. Please help me lower the number of ice slicks down there!": "Псс... ты с Хранителями? Фух! Я надеялся, что придёт подкрепление!\\n\\nНесколько дней назад отряды орков из крепости Газлук чистили здесь свою секретную систему горных троп. А сегодня мы узнали, что в южной долине теперь сотни слизней! Это должно быть связано. Правда?\\n\\nИногда ледяные слизни срываются с горы, но не в таких количествах. Животные, живущие в долине, не умеют избегать ледяных слизней. Они как на ладони! Олени, козы и другие животные! Не говоря уже о тех гномах, что живут в пещере Новый Престонбуль. Пожалуйста, помоги мне сократить число ледяных слизней там!"
"You're back! I just got back myself a bit ago. There's still more slimes than I'm happy with, but I think I can take it from here. I appreciate your backup! Here, take this, nobody'll miss it.": "Ты вернулся! Я сам только что вернулся. Слизней всё ещё больше, чем мне хотелось бы, но я думаю, что справлюсь с этим. Спасибо за поддержку! Вот, возьми это, никто не заметит."
"When we were checking altitude measurements the other day, we found some very unusual creatures on top of the mountains. They're like slimes, but ice cold! A few fiery crossbow bolts can take 'em out. There's something inside, though... a sort of gunk. I'm thinking it might help make a nice kind of crossbow bolt. If you run across any ice slimes out there, check 'em for sludge!": "Когда мы на днях проверяли измерения высоты, мы нашли на вершинах гор очень необычных существ. Они похожи на слаймов, но ледяные! Несколько огненных болтов из арбалета могут их уничтожить. Но внутри есть что-то... вроде слизи. Думаю, из неё можно сделать хороший вид болтов для арбалета. Если встретишь ледяных слаймов, проверь их на наличие этой слизи!"
"Ew! Haha, that's the stuff all right! It smells even worse than I remember! Chemistry's not exactly my strong suit, but fortunately my betrothed over there is an expert, so I'll get him to make me some icy bolts from this!": "Фу! Ха-ха, это именно то, что нужно! Пахнет даже хуже, чем я помню! Химия — не моя сильная сторона, но, к счастью, мой жених там — эксперт, так что я попрошу его сделать из этого ледяные стрелы!"
"My... studies... require icebreeze moth wings. They are one of the only insects immune to cold, and so they are quite common back home. I'm sure plenty have flown through the portal to this land; look for areas where the Winter Court has taken control.": "Мои... исследования... требуют крыльев мотылька Ледяного Бриза. Это одни из немногих насекомых, невосприимчивых к холоду, поэтому они довольно распространены на родине. Я уверен, что многие пролетели через портал в эту землю; ищи места, где Зимний Двор взял верх."
"Excellent. These are quite valuable for alchemy.\n\n(Psst, don't worry, I'll get that curse off of you soon!)": "Отлично. Они очень ценны для алхимии.\\n\\n (Псс, не волнуйся, я скоро сниму с тебя это проклятие!)"
"I had a thought about the tree-mutants down here. Have you tried pruning them? You have? But they just wilt away? Hmmm.\n\nWell, there must be some way to save part of the tree. Try chopping them up after you kill them and see what you can find.": "У меня возникла мысль насчёт мутантов-деревьев здесь. Ты пробовал их обрезать? Пробовал? Но они просто вянут? Хммм.\\n\\nНу, должно быть, есть способ спасти часть дерева. Попробуй нарезать их после убийства и посмотри, что сможешь найти."
"Oh you're right, these leaves do seem to be... wait... wait. These are fucking TREANT LEAVES! What have you done?! Get these away from me, you idiot! Druids kill people who steal these!\n\n... Actually, nevermind, I'll keep them. I've always wanted to runs some experiments on these, and there don't seem to be too many avenging druids down here! Haha!\n\nSo those trees are treants, not mutants. Well, they're VERY small for treants... so they're probably mutated treants! Whew. I thought for a moment there that I'd made a miscalculation. But all is well. Here is your shiny!": "О, ты прав, эти листья действительно кажутся... погоди... погоди. Это же чёртовы ЛИСТЬЯ ДРЕВЕСНЫХ ДУХОВ! Что ты наделал?! Убери это от меня, идиот! Друиды убивают тех, кто крадёт их!\n\n... Хотя, нет, оставлю их себе. Я всегда хотел провести над ними несколько экспериментов, и здесь, похоже, не так много мстительных друидов! Ха-ха!\n\nТак что эти деревья — древесные духи, а не мутанты. Хотя они ОЧЕНЬ маленькие для древесных духов... значит, это, вероятно, мутировавшие древесные духи! Фух. Я уже подумал, что ошибся. Но всё в порядке. Вот твоя награда!"
"Here's an order from a craniologist. I need skulls of a specific quality.": "Вот заказ от краниолога. Мне нужны черепа определённого качества."
"Reasonably impressive work! See what I did there? Do you get it? Nevermind. Here.": "Довольно впечатляющая работа! Понял, что я сделал? Ладно, неважно. Вот."
"Thank you for killing Brukal for me. I... I want our relationship to be honest, so let me tell you bluntly: that was a little out of line. I wanted him dead, but I didn't mean you should just... and the worst part is that It's made me feel nervous to be around you! But I do thank you. I know you did it out of kindness for a friend.\n\nI've decided to set up a little monument to my parents -- both of them -- outside of town. Could you gather some flowers for me? Poppies were always mom's favorite. Mine too.": "Спасибо, что убил Брукала для меня. Я... хочу, чтобы наши отношения были честными, так что скажу прямо: это было немного чрезмерно. Я хотела, чтобы он был мёртв, но не думала, что ты просто так... И самое худшее, что теперь мне не по себе рядом с тобой! Но я всё равно благодарна. Я знаю, что ты сделал это из доброты к другу.\\n\\nЯ решила установить небольшой памятник своим родителям — обоим — за городом. Не мог бы ты собрать для меня немного цветов? Мак всегда был любимым цветком мамы. Моим тоже."
"Thank you, these are lovely.\n\nI was thinking about what you did, killing someone just to make me feel better. Is that... look, are you in love with me? That's what it seems like. And I'm flattered, but I don't know how I feel about that.\n\nRight now I'm mourning. But I'll think of you when I place these flowers on mother's stone.": "Спасибо, они прекрасны.\\n\\nЯ думал о том, что ты сделал — убил кого-то, чтобы мне стало лучше. Это... послушай, ты влюблён в меня? Похоже на это. И мне лестно, но я не знаю, что об этом думать.\\n\\nСейчас я в трауре. Но я подумаю о тебе, когда положу эти цветы на камень матери."
"Ballads performed at taverns are for the posers. Real bards can create ballads while fighting to the death. Good ballads, too! Keep practicing at it until you get the hang of it.\n\n<i>[Use Virtuoso's Ballad while fighting level 80+ enemies.]</i>": "Баллады, исполняемые в тавернах, — для позёров. Настоящие барды могут создавать баллады, сражаясь насмерть. И хорошие баллады, к тому же! Продолжай тренироваться, пока не освоишь это.\\n\\n<i>[Используй Балладу Виртуоза в бою с врагами уровня 80 и выше.]</i>"
"Throat parched? Sounds like you're finally getting the hang of it!": "Пересохло в горле? Похоже, ты наконец начинаешь в этом разбираться!"
"Although my species is generally able to cohabit with slimes and fungi of all types, there exist herein a species that reduces the ambient temperature. This is clearly unacceptable behavior. Please extinguish these slimes before they make the environment uninhabitable!": "Хотя мой вид обычно способен сосуществовать со слизнями и грибами всех типов, здесь есть вид, который понижает окружающую температуру. Это явно недопустимо. Пожалуйста, уничтожьте этих слизней, прежде чем они сделают среду обитания непригодной!"
"At last! Now perhaps it will be possible to lie dormant without needing to expend energy to maintain core temperature! Ha ha! Oh, that is not a joke in your language. ... Nevermind.\n\nThere is a way to use the remnants of those slimes, combined with myconian give-offs, to enhance your own safety. Let me show you the method. Perhaps it will be useful to you in a future moon cycle.": "Наконец-то! Теперь, возможно, можно будет находиться в состоянии покоя, не тратя энергию на поддержание температуры тела! Ха-ха! О, это не шутка на вашем языке. ... Ладно.\\n\\nЕсть способ использовать остатки этих слаймов вместе с выделениями миконианцев, чтобы повысить твою безопасность. Позволь показать тебе метод. Возможно, он пригодится тебе в будущем лунном цикле."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные стрелы. Я щедро за них заплачу, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные стрелы с зазубринами. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные длинные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные стрелы из Резервуара. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Incredible Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Невероятные стрелы-ловушки. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We don't have a wide variety of ingredients in this area, but we do have one thing that's unique: a bunch of infernal creatures. I've heard, mostly from Denton, that there are non-demons nearby that are studying the demons. Their research may prove useful in the culinary world. Or at least, in <i>my</i> culinary world.\n\nBring me some of this demonic research so I can see if any of it is useful.": "У нас в этом районе нет большого разнообразия ингредиентов, но есть одна уникальная вещь: множество инфернальных существ. Я слышал, в основном от Дэнтона, что неподалёку есть не-демоны, которые изучают демонов. Их исследования могут оказаться полезными в кулинарии. Или, по крайней мере, в <i>моём</i> кулинарном мире.\\n\\nПринеси мне немного этих демонических исследований, чтобы я мог проверить, есть ли среди них что-то полезное."
"Hrm. It says right here that their flavor profile is best described as \"a combination of spicy and sour.\" I don't know who exactly performed this taste test, but bless their heart.": "Хм. Здесь написано, что их вкусовой профиль лучше всего описать как «сочетание острого и кислого». Не знаю, кто именно проводил эту дегустацию, но пусть им будет благодарна душа."
"That little plan went great! I sold a lot of bread, and reminded people how good fresh bread is. It's led to repeat customers!\n\nBut Vexford is embarrassed. And an embarrassed man is dangerous.\n\nTake this to my daughter Laura. She's my oldest and smartest. She lives in Kur, in self-inflicted banishment. Tell her it's time to come home.": "Этот маленький план удался на славу! Я продал много хлеба и напомнил людям, какой вкусный свежий хлеб. Это привело к повторным покупателям!\\n\\nНо Вексфорд смущён. А смущённый человек опасен.\\n\\nОтнеси это моей дочери Лауре. Она моя старшая и самая умная. Она живёт в Кур, в добровольном изгнании. Скажи ей, что пора возвращаться домой."
"Laura said no again? That's on me: I thought you were more charismatic than you are. I'll wait a few months and try again, and this time I'll send along some walnut bread.\n\nNow that her missus is dead there's no reason she can't come home. She's just inherited the Neth stubbornness. But walnut bread can fix a lot of problems.": "Лаура снова отказала? Это моя вина: я думал, что ты более харизматичен, чем есть на самом деле. Я подожду несколько месяцев и попробую снова, а на этот раз пришлю немного грецкого хлеба.\n\nТеперь, когда её жена умерла, нет причин, по которым она не может вернуться домой. Она просто унаследовала упрямство Нета. Но грецкий хлеб может решить многие проблемы."
"<i>[Laura laughs bitterly.]</i>\n\nHe can't write a letter without saying something to intentionally piss me off. I know he loves me. And he's been there for me when I needed him, but it's never felt like ... well, like how a father should care about his daughter.\n\nWhen I was young and the bakery was flourishing, an orc gang kidnapped me for ransom. Do you know what my father did? He haggled. Successfully, mind you, but they're fucking ORCS. They could have killed me out of rage! I was so scared.\n\nWhen I was caught in bed with a woman, did he use his immense clout with the Council to get us off the hook? No. He bribed a guard. Marie and I had to sneak out of Statehelm and never return.\n\nI love the man, and to be truthful I don't bear him ill will. I think of him fondly sometimes. But I'm not coming to his rescue.\n\nTell Dad I miss his walnut bread, but I'm never returning to Statehelm again. This is the second time he's asked, and if he asks again I'll cut off all communication with him forever.": "<i>[Лаура горько смеётся.]</i>\\n\\nОн не может написать письмо, не сказав что-то, чтобы специально меня разозлить. Я знаю, что он меня любит. И он был рядом, когда я нуждалась в нём, но это никогда не ощущалось... ну, так, как отец должен заботиться о дочери.\\n\\nКогда я была маленькой и пекарня процветала, орочья банда похитила меня ради выкупа. Знаешь, что сделал мой отец? Он торговался. И успешно, заметь, но это же ЧЁРТОВЫЕ ОРКИ. Они могли убить меня в гневе! Я так боялась.\\n\\nКогда меня застали в постели с женщиной, он использовал своё огромное влияние в Совете, чтобы нас выручить? Нет. Он подкупил стражника. Марии и мне пришлось тайно уехать из Стейтхелма и больше никогда не возвращаться.\\n\\nЯ люблю этого человека, и, если честно, я не держу на него зла. Иногда я вспоминаю его с теплотой. Но я не собираюсь его спасать.\\n\\nСкажи папе, что я скучаю по его грецкому хлебу, но я больше никогда не вернусь в Стейтхелм. Это уже второй раз, когда он просит, и если он попросит ещё раз, я навсегда прекращу с ним всякое общение."
"I am young for my kind, but I am already sporing! My adventures into the overworld have caused me to bloom prematurely. I am not ready to clone myself, so I must delay the sporing. Do you have some of the inhibitor medicine? Your kind calls it 'Blusher Mushrooms'. I need much of it.": "Я молод для своего вида, но уже выпускаю споры! Мои приключения в верхнем мире вызвали у меня преждевременное цветение. Я не готов клонировать себя, поэтому должен отложить спорообразование. У тебя есть немного ингибирующего лекарства? Ваши называют это «Румяными грибами». Мне нужно много этого."
"I am grateful. These will prohibit my sporing for several more seasons so that I may have further adventures in the overworld. Would you like these? They are but toys to my kind, but dangerous weapons to your kind.": "Я благодарен. Они помешают моему спорингу ещё на несколько сезонов, чтобы я мог продолжить приключения в верхнем мире. Хотите их? Для моего народа это всего лишь игрушки, но для вашего — опасное оружие."
"I just need some quality ink to complete the blessing of safety on Ukorga's inn. And I know that human Laura Neth has the ink I need. But she won't sell it to me!\n\n<i>[Gloria takes a deep breath and calms herself.]</i> Can you see if you can buy some ink from her? Or from anywhere, really. I don't care, I just need to get this done!": "Мне просто нужна качественная тушь, чтобы завершить благословение безопасности на трактире Укорги. И я знаю, что человек Лаура Нет имеет нужную мне тушь. Но она не хочет её продавать!\\n\\n<i>[Глория глубоко вздыхает и успокаивается.]</i> Можешь ли ты попытаться купить у неё тушь? Или вообще где-нибудь. Мне всё равно, мне просто нужно это сделать!"
"Perfect! All I wanted to do was make people safer. But there's always so many obstacles. Thank you for your help.": "Отлично! Всё, чего я хотел — сделать людей безопаснее. Но всегда столько препятствий. Спасибо за твою помощь."
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but the only fuel you recognized was the last one: the glowing eyes of gricklings. Apparently you could just stick them into this hollow here...": "Когда вы прикасаетесь к этому холодному устройству, вы видите вихрь запутанных визуальных образов. Подумав немного, вы понимаете, что у него закончился топливо. Оно показало множество видов топлива, которые можно использовать, но единственным знакомым вам был последний: светящиеся глаза гриклингов. Похоже, их просто нужно вставить в эту полость здесь..."
"You plop the eyeballs in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Ты вставляешь глазные яблоки, и оно начинает гудеть! Оно должно оставаться включённым несколько дней. Теперь кажется, что достаточно просто сунуть туда руку..."
"It's still out of power. If you plopped some disgusting grickling eyes in, it should activate.": "Он всё ещё без энергии. Если положить туда несколько отвратительных глаз гриколинга, он должен активироваться."
"Activation of Device": "Активация устройства"
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but most of them aren't recognizable. One of the last images seems less weird than the others, though: a glowy spike, taken from a creature. Apparently you could just stick several of them into this hollow spot...": "Когда вы прикасаетесь к этому холодному устройству, вы видите вихрь запутанных визуальных образов. Подумав немного, вы понимаете, что у него закончилось топливо. Оно показало множество видов топлива, которые можно использовать, но большинство из них не узнаваемы. Однако один из последних образов кажется менее странным, чем остальные: светящийся шип, взятый у существа. Похоже, что несколько таких шипов можно просто вставить в эту полость..."
"You plop the spikes in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Ты вставляешь шипы, и оно начинает гудеть! Оно должно оставаться включённым несколько дней. Теперь кажется, что достаточно просто сунуть туда руку..."
"It's still out of power. If you plopped some glowing osslar spikes in, it should activate.": "Он всё ещё без энергии. Если вставить несколько светящихся шипов осслар, он должен активироваться."
"When you touch this cold device, you see a flurry of confusing visual images. After thinking for a moment, you believe it is out of fuel. It showed many types of fuel that could be used, but most of them aren't recognizable. One of the last images is clearer: it's a pile of rubies. Apparently you can insert rubies into this thing. But there aren't likely to be rubies in this cave...": "Когда вы прикасаетесь к этому холодному устройству, вы видите вихрь запутанных визуальных образов. Подумав немного, вы понимаете, что у него закончилось топливо. Оно показало множество видов топлива, которые можно использовать, но большинство из них не узнаваемы. Один из последних образов более чёткий: куча рубинов. Похоже, что в это устройство можно вставлять рубины. Но в этой пещере вряд ли найдутся рубины..."
"You drop the rubies in, and it hums to life! It should stay powered up for a few days. Now it seems like you just stick your hand in...": "Ты кладёшь рубины, и оно начинает гудеть! Оно должно оставаться включённым несколько дней. Теперь кажется, что достаточно просто сунуть туда руку..."
"It's still out of power. If you dropped in some rubies, it should activate.": "Он всё ещё без энергии. Если положить туда несколько рубинов, он должен активироваться."
"I was stationed here to keep an eye on Korbok, so to hear that you collected various poisons for him is troubling. Doubly so, that he winked at you when you gave them to him. Bring me a sampling of all of the poisons that you gave him, so I can try to suss out what he's working on without confronting him directly.": "Меня сюда направили следить за Корбоком, поэтому слышать, что ты собрал для него разные яды, вызывает беспокойство. Вдвойне тревожно, что он подмигнул тебе, когда ты передал их ему. Принеси мне образцы всех ядов, которые ты ему дал, чтобы я мог попытаться выяснить, над чем он работает, не сталкиваясь с ним напрямую."
"So far as I can tell, these are all standard and unrelated poisons. I am by no means an alchemical expert, so I will send these back to Statehelm for further analysis. Thank you for your assistance in this investigation.": "Насколько я могу судить, это все обычные и не связанные между собой яды. Я вовсе не эксперт в алхимии, поэтому отправлю их обратно в Стейтхелм для дальнейшего анализа. Спасибо за помощь в этом расследовании."
"I need more iocaine mushrooms. Can you obtain them?": "Мне нужно больше иокаиновых грибов. Ты можешь их достать?"
"Thank you. These are a little underripe, but they will do. Here... perhaps these toys will be useful to you? ": "Спасибо. Эти немного недозрелые, но подойдут. Вот... возможно, эти игрушки будут тебе полезны?"
"I'm making a special ... device. For Ivyn. It's a ... well, anyway, it doesn't matter. I need a horn. A really nice one, maybe made of ivory? Or something even better if you come across it. Thanks.": "Я делаю особое... устройство. Для Айвин. Это... ну, в общем, не важно. Мне нужен рог. Очень хороший, возможно из слоновой кости? Или что-то ещё лучшее, если найдёшь. Спасибо."
"You found one?! Wow. Thanks! Here's some cash for your trouble.": "Ты нашёл один?! Вау. Спасибо! Вот немного денег за твои труды."
"I have heard that rhinos in the Council Lands grow ivory horns instead of horns made of animal fat. I must see these for myself!": "Я слышал, что у носорогов в Землях Совета растут бивни из слоновой кости вместо рогов из животного жира. Я должен увидеть это своими глазами!"
"So... my grandmother had a cruel sense of humor. I've been trying to grow a Sampo from her ancient notes - it's supposed to create gold from salt! But instead I grew a Salmpo. You know, the walking plant monster? It's horribly dangerous. Can you kill it for me? It's deep in the wilderness, south of town.": "Итак... у моей бабушки было жестокое чувство юмора. Я пытался вырастить Сампо по её древним записям — он должен создавать золото из соли! Но вместо этого я вырастил Салмпо. Знаешь, это ходящее растение-монстр? Оно ужасно опасно. Можешь убить его для меня? Оно глубоко в дикой местности к югу от города."
"You got it? Good! Did you get its heart?": "Ты получил это? Отлично! Ты достал его сердце?"
"I don't know how to make butter, can you believe it? And I'm a farmer! Heh! But I just grow crops. If I grew animals I'd be a rancher. So anyway, get me some butter?": "Я не умею делать масло, можешь поверить? А я ведь фермер! Хех! Но я только выращиваю культуры. Если бы я разводил животных, я был бы скотоводом. Так что, в общем, принеси мне немного масла?"
"Thanks! I owe you one! Here, this isn't really equivalent in value, but maybe you can use it.": "Спасибо! Я тебе обязан! Вот, это не совсем равноценно по стоимости, но, может, тебе пригодится."
"This is embarrassing, but I need some squash seedlings. I kind of insulted Therese the other day by calling her an... by calling her a name. So can you get them for me? I need three.": "Это неловко, но мне нужны саженцы тыквы. Я как-то обидел Терезу на днях, назвав её... назвав её обидным словом. Так что можешь достать их для меня? Мне нужно три."
"Thanks! Hey, do you have any use for this skinning knife? It will let you skin animals after you kill them. I don't skin animals because I'm a good, wholesome farmer. I grow crops. But you look like the animal-murdering type. So keep that.": "Спасибо! Эй, тебе нужен этот нож для снятия шкур? С ним ты сможешь снимать шкуры с убитых животных. Я не занимаюсь снятием шкур, потому что я хороший, порядочный фермер. Я выращиваю урожай. Но ты выглядишь как человек, который убивает животных. Так что оставляй его себе."
"I lost my lucky coin. It was one of those ancient coins from before the Council. You can still find 'em all over the place... if you come across one, can you save it for me?": "Я потерял свою счастливую монету. Это была одна из тех древних монет, что были до Совета. Их всё ещё можно найти повсюду... если наткнёшься на одну, можешь сохранить её для меня?"
"Thanks! Let me flip this coin to see what your reward should be! Aww, it's heads. Well, that means you get a beet. Sorry.": "Спасибо! Дай-ка я подброшу монету, чтобы решить, какую награду ты получишь! Ой, выпала орёл. Значит, ты получаешь свёклу. Извини."
"I like you, so I'll let you in on a secret. My grandmother was an alchemist gardener, and they say her best creation was buried with her.\n\nI'd dig her up and retrieve it, but an asshole lich turned her into a living skeleton. She's in the crypt outside of town. Can you put her to rest for me? And retrieve her Demon Bean?": "Ты мне нравишься, поэтому я расскажу тебе секрет. Моя бабушка была алхимическим садовником, и говорят, что её лучшее творение похоронено вместе с ней.\\n\\nЯ бы выкопал её и забрал это, но мерзкий лич превратил её в живой скелет. Она в склепе за городом. Можешь успокоить её и забрать её Демоническую Фасоль?"
"This is it! The demon bean! In her notes, she said this seed could grow a Sampo. I'll finally be able to quit farming! Thanks so much! Oh, uh, here, take her old magic pants. I won't need them anymore!": "Вот оно! Демоническое зерно! В её записях говорилось, что из этого семени может вырасти Сампо. Наконец-то я смогу бросить фермерство! Огромное спасибо! О, эээ, вот, забирай её старые волшебные штаны. Они мне больше не нужны!"
"Someone has tried to open this chest by kicking it in. It's now unopenable. But it seems like you could pop it open if you had just the right leverage. A large-ish spoon should do the trick.": "Кто-то пытался открыть этот сундук, пинав его. Теперь его нельзя открыть. Но кажется, что его можно вскрыть, если найти правильный рычаг. Большая ложка должна подойти."
"You pop the chest open to reveal the contents.": "Ты открываешь сундук и видишь его содержимое."
"This chest isn't locked, but it's jammed shut. If you had a spoon of some sort, you could pop it open.": "Этот сундук не заперт, но заедает. Если бы у тебя была какая-нибудь ложка, ты мог бы открыть его."
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Astounding Magic Rings and 5 Astounding Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\n\n": "Привет! Я недавно присоединилась к каравану, чтобы изучить новые методы ювелирного дела. Как насчёт начать вместе с тобой? Сделай для меня 5 потрясающих магических колец и 5 потрясающих зачарованных ожерелий. Принеси их мне для изучения, и взамен я поделюсь с тобой частью своих знаний. Звучит как честный обмен?"
"Excellent! This will keep me distracted for a bit. Those mantises kinda creep me out. They just don't seem... natural. Anyway, here's a few tips to help you move forward in your craft! If you want to learn some more, come back and see me again later.\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это немного меня отвлечёт. Эти богомолы меня немного пугают. Они просто кажутся... неестественными. В любом случае, вот несколько советов, которые помогут тебе продвинуться в ремесле! Если хочешь узнать больше, приходи ко мне ещё позже.\\n\\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hey there! I recently joined the caravan to explore new methods of jewelry crafting. How about I get started with you? Craft me 5 Great Magic Rings and 5 Great Enchanted Necklaces. Bring them to me to study, and in return I will share some of my knowledge with you. Sound like a fair trade?\n\n": "Привет! Я недавно присоединилась к каравану, чтобы изучить новые методы ювелирного дела. Как насчёт начать вместе с тобой? Сделай для меня 5 великолепных магических колец и 5 великолепных зачарованных ожерелий. Принеси их мне для изучения, и взамен я поделюсь с тобой частью своих знаний. Звучит как честный обмен?"
"Excellent! This will keep me distracted for a bit. Those mantises kinda creep me out. They just don't seem... natural. Anyway, here's a few tips to help you move forward in your craft! If you want to learn some more, come back and see me again later.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это немного меня отвлечёт. Эти богомолы меня немного пугают. Они просто кажутся... неестественными. В любом случае, вот несколько советов, которые помогут тебе продвинуться в ремесле! Если хочешь узнать больше, приходи ко мне ещё позже.\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hi There! I'm fairly new to the caravan! So you like making jewelry too? Let's swap some ideas! Bring me 5 Nice Magic Rings and 5 Nice Enchanted Necklaces. Once I can go over your stuff, I'll share some of what I know too!\n\n": "Привет! Я довольно новенькая в караване! Тебе тоже нравится делать украшения? Давай обменяемся идеями! Принеси мне 5 красивых магических колец и 5 красивых зачарованных ожерелий. Как только я посмотрю твои вещи, я тоже поделюсь тем, что знаю!"
"Fantastic! New techniques for me to look over and learn! This will keep me busy for a bit. Here's a little something I can share with you. Come back and see me later if you want to swap some more ideas!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Новые техники, которые я могу изучить и освоить! Это займет меня на некоторое время. Вот небольшое, чем я могу с тобой поделиться. Приходи позже, если хочешь обменяться ещё идеями!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Try making some juniper wine. It's not easy, but it's worth it! Sometimes, anyway!": "Попробуй сделать можжевеловое вино. Это непросто, но того стоит! Иногда, по крайней мере!"
"Ahhh, smell that pinecone goodness.\n\nHmm, that's an acquired taste, isn't it? Best get to acquiring!\n\nLet me teach you a wine with a bit less of a learning curve.": "Аххх, почувствуй этот аромат сосновой шишки.\\n\\nХмм, это вкус не для всех, правда? Лучше начать привыкать!\\n\\nПозволь научить тебя вину с меньшей кривой обучения."
"You're a friend, and I trust your discretion. We both know that the Winter Court is infiltrating this land, and they need to be stopped. But we dare not attack them until they attack first.\n\nYou, on the other hand... you could just kill 'em all, as the humans say...": "Ты друг, и я доверяю твоей рассудительности. Мы оба знаем, что Зимний Двор проникает в эти земли, и их нужно остановить. Но мы не смеем нападать первыми.\\n\\nА ты, с другой стороны... можешь просто убить их всех, как говорят люди..."
"This is perfect! Those fairies will be back soon, but you've put them on the defensive. You're one of the worst kinds of pests: a powerful mortal interfering with fairy politics!\n\nOf course, this means they'll be hunting for you. But I'm sure you'll be fine.\n\nIf you feel like killing some more of them, just let me know first!": "Это идеально! Эти феи скоро вернутся, но ты поставил их в оборону. Ты один из худших видов вредителей: могущественный смертный, вмешивающийся в политику фей!\\n\\nКонечно, это значит, что они будут охотиться на тебя. Но я уверен, что с тобой всё будет в порядке.\\n\\nЕсли захочешь убить ещё несколько из них, просто дай мне знать заранее!"
"Pegast will not relent! He wants me to hop to the next mushroom circle and take out the winter court there. But I can't bring myself to do it! Could you ... do it for me? Just a few kills should be enough to get him out of my nest for a bit.": "Пегаст не отступит! Он хочет, чтобы я перепрыгнула на следующий круг грибов и уничтожила зимний двор там. Но я не могу заставить себя это сделать! Не мог бы ты... сделать это за меня? Несколько убийств должно хватить, чтобы он отстал от моего гнезда на время."
"Oh thank you so much! Did you have to travel far from the circle?\n\nOh... you do know how to hop mushroom circles, right? No? Let me show you! It's really very simple teleportation magic. I'm sorry, I should have checked before you went all that way.": "О, большое спасибо! Тебе пришлось далеко идти от круга?\\n\\nО... ты же умеешь прыгать по грибным кругам, правда? Нет? Позволь показать! Это очень простая магия телепортации. Извини, мне следовало проверить это, прежде чем ты пошёл так далеко."
"Well, Sinda's dead. I blame that human that brought her to this horrible place. Unfortunately he has no mate to commit Kar-Get upon. Perhaps he has children. Find out for me. I am not an expert at combat, but I will have my vengeance.\n\nI know that the human stayed at Eltibule Keep years ago, before the duke abandoned it. And like all human sages, he was a prolific journaler. Perhaps he left something there that would illuminate matters.": "Что ж, Синда мертва. Я виню того человека, который привёл её в это ужасное место. К сожалению, у него нет спутницы, на которую можно было бы совершить Кар-Гет. Возможно, у него есть дети. Узнай для меня. Я не эксперт в бою, но я отомщу.\n\nЯ знаю, что этот человек жил в крепости Элтибуле много лет назад, до того как герцог её покинул. И, как все человеческие мудрецы, он был плодовитым дневниковедом. Возможно, он оставил там что-то, что прояснит ситуацию."
"Ah, good. Let me see this.\n\n<i>(Yasinda reads quickly, with intense concentration.)</i> I see. He has a daughter in Statehelm. But he also seemed genuinely fond of Sinda. Argh! I wish I was first-generation; this would be so much easier without a conscience! Well. Thank you. I will contemplate my options.\n\nHere, take this ring back. As a gift for Sinda, I'd commissioned a spell to enhance the ring her father gave her. I went ahead and used the spell, figuring I could wear the ring myself, but it's too painful to keep. Please get rid of it for me.": "Ах, хорошо. Дай-ка я это посмотрю.\\n\\n<i>(Ясинда быстро читает с напряжённой концентрацией.)</i> Понятно. У него есть дочь в Стейтхелме. Но он также, похоже, искренне привязан к Синде. Аргх! Хотелось бы быть первым поколением; с совестью было бы намного сложнее! Ну что ж. Спасибо. Я обдумаю свои варианты.\\n\\nВот, возьми это кольцо обратно. В подарок Синде я заказала заклинание, чтобы усилить кольцо, которое ей дал отец. Я решила использовать заклинание сама, думая, что смогу носить кольцо, но это слишком больно. Пожалуйста, избавься от него для меня."
"You plan to kill more of the Winter Court menace? Wonderful! Go and 'mortal everything up' for the Winter Court!": "Ты планируешь уничтожить ещё больше угрозы Зимнего Двора? Прекрасно! Иди и «сделай всё смертным» для Зимнего Двора!"
"I'm glad you understand the importance of this work. Those fairies will be right back in a few days, but one does not quickly get over the shame of being killed by a mortal! You're demoralizing them quite dramatically! In a few days, I hope you can make time to murder some more.": "Я рад, что ты понимаешь важность этой работы. Эти феи вернутся через несколько дней, но стыд от того, что их убил смертный, не проходит быстро! Ты сильно деморализуешь их! Надеюсь, через несколько дней ты найдёшь время, чтобы убить ещё немного."
"I didn't lay in enough cedar wood chips for all the cooking that Laura's been doing. She brings in lots of customers and I don't want her to get upset!\n\nI have plenty of maple wood, but she only uses cedar for cooking. Can you get some more?": "Я не положил достаточно кедровой щепы для всей готовки, которую делает Лаура. Она привлекает много клиентов, и я не хочу, чтобы она расстроилась!\\n\\nУ меня много клёновой древесины, но для готовки она использует только кедр. Можешь принести ещё?"
"Perfect! You're the best! Here, take this old thing. It looks good on you!": "Отлично! Ты лучший! Вот, возьми эту старую вещь. Она тебе к лицу!"
"Assistance? No, no, I am here to help you! ... Well, if you insist on aiding staff members, the meat storage receptacle could be kept at a slightly colder temperature to reduce spoilage. A few more Ice Cores would work.": "Помощь? Нет, нет, я здесь, чтобы помочь тебе! ... Хотя, если ты настаиваешь на помощи сотрудникам, контейнер для хранения мяса можно держать немного холоднее, чтобы уменьшить порчу. Несколько дополнительных Ледяных Ядер подойдут."
"They have exquisite magic, don't you agree? These Ice Cores never get warm enough to melt... ever! I've thrown them into fires and they still retain this property. This is a phenomenal level of power, in some ways... anyway, I appreciate your efforts. Thank you!": "У них изысканная магия, не так ли? Эти Ледяные Сердцевины никогда не нагреваются достаточно, чтобы растаять... никогда! Я бросал их в огонь, и они всё равно сохраняют это свойство. Это феноменальный уровень силы, в некотором смысле... в любом случае, я ценю твои усилия. Спасибо!"
"In my spare time I dabble in artistic weapon improvements, and I'm working on a dazzling khopesh. But I need more raw materials!\n\nI'm not a smith, but if I had enough old broken blades, I could probably fulfill my artistic vision.": "В свободное время я занимаюсь художественным улучшением оружия и сейчас работаю над ослепительным копешем. Но мне нужно больше сырья!\\n\\nЯ не кузнец, но если бы у меня было достаточно старых сломанных клинков, я, вероятно, смог бы воплотить свою художественную задумку."
"Thank you for gathering these! I am honored by your thoughtfulness. Here: this is an earlier blade I worked on. I hope you like it.": "Спасибо, что собрал это! Я польщён твоей заботой. Вот: это один из ранних клинков, над которым я работал. Надеюсь, он тебе понравится."
"Listen carefully.\n\nSeek a lich named Khyrulek underneath a town called Serbule. The lich... isn't there. But there may be... guardians.\n\nThis lich had a planar guide which I need. It will be hidden in a trove of Tuvillus artifacts.\n\nIf I recall... you can find it in her sleeping quarters.\n\nLook for a rune of Tuvillus -- a red sigil. It will be... on the wall.\n\nTouch it to reveal the hoard. Bring me back Khyrulek's Planar Planner.": "Слушай внимательно.\\n\\nИщи лича по имени Хирулек под городом Сербуль. Лича... там нет. Но могут быть... стражи.\\n\\nУ этого лича был планарный путеводитель, который мне нужен. Он будет спрятан в сокровищнице артефактов Тувиллуса.\\n\\nЕсли я правильно помню... ты можешь найти его в её спальной комнате.\\n\\nИщи руну Тувиллуса — красный символ. Она будет... на стене.\\n\\nКоснись её, чтобы открыть сокровищницу. Принеси мне планарный путеводитель Хирулека."
"Yes! This is her precious book of...wait...it's in code. Can you read this?\n\nNor can I. We have more work to do. Let me... think.": "Да! Это её драгоценная книга... подожди... она зашифрована. Ты можешь это прочитать?\\n\\nЯ тоже не могу. Нам предстоит ещё много работы. Дай-ка... подумаю."
"I learned something fascinating yesterday: there are relatively low-cost fire resistance potions on this continent. Those are quite rare in my homeland. Sadly they don't see much use here in the casino. I bought Ragabir's stock, but I have more tests to run. Can you bring me several doses?": "Вчера я узнал кое-что интересное: на этом континенте есть относительно недорогие зелья сопротивления огню. В моей родине они довольно редки. К сожалению, здесь, в казино, их мало используют. Я купил запасы Рагабира, но мне нужно провести ещё несколько испытаний. Можешь принести мне несколько доз?"
"I graciously accept your gift of potions! Did you make these yourself? It can't be that difficult, then!\n\nIf this works out, it could be just the thing to survive the heat of the deserts back home. Not that my people need heat protection, of course, but I can sell it to less-hardy species! I bet the ranalons will pay well for it...": "Я с благодарностью принимаю твой подарок — зелья! Ты сам их сделал? Значит, это не так уж сложно!\\n\\nЕсли всё получится, это может стать именно тем, что поможет выжить в жаре пустынь на родине. Конечно, моим соплеменникам защита от жары не нужна, но я могу продать её менее выносливым видам! Уверен, раналоны хорошо за это заплатят..."
"We've seen how you can punch. But now you need to really test your kicking power. Go and kick some of those demon dogs -- those Cerberi -- to death. Take off your shoes and any leg guards so you can feel the complete motion of your limbs.\n\n<i>[You must have the empty Feet and Legs slots, and kill enemies with Kick abilities, to advance this quest.]</i>": "Мы видели, как ты умеешь бить кулаками. Но теперь тебе нужно действительно проверить силу своих ударов ногой. Иди и забей до смерти нескольких из этих демонических собак — церберов. Сними обувь и любые защитные элементы на ногах, чтобы почувствовать полное движение конечностей.\\n\\n<i>[Для выполнения этого задания у тебя должны быть пустые слоты для Ступней и Ног, и нужно убивать врагов с помощью ударов ногой.]</i>"
"See how much more range of motion you have when you free your limbs? Take that lesson with you. Think about how to apply that knowledge without reducing your survivability.": "Заметь, насколько больше у тебя свободы движений, когда ты освобождаешь конечности? Возьми этот урок с собой. Подумай, как применить эти знания, не снижая свою выживаемость."
"Yeah, there's some mantises out there that are causin' trouble. Can you go whack 'em? They're getting too close for comfort.": "Да, там есть несколько богомолов, которые создают проблемы. Можешь пойти и разобраться с ними? Они слишком близко подходят."
"Thanks! You're a peach. Here's something for your trouble. And let me tell you some gardening tips, too.": "Спасибо! Ты просто прелесть. Вот тебе что-то за твои труды. И позволь ещё дать пару советов по садоводству."
"Oh for fuck's sake. Now the snails are gettin' too close! Go clear those out too, okay?": "Чёрт побери. Теперь улитки слишком близко! Убери и их тоже, хорошо?"
"Thanks! You're a kipper. Here's something for your trouble. And let me tell you some gardening tips, too.": "Спасибо! Ты настоящий киппер. Вот тебе что-то за твои труды. И позволь ещё дать пару советов по садоводству."
"I don't know if you believe me or not about these Myconians. But I need you to believe! Go out there and find yourself some. And kill them! Kill a dozen! Then come back. I'll know you did the deed. The stink will be all over you. Go now. Do it.": "Не знаю, веришь ли ты мне насчёт этих микониан. Но мне нужно, чтобы ты поверил! Выйди туда и найди их. И убей! Убей дюжину! Потом возвращайся. Я узнаю, что ты сделал дело. От тебя будет вонять. Иди сейчас. Сделай это."
"Ha ha ha ha ha! You did it! I'm not crazy! I'm NOT crazy! But since I intuitively knew you did it, that means... I'm attuned to them. They're already inside my head. I am crazy. Damn! I...": "Ха-ха-ха-ха-ха! Ты сделал это! Я не сумасшедший! Я НЕ сумасшедший! Но раз я интуитивно знал, что ты справишься, значит... я настроен на них. Они уже внутри моей головы. Я сумасшедший. Чёрт! Я..."
"Look. We're friends so I'm gonna level with you. I'm... I'm a little scared to go back out there. There was a sheep that nearly killed me. Just a fuckin' <i>sheep</i>. But I couldn't outfight him and I couldn't outrun him. I'd feel a lot better if I knew he was gone. He lives on a hill south of here. Not the hill immediately south, but the one past that, in between the Baroness and the old hunting lodge.": "Слушай. Мы друзья, так что я буду с тобой честен. Мне... немного страшно снова туда идти. Там была овца, которая чуть не убила меня. Просто чёртова <i>овца</i>. Но я не смог её победить в бою и не смог убежать. Мне было бы гораздо спокойнее, если бы я знал, что её больше нет. Она живёт на холме к югу отсюда. Не на ближайшем к югу холме, а на том, что дальше, между баронессой и старой охотничьей усадьбой."
"You killed him?! Thank you so much! And now if you promise never to tell anyone I was scared of a sheep, I'll teach you some of my fanciest mining tricks.": "Ты его убил?! Большое спасибо! А теперь, если пообещаешь никому не рассказывать, что я боялся овцы, я научу тебя своим самым изысканным горным приёмам."
"If you're set on getting past this door, you'll have to prove to me you won't die the moment you do. Go kill the Doctrine-Keeper, and when you've done that we'll talk.": "Если ты настроен пройти через эту дверь, тебе нужно доказать мне, что ты не умрёшь сразу после этого. Иди и убей Хранителя Доктрины, а когда сделаешь это, мы поговорим."
"Hmm. I guess you'll do. Use that lever behind me, it'll let you through.": "Хмм. Думаю, ты подойдёшь. Используй тот рычаг за мной — он пропустит тебя дальше."
"It looks like another Doctrine-Keeper took the last one's place. If you take care of that one, too, I'll give you something for your troubles.": "Похоже, другой Хранитель Доктрины занял место предыдущего. Если ты позаботишься и об этом, я дам тебе что-нибудь за труды."
"Thanks. Come see me again tomorrow, by then another should have taken their place.": "Спасибо. Приходи ко мне снова завтра, к тому времени другой уже должен занять их место."
"You know what'll really get them to change things up? Taking down the Den Mother. Yes, she'll be replaced by another, but it's about proving to them nothing is safe.": "Знаешь, что действительно заставит их изменить подход? Убить Матку Логова. Да, её заменит другая, но дело в том, чтобы доказать им, что ничто не в безопасности."
"You actually did it? Hahahaha! I wish I could have seen the faces of the guardians when you did that.\n\nOh, you wanted something for that? Well, here, take this I guess. ": "Ты действительно сделал это? Хахахаха! Хотел бы я увидеть лица стражей, когда ты это сделал.\n\nО, ты хотел что-то за это? Ну, держи, пожалуй."
"As expected, a new Den Mother was born or burrowed in from somewhere. If you take care of this one, I'll give you some of these scrolls I found laying around. ": "Как и ожидалось, появилась новая Матка Логова или прорылась откуда-то. Если ты справишься с этой, я дам тебе несколько свитков, которые нашёл поблизости."
"Hahaha! You did it again! You're always full of surprises. Here, take this.\n\n<i>[She moves some loose rocks aside to reveal a pile of scrolls, grabs some and hands them to you. Some of them seem useful.]</i>": "Ха-ха-ха! Ты снова сделал это! Ты всегда полон сюрпризов. Вот, возьми это.\\n\\n<i>[Она отодвигает несколько рыхлых камней, открывая кучу свитков, берёт несколько и передаёт тебе. Некоторые из них кажутся полезными.]</i>"
"I miss my time in Sedgewick Forest, when I worked with my brethren to keep goblin populations in check. Would you kill goblins in my name? As they perish, make sure to state, 'This is for Mandibles.'": "Я скучаю по временам в лесу Седжуик, когда работал со своими собратьями, чтобы контролировать численность гоблинов. Ты убьёшь гоблинов во имя моё? Когда они погибнут, обязательно говори: «Это для Мэндблса."
"You bloodthirsty creature! I appreciate your efforts to keep my name in every evil goblin's heart. By the way please do not mention my anti-goblin comments to our resident goblin population. It has been a source of ... disagreement in the past. But we know the truth, do we not? Yes. We are kindred.": "Ты, кровожадное создание! Я ценю твои усилия сохранить моё имя в сердце каждого злого гоблина. Кстати, пожалуйста, не упоминай мои антигоблинские высказывания перед нашими гоблинскими жителями. Раньше это вызывало... разногласия. Но мы же знаем правду, не так ли? Да. Мы — родня."
"I have a ... delicate request to make. You see, my spell pouch is depleted, and I cannot take the time to travel all the way home to replenish it. But there are other orcish wizards in the area, and some of them have spell pouches. Could you choose some of the stupider ones and kill them for their pouches? Make it look like an accident, if you can.": "У меня есть... деликатная просьба. Видишь ли, моя сумка с заклинаниями опустела, и у меня нет времени ехать домой, чтобы пополнить её. Но в округе есть другие орочьи волшебники, и у некоторых из них есть сумки с заклинаниями. Можешь выбрать самых глупых из них и убить ради их сумок? Если сможешь, сделай так, чтобы это выглядело как несчастный случай."
"Hmm. Well these are low on sulfur, but they will do. Thank you, my friend. We shall not speak of this again, but when the time comes, I will remember who my friends are.": "Хмм. Ну, здесь мало серы, но сойдёт. Спасибо, мой друг. Мы больше не будем об этом говорить, но когда придёт время, я вспомню, кто мои друзья."
"I'm getting too old to travel comfortably. I can still fight, but riding for hours? That leaves me too sore! That's why I need your help. Each year I kill a bunch of orcs for the glory of Rahu, but we've pushed the orcs out of the desert now, so the nearest ones are in Kur. Can you travel there and kill some orcs in my name?": "Я становлюсь слишком стар, чтобы комфортно путешествовать. Я всё ещё могу сражаться, но ездить верхом часами? После этого у меня всё болит! Вот почему мне нужна твоя помощь. Каждый год я убиваю кучу орков во славу Раху, но теперь мы вытеснили орков из пустыни, и ближайшие находятся в Кур. Можешь отправиться туда и убить несколько орков от моего имени?"
"Tell me again how it went! Oh I miss the thrill of battle. The freezing cold, though... I don't miss that.": "Расскажи ещё раз, как всё прошло! О, как я скучаю по азарту битвы. А вот леденящий холод... этого я не скучаю."
"Like I said when you gave me that ghostly key... If you ever find my sister's <i>real</i> key, I could use it to open her precious-items box!\n\nI heard that somewhere out there is a ranalon who deals in river treasures. Maybe you can find this frog and beat the secret out of him!": "Как я уже говорил, когда ты дал мне тот призрачный ключ... Если ты когда-нибудь найдёшь <i>настоящий</i> ключ моей сестры, я смогу открыть её шкатулку с ценными вещами!\n\nЯ слышал, что где-то там есть раналон, который торгует речными сокровищами. Может, ты найдёшь эту лягушку и выбьешь из него секрет!"
"You found it?! This is Kimeta's key! I can open the chest she left behind! Wait just a minute.\n\n<i>[Gerrux opens a small chest and sighs.]</i> Well, I'm glad to know what was inside. But it's just more of the weird gizmos she was making. And some technical notes. Here, you can have this junk, maybe it'll make more sense to you.\n\nThanks for helping me figure out what was inside! Even though it's disappointing.": "Ты нашёл это?! Это ключ Киметы! Я могу открыть сундук, который она оставила! Подожди минутку.\\n\\n<i>[Геррукс открывает небольшой сундук и вздыхает.]</i> Ну, рад узнать, что было внутри. Но там просто ещё больше странных штуковин, которые она делала. И несколько технических заметок. Вот, можешь взять этот хлам, может, тебе он покажется понятнее.\\n\\nСпасибо, что помог мне выяснить, что было внутри! Хотя и разочаровывает."
"I am running low on lac. Normally we trade with the orcs for it, but their ships have been fewer in number of recent months. I suppose there are local sources, though: giant beetles, for instance. But I suspect the easiest way to get it is the Urak creatures that the orcs use as war-beasts. A pity there are none around here! If you meet an orcish trader, can you purchase any lac they have? I shall repay you.": "У меня заканчивается лак. Обычно мы торгуем им с орками, но в последние месяцы их кораблей стало меньше. Думаю, есть местные источники: гигантские жуки, например. Но, подозреваю, самый простой способ добыть лак — это у существ Урак, которых орки используют как боевых зверей. Жаль, что здесь их нет! Если встретишь орочьего торговца, сможешь купить у него лак? Я отплачу тебе."
"You got this for me? I did not see an orcish ship come into port, so I suppose you obtained it from some other means. You must be quite resourceful!": "Ты принёс это для меня? Я не видел, чтобы орочье судно заходило в порт, так что, полагаю, ты достал это другим способом. Ты, должно быть, очень находчив!"
"There's lots of good cedar here, and a little bit of maple, but no oak. You wouldn't happen to have oak wood with you, by chance?": "Здесь много хорошего кедра и немного клёна, но дуба нет. Случайно у тебя нет при себе дубовой древесины?"
"Thanks! Let me show you a clever way to prepare oak planks. <i>[You gain Carpentry XP.]</i>": "Спасибо! Позволь показать тебе умный способ приготовления дубовых досок. <i>[Ты получаешь опыт в Плотницком деле.]</i>"
"We've replaced every single oil lamp with a modern heating-crystal system that turns itself on at night and off in the morning. A true wonder of innovation! Except dwarves have already had these for centuries, but let's not go there. Anyway, the design is very new and we're still working out the kinks. Well, we WERE before the demons showed up. Right now we're just trying to keep things running as best we can. We lose lamps every night!\n\nBut I've become convinced it's less about a design flaw and more about... something else. See, when the lamps break they become overcharged. In this state they can also overcharge other nearby lamps! The darkness can spread, making whole areas unsafe. And, of course, vampires are always ready to take advantage of these outages to feed on the unsuspecting.\n\nTake some replacement bulbs and fix broken lamps tonight. I'll reimburse you for the lamps.": "Мы заменили каждую масляную лампу на современную систему нагревательных кристаллов, которая включается ночью и выключается утром. Настоящее чудо инноваций! Хотя гномы уже веками пользуются такими, но не будем об этом. В любом случае, дизайн очень новый, и мы всё ещё устраняем недочёты. Ну, по крайней мере, так было до появления демонов. Сейчас мы просто пытаемся поддерживать систему как можно лучше. Каждую ночь у нас ломаются лампы!\n\nНо я убедился, что дело не в недостатках конструкции, а в... чём-то другом. Видишь ли, когда лампы ломаются, они перенапрягаются. В таком состоянии они могут перенапрягать и другие лампы поблизости! Тьма распространяется, делая целые участки небезопасными. И, конечно, вампиры всегда готовы воспользоваться этими отключениями, чтобы напасть на ничего не подозревающих.\n\nВозьми запасные лампочки и почини сломанные лампы сегодня ночью. Я возмещу тебе стоимость ламп."
"Good work. We need to keep up the appearance of being a safe city. We definitely DON'T want Sereel or even lady Irasce deciding to \"just fix it with a spell.\" So the safer we can keep the city, the better!": "Хорошая работа. Нам нужно поддерживать видимость безопасного города. Нам определённо НЕ нужно, чтобы Серил или даже леди Ирасце решили «просто исправить это заклинанием». Чем безопаснее мы сможем держать город, тем лучше!"
"Ready to fix more malfunctioning lamps? Excellent. I'll pay you same as before.": "Готов починить ещё неисправные лампы? Отлично. Заплачу тебе так же, как и раньше."
"I appreciate you keeping the lamps lit. Those evil vampires are behind the outages -- I'm sure of it, I just don't have any proof! ... Or anything I could do about it anyway. But your continued efforts are thwarting whatever evil scheme is going on!": "Благодарю тебя за то, что поддерживаешь лампы горящими. За отключениями стоят эти злые вампиры — я в этом уверен, хоть и не имею доказательств! ... И всё равно ничего не могу с этим поделать. Но твои постоянные усилия срывают какую бы то ни было злую затею!"
"You know how every kind of crystal has certain magical attunements? Well, lapis lazuli is attuned to alchemy. It has many uses for empowering potions. And I'm fresh out. Get me some?": "Знаешь, у каждого вида кристаллов есть свои магические настройки? Так вот, лазурит настроен на алхимию. Он очень полезен для усиления зелий. А у меня его совсем нет. Принесёшь немного?"
"Perfect! Let me give you something in return. Hmm, I know, here: take my stash. I've sworn off the stuff. But it's great when you need a little extra kick. Just don't get hooked on it, okay? It can really mess you up.": "Отлично! Позволь дать тебе что-то взамен. Хм, знаю, вот: возьми мою заначку. Я поклялся отказаться от этого. Но это здорово, когда нужен небольшой дополнительный заряд. Только не подсаживайся, ладно? Это может серьёзно навредить."
"I'd like to engrave a blessing of safety into the door of Ukorga's inn. It'll act as a protective charm. But I need some special items to do it! First, I need lapis gems. They're the favorite gem of Arisetsu. Can you find me some?": "Я хотела бы выгравировать благословение безопасности на дверь трактира Укорги. Это будет служить защитным талисманом. Но для этого мне нужны особые предметы! Во-первых, мне нужны ляпис-камни. Это любимые камни Арицецу. Ты можешь найти их для меня?"
"Thank you! Now if I can get the right ink, I can perform the inscription. Oh here, do you want this? It's the best ink Ukorga had on hand. But it's not good enough for a blessing!": "Спасибо! Теперь, если я смогу достать подходящие чернила, я смогу сделать надпись. О, вот, хочешь это? Это лучшие чернила, какие были у Укорги. Но для благословения они всё же не годятся!"
"I have need of large hate pearls. You can sometimes find them on the corpses of your victims. Speak with Grasuul to find the freshest blood today... that will also be your best chance for finding hate pearls.\n\nFor this particular purpose I do not... care how fresh they are. You may use store-bought hate pearls for all I care. Just make certain they are extremely... hateful. ": "Их иногда можно найти на трупах твоих жертв. Поговори с Грасуулом, чтобы найти сегодня самую свежую кровь... это также будет твоим лучшим шансом найти жемчужины ненависти.\n\nДля этой конкретной цели мне не важно, насколько они свежие. Можешь использовать купленные в магазине жемчужины ненависти, если хочешь. Просто убедись, что они чрезвычайно... злобные."
"Astute work. I shall make use of these.": "Проницательная работа. Я воспользуюсь этим."
"You found a wild horse and learned a lot from watching its movements. If you were to interact with enough horses, you're confident that you'd learn to ride and tame them.": "Вы нашли дикую лошадь и многому научились, наблюдая за её движениями. Если вы будете взаимодействовать с достаточным количеством лошадей, вы уверены, что научитесь ездить на них и приручать."
"You've picked up the very basics of horse handling. You should be able to tame a wild horse now, but it would need to be a very calm horse... and you'd need a special treat for the horse!\n\nYou found weird seeds near one of the horses... perhaps whatever grows from these would work?": "Ты освоил самые основы обращения с лошадьми. Теперь ты должен уметь приручить дикую лошадь, но она должна быть очень спокойной... и тебе понадобится особое угощение для лошади!\\n\\nТы нашёл странные семена рядом с одной из лошадей... возможно, то, что вырастет из них, подойдёт?"
"You're a good sort. I should let you in on something: I'm fond of leather parties. Everyone wears amazing custom leather clothes, and it's exquisite! I'm throwing one soon, and I need a bunch of leather. Shoddy leather will do; these are costumes that will only be worn once, after all.": "Ты хороший человек. Должен тебе кое-что рассказать: я люблю кожаные вечеринки. Все носят потрясающие кожаные костюмы на заказ, и это изысканно! Скоро я устраиваю такую, и мне нужно много кожи. Подойдёт и некачественная кожа; в конце концов, эти костюмы будут надеты всего один раз."
"Very nice! I'd invite you to the party, but... well, maybe next time!": "Очень хорошо! Я бы пригласил тебя на вечеринку, но... ну, может, в следующий раз!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Leather suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый приличный кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Thank you! I will study this to see if I can improve my own skills. As promised, here's a little something to help you along as well. If you want to share some more knowledge later, come see me again!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Я изучу это, чтобы понять, смогу ли улучшить свои навыки. Как и обещал, вот небольшая помощь и для тебя. Если захочешь поделиться ещё знаниями позже, приходи ко мне снова!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Leather suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый качественный кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Leather suit and I will see what I can do to help you flourish at your craft!  I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый костюм из Грубого кожаного материала, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле! Мне нужна только зачарованная версия костюма... Я не работаю с незачарованным хламом!"
"Thank you! I will study this to see if I can improve my own skills. As promised, here's a little something to help you along as well. If you want to share some more knowledge later, come see me again!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Я изучу это, чтобы понять, смогу ли улучшить свои навыки. Как и обещал, вот небольшая помощь и для тебя. Если захочешь поделиться ещё знаниями позже, приходи ко мне снова!\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Amazing Leather suit and I will see what I can do to help you flourish at your craft!\n\n": "Хотите обменяться знаниями, чтобы развить свои навыки? Принесите мне один полностью сшитый удивительный кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь вам преуспеть в ремесле!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Awesome Leather suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый потрясающий кожаный костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Thank you! I will study this to see if I can improve my own skills. As promised, here's a little something to help you along as well. If you want to share some more knowledge later, come see me again!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Я изучу это, чтобы понять, смогу ли улучшить свои навыки. Как и обещал, вот небольшая помощь и для тебя. Если захочешь поделиться ещё знаниями позже, приходи ко мне снова!\\n\\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"So can you get me some of this lemon chiffon dye? Firaki said some mantis in Serbule sells the recipe, right? How many mantises can there be?\n\nDo this for me and I'll teach you how to make your own buckles.": "Так ты можешь достать мне немного этого красителя лимонный шифон? Фираки сказал, что какой-то богомол в Сербуле продаёт рецепт, да? Сколько там может быть богомолов?\n\nСделаешь это для меня — и я научу тебя делать собственные пряжки."
"This is it! Hm. It's... it's really ugly. But I'll give it a try. Thanks. And a deal's a deal: let me teach you the basics of buckle artistry.": "Вот оно! Хм. Оно... действительно уродливое. Но я попробую. Спасибо. И сделка есть сделка: позволь мне научить тебя основам искусства пряжек."
"You've been incredibly helpful in my research thus far, but we've only been dealing with the minions. I still have many questions about the higher ranks of the demons.\n\nWe should start by examining the large ones. I've noticed that one of them seems more in-charge than the other, despite no obvious physical differences. The brains have been so helpful in the past, and you've proven that you're clearly capable of extracting them, so bring me some from each, if you don't mind.": "Ты уже очень помог в моих исследованиях, но мы пока имели дело только с приспешниками. У меня всё ещё много вопросов о высших рангах демонов.\\n\\nНачнём с изучения крупных. Я заметил, что один из них кажется более руководящим, чем другой, несмотря на отсутствие явных физических различий. Мозги уже не раз были очень полезны, и ты доказал, что умеешь их добывать, так что принеси мне немного от каждого, если не возражаешь."
"I knew it! One type of Behemoth evolves into the other, much the same as the Swarmers evolve into Soldiers. What could this mean? Why are there so many evolutions happening among their ranks, and what causes them? Like any good experiment, this seems to have provided more questions than answers. But at least it's something for us to ponder.": "Я знал! Один тип Бегемота эволюционирует в другой, так же, как Роевые превращаются в Солдат. Что это может значить? Почему среди них происходит так много эволюций и что их вызывает? Как и в любом хорошем эксперименте, это, похоже, породило больше вопросов, чем ответов. Но по крайней мере у нас есть над чем задуматься."
"It was a mistake to speak with my superior about personal matters. While conversing amicably to my boss, Qatik, I mentioned my attraction to Tavilak. Qatik became emotional and demanded that I never mate with Tavilak. I suspect Qatik wants to mate with me herself. I enjoy Qatik's company more than any other Red Wing mantis, but I am not interested in mating with her. Could you explain this to Qatik for me? Make it seem like the topic is entirely your idea.": "Это была ошибка — говорить с моим начальником о личных делах. Во время дружеского разговора с моим боссом, Катиком, я упомянула о своей симпатии к Тавилаку. Катик расстроился и потребовал, чтобы я никогда не спаривалась с Тавилаком. Я подозреваю, что Катик хочет спариваться со мной сама. Мне нравится компания Катика больше, чем любого другого богомола из Красного Крыла, но я не заинтересована в спаривании с ней. Можешь объяснить это Катику за меня? Сделай так, чтобы казалось, что эта тема — полностью твоя идея."
"Oh. Qatik does not wish to mate with me? And Tavilak has eaten her mating partners in the past?! That is the piece of information I needed. Qatik's behavior now makes sense, although I still do not like it! Please, I need another favor of you...": "О. Катик не хочет спариваться со мной? А Тавилак раньше съедал своих партнёров по спариванию?! Вот та информация, которая мне была нужна. Теперь поведение Катика становится понятным, хотя мне это всё равно не нравится! Пожалуйста, мне нужна ещё одна услуга от тебя..."
"What? Did Irkima put you up to this? Look, I don't want to mate with Irkima. I am busy wooing a Red Wing general and do not need to add further complexity to my relationships! I simply need him to pick a different mate than Tavilak. She is a good worker and a dangerous warrior, but she is not a good mate for Irkima. Tell him that I will be happy to find a nice willing mate for him... one that doesn't kill their partners!": "Что? Иркима тебя на это подговорил? Слушай, я не хочу спариваться с Иркимой. Я занята ухаживанием за генералом из Красного Крыла и не хочу усложнять свои отношения! Мне просто нужно, чтобы он выбрал другую пару, а не Тавилака. Она хорошая работница и опасный воин, но не подходит Иркиме как партнёр. Скажи ему, что я с радостью найду для него подходящую охотницу... ту, которая не убивает своих партнёров!"
"The reason I'm here in Kur is the tundra lichen. They grow here, though I've not found very many. I need more tundra lichen for my research. If you see any, I will pay handsomely.": "Причина моего пребывания в Кур — тундровый лишайник. Он растёт здесь, хотя я нашёл совсем немного. Мне нужно больше тундрового лишайника для моих исследований. Если увидишь, я щедро заплачу."
"Yes. This is the lichen. Thank you. With this acting as a power chamber, I should be able to break the dimensional barrier and discover entire new worlds of existence. But I need a lot more research to test my theory.\n\nSorry, I didn't mean to ramble. Here, take some coin for your work.": "Да. Это лишайник. Спасибо. С этим в качестве силовой камеры я смогу пробить измерительный барьер и открыть целые новые миры существования. Но мне нужно гораздо больше исследований, чтобы проверить свою теорию.\\n\\nИзвини, я не хотел разглагольствовать. Вот, возьми немного монет за свою работу."
"Of course, you must know how to revive the recently-incapacitated. Have you mastered the technique yet? Here: this practice lute may help. ": "Конечно, ты должен уметь оживлять недавно выведенных из строя. Ты уже освоил эту технику? Вот: эта тренировочная лютня может помочь."
"You've saved lives! How does that feel? Bardic? There's more where that came from!": "Ты спас жизни! Каково это — быть бардом? И это ещё не всё!"
"The bottle is surprisingly heavy -- you can't even lift it! You notice a keyhole in the cork, which makes no sense at all, but it is there nonetheless. You are unable to pry the cork out -- apparently you need a key.": "Бутылка удивительно тяжёлая — ты даже не можешь её поднять! Ты замечаешь замочную скважину в пробке, что совершенно нелогично, но она там есть. Вынуть пробку не получается — очевидно, нужен ключ."
"You unlock the cork, and pop it out...": "Ты открываешь пробку и вынимаешь её..."
"We've studied the minions and the Behemoths pretty exhaustively, but there's still a lot we don't know about the highest ranks: the Overseers and the Justiciars. I would love to observe their inner workings and see how they stack up to the others. You know what to do.": "Мы довольно тщательно изучили приспешников и Бегемотов, но всё ещё многое не знаем о высших рангах: Надзирателях и Правосудцах. Мне бы очень хотелось наблюдать за их внутренней работой и понять, как они соотносятся с остальными. Ты знаешь, что делать."
"Now this is unexpected. Not only are the highest ranks completely different from the lower ranks, but they're also completely different from each other! Considering their similar appearances, I would have assumed their brains would be identical.\n\nI must ponder what to do with all of this information. In the meantime, I may have other research you can assist with.\n\n<i>[You've unlocked daily quests with Ferris]</i>": "Вот это неожиданно. Высшие чины не только полностью отличаются от низших, но и совершенно разные между собой! Учитывая их похожий внешний вид, я бы предположил, что их мозги идентичны.\\n\\nМне нужно обдумать, что делать со всей этой информацией. Тем временем у меня может быть другое исследование, в котором ты сможешь помочь.\\n\\n<i>[Ты разблокировал ежедневные задания у Ферриса]</i>"
"I had hoped to master the phrenological areas of humans and elves from the corpses in this crypt, but I didn't find nearly enough skulls. Could you find some humanoid skulls for me? There should be a few lying around in here. Or heck, if you have some from elsewhere, I'd take those too. I just need to continue my studies!": "Я надеялся освоить френологические области человека и эльфов по черепам в этом склепе, но нашёл слишком мало черепов. Можешь найти для меня несколько черепов гуманоидов? Здесь должно быть несколько штук. Или, если у тебя есть черепа из других мест, я возьму и их. Мне нужно продолжить свои исследования!"
"Great! Look, see this bump here? <i>He points to an almost imperceptible bump on one of the skulls.</i> Associated with feelings of neglect. And here, this skull has the same rise! All of the people here seem to have had low self esteem. How odd, I have to study this further.\n\n Oh, right after you left, I remembered there's a <i>much</i> easier way to get skulls. You can just use a skull extractor on corpses! Here, you can take mine.": "Отлично! Смотри, видишь этот бугорок здесь? <i>Он указывает на почти незаметный бугорок на одном из черепов.</i> Связан с чувством заброшенности. А вот на этом черепе такой же выступ! У всех людей здесь, похоже, была низкая самооценка. Как странно, мне нужно это изучить подробнее.\\n\\n О, кстати, сразу после твоего ухода я вспомнил, что есть <i>гораздо</i> более простой способ добыть черепа. Можно просто использовать экстрактор черепов на трупах! Вот, можешь взять мой."
"The door doesn't budge. A cloying voice says, \"Where are my penguins?! I won't go anywhere without ALL of my penguins!\"": "Дверь не поддаётся. Приторный голос говорит: «Где мои пингвины?! Я никуда не пойду без ВСЕХ моих пингвинов!"
"The door exudes a satisfied air. \"My penguins! You saved them!\"": "Дверь излучает довольство. «Моих пингвинов! Ты спас их!"
"You know that weird elven building out on the island? Past the big bridge? That used to be an inn or hostel or something like that. Some rich elf was trying to make money. Everybody's been gone for years, but I heard they had amazing breakfasts and really cozy beds. And get this: Jumper checked it out and said there was some paper with writing in there. He can't read, but I'm hoping its a recipe or something like that. Can you go get it?": "Знаешь то странное эльфийское здание на острове? За большим мостом? Раньше там была гостиница или что-то вроде того. Какой-то богатый эльф пытался на этом заработать. Все уехали уже много лет назад, но я слышал, что там были потрясающие завтраки и очень уютные кровати. И вот что: Джампер проверял это место и сказал, что там была какая-то бумага с надписями. Он не умеет читать, но я надеюсь, что это рецепт или что-то в этом роде. Можешь сходить и забрать её?"
"This is it? Thanks! <i>Norbert reads the letter.</i> Well, that's disappointing. Why do I even bother to try to do nice things for people if ... oh, sorry, I shouldn't rant in front of others. Here, take this for your own recipes.": "Это оно? Спасибо! <i>Норберт читает письмо.</i> Ну, это разочаровывает. Зачем я вообще стараюсь делать людям приятное, если... ой, извини, не стоит ругаться при других. Вот, возьми это для своих рецептов."
"While I am still... more powerful than you could ever dream to be, I... have been robbed of much of my... power. But do not worry. You shall help me recover.\n\nNot too long ago I had a thrall hide supplies in an abandoned keep in Eltibule. Find a way into the walls and find a rune of Tuvillus.\nDefeat the primitive guardian and... bring me the ointment it guards. Hurry.": "Хотя я всё ещё... могущественнее, чем ты когда-либо мог мечтать, меня... лишили большей части моей... силы. Но не волнуйся. Ты поможешь мне восстановиться.\\n\\nНедавно один раб спрятал припасы в заброшенной крепости в Элтибуле. Найди способ проникнуть в стены и найти руну Тувиллюса.\\nПобеди примитивного стража и... принеси мне мазь, которую он охраняет. Поторопись."
"This ointment is ruined!\n\nNo, it's not your fault. The idiot thrall created this, and he didn't... listen when I said to pack the nightshade... separately.\n\nLet this be a lesson - never take shortcuts in alchemy.\n\nI suppose we shall have to create a new...\nbatch.": "Это мазь испорчена!\\n\\nНет, это не твоя вина. Этот идиот-раб создал её и не... послушал, когда я сказал упаковать паслён... отдельно.\\n\\nПусть это будет уроком — никогда не делай сокращений в алхимии.\\n\\nПолагаю, нам придётся создать новую...\\nпартии."
"I have been instructed to sell more 'baubles and trinkets' to appeal to drunken bipeds with lots of cash. They often ask for lucky tokens, so I wish to procure some rabbit feet. If you bring me three, I shall pay 1200 Councils for them, plus some Red Wing Tokens.": "Мне велели продавать больше «безделушек и побрякушек», чтобы привлечь пьяных двуногих с кучей денег. Они часто просят счастливые талисманы, поэтому я хочу раздобыть несколько кроличьих лапок. Если принесёшь мне три, я заплачу 1200 Советов за них, плюс немного жетонов Красного Крыла."
"These rabbit appendages are much less attractive than I had anticipated. Perhaps there is a special method to preparing them? I doubt these bloody stinky objects will appeal to rich bipeds! Hmm... but in any case, here is the promised payment. Thank you.": "Эти кроличьи конечности гораздо менее привлекательны, чем я ожидал. Возможно, существует особый способ их приготовления? Сомневаюсь, что эти кровавые вонючие штуки понравятся богатым двуногим! Хм... но в любом случае, вот обещанная оплата. Спасибо."
"Have you found that these ratkin are superstitious? Most are! They even carry good-luck charms, the pathetic things. Hmm, go and find me some of their charms.": "Ты заметил, что эти крысолюди суеверны? Большинство из них — да! Они даже носят талисманы на удачу, жалкие штуки. Хм, сходи и найди для меня несколько их талисманов."
"Now see, this is sort of interesting: the good-luck charms you brought me are from humans. Where the heck are they getting exotic teeth from?! I bet these are actually magical, and used in some sort of shamanic activity... hmm... well, I'll get to the bottom of this! Here is your reward.": "Вот это интересно: талисманы на удачу, которые ты мне принёс, от людей. Откуда, чёрт возьми, они берут экзотические зубы?! Бьюсь об заклад, они на самом деле магические и используются в каком-то шаманском обряде... хмм... ну, я разберусь! Вот твоя награда."
"I'm supposed to be in charge of the campsite, which is why the jealous humans <i>constantly</i> slack off to make me look bad. I keep telling them to repair these stalls so they're ready for the heavier snows to come. So they head off to gather wood, and then come back empty-handed. \"Chased by a bear\" or \"bit by a slime\"... always some excuse so they don't have to work. Can you help me? We need spruce.": "Я должен отвечать за лагерь, поэтому завистливые люди <i>постоянно</i> халтурят, чтобы выставить меня в плохом свете. Я постоянно говорю им починить эти палатки, чтобы они были готовы к более сильным снегопадам. Но они уходят собирать дрова, а возвращаются с пустыми руками. «Гнался за медведем» или «укусил слизень»... всегда какая-то отговорка, чтобы не работать. Ты можешь помочь? Нам нужна ель."
"Thank you! Now I just have to harrass the humans into doing the repairs. What I wouldn't give for hands so I could do the work myself! But I digress. You've proven very resourceful! Here is a token of my... and my master's... appreciation.": "Спасибо! Теперь мне осталось только надоедать людям, чтобы они сделали ремонт. Что бы я ни отдал за руки, чтобы сделать это самому! Но не в этом дело. Ты показал себя очень находчивым! Вот знак моей... и моего мастера... благодарности."
"I know Velkort thinks I should be able to keep the forge hot through my magic, but I'm afraid I was never very good at it. Hammering's more my thing.\n\nCan you get me some non-magical fuel for my fire? I'm running low.": "Я знаю, что Велкорт считает, что я должен уметь поддерживать кузницу в огне с помощью магии, но боюсь, у меня это никогда не получалось. Кузнечный молот — вот моё дело.\\n\\nМожешь принести мне немного немагического топлива для огня? У меня почти кончилось."
"Thanks! That's perfect. Here, let me give you some cash for that.": "Спасибо! Это идеально. Вот, позволь дать тебе немного денег за это."
"There's this goblin off a long way from here. Met him? Named Jumjab. He says he can talk to dead people. I want him to visit here and tell me if he can sense my Lydia in the ground. I dunno why. Just... to know. Oh, you know goblinese, right?": "Где-то далеко отсюда есть один гоблин. Встречал его? Зовут Джамджаб. Он говорит, что может разговаривать с мёртвыми. Я хочу, чтобы он пришёл сюда и сказал, чувствует ли он мою Лидию в земле. Не знаю зачем. Просто... чтобы знать. Ты же знаешь гоблинский, да?"
"Jumjab said he'd come, but expects payment? Well, of course. No goblin works for free. And you shouldn't have to, either. Here's some coin for your trouble.": "Джамджаб сказал, что придёт, но ожидает оплату? Ну, конечно. Ни один гоблин не работает бесплатно. И тебе тоже не стоит. Вот немного монет за твои хлопоты."
"Percy? Old human near the fairy bears? Ugh. Wants me to tell him his dead wife is \"at peace.\" Tell him I'll come by, but it will cost him. I've sensed his wife's spirit. She's not \"at peace.\" But I'll think of something to tell him...": "Перси? Старик-человек возле фейри-медведей? Фу. Хочет, чтобы я сказал ему, что его покойная жена «спокойна». Скажи ему, что я зайду, но это будет стоить ему. Я почувствовал дух его жены. Она не «спокойна». Но я придумаю, что ему сказать..."
"Werewolves who never leave wolf form eventually start leaking magic into their bones and organs. It's happened to me, and I quite like the feeling, but I wish to study the phenomenon more... without dissecting myself. See if you can find werewolves whose magic has bled into their teeth. I doubt they'll be too common, but please look around.": "Оборотни, которые никогда не покидают волчью форму, со временем начинают пропускать магию в свои кости и органы. Со мной это случилось, и мне это довольно нравится, но я хочу изучить это явление подробнее... без того, чтобы разрезать себя. Попробуй найти оборотней, у которых магия проникла в зубы. Сомневаюсь, что таких много, но, пожалуйста, поищи."
"Ah, yes! I'll grind them to powder and see what I can figure out. Thank you. Here: a less-useful powder, but some mages like it.": "Ах, да! Я измелю их в порошок и посмотрю, что смогу выяснить. Спасибо. Вот: менее полезный порошок, но некоторым магам он нравится."
"The frozen magma that you brought me is interesting, and I would like to perform some experiments with it. I suspect it can be used in place of the central core of a Dwar- you know what, I'll spare you the details. I need more info about the demons in general, and a bunch of N Cores to perform my testing with. Can you keep an eye out for those things?": "Замороженная магма, которую ты мне принес, интересна, и я хотел бы провести с ней несколько экспериментов. Я подозреваю, что её можно использовать вместо центрального ядра Двар- ну да ладно, я избавлю тебя от подробностей. Мне нужно больше информации о демонах в целом, а также куча N-ядер для проведения моих испытаний. Можешь присмотреть за этими штуками?"
"You found some research notes? And a whole host of N Cores! Brilliant. Now all we have to do is pop these puppies open and get to work. It's a two-person job, so let me know when you have some free time.\n\n[ You've unlocked a new hangout with Engineer Crall. ]": "Вы нашли какие-то исследовательские заметки? И целую кучу N-ядер! Отлично. Теперь нам осталось только открыть эти штуки и приступить к работе. Это работа на двоих, так что дай знать, когда у тебя будет свободное время.\\n\\n[ Вы разблокировали новое место для встреч с инженером Краллом. ]"
"The first aid kits that seem common in this country are kind of underwhelming, even the so-called \"Master\" kits. But I can combine multiple kits to get the stuff I need. Unfortunately the druids don't bother with first aid kits, so I could really use a supply!": "Аптечки, которые здесь кажутся обычными, довольно слабые, даже так называемые «Мастерские» наборы. Но я могу комбинировать несколько наборов, чтобы получить нужные мне материалы. К сожалению, друиды не заморачиваются с аптечками, так что мне очень нужна их поставка!"
"Thanks! I'll take the delicate surgical tape from each of these, and let's see, I can reinforce the little scalpel. Hmm, yeah, I can work with this. Here's something for your trouble. Mortals really like these silly documents!": "Спасибо! Я возьму тонкий хирургический пластырь с каждого из них, и давай посмотрим, я могу усилить маленький скальпель. Хмм, да, с этим можно поработать. Вот тебе за твои труды. Смертные действительно любят эти глупые документы!"
"You want to do something for me? Pf.\n\nWell, I always need more fluorite.": "Хочешь сделать что-то для меня? Хм.\n\nНу, мне всегда нужно больше флюорита."
"Hey, these are nice. Easy to cut into cubes, and relatively easy to hollow out. I'll buy 'em off of you. What, a gift? Hmm.\n\nSuspicious. But okay.": "Эй, эти хорошие. Легко нарезать кубиками и относительно просто выдолбить. Я куплю их у тебя. Что, подарок? Хмм.\\n\\nПодозрительно. Но ладно."
"Let's put the past behind us for now. How about some dice games? If you beat me, say, 50 times, I'll teach you a secret technique to improve your cheating technique. Not that you should cheat me! Save that for the big stakes tables.": "Давай пока оставим прошлое позади. Как насчёт игр в кости? Если ты обыграешь меня, скажем, 50 раз, я научу тебя секретной технике, чтобы улучшить твои навыки жульничества. Но не думай жульничать против меня! Прибереги это для столов с большими ставками."
"Okay, okay. Thanks for playing. Here. See this? Loaded die. Highly explosive, as  you know. But if you throw them like <i>this</i>, they don't explode as often. You're welcome.\n\n<i>[Loaded Dice Explosion Rate -1%]</i>": "Ладно, ладно. Спасибо за игру. Вот. Видишь это? Фальшивый кубик. Очень взрывоопасный, как ты знаешь. Но если бросать их <i>так</i>, они взрываются реже. Пожалуйста.\\n\\n<i>[Шанс взрыва фальшивых кубиков -1%]</i>"
"Loaded Dice Explode Less Often (from 4% to 3%)": "Подгруженные кости взрываются реже (с 4% до 3%)"
"I ran out of volatile ink yesterday. Get me more. The good stuff, for experts, not whatever worthless ink you use!": "Вчера у меня закончились летучие чернила. Принеси мне ещё. Хорошие, для экспертов, а не какую-то никчёмную чернильную дрянь, которую ты используешь!"
"Good work. Here, take these pants. They don't stink like your current ones do.": "Хорошая работа. Вот, возьми эти штаны. Они не воняют, как твои нынешние."
"Can you go collect my mana sponges? They're in jars all through the area. If you bring me six, you can keep any others you find. And I'll teach you a recipe that uses them.": "Можешь собрать мои мановые губки? Они в банках по всей территории. Если принесёшь мне шесть, остальные можешь оставить себе. И я научу тебя рецепту с их использованием."
"Thanks. Let me teach you a recipe that uses these! ": "Спасибо. Позволь научить тебя рецепту, в котором они используются!"
"This one's even harder. I'm sorry! But if you can find some mandrake root, I'd be really appreciative!": "Этот ещё сложнее. Извини! Но если ты сможешь найти корень мандрагоры, я буду очень благодарен!"
"Thanks! You're amazing at this. Here, this is my own brew, try some! It's very expensive to make, but it makes you feel amazing.": "Спасибо! Ты в этом просто потрясающий. Вот, это мой собственный напиток, попробуй! Его очень дорого делать, но он заставляет тебя чувствовать себя великолепно."
"This is a perfect spot for a jewelry shop because those hideous manticores love jewelry! If you kill them, bring their jewelry here to sell. And if you really want to get on my good side, bring me their tail spikes. I'm shipping them home for my wife to turn into powerful poison knives!": "Это идеальное место для ювелирного магазина, потому что эти отвратительные мантикоры обожают украшения! Если убьёшь их, принос их украшения сюда на продажу. А если хочешь по-настоящему расположить меня к себе, принеси мне их хвостовые шипы. Я отправляю их домой жене, чтобы она сделала из них мощные ядовитые ножи!"
"Thank you. Pashub will turn these into horrific stilettos! Here, this is one of her earlier works.": "Спасибо. Пашуб превратит их в ужасные стилеты! Вот, это одна из её ранних работ."
"I'm terribly sorry if I offended you by seating myself. But you didn't have to keep me waiting so long! I guess you weren't open yet?\n\nWell, let's put that behind us. I would like your maple carrots please. And not too sweet.": "Мне ужасно жаль, если я обидел вас, когда сел сам. Но вам не следовало так долго меня ждать! Полагаю, вы ещё не были открыты?\\n\\nНу, давайте оставим это в прошлом. Я хотел бы ваши морковки с кленовым сиропом, пожалуйста. И не слишком сладкие."
"Perfectly cooked carrots! My compliments to the chef.": "Идеально приготовленная морковь! Мои комплименты повару."
"Can I have the maple carrots, please? I ordered them a while ago...": "Можно мне кленовую морковь, пожалуйста? Я заказывал её некоторое время назад..."
"We are considering building a fence along the perimeter of our little town. Nothing too tall, just a way to visually mark the borders. But we need a great many small sticks, all the same size and shape. Hmm. And they should be cedar: I like the smell of cedar. Do you know any humans who might be good with a saw? These hooves are just not made for carpentry.": "Мы рассматриваем возможность построить забор по периметру нашего маленького городка. Ничего слишком высокого, просто чтобы визуально обозначить границы. Но нам нужно много маленьких палочек, все одинакового размера и формы. Хм. И они должны быть из кедра: мне нравится запах кедра. Ты знаешь каких-нибудь людей, которые хорошо обращаются с пилой? Эти копыта совсем не предназначены для плотницких работ."
"Aha, perfect! Now to get Spot to use her hands and build this fence. Oh, here: take my old war helmet. I have a better one.": "Ага, идеально! Теперь надо заставить Спот использовать руки и построить этот забор. Вот, возьми мой старый боевой шлем. У меня есть получше."
"Ever seen a wave of nature elementals? Well they're right here, so take a look outside. They're coming from the west.\n\nI'll stay here and protect the citizens from any that manage to make it to town. In the mean time you can pick off their numbers. Just remember: they hate lightning. You know what to do.": "Видел когда-нибудь волну природных элементалей? Они прямо здесь, так что взгляни наружу. Они идут с запада.\\n\\nЯ останусь здесь и буду защищать жителей от тех, кто сумеет пробраться в город. А ты тем временем можешь сокращать их ряды. Только помни: они ненавидят молнию. Ты знаешь, что делать."
"So I overheard the elven seer talking about nature elementals. She says they only form when certain types of magic erupt. And she's never seen this many spontaneously appear before. So there's something bad going on down beneath town... but that's not a \"today\" problem. That's a \"some other day\" problem. Here's something I got for ya.": "Я подслушал, как эльфийская провидица говорила о природных элементалях. Она говорит, что они появляются только тогда, когда вспыхивает определённый тип магии. И она никогда раньше не видела, чтобы их появлялось так много одновременно. Значит, под городом происходит что-то плохое... но это не проблема на сегодня. Это проблема на какой-то другой день. Вот кое-что для тебя."
"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Сегодня они просят Потрясающие стрелы. Я щедро за них заплачу, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Великолепные плотные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие длинные стрелы. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>marvelous metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>великолепные металлические слитки</b>. Ты можешь добыть их для меня?\\n\\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"If you're a miner, I'd love to purchase some marvelous metal slabs from you.": "Если ты шахтёр, я с удовольствием куплю у тебя несколько замечательных металлических слитков."
"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Мы всегда нуждаемся в дополнительных боеприпасах для войск на передовой. Сегодня они просят Потрясающие стрелы из Резервуара. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"We always need extra ammunition for the front-line troops. Today they're asking for Marvelous Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.": "Сегодня они просят Великолепные стрелы-ловушки. Я щедро заплачу за них, но вы должны изготовить их по военным стандартам, так что никаких старых отсыревших запасов."
"I'm quite skilled with punching weapons and claws, and I'll tell you what helped me unlock my full potential: sewer practice. Find your way down into the sewer and use your Slashing Strike on the slimes down there.": "Я довольно искусен в обращении с ударным оружием и когтями, и я расскажу, что помогло мне раскрыть весь мой потенциал: тренировки в канализации. Найдите путь вниз в канализацию и используйте свой Разящий Удар на слизнях там."
"Did you see how they slide around your fist, but cleaved clean with the claw? Slimes are resistant to crushing, but not slashing! I bet you didn't know that until now, right?": "Видел, как они скользят по твоему кулаку, но разрезаются когтем? Слизни устойчивы к дроблению, но не к рубящим ударам! Держу пари, ты этого раньше не знал, да?"
"Maybe it's for the best that we can't remember anything. Maybe we don't want to remember. But it's not fair that I can't make new memories! It's not my fault I died over and over! Not this time!\n\n<i>[Midge sighs.]</i>\n\nThere's a mortal drink I like. It tastes awful, but it does help me relax a little. I think it's called a Perker Up? Peaky Cup? Pick Me up? Something like that.": "Возможно, к лучшему, что мы ничего не помним. Может, нам и не хочется помнить. Но это несправедливо, что я не могу создавать новые воспоминания! Это не моя вина, что я умирала снова и снова! Но не в этот раз!\\n\\n<i>[Мидж вздыхает.]</i>\\n\\nЕсть один смертный напиток, который мне нравится. Он ужасен на вкус, но немного помогает расслабиться. Кажется, он называется Перкер Ап? Пики Кап? Пик Ми Ап? Что-то в этом роде."
"Thank you. \n\n<i>[Midge sips the drink and smiles. ]</i>\n\nI feel so much better.": "Спасибо. \\n\\n<i>[Мидж делает глоток напитка и улыбается.]</i>\\n\\nМне стало намного лучше."
"I long to rest more comfortably as I meditate. Sadly, my old meditation stool broke. Do you have one I could use?": "Я мечтаю отдыхать с большим комфортом во время медитации. К сожалению, мой старый табурет для медитации сломался. У тебя есть такой, который я мог бы использовать?"
"Thank you. This simple act of kindness between our species will not be forgotten. Well, not for another couple of moon cycles. After that I'll probably be dead. And I won't be needing this! So here, take it.": "Спасибо. Этот простой акт доброты между нашими видами не будет забыт. Ну, по крайней мере, ещё пару лунных циклов. А потом, вероятно, меня уже не будет. И это мне не понадобится! Так что вот, возьми это."
"You talked to Jenny Foster during the full moon.": "Ты поговорил с Дженни Фостер во время полнолуния."
"You need to take your bee out to the beehive to the west to introduce yourselves.": "Тебе нужно отвести свою пчелу к улью на западе, чтобы познакомиться."
"I try to be brave and upbeat about my fate because it makes things a little less horrible, you know? And some days aren't too bad... but some days are really pretty awful. I wish I had some dry gin for those occasions. Do you have any?": "Я стараюсь быть смелой и оптимистичной насчёт своей судьбы, потому что так всё становится немного менее ужасным, понимаешь? И некоторые дни не такие уж плохие... но некоторые дни действительно довольно ужасные. Хотелось бы мне иметь немного сухого джина для таких случаев. У тебя есть?"
"This is gin! Thank you so much. Will you have a drink with me some time? I hear gin mixed with this orcish drug called 'gur-horta' can be mind-expanding. When you have time to hang out, we'll try it together.": "Это джин! Большое спасибо. Выпьешь со мной как-нибудь? Говорят, джин, смешанный с орочьим наркотиком под названием «гур-хорта», может расширить сознание. Когда будет время, проведём время вместе и попробуем."
"The orb you found for me was a fake, but I know it's somewhere in Serbule Hills! I must find it.\n\nThe vortices have overheard the ranalon speak of a seer or wise-person called a 'doctrine keeper' -- if the ranalon have my orb, I bet their seer would have it.\n\nI understand they live under the water or somesuch thing. Finding it would be worthwhile.": "Сфера, которую ты для меня нашёл, была подделкой, но я знаю, что настоящая где-то в Сербульских Холмах! Мне нужно её найти.\\n\\nВортексы подслушали, как раналон говорили о провидце или мудреце, которого называют «хранителем доктрины» — если у раналон есть моя сфера, то, уверен, её хранит их провидец.\\n\\nНасколько я понимаю, они живут под водой или что-то в этом роде. Найти её было бы очень полезно."
"You got this from a ranalon 'doctrine keeper'? This is not the orb I need. Moreover, this is not even a magic orb. It's some stupid cultural artifact. Augh! Where is it?!\n\nYes, yes. You are right: I sent you on an errand that I knew might be impossible. I owe you a reward for your 'work'. Sigh.": "Ты достал это у хранителя доктрин раналонов? Это не тот шар, который мне нужен. Более того, это даже не магический шар. Это какой-то глупый культурный артефакт. Аргх! Где он?!\\n\\nДа, да. Ты прав: я отправил тебя задание, которое, как я знал, может быть невыполнимым. Я должен тебе награду за твою «работу». Вздох."
"You want to help? Hmph. Very well: perhaps you know this area better than we do.\n\nSome time ago we heard there was a group of bandits with something I want. These bandits live in a cave somewhere here in Serbule Hills. They called it the 'spider cave'.\n\nI have pre-paid for the device, but if the bandits make you pay more, get a receipt and I will reimburse you in precious reagents.": "Ты хочешь помочь? Хм. Очень хорошо: возможно, ты знаешь эту местность лучше нас.\n\nНекоторое время назад мы услышали, что здесь, в Сербульских Холмах, в пещере, которую называют «паучьей пещерой», обитает группа бандитов с тем, что мне нужно.\n\nЯ уже заплатила за устройство заранее, но если бандиты потребуют с тебя больше, возьми квитанцию, и я возмещу тебе расходы редкими реагентами."
"This orb is cracked! Wait. This is a fake! A cracked fake! How much did you pay for this?!\n\nOh. The bandits are dead? Well, I suppose that's what comes of bandits. No great loss, I can assure you! Here: I don't want you to become hostile, so let me reward you for your meager effort.": "Этот шар треснул! Подожди. Это подделка! Треснувшая подделка! Сколько ты за это заплатил?!\\n\\nО. Бандиты мертвы? Ну, полагаю, так и бывает с бандитами. Никакой большой потери, уверяю тебя! Вот: я не хочу, чтобы ты стал враждебным, поэтому позволь наградить тебя за твои скромные усилия."
"Take a message to Therese down by the windmill, will you? Ask her to come up here tonight for a good ploughing. And have her bring some root vegetables. I know how she loves those.": "Передай сообщение Терезе у ветряной мельницы, хорошо? Попроси её прийти сюда сегодня вечером для хорошей пахоты. И пусть она принесёт корнеплоды. Я знаю, как она их любит."
"Thanks for delivering the message. She said what? Carrots? Not a problem. Hey, as long as they're not mushrooms, I don't care where she puts 'em.": "Спасибо за доставку сообщения. Она что сказала? Морковку? Без проблем. Эй, пока это не грибы, мне всё равно, куда она их положит."
"He said... oh, how vulgar. Why do I put up with him! If only Echur weren't so rough...\n\nYes, fine, tell \"Mushroom\" Jack I'll be there. But I'm bringing extra carrots. For him. He'll know what I mean.": "Он сказал... ох, как вульгарно. Почему я с ним терплю! Если бы только Эчур не был таким грубым...\\n\\nЛадно, хорошо, скажи «Грибному» Джеку, что я приду. Но я возьму с собой дополнительные морковки. Для него. Он поймёт, что я имею в виду."
"Blacksmithing is all about shaping metal. But we've been a little low on metal for a while now. I mean, there's not exactly an iron mine nearby. I generally make do, but I wouldn't mind some spare metal, that's for sure!": "Кузнечное дело — это всё о формовке металла. Но у нас уже некоторое время не хватает металла. Я имею в виду, поблизости нет железной шахты. Обычно я как-то выкручиваюсь, но лишний металл точно не помешал бы!"
"You're good. Not great, but good. I respect that. Greatness is overrated. Here. Take some money.": "Ты хорош. Не выдающийся, но хороший. Я это уважаю. Величие переоценено. Вот. Возьми немного денег."
"My second-favorite sword needs to be repaired. I've searched the countryside near the casino and found nothing appropriate. I need metal of expert quality! I've seen armor made of amazing metal, so I know it must exist somewhere in this land...": "Мой второй по любимости меч нуждается в ремонте. Я обыскал окрестности казино и не нашёл ничего подходящего. Мне нужен металл экспертного качества! Я видел доспехи из удивительного металла, значит, он должен где-то существовать в этих землях..."
"Ah, expert-quality indeed. I shall visit the boiler room after work. Dorimir keeps one of the burners hot enough to forge metal! The dwarves here are even more clever than the ones back home.": "Ах, действительно экспертного качества. После работы я загляну в котельную. Доримир поддерживает один из горелок достаточно горячим, чтобы ковать металл! Гномы здесь ещё умнее, чем те, что у нас на родине."
"I need more milk! Always more milk! Those damned cows out there are so violent, too. Why can't they just calmly let me milk them?": "Мне нужно больше молока! Всегда больше молока! Эти проклятые коровы там такие агрессивные. Почему они не могут просто спокойно дать мне их подоить?"
"Milk! Thank you! That was kind of you.": "Молоко! Спасибо! Это было очень любезно с твоей стороны."
"I haven't seen specimens like this since young master Dalvos left to Statehelm! They must be made by an admirer of his technique. I wish to collect them for sentimental reasons.": "Я не видел таких образцов с тех пор, как молодой господин Далвос уехал в Стейтхелм! Они, должно быть, созданы поклонником его техники. Я хочу собрать их по сентиментальным причинам."
"That ass! Guzor from the mage's guild has once again chosen to belittle our school in front of the Council Sub-Commander. I've given up on convincing that conceited fool of the power of song magic. I've wasted a year trying! I understand now that mere words are not up to this task. Ormond is good at mind work -- explain the situation to him and come up with a solution.": "Этот осёл! Гузор из гильдии магов снова решил принизить нашу школу перед заместителем командующего Совета. Я перестал убеждать этого самодовольного дурака в силе песенной магии. Потратил на это целый год! Теперь я понимаю, что одними словами здесь не обойтись. Ормонд хорошо разбирается в работе разума — объясни ему ситуацию и придумайте решение."
"He said we need the Geas of ... Let me write this down. The Geas of Mild Yet Unrelenting Affection? Very well. I'll head to the basement and research the necessary performance.": "Он сказал, что нам нужен Геас ... Дай я запишу. Геас Лёгкой, но Неотступной Привязанности? Хорошо. Я спущусь в подвал и изучу необходимое исполнение."
"Leon wants to... what? To charm a grand-wizard? That would work for a day or two, and then someone there would realize he's under a charm. No, no. Tell Leon that mind-work isn't what he wants here. I mean, really! The only technique that <i>might</i> work would be the Geas of Mild Yet Unrelenting Affection, which is quite an intricate performance. And, I should remind both of you: EXTREMELY illegal, and VERY immoral. Abandon this idea. Use words! Bards are good at words!": "Леон хочет... чего? Очаровать верховного мага? Это сработает на день или два, а потом кто-то там поймёт, что он под чарами. Нет, нет. Скажи Леону, что работа с разумом — не то, что ему нужно здесь. Серьёзно! Единственная техника, которая <i>возможно</i> сработает — это Геас мягкой, но неумолимой привязанности, что довольно сложное исполнение. И, кстати, напомню вам обоим: ОЧЕНЬ незаконно и ОЧЕНЬ аморально. Откажитесь от этой идеи. Используйте слова! Барды хороши в словах!"
"I've received word from my Unora. She's my eyes inside the mage's school, and she says that Guzor is pestering the Sub-Commander to remove me from the Sub-Council on City Defense. This goes beyond politics. This man so fears bardic magic that he would cut us out of the city. He knows that his magic cannot heal -- it can only destroy. And so he aims to destroy us. We, in turn, must heal! Heal the rift in the Sub-Council on City Defense!\n\nOf course, I was hesitant to use charm magic. But the surgery we must perform requires it. We healers know that sometimes a patient calls for a difficult procedure. A dangerous one. So summon your courage: the city needs us!\n\nHere is a list of necessities for the Geas that Ormond recommended.": "Я получил известие от моей Уноры. Она мои глаза внутри школы магов, и говорит, что Гузор докучает заместителю командующего, чтобы убрать меня из Подсовета по обороне города. Это выходит за рамки политики. Этот человек так боится бардовской магии, что готов изгнать нас из города. Он знает, что его магия не может исцелять — она только разрушает. И поэтому он стремится уничтожить нас. Мы же должны исцелять! Исцелить раздор в Подсовете по обороне города!\\n\\nКонечно, я сомневался использовать магию очарования. Но операция, которую нам предстоит провести, требует этого. Мы, целители, знаем, что иногда пациент нуждается в сложной процедуре. Опасной. Так что соберись с духом: город нуждается в нас!\\n\\nВот список необходимых материалов для Геаса, который рекомендовал Ормонд."
"You've done well. As a reward I shall let you help me see this grim work to its conclusion.": "Ты хорошо справился. В награду я позволю тебе помочь мне довести эту мрачную работу до конца."
"I despise Malgath Croonswallow. Who is he, you ask? The long-dead ass who created this Geas of Mild Yet Unrelenting Affection! This has been quite a tedious and inane procedure. But it is done. Here: I've prepared the enchanted horn full of vindaloo. Now you need merely convince Alzaneth to eat it. Just a single bite will do!": "Я презираю Малгата Круонсволлоу. Кто он, спросите вы? Давным-давно умерший осёл, который создал этот Геас мягкой, но неумолимой привязанности! Это была довольно утомительная и бессмысленная процедура. Но она завершена. Вот: я приготовил зачарованный рог, полный виндалу. Теперь тебе осталось лишь убедить Алзанета съесть его. Достаточно всего одного укуса!"
"He didn't eat it? Ah well, that was too much to hope for. But he did <i>touch</i> it. That's really all that's necessary. The next step will take some time, but we are well on our way. And not a word to anyone about this. Remember, you've done something very illegal here.": "Он не съел это? Ну что ж, на большее надеяться было бы слишком. Но он <i>прикоснулся</i> к этому. Это действительно всё, что нужно. Следующий шаг займёт некоторое время, но мы уже на верном пути. И ни слова никому об этом. Помни, ты сделал здесь нечто очень незаконное."
"What is this? I don't remember ordering lunch. Is this a prank? No matter. I'll give it to Skitters. Go.": "Что это? Не припомню, чтобы заказывал обед. Это шутка? Неважно. Я отдам это Скиттерсу. Иди."
"The reason Ormond recommended this particular obscure bardic technique is that it can be performed without the victim being present. The vindaloo will connect you to him. Oh, yes, you'll be the one performing the Geas! It's quite an honor, really. This sort of technique is usually kept locked away, but you're getting hands-on experience with it!\n\nWait until the full moon. That's the only time this will work. Then eat the vindaloo -- oh, you will need more vindaloo for this -- and dance in such a way as to twist his mind toward affection. Don't worry about the particulars; let your hips do the thinking. Then simply shake his hand.": "Причина, по которой Ормонд рекомендовал именно эту редкую бардовскую технику, в том, что её можно выполнить без присутствия жертвы. Виндалу свяжет тебя с ним. О, да, именно ты будешь накладывать Геас! Это настоящее почётное дело. Такие техники обычно держат под замком, а ты получаешь практический опыт!\\n\\nПодожди до полнолуния. Это единственное время, когда это сработает. Затем съешь виндалу — для этого тебе понадобится больше виндалу — и танцуй так, чтобы повернуть его разум к привязанности. Не беспокойся о деталях; пусть твои бёдра сами думают. А потом просто пожми ему руку."
"It's complete? Well well well. That should put an end to his incessant interference on the Sub-Council. You've done an admirable job.": "Это завершено? Ну, ну, ну. Это должно положить конец его постоянному вмешательству в дела Подсовета. Ты проделал достойную похвалы работу."
"Why are you shaking my hand? Wait, is that vindaloo I smell on your breath? You're the creepy curry courier from the other day. What are you up to?": "Почему ты пожимаешь мне руку? Подожди, не воняет ли у тебя изо рта виндалу? Ты тот жуткий курьер с карри из другого дня. Что ты задумал?"
"You are positively itching to snuff more lifes, aren't you?! I knew it. And I <i>love</i> it! Get out there and do what you do best, fleshbag!": "Ты просто не можешь дождаться, чтобы уничтожить ещё больше жизней, не так ли?! Я знал это. И я <i>обожаю</i> это! Вперёд, делай то, что у тебя получается лучше всего, мясной мешок!"
"When I first saw you, I thought you were only a worthless fleshbag. But now I see that you're truly a RUTHLESS KILLER. Hahahaha!": "Когда я впервые увидел тебя, я думал, что ты просто никчёмная мясная мешок. Но теперь я вижу, что ты действительно БЕССЕРДЕЧНЫЙ УБИЙЦА. Хахахаха!"
"I'm supposed to make a special dinner tomorrow to honor my master's wife's birthday. I'm getting kind of freaked out, because I can't make my famous mint cookies without mint! Do you have any? It's important!": "Завтра я должна приготовить особенный ужин в честь дня рождения жены моего хозяина. Я начинаю нервничать, потому что не могу испечь свои знаменитые мятные печенья без мяты! У тебя есть немного? Это очень важно!"
"Finally, mint! Thank you. Here, I was trying to make an alternative treat in case you couldn't find mint in time. You want it?": "Наконец-то мята! Спасибо. Вот, я пытался сделать альтернативное угощение на случай, если ты не найдёшь мяту вовремя. Хочешь?"
"I still need more bones! I will pay you the same amount for another ten.": "Мне всё ещё нужно больше костей! Я заплачу тебе ту же сумму за ещё десять."
"Nicely excavated. Here is your pay! Come back tomorrow, I'm sure I'll need more.": "Отлично раскопано. Вот твоя плата! Приходи завтра, уверен, что мне понадобится ещё."
"Alien fae creatures are all over Sun Vale! I don't blame you, but you should do your part to help clean this up. Kill fey panthers and bring me their tails as proof!": "Инопланетные фейские существа повсюду в Солнечной Долине! Я не виню тебя, но ты должен сделать свою часть, чтобы помочь очистить это. Убей фейских пантер и принеси мне их хвосты в качестве доказательства!"
"Thank you for your hard work!": "Спасибо за твою усердную работу!"
"I'm using grizlark faster than I expected! Can you get me some more? I'll pay like before.": "Я использую гризларк быстрее, чем ожидал! Можешь достать мне ещё? Заплачу, как и раньше."
"Thank you! This will keep me stocked up for a bit, but check back soon in case I need more.": "Спасибо! Этого у меня хватит на некоторое время, но заходи позже, вдруг мне понадобится ещё."
"You said the skeleton miners were just like regular skeletons, right? But what about the NON-skeleton miners? Hmm? You didn't take notes on those, did you? Well go back and see if the living miners are weird in any way. Remember to search their guts for clues!": "Ты сказал, что скелетные шахтёры такие же, как обычные скелеты, да? А как насчёт НЕ-скелетных шахтёров? Хмм? Ты же не делал заметок о них, правда? Так что вернись и посмотри, не странные ли живые шахтёры. Не забудь обыскать их внутренности в поисках улик!"
"Nothing? No clues at all? They were just regular ratkin?!\n\nI know you aren't lying, but I really feel like you aren't giving me your best effort. <i>[Bogaku sighs.]</i> No, it's not your fault. It's mine, for expecting too much. Here is your shiny.": "Ничего? Совсем никаких улик? Они были просто обычными крысолюдами?!\n\nЯ знаю, что ты не врёшь, но мне кажется, что ты не прилагаешь максимум усилий. <i>[Богака вздыхает.]</i> Нет, это не твоя вина. Это моя, за то, что слишком много ожидал. Вот твоя награда."
"Have you got time to handle more beasties in Vidaria? You're making things safer for our troops out there. Remember, safety is our top concern. It would obviously be mission-failure if you died!": "У тебя есть время справиться с большим количеством зверей в Видарии? Ты делаешь обстановку безопаснее для наших войск там. Помни, безопасность — наш главный приоритет. Очевидно, что смерть означала бы провал миссии!"
"Good on you. You're using your skills for good! Not everyone can say that.": "Молодец. Ты используешь свои навыки во благо! Не каждый может этим похвастаться."
"I've sent the phlogiston off to my buyer, and now she wants some more! I need the same grade of phlogiston as before. Are you up for it?": "Я отправила флогистон своему покупателю, и теперь ей нужно ещё! Мне нужен такой же сорт флогистона, как и раньше. Ты справишься?"
"Excellent work. Here's some more prisms and some more money. Come back in a week and I'll probably need more!\n\nOh, and by the way, I've learned some more Transmutation techniques. When you're ready, come see me for more training.": "Отличная работа. Вот ещё несколько призм и немного денег. Приходи через неделю, скорее всего, мне понадобится ещё!\\n\\nО, кстати, я выучил несколько новых техник Превращения. Когда будешь готов, приходи ко мне за дополнительным обучением."
"I've found a way to take my mind off my fear: cooking! I've been experimenting with vegetarian food from the nearby mortal realm, and they have something called a lemon which is VERY sour, and it's given me lots of dessert ideas. It's probably considered poisonous to mortals due to their simplistic digestive systems, but I can eat lemons just fine!\n\nI'm growing some lemon trees now but it seems like it might take years before they yield fruit...? That's super weird. I think I might hate mortal trees. Anyway, long story short, I really need some lemons!": "Я нашла способ отвлечься от страха: готовку! Я экспериментирую с вегетарианской едой из близлежащего смертного мира, и там есть что-то под названием лимон — он ОЧЕНЬ кислый, и у меня появилось много идей для десертов. Вероятно, для смертных он считается ядовитым из-за их простых пищеварительных систем, но я могу спокойно есть лимоны!\\n\\nЯ сейчас выращиваю лимонные деревья, но кажется, что им может понадобиться несколько лет, чтобы дать плоды...? Это очень странно. Думаю, я могу не любить смертные деревья. В любом случае, если коротко, мне очень нужны лимоны!"
"Oh these are perfect! Give them to me! I'm going to make so many sour things!\n\nHere: this recipe isn't too sour, so your mortal frame should be able to survive it.": "О, они просто идеальны! Дай их мне! Я собираюсь приготовить столько кислых вещей!\\n\\nВот: этот рецепт не слишком кислый, так что твоё смертное тело должно это выдержать."
"A guest told me that moss agates have magical properties that enhance the growth speed of a garden. She was unable to explain the exact nature of this magic, however. If I had a number of moss agates, perhaps I could find the secret!": "Гость рассказал мне, что моховые агаты обладают магическими свойствами, которые ускоряют рост сада. Однако она не смогла объяснить точную природу этой магии. Если бы у меня было несколько моховых агатов, возможно, я смог бы раскрыть секрет!"
"Thank you for the moss agates! I shall begin by making inquiries here at the casino to see if others understand the secret to making these work in a garden. In the short term, however, I will probably continue to rely on 'green thumb potions'. Would you like some?": "Спасибо за моховые агаты! Я начну с того, что поспрашиваю здесь, в казино, не знают ли другие секрет создания этих камней для сада. Однако в ближайшее время я, вероятно, продолжу полагаться на «зелья зелёного пальца». Хочешь немного?"
"See if you can make that mulberry wine. It's a good dessert wine. Probably good for parties!": "Попробуй сделать вино из шелковицы. Это хорошее десертное вино. Наверное, отлично подходит для вечеринок!"
"This is the mulberry? Ah, yes. Lovely aroma. I'm sorry to report that it tastes like acid. But WOW it packs a punch! Good work.": "Это тутовник? Ах, да. Прекрасный аромат. К сожалению, должен сообщить, что на вкус он как кислота. Но ВАУ, какой мощный удар! Отличная работа."
"You know, I bet there's a master mummy in Foothills Cave. When a mummy remains alive for long enough, there's a chance it can regain its free will and rise up from its inherent bitterness. When that happens, it become VERY dangerous. They're usually yellowed or blackened with age. If you see one, RUN! You'd need a team of trained warriors to kill it!\n\nOf course, if you happen to have a few friends and wanted to kill the damned thing, I'd be happy to reward such heroism.": "Знаешь, я уверен, что в Пещере Предгорий есть мастер-мумия. Когда мумия живёт достаточно долго, у неё появляется шанс вернуть себе свободную волю и избавиться от врождённой горечи. Когда это происходит, она становится ОЧЕНЬ опасной. Обычно такие мумии пожелтевшие или почерневшие от старости. Если увидишь такую — БЕГИ! Тебе понадобится команда обученных воинов, чтобы её убить!\n\nКонечно, если у тебя есть несколько друзей и вы захотите убить эту проклятую тварь, я с радостью вознагражу такое геройство."
"So there <i>was</i> a higher-order mummy in the cave! That's pretty scary. Where one mummy gains free will, it's only a matter of time before more start sparking to life. We still have a horrible mummy pit back home because of that. Can't get rid of the damned things!\n\nI'll make a full report when I get back New Aufghel... not that they'll be able to do anything about this cave! What with the war and all. So anything you can do to help is appreciated.": "Так в пещере <i>действительно</i> была мумия высшего порядка! Это довольно страшно. Если одна мумия обретает свободную волю, это лишь вопрос времени, когда другие начнут оживать. У нас дома до сих пор есть ужасная яма с мумиями из-за этого. Не можем избавиться от этих проклятых тварей!\n\nЯ составлю полный отчёт, когда вернусь в Новый Ауфгель... хотя вряд ли они смогут что-то сделать с этой пещерой! С учётом войны и всего такого. Так что любая помощь с твоей стороны будет очень ценна."
"I'm so glad you could make it! It's mummies!\n\nI was patrolling near the mouth of Foothills Cave in the far northwest, and mummies were pouring out! At first I thought they were activated by some evil necromancer, but they aren't marching anywhere. They're... well, they're just wandering around killing things. And they're trampling the delicate vegetation! And also they're fucking MUMMIES! I don't even know how to kill a mummy. I'm just a pig. I didn't sign up for this!": "Я так рад, что ты смог прийти! Это мумии!\\n\\nЯ патрулировал возле входа в пещеру Футхиллс на самом северо-западе, и оттуда высыпали мумии! Сначала я думал, что их активировал какой-то злой некромант, но они никуда не маршируют. Они... ну, они просто бродят и убивают всё подряд. И топчут хрупкую растительность! И ещё они, чёрт возьми, МУМИИ! Я даже не знаю, как убить мумию. Я просто свинья. Я на это не подписывался!"
"Thanks. Um, when you report in, can you not tell them mummies creep me out? I'd never hear the end of it! Here. Take these warming rocks as a bribe. Don't worry, Fluffikins said they're safe.": "Спасибо. Эм, когда будешь отчитываться, не говори им, что мумии меня пугают? Мне бы не дали покоя! Вот. Возьми эти согревающие камни в качестве взятки. Не волнуйся, Флаффикинс сказал, что они безопасны."
"When I was the chef for Lord Eltibule, he let me import all kinds of exotic spices! One that I used to love was muntok pepper. Hard to find it if you're not an orc, or insanely rich! But it makes the best spicy soups.": "Когда я был поваром лорда Элтибула, он позволял мне ввозить всевозможные экзотические специи! Одна из моих любимых — мунтокский перец. Его трудно найти, если ты не орк или не безумно богат! Но он делает лучшие острые супы."
"What... this is real muntok pepper! Why, you're a gem in the gold pile! Thank you so much! Let me give you some soup! No, no, that's not nearly good enough. Wait. Here, take this. I, uh, borrowed it when I was leaving the keep. It was the younger Lord Eltibule's hunting weapon. I thought I could use it for safety, but it's too fiddly for me.": "Что... это настоящий мунтокский перец! Ты — настоящая драгоценность среди золота! Огромное спасибо! Позволь угостить тебя супом! Нет, нет, этого недостаточно. Подожди. Вот, возьми это. Я, э-э, позаимствовал это, когда уходил из крепости. Это было охотничье оружие молодого лорда Элтибула. Я думал, что смогу использовать его для безопасности, но оно слишком сложное для меня."
"Ogres are all dumb as hell and mean to boot, but Gorgos is the biggest and dumbest one around here. He chased us back here! If he were to die suddenly... that'd be really convenient.": "Огры все чертовски глупы и злы, но Горгос — самый большой и глупый из них здесь. Он прогнал нас сюда! Если бы он внезапно умер... это было бы очень кстати."
"He's dead? Great! Now we can begin planning phase 2. Real soon. Here's mortal money for your task. What do you mortals call it? \"Blood money?\"": "Он мёртв? Отлично! Теперь мы можем начать планировать вторую фазу. Совсем скоро. Вот смертные деньги за твоё задание. Как вы, смертные, это называете? «Кровавые деньги?"
"I'm pretty tired of the mushroom scene. I'm much more into physical fitness these days! But people have certain expectations of an immortal pig. Everyone expects me to know the quality of the local fungi, but I haven't done a survey in a while. Saaaaay... why don't you go out and pick some for me? It'll be great exercise!": "Я уже довольно устал от грибной темы. В последнее время меня гораздо больше интересует физическая форма! Но у людей есть определённые ожидания от бессмертной свиньи. Все ждут, что я разбираюсь в качестве местных грибов, но я давно не проводил обследование. Скажем так... почему бы тебе не сходить и не собрать немного для меня? Это будет отличное упражнение!"
"These are the mushrooms? Hmm, yep, pretty standard. You can keep those. And as for the exercise you just got: you're welcome!": "Это грибы? Хм, да, довольно обычные. Можешь оставить их себе. А насчёт упражнения, которое ты только что получил: пожалуйста!"
"Sometimes delicious beer uses gross ingredients. Mushrooms, for instance! But I've found that my boletus-and-apple pale ale is incredibly delicious! I've just run out of boletus mushrooms. Can you gather some for me?": "Иногда вкусное пиво делается из отвратительных ингредиентов. Например, из грибов! Но я обнаружила, что мой светлый эль с белыми грибами и яблоками невероятно вкусный! У меня только что закончились белые грибы. Можешь собрать для меня немного?"
"Thanks. Now don't try to copy me: my boletus-and-apple ale is unique. Your beer will be different, even with the same ingredients!\n\nTake these hops and don't lose 'em. You need hops for brewing beer, and they're not so easy to come by.": "Спасибо. Но не пытайся меня копировать: моё пиво с белыми грибами и яблоками уникально. Твоё пиво будет другим, даже если использовать те же ингредиенты!\\n\\nВот хмель, не потеряй его. Хмель нужен для варки пива, и его не так просто достать."
"I met the famous Denton Razor while I was stationed in Vidaria. You might say he's my nemesis: I'm the master of the crossbow and he the bow. But I'm not afraid to say that he's my better in most respects. Once I had a chance to kill him, and I let him live. Things got strange after that.\n\nI'd like to goad my nemesis by giving him his most-hated flower. If you did this for me, he'd know immediately who was responsible, and it would completely ruin his day! He deserves it, don't worry.\n\nSometimes when you look through the weeds of Vidaria you find particularly vibrant painclovers. Deliver some of those to him!": "Я встретил знаменитого Дэнтона Рэйзора, когда служил в Видарии. Можно сказать, он мой заклятый враг: я мастер арбалета, а он — лука. Но я не боюсь признать, что во многих отношениях он меня превосходит. Однажды у меня был шанс убить его, но я пощадил его. После этого всё стало странным.\\n\\nЯ хотел бы поддразнить своего врага, подарив ему его самый ненавистный цветок. Если ты сделаешь это для меня, он сразу поймёт, кто за этим стоит, и это полностью испортит ему день! Он этого заслуживает, не волнуйся.\\n\\nИногда, прогуливаясь по зарослям Видарии, можно найти особенно яркие болелисты. Доставь ему несколько таких!"
"Thank you for doing that. I wish... Things were different. In another life, I'd be so much happier.\n\nErm, I mean happier without him taking up so much of my mindspace, I mean! In the end, having a nemesis isn't as fun as I'd imagined it'd be.": "Спасибо, что сделал это. Хотелось бы... чтобы всё было иначе. В другой жизни я был бы намного счастливее.\\n\\nЭм, я имею в виду счастливее без него, занимающего столько места в моих мыслях! В конце концов, иметь заклятого врага не так весело, как я себе представлял."
"Where'd you... \n\n<i>[Denton breaks into a grin.]</i>\n\nThe fucker remembered my birthday. Tell him he owes me a duel, and that I'm still waiting.\n\nBut tell him I won't wait forever. He'll know what I mean.": "Откуда у тебя... \\n\\n<i>[Дентон улыбается.]</i>\\n\\nЭтот ублюдок помнил мой день рождения. Скажи ему, что он должен мне дуэль, и что я всё ещё жду.\\n\\nНо скажи, что я не буду ждать вечно. Он поймёт, что я имею в виду."
"As we -- well, as <i>I</i> learned during our ritual, my husband was murdered by a goblin sage named Grosark, who is trapped in Steven's laboratory deep inside the Statehelm Crypt.\n\nHere: the key to his lab. Go and take care of the issue.\n\nGrosark is in a largely incorporeal state, but the lab has a mechanism for dealing with this. Activate the lamps in the four corners of the lab, and he will be forced to apparate. You will need some tea lights for the lamps; don't forget to bring them with you!": "Как мы — ну, как <i>я</i> узнала во время нашего ритуала, моего мужа убил гоблин-мудрец по имени Гросарк, который заперт в лаборатории Стивена глубоко внутри крипты Стейтхелма.\\n\\nВот ключ от его лаборатории. Иди и реши эту проблему.\\n\\nГросарк находится в большей степени в бесформенном состоянии, но в лаборатории есть механизм для борьбы с этим. Активируй лампы в четырёх углах лаборатории, и он будет вынужден появиться. Тебе понадобятся чайные свечи для ламп; не забудь взять их с собой!"
"You destroyed Grosark? Could it be that easy? I must do some research.": "Вы уничтожили Гросарка? Неужели это так просто? Мне нужно провести исследование."
"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Blood Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\n\n": "Привет! В казино отличные напитки, но я умираю от желания выпить коктейль из кровавых грибов! Можешь принести мне 10 коктейлей из кровавых грибов? Нет! Я не собираюсь выпивать их все сразу. За кого ты меня принимаешь... за дворфа?"
"Thank you! So delicious!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Очень вкусно!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hi there! The casino has some great drinks, but I am dying for a mushroom smoothie! Could you bring me 10 Boletus Mushroom Smoothies? No! I'm not going to drink them all at once. What do you take me for... a dwarf?\n\n": "Привет! В казино отличные напитки, но я умираю от желания выпить коктейль из подосиновиков! Можешь принести мне 10 коктейлей из подосиновиков? Нет! Я не собираюсь выпивать их все сразу. За кого ты меня принимаешь... за дворфа?"
"Thank you! So delicious!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Очень вкусно!\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Disastrous Spore Bombs? It would be a great help!\n\n": "Привет! Ты можешь помочь мне? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос заманивает их... а потом я взрываю их в клочья! Ты можешь сделать для меня 30 Катастрофических споровых бомб? Это было бы большой помощью!"
"Thank you! This will make a fine pop!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Это будет отличная хлопушка!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Nightmarish Spore Bombs? It would be a great help!\n\n": "Привет! Ты можешь помочь мне? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос заманивает их... а потом я взрываю их в клочья! Ты можешь сделать для меня 30 Кошмарных споровых бомб? Это было бы большой помощью!"
"Hi there! Can you help me? I need an extra supply of spore bombs to help take care of enemies we may encounter. My melodious voice lures them in... then I blow them to pieces! Can you produce me 30 Ruinous Spore Bombs? It would be a great help!\n\n": "Привет! Ты можешь помочь мне? Мне нужно дополнительное количество споровых бомб, чтобы справиться с врагами, которых мы можем встретить. Мой мелодичный голос заманивает их... а потом я взрываю их на куски! Ты можешь сделать для меня 30 Разрушительных споровых бомб? Это было бы большой помощью!"
"Thank you! This will make a fine pop!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Это будет отличная хлопушка!\\n\\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"I found this amazing stuff for sale in Statehelm once but I can't find where it originates from. I guess \"Myconian\" is the name of its creator... sounds like a dwarven name to me. Maybe he's a merchant.": "Однажды я нашёл эту удивительную вещь на продаже в Стейтхелме, но не могу выяснить, откуда она родом. Думаю, «Микониан» — это имя её создателя... звучит как гномье имя. Может, он торговец."
"Once, long ago, giant cats roamed Povus. But we've only managed to resurrect a few specimens! We're so early in our research of this creature that we don't even want to study their behavior yet: I just need bones to study! If you find giant cat bones, please bring them to me.": "Однажды, очень давно, по Повусу бродили гигантские кошки. Но нам удалось воскрешать лишь несколько экземпляров! Мы настолько рано в нашем исследовании этого существа, что даже не хотим изучать их поведение пока: мне нужны только кости для изучения! Если вы найдете кости гигантской кошки, пожалуйста, принесите их мне."
"Where... How... Nevermind! These are priceless, thank you!\n\nWait, did I say priceless? I meant they're worth exactly 2500 Councils. But I'll give you double that because you're a friend.": "Где... Как... Да неважно! Они бесценны, спасибо!\n\nПодожди, я сказал бесценны? Я имел в виду, что они стоят ровно 2500 Советов. Но я дам тебе вдвое больше, потому что ты друг."
"I suppose I could teach you horse-riding if you did a favor for me. You see, I despise goblins for obvious reasons, and there's talk of goblin miners in this area. I need to know what they're mining. You know how to kill a goblin, right? And swing a mining pick? Good, this should be easy for you! <i>[Note: Completion requires Mining 15.]</i>\n\nI've heard there is a \"model home\" somewhere around here -- a fake house. If you climb into the basement and get past some goblins, there's a cave underneath. Find out what the goblins are mining in that cave! Go to the very end and mine whatever's there. Bring me a sample.": "Полагаю, я мог бы научить тебя верховой езде, если ты сделаешь мне одолжение. Видишь ли, я презираю гоблинов по понятным причинам, и ходят слухи о гоблинских шахтёрах в этом районе. Мне нужно узнать, что они добывают. Ты умеешь убивать гоблинов, правда? И обращаться с горным кирком? Отлично, это должно быть легко для тебя! <i>[Примечание: для выполнения требуется Навык Горного дела 15.]</i>\\n\\nЯ слышал, что где-то здесь есть «образцовый дом» — поддельный дом. Если ты проникнешь в подвал и пройдёшь мимо нескольких гоблинов, там будет пещера. Узнай, что гоблины добывают в этой пещере! Пройди до самого конца и добывай всё, что там есть. Принеси мне образец."
"This is what you found? Hmm. Well, it's definitely xedrite. <i>Mythander licks the rock.</i> But it's low-quality. Which means the goblins mining it are desperate and weak. It's unlikely we'll see a xedrite-rush from the goblands. So the news could be worse, but humans' Council should really take care of this goblin problem anyway.\n\nWhat's xedrite? Oh, just a stupid goblin metal. Enough about that. Let me teach you the basics of riding a horse!": "Это то, что ты нашёл? Хмм. Ну, это определённо кседрит. <i>Мифандер облизывает камень.</i> Но он низкого качества. Значит, гоблины, которые его добывают, отчаянные и слабые. Вряд ли мы увидим наплыв кседрита из гоблинских земель. Так что новости могли быть и хуже, но Совет людей всё равно должен заняться этой гоблинской проблемой.\\n\\nЧто такое кседрит? О, просто глупый гоблинский металл. Хватит об этом. Позволь мне научить тебя основам верховой езды!"
"USHUG HAS SECRET. USHUG TELL OTIS IF GIVE POTION. YOU GET POTION. IS STAFF POTION FOR ARENA!": "УШУГ ИМЕЕТ ТАЙНУ. УШУГ СКАЖЕТ ОТИСУ, ЕСЛИ ДАДИТЕ ЗЕЛЬЕ. ВЫ ПОЛУЧИТЕ ЗЕЛЬЕ. ЭТО ЖЕЗЛОВОЕ ЗЕЛЬЕ ДЛЯ АРЕНЫ!"
"THIS POTION? OKAY. OTIS LEARN SECRET. THEN OTIS SMASH POTION! TEACH USHUG NO CHEATING IN ARENA!": "ЭТО ЗЕЛЬЕ? ЛАДНО. ОТИС УЗНАЁТ СЕКРЕТ. ПОТОМ ОТИС РАЗБИВАЕТ ЗЕЛЬЕ! НАУЧИ УШУГА НЕ ОБМАНЫВАТЬ В АРЕНЕ!"
"NEED STINGER OF SCORPION. NOT TELL REASON.": "НУЖЕН ЖАЛО КОРОТКОХВОСТОГО СКОРПИОНА. ПРИЧИНУ НЕ ГОВОРИТЬ."
"HEH HEH HEH HEH. WILL HIDE STINGER IN VIZLARK BED. VIZLARK ASSHOLE BUG. WILL MAKE MAD! HEH HEH HEH!": "ХЕХ ХЕХ ХЕХ ХЕХ. СПРЯЧУ ЖАЛО В КРОВАТЬ ВИЗЛАРКА. ВИЗЛАРК — УРОДЛИВЫЙ ЖУК. ЗАСТАВЛЮ ЕГО ЗЛИТЬСЯ! ХЕХ ХЕХ ХЕХ!"
"CLUB MAKE CRACK SOUND IN ARENA. NEED NEW CLUB! WILL MAKE. GET PERFECT WOOD. CEDAR!": "ДУБИНА ДЕЛАЕТ ТРЕСЧАЩИЙ ЗВУК В АРЕНЕ. НУЖНА НОВАЯ ДУБИНА! СДЕЛАЮ. НУЖНО ИДЕАЛЬНОЕ ДЕРЕВО. КЕДР!"
"MM. IS NOT PERFECT! BUT IS GOOD. WILL USE. TAKE OLD. STILL WORK!": "ММ. НЕ СОВЕРШЕННО! НО ХОРОШО. БУДУ ИСПОЛЬЗОВАТЬ. БЕРИ СТАРЫЙ. ВСЁ ЕЩЁ РАБОТАЕТ!"
"OTIS STOMACH ACHE. OTIS NEED NEW STOMACH. YOU GET! OGRE STOMACH! NOT TROLL STOMACH! OGRE!!": "У ОТИСА БОЛИТ ЖЕЛУДОК. ОТИСУ НУЖЕН НОВЫЙ ЖЕЛУДОК. ТЫ ПОЛУЧИШЬ! ЖЕЛУДОК ОГРА! НЕ ТРОЛЛЯЧИЙ ЖЕЛУДОК! ОГР!!"
"THIS DISGUSTING! WHAT THIS!? OH. OHHH. OTIS STOMACH NOT HURT NOW... OTIS KEEP FOR LATER. HERE. TAKE GARBAGE STOMACH.": "ЭТО ОТВРАТИТЕЛЬНО! ЧТО ЭТО!? ОХ. ОХХХ. У ОТИСА БОЛЬ В ЖИВОТЕ ПРОШЛА... ОТИС СОХРАНИТ ЭТО НА ПОТОМ. ДЕРЖИ. ВОЗЬМИ МУСОР ЖИВОТА."
"The ratkin around here rely heavily on necromancy to help them mine faster. And I noticed the necromancers often have giant white rats with them. They don't look like good tunneling rats... I wonder what they're for?\n\nNo, stop talking. I don't care about a monster's opinions... make yourself useful and go murder some rats. See if they're living or undead. Remember, undead ones don't bleed much!": "Крысолюди здесь сильно полагаются на некромантию, чтобы копать быстрее. И я заметил, что у некромантов часто есть гигантские белые крысы. Они не похожи на хороших рытьёных крыс... Интересно, для чего они нужны?\\n\\nХватит болтать. Мне не важны мнения монстров... сделай что-нибудь полезное и иди убей несколько крыс. Посмотри, живые они или нежить. Помни, нежить почти не кровоточит!"
"The white rats aren't undead? You're sure? Then they must be using them as necromantic Familiars! I've never heard of that happening before! This demands further study... but not right now. I need to think first. Here's your trinket.": "Белые крысы — не нежить? Ты уверен? Тогда они, должно быть, используют их как некромантических фамильяров! Я никогда раньше не слышал о таком! Это требует дальнейшего изучения... но не сейчас. Мне нужно сначала подумать. Вот твой талисман."
"I noticed something weird: there are a bunch of magical goblets lying around down here. They have necromantic magic, but I don't know what they do. If you find any of them, could you let me have them?": "Я заметил кое-что странное: здесь валяется куча магических кубков. В них есть некромантская магия, но я не знаю, что они делают. Если найдёшь какие-нибудь, не мог бы отдать мне?"
"Hmm, they're warm! What was that old mnemonic we learned in school? \"Hatred is Hot, Despair is Cold, Fear is Tingly, Greed is  Slimy\". <i>(It rhymes in Goblin, but not in Common.)</i> I guess... I guess I don't really know enough about Necromancy to tell what these do. But I'll study them. Thanks! Here, take some money for your trouble.": "Хмм, они тёплые! Как же там была та старая мнемоника, которую мы учили в школе? «Ненависть — горячая, Отчаяние — холодное, Страх — покалывающий, Жадность — слизистая». <i>(На гоблинском это рифмуется, а на общем — нет.)</i> Похоже... Похоже, я недостаточно хорошо знаю Некромантию, чтобы понять, что они делают. Но я их изучу. Спасибо! Вот, возьми немного денег за свои труды."
"These ratkin are unusually good at necromancy. I wonder exactly how powerful they are? Hmm...\n\nOh, hi there mutant, I have a small test for you. Go and get yourself shot by some ratkin necromancers. Try not to die, though! I need to ask you some questions after, and I can't speak with the dead! Because I'm not a necromancer!": "Эти крысолюди необычайно хорошо владеют некромантией. Интересно, насколько они сильны? Хмм...\\n\\nО, привет, мутант, у меня для тебя небольшое задание. Иди и дай себя выстрелить нескольким некромантам-крысолюдям. Только постарайся не умереть! Мне нужно будет задать тебе несколько вопросов после, а с мёртвыми я не разговариваю! Потому что я не некромант!"
"So I see you didn't die from the necromancy blasts. I guess that means they aren't TOO dangerous! How painful would you consider their blasts, on a scale of zero to 60?\n\nHmm. I see. Well that experience may be a fluke. I have some more tests in mind... and here is your reward! Good monster!": "Итак, вижу, ты не умер от взрывов некромантии. Значит, они не слишком опасны! Насколько болезненными ты считаешь их взрывы по шкале от нуля до 60?\n\nХм. Понятно. Что ж, этот опыт может быть случайностью. У меня есть ещё несколько тестов... а вот и твоя награда! Хороший монстр!"
"I have given you my recipe for the bird feed we use here. Collect the ingredients and bring me 10 units of it back.\n\n<i>You can find the recipe in the Lore category of your recipe book.</i>": "Я дал тебе мой рецепт птичьего корма, который мы используем здесь. Собери ингредиенты и принеси мне 10 единиц.\\n\\n<i>Рецепт можно найти в разделе «Легенды» твоей книги рецептов.</i>"
"Very nice job! I'm sure my birds will enjoy it. I am scheduled to see the Queen about your request in a couple hours. Check back with me in about 3 hours and I should have an answer for you.\n\nFor now, get acquainted with your new pet!": "Отличная работа! Я уверен, что мои птицы будут довольны. Через пару часов у меня назначена встреча с Королевой по твоей просьбе. Загляни ко мне примерно через 3 часа, и я должен буду иметь для тебя ответ.\\n\\nА пока познакомься со своим новым питомцем!"
"I have a deer friend who lost his antlers in a fight. He's very traumatized about it, even though I explained that they'd grow back. Can you get me a pair of replacement antlers?": "У меня есть олень-друг, который потерял рога в драке. Он очень травмирован из-за этого, хотя я объяснил, что они отрастут заново. Можешь достать мне пару запасных рогов?"
"Thanks. I hope you didn't have to kill too many deer for these! But I'm glad you understand that sometimes deer have to die for inexplicable reasons. That's part of nature's way.": "Спасибо. Надеюсь, тебе не пришлось убивать слишком много оленей ради этого! Но я рад, что ты понимаешь, что иногда олени умирают по необъяснимым причинам. Это часть закона природы."
"My specialty is cat-meat recipes. A lot of visitors expect the meat to be disgusting, but with the right seasoning, it's quite good! And plentiful, too ... or at least it usually is. Right now I seem to be running low. If you have nothing better to do, maybe you could hunt and butcher up some grimalkin meat for me?": "Моё специалитет — рецепты из кошачьего мяса. Многие посетители ожидают, что мясо будет отвратительным, но с правильными специями оно довольно вкусное! И его много... или, по крайней мере, обычно так. Сейчас у меня, похоже, запасы на исходе. Если тебе нечего лучше делать, может, охотился бы и разделал немного мяса грималкин для меня?"
"That stench can only mean one thing: you've got my cat meat! Thanks! Hey, as a thank-you, I'd be willing to teach you how I make my famous Orange Cat recipe.\n\n<i>[ Recipe 'Orange Cat' added to Nishika's Training menu. ]</i>": "Этот запах может означать только одно: у тебя есть мясо моей кошки! Спасибо! Эй, в знак благодарности я готов научить тебя, как готовлю свой знаменитый рецепт Оранжевой Кошки.\\n\\n<i>[ Рецепт «Оранжевая Кошка» добавлен в меню обучения Нишики. ]</i>"
"Since you are no ordinary warsmith, you deserve a challenge worthy of you! Slay 100 sentient creatures in the name of war. Then I shall teach you the secrets you seek.": "Поскольку ты не обычный военный кузнец, ты заслуживаешь вызова, достойного тебя! Убей 100 разумных существ во имя войны. Тогда я открою тебе искомые тайны."
"You are cruel and deadly. Make sure that your armor is, as well.": "Ты жесток и смертоносен. Убедись, что твоя броня такая же."
"The loudest things aboard are definitely the hippogriffs. At first it was neat hearing them shriek all night, but it's gotten a little repetitive. I think any official invasion party would really need to kill those! Thanks!": "Самые громкие существа на корабле — это определённо гиппогрифы. Сначала было интересно слушать их крики всю ночь, но теперь это стало немного утомительно. Думаю, любой официальный отряд вторжения действительно должен их уничтожить! Спасибо!"
"Nice. I really hated cleaning up after those birds! Thanks! Here's some precious loot. Tell people that I gave it to you under great duress.": "Отлично. Я действительно ненавидел убирать за этими птицами! Спасибо! Вот немного ценной добычи. Скажи всем, что я отдал её тебе под большим давлением."
"I can teach you to craft wolf armor of astounding quality, blessed by my consort Norala. For while her wolves are strong, her smiths are weak! And weakness is not tolerated long in war. You will aid them to be war-worthy.\n\nBut Norala's boon requires the death of the largest, most horrific creatures. No ordinary orc or human shall do!": "Я могу научить тебя создавать волчью броню поразительного качества, благословленную моей супругой Норалой. Ведь хотя её волки сильны, её кузнецы слабы! А слабость в войне долго не терпят. Ты поможешь им стать достойными войны.\\n\\nНо дар Норалы требует смерти самых крупных и ужасных созданий. Обычные орки или люди не подойдут!"
"Norala blesses you thus. And both of us shall be watching you.": "Норала благословляет тебя таким образом. И мы оба будем наблюдать за тобой."
"Hmm. I know what THIS order's for. But that' s not our business. Just get the skin.": "Хмм. Я знаю, для чего этот заказ. Но это не наше дело. Просто достань шкуру."
"Fast work! I guess you were feeling froggy and decided to hop to it. I toadally appreciate the unfrogettable work you've done here.": "Быстрая работа! Похоже, ты был полон решимости и сразу принялся за дело. Я безмерно ценю твою незабываемую работу здесь."
"I am an expert staff fighter, but not an expert staff maker... yet. I wish to learn the trade. The mantises suggested that I start with worthless oak wood, but that is foolish! Even my first attempts will be masterpieces if I can find materials of high enough quality. Do you happen to have any masterpiece-quality oak?": "Я эксперт в бою посохом, но пока не мастер его изготовления... Я хочу научиться этому ремеслу. Богомолы посоветовали начать с бесполезного дуба, но это глупо! Даже мои первые попытки будут шедеврами, если я найду материалы достаточно высокого качества. Случайно у тебя нет дуба шедеврального качества?"
"You call this masterpiece-quality wood?! This is junk! I had a piece of oak just like this one, and this is the quality of staff I was able to make. Pathetic!\n\nBut you tried your best. Let your dishonor in failure be small!": "Ты называешь это древесиной высочайшего качества?! Это хлам! У меня был кусок дуба точно такой же, и из него я смог сделать посох такого качества. Жалко!\n\nНо ты старался изо всех сил. Пусть твой позор от неудачи будет мал!"
"So I heard the latest thing is these enchanted arrowheads that curse your target. Sounds great, right? But I'm kind of out of my depth here. I think I need something called \"Crossing Oil\", though. Got any of that?": "Так я слышал, что сейчас в моде эти зачарованные наконечники стрел, которые накладывают проклятие на цель. Звучит здорово, да? Но я немного не в своей тарелке. Думаю, мне нужна вещь под названием «Пересечённое масло». У тебя есть такое?"
"This is it? Crossing Oil? Thanks! I guess I dip the arrow heads in this and they get magical? Huh. Well, I'll play with it. Here's some good old fashioned non-magical arrows as payment.": "Это оно? Масло Пересечения? Спасибо! Похоже, я макаю в это наконечники стрел, и они становятся магическими? Хм. Ладно, поэкспериментирую. Вот тебе немного старомодных немагических стрел в оплату."
"Damn it, he's still out there! Mocking me! The only tiger to escape my blade! Old Fangsworth is a crafty beast; I admit he bested me when I was younger. I could kill him now, but I no longer have the time to stalk him and take him out.": "Чёрт возьми, он всё ещё там! Издевается надо мной! Единственный тигр, которому удалось уйти от моего клинка! Старый Фангсворт — хитрое создание; признаю, он перехитрил меня, когда я был моложе. Я мог бы убить его сейчас, но у меня больше нет времени выслеживать и уничтожать его."
"You... you killed Old Fangsworth? For me? Well, I really needed to kill him myself. For the honor, you know? But I guess knowing that he's no longer out there mocking me is good, too. Thanks!": "Ты... ты убил Старого Фэнгсворта? Ради меня? Знаешь, мне самому очень хотелось убить его. Ради чести, понимаешь? Но, наверное, знать, что он больше не ходит и не насмехается надо мной, тоже хорошо. Спасибо!"
"My new hammer must have a handle of impeccable quality. Spruce is, of course, the ideal wood for gripping, but its strength is substandard... except for very occasional pieces of spruce. I need those perfect specimens of spruce wood!": "Мой новый молот должен иметь рукоять безупречного качества. Ель, конечно, идеальна для хвата, но её прочность оставляет желать лучшего... за исключением очень редких образцов ели. Мне нужны именно эти идеальные образцы еловой древесины!"
"Yes, yes, very good. I find it fascinating that you were able to complete this task. It often takes many orcs many weeks to find spruce of this quality! You must be more impressive than you look!": "Да, да, очень хорошо. Меня поражает, что тебе удалось выполнить это задание. Часто у многих орков уходит несколько недель, чтобы найти ель такого качества! Ты, должно быть, гораздо впечатляющe, чем выглядишь!"
"If I'm going to run an armor shop again I'll need more grizlark, and Leah's kuvou are dead. But there's still feral kuvou! If you just let them spit on you and collect that into a bottle, I'll pay you.": "Если я снова открою магазин брони, мне понадобится больше гризларков, а куфу Лии мертвы. Но дикие куфу ещё есть! Если ты просто дашь им плюнуть на тебя и соберёшь это в бутылку, я заплачу тебе."
"Smell that grizlark! Oh, I didn't explain what it's for. It's a trademark touch around here: we clean and etch armor with diluted grizlark. This will last me for a little while. Thanks.": "Почувствуй этот гризларк! Ой, я не объяснил, для чего он нужен. Это наша фирменная фишка: мы чистим и травим доспехи разбавленным гризларком. Этого мне хватит на некоторое время. Спасибо."
"For my alchemical experiments, I need a liquid that's sweet and full of citric acid. Orange juice should work. But, of course, this is Kur! No oranges for thousands of miles! What should I do?": "Для моих алхимических экспериментов мне нужна жидкость, сладкая и богатая лимонной кислотой. Подойдёт апельсиновый сок. Но, конечно, это Кур! Апельсинов нет за тысячи миль! Что же мне делать?"
"You got orange juice! But how? You're quite adroit at obtaining unusual things, aren't you? Here. I'll trade you for a few of these unusual coins I found lying around the cave.": "Ты достал апельсиновый сок! Но как? Ты довольно ловко добываешь необычные вещи, не так ли? Вот. Обменяю тебе на несколько необычных монет, которые нашёл в пещере."
"You... Brought me oranges! I guess that means you aren't scary after all! Now I see you're actually just a big cutie! Thank you!": "Ты... принес мне апельсины! Значит, ты на самом деле не страшный! Теперь я вижу, что ты просто большой милый! Спасибо!"
"My mouth is watering in anticipation. Try making some of that citrus wine!": "У меня слюнки текут в предвкушении. Попробуй сделать немного этого цитрусового вина!"
"It may be because I'm already very drunk, but this is delicious! You're ready for a trickier wine!": "Возможно, это потому что я уже сильно пьян, но это вкусно! Ты готов к более сложному вину!"
"You destroyed the orcs' war machines and sent them back into the mountains.": "Вы уничтожили боевые машины орков и отправили их обратно в горы."
"Here's another book order I'm stuck on. We just don't get many orcish traders so finding these books in Orcish has been tough!": "Вот ещё один заказ на книги, который меня застопорил. У нас просто не так много оркских торговцев, поэтому найти эти книги на оркском языке было сложно!"
"Wow! Do you know Orcish? How did you find these?! No, no, don't tell me your scavenging secrets. I trust that you didn't steal them from anyone in Statehelm, and that's all I care about.": "Вау! Ты знаешь орочий? Как ты их нашёл?! Нет, нет, не рассказывай мне свои секреты сбора. Я просто надеюсь, что ты не украл их у кого-то в Стейтхелме, и это всё, что меня волнует."
"Used or brand new, I don't care! Just make sure they were actually made by orcs, not those cheap goblin knock-offs.": "Использованные или новые — мне всё равно! Главное, чтобы они были действительно сделаны орками, а не этими дешёвыми подделками гоблинов."
"An elf up in Eltibule Keep asked me for a special navel ring. It took me quite a while to find one around here, but I did it! Can you take it to her?": "Эльф в крепости Элтибуль попросил меня найти особое кольцо для пупка. Мне пришлось долго искать его здесь, но я справился! Можешь отнести его ей?"
"Thank you for delivering the ring! Here's something for your trouble. It's a hideous thing from my reject pile, but it's got some sort of magic in it.": "Спасибо за доставку кольца! Вот тебе что-то за твои труды. Это уродливый предмет из моей стопки отбракованных вещей, но в нём есть какая-то магия."
"What? Oh. Yes. I ordered this ring from that shopkeeper in Serbule. But that was weeks ago! I suppose I still want it. Thank you.": "Что? О. Да. Я заказал это кольцо у того торговца в Сербуле. Но это было несколько недель назад! Полагаю, я всё ещё хочу его. Спасибо."
"Hey, I have to stand around watching recruits during business hours, so I keep missing my chance to pick up a package from Pumza's weapons stall. Can you go get it for me?": "Эй, мне приходится стоять и наблюдать за новобранцами в рабочее время, поэтому я постоянно пропускаю возможность забрать посылку с оружейного прилавка Пумзы. Можешь сходить и забрать её для меня?"
"Thank you. I hope it wasn't out of your way!\n\nThis claw is just as I'd hoped! I'm expanding my horizons to encompass rakshasa claw techniques in my fighting.": "Спасибо. Надеюсь, это не было для тебя лишним неудобством!\n\nЭтот коготь именно такой, как я и надеялся! Я расширяю свои горизонты, включая техники боя с когтями ракшасы в свои умения."
"Ah, for Sir Hughes? Here it is. Special-ordered to his specifications. Remind him that the creator wishes to remain anonymous. Creating these weapons for non-rakshasa could be embarrassing.": "Ах, для сэра Хьюза? Вот оно. Сделано по его особым требованиям. Напомни ему, что создатель желает остаться анонимным. Создавать такое оружие для не-ракшас может быть неловко."
"I am <i>so</i> bored here, stuck in this giant red ice cube. I was sent here for one purpose and one purpose only, to destroy as much life as possible on this stupid rock. But there's no chance that's happening now. But maybe the outcome can still be achieved... I tell you what. Go out and end lives in my name, and I will tell you whatever you want to know about the invading demon force. Deal?": "Мне здесь <i>так</i> скучно, застрял в этом гигантском красном ледяном кубе. Меня отправили сюда с одной единственной целью — уничтожить как можно больше жизни на этой глупой скале. Но теперь этому нет никакого шанса сбыться. Но, может быть, результат всё ещё можно достичь... Вот что. Выйди и покончи с жизнями от моего имени, и я расскажу тебе всё, что ты хочешь знать о вторгающейся демонической силе. Согласен?"
"Yes. Yes! YES! So much death, so much suffering. It makes me feel alive!": "Да. Да! ДА! Так много смерти, так много страданий. Это заставляет меня чувствовать себя живым!"
"So much for dwarves being great miners. I need a little bit of paladium, and you'd think with all these idiot dwarves around that'd be easy. Nope. Not easy. Are you any better than a dwarf? I just need a few chunks! I'll pay well!": "Гномы — отличные шахтёры? Вот и не скажи. Мне нужно немного паладия, и казалось бы, с таким количеством глупых гномов вокруг это должно быть легко. Но нет. Не легко. Ты лучше гнома? Мне нужно всего несколько кусочков! Хорошо заплачу!"
"I'm a generous goblin so I'm going to overlook the tiny size of these paladium samples and pay what we agreed on. But in the future, try to get decent-sized ore samples!": "Я щедрый гоблин, поэтому закрою глаза на крошечный размер этих образцов палладия и заплачу, как мы договорились. Но в будущем старайся приносить образцы руды приличного размера!"
"I need the assistance of a Red Wing named Mandibles. She will only aid me if I produce something called 'paralytic chicken meat'.\n\nThe meat of several different bird-like creatures would work, but Mandibles said the most accessible meat is in a tower in Kur. I cannot go to Kur, it is too cold. She knows this and she taunts me with knowledge I cannot use! Please aid me?": "Мне нужна помощь Красного Крыла по имени Мандиблс. Она поможет мне только если я принесу нечто под названием «паралитическое куриное мясо».\\n\\nПодойдёт мясо нескольких разных птицеподобных существ, но Мандиблс сказала, что самое доступное мясо находится в башне в Куре. Я не могу поехать в Кур — там слишком холодно. Она знает это и дразнит меня знаниями, которые я не могу использовать! Пожалуйста, помоги мне?"
"This is the meat? It stinks of toxins! Mandibles feeds this to guests?! Interesting. Thank you for your kindness -- here, I have stashed some currency away for such an occasion.": "Это мясо? От него воняет ядами! Мандиблы кормят этим гостей?! Интересно. Спасибо за твою доброту — вот, я припрятал немного денег на такой случай."
"I'm no gadgeteer or trinket-smith, but I was thinking about building a simple automated holder-arm. Nothin' fancy, just something a little smarter than a C-clamp!\n\nI don't want to ask Stephie for the parts, though, because that would go on our ledger. This isn't business, it's just an old dwarf messin' around! ... Say, maybe you could help me out? Here's some of the stuff I need. There's more, but this is the hard stuff.": "Я не изобретатель и не мастер безделушек, но думал сделать простой автоматический держатель-руку. Ничего особенного, просто что-то чуть умнее, чем C-образный зажим!\\n\\nНо я не хочу просить у Стефи детали, потому что это попадёт в нашу бухгалтерию. Это не бизнес, а просто старый гном балуется! ... Слушай, может, ты мне поможешь? Вот некоторые из нужных мне вещей. Есть и другие, но это самые сложные."
"So I see you've delivered an N core, still chargable; a size 4 golem claw, used; and what about the... oh, there it is, the programmable counterweight! You've done well. Here is your payment.\n\nI could use help with one other bit of this little project, though. Whenever you next have time to do me a favor.": "Итак, вижу, ты доставил N-ядро, ещё заряжаемое; коготь голема 4-го размера, бывший в употреблении; а как насчёт... о, вот оно, программируемый противовес! Ты хорошо поработал. Вот твоя награда.\n\nОднако мне нужна помощь с ещё одной частью этого небольшого проекта. Когда у тебя будет время, сделай мне одолжение."
"This is gonna sound silly. But you know that watery beer Durstin sells? I found a way to improve it: strawberry juice! I just need a few strawberries for each cup. If you have some, I'll buy 'em from you for... I dunno, ten times their value!": "Это прозвучит глупо. Но знаешь это водянистое пиво, которое продаёт Дёрстин? Я нашёл способ его улучшить: клубничный сок! Мне нужно всего несколько клубник на каждую кружку. Если у тебя есть, я куплю их у тебя за... не знаю, в десять раз дороже!"
"Thank you! Oh, I said I'd pay you, right? Well, here's what I have. Sorry, I just don't have any more money than that! You can't get blood from a stone! Oh, fine, let me throw in some lumber. Everybody likes lumber!": "Спасибо! О, я же говорил, что заплачу, да? Вот, что у меня есть. Извини, у меня просто нет больше денег! С камня кровь не выжмешь! Ладно, пусть будет немного древесины. Всем нравится древесина!"
"I was one of the last lumberjacks to leave our logging camp. Thought I could hold out against some lousy goblins, but they just kept coming! Eventually I had to run. I left behind a lot of great beer, which I'm sure is all gone by now. But more importantly, I left behind my lucky belt buckle. I'd really like it back.\n\nThe camps are east of here, over some hills. The buckle is in the northernmost camp, if that helps.": "Я был одним из последних лесорубов, покинувших наш лесозаготовительный лагерь. Думал, что смогу устоять против этих жалких гоблинов, но они всё шли и шли! В конце концов мне пришлось бежать. Я оставил много отличного пива, которое, уверен, уже всё пропало. Но что важнее — я оставил свой счастливый пряжку от ремня. Очень хочу её вернуть.\\n\\nЛагеря находятся к востоку отсюда, за холмами. Пряжка в самом северном лагере, если это поможет."
"My dad gave me this buckle. I don't wear it, 'cuz it'd get scuffed up. But it's the only thing the deadbeat gave me before he died. So thanks. I mean it.": "Мой отец дал мне эту пряжку. Я её не ношу, потому что она бы поцарапалась. Но это единственное, что этот бездельник дал мне перед смертью. Так что спасибо. Я искренне."
"You know the only good thing about staying here? It's the food! I know, most of it's nothing to write home about. But some days, Durstin makes his fried mycena bites, and they are delicious! They're my one weakness, really. I could eat a million of 'em!\n\nSadly, Durstin's not made any in a while. He offered to teach me the recipe so I could make 'em myself, but that's way too much work! Say... you wanna do it for me?": "Знаешь, единственное хорошее в том, чтобы здесь оставаться — это еда! Я знаю, что большая часть её не стоит того, чтобы о ней рассказывать. Но иногда Дёрстин готовит свои жареные микенские кусочки, и они просто восхитительны! Это моя единственная слабость, честно. Я мог бы съесть их миллион!\\n\\nК сожалению, Дёрстин давно их не готовил. Он предложил научить меня рецепту, чтобы я мог готовить их сам, но это слишком много работы! Слушай... не хочешь сделать это за меня?"
"Oh yes. Hot mycena bites! So simple! Yet so delicious! Thanks!": "О да. Острые укусы микены! Так просто! И при этом так вкусно! Спасибо!"
"I... kind of have a gambling problem. <i>Had</i> a gambling problem. I'm better now! But there's these mantises that I owe money to. Like, several million councils. Don't look at me like that! How was I supposed to know they were psychics?!\n\nSo, yeah. They're gonna rip off my head and lay eggs in my neck unless I get them their money. But they said they'd give me more time if I got them some gems they want. I've gotten a lot of them, but I need a few more. If you happened upon some obsidian, save them for me?": "У меня... была проблема с азартными играми. <i>Была</i> проблема с азартными играми. Сейчас я лучше! Но есть эти богомолы, которым я должен деньги. Миллионы советов, если быть точным. Не смотри на меня так! Откуда я мог знать, что они экстрасенсы?!\n\nТак что да. Они собираются оторвать мне голову и отложить яйца в мою шею, если я не верну им деньги. Но они сказали, что дадут мне больше времени, если я принесу им драгоценные камни, которые они хотят. Я уже собрал много, но мне нужно ещё несколько. Если вдруг найдёшь обсидиан, сохрани его для меня?"
"You got it? Whew! You saved my life for another month! Let me get you something.": "Ты получил это? Фух! Ты спас мне жизнь ещё на месяц! Позволь дать тебе что-нибудь."
"I need to pay off Helena's debt. But I can't entrust her with the money. Can I ask you to deliver it to the mantises? I've been communicating via letter with a mantis named Irkima. He... or she? Eh, whatever. It will take posession of the money. ": "Мне нужно погасить долг Хелены. Но я не могу доверить ей деньги. Могу ли я попросить тебя доставить их богомолам? Я переписываюсь с богомолом по имени Иркима. Он... или она? Да какая разница. Он заберёт деньги."
"It went off without a hitch, then? I was worried that they couldn't be trusted. I hope I was wrong.\n\nThank you for helping my daughter. I have another request of you, if you have time.": "Всё прошло без проблем, так? Я волновался, что им нельзя доверять. Надеюсь, я ошибался.\\n\\nСпасибо, что помогли моей дочери. У меня есть ещё одна просьба, если у вас есть время."
"I have been expecting this! The pass code was sent by pigeon ahead of you.\n\nYes, this amount is correct. I'll let our Queen know Helena's payment is finally made. The enforcers should stop hunting her in one to three days. She should be on her guard until then.": "Я этого и ожидал! Код пропуска был отправлен голубем вперёд тебя.\\n\\nДа, сумма верна. Я сообщу нашей Королеве, что платёж за Хелену наконец произведён. Преследователи должны перестать охотиться на неё в течение одного-трёх дней. Ей стоит быть настороже до тех пор."
"Tryaka's favorite snack was peaches. They always cheered her up! Pity they only grow far from here...": "Любимым лакомством Тряки были персики. Они всегда поднимали ей настроение! Жаль, что они растут только далеко отсюда..."
"How did you get peaches?! Thank you so much! Tryaka will love these!": "Откуда у тебя персики?! Огромное спасибо! Тряка будет в восторге!"
"I wish I had some peaches to give to Tryaka.": "Хотелось бы мне иметь несколько персиков, чтобы отдать Тряке."
"Hey, did you make that pear wine yet? It'd go great with this party!": "Эй, ты уже сделал грушевое вино? Оно отлично подойдёт для этой вечеринки!"
"Not too sweet, but a delicious bouquet! Kind of wasted on me given how drunk I already am, but I still like it! Here's a wine recipe I only learned a few decades ago.": "Не слишком сладкое, но с восхитительным букетом! Для меня это немного напрасно, учитывая, как я уже пьян, но мне всё равно нравится! Вот рецепт вина, который я узнал всего несколько десятилетий назад."
"Time to practice the technique I taught you to harvest excess negative emotions. Check my almanac to see what sort of undead are best to hunt right now. Then go kill them until you find some pearls! Remember: you don't have to be a priest to do this, but you do have to be wearing a Symbol of Arisetsu while you kill the undead.": "Пора попрактиковаться в технике, которую я тебе преподавал, чтобы собирать избыточные негативные эмоции. Проверь мой альманах, чтобы узнать, какую нежить сейчас лучше всего охотиться. Затем убивай их, пока не найдёшь жемчуг! Помни: не обязательно быть жрецом, чтобы это делать, но обязательно носить Символ Арисецу, пока убиваешь нежить."
"Great work! I can turn this negative emotion into healing and warmth. Here, take this as thanks. In the future, you can convert these pearls directly via the evil spiky mirror.": "Отличная работа! Я могу превратить эту негативную эмоцию в исцеление и тепло. Вот, возьми это в знак благодарности. В будущем ты сможешь напрямую конвертировать эти жемчужины через злое колючее зеркало."
"I'll teach you Armor Patching if you bring me some strange, finely ground dirt to help me polish my equipment.": "Я научу тебя заплаткам для брони, если ты принесёшь мне странную, мелко измельчённую землю, чтобы помочь мне отполировать моё снаряжение."
"Good. Here, take this... yes, and this too. Now here, you can pop this dent out like this. And then some cleaning and polishing... The muscles remember!": "Хорошо. Вот, возьми это... да, и это тоже. А теперь вот так можно выбить эту вмятину. А потом немного чистки и полировки... Мышцы помнят!"
"I heard that some backwater called Eltibule has hundreds of gigantic armored snails!": "Я слышал, что в захолустье под названием Элтибуле живут сотни гигантских бронированных улиток!"
"I have many bear and panther skins to decorate my store. But the local beasts, the striped cats, should be on the wall, too! I have tried to get a skin but they are never perfect enough. I accept my limitations. I am not an expert skinner. It is enough to be a master warrior and an expert tradesorc.": "У меня много медвежьих и пантерьих шкур для украшения моего магазина. Но местные звери — полосатые кошки — тоже должны быть на стене! Я пытался добыть шкуру, но они никогда не бывают достаточно идеальными. Я принимаю свои ограничения. Я не эксперт по снятию шкур. Достаточно быть мастером воина и опытным торговцем-волшебником."
"This is not flawless enough. The cat was too small! This wouldn't look impressive next to the bear pelts. You have failed! But you were not required to even try, so I thank you. Hmm. You are a skinner, yes? Then perhaps you are a tanner as well? I skinned beasts while learning the art, but I do not know how to tan them, and they stink. Take them far from here.": "Это недостаточно безупречно. Кошка была слишком маленькой! Это не будет впечатлять рядом с медвежьими шкурами. Ты провалился! Но от тебя даже не требовалось пытаться, так что я благодарю тебя. Хмм. Ты же потрошитель, да? Тогда, возможно, ты ещё и дубильщик? Я потрошил зверей, пока учился этому ремеслу, но не умею их дубить, и они воняют. Унеси их подальше отсюда."
"I'm about to make another batch of fetish powder, and I'm out of pebbles! I need a couple of really smooth round pebbles. They help agitate the mixture while it's cooking. There's no easy place to find them, but they seem to pop up all over the place. Do you have any?": "Я собираюсь сделать ещё одну партию порошка фетиша, а у меня закончились гальки! Мне нужно пару действительно гладких круглых гальок. Они помогают взбалтывать смесь во время варки. Легко их не найти, но они, кажется, встречаются повсюду. У тебя есть такие?"
"Thank you. It takes so long to collect these! Here, let me give you some Council money.": "Спасибо. Сбор этих занимает так много времени! Вот, позволь дать тебе немного денег Совета."
"Oh drat, I need more peridots to enhance my calligraphy. Do you happen to have a few?": "Чёрт, мне нужно больше перидотов, чтобы улучшить свою каллиграфию. Случайно не найдётся у тебя несколько штук?"
"Thanks! Let me give you something in exchange.": "Спасибо! Позволь дать тебе что-нибудь взамен."
"Since I already taught you Transmutation, you're ready to go find weak magical items and turn them into phlogiston for me. Bring me some low-grade packets of Phlogiston.\n\n<i>[As a Transmutation beginner, you'll need to find Uncommon (green-label) magic items that are no higher than level 30. Use the Transmutation recipe you learned to distill these items to Phlogiston.]</i>": "Поскольку я уже научил тебя Трансмутации, ты готов отправиться на поиски слабых магических предметов и превратить их для меня в флогистон. Принеси мне несколько низкосортных пакетов флогистона.\\n\\n<i>[Как новичку в Трансмутации, тебе нужно найти необычные (с зелёной меткой) магические предметы не выше 30 уровня. Используй рецепт Трансмутации, который ты выучил, чтобы дистиллировать эти предметы в флогистон.]</i>"
"You did it! I knew I was a great teacher! I'll teach you the next technique now. This lets you distill slightly better magic items! Oh and here: take these prisms. Sometimes they break, so you need a lot of them.\n\nI actually need a lot more phlogiston than this -- but don't worry, I'm not asking you to work free! When you're ready to help more, let me know.\n\n<i>[New Favor Unlocked.]</i>": "Ты справился! Я знал, что я отличный учитель! Сейчас я научу тебя следующей технике. Она позволяет дистиллировать немного лучшие магические предметы! О, и вот: возьми эти призмы. Иногда они ломаются, так что их нужно много.\\n\\nНа самом деле мне нужно гораздо больше флогистона — но не волнуйся, я не прошу тебя работать бесплатно! Когда будешь готов помочь ещё, дай знать.\\n\\n<i>[Новая услуга разблокирована.]</i>"
"Any invasion force would be dumb not to take out the phoenixes on the engine deck. We don't use them in day-to-day operations, but if we have to cold-start an engine, we use their superheated breath.": "Любое вторжение было бы глупо, если бы не уничтожить фениксов на машинном отделении. Мы не используем их в повседневных операциях, но если нам нужно холодно запустить двигатель, мы используем их сверхнагретое дыхание."
"The phoenixes are gone? Well, that's an important part of the ship's backup system taken out!\n\nNobody will notice at first. But in a few months when we need to restart an engine, people will be SO PISSED!": "Фениксы исчезли? Ну, это важная часть резервной системы корабля выведена из строя!\\n\\nСначала никто не заметит. Но через несколько месяцев, когда нам понадобится перезапустить двигатель, люди будут ОЧЕНЬ ЗЛИТЬСЯ!"
"Sarina has been so unhappy since she came home. I know time is what she needs now, but maybe chemicals can speed the process up!\n\nCan you get me some Pick-Me-Up Juice? It's an old alchemy recipe that puts a smile on your face for a while.": "Сарина была так несчастна с тех пор, как вернулась домой. Я знаю, что ей сейчас нужно время, но, может быть, химия поможет ускорить процесс!\\n\\nМожешь принести мне немного сока «Подними настроение»? Это старый рецепт алхимии, который на время вызывает улыбку."
"Thanks! Now if I can convince her to drink one of these, maybe I can get her out of her bed for the first time in days.\n\nHere, let me trade you. Sie has a bunch of these fire-protection potions lying about! I guess sometimes visiting orcs try to set the inn on fire.": "Спасибо! Теперь, если я смогу убедить её выпить один из этих, возможно, я смогу вытащить её из кровати впервые за несколько дней.\\n\\nВот, давай поменяемся. У Сии полно этих зелий защиты от огня! Похоже, иногда орки-гости пытаются поджечь таверну."
"If I can make a potion to fix my mind, it might fix yours too! Can you grind up some mushroom flakes for me?": "Если я смогу сделать зелье, чтобы исправить свой разум, возможно, оно поможет и твоему! Можешь измельчить для меня немного грибных хлопьев?"
"Thank you! This is exactly what I needed. Not sure what I needed it for, but I'll remember eventually. I hope.": "Спасибо! Это именно то, что мне было нужно. Не уверен, для чего именно, но со временем вспомню. Надеюсь."
"If I can make a potion to fix my mind, it might fix yours too! Can you bring me some ingredients I'm missing?": "Если я смогу сделать зелье, чтобы исправить свой разум, возможно, оно поможет и твоему! Можешь принести мне несколько недостающих ингредиентов?"
"This is a good start! We're on our way to... Umm. What are we doing?": "Это хорошее начало! Мы на пути к... Эм. Что мы вообще делаем?"
"My horn hurts! It burns with righteousness! I need a new horn, a horn of dark! Fetch it fresh from the most despicable pixie you can. Go!": "Мой рог болит! Он пылает праведным гневом! Мне нужен новый рог, рог тьмы! Принеси его свежим от самой отвратительной феи, какую только сможешь найти. Вперёд!"
"Yes! This horn screams with despair. It will silence my righteous horn and be a partner to my hateful horn. This item... take it. Go so that I may begin the weaving!": "Да! Этот рог вопит отчаянием. Он заглушит мой праведный рог и станет спутником моего злобного рога. Этот предмет... возьми его. Иди, чтобы я мог начать плетение!"
"It is difficult to remember what beast is a true immortal and what is not. But I have invented something in the human tongue to help! Bury bears. Because they are mortal, you see? \"Bury bears\"? Go and practice until this trick is burned into your mind.": "Трудно помнить, какое существо истинно бессмертно, а какое нет. Но я придумала кое-что на человеческом языке, чтобы помочь! Хорони медведей. Потому что они смертны, понимаешь? «Хорони медведей»? Иди и практикуйся, пока этот трюк не врежется тебе в память."
"You are finally back! ... I realized that I have misled you. For you see, one can bury pixies also! We are reborn in a new body; the old one means little... burying creatures proves nothing!\n\nAnd I made you burn my lie into your mind! ... WHY?! WHY DID I PUNISH YOU WITH MY FOLLY! I AM SO SORRY! Please take this as an apology.": "Ты наконец вернулся! ... Я понял, что ввёл тебя в заблуждение. Видишь ли, пикси тоже можно похоронить! Мы возрождаемся в новом теле; старое мало что значит... похоронить существо ничего не доказывает!\n\nИ я заставил тебя выжечь мою ложь в твоём сознании! ... ЗАЧЕМ?! ЗАЧЕМ Я НАКАЗАЛ ТЕБЯ СВОЕЙ ГЛУПОСТЬЮ! МНЕ ТАК ЖАЛЬ! Пожалуйста, прими это как извинение."
"At night, go south of here until you find the fiery birds, which are immortal like me, and seek the crimsonfelt moths, which are not immortal. Steal these moths' lives. Let the phoenices see you do it! That is the only way to make them understand what I understand.": "Ночью иди к югу отсюда, пока не найдёшь огненных птиц, которые бессмертны, как я, и ищи багровопалых мотыльков, которые не бессмертны. Укради жизни этих мотыльков. Пусть фениксы увидят, как ты это делаешь! Это единственный способ заставить их понять то, что понимаю я."
"Now the phoenices surely know the truth! It is carved into their immortal souls...\n\n<i>[Uriana seems lost in thought. She absentmindedly hands you an item from her hoard.]</i>": "Теперь фениксы наверняка знают правду! Она высечена в их бессмертных душах...\\\\n\\\\n<i>[Уриана кажется задумавшейся. Она рассеянно передаёт тебе предмет из своей коллекции.]</i>"
"Listen for the buzz of bees at night. You will see that it is not bees who dwell in the night, it is wasps! Wasps who bask in the power the Winter Queen! They sting all who oppose her. You know what to do.": "Слушай жужжание пчёл ночью. Ты увидишь, что в ночи живут не пчёлы, а осы! Осы, которые купаются в силе Зимней Королевы! Они жалят всех, кто ей противится. Ты знаешь, что делать."
"For the bees' crimes, only death would suffice. It is justice. But I pity you, executioner. For you are now as corrupt as any wasp.\n\n<i>[Uriana silently hands you an item from her hoard, then seems to forget about you.]</i>": "За преступления пчёл заслуживает только смерть. Это справедливость. Но я жалею тебя, палач. Ведь теперь ты так же испорчен, как и любая оса.\\n\\n<i>[Уриана молча передаёт тебе предмет из своей коллекции, затем, кажется, забывает о тебе.]</i>"
"Pixies hunt; fairies hunt; panthers hunt! But one is not worthy! NOT WORTHY! They are not like us! They seethe with mortality! Can you not smell the mortality of the panthers?! Show them their mortality! SHOW THEM!": "Пикси охотятся; феи охотятся; пантеры охотятся! Но один недостоин! НЕДОСТОИН! Они не такие, как мы! Они кипят смертностью! Разве ты не чувствуешь смертность пантер?! Покажи им их смертность! ПОКАЖИ ИМ!"
"<i>[Uriana looks shocked at what you've done and begins to weep.]</i> You slew panthers at my bequest?! You lie! I love panthers! No... I hate them! I love AND hate them! ... Well, you do not lie.\n\n<i>[Uriana silently hands you an item from her hoard, then becomes lost in thought.]</i>": "<i>[Уриана выглядит шокированной тем, что ты сделал, и начинает плакать.]</i> Ты убил пантер по моей просьбе?! Ты лжёшь! Я люблю пантер! Нет... я их ненавижу! Я люблю И ненавижу их! ... Ну, ты не лжёшь.\\n\\n<i>[Уриана молча передаёт тебе предмет из своей коллекции, затем погружается в раздумья.]</i>"
"Yesterday I experienced fear. Why should I suffer fear?! I am immortal! Yet I did fear. I was hunted by another immortal: a true barghest, and I was afraid! I slew it, but I knew it would return, and so my fear only grew!\n\nI do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!": "Вчера я испытала страх. Почему я должна страдать от страха?! Я бессмертна! Но всё же я боялась. Меня преследовал другой бессмертный: настоящий баргест, и я боялась! Я убила его, но знала, что он вернётся, и мой страх только рос!\\n\\nМне не нравится страх. Мне это не нравится! Иди и найди новое тело баргеста и уничтожь мой страх своими действиями!"
"You slew the barghest and yet I still fear! Violence cannot help me! ARGH! I will have to try parlaying with the beast. Go now. I must think.\n\n<i>[Uriana silently hands you an item from her hoard, then becomes lost in thought.]</i>": "Ты убил баргеста, а я всё ещё боюсь! Насилие мне не поможет! АРГХ! Придётся попытаться переговорить с чудовищем. Иди сейчас. Мне нужно подумать.\\n\\n<i>[Уриана молча передаёт тебе предмет из своего тайника, затем погружается в раздумья.]</i>"
"I have been to the ancient ruins and I have meditated there. You, too, must go. Touch them. Feel their bones. Hear their words.": "Я побывал в древних руинах и медитировал там. Ты тоже должен пойти. Прикоснись к ним. Почувствуй их кости. Услышь их слова."
"I see that you have been to the places of meditation. You look more honest now.\n\n<i>[Uriana silently hands you an item from her hoard, then turns away.]</i>": "Вижу, ты побывал в местах медитации. Теперь ты выглядишь честнее.\\n\\n<i>[Уриана молча передаёт тебе предмет из своего тайника, затем отворачивается.]</i>"
"There is only one way to overcome the bees: let them sting you. Yes! Tell them to inject their hatred into you. INTO YOU, and yet you survive! Show them. Show them their hatred is unworthy.": "Победить пчёл можно только одним способом: позволь им ужалить тебя. Да! Скажи им впрыснуть свою ненависть в тебя. В ТЕБЯ, и всё же ты выживаешь! Покажи им. Покажи им, что их ненависть недостойна."
"Now you are awakened to the bees! Tell them what you have learned and they will never trouble you again. This item will be your badge of accomplishment. Now go!": "Теперь ты пробудился для пчёл! Расскажи им то, что узнал, и они больше никогда не будут тебе досаждать. Этот предмет станет твоим знаком достижения. Вперёд!"
"I remember a thing! It is called a Pixie Pocket. So named by cruel mortals! Or... perhaps named by cruel fairies... I do not remember. But I think I remember the formula! Here: my notes. Make the Pixie Pocket. Tell me if my formula works.": "Я вспомнила кое-что! Это называется Карман Пикси. Так назвали жестокие смертные! Или... может быть, жестокие феи... Я не помню. Но, кажется, я помню формулу! Вот: мои заметки. Сделай Карман Пикси. Скажи мне, работает ли моя формула."
"It worked! So the Pixie Pocket is as I remembered: a slurry of peaches and coagulated goat emissions. ... Well, this was definitely named by mortals, then. Take it away before its stench angers me.": "Это сработало! Значит, Волшебный Карман такой, каким я его помнил: смесь персиков и свернувшихся козьих выделений. ... Ну, тогда это определённо название, придуманное смертными. Убери это отсюда, пока его вонь не разозлила меня."
"Go and pluck the wings from shimmerwings. Listen to their final dying words and then you will know what I know.": "Сорви крылья у сверкающих крыльев. Послушай их последние умирающие слова, и тогда узнаешь то, что знаю я."
"Did you hear their words? ... How could you not hear anything?! Is it possible that I alone can hear...\n\n<i>[Uriana seems lost in thought. She absentmindedly hands you an item from her hoard.]</i>": "Ты слышал их слова? ... Как ты мог ничего не услышать?! Неужели только я одна могу слышать...\\n\\n<i>[Уриана кажется задумавшейся. Она рассеянно передаёт тебе предмет из своей коллекции.]</i>"
"Vines keep attacking people south of town. I don't mean the spriggan weeds, I mean the OTHER kind! Floxie calls them carnivines. And really, Floxie should be the one to deal with these pests, given she's on plant duty, but she refuses! Will you remove these vicious weeds before someone gets hurt?": "Лозы продолжают нападать на людей к югу от города. Я не про сорняки спригганов, я про ДРУГОЙ вид! Флокси называет их плотоядными лозами. И вообще, Флокси должна заниматься этими вредителями, ведь она отвечает за растения, но она отказывается! Уберёшь эти свирепые сорняки, пока кто-нибудь не пострадал?"
"Very good work! I'll tell Floxie a mortal did her job for her. Won't she be shamed! Haha!": "Отличная работа! Я расскажу Флокси, что смертный сделал её работу. Вот это будет стыдно! Ха-ха!"
"I've heard that some of the demonic rocks to the north have useful properties. There is one in particular that interests me, some kind of frozen magma. I would like to tinker with this one, and see if it has useful engineering applications. If you bring me a few, I will share any findings with you.": "Я слышал, что некоторые демонические камни на севере обладают полезными свойствами. Есть один, который особенно меня интересует — некий замороженный магма. Я хотел бы поэкспериментировать с ним и посмотреть, есть ли у него полезные инженерные применения. Если ты принесёшь мне несколько, я поделюсь с тобой своими находками."
"Interesting. It is cool to the touch, but it's clear that there is magma inside. I think with just the write current applied equally to the entire surface area, it can be turned back on... are you writing this down?": "Интересно. На ощупь прохладный, но ясно, что внутри магма. Думаю, если приложить правильный ток равномерно по всей поверхности, его можно снова включить... ты записываешь это?"
"Bzz. BzzZZzzz ...Bzz. ZzzZzzZzzBz ... zzzBzt!\nWe need your help, fairy. Our enemies burrow under the ground to ambush us while we pollinate.\n\nZzrt bzz. ZzzZzzZzzBz ... zzzBzt!\nWe cannot care for our young flowers. You must go instead.\n\nBzzRtxl!\nPollinate our young flowers!": "Бзз. БззЗЗзз...Бзз. ЗззЗззЗзБз... зззБзт!  \nНам нужна твоя помощь, фея. Наши враги роются под землёй, чтобы устроить нам засаду, пока мы опыляем.  \n\nЗрт бзз. ЗззЗззЗзБз... зззБзт!  \nМы не можем заботиться о наших молодых цветах. Ты должна пойти вместо нас.  \n\nБззРтхл!  \nОпылить наши молодые цветы!"
"BzzZz!\nThank you, fairy!\n\nBzz. BzzZZzzz ...Bzz. ZzzZzzZzzBz ... zzzBzt!\nWhile you pollinated, the sprouts attacked. You must kill them!\n\nBzzRtxl!": "БззЗз!  \\nСпасибо, фея!  \\n\\nБзз. БззЗЗзз... Бзз. ЗззЗззЗзБз... зззБзт!  \\nПока ты опыляла, ростки напали. Ты должна их убить!  \\n\\nБззРтхл!"
"Well, you've made me wait so long for my food that I'm not even that hungry. I'll take the appetizers to go, please. Oh, don't tell me you lost my appetizer order?! It was spicy porcini bites! I need two servings. And not too greasy!": "Ну, вы заставили меня так долго ждать еду, что я уже не так голоден. Я возьму закуски с собой, пожалуйста. О, не говорите, что вы потеряли мой заказ на закуски?! Это были острые закуски из белых грибов! Мне нужно две порции. И не слишком жирные!"
"Well, these look edible. Thank you.": "Ну, это выглядит съедобным. Спасибо."
"Where are my porcini bites? Remember, I ordered two!": "Где мои закуски из белых грибов? Помни, я заказывал две!"
"I'm having a party this weekend and I wanted to serve an insane amount of pork. Just... an INSANE amount! Could you help? I need a few more pork shoulders.": "У меня на этих выходных вечеринка, и я хочу подать безумное количество свинины. Просто... БЕЗУМНОЕ количество! Ты мог бы помочь? Мне нужно ещё несколько свиных лопаток."
"Thanks! Hopefully this will be enough food to impress people at the party.": "Спасибо! Надеюсь, этой еды хватит, чтобы впечатлить людей на вечеринке."
"My bitchy old friend Gretchen taught me a special brewing recipe. I'm eager to try it, but it needs potatoes. I hate growing potatoes! You do it.": "Моя сварливая старая подруга Гретхен научила меня особому рецепту пивоварения. Мне не терпится попробовать, но нужны картофелины. Я ненавижу выращивать картофель! Сделай это ты."
"Thanks. If you want to know how to make the stuff, I'm sure Gretchen in Eltibule can teach you. Just hang out and help her chop potatoes some time.\n\nOh, here, this is for you. Hold on to these! You need 'em for brewing beer.": "Спасибо. Если хочешь узнать, как это делать, я уверен, что Гретхен в Элтибуле сможет тебя научить. Просто проведи с ней время и помоги порезать картошку.\\n\\nВот, держи это. Держи при себе! Они нужны для варки пива."
"I've been so worried about my sister that I've barely grown enough food to keep us fed. Would you mind bringing me some potatoes? I'll give you a fair trade for them.": "Я так переживаю за свою сестру, что едва успеваю вырастить достаточно еды, чтобы нас прокормить. Не мог бы ты принести мне немного картошки? Я предложу тебе справедливую сделку за неё."
"Thank you so much! Let me repay you with knowledge of gardening. Oh, and if that isn't adequate, here, you can have this pair of uncomfortable gardening gloves, too.": "Большое спасибо! Позволь отблагодарить тебя знаниями о садоводстве. О, и если этого недостаточно, вот, возьми ещё эту пару неудобных садовых перчаток."
"Could you tell your Warden friends about me? I've been keeping a log of dangers in the area, but I can't really act on them alone. Maybe we could team up! Or something. Just tell the head of your Warden enclave about me. I'm here and ready to help however I can!": "Не мог бы ты рассказать своим друзьям Стражам обо мне? Я веду журнал опасностей в этом районе, но сам справиться с ними не могу. Может, объединимся! Или что-то в этом роде. Просто сообщи главе вашего анклава Стражей обо мне. Я здесь и готов помочь, чем смогу!"
"Thank you for telling your Warden friends about me, but if their plan is to relocate me out of Povus, I'm not interested. <i>This</i> is the land I've sworn to defend! But I guess I'll go and explain this to your sheep friend myself. You've done enough for me!": "Спасибо, что рассказал своим друзьям-стражам обо мне, но если их план — переселить меня из Повуса, меня это не интересует. <i>Эта</i> земля — та, которую я поклялся защищать! Но, полагаю, я сам пойду и объясню это твоему другу-овце. Ты для меня уже достаточно сделал!"
"You found a lost Warden from the Povus region? That's good news. I thought they died out years ago! Well, tell your new friend to report here for debriefing, and we'll get him relocated to somewhere that really needs a Warden!": "Вы нашли потерянного Стража из региона Повус? Это хорошие новости. Я думал, что они вымерли много лет назад! Ну, скажи своему новому другу прийти сюда для инструктажа, и мы переведём его туда, где действительно нужен Страж!"
"The dread lich Urg-Ak Faqu has come to claim Povus! His minions are empowered by spells that nullify most attacks. The town's only hope is to enable the protective pagodas! Bring monsters near activated pagodas to strip them of their defenses.\n\nThe monsters are invading from all sides, but it seems they're congregating on the north side of town.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Ужасный лич Ург-Ак Факу пришёл захватить Повус! Его приспешники усилены заклинаниями, которые нейтрализуют большинство атак. Единственная надежда города — активировать защитные пагоды! Приводи монстров к активированным пагодам, чтобы снять с них защиту.\n\nМонстры нападают со всех сторон, но, похоже, собираются на северной стороне города.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"You've defeated Urg-Ak Faq! Visit the town Status board for a reward.": "Ты победил Ург-Ак Фак! Посети доску объявлений в городе, чтобы получить награду."
"A roving band of flapskulls and other undead have found their way to town. They have no necromantic master, but they are led by the hideous Chuckleflap. You can activate the pagodas in town if you need some fresh air.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Бродячая группа череполистов и другой нежити добралась до города. У них нет некромантского хозяина, но их возглавляет отвратительный Чаклфлап. Если нужно проветриться, можешь активировать пагоды в городе.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"You've repelled the flapskulls! Visit the town Status board for a reward.": "Ты отразил нападение хлопушек! Посети доску объявлений в городе, чтобы получить награду."
"Monsters are invading Povus under cover of darkness. Light the town's lamps to regain control.\n\n(To receive a personal reward, make sure you personally light at least one lamp.)": "Монстры вторгаются в Повус под покровом ночи. Зажги фонари в городе, чтобы вернуть контроль.\n\n(Чтобы получить личную награду, обязательно зажги хотя бы один фонарь сам.)"
"You lit all the lamps! Visit the Town Status Board for a reward.": "Ты зажёг все фонари! Посети Доску объявлений города, чтобы получить награду."
"Scores of screaming orcs are invading from the river. They're taking over Old Town! Stop them!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Десятки вопящих орков вторгаются с реки. Они захватывают Старый город! Останови их!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"You've routed the orcs! Visit the town Status board for a reward.": "Ты разгромил орков! Посети доску объявлений в городе, чтобы получить награду."
"The mercenary Evil Carnivore Gang is trying to steal Povus's priceless protective pagodas! They've placed explosive spells on them and are planning to cart off the enchanted rubble.\n\nWithout the pagodas, Povus will soon be overrun with undead. Cleans the pagodas! You'll also need to defeat the raid leader, Asila the Spark, to convince the gang to back down.\n\n(To receive a reward, make sure that you personally activate a pagoda or defeat the gang leader.)": "Наёмная банда Злой Плотоядный пытается украсть бесценные защитные пагоды Повуса! Они наложили на них взрывные заклинания и планируют унести зачарованные обломки.\n\nБез пагод Повус скоро заполонят нежить. Очисти пагоды! Тебе также нужно победить лидера налёта, Асилу Искру, чтобы заставить банду отступить.\n\n(Чтобы получить награду, убедись, что лично активировал пагоду или победил лидера банды.)"
"You've thwarted the pagoda thieves! Visit the town Status board for a reward.": "Ты сорвал планы воров пагоды! Посети доску объявлений в городе, чтобы получить награду."
"Evil paleontologists are sieging town! Their extraordinary skeleton troops will require teamwork to defeat.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Злые палеонтологи осаждают город! Их необычные скелетные войска потребуют командной работы для победы.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"You've broken the paleontologists' siege! Visit the town Status board for a reward.": "Ты прорвал осаду палеонтологов! Посети доску объявлений в городе, чтобы получить награду."
"Ranalon-controlled megafauna are invading town! It will take concerted effort to thwart them.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Мегафауна, контролируемая Раналоном, вторгается в город! Чтобы остановить их, потребуется совместное усилие.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"You've halted the ranalon assault! Visit the town Status board for a reward.": "Ты остановил нападение раналонов! Посети доску объявлений в городе, чтобы получить награду."
"The Annex district, along with the whole area south of town, is being flooded by Ranalon interlopers! Destroy their water portals and push back their assault force!\n\n(To receive a reward, make sure that you personally defeat at least one enemy.)\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Район Аннекс, а также вся территория к югу от города затоплены захватчиками Раналона! Уничтожьте их водные порталы и оттесните наступающую силу!\n\n(Чтобы получить награду, убедитесь, что лично победили хотя бы одного врага.)\n\n(Чтобы получить награду, убедитесь, что лично помогли победить хотя бы одного врага.)"
"The flooding is contained! Visit the Town Status Board for a reward.": "Наводнение локализовано! Посетите Доску статуса города, чтобы получить награду."
"Ratkin have invaded from the east and have already taken New Town. They're spreading a poison that only rats can survive. Stop them!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Раткины вторглись с востока и уже захватили Новый город. Они распространяют яд, который могут пережить только крысы. Останови их!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"The air is becoming breathable. The ratkin are repelled! Visit the Town Status Board for a reward.": "Воздух становится пригодным для дыхания. Крысолюди отогнаны! Посети Доску состояния города за наградой."
"Ratkin have infiltrated Old Town and the Sprawl and have claimed ownership of the town! Dispute their claim with prejudice!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Крысолюди проникли в Старый город и Разрастание и захватили власть в городе! Беспощадно оспорь их претензии!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"You've defeated the ratkin! Visit the town Status board for a reward.": "Ты победил крысолюдей! Посети доску объявлений в городе, чтобы получить награду."
"The river-ranalon have brought a horrible beast to town! Kill it before it destroys us all!\n\n(To receive a reward, make sure that you personally help defeat the Boss enemy.)": "Речной раналон привёл в город ужасное чудовище! Убейте его, прежде чем оно уничтожит нас всех!\n\n(Чтобы получить награду, убедитесь, что лично помогли победить босса.)"
"You've defeated Zotras the River Guardian! Visit the town Status board for a reward.": "Ты победил Зотраса, Хранителя Реки! Посети доску объявлений в городе, чтобы получить награду."
"Undead are being summoned into town! Defeat the undead ogres in New Town and find the death-faces and Shaman Lords in the Sprawl!\n\n(To receive a reward, make sure that you personally help defeat at least one Visage of Demise or Elite enemy.)": "В город призывают нежить! Победите неживых огров в Новом городе и найдите Лики Смерти и Шаманских Вождей в Разрастании!\n\n(Чтобы получить награду, убедитесь, что лично помогли победить хотя бы одного Лика Смерти или элитного врага.)"
"You've halted the undead invasion! Visit the town Status board for a reward.": "Ты остановил вторжение нежити! Посети доску объявлений в городе, чтобы получить награду."
"The local orcish warlord himself is attacking from the east, along with his best-equipped troops! Defend Povus!\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Местный орочий военачальник лично атакует с востока вместе со своими лучше всего оснащёнными войсками! Защищай Повус!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"You've defeated Brukal's assault team! Visit the town Status board for a reward.": "Ты победил штурмовую группу Брукала! Посети доску объявлений в городе, чтобы получить награду."
"Winter Court scouts think the town is weak, and they're attacking! They've invaded every neighborhood! Do something before they freeze and/or burn the place down!\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Разведчики Зимнего Двора считают город слабым и нападают! Они захватили каждый район! Сделай что-нибудь, прежде чем они заморозят или сожгут город!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"You've chased off the Winter Court! Visit the town Status board for a reward.": "Ты прогнал Зимний Двор! Посети доску объявлений в городе, чтобы получить награду."
"Mm. Kill plants. Bring dust.": "Мм. Убей растения. Принеси пыль."
"Good. Will use dust for psychedelic drugs. Here.": "Хорошо. Пыль будет использована для психоделических наркотиков. Вот."
"During my exhile... no, I should say during my \"extended aid session\" here in Sun Vale, I desire to investigate potential new drug remedies. The carnivorous plants that grow on this island fascinate me. Sometimes you can obtain the dessicated remains of their last meal inside them. If you come upon these, please procure them for me.": "Во время моего изгнания... нет, правильнее сказать — во время моего «продлённого сеанса помощи» здесь, в Сан Вейле, я хочу исследовать возможные новые лекарственные препараты. Хищные растения, растущие на этом острове, меня очень интересуют. Иногда можно найти высушенные остатки их последней добычи внутри них. Если наткнёшься на такие, пожалуйста, принеси их мне."
"These are all mammilian in nature. Corroboration! I noticed that the plants do not attack me, and now I understand: the plants do not eat insects! This is a very useful discovery. I must contact the Queen at once. We can use these plants as guards!\n\nAs an added bonus, I can now experiment with these powders for new drug ideas as well.\n\nYou have been exceptionally useful. I understand that your culture dictates that I now give you 'tit for your tat', which I assume is a disgusting sexual act. Since insects do not have breasts -- and if they did, males such as I would not have these organs -- please accept this secretion instead. In my home city, we farm the insects that make this, and use it as currency.": "Все они млекопитающие по своей природе. Подтверждение! Я заметил, что растения не нападают на меня, и теперь понимаю: растения не едят насекомых! Это очень полезное открытие. Я должен немедленно связаться с Королевой. Мы можем использовать эти растения в качестве стражей!\\n\\nВ качестве дополнительного бонуса я теперь могу экспериментировать с этими порошками для создания новых лекарств.\\n\\nТы был исключительно полезен. Я понимаю, что твоя культура требует, чтобы я теперь отплатил тебе тем же, что, как я предполагаю, является отвратительным сексуальным актом. Поскольку у насекомых нет груди — и если бы были, самцы, такие как я, не имели бы этих органов — пожалуйста, прими вместо этого эту секрецию. В моём родном городе мы разводим насекомых, которые её производят, и используем её в качестве валюты."
"I have a long work order to get through today. I need refreshment! You've been down into the goblin basement, no? Do you have any power potions? The goblins love to carry them.": "У меня сегодня много работы. Мне нужно подкрепиться! Ты же был в подвале гоблинов, да? У тебя есть зелья силы? Гоблины любят их носить с собой."
"Thank you. I mix these with rhak whiskey for a truly energizing beverage. Here, let me show you a few pointers for your trouble.": "Спасибо. Я смешиваю это с ракским виски, чтобы получить по-настоящему бодрящий напиток. Вот, позволь показать тебе несколько советов за твои труды."
"When I was an active general, I was given a gift by a visiting dwarven emissary. It's a mechanical back-scratching arm. It was my prized possession for years, until it broke.\n\nUfkar says it's not really broken, though, just out of magic. I need something called an 'N Core'. Two of them, actually. I've heard of adventurers finding them in the desert. Usually in those ruins from the war.": "Когда я был действующим генералом, мне подарил подарок приезжий гномий эмиссар. Это была механическая рука для чесания спины. Она была моей самой ценной вещью много лет, пока не сломалась.\n\nУфкар говорит, что она на самом деле не сломана, а просто лишена магии. Мне нужна вещь под названием «N Core». На самом деле две штуки. Я слышал, что искатели приключений находили их в пустыне. Обычно в тех руинах от войны."
"Just looking at these, I can almost feel the back scratcher running up and down my back... ahh, this is going to feel so good. Excuse me, please.": "Просто глядя на это, я почти чувствую, как по моей спине бегает чесалка... ах, это будет так приятно. Извините меня, пожалуйста."
"Once again I'm going to have to trek out into the dangerous wilds to collect the slime of fae molluscs... say, you know how to milk a snail, I presume? Would you mind doing it? Take some clean bottles with you to collect it!": "Снова придётся отправиться в опасные дикие земли, чтобы собрать слизь фейских моллюсков... Скажи, ты умеешь доить улитку, полагаю? Не мог бы ты этим заняться? Возьми с собой чистые бутылки, чтобы собрать слизь!"
"Thank you. Now I'll turn the slime into silk. Would you like to watch? You'll be able to pick up my technique.\n\n<i>[New hangout available when your Textile skill is at least 50.]</i>": "Спасибо. Теперь я превращу слизь в шёлк. Хочешь посмотреть? Ты сможешь перенять мою технику.\n\n<i>[Новое место для отдыха доступно, когда твой навык Текстиль достигнет как минимум 50.]</i>"
"Oh, are you for hire? Great! I need special metal for my next promotional sword. I spent quite a bit to learn where to find it. I may have ordered the information from... overseas. And you know how it is with information from... overseas: always with the mysterious language! But I'm hoping you can figure it out!\n\n\t\"Within a mushroom tall as hills\n\tsomething something, wise preying mantises...\n\tsomething something minimum mining level of 50.\"\n\nI should have written it down, but that's what I remember. Hope it helps.": "О, ты наёмник? Отлично! Мне нужен особый металл для моего следующего промоционного меча. Я потратил немало, чтобы узнать, где его найти. Возможно, я заказал информацию из... зарубежья. А ты знаешь, как бывает с информацией из... зарубежья: всегда на загадочном языке! Но я надеюсь, ты сможешь разобраться!\\n\\n «Где гриб выше холмов  \\n что-то про мудрых богомолов...  \\n что-то про минимальный уровень добычи 50.»\\n\\nЯ должен был записать это, но это то, что я помню. Надеюсь, поможет."
"Is this it? Augh! It screamed into my brain! You should have warned me!\n\nBut good. Yes. Yesss... this is perfect!  Well done.": "Это оно? Ах! Оно закричало у меня в голове! Ты должен был меня предупредить!\\n\\nНо хорошо. Да. Дааа... это идеально! Отличная работа."
"The rhino hide's miscoloration has thrown everything off kilter aesthetically! I need an entirely new accent color. And a different pommel crystal! Since you're basically responsible for this mess, can you help fix it? Don't worry. I'll pay.": "Искажение цвета носороговой кожи полностью испортило внешний вид! Мне нужен совершенно новый акцентный цвет. И другой кристалл навершия! Поскольку ты, по сути, виноват в этом беспорядке, можешь помочь исправить ситуацию? Не волнуйся. Я заплачу."
"Hm. Gem's a bit small. But it'll work. Okay, I think she's ready for the world! Here. Try it out.": "Хм. Самоцвет немного маленький. Но сойдёт. Ладно, думаю, она готова к миру! Вот. Попробуй."
"Now, I won't be doing the enchantment on these upcoming promotional swords. We have quite a specialist for that task! But I do need to provide special foci. These will be worked into the weapon to strengthen and shape the magic in the weapon. I'm afraid I can accept no substitutes!": "Теперь я не буду накладывать чары на эти предстоящие промоционные мечи. У нас есть настоящий специалист для этой задачи! Но мне нужно предоставить специальные фокусы. Они будут встроены в оружие, чтобы усилить и сформировать магию в нём. Боюсь, я не могу принять замену!"
"This isn't the color of rhino hide I expected. But... we'll see if we can make it work.": "Это не тот цвет шкуры носорога, который я ожидал. Но... посмотрим, сможем ли мы с этим справиться."
"I'm experimenting with colored inks! I have some gems with me, but I didn't bring a gem crusher. Surely those exist on this plane of existence, right? Do you have a spare?": "Я экспериментирую с цветными чернилами! У меня есть несколько драгоценных камней, но я не взял дробилку для камней. Наверняка такие существуют в этом измерении, верно? У тебя случайно есть запасная?"
"Oh, it's large! Well, I guess it's small for you. It's kind of unwieldy for a fairy. But I'll manage! Thank you so much!": "О, он большой! Хотя, наверное, для тебя он маленький. Для феи он довольно громоздкий. Но я справлюсь! Большое спасибо!"
"I'm working on artistically improving a dagger right now, but I need something very special: blue glass. But not any old blue glass. Only the glass from a pair of ratkin goggles will do! I also need several sets of hexapus teeth. I'm afraid this dagger will not be subtle.": "Я сейчас работаю над художественным улучшением кинжала, но мне нужно кое-что очень особенное: синее стекло. Но не просто какое-то синее стекло. Подойдет только стекло из пары очков крысолюдей! Мне также нужно несколько комплектов зубов гекса-паука. Боюсь, этот кинжал не будет незаметным."
"You found the goggles! Oh, I don't need those teeth anymore, I decided on a new direction. But I'll save them for some other project! Here: this is a knife I improved last year. I hope you fight well with it.": "Ты нашёл очки! О, эти зубы мне больше не нужны, я решил сменить направление. Но я сохраню их для другого проекта! Вот: это нож, который я усовершенствовал в прошлом году. Надеюсь, ты хорошо с ним сражаешься."
"Arisetsu despises undeath. As any sane person should! I'm always on the lookout for potential undeath incidents, and I've detected one nearby.\n\nIn Vidaria there's a massive floating rock. Under that rock flow a constant stream of the undead. The soldiers are doing what they can to prevent the undead from swarming, but they could use help.\n\nSeek out the \"Lungers\". They're causing the most harm right now. Oh, and the dark-casting skeletons. Oh and also the fiery ones.": "Арисецу презирает нежить. Как и любой здравомыслящий человек! Я всегда на чеку в поисках возможных случаев нежити и обнаружил один неподалёку.\\n\\nВ Видарии есть огромный парящий камень. Под этим камнем течёт постоянный поток нежити. Солдаты делают всё возможное, чтобы не дать нежити наводнить территорию, но им нужна помощь.\\n\\nИщи «Лангеров». Они сейчас причиняют наибольший вред. Ах да, ещё тёмных скелетов, и огненных тоже."
"Does it seem safer there? I hope so. When undead congregate in large enough numbers, it can be very difficult to stop them.": "Там кажется безопаснее? Надеюсь, да. Когда нежить собирается в достаточно большом количестве, остановить её может быть очень трудно."
"Sie Antry and I have been working to keep the roads safe, but it's a very hard battle. But I foresee a new problem that I'd like to nip in the bud. Can you help?\n\nTo the west of here, near the waterfall, a herd of Gnashers has moved in. And they're breeding! This will be very bad soon. Can you kill off some of the Gnasher Matriarchs before the whole land is overrun?": "Сие Антри и я работаем над тем, чтобы дороги были в безопасности, но это очень трудная борьба. Однако я предвижу новую проблему, которую хотелось бы пресечь в зародыше. Можете помочь?\n\nК западу отсюда, возле водопада, поселилось стадо Гнашеров. И они размножаются! Скоро это станет очень плохим. Можете уничтожить некоторых Матриархов Гнашеров, прежде чем вся земля будет захвачена?"
"Good. Good! You're quite a proficient warrior! Here. Perhaps you will have use of this.": "Хорошо. Хорошо! Ты довольно умелый воин! Вот. Возможно, это тебе пригодится."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>primitive armor stakes</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>примитивные костыли для брони</b>. Ты можешь сделать их для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new primitive armor stakes from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых примитивных колышков для брони."
"Please speak to Tavilak about her previous mates -- the ones she killed. Why did she do it? Is this why she is unwilling to mate with me?": "Поговорите с Тавилаком о её прежних партнёрах — тех, кого она убила. Почему она это сделала? Не из-за этого ли она не хочет спариваться со мной?"
"But I do not want a different mate than Tavilak! Surely there is a resolution to this. She could simply refrain from killing me, for instance... I need to meld with Tavilak and understand her concerns. Could you cover my storefront for a few minutes while I see her? It shouldn't take too long. <i>[New Hangout available.]</i>": "Но я не хочу другой пары вместо Тавилака! Конечно, можно найти решение. Например, она могла бы просто перестать меня убивать... Мне нужно слиться с Тавилаком и понять её переживания. Не мог бы ты присмотреть за моим магазином несколько минут, пока я с ней поговорю? Это не займет много времени. <i>[Доступно новое место для встреч.]</i>"
"Oh, Irkima. Even asking me these questions causes emotional pain. Tell him that I have indeed killed my mate before. I was unable to control my instincts. I will not make the same mistake again. Tell him to find a different mate!": "О, Иркима. Даже задавать мне такие вопросы причиняет душевную боль. Скажи ему, что я действительно убил своего партнёра раньше. Я не смог сдержать свои инстинкты. Я не повторю эту ошибку снова. Пусть найдёт себе другого партнёра!"
"First off: you're on my shit list for keeping me in the dark about all this. I can't believe you would go off and kill that sand rat Tal-Saka without me!\n\nBut all signs do point to Rahu itself being involved. If that were true, there should be proof of it somewhere. The Onkara keep their records up on a hill in Rahu. Unfortunately, going there would be suicide. Even for me. Even for you! So for now, I guess that's where this mystery will stand.": "Во-первых: ты в моём чёрном списке за то, что держал меня в неведении обо всём этом. Не могу поверить, что ты отправился убивать того песчаного крыса Тал-Саку без меня!\\n\\nНо все признаки указывают на то, что сам Раху замешан в этом. Если это так, то где-то должно быть доказательство. Онкара хранят свои записи на холме в Раху. К сожалению, идти туда — это самоубийство. Даже для меня. Даже для тебя! Так что пока, похоже, на этом загадка и останется."
"Well suck my balls and call me Remga, you found actual proof that the Onkara were involved! This is incredible!\n\n... No! It was authorized by Lt. Flakis... and he's dead! He was killed by an orcish terrorist last month. Damn it all!\n\nWell, there must be more to this. I'll head to Rahu soon and see if I can bribe some friendly rakkies until I get answers. You've done more than enough for us. Thank you. You're off my shit-list now. I don't have a lot of coin, but here's some merchandise I've come across.\n\nAnd hey. If you ever need to kill someone 'less than honorably', I can help you out with that. <i>[New Sales options added.]</i>": "Ну, присоси мои яйца и назови меня Ремга, ты нашёл реальные доказательства причастности Онкары! Это невероятно!\\n\\n... Нет! Это было санкционировано лейтенантом Флакисом... а он мёртв! Его убил орочий террорист в прошлом месяце. Чёрт возьми!\\n\\nНу, тут должно быть что-то ещё. Скоро я отправлюсь в Раху и попробую подкупить дружелюбных ракки, чтобы получить ответы. Ты сделал для нас больше, чем достаточно. Спасибо. Ты теперь не в моём списке врагов. У меня мало денег, но вот немного товаров, которые я нашёл.\\n\\nИ, кстати. Если тебе когда-нибудь нужно будет убить кого-то «менее честным способом», я могу помочь с этим. <i>[Добавлены новые варианты продаж.]</i>"
"Young foxes love colorful gems! I could use a selection of nice colors to use as teaching props.": "Молодые лисы обожают яркие драгоценные камни! Мне бы пригодился набор красивых цветов для использования в качестве учебного реквизита."
"You've found a good selection of gems! I hope they aren't valuable... ? Because they'll inevitably be lost all through this cave in a week! But they'll be very useful in the mean time. Thank you!": "Вы нашли хороший выбор драгоценных камней! Надеюсь, они не слишком ценные...? Потому что они неизбежно потеряются в этой пещере через неделю! Но пока они будут очень полезны. Спасибо!"
"Mox is mixing that potion you helped get the stuff for. But Sona caught a whiff of it and says she won't drink it! Stupid girl would rather have a limp all her days than spend a few nights in digestive agony! Well, if she's going to be a child about it, we'll have to treat her like one. And how do you make a child take their medicine? Honey! Lots of it.": "Мокс смешивает то зелье, для которого ты помог достать ингредиенты. Но Сона учуяла его запах и говорит, что не станет его пить! Глупая девчонка предпочла бы всю жизнь хромать, чем провести несколько ночей в пищеварительных муках! Что ж, если она будет вести себя как ребёнок, придётся обращаться с ней соответственно. А как заставить ребёнка принять лекарство? Мёдом! Много мёда."
"Nice, that's a lot of honey! I bet Mox can use this to make the potion drinkable.": "Отлично, это много мёда! Уверен, Мокс сможет использовать его, чтобы сделать зелье пригодным для питья."
"I want to make my mate's favorite cheese for her, but it requires extremely pungent rennet. And, of course, I have nothing to make that with!": "Я хочу приготовить любимый сыр моей спутнице, но для этого нужен чрезвычайно резкий сычужный фермент. И, конечно, у меня нет ничего, чтобы его сделать!"
"This rennet stinks horrifically. I guess that's a compliment! You're amazing!": "Этот сычужный фермент ужасно воняет. Полагаю, это комплимент! Ты потрясающий!"
"If I had some pungent rennet, I could make my favorite cheese again!": "Если бы у меня был острый сычужный фермент, я мог бы снова сделать свой любимый сыр!"
"I had a thought: how relaxed are these ratkin? Sneak into their home areas and kick them! Now, I only need to know about the off-duty ones: do they fight, or flee, or something else? Of course, you can kick whoever you want! But for this test, it has to be the off-duty ones.": "У меня возникла мысль: насколько расслаблены эти крысолюди? Проникни в их жилища и пни их! Теперь мне нужно узнать про тех, кто не на службе: они сражаются, убегают или делают что-то ещё? Конечно, ты можешь пнуть любого! Но для этого теста это должны быть именно отдыхающие."
"So they fought back? Well, damn. That was definitely the likely outcome, but I try to be optimistic! I'll write that down in my notebooks. Thank you.": "Так они дали отпор? Чёрт возьми. Это был, без сомнения, вероятный исход, но я стараюсь быть оптимистом! Запишу это в свои записные книжки. Спасибо."
"Well, I'm convinced you know how to handle yourself! Why don't you do some clean up work for us out in the field? I can pay you from one of the military funds. Win-win, and you'll still be getting better with your skills. Win-win-win!\n\nOf course, I can't compensate you if you die. Be careful out there!": "Ну, я убеждён, что ты умеешь постоять за себя! Почему бы тебе не заняться уборкой на поле боя? Я могу заплатить тебе из одного из военных фондов. Взаимовыгодно, и ты при этом будешь совершенствовать свои навыки. Выигрыш-выигрыш-выигрыш!\\n\\nКонечно, я не смогу тебя компенсировать, если ты умрёшь. Будь осторожен там!"
"Excellent work! Many of our troops out there have focused on fighting demons, and these other crazy beasts prey on their lack of experience. You've saved lives today!": "Отличная работа! Многие наши войска сосредоточились на борьбе с демонами, а эти другие сумасшедшие твари охотятся на их неопытность. Сегодня ты спас жизни!"
"Must take delivery before full moon. Please...": "Доставить до полнолуния. Пожалуйста..."
"Gods, I am so sick of making barrels! It's so hard! And so stupid! <i>Sigh...</i> and I just ran out of quarter hoops. Great. Just great. That means I have to talk that idiot Kalaba into making me some more.": "Боги, как же я устал делать бочки! Это так сложно! И так глупо! <i>Вздох...</i> И у меня только что закончились четвертинные обручи. Отлично. Просто отлично. Значит, мне придётся уговорить этого идиота Калабу сделать мне ещё."
"You got these just for me? Wow. Wow! That was really kind of you. Here, try this. It's my latest batch. Oh and let me give you some coin to cover your expenses.": "Ты достал это специально для меня? Вау. Вау! Это очень мило с твоей стороны. Вот, попробуй это. Это моя последняя партия. О, и позволь дать тебе немного монет, чтобы покрыть твои расходы."
"I have run out of quartz for new jewelry. I would ask Willem, but ... it's complicated. Can you get some for me?": "У меня закончился кварц для новых украшений. Я бы попросил Виллема, но... это сложно. Можешь достать немного для меня?"
"Thank you! Here, this is more valuable! But less useful in jewelry-making.": "Спасибо! Вот, это ценнее! Но менее пригодно для изготовления украшений."
"I was afraid of this. Yes, I know why I'm blacklisted. At the last formal execution, I complimented General Tremal on her tail. General Tremal was born here, unlike the oldest generals. Drawing attention to her tail was an insult and an embarrassment to her.\n\nHm? Oh, no, it wasn't a mistake. General Tremal had given me a backhanded compliment about my clothes, and I was reciprocating. I just didn't realize how far out of my league Tremal is. I'm blacklisted from executions!\n\nI need your help to make amends. I'm going to create the most wondrous gown for the general! I just need to know her favorite color. See if that beggar Three-Eye knows. He's in the dangerous part of town. Once you pass Sergeant Ultaka and are over the bridge, keep left. You'll see him on the porch, most likely.": "Я боялся этого. Да, я знаю, почему меня внесли в чёрный список. На последней официальной казни я сделал комплимент генералу Тремал по поводу её хвоста. Генерал Тремал родилась здесь, в отличие от самых старых генералов. Обращать внимание на её хвост было оскорблением и позором для неё.\\n\\nА? О, нет, это не была ошибка. Генерал Тремал сделала мне косвенный комплимент по поводу моей одежды, и я ответил взаимностью. Просто я не осознавал, насколько далеко Тремал выше меня по статусу. Меня внесли в чёрный список казней!\\n\\nМне нужна твоя помощь, чтобы загладить вину. Я собираюсь создать самое чудесное платье для генерала! Мне просто нужно узнать её любимый цвет. Узнай у нищего Трёхглазого. Он в опасной части города. Пройдя сержанта Ультаку и перейдя мост, держись левее. Скорее всего, увидишь его на веранде."
"General Tremal's favorite color is aquamarine? Well, I don't have that, but I do have some cyan... oh. She hates cyan? Well, that's awkward. But you've performed admirably. Good show.": "Любимый цвет генерала Тремала — аквамарин? У меня его нет, но есть немного циана... о. Она ненавидит циан? Ну, неловко. Но ты справился отлично. Молодец."
"Well hello! Yes, I know all about General Tremal. I've heard many things. What? Tremal's favorite color? Shirogin can't be serious! <i>Everyone</i> knows that General Tremal's favorite color is aquamarine! Not cyan, she HATES cyan. It has to be exactly aquamarine. Tell Shirogin I'll come collect my fee for this valuable insight later.": "Ну здравствуй! Да, я многое знаю о генерале Тремале. Я слышал много разных вещей. Что? Любимый цвет Тремала? Широгин не может быть серьёзным! <i>Все</i> знают, что любимый цвет генерала Тремала — аквамарин! Не циан, она НЕНАВИДИТ циан. Это должен быть именно аквамарин. Скажи Широгину, что я позже приду за своей платой за это ценное знание."
"Oh, drat it, now I'm out of rabbit's feet! I'll have to import some more... unless you happen to know where to get some?": "Ох, черт возьми, у меня закончились кроличьи лапки! Придется заказать ещё... если только ты не знаешь, где их достать?"
"Wow, you found rabbit's feet! You're quite resourceful. Here, perhaps this will further improve your resourcefulness.": "Вау, ты нашёл кроличьи лапки! Ты очень находчив. Вот, возможно, это ещё больше повысит твою находчивость."
"Most of the deer around here are healthy, but a number are rabid. Do me a favor and take care of that problem, would you?": "Большинство оленей здесь здоровы, но есть несколько бешеных. Сделай одолжение и позаботься об этой проблеме, хорошо?"
"Excellent work. The fewer rabid deer, the less we have to worry about it spreading to other creatures. ": "Отличная работа. Чем меньше бешеных оленей, тем меньше нам нужно беспокоиться о распространении болезни на других существ."
"You completed the Moat Circuit!": "Вы завершили круг по рву!"
"You completed the Moat Circuit with excellent time!": "Вы прошли Кольцо Рва с отличным временем!"
"You completed the Eltibule Circuit!": "Вы завершили круг Элтибуль!"
"You completed the Eltibule Circuit with excellent time!": "Вы прошли круг Элтибуль с отличным временем!"
"You completed the Amulna Grand Tour!": "Вы завершили Большой тур по Амульне!"
"You completed the Amulna Grand Tour with excellent time!": "Вы завершили Большой тур Амулны с отличным временем!"
"You completed the Kur Mountain Derby!": "Вы завершили Курскую горную гонку!"
"You completed the Kur Mountain Derby with excellent time!": "Вы завершили Курскую горную дерби с отличным временем!"
"Durstin behind the bar is good for a scrambled egg or a bit of fried bread, but he's just not willing to broaden his horizons! And yet right down the road is a rare delicacy: ranalan-style pickled fish! Get some for me. I'll convince him to try them some evening, and he'll finally see what he's been missing.\n\nLook for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!": "Дёрстин за барной стойкой хорош для яичницы-болтуньи или немного жареного хлеба, но он просто не хочет расширять свои горизонты! А ведь совсем рядом есть редкое лакомство: рыба, маринованная в стиле раналан! Принеси мне немного. Я уговорю его попробовать её как-нибудь вечером, и он наконец поймёт, чего ему не хватало.\\n\\nИщи раналанов вокруг большого озера. Они любят оставлять банки с маринадом возле своих хижин. И не волнуйся — они на самом деле не умные, просто так кажутся. Я всё об этом прочитал в бардовском колледже дома, в Вертe!"
"Perfect. Now I'll wait for him to be good and drunk, so he won't remember the taste. You see, the first time you eat these, they're disgusting. But the <i>second</i> time, they're only moderately disgusting, and by the eighth time... wait. Wait! I just realized that these are actually an acquired taste, and it's not really a taste worth acquiring. Oh well, it's too late for me: I love 'em! I'll just eat these myself. Here, for your labor!": "Отлично. Теперь я подожду, пока он хорошенько напьётся, чтобы он не запомнил вкус. Видишь ли, в первый раз, когда ты ешь это, это отвратительно. Но <i>во второй</i> раз это уже лишь умеренно отвратительно, а к восьмому разу... погоди. Погоди! Я только что понял, что это на самом деле приобретённый вкус, и это не тот вкус, который стоит приобретать. Ну да ладно, для меня уже поздно: я их люблю! Я просто съем их сам. Вот, за твой труд!"
"Hmm, fetch me some of the boletus mushrooms. Oh, and can you chop them for me? I'm more of a mage than a laborer, you understand... then bring me the boletus flakes.": "Хмм, принеси мне немного грибов болетус. О, и можешь их порезать для меня? Я больше маг, чем работник, понимаешь... а потом принеси мне хлопья из болетуса."
"Well flaked! You could have been a food-preparer! Instead of... what, an assassin, I guess. But I'm happy you're an assassin. So let's move on. Here's your reward and I'll have a new scheme for you momentarily.": "Ну и ляпсус! Ты мог бы быть поваром! Вместо... ну, наверное, убийцей. Но я рад, что ты убийца. Так что двигаемся дальше. Вот твоя награда, а скоро у меня будет для тебя новый план."
"Flaked mushrooms, just as I asked!": "Хлопья из грибов, как я и просил!"
"Steal lungfish from the pools throughout the den. I have a scheme in mind for them!": "Украдите легочных рыб из прудов по всему логову. У меня есть для них задумка!"
"These lungfish are native to our homeland of Fosulf, and the den guards them well because they hold a precious secret: the oil in these fish has regenerative properties! Also they're delicious.\n\nI'm going to sneak these fish into the lake outside. And then... hm... I'm not exactly sure how destroying the local fish ecosystem helps our cause, but since the den doesn't want that to happen, I do want it to happen!\n\nAnd here's your reward.": "Эти легочные рыбы родом из нашей родины Фозульфа, и логово хорошо их охраняет, потому что они хранят драгоценный секрет: масло в этих рыбах обладает регенеративными свойствами! К тому же они очень вкусные.\\n\\nЯ собираюсь тайком выпустить этих рыб в озеро снаружи. А потом... хм... я точно не уверен, как уничтожение местной рыбной экосистемы поможет нашему делу, но раз логово не хочет, чтобы это произошло, значит, я хочу, чтобы это случилось!\\n\\nА вот и твоя награда."
"Fishy.": "Подозрительно."
"There's food plants everywhere in here -- look for some watercress, and bring it to me. I need a lot of it; I have an idea.": "Здесь повсюду растут съедобные растения — найди немного водяного крессa и принеси мне. Мне его нужно много; у меня есть идея."
"Thank you. I'm going to try soaking this watercress in something vile and see what happens when ranalons eat it. I think I'm getting the hang of this 'being an evil fiend' thing, huh? Here: this is your reward. Now give me a few minutes to work.": "Спасибо. Я собираюсь замочить этот водяной крес в чем-то отвратительном и посмотреть, что произойдет, когда раналаны его съедят. Кажется, я начинаю разбираться в этом деле «быть злым злодеем», да? Вот: это твоя награда. А теперь дай мне несколько минут поработать."
"Nice, fresh watercress. Good.": "Хороший, свежий кресс-салат. Отлично."
"The least-competent farmers are sent topside to farm the lakes up there, but farmers who can cast a few spells are kept down here in safety. They're a crucial part of the den's food supply. Which means they're precious... which means you should kill them! Go!": "Самых неумелых фермеров отправляют наверх обрабатывать озёра, а фермеров, умеющих колдовать, держат здесь, в безопасности. Они — важная часть продовольственного запаса логова. Значит, они ценны... значит, их нужно убить! Вперёд!"
"Good work! While the topside farmers grow the bulk of our food, the farm-casters are responsible for the delicate plants that make food delicious. Now the den will have to survive on bland, boring food... they'll be demoralized for sure! Here's your reward.": "Отличная работа! Пока фермеры на поверхности выращивают основную часть нашей еды, заклинатели фермы отвечают за нежные растения, которые делают еду вкусной. Теперь логову придётся выживать на пресной и скучной пище... они точно будут деморализованы! Вот твоя награда."
"Deep in the farming area are a bunch of Guardians. You know, the thuggish-looking ones? Glowball on their head? Yeah. The ones in this den are pretty dumb, but they're mean in a fight. If you kill them, it'll demoralize everyone. And that's good.": "Глубоко в сельскохозяйственной зоне находится куча Стражей. Знаешь, те, что выглядят как бандиты? С светящимся шаром на голове? Да. Те, что в этом логове, довольно глупы, но в бою они злобные. Если ты их убьёшь, это деморализует всех. И это хорошо."
"You killed the guardians, just like that?! Wow. ... even I'm demoralized, so I'm sure the rest of the den will be too. Good work!": "Ты убил стражей, просто так?! Вау. ...даже я деморализован, так что уверен, что и остальная часть логова тоже. Отличная работа!"
"Head into the legling training area and find the area where gardeners practice their craft -- it's one of the first areas you'll come across in there. Kill everyone there.": "Отправляйся в тренировочную зону леглингов и найди место, где садовники оттачивают своё мастерство — это одна из первых зон, с которой ты столкнёшься там. Убей всех там."
"Good! Those gardeners were almost ready to take their job to the surface. There are more gardeners, but now the den will have to spend more resources protecting them, keeping them safe. It's a step. Here: this is your reward.": "Отлично! Эти садовники были почти готовы выйти на поверхность. Садовников ещё больше, но теперь логово придётся тратить больше ресурсов на их защиту и безопасность. Это шаг вперёд. Вот твоя награда."
"Deep in the legling training area is the mage training section. Right now they're mostly doing stone-shaping, so look for the poorly-worked stones. You definitely want to take these mages out before they fully master their abilities!": "Глубоко в тренировочной зоне леглингов находится секция обучения магов. Сейчас они в основном занимаются камнетесным делом, так что ищите плохо обработанные камни. Вам определённо нужно уничтожить этих магов, прежде чем они полностью овладеют своими способностями!"
"You killed legling mages. At my request. I guess it's really sinking in how evil I've become. I... need a minute. Here, take this and let me think about what I've done.": "Ты убил леглингов-магів. По моей просьбе. Похоже, я действительно осознаю, насколько я стал злым. Мне... нужна минута. Вот, возьми это и дай мне обдумать то, что я сделал."
"Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. They're born knowing how to fight, but they need to build up their muscle mass and train their coordination. So now is the time to strike, while they're weak!": "Отправляйся в тренировочную зону леглингов. Пройди мимо участка для практики садоводства. Когда тропа разветвится, поверни налево, чтобы найти дубинщиков. Они рождаются с умением сражаться, но им нужно нарастить мышечную массу и тренировать координацию. Так что сейчас самое время нанести удар, пока они слабы!"
"Impressive. I knew I picked the right team! More eggs hatch every day, but it will take time before new ones are ready to take to the surface.": "Впечатляет. Я знал, что выбрал правильную команду! Каждый день вылупляется всё больше яиц, но потребуется время, прежде чем новые будут готовы подняться на поверхность."
"Some of the most talented stone-shapers in the whole den are back working with the leglings today. Strike now! The mage supervisors are deep in the legling wing. Go past the legling gardeners, then keep right at the fork.": "Некоторые из самых талантливых камнетесов всего логова сегодня снова работают с леглингами. Действуй сейчас! Маги-наставники находятся глубоко в крыле леглингов. Пройди мимо садовников леглингов, затем держись правее на развилке."
"With fewer expert stone-shapers on our front lines, the goblins may finally be able to overrun the den! And that will mean a swift death for me. Hmm. I kind of hate what I've become, so maybe that's not a big deal. Anyway, here's your reward.": "С уменьшением числа опытных камнетёсов на наших передовых позициях, гоблины, возможно, наконец смогут захватить логово! А это будет означать быструю смерть для меня. Хм. Мне не нравится то, кем я стал, так что, может, это и не так уж важно. В любом случае, вот твоя награда."
"You need to focus on the adults that oversee the leglings! Strike them down to weaken the den. Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. A few adults are there. Strike them down!": "Тебе нужно сосредоточиться на взрослых, которые присматривают за леглингами! Убей их, чтобы ослабить логово. Отправляйся в тренировочную зону леглингов. Пройди мимо зоны практики садоводства. Когда тропа разветвится, сверни налево, чтобы найти дубинщиков. Там несколько взрослых. Убей их!"
"You killed the supervisors? Did you kill Girrrna? I hate her so much, she's so mean! Well, even if you didn't find her, you killed her close friends, and that's something...\n\n... you know, sometimes I have weird regretful feelings about the things I ask you to do. But I'm four years old! Surely my moral compass is fully formed. So I need to put my qualms aside and press on with this genocide. This depressing, depressing genocide.": "Ты убил надсмотрщиков? Ты убил Гирррну? Я её так ненавижу, она такая злая! Ну, даже если ты её не нашёл, ты убил её близких друзей, а это уже кое-что...\n\n...знаешь, иногда у меня возникают странные чувства сожаления из-за того, что я прошу тебя делать. Но мне всего четыре года! Наверняка мой моральный компас уже полностью сформирован. Так что мне нужно отложить сомнения и продолжать эту резню. Эту удручающую, удручающую резню."
"Why don't you assassinate the ranalon that are off duty? They'll be in the lounge and resting areas. And they definitely won't be expecting you!": "Почему бы тебе не устранить Раналонов, которые не на дежурстве? Они будут в гостиной и зонах отдыха. И они точно не будут тебя ожидать!"
"Did you manage to kill them in their sleep? No? Oh. I'd kind of hoped... well, anyway, good job. Here's your reward!": "Удалось ли тебе убить их во сне? Нет? Ох. Я немного надеялся... ну, в любом случае, хорошая работа. Вот твоя награда!"
"Take out the scray resting in pools around the den. Those scray are precious to our front-line assault against the goblins! You can find them in any pool in the den... oh, except the pools in the legling area, I suppose.": "Уничтожьте скрея, отдыхающего в лужах вокруг логова. Эти скреи очень важны для нашего передового наступления против гоблинов! Вы можете найти их в любой луже в логове... ну, кроме луж в районе ноглингов, полагаю."
"I sort of hate having to see the scray die. They're good pets. They don't really understand... no, stop! No time for sentiment! We have murders to scheme! Here's your reward. Let me figure out the next scheme -- give me a minute.": "Мне как-то неприятно видеть, как умирает скрей. Они хорошие питомцы. Они не совсем понимают... Нет, хватит! Нет времени на сентиментальность! Нам нужно строить планы убийств! Вот твоя награда. Дай мне минуту, чтобы придумать следующий план."
"Look around for some bottles of Errrgorabog. The moistening cream? Almost everyone down here uses it, so I'm sure you can find some easily enough. I need a bunch of it.": "Поищи несколько бутылочек Эрргоробога. Увлажняющий крем? Почти все здесь его используют, так что ты наверняка легко найдёшь немного. Мне нужно много этого."
"Thanks. Actually these aren't part of a scheme: I'm keeping them. Somebody keeps stealing mine as a cruel prank, and my skin is getting all dry. Here's your reward!": "Спасибо. На самом деле это не часть плана: я оставляю их себе. Кто-то постоянно ворует мои, чтобы подшутить надо мной, и у меня кожа становится сухой. Вот твоя награда!"
"Have you seen the emergency moisturizing shells? They're super ugly, right? That's all Gulllia's fault, she thinks they look... anyway, it doesn't matter! When a ranalon gets super dried out, they use the healing water in those shells to stay moist. And you are going to poison that water. Here's the poison. Go!": "Ты видел экстренные увлажняющие раковины? Они очень уродливые, правда? Во всём виновата Гуллия, она считает, что они выглядят... в общем, не важно! Когда раналон сильно высыхает, он использует целительную воду из этих раковин, чтобы оставаться влажным. А тебе нужно отравить эту воду. Вот яд. Вперёд!"
"Perfect. Now watch for itchy ranalons. They'll be extra distracted while you murder them.": "Отлично. Теперь следи за зудящими раналонами. Они будут особенно рассеяны, пока ты их убиваешь."
"Another mission already? Um... just go kill some ranalons! Whichever. Bring me some of their tacky jewelry to prove you've done your job.": "Уже новое задание? Эм... просто убей несколько раналонов! Любых. Принеси мне их безвкусные украшения в доказательство, что ты выполнил работу."
"Wow. You are really good at killing ranalons. Terrifyingly good. Have you considered killing goblins instead? ... No, gotta stay on focus! We're 'slaying the ranalon menace'!": "Вау. Ты действительно хорошо умеешь убивать раналонов. Ужасающая сноровка. Ты не думал заняться убийством гоблинов? ... Нет, нужно сосредоточиться! Мы «уничтожаем угрозу раналонов»!"
"I used to get really thirsty -- and because of my size, I had to drink a TON of nectar each day. But recently I've outgrown the need for sustenance by realizing that my physical form is illusory and my existence is meaningless. Saves me a lot of hassle!\n\nBut there's a problem. I used to stash pots of fairy nectar all over the place in case I got thirsty while travelling. But since I stopped drinking the stuff, it's gone bad! And there are real insects in the caves out there. I'm afraid someone's going to drink that nectar and die!\n\nCan you find the nectar bottles and dump them out for me? Thanks, pal.": "Раньше я очень часто испытывал жажду — и из-за своего размера мне приходилось пить ОГРОМНОЕ количество нектара каждый день. Но недавно я перестал нуждаться в пище, осознав, что моя физическая форма иллюзорна, а моё существование бессмысленно. Это избавило меня от множества хлопот!\n\nНо есть проблема. Раньше я прятал горшочки с феерическим нектаром повсюду, на случай, если захочу пить в пути. Но с тех пор, как я перестал его пить, он испортился! А в пещерах полно настоящих насекомых. Боюсь, кто-то выпьет этот нектар и умрёт!\n\nМожешь найти бутылки с нектаром и вылить их для меня? Спасибо, друг."
"You dumped all the nectar out? That's a relief! I may not really exist, but that doesn't mean I'd will non-existence on others! You know? Anyway, thanks, bud!": "Ты вылил весь нектар? Вот это облегчение! Я, может, и не существую на самом деле, но это не значит, что я желаю небытия другим! Понимаешь? В любом случае, спасибо, дружище!"
"I like to keep a handful of stock ingredients on hand, and I am almost out of giant rat tails. Fortunately the sewer beneath our feet is teeming with them! I will pay a very reasonable sum if you bring me some. Oh, they needn't be from the Rahu sewers. Any rat tails will do.": "Мне нравится держать под рукой запас основных ингредиентов, и у меня почти закончились гигантские крысиные хвосты. К счастью, канализация под нашими ногами полна ими! Я заплачу очень разумную сумму, если ты принесёшь мне несколько. О, они не обязательно должны быть из канализации Раху. Подойдут любые крысиные хвосты."
"Oh yes, the rat tails I wanted. Very good, very good.": "О да, хвосты крыс, которые я хотел. Очень хорошо, очень хорошо."
"During my lifetime, I have invented but a single category of shamanic infusion. All the others came to me in the egg, but my rat-totem belts are unique! I wish to prepare more of my belts for the new hatchlings, but I need totemic parts. Can you get rat teeth for me?": "За свою жизнь я изобрёл лишь одну категорию шаманских настоек. Все остальные пришли ко мне в яйце, но мои пояса с тотемом крысы уникальны! Я хочу приготовить больше поясов для новых выводков, но мне нужны тотемные части. Ты можешь достать для меня крысиные зубы?"
"This clump of bloody teeth will do well. You are resourceful! And so am I! Look what I found at the bottom of the lake. It is a gift for you.": "Этот комок окровавленных зубов подойдёт отлично. Ты находчив! И я тоже! Посмотри, что я нашёл на дне озера. Это подарок для тебя."
"I wonder where these ratkin are getting their appetizers. Can you get some for me so I can check them?": "Интересно, откуда эти крысолюди берут свои закуски. Можешь добыть немного для меня, чтобы я мог их проверить?"
"Oh, finally! The appetizers!\n\nWell, the stench is pretty typical. But see how thick it is? That means it's not very fresh. These ratkin aren't making their own aparatifs... which means they must be trading with other ratkin... which means there's a tunnel-caravan that passes by here!\n\nThat explains how they're staying well-stocked. Now, if I knew exactly which caravan route we were on, maybe I could isolate cultural variations from that! Oh, sorry to keep you wating. Here's your shiny.": "О, наконец-то! Закуски!\\n\\nНу, вонь довольно типичная. Но видишь, какая густая? Это значит, что они не очень свежие. Эти крысолюди не делают свои собственные аперитивы... значит, они должны торговать с другими крысолюдьми... значит, здесь проходит караванный туннель!\\n\\nВот почему у них всегда есть запасы. Если бы я точно знал, по какому маршруту идёт караван, возможно, смог бы выделить культурные особенности! Ой, извини, что заставил тебя ждать. Вот твоя награда."
"Ratkin love to gamble, of course, but each region's ratkin have different methods. The ones around here seem to enjoy dice games. I need samples of their dice!\n\nI suppose any ratkin could be carrying some dice, but off-duty ratkin are most likely to have 'em.": "Крысолюди, конечно, любят азартные игры, но у крысолюдей из разных регионов свои методы. Те, что здесь, похоже, предпочитают игры в кости. Мне нужны образцы их костей!\n\nПолагаю, у любого крысолюда могут быть кости, но у отдыхающих крысолюдей их скорее всего будет."
"These are the dice? Oh well. This is pretty typical ratkin garbage. But I'll keep them... I have some new game ideas I wanted to prototype! Here's a shiny for your trouble.": "Это кости? Ну что ж. Это довольно типичный мусор крысиных. Но я оставлю их... У меня есть несколько новых идей для игр, которые я хотел опробовать! Вот блестяшка за твои труды."
"Ratkin often farm snails for meat and shells, but the ones down here are huge! They must be mutants! Go stab some to death and see if they explode into glowing goo.": "Крысолюди часто разводят улиток ради мяса и раковин, но эти здесь огромные! Должно быть, они мутанты! Иди и проткни несколько насмерть, чтобы увидеть, взрываются ли они светящейся слизью."
"So NONE of the snails exploded into glowing goo? Are you sure you did it right? Hmm... maybe they're undead snails! No, not even the ratkin would eat undead meat... well, I have no idea why the snails are so big. But I suppose that's only partially your fault, so here is your shiny reward.": "Так НИКАКАЯ из улиток не взорвалась в светящуюся слизь? Ты уверен, что всё сделал правильно? Хм... может, это неживые улитки! Нет, даже крысолюди не стали бы есть неживое мясо... ну, я не знаю, почему улитки такие большие. Но, полагаю, это лишь отчасти твоя вина, так что вот твоя блестящая награда."
"Rattus root is a favorite snack of these barbaric vermin. I'm sure to a mutant like you it just looks like a root, right? But to a gobthropologist, it's like an open book! A book of secrets! So go get me my secret books! I mean rattus roots!": "Корень крысы — любимая закуска этих варварских тварей. Я уверен, для мутанта вроде тебя это просто корень, да? Но для гобтрополога это как открытая книга! Книга тайн! Так что принеси мне мои тайные книги! То есть корни крысы!"
"Ugh. These aren't fresh at all! Which means they aren't growing crops down here after all, these must be bartered from caravans. Unfortunately I can't learn much from roots that are this old!\n\nHm, how do I explain the problem to a monster like you? They're like books of knowledge, but the books have gotten wet, and ... wait, do you know what a book is? Oh, nevermind! You did fine, here's your shiny.": "Фу. Они совсем не свежие! Значит, здесь всё-таки не выращивают урожай, их, должно быть, меняют на караваны. К сожалению, я не могу многому научиться по таким старым корням!\\n\\nХм, как объяснить проблему такому монстру, как ты? Они как книги знаний, но книги промокли, и... подожди, ты знаешь, что такое книга? Ой, неважно! Ты справился, вот твоя награда."
"You're finally here! We have a panther problem. An orcish ship came in the night and unloaded hundreds of war panthers! They must be planning a war or something. But who cares about that! They let their panthers hunt freely all through yeti territory, which is also where most of the surviving fox dens are!\n\nThey're getting really close to this outpost, too. I saw one watching me from across the river earlier! I've programmed the turrets to target the panthers... but I don't know if they'll be enough. If Mittens and I are dead when you get back, please avenge us!": "Ты наконец здесь! У нас проблема с пантерами. Орочий корабль приплыл ночью и выгрузил сотни боевых пантер! Похоже, они планируют войну или что-то в этом роде. Но кому это интересно! Они выпускают своих пантер охотиться свободно по всей территории йети, а там же находятся большинство выживших лисьих логов!\\n\\nОни уже очень близко к этому форпосту. Раньше я видел одну, которая наблюдала за мной с другого берега реки! Я запрограммировал турели на поражение пантер... но не знаю, хватит ли их. Если со мной и Миттенсом что-то случится к твоему возвращению, пожалуйста, отомсти за нас!"
"Oh, thanks. Sorry I was freaking out earlier. It turns out the turrets can handle the panthers just fine! Yeah, a panther came too close, got zapped, and just ran away. So Mittens and I weren't in any immediate danger. But other foxes still were, so thank you for helping us!": "О, спасибо. Извини, что раньше так паниковал. Оказалось, турели отлично справляются с пантерами! Да, одна пантера подошла слишком близко, её ударило током, и она просто убежала. Так что мы с Миттенсом не были в непосредственной опасности. Но другие лисы всё ещё были в опасности, так что спасибо, что помог нам!"
"You've awakened in a strange place and you don't remember anything. You get the feeling this has happened to you before... but maybe not as badly as this.\n\nA fairy woman standing nearby waves and flutters more quickly when she sees you. Maybe she can help you.": "Вы очнулись в странном месте и ничего не помните. У вас есть ощущение, что это уже случалось с вами раньше... но, возможно, не так сильно, как сейчас.\n\nРядом стоит фея, которая машет и порхает быстрее, когда видит вас. Возможно, она сможет помочь."
"I f-f-filled up my a-a-alchemy journal. My hoof-w-writing is s-so l-l-large! C-can you get m-me some m-more b-blank books? I th-think Preta the f-fairy sells s-s-some.": "Я з-з-заполнил свой ж-ж-журнал алхимии. Мой к-к-копытный почерк т-т-слишком крупный! М-м-можешь принести м-м-не ещё п-п-пустых книг? Я д-д-думаю, Прета, ф-фея, продаёт н-н-немного."
"Th-thank y-y-you! D-do y-you d-d-do ... do y-you... <i>Daisy sighs.</i> H-here.": "С-с-спа-си-бо! Т-ты д-да-даёшь... д-даёшь... <i>Дейзи вздыхает.</i> В-вот."
"I need new catgut for my lute strings! Most catgut is made from sheep intestine, but I'm an artist, not some slob. I need actual cat gut! You're a lover of the arts, right? Don't do this for me. Do this for art. Find a tiger out there, kill it, and use your butcher knife to scoop up the guts. You do have a butcher knife, right? Because I don't! But I'm sure Fainor in Serbule town would...": "Мне нужна новая кишка для струн моей лютни! Большинство кишок делают из овечьего кишечника, но я художник, а не какой-то бездельник. Мне нужна настоящая тигриная кишка! Ты же любитель искусства, верно? Делай это не ради меня. Делай это ради искусства. Найди тигра там, убей его и используй свой мясницкий нож, чтобы вычистить внутренности. У тебя ведь есть мясницкий нож, правда? Потому что у меня нет! Но я уверен, что Файнор в городе Сербуль..."
"Oh gods they stink so bad! Augh! You didn't clean them?! No, no, it's fine. I'll have Lana do it for me. And here: I was going to give this to you. It's made of a goat's horn! Impressive, isn't it? I made it myself.": "О боги, они так ужасно воняют! Ах! Ты их не почистил?! Нет-нет, ничего страшного. Я попрошу Лану сделать это за меня. И вот: я собирался дать это тебе. Оно сделано из козьего рога! Впечатляет, правда? Я сделал это сам."
"Khyrulek's journal is almost correct, but her calculations are outdated due to planar shift. They must be recalibrated by a... teleportation sage.\n\nThere was such a sage in Statehelm years ago named Elmetaph, but my spies say he lives now in a lighthouse on a desolate island.\n\nSeek out this Elmetaph and force him to fix these calculations.": "Журнал Хирулека почти точен, но её расчёты устарели из-за планарного сдвига. Их нужно перекалибровать у... мудреца телепортации.\n\nНесколько лет назад в Стейтхелме был такой мудрец по имени Элметаф, но мои шпионы говорят, что теперь он живёт в маяке на заброшенном острове.\n\nНайди этого Элметафа и заставь его исправить эти расчёты."
"You found Elmetaph? I am impressed! And I am not easily impressed.\n\nHe said it was cursed? Ah, of course! The old coordinate mis-reading curse. We can break it. Next, you must bring me hexapus lips and ... wait, you already got the uncursing ingredients? That's almost <i>too</i> helpful. Do not overstep your place, bloodling! But let me work.\n\nYes: yes, The curse is lifted. I have the coordinates! Finally! Are you ready for the next step?": "Вы нашли Элметафа? Я впечатлён! А меня не так просто впечатлить.\\n\\nОн сказал, что это проклято? Ах, конечно! Старое проклятие неправильного считывания координат. Мы можем его снять. Далее ты должен принести мне губы гекса-пауса и... подожди, ты уже получил ингредиенты для снятия проклятия? Это почти <i>слишком</i> полезно. Не переходи свою черту, кровавый! Но позволь мне поработать.\\n\\nДа: да, проклятие снято. У меня есть координаты! Наконец! Ты готов к следующему шагу?"
"Oh, hello again! Wait... You've changed. I'm so sorry. You've succumbed to darkness! ... \n\nWhat? Your master wants my help? Well, I love a puzzle, give me the notes. ... Yes, I can realign these coordinates. You probably could have done it yourself, in fact, if you'd happened to recognize this numbering system. It's made by a deceased species of lizard men who had 8 fingers instead of 10. Such a simple biological difference resulted in an entirely different numbering system, which we sages often find useful for coordinate magic...\n\nHm? Oh, my apologies for rambling. Here, I've brought the locations up to date. But the book is still cursed -- you did know about the curse, right? No? Well, that would have been awkward! The curse tricks you into misreading the coordinates. You would have died! Haha! No matter, no matter, you can uncurse it. Or your master can, at least. The ingredients are a bit exotic... let me write them down for you. There! Bring those to your master and you'll no doubt be bloodling of the week! Goodbye.": "О, снова здравствуй! Подожди... Ты изменился. Мне очень жаль. Ты поддался тьме! ... \\n\\nЧто? Твой хозяин хочет моей помощи? Ну, я люблю загадки, дай мне заметки. ... Да, я могу перенастроить эти координаты. На самом деле, ты, вероятно, мог бы сделать это сам, если бы узнал эту систему счисления. Её создал вымерший вид ящеролюдей, у которых было 8 пальцев вместо 10. Такое простое биологическое отличие привело к совершенно другой системе счисления, которую мы, мудрецы, часто используем для магии координат...\\n\\nЧто? О, прошу прощения за болтовню. Вот, я обновил местоположения. Но книга всё ещё проклята — ты ведь знал о проклятии, да? Нет? Ну, это было бы неловко! Проклятие заставляет тебя неправильно читать координаты. Ты бы погиб! Ха-ха! Неважно, неважно, ты можешь снять проклятие. Или твой хозяин сможет, по крайней мере. Ингредиенты довольно экзотические... позволь записать их для тебя. Вот! Принеси их своему хозяину, и ты наверняка станешь кровососом недели! Прощай."
"Man, this one's too hard: Daisy says I have to find her some evil grass. Like, grass with bad moral character? I didn't know grass could even think! It's too confusing for me.": "Чёрт, этот слишком сложный: Дейзи говорит, что я должен найти ей злую траву. Типа, траву с плохим нравом? Я и не знал, что трава вообще может думать! Для меня это слишком запутанно."
"That's evil grass? <i>Jumper tastes some.</i> Aw! Gross! That tastes like meat, not grass! Oh, I guess that's why it's evil? Nice! I learned something!\n\nHere, this is my favorite kind of bounceweed. Let's hope Daisy can make some even better stuff now!": "Это злой травы? <i>Джампер пробует немного.</i> Фу! Отвратительно! На вкус как мясо, а не трава! А, наверное, поэтому она злая? Класс! Я кое-что узнал!\\n\\nВот, это мой любимый вид прыгучей травы. Надеюсь, Дейзи сможет сделать что-то ещё лучше!"
"When I left the mining camp, I did so in a hurry. Rock-Wrecker and I got into... let's just say, we did not see eye-to-eye. At any rate, I left behind some valuable notes on a new mining device I was working on. I would hate for them to pick up the design where I left off, and use it for their nefarious goals. If you happen upon their camp, could you retrieve my notes while you're there? I wouldn't be surprised if Rock-Wrecker seized them for himself already.": "Когда я покидал шахтерский лагерь, я делал это в спешке. Я и Разрушитель Камней... скажем так, мы не сошлись во взглядах. В любом случае, я оставил там ценные записи о новом горнодобывающем устройстве, над которым работал. Мне бы не хотелось, чтобы они продолжили работу над моим проектом и использовали его в своих зловещих целях. Если ты окажешься в их лагере, не мог бы забрать мои записи? Я бы не удивился, если Разрушитель Камней уже забрал их себе."
"My notes! You found them! This is wonderful news.\n\nAh, it looks like one of the other engineers picked up where I left off, which is what I feared. I hope they didn't- hm, wait a minute. Oh, they swapped the gear ratios, and moved the crystal to there.. that just might work!": "Мои записи! Ты их нашёл! Это замечательная новость.\\n\\nАга, похоже, один из других инженеров продолжил с того места, где я остановился, чего я и боялся. Надеюсь, они не... Хм, подожди минуту. О, они поменяли передаточные числа и перенесли кристалл туда... это может сработать!"
"Some of my fly amanita has spread beyond my locus of control. They are mine and I desire to have them.": "Некоторые из моих мухоморов распространились за пределы моей зоны контроля. Они мои, и я хочу их вернуть."
"These are not my lost fly amanita! But they will be useful nonetheless. ": "Это не мои потерянные мухоморы! Но они всё равно будут полезны."
"You found what? You mean they weren't torn completely to shreds? That's great! They were supposed to collect something for me. The next time you're in there, look for a sack that they had and grab it for me. ": "Ты что нашёл? Ты хочешь сказать, что их не разорвали полностью на куски? Это отлично! Они должны были собрать для меня кое-что. В следующий раз, когда будешь там, поищи мешок, который у них был, и забери его для меня."
"You found it! How? It doesn't matter, give it here.\n\n<i>[She grabs the bag from you and opens it up. After digging through it for a while, she looks disappointed.]</i>\n\nThey couldn't even finish one simple task. Whatever. Here, I don't need this.": "Вы нашли это! Как? Неважно, дай сюда.\\n\\n<i>[Она хватает у вас сумку и открывает её. Порывшись внутри некоторое время, она выглядит разочарованной.]</i>\\n\\nОни даже не смогли выполнить одну простую задачу. Да ладно. Вот, мне это не нужно."
"Here's the story I was told: a traveler had stopped at the old inn in Vidaria. It's mostly abandoned, but it's still got a sturdy roof, and it was raining. While it rained, he cooked an incredible piece of beef on the stove.\n\nJust as he was adding some unusual herbs he'd found, a bolt of lightning struck the chimney! The traveler avoided harm, but the piece of steak was blasted and blackened. And then... he says the steak got up and tried to kill him, so he ran out into the night rain.\n\nI hadn't put too much faith in his story, but we should see if it's true.\n\nGo to the inn in Vidaria and recreate the same situation by burning some high-quality beef. I'll give you precise instructions.\n\nOh and be prepared to defend yourself.": "Вот историю, которую мне рассказали: путешественник остановился в старой таверне в Видарии. Она в основном заброшена, но крыша всё ещё крепкая, и шёл дождь. Пока шёл дождь, он приготовил на плите невероятный кусок говядины.\\n\\nКак раз когда он добавлял необычные травы, которые нашёл, в трубу ударила молния! Путешественник избежал вреда, но кусок стейка был обожжён и почернел. А потом... он говорит, что стейк ожил и попытался его убить, поэтому он убежал в ночной дождь.\\n\\nЯ не слишком верил его истории, но нам стоит проверить, правда ли это.\\n\\nОтправляйся в таверну в Видарии и воспроизведи ту же ситуацию, поджарив кусок высококачественной говядины. Я дам тебе точные инструкции.\\n\\nИ будь готов защититься."
"And then slabs of meat jumped out at you? It's as I feared.\n\nI heard a third anecdote recently. I probably should have led with this one. It's a complicated story, so stop by to see me tonight and I'll explain.\n\n</i>[New Hang Out Available.]</i>": "А потом на тебя прыгнули куски мяса? Именно так, как я и боялся.\\n\\nНедавно я услышал третью историю. Наверное, следовало начать с неё. Это сложная история, так что загляни ко мне сегодня вечером, и я всё объясню.\\n\\n</i>[Доступно новое место для встречи.]</i>"
"Even soldiers need refreshment, and the mortals have a bitter booze called Beer which is quite amusing. I'm attempting to craft some of my own, but I need some 'hops'. They don't grow here! Do you have any?": "Даже солдатам нужна подпитка, а у смертных есть горький напиток под названием Пиво, что довольно забавно. Я пытаюсь сварить немного своего, но мне нужны «хмель». Они здесь не растут! У тебя есть немного?"
"These are hops? They smell bad... well, I'll take your word for it. Thank you! Here's something from my shop in return.": "Это хмель? Пахнет плохо... ну, поверю тебе на слово. Спасибо! Вот тебе что-то из моего магазина взамен."
"I was a brewmaster! Not a warrior! I mean, I could fight -- what brewmaster can't brawl? But I wasn't supposed to get blown up! I was drinking Remga's Raging Rum, and a toy bomb let off a spark... And then I guess my rum exploded.\n\nI just wish I could have one last taste of Remga's.": "Я был пивоваром! Не воином! То есть, я мог драться — какой пивовар не умеет драться? Но меня не должны были взорвать! Я пил Ремгину Яростную Ром, и игрушечная бомба вызвала искру... А потом, наверное, мой ром взорвался.\\n\\nЯ бы хотел ещё раз попробовать Ремгину."
"This is my rum! You found it. Thank you, freakish ghost. I'm going to drink this and then head off to new places. If you want, I could teach you something about brewing before I go.": "Это мой ром! Ты его нашёл. Спасибо, странный призрак. Я выпью это и отправлюсь в новые места. Если хочешь, я могу научить тебя чему-нибудь о пивоварении, прежде чем уйду."
"I just wish I could have one more taste of Remga's Raging Rum. Then maybe I could move on.": "Я бы хотел ещё раз попробовать Яростный Ром Ремги. Тогда, может быть, я смог бы двигаться дальше."
"My mind is... Fuzzy. I need to realign it. Yes! I know what to do.\n\nYou should find a Tuvillic Rune in Povus, beneath a giant mushroom. Touch the rune and retrieve the Mnemonix Index. When you enter the caves, turn left and you should see it.": "Мой разум... затуманен. Мне нужно его выровнять. Да! Я знаю, что делать.\\n\\nТебе следует найти руну Тувиллик в Повусе, под гигантским грибом. Коснись руны и забери Индекс Мнемоникс. Войдя в пещеры, поверни налево — ты должен его увидеть."
"Ah, my Mnemonic Index. It is my own creation, you know. It allows me to... Well, I needn't explain myself to a bloodling. Suffice to say that... you have done well, but there is more to do before I... regain my powers of the mind.": "Ах, мой Мнемонический Индекс. Это моё собственное творение, знаешь ли. Он позволяет мне... Впрочем, мне не нужно объясняться с кровососом. Достаточно сказать, что... ты хорошо поработал, но предстоит сделать ещё многое, прежде чем я... восстановлю свои умственные способности."
"You can't be this good. I don't know what your game is, but nobody completes these courses this quickly!\n\nI suppose you're ready for a REAL challenge, then! Um, finish enemies off with bardic blasts. But they have to be sentient enemies! And at night! And you can't wear a hat! And don't die!": "Ты не можешь быть таким хорошим. Я не знаю, в чём твоя игра, но никто не проходит эти курсы так быстро!\n\nПолагаю, ты готов к НАСТОЯЩЕМУ испытанию! Эм, добивай врагов бардовскими взрывами. Но это должны быть разумные враги! И ночью! И без шляпы! И не умирай!"
"Okay. I'll admit it. I'm out of coursework. I think you know nearly as much as me!": "Хорошо. Признаюсь. У меня закончились учебные материалы. Думаю, ты знаешь почти столько же, сколько и я!"
"I need to reawaken my blood powers. If only I hadn't killed the First Thrall years ago and stashed his body parts beneath a ruined tower in the Kur Mountains! But alas, I did.\n\nGo and find them for me. Try not to alert Lomas to your presence -- you shouldn't need to see him at all. If you do encounter Lomas, tell him that I'll get him the money soon.": "Мне нужно пробудить свои кровавые силы. Если бы только я не убил Первого Рабы много лет назад и не спрятал его части тела под разрушенной башней в горах Кур! Но увы, я это сделал.\\n\\nИди и найди их для меня. Старайся не привлекать внимание Ломаса — тебе вообще не стоит с ним встречаться. Если же столкнёшься с Ломасом, скажи ему, что я скоро принесу деньги."
"Ah yes, these are the First Thrall's bones, all right.\n\nHmm. They seem... Inert. Blast that Lomas! He must have realized I hid them in his home. He's stolen the power from these old bones!": "Ах да, это кости Первого Раба, без сомнения.\\n\\nХм. Они кажутся... безжизненными. Чёрт возьми, этот Ломас! Он, должно быть, понял, что я спрятал их в его доме. Он украл силу из этих старых костей!"
"Ever killed a rhino? Quite a rush, isn't it?! They're so dangerous! I'm not really in shape to hunt rhinos right now, though... my bow broke. And not coincidentally, the bow uses ivory rhino horn. You probably see where this is going... if you find some, please let me know!": "Когда-нибудь убивал носорога? Это настоящее приключение, не так ли?! Они такие опасные! Но сейчас я не в форме, чтобы охотиться на носорогов... мой лук сломался. И, что неудивительно, лук сделан из слоновой кости носорога. Думаю, ты понимаешь, к чему это ведёт... если найдёшь немного, пожалуйста, сообщи мне!"
"Great! Now I can start to work repairing my bow. Here, would you like some leather?": "Отлично! Теперь я могу начать ремонтировать свой лук. Вот, хочешь немного кожи?"
"I'm sorry to say that the ranalon are raising another army. I need you to activate the same beacon as before and slay them! Remember: if you die it will be seen as a sign of our weakness. Stay alive no matter what!\n\n<i>[Dying will reset progress on this quest.]</i>": "С сожалением сообщаю, что раналоны собирают новую армию. Мне нужно, чтобы ты активировал тот же маяк, что и раньше, и уничтожил их! Помни: если ты умрёшь, это будет воспринято как знак нашей слабости. Выживай любой ценой!\\n\\n<i>[Смерть сбросит прогресс этого задания.]</i>"
"After my mom ditched me in the woods, I lived with a little old lady who taught me some useful recipes. Which is great news for my friend Jara! She has a bear living in her barn, and I have just the thing: bear repellent! I brewed it up for her last night. Can you go give it to her? She lives outside of Serbule. Look for the farmlands.": "После того как мама бросила меня в лесу, я жил у старушки, которая научила меня нескольким полезным рецептам. Что очень кстати для моей подруги Джары! У неё в амбаре живёт медведь, и у меня есть именно то, что нужно: средство от медведей! Я сварил его для неё прошлой ночью. Можешь отнести ей? Она живёт за пределами Сербуля. Ищи сельскохозяйственные угодья."
"She liked it? Oh, good! I was worried. She said she didn't want my help, but I figured that was just elves being stuck up about getting help from humans. I'm sure her bear problem is a thing of the past.\n\nHere, take this as thanks: it's spider repellent!": "Ей понравилось? О, хорошо! Я волновался. Она сказала, что не хочет моей помощи, но я подумал, что это просто эльфы, которые слишком гордятся, чтобы принимать помощь от людей. Уверен, что её проблема с медведями теперь в прошлом.\\n\\nВот, возьми это в знак благодарности: это средство от пауков!"
"What's this? Oh. From Lana in the inn? I told her not to bother! Bear repellent might cause an attacking bear to go away, but this bear is literally living in my barn! I'm not gonna try to repel it, it'd just kill me! Why doesn't she listen?! Human youth are so stupid!\n\nSigh... but no, don't tell her that. Tell her thanks, and that I appreciate it and I'll try it out soon.": "Что это? О. От Ланы из трактира? Я же сказал ей не беспокоиться! Репеллент от медведей может отпугнуть нападающего медведя, но этот медведь буквально живёт в моём сарае! Я не собираюсь пытаться его отпугнуть, он просто убьёт меня! Почему она не слушает?! Молодёжь человеческая такая глупая!\n\nВздох... но нет, не говори ей этого. Скажи спасибо, что я ценю это и скоро попробую."
"I used to walk the riverbank and collect old fishing nets. I use them for all sorts of crafts! But it's too dangerous to do that these days. If you find some nets, though, I'd like them! I can't pay much, but I'll pay a bit.": "Раньше я ходил по берегу реки и собирал старые рыболовные сети. Я использую их для самых разных ремёсел! Но сейчас это слишком опасно. Если ты найдёшь какие-нибудь сети, я бы с удовольствием их взял! Я не могу много заплатить, но немного дам."
"Three big nets, still reeking of swamp water! Yep, that's what I needed! Here: I wish I could offer more.": "Три больших сачка, всё ещё пахнущие болотной водой! Да, это именно то, что мне нужно! Вот, жаль, что не могу предложить больше."
"Psst... I need your help! My friend Avgal -- he's another gru-maghi -- was caught trying to escape yesterday! And you know the penalty for that: they strip you naked and leave you in the mountains to freeze to death. You've probably never seen somebody die from hypothermia, but it's horrible. Not to worry, though: I have a plan. I just need some cold resistance potions! A lot of them!": "Псс... мне нужна твоя помощь! Мой друг Авгал — он тоже гру-магхи — был пойман вчера при попытке побега! А ты знаешь, какое за это наказание: тебя раздевают догола и оставляют в горах умирать от холода. Ты, наверное, никогда не видел, как кто-то умирает от гипотермии, но это ужасно. Не волнуйся, у меня есть план. Мне просто нужно много зелий сопротивления холоду!"
"Five of them? Okay, I think that will be enough. Because I'm such a model slave, I'm allowed to go out in the mornings to pick fresh berries. I'll hide these potions for Avgal, along with some clothes and food. With some luck, he'll live. Thanks so much!\n\nHere, take this. I was so angry about how they're treating Avgel that I stole it. I was planning to fight my way out to save him, but that would be suicide. Take it so I'm not tempted.": "Пять штук? Хорошо, думаю, этого будет достаточно. Поскольку я примерный раб, мне разрешают выходить по утрам собирать свежие ягоды. Я спрячусь эти зелья для Авгала, вместе с одеждой и едой. С удачей он выживет. Большое спасибо!\\n\\nВот, возьми это. Я так злился из-за того, как обращаются с Авгелем, что украл это. Я собирался пробиваться, чтобы спасти его, но это было бы самоубийством. Возьми это, чтобы я не поддался искушению."
"Well, the bow's almost ready, but I need to restring it. I need cat gut! Bring me a bunch of cat meat and I'll dig through it to find what I need.": "Ну, лук почти готов, но мне нужно перетянуть тетиву. Мне нужна кошачья кишка! Принеси мне кучу кошачьего мяса, и я перерыю её, чтобы найти то, что мне нужно."
"There's bound to be a good bowstring in here somewhere. Thanks a lot!": "Здесь обязательно найдётся хороший тетивник. Большое спасибо!"
"I think that about does it. Come see me in Statehelm.": "Думаю, на этом всё. Заходи ко мне в Стейтхелм."
"I have some notes on your performance. First, you were unfocused in your abjurations. And generally quite messy with your magic. Second... oh, who am I kidding, you did fine. I can make up some issues, but these are minor quibbles. Most students can't complete my course at all. And a not-insignificant number die. So when I grade you on that curve, your effort is extraordinary! Well done.": "У меня есть несколько замечаний по твоей работе. Во-первых, ты был рассеян во время абжураций. И в целом довольно неаккуратен с магией. Во-вторых... да кому я вру, ты справился отлично. Я могу придумать какие-то проблемы, но это мелкие придирки. Большинство студентов вообще не заканчивают мой курс. И немалая часть погибает. Так что, оценивая тебя по этой шкале, твои усилия выдающиеся! Молодец."
"Come see me in Statehelm.": "Зайди ко мне в Стейтхелм."
"Goblin slavers killed my wife and child, and I've only recently escaped slavery myself. I've come for revenge against the chiefs most responsible. And I've tracked them to this area! But it turns out I'm not much of an assassin. Are you?\n\nThere are three goblins that need to die. The first's name is Fugorg, and he lives in the caves around here. But I hear he's on a pilgrimage to that weird statue out in the wilderness. Maybe you can find him there and cut his head off?": "Гоблинские работорговцы убили мою жену и ребёнка, а я сам недавно сбежал из рабства. Я пришёл отомстить вождям, которые больше всего виноваты. И я выследил их в этой местности! Но, оказывается, я не очень хороший убийца. А ты?\\n\\nТрое гоблинов должны умереть. Первого зовут Фугорг, он живёт в пещерах неподалёку. Но я слышал, что он в паломничестве к той странной статуе в дикой местности. Может, ты найдёшь его там и отрубишь ему голову?"
"You did it? Really? Wow. That's one down, two to go! I ... don't really feel like celebrating, somehow. My son is still dead. But you did well. Here. Let me teach you a few tricks of my trade in exchange. And, of course, here's the money I'd been saving up to pay for this assassination!": "Ты справился? Правда? Вау. Один убит, осталось два! Я... как-то не особо хочется праздновать. Мой сын всё ещё мёртв. Но ты справился хорошо. Вот. Позволь научить тебя нескольким хитростям моего ремесла взамен. И, конечно, вот деньги, которые я копил, чтобы заплатить за это убийство!"
"The second goblin was the ship captain that held my wife as a slave. But that ship sank. So instead, I'll take revenge on his son, Algapa. Seems fair, right?\n\nAnd best of all, his son is right here! He's trying to make a name for himself under Eltibule Keep! I bet it'll be no trouble to kill him. Well... probably a <i>little</i> trouble. But it would help me sleep at night.": "Второй гоблин был капитаном корабля, который держал мою жену в рабстве. Но тот корабль утонул. Так что вместо этого я отомщу его сыну, Алгапе. Справедливо, правда?\\n\\nИ что самое лучшее, его сын прямо здесь! Он пытается сделать себе имя под крепостью Элтибул! Уверен, убить его не составит труда. Ну... наверное, <i>немного</i> труда. Но это помогло бы мне спать по ночам."
"Algapa is dead? Hah! If only his father was still alive to weep for him. But no matter. Thank you. Here, let me give you what I can.": "Алгапа мёртв? Ха! Если бы только его отец был жив, чтобы оплакать его. Но неважно. Спасибо тебе. Вот, позволь дать тебе то, что могу."
"The third person I need revenge on isn't really a goblin at all. It's a bear. A bear named Graz, famous for eating disobedient slaves. I lost track of where they'd moved Graz. There were some cave-ins around here recently, and the tribe that owned him is missing. Hell, Graz may be dead already. I just need to know Graz will never hurt another slave. Can you make sure of that?": "Третьим, на ком я хочу отомстить, на самом деле не гоблин. Это медведь. Медведь по имени Граз, известный тем, что съедает непослушных рабов. Я потерял след, куда его увезли. Здесь недавно были обвалы, и племя, которое им владело, пропало. Чёрт возьми, возможно, Граз уже мёртв. Мне просто нужно быть уверенным, что Граз больше никогда не причинит вреда ни одному рабу. Можешь в этом убедиться?"
"Graz is dead? Graz is dead! Yes! That's wonderful news! Thank you so much!": "Граз мёртв? Граз мёртв! Да! Это замечательная новость! Огромное спасибо!"
"I know a lot of ways to turn rice into alcohol. Rice wine is the smoothest! Got any of that smoothness to share?": "Я знаю много способов превратить рис в алкоголь. Рисовое вино — самое мягкое! Есть ли у тебя немного этой мягкости, чтобы поделиться?"
"Ah. That's a perfect nightcap wine! I commend you!\n\nNext time, see if you can brew this one. It's tricky to get the taste right.": "Ах. Это идеальное вино для завершения вечера! Хвалю тебя!\\n\\nВ следующий раз попробуй сварить это сам. Сложно добиться правильного вкуса."
"If you can help me out, I'll make as many rings for you as you want. As a brewer, the Queen has me brew up things to suit her \"special needs\" when I'm not out here handing out prizes. Could you bring me 20 hops? The time I save from that I can use to make you a ring!": "Если ты сможешь мне помочь, я сделаю для тебя столько колец, сколько захочешь. Будучи пивоваром, королева заставляет меня варить разные напитки для её «особых нужд», когда я не раздаю здесь призы. Можешь принести мне 20 шишек хмеля? Время, которое я сэкономлю, я смогу потратить на изготовление кольца для тебя!"
"Excellent! Gather your base materials and come see me when you're ready for a ring!": "Отлично! Собери основные материалы и приходи ко мне, когда будешь готов к кольцу!"
"Oh my birthday is coming up... in like six or eight months... and I thought of a great early present you could get me! Goblin Slippers! They supposedly make the most comfortable slippers of any race! I want green ones, but I'm not picky. You pick the color!": "О, мой день рождения скоро... через шесть или восемь месяцев... и я придумал отличный подарок заранее! Гоблинские тапочки! Говорят, это самые удобные тапочки среди всех рас! Я хочу зелёные, но я не придирчив. Выбирай цвет сам!"
"Well these look unusual... but thanks! I'll try these out tonight!": "Ну, это выглядит необычно... но спасибо! Я попробую это сегодня вечером!"
"Oh hi, can you get me a bouquet? I don't care what kind of flowers, just a half-dozen nice flowers. Thanks!": "О, привет, можешь принести мне букет? Мне всё равно, какие цветы, просто полдюжины красивых цветов. Спасибо!"
"Great, thanks! I'm going to feed these to the rat in town. He loves flowers!": "Отлично, спасибо! Я собираюсь накормить этим крысу в городе. Он обожает цветы!"
"Marna's old, like sooo old. But her hair is so great! You know what I heard? I heard that back before the forest existed, she met a wanderer and helped him ... plant his forest, if you know what I mean, and as a side-effect she's got everflowing hair. Crazy, right? Can you find out if that's true?": "Марна старая, ну очень старая. Но у неё такие шикарные волосы! Знаешь, что я слышал? Говорят, что ещё до того, как появился лес, она встретила странника и помогла ему... посадить его лес, если ты понимаешь, о чём я, и в результате у неё волосы текут без конца. Сумасшедше, правда? Можешь узнать, правда ли это?"
"She said her hair is due to a potion? Like, magic shampoo? I don't believe that for a second. Sigh. Well, you tried, I guess. So thanks, I guess.": "Она сказала, что её волосы — результат зелья? Типа, волшебного шампуня? Я ни на секунду в это не верю. Вздох. Ну, ты попытался, наверное. Так что спасибо, наверное."
"Well hello! What? My hair? Oh that's easy: I use an alchemical potion twice a month. I should make some extra bottles and sell it! You look like you could use a bottle, if you don't mind my saying.": "Ну здравствуй! Что? Мои волосы? О, это просто: я использую алхимический эликсир два раза в месяц. Надо бы сделать пару лишних бутылочек и продать! Похоже, тебе не помешала бы такая бутылка, если позволишь сказать."
"Oh I have a really big favor to ask! It's really hard but I'll totally make it worth your while. Can you get me a flawless giant snail shell? They're really hard to get. I heard you have to kill dozens to find one. But you're so strong and brave, I'm sure it'll only take you a second!": "О, у меня к тебе очень большая просьба! Это действительно сложно, но я обязательно щедро тебя отблагодарю. Можешь достать мне безупречную раковину гигантской улитки? Их очень трудно найти. Я слышала, что нужно убить десятки, чтобы найти одну. Но ты такой сильный и смелый, я уверена, что у тебя это займет всего секунду!"
"WOO THAT'S IT! You got it for me! Thank you so much! You're the best! Oh, and here's some potions! Remember to save one for my next orgy, I may just invite you!": "УРА, ЭТО ТО САМОЕ! Ты достал это для меня! Огромное спасибо! Ты лучший! О, и вот несколько зелий! Не забудь оставить одно для моей следующей оргии, возможно, я тебя приглашу!"
"Oh, I made some floral soap for Helena. She lives way off in Eltibule though, in one of those little mini-castle things, so I haven't had a chance to give it to her. If you're headed that way can you give it to her? She's this cute but dorky armor vendor. She's always smelled a little... bad... so I thought... well, hopefully she gets the hint in time for my next orgy!": "О, я сделал цветочное мыло для Хелены. Она живёт далеко в Элтибуле, в одном из этих маленьких мини-замков, так что у меня не было возможности отдать ей его. Если ты туда направляешься, можешь передать ей? Она милая, но немного неуклюжая продавщица брони. Она всегда немного... плохо пахла... так что я подумал... ну, надеюсь, она поймёт намёк к моей следующей оргии!"
"She said to suckle a treant? Well guess who's not coming to my party next month! She's such a stump anyway. I try to do some charity work and this is what I get! Anyway, thanks for delivering that for me.": "Она сказала сосать древня? Ну угадай, кто не придёт на мою вечеринку в следующем месяце! Она и так полное бревно. Я пытаюсь заняться благотворительностью, а в ответ получаю вот это! В любом случае, спасибо, что доставил это для меня."
"A gift from Rita? Thanks! I guess she had fun at the... what is this, soap?!\n\n...\n\nHa ha. Tell Rita to go suckle a treant, will you?": "Подарок от Риты? Спасибо! Похоже, ей понравилось на... что это, мыло?!\\n\\n...\\n\\nХа-ха. Скажи Рите, чтобы она пошла пососать трента, хорошо?"
"Well, there is one thing I could use your help with. James keeps bragging about his dumb ring game, and how nobody could catch 6 of them in under a minute. Which is obviously untrue because I myself have done it! But he says that's because I created this dimension so I have special powers here. Why don't you collect six in under a minute? Ready, set, go!": "Ну, есть одна вещь, с которой мне нужна твоя помощь. Джеймс всё время хвастается своей глупой игрой с кольцами и говорит, что никто не сможет поймать шесть за минуту. Что, конечно, неправда, потому что я сам это сделал! Но он утверждает, что это потому, что я создал это измерение и у меня здесь особые силы. Почему бы тебе не поймать шесть за минуту? На старт, внимание, марш!"
"You hear Rixie shout, \"See, James? I told you it was easy! Now let's try a REAL challenge! Come on back and we'll try afresh.\"": "Ты слышишь, как Рикси кричит: «Видишь, Джеймс? Я же говорила, что это было просто! А теперь давай попробуем НАСТОЯЩИЙ вызов! Возвращайся, и мы начнём заново."
"You did great showing James how easy his course is. But now I'm curious if we can make the course harder just by increasing the numbers. Can you catch 12 rings in under 60 seconds? That'd be a little bit impressive.": "Ты отлично показал Джеймсу, как прост его курс. Но теперь мне интересно, сможем ли мы усложнить курс, просто увеличив количество. Сможешь поймать 12 колец за менее чем 60 секунд? Это было бы довольно впечатляюще."
"You hear Rixie shout, \"Woo! Nice going! Now let's take it to the extreme!\"": "Ты слышишь, как Рикси кричит: «Ура! Отлично справился! А теперь давай перейдём к экстремальному!"
"Okay for real this time. Can you collect 20 rings in 60 seconds? Go go go go go go!": "Ладно, на этот раз серьёзно. Можешь собрать 20 колец за 60 секунд? Вперёд, вперёд, вперёд, вперёд, вперёд, вперёд!"
"You hear Rixie shout, \"Incredible! Did you see, James? DID YOU SEE THAT?!\"": "Ты слышишь, как Рикси кричит: «Невероятно! Ты видел, Джеймс? ТЫ ВИДЕЛ ЭТО?!"
"Nah, I don't think you can help with this roach problem. I need some of those fancy bug bombs, but they're hard to come by.\n\nI guess if you're handy with a gizmo, you could build some and fumigate the place for us. I'd sure appreciate that!\n\nSer Hackley at the Council Headquarters could give you blueprints for the bug bombs, if you know how to read such things.": "Нет, я не думаю, что ты сможешь помочь с этой проблемой с тараканами. Мне нужны эти модные бомбочки от насекомых, но их трудно достать.\\n\\nДумаю, если ты умеешь обращаться с приборами, ты мог бы сделать несколько и обработать помещение для нас. Я была бы очень признательна!\\n\\nСэр Хакли в здании Совета может дать тебе чертежи бомбочек от насекомых, если ты умеешь читать такие вещи."
"Remga's Sweaty Balls! We're roach free! Give it a week and we'll be right back to where we were, but let's live it up while the living's good!": "Потные шарики Ремги! Тараканов нет! Через неделю они вернутся, как и раньше, но давай наслаждаться жизнью, пока она хороша!"
"I'm trying to brew a toxic beer. I know, I know, that's against the Council's Brewing Code of Ethics, but the Council's not here, and monsters are! If goblins find me, I want to give them kegs of beer that will make them sick enough that I can flee.\n\nI'm still experimenting with the recipe, but I think a key ingredient is rotten strawberries. Not fresh ones -- they've gotta be really rotten. Dig me up some, okay?": "Я пытаюсь сварить токсичное пиво. Я знаю, знаю, это против Кодекса этики пивоварения Совета, но Совета здесь нет, а монстры есть! Если меня найдут гоблины, я хочу дать им бочки пива, которое их так отравит, что я смогу сбежать.\\n\\nЯ всё ещё экспериментирую с рецептом, но думаю, что ключевой ингредиент — гнилые клубники. Не свежие — они должны быть действительно гнилыми. Выкопай мне немного, хорошо?"
"Whew. Gross! Yeah, these strawberries are rotten enough. I'll get them into the brew right away, thanks. Here's some coins to cover any expenses, or whatever.\n\nAnd here's some hops. Don't lose these! They're hard to come by. You need them for brewing beer.": "Фу. Отвратительно! Да, эти клубники достаточно испорчены. Я сразу же добавлю их в варево, спасибо. Вот немного монет, чтобы покрыть расходы или на что угодно.\\n\\nИ вот немного хмеля. Не потеряй их! Хмель достать сложно. Он нужен для варки пива."
"I can fight goblins. I can fight spiders. But the frogs? Those 'ranalons', as they call themselves? They're just too thick in number. It's too hard to fight 'em one at a time!\n\nBut, uh... I told our pretty waitress that I'd killed thousands of 'em. Can you help me out? I just need one of their hideous tongues as a 'souvenir' to show to Lana.": "Я могу сражаться с гоблинами. Я могу сражаться с пауками. Но лягушки? Эти «раналоны», как они себя называют? Их слишком много. Сражаться с ними по одному слишком сложно!\\n\\nНо, э-э... я сказал нашей красивой официантке, что убил тысячи из них. Можешь помочь мне? Мне нужен всего лишь один их отвратительный язык в качестве «сувенира», чтобы показать Лане."
"Nice. This will convince Lana I'm a real warrior. And what do maidens want, if not protection from the evil monsters outside? Hmm, we might get to dancing soon, if you catch my meaning!\n\nHere's some money. And, uh, here's a book. I also told her I was a master of teleportation magic, so I was trying to study the topic. But it's too boring for me.": "Отлично. Это убедит Лану, что я настоящий воин. А чего хотят девицы, если не защиты от злых монстров снаружи? Хм, возможно, скоро мы и потанцуем, если ты понимаешь, о чём я!\\\\n\\\\nВот немного денег. И, эээ, вот книга. Я ещё сказал ей, что я мастер магии телепортации, так что пытался изучать эту тему. Но она слишком скучная для меня."
"The foxes love the gems you got! I explained to Rubi that she's named after a gem called a Ruby. She insists upon seeing some of these gems right away! And that got me to thinking: if I had a LOT of them, I could use them in tomorrow's math lesson. Do you know where to find a lot of rubies?\n\nOf course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?": "Лисы обожают камни, которые ты принес! Я объяснил Руби, что её имя происходит от камня под названием Рубин. Она настаивает, чтобы сразу увидеть некоторые из этих камней! И это заставило меня задуматься: если бы у меня было МНОГО таких камней, я мог бы использовать их на завтрашнем уроке математики. Ты знаешь, где можно найти много рубинов?\\n\\nКонечно, не стоит забывать и о Кэсси. Найди для неё тоже хорошие камни, хорошо?"
"Thanks so much. They pay a lot more attention when I use these gems in the lessons!": "Большое спасибо. Они гораздо внимательнее, когда я использую эти драгоценные камни на уроках!"
"I can't open my shop with these roaches here. If you had bug bombs, you could clear it out for me. I'd reward you!\n\nI'd do it myself but my bug bombs were sabotaged. Yes, I know what that sounds like!\n\nI think Ser Hackley in the Council building sells plans for bug bumbs, if you're into gadgeteering?": "Я не могу открыть свою лавку с этими тараканами. Если бы у тебя были бомбочки от насекомых, ты мог бы очистить её для меня. Я бы тебя вознаградил!\\n\\nЯ бы сделал это сам, но мои бомбочки были саботированы. Да, я знаю, как это звучит!\\n\\nДумаю, сэр Хакли в здании Совета продаёт чертежи бомбочек от насекомых, если тебе нравится заниматься изобретательством?"
"All clear! I'll sweep up and try to open shop. Chancellor Vexford's evil scheme has been foiled again!": "Всё чисто! Я подмету и попробую открыть лавку. Злой план канцлера Вексфорда снова сорван!"
"I see your menu has a selection of goblin food, including ruktagh. How are you getting fresh dill out here?! Well, I'm sure the dill isn't fresh. But the meal had better be!": "Вижу, в вашем меню есть выбор гоблинской еды, включая руктаг. Как вам удаётся достать свежий укроп здесь?! Хотя, уверен, укроп не свежий. Но вот еда должна быть свежей!"
"Aaahhh, smell that aroma.\n\n...Well, the smell is better than the taste, but it's not bad. Not bad.": "Аааах, почувствуй этот аромат.\\n\\n...Ну, запах лучше, чем вкус, но в целом неплохо. Неплохо."
"Where is my ruktagh?!": "Где мой руктаг?!"
"A soldier told me a very peculiar tale yesterday, and I think I know what's going on. But it's too dangerous for me to investigate! Can you do it?\n\nThe soldier said she was in Vidaria, fighting back demons, when she saw a big slab of steak lying in one of the demon craters. She said the meat was sentient, and that when she investigated, it attacked her and fended her off.\n\nI bet that steak is still out there in one of those craters. Can you bring it to me?": "Солдатка рассказала мне вчера очень странную историю, и я думаю, что понимаю, в чём дело. Но для меня это слишком опасно, чтобы расследовать! Ты можешь это сделать?\\n\\nСолдатка сказала, что была в Видарии, сражаясь с демонами, когда увидела большой кусок стейка, лежащий в одном из демонических кратеров. Она сказала, что мясо было разумным, и когда она приблизилась, оно напало на неё и отбивалось.\\n\\nДержу пари, этот стейк всё ещё там, в одном из тех кратеров. Можешь принести его мне?"
"So it was true about the steak. I think I know what's going on. Thank you for your efforts! If you have more time, you could stop by this evening and help me investigate this gristle further.\n\n</i>[New Hang Out Available.]</i>": "Так вот оно что с этим стейком. Думаю, я понимаю, что происходит. Спасибо за твои старания! Если у тебя будет время, можешь заглянуть сегодня вечером и помочь мне дальше расследовать этот хрящ.\n\n</i>[Доступно новое место для встречи.]</i>"
"I use special fetish pouches when I commune with the dead. One of the ingredients is dried onion, and I'm out. I'll give you good money if you have some!": "Я использую специальные мешочки-фетиши, когда общаюсь с мёртвыми. Один из ингредиентов — сушёный лук, а у меня его нет. Я заплачу тебе хорошие деньги, если у тебя есть немного!"
"Good! These are indeed onions. Here is your money!": "Отлично! Это действительно лук. Вот твои деньги!"
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Amazing Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужно немного дополнительного снаряжения, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 удивительных седел? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твое мастерство."
"Perfect! These will help us get by until I can get some more made. Here's a few tips for you as promised.\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это поможет нам продержаться, пока я не сделаю ещё. Вот несколько советов для тебя, как и обещал.\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Perfect! These will help us get by until I can get some more made. Here's a few tips for you as promised.\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это поможет нам продержаться, пока я не сделаю ещё. Вот несколько советов для тебя, как и обещал.\\n\\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Decent Reins? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужно немного дополнительного снаряжения, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 неплохих уздечек? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твое мастерство."
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Quality Saddlebags? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужно немного дополнительного снаряжения, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 качественных седельных сумок? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твое мастерство."
"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Rough Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.": "Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужно немного дополнительного снаряжения, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 грубых седел? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твое мастерство."
"Perfect! These will help us get by until I can get some more made. Here's a few tips for you as promised.\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Отлично! Это поможет нам продержаться, пока я не сделаю ещё. Вот несколько советов для тебя, как и обещал.\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"Used to be, some orcs would come by to trade. Made some good money, even if they are assholes. But rival orcs released all kinds of monsters in the area and now nobody comes here. Can you help make it safe again?": "Раньше сюда заходили орки, чтобы торговать. Зарабатывал неплохо, хоть они и сволочи. Но враждебные орки выпустили в округу всяких монстров, и теперь сюда никто не приходит. Можешь помочь сделать это место снова безопасным?"
"Thanks! I only half want the orc traders to show up. They terrify me and the fairies, but I need the money!\n\nBut here... for all your work, have some of the money I got left. Orcs don't usually trade in Council money, they use the old crone coins like these.": "Спасибо! Я лишь наполовину хочу, чтобы орочьи торговцы появились. Они пугают меня и фей, но мне нужны деньги!\n\nА вот... за всю твою работу возьми немного оставшихся у меня денег. Орки обычно не торгуют советскими монетами, они используют старые монеты старух, вот такие."
"I've been trying to convince Mox that Transmutation can revolutionize mining. But he won't listen. So I need your help. It will be dangerous... but worthwhile! I need a piece of the evil yellow crystals that can be found outside, plus some high-quality phlogiston. I believe I can make the crystal safe for transit!": "Я пыталась убедить Мокса, что Превращение может революционизировать горное дело. Но он не слушает. Поэтому мне нужна твоя помощь. Это будет опасно... но стоит того! Мне нужен кусок злых жёлтых кристаллов, которые можно найти снаружи, а также немного высококачественного флогистона. Я верю, что смогу сделать кристалл безопасным для транспортировки!"
"Excellent. Let me work quickly... yes! I knew it! These yellow crystals are just a kind of enchanted hassium, which phlogiston renders relatively safe! Wait until I show Mox!\n\nUnfortunately the technique does not seem to be very cost-effective, but I believe I can improve the ratios a bit...\n\nHere. You seem to be more open-minded about learning from a 'child' than Mox is. Here is my improved crystal transit formula. It may be too expensive to use routinely, but I hope that some day it proves useful.": "Отлично. Позволь мне быстро поработать... да! Я знал! Эти жёлтые кристаллы — всего лишь разновидность зачарованного гассия, который флогистон делает относительно безопасным! Подожди, пока я покажу это Моксу!\\n\\nК сожалению, техника кажется не очень экономичной, но я верю, что смогу немного улучшить соотношения...\\n\\nВот. Ты, похоже, более открыта к обучению у «ребёнка», чем Мокс. Вот моя улучшенная формула транзита кристаллов. Возможно, она слишком дорогая для регулярного использования, но я надеюсь, что когда-нибудь она окажется полезной."
"I know it's quite rare, but I might as well ask: have you stumbled on any extra saltpeter? I'm trying to master a few fire spells I missed. Just for completeness' sake, you understand.": "Я знаю, что это довольно редко, но всё же спрошу: не наткнулся ли ты на лишний селитру? Я пытаюсь освоить несколько огненных заклинаний, которые пропустил. Просто для полноты картины, понимаешь."
"Perfect! Thank you. Here, take a few of these.": "Отлично! Спасибо. Вот, возьми несколько из этих."
"Been thinking about the portal those green bears use to get back into our world. I'm gonna try blowin' it up! I know an old recipe for explosions... just need a bunch of saltpeter.": "Думаю о портале, которым эти зелёные медведи пользуются, чтобы вернуться в наш мир. Я собираюсь попытаться его взорвать! Знаю старый рецепт взрывчатки... нужно только много селитры."
"Thanks! This will work. I'll try it out in a while.\n\nI haven't got much, but here's some of my old emergency potions. You might as well use 'em, they're just going stale sitting on my shelf.": "Спасибо! Это подойдёт. Я попробую через некоторое время.\\n\\nУ меня не так много, но вот несколько моих старых запасных зелий. Ты можешь их использовать, они всё равно уже начинают портиться на моей полке."
"My master left me with a long list of tasks, and we've fallen behind. I'd love your help! This one's tricky: I need samples of a mineral that grows in the caves around here. It's called cinnabar, and it's pretty hard to mine. But if you can get some, I'll pay you ... let's see... ten thousand Councils.": "Мой хозяин оставил мне длинный список заданий, и мы отстаём. Я был бы рад твоей помощи! Это задание непростое: мне нужны образцы минерала, который растёт в пещерах здесь рядом. Он называется киноварь, и его довольно трудно добыть. Но если ты сможешь добыть немного, я заплачу тебе... посмотрим... десять тысяч Советов."
"This is the cinnabar? Good. Here's your money. That's one task off the list... maybe I won't get in trouble after all!": "Это киноварь? Хорошо. Вот твои деньги. Задача выполнена... может, я всё-таки не попадусь в беду!"
"Okay, so the rakkies in the southwest have been breeding extra-vicious sand dogs. You need to kill those.\n\nLook, I know what this sounds like and I don't want to hear it. Those sand dogs aren't like us... they're not even mammals! They're dinosaurs or something! Wardens hate dinosaurs, right? Well... they aren't native to here! They're disrupting the natural order and shit.\n\nLook, the bandits were already a big problem for Amulna, and now they're much worse. And those sand dogs creep me out. Just fill out the forms however you need to, but those freaks need to go.": "Ладно, ракки на юго-западе разводят особенно свирепых пескособак. Тебе нужно их убить.\\n\\nСлушай, я знаю, как это звучит, и не хочу это слышать. Эти пескособаки не похожи на нас... они даже не млекопитающие! Они динозавры или что-то в этом роде! Стражи ненавидят динозавров, правда? Так вот... они не местные! Они нарушают естественный порядок и всё такое.\\n\\nСлушай, бандиты и так были большой проблемой для Амульны, а теперь стало ещё хуже. И эти пескособаки меня пугают. Просто заполни все нужные формы, как считаешь нужным, но этих уродов надо убрать."
"Thanks. We're fighting the good fight here. And don't worry, most of those sand dogs are dumb as shit. And the ones that can talk? Super racist. Against werewolves, at least.\n\nI'll clean up the rest when the sun sets. You can get outta here.": "Спасибо. Мы здесь ведём праведную борьбу. И не волнуйся, большинство этих песчаных собак — полные идиоты. А те, что умеют говорить? Очень расистские. По крайней мере, по отношению к оборотням.\n\nЯ уберу остальных, когда солнце сядет. Ты можешь уходить."
"When the Council was planning out the new town that never happened here, they built a model home to try to attract settlers. It's just past that hill over there.\n\nSo here's the thing: Sarina used to live there, alone, until goblins kidnapped her in the basement one day. She says she's never going anywhere near there again. But her clothes are there, and she's stretching out all my blouses! Can you go find her stuff?": "Когда Совет планировал новый город, который так и не появился здесь, они построили модельный дом, чтобы привлечь поселенцев. Он находится чуть за тем холмом.\n\nВот в чём дело: Сарина раньше жила там одна, пока однажды гоблины не похитили её в подвале. Она говорит, что больше никогда туда не пойдёт. Но её одежда там, и она растягивает все мои блузки! Ты не мог бы найти её вещи?"
"Yep, that's Sarina's stuff. I bet she'll be happy to see it! Or else she'll be shocked and saddened by the memories these conjure. Hmm. Well, I'll broach it carefully. Thank you.": "Да, это вещи Сарины. Уверен, она будет рада их увидеть! Или же будет шокирована и огорчена воспоминаниями, которые они вызывают. Хм. Ну, я аккуратно затрону эту тему. Спасибо."
"Back in Sinoca I had a state of the art research laboratory for inventing new augmentation oils. I had a breakthrough design that requires dragon scales, but, of course... I could never find any dragon scales! Wouldn't it be great if I found some dragon scales to take home with me? It'd almost make this experience worthwhile. Uh... do you know where any already-dead dragons are? ... Me neither.": "Когда я был в Синосе, у меня была современная исследовательская лаборатория для создания новых масел для улучшений. У меня была прорывная разработка, для которой нужны драконьи чешуи, но, конечно... я так и не смог найти ни одной драконьей чешуи! Было бы здорово, если бы я нашёл несколько драконьих чешуек, чтобы взять их с собой домой. Это почти сделало бы весь этот опыт стоящим. Эм... ты знаешь, где есть уже мёртвые драконы? ... Я тоже нет."
"Oh my goodness. You're too much! You found a dead dragon and pried off its scales for me?! Thank you so much! I hope it wasn't too scary. Even if it was long-dead I'd be a little scared of such a fearsome monster. I wish I had something to offer you... hm, here. This is... a thing!": "О боже мой. Ты просто невероятен! Ты нашёл мёртвого дракона и содрал с него чешую для меня?! Огромное спасибо! Надеюсь, это не было слишком страшно. Даже если он давно мёртв, я бы немного испугался такого грозного монстра. Жаль, что у меня нет ничего, чтобы тебе предложить... хм, вот. Это... штука!"
"If you listen very carefully, you might hear the friendly tornadoes around here making an oscillating noise approximately five notes higher than normal. They're obviously in significant distress!\n\nI think it's those ghastly exploding sheep. If an explosion gets sucked up into a tornado, that can really upset it. Could you clear the area of those fiery abominations?": "Если прислушаться очень внимательно, можно услышать, как дружелюбные торнадо здесь издают колеблющийся звук примерно на пять нот выше обычного. Очевидно, они сильно страдают!\\n\\nДумаю, это из-за этих ужасных взрывающихся овец. Если взрыв попадает в торнадо, это действительно может его расстроить. Не мог бы ты очистить эту территорию от этих огненных мерзостей?"
"Thank you. It will probably take a bit before the tornadoes calm down, but I'm sure they'll be a bit calmer now. Here, this is for your trouble.": "Спасибо. Наверное, пройдет немного времени, прежде чем торнадо утихнут, но я уверен, что теперь они будут немного спокойнее. Вот, это за твои труды."
"Okay, I'll cut the act: I know why you're really here. You're after the wizard! Well, he isn't here. Not physically, anyway. But his creations are! Go up to the science deck and you'll see what I mean. By all means, feel free to dispose of our new 'army'!": "Хорошо, перестану притворяться: я знаю, зачем вы здесь на самом деле. Вы охотитесь на волшебника! Но его здесь нет. По крайней мере, физически. Зато его творения здесь! Поднимитесь на научную палубу, и вы поймёте, что я имею в виду. Без сомнения, не стесняйтесь избавиться от нашей новой «армии»!"
"You got the abominations out of the science deck? That's great news, because they freak me OUT! UGH!\n\nOh, but FYI: we've already sent thousands of them off to other worlds, along with their horrible brain-dog pets. So it's much too late for you to stop the army. They're invading a distant world even as we speak!\n\nSorry... I honestly didn't mean to mislead you that time. Here's a make-up present. Tell people you tore it from my broken fingers after beating me almost to death!": "Ты выгнал мерзостей с научной палубы? Отличная новость, потому что они меня реально пугают! Фу!\n\nКстати, для справки: мы уже отправили тысячи из них на другие миры вместе с их ужасными мозгособаками. Так что слишком поздно, чтобы остановить армию. Они уже вторгаются на далёкий мир, пока мы говорим!\n\nИзвини... честно, я не хотел тебя вводить в заблуждение тогда. Вот подарок для примирения. Расскажи всем, что вырвал его из моих сломанных пальцев после того, как чуть не убил меня!"
"Work on my new spell continues. I suppose I will share the premise with you: it is a new kind of sentient flame, much more suitable to certain types of work.\n\nBut there is much research left. You seem competent enough to help with that research. Here's what I need you to do. Go find some rakshasa bandits, or pirates, or other socially undesirables, and kill them with fire. This next bit is very important: they need to die from the impact of a Scintillating Flame.\n\nAs you bury them, note whether they have a startled expression on their face.": "Работа над моим новым заклинанием продолжается. Полагаю, я поделюсь с тобой его идеей: это новый вид разумного пламени, гораздо более подходящего для определённых видов работы.\\n\\nНо исследований ещё много. Ты кажешься достаточно компетентным, чтобы помочь с этими исследованиями. Вот что я хочу, чтобы ты сделал. Найди разбойников ракшасов, пиратов или других социальных изгоев и убей их огнём. Следующая часть очень важна: они должны умереть от воздействия Искрящегося Пламени.\\n\\nКогда будешь их закапывать, обрати внимание, есть ли на их лицах выражение испуга."
"These are your research notes? Terse... But sufficient. I see my hypothesis was correct: nobody expects to die from a Scintillating Flame. It's just too shiny to be scary. Perhaps we can use that.\n\nI have more research for you when you're ready.": "Это твои исследовательские заметки? Кратко... Но достаточно. Вижу, моя гипотеза подтвердилась: никто не ожидает умереть от Сверкающего Пламени. Оно слишком яркое, чтобы пугать. Возможно, мы сможем это использовать.\\n\\nУ меня есть для тебя ещё исследования, когда будешь готов."
"You destroyed the erupting nest of Tunnel Scorpions!": "Вы уничтожили извергающееся гнездо туннельных скорпионов!"
"Those goblins love artwork. I hate it! Bring me some of the lesser-valued pieces. I use them as floor coverings to keep my tanning chemicals from seeping into the groundwater.": "Эти гоблины обожают произведения искусства. Я их ненавижу! Принеси мне несколько менее ценных экземпляров. Я использую их как напольные покрытия, чтобы мои химикаты для загара не просачивались в грунтовые воды."
"Yes, these will do. Thank you.\n\nHere, let me show you how I mix the tannins. There's a trick to it, you see...": "Да, эти подойдут. Спасибо.\\n\\nВот, позволь показать тебе, как я смешиваю дубильные вещества. Тут есть свой секрет, понимаешь..."
"You've proven yourself capable on the battlefield. I wonder if you would like to learn of another way to help Arisetsu's mission?\n\nIt's a bit unorthodox. I'm sure my higher-ups in the church wouldn't approve. But I think it's worthwhile.\n\nI'm sorry for being vague. You see, I promised someone that I'd let them vet anyone I wanted to pass on this knowledge to. He's dead, but his wife will know what he was looking for. Go get her blessing to learn the secret. Fransesca is in the wizard school. Yes, she's a necromancer. But she's one of the good ones. Trust me.": "Ты доказал свою способность на поле боя. Интересно, хочешь ли узнать о другом способе помочь миссии Арисецу?\\n\\nЭто немного необычно. Я уверен, что мои начальники в церкви не одобрят. Но я считаю, что это стоит того.\\n\\nИзвини за расплывчатость. Видишь ли, я обещал одному человеку, что позволю ему проверять каждого, кому захочу передать эти знания. Он мёртв, но его жена знает, что он искал. Иди и получи её благословение на изучение секрета. Франсеска в школе волшебников. Да, она некромант. Но она из хороших. Поверь мне."
"I'm glad she didn't have a problem with you. She's said no a few times and I can never guess the reason. But anyway, that's great news!\n\nI knew her husband better than I know her. His name was Steven too. I miss him. Uh sorry, anyway, let me teach you something interesting.\n\n<i>[New Hangout Available.]</i>": "Я рад, что у неё не было проблем с тобой. Она несколько раз говорила «нет», и я никогда не мог понять почему. Но в любом случае, это отличные новости!\\n\\nЯ знал её мужа лучше, чем её саму. Его тоже звали Стивен. Я скучаю по нему. Эм, извини, в любом случае, позволь научить тебя кое-чему интересному.\\n\\n<i>[Доступно новое место для встреч.]</i>"
"What? Steven sent you? Steven is dead! Oh. You mean the priest. Yes, I know what you're referring to.\n\n<i>[Fransesca scrutinizes you for a moment.]</i> Okay. You're clear. Tell him \"fizzlebump\". That's the secret code that means you're clear.": "Что? Стивен послал тебя? Стивен мёртв! О. Ты имеешь в виду священника. Да, я знаю, о чём ты говоришь.\\n\\n<i>[Франсеска внимательно тебя изучает.]</i> Ладно. Ты чист. Скажи ему «физзлбамп». Это секретный код, означающий, что ты чист."
"The orcs have special armor techniques that even I don't know... and I deserve to know them!\n\nThat greenskin girl can forge. I've seen her making parts for her cages: she handles a hammer like a pro. So why won't she tell me how to make orcish armor?!\n\nWhy don't you try? See if she'll tell you anything.": "Орки владеют особыми техниками изготовления брони, о которых не знаю даже я... а я заслуживаю их знать!\\n\\nТа зелёнокожая девушка умеет ковать. Я видел, как она делает детали для своих клеток: она обращается с молотом как профессионал. Так почему же она не хочет рассказывать, как делать орочью броню?!\\n\\nПочему бы тебе не попробовать? Посмотри, расскажет ли она тебе что-нибудь."
"Bah! I know the rakkies love her, but who can trust a half-human? She wants us to believe it was a <i>coincidence</i> that she survived the orc attack? The one perpetrated by her own father?! And now we're supposed to believe she has NO contact with him? Lies!\n\nHmm. Well, I have another approach. How's your Orcish?\n\n<i>[Another favor will be available if/when you have level 25 in Orcish.]</i>": "Фу! Я знаю, что ракки её любят, но кому можно доверять полулюдям? Она хочет, чтобы мы поверили, что её выживание после орочьей атаки — это <i>совпадение</i>? Той самой атаки, устроенной её собственным отцом?! И теперь нам предлагают поверить, что у неё НЕТ с ним никаких связей? Ложь!\n\nХм. Ладно, у меня есть другой подход. Как у тебя с орочьим?\n\n<i>[Другой одолжение станет доступно, когда у тебя будет 25 уровень в орочьем.]</i>"
"Did Tremmond put you up to this? That ass!\n\nYes, I know how to shoe horses and make rivets and lattices and other basic items. I even know how to bard a horse. But I learned everything by apprenticing with Yenshi the Animal Guru, right here in Povus... not from orcs! And the only reason I have to touch a forge at all is because Tremmond and his cronies are too stuck up to work on animals!\n\nI despise my father and I would never willingly communicate with him. Now go away, because you're pissing me off!": "Треммонд заставил тебя этим заняться? Вот придурок!\n\nДа, я умею подковывать лошадей и делать заклёпки, решётки и другие базовые вещи. Я даже знаю, как оседлать лошадь. Но всему этому я научился, работая учеником у Йенши, Гуру Животных, прямо здесь, в Повусе... а не у орков! И единственная причина, по которой мне приходится прикасаться к кузнице, — это потому, что Треммонд и его подельники слишком заносчивы, чтобы работать с животными!\n\nЯ презираю своего отца и никогда добровольно с ним не общался бы. А теперь уходи, ты меня раздражаешь!"
"Back when Povus was growing, we had good relations with certain individual orcs. There is one orc who might help me learn the secrets of orcish armorsmithing: Brugo. He calls himself Brugo The Wise. I understand he's still in the area, although not in the orc camp. See if you can find him. See if he'll teach his secrets.": "Когда Повус только развивался, у нас были хорошие отношения с некоторыми отдельными орками. Есть один орк, который может помочь мне узнать тайны орочьего кузнечного дела: Бруго. Он называет себя Бруго Мудрым. Насколько я понимаю, он всё ещё в этих краях, хотя и не в орочьем лагере. Попытайся найти его. Посмотри, согласится ли он поделиться своими секретами."
"He said what? \"Gurkah, Tast\" would translate to... \"Tast, fight me.\" Hah! Fuck that!\n\nI'd assume Brugo was lying, but I never knew him to lie. I guess that's a dead-end, though. I'm not gonna go challenge a god to a fight! Although... he said every orcish blacksmith learns that way. So the fight couldn't be THAT bad, right? Haha, I'm kidding! I'm too old for that sort of shit. But my thanks for the information.": "Он что сказал? «Гурках, Таст» переводится как... «Таст, сразись со мной». Ха! Чёрт с этим!\\n\\nЯ бы подумал, что Бруго врал, но я никогда не знал, чтобы он лгал. Думаю, это тупик. Я не собираюсь вызывать бога на бой! Хотя... он сказал, что каждый орочий кузнец учится так. Значит, бой не мог быть ТАК плох, да? Ха-ха, шучу! Я слишком стар для таких дел. Но спасибо за информацию."
"You want to learn to make orcish armor? Hahaha! Wait, you seriously expect me to teach you an orcish secret? I'm no traitor! Tell Tremmond to fuck off.\n\nAlthough... Our armor isn't \"orcish\". It's Tast's armor. As in the god of war. If you want to know how to make it, just ask one of his avatars! It's easy: just go to a forge consecrated to Tast, and say \"Gurkah, Tast!\" Every orcish blacksmith learns this way.": "Хочешь научиться делать орочью броню? Ха-ха-ха! Ты серьёзно думаешь, что я расскажу тебе орочий секрет? Я не предатель! Скажи Треммонду, чтобы шёл к чёрту.\n\nХотя... Наша броня не «орочья». Это броня Таста. Как у бога войны. Если хочешь узнать, как её делать, просто спроси у одного из его аватаров! Это просто: иди к кузнице, освящённой Тастом, и скажи «Гурках, Таст!» Каждый орочий кузнец учится так."
"You've already drained SO MUCH life from this world, it's glorious. But now let's get more targeted... sentient creatures feel more suffering than the others, so focus on them!": "Ты уже истощил ТАК МНОГО жизни в этом мире, это великолепно. Но теперь давай будем более избирательны... разумные существа чувствуют больше страданий, чем остальные, так что сосредоточься на них!"
"I wish I got to hear their pained cries and see the life drain from their eyes... you're so lucky!": "Хотел бы я услышать их мучительные крики и увидеть, как жизнь уходит из их глаз... тебе так повезло!"
"If you're going to take care of the sneaky sewer fae, you might as well go a bit beyond that point and look for an outbreak of sentient mushroom people.\n\nLook, that's what the report says. I haven't met any mushroom people personally, but magic can do a lot of terrible things. Remember not to breathe weird spores!": "Если собираешься разобраться с хитрыми канализационными феями, можешь зайти чуть дальше и поискать вспышку разумных грибных существ.\\n\\nВот что говорится в отчёте. Я лично не встречал грибных существ, но магия может творить много ужасных вещей. Не забывай не вдыхать странные споры!"
"Are you infected? No? Well, good! The idea of thinking fungus freaks me out. Better you than me!": "Ты заражён? Нет? Ну, слава богу! Мысль о грибке меня пугает. Лучше пусть это будешь ты, а не я!"
"There is a necklace I wish to have returned to me. It was my mother's, and she gave it to me. To ME! Because I was her favorite! My worthless brother stole it from me... and then... I had to leave it behind.\n\nLeave this cave and venture right. You will see the camp of the feckless Aguva clan... go past them. Continue right until you find the camp on a hill.  That camp is what remains of the Uga'th clan. The necklace is in there somewhere.": "Есть ожерелье, которое я хочу вернуть себе. Оно принадлежало моей матери, и она подарила его мне. МНЕ! Потому что я была её любимой! Мой никчёмный брат украл его у меня... а потом... мне пришлось оставить его позади.\\n\\nВыйди из этой пещеры и иди направо. Ты увидишь лагерь беспутного клана Агува... пройди мимо них. Продолжай идти направо, пока не найдёшь лагерь на холме. Этот лагерь — то, что осталось от клана Уга'тх. Ожерелье где-то там."
"It is mine again! Mine! As it should be! Wait... it is broken!\n\nYou fool! How could you break... no! I will control my anger! Remember the past, Gasu'um! Remember!\n\n<i>[Gasu'um glares at you a while until she regains her composure.]</i>\n\nThank you. Here is coin for your... for your effort.\n\nI can repair the necklace. You will help me, and I will reward you.": "Он снова мой! Мой! Как и должно быть! Подожди... он сломан!\n\nГлупец! Как ты мог сломать... нет! Я сдержу свой гнев! Помни прошлое, Гасу’ум! Помни!\n\n<i>[Гасу’ум некоторое время смотрит на тебя, пока не возьмёт себя в руки.]</i>\n\nСпасибо. Вот монеты за твои... за твои старания.\n\nЯ могу починить ожерелье. Ты поможешь мне, и я тебя вознагражу."
"I know that most of the farms in Serbule Hills have been abandoned, but I still need to soil samples from each one. It's part of my scientific duties, you understand. Here. Put a bit of soil from each farm in here and bring it back. Simple as cake! And I shall award you 700 Councils.": "Я знаю, что большинство ферм в Сербульских холмах заброшены, но мне всё равно нужны образцы почвы с каждой из них. Это часть моих научных обязанностей, понимаете. Вот. Возьмите немного почвы с каждой фермы и принесите сюда. Проще простого! И я награжу вас 700 Советов."
"Very good. These soil samples will tell me how viable each farm is for future crops. I'm thinking about the future, you see! Here is your payment.": "Очень хорошо. Эти образцы почвы покажут мне, насколько пригодна каждая ферма для будущих посевов. Я думаю о будущем, понимаешь! Вот твоя награда."
"Please send your most uncomfortable cow shoes.": "Пожалуйста, пришлите свои самые неудобные коровьи башмаки."
"I am putting horseshoes on wild deer for... reasons... and need a quantity of your least-expensive wares.": "Я прибиваю подковы диким оленям по... причинам... и мне нужно количество твоих самых дешёвых товаров."
"Well, your actions have incriminated you now, so you can see it through with me if you want to. I'm setting up a trade with a friend who lives out of town. Help me get the rest of this crap, and I'll let you in on the action.": "Так что можешь довести это дело до конца вместе со мной, если хочешь. Я организую сделку с другом, который живёт за городом. Помоги мне собрать оставшийся хлам, и я посвящу тебя в дело."
"That's the whole checklist. Okay. Why don't you come with me to do the trade tonight.\n\n<i>[ New Hangout Available. ]</i>": "Это весь список. Хорошо. Почему бы тебе не пойти со мной на сделку сегодня вечером.\\n\\n<i>[ Доступно новое место для встречи. ]</i>"
"The ratkin are farming fish in here... freshwater fish! That's not unusual further inland, but this close to the sea, it seems odd, doesn't it? Maybe these fish are atypical somehow. Oh, you don't understand biology anyway... look, just get me a bunch of these fish, okay?": "Крысолюди разводят здесь рыбу... пресноводную рыбу! Это не удивительно в глубине материка, но так близко к морю — странно, не правда ли? Может, эта рыба как-то необычна. О, ты всё равно не понимаешь биологию... Ладно, просто принеси мне кучу этой рыбы, хорошо?"
"These are all cave tilapia? Hmm... it's such a bland, generic meat that I can't even tell where it came from! if I had more equipment here I could tell if these fish were atypical, but they just look like regular cave tilapia to me. I guess I know what I'm making for dinner tonight, though! Here, have some shinies!": "Это всё пещерный тиляпия? Хм... такое пресное, обычное мясо, что я даже не могу определить, откуда оно! Если бы у меня здесь было больше оборудования, я бы смог узнать, необычны ли эти рыбы, но они выглядят как обычный пещерный тиляпия. Хотя, кажется, я уже знаю, что приготовлю на ужин сегодня! Вот, возьми немного блестяшек!"
"The sewers use a magical solvent to clean and repurpose waste material, and they're supposed to be maintenance-free. Hah. I need you to go down there and clear out some of the clogs in the system. Can you do that? Here's a key to the sewer manholes. Don't get killed down there.\n\n<i>[Manholes Unlocked!]</i>": "Канализация использует магический растворитель для очистки и повторного использования отходов, и она должна быть без обслуживания. Ха. Мне нужно, чтобы ты спустился туда и прочистил некоторые засоры в системе. Сможешь справиться? Вот ключ от канализационных люков. Не погибни там.\\n\\n<i>[Люки разблокированы!]</i>"
"Excellent work. Unfortunately I'm sure we'll need more cleaning as soon as next week! The magical solvent doesn't seem to be able to remove certain pests and problems from the waterway.\n\nI'd bother the Council about it, but... Well, it's good that we're able to be self-reliant about this.\n\nTake this with my thanks. If you have time to do more sewer work, there are more specialized problems that need attention.": "Отличная работа. К сожалению, я уверен, что нам понадобится больше уборки уже на следующей неделе! Магический растворитель, похоже, не может удалить некоторых вредителей и проблемы из водного пути.\\n\\nЯ бы пожаловался Совету на это, но... Ну, хорошо, что мы можем справляться сами.\\n\\nПрими это с моей благодарностью. Если у тебя будет время заняться канализацией дальше, есть более специализированные проблемы, требующие внимания."
"There are crystals down in the sewer which remove filth, salt, and any other contaminants from the water. Quite amazing magic! But we do not know how long the magic will last, so each year we test the water. Can you do it this year?\n\nHere is the special beaker I was given. I counted ten pools of water with functioning crystal fountains. Wade into each pool and test the water in the center of the room. The beaker will hum if the water is clean and screech horribly if there is a problem.": "В канализации есть кристаллы, которые удаляют грязь, соль и другие загрязнения из воды. Довольно удивительная магия! Но мы не знаем, как долго она продержится, поэтому каждый год мы проверяем воду. Можешь сделать это в этом году?\n\nВот специальный стаканчик, который мне дали. Я насчитала десять водоёмов с работающими кристальными фонтанами. Зайди в каждый водоём и протестируй воду в центре комнаты. Стаканчик зазвучит, если вода чистая, и ужасно заскрипит, если есть проблема."
"All of the water samples were clean? No screeches from the bottle? Oh, good. I have no idea what we'd do if they weren't working!\n\nDid you happen to notice if the treants are looking well? They were happy to see me last year! Wait.. wait, you aren't a friend of treants! How is that possible? Did the treants attack you?!\n\nI apologize. I should have thought of this earlier: Dreva's boons are not quite the same as Ri-Shin's boons, are they? But fear not, because I believe I can share this one with you.\n\n<i>[Lady Windsong hops around you, and you feel something changing. Sewer treants will no longer be aggressive to you.]</i>": "Все образцы воды были чистыми? Из бутылки не было никаких скрипов? О, хорошо. Я понятия не имею, что бы мы делали, если бы они не работали!\\n\\nТы случайно не заметил, как выглядят древовидные существа? В прошлом году они были рады меня видеть! Подожди... подожди, ты не друг древовидных существ! Как такое возможно? Они напали на тебя?!\\n\\nПрошу прощения. Мне следовало подумать об этом раньше: дары Древы не совсем такие же, как дары Ри-Шина, верно? Но не бойся, я думаю, что смогу поделиться этим с тобой.\\n\\n<i>[Леди Виндсонг подпрыгивает вокруг тебя, и ты чувствуешь, как что-то меняется. Канальные древовидные существа больше не будут агрессивны к тебе.]</i>"
"The Council didn't finish improving this town before they were called away to deal with the demon problem. So we're making do with very expensive magics. For instance, the sewer wasn't finished, so we used a bunch of portals to connect it! Smart, eh? Unfortunately those portals are two-way, and field rats have started living in the sewers, coming out at night to eat the crops in the fields. Can you go deal with the issue? Thanks.": "Совет не успел закончить улучшать этот город, как их вызвали заниматься проблемой демонов. Поэтому нам приходится обходиться очень дорогой магией. Например, канализация не была завершена, и мы использовали множество порталов, чтобы соединить её! Умно, да? К сожалению, эти порталы двунаправленные, и полевые крысы начали селиться в канализации, выходя ночью поедать урожай на полях. Можешь разобраться с этой проблемой? Спасибо."
"That's what I like to hear! Let me give you a bit of money to cover your expenses.": "Вот это я понимаю! Позволь дать тебе немного денег на расходы."
"There are many seashells on the beaches here. I like the pointy ones, and the round shiny ones ... But I really like the shell fragments. I can use them to make little mosaics. It gives me something to do while my wing heals.": "На пляжах здесь много морских раковин. Мне нравятся острые и круглые блестящие... Но больше всего мне нравятся осколки раковин. Я могу использовать их для создания маленьких мозаик. Это занимает меня, пока моё крыло заживает."
"These are shattered just right! Thank you!": "Они разбиты как раз идеально! Спасибо!"
"I keep asking Jaime over there to give me some cheap metal slabs. I just need some junk metal to repair my shields with! But she just tells me to go mine my own ore. So greedy!\n\nHey. Maybe you could get me some metal? Do you know how to survey for ore like she does?": "Я всё время прошу у Хайме там дать мне немного дешёвых металлических слитков. Мне просто нужен какой-нибудь хлам для починки моих щитов! Но она только говорит, чтобы я сам добывал руду. Какая жадина!\\n\\nЭй. Может, ты мог бы достать мне металл? Ты умеешь искать руду, как она?"
"Ah, junk metal. Wow. I guess I've really hit rock bottom, repairing my awesome shields with this crap!\n\nUh, but thanks. For the crap. I appreciate it.": "Ах, металлолом. Вау. Похоже, я действительно опустился на самое дно, ремонтируя свои классные щиты этой дрянью!\\n\\nЭм, но спасибо. За эту дрянь. Я ценю это."
"Let me be clear here: I need SHODDY statues. Not NICE statues. I will not pay for quality!": "Хочу прояснить: мне нужны ПЛОХИЕ статуи. НЕ ХОРОШИЕ статуи. За качество я платить не буду!"
"If these aren't REALLY shoddy, I'm sending 'em RIGHT BACK for a refund.": "Если это не настоящая халтура, я отправлю их обратно за возвратом денег."
"Are you finally ready to take my order? I've been waiting for hours! Yes, I'd like the shroom feast, please. And please try to keep it as ungreasy as possible.": "Ты наконец готов принять мой заказ? Я жду уже несколько часов! Да, я хотел бы грибной пир, пожалуйста. И постарайся, чтобы он был как можно менее жирным."
"Well, there's a bit too much salt, but it's not too greasy! My thanks to the chef.": "Ну, соли немного переборщили, но жирности не слишком много! Спасибо повару."
"Where is my shroom feast? I'm starving!": "Где мой грибной пир? Я умираю с голоду!"
"I'm getting reports that some of the spiders near here are developing some sort of spinneret-related disease. If that's true, I may be able to identify the problem if I can study enough of their spiderwebs.": "Мне поступают сообщения, что некоторые пауки поблизости заражены каким-то заболеванием, связанным с паутинными бородавками. Если это правда, я смогу определить проблему, если изучу достаточно их паутины."
"Good, good. Hmm ... These look pretty normal to me. We'll have to keep an eye on the situation, but right now I don't think we need to take action. ": "Хорошо, хорошо. Хм... Они кажутся мне вполне обычными. Нам нужно будет следить за ситуацией, но сейчас, думаю, вмешиваться не стоит."
"My friend Sie Antry and I share the duty of keeping the monster population thinned out. But recently I feel that Sie's been shirking her duties. Perhaps she's overwhelmed. Can you visit her and see?": "Моя подруга Си Энтри и я вместе следим за тем, чтобы популяция монстров не разрасталась. Но в последнее время мне кажется, что Си стала уклоняться от своих обязанностей. Возможно, она перегружена. Можешь навестить её и проверить?"
"Well, I'm glad she wasn't hurt or anything. Still, she'll have to listen to reason: I spend several days every week clearing the roads, and I've never seen her out there.\n\nYou don't suppose she works evenings while I work mornings, do you? Hah, no, that's the sort of misunderstanding you'd read in a bad adventure poem!": "Ну, я рад, что она не пострадала и всё в порядке. Тем не менее, ей придётся прислушаться к разуму: я провожу несколько дней в неделю, расчищая дороги, и никогда не видел её там.\n\nТы не думаешь, что она работает по вечерам, а я по утрам? Ха, нет, это именно то недоразумение, которое можно встретить в плохом приключенческом стихотворении!"
"Oh, don't you start with me! Hogan hasn't killed a single damned Tor-Urak in months! If it's not right outside his castle gate, he doesn't give a crap about it. I work my ass off, and he has the gall to suggest...\n\nSorry, kid. I don't mean to get you mixed up in this. I'll take it up with him tomorrow.": "О, только не начинай со мной! Хоган не убил ни одного проклятого Тор-Урака уже несколько месяцев! Если это не прямо у ворот его замка, ему плевать на это. Я пашу как проклятый, а он ещё смеет предполагать...\\n\\nИзвини, парень. Не хочу втягивать тебя в это. Я разберусь с ним завтра."
"Hey, you any good at mining? There's silver ore out there in the lowlands, just waiting to be mined! But I don't know how to do that part. I can smelt it, though. Tell you what, bring me some, and I'll give you one of my special silvered swords.": "Эй, ты хорошо разбираешься в горном деле? В низинах есть серебряная руда, которая только и ждёт, чтобы её добыли! Но я не знаю, как это делать. Зато я могу её переплавить. Вот что: принеси мне немного, и я дам тебе один из моих особых серебряных мечей."
"That's the stuff. Here's your sword, hope you like it!": "Вот это да. Вот твой меч, надеюсь, он тебе понравится!"
"Get started! Make simple skinning knives! I'll sell you the recipe. Then make me a bunch. Show your work. I'll grade you on quality and enthusiasm.": "Начинай! Сделай простые ножи для снятия шкур! Я продам тебе рецепт. Затем сделай мне кучу таких ножей. Покажи свою работу. Я оценю тебя по качеству и усердию."
"Hm. Quality is okay. Enthusiasm is not high enough! Be more enthusiastic!": "Хм. Качество приемлемое. Энтузиазма недостаточно! Будь более воодушевлённым!"
"I can't stop thinking about Rita. I know all elves are beneath me, but... oh, if only there was some way! But maybe I'm being a fool... can you find out if she has feelings for me?": "Я не могу перестать думать о Рите. Я знаю, что все эльфы ниже меня, но... ох, если бы только был какой-то способ! Но, может, я дурак... можешь узнать, испытывает ли она ко мне чувства?"
"You see? That proves what they say about elves! A human would know that I can't just \"change my beliefs\" to suit her whim.\n\nHere, Rita gave these to me when I asked her for a token of her favor. It was a joke, I suppose. I can't keep them anymore.": "Видишь? Это доказывает то, что говорят об эльфах! Человек бы понял, что я не могу просто «поменять свои убеждения» ради её прихоти.\n\nВот, Рита дала мне это, когда я попросил у неё знак её расположения. Наверное, это была шутка. Я больше не могу их хранить."
"Sir Coth? That jerk up on the hill that keeps saying elves can't feel true love? I <i>told</i> that guy I'd date him if he just admitted elves are real people. He seems cute enough, but I'm not going to demean myself with an elf-hater.": "Сэр Кот? Тот придурок на холме, который постоянно говорит, что эльфы не способны на настоящую любовь? Я <i>говорила</i> ему, что встречусь с ним, если он признает, что эльфы — настоящие люди. Он вроде милый, но я не собираюсь унижать себя из-за ненавистника эльфов."
"I have a syllabus that would keep you busy for months. I was told to make sure you \"got your Councils' worth\" from your tuition! But in your case, that would just be wasting both of our time. Don't you agree?\n\nLet's skip ahead to the end.\n\nReturn to the metal dodecahedron outside, say 'Ossugazak 99', and kill them with Ice Magic. Don't die. This is your final exam.\n\n<i>[Must use Ice Magic to advance this quest.]</i>": "У меня есть учебный план, который занял бы тебя на месяцы. Мне сказали убедиться, что ты «получишь максимум от Советов» за свою учёбу! Но в твоём случае это просто пустая трата времени для нас обоих. Ты не согласен?\\n\\nДавай сразу перейдём к концу.\\n\\nВернись к металлическому додекаэдру снаружи, скажи «Оссугазак 99» и убей их с помощью Ледяной магии. Не умирай. Это твой финальный экзамен.\\n\\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"I'm not surprised anymore, but I'm impressed.": "Я уже не удивлён, но впечатлён."
"Show me watch you've got.": "Покажи мне свои часы."
"I need more basic metal slabs for my sword designs. Get me some.": "Мне нужно больше простых металлических слитков для моих проектов мечей. Принеси мне немного."
"Good work. Here, take this breastplate. It's inferior to mine, but I'm sure it's better than... whatever that thing is that you're wearing.": "Хорошая работа. Вот, возьми эту нагрудную пластину. Она хуже моей, но, уверен, лучше того, что ты сейчас носишь."
"I need to make fancy tools, but it's hard to find good metal on this island. Can you head to the mainland and survey some good metal slabs for me?": "Мне нужно сделать изящные инструменты, но на этом острове сложно найти хорошее железо. Можешь отправиться на материк и осмотреть для меня хорошие металлические пластины?"
"Perfect, perfect. This is good! Hmm, let me see what I can give you in return. Oh, I have a bunch of useless firewood. Here. Take it! Oh, sure, I can teach you a few toolcrafting tricks too, if you like.": "Отлично, отлично. Это хорошо! Хм, дай-ка посмотрю, что я могу дать тебе взамен. О, у меня есть куча бесполезных дров. Вот, возьми! О, конечно, если хочешь, я могу научить тебя нескольким приёмам кузнечного дела."
"The mantises have been augmenting the oozes in here, making them more dangerous. Morons! But there's a silver lining: their mucus is very useful for potions. If you happen to kill some oozes, can you look for their sludge?": "Богомолы усиливают слизней здесь, делая их опаснее. Болваны! Но есть и положительный момент: их слизь очень полезна для зелий. Если тебе удастся убить несколько слизней, можешь поискать их тину?"
"Ugh. This stuff is gross. Thanks, though. I use it for everything from potions to food seasoning. Hm? Oh, a reward? Uh... here. This is... valuable, maybe?": "Фу. Эта штука отвратительная. Но спасибо. Я использую её для всего — от зелий до приправы для еды. А? О, награда? Э-э... вот. Это... может быть ценно?"
"I have need of small hate pearls. But they must be extraordinarily... fresh, and must come from a living creature. I can't use those worthless manufactured hate pearls!\n\nSpeak with Grasuul to learn what blood is fresh today. Hunt those creatures. But be warned -- some creatures are more hateful than others. I am content to wait a day or two if necessary.": "Мне нужны маленькие жемчужины ненависти. Но они должны быть чрезвычайно... свежими и взяты от живого существа. Я не могу использовать эти никчёмные искусственные жемчужины ненависти!\\n\\nПоговори с Грасуулом, чтобы узнать, чья кровь сегодня свежая. Охоться на этих существ. Но будь осторожен — некоторые существа более злобны, чем другие. Я готов подождать день или два, если потребуется."
"And these all came from the still-beating hearts of living, or at least un-living, creatures? Good... good. You may go.": "И всё это взято из ещё бьющихся сердец живых, или по крайней мере неживых, существ? Хорошо... хорошо. Можешь идти."
"Ugh, I stink. I know it, you don't have to make that face! Ain't bathed in days. Ukorga's out of soap again. What a moron. You got any soap by chance?": "Фу, я воняю. Я знаю, не надо так смотреть! Несколько дней не мылся. У Укорги опять закончился мыло. Какой же он идиот. Случайно у тебя нет мыла?"
"Great. Now get lost so I can bathe. Here's some cash for your trouble.": "Отлично. Теперь проваливай, чтобы я мог принять ванну. Вот немного денег за твои хлопоты."
"Last time I was banished from the Winter Court, I had the good sense to prepare first. But this time I was caught off-guard. I miss some of the silliest things, like the desserts served with military meals. If you wage battle with Winter Court Scouts, please search the fallen for candied ice beetles. I'll reward you!\n\nIt may be hard to find a scout that hasn't eaten all their beetles yet... I know! Look for especially thin scouts.": "В прошлый раз, когда меня изгнали из Зимнего Двора, у меня хватило ума подготовиться заранее. Но в этот раз меня застали врасплох. Я скучаю по самым глупым вещам, например, по десертам, которые подают с военными обедами. Если будешь сражаться с разведчиками Зимнего Двора, пожалуйста, ищи среди павших засахаренных ледяных жуков. Я тебя вознагражу!\n\nМожет быть трудно найти разведчика, который ещё не съел всех своих жуков... Знаю! Ищи особенно худых разведчиков."
"Wonderful! Mmm... actually... these beetles are vile. Too much pixie sugar, not enough ice. I knew they were terrible! I have an excellent memory. But once I couldn't have them anymore, I started craving them. I seem to be losing my objectivity: my memories of home are becoming a maudlin soup. This angers me! For I despise soup.\n\nThat's a joke. Nevermind. Here: Floxie suggested this recipe to take my mind off the beetles, but now I don't need it.": "Прекрасно! Ммм... на самом деле... эти жуки отвратительны. Слишком много пикси-сахара, недостаточно льда. Я знала, что они ужасны! У меня отличная память. Но когда я больше не могла их есть, я начала их желать. Кажется, я теряю объективность: мои воспоминания о доме превращаются в слащавый суп. Это меня злит! Ведь я ненавижу суп.\\n\\nЭто шутка. Забудь. Вот: Флокси предложила этот рецепт, чтобы отвлечь меня от жуков, но теперь он мне не нужен."
"Some random wanderer told me that in a far off land, they make armor out of snail shells using the same techniques I use to make tools. Ridiculous, isn't it?\n\nGo find out if it's true. Search far and wide! Leave no stone unturned!\n\nWell, if you want a hint, sure... I heard that some inn keeper in Eltibule is an expert at using snail bits.": "Какой-то случайный странник рассказал мне, что в далёкой стране делают доспехи из раковин улиток, используя те же техники, что и я для изготовления инструментов. Смешно, правда?\\n\\nОтправляйся и узнай, правда ли это. Ищи повсюду! Не оставляй ни одного камня на месте!\\n\\nНу, если хочешь подсказку, пожалуйста... Я слышал, что один хозяин трактира в Элтибуле — эксперт в использовании частей улиток."
"These boots are hideous! But I like them! You are industrious. Let me show you some clever toolcrafting techniques usually only taught to goblins.": "Эти сапоги ужасны! Но мне они нравятся! Ты трудолюбив. Позволь показать тебе несколько хитрых приёмов кузнечного дела, которые обычно учат только гоблинов."
"Why did you take so long to show up? It's because I said I needed help with snails, isn't it? You aren't taking me seriously! These aren't normal snails, they're huge snails! Bigger than a cow! BIGGER THAN A COW!\n\nAn incredible number of snails have hatched and they're ruining everything. They're in the east, they're in the west... at least they aren't in the north, but that's only because the horrible gnashers and uraks can eat them. They're EVERYWHERE ELSE! And guess what snails eat? GRASS! They eat my herd's food! So maybe it's not life or death today, but just you wait! I had to call for help! So get to it, Warden!": "Почему ты так долго появляешься? Это потому, что я сказала, что мне нужна помощь со слизнями, да? Ты меня не воспринимаешь всерьёз! Это не обычные слизни, это огромные слизни! Больше коровы! БОЛЬШЕ КОРОВЫ!\\n\\nНевероятное количество слизней вылупилось, и они всё портят. Они на востоке, они на западе... по крайней мере, их нет на севере, но это только потому, что ужасные гнаши и ураки могут их съесть. Они ВЕЗДЕ ИНОГДА! И знаешь, что едят слизни? ТРАВУ! Они едят еду моего стада! Так что, может, сегодня это не вопрос жизни и смерти, но просто подожди! Мне пришлось звать на помощь! Так что берись за дело, Хранитель!"
"Well, that's a few snails down... maybe that's enough... but if there's still too many snails out here in a few days, I'm calling you again! You can't just leave a whole herd of cows to die! You're wardens! And I DEMAND... okay... I'm calming down... deep moos... deep moos... look, I've been pretty wound up about these snails. I don't mean to be rude. Here: this is a little snack for your trouble!": "Ну, несколько улиток убрано... может, этого достаточно... но если через несколько дней здесь всё ещё будет слишком много улиток, я снова позову тебя! Нельзя просто так оставить целое стадо коров умирать! Вы же смотрители! И я ТРЕБУЮ... ладно... я успокаиваюсь... глубокие мычания... глубокие мычания... слушай, я был слишком взволнован из-за этих улиток. Не хочу быть грубым. Вот: это небольшой перекус за твои труды!"
"I've got reliable reports that there are dangerous winter fairies hiding out somewhere in the sewer. They apparantly hide out in two of the big sewage-sieve rooms. Better take care of both rooms.": "У меня есть надёжные сведения, что где-то в канализации прячутся опасные зимние феи. По-видимому, они скрываются в двух больших камерах с решётками для сточных вод. Лучше разобраться с обеими камерами."
"Did they give you any trouble? Fairies can be dangerous! But you seem to have handled it well. I shouldn't have worried.": "Они доставили тебе какие-нибудь проблемы? Феи могут быть опасны! Но, похоже, ты справился хорошо. Мне не стоило волноваться."
"I thought this stupid magic fire would keep me warm, but it keeps shutting out! I guess I need to put firewood in it. Like a savage. But I'm too cold to go looking for wood... could you bring me some?": "Я думал, что эта глупая магическая печка согреет меня, но она всё время гаснет! Похоже, мне нужно подкладывать дрова. Как дикарь. Но я слишком замёрз, чтобы идти за дровами... не мог бы ты принести мне немного?"
"Thanks! This will keep me warm for a little while. I appreciate it! I don't have much to give you in exchange, but here's a few coins.": "Спасибо! Это согреет меня ненадолго. Я очень благодарен! У меня мало чего есть, чтобы отдать тебе взамен, но вот несколько монет."
"I just don't understand how the necromancers convince their skeletons to mine! I'm not a necromancer myself, but I thought it was difficult to get them to do anything besides attack. Maybe there's a secret in the bones. Kill some and see if there's anything special about them.": "Я просто не понимаю, как некроманты заставляют своих скелетов копать! Я сам не некромант, но думал, что их трудно заставить делать что-то, кроме как атаковать. Может, в костях есть какой-то секрет. Убей несколько и посмотри, есть ли в них что-то особенное."
"They just looked like bones, you say? Did you hit enough of them? Nothing special? Hm. Fascinating. By which I mean not fascinating. Maybe there's a better test...": "Они просто выглядели как кости, говоришь? Ты достаточно их ударил? Ничего особенного? Хм. Увлекательно. То есть совсем не увлекательно. Может, есть лучший способ проверить..."
"I've been trying to fill this book order for a long time! I have most of the requested titles but she only wants a 100% complete order. Here's the books I need.": "Я уже долго пытаюсь выполнить этот заказ на книги! У меня есть большинство запрошенных изданий, но она хочет получить заказ на 100% полный. Вот книги, которые мне нужны."
"I'm pretty impressed. You must know your way around a used book store! Thank you so much. I'll give you your cut now, before the delivery is even made!": "Я впечатлён. Ты явно разбираешься в подержанных книжных магазинах! Большое спасибо. Я сейчас же отдам тебе твою долю, даже до того, как доставка будет сделана!"
"Ya know, this banana scheme really brought back memories. Me and my best friend Mophew used to run all kinds of crazy schemes like this! But he... died.\n\nNot really. He didn't die and that's the scary part! He <i>womanized</i>. I knew he was gay, and that was safe, you know? Mop was cute, but I'm not gay, so it wasn't a big deal. But now he's got knockers and he doesn't smell the same and I just... I don't know how to be his friend anymore. Her friend. You know?\n\nBut it seems crazy not to try to fix this somehow. Can you go and talk to him? Just get a feeling for where he's at mentally. He goes by Tessa now and works in the kitchen most days.": "Знаешь, эта банановая история действительно вызвала воспоминания. Мы с моим лучшим другом Мофью раньше устраивали всякие сумасшедшие схемы! Но он... умер.\\n\\nНа самом деле нет. Он не умер, и это самое страшное! Он стал <i>женщиной</i>. Я знал, что он гей, и это было безопасно, понимаешь? Моп был симпатичным, но я не гей, так что это не было большой проблемой. Но теперь у него грудь, и он пахнет иначе, и я просто... не знаю, как быть его другом теперь. Её другом. Понимаешь?\\n\\nНо кажется безумным не попытаться как-то это исправить. Можешь пойти и поговорить с ним? Просто почувствовать, как у него с головой. Сейчас он зовётся Тессой и большую часть времени работает на кухне."
"He said he loved me?\n\n<i>[Sourgum strokes his beard.]</i>\n\nWell, I guess the news is mixed at best. But he'll come see me when he's ready. That's good news, and I'll focus on that.\n\n<i>She.</i> She'll come see me. I'll get it through my brain eventually.": "Он сказал, что любит меня?\\n\\n<i>[Соргам гладит бороду.]</i>\\n\\nНу, думаю, новости в лучшем случае смешанные. Но он придёт ко мне, когда будет готов. Это хорошие новости, и я сосредоточусь на этом.\\n\\n<i>Она.</i> Она придёт ко мне. Рано или поздно я это осознаю."
"So Sourgum finally wants to talk, huh? Except he sent you to do the talking.\n\n<i>[Tessa sighs.]</i>\n\nI knew he had the hots for me before. And if he'd made a pass at me when I was a guy I would have taken him up on it. But now, I don't know what he's feeling. And I don't think he does either. Is he attracted? Disgusted? Both?\n\nAll I know is that he abandoned me when I needed a friend the most. I know it was traumatizing to him, but think about how I felt!\n\nI'll get over it, I think. But right now, I'm going through my own trauma and I can't help him with his. Tell him I love him and he's a shit friend and he should leave me alone. When I'm able to, I'll come talk to him.": "Так вот Соргум наконец-то хочет поговорить, да? Только он послал тебя говорить вместо себя.\n\n<i>[Тесса вздыхает.]</i>\n\nЯ знала, что он раньше был ко мне неравнодушен. И если бы он сделал мне предложение, когда я был парнем, я бы согласилась. Но теперь я не знаю, что он чувствует. И, думаю, он сам этого не понимает. Его привлекаю я? Его отвращает? Или и то, и другое?\n\nВсё, что я знаю, — он бросил меня, когда я больше всего нуждалась в друге. Я понимаю, что для него это было травматично, но подумай, каково было мне!\n\nДумаю, я переживу это. Но сейчас я сама переживаю свою травму и не могу помочь ему с его. Скажи ему, что я люблю его, но он — плохой друг и пусть оставит меня в покое. Когда я смогу, я сама с ним поговорю."
"I know sticks. If it's one thing I know, that's it. That and finding precious resources. But mainly sticks, and I realized if I could coat the top half of my walking stick with a thick candy coat, I could lick the stick while I walk! ... it's childish, sure, but it would sell to the day-hikers of Statehelm! Any gimmick gets attention.\n\nThis is our ticket to riches: I'm cutting you in. You just need to do some legwork for us. First, I just need some food-grade wax. You do know you're way around a wax station, right? Great, great. Here's the recipe we need. Make us some of this.": "Я разбираюсь в палках. Если есть что-то, в чём я силён, так это в этом. И в поиске ценных ресурсов. Но в основном в палках, и я понял, что если покрыть верхнюю часть моей трости толстым слоем карамели, я смогу лизать её, пока иду! ... это по-детски, конечно, но это понравится дневным туристам Стейтхелма! Любой трюк привлекает внимание.\\n\\nЭто наш билет к богатству: я делюсь с тобой. Тебе просто нужно сделать немного работы для нас. Сначала мне нужен пищевой воск. Ты же умеешь работать с восковой мастерской, правда? Отлично, отлично. Вот рецепт, который нам нужен. Сделай нам немного этого."
"That's the hard part done! Now you just need to collect the other few things.": "Самое трудное уже сделано! Теперь тебе осталось собрать ещё несколько вещей."
"The wax was the hard part of my recipe. The rest is just candymaking. Here's what I need:": "Воск был самой сложной частью моего рецепта. Остальное — просто приготовление сладостей. Вот что мне нужно:"
"Great work. Leave the rest to me -- I've never made candy before, but I don't think it can be that hard. We're gonna be rich! Come see me tomorrow and I'll give you a sample.": "Отличная работа. Остальное оставь мне — я никогда раньше не делал конфеты, но не думаю, что это так сложно. Мы разбогатеем! Загляни ко мне завтра, и я дам тебе образец."
"I was in my cups yesterday -- that's sailor slang, you probably don't know it -- it means I was EXTREMELY drunk. I've picked up a lot of sailor slang, but everyone knows I'm afraid of the ocean. On account of the krakens. So I pass out and when I wake up there's a note that says 'Your salami went sailing, come find us!'\n\nHa ha very funny, but the thing is, that salami was my latest experiment in creating the legendary Ur-Salami. And it seems to be a failed experiment! If anyone eats that salami, well... I might get in a lot of trouble. You gotta help.\n\nI bet those fuckers hid my salami aboard the ships out there. They would have stayed away from the Salty Slattern, if that's any help to ya. You should hurry. The stench is evil. And no snacking on it!": "Вчера я был в своём репертуаре — это морской сленг, ты, наверное, не знаешь — значит, я был ОЧЕНЬ пьян. Я выучил много морского сленга, но все знают, что я боюсь океана. Из-за кракенов. Так вот, я отключился, а когда проснулся, там была записка: «Твоя салями уплыла, иди ищи нас!»\n\nХа-ха, очень смешно, но дело в том, что эта салями была моим последним экспериментом по созданию легендарной Ур-Салями. И, похоже, эксперимент провалился! Если кто-то съест эту салями, ну... у меня могут быть большие проблемы. Ты должен помочь.\n\nБьюсь об заклад, эти ублюдки спрятали мою салями на кораблях там. Они бы держались подальше от Солёной Слэттерн, если тебе это поможет. Тебе стоит поторопиться. Запах ужасен. И ни в коем случае не перекусывай ею!"
"Good work there. And it's well time that I throw all of this rotten salami away. I'd been keeping it just in case it gained sentience, but it's not meant to be.\n\nBut don't you worry. I have new schemes to get rich that'll be way easier than giving unlife to cured meat! Will ya help me? You've got an eye for adventure! Or whatever. Just help.\n\nC'mon.": "Хорошая работа. Пора выбросить всю эту протухшую салями. Я держал её на всякий случай, если она вдруг оживёт, но этому не суждено случиться.\\n\\nНо не волнуйся. У меня есть новые планы разбогатеть, которые будут гораздо проще, чем дарить жизнь вяленому мясу! Поможешь мне? У тебя есть чутьё на приключения! Или как там. Просто помоги.\\n\\nДавай."
"Something unexpected happened when I was making the candy for the staves. It had to be a fluke because I didn't expect it! Anyway, the candy's ruined. Everything's ruined. My hopes, my dreams...\n\nHaha, just kidding! I have a new, better idea. This is really my best one yet: cinammon-coated bananas! No. Cinnamon-BLASTED bananas! I think I have the perfect marketing strategy for 'em so bring me several samples.": "Что-то неожиданное случилось, когда я делал конфеты для посохов. Это должно было быть случайностью, потому что я не ожидал этого! В любом случае, конфеты испорчены. Всё испорчено. Мои надежды, мои мечты...\\n\\nХа-ха, шучу! У меня есть новая, лучшая идея. Это действительно моя лучшая идея на сегодняшний день: бананы в корице! Нет. Бананы, взорванные корицей! Думаю, у меня есть идеальная маркетинговая стратегия для них, так что принеси мне несколько образцов."
"Perfect texture! I'm going to shop these to my buddy Slim over at the 'Bat. Catch me tomorrow for the good news!": "Идеальная текстура! Я собираюсь показать это своему приятелю Слиму из «Летучей мыши». Загляни ко мне завтра за хорошими новостями!"
"See?! What did I tell you? We're gonna be rich! Slim wants a HUNDRED orders of those cinnamon-blasted bananas! And I'll split the profits with you right down the line! That's an old pirate term, you probably don't know it. It means an even split of the loot!\n\nGet to cookin' and don't let us down!": "Видишь?! Что я тебе говорил? Мы разбогатеем! Слим хочет СОТНЮ заказов на эти проклятые бананы с корицей! И я поделюсь прибылью с тобой поровну! Это старый пиратский термин, ты, наверное, не знаешь. Он означает равный раздел добычи!\\n\\nПринимайся за готовку и не подведи нас!"
"Took you a while, huh? Maybe next time you could put your jib into it. Because in the time it took you, Sage lost some interest in the product. Don't worry, I still managed to secure a decent profit. Here's your share.\n\nHooray, if we didn't live in an expensive city, we'd be kinda rich!\n\nEh. I feel hollow. But I'll have a new money-making idea soon!": "Ты задержался, да? Может, в следующий раз постараешься получше. Потому что за то время, что ты возился, Мудрец потерял интерес к товару. Не волнуйся, мне всё же удалось получить неплохую прибыль. Вот твоя доля.\\n\\nУра, если бы мы не жили в дорогом городе, мы были бы довольно богаты!\\n\\nЭх. Чувствую пустоту. Но скоро у меня появится новая идея для заработка!"
"One of our VIP guests has requested a special variety of bread, and I do not know how to make it! Another guest told me that a human somewhere in Kur can teach the recipe, but of course that helps me very little. I am in dire need of this 'vegan nut barley bread', so if you manage to bake some, please bring it to me!": "Один из наших VIP-гостей заказал особый сорт хлеба, а я не знаю, как его приготовить! Другой гость сказал, что где-то в Куре человек может научить рецепту, но, конечно, это мне мало помогает. Мне очень нужен этот «веганский орехово-ячменный хлеб», так что если тебе удастся его испечь, пожалуйста, принеси мне!"
"This is the bread? It smells... like bread. But my sensory organs are perhaps not as attuned to bread smells. Thank you, friend. Here is money for your trouble.": "Это хлеб? Он пахнет... хлебом. Но мои органы чувств, возможно, не так хорошо настроены на запахи хлеба. Спасибо, друг. Вот деньги за твои хлопоты."
"I need your help! Rumor is that General Pask may be coming for dinner soon! That's pretty terrifying, but his endorsement would really help my restaurant. I want to impress him with my masterpiece dish, but I need an exotic spice and I can't find it in the market! It's called 'oregano'. I don't know where it comes from, but it's definitely not from around here. Can you get me some?": "Мне нужна твоя помощь! Ходят слухи, что генерал Паск скоро придёт на ужин! Это довольно страшно, но его одобрение очень поможет моему ресторану. Я хочу впечатлить его своим шедевром, но мне нужна экзотическая специя, и я не могу найти её на рынке! Она называется «орегано». Я не знаю, откуда она, но точно не отсюда. Можешь достать мне немного?"
"That's it! Oregano! I'm saved! Thank you. Here, let me pay you for your time.\n\nAnd, hey, if you wanted to help me make the meal, come hang out with me some time soon.": "Вот оно! Орегано! Я спасён! Спасибо. Вот, позволь заплатить тебе за потраченное время.\\n\\nИ, кстати, если хочешь помочь мне приготовить еду, заходи ко мне как-нибудь в ближайшее время."
"Yes, actually... can you grab me some spider legs? I need them for new potions. Big or small, doesn't matter. ": "Да, собственно... можешь достать мне несколько паучьих ног? Они нужны для новых зелий. Большие или маленькие — не важно."
"Thanks! Hope it wasn't a big hassle. Here's something for your trouble.": "Спасибо! Надеюсь, это не доставило тебе больших хлопот. Вот тебе за старания."
"Want to help troll friends? Help with spiders on fire! Walk around all over near Firebird Mountain. Very scary to trolls. You kill. Good relations.": "Хотите помочь друзьям-троллям? Помогите с горящими пауками! Обойдите окрестности горы Фаерберд. Для троллей это очень страшно. Вы убиваете. Хорошие отношения."
"You kill spiders, Solgribue likes! Maybe tell troll friends you good. Maybe.": "Ты убиваешь пауков, Солгрибу это нравится! Может, скажешь троллям, что ты хороший. Может быть."
"There should be plenty of grazing space for the herd, but all these weird monsters are making life tough. Maybe if some of the fire spiders east of here were to mysteriously die...": "Для стада должно быть достаточно пастбища, но все эти странные монстры усложняют жизнь. Может быть, если некоторые огненные пауки к востоку отсюда таинственным образом погибнут..."
"Um... I wanted mysterious deaths that wouldn't draw too much attention. You just wandered out and murdered those fire spiders!\n\nI guess that's better than nothing. Let's just hope you didn't draw too much attention to Eltibule.": "Эм... Мне нужны были загадочные смерти, которые не привлекали бы слишком много внимания. А ты просто вышел и убил этих огненных пауков!\\n\\nПолагаю, это лучше, чем ничего. Будем надеяться, что ты не привлёк слишком много внимания к Элтибулю."
"Do you like my clothes? A wandering elven bard taught me how to make them! They're much stronger than they look, too. One of the secrets is spider silk, a cloth that's made from spiderwebs. I buy it from Shirogin, but he's been out of stock for months. If you find some spider silk, I'd love to buy it from you.": "Тебе нравится моя одежда? Бродячий эльфийский бард научил меня её делать! Она гораздо прочнее, чем кажется. Один из секретов — паучий шелк, ткань, сделанная из паутины. Я покупаю её у Широгина, но у него уже несколько месяцев нет в наличии. Если найдёшь паучий шелк, я с радостью куплю его у тебя."
"Oh thank you! This spider silk is enough to make a new pair of pants. Here's your money. And hey, take my old pair of pants, too. There's a hole in the crotch, but nobody will notice.": "О, спасибо! Этого паучьего шелка достаточно, чтобы сшить новые штаны. Вот твои деньги. И кстати, забирай мои старые штаны тоже. В шаговом шве дырка, но никто не заметит."
"This is it! The Spike of Autonomy! This is a toy I invented in my youth. It was lost long ago. How could it be here? This is surely a recreation, but it so perfectly matches my memory.\n\nThank you.": "Вот оно! Шип Автономии! Это игрушка, которую я изобрёл в молодости. Она была потеряна давным-давно. Как она могла оказаться здесь? Это, без сомнения, воссоздание, но оно так точно совпадает с моими воспоминаниями.\\n\\nСпасибо."
"Someone has stolen all the spoons from our tea set. Please hurry. The tea is not getting any fresher.": "Кто-то украл все ложки из нашего чайного сервиза. Поторопитесь, чай не становится свежее."
"Do you know how to make spore bombs? I need some nice potent ones. I use 'em to scare away pests that get on the farm.": "Ты умеешь делать споровые бомбы? Мне нужны хорошие мощные. Я использую их, чтобы отпугивать вредителей на ферме."
"Ahh! Yep, those will do. Thank you! Now as long as the critters stay small, I'm all set. Say, did I ever tell you about the time I saw a giant wolf prowling out in the field at night? Biggest damned wolf! It was a full moon so I could see it perfectly. And I swear... it was eating my grapes! What a wolf would want with grapes, I can't guess. But I know these spore bombs would just piss it off! Haha! Oh, since I'm talking your ear off anyway, let me teach you the best way to throw one of these bombs.": "Ах! Да, эти подойдут. Спасибо! Теперь, пока эти твари остаются маленькими, я полностью готов. Кстати, рассказывал ли я тебе когда-нибудь о том, как видел гигантского волка, бродящего по полю ночью? Самый чёртовски большой волк! Луна была полной, так что я видел его отлично. И клянусь... он ел мои виноградины! Зачем волку виноград, не могу понять. Но я знаю, что эти споровые бомбы его точно разозлят! Ха-ха! О, раз уж я всё равно тебя отвлекаю, позволь научить тебя, как лучше всего бросать одну из этих бомб."
"You're getting the hang of this! Keep spreading your messages to the sheep of Statehelm!": "У тебя получается! Продолжай распространять свои послания среди овец Стейтхелма!"
"Excellent work. I'm sure you've noticed that your skill in other areas of art are improving through this practice. Everything is connected.": "Отличная работа. Я уверен, ты заметил, что твои навыки в других областях искусства улучшаются благодаря этой практике. Всё взаимосвязано."
"Oh hey, I had another botany idea. No, this one's great! See, you got me carnivine teeth, but I have nothing really to compare them to. Why don't you ALSO get me some spriggan weed teeth? Then I can compare them! Go, go! There's science to do!": "О, привет, у меня появилась ещё одна ботаническая идея. Нет, эта отличная! Видишь, у тебя есть зубы плотоядного растения, а у меня нет ничего, с чем можно было бы их сравнить. Почему бы тебе не сделать мне ещё и зубы сорняка сприггана? Тогда я смогу их сравнить! Вперёд, вперёд! Нужно заняться наукой!"
"Okay, so these teeth are very much not like the other teeth. The carnivines grow wood-like plates, but the spriggan weed teeth are little nuggets of hard stuff.\n\nTherefore it's my expert opinion that carnivines are completely unrelated to spriggan weeds. Science accomplished! This is fun! Oh speaking of botany, here's some exotic seeds I found for you!": "Хорошо, эти зубы совсем не похожи на другие зубы. Хищные растения выращивают древесные пластины, а зубы сорняков спригган — это маленькие кусочки твёрдого материала.\\n\\nПоэтому, по моему экспертному мнению, хищные растения совершенно не связаны с сорняками спригган. Наука сделала своё дело! Это весело! Кстати, раз уж заговорили о ботанике, вот несколько экзотических семян, которые я для тебя нашёл!"
"It'll soon be time for outdoor grilling again! And my grill was destroyed by orcs. But I can fix it! What I can't fix is the lack of fuel. How can I make perfect food without perfect fuel? It's impossible! I need spruce wood chips!": "Скоро снова наступит время для барбекю на свежем воздухе! А мой гриль уничтожили орки. Но я могу его починить! То, что я не могу починить — это отсутствие топлива. Как я могу приготовить идеальную еду без идеального топлива? Это невозможно! Мне нужны щепки из еловой древесины!"
"A bushel of wood chips, and I can smell their spruciness! You've made me very happy.": "Корзина древесной стружки, и я чувствую их хвойный аромат! Ты меня очень порадовал."
"I sure could use a huge pile of spruce wood chips.": "Мне бы очень пригодилась большая куча опилок из ели."
"Since you're a Warden, maybe you can help me fix an imbalance. Ever since the rakshasa fishermen stopped coming to the river, the squid-beasts are getting out of control. They're even climbing out onto land now. They attack anything that comes near! It's making it hard for animals to get water. Can you remove some of the squids?": "Поскольку ты Страж, может, поможешь мне исправить дисбаланс. С тех пор как рыбачки-ракшасы перестали приходить к реке, кальмароподобные звери вышли из-под контроля. Теперь они даже выползают на сушу. Они нападают на всё, что приближается! Из-за этого животным трудно добраться до воды. Можешь убрать часть кальмаров?"
"I appreciate the help with the squid beasts! Now maybe I can catch a fish in peace!": "Спасибо за помощь с кальмарообразными зверями! Теперь, может быть, я смогу спокойно поймать рыбу!"
"Looking through the viewer, you think you see a figure waving and trying to get your attention. Unfortunately, it's too fuzzy to make out -- the lenses on the stargazer have been scratched badly.": "Смотря через визор, ты думаешь, что видишь фигуру, которая машет и пытается привлечь твоё внимание. К сожалению, изображение слишком размыто, чтобы разглядеть — линзы у звездочёта сильно поцарапаны."
"You swap out the stargazer's lenses like an old pro. Now you should be able to get a better view.": "Ты меняешь линзы звездочёта, как настоящий профессионал. Теперь ты должен получить лучший обзор."
"Whenever a streetlight stays broken for too long, a miserable myconian vagabond sprouts up. They attack anyone who gets too near, making them dangerous. These varieties are not intelligent enough to communicate with, so they must be removed! Safely!\n\n<i>[Progress is lost if you die.]</i>": "Каждый раз, когда уличный фонарь долго не чинят, появляется несчастный мигонианский бродяга. Они нападают на всех, кто подходит слишком близко, делая их опасными. Эти разновидности недостаточно умны, чтобы с ними можно было общаться, поэтому их нужно устранить! Безопасно!\\n\\n<i>[Прогресс теряется при смерти.]</i>"
"A job well done. Of course, trying to stop the growth of fungus is a doomed adventure. But doomed adventures are the ones they write about in the history books, right? No, that doesn't make sense here.": "Отлично выполненная работа. Конечно, пытаться остановить рост грибка — обречённое дело. Но именно об обречённых приключениях пишут в исторических книгах, верно? Нет, здесь это не совсем подходит."
"There are a LOT of muggers out tonight. You could make a big improvement to the city's safety by exterminating a bunch of them before the scurry back into whatever hole they came out of. But you know that your safety is paramount: you mustn't die on such a mundane errand!\n\n<i>[Quest can only be advanced at night.]</i>\n<i>[Progress is lost if you die.]</i>": "Сегодня ночью очень много грабителей. Ты мог бы значительно повысить безопасность города, уничтожив их кучу, прежде чем они убежат обратно в свои норы. Но ты знаешь, что твоя безопасность превыше всего: нельзя умирать из-за такой обыденной задачи!\n\n<i>[Задание можно выполнять только ночью.]</i>\n<i>[Прогресс теряется при смерти.]</i>"
"A job well done. Of course, due to their incredible reproductive prowess, a new generation of ratkin will soon replace the ones you've slain. There will be just as many ratkin out tomorrow night -- but they'll be a little less smug about it.": "Отлично выполненная работа. Конечно, благодаря их невероятной плодовитости, новое поколение крысолюдей скоро заменит тех, кого ты уничтожил. Завтра ночью крысолюдей будет столько же — но они будут немного менее самодовольны."
"I wonder if there's any new discoveries about the demons. If you could bring me some more demonic research, I'd be grateful.": "Интересно, есть ли новые открытия о демонах. Если ты принесёшь мне ещё исследований о демонах, я буду признателен."
"Interesting. Nothing too groundbreaking, but there might be something in here I can use for a dish.": "Интересно. Ничего особо выдающегося, но здесь может быть что-то, что я смогу использовать для блюда."
"Snapley told me the pitiful tale of the settlement outside. Here is a detail he did not know: the strike was ordered by General Naurlok himself, and was executed by his elite legion. And here is where things become interesting. For you see, ghosts often retain something of what they had when they died. And if they died with spear heads from Naurlok's Avengers still stuck in them... that metal is precious! I cannot even make it myself.\n\nYou should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.": "Снэпли рассказал мне жалкую историю о поселении снаружи. Вот деталь, которую он не знал: удар был приказан самим генералом Наурлоком и выполнен его элитным легионом. И вот где начинается самое интересное. Видишь ли, призраки часто сохраняют что-то от того, что у них было при жизни. А если они умерли с наконечниками копий из легиона Мстителей Наурлока, всё ещё застрявшими в них... этот металл драгоценен! Я даже сам не могу его сделать.\n\nТебе следует уничтожить некоторых из этих призраков и попытаться найти орочий металл. Я заплачу советами."
"Ha ha! I knew it! This steel will make a monstrous new hammer! You have done well!": "Ха-ха! Я знал! Эта сталь станет основой для чудовищного нового молота! Ты молодец!"
"I'm making some armor as a gift for my niece Stephie. It's a new neck-guard for the suit I made her.\n\nI need some parts, and I can't ask Stephie to get them for me or she'd know my plan. Can you do it? I'll give you some xogrite.": "Я делаю доспехи в подарок моей племяннице Стефи. Это новый защитник шеи для доспеха, который я ей сделал.\\n\\nМне нужны некоторые детали, и я не могу просить Стефи достать их для меня, иначе она узнает о моём плане. Ты можешь это сделать? Я дам тебе немного ксогрита."
"Hmm, these agates are shit. But they'll do, they'll do. I'm in a hurry. Here's your pay. And if it seems paltry, remember my gratitude is part of your payment!": "Хмм, эти агаты — отстой. Но сойдёт, сойдёт. Я спешу. Вот твоя плата. И если она кажется скудной, помни, что моя благодарность — часть твоей награды!"
"I'm sorry to say this, but the last cheese didn't work out either. But this time I know exactly what's needed. I called in some expert help! I need a 'brunost' cheese, it's the best for the cheap wine I've been usin'. Guaranteed ta work this time. I fuckin' hope.": "С сожалением сообщаю, что последний сыр тоже не получился. Но на этот раз я точно знаю, что нужно. Я позвал экспертов на помощь! Мне нужен сыр «бруност», он лучший для дешёвого вина, которое я использовал. Гарантирую, что на этот раз сработает. Чёрт возьми, надеюсь."
"Ugh, this is the rankest cheese ya've brought me yet! And hopefully the last! Dwarves weren't made to eat cheese, I tell ya!": "Фу, это самый вонючий сыр, что ты мне приносил! И, надеюсь, последний! Гномы не созданы для того, чтобы есть сыр, говорю тебе!"
"Before I head off into the wilderness to collect gems, I should fill up on healing potions. Do you have any? I just need the weak kind -- the strong ones make me sick to my stomach.": "Прежде чем отправиться в дикую природу собирать драгоценные камни, мне нужно запастись лечебными зельями. У тебя есть? Мне нужны только слабые — сильные вызывают у меня тошноту."
"Perfect! When a tiger takes a bite out of you, nothing like these little cherry-flavored babies to fix you back up!": "Отлично! Когда тигр вгрызается в тебя, нет ничего лучше этих маленьких вишнёвых таблеток, чтобы тебя привести в порядок!"
"Big stomachs, small stomachs, good stomachs, evil stomachs, I don't care. Just get me stomachs for my cheesemaking!": "Большие желудки, маленькие желудки, хорошие желудки, злые желудки — мне всё равно. Просто принесите мне желудки для моего сыроварения!"
"I wish I was a butcher. They must be overflowing with animal stomachs! But not me. My last batch of cheese used vegetarian rennet. Eugh! If you find some stomachs, save me a few, would you?": "Хотел бы я быть мясником. У них должно быть полно желудков животных! Но не у меня. Моя последняя партия сыра была сделана с использованием вегетарианского сычужного фермента. Фу! Если найдёшь несколько желудков, прибережи мне пару, хорошо?"
"Ohh perfect! These are perfect! I'm going to make some rennet right now.\n\nLooks like I have too many of these, would you like them?": "Ох, идеально! Они просто идеальны! Я сейчас же сделаю сычужный фермент.\\n\\nПохоже, у меня их слишком много, хочешь забрать?"
"That drunkard Ukorga asked me to make him some meditation stools to decorate his inn. That'd be a waste of time. I need to focus on honing my skills! But I already told him I'd do it. Can I delegate that task to you?": "Тот пьяница Укорга попросил меня сделать ему несколько медитационных табуретов для украшения его трактира. Это пустая трата времени. Мне нужно сосредоточиться на оттачивании своих навыков! Но я уже пообещал, что сделаю это. Могу я поручить эту задачу тебе?"
"Hmm, yep, these are decent, thanks! I'll give you the money Ukorga promised me for these stools.": "Хмм, да, эти скамейки неплохие, спасибо! Я дам тебе деньги, которые Укорга обещал за эти скамейки."
"You received a reward for your hard work in fighting back the aktaari threat.": "Вы получили награду за усердную борьбу с угрозой актаари."
"A favor? Oh, well, I'm out of dirt. Not just regular dirt, you understand -- the strange dirt you sometimes find under mushrooms or corpses. It has a million uses! Most people use it for fertilizer, but I use it in potions. I just use a lot of sugar to mask the taste.": "Услуга? Ох, у меня закончилась земля. Не просто обычная земля, понимаешь — та странная земля, которую иногда находишь под грибами или трупами. У неё миллион применений! Большинство используют её как удобрение, а я — в зельях. Просто добавляю много сахара, чтобы замаскировать вкус."
"Ah, smell that dirt. It's... pretty smelly, actually. I guess I never really sniffed it before. Hm. Not the most appetizing potion ingredient, is it? Ha ha, no matter -- I use it because it has tiny fragments of soul stuck in it, not because it tastes good!": "Ах, почувствуй этот запах земли. На самом деле... довольно вонючий. Похоже, я раньше никогда по-настоящему не нюхал её. Хм. Не самый аппетитный ингредиент для зелья, правда? Ха-ха, неважно — я использую её потому, что в ней застряли крошечные частицы души, а не из-за вкуса!"
"You can feel a surge of energy when you touch the instrument -- a clear sign of magical intent. The instrument makes a pitiful note and then is silent. It seems to be missing most of its strings! Enchanted strings of that length won't come cheap; perhaps there are some around here.": "Ты чувствуешь прилив энергии, когда прикасаешься к инструменту — явный признак магического замысла. Инструмент издаёт жалкий звук, а затем замолкает. Похоже, у него отсутствует большинство струн! Волшебные струны такой длины не будут стоить дешёво; возможно, здесь где-то есть подходящие."
"You expertly restring the giant lute. As you finish up, you spot a huge pile of Councils hidden in the bottom of the instrument. That's going to affect the sound quality negatively, so you clean it out.": "Вы мастерски перенастраиваете гигантскую лютню. Когда заканчиваете, замечаете огромную кучу Советов, спрятанную на дне инструмента. Это негативно повлияет на качество звука, поэтому вы очищаете её."
"Drat! Out of scrap pelts again! Can you run and get me some leather strips?": "Чёрт! Опять закончились обрезки шкур! Можешь сбегать и принести мне кожаные полоски?"
"Thank you. Here, have some free tanning supplies.": "Спасибо. Вот, возьми немного бесплатных материалов для дубления."
"Did you know phlogiston comes in many quality levels? The worst kind is 'Unsturdy Phlogiston'. Well, Makara called it 'Shoddy Phlogiston'. Either way, it's garbage. Then there's 'Semi-Sturdy Phlogiston', which Makara calls 'Rough Phlogiston'. It's okay, but not very sturdy.\n\nWhat I need is Sturdy Phlogiston, which Makara called 'Crude Phlogiston'. Just bring it to me and I'll deliver it.": "Знаешь ли ты, что флогистон бывает разного качества? Худший сорт — «Ненадёжный флогистон». Макару называла его «Плохой флогистон». В любом случае, это мусор. Затем есть «Полуненадёжный флогистон», который Макару называла «Грубый флогистон». Он сойдёт, но не очень надёжен.\n\nМне нужен Надёжный флогистон, который Макару называла «Грубым флогистоном». Просто принеси его мне, и я доставлю его дальше."
"Thanks! This is the stuff. You know, I'm never really sure what quality of phlogiston will come out of an item. Have you figured out a pattern? Oh, who cares. Anyway, here's some more prisms, and some money! And stick around because I think I have more work for you!\n\n<i>[New Favor Unlocked!]</i>": "Спасибо! Вот это то, что нужно. Знаешь, я никогда точно не уверен, какого качества флогистон получится из предмета. Ты уже заметил какую-нибудь закономерность? Да и ладно. В любом случае, вот ещё несколько призм и немного денег! И оставайся, потому что, кажется, у меня есть для тебя ещё работа!\\n\\n<i>[Новая услуга разблокирована!]</i>"
"I need more sulfur for my gem-cleaning solution, but for some reason sulfur is very rare around here, which makes no sense. None at all. Anyway if you find some, bring it here!": "Мне нужно больше серы для моего раствора для чистки драгоценных камней, но почему-то сера здесь очень редкая, что совсем не логично. Во всяком случае, если найдёшь — принеси сюда!"
"Yep, that's sulfur. Here's some gems for the trouble.": "Да, это сера. Вот несколько драгоценных камней за хлопоты."
"Okay a tough one... can you get me some sulfur? I have no idea where you'd find it around here, but I need some!": "Ладно, сложное задание... можешь достать мне немного серы? Я понятия не имею, где её здесь найти, но она мне нужна!"
"Wow, thanks! Here's something in exchange.": "Вау, спасибо! Вот тебе что-то взамен."
"Need very poor quality construction! These benches are for my least favorite pupils.": "Нужна очень плохого качества конструкция! Эти скамейки для моих наименее любимых учеников."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>superb metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>превосходные металлические слитки</b>. Ты можешь добыть их для меня?\\n\\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"If you're a miner, I'd love to purchase some superb metal slabs from you.": "Если ты шахтёр, я с удовольствием куплю у тебя несколько превосходных металлических слитков."
"The service here is truly awful. Do you know how long I've been waiting?! And I had to seat myself! But nevermind. Nevermind all that! I heard that this place makes a great swamp salad. I would like to try this dish.": "Обслуживание здесь просто ужасное. Ты знаешь, сколько я ждал?! И мне пришлось самому искать место! Но неважно. Неважно всё это! Я слышал, что здесь готовят отличный болотный салат. Я бы хотел попробовать это блюдо."
"Um... Is... Is this a swamp salad? It's... I expected crispy. This is kind of slimy...\n\nHm. No, it's not my favorite. But it's not that bad. An interesting dining experience, at least!": "Эм... Это... Это что, болотный салат? Я ожидал хрустящий. А он какой-то слизистый...\\n\\nХм. Нет, это не моё любимое блюдо. Но и не так уж плохо. По крайней мере, интересный кулинарный опыт!"
"Hello again! I ordered the swamp salad. Is there any chance I could receive my food TODAY?!": "Снова здравствуй! Я заказал болотный салат. Есть ли шанс получить мою еду СЕГОДНЯ?!"
"I knew I forgot something! When I asked you to kill those swarmers, you were supposed to scoop up their brains and bring them back. The mages have a 'theory'.\n\nI know this wasn't your fault, so I'm happy to overlook this incident if you can head back out into the field and get those brains.": "Я знал, что что-то забыл! Когда я просил тебя убить этих роющих, ты должен был собрать их мозги и принести обратно. Маги имеют «теорию».\\n\\nЯ понимаю, что это не твоя вина, поэтому готов закрыть глаза на этот инцидент, если ты сможешь вернуться в поле и достать эти мозги."
"Excellent. I'll get these to brains to the 'Brains' who wanted them.\n\nAnd just to be clear, I was joking earlier when I said I'd 'overlook the incident'. I know this was my screw-up. I was just yanking your yodel.\n\nI'm <i>almost</i> sure you already knew that, but I think you might technically be my superior officer, so I just wanted to clarify.\n\nAnd I'm having Sir Porrins investigate what rank you actually have right now. Your records are a little confusing.": "Отлично. Я доставлю эти мозги тем «Мозгам», кто их хотел.\\n\\nИ чтобы было ясно, я шутил раньше, когда сказал, что «закрою глаза на этот инцидент». Я знаю, что это была моя ошибка. Я просто дразнил тебя.\\n\\nЯ <i>почти</i> уверен, что ты уже это знал, но, думаю, ты технически мой начальник, так что я просто хотел уточнить.\\n\\nИ я поручил сэру Порринсу выяснить, какой у тебя сейчас действительно ранг. Твои записи немного запутаны."
"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>tack hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!": "Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>молотки для крепления</b>. Ты можешь сделать несколько для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"If you're a tool artisan, I'd love to purchase some new tack hammers from you.": "Если ты ремесленник по изготовлению инструментов, я с удовольствием куплю у тебя несколько новых молотков для крепежа."
"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Cloth suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый приличный тканевый костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Cloth suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый качественный тканевый костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Cloth suit and I will see what I can do to help you flourish at your craft! I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый костюм из Грубой ткани, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле! Мне нужна только зачарованная версия костюма... Я не работаю с незачарованным хламом!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Amazing Cloth suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый удивительный тканевый костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Want to swap some knowledge to progress your skills? Bring me one full crafted Awesome Cloth suit and I will see what I can do to help you flourish at your craft!\n\n": "Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый потрясающий тканевый костюм, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!"
"Before I was rudely kicked out of Serbule, I was trying to get in touch with a fanciful fellow that I'd heard lives there. He's an Elf, so who knows if he's trustworthy, but his name is \"Mushroom Jack.\" Delightful, isn't it? Anyway, I heard he knows about those gigantic mushrooms on the hill nearby. Could you ask him what medicinal properties they have? I'm mostly worried that they're poisonous.": "Прежде чем меня грубо выгнали из Сербуля, я пытался связаться с причудливым человеком, о котором слышал, что он там живёт. Он эльф, так что кто знает, можно ли ему доверять, но его зовут «Грибной Джек». Забавно, не правда ли? В любом случае, я слышал, что он знает о тех гигантских грибах на холме неподалёку. Можешь ли ты спросить у него, какие у них лечебные свойства? Меня больше всего беспокоит, что они могут быть ядовитыми."
"He said the giant mushrooms are poisonous? Oh, that's too bad. I came a long way just for them.\n\nWhat, he said they're psychic beacons for Myconians? What's a \"Myconian\"? He was just deranged. Elves get that way. Too much sex, I say.": "Он сказал, что гигантские грибы ядовиты? Ох, как жаль. Я проделал долгий путь только ради них.\\n\\nЧто, он сказал, что они психические маяки для Микониан? Кто такие «Микониане»? Он просто сошёл с ума. Эльфы так себя ведут. Слишком много секса, говорю я."
"Who? Charles Thompson? Never heard of him. But yes, I know what those giant mushrooms are for: they're psychic antennae for the Myconians! They use those mushrooms as beacons to control the thoughts of weak-willed people.\n\nNo, I don't have proof. Fuck your proof, just open your ears! You stay around those mushrooms long enough and you'll hear the voices, too!\n\nOh, and tell him not to eat the giant mushrooms. They're not only poisonous, they're also as hard as stone. Not a fun way to spend a weekend.": "Кто? Чарльз Томпсон? Никогда не слышал о нём. Но да, я знаю, для чего эти гигантские грибы: это психические антенны для микониан! Они используют эти грибы как маяки, чтобы контролировать мысли слабовольных людей.\\n\\nНет, у меня нет доказательств. К чёрту твои доказательства, просто открой уши! Если долго находиться рядом с этими грибами, ты тоже услышишь голоса!\\n\\nО, и скажи ему не есть гигантские грибы. Они не только ядовиты, но и твёрды, как камень. Не самое приятное времяпрепровождение на выходных."
"The usual population of giant mantises has changed. They can talk now! And they have deadly acid attacks. I have no idea what the heck happened, but they're no longer an ignorable threat. Can you stomp them out? I'm stuck here, defending the gate...": "Обычное население гигантских богомолов изменилось. Теперь они могут говорить! И у них смертельные кислотные атаки. Я понятия не имею, что произошло, но теперь их нельзя игнорировать как угрозу. Ты можешь их уничтожить? Я застрял здесь, защищая ворота..."
"Good! Perfect! We're a well-oiled team! I know you did that just to make the town safer, but let me give you a bit of reward money anyway, as a token of thanks.": "Отлично! Идеально! Мы — слаженная команда! Я знаю, что ты сделал это ради безопасности города, но позволь всё же дать тебе немного награды в знак благодарности."
"The ocean perch tend to stay away from this area. They know I'll catch 'em! But I don't really want to get up right now. Sitting on the beach just relaxing feels so good. Anyway, can you bring me a passel of perch? The freshest ones are the ones you catch yourself!": "Океанские окуни обычно держатся подальше от этой местности. Они знают, что я их поймаю! Но сейчас я совсем не хочу вставать. Просто сидеть на пляже и отдыхать — это так приятно. В любом случае, можешь принести мне охапку окуней? Самые свежие — это те, которых ты поймаешь сам!"
"Oh, these are good looking fish. Thank you!": "О, это красивые рыбы. Спасибо!"
"I have been invited to the execution party this month, but I'm not feeling my old confident self. What I need is something to bolster my righteousness. Telka's Tail! It's a perfume. Could you find a bottle? Rakshasa bandits might have it.": "Меня пригласили на казнь в этом месяце, но я не чувствую себя прежним уверенным собой. Мне нужно что-то, что укрепит мою праведность. Хвост Тельки! Это духи. Можешь найти флакон? У разбойников ракшасов он может быть."
"Ah, smell that? Yes. Yes! How <i>dare</i> that General Tremal think she can make me obsolete? I will show them! All of them! Let them tremble at my claws!\n\n... Hmm, this is much more potent than I remembered. I'll have to dilute it down a bit or I might make an ass of myself. But I will make it work. Thank you.": "Ах, чувствуешь этот запах? Да. Да! Как <i>смеет</i> генерал Тремал думать, что она может сделать меня ненужным? Я им всем покажу! Всем им! Пусть трепещут перед моими когтями!\\n\\n... Хм, это гораздо сильнее, чем я помнил. Придётся немного развести, иначе я могу опозориться. Но я справлюсь. Спасибо."
"I love to try exotic drugs from far-away lands! But please use only clean teeth.": "Я люблю пробовать экзотические наркотики из дальних стран! Но, пожалуйста, используй только чистые зубы."
"You wish to aid me? Then exterminate the ratkin root-tenders that constantly try to unearth my fungus!": "Ты хочешь помочь мне? Тогда истреби крысоподобных корневедов, которые постоянно пытаются выкопать мой гриб!"
"I acknowledge your deeds, but still the ratkin attack! You have merely stunted their progress. But your efforts are noble nonetheless. Should you have the stomach to continue killing them, I would be grateful.": "Я признаю твои поступки, но атаки крысоловов продолжаются! Ты лишь замедлил их продвижение. Тем не менее, твои усилия достойны уважения. Если у тебя хватит сил продолжать их убивать, я буду благодарен."
"If you were to exterminate more ratkin root-tenders, I would be in your debt.": "Если бы ты уничтожил больше корневых смотрителей крысолюдей, я был бы тебе признателен."
"You have frightened off the ratkin for today, but they will return soon! Please rest and recover your health now, for you may be needed again.": "Ты отпугнул крысолюдей на сегодня, но они скоро вернутся! Пожалуйста, отдохни и восстанови здоровье, ведь ты можешь понадобиться снова."
"<i>Rebeccah beams at you. She seems pleased, though perhaps a bit surprised. You did it! Rebeccah hands you a ceremonial badge. You're a student of Tennenbrandt University now!</i>": "<i>Ребекка сияет от радости. Она кажется довольной, хотя, возможно, немного удивлённой. Ты справился! Ребекка вручает тебе церемониальный значок. Теперь ты студент Университета Тенненбрандта!</i>"
"Well if you think you're a capable fighter, we can always use help dealing with the demonic swarmers. Be careful, or they'll overwhelm you!": "Если ты считаешь себя способным бойцом, мы всегда можем использовать помощь в борьбе с демоническими роющими. Будь осторожен, иначе они тебя перегрузят!"
"You handled yourself well.": "Ты хорошо справился."
"It's what I feared. Our friend Hamilton has spotted a gigantic spider climbing out of the sewer at night. He hasn't seen how the spider returns -- it probably uses a different entrance -- but we can surmise that this is what is killing the sentient animals in Statehelm.\n\nHamilton says that he heard a clicking sound of a door opening right before he saw the spider. Look for a lever or mechanism that opens a door. And be ready for a fight.\n\nYou will doubtless need to kill this spider. But I don't believe it is a simple unintelligent spider. It is too cunning. Figure out what it was up to!": "Это то, чего я боялся. Наш друг Гамильтон заметил гигантского паука, вылезавшего из канализации ночью. Он не видел, как паук возвращается — вероятно, он использует другой вход — но мы можем предположить, что именно он убивает разумных животных в Стейтхелме.\\n\\nГамильтон говорит, что перед тем, как увидеть паука, он услышал щёлкающий звук открывающейся двери. Ищи рычаг или механизм, который открывает дверь. И будь готов к бою.\\n\\nТебе, без сомнения, придётся убить этого паука. Но я не думаю, что это простой неразумный паук. Он слишком хитёр. Выясни, что он замышляет!"
"You have killed the spider? I didn't doubt you.\n\nHm... A golem that can think on its own? I'm not an expert alchemist, but I've heard someone speak of that quite recently...": "Ты убил паука? Я в тебя не сомневался.\\n\\nХм... Голем, который может думать самостоятельно? Я не эксперт в алхимии, но недавно кто-то говорил об этом..."
"Thank you again for repelling gulagra's scion. Mortals will sleep safely for another night!\n\nIf you have time to help me further, there is something of an annoying clerical problem to deal with: the scion dreamt up a series of ten \"anxiety propagators\", devices dreamt up by Gulagra. They are causing distress to dreamers. They should dissipate in a few hundred years, so this isn't too critical of a problem, but it would help mortals dream well if they were destroyed. Now that the dreamer is thwarted you should simply be able to touch them to destroy them. If you find all ten, I shall be very grateful. But you will need help: some are guarded by ferocious beasts!": "Спасибо ещё раз за отражение отпрыска Гулагры. Смертные смогут спокойно спать ещё одну ночь!\\n\\nЕсли у тебя есть время помочь мне дальше, есть одна раздражающая бюрократическая проблема: отпрыск придумал серию из десяти «распространителей тревоги», устройств, созданных Гулагрой. Они вызывают беспокойство у сновидцев. Они должны рассеяться через несколько сотен лет, так что это не слишком критично, но смертным было бы легче хорошо спать, если бы их уничтожили. Теперь, когда сновидец повержен, ты просто должен коснуться их, чтобы уничтожить. Если найдёшь все десять, я буду очень благодарен. Но тебе понадобится помощь: некоторые охраняют свирепые звери!"
"Oh, I'm fine! It's just that I've been worried. Worried sick, actually. I've heard my daughter's in trouble financially. She's... estranged. And her father has all but disowned her, and I understand why. Kind of agree with him.\n\nBut she's my daughter and I can't just watch as she ruins her life.\n\nMaybe I'm overreacting. Could you check in on her? Her name is Helena Veilmoor and she moved far south to a fortress called Hogan's Keep. Apparently she's having trouble with a gang of sentient insects. Oh, my poor idiot daughter! Let me know she's okay!": "О, со мной всё в порядке! Просто я очень волновался. На самом деле, до болезни. Я слышал, что у моей дочери финансовые проблемы. Она... отдалена от нас. И её отец практически отрёкся от неё, и я понимаю почему. В некотором роде согласен с ним.\\n\\nНо она моя дочь, и я не могу просто смотреть, как она разрушает свою жизнь.\\n\\nВозможно, я слишком переживаю. Не мог бы ты навестить её? Её зовут Хелена Вейлмур, и она переехала далеко на юг в крепость под названием Крепость Хогана. Похоже, у неё проблемы с бандой разумных насекомых. О, моя бедная глупая дочь! Дай знать, что с ней всё в порядке!"
"Gambling again! And of course she needs money. And now I'm stuck in a terrible position: I can let her \"learn her lesson\" and get killed by angry insects, or I can rescue her and she learns nothing.\n\nDon't tell Winston, but I know which one I pick. Remga crotch-grab me, I hate this, but she's my daughter.": "Снова азартные игры! И, конечно, ей нужны деньги. А теперь я в ужасной ситуации: могу оставить её «наказать себя» и позволить разозлённым насекомым убить её, или спасти, и она ничему не научится.\\n\\nНе говори Уинстону, но я знаю, что выберу. Чёрт побери, я ненавижу это, но она моя дочь."
"You talked to mom?! And she sent you here? Come on! I feel stalked! I ran away from Statehelm for a good reason, you know. Did you ever consider...\n\n... I'm sorry. I should really swallow my pride. Tell mom I owe a gang of giant mantises 1.3 million Concils or they'll kill me and lay eggs in my corpse. But tell her in a way that doesn't seem too desperate, okay? And then stop hanging out with my mom. It's weird.": "Ты поговорил с мамой?! И она послала тебя сюда? Да ладно! Я чувствую себя преследуемым! Я сбежал из Стейтхельма не просто так, знаешь ли. Ты когда-нибудь думал...\n\n... Прости. Мне действительно стоит проглотить свою гордость. Скажи маме, что я должен банде гигантских богомолов 1,3 миллиона Консилей, иначе они убьют меня и отложат яйца в моё тело. Но скажи это так, чтобы не казалось слишком отчаянным, хорошо? И потом перестань тусоваться с моей мамой. Это странно."
"My friend, I must reveal something. I am smitten by Anaberyl! At first I told myself that I was simply looking out for an incredible musician who was in a bad spot. But I haven't ever felt this way before about anyone! She's so... Perfect.\n\nI need you to feel her out for me. I can't do it because she'll feel obligated toward me! That would break my heart -- I don't want to pressure her at all. So just ask if she'd ever be interested in dating a human, if the human was an incredible musician like her.": "Мой друг, я должен кое в чём признаться. Я влюблён в Анабэрил! Сначала я говорил себе, что просто забочусь об удивительной музыкантше, оказавшейся в трудной ситуации. Но я никогда раньше не испытывал таких чувств ни к кому! Она такая... Совершенная.\\n\\nМне нужно, чтобы ты разведал для меня. Я не могу сделать это сам, потому что она почувствует себя обязанной передо мной! Это разбило бы мне сердце — я совсем не хочу её давить. Просто спроси, заинтересовалась бы она когда-нибудь встречаться с человеком, если бы этот человек был таким же удивительным музыкантом, как она."
"You talked to Anaberyl? What did she say?\n\nYou learned a way that I can date her? What does that mean? Why are you being so vague?\n\nI trust you, my friend. I hope you know what you're doing.": "Ты поговорил с Анабэрил? Что она сказала?\n\nТы узнал, как я могу с ней встречаться? Что это значит? Почему ты такой расплывчатый?\n\nЯ доверяю тебе, мой друг. Надеюсь, ты знаешь, что делаешь."
"I haven't been able to find a decent topaz in this miserable country. And it's my favorite gem! Could you get me one? I want to give myself an early birthday present.": "Я не смог найти приличный топаз в этой жалкой стране. А это мой любимый драгоценный камень! Можешь достать мне один? Я хочу сделать себе ранний подарок на день рождения."
"Oh, thank you! This is... adequate. I appreciate it! Here.": "О, спасибо! Это... приемлемо. Я ценю это! Вот."
"Druids aren't just tree-lovers. We're deeply invested in the balance of nature, and that's not always pretty. Not to non-druids, anyway. I'll show you - the spiders near here sometimes feed on small shore birds. Bring me some of the prey feathers.": "Друиды — это не просто любители деревьев. Мы глубоко заинтересованы в балансе природы, и это не всегда красиво. По крайней мере, для тех, кто не друид. Я покажу тебе — пауки здесь иногда питаются мелкими прибрежными птицами. Принеси мне перья их добычи."
"These are perfect. Now look here ... No, come over here. I won't bite! See how the feather has these little spines that lock together? And even though the bird is dead, the feather stays intact and even waterproof! Isn't that wonderful?": "Они идеальны. Теперь посмотри сюда... Нет, подойди сюда. Я не укушу! Видишь, как у пера есть маленькие шипы, которые сцепляются друг с другом? И хотя птица мертва, перо остаётся целым и даже водонепроницаемым! Разве это не чудесно?"
"I may not be the best druid, but I still know how to appreciate nature! In fact, I'm pretty good at growing flowers! Just not trees, I guess.\n\nYou can find a lot of seeds on the creatures around here - I guess maybe because of our influence? No idea where they get the seeds from, but if you bring me some I'll teach you how to properly appreciate nature.": "Я, может, не лучший друид, но всё равно умею ценить природу! На самом деле я довольно хорошо выращиваю цветы! Просто деревья — видимо, не моё.\\n\\nТы можешь найти много семян на существах здесь — наверное, из-за нашего влияния? Не знаю, откуда у них семена, но если принесёшь мне немного, я научу тебя правильно ценить природу."
"I bet I can grow these! Here, let me show you how wonderful nature can be!": "Спорю, я смогу вырастить это! Давай, я покажу тебе, какой удивительной может быть природа!"
"Hippogriffs aren't immortal. Did you know that? Yeah, they hatch out of eggs! We have a hatchery on board, too. You should go kill the brood mother!\n\nYou'll know you're in the right place when the temperature drops. They keep Coldfeather's quarters very cold!": "Гиппогрифы не бессмертны. Знаешь ли ты это? Да, они вылупляются из яиц! У нас на борту тоже есть инкубатор. Тебе стоит убить матку!\n\nТы поймёшь, что на правильном месте, когда температура упадёт. Они держат покои Холодного Пера очень холодными!"
"Coldfeather is dead? Huh. I guess I expected to feel better about that, since cleaning frozen bird poop is extremely unfun. But actually I'm kind of sad.\n\nWell, there's more brood hippogriffs, and I'm sure we'll get a new one soon. Unless you blow up the ship first! Here's hoping!\n\nHey, what's that up there?! Hah, made you look! Hmm? Oh, no, it's just a memory injector. Do you feel the memory? Then it worked! This 'coffee' thing isn't a fairy invention, though. Actually, we found it on the mortal realm! But it's pretty good. Maybe some day you'll be able to make some. Or not. Who cares.": "Холодное Перо мёртв? Хм. Я думал, что буду чувствовать себя лучше из-за этого, ведь убирать замёрзшие птичьи какашки — это крайне неприятно. Но на самом деле мне немного грустно.\\n\\nНу, у нас есть ещё выводок гиппогрифов, и я уверен, что скоро появится новый. Если только ты не взорвёшь корабль первым! Будем надеяться!\\n\\nЭй, что это там наверху?! Ха, заставил тебя посмотреть! Хмм? О, нет, это просто инжектор воспоминаний. Чувствуешь воспоминание? Значит, сработало! Эта штука под названием «кофе» — не фейское изобретение. На самом деле, мы нашли её в смертном мире! Но она довольно хороша. Может, когда-нибудь ты сможешь приготовить её сам. А может и нет. Какая разница."
"If you ever find yourself deep in Gazluk Keep, head to the bottom floor and poke around the southern barracks loop. That's where I used to bunk. They would have tossed my medals into one of the storage chests down there. See if you can find my box of medals.": "Если ты когда-нибудь окажешься глубоко в крепости Газлук, спускайся на нижний этаж и осмотри южный круг казарм. Там я раньше жил. Мои медали, вероятно, бросили в один из сундуков для хранения там. Попробуй найти мою коробку с медалями."
"Oh hey. You found my medals. Hm, the nice ones are missing. But that's okay. It'll do for what I need.": "О, привет. Ты нашёл мои медали. Хм, хорошие отсутствуют. Но ничего. Для моих целей этого достаточно."
"We've done much to dissuade the Winter Court from attacking us directly. But there is a team of elite warriors that fear nothing. They are The Boreal Fist. If you can find allies to stand with you, can you strike them down? Be careful. Even I could not kill one of them alone.": "Мы многое сделали, чтобы отговорить Зимний Двор от прямой атаки на нас. Но есть отряд элитных воинов, которые ничего не боятся. Это Северный Кулак. Если ты сможешь найти союзников, чтобы встать с тобой плечом к плечу, сможешь ли ты уничтожить их? Будь осторожен. Даже я не смог убить одного из них в одиночку."
"You... really?! Amazing! Mortals are far more powerful than we were taught. That's... kind of scary, actually. I mean, thanks, but... you just, like, killed them? Huh. Here, take this, not that you need it. Here's a bunch of this Council money, too.": "Ты... правда?! Удивительно! Смертные гораздо сильнее, чем нас учили. Это... на самом деле немного страшно. То есть спасибо, но... ты просто убил их? Хм. Вот, возьми это, хотя тебе это и не нужно. Вот ещё куча этих денег Совета."
"Somewhere north of here, nearish Serbule Keep, is a massive door. This traditional showy dwarf door leads to the long-dead city of Borghild. No dwarves live there, but it's infested with undead.\n\nYou will ... How do I put this politely? You are quite formidable, but you would be wise to bring some allies with you into Borghild. It is full of traps.\n\nDo this for me and I shall bequeath upon you one of my grandest weather wands.": "Где-то к северу отсюда, недалеко от Сербульской Крепости, находится массивная дверь. Эта традиционная эффектная гномья дверь ведёт в давно погибший город Боргилд. Там не живёт ни одного гнома, но город кишит нежитью.\\n\\nТы... как бы это вежливо сказать? Ты довольно грозен, но было бы разумно взять с собой союзников в Боргилд. Там полно ловушек.\\n\\nСделай это для меня, и я дарую тебе одну из моих величайших палочек погоды."
"I am impressed with your effort! Less so with the results, for while this was perhaps once a Naturesphere, it is now inert. I wonder what its story was. Typically when a Naturesphere is used, it becomes part of the area's history, for it always leads to terrible cataclysms. Perhaps that is why there are no more dwarves in Borghild... or perhaps this was something else entirely.\n\nI am somewhat satisfied that no active Naturesphere is lying around in a cave near here. You have helped put my mind at ease, and for that I grant you this. It is quite dangerous. Maybe don't use it at first... wait until your skill increases a bit.": "Я впечатлён твоими усилиями! Меньше — результатами, ведь хотя это когда-то, возможно, была Сфера Природы, теперь она безжизненна. Интересно, какова её история. Обычно, когда используется Сфера Природы, она становится частью истории этого места, ведь всегда приводит к ужасным катаклизмам. Возможно, поэтому в Боргилде больше нет гномов... или, может, это было что-то совсем другое.\\n\\nЯ отчасти уверен, что здесь, в пещере неподалёку, нет активной Сферы Природы. Ты помог мне успокоиться, и за это я дарю тебе это. Это довольно опасно. Может, сначала не используй... подожди, пока навык немного повысится."
"Over on the little island northeast of here there's this tiny lake with a bridge. Very cozy. It's a famous makeout spot for talking birds. Well, regular birds too, I guess. But now there's a ranalon hiding there, using it as his personal hunting ground. It's not right! That island isn't even in ranalon territory!\n\nWe can't let him camp there and kill our friends. But he runs whenever he sees me bouncing toward him. He doesn't know you, so you should be able to get him. So go get him!": "На маленьком островке к северо-востоку отсюда есть крошечное озеро с мостиком. Очень уютное место. Это известное место для свиданий говорящих птиц. Ну, наверное, и обычных птиц тоже. Но теперь там прячется раналон, используя это место как свою личную охотничью территорию. Это неправильно! Этот остров даже не в территории раналонов!\\n\\nМы не можем позволить ему там обосноваться и убивать наших друзей. Но он убегает, когда видит, что я подпрыгиваю в его сторону. Он не знает тебя, так что ты сможешь его поймать. Так что иди и поймай его!"
"Oh, you got him! I thought he'd get away from you. Nice job!\n\nWell, I guess we won't need Yavazek for this after all. He's sneaky, so I asked him to hide in the lake and leap out to kill the bully when it got too close. But apparently mantises can't breathe underwater. I thought they could, but, I mean, Yav would know. So anyway I went all around to a bunch of druids and got water-breathing potions made up... and now we don't need 'em! Here, you keep 'em.": "О, ты поймал его! Я думал, он ускользнёт от тебя. Отличная работа!\\n\\nНу, похоже, нам всё-таки не понадобится Явазек для этого. Он хитрющий, поэтому я попросил его спрятаться в озере и выпрыгнуть, чтобы убить задира, когда тот подойдет слишком близко. Но, видимо, богомолы не умеют дышать под водой. Я думал, что умеют, но, в общем, Явазек бы знал. Так что я обошёл кучу друидов и сделал зелья водного дыхания... а теперь они нам не нужны! Вот, оставь их себе."
"I need some cat eyes for a special spell I'm working on! Can you get me some? Remember to kill the cats humanely. If you can.": "Мне нужны кошачьи глаза для особого заклинания, над которым я работаю! Можешь достать их для меня? Помни, что нужно убивать кошек гуманно. Если сможешь."
"Thank you. Culling cats just for their eyeballs may seem wasteful and stupid, but nature is often wasteful and stupid. You and I, we are one with nature.": "Спасибо. Отстреливать кошек только ради их глаз может показаться расточительным и глупым, но природа часто бывает расточительной и глупой. Ты и я — мы едины с природой."
"To repair my necklace, I need pyrite. Obtain for me the finest pyrite! I will reward you.": "Чтобы починить моё ожерелье, мне нужен пирит. Добыть для меня лучший пирит! Я вознагражу тебя."
"Good. This pyrite will serve.\n\nI will tell you a secret: I once made jewelry. My mother taught me. And I have a necklace stored away that is ugly. So it would be perfect for you! Here. Take it! Wear it proudly!": "Хорошо. Эта пиритовая руда подойдёт.\\n\\nЯ расскажу тебе секрет: когда-то я делал украшения. Моя мать меня этому научила. И у меня есть спрятанное ожерелье, которое некрасивое. Так что оно идеально подойдёт тебе! Вот. Возьми его! Носи с гордостью!"
"Okay so I have a problem. I admit it: I'm addicted to cranium powder. But it's okay. I'm a master of the mind! I just willed myself to stop.\n\nUnfortunately I can't will away these nasty side-effects. I think I remember Velkort saying he dabbled in drugs like this when he was my age - can you ask him for a hangover cure?": "Ладно, у меня проблема. Признаюсь: я зависим от порошка из черепа. Но ничего страшного. Я мастер разума! Я просто заставил себя остановиться.\\n\\nК сожалению, я не могу избавиться от этих неприятных побочных эффектов силой воли. Кажется, я помню, что Велкорт говорил, что баловался такими наркотиками в моём возрасте — можешь ли ты попросить у него средство от похмелья?"
"What? Brain lobes, alchemical gel, and something else? What else?! How can he not know?!\n\nOkay. Okay. Not a problem. You can get me that stuff, right?": "Что? Доли мозга, алхимический гель и что-то ещё? Что ещё?! Как он может не знать?!\\n\\nЛадно. Ладно. Это не проблема. Ты сможешь достать мне эти вещи, да?"
"What? Cranium dust? Why that imbecile! An elf who doesn't know how to moderate his illicit drug use is an embarrassment to us all!\n\n<i>Sigh...</i>yes, I use it now and again, but I know when to stop! Sorry, sorry... I sound like my father.\n\nThere's a cure for the side-effects, but I don't quite remember the formula. It involves mixing brain lobes with willpower gel -- you know, that tawdry alchemical stuff. And there was one other ingredient, but damned if I can remember it. Sorry.": "Что? Пыль черепа? Вот этот идиот! Эльф, который не умеет контролировать употребление запрещённых веществ, позорит нас всех!\\n\\n<i>Вздох...</i> да, я иногда использую её, но знаю, когда остановиться! Извини, извини... звучит, как мой отец.\\n\\nЕсть лекарство от побочных эффектов, но я не совсем помню формулу. Нужно смешать мозговые доли с гелем воли — знаешь, эта безвкусная алхимическая дрянь. И был ещё один ингредиент, но чёрт возьми, не могу вспомнить. Извини."
"I have a very personal request. Red told me he likes winterhues! You know, that flower that grows here? Can you get me a few to give to him?\n\nWinterhues bloom at dawn, but they die off very quickly in the afternoon hours. So your best bet is to hunt for them starting at 5 am.": "У меня очень личная просьба. Рэд сказал, что ему нравятся зимние цветы! Знаешь, тот цветок, что растёт здесь? Можешь собрать несколько, чтобы подарить ему?\\n\\nЗимние цветы распускаются на рассвете, но быстро увядают к полудню. Так что лучше всего искать их начиная с 5 утра."
"They're pretty! Thank you. Red will love them. Here... it's embarrassing, but this is all I have to offer in exchange.": "Они красивые! Спасибо. Рэд их полюбит. Вот... это неловко, но это всё, что я могу предложить взамен."
"I love mushrooms, of course, but there's one I haven't tried yet. Iocaine. It grows in deep, dark, scary caves, and it's completely lethal... but I think I know a way to make it consumable. I know it's insane, but I've just gotta have some! ... Have you got any?": "Я, конечно, люблю грибы, но есть один, который я ещё не пробовал. Иокаин. Он растёт в глубоких, тёмных, страшных пещерах и совершенно смертелен... но я думаю, что знаю способ сделать его съедобным. Знаю, это безумие, но мне просто нужно его попробовать! ... У тебя есть немного?"
"Wow! Thanks so much! These mushrooms don't smell at all. That's kind of amazing! I bet these would make a really effective poison. But there might be nutritional value here somehow, and I'll find it!\n\nHere, these are more traditionally nutritional.": "Вау! Большое спасибо! Эти грибы совсем не пахнут. Это просто удивительно! Бьюсь об заклад, из них можно сделать очень эффективный яд. Но в них может быть какая-то питательная ценность, и я её найду!\\n\\nВот, эти более традиционно питательные."
"Let's begin your study with a warm-up. Why don't you use your Song of Discord in combat with, hm, let's say... 50 enemies. You needn't slay them SOLELY via Song of Discord, though. That's a later lesson! Just use the ability on them prior to defeating them.": "Давай начнём обучение с разминки. Почему бы тебе не использовать Песнь Раздора в бою с, хм, скажем... 50 врагами. Тебе не нужно убивать их ИСКЛЮЧИТЕЛЬНО с помощью Песни Раздора — этому мы научимся позже! Просто примени способность на них перед тем, как победить."
"You look warmed up! Warmed by the power of disharmony!": "Ты выглядишь разгорячённым! Разгорячённым силой дисгармонии!"
"A favor, huh? Well, you could get me some paint. It's for my hobby. Any color will do, I'm not picky. Just get me a LOT of it.": "Услуга, да? Ну, ты мог бы принести мне краски. Это для моего хобби. Любой цвет подойдет, я не привередлив. Просто принеси мне МНОГО."
"Very nice! Some of this is a disgusting color, but we can make it work.\n\nYou keep that. I just wanted to make sure you were the sort of person who knew their way around a paint bucket. Let me teach you a new way to use this stuff, what do you say?": "Очень хорошо! Некоторые из этих цветов отвратительные, но мы можем с этим справиться.\\n\\nОставь это себе. Я просто хотел убедиться, что ты умеешь обращаться с ведром краски. Позволь научить тебя новому способу использования этого материала, как тебе идея?"
"Why don't you speak with this Denton Razor fellow yourself? He's supposed to live in the hills of Vidaria. Just get him to give my jewelry back.": "Почему бы тебе самому не поговорить с этим парнем по имени Бритва Дентон? Говорят, он живёт в холмах Видарии. Просто заставь его вернуть мои украшения."
"You found Denton Razor? ... Oh. I see. Well, he gave us two leads...": "Вы нашли Дэнтона Рэйзора? ... О. Понимаю. Ну, он дал нам две зацепки..."
"Thank you!\n\nSo I looked around for that jewelry and I'm afraid it's quite gone. I remember that orc Crall might have taken posession of some of it. And some of it was sold to a fence in Statehelm itself! Maybe that will help.": "Спасибо!\\n\\nЯ поискал это украшение, но боюсь, его уже нет. Помню, что орк Кралл мог завладеть частью из них. А часть была продана скупщику прямо в Стейтхелме! Может, это поможет."
"I keep watch on the seas for Ranalon activity. And good thing I do! Recently a mysterious slab has appeared in the water on the other side of the city. You can't even see it from here, that's how far it is. They're trying to hide from me!\n\nI think it's an assault force, hiding in the caves beneath the city. When the slab activates, they'll show up to attack. We need to activate that beacon early, before they're fully prepared. That will catch them off guard. The only trick is: how do we activate it?\n\nI need to call in a favor from a ranalon I once saved. His name is Gozzaroon. He's hiding in an undersea cave off of Sun Vale. Sun Vale's this little island we druids like to congregate at. Go find Gozzaroon, tell him I'm calling in the favor, and demand the secret to activating these beacons.": "Я наблюдаю за морями в поисках активности раналонов. И слава богу, что я это делаю! Недавно в воде на другой стороне города появилась загадочная плита. Её даже отсюда не видно, настолько она далеко. Они пытаются спрятаться от меня!\\n\\nЯ думаю, это штурмовая группа, скрывающаяся в пещерах под городом. Когда плита активируется, они появятся для атаки. Нам нужно активировать этот маяк заранее, до того, как они полностью подготовятся. Это застигнет их врасплох. Единственная загвоздка: как его активировать?\\n\\nМне нужно попросить об одолжении раналона, которого я однажды спас. Его зовут Гоззарун. Он прячется в подводной пещере у острова Сан Вейл. Сан Вейл — это маленький остров, где любят собираться друиды. Найди Гоззаруна, скажи ему, что я прошу об одолжении, и потребуй секрет активации этих маяков."
"Gozzaroon came through! I half-expected him to renege on the bargain. Well, all of this seems pretty easily obtainable. Unfortunately I have to stay here and keep watch. Interested in getting your hands dirty?": "Гоззарун сдержал слово! Я наполовину ожидал, что он откажется от сделки. Впрочем, всё это кажется довольно легко доступным. К сожалению, мне нужно остаться здесь и следить за порядком. Хочешь замарать руки?"
"I see nothing, I say nothing! I... What? Parella? Oh no. The time has come. Very well, I made a deal and I will stand by it.\n\nHere. I've written it down. Tell noone that I've betrayed my people this way. I'm hunted enough as it is!\n\nI hope never to see you or Parella again!": "Я ничего не вижу, я ничего не говорю! Я... Что? Парелла? О нет. Пришло время. Ладно, я заключил сделку и буду ей верен.\\n\\nВот. Я всё записал. Никому не говори, что я так предал свой народ. Меня и так достаточно преследуют!\\n\\nНадеюсь больше никогда не увидеть тебя или Пареллу!"
"The animals of this city are in great danger. A spider came to me for aid. I could not do much for him, but I did manage to have his exotic equipment shipped into Statehelm. Take this to him. If you can, give him whatever help he needs.": "Животные этого города в большой опасности. Ко мне за помощью пришёл паук. Я не смогла много для него сделать, но сумела доставить его экзотическое снаряжение в Стейтхелм. Отнеси это ему. Если сможешь, окажи ему всю необходимую помощь."
"Thank you. Perhaps this is the beginning of a tolerable relationship.": "Спасибо. Возможно, это начало терпимых отношений."
"...\n\n<i>[Skitters considers you.]</i>\n\nThis is the wrong suit! This one is from my time as a druid. I wanted the fire suit. But no matter. This will do.\n\n<i>[Skitters takes the suit and waves in thanks.]</i>": "...\\n\\n<i>[Скиттерс оценивающе смотрит на тебя.]</i>\\n\\nЭто не тот костюм! Этот из моего времени друида. Мне нужен был огненный костюм. Но ничего. Этот сойдёт.\\n\\n<i>[Скиттерс берёт костюм и благодарно машет рукой.]</i>"
"I heard that the lich Khyrulek kept creating weapons of destruction even after she died! Supposedly she has a wand that protects her from flame. If I had that wand, I could dissect it to learn the secrets of fire resistance. Wouldn't Velkort be jealous!\n\nBut it's just a fanciful dream. How would I ever get ahold of such an artifact?": "Я слышал, что лич Кирулек продолжала создавать оружие разрушения даже после своей смерти! Говорят, у неё есть жезл, который защищает её от огня. Если бы у меня был этот жезл, я мог бы его рассечь, чтобы узнать секреты огнестойкости. Разве Велкорт не позавидовал бы!\\n\\nНо это всего лишь фантазия. Как бы мне вообще заполучить такой артефакт?"
"This... this is it? Fascinating... its full power is only unlockable if you're dead! Does that mean there's a connection between undeath and fire? Oh, I have so much to learn. This will be great! Thank you so much!\n\nHere, take this. Velkort gave it to me once in a fit of passion. But I suspect you'll have more use for it than I ever will.": "Это... это оно? Удивительно... его полная сила раскрывается только если ты мёртв! Значит, существует связь между нежитью и огнём? Ох, мне предстоит так много узнать. Это будет здорово! Огромное спасибо!\\n\\nВот, возьми это. Велкорт однажды подарил мне это в порыве страсти. Но я подозреваю, что тебе это пригодится больше, чем мне когда-либо."
"The central decoration of the necklace you broke is a rare and beautiful crystal known as vervadium. It will be difficult to find. But should you find a piece, bring it to me. I will pay you ten times its value!": "Центральное украшение ожерелья, которое ты сломал, — это редкий и красивый кристалл, известный как вервадиум. Его будет трудно найти. Но если ты найдёшь кусочек, принеси его мне. Я заплачу тебе в десять раз больше его стоимости!"
"Very good, hand me the vervadium. This?! This gem has too many flaws! Did you not see them? Or were you trying to trick me into buying your worthless... Nnhgggg... be CALM Gasu'um, be calm!\n\nVery well. I will take this worthless Vervadium and give you NOTHING, because it is not valuable, and ten times nothing is still nothing. However, I have an easier task for you instead. If you do this task for me, I will pay you... a large pile of coins. I haven't counted it. But it is significant.": "Очень хорошо, передай мне вервадиум. Это?! Этот камень слишком много изъянов! Ты их не заметил? Или пытался обмануть меня, чтобы я купил твою никчёмную... Нннгггг... будь СПОКОЕН, Гасу'ум, будь спокоен!\\n\\nЛадно. Я возьму этот никчёмный вервадиум и не дам тебе НИЧЕГО, потому что он не ценен, а десять раз ничего — всё равно ничего. Однако у меня есть для тебя более простое задание. Если ты выполнишь его для меня, я заплачу тебе... большую кучу монет. Я её не считал. Но она значительна."
"I have decided to replace the crystal in my mother's necklace with obsidian. Go find a piece for me! Obsidian is not as beautiful as vervadium, but I suspect you will at least be able to find a piece that does not disgust me.": "Я решил заменить кристалл в ожерелье моей матери на обсидиан. Найди для меня кусочек! Обсидиан не так красив, как вервадиум, но, по крайней мере, ты сможешь найти такой, который меня не отвращает."
"This is... good. Actually, this is a good piece of obsidian! I will reward you, as I said I would.\n\nHere. In addtion to the coins, I have a ring that may fit you. For once I made rings, in the manner my mother taught me, long ago.": "Это... хорошо. На самом деле, это хороший кусок обсидиана! Я обещал вознаградить тебя, и сдержу слово.\\n\\nВот. Помимо монет, у меня есть кольцо, которое может подойти тебе. Впервые я сделал кольца так, как меня учила мать много лет назад."
"An old tome I found said there was an entire system of automata in Borghild: robots! Lots of 'em! They'd be sealed off away from the rest of the place now, I suppose. And probably all broken. But if you find a broken one, can you see if it has a large gear in its head? The book talks about something called a Cranial Gear. I'd love to have one.": "Старая книга, которую я нашёл, говорила, что в Боргилде была целая система автоматов: роботы! Много их было! Сейчас, наверное, они запечатаны и отделены от остальной части места. И, вероятно, все сломаны. Но если найдёшь сломанного, посмотри, есть ли у него в голове большая шестерёнка? В книге говорится о чём-то, что называется Черепной шестернёй. Мне бы очень хотелось такую заполучить."
"Uh... that's a LOT bigger than I expected! You must have found a huge automaton! Thanks for grabbing the gear for me. And hey, good thing the automaton wasn't still functioning, huh?\n\nHmm, I bet I could make a new kind of automaton with this! Come back later and I'll teach you what I discover.": "Э-э... это ГОРАЗДО больше, чем я ожидал! Ты, должно быть, нашёл огромного автомата! Спасибо, что достал снаряжение для меня. И, кстати, хорошо, что автоматон не работал, да?\\n\\nХмм, уверен, я смогу создать новый тип автомата с этим! Приходи позже, и я расскажу тебе, что открою."
"I really must have better food than what Durstin can cook. Even the ranalan pickles are getting old. Hmm, how about some of those 'grapefish'? I have to know why the humans call them that!\n\nI hear they're in the lakes and streams around here, but they can be pretty quick. I'm sure with some practice you'll manage, though.": "Мне действительно нужна еда получше, чем то, что готовит Дёрстин. Даже раналанские соленья уже надоели. Хм, как насчёт этих самых «виноградных рыб»? Мне надо понять, почему люди так их называют!\\n\\nГоворят, они водятся в озёрах и ручьях здесь рядом, но бывают очень быстрыми. Хотя, уверен, с практикой у тебя получится."
"Ew. Ew! What?! I am an artist! You expect me to fillet my own fish?! Take these away and fillet them for me. Please.\n\nYou do know how, right? Because I'm certainly not going to teach you. And that lunk Durstin won't either. I bet Fainor in Serbule town would do it, though. Go pester him. Here's some coins in case he's in one of his moods and tries to charge you for the lesson.": "Фу. Фу! Что?! Я же художник! Ты хочешь, чтобы я сам разделал рыбу?! Забери это и разделай её за меня. Пожалуйста.\\n\\nТы ведь умеешь, да? Потому что я точно не собираюсь тебя учить. И этот тупица Дёрстин тоже не научит. Но я уверен, что Файнор в городе Сербуль сделает это. Иди достань его. Вот монеты на случай, если он в одном из своих настроений и попытается взять с тебя плату за урок."
"So, do you have those filleted grapefish for me yet?": "Ну что, у тебя уже есть для меня эти разделанные грейпфишы?"
"Thank you. You cleaned these yourself? Huh. You learn fast! I could hardly do better myself, and I was a fisherman for a few decades in my youth! But I gave that all up for my art. <i>Sigh</i>, I guess I'll have to cook these fish myself, though. I have a recipe all picked out: eggs! They go with anything! Here, let me teach you my recipe.": "Спасибо. Ты сам почистил их? Хм. Быстро учишься! Я бы сам едва ли справился лучше, а в молодости я несколько десятков лет был рыбаком! Но я всё это бросил ради своего искусства. <i>Вздох</i>, похоже, мне придётся самому приготовить эту рыбу. У меня есть отличный рецепт: яйца! Они подходят ко всему! Вот, позволь научить тебя моему рецепту."
"Since the constabulary is completely useless, I've been poking around for clues to my stolen jewelry. And I have a lead for you! ... You <i>will</i> help me, right? It's oh so important!\n\nSo you see the jewelry was sold to an orc who trades such things amongst his kind. His name is Throgg and he lives  in a camp in Povus. Can you go and retrieve my stolen jewelry before he gets a chance to resell it?": "Поскольку полиция совершенно бесполезна, я сам искал улики по поводу моих украденных украшений. И у меня есть наводка для тебя! ... Ты <i>обязательно</i> поможешь мне, правда? Это так важно!\\n\\nВидишь ли, украшения были проданы орку, который торгует такими вещами среди своих. Его зовут Трогг, и он живёт в лагере в Повусе. Можешь ли ты пойти и вернуть мои украденные украшения, прежде чем он успеет их перепродать?"
"You found more of my jewelry! I suppose you've returned enough of my inventory that I could meaningfully reopen the shop. But I'm still missing such important pieces...\n\n<i>[Shop Open]</i>\n\n<i>[New Favors Available.]</i>": "Вы нашли ещё мои украшения! Похоже, ты вернул достаточно моих вещей, чтобы я мог действительно заново открыть магазин. Но мне всё ещё не хватает таких важных предметов...\\n\\n<i>[Магазин открыт]</i>\\n\\n<i>[Доступны новые задания.]</i>"
"Oh, his signet ring! He'll be so pleased!\n\nI suppose I can part with those gaudy jewels... Where did I put them?": "О, его печатка! Он будет так доволен!\\n\\nПолагаю, я могу расстаться с этими безвкусными драгоценностями... Куда я их положил?"
"Ah, so you're an Advanced Student already! My, time flies. It seems only yesterday that you enrolled.\n\nMy next lecture will cover bardic surgery techniques. For my demonstration I need some supplies. Can you fetch them for me? Very good. Goodbye.": "Ах, ты уже продвинутый ученик! Время летит незаметно. Кажется, только вчера ты поступил.\\n\\nМоя следующая лекция будет посвящена техникам бардовской хирургии. Для демонстрации мне понадобятся некоторые материалы. Можешь принести их для меня? Отлично. До свидания."
"Very good.": "Очень хорошо."
"I need you to collect one more unusual wind-heart for me. You'll find the gale-chanting spot in Povus, near water. Summon a tornado there, and you should find a swampy wind. I need its heart. After you kill it, run quickly. You know why by now.": "Мне нужно, чтобы ты собрал ещё одно необычное сердцебиение ветра. Ты найдёшь место, где поют ветры, в Повусе, рядом с водой. Призови там торнадо, и ты должен обнаружить болотистый ветер. Мне нужно его сердце. После того как убьёшь его, быстро беги. Ты уже знаешь почему."
"Thank you. I have asked something cruel of you, and I recognize that. In exchange, I will teach you the most secretive weather witching secrets I know.": "Спасибо. Я попросил у тебя кое-что жестокое, и я это осознаю. В обмен я научу тебя самым секретным тайнам погодного колдовства, которые знаю."
"Yes, as I said, if you bring me the heart of a young free-range sand elemental, I'll teach you what I can.": "Да, как я и говорил, если ты принесёшь мне сердце молодого свободноразгуливающего песчаного элементаля, я научу тебя всему, что смогу."
"You want me to train you in Weather Witching? Well... I'm flattered, but I'm hardly the most qualified instructor. Though I suppose if even MY meager skills are above yours, I should help you out of the doldrums of mediocrity. But it will take time, and I'm only visiting for a short while.\n\nWhy don't you run an errand for me? That will free up some time to give you lessons.\n\nI've heard there's an old gale-chanting spot. I'm not sure where it is exactly, but it's on a hill overlooking a lake. There can't be that many lakes, right? You'll know you're in the right spot by the breeze you feel.\n\nI've heard that if you summon a sandstorm while standing there, it will attract a young breeze elemental right to you! Most aren't native to this realm, but something about the winds in the Ilmari allow them to be born. Quite unusual! So anyway, it will find you in seconds. Kill it and get its heart. Don't worry: most wind elementals that grow up <i>here</i> end up insane anyway, so you're doing it a favor, maybe.\n\nAfter you get that heart, you should definitely leave very quickly, though. Larger wind elementals will be attracted, too, and noone can fight a hurricane.": "Ты хочешь, чтобы я обучил тебя погодной ведьме? Ну... мне лестно, но я вряд ли самый квалифицированный наставник. Хотя, если даже МОИ скромные навыки выше твоих, я должен помочь тебе выбраться из болота посредственности. Но это займёт время, а я здесь ненадолго.\n\nПочему бы тебе не выполнить одно поручение для меня? Это освободит немного времени для уроков.\n\nЯ слышал, что есть старое место, где поют ветры. Точно не знаю, где оно, но это холм с видом на озеро. Озёр не так много, верно? Ты поймёшь, что на правильном месте, по ощущению ветра.\n\nГоворят, если призвать там песчаную бурю, к тебе прилетит молодой элементаль ветра! Большинство из них не родом из этого мира, но что-то в ветрах Илмари позволяет им рождаться. Довольно необычно! В любом случае, он появится через секунды. Убей его и забери его сердце. Не волнуйся: большинство элементалей ветра, выросших <i>здесь</i>, всё равно сходят с ума, так что, может быть, ты делаешь им одолжение.\n\nПосле того как получишь это сердце, лучше быстро уходи. Крупные элементали ветра тоже придут, и никто не сможет сразиться с ураганом."
"You killed it! Oh, now you've made me feel guilty.\n\nI was told to get this heart for my instructor back home, but I couldn't bring myself to kill a wind spirit. So I made you do it! That was cruel of me, but kind of you. In return, I'll teach you what I can. Some of my lessons will be hands-on, though. I need to teach you the way I was taught.": "Ты его убил! Ох, теперь я чувствую вину.\n\nМне сказали принести это сердце моему наставнику домой, но я не смог заставить себя убить духа ветра. Поэтому я заставил это сделать тебя! Это было жестоко с моей стороны, но и мило с твоей. Взамен я научу тебя тому, что умею. Некоторые уроки будут практическими. Мне нужно научить тебя так, как учили меня."
"I found reference to another gale-chanting spot, and this one is right outside of Statehelm! Unfortunately, it's underwater. I suppose the waterline has moved since it was first made. So hold your breath and look for it past the docks. Summon a tornado there, and you should be able to access an unusual weather form. Kill it and get its heart.\n\nAnd then you should run. It might have a guardian itself, and you wouldn't want to run into that.": "Я нашёл упоминание о ещё одном месте, где поют ветры, и оно находится прямо за пределами Стейтхелма! К сожалению, оно под водой. Похоже, уровень воды изменился с тех пор, как его создали. Так что задержи дыхание и ищи его за доками. Призови там торнадо, и ты сможешь получить доступ к необычной погодной форме. Убей её и забери её сердце.\\n\\nА потом беги. У неё может быть собственный страж, и ты не захочешь с ним столкнуться."
"Siiigh... Once again I've used you to kill a creature that I wasn't able to kill. Am I weak? Perhaps. But delegating tasks you're unable to do yourself is top-tier delegation. And I'm a delegate. So I think I'm doing pretty well, actually.\n\n... I'm sorry. And thanks.": "Вздох... Снова я использовал тебя, чтобы убить существо, с которым сам не справился. Я слаб? Возможно. Но делегировать задачи, которые сам не можешь выполнить — это высший пилотаж делегирования. А я — делегат. Так что, думаю, у меня всё неплохо, на самом деле.\n\n... Прости. И спасибо."
"I may have figured out what the rune charts are for, but I need to make one more -- a really powerful one. Hmm... I have some very high-quality paper, but I really need some amazing ink. Holistic ink would do well here, I think. Yes. Do you have any amazing holistic ink in that huge backpack of yours?": "Возможно, я понял, для чего нужны рунические схемы, но мне нужно сделать ещё одну — действительно мощную. Хм... У меня есть очень качественная бумага, но мне действительно нужны удивительные чернила. Думаю, здесь подойдут целительные чернила. Да. Есть ли у тебя в этом огромном рюкзаке удивительные целительные чернила?"
"Oh, the ink, thank you. I hope it wasn't any trouble! Let's see what happens when I use it to create a geometric chart.\n\n<i>[ You wait for the Sand Seer to work. ]</i>\n\nOh my. Did you see that? I felt that healing wave all the way to my toes! Hah! It's a sigil! Quite unusual, too. If you're skilled enough in the art of sigil scripting, I'd be happy to show you how to make it.\n\n<i>[ Ability 'Health Glyph' added to Sand Seer's Training menu. ]</i>": "О, чернила, спасибо. Надеюсь, это не доставило тебе хлопот! Давай посмотрим, что получится, если я использую их для создания геометрической схемы.\\n\\n<i>[ Ты ждёшь, пока Песчаный Провидец работает. ]</i>\\n\\nОх ты! Ты это видел? Я почувствовал волну исцеления аж до кончиков пальцев ног! Ха! Это сигил! К тому же довольно необычный. Если ты достаточно искусен в искусстве написания сигилов, я с радостью покажу тебе, как его создать.\\n\\n<i>[ Способность «Глиф здоровья» добавлена в меню обучения Песчаного Провидца. ]</i>"
"Denton Razor said that some of my jewelry was sold to a fence in town. Everybody knows who the town fence is: that filthy human who runs the bar on the docks. Cynthia Rolfe! Go berate her until she relinquishes my jewelry!": "Дентон Рейзор сказал, что некоторые из моих украшений были проданы скупщику в городе. Все знают, кто такой городской скупщик: тот грязный человек, который управляет баром на доках. Синтия Ролф! Иди и отругай её, пока она не отдаст мои украшения!"
"You found some more of my jewelry! Oh, if only it were enough. But it's NOT! I still can't open my shop. But I have another lead...": "Вы нашли ещё мои украшения! О, если бы их было достаточно. Но ЭТО НЕ ТАК! Я всё ещё не могу открыть свой магазин. Но у меня есть ещё одна зацепка..."
"I am overwhelmed with work requests! This is a good thing, but I am just not able to keep up! I must learn to say 'no', I suppose. But it is too late for that now. Are you capable of making tools? I could use your help in filling a simpler order: I need six good skinning knives.": "Меня завалили заказами! Это хорошо, но я просто не успеваю! Пожалуй, мне нужно научиться говорить «нет». Но сейчас уже слишком поздно. Ты умеешь делать инструменты? Мне нужна помощь с более простым заказом: мне нужно шесть хороших ножей для снятия шкур."
"My alchemist contact in Statehelm insists there are no commonalities in the poisons that Korbok had you retrieve. Mr. Farblood himself even took a look, to no avail. There must be something deeper going on here.\n\nTake this journal, and keep as detailed notes in it as you can. Get in close with Korbok, see if there's any more poison-related missions he can send you on, and just try to gather more info in general. While I do find him and his kind fascinating, I cannot let that get in the way of my primary assignment.": "Мой алхимик в Стейтхелме настаивает, что в ядах, которые Корбок заставил тебя собрать, нет никаких общих черт. Сам мистер Фарблад даже посмотрел, но безрезультатно. Здесь должно происходить что-то более глубокое.\\n\\nВозьми этот дневник и веди в нём как можно более подробные записи. Сблизься с Корбоком, узнай, не поручит ли он тебе ещё миссии, связанные с ядами, и просто постарайся собрать больше информации в целом. Хотя я нахожу его и его подобных очень интересными, я не могу позволить этому отвлечь меня от моей основной задачи."
"<i>[Pitre flips through the pages in your notebook]</i>\n\nI can hardly believe it. Nothing incriminating, and clearly not for lack of trying. I have learned a lot about goblin culture these last few weeks, but covering their trail <i>this</i> well is something I did not expect.\n\nI've an idea to put this to bed once and for all. We shall set up a stake-out and keep an eye on Korbok together. With both of us working simultaneously, are sure to catch him in the act of whatever he is performing.\n\n[New hangout with Pitre unlocked]": "<i>[Питр перелистывает страницы в твоём блокноте]</i>\\n\\nТрудно поверить. Ничего компрометирующего, и явно не из-за отсутствия попыток. За последние несколько недель я многое узнал о культуре гоблинов, но такое тщательное сокрытие следов — я не ожидал.\\n\\nУ меня есть идея, как покончить с этим раз и навсегда. Мы устроим засаду и будем вместе следить за Корбоком. Работая одновременно, мы обязательно поймаем его на месте какого бы то ни было действия.\\n\\n[Открыто новое место встречи с Питром]"
"My experiments have proven fruitless. Landri's idea seems more compelling. But sadly I don't have any electricity power sources. Can you get me some? Fulgurite will do. Just look for creatures that inherently give off lightning. ... Admittedly there are probably none of those in Kur, but, well, if you end up travelling elsewhere... keep it in mind.": "Мои эксперименты оказались безрезультатными. Идея Ландри кажется более убедительной. Но, к сожалению, у меня нет источников электрической энергии. Можешь достать мне немного? Подойдёт фульгурит. Просто ищи существ, которые изначально излучают молнии. ... Правда, в Кур, вероятно, таких нет, но если ты отправишься в другие места... имей это в виду."
"The lumber camps east of here were made by humans. I helped build the fences myself! But then goblins came and ran us out, and now they're chopping our wood!\n\nGoblins have huge numbers on their side, but most goblins are stupid. To really hurt 'em, you gotta kill the overseers! Look for the mage-casting goblins in the camps, and kill 'em.\n\nAnd hey, if you want help with how to attack the camps, just ask me.": "Лесозаготовительные лагеря к востоку отсюда построили люди. Я сам помогал строить заборы! Но потом пришли гоблины и выгнали нас, а теперь они рубят наш лес!\n\nУ гоблинов огромное численное преимущество, но большинство из них глупы. Чтобы действительно нанести им урон, нужно убить надсмотрщиков! Ищи гоблинов-магов в лагерях и убей их.\n\nИ, кстати, если хочешь помощи с тем, как атаковать лагеря, просто спроси меня."
"You killed the overseers? Great job! I'm sure they'll send up some new ones soon enough, but that'll slow 'em down for a few days. If we keep it up, they'll abandon the camps out here and retreat back into Sedgewick Forest!\n\nHere's a reward for the good news you brought me.": "Ты убил надсмотрщиков? Отличная работа! Уверен, скоро пришлют новых, но это задержит их на несколько дней. Если мы продолжим в том же духе, они бросят лагеря здесь и отступят обратно в лес Седжвик!\n\nВот награда за хорошие новости, которые ты мне принес."
"I loaned old Vera my best garden spade a year ago. Then, of course, she was killed and horrifically eaten by goblins. But my spade might still be in her house! If I was braver, I'd go look for it.\n\nVera's farm is northeast of here.": "Год назад я одолжил старой Вере свою лучшую садовую лопату. А потом, конечно, её убили и ужасно съели гоблины. Но моя лопата может всё ещё быть в её доме! Если бы я был смелее, я бы пошёл искать её.\\n\\nФерма Веры находится к северо-востоку отсюда."
"Spadey! You found Spadey! Thank you! I made a new spade, of course, but it's just not the same. Here, you can keep Spadey II. And let me give you some gardening tips to go with it!": "Спейди! Ты нашёл Спейди! Спасибо! Я, конечно, сделал новую лопату, но это уже не то. Вот, можешь оставить Спейди II. И позволь дать тебе несколько советов по садоводству в придачу!"
"I have a special book request that I could use your help with. If I can sell this, it will make up for months of poor sales!\n\nThe book I need is \"The Lost Travels of Romast.\" It didn't exactly have a large print run. There are probably only a few copies across all of Alharth. But I have a lead!\n\nA certain... friend... with greenish skin... who lives in a cave in Povus has a copy hidden deep in her cave. But she says the deep cave is \"too scary nowadays\" and she can't retrieve it for me. She says it's hidden behind a gilded chest. I'm sure that should make it easy to find. Right?\n\nThis book is priceless, so I will give you priceless knowledge in exchange.": "У меня есть особый заказ на книгу, и мне нужна твоя помощь. Если я смогу её продать, это компенсирует месяцы плохих продаж!\\n\\nМне нужна книга «Потерянные путешествия Ромаста». Тираж у неё был совсем небольшой. Вероятно, по всему Алхарду существует всего несколько копий. Но у меня есть наводка!\\n\\nОдна... знакомая... с зелёной кожей... которая живёт в пещере в Повусе, спрятала копию глубоко в своей пещере. Но она говорит, что глубокая пещера сейчас «слишком страшная», и она не может достать её для меня. Говорит, что книга спрятана за позолоченным сундуком. Думаю, это должно облегчить поиск. Правда?\\n\\nЭта книга бесценна, поэтому я дам тебе бесценные знания взамен."
"You found the book! Well, it's more of a scroll, isn't it?\n\nEven after I split the money with Errr... with my friend, I'm still going to make a lot of money from this. It's only fair that I reward you with something equally valuable: my library science techniques! Take these organizational secrets to your grave!\n\n<i>[There's a new button on your inventory window which lets you filter viewed items by Equipment, Consumable, Quest, or Other.]</i>\n\nHey, do you want to help me fill other book orders? I have a bunch that I've been unable to fulfill. I'll pay you a hefty cut!": "Ты нашёл книгу! Хотя, скорее, это свиток, не так ли?\\n\\nДаже после того, как я поделюсь деньгами с Эррр... с моим другом, я всё равно заработаю много денег на этом. Было бы справедливо наградить тебя чем-то не менее ценным: моими методами библиотечной науки! Возьми эти секреты организации с собой в могилу!\\n\\n<i>[В окне инвентаря появилась новая кнопка, позволяющая фильтровать просмотренные предметы по категориям: Экипировка, Расходуемые, Квестовые или Прочее.]</i>\\n\\nЭй, хочешь помочь мне выполнить другие книжные заказы? У меня есть куча заказов, которые я не смог выполнить. Я заплачу тебе щедрую долю!"
"The science deck has been given over to the mad wizard that made those... monstrosities. And he's not even here! He just astrally projects himself here from the mortal realm.\n\nSustained astral projection requires an impressive amount of magical fortitude, I'll admit. But its so gauche!\n\nYou should just pull his plug.": "Научная палуба отдана безумному волшебнику, который создал этих... чудовищ. И его даже здесь нет! Он просто астрально проецирует себя сюда из мира смертных.\\n\\nПоддерживать астральную проекцию требует впечатляющего магического запаса, признаю. Но это так безвкусно!\\n\\nТебе просто нужно вырубить его."
"Did you disconnect him? Hah! I'm sure he'll just call back in a bit. But he'll be extra pissed off now. That might be fun! Good work!": "Ты его отключил? Ха! Я уверен, он скоро перезвонит. Но теперь он будет вдвойне зол. Это может быть забавно! Отличная работа!"
"I have a... magical illness.\n\nI need a rare substance known as Acur Blood. I know ...not... where one such as... yourself... would find this thing. Perhaps seek out sages or ...mystics. In any case, I grant you no hope. But if you succeed, I shall reward you handsomely.\nWait! Actually, make it two jars of Acur Blood.": "У меня... магическая болезнь.\\n\\nМне нужна редкая субстанция, известная как Кровь Акюра. Я не знаю... где такой, как... ты... мог бы найти эту вещь. Возможно, стоит обратиться к мудрецам или... мистикам. В любом случае, я не даю тебе надежды. Но если ты справишься, я щедро тебя вознагражу.\\n\\nПодожди! На самом деле, нужно две банки Крови Акюра."
"A hand came out of the coffin and snatched the Acur Blood. A moment later, a pale human stepped out.": "Из гроба вырвалась рука и схватила Кровь Акюра. Мгновение спустя вышел бледный человек."
"North and east of here is a very powerful, semi-sentient fey bear named The Mauler. He and his mate dominate whole swaths of the countryside, maiming and killing any caravans that try to come here. Can you put him down? Bring me his claw when you've done the deed.": "К северу и востоку отсюда обитает очень могущественный, полуразумный фейский медведь по имени Моляр. Он и его партнёр властвуют над большими участками окрестностей, калеча и убивая любые караваны, пытающиеся пройти сюда. Ты сможешь его уничтожить? Принеси мне его коготь, когда выполнишь дело."
"Yes, this is it! The very claw that nearly killed me. Who's laughing now, Mauler? I outlived you! Fool bear!\n\n<i>(Kleave tosses the bloody paw over her shoulder.)</i> Good work. Here. Let me show you a clever stitching technique.": "Да, это оно! Самый коготь, что чуть не убил меня. Кто теперь смеётся, Молер? Я пережила тебя! Глупый медведь!\n\n<i>(Клив бросает окровавленную лапу через плечо.)</i> Хорошая работа. Вот. Позволь показать тебе хитрый приём шитья."
"I'll tell you one of the reasons I'm so depressed. I was exploring a bit and I found a cave close by, just down the road a ways, a little north and east of here. There's this corpse in there that had a note, and apparently there were people that needed saving, so I rushed in like old times, bashing spiders everywhere! And then, somehow, I was overrun by spiders, a dozen of 'em or more. I threw my backup shield at a big one and ran. But that was my second-most favorite shield!  Now I'm left with only my favorite shield and my third-favorite shield. And fourth-favorite. I feel so empty.\n\nHey, if you find that cave, grab the shield for me? I'm not sure where I was, but I remember I didn't go up any slopes, if that helps.": "Я расскажу тебе одну из причин, почему я так подавлен. Я немного исследовал окрестности и нашёл пещеру неподалёку, чуть к северо-востоку отсюда, по дороге. В ней был труп с запиской, и, похоже, там были люди, которым нужна была помощь, так что я бросился внутрь, как в старые времена, разбивая пауков повсюду! А потом меня как-то затоптали пауки — дюжина или больше. Я бросил свой запасной щит в большого и убежал. Но это был мой второй по любимости щит! Теперь у меня остались только мой самый любимый щит, третий по любимости и четвёртый. Я чувствую себя таким опустошённым.\\n\\nЭй, если найдёшь ту пещеру, забери щит для меня? Я точно не помню, где был, но помню, что не поднимался ни на один склон, если это поможет."
"Thanks! Oh. Huh. It's pretty badly damaged. I can fix it, but that'd be a lot of work. I'll pass. But hey, let me get the straps fixed up and you can use it. I mean, it's not amazing anymore, but it's still better than the worthless junk they call shields around here!": "Спасибо! Ох. Хм. Оно довольно сильно повреждено. Я могу починить, но это будет много работы. Я пас. Но эй, давай я починю ремни, и ты сможешь им пользоваться. Оно уже не потрясающее, но всё равно лучше той никчёмной дряни, которую здесь называют щитами!"
"The Mnemonix Index has laid bare what other resources I will need. Here is a list. Take care of it.": "Индекс Мнемоникса выявил, какие ещё ресурсы мне понадобятся. Вот список. Позаботься о них."
"These mind gems... they're synthetic! Who would bother to ... nevermind. These will work. Everything seems to be here. There is but one more step!": "Эти камни разума... они синтетические! Кто бы стал... неважно. Они подойдут. Похоже, всё здесь. Остался только один шаг!"
"While you were taking your time finding the dye I needed, I completed a test-run of General Tremal's gown. It's perfect! Except for the color. So now I need to make another gown in aquamarine... and I've run out of the secret ingredient needed for its protective elements: cockatrice beaks. Can you buy some, or murder some cockatrices and de-beak them? Thank you. Go do it now. This is important!": "Пока ты медлил с поиском нужной мне краски, я провёл тестовый пошив платья генерала Тремала. Оно идеальное! За исключением цвета. Теперь мне нужно сделать другое платье аквамаринового цвета... и у меня закончился секретный ингредиент для защитных элементов: клювы кокатрис. Можешь купить их или убить кокатрис и снять клювы? Спасибо. Иди и сделай это сейчас. Это важно!"
"The beaks! Don't touch them with your bare hands, you'll waste their magic! Yes, yes, these will do nicely. I'm sure Tremal will forgive me when she tries on this masterpiece of a gown!\n\nOh, you're still here? I have work to do, so go! And take this practice gown with you. It's the wrong color.": "Клювы! Не трогай их голыми руками, иначе ты потратишь их магию впустую! Да, да, эти подойдут прекрасно. Я уверен, Тремал простит меня, когда примерит это шедевральное платье!\\n\\nО, ты всё ещё здесь? У меня есть работа, так что иди! И возьми с собой это тренировочное платье. Цвет не тот."
"Mox and Bellema don't believe me, but I swear I saw another one of those mushroom men in a cave near here! It was in 'Snowblood Shadow Cave'. I can't understand his way of communicating, but I'm sure he knows the secret of these mushroom rings. If you figure out the secret, tell me!": "Мокс и Беллема мне не верят, но я клянусь, я видел ещё одного из тех грибных людей в пещере неподалёку! Это была пещера «Тень Снежной Крови». Я не понимаю его способ общения, но уверен, что он знает тайну этих грибных колец. Если ты раскроешь эту тайну, скажи мне!"
"So you were able to talk to the mushroom man? And he showed you how to teleport?! I knew it! I knew they were a transit system! Oh this is huge news! You've gotta hang out here and fill me in on the details!\n\nHere's a little cash incentive! But if you let me in on the secret, I'll teach you my personal secret mushroom-farming techniques in exchange.": "Так ты смог поговорить с грибным человеком? И он показал тебе, как телепортироваться?! Я же говорил! Я знал, что это транспортная система! О, это огромная новость! Ты должен остаться здесь и рассказать мне все подробности!\n\nВот небольшое денежное вознаграждение! Но если ты раскроешь мне секрет, я взамен научу тебя своим личным секретным методам выращивания грибов."
"Last night, a mysterious Elf came into my tent. He was wrapped head to toe in gauze and smelled like dirt -- it was terrifying! You never know what those sex-riddled maniacs will do. But he just dropped a strange thing on my bed and left, saying \"study this heartshroom and prepare for the invasion.\"\n\nThe so-called Heartshroom is actually an amazing type of mushroom that I've never seen before! It has incredible regenerative powers... this could make me rich! Err, make <i>us</i> rich. But I need more. Too bad I have no idea where they come from! If you find some, bring them to me?": "Прошлой ночью в мою палатку зашёл загадочный эльф. Он был закутан с головы до ног в бинты и пах землёй — это было страшно! Никогда не знаешь, что эти одержимые страстью безумцы могут натворить. Но он просто бросил странную штуку на мою кровать и ушёл, сказав: «изучи этот сердечный гриб и приготовься к вторжению».\\n\\nТак называемый сердечный гриб — на самом деле удивительный вид гриба, которого я никогда раньше не видел! У него невероятные регенеративные способности... это может сделать меня богатым! Точнее, сделать <i>нас</i> богатыми. Но мне нужно больше. Жаль, что я не знаю, откуда они появляются! Если найдёшь несколько, принеси мне?"
"You found more?! This is wonderful! Wonderful! Let me show you some of the ways this mushroom differs from the norm. <i>(Charles spends a while showing you diagrams he's created. You earn Mycology XP.)</i>": "Ты нашёл ещё?! Это замечательно! Замечательно! Позволь показать тебе, чем этот гриб отличается от обычных. <i>(Чарльз некоторое время показывает тебе созданные им диаграммы. Ты получаешь опыт в Микологии.)</i>"
"Very few guests are participating in the Natural Food Experience. Many claim that it is boring or too similar to manual labor to be entertaining. I must increase guest satisfaction before this attraction is closed! Perhaps you would like to participate? Simply grow some onions in the garden and exclaim that you are enjoying yourself.": "Очень мало гостей участвуют в Опыт с натуральной едой. Многие утверждают, что это скучно или слишком похоже на ручной труд, чтобы быть развлечением. Мне нужно повысить удовлетворённость гостей, прежде чем эту аттракцион закроют! Возможно, вы хотите поучаствовать? Просто вырастите немного лука в саду и воскликните, что вам нравится."
"Thank you for experiencing the wonders of nature, right here at the Red Wing Casino! Please enjoy these guest tokens.": "Спасибо, что испытали чудеса природы прямо здесь, в казино «Красное Крыло»! Пожалуйста, примите эти жетоны гостя."
"Thank you for aiding me. If you have time to continue the Natural Food Experience, please grow several beets and mention that it is a joy to do so.": "Спасибо за помощь. Если у тебя будет время продолжить Эксперимент с натуральной едой, вырасти несколько свёкл и скажи, что это доставляет радость."
"The Natural Food Experience ends with a difficult task: growing carrots. This is not a task that the average guest can complete during their stay. As a result, reported guest satisfaction is extraordinarily low. Please grow some carrots and exclaim that you are not perturbed by the slow growing speed of organic matter.": "Опыт натурального питания заканчивается сложной задачей: выращиванием моркови. Это не та задача, которую средний гость может выполнить за время своего пребывания. В результате уровень удовлетворённости гостей чрезвычайно низок. Пожалуйста, вырастите немного моркови и воскликните, что вас не смущает медленный рост органического вещества."
"Thank you for experiencing the wonders of nature, right here at the Red Wing Casino! Please enjoy these guest tokens. (I've included some extra as thanks!)": "Спасибо, что испытали чудеса природы прямо здесь, в казино «Красное Крыло»! Пожалуйста, примите эти жетоны гостя. (Я добавил немного в подарок!)"
"I wish to mate with Zeratak, mammal. I wish it but it cannot be without my death. Do you see the issue? I must provide sustenance for the young, and traditionally that would be my body.\n\nA new tradition is needed. Perhaps some other creatures would work just as well. But I should get a <i>lot</i> of them... just to be on the safe side. Deer innards are preferable. But they run so fast!": "Я желаю спариться с Зератаком, млекопитающим. Я этого хочу, но это невозможно без моей смерти. Видишь проблему? Я должен обеспечить питание для потомства, и традиционно для этого служит моё тело.\\n\\nНужна новая традиция. Возможно, подойдут и другие существа. Но мне нужно очень много таких... на всякий случай. Предпочтительны внутренности оленя. Но они так быстро бегают!"
"Perfect! I will begin the mating ritual immediately! Well. Not <i>immediately</i>, there's no need to rush things. But soon. Yes. Soon.": "Отлично! Я начну ритуал спаривания немедленно! Ну, не <i>немедленно</i>, спешить не стоит. Но скоро. Да. Скоро."
"I have this crazy recipe for cheese that ripens within the hide of a cow. Crazy gimmick, right?! Trouble is, it requires a perfectly-skinned cow hide. I'm a pretty terrible skinner, so that's not going to happen.\n\nBut if you happen upon one, save it for me!": "У меня есть безумный рецепт сыра, который созревает прямо в шкуре коровы. Сумасшедший трюк, правда?! Проблема в том, что для этого нужна идеально снятая коровья шкура. Я совсем плох в снятии шкур, так что это вряд ли получится.\\n\\nНо если вдруг найдёшь такую, сохрани её для меня!"
"That's perfect! A perfect hide! Did you skin this yourself? No matter, no matter. What's important is that it's mine now, and I can get to work on this Cow's Paradise cheese! Here. Some of my private cheese stock should be ample payment!": "Это идеально! Идеальная шкура! Ты сам её снял? Неважно, неважно. Главное, что она теперь моя, и я могу приступать к работе над сыром «Рай для коров»! Вот. Немного моего личного запаса сыра — достойная плата!"
"I was hired to play at a wedding, and I need good publicity, so this gig has to be great! The requested music is not a problem since I'm amazing. But these foreigners have a weird custom: near the end of the ritual, rice is thrown at the couple. I asked if balls of ordinary Rahu rice would do, and they said no -- they're too heavy! So I guess that I'll need secret rice. You know: the incredibly deliciously fluffy rice that can't be found in stores. The trick is: how do I get some? Do you have any?": "Меня наняли играть на свадьбе, и мне нужна хорошая реклама, так что этот концерт должен быть отличным! Заказанная музыка — не проблема, ведь я великолепен. Но у этих иностранцев странный обычай: под конец ритуала влюблённым кидают рис. Я спросил, подойдут ли обычные шарики из риса Раху, а они сказали нет — они слишком тяжёлые! Значит, мне нужен секретный рис. Знаешь, тот невероятно вкусный и пушистый рис, который не найти в магазинах. Вопрос в том: как мне его достать? У тебя есть такой?"
"This is the famous secret rice? Let me try it. Hmm... it's <i>slightly</i> lighter-weight than Rahu rice. I guess this will have to do for the wedding. Thanks! Oh, and here: I was going to make a cream sauce for my rice balls, but I think this secret rice will throw best ungarnished. Maybe these ingredients are useful to you?": "Это знаменитый секретный рис? Дай-ка попробую. Хм... он <i>слегка</i> легче риса Раху. Похоже, этого хватит для свадьбы. Спасибо! О, и вот: я собирался сделать сливочный соус для своих рисовых шариков, но думаю, этот секретный рис лучше всего подавать без украшений. Может, эти ингредиенты пригодятся тебе?"
"Can you get me a perfectly preserved wolf skin? A trophy skin. I guess you'd need to be an expert skinner to get one... and even then it may take a few tries. I just need one, though, so it can't be that hard, right?": "Можешь достать мне идеально сохранившуюся шкуру волка? Трофейную шкуру. Думаю, нужно быть экспертом по снятию шкур, чтобы получить такую... и даже тогда может понадобиться несколько попыток. Но мне нужна всего одна, так что это не должно быть так сложно, правда?"
"Perfect! I'll use this in front of the fire to set the mood tonight with Therese. Actually, wait, that would offend her. She loves animals. Nevermind, I'll just sell it. But thanks!": "Отлично! Я использую это у огня, чтобы создать настроение сегодня вечером с Терезой. Хотя, подожди, это её обидит. Она любит животных. Ладно, я просто продам это. Но спасибо!"
"My hobby is... let's call it Urban Expression. It's a legitimate art form and an important one, especially here in Statehelm. Let's just jump right in, shall we? Take your dye and head to the barracks area. The walls all around there are good spots for your art. Pick a place and make your mark!\n\n<i>[ Place the Graffiti ability on your sidebar. If you are in a valid graffiti area (and have dye on hand) the ability will stop being grayed out. There are graffiti spots all over, though they are a little denser near the barracks/jail area.]</i>": "Моё хобби... назовём это Городским выражением. Это законная форма искусства и важная, особенно здесь, в Стейтхелме. Давай сразу приступим, хорошо? Возьми свою краску и отправляйся в район казарм. Стены вокруг — отличные места для твоего искусства. Выбери место и оставь свой след!\\n\\n<i>[Помести способность Граффити на панель быстрого доступа. Если ты находишься в подходящей зоне для граффити (и у тебя есть краска), способность перестанет быть неактивной. Места для граффити есть повсюду, хотя они немного плотнее в районе казарм и тюрьмы.]</i>"
"Great initiative. I'll check it out personally later. Keep at it: it's the only way to break the people out of their urban prison of the mind.": "Отличная инициатива. Я лично проверю это позже. Продолжай в том же духе: это единственный способ вырвать людей из их городского ментального заключения."
"Another easy one: practice your Thunderous Note on 50 enemies and then kill them. Pay attention to the efficacy of the note on different types of enemies.": "Ещё одно простое задание: потренируйте свой Громовой Нот на 50 врагах, а затем убейте их. Обратите внимание на эффективность ноты на разных типах врагов."
"Good. What did you learn from all those loud notes? Write me a short essay. Actually, write that essay and then self-grade it; I'm quite busy.": "Хорошо. Что ты узнал из всех этих громких нот? Напиши мне короткое сочинение. На самом деле, напиши это сочинение и сам его оцени; я довольно занят."
"The potion worked! I feel stronger. Healthier. More virile. I can feel my powers returning! I just need to unlock... them again.\n\nHelp me with the unlocking ritual, and I shall unlock the power of the bat for you, too!\n\nI just need some supplies for the inscription ceremony.\n\nNow where did I leave the ghostly guano? Ah, of course. On an island known as Sun Vale, look for a ruin. That should be enough to go on, right? Oh, yes: some of those grim little Winter Fae like to... frolic nearby.\n\nFor the other ingredients, I'm certain your... cosmopolitan upbringing will aid you in their procurance.": "Зелье сработало! Я чувствую себя сильнее. Здоровее. Более жизнеспособным. Я ощущаю возвращение своих сил! Мне осталось только снова их разблокировать.\\n\\nПомоги мне с ритуалом разблокировки, и я тоже открою для тебя силу летучей мыши!\\n\\nМне просто нужны припасы для церемонии надписания.\\n\\nТеперь где же я оставил призрачный гуано? Ах, конечно. На острове, известном как Сан Вейл, ищи руины. Этого должно быть достаточно, верно? О, да: некоторые из этих мрачных маленьких зимних фей любят... резвиться поблизости.\\n\\nДля остальных ингредиентов я уверен, что твоё... космополитичное воспитание поможет тебе в их добыче."
"I've prepared the paint for the inscription. Let's begin.\n\n<i>[Truxartis inscribes a symbol into his palm. The symbol glows and vanishes. He then inscribes the same symbol into your palm.]</i>\n\nYour master being so powerful has many... benefits. One is that you inherted many of my ancient... powers. And I have unlocked one of them for you.\n\nYou can now become a giant bat! Use this power wisely. Or, more realistically, use this power amusingly.": "Я приготовил краску для надписи. Давай начнём.\\n\\n<i>[Труксартис вырезает символ на своей ладони. Символ светится и исчезает. Затем он вырезает тот же символ на твоей ладони.]</i>\\n\\nТвой мастер настолько могущественен, что это даёт много... преимуществ. Одно из них — ты унаследовал многие мои древние... силы. И я открыл одну из них для тебя.\\n\\nТеперь ты можешь превратиться в гигантскую летучую мышь! Используй эту силу с умом. Или, что более реалистично, используй её забавно."
"The nonsense I have to deal with. An Elf in town recently reported a theft of his magic headband. But get this: he said a super-intelligent rat stole it from him in the dead of night. Clearly more is going on here, but he won't say anything else.\n\nAnd the frustrating part about this idiotic story is that I believe him! So, if you're travelling in the woods outside of town and you come across a super-intelligent rat with a tiara or something, can you bring it to me? I need to get to the bottom of this, and I think that head thing will be a useful bargaining chip.": "Какой бред мне приходится терпеть. Недавно один эльф в городе сообщил о краже своей волшебной повязки на голову. Но представь себе: он сказал, что её у него украла сверхразумная крыса в разгар ночи. Очевидно, тут что-то не так, но он больше ничего не рассказывает.\\n\\nИ самое раздражающее в этой идиотской истории — я ему верю! Так что, если ты будешь путешествовать по лесу за городом и встретишь сверхразумную крысу с короной или чем-то подобным, можешь привести её ко мне? Мне нужно разобраться в этом, и эта повязка будет полезным козырем."
"This is it? This is the thing Echur wanted back? Huh. Well, thanks! Here, let me reward you. I don't have a lot of cash, but here's a Council Note.": "Это оно? Это то, что Эчур хотел вернуть? Хм. Ну, спасибо! Вот, позволь наградить тебя. У меня мало денег, но вот Советская записка."
"So you know me, how I love magic rings? I splurged on a doozy that just came in from Statehelm! But it needs to be \"tempered in the blood of nightmares.\" What the hell is that supposed to mean? Can you get me some nightmare blood, or guts, or whatever?": "Ты же знаешь меня, как я люблю магические кольца? Я раскошелился на одно, которое только что привезли из Стейтхелма! Но его нужно «закалить в крови кошмаров». Что, чёрт возьми, это значит? Можешь достать мне немного крови кошмаров, или кишок, или чего-то в этом роде?"
"Oh gods, it's still moving! What in the hell! This is seriously wrong. Okay... okay, here goes. <i>Elahil rubs his magic ring in the flesh.</i>\n\nHey, I think it's working! Here, you can have my old ring. This one's way better.": "О боги, оно всё ещё двигается! Что же это такое! Это серьёзно неправильно. Ладно... ладно, сейчас попробую. <i>Элахил трет свой магический перстень о плоть.</i>\\n\\nЭй, кажется, работает! Вот, можешь взять мой старый перстень. Этот намного лучше."
"It would calm my spores to know Senzur was deceased. He is a mighty psychic presence, and he is quite dangerous. To find him, head down the hall and turn right. Then a left. Then right. If you run into Greta the garden tender then you have failed to follow my very simple instructions.": "Мне было бы спокойнее знать, что Сенцур мёртв. Он обладает мощным психическим присутствием и очень опасен. Чтобы найти его, пройдите по коридору и поверните направо. Затем налево. Потом направо. Если вы встретите Грету, садовницу, значит, вы не последовали моим очень простым указаниям."
"You have slain my friend. I am indebted to you, but yet -- all that I have learned of meat-plants is pain.\n\nSenzur taught me the signature psychic technique of his species. He called it, appropriately, the Mindworm. I could teach you the Mindworm... It will keep his memory alive. <i>[New Training Option Available.]</i>": "Ты убил моего друга. Я обязан тебе, но всё, что я узнал о мясо-растениях — это боль.\n\nСензур научил меня характерной психической технике своего вида. Он назвал её, как нельзя кстати, Червь Разума. Я могу научить тебя Червю Разума... Это сохранит его память живой. <i>[Доступен новый вариант обучения.]</i>"
"Can you ask Zeratak to come visit me? I wish to meet her in broad daylight so that I can run if things go poorly.": "Можешь попросить Зератака прийти ко мне в гости? Я хочу встретиться с ней при свете дня, чтобы успеть убежать, если что-то пойдёт не так."
"Oh good! This will be wonderful. Thank you friend!\n\n[Scripted movement not yet implemented.]": "Отлично! Это будет замечательно. Спасибо, друг!\\n\\n[Скриптовое движение ещё не реализовано.]"
"Azalak wishes to see me? Very well. I shall break a leg, as they say in your idiom. Tell him I am coming.": "Азалак желает меня видеть? Очень хорошо. Я сломаю ногу, как говорится в вашем языке. Скажи ему, что я иду."
"My special art requires a very uncommon ingredient. In fact, it is so rare that I have never obtained it directly myself; I have only ever received it from others. Can you fulfill this role now? I require ectoplasm. It is the give-off of ghosts, banshees, wailing spirits, and other incorporeal former-meatlings.": "Моё особое искусство требует очень редкого ингредиента. На самом деле он настолько редок, что я никогда не получал его напрямую; я всегда получал его от других. Можешь ли ты выполнить эту роль сейчас? Мне нужен эктоплазм. Это выделение призраков, банши, воющих духов и других бесформенных бывших плотоядных существ."
"This is a valuable gift. Thank you. I wish for you to have this in exchange.": "Это ценный подарок. Спасибо. Я хочу, чтобы ты получил это взамен."
"You're a practicing brewer! Love to see it! Let me teach you how to make strawberry wine. Next time you catch me at a party, if you have a bottle of this for me, I'll teach you to make a trickier variety.": "Ты занимаешься пивоварением! Рад видеть это! Позволь научить тебя делать клубничное вино. В следующий раз, когда увидишь меня на вечеринке, если принесёшь мне бутылку этого, я научу тебя делать более сложный сорт."
"Mm, the odor of clipped grass and overripe strawberries. Not mouthwatering, but it gets you drunk!\n\nLet me teach you a classic wine. This one's much tastier.": "Ммм, запах скошенной травы и перезрелой клубники. Не вызывает слюноотделения, но опьяняет!\n\nПозволь научить тебя классическому вину. Это намного вкуснее."
"I have expanded my search and have come into stone-contact with a human engineer near here who claims to know what I need. However, he won't tell me over the aether. Please locate this man and retrieve his letter. He is to be found \"In the Serbule Sewers.\" His name is Arif.": "Я расширил свои поиски и вышел на прямой контакт с человеческим инженером неподалёку, который утверждает, что знает, что мне нужно. Однако он не хочет говорить об этом по эфиру. Пожалуйста, найдите этого человека и заберите его письмо. Его можно найти «В канализации Сербуля». Его зовут Ариф."
"Thank you for your couirier services.\n\nHmm. This is intriguing. I may have more work for you, but I need to do some research first.": "Спасибо за твои курьерские услуги.\\n\\nХмм. Это интересно. Возможно, у меня будет для тебя больше работы, но сначала мне нужно провести некоторые исследования."
"Aww! Merriana sent you?! No offense to you. I just wanted to meet this chick. Did you know she was the head of the weather witches in Dwyndarre? She was the Grand Stormmaster.\n\nWell, I've written down what I know. Take this to her, and put in a good word for me, okay?": "Ой! Мерриана прислала тебя?! Без обид. Я просто хотел встретиться с этой девушкой. Ты знал, что она была главой ведьм погоды в Двиндарре? Она была Великим Мастером Бурь.\\n\\nНу, я записал всё, что знаю. Отнеси это ей и замолви за меня словечко, хорошо?"
"Sex with Malvol is getting old. And that's bad! It's my job to keep it interesting. But I'm really a shield-basher at heart. I'm no good at this.\n\nI have an idea! I could make a sexy panther suit and pretend to hunt him. Hmm he may like that. But I'd need an extremely good panther skin.": "Секс с Мальволом надоедает. А это плохо! Моя задача — поддерживать интерес. Но на самом деле я по душе щитоносец. В этом я не силён.\n\nУ меня есть идея! Я могу сделать сексуальный костюм пантеры и притвориться, что охочусь на него. Хм, ему это может понравиться. Но мне нужна очень хорошая шкура пантеры."
"Wow, this is larger than I expected! Thank you. Here, you can keep this skin -- it was my first idea, but turns out it's not sexy at all.": "Вау, это больше, чем я ожидал! Спасибо. Вот, можешь оставить эту шкуру — это была моя первая идея, но оказалось, что она совсем не привлекательна."
"We mantises were slaves of Dalvos, alongside those idiot brain bugs, for decades. But now we are free! And we seek culture desperately. It makes many of my brethren foolish.\n\nSeveral fool mantises snuck into the town of Serbule in order to steal your culture. It has been many days, and I fear they will unleash a terrible reprisal upon us all. Go and find them, and do whatever is necessary to discreetly resolve the issue. Murder would be the wisest choice. Yes. Murder them.": "Мы, богомолы, десятилетиями были рабами Далвоса, вместе с этими идиотами — мозгоедами. Но теперь мы свободны! И отчаянно ищем культуру. Это делает многих из моих собратьев глупыми.\\n\\nНесколько глупых богомолов пробрались в город Сербуль, чтобы украсть вашу культуру. Прошло много дней, и я боюсь, что они устроят ужасную расправу над всеми нами. Отправляйся и найди их, сделай всё необходимое, чтобы незаметно решить проблему. Убийство будет самым разумным выбором. Да. Убей их."
"It is done? Good. I tip my hat to you. Top o' the morning, as they say in your idiom.": "Всё сделано? Хорошо. Снимаю перед тобой шляпу. Доброе утро, как говорится в вашем языке."
"I need to re-open this Blood Well ... right away. But a very rude... manticore...stole the lens while I was... resting. He is called Lythorax. You will need to kill him. He's sentient... but not <i>very</i> sentient.\n\nYou will need...assistance... most likely.": "Мне нужно немедленно заново открыть этот Кровавый Колодец... Но очень грубый... мантикора... украл линзу, пока я... отдыхал. Его зовут Литоракс. Тебе придётся его убить. Он разумен... но не <i>очень</i> разумен.\n\nТебе, скорее всего, понадобится... помощь..."
"This is it! Now... Yes! The blood well is reopened!": "Вот оно! Теперь... Да! Кровавый источник снова открыт!"
"I haven't been entirely honest with you, and ever since my outburst about the orc I've been thinking that I should be more open. So, here it goes...\n\nI <i>am</i> related to Gloria Stonecurl. She is my sister. I have not seen her in an age, mostly because... well, I don't want to get into it right now. But if you happen upon her in your travels, would you tell her that her wee old brother sends his regards?": "Я был не совсем честен с тобой, и после моего всплеска по поводу орка я всё время думал, что должен быть более откровенным. Итак, вот...\\n\\nЯ <i>действительно</i> родственник Глории Стоункерл. Она моя сестра. Я не видел её целую вечность, в основном потому, что... ну, сейчас не хочу в это вдаваться. Но если ты встретишь её в своих путешествиях, передай, что её маленький старший брат передаёт привет."
"Hmph. The past is the past, eh? That doesn't sound like Gloria, but maybe she's changed since I last saw her. I'll consider her words. Thank you for delivering the message, please take this as a token of my appreciation. And please <i>also</i> don't ask how I got it.": "Хм. Прошлое — это прошлое, да? Это не похоже на Глорию, но, может, она изменилась с тех пор, как я в последний раз её видел. Я приму её слова во внимание. Спасибо, что передал сообщение, возьми это в знак моей благодарности. И, пожалуйста, <i>тоже</i> не спрашивай, как я это получил."
"Get out of town, Drummond?! You've <i>seen</i> him?! And even <i>talked</i> to him?! By Arisetsu, I never thought I'd see the day.\n\nWell, while you're playing messenger, would you mind telling that old fart that the past is the past, and he should come say hi for himself sometime. We've a lot of catching up to do, surely.": "Уехать из города, Драммонд?! Ты <i>видел</i> его?! И даже <i>разговаривал</i> с ним?! Клянусь Арисецу, никогда не думал, что увижу этот день.\n\nНу, раз уж ты играешь в гонца, не мог бы ты сказать этому старому ворчууну, что прошлое — это прошлое, и ему стоит как-нибудь прийти и поздороваться лично. Нам точно есть о чём поговорить."
"The secret ingredient in my potion is, of course... a secret. You are not worthy... to know it. Its creation would be beyond you anyway.\n\nI have hid some of this ingredient in various realms... outside of ours. The easiest to reach is via Eltibule.\n\nThe winter fae have tunnels that travel through Eltibule. Look for green bears. Oh... you may need to find a key. Speak to humans in the area.\n\nOnce inside, look for a Tuvillic Rune. It's not too far... inside.": "Секретный ингредиент моего зелья, конечно же... секрет. Ты недостоин... знать его. Его создание всё равно было бы тебе не по силам.\\n\\nЯ спрятал часть этого ингредиента в разных мирах... за пределами нашего. Самый лёгкий путь — через Элтибул.\\n\\nЗимние феи имеют туннели, проходящие через Элтибул. Ищи зелёных медведей. О, возможно, тебе понадобится найти ключ. Поговори с людьми в этом районе.\\n\\nОказавшись внутри, ищи тувиллическую руну. Она недалеко... внутри."
"Hmm... yes, still waxy.\n\nYou have done well. I shall prepare the potion.": "Хмм... да, всё ещё восковый.\\n\\nТы хорошо поработал. Я приготовлю зелье."
"Ah, you were the one that got me the swarmer brains and the flapskull blood? Very good. I have need of you again: you must help me prove my hypothesis! I just need brains from demon soldiers so I can compare them with the swarmer brains.": "Ах, это ты достал мне мозги роевиков и кровь с черепа-крылышка? Очень хорошо. Ты снова мне нужен: помоги доказать мою гипотезу! Мне нужны мозги демонических солдат, чтобы сравнить их с мозгами роевиков."
"Hah! I don't even need to study these further to know the truth: these soldier brains are from the same species as the swarmer brains. Swarmers somehow evolve into Soldiers! I knew it, but I couldn't prove it.\n\nYou've done well. I need to make some observations and record my findings. I will have more requests of you soon.": "Ха! Мне даже не нужно дальше изучать это, чтобы узнать правду: эти мозги солдат — того же вида, что и мозги роевиков. Роевики каким-то образом превращаются в солдат! Я знал это, но не мог доказать.\\n\\nТы хорошо поработал. Мне нужно сделать несколько наблюдений и записать свои выводы. Скоро у меня будут к тебе новые просьбы."
"Do you have any wool? I love wool clothing! I've been trying to make my own sweater. You'd think having all those sheep out in the meadow would make it easy, but they aren't tame. At all. I can't even get near them! Well, anyway, if you have some wool, I would buy it from you!": "У тебя есть шерсть? Я обожаю одежду из шерсти! Я пытаюсь связать себе свитер. Казалось бы, с таким количеством овец на лугу это должно быть просто, но они совсем не ручные. Я даже не могу к ним подойти! В любом случае, если у тебя есть шерсть, я куплю её у тебя!"
"Thank you so much! I don't know how you managed to shear the sheep without getting hurt. You must be pretty agile! Here's the money I owe you.": "Большое спасибо! Не знаю, как тебе удалось постричь овец, не поранившись. Ты, должно быть, очень ловкий! Вот деньги, которые я тебе должен."
"Argh! I'm sick of buying Sweet Butter from Marna. She won't teach me the recipe. But I heard there's someone in Eltibule Castle's courtyard who knows the recipe. Can you get it?": "Аргх! Мне надоело покупать Сладкое Масло у Марны. Она не хочет учить меня рецепту. Но я слышал, что кто-то во дворе замка Элтибул знает этот рецепт. Можешь достать его?"
"Thanks! Wait, this... this is it?! MARNA!!!": "Спасибо! Подожди, это... это оно?! МАРНА!!!"
"I'm much too busy to train you personally. But I've prepared something for you. Go and visit my old training ground in Gazluk. I've left training programs there, and I'll walk you through them via sending stone.\n\nHow would you find the camp? Let me think. It's on the plateau. There's a useless lookout tower somewhat nearby. From the camp you can look down over the cliff and see a lot of trees. Does that narrow it down? You'll know you're in the right place when you see iron dodecahedrons hammered into the cold earth. There'll be a building with a sending stone; contact me from there.": "Я слишком занята, чтобы тренировать тебя лично. Но я подготовила кое-что для тебя. Отправляйся на мою старую тренировочную площадку в Газлуке. Я оставила там тренировочные программы и буду вести тебя через них с помощью камня связи.\\n\\nКак найти лагерь? Дай подумать. Он на плато. Рядом есть бесполезная смотровая башня. С лагеря можно посмотреть вниз с обрыва и увидеть много деревьев. Это помогает? Ты поймёшь, что на правильном месте, когда увидишь железные додекаэдры, вбитые в холодную землю. Там будет здание с камнем связи; свяжись со мной оттуда."
"Hello? Yes, good. You found it.": "Алло? Да, хорошо. Ты нашёл это."
"Head to Gazluk and find my old training grounds. Don't worry, it's can't be too hard to find: I sent a student there just a month ago. She abandoned her training quite quickly, but she DID find the training grounds first. If that dullard could find it, surely you can.": "Отправляйся в Газлук и найди мои старые тренировочные площадки. Не волнуйся, их не так уж сложно найти: я отправил туда ученицу всего месяц назад. Она быстро бросила тренировки, но ПЕРВОЙ нашла эти площадки. Если этот болван смог найти, то и ты сможешь."
"There was a charlatan visiting town a couple days ago. Well, his potions are magical, but Velkort said they were incredibly toxic. I ordered him to leave Serbule, but I hear he's still around somewhere, selling potions out of his tent. So now I have to make it official. Can you deliver this? It's a Praetor's Order, declaring him illegal in this area.": "В город несколько дней назад приезжал шарлатан. Его зелья действительно магические, но Велкорт сказал, что они невероятно токсичны. Я приказал ему покинуть Сербуль, но слышал, что он всё ещё где-то рядом, продаёт зелья из своего шатра. Так что теперь мне нужно оформить это официально. Можешь доставить это? Это приказ Претора, объявляющий его незаконным в этом районе."
"He said he won't leave? Damn it. He's called my bluff: the only way to enforce a Praetor's Order is through execution. I could have an execution squad teleported in to dispatch him, but that would be a bit much for simple trespassing! Hm. Well, I'll think of something to get rid of him.\n\nThanks for helping with these errands! Here, you look handy with a sword, do you want this? It's my old backup blade. Maybe you'll find it useful.": "Он сказал, что не уйдёт? Чёрт возьми. Он раскусил меня: единственный способ исполнить приказ Претора — через казнь. Я мог бы телепортировать отряд палачей, чтобы расправиться с ним, но это слишком для простого нарушения границ! Хм. Ну, я придумаю, как от него избавиться.\\n\\nСпасибо, что помог с этими поручениями! Вот, ты хорошо обращаешься с мечом, хочешь это? Это мой старый запасной клинок. Может, он тебе пригодится."
"What? A Praetor's Order? He seriously wants to issue a Praetor's Execution out here? In front of those Elves? What would they think? They'd revolt! No, he's just bluffing. Tell him I'm not going anywhere!": "Что? Приказ Претора? Он серьёзно хочет провести казнь Претора здесь? Прямо перед этими эльфами? Что они подумают? Они восстанут! Нет, он просто блефует. Скажи ему, что я никуда не уйду!"
"Are you headed back out to Vidaria soon? You should look into something for me. There used to be a battle polo team in the city. It's been gone for a long time. But there was a contest where you could find a ceremonial sword in Vidaria, called the Vanquisher's Blade, which would automatically get you on the team roster. I found some clues about it while I was stationed out there but never found the thing. I'd love to have one as a keepsake. I'll pay you well for it, if you find it!\n\n<i>[Note: completing this quest will sell the blade to Sir Brooker. If you wish to keep the blade you should cancel this quest.]</i>": "Собираешься скоро вернуться в Видарию? Ты мог бы заняться для меня одним делом. Раньше в городе была команда по боевому поло. Её давно уже нет. Но был конкурс, где можно было найти церемониальный меч в Видарии, называемый Клинком Победителя, который автоматически заносил тебя в состав команды. Я нашёл несколько подсказок об этом, когда служил там, но так и не нашёл сам меч. Мне бы очень хотелось иметь его в память. Я хорошо заплачу тебе, если найдёшь!\n\n<i>[Примечание: выполнение этого задания продаст меч сэр Брукеру. Если хочешь оставить меч себе, лучше отменить это задание.]</i>"
"Aha! You know, these swords are a piece of history. The Vanquishers had had three awful seasons and fans were leaving, so they set up this competition. But filling out your roster via a treasure hunt led to an <i>impressively</i> bad year, the wost in the league's history, ending the team. And with only four other teams, the entire sport sort of fell apart.\n\nI caught some games as a kid. I wish I'd been an adult for this contest. It would have been fun, even on a terrible team!": "Ага! Знаешь, эти мечи — часть истории. У «Покорителей» было три ужасных сезона, фанаты уходили, и они устроили этот турнир. Но комплектование состава через охоту за сокровищами привело к <i>впечатляюще</i> плохому году, худшему в истории лиги, что положило конец команде. А с всего четырьмя другими командами весь спорт как-то развалился.\\n\\nЯ смотрел несколько игр в детстве. Жаль, что я не был взрослым во время этого конкурса. Было бы весело, даже в ужасной команде!"
"Prisms are useful for a few special crafting tasks. I can make ordinary prisms, but I've heard of a strange prism made by an ancient yeti master. I wish to study it! Find it for me?\n\nIt would be in some cave in the Kur Mountains, I presume. I doubt it would be easy to find, since I've only heard vague rumors of it. It's probably in some sack deep down in a hole somewhere.": "Призмы полезны для нескольких особых ремесленных задач. Я могу сделать обычные призмы, но слышал о странной призме, созданной древним мастером йети. Я хочу её изучить! Найдёшь её для меня?\\n\\nОна, вероятно, находится в какой-то пещере в горах Кур. Сомневаюсь, что её легко найти, ведь я слышал лишь расплывчатые слухи. Скорее всего, она спрятана в каком-то мешке глубоко в дыре где-то."
"This is it! Hm. These sigils attune it to a specific species. That's not supposed to be possible! I will have to study this more. Oh, here. These are boring old regular prisms in exchange.": "Вот оно! Хм. Эти символы настраивают его на определённый вид. Так не должно быть! Мне придётся изучить это подробнее. О, вот. Взамен — эти скучные старые обычные призмы."
"One single meat creature that inhabits this cavern is so poisonous and foul that I am unable to filter out its toxins, and must flee if it approaches. This creature was bred for some ill purpose. I know this from spying upon the minds of green-skinned bipeds that came to feed it. They called the creature 'Murklinger'. It would please me to no longer need to fear this creature.": "Один единственный мясной зверь, обитающий в этой пещере, настолько ядовит и отвратителен, что я не могу отфильтровать его токсины и должен бежать, если он приближается. Это существо было выведено для какой-то злой цели. Я знаю это, подслушивая мысли зелёнокожих двуногих, которые приходили его кормить. Они называли это существо «Мерклингер». Мне бы хотелось больше не бояться этого существа."
"The creature Murklinger is deceased! And you have not suffered the loss of even a single limb or core organ! You are a more competent warrior than I had expected!": "Существо Мерклингер погибло! И ты не потерял ни одной конечности или жизненно важного органа! Ты гораздо более умелый воин, чем я ожидал!"
"You know what I could go for? Some venison hash browns! But it's a secret family recipe. I guess regular old hash browns would do, too.\n\nIf you happen to be cooking, could you fry me up some Hash Browns? Don't go to any trouble on my account, though.": "Знаешь, чего бы я сейчас съел? Немного оленины с хашбраунами! Но это секретный семейный рецепт. Думаю, обычные хашбрауны тоже подойдут.\\n\\nЕсли вдруг будешь готовить, не мог бы пожарить мне немного хашбраунов? Но не утруждайся ради меня."
"Mmm, smells delicious! Thanks!\n\nLet me show you a couple little gardening tips.": "Ммм, пахнет вкусно! Спасибо!\\n\\nПозволь показать тебе пару небольших советов по садоводству."
"So here's the thing: nature takes care of itself, usually. But when fifty werewolves show up, not so much. The prey is so abundant that they're mating like crazy. Let's try to work smarter: try killing a bunch of deer so they can't eat 'em. That's smart, right? Or is it stupid? Hmm.": "Итак, в чём дело: природа обычно сама о себе заботится. Но когда появляется пятьдесят оборотней, это уже не так. Добычи так много, что они спариваются как сумасшедшие. Давай попробуем умнее: убей несколько оленей, чтобы они не могли их съесть. Это умно, да? Или глупо? Хм."
"Good. Now we wait a year and see how many werewolves are born! Damn. Yeah, this was a stupid plan. Nevermind. Take these shoes and let's pretend this never happened.": "Хорошо. Теперь ждём год и посмотрим, сколько оборотней родится! Чёрт. Да, это был глупый план. Забудь. Возьми эти ботинки, и давай сделаем вид, что этого никогда не было."
"Hey, you're a champ, can you get me some venison? I need a LOT of it. I'll give you... hmm... my gratitude!": "Эй, ты молодец, можешь добыть мне немного оленины? Мне нужно ОЧЕНЬ много. Я дам тебе... хм... свою благодарность!"
"Aw yeah, perfect. Thanks!": "О, да, идеально. Спасибо!"
"You seem trustworthy enough. Here, this unlocks a very dangerous chamber inside the Statehelm Crypt. This area is off-limits to most. My husband's private laboratory lies past that point. But you needn't delve so far today. My husband loved unusual necromantic creations, and the crypt is full of his menagerie. I need some thrice-cursed beaks, and there are bird-creatures in there that contain one.\n\nHere is the most important detail: you must kill them with darkness damage. Otherwise it would only be a twice-cursed beak.\n\n<i>[The killing blow must be Darkness damage.]</i>": "Ты кажешься достаточно надёжным. Вот, это открывает очень опасную камеру внутри крипты Стейтхелма. Эта зона закрыта для большинства. Частная лаборатория моего мужа находится за этим проходом. Но сегодня тебе не нужно углубляться так далеко. Мой муж любил необычные некромантские создания, и крипта полна его зверинца. Мне нужны трижды проклятые клювы, а там есть птичьи существа, у которых такой клюв.\\n\\nВот самый важный момент: ты должен убить их тёмным уроном. Иначе это будет всего лишь дважды проклятый клюв.\\n\\n<i>[Убийственный удар должен быть тёмным уроном.]</i>"
"Yes, quite cursed. These will work. My experimental ritual requires unstable bones. It is quite dangerous. ... \n\n... You may join me, if you wish.\n\n<i>[New Hangout Available.]</i>": "Да, весьма проклятые. Эти подойдут. Мой экспериментальный ритуал требует нестабильных костей. Это довольно опасно. ... \n\n... Ты можешь присоединиться ко мне, если хочешь.\n\n<i>[Доступно новое место для отдыха.]</i>"
"Perhaps a smoke-break would help me focus. The 'horta here is very mellow. Do you happen to have any? Oh, and I lost my pipe in a recent skirmish with a fish man. I need a new one!": "Возможно, перекур поможет мне сосредоточиться. Здесь 'хорта очень мягкая. Случайно не найдётся у тебя немного? О, и я потерял свою трубку в недавнем столкновении с рыбочеловеком. Мне нужна новая!"
"You are strangely obsequious to bring me a pipe full of gur-horta! But that concerns me not! Here: fair pay for your effort.": "Ты странно услужлив, принёс мне трубку, полную гур-хорта! Но меня это не волнует! Вот: справедливая плата за твои усилия."
"So I was enchanting Ultashk's boots, and he mentioned that they keep slipping around on his foot. This is a common goblin problem because our armor is crafted by slaves with low morale. But I think I can fix it! I just need some ranalan flesh! You know, the frog people? They're super rubbery and gross. I think I could dry out their tongues and use them as foot padding. Can you get some for me?": "Итак, я зачаровывал ботинки Ульташка, и он сказал, что они постоянно соскальзывают с его ноги. Это распространённая проблема у гоблинов, потому что нашу броню делают рабы с низким моральным духом. Но я думаю, что могу это исправить! Мне просто нужна плоть раналанов! Знаешь, эти лягушачьи люди? Они очень резиновые и противные. Думаю, я могу высушить их языки и использовать как стельки. Можешь достать мне немного?"
"Ewww, so gross! Hahaha! Good job. Here. These shoes are too big for goblins: no amount of padding will save them! But they might fit you.": "Фу, как мерзко! Ха-ха-ха! Отличная работа. Вот. Эти ботинки слишком велики для гоблинов: никакая набивка им не поможет! Но они могут подойти тебе."
"I've been experimenting with the local fauna. The creatures here have interesting healing properties! I think I can use the tongues of those horrid little frog people as super-strong binding material for broken wings. I don't condone violence, but if you happen upon a dead frog man, you could maybe collect its tongue...": "Я экспериментировал с местной фауной. У существ здесь есть интересные целебные свойства! Думаю, я могу использовать языки этих ужасных маленьких лягушачьих людей в качестве сверхпрочного связующего материала для сломанных крыльев. Я не одобряю насилие, но если ты случайно найдёшь мёртвого лягушачьего человека, можешь попробовать собрать его язык..."
"Oh, wow, I didn't realize the tongues were so long! I probably could have done with fewer of them. But thanks! Hmm, here! I brought a lot of these with me from the fae realm for their medicinal value, but mortals seem to like them because they're shiny.": "Ого, я не знал, что языки такие длинные! Наверное, мне бы хватило и меньшего количества. Но спасибо! Хм, вот! Я привёз много таких из фейского мира из-за их лечебных свойств, но смертные, похоже, любят их за блеск."
"There are just so many Garden Tenders! It's hard to convince fellow myconians to resist Tidal when they see his massive army of tenders. They're so scary! Can you kill the scary monsters for us?": "Слишком много Садовников! Трудно убедить других микониан противостоять Тайдлу, когда они видят его огромную армию садовников. Они такие страшные! Можешь убить этих страшных монстров для нас?"
"Well done! Well done! Here, take this. Never speak to anyone of what I asked you to do. They wouldn't understand.": "Отличная работа! Отличная работа! Вот, возьми это. Никому не рассказывай о том, что я просил тебя сделать. Они не поймут."
"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Analysis Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\n\n": "У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 наборов судебного анализа, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуть ваше ремесло в обмен на ваши труды.\\n\\n"
"Thank you! This will help us along for a while. I might need your services again later on, so be sure to stop by again later!\n\n<i>[You earn 10 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Это поможет нам на некоторое время. Возможно, позже мне снова понадобятся твои услуги, так что обязательно заглядывай ещё!\\n\\n<i>[Вы получаете 10 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Autopsy Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\n\n": "У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 наборов для вскрытия, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуть ваше ремесло в обмен на ваши труды.\\n\\n"
"Thank you! This will help us along for a while. I might need your services again later on, so be sure to stop by again later!\n\n<i>[You earn 5 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Это поможет нам на некоторое время. Возможно, позже мне снова понадобятся твои услуги, так что обязательно заглядывай ещё!\\n\\n<i>[Вы получаете 5 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"We are low on our diagnostic supplies and need to restock. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Carbon-form Scrutinizer Arrays to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\n\n": "У нас мало диагностических материалов, и нам нужно пополнить запасы. Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 массивов углеродных анализаторов, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуться в ремесле в обмен на ваши усилия.\\n\\n"
"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Inspection Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\n\n": "У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 наборов для судебной экспертизы, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуть ваше ремесло в обмен на ваши труды.\\n\\n"
"A lot of us like to whittle a lot, so our supply of whittling knives are running low. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Master Whittling Knives to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\n\n": "Многие из нас очень любят резьбу по дереву, поэтому наш запас ножей для резьбы быстро заканчивается. Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так добры доставить мне 10 мастерских ножей для резьбы, я буду бесконечно благодарен! Честно говоря, у нас просто не хватает материалов, но я могу помочь вам продвинуться в вашем ремесле в обмен на ваши труды.\\n\\n"
"Thank you! This will help us along for a while. I might need your services again later on, so be sure to stop by again later!\n\n<i>[You earn 15 favor with Orran the Caravan Leader]</i>\n\n<i>[This task is repeatable every 20 hours.]</i>": "Спасибо! Это поможет нам на некоторое время. Возможно, позже мне снова понадобятся твои услуги, так что обязательно заглядывай ещё!\\n\\n<i>[Вы получаете 15 очков расположения у Оррана, вожака каравана]</i>\\n\\n<i>[Это задание можно повторять каждые 20 часов.]</i>"
"So yeah, thanks for coming. I heard about this from that elf seer across town: part of the desert is coated in giant spiders that are, like, mated with tornados? I don't understand it, but wherever the spiders walk, the tornados go too. And the elf says that they've come topside to lay their eggs in the wind to scatter far and wide. That's not good.\n\nI've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.": "Так что да, спасибо, что пришёл. Я слышал об этом от того эльфийского провидца через город: часть пустыни покрыта гигантскими пауками, которые, типа, связаны с торнадо? Я не понимаю, но куда идут пауки, туда идут и торнадо. И эльф говорит, что они вышли на поверхность, чтобы отложить яйца в ветер, чтобы те разлетелись повсюду. Это нехорошо.\n\nЯ весь утро их убивал, но для тебя их ещё полно! Когти и клыки не очень помогают, но они падают от молний. Иди на юго-восток, ты услышишь их раньше, чем увидишь."
"Hopefully not too many spiders laid eggs before we managed to kill 'em. But I guess if they hatch, I'll see you back out here. Until next time, pal.": "Надеюсь, пауки не отложили слишком много яиц, пока мы их убивали. Но если они вылупятся, увидимся здесь снова. До следующего раза, приятель."
"You want werewolf armor? Well, since you can't smith your own, I guess I can give you some of my leftover pieces.\n\nIf you bring me the metal I need to make more, you can have some leftover werewolf body armor.": "Ты хочешь оборотничью броню? Ну, раз ты не можешь сделать её сам, думаю, я могу дать тебе несколько своих запасных частей.\n\nЕсли принесёшь мне металл, который нужен для изготовления большего количества, ты сможешь получить остатки оборотничьей броне."
"Yep. That'll work. Here's your barding!": "Да. Подойдёт. Вот твоя конская сбруя!"
"You want werewolf armor? Well, since you can't smith your own, I guess I can give you some of my leftover pieces.\n\nIf you bring me the metal I need to make more, you can have one of my old werewolf helms.": "Ты хочешь оборотничью броню? Ну, раз ты не можешь сделать её сам, думаю, я могу дать тебе несколько своих запасных частей.\n\nЕсли принесёшь мне металл, который нужен для изготовления большего количества, сможешь получить один из моих старых оборотничьих шлемов."
"Yep. That'll work. Here's your helm!": "Да. Подойдёт. Вот твой шлем!"
"Well if you're going to assault the ship and create mayhem, you should start with the trolls! Most of these trolls were supposed to go down to the surface already, but they're lazy oafs who just hang around down here.": "Если ты собираешься штурмовать корабль и сеять хаос, начни с троллей! Большинство этих троллей уже должны были спуститься на поверхность, но они ленивые болваны, которые просто слоняются здесь внизу."
"Great! Fewer trolls stinking up the place! Of course, new squads of trolls arrive almost constantly, so you're really wasting your time. But that's okay! Please... waste more time!\n\nHere's some precious cargo.": "Отлично! Меньше троллей, воняющих здесь! Конечно, новые отряды троллей прибывают почти постоянно, так что ты действительно тратишь время зря. Но это нормально! Пожалуйста... трать время ещё!\\n\\nВот немного драгоценного груза."
"I've been making these crazy wolf-hood hats, right? And they're really popular. But I haven't got any more wolf pelts. Whenever I try to skin them, it doesn't come out right. Are you good at skinning wolves? Care to help me out? I'll pay handsomely.": "Я делаю эти сумасшедшие шапки с волчьими капюшонами, понял? И они очень популярны. Но у меня больше нет волчьих шкур. Каждый раз, когда я пытаюсь снять шкуру, получается плохо. Ты умеешь снимать шкуры с волков? Поможешь мне? Хорошо заплачу."
"Thanks! Perfect! You're really good at skinning wolves. Here, let me pay you for those. And let me show you a couple of leatherworking pointers, too!": "Спасибо! Отлично! Ты действительно хорошо снимаешь шкуру с волков. Вот, позволь заплатить тебе за них. И позволь ещё дать пару советов по работе с кожей!"
"The metal that humans use is weak and deficient. I use it to make horseshoes and tools, but never for armor. Armor requires the astounding metal found in the mines of Gazluk! In fact, it can often be found exposed at the tops of mountains here. I will pay a bounty for a pile of it, for I must repair Vughal's helmet, and I will not use feeble metal!": "Металл, который используют люди, слаб и недостаточен. Я использую его для подков и инструментов, но никогда для брони. Для брони требуется удивительный металл, найденный в шахтах Газлука! На самом деле, его часто можно найти на вершинах гор здесь. Я заплачу награду за кучу этого металла, потому что должен починить шлем Вугхала, и я не буду использовать слабый металл!"
"Good! You are efficient. It seems you have orc blood in you.": "Отлично! Ты эффективен. Похоже, в тебе течёт кровь орка."
"I could really use some more glass so I can make more of these rings. Bring me some green glass and we can get started on yours!": "Мне очень нужен ещё стекло, чтобы сделать больше таких колец. Принеси мне немного зелёного стекла, и мы начнём делать твоё!"
"Will you do me a favor? I want to try out some mortal recipes I've learned. To master them, I figured I'll need about two thousand potatoes. I can't do that all myself! So I'm asking everyone I see to bring me a few potatoes. Can you bring me a handful?": "Сделаешь мне одолжение? Я хочу попробовать несколько смертных рецептов, которые выучил. Чтобы овладеть ими, мне понадобится около двух тысяч картофелин. Я не смогу сделать это в одиночку! Поэтому я прошу каждого, кого встречу, принести мне немного картофеля. Ты можешь принести мне горсть?"
"Thank you! Bizz was just telling me about you. He asked me to show you a few things you may have forgotten. A reward for helping us out.": "Спасибо! Бизз как раз рассказывал мне о тебе. Он попросил показать тебе несколько вещей, которые ты, возможно, забыл. Награда за помощь нам."
"I'm trying to fill this order for fur-lined coats. I don't get many orders, you know? Pretty satisfying knowing my reputation's getting around. Trouble is, I'm out of fur to finish the last one. Can you get me some?": "Я пытаюсь выполнить заказ на шубы с меховой подкладкой. Знаешь, заказов у меня не так много. Очень приятно осознавать, что моя репутация растёт. Проблема в том, что у меня закончился мех, чтобы закончить последнюю шубу. Можешь достать мне немного?"
"Thanks! Uh, here, take these as trade.": "Спасибо! Эээ, вот, возьми это в обмен."
"Making armor isn't really my main thing, but I'm not terrible at it. I wish I had one of those big sheep skins -- a perfect one, a flawless one. I could make a <i>really</i> cozy jacket!": "Изготовление брони — это не совсем моё главное дело, но я не так уж плох в этом. Хотелось бы иметь одну из тех больших овечьих шкур — идеальную, безупречную. Я мог бы сделать <i>очень</i> тёплую куртку!"
"Oh, wow. This will work great! I'm going to get started right now. Here... would you like my old coat? It's pretty warm.": "О, вау. Это отлично подойдёт! Я начну прямо сейчас. Вот... хочешь моё старое пальто? Оно довольно тёплое."
"My new ally, the human Arif, has given me two excellent leads on where to find the sphere. I know you have questions about this sphere, but I dare not speak of it. Simply find it and return it to me!\n\nIt should be quite simple to find. Arif says that he discovered a tunnel underneath a giant stone hand. Inside were letters and notes, which he left untouched. In a box, he said there was a magical crystal.\n\nGo! I shall reward you for it!": "Мой новый союзник, человек Ариф, дал мне две отличные наводки, где найти сферу. Я знаю, у тебя есть вопросы об этой сфере, но я не смею о ней говорить. Просто найди её и верни мне!\\n\\nЕё должно быть довольно просто найти. Ариф говорит, что обнаружил туннель под гигантской каменной рукой. Внутри были письма и заметки, которые он оставил нетронутыми. В коробке, по его словам, был магический кристалл.\\n\\nВперёд! Я награжу тебя за это!"
"Well, this orb is definitely intended to be a Naturesphere! The runes are right. But it's just a frost orb, it doesn't... Hmm.\n\n<i>[Merriana studies the orb.]</i>\n\nWhoever made this didn't fully know how to make a Naturesphere -- but they've figured out the first part! We must not let a Naturesphere fall into the wrong hands. The wizard who made this is going to be a problem.\n\nBut first I have another lead from Arif, when you're ready. He claims a fully-working Naturesphere can be found near Serbule.": "Что ж, этот шар определённо должен быть Сферой Природы! Руны правильные. Но это просто ледяной шар, он не... Хм.\\n\\n<i>[Мерриана изучает шар.]</i>\\n\\nТот, кто сделал это, не до конца понимал, как создать Сферу Природы — но первую часть он освоил! Мы не должны позволить, чтобы Сфера Природы попала в плохие руки. Волшебник, создавший это, будет проблемой.\\n\\nНо сначала у меня есть другая зацепка от Арифа, когда будешь готов. Он утверждает, что полностью работающая Сфера Природы находится недалеко от Сербула."
"Well, ifyer offerin den acurse immasai yiss. Gogit de tuffest poisonz yecan find.": "Ну, если ты предлагаешь, тогда проклятие, конечно, да. Принеси самые сильные яды, какие сможешь найти."
"Yedun gud. Yedun reel gud. Leevittoo me ta git dis stuff takin carov.": "Йедун гуд. Йедун рил гуд. Ливитту ми та гит дис стафф тейкин каров."
"The ratkin seem to be growing an orchard of sentient trees down here! That is FASCINATING! Right? But how old are these trees? Go and chop down some of these trees and see how many rings they have.\n\nWait, trees can be over a hundred years old. Can you count all the way to 100, monster? Well, try your best! Hurry, now.": "Крысолюди, похоже, выращивают здесь сад разумных деревьев! Это УДИВИТЕЛЬНО! Правда? Но сколько этим деревьям лет? Иди и сруби несколько деревьев, чтобы посчитать их кольца.\\n\\nПодожди, деревья могут быть старше ста лет. Ты сможешь досчитать до 100, монстр? Ну, постарайся! Поторопись."
"So none of the trees were planted in the past decade? But the ratkin have only been here for a few years! Which means... the ratkin didn't plant those tree monsters!\n\nWait, I've got it! They're mutated trees... which means they used to be regular trees. You see, there used to be nice normal trees in Ilmari, but when it turned into a desert, these trees must have mutated, and then they climbed down here to escape the blistering sun. It all makes sense now. Good job! For that, you get a shiny!": "Итак, ни одно из деревьев не было посажено за последнее десятилетие? Но крысолюди здесь всего несколько лет! Значит... крысолюди не сажали этих древесных монстров!\n\nПогоди, я понял! Это мутировавшие деревья... то есть раньше они были обычными деревьями. Видишь ли, в Илмари раньше были хорошие нормальные деревья, но когда он превратился в пустыню, эти деревья, должно быть, мутировали и спустились сюда, чтобы укрыться от палящего солнца. Теперь всё понятно. Молодец! За это ты получаешь блестяшку!"
"Here is the problem: late at night, a creature is coming out of the sewers and attacking sentient animals. It focuses on the smart ones.\n\nI have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.": "Вот в чём проблема: поздно ночью из канализации выходит существо и нападает на разумных животных. Оно охотится на самых умных.\\n\\nУ меня есть контакт в канализации. Его зовут Гамильтон, и ему можно доверять. Он занимается расследованием этой проблемы. Найди способ попасть в канализацию, найди его и принеси его разведданные."
"He insists on using his strange code language. Give me a few minutes to translate them and then we can move forward.": "Он настаивает на использовании своего странного кодового языка. Дай мне несколько минут, чтобы перевести их, и тогда мы сможем двигаться дальше."
"Skitters sent you? I was expecting... Something else. But that's fine! Here: Skitters will know how to read this. Good hunting. I hope you don't hate spiders.": "Скиттерс послал тебя? Я ожидал... кое-что другое. Но ничего! Вот: Скиттерс знает, как это прочитать. Удачной охоты. Надеюсь, ты не ненавидишь пауков."
"Well you still haven't been forced to do ANY of the supremely difficult things we had to do when I was a student! You think you're so great, huh? Let's see you pull this off: kill enemies with Disharmony. And not harmless enemies either! Just be careful: this test is no joke.\n\n<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>": "Ну, тебя ещё не заставляли делать НИЧЕГО из тех невероятно сложных вещей, которые приходилось делать нам, когда я был студентом! Думаешь, ты такой крутой, да? Давай посмотрим, справишься ли ты с этим: убей врагов с помощью Дисгармонии. И не безобидных врагов! Но будь осторожен: этот тест — не шутка.\\n\\n<i>[Дисгармония должна нанести смертельный удар, чтобы засчиталось. Смерть сбросит твой прогресс.]</i>"
"Oh come on! You seriously used Disharmony to kill 30 fiends? That's... Well, that's impressive. Good work.": "О, да ладно! Ты серьёзно использовал Несогласие, чтобы убить 30 демонов? Это... Впечатляет. Отличная работа."
"You want to help? Me?! Well... I had a request for a pristine goat hide. If you can help me find one, I'll give you half the payment.": "Хочешь помочь? Мне?! Ну... у меня есть просьба найти чистую козью шкуру. Если поможешь, я отдам тебе половину оплаты."
"Ugh, the stench! But this does look like a good hide. Thanks. Here.": "Фу, вонь! Но это действительно хорошее укрытие. Спасибо. Вот."
"I hope you're ready for a hard one. I need the perfect skin of a three-headed demon dog! You heard that right.\n\nThe pay's pretty good, though. Don't die.": "Надеюсь, ты готов к сложному заданию. Мне нужна идеальная шкура трёхголового демонического пса! Ты правильно услышал.\\n\\nОплата хорошая, правда. Не умирай."
"I really didn't expect you to be able to do this one. I'm sorry I underestimated you.": "Я действительно не ожидал, что ты сможешь справиться с этим заданием. Извини, что недооценил тебя."
"I have another hard request. This one is for a shark skin. Can't make this up. I'm supposed to just have a shark skin lying around, right? Ugh. Customers. But hey, see what you can do.": "У меня есть ещё одна сложная просьба. На этот раз нужна акулий шкура. Не могу поверить. Как будто у меня должна валяться акулий шкура, да? Уф. Клиенты... Но эй, посмотри, что сможешь сделать."
"Yep, that's a shark skin. I'm going to trust your judgment on its quality; I know nothing about sharks. Here.": "Да, это кожа акулы. Я доверяю твоей оценке её качества; я ничего не знаю об акулах. Вот."
"Here's another hide request: \"the finest rabbit skin you can find. No damage.\" I have some rabbit skins, but they all have damage.": "Вот ещё один заказ на шкуру: «самая лучшая кроличья шкура, какую только найдёшь. Без повреждений.» У меня есть несколько кроличьих шкур, но все они повреждены."
"Wow, pristine. Very nice skinning job.": "Вау, безупречно. Отличная работа по снятию шкуры."
"Now we're starting to get repeat business! The same man who needed a goat skin now needs a hippo skin. Heh! Good luck with that one.": "Теперь у нас начинаются повторные заказы! Тот же человек, которому нужна была коза, теперь хочет шкуру бегемота. Хе! Удачи с этим."
"Where the hell did you even find a hippo, let alone learn how to skin one? And perfectly?! You're way too good at this.": "Где, чёрт возьми, ты вообще нашёл бегемота, не говоря уже о том, чтобы научиться его снимать шкуру? И при этом идеально?! Ты слишком хорош в этом."
"I don't even know what this one is. A kuvou? I guess that's like a bison? Anyway, I need a perfect hide from one.": "Я даже не знаю, что это такое. Куву? Думаю, это что-то вроде бизона? В любом случае, мне нужна идеальная шкура одного из них."
"Remga's remnants, that's a disgusting beast! But you skinned it well. I'll cut you in like usual.": "Остатки Ремги — отвратительное создание! Но ты хорошо с него снял шкуру. Как обычно, поделюсь с тобой наградой."
"This one's not too weird... But the quantity is crazy. I need four trophy cat hides.": "Это задание не слишком странное... Но количество сумасшедшее. Мне нужно четыре трофейных кошачьих шкуры."
"Crazy. Crazy! Where do you find all these predators to skin?! No, you don't have to tell me. Here's your money.": "Безумие. Безумие! Где ты находишь всех этих хищников, чтобы снимать с них шкуры?! Нет, не надо рассказывать. Вот твои деньги."
"Next I need perfect snake skins. That's a lot less weird of a request than usual. I sometimes even have these in stock! But not right now.": "Далее мне нужны идеальные змеиные шкуры. Это гораздо менее странная просьба, чем обычно. Иногда они у меня даже есть в наличии! Но не сейчас."
"You're a snake-murdering machine! Thanks.": "Ты машина для убийства змей! Спасибо."
"Another creepy beast request: I need the hide of a 'droach' as well as some scales. I guess... I guess the hide doesn't normally have scales on it? I'm no monsterologist. I hope you can figure this one out.": "Ещё один жуткий заказ на трофеи: мне нужна шкура «дроача», а также несколько чешуек. Полагаю... шкура обычно не покрыта чешуёй? Я не монстролог. Надеюсь, ты разберёшься с этим заданием."
"Well, whatever this beast was, it was terrifying. Glad you're still alive.": "Что бы это ни было за чудовище, оно было ужасным. Рад, что ты ещё жив."
"This one's weird and sad. I need \"idealized skins from a family of giant rats.\" I don't think the rats need to be related. Who will know?": "Этот заказ странный и грустный. Мне нужны «идеализированные шкуры от семьи гигантских крыс». Не думаю, что крысы должны быть родственниками. Кто узнает?"
"You skinned all those rats to find perfect skins. I worry about your mental health. But I don't worry about your pocketbook. Here.": "Ты снял шкуру со всех этих крыс, чтобы найти идеальные шкуры. Я переживаю за твоё психическое здоровье. Но за твоё кошелёк — нет. Вот, держи."
"Yes, I am supposed to deliver a package to a friend of mine, a fellow believer in mind over matter. He's... not like us. More like... a mantis. Can you take this powder to him? Oh, and I must warn you: do not taste the powder!": "Да, я должен доставить посылку своему другу, единомышленнику, верящему в силу разума над материей. Он... не такой, как мы. Скорее... похож на богомола. Можешь отнести ему этот порошок? О, и предупреждаю: не пробуй порошок на вкус!"
"He liked it? Great! He's going to refine that powder for me. Hopefully it works as well as he says it does!": "Ему понравилось? Отлично! Он собирается очистить этот порошок для меня. Надеюсь, он работает так же хорошо, как он говорит!"
"Well done, humanoid, expectations have been met. And you did not spill the beans, as they say in your idiom. Feel pride, for you are successful in your task.": "Отличная работа, гуманоид, ожидания оправданы. И ты не выдал секрет, как говорится в вашем языке. Гордись, ведь ты успешно выполнил своё задание."
"If you were a REAL friend, you would help me master the ancient recipe for forbidden bacon. Ur-Bacon is infused with the spirits of the dead. What a thrill it'd be to serve that! But of course, only the dead know the secret. You might find it written down somewhere, but it'd be incredibly rare. Sigh.": "Если бы ты был настоящим другом, ты помог бы мне освоить древний рецепт запретного бекона. Ур-Бекон пропитан духами мёртвых. Каким же восторгом было бы подать это блюдо! Но, конечно, только мёртвые знают секрет. Возможно, ты найдёшь его где-то записанным, но это будет невероятно редкая находка. Вздох."
"This is the recipe? Wait, does it say the bacon TALKS? Um... No thank you. I'm extremely susceptible to negative thoughts right now, what with my home exploding. Why don't you keep it?\n\nBut I do appreciate the effort! Um, here: this is a recipe you might like.": "Это тот самый рецепт? Подожди, здесь написано, что бекон ГОВОРИТ? Эм... Нет, спасибо. Сейчас я очень восприимчив к негативным мыслям, учитывая, что мой дом взорвался. Почему бы тебе не оставить его себе?\\n\\nНо я ценю старания! Вот, это рецепт, который тебе может понравиться."
"I set up camp here so that I could kill the Tor-Uraks and take their mandibles. Sometimes you get a good, strong mandible from them, and those are precious to me! But it turns out Tor-Uraks are much, much too dangerous for me to kill. Do you have any mandibles, by chance?": "Я разбил лагерь здесь, чтобы убивать Тор-Ураков и брать у них мандибулы. Иногда от них можно получить хорошую, крепкую мандибулу, а они для меня очень ценны! Но оказалось, что Тор-Ураки слишком опасны для меня. Случайно у тебя нет мандибул?"
"You got them. I'm impressed! Here's some money! Oh, and here's a sample of one of the things I make with the mandibles.": "Ты их достал. Я впечатлён! Вот немного денег! О, и вот образец одной из вещей, которые я делаю из челюстей."
"Lady Rasheen was a fellow engineer with a whole lot more experience fixing portals. I wish she was here now, but she was killed by her own curiosity. She opened the tomb nearby and a skeleton climbed into her mind. Said the only way to cure it was to kill the skeleton, but we weren't strong enough. She died blubbering in the corner about how children were throwing fire at her. Very sad.\n\nAnyway! Can you go kill that thing? She has a plush toy - bring it to me as evidence.": "Леди Рашин была инженером с гораздо большим опытом починки порталов. Жаль, что её сейчас нет с нами — её убила собственная любопытство. Она открыла близлежащую гробницу, и скелет проник в её разум. Говорили, что единственный способ вылечить это — убить скелета, но мы были недостаточно сильны. Она умерла, рыдая в углу и говоря, что дети бросают в неё огонь. Очень печально.\\n\\nВ любом случае! Можешь пойти и убить это существо? У неё есть плюшевая игрушка — принеси её мне в качестве доказательства."
"That's it! I guess that's the last we'll see of her! Hah, who am I kidding, this is an emotion resonance chamber down here, the undead are just rising back up out of the ground continuously. Unless we can get a squad of Placid Seers down here to wipe everything out, I give her a month, two tops before she's right back at it. So you pretty much wasted your time. But I appreciate the effort! Here's something for your trouble.": "Вот и всё! Похоже, это последний раз, когда мы её увидим! Ха, кого я обманываю, здесь внизу камера эмоционального резонанса, нежить постоянно поднимается из земли. Если только мы не сможем отправить отряд Спокойных Провидцев сюда, чтобы уничтожить всех, я даю ей месяц, максимум два, прежде чем она снова начнёт своё дело. Так что ты практически зря потратил время. Но я ценю твои старания! Вот что-то за твои труды."
"Norbert told me of a rakshasa dish called the Vegetable Masterpiece. It sounds amazing. I would like to try it some day.": "Норберт рассказал мне о блюде ракшасы под названием «Овощной шедевр». Звучит потрясающе. Я бы хотел попробовать его когда-нибудь."
"You procured this for me? My, you're quite resourceful, aren't you? Perhaps you'd like to join me for dinner some evening?\n\nOh, and here. This is an old suit of battle armor. Wear it with pride.": "Ты раздобыл это для меня? Вот это да, ты действительно находчивый, не так ли? Может, хочешь составить мне компанию за ужином как-нибудь вечером?\\n\\nО, и вот. Это старый боевой доспех. Носи его с гордостью."
"Hm? No, I don't need anything. Wait, actually, have you got any grapes? I just want a snack.": "А? Нет, мне ничего не нужно. Подожди, а у тебя есть виноград? Я просто хочу перекусить."
"Thanks.": "Спасибо."
"In addition to being an expert fire mage, I'm also quite the alchemist. Mycology, however, is beneath me. Mushrooms are ... dirty. But I have need of some simple explosive mushroom bombs. Perhaps you know how to make those?": "Помимо того, что я эксперт в огненной магии, я ещё и отличный алхимик. Однако микология — это не для меня. Грибы... грязные. Но мне нужны простые взрывные грибные бомбы. Возможно, ты знаешь, как их сделать?"
"Good, good. I intend to augment these with the essence ... oh, nevermind what I'm going to do with them! You wouldn't understand it anyway. But here. Perhaps these will help you to be a less inept fire mage.": "Хорошо, хорошо. Я собираюсь усилить их сущностью... ой, неважно, что я с ними сделаю! Ты всё равно не поймёшь. Но вот. Возможно, это поможет тебе стать менее неумелым огненным магом."
"My research has hit a stumbling block. I need a specific item: the pulsing lobe of a Brain Bug. If only I had time to go out into the wilderness and search for them...": "Мои исследования зашли в тупик. Мне нужен конкретный предмет: пульсирующая доля мозгового жука. Если бы только у меня было время отправиться в дикую природу и поискать их..."
"Why, thank you! And still pulsing. It's perfect. Here. Have some fire dust, it will help you in your studies.": "О, спасибо! И всё ещё пульсирует. Это идеально. Вот, возьми немного огненной пыли, она поможет тебе в учёбе."
"Those strange talking mantises out in the fields have weird runes on their claws. Someone drew those on them! Can you gather some specimens for me? I want to know more about them.": "Эти странные говорящие богомолы в полях имеют странные руны на своих клешнях. Кто-то нарисовал их на них! Можешь собрать для меня несколько образцов? Я хочу узнать о них больше."
"Fascinating. They're acid sigils, but etched right onto their bodies. Whoever did this is brilliant... they don't think about magic the way we do.": "Увлекательно. Это кислотные руны, но выгравированы прямо на их телах. Тот, кто это сделал, гений... они не мыслят магией так, как мы."
"Where the heck were you all this time?! No matter. How are your vexfish lettuce wraps? Fresh, I hope? I'll take that! And please make it snappy. I'm famished from waiting!": "Где же вы всё это время пропадали?! Неважно. Как ваши рулеты из салата с вексфишем? Свежие, надеюсь? Я возьму их! И, пожалуйста, поторопитесь. Я умираю с голоду от ожидания!"
"Well. These are quite good! I am a little embarrassed to admit that this is some of the best vexfish I've eaten! Wonderful!": "Ну что ж. Они действительно хороши! Мне немного стыдно признавать, но это одна из лучших рыбин-злюк, что я когда-либо ел! Великолепно!"
"Yes, I ordered the vexfish lettuce wraps? What's the hold up?": "Да, я заказывал рулеты из салата с рыбой-виксом? Что задерживает?"
"You really should talk to Crelpin about your pets. Who knows what they might have gone through?": "Тебе действительно стоит поговорить с Крелпином о своих питомцах. Кто знает, через что им пришлось пройти?"
"Felmer can be a handy person to know when things get... Um... chaotic. You should say hello.": "Фелмер может быть полезным знакомым, когда дела становятся... эээ... хаотичными. Тебе стоит поздороваться."
"Midge the Apothecary lost her memory also! Maybe she can help you with yours!": "Мидж Аптекарша тоже потеряла память! Может, она поможет и тебе с твоей!"
"Pegast may be able to use muscle memory to remind you about some basic skills. ": "Пегаст может использовать мышечную память, чтобы напомнить тебе о некоторых базовых навыках."
"Wanted: Kill 10 Aktaari Hall Monitors. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 10 надзирателей зала Актаари. Награда: 8500 советов, 1 кусок ксогрита и соответствующая дополнительная компенсация."
"Good job!": "Отличная работа!"
"Wanted: Kill 10 Aktaari Swarmers. Reward: 9000 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 10 Актаарийских Роевых. Награда: 9000 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Aktaari Swarmlings. Reward: 8500 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 10 личинок Актаари. Награда: 8500 советов, 1 кусок Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Aktaari Workers (Group). Reward: 9500 councils, 5 Xogrite chunks, and appropriate additional compensation.": "Розыск: Убейте 10 рабочих Актаари (группа). Награда: 9500 советов, 5 кусков Зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Big Gricklings. Reward: 5700 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 Больших Гриклингов. Награда: 5700 советов, 3 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 4 Cave Lamia (Group). Reward: 3600 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Розыск: Убейте 4 пещерных ламий (группа). Награда: 3600 советов, 4 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Cocks. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 Глубоких Петухов. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Gnashers. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 Глубоких Грызунов. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 4 Deep Hippos. Reward: 3600 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 4 глубоких гиппопотама. Награда: 3600 советов, 2 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Sadness Gazelles. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 Газелей Глубокой Печали. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Deep Vines. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 8 Глубоких Лоз. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Deep Wasps or Menagerie Pollenators. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 Глубоких ос или Опылителей Менажерии. Награда: 5400 советов, 2 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 10 Forthragarian Engineers. Reward: 9500 councils, 3 Xogrite chunks, and appropriate additional compensation.": "Розыск: Убейте 10 инженеров Фортрагариана. Награда: 9500 советов, 3 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Friendly Frogs. Reward: 6800 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскивается: Убейте 8 дружелюбных лягушек. Награда: 6800 советов, 1 кусок Зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Frozen Cave Elementals. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: убейте 6 замороженных элементалей пещеры. Награда: 5400 советов, 2 куска ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 5 Guardian Drakeworms. Reward: 4500 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 5 стражей драконих червей. Награда: 4500 советов, 4 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Incubator Spiders (Elite). Reward: 5400 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 6 пауков-инкубаторов (элитных). Награда: 5400 советов, 4 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Mangler Scorpions. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскиваются: Убейте 8 Скорпионов-Манглеров. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 6 Menagerie Donkeys. Reward: 5400 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убить 6 ослов Менажерии. Награда: 5400 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Osslar Custodians. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 8 Хранителей Осслар. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Osslar Scouts. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Розыск: Убейте 8 разведчиков Осслар. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Spider Brutes (Elite). Reward: 7200 councils, 4 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 8 паучьих громил (элита). Награда: 7200 советов, 4 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 8 Tough Tigers. Reward: 7200 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 8 Жестоких Тигров. Награда: 7200 советов, 2 куска Ксогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 12 Trained Gricklings. Reward: 10800 councils, 2 Xogrite chunks, and appropriate additional compensation.": "Разыскивается: Убейте 12 обученных гриклингов. Награда: 10800 советов, 2 куска зогрита и соответствующая дополнительная компенсация."
"Wanted: Kill 12 Young Gricklings. Reward: 10200 councils, 1 Xogrite chunk, and appropriate additional compensation.": "Разыскиваются: Убейте 12 Молодых Гриклингов. Награда: 10200 советов, 1 кусок Ксогрита и соответствующая дополнительная компенсация."
"Let's get right to work. The Sand Seer has located a new war cache entrance. Follow this map. Remember: the entrance isn't stable. You should be able to get inside and back out again, but don't expect to be able to go back a second time! The hole will collapse quickly. So you have one shot to get my Weaponized Xedrite!\n\nThis seems like a pretty straightforward one. Just get in, get my Xedrite, and get out without being buried in the sand.": "Приступим к работе. Песчаный Провидец обнаружил новый вход в военный тайник. Следуй этой карте. Помни: вход нестабилен. Ты сможешь попасть внутрь и выйти обратно, но не рассчитывай вернуться второй раз! Дыра быстро обвалится. Так что у тебя один шанс забрать мой Вооружённый Кседрит!\\n\\nЭто, кажется, довольно простой квест. Просто зайди, забери мой Кседрит и выйди, не засыпавшись песком."
"You say you had to kill scorpions for their venom glands? Well, it looks like you handled yourself fine. Good job.\n\nWait! Wait a minute... if there was a rakkie in there already, that means they already knew about the entrance before we found it. My informants may be keeping secrets from me. I'll have to look into this.": "Ты говоришь, что пришлось убивать скорпионов ради их ядовитых желез? Похоже, ты справился отлично. Хорошая работа.\n\nПостой! Подожди минуту... если там уже был ракки, значит они знали о входе ещё до того, как мы его нашли. Мои информаторы, возможно, скрывают от меня правду. Придётся разобраться с этим."
"I've talked with my informants about those scorpions you found. And they WERE keeping secrets from me! Apparently scorpion poison is very valuable on the rakkie bandit market, so they've been keeping their existence secret from me. Like I give a fuck about poison glands! I just want the weaponized xedrite. Working with me should be a win-win! Why are they hiding this?!\n\n\nI convinced them to give me the location of another scorpion-filled pit. You're the only agent I trust in this desert -- aside from the Seer, of course -- so this one's all yours. There are two objectives this time: get my xedrite, and also get me a sample from one of these scorpions. Look for a decently scary-looking one, kill it, and bring back... well, just bring the whole thing back, I guess. The Seer wants to examine it.\n\nYou should expect scorpions, of course, but I wouldn't be surprised if there were bandits in there, too. Be ready for anything! Here's the map. Get me my xedrite!": "Я поговорил со своими информаторами о тех скорпионах, которых ты нашёл. И они ДЕЙСТВИТЕЛЬНО скрывали от меня правду! Оказывается, яд скорпионов очень ценится на рынке разбойников ракки, поэтому они скрывали их существование от меня. Как будто меня волнуют ядовитые железы! Мне нужна оружейная кседритовая руда. Работа со мной — это взаимовыгодное сотрудничество! Почему они это скрывают?!\n\nЯ убедил их дать мне местоположение ещё одной ямы, полной скорпионов. Ты — единственный агент, которому я доверяю в этой пустыне — кроме Провидца, конечно — так что этот квест для тебя. На этот раз две задачи: достать мою кседритовую руду и взять образец одного из этих скорпионов. Найди достаточно страшного, убей его и принеси... ну, наверное, принеси целиком. Провидец хочет его изучить.\n\nОжидай скорпионов, конечно, но я бы не удивился, если там будут и разбойники. Будь готов ко всему! Вот карта. Принеси мне мою кседритовую руду!"
"The bandits had been there for days before you arrived? Damn it all! Well, at least you got my xedrite. You did well. I'll have the Sand Seer take a look at this corpse you brought. That's all for now.": "Бандиты были там несколько дней до твоего прихода? Чёрт побери! Ну, по крайней мере, ты забрал мой кседрит. Ты справился хорошо. Я попрошу Песчаного Провидца осмотреть этот труп, что ты принес. Пока это всё."
"The Sand Seer examined the scorpion remains you brought back, and she found something interesting. That scorpion's carapace was infused with xedrite! She thinks xedrite dust got into their shells or something. I don't buy it. We need a lot more information.\n\nIt took some bribery, but I got the location of another scorpion-filled pit for you. There's no xedrite in this one. Just go in, kill every scorpion, and bring me back those carapaces.": "Песчаный Провидец исследовал останки скорпиона, которые ты принес, и нашёл кое-что интересное. Панцирь этого скорпиона был пропитан кседритом! Она считает, что пыль кседрита попала в их оболочки или что-то в этом роде. Я в это не верю. Нам нужно гораздо больше информации.\\n\\nПотребовались взятки, но я получил для тебя место ещё одной ямы, полной скорпионов. В этой яме кседрита нет. Просто зайди, убей всех скорпионов и принеси мне их панцири."
"Have I ever told you how much I hate the stench of dead scorpion? Probably not, because I didn't even realize I hated it until you started bringing back these disgusting things! Anyway, I'll get them to the Sand Seer. Here's your pay. Good work.": "Я когда-нибудь говорил тебе, как я ненавижу вонь мёртвого скорпиона? Наверное, нет, потому что я даже не осознавал, что ненавижу её, пока ты не начал приносить этих отвратительных тварей! В любом случае, я передам их Песчаному Провидцу. Вот твоя плата. Хорошая работа."
"Remember those xedrite-laced scorpion corpses you brought back? Well, that xedrite is useless. It's just raw metal infused into their shells. I need weapons-grade xedrite!\n\nHowever, the Seer thinks there's weaponized xedrite involved. She asked for an agent to undergo an extremely dangerous assignment. So I told her you'd be right over! Here's your map. See her for further briefing.": "Помнишь те трупы скорпионов с кседритом, что ты привёз? Так вот, этот кседрит бесполезен. Это просто сырая руда, впитавшаяся в их панцири. Мне нужен кседрит оружейного качества!\n\nОднако Провидец считает, что здесь замешан оружейный кседрит. Она попросила агента пройти через крайне опасное задание. Так что я сказал ей, что ты уже в пути! Вот твоя карта. Обратись к ней для дальнейших инструктажей."
"You found this weaponized xedrite INSIDE the scorpion? How did it... hmm.\n\nGood job. I'll take this to the Sand Seer.": "Ты нашёл этот вооружённый кседрит ВНУТРИ скорпиона? Как же он... хм.\\n\\nОтличная работа. Я отнесу это Песчаному Провидцу."
"Oh, you're the one going after the mama scorpion? Well, I hope you're up for the task!\n\nThe hole you're going into has a very tough scorpion inside. The 'mama scorpion', the bandits call her. We only know about her location because she's stopped laying eggs and she's become too aggressive for the bandits to deal with. So they sold her location to us.\n\nI'm no fan of killing exotic wildlife, but I think we should make an exception here in the name of science. Kill her, see if you can figure out what makes her special, and report back.": "О, ты тот, кто охотится на маму скорпиона? Надеюсь, ты готов к этому заданию!\\n\\nВ дыре, куда ты собираешься, живёт очень крепкий скорпион. Бандиты называют её «мамой скорпиона». Мы знаем её местоположение только потому, что она перестала откладывать яйца и стала слишком агрессивной для бандитов. Поэтому они продали нам её координаты.\\n\\nЯ не сторонник убийства экзотических животных, но думаю, что здесь стоит сделать исключение ради науки. Убей её, попробуй понять, что делает её особенной, и доложи о результатах."
"I've got a nice easy one for you. Here's the map to the war cache. We believe the cache was originally located in a Crone military city called New Argolis. Well, not really a city, more like a recreational area for off-duty Hegemony troops. Should be pretty safe. The report says there's some weird animals in there, but no bandits.\n\nFollow the map, get in, find the Weaponized Xedrite, and get out. Don't screw up! You've only got one chance -- you won't be able to get back in a second time.": "У меня для тебя простое задание. Вот карта военного тайника. Мы считаем, что тайник изначально находился в военном городе Крона под названием Новый Арголис. Ну, это не совсем город, скорее зона отдыха для солдат Гегемонии вне службы. Должно быть довольно безопасно. В отчёте говорится, что там есть странные животные, но бандитов нет.\\n\\nСледуй по карте, зайди внутрь, найди Вооружённый Кседрит и выйди. Не облажайся! У тебя только один шанс — второй раз попасть туда не удастся."
"Good job. You run into any trouble? A flooded basement, eh? Well that's interesting.\n\nYou fought a what? A hip o? I don't know what that is. But it's dead, so problem solved! Here's your tickets.": "Хорошая работа. Были ли у тебя проблемы? Затопленный подвал, да? Это интересно.\\n\\nТы сражался с чем? С гипо? Я не знаю, что это такое. Но оно мертво, так что проблема решена! Вот твои награды."
"We've found another war cache in the region that used to be 'New Argolis'. It wasn't on the front lines. Hegemony troops went there for booze and whores. So there shouldn't be any spike traps or death beams or anything. Nice and easy! In fact, I almost gave this job to my second-best finder, Kella, so I could save you for the hard ones. But she declined it... so it's all yours. She said the area is full of snakes, and she's afraid of snakes. Whoever heard of a rakkie that's afraid of snakes? What is this world coming to, I ask you?\n\nAnyway, I guess she might know what she's talking about. Bring some antivenom.": "Мы нашли ещё один военный тайник в регионе, который раньше назывался «Новый Арголис». Он не был на передовой. Войска Гегемонии ходили туда за выпивкой и проститутками. Так что там не должно быть ни шиповых ловушек, ни смертельных лучей или чего-то подобного. Всё просто и легко! На самом деле я почти отдал эту работу своей второй лучшей разведчице, Келле, чтобы сохранить тебя для сложных заданий. Но она отказалась... так что это задание полностью твоё. Она сказала, что в этом районе полно змей, и она боится змей. Кто вообще слышал о ракке, который боится змей? Что же это за мир, спрашиваю я вас?\n\nВпрочем, наверное, она знает, о чём говорит. Принеси немного противоядия."
"So there were snakes in there after all? I'm glad to hear that. I thought Kella was lying to me, and I couldn't figure out why... but I guess she just doesn't like snakes! I'm glad you aren't as squeamish. Here's your pay.": "Так там всё-таки были змеи? Рад это слышать. Я думал, Келла мне врала, и не мог понять почему... но, наверное, она просто не любит змей! Рад, что ты не такой брезгливый. Вот твоя плата."
"I've got a real easy one for you! This one's in the remains of 'New Argolis', the old R&R camp for Hegemony soldiers during the war. The Seer didn't go in, of course, but she said it smells like beer in there. I can't imagine it's still drinkable, though. Remember: wine ages, but beer just goes bad after a few decades. Don't make yourself sick!": "У меня для тебя очень простой квест! Он находится в развалинах «Нового Арголиса», старого лагеря отдыха и восстановления для солдат Гегемонии во время войны. Провидец, конечно, туда не заходил, но сказал, что там пахнет пивом. Хотя я не думаю, что оно ещё пригодно к употреблению. Помни: вино с годами становится лучше, а пиво портится через несколько десятилетий. Не отравись!"
"Oh boo hoo, so you got wet. And slimy. You're still alive, and you got the Weaponized Xedrite, so how hard could it have been? Here's your tickets!": "Ой, ой, ты промок и покрылся слизью. Но ты всё ещё жив, и у тебя есть Оружейный Кседрит, так что насколько это могло быть сложно? Вот твоя награда!"
"Here's the map to your next mission. It used to be a holding cell for war prisoners. It sounds like it's been flooded for a while, which means the bandits will have moved on, but I'm sure there's snakes and other dumb animals in there. Oh, and ghosts. Ghosts always show up in military prisons... you're not scared of ghosts, are you? I just give 'em a stunning bash with my shield. That shuts 'em up.": "Вот карта для твоей следующей миссии. Раньше это была камера для военнопленных. Похоже, она уже давно затоплена, значит разбойники ушли, но я уверен, что там есть змеи и другие глупые животные. О, и призраки. Призраки всегда появляются в военных тюрьмах... ты не боишься призраков, правда? Я просто оглушаю их ударом щита. Это их успокаивает."
"That's quite a haul of xedrite! Ghosts give ya any trouble? Haha! I'm sure it was nothing you couldn't handle.\n\nHere's your pay, and if you meet my second-best finder Kella, tell her she missed out on easy money when she turned this one down!": "Это довольно большой улов кседрита! Привидения доставляли тебе проблемы? Ха-ха! Уверен, это было не то, с чем ты не справился бы.\\n\\nВот твоя плата, а если встретишь мою вторую лучшую искательницу Келлу, скажи ей, что она упустила лёгкие деньги, когда отказалась от этого задания!"
"Here's your next map. A new gang of bandits moved into the area, so make yourself useful and figure out what they're up to. And get my xedrite too, obviously.": "Вот твоя следующая карта. В этот район перебралась новая банда разбойников, так что будь полезен и выясни, что они замышляют. И, конечно, достань мой кседрит."
"They're manufacturing drugs? That sounds... bad. Are you sure it's not just another ill-conceived perfume line?\n\nHmm. Well, this is the first I've heard of it, and hopefully the last. Thanks for the intel.": "Они производят наркотики? Звучит... плохо. Ты уверен, что это не просто ещё одна неудачная линия духов?\n\nХм. Что ж, я слышу об этом впервые и надеюсь, в последний раз. Спасибо за информацию."
"Remember those drug-manufacturing rakkies you found? Well, I've been hearing more rumors about it. It sounds powerful. Could be an alchemical recipe we could use in the Council military. Here's a map to a hole without any Xedrite in it. But it's in the same general area as that gang. I'm guessing it'll be swarming with the kitties, so be careful. Get in there and steal me a clean sample of the drug.": "Помнишь тех ракки, которые занимались изготовлением наркотиков? Я слышал ещё больше слухов об этом. Похоже, это мощное вещество. Возможно, алхимический рецепт, который мы могли бы использовать в военных советах. Вот карта к яме без кседрита. Но она находится в том же районе, что и та банда. Думаю, там будет полно котиков, так что будь осторожен. Зайди туда и укради для меня чистый образец этого наркотика."
"Perfect. The Sand Seer knows a goblin who knows a goblin who can get this analyzed. I'll let you know what we learn.": "Отлично. Песчаный Провидец знает гоблина, который знает гоблина, который может провести анализ. Я сообщу тебе, что мы узнаем."
"Here's the map for your next assignment. And you might want to hurry, I've had reports of smoke, screams, and commotion coming from there today.": "Вот карта для твоего следующего задания. И тебе стоит поторопиться, сегодня поступали сообщения о дыме, криках и беспорядках оттуда."
"Good job. No, don't tell me about the freakish monsters you had to kill, because I don't care, and if you tell me I'd be obliged to care. So let's just leave it at: here's your pay.": "Хорошая работа. Нет, не рассказывай мне про уродливых монстров, которых тебе пришлось убить, потому что мне всё равно, а если расскажешь — придётся мне волноваться. Так что просто вот твоя плата."
"So the drug you found out there, that Telka's Tits or whatever... it's garbage. Only works on rakkies! Most worthless drug since I got my hands on 'bounceweed'. But there's good news: the stuff is made from the silk of the rare giant sand worm, and we think other, better drugs could be made from the same stuff. And I have a lead on a cache infested with 'em! If we're lucky, you can get some samples of their silk while you're getting my xedrite.\n\nBefore you leave, go see if the Sand Seer has any advice for ya on Sand Worm killin'. Or just take my advice: use archery. But no, no, the elf woman's gotta make it more complicated than that!": "Так вот, та дрянь, что ты нашёл там, эта Телкина Грудь или как её там... полное дерьмо. Работает только на ракках! Самый бесполезный наркотик с тех пор, как я впервые столкнулся с «прыжковой травой». Но есть хорошие новости: это вещество делают из шёлка редкого гигантского песчаного червя, и мы думаем, что из того же материала можно сделать другие, более эффективные препараты. И у меня есть наводка на тайник, кишащий этими червями! Если повезёт, ты сможешь взять образцы их шёлка, пока будешь добывать мой кседрит.\n\nПрежде чем уйдёшь, сходи к Песчаному Провидцу, может, она даст тебе советы по убийству песчаных червей. Или просто послушай меня: используй стрельбу из лука. Но нет, эльфийка должна всё усложнять!"
"Good work. This is... stickier than I expected. It's actually... pretty vile. I'll go foist it on the Sand Seer.": "Хорошая работа. Это... липче, чем я ожидал. На самом деле... довольно отвратительно. Я скину это на Песчаного Провидца."
"Ah, Johnson picked you for the sand worm job? Makes sense.\n\nIf you're not prepared, sand worms can be surprisingly nasty, but with some prep work they're nothing to worry about.\n\nSand worms live at tremendous depths, so their bodies are immune to crushing and physical trauma. They can be burned, although they're not especially vulnerable to it. I'd choose cold magic, myself.\n\nThey attack by sticking their pincers in you and vibrating your body with sonic blasts. They can also entangle you in sticky silk that will sap your energy, but they have to be pretty close to do that, so try to keep your distance.\n\nThat's all you need to know. I'm sure you'll be fine!": "Ах, Джонсон выбрал тебя для задания с песчаными червями? Логично.\n\nЕсли ты не готов, песчаные черви могут быть неожиданно злыми, но с подготовкой они не представляют опасности.\n\nПесчаные черви живут на огромной глубине, поэтому их тела устойчивы к сжатию и физическим травмам. Их можно сжечь, хотя они не особенно уязвимы к огню. Я бы выбрал холодную магию.\n\nОни атакуют, вонзая клешни в тебя и вибрируя твоё тело звуковыми ударами. Они также могут опутать тебя липким шелком, который истощает энергию, но для этого им нужно быть очень близко, так что старайся держаться подальше.\n\nЭто всё, что тебе нужно знать. Уверен, у тебя всё получится!"
"This one might be tricky. The Sand Seer insists this area of the desert has \"unusual isolated weather patterns\". What kind of patterns, you ask? Wind storms. Wind storms! Those are completely natural for the Ilmari! But she's an elf. They're supposed to be sensitive to nature, or whatever. Anyway I hired her for her expertise, so I'd be a fool to ignore her.\n\nHere's the map. The Seer will brief you further. We've detected a lot of xedrite in this one, so do whatever it takes!": "Этот может быть сложным. Песчаный Провидец настаивает, что в этой части пустыни наблюдаются «необычные изолированные погодные явления». Какие именно, спрашиваешь? Песчаные бури. Песчаные бури! Для Илмари это совершенно естественно! Но она эльфийка. Говорят, они должны быть чувствительны к природе или что-то в этом роде. В любом случае, я нанял её за её опыт, так что был бы дураком, если бы игнорировал её.\n\nВот карта. Провидец даст тебе дальнейшие инструкции. Мы обнаружили здесь много кседрита, так что делай всё, что потребуется!"
"So there's some new kind of nightmare spiders? That's just great. This job just keeps getting harder!\n\nBut you're definitely not part of the problem. You're part of the solution! Good job!": "Так появились какие-то новые ночные пауки? Просто замечательно. Эта работа становится всё сложнее!\n\nНо ты определённо не часть проблемы. Ты часть решения! Отличная работа!"
"I fear an invasive species from another continent has taken hold in some of the old war bunkers. There are weird whirlwinds in that area and I've never seen those here... but they remind me of the terrible desert spiders of Fosulf. I hope I'm mistaken!\n\nIf this is the creature I fear, it will be protected by a powerful wind. Shooting arrows into it will be difficult, and most weapons will have reduced effect. But these creatures have a weakness: explosions! Burst magic, bombs, explosion sigils... whatever you have, use it.": "Боюсь, что инвазивный вид с другого континента закрепился в некоторых старых военных бункерах. В этой области наблюдаются странные вихри, которых я здесь никогда не видел... но они напоминают мне ужасных пустынных пауков Фозульфа. Надеюсь, я ошибаюсь!\\n\\nЕсли это то существо, которого я боюсь, оно будет защищено мощным ветром. Стрелять в него из лука будет сложно, и большинство оружия будет иметь сниженный эффект. Но у этих существ есть слабость: взрывы! Магия взрыва, бомбы, знаки взрыва... что у тебя есть — используй это."
"We've got another war cache in that problematic spider area. The Sand Seer wants you to collect some legs from those wind spiders while you're in there. Here's the map. Remember: spider legs are great and all, but don't leave without my Weaponized Xedrite!": "У нас есть ещё один военный тайник в той проблемной зоне с пауками. Песчаный Провидец хочет, чтобы ты собрал несколько ног у этих ветровых пауков, пока будешь там. Вот карта. Помни: ноги пауков — это хорошо, но не уходи без моего Вооружённого Кседрита!"
"That's a lot of spider legs. Well, I guess they do come eight to a body. What is that, two spiders' worth? Eh, whatever. You got the metal, and the Seer can study these for whatever thing she cares about... so you did it! Take a rest, soldier.": "Это много паучьих ног. Ну, наверное, у паука их действительно восемь. Это что, на два паука хватает? Да неважно. У тебя есть металл, а Провидец может изучить их для своих целей... так что ты справился! Отдохни, солдат."
"Got another spider-hole for you. No xedrite detected, though, so you're not going in for that. You're going in because the Sand Seer needs more spider legs or something. I'm starting to regret listening to her about this... but she says it might be a huge crisis, so now I can't just tell her to ignore it! Do whatever she needs, and try to be quick about it. We've got xedrite to find!": "У меня для тебя ещё одна паучья нора. Кседрита там не обнаружено, так что ты туда не ради этого идёшь. Ты идёшь, потому что Песчаному Провидцу нужны ещё паучьи ноги или что-то в этом роде. Я начинаю жалеть, что послушал её по этому поводу... но она говорит, что это может быть огромный кризис, так что теперь я не могу просто сказать ей игнорировать это! Сделай всё, что ей нужно, и постарайся побыстрее. У нас есть кседрит, который нужно найти!"
"You're back. Was the mission successful? No, don't explain, just tell me this: is the Sand Seer gonna be happy, or is she gonna be pissed?\n\nYou sure? Okay. Good, then! Here's your tickets.": "Ты вернулся. Миссия удалась? Нет, не объясняй, просто скажи: Песчаный Провидец будет доволен или зол?\\n\\nТы уверен? Хорошо. Отлично! Вот твои билеты."
"He assigned you again? Good. I've got bad news and worse news. The bad news is those spiders you found are definitely tornado spiders, and the infestation is already too deep. There's no hope of really being rid of them, but maybe we can keep them contained to a small part of the desert.\n\nNow here's the worse news: tornado spiders are the weak ones. When an infestation of tornado spiders gets large enough, they somehow spontaneously start laying eggs for the REAL dangerous spiders, the Hurricane Spiders. And those eggs have been spotted in the hole you're headed to.\n\nGo in and burn those eggs. And I mean that literally: you should be prepared to burn them! They're very difficult to damage with weapons, and they regenerate health like crazy unless they're on fire. If you can't manage any other type of fire, I noticed the fairy has some Trollbane Oil for sale in the 'commissary'. That will at least keep them from regenerating! Good luck.": "Он снова назначил тебя? Хорошо. У меня есть плохие новости и ещё хуже. Плохие новости: те пауки, которых ты нашёл, определённо торнадо-пауки, и заражение уже слишком глубокое. Надежды полностью избавиться от них нет, но, возможно, мы сможем ограничить их небольшой частью пустыни.\n\nА вот ещё хуже: торнадо-пауки — это слабые. Когда заражение торнадо-пауков становится достаточно большим, они каким-то образом начинают откладывать яйца для НАСТОЯЩИХ опасных пауков — ураганных пауков. И эти яйца были замечены в той яме, куда ты направляешься.\n\nЗайди туда и сожги эти яйца. И я имею в виду буквально: будь готов их сжечь! Их очень трудно повредить оружием, и они безумно быстро восстанавливают здоровье, если не горят. Если не можешь устроить другой огонь, я заметил, что фея продаёт масло Троллебан в «комиссариате». Оно хотя бы не даст им восстанавливаться! Удачи."
"You're finally back. Been saving this one for you! I sent my second-best xedrite-finder in already, and she came back empty-handed and mostly-dead. So it's time to show 'em why you're the best! There's xedrite in there, plus some big bug the Sand Seer wants killed. Go talk to her first.": "Ты наконец вернулся. Я приберёг этот квест для тебя! Я уже отправил туда своего второго лучшего искателя кседрита, и она вернулась с пустыми руками и почти мёртвая. Так что пора показать им, почему ты лучший! Там есть кседрит, а ещё большой жук, которого Песчаный Провидец хочет уничтожить. Сначала поговори с ней."
"You killed the big scary bug? Ha! See, I told her it'd be easy! The Sand Seer kept saying I should send in a \"team\"... but you're way more cost-effective. Here's your pay. I'll go tell her.": "Ты убил большого страшного жука? Ха! Видишь, я же говорил ей, что это будет легко! Песчаный Провидец всё твердил, что нужно отправить «команду»... но ты гораздо экономичнее. Вот твоя награда. Я пойду скажу ей."
"Remember how I told you that 'tornado spiders' are the weak ones, and it was very important to destroy all the giant eggs before they became much bigger problems? Well, we found another cave where an egg already hatched, and we've got a much bigger problem. But it's still an adolescent, so there might be time left to kill it!\n\nIt will have extreme regeneration, just as it did in the egg: you'll need to light it on fire to prevent that. Fortunately, weapons work better than they do on the egg, but there's an extra complication: this spider has a very venomous bite!\n\nKella was sent in before you and nearly died. Don't underestimate this one.": "Помнишь, я говорил тебе, что «торнадо-пауки» — это слабые, и очень важно уничтожить все гигантские яйца, прежде чем они станут большой проблемой? Так вот, мы нашли другую пещеру, где яйцо уже вылупилось, и у нас гораздо большая проблема. Но это всё ещё подросток, так что, возможно, ещё есть время убить его!\\n\\nУ него будет экстремальная регенерация, как и в яйце: тебе нужно поджечь его, чтобы предотвратить это. К счастью, оружие действует лучше, чем на яйце, но есть ещё одна сложность: у этого паука очень ядовитый укус!\\n\\nКеллу отправили туда до тебя, и она чуть не погибла. Не недооценивай этого."
"I hope you're not afraid of mummies. I need you to go into a mummy-infested hole and get some xedrite. My other finders have chickened out, but you're better than them! You've got this! Here's the map!\n\nOh, better have the Sand Seer brief you on mummies first. It's good to refresh the brain!": "Надеюсь, ты не боишься мумий. Мне нужно, чтобы ты забрался в яму, кишащую мумиями, и достал немного кседрита. Мои предыдущие искатели испугались, но ты лучше их! Ты справишься! Вот карта!\\n\\nО, и лучше сначала пусть Песчаный Провидец расскажет тебе о мумиях. Хорошо освежить память!"
"You made it back alive! Here: I requisitioned some curatives when I learned we've got mummy problems. You should use this before consortin' with anybody.": "Ты вернулся живым! Вот: я заказал немного лечебных средств, когда узнал, что у нас проблемы с мумиями. Тебе стоит использовать это, прежде чем общаться с кем-либо."
"He wants me to brief you on MUMMIES? I'm not a mummy expert! But I can repeat what I've read in books, I guess.\n\nMummies are nasty undead that are supposedly not being created anymore... although I'm pretty sure that's untrue. Anyway, the mummies you'll be facing are very old, and they have old diseases that your body has few protections against. So try not to inhale near them.\n\nTheir organs are removed during the creation process, so don't bother trying to poison them, bludgeon them, or make them bleed. Their thick bandages give them protection against blades and arrows, too. Fire is the classic weapon of choice, but acid and lightning also work well, and I've heard they're even susceptible to psychic blasts, which is unusual for undead.\n\nThat's about all I can remember about mummies, aside from historical info. Good luck.": "Он хочет, чтобы я рассказал тебе о МУМИЯХ? Я не эксперт по мумиям! Но могу повторить то, что прочитал в книгах, наверное.\n\nМумии — это мерзкие нежити, которые, как считается, больше не создаются... хотя я почти уверен, что это неправда. В любом случае, мумии, с которыми тебе предстоит столкнуться, очень древние, и у них старые болезни, против которых твоё тело почти не защищено. Так что старайся не вдыхать воздух рядом с ними.\n\nИх органы удаляются в процессе создания, так что не пытайся отравить их, забить или вызвать кровотечение. Их плотные бинты также защищают от клинков и стрел. Огонь — классическое оружие, но кислота и молния тоже хорошо работают, и я слышал, что они даже подвержены психическим взрывам, что необычно для нежити.\n\nЭто всё, что я могу вспомнить о мумиях, кроме исторической информации. Удачи."
"Got a big ole' mummy-infested deathtrap for ya. Lots of xedrite though! I've already sent someone into this one and she came back empty-handed, sayin' it was too dangerous. So I tell ya what, I'll throw in a little something extra if you can get all three pieces. Just don't die over it!": "У меня для тебя большая ловушка смерти, кишащая мумиями. Но там много кседрита! Я уже посылал туда одного человека, и она вернулась с пустыми руками, сказав, что это слишком опасно. Так что вот что: я добавлю тебе небольшой бонус, если ты соберёшь все три части. Только не умри там!"
"Hah! I really didn't think you'd manage to pull it off! Remind me never to bet against you. Here's an extra ticket.": "Ха! Я действительно не думал, что тебе удастся это сделать! Напомни мне никогда не ставить против тебя. Вот дополнительный билет."
"This hole's near the other mummy-pits, so be on your guard. Could be mummies or other nasty undead.": "Эта яма рядом с другими могилами мумий, так что будь начеку. Там могут быть мумии или другие мерзкие нежити."
"You're back. Ready for debriefing? ... You saw a 'visage of demise'? Wait, you mean you fought an actual Face of Death?! Those things are old as shit! How the hell did the Crone Hegemony have those? They can militarize Faces of Death?! That's... well, I'd better send this little nugget of info up the chain of command. Here's your reward; dismissed.": "Ты вернулся. Готов к докладу? ... Ты видел «лицо гибели»? Подожди, ты хочешь сказать, что сражался с настоящим Лицом Смерти?! Эти существа древние как мир! Как, чёрт возьми, Гегемония Старух могла заполучить таких? Они могут использовать Лица Смерти в военных целях?! Это... ну, мне лучше передать эту информацию по цепочке командования. Вот твоя награда; свободен."
"Man, I wish I had a watercress salad for lunch! The spice, with a hint of vinegar dressing... delicious! But I'm just getting myself worked up for nothing. I don't have any of the ingredients on hand!": "Чёрт, как бы я хотел пообедать салатом из водяного кресса! Пряность с оттенком уксусной заправки... восхитительно! Но я просто зря себя накручиваю. У меня нет ни одного из ингредиентов под рукой!"
"You made me a watercress salad? That was... weirdly kind of you. Thank you. Well, here. You like grapes?": "Ты сделал мне салат из водяного кресса? Это было... странно мило с твоей стороны. Спасибо. Вот, тебе нравятся виноград?"
"You have slain so many foes that one might easily mistake you for an army. You are worthy, of that much I am certain. Make an offering to me.": "Ты убил так много врагов, что тебя легко можно принять за армию. Ты достоин, в этом я уверен. Сделай мне подношение."
"I bequeath to you the title of Warsmith. Among orcs, few reach this height. And yet I suspect you have even greater feats ahead. I shall be watching.": "Я дарую тебе титул Военного кузнеца. Среди орков немногие достигают такого уровня. И всё же я подозреваю, что впереди тебя ждут ещё более великие подвиги. Я буду наблюдать."
"A few moons back, an elf visited us and gave me an exotic item called a 'yo-yo'. It has a string. It goes up and down via magic. I loved it!\n\nUnfortunately I left it lying about, and one of the sentinel spiders took it to their nest. If you happen upon it, please return it.": "Несколько лун назад к нам пришёл эльф и подарил мне экзотический предмет под названием «йо-йо». У него есть верёвка. Оно поднимается и опускается с помощью магии. Мне это очень понравилось!\\n\\nК сожалению, я оставил его без присмотра, и один из пауков-стражей утащил его в своё гнездо. Если найдёшь его, пожалуйста, верни."
"That's it! But the string has been digested by spider acid. Sadness and happiness collide! Nevertheless, thank you.": "Вот и всё! Но нитка была растворена паучьей кислотой. Грусть и радость сталкиваются! Тем не менее, спасибо."
"Hm. I expected your efforts to have more impact. No matter, we shall simply work harder! Let me aid you: while you're in this dream realm, your legs aren't necessarily controlled by physics. Use this technique carefully lest you fling yourself into terrible monsters!": "Хм. Я ожидал, что твои усилия окажут большее влияние. Неважно, мы просто будем работать усерднее! Позволь помочь тебе: пока ты в этом мире снов, твои ноги не обязательно подчиняются законам физики. Используй эту технику осторожно, чтобы не броситься прямо на ужасных монстров!"
"Two years ago the Council started a \"green up the city\" initiative, where anyone who wanted to grow plants in the city would get free maintenance from utility golems. Those utility golems have all been repurposed for the war effort -- I mean the demonic incident -- and now the city is overgrowing with weeds! I trust you can handle weeding a plant? Most of them are indoors, so you may have to poke around for them. Oh, also, take that opportunity to put a fertilizer stick in the soil. I have some for sale or trade -- don't worry, you'll make your money back!\n\n<i>[To weed a plant, place the Weed Plants ability on your sidebar, obtain Fertilizer Sticks, then stand near a weedy potted plant and use the Weed Plants ability.]</i>": "Два года назад Совет запустил инициативу «озеленение города», по которой любой желающий мог выращивать растения в городе с бесплатным обслуживанием от служебных големов. Все эти големы были перепрофилированы для военных нужд — то есть для демонического происшествия — и теперь город зарос сорняками! Думаю, ты справишься с прополкой растения? Большинство из них находятся в помещениях, так что придётся поискать. Ах да, заодно положи в почву удобрительную палочку. У меня есть их на продажу или обмен — не переживай, ты быстро окупишь затраты!\\n\\n<i>[Чтобы прополоть растение, помести способность Прополка растений на панель быстрого доступа, получи удобрительные палочки, затем встань рядом с заросшим горшечным растением и используй способность Прополка растений.]</i>"
"I appreciate the effort. The longer we can keep up business as usual, the less frightened and problematic our citizenry will be. Let me know if you have time to do more weeding.": "Я ценю твои усилия. Чем дольше мы сможем поддерживать обычный порядок дел, тем меньше будет испуганных и проблемных жителей. Сообщи, если у тебя будет время заняться прополкой ещё."
"Ready for more weeding? Excellent. I'll pay you the same as before.": "Готов к очередной прополке? Отлично. Заплачу тебе так же, как и раньше."
"Thanks. Overgrown plants may seem irrelevant but these sorts of things can snowball into major problems when they reach a certain level of saturation. We civil engineers must maintain the status quo!": "Спасибо. Переросшие растения могут показаться незначительными, но такие вещи могут перерасти в серьёзные проблемы, когда достигают определённого уровня распространения. Мы, гражданские инженеры, должны поддерживать статус-кво!"
"Thanks for answering my summons. I know me and the Wardens don't always agree, but this one's bad: an invasion of werewolves! I don't know where they came from, but there's lots of 'em are prowling around northeast of here, along the beach past the orcs. Sanja's camp is too far northwest to be much help. So it's up to you!": "Я знаю, что мы со Стражами не всегда согласны, но на этот раз всё серьёзно: вторжение оборотней! Я не знаю, откуда они взялись, но их много бродит к северо-востоку отсюда, вдоль пляжа за орками. Лагерь Саньи слишком далеко на северо-западе, чтобы помочь. Так что всё зависит от тебя!"
"Did you figure out what they were up to? No? Well, I'll keep trying to gather intel. Thanks again, friend.": "Ты понял, что они замышляли? Нет? Ну, я продолжу собирать информацию. Ещё раз спасибо, друг."
"You're the Warden they sent? Good. Little Red told us to contact you if the forest werewolves seemed to be acting more intelligently.\n\nThe caves near here are full of werewolves, but usually only a few wander out into the woods. Until today. Scores more poured out. They're still fighting mindlessly, but something is up.\n\nSanja and me have killed our fill and need a bit of rest before we go again. Hopefully you can pick up the slack.": "Ты тот Страж, которого прислали? Отлично. Красная Шапочка сказала связаться с тобой, если лесные оборотни начнут вести себя умнее.\\n\\nПещеры здесь полны оборотней, но обычно только несколько выходят в лес. До сегодняшнего дня. Их вышло гораздо больше. Они всё ещё сражаются без разума, но что-то происходит.\\n\\nСанджа и я уже достаточно поубивали и нам нужен небольшой отдых, прежде чем идти снова. Надеюсь, ты сможешь подменить нас."
"Impressive work! Now I'm starting to understand why the Wardens exist. And don't worry: I may be a human, but I'm no snitch. I promised to keep your organization secret, and I will. So nobody'll ever know about your heroism today. Except us. Here, it's for you. I hope collars aren't offensive or nothin'.": "Впечатляющая работа! Теперь я начинаю понимать, зачем существуют Стражи. И не волнуйся: я человек, но не доносчик. Я пообещал сохранить тайну вашей организации, и сдержу слово. Так что никто никогда не узнает о твоём героизме сегодня. Кроме нас. Вот, это для тебя. Надеюсь, ошейники никого не обижают или что-то в этом роде."
"A favor for me? Help me finish my objective here: kill all these mindless werewolves!": "Услуга для меня? Помоги мне выполнить мою задачу: убить всех этих безмозглых оборотней!"
"That helped. Not enough, but a start. Thank you. I don't have much, but here's some coin.": "Это помогло. Недостаточно, но начало. Спасибо. У меня немного, но вот немного монет."
"I'm sorry. I can't open my store in this condition. I've been robbed! The store is a disgrace!\n\nIf you're inclined to help, can you speak to that Hackley woman with the Council? A few guards investigated days ago, but I've heard nothing since. Surely the thief is caught by now! Go check.": "Мне жаль. В таком состоянии я не могу открыть свой магазин. Меня ограбили! Магазин в позоре!\\n\\nЕсли ты хочешь помочь, можешь поговорить с той женщиной Хакли из Совета? Несколько стражников расследовали дело несколько дней назад, но с тех пор я ничего не слышала. Наверняка вора уже поймали! Проверь, пожалуйста."
"Denton Razor?! The famous thief? But that's absurd: he steals from the rich and gives to the poor!\n\nOh no. Oh no! By Statehelm standards I <i>am</i> rich! I was just regular-wealthy back home.\n\nBut <i>now</i> I'm poor. So Denton Razor should give to me! Maybe you could speak with him?": "Дентон Рейзор?! Знаменитый вор? Но это абсурд: он крадёт у богатых и отдаёт бедным!\\n\\nО нет. О нет! По меркам Стейтхелма я <i>настоящий</i> богач! Дома я был просто зажиточным.\\n\\nНо <i>теперь</i> я беден. Так что Дентон Рейзор должен отдать мне! Может, ты сможешь с ним поговорить?"
"Why do people think I'm responsible for investigating thefts? Ugh! But yes, I did report Elune's story to the constabulary. They made a perfunctory investigation and decided it was Denton Razor's gang. And that's the end of that! We don't tangle with Razor's gang if we can help it. She's out of luck.\n\nNo no, don't tell Elune that! Tell her we're still investigating and it's an intricate process and time will tell and there are multiple investigative vectors etcetera etcetera. Sheesh.": "Почему люди думают, что я должен заниматься расследованием краж? Уф! Но да, я сообщил историю Элуны в полицию. Они провели формальное расследование и решили, что это банда Дэнтона Рэйзора. И на этом всё! Мы стараемся не связываться с бандой Рэйзора, если можем избежать. Ей не повезло.\\n\\nНет-нет, не говори Элуне этого! Скажи ей, что мы всё ещё расследуем, что это сложный процесс, время покажет, есть несколько направлений расследования и так далее и тому подобное. Фух."
"We don't have many ranalon in Verta so I've been very interested to learn more about the ones that live here! Unfortunately they aren't friendly.\n\nI've noticed many of them carry bits of glass around and I can't imagine why. Could you find me some samples? The pretty violet ones.": "У нас в Верте не так много раналонов, поэтому мне очень интересно узнать больше о тех, что живут здесь! К сожалению, они недружелюбны.\\n\\nЯ заметил, что многие из них носят с собой кусочки стекла, и не могу понять зачем. Не мог бы ты найти для меня несколько образцов? Красивых фиолетовых."
"These are lovely! But ... <i>[Trasen studies the glass]</i> these are just ordinary worthless glass. Why do they carry these around?! How strange.\n\nOh, I should pay you for your service! I don't have much of the local coin, but here: this powder is prized among weather witches.": "Они прекрасны! Но... <i>[Тразен изучает стекло]</i> это просто обычное никчёмное стекло. Почему они носят это с собой?! Как странно.\\n\\nО, я должен заплатить тебе за услугу! У меня мало местной монеты, но вот: этот порошок ценится среди ведьм погоды."
"It wasn't the sheep upsetting our tornado friends. It's the tigers! Tigers can't hurt tornadoes, but our tornadoes are juveniles and don't really understand that.\n\nThe whirlwinds say there's a huge tiger on the hill east of here, near the lookout tower. They call her Windbiter because she viciously attacks them! Completely harmlessly, of course, but it's still not polite. Can you get rid of this big cat and her entourage?": "Это были не овцы, которые беспокоили наших друзей-торнадо. Это тигры! Тигры не могут навредить торнадо, но наши торнадо — ещё молодые и не совсем это понимают.\\n\\nВихри говорят, что на холме к востоку отсюда, возле смотровой башни, есть огромный тигр. Её зовут Кусательница Ветра, потому что она яростно нападает на них! Конечно, совершенно безвредно, но всё равно невежливо. Можешь избавиться от этой большой кошки и её свиты?"
"Finally! The whirlwinds are quieting down a little bit. Thank you!": "Наконец-то! Вихри немного утихают. Спасибо!"
"The Winter Trolls south of here are a real pest. They're not native to this area! Only the green ones are! Remember: green good, blue bad.\n\nThe Winter Court uses trolls as laborers and guards everywhere, but here they also use them to spread misinformation throughout troll society. If you see one, execute it!": "Зимние тролли к югу отсюда — настоящая напасть. Они не местные! Только зелёные — свои! Запомни: зелёные — хорошо, синие — плохо.\\n\\nЗимний Двор использует троллей везде как рабочих и охрану, но здесь они ещё используют их для распространения дезинформации среди тролльего общества. Если увидишь такого — уничтожь его!"
"Great work on the troll-slaying. And trolls are true immortals, so killing them isn't even that big of a deal. They'll be reborn in just a few years! Hopefully they'll make better decisions next time.": "Отличная работа по уничтожению троллей. А тролли — настоящие бессмертные, так что убить их — не такая уж большая проблема. Они возродятся всего через несколько лет! Надеюсь, в следующий раз они примут более разумные решения."
"In addition to getting three recommendations, you'll also need to pass a simple trial. Scattered near the university are three statuettes. Find them, activate them, and defeat their guardians. Hopefully you can manage something as simple as that.": "Помимо получения трёх рекомендаций, вам также нужно пройти простое испытание. Вокруг университета разбросаны три статуэтки. Найдите их, активируйте и победите их стражей. Надеюсь, вы справитесь с такой простой задачей."
"You've defeated the guardians. That's half of the entrance requirements done.": "Ты победил стражей. Это половина требований для входа выполнена."
"There are two requirements to join the Statehelm School of Magic. First, you'll also need to get recommendations from wizards that I trust. Here are some names. Get at least three to sign off on your competence. Oh, and don't bother trying to forge these letters. If they agree to recommend you, these good folks will know how to contact me directly.\n\n<i>The following wizards can provide recommendations: The Sand Seer, Bendith the Banished, Velkort the Inferno, Ichin the Ice Master, Landri the Cold.</i>": "Есть два требования для вступления в Школу Магии Стейтхелма. Во-первых, тебе нужно получить рекомендации от волшебников, которым я доверяю. Вот несколько имён. Получи как минимум три подписи, подтверждающие твою компетентность. О, и не пытайся подделать эти письма. Если они согласятся рекомендовать тебя, эти хорошие люди знают, как связаться со мной напрямую.\n\n<i>Следующие волшебники могут дать рекомендации: Песчаный Провидец, Бендиф Изгнанный, Велкорт Инферно, Ичин Ледяной Мастер, Ландри Холодный.</i>"
"I must say I'm surprised that you got the recommendations! They must see something in you that I can't. Well, that's half the entrance requirements done.": "Должен сказать, я удивлён, что ты получил рекомендации! Видимо, они видят в тебе то, чего не вижу я. Что ж, это половина требований для поступления выполнена."
"In a dungeon beneath Eltibule there is a mighty avatar shackled into servitude. This is unacceptable. Slay Ciervos The Shadow to relieve his humiliation. ": "В подземелье под Элтибулем заточён могучий аватар в рабстве. Это недопустимо. Убейте Сиервоса Тень, чтобы избавить его от унижения. "
"Confirmed: Ciervos the Shadow is dead.\n\nYou have received 1 token of Norala.": "Подтверждено: Сиервос Тень мёртв.\\n\\nВы получили 1 жетон Норалы."
"Humans, Elves, and Rakshasa deem themselves \"civilized\", and they shun Norala. Teach them the folly of their ways.": "Люди, Эльфы и Ракшасы считают себя «цивилизованными» и избегают Норалы. Научи их ошибкам их путей."
"Confirmed: 50 humans, elves, rakshasa dead.\n\nYou have received 1 token of Norala.": "Подтверждено: 50 человек, эльфов и ракшас убито.\\n\\nВы получили 1 знак Норалы."
"The freakish half-dragon creatures are weak. They hide behind the might of their dragon ancestors. They should be rooted out.": "Странные полу-драконьи существа слабы. Они прячутся за могуществом своих драконьих предков. Их следует истребить."
"Confirmed: 10 dragon-kin slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 10 драконорожденных.\\n\\nВы получили 1 жетон Норалы."
"The fae believe they are superior to mortals. Norala rewards those who punish the unjustly arrogant.": "Феи считают себя выше смертных. Норала вознаграждает тех, кто наказывает несправедливо надменных."
"Confirmed: 50 fae creatures dead.\n\nYou have received 1 token of Norala.": "Подтверждено: 50 фейских существ убито.\\n\\nВы получили 1 знак Норалы."
"Goblins are weak and deserve destruction. Make it happen.": "Гоблины слабы и заслуживают уничтожения. Сделайте это возможным."
"Confirmed: 50 goblins slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 50 гоблинов.\\n\\nВы получили 1 жетон Норалы."
"Show that you are a top predator. Mercilessly hunt down deer.": "Докажи, что ты верховный хищник. Безжалостно охоться на оленей."
"Confirmed: 25 deer slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 25 оленей.\\n\\nВы получили 1 жетон Норалы."
"Show that your hunger is insatiable. Hunt more deer.": "Докажи, что твой голод неутолим. Охоться на большее количество оленей."
"Confirmed: 50 deer slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 50 оленей.\\n\\nВы получили 1 жетон Норалы."
"The chosen of Gulagra has been found! Norala tells us he is deep beneath the earth in Eltibule. Calling himself the Scion of Discord, he believes he is the fiercest warrior alive. This cannot be. Prove it.": "Избранный Гулагры найден! Норала сообщает, что он глубоко под землёй в Элтибуле. Называя себя Потомком Раздора, он считает себя самым свирепым воином на свете. Это невозможно. Докажи обратное."
"Confirmed: the Scion of Discord is dead.\n\nYou have received 1 token of Norala.": "Подтверждено: Потомок Раздора мёртв.\\n\\nВы получили 1 жетон Норалы."
"Norala believes in the rule of might. If you can kill the Scion of Norala, then you should do so. If you die, then you were too weak to live.": "Норала верит в власть силы. Если ты можешь убить Отпрыска Норалы, то должен это сделать. Если ты умрёшь, значит, ты был слишком слаб, чтобы жить."
"Confirmed: the Scion of Norala is dead.\n\nYou have received 1 token of Norala.": "Подтверждено: Потомок Норалы мёртв.\\n\\nВы получили 1 жетон Норалы."
"Prove that even mighty orcs are no match for Norala's chosen. Killing fifty of them should demonstrate this well.": "Докажите, что даже могущественные орки не соперники избранным Норалы. Убийство пятидесяти из них должно это хорошо продемонстрировать."
"Confirmed: 50 orcs slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 50 орков.\\n\\nВы получили 1 жетон Норалы."
"Orcs are still too prevalent! This angers Norala! Murder them!": "Орки всё ещё слишком многочисленны! Это злит Норалу! Убейте их!"
"Confirmed: 100 orcs slain.\n\nYou have received 1 token of Norala.": "Подтверждено: убито 100 орков.\\n\\nВы получили 1 жетон Норалы."
"It is poison to our kind, but we can overcome it and grow even mightier. Collect wolfsbane and bring it here as an offering.": "Это яд для нашего рода, но мы можем преодолеть его и стать ещё сильнее. Соберите волчью ягоду и принесите её сюда в дар."
"Confirmed: 10 wolfsbane delivered.\n\nYou have received 1 token of Norala.": "Подтверждено: доставлено 10 волчьих ягод.\\n\\nВы получили 1 жетон Норалы."
"Wolfsbane is this horrible poisonous flower that grows in the winter months. You should be able to find some around here. It's good for killin' wolves... and werewolves. There's a lot of ways to use it, and I'll show you one technique if you get me some.": "Волчья ягода — это ужасный ядовитый цветок, который растёт в зимние месяцы. Ты должен смочь найти его где-то здесь. Он хорош для убийства волков... и оборотней. Есть много способов его использовать, и я покажу тебе один приём, если ты принесёшь мне немного."
"Yep, this is the shit. Okay, so here's what you do. You take a mushroom bomb, see, and...": "Да, это оно. Ладно, вот что ты делаешь. Берёшь грибную бомбу, понимаешь, и..."
"In captivity we were forced to mate like animals -- the male giving his life to feed the younglings. But now that we are free, do you not agree we should adopt the culture of a more civilized race?\n\nI wish to mate with Zeratak, but I fear that she will not understand my desires. She is a very conservative mantis. But seeing that most mantises fled for the hills yet she remained behind with me, it is possible that she wishes to mate with me badly enough to try a new method. Can you see if Zeratak is amenable to using venison for the larva? I would ask, but I fear she may lash out in anger.": "В неволе нас заставляли спариваться, как животных — самец отдавал жизнь, чтобы накормить потомство. Но теперь, когда мы свободны, разве ты не согласен, что нам следует принять культуру более цивилизованной расы?\n\nЯ хочу спариться с Зератак, но боюсь, что она не поймёт моих желаний. Она очень консервативная богомолиха. Но учитывая, что большинство богомолов сбежали в горы, а она осталась со мной, возможно, она настолько хочет спариться со мной, что готова попробовать новый способ. Можешь узнать, согласна ли Зератак использовать оленину для личинок? Я бы спросил сам, но боюсь, что она может разозлиться."
"This is a bitter pill to swallow, as they say in your idiom.\n\nI still believe there is a way. Perhaps if I prepared the venison specially...\n\nIn any case, thank you for your labor.": "Это горькая пилюля, как говорится в вашем идиоме.\\n\\nЯ всё ещё верю, что есть выход. Возможно, если я специально приготовлю оленину...\\n\\nВ любом случае, спасибо за твою работу."
"I do not understand. Azalak wants to mate, but does not want to die? ... He suggests deer carcasses instead?!\n\nThe concept disturbs me. I am a romantic at heart. No. Tell him that I expect my suitor to bite the dust, as they say in your idiom.": "Я не понимаю. Азалак хочет спариваться, но не хочет умирать? ... Он предлагает вместо этого оленей?!\\n\\nЭта идея меня тревожит. В глубине души я романтик. Нет. Скажи ему, что я ожидаю, что мой претендент погибнет, как говорится в вашем идиоме."
"Hey can you go get some wool off the mountain sheep? Don't bother trying to shear them, they'll just kick your ass. You have to take 'em out. All the docile sheep live in pleasant territory. The sheep here are all assholes.": "Эй, можешь сходить и добыть немного шерсти с горных овец? Не пытайся их стричь — они просто отшлёпают тебя. Их нужно убить. Все спокойные овцы живут в приятных местах. А эти овцы — настоящие сволочи."
"Thanks, that's plenty. Got lots more pairs of pants to insulate! Here, take this.": "Спасибо, этого достаточно. Нужно утеплить ещё много пар штанов! Вот, возьми это."
"The orc invaders stole everything. Even our blankets! I've made a thin blanket from old rags, but as it gets colder, we'll need something warmer. If only sheep grew around here, I could get some wool!": "Орки-захватчики украли всё. Даже наши одеяла! Я сшил тонкое одеяло из старых тряпок, но с наступлением холода нам понадобится что-то теплее. Если бы здесь росли овцы, я мог бы достать шерсть!"
"So much wool! And so warm! You are a kind soul to part with this.": "Столько шерсти! И такая тёплая! Ты добрая душа, что делишься этим."
"If I had a lot of wool, I could prepare for winter. Without blankets, we'll freeze!": "Если бы у меня было много шерсти, я мог бы подготовиться к зиме. Без одеял мы замёрзнем!"
"Can you go head to the plains south of here and kill some of those idiot sheep for wool? I'm trying to make better equipment since apparently we're gonna be stuck here a while...": "Можешь сходить на равнины к югу отсюда и убить несколько этих идиотских овец ради шерсти? Я пытаюсь сделать лучшее снаряжение, ведь, похоже, нам придётся здесь задержаться надолго..."
"Thanks! Here, this is for you.": "Спасибо! Вот, это для тебя."
"I need an injector that can go through my wolfen skin when I change form. It needs to be as sharp as a knife, but hollow for my potion to flow through.\n\nAnd I know just the thing: the teeth of the Tor-Urak would work! And there's a bunch out in Kur. Of course, I'd need to kill a bunch of Tor-Uraks and then carefully butcher them to try to find a viable tooth... that seems unlikely in my current state. Unless you can help?": "Мне нужен инжектор, который сможет проникнуть через мою волфенскую кожу, когда я меняю форму. Он должен быть острым, как нож, но полым, чтобы через него могла течь моя зелье.\\n\\nИ я знаю, что именно нужно: зубы Тор-Урака подойдут! А их полно в Кур. Конечно, мне придётся убить много Тор-Ураков и аккуратно их разделать, чтобы найти подходящий зуб... но в моём нынешнем состоянии это маловероятно. Если только ты не можешь помочь?"
"You got them! Wow, these are larger and sharper than I expected. Intimidated? No! No. ... I'm just scared. It's not the same. Here. Take these coins for your trouble.": "Ты достал их! Вау, они больше и острее, чем я ожидал. Запуган? Нет! Нет... Мне просто страшно. Это не то же самое. Вот. Возьми эти монеты за свои труды."
"Here is one I've struggled with myself: can you defeat demons barehanded? Not the wimpy ones -- the Behemoths!\n\n<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Вот с чем я сам боролся: сможешь ли ты победить демонов голыми руками? Не слабаков — Бегемотов!\\n\\n<i>[Для выполнения этого задания у тебя должен быть активен навык Бой без оружия.]</i>"
"I'm impressed. Perhaps you could teach me a thing or two!\n\nBut I bet I can still find ways to help you improve your skill.": "Я впечатлён. Возможно, ты мог бы меня чему-нибудь научить!\\n\\nНо я уверен, что всё равно смогу помочь тебе улучшить навык."
"If giant vipers were too easy, then you should move on to punching giant scorpions. There's mounds of scorpions in Vidaria. Go punch one up! You'll learn a lot. A lot about pain. But that's part of it!\n\n<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Если гигантские гадюки были слишком просты, тогда переходи к ударам гигантских скорпионов. В Видарии полно скорпионов. Иди и хорошенько приложись к одному из них! Ты многому научишься. Многому о боли. Но это часть процесса!\\n\\n<i>[Для выполнения этого задания у тебя должен быть активен навык Бой без оружия.]</i>"
"You seriously defeated a dozen scorpions barehanded?\n\nHmm. I misjudged you. That's my mistake.": "Ты серьёзно победил дюжину скорпионов голыми руками?\n\nХмм. Я недооценил тебя. Это моя ошибка."
"You want to get better at hand-to-hand combat fast? I know just the thing. Wrestle giant snakes. It works! Of course, you need a certain level of skill beforehand. That's why we don't use this technique with raw recruits. But  you're not raw, are you? Show me what you can do against the massive vipers in Povus.\n\n<i>[You must have the Unarmed skill active to advance this quest.]</i>": "Хочешь быстро улучшить навыки рукопашного боя? Я знаю, что тебе поможет. Борись с гигантскими змеями. Это работает! Конечно, для этого нужен определённый уровень мастерства. Вот почему мы не применяем эту технику с новичками. Но ты же не новичок, правда? Покажи, на что способен против огромных гадюк в Повусе.\n\n<i>[Для выполнения этого задания у тебя должен быть активен навык Бой без оружия.]</i>"
"You wrestled snakes in the swamp? I bet you learned a lot, right? Right?! Of course you did. I was right.": "Ты боролся со змеями в болоте? Спорю, ты многому научился, да? Да?! Конечно, научился. Я был прав."
"Welcome to the Writ Challenge!\nThis one is really pretty easy, just go out and kill stuff like you normally would! You will find special items in loot called a Writ of Unlock or Golden Writ of Unlock. Use the writs to advance your quests and the Community Score. The Writ Master in Serbule will keep tally of the Community Score. The higher the score, the more prizes that get unlocked!\nVIPs can contribute extra points to the score just for being here! Visit the Writ Master to see how.": "Добро пожаловать в Испытание Писем!\n\nЭто задание довольно простое — просто отправляйся и убивай монстров, как обычно! В добыче ты найдёшь специальные предметы под названием Письмо Разблокировки или Золотое Письмо Разблокировки. Используй эти письма, чтобы продвигать свои квесты и увеличивать Общественный Рейтинг. Мастер Писем в Сербуле ведёт учёт Общественного Рейтинга. Чем выше рейтинг, тем больше призов открывается!\n\nVIP-персоны могут добавлять дополнительные очки к рейтингу просто за своё присутствие! Посети Мастера Писем, чтобы узнать как."
"WOW! You finished all 7 of them? That's pretty impressive! Thank you for your massive contribution!!!\n\nThe quests are done, but you can still continue to use normal and Golden Writs to help advance the Community Score.": "ВАУ! Ты выполнил все 7? Это довольно впечатляет! Спасибо за твой огромный вклад!!!\\n\\nКвесты завершены, но ты всё ещё можешь использовать обычные и Золотые Письма, чтобы помочь повысить Общественный Рейтинг."
"Do your part for the community score! Collect some writs and use them.\n<b>IMPORTANT:</b> You will only get loot credit for writs that are looted from the corpse of a defeated enemy. Writs obtained by any other means will not count, but you can still use them to add points to the Community Score.": "Внеси свой вклад в общественный рейтинг! Собирай письма и используй их.\\n<b>ВАЖНО:</b> Очки за добычу начисляются только за письма, полученные с трупа поверженного врага. Письма, полученные иным способом, не учитываются, но их всё равно можно использовать для увеличения общественного рейтинга."
"Well done! Enjoy your reward and be proud of your contribution!": "Отличная работа! Наслаждайся своей наградой и гордись своим вкладом!"
"VERY NICE! A fine score indeed! Visit the Writ Master in Serbule near the town well to collect your very nice prize!": "ОЧЕНЬ ХОРОШО! Отличный результат! Посетите Мастера Писем в Сербуле рядом с городским колодцем, чтобы получить ваш замечательный приз!"
"Oh good, you're here! There's a new threat to the wildlife of Kur: a huge swarm of hook beasts! They normally live in the yeti caves beneath the ground, but I guess food has become too scarce. You'll find them north and east of the yeti crevice.": "О, хорошо, что ты здесь! Появилась новая угроза для дикой природы Кура: огромный рой зверей с крюками! Обычно они живут в пещерах йети под землёй, но, похоже, еды стало слишком мало. Ты найдёшь их к северу и востоку от расщелины йети."
"You took care of the hook beasts? Thank you! I know this was a tough request. Here: this is a necklace a friend made for me, but I think you'll have more use for it. You make me proud to have been a Warden.": "Ты справился с крючковыми зверями? Спасибо! Я знаю, что это было непростое задание. Вот: это ожерелье, которое друг сделал для меня, но, думаю, оно больше пригодится тебе. Ты заставляешь меня гордиться тем, что я был Стражем."
"You did the thing!": "Ты сделал это дело!"
"<i>The Bat in the Hat:</i>  So you want something a little nicer? I can do that for you! Mind you the item list I need is a bit more demanding, but if you're up to the task, I'll make the hat for you. Take this list and come back to see me once you have everything. See you soon! Riiii!\n\n<i><b>NOTE:</b> The reward item will be a level 85 item. Make sure you have your correct skill combo active when you complete this quest! But also remember, you're dealing with Zhia Lian's magic. Results may be unpredictable!</i>": "<i>Летучая мышь в шляпе:</i> Так ты хочешь что-то получше? Я могу сделать это для тебя! Учти, список предметов, который мне нужен, немного сложнее, но если ты готов к задаче, я сделаю шляпу для тебя. Возьми этот список и возвращайся, когда соберёшь всё. До скорого! Риии!\n\n<i><b>ПРИМЕЧАНИЕ:</b> Наградой будет предмет уровня 85. Убедись, что у тебя активна правильная комбинация навыков, когда будешь выполнять этот квест! Но помни, ты имеешь дело с магией Жиа Лиан. Результаты могут быть непредсказуемыми!</i>"
"<i>The Bat in the Hat:</i>  Excellent! Here's a wonderful, festive hat to enjoy the season! While this hat is stylish, it's not very functional. If you want a version of this hat that is more functional, we'll need to talk some more.": "<i>Летучая мышь в шляпе:</i> Отлично! Вот замечательная, праздничная шляпа, чтобы насладиться сезоном! Хотя эта шляпа стильная, она не очень функциональна. Если хочешь более функциональную версию этой шляпы, нам нужно будет ещё поговорить."
"<i>Zhia Lian:</i> You know what would go great with wings and a hideous face? A stylish hat! Bring me some supplies and I'll teach you the recipe so you can make your own. Fashionable!\n\n<i>[Note: it requires Tailoring 30 to make a hat for a bat! But even if you don't have enough tailoring skill yet, you can still complete this quest to learn the recipe for future use.]</i>": "<i>Жиа Лян:</i> Знаешь, что отлично подойдёт к крыльям и ужасному лицу? Стильная шляпа! Принеси мне материалы, и я научу тебя рецепту, чтобы ты мог сделать свою собственную. Модно!\n\n<i>[Примечание: для изготовления шляпы для летучей мыши требуется Навык Портняжного дела 30! Но даже если у тебя пока недостаточно навыков, ты всё равно можешь выполнить этот квест, чтобы выучить рецепт для будущего использования.]</i>"
"<i>Zhia Lian:</i> Here you go! Sew your stylish bat hat and wear it with pride! Just remember that you look absolutely ridiculous. ": "<i>Жиа Лян:</i> Вот, держи! Сшей свою стильную шляпу для летучей мыши и носи её с гордостью! Только помни, что выглядишь при этом совершенно нелепо."
"<i>The Bat in the Hat:</i>  Hello again! Say, it looks like you could use a stylish hat for the season! Zhia Lian and I have been talking a lot recently and she has been teaching me some new tricks. Would you like a cool, stylish hat for the season? Then get me these items and I'll put something together for you. See you soon! Riiii!": "<i>Летучая мышь в шляпе:</i> Привет снова! Похоже, тебе нужна стильная шляпа на этот сезон! Мы с Жиа Лиан много разговаривали в последнее время, и она научила меня новым трюкам. Хочешь классную, стильную шляпу на сезон? Тогда принеси мне эти предметы, и я что-нибудь для тебя соорудлю. До скорого! Рииии!"
"<i>Zhia Lian:</i> If I'm going to be one of those creepy gods with their own cult, I want all the perks! I demand a midnight sacrifice! Atop a mountain!\n\n<i>[To qualify as a sacrifice, you need to kill a goat in Gazluk between midnight and 1 am game-time.]</i>": "<i>Жиа Лян:</i> Если я собираюсь стать одним из тех жутких богов со своим культом, я хочу все привилегии! Требую полуночное жертвоприношение! На вершине горы!\n\n<i>[Чтобы считаться жертвой, нужно убить козла в Газлуке между полуночью и часом ночи по игровому времени.]</i>"
"<i>Zhia Lian:</i> I don't really understand why that's supposed to be special. I guess it felt nice when you slew a goat in my name, but it wasn't very whimsical! Next time I see Strekios, I'll ask what the deal is. I guess he doesn't technically have a cult, but his followers are creepy and terrified, so that's close enough.": "<i>Жиа Лян:</i> Я не совсем понимаю, что в этом такого особенного. Наверное, было приятно, когда ты убил козла в моё имя, но это было совсем не забавно! В следующий раз, когда я увижу Стрекиоса, спрошу, в чём тут дело. Думаю, у него технически нет культа, но его последователи жуткие и напуганные, так что это почти одно и то же."
"<i>Zhia Lian:</i> Giant bats are common this time of year. And you can be one! Just get bitten often enough by a giant bat, and you're sure to catch the disease. Then practice being a bat long enough to learn echolocation! And don't worry, I'll make sure you can get back to your normal self later. If you want to be boring again.\n\n<i>[You can find giant bats in some deep caves, but it may be easier to just let other player-bats bite you.]</i>": "<i>Жиа Лян:</i> Гигантские летучие мыши обычны в это время года. И ты можешь стать одной из них! Просто достаточно часто получай укусы от гигантской летучей мыши, и ты обязательно заразишься болезнью. Затем тренируйся быть мышью достаточно долго, чтобы освоить эхолокацию! И не волнуйся, я позабочусь, чтобы ты мог вернуться к своему нормальному состоянию позже. Если захочешь снова быть скучным.\n\n<i>[Гигантских летучих мышей можно найти в некоторых глубоких пещерах, но, возможно, будет проще просто позволить другим игрокам-мышам укусить тебя.]</i>"
"<i>Zhia Lian:</i> Hahaha! Flap, bat, flap! You look absurd! I love it!": "<i>Жиа Лян:</i> Ха-ха-ха! Хлопай, летучая мышь, хлопай! Ты выглядишь абсурдно! Мне это нравится!"
"<i>Zhia Lian:</i> We need to show everyone that bats are terrifying predators! Let's see, what's the scariest flying thing around right now? I guess it's those Winter Court fairies. Yeah, this will work! Go and drink their blood!": "<i>Жиа Лян:</i> Нам нужно показать всем, что летучие мыши — ужасные хищники! Давайте подумаем, что сейчас самое страшное летающее существо? Думаю, это феи Зимнего Двора. Да, это сработает! Идите и пейте их кровь!"
"<i>Zhia Lian:</i> That might do the trick! Let's watch over the next few months and see if people start talking about how fearsome giant bats are.\n\nFor now, let's get back to work defeating undead. You can stay a bat if you want! You're so much cuter!": "<i>Жиа Лян:</i> Это может сработать! Давай понаблюдаем в ближайшие несколько месяцев и посмотрим, начнут ли люди говорить о том, насколько страшны гигантские летучие мыши.\\n\\nА пока вернёмся к работе по уничтожению нежити. Если хочешь, можешь остаться мышью! Ты так намного милее!"
"<i>Zhia Lian:</i> I need to know how great bats really are. Can you fly in a snowstorm? And how dangerous are you, really? Hmm... Let's find out: go kill polar bears as a bat!": "<i>Жиа Лян:</i> Мне нужно узнать, насколько велики летучие мыши на самом деле. Можете ли вы летать в метель? И насколько вы действительно опасны? Хм... Давайте выясним: отправляйтесь убивать белых медведей в образе летучей мыши!"
"<i>Zhia Lian:</i> I guess it didn't look more absurd than usual. Okay, I'm still a fan of bats!\n\nBut I can only really have one symbolic animal association... I really need to see something impressive here.": "<i>Жиа Лян:</i> Думаю, это не выглядело более абсурдно, чем обычно. Ладно, я всё ещё поклонница летучих мышей!\\n\\nНо у меня может быть только одно символическое животное... Мне действительно нужно увидеть здесь что-то впечатляющее."
"<i>Zhia Lian:</i> You're so cute as a bat, I love it! So bizarre! But in a whimsical way. If bats need a patron god, I'm on it! Hey... You know, maybe I could actually get that job. Hmmm... but do I even really <i>want</i> that job?\n\nWell, what do I know about bats? They hate bugs, right? Go check that idea: eat some size-appropriate wasps. Tell me how they taste.": "<i>Жиа Лян:</i> Ты такой милый в образе летучей мыши, мне это нравится! Так странно! Но в забавном смысле. Если летучим мышам нужен покровитель, я готова им стать! Эй... Знаешь, может, я действительно могла бы получить эту работу. Хмм... но действительно ли я этого <i>хочу</i>?\n\nНу, что я знаю о летучих мышах? Они ненавидят насекомых, да? Проверь это: съешь несколько ос подходящего размера. Расскажи мне, какой у них вкус."
"<i>Zhia Lian:</i> Did you eat their corpses? Oh, you... like your meat cooked? I didn't think bats cooked. That's whimsical, I guess, but also uninformative.": "<i>Жиа Лян:</i> Ты съел их трупы? О, ты... любишь мясо приготовленным? Я не думала, что летучие мыши готовят. Это забавно, наверное, но совершенно неинформативно."
"<i>Zhia Lian:</i> I forsee a problem with my Goddess of Bats plan: striga! You know, those bat-people who act as servants for the crones? They're Imatia's favored people, and they look like bats. I think the best plan here is to go on the offense.\n\nWhat I need you to do is start an undeniable rumor that giant bats hate and kill striga on sight. Do this by killing striga on sight!": "<i>Жиа Лян:</i> Я предвижу проблему с моим планом Богини Летучих Мышей: стрига! Знаешь, эти летучелюди, которые служат старухам? Они — избранные Имати, и выглядят как летучие мыши. Думаю, лучший план — перейти в наступление.\n\nМне нужно, чтобы ты запустил неоспоримый слух, что гигантские летучие мыши ненавидят и убивают стригу при встрече. Сделай это, убивая стрига при встрече!"
"<i>Zhia Lian:</i> Yeah. I'm thinking maybe being Goddess of Bats would be fun. I'll talk to some of the other gods about it. Thanks for the help, and remember to spread rumors that bats hate striga!\n\nBut... just to be clear, you don't actually need to hunt striga for me. I mean, they're sentient, and most of them are bookworms. They work as scribes, and they're already pretty afraid of giant bats. So just keep them on their toes, but don't overdo it. Otherwise my plan will backfire!\n\nOur pro-bat public relations scheme is going well, but there's more to do...": "<i>Жиа Лян:</i> Да. Думаю, быть Богиней Летучих Мышей было бы весело. Я поговорю об этом с другими богами. Спасибо за помощь, и не забывай распространять слухи, что летучие мыши ненавидят стригу!\\n\\nНо... чтобы было ясно, тебе не обязательно охотиться на стригу для меня. Они разумны, и большинство из них книжные черви. Они работают писцами и уже довольно боятся гигантских летучих мышей. Так что просто держи их в напряжении, но не переусердствуй. Иначе мой план обернётся против меня!\\n\\nНаша пропаганда в поддержку летучих мышей идёт хорошо, но работы ещё много..."
"<i>Zhia Lian:</i> I just had a good idea. You should learn necromancy! It will help you understand what we're fighting!\n\nThere's an old-fashioned altar to Harukita deep in the Serbule Crypt. Go pledge yourself to Harukita and we'll have some fun.\n\n<i>[Reaching the altar requires a group of 3+ level 30 players.]</i>": "<i>Жиа Лян:</i> Мне только что пришла в голову отличная идея. Тебе стоит изучить некромантию! Это поможет понять, с чем мы боремся!\n\nГлубоко в крипте Сербуль есть старомодный алтарь Харукиты. Иди и поклянись Харуките, и мы повеселимся.\n\n<i>[Для доступа к алтарю требуется группа из 3 и более игроков уровня 30 и выше.]</i>"
"<i>Zhia Lian:</i> Those old illegal Harukita altars are great: they just dump knowledge right into your brain, no learning required, and no sacrifices needed either! But did you notice that your hatred has become fuzzier and less specific? You're gonna have to hate more explicitly from now on, because Harukita is tapping your subconscious emotions to power himself.\n\nOh, come on, it's no big deal. In time you'll learn to hate again. Most necromancers eventually become incredible assholes, so don't worry about it! Let's go have some necrofun!": "<i>Жиа Лян:</i> Эти старые нелегальные алтари Харукиты отличные: они просто загружают знания прямо в твой мозг, без необходимости учиться и без жертв! Но ты заметил, что твоя ненависть стала более расплывчатой и менее конкретной? Теперь тебе придётся ненавидеть более явно, потому что Харукита использует твои подсознательные эмоции, чтобы подпитывать себя.\\n\\nО, да ладно, это не так уж страшно. Со временем ты снова научишься ненавидеть. Большинство некромантов в итоге становятся невероятными мерзавцами, так что не переживай! Пойдём повеселимся с некро!"
"<i>Zhia Lian:</i> Hey, I detect interference from my old friend Akhisa in the Serbule Crypt! Find the talking spider and set it free, then convince it to make you into a spider. It'll be fun! Trust me! You still have those allies handy from killing Ursula, right? Hmm, actually, you might need some better friends...\n\nOh hey. When you talk to the spider, remember to buy his special powers!\n\n<i>[You must defeat dangerous Elite creatures to complete this quest. Recommended for a group of 5+ level 25 players.]</i>": "<i>Жиа Лян:</i> Эй, я обнаружила помехи от моего старого друга Ахисы в крипте Сербуль! Найди говорящего паука и освободи его, затем убедись, чтобы он превратил тебя в паука. Это будет весело! Поверь мне! У тебя ещё есть союзники, с которыми ты убивал Урсулу, да? Хм, на самом деле, тебе могут понадобиться более надёжные друзья...\n\nО, кстати. Когда будешь говорить с пауком, не забудь купить его особые способности!\n\n<i>[Для выполнения этого задания нужно победить опасных элитных существ. Рекомендуется группа из 5 и более игроков уровня 25 и выше.]</i>"
"<i>Zhia Lian:</i> See? See?! Isn't having eight legs great? But a word of caution: you CAN go too far. Once I turned into a 48-legged spider, and that's too much. Stick with eight, it's easier to manage. You look great, by the way!": "<i>Жиа Лян:</i> Видишь? Видишь?! Разве восемь ног — это не здорово? Но предупреждаю: можно и переборщить. Однажды я превратилась в паука с 48 ногами, и это уже слишком. Оставайся на восьми — так проще управлять. Кстати, ты выглядишь отлично!"
"My entire pumpkin patch is infested with evil monsters! I've never seen anything like 'em! Luckily I'd already harvested half the pumpkins, but the remaining ones are rotted inside. Even the seeds inside them are bad!\n\nAnd now I'm worried they're gonna wander off and hurt somebody that can't take care of themselves, like the Duchess. Tell you what: kill 'em off and I'll give you some of my earlier pumpkin harvest.": "Вся моя тыквенная плантация заражена злыми монстрами! Я никогда не видела ничего подобного! К счастью, я уже собрала половину тыкв, но оставшиеся внутри сгнили. Даже семена в них плохие!\\n\\nА теперь я боюсь, что они могут уйти и навредить кому-то, кто не может о себе позаботиться, например, герцогине. Вот что: уничтожь их, и я отдам тебе часть своего раннего урожая тыкв."
"Thanks. Here's some edible pumpkins for ya. I swear, this neighborhood just gets worse and worse. First the ranalon and now this! Pah.": "Спасибо. Вот тебе несколько съедобных тыкв. Клянусь, этот район становится всё хуже и хуже. Сначала раналон, а теперь это! Фу."
"<i>Zhia Lian:</i> Ghouls are nasty, disgusting undead. There is nothing more gross than a pile of dead ghouls. At least skeletons don't smell very much! Go make the world a better-smelling place! Bury all the ghouls you can find!": "<i>Жиа Лян:</i> Вурдалаки — мерзкие, отвратительные нежити. Нет ничего более отвратительного, чем куча мертвых вурдалаков. По крайней мере скелеты почти не пахнут! Сделайте мир более приятным на запах! Похороните всех вурдалаков, которых найдете!"
"<i>Zhia Lian:</i> Good. I hate ghouls. So gross.": "<i>Жиа Лян:</i> Хорошо. Я ненавижу вурдалаков. Такие отвратительные."
"Hey! Can you hear me? Finally! It is I, Zhia Lian, the Goddess of Whimsy! I've been trying to reach your mind for almost a week! Your brain is really hard to break into.\n\nAnyway, I was at a party last week and you'll never guess who showed up: the other undead gods! So I got to talking with them. It turns out Chalice is in close alignment with Alharth right now, and they're flooding the continent with undead!\n\nI have some friends on Alharth so I figured I'd help them out... by helping YOU out! You're pretty strong and I think you can help fix this. And we'll have some fun along the way, too. Stick with me, mortal, and you won't regret it!\n\n<i>[Check your quest journal for quests to get you started. Complete those quests and you'll unlock additional quests. The quests have varying degrees of difficulty and you probably won't be able to complete a lot of them, so focus on the ones you can complete. You'll be rewarded for each quest. Good luck, and happy Halloween!]</i>": "Привет! Ты меня слышишь? Наконец-то! Это я, Жиа Лян, Богиня Причуд! Я пыталась достучаться до твоего разума почти неделю! Твой мозг очень трудно взломать.\\n\\nВ общем, на прошлой неделе я была на вечеринке, и ты никогда не догадаешься, кто там появился: другие боги нежити! Так что я поговорила с ними. Оказалось, что Чалис сейчас тесно связан с Алхартом, и они наводняют континент нежитью!\\n\\nУ меня есть друзья в Алхарте, так что я решила помочь им... помогая ТЕБЕ! Ты довольно силён, и я думаю, ты сможешь это исправить. И по пути мы ещё повеселимся. Оставайся со мной, смертный, и ты не пожалеешь!\\n\\n<i>[Проверь свой журнал заданий, чтобы получить начальные квесты. Выполни их, и ты откроешь дополнительные задания. Задания разной сложности, и, вероятно, ты не сможешь выполнить многие из них, так что сосредоточься на тех, что по силам. За каждое задание ты получишь награду. Удачи и счастливого Хэллоуина!]</i>"
"<i>Zhia Lian:</i> Great! Enjoy that tasty... well, no... that kind-of-tasty homemade treat! You'll need your energy for all the undead-slaying you have to do!": "<i>Жиа Лян:</i> Отлично! Наслаждайся этим вкусным... ну, не совсем вкусным домашним угощением! Тебе понадобится энергия для всей той нежити, которую предстоит уничтожить!"
"<i>Zhia Lian:</i> You should understand your enemy better. I think you should drink from the foul undead concoction known as the Gruesome Spooky Punch. Normally only an alchemist could make the stuff, but if you collect the ingredients, I'll mix you up a batch... plus you'll get the recipe, so you can make more later.": "<i>Жиа Лян:</i> Тебе стоит лучше понять своего врага. Думаю, тебе следует выпить отвратительный неживой напиток, известный как Ужасный Жуткий Пунш. Обычно такое может приготовить только алхимик, но если ты соберёшь ингредиенты, я приготовлю для тебя порцию... и дам рецепт, чтобы ты мог сделать больше позже."
"<i>Zhia Lian:</i> Good work! Here's the punch, plus the recipe. Drink up!": "<i>Жиа Лян:</i> Отличная работа! Вот пунш и рецепт. Пей!"
"<i>Zhia Lian:</i> Candles are an important part of many rituals. You should at least be able to make some tealights!": "<i>Жиа Лян:</i> Свечи — важная часть многих ритуалов. Ты должен хотя бы уметь делать свечи-таблетки!"
"<i>Zhia Lian:</i> Good. Now let's go use them.": "<i>Жиа Лян:</i> Хорошо. Теперь давай их использовать."
"<i>Zhia Lian:</i> Ugh, undeath is creeping into the sea, too. There are undead starfish in the reefs! They burn you when you touch them. So fun! But evil. Very evil. So go get rid of those before mortals get hurt!": "<i>Жиа Лян:</i> Уф, нежить ползёт и в море. В рифах появились неживые морские звёзды! Они обжигают, если к ним прикоснуться. Так весело! Но злобно. Очень злобно. Так что избавьтесь от них, пока смертные не пострадали!"
"<i>Zhia Lian:</i> See, now aren't you happy you practiced holding your breath earlier? Those starfish were pretty deep! All my plans work out eventually. And when they work out, you win!\n\nWe're simpatico, you and me: I give you jobs and you do the jobs! This mind-invasion is working out so much better than usual!": "<i>Жиа Лян:</i> Видишь, теперь ты рад, что раньше практиковался задерживать дыхание? Те морские звёзды были довольно глубоко! Все мои планы в конце концов срабатывают. А когда они срабатывают, побеждаешь ты!\\n\\nМы с тобой на одной волне: я даю тебе задания, а ты их выполняешь! Это вторжение в сознание идёт намного лучше, чем обычно!"
"<i>Zhia Lian:</i> Those were tiny-boned skeletons. You should try some BIG skeletons! I found some really impressive skeletal beasts in Povus. Goblins are making them! Go put a stop to it! And maybe bring some friends! These are big!": "<i>Жиа Лян:</i> Это были скелеты с тонкими костями. Тебе стоит попробовать с БОЛЬШИМИ скелетами! Я нашла действительно впечатляющих костяных зверей в Повусе. Гоблины их создают! Иди и положи этому конец! И, может быть, прихвати с собой друзей! Они большие!"
"<i>Zhia Lian:</i> This is weird... those skeletons you killed were remnants of REALLY old creatures. Older than me, even! What could the goblins have wanted with them?!\n\nWell, I guess we won't have to find out now, thanks to you!": "<i>Жиа Лян:</i> Это странно... те скелеты, которых ты убил, были остатками ОЧЕНЬ древних существ. Даже старше меня! Что же гоблины могли хотеть от них?!\\n\\nНу, думаю, теперь нам не придётся это выяснять, благодаря тебе!"
"<i>Zhia Lian:</i> You know what you need? A drink from a Cauldron of Vile Thoughts. Alchemists can obtain the recipe from the undead. Find somebody willing to share their Cauldron, and sip! But be ready for anything.": "<i>Жиа Лян:</i> Знаешь, что тебе нужно? Выпить из Котла Гнусных Мыслей. Алхимики могут получить рецепт у нежити. Найди кого-то, кто согласится поделиться своим Котлом, и сделай глоток! Но будь готов ко всему."
"<i>Zhia Lian:</i> Good work! But I bet you can drink more!": "<i>Жиа Лян:</i> Отличная работа! Но я уверен, ты можешь выпить больше!"
"<i>[Note: this quest is for gourmands. Pumpkin pie requires Gourmand 35!]</i>\n\n<i>Zhia Lian:</i> Everybody loves pumpkin pie. (Yes, you do.) So eat one!\n\nYou can find the recipe on the undead, or you might be able to obtain a pumpkin pie from another hero.\n\n<i>[This quest will reward you with 1000 Councils, so even if you pay that much for a pie, you won't lose money.]</i>": "<i>[Примечание: этот квест для гурманов. Тыквенный пирог требует уровень Гурмана 35!]</i>\n\n<i>Жиа Лиан:</i> Все любят тыквенный пирог. (Да, и ты тоже.) Так съешь его!\n\nРецепт можно найти у нежити, или ты можешь получить тыквенный пирог у другого героя.\n\n<i>[Этот квест наградит тебя 1000 Советами, так что даже если ты заплатишь столько за пирог, ты не потеряешь деньги.]</i>"
"<i>Zhia Lian:</i> See? Everybody loves pumpkin pie!": "<i>Жиа Лян:</i> Видишь? Все любят тыквенный пирог!"
"<i>Zhia Lian:</i> Hey spider-buddy, why don't you try out your new body? It has sooo many disgusting powers. First, go fill tigers with your babies!": "<i>Жиа Лян:</i> Эй, паучий дружок, почему бы тебе не опробовать своё новое тело? В нём так много отвратительных способностей. Сначала иди и наполни тигров своими детёнышами!"
"<i>Zhia Lian:</i> Sooo gross! Having a living thing growing inside of you is so disgusting! Let's move on to something less horrible.": "<i>Жиа Лян:</i> Так отвратительно! Когда внутри тебя что-то живое растёт — это так мерзко! Давай перейдём к чему-то менее ужасному."
"<i>Zhia Lian:</i> I'm just a little worried that you're not prepared for the horrors you'll have to face. Some undead are VERY gross! You should practice getting sick. Try a wolfsbane bouquet. That will make you nice and sick.": "<i>Жиа Лян:</i> Я немного беспокоюсь, что ты не готов к ужасам, с которыми придется столкнуться. Некоторые нежити ОЧЕНЬ отвратительны! Тебе стоит потренироваться заболевать. Попробуй букет из волчьего яда. Он сделает тебя хорошенько больным."
"<i>Zhia Lian:</i> You look pretty bad. Like, maybe you should seek medical care? Hmm, I didn't think this plan through very well.\n\nSigh... Drink this, and walk it off! We've got work to do!": "<i>Жиа Лян:</i> Ты выглядишь совсем плохо. Может, тебе стоит обратиться за медицинской помощью? Хм, я не очень хорошо продумала этот план.\\n\\nВздох... Выпей это и пройди пешком! Нам нужно работать!"
"<i>[This quest is just for gardeners. It requires Gardening 15 to grow an evil pumpkin!]</i>\n\n<i>Zhia Lian:</i> You can never have enough exploding pumpkins! Well, I can't. Take the seeds from the evil pumpkins and grow me some evil fruit! Pumpkin is a fruit, right? Well, whatever. Just grow them already!": "<i>[Этот квест предназначен только для садоводов. Для выращивания злой тыквы требуется Навык Садоводства 15!]</i>\n\n<i>Жиа Лян:</i> Взрывчатых тыкв никогда не бывает слишком много! По крайней мере, у меня. Возьми семена злых тыкв и вырасти для меня злые плоды! Тыква — это фрукт, да? Ну, неважно. Просто вырасти их уже!"
"<i>Zhia Lian:</i> Eh. I'm kind of sick of pumpkins. You keep them.": "<i>Жиа Лян:</i> Эх. Я немного устала от тыкв. Оставь их себе."
"<i>[This quest is just for gardeners. It requires Gardening 50 to grow a healthy pumpkin!]</i>\n\n<i>Zhia Lian:</i> It's all well and good to find a pumpkin on a zombie, but I want really fresh pumpkins, so you should grow some for me. Find seedlings from undead and grow them in a garden.": "<i>[Этот квест предназначен только для садоводов. Для выращивания здоровой тыквы требуется Навык Садоводства 50!]</i>\n\n<i>Жиа Лян:</i> Найти тыкву на зомби — это хорошо, но я хочу действительно свежие тыквы, так что тебе стоит вырастить их для меня. Найди саженцы у нежити и вырасти их в саду."
"<i>Zhia Lian:</i> Now those are fresh pumpkins! Hm, I guess I don't know why I wanted fresh pumpkins. Keep 'em.": "<i>Жиа Лян:</i> Вот это настоящие свежие тыквы! Хм, кажется, я и не знаю, зачем мне они были нужны. Оставь их себе."
"<i>Zhia Lian:</i> It takes a brave adventurer to even sip from a Cauldron of Vile Thoughts. And you're clearly brave! But the heartiest adventurers can GUZZLE from the Cauldron, yielding more dramatic results. Are you Guzzle-Level Brave?": "<i>Жиа Лян:</i> Нужно быть смелым искателем приключений, чтобы хоть глотнуть из Котла Злых Мыслей. А ты явно смел! Но самые отважные искатели приключений могут ПИТЬ из Котла залпом, что даёт более впечатляющие результаты. Ты достаточно смел, чтобы пить залпом?"
"<i>Zhia Lian:</i> Wow! Good work! Okay, enough drinking things.": "<i>Жиа Лян:</i> Вау! Отличная работа! Ладно, хватит пить."
"I guess you need to talk to Chaf too. The thing is that Chaf is perfectly fine. Zhia Lian only gave him a single coin when he wished for money, but that's really not a bad outcome when you ask Zhia Lian for a favor! Yet he has never stopped complaining.\n\nChaf's a gambler, always has been, and very superstitious. He insists that Zhia's coin is cursed. He also drinks a lot, and I'm afraid he's going to show up at the party and make a scene in front of Zhia. And that would be awful. Not just for him: for everyone!\n\nGo talk to him -- he's already arrived at the casino (big shocker). He loves dice games, so look for him there.": "Полагаю, тебе нужно поговорить и с Чафом. Дело в том, что с Чафом всё в порядке. Жиа Лян дала ему всего одну монету, когда он пожелал денег, но это на самом деле неплохой результат, когда просишь Жиа Лян об одолжении! Тем не менее он постоянно жалуется.\\n\\nЧаф — игрок, был им всегда, и очень суеверен. Он настаивает, что монета Жиа проклята. Он также много пьёт, и я боюсь, что он появится на вечеринке и устроит сцену перед Жиа. А это было бы ужасно. Не только для него, но и для всех!\\n\\nПойди поговори с ним — он уже пришёл в казино (большая неожиданность). Он любит игры в кости, так что ищи его там."
"So is Chaf cool? He's not going to get us all killed by a whimsical god? Good! That's a huge relief. Thank you!": "Так Чаф нормальный? Он не собирается нас всех убить из-за прихоти какого-то бога? Отлично! Это огромное облегчение. Спасибо!"
"Deville got turned into a donkey. And that pretty much ruined his life. He couldn't talk at all for a long time and his parents wouldn't believe me that he was still in there! They decided he was just a donkey and their real son was dead, so they held a funeral for him. He really has no home to go back to now. But he still doesn't want to stay a donkey!\n\nI've tried all kinds of schemes to cure Deville and Rick, but nothing worked. Deville eventually got fed up and left. A few months later, a talking bird stopped by to tell me Deville was living in Animal Town now. I've tried to figure out where that is, and my best guess is an island called \"Sun Vale\". See if you can find him!": "Девиль превратился в осла. И это практически разрушило его жизнь. Он долгое время вообще не мог говорить, а его родители не верили мне, что он всё ещё внутри! Они решили, что это просто осёл, а их настоящий сын умер, и устроили ему похороны. Теперь ему действительно некуда возвращаться. Но он всё ещё не хочет оставаться ослом!\\n\\nЯ пробовал разные способы вылечить Девиля и Рика, но ничего не помогло. В конце концов Девиль устал и ушёл. Несколько месяцев спустя ко мне прилетела говорящая птица и сказала, что Девиль теперь живёт в Городе Животных. Я пытался выяснить, где это, и мой лучший вариант — остров под названием «Сан Вейл». Попробуй найти его!"
"Deville is transformed back?! That's amazing news! Thank you!\n\nI wonder what he's going to do now... I don't think he'll want to speak to his family again, not after how they acted... but I guess that's a problem for another day. We've still got a party to prepare for!": "Девиль снова превратился?! Это потрясающая новость! Спасибо!\\n\\nИнтересно, что он теперь собирается делать... Думаю, он не захочет снова общаться с семьёй, не после того, как они себя повели... но, полагаю, это проблема на другой день. Нам ещё нужно подготовиться к празднику!"
"Rick got turned into a mirror. For months he seemed like just a normal mirror, until one day words started appearing on him: \"please destroy me\", \"you can't leave me like this forever\", \"you're my only friends and I'm begging you to end this\", and so on. Eventually we agreed and tried to end his suffering... only to find out that he's indestructible. Or at least too hard for us to break!\n\nSo we just kept trying to find cures for him, because what else could we do? Eventually Rick calmed down about wanting to die, which was nice, but he still really wanted to not be a mirror. We tried all kinds of crazy stuff: talked to oracles, begged other gods for miracles, anything we could think of, but nothing worked.\n\nThen a few months ago we heard about a special kind of magic in Gazluk. A shaman in an orc city there could supposedly help him. So I took Rick to this city with an orc guide we hired. The guide said we'd get in fine, but he was wrong: he was shot by a gigantic crossbow and died. I fled and orcs captured Rick. So all I can tell you is Rick is somewhere in Gazluk, maybe still in that orc city. I really don't think you should go look for him because you'll die. But if you do, tell him I'm sorry.": "Рика превратили в зеркало. Несколько месяцев он казался просто обычным зеркалом, пока однажды на нём не начали появляться слова: «пожалуйста, уничтожь меня», «ты не можешь оставить меня так навсегда», «ты мои единственные друзья, и я умоляю тебя положить этому конец» и так далее. В конце концов мы согласились и попытались прекратить его страдания... только чтобы выяснить, что он неуничтожим. Или, по крайней мере, слишком крепок, чтобы мы могли его разбить!\\n\\nПоэтому мы просто продолжали искать для него исцеление, потому что что ещё мы могли сделать? В конце концов Рик успокоился насчёт желания умереть, что было приятно, но он всё равно очень хотел перестать быть зеркалом. Мы пробовали всякие безумные вещи: говорили с оракулами, умоляли других богов о чудесах, что только могли придумать, но ничего не помогало.\\n\\nПотом несколько месяцев назад мы услышали о особом виде магии в Газлуке. Шаман в орочьем городе там якобы мог ему помочь. Так что я отвёз Рика в этот город с орочьим проводником, которого мы наняли. Проводник сказал, что мы пройдём без проблем, но ошибся: его убила гигантская арбалетная стрела. Я сбежал, а орки захватили Рика. Так что всё, что я могу сказать — Рик где-то в Газлуке, возможно, всё ещё в том орочьем городе. Я действительно не думаю, что тебе стоит идти искать его, потому что ты умрёшь. Но если пойдёшь, скажи ему, что я сожалею."
"You found Rick? That's amazing! And you got him cured?! That's amazinger! I can't wait to see him at the party!": "Вы нашли Рика? Это потрясающе! И вы вылечили его?! Это ещё более потрясающе! Не могу дождаться, чтобы увидеть его на вечеринке!"
"Westley got turned into an elf by Zhia Lian. He was pretty shaken up about it. He'd been this tough half-human and suddenly he was scrawny and weird. Ran off to find a cure. Last I heard he was headed to the edge of the Council Lands. There's a town near the border with Verta where a lot of elves live. It's called Serbule. He figured they might know something. Go check on him!": "Вестли превратила в эльфа Жиа Лян. Он был сильно потрясён этим. Раньше он был крепким полу-человеком, а теперь вдруг стал тощим и странным. Он убежал искать лекарство. Последний раз я слышал, что он направлялся к границе Земель Совета. Там есть городок у границы с Верта, где живёт много эльфов. Он называется Сербуль. Он думал, что они могут что-то знать. Проверь, как у него дела!"
"So Westley wants to stay an elf? Well, good for him! He was pretty miserable as a halfie. So I guess he won't be showing up for the party...": "Так Вестли хочет остаться эльфом? Ну, молодец! Он был довольно несчастен, будучи полукровкой. Значит, он, наверное, не придёт на вечеринку..."
"<i>Zhia Lian:</i> Pumpkin Spice Tea is a good drink for sitting around and enjoying the season. But don't just sit around - that's boring! I want a drink that makes mortal blood pump faster! The very height of fall! Just bring me these ingredients and I'll make my own drink -- and teach you the recipe.": "<i>Жиа Лян:</i> Чай с тыквенными специями — отличный напиток, чтобы посидеть и насладиться сезоном. Но не просто сидеть — это скучно! Я хочу напиток, который заставит кровь смертного бежать быстрее! Настоящая вершина осени! Просто принесите мне эти ингредиенты, и я приготовлю свой напиток — и научу вас рецепту."
"<i>Zhia Lian:</i> Ahh. Sometimes I create a mortal body just to drink these things! And I like the extra mint to make your breath smell good. *Cough*": "<i>Жиа Лян:</i> Ахх. Иногда я создаю смертное тело только чтобы выпить такие вещи! И мне нравится добавлять мяту, чтобы дыхание было свежим. *Кхм*"
"<i>Zhia Lian:</i> I noticed a weird disturbance in the Eltibule graveyard. Go perform a normal cleansing ritual there and see if you can get whatever is there to come to the surface!\n\nThen kill it. Obviously.": "<i>Жиа Лян:</i> Я заметила странное нарушение в кладбище Элтибуль. Проведи там обычный ритуал очищения и посмотри, сможешь ли ты заставить то, что там есть, подняться на поверхность!\n\nА потом убей это. Очевидно."
"<i>Zhia Lian:</i> Oh, the disturbance was just a ghost? Well, it was shouting loudly into the aether -- loud enough for me to hear all the way over here. So it must have been especially sad. Good job removing it!": "<i>Жиа Лян:</i> О, это было всего лишь привидение? Ну, оно громко кричало в эфир — достаточно громко, чтобы я услышала его отсюда. Значит, оно должно было быть особенно печальным. Отличная работа, что избавился от него!"
"<i>Zhia Lian:</i> It's pumpkin-carving season! That's kinda whimsical, so I approve. You can get most of the ingredients you need by... yep: killing the undead.\n\nObtain a pumpkin from an undead fiend, as well as a recipe book for Jack O' Lanterns. Then carve it up! If you don't have a butcher knife, you can buy one in town, I'm sure.": "<i>Жиа Лиан:</i> Сейчас сезон вырезания тыкв! Это довольно забавно, так что я одобряю. Большую часть необходимых ингредиентов можно получить... да, убивая нежить.\n\nДобыть тыкву у нежити, а также книгу рецептов фонарей Джека. Затем вырежь её! Если у тебя нет мясницкого ножа, ты, наверное, сможешь купить его в городе."
"<i>Zhia Lian:</i> Nice job! You can place that pumpkin in town for others to appreciate! Or whatever. Let's move on.": "<i>Жиа Лян:</i> Отличная работа! Ты можешь поставить эту тыкву в городе, чтобы другие могли её оценить! Или как там. Пойдём дальше."
"<i>Zhia Lian:</i> More powerful spirits have been leaked onto your world. There's a very strong, very sad ghost in Povus. I can hear him shouting into the aether about his bar. You should summon him and then ... unsummon him. You're gonna need assistance for this one! I have no idea how he got so powerful!": "<i>Жиа Лян:</i> На ваш мир проникли более могущественные духи. В Повусе есть очень сильный, очень печальный призрак. Я слышу, как он кричит в эфир о своем баре. Вам нужно призвать его, а затем ... отпустить. Для этого вам понадобится помощь! Я понятия не имею, как он стал таким сильным!"
"<i>Zhia Lian:</i> Problem taken care of? Great! Took you long enough. Let's move on to something more amusing!": "<i>Жиа Лян:</i> Проблема решена? Отлично! Ты долго это делал. Давай перейдём к чему-то более забавному!"
"<i>Zhia Lian:</i> You know how Kajich hates Tast? Because of the... nevermind. Not important. Anyway, listen: there's a very dangerous semi-undead hag underneath an orcish city called Gazluk Keep. She's sleeping in a coffin inside a hidden room. That should be easy enough to find, right? Get a bunch of friends, and find this hag before she awakens and takes over the whole keep!\n\n<i>[Gazluk Keep is a dungeon for a group of 5 players with level 70 combat skills.]</i>": "<i>Жиа Лян:</i> Знаешь, почему Каджич ненавидит Таста? Из-за... да ладно, не важно. В любом случае, слушай: под орочьим городом Газлук-Кип скрывается очень опасная полунежить — ведьма. Она спит в гробу в скрытой комнате. Это должно быть достаточно просто найти, правда? Собери команду друзей и найди эту ведьму, прежде чем она проснётся и захватит весь крепость!\n\n<i>[Газлук-Кип — это подземелье для группы из 5 игроков с боевыми навыками уровня 70.]</i>"
"<i>Zhia Lian:</i> You killed Anhinda? Now that IS impressive! Nice going!": "<i>Жиа Лян:</i> Ты убил Анхинду? Вот это действительно впечатляет! Отличная работа!"
"<i>Zhia Lian:</i> I can't tell you why, but you should go kill Barghests.\n\nOkay you twisted my arm. The reason is Norala, goddess of Hunting. She's trying to take control of them and turn them into a new kind of werewolf!\n\nDreva would normally stop her, but Dreva is busy right now. So you go do it!": "<i>Жиа Лян:</i> Я не могу сказать тебе почему, но тебе нужно убить баргестов.\n\nЛадно, ты меня уговорил. Причина в Норале, богине Охоты. Она пытается взять их под контроль и превратить в новый вид оборотней!\n\nОбычно Древа бы ей помешала, но сейчас Древа занята. Так что иди и сделай это ты!"
"<i>Zhia Lian:</i> Look, I'm sorry I made you kill murderpuppies. I know they seemed harmless, but I swear that they were about to get mind-controlled by Norala!\n\nWell, that's a rumor I heard, anyway... and you put a stop to it!": "<i>Жиа Лян:</i> Слушай, прости, что заставила тебя убивать убийственных щенков. Я знаю, они казались безобидными, но клянусь, их вот-вот должны были подчинить Норала!\\n\\nНу, по крайней мере, я так слышала... а ты это остановил!"
"<i>Zhia Lian:</i> There's lots of other dangerous undead out there. Take your little war band and go find them!\n\n<i>[Undead of any type or level will work, as long as they are Elite. Elite undead typically require a group of 3+ players.]</i>": "<i>Жиа Лян:</i> Там полно других опасных нежитей. Собери свою маленькую боевую группу и отправляйся их искать!\n\n<i>[Подойдут нежити любого типа и уровня, если они элитные. Элитная нежить обычно требует группу из 3 и более игроков.]</i>"
"<i>Zhia Lian:</i> Good work. See, this is why I think that letting necromancers live was a mistake. Whenever a mortal necromancer dies, their undead creations can break free, and eventually some become super powerful. If all necromancers were liches, we wouldn't have that problem! But no, we can't change the nature of necromancy because Harukita says \"life is a precious source of hatred.\"\n\nSo how about just granting living necromancers eternal life? Nope: Kajich says all living things must fear the grave. So here we are, mopping up small problems instead of dealing with the fundamental issues.": "<i>Жиа Лян:</i> Хорошая работа. Видишь, именно поэтому я считаю, что позволять некромантам жить — ошибка. Каждый раз, когда смертный некромант умирает, его создания-некроманты могут вырваться на свободу, и со временем некоторые становятся очень могущественными. Если бы все некроманты были личами, такой проблемы бы не было! Но нет, мы не можем изменить природу некромантии, потому что Харукита говорит: «жизнь — драгоценный источник ненависти».\\n\\nТак что как насчёт того, чтобы просто даровать живым некромантам вечную жизнь? Нет: Каджич говорит, что все живые должны бояться могилы. Вот мы и занимаемся мелкими проблемами, вместо того чтобы решать фундаментальные."
"<i>Zhia Lian:</i> Most necromancers are loners. Which is sad, because the most amusing way to use necromancy is in large groups! Get a group together and murder dangerous creatures!\n\n<i>[Killing any Elite over level 20 will count toward the completion of this quest so long as you have Necromancy active.]</i>": "<i>Жиа Лян:</i> Большинство некромантов — одиночки. Что печально, потому что самый забавный способ использовать некромантию — в больших группах! Соберите группу и убивайте опасных существ!\n\n<i>[Убийство любого элитного существа выше 20 уровня будет засчитано для выполнения этого задания, если у вас активна Некромантия.]</i>"
"<i>Zhia Lian:</i> Watching you, I think I see why most necromancers are loners: the smell of corpses is pretty offputting. But I have a fix for that! Here. You should dab a bit of that on. Now let's go, we have more things to do tonight!": "<i>Жиа Лян:</i> Наблюдая за тобой, я начинаю понимать, почему большинство некромантов — одиночки: запах трупов довольно отталкивающий. Но у меня есть решение! Вот. Немного этого нанеси. А теперь пошли, у нас ещё много дел сегодня вечером!"
"<i>Zhia Lian:</i> I heard Ilth Hale say that one of her favorite minions, Empusa, is hiding in Rahu, waiting to strike. You should get some friends and kill Empusa before it's too late! I'm not sure where she's hiding, but I remember something Ilth Hale said: \"Quoth the Ravens, Nevermore\". Maybe it's a pass-phrase or something.\n\n<i>[Empusa is an encounter for a group of 5 players with level 60 combat skills.]</i>": "<i>Жиа Лян:</i> Я слышала, как Илс Хейл говорила, что одна из её любимых прислужниц, Эмпуса, прячется в Раху и ждёт, чтобы нанести удар. Тебе стоит собрать друзей и убить Эмпусу, пока не стало слишком поздно! Я не уверена, где она прячется, но помню, что Илс Хейл сказала: «Сказали вороны: Никогда больше». Может, это пароль или что-то в этом роде.\n\n<i>[Эмпуса — это встреча для группы из 5 игроков с боевыми навыками уровня 60.]</i>"
"<i>Zhia Lian:</i> Oh, good! I was pretty sure that Empusa was way, WAY more powerful than you. But I'm glad I was wrong!": "<i>Жиа Лян:</i> О, хорошо! Я была почти уверена, что Эмпуса намного, НАМНОГО сильнее тебя. Но рада, что ошибалась!"
"<i>Zhia Lian:</i> There's a tomb near you called Borghild. I happen to know that it's home to some terrifying Faces of Death. You should gather your fellow heroes or whatever, then go destroy them!\n\n<i>[Borghild is recommended for a group of 3+ level 30-40 players. You can also find Faces of Death in a few other locations -- those count too!]</i>": "<i>Жиа Лян:</i> Рядом с тобой есть гробница под названием Боргхильд. Я знаю, что там обитают ужасные Лики Смерти. Тебе стоит собрать своих товарищей или кого там у тебя, а затем пойти и уничтожить их!\n\n<i>[Боргхильд рекомендуется для группы из 3 и более игроков уровней 30-40. Лики Смерти также можно найти в нескольких других местах — они тоже считаются!]</i>"
"<i>Zhia Lian:</i> You faced death! Sorry.": "<i>Жиа Лян:</i> Ты столкнулся со смертью! Извини."
"<i>Zhia Lian:</i> Wait, don't put your pants, gloves, and shirt back on yet! This is the last nude fighting I'll ask you of you, so make it entertaining!\n\nThere's this rude scion of Enoyos in Povus who's said some pretty unwise things about a certain god of whimsy. Why don't you kill him while nude! He's been magically empowered by Enoyos, so you might need some nude friends. Do you have nude friends? Look at you, of course you do!": "<i>Жиа Лян:</i> Подожди, не надевай ещё штаны, перчатки и рубашку! Это последний раз, когда я попрошу тебя драться голышом, так что сделай это зрелищно!\n\nВ Повусе есть грубый отпрыск Энойоса, который сказал несколько неразумных вещей о боге капризов. Почему бы тебе не убить его голышом! Он получил магическую силу от Энойоса, так что тебе могут понадобиться голые друзья. У тебя есть голые друзья? Посмотрим, конечно, есть!"
"<i>Zhia Lian:</i> That was great! You used cunning to overcome your lack of equipment! I'm pretty impressed.\n\nBut I've grown unenamored of your gross mortal body. Get dressed! We have serious work to do!": "<i>Жиа Лян:</i> Отлично! Ты использовал хитрость, чтобы компенсировать отсутствие снаряжения! Я впечатлена.\\n\\nНо мне надоело твоё мерзкое смертное тело. Оденься! У нас серьёзная работа!"
"<i>Zhia Lian:</i> It's deathbat breeding season! Oh, you mortals call them flapskulls. That nickname makes Kajich so angry! They were supposed to be scary! But your nickname ruined it and he abandoned them. So I fixed up his creation: I gave them the ability to breed. It was a good idea given the situation at the time, I promise! But less good now. Anyway, they're showing up at night near a small lake in the Ilmari desert. They don't come out during the day, so you'll have to pull an all-nighter for this one.": "<i>Зиа Лиан:</i> Сейчас сезон размножения летучесмертей! О, вы, смертные, называете их летучеголовыми. Это прозвище так злит Каджича! Они должны были быть страшными! Но ваше прозвище всё испортило, и он их бросил. Так что я исправила его творение: дала им способность размножаться. Это была хорошая идея в той ситуации, обещаю! Но сейчас — не очень. В любом случае, они появляются ночью возле небольшого озера в пустыне Илмари. Днём они не выходят, так что вам придётся не спать всю ночь ради этого задания."
"<i>Zhia Lian:</i> Good job taking them out before they bred! Because it turns out you CAN have too many flapskulls, as we learned in Chalice.": "<i>Жиа Лян:</i> Отличная работа, что уничтожил их до размножения! Потому что, как мы узнали в Чалисе, летучеголовых может быть слишком много."
"<i>Zhia Lian:</i> There's been a terrible disaster that is vaguely related to me. It seems I didn't know enough frog biology. I thought I was helping! But nevermind the details. There are some pretty dangerous frogs in Povus and you should kill them for me!\n\nBut one more thing, and I can't stress this part enough: you need to be naked when you do it. No shirt, no pants, no gloves! But you can wear, like, a hat. And shoes, obviously.": "<i>Жиа Лян:</i> Произошла ужасная катастрофа, которая так или иначе связана со мной. Похоже, я недостаточно хорошо разбиралась в биологии лягушек. Я думала, что помогаю! Но неважно. В Повусе есть довольно опасные лягушки, и тебе нужно их убить для меня!\n\nНо ещё кое-что, и я не могу этого достаточно подчеркнуть: делать это нужно голым. Без рубашки, без штанов, без перчаток! Но можно носить, например, шляпу. И обувь, конечно."
"<i>Zhia Lian:</i> Thanks for helping me out. I made some whimsical proclamations yesterday about a naked warrior saving the day, and you helped me keep my word! Sometimes whimsy takes work! And you looked cute out there!\n\nIn fact, it didn't even seem that hard for you! I wonder...": "<i>Жиа Лян:</i> Спасибо, что помог мне. Вчера я сделала несколько причудливых заявлений о голом воине, спасающем день, и ты помог мне сдержать слово! Иногда причуды требуют усилий! И ты выглядел там мило!\\n\\nНа самом деле, тебе это даже не показалось таким уж сложным! Интересно..."
"<i>Zhia Lian:</i> Ghosts are at their scariest in the wee hours. So prove your mettle by killing them at night!": "<i>Жиа Лян:</i> Призраки самые страшные в предрассветные часы. Докажите свою стойкость, убивая их ночью!"
"<i>Zhia Lian:</i> You weren't even scared at all! Not very fun to watch! But hey, good work and all that.": "<i>Жиа Лян:</i> Ты даже не испугался! Смотреть было не очень интересно! Но, эй, хорошая работа и всё такое."
"<i>Zhia Lian:</i> Ghouls are rarer undead. Urtigal used to make tons of them, but he's dead now. So I don't know who keeps making new ones... but anyway, you should kill them! Let's see... you can find some deep in the dungeon beneath the ruined Kur Tower. And you might want to bring a friend or two: it looks pretty dangerous in there!": "<i>Жиа Лян:</i> Вурдалаки — это редкие нежити. Уртигал раньше делал их много, но теперь он мертв. Так что я не знаю, кто продолжает создавать новых... но в любом случае, вам нужно их убить! Посмотрим... вы можете найти их глубоко в подземелье под разрушенной башней Кур. И, возможно, стоит взять с собой одного-двух друзей: там довольно опасно!"
"<i>Zhia Lian:</i> Your mostly-nude fighting earlier was impressive! It made me curious how good you really are without all that gear. Why don't you try nakedly killing some of those six-armed monsters in Povus? You can keep your hat and boots on, like last time!": "<i>Жиа Лян:</i> Твоя почти голая драка раньше была впечатляющей! Это заставило меня задуматься, насколько ты хорош без всей этой экипировки. Почему бы тебе не попробовать голышом убить несколько из тех шестируких монстров в Повусе? Ты можешь оставить шляпу и ботинки, как в прошлый раз!"
"<i>Zhia Lian:</i> Was that tougher? It still seemed like it was too easy for you. We should try one more! And I do have to admit, it's fun to watch your butt wiggle while you fight!": "<i>Жиа Лян:</i> Было сложнее? Мне всё равно кажется, что тебе слишком легко. Давай попробуем ещё раз! И я должна признать, смотреть, как твоя задница дергается во время боя, забавно!"
"<i>Zhia Lian:</i> You've faced ghosts, but can you face the most dangerous ghost in Serbule... Lord Serbule himself?! Get your friends. Lord Serbule has grown strong from his sorrow.\n\nI'm not sure where he's hiding right now, but I do remember overhearing this: \"Instead of a femur, offer a skull.\" I dunno what it means. Figure it out and kill him!\n\n<i>[Lord Serbule is an encounter for a group of 6 players with level 30-40 combat skills.]</i>": "<i>Жиа Лян:</i> Ты сталкивался с призраками, но сможешь ли встретиться с самым опасным призраком в Сербуле... самим лордом Сербулем?! Собирай друзей. Лорд Сербуль стал сильнее из-за своей скорби.\n\nЯ не знаю, где он сейчас прячется, но помню, как подслушала: «Вместо бедренной кости поднеси череп». Не знаю, что это значит. Разберись и убей его!\n\n<i>[Лорд Сербуль — это встреча для группы из 6 игроков с боевыми навыками уровня 30-40.]</i>"
"<i>Zhia Lian:</i> Good job. I bet Lord Serbule will be sent back here as soon as Ilth notices he's returned to Chalice, but you bought us some time. And that's all mortality is anyway: borrowed time! So let's move on.": "<i>Жиа Лян:</i> Хорошая работа. Бьюсь об заклад, лорд Сербуль будет возвращён сюда, как только Илс заметит его возвращение в Чалис, но ты выиграл нам немного времени. А что такое смертность, если не взятый взаймы срок? Так что давай двигаться дальше."
"<i>Zhia Lian:</i> Okay this one is a personal favor to me. There's this yeti-infested cave in Kur Mountains where a particularly... problematic... ghoul named Maligno lives. He fancies himself a powerful undead. Show him that he's not!\n\n<i>[The yeti cave is a soloable dungeon recommened for players with level 40+ combat skills.]</i>": "<i>Жиа Лян:</i> Ладно, это личная просьба ко мне. В пещере, кишащей снежными людьми в горах Кур, живёт особенно... проблемный... вурдалак по имени Малиньо. Он считает себя могущественным нежитью. Покажи ему, что это не так!\n\n<i>[Пещера снежных людей — это подземелье для одного игрока, рекомендованное для игроков с боевыми навыками уровня 40 и выше.]</i>"
"<i>Zhia Lian:</i> You showed Maligno who's boss! That traitor! Now let's move on to even more serious threats.": "<i>Жиа Лян:</i> Ты показал Малиньо, кто здесь главный! Этот предатель! А теперь перейдём к ещё более серьёзным угрозам."
"<i>Zhia Lian:</i> Oh, hey, I just remembered something! There's this toady little necromancer named Mort. He's always been a favorite of Harukita. Last year, some heroes managed to trap him in a pocket dimension, then put the dimension in a magic jar and bury it in a cave! But Harukita just caused it to mysteriously reappear. It's just lying in the snow in Kur. Look for a campfire near a stream, close to an orc settlement.\n\nAnd listen: Mort's technically alive, so killing him is murder. BUT! He was dead, and UN-dead, off and on, for like fifty years before he made some kind of pact with Harukita. So don't sweat the murder thing. He's evil.\n\n<i>[Mortimer is an encounter for a group of players with level 50 combat skills.]</i>": "<i>Жиа Лян:</i> О, кстати, я только что вспомнила кое-что! Есть такой подхалимистый некромант по имени Морт. Он всегда был любимцем Харукиты. В прошлом году несколько героев сумели заточить его в карманное измерение, затем поместили это измерение в волшебную банку и закопали в пещере! Но Харукита каким-то образом заставила его таинственно появиться снова. Сейчас он просто лежит в снегу в Куре. Ищи костёр возле ручья, недалеко от орочьего поселения.\n\nИ слушай: технически Морт жив, так что убить его — это убийство. НО! Он был мёртв, а потом нежитью, то так, то эдак, около пятидесяти лет, прежде чем заключил какой-то договор с Харукитой. Так что не парься насчёт убийства. Он злой.\n\n<i>[Мортимер — это встреча для группы игроков с боевыми навыками уровня 50.]</i>"
"<i>Zhia Lian:</i> Mort's dead! Although realistically... he'll probably be alive again within a year. But at least he's not roaming free! You bought the orcs of Kur another year of life! That's worth something!": "<i>Жиа Лян:</i> Морт мёртв! Хотя, если честно... он, вероятно, оживёт в течение года. Но по крайней мере он не разгуливает на свободе! Ты подарил оркам Кур ещё один год жизни! Это что-то значит!"
"<i>Zhia Lian:</i> Mummies are another rare undead, because that quitter Ormorek refuses to make new ones. But there's still plenty left for you to kill, don't worry. Most mortals are terrified of them because they spread horrific diseases. But you aren't afraid, are you? Prove it by catching a mummy disease, then killing the fiends!\n\n<i>[You can find mummies in a cave in Gazluk.]</i>": "<i>Жиа Лян:</i> Мумии — ещё одна редкая нежить, потому что этот неудачник Орморек отказывается создавать новых. Но не волнуйся, их всё ещё много, чтобы ты мог убивать. Большинство смертных боятся их, потому что они распространяют ужасные болезни. Но ты же не боишься, правда? Докажи это, заразившись болезнью мумии, а затем убив этих созданий!\n\n<i>[Мумий можно найти в пещере в Газлуке.]</i>"
"<i>Zhia Lian:</i> Good work! And here's a cure for that disease.": "<i>Жиа Лян:</i> Отличная работа! И вот лекарство от этой болезни."
"<i>Zhia Lian:</i> Great, you're definitely competent! That means you can help with a slightly awkward problem: a few thousand years ago, long before he died, Urtigal taught me how to make undead. And the first monsters I made were silly undead that can haunt plants. They're really tacky. I was just messing around!\n\nAnyway, a bunch have escaped Chalice and they're infesting a pumpkin patch in Serbule Hills. Kill them before they do something that embarrasses me!": "<i>Жиа Лян:</i> Отлично, ты определённо компетентен! Значит, ты можешь помочь с одной немного неловкой проблемой: несколько тысяч лет назад, задолго до своей смерти, Уртигал научил меня создавать нежить. И первые монстры, которых я создала, были глупой нежитью, которая может преследовать растения. Они действительно безвкусные. Я просто баловалась!\n\nВ любом случае, много из них сбежало из Чалиса и заполонило тыквенное поле в Холмах Сербуль. Убей их, пока они не сделали что-то, что меня опозорит!"
"<i>Zhia Lian:</i> I think you killed enough of the little jerks to keep them from invading a town or anything else too drastic. The stragglers will probably eat a few people, but meh.\n\nHey, wanna see something funny? If you grow the seeds from those evil pumpkins, they explode! But fair warning: it hasn't been a very popular party trick for me.": "<i>Жиа Лян:</i> Думаю, ты убил достаточно этих мелких мерзавцев, чтобы они не смогли напасть на город или сделать что-то более серьёзное. Отставшие, наверное, съедят пару человек, но да ладно.\\n\\nЭй, хочешь увидеть что-то забавное? Если вырастить семена этих злых тыкв, они взрываются! Но предупреждаю: это не очень популярный фокус на вечеринках у меня."
"<i>Zhia Lian:</i> Next, you'd better go save Rahu from an uprising of undead. There's a bunch of necromancers deep in the sewers, and they're planning an invasion.": "<i>Жиа Лян:</i> Далее тебе лучше спасти Раху от восстания нежити. В глубинах канализации прячется множество некромантов, и они планируют вторжение."
"<i>Zhia Lian:</i> Good job with the necromancers. There's nothing I hate more than a trite invasion plan. And really, \"armies rising from the sewers\" is more of a Gulagra thing. Undead should be a little classier than that!": "<i>Жиа Лян:</i> Отличная работа с некромантами. Нет ничего хуже для меня, чем банальный план вторжения. И правда, «армии, восстающие из канализации» — это больше по части Гулагры. Нежить должна быть немного изящнее!"
"<i>Zhia Lian:</i> There's a swampy place called Povus where necromancers have just let their minions go free! That's dangerous!\n\nHey, I have a special request for this one, can you kill them with swords? Strap lots of swords all over your body, too. Just stick 'em everywhere. I want you to be a horrific ball of swords and death!": "<i>Жиа Лян:</i> Есть болотистое место под названием Повус, где некроманты только что отпустили своих прислужников на свободу! Это опасно!\n\nЭй, у меня к тебе особая просьба: можешь ли ты убивать их мечами? Прикрепи к своему телу много мечей. Просто воткни их везде. Я хочу, чтобы ты был ужасным шаром из мечей и смерти!"
"<i>Zhia Lian:</i> Excellent work. You helped me fulfill a very silly prophecy I made a while ago! And you killed some evil skeletons, too, so everybody wins.": "<i>Жиа Лян:</i> Отличная работа. Ты помог мне исполнить очень глупое пророчество, которое я сделала некоторое время назад! И ты убил несколько злых скелетов, так что все в выигрыше."
"<i>Zhia Lian:</i> Okay, just asking you to fight \"skeletons\" was obviously silly. I should have specified: skeleton mages! The scary ones with the magic staves. Kill those.": "<i>Жиа Лян:</i> Ладно, просто попросить тебя сражаться с «скелетами» было явно глупо. Мне следовало уточнить: скелетные маги! Те страшные с волшебными посохами. Убей их."
"<i>Zhia Lian:</i> Okay, that's not bad! But... still not really impressive. Hmm... I've got it!": "<i>Жиа Лян:</i> Ладно, неплохо! Но... всё ещё не очень впечатляет. Хмм... Я придумала!"
"<i>Zhia Lian:</i> Excellent work! Now maybe you're ready for some tougher undead.": "<i>Жиа Лян:</i> Отличная работа! Теперь, возможно, ты готов к более сильным нежитям."
"<i>Zhia Lian:</i> That idiot Harukita sent undead through the fae realm portal! He thinks he can gain a foothold there while the fairy courts are fighting. But he sent them to a plane controlled by Agrashab! And we all know what happens when Aggy gets Angry! You need to clear those undead out of there before Agrashab notices and launches a war on our world!\n\nThe skeletons will be hiding until nighttime, then they'll try to blend in among other monsters in the area. But since there's not supposed to be ANY skeletons in the fae realm, they should stand out!": "<i>Жиа Лян:</i> Этот идиот Харукита отправил нежить через портал в фейское царство! Он думает, что сможет закрепиться там, пока фейские дворы сражаются. Но он отправил их в план, контролируемый Аграшабом! И мы все знаем, что происходит, когда Агги злится! Тебе нужно очистить этот план от нежити, прежде чем Аграшаб заметит и начнёт войну с нашим миром!\n\nСкелеты будут прятаться до ночи, а затем попытаются слиться с другими монстрами в этой области. Но поскольку в фейском царстве НЕ ДОЛЖНО быть никаких скелетов, они должны выделяться!"
"<i>Zhia Lian:</i> Well... we're not under attack by a vengeful Fae god... so far. A decent night's work, I'd say!": "<i>Жиа Лян:</i> Ну... нас пока не атакует мстительный бог фей... Пока что. Неплохая работа за ночь, я бы сказала!"
"<i>Zhia Lian:</i> I have a terrible dilemma: there are a bunch of mortals scheming to destroy your realm, and somebody needs to kill them. But I'm not an evil god, so I could never tell you to kill a mortal!\n\nHahaha just kidding. Go kill those mortals!": "<i>Жиа Лян:</i> У меня ужасная дилемма: куча смертных замышляют уничтожить твое царство, и кто-то должен их убить. Но я не злой бог, поэтому никогда не могла сказать тебе убивать смертного!\n\nХа-ха, шучу. Иди убивай этих смертных!"
"<i>Zhia Lian:</i> Grim. I have to say murder's not very whimsical. That's really my main complaint about it. But you did it well!": "<i>Жиа Лян:</i> Мрачно. Должна сказать, убийство — это совсем не забавно. Это моя главная претензия к нему. Но ты справился отлично!"
"<i>Zhia Lian:</i> I heard there's some kind of powerful haunting-skeleton in the Serbule Crypt. You should go kill it. I think it's called 'Ursula'. Oh, and you should bring some friends for this party, because Ursula has backup!\n\n<i>[Ursula is a dangerous boss monster. Recommended for a group of 3+ level 15 players.]</i>": "<i>Жиа Лян:</i> Я слышала, что в крипте Сербуль обитает какой-то могущественный скелет-призрак. Тебе стоит пойти и убить его. Кажется, его зовут «Урсула». Ах да, возьми с собой друзей, потому что у Урсулы есть поддержка!\n\n<i>[Урсула — опасный босс. Рекомендуется группа из 3 и более игроков уровня 15.]</i>"
"<i>Zhia Lian:</i> You killed Ursula too, just like that? Well, I guess you really can kill skeletons, huh? Okay! Let's move on to bigger prey!": "<i>Жиа Лян:</i> Ты тоже убил Урсулу, просто так? Ну, похоже, ты действительно умеешь убивать скелетов, да? Ладно! Переходим к более крупной добыче!"
"<i>Zhia Lian:</i> It looks like Norala is up to something. You know, the goddess of the Hunt? She created werewolves? Anyway, she's mobilizing them to attack someone. You'd better go and make your presence known before she starts a war. Wars are boring.": "<i>Жиа Лян:</i> Похоже, Норала что-то задумала. Знаешь, богиня Охоты? Она создала оборотней? В общем, она мобилизует их для нападения на кого-то. Тебе лучше пойти и заявить о себе, прежде чем она начнёт войну. Войны — это скучно."
"<i>Zhia Lian:</i> Nice job killing werewolves. That's really the only thing that Norala respects these days: killing power.\n\nNow that Norala knows she isn't the only god making a play during this weird equinox thing, she'll be more careful, more manipulative, and way less boring. So good work!": "<i>Жиа Лян:</i> Отличная работа с убийством оборотней. Сейчас это единственное, что Норала уважает: силу убийства.\\n\\nТеперь, когда Норала знает, что она не единственная богиня, которая действует во время этого странного равноденствия, она станет осторожнее, более манипулятивной и гораздо менее скучной. Так что молодец!"
"<i>Zhia Lian:</i> You're going up against Kajich's undead incarnations of fear. You need training. Let's do scary things! Drowning is scary, right? Hmm...\n\nGo kill things while fully submerged in water. That will be nice and scary.": "<i>Жиа Лян:</i> Ты столкнёшься с нежитью страха Каджича. Тебе нужна тренировка. Давай сделаем что-то страшное! Утопление — это страшно, правда? Хмм...\n\nИди убивай врагов, полностью погружённым в воду. Это будет по-настоящему страшно."
"<i>Zhia Lian:</i> That seemed like it'd be scarier. In my head, I mean. Well, let's move on to scarier things!": "<i>Жиа Лян:</i> Казалось, это должно было быть страшнее. По крайней мере, в моей голове. Ладно, перейдём к более страшным вещам!"
"<i>Zhia Lian:</i> The ratkin necromancers underneath Rahu have been breeding high-quality necro rats. Very cute! They can act as your sidekick, helping you focus necromantic energy. Go find one and fight with it!": "<i>Жиа Лиан:</i> Некроманты-крысолюды под Раху разводят высококачественных некро-крыс. Очень милые! Они могут стать вашим напарником, помогая сосредоточить некромантическую энергию. Найдите одного и сражайтесь вместе с ним!"
"<i>Zhia Lian:</i> Hrm. Well, they're cute, but as far as sidekicks go, those rats don't seem very evil. They're just animals! I don't think the other Chalice gods would be excited about them. Let's move on.": "<i>Жиа Лян:</i> Хм. Ну, они милые, но как помощники эти крысы не кажутся очень злыми. Это просто животные! Думаю, другие боги Чалиса не будут ими в восторге. Пойдём дальше."
"<i>Zhia Lian:</i> You should definitely kill some zombies. Let me look... I see some zombies in a cave in Serbule. There's lots of ... walking brain monsters. Weird. Oh! I found a bigger collection of them. They're in a dungeon underneath a tower in Kur. Go go go!": "<i>Жиа Лян:</i> Тебе определённо стоит убить несколько зомби. Дай-ка взгляну... Я вижу зомби в пещере в Сербуле. Там много... ходячих мозговых монстров. Странно. О! Я нашёл их большую группу. Они находятся в подземелье под башней в Куре. Вперёд, вперёд, вперёд!"
"<i>Zhia Lian:</i> Good work. You did a perfectly functional job of killing zombies. <i>Yawn</i> Let's move on to more interesting undead!": "<i>Жиа Лян:</i> Хорошая работа. Ты вполне успешно убил зомби. <i>Зевает</i> Переходим к более интересной нежити!"
"<i>Zhia Lian:</i> Okay this is another personal favor to me. This one's not even on the same mortal plane as you, but I just... I really hate him. He's such a dick!\n\nThere's this skeleton that got himself powered up with fairy magic. He lives in a junction between the fae realm and your realm. He's called the Bonfire Puck. You should kill him!\n\nOh, let me help you find him. It looks like there's an entrance from a little island called \"Sun Vale.\" You'll probably need some backup.\n\n<i>[The Winter Nexus is recommended for a group of 3+ players with level 50 combat skills.]</i>": "<i>Жиа Лян:</i> Ладно, это ещё одна личная просьба ко мне. Этот даже не на одном смертном плане с тобой, но я просто... я его очень ненавижу. Он такой засранец!\n\nЕсть один скелет, который усилился с помощью фейской магии. Он живёт на стыке фейского и твоего миров. Его зовут Костровой Пак. Тебе нужно его убить!\n\nО, позволь помочь тебе найти его. Похоже, вход находится на маленьком острове под названием «Солнечная Долина». Тебе, вероятно, понадобится поддержка.\n\n<i>[Зимний Нексус рекомендуется для группы из 3 и более игроков с боевыми навыками уровня 50.]</i>"
"<i>Zhia Lian:</i> Oh good! That jerk really made me look bad. I did ONE little favor for him by giving him free will. I hoped he'd become a funny skeleton juggler or something. But he immediately ran off and joined the fairies in a scheme to freeze our world in ice! That dick! Ilth Hale never stopped making fun of me about it. Thanks for taking care of the problem.": "<i>Жиа Лян:</i> О, хорошо! Этот придурок действительно выставил меня в плохом свете. Я сделала ЕДИНУЮ маленькую услугу, дав ему свободу воли. Надеялась, что он станет забавным жонглёром-скелетом или чем-то в этом роде. Но он сразу же убежал и присоединился к феям в заговоре, чтобы заморозить наш мир льдом! Этот засранец! Илс Хейл постоянно издевалась надо мной из-за этого. Спасибо, что разобрались с проблемой."
"<i>Zhia Lian:</i> There's another envy pump in Gazluk! This one's underneath Gazluk Keep. There are orcish necromancers tending to it.\n\nRemember to bring some friends. This looks hard.": "<i>Жиа Лян:</i> В Газлуке есть ещё один насос зависти! Этот находится под Газлук-Кипом. За ним присматривают орочьи некроманты.\n\nНе забудь взять с собой друзей. Похоже, это будет сложно."
"<i>Zhia Lian:</i> The next one is... Wait... I think you did it! They're all gone! Tuvillus is going to be SO angry! Wow, you really should have thought about that: you're on his shit-list for sure now! But some mortals would consider that a badge of honor.\n\nBy stopping the envy-pumps, you've saved a lot of lives. Or at least a lot of relationships. Great work!": "<i>Жиа Лян:</i> Следующий... Подожди... Кажется, ты уже сделал это! Их больше нет! Тувиллюс будет ОЧЕНЬ зол! Вау, тебе стоило подумать об этом: теперь ты точно в его чёрном списке! Но некоторые смертные считают это знаком чести.\\n\\nОстановив насосы зависти, ты спас множество жизней. Или, по крайней мере, много отношений. Отличная работа!"
"<i>Zhia Lian:</i> Even Tuvillus is using this opportunity to invade your world. He's the god of Jealousy and Envy, and he's creating massive jealousy-pumps in hidden places. They'll look like giant floating hearts! Gather an army... or at least a posse... and hunt the hearts! I'll lead you to each one!\n\nThe first giant heart is in Eltibule, beneath the little keep there.": "<i>Жиа Лян:</i> Даже Тувиллюс использует эту возможность, чтобы вторгнуться в твой мир. Он бог зависти и ревности, и он создаёт огромные насосы зависти в скрытых местах. Они выглядят как гигантские парящие сердца! Собери армию... или хотя бы группу... и охоться на эти сердца! Я проведу тебя к каждому из них!\n\nПервое гигантское сердце находится в Элтибуле, под маленькой крепостью там."
"One heart down! Lots to go!": "Одно сердце выбито! Ещё много впереди!"
"<i>Zhia Lian:</i> This next one's embarrassing. For Kajich, I mean! He's the god of fear, but half his monsters are funny, not scary! Kajich saw Tuvillus's heart-shaped jealousy pumps, and tried to one-up his brother with lung-shaped fear pumps. Can you go put these stupid things down before word gets out about how silly they look?\n\nBut do be careful: they may not look scary, but you should be scared anyway. You'll need friends.\n\nThe first pair of giant lungs are in Eltibule, deep underground. I see chambers full of magical darkness, and beneath that darkness is a cave.\n\nThe lungs are in that cave. They're hidden behind an illusory rock, but you should be able to hear the breathing when you get close.": "<i>Жиа Лян:</i> Следующее задание немного неловкое. Для Каджича, то есть! Он бог страха, но половина его монстров скорее смешные, чем страшные! Каджич увидел насосы ревности в форме сердца у Тувиллуса и попытался превзойти брата, создав насосы страха в форме лёгких. Можешь ли ты избавиться от этих глупых созданий, прежде чем кто-то узнает, насколько они смешно выглядят?\n\nНо будь осторожен: они могут выглядеть нестрашно, но тебе всё равно стоит бояться. Тебе понадобятся друзья.\n\nПервая пара гигантских лёгких находится в Эльтибуле, глубоко под землёй. Я вижу камеры, полные магической тьмы, а под этой тьмой — пещеру.\n\nЛёгкие находятся в той пещере. Они спрятаны за иллюзорной скалой, но ты должен услышать дыхание, когда подойдёшь близко."
"Thanks. Kajich's a huge ass, and but he tries hard to foster fear. I don't want his reputation ruined by a stupid mistake. Let's go kill the next one!": "Спасибо. Каджич — огромный зануда, но он старается вселять страх. Я не хочу, чтобы его репутация была испорчена из-за глупой ошибки. Пойдём убьём следующего!"
"<i>Zhia Lian:</i> I've located another envy pump. It's in Gazluk, in a cave. There are undead nearby. It's next to a pool of water.\n\nThis one doesn't seem especially dangerous to fight, but it has tremendous regenerative powers. Good luck.": "<i>Жиа Лян:</i> Я обнаружила ещё один насос зависти. Он находится в Газлуке, в пещере. Рядом есть нежить. Он стоит рядом с водоёмом.\n\nЭтот не кажется особенно опасным в бою, но обладает огромными регенеративными способностями. Удачи."
"Yet another heart defeated! Just a few more...": "Ещё одно сердце побеждено! Осталось совсем немного..."
"<i>Zhia Lian:</i> The second giant heart thing is in Kur. I see a ruined tower, and underneath it is a necromancer. He's got minions guarding the heart.": "<i>Жиа Лян:</i> Второе гигантское сердце находится в Кур. Я вижу разрушенную башню, а под ней некромант. У него есть прислужники, охраняющие сердце."
"That's another heart dead! Great work.": "Это ещё одно мёртвое сердце! Отличная работа."
"<i>Zhia Lian:</i> The next pair of giant lungs are in the sewer under Rahu. There's a lot of weird stuff in that sewer! Let's see... you want to go down a bunch of floors. The lungs are near a really big spider.": "<i>Жиа Лян:</i> Следующая пара гигантских лёгких находится в канализации под Раху. В этой канализации полно странных вещей! Давайте посмотрим... вам нужно спуститься на несколько этажей вниз. Лёгкие находятся рядом с очень большим пауком."
"Good job. I was thinking about how to fix Kajich's creation for him. Maybe if these lungs had a giant evil ghost skull floating on top? Hmm.... that's too much like Harukita's style. I can do better. Anyway, there's one more pair of lungs for you to kill!": "Хорошая работа. Я думал, как исправить творение Каджича для него. Может, если бы эти лёгкие имели огромный злой призрачный череп, парящий сверху? Хмм... это слишком похоже на стиль Харукиты. Я могу лучше. В любом случае, у тебя ещё одна пара лёгких, которую нужно уничтожить!"
"<i>Zhia Lian:</i> The next envy pump is in a cave deep beneath Rahu. Use the sewers to reach that cave, and as always, bring friends: this heart is even stronger than the last.": "<i>Жиа Лян:</i> Следующий насос зависти находится в пещере глубоко под Раху. Используйте канализацию, чтобы добраться до этой пещеры, и, как всегда, берите с собой друзей: это сердце даже сильнее предыдущего."
"That's the last heart defeated! Wait... Wait, no, there are more.": "Это последнее сердце побеждено! Подожди... Нет, их ещё больше."
"<i>Zhia Lian:</i> The third pair of giant lungs are under Povus. You want to look for a mountain-sized mushroom, and then find a way to go UNDER it. Go deep underground until you hit tunnels full of goblins. The lungs are down there.": "<i>Жиа Лян:</i> Третья пара гигантских лёгких находится под Повусом. Тебе нужно найти гриб размером с гору, а затем найти способ попасть ПОД него. Спускайся глубоко под землю, пока не наткнёшься на туннели, полные гоблинов. Лёгкие находятся там внизу."
"Third lungs down! Hey, do you think those lungs would be scarier if they were coughing and gagging blood all the time? Oh, less scary? Hmm. Okay, what if the lungs were coated in fire? Fire makes everything scarier! No? Too dumb? Well, I'll think of something eventually.": "Третьи лёгкие уничтожены! Эй, как думаешь, эти лёгкие были бы страшнее, если бы они всё время кашляли и давились кровью? О, меньше страшные? Хм. Ладно, а если лёгкие покрыть огнём? Огонь делает всё страшнее! Нет? Слишком глупо? Ну, я со временем что-нибудь придумаю."
"<i>Zhia Lian:</i> It's the time of year for candy. Lots of candy! And what's the best way to get free candy? Right, you guessed it: beating the crap out of the undead.\n\n<i>[All undead, as well as some other creepy monsters, have a chance to drop candy as loot right now.]</i>": "<i>Жиа Лян:</i> Сейчас время конфет. Много конфет! И какой лучший способ получить бесплатные конфеты? Правильно, ты угадал: избивать нежить.\n\n<i>[Вся нежить, а также некоторые другие жуткие монстры сейчас имеют шанс дропнуть конфеты.]</i>"
"<i>Zhia Lian:</i> Hopefully you aren't overloaded on sugar yet. We're just getting started!": "<i>Жиа Лян:</i> Надеюсь, ты ещё не перенасыщен сахаром. Мы только начинаем!"
"I think we need a backup soup in case the eyeball soup doesn't go over well. Can you get these ingredients?": "Думаю, нам нужен запасной суп на случай, если суп из глазных яблок не понравится. Можешь достать эти ингредиенты?"
"Perfect! Zhia will either hate this or love it, but she won't be bored by it! And that's really the safest way you can party with Zhia Lian. Here's the recipe, in case you want to make some for a different party.": "Отлично! Жиа либо возненавидит это, либо полюбит, но ей точно не будет скучно! И это действительно самый безопасный способ веселиться с Жиа Лян. Вот рецепт, если захочешь приготовить это для другой вечеринки."
"<i>Zhia Lian:</i> I overheard Ilth Hale say she was going to make some ghosts from people who died without being mourned. Help keep the world safe from ghosts by mourning other heroes' tombstones.": "<i>Жиа Лян:</i> Я подслушала, как Илс Хейл говорила, что собирается создать призраков из людей, которые умерли без оплакивания. Помогите сохранить мир в безопасности от призраков, оплакивая могилы других героев."
"<i>Zhia Lian:</i> You're very compassionate! I understand that's a good thing.": "<i>Жиа Лян:</i> Ты очень сострадателен! Я понимаю, что это хорошо."
"<i>Zhia Lian:</i> You've been so helpful that I want to repay you with an amazing party! You just need to help get things prepared. Okay, actually this one might be a bit involved... see, it's a cult party. For my cult. Oh, it's fine, don't worry, it's not a murderous cult. It's a party cult! Or at least it will be.\n\nNow you have to promise not to say ONE WORD about how I'm talking into your head. Got it? As far as most people know, Zhia Lian does not like to talk directly into peoples' minds. It's extra work for me, and I'm sure as hell not gonna bother for people like these cultists. Don't make my life harder!\n\nIf people ask why you're helping me, tell them I met you in person and you owe me a favor. Make up whatever details you want! Maybe we were arm wrestling and you lost. I really don't care.\n\nAnyway: there's a human named Brandon who needs help making the big party happen. He's in a hamlet in the Ilmari desert. Go help him!": "<i>Жиа Лян:</i> Ты так помог мне, что я хочу отблагодарить тебя потрясающей вечеринкой! Тебе просто нужно помочь с подготовкой. Ладно, на самом деле это может быть немного сложно... Видишь ли, это культовая вечеринка. Для моего культа. О, всё нормально, не волнуйся, это не убийственный культ. Это культ вечеринок! Или, по крайней мере, им станет.\n\nТеперь ты должен пообещать не сказать НИ СЛОВА о том, что я говорю тебе в голове. Понял? Насколько большинство людей знает, Жиа Лян не любит говорить напрямую в головы. Это дополнительная работа для меня, и я точно не собираюсь утруждаться ради таких, как эти культовцы. Не усложняй мне жизнь!\n\nЕсли кто-то спросит, почему ты мне помогаешь, скажи, что мы встретились лично, и ты мне должен услугу. Придумывай любые детали! Может, мы боролись на руках, и ты проиграл. Мне всё равно.\n\nВ любом случае: есть человек по имени Брэндон, которому нужна помощь с организацией большой вечеринки. Он в деревушке в пустыне Илмари. Иди помоги ему!"
"<i>Zhia Lian:</i> Great work. The party is moving forward and I made sure you're on the guest list!\n\nOh, hey, since only cult members can get into the party, and you're on the guest list, that means you must be in my cult now! Congratulations!\n\nRemember: you'll need a mask to get into the party, since it's a masquerade. But I'm sure you can find one somewhere.": "<i>Жиа Лян:</i> Отличная работа. Вечеринка продвигается, и я убедилась, что ты в списке гостей!\\n\\nО, кстати, так как на вечеринку могут попасть только члены культа, а ты в списке гостей, значит теперь ты в моём культе! Поздравляю!\\n\\nПомни: для входа на вечеринку нужна маска, ведь это маскарад. Но я уверена, что ты найдёшь её где-нибудь."
"Let's round out the party's food offerings with something a little less disgusting! I got this recipe from my mother. Can you get the stuff?": "Давайте разнообразим еду на вечеринке чем-то менее отвратительным! Этот рецепт я взял у своей матери. Ты можешь достать ингредиенты?"
"Excellent work! Here's the recipe. Did we get everything? Hmm, yep, looks like it!\n\nThat's all the food preparation we need. Everything else can be handled by the bug-men. Thanks for all your help!": "Отличная работа! Вот рецепт. Мы всё собрали? Хм, да, похоже на то!\\n\\nЭто вся подготовка еды, которая нам нужна. Всё остальное могут сделать жучьи люди. Спасибо за твою помощь!"
"<i>Zhia Lian:</i> You know what else makes a great warm meal during the autumn months? It's not pumpkin salad! But it makes a refreshing cold meal, so there's that. I'll share the recipe with you if you make one for me.": "<i>Жиа Лян:</i> Знаешь, что ещё отлично согревает в осенние месяцы? Это не тыквенный салат! Но он отлично освежает в холодном виде, так что есть и в этом своя польза. Я поделюсь рецептом, если ты приготовишь его для меня."
"<i>Zhia Lian:</i> Hey, not bad! No, no, you keep it. I filled up on candy.": "<i>Жиа Лян:</i> Эй, неплохо! Нет-нет, оставь себе. Я наелась конфет."
"<i>Zhia Lian:</i> Pumpkin smoothies are delicious! I decree it, so if you don't like them you'd better get with the program. Collect all the ingredients and I'll give you the recipe! (If you don't already have it.)\n\n<i>[Note: it requires Cooking 30 to make a pumpkin smoothie! But even if you don't have enough cooking skill yet, you can still complete this quest to learn the recipe for future use.]</i>": "<i>Жиа Лян:</i> Тыквенные смузи — вкуснятина! Я так решила, так что если они тебе не нравятся, лучше привыкни. Собери все ингредиенты, и я дам тебе рецепт! (Если у тебя его ещё нет.)\n\n<i>[Примечание: для приготовления тыквенного смузи требуется Навык Кулинарии 30! Но даже если у тебя пока недостаточно кулинарных навыков, ты всё равно можешь выполнить этот квест, чтобы выучить рецепт для будущего использования.]</i>"
"<i>Zhia Lian:</i> Finally! It's smoothie time!": "<i>Жиа Лян:</i> Наконец-то! Время смузи!"
"<i>Zhia Lian:</i> You know what makes a great warm meal during the autumn months? Pumpkin soup! ... But I'm not sure I believe that. Here's the recipe, if you don't already know it. Now make me some soup!": "<i>Жиа Лян:</i> Знаешь, что отлично согревает в осенние месяцы? Тыквенный суп! ... Но я не совсем уверен, что в это верю. Вот рецепт, если ты его ещё не знаешь. Теперь приготовь мне суп!"
"<i>Zhia Lian:</i> You did it! And it smells just as weird as I figured it would. Well, there's a nice hearty meal for you! I hope you like it better than I do.": "<i>Жиа Лян:</i> Ты справился! И запах такой же странный, как я и думала. Ну что ж, вот тебе сытное блюдо! Надеюсь, тебе оно понравится больше, чем мне."
"<i>Zhia Lian:</i> You've proven you're a skilled gardener AND a skilled cook. Now take on a tougher challenge: Pumpkin Spice Tea. You'll need to find the recipe from an undead!": "<i>Жиа Лиан:</i> Ты доказал, что умеешь хорошо ухаживать за садом И прекрасно готовить. Теперь возьми более сложное задание: Чай с тыквенными специями. Тебе нужно найти рецепт у нежити!"
"<i>Zhia Lian:</i> Mm, savor that aroma! Good work.": "<i>Жиа Лян:</i> Ммм, насладись этим ароматом! Отличная работа."
"<i>Zhia Lian:</i> Since you're a spider now, you should care about the fate of your kin, right? I noticed a lot of ghostly spiders pouring out of a collapsed cave in the Ilmari  desert. You should help them find peace. Through violence.": "<i>Жиа Лян:</i> Поскольку ты теперь паук, тебе должно быть не безразлична судьба твоих сородичей, верно? Я заметил множество призрачных пауков, вылезающих из обрушенной пещеры в пустыне Илмари. Ты должен помочь им обрести покой. Через насилие."
"<i>Zhia Lian:</i> Apparently those poor sad spiders were used in horrible experiments during some war. Mortals are pretty awful sometimes!\n\nBut you shouldn't make a habit of doing good deeds as a spider. If you keep behaving as a paragon of spiderdom, Akhisa will notice you. And you're MY follower!\n\nYou can switch back when you've had enough of all those hairy legs.": "<i>Жиа Лян:</i> Похоже, этих бедных несчастных пауков использовали в ужасных экспериментах во время какой-то войны. Смертные иногда бывают довольно ужасными!\\n\\nНо тебе не стоит привыкать делать добрые дела в облике паука. Если ты будешь вести себя как образец паучьего мира, Ахиса заметит тебя. А ты — МОЙ последователь!\\n\\nТы можешь вернуться обратно, когда устанешь от всех этих волосатых ног."
"<i>Zhia Lian:</i> You know my favorite instrument? It's those high-pitched tambourines that ratkin use. Let's collect some. I have an idea!": "<i>Жиа Лиан:</i> Знаешь, какой мой любимый музыкальный инструмент? Это те высокотональные бубны, которые используют крысоловы. Давай соберём немного. У меня есть идея!"
"<i>Zhia Lian:</i> No, nevermind, these sound terrible.\n\nWhat are we doing, messing around like this? There's important work to do!": "<i>Жиа Лян:</i> Нет, неважно, это звучит ужасно.\\n\\nЧто мы делаем, возимся вот так? Есть важная работа!"
"<i>Zhia Lian:</i> You should convince people to give you more candy! Or take it! MORE! The harvest is in, and it's time for greed! Show me 20 candies!": "<i>Жиа Лян:</i> Тебе нужно убедить людей дать тебе больше конфет! Или взять их! БОЛЬШЕ! Урожай собран, и время для жадности! Покажи мне 20 конфет!"
"<i>Zhia Lian:</i> You know, you're gonna get sick if you eat all of that candy. But candy is great, so what are you gonna do, right? Here: it's a recipe for a new healthier candy I just invented!": "<i>Жиа Лян:</i> Знаешь, ты заболеешь, если съешь все эти конфеты. Но конфеты же классные, так что что ты собираешься делать, правда? Вот: это рецепт новых более полезных конфет, которые я только что придумала!"
"<i>Zhia Lian:</i> You know what we don't see enough of? Dancing skeletons! If you're ever a skeleton, would you dance for me?": "<i>Жиа Лян:</i> Знаешь, чего нам не хватает? Танцующих скелетов! Если ты когда-нибудь станешь скелетом, ты станцуешь для меня?"
"<i>Zhia Lian:</i> Hah, your arms are so WRONG when you do that!\n\nI loved your stupid little dance. Thank-you for performing it for me.": "<i>Жиа Лян:</i> Ха, у тебя совсем неправильно двигаются руки, когда ты это делаешь!\\n\\nМне очень понравился твой глупенький танец. Спасибо, что станцевал его для меня."
"Since Zhia Lian is the goddess of Whimsy, we need a lot of very eccentric snacks. And unfortunately most of my best stuff was either stolen by cat men, or was lost in the desert as we fled for our lives. From cat men.\n\nThe casino will provide some boring snacks, but we definitely need some more exotic stuff! Let's start with a recipe from the Crone Hegemony. I found it in an old book! Can you get the ingredients?": "Поскольку Жиа Лян — богиня причудливости, нам нужно много очень эксцентричных закусок. И, к сожалению, большинство моих лучших запасов либо украли кошачьи люди, либо они были потеряны в пустыне, когда мы бежали, спасая жизнь. От кошачьих людей.\n\nКазино обеспечит несколько скучных закусок, но нам определённо нужно что-то более экзотическое! Давай начнём с рецепта из Гегемонии Старух. Я нашёл его в старой книге! Ты можешь достать ингредиенты?"
"Thanks. Ugh, those are horrid! Let's hope they cook up nicely! Oh, here's the recipe, if you're curious.": "Спасибо. Фу, они ужасные! Будем надеяться, что при приготовлении станут лучше! О, вот рецепт, если интересно."
"<i>Zhia Lian:</i> Hey, get this - there's supposedly a way to make pumpkin soup smell even weirder! Can you imagine? If you make a bowl, I want to see how it smells! I don't have the recipe, though; you'll have to find that first!": "<i>Жиа Лян:</i> Слушай, говорят, есть способ сделать тыквенный суп ещё более странно пахнущим! Представляешь? Если сваришь миску, я хочу понюхать! Но у меня нет рецепта, тебе сначала нужно его найти!"
"<i>Zhia Lian:</i> Whoa. That does smell weird and interesting, but... you realize it's poisonous, right? I'll pass. But thanks.": "<i>Жиа Лян:</i> Вау. Запах действительно странный и интересный, но... ты понимаешь, что это ядовито, да? Я пас. Но спасибо."
"<i>Zhia Lian:</i> Did I say 'less horrible'? I misspoke. Spiders can spit their digestive fluids as an attack! Now THAT is horrible! So go do it!\n\nDo it to goblins. They're probably the funniest when they melt!": "<i>Жиа Лян:</i> Я сказала «менее ужасно»? Я ошиблась. Пауки могут плевать своими пищеварительными жидкостями в качестве атаки! Вот это действительно ужасно! Так что делай это!\n\nСделай это с гоблинами. Они, наверное, самые забавные, когда тают!"
"<i>Zhia Lian:</i> That wasn't funny at all! It was just gross. What a disappointment. Let's do something less cruel and disgusting next!": "<i>Жиа Лян:</i> Это совсем не было смешно! Просто отвратительно. Какая же это была разочарование. Давай сделаем что-нибудь менее жестокое и отвратительное в следующий раз!"
"<i>Zhia Lian:</i> Did you know that if you're willful enough, you can speak for a moment after you die? That's what I've heard anyway. You seem pretty willful; let's test that idea!\n\nGo find a stage, kill yourself, and right after you die, speak aloud. The crowd will love it!\n\nAnd oh yeah, I'll bring you back to life. Of course! Make sure you die on stage.": "<i>Жиа Лян:</i> Знаешь ли ты, что если быть достаточно упрямым, можно ненадолго говорить после смерти? По крайней мере, я так слышала. Ты кажешься очень упрямым; давай проверим эту идею!\n\nНайди сцену, убейся и сразу после смерти скажи что-нибудь вслух. Толпа будет в восторге!\n\nАх да, я тебя верну к жизни. Конечно! Главное — умри на сцене."
"<i>Zhia Lian:</i> Neat! But... speaking with the dead doesn't seem as fun anymore, now that I've seen you do it. I guess it was worth seeing, though.\n\nIf you ever want to do that again, go ahead: I enchanted that stage to always resurrect corpses that say 'I am slain'. It was easier than resurrecting one specific mortal. Easier for me, I mean: whimsical things are easier than boring things!": "<i>Жиа Лян:</i> Круто! Но... говорить с мёртвыми уже не кажется таким забавным, теперь, когда я видела, как ты это делаешь. Хотя, наверное, это стоило увидеть.\\n\\nЕсли захочешь сделать это снова, пожалуйста: я зачаровала эту сцену так, чтобы она всегда воскрешала трупы, которые говорят «Я убит». Это было проще, чем воскрешать одного конкретного смертного. Проще для меня, конечно: капризные вещи проще, чем скучные!"
"<i>Zhia Lian:</i> You should get some practice terrifying mortals. It will help you understand how to survive a meeting with Kajich, the god of Fear.\n\n<i>[Any Fear ability will advance this quest, if used on a sentient opponent.]</i>": "<i>Жиа Лян:</i> Тебе стоит попрактиковаться в запугивании смертных. Это поможет тебе понять, как выжить при встрече с Каджичем, богом Страха.\n\n<i>[Любое умение Страха продвинет этот квест, если использовать его на разумном противнике.]</i>"
"<i>Zhia Lian:</i> I'm sure that gave you some insights into fear! But if you ever have to face Kajich, don't be complacent: Kajich is literally the scariest thing you can imagine. Okay time for some more training! This is going well!": "<i>Жиа Лян:</i> Я уверена, это дало тебе представление о страхе! Но если когда-нибудь придётся столкнуться с Каджичем, не расслабляйся: Каджич — это буквально самое страшное, что ты можешь себе представить. Ладно, время для ещё тренировок! Всё идёт отлично!"
"<i>Zhia Lian:</i> One of the most amusing things a necromancer can do is talk to corpses. Go try it! I think there's someone in nearby Eltibule that can teach you. Look for a goblin that doesn't attack on sight -- that'll be him.": "<i>Жиа Лян:</i> Одна из самых забавных вещей, которую может сделать некромант — поговорить с трупами. Попробуй! Думаю, в соседнем Элтибуле есть кто-то, кто может тебя этому научить. Ищи гоблина, который не нападает при встрече — это и будет он."
"<i>Zhia Lian:</i> On second thought, corpses are boring conversationalists. They never have anything new to say; they just talk about their lives and how they died and blah blah blah. Let's move on.": "<i>Жиа Лян:</i> С другой стороны, трупы — скучные собеседники. У них никогда нет ничего нового, они только говорят о своей жизни и о том, как умерли, и бла-бла-бла. Пойдём дальше."
"This is all the ingredients? I... don't know what to say!\n\nI guess I'll take these to Silvia. What do you think the odds are that this will work? Well, it doesn't matter, because I've got to try! I thought I was coming to terms with being an ass, but I really want to be a person again!\n\nBut if it works, I'll have to say goodbye to my friends at Animal Town. Jumper is going to be devastated...": "Это все ингредиенты? Я... не знаю, что сказать!\\n\\nПожалуй, я отнесу это Сильвии. Как думаешь, насколько вероятно, что это сработает? Впрочем, это не важно, потому что я должен попробовать! Я думал, что смирился с тем, что я осёл, но я действительно хочу снова стать человеком!\\n\\nНо если это сработает, мне придётся попрощаться с друзьями из Звериного города. Джампер будет в отчаянии..."
"Thank you! Oh, thank the gods. I've been rubbing myself raw! Sorry, bad imagery. The other elves keep telling me to watch my unsexy phrasing. But anyway, thank you.": "Спасибо! О, благодарю богов. Я уже себя до крови натирал! Извини, плохая картинка. Другие эльфы постоянно говорят мне следить за неудачными выражениями. Но в любом случае, спасибо."
"I can't believe you did it! You beat the game! I guess I'm not cursed after all. That means... hey, that means I was just unlucky! Which means my luck should turn around any time now! Thanks! It's time to gamble!": "Не могу поверить, что ты это сделал! Ты прошёл игру! Похоже, я не проклят. Значит... эй, значит мне просто не везло! А это значит, что удача скоро повернётся ко мне лицом! Спасибо! Пора играть!"
"That's everything I need! When the coast is clear, I'll get my friend to perform the ritual. Then I'll sneak Rick out via ... well, I've said too much already. Not that I don't trust you, but sometimes the walls have ears... it's best if you just let me handle this. I'll get him home!": "Это всё, что мне нужно! Когда опасность минует, я попрошу друга провести ритуал. Потом я тайно вывезу Рика через... ну, я уже сказал слишком много. Не то чтобы я тебе не доверяю, но иногда стены имеют уши... лучше пусть этим занимаюсь я. Я доставлю его домой!"
"<i>Zhia Lian:</i> You have a lot of undead-bashing to do, and you should do it with a little more style. Make some nice orange dye. It's the scariest!": "<i>Жиа Лян:</i> Тебе предстоит много бить нежить, и делать это стоит с большим стилем. Сделай красивую оранжевую краску. Это самый страшный цвет!"
"<i>Zhia Lian:</i> Hm. It's not as scary as I hoped. Try this! I know it doesn't seem scary, but this color just fits you better.": "<i>Жиа Лян:</i> Хм. Это не так страшно, как я надеялась. Попробуй это! Знаю, что это не кажется страшным, но этот цвет тебе больше подходит."
"<i>Zhia Lian:</i> So did Brandon tell you about his friends that made stupid decisions with their lives and then suffered ENTIRELY REASONABLE consequences? Good! Because I stupidly promised I'd fix them for the big party. The thing is, I don't want to perform miracles at my cultists' party. It sends the wrong message, you know? This is a party, not a wishing club!\n\nSo I was thinking, maybe you could get them all fixed up BEFORE the party. Don't worry, this is going to work out great for you. I'll do the heavy lifting and you'll get all the glory!\n\nThis all needs to seem like your idea, so go talk to Brandon at the party site and ask him about the cultists. Then go talk to them and help 'em out.": "<i>Жиа Лян:</i> Брэндон рассказывал тебе про своих друзей, которые приняли глупые решения в жизни и потом получили вполне заслуженные последствия? Отлично! Потому что я глупо пообещала исправить их к большой вечеринке. Дело в том, что я не хочу творить чудеса на вечеринке своих культовцев. Это посылает неправильный сигнал, понимаешь? Это вечеринка, а не клуб желаний!\n\nТак что я подумала, может, ты сможешь помочь им исправиться ДО вечеринки. Не волнуйся, для тебя это обернётся здорово. Я сделаю всю тяжёлую работу, а вся слава будет на тебе!\n\nВсё это должно выглядеть как твоя идея, так что поговори с Брэндоном на месте вечеринки и спроси его про культовцев. Потом поговори с ними и помоги им."
"<i>Zhia Lian:</i> Cultists all happy now? Great. It took a long time to plant those cures where they'd find them! The donkey potion was especially hard: I had to subtly alter the laws of nature to make it work, which means I'll probably be hearing from Dreva soon. But the important thing is my cultists think they were cured by a string of lucky breaks, not godly miracles. And you did a bit of work too. We make a great team!\n\nI have to admit that I was in a really bad mood the day I granted those wishes. Ormorek had just been telling me about his stupid dream-soldiers and how I never do anything to help mortals, and blah blah blah. Don't tell me what to do! Not that you do. That's why I like you. Also you're incredibly powerful for a mortal. Anyway, here: this is for you, loyal cultist!": "<i>Жиа Лян:</i> Культовцы теперь все довольны? Отлично. Мне потребовалось много времени, чтобы подбросить им эти исцеления, чтобы они их нашли! Особо сложно было с эликсиром осла: мне пришлось тонко изменить законы природы, чтобы он сработал, а значит, скоро, наверное, услышу от Древы. Но главное, что мои культовцы думают, будто их исцелила череда счастливых случайностей, а не божественные чудеса. И ты тоже немного поработал. Мы отличная команда!\\n\\nДолжна признаться, в день, когда я исполняла эти желания, у меня было очень плохое настроение. Орморек только что рассказывал мне про своих глупых солдат-снов и как я никогда не помогаю смертным, и бла-бла-бла. Не говори мне, что делать! Хотя ты и не говоришь. Вот почему ты мне нравишься. К тому же ты невероятно силён для смертного. В общем, вот, это для тебя, верный культовец!"
"<i>Zhia Lian:</i>  Ok, so I have this spontaneous urge to collect some Evil Pumpkins! I'm going to get you guys to help me out. Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!\n<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Жиа Лян:</i> Ладно, у меня внезапное желание собрать несколько Злых Тыкв! Я собираюсь попросить вас помочь мне. Сделайте то, что я прошу, и я дам вам небольшое вознаграждение. Провалите мою просьбу — будет нехорошо! Я не очень умею принимать отказ. Соберите то, что мне нужно, и отнесите моему агенту в Сербуле. Я даже отметила его на карте для вас, это несложно! Удачи!\n\n<b>ВАЖНО!</b>: Вы должны оставаться онлайн как минимум до достижения серверной цели, чтобы получить полный зачёт. В противном случае убедитесь, что вы зайдёте в игру снова <b>до</b> окончания испытания, если вам придётся уйти раньше. Проверьте таймер у Агента."
"You guys did it! That's awesome! Here's your reward. I'm gonna go play with my pumpkins now!": "Вы справились! Это здорово! Вот ваша награда. А я пойду поиграю со своими тыквами!"
"<i>Zhia Lian:</i>  Mmmm, fire dust! Everyone likes a little bit of the warm dusty stuff, but what I like more is me with more of everyone's warm dusty stuff! Hey, share! Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!\n<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Жиа Лян:</i> Ммм, огненная пыль! Всем нравится немного этого тёплого пыльного вещества, но мне больше нравится, когда у меня есть больше тёплой пыльцы от всех! Эй, делись! Сделай то, что я прошу, и я дам тебе небольшой подарок. Провалишь мою просьбу — будет нехорошо! Я не очень хорошо воспринимаю отказ. Достань то, что мне нужно, и отнеси моему агенту в Сербуле. Я даже отметил его на карте для тебя, это несложно! Удачи!  \n<b>ВАЖНО!</b>: Ты должен оставаться онлайн, пока не будет достигнута цель сервера, чтобы получить полный зачёт. В противном случае обязательно зайди снова <b>до</b> окончания испытания, если тебе нужно уйти раньше. Проверь таймер у Агента."
"You guys did it! That's awesome! Here's your reward. Off to go get warm and dusty!": "Вы справились! Это здорово! Вот ваша награда. Пора идти греться и покрываться пылью!"
"<i>Zhia Lian:</i>  Yes, I want oregano! Why are you so concerned about what I do with it? I do stuff with it! What do you do with it? I'll tell ya, you give it to me! Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!\n<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Жиа Лян:</i> Да, я хочу орегано! Почему тебя так волнует, что я с ним делаю? Я с ним что-то делаю! А ты что с ним делаешь? Скажу тебе — отдашь его мне! Сделай то, что тебя просят, и я дам тебе небольшое вознаграждение. Не выполни мою просьбу — будет нехорошо! Достань то, что мне нужно, и отнеси моему агенту в Сербуле. Я даже отметил его на карте для тебя, это несложно! Удачи!\n\n<b>ВАЖНО!</b> Ты должен оставаться онлайн хотя бы до достижения цели сервера, чтобы получить полный зачёт. В противном случае убедись, что зайдёшь в игру снова <b>до</b> окончания испытания, если тебе придётся уйти раньше. Проверь таймер у Агента."
"You guys did it! That's awesome! Here's your reward. I'm gonna go, do my stuff with this now!": "Вы справились! Это здорово! Вот ваша награда. А я пойду займусь своими делами с этим!"
"<i>Zhia Lian:</i>  A little dirt never hurt anyone. It certainly will not hurt for you to give me some of your dirt. Do what your asked of, and I shall give you a small reward. Fail my request and it won't be pretty! I'm not very good at taking no for an answer. Get what I need and take it to my agent in Serbule. I even marked him on the map for you, it's not hard! Good luck!\n<b>IMPORTANT!</b>: You must at least stay online until the server goal is reached to get full credit. Ortherwise, make sure you login again <b>before</b> the challenge ends if you have to bail early. Check Agent for timer.": "<i>Жиа Лян:</i> Немного грязи никому не повредило. Тебе тоже не повредит дать мне немного своей грязи. Сделай то, что я прошу, и я дам тебе маленькую награду. Провалишь мою просьбу — будет нехорошо! Я не очень умею принимать отказ. Достань то, что мне нужно, и отнеси моему агенту в Сербуле. Я даже отметил его на карте для тебя, это не сложно! Удачи!\n\n<b>ВАЖНО!</b>: Ты должен оставаться онлайн как минимум до достижения цели сервера, чтобы получить полный зачёт. В противном случае, обязательно зайди снова <b>до</b> окончания испытания, если тебе нужно уйти раньше. Проверь таймер у Агента."
"You guys did it! That's awesome! Here's your reward. Now to see if I can find something strange to do with it!": "Вы справились! Это здорово! Вот ваша награда. Теперь посмотрим, смогу ли я найти что-нибудь странное, чтобы с этим сделать!"

