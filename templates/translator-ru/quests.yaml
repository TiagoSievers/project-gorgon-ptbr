"Umarak in Povus said, \"I want to make my mate's favorite cheese for her, but it requires extremely pungent rennet. And, of course, I have nothing to make that with!\"": "Умарак в Повусе сказал: «Я хочу приготовить любимый сыр моей спутнице, но для этого нужен чрезвычайно резкий сычужный фермент. И, конечно, у меня нет ничего, чтобы его сделать!»"
"Bogaku in the Rahu Sewers said, \"I had a thought: how relaxed are these ratkin? Sneak into their home areas and kick them! Now, I only need to know about the off-duty ones: do they fight, or flee, or something else? Of course, you can kick whoever you want! But for this test, it has to be the off-duty ones.\"": "Богака в канализации Раху сказал: «У меня возникла мысль: насколько расслаблены эти крысолюди? Проникни в их жилища и пни их! Теперь мне нужно узнать про тех, кто не на службе: они сражаются, убегают или делают что-то ещё? Конечно, ты можешь пнуть любого! Но для этого теста это должны быть именно отдыхающие.»"
"Sir Hughes in Statehelm said, \"Well, I'm convinced you know how to handle yourself! Why don't you do some clean up work for us out in the field? I can pay you from one of the military funds. Win-win, and you'll still be getting better with your skills. Win-win-win!\n\nOf course, I can't compensate you if you die. Be careful out there!\"": "Сэр Хьюз в Стейтхелме сказал: «Ну, я убеждён, что ты умеешь постоять за себя! Почему бы тебе не заняться уборкой на поле боя? Я могу заплатить тебе из одного из военных фондов. Взаимовыгодно, и ты при этом будешь совершенствовать свои навыки. Выигрыш-выигрыш-выигрыш!\n\nКонечно, я не смогу тебя компенсировать, если ты умрёшь. Будь осторожен там!"
