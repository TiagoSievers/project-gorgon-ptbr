"Deliver 10 Rage Inhibitor Extreme Potions to Viedesi in Sun Vale. Reward: 6,678 councils.": "Доставьте 10 экстремальных зелий подавления ярости Виедеси в Солнечную Долину. Награда: 6,678 советов."
"Deliver 10 Rage Inhibitor Potions to Viedesi in Sun Vale. Reward: 3,158 councils.": "Доставьте 10 зелий подавления ярости Виедеси в Солнечную Долину. Награда: 3,158 советов."
"Deliver 10 Rage Ointments to Fitz the Boatman on the Serbule docks. Reward: 854 councils.": "Доставьте 10 мазей ярости Фитцу Лодочнику на доках Сербуля. Награда: 854 совета."
"Deliver 10 Rainbow Trout Fillets to Viedesi in Sun Vale. Reward: 4,628 councils.": "Доставьте 10 филе радужной форели Виедеси в Солнечную Долину. Награда: 4,628 советов."
"Deliver 99 Rainbow Trout Fillets to Sheyna in Rahu. Reward: 87,536 councils.": "Доставьте 99 филе радужной форели Шейне в Раху. Награда: 87 536 советов."
"Rappanel in Serbule Hills said, \"Durstin behind the bar is good for a scrambled egg or a bit of fried bread, but he's just not willing to broaden his horizons! And yet right down the road is a rare delicacy: ranalan-style pickled fish! Get some for me. I'll convince him to try them some evening, and he'll finally see what he's been missing.\n\nLook for the ranalans around the big lake. They like to leave pickling jars outside their huts. And don't worry -- they're not actually intelligent, they just seem that way. I read all about them in bard college back home in Verta!\"": "Раппанель в Сербульских Холмах сказал: «Дёрстин за барной стойкой хорош для яичницы-болтуньи или немного жареного хлеба, но он просто не хочет расширять свои горизонты! А ведь совсем рядом есть редкое лакомство: рыба, маринованная в стиле раналан! Принеси мне немного. Я уговорю его попробовать её как-нибудь вечером, и он наконец поймёт, чего ему не хватало.\n\nИщи раналанов вокруг большого озера. Они любят оставлять банки с маринадом возле своих хижин. И не волнуйся — они на самом деле не умные, просто так кажутся. Я всё об этом прочитал в бардовском колледже дома, в Вертe!"
"Chirrra in the Serbule Hills Ranalon Den said, \"Hmm, fetch me some of the boletus mushrooms. Oh, and can you chop them for me? I'm more of a mage than a laborer, you understand... then bring me the boletus flakes.\"": "Чиррра в холмах Сербуля, в логове Раналона, сказала: «Хмм, принеси мне немного грибов болетус. О, и можешь их порезать для меня? Я больше маг, чем работник, понимаешь... а потом принеси мне хлопья из болетуса.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Steal lungfish from the pools throughout the den. I have a scheme in mind for them!\"": "Чиррра в холмах Сербуль Логово Раналон сказал: «Украдите легочных рыб из прудов по всему логову. У меня есть для них задумка!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"There's food plants everywhere in here -- look for some watercress, and bring it to me. I need a lot of it; I have an idea.\"": "Чиррра в холмах Сербуль Раналон Ден сказал: «Здесь повсюду растут съедобные растения — найдите немного водяного крессa и принесите мне. Мне его нужно много; у меня есть идея.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"The least-competent farmers are sent topside to farm the lakes up there, but farmers who can cast a few spells are kept down here in safety. They're a crucial part of the den's food supply. Which means they're precious... which means you should kill them! Go!\"": "Чиррра в холмах Сербуля, в Логове Раналон, сказала: «Самых неумелых фермеров отправляют наверх, чтобы они обрабатывали озёра, а фермеров, умеющих колдовать, держат здесь, в безопасности. Они — важная часть продовольственного запаса логова. Значит, они ценны... значит, их нужно убить! Вперёд!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Deep in the farming area are a bunch of Guardians. You know, the thuggish-looking ones? Glowball on their head? Yeah. The ones in this den are pretty dumb, but they're mean in a fight. If you kill them, it'll demoralize everyone. And that's good.\"": "Чиррра в Сербульских Холмах, в Логове Раналон, сказал: «Глубоко в сельскохозяйственной зоне есть куча Стражей. Знаешь, те, что выглядят как бандиты? С светящимся шаром на голове? Да. Те, что в этом логове, довольно глупы, но в бою они злобные. Если ты их убьёшь, это деморализует всех. И это хорошо.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Head into the legling training area and find the area where gardeners practice their craft -- it's one of the first areas you'll come across in there. Kill everyone there.\"": "Чиррра в холмах Сербуль Логово Раналон сказал: «Отправляйтесь в тренировочную зону леглингов и найдите место, где садовники оттачивают своё мастерство — это одна из первых зон, с которой вы столкнётесь там. Убейте всех там.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Deep in the legling training area is the mage training section. Right now they're mostly doing stone-shaping, so look for the poorly-worked stones. You definitely want to take these mages out before they fully master their abilities!\"": "Чиррра в холмах Сербуль Логово Раналон сказал: «Глубоко в тренировочной зоне леглингов находится секция обучения магов. Сейчас они в основном занимаются камнетесным делом, так что ищите плохо обработанные камни. Вам определённо нужно уничтожить этих магов, прежде чем они полностью овладеют своими способностями!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. They're born knowing how to fight, but they need to build up their muscle mass and train their coordination. So now is the time to strike, while they're weak!\"": "Чиррра в холмах Сербуль Логово Раналон сказал: «Отправляйтесь в тренировочную зону леглингов. Пройдите мимо участка для практики садоводства. Когда тропа разветвится, идите налево, чтобы найти дубинщиков. Они рождаются с умением сражаться, но им нужно нарастить мышечную массу и тренировать координацию. Так что сейчас самое время нанести удар, пока они слабы!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Some of the most talented stone-shapers in the whole den are back working with the leglings today. Strike now! The mage supervisors are deep in the legling wing. Go past the legling gardeners, then keep right at the fork.\"": "Чиррра в холмах Сербуль Логово Раналон сказала: «Некоторые из самых талантливых камнетесов всего логова сегодня снова работают с леглингами. Действуйте сейчас! Маги-наставники находятся глубоко в крыле леглингов. Пройдите мимо садовников леглингов, затем держитесь правее на развилке.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"You need to focus on the adults that oversee the leglings! Strike them down to weaken the den. Head into the legling training area. Go past the gardening practice area. When the path forks, go left to find the clubbers. A few adults are there. Strike them down!\"": "Чиррра в Сербульских холмах Логова Раналон сказала: «Вам нужно сосредоточиться на взрослых, которые контролируют леглингов! Убейте их, чтобы ослабить логово. Отправляйтесь в тренировочную зону леглингов. Пройдите мимо участка для практики садоводства. Когда тропинка разветвится, поверните налево, чтобы найти дубинщиков. Там несколько взрослых. Убейте их!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Why don't you assassinate the ranalon that are off duty? They'll be in the lounge and resting areas. And they definitely won't be expecting you!\"": "Чиррра в логове Раналона на холмах Сербуль сказала: «Почему бы тебе не устранить Раналонов, которые не на дежурстве? Они будут в гостиной и зонах отдыха. И они точно не будут тебя ожидать!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Take out the scray resting in pools around the den. Those scray are precious to our front-line assault against the goblins! You can find them in any pool in the den... oh, except the pools in the legling area, I suppose.\"": "Чиррра из Сербульских холмов в Логове Раналон сказал: «Уничтожьте скрея, отдыхающего в лужах вокруг логова. Эти скреи очень важны для нашего передового наступления против гоблинов! Вы можете найти их в любой луже в логове... ну, кроме луж в районе ноглингов, полагаю.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Look around for some bottles of Errrgorabog. The moistening cream? Almost everyone down here uses it, so I'm sure you can find some easily enough. I need a bunch of it.\"": "Чиррра в холмах Сербуля Раналонской берлоги сказал: «Поищи несколько бутылочек Эрргоробога. Увлажняющий крем? Почти все здесь его используют, так что ты наверняка легко найдёшь немного. Мне нужно много этого.»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Have you seen the emergency moisturizing shells? They're super ugly, right? That's all Gulllia's fault, she thinks they look... anyway, it doesn't matter! When a ranalon gets super dried out, they use the healing water in those shells to stay moist. And you are going to poison that water. Here's the poison. Go!\"": "Чиррра в холмах Сербульского Раналона сказала: «Ты видел эти экстренные увлажняющие раковины? Они ужасно уродливые, правда? Во всём виновата Гуллия, она считает, что они выглядят... в общем, неважно! Когда раналон сильно высыхает, он использует целительную воду из этих раковин, чтобы оставаться влажным. А тебе нужно отравить эту воду. Вот яд. Вперёд!»"
"Chirrra in the Serbule Hills Ranalon Den said, \"Another mission already? Um... just go kill some ranalons! Whichever. Bring me some of their tacky jewelry to prove you've done your job.\"": "Чиррра в холмах Сербуля, в Логове Раналона, сказала: «Уже новое задание? Эм... просто убей несколько раналонов! Любых. Принеси мне их безвкусные украшения в доказательство, что ты выполнил работу.»"
"Deliver 10 Ranalon Salads to Irkima in Red Wing Casino. Reward: 1,672 councils.": "Доставьте 10 салатов Раналон Иркиме в казино Красное Крыло. Награда: 1 672 совета."
"In a pseudo-pocket dimension beneath Povus, you encountered a larger-than-normal butterfly which begged you to knock over some jars of nectar elsewhere.": "В псевдо-карманном измерении под Повусом вы встретили бабочку большего, чем обычно, размера, которая умоляла вас опрокинуть несколько банок с нектаром в другом месте."
"Deliver 10 Rat Tails to Fitz the Boatman on the Serbule docks. Reward: 274 councils.": "Доставьте 10 крысиных хвостов Фитцу Лодочнику на доках Сербуля. Награда: 274 совета."
"Ashk the Answerer in Rahu said, \"I like to keep a handful of stock ingredients on hand, and I am almost out of giant rat tails. Fortunately the sewer beneath our feet is teeming with them! I will pay a very reasonable sum if you bring me some. Oh, they needn't be from the Rahu sewers. Any rat tails will do.\"": "Ашк Ответчик в Раху сказал: «Я люблю держать под рукой запас основных ингредиентов, и у меня почти закончились гигантские крысиные хвосты. К счастью, канализация под нашими ногами полна ими! Я заплачу очень разумную сумму, если ты принесёшь мне несколько. О, они не обязательно должны быть из канализации Раху. Подойдут любые крысиные хвосты.»"
"Deliver 10 Rat Teeth to Fitz the Boatman on the Serbule docks. Reward: 227 councils.": "Доставьте 10 крысиных зубов Фитцу Лодочнику на доках Сербуля. Награда: 227 советов."
"Gershok the Ranalon in Serbule Hills asked for some rat teeth.": "Гершок Раналон из Сербульских холмов попросил несколько крысиных зубов."
"Bogaku in the Rahu Sewers said, \"I wonder where these ratkin are getting their appetizers. Can you get some for me so I can check them?\"": "Богака в канализации Раху сказал: «Интересно, откуда эти крысоловы берут свои закуски. Можешь достать немного для меня, чтобы я мог их проверить?»"
"Bogaku in the Rahu Sewers said, \"Ratkin love to gamble, of course, but each region's ratkin have different methods. The ones around here seem to enjoy dice games. I need samples of their dice!\n\nI suppose any ratkin could be carrying some dice, but off-duty ratkin are most likely to have 'em.\"": "Богака в канализации Раху сказал: «Крысолюди, конечно, любят азартные игры, но у крысолюдей из разных регионов свои методы. Те, что здесь, похоже, предпочитают игры в кости. Мне нужны образцы их костей!\n\nПолагаю, у любого крысолюда могут быть кости, но у отдыхающих крысолюдей их скорее всего будет."
"Deliver 10 Ratkin Pipe-Pipes to Sheyna in Rahu. Reward: 3,710 councils.": "Доставьте 10 трубок Крысиного Племени Шейне в Раху. Награда: 3 710 советов."
"Bogaku in the Rahu Sewers said, \"Ratkin often farm snails for meat and shells, but the ones down here are huge! They must be mutants! Go stab some to death and see if they explode into glowing goo.\"": "Богака в канализации Раху сказал: «Крысолюди часто разводят улиток ради мяса и раковин, но эти здесь огромные! Должно быть, они мутанты! Иди и проткни несколько насмерть, чтобы увидеть, взрываются ли они светящейся слизью.»"
"Deliver 10 Ratkin Tambourines to Sheyna in Rahu. Reward: 3,710 councils.": "Доставьте 10 бубнов Крысолюдей Шейне в Раху. Награда: 3 710 советов."
"Bogaku in the Rahu Sewers said, \"Rattus root is a favorite snack of these barbaric vermin. I'm sure to a mutant like you it just looks like a root, right? But to a gobthropologist, it's like an open book! A book of secrets! So go get me my secret books! I mean rattus roots!\"": "Богака в канализации Раху сказал: «Корень крысы — любимая закуска этих варварских тварей. Я уверен, для мутанта вроде тебя это просто корень, да? Но для гобтрополога это как открытая книга! Книга тайн! Так что принеси мне мои тайные книги! То есть корни крысы!»"
"Deliver 10 Raw Egg Blends to Fitz the Boatman on the Serbule docks. Reward: 765 councils.": "Доставьте 10 Смесей из сырых яиц Фитцу Лодочнику на доках Сербуля. Награда: 765 советов."
"Red in Kur Mountains said, \"You're finally here! We have a panther problem. An orcish ship came in the night and unloaded hundreds of war panthers! They must be planning a war or something. But who cares about that! They let their panthers hunt freely all through yeti territory, which is also where most of the surviving fox dens are!\n\nThey're getting really close to this outpost, too. I saw one watching me from across the river earlier! I've programmed the turrets to target the panthers... but I don't know if they'll be enough. If Mittens and I are dead when you get back, please avenge us!\"": "Ред в горах Кур сказал: «Ты наконец-то здесь! У нас проблема с пантерами. Орочий корабль приплыл ночью и выгрузил сотни боевых пантер! Похоже, они планируют войну или что-то в этом роде. Но кому это интересно! Они выпускают своих пантер охотиться свободно по всей территории йети, а там же находятся большинство выживших лисиц!\n\nОни уже очень близко к этому форпосту. Раньше я видел одну, которая наблюдала за мной с другого берега реки! Я запрограммировал турели на поражение пантер... но не знаю, хватит ли их. Если со мной и Миттенсом что-то случится к твоему возвращению, пожалуйста, отомсти за нас!"
"You've awakened in a strange place and you don't remember anything. You get the feeling this has happened to you before... but maybe not as badly as this.\n\nA fairy woman standing nearby waves and flutters more quickly when she sees you. Maybe she can help you.": "Вы очнулись в странном месте и ничего не помните. У вас есть ощущение, что это уже случалось с вами раньше... но, возможно, не так сильно, как сейчас.\n\nРядом стоит фея, которая машет и порхает быстрее, когда видит вас. Возможно, она сможет помочь."
"Daisy in Sun Vale's Animal Town asked for some new blank books. She needs at least two of them because her hoofwriting is atrocious.": "Дейзи из Звериного города в Солнечной Долине попросила несколько новых пустых книг. Ей нужно как минимум две, потому что её почерк копытами ужасен."
"Rappanel in Serbule Hills said, \"I need new catgut for my lute strings! Most catgut is made from sheep intestine, but I'm an artist, not some slob. I need actual cat gut! You're a lover of the arts, right? Don't do this for me. Do this for art. Find a tiger out there, kill it, and use your butcher knife to scoop up the guts. You do have a butcher knife, right? Because I don't! But I'm sure Fainor in Serbule town would...\"": "Раппанель в Сербульских Холмах сказал: «Мне нужна новая кишка для струн моей лютни! Большинство кишок делают из овечьего кишечника, но я художник, а не какой-то бездельник. Мне нужна настоящая тигриная кишка! Ты же любитель искусства, верно? Делай это не ради меня. Делай это ради искусства. Найди тигра там, убей его и используй свой мясницкий нож, чтобы вычистить внутренности. У тебя ведь есть мясницкий нож, правда? Потому что у меня нет! Но я уверен, что Файнор в городе Сербуль...»"
"Truxartis in Vidaria said, \"Khyrulek's journal is almost correct, but her calculations are outdated due to planar shift. They must be recalibrated by a... teleportation sage.\n\nThere was such a sage in Statehelm years ago named Elmetaph, but my spies say he lives now in a lighthouse on a desolate island.\n\nSeek out this Elmetaph and force him to fix these calculations.\"": "Труксартис в Видарии сказал: «Журнал Хирулека почти точен, но её расчёты устарели из-за планарного сдвига. Их нужно перекалибровать у... мудреца телепортации.\n\nНесколько лет назад в Стейтхелме был такой мудрец по имени Элметаф, но мои шпионы говорят, что теперь он живёт в маяке на заброшенном острове.\n\nНайди этого Элметафа и заставь его исправить эти расчёты."
"Jumper in Sun Vale's Animal Town asked you to bring him some evil grass.": "Прыгун из Животного города в Солнечной долине попросил тебя принести ему немного злой травы."
"Engineer Crall in Vidaria said, \"When I left the mining camp, I did so in a hurry. Rock-Wrecker and I got into... let's just say, we did not see eye-to-eye. At any rate, I left behind some valuable notes on a new mining device I was working on. I would hate for them to pick up the design where I left off, and use it for their nefarious goals. If you happen upon their camp, could you retrieve my notes while you're there? I wouldn't be surprised if Rock-Wrecker seized them for himself already.\"": "Инженер Кралл в Видарии сказал: «Когда я покидал шахтерский лагерь, я делал это в спешке. Я и Разрушитель Камней... скажем так, мы не сошлись во взглядах. В любом случае, я оставил там ценные записи о новом горнодобывающем устройстве, над которым работал. Мне бы не хотелось, чтобы они продолжили работу над моим проектом и использовали его в своих зловещих целях. Если ты окажешься в их лагере, не мог бы забрать мои записи? Я бы не удивился, если Разрушитель Камней уже забрал их себе.»"
"Mope in Povus said, \"Some of my fly amanita has spread beyond my locus of control. They are mine and I desire to have them.\"": "Моп в Повусе сказал: «Некоторые из моих мухоморов распространились за пределы моей зоны контроля. Они мои, и я хочу их вернуть.»"
"Orrrilund in the Ranalon Den said, \"You found what? You mean they weren't torn completely to shreds? That's great! They were supposed to collect something for me. The next time you're in there, look for a sack that they had and grab it for me. \"": "Оррилунд в Логове Раналон сказал: \"Ты что нашёл? Ты хочешь сказать, что их не разорвали полностью на куски? Это отлично! Они должны были собрать для меня кое-что. В следующий раз, когда будешь там, поищи мешок, который у них был, и забери его для меня.\""
"Deliver 10 Recuperative Soups to Irkima in Red Wing Casino. Reward: 3,975 councils.": "Доставьте 10 Восстанавливающих супов Иркиме в казино Красное Крыло. Награда: 3 975 советов."
"Deliver 10 Red Aster Bouquets to Sheyna in Rahu. Reward: 3,538 councils.": "Доставьте 10 букетов из красных астр Шейне в Раху. Награда: 3 538 советов."
"Deliver 10 Red Asters to Fitz the Boatman on the Serbule docks. Reward: 660 councils.": "Доставьте 10 Красных Астр Фитцу Лодочнику на доках Сербуля. Награда: 660 советов."
"Deliver 10 Red Peppers to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,072 councils.": "Доставьте 10 красных перцев Тимбл Питу в Хоганском замке, Элтибуль. Награда: 2 072 совета."
"Deliver 10 Red Rose Bouquets to Sheyna in Rahu. Reward: 12,530 councils.": "Доставьте 10 букетов из красных роз Шейне в Раху. Награда: 12 530 советов."
"Deliver 10 Red Roses to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,365 councils.": "Доставьте 10 красных роз Тимблу Питу в Хоганском замке, Элтибуль. Награда: 2 365 советов."
"Deliver 10 Red Snapper Fillets to Viedesi in Sun Vale. Reward: 2,258 councils.": "Доставьте 10 филе красного луциана Виедеси в Солнечную Долину. Награда: 2 258 советов."
"Deliver 99 Red Snapper Fillets to Sheyna in Rahu. Reward: 41,456 councils.": "Доставьте 99 филе красного луциана Шейне в Раху. Награда: 41,456 советов."
"Deliver 10 Red-Leaf Lettuce to Korbok in Vidaria. Reward: 19,691 councils.": "Доставьте 10 салатов с красными листьями Корбоку в Видарию. Награда: 19,691 советов."
"Deliver 10 Redfish Fillets to Viedesi in Sun Vale. Reward: 4,628 councils.": "Доставьте 10 филе красной рыбы Виедеси в Солнечную Долину. Награда: 4 628 советов."
"Deliver 99 Redfish Fillets to Sheyna in Rahu. Reward: 87,536 councils.": "Доставьте 99 филе красной рыбы Шейне в Раху. Награда: 87 536 советов."
"Farsight Flemmings in Statehelm said, \"Here's the story I was told: a traveler had stopped at the old inn in Vidaria. It's mostly abandoned, but it's still got a sturdy roof, and it was raining. While it rained, he cooked an incredible piece of beef on the stove.\n\nJust as he was adding some unusual herbs he'd found, a bolt of lightning struck the chimney! The traveler avoided harm, but the piece of steak was blasted and blackened. And then... he says the steak got up and tried to kill him, so he ran out into the night rain.\n\nI hadn't put too much faith in his story, but we should see if it's true.\n\nGo to the inn in Vidaria and recreate the same situation by burning some high-quality beef. I'll give you precise instructions.\n\nOh and be prepared to defend yourself.\"": "Фарсайт Флеммингс в Стейтхельме сказал: «Вот историю, которую мне рассказали: путешественник остановился в старой таверне в Видарии. Она в основном заброшена, но крыша всё ещё крепкая, и шёл дождь. Пока шёл дождь, он приготовил на плите невероятный кусок говядины.\n\nКак раз когда он добавлял необычные травы, которые нашёл, в трубу ударила молния! Путешественник избежал вреда, но кусок стейка был обожжён и почернел. А потом... он говорит, что стейк ожил и попытался его убить, поэтому он убежал в ночной дождь.\n\nЯ не слишком верил его истории, но нам стоит проверить, правда ли это.\n\nОтправляйся в таверну в Видарии и воспроизведи ту же ситуацию, поджарив кусок высококачественной говядины. Я дам тебе точные инструкции.\n\nИ будь готов защититься."
"Pegast in the Fae Realm said, \"Even soldiers need refreshment, and the mortals have a bitter booze called Beer which is quite amusing. I'm attempting to craft some of my own, but I need some 'hops'. They don't grow here! Do you have any?\"": "Пегаст в Фейском мире сказал: «Даже солдатам нужна подпитка, а у смертных есть горький напиток под названием Пиво, что довольно забавно. Я пытаюсь сварить немного своего, но мне нужны «хмель». Они здесь не растут! У тебя есть немного?»"
"In a cave beneath Povus, you met a ghostly orc that wanted nothing but a sip of Remga's Raging Rum.": "В пещере под Повусом вы встретили призрачного орка, который хотел лишь глоток Бурного рома Регмы."
"Truxartis in Vidaria said, \"My mind is... Fuzzy. I need to realign it. Yes! I know what to do.\n\nYou should find a Tuvillic Rune in Povus, beneath a giant mushroom. Touch the rune and retrieve the Mnemonix Index. When you enter the caves, turn left and you should see it.\"": "Труксартис в Видарии сказал: «Мой разум... затуманен. Мне нужно его выровнять. Да! Я знаю, что делать.\n\nТебе следует найти руну Тувиллик в Повусе, под гигантским грибом. Коснись руны и забери Индекс Мнемоникс. Войдя в пещеры, поверни налево, и ты должен его увидеть."
"Deliver 10 Relaxing Arrangement #A to Sheyna in Rahu. Reward: 16,110 councils.": "Доставьте 10 Расслабляющих композиций №A Шейне в Раху. Награда: 16,110 советов."
"Deliver 10 Relaxing Arrangement #B to Sheyna in Rahu. Reward: 43,657 councils.": "Доставьте 10 Расслабляющих композиций №B Шейне в Раху. Награда: 43,657 советов."
"Deliver 10 Relaxing Arrangement #C to Korbok in Vidaria. Reward: 126,383 councils.": "Доставьте 10 Расслабляющих композиций №C Корбоку в Видарии. Награда: 126,383 совета."
"Ormond Neth in Statehelm said, \"You can't be this good. I don't know what your game is, but nobody completes these courses this quickly!\n\nI suppose you're ready for a REAL challenge, then! Um, finish enemies off with bardic blasts. But they have to be sentient enemies! And at night! And you can't wear a hat! And don't die!\"": "Ормонд Нет в Стейтхельме сказал: «Ты не можешь быть таким хорошим. Я не знаю, в чём твоя игра, но никто не проходит эти курсы так быстро!\n\nПолагаю, ты готов к НАСТОЯЩЕМУ испытанию! Эм, добивай врагов бардовскими взрывами. Но это должны быть разумные враги! И ночью! И без шляпы! И не умирай!"
"Truxartis in Vidaria said, \"I need to reawaken my blood powers. If only I hadn't killed the First Thrall years ago and stashed his body parts beneath a ruined tower in the Kur Mountains! But alas, I did.\n\nGo and find them for me. Try not to alert Lomas to your presence -- you shouldn't need to see him at all. If you do encounter Lomas, tell him that I'll get him the money soon.\"": "Труксартис в Видарии сказал: «Мне нужно пробудить свои кровавые силы. Если бы только я не убил Первого Рабы много лет назад и не спрятал его части тела под разрушенной башней в горах Кур! Но увы, я это сделал.\n\nИди и найди их для меня. Старайся не привлекать внимание Ломаса — тебе вообще не стоит с ним встречаться. Если же столкнёшься с Ломасом, скажи ему, что я скоро принесу деньги."
"Sirine in Rahu said, \"Ever killed a rhino? Quite a rush, isn't it?! They're so dangerous! I'm not really in shape to hunt rhinos right now, though... my bow broke. And not coincidentally, the bow uses ivory rhino horn. You probably see where this is going... if you find some, please let me know!\"": "Сирин в Раху сказал: «Когда-нибудь убивали носорога? Это настоящее приключение, не правда ли?! Они такие опасные! Но сейчас я не в форме, чтобы охотиться на носорогов... мой лук сломался. И, что неудивительно, лук сделан из слоновой кости носорога. Думаю, вы понимаете, к чему это ведёт... если найдёте немного, пожалуйста, сообщите мне!»"
"Parella in Statehelm said, \"I'm sorry to say that the ranalon are raising another army. I need you to activate the same beacon as before and slay them! Remember: if you die it will be seen as a sign of our weakness. Stay alive no matter what!\n\n<i>[Dying will reset progress on this quest.]</i>\"": "Парелла в Стейтхелме сказала: «С сожалением сообщаю, что раналоны собирают новую армию. Мне нужно, чтобы ты активировал тот же маяк, что и раньше, и уничтожил их! Помни: если ты умрёшь, это будет воспринято как знак нашей слабости. Выживай любой ценой!\n\n<i>[Смерть сбросит прогресс этого задания.]</i>"
"Lana Songtree in Serbule Hills asked you to deliver some homemade bear repellent to her friend Jara in Serbule. Jara lives in a farmhouse outside of town.": "Лана Сонгтри в Сербульских холмах попросила тебя доставить самодельное средство для отпугивания медведей её подруге Яре в Сербуль. Яра живёт в фермерском доме за городом."
"Leah Bowman in Povus said, \"I used to walk the riverbank and collect old fishing nets. I use them for all sorts of crafts! But it's too dangerous to do that these days. If you find some nets, though, I'd like them! I can't pay much, but I'll pay a bit.\"": "Лиа Боуман в Повусе сказала: «Раньше я ходила по берегу реки и собирала старые рыболовные сети. Я использую их для самых разных ремёсел! Но сейчас это слишком опасно. Если ты найдёшь какие-нибудь сети, я бы с удовольствием их взяла! Я не могу много заплатить, но немного дам.»"
"Melandria in Gazluk Keep said, \"Psst... I need your help! My friend Avgal -- he's another gru-maghi -- was caught trying to escape yesterday! And you know the penalty for that: they strip you naked and leave you in the mountains to freeze to death. You've probably never seen somebody die from hypothermia, but it's horrible. Not to worry, though: I have a plan. I just need some cold resistance potions! A lot of them!\"": "Меландрия в Газлукской крепости сказала: «Псс... Мне нужна твоя помощь! Мой друг Авгал — он тоже гру-магхи — был пойман вчера при попытке побега! А ты знаешь, какое за это наказание: тебя раздевают догола и оставляют в горах умирать от холода. Ты, наверное, никогда не видел, как кто-то умирает от гипотермии, но это ужасно. Не волнуйся, у меня есть план. Мне просто нужно много зелий сопротивления холоду!»"
"Sirine in Rahu said, \"Well, the bow's almost ready, but I need to restring it. I need cat gut! Bring me a bunch of cat meat and I'll dig through it to find what I need.\"": "Сирин в Раху сказал: «Ну, лук почти готов, но мне нужно перетянуть тетиву. Мне нужна кошачья кишка! Принеси мне кучу кошачьего мяса, и я перерыю её, чтобы найти то, что мне нужно.»"
"Norbert has inducted you into the Wardens! Time to head back to Kur: you should be able to get into the Sacred Grotto now.": "Норберт посвятил тебя в Стражей! Пора возвращаться к Куру: теперь ты должен суметь попасть в Священную Грот."
"Unora's sending stone in Gazluk said, \"I think that about does it. Come see me in Statehelm.\"": "Камень связи Уноры в Газлуке сказал: «Думаю, на этом всё. Приходи ко мне в Стейтхельм.»"
"George Madler has asked you to kill a goblin named Fugorg. George thinks this goblin can be found near a giant statue in the wilds of Eltibule.": "Джордж Мадлер попросил вас убить гоблина по имени Фугорг. Джордж считает, что этого гоблина можно найти рядом с гигантской статуей в дикой местности Элтибуле."
"George Madler has asked you to kill a goblin named Algapa. George thinks this goblin can be found in the dungeons beneath Eltibule Keep.": "Джордж Мэдлер попросил вас убить гоблина по имени Алгапа. Джордж считает, что этого гоблина можно найти в подземельях под крепостью Элтибуль."
"George Madler asked you to kill a bear named Graz. He doesn't know where Graz lives, though, except that it's likely in a cave filled with goblins.": "Джордж Мэдлер попросил тебя убить медведя по имени Граз. Он не знает, где живёт Граз, кроме того, что это, вероятно, пещера, наполненная гоблинами."
"Deliver 10 Rhodium to Irkima in Red Wing Casino. Reward: 8,103 councils.": "Доставьте 10 единиц Родия Иркиме в казино Красное Крыло. Награда: 8,103 совета."
"Deliver 10 Rib Bones to Irkima in Red Wing Casino. Reward: 346 councils.": "Доставьте 10 рёберных костей Иркиме в казино Красное Крыло. Награда: 346 советов."
"Paullus in Statehelm said, \"I know a lot of ways to turn rice into alcohol. Rice wine is the smoothest! Got any of that smoothness to share?\"": "Пауллус в Стейтхельме сказал: «Я знаю много способов превратить рис в алкоголь. Рисовое вино — самое мягкое! Есть ли у тебя немного этой мягкости, чтобы поделиться?»"
"Deliver 10 Ricotta Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,733 councils.": "Доставьте 10 рикотты Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 4 733 совета."
"Deliver 10 Ricotta Forte to Ogamboe in the Fae Realm. Reward: 20,686 councils.": "Доставьте 10 Рикотты Форте Огамбо в Королевство Фей. Награда: 20 686 советов."
"Riston said, \"If you can help me out, I'll make as many rings for you as you want. As a brewer, the Queen has me brew up things to suit her \"special needs\" when I'm not out here handing out prizes. Could you bring me 20 hops? The time I save from that I can use to make you a ring!\"": "Ристон сказал: «Если ты сможешь мне помочь, я сделаю для тебя столько колец, сколько захочешь. Будучи пивоваром, королева заставляет меня варить разные напитки для её «особых нужд», когда я не раздаю здесь призы. Можешь принести мне 20 шишек хмеля? Время, которое я сэкономлю, я смогу потратить на изготовление кольца для тебя!»"
"Rita in Serbule asked you to obtain a pair of comfy slippers. She mentioned Goblin Slippers are the most comfortable kind, but she's not picky.": "Рита в Сербуле попросила тебя достать пару удобных тапочек. Она упомянула, что гоблинские тапочки самые комфортные, но она не придирчива."
"Rita in Serbule asked for some flowers of any variety.": "Рита в Сербуле попросила цветы любого вида."
"Rita in Serbule has asked you to discover the secret of Marna's beautiful long hair. Marna is a shopkeeper in Serbule.": "Рита в Сербуле попросила вас раскрыть секрет красивых длинных волос Марны. Марна — торговка в Сербуле."
"Rita in Serbule asked for a flawless giant snail shell. \"They're really hard to get. I heard you have to kill dozens to find one. But you're so strong and brave, I'm sure it'll only take you a second!\"": "Рита в Сербуле попросила безупречную раковину гигантской улитки. «Их действительно трудно достать. Я слышала, что нужно убить десятки, чтобы найти одну. Но ты такой сильный и смелый, я уверена, что у тебя это займет всего секунду!»"
"Rita in Serbule wants you to deliver some soap she made to Helena who lives in Eltibule, and can be found \"somewhere in one of those little mini-castle things\".": "Рита в Сербуле хочет, чтобы вы доставили мыло, которое она сделала, Хелене, которая живёт в Элтибуле и её можно найти «где-то в одном из этих маленьких мини-замков»."
"Deliver 10 River Salmon Fillets to Viedesi in Sun Vale. Reward: 4,013 councils.": "Доставьте 10 филе речного лосося Вьедеси в Солнечную Долину. Награда: 4 013 советов."
"Deliver 99 River Salmon Fillets to Sheyna in Rahu. Reward: 75,571 councils.": "Доставьте 99 филе речного лосося Шейне в Раху. Награда: 75 571 совет."
"In a pseudo-pocket dimension beneath Povus, you met a fairy named Rixie who asked you to collect some rings.": "В псевдо-карманном измерении под Повусом вы встретили фею по имени Рикси, которая попросила вас собрать несколько колец."
"Cynthia Rolfe in Statehelm said, \"Nah, I don't think you can help with this roach problem. I need some of those fancy bug bombs, but they're hard to come by.\n\nI guess if you're handy with a gizmo, you could build some and fumigate the place for us. I'd sure appreciate that!\n\nSer Hackley at the Council Headquarters could give you blueprints for the bug bombs, if you know how to read such things.\"": "Синтия Ролф в Стейтхелме сказала: «Нет, я не думаю, что ты сможешь помочь с этой проблемой с тараканами. Мне нужны эти модные бомбочки от насекомых, но их трудно достать.\n\nДумаю, если ты умеешь обращаться с приборами, ты мог бы сделать несколько и обработать помещение для нас. Я была бы очень признательна!\n\nСэр Хакли в здании Совета может дать тебе чертежи бомбочек от насекомых, если ты умеешь читать такие вещи."
"Deliver 10 Rock Carp Fillets to Viedesi in Sun Vale. Reward: 3,358 councils.": "Доставьте 10 филе каменного карпа Вьедеси в Солнечной Долине. Награда: 3 358 советов."
"Deliver 99 Rock Carp Fillets to Sheyna in Rahu. Reward: 63,001 councils.": "Доставьте 99 филе каменного карпа Шейне в Раху. Награда: 63 001 совет."
"Deliver 10 Roquefort Cheese to Ogamboe in the Fae Realm. Reward: 20,420 councils.": "Доставьте 10 сыров Рокфор Огамбо в Царство Фей. Награда: 20,420 советов."
"Brianna Willer in Serbule Hills said, \"I'm trying to brew a toxic beer. I know, I know, that's against the Council's Brewing Code of Ethics, but the Council's not here, and monsters are! If goblins find me, I want to give them kegs of beer that will make them sick enough that I can flee.\n\nI'm still experimenting with the recipe, but I think a key ingredient is rotten strawberries. Not fresh ones -- they've gotta be really rotten. Dig me up some, okay?\"": "Брианна Уиллер в Сербульских Холмах сказала: «Я пытаюсь сварить токсичное пиво. Я знаю, знаю, это против Кодекса этики пивоварения Совета, но Совета здесь нет, а монстры есть! Если меня найдут гоблины, я хочу дать им бочки пива, которое их так отравит, что я смогу сбежать.\n\nЯ всё ещё экспериментирую с рецептом, но думаю, что ключевой ингредиент — гнилые клубники. Не свежие — они должны быть действительно гнилыми. Выкопай мне немного, хорошо?"
"Deliver 10 Rotten Strawberries to Fitz the Boatman on the Serbule docks. Reward: 70 councils.": "Доставьте 10 гнилых клубник Фитцу Лодочнику на доках Сербуля. Награда: 70 советов."
"Deliver 10 Rough Calligraphy Benches to Fitz the Boatman on the Serbule docks. Reward: 3,852 councils.": "Доставьте 10 грубых скамеек для каллиграфии Фитцу Лодочнику на доках Сербуля. Награда: 3,852 совета."
"Deliver 10 Rough Chairs to Fitz the Boatman on the Serbule docks. Reward: 3,824 councils.": "Доставьте 10 грубых стульев Фитцу Лодочнику на доках Сербуля. Награда: 3,824 совета."
"Deliver 10 Rough Cloth Cowls to Irkima in Red Wing Casino. Reward: 1,921 councils.": "Доставьте 10 грубых тканевых капюшонов Иркиме в казино Красное Крыло. Награда: 1 921 совет."
"Deliver 10 Rough Cloth Gloves to Irkima in Red Wing Casino. Reward: 1,921 councils.": "Доставьте 10 грубых тканевых перчаток Иркиме в казино Красное Крыло. Награда: 1 921 совет."
"Deliver 10 Rough Cloth Shirts to Irkima in Red Wing Casino. Reward: 1,870 councils.": "Доставьте 10 грубых тканевых рубашек Иркиме в казино Красное Крыло. Награда: 1 870 советов."
"Deliver 10 Rough Clubs to Irkima in Red Wing Casino. Reward: 853 councils.": "Доставьте 10 Грубых дубинок Иркиме в казино Красное Крыло. Награда: 853 совета."
"Deliver 10 Rough Combat Staves to Sheyna in Rahu. Reward: 848 councils.": "Доставьте 10 Грубых боевых посохов Шейне в Раху. Награда: 848 советов."
"Deliver 10 Rough Leather Helmets to Gremix in Amulna. Reward: 1,870 councils.": "Доставьте 10 грубых кожаных шлемов Гремиксу в Амульне. Награда: 1,870 советов."
"Deliver 10 Rough Leather Rolls to Fitz the Boatman on the Serbule docks. Reward: 469 councils.": "Доставьте 10 грубых кожаных рулонов Фитцу Лодочнику на доках Сербуля. Награда: 469 советов."
"Deliver 10 Rough Leather Shirts to Gremix in Amulna. Reward: 1,870 councils.": "Доставьте 10 грубых кожаных рубашек Гремиксу в Амулне. Награда: 1,870 советов."
"Deliver 10 Rough Meditation Stools to Fitz the Boatman on the Serbule docks. Reward: 4,451 councils.": "Доставьте 10 грубых скамей для медитации Фитцу Лодочнику на доках Сербуля. Награда: 4,451 совет."
"Deliver 10 Rough Melee Staves to Sheyna in Rahu. Reward: 536 councils.": "Доставьте 10 Грубых боевых посохов Шейне в Раху. Награда: 536 советов."
"Deliver 10 Rough Priest Staves to Sheyna in Rahu. Reward: 857 councils.": "Доставьте 10 грубых посохов жреца Шейне в Раху. Награда: 857 советов."
"Deliver 10 Rough Spider Casings to Gremix in Amulna. Reward: 5,763 councils.": "Доставьте 10 грубых паучьих панцирей Гремиксу в Амульне. Награда: 5,763 совета."
"Deliver 10 Rough Werewolf Bardings to Sheyna in Rahu. Reward: 935 councils.": "Доставьте 10 грубых бардингов оборотня Шейне в Раху. Награда: 935 советов."
"Deliver 10 Rough Werewolf Champrons to Sheyna in Rahu. Reward: 935 councils.": "Доставьте 10 Грубых набедренников оборотня Шейне в Раху. Награда: 935 советов."
"Deliver 10 Rough Werewolf Foreguards to Sheyna in Rahu. Reward: 961 councils.": "Доставьте 10 Грубых Волчьих Передовых Стражей Шейне в Раху. Награда: 961 совет."
"Deliver 10 Rough Werewolf Hind Leg Guards to Sheyna in Rahu. Reward: 664 councils.": "Доставьте 10 грубых задних набедренников оборотня Шейне в Раху. Награда: 664 совета."
"Deliver 10 Rough Werewolf Hindguards to Sheyna in Rahu. Reward: 918 councils.": "Доставьте 10 грубых задних защитников оборотня Шейне в Раху. Награда: 918 советов."
"Deliver 10 Royal Jellies to Ogamboe in the Fae Realm. Reward: 60,624 councils.": "Доставьте 10 королевских желе Огамбо в царство Фей. Награда: 60,624 совета."
"Deliver 50 Royal Jellies to Korbok in Vidaria. Reward: 314,824 councils.": "Доставьте 50 Королевских желе Корбоку в Видарии. Награда: 314,824 совета."
"Tyler Green in Serbule Hills said, \"I can fight goblins. I can fight spiders. But the frogs? Those 'ranalons', as they call themselves? They're just too thick in number. It's too hard to fight 'em one at a time!\n\nBut, uh... I told our pretty waitress that I'd killed thousands of 'em. Can you help me out? I just need one of their hideous tongues as a 'souvenir' to show to Lana.\"": "Тайлер Грин в Сербульских Холмах сказал: «Я могу сражаться с гоблинами. Я могу сражаться с пауками. Но лягушки? Эти «раналоны», как они себя называют? Их слишком много. Сражаться с ними по одному слишком сложно!\n\nНо, э-э... я сказал нашей красивой официантке, что убил тысячи из них. Можешь помочь мне? Мне нужен всего лишь один их отвратительный язык в качестве «сувенира», чтобы показать Лане."
"Deliver 10 Rubies to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 рубинов Шейне в Раху. Награда: 4,930 советов."
"Barnaby in the Sacred Warden Grotto said, \"The foxes love the gems you got! I explained to Rubi that she's named after a gem called a Ruby. She insists upon seeing some of these gems right away! And that got me to thinking: if I had a LOT of them, I could use them in tomorrow's math lesson. Do you know where to find a lot of rubies?\n\nOf course, we shouldn't leave Cassie out. Find some nice stones for her too, okay?\"": "Барнаби в Священной пещере Хранителя сказал: «Лисы обожают камни, которые ты принес! Я объяснил Руби, что её имя происходит от камня под названием Рубин. Она настаивает, чтобы сразу увидеть некоторые из этих камней! И это заставило меня задуматься: если бы у меня было МНОГО таких камней, я мог бы использовать их на завтрашнем уроке математики. Ты знаешь, где можно найти много рубинов?\n\nКонечно, не стоит забывать и о Кэсси. Найди для неё тоже хорошие камни, хорошо?"
"Deville Neth in Statehelm said, \"I can't open my shop with these roaches here. If you had bug bombs, you could clear it out for me. I'd reward you!\n\nI'd do it myself but my bug bombs were sabotaged. Yes, I know what that sounds like!\n\nI think Ser Hackley in the Council building sells plans for bug bumbs, if you're into gadgeteering?\"": "Девиль Нет в Стейтхелме сказал: «Я не могу открыть свою лавку с этими тараканами. Если бы у тебя были дымовые шашки от насекомых, ты мог бы очистить её для меня. Я бы тебя вознаградил!\n\nЯ бы сделал это сам, но мои шашки были саботированы. Да, я знаю, как это звучит!\n\nДумаю, Сер Хакли в здании Совета продаёт чертежи дымовых шашек, если тебе нравится заниматься изобретательством?"
"Ailred in Povus said, \"I see your menu has a selection of goblin food, including ruktagh. How are you getting fresh dill out here?! Well, I'm sure the dill isn't fresh. But the meal had better be!\"": "Эйлред в Повусе сказал: «Вижу, в вашем меню есть выбор гоблинской еды, включая руктаг. Как вам удаётся достать свежий укроп здесь?! Хотя, уверен, укроп не свежий. Но вот еда должна быть свежей!»"
"Deliver 10 Ruktaghs to Ogamboe in the Fae Realm. Reward: 6,822 councils.": "Доставьте 10 Рактэгов Огамбо в Область Фей. Награда: 6,822 совета."
"Farsight Flemmings in Statehelm said, \"A soldier told me a very peculiar tale yesterday, and I think I know what's going on. But it's too dangerous for me to investigate! Can you do it?\n\nThe soldier said she was in Vidaria, fighting back demons, when she saw a big slab of steak lying in one of the demon craters. She said the meat was sentient, and that when she investigated, it attacked her and fended her off.\n\nI bet that steak is still out there in one of those craters. Can you bring it to me?\"": "Фарсайт Флеммингс в Стейтхельме сказал: «Вчера солдатка рассказала мне очень странную историю, и я думаю, что понимаю, в чём дело. Но для меня это слишком опасно, чтобы расследовать! Ты можешь это сделать?\n\nСолдатка сказала, что была в Видарии, сражаясь с демонами, когда увидела большой кусок стейка, лежащий в одном из демонических кратеров. Она сказала, что мясо было разумным, и когда она приблизилась, оно напало на неё и отбивалось.\n\nДержу пари, этот стейк всё ещё там, в одном из тех кратеров. Можешь принести его мне?"
"Deliver 10 Rustic Meatsterpieces to Ogamboe in the Fae Realm. Reward: 7,604 councils.": "Доставьте 10 деревенских мясных шедевров Огамбо в Фейском царстве. Награда: 7,604 совета."
"A goblin named Jumjab in Eltibule asked for some onions.": "Гоблин по имени Джумджаб в Элтибуле попросил немного лука."
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Amazing Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Верак сказал: «Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужно немного дополнительного снаряжения, пока Тантай пополняет мой запас кожи. Ты можешь принести мне 10 удивительных седел? В обмен я поделюсь с тобой несколькими торговыми секретами, чтобы помочь отточить твое мастерство.»"
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Decent Reins? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Верак сказал: «Эй там! Изготовление сбруи для лошадей — очень важное дело! Мне нужна дополнительная амуниция, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 неплохих уздечек? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твоё мастерство.»"
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Quality Saddlebags? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Верак сказал: «Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужна дополнительная амуниция, пока Тантай пополняет мой запас кожи. Можешь принести мне 10 качественных седельных сумок? В обмен я поделюсь с тобой несколькими торговыми секретами, чтобы помочь отточить твое ремесло.»"
"Verac said, \"Ho there! Making tack for horses is very important work! I'm in need of some extra gear while I'm waiting on Tantai to replenish my leather stock. Can you bring me 10 Rough Saddles? In exchange I'll share a couple trade secrets with you to help hone your craft.\"": "Верак сказал: «Эй там! Изготовление сбруи для лошадей — очень важная работа! Мне нужна дополнительная амуниция, пока Тантай пополняет мои запасы кожи. Можешь принести мне 10 грубых седел? В обмен я поделюсь с тобой парой торговых секретов, чтобы помочь отточить твое ремесло.»"
"Sie Antry asked you to help make the trade path behind her homestead safer.": "Сие Энтри попросила вас помочь сделать торговый путь за её усадьбой безопаснее."
"Sona in New Prestonbule said, \"I've been trying to convince Mox that Transmutation can revolutionize mining. But he won't listen. So I need your help. It will be dangerous... but worthwhile! I need a piece of the evil yellow crystals that can be found outside, plus some high-quality phlogiston. I believe I can make the crystal safe for transit!\"": "Сона в Новом Престонбуле сказала: \"Я пыталась убедить Мокса, что Превращение может революционизировать горное дело. Но он не слушает. Поэтому мне нужна твоя помощь. Это будет опасно... но стоит того! Мне нужен кусок злых жёлтых кристаллов, которые можно найти снаружи, а также немного высококачественного флогистона. Я верю, что смогу сделать кристалл безопасным для транспортировки!\""
"Deliver 10 Salmon Fillets to Viedesi in Sun Vale. Reward: 3,414 councils.": "Доставьте 10 филе лосося Виедеси в Солнечную Долину. Награда: 3,414 советов."
"Deliver 99 Salmon Fillets to Sheyna in Rahu. Reward: 63,903 councils.": "Доставьте 99 филе лосося Шейне в Раху. Награда: 63 903 совета."
"Deliver 10 Saltpeter to Fitz the Boatman on the Serbule docks. Reward: 6,790 councils.": "Доставьте 10 единиц селитры Фитцу Лодочнику на доках Сербуля. Награда: 6,790 советов."
"Deliver 99 Saltpeter to Korbok in Vidaria. Reward: 147,740 councils.": "Доставьте 99 единиц селитры Корбоку в Видарии. Награда: 147,740 советов."
"Landri in the Kur Mountains asked for Saltpeter.": "Ландри в горах Кур попросил селитру."
"Percy in Eltibule has asked for saltpeter. He intends to use it to blow up a portal.": "Перси в Элтибуле попросил селитру. Он намерен использовать её, чтобы взорвать портал."
"Fluffikins in Gazluk said, \"My master left me with a long list of tasks, and we've fallen behind. I'd love your help! This one's tricky: I need samples of a mineral that grows in the caves around here. It's called cinnabar, and it's pretty hard to mine. But if you can get some, I'll pay you ... let's see... ten thousand Councils.\"": "Флаффикинс в Газлуке сказал: «Мой хозяин оставил мне длинный список заданий, и мы отстаём. Я был бы рад твоей помощи! Это задание непростое: мне нужны образцы минерала, который растёт в пещерах здесь рядом. Он называется киноварь, и его довольно трудно добыть. Но если ты сможешь добыть немного, я заплачу тебе... посмотрим... десять тысяч Советов.»"
"Lumpfuzz in the Ilmari Desert said, \"Okay, so the rakkies in the southwest have been breeding extra-vicious sand dogs. You need to kill those.\n\nLook, I know what this sounds like and I don't want to hear it. Those sand dogs aren't like us... they're not even mammals! They're dinosaurs or something! Wardens hate dinosaurs, right? Well... they aren't native to here! They're disrupting the natural order and shit.\n\nLook, the bandits were already a big problem for Amulna, and now they're much worse. And those sand dogs creep me out. Just fill out the forms however you need to, but those freaks need to go.\"": "Лампфазз в пустыне Илмари сказал: «Ладно, ракки на юго-западе разводят особенно свирепых песков-собак. Тебе нужно их убить.\n\nСлушай, я знаю, как это звучит, и не хочу это слышать. Эти пескособаки не похожи на нас... они даже не млекопитающие! Они динозавры или что-то в этом роде! Стражи ненавидят динозавров, правда? Так вот... они не местные! Они нарушают естественный порядок и всё такое.\n\nСлушай, бандиты и так были большой проблемой для Амульны, а теперь стало ещё хуже. И эти пескособаки меня пугают. Просто заполни все нужные формы, как считаешь нужным, но этих уродов надо убрать."
"Deliver 10 Sanguinizers to Viedesi in Sun Vale. Reward: 4,495 councils.": "Доставьте 10 Кровопийц Вьедеси в Солнечной Долине. Награда: 4 495 советов."
"Deliver 10 Sapphires to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 сапфиров Шейне в Раху. Награда: 4,930 советов."
"Deliver 10 Sardonyxs to Viedesi in Sun Vale. Reward: 4,420 councils.": "Доставьте 10 сардониксов Виедеси в Солнечную Долину. Награда: 4 420 советов."
"Jesina asked you to find her sister's backpack full of clothes. They're somewhere near an abandoned home.": "Йесина попросила тебя найти рюкзак её сестры, полный одежды. Он где-то рядом с заброшенным домом."
"Deliver 10 Sausages to Fitz the Boatman on the Serbule docks. Reward: 2,215 councils.": "Доставьте 10 колбасок Фитцу Лодочнику на доках Сербуля. Награда: 2 215 советов."
"Jesina in Eltibule asked you to save her sister Sarina. Sarina is being held captive in a goblin-infested dungeon under Eltibule Keep.": "Йесина в Эльтибуле попросила тебя спасти её сестру Сарину. Сарина содержится в плену в подземелье, кишащем гоблинами, под крепостью Эльтибул."
"Syndra in Kur Mountains wishes she had some dragon scales to take home with her.": "Синдра в горах Кур мечтает заполучить немного драконьей чешуи, чтобы взять её с собой домой."
"Deliver 10 Scamorza Cheese to Ogamboe in the Fae Realm. Reward: 22,277 councils.": "Доставьте 10 сыров Скаморца Огамбо в Царство Фей. Награда: 22,277 советов."
"Trasen in Serbule Hills said, \"If you listen very carefully, you might hear the friendly tornadoes around here making an oscillating noise approximately five notes higher than normal. They're obviously in significant distress!\n\nI think it's those ghastly exploding sheep. If an explosion gets sucked up into a tornado, that can really upset it. Could you clear the area of those fiery abominations?\"": "Трасен в Холмах Сербуль сказал: «Если прислушаться очень внимательно, можно услышать, как дружелюбные торнадо здесь издают колеблющийся звук примерно на пять нот выше обычного. Очевидно, они сильно страдают!\n\nДумаю, это из-за этих ужасных взрывающихся овец. Если взрыв попадает в торнадо, это действительно может его расстроить. Не мог бы ты очистить эту территорию от этих огненных мерзостей?"
"Ensign Cricket aboard the Wintertide said, \"Okay, I'll cut the act: I know why you're really here. You're after the wizard! Well, he isn't here. Not physically, anyway. But his creations are! Go up to the science deck and you'll see what I mean. By all means, feel free to dispose of our new 'army'!\"": "Младший лейтенант Крикет на борту Wintertide сказал: «Ладно, перестану притворяться: я знаю, зачем вы здесь на самом деле. Вы охотитесь на волшебника! Но его здесь нет. По крайней мере, физически. Зато его творения здесь! Поднимитесь на научную палубу, и вы поймёте, что я имею в виду. Без сомнения, не стесняйтесь избавиться от нашей новой 'армии'!»"
"Guzor Harrison in Statehelm said, \"Work on my new spell continues. I suppose I will share the premise with you: it is a new kind of sentient flame, much more suitable to certain types of work.\n\nBut there is much research left. You seem competent enough to help with that research. Here's what I need you to do. Go find some rakshasa bandits, or pirates, or other socially undesirables, and kill them with fire. This next bit is very important: they need to die from the impact of a Scintillating Flame.\n\nAs you bury them, note whether they have a startled expression on their face.\"": "Гузор Харрисон в Стейтхельме сказал: «Работа над моим новым заклинанием продолжается. Полагаю, я поделюсь с тобой его идеей: это новый вид разумного пламени, гораздо более подходящего для определённых видов работы.\n\nНо исследований ещё много. Ты кажешься достаточно компетентным, чтобы помочь с этими исследованиями. Вот что я хочу, чтобы ты сделал. Найди разбойников ракшасов, пиратов или других социальных изгоев и убей их огнём. Следующая часть очень важна: они должны умереть от воздействия Искрящегося Пламени.\n\nКогда будешь их закапывать, обрати внимание, есть ли на их лицах выражение испуга."
"You destroyed the erupting nest of Tunnel Scorpions!": "Вы уничтожили извергающееся гнездо туннельных скорпионов!"
"Deliver 10 Scrambled Eggs to Fitz the Boatman on the Serbule docks. Reward: 1,368 councils.": "Доставьте 10 порций яичницы-болтуньи Фитцу Лодочнику на доках Сербуля. Награда: 1 368 советов."
"Kleave wants some low-value paintings. Paintings worth less than 50 councils would probably work best.": "Клив хочет несколько недорогих картин. Картины стоимостью менее 50 советов, вероятно, подойдут лучше всего."
"Deliver 10 Scray Guardian Lures to Irkima in Red Wing Casino. Reward: 11,223 councils.": "Доставьте 10 приманок Стража Скрея Иркиме в казино Красное Крыло. Награда: 11,223 совета."
"Deliver 10 Scray Lungs to Irkima in Red Wing Casino. Reward: 1,766 councils.": "Доставьте 10 лёгких Скрея Иркиме в казино Красное Крыло. Награда: 1 766 советов."
"Deliver 10 Scray Lures to Irkima in Red Wing Casino. Reward: 3,403 councils.": "Доставьте 10 приманок Скрей Иркиме в казино Красное Крыло. Награда: 3 403 совета."
"Deliver 10 Scray Stingers to Irkima in Red Wing Casino. Reward: 1,766 councils.": "Доставьте 10 жал Скрея Иркиме в казино Красное Крыло. Награда: 1,766 советов."
"Deliver 10 Sea Cat Fillets to Viedesi in Sun Vale. Reward: 1,470 councils.": "Доставьте 10 филе морского кота Вьедеси в Солнечную Долину. Награда: 1,470 советов."
"Deliver 99 Sea Cat Fillets to Sheyna in Rahu. Reward: 26,474 councils.": "Доставьте 99 филе морского кота Шейне в Раху. Награда: 26,474 совета."
"Deliver 10 Sea Trout Fillets to Viedesi in Sun Vale. Reward: 1,875 councils.": "Доставьте 10 филе морского фореля Виедеси в Солнечную Долину. Награда: 1,875 советов."
"Deliver 99 Sea Trout Fillets to Sheyna in Rahu. Reward: 34,070 councils.": "Доставьте 99 филе морского фореля Шейне в Раху. Награда: 34 070 советов."
"Steven Poplar in Statehelm said, \"You've proven yourself capable on the battlefield. I wonder if you would like to learn of another way to help Arisetsu's mission?\n\nIt's a bit unorthodox. I'm sure my higher-ups in the church wouldn't approve. But I think it's worthwhile.\n\nI'm sorry for being vague. You see, I promised someone that I'd let them vet anyone I wanted to pass on this knowledge to. He's dead, but his wife will know what he was looking for. Go get her blessing to learn the secret. Fransesca is in the wizard school. Yes, she's a necromancer. But she's one of the good ones. Trust me.\"": "Стивен Поплар в Стейтхелме сказал: «Ты доказал свою способность на поле боя. Интересно, хочешь ли ты узнать о другом способе помочь миссии Арисецу?\n\nЭто немного необычно. Я уверен, что мои начальники в церкви не одобрят. Но я считаю, что это стоит того.\n\nИзвини за расплывчатость. Видишь ли, я обещал одному человеку, что позволю ему проверять каждого, кому я захочу передать эти знания. Он мёртв, но его жена знает, что он искал. Иди и получи её благословение на изучение секрета. Франсеска в школе волшебников. Да, она некромант. Но она из хороших. Поверь мне."
"Tremmond Blackhammer in Povus said, \"The orcs have special armor techniques that even I don't know... and I deserve to know them!\n\nThat greenskin girl can forge. I've seen her making parts for her cages: she handles a hammer like a pro. So why won't she tell me how to make orcish armor?!\n\nWhy don't you try? See if she'll tell you anything.\"": "Треммонд Блэкхэммер в Повусе сказал: «У орков есть особые техники изготовления брони, о которых не знаю даже я... а я заслуживаю их знать!\n\nТа зелёнокожая девушка умеет ковать. Я видел, как она делает детали для своих клеток: она обращается с молотом как профессионал. Так почему же она не хочет рассказывать, как делать орочью броню?!\n\nПочему бы тебе не попробовать? Посмотри, расскажет ли она тебе что-нибудь."
"Tremmond Blackhammer in Povus said, \"Back when Povus was growing, we had good relations with certain individual orcs. There is one orc who might help me learn the secrets of orcish armorsmithing: Brugo. He calls himself Brugo The Wise. I understand he's still in the area, although not in the orc camp. See if you can find him. See if he'll teach his secrets.\"": "Треммонд Блэкхаммер в Повусе сказал: «Когда Повус только развивался, у нас были хорошие отношения с некоторыми отдельными орками. Есть один орк, который может помочь мне узнать тайны орочьего кузнечного дела: Бруго. Он называет себя Бруго Мудрым. Насколько я понимаю, он всё ещё в этих краях, хотя и не в орочьем лагере. Попытайся найти его. Посмотри, согласится ли он поделиться своими секретами.»"
"Zazzamath in The Rubywall in Vidaria said, \"You've already drained SO MUCH life from this world, it's glorious. But now let's get more targeted... sentient creatures feel more suffering than the others, so focus on them!\"": "Заззамат в Рубиновом Барьере в Видарии сказал: «Ты уже истощил ТАК МНОГО жизни в этом мире, это великолепно. Но теперь давай будем более избирательны... разумные существа чувствуют больше страданий, чем остальные, так что сосредоточься на них!»"
"Ser Hackley in Statehelm said, \"If you're going to take care of the sneaky sewer fae, you might as well go a bit beyond that point and look for an outbreak of sentient mushroom people.\n\nLook, that's what the report says. I haven't met any mushroom people personally, but magic can do a lot of terrible things. Remember not to breathe weird spores!\"": "Сэр Хакли в Стейтхелме сказал: «Если собираешься разобраться с хитрыми канализационными феями, можешь зайти чуть дальше и поискать вспышку разумных грибных существ.\n\nВот что говорится в отчёте. Я лично не встречал грибных существ, но магия может творить много ужасных вещей. Не забывай не вдыхать странные споры!"
"Gasu'um in New Prestonbule said, \"There is a necklace I wish to have returned to me. It was my mother's, and she gave it to me. To ME! Because I was her favorite! My worthless brother stole it from me... and then... I had to leave it behind.\n\nLeave this cave and venture right. You will see the camp of the feckless Aguva clan... go past them. Continue right until you find the camp on a hill.  That camp is what remains of the Uga'th clan. The necklace is in there somewhere.\"": "Гасу'ум в Новом Престонбуле сказал: «Есть ожерелье, которое я хочу вернуть себе. Оно принадлежало моей матери, и она подарила его мне. МНЕ! Потому что я была её любимой! Мой никчёмный брат украл его у меня... а потом... мне пришлось оставить его позади.\n\nВыйди из этой пещеры и иди направо. Ты увидишь лагерь беспутного клана Агува... пройди мимо них. Продолжай идти направо, пока не найдёшь лагерь на холме. Этот лагерь — то, что осталось от клана Уга'тх. Ожерелье где-то там."
"Baroness Marith Felgard in Serbule Hills said, \"I know that most of the farms in Serbule Hills have been abandoned, but I still need to soil samples from each one. It's part of my scientific duties, you understand. Here. Put a bit of soil from each farm in here and bring it back. Simple as cake! And I shall award you 700 Councils.\"": "Баронесса Марит Фелгард в Сербульских холмах сказала: «Я знаю, что большинство ферм в Сербульских холмах заброшены, но мне всё равно нужны образцы почвы с каждой из них. Это часть моих научных обязанностей, понимаете. Вот. Возьмите немного почвы с каждой фермы и принесите сюда. Проще простого! И я награжу вас 700 Советов.»"
"Deliver 10 Serbule-Style Lamb Chops to Fitz the Boatman on the Serbule docks. Reward: 1,615 councils.": "Доставьте 10 бараньих отбивных по-сербульски Фитцу Лодочнику на причалы Сербуля. Награда: 1,615 советов."
"Deliver 10 Serpentines to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 Змеиных камней Виедеси в Солнечную Долину. Награда: 4 760 советов."
