"Deliver 10 Violet Bouquets to Sheyna in Rahu. Reward: 4,447 councils.": "Доставьте 10 фиолетовых букетов Шейне в Раху. Награда: 4,447 советов."
"Deliver 10 Violets to Fitz the Boatman on the Serbule docks. Reward: 883 councils.": "Доставьте 10 фиалок Фитцу Лодочнику на причалы Сербуля. Награда: 883 совета."
"Deliver 10 Viper Fangs to Sheyna in Rahu. Reward: 1,595 councils.": "Доставьте 10 клыков гадюки Шейне в Раху. Награда: 1 595 советов."
"Raina in the Fae Realm said, \"You really should talk to Crelpin about your pets. Who knows what they might have gone through?\"": "Райна в Области Фей сказала: «Тебе действительно стоит поговорить с Крелпином о своих питомцах. Кто знает, через что им, возможно, пришлось пройти?»"
"Raina in the Fae Realm said, \"Felmer can be a handy person to know when things get... Um... chaotic. You should say hello.\"": "Райна в Фейском мире сказала: «Фелмер может быть полезным знакомым, когда дела становятся... эээ... хаотичными. Тебе стоит поздороваться.»"
"Raina in the Fae Realm said, \"Midge the Apothecary lost her memory also! Maybe she can help you with yours!\"": "Райна в Царстве Фей сказала: «Мидж Аптекарь тоже потеряла память! Может быть, она сможет помочь тебе с твоей!»"
"Raina in the Fae Realm said, \"Pegast may be able to use muscle memory to remind you about some basic skills. \"": "Райна в Области Фей сказала: «Пегаст может использовать мышечную память, чтобы напомнить вам о некоторых базовых навыках.»"
