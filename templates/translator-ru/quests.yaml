"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Amazing Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Потрясающие стрелы из Резервуара. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
