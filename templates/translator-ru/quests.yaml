"Deliver 10 Sets of Shoddy Cow Shoes to Fitz the Boatman on the Serbule docks. Reward: 352 councils.\nNote from orderer: <i>\"Please send your most uncomfortable cow shoes.\"</i>": "Доставьте 10 наборов некачественных коровьих башмаков Фитцу Лодочнику на причалы Сербуля. Награда: 352 совета.\nПримечание от заказчика: <i>«Пожалуйста, пришлите самые неудобные коровьи башмаки.»</i>"
"Deliver 10 Sets of Shoddy Deer Shoes to Fitz the Boatman on the Serbule docks. Reward: 352 councils.\nNote from orderer: <i>\"I am putting horseshoes on wild deer for... reasons... and need a quantity of your least-expensive wares.\"</i>": "Доставьте 10 наборов некачественных оленьих башмаков Фитцу Лодочнику на причалы Сербуля. Награда: 352 совета.\nПримечание от заказчика: <i>«Я подковываю диких оленей по... определённым причинам... и мне нужно большое количество ваших самых дешёвых товаров.»</i>"
"Asparagus in Statehelm said, \"Well, your actions have incriminated you now, so you can see it through with me if you want to. I'm setting up a trade with a friend who lives out of town. Help me get the rest of this crap, and I'll let you in on the action.\"": "Спаржа в Стейтхелме сказал: «Ну, твои действия теперь тебя компрометируют, так что можешь довести это дело до конца вместе со мной, если хочешь. Я организую сделку с другом, который живёт за городом. Помоги мне собрать оставшийся хлам, и я посвящу тебя в дело.»"
"Bogaku in the Rahu Sewers said, \"The ratkin are farming fish in here... freshwater fish! That's not unusual further inland, but this close to the sea, it seems odd, doesn't it? Maybe these fish are atypical somehow. Oh, you don't understand biology anyway... look, just get me a bunch of these fish, okay?\"": "Богака в канализации Раху сказал: «Крысолюди разводят здесь рыбу... пресноводную рыбу! Это не удивительно в глубине материка, но так близко к морю — странно, не правда ли? Может, эта рыба как-то необычна. О, ты всё равно не понимаешь биологию... Ладно, просто принеси мне кучу этой рыбы, хорошо?»"
"Ser Hackley in Statehelm said, \"The sewers use a magical solvent to clean and repurpose waste material, and they're supposed to be maintenance-free. Hah. I need you to go down there and clear out some of the clogs in the system. Can you do that? Here's a key to the sewer manholes. Don't get killed down there.\n\n<i>[Manholes Unlocked!]</i>\"": "Сэр Хакли в Стейтхелме сказал: «Канализация использует магический растворитель для очистки и повторного использования отходов, и она должна быть без обслуживания. Ха. Мне нужно, чтобы ты спустился туда и прочистил некоторые засоры в системе. Сможешь справиться? Вот ключ от канализационных люков. Не погибни там.\n\n<i>[Люки разблокированы!]</i>"
"Lady Windsong in Rahu said, \"There are crystals down in the sewer which remove filth, salt, and any other contaminants from the water. Quite amazing magic! But we do not know how long the magic will last, so each year we test the water. Can you do it this year?\n\nHere is the special beaker I was given. I counted ten pools of water with functioning crystal fountains. Wade into each pool and test the water in the center of the room. The beaker will hum if the water is clean and screech horribly if there is a problem.\"": "Леди Виндсонг в Раху сказала: «В канализации есть кристаллы, которые удаляют грязь, соль и другие загрязнения из воды. Довольно удивительная магия! Но мы не знаем, как долго она продержится, поэтому каждый год мы проверяем воду. Можешь сделать это в этом году?\n\nВот специальный стаканчик, который мне дали. Я насчитала десять водоёмов с работающими кристальными фонтанами. Зайди в каждый водоём и протестируй воду в центре комнаты. Стаканчик зазвучит, если вода чистая, и ужасно заскрипит, если есть проблема."
"Sir Coth in Serbule has asked you to go clear out the \"sewer portal\" which has become filled with annoying giant rats.": "Сэр Кот в Сербуле попросил вас очистить «канальный портал», который заполнился надоедливыми гигантскими крысами."
