"Deliver 100 Simple Throwing Knives to Fitz the Boatman on the Serbule docks. Reward: 1,100 councils.": "Доставьте 100 простых метательных ножей Фитцу Лодочнику на доках Сербуля. Награда: 1 100 советов."
"Sir Coth in Serbule has asked you to see if Rita has feelings for him. Presumably by asking her.": "Сэр Кот в Сербуле попросил тебя узнать, испытывает ли Рита к нему чувства. Вероятно, просто спросив её."
"Deliver 10 Sirine Cheese to Ogamboe in the Fae Realm. Reward: 20,951 councils.": "Доставьте 10 сыров Сирин Огамбо в Царство Фей. Награда: 20,951 совет."
"Unora's sending stone in Gazluk said, \"I have a syllabus that would keep you busy for months. I was told to make sure you \"got your Councils' worth\" from your tuition! But in your case, that would just be wasting both of our time. Don't you agree?\n\nLet's skip ahead to the end.\n\nReturn to the metal dodecahedron outside, say 'Ossugazak 99', and kill them with Ice Magic. Don't die. This is your final exam.\n\n<i>[Must use Ice Magic to advance this quest.]</i>\"": "Камень связи Уноры в Газлуке сказал: «У меня есть учебный план, который занял бы тебя на месяцы. Мне сказали убедиться, что ты «получишь максимум от Советов» за свою учёбу! Но в твоём случае это просто пустая трата времени для нас обоих. Ты не согласен?\n\nДавай сразу перейдём к концу.\n\nВернись к металлическому додекаэдру снаружи, скажи «Оссугазак 99» и убей их с помощью Ледяной магии. Не умирай. Это твой финальный экзамен.\n\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Malvol has asked you to obtain Basic Metal Slabs. These can be acquired with the Mining skill.": "Мальвол попросил вас добыть Простые металлические плиты. Их можно получить с помощью навыка Горное дело."
"Yogzi in Sun Vale wants a bunch of Good Metal Slabs.": "Йогзи в Солнечной Долине хочет получить кучу хороших металлических плит."
"Deliver 10 Slave's Cheese to Ogamboe in the Fae Realm. Reward: 7,235 councils.": "Доставьте 10 сыров раба Огамбо в Области Фей. Награда: 7,235 советов."
"Deliver 10 Slightly Sub-Par Fruit Cocktails to Fitz the Boatman on the Serbule docks. Reward: 1,313 councils.": "Доставьте 10 чуть хуже обычного фруктовых коктейлей Фитцу Лодочнику на причалы Сербуля. Награда: 1,313 советов."
"A rakshasa named Zealo asked you to collect toxic sludge for her potions.": "Ракшаса по имени Зеало попросила тебя собрать токсичную слизь для её зелий."
"Deliver 10 Small Dinosaur Scales to Fitz the Boatman on the Serbule docks. Reward: 163 councils.": "Доставьте 10 маленьких динозавровых чешуек Фитцу Лодочнику на доки Сербуля. Награда: 163 совета."
"Deliver 10 Small Gold Dragon Statues to Viedesi in Sun Vale. Reward: 4,417 councils.": "Доставьте 10 маленьких золотых статуэток дракона Вьедеси в Солнечную Долину. Награда: 4,417 советов."
"Deliver 10 Small Gold Gryphon Statues to Viedesi in Sun Vale. Reward: 4,386 councils.": "Доставьте 10 маленьких золотых статуэток грифона Вьедеси в Солнечную Долину. Награда: 4,386 советов."
"Truxartis in Vidaria said, \"I have need of small hate pearls. But they must be extraordinarily... fresh, and must come from a living creature. I can't use those worthless manufactured hate pearls!\n\nSpeak with Grasuul to learn what blood is fresh today. Hunt those creatures. But be warned -- some creatures are more hateful than others. I am content to wait a day or two if necessary.\"": "Труксартис в Видарии сказал: «Мне нужны маленькие жемчужины ненависти. Но они должны быть чрезвычайно... свежими и должны быть взяты от живого существа. Я не могу использовать эти никчёмные искусственные жемчужины ненависти!\n\nПоговори с Грасуулом, чтобы узнать, чья кровь сегодня свежая. Охоться на этих существ. Но будь осторожен — некоторые существа более злобны, чем другие. Я готов подождать день или два, если потребуется."
"Deliver 10 Small Silver Dragon Statues to Viedesi in Sun Vale. Reward: 2,553 councils.": "Доставьте 10 маленьких серебряных статуэток дракона Виедеси в Солнечную Долину. Награда: 2,553 совета."
"Deliver 10 Small Silver Gryphon Statues to Viedesi in Sun Vale. Reward: 2,533 councils.": "Доставьте 10 маленьких серебряных статуэток грифона Виедеси в Солнечную Долину. Награда: 2,533 совета."
"Deliver 10 Smallmouth Bass Fillets to Viedesi in Sun Vale. Reward: 2,829 councils.": "Доставьте 10 филе окуня Виедеси в Солнечную Долину. Награда: 2,829 советов."
"Deliver 99 Smallmouth Bass Fillets to Sheyna in Rahu. Reward: 52,531 councils.": "Доставьте 99 филе малого окуня Шейне в Раху. Награда: 52,531 совета."
"Gurki asked you for some Floral Soap.": "Гурки попросил у вас немного Цветочного мыла."
"Bendith in the Fae Realm said, \"Last time I was banished from the Winter Court, I had the good sense to prepare first. But this time I was caught off-guard. I miss some of the silliest things, like the desserts served with military meals. If you wage battle with Winter Court Scouts, please search the fallen for candied ice beetles. I'll reward you!\n\nIt may be hard to find a scout that hasn't eaten all their beetles yet... I know! Look for especially thin scouts.\"": "Бендит в Фейском царстве сказал: «В прошлый раз, когда меня изгнали из Зимнего Двора, у меня хватило ума подготовиться заранее. Но в этот раз меня застали врасплох. Я скучаю по самым глупым вещам, например, по десертам, которые подают с военными обедами. Если будешь сражаться с разведчиками Зимнего Двора, пожалуйста, ищи среди павших засахаренных ледяных жуков. Я тебя вознагражу!\n\nМожет быть трудно найти разведчика, который ещё не съел всех своих жуков... Знаю! Ищи особенно худых разведчиков."
"Yogzi in Sun Vale wants evidence of snail armor. He believes an innkeeper in Eltibule can teach the technique. A simple pair of snail-shell boots should suffice.": "Йогзи в Солнечной Долине хочет доказательства существования доспехов из улитки. Он считает, что трактирщик в Элтибуле может научить этой технике. Простая пара ботинок из раковины улитки должна подойти."
"The Suspicious Cow in Eltibule said, \"Why did you take so long to show up? It's because I said I needed help with snails, isn't it? You aren't taking me seriously! These aren't normal snails, they're huge snails! Bigger than a cow! BIGGER THAN A COW!\n\nAn incredible number of snails have hatched and they're ruining everything. They're in the east, they're in the west... at least they aren't in the north, but that's only because the horrible gnashers and uraks can eat them. They're EVERYWHERE ELSE! And guess what snails eat? GRASS! They eat my herd's food! So maybe it's not life or death today, but just you wait! I had to call for help! So get to it, Warden!\"": "Подозрительная корова в Элтибуле сказала: «Почему ты так долго появляешься? Это потому, что я сказала, что мне нужна помощь со слизнями, да? Ты меня не воспринимаешь всерьёз! Это не обычные слизни, это огромные слизни! Больше коровы! БОЛЬШЕ КОРОВЫ!\n\nНевероятное количество слизней вылупилось, и они всё портят. Они на востоке, они на западе... по крайней мере, их нет на севере, но это только потому, что ужасные гнаши и ураки могут их съесть. Они ВЕЗДЕ ИНОГДА! И знаешь, что едят слизни? ТРАВУ! Они едят еду моего стада! Так что, может, сегодня это не вопрос жизни и смерти, но просто подожди! Мне пришлось звать на помощь! Так что берись за дело, Хранитель!"
"Deliver 10 Snail Sinews to Thimble Pete in Hogan's Keep, Eltibule. Reward: 805 councils.": "Доставьте 10 жил улитки Тимбл Питу в Хоганском Крепости, Элтибул. Награда: 805 советов."
"Deliver 10 Snake Scales to Sheyna in Rahu. Reward: 1,125 councils.": "Доставьте 10 змеиных чешуек Шейне в Раху. Награда: 1 125 советов."
"Deliver 10 Snakemeat Wraps to Ogamboe in the Fae Realm. Reward: 5,981 councils.": "Доставьте 10 завёрток из змятины Огамбо в Фейском царстве. Награда: 5,981 советов."
"Ser Hackley in Statehelm said, \"I've got reliable reports that there are dangerous winter fairies hiding out somewhere in the sewer. They apparantly hide out in two of the big sewage-sieve rooms. Better take care of both rooms.\"": "Сэр Хакли в Стейтхелме сказал: «У меня есть надёжные сведения, что опасные зимние феи прячутся где-то в канализации. По-видимому, они скрываются в двух больших камерах с решётками для сточных вод. Лучше разобраться с обеими камерами.»"
"Syndra in Kur Mountains has asked for some wood for her fire. Any wood will do.": "Синдра в горах Кур попросила немного дров для своего костра. Подойдут любые дрова."
"Deliver 10 Soft Tofu to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,930 councils.": "Доставьте 10 Мягких Тофу Тримбл Питу в Крепость Хоган, Элтибуль. Награда: 15,930 советов."
"Deliver 10 Soft-Boiled Eggs to Fitz the Boatman on the Serbule docks. Reward: 884 councils.": "Доставьте 10 мягко сваренных яиц Фитцу Лодочнику на доках Сербуля. Награда: 884 совета."
"Bogaku in the Rahu Sewers said, \"I just don't understand how the necromancers convince their skeletons to mine! I'm not a necromancer myself, but I thought it was difficult to get them to do anything besides attack. Maybe there's a secret in the bones. Kill some and see if there's anything special about them.\"": "Богаку в канализации Раху сказал: «Я просто не понимаю, как некроманты заставляют своих скелетов копать! Я сам не некромант, но думал, что их трудно заставить делать что-то, кроме как атаковать. Может, в костях есть какой-то секрет. Убей несколько и посмотри, есть ли в них что-то особенное.»"
"Michael Irasce in Statehelm said, \"I've been trying to fill this book order for a long time! I have most of the requested titles but she only wants a 100% complete order. Here's the books I need.\"": "Майкл Айрэйс в Стейтхелме сказал: «Я долго пытался выполнить этот заказ на книги! У меня есть большинство запрошенных изданий, но она хочет получить только полностью комплектный заказ. Вот книги, которые мне нужны.»"
"Sourgum in Statehelm said, \"Ya know, this banana scheme really brought back memories. Me and my best friend Mophew used to run all kinds of crazy schemes like this! But he... died.\n\nNot really. He didn't die and that's the scary part! He <i>womanized</i>. I knew he was gay, and that was safe, you know? Mop was cute, but I'm not gay, so it wasn't a big deal. But now he's got knockers and he doesn't smell the same and I just... I don't know how to be his friend anymore. Her friend. You know?\n\nBut it seems crazy not to try to fix this somehow. Can you go and talk to him? Just get a feeling for where he's at mentally. He goes by Tessa now and works in the kitchen most days.\"": "Соургам в Стейтхелме сказал: «Знаешь, эта банановая история действительно вызвала воспоминания. Мы с моим лучшим другом Мофью раньше устраивали всякие сумасшедшие схемы! Но он... умер.\n\nНа самом деле нет. Он не умер, и это самое страшное! Он стал <i>женщиной</i>. Я знал, что он гей, и это было безопасно, понимаешь? Моп был симпатичным, но я не гей, так что это не было большой проблемой. Но теперь у него грудь, и он пахнет иначе, и я просто... не знаю, как быть его другом теперь. Её другом. Понимаешь?\n\nНо кажется безумным не попытаться как-то это исправить. Можешь пойти и поговорить с ним? Просто почувствовать, как у него с головой. Сейчас он зовётся Тессой и большую часть времени работает на кухне."
"Sourgum in Statehelm said, \"I know sticks. If it's one thing I know, that's it. That and finding precious resources. But mainly sticks, and I realized if I could coat the top half of my walking stick with a thick candy coat, I could lick the stick while I walk! ... it's childish, sure, but it would sell to the day-hikers of Statehelm! Any gimmick gets attention.\n\nThis is our ticket to riches: I'm cutting you in. You just need to do some legwork for us. First, I just need some food-grade wax. You do know you're way around a wax station, right? Great, great. Here's the recipe we need. Make us some of this.\"": "Соургам в Стейтхелме сказал: «Я разбираюсь в палках. Если есть что-то, в чём я силён, так это в этом. И в поиске ценных ресурсов. Но в основном в палках, и я понял, что если покрыть верхнюю часть моей трости толстым слоем карамели, я смогу лизать её, пока иду! ... это по-детски, конечно, но это понравится дневным туристам Стейтхелма! Любой трюк привлекает внимание.\n\nЭто наш билет к богатству: я делюсь с тобой. Тебе просто нужно сделать немного работы для нас. Сначала мне нужен пищевой воск. Ты же умеешь работать с восковой мастерской, правда? Отлично, отлично. Вот рецепт, который нам нужен. Сделай нам немного этого."
"Sourgum in Statehelm said, \"The wax was the hard part of my recipe. The rest is just candymaking. Here's what I need:\"": "Соургам в Стейтхелме сказал: «Воск был самой сложной частью моего рецепта. Остальное — просто приготовление сладостей. Вот что мне нужно:"
"Sourgum in Statehelm said, \"I was in my cups yesterday -- that's sailor slang, you probably don't know it -- it means I was EXTREMELY drunk. I've picked up a lot of sailor slang, but everyone knows I'm afraid of the ocean. On account of the krakens. So I pass out and when I wake up there's a note that says 'Your salami went sailing, come find us!'\n\nHa ha very funny, but the thing is, that salami was my latest experiment in creating the legendary Ur-Salami. And it seems to be a failed experiment! If anyone eats that salami, well... I might get in a lot of trouble. You gotta help.\n\nI bet those fuckers hid my salami aboard the ships out there. They would have stayed away from the Salty Slattern, if that's any help to ya. You should hurry. The stench is evil. And no snacking on it!\"": "Соургам в Стейтхелме сказал: «Вчера я был в своём репертуаре — это морской сленг, ты, наверное, не знаешь — значит, я был ОЧЕНЬ пьян. Я выучил много морского сленга, но все знают, что я боюсь океана. Из-за кракенов. Так вот, я отключился, а когда проснулся, там была записка: «Твоя салями уплыла, иди ищи нас!»\n\nХа-ха, очень смешно, но дело в том, что эта салями была моим последним экспериментом по созданию легендарной Ур-Салями. И, похоже, эксперимент провалился! Если кто-то съест эту салями, ну... у меня могут быть большие проблемы. Ты должен помочь.\n\nБьюсь об заклад, эти ублюдки спрятали мою салями на кораблях там. Они бы держались подальше от Солёной Слэттерн, если тебе это поможет. Тебе стоит поторопиться. Запах ужасен. И ни в коем случае не перекусывай ею!"
"Sourgum in Statehelm said, \"Something unexpected happened when I was making the candy for the staves. It had to be a fluke because I didn't expect it! Anyway, the candy's ruined. Everything's ruined. My hopes, my dreams...\n\nHaha, just kidding! I have a new, better idea. This is really my best one yet: cinammon-coated bananas! No. Cinnamon-BLASTED bananas! I think I have the perfect marketing strategy for 'em so bring me several samples.\"": "Соургам в Стейтхелме сказал: «Когда я делал конфеты для посохов, случилось нечто неожиданное. Это должно было быть случайностью, потому что я не ожидал этого! В любом случае, конфеты испорчены. Всё испорчено. Мои надежды, мои мечты...\n\nХа-ха, шучу! У меня есть новая, лучшая идея. Это действительно моя лучшая идея на сегодняшний день: бананы в корице! Нет. Бананы, взорванные корицей! Думаю, у меня есть идеальная маркетинговая стратегия для них, так что принеси мне несколько образцов."
"Sourgum in Statehelm said, \"See?! What did I tell you? We're gonna be rich! Slim wants a HUNDRED orders of those cinnamon-blasted bananas! And I'll split the profits with you right down the line! That's an old pirate term, you probably don't know it. It means an even split of the loot!\n\nGet to cookin' and don't let us down!\"": "Соургам в Стейтхелме сказал: «Видишь?! Что я тебе говорил? Мы разбогатеем! Слим хочет СОТНЮ заказов на эти проклятые бананы с корицей! И я поделюсь прибылью с тобой поровну! Это старый пиратский термин, ты, наверное, не знаешь. Он означает равный раздел добычи!\n\nПринимайся за готовку и не подведи нас!"
"Deliver 10 Soybeans to Korbok in Vidaria. Reward: 6,226 councils.": "Доставьте 10 соевых бобов Корбоку в Видарии. Награда: 6,226 советов."
"Mandibles in Red Wing Casino said, \"One of our VIP guests has requested a special variety of bread, and I do not know how to make it! Another guest told me that a human somewhere in Kur can teach the recipe, but of course that helps me very little. I am in dire need of this 'vegan nut barley bread', so if you manage to bake some, please bring it to me!\"": "Мандиблы в казино Красное Крыло сказали: «Один из наших VIP-гостей заказал особый сорт хлеба, а я не знаю, как его приготовить! Другой гость сказал, что где-то в Куре человек может научить рецепту, но, конечно, это мне мало помогает. Мне очень нужен этот «веганский орехово-ячменный хлеб», так что если тебе удастся его испечь, пожалуйста, принеси мне!»"
"Nishika in Rahu asked you to obtain oregano. She doesn't know where it comes from, but it's not from the desert.": "Нишика в Раху попросила тебя достать орегано. Она не знает, откуда он берётся, но точно не из пустыни."
"Deliver 10 Spicy Cavefishes to Laura Neth in Kur Mountains. Reward: 9,191 councils.": "Доставьте 10 острых пещерных рыб Лауре Нет в горах Кур. Награда: 9 191 совет."
"Deliver 10 Spicy Chickens to Laura Neth in Kur Mountains. Reward: 8,382 councils.": "Доставьте 10 острых куриц Лауре Нет в горах Кур. Награда: 8,382 совета."
"Deliver 10 Spicy Fried Tofu Cubes to Sheyna in Rahu. Reward: 18,203 councils.": "Доставьте 10 острых жареных кубиков тофу Шейне в Раху. Награда: 18,203 совета."
"Deliver 10 Spicy Lemon Cats to Sheyna in Rahu. Reward: 8,438 councils.": "Доставьте 10 острых лимонных котов Шейне в Раху. Награда: 8 438 советов."
"Deliver 10 Spicy Porcini Bites to Sheyna in Rahu. Reward: 6,474 councils.": "Доставьте 10 острых кусочков белого гриба Шейне в Раху. Награда: 6,474 совета."
"Deliver 10 Spicy Tofurkey Stir-Fry to Sheyna in Rahu. Reward: 21,099 councils.": "Доставьте 10 острых жареных тофурки Шейне в Раху. Награда: 21 099 советов."
"Deliver 10 Spider Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,769 councils.": "Доставьте 10 Зелий Усиления Паука 20% Иркиме в Казино Красное Крыло. Награда: 2,769 советов."
"Deliver 10 Spider Eggs to Irkima in Red Wing Casino. Reward: 456 councils.": "Доставьте 10 паучьих яиц Иркиме в казино Красное Крыло. Награда: 456 советов."
"Yetta has requested some spider legs.": "Йетта попросила несколько паучьих ног."
"Solgribue in the Fae Realm said, \"Want to help troll friends? Help with spiders on fire! Walk around all over near Firebird Mountain. Very scary to trolls. You kill. Good relations.\"": "Солгрибуэ в Фейском мире сказал: «Хочешь помочь друзьям-троллям? Помоги с пауками в огне! Ходят повсюду возле горы Огненной Птицы. Очень страшны для троллей. Ты убиваешь. Хорошие отношения.»"
"The Suspicious Cow in Eltibule said, \"There should be plenty of grazing space for the herd, but all these weird monsters are making life tough. Maybe if some of the fire spiders east of here were to mysteriously die...\"": "Подозрительная корова в Элтибуле сказала: «Для стада должно быть достаточно пастбища, но все эти странные монстры делают жизнь трудной. Может быть, если некоторые огненные пауки к востоку отсюда таинственным образом погибнут...»"
"Deliver 10 Spiderwebs to Fitz the Boatman on the Serbule docks. Reward: 461 councils.": "Доставьте 10 паутинных нитей Фитцу Лодочнику на причалах Сербуля. Награда: 461 совет."
"Percussa in Rahu said, \"Do you like my clothes? A wandering elven bard taught me how to make them! They're much stronger than they look, too. One of the secrets is spider silk, a cloth that's made from spiderwebs. I buy it from Shirogin, but he's been out of stock for months. If you find some spider silk, I'd love to buy it from you.\"": "Перкусса в Раху сказала: «Тебе нравится моя одежда? Бродячий эльфийский бард научил меня её делать! Она гораздо прочнее, чем кажется. Один из секретов — паучий шелк, ткань, сделанная из паутины. Я покупаю её у Широгина, но у него уже несколько месяцев нет в наличии. Если найдёшь паучий шелк, я с радостью куплю его у тебя.»"
"In a cave beneath Povus, you met a Forthragarian who told you not to go too far into the caves beyond him. But if you do go in, he asked you to look for a Spike of Autonomy.": "В пещере под Повусом вы встретили Фортрагарианца, который попросил вас не заходить слишком далеко в пещеры за ним. Но если вы всё же решите войти, он попросил вас найти Шип Автономии."
"Deliver 10 Spirit Stones to Thimble Pete in Hogan's Keep, Eltibule. Reward: 9,295 councils.": "Доставьте 10 Камней Духа Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 9,295 советов."
"Deliver 10 Spoons to Fitz the Boatman on the Serbule docks. Reward: 300 councils.\nNote from orderer: <i>\"Someone has stolen all the spoons from our tea set. Please hurry. The tea is not getting any fresher.\"</i>": "Доставьте 10 ложек Фитцу Лодочнику на причалы Сербуля. Награда: 300 советов.  \nПримечание от заказчика: <i>«Кто-то украл все ложки из нашего чайного сервиза. Поторопитесь, чай не становится свежее.»</i>"
"Julius Patton in Serbule Hills said, \"Do you know how to make spore bombs? I need some nice potent ones. I use 'em to scare away pests that get on the farm.\"": "Джулиус Паттон в Сербульских холмах сказал: «Ты умеешь делать споровые бомбы? Мне нужны хорошие мощные. Я использую их, чтобы отпугивать вредителей, которые появляются на ферме.»"
"Sagiso in Statehelm said, \"You're getting the hang of this! Keep spreading your messages to the sheep of Statehelm!\"": "Сагисо в Стейтхелме сказал: «Ты начинаешь в этом разбираться! Продолжай распространять свои послания овцам Стейтхелма!»"
"Floxie in the Fae Realm said, \"Oh hey, I had another botany idea. No, this one's great! See, you got me carnivine teeth, but I have nothing really to compare them to. Why don't you ALSO get me some spriggan weed teeth? Then I can compare them! Go, go! There's science to do!\"": "Флокси из Фейского царства сказала: «О, привет, у меня появилась ещё одна ботаническая идея. Нет, эта отличная! Видишь, у тебя есть зубы плотоядного растения, а у меня нет ничего, с чем можно было бы их сравнить. Почему бы тебе не сделать мне ещё и зубы сорняка сприггана? Тогда я смогу их сравнить! Вперёд, вперёд! Нужно заняться наукой!»"
"Deliver 10 Spruce Wood to Korbok in Vidaria. Reward: 1,875 councils.": "Доставьте 10 единиц ели Корбоку в Видарии. Награда: 1,875 советов."
"Deliver 99 Spruce Wood to Korbok in Vidaria. Reward: 35,083 councils.": "Доставьте 99 единиц ели Корбоку в Видарии. Награда: 35,083 совета."
"Umarak in Povus said, \"It'll soon be time for outdoor grilling again! And my grill was destroyed by orcs. But I can fix it! What I can't fix is the lack of fuel. How can I make perfect food without perfect fuel? It's impossible! I need spruce wood chips!\"": "Умарак в Повусе сказал: «Скоро снова будет время для барбекю на свежем воздухе! А мой гриль уничтожили орки. Но я могу его починить! То, что я не могу починить — это отсутствие топлива. Как я могу приготовить идеальную еду без идеального топлива? Это невозможно! Мне нужны щепки из еловой древесины!»"
"Deliver 10 Squash to Thimble Pete in Hogan's Keep, Eltibule. Reward: 982 councils.": "Доставьте 10 тыкв Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 982 совета."
"Deliver 10 Squash Soups to Laura Neth in Kur Mountains. Reward: 3,450 councils.": "Доставьте 10 тыквенных супов Лауре Нет в горах Кур. Награда: 3 450 советов."
"Dog Ear in Povus said, \"Since you're a Warden, maybe you can help me fix an imbalance. Ever since the rakshasa fishermen stopped coming to the river, the squid-beasts are getting out of control. They're even climbing out onto land now. They attack anything that comes near! It's making it hard for animals to get water. Can you remove some of the squids?\"": "Дог Эр в Повусе сказал: «Поскольку ты Страж, может, поможешь мне исправить дисбаланс. С тех пор как рыбачки-ракшасы перестали приходить к реке, кальмароподобные звери вышли из-под контроля. Теперь они даже выползают на сушу. Они нападают на всё, что приближается! Из-за этого животным трудно добраться до воды. Можешь убрать часть кальмаров?»"
"Deliver 10 Staff Boost Potion 20% to Irkima in Red Wing Casino. Reward: 3,976 councils.": "Доставьте 10 Зелий усиления посоха 20% Иркиме в Казино Красное Крыло. Награда: 3,976 советов."
"In a cave deep beneath Povus, you came across a wizard's stargazing apparatus. The view was too muddled to make out, though, due to damaged lenses.": "В пещере глубоко под Повусом вы наткнулись на прибор звездочёта волшебника. Однако из-за повреждённых линз обзор был слишком мутным, чтобы что-либо разглядеть."
"Help exterminate the myconain vagabonds that pop up wherever there are broken streetlamps at night.\n\n<i>[Progress is lost if you die.]</i>": "Помогите истребить миконских бродяг, которые появляются везде, где ночью горят сломанные уличные фонари.\n\n<i>[Прогресс теряется при смерти.]</i>"
"Help exterminate the ratkin muggers that have spread throughout the town.\n\n<i>[Quest can only be advanced at night.]</i>\n<i>[Progress is lost if you die.]</i>": "Помогите истребить разбойников-раткинов, которые распространились по всему городу.\n\n<i>[Задание можно выполнять только ночью.]</i>\n<i>[Прогресс теряется при смерти.]</i>"
"Drummond Stonecurl in Vidaria said, \"I wonder if there's any new discoveries about the demons. If you could bring me some more demonic research, I'd be grateful.\"": "Драммонд Стоункерл в Видарии сказал: «Интересно, есть ли какие-то новые открытия о демонах. Если ты принесёшь мне ещё немного демонических исследований, я буду признателен.»"
"Deliver 10 Steak and Cheese Wraps to Ogamboe in the Fae Realm. Reward: 9,996 councils.": "Доставьте 10 рулетов с говядиной и сыром Огамбо в Фейском царстве. Награда: 9 996 советов."
"Torgan in New Prestonbule said, \"Snapley told me the pitiful tale of the settlement outside. Here is a detail he did not know: the strike was ordered by General Naurlok himself, and was executed by his elite legion. And here is where things become interesting. For you see, ghosts often retain something of what they had when they died. And if they died with spear heads from Naurlok's Avengers still stuck in them... that metal is precious! I cannot even make it myself.\n\nYou should destroy some of those ghosts and see if you can find orcish metal. I will pay in Councils.\"": "Торган в Новом Престонбуле сказал: «Снэпли рассказал мне жалкую историю о поселении снаружи. Вот деталь, которую он не знал: удар был приказан самим генералом Наурлоком и выполнен его элитным легионом. И вот где начинается самое интересное. Видишь ли, призраки часто сохраняют что-то от того, что у них было при жизни. А если они умерли с наконечниками копий из легиона Мстителей Наурлока, всё ещё застрявшими в них... этот металл драгоценен! Я даже сам не могу его сделать.\n\nТебе следует уничтожить некоторых из этих призраков и попытаться найти орочий металл. Я заплачу советами."
"Tremmond Blackhammer in Povus said, \"I'm making some armor as a gift for my niece Stephie. It's a new neck-guard for the suit I made her.\n\nI need some parts, and I can't ask Stephie to get them for me or she'd know my plan. Can you do it? I'll give you some xogrite.\"": "Треммонд Блэкхэммер в Повусе сказал: «Я делаю доспехи в подарок моей племяннице Стефи. Это новый защитник шеи для доспеха, который я ей сделал.\n\nМне нужны некоторые детали, и я не могу просить Стефи достать их для меня, иначе она узнает о моём плане. Ты можешь это сделать? Я дам тебе немного ксогрита."
"Deliver 10 Stibnite to Irkima in Red Wing Casino. Reward: 3,379 councils.": "Доставьте 10 стибнита Иркиме в казино Красное Крыло. Награда: 3,379 советов."
"Willem Fangblade in Red Wing Casino said, \"I'm sorry to say this, but the last cheese didn't work out either. But this time I know exactly what's needed. I called in some expert help! I need a 'brunost' cheese, it's the best for the cheap wine I've been usin'. Guaranteed ta work this time. I fuckin' hope.\"": "Виллем Фэнгблейд в казино Красное Крыло сказал: «Мне жаль это говорить, но последний сыр тоже не удался. Но на этот раз я точно знаю, что нужно. Я позвал экспертов на помощь! Мне нужен сыр 'бруност', он лучший для дешёвого вина, которое я использовал. Гарантирую, что на этот раз сработает. Чёрт возьми, надеюсь.»"
"Deliver 10 Stilton Cheese to Ogamboe in the Fae Realm. Reward: 23,338 councils.": "Доставьте 10 сыров Стилтон Огамбо в Царство Фей. Награда: 23,338 советов."
"Jaime Fatholm asked for some Healing Potions.": "Хайме Фатхолм попросил несколько лечебных зелий."
"Deliver 10 Stomachs to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,000 councils.\nNote from orderer: <i>\"Big stomachs, small stomachs, good stomachs, evil stomachs, I don't care. Just get me stomachs for my cheesemaking!\"</i>": "Доставьте 10 желудков Тимбл Питу в Крепость Хогана, Элтибуле. Награда: 5 000 советов.  \nПримечание от заказчика: <i>«Большие желудки, маленькие желудки, хорошие желудки, злые желудки — мне всё равно. Просто принесите мне желудки для моего сыроварения!»</i>"
"Braigon mentioned needing more animal stomachs to make rennet.": "Брейгон упомянул, что нужны дополнительные животные желудки для приготовления сычужного фермента."
"Lamashu has asked for some meditation stools.": "Ламашу попросил несколько скамей для медитации."
"In a cave beneath Povus, you came upon a terrifying horde of aktaari seemingly bent on overtaking the continent! You only have a few minutes to find and destroy the Royal Eggs. Cheb has promised to give you a reward every time you kill three aktaari and squish three eggs.": "В пещере под Повусом вы наткнулись на ужасную орду актаари, которые, похоже, намерены захватить континент! У вас есть всего несколько минут, чтобы найти и уничтожить Королевские яйца. Чеб пообещал награждать вас каждый раз, когда вы убиваете трёх актаари и раздавливаете три яйца."
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to obtain some \"strange dirt -- you know, the kind that you sometimes find under mushrooms or corpses.\"": "Чарльз Томпсон, торговец в палатке за пределами Сербуля, попросил вас добыть немного «странной грязи — вы знаете, той, что иногда находишь под грибами или трупами.»"
"Deliver 10 Strange Dirt to Fitz the Boatman on the Serbule docks. Reward: 72 councils.": "Доставьте 10 единиц Странной земли Фитцу Лодочнику на доках Сербуля. Награда: 72 совета."
"Deliver 99 Strange Dirt to Korbok in Vidaria. Reward: 968 councils.": "Доставьте 99 единиц Странной грязи Корбоку в Видарии. Награда: 968 советов."
"Deliver 10 Strawberry Bowls to Fitz the Boatman on the Serbule docks. Reward: 1,291 councils.": "Доставьте 10 мисок с клубникой Фитцу Лодочнику на доках Сербуля. Награда: 1,291 советов."
"Deliver 10 Strawberry Ice Creams to Ogamboe in the Fae Realm. Reward: 6,356 councils.": "Доставьте 10 порций клубничного мороженого Огамбо в Царстве Фей. Награда: 6,356 советов."
"Deliver 10 Strawberry Shaved Ices to Ogamboe in the Fae Realm. Reward: 3,163 councils.": "Доставьте 10 клубничных ледяных десертов Огамбо в Царство Фей. Награда: 3,163 совета."
"In a cave deep beneath Povus, you found a giant lute-like instrument with missing enchanted strings. Looks like it'd need some pretty big ones.": "В пещере глубоко под Повусом вы нашли гигантский инструмент, похожий на лютню, но без зачарованных струн. Похоже, ему нужны очень большие струны."
"Kleave has asked you for some leather strips.": "Клив просил тебя принести несколько кожаных полосок."
"Deliver 10 Strong Acid Resistance Potions to Viedesi in Sun Vale. Reward: 8,861 councils.": "Доставьте 10 зелий сильной устойчивости к кислоте Вьедеси в Солнечной Долине. Награда: 8,861 советов."
"Deliver 10 Strong Electricity Resistance Potions to Viedesi in Sun Vale. Reward: 6,456 councils.": "Доставьте 10 крепких зелий сопротивления электричеству Вьедеси в Солнечной Долине. Награда: 6,456 совещаний."
"Deliver 10 Strong Hellfreeze Ointment to Korbok in Vidaria. Reward: 223,730 councils.": "Доставьте 10 крепких мазей Адского холода Корбоку в Видарии. Награда: 223,730 советов."
"Deliver 10 Stuffed Bell Peppers to Laura Neth in Kur Mountains. Reward: 7,425 councils.": "Доставьте 10 фаршированных перцев Лауре Нет в горах Кур. Награда: 7,425 советов."
"Deliver 10 Stuffed Squashes to Laura Neth in Kur Mountains. Reward: 3,299 councils.": "Доставьте 10 фаршированных тыкв Лауре Нет в горах Кур. Награда: 3 299 советов."
"Kalaba in Eltibule said, \"Did you know phlogiston comes in many quality levels? The worst kind is 'Unsturdy Phlogiston'. Well, Makara called it 'Shoddy Phlogiston'. Either way, it's garbage. Then there's 'Semi-Sturdy Phlogiston', which Makara calls 'Rough Phlogiston'. It's okay, but not very sturdy.\n\nWhat I need is Sturdy Phlogiston, which Makara called 'Crude Phlogiston'. Just bring it to me and I'll deliver it.\"\n\n<i>[Hint: Crude Phlogiston comes from magic items whose level is 30+. If you're only getting lower-grade phlogiston, you just need to transmute better items!]</i>": "Калаба в Элтибуле сказала: «Знаешь ли ты, что флогистон бывает разного качества? Худший сорт — «Ненадёжный флогистон». Макару называла его «Плохой флогистон». В любом случае, это мусор. Затем есть «Полуненадёжный флогистон», который Макару называла «Грубый флогистон». Он сойдёт, но не очень надёжен.\\n\\nМне нужен Надёжный флогистон, который Макару называла «Грубым флогистоном». Просто принеси его мне, и я доставлю его дальше.»\\n\\n<i>[Подсказка: Грубый флогистон получается из магических предметов уровня 30 и выше. Если у тебя получается только флогистон низшего сорта, тебе нужно трансмутировать более качественные предметы!]</i>"
"Deliver 10 Succulent Pork Chops to Fitz the Boatman on the Serbule docks. Reward: 1,164 councils.": "Доставьте 10 сочных свиных отбивных Фитцу Лодочнику на доках Сербуля. Награда: 1,164 совета."
"Deliver 10 Sugarcane to Ogamboe in the Fae Realm. Reward: 2,902 councils.": "Доставьте 10 сахарных тростников Огамбо в Области Фей. Награда: 2,902 совета."
"Deliver 10 Sulfur to Fitz the Boatman on the Serbule docks. Reward: 4,417 councils.": "Доставьте 10 единиц серы Фитцу Лодочнику на доках Сербуля. Награда: 4,417 советов."
"Deliver 99 Sulfur to Korbok in Vidaria. Reward: 98,570 councils.": "Доставьте 99 единиц серы Корбоку в Видарии. Награда: 98 570 советов."
"Willem Fangblade in Red Wing Casino said, \"I need more sulfur for my gem-cleaning solution, but for some reason sulfur is very rare around here, which makes no sense. None at all. Anyway if you find some, bring it here!\"": "Виллем Клыклезвие в казино Красное Крыло сказал: «Мне нужно больше серы для моего раствора для чистки самоцветов, но по какой-то причине сера здесь очень редкая, что совершенно непонятно. Совсем нет. В любом случае, если найдёшь немного, принеси сюда!»"
"Yetta has asked for some sulfur.": "Йетта попросила немного серы."
"Deliver 10 Sun Vale Teas to Laura Neth in Kur Mountains. Reward: 1,222 councils.": "Доставьте 10 чаёв Солнечной Долины Лауре Нет в горах Кур. Награда: 1,222 совета."
"Deliver 10 Sunfish Fillets to Viedesi in Sun Vale. Reward: 1,470 councils.": "Доставьте 10 филе солнечного окуня Виедеси в Солнечную Долину. Награда: 1,470 советов."
"Deliver 99 Sunfish Fillets to Sheyna in Rahu. Reward: 26,474 councils.": "Доставьте 99 филе солнечной рыбы Шейне в Раху. Награда: 26,474 совета."
"Deliver 10 Sunflower Bouquets to Korbok in Vidaria. Reward: 49,039 councils.": "Доставьте 10 букетов из подсолнухов Корбоку в Видарии. Награда: 49,039 советов."
"Deliver 10 Sunflowers to Korbok in Vidaria. Reward: 33,289 councils.": "Доставьте 10 подсолнухов Корбоку в Видарии. Награда: 33 289 советов."
"Deliver 10 Sunstones to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 солнечных камней Шейне в Раху. Награда: 4 930 советов."
"Deliver 10 Super Fishy Surprises to Laura Neth in Kur Mountains. Reward: 2,333 councils.": "Доставьте 10 Супер Рыбных Сюрпризов Лауре Нет в горах Кур. Награда: 2,333 совета."
"Deliver 10 Super-Shoddy Calligraphy Benches to Fitz the Boatman on the Serbule docks. Reward: 1,205 councils.\nNote from orderer: <i>\"Need very poor quality construction! These benches are for my least favorite pupils.\"</i>": "Доставьте 10 супер-убогих скамеек для каллиграфии Фитцу Лодочнику на причалы Сербуля. Награда: 1 205 советов.  \nПримечание от заказчика: <i>«Нужна очень плохого качества конструкция! Эти скамейки для моих наименее любимых учеников.»</i>"
"Deliver 10 Super-Shoddy Chairs to Fitz the Boatman on the Serbule docks. Reward: 859 councils.": "Доставьте 10 Очень Плохих Стульев Фитцу Лодочнику на причалы Сербуля. Награда: 859 советов."
"Deliver 10 Super-Shoddy Meditation Stools to Fitz the Boatman on the Serbule docks. Reward: 879 councils.": "Доставьте 10 супер-убогих скамеек для медитации Фитцу Лодочнику на доках Сербуля. Награда: 879 советов."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>superb metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>превосходные металлические слитки</b>. Ты можешь добыть их для меня?\n\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"Deliver 10 Superb Metal Slabs to Ogamboe in the Fae Realm. Reward: 7,680 councils.": "Доставьте 10 превосходных металлических плит Огамбо в Области Фей. Награда: 7,680 советов."
"Deliver 100 Superb Throwing Knives to Ogamboe in the Fae Realm. Reward: 8,281 councils.": "Доставьте 100 превосходных метательных ножей Огамбо в Фейском царстве. Награда: 8,281 совет."
"Deliver 10 Superjump Potions to Viedesi in Sun Vale. Reward: 11,223 councils.": "Доставьте 10 Зелий Суперпрыжка Вьедеси в Солнечную Долину. Награда: 11 223 совета."
"Deliver 10 Swamp Lilies to Korbok in Vidaria. Reward: 29,017 councils.": "Доставьте 10 болотных лилий Корбоку в Видарии. Награда: 29 017 советов."
"Deliver 10 Swamp Lily Bouquets to Korbok in Vidaria. Reward: 43,947 councils.": "Доставьте 10 букетов болотных лилий Корбоку в Видарии. Награда: 43 947 советов."
"Ailred in Povus said, \"The service here is truly awful. Do you know how long I've been waiting?! And I had to seat myself! But nevermind. Nevermind all that! I heard that this place makes a great swamp salad. I would like to try this dish.\"": "Эйлред в Повусе сказал: «Обслуживание здесь просто ужасное. Ты знаешь, сколько я ждал?! И мне пришлось самому искать место! Но неважно. Неважно всё это! Я слышал, что здесь готовят отличный болотный салат. Я бы хотел попробовать это блюдо.»"
"Deliver 10 Swamp Salads to Ogamboe in the Fae Realm. Reward: 6,729 councils.": "Доставьте 10 Болото-салатов Огамбо в Царство Фей. Награда: 6,729 советов."
"Ser Lorentz in Vidaria said, \"I knew I forgot something! When I asked you to kill those swarmers, you were supposed to scoop up their brains and bring them back. The mages have a 'theory'.\n\nI know this wasn't your fault, so I'm happy to overlook this incident if you can head back out into the field and get those brains.\"": "Сэр Лоренц в Видарии сказал: «Я знал, что что-то забыл! Когда я просил тебя убить этих роющих, ты должен был собрать их мозги и принести обратно. Маги имеют «теорию».\n\nЯ понимаю, что это не твоя вина, поэтому готов закрыть глаза на этот инцидент, если ты сможешь вернуться в поле и достать эти мозги."
"Deliver 10 Sweet and Numb Chickens to Irkima in Red Wing Casino. Reward: 4,884 councils.": "Доставьте 10 сладких и онемевших куриц Иркиме в казино Красное Крыло. Награда: 4,884 совета."
"Deliver 10 Sweet-Roasted Pumpkins to Ogamboe in the Fae Realm. Reward: 10,008 councils.": "Доставьте 10 сладких жареных тыкв Огамбо в Фейском мире. Награда: 10 008 советов."
"Deliver 10 Swimming Potions to Irkima in Red Wing Casino. Reward: 2,858 councils.": "Доставьте 10 зелий плавания Иркиме в казино Красное Крыло. Награда: 2,858 советов."
"Deliver 10 Sword Boost Potion 20% to Irkima in Red Wing Casino. Reward: 5,541 councils.": "Доставьте 10 Зелий усиления меча 20% Иркиме в казино Красное Крыло. Награда: 5,541 советов."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>tack hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>молотки для крепления</b>. Ты можешь сделать несколько для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10 Tack Hammers to Sheyna in Rahu. Reward: 5,586 councils.": "Доставьте 10 молотков для обивки Шейне в Раху. Награда: 5,586 советов."
"Deliver 10 Tagenite Stacks to Sheyna in Rahu. Reward: 5,304 councils.": "Доставьте 10 стопок тагенита Шейне в Раху. Награда: 5,304 совета."
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Decent Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Райм сказал: «Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый приличный костюм из ткани, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Quality Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Райм сказал: «Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый качественный костюм из ткани, и я посмотрю, чем могу помочь тебе преуспеть в ремесле!»"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Rough Cloth suit and I will see what I can do to help you flourish at your craft! I only want the enchanted version of the suit... I don't deal with non-enchanted crap!\"": "Райм сказал: «Хочешь обменяться знаниями, чтобы продвинуть свои навыки? Принеси мне один полностью сшитый костюм из Грубой ткани, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле! Мне нужна только зачарованная версия костюма... Я не работаю с незачарованным хламом!»"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Amazing Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Райм сказал: «Хочешь обменяться знаниями, чтобы развить свои навыки? Принеси мне один полностью сшитый костюм из Потрясающей ткани, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Raim said, \"Want to swap some knowledge to progress your skills? Bring me one full crafted Awesome Cloth suit and I will see what I can do to help you flourish at your craft!\"": "Райм сказал: «Хочешь обменяться знаниями, чтобы продвинуться в своих навыках? Принеси мне один полностью сшитый потрясающий костюм из ткани, и я посмотрю, что смогу сделать, чтобы помочь тебе преуспеть в ремесле!»"
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to talk to Mushroom Jack about the giant mushrooms near Serbule.": "Чарльз Томпсон, торговец в палатке за пределами Сербуля, попросил вас поговорить с Грибным Джеком о гигантских грибах возле Сербуля."
"Maybe you should talk to Harry about how to fix your unfortunate cow-hood. If there's one person who knows animal transformation curses, it's Harry.": "Возможно, тебе стоит поговорить с Гарри о том, как исправить твоё несчастное коровье состояние. Если кто и разбирается в проклятиях превращения в животных, так это Гарри."
"Sir Coth in Serbule has asked you to kill Augmented Mantis Slaves. They are past the farmlands outside of Serbule.": "Сэр Кот в Сербуле попросил вас убить Усиленных рабов-богомолов. Они находятся за сельскохозяйственными угодьями за пределами Сербула."
"Deliver 10 Tart Applesauces to Ogamboe in the Fae Realm. Reward: 9,979 councils.": "Доставьте 10 кислых яблочных соусов Огамбо в Царство Фей. Награда: 9,979 советов."
"Deliver 10 Tasty Cranberry Sauces to Irkima in Red Wing Casino. Reward: 5,119 councils.": "Доставьте 10 Вкусных клюквенных соусов Иркиме в казино Красное Крыло. Награда: 5,119 советов."
"Deliver 10 Tasty Gingerbread Humans to Irkima in Red Wing Casino. Reward: 2,423 councils.": "Доставьте 10 вкусных пряничных человечков Иркиме в казино Красное Крыло. Награда: 2 423 совета."
"Squidlips in Sun Vale said, \"The ocean perch tend to stay away from this area. They know I'll catch 'em! But I don't really want to get up right now. Sitting on the beach just relaxing feels so good. Anyway, can you bring me a passel of perch? The freshest ones are the ones you catch yourself!\"": "Кальмолапы в Солнечной Долине сказали: «Океанские окуни обычно держатся подальше от этой местности. Они знают, что я их поймаю! Но сейчас я совсем не хочу вставать. Просто сидеть на пляже и отдыхать — это так приятно. В любом случае, можешь принести мне охапку окуней? Самые свежие — это те, которых ты поймаешь сам!»"
"Deliver 10 Tasty Ratkin Aparatifs to Ogamboe in the Fae Realm. Reward: 18,071 councils.": "Доставьте 10 вкусных закусок раткинов Огамбо в Фейском мире. Награда: 18,071 совет."
"Deliver 10 Tattered Red Books to Gremix in Amulna. Reward: 288 councils.": "Доставьте 10 порванных красных книг Гремиксу в Амульне. Награда: 288 советов."
"Deliver 10 Telemea Cheese to Ogamboe in the Fae Realm. Reward: 21,746 councils.": "Доставьте 10 сыров Телемеа Огамбо в Царство Фей. Награда: 21 746 советов."
"Furlak in Rahu asked you to find a perfume called Telka's Tail. He suggested rakshasa bandits might have it.": "Фурлак в Раху попросил тебя найти духи под названием Хвост Тельки. Он предположил, что у разбойников ракшасов они могут быть."
"Deliver 10 Telka's Teeth (\"Baby Tooth\" Variety) to Ogamboe in the Fae Realm. Reward: 4,885 councils.\nNote from orderer: <i>\"I love to try exotic drugs from far-away lands! But please use only clean teeth.\"</i>": "Доставьте 10 зубов Тельки (разновидность «Молочный зуб») Огамбо в Фейское королевство. Награда: 4 885 советов.  \nПримечание от заказчика: <i>«Я люблю пробовать экзотические наркотики из дальних земель! Но, пожалуйста, используйте только чистые зубы.»</i>"
"Deliver 10 Telka's Teeth (\"Molar\" Variety) to Ogamboe in the Fae Realm. Reward: 14,285 councils.\nNote from orderer: <i>\"I love to try exotic drugs from far-away lands! But please use only clean teeth.\"</i>": "Доставьте 10 зубов Тельки (разновидность «коренной») Огамбо в Фейское Королевство. Награда: 14 285 советов.  \nПримечание от заказчика: <i>«Я люблю пробовать экзотические наркотики из дальних стран! Но, пожалуйста, используйте только чистые зубы.»</i>"
"Deliver 10 Tench Fillets to Viedesi in Sun Vale. Reward: 2,258 councils.": "Доставьте 10 филе линя Виедеси в Солнечную Долину. Награда: 2,258 советов."
"Deliver 99 Tench Fillets to Sheyna in Rahu. Reward: 41,456 councils.": "Доставьте 99 филе леща Шейне в Раху. Награда: 41 456 советов."
"Mope in Povus said, \"You wish to aid me? Then exterminate the ratkin root-tenders that constantly try to unearth my fungus!\"": "Моп в Повусе сказал: «Ты хочешь помочь мне? Тогда истреби корнеухаживающих крысолюдей, которые постоянно пытаются выкопать мой гриб!»"
"Mope in Povus said, \"If you were to exterminate more ratkin root-tenders, I would be in your debt.\"": "Моуп в Повусе сказал: «Если ты истребишь больше корнеухаживающих крысолюдей, я буду тебе признателен.»"
"It appears that the \"entrance exam\" to become a student of Statehelm's bard college requires you to slay some sort of creature.": "Похоже, что «вступительный экзамен», чтобы стать студентом колледжа бардов Стейтхельма, требует от вас убить какое-то существо."
"Ser Lorentz in Vidaria said, \"Well if you think you're a capable fighter, we can always use help dealing with the demonic swarmers. Be careful, or they'll overwhelm you!\"": "Сэр Лоренц в Видарии сказал: «Если ты считаешь себя способным бойцом, мы всегда можем использовать помощь в борьбе с демоническими роющими. Будь осторожен, иначе они тебя перегрузят!»"
"Skitters in Statehelm said, \"It's what I feared. Our friend Hamilton has spotted a gigantic spider climbing out of the sewer at night. He hasn't seen how the spider returns -- it probably uses a different entrance -- but we can surmise that this is what is killing the sentient animals in Statehelm.\n\nHamilton says that he heard a clicking sound of a door opening right before he saw the spider. Look for a lever or mechanism that opens a door. And be ready for a fight.\n\nYou will doubtless need to kill this spider. But I don't believe it is a simple unintelligent spider. It is too cunning. Figure out what it was up to!\"": "Скиттерс в Стейтхелме сказал: «Это то, чего я боялся. Наш друг Гамильтон заметил гигантского паука, вылезавшего из канализации ночью. Он не видел, как паук возвращается — вероятно, он использует другой вход — но мы можем предположить, что именно он убивает разумных животных в Стейтхелме.\n\nГамильтон говорит, что перед тем, как увидеть паука, он услышал щёлкающий звук открывающейся двери. Ищи рычаг или механизм, который открывает дверь. И будь готов к бою.\n\nТебе, без сомнения, придётся убить этого паука. Но я не думаю, что это простой неразумный паук. Он слишком хитёр. Выясни, что он замышляет!"
"Mirraverre has asked you to find and destroy ten \"anxiety propagators\" hidden throughout the dream realm.": "Мирраверр попросил вас найти и уничтожить десять «распространителей тревоги», скрывающихся по всему царству снов."
"Sam Veilmoor in Statehelm said, \"Oh, I'm fine! It's just that I've been worried. Worried sick, actually. I've heard my daughter's in trouble financially. She's... estranged. And her father has all but disowned her, and I understand why. Kind of agree with him.\n\nBut she's my daughter and I can't just watch as she ruins her life.\n\nMaybe I'm overreacting. Could you check in on her? Her name is Helena Veilmoor and she moved far south to a fortress called Hogan's Keep. Apparently she's having trouble with a gang of sentient insects. Oh, my poor idiot daughter! Let me know she's okay!\"": "Сэм Вейлмур в Стейтхелме сказал: «О, со мной всё в порядке! Просто я был очень обеспокоен. На самом деле, до болезни. Я слышал, что у моей дочери финансовые проблемы. Она... отдалённая от нас. И её отец практически отрёкся от неё, и я понимаю почему. В некотором роде согласен с ним.\n\nНо она моя дочь, и я не могу просто смотреть, как она разрушает свою жизнь.\n\nВозможно, я слишком переживаю. Не мог бы ты навестить её? Её зовут Хелена Вейлмур, и она переехала далеко на юг в крепость под названием Крепость Хогана. Похоже, у неё проблемы с бандой разумных насекомых. О, моя бедная глупая дочь! Дай знать, что с ней всё в порядке!"
"Jara's barn has been coopted by a huge grizzly bear. She'd be grateful if I could kill it, but she doesn't really think I'm capable of doing so.": "Амбар Яры захватил огромный гризли. Она была бы благодарна, если бы я смог его убить, но на самом деле не думает, что у меня это получится."
"Ormond Neth in Statehelm said, \"My friend, I must reveal something. I am smitten by Anaberyl! At first I told myself that I was simply looking out for an incredible musician who was in a bad spot. But I haven't ever felt this way before about anyone! She's so... Perfect.\n\nI need you to feel her out for me. I can't do it because she'll feel obligated toward me! That would break my heart -- I don't want to pressure her at all. So just ask if she'd ever be interested in dating a human, if the human was an incredible musician like her.\"": "Ормонд Нет в Стейтхельме сказал: «Друг мой, я должен кое в чём признаться. Я влюблён в Анабэрил! Сначала я говорил себе, что просто забочусь об удивительной музыкантше, оказавшейся в трудной ситуации. Но я никогда раньше не испытывал таких чувств ни к кому! Она такая... Совершенная.\n\nМне нужно, чтобы ты разведал для меня. Я не могу сделать это сам, потому что она почувствует себя обязанной передо мной! Это разбило бы мне сердце — я совсем не хочу её давить. Просто спроси, заинтересовалась бы она когда-нибудь встречаться с человеком, если бы этот человек был таким же удивительным музыкантом, как она."
"Larsan in Serbule asked you for a topaz.": "Ларсан в Сербуле попросил у тебя топаз."
"Rohina in Sun Vale said, \"Druids aren't just tree-lovers. We're deeply invested in the balance of nature, and that's not always pretty. Not to non-druids, anyway. I'll show you - the spiders near here sometimes feed on small shore birds. Bring me some of the prey feathers.\"": "Рохина в Солнечной Долине сказала: «Друиды — это не просто любители деревьев. Мы глубоко заинтересованы в балансе природы, и это не всегда красиво. По крайней мере, для тех, кто не друид. Я покажу тебе — пауки здесь иногда питаются мелкими прибрежными птицами. Принеси мне перья их добычи.»"
"Rohina in Sun Vale said, \"I may not be the best druid, but I still know how to appreciate nature! In fact, I'm pretty good at growing flowers! Just not trees, I guess.\n\nYou can find a lot of seeds on the creatures around here - I guess maybe because of our influence? No idea where they get the seeds from, but if you bring me some I'll teach you how to properly appreciate nature.\"": "Рохина в Солнечной Долине сказала: «Я, может, не лучший друид, но всё равно умею ценить природу! На самом деле я довольно хорошо выращиваю цветы! Просто деревья — видимо, не моё.\n\nТы можешь найти много семян на существах здесь — наверное, из-за нашего влияния? Не знаю, откуда у них семена, но если принесёшь мне немного, я научу тебя правильно ценить природу."
"Ensign Cricket aboard the Wintertide said, \"Hippogriffs aren't immortal. Did you know that? Yeah, they hatch out of eggs! We have a hatchery on board, too. You should go kill the brood mother!\n\nYou'll know you're in the right place when the temperature drops. They keep Coldfeather's quarters very cold!\"": "Мичман Крикет на борту «Винтертайда» сказал: «Гиппогрифы не бессмертны. Знаешь ли ты это? Да, они вылупляются из яиц! У нас на борту тоже есть инкубатор. Тебе стоит убить матку!\n\nТы поймёшь, что на правильном месте, когда температура упадёт. Они держат покои Холодного Пера очень холодными!"
"Justin Smoot in Statehelm said, \"If you ever find yourself deep in Gazluk Keep, head to the bottom floor and poke around the southern barracks loop. That's where I used to bunk. They would have tossed my medals into one of the storage chests down there. See if you can find my box of medals.\"": "Джастин Смут в Стейтхелме сказал: «Если ты когда-нибудь окажешься глубоко в крепости Газлук, спускайся на нижний этаж и осмотри южный круг казарм. Там я раньше жил. Мои медали, вероятно, бросили в один из сундуков для хранения там. Попробуй найти мою коробку с медалями.»"
"Eleme in Sun Vale has asked you to kill elite Winter Court soldiers called The Boreal Fist. They are probably much too dangerous to take on alone.": "Элеме в Солнечной Долине попросил вас убить элитных солдат Зимнего Двора, называемых Бореальным Кулаком. Они, вероятно, слишком опасны, чтобы сражаться с ними в одиночку."
"Merriana in Serbule Hills said, \"Somewhere north of here, nearish Serbule Keep, is a massive door. This traditional showy dwarf door leads to the long-dead city of Borghild. No dwarves live there, but it's infested with undead.\n\nYou will ... How do I put this politely? You are quite formidable, but you would be wise to bring some allies with you into Borghild. It is full of traps.\n\nDo this for me and I shall bequeath upon you one of my grandest weather wands.\"": "Мерриана в Сербульских Холмах сказала: «Где-то к северу отсюда, недалеко от Сербульской Крепости, находится массивная дверь. Эта традиционная эффектная гномья дверь ведёт в давно погибший город Боргилд. Там не живёт ни одного гнома, но город кишит нежитью.\n\nТы... как бы это вежливо сказать? Ты довольно грозен, но было бы разумно взять с собой союзников в Боргилд. Там полно ловушек.\n\nСделай это для меня, и я дарую тебе одну из моих величайших палочек погоды."
"Jumper in Sun Vale's Animal Town asked you to defeat the Bridge Bully, a ranalan that lives in the river near a natural crossing point.": "Прыгун из Животного города в Солнечной Долине попросил вас победить Хулигана с моста, раналана, который живёт в реке возле естественного перехода."
"Flia has asked for a pair of cat eyeballs.": "Флия попросила пару кошачьих глаз."
"Gasu'um in New Prestonbule said, \"To repair my necklace, I need pyrite. Obtain for me the finest pyrite! I will reward you.\"": "Гасу'ум в Новом Престонбуле сказал: «Чтобы починить мое ожерелье, мне нужна пирит. Добыть для меня лучший пирит! Я вознагражу тебя.»"
"Echur in Serbule wants you to ask Velkort for a way to alleviate the symptoms of Echur's Cranium Dust addiction.": "Эчур в Сербуле хочет, чтобы вы спросили Велкорта о способе облегчить симптомы зависимости Эчура от Черепной пыли."
"Mittens in Kur Mountains asked for some winterhue flowers. They bloom all around Kur Mountains starting at 5am, but they die off as the afternoon sun reaches its peak.": "Миттенс в горах Кур попросил немного зимних цветов. Они цветут по всему хребту Кур начиная с 5 утра, но увядают, когда дневное солнце достигает пика."
"Norbert in Sun Vale's Animal Town asked you to obtain some raw Iocaine mushrooms, which are quite rare and only grow in the deepest and dankest of caves.": "Норберт из Животного города в Солнечной долине попросил тебя добыть сырые грибы Иокаин, которые довольно редки и растут только в самых глубоких и сырых пещерах."
"Ormond Neth in Statehelm said, \"Let's begin your study with a warm-up. Why don't you use your Song of Discord in combat with, hm, let's say... 50 enemies. You needn't slay them SOLELY via Song of Discord, though. That's a later lesson! Just use the ability on them prior to defeating them.\"": "Ормонд Нет в Стейтхелме сказал: «Давай начнем твоё обучение с разминки. Почему бы тебе не использовать Песнь Раздора в бою с, хм, скажем... 50 врагами. Тебе не нужно убивать их ИСКЛЮЧИТЕЛЬНО с помощью Песни Раздора, это будет позже! Просто примени способность на них перед тем, как победить.»"
"Sagiso in Statehelm said, \"A favor, huh? Well, you could get me some paint. It's for my hobby. Any color will do, I'm not picky. Just get me a LOT of it.\"": "Сагисо в Стейтхельме сказал: «Услуга, да? Ну, ты мог бы принести мне краски. Это для моего хобби. Любой цвет подойдет, я не привередлив. Просто принеси мне МНОГО.»"
"At the behest of an animal friend, you visited the Sacred Grotto in the Kur Mountains. But they wouldn't let you in! Instead you were sent to Sun Vale to speak with a talking pig named Norbert.": "По просьбе животного друга вы посетили Священную Грот в горах Кур. Но вас туда не пустили! Вместо этого вас отправили в Солнечную Долину поговорить с говорящей свиньёй по имени Норберт."
"Ashk in Rahu believes that a gigantic eyeball is hunting him whenever he uses his augury powers.\n\nAshk said, \"In the desert near Rahu, look for a giant skull embedded in the face of a cliff. Ignore the skull and look for a large staff in the sand near it. Stand near the staff and say something like, 'I'm going to start soothsaying now!' That should get the eye to emerge. Be ready! It is no ordinary foe. You will likely need help. Slay the creature and you shall have my utmost appreciation!\"\n\n<b>Note: this is a difficult encounter that will require a small group.</b>": "Ашк в Раху уверен, что гигантский глаз охотится на него каждый раз, когда он использует свои пророческие силы.\n\nАшк сказал: «В пустыне возле Раху ищи гигантский череп, вросший в лицо утёса. Игнорируй череп и ищи большой посох в песке рядом с ним. Встань рядом с посохом и скажи что-то вроде: „Я собираюсь начать гадание!“ Это должно заставить глаз появиться. Будь готов! Это не обычный враг. Скорее всего, тебе понадобится помощь. Убей существо, и ты получишь мою глубочайшую благодарность!»\n\n<b>Примечание: это сложная встреча, для которой потребуется небольшая группа.</b>"
"Elune in Statehelm said, \"Why don't you speak with this Denton Razor fellow yourself? He's supposed to live in the hills of Vidaria. Just get him to give my jewelry back.\"": "Элун в Стейтхелме сказал: «Почему бы тебе самому не поговорить с этим парнем по имени Бритва Дентон? Говорят, он живёт в холмах Видарии. Просто заставь его вернуть мои украшения.»"
"A friendly mantis named Azalak suggested that the brain bugs in the area are coming from a cave west of him. Azalak asked you to find out what happened to a human named Commander Ferrows, last seen in that cave. In exchange, you'll get something that will be useful when encountering Dalvos.": "Дружелюбный богомол по имени Азалак предположил, что мозговые жуки в этом районе выходят из пещеры к западу от него. Азалак попросил вас выяснить, что случилось с человеком по имени командир Ферроус, которого в последний раз видели в той пещере. В обмен вы получите что-то, что будет полезно при встрече с Далвосом."
"Parella in Statehelm said, \"I keep watch on the seas for Ranalon activity. And good thing I do! Recently a mysterious slab has appeared in the water on the other side of the city. You can't even see it from here, that's how far it is. They're trying to hide from me!\n\nI think it's an assault force, hiding in the caves beneath the city. When the slab activates, they'll show up to attack. We need to activate that beacon early, before they're fully prepared. That will catch them off guard. The only trick is: how do we activate it?\n\nI need to call in a favor from a ranalon I once saved. His name is Gozzaroon. He's hiding in an undersea cave off of Sun Vale. Sun Vale's this little island we druids like to congregate at. Go find Gozzaroon, tell him I'm calling in the favor, and demand the secret to activating these beacons.\"": "Парелла в Стейтхелме сказала: «Я наблюдаю за морями в поисках активности раналонов. И слава богу, что я это делаю! Недавно в воде на другой стороне города появилась загадочная плита. Её даже отсюда не видно, настолько она далеко. Они пытаются спрятаться от меня!\n\nЯ думаю, это штурмовая группа, скрывающаяся в пещерах под городом. Когда плита активируется, они появятся для атаки. Нам нужно активировать этот маяк заранее, до того, как они полностью подготовятся. Это застигнет их врасплох. Единственная загвоздка: как его активировать?\n\nМне нужно попросить об одолжении раналона, которого я однажды спас. Его зовут Гоззарун. Он прячется в подводной пещере у острова Сан Вейл. Сан Вейл — это маленький остров, где любят собираться друиды. Найди Гоззаруна, скажи ему, что я прошу об одолжении, и потребуй секрет активации этих маяков."
"Pumza in Statehelm said, \"The animals of this city are in great danger. A spider came to me for aid. I could not do much for him, but I did manage to have his exotic equipment shipped into Statehelm. Take this to him. If you can, give him whatever help he needs.\"": "Пумза в Стейтхелме сказала: «Животные этого города в большой опасности. Ко мне за помощью пришёл паук. Я не смогла много для него сделать, но сумела доставить его экзотическое снаряжение в Стейтхелм. Отнеси это ему. Если сможешь, окажи ему всю необходимую помощь.»"
"Blanche in Serbule has wistfully mentioned her desire for a special wand carried by Khyrulek in the old tomb beneath Serbule.": "Бланш в Сербуле с тоской упоминала о своём желании получить особую палочку, которую носил Хирулек в старой гробнице под Сербулом."
"Gasu'um in New Prestonbule said, \"The central decoration of the necklace you broke is a rare and beautiful crystal known as vervadium. It will be difficult to find. But should you find a piece, bring it to me. I will pay you ten times its value!\"": "Гасу'ум в Новом Престонбуле сказал: «Центральное украшение ожерелья, которое ты сломал, — это редкий и красивый кристалл, известный как вервадиум. Его будет трудно найти. Но если ты найдёшь кусочек, принеси его мне. Я заплачу тебе в десять раз больше его стоимости!»"
"Gasu'um in New Prestonbule said, \"I have decided to replace the crystal in my mother's necklace with obsidian. Go find a piece for me! Obsidian is not as beautiful as vervadium, but I suspect you will at least be able to find a piece that does not disgust me.\"": "Гасу'ум в Новом Престонбуле сказал: «Я решил заменить кристалл в ожерелье моей матери обсидианом. Найди для меня кусочек! Обсидиан не так красив, как вервадиум, но я подозреваю, что ты хотя бы сможешь найти кусочек, который меня не будет отвращать.»"
"Leonard Allenson believes there are golems inside Borghild, and asked you to find a Cranial Gear from the head of one.": "Леонард Алленсон считает, что внутри Боргилда есть големы, и попросил вас найти Черепное Снаряжение с головы одного из них."
"Rappanel in Serbule Hills said, \"I really must have better food than what Durstin can cook. Even the ranalan pickles are getting old. Hmm, how about some of those 'grapefish'? I have to know why the humans call them that!\n\nI hear they're in the lakes and streams around here, but they can be pretty quick. I'm sure with some practice you'll manage, though.\"": "Раппанель в Сербульских Холмах сказал: «Мне действительно нужна еда получше, чем то, что готовит Дёрстин. Даже раналанские соленья уже надоели. Хм, как насчёт этих самых „виноградных рыб“? Мне надо понять, почему люди так их называют!\n\nГоворят, они водятся в озёрах и ручьях здесь рядом, но бывают очень быстрыми. Хотя, уверен, с практикой у тебя получится."
"Rappanel in Serbule Hills said, \"So, do you have those filleted grapefish for me yet?\"": "Раппанель в Сербульских холмах сказал: «Ну что, у тебя уже есть те филейные грейпфиши для меня?»"
"Elune in Statehelm said, \"Since the constabulary is completely useless, I've been poking around for clues to my stolen jewelry. And I have a lead for you! ... You <i>will</i> help me, right? It's oh so important!\n\nSo you see the jewelry was sold to an orc who trades such things amongst his kind. His name is Throgg and he lives  in a camp in Povus. Can you go and retrieve my stolen jewelry before he gets a chance to resell it?\"": "Элун в Стейтхелме сказал: «Поскольку полиция совершенно бесполезна, я сам искал улики по поводу моих украденных украшений. И у меня есть наводка для тебя! ... Ты <i>обязательно</i> поможешь мне, правда? Это так важно!\\n\\nВидишь ли, украшения были проданы орку, который торгует такими вещами среди своих. Его зовут Трогг, и он живёт в лагере в Повусе. Можешь ли ты пойти и вернуть мои украденные украшения, прежде чем он успеет их перепродать?"
"Leon Dasterre in Statehelm said, \"Ah, so you're an Advanced Student already! My, time flies. It seems only yesterday that you enrolled.\n\nMy next lecture will cover bardic surgery techniques. For my demonstration I need some supplies. Can you fetch them for me? Very good. Goodbye.\"": "Леон Дастерр в Стейтхелме сказал: «Ах, ты уже продвинутый ученик! Время летит незаметно. Кажется, только вчера ты поступил.\n\nМоя следующая лекция будет посвящена техникам бардовской хирургии. Для демонстрации мне понадобятся некоторые материалы. Можешь принести их для меня? Отлично. До свидания."
"Alzaneth in Statehelm said, \"I need you to collect one more unusual wind-heart for me. You'll find the gale-chanting spot in Povus, near water. Summon a tornado there, and you should find a swampy wind. I need its heart. After you kill it, run quickly. You know why by now.\"": "Алзанет в Стейтхелме сказал: «Мне нужно, чтобы ты собрал ещё одно необычное сердцебиение ветра. Ты найдёшь место, где поют ветры, в Повусе, рядом с водой. Призови там торнадо, и ты должен обнаружить болотистый ветер. Мне нужно его сердце. После того как убьёшь его, быстро беги. Ты уже знаешь почему.»"
"Alzaneth in Statehelm said, \"You want me to train you in Weather Witching? Well... I'm flattered, but I'm hardly the most qualified instructor. Though I suppose if even MY meager skills are above yours, I should help you out of the doldrums of mediocrity. But it will take time, and I'm only visiting for a short while.\n\nWhy don't you run an errand for me? That will free up some time to give you lessons.\n\nI've heard there's an old gale-chanting spot. I'm not sure where it is exactly, but it's on a hill overlooking a lake. There can't be that many lakes, right? You'll know you're in the right spot by the breeze you feel.\n\nI've heard that if you summon a sandstorm while standing there, it will attract a young breeze elemental right to you! Most aren't native to this realm, but something about the winds in the Ilmari allow them to be born. Quite unusual! So anyway, it will find you in seconds. Kill it and get its heart. Don't worry: most wind elementals that grow up <i>here</i> end up insane anyway, so you're doing it a favor, maybe.\n\nAfter you get that heart, you should definitely leave very quickly, though. Larger wind elementals will be attracted, too, and noone can fight a hurricane.\"": "Алзанет в Стейтхелме сказал: «Ты хочешь, чтобы я обучил тебя погодной ведьме? Ну... мне лестно, но я вряд ли самый квалифицированный наставник. Хотя, если даже МОИ скромные навыки выше твоих, я должен помочь тебе выбраться из болота посредственности. Но это займёт время, а я здесь ненадолго.\n\nПочему бы тебе не выполнить одно поручение для меня? Это освободит немного времени для уроков.\n\nЯ слышал, что есть старое место, где поют ветры. Точно не знаю, где оно, но это холм с видом на озеро. Озёр не так много, верно? Ты поймёшь, что на правильном месте, по ощущению ветра.\n\nГоворят, если призвать там песчаную бурю, к тебе прилетит молодой элементаль ветра! Большинство из них не родом из этого мира, но что-то в ветрах Илмари позволяет им рождаться. Довольно необычно! В любом случае, он появится через секунды. Убей его и забери его сердце. Не волнуйся: большинство элементалей ветра, выросших <i>здесь</i>, всё равно сходят с ума, так что, может быть, ты делаешь им одолжение.\n\nПосле того как получишь это сердце, лучше быстро уходи. Крупные элементали ветра тоже придут, и никто не сможет сразиться с ураганом."
"Alzaneth in Statehelm said, \"I found reference to another gale-chanting spot, and this one is right outside of Statehelm! Unfortunately, it's underwater. I suppose the waterline has moved since it was first made. So hold your breath and look for it past the docks. Summon a tornado there, and you should be able to access an unusual weather form. Kill it and get its heart.\n\nAnd then you should run. It might have a guardian itself, and you wouldn't want to run into that.\"": "Алзанет в Стейтхелме сказал: «Я нашёл упоминание о ещё одном месте, где поют ветры, и это место прямо за пределами Стейтхелма! К сожалению, оно под водой. Похоже, уровень воды изменился с тех пор, как оно было создано. Так что задержи дыхание и ищи его за доками. Призови там торнадо, и ты сможешь получить доступ к необычной погодной форме. Убей её и забери её сердце.\n\nА потом беги. У неё может быть собственный страж, и ты не захочешь с ним столкнуться."
"The Sand Seer in Amulna asked for some very particular, very amazing ink. She is attempting to reproduce the Rakshasas' Geometric Rune Charts with higher-quality materials.": "Песчаный Провидец в Амульне попросил очень особые, очень удивительные чернила. Она пытается воспроизвести Геометрические Рунические Таблицы Ракшасов с использованием материалов более высокого качества."
"Elune in Statehelm said, \"Denton Razor said that some of my jewelry was sold to a fence in town. Everybody knows who the town fence is: that filthy human who runs the bar on the docks. Cynthia Rolfe! Go berate her until she relinquishes my jewelry!\"": "Элун в Стейтхелме сказал: «Дентон Рейзор сказал, что некоторые из моих украшений были проданы скупщику в городе. Все знают, кто такой городской скупщик: тот грязный человек, который управляет баром на доках. Синтия Ролф! Иди и отругай её, пока она не отдаст мои украшения!»"
"Amutasa needed someone to help her fill an order for six Good Skinning Knives.": "Амутаса нужна была помощь, чтобы выполнить заказ на шесть хороших ножей для снятия шкуры."
"Pitre Ferrence in Vidaria said, \"My alchemist contact in Statehelm insists there are no commonalities in the poisons that Korbok had you retrieve. Mr. Farblood himself even took a look, to no avail. There must be something deeper going on here.\n\nTake this journal, and keep as detailed notes in it as you can. Get in close with Korbok, see if there's any more poison-related missions he can send you on, and just try to gather more info in general. While I do find him and his kind fascinating, I cannot let that get in the way of my primary assignment.\"": "Питр Ферренс в Видарии сказал: «Мой алхимик в Стейтхелме настаивает, что в ядах, которые Корбок заставил тебя собрать, нет никаких общих черт. Сам мистер Фарблад даже посмотрел, но безрезультатно. Здесь должно происходить что-то более глубокое.\n\nВозьми этот дневник и веди в нём как можно более подробные записи. Сблизься с Корбоком, узнай, не поручит ли он тебе ещё миссии, связанные с ядами, и просто постарайся собрать больше информации в целом. Хотя я нахожу его и его подобных очень интересными, я не могу позволить этому отвлечь меня от моей основной задачи."
"You've been asked to obtain Fulgurites for Ratuk the Thinker.": "Вас попросили добыть фульгуриты для Ратука Мыслящего."
"Paul Vaughn in Serbule Hills said, \"The lumber camps east of here were made by humans. I helped build the fences myself! But then goblins came and ran us out, and now they're chopping our wood!\n\nGoblins have huge numbers on their side, but most goblins are stupid. To really hurt 'em, you gotta kill the overseers! Look for the mage-casting goblins in the camps, and kill 'em.\n\nAnd hey, if you want help with how to attack the camps, just ask me.\"": "Пол Вон в Сербульских Холмах сказал: «Лесозаготовительные лагеря к востоку отсюда построили люди. Я сам помогал строить заборы! Но потом пришли гоблины и выгнали нас, а теперь они рубят наш лес!\n\nУ гоблинов огромное численное преимущество, но большинство из них глупы. Чтобы действительно нанести им урон, нужно убить надсмотрщиков! Ищи гоблинов-магов в лагерях и убей их.\n\nИ, кстати, если хочешь помощи с тем, как атаковать лагеря, просто спроси меня."
"Julius Patton in Serbule Hills said, \"I loaned old Vera my best garden spade a year ago. Then, of course, she was killed and horrifically eaten by goblins. But my spade might still be in her house! If I was braver, I'd go look for it.\n\nVera's farm is northeast of here.\"": "Юлиус Паттон в Сербульских холмах сказал: «Год назад я одолжил старой Вере свою лучшую садовую лопату. А потом, конечно, её убили и ужасно съели гоблины. Но моя лопата может всё ещё быть в её доме! Если бы я был смелее, я бы пошёл искать её.\n\nФерма Веры находится к северо-востоку отсюда."
"Michael Irasce in Statehelm said, \"I have a special book request that I could use your help with. If I can sell this, it will make up for months of poor sales!\n\nThe book I need is \"The Lost Travels of Romast.\" It didn't exactly have a large print run. There are probably only a few copies across all of Alharth. But I have a lead!\n\nA certain... friend... with greenish skin... who lives in a cave in Povus has a copy hidden deep in her cave. But she says the deep cave is \"too scary nowadays\" and she can't retrieve it for me. She says it's hidden behind a gilded chest. I'm sure that should make it easy to find. Right?\n\nThis book is priceless, so I will give you priceless knowledge in exchange.\"": "Майкл Ираск в Стейтхелме сказал: «У меня есть особый заказ на книгу, и мне нужна твоя помощь. Если я смогу её продать, это компенсирует месяцы плохих продаж!\n\nМне нужна книга «Потерянные путешествия Ромаста». Тираж у неё был совсем небольшой. Вероятно, по всему Алхарду существует всего несколько копий. Но у меня есть наводка!\n\nОдна... знакомая... с зелёной кожей... которая живёт в пещере в Повусе, спрятала копию глубоко в своей пещере. Но она говорит, что глубокая пещера сейчас «слишком страшная», и она не может достать её для меня. Говорит, что книга спрятана за позолоченным сундуком. Думаю, это должно облегчить поиск. Правда?\n\nЭта книга бесценна, поэтому я дам тебе бесценные знания взамен."
"Ensign Cricket aboard the Wintertide said, \"The science deck has been given over to the mad wizard that made those... monstrosities. And he's not even here! He just astrally projects himself here from the mortal realm.\n\nSustained astral projection requires an impressive amount of magical fortitude, I'll admit. But its so gauche!\n\nYou should just pull his plug.\"": "Мичман Крикет на борту «Винтертайда» сказал: «Научная палуба отдана безумному волшебнику, который создал этих... чудовищ. И его даже здесь нет! Он просто астрально проецирует себя сюда из мира смертных.\n\nПоддерживать астральную проекцию требует впечатляющего магического запаса, признаю. Но это так безвкусно!\n\nТебе просто нужно вырубить его."
"A person in a coffin in Vidaria said, \"I have a... magical illness.\n\nI need a rare substance known as Acur Blood. I know ...not... where one such as... yourself... would find this thing. Perhaps seek out sages or ...mystics. In any case, I grant you no hope. But if you succeed, I shall reward you handsomely.\nWait! Actually, make it two jars of Acur Blood.\"": "Человек в гробу в Видарии сказал: «У меня... магическая болезнь.\n\nМне нужна редкая субстанция, известная как Кровь Акюра. Я не знаю... где такой, как... ты... мог бы найти эту вещь. Возможно, стоит обратиться к мудрецам или... мистикам. В любом случае, я не даю тебе надежды. Но если ты справишься, я щедро тебя вознагражу.\n\nПодожди! На самом деле, нужно две банки Крови Акюра."
"Kleave has asked you to slay The Mauler and bring back his claw as proof.": "Клив просит тебя убить Разрушителя и принести его коготь в доказательство."
"Tyler Green in Serbule Hills said, \"I'll tell you one of the reasons I'm so depressed. I was exploring a bit and I found a cave close by, just down the road a ways, a little north and east of here. There's this corpse in there that had a note, and apparently there were people that needed saving, so I rushed in like old times, bashing spiders everywhere! And then, somehow, I was overrun by spiders, a dozen of 'em or more. I threw my backup shield at a big one and ran. But that was my second-most favorite shield!  Now I'm left with only my favorite shield and my third-favorite shield. And fourth-favorite. I feel so empty.\n\nHey, if you find that cave, grab the shield for me? I'm not sure where I was, but I remember I didn't go up any slopes, if that helps.\"": "Тайлер Грин в Сербульских Холмах сказал: «Я расскажу тебе одну из причин, почему я так подавлен. Я немного исследовал окрестности и нашёл пещеру неподалёку, чуть к северо-востоку отсюда, по дороге. В ней был труп с запиской, и, похоже, там были люди, которым нужна была помощь, так что я бросился внутрь, как в старые времена, разбивая пауков повсюду! А потом меня как-то затоптали пауки — дюжина или больше. Я бросил свой запасной щит в большого и убежал. Но это был мой второй по любимости щит! Теперь у меня остались только мой самый любимый щит, третий по любимости и четвёртый. Я чувствую себя таким опустошённым.\n\nЭй, если найдёшь ту пещеру, забери щит для меня? Я точно не помню, где был, но помню, что не поднимался ни на один склон, если это поможет."
"Truxartis in Vidaria said, \"The Mnemonix Index has laid bare what other resources I will need. Here is a list. Take care of it.\"": "Труксартис в Видарии сказал: «Индекс Мнемоникса открыл, какие ещё ресурсы мне понадобятся. Вот список. Позаботься о нём.»"
"Shirogin in Rahu said, \"While you were taking your time finding the dye I needed, I completed a test-run of General Tremal's gown. It's perfect! Except for the color. So now I need to make another gown in aquamarine... and I've run out of the secret ingredient needed for its protective elements: cockatrice beaks. Can you buy some, or murder some cockatrices and de-beak them? Thank you. Go do it now. This is important!\"": "Широгин в Раху сказал: «Пока ты медлил с поиском нужной мне краски, я провёл тестовый пошив платья генерала Тремала. Оно идеальное! За исключением цвета. Теперь мне нужно сделать другое платье аквамаринового цвета... и у меня закончился секретный ингредиент для защитных элементов: клювы кокатрис. Можешь купить их или убить кокатрис и снять клювы? Спасибо. Иди и сделай это сейчас. Это важно!»"
"Hemmit Magmagrip in New Prestonbule said, \"Mox and Bellema don't believe me, but I swear I saw another one of those mushroom men in a cave near here! It was in 'Snowblood Shadow Cave'. I can't understand his way of communicating, but I'm sure he knows the secret of these mushroom rings. If you figure out the secret, tell me!\"": "Хеммит Магмагрип в Нью Престонбуле сказал: «Мокс и Беллема мне не верят, но я клянусь, я видел ещё одного из тех грибных людей в пещере неподалёку! Это была пещера 'Теней Снежной Крови'. Я не понимаю его способ общения, но уверен, что он знает тайну этих грибных колец. Если ты раскроешь эту тайну, скажи мне!»"
"Charles Thompson, a vendor in a tent outside of Serbule, has asked you to obtain a \"heartshroom\", but he has no idea where they come from.": "Чарльз Томпсон, торговец в палатке за пределами Сербуля, попросил вас добыть «сердечный гриб», но он не имеет ни малейшего понятия, откуда они появляются."
"Tavilak in Red Wing Casino said, \"Very few guests are participating in the Natural Food Experience. Many claim that it is boring or too similar to manual labor to be entertaining. I must increase guest satisfaction before this attraction is closed! Perhaps you would like to participate? Simply grow some onions in the garden and exclaim that you are enjoying yourself.\"": "Тавилак в казино Красное Крыло сказал: «Очень мало гостей участвуют в Опыт с натуральной едой. Многие утверждают, что это скучно или слишком похоже на ручной труд, чтобы быть развлечением. Мне нужно повысить удовлетворённость гостей, прежде чем эту аттракцион закроют! Возможно, вы хотите поучаствовать? Просто вырастите немного лука в саду и воскликните, что вам нравится.»"
"Tavilak in Red Wing Casino said, \"Thank you for aiding me. If you have time to continue the Natural Food Experience, please grow several beets and mention that it is a joy to do so.\"": "Тавилак в казино Красное Крыло сказал: «Спасибо за помощь. Если у вас есть время продолжить опыт с натуральной едой, пожалуйста, вырастите несколько свекл и скажите, что это доставляет радость.»"
"Tavilak in Red Wing Casino said, \"The Natural Food Experience ends with a difficult task: growing carrots. This is not a task that the average guest can complete during their stay. As a result, reported guest satisfaction is extraordinarily low. Please grow some carrots and exclaim that you are not perturbed by the slow growing speed of organic matter.\"": "Тавилак в казино Красное Крыло сказал: «Опыт натурального питания заканчивается сложной задачей: выращиванием моркови. Это не та задача, которую средний гость может выполнить за время своего пребывания. В результате уровень удовлетворённости гостей чрезвычайно низок. Пожалуйста, вырастите немного моркови и воскликните, что вас не смущает медленный рост органического вещества.»"
"Azalak the mantis asked you to get him some venison.": "Азалак богомол попросил тебя добыть для него оленину."
"Braigon wants a perfect cow hide for an experimental cheese he's making.\n\n(Perfect Cow Hides come from expert skinners who have mastered bovine anatomy. They're quite rare!)": "Брейгон хочет идеальную коровью шкуру для экспериментального сыра, который он готовит.\n\n(Идеальные коровьи шкуры получают опытные кожевники, освоившие анатомию крупного рогатого скота. Они довольно редки!)"
"Percussa in Rahu said, \"I was hired to play at a wedding, and I need good publicity, so this gig has to be great! The requested music is not a problem since I'm amazing. But these foreigners have a weird custom: near the end of the ritual, rice is thrown at the couple. I asked if balls of ordinary Rahu rice would do, and they said no -- they're too heavy! So I guess that I'll need secret rice. You know: the incredibly deliciously fluffy rice that can't be found in stores. The trick is: how do I get some? Do you have any?\"": "Перкусса в Раху сказал: «Меня наняли играть на свадьбе, и мне нужна хорошая реклама, так что этот концерт должен быть отличным! Заказанная музыка — не проблема, ведь я великолепен. Но у этих иностранцев странный обычай: под конец ритуала влюблённым кидают рис. Я спросил, подойдут ли обычные шарики из риса Раху, а они сказали нет — они слишком тяжёлые! Значит, мне нужен секретный рис. Знаешь, тот невероятно вкусный и пушистый рис, который не найти в магазинах. Вопрос в том: как мне его достать? У тебя есть такой?»"
"Mushroom Jack in Serbule asked you for a Trophy Wolf Skin.": "Грибной Джек в Сербуле попросил у вас трофейную волчью шкуру."
"Sagiso in Statehelm said, \"My hobby is... let's call it Urban Expression. It's a legitimate art form and an important one, especially here in Statehelm. Let's just jump right in, shall we? Take your dye and head to the barracks area. The walls all around there are good spots for your art. Pick a place and make your mark!\n\n<i>[ Place the Graffiti ability on your sidebar. If you are in a valid graffiti area (and have dye on hand) the ability will stop being grayed out. There are graffiti spots all over, though they are a little denser near the barracks/jail area.]</i>\"": "Сагисо в Стейтхелме сказал: «Моё хобби... назовём это Городским выражением. Это законная форма искусства и важная, особенно здесь, в Стейтхелме. Давай сразу приступим, хорошо? Возьми свою краску и отправляйся в район казарм. Стены вокруг — отличные места для твоего искусства. Выбери место и оставь свой след!\n\n<i>[Помести способность Граффити на панель быстрого доступа. Если ты находишься в подходящей зоне для граффити (и у тебя есть краска), способность перестанет быть неактивной. Места для граффити есть повсюду, хотя они немного плотнее в районе казарм и тюрьмы.]</i>"
"Ormond Neth in Statehelm said, \"Another easy one: practice your Thunderous Note on 50 enemies and then kill them. Pay attention to the efficacy of the note on different types of enemies.\"": "Ормонд Нет в Стейтхельме сказал: «Ещё одно простое задание: потренируйте свой Громовой Нот на 50 врагах, а затем убейте их. Обратите внимание на эффективность ноты на разных типах врагов.»"
"Truxartis in Vidaria said, \"The potion worked! I feel stronger. Healthier. More virile. I can feel my powers returning! I just need to unlock... them again.\n\nHelp me with the unlocking ritual, and I shall unlock the power of the bat for you, too!\n\nI just need some supplies for the inscription ceremony.\n\nNow where did I leave the ghostly guano? Ah, of course. On an island known as Sun Vale, look for a ruin. That should be enough to go on, right? Oh, yes: some of those grim little Winter Fae like to... frolic nearby.\n\nFor the other ingredients, I'm certain your... cosmopolitan upbringing will aid you in their procurance.\"": "Труксартис в Видарии сказал: «Зелье сработало! Я чувствую себя сильнее. Здоровее. Более жизнеспособным. Я ощущаю возвращение своих сил! Мне осталось только снова их разблокировать.\n\nПомоги мне с ритуалом разблокировки, и я тоже открою для тебя силу летучей мыши!\n\nМне просто нужны припасы для церемонии надписания.\n\nТеперь где же я оставил призрачный гуано? Ах, конечно. На острове, известном как Сан Вейл, ищи руины. Этого должно быть достаточно, верно? О, да: некоторые из этих мрачных маленьких зимних фей любят... резвиться поблизости.\n\nДля остальных ингредиентов я уверен, что твоё... космополитичное воспитание поможет тебе в их добыче."
"Nelson Ballard asked you to be on the lookout for a super-intelligent rat. If found, Nelson needs the rat's head decoration -- some sort of tiara or headband.": "Нельсон Баллард попросил тебя следить за суперразумной крысой. Если найдёшь её, Нельсону нужна головная украшение крысы — что-то вроде тиары или ободка."
"Yurra the hag suggested that you might find Dalvos somewhere in Serbule. She said that an elf in town had been inspecting the giant red crystals that Dalvos is known to make. Find this elf and see if she can help you.": "Юрра, ведьма, предположила, что вы можете найти Далвоса где-то в Сербуле. Она сказала, что один эльф в городе осматривал гигантские красные кристаллы, которые известны как творение Далвоса. Найдите этого эльфа и узнайте, сможет ли она вам помочь."
"Elahil in Serbule asked you for some Nightmare Flesh to help him activate his magic ring.": "Элахил в Сербуле попросил у вас немного Плоти Кошмара, чтобы помочь ему активировать его магическое кольцо."
"An animal friend has shared the secret password to the Sacred Grotto hidden in the Kur Mountains. The entrance is near a ravine in central Kur. You were instructed to look for a hill to the northwest of the ravine; there is a door embedded in the hillside. As another reference point, the entrance is northeast of \"Fox Outpost\".\n\nOnce there, you need to provide the secret pass phrase, \"Horse-Rabbit-Maelstrom\".": "Друг-животное поделился с тобой секретным паролем от Священной Гротты, скрытой в горах Кур. Вход находится рядом с оврагом в центральной части Кура. Тебе сказали искать холм к северо-западу от оврага; в склоне холма врезана дверь. В качестве ориентира вход находится к северо-востоку от «Фокс-Аванпоста».\n\nКогда доберёшься туда, нужно назвать секретную парольную фразу: «Лошадь-Кролик-Маэлстром»."
"Yoy the Myconian asked you to kill Senzur the mindworm, deep in the myconian cave. ": "Йой, миконианец, попросил тебя убить Сензура, червя разума, глубоко в миконианской пещере. "
"Azalak the mantis asked you to get his fellow mantis Zeratak to come visit him.": "Азалак, богомол, попросил тебя уговорить его сородича богомола Зератака навестить его."
"Poe the Myconian asked you to retrieve some ectoplasm. It can often be found on ghosts.": "Поэ из Микониана попросил тебя добыть немного эктоплазмы. Её часто можно найти на призраках."
"Paullus in Statehelm said, \"You're a practicing brewer! Love to see it! Let me teach you how to make strawberry wine. Next time you catch me at a party, if you have a bottle of this for me, I'll teach you to make a trickier variety.\"": "Пауллус в Стейтхельме сказал: «Ты занимаешься пивоварением! Приятно видеть! Позволь научить тебя делать клубничное вино. В следующий раз, когда увидишь меня на вечеринке, если принесёшь мне бутылку этого, я научу тебя делать более сложный сорт.»"
"Merriana in Serbule Hills said, \"I have expanded my search and have come into stone-contact with a human engineer near here who claims to know what I need. However, he won't tell me over the aether. Please locate this man and retrieve his letter. He is to be found \"In the Serbule Sewers.\" His name is Arif.\"": "Мерриана в Сербульских Холмах сказала: «Я расширила свои поиски и вышла на контакт с человеческим инженером неподалёку, который утверждает, что знает, что мне нужно. Однако он не хочет говорить об этом по эфиру. Пожалуйста, найдите этого человека и заберите его письмо. Его можно найти «В канализации Сербуля». Его зовут Ариф.»"
"Gorvessa is trying to create panther-themed lingerie and needs a Trophy Panther Skin. Or at least she thinks she does.": "Горвесса пытается создать бельё в стиле пантеры и ей нужна трофейная шкура пантеры. Или, по крайней мере, она так думает."
"Azalak the mantis asked you to find some psi mantises that have snuck into Serbule, and discreetly slay them before they bring the town's wrath down upon the mantis race.": "Азалак богомол попросил тебя найти несколько пси-богомолов, которые проникли в Сербуль, и незаметно уничтожить их, прежде чем они навлекут гнев города на расу богомолов."
"Truxartis in Vidaria said, \"I need to re-open this Blood Well ... right away. But a very rude... manticore...stole the lens while I was... resting. He is called Lythorax. You will need to kill him. He's sentient... but not <i>very</i> sentient.\n\nYou will need...assistance... most likely.\"": "Труксартис в Видарии сказал: «Мне нужно немедленно заново открыть этот Кровавый Колодец... Но очень грубый... мантикора... украл линзу, пока я... отдыхал. Его зовут Литоракс. Тебе придётся убить его. Он разумен... но не <i>очень</i> разумен.\n\nТебе, скорее всего, понадобится... помощь..."
"Drummond Stonecurl in Vidaria said, \"I haven't been entirely honest with you, and ever since my outburst about the orc I've been thinking that I should be more open. So, here it goes...\n\nI <i>am</i> related to Gloria Stonecurl. She is my sister. I have not seen her in an age, mostly because... well, I don't want to get into it right now. But if you happen upon her in your travels, would you tell her that her wee old brother sends his regards?\"": "Драммонд Стоункерл в Видарии сказал: «Я был не совсем честен с тобой, и после моего всплеска по поводу орка я всё время думал, что должен быть более откровенным. Итак, вот...\n\nЯ <i>действительно</i> родственник Глории Стоункерл. Она моя сестра. Я не видел её целую вечность, в основном потому, что... ну, сейчас не хочу в это вдаваться. Но если ты встретишь её в своих путешествиях, передай, что её маленький старший брат передаёт привет."
"Truxartis in Vidaria said, \"The secret ingredient in my potion is, of course... a secret. You are not worthy... to know it. Its creation would be beyond you anyway.\n\nI have hid some of this ingredient in various realms... outside of ours. The easiest to reach is via Eltibule.\n\nThe winter fae have tunnels that travel through Eltibule. Look for green bears. Oh... you may need to find a key. Speak to humans in the area.\n\nOnce inside, look for a Tuvillic Rune. It's not too far... inside.\"": "Труксартис в Видарии сказал: «Секретный ингредиент моего зелья, конечно же... секрет. Ты недостоин... знать его. Его создание всё равно было бы тебе не по силам.\n\nЯ спрятал часть этого ингредиента в разных мирах... за пределами нашего. Самый лёгкий для доступа — через Элтибул.\n\nЗимние феи имеют туннели, проходящие через Элтибул. Ищи зелёных медведей. О, возможно, тебе понадобится найти ключ. Поговори с людьми в этом районе.\n\nОказавшись внутри, ищи тувиллическую руну. Она недалеко... внутри."
"Ferris Blueheart in Vidaria said, \"Ah, you were the one that got me the swarmer brains and the flapskull blood? Very good. I have need of you again: you must help me prove my hypothesis! I just need brains from demon soldiers so I can compare them with the swarmer brains.\"": "Феррис Блюбарт в Видарии сказал: «Ах, это ты достал мне мозги роевиков и кровь с черепа-крылышка? Очень хорошо. Ты снова мне нужен: помоги доказать мою гипотезу! Мне нужны мозги демонических солдат, чтобы сравнить их с мозгами роевиков.»"
"Lana Songtree in Serbule Hills asked you for wool so she can make a sweater. Wool comes from sheep. Sheep that you murder.": "Лана Сонгтри в Сербульских Холмах попросила у вас шерсть, чтобы связать свитер. Шерсть берётся с овец. Овец, которых вы убиваете."
"Fainor in Serbule wants you to get the recipe for Sweet Butter from someone in Eltibule Castle's courtyard.": "Файнор в Сербуле хочет, чтобы вы достали рецепт сладкого масла у кого-то во дворе замка Элтибул."
"Unora Veilmoor in Statehelm said, \"I'm much too busy to train you personally. But I've prepared something for you. Go and visit my old training ground in Gazluk. I've left training programs there, and I'll walk you through them via sending stone.\n\nHow would you find the camp? Let me think. It's on the plateau. There's a useless lookout tower somewhat nearby. From the camp you can look down over the cliff and see a lot of trees. Does that narrow it down? You'll know you're in the right place when you see iron dodecahedrons hammered into the cold earth. There'll be a building with a sending stone; contact me from there.\"": "Унора Вейлмур в Стейтхелме сказала: «Я слишком занята, чтобы тренировать тебя лично. Но я подготовила кое-что для тебя. Отправляйся на мою старую тренировочную площадку в Газлуке. Я оставила там тренировочные программы и буду вести тебя через них с помощью камня связи.\n\nКак найти лагерь? Дай подумать. Он на плато. Рядом есть бесполезная смотровая башня. С лагеря можно посмотреть вниз с обрыва и увидеть много деревьев. Это помогает? Ты поймёшь, что на правильном месте, когда увидишь железные додекаэдры, вбитые в холодную землю. Там будет здание с камнем связи; свяжись со мной оттуда."
"Nelson Ballard asked you to deliver a Praetor's Order to a shady potion seller living in a tent outside of town.": "Нельсон Баллард попросил тебя доставить приказ претора подозрительному торговцу зельями, живущему в палатке за городом."
"Sir Brooker in Statehelm said, \"Are you headed back out to Vidaria soon? You should look into something for me. There used to be a battle polo team in the city. It's been gone for a long time. But there was a contest where you could find a ceremonial sword in Vidaria, called the Vanquisher's Blade, which would automatically get you on the team roster. I found some clues about it while I was stationed out there but never found the thing. I'd love to have one as a keepsake. I'll pay you well for it, if you find it!\n\n<i>[Note: completing this quest will sell the blade to Sir Brooker. If you wish to keep the blade you should cancel this quest.]</i>\"": "Сэр Брукер в Стейтхелме сказал: «Собираешься скоро вернуться в Видарию? Ты мог бы заняться для меня одним делом. Раньше в городе была команда по боевому поло. Её давно уже нет. Но был конкурс, где можно было найти церемониальный меч в Видарии, называемый Клинком Победителя, который автоматически заносил тебя в состав команды. Я нашёл несколько подсказок об этом, когда служил там, но так и не нашёл сам меч. Мне бы очень хотелось иметь его в память. Я хорошо заплачу тебе, если найдёшь!\n\n<i>[Примечание: выполнение этого задания продаст меч сэр Брукеру. Если хочешь оставить меч себе, лучше отменить это задание.]</i>"
"Norbert in Sun Vale has tasked you with a list of deeds to prove your worthiness to join the Wardens.": "Норберт из Солнечной Долины поручил вам выполнить список дел, чтобы доказать свою достойность вступить в Стражи."
"Makara in the Ilmari Desert asked you to find an odd crystal. She said it could be found in yeti caves deep beneath the Kur Mountains.": "Макара в пустыне Илмари попросила тебя найти странный кристалл. Она сказала, что его можно найти в пещерах йети глубоко под горами Кур."
"Sem the Myconian (in a cave in New Prestonbule) said, \"One single meat creature that inhabits this cavern is so poisonous and foul that I am unable to filter out its toxins, and must flee if it approaches. This creature was bred for some ill purpose. I know this from spying upon the minds of green-skinned bipeds that came to feed it. They called the creature 'Murklinger'. It would please me to no longer need to fear this creature.\"": "Сем Микониан (в пещере в Нью Престонбуле) сказал: «Один единственный мясной зверь, обитающий в этой пещере, настолько ядовит и отвратителен, что я не могу отфильтровать его токсины и должен бежать, если он приближается. Это существо было выведено для какой-то злой цели. Я знаю это, подслушивая мысли зелёнокожих двуногих, которые приходили его кормить. Они называли это существо 'Мерклингер'. Мне бы хотелось больше не бояться этого существа.»"
"Marna wants me to collect a ton of spider legs for her medicinal recipes. In exchange, she'll teach me one of her secret recipes.": "Марна хочет, чтобы я собрал кучу паучьих ног для её лечебных рецептов. В обмен она научит меня одному из своих секретных рецептов."
"Therese has asked for some hash browns.": "Терез попросила немного хэшбраунов."
"Deliver 10 Thick Cranium Lotions to Fitz the Boatman on the Serbule docks. Reward: 1,313 councils.": "Доставьте 10 Лосьонов для Толстого Черепа Фитцу Лодочнику на доки Сербуля. Награда: 1,313 советов."
"Deliver 10 Thin Cranium Lotions to Fitz the Boatman on the Serbule docks. Reward: 635 councils.": "Доставьте 10 лосьонов для тонкого черепа Фитцу Лодочнику на причалы Сербуля. Награда: 635 советов."
"Jace Soral in the Kur Mountains asked you to kill nearby deer to reduce the predator food supply.": "Джейc Сорал в горах Кур попросил вас убить близлежащих оленей, чтобы сократить запасы пищи для хищников."
"Fainor in Serbule needs venison.": "Файнор в Сербуле нуждается в оленине."
"Fransesca Muradrake in Statehelm said, \"You seem trustworthy enough. Here, this unlocks a very dangerous chamber inside the Statehelm Crypt. This area is off-limits to most. My husband's private laboratory lies past that point. But you needn't delve so far today. My husband loved unusual necromantic creations, and the crypt is full of his menagerie. I need some thrice-cursed beaks, and there are bird-creatures in there that contain one.\n\nHere is the most important detail: you must kill them with darkness damage. Otherwise it would only be a twice-cursed beak.\n\n<i>[The killing blow must be Darkness damage.]</i>\"": "Франсеска Мурадрейк в Стейтхелме сказала: «Ты кажешься достаточно надёжным. Вот, это открывает очень опасную камеру внутри крипты Стейтхелма. Эта зона закрыта для большинства. Частная лаборатория моего мужа находится за этим проходом. Но сегодня тебе не нужно углубляться так далеко. Мой муж любил необычные некромантские создания, и крипта полна его зверинца. Мне нужны трижды проклятые клювы, а там есть птичьи существа, у которых такой клюв.\n\nВот самый важный момент: ты должен убить их тёмным уроном. Иначе это будет всего лишь дважды проклятый клюв.\n\n<i>[Убийственный удар должен быть тёмным уроном.]</i>"
"Deliver 10 Tiger Tails to Fitz the Boatman on the Serbule docks. Reward: 424 councils.": "Доставьте 10 тигриных хвостов Фитцу Лодочнику на доках Сербуля. Награда: 424 совета."
"Deliver 10 Tiger's Eyes to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 Тигриных глаз Шейне в Раху. Награда: 4 930 советов."
"Deliver 10 Tigerfish Fillets to Viedesi in Sun Vale. Reward: 5,259 councils.": "Доставьте 10 филе тигровой рыбы Виедеси в Солнечную Долину. Награда: 5 259 советов."
"Deliver 99 Tigerfish Fillets to Sheyna in Rahu. Reward: 99,799 councils.": "Доставьте 99 филе тигровой рыбы Шейне в Раху. Награда: 99 799 советов."
"Deliver 10 Tilapia Fillets to Irkima in Red Wing Casino. Reward: 923 councils.": "Доставьте 10 филе тилапии Иркиме в казино Красное Крыло. Награда: 923 совета."
"Deliver 99 Tilapia Fillets to Sheyna in Rahu. Reward: 16,081 councils.": "Доставьте 99 филе тилапии Шейне в Раху. Награда: 16,081 советов."
"Brugo in Povus said, \"Perhaps a smoke-break would help me focus. The 'horta here is very mellow. Do you happen to have any? Oh, and I lost my pipe in a recent skirmish with a fish man. I need a new one!\"": "Бруго в Повусе сказал: «Возможно, перекур поможет мне сосредоточиться. Здесь 'хорта очень мягкая. Случайно не найдется у тебя немного? О, и я потерял свою трубку в недавнем столкновении с рыбочеловеком. Мне нужна новая!»"
"Deliver 10 Toasted Spriggan Nuts to Ogamboe in the Fae Realm. Reward: 8,591 councils.": "Доставьте 10 поджаренных орешков сприггана Огамбо в Царство Фей. Награда: 8,591 советов."
"Deliver 10 Tofu to Thimble Pete in Hogan's Keep, Eltibule. Reward: 13,201 councils.": "Доставьте 10 Тофу Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 13,201 совета."
"Deliver 10 Tofu Pumpkin Kebab to Sheyna in Rahu. Reward: 18,042 councils.": "Доставьте 10 шашлыков из тыквы с тофу Шейне в Раху. Награда: 18,042 совета."
"Deliver 10 Tofurkey Gravy to Sheyna in Rahu. Reward: 15,974 councils.": "Доставьте 10 порций соуса из тофурки Шейне в Раху. Награда: 15,974 совета."
"Deliver 10 Tofurkey Stir-Fry to Sheyna in Rahu. Reward: 17,594 councils.": "Доставьте 10 порций жаркого из тофурки Шейне в Раху. Награда: 17,594 совета."
"Deliver 10 Tofurkey Veggie Loaf to Sheyna in Rahu. Reward: 23,871 councils.": "Доставьте 10 овощных хлебов с тофурки Шейне в Раху. Награда: 23 871 совет."
"Deliver 10 Tofurkey With Cranberry Sauce to Sheyna in Rahu. Reward: 19,437 councils.": "Доставьте 10 То́фурки с клюквенным соусом Шейне в Раху. Награда: 19,437 советов."
"Deliver 10 Tomatoes to Korbok in Vidaria. Reward: 15,594 councils.": "Доставьте 10 помидоров Корбоку в Видарии. Награда: 15,594 совета."
"Deliver 10 Tonguefish Fillets to Viedesi in Sun Vale. Reward: 2,258 councils.": "Доставьте 10 филе языка Вьедеси в Солнечную Долину. Награда: 2 258 советов."
"Deliver 99 Tonguefish Fillets to Sheyna in Rahu. Reward: 41,456 councils.": "Доставьте 99 филе языка Шейне в Раху. Награда: 41,456 советов."
"Gribburn in Hogan's Keep asked you for a bunch of long rubbery tongues from Ranalan Warriors. A tribe of them live in far-off Sun Vale, among other places.": "Грибберн в Крепости Хоган попросил тебя добыть несколько длинных резиноподобных языков у воинов Раналана. Племя таких воинов живёт в далёкой Солнечной Долине, среди прочих мест."
"Yagreet at the fairy tree asked for some rubbery tongues, most commonly found on dead Ranalans.": "Ягрит у фейного дерева попросила несколько резиновых языков, которые чаще всего встречаются на мёртвых Раналанах."
"Jaw the myconian has asked you to kill a bunch of Garden Tenders in the Myconian caverns.": "Челюсть, миконианец, попросил тебя убить кучу садовников в миконианских пещерах."
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Analysis Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Кимок сказал: «У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 наборов судебного анализа, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуть ваше ремесло в обмен на ваши труды.»"
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Autopsy Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Кимок сказал: «У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так добры доставить мне 10 наборов для вскрытия, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуться в ремесле в обмен на ваши труды.»"
"Kimoc said, \"We are low on our diagnostic supplies and need to restock. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Carbon-form Scrutinizer Arrays to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Кимок сказал: «У нас мало диагностических материалов, и нам нужно пополнить запасы. Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 массивов углеродных анализаторов, я буду вам бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуться в ремесле в обмен на ваши усилия.»"
"Kimoc said, \"We are low on supplies to better our anatomy skills! Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Forensic Inspection Kits to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Кимок сказал: «У нас мало припасов, чтобы улучшить навыки анатомии! Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так любезны доставить мне 10 судебно-медицинских комплектов для инспекции, я буду бесконечно благодарен! Честно говоря, у нас просто мало материалов, но я могу помочь вам продвинуть ваше ремесло в обмен на ваши труды.»"
"Kimoc said, \"A lot of us like to whittle a lot, so our supply of whittling knives are running low. Sure, we could make them ourselves, but we don't want to steal all the fun!  If you would be so kind as to deliver 10 Master Whittling Knives to me, I would be forever greatful! Honestly we're just low on materials, but I can help you advance your craft in exchange for your trouble.\"": "Кимок сказал: «Многие из нас любят много резать по дереву, поэтому наш запас ножей для резьбы быстро заканчивается. Конечно, мы могли бы сделать их сами, но не хотим лишать себя удовольствия! Если вы будете так добры доставить мне 10 мастерских ножей для резьбы, я буду бесконечно благодарен! Честно говоря, у нас просто не хватает материалов, но я могу помочь вам продвинуться в вашем ремесле в обмен на ваши труды.»"
"Deliver 10 Top Swamp Steaks to Ogamboe in the Fae Realm. Reward: 9,305 councils.": "Доставьте 10 лучших болотных стейков Огамбо в Фейское царство. Награда: 9,305 советов."
"Deliver 10 Topazes to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 топазов Вьедеси в Солнечную Долину. Награда: 4 760 советов."
"Lumpfuzz in the Ilmari Desert said, \"So yeah, thanks for coming. I heard about this from that elf seer across town: part of the desert is coated in giant spiders that are, like, mated with tornados? I don't understand it, but wherever the spiders walk, the tornados go too. And the elf says that they've come topside to lay their eggs in the wind to scatter far and wide. That's not good.\n\nI've been out killin' em all morning, but there's plenty left for you! Claws and fangs don't work too well, but they go down with some lightning bolts. Head southeast, you'll hear 'em before you see 'em.\"": "Лампфазз в пустыне Илмари сказал: «Так что да, спасибо, что пришёл. Я слышал об этом от того эльфийского провидца через город: часть пустыни покрыта гигантскими пауками, которые, типа, связаны с торнадо? Я не понимаю, но куда идут пауки, туда идут и торнадо. И эльф говорит, что они вышли на поверхность, чтобы отложить яйца в ветер, чтобы те разлетелись повсюду. Это нехорошо.\n\nЯ весь утро их убивал, но для тебя их ещё полно! Когти и клыки не очень помогают, но они падают от молний. Иди на юго-восток, ты услышишь их раньше, чем увидишь."
"Deliver 10 Tourmalines to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 турмалинов Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 4 080 советов."
"Deliver 10 Toxic Ice Sludges to Sheyna in Rahu. Reward: 2,748 councils.": "Доставьте 10 ядовитых ледяных слякоть Шейне в Раху. Награда: 2,748 советов."
"Deliver 10 Toxin Resistance Potions to Irkima in Red Wing Casino. Reward: 7,587 councils.": "Доставьте 10 зелий сопротивления яду Иркиме в казино Красное Крыло. Награда: 7,587 советов."
"Deliver 10 Toxinflesh Ointments to Fitz the Boatman on the Serbule docks. Reward: 2,133 councils.": "Доставьте 10 мазей из ядовитой плоти Фитцу Лодочнику на доках Сербуля. Награда: 2,133 совета."
"Kodan in Sun Vale's Animal Town agreed to give you a piece of his specialty werewolf armor if you provide some raw materials.": "Кодан из Звериного города в Солнечной Долине согласился дать вам часть своей фирменной оборотнической брони, если вы предоставите некоторые сырьевые материалы."
"Deliver 10 Trananas to Ogamboe in the Fae Realm. Reward: 7,988 councils.": "Доставьте 10 Трананасов Огамбо в Область Фей. Награда: 7,988 советов."
"Deliver 10 Treant Acorns to Sheyna in Rahu. Reward: 2,535 councils.": "Доставьте 10 желудей древняков Шейне в Раху. Награда: 2 535 советов."
"Deliver 5 Treant Leaves to Sheyna in Rahu. Reward: 1,654 councils.": "Доставьте 5 листьев древняков Шейне в Раху. Награда: 1,654 совета."
"Deliver 10 Treant Wood to Sheyna in Rahu. Reward: 2,535 councils.": "Доставьте 10 единиц древесины древня Шейне в Раху. Награда: 2 535 советов."
"Deliver 10 Trearclaws to Ogamboe in the Fae Realm. Reward: 10,122 councils.": "Доставьте 10 Трирклозов Огамбо в Мир Фей. Награда: 10 122 совета."
"Deliver 10 Treas to Ogamboe in the Fae Realm. Reward: 10,797 councils.": "Доставьте 10 сокровищ Огамбо в Область Фей. Награда: 10 797 советов."
"Deliver 10 Tregetable Steaks to Ogamboe in the Fae Realm. Reward: 10,200 councils.": "Доставьте 10 стейков из трегетабля Огамбо в Царство Фей. Награда: 10 200 советов."
"Deliver 10 Tremons to Ogamboe in the Fae Realm. Reward: 8,252 councils.": "Доставьте 10 Тремонов Огамбо в Царство Фей. Награда: 8,252 совета."
"Deliver 10 Trishes to Ogamboe in the Fae Realm. Reward: 8,154 councils.": "Доставьте 10 Тришес Огамбо в Царство Фей. Награда: 8,154 совета."
"Deliver 10 Troll Flesh to Fitz the Boatman on the Serbule docks. Reward: 1,192 councils.": "Доставьте 10 тролльей плоти Фитцу Лодочнику на доках Сербуля. Награда: 1,192 совета."
"Ensign Cricket aboard the Wintertide said, \"Well if you're going to assault the ship and create mayhem, you should start with the trolls! Most of these trolls were supposed to go down to the surface already, but they're lazy oafs who just hang around down here.\"": "Мичман Крикет на борту Зимней Волны сказал: «Если вы собираетесь штурмовать корабль и сеять хаос, начните с троллей! Большинство этих троллей уже должны были спуститься на поверхность, но они ленивые болваны, которые просто слоняются здесь внизу.»"
"Deliver 10 Trollbane Oils to Ogamboe in the Fae Realm. Reward: 1,212 councils.": "Доставьте 10 Масел Троллебана Огамбо в Царство Фей. Награда: 1,212 советов."
"Deliver 10 Trophy Bear Skins to Thimble Pete in Hogan's Keep, Eltibule. Reward: 16,242 councils.": "Доставьте 10 шкур трофейных медведей Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 16,242 совета."
"Deliver 10 Trophy Cow Hides to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,197 councils.": "Доставьте 10 шкур трофейных коров Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 15,197 советов."
"Deliver 10 Trophy Deer Skins to Fitz the Boatman on the Serbule docks. Reward: 5,114 councils.": "Доставьте 10 шкур трофейных оленей Фитцу Лодочнику на причалах Сербуля. Награда: 5,114 советов."
"Deliver 10 Trophy Droach Skins to Thimble Pete in Hogan's Keep, Eltibule. Reward: 57,245 councils.": "Доставьте 10 шкур трофейного дроача Тимбл Питу в Хоганском Убежище, Элтибуль. Награда: 57,245 советов."
"Deliver 10 Trophy Panther Skins to Thimble Pete in Hogan's Keep, Eltibule. Reward: 25,917 councils.": "Доставьте 10 шкур трофейной пантеры Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 25,917 советов."
"Deliver 10 Trophy Pig Skins to Fitz the Boatman on the Serbule docks. Reward: 10,155 councils.": "Доставьте 10 шкур трофейных свиней Фитцу Лодочнику на причалы Сербуля. Награда: 10 155 советов."
"Deliver 10 Trophy Rat Skins to Fitz the Boatman on the Serbule docks. Reward: 10,155 councils.": "Доставьте 10 шкур трофейных крыс Фитцу Лодочнику на причалы Сербуля. Награда: 10 155 советов."
"Deliver 10 Trophy Rhino Hides to Thimble Pete in Hogan's Keep, Eltibule. Reward: 41,262 councils.": "Доставьте 10 трофейных шкур носорога Тимблу Питу в Хоганском укреплении, Элтибул. Награда: 41 262 совета."
"Deliver 10 Trophy Sheep Skins to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,197 councils.": "Доставьте 10 шкур трофейных овец Тимбл Питу в Хоганском Крепости, Элтибул. Награда: 15 197 советов."
"Deliver 10 Trophy Tiger Skins to Fitz the Boatman on the Serbule docks. Reward: 12,595 councils.": "Доставьте 10 шкур трофейных тигров Фитцу Лодочнику на доках Сербуля. Награда: 12 595 советов."
"Deliver 10 Trophy Wolf Skins to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,720 councils.": "Доставьте 10 трофейных шкур волка Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 15 720 советов."
"Ukorga in the Kur Mountains asked you for lots of Trophy Wolf Skins.": "Укорга в горах Кур попросил у вас много шкур трофейных волков."
"Deliver 10 Trout Fillets to Irkima in Red Wing Casino. Reward: 1,111 councils.": "Доставьте 10 филе форели Иркиме в казино Красное Крыло. Награда: 1 111 советов."
"Deliver 99 Trout Fillets to Sheyna in Rahu. Reward: 19,582 councils.": "Доставьте 99 филе форели Шейне в Раху. Награда: 19,582 совета."
"Torgan in New Prestonbule said, \"The metal that humans use is weak and deficient. I use it to make horseshoes and tools, but never for armor. Armor requires the astounding metal found in the mines of Gazluk! In fact, it can often be found exposed at the tops of mountains here. I will pay a bounty for a pile of it, for I must repair Vughal's helmet, and I will not use feeble metal!\"": "Торган в Новом Престонбуле сказал: «Металл, который используют люди, слаб и недостаточен. Я использую его для подков и инструментов, но никогда для брони. Для брони требуется удивительный металл, найденный в шахтах Газлука! На самом деле, его часто можно найти на вершинах гор здесь. Я заплачу награду за кучу этого металла, потому что должен починить шлем Вугхала, и я не буду использовать слабый металл!»"
"Tryaka said, \"I could really use some more glass so I can make more of these rings. Bring me some green glass and we can get started on yours!\"": "Тряка сказала: «Мне очень нужно ещё стекла, чтобы сделать больше таких колец. Принеси мне немного зелёного стекла, и мы сможем начать делать твоё!»"
"Deliver 10 Tsavorites to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 цаворитов Тимбл Питу в Хоганском Крепости, Элтибул. Награда: 4,080 советов."
"Deliver 10 Tulip Bouquets to Korbok in Vidaria. Reward: 29,342 councils.": "Доставьте 10 букетов тюльпанов Корбоку в Видарии. Награда: 29 342 совета."
"Deliver 10 Tulips to Ogamboe in the Fae Realm. Reward: 18,748 councils.": "Доставьте 10 тюльпанов Огамбо в Царство Фей. Награда: 18 748 советов."
"Deliver 10 Tundra Lichen to Fitz the Boatman on the Serbule docks. Reward: 4,573 councils.": "Доставьте 10 тундрового лишайника Фитцу Лодочнику на причалы Сербуля. Награда: 4 573 совета."
"Deliver 10 Tungsten to Irkima in Red Wing Casino. Reward: 2,116 councils.": "Доставьте 10 единиц вольфрама Иркиме в казино Красное Крыло. Награда: 2 116 советов."
"Deliver 10 Turkey Gravies to Fitz the Boatman on the Serbule docks. Reward: 3,035 councils.": "Доставьте 10 индюшиных подлив Фитцу Лодочнику на доках Сербуля. Награда: 3,035 советов."
"Deliver 10 Turkey Legs to Fitz the Boatman on the Serbule docks. Reward: 3,076 councils.": "Доставьте 10 индюшиных ножек Фитцу Лодочнику на доках Сербуля. Награда: 3 076 советов."
"Deliver 10 Turkey Peasant-Bakes to Fitz the Boatman on the Serbule docks. Reward: 3,692 councils.": "Доставьте 10 индюшиных крестьянских лепёшек Фитцу Лодочнику на доках Сербуля. Награда: 3,692 совета."
"Deliver 10 Turkey Pot Pies to Irkima in Red Wing Casino. Reward: 8,386 councils.": "Доставьте 10 индюшиных пирогов Иркиме в казино Красное Крыло. Награда: 8,386 советов."
"Deliver 10 Turkey Stir-Fries to Ogamboe in the Fae Realm. Reward: 19,733 councils.": "Доставьте 10 порций жаркого из индейки Огамбо в Фейском царстве. Награда: 19 733 совета."
"Deliver 10 Turquoises to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 бирюз Шейне в Раху. Награда: 4,930 советов."
"Crelpin in the Fae Realm said, \"Will you do me a favor? I want to try out some mortal recipes I've learned. To master them, I figured I'll need about two thousand potatoes. I can't do that all myself! So I'm asking everyone I see to bring me a few potatoes. Can you bring me a handful?\"": "Крелпин в Фейском царстве сказал: «Сделаешь мне одолжение? Я хочу попробовать несколько смертных рецептов, которые выучил. Чтобы овладеть ими, мне понадобится около двух тысяч картофелин. Я не смогу сделать это в одиночку! Поэтому я прошу каждого, кого встречу, принести мне немного картофеля. Ты можешь принести мне горсть?»"
"Ukorga in the Kur Mountains asked you for Tufts of Fur.": "Укорга в горах Кур попросил тебя принести пучки меха."
"Deliver 10 Ultimate Acidic Cleansers to Viedesi in Sun Vale. Reward: 3,403 councils.": "Доставьте 10 ультимативных кислых очистителей Виедеси в Солнечную Долину. Награда: 3,403 совета."
"Syndra in Kur Mountains asked for a trophy sheep skin.": "Синдра в горах Кур попросила трофейную овечью шкуру."
"Deliver 10 Ultra Lac to Gremix in Amulna. Reward: 2,508 councils.": "Доставьте 10 Ультра Лака Гремиксу в Амулне. Награда: 2 508 советов."
"Deliver 99 Ultra Lac to Korbok in Vidaria. Reward: 50,071 councils.": "Доставьте 99 Ультра Лака Корбоку в Видарии. Награда: 50 071 совет."
"Harry says he'll give you some of his precious antidote. But you'll have to pay him handsomely for it!": "Гарри говорит, что даст тебе немного своего драгоценного противоядия. Но за это придется щедро заплатить!"
"Deliver 10 Unarmed Boost Potion 20% to Irkima in Red Wing Casino. Reward: 6,655 councils.": "Доставьте 10 Зелий усиления боя без оружия 20% Иркиме в Казино Красное Крыло. Награда: 6,655 советов."
"Deliver 10 Uncrossing Oil to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,009 councils.": "Доставьте 10 бутылок Масла для снятия порчи Тримбл Питу в Крепость Хоган, Элтибуль. Награда: 2 009 советов."
"In Vidaria, you stumbled upon an Undead creature that's been dead for so long, it doesn't even remember its own name. Perhaps you can find some items to jog its memory.": "В Видарии вы наткнулись на существо нежити, которое было мёртвым так долго, что даже не помнит собственного имени. Возможно, вы сможете найти предметы, чтобы пробудить его память."
"Merriana in Serbule Hills said, \"My new ally, the human Arif, has given me two excellent leads on where to find the sphere. I know you have questions about this sphere, but I dare not speak of it. Simply find it and return it to me!\n\nIt should be quite simple to find. Arif says that he discovered a tunnel underneath a giant stone hand. Inside were letters and notes, which he left untouched. In a box, he said there was a magical crystal.\n\nGo! I shall reward you for it!\"": "Мерриана в Сербульских Холмах сказала: «Мой новый союзник, человек Ариф, дал мне две отличные наводки, где найти сферу. Я знаю, у тебя есть вопросы об этой сфере, но я не смею о ней говорить. Просто найди её и верни мне!\n\nЕё должно быть довольно просто найти. Ариф говорит, что обнаружил туннель под гигантской каменной рукой. Внутри были письма и заметки, которые он оставил нетронутыми. В коробке, по его словам, был магический кристалл.\n\nВперёд! Я награжу тебя за это!"
"Korbok in Vidaria said, \"Well, ifyer offerin den acurse immasai yiss. Gogit de tuffest poisonz yecan find.\"": "Корбок в Видарии сказал: «Ну, если ты предлагаешь, тогда проклятие иммасаи, да. Достань самые сильные яды, какие сможешь найти.»"
"Bogaku in the Rahu Sewers said, \"The ratkin seem to be growing an orchard of sentient trees down here! That is FASCINATING! Right? But how old are these trees? Go and chop down some of these trees and see how many rings they have.\n\nWait, trees can be over a hundred years old. Can you count all the way to 100, monster? Well, try your best! Hurry, now.\"": "Богака в канализации Раху сказал: «Похоже, крысолюди здесь выращивают сад разумных деревьев! Это УДИВИТЕЛЬНО! Правда? Но сколько этим деревьям лет? Иди и сруби несколько деревьев, чтобы посчитать их кольца.\n\nПодожди, деревья могут быть старше ста лет. Ты сможешь досчитать до 100, монстр? Ну, постарайся! Поторопись."
"Skitters in Statehelm said, \"Here is the problem: late at night, a creature is coming out of the sewers and attacking sentient animals. It focuses on the smart ones.\n\nI have a contact in the sewer. His name is Hamilton and you can trust him. He's been doing some investigative work on this problem. Find a way into the sewer and locate him, and bring back his intel.\"": "Скиттерс в Стейтхелме сказал: «Вот в чём проблема: поздно ночью из канализации выходит существо и нападает на разумных животных. Оно охотится на самых умных.\n\nУ меня есть контакт в канализации. Его зовут Гамильтон, и ему можно доверять. Он проводит расследование по этой проблеме. Найди способ попасть в канализацию, найди его и принеси его разведданные."
"Ormond Neth in Statehelm said, \"Well you still haven't been forced to do ANY of the supremely difficult things we had to do when I was a student! You think you're so great, huh? Let's see you pull this off: kill enemies with Disharmony. And not harmless enemies either! Just be careful: this test is no joke.\n\n<i>[Disharmony must be the killing blow to get credit. Dying will reset your progress.]</i>\"": "Ормонд Нет в Стейтхельме сказал: «Ну, тебя ещё не заставляли делать НИЧЕГО из тех невероятно сложных вещей, которые приходилось делать нам, когда я был студентом! Думаешь, ты такой крутой, да? Давай посмотрим, справишься ли ты с этим: убей врагов с помощью Дисгармонии. И не безобидных врагов! Но будь осторожен: этот тест — не шутка.\n\n<i>[Дисгармония должна нанести смертельный удар, чтобы засчиталось. Смерть сбросит твой прогресс.]</i>"
"Velkort wants me to go grab a piece of blue crystal from a nearby crypt. The entrance is in the graveyard.\n\nI'm to avoid the central room with the giant spider, and work my way around the perimeter until I reach an energy barrier. The secret code for the barrier is 397.": "Велкорт хочет, чтобы я достал кусок синего кристалла из близлежащей крипты. Вход находится на кладбище.\\n\\nМне нужно избегать центральной комнаты с гигантским пауком и двигаться по периметру, пока не доберусь до энергетического барьера. Секретный код для барьера — 397."
"Grim Jim in Statehelm said, \"You want to help? Me?! Well... I had a request for a pristine goat hide. If you can help me find one, I'll give you half the payment.\"": "Грим Джим в Стейтхелме сказал: «Хочешь помочь? Мне?! Ну... у меня есть заказ на безупречную козью шкуру. Если ты поможешь мне найти такую, я отдам тебе половину оплаты.»"
"Grim Jim in Statehelm said, \"I hope you're ready for a hard one. I need the perfect skin of a three-headed demon dog! You heard that right.\n\nThe pay's pretty good, though. Don't die.\"": "Грим Джим в Стейтхелме сказал: «Надеюсь, ты готов к сложному заданию. Мне нужна идеальная шкура трёхголового демонического пса! Ты правильно услышал.\n\nОплата хорошая, правда. Не умирай."
"Grim Jim in Statehelm said, \"I have another hard request. This one is for a shark skin. Can't make this up. I'm supposed to just have a shark skin lying around, right? Ugh. Customers. But hey, see what you can do.\"": "Грим Джим в Стейтхелме сказал: «У меня есть ещё одна сложная просьба. На этот раз нужна акулий шкура. Не могу поверить. Как будто у меня должна валяться акулий шкура, да? Уф. Клиенты... Но ладно, посмотри, что сможешь сделать.»"
"Grim Jim in Statehelm said, \"Here's another hide request: \"the finest rabbit skin you can find. No damage.\" I have some rabbit skins, but they all have damage.\"": "Грим Джим в Стейтхелме сказал: «Вот ещё один заказ на шкуру: „самая лучшая кроличья шкура, какую только найдёшь. Без повреждений.“ У меня есть несколько кроличьих шкур, но все они повреждены.»"
"Grim Jim in Statehelm said, \"Now we're starting to get repeat business! The same man who needed a goat skin now needs a hippo skin. Heh! Good luck with that one.\"": "Грим Джим в Стейтхелме сказал: «Теперь у нас начинаются повторные заказы! Тот же человек, которому нужна была коза, теперь хочет шкуру бегемота. Хе! Удачи с этим.»"
"Grim Jim in Statehelm said, \"I don't even know what this one is. A kuvou? I guess that's like a bison? Anyway, I need a perfect hide from one.\"": "Грим Джим в Стейтхелме сказал: «Я даже не знаю, что это такое. Куву? Думаю, это что-то вроде бизона? В любом случае, мне нужна идеальная шкура от одного такого.»"
"Grim Jim in Statehelm said, \"This one's not too weird... But the quantity is crazy. I need four trophy cat hides.\"": "Грим Джим в Стейтхелме сказал: «Этот не слишком странный... Но количество просто сумасшедшее. Мне нужно четыре трофейные шкуры кота.»"
"Grim Jim in Statehelm said, \"Next I need perfect snake skins. That's a lot less weird of a request than usual. I sometimes even have these in stock! But not right now.\"": "Грим Джим в Стейтхелме сказал: «Далее мне нужны идеальные змеиные шкуры. Это гораздо менее странный заказ, чем обычно. Иногда у меня даже есть такие в наличии! Но не сейчас.»"
"Grim Jim in Statehelm said, \"Another creepy beast request: I need the hide of a 'droach' as well as some scales. I guess... I guess the hide doesn't normally have scales on it? I'm no monsterologist. I hope you can figure this one out.\"": "Грим Джим в Стейтхелме сказал: «Ещё один жуткий запрос на трофеи: мне нужна шкура 'дроача', а также несколько чешуек. Полагаю... шкура обычно не покрыта чешуёй? Я не монстролог. Надеюсь, ты разберёшься с этим заданием.»"
"Grim Jim in Statehelm said, \"This one's weird and sad. I need \"idealized skins from a family of giant rats.\" I don't think the rats need to be related. Who will know?\"": "Грим Джим в Стейтхелме сказал: «Этот заказ странный и грустный. Мне нужны «идеализированные шкуры от семьи гигантских крыс». Не думаю, что крысы должны быть родственниками. Кто узнает?»"
"Echur in Serbule wants you to deliver a bag of strange white powder to a \"mantis\" somewhere in the forests past Serbule.": "Эчур в Сербуле хочет, чтобы вы доставили мешок с странным белым порошком «богомолу» где-то в лесах за Сербулом."
"Fainor in Serbule wishes to know the secret of Ur-Bacon, but the recipe is known only to the undead.": "Файнор в Сербуле хочет узнать секрет Ур-Бэкона, но рецепт известен только нежити."
"Deliver 10 Ur-Bacons to Laura Neth in Kur Mountains. Reward: 2,617 councils.": "Доставьте 10 Ур-Беконов Лауре Нет в горах Кур. Награда: 2 617 советов."
"A goblin named Jumjab in Eltibule asked for oversized mandibles, sometimes found on Tor-Uraks.": "Гоблин по имени Джумджаб в Эльтибуле попросил большие челюсти, которые иногда встречаются у Тор-Ураков."
"Deliver 10 Urda Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,805 councils.": "Доставьте 10 сыров Урда Тимбл Питу в Крепость Хоган, Элтибул. Награда: 2 805 советов."
"Sir Arif wants you to kill Ursula and bring her creepy stuffed bear as proof.": "Сэр Ариф хочет, чтобы вы убили Урсулу и принесли её жуткого плюшевого медведя в качестве доказательства."
"Deliver 10 Utility Knives to Viedesi in Sun Vale. Reward: 4,230 councils.": "Доставьте 10 утилитарных ножей Виедеси в Солнечную Долину. Награда: 4,230 советов."
"Deliver 10 Vegan Nut Barley Breads to Irkima in Red Wing Casino. Reward: 5,615 councils.": "Доставьте 10 веганских орехово-ячменных хлебцов Иркиме в казино Красное Крыло. Награда: 5,615 советов."
"Raul in Sun Vale's Animal Town wants a dish called 'Vegetable Masterpiece'.": "Рауль из Животного города в Солнечной Долине хочет блюдо под названием «Овощное произведение»."
"Deliver 10 Vegetable Masterpieces to Laura Neth in Kur Mountains. Reward: 7,913 councils.": "Доставьте 10 овощных шедевров Лауре Неф в горах Кур. Награда: 7,913 советов."
"Velkort in Serbule offhandedly asked for some grapes.": "Велкорт в Сербуле вскользь попросил немного винограда."
"Velkort in Serbule wants you to obtain some Basic Spore Bombs for him. They can be made with a certain Mycology crafting recipe.": "Велкорт в Сербуле хочет, чтобы вы добыли для него несколько простых споровых бомб. Их можно изготовить по определённому рецепту кузнечного дела Микологии."
"Velkort in Serbule wants you to obtain a Brain Bug Lobe. He says they can occasionally be found from Brain Bugs.": "Велкорт в Сербуле хочет, чтобы вы добыли долю мозга жука. Он говорит, что их иногда можно найти у мозговых жуков."
"Velkort in Serbule mentioned some talking mantises in a field, and asked you to kill some and get their claws.": "Велкорт в Сербуле упомянул говорящих богомолов на поле и попросил тебя убить несколько и добыть их когти."
"Deliver 10 Venison Hashes to Laura Neth in Kur Mountains. Reward: 1,736 councils.": "Доставьте 10 тушёных оленин Лауре Нет в горах Кур. Награда: 1 736 советов."
"Deliver 10 Venison Jerkies to Fitz the Boatman on the Serbule docks. Reward: 1,625 councils.": "Доставьте 10 вяленых оленятин Фитцу Лодочнику на доках Сербуля. Награда: 1,625 советов."
"Deliver 10 Venison Psi-Mantis Styles to Fitz the Boatman on the Serbule docks. Reward: 954 councils.": "Доставьте 10 стилей Оленевода Пси-Мантиса Фитцу Лодочнику на доках Сербуля. Награда: 954 совета."
"Deliver 10 Venison Roasts to Fitz the Boatman on the Serbule docks. Reward: 2,010 councils.": "Доставьте 10 жарких из оленины Фитцу Лодочнику на доках Сербуля. Награда: 2 010 советов."
"Ailred in Povus said, \"Where the heck were you all this time?! No matter. How are your vexfish lettuce wraps? Fresh, I hope? I'll take that! And please make it snappy. I'm famished from waiting!\"": "Эйлред в Повусе сказал: «Где же вы все были всё это время?! Неважно. Как ваши рулеты из салата с вексфишем? Свежие, надеюсь? Я возьму их! И, пожалуйста, поторопитесь. Я умираю с голоду от ожидания!»"
"Deliver 10 Vexfish Lettuce Wraps to Ogamboe in the Fae Realm. Reward: 9,100 councils.": "Доставьте 10 листовых рулетов с рыбой Векс Огамбо в Царство Фей. Награда: 9 100 советов."
