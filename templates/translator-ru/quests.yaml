"Deliver 10 Quarter Hoops to Fitz the Boatman on the Serbule docks. Reward: 443 councils.": "Доставьте 10 Четвертей Обручей Фитцу Лодочнику на доках Сербуля. Награда: 443 совета."
"Braigon needs more quarter hoops for barrel making.": "Брейгону нужно больше четвертных обручей для изготовления бочек."
"Eveline Rastin in Red Wing Casino said, \"I have run out of quartz for new jewelry. I would ask Willem, but ... it's complicated. Can you get some for me?\"": "Эвелин Растин в казино Красное Крыло сказала: \"У меня закончился кварц для новых украшений. Я бы спросила у Виллема, но... это сложно. Ты можешь добыть немного для меня?\""
"Deliver 10 Quartzes to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 кварцев Вьедеси в Солнечную Долину. Награда: 4 760 советов."
"Shirogin in Rahu said, \"I was afraid of this. Yes, I know why I'm blacklisted. At the last formal execution, I complimented General Tremal on her tail. General Tremal was born here, unlike the oldest generals. Drawing attention to her tail was an insult and an embarrassment to her.\n\nHm? Oh, no, it wasn't a mistake. General Tremal had given me a backhanded compliment about my clothes, and I was reciprocating. I just didn't realize how far out of my league Tremal is. I'm blacklisted from executions!\n\nI need your help to make amends. I'm going to create the most wondrous gown for the general! I just need to know her favorite color. See if that beggar Three-Eye knows. He's in the dangerous part of town. Once you pass Sergeant Ultaka and are over the bridge, keep left. You'll see him on the porch, most likely.\"": "Широгин в Раху сказал: «Я боялся этого. Да, я знаю, почему меня внесли в чёрный список. На последней официальной казни я сделал комплимент генералу Тремал по поводу её хвоста. Генерал Тремал родилась здесь, в отличие от самых старых генералов. Обращать внимание на её хвост было оскорблением и позором для неё.\n\nА? О, нет, это не была ошибка. Генерал Тремал сделала мне косвенный комплимент по поводу моей одежды, и я ответил взаимностью. Просто я не осознавал, насколько далеко Тремал выше меня по статусу. Меня внесли в чёрный список казней!\n\nМне нужна твоя помощь, чтобы загладить вину. Я собираюсь создать самое чудесное платье для генерала! Мне просто нужно узнать её любимый цвет. Узнай у нищего Трёхглазого. Он в опасной части города. Пройдя сержанта Ультаку и перейдя мост, держись левее. Скорее всего, увидишь его на веранде."
"Deliver 10 Rabbit Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,419 councils.": "Доставьте 10 Зелий Усиления Кролика 20% Иркиме в Казино Красное Крыло. Награда: 2,419 советов."
"Ashk the Answerer in Rahu said, \"Oh, drat it, now I'm out of rabbit's feet! I'll have to import some more... unless you happen to know where to get some?\"": "Ашк Отвечающий в Раху сказал: «Ох, черт возьми, у меня закончились кроличьи лапки! Придется заказать ещё... если только ты не знаешь, где их достать?»"
"Deliver 10 Rabbits' Feet to Irkima in Red Wing Casino. Reward: 565 councils.": "Доставьте 10 кроличьих лапок Иркиме в казино Красное Крыло. Награда: 565 советов."
"Silvia in Sun Vale said, \"Most of the deer around here are healthy, but a number are rabid. Do me a favor and take care of that problem, would you?\"": "Сильвия в Солнечной Долине сказала: «Большинство оленей здесь здоровы, но есть несколько бешеных. Сделай одолжение и позаботься об этой проблеме, хорошо?»"
