"Malgath in the werewolf den asked you to obtain orange juice.": "Малгат в логове оборотней попросил тебя достать апельсиновый сок."
"Deliver 10 Orange Juices to Laura Neth in Kur Mountains. Reward: 2,512 councils.": "Доставьте 10 апельсиновых соков Лауре Нет в горах Кур. Награда: 2,512 советов."
"Deliver 10 Orange Perches to Laura Neth in Kur Mountains. Reward: 3,027 councils.": "Доставьте 10 оранжевых окуней Лауре Нет в горах Кур. Награда: 3 027 советов."
