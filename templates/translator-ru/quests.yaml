"Deliver 10 Pots of Smoky White Dye to Irkima in Red Wing Casino. Reward: 5,492 councils.": "Доставьте 10 банок с дымчато-белой краской Иркиме в казино Красное Крыло. Награда: 5,492 совета."
"Deliver 10 Pots of Thistle Dye to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,158 councils.": "Доставьте 10 горшков с краской из чертополоха Тимбл Питу в Крепость Хоган, Элтибуль. Награда: 3 158 советов."
"Deliver 10 Pots of Tomato Red Dye to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,621 councils.": "Доставьте 10 горшков с красной томатной краской Тимбл Питу в Хоганском Замке, Элтибуль. Награда: 1,621 совет."
"Deliver 10 Pots of Turquoise Dye to Irkima in Red Wing Casino. Reward: 5,492 councils.": "Доставьте 10 горшков с бирюзовой краской Иркиме в казино Красное Крыло. Награда: 5,492 совета."
"Deliver 10 Pots of White Dye to Irkima in Red Wing Casino. Reward: 5,492 councils.": "Доставьте 10 кувшинов с белой краской Иркиме в казино Красное Крыло. Награда: 5,492 совета."
"Deliver 10 Pots of Yellow Green Dye to Irkima in Red Wing Casino. Reward: 5,492 councils.": "Доставьте 10 банок с жёлто-зелёной краской Иркиме в казино Красное Крыло. Награда: 5,492 совета."
"Dog Ear in Povus said, \"Could you tell your Warden friends about me? I've been keeping a log of dangers in the area, but I can't really act on them alone. Maybe we could team up! Or something. Just tell the head of your Warden enclave about me. I'm here and ready to help however I can!\"": "Собака Ухо в Повусе сказал: «Не мог бы ты рассказать своим друзьям Стражам обо мне? Я веду журнал опасностей в этом районе, но сам справиться с ними не могу. Может, объединимся! Или что-то в этом роде. Просто сообщи главе вашего анклава Стражей обо мне. Я здесь и готов помочь, чем смогу!»"
"The dread lich Urg-Ak Faqu has come to claim Povus! His minions are empowered by spells that nullify most attacks. The town's only hope is to enable the protective pagodas! Bring monsters near activated pagodas to strip them of their defenses.\n\nThe monsters are invading from all sides, but it seems they're congregating on the north side of town.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Ужасный лич Ург-Ак Факу пришёл захватить Повус! Его приспешники усилены заклинаниями, которые нейтрализуют большинство атак. Единственная надежда города — активировать защитные пагоды! Приводи монстров к активированным пагодам, чтобы снять с них защиту.\n\nМонстры нападают со всех сторон, но, похоже, собираются на северной стороне города.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"A roving band of flapskulls and other undead have found their way to town. They have no necromantic master, but they are led by the hideous Chuckleflap. You can activate the pagodas in town if you need some fresh air.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Бродячая группа череполистов и другой нежити добралась до города. У них нет некромантского хозяина, но их возглавляет отвратительный Чаклфлап. Если нужно проветриться, можешь активировать пагоды в городе.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"Monsters are invading Povus under cover of darkness. Light the town's lamps to regain control.\n\n(To receive a personal reward, make sure you personally light at least one lamp.)": "Монстры вторгаются в Повус под покровом ночи. Зажги фонари в городе, чтобы вернуть контроль.\n\n(Чтобы получить личную награду, обязательно зажги хотя бы один фонарь сам.)"
"Scores of screaming orcs are invading from the river. They're taking over Old Town! Stop them!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Десятки вопящих орков вторгаются с реки. Они захватывают Старый город! Останови их!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"The mercenary Evil Carnivore Gang is trying to steal Povus's priceless protective pagodas! They've placed explosive spells on them and are planning to cart off the enchanted rubble.\n\nWithout the pagodas, Povus will soon be overrun with undead. Cleans the pagodas! You'll also need to defeat the raid leader, Asila the Spark, to convince the gang to back down.\n\n(To receive a reward, make sure that you personally activate a pagoda or defeat the gang leader.)": "Наёмная банда Злой Плотоядный пытается украсть бесценные защитные пагоды Повуса! Они наложили на них взрывные заклинания и планируют унести зачарованные обломки.\n\nБез пагод Повус скоро заполонят нежить. Очисти пагоды! Тебе также нужно победить лидера налёта, Асилу Искру, чтобы заставить банду отступить.\n\n(Чтобы получить награду, убедись, что лично активировал пагоду или победил лидера банды.)"
"Evil paleontologists are sieging town! Their extraordinary skeleton troops will require teamwork to defeat.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Злые палеонтологи осаждают город! Их необычные скелетные войска потребуют командной работы для победы.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"Ranalon-controlled megafauna are invading town! It will take concerted effort to thwart them.\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Мегафауна, контролируемая Раналоном, вторгается в город! Чтобы остановить их, потребуется совместное усилие.\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"The Annex district, along with the whole area south of town, is being flooded by Ranalon interlopers! Destroy their water portals and push back their assault force!\n\n(To receive a reward, make sure that you personally defeat at least one enemy.)\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Район Аннекс, а также вся территория к югу от города затоплены захватчиками Раналона! Уничтожьте их водные порталы и оттесните наступающую силу!\n\n(Чтобы получить награду, убедитесь, что лично победили хотя бы одного врага.)\n\n(Чтобы получить награду, убедитесь, что лично помогли победить хотя бы одного врага.)"
"Ratkin have invaded from the east and have already taken New Town. They're spreading a poison that only rats can survive. Stop them!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Раткины вторглись с востока и уже захватили Новый город. Они распространяют яд, который могут пережить только крысы. Останови их!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"Ratkin have infiltrated Old Town and the Sprawl and have claimed ownership of the town! Dispute their claim with prejudice!\n\n(To receive a reward, make sure that you personally help defeat at least one enemy.)": "Крысолюди проникли в Старый город и Разрастание и захватили власть в городе! Беспощадно оспорь их претензии!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного врага.)"
"The river-ranalon have brought a horrible beast to town! Kill it before it destroys us all!\n\n(To receive a reward, make sure that you personally help defeat the Boss enemy.)": "Речной раналон привёл в город ужасное чудовище! Убейте его, прежде чем оно уничтожит нас всех!\n\n(Чтобы получить награду, убедитесь, что лично помогли победить босса.)"
"Undead are being summoned into town! Defeat the undead ogres in New Town and find the death-faces and Shaman Lords in the Sprawl!\n\n(To receive a reward, make sure that you personally help defeat at least one Visage of Demise or Elite enemy.)": "В город призывают нежить! Победите неживых огров в Новом городе и найдите Лики Смерти и Шаманских Вождей в Разрастании!\n\n(Чтобы получить награду, убедитесь, что лично помогли победить хотя бы одного Лика Смерти или элитного врага.)"
"The local orcish warlord himself is attacking from the east, along with his best-equipped troops! Defend Povus!\n\n(To receive a reward, make sure that you personally help defeat at least one Elite or Boss enemy.)": "Местный орочий военачальник лично атакует с востока вместе со своими лучше всего оснащёнными войсками! Защищай Повус!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного или босса.)"
"Winter Court scouts think the town is weak, and they're attacking! They've invaded every neighborhood! Do something before they freeze and/or burn the place down!\n\n(To receive a reward, make sure that you personally help defeat at least one Elite enemy.)": "Разведчики Зимнего Двора считают город слабым и нападают! Они захватили каждый район! Сделай что-нибудь, прежде чем они заморозят или сожгут город!\n\n(Чтобы получить награду, убедись, что лично помог победить хотя бы одного элитного врага.)"
"Agrashab the troll wants powdered dust that can sometimes be found inside animated plants.": "Аграшаб тролль хочет порошкообразную пыль, которую иногда можно найти внутри оживших растений."
"Deliver 10 Powdered Mammals to Viedesi in Sun Vale. Reward: 682 councils.": "Доставьте 10 молотых млекопитающих Вьедеси в Солнечную Долину. Награда: 682 совета."
"Yavazek in Sun Vale's Animal Town asked you to collect the powdery substance that can sometimes be found in the remains of biting vines.": "Явазек из Звериного города Солнечной Долины попросил тебя собрать порошкообразное вещество, которое иногда можно найти в остатках кусающих лоз."
"Deliver 10 Power Potions to Fitz the Boatman on the Serbule docks. Reward: 1,125 councils.": "Доставьте 10 Зелий силы Фитцу Лодочнику на доках Сербуля. Награда: 1 125 советов."
"Kleave wants power potions.": "Клив хочет зелья силы."
"Furlak in Rahu asked you to bring him some Dwarven N Cores. He claims they can be found in ruins deep in the Ilmari desert.": "Фурлак в Раху попросил тебя принести ему несколько Ядер Гномов. Он утверждает, что их можно найти в руинах глубоко в пустыне Илмари."
"Felmer in the Fae Realm said, \"Once again I'm going to have to trek out into the dangerous wilds to collect the slime of fae molluscs... say, you know how to milk a snail, I presume? Would you mind doing it? Take some clean bottles with you to collect it!\"": "Фелмер в Царстве Фей сказал: «Снова придётся отправиться в опасные дикие земли, чтобы собрать слизь фейских моллюсков... Скажи, ты умеешь доить улитку, полагаю? Не мог бы ты этим заняться? Возьми с собой чистые бутылки, чтобы собрать слизь!»"
"Winston Veilmoor in Statehelm said, \"Oh, are you for hire? Great! I need special metal for my next promotional sword. I spent quite a bit to learn where to find it. I may have ordered the information from... overseas. And you know how it is with information from... overseas: always with the mysterious language! But I'm hoping you can figure it out!\n\n\t\"Within a mushroom tall as hills\n\tsomething something, wise preying mantises...\n\tsomething something minimum mining level of 50.\"\n\nI should have written it down, but that's what I remember. Hope it helps.\"": "Винстон Вейлмор в Стейтхелме сказал: «О, ты наёмник? Отлично! Мне нужен особый металл для моего следующего промоционного меча. Я потратил немало, чтобы узнать, где его найти. Возможно, я заказал информацию из... зарубежья. А ты знаешь, как бывает с информацией из... зарубежья: всегда на загадочном языке! Но я надеюсь, ты сможешь разобраться!\n\n «Где гриб выше холмов  \n что-то про мудрых богомолов...  \n что-то про минимальный уровень добычи 50.»\n\nЯ должен был записать это, но это то, что я помню. Надеюсь, поможет."
"Winston Veilmoor in Statehelm said, \"The rhino hide's miscoloration has thrown everything off kilter aesthetically! I need an entirely new accent color. And a different pommel crystal! Since you're basically responsible for this mess, can you help fix it? Don't worry. I'll pay.\"": "Винстон Вейлмур в Стейтхелме сказал: «Искажение цвета носороговой кожи полностью испортило внешний вид! Мне нужен совершенно новый акцентный цвет. И другой кристалл навершия! Поскольку ты, по сути, виноват в этом беспорядке, можешь помочь исправить ситуацию? Не волнуйся. Я заплачу.»"
"Winston Veilmoor in Statehelm said, \"Now, I won't be doing the enchantment on these upcoming promotional swords. We have quite a specialist for that task! But I do need to provide special foci. These will be worked into the weapon to strengthen and shape the magic in the weapon. I'm afraid I can accept no substitutes!\"": "Винстон Вейлмор в Стейтхелме сказал: «Теперь, я не буду заниматься наложением чар на эти предстоящие промоционные мечи. У нас есть настоящий специалист для этой задачи! Но мне нужно предоставить специальные фокусы. Они будут встроены в оружие, чтобы усилить и сформировать магию в оружии. Боюсь, я не могу принять замену!»"
"Preta at the fairy tree asked you for a Gem Crusher, some sort of small tool.": "Прета у дерева фей попросила у вас дробитель самоцветов, некий небольшой инструмент."
"Gerrux in Povus said, \"I'm working on artistically improving a dagger right now, but I need something very special: blue glass. But not any old blue glass. Only the glass from a pair of ratkin goggles will do! I also need several sets of hexapus teeth. I'm afraid this dagger will not be subtle.\"": "Геррукс в Повусе сказал: «Я сейчас работаю над художественным улучшением кинжала, но мне нужно кое-что очень особенное: синее стекло. Но не просто какое-то синее стекло. Подойдет только стекло из пары очков крысолюдей! Мне также нужно несколько комплектов зубов гекса-паука. Боюсь, этот кинжал не будет незаметным.»"
"Steven Poplar in Statehelm said, \"Arisetsu despises undeath. As any sane person should! I'm always on the lookout for potential undeath incidents, and I've detected one nearby.\n\nIn Vidaria there's a massive floating rock. Under that rock flow a constant stream of the undead. The soldiers are doing what they can to prevent the undead from swarming, but they could use help.\n\nSeek out the \"Lungers\". They're causing the most harm right now. Oh, and the dark-casting skeletons. Oh and also the fiery ones.\"": "Стивен Поплар в Стейтхелме сказал: «Арисецу презирает нежить. Как и любой здравомыслящий человек! Я всегда на чеку в поисках возможных случаев нежити и обнаружил один неподалёку.\n\nВ Видарии есть огромный парящий камень. Под этим камнем течёт постоянный поток нежити. Солдаты делают всё возможное, чтобы не дать нежити наводнить территорию, но им нужна помощь.\n\nИщи «Лангеров». Они сейчас причиняют наибольший вред. Ах да, ещё тёмных скелетов, и огненных тоже."
"Hogan in Hogan's Keep asked you to kill Gnasher Matriarchs. He says they are near a waterfall to the west.": "Хоган в Крепости Хогана попросил тебя убить Маток Гнашеров. Он говорит, что они находятся возле водопада на западе."
"Deliver 10 Priest Boost Potion 20% to Irkima in Red Wing Casino. Reward: 5,923 councils.": "Доставьте 10 Зелий усиления жреца 20% Иркиме в казино Красное Крыло. Награда: 5,923 совета."
"Deliver 10 Prim Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,622 councils.": "Доставьте 10 сыра Прим Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 1,622 совета."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>primitive armor stakes</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>примитивные костыли для брони</b>. Ты можешь сделать их для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Irkima in Red Wing Casino said, \"Please speak to Tavilak about her previous mates -- the ones she killed. Why did she do it? Is this why she is unwilling to mate with me?\"": "Иркима в казино Красное Крыло сказала: «Пожалуйста, поговорите с Тавилаком о её прежних партнёрах — тех, кого она убила. Почему она это сделала? Не из-за этого ли она не хочет спариваться со мной?»"
"Rick Snapley in New Prestonbule said, \"First off: you're on my shit list for keeping me in the dark about all this. I can't believe you would go off and kill that sand rat Tal-Saka without me!\n\nBut all signs do point to Rahu itself being involved. If that were true, there should be proof of it somewhere. The Onkara keep their records up on a hill in Rahu. Unfortunately, going there would be suicide. Even for me. Even for you! So for now, I guess that's where this mystery will stand.\"": "Рик Снэпли в Нью-Престонбуле сказал: «Во-первых: ты в моём чёрном списке за то, что держал меня в неведении обо всём этом. Не могу поверить, что ты отправился убивать того песчаного крыса Тал-Саку без меня!\n\nНо все признаки указывают на то, что сам Раху замешан в этом. Если это так, то где-то должно быть доказательство. Онкара хранят свои записи на холме в Раху. К сожалению, идти туда — это самоубийство. Даже для меня. Даже для тебя! Так что пока, похоже, на этом загадка и останется."
"Barnaby in the Sacred Warden Grotto said, \"Young foxes love colorful gems! I could use a selection of nice colors to use as teaching props.\"": "Барнаби в Священной пещере Хранителя сказал: «Молодые лисы обожают яркие драгоценные камни! Мне бы пригодился набор красивых цветов для использования в качестве учебного реквизита.»"
"Deliver 10 Provolone Cheese to Ogamboe in the Fae Realm. Reward: 21,481 councils.": "Доставьте 10 сыров Проволоне Огамбо в Царство Фей. Награда: 21,481 совет."
"Deliver 10 Psychic Resistance Potions to Viedesi in Sun Vale. Reward: 2,133 councils.": "Доставьте 10 зелий сопротивления психике Виедеси в Солнечную Долину. Награда: 2 133 совета."
"Deliver 10 Psychology Boost Potion 20% to Irkima in Red Wing Casino. Reward: 3,332 councils.": "Доставьте 10 Зелий повышения психологии 20% Иркиме в казино Красное Крыло. Награда: 3 332 совета."
"Rick Snapley in New Prestonbule said, \"Mox is mixing that potion you helped get the stuff for. But Sona caught a whiff of it and says she won't drink it! Stupid girl would rather have a limp all her days than spend a few nights in digestive agony! Well, if she's going to be a child about it, we'll have to treat her like one. And how do you make a child take their medicine? Honey! Lots of it.\"": "Рик Снэпли в Нью-Престонбуле сказал: «Мокс смешивает то зелье, для которого ты помог достать ингредиенты. Но Сона учуяла его запах и говорит, что не станет его пить! Глупая девчонка предпочла бы всю жизнь хромать, чем провести несколько ночей в пищеварительных муках! Что ж, если она будет вести себя как ребёнок, придётся обращаться с ней соответственно. А как заставить ребёнка принять лекарство? Мёдом! Много мёда.»"
"Deliver 10 Pumpkin Hummus to Sheyna in Rahu. Reward: 6,457 councils.": "Доставьте 10 порций тыквенного хумуса Шейне в Раху. Награда: 6,457 советов."
"Deliver 10 Pumpkin Salads to Ogamboe in the Fae Realm. Reward: 30,125 councils.": "Доставьте 10 тыквенных салатов Огамбо в Фейское царство. Награда: 30 125 советов."
"Deliver 10 Pumpkin Smoothies to Irkima in Red Wing Casino. Reward: 7,556 councils.": "Доставьте 10 тыквенных смузи Иркиме в казино Красное Крыло. Награда: 7 556 советов."
"Deliver 10 Pumpkin Soups to Irkima in Red Wing Casino. Reward: 7,682 councils.": "Доставьте 10 тыквенных супов Иркиме в казино Красное Крыло. Награда: 7,682 совета."
