"Deliver 10 Nice Spider Casings to Gremix in Amulna. Reward: 20,230 councils.": "Доставьте 10 хороших паучьих покровов Гремиксу в Амульне. Награда: 20 230 советов."
"Deliver 10 Nice Spring Fairy Tops to Gremix in Amulna. Reward: 14,137 councils.": "Доставьте 10 красивых весенних топов фей Гремиксу в Амульне. Награда: 14 137 советов."
"Deliver 10 Nice Storage Crates to Viedesi in Sun Vale. Reward: 16,191 councils.": "Доставьте 10 хороших складских ящиков Виедеси в Солнечную Долину. Награда: 16,191 советов."
"Deliver 10 Nice Werewolf Bardings to Sheyna in Rahu. Reward: 14,280 councils.": "Доставьте 10 красивых доспехов для оборотней Шейне в Раху. Награда: 14 280 советов."
"Deliver 10 Nice Werewolf Champrons to Sheyna in Rahu. Reward: 14,280 councils.": "Доставьте 10 Хороших набедренников оборотня Шейне в Раху. Награда: 14 280 советов."
"Deliver 10 Nice Werewolf Foreguards to Sheyna in Rahu. Reward: 14,586 councils.": "Доставьте 10 Хороших стражей-оборотней Шейне в Раху. Награда: 14,586 советов."
"Deliver 10 Nice Werewolf Hind Leg Guards to Sheyna in Rahu. Reward: 13,974 councils.": "Доставьте 10 Хороших задних защитных накладок оборотня Шейне в Раху. Награда: 13,974 совета."
"Deliver 10 Nice Werewolf Hindguards to Sheyna in Rahu. Reward: 14,076 councils.": "Доставьте 10 хороших задних частей оборотня Шейне в Раху. Награда: 14,076 советов."
"Deliver 10 Nice Winter Coats to Gremix in Amulna. Reward: 14,137 councils.": "Доставьте 10 хороших зимних пальто Гремиксу в Амульне. Награда: 14 137 советов."
"Deliver 10 Nice Winter Fae Rings to Ogamboe in the Fae Realm. Reward: 15,198 councils.": "Доставьте 10 красивых зимних колец фей Огамбо в Царство фей. Награда: 15,198 советов."
"Nishika in Rahu asked you to obtain a large amount of meat from grimalkins in the desert.": "Нишика в Раху попросила вас добыть большое количество мяса у грималкин в пустыне."
"Deliver 10 Nishika's Travel Snacks to Sheyna in Rahu. Reward: 4,884 councils.": "Доставьте 10 путевых закусок Нишики Шейне в Раху. Награда: 4,884 совета."
"An avatar of Tast in Povus said, Since you are no ordinary warsmith, you deserve a challenge worthy of you! Slay 100 sentient creatures in the name of war. Then I shall teach you the secrets you seek.\"": "Аватар Таста в Повусе сказал: Поскольку ты не обычный военный кузнец, ты заслуживаешь вызова, достойного тебя! Убей 100 разумных существ во имя войны. Тогда я открою тебе искомые тайны."
"Ensign Cricket aboard the Wintertide said, \"The loudest things aboard are definitely the hippogriffs. At first it was neat hearing them shriek all night, but it's gotten a little repetitive. I think any official invasion party would really need to kill those! Thanks!\"": "Мичман Крикет на борту Зимней Волны сказал: «Самые громкие существа на корабле — это определённо гиппогрифы. Сначала было интересно слушать их крики всю ночь, но теперь это стало немного утомительно. Думаю, любой официальный отряд вторжения действительно должен их уничтожить! Спасибо!»"
"An avatar of Tast in Povus said, I can teach you to craft wolf armor of astounding quality, blessed by my consort Norala. For while her wolves are strong, her smiths are weak! And weakness is not tolerated long in war. You will aid them to be war-worthy.\n\nBut Norala's boon requires the death of the largest, most horrific creatures. No ordinary orc or human shall do!\"": "Аватар Таста в Повусе сказал: Я могу научить тебя создавать волчью броню поразительного качества, благословленную моей супругой Норалой. Ведь хотя её волки сильны, её кузнецы слабы! А слабость в войне долго не терпят. Ты поможешь им стать достойными войны.\n\nНо дар Норалы требует смерти самых крупных и ужасных созданий. Обычные орки или люди не подойдут!"
"Farsight Flemmings in Statehelm said, \"Hmm. I know what THIS order's for. But that' s not our business. Just get the skin.\"": "Фарсайт Флеммингс в Стейтхелме сказал: «Хм. Я знаю, для чего этот заказ. Но это не наше дело. Просто достань шкуру.»"
"Deliver 10 Oak Dowels to Fitz the Boatman on the Serbule docks. Reward: 450 councils.": "Доставьте 10 дубовых шкантов Фитцу Лодочнику на доках Сербуля. Награда: 450 советов."
"Roshun the Traitor in Serbule asked for some Perfect Oak Wood with which to create staves.": "Рошун Предатель в Сербуле попросил немного идеального дубового дерева для создания посохов."
"Deliver 10 Oak Wood to Fitz the Boatman on the Serbule docks. Reward: 245 councils.": "Доставьте 10 единиц дубовой древесины Фитцу Лодочнику на причалы Сербуля. Награда: 245 советов."
"Deliver 10 Oak Wood Chips to Fitz the Boatman on the Serbule docks. Reward: 148 councils.": "Доставьте 10 щепок из дуба Фитцу Лодочнику на причалы Сербуля. Награда: 148 советов."
"Elmetaph thinks he can change your bind location to be 'somewhere' off of this island, which would let you teleport out of here. But he needs to do some calculations first. Get the info he needs by finding four obelisks on the island.": "Элметаф думает, что сможет изменить ваше место привязки на «где-то» вне этого острова, что позволит вам телепортироваться отсюда. Но сначала ему нужно сделать некоторые расчёты. Получите необходимую информацию, найдя четыре обелиска на острове."
"Deliver 10 Obsidians to Fitz the Boatman on the Serbule docks. Reward: 3,740 councils.": "Доставьте 10 обсидианов Фитцу Лодочнику на доках Сербуля. Награда: 3,740 советов."
"Bring 12 potatoes to Jesina.": "Принесите 12 картофелин Джесине."
"Elahil in Serbule asked you to obtain some Crossing Oil.": "Элахиль в Сербуле попросил тебя достать немного Пересекающего масла."
"Joeh in Serbule asked you to kill a tiger called \"Old Fangsworth\", rumored to live somewhere north of Serbule.": "Джо в Сербуле попросил тебя убить тигра по имени «Старый Клыковорт», о котором ходят слухи, что он живёт где-то к северу от Сербула."
"Deliver 10 Onion Blossoms to Fitz the Boatman on the Serbule docks. Reward: 716 councils.": "Доставьте 10 цветков лука Фитцу Лодочнику на доках Сербуля. Награда: 716 советов."
"Deliver 10 Onion Chickens to Ogamboe in the Fae Realm. Reward: 5,855 councils.": "Доставьте 10 луковых цыплят Огамбо в Фейское царство. Награда: 5,855 советов."
"Deliver 10 Onion Omelets to Fitz the Boatman on the Serbule docks. Reward: 1,272 councils.": "Доставьте 10 луковых омлетов Фитцу Лодочнику на причалы Сербуля. Награда: 1,272 совета."
"Deliver 10 Onion Rings to Fitz the Boatman on the Serbule docks. Reward: 934 councils.": "Доставьте 10 луковых колец Фитцу Лодочнику на доках Сербуля. Награда: 934 совета."
"Deliver 10 Onions to Fitz the Boatman on the Serbule docks. Reward: 262 councils.": "Доставьте 10 луков Фитцу Лодочнику на доках Сербуля. Награда: 262 совета."
"Torgan in New Prestonbule said, \"My new hammer must have a handle of impeccable quality. Spruce is, of course, the ideal wood for gripping, but its strength is substandard... except for very occasional pieces of spruce. I need those perfect specimens of spruce wood!\"": "Торган в Нью-Престонбуле сказал: «Мой новый молот должен иметь рукоять безупречного качества. Ель, конечно, идеальна для хвата, но её прочность оставляет желать лучшего... за исключением очень редких образцов ели. Мне нужны именно эти идеальные образцы еловой древесины!»"
"Ferand Deftwhisper in Povus said, \"If I'm going to run an armor shop again I'll need more grizlark, and Leah's kuvou are dead. But there's still feral kuvou! If you just let them spit on you and collect that into a bottle, I'll pay you.\"": "Ференд Дефтвиспер в Повусе сказал: «Если я снова открою магазин брони, мне понадобится больше гризларков, а куфу Лии мертвы. Но дикие куфу ещё есть! Если ты просто дашь им плюнуть на тебя и соберёшь это в бутылку, я заплачу тебе.»"
"Deliver 10 Onyxs to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 ониксов Виедеси в Солнечную Долину. Награда: 4,760 советов."
"Deliver 10 Opals to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 опалов Шейне в Раху. Награда: 4,930 советов."
