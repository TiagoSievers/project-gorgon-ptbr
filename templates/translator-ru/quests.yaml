"Amutasa requested some Cranium Balm to overcome her addiction to Cranium Powder.": "Амутаса попросила немного бальзама для черепа, чтобы преодолеть свою зависимость от порошка из черепа."
"Amutasa requested some Enhanced Cranium Powder so that she can work faster.": "Амутаса попросила немного улучшенного черепного порошка, чтобы она могла работать быстрее."
"Amutasa in Rahu asked you to get Masterwork Metal Slabs for her.": "Амутаса в Раху попросила вас добыть для неё мастерски изготовленные металлические плиты."
"Thimble Pete asked for a Trophy Rat Skin, which is a rare item found by expert skinners.": "Напёрсток Пит попросил Шкуру трофейной крысы — редкий предмет, который могут добыть опытные свежеватели."
"Drummond Stonecurl in Vidaria said, \"I owe you an apology. When you asked if I would collaborate with that orc on technology, I lost my temper. Hrmph. I actually <i>do</i> quite enjoy tinkering, and mining, and all the other stereotypical dwarven activities. I just hate when others presume that about me.\n\nPlease, return to your orcish friend and tell them I am willing to collaborate.\"": "Драммонд Стоункерл в Видарии сказал: «Я должен извиниться перед тобой. Когда ты спросил, буду ли я сотрудничать с тем орком по технологиям, я потерял самообладание. Хм. На самом деле я <i>действительно</i> люблю возиться с механизмами, заниматься добычей и всеми другими стереотипными гномьими делами. Просто ненавижу, когда другие делают такие предположения обо мне.\n\nПожалуйста, вернись к своему орочьему другу и скажи ему, что я готов к сотрудничеству."
"Lincha in Povus said, \"I'm not a huge calligraphy nut, but I used to practice every now and then. If I still had my amazing calligraphy bench, I might start again!\n\nHowever, I have to personally meet the craftsman to ensure that I'm not buying furniture made by slaves. Goblin slavers have flooded the market with that stuff, and I will have no part of it!\"": "Линча в Повусе сказала: «Я не большая фанатка каллиграфии, но раньше иногда занималась этим. Если бы у меня всё ещё был мой потрясающий стол для каллиграфии, я могла бы начать снова!\n\nОднако я должна лично встретиться с ремесленником, чтобы убедиться, что не покупаю мебель, сделанную рабами. Гоблинские работорговцы заполонили рынок такими вещами, и я не хочу иметь с этим ничего общего!"
"Lincha in Povus said, \"All my beautiful furniture was destroyed by invaders. Perhaps the most tragic was the loss of my amazing chair. It was hand-crafted by my favorite carpenter! Some day I hope to have a new one that's just as good.\"": "Линча в Повусе сказала: \"Вся моя прекрасная мебель была уничтожена захватчиками. Пожалуй, самой трагичной была потеря моего удивительного стула. Его вручную изготовил мой любимый плотник! Надеюсь, однажды у меня появится новый, такой же хороший.\""
"Lincha in Povus said, \"All of my cleaning tools were stolen by the orcs. Even my trusty cleaning stick! I used to use it to get items off of the roof, disgorge gutters and drains, and poke seeds into the dirt! It was an amazingly versatile stick. I saw a perfect replacement in Rahu, but they couldn't guarantee that it wasn't made by slave labor. So I had to keep searching...\"": "Линча в Повусе сказала: \"Орки украли все мои инструменты для уборки. Даже мою верную палку для уборки! Раньше я использовала её, чтобы снимать вещи с крыши, прочищать водостоки и стоки, и тыкать семена в землю! Это была удивительно универсальная палка. Я видела идеальную замену в Раху, но там не могли гарантировать, что она не была сделана рабским трудом. Так что мне пришлось продолжать поиски...\""
"Lincha in Povus said, \"The orcs destroyed all my beautiful furniture when they attacked Povus. I miss my meditation stool so badly! It was amazing! I would love to have a new one, but the furniture sold in Rahu is made by goblin slave-labor. Many in Rahu turn a blind eye to slavery, but I won't! My furniture has to be made by a crafter I know!\"": "Линча в Повусе сказала: \"Орки уничтожили всю мою прекрасную мебель, когда напали на Повус. Мне так не хватает моего табурета для медитации! Он был потрясающим! Я бы с радостью обзавелась новым, но мебель, которую продают в Раху, сделана рабским трудом гоблинов. Многие в Раху закрывают глаза на рабство, но не я! Моя мебель должна быть сделана ремесленником, которого я знаю!\""
"Anaberyl in Statehelm said, \"Okay. So these are the ingredients I need for the genital transmogrification potion. Bring these to me and I'll brew it up!\"": "Анабэриль в Стейтхельме сказала: \"Хорошо. Итак, вот ингредиенты, которые мне нужны для зелья трансмогрификации гениталий. Принеси их мне, и я его сварю!\""
"Anaberyl in Statehelm said, \"Here! Take this dreadful-smelling potion and tell Ormond that it will restructure his genitals, and it's the only way to ever be with me. When he refuses, tell him that you understand. Then come back and tell me how it went!\"": "Анаберил в Стейтхелме сказал: «Вот! Возьми это ужасно пахнущее зелье и скажи Ормонду, что оно перестроит его гениталии, и это единственный способ быть со мной. Когда он откажется, скажи, что ты понимаешь. Потом вернись и расскажи мне, как всё прошло!»"
"Anaberyl in Statehelm said, \"I've underestimated Ormond. And I need to apologize to him for that. So when I talk to him, I'd like to offer a gift. Can you get it for me?\n\nHis favorite flower is the desert rose. A  bouquet of them would help show my feelings.\"": "Анабэриль в Стейтхелме сказала: «Я недооценила Ормонда. И мне нужно извиниться перед ним за это. Поэтому, когда я с ним поговорю, я хотела бы подарить ему подарок. Ты можешь достать его для меня?\n\nЕго любимый цветок — пустынная роза. Букет таких цветов поможет выразить мои чувства."
"Preta in Sun Vale said, \"The spider legs you brought me were a lot of fun to study! Will you bring me some antlers from the local deer population? Be careful - some of them are rabid.\"": "Прета в Сан-Вейл сказала: \"Паучьи лапки, которые ты мне принёс, было очень интересно изучать! Не принесёшь мне рога местных оленей? Будь осторожен — некоторые из них бешеные.\""
"Preta in Sun Vale said, \"Working with physical paper is interesting. I've been reading some books about creatures in this realm. Could you bring me some spider legs to study?\"": "Прета в Сан-Вейл сказала: \"Работать с настоящей бумагой очень интересно. Я читала несколько книг о существах этого мира. Не мог бы ты принести мне несколько паучьих лапок для изучения?\""
"Deliver 10 Anchor Runes to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,799 councils.\nNote from orderer: <i>\"Used anchor runes will do... as long as they aren't still attached to whatever they were anchoring! He he he\"</i>": "Доставьте 10 рун якоря Тимбл Питу в Крепость Хогана, Элтибуле. Награда: 1,799 советов.\\nЗаметка от заказчика: <i>«Подойдут использованные руны якоря... если только они не прикреплены к тому, что якорили! Хе-хе-хе»</i>"
"Deliver 10 Ancient Stencils to Fitz the Boatman on the Serbule docks. Reward: 5,492 councils.": "Доставьте 10 древних трафаретов Фитцу Лодочнику на доки Сербуля. Награда: 5,492 council'ов."
"While you were angling at Bonnie's Hot Spring in the Ilmari desert, a psychic slug asked you to catch a particularly cruel Dorado. It only comes out at night.": "Пока вы рыбачили в горячем источнике Бонни в пустыне Илмари, слизень-телепат попросил вас поймать особенно жестокого дорадо. Он выплывает только ночью."
"You caught a bonefish, which isn't as boney as you'd come to expect, but is still boney. Catching a few more should give you the knowledge to fillet it.": "Вы поймали костлявую рыбу, которая не настолько костлявая, как можно было бы ожидать, но всё же костлявая. Поймав ещё несколько, вы получите достаточно знаний, чтобы разделывать её на филе."
"You caught an eagle ray. This is one freaky fish! Is it even edible? You'll need to catch some more to figure it out.": "Вы поймали орлякового ската. Вот уж жутковатая рыба! Его вообще можно есть? Вам нужно поймать ещё несколько, чтобы это выяснить."
"While angling in the ocean in Kur, a strange voice asked you for help. It wanted you to angle frozen posion jars out of the sea.": "Во время рыбалки в океане Кура странный голос попросил вас о помощи. Он хотел, чтобы вы выудили из моря замороженные кувшины с ядом."
"While angling near the town of Povus, a mysterious voice contacted you and asked for your help. Apparently \"ghost bass\" are causing havoc among the local fish and need to be removed. They can only be caught at night.": "Во время рыбной ловли неподалёку от города Повус с вами связался таинственный голос и попросил о помощи. По-видимому, «призрачные окуни» сеют хаос среди местной рыбы, и от них нужно избавиться. Их можно поймать только ночью."
"You caught a grouper and you're not quite sure what to do with it. You'll need to catch a few more to figure out how to prepare it.": "Вы поймали групера и не совсем уверены, что с ним делать. Вам нужно поймать ещё несколько, чтобы понять, как его приготовить."
"A nature spirit asked you to help remove invasive fish from the Serbule docks.": "Дух природы попросил вас помочь избавиться от инвазивной рыбы в доках Сербуля."
"A nature spirit hinted to you that it would appreciate your help removing junk from the Serbule moat.": "Дух природы намекнул вам, что будет признателен за вашу помощь в уборке мусора из рва Сербуля."
"While you were angling on the north end of Sun Vale's main island, a strange voice begged you to remove some of the starfish feeding on the local fish egg population.": "Когда вы рыбачили у северной оконечности главного острова Солнечной долины, странный голос умолял вас убрать несколько морских звёзд, питающихся местной популяцией рыбьей икры."
"You caught a marlin! It's massive and quite difficult to catch, but you did it. Catch some more to learn how to fillet it.": "Вы поймали марлина! Он огромный, и поймать его довольно трудно, но у вас получилось. Поймайте ещё несколько, чтобы научиться разделывать его на филе."
"You caught a non-Drevan (a/k/a salt-water) snook. Are snooks poisonous? You aren't sure. Catching a few more will give you the info to safely prepare it.": "Вы поймали недреванского (то есть морского) снука. Снуки ядовиты? Вы не уверены. Если поймаете ещё несколько, получите достаточно сведений, чтобы безопасно его приготовить."
"While angling in Povus near orcish land, a strange voice asked you to help kill Old Dreadtooth. Apparently it's a pretty big fish, and it only comes out at midnight.": "Во время рыбной ловли в Повусе, недалеко от орочьих земель, странный голос попросил вас помочь убить Старого Жуткозуба. Судя по всему, это очень большая рыба, и появляется она только в полночь."
"A nature spirit asked you to cull some of the poisonous slugs, and their eggs, near the waterfall in Eltibule.": "Дух природы попросил вас сократить численность ядовитых слизней и уничтожить их яйца у водопада в Эльтибуле."
"You caught a radiant muskie: a large yet bony fish. Catching a few more should give you the knowledge to fillet it.": "Вы поймали сияющего маскинонга: крупную, но костлявую рыбу. Поймав ещё несколько, вы получите достаточно знаний, чтобы разделывать её на филе."
"A nature spirit asked you to help reduce the number of scray eggs on the easternmost side of the eastern lake in Serbule Hills.": "Дух природы попросил вас помочь сократить количество яиц скреев на восточной стороне восточного озера в холмах Сербуля."
"You caught a sorubim and aren't sure which parts are edible. But catching a few more should give you the knowledge to fillet it.": "Вы поймали сорубима и не уверены, какие его части съедобны. Но если поймать ещё несколько, вы получите достаточно знаний, чтобы разделывать его на филе."
"You caught a striped bass. Huh. The stripes are pretty subtle, all things considered. Catching a few more should give you the knowledge to fillet it.": "Вы поймали полосатого окуня. Хм. Если подумать, полосы у него довольно слабо выражены. Поймав еще несколько, вы получите достаточно знаний, чтобы разделывать его на филе."
"You caught a tarpon. Pretty big but not huge. Catching a few more should give you the knowledge to fillet it.": "Вы поймали тарпона. Довольно большой, но не огромный. Поймав ещё несколько, вы получите достаточно знаний, чтобы разделывать его на филе."
"You caught an odd fish which you aren't sure how to fillet. You're an old hand at this though -- catch a few more and you'll figure it out!": "Вы поймали странную рыбу и не уверены, как её разделать на филе. Но вы в этом не новичок — поймайте ещё несколько, и разберётесь!"
"On Sun Vale's main island, on the northeast beach, some sort of entity asked you to remove a huge clownfish. It can only be caught at dusk or dawn (5am or 7pm).": "На главном острове Сан-Вейла, на северо-восточном пляже, какая-то сущность попросила вас убрать огромную рыбу-клоуна. Её можно поймать только на рассвете или в сумерках (5 утра или 7 вечера)."
"in a lake just southeast of Eltibule Keep, a telepathic spirit of some kind asked you to catch a \"scary\" pike that's invaded. The pike can only be caught at night.": "в озере к юго-востоку от крепости Эльтибуль какой-то телепатический дух попросил вас поймать вторгшуюся «страшную» щуку. Щуку можно поймать только ночью."
"While angling in a lake in northeast Povus, you encountered a voice that asked you to remove some of the aggressive frogs from the lake. These frogs can be caught with angling at dusk, and a little while after. (7pm-8pm)": "Во время рыбной ловли в озере на северо-востоке Повуса вы услышали голос, который попросил вас убрать из озера несколько агрессивных лягушек. Этих лягушек можно поймать рыбной ловлей в сумерках и некоторое время после. (7pm-8pm)"
"While you were angling on the docks in Rahu, a psychic creature asked you to help remove a toxic type of seaweed that is choking nearby sea life.": "Пока вы рыбачили на доках в Раху, психическое существо попросило вас помочь убрать ядовитый вид морских водорослей, который душит ближайшую морскую живность."
"You caught a triple-tail, which seems to not actually have three tails. Beyond this disappointing revelation, you have no idea how to prepare it, but you'll get the hang of it if you catch some more.": "Вы поймали трёхвоста, у которого, как оказалось, на самом деле вовсе не три хвоста. Помимо этого досадного открытия, вы понятия не имеете, как его готовить, но разберётесь, если поймаете ещё несколько."
"Some sort of entity spoke to you on Sun Vale Island's south beach. It asked you to remove invasive ice fish via angling.": "Какая-то сущность заговорила с вами на южном пляже острова Сан-Вейл. Она попросила вас избавиться от инвазивных ледяных рыб с помощью рыбной ловли."
"You caught a Vertan tuna. This is the smaller cousin of the famous Ormalan Tuna. Catching a few more should give you the knowledge to fillet it.": "Вы поймали вертанского тунца. Это меньший родственник знаменитого ормаланского тунца. Поймав ещё несколько, вы получите достаточно знаний, чтобы разделывать его на филе."
"On the south end of Sun Vale's \"Ranalon Island\", a psychic fish asked you to help remove extremely vicious eels via angling.": "На южной оконечности \"острова Раналон\" в Солнечной долине вас попросила помочь избавиться от чрезвычайно свирепых угрей с помощью рыбной ловли рыба-телепат."
"You caught a vidarian pickerel, which is famously tricky to prepare. But catching a few more should give you the knowledge to fillet it.": "Вы поймали видарийского пикереля, которого, как известно, очень непросто разделывать. Но если поймать ещё несколько, вы получите достаточно знаний, чтобы научиться разделывать его на филе."
"You caught a wahoo. This is a massive fish! Catching a few more should give you the knowledge to fillet it.": "Вы поймали ваху. Это огромная рыба! Поймав ещё несколько, вы получите достаточно знаний, чтобы разделывать её на филе."
"Deliver 10 Animal Handling Boost Potion 20% to Irkima in Red Wing Casino. Reward: 1,438 councils.": "Доставьте 10 зелий усиления Ухода за животными 20% Иркиме в казино «Красное Крыло». Награда: 1,438 советов."
"Landri in the Kur Mountains asked you to cull the Fire Sheep that have been recently appearing up in Kur.": "Ландри в горах Кур попросил вас сократить поголовье Огненных Овец, которые недавно начали появляться в Куре."
"Shirogin in Rahu asked you to confront Ichin the Ice-Master. Ichin has an invitation to the formal execution, and Shirogin wants to know why he didn't get one.": "Широгин в Раху попросил вас поговорить с Ичином, Ледяным мастером. У Ичина есть приглашение на официальную казнь, и Широгин хочет знать, почему он его не получил."
"Malgath in the werewolf den asked you to obtain some wolfsbane for him.": "Малгат в логове оборотней попросил вас добыть для него немного волчьего корня."
"Deliver 10 Antlers to Fitz the Boatman on the Serbule docks. Reward: 248 councils.\nNote from orderer: <i>\"Time for a stag party!\"</i>": "Доставьте 10 пар рогов Фитцу Лодочнику на причалы Сербуля. Награда: 248 советов.  \nПримечание от заказчика: <i>«Время для оленьей вечеринки!»</i>"
"Deliver 10 Appenzeller Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 19,125 councils.": "Доставьте 10 аппенцеллерских сыров Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 19,125 council'ов."
"Hiral at the fairy tree has asked for apple juice.": "Хирал у дерева фей попросил яблочный сок."
"Deliver 10 Apple Juices to Laura Neth in Kur Mountains. Reward: 1,222 councils.": "Доставьте 10 яблочных соков Лауре Нет в горах Кур. Награда: 1,222 councils."
"Deliver 10 Apple Shaved Ices to Ogamboe in the Fae Realm. Reward: 2,225 councils.": "Доставьте 10 яблочных фруктовых льдов Огамбое в Фейском царстве. Награда: 2,225 council'ов."
"Shirogin in Rahu said, \"This is so frustrating! Where am I going to get aquamarine dye for General Tremal's gown? I checked with my supplier, but she sold all of it to a human named Charles Thompson, who used it all for research! And to make matters worse, this human left weeks ago on a ship bound to Serbule! If you ever find yourself in that backwoods town, maybe you can locate him and get the dye recipe.\n\nI just need three doses of aquamarine dye. This shouldn't be hard!\"": "Широгин в Раху сказал: «Это так раздражает! Где мне взять аквамариновую краску для платья генерала Тремал? Я проверил у своего поставщика, но она продала всё человеку по имени Чарльз Томпсон, который использовал её всю для исследований! И что ещё хуже, этот человек уехал несколько недель назад на корабле в Сербуль! Если когда-нибудь окажешься в том захолустье, может, сможешь найти его и получить рецепт краски.\n\nМне нужно всего три дозы аквамариновой краски. Это не должно быть сложно!"
"Solgribue in the Fae Realm said, \"Need more aquamarine gems. Need... hmm... four. Plus one extra.\"": "Солгрибью в Царстве фей сказал: \"Нужно больше аквамариновых самоцветов. Нужно... хм... четыре. Плюс ещё один.\""
"Deliver 10 Aquamarines to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 аквамаринов Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 4,080 советов."
"Deliver 10 Archery Boost Potion 20% to Irkima in Red Wing Casino. Reward: 5,379 councils.": "Доставьте 10 Зелий усиления Стрельбы из лука 20% Иркиме в казино «Красное Крыло». Награда: 5,379 советов."
"Deliver 10 Arm Bones to Gremix in Amulna. Reward: 2,223 councils.": "Доставьте 10 костей рук Гремиксу в Амульне. Награда: 2,223 council'ов."
"Deliver 10 Armor Potions to Fitz the Boatman on the Serbule docks. Reward: 604 councils.": "Доставьте 10 зелий брони Фитцу Лодочнику на доки Сербуля. Награда: 604 councils."
"Thedar said, \"So, you want to be an Armorsmith do you? Let's start out simple! Forge and bring me one full <b>unenchanted</b> Crude Chainmail suit and I will see what I can do to help you advance your craft!  \"": "Тедар сказал: \"Значит, хочешь стать бронником? Давай начнём с простого! Выкуй и принеси мне один полный <b>незачарованный</b> комплект грубой кольчуги, и я посмотрю, чем смогу помочь тебе в совершенствовании твоего ремесла!  \""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's try something a bit more advanced this time! Forge and bring me one full <b>enchanted</b> Decent Chainmail suit and I will see what I can do to help you advance your craft!  \"": "Тедар сказал: \"Итак, хочешь стать бронником? Давай на этот раз попробуем кое-что посложнее! Выкуй и принеси мне один полный <b>зачарованный</b> комплект неплохой кольчуги, и я посмотрю, чем смогу помочь тебе в развитии твоего ремесла!  \""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's move on to something more complex! Forge and bring me one full Quality Dwarven Plate suit and I will see what I can do to help you advance your craft!  \"": "Тедар сказал: \"Значит, хочешь стать бронником? Тогда перейдём к чему-нибудь посложнее! Выкуй и принеси мне один полный качественный комплект дварфийских лат, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Amazing Orcish Plate suit and I will see what I can do to help you advance your craft!  \"": "Тедар сказал: \"Значит, хочешь стать бронником? Давай перейдём к делу! Выкуй и принеси мне один полный комплект изумительных оркских лат, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \""
"Thedar said, \"So, you want to be an Armorsmith do you? Let's get to the good stuff now! Forge and bring me one full Awesome Orcish Plate suit and I will see what I can do to help you advance your craft!  \"": "Тедар сказал: \"Значит, хочешь стать бронником? Тогда перейдём к делу! Выкуй и принеси мне один полный великолепный орочий латный доспех, и я посмотрю, чем смогу помочь тебе продвинуться в твоём ремесле!  \""
"Deliver 10 Aromatic Chickens to Laura Neth in Kur Mountains. Reward: 6,916 councils.": "Доставьте 10 ароматных кур Лауре Нет в горах Кур. Награда: 6,916 council'ов."
"Elahil in Serbule asked you to deliver a bundle of arrow shafts to Joeh across town.": "Элахиль в Сербуле попросил вас доставить связку древков для стрел Джоэ через город."
"Gurki asked you for some Advanced Reservoir Arrows": "Гурки попросил вас принести несколько продвинутых резервуарных стрел"
"Lincha in Povus said, \"The orc invaders stole all my wine! Most of it wasn't even ready for drinking yet! And now I must start all over. But the hogsheads for sale in Rahu may have been made by goblin-owned slaves. Nobody keeps track of that stuff in Rahu, but it matters to me! I need all my hogsheads to be made by free folk.\"": "Линча в Повусе сказала: \"Орки-захватчики украли всё моё вино! Большая его часть ещё даже не была готова к употреблению! И теперь мне приходится начинать всё заново. Но винные бочки, которые продаются в Раху, возможно, были сделаны рабами, принадлежащими гоблинам. В Раху никто не отслеживает такие вещи, но для меня это важно! Мне нужно, чтобы все мои винные бочки были сделаны свободным народом.\""
"Deliver 10000 Astonishing Arrow to Ogamboe in the Fae Realm. Reward: 6,590 councils.": "Доставьте 10000 Изумительных стрел Огамбое в Царство фей. Награда: 6,590 советов."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Поразительные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают поразительные стрелы с зазубринами. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Поразительно плотные стрелы. Я щедро заплачу за них, но вам нужно изготовить их по военным стандартам, так что никакого старого отсыревшего запаса.\""
"Deliver 10000 Astonishing Long Arrow to Ogamboe in the Fae Realm. Reward: 8,802 councils.": "Доставьте 10000 Поразительных длинных стрел Огамбое в Фейское царство. Награда: 8,802 советов."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Поразительные длинные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Deliver 10000 Astonishing Reservoir Arrow to Ogamboe in the Fae Realm. Reward: 30,004 councils.": "Доставьте 10000 Изумительных стрел резервуара Огамбое в Фейском царстве. Награда: 30,004 советов."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Поразительные стрелы резервуара. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Deliver 10000 Astonishing Snare Arrow to Ogamboe in the Fae Realm. Reward: 9,363 councils.": "Доставьте 10000 изумительных стрел-ловушек Огамбое в Царстве фей. Награда: 9,363 советов."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Astonishing Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Поразительные стрелы-ловушки. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Farsight Flemmings in Statehelm said, \"The craniologist loved the skulls and ordered another batch! These need to be \"astonishingly impressive\" though.\"": "Дальнозоркий Флеммингс в Стейтхельме сказал: \"Краниологу понравились черепа, и он заказал ещё одну партию! Но эти должны быть \"поразительно впечатляющими\".\""
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>astounding armor patch kits</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие наборы для починки брони</b>. Ты можешь сделать их для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10 Astounding Calligraphy Bench to Ogamboe in the Fae Realm. Reward: 28,892 councils.": "Доставьте 10 Поразительных столов каллиграфии Огамбое в Фейское царство. Награда: 28,892 councils."
"Deliver 10 Astounding Chair to Ogamboe in the Fae Realm. Reward: 44,682 councils.": "Доставьте 10 Поразительный стул Огэмбо в Фейское царство. Награда: 44,682 councils."
"Deliver 10 Astounding Clubs to Ogamboe in the Fae Realm. Reward: 29,555 councils.": "Доставьте 10 Поразительных дубин Огамбое в Фейское царство. Награда: 29,555 советов."
"Deliver 10 Astounding Combat Staves to Ogamboe in the Fae Realm. Reward: 29,555 councils.": "Доставьте 10 поразительных боевых посохов Огамбое в Царство фей. Награда: 29,555 советов."
"Deliver 10 Astounding Meditation Stool to Ogamboe in the Fae Realm. Reward: 30,008 councils.": "Доставьте 10 Поразительных табуреток для медитации Огамбое в Фейское царство. Награда: 30,008 советов."
"Deliver 10 Astounding Melee Staves to Ogamboe in the Fae Realm. Reward: 27,999 councils.": "Доставьте 10 Поразительных боевых посохов Огамбое в Царстве фей. Награда: 27,999 советов."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>astounding metal slabs</b>. Can you mine some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept ore that you didn't mine yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие металлические слитки</b>. Ты можешь добыть их для меня?\n\nМой дядя строго следует правилам гильдии кузнецов-гномов. Это значит, что я не могу принять руду, которую ты не добывал сам!"
"Deliver 10 Astounding Metal Slabs to Ogamboe in the Fae Realm. Reward: 6,249 councils.": "Доставьте 10 поразительных металлических плит Огамбое в Царство фей. Награда: 6,249 council'ов."
"Deliver 10 Astounding Priest Staves to Ogamboe in the Fae Realm. Reward: 29,716 councils.": "Доставьте 10 поразительных жреческих посохов Огамбое в Царство фей. Награда: 29,716 советов."
"Deliver 100 Astounding Throwing Knives to Ogamboe in the Fae Realm. Reward: 7,123 councils.": "Доставьте 100 Поразительных метательных ножей Огамбое в Царстве фей. Награда: 7,123 советов."
"Baroness Marith Felgard in Serbule Hills said, \"We need to slow down the ranalon food production. They have a massive number of farmers in those lakes. Dispatch them! I shall reward you with 500 Councils.\"": "Баронесса Марит Фелгард в Сербульских холмах сказала: \"Нам нужно замедлить производство пищи раналонов. У них в тех озёрах огромное количество фермеров. Уничтожьте их! Я награжу вас 500 Совернами.\""
"Lady Alethina in Red Wing Casino said, \"I have a new lead on the secret military force buried in the Ilmari desert! You're going to help me crack this once and for all. Head to the desert and find the bunker the locals call \"the labyrinth.\" It's south of Amulna, and rakshasa bandits are standing right near the entrance. Once you're underground, go down a few floors to the minotaur halls, then down again, and yet again. At the lowest floor of this place is a hag named Claudia. Kill her! Bring friends -- hags are no joke.\n\nClaudia is said to have a vast treasure trove, which you can keep! All I need are the important documents that should be inside.\n\nI understand there's some sort of mechanism that protects her treasure. Just figure it out and get it done.\"": "Леди Алетина в казино «Красное Крыло» сказала: «У меня новая зацепка по поводу секретной военной силы, скрытой в пустыне Илмари! Ты поможешь мне разгадать это раз и навсегда. Отправляйся в пустыню и найди бункер, который местные называют «лабиринтом». Он находится к югу от Амулны, а у входа стоят разбойники ракшасы. Оказавшись под землёй, спускайся на несколько этажей вниз до залов минотавров, затем ещё ниже, и ещё раз. На самом нижнем этаже этого места живёт ведьма по имени Клаудия. Убей её! Возьми с собой друзей — ведьмы не шутка.\\n\\nГоворят, у Клаудии есть огромное сокровище, которое ты можешь оставить себе! Мне нужны только важные документы, которые должны быть внутри.\\n\\nЯ понимаю, что там есть какой-то механизм, защищающий её сокровище. Просто разберись с ним и выполни задание."
"Lady Alethina in Red Wing Casino said, \"Far from here, on a freezing plateau in Gazluk, there is a city of orcs. Find this place and sneak into their keep. I need you to assassinate some important people... and creatures... for political reasons. This will be dangerous; bring allies that you trust. Here's a list of those who must die. Remember, all of these are on the top floor of the keep. You don't need to go into the lower level.\"": "Леди Алетина в казино «Красное Крыло» сказала: \"Далеко отсюда, на ледяном плато в Газлуке, есть город орков. Найдите это место и тайно проникните в их крепость. Мне нужно, чтобы вы убили нескольких важных персон... и существ... по политическим причинам. Это будет опасно; возьмите с собой союзников, которым доверяете. Вот список тех, кто должен умереть. Помните, все они находятся на верхнем этаже крепости. Вам не нужно спускаться на нижний уровень.\""
"Lady Alethina in Red Wing Casino said, \"I have heard terrifying tales of creatures deep beneath Gazluk Keep. I need you to investigate and correct these problems before they become severe. Bring allies! You'll need to trek deep into the lower level of the keep.\n\nFirst, there is a 'productivity expert' that apparently achieves excellent results. We don't want them being productive, so fix that. Next, they have a massive urak pumping out eggs daily. That's got to stop!\n\nLast, and most troubling, there is supposedly a demon hidden down there, summoned by foolish mages. They call it a 'gargoyle'. They do not understand how powerful it is. Slay it before it can open a portal and invade this world!\"": "Леди Алетина в казино «Красное Крыло» сказала: «Я слышала ужасающие рассказы о существах глубоко под крепостью Газлук. Мне нужно, чтобы ты расследовал и устранил эти проблемы, прежде чем они станут серьёзными. Возьми союзников! Тебе предстоит пробираться глубоко на нижний уровень крепости.\n\nВо-первых, там есть «эксперт по продуктивности», который, по-видимому, достигает отличных результатов. Мы не хотим, чтобы он был продуктивным, так что исправь это. Далее у них есть огромный урак, который ежедневно откладывает яйца. Это нужно остановить!\n\nИ наконец, самое тревожное — там, по слухам, спрятан демон, призванный глупыми магами. Его называют «гаргульей». Они не понимают, насколько он силён. Убей его, прежде чем он откроет портал и вторгнется в этот мир!"
"Lady Alethina in Red Wing Casino said, \"Head to the Ilmari desert and seek out the giant yellow crystals where the manticores live... and kill them! Manticores often have Hegemonic Storage Keys, which you'll need. Just keep killing manticores until you have at least five keys.\n\nNext you must find the entrance to a massive bunker under the sand. It's southwest of the manticores. There are rakshasa bandits nearby, so torture them for information if you're lost.\n\nOnce inside, use the keys on the chests you'll find. Take careful note of what you find -- I need that intelligence for my report.\n\nAlong the way you'll meet a certain Striga who will prevent you from going downstairs. Definitely kill him. On the next floor, look for a minotaur named Asterion and kill him, too. He has something I need; bring it to me.\n\nRemember not to go too far down -- once you go past the steward, you'll be on the correct floor to find Asterion.\n\nOh, and don't underestimate him. Asterion is FAR more dangerous than typical minotaurs.\"": "Леди Алетина в казино «Красное Крыло» сказала: «Отправляйся в пустыню Илмари и ищи гигантские жёлтые кристаллы, где живут мантикоры... и убей их! У мантикоров часто бывают Ключи Гегемонического Хранилища, которые тебе понадобятся. Просто продолжай убивать мантикоров, пока не соберёшь как минимум пять ключей.\n\nДалее тебе нужно найти вход в огромный бункер под песком. Он находится к юго-западу от мантikor. Поблизости есть разбойники ракшасы, так что пытай их ради информации, если заблудишься.\n\nОказавшись внутри, используй ключи на сундуках, которые найдёшь. Внимательно записывай, что найдёшь — мне нужна эта разведданные для моего отчёта.\n\nПо пути ты встретишь определённого Стригу, который не позволит тебе спуститься вниз. Обязательно убей его. На следующем этаже ищи минотавра по имени Астерион и тоже убей его. У него есть то, что мне нужно; принеси это мне.\n\nПомни, не спускайся слишком глубоко — как только пройдёшь управляющего, ты окажешься на нужном этаже, где найдёшь Астериона.\n\nО, и не недооценивай его. Астерион НАМНОГО опаснее обычных минотавров."
"Lady Alethina in Red Wing Casino said, \"Head to Rahu and find a way into their sewer system. There is a problematic black-market poison merchant in the upper levels of the sewer; put an end to his evil schemes! Next, you'll need to figure out how to reach the lower levels of the place. I understand that there's a massive slime somewhere in the pipes and it's beginning to contaminate the city's water supply. If their water becomes unsafe, Rahu will be devastated and the area will become a warzone again. So go fix that. Finally, there is some sort of militant group of rat-people down there somewhere whose political alignment is problematic; depose their king and that should leave them in disarray.\n\nThe sewers are relatively safe, so you can scout things out on your own... but you're going to need friends to kill these targets! They're tougher than the rest of the stuff down there.\"": "Леди Алетина в казино «Красное Крыло» сказала: «Отправляйся в Раху и найди способ попасть в их систему канализации. В верхних уровнях канализации есть проблемный торговец ядами с чёрного рынка; положи конец его злым замыслам! Затем тебе нужно выяснить, как добраться до нижних уровней этого места. Я слышала, что где-то в трубах находится огромный слизень, который начинает загрязнять водоснабжение города. Если их вода станет небезопасной, Раху будет разрушен, и район снова превратится в зону боевых действий. Так что исправь это. Наконец, где-то там внизу есть воинственная группа крысоподобных существ с проблемной политической ориентацией; свергни их короля, и это должно привести их в хаос.\\n\\nКанализация относительно безопасна, так что ты можешь разведать всё самостоятельно... но для убийства этих целей тебе понадобятся союзники! Они сильнее остальных обитателей там."
"Lady Alethina in Red Wing Casino said, \"I have an extremely difficult task today. You need to enter the fae realm near Sun Vale. There's a Winter ship in orbit there. Sneak aboard and take out some problems.\"": "Леди Алетина в казино «Красное Крыло» сказала: \"Сегодня у меня есть чрезвычайно трудное задание. Тебе нужно войти в мир фей рядом с Сан-Вейл. Там на орбите находится корабль Зимнего Прилива. Проберись на борт и устрани несколько проблем.\""
"Lady Alethina in Red Wing Casino said, \"I hope you're as good as you think you are, because this one is tricky. Enter the fae realm near Sun Vale. There's a Winter planeship there; sneak aboard. Then find some bird-creature named... Hmm, my notes say \"Coldfeather\" but there's also something called \"Hotfeather\" aboard. Kill them both, to be safe.\n\nI also need you to open some of their storage chests and take note of the contents. You should be able to find keys aboard the ship. Good luck. Bring friends.\"": "Леди Алетина в казино «Красное Крыло» сказала: «Надеюсь, ты так хорош, как думаешь, потому что это задание сложное. Войди в мир фей рядом с Сан-Вейл. Там находится зимний планесшип; проберись на борт. Затем найди какое-то птицеподобное существо по имени... Хм, в моих записях указано \"Холодное Перо\", но на корабле есть ещё нечто под названием \"Горячее Перо\". Убей их обоих, на всякий случай.\n\nМне также нужно, чтобы ты открыл несколько их сундуков для хранения и записал содержимое. Ключи от сундуков ты должен найти на корабле. Удачи. Возьми с собой друзей."
"Tremmond Blackhammer in Povus said, \"I have the parts I need for my auto-clamp, but... Well, it's been a few decades since I made anything like this. I'm trying to remember how it's done. I <i>think</i> I just need a T crystal, which I have on-hand... But what if I actually need an L crystal? In that case, we're looking at a pretty dangerous explosion when I plug in the wrong part.\n\nI'm not really prepared for that sort of chemical fire here, because... oh, nevermind, trying to explain myself to you is worse than talkin' to a child.\n\nHere's what I need: a nice fae blanket. Like the fairies in Statehelm sell sometimes. Or just make one. You know how to make one, right? You just sew up the edges of some fae silk. Simple as that!\"": "Треммонд Блэкхэммер в Повусе сказал: «У меня есть нужные детали для моего автозажима, но... Ну, прошло уже несколько десятилетий с тех пор, как я делал что-то подобное. Я пытаюсь вспомнить, как это делается. Я <i>думаю</i>, мне просто нужен Т-кристалл, который у меня есть под рукой... Но что если мне на самом деле нужен Л-кристалл? В таком случае нас ждёт довольно опасный взрыв, если я подключу неправильную деталь.\n\nЯ не совсем готов к такому химическому пожару здесь, потому что... ой, неважно, пытаться объяснить это тебе хуже, чем разговаривать с ребёнком.\n\nВот что мне нужно: хороший фейский плед. Такой, какие иногда продают феи в Стейтхелме. Или просто сделай один. Ты же знаешь, как его сделать, да? Просто зашей края из фейского шёлка. Вот и всё!"
"Deliver 10 Autumn Salads to Ogamboe in the Fae Realm. Reward: 18,214 councils.": "Доставьте 10 осенних салатов Огамбое в Фейском царстве. Награда: 18,214 советов."
"Mirraverre has asked you to find three pieces of a nightmare hidden in the ghost town to the north.": "Мирраверр попросила вас найти три части кошмара, спрятанные в городе-призраке на севере."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Barbed Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают потрясающие стрелы с зазубринами. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Потрясающие плотные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие длинные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никакого старого отсыревшего запаса.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Потрясающие стрелы Резервуара. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Awesome Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они просят Потрясающие стрелы-ловушки. Я щедро за них заплачу, но тебе нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
"Deliver 10 BBQ Ribs to Laura Neth in Kur Mountains. Reward: 4,906 councils.": "Доставьте 10 рёбрышек барбекю Лауре Нет в горах Кур. Награда: 4,906 councils."
"Parella in Statehelm said, \"I've been watching the scattered ranalon off the coast, and I have grim news. A powerful chieftan is ready to lead the remaining ranalon in an attack! You totally need to kill him.\n\nActivate the same underwater beacon as before, and this time look for Dreadfin Absolum. Oh, and bring some backup, or you'll surely drown!\n\nDon't worry, you have my confidence in you. It will serve as a guide!\"": "Парелла в Стейтхелме сказала: «Я наблюдала за разбросанными раналонами у побережья и у меня мрачные новости. Могущественный вождь готов возглавить оставшихся раналонов в атаке! Тебе обязательно нужно его убить.\n\nАктивируй тот же подводный маяк, что и раньше, а на этот раз ищи Ужасного Абсолума. О, и возьми с собой подкрепление, иначе ты точно утонешь!\n\nНе волнуйся, у тебя есть моё доверие. Оно послужит тебе путеводителем!"
"Deliver 10 Bacon Baskets to Sheyna in Rahu. Reward: 2,666 councils.": "Доставьте 10 корзин с беконом Шейне в Раху. Награда: 2,666 council'ов."
"Joeh in Serbule wants some bacon.": "Джоэ в Сербуле хочет немного бекона."
"Deliver 10 Bacon-Lover's Omelets to Sheyna in Rahu. Reward: 7,169 councils.": "Доставьте 10 омлетов для любителя бекона Шейне в Раху. Награда: 7,169 council'ов."
"Deliver 10 Bacons to Fitz the Boatman on the Serbule docks. Reward: 460 councils.": "Доставьте 10 беконов Фитцу Лодочнику на доки Сербуля. Награда: 460 council'ов."
"Midge in the Fae Realm said, \"Look, I don't need random help from random mortals! Somebody brought me this potion of memory inhibition, and I've been studying it. I think I can invert the effect. Well, I can invert <i>something</i>: memories, emotions, internal organs, something. And something is better than nothing.\n\nI wrote down the things that I need, but hmm, they'll have to come from a mortal world. Wait, you're a mortal! Here. Get this stuff! Hurry! Go!\"": "Мидж в Фейском царстве сказала: «Слушай, мне не нужна случайная помощь от случайных смертных! Кто-то принес мне это зелье подавления памяти, и я изучаю его. Думаю, я могу обратить эффект. Ну, я могу обратить <i>что-то</i>: воспоминания, эмоции, внутренние органы, что-то такое. А что-то — лучше, чем ничего.\n\nЯ записала, что мне нужно, но, хм, это должно быть из смертного мира. Подожди, ты же смертный! Вот. Забери эти вещи! Поторопись! Иди!"
"Midge in the Fae Realm said, \"Look, I don't need random help from random mortals! I used to be an expert alchemist, and I know there was a method to inhibit memory. If I could remember how to make memory-inhibitors, maybe I could find a reversal effect... anyway, if you happen to have a memory-inhibitor potion, that'd be great. Otherwise, you can help best by bringing me the ingredients I need! I'll barter for royal jelly.\"": "Мидж в Царстве фей сказала: \"Слушай, мне не нужна случайная помощь от случайных смертных! Я была опытным алхимиком и знаю, что существовал способ подавлять память. Если бы я могла вспомнить, как делать зелья, подавляющие память, возможно, я смогла бы найти и обратный эффект... в любом случае, если у тебя вдруг есть зелье, подавляющее память, это было бы здорово. А если нет, лучше всего ты поможешь, если принесёшь мне нужные ингредиенты! Я обменяю их на маточное молочко.\""
"Deliver 10 Bags of Magic Sand to Gremix in Amulna. Reward: 2,464 councils.": "Доставьте 10 мешков с волшебным песком Гремиксу в Амульне. Награда: 2,464 councils."
"Deliver 10 Baked Beets to Laura Neth in Kur Mountains. Reward: 2,095 councils.": "Доставьте 10 порций запечённой свёклы Лауре Нет в горах Кур. Награда: 2,095 councils."
"Deliver 10 Baked Pig Snouts to Ogamboe in the Fae Realm. Reward: 3,798 councils.": "Доставьте 10 запечённых свиных пятачков Огамбое в Царство фей. Награда: 3,798 councils."
"Deliver 10 Baked Potatoes to Fitz the Boatman on the Serbule docks. Reward: 365 councils.": "Доставьте 10 печёных картофелин Фитцу Лодочнику на доки Сербуля. Награда: 365 council'ов."
"Deliver 10 Banana Breads to Laura Neth in Kur Mountains. Reward: 5,304 councils.": "Доставьте 10 банановых хлебцев Лауре Нет в горах Кур. Награда: 5,304 councils."
"Deliver 10 Banana Shaved Ices to Ogamboe in the Fae Realm. Reward: 10,998 councils.": "Доставьте 10 банановых скоблёных льдов Огамбое в Фейское царство. Награда: 10,998 советов."
"Paullus in Statehelm said, \"Banana wine is not for the faint of heart. It's too sweet for the likes of Fenna and too rich for the likes of Irhetsu. But it's perfect for the likes of me! Made any?\"": "Пауллус в Стейтхельме сказал: \"Банановое вино не для слабонервных. Оно слишком сладкое для таких, как Фенна, и слишком насыщенное для таких, как Ирхетсу. Но для таких, как я, оно идеально! Уже делали?\""
"Deliver 10 Banana-Almond Pancakes to Irkima in Red Wing Casino. Reward: 3,324 councils.": "Доставьте 10 бананово-миндальных панкейков Иркиме в казино «Красное Крыло». Награда: 3,324 council'ов."
"Spot in Sun Vale's Animal Town asked you to bring her bananas.": "Спот из Звериного городка в Сан-Вейле попросила вас принести ей бананы."
"A monstrosity named Yalox asked you for a really good bandage.": "Чудовище по имени Ялокс попросило вас о действительно хорошей повязке."
"Blanche in Serbule needs a Simple First Aid Kit. She said an elf named Marna sells them.": "Бланш в Сербуле нужен простой набор первой помощи. Она сказала, что эльф по имени Марна продаёт их."
"Deliver 10 Barbecue Chickens to Irkima in Red Wing Casino. Reward: 6,049 councils.": "Доставьте 10 цыплят барбекю Иркиме в казино «Красное Крыло». Награда: 6,049 council'ов."
"Deliver 10 Barbecue Rabbit Chops to Irkima in Red Wing Casino. Reward: 4,139 councils.": "Доставьте 10 кроличьих отбивных барбекю Иркиме в казино «Красное Крыло». Награда: 4,139 советов."
"Deliver 10 Barbecued Mystery Meats to Irkima in Red Wing Casino. Reward: 3,979 councils.": "Доставьте 10 порций Таинственного мяса на гриле Иркиме в казино «Красное Крыло». Награда: 3,979 советов."
"Deliver 10 Bard Boost Potion 20% to Irkima in Red Wing Casino. Reward: 4,713 councils.": "Доставьте 10 Зелий усиления Бардов 20% Иркиме в казино «Красное Крыло». Награда: 4,713 councils."
"Michael Irasce in Statehelm said, \"Here, can you fill this book order? I don't have any of these. They want... Hm what are these books, exactly? I guess they're instructions on sewing advanced bardic equipment. Oh, that makes sense given who the order is from. Are these rare? I assumed so, and I quoted her quite a high price. If you can find them, I'll give you half the pay.\"": "Майкл Ираск в Стейтхельме сказал: \"Слушай, можешь выполнить этот заказ на книги? У меня ничего из этого нет. Им нужны... Хм, что это вообще за книги? Похоже, это инструкции по пошиву продвинутого бардовского снаряжения. А, тогда понятно, учитывая, от кого пришёл заказ. Они редкие? Я так и подумал, поэтому назвал ей довольно высокую цену. Если сможешь их найти, я отдам тебе половину оплаты.\""
"Bellema Deftwhisper in New Prestonbule said, \"There's a beast that lives in the caves here that I really hope I get a chance to hunt! They're sort of like dogs, but ... not dogs. Barghests! If you find any, can you try to get some patches of their flesh for me to study?\"": "Беллема Дефтвиспер в Нью-Престонбуле сказала: \"Здесь, в пещерах, живёт зверь, на которого я очень надеюсь однажды поохотиться! Они вроде как похожи на собак, но... не собаки. Баргесты! Если найдёте кого-нибудь из них, не могли бы вы добыть для меня несколько кусков их плоти, чтобы я могла их изучить?\""
"Bendith in the Fae Realm said, \"Would you 'be a deer' as the humans say, and pick me up a certain thing while you're out hunting? It's... a slightly delicate issue: I need a few barghest snouts. Please don't tell Marrowchomp -- I'm already 'on thin ice' with him, as the humans say.\"": "Бендит в Царстве фей сказал: \"Не мог бы ты, как говорят люди, оказать мне услугу и прихватить одну вещицу, пока будешь на охоте? Это... немного деликатный вопрос: мне нужно несколько рыл баргестов. Только не говори Марроучомпу — я и так у него, как говорят люди, хожу по тонкому льду.\""
"Trekker in Gazluk said, \"Am I glad to see you! This one's too tough for me. Apparently the orcs of Gazluk Keep have a barghest breeding program, and last night they released their excess animals. Suddenly there's hundreds of barghests south of the keep! And they're hungry. We can't let them settle up here or they'll destroy the delicate ecosystem, and eat me.\n\nDon't worry, these aren't true barghests -- these are just animals. Big dogs! You can take 'em! I mean, I can't, but you can!\"": "Путешественник в Газлуке сказал: «Как же я рад тебя видеть! Это слишком сложно для меня. Похоже, у орков из крепости Газлук есть программа разведения баргестов, и прошлой ночью они выпустили лишних животных. Внезапно к югу от крепости появилось сотни баргестов! И они голодны. Мы не можем позволить им обосноваться здесь, иначе они уничтожат хрупкую экосистему и съедят меня.\n\nНе волнуйся, это не настоящие баргесты — это просто животные. Большие собаки! Ты справишься с ними! Я — нет, а ты — да!"
"Deliver 10 Barley to Ogamboe in the Fae Realm. Reward: 2,902 councils.": "Доставьте 10 ячменя Огэмбо в Фейское царство. Награда: 2,902 councils."
"Deliver 10 Barley Breads to Irkima in Red Wing Casino. Reward: 3,490 councils.": "Доставьте 10 ячменных хлебцев Иркиме в казино «Красное Крыло». Награда: 3,490 councils."
"Deliver 10 Barrels to Viedesi in Sun Vale. Reward: 10,867 councils.": "Доставьте 10 бочек Виедези в Сан-Вейл. Награда: 10,867 советов."
"Deliver 10 Basic Armor Stakes to Sheyna in Rahu. Reward: 801 councils.": "Доставьте 10 простых кольев для брони Шейне в Раху. Награда: 801 council."
"Deliver 10000 Basic Arrows to Fitz the Boatman on the Serbule docks. Reward: 1,484 councils.": "Доставьте 10000 простых стрел Фитцу Лодочнику на доки Сербуля. Награда: 1,484 councils."
"Deliver 10000 Basic Barbed Arrows to Fitz the Boatman on the Serbule docks. Reward: 2,523 councils.": "Доставьте 10000 базовых стрел с зазубринами Фитцу Лодочнику на доки Сербуля. Награда: 2,523 councils."
"Deliver 10 Basic Beetle Skewers to Ogamboe in the Fae Realm. Reward: 1,783 councils.": "Доставьте 10 базовых жуков на шпажках Огамбое в Фейское царство. Награда: 1,783 councils."
"Deliver 10 Basic Cranberry Sauces to Fitz the Boatman on the Serbule docks. Reward: 4,142 councils.": "Доставьте 10 базовых клюквенных соусов Фитцу Лодочнику на доки Сербуля. Награда: 4,142 councils."
"Deliver 10000 Basic Dense Arrows to Fitz the Boatman on the Serbule docks. Reward: 1,739 councils.": "Доставьте 10000 базовых плотных стрел Фитцу Лодочнику на доки Сербуля. Награда: 1,739 councils."
"Deliver 10 Basic Ham Omelets to Irkima in Red Wing Casino. Reward: 4,529 councils.": "Доставьте 10 базовых омлетов с ветчиной Иркиме в казино «Красное Крыло». Награда: 4,529 councils."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>basic hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>простые молоты</b>. Ты можешь сделать несколько для меня?\n\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10000 Basic Long Arrows to Fitz the Boatman on the Serbule docks. Reward: 1,928 councils.": "Доставьте 10000 базовых длинных стрел Фитцу Лодочнику на доки Сербуля. Награда: 1,928 советов."
"Deliver 10 Basic Metal Slabs to Irkima in Red Wing Casino. Reward: 303 councils.": "Доставьте 10 базовых металлических пластин Иркиме в казино «Красное Крыло». Награда: 303 council'а."
"Deliver 10 Basic Pepperpots to Laura Neth in Kur Mountains. Reward: 5,793 councils.": "Доставьте 10 простых перечниц Лауре Нет в горах Кур. Награда: 5,793 council'ов."
"Deliver 10 Basic Pumpkin Pies to Irkima in Red Wing Casino. Reward: 14,273 councils.": "Доставьте 10 простых тыквенных пирогов Иркиме в казино «Красное Крыло». Награда: 14,273 council'ов."
"Deliver 10000 Basic Reservoir Arrows to Fitz the Boatman on the Serbule docks. Reward: 6,507 councils.": "Доставьте 10000 базовых стрел для резервуара Фитцу Лодочнику на доки Сербуля. Награда: 6,507 советов."
"Deliver 10000 Basic Snare Arrows to Fitz the Boatman on the Serbule docks. Reward: 2,376 councils.": "Доставьте 10000 базовых стрел-ловушек Фитцу Лодочнику на доки Сербуля. Награда: 2,376 council'ов."
"Deliver 100 Basic Throwing Knives to Fitz the Boatman on the Serbule docks. Reward: 1,795 councils.": "Доставьте 100 базовых метательных ножей Фитцу Лодочнику на доки Сербуля. Награда: 1,795 council'ов."
"Deliver 10 Basil to Ogamboe in the Fae Realm. Reward: 7,591 councils.": "Доставьте 10 базилика Огэмбо в Фейское царство. Награда: 7,591 советов."
"Deliver 10 Basilisk Tail Tips to Irkima in Red Wing Casino. Reward: 3,587 councils.": "Доставьте 10 кончиков хвоста василиска Иркиме в казино «Красное Крыло». Награда: 3,587 советов."
"Deliver 10 Battle Chemistry Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,645 councils.": "Доставьте 10 зелий усиления боевой химии 20% Иркиме в казино «Красное Крыло». Награда: 2,645 советов."
"Deliver 10 Beachside Blends to Laura Neth in Kur Mountains. Reward: 7,332 councils.": "Доставьте 10 Прибрежных смесей Лауре Нет в горах Кур. Награда: 7,332 councils."
"Deliver 10 Bear Claws to Irkima in Red Wing Casino. Reward: 565 councils.": "Доставьте 10 медвежьих когтей Иркиме в казино «Красное Крыло». Награда: 565 councils."
"Deliver 10 Bear Gallbladders to Irkima in Red Wing Casino. Reward: 674 councils.": "Доставьте 10 медвежьих желчных пузырей Иркиме в казино «Красное Крыло». Награда: 674 соверенов."
"Ashk the Answerer in Rahu said, \"I used up my last bear gallbladder this morning. Now what will I do if someone comes asking about their chances for inheritance? Or what if someone asks me the sex of their unborn?! I need more bear gallbladders right away! And we're out of stock!\"": "Ашк Отвечающий в Раху сказал: \"Сегодня утром я израсходовал свой последний медвежий желчный пузырь. И что мне теперь делать, если кто-нибудь придёт спросить о своих шансах на наследство? А что, если кто-то спросит меня о поле своего ещё не рождённого ребёнка?! Мне срочно нужны ещё медвежьи желчные пузыри! А у нас они закончились!\""
"Sanja in the Kur Mountains asked you to ruthlessly kill some mountain bears in her name.": "Санья в горах Кур попросила вас безжалостно убить нескольких горных медведей от её имени."
"Mandibles in Red Wing Casino said, \"My Sausage Swirlers are a hit with many varieties of mammalian guests. However, I believe I could improve on their flavor if they were made of bear meat -- or a similar beast -- instead of goblin meat. Would you procure some for me?\"": "Мандиблс из казино «Красное Крыло» сказал: \"Мои колбасные завитки пользуются успехом у самых разных гостей-млекопитающих. Однако, думаю, я мог бы улучшить их вкус, если бы они были сделаны из медвежатины — или мяса похожего зверя — вместо гоблинского мяса. Не добудете немного для меня?\""
"Gerrux in Povus said, \"I like to refine weapons by giving them an artistic touch. I'm working on a combat beaker -- I haven't done one of these since my sister died! It seems I'm out of blue glass, though. Do you have any? Oh, I need a bit of pyrite too.\"": "Геррукс в Повусе сказал: \"Мне нравится доводить оружие до совершенства, придавая ему художественный штрих. Я работаю над боевой колбой — я не делал таких с тех пор, как умерла моя сестра! Похоже, у меня закончились синие стеклянные осколки. У тебя есть немного? О, и мне ещё нужно немного пирита.\""
"Deliver 10 Beef and Broccolis to Laura Neth in Kur Mountains. Reward: 5,709 councils.": "Доставьте 10 порций «Говядины с брокколи» Лоре Нет в горах Кур. Награда: 5,709 councils."
"Deliver 10 Beets to Fitz the Boatman on the Serbule docks. Reward: 724 councils.": "Доставьте 10 свёкл Фитцу Лодочнику на доки Сербуля. Награда: 724 council'ов."
"Deliver 10 Beets 'n Meats to Laura Neth in Kur Mountains. Reward: 5,506 councils.": "Доставьте 10 порций «Свёклы с мясом» Лауре Нет в горах Кур. Награда: 5,506 councils."
"Deliver 10000 Beginner's Arrows to Fitz the Boatman on the Serbule docks. Reward: 639 councils.": "Доставьте 10000 стрел новичка Фитцу Лодочнику на доки Сербуля. Награда: 639 советов."
"Deliver 10000 Beginner's Barbed Arrows to Fitz the Boatman on the Serbule docks. Reward: 1,041 councils.": "Доставьте 10000 колючих стрел новичка Фитцу Лодочнику на доки Сербуля. Награда: 1,041 council'ов."
"Deliver 10 Beginner's Buttermilks to Fitz the Boatman on the Serbule docks. Reward: 1,509 councils.": "Доставьте 10 порций пахты новичка Фитцу Лодочнику на доки Сербуля. Награда: 1,509 советов."
"Deliver 10000 Beginner's Dense Arrows to Fitz the Boatman on the Serbule docks. Reward: 864 councils.": "Доставьте 10000 плотных стрел новичка Фитцу Лодочнику на доки Сербуля. Награда: 864 councils."
"Deliver 10000 Beginner's Long Arrows to Fitz the Boatman on the Serbule docks. Reward: 854 councils.": "Доставьте 10000 длинных стрел новичка Фитцу Лодочнику на доки Сербуля. Награда: 854 council'ов."
"Deliver 10000 Beginner's Reservoir Arrows to Fitz the Boatman on the Serbule docks. Reward: 5,477 councils.": "Доставьте 10000 стрел резервуара новичка Фитцу Лодочнику на доки Сербуля. Награда: 5,477 советов."
"Deliver 10000 Beginner's Snare Arrows to Fitz the Boatman on the Serbule docks. Reward: 1,075 councils.": "Доставьте 10000 стрел-ловушек новичка Фитцу Лодочнику на доки Сербуля. Награда: 1,075 советов."
"Ormond Neth in Statehelm said, \"I know your type: a book learner. You've read about how to muster up a Moment of Resolve and you think you're special. But let's see you create a Moment of Resolve under real danger conditions!\"": "Ормонд Нет в Стейтхельме сказал: \"Я знаю таких, как ты: книжный ученик. Ты читал о том, как собрать Момент Решимости, и думаешь, что ты особенный. Но давай посмотрим, сможешь ли ты создать Момент Решимости в условиях настоящей опасности!\""
"Velkort has told me the frequency for the giant red crystal. All I have to do is touch it while thinking the right word.\n\nOnce I'm past the crystal, I should try to figure out who's behind this and why.": "Велкорт рассказал мне частоту для гигантского красного кристалла. Всё, что нужно — коснуться его, думая о правильном слове.\\n\\nПройдя мимо кристалла, мне стоит попытаться выяснить, кто стоит за этим и зачем."
"Benjy in Statehelm said, \"You don't want my treats?! Prove it! If you can freely give away the ultimate treat, I'll have to believe you. Bring me <b>Steak and Cheese Wraps!</b>\"": "Бенджи в Стейтхельме сказал: \"Не хочешь мои угощения?! Докажи! Если сможешь просто так отдать высшее угощение, мне придётся тебе поверить. Принеси мне <b>Рулеты со стейком и сыром!</b>\""
"Ukorga in the Kur Mountains asked you to procure some nice chairs.": "Укорга в горах Кур попросил вас раздобыть несколько хороших стульев."
"Willem Fangblade in Red Wing Casino said, \"So that last cheese, the 'cheshire', turned out to be slightly too bitter, so it doesn't go well with wine. Look, I don't fuckin' know, it's all just cheese ta me. But I need a different one. A 'gloucester'. It's supposed to be better, accordin' to my cousin that runs a stall down the hall. Ya got any of that?\"": "Виллем Фэнгблейд в казино «Красное Крыло» сказал: «Значит, тот последний сыр, “чешир”, оказался слегка горьковатым, так что с вином он не очень сочетается. Слушай, я, блин, не знаю, для меня это всё просто сыр. Но мне нужен другой. “Глостер”. Говорят, он получше, по словам моего кузена, у которого лавка дальше по коридору. У тебя есть такой?»"
"Gerrux in Povus said, \"In my spare time I work to artistically enhance weapons, and I'm working on a hammer that needs a new wrap. I know just the material! Kuvou tongue! Can you get me some?\"": "Геррукс в Повусе сказал: \"В свободное время я художественно улучшаю оружие, и сейчас работаю над молотом, которому нужна новая обмотка. Я знаю, какой материал подойдёт! Язык куву! Не мог бы ты принести мне немного?\""
"Kib the Unkillable in Red Wing Casino said, \"My friend Irkima has told me a fanciful tale! There are insects on this continent that secrete lac that is so strong that it has different properties. Irkima called it 'ultra-lac', but of course I'm certain that sages in this land have a more appropriate name for it. I must see this substance! Can you procure some?\"": "Киб Неубиваемый из казино «Красное Крыло» сказал: \"Мой друг Иркима рассказал мне удивительную историю! На этом континенте есть насекомые, которые выделяют лак настолько прочный, что у него совсем другие свойства. Иркима назвал его 'ультра-лак', но, разумеется, я уверен, что мудрецы этих земель дали ему более подходящее название. Я должен увидеть это вещество! Сможешь раздобыть немного?\""
"Glajur, a goblin you met under a tower in Kur Mountains, asked you to bring him some impressive humanoid skulls.": "Глажур, гоблин, которого вы встретили под башней в горах Кур, попросил вас принести ему несколько впечатляющих черепов гуманоидов."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>bilge hoops</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>обручья для трюма</b>. Ты можешь сделать несколько для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10 Bilge Hoops to Fitz the Boatman on the Serbule docks. Reward: 1,746 councils.": "Доставьте 10 трюмных обручей Фитцу Лодочнику на доки Сербуля. Награда: 1,746 councils."
"Rebeccah the Whisperer in Statehelm gave you a note that said, \"Congratulations! I knew you were an advanced student when I heard your song.\n\nI can no longer sing, but in my dreams I still can. When I wake, my throat is quite sore. Can you fetch some bitter-mint tea for me?\"": "Ребекка Шепотница в Стейтхелме дала тебе записку, в которой говорится: «Поздравляю! Я знала, что ты продвинутый ученик, когда услышала твою песню.\\n\\nЯ больше не могу петь, но во снах я всё ещё могу. Когда просыпаюсь, у меня сильно болит горло. Можешь принести мне чай с горькой мятой?"
"Hemmit Magmagrip in New Prestonbule said, \"I need another kind of mushroom. These are common everywhere: black foot morels. Delicious in stews! I need to make sure the kind that grow here are alchemically identical to the kinds grown elsewhere.\"": "Хеммит Магмагрип в Нью-Престонбуле сказал: \"Мне нужен другой вид грибов. Они повсюду обычны: чёрные сморчки. В рагу — объедение! Мне нужно убедиться, что те, что растут здесь, алхимически идентичны тем, что растут в других местах.\""
"Garad said, \"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Amazing Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\"": "Гарад сказал: \"Ты выглядишь как человек, разбирающийся в кузнечном деле! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодились ещё броневые шипы для починки доспехов. Если ты сможешь принести мне 10 отличных броневых шипов, это будет замечательно! Взамен я с радостью поделюсь несколькими советами и хитростями.\""
"Garad said, \"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Masterwork Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\"": "Гарад сказал: \"Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодилось ещё несколько кольев для брони, чтобы чинить доспехи. Если ты сможешь принести мне 10 мастерских кольев для брони, это будет здорово! Взамен я с радостью поделюсь парой полезных советов и хитростей.\""
"Garad said, \"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use some more armor stakes to repair suits. If you could bring me 10 Simple Armor Stakes, that would be great! I'll be happy to share a few tips and tricks in exchange.\"": "Гарад сказал: \"Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодилось ещё немного кольев для брони, чтобы чинить доспехи. Если ты принесёшь мне 10 простых кольев для брони, это будет здорово! Взамен я с радостью поделюсь парой советов и хитростей.\""
"Garad said, \"You look like the Blacksmithy type! I'm hoping you can help me out. I need to restock on a few things before we get back out on the road. I could really use a few new vises. If you could bring me 10 vises, that would be great! I'll be happy to share a few tips and tricks that my brother Orran has taught me during our travels in exchange.\"": "Гарад сказал: \"Ты выглядишь как человек кузнечного дела! Надеюсь, ты сможешь мне помочь. Мне нужно пополнить запасы кое-чего, прежде чем мы снова отправимся в путь. Мне бы очень пригодилось несколько новых тисков. Если ты сможешь принести мне 10 тисков, это было бы здорово! Взамен я с радостью поделюсь несколькими советами и хитростями, которым меня научил мой брат Орран во время наших путешествий.\""
"Blanche in Serbule has asked you to get a bottle of Weak Acidic Cleanser. (It's a moderately difficult Alchemy recipe.)": "Бланш в Сербуле попросила вас достать бутылку слабого кислотного очистителя. (Это рецепт Алхимии умеренной сложности.)"
"Blanche in Serbule wants an antique spoon.": "Бланш в Сербуле нужна старинная ложка."
"Blanche in Serbule wants some Boletus Mushrooms.": "Бланш в Сербуле нужны грибы болетус."
"Deliver 10 Bland Baked Chickens to Fitz the Boatman on the Serbule docks. Reward: 894 councils.": "Доставьте 10 пресных запечённых цыплят Фитцу Лодочнику на доки Сербуля. Награда: 894 councils."
"Deliver 10 Bland Baked Turkeys to Fitz the Boatman on the Serbule docks. Reward: 2,232 councils.": "Доставьте 10 пресных запечённых индеек Фитцу Лодочнику на доки Сербуля. Награда: 2,232 council'ов."
"Deliver 10 Bland Mutton Vindaloos to Fitz the Boatman on the Serbule docks. Reward: 2,033 councils.": "Доставьте 10 пресных виндалу из баранины Фитцу Лодочнику на доки Сербуля. Награда: 2,033 councils."
"Rick Snapley in New Prestonbule said, \"The settlers who lived in the houses outside were adherents of Arisetsu, the goddess of Hope and Warmth. You know what that means, right? Blankets! Arisetsu nuts always bring tons of their blankets to give to the needy. Well, they're dead, and we're needy. They brought a lot of their stuff into this cave when they fled, but when the survivors died, they were buried in... you guessed it: Arisetsu blankets. So now we're very low. I'm betting that there's more in those houses, though. Sneak past the ghosts and get us some!\"": "Рик Снэпли в Нью-Престонбуле сказал: \"Поселенцы, которые жили в домах снаружи, были последователями Арисетсу, богини Надежды и Тепла. Знаешь, что это значит, да? Одеяла! Эти чокнутые на Арисетсу всегда притаскивают кучу своих одеял, чтобы раздавать нуждающимся. Ну, они мертвы, а мы нуждаемся. Когда они бежали, то притащили много своих вещей в эту пещеру, но когда выжившие умерли, их похоронили в... ты угадал: одеялах Арисетсу. Так что теперь у нас их очень мало. Но я готов поспорить, что в тех домах есть ещё. Прокрадись мимо призраков и добудь нам немного!\""
"Sir Fisk in Statehelm said, \"You're the one that brought me the painclover from Louis, right? Yes, it was definitely you. How did he look? Still sickly? He'd taken so much demon poison that I didn't think he'd survive. I'd almost given up hope, actually.\n\nBut if he's healthy now, he needs to come here and live in my camp.\n\nAs you're obviously a florist of some skill, could you find some of Louis's favorite flowers and deliver them to him? He'll know what it means. And I will pay you zealously. For your efforts as much as for your discretion.\"": "Сэр Фиск в Стейтхелме сказал: «Ты тот, кто принес мне болелист от Луи, верно? Да, это точно был ты. Как он выглядел? Всё ещё болезненный? Он получил столько демонического яда, что я не думал, что он выживет. Я почти потерял надежду, если честно.\\n\\nНо если он теперь здоров, ему нужно прийти сюда и жить в моём лагере.\\n\\nПоскольку ты явно умеешь обращаться с цветами, не мог бы ты найти некоторые из любимых цветов Луи и доставить их ему? Он поймёт, что это значит. И я щедро заплачу тебе. За твои усилия и за твою осмотрительность."
"Eleme in Sun Vale has asked you to hack down any animated vines that pop up out of the ground.": "Элеме в Сан-Вейле попросила вас рубить любые ожившие лозы, которые вылезают из-под земли."
"Deliver 10 Bleeding Speed Potions to Fitz the Boatman on the Serbule docks. Reward: 4,028 councils.": "Доставьте 10 зелий скорости кровотечения Фитцу Лодочнику на доки Сербуля. Награда: 4,028 council'ов."
"Crelpin in the Fae Realm said, \"When night happens, vicious Blinding Wasps come out. Sends the bees into hiding. Bees prefer sunlight anyway, but if there weren't so many wasps, I think they'd spend another hour or so working each day.\n\nSo anyway, I need you to kill wasps, and you can take your pick of reasons: for safety, or just to help me make more honey.\"": "Крелпин в Фейском царстве сказал: «Когда наступает ночь, выходят свирепые ослепляющие осы. Они заставляют пчёл прятаться. Пчёлы всё равно предпочитают солнечный свет, но если бы ос было меньше, думаю, они работали бы ещё час-другой каждый день.\n\nТак что мне нужно, чтобы ты убил ос, и можешь выбрать причину: ради безопасности или просто чтобы помочь мне сделать больше мёда."
"You closed the blood portal!": "Вы закрыли кровавый портал!"
"Deliver 10 Blood Seeker Ointments to Viedesi in Sun Vale. Reward: 9,151 councils.": "Доставьте 10 мазей Искателя Крови Виедези в Сан-Вейл. Награда: 9,151 councils."
"Truxartis in Vidaria said, \"The bones of the First Thrall have been sucked dry, but they are still valuable. I just need... Refresh them! Yes. This could work.\n\nI have located another entrance to a secret basement beneath Statehelm. I believe this to be a storehouse for vampiric thralls that are... too far gone to live on the street. \"Lost thralls,\" they're called, but their blood is... potent. After years or even decades of vampiric feeding, they've become delectable and potent vessels. Not as delectable as my poor First Thrall, of course. ... But good enough to recharge these bones.\n\nThe entrance is in Rahu. I recall it being in a small house overlooking a lake.\n\nOh, while you are in there, I need a few other items.\"": "Труксартис в Видарии сказал: «Кости Первого Рабы были высосаны досуха, но они всё ещё ценны. Мне просто нужно... Обновить их! Да. Это может сработать.\n\nЯ нашёл другой вход в секретный подвал под Стейтхелмом. Я полагаю, что это хранилище вампирских рабов, которые... слишком далеко зашли, чтобы жить на улице. Их называют «потерянными рабами», но их кровь... мощна. После многих лет или даже десятилетий вампирского питания они стали изысканными и сильными сосудами. Конечно, не такими изысканными, как мой бедный Первый Раб... Но достаточно хорошими, чтобы зарядить эти кости.\n\nВход находится в Раху. Я помню, что он в небольшом доме с видом на озеро.\n\nО, пока ты там, мне нужны ещё несколько вещей."
"Deliver 10 Bloodstones to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 Кровавых камней Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 4,080 councils."
"Echur in Serbule has asked you for a strong bandage.": "Эчур в Сербуле попросил вас принести ему прочный бинт."
"Deliver 10 Blue Spinels to Fitz the Boatman on the Serbule docks. Reward: 3,740 councils.": "Доставьте 10 синих шпинелей Фитцу Лодочнику на доки Сербуля. Награда: 3,740 советов."
"Deliver 10 Bluebell Bouquets to Sheyna in Rahu. Reward: 2,639 councils.": "Доставьте 10 букетов колокольчиков Шейне в Раху. Награда: 2,639 советов."
"Deliver 10 Bluebells to Fitz the Boatman on the Serbule docks. Reward: 443 councils.": "Доставьте 10 колокольчиков Фитцу Лодочнику на доки Сербуля. Награда: 443 соверенов."
"Deliver 10 Bluegill Fillets to Irkima in Red Wing Casino. Reward: 391 councils.": "Доставьте 10 филе голубого окуня Иркиме в казино Красное Крыло. Награда: 391 совет."
"Deliver 99 Bluegill Fillets to Sheyna in Rahu. Reward: 6,172 councils.": "Доставьте 99 филе синежаберника Шейне в Раху. Награда: 6,172 council'ов."
"Deliver 10 Boar Tusks to Irkima in Red Wing Casino. Reward: 303 councils.": "Доставьте 10 клыков кабана Иркиме в казино «Красное Крыло». Награда: 303 совета."
"Rappanel in Serbule Hills said, \"Have you met Joeh over in Serbule? He's a dirty one, isn't he! I mean, I like to use food in the bedroom as much as the next elf, but his bacon fetish is... well, I shouldn't judge. I guess we all get a little crazy, so far from home! And I have to admit that some of his ideas sound intriguing. Did he tell you about the thing he does with the two boar tusks? It sounds painful to me, but I guess I have to try it: the bardic creed demands I gather lore! So... do you have any boar tusks, perchance?\"": "Раппанель в Сербульских холмах сказал: \"Вы встречали Джоэ в Сербуле? Он тот ещё грязнуля, правда! То есть, я люблю использовать еду в спальне не меньше любого другого эльфа, но его фетиш на бекон... ну, не мне судить. Полагаю, мы все немного сходим с ума так далеко от дома! И должен признать, некоторые его идеи звучат интригующе. Он рассказывал вам о той штуке, которую делает с двумя кабаньими клыками? По-моему, это звучит болезненно, но, полагаю, мне придётся попробовать: бардовский долг требует, чтобы я собирал знания! Так что... у вас случайно нет кабаньих клыков?\""
"A goblin in the Rahu Sewers said that you would be allowed entrance to the goblins' sanctuary if you retrieve a lost notebook. He said it was in the \"ratkin nesting warrens\", and not too far from their hideout.": "Гоблин в канализации Раху сказал, что вам позволят войти в святилище гоблинов, если вы вернёте потерянную записную книжку. Он сказал, что она находится в \"крысиных гнездовых норах\" и не слишком далеко от их убежища."
"Deliver 10 Boiled Cabbages to Fitz the Boatman on the Serbule docks. Reward: 1,201 councils.": "Доставьте 10 порций варёной капусты Фитцу Лодочнику на доки Сербуля. Награда: 1,201 councils."
"Deliver 10 Boiled Crabs to Fitz the Boatman on the Serbule docks. Reward: 835 councils.": "Доставьте 10 варёных крабов Фитцу Лодочнику на доки Сербуля. Награда: 835 советов."
"Deliver 10 Bone Dice to Sheyna in Rahu. Reward: 1,360 councils.": "Доставьте 10 костяных игральных костей Шейне в Раху. Награда: 1,360 советов."
"Deliver 10 Bone Hooks to Fitz the Boatman on the Serbule docks. Reward: 916 councils.\nNote from orderer: <i>\"These will be delightful decorations at my autumn festival!\"</i>": "Доставьте 10 костяных крючков Фитцу Лодочнику на причалы Сербуля. Награда: 916 советов.  \nПримечание от заказчика: <i>«Они станут прекрасным украшением моего осеннего фестиваля!»</i>"
"Therese has asked for bone meal. She thinks it's most easily obtained in the crypt at the back of the small graveyard beneath Serbule.": "Тереза попросила костную муку. Она считает, что её проще всего добыть в склепе на заднем дворе маленького кладбища под Сербулем."
"Deliver 10 Bone Meal to Fitz the Boatman on the Serbule docks. Reward: 89 councils.": "Доставьте 10 порций костной муки Фитцу Лодочнику на доки Сербуля. Награда: 89 советов."
"Deliver 10 Bone Soups to Ogamboe in the Fae Realm. Reward: 6,122 councils.": "Доставьте 10 костяных супов Огамбое в Фейское царство. Награда: 6,122 councils."
"Brugo in Povus said, \"If I'm to quickly become a master of paleontology, I need a constant supply of bones to study! But I can't go collect the bones, since that would require me to stop studying. Perhaps you're for hire? I will pay you for 10 good old fossils.\"": "Бруго в Повусе сказал: \"Если я хочу быстро стать мастером палеонтологии, мне нужен постоянный запас костей для изучения! Но я не могу сам собирать кости, потому что для этого мне пришлось бы прекратить учёбу. Может, тебя можно нанять? Я заплачу тебе за 10 хороших старых окаменелостей.\""
"Deliver 10 Bonnets to Irkima in Red Wing Casino. Reward: 187 councils.": "Доставьте 10 чепцов Иркиме в казино «Ред Винг». Награда: 187 советов."
"Deliver 10 Boring Fruit Cocktails to Laura Neth in Kur Mountains. Reward: 1,272 councils.": "Доставьте 10 скучных фруктовых коктейлей Лоре Нет в горах Кур. Награда: 1,272 councils."
"Orom said, \"We are in need of more crossbows for our guards. I am low on materials. Can you bring me 10 Amazing Hunting Crossbows? I will share some knowledge with you in return.\"": "Ором сказал: \"Нам нужно больше арбалетов для наших стражников. У меня мало материалов. Не могли бы вы принести мне 10 превосходных охотничьих арбалетов? Взамен я поделюсь с вами некоторыми знаниями.\""
"Orom said, \"We need some premium bows for our advanced users. I am low on materials. Can you bring me 10 Awesome Hunting Bows? I will share some knowledge with you in return.\"": "Ором сказал: \"Нам нужны отличные луки для наших опытных пользователей. У меня мало материалов. Не могли бы вы принести мне 10 превосходных охотничьих луков? Взамен я поделюсь с вами кое-какими знаниями.\""
"Orom said, \"We are in need of more bows for our hunters. I am low on materials. Can you bring me 10 Quality Hunting Bows? I will share some knowledge with you in return.\"": "Ором сказал: \"Нам нужно больше луков для наших охотников. У меня мало материалов. Можешь принести мне 10 качественных охотничьих луков? Взамен я поделюсь с тобой кое-какими знаниями.\""
"Yurra the hag said that the brain bugs infesting Serbule were made by Dalvos. Find where they are coming from. They are most prevalent in the north, so search there for someone who might know more.": "Юрра, ведьма, сказала, что мозговые жуки, наводнившие Сербуль, были созданы Далвосом. Выясните, откуда они появляются. Больше всего их на севере, так что поищите там того, кто может знать больше."
"Azalak the mantis needs you to collect a bunch of intact brains from sentient creatures. Brain Bugs occasionally drop intact brains, as do several other creatures, such as Nightmare Creatures and Psychic Mantises.": "Азалаку, богомолу, нужно, чтобы вы собрали кучу неповреждённых мозгов разумных существ. Мозговые жуки иногда оставляют после себя неповреждённые мозги, как и некоторые другие существа, например Кошмарные существа и Псионические богомолы."
"Deliver 10 Brass Gears to Fitz the Boatman on the Serbule docks. Reward: 1,108 councils.": "Доставьте 10 латунных шестерней Фитцу Лодочнику на доки Сербуля. Награда: 1,108 councils."
"Deliver 10 Breadcloth to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,144 councils.": "Доставьте 10 хлебной ткани Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 2,144 councils."
"Gershok the Ranalon in Serbule Hills asked for a meal of Breaded Perch with Onions.": "Гершок Раналон в Сербульских холмах попросил приготовить окуня в панировке с луком."
"Deliver 10 Breaded Perches with Onions to Laura Neth in Kur Mountains. Reward: 2,095 councils.": "Доставьте 10 окуней в панировке с луком Лауре Нет в горах Кур. Награда: 2,095 council'ов."
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Захватывающие дух стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никаких старых отсыревших запасов.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Dense Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают потрясающие плотные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Long Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают захватывающие дух длинные стрелы. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Reservoir Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают стрелы для Захватывающего дух водохранилища. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что не используйте старые отсыревшие запасы.\""
"Captain Gregory in Statehelm said, \"We always need extra ammunition for the front-line troops. Today they're asking for Breathtaking Snare Arrows. I'll pay handsomely for them, but you need to make them to military standards, so no using old musty stock.\"": "Капитан Грегори в Стейтхельме сказал: \"Нам всегда нужны дополнительные боеприпасы для войск на передовой. Сегодня они запрашивают Потрясающие стрелы-ловушки. Я щедро за них заплачу, но вам нужно изготовить их по военным стандартам, так что никакие старые отсыревшие запасы не подойдут.\""
"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Brown Ale I've heard about. Flavor it up however you like!\"": "Райяр сказал: \"Приветствую! Трудно всё подготовить и варить пиво, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого коричневого эля, о котором я слышал. Приправь его как тебе нравится!\""
"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Dwarven Stout I've heard about. Flavor it up however you like!\"": "Райяр сказал: \"Приветствую! Трудно устраиваться и варить, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого дворфийского стаута, о котором я слышал? Приправь его как тебе угодно!\""
"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Goblin Ale I've heard about. Flavor it up however you like!\"": "Раяр сказал: \"Приветствую! Трудно всё подготовить и варить, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно вдохновение, и я хочу попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого гоблинского эля, о котором я слышал. Приправь его как тебе угодно!\""
"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Pale Ale I've heard about. Flavor it up however you like!\"": "Райяр сказал: \"Приветствую! Трудно устраиваться и варить, когда постоянно кочуешь с места на место. Я хотел бы наполнить несколько бочек до того, как мы снова отправимся в путь, но мне нужно вдохновение, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого светлого эля, о котором я слышал. Приправь его как тебе угодно!\""
"Rayar said, \"Well met! It's hard to setup and brew when you're always moving around. I would like to get a few barrels done before we get back on the road, but I need some inspiration and would like to sample some of the local flavors. Why don't you whip up 10 glasses of this Porter I've heard about. Flavor it up however you like!\"": "Райар сказал: \"Рад встрече! Трудно устраиваться и варить, когда постоянно кочуешь с места на место. Я хотел бы закончить несколько бочек, прежде чем мы снова отправимся в путь, но мне нужно немного вдохновения, и я хотел бы попробовать местные вкусы. Почему бы тебе не приготовить 10 кружек этого портера, о котором я слышал. Придай ему любой вкус на своё усмотрение!\""
"Deliver 10 Brie Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 9,139 councils.": "Доставьте 10 сыров Бри Тримблу Питу в крепость Хогана, Эльтибуль. Награда: 9,139 советов."
"Deliver 10 Brocciu Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 8,354 councils.": "Доставьте 10 сыров Броккью Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 8,354 councils."
"Deliver 10 Broccoli to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,254 councils.": "Доставьте 10 брокколи Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 1,254 councils."
"Deliver 10 Broccoli Florets to Laura Neth in Kur Mountains. Reward: 5,593 councils.": "Доставьте 10 соцветий брокколи Лауре Нет в горах Кур. Награда: 5,593 councils."
"Deliver 10 Broccoli Squash Bakes to Irkima in Red Wing Casino. Reward: 4,448 councils.": "Доставьте 10 запеканок из брокколи и сквоша Иркиме в казино «Красное Крыло». Награда: 4,448 советов."
"In a cave deep beneath Povus, you came across a weird magical globe that seemed to be missing some parts.": "В пещере глубоко под Повусом вы наткнулись на странный магический глобус, у которого, похоже, не хватало некоторых частей."
"In a cave deep beneath Povus, you found a sculpture that reminded you of a play area for dwarven children. It was missing a large piece, though.": "В пещере глубоко под Повусом вы нашли скульптуру, которая напомнила вам игровую площадку для дварфийских детей. Однако в ней не хватало большого фрагмента."
"Irkima in Red Wing Casino said, \"I have a pigeon with a broken wing, and I am in need of some supplies to try and heal it. There is a special realm where Phoenixes dwell that is occupied by the Fae.\nGo there and kill these creatures until you can get a good, undamaged phoenix feather. I can use the feather's regenerative abilities to help accelerate the healing process. Bring the feather back to me as soon as you can! I need it as fresh as possible.\"": "Иркима в казино Красное Крыло сказала: «У меня есть голубь с переломанным крылом, и мне нужны припасы, чтобы попытаться его вылечить. Есть особое царство, где обитают Фениксы, занятое феями. Отправляйся туда и убивай этих существ, пока не найдёшь хорошее, неповреждённое перо феникса. Я могу использовать регенеративные способности пера, чтобы ускорить процесс исцеления. Принеси перо мне как можно скорее! Мне нужно, чтобы оно было как можно свежее."
"Leah Bowman in Povus said, \"Mom always told me to forgive and forget my father. But I don't think she ever really did. And I sure as hell haven't! It gnaws at me, even now.\n\nI guess it's my orcish side, but I just think I'd be so much happier if he were dead!\"": "Лия Боуман в Повусе сказала: «Мама всегда говорила мне прощать и забывать отца. Но я не думаю, что она когда-либо действительно это делала. И я уж точно нет! Это гложет меня даже сейчас.\\n\\nНаверное, это моя орочья сторона, но я просто думаю, что была бы намного счастливее, если бы он был мёртв!"
"Deliver 10 Brunost Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 6,120 councils.": "Доставьте 10 сыров Бруност Тимблу Питу в крепость Хогана, Эльтибуль. Награда: 6,120 councils."
"Deville Neth in Statehelm said, \"I had some bug bombs in the back room, just in case roaches should show up again. But when I came in today, I found all my bug bombs had been punctured. But I think I can fix them! If I just had some some glue. And something to help reactivate it.\"": "Девилль Нет в Стейтхельме сказал: \"У меня в подсобке лежали дымовые шашки от насекомых, на случай, если тараканы снова появятся. Но когда я пришёл сегодня, то обнаружил, что все мои шашки были проколоты. Но, думаю, я смогу их починить! Если бы у меня только было немного клея. И что-нибудь, чтобы помочь снова их активировать.\""
"Unora's sending stone in Gazluk said, \"Why don't we start with some target practice. When hitting multiple enemies, the ideal number to hit is three. But sometimes it's necessary to hit more. Try different densities and study the difference.\n\nThere's a metal dodecahedron outside. Stand in it and say 'Ossugazak 1'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>\"": "Камень связи Уноры в Газлуке сказал: «Почему бы не начать с тренировки меткости. При поражении нескольких врагов идеальное количество — три. Но иногда нужно поразить больше. Попробуй разные плотности и изучи разницу.\n\nСнаружи стоит металлический додекаэдр. Встань в него и скажи «Оссугазак 1». Это активирует тренировочную программу. Будь готов.\n\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Deville Neth in Statehelm said, \"Chancellor Vexford did this to my shop. And he's watching, waiting for me to retaliate in some dumb way. That's why I need YOU to retaliate in some dumb way on my behalf! No, I'm kidding! Of course this isn't about retaliation. It's a business venture at his expense. It won't hurt anybody. I promise. Just get me the following items and you'll see.\"": "Девиль Нет в Стейтхельме сказал: \"Канцлер Вексфорд сделал это с моей лавкой. И он наблюдает, ждёт, когда я отвечу какой-нибудь глупостью. Поэтому мне и нужны ВЫ, чтобы ответить какой-нибудь глупостью от моего имени! Нет, я шучу! Конечно, дело не в мести. Это деловое предприятие за его счёт. Никто не пострадает. Обещаю. Просто добудьте мне следующие предметы, и сами увидите.\""
"Deville Neth in Statehelm said, \"Here. This is what I made from the parts you made. I know a bit of the art of sabotage. Take this with you and go get \"fed\" from the Cornucopia. It will redirect the system's teleportation point down into the sewer somewhere.\n\nDon't worry, they'll fix it soon enough. But for today, just today, there will be hungry people outside my shop.\n\nI've got the bread smell going. This is going to be a good sales day! Go go go!\"": "Девиль Нет в Стейтхелме сказал: «Вот. Это то, что я сделал из деталей, которые ты сделал. Я немного разбираюсь в искусстве саботажа. Возьми это с собой и иди получить \"питание\" из Рога изобилия. Это перенаправит точку телепортации системы куда-то в канализацию.\n\nНе волнуйся, скоро всё починят. Но сегодня, только сегодня, у моей лавки будут голодные люди.\n\nУ меня пахнет хлебом. Сегодня будет хороший день продаж! Вперёд, вперёд, вперёд!"
"Deliver 10 Butcher Knives to Viedesi in Sun Vale. Reward: 869 councils.": "Доставьте 10 ножей мясника Виедези в Сан-Вейл. Награда: 869 советов."
"Deliver 10 Butter Muslin to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,116 councils.": "Доставьте 10 масляного муслина Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 1,116 councils."
"Deliver 10 Buttered Baked Potatoes to Fitz the Boatman on the Serbule docks. Reward: 1,965 councils.": "Доставьте 10 порций печёного картофеля с маслом Фитцу Лодочнику на доки Сербуля. Награда: 1,965 council'ов."
"Deliver 10 Cabbage Soups to Laura Neth in Kur Mountains. Reward: 2,092 councils.": "Доставьте 10 капустных супов Лауре Нет в горах Кур. Награда: 2,092 councils."
"Fainor in Serbule wants a bunch of cabbage.": "Файнор в Сербуле хочет кочан капусты."
"Deliver 10 Cabbages to Fitz the Boatman on the Serbule docks. Reward: 479 councils.": "Доставьте 10 кочанов капусты Фитцу Лодочнику на доки Сербуля. Награда: 479 советов."
"Deliver 10 Cambozola Cheese to Ogamboe in the Fae Realm. Reward: 22,012 councils.": "Доставьте 10 сыров Камбоцола Огамбое в Царство фей. Награда: 22,012 советов."
"Hiral at the fairy tree has asked for some camembert cheese.": "Хирал у дерева фей попросил немного сыра камамбер."
"Deliver 10 Camembert Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 11,618 councils.": "Доставьте 10 сыров Камамбер Тримбл Питу в крепость Хогана, Эльтибуль. Награда: 11,618 советов."
"Deliver 10 Camouflaged Crude Shirts to Irkima in Red Wing Casino. Reward: 8,609 councils.": "Доставьте 10 грубых рубах с камуфляжем Иркиме в казино «Красное Крыло». Награда: 8,609 советов."
"Deliver 10 Camouflaged Decent Shirts to Irkima in Red Wing Casino. Reward: 11,227 councils.": "Доставьте 10 камуфлированных приличных рубашек Иркиме в казино «Красное Крыло». Награда: 11,227 советов."
"Deliver 10 Camouflaged Great Pants to Irkima in Red Wing Casino. Reward: 19,278 councils.": "Доставьте 10 маскировочных отличных штанов Иркиме в казино «Красное Крыло». Награда: 19,278 councils."
"Deliver 10 Camouflaged Great Shirts to Irkima in Red Wing Casino. Reward: 19,159 councils.": "Доставьте 10 маскировочных больших рубах Иркиме в казино «Красное Крыло». Награда: 19,159 каунсилов."
"Deliver 10 Camouflaged Nice Shirts to Irkima in Red Wing Casino. Reward: 14,137 councils.": "Доставьте 10 камуфлированных хороших рубашек Иркиме в казино «Ред Винг». Награда: 14,137 советов."
"Deliver 10 Candied Apples to Fitz the Boatman on the Serbule docks. Reward: 430 councils.": "Доставьте 10 яблок в карамели Фитцу Лодочнику на доки Сербуля. Награда: 430 советов."
"Deliver 10 Candied Grapes to Fitz the Boatman on the Serbule docks. Reward: 1,403 councils.": "Доставьте 10 порций засахаренного винограда Фитцу Лодочнику на доки Сербуля. Награда: 1,403 councils."
"Deliver 10 Candied Hearts to Ogamboe in the Fae Realm. Reward: 2,675 councils.": "Доставьте 10 засахаренных сердечек Огамбое в Царство фей. Награда: 2,675 советов."
"Deliver 10 Candied Lemons to Laura Neth in Kur Mountains. Reward: 7,103 councils.": "Доставьте 10 лимонов в сахаре Лауре Нет в горах Кур. Награда: 7,103 советов."
"Deliver 10 Candle Stumps to Gremix in Amulna. Reward: 212 councils.": "Доставьте 10 огарков свечей Гремиксу в Амульне. Награда: 212 советов."
"Torana said, \"I need some candles to help inspire these guys to fight harder when we're out there and have to prepare for battle. I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Amazing Brisk Candles? I'll trade some of my knowledge and a token for it!\"": "Торана сказала: \"Мне нужны свечи, чтобы вдохновить этих ребят сражаться усерднее, когда мы там и нам нужно готовиться к бою. Я всё ещё жду своё содержание от Оррана, чтобы купить припасы и сделать свои собственные. Не мог бы ты изготовить и принести мне 10 удивительных бодрящих свечей? Я поделюсь кое-какими своими знаниями и дам жетон в обмен!\""
"Torana said, \"I need some candles to help kill the odor of musty crafters in our wagons! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Decent Floral Candles? I'll trade some of my knowledge and a token for it!\"": "Торана сказала: \"Мне нужны свечи, чтобы заглушить запах затхлых ремесленников в наших повозках! Я всё ещё жду своё пособие от Оррана, чтобы купить материалы и сделать свои собственные. Не могли бы вы изготовить и принести мне 10 неплохих цветочных свечей? В обмен я поделюсь частью своих знаний и дам жетон!\""
"Torana said, \"BACON! Who doesn't like bacon? Well, maybe those crazy vegans don't. If I can't have bacon while we're out on the road, I can at least take the smell of it with me! I'm still waiting on my stipend from Orran to go buy supplies to make my own. Could you craft and bring me 10 Nice Bacon Candles? I'll trade some of my knowledge for it!\"": "Торана сказала: \"БЕКОН! Кто не любит бекон? Ну, может, только эти чокнутые веганы. Если я не могу есть бекон, пока мы в пути, то хотя бы могу взять с собой его запах! Я всё ещё жду своё пособие от Оррана, чтобы купить припасы и сделать свои собственные. Не могли бы вы изготовить и принести мне 10 хороших свечей с ароматом бекона? Я поделюсь за это частью своих знаний!\""
"Torana said, \"I need to figure out how to get these fools more into nature. I'm still waiting on my stipend from Orran to go buy supplies. Could you craft and bring me 10 Rough Woodland Candles? I'll trade some of my knowledge for it!\"": "Торана сказала: \"Мне нужно придумать, как сильнее увлечь этих дураков природой. Я всё ещё жду своё пособие от Оррана, чтобы купить припасы. Не могли бы вы изготовить и принести мне 10 грубых лесных свечей? Я поделюсь с вами кое-какими своими знаниями в обмен!\""
"Deliver 10 Cantal Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 6,844 councils.": "Доставьте 10 сыров Канталь Тримблу Питу в крепость Хогана, Эльтибуль. Награда: 6,844 councils."
"Paullus in Statehelm said, \"I know how absurd it sounds! But cantaloupe wine is pretty good, if you follow my recipe exactly. See if you can master it.\"": "Пауллус в Стейтхельме сказал: \"Я знаю, как нелепо это звучит! Но вино из канталупы довольно хорошее, если в точности следовать моему рецепту. Посмотрим, сможете ли вы его освоить.\""
"Umarak in Povus said, \"My mate Tryaka used to love cantaloupe for breakfast. But we can't get it here anymore. Sigh...\"": "Умарак в Повусе сказал: \"Моя подруга Тряка раньше обожала дыню на завтрак. Но мы больше не можем достать её здесь. Эх...\""
"Deliver 10 Cantaloupes to Ogamboe in the Fae Realm. Reward: 15,087 councils.": "Доставьте 10 канталуп Огэмбо в Царство фей. Награда: 15,087 советов."
"Deliver 10 Canvas to Thimble Pete in Hogan's Keep, Eltibule. Reward: 792 councils.": "Доставьте 10 холстов Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 792 совета."
"Ensign Cricket aboard the Wintertide said, \"The best way to assault a ship is to kill the captain! Go kill Captain Evergloam!\"": "Энсин Крикет на борту «Винтертайда» сказал: \"Лучший способ взять корабль на абордаж — убить капитана! Иди убей Капитана Эверглоума!\""
"Deliver 10 Carded Cotton to Thimble Pete in Hogan's Keep, Eltibule. Reward: 536 councils.": "Доставьте 10 кардного хлопка Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 536 советов."
"Wintria Irasce in Rahu said, \"I left my brother running our book store back in Statehelm. I need him to think I'm happy here! Otherwise he won't understand why I'm not ready to go home.\n\nI want to send Michael a package of treats and wonders from Rahu to show how amazing this place is. I have a list here... could you help me? If you get these items, I'll teach you a special organizational cantrip that we use in the book-sellers' trade.\"": "Винтрия Айрэйс в Раху сказала: «Я оставила брата управлять нашим книжным магазином в Стейтхелме. Мне нужно, чтобы он думал, что я счастлива здесь! Иначе он не поймёт, почему я не готова возвращаться домой.\n\nЯ хочу отправить Майклу посылку с угощениями и чудесами из Раху, чтобы показать, какой этот город удивительный. У меня есть список... не мог бы ты помочь мне? Если ты принесёшь эти предметы, я научу тебя особому организационному канспеллу, который мы используем в торговле книгами."
"Deliver 10 Carnelians to Viedesi in Sun Vale. Reward: 4,420 councils.": "Доставьте 10 сердоликов Виедези в Сан-Вейл. Награда: 4,420 советов."
"Urzab in Amulna asked for Carnelians.": "Урзаб в Амульне попросил сердолики."
"Floxie in the Fae Realm said, \"I'm working on becoming a better botanist! It's not as exciting as hunting, but I'm doing what I can. My biggest focus right now is on the carnivines, which are super amazing plants. They have a top area that's like a head, and they grow plates in their head that look like teeth! That's super strange, right? Can you get me some? The teeth, I mean. I need samples from several different carnivines so I can compare them.\n\nYou'll find carnivines most commonly when daytime happens -- they burrow into the ground at night.\"": "Флокси в Фейском царстве сказала: «Я стараюсь стать лучше в ботанике! Это не так захватывающе, как охота, но я делаю, что могу. Мой главный интерес сейчас — плотоядные растения, которые просто удивительны. У них сверху есть что-то вроде головы, и в этой голове растут пластины, похожие на зубы! Это очень странно, правда? Ты можешь достать мне несколько? Зубы, я имею в виду. Мне нужны образцы от нескольких разных плотоядных растений, чтобы я могла их сравнить.\n\nПлотоядные растения чаще всего встречаются днём — ночью они зарываются в землю."
"Deliver 10 Carp Fillets to Irkima in Red Wing Casino. Reward: 150 councils.": "Доставьте 10 филе карпа Иркиме в казино Красное Крыло. Награда: 150 советов."
"Deliver 99 Carp Fillets to Sheyna in Rahu. Reward: 1,828 councils.": "Доставьте 99 филе карпа Шейне в Раху. Награда: 1,828 councils."
"Kalrod said, \"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride, even our really good chairs. If you can provide us with 10 Amazing Chairs, I can show you a few tricks to help with building better ones in the future!\"": "Калрод сказал: \"Эй, ты! Есть настроение что-нибудь построить? Многие наши стулья сломались по дороге сюда из-за тряской поездки, даже наши очень хорошие стулья. Если ты сможешь принести нам 10 Удивительных стульев, я покажу тебе пару приёмов, которые помогут в будущем делать стулья получше!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Astounding Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Калрод сказал: \"Эй, ты! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополненный запас товаров. Если ты сможешь предоставить нам 10 поразительных грузовых ящиков, я покажу тебе пару приёмов, которые помогут в будущем делать ящики ещё лучше!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Crude Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Калрод сказал: \"Эй, ты! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополненные запасы товаров. Если ты сможешь предоставить нам 10 грубых складских ящиков, я покажу тебе пару приёмов, которые помогут в будущем делать ящики получше!\""
"Kalrod said, \"Ho there! In a mood to build something? We need fresh crates to carry our fresh restock of goods. If you can provide us with 10 Nice Storage Crates, I can show you a few tricks to help with building better ones in the future!\"": "Калрод сказал: \"Эй, там! Есть настроение что-нибудь построить? Нам нужны новые ящики, чтобы перевозить пополнение наших товаров. Если вы сможете предоставить нам 10 Хороших ящиков для хранения, я смогу показать вам несколько приёмов, которые помогут в будущем делать ящики ещё лучше!\""
"Kalrod said, \"Ho there! In a mood to build something? A lot of our chairs were broken on the way here because of the rough ride. If you can provide us with 10 Shoddy Chairs, I can show you a few tricks to help with building better ones in the future!\"": "Калрод сказал: \"Эй, ты! Есть настроение что-нибудь построить? Многие наши стулья сломались по дороге сюда из-за тряской поездки. Если ты сможешь предоставить нам 10 плохих стульев, я смогу показать тебе пару приёмов, которые помогут в будущем делать стулья получше!\""
"Paullus in Statehelm said, \"Sometimes you need an earthy wine, and carrot does the trick! Have you made any?\"": "Пауллус в Стейтхельме сказал: \"Иногда нужно землистое вино, и морковь отлично подходит! Ты уже делал такое?\""
"Deliver 10 Carrots to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,538 councils.": "Доставьте 10 морковок Тримблу Питу в Крепость Хогана, Эльтибуль. Награда: 1,538 советов."
"Deliver 10 Casino Breakfasts to Irkima in Red Wing Casino. Reward: 5,037 councils.": "Доставьте 10 завтраков для казино Иркиме в казино «Красное Крыло». Награда: 5,037 councils."
"Qatik in Red Wing Casino said, \"Recently while tuning up our portal system, we accidentally connected to a series of caves beneath Eltibule. These oddly-dark caves are inaccessible except via teleportation, yet there are numerous bipedal denizens! I believe there is significant magical power hidden in the caves, but the Queen won't allow me to send a mantis assault team in, fearing they'd just be outnumbered and killed. That's why we need you!\n\nSince you and your friends are roughly bipedal, perhaps you can blend in with the other bipeds and scout out the place. Barring that, of course, you should fight desperately for your lives, because the bipeds seem to be mentally ill and quite homicidal.\n\nI have located a few potential sources of magical energy in the caves, so go retrieve them! The teleportation attendant can send you into these caves if you ask him early enough today.\n\n<i>[A group of 4+ level 40+ players recommended.]</i>\"": "Катик в казино «Красное Крыло» сказал: «Недавно, настраивая нашу систему порталов, мы случайно подключились к серии пещер под Элтибулом. Эти странно тёмные пещеры недоступны, кроме как через телепортацию, но там обитает множество двуногих существ! Я считаю, что в пещерах скрыта значительная магическая сила, но Королева не разрешает мне отправлять туда отряд мантов, опасаясь, что их просто перебьют и убьют. Вот почему нам нужен ты!\\n\\nПоскольку ты и твои друзья примерно двуногие, возможно, вы сможете слиться с другими двуногими и разведать место. В противном случае, конечно, вам придётся отчаянно сражаться за свои жизни, потому что двуногие, похоже, психически больны и весьма убийственны.\\n\\nЯ обнаружил несколько потенциальных источников магической энергии в пещерах, так что отправляйся и забери их! Служащий телепортации может отправить тебя в эти пещеры, если ты попросишь его достаточно рано сегодня.\\n\\n<i>[Рекомендуется группа из 4+ игроков уровня 40+.]</i>"
"Qatik in Red Wing Casino said, \"As you know, the land of Kur hides tremendous secrets, and we yearn to have the powers rumored to hide in the caves there. We've recently managed to teleport directly into a certain underground cave in Kur, but even though it's underground, it is still too cold for mantises to function optimally. Since you and your friends are generally mammalian, we expect you will have a much easier time. Ignore the woolly bipeds in the upper caverns and seek out the lowest levels of the caves. Certain creatures there may hold the secrets of Kur. You should recognize these secrets when you see them! The teleportation attendant can send you to the cave if you ask today.\n\n<i>[A group of 3+ level 40+ players recommended.]</i>\"": "Катик из казино «Красное Крыло» сказал: «Как ты знаешь, земля Кур скрывает огромные тайны, и мы жаждем обладать силами, о которых ходят слухи, что они спрятаны в пещерах там. Недавно нам удалось телепортироваться прямо в одну подземную пещеру в Кур, но хотя она и под землёй, там всё ещё слишком холодно для оптимальной работы богомолов. Поскольку ты и твои друзья в основном млекопитающие, мы ожидаем, что вам будет гораздо легче. Игнорируй шерстистых двуногих на верхних уровнях пещер и ищи самые нижние уровни. Некоторые существа там могут хранить тайны Кура. Ты должен распознать эти тайны, когда увидишь их! Служащий телепортации может отправить тебя в пещеру, если попросишь сегодня.\\n\\n<i>[Рекомендуется группа из 3+ игроков уровня 40+.]</i>"
"Qatik in Red Wing Casino said, \"I've had Irkima study the available lore on the fae realm and he found an interesting detail. Some of the leaders of the Winter Queen's forces are granted the title of 'Puck', along with associated powers. And to prove their puckhood they are given a badge made of ice. Or crystal. Or icy crystal. Anyway, we need some of those badges. They may hold the secret to infinite power!\n\nIt has taken much influence on my part, but I've convinced the teleportation attendant to send you to the Winter Nexus itself. But go quickly before he tires of maintaining the link to such a distant place!\n\n<i>[A group of 4+ level 40+ players recommended.]</i>\"": "Катик в казино «Красное Крыло» сказал: «Я поручил Иркиме изучить доступные сведения о мире фей, и он обнаружил интересную деталь. Некоторым из лидеров сил Зимней Королевы присваивается титул «Пак», вместе с соответствующими способностями. И чтобы доказать своё пакство, им дают знак изо льда. Или кристалла. Или ледяного кристалла. В любом случае, нам нужны такие знаки. Возможно, в них скрыт секрет бесконечной силы!\\n\\nМне пришлось приложить много усилий, но я убедил служащего телепортации отправить тебя прямо в Зимний Нексус. Но поспеши, пока он не устал поддерживать связь с таким отдалённым местом!\\n\\n<i>[Рекомендуется группа из 4+ игроков уровня 40+]</i>"
"Qatik in Red Wing Casino said, \"The first major success *and* failure of our Teleportation Technology department came two years ago when we reached a warm cave complex beneath Kur. Kur has always been a land of mystery to us, for it is too cold to support true life -- mantis life. But this cave was warmer! And so we sent in two squads of servant mantises to subdue the caves. Instead... they took up residence among the other creatures. They rebelled! This was a huge setback to teleportation magic, and even today I dare not send more mantises into that cave. But you and your friends will not be tricked by whatever wonders lie in there! You can complete the original mission from years ago! I have bribed the teleportation technician to send you there, so long as you ask quickly.\n\n<i>[A group of 3+ level 40+ players is recommended.]</i>\"": "Катик в казино «Красное Крыло» сказал: «Первый крупный успех *и* провал нашего отдела телепортационной технологии произошёл два года назад, когда мы достигли тёплого комплекса пещер под Куром. Кур всегда был для нас землёй загадок, потому что там слишком холодно для настоящей жизни — жизни богомолов. Но эта пещера была теплее! И поэтому мы отправили две группы слуг-богомолов, чтобы подчинить пещеры. Вместо этого... они поселились среди других существ. Они восстали! Это был огромный удар для телепортационной магии, и даже сегодня я не осмеливаюсь посылать туда больше богомолов. Но ты и твои друзья не попадётесь на уловки чудес, что там скрываются! Вы можете выполнить первоначальную миссию тех лет! Я подкупил техника по телепортации, чтобы отправить вас туда, если вы быстро попросите.\\n\\n<i>[Рекомендуется группа из 3+ игроков уровня 40+.]</i>"
"Deliver 10 Casino Kabobs to Irkima in Red Wing Casino. Reward: 3,729 councils.": "Доставьте 10 казино-кебабов Иркиме в казино «Красное Крыло». Награда: 3,729 советов."
"Deliver 10 Casino Stir-Fries to Irkima in Red Wing Casino. Reward: 6,381 councils.": "Доставьте 10 порций жаркого из казино Иркиме в казино «Красное Крыло». Награда: 6,381 councils."
"Deliver 10 Cat Stew Cups to Fitz the Boatman on the Serbule docks. Reward: 1,814 councils.": "Доставьте 10 чашек с кошачьим рагу Фитцу Лодочнику на доки Сербуля. Награда: 1,814 council'ов."
"Farsight Flemmings in Statehelm said, \"I know a lot of weird rituals, but even I don't know what they want this for. Some of these should be easy to find, and some... less so. \"": "Фарсайт Флеммингс в Стейтхельме сказал: \"Я знаю много странных ритуалов, но даже я не знаю, зачем им это нужно. Некоторые из них должно быть легко найти, а некоторые... не очень. \""
"Deliver 10 Catfish Fillets to Viedesi in Sun Vale. Reward: 3,414 councils.": "Доставьте 10 филе сома Виедеси в Солнечную Долину. Награда: 3,414 советов."
"Deliver 99 Catfish Fillets to Sheyna in Rahu. Reward: 63,903 councils.": "Доставьте 99 филе сома Шейне в Раху. Награда: 63,903 council'ов."
"Rick Snapley in New Prestonbule said, \"We have a lot of beer stored away here from the previous tenants. And I know how to summon Council Rations, which are just barely enough to keep us all alive. But I would kill for something else to eat! This is a cave, so you'd think you could catch cave fish in here, right? But no. No deep water, no cave fish. Can you get us some?\"": "Рик Снапли в Нью-Престонбуле сказал: \"У нас здесь хранится много пива, оставшегося от прежних жильцов. И я знаю, как призывать Паёк Совета, которого едва хватает, чтобы мы все не умерли с голоду. Но я бы убил за что-нибудь другое съестное! Это пещера, так что можно подумать, будто здесь можно ловить пещерную рыбу, верно? Но нет. Нет глубокой воды — нет и пещерной рыбы. Можешь раздобыть нам немного?\""
"Mox Warcut in New Prestonbule said, \"While I was exploring Foothills Cave, I uncovered mummies. I think orcs buried an army of mummies in there after a war and forgot about them. Well, you know how we dwarves feel about mummies! So I killed a few, but there were so many other nasty undead in that cave that I had to retreat. Can you go back in there and get rid of a bunch?\"": "Мокс Варкат в Нью-Престонбуле сказал: \"Когда я исследовал Пещеру Предгорий, я наткнулся на мумий. Думаю, орки похоронили там целую армию мумий после войны, а потом забыли о них. Ну, ты же знаешь, как мы, дворфы, относимся к мумиям! Так что я убил нескольких, но в той пещере было так много другой мерзкой нежити, что мне пришлось отступить. Не мог бы ты вернуться туда и избавиться от них?\""
"Deliver 10 Cavefish to Fitz the Boatman on the Serbule docks. Reward: 762 councils.\nNote from orderer: <i>\"I love these eyeless fish: no judgemental stare while cooking it!\"</i>": "Доставьте 10 пещерных рыб Фитцу Лодочнику на причалы Сербуля. Награда: 762 совета.  \nПримечание от заказчика: <i>«Я люблю этих бесглазых рыб: они не смотрят осуждающе, пока я их готовлю!»</i>"
"Deliver 10 Cavefish Fillets to Irkima in Red Wing Casino. Reward: 1,220 councils.": "Доставьте 10 филе пещерной рыбы Иркиме в казино Красное Крыло. Награда: 1 220 советов."
"Deliver 99 Cavefish Fillets to Sheyna in Rahu. Reward: 32,551 councils.": "Доставьте 99 филе пещерной рыбы Шейне в Раху. Награда: 32,551 council."
"Deliver 10 Cavefish Nigiri to Ogamboe in the Fae Realm. Reward: 7,230 councils.": "Доставьте 10 нигири из пещерной рыбы Огамбое в Фейское царство. Награда: 7,230 councils."
"Deliver 10 Cavefish Sticks to Laura Neth in Kur Mountains. Reward: 6,507 councils.": "Доставьте 10 палочек из пещерной рыбы Лауре Нет в горах Кур. Награда: 6,507 councils."
"Ailred in Povus said, \"I'm in the mood for something simple. Please bring me a cavefish supper. A FRESH cavefish supper, mind you! I'm eating simply, not poorly!\"": "Эйлред в Повусе сказал: \"Я настроен на что-нибудь простое. Пожалуйста, принеси мне ужин из пещерной рыбы. И СВЕЖИЙ ужин из пещерной рыбы, имей в виду! Я питаюсь просто, а не плохо!\""
"Deliver 10 Cavefish Suppers to Ogamboe in the Fae Realm. Reward: 6,586 councils.": "Доставьте 10 ужинов из пещерной рыбы Огамбое в Фейское царство. Награда: 6,586 советов."
"Deliver 10 Cavefish Sushi Rolls to Ogamboe in the Fae Realm. Reward: 11,086 councils.": "Доставьте 10 роллов суши из пещерной рыбы Огамбое в Фейское царство. Награда: 11,086 советов."
"Deliver 10 Cedar Dowels to Viedesi in Sun Vale. Reward: 1,762 councils.": "Доставьте 10 кедровых шкантов Виедези в Сан-Вейл. Награда: 1,762 councils."
"Deliver 10 Cedar Wood to Irkima in Red Wing Casino. Reward: 1,137 councils.": "Доставьте 10 кедровой древесины Иркиме в казино «Красное Крыло». Награда: 1,137 советов."
"Deliver 10 Cedar Wood Chips to Viedesi in Sun Vale. Reward: 647 councils.": "Доставьте 10 щепы кедровой древесины Виедеси в Сан-Вейл. Награда: 647 советов."
"Guzor Harrison in Statehelm said, \"I'm working on an extremely interesting new spell, and to further my research, I need special reagents.\n\nWhat I need are bones that have been superheated while still in the body of a living creature. Don't worry, I've researched just the right spell to help you get these -- I'll teach you the spell, when you have the capacity to learn it.\n\nOnce you know the spell, use it on some humans, elves, or rakshasa to collect perfectly charred femurs. ... And make sure to only kill those deserving of death. Obviously.\"": "Гузор Харрисон в Стейтхельме сказал: «Я работаю над чрезвычайно интересным новым заклинанием, и для дальнейших исследований мне нужны особые реагенты.\n\nМне нужны кости, которые были сверхнагреты, пока ещё находились в теле живого существа. Не волнуйся, я изучил именно то заклинание, которое поможет тебе получить их — я научу тебя этому заклинанию, когда у тебя будет возможность его освоить.\n\nКак только ты узнаешь заклинание, используй его на людях, эльфах или ракшасах, чтобы собрать идеально обожжённые бедренные кости. ... И убедись, что убиваешь только тех, кто заслуживает смерти. Очевидно."
"You now have a working nexus adjunct matter aligner! If you can get into the nexus and attach it to an inactive gate, it will open a portal that should lead you to Dalvos.\n\nThe nexus entrance in Eltibule is in the northeast corner. You'll need a key to get in. A human named Percy Evans lives near there and is known to have a key.": "Теперь у вас есть рабочий вспомогательный выравниватель материи Нексуса! Если вы сможете попасть в Нексус и прикрепить его к неактивным вратам, он откроет портал, который должен привести вас в Далвос.\\n\\nВход в Нексус в Элтибуле находится в северо-восточном углу. Для входа вам понадобится ключ. Рядом живёт человек по имени Перси Эванс, у которого, как известно, есть ключ."
"Dalvos isn't in Serbule. You need to find him. Eltibule is the next logical place to try.": "Далвоса нет в Сербуле. Вам нужно найти его. Эльтибуль — следующее логичное место, где стоит поискать."
"Nightshade asked you to look in on his business associate Gribburn, a goblin who lives within Hogan's Keep in Eltibule. In return, Nightshade says he'll help you convince Gribburn to teach you his unusual craft skill.": "Найтшейд попросил вас проведать своего делового партнёра Грибберна, гоблина, который живёт в крепости Хогана в Эльтибуле. Взамен Найтшейд говорит, что поможет вам убедить Грибберна обучить вас своему необычному ремесленному навыку."
"Nightshade asked you to look in on his friend Malgath, who is deep within a cave full of wolves. The cave is somewhere in the Kur Mountains. In return, Nightshade says he'll help you convince Malgath to teach you his unusual craft skill.": "Найтшейд попросил вас проведать его друга Малгата, который находится глубоко в пещере, полной волков. Эта пещера где-то в горах Кур. Взамен Найтшейд говорит, что поможет вам убедить Малгата обучить вас своему необычному ремесленному навыку."
"Nightshade asked you to look in on his friend Poe, a myconian who lives somewhere beneath Serbule. In return, Nightshade says he'll help you convince Poe to teach you his unusual craft skill.": "Найтшейд попросил вас проведать его друга По, миконианца, который живёт где-то под Сербулем. Взамен Найтшейд говорит, что поможет вам убедить По обучить вас своему необычному ремесленному навыку."
"Nightshade asked you to look in on his friend Syndra, who is residing somewhere in a barn in Kur Mountains. In return, Nightshade says he'll help you convince Syndra to teach you her unusual craft skill.": "Найтшейд попросил вас проведать его подругу Синдру, которая живёт где-то в амбаре в горах Кур. Взамен Найтшейд говорит, что поможет вам убедить Синдру обучить вас её необычному ремесленному навыку."
"Tangle in the Sacred Warden Grotto said, \"Ever been to the Ilmari Desert? Well, there's a town in the desert called Amulna. In this town is a wolf. Well, more specifically, he's a werewolf. But he's one of the good ones. He has some great merchant contacts and gets us a lot of supplies. This care package includes some money we owe him.\"": "Тангл в Гроте Священного Стража сказал: \"Ты когда-нибудь бывал в пустыне Илмари? Там, в пустыне, есть город под названием Амулна. В этом городе живёт волк. Точнее говоря, оборотень. Но он из хороших. У него отличные связи среди торговцев, и благодаря ему мы получаем много припасов. В этой посылке с припасами есть немного денег, которые мы ему должны.\""
"Tangle in the Sacred Warden Grotto said, \"Check in on Norbert for me, will you? I know you've met him already in Sun Vale. He's a good pig. Used to run missions with us, but some of his friends died in the big massacre, and he's been a lot more distant since then. Take this stuff to show we still care, that sort of thing.\"": "Тэнгл в Гроте Священного Стража сказал: \"Проведай Норберта от меня, ладно? Я знаю, вы уже встречались с ним в Солнечной Долине. Он хороший свин. Раньше ходил с нами на задания, но несколько его друзей погибли в той большой бойне, и с тех пор он стал гораздо более замкнутым. Отнеси ему эти вещи, чтобы показать, что нам всё ещё не всё равно, ну и всё такое.\""
"Tangle in the Sacred Warden Grotto said, \"We need to check in on some of our spy network members. These are animals in distant lands that work with us. They aren't all members of the Wardens, but they're entrusted with our secret communication ritual.\n\nStart by checking in with a cow in Eltibule. I don't know her name... she's never given us one. But she says she's the only talking cow in her herd, so... see what you can do. Take this care package to her. It's some stuff she asked for a while back.\"": "Тэнгл в Гроте Священного Стража сказал: «Нам нужно проверить некоторых членов нашей шпионской сети. Это животные в дальних землях, которые работают с нами. Они не все являются Стражами, но им доверен наш секретный ритуал связи.\n\nНачни с проверки коровы в Элтибуле. Я не знаю её имени... она никогда нам его не давала. Но она говорит, что она единственная говорящая корова в своём стаде, так что... посмотри, что сможешь сделать. Отнеси ей эту посылку с припасами. Это то, что она просила некоторое время назад."
"Tangle in the Sacred Warden Grotto said, \"This one's hard. Ever heard of the Gazluk Plateau? Well, Trekker the pig is in the northeast-ish part of the mountains. You'll have to climb up from the valley into the mountains to find him. Bring warm clothes.\"": "Тэнгл в гроте Священного Стража сказал: \"Это непросто. Слышали когда-нибудь о плато Газлук? Так вот, свин Треккер находится в северо-восточной части гор. Чтобы найти его, вам придётся подняться из долины в горы. Возьмите тёплую одежду.\""
"Gloria Stonecurl in Kur Mountains said, \"That blasted human! Laura Neth! She doesn't like me, and she's very mean. And she's a huge fucking racist, just like most humans, and I am <i>so sick</i> of her shit!\n\n<i>[Gloria breathes deeply.]</i> I'm sorry. I can fight a horde of zombies without breaking a sweat, but one bitchy old human who knows how to get under my defenses... anyway, I'm trying to befriend her. I know she needs more sharp cheddar cheese for her biscuits. Do you have any? I'll buy it from you for, say, 600 Councils?\"": "Глория Стоункерл в горах Кур сказала: «Этот проклятый человек! Лаура Нет! Она меня не любит и очень злая. И она огромная расистка, как и большинство людей, и меня это <i>до смерти</i> достало!\\n\\n<i>[Глория глубоко вздыхает.]</i> Извини. Я могу сражаться с ордой зомби, не вспотев, но одна сварливая старая человек, которая умеет пробираться под мою защиту... в общем, я пытаюсь подружиться с ней. Я знаю, что ей нужно больше острого сыра чеддер для её печенья. У тебя есть? Я куплю у тебя за, скажем, 600 советов?"
"When you first awoke on an island, you met an elf named Riger who seemed depressed and asked for something to cure his depression. Unfortunately, he wasn't clear about what that might be.": "Когда вы впервые очнулись на острове, вы встретили эльфа по имени Ригер, который выглядел подавленным и попросил что-нибудь, что могло бы избавить его от уныния. К сожалению, он не объяснил толком, что именно ему нужно."
"Deliver 10 Cheese Curd Necklaces to Sheyna in Rahu. Reward: 3,710 councils.": "Доставьте 10 ожерелий из сырного творога Шейне в Раху. Награда: 3,710 советов."
"Willem Fangblade in Red Wing Casino said, \"Do ya know what 'cheshire' is? It's a kinda cheese. Look, I can't explain why, but it's important that I find some. I need ta appear cultured.\"": "Виллем Фэнгблейд в казино «Красное Крыло» сказал: \"Ты знаешь, что такое 'чешир'? Это вроде как сыр. Слушай, я не могу объяснить почему, но мне важно найти немного. Мне нужно казаться культурным.\""
"Nelson Ballard in Serbule has asked you to obtain some cheese he ordered from a man in Eltibule Keep.": "Нельсон Баллард в Сербуле попросил вас получить немного сыра, который он заказал у человека в крепости Эльтибуль."
"Bogaku in the Rahu Sewers said, \"Even if these ratkin aren't growing crops here, they're surely making their own cheese! I need a sample of their aged cheese... perhaps it will tell us secrets. Now, when I say that, I don't mean cheese can talk. So don't be afraid. Just get the cheese.\"": "Богаку в канализации Раху сказал: \"Даже если эти крысолюды не выращивают здесь урожай, они наверняка делают свой собственный сыр! Мне нужен образец их выдержанного сыра... возможно, он раскроет нам секреты. И когда я так говорю, я не имею в виду, что сыр умеет разговаривать. Так что не бойся. Просто принеси сыр.\""
"Deliver 10 Cheesecloth to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,884 councils.": "Доставьте 10 марли для сыра Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 1,884 council'ов."
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Edam Cheese, I will share some of my cheesemaking experience with you!\"": "Серрольд сказал: \"Я вижу, что ты сыродел... от тебя исходит этот запах! Делать сыр в дороге всегда непросто, а нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Торана. Если ты готов принести мне 10 кусков сыра Эдам, я поделюсь с тобой своим опытом в сыроделии!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Torana and myself are carrying. If you would be willing to bring me 10 pieces of Feta Cheese, I will share some of my cheesemaking experience with you!\"": "Серрольд сказал: \"Я вижу, что ты сыродел... от тебя исходит этот запах! Делать сыр в дороге всегда непросто, и нам бы очень пригодился запас чего-нибудь, кроме того, что несём я и Торана. Если ты готов принести мне 10 кусков сыра фета, я поделюсь с тобой своим опытом в сыроделии!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Mild Cheddar Cheese, I will share some of my cheesemaking experience with you!\"": "Серрольд сказал: \"Я вижу, что ты сыродел... от тебя так и пахнет! Делать сыр на ходу всегда непросто, и нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Серрольд. Если ты готов принести мне 10 кусков мягкого сыра чеддер, я поделюсь с тобой своим опытом в сыроделии!\""
"Serrold said, \"I can tell you're a cheesemaker... you have that smell about you! Making cheese on the go can always be difficult, and we really could use a stock of something other than what Serrold and myself are carrying. If you would be willing to bring me 10 pieces of Raclette Cheese, I will share some of my cheesemaking experience with you!\"": "Серрольд сказал: \"Я вижу, ты сыродел... от тебя исходит этот запах! Делать сыр на ходу всегда бывает непросто, и нам бы очень пригодился запас чего-нибудь, кроме того, что несём с собой я и Серрольд. Если ты готов принести мне 10 кусков сыра Раклет, я поделюсь с тобой своим опытом в сыроделии!\""
"Deliver 10 Cheesy Baked Potatoes to Laura Neth in Kur Mountains. Reward: 2,936 councils.": "Доставьте 10 порций печёного картофеля с сыром Лауре Нет в горах Кур. Награда: 2,936 councils."
"Deliver 10 Cheesy Veggie Delights to Laura Neth in Kur Mountains. Reward: 9,084 councils.": "Доставьте 10 сырных овощных деликатесов Лауре Нет в горах Кур. Награда: 9,084 каунсилов."
"Deliver 10 Cheshire Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,416 councils.": "Доставьте 10 чеширского сыра Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 5,416 советов."
"Ailred in Povus said, \"Finally, the help has arrived. Yes, I'm ready to order. Please bring me a chicken casserole. Yes, a complete casserole. I'm FAMISHED. From WAITING. For HOURS!\"": "Эйлред в Повусе сказал: \"Наконец-то помощь прибыла. Да, я готов сделать заказ. Пожалуйста, принесите мне куриную запеканку. Да, целую запеканку. Я УМИРАЮ ОТ ГОЛОДА. ИЗ-ЗА ОЖИДАНИЯ. ЧАСАМИ!\""
"Deliver 10 Chicken Casseroles to Laura Neth in Kur Mountains. Reward: 7,629 councils.": "Доставьте 10 куриных запеканок Лауре Нет в горах Кур. Награда: 7,629 советов."
"Deliver 10 Chicken Drumsticks to Fitz the Boatman on the Serbule docks. Reward: 1,457 councils.": "Доставьте 10 куриных голеней Фитцу Лодочнику на доки Сербуля. Награда: 1,457 councils."
"Deliver 10 Chicken Psi-Mantis Styles to Laura Neth in Kur Mountains. Reward: 1,824 councils.": "Доставьте 10 стилей куриного пси-богомола Лауре Нет в горах Кур. Награда: 1,824 council'ов."
"Deliver 10 Chicken and Broccolis to Laura Neth in Kur Mountains. Reward: 3,127 councils.": "Доставьте 10 порций «Курицы и брокколи» Лоре Нет в горах Кур. Награда: 3,127 councils."
"Deliver 10 Chicken and Watercress Soups to Fitz the Boatman on the Serbule docks. Reward: 894 councils.": "Доставьте 10 супов из курицы и кресс-салата Фитцу Лодочнику на доки Сербуля. Награда: 894 councils."
"Deliver 10 Chicken-Rabbit Rices to Irkima in Red Wing Casino. Reward: 2,704 councils.": "Доставьте 10 рисов из курокролика Иркиме в казино «Красное Крыло». Награда: 2,704 councils."
"Deliver 10 Chin Straps to Fitz the Boatman on the Serbule docks. Reward: 187 councils.": "Доставьте 10 подбородочных ремней Фитцу Лодочнику на доки Сербуля. Награда: 187 советов."
"Deliver 10 Chub Fillets to Irkima in Red Wing Casino. Reward: 391 councils.": "Доставьте 10 филе чуба Иркиме в казино Красное Крыло. Награда: 391 совет."
"Deliver 99 Chub Fillets to Sheyna in Rahu. Reward: 6,172 councils.": "Доставьте 99 филе голавля Шейне в Раху. Награда: 6,172 советов."
"Deliver 10 Chuma's Agave Secrets to Laura Neth in Kur Mountains. Reward: 8,810 councils.": "Доставьте 10 секретов агавы Чумы Лауре Нет в горах Кур. Награда: 8,810 советов."
"Deliver 10 Cinnabar to Irkima in Red Wing Casino. Reward: 7,057 councils.": "Доставьте 10 киновари Иркиме в казино «Красное Крыло». Награда: 7,057 советов."
"Umarak in Povus said, \"My mate is not doing well since the invasion. She used to make jewelry, and I'm hoping I can convince her to take up the trade again. It will make her happier. I just need some cinnabar!\"": "Умарак в Повусе сказал: \"Моей супруге нездоровится после вторжения. Раньше она делала украшения, и я надеюсь, что смогу убедить её снова заняться этим ремеслом. Это сделает её счастливее. Мне просто нужно немного киновари!\""
"Deliver 10 Cinnamon Pumpkin Rolls to Ogamboe in the Fae Realm. Reward: 6,069 councils.": "Доставьте 10 булочек с тыквой и корицей Огамбое в Царство фей. Награда: 6,069 советов."
"Deliver 10 Citrines to Viedesi in Sun Vale. Reward: 4,420 councils.": "Доставьте 10 цитринов Виедези в Сан-Вейл. Награда: 4,420 councils."
"Tyler Green asked you to get him some oranges or lemons so his teeth don't all fall out.": "Тайлер Грин попросил вас принести ему апельсины или лимоны, чтобы у него не выпали все зубы."
"Deliver 10 Cleaned Shrimp to Irkima in Red Wing Casino. Reward: 637 councils.": "Доставьте 10 очистленных креветок Иркиме в казино Красное Крыло. Награда: 637 советов."
"Deliver 99 Cleaned Shrimp to Sheyna in Rahu. Reward: 11,042 councils.": "Доставьте 99 очищенных креветок Шейне в Раху. Награда: 11,042 councils."
"Deliver 10 Cleanliness Arrangement #1 to Sheyna in Rahu. Reward: 3,512 councils.": "Доставьте 10 уборок №1 Шейне в Раху. Награда: 3,512 советов."
"Deliver 10 Cleanliness Arrangement #10 to Korbok in Vidaria. Reward: 55,857 councils.": "Доставьте 10 уборок №10 Корбоку в Видарии. Награда: 55,857 советов."
"Deliver 10 Cleanliness Arrangement #2 to Sheyna in Rahu. Reward: 5,571 councils.": "Доставьте 10 уборок №2 Шейне в Раху. Награда: 5 571 совет."
"Deliver 10 Cleanliness Arrangement #3 to Sheyna in Rahu. Reward: 8,476 councils.": "Доставьте 10 уборок №3 Шейне в Раху. Награда: 8,476 советов."
"Deliver 10 Cleanliness Arrangement #4 to Sheyna in Rahu. Reward: 9,752 councils.": "Доставьте 10 уборок №4 Шейне в Раху. Награда: 9 752 совета."
"Deliver 10 Cleanliness Arrangement #5 to Sheyna in Rahu. Reward: 12,567 councils.": "Доставьте 10 уборок №5 Шейне в Раху. Награда: 12 567 советов."
"Deliver 10 Cleanliness Arrangement #6 to Sheyna in Rahu. Reward: 14,990 councils.": "Доставьте 10 уборок №6 Шейне в Раху. Награда: 14,990 советов."
"Deliver 10 Cleanliness Arrangement #7 to Korbok in Vidaria. Reward: 22,957 councils.": "Доставьте 10 уборок №7 Корбоку в Видарии. Награда: 22,957 советов."
"Deliver 10 Cleanliness Arrangement #8 to Korbok in Vidaria. Reward: 27,032 councils.": "Доставьте 10 уборок №8 Корбоку в Видарии. Награда: 27,032 совета."
"Deliver 10 Cleanliness Arrangement #9 to Korbok in Vidaria. Reward: 48,973 councils.": "Доставьте 10 Уборок №9 Корбоку в Видарии. Награда: 48,973 советов."
"Silvia in Sun Vale said, \"We can't have these fae creatures running all over our land! You fairies aren't too bad, but the biting vines are ruining the native ecology! Help me cull them, would you?\"": "Сильвия в Солнечной долине сказала: \"Мы не можем позволить этим фейским существам разгуливать по всей нашей земле! Вы, феи, не так уж плохи, но кусачие лозы губят местную экосистему! Помоги мне сократить их численность, ладно?\""
"Grakelsput in Povus said, \"When we reanimate a creature through Paleontology, we can't control it. Most of my associates are skilled at aggression deterrance, so there aren't too many accidents. But I have to admit the number of skeletal beasts in the area is becoming somewhat ... problematic. Hey, maybe you could clean some of them up for us? Start with the lanky ones. They're comparatively docile.\"": "Гракелспут в Повусе сказал: \"Когда мы оживляем существо с помощью Палеонтологии, мы не можем его контролировать. Большинство моих коллег умеют сдерживать агрессию, так что несчастных случаев не так уж много. Но должен признать, что количество скелетных зверей в округе становится несколько... проблематичным. Эй, может, ты поможешь нам с ними разобраться? Начни с долговязых. Они сравнительно смирные.\""
"Grakelsput in Povus said, \"Do you think you can take out the pointy-faced dinosaurs? Those were called triceratops, and they lived a very long time ago. Try not to get knocked off a cliff!\"": "Гракелспут в Повусе сказал: \"Как думаешь, сможешь расправиться с остромордыми динозаврами? Их называли трицератопсами, и жили они очень давно. Постарайся не свалиться с утёса!\""
"Baroness Marith Felgard in Serbule Hills said, \"The ranalon have a sort of outdoor temple near the lake. You'll know it by the two large stone obelisks sticking out of the water nearby. Go there and slay the prayermaster and his minions. The prayer-master is an important leader, and his death will cause chaos among their ranks. I shall pay you 400 Councils.\"": "Баронесса Марит Фелгард в Сербульских холмах сказала: \"У раналон есть что-то вроде открытого храма у озера. Вы узнаете его по двум большим каменным обелискам, торчащим из воды неподалёку. Отправляйтесь туда и убейте мастера молитв и его прислужников. Мастер молитв — важный лидер, и его смерть вызовет хаос в их рядах. Я заплачу вам 400 Каунсилов.\""
"Korbok in Vidaria said, \"De Cancel haz mi heer tahelp at, bit dey din sey eye hafta only tek wakordas. Im gunna kollect alde poyzens ye ken git ta... keepit offa de streetz. Yeh, dats it. Help me cleen up te streetz, wontcha?\n\n(You're pretty sure Korbok wants you to collect poison, to \"Clean up the streets\")\"": "Корбок в Видарии сказал: «Де Кансел попросил меня помочь, но они сказали, что я должен брать только вахордосы. Он собирается собрать все яды, которые ты сможешь достать... чтобы убрать их с улиц. Да, вот так. Поможешь мне очистить улицы, не так ли?\\n\\n(Ты почти уверен, что Корбок хочет, чтобы ты собрал яды, чтобы «Очистить улицы».)"
"Cleo Conyer in Serbule Hills said, \"When the ranalon ran my cart off the road, I just fled in a panic. I should have grabbed my papers! I'm kicking myself for leaving them behind. Those books are key to my business!\n\nI'm sure the ranalon have stolen all the valuable stuff from my cart, but the books don't look valuable. Could you go look for them?\n\nFollow the road south until you reach a crossroads, then head east into Ranalon territory. The road will go along a strip of land separating two lakes. My cart was run off the road right near there! It rolled down toward the southern lake. It didn't go into the water, though, so maybe my papers are still intact! You've gotta check. Please?\"": "Клео Коньер в холмах Сербуль сказала: «Когда раналон сшиб мою повозку с дороги, я просто в панике убежала. Мне следовало схватить свои бумаги! Я корю себя за то, что оставила их позади. Эти книги — ключ к моему бизнесу!\\n\\nЯ уверена, что раналон украли всё ценное из моей повозки, но книги не выглядят ценными. Ты не мог бы поискать их?\\n\\nИди по дороге на юг, пока не дойдёшь до перекрёстка, затем сверни на восток в территорию раналон. Дорога идёт вдоль полосы земли между двумя озёрами. Моя повозка была сбита с дороги прямо там! Она скатилась к южному озеру. Но в воду не упала, так что, возможно, мои бумаги ещё целы! Ты должен проверить. Пожалуйста?"
"Deliver 10 Cloth Handkerchiefs to Irkima in Red Wing Casino. Reward: 179 councils.": "Доставьте 10 тканевых носовых платков Иркиме в казино «Красное Крыло». Награда: 179 советов."
"Deliver 10 Clownfish to Fitz the Boatman on the Serbule docks. Reward: 180 councils.": "Доставьте 10 рыб-клоунов Фитцу Лодочнику на доки Сербуля. Награда: 180 советов."
"Deliver 10 Clownfish Chowders to Fitz the Boatman on the Serbule docks. Reward: 564 councils.": "Доставьте 10 похлёбок из рыбы-клоуна Фитцу Лодочнику на доки Сербуля. Награда: 564 councils."
"Deliver 10 Clownfish Fillets to Fitz the Boatman on the Serbule docks. Reward: 121 councils.": "Доставьте 10 филе клоунской рыбы Фитцу Лодочнику на причалы Сербуля. Награда: 121 совет."
"Deliver 99 Clownfish Fillets to Sheyna in Rahu. Reward: 1,828 councils.": "Доставьте 99 филе рыбы-клоуна Шейне в Раху. Награда: 1,828 советов."
"Deliver 10 Clownfish Nigiri to Ogamboe in the Fae Realm. Reward: 2,294 councils.": "Доставьте 10 нигири из рыбы-клоуна Огамбое в Фейское царство. Награда: 2,294 council'ов."
"Deliver 10 Clownfish Sushi Rolls to Ogamboe in the Fae Realm. Reward: 2,285 councils.": "Доставьте 10 роллов суши из рыбы-клоуна Огамбое в Фейское царство. Награда: 2,285 council'ов."
"Deliver 10 Coarse Cotton Yarn to Thimble Pete in Hogan's Keep, Eltibule. Reward: 233 councils.": "Доставьте 10 грубой хлопковой пряжи Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 233 совета."
"Deliver 10 Cockatrice Beaks to Irkima in Red Wing Casino. Reward: 1,001 councils.": "Доставьте 10 клювов кокатриксов Иркиме в казино «Красное Крыло». Награда: 1,001 council."
"Thimble Pete asked for some fruit cocktail.": "Напёрсток Пит попросил немного фруктового коктейля."
"Sammie Grimspine in Serbule Hills said, \"I heard that goblins took the logging camps to the northeast... and that they're using fairies as slaves! So terrible! Now, I could never condone killing anybody, but IF a slave were to HAPPEN to perish, and if they had cold iron shackles in good condition, and IF those shackles made it back to me, I would be very grateful. Not that I want you to kill anybody, though! No no no. Just... be on the lookout for cold iron shackles. That's all.\"": "Сэмми Гримспайн в Сербульских холмах сказал: \"Я слышал, что гоблины захватили лесозаготовительные лагеря к северо-востоку... и что они используют фей как рабов! Это так ужасно! Конечно, я ни в коем случае не могу одобрять убийство кого бы то ни было, но ЕСЛИ вдруг какой-нибудь раб СЛУЧАЙНО погибнет, и если на нём будут кандалы из холодного железа в хорошем состоянии, и ЕСЛИ эти кандалы попадут ко мне, я был бы очень благодарен. Не то чтобы я хотел, чтобы вы кого-то убивали! Нет-нет-нет. Просто... присматривайте за кандалами из холодного железа. Вот и всё.\""
"Deliver 10 Cold Resistance Potions to Fitz the Boatman on the Serbule docks. Reward: 2,089 councils.": "Доставьте 10 зелий сопротивления холоду Фитцу Лодочнику на доки Сербуля. Награда: 2,089 councils."
"Deliver 10 Coldbite Potions to Fitz the Boatman on the Serbule docks. Reward: 2,133 councils.": "Доставьте 10 зелий Ледяного укуса Фитцу Лодочнику на доки Сербуля. Награда: 2,133 councils."
"Deliver 10 Coldgnaw Potions to Viedesi in Sun Vale. Reward: 6,567 councils.": "Доставьте 10 зелий Колдгноу Виедези в Сан-Вейл. Награда: 6,567 councils."
"Deliver 10 Coldrend Potions to Viedesi in Sun Vale. Reward: 11,401 councils.": "Доставьте 10 зелий Колдренда Виедези в Сан-Вейл. Награда: 11,401 councils."
"Engineer Crall in Vidaria said, \"I have prepared the collaboration notes I would like you to deliver to the dwarf. If you would be so kind, please translate them and deliver them. I eagerly await his response.\"": "Инженер Кралл в Видарии сказал: \"Я подготовил заметки о сотрудничестве, которые хотел бы, чтобы вы доставили дворфу. Будьте так добры, пожалуйста, переведите их и доставьте. Я с нетерпением жду его ответа.\""
"Fainor the elf doesn't trust you since you're an animal. Collect 20 apples in the forest to convince him to do business with you.": "Файнор-эльф не доверяет вам, потому что вы животное. Соберите 20 яблок в лесу, чтобы убедить его иметь с вами дело."
"Spot in Sun Vale's Animal Town asked you to collect eels.": "Спот из Звериного городка в Сан-Вейле попросил вас собрать угрей."
"Sie Antry requested two perfect giant snail shells. The giant snails near her homestead occasionally drop them.": "Сие Антри попросила две идеальные гигантские раковины улиток. Гигантские улитки возле её усадьбы иногда их сбрасывают."
"Obtain 2 perfect giant snail shells and return to Sie Antry.": "Добудьте 2 идеальные раковины гигантских улиток и вернитесь к Сай Энтри."
"Brianna Willer in Serbule Hills said, \"Go over to the Tapestry Inn and ask Durstin what beer he wants to order for next month.\"": "Брианна Уиллер в Сербульских холмах сказала: \"Сходи в гостиницу «Гобелен» и спроси Дурстина, какое пиво он хочет заказать на следующий месяц.\""
"Deliver 10 Concentrated Wolfen Speed Juices to Viedesi in Sun Vale. Reward: 14,776 councils.": "Доставьте 10 Концентрированных соков скорости волфена Виедези в Сан-Вейл. Награда: 14,776 councils."
"Sona in New Prestonbule said, \"I have thought about what Urzab told you: that my assistants may be involved in the attempt on my life. Rick already tracked down one of them, and she knew nothing. He couldn't find the other one...\n\nBut I know where Tal-Saka would have gone. I did not tell Rick because I won't let him get hurt for me! But if <i>you</i> wanted to go and confront Tal-Saka... I would be grateful.\n\nTal-Saka often spoke of his vagabond friends that live in a ruined desert outpost. To find the outpost, start at Amulna, then head due east. It is a long journey, so bring water. And be careful! It will be dangerous.\"": "Сона в Новом Престонбуле сказала: «Я обдумала то, что Урзаб тебе рассказал: что мои помощники могут быть замешаны в покушении на мою жизнь. Рик уже нашёл одну из них, и она ничего не знала. Другую он найти не смог...\\n\\nНо я знаю, куда мог пойти Тал-Сака. Я не сказала Рику, потому что не хочу, чтобы он пострадал из-за меня! Но если <i>ты</i> захочешь пойти и встретиться с Тал-Сакой... я буду благодарна.\\n\\nТал-Сака часто говорил о своих бродячих друзьях, которые живут в разрушенном пустынном форпосте. Чтобы найти форпост, начни в Амульне, затем направляйся прямо на восток. Это долгий путь, так что возьми воду. И будь осторожен! Это будет опасно."
"Sona in New Prestonbule said, \"I would like your help on a delicate subject. I need to know if the goblin Urzab had anything to do with what happened to me in the desert. He lives in Amulna.\n\nThere is a catch, however: he only speaks goblinese. Rick has confronted him, but Rick's goblinese is poor and he is not sure he understood everything. Do you happen to be fluent? If so, could you speak to Urzab about the attempt on my life?\"": "Сона в Новом Престонбуле сказала: «Мне нужна твоя помощь в деликатном вопросе. Мне нужно узнать, имел ли гоблин Урзаб какое-то отношение к тому, что со мной случилось в пустыне. Он живёт в Амульне.\n\nОднако есть одна загвоздка: он говорит только на гоблинском. Рик пытался с ним поговорить, но его гоблинский слаб, и он не уверен, что понял всё. Ты случайно не свободно говоришь на гоблинском? Если да, не мог бы ты поговорить с Урзабом о покушении на мою жизнь?"
"Melandria in Gazluk Keep said, \"My brother is a gru-maghi in one of the aboveground houses. You know, up above, where the best-connected orc leaders live? Anyway, my brother and I each smuggled in a pemphredo eye so we could talk to each other at night. But mine was taken as contraband almost as soon as I arrived, and I haven't been able to find another anywhere in Gazluk. Can you find me another one from outside? I miss my brother...\"": "Меландрия в крепости Газлук сказала: \"Мой брат — гру-маги в одном из наземных домов. Ну, знаешь, наверху, где живут орочьи вожди с лучшими связями? В общем, мы с братом тайком пронесли по глазу пемфредо, чтобы разговаривать друг с другом по ночам. Но мой почти сразу же конфисковали как контрабанду, как только я прибыла, и с тех пор я не смогла найти другой нигде в Газлуке. Можешь добыть мне ещё один снаружи? Я скучаю по брату...\""
"Zazzamath in The Rubywall in Vidaria said, \"The thing about life is, it somehow keeps coming back! But now while you're around to say anything about it! Go out, end as many lives as you can, then come back. Then do it again next week!\"": "Заззамат в Рубиновой Стене в Видарии сказал: \"Вот что странно в жизни: она почему-то всё время возвращается! Но не пока ты рядом, чтобы она могла что-то на это сказать! Иди и оборви как можно больше жизней, а потом возвращайся. А затем сделай это снова на следующей неделе!\""
"Leonard Allenson won't talk to you without proof that you're not a horrific monster. Conveniently, he knows the perfect way: bring him a stack of bacon.": "Леонард Алленсон не станет с вами разговаривать без доказательства того, что вы не ужасный монстр. К счастью, он знает идеальный способ: принесите ему стопку бекона."
"Ultashk demanded animal fat before he will open the gate into the further reaches of Hogan's 'basement'.": "Улташк потребовал животный жир, прежде чем откроет ворота в дальние глубины «подвала» Хогана."
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! A casserole would be perfect! Bring me 10 plates of Chicken Casserole, and maybe I can help you out somehow.\"": "Кинира сказала: \"Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они, того и гляди, взбунтуются! Им нужно мясо! Курица! Запеканка была бы идеальна! Принеси мне 10 порций куриной запеканки, и, может быть, я смогу как-нибудь тебе помочь.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Chicken! And something other then beets... maybe some broccoli? Bring me 20 plates of Chicken and Broccoli, and maybe I can help you out somehow.\"": "Кинира сказала: \"Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они могут взбунтоваться! Им нужно мясо! Курица! И что-нибудь кроме свёклы... может, немного брокколи? Принеси мне 20 тарелок курицы с брокколи, и, может быть, я как-нибудь смогу тебе помочь.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Pork! I hear the Fae have a great recipe for vexfish! Bring me 40 Evu Mint Pork, and maybe I can help you out somehow.\"": "Кинира сказала: \"Привет! Мы уже довольно долго в пути, так что запасы провизии и кухонных припасов почти иссякли. Если этим ребятам снова придётся есть свёклу, они, того и гляди, взбунтуются! Им нужно мясо! Свинина! Я слышала, у фей есть отличный рецепт вексрыбы! Принеси мне 40 порций свинины с мятой эву, и, может быть, я смогу как-нибудь тебе помочь.\""
"Kinira said, \"Hello! We have been on the road for quite some time, and our on-the-road rations are nearly gone.  We need some good on the go snacks! Bring me 10 Venison Jerky, and maybe I can help you out somehow.\"": "Кинира сказала: \"Привет! Мы уже довольно долго в пути, и наши дорожные припасы почти закончились. Нам нужна хорошая еда для перекуса в дороге! Принеси мне 10 порций вяленой оленины, и, может быть, я смогу как-нибудь тебе помочь.\""
"Kinira said, \"Hello! We have been on the road for quite some time, so rations and cooking supplies got thin. If these guys have to eat beets again, they might riot! They need meat! Fish! I hear the Fae have a great recipe for vexfish! Bring me 20 Vexfish Lettuce Wraps, and maybe I can help you out somehow.\"": "Кинира сказала: \"Привет! Мы уже довольно долго в пути, так что запасы провизии и припасов для готовки почти иссякли. Если этим ребятам снова придётся есть свёклу, они могут взбунтоваться! Им нужно мясо! Рыба! Я слышала, у фей есть отличный рецепт векс-рыбы! Принеси мне 20 салатных рулетиков с векс-рыбой, и, может быть, я смогу как-нибудь тебе помочь.\""
"Deliver 10 Copper Ore to Irkima in Red Wing Casino. Reward: 1,108 councils.": "Доставьте 10 медной руды Иркиме в казино «Красное Крыло». Награда: 1,108 советов."
"Corey the Croaker in the Winter Nexus asked you for ogre stomachs.": "Кори Квакун из Зимнего Нексуса попросил вас принести желудки огров."
"Corey the Croaker in the Winter Nexus asked you for fairy wings.": "Кори Квакун в Зимнем Нексусе попросил вас принести крылья феи."
"Deliver 10 Corn to Ogamboe in the Fae Realm. Reward: 6,651 councils.": "Доставьте 10 кукурузы Огамбое в Царство фей. Награда: 6,651 councils."
"Deliver 10 Cottage Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,061 councils.": "Доставьте 10 домашнего сыра Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 1,061 councils."
"Arianna Fangblade in Red Wing Casino said, \"The food here's nice enough, but not what I'm used to. I've got a craving for a classic cottage pie! Do ya know where to get one around here? 'Cuz I surely don't!\"": "Арианна Фэнгблейд в казино «Красное Крыло» сказала: \"Еда здесь вполне неплохая, но я привыкла не к такой. Мне ужасно хочется классического деревенского пирога! Ты не знаешь, где здесь можно его достать? Уж я-то точно не знаю!\""
"Deliver 10 Cottage Pies to Laura Neth in Kur Mountains. Reward: 4,320 councils.": "Доставьте 10 деревенских пирогов Лоре Нет в горах Кур. Награда: 4,320 советов."
"Deliver 10 Cotton to Thimble Pete in Hogan's Keep, Eltibule. Reward: 109 councils.\nNote from orderer: <i>\"Leave the seeds in!\"</i>": "Доставьте 10 хлопка Тимбл Питу в Крепость Хогана, Элтибуле. Награда: 109 советов.\nЗаметка от заказчика: <i>«Оставьте семена!»</i>"
"Eveline Rastin in Red Wing Casino said, \"I need a lot of cotton for a new dress I'm making. I wouldn't ask if you looked busy, but since you just seem to be standing around, maybe you could card some cotton for me? Just a little bit. Like ten cards?\"": "Эвелина Растин в казино «Красное Крыло» сказала: \"Мне нужно много хлопка для нового платья, которое я шью. Я бы не просила, если бы вы выглядели занятым, но раз уж вы, похоже, просто стоите без дела, может, вы начешете для меня немного хлопка? Совсем чуть-чуть. Скажем, десять порций?\""
"Thimble Pete asked for a bunch of prepped cotton.": "Напёрсток Пит попросил принести кучу подготовленного хлопка."
"Deliver 10 Cotton Thread to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,986 councils.": "Доставьте 10 хлопковых нитей Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 1,986 советов."
"Mope in Povus said, \"Six days prior, a band of fortified orcs attempted to cross my fungal fields and chop down my tall mushrooms. They were killed and their bodies are now fertilizer. Yet I fear retaliation, for orcs are not prone to abandoning their schemes. It would be prudent to remove that threat immediately.\"": "Моуп в Повусе сказал: \"Шесть дней назад отряд закованных в броню орков попытался пересечь мои грибные поля и срубить мои высокие грибы. Их убили, и теперь их тела служат удобрением. Но я опасаюсь возмездия, ведь орки не склонны отказываться от своих замыслов. Было бы разумно немедленно устранить эту угрозу.\""
"Deliver 10 Cow Boost Potion 20% to Irkima in Red Wing Casino. Reward: 1,603 councils.": "Доставьте 10 зелий усиления коровы 20% Иркиме в казино «Красное Крыло». Награда: 1,603 советов."
"Deliver 10 Crab to Fitz the Boatman on the Serbule docks. Reward: 109 councils.": "Доставьте 10 крабов Фитцу Лодочнику на доки Сербуля. Награда: 109 councils."
"Deliver 10 Crab Meat to Fitz the Boatman on the Serbule docks. Reward: 206 councils.": "Доставьте 10 единиц мяса краба Фитцу Лодочнику на доках Сербуля. Награда: 206 советов."
"Deliver 99 Crab Meat to Sheyna in Rahu. Reward: 4,683 councils.": "Доставьте 99 мяса краба Шейне в Раху. Награда: 4,683 councils."
"Deliver 10 Crab Nigiri to Ogamboe in the Fae Realm. Reward: 2,933 councils.": "Доставьте 10 нигири с крабом Огамбое в Царство фей. Награда: 2,933 councils."
"Deliver 10 Crab Rolls to Laura Neth in Kur Mountains. Reward: 3,324 councils.": "Доставьте 10 крабовых рулетов Лауре Нет в горах Кур. Награда: 3,324 councils."
"Squidlips in Sun Vale said, \"I can make some really good crab gumbo, but I need some crabs! Can you bring me 5 of the suckers?\"": "Сквидлипс в Сан-Вейл сказал: \"Я могу приготовить отличный крабовый суп, но мне нужны крабы! Можешь принести мне 5 этих тварей?\""
"Deliver 10 Crab Sushi Rolls to Ogamboe in the Fae Realm. Reward: 2,764 councils.": "Доставьте 10 роллов с крабовым суши Огамбое в Царство фей. Награда: 2,764 council'ов."
"Paullus in Statehelm said, \"You might have to wait for cranberries to be in season for this one, but it's worth the wait. One cranberry wine, please!\"": "Пауллус в Стейтхельме сказал: \"Возможно, придётся подождать сезона клюквы, чтобы сделать это, но ожидание того стоит. Одно клюквенное вино, пожалуйста!\""
"Deliver 10 Cranberry-Almond Pies to Ogamboe in the Fae Realm. Reward: 14,943 councils.": "Доставьте 10 пирогов с клюквой и миндалём Огамбое в Фейское царство. Награда: 14,943 советов."
"Deliver 10 Cranberry-Barbecue Muttons to Fitz the Boatman on the Serbule docks. Reward: 3,064 councils.": "Доставьте 10 порций баранины в клюквенно-барбекю соусе Фитцу Лодочнику на доки Сербуля. Награда: 3,064 councils."
"Deliver 10 Cranberry-Barbecue Steaks to Irkima in Red Wing Casino. Reward: 7,556 councils.": "Доставьте 10 стейков с клюквенным барбекю Иркиме в казино «Красное Крыло». Награда: 7,556 советов."
"Deliver 10 Cranberry-Glazed \"Meatballs\" to Sheyna in Rahu. Reward: 18,495 councils.": "Доставьте 10 клюквенно-глазированных «Фрикаделек» Шейне в Раху. Награда: 18,495 советов."
"Deliver 10 Cranberry-Turkey Sandwiches to Fitz the Boatman on the Serbule docks. Reward: 2,970 councils.": "Доставьте 10 сэндвичей с клюквой и индейкой Фитцу, лодочнику, на доки Сербуля. Награда: 2,970 councils."
"Echur in Serbule wants you to obtain some Brain Bug Lobes. They can occasionally be found from Brain Bugs.": "Эчур в Сербуле хочет, чтобы вы добыли несколько долей мозга мозгового жука. Иногда их можно найти у мозговых жуков."
"Echur in Serbule wants you to obtain some Willpower Gel. Unfortunately he has no idea what that is. It sounds like a rare Alchemical recipe.": "Эчур в Сербуле хочет, чтобы вы добыли немного геля силы воли. К сожалению, он понятия не имеет, что это такое. Похоже, это редкий алхимический рецепт."
"Echur in Serbule has asked you to obtain a dose of Cranium Powder. He believes you can buy it from Azalak the mantis if you're friendly enough with him.": "Эчур в Сербуле попросил вас раздобыть дозу Черепного порошка. Он считает, что вы сможете купить его у Азалака-богомола, если будете с ним в достаточно хороших отношениях."
"You put down some of the infected beasts, and ran the others off!": "Вы прикончили часть заражённых зверей, а остальных прогнали прочь!"
"Deliver 10 Cream Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,357 councils.": "Доставьте 10 порций сливочного сыра Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 1,357 councils."
"Gretchen in Eltibule complained about a lack of sour cream.": "Гретхен в Эльтибуле жаловалась на нехватку сметаны."
"Deliver 10 Cream of Mushroom Soups to Fitz the Boatman on the Serbule docks. Reward: 1,363 councils.": "Доставьте 10 сливочных грибных супов Фитцу Лодочнику на доки Сербуля. Награда: 1,363 councils."
"Deliver 10 Creamy Squash Casseroles to Irkima in Red Wing Casino. Reward: 3,544 councils.": "Доставьте 10 сливочных запеканок из тыквы Иркиме в казино «Красное Крыло». Награда: 3,544 council'ов."
"Felmer in the Fae Realm said, \"Did you hear about that unfortunate fire-rift that opened south of here? I was thinking... while the Winter Fae portal is also open, that means there's three potent elemental sources here: Fire, Cold, and Nature. You know what that means: party time!\n\nOh, sorry, you don't know what I mean, do you. Well, If you can find three elementals big enough and old enough to drop nice-sounding crystals, I can fashion those crystals into beautiful fairy chimes.\n\nI'm not sure if mortals are capable of playing them... but we could find out!\"": "Фелмер в Фейском царстве сказал: «Ты слышал о том несчастном огненном разломе, что открылся к югу отсюда? Я подумал... пока портал Зимних Фей тоже открыт, это значит, что здесь есть три мощных источника стихий: Огонь, Холод и Природа. Знаешь, что это значит: время вечеринки!\n\nОй, извини, ты, наверное, не понимаешь, что я имею в виду. Если ты сможешь найти трёх элементалей достаточно больших и старых, чтобы они сбросили красивые кристаллы, я смогу сделать из этих кристаллов прекрасные фейские колокольчики.\n\nНе уверен, смогут ли смертные на них играть... но мы можем это проверить!"
"Deliver 10 Crelpin's Corn Dishes to Ogamboe in the Fae Realm. Reward: 9,381 councils.": "Доставьте 10 кукурузных блюд Крелпина Огамбое в Царстве фей. Награда: 9,381 councils."
"Deliver 10 Crelpin's Fish Dishes to Ogamboe in the Fae Realm. Reward: 8,596 councils.": "Доставьте 10 рыбных блюд Крелпина Огамбое в Царстве фей. Награда: 8,596 советов."
"Deliver 10 Crelpin's Fried Dishes to Ogamboe in the Fae Realm. Reward: 6,173 councils.": "Доставьте 10 жареных блюд Крелпина Огамбое в Царстве фей. Награда: 6,173 councils."
"Deliver 10 Crelpin's Fruit Juices to Ogamboe in the Fae Realm. Reward: 8,181 councils.": "Доставьте 10 фруктовых соков Крелпина Огамбое в Царство фей. Награда: 8,181 councils."
"Deliver 10 Crelpin's Fruit Salads to Ogamboe in the Fae Realm. Reward: 10,064 councils.": "Доставьте 10 фруктовых салатов Крелпина Огамбое в Царство фей. Награда: 10,064 советов."
"Deliver 10 Crelpin's Gorps to Ogamboe in the Fae Realm. Reward: 8,744 councils.": "Доставьте 10 горпов Крелпина Огамбое в Мире фей. Награда: 8,744 советов."
"Deliver 10 Crelpin's Side Salads to Ogamboe in the Fae Realm. Reward: 9,802 councils.": "Доставьте 10 гарниров Крелпина Огамбое в Фейское царство. Награда: 9,802 council'ов."
"Deliver 10 Crelpin's Sushis to Ogamboe in the Fae Realm. Reward: 15,483 councils.": "Доставьте 10 суши Крелпина Огамбое в Фейском царстве. Награда: 15,483 councils."
"Deliver 10 Crelpin's Tarts to Ogamboe in the Fae Realm. Reward: 9,674 councils.": "Доставьте 10 пирожных Крелпина Огамбое в Царство фей. Награда: 9,674 советов."
"Sammie Grimspine in Serbule Hills said, \"Some of my calligraphy projects require unusual paper. Right now I've been experimenting with paper made out of watercress! Do you happen to have any? And don't worry about freshness: I'm going to pound it into a paste anyway.\"": "Сэмми Гримспайн в Сербульских холмах сказал: \"Для некоторых моих каллиграфических проектов нужна необычная бумага. Сейчас я экспериментирую с бумагой из водяного кресса! Случайно, у тебя не найдётся немного? И не беспокойся о свежести: я всё равно собираюсь растолочь его в пасту.\""
"Deliver 10 Crimsonfelt Wings to Ogamboe in the Fae Realm. Reward: 8,182 councils.": "Доставьте 10 крыльев багрянцевой войлочницы Огамбое в Царстве фей. Награда: 8,182 советов."
"Jaw the myconian has asked you to deliver sporelings to a storage cave somewhere in the myconian caverns.": "Миконианец Джо попросил вас доставить спорышей в пещеру-хранилище где-то в миконианских пещерах."
"Deliver 10 Crossing Oil to Thimble Pete in Hogan's Keep, Eltibule. Reward: 440 councils.": "Доставьте 10 масла Переправы Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 440 советов."
"Deliver 10 Crude Calligraphy Benches to Viedesi in Sun Vale. Reward: 4,946 councils.": "Доставьте 10 грубых столов для каллиграфии Виедези в Сан-Вейл. Награда: 4,946 councils."
"Deliver 10 Crude Chairs to Viedesi in Sun Vale. Reward: 5,707 councils.": "Доставьте 10 грубых стульев Виедези в Сан-Вейл. Награда: 5,707 советов."
"Deliver 10 Crude Cloth Cowls to Irkima in Red Wing Casino. Reward: 2,091 councils.": "Доставьте 10 грубых тканевых капюшонов Иркиме в казино «Красное Крыло». Награда: 2,091 councils."
"Deliver 10 Crude Cloth Gloves to Irkima in Red Wing Casino. Reward: 2,091 councils.": "Доставьте 10 грубых тканевых перчаток Иркиме в казино «Красное Крыло». Награда: 2,091 councils."
"Deliver 10 Crude Cloth Shirts to Irkima in Red Wing Casino. Reward: 2,285 councils.": "Доставьте 10 грубых тканевых рубашек Иркиме в казино «Красное Крыло». Награда: 2,285 советов."
"Deliver 10 Crude Clubs to Irkima in Red Wing Casino. Reward: 1,679 councils.": "Доставьте 10 грубых дубинок Иркиме в казино «Красное Крыло». Награда: 1,679 советов."
"Deliver 10 Crude Combat Staves to Sheyna in Rahu. Reward: 1,672 councils.": "Доставьте 10 грубых боевых посохов Шейне в Раху. Награда: 1,672 councils."
"Deliver 10 Crude Evasion Shirts to Gremix in Amulna. Reward: 8,609 councils.": "Доставьте 10 грубых рубашек уклонения Гремиксу в Амульне. Награда: 8,609 councils."
"Deliver 10 Crude Leather Helmets to Gremix in Amulna. Reward: 7,956 councils.": "Доставьте 10 грубых кожаных шлемов Гремиксу в Амульну. Награда: 7,956 советов."
"Deliver 10 Crude Leather Rolls to Fitz the Boatman on the Serbule docks. Reward: 918 councils.": "Доставьте 10 грубых рулонов кожи Фитцу Лодочнику на доки Сербуля. Награда: 918 советов."
"Deliver 10 Crude Leather Shirts to Gremix in Amulna. Reward: 8,609 councils.": "Доставьте 10 грубых кожаных рубах Гремиксу в Амульне. Награда: 8,609 councils."
"Deliver 10 Crude Meditation Stools to Viedesi in Sun Vale. Reward: 4,980 councils.": "Доставьте 10 грубых табуретов для медитации Виедези в Сан-Вейл. Награда: 4,980 councils."
"Deliver 10 Crude Melee Staves to Sheyna in Rahu. Reward: 1,033 councils.": "Доставьте 10 грубых боевых посохов Шейне в Раху. Награда: 1,033 советов."
"Deliver 10 Crude Priest Staves to Sheyna in Rahu. Reward: 1,687 councils.": "Доставьте 10 грубых жезлов жреца Шейне в Раху. Награда: 1,687 советов."
"Deliver 10 Crude Spider Casings to Gremix in Amulna. Reward: 7,319 councils.": "Доставьте 10 грубых паучьих панцирей Гремиксу в Амульне. Награда: 7,319 советов."
"Deliver 10 Crude Storage Crates to Viedesi in Sun Vale. Reward: 4,439 councils.": "Доставьте 10 грубых складских ящиков Виедези в Сан-Вейл. Награда: 4,439 councils."
"Deliver 10 Crude Werewolf Bardings to Sheyna in Rahu. Reward: 2,040 councils.": "Доставьте 10 грубых доспехов для вервольфа Шейне в Раху. Награда: 2,040 советов."
"Deliver 10 Crude Werewolf Champrons to Sheyna in Rahu. Reward: 2,040 councils.": "Доставьте 10 грубых поножей оборотня Шейне в Раху. Награда: 2,040 council'ов."
"Deliver 10 Crude Werewolf Foreguards to Sheyna in Rahu. Reward: 2,091 councils.": "Доставьте 10 грубых наручей оборотня Шейне в Раху. Награда: 2,091 council'ов."
"Deliver 10 Crude Werewolf Hind Leg Guards to Sheyna in Rahu. Reward: 1,326 councils.": "Доставьте 10 грубых поножей для задних лап оборотня Шейне в Раху. Награда: 1,326 council'ов."
"Deliver 10 Crude Werewolf Hindguards to Sheyna in Rahu. Reward: 2,006 councils.": "Доставьте 10 грубых задних поножей оборотня Шейне в Раху. Награда: 2,006 советов."
"Ferris Blueheart in Vidaria said, \"Some of the crystals near the wall move. They move! You'll understand when you see them.\n\nPlease see if you can destroy them.\"": "Феррис Блюхарт в Видарии сказал: «Некоторые кристаллы возле стены двигаются. Они двигаются! Ты поймёшь, когда увидишь их.\\n\\nПожалуйста, попробуй уничтожить их."
"Deliver 10 Cups o' Paralysis to Irkima in Red Wing Casino. Reward: 4,093 councils.": "Доставьте 10 Чашек паралича Иркиме в казино «Красное Крыло». Награда: 4,093 councils."
"Deliver 10 Dahlia Bouquets to Sheyna in Rahu. Reward: 6,145 councils.": "Доставьте 10 букетов георгинов Шейне в Раху. Награда: 6,145 советов."
"Deliver 10 Dahlias to Fitz the Boatman on the Serbule docks. Reward: 1,114 councils.": "Доставьте 10 георгинов Фитцу Лодочнику на доки Сербуля. Награда: 1,114 советов."
"Deliver 10 Daisies to Fitz the Boatman on the Serbule docks. Reward: 1,351 councils.": "Доставьте 10 маргариток Фитцу Лодочнику на доки Сербуля. Награда: 1,351 councils."
"Deliver 10 Daisy Bouquets to Sheyna in Rahu. Reward: 7,080 councils.": "Доставьте 10 букетов ромашек Шейне в Раху. Награда: 7,080 советов."
"Sir Arif has asked you to kill the dinosaurs that roam the crypt.": "Сэр Ариф попросил вас убить динозавров, которые бродят по склепу."
"Deliver 10 Danablu Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 18,115 councils.": "Доставьте 10 сыров Данаблю Тимблу Питу в крепость Хогана, Эльтибуль. Награда: 18,115 советов."
"Deliver 10 Danburites to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 данбуритов Шейне в Раху. Награда: 4,930 советов."
"Deliver 10 Dandelion Bouquets to Korbok in Vidaria. Reward: 22,444 councils.": "Доставьте 10 букетов одуванчиков Корбоку в Видарию. Награда: 22,444 councils."
"Deliver 10 Dandelions to Ogamboe in the Fae Realm. Reward: 13,267 councils.": "Доставьте 10 одуванчиков Огамбое в Мире фей. Награда: 13,267 советов."
"Deliver 10 Dangerous Poisoned Knives to Viedesi in Sun Vale. Reward: 1,192 councils.": "Доставьте 10 опасных отравленных ножей Виедези в Сан-Вейл. Награда: 1,192 council'ов."
"Crelpin in the Fae Realm said, \"This land is just <i>infested</i> with spriggan weeds! I think the pixies plant them or something. They spend the days gathering sun, but at night they hunt for meat! There's a bunch growing south of town, and if you think about it, it'd be really irresponsible for you to NOT kill those pests.\"": "Крелпин в Царстве фей сказал: \"Эта земля просто <i>кишит</i> сорняками-спригганами! Думаю, их сажают пикси или вроде того. Днём они собирают солнечный свет, а ночью охотятся за мясом! К югу от города растёт целая куча, и если подумать, с твоей стороны было бы крайне безответственно НЕ убить этих вредителей.\""
"Ragabir in Red Wing Casino said, \"Qatik told me there's a set of secret tunnels underneath Eltibule and they're full of magical darkness! I need it! I NEED IT! Get the magical darkness for me! It shouldn't be hard to find: just look for the source of the darkness, kill it, take some darkness, done. So easy even you can do it.\"": "Рагабир в казино «Красное Крыло» сказал: \"Катик сказал мне, что под Эльтибулем есть сеть тайных туннелей, и они полны магической тьмы! Она мне нужна! МНЕ ОНА НУЖНА! Добудь для меня магическую тьму! Найти её не должно быть трудно: просто найди источник тьмы, убей его, возьми немного тьмы — и готово. Так просто, что даже ты справишься.\""
"Elune in Statehelm said, \"I heard a rumor that's just too stupid to NOT be true. Apparently a rabbit <i>covered in jewelry</i> was seen hopping into a sewer pipe outside of town. It seems to live down there.\n\nIt's got to be one of those dreadful talking pets that wizards love so much. They never mind their pets at all, and now this one's taken to a life of crime! Take care of the matter for me, won't you?\"": "Элун в Стейтхелме сказал: «Я слышал слух, который слишком глуп, чтобы не быть правдой. Якобы кролика <i>покрытого украшениями</i> видели, как он прыгал в канализационную трубу за городом. Похоже, он живёт там.\\n\\nЭто должно быть одно из тех ужасных говорящих питомцев, которые так нравятся волшебникам. Они никогда не заботятся о своих питомцах, а теперь этот занялся преступной жизнью! Позаботься об этом для меня, хорошо?"
"Deliver 10 Deadly Poisoned Knives to Viedesi in Sun Vale. Reward: 2,445 councils.": "Доставьте 10 смертоносных отравленных ножей Виедези в Сан-Вейл. Награда: 2,445 councils."
"Mox Warcut in New Prestonbule said, \"I need a sample of the Vol's Kiss that can be found in Gazluk. Can you get it for me? It's a yellow crystal that's warm to the touch. You can find it all over the mountainside.\n\nBut listen VERY carefully: carrying it will make you sick. So get the ore and then <i>run</i> back here to me as quick as you can. Don't dally! I only need three pieces, so don't get any more than that.\"": "Мокс Варкат в Новом Престонбуле сказал: «Мне нужен образец Поцелуя Вола, который можно найти в Газлуке. Ты можешь добыть его для меня? Это жёлтый кристалл, тёплый на ощупь. Его можно найти повсюду на склоне горы.\\n\\nНо слушай ОЧЕНЬ внимательно: ношение его вызовет у тебя болезнь. Поэтому добывай руду и затем <i>беги</i> сюда ко мне как можно быстрее. Не задерживайся! Мне нужно всего три кусочка, так что не бери больше."
"Zazzamath in The Rubywall in Vidaria said, \"You got a little taste of destroying life, and now you're back for more, are you? Maybe you have some demon in you, have you ever considered that? Heh heh heh heh... Well then go! Kill more things! MANY more things! When we're through, this whole rock will be barren!\"": "Заззамат в Рубиновой стене в Видарии сказал: \"Ты уже немного распробовал уничтожение жизни, и теперь вернулся за добавкой, да? Может, в тебе есть что-то от демона, ты когда-нибудь об этом задумывался? Хе-хе-хе-хе... Ну тогда иди! Убей ещё больше существ! ГОРАЗДО больше существ! Когда мы закончим, весь этот камень станет бесплодным!\""
"Deliver 10 Decent Calligraphy Benches to Viedesi in Sun Vale. Reward: 12,753 councils.": "Доставьте 10 неплохих столов для каллиграфии Виедези в Сан-Вейл. Награда: 12,753 council'ов."
"Deliver 10 Decent Chairs to Viedesi in Sun Vale. Reward: 8,001 councils.": "Доставьте 10 добротных стульев Виедези в Сан-Вейл. Награда: 8,001 council'ов."
"Deliver 10 Decent Cloth Cowls to Irkima in Red Wing Casino. Reward: 12,436 councils.": "Доставьте 10 неплохих тканевых капюшонов Иркиме в казино «Красное Крыло». Награда: 12,436 советов."
"Deliver 10 Decent Cloth Gloves to Irkima in Red Wing Casino. Reward: 12,436 councils.": "Доставьте 10 неплохих тканевых перчаток Иркиме в казино «Красное Крыло». Награда: 12,436 councils."
"Deliver 10 Decent Cloth Shirts to Irkima in Red Wing Casino. Reward: 11,227 councils.": "Доставьте 10 неплохих тканевых рубашек Иркиме в казино «Красное Крыло». Награда: 11,227 councils."
"Deliver 10 Decent Clubs to Irkima in Red Wing Casino. Reward: 12,436 councils.": "Доставьте 10 неплохих дубинок Иркиме в казино «Красное Крыло». Награда: 12,436 советов."
"Deliver 10 Decent Combat Staves to Sheyna in Rahu. Reward: 12,342 councils.": "Доставьте 10 неплохих боевых посохов Шейне в Раху. Награда: 12,342 councils."
"Deliver 10 Decent Cow Champrons to Sheyna in Rahu. Reward: 11,875 councils.": "Доставьте 10 неплохих коровьих шампиньонов Шейне в Раху. Награда: 11,875 советов."
"Deliver 10 Decent Evasion Shirts to Gremix in Amulna. Reward: 11,227 councils.": "Доставьте 10 неплохих рубашек уклонения Гремиксу в Амульне. Награда: 11,227 советов."
"Deliver 10 Decent Leather Helmets to Gremix in Amulna. Reward: 10,166 councils.": "Доставьте 10 неплохих кожаных шлемов Гремиксу в Амульне. Награда: 10,166 советов."
"Deliver 10 Decent Leather Rolls to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,395 councils.": "Доставьте 10 неплохих рулонов кожи Напёрстку Питу в крепости Хогана, Эльтибуль. Награда: 1,395 council'ов."
"Deliver 10 Decent Leather Shirts to Gremix in Amulna. Reward: 11,227 councils.": "Доставьте 10 добротных кожаных рубах Гремиксу в Амульне. Награда: 11,227 советов."
"Deliver 10 Decent Meditation Stools to Viedesi in Sun Vale. Reward: 9,822 councils.": "Доставьте 10 неплохих табуретов для медитации Виедези в Сан-Вейл. Награда: 9,822 councils."
"Deliver 10 Decent Melee Staves to Sheyna in Rahu. Reward: 12,155 councils.": "Доставьте 10 неплохих боевых посохов Шейне в Раху. Награда: 12,155 советов."
"Deliver 10 Decent Priest Staves to Sheyna in Rahu. Reward: 12,529 councils.": "Доставьте 10 неплохих жреческих посохов Шейне в Раху. Награда: 12,529 советов."
"Deliver 10 Decent Snail Coats to Gremix in Amulna. Reward: 11,227 councils.": "Доставьте 10 неплохих панцирей улиток Гремиксу в Амульне. Награда: 11,227 советов."
"Deliver 10 Decent Snail Gauntlets to Gremix in Amulna. Reward: 10,166 councils.": "Доставьте 10 неплохих перчаток улитки Гремиксу в Амульне. Награда: 10,166 советов."
"Deliver 10 Decent Spider Casings to Gremix in Amulna. Reward: 17,680 councils.": "Доставьте 10 неплохих паучьих панцирей Гремиксу в Амульне. Награда: 17,680 советов."
"Deliver 10 Decent Storage Crates to Viedesi in Sun Vale. Reward: 9,583 councils.": "Доставьте 10 добротных ящиков для хранения Виедези в Сан-Вейл. Награда: 9,583 councils."
"Deliver 10 Decent Werewolf Bardings to Sheyna in Rahu. Reward: 12,155 councils.": "Доставьте 10 неплохих доспехов для оборотня Шейне в Раху. Награда: 12,155 советов."
"Deliver 10 Decent Werewolf Champrons to Sheyna in Rahu. Reward: 12,155 councils.": "Доставьте 10 неплохих шампиньонов оборотня Шейне в Раху. Награда: 12,155 советов."
"Deliver 10 Decent Werewolf Foreguards to Sheyna in Rahu. Reward: 12,436 councils.": "Доставьте 10 неплохих наручей вервольфа Шейне в Раху. Награда: 12,436 советов."
"Deliver 10 Decent Werewolf Hind Leg Guards to Sheyna in Rahu. Reward: 11,875 councils.": "Доставьте 10 неплохих защитных щитков для задних лап оборотня Шейне в Раху. Награда: 11,875 советов."
"Deliver 10 Decent Werewolf Hindguards to Sheyna in Rahu. Reward: 11,968 councils.": "Доставьте 10 неплохих задних поножей оборотня Шейне в Раху. Награда: 11,968 советов."
"Deliver 10 Decent Winter Coats to Gremix in Amulna. Reward: 11,227 councils.": "Доставьте 10 добротных зимних пальто Гремиксу в Амульне. Награда: 11,227 советов."
"Truxartis in Vidaria said, \"Khyrulek's notes are precious. We must break the... code.\n\nNo matter, I'm sure that I can...trivially...decipher this script.\n\nGo, bloodling. Find me the usual tools for...such a task.\"": "Труксартис в Видарии сказал: «Записи Хирулека бесценны. Мы должны взломать... код.\\n\\nНеважно, я уверен, что смогу... без труда... расшифровать этот текст.\\n\\nИди, кровосос, найди мне обычные инструменты для... такой задачи."
"Deliver 10 Deer Boost Potion 20% to Irkima in Red Wing Casino. Reward: 8,358 councils.": "Доставьте 10 зелий усиления оленя 20% Иркиме в казино «Красное Крыло». Награда: 8,358 советов."
"Deliver 10 Deer Guts to Fitz the Boatman on the Serbule docks. Reward: 294 councils.": "Доставьте 10 оленьих потрохов Фитцу Лодочнику на доки Сербуля. Награда: 294 councils."
"Sir Arif has asked for some venison.": "Сэр Ариф попросил немного оленины."
"Sanja in the Kur Mountains asked you to bring her some raw venison.": "Санья в горах Кур попросила вас принести ей немного сырой оленины."
"Jace Soral has asked you to defeat a hugely powerful werewolf named Bleddyn, somewhere in the forested part of the Kur Mountains. He mentioned that you'd need allies to do it. He also mentioned that silver weapons are extra effective against him.": "Джейс Сорал попросил вас победить чрезвычайно могущественного оборотня по имени Бледдин где-то в лесистой части гор Кур. Он упомянул, что для этого вам понадобятся союзники. Он также сказал, что серебряное оружие особенно эффективно против него."
"Use the wolf whistle at the teleportation platform in the forest South of Serbule, then defeat the mystical wolf pack that appears. It will be a difficult fight! Use cunning!": "Используйте волчий свисток на платформе телепортации в лесу к югу от Сербуля, затем победите появившуюся мистическую волчью стаю. Это будет трудный бой! Проявите хитрость!"
"Deliver 10 Deinonychus Claws to Irkima in Red Wing Casino. Reward: 608 councils.": "Доставьте 10 когтей дейнониха Иркиме в казино «Красное Крыло». Награда: 608 советов."
"Deliver 10 Delicate Tack Hammers to Sheyna in Rahu. Reward: 8,026 councils.": "Доставьте 10 тонких обивочных молотков Шейне в Раху. Награда: 8,026 советов."
"Deliver 10 Delicious Ratkin Aparatifs to Ogamboe in the Fae Realm. Reward: 34,040 councils.": "Доставьте 10 восхитительных апаратифов крысолюдов Огамбое в Фейское царство. Награда: 34,040 советов."
"Sam Veilmoor in Statehelm said, \"Here: it's finished. This amulet only works for those of Veilmoor blood. For us, it will protect against death itself! Once. Plus, I've altered this one so that I can track where it is, in case she gets kidnapped. That was quite an expensive ritual, too.\n\nTell her none of that. Just deliver it to her. Helena will know what it is and what it means.\"": "Сэм Вейлмур в Стейтхелме сказал: «Вот, готово. Этот амулет действует только для тех, у кого кровь Вейлмуров. Для нас он защитит от самой смерти! Один раз. Кроме того, я изменил этот амулет так, чтобы я мог отслеживать его местоположение, если её похитят. Это был довольно дорогой ритуал.\\n\\nНикому об этом не говори. Просто передай ей. Хелена поймёт, что это и что это значит."
"Kalaba in Eltibule said, \"I have another delivery of phlogiston for my buyer in the Ilmari desert, but I don't have time to go all that way. I know it's dangerous, but I believe in you: you're sturdy enough to go in my place!\n\nTake this to Makara. She's in the northeast part of the Ilmari desert. She's living in a ruined building with a red-and-white striped tarp for a roof.\n\nAnd listen to me carefully: when I go to the desert, I always travel with Kleave or at least Oritania. I'm sturdy, but I'm not stupid! The desert is way more dangerous than here. You can still do this, though. Discretion can be sturdy! Avoid confrontation!\n\nOh, how do you get to Ilmari? It's just past the Kur Mountains to the north. You, uh, might need to bring some warm-weather gear for that part of the trip...\"": "Калаба в Элтибуле сказала: «У меня есть ещё одна партия флогистона для моего покупателя в пустыне Илмари, но у меня нет времени ехать так далеко. Я знаю, что это опасно, но верю в тебя: ты достаточно вынослив, чтобы пойти вместо меня!\\n\\nОтнеси это Макаре. Она находится в северо-восточной части пустыни Илмари. Она живёт в разрушенном здании с крышей из красно-белой полосатой брезентовой ткани.\\n\\nИ слушай меня внимательно: когда я еду в пустыню, я всегда путешествую с Кливом или хотя бы с Оританией. Я вынослива, но не глупа! Пустыня намного опаснее, чем здесь. Но ты всё равно можешь справиться. Осторожность — тоже сила! Избегай столкновений!\\n\\nО, как добраться до Илмари? Это сразу за горами Кур на севере. Тебе, эм, возможно, понадобится тёплая одежда для этой части пути..."
"Ormond Neth in Statehelm said, \"I need your discretion. I cannot be seen talking to my father right now. It would draw attention. Can you deliver this note to him for me? To find my father, follow the bread smell -- he works at the only remaining bakery in Statehelm.\"": "Ормонд Нет в Стейтхельме сказал: \"Мне нужна ваша осмотрительность. Сейчас меня не должны видеть за разговором с моим отцом. Это привлечёт внимание. Не могли бы вы доставить ему эту записку вместо меня? Чтобы найти моего отца, идите на запах хлеба — он работает в единственной оставшейся пекарне Стейтхельма.\""
"Ailred in Povus said, \"Oh, waiter, finally! Yes, I want to know what makes your beetle skewer a \"Deluxe\" bettle skewer? Oh, don't tell me, I want to be surprised!\"": "Эйлред в Повусе сказал: \"О, официант, наконец-то! Да, я хочу узнать, что делает ваш жук на шампуре \"Роскошным\" жуком на шампуре? О, не говорите мне, я хочу, чтобы это стало сюрпризом!\""
"Deliver 10 Deluxe Beetle Skewers to Ogamboe in the Fae Realm. Reward: 5,345 councils.": "Доставьте 10 изысканных шашлычков из жуков Огамбое в Королевстве фей. Награда: 5,345 councils."
"Farsight Flemmings in Statehelm said, \"Here's an order for pieces of bugs. Wait, aren't aktaari those man-sized bugs? ... Good luck with this one.\"": "Фарсайт Флеммингс в Стейтхельме сказал: \"Вот заказ на кусочки жуков. Постой, разве актаари — это не жуки размером с человека? ... Удачи с этим.\""
"Deliver 10 Deluxe Casino Kabobs to Irkima in Red Wing Casino. Reward: 4,662 councils.": "Доставьте 10 роскошных казино-кебабов Иркиме в казино «Красное Крыло». Награда: 4,662 councils."
"Ormond Neth in Statehelm said, \"You've got the basics. Let's get to specifics. You need to know how to blast apart a demon! So go do that. Do it for quite a while and take note of what works and what doesn't. I'll give you a quiz afterwards.\"": "Ормонд Нет в Стейтхелме сказал: \"Основы вы уже знаете. Теперь перейдём к деталям. Вам нужно узнать, как разнести демона на куски! Так что идите и займитесь этим. Делайте это довольно долго и отмечайте, что работает, а что нет. Потом я устрою вам проверку.\""
"Guzor Harrison in Statehelm said, \"Next I need to better understand how demons are so resistant to fire. Go and kill some of the medium-sized ones.\n\nOh, and wear this. It will automatically take detailed field notes.\n\n<i>[To advance this quest you must be wearing the Fire Analysis Gem and using Fire Magic.]</i>\"": "Гузор Харрисон в Стейтхельме сказал: «Далее мне нужно лучше понять, почему демоны так устойчивы к огню. Отправляйся и убей несколько средних по размеру демонов.\\n\\nО, и надень это. Оно автоматически будет вести подробные полевые заметки.\\n\\n<i>[Чтобы продвинуть этот квест, ты должен носить Самоцвет Огненного Анализа и использовать Огненную магию.]</i>"
"Ser Lorentz in Vidaria said, \"I guess you're ready to move up to tougher demons. The soldiers are next. They're tough, but the scariest part is their disease. Or maybe it's a curse, I dunno. I'm no sage! Anyway, they spread Hellfire sickness. I can give you some balm for afterwards, but... try your best not to get too much hellfire on you. It saps your life away. To me, it's the scariest thing on this battlefield. Fight smart.\"": "Сэр Лоренц в Видарии сказал: \"Полагаю, ты готов перейти к более опасным демонам. Следующие — солдаты. Они крепкие, но самое страшное в них — их болезнь. А может, это проклятие, не знаю. Я не мудрец! В любом случае, они разносят адский жар. Я могу дать тебе немного бальзама на потом, но... постарайся, чтобы на тебя попало не слишком много адского жара. Он высасывает из тебя жизнь. По мне, это самое страшное на этом поле боя. Сражайся с умом.\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Animals. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных животных. Можешь мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Behemoths. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Бегемотов. Можешь мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Justiciars. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных юстициаров. Ты можешь мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Lesser Behemoths. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Младших Бегемотов. Не могли бы вы мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Overseers. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Надзирателей. Не могли бы вы мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Scouts. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных разведчиков. Ты можешь мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Soldiers. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных Солдат. Можешь мне помочь?\""
"Ferris Blueheart in Vidaria said, \"My current research on the demonic threat is stalled. To continue it, I need to perform some biological sampling of the infernal Swarmers. Can you help me out?\"": "Феррис Блюхарт в Видарии сказал: \"Моё текущее исследование демонической угрозы застопорилось. Чтобы продолжить его, мне нужно провести биологический отбор образцов у инфернальных сборщиков роя. Не могли бы вы мне помочь?\""
"Liamu the Watchful in Vidaria said, \"This land is infested with problematic demons, and I cannot get close enough to the wall to achieve my goals. If you help me, I shall be very grateful.\n\nThe first thing I need is quite simple: just get a sample of every kind of gem or crystal that can be found when mining the crystals near the demons.\"": "Лиаму Наблюдательный в Видарии сказал: «Эта земля заражена проблемными демонами, и я не могу подойти достаточно близко к стене, чтобы достичь своих целей. Если ты поможешь мне, я буду очень благодарен.\n\nПервое, что мне нужно, довольно просто: просто возьми образец каждого вида драгоценных камней или кристаллов, которые можно найти при добыче кристаллов рядом с демонами."
"Deliver 10 Desert Rose Bouquets to Sheyna in Rahu. Reward: 19,983 councils.": "Доставьте 10 букетов пустынных роз Шейне в Раху. Награда: 19,983 council'ов."
"Deliver 10 Desert Roses to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,893 councils.": "Доставьте 10 пустынных роз Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 3,893 советов."
"Deliver 10 Desert Teas to Laura Neth in Kur Mountains. Reward: 5,248 councils.": "Доставьте 10 пустынных чаёв Лауре Нет в горах Кур. Награда: 5,248 советов."
"Deliver 10 Diamonds to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 алмазов Шейне в Раху. Награда: 4,930 советов."
"In a cave deep beneath Povus, you found a weird stuffed rabbit toy which talked to you. When you moved some dice, it seemed happy and gave you a temporary buff. It mentioned some siblings... perhaps making all the siblings happy would be a kind thing to do.": "В пещере глубоко под Повусом вы нашли странную набивную игрушку-кролика, которая заговорила с вами. Когда вы передвинули несколько костей, она, похоже, обрадовалась и дала вам временный эффект усиления. Она упомянула каких-то братьев и сестёр... возможно, было бы добрым делом сделать счастливыми их всех."
"Deliver 10 Diet Lunches to Irkima in Red Wing Casino. Reward: 5,449 councils.": "Доставьте 10 диетических обедов Иркиме в казино «Красное Крыло». Награда: 5,449 советов."
"Azalak the mantis asked you to create a dish of Venison Psi-Mantis Style. He intends to use it to woo Zeratak.": "Богомол Азалак попросил вас приготовить блюдо «Оленина в стиле пси-богомолов». Он собирается использовать его, чтобы очаровать Зератака."
"Deliver 10 Dinobites to Ogamboe in the Fae Realm. Reward: 7,752 councils.": "Доставьте 10 Динобайтов Огамбое в Царство фей. Награда: 7,752 советов."
"Therese has asked for some dinosaur scales. She thinks there are dinosaurs living deep in the crypt beneath Serbule.": "Тереза попросила немного чешуи динозавров. Она думает, что в глубине склепа под Сербулем живут динозавры."
"Deliver 10 Dirt Shield Potions to Fitz the Boatman on the Serbule docks. Reward: 2,089 councils.": "Доставьте 10 зелий Земляного щита Фитцу Лодочнику на доки Сербуля. Награда: 2,089 councils."
"Ragabir in Red Wing Casino said, \"Damn it all, I'm out of my secret ingredient! I need run-off water from stones in Kur. It's used in all my best potions! I'll pay well for it!\"": "Рагабир в казино \"Красное Крыло\" сказал: \"Чёрт побери, у меня закончился мой секретный ингредиент! Мне нужна стекающая со скал вода из Кура. Она используется во всех моих лучших зельях! Я хорошо за неё заплачу!\""
"Deliver 10 Disappointing Corn Surprises to Ogamboe in the Fae Realm. Reward: 6,283 councils.": "Доставьте 10 разочаровывающих кукурузных сюрпризов Огамбое в Царстве фей. Награда: 6,283 council'ов."
"Mittens in Kur Mountains asked for some agates. She is trying to make gray dye to disguise Fox Outpost better.": "Миттенс в горах Кур попросила немного агатов. Она пытается сделать серую краску, чтобы лучше замаскировать аванпост Лис."
"Mittens in Kur Mountains asked for some lac to help make paint. She says that it can be found on giant insects, including Tor-Uraks.": "Миттенс в горах Кур попросила немного лакового сока для изготовления краски. Она говорит, что его можно найти на гигантских насекомых, включая Тор-Ураков."
"Deliver 10 Dishing Hammers to Sheyna in Rahu. Reward: 2,133 councils.": "Доставьте 10 выколоточных молотков Шейне в Раху. Награда: 2,133 council'ов."
"Sem the Myconian (in a cave in New Prestonbule) said, \"It is atypical for members of my species to desire the destruction of meatlings. However, the snails in this cavern are of egregious proportions and they enjoy consuming many of the same food sources that I do. They also enjoy consuming me directly. For this reason, I request their dissolution.\"": "Сем Миконианец (в пещере в Нью-Престонбуле) сказал: \"Для представителей моего вида нетипично желать уничтожения мясных существ. Однако улитки в этой пещере достигли вопиющих размеров и любят пожирать многие из тех же источников пищи, что и я. А ещё они не прочь сожрать и меня самого. По этой причине я прошу об их растворении.\""
"Baroness Marith Felgard in Serbule Hills said, \"The goblins are keeping the ranalon very focused on their west flank. The eastern flank, the one facing us, has only a handful of guards. If we attack it, they'll have to split their forces up more, giving the goblins a better chance to take them out for us.\n\nFocus on the guards at the outpost down the road. That will get their attention. I will pay you 350 Councils if you kill six of them.\"": "Баронесса Марит Фелгард в Сербульских холмах сказала: «Гоблины заставляют раналонов очень внимательно следить за их западным флангом. Восточный фланг, тот, что обращён к нам, охраняют всего несколько стражей. Если мы атакуем его, им придётся разделить свои силы, что даст гоблинам больше шансов уничтожить их для нас.\n\nСосредоточься на стражах на заставе по дороге. Это привлечёт их внимание. Я заплачу тебе 350 Каунсилов, если ты убьёшь шестерых из них."
"Deliver 10 Dock Cod Fillets to Viedesi in Sun Vale. Reward: 1,875 councils.": "Доставьте 10 филе трески с причала Виедеси в Солнечную Долину. Награда: 1,875 советов."
"Deliver 99 Dock Cod Fillets to Sheyna in Rahu. Reward: 34,070 councils.": "Доставьте 99 филе докской трески Шейне в Раху. Награда: 34,070 советов."
"Irkima in Red Wing Casino said, \"I'm feeling a little foolish about this, but could I trouble you to go back where you were and get me a fresh phoenix egg? I know I should have asked you before, but I completely forgot about it. I mix the egg with the feed for sickly pigeons to aid in healing.\nI have asked to speak with the Queen about your request, and will let her know of your extra effort to aid me.\"": "Иркима в казино Красное Крыло сказала: «Мне немного неловко из-за этого, но не мог бы ты вернуться туда, где был, и принести мне свежее яйцо феникса? Я знаю, что должна была попросить тебя раньше, но совсем забыла об этом. Я смешиваю яйцо с кормом для больных голубей, чтобы помочь им выздороветь.\\nЯ попросила поговорить с Королевой о твоей просьбе и сообщу ей о твоих дополнительных усилиях, чтобы помочь мне."
"Steven Poplar in Statehelm said, \"It's that time again: time to ask for help paying the rent for over fifty would-be homeless people! We've promised to pay their rent until they're able to pay it themselves, and we need your help to do that!\n\nFor tax-clarity purposes, I would appreciate any donation be in the form of Council Certificates.\"": "Стивен Поплар в Стейтхелме сказал: «Настало то время снова: время просить помощи в оплате аренды для более чем пятидесяти потенциально бездомных! Мы обещали оплачивать их аренду, пока они не смогут платить сами, и нам нужна твоя помощь в этом!\\n\\nДля налоговой прозрачности я был бы признателен, если бы любые пожертвования были в форме сертификатов Совета."
"Deliver 10 Dorado Fillets to Viedesi in Sun Vale. Reward: 1,875 councils.": "Доставьте 10 филе дорадо Виедеси в Солнечную Долину. Награда: 1 875 советов."
"Deliver 99 Dorado Fillets to Sheyna in Rahu. Reward: 34,070 councils.": "Доставьте 99 филе дорадо Шейне в Раху. Награда: 34,070 советов."
"You repelled the spontaneous ranalon invasion of Statehlm!": "Вы отразили внезапное вторжение раналонов в Стейтхельм!"
"Deliver 10 Dried Cave Fish to Sheyna in Rahu. Reward: 1,945 councils.": "Доставьте 10 сушёных пещерных рыб Шейне в Раху. Награда: 1,945 councils."
"Deliver 10 Dried Clownfish to Sheyna in Rahu. Reward: 656 councils.": "Доставьте 10 сушёных рыб-клоунов Шейне в Раху. Награда: 656 каунсилов."
"Deliver 10 Dried Cranberries to Fitz the Boatman on the Serbule docks. Reward: 2,482 councils.": "Доставьте 10 сушёных клюквин Фитцу Лодочнику на доки Сербуля. Награда: 2,482 councils."
"Deliver 10 Dried Grapefish to Sheyna in Rahu. Reward: 1,181 councils.": "Доставьте 10 сушёных грейпфишей Шейне в Раху. Награда: 1,181 councils."
"Deliver 10 Dried Perch to Sheyna in Rahu. Reward: 2,858 councils.": "Доставьте 10 сушёных окуней Шейне в Раху. Награда: 2,858 council'ов."
"Truxartis in Vidaria said, \"The final ingredient I need to recover my mental powers is... an ancient pineal gland. I know where you can find exactly... What I need. Search for a Tuvillic Rune in Povus. I believe it is somewhere along the outer wall.\"": "Труксартис в Видарии сказал: \"Последний ингредиент, который мне нужен, чтобы восстановить мои умственные способности, — это... древняя шишковидная железа. Я знаю, где ты можешь найти именно... то, что мне нужно. Поищи тувиллическую руну в Повусе. Думаю, она где-то вдоль внешней стены.\""
"Deliver 10 Druid Boost Potion 20% to Irkima in Red Wing Casino. Reward: 1,533 councils.": "Доставьте 10 зелий усиления друида 20% Иркиме в казино «Красное Крыло». Награда: 1,533 советов."
"Relics from a long-finished war arise in the sands of the Ilmari Desert. These 'overseers' are remnants of a demonic army. They will communicate with their demon masters and convey the state of our world to outsiders. Druids, slay these creatures quickly! Every moment they exist puts our world in further peril.\n\nTheir otherworldly defenses would prove too much even for your powers, so I have augmented your 'Rotskin' ability. Use it to cut through their preliminary shielding.": "Реликвии давно завершённой войны восстают из песков пустыни Илмари. Эти «надзиратели» — остатки демонической армии. Они будут связываться со своими демоническими хозяевами и передавать состояние нашего мира посторонним. Друиды, быстро уничтожьте этих существ! Каждая минута их существования ставит наш мир под ещё большую угрозу.\\n\\nИх потусторонняя защита была бы слишком сильна даже для ваших сил, поэтому я усилил вашу способность «Гнилошкур» (Rotskin). Используйте её, чтобы прорваться через их предварительный щит."
"The troubled valleys of Eltibule are even more dangerous than they should be. Droaches have leaked out of the dark places in the ground to cause mayhem to the surface ecologies. Druids, go now and make it right.\n\nFire droaches flow from the dwarven statues and congregate near the central keep. Defeat them to lure out the more calculating electric droaches, and then defeat those as well.": "Беспокойные долины Элтибула стали ещё опаснее, чем должны быть. Дроачи вырвались из тёмных подземелий и сеют хаос в поверхностных экосистемах. Друиды, отправляйтесь сейчас и исправьте это.\\n\\nОгненные дроачи исходят от гномьих статуй и собираются возле центральной крепости. Победите их, чтобы выманить более хитрых электрических дроачей, а затем уничтожьте и их."
"Druids, head to Serbule Hills! Ranalons there have begun a ritual invocation of Enoyos, beseeching him to turn all the lakes of Serbule into brackish water.\n\nTheir stone offering-boxes surround the lake. Desecrate these boxes to disrupt the ritual, then find and slay the head shamans that swim in the lake itself.\n\nThe offering-boxes are strongly enchanted, so multiple druids will need to desecrate each one. Since the desecration ritual requires the petals of the rare Rotflower, I have caused this flower to bloom throughout the hills and mountains of Serbule Hills.\n\nFind the Rotflowers, desecrate the offering chests, then execute the shamans.": "Друиды, направляйтесь в холмы Сербуль! Раналоны там начали ритуальное призывание Энойоса, умоляя его превратить все озёра Сербуля в солоноватую воду.\n\nИх каменные жертвенные ящики окружают озеро. Оскверните эти ящики, чтобы сорвать ритуал, затем найдите и убейте главных шаманов, которые плавают в самом озере.\n\nЖертвенные ящики сильно зачарованы, поэтому несколько друидов должны осквернить каждый из них. Поскольку ритуал осквернения требует лепестков редкого Гнилотцвета, я вызвал цветение этого цветка по всему Сербульскому холмам и горам.\n\nНайдите Гнилотцветы, оскверните жертвенные сундуки, затем уничтожьте шаманов."
"Hark druids, in a cold and distant land named Kur, a dangerous enemy plots and schemes. You need not deal with this foe directly, but you must stymie her plans before they come to fruition.\n\nFrom the frozen waters come many giant ice elementals, each as strong as ten soldiers. Dismantle them.\n\nNature is, as always, your ally, so you should have little fear of the icy winds while my blessing is upon you. Now go!": "Слушайте, друиды, в холодной и далёкой земле по имени Кур опасный враг плетёт заговоры и интриги. Вам не нужно сражаться с этим противником напрямую, но вы должны помешать её планам, прежде чем они осуществятся.\n\nИз замёрзших вод выходят множество гигантских ледяных элементалей, каждый силён, как десять солдат. Уничтожьте их.\n\nПрирода, как всегда, ваш союзник, так что вам не стоит бояться ледяных ветров, пока моё благословение с вами. Вперёд!"
"Druids, assemble in Serbule immediately. Multiple kraken eggs have been spotted there, along with several young adults. Krakens are not indigenous to this continent and represent a terrible threat to nature. Defeat them now, before they become the size of cities!": "Друиды, немедленно собирайтесь в Сербуле. Там было замечено несколько яиц кракенов, а также несколько молодых особей. Кракены не являются коренными обитателями этого континента и представляют ужасную угрозу для природы. Победите их сейчас, пока они не стали размером с города!"
"Percussa in Rahu said, \"I like to make my own drums so I can get exactly the sound i need. My newest drum needs to have a perfect resonance, and for that, I need really great animal skin! Don't tan it -- I know it'll stink, but bring me the untanned hide. I need to process it myself in a special way. I'll pay you for the work!\"": "Перкусса в Раху сказала: \"Мне нравится делать собственные барабаны, чтобы добиваться именно того звучания, которое мне нужно. Для моего нового барабана нужен идеальный резонанс, а для этого мне нужна по-настоящему отличная звериная шкура! Не дубите её — я знаю, что она будет вонять, но принесите мне недублёную шкуру. Мне нужно самой обработать её особым способом. Я заплачу вам за работу!\""
"Sir Brooker in Statehelm said, \"We've got two raw new recruits today. You think you're good with a sword, why not show them how it's done? Take apart one of these training dummies with a sword.\n\n<i>[You must have the Sword skill active to advance this quest.]</i>\"": "Сэр Брукер в Стейтхелме сказал: «Сегодня у нас два совсем новичка. Думаешь, ты хорошо обращаешься с мечом? Почему бы не показать им, как это делается? Разбей одного из этих тренировочных манекенов мечом.\\n\\n<i>[Для выполнения этого задания у тебя должен быть активен навык Меч.]</i>"
"Sir Brooker in Statehelm said, \"That was impressive with the sword. But can you destroy a dummy WITHOUT a sword? Let's see your versatility!\n\n<i>[You must NOT have the Sword skill active to advance this quest.]</i>\"": "Сэр Брукер в Стейтхелме сказал: «Это было впечатляюще с мечом. Но сможешь ли ты уничтожить манекен БЕЗ меча? Покажи свою универсальность!\\n\\n<i>[У тебя НЕ должен быть активен навык Меч, чтобы продвинуть этот квест.]</i>"
"Sir Brooker in Statehelm said, \"Okay, I think you've proven yourself. But here's one more challenge that's just for fun. Can you take out a dummy with a shield and your fists?\n\n<i>[You must have the Shield and Unarmed skills active to advance this quest.]</i>\"": "Сэр Брукер в Стейтхелме сказал: «Хорошо, я думаю, ты доказал свою состоятельность. Но вот ещё одно испытание просто для удовольствия. Сможешь ли ты уничтожить манекен с щитом и своими кулаками?\\n\\n<i>[Для выполнения этого задания у тебя должны быть активны навыки Щит и Бой без оружия.]</i>"
"Deliver 10 Durstin's Minty Lamb Chops to Fitz the Boatman on the Serbule docks. Reward: 2,805 councils.": "Доставьте 10 мятных бараньих отбивных Дурстина Фитцу Лодочнику на доки Сербуля. Награда: 2,805 council'ов."
"Deliver 10 Durstin's Mutton Stews to Fitz the Boatman on the Serbule docks. Reward: 1,774 councils.": "Доставьте 10 порций тушёной баранины Дурстина Фитцу Лодочнику на доки Сербуля. Награда: 1,774 councils."
"Deliver 10 Dwarven N Cores to Gremix in Amulna. Reward: 3,526 councils.": "Доставьте 10 дварфийских N-ядер Гремиксу в Амульне. Награда: 3,526 councils."
"Deliver 10 Ectoplasm to Fitz the Boatman on the Serbule docks. Reward: 655 councils.": "Доставьте 10 эктоплазмы Фитцу Лодочнику на доки Сербуля. Награда: 655 советов."
"Deliver 10 Edam Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 20,155 councils.": "Доставьте 10 сыров Эдам Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 20,155 councils."
"Deliver 10 Eel to Fitz the Boatman on the Serbule docks. Reward: 288 councils.": "Доставьте 10 угрей Фитцу Лодочнику на доки Сербуля. Награда: 288 советов."
"Deliver 10 Eel Fillets to Fitz the Boatman on the Serbule docks. Reward: 288 councils.": "Доставьте 10 филе угря Фитцу Лодочнику на доках Сербуля. Награда: 288 советов."
"Deliver 99 Eel Fillets to Sheyna in Rahu. Reward: 6,172 councils.": "Доставьте 99 филе угря Шейне в Раху. Награда: 6,172 council'ов."
"Deliver 10 Eel Nigiri to Ogamboe in the Fae Realm. Reward: 6,037 councils.": "Доставьте 10 нигири с угрём Огамбое в Царство фей. Награда: 6,037 councils."
"Deliver 10 Eel Stir-Fries to Laura Neth in Kur Mountains. Reward: 2,740 councils.": "Доставьте 10 жареных угрей Лауре Нет в горах Кур. Награда: 2,740 councils."
"Deliver 10 Eel Sushi Rolls to Ogamboe in the Fae Realm. Reward: 7,404 councils.": "Доставьте 10 роллов с суши из угря Огамбое в Царство фей. Награда: 7,404 council'ов."
"Jaime Fatholm asked for some hard-boiled eggs.": "Джайме Фатхольм попросил немного яиц вкрутую."
"Deliver 10 Electricity Resistance Potions to Fitz the Boatman on the Serbule docks. Reward: 2,089 councils.": "Доставьте 10 зелий сопротивления электричеству Фитцу Лодочнику на доки Сербуля. Награда: 2,089 council'ов."
"Deliver 10 Elven Lilies to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,635 councils.": "Доставьте 10 эльфийских лилий Напёрстку Питу в Крепость Хогана, Эльтибуль. Награда: 2,635 советов."
"Deliver 10 Elven Lily Bouquets to Sheyna in Rahu. Reward: 15,141 councils.": "Доставьте 10 букетов эльфийских лилий Шейне в Раху. Награда: 15,141 советов."
"Felmer in the Fae Realm said, \"My friend Lisi in Sun Vale is very good at making images. Of course now she needs to use paper, but it's still not bad. She's holding a, uh... a book for me. Like an an art book, you know? With sketches of ... nature. Look, nevermind. Just go to Sun Vale and bring me back that book!\"": "Фелмер в Царстве фей сказал: \"Моя подруга Лизи в Солнечной долине очень хорошо умеет создавать изображения. Конечно, теперь ей приходится использовать бумагу, но всё равно получается неплохо. Она хранит для меня, э-э... книгу. Ну, вроде художественного альбома, понимаешь? С набросками... природы. Ладно, неважно. Просто отправляйся в Солнечную долину и принеси мне эту книгу!\""
"Deliver 10 Emeralds to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 изумрудов Шейне в Раху. Награда: 4,930 councils."
"Deliver 10 Emmentaler Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 14,280 councils.": "Доставьте 10 сыров Эмменталер Тимблу Питу в крепость Хогана, Эльтибуль. Награда: 14,280 councils."
"Deliver 10 Empty Fletching Boxes to Viedesi in Sun Vale. Reward: 854 councils.": "Доставьте 10 пустых ящиков для оперения стрел Виедези в Сан-Вейл. Награда: 854 council'ов."
"Deliver 10 Enchanted Construction Nails to Gremix in Amulna. Reward: 2,428 councils.": "Доставьте 10 зачарованных строительных гвоздей Гремиксу в Амульне. Награда: 2,428 советов."
"Deliver 10 Enchanted Mistletoe to Fitz the Boatman on the Serbule docks. Reward: 5,586 councils.": "Доставьте 10 зачарованной омелы Фитцу Лодочнику на доки Сербуля. Награда: 5,586 советов."
"Eleme in Sun Vale has asked you to murder the Winter Court soldiers at the various encampments in Sun Vale.": "Элеме в Сан-Вейле попросила вас убивать солдат Зимнего Двора в различных лагерях Сан-Вейла."
"Ensign Cricket aboard the Wintertide said, \"Hey, while you're assaulting the ship and all, why not kill some of the pests on the engine deck? We've got a nasty infestation of droaches down there. Apparently they get along great with the phoenixes, so everybody's afraid to get rid of 'em. But not you!\"": "Мичман Сверчок на борту «Винтертайда» сказал: \"Эй, раз уж вы всё равно штурмуете корабль, почему бы заодно не перебить вредителей на палубе машинного отделения? Там внизу у нас отвратительное нашествие дроучей. Похоже, они отлично ладят с фениксами, так что все боятся от них избавиться. Но не вы!\""
"Elune in Statehelm said, \"Denton Razor said that someone named 'Engineer Crall' in Vidaria bought some of my jewelry. Find this Crall and convince them to return the stolen goods!\"": "Элун в Стейтхельме сказала: \"Дентон Рейзор сказал, что кто-то по имени 'Инженер Кралл' в Видарии купил часть моих ювелирных изделий. Найдите этого Кралла и убедите его вернуть украденные вещи!\""
"Ensign Cricket aboard the Wintertide said, \"Let me think. How would you assault a ship? I guess you could just attack the crew! Try attacking the ensigns! Heehee!\n\nOh, uh, be aware they have death rays. Just a heads up.\"": "Мичман Крикет на борту «Винтертайда» сказал: «Дай подумать. Как бы ты штурмовал корабль? Думаю, можно просто напасть на экипаж! Попробуй атаковать мичманов! Хи-хи!\\n\\nО, э-э, имей в виду, у них есть лучи смерти. Просто предупреждаю."
"Sam Veilmoor in Statehelm said, \"Helena is a degenerate. She's addicted to gambling, and worse: she's addicted to CHEATING at gambling. But still, she's a Veilmoor. If she should fall prey to a monster or a highwayman, it would tarnish the Veilmoor name. That's my excuse, anyway.\n\nI want to send her an amulet of protection. This is a family recipe, handed down for three generations. Four, if I ever teach it to Helena. I have the basics, but I need some special foci.\"": "Сэм Вейлмур в Стейтхелме сказал: «Хелена — развратница. Она зависима от азартных игр, и что ещё хуже: она зависима от мошенничества в азартных играх. Но всё же она Вейлмур. Если она станет жертвой монстра или разбойника, это запятнает имя Вейлмуров. По крайней мере, это моё оправдание.\\n\\nЯ хочу отправить ей амулет защиты. Это семейный рецепт, передаваемый из поколения в поколение уже три раза. Четыре, если я когда-нибудь научу этому Хелену. У меня есть основы, но мне нужны особые фокусы."
"Pennoc in Serbule told you to concoct some alchemical potions.": "Пеннок в Сербуле велел вам приготовить несколько алхимических зелий."
"Pennoc in Serbule told you to give presents to the townsfolk of Serbule -- but they have to be presents they hate. (Use 'Small Talk' to find what NPCs dislike. Not every NPC has strong dislikes, but many of them are just quiet about it -- they won't share their dislikes with you until you reach Friends favor level. Others are quite vocal about their dislikes, so check around.)": "Пеннок в Сербуле велел вам дарить подарки жителям Сербуля — но это должны быть подарки, которые они ненавидят. (Используйте «Светскую беседу», чтобы узнать, что не нравится NPC. Не у каждого NPC есть сильные антипатии, но многие из них просто молчат об этом — они не расскажут вам о своих антипатиях, пока вы не достигнете уровня расположения «Друзья». Другие же весьма открыто говорят о том, что им не нравится, так что поспрашивайте вокруг.)"
"Pennoc in Serbule told you to kill Elite or Boss creatures. These are often found deep in dungeons.": "Пеннок в Сербуле велел вам убивать элитных существ или боссов. Их часто можно найти глубоко в подземельях."
"Pennoc in Serbule told you to kill creatures using explosive blasts.": "Пеннок в Сербуле велел вам убивать существ с помощью взрывных зарядов."
"Pennoc in Serbule told you to go out and butcher a bunch of animals. You'll need a Butcher Knife or similar tool in your inventory.": "Пеннок в Сербуле велел вам пойти и разделать туши нескольких животных. Для этого вам понадобится Нож мясника или похожий инструмент в инвентаре."
"Pennoc in Serbule told you to cook some fish dishes.": "Пеннок в Сербуле велел вам приготовить несколько рыбных блюд."
"Pennoc in Serbule told you to go cut some lumber. (Therese in Serbule sells a handsaw.)": "Пеннок в Сербуле велел вам пойти нарубить немного древесины. (Тереза в Сербуле продаёт ручную пилу.)"
"Pennoc in Serbule commanded you to dance. (You can learn to dance from Lana Songtree in Serbule Hills. Remain dancing to music continuously for 20 seconds to advance the quest.)": "Пеннок в Сербуле приказал вам танцевать. (Вы можете научиться танцевать у Ланы Сонгтри в Сербульских холмах. Продолжайте непрерывно танцевать под музыку 20 секунд, чтобы продвинуться по заданию.)"
"Pennoc in Serbule told you to kill deer with the Archery skill.": "Пеннок в Сербуле велел вам убивать оленей с помощью навыка Стрельба из лука."
"Pennoc in Serbule told you to survey for crystals.": "Пеннок в Сербуле велел вам провести разведку на кристаллы."
"Pennoc in Serbule told you to drink poison for his amusement.": "Пеннок в Сербуле велел вам выпить яд ради его забавы."
"Pennoc in Serbule told you to hurt yourself by falling off of tall things.": "Пеннок в Сербуле велел вам причинить себе боль, падая с высоких мест."
"Pennoc in Serbule told you to catch fish.": "Пеннок в Сербуле велел вам наловить рыбы."
"Pennoc in Serbule told you to go get hurt by a monster or wild animal. (You must take 500 points of health damage to complete the task.)": "Пеннок в Сербуле велел вам пойти и получить ранения от монстра или дикого животного. (Вы должны получить 500 единиц урона здоровью, чтобы выполнить задание.)"
"Pennoc in Serbule told you to eat lots of prepared foods.": "Пеннок в Сербуле велел вам есть побольше готовой еды."
"Pennoc in Serbule told you to pick flowers.": "Пеннок в Сербуле велел вам собирать цветы."
"Pennoc in Serbule told you to grow some fresh vegetables. He wasn't particular about the type -- just that you grow them yourself.": "Пеннок в Сербуле велел вам вырастить немного свежих овощей. Ему было неважно, каких именно — главное, чтобы вы вырастили их сами."
"Pennoc in Serbule told you to kill some animals. Not monsters: just animals.": "Пеннок в Сербуле велел вам убить несколько животных. Не монстров: просто животных."
"Pennoc in Serbule told you to commit murder against another player.\n\n<i>[ There's a \"PvP cellar\" in Serbule where players can attack each other. See if you can kill someone in there. ]</i>": "Пеннок в Сербуле велел вам совершить убийство другого игрока.\\n\\n<i>[ В Сербуле есть «PvP-подвал», где игроки могут нападать друг на друга. Попробуйте убить кого-нибудь там. ]</i>"
"Pennoc in Serbule told you to milk five different cows.": "Пеннок в Сербуле велел вам подоить пять разных коров."
"Pennoc in Serbule told you to pick some mushrooms.": "Пеннок в Сербуле велел вам собрать немного грибов."
"Pennoc in Serbule told you to kill pigs. The killing blow must be a kick.": "Пеннок в Сербуле велел вам убивать свиней. Смертельный удар должен быть нанесён пинком."
"Pennoc in Serbule told you to trade with another player. (Use the Trade option when examining another player. You don't have to actually trade items -- just so long as one or the other of you gets at least one item, that'll count.)": "Пеннок в Сербуле велел вам обменяться с другим игроком. (Используйте опцию «Обмен», когда осматриваете другого игрока. Вам не обязательно действительно обмениваться предметами — достаточно, чтобы хотя бы один из вас получил хотя бы один предмет, и это засчитается.)"
"Pennoc in Serbule told you to play some music.": "Пеннок в Сербуле велел вам сыграть немного музыки."
"Pennoc in Serbule told you to open chests in the Serbule Crypt.": "Пеннок в Сербуле велел вам открывать сундуки в крипте Сербуля."
"Pennoc in Serbule told you to go out and skin a bunch of animals. You'll need a Skinning Knife or similar tool in your inventory.": "Пеннок в Сербуле велел вам пойти и содрать шкуры с нескольких животных. Для этого вам понадобится Нож для снятия шкур или похожий инструмент в инвентаре."
"Pennoc in Serbule told you to teleport a bunch. (Use teleportation recipes like Recall Circle.)": "Пеннок в Сербуле велел вам побольше телепортироваться. (Используйте рецепты телепортации, такие как Круг возврата.)"
"Pennoc in Serbule told you to give presents to the townsfolk of Serbule. (Use the 'Give Gift' option when talking to an NPC.) The gifts need to be something the townsfolk like -- use 'Small Talk' to find that out.": "Пеннок в Сербуле велел вам дарить подарки жителям Сербуля. (Используйте вариант 'Подарить подарок' при разговоре с NPC.) Подарки должны быть такими, которые нравятся жителям города — используйте 'Светскую беседу', чтобы это выяснить."
"Pennoc in Serbule told you to tip a bunch of other players with the /tip command. You should tip players at least 10 coins.": "Пеннок в Сербуле велел вам дать чаевые нескольким другим игрокам с помощью команды /tip. Вам следует давать игрокам не меньше 10 монет."
"Pennoc in Serbule told you to make some things with Carpentry.": "Пеннок в Сербуле велел вам сделать несколько вещей с помощью Столярного дела."
"Pennoc in Serbule told you to say words of power. (You can research words of power when you have several levels of the Lore skill, which you can obtain by examining lore items in the world.)": "Пеннок в Сербуле велел вам произнести слова силы. (Вы можете изучать слова силы, когда получите несколько уровней навыка Знания, который можно повысить, исследуя предметы знаний по всему миру.)"
"Ormond Neth in Statehelm said, \"It's crucial that you can push an opponent off-kilter with just an entrancing ditty. Go and practice on reasonably-dangerous opponents.\"": "Ормонд Нет в Стейтхельме сказал: \"Крайне важно, чтобы вы могли выводить противника из равновесия одной лишь зачаровывающей песенкой. Идите и потренируйтесь на достаточно опасных противниках.\""
"Lady Windsong in Rahu said, \"The sewers connect to a cave system, and last year I noticed that some of the ratkins' snails had escaped and wandered into the caves. The ratkin didn't seem interested in recovering them, and I really want to know why. In this case I think the death of a few innocent snails is justified. Bring me a sample so that I can examine it.\"": "Леди Виндсонг в Раху сказала: \"Канализация соединяется с системой пещер, и в прошлом году я заметила, что некоторые улитки крысолюдов сбежали и уползли в пещеры. Крысолюды, похоже, не были заинтересованы в том, чтобы вернуть их, и мне очень хочется узнать почему. В этом случае, я думаю, смерть нескольких невинных улиток оправданна. Принесите мне образец, чтобы я могла его изучить.\""
"Deliver 10 Escarole to Ogamboe in the Fae Realm. Reward: 7,479 councils.": "Доставьте 10 эскаролей Огамбое в Царство фей. Награда: 7,479 councils."
"Deliver 10 Esgarion Cheese to Ogamboe in the Fae Realm. Reward: 21,614 councils.": "Доставьте 10 кусков эсгарионского сыра Огамбое в Царство фей. Награда: 21,614 councils."
"Pickles in the Sacred Warden Grotto said, \"Look, I know you're annoyed that I need even more parts to repair the Warden Alert system. I'm annoyed about it too! I'm just a cat, and I'm doing my best! We can't give up on this. It's too important to the Wardens.\n\nIt looks like the glass we used in the earlier repair isn't strong enough: it actually melted inside the machine, and the mess took me hours to remove. Instead of glass, let's try diamonds. Those are super strong, right?\n\nAnd this part here is supposed to be sparkling. Or sparking. Something like fire should be happening. See how it's coated in powder? I know this stuff! My master used a lot of it. It's a mix of sulfur and saltpeter. Get me some of both, maybe I can make it go again.\"": "Пиклс в Священной пещере Хранителя сказал: «Слушай, я знаю, что тебя раздражает, что мне нужны ещё детали для ремонта системы оповещения Хранителя. Меня это тоже раздражает! Я всего лишь кот, и я делаю всё, что могу! Мы не можем сдаваться. Это слишком важно для Хранителей.\\n\\nПохоже, стекло, которое мы использовали в предыдущем ремонте, недостаточно прочное: оно фактически расплавилось внутри машины, и мне пришлось потратить часы, чтобы убрать этот беспорядок. Вместо стекла давай попробуем алмазы. Они же очень прочные, правда?\\n\\nА эта деталь здесь должна искриться. Или искрить. Что-то вроде огня должно происходить. Видишь, как она покрыта порошком? Я знаю эту штуку! Мой мастер много её использовал. Это смесь серы и селитры. Принеси мне немного того и другого, может, я смогу снова запустить систему."
"Baroness Marith Felgard in Serbule Hills said, \"There's a bunch of old holiday ornaments stored in Serbule Keep. Nelson Ballard is a stingy bastard, but perhaps you can persuade him to part with some of his ornaments?\"": "Баронесса Марит Фелгард в Сербульских Холмах сказала: «В Сербульской крепости хранится куча старых праздничных украшений. Нельсон Баллард — жадина, но, возможно, вы сможете уговорить его расстаться с некоторыми из своих украшений?»"
"Echur in Serbule said, \"We need lots of cheap decorations. They should be bright and shiny and round. Hmm. Apples! Yes, fetch some apples. I'll get some myself, and together we should have enough.\"": "Эчур в Сербуле сказал: «Нам нужно много дешёвых украшений. Они должны быть яркими, блестящими и круглыми. Хм. Яблоки! Да, принесите яблоки. Я сам тоже возьму немного, и вместе у нас будет достаточно.»"
"Irkima in Red Wing Casino said, \"As I understand it, our Ri-Shin tree should be decorated with items that evoke memories of our venue. Several customers told me that when they think of Red Wing, they think of 'rollin' the bones'. I do not know why they associate grim body parts with our lovely establishment, but I'm sure it's another racist anti-insect thing. These connotations are hurtful, but we aim to make our guests happy, so bones it is!\n\nUnfortunately I used up my supply of bones during some recent shamanic infusion experiments... do you happen to have a surplus? Do not concern yourself with their rollability; any bones will do at this stage.\"": "Иркима в казино Красное Крыло сказала: «Насколько я понимаю, наше дерево Ри-Шин должно быть украшено предметами, вызывающими воспоминания о нашем заведении. Несколько клиентов сказали мне, что когда они думают о Красном Крыле, они вспоминают «бросание костей». Я не знаю, почему они связывают мрачные части тел с нашим прекрасным заведением, но уверена, что это ещё одна расистская антинасекомая штука. Такие ассоциации обидны, но мы стремимся сделать наших гостей счастливыми, так что будут кости!\\n\\nК сожалению, я израсходовала свой запас костей во время недавних шаманских инфузионных экспериментов... случайно у тебя не осталось лишних? Не беспокойся о том, насколько они подходят для бросков; на этом этапе подойдут любые кости."
"Master Boop said, \"I see you checking out my cool blue fur! I'm willing to bet you want to know how I do it too! Well, blue fur is a sign you have true booping power, and you look like you're capable of that. I'll teach you how to have awesome blue fur like me if you bring me a few things. Here's the list and good hunting!\"\n <i>[Remember that you must remain in rabbit form to advance and complete this task!]</i>": "Мастер Буп сказал: «Вижу, ты любуешься моей классной синей шерстью! Готов поспорить, ты хочешь узнать, как я это делаю! Синяя шерсть — признак настоящей силы бупинга, и ты выглядишь способным на это. Я научу тебя иметь такую же потрясающую синюю шерсть, как у меня, если ты принесёшь мне несколько вещей. Вот список, и удачной охоты!»\\n <i>[Помни, что для выполнения и завершения этого задания ты должен оставаться в кроличьей форме!]</i>"
"Moxie said, \"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of Expert-Quality Metal Slabs. Lots of them! I promise I'll only ask this of you once - never again! If you can deliver me 25 Expert-Quality Metal Slabs, I'll show you what I use them for!\"": "Мокси сказал: «Эй, не мог бы ты сделать мне личное одолжение? У меня совсем мало припасов, и мне срочно нужны металлические пластины экспертного качества. Очень много! Обещаю, что попрошу тебя об этом только один раз — больше никогда! Если ты доставишь мне 25 металлических пластин экспертного качества, я покажу тебе, для чего я их использую!»"
"Raim said, \"Hey could I get you to do me a personal favor? I'm really low on supplies and I'm in dire need of string. Lots of string! I promise I'll only ask this of you once - never again! If you can deliver me 50 strings, I'll show you what I use them for!\"": "Райм сказал: «Эй, не мог бы ты сделать мне личное одолжение? У меня совсем мало припасов, и мне очень нужны нитки. Много ниток! Обещаю, я попрошу тебя об этом только один раз — больше никогда! Если ты доставишь мне 50 ниток, я покажу тебе, для чего я их использую!»"
"Baroness Marith Felgard in Serbule Hills said, \"We need something large and beautiful to top the tree. I've seen some of the ranalon wearing decorative brooches that might work. Search the ones that stay down in the water and carry staves. 'Garden Masters', I think is what we call them.\"": "Баронесса Марит Фелгард в Сербульских Холмах сказала: «Нам нужно что-то большое и красивое, чтобы украсить вершину дерева. Я видела некоторых раналонов, носящих декоративные броши, которые могут подойти. Ищите тех, кто остаётся в воде и носит посохи. Думаю, мы называем их «Мастера Сада»."
"Three Bun-Fu Masters have come into the area to help train their fellow bunnies in the ways of the carrot. Visit Master Lopsy in the Serbule Keep garden, Master Flopsy outside of the Kur Mountains Inn and Master Boop outside of the New Prestonbule Cave in Gazluk to complete your training! You think you know Bun-Fu? Show me!\n\n[<i> These quests require you to be in bunny form to advance. A free bunny transformation will be available at all quest NPCs. </i>]": "Три мастера Кроличьего Фу прибыли в этот район, чтобы помочь своим собратьям-кроликам овладеть искусством моркови. Посети мастера Лопси в саду крепости Сербуль, мастера Флопси у гостиницы у гор Кур и мастера Бупа у пещеры Нью-Престонбул в Газлуке, чтобы завершить своё обучение! Думаешь, ты знаешь Кроличье Фу? Докажи это!\\n\\n[<i> Для прохождения этих квестов необходимо быть в форме кролика. Бесплатное превращение в кролика доступно у всех NPC с квестами. </i>]"
"Master Boop said, \"Hi there! Ready for some combat training? Let's get to it! A skilled rabbit should be able to take down any predator without difficulty, no matter big they are or how many there are! Get out there and show me what you got! Take down 20 Mot-Uraks, 20 Polar Bears and 20 Starving Tundra Wolves. Remember that you must complete this task in rabbit form. No cheating! Report back to me when you're done and I'll load you up with some more bunny juices.\"": "Мастер Буп сказал: «Привет! Готов к боевой тренировке? Приступим! Опытный кролик должен без труда справиться с любым хищником, независимо от их размера и количества! Выйди туда и покажи, на что ты способен! Убей 20 Мот-Ураков, 20 Белых медведей и 20 Истощённых тундровых волков. Помни, что задание нужно выполнить в кроличьей форме. Никакого мошенничества! Вернись ко мне, когда закончишь, и я награжу тебя дополнительными кроличьими эликсирами.»"
"Master Flopsy said, \"Greetings! Ready for advanced Bun-Fu lessons? Great!\n\nIn order to survive, you must be able to replenish your carrot supply no matter the conditions! Find a good, fertile plot of ground somewhere out here in the Kur Mountains and grow twelve carrots. Don't forget, you MUST grow these carrots while being a rabbit. If you want to be a non-rabbit gardener, then go talk to someone else! Once you are done, bring them to me for inspection and I shall reward you with some bunny juices.\"": "Мастер Флопси сказал: «Приветствую! Готов к продвинутым урокам Кроличьего Фу? Отлично!\\n\\nЧтобы выжить, ты должен уметь пополнять запас моркови в любых условиях! Найди хорошее, плодородное место где-нибудь здесь, в горах Кур, и вырасти двенадцать морковок. Не забудь, ты ОБЯЗАН выращивать эту морковь в кроличьей форме. Если хочешь быть садовником не в кроличьей форме, иди поговори с кем-нибудь другим! Когда закончишь, принеси их мне на проверку, и я награжу тебя кроличьими эликсирами."
"Master Lopsy said, \"Hi! Would you be interested in learning the ways of the carrot? I can help you get started!\n\nFirst off, you need to know how to seek out your carrots. I have placed several Carrots of Power across the landscape here in the Serbule and Serbule Hills areas. Seek out seven of these Carrots of Power and then return to me. Also, you must interact with the Carrots of Power as a rabbit! You cannot become a Bun-Fu Master if you're not a rabbit!\n\nIf you need to bunny up, just ask! Good hunting!\"": "Мастер Лопси сказал: «Привет! Хочешь научиться искусству моркови? Я помогу тебе начать!\\n\\nПрежде всего, тебе нужно научиться искать свои морковки. Я разместил несколько Морковок Силы по всей местности здесь, в Сербуле и холмах Сербуле. Найди семь таких Морковок Силы и вернись ко мне. Также ты должен взаимодействовать с Морковками Силы в кроличьей форме! Ты не сможешь стать Мастером Бан-Фу, если не будешь кроликом!\\n\\nЕсли нужно превратиться в кролика, просто скажи! Удачной охоты!"
"Backfat in the Fae Realm said, \"A Ri-Shin tree has to reflect its people. Hah, I know: wouldn't butterflies look great?! Representational, kinda. And also the fairies love 'em. But there's a catch: they have to be alive. Dead butterflies would upset a lot of the fae here.\n\nCrimsonfelt butterflies would look nicest, but they eat cinders out of the air, and there's no way I'm feeding 'em cinders every day. How about some nice pretty rose-mourning butterflies? They're a little smaller, but they can survive on sugar water.\n\nGo catch a whole bunch of 'em! Here's a net.\"": "Бэкфэт в Фейском царстве сказал: «Дерево Ри-Шин должно отражать своих жителей. Ха, знаю: разве бабочки не смотрелись бы отлично?! В некотором роде символично. И феи их обожают. Но есть загвоздка: они должны быть живыми. Мёртвые бабочки расстроят многих фей здесь.\\n\\nСамыми красивыми были бы багровопёстрые бабочки, но они питаются золой из воздуха, и я ни за что не буду кормить их золой каждый день. Как насчёт милых розово-траурных бабочек? Они немного меньше, но могут выживать на сахарной воде.\\n\\nИди поймай их побольше! Вот тебе сеть."
"Nightshade in Kur said, \"I've delegated the candy-cane creation to Laura Neth, but she insists she needs more cinnamon. Ugh. It's for decoration, who cares how it tastes?! But she's very insistent.\"": "Найтшейд в Куре сказал: «Я поручил создание леденцов Лауре Нет, но она настаивает, что ей нужно больше корицы. Уф. Это для украшения, кому какое дело, как они на вкус?! Но она очень настойчива.»"
"Spot in Animal Town said, \"We need a big thing on top of the tree. And it should be something animals make. Like... poop. No... like meat! No... like cheese! Yes! Animals make cheese! Get a big hard cheese.\"": "Житель Звериного города сказал: «Нам нужна большая штука на вершине дерева. И это должно быть что-то, что делают животные. Например... какашки. Нет... мясо! Нет... сыр! Да! Животные делают сыр! Найдите большой твердый сыр.»"
"Echur in Serbule said, \"Nelson said he had some ornamentation appropriate for this celebration. Can you get it from him?\"": "Эчур в Сербуле сказал: «Нельсон сказал, что у него есть украшения, подходящие для этого празднования. Можешь ли ты получить их у него?»"
"Irkima in Red Wing Casino said, \"The tree is supposed to be topped with a personalized symbol of our culture. Dorimir suggested that we use a large top hat, since mantises love hats so much. He was being mirthful, but his suggestion has merit!\n\nAs the casino's official calligrapher, I am of course skilled in creating elaborate paper props. I've fashioned a suitable top hat, but its bow is not sufficiently festive: I need a better shade of red dye! I believe crushed rose petals will be suitable. Are those easy to find?\"": "Иркима в казино Красное Крыло сказала: «Дерево должно быть увенчано персонализированным символом нашей культуры. Доримир предложил использовать большой цилиндр, ведь богомолы так любят шляпы. Он шутил, но его предложение имеет смысл!\\n\\nКак официальный каллиграф казино, я, конечно, умею создавать замысловатые бумажные украшения. Я сделал подходящий цилиндр, но его бант недостаточно праздничный: мне нужен более насыщенный красный краситель! Думаю, подойдут измельчённые лепестки роз. Их легко найти?"
"Backfat in the Fae Realm said, \"I found the perfect topper for the tree! It's a chunk of that soul-rock stuff the fairies use for everything. It looks like a tiny lifestone! But there's bad news: Pegast says it's not actually from a lifestone. It's a part of an old defense turret, and it could re-activate at any time, killing all non-fae in the area. That would be a terrible way to die.\n\nDon't worry, there's apparently a way to disable it. It's complicated, but it'll be worth the effort! We need mercury, winterprize, and some wire.\"": "Бэкфат в Фейском царстве сказал: «Я нашёл идеальную вершину для дерева! Это кусок той самой душевой породы, которую феи используют для всего. Он выглядит как крошечный камень жизни! Но есть плохие новости: Пегаст говорит, что это на самом деле не камень жизни. Это часть старой оборонительной турели, которая может активироваться в любой момент и убить всех не-фей в округе. Это был бы ужасный способ умереть.\\n\\nНе волнуйся, похоже, есть способ её отключить. Это сложно, но оно того стоит! Нам нужны ртуть, зимний приз и немного проволоки."
"Zhao in Rahu said, \"The tree came with a complex system of wires and sparking mechanisms. Apparently they can make the tree glow. I've asked Ufkar to reverse-engineer it, and he says we can make it work with a power source. A few dwarven N cores ought to work.\"": "Чжао в Раху сказал: «Дерево было снабжено сложной системой проводов и искрящихся механизмов. По-видимому, они могут заставить дерево светиться. Я попросил Уфкара провести обратный инжиниринг, и он говорит, что мы можем заставить это работать с источником питания. Несколько гномьих N-ядер должны подойти.»"
"Kleave in Eltibule said, \"We need colorful and shiny decorations. After consulting with Kalaba, I have decided that the best colorful and shiny decorations would be the eyes of fallen foes. However, we should not use the eyes of sentient creatures. Hogan said that the tree should radiate peace. So animal eyes will have to do. Perhaps cat or dinosaur eyes.\"": "Клив в Элтибуле сказал: «Нам нужны яркие и блестящие украшения. После консультации с Калабой я решил, что лучшими яркими и блестящими украшениями будут глаза павших врагов. Однако мы не должны использовать глаза разумных существ. Хоган сказал, что дерево должно излучать мир. Поэтому подойдут глаза животных. Возможно, кошачьи или динозавровые глаза.»"
"There's an undecorated tree in Amulna, a town in the Ilmari desert. Kelim is in charge of decorating it. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В Амульне, городе в пустыне Илмари, стоит неукрашенное дерево. Келим отвечает за его украшение. Когда дерево будет полностью украшено, жители города будут оставлять под ним подарки каждый день в праздничный сезон."
"There's an undecorated tree in Animal Town near Spot's tent. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В Зверином городе возле палатки Спота стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять под ним подарки каждый день в праздничный сезон."
"There's an undecorated tree near Kleave in Eltibule. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Рядом с Кливом в Элтибуле стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять вам подарки под деревом каждый день в праздничный сезон."
"There's an undecorated tree in a house near Ukorga's inn in Kur Mountains. Nightshade is in charge of decorating it. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В доме рядом с трактиром Укорги в горах Кур стоит неукрашенное дерево. Найтшейд отвечает за его украшение. Когда дерево будет полностью украшено, жители города будут оставлять под ним подарки каждый день в праздничный сезон."
"There's an undecorated tree in the New Prestonbule cave. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В пещере Нового Престонбула стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять вам подарки под деревом каждый день в праздничный сезон."
"There's an undecorated tree in Povus. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В Повусе стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять под деревом подарки каждый день в праздничный сезон."
"There's an undecorated tree in Rahu near Zhao's shop. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В Раху возле лавки Чжао стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять под ним подарки каждый день в праздничный сезон."
"There's an undecorated tree in the Red Wing Casino. When fully decorated, casino employees will leave you presents under the tree each day during the holiday season.": "В казино Красное Крыло стоит неукрашенное дерево. Когда оно будет полностью украшено, сотрудники казино будут оставлять под деревом подарки каждый день в праздничный сезон."
"There's a barren festival tree near Echur in Serbule. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "Возле Эчура в Сербуле стоит голое праздничное дерево. Когда оно полностью украшено, жители города будут оставлять под деревом подарки каждый день в праздничный сезон."
"There's a barren festival tree at the Baroness's house in Serbule Hills. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "У баронессы в доме в Сербульских Холмах стоит голое праздничное дерево. Когда оно полностью украшено, жители города будут оставлять под деревом подарки каждый день в праздничный сезон."
"There's an undecorated tree in the Fae Realm. When fully decorated, townsfolk will leave you presents under the tree each day during the holiday season.": "В Области Фей стоит неукрашенное дерево. Когда оно будет полностью украшено, жители города будут оставлять под ним подарки каждый день в праздничный сезон."
"Kleave in Eltibule said, \"The top of the tree must be a beautiful beacon of strength and honor. Kalaba has been working on an appropriately beautiful blade to sit atop the tree. My contribution is to light it on fire with harmless decorative flames. I know a rakshasa recipe for decorative fire, but I need a large amount of fire dust!\"": "Клив в Элтибуле сказал: «Вершина дерева должна быть прекрасным символом силы и чести. Калаба работает над соответствующим красивым клинком, который будет украшать верхушку дерева. Мой вклад — зажечь его безвредными декоративными пламенами. Я знаю рецепт раксаши для декоративного огня, но мне нужно большое количество огненной пыли!»"
"A concerned scapegoat has shown up at the bridge North of Serbule Keep, in search of something important to her. Search for her lost family, Miss Guided, Miss Take, Miss Fire, Miss Behaved, and Miss Fits, then return to her once you've found them all.": "Обеспокоенный козёл отпущения появился на мосту к северу от крепости Сербуль в поисках чего-то важного для неё. Найдите её потерянных родственников — Мисс Заблудшую, Мисс Ошибку, Мисс Огонь, Мисс Плохое Поведение и Мисс Приступы, а затем вернитесь к ней, когда найдёте всех."
"Irkima in Red Wing Casino said, \"Red Wing is famous for our gaming, so I proposed we use Monsters and Mantids game chips on the tree. However, our game chips are very valuable and we fear inebriated guests may purloin them.\n\nDorimir suggests we instead use the worthless 'game chips' that are often used in home games. If you could just find a few examples of these chips, I'll have our goblin maintenance team create more.\"": "Иркима в казино Красное Крыло сказала: «Красное Крыло славится нашими азартными играми, поэтому я предложила украсить дерево фишками из игры Монстры и Богомолы. Однако наши игровые фишки очень ценны, и мы боимся, что пьяные гости могут их украсть.\\n\\nДоримир предлагает вместо этого использовать бесполезные «игровые фишки», которые часто применяются в домашних играх. Если ты найдёшь несколько таких фишек, наша команда гоблинов по обслуживанию сделает больше."
"Sie Antry in Eltibule asked for your help in getting rid of hungry rabbits. Just grow some plants in any garden area, and they'll come running!": "Сие Антри в Элтибуле попросил вашей помощи избавиться от голодных кроликов. Просто вырастите несколько растений в любой садовой зоне, и они прибегут!"
"Echur in Serbule said, \"Sir Coth says it's traditional to decorate the tree with an ethnic human food called a 'gingerbread human'. He gave me a bunch of recipes... here's the simplest version. Can you prepare a batch?\"": "Эчур в Сербуле сказал: «Сэр Кот утверждает, что традиционно украшать ёлку этнической человеческой едой под названием «имбирный человечек». Он дал мне кучу рецептов... вот самый простой вариант. Ты можешь приготовить партию?»"
"Leah Bowman in Povus said, \"It's tradition to use glow bottles on the tree. The alchemist who used to make them is dead now, but she taught me the technique! Most of the ingredients are pretty upsetting, seeing as they come from living animals. But remember, this is for presents! So if you get the parts, I'll make the jars.\"": "Лия Боуман в Повусе сказала: «Это традиция — использовать светящиеся бутылки на ёлке. Алхимик, который раньше их делал, теперь умер, но она научила меня технике! Большинство ингредиентов довольно неприятные, ведь они берутся от живых животных. Но помните, это для подарков! Так что если вы принесёте части, я сделаю банки.»"
"Baroness Marith Felgard in Serbule Hills said, \"Goblins are quite horrid little creatures, but they often decorate their calling-cards quite elegantly. I think if we had a number of calling-cards we could use them as makeshift tree decorations.\"": "Баронесса Марит Фелгард в Сербульских Холмах сказала: «Гоблины — довольно отвратительные маленькие создания, но они часто украшают свои визитные карточки весьма элегантно. Думаю, если у нас будет несколько таких карточек, мы сможем использовать их как импровизированные украшения для ёлки.»"
"Kleave in Eltibule said, \"Hogan gave us many complex requirements. Fragrance, sentiment, color, and reflectiveness must all be taken into account. I have it: fish! Shiny, colorful, fragrant, and sentimental ... to me, at least. Fetch fresh grapefish!\"": "Клив в Элтибуле сказал: \"Хоган дал нам много сложных требований. Нужно учитывать аромат, настроение, цвет и отражательную способность. У меня есть идея: рыба! Блестящая, красочная, ароматная и сентиментальная... по крайней мере для меня. Принесите свежего грейпфиша!\""
"Baroness Marith Felgard in Serbule Hills said, \"We're very low on resources this year so we'll have to get creative with our decorations. Hmm, how about grapes? They're colorful and relatively plentiful...\"": "Баронесса Марит Фелгард в Сербульских Холмах сказала: «В этом году у нас очень мало ресурсов, поэтому придется проявить креативность с украшениями. Хм, как насчет винограда? Он яркий и относительно доступный...»"
"You've found Miss Behaved! She seemed rather hungry when you found her and asked that you make her favorite food dish for her trip home.": "Вы нашли Мисс Поведении! Она казалась довольно голодной, когда вы её нашли, и попросила приготовить её любимое блюдо для поездки домой."
"You've found Miss Fire! She's asked that you help her gather some supplies before she returns home.": "Вы нашли мисс Файр! Она попросила вас помочь собрать припасы, прежде чем она вернётся домой."
"You've found Miss Fits! But she doesn't seem interested in going home until she wins another game. Help by bringing her some red wing tokens so she can buy a game ticket!": "Вы нашли Мисс Фитс! Но она не хочет идти домой, пока не выиграет ещё одну игру. Помогите, принёсши ей несколько жетонов красного крыла, чтобы она могла купить билет на игру!"
"You've found Miss Guided! But she refuses to return to Miss Chievous until she gathers supplies for a surprise party she wants to throw for Miss Chievous. Help her find some confetti!": "Ты нашёл Мисс Гайдед! Но она отказывается возвращаться к Мисс Чивиус, пока не соберёт припасы для сюрприз-вечеринки, которую хочет устроить для Мисс Чивиус. Помоги ей найти конфетти!"
"Backfat in the Fae Realm said, \"You'd expect fairy lights to be pretty easy to get here in the fae realm. All these fairies can make sparkly lights! But Pegast says they can't waste them on frivolities. And that turns into the same argument I always have with these guys: what ISN'T frivolous to an immortal?\n\nAnyway, it's cool, I found somebody to make 'em for us on the quiet. I just need to pay him. In honeycombs... lots of honeycombs.\"": "Бэкфэт в Фейском царстве сказал: «Можно было бы подумать, что фейские огоньки здесь достать очень просто. Все эти феи умеют создавать сверкающие огни! Но Пегаст говорит, что они не могут тратить их на пустяки. И это превращается в тот же спор, что у меня всегда с этими ребятами: что же НЕ является пустяком для бессмертного?\\n\\nВ любом случае, это круто, я нашёл кого-то, кто тихо сделает их для нас. Мне просто нужно заплатить ему. Медовыми сотами... очень многими медовыми сотами."
"Nightshade in Kur said, \"Landri is a master ice-wizard. I've talked her into preparing a beautiful ice-gem to top the tree. She just needs a bit of magical ice. An 'ice core', she said. Better get two, in case I need to have her remake it in a different shape.\"": "Найтшейд в Куре сказал: «Ландри — мастер ледяной магии. Я уговорил её подготовить красивый ледяной самоцвет для вершины дерева. Ей просто нужен немного магического льда. «Ледяное ядро», — сказала она. Лучше взять два, на случай, если придётся переделать его в другую форму.»"
"Zhao in Rahu said, \"As I understand it, most of the tree's decorations should be large, round, colorful balls. How about lemons?\"": "Чжао в Раху сказал: «Насколько я понимаю, большинство украшений на дереве должны быть большими, круглыми, разноцветными шарами. А как насчёт лимонов?»"
"Nightshade in Kur said, \"We need something blue, and I think it would be pretty funny to cover the tree in fungus. Let's do that.\"": "Найтшейд в Кур сказал: «Нам нужно что-то синее, и я думаю, будет довольно забавно покрыть дерево грибком. Давайте сделаем это.»"
"A mysterious talking scapegoat has arrived at the bridge North of Serbule, in search of her missing family. Speak with her to find out what's happened to them.": "Таинственный говорящий козёл отпущения прибыл к мосту к северу от Сербуля в поисках своей пропавшей семьи. Поговорите с ней, чтобы узнать, что с ними случилось."
"Kelim in Amulna said, \"This one is just impossible... we need something yellow and fluffy for 'tinsel', some sort of human decoration. Where would we get tinsel in the desert?! Are we supposed to shave a few manticores and use their manes?!\"": "Келим в Амульне сказал: «Это просто невозможно... нам нужна что-то жёлтое и пушистое для «мишуры», какой-то человеческий декор. Где в пустыне взять мишуру?! Нам что, сбрить несколько мантикор и использовать их гривы?!»"
"Leah Bowman in Povus said, \"Now for the most important part: the tree topper. It has to be Miss Fly-Hater! She's a gigantic frog that comes out of hibernation right around now. She lives on a little island in the middle of the river, and we bring her in to sit on the tree and catch bugs. She loves it, the town loves it, we all win!\n\nNow don't hurt her! The town will never forgive us if she's hurt.\"": "Лия Боуман в Повусе сказала: «А теперь самое главное: верхушка ёлки. Это должна быть Мисс Летающая Ненавистница! Она огромная лягушка, которая просыпается ото сна примерно в это время. Она живёт на маленьком острове посреди реки, и мы приводим её, чтобы она сидела на ёлке и ловила насекомых. Ей это нравится, городу это нравится, все в выигрыше!\\n\\nТолько не причиняйте ей вреда! Город никогда нам этого не простит."
"Leah Bowman in Povus said, \"I know this sounds weird, because it is, but next we need some old bones. The rakshasa love seeing them on the tree.\"": "Лиа Боуман в Повусе сказала: \"Знаю, звучит странно, потому что так и есть, но нам нужны старые кости. Ракшасы любят видеть их на дереве.\""
"Spot in Animal Town said, \"Okay. We need round things on the tree. Round. Round round round. Think... Oh, onions are round! Get lots of onions.\"": "Спот в Городе Животных сказал: «Хорошо. Нам нужны круглые вещи на дереве. Круглые. Круглые круглые круглые. Подумай... О, лук же круглый! Собери много лука.»"
"Irkima in Red Wing Casino said, \"At the Ri-Shin celebration in Statehelm, the trees are lit with fairy lights! Our tree must be lit as well. There are a few fairy shopkeepers in the employ of the casino, and Laphylla says she can place a glamour on our tree... but she demands payment in a substance called 'pixie sugar'. Can you obtain this?\"": "Иркима в казино Красное Крыло сказала: «На празднике Ри-Шин в Стейтхелме деревья украшают волшебными огнями! Наше дерево тоже должно быть освещено. В казино работают несколько торговцев волшебными товарами, и Лафилла говорит, что может наложить гламур на наше дерево... но она требует оплату веществом под названием «фейский сахар». Ты можешь его достать?»"
"Kelim in Amulna said, \"The tree needs bright shiny red things... and now you see why I took on this stupid job! I need a lot of hot peppers.  A lot. Do you need some seeds? I still have some for sale!\"": "Келим в Амульне сказал: «Дереву нужны яркие блестящие красные штуки... и теперь ты понимаешь, почему я взялся за эту глупую работу! Мне нужно много острых перцев. Очень много. Тебе нужны семена? У меня ещё есть несколько на продажу!»"
"Spot in Animal Town said, \"We need round things for the tree! Round... round... like plates. Plates! Get some plates. This many. <i>[Spot holds up a varying number of fingers, changing her mind every few seconds. You decide that a half-dozen plates will do.]</i>\"": "Спот в Городе Животных сказал: «Нам нужны круглые вещи для дерева! Круглые... круглые... как тарелки. Тарелки! Принеси несколько тарелок. Вот столько. <i>[Спот показывает разное количество пальцев, меняя своё мнение каждые несколько секунд. Вы решаете, что полдюжины тарелок будет достаточно.]</i>»"
"Rick Snapley in New Prestonbule said, \"I'm trying to bring the whole cave together here, so I got the orcs involved in decorating too. As a race they're not real known for their decorations, but Gasu'um collects empty potion bottles, so let's put 'em on the tree!\n\nShe gave me a bunch of Rage to Heat bottles... we just need a few more.\"": "Рик Снэпли в Нью-Престонбуле сказал: «Я пытаюсь объединить всю пещеру, поэтому привлёк орков к украшению тоже. Как раса они не особо известны украшениями, но Гасу’ум собирает пустые бутылки от зелий, так что давай повесим их на ёлку!\\n\\nОна дала мне кучу бутылок с Яростью к Теплу... нам нужно всего несколько штук."
"Leah Bowman in Povus said, \"When the town was healthier, we used to put prettied-up mushrooms on the tree. Fly amanita grows everywhere around here, so that's not a problem. But I don't know how to make the dye! We need a nice tomato red dye to cover the stems.\"": "Лия Боуман в Повусе сказала: «Когда город был здоровее, мы украшали дерево красивыми грибами. Мухомор растёт здесь повсюду, так что с этим проблем нет. Но я не знаю, как сделать краску! Нам нужна красивая томатно-красная краска, чтобы покрыть ножки.»"
"Rick Snapley in New Prestonbule said, \"A good Ri-Shin tree should be covered in red baubles. The shinier the better. We need a big pile of rubies or whatever!\"": "Рик Снапли в Нью-Престонбуле сказал: «Хорошее дерево Ри-Шин должно быть покрыто красными бусинами. Чем ярче, тем лучше. Нам нужна большая куча рубинов или чего-то подобного!»"
"Spot in Animal Town said, \"We need stringy things. Like... um, string. No, string is ugly. Sausages! Sausages are stringy! Get some!\n\nBut please <i>please</i> don't tell Norbert because he yells at me when I say I like sausage. Please? Okay good.\"": "Спот в Городе Животных сказала: «Нам нужны нитевидные вещи. Например... эм, нитки. Нет, нитки некрасивые. Колбаски! Колбаски нитевидные! Принеси несколько!\\n\\nНо, пожалуйста, <i>пожалуйста</i> не говори Норберту, потому что он кричит на меня, когда я говорю, что люблю колбасу. Пожалуйста? Хорошо, спасибо."
"Kelim in Amulna said, \"We need something eye-catching to top the tree. How about... hmm... a pair of scorpion stingers?!\"": "Келим в Амульне сказал: «Нам нужно что-то броское для вершины дерева. Как насчёт... хм... пары жал скорпиона?!»"
"Zhao in Rahu said, \"I do understand that this is a peaceful holiday. But if we want the people of Rahu to be excited, it needs to incorporate some of our culture! Traditionally our celebrations feature trophies from our fallen enemies. But we are at peace right now... so perhaps the least-offensive trophies would be from fellow rakshasa. The vile bandits in the desert prey upon the weak and the pitiful. Kill them, sever their ears, and bring them back. Oh, and please try to focus on bandits with big healthy ears.\"": "Чжао в Раху сказал: «Я понимаю, что это мирный праздник. Но если мы хотим, чтобы народ Раху был воодушевлён, в него нужно включить часть нашей культуры! Традиционно наши празднования сопровождаются трофеями от поверженных врагов. Но сейчас у нас мир... так что, возможно, наименее оскорбительными трофеями будут уши собратьев ракшас. Гнусные бандиты в пустыне охотятся на слабых и жалких. Убейте их, отрежьте уши и принесите их обратно. О, и, пожалуйста, старайтесь выбирать бандитов с большими здоровыми ушами.»"
"Find the Shrine of Ri-Shin along the southern coast in Kur Mountains. Speak to Snowleaf, the Scion of Ri-Shin.": "Найдите Святилище Ри-Шина вдоль южного побережья в горах Кур. Поговорите со Сноулиф, потомком Ри-Шина."
"Rick Snapley in New Prestonbule said, \"I remember as a snotrat having to cut out hundreds of paper snowflakes for the tree each year. Tedious work, but it taught me how to use a knife! We'll need some stencils, though... otherwise they won't all be even, and then what's the point?\"": "Рик Снэпли в Нью-Престонбуле сказал: «Я помню, когда был мелким сорванцом, мне приходилось вырезать сотни бумажных снежинок для ёлки каждый год. Утомительная работа, но она научила меня обращаться с ножом! Нам понадобятся трафареты, иначе снежинки не будут одинаковыми, и тогда в этом нет смысла»"
"Backfat in the Fae Realm said, \"I don't think fairies would appreciate normal tree ornaments. But Marrowchomp had a great idea for something much better! It's a pixie-dust shower. Almost completely safe! And we already have most of the parts. I just need some pixie dust, and some piping.\"": "Бэкфат в Фейском царстве сказал: «Я не думаю, что феи оценят обычные украшения для дерева. Но Марроучомп придумал отличную идею получше! Это душ из пыльцы пикси. Почти полностью безопасно! И у нас уже есть большая часть деталей. Мне просто нужна пыльца пикси и немного трубок.»"
"Zhao in Rahu said, \"The tree should be topped with a large decoration. But what decoration? There were no instructions. Since this is a human celebration of Ri-Shin, the god of plants and trees, it makes sense to use a wooden decoration, no? Fetch me a large load of spruce and I'll ask Daniel Murderdark what we should make with it.\"": "Чжао в Раху сказал: «Ёлку следует украсить большой верхушкой. Но какой именно? Инструкций не было. Поскольку это человеческий праздник Ри-Шина, бога растений и деревьев, логично использовать деревянное украшение, не так ли? Принеси мне большую партию ели, и я спрошу у Дэниела Мердердарка, что мы можем из неё сделать.»"
"Echur in Serbule said, \"Okay, I need a bit of discreet help. Nelson gave me a decoration to put atop the tree, but I lost it! And I never lose things! So you know what this means: it was stolen. And I know who did it.\n\nThere's a certain rodent who's made my life miserable ever since I accidentally gave him super-intelligence. His name is Mister Squeaky and he lives somewhere northwest of town. Please bring back the star he stole!\"": "Эчур в Сербуле сказал: «Ладно, мне нужна небольшая скрытная помощь. Нельсон дал мне украшение для верхушки ёлки, но я его потерял! А я никогда ничего не теряю! Так что ты понимаешь, что это значит: его украли. И я знаю, кто это сделал.\\n\\nЕсть один грызун, который делает мою жизнь несчастной с тех пор, как я случайно дал ему сверхинтеллект. Его зовут Мистер Сквики, и он живёт где-то к северо-западу от города. Пожалуйста, верни звезду, которую он украл!"
"It's time to enjoy summer activities! Complete the check-list before this event ends to receive a few summer reward items.\n<i>[Night time activities only count after 7pm and before 5am]</i>\n<i>[Goblins hoard the secret of fireworks!]</i>": "Пора наслаждаться летними развлечениями! Выполни список заданий до окончания этого события, чтобы получить несколько летних наград.\\n<i>[Ночные активности учитываются только с 19:00 до 5:00]</i>\\n<i>[Гоблины хранят секрет фейерверков!]</i>"
"The suspicious lemons are back! Suspicious lemons carry several possible buffs, debuffs or items. You will find lemons spawning randomly all over Alharth. Some are hiding while others are sitting out in the open. Now get out there and touch them all!\nWARNING FOR FAE CHARACTERS: The suspicious lemons love to deal in death and punishment just as much as buffs and love! Fairy players may want to use extreme caution when touching a lemon! Not everything a lemon gives results in death, but you need to be prepared!": "Подозрительные лимоны вернулись! Подозрительные лимоны могут давать различные баффы, дебаффы или предметы. Лимоны появляются случайным образом по всему Алхарду. Некоторые прячутся, а другие сидят на виду. Теперь выходи и потрогай их всех!\\nВНИМАНИЕ ДЛЯ ФЕЙ: Подозрительные лимоны любят приносить смерть и наказание так же сильно, как баффы и любовь! Игрокам-феям стоит быть крайне осторожными при прикосновении к лимону! Не всё, что даёт лимон, приводит к смерти, но нужно быть готовым!"
"Rick Snapley in New Prestonbule said, \"A Ri-Shin tree needs a topper, something that glows. But I don't wanna use one of those glowing yellow crystals... I know Sona says she can make 'em safe, but it's too dangerous.\n\nLet's just... I dunno, let's just stick some candles on top, like my family used to do. But we'll need to light 'em every night... got any spare tealights?\"": "Рик Снэпли в Нью-Престонбуле сказал: «Дереву Ри-Шин нужна вершина, что-то светящееся. Но я не хочу использовать эти светящиеся жёлтые кристаллы... Я знаю, Сона говорит, что может сделать их безопасными, но это слишком опасно.\\n\\nДавай просто... не знаю, просто поставим сверху несколько свечей, как раньше у моей семьи. Но их нужно будет зажигать каждую ночь... есть запасные чайные свечи?"
"Kelim in Amulna said, \"The tree smells horrible, doesn't it? All... piney. I think we should douse it with Telka's Tail. And hang the perfume bottles in the tree as decorations! I have lots of empty bottles, but no full ones. Can you get me two?\"": "Келим в Амульне сказал: «Дерево ужасно пахнет, не правда ли? Весь такой сосновый. Думаю, нам стоит облить его Хвостом Телки. И повесить флаконы с духами на дерево в качестве украшений! У меня много пустых флаконов, но нет полных. Можешь принести мне два?»"
"Hail citizen of Alharth!\n\nWe are looking for ambitious adventurers to join the ranks of the Civil Service! We are volunteers that go above and beyond to ensure our lands are a wonderful place to live! \n\nWe are currently looking for recruits willing to help out with our periodic dungeon and cave clearing. If left unchecked, these places slowly overfill with critters and eventually spill out to bring chaos and mayhem on the people of Alharth!\n\nJourney to these places and give them a good cleaning! It's not all for free either: we're willing to pay you for your troubles! We have installed tracking crystals in each of the areas to ensure you are showing up and doing the work. There are 2 of these crystals in each area. Once you have cleared the area, just use the crystal to check in and your work progress will be logged for payroll. After you have checked in to both crystals in that area, you will gain access to the reward cache located at the area entrance. Look through what's in there and pick out whatever looks interesting to you.\n\nIf you manage to complete all the tasks on the list, you may return to Serbule Keep and access the Grand Reward Cache located in a building across from the Inn for something much nicer! \n\nWe currently require the following areas to be serviced: \n- The Serbule Crypt \n- Borghild \n- Eltibule Keep Goblin Dungeon \n- Kur Tower \n- Ilmari Labyrinth \n- Gazluk Keep  \n- The Fungal Fortress \n\nAlso, once you have completed The Serbule Crypt or Borghild, you will gain access to the Civil Service Travel Network, which will help you get the job done faster! \n\nIf you choose to accept some or all of these tasks, thank you for your service and good hunting!": "Приветствую, гражданин Алхарта!\n\nМы ищем амбициозных искателей приключений, чтобы пополнить ряды Гражданской службы! Мы — добровольцы, которые делают всё возможное, чтобы наши земли были прекрасным местом для жизни!\n\nВ настоящее время мы ищем рекрутов, готовых помочь с периодической очисткой подземелий и пещер. Если их оставить без присмотра, эти места постепенно заполняются тварями и в итоге вырываются наружу, сея хаос и разрушения среди жителей Алхарта!\n\nОтправляйся в эти места и проведи там тщательную очистку! И это не бесплатно: мы готовы платить тебе за твою работу! В каждом из районов установлены кристаллы отслеживания, чтобы убедиться, что ты приходишь и выполняешь работу. В каждом районе по 2 таких кристалла. После того как ты очистишь район, просто используй кристалл, чтобы отметиться, и твой прогресс будет зафиксирован для начисления оплаты. После того как ты отметишься у обоих кристаллов в этом районе, получишь доступ к хранилищу наград у входа в район. Осмотри содержимое и выбери то, что тебе интересно.\n\nЕсли ты справишься со всеми заданиями из списка, можешь вернуться в крепость Сербуль и получить доступ к Великому хранилищу наград, расположенного в здании напротив гостиницы, где тебя ждёт нечто гораздо более ценное!\n\nВ настоящее время требуется обслуживание следующих районов:\n- Крипта Сербуль\n- Боргилд\n- Подземелье гоблинов в крепости Элтибул\n- Башня Кур\n- Лабиринт Илмари\n- Крепость Газлук\n- Грибная крепость\n\nКроме того, после выполнения заданий в Крипте Сербуль или Боргилд ты получишь доступ к Сети путешествий Гражданской службы, которая поможет тебе быстрее выполнять работу!\n\nЕсли ты решишь принять некоторые или все эти задания, спасибо за службу и удачной охоты!"
"A roaming caravan of master crafters have stopped at the Red Wing Casino for a few days of rest, restocking, and a chance to study some of the local crafts. They have rented the Theater Room for their staging area. Go pay them a visit and see if they can help you advance your craft skills faster!": "Бродячий караван мастеров ремесел остановился у Казино Красное Крыло на несколько дней отдыха, пополнения запасов и возможности изучить местные ремёсла. Они арендовали Театральную комнату в качестве своей базы. Загляните к ним и узнайте, смогут ли они помочь вам быстрее развить навыки ремесла!"
"The Errana Bunny has challenged you to an egg hunt! Find the blue, yellow and red Errana Eggs scattered throughout Eltibule and Serbule. Once you have found them all, return to The Errana Bunny to collect your prize.\n<b>IMPORTANT:</b> You must remain in bunny form for the duration of this quest! If you jump out of bunny form for any reason, this quest will fail and you will have to start over!": "Заяц Эррана бросил тебе вызов на охоту за яйцами! Найди синие, жёлтые и красные яйца Эрраны, разбросанные по Элтибулю и Сербулю. Как только найдёшь все, вернись к Зайцу Эрране, чтобы получить награду.\\n<b>ВАЖНО:</b> Ты должен оставаться в кроличьей форме на протяжении всего задания! Если по какой-либо причине выйти из кроличьей формы, задание провалится, и придётся начинать заново!"
"Kleave in Eltibule said, \"Hogan explained that the tree should be decorated with a number of small orbs. This seems trivial. Please fetch some lumber and I shall carve some balls. Maple is fragrant; we should use that.\"": "Клив в Элтибуле сказал: «Хоган объяснил, что дерево должно быть украшено рядом маленьких шариков. Это кажется незначительным. Пожалуйста, принеси немного древесины, и я вырежу несколько шаров. Клен пахучий; нам стоит использовать его.»"
"Nightshade in Kur said, \"We need tinsel. What can we make it from? It should be fluffy, light, and... I have it! Matted hairballs! We'll dye them red. Go, fetch some!\"": "Найтшейд в Куре сказал: «Нам нужна мишура. Из чего мы её сделаем? Она должна быть пушистой, лёгкой и... Вот! Скомканные комки шерсти! Мы покрасим их в красный. Иди, принеси немного!»"
"Deliver 10 Evil Bones to Sheyna in Rahu. Reward: 3,623 councils.": "Доставьте 10 Злых Костей Шейне в Раху. Награда: 3 623 совета."
"Michael Irasce in Statehelm said, \"Here's another crazy order. How am I going to fill this?! I need \"schematics and maintenance instructions for an Exetar-class ship.\" I understand some of those words...\n\nWell, no pressure but see what you can do.\"": "Майкл Ираск в Стейтхелме сказал: «Вот ещё один безумный заказ. Как мне это выполнить?! Мне нужны «чертежи и инструкции по обслуживанию корабля класса Экзетар». Я понимаю не все эти слова...\\n\\nНу, без давления, но посмотри, что сможешь сделать."
"Anaberyl in Statehelm said, \"My next class will cover natural percussive sounds. I just need a bit of help with the props!\"": "Анабэрил в Стейтхельме сказал: «Мой следующий урок будет посвящён естественным перкуссионным звукам. Мне просто нужна небольшая помощь с реквизитом!»"
"Mope in Povus said, \"I need new types of fungus to improve my fungal forest. These species do not grow natively here, so I must ask for assistance.\"": "Моп в Повусе сказал: «Мне нужны новые виды грибов, чтобы улучшить мой грибной лес. Эти виды здесь не растут, поэтому мне нужна помощь.»"
"Jake the Buckler in Sun Vale asked you to talk to Firaki in Amulna. He needs advice on what color to use for his next buckle.": "Джейк Щитоносец из Солнечной Долины попросил тебя поговорить с Фираки в Амульне. Ему нужен совет, какой цвет использовать для его следующей пряжки."
"Deliver 10000 Expert's Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,342 councils.": "Доставьте 10000 Стрел эксперта Тримбл Питу в Хоганском Убежище, Элтибуль. Награда: 3,342 совета."
"Deliver 10000 Expert's Barbed Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 6,417 councils.": "Доставьте 10000 экспертных колючих стрел Тимбл Питу в Хоганском замке, Элтибул. Награда: 6 417 советов."
"Deliver 10000 Expert's Dense Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,746 councils.": "Доставьте 10000 Плотных стрел эксперта Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 4 746 советов."
"Deliver 10000 Expert's Long Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,495 councils.": "Доставьте 10000 длинных стрел эксперта Тимбл Питу в Хоганском форте, Элтибуле. Награда: 4,495 советов."
"Deliver 10000 Expert's Reservoir Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 19,524 councils.": "Доставьте 10000 стрел из резервуара эксперта Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 19,524 совета."
"Deliver 10 Expert's Skinning Knives to Viedesi in Sun Vale. Reward: 3,354 councils.": "Доставьте 10 ножей для снятия шкур эксперта Виедеси в Солнечной Долине. Награда: 3,354 совета."
"Deliver 10000 Expert's Snare Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,220 councils.": "Доставьте 10000 арбалетных стрел эксперта Тримблу Питу в Крепость Хоган, Элтибуль. Награда: 5,220 советов."
"Deliver 100 Expert's Throwing Knives to Sheyna in Rahu. Reward: 3,648 councils.": "Доставьте 100 метательных ножей эксперта Шейне в Раху. Награда: 3,648 советов."
"Deliver 10 Expert-Quality Armor Stakes to Sheyna in Rahu. Reward: 5,041 councils.": "Доставьте 10 колышков для брони экспертного качества Шейне в Раху. Награда: 5,041 советов."
"Deliver 10 Expert-Quality Metal Slabs to Irkima in Red Wing Casino. Reward: 2,357 councils.": "Доставьте 10 металлических плит экспертного качества Иркиме в казино Красное Крыло. Награда: 2 357 советов."
"Yasinda in Hogan's Keep asked for some explosive ink.": "Ясинда в Крепости Хоган попросила немного взрывных чернил."
"Backfat in the Fae Realm said, \"So that fairy over there -- yeah, that one, Pegast. He came over and asked for my help. Finally, recognition of my expertise! But did he want help getting fit and healthy? Nope. He just wanted explosive mushrooms. I gave him what I had, but he still needs more. So now I have to go foraging for this guy.\n\nHey, you look like you could use some exercise... you ready for a jog into the wilds? Great! These are very tricky mushrooms to pick, so be careful!\"": "Бэкфэт в Фейском царстве сказал: «Так вот, та фея там — да, именно он, Пегаст. Он подошёл и попросил моей помощи. Наконец-то признание моего мастерства! Но хотел ли он помочь стать в форме и здоровым? Нет. Ему нужны были взрывные грибы. Я дал ему то, что у меня было, но ему нужно ещё больше. Так что теперь мне придётся ходить за ними в лес.\\n\\nЭй, похоже, тебе не помешает немного упражнений... готов к пробежке по дикой природе? Отлично! Эти грибы очень сложные для сбора, так что будь осторожен!"
"Deliver 10 Explosive Runestones to Gremix in Amulna. Reward: 4,651 councils.": "Доставьте 10 взрывных рунических камней Гремиксу в Амульне. Награда: 4,651 совет."
"Deliver 10 Eyeball Soups to Ogamboe in the Fae Realm. Reward: 1,923 councils.": "Доставьте 10 супов из глазных яблок Огамбо в Фейском царстве. Награда: 1 923 совета."
"Daisy in Sun Vale's Animal Town asked for some eyestalks. They come from Watchers, which are terrible monsters generally found deep within dungeons.": "Дейзи из Звериного города Солнечной Долины попросила несколько глазных стеблей. Они добываются с Наблюдателей — ужасных монстров, которых обычно можно встретить глубоко в подземельях."
"Deliver 10 Eyestalks to Irkima in Red Wing Casino. Reward: 1,220 councils.": "Доставьте 10 глазных стеблей Иркиме в казино Красное Крыло. Награда: 1 220 советов."
"Deliver 10 Faded Blue Books to Gremix in Amulna. Reward: 408 councils.": "Доставьте 10 выцветших синих книг Гремиксу в Амулне. Награда: 408 советов."
"Ensign Cricket aboard the Wintertide said, \"There's a bunch of bears on the storage deck because of... reasons. You should clear those out, if you're going that way!\"": "Мичман Крикет на борту Зимней Волны сказал: «На складе полно медведей из-за... причин. Тебе стоит их убрать, если ты туда направляешься!»"
"Deliver 10 Fae Bee Stingers to Ogamboe in the Fae Realm. Reward: 18,332 councils.": "Доставьте 10 жал фей-пчёл Огамбо в Царство Фей. Награда: 18,332 совета."
"Eveline Rastin in Red Wing Casino said, \"Fairies have a kind of cloth called fae felt. There's also a drug called fae felt, so it gets kind of confusing... but I really want some of the cloth. Just to understand what it feels like, looks like, smells like. If you find some, can you bring it to me?\"": "Эвелин Растин в казино Красное Крыло сказала: «У фей есть особая ткань, которую называют фэй фелт. Также есть наркотик с таким же названием, поэтому бывает немного путаницы... но мне очень хочется заполучить немного этой ткани. Просто чтобы понять, как она ощущается, как выглядит, как пахнет. Если найдёшь, можешь принести мне?»"
"Deliver 10 Fae Felt to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,573 councils.": "Доставьте 10 Фея Фелт Тимбл Питу в Хоган'с Кип, Элтибуль. Награда: 4,573 совета."
"Deliver 10 Fae Honeycombs to Ogamboe in the Fae Realm. Reward: 7,457 councils.": "Доставьте 10 Феиных сот Огамбо в Царство Фей. Награда: 7,457 советов."
"Deliver 10 Fae Mysotis to Ogamboe in the Fae Realm. Reward: 15,972 councils.": "Доставьте 10 Фей Мизотис Огамбо в Царство Фей. Награда: 15,972 совета."
"Deliver 10 Fae Mysotis Bouquets to Korbok in Vidaria. Reward: 25,875 councils.": "Доставьте 10 букетов фейской незабудки Корбоку в Видарии. Награда: 25,875 советов."
"Noita the Green in the Fae Realm said, \"Since you're an outsider, you can help fix a tricky problem. Fae panthers have been increasing in number and they're hunting quite close to town. The fairies dealt with other threats such as rhinos very easily, yet they've ignored the panthers... and I've finally realized that it's due to ME. Pegast is afraid of offending me. I've tried to explain that these are just ordinary animals, barely smarter than a mortal cat... but he thinks I SHOULD be offended, even if I'm not. Anyway, if you were to just go and remove those panthers near town, that'd be great.\"": "Нойта Зеленая в Царстве Фей сказала: «Поскольку ты чужак, ты можешь помочь решить сложную проблему. Численность фейских пантер растет, и они охотятся совсем близко к городу. Феи легко справлялись с другими угрозами, такими как носороги, но пантеры ими игнорировались... и я наконец поняла, что это из-за МЕНЯ. Пегаст боится меня обидеть. Я пыталась объяснить, что это просто обычные животные, едва умнее смертного кота... но он считает, что Я ДОЛЖНА обижаться, даже если я не обижаюсь. В любом случае, если ты просто пойдешь и уберешь этих пантер возле города, это было бы здорово.»"
"Bendith in the Fae Realm said, \"My dark ritual requires a large number of fae rhino horns. Just go out and get some for me.\"": "Бендиф из Фейского царства сказал: «Моему тёмному ритуалу нужно большое количество рогов фейского носорога. Просто выйди и принеси мне их.»"
"Deliver 10 Fae Wasp Stingers to Ogamboe in the Fae Realm. Reward: 5,040 councils.": "Доставьте 10 жал фейской осы Огамбо в Царство фей. Награда: 5 040 советов."
"Deliver 10 Fairwing Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 6,500 councils.": "Доставьте 10 сыров Справедливого Крыла Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 6,500 советов."
"Deliver 5 Fairy Icehearts to Ogamboe in the Fae Realm. Reward: 48,540 councils.": "Доставьте 5 Ледяных сердец фей Огамбо в Царство Фей. Награда: 48,540 советов."
"Deliver 10 Fairy Peach Juices to Ogamboe in the Fae Realm. Reward: 10,511 councils.": "Доставьте 10 соков из фейского персика Огамбо в Мир Фей. Награда: 10 511 советов."
"Crelpin in the Fae Realm said, \"You can do amazing things with the goo of a ripe fairy puff. Usually they explode too violently to be useful, but if you pop one that's perfectly ripe, you won't be hurt! Instead, you'll get coated in their goo.\n\nGo get yourself coated, then come see me. I'll use that goo for hive maintenance.\"": "Крелпин в Фейском царстве сказал: «С помощью слизи спелого фейского пуха можно творить удивительные вещи. Обычно они взрываются слишком сильно, чтобы быть полезными, но если лопнуть идеально спелый, ты не пострадаешь! Вместо этого ты покроешься их слизью.\\n\\nИди покройся этой слизью, а потом приходи ко мне. Я использую её для обслуживания улья."
"Deliver 10 Fairy Puffs to Laura Neth in Kur Mountains. Reward: 72 councils.": "Доставьте 10 Феиных Пухов Лауре Нет в горах Кур. Награда: 72 совета."
"Deliver 10 Fairy Wings to Fitz the Boatman on the Serbule docks. Reward: 1,192 councils.\nNote from orderer: <i>\"Don't let anybody know I ordered this. The autumn fey would have me killed!\"</i>": "Доставьте 10 фейских крыльев Фитцу Лодочнику на причалы Сербуля. Награда: 1 192 совета.  \nПримечание от заказчика: <i>«Никому не говори, что я это заказал. Осенние феи меня убьют!»</i>"
"In a cave beneath Povus, you met a ghostly orc that ranted about accidentally killing his friends with an explosive device. He swears the device was supposed to be fake!": "В пещере под Повусом вы встретили призрачного орка, который жаловался, что случайно убил своих друзей взрывным устройством. Он клянется, что устройство должно было быть поддельным!"
"Mox Warcut in New Prestonbule said, \"The 'cinnamon' that grows in Council Lands isn't the same plant that we have growing overtop Mt. Aufghel. I need to collect some of the stuff for a report back home. Can you help me collect it? It grows on trees in the snow out there.\"": "Мокс Варкат в Нью Престонбуле сказал: «'Корица', которая растёт в Землях Совета, — это не то же самое растение, что растёт на вершине горы Ауфгель. Мне нужно собрать немного этого для отчёта домой. Ты можешь помочь мне собрать её? Она растёт на деревьях в снегу там.»"
"Elaina in Sun Vale's Animal Town asked you to get her some myconian jelly.": "Элейна из Звериного города Солнечной Долины попросила тебя добыть для неё немного миконийского желе."
"Yogzi in Sun Vale wants you to make him a bunch of basic skinning knives.": "Йогзи в Солнечной Долине хочет, чтобы вы сделали для него несколько простых ножей для снятия шкур."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>fancy hammers</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>изящные молоты</b>. Ты можешь сделать несколько для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10 Fancy Pumpkin Pies to Ogamboe in the Fae Realm. Reward: 17,904 councils.": "Доставьте 10 изысканных тыквенных пирогов Огамбо в Фейском царстве. Награда: 17,904 совета."
"Deliver 10 Fancy Turkey Pies to Ogamboe in the Fae Realm. Reward: 18,203 councils.": "Доставьте 10 изысканных индюшачьих пирогов Огамбо в царстве Фей. Награда: 18,203 совета."
"Ferris Blueheart in Vidaria said, \"Have you seen the frostbelches in the area? Little blue frogs, very adorable, very deadly. Of course you have, but it seems the demons have as well. They've developed a particular interest in the little creature, and I don't have to know why to know that it's troubling.\n\nBring me back a few samples of frostbelch skin, and please let me remain ignorant of how you get them.\"": "Феррис Блюхарт в Видарии сказал: «Ты видел морозных рыков в этом районе? Маленькие синие лягушки, очень милые, очень смертоносные. Конечно, видел, но, похоже, демоны тоже. Они проявили особый интерес к этому созданию, и мне не нужно знать почему, чтобы понять, что это тревожно.\\n\\nПринеси мне несколько образцов шкуры морозных рыков, и, пожалуйста, позволь мне оставаться в неведении о том, как ты их получил."
"Ferris Blueheart in Vidaria said, \"Unfortunately, my tests on these Frostbelch skins were inconclusive. There's nothing out of the ordinary with them. Fortunately for us, however, an animal expert was recently stationed near here. Seek out Pitre Ferrence, he should be somewhere south of this area. Ask him, nay, tell him that we'd like his assistance in this matter. Take the skins with you as well, he may need them.\"": "Феррис Блюхарт в Видарии сказал: «К сожалению, мои испытания этих шкур морозных рыков были неубедительными. В них нет ничего необычного. Однако, к счастью для нас, неподалёку недавно разместился эксперт по животным. Найдите Питре Ферренса, он должен быть где-то к югу от этой области. Спросите его, точнее, скажите ему, что нам нужна его помощь в этом деле. Возьмите с собой шкуры, они могут ему понадобиться.»"
"Ferris Blueheart in Vidaria said, \"I have a theory. I suspect that the demons specifically value some combination of the Frostbelches' protective properties with their own. But I don't know what combination, exactly. Do you still have those frog skins from before? I'll need those, and I'll need some demonic essences. Bring me both, so I can compare.\"": "Феррис Блюбарт в Видарии сказал: «У меня есть теория. Я подозреваю, что демоны особенно ценят какое-то сочетание защитных свойств Морозных Пузырей с их собственными. Но я точно не знаю, какое именно сочетание. У тебя ещё остались те лягушачьи шкуры? Мне они понадобятся, а также несколько демонических эссенций. Принеси мне и то, и другое, чтобы я мог сравнить.»"
"Ferris Blueheart in Vidaria said, \"We cannot let that happen. We cannot let the demons fuse with the Frostbelches. [Ferris looks around, clearly panicked.] I'm afraid we have no choice. We have to destroy the Frostbelches before it's too late. My heart goes out to the cute little creatures, but there really is no other way.\n\nI hate to ask you to do this, but I need you to deal with as many Frostbelches as you can.\"": "Феррис Блюбарт в Видарии сказал: «Мы не можем позволить этому случиться. Мы не можем позволить демонам слиться с Морозными Пузырями. [Феррис оглядывается вокруг, явно в панике.] Боюсь, у нас нет выбора. Мы должны уничтожить Морозных Пузырей, пока не стало слишком поздно. Мне жаль этих милых существ, но другого выхода действительно нет.\\n\\nМне неприятно просить тебя об этом, но мне нужно, чтобы ты справился с как можно большим количеством Морозных Пузырей."
"Farsight Flemmings in Statehelm said, \"This is a complicated bundle order from someone who's obsessed with dragonkin. The hassle is huge but the pay is good.\"": "Дальнозоркие Флемминги в Стейтхелме сказали: «Это сложный заказ на связку от кого-то, кто одержим драконьими. Хлопот много, но оплата хорошая.»"
"Felmer in the Fae Realm said, \"Floxie has been helping me gather local flowers to test as dyes, but the ocelots keep running her off. I told her not to be afraid of little kittens, and she told me to go get my own flowers! Can you clear some of them out for me? If anyone can deal with harmless felines, it's you! \"": "Фелмер в Фейском царстве сказал: «Флокси помогала мне собирать местные цветы для испытания в качестве красителей, но оцелоты постоянно её прогоняют. Я сказал ей не бояться маленьких котят, а она ответила, чтобы я сам пошёл за своими цветами! Не мог бы ты расчистить их немного для меня? Если кто и справится с безобидными кошками, так это ты!»"
"Elahil in Serbule asked you to collect some feathers.": "Элахил в Сербуле попросил тебя собрать несколько перьев."
"Yetta has asked for some feathers.": "Йетта попросила несколько перьев."
"Deville Neth in Statehelm said, \"I've got customers returning to the shop! But I've been selling my loaves at a loss, and I can't keep doing that for long. The problem is the taxes on delivered grains. They're just too high! So I was thinking... Maybe you could deliver them for me?\n\nI can't pay you in Councils but I can do much better: I can pay you in exposure. I'll tell everyone who shops here about how great you are, and what a valuable addition to Statehelm you've become.\"": "Девиль Нет в Стейтхелме сказал: «Ко мне в лавку возвращаются покупатели! Но я продаю свои буханки с убытком, и так долго продолжаться не может. Проблема в налогах на доставляемое зерно. Они слишком высоки! Так что я подумал... Может, ты сможешь доставлять их за меня?\\n\\nЯ не могу заплатить тебе Советами, но могу предложить кое-что получше: я расскажу всем покупателям здесь, какой ты замечательный и каким ценным дополнением к Стейтхелму ты стал."
"Deville Neth in Statehelm said, \"Sales are going well and it's time to bring back some of my fancier recipes. I need these grains to do it! As before, I'll pay you in clout with the citizens of Statehelm!\"": "Девиль Неф в Стейтхелме сказал: «Продажи идут хорошо, и пора вернуть некоторые из моих изысканных рецептов. Мне нужны эти зерна для этого! Как и раньше, я заплачу тебе влиянием среди жителей Стейтхелма!»"
"Felmer in the Fae Realm said, \"If you bring me dinosaur scales to make buttons, I'll show you how to use First Aid.\"": "Фелмер в Фейском мире сказал: «Если ты принесёшь мне чешую динозавра для пуговиц, я покажу тебе, как использовать первую помощь.»"
"Deliver 10 Femur Piles to Sheyna in Rahu. Reward: 1,373 councils.": "Доставьте 10 куч бедренных костей Шейне в Раху. Награда: 1,373 совета."
"Deliver 10 Femurs to Fitz the Boatman on the Serbule docks. Reward: 76 councils.\nNote from orderer: <i>\"Any old femurs will do but please make sure they're clean.\"</i>": "Доставьте 10 бедренных костей Фитцу Лодочнику на причалы Сербуля. Награда: 76 советов.  \nПримечание от заказчика: <i>«Подойдут любые старые бедренные кости, но, пожалуйста, убедитесь, что они чистые.»</i>"
"Deliver 10 Ferocity Juices to Viedesi in Sun Vale. Reward: 5,303 councils.": "Доставьте 10 Соков Свирепости Вьедеси в Солнечную Долину. Награда: 5,303 совета."
"Deliver 10 Feta Cheese to Ogamboe in the Fae Realm. Reward: 22,807 councils.": "Доставьте 10 Феты Огамбо в Царство Фей. Награда: 22,807 советов."
"Arianna Fangblade in Red Wing Casino said, \"My goat Fiddler just loves juniper berries. They taste awful ta me but goats will be goats! They don't seem ta grow around here though. Seen any?\"": "Арианна Клыкорез в казино Красное Крыло сказала: «Мой козёл Скрипач просто обожает ягоды можжевельника. Мне они ужасно не нравятся, но козлы есть козлы! Хотя, похоже, они здесь не растут. Не видел таких?»"
"Arianna Fangblade in Red Wing Casino said, \"Fiddler over there's immortal, as in 'never grows old' immortal. Nice trick, right? But he can still die of disease! His hoofs are hundreds 'a years old and need to be cleaned. I need one more thing for my cleaning kit: yeti hair. Or any super-strong hair balls, really. Werewolf hair'd do.\"": "Арианна Клыкопер в казино Красное Крыло сказала: «Скрипач там бессмертен, как в смысле «никогда не стареет» бессмертен. Классный трюк, да? Но он всё равно может умереть от болезни! Его копыта сотни лет старые и их нужно почистить. Мне нужна ещё одна вещь для моего набора для чистки: волосы йети. Или любые сверхпрочные комки волос, на самом деле. Волосы оборотня тоже подойдут.»"
"Arianna Fangblade in Red Wing Casino said, \"Have ya met my goat Fiddler? He's immortal! Or nearly. But immortal goats need special care! His fur is so strong normal shears can't cut it, and my last pair o' diamond shears got swiped by somebody. A goblin probably... anyway, I know what we need to make a new comb! I saw it when I was in Kur. There's an Urak near a spring in Kur that my orc guide called Fluffy. Typical orc joke, right, 'cuz Fluffy's got no fur. And it eats orcs and terrorizes the land. Anyway, I need a tooth from that big fucker. Can ya get it?\"": "Арианна Клыкорез в казино Красное Крыло сказала: «Ты встречал моего козла Скрипача? Он бессмертен! Или почти. Но бессмертным козлам нужен особый уход! Его шерсть такая крепкая, что обычные ножницы не могут её порезать, а моя последняя пара алмазных ножниц была украдена кем-то. Наверное, гоблином... В общем, я знаю, что нам нужно, чтобы сделать новый гребень! Я видела это, когда была в Куре. Там, возле источника в Куре, есть урак, которого мой орочий проводник называл Пушистым. Типичная орочьая шутка, да? Ведь у Пушистого нет шерсти. И он ест орков и терроризирует землю. В общем, мне нужен зуб этого большого ублюдка. Ты можешь его достать?»"
"Marna wants me to burn myself on the candles inside the nearby crypt. In return she'll teach me some first aid techniques.": "Марна хочет, чтобы я обжегся о свечи внутри ближайшей крипты. Взамен она научит меня некоторым приемам первой помощи."
"Marna wants me to burn myself on a total of 12 different candles inside the nearby crypt. I may not be able to reach all the candles right away, it's too dangerous... but I should keep it in mind for later.": "Марна хочет, чтобы я обжегся на 12 разных свечах внутри ближайшего склепа. Я, возможно, не смогу сразу дотянуться до всех свечей, это слишком опасно... но стоит помнить об этом на потом."
"Marna wants me to burn myself on a total of 25 different candles inside the nearby crypt! That's going to take a lot of delving.": "Марна хочет, чтобы я обжегся на 25 разных свечах внутри ближайшего склепа! Это потребует много исследований."
"Deliver 10 Filleting Knives to Viedesi in Sun Vale. Reward: 6,968 councils.": "Доставьте 10 филейных ножей Виедеси в Солнечную Долину. Награда: 6,968 советов."
"Bring 4 bones to Lawara.": "Принесите 4 кости Лаваре."
"Oritania in Eltibule told you about a device used by Dalvos to teleport to another place. The pieces of a spare machine are somewhere in the goblin dungeon below Eltibule Keep. If you find all the pieces listed below, Oritania will give you the final piece.": "Оритания в Элтибуле рассказала вам об устройстве, которое Далвос использовал для телепортации в другое место. Запасные части машины находятся где-то в подземелье гоблинов под крепостью Элтибул. Если вы найдете все перечисленные ниже детали, Оритания даст вам последнюю часть."
"Find all 6 gravestones in the little graveyard nearby.": "Найдите все 6 надгробий на небольшом кладбище неподалёку."
"Bring 10 mushroom to Mushroom Jack.": "Принесите 10 грибов Грибному Джеку."
"Mu asked you to locate Poe, a myconian that may not entirely be under Tidal's influence, and deliver a message-spore.": "Му попросил тебя найти По, микониана, который, возможно, не полностью под влиянием Тайдала, и передать ему споровое послание."
"Bring two spoons to Lawara.": "Принесите две ложки Лаваре."
"An old elf named Elmetaph said he could teach you Teleportation. You just need to find an amethyst first.\n\nHe suggested you search around the old teleportation platforms for lost gems, but mentioned that amethysts might be anywhere on the island.": "Старый эльф по имени Элметаф сказал, что может научить тебя Телепортации. Тебе нужно сначала найти аметист.\\n\\nОн предложил поискать потерянные драгоценные камни вокруг старых платформ телепортации, но упомянул, что аметисты могут быть где угодно на острове."
"An old elf named Elmetaph taught you some Teleportation magic. He told you to find a teleportation platform on the island and practice binding yourself to it.\n\n<i>[ Stand on a teleportation platform and press the Crafting button on the right of the screen. Find the Bind Circle recipe and use it there. ]</i>": "Старый эльф по имени Элметаф научил тебя магии Телепортации. Он сказал найти телепортационную платформу на острове и потренироваться привязывать к ней себя.\\n\\n<i>[ Встань на телепортационную платформу и нажми кнопку Крафта справа на экране. Найди рецепт Круга Привязки и используй его там. ]</i>"
"Yasinda in Hogan's Keep asked you to find proof that her daughter is dead. She said, \"In the note, the sage told her to find his lean-to under a giant boulder. He said he could just hear the sounds of a waterfall.\"": "Ясинда в Крепости Хоган попросила вас найти доказательства смерти её дочери. Она сказала: «В записке мудрец велел ей найти его шалаш под гигантским валуном. Он сказал, что едва слышит звуки водопада.»"
"Deliver 10 Fine Cheesecloth to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,671 councils.": "Доставьте 10 единиц тонкой марли Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 3 671 совет."
"Deliver 10 Fine Cotton Yarn to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,484 councils.": "Доставьте 10 тонкой хлопковой пряжи Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 1,484 совета."
"Deliver 10 Fire Dust to Fitz the Boatman on the Serbule docks. Reward: 2,133 councils.\nNote from orderer: <i>\"Rumor has it that Fire Dust can be found all over the place in Serbule and Eltibule. You are very lucky! It is not so common here in Verta.\"</i>": "Доставьте 10 огненной пыли Фитцу Лодочнику на причалы Сербуля. Награда: 2 133 совета.  \nПримечание от заказчика: <i>«Ходят слухи, что огненную пыль можно найти повсюду в Сербуле и Элтибуле. Тебе очень повезло! У нас в Верте она не так распространена.»</i>"
"Deliver 10 Fire Magic Boost Potion 20% to Irkima in Red Wing Casino. Reward: 5,625 councils.": "Доставьте 10 Зелий усиления Огненной магии 20% Иркиме в казино Красное Крыло. Награда: 5,625 советов."
"Deliver 10 Fire Resistance Potions to Fitz the Boatman on the Serbule docks. Reward: 2,044 councils.": "Доставьте 10 зелий сопротивления огню Фитцу Лодочнику на доках Сербуля. Награда: 2 044 совета."
"Deliver 10 Fire Shield Potions to Viedesi in Sun Vale. Reward: 8,717 councils.": "Доставьте 10 зелий Огненного Щита Виедеси в Солнечную Долину. Награда: 8 717 советов."
"Sir Taggart in Vidaria said, \"Back beyond the mass of ghouls you'll find even more dangerous undead: wizards! They wield fire and darkness alike.\"": "Сэр Таггарт в Видарии сказал: «За массой вурдалаков вы найдёте ещё более опасных нежити: волшебников! Они владеют огнём и тьмой одинаково.»"
"Deliver 10 Firkins to Fitz the Boatman on the Serbule docks. Reward: 2,089 councils.": "Доставьте 10 фиркинсов Фитцу Лодочнику на доках Сербуля. Награда: 2 089 советов."
"Deliver 10 Firm Tofu to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,509 councils.": "Доставьте 10 Плотного Тофу Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 15,509 советов."
"Deliver 10 Fish and Mushroom Scrambles to Fitz the Boatman on the Serbule docks. Reward: 849 councils.": "Доставьте 10 яичниц с рыбой и грибами Фитцу Лодочнику на причалы Сербуля. Награда: 849 советов."
"Deliver 10 Fisherman's Arrangement #1 to Sheyna in Rahu. Reward: 2,857 councils.": "Доставьте 10 Рыбацких соглашений №1 Шейне в Раху. Награда: 2 857 советов."
"Deliver 10 Fisherman's Arrangement #2 to Sheyna in Rahu. Reward: 4,241 councils.": "Доставьте 10 Рыбацких наборов №2 Шейне в Раху. Награда: 4 241 совет."
"Deliver 10 Fisherman's Arrangement #3 to Sheyna in Rahu. Reward: 5,776 councils.": "Доставьте 10 Рыбацких партий №3 Шейне в Раху. Награда: 5,776 советов."
"Deliver 10 Fisherman's Arrangement #4 to Sheyna in Rahu. Reward: 8,953 councils.": "Доставьте 10 Рыбацких партий №4 Шейне в Раху. Награда: 8,953 совета."
"Deliver 10 Fisherman's Arrangement #5 to Sheyna in Rahu. Reward: 11,756 councils.": "Доставьте 10 Рыбацких соглашений №5 Шейне в Раху. Награда: 11,756 советов."
"Deliver 10 Fisherman's Arrangement #6 to Sheyna in Rahu. Reward: 15,578 councils.": "Доставьте 10 Рыбацких соглашений №6 Шейне в Раху. Награда: 15,578 советов."
"Elune in Statehelm said, \"I have the worst news. The constabulary spotted a suspicious person yesterday, and as he fled he threw a huge clump of jewelry into the ocean. It's got to be some of my stolen jewelry! Can you fish it out for me? It was down on the docks.\"": "Элун в Стейтхелме сказал: «У меня самые плохие новости. Полиция вчера заметила подозрительного человека, и когда он бежал, он бросил огромную кучу украшений в океан. Это должно быть часть моих украденных украшений! Можешь выловить их для меня? Это было у причалов.»"
"Way has asked for some string with which to fix Way's lucky yo-yo.": "Уэй попросил немного ниток, чтобы починить своё удачное йо-йо."
"Deliver 10 Flame Nibs to Irkima in Red Wing Casino. Reward: 3,403 councils.": "Доставьте 10 Пламенных осколков Иркиме в казино Красное Крыло. Награда: 3,403 совета."
"Ser Lorentz in Vidaria said, \"Thanks for getting those brains. They apparently confirmed Mr. Blueheart's theory. Have you met him? He's in camp here. Squirrely man, but his heart's in the right place. Anyway, I have another request from him. You know those skulls with wings near the walls? Yeah, kill those and get a sample of their blood.\n\nI know, skulls don't have blood! But he says there's blood in the wings.\"": "Сэр Лоренц в Видарии сказал: «Спасибо, что достал эти мозги. Они, по-видимому, подтвердили теорию мистера Блюбхарта. Ты с ним встречался? Он здесь, в лагере. Чудаковатый человек, но у него доброе сердце. В любом случае, у меня есть для тебя ещё одна просьба от него. Знаешь те черепа с крыльями у стен? Да, убей их и возьми образец их крови.\n\nЯ знаю, у черепов нет крови! Но он говорит, что кровь есть в крыльях."
"Deliver 10 Flatbreads to Fitz the Boatman on the Serbule docks. Reward: 656 councils.": "Доставьте 10 лепёшек Фитцу Лодочнику на причалы Сербуля. Награда: 656 советов."
"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 amazing arrows? I would really appreciate it!\"": "Джопол сказал: «Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил уступить своё место Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Можешь собрать и доставить 10 000 потрясающих стрел? Я буду очень признателен!»"
"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 Awesome Arrows? I would really appreciate it!\"": "Джопол сказал: «Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил уступить своё место Калроду и стал стрелком каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 Потрясающих стрел? Я был бы очень признателен!»"
"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 basic arrows? I would really appreciate it!\"": "Джопол сказал: «Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелочником каравана. Мне очень нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 простых стрел? Я был бы очень признателен!»"
"Jopol said, \"Greetings! I used to be the Caravan's Master Carpenter, but we keep running out of arrows so quickly I decided to let Kalrod take over my position and I became the Caravan fletcher. I could really use some help getting caught up on things. Could you assemble and deliver 10,000 expert arrows? I would really appreciate it!\"": "Джопол сказал: «Приветствую! Раньше я был главным плотником каравана, но стрелы у нас заканчиваются так быстро, что я решил передать свою должность Калроду и стал стрелком каравана. Мне действительно нужна помощь, чтобы наверстать упущенное. Не мог бы ты собрать и доставить 10 000 экспертных стрел? Я буду очень признателен!»"
"Flia has asked for a large amount of Iocaine Powder.": "Флия попросила большое количество порошка Иокаина."
"Jesina wanted you to pick some unusual flowers.": "Джесина хотела, чтобы ты собрал необычные цветы."
"Deliver 10 Floral Soaps to Fitz the Boatman on the Serbule docks. Reward: 1,549 councils.": "Доставьте 10 цветочных мыл Фитцу Лодочнику на причалы Сербуля. Награда: 1 549 советов."
"Deliver 10 Flounder Fillets to Irkima in Red Wing Casino. Reward: 1,470 councils.": "Доставьте 10 филе камбалы Иркиме в казино Красное Крыло. Награда: 1 470 советов."
"Deliver 99 Flounder Fillets to Sheyna in Rahu. Reward: 26,474 councils.": "Доставьте 99 филе камбалы Шейне в Раху. Награда: 26,474 совета."
"Delia said, \"Hi! I am flat exhausted from traveling so much. Everyone else is too! We need some fresh flowers to perk everyone up. Can you make me 10 Dandelion Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Делия сказала: «Привет! Я совершенно вымотана от постоянных путешествий. Все остальные тоже! Нам нужны свежие цветы, чтобы поднять настроение всем. Ты можешь сделать для меня 10 букетов из одуванчиков? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций.»"
"Delia said, \"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect more fish so there's more to eat. Can you make me 10 of Fisherman's Arrangement #6? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Делия сказала: «Привет! Я совершенно измотана от постоянных путешествий. Мне нужно создать несколько композиций, чтобы мотивировать наших собирателей ловить больше рыбы, чтобы было больше еды. Ты можешь сделать для меня 10 Рыбацких композиций №6? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций для них.»"
"Delia said, \"Hi! I am flat exhausted from traveling so much. I need to create some arrangements to motivate our gatherers to collect wood for fires and repairs more efficiently. Can you make me 10 Lumberjack Arrangements #3? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Делия сказала: «Привет! Я совершенно вымотана от постоянных путешествий. Мне нужно создать несколько композиций, чтобы мотивировать наших сборщиков более эффективно собирать древесину для костров и ремонтов. Можешь сделать для меня 10 Лесорубских композиций №3? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций для этого.»"
"Delia said, \"Hi! I am flat exhausted from traveling so much. The smell of violets always brings me back to life! Can you make me 10 Violet Bouquets? I will gladly give you some new ideas to expand your arrangement choices for it.\"": "Делия сказала: «Привет! Я совершенно вымотана от долгих путешествий. Запах фиалок всегда возвращает меня к жизни! Можешь сделать для меня 10 фиолетовых букетов? Я с радостью поделюсь с тобой новыми идеями, чтобы расширить твой выбор композиций.»"
"George Madler asked you to get some red asters. He's going to use the flowers to create dye.": "Джордж Мадлер попросил тебя достать красные астры. Он собирается использовать цветы для создания краски."
"Deliver 10 Fluorites to Fitz the Boatman on the Serbule docks. Reward: 3,740 councils.": "Доставьте 10 флюоритов Фитцу Лодочнику на причалы Сербуля. Награда: 3 740 советов."
"Ferris Blueheart in Vidaria said, \"This one's quite simple: I need a bunch of fluxic quartz for some experiments. I don't care where you get it.\"": "Феррис Блюхарт в Видарии сказал: «Это довольно просто: мне нужно много флюксического кварца для некоторых экспериментов. Мне всё равно, где ты его достанешь.»"
"Deliver 10 Forager's Arrangement #1 to Sheyna in Rahu. Reward: 3,512 councils.": "Доставьте 10 сборок собирателя №1 Шейне в Раху. Награда: 3,512 советов."
"Deliver 10 Forager's Arrangement #2 to Sheyna in Rahu. Reward: 4,596 councils.": "Доставьте 10 сбор даров №2 Шейне в Раху. Награда: 4,596 советов."
"Deliver 10 Forager's Arrangement #3 to Sheyna in Rahu. Reward: 6,361 councils.": "Доставьте 10 упаковок собирателя №3 Шейне в Раху. Награда: 6,361 советов."
"Deliver 10 Forager's Arrangement #4 to Sheyna in Rahu. Reward: 8,725 councils.": "Доставьте 10 Сборок Собирателя №4 Шейне в Раху. Награда: 8,725 советов."
"Deliver 10 Forager's Arrangement #5 to Sheyna in Rahu. Reward: 10,505 councils.": "Доставьте 10 упаковок собирателя №5 Шейне в Раху. Награда: 10 505 советов."
"Deliver 10 Forager's Arrangement #6 to Sheyna in Rahu. Reward: 13,369 councils.": "Доставьте 10 сборок Собирателя №6 Шейне в Раху. Награда: 13,369 советов."
"Deliver 10 Forager's Arrangement #7 to Korbok in Vidaria. Reward: 18,452 councils.": "Доставьте 10 сборок собирателя №7 Корбоку в Видарию. Награда: 18,452 совета."
"Deliver 10 Forager's Arrangement #8 to Korbok in Vidaria. Reward: 24,760 councils.": "Доставьте 10 сборок собирателя №8 Корбоку в Видарии. Награда: 24 760 советов."
"Deliver 10 Forager's Arrangement #9 to Korbok in Vidaria. Reward: 33,342 councils.": "Доставьте 10 упаковок собирателя №9 Корбоку в Видарию. Награда: 33,342 совета."
"Deliver 10 Forensic Analysis Kits to Viedesi in Sun Vale. Reward: 5,870 councils.": "Доставьте 10 наборов криминалистического анализа Виедеси в Солнечную Долину. Награда: 5,870 советов."
"Deliver 10 Forensic Inspection Kits to Viedesi in Sun Vale. Reward: 2,267 councils.": "Доставьте 10 наборов для судебной экспертизы Виедеси в Солнечную Долину. Награда: 2 267 советов."
"An avatar of Tast in Povus said, You would seek even greater knowledge? Then show your worth. I demand an even greater offering of blood!\"": "Аватар Таста в Повусе сказал: Ты ищешь ещё больше знаний? Тогда докажи свою ценность. Я требую ещё большее приношение крови!"
"Liamu the Watchful in Vidaria said, \"A few of the crystals that you brought to me have interesting properties! I require further samples of these to better understand them.\"": "Лиаму Наблюдательный в Видарии сказал: «Некоторые из кристаллов, которые вы мне принесли, обладают интересными свойствами! Мне нужны дополнительные образцы, чтобы лучше их изучить.»"
"Barnaby in the Sacred Warden Grotto said, \"I've been teaching the foxes how to read by sounding out the Human language symbols. I don't think they're ready for writing yet -- truth be told I have a hard time with writing myself! But it's time they became familiar with paper and ink. We'll need a LOT of both.\"": "Барнаби в Священной стражевой пещере сказал: «Я учу лис читать, произнося символы человеческого языка. Думаю, они ещё не готовы к письму — если честно, мне самому с письмом трудно! Но пришло время им познакомиться с бумагой и чернилами. Нам понадобится ОЧЕНЬ много и того, и другого.»"
"Barnaby in the Sacred Warden Grotto said, \"We're having some trouble with the \"drawing with ink\" lessons: Rubi refuses to get her paws inked up. I think I need something less messy to help them build paw-mouth dexterity. Help me get the raw materials for a little sewing project.\"": "Барнаби в Священной пещере Хранителя сказал: «У нас возникли проблемы с уроками «рисования тушью»: Руби отказывается пачкать лапы чернилами. Думаю, мне нужно что-то менее грязное, чтобы помочь им развить ловкость лап и рта. Помоги мне достать материалы для небольшого швейного проекта.»"
"A Summer fairy named Fazzi taught you a ritual that you can use to free some Summer fae that are being tortured in the Winter Corridors.": "Летняя фея по имени Фаззи научила вас ритуалу, который можно использовать, чтобы освободить некоторых летних фей, подвергающихся пыткам в Зимних коридорах."
"Umarak in Povus said, \"My stash of cooking herbs wasn't found by the orc invaders! But sadly I am now out of basil, and I need that for many of the meals I prepare. I can tell Tryaka is less happy with my cooking, but what can I do?!\"": "Умарак в Повусе сказал: «Мой запас кулинарных трав не нашли орки-захватчики! Но, к сожалению, у меня теперь нет базилика, а он нужен для многих блюд, которые я готовлю. Я вижу, что Тряка меньше радуется моей кухне, но что я могу поделать?!»"
"Selaxi in Amulna asked for some carrots. She mentioned that there's a small garden lot in Amulna where you could grow them.": "Селакси в Амулне попросила немного моркови. Она упомянула, что в Амулне есть небольшой огород, где можно их вырастить."
"Jumper in Sun Vale's Animal Town asked you to bring him some grass.": "Прыгун из Звериного города Солнечной Долины попросил тебя принести ему немного травы."
"Gisli the stablemaster in Serbule asked you for fresh grass. Grass can be found in many ways.": "Гисли, конюший в Сербуле, попросил тебя принести свежую траву. Траву можно найти разными способами."
"Truxartis in Vidaria said, \"My experiments require fresh hematic ichor. It can be hard to find, but just keep drinking people and... you'll find it eventually. Grasuul will know the best places to look today.\"": "Труксартис в Видарии сказал: «Мои эксперименты требуют свежего гемического экстракта. Его трудно найти, но просто продолжай пить людей, и... в конце концов найдёшь. Грасуул сегодня знает лучшие места для поиска.»"
"Truxartis in Vidaria said, \"I crave fresh lifeblood! But I am too... Busy to obtain it myself. Go and fetch it for me. Speak with Grasuul, he seems to... Know where to find the easiest lifeblood.\"": "Труксартис в Видарии сказал: «Я жажду свежей живой крови! Но я слишком... занят, чтобы добыть её сам. Иди и принеси её мне. Поговори с Грасуулом, он, кажется, знает, где найти самую лёгкую живую кровь.»"
"Ailred in Povus said, \"There you are! I've been waiting so long! Let me have the orcish onion soup. And it had better be fresh!\"": "Эйлред в Повусе сказал: «Вот ты где! Я так долго ждал! Дай мне орочий луковый суп. И он должен быть свежим!»"
"Leah Bowman in Povus said, \"I don't get much work in animal husbandry any more, but I got an order from an old customer, and I would love to fill it! But what he needs is an aphrodesiac for his pet bees! Of all the weird pets, bees are way up there. I do know how to make what he needs... I just need some high-quality tallow. Could I ask you to render some for me?\"": "Лия Боумен в Повусе сказала: «У меня теперь мало работы по животноводству, но я получила заказ от старого клиента и очень хочу его выполнить! Но ему нужен афродизиак для его домашних пчёл! Из всех странных питомцев пчёлы — одни из самых необычных. Я знаю, как сделать то, что ему нужно... Мне просто нужен жир высокого качества. Не могла бы ты помочь мне его переплавить?»"
"Jumper in Sun Vale's Animal Town asked you to bring him troll flesh.": "Прыгун из Животного города в Солнечной Долине попросил тебя принести ему троллье мясо."
"Dachak in Povus said, \"See the giant mushrooms off in the distance? Yeah, those are new. Not even a year old, in fact, and whatever it means, it's definitely bad.\n\nBut you look like the sort who will wander over there anyway. If you do, can you pick some false agaric for me?\n\nYou can find false agaric all around Povus, so if you <i>aren't</i> brave, just look elsewhere.\"": "Дачак в Повусе сказал: «Видишь гигантские грибы вдали? Да, они новые. На самом деле им ещё нет и года, и что бы это ни значило, это определённо плохо.\n\nНо ты выглядишь как тот, кто всё равно туда пойдёт. Если пойдёшь, можешь собрать для меня ложный агарик?\n\nЛожный агарик можно найти по всему Повусу, так что если ты <i>не</i> храбр, просто ищи в другом месте."
"Raina in the Fae Realm said, \"I try to keep my shop stocked with the essentials... but what IS an essential, anyway? I don't personally need much, so I've been stocking a bit of everything, in case it's essential to somebody else. Despite this, sales are... not good.\n\nBut I have a lead on a sale: Crelpin asked if I had any fresh pears, and I realized I didn't! Mine are old! If you're headed out of town, please pick me up some really fresh ones. And don't eat them!\"": "Райна в Фейском царстве сказала: «Я стараюсь держать в магазине самые необходимые вещи... но что вообще считается необходимым? Лично мне нужно немного, поэтому я запасаюсь понемногу всего, на случай, если это необходимо кому-то другому. Несмотря на это, продажи... оставляют желать лучшего.\n\nНо у меня есть зацепка для продажи: Крелпин спросил, есть ли у меня свежие груши, и я поняла, что у меня их нет! Мои старые! Если ты собираешься покинуть город, пожалуйста, принеси мне действительно свежих. И не ешь их!"
"Raina in the Fae Realm said, \"I've stopped accepting special orders for fresh body parts. It's just too existentially painful. But orders for fresh mushrooms should be fine!\n\nI need some extremely fresh Pixie's Parasols. I'd pick them myself, but... well, I'm scared of pixies.\"": "Райна в Фейском царстве сказала: «Я перестала принимать особые заказы на свежие части тел. Это слишком экзистенциально болезненно. Но заказы на свежие грибы должны быть в порядке!\\n\\nМне нужны очень свежие зонтики пикси. Я бы собрала их сама, но... ну, я боюсь пикси."
"Raina in the Fae Realm said, \"Psst... thanks for your help getting those fresh bee stingers. I've got another order for really fresh butterfly wings. I'd collect them myself, but I'm very fluent in butterfly speech, and I just can't handle their dying screams right now...\"": "Райна из Фейского мира сказала: «Псс... спасибо за помощь с добычей свежих пчелиных жвал. У меня есть ещё заказ на действительно свежие крылья бабочек. Я бы собрала их сама, но я очень хорошо понимаю бабочкин язык, и сейчас я просто не могу вытерпеть их умирающие крики...»"
"Raina in the Fae Realm said, \"Don't tell Crelpin, but I've got a special order for some bee stingers. The only catch is that they have to be fresh! A certain troll will pay well for them, and I'll give you half. Deal?\"": "Райна в Фейском царстве сказала: «Не говори Крелпину, но у меня есть особый заказ на пчелиные жала. Единственное условие — они должны быть свежими! Один тролль хорошо заплатит за них, а я дам тебе половину. Согласен?»"
"Deliver 10 Fried Bananas to Laura Neth in Kur Mountains. Reward: 3,022 councils.": "Доставьте 10 жареных бананов Лауре Нет в горах Кур. Награда: 3,022 совета."
"Deliver 10 Fried Boletus Bites to Fitz the Boatman on the Serbule docks. Reward: 1,336 councils.": "Доставьте 10 жареных кусочков белого гриба Фитцу Лодочнику на причалы Сербуля. Награда: 1,336 советов."
"Deliver 10 Fried Clownfishes to Fitz the Boatman on the Serbule docks. Reward: 737 councils.": "Доставьте 10 жареных клоуновых рыб Фитцу Лодочнику на причалы Сербуля. Награда: 737 советов."
"Deliver 10 Fried Crabs to Fitz the Boatman on the Serbule docks. Reward: 1,539 councils.": "Доставьте 10 жареных крабов Фитцу Лодочнику на доках Сербуля. Награда: 1 539 советов."
"Deliver 10 Fried Lamb Chops to Fitz the Boatman on the Serbule docks. Reward: 1,383 councils.": "Доставьте 10 жареных бараньих отбивных Фитцу Лодочнику на доках Сербуля. Награда: 1,383 совета."
"Deliver 10 Fried Lungfishes to Irkima in Red Wing Casino. Reward: 1,416 councils.": "Доставьте 10 жареных лёгочных рыб Иркиме в казино Красное Крыло. Награда: 1,416 советов."
"Deliver 10 Fried Mycena Bites to Fitz the Boatman on the Serbule docks. Reward: 751 councils.": "Доставьте 10 жареных кусочков Мицены Фитцу Лодочнику на доках Сербуля. Награда: 751 совет."
"Deliver 10 Fried Mycena Bitess to Fitz the Boatman on the Serbule docks. Reward: 751 councils.": "Доставьте 10 жареных кусочков Мицены Фитцу Лодочнику на доках Сербуля. Награда: 751 совет."
"Deliver 10 Fried Potato Sticks to Fitz the Boatman on the Serbule docks. Reward: 677 councils.": "Доставьте 10 порций жареной картофельной соломки Фитцу Лодочнику на доках Сербуля. Награда: 677 советов."
"Deliver 10 Fried Spider Legs to Laura Neth in Kur Mountains. Reward: 3,731 councils.": "Доставьте 10 жареных паучьих лапок Лауре Нет в горах Кур. Награда: 3 731 совет."
"Deliver 10 Frost Nibs to Irkima in Red Wing Casino. Reward: 2,311 councils.": "Доставьте 10 Ледяных Кусочков Иркиме в казино Красное Крыло. Награда: 2,311 советов."
"Unora's sending stone in Gazluk said, \"Now let's focus on common Ice Magic deficiencies. Frostbite is an overlooked but very valuable tool in your aresenal. Use it on some tougher enemies.\n\nReturn to the metal dodecahedron outside. Stand in it and say 'Ossugazak 3'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>\"": "Камень связи Уноры в Газлуке сказал: «Теперь давай сосредоточимся на распространённых недостатках Ледяной магии. Обморожение — недооценённый, но очень ценный инструмент в твоём арсенале. Используй его на более сильных врагах.\\n\\nВернись к металлическому додекаэдру снаружи. Встань в него и скажи «Оссугазак 3». Это активирует тренировочную программу. Будь готов.\\n\\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
"Deliver 10 Fruit Cocktails to Laura Neth in Kur Mountains. Reward: 2,199 councils.": "Доставьте 10 фруктовых коктейлей Лауре Нет в горах Кур. Награда: 2 199 советов."
"Deliver 10 Fruity Mushies to Laura Neth in Kur Mountains. Reward: 5,320 councils.": "Доставьте 10 Фруктовых Грибочков Лауре Нет в горах Кур. Награда: 5,320 советов."
"Deliver 10 Fulgurites to Fitz the Boatman on the Serbule docks. Reward: 1,137 councils.": "Доставьте 10 фульгуритов Фитцу Лодочнику на доках Сербуля. Награда: 1,137 советов."
"Furlak in Rahu asked you to kill a rhino in the Fae Realm named The Puncturer.": "Фурлак в Раху попросил вас убить носорога в Области Фей по имени Прокалыватель."
"Furlak in Rahu asked you to kill a large rhino in the desert named The Perforator.": "Фурлак в Раху попросил тебя убить большого носорога в пустыне по имени Прокалыватель."
"Nishika in Rahu asked you to obtain several decent chairs.": "Нишика в Раху попросила тебя достать несколько приличных стульев."
"Deliver 10 Furpots to Laura Neth in Kur Mountains. Reward: 5,985 councils.\nNote from orderer: <i>\"I have heard of a delicacy found only among the indigenous people of Kur Mountains. I simply must try it right away!\"</i>": "Доставьте 10 меховых горшков Лауре Нет в горах Кур. Награда: 5 985 советов.  \nПримечание от заказчика: <i>«Я слышала о деликатесе, который можно найти только у коренных жителей гор Кур. Я просто обязана попробовать его прямо сейчас!»</i>"
"Deliver 10 Game Chips (any color) to Thimble Pete in Hogan's Keep, Eltibule. Reward: 500 councils.": "Доставьте 10 игровых фишек (любого цвета) Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 500 советов."
"Helena Veilmoor in Hogan's Keep asked you to get some game chips. She wasn't picky about the type.": "Хелена Вейлмур в Крепости Хоган попросила тебя достать игровые фишки. Она не была придирчива к их виду."
"You dissipated the gargoyles' toxic cloud and repelled the invasion!": "Вы рассеяли ядовитое облако гаргулий и отбили нападение!"
"Sir Fisk in Statehelm said, \"I have a lot of friends in the field and I'm afraid for them. We crossbowmen are seriously outclassed against the gargoyles in particular, and I fear an attack from them soon.\n\nIf you were to go take care of some gargoyles, I could make sure some of the discretionary fund ends up in your pocket.\"": "Сэр Фиск в Стейтхелме сказал: «У меня много друзей на поле, и я боюсь за них. Мы, арбалетчики, особенно сильно уступаем гаргульям, и я опасаюсь скорой атаки с их стороны.\\n\\nЕсли ты сможешь разобраться с несколькими гаргульями, я позабочусь, чтобы часть резервного фонда оказалась у тебя в кармане."
"Fazzi in the Winter Nexus asked you for some garnets.": "Фацци в Зимнем Нексусе попросил у вас несколько гранатов."
"Deliver 10 Garnets to Viedesi in Sun Vale. Reward: 4,420 councils.": "Доставьте 10 гранатов Виедеси в Солнечную Долину. Награда: 4,420 советов."
"Mushroom Jack in Serbule has asked you to gather yet more mushrooms for him. He wasn't particular about what kind.": "Грибной Джек в Сербуле попросил тебя собрать для него ещё больше грибов. Он не был привередлив в выборе вида."
"Pickles in the Sacred Warden Grotto said, \"I'm still reading the book you brought me, but I have good news: the big crystal inside this machine isn't broken! Because if it was broken, the magic would have leaked out and killed us all months ago.\n\nThe main crystal isn't working because the little connector gear is broken. I think some gears and parts fell out while we were fleeing our old headquarters. But these parts don't seem all that exotic... maybe we can find replacements.\n\nLet me show you what I need: a gear that looks like this, some springs, and some of these weird twist-nails. Good luck!\"": "Пиклс в Священной пещере Хранителя сказал: «Я всё ещё читаю книгу, которую ты мне принес, но у меня хорошие новости: большой кристалл внутри этой машины не сломан! Потому что если бы он был сломан, магия вытекла бы и убила нас всех ещё несколько месяцев назад.\\n\\nГлавный кристалл не работает, потому что сломалась маленькая соединительная шестерёнка. Думаю, некоторые шестерёнки и детали выпали, когда мы бежали из нашего старого штаба. Но эти детали не кажутся чем-то экзотическим... возможно, мы сможем найти замену.\\n\\nПозволь показать, что мне нужно: шестерёнка, похожая на эту, несколько пружин и несколько этих странных закрученных гвоздей. Удачи!"
"The Sand Seer in Amulna asked for some Geometric Rune Scrolls. She said that many Rakshasa in the nearby city of Rahu are gifted in making them.": "Песчаная Провидица в Амульне попросила несколько свитков с геометрическими рунами. Она сказала, что многие ракшасы в соседнем городе Раху обладают даром их создания."
"Mushroom Jack in Serbule has asked for 100 fish.": "Грибной Джек в Сербуле попросил 100 рыб."
"Joeh in Serbule asked you to obtain some intact eyes from slain tigers. \"Intact ones are pretty hard to find, but if you kill enough tigers I'm sure you'll get them.\"": "Джо в Сербуле попросил тебя добыть несколько целых глаз из убитых тигров. «Целые довольно трудно найти, но если убьёшь достаточно тигров, я уверен, что получишь их.»"
"Use Blanche's awl to chip the giant crystal near a lake somewhere around Serbule. You aren't sure what will happen when you do this. You've been told to be careful.": "Используйте шило Бланш, чтобы отколоть гигантский кристалл возле озера где-то около Сербуля. Вы не уверены, что произойдет, когда сделаете это. Вам сказали быть осторожным."
"Oritania wasn't able to assemble Dalvos's machine. She sent you to find a fairy in Eltibule named Jesina. She lives on Sie Antry's farm, west of Eltibule Keep. ": "Оритания не смогла собрать машину Далвоса. Она отправила вас найти фею в Элтибуле по имени Джезина. Она живёт на ферме Сие Энтри, к западу от крепости Элтибул."
"George Madler asked you for some cotton.": "Джордж Мэдлер попросил тебя принести немного хлопка."
"Find some of the cultural lore items scattered throughout the town of Serbule.": "Найдите несколько предметов культурного наследия, разбросанных по всему городу Сербуль."
"Joeh in Serbule asked you for a pig snout. \" You need to be a pretty good skinner in order to get one, though.\"": "Джо в Сербуле попросил у вас свиной пятачок. «Но чтобы добыть его, нужно быть довольно хорошим снящиком шкур.»"
"Pickles in the Sacred Warden Grotto said, \"The whole Warden Alert system is down. The main crystal's been down for months, but now both backup crystals are down, too! I don't know how any of this works, so I'm just going to try taking everything apart, cleaning it, and putting it back together. Unfortunately Cassie spilled my last jar of cleaning acid, which then melted most of my cleaning supplies. Can you get us some new stuff?\"": "Пиклс в Священной пещере Хранителя сказал: «Вся система оповещений Хранителя не работает. Главный кристалл не функционирует уже несколько месяцев, а теперь вышли из строя и оба запасных кристалла! Я не понимаю, как всё это работает, поэтому собираюсь просто разобрать всё, почистить и собрать обратно. К сожалению, Кэсси пролила мою последнюю банку чистящего кислоты, которая расплавила большую часть моих чистящих средств. Можешь принести нам новые материалы?»"
"Rick Snapley in New Prestonbule said, \"Sona's recovering well after her incident. Mox helped a lot. But she's still walking with a slight limp. Mox says he can make something for that, but he needs ghost puke. So if you find some, save it.\"": "Рик Снэпли в Нью-Престонбуле сказал: «Сона хорошо восстанавливается после инцидента. Мокс очень помог. Но она всё ещё ходит с лёгкой хромотой. Мокс говорит, что может сделать что-то для этого, но ему нужна призрачная рвота. Так что если найдёшь немного, сохрани.»"
"Sir Taggart in Vidaria said, \"If you're handy with a weapon, we could use help with the incessant waves of ghouls. Be careful -- they can overwhelm you!\"": "Сэр Таггарт в Видарии сказал: «Если ты умеешь обращаться с оружием, нам нужна помощь с непрекращающимися волнами вурдалаков. Будь осторожен — они могут тебя перегрузить!»"
"Deliver 10 Giant Bat Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,588 councils.": "Доставьте 10 Зелий усиления гигантской летучей мыши 20% Иркиме в казино Красное Крыло. Награда: 2 588 советов."
"Deliver 10 Giant Insect Wings to Ogamboe in the Fae Realm. Reward: 4,738 councils.": "Доставьте 10 крыльев гигантского насекомого Огамбо в Царство Фей. Награда: 4,738 советов."
"Deliver 10 Giant Mantis Claws to Fitz the Boatman on the Serbule docks. Reward: 698 councils.": "Доставьте 10 когтей гигантской богомолки Фитцу Лодочнику на доки Сербуля. Награда: 698 советов."
"Charles Thompson, a vendor in a tent outside of Serbule, asked you to obtain a sample from the gigantic super tall mushrooms in Serbule. He suggests looking for a smaller offshoot mushroom, as the giant mushrooms themselves are hard as rocks.": "Чарльз Томпсон, торговец в палатке за пределами Сербуля, попросил вас добыть образец гигантских сверхвысоких грибов в Сербуле. Он советует искать меньший боковой гриб, так как сами гигантские грибы тверды как камень."
"Silvia in Sun Vale said, \"My scrying has shown me the locations of an invasive species of oyster. Please destroy them. Their contents are irrelevant to me, as long as the oysters are killed! Here are my notes on their locations; if you have some skill in objective orienteering I'm sure you'll find them easily enough. You know how to pry oysters open, I hope?\"": "Сильвия в Солнечной Долине сказала: «Мое гадание показало мне местоположения инвазивного вида устриц. Пожалуйста, уничтожьте их. Содержимое для меня не важно, лишь бы устриц убили! Вот мои заметки о их местах; если у вас есть хоть какие-то навыки ориентирования по целям, вы наверняка легко их найдете. Надеюсь, вы умеете открывать устриц?»"
"Noita the Green in the Fae Realm said, \"Have you met Marrowchomp? Oh, hmm, actually, you should probably keep your distance from him: he can be ornery. But he's an amazing cook! And he's told me about something called barbecue, which I simply must try. Unfortunately it requires a lot of meat. A LOT of meat! But it doesn't really matter what kind, as apparently he can barbecue anything! Just make sure there's a lot of it.\"": "Нойта Зеленая в Фейском Царстве сказала: «Ты встречал Марроучомпа? Ох, хм, на самом деле тебе лучше держаться от него подальше: он может быть сварливым. Но он потрясающий повар! И он рассказал мне о чем-то, что называется барбекю, что я просто обязана попробовать. К сожалению, для этого нужно много мяса. ОЧЕНЬ много мяса! Но не важно, какого именно, потому что, по его словам, он может приготовить на барбекю что угодно! Просто убедись, что его много.»"
"Deliver 10 Gillpuncher Ointments to Fitz the Boatman on the Serbule docks. Reward: 616 councils.": "Доставьте 10 мазей Жабозуба Фитцу Лодочнику на причалы Сербуля. Награда: 616 советов."
"Deliver 10 Glazed Beets to Laura Neth in Kur Mountains. Reward: 1,884 councils.": "Доставьте 10 глазированных свёкл Лауре Нет в горах Кур. Награда: 1,884 совета."
"Deliver 10 Gloucester Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 5,786 councils.": "Доставьте 10 Глостерских сыров Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 5,786 советов."
"The Suspicious Cow in Eltibule said, \"Finally! I did the summoning ritual hours ago! Why do you Wardens even bother with a summoning ritual if you're just going to ignore me for HOURS while terrible things happen?!\n\nIt's the gnashers! They usually keep their distance and stay northwest of here, but now they've been spreading towards us. They killed a bull this morning! It was a bit north of here. And... they ate him! They ATE him! And nobody in that castle over there cares one bit! Please hurry. I know I'm delicious. It's only a matter of time!\"": "Подозрительная корова в Элтибуле сказала: «Наконец-то! Я провела ритуал призыва несколько часов назад! Зачем вам, Хранители, вообще нужен ритуал призыва, если вы собираетесь игнорировать меня ЧАСАМИ, пока происходят ужасные вещи?!\\n\\nЭто гнаши! Обычно они держатся на расстоянии и остаются к северо-западу отсюда, но теперь они распространяются к нам. Сегодня утром они убили быка! Это было немного севернее отсюда. И... они его съели! Они СЪЕЛИ его! И никому в том замке там совсем нет дела! Пожалуйста, поторопитесь. Я знаю, что я вкусная. Это лишь вопрос времени!"
"Deliver 10 Gobbledygooks to Ogamboe in the Fae Realm. Reward: 9,301 councils.": "Доставьте 10 Бессмыслиц Огамбо в Царство Фей. Награда: 9,301 совет."
"Kib the Unkillable in Red Wing Casino said, \"I need a favor from a goblin, and for that I need some goblin ale. A keg of it should be enough.\"": "Киб Неубиваемый в казино Красное Крыло сказал: «Мне нужна услуга от гоблина, и для этого мне нужно немного гоблинского пива. Бочки будет достаточно.»"
"Glortok in the Rahu Sewers said, \"I thought goblinkind eradicated the wily cave hippo years ago, but they've been hiding here! No doubt the ratkin are breeding them in a scheme to flood our waterways. Destroy the wily water-beasts before they fill our waterways and rob good, kind-hearted goblins of crucial custom!\"": "Глорток в канализации Раху сказал: «Я думал, что гоблины уничтожили хитрых пещерных бегемотов много лет назад, но они прячутся здесь! Несомненно, крысолюди разводят их в заговоре, чтобы затопить наши водные пути. Уничтожьте хитрых водяных зверей, прежде чем они заполнят наши водные пути и лишат добросердечных гоблинов важного дохода!»"
"Glortok in the Rahu Sewers said, \"These ratkin are gorging themselves on snail meat! Unacceptable! Desnailitize them immediately!\"": "Глорток в канализации Раху сказал: «Эти крысоиды объедаются мясом улиток! Недопустимо! Немедленно избавьтесь от них!»"
"Glortok in the Rahu Sewers said, \"Those creepy red-eyed rats must be a source of their power. Destroy them! No mercy!\"": "Глорток в канализации Раху сказал: «Эти жуткие красноглазые крысы, должно быть, источник их силы. Уничтожьте их! Без пощады!»"
"Glortok in the Rahu Sewers said, \"The enemy lounges and relaxes as if they were not at war! Fix it! By murdering every lazy ratkin you see!\"": "Глорток в клоаках Раху сказал: «Враг бездельничает и расслабляется, словно не в состоянии войны! Исправьте это! Убивайте каждого ленивого крысолюда, которого встретите!»"
"Glortok in the Rahu Sewers said, \"We've lost the element of surprise! Time to reclaim that surprise by killing their necromancers when they're resting. Fools! Hahahaha!\"": "Глорток в канализации Раху сказал: «Мы потеряли элемент неожиданности! Пора вернуть его, убивая их некромантов, когда они отдыхают. Глупцы! Хахахаха!»"
"Glortok in the Rahu Sewers said, \"Strike their means of production! Kill the ratkin fishermen! They will surely starve!\"": "Глорток в канализации Раху сказал: «Ударьте по их средствам производства! Убейте крысолюдских рыбаков! Они обязательно умрут с голоду!»"
"Glortok in the Rahu Sewers said, \"Go to the caves and destroy the living ratkin miners. With only undead miners left, their necromancers will be overwhelmed, and we can strike!\"": "Глорток в канализации Раху сказал: «Идите в пещеры и уничтожьте живых крысокопов. Когда останутся только неживые копатели, их некроманты будут подавлены, и мы сможем нанести удар!»"
"Glortok in the Rahu Sewers said, \"The weak point in the enemy's production is the Ratkin Necro-Shamans who control undead miners. With those shamans dead, the undead will revolt! Maybe.\"": "Глорток в канализации Раху сказал: «Слабое место в производстве врага — это некро-шаманы крысолюдей, которые контролируют нежить-шахтёров. Если этих шаманов убить, нежить восстанет! Возможно.»"
"Glortok in the Rahu Sewers said, \"The ratkin seem all too comfortable... probably because of those soldiers who wander around protecting them. Kill the soldiers, and surely their morale will falter!\"": "Глорток в канализации Раху сказал: «Крысолюди кажутся слишком спокойными... вероятно, из-за тех солдат, которые бродят вокруг, защищая их. Убейте солдат, и их боевой дух наверняка ослабнет!»"
"Glortok in the Rahu Sewers said, \"Blast it all, how can you have killed hundreds of the enemy, and yet the path home is still full of the creeps?!\n\nI bet that they're at their breaking point. Just go and kill another hundred of 'em. Doesn't matter what kind: living or dead, just kill ratkin!\"": "Глорток в канализации Раху сказал: «Чёрт побери, как ты мог убить сотни врагов, а путь домой всё ещё полон мерзавцев?!\\n\\nБьюсь об заклад, они на пределе. Просто иди и убей ещё сотню. Неважно, каких: живых или мёртвых, просто убей крысолюдей!"
"Glortok in the Rahu Sewers said, \"I give up. I'm out of ideas.\n\nWell we can't have you just staying around here, can we? You should go kill a thousand more ratkin. Just keep killing until you die. Or until a thousand ratkin are dead! It's a win-win! For me, I mean.\n\nWhat? Of course I'll make it worthwhile, buddy: if you kill a thousand ratkin I'll give you 10 pieces of xedrite. Totally worth your time, right?\"": "Глорток в канализации Раху сказал: «Я сдаюсь. У меня нет идей.\n\nНу не можем же мы позволить тебе просто тут болтаться, правда? Тебе нужно убить ещё тысячу крысолюдов. Просто продолжай убивать, пока не умрёшь. Или пока не погибнет тысяча крысолюдов! В любом случае выигрыш! Для меня, конечно.\n\nЧто? Конечно, я сделаю это стоящим, дружище: если ты убьёшь тысячу крысолюдов, я дам тебе 10 кусочков кседрита. Совсем не зря потратишь время, правда?"
"Glortok in the Rahu Sewers said, \"The ratkin just keep... surviving! How is it possible?! Perhaps we need to broaden our approach. The sewer rat may seem harmless... but it's wily and dangerous and probably somehow the secret crux of our problem!\"": "Глорток в канализации Раху сказал: «Крысолюды просто продолжают... выживать! Как это возможно?! Возможно, нам нужно расширить наш подход. Канальная крыса может казаться безобидной... но она хитрая и опасная и, вероятно, как-то является ключевой тайной нашей проблемы!»"
"Glortok in the Rahu Sewers said, \"I don't understand why those trees are down here. And I hate that! The ratkin stay away from there, as if they know some secret. I hate that, too! Kill the trees!\"": "Глорток в канализации Раху сказал: «Я не понимаю, почему эти деревья здесь, под землёй. И я это ненавижу! Крысолюди держатся подальше, словно знают какой-то секрет. Я это тоже ненавижу! Убейте эти деревья!»"
"Glortok in the Rahu Sewers said, \"The skeletal ratkin mages with electricity powers... those are very annoying! Kill them!\"": "Глорток в канализации Раху сказал: \"Скелетные крысолюдские маги с электрическими силами... они очень надоедливые! Убейте их!\""
"Glortok in the Rahu Sewers said, \"Nevermind subtlety. We want them to stop mining, so just destroy their undead miners!\"": "Глорток в канализации Раху сказал: «Забудьте о тонкостях. Мы хотим, чтобы они перестали копать, так что просто уничтожьте их неживых шахтёров!»"
"Glortok in the Rahu Sewers said, \"There are way too many snakes in this place. I bet they have some nefarious purpose. Let's outsmart the ratkin by killing these snakes before their secret scheme comes to fruition!\"": "Глорток в канализации Раху сказал: «Здесь слишком много змей. Бьюсь об заклад, у них есть какой-то коварный замысел. Давайте перехитрим крысоловов, убив этих змей, прежде чем их тайный план осуществится!»"
"A monstrosity named Yalox asked you to just kill some goblins as some sort of pointless revenge.": "Чудовище по имени Ялокс попросило тебя просто убить несколько гоблинов в качестве бессмысленной мести."
"Deliver 10 Goblin Pasties to Ogamboe in the Fae Realm. Reward: 5,720 councils.": "Доставьте 10 гоблинских пирожков Огамбо в Королевство Фей. Награда: 5,720 советов."
"Deliver 10 Gold Nugget to Irkima in Red Wing Casino. Reward: 450 councils.": "Доставьте 10 золотых самородков Иркиме в казино Красное Крыло. Награда: 450 советов."
"Deliver 10 Gold Ore to Irkima in Red Wing Casino. Reward: 3,220 councils.": "Доставьте 10 единиц золотой руды Иркиме в казино Красное Крыло. Награда: 3 220 советов."
"Poe the Myconian asked for a bunch of unrefined gold ore.": "По, миконианец, попросил кучу необработанной золотой руды."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>good armor stakes</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>хорошие костыли для брони</b>. Ты можешь сделать их для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
"Deliver 10 Good Armor Stakes to Sheyna in Rahu. Reward: 2,223 councils.": "Доставьте 10 Хороших колов для брони Шейне в Раху. Награда: 2,223 совета."
"Deliver 10 Good Metal Slabs to Irkima in Red Wing Casino. Reward: 1,192 councils.": "Доставьте 10 хороших металлических плит Иркиме в казино Красное Крыло. Награда: 1,192 совета."
"Deliver 10 Good Skinning Knives to Viedesi in Sun Vale. Reward: 1,978 councils.": "Доставьте 10 хороших ножей для снятия шкур Виедеси в Солнечной Долине. Награда: 1,978 советов."
"Deliver 100 Good Throwing Knives to Sheyna in Rahu. Reward: 2,953 councils.": "Доставьте 100 Хороших метательных ножей Шейне в Раху. Награда: 2,953 совета."
"Gorvessa hinted strongly that she would like some danablu cheese.": "Горвесса явно дала понять, что хотела бы немного сыра данаблу."
"Deliver 10 Goshenites to Sheyna in Rahu. Reward: 4,930 councils.": "Доставьте 10 гошенитов Шейне в Раху. Награда: 4,930 советов."
"Deliver 10 Gouda Cheese to Ogamboe in the Fae Realm. Reward: 23,072 councils.": "Доставьте 10 сыров Гауда Огамбо в Царство Фей. Награда: 23,072 совета."
"Ser Hackley in Statehelm said, \"Great job with the sewers, but right now we have another problem. Graffiti is getting out of control. If anyone on the Council notices, they'll take drastic, horrific, actions, like, I dunno, making the walls sentient so that they become easily enraged. Or perhaps making the town walls out of pure unlife. Whatever it is, it'll be much worse than what we have, which just requires a bit of good old fashioned hard work. By you.\n\nI can sell you the necessary graffiti cleaner. Don't worry, it's reimbursed by the payment for the job! I can sell you a bucket if you need one. Fill it with water, find graffiti, and scrub!\n\n<i>[To remove graffiti, place the Scrub Graffiti ability on your sidebar. Obtain Graffiti Cleaner. Then stand near graffiti and use the ability.]</i>\"": "Сэр Хакли в Стейтхелме сказал: «Отличная работа с канализацией, но сейчас у нас другая проблема. Граффити выходит из-под контроля. Если кто-то из Совета заметит, они примут радикальные, ужасные меры, например, не знаю, сделают стены разумными, чтобы они легко приходили в ярость. Или, возможно, сделают городские стены из чистой нежити. Что бы это ни было, это будет гораздо хуже того, что у нас есть сейчас, что требует лишь немного доброй старой тяжёлой работы. Тебя.\n\nЯ могу продать тебе необходимое средство для удаления граффити. Не волнуйся, оно компенсируется оплатой за работу! Если нужно, могу продать ведро. Наполни его водой, найди граффити и начни тереть!\n\n<i>[Чтобы удалить граффити, помести способность Тереть граффити на панель быстрого доступа. Получи средство для удаления граффити. Затем встань рядом с граффити и используй способность.]</i>"
"Ser Hackley in Statehelm said, \"Ready for more scrubbing? Great! I'll pay you the same as before. You can buy graffiti cleaner from me, or trade with me if you have other cleaners.\"": "Сэр Хакли в Стейтхельме сказал: «Готов к очередной чистке? Отлично! Я заплачу тебе так же, как и раньше. Ты можешь купить у меня средство для удаления граффити или обменяться со мной, если у тебя есть другие чистящие средства.»"
"Unless and until you can become a bat yourself, there's just no way you can master the trick Bat symbol.": "Пока вы сами не станете летучей мышью, невозможно овладеть трюком с символом Летучей мыши."
"The ornate shape of the Beer symbol will require a bit of hands-on study.": "Изысканная форма символа Пива потребует немного практического изучения."
"Without truly understanding its explosive portent, how could you ever hope to actualized the Bomb symbol?": "Не понимая по-настоящему её взрывного значения, как ты можешь надеяться воплотить символ Бомбы?"
"Thinking about it, you're pretty sure you could master drawing a bone symbol if you had about a thousand bones on hand to study.": "Если подумать, ты вполне уверен, что сможешь освоить рисование символа кости, если у тебя будет около тысячи костей для изучения."
"You know now that you'll need to practice with the bow if you ever want to properly render the twanginess of the Bow symbol.": "Теперь ты знаешь, что тебе нужно будет практиковаться с луком, если ты когда-нибудь захочешь правильно передать звучание символа Лука."
"It's almost unknowable, the Brain symbol. But you must have its secrets! This will be taxing on your own brain, but you will find the knowledge you need or die trying!": "Символ Мозга почти непостижим. Но вы должны узнать его тайны! Это будет тяжело для вашего собственного разума, но вы найдете необходимые знания или умрете, пытаясь!"
"How can the Butterfly symbol truly capture the essence of the wind? It can't: that's the job of the Wind symbol! Even so, you must understand the way the wind works on the subject. It wouldn't take but a moment to understand it, if only you were a butterfly yourself!": "Как символ Бабочки может по-настоящему передать суть ветра? Не может: это задача символа Ветра! Тем не менее, вы должны понять, как ветер действует на объект. Это заняло бы всего мгновение, если бы вы сами были бабочкой!"
"You don't think you'd need to study more than, say, 100 fireworks in order to draw a symbol of one. But you'd have to light them yourself.": "Ты не думаешь, что нужно изучить больше, скажем, 100 фейерверков, чтобы нарисовать их символ. Но их придётся зажигать самому."
"Your attempts at the Cheese symbol just don't depict its savoriness. You must go back to the cutting board.": "Ваши попытки изобразить символ Сыра просто не передают его вкусности. Вам нужно вернуться к разделочной доске."
"While a pedestrian symbol to some, the Cutlery symbol is a symbol of high honor to others. You long to bring the necessary gravitas to the task: you yourself must become a gourmand.": "Для одних это просто пешеходный знак, но для других символ столовых приборов — знак высокой чести. Вы стремитесь придать делу должную серьёзность: вы сами должны стать гурманом."
"You've tried to master the Deer symbol, but all your attempts ring hollow. You're an artist and you need to get this RIGHT! This can only be achieved by literally getting into the mind of your subject.": "Вы пытались освоить символ Оленя, но все ваши попытки звучат пусто. Вы художник, и вам нужно сделать это ПРАВИЛЬНО! Это можно достичь только буквально проникнув в сознание вашего объекта."
"You've realized that the beautiful symmetry of dice can only be understood with use. This is the path to the Die symbol.": "Вы поняли, что прекрасную симметрию кубиков можно постичь только через использование. Это путь к символу Кубика."
"Only the truly feral can master the Face (Dog) symbol. You may just not have what it takes. And that's okay. Best to leave the symbol to the worthy.": "Только по-настоящему дикие могут овладеть символом Лицо (Собака). Возможно, у вас просто нет для этого способностей. И это нормально. Лучше оставить этот символ достойным."
"To master the Female symbol, you need but study females.": "Чтобы освоить символ Женского, нужно лишь изучать женщин."
"If you knew how to catch fish with angling, you could study them better while they were dangling on the line. Yes, that's it: you must angle some fishes to master the Fish symbol.": "Если бы вы умели ловить рыбу на удочку, вы могли бы лучше изучать её, пока она болтается на крючке. Да, именно так: вам нужно поймать несколько рыб, чтобы освоить символ Рыбы."
"If you snorted some flowers, you believe you could learn to draw one by osmosis.": "Если вы вдохнули немного цветов, вы верите, что сможете научиться рисовать их методом осмоса."
"The Footprint symbol. So iconic. And yet so unknowable. Feet can take all sorts of shapes; how can you stereotype a whole body part like that? You'll need to stretch your feet in all new ways to discover the tantalizing secret of the Footprint symbol.": "Символ Отпечатка. Такой знаковый. И всё же такой непостижимый. Ноги могут принимать самые разные формы; как можно стереотипизировать целую часть тела? Тебе придётся растянуть ноги совершенно новыми способами, чтобы раскрыть манящую тайну символа Отпечатка."
"You're inspired to master the lovely bulbous globes of the grape. You'll need to taste several in order to depict their juciness just right.": "Вас вдохновило овладеть искусством изображать прекрасные округлые гроздья винограда. Вам нужно будет попробовать несколько, чтобы точно передать их сочность."
"There's so many types of hammers! You'd love to give the hammer-as-tool its due in a symbol, but how to capture its unique essence? You grit your teeth: only hands-on work at the forge will do.": "Существует так много видов молотков! Вам хотелось бы отдать должное молотку как инструменту в символе, но как передать его уникальную суть? Вы сжимаете зубы: поможет только практика у кузнечного горна."
"The heft of the battlehammer is not quite coming through in your Hammer (Weapon) symbol. In fact, you aren't managing to capture the calloused hands of the user or the heavy sweat on their brow. You're going to need to get up close and personal with the subject.": "Масса боевого молота не совсем передаётся в вашем символе Молота (Оружие). На самом деле, вам не удаётся запечатлеть мозолистые руки пользователя или тяжёлый пот на его лбу. Вам придётся подойти к объекту поближе и внимательнее."
"The Horse symbol is a potent idea that should never be misused. To control its forces you should collect many example horses. Then you can compare and contrast them.": "Символ Лошади — мощная идея, которую никогда не следует использовать неправильно. Чтобы управлять её силами, вам следует собрать много примеров лошадей. Затем вы сможете сравнивать и сопоставлять их."
"Its perfectly not-quite-symmetrical shape lends an air of mystery to the Lemon symbol -- and an air of difficulty! For only those who brave the sourness can see clearly enough to depict the lemon.": "Его идеально не совсем симметричная форма придаёт символу Лимона атмосферу тайны — и ощущение сложности! Только те, кто осмелится на кислинку, смогут достаточно ясно увидеть, чтобы изобразить лимон."
"Today you had a breakthrough: the jagged nature of the Lightning emoji will be easily mastered via repetitive application to the face. Relatively easy!": "Сегодня у вас был прорыв: зазубренная природа эмодзи Молнии будет легко освоена через многократное нанесение на лицо. Относительно просто!"
"The Male symbol's jagged angulars require a deep understanding of the subject acquired through careful study.": "Зубчатые углы символа Мужчины требуют глубокого понимания темы, приобретённого через тщательное изучение."
"There is a universal meat symbol. You just know it! How can you find it? Only through savoring meat of all kinds.": "Существует универсальный символ мяса. Ты просто чувствуешь его! Как его найти? Только через наслаждение мясом всех видов."
"Iconic and yet so hard to master! The Mushroom symbol eludes you now, but you know you're on the right track. Just 500 or so freshly-plucked examples should do it.": "Знаковый и в то же время такой сложный для освоения! Символ Гриба ускользает от вас сейчас, но вы знаете, что идёте в правильном направлении. Достаточно около 500 свежесобранных образцов."
"You've got the jingle. You've got the drape. The only thing you're missing is the subject itself. A bit of hands-on craftwork should illuminate the final aspect of the Necklace symbol.": "У тебя есть звон. У тебя есть драпировка. Единственное, чего тебе не хватает — это сам предмет. Немного практической работы поможет осветить последний аспект символа Ожерелья."
"Try as you might, the Pig symbol seems just beyond your skill. Perhaps if you lived and worked as a pig yourself! Yes, that's the only way.": "Как ни старайся, символ Свиньи кажется чуть выше твоих умений. Может, если бы ты жил и работал как свинья! Да, это единственный путь."
"Mastering the Rabbit symbol just seems so hard! You can't get into the mind of your subject. Perhaps if you lived as a rabbit for a while...": "Овладеть символом Кролика кажется таким сложным! Ты не можешь проникнуть в разум своего объекта. Возможно, если бы ты пожил некоторое время в образе кролика..."
"You know the Shield symbol should depict strength, honor, and something else. But what's the secret ingredient? You'll need to investigate.": "Ты знаешь, что символ Щита должен олицетворять силу, честь и что-то ещё. Но в чём секретный ингредиент? Тебе предстоит расследовать."
"You almost have it: the legendary Soup symbol! You just need a bit more slurping experience to understand how to craft a perfect universal indicator for the concept.": "Ты почти у цели: легендарный символ Супа! Тебе просто нужно немного больше опыта в чавкании, чтобы понять, как создать идеальный универсальный индикатор для этой концепции."
"If only they had fewer legs! The Spider symbol has proven elusive. But perhaps... Yes, perhaps if you were yourself a spider, and lived as one for some time. Could it work?": "Если бы у них было меньше ног! Символ Паука оказался ускользающим. Но, возможно... Да, возможно, если бы ты сам был пауком и жил как один некоторое время. Может, это сработает?"
"You realize that you can't quite visualize the precise grip angle you'd need for the Sword symbol. The solution is simple: learn.": "Вы понимаете, что не можете точно представить угол захвата, необходимый для символа Меча. Решение простое: учиться."
"Mastering the Tree symbol shouldn't be hard. You'll just pay extra special attention the next few times you harvest wood.": "Освоить символ Дерева не должно быть сложно. Просто уделите ему особое внимание в следующие несколько раз, когда будете собирать древесину."
"How to depict the Wind symbol? Its mysteries are limited only by the forces of nature itself. You must delve ever deeper into the heart of the storm to comprehend the Wind.": "Как изобразить символ Ветра? Его тайны ограничены лишь силами самой природы. Ты должен погружаться всё глубже в сердце бури, чтобы постичь Ветер."
"The Wizard Hat symbol Is highly-regarded, for only true wizards can master its delicate details. You vow to achieve this!": "Символ Шляпы Волшебника высоко ценится, ведь только истинные волшебники могут овладеть его тонкими деталями. Ты клянешься добиться этого!"
"Deliver 10 Grand Shaping Hammers to Sheyna in Rahu. Reward: 10,598 councils.": "Доставьте 10 Великих кузнечных молотов Шейне в Раху. Награда: 10 598 советов."
"Deliver 10 Grape Juices to Fitz the Boatman on the Serbule docks. Reward: 1,627 councils.": "Доставьте 10 виноградных соков Фитцу Лодочнику на причалы Сербуля. Награда: 1,627 советов."
"Deliver 10 Grape Shaved Ices to Ogamboe in the Fae Realm. Reward: 3,602 councils.": "Доставьте 10 ледяных крошек со вкусом винограда Огамбо в Царство Фей. Награда: 3,602 совета."
"Paullus in Statehelm said, \"Have you been practicing wine making? I'd love to try your grape wine!\"": "Пауллус в Стейтхелме сказал: «Ты занимался виноделием? Я бы с удовольствием попробовал твоё виноградное вино!»"
"Deliver 10 Grapefish to Fitz the Boatman on the Serbule docks. Reward: 297 councils.": "Доставьте 10 Грейпфишей Фитцу Лодочнику на доках Сербуля. Награда: 297 совещаний."
"Deliver 10 Grapefish Fillets to Fitz the Boatman on the Serbule docks. Reward: 529 councils.": "Доставьте 10 филе грейпфиша Фитцу Лодочнику на доках Сербуля. Награда: 529 советов."
"Deliver 99 Grapefish Fillets to Sheyna in Rahu. Reward: 12,679 councils.": "Доставьте 99 филе грейпфишей Шейне в Раху. Награда: 12 679 советов."
"Deliver 10 Grapefish Nigiri to Ogamboe in the Fae Realm. Reward: 3,996 councils.": "Доставьте 10 нигири из грейпфиш Огамбо в Фейском царстве. Награда: 3 996 советов."
"Deliver 10 Grapefish Steaks to Laura Neth in Kur Mountains. Reward: 1,504 councils.": "Доставьте 10 стейков из грейпфишей Лауре Нет в горах Кур. Награда: 1 504 совета."
"Deliver 10 Grapefish Sushi Rolls to Ogamboe in the Fae Realm. Reward: 4,288 councils.": "Доставьте 10 роллов с суши из грейпфиш Огамбо в Царство Фей. Награда: 4,288 советов."
"Deliver 10 Grapefish and Eggs to Fitz the Boatman on the Serbule docks. Reward: 2,307 councils.": "Доставьте 10 грейпфишей и яиц Фитцу Лодочнику на доках Сербуля. Награда: 2,307 советов."
"Nishika in Rahu asked you to obtain grapefish. It's an ingredient in her \"famous\" travel snacks.": "Нишика в Раху попросила тебя добыть грейпфиш. Это ингредиент для её «знаменитых» дорожных закусок."
"Sammie Grimspine in Serbule Hills said, \"Oh my gosh I really could use some grapes! They're my favorite snack. I should learn to grow them myself or something. Have you seen any?\"": "Сэмми Гримспайн в Сербульских Холмах сказал: «О боже, мне очень нужен виноград! Это моя любимая закуска. Мне стоит научиться выращивать его самому или что-то в этом роде. Ты не видел где-нибудь виноград?»"
"Deliver 10 Grasgot Cheese to Ogamboe in the Fae Realm. Reward: 21,216 councils.": "Доставьте 10 сыров Грасгот Огамбо в Царство Фей. Награда: 21 216 советов."
"Truxartis in Vidaria said, \"First and foremost, you should find my... butler. He was once a ghoul. And I suppose he is still a ghoul, of a sort. But he is ... more. He can sense hatred in the air. It is MOST valuable.\n\nGrasuul ran away when I was forced into repose. But I know where he would go: I spied a cursed lake near the ruby wall. He would no doubt be there, reveling in anguish. Grasuul is... not well.\n\nTell Grasuul that I have awoken. He will come back.\"": "Труксартис в Видарии сказал: «Прежде всего, тебе нужно найти моего... дворецкого. Он когда-то был вурдалаком. И, полагаю, он всё ещё вурдалак, в некотором роде. Но он... больше. Он чувствует ненависть в воздухе. Это ОЧЕНЬ ценно.\n\nГрасуул убежал, когда меня заставили уснуть. Но я знаю, куда он пойдёт: я заметил проклятое озеро возле рубиновой стены. Он наверняка там, наслаждаясь страданиями. Грасуул... не в порядке.\n\nСкажи Грасуулу, что я пробудился. Он вернётся."
"Gretchen in Eltibule asked you to find a crate of gratflower millet. She thinks there's some left in the storage tower in Eltibule Keep.": "Гретхен в Элтибуле попросила вас найти ящик проса благодарного цветка. Она думает, что немного осталось на складе в башне хранения в крепости Элтибул."
"Fransesca Muradrake in Statehelm said, \"Let's start with something easy that any novice should be able to manage. Fetch me fresh gravebloom. We're fortunate that it grows in the graveyard just outside of town.\n\nOf course, you know that it only blooms at night.\"": "Франсеска Мурадрейк в Стейтхелме сказала: «Давай начнём с чего-то простого, с чем справится любой новичок. Принеси мне свежий могильный цветок. Нам повезло, что он растёт на кладбище прямо за городом.\n\nКонечно, ты знаешь, что он цветёт только ночью."
"Sir Coth in Serbule has asked you to kill skeleton archers in the graveyard.": "Сэр Кот в Сербуле попросил вас уничтожить скелетных лучников на кладбище."
"Deliver 10 Great Bacons to Laura Neth in Kur Mountains. Reward: 2,049 councils.": "Доставьте 10 Великих Беконов Лауре Нет в горах Кур. Награда: 2,049 советов."
"Deliver 10 Great Battle-Priest's Pendants to Ogamboe in the Fae Realm. Reward: 19,873 councils.": "Доставьте 10 подвесок Великого Боевого Жреца Огамбо в Области Фей. Награда: 19,873 совета."
"Deliver 10 Great Calligraphy Benches to Ogamboe in the Fae Realm. Reward: 20,855 councils.": "Доставьте 10 великолепных скамей для каллиграфии Огамбо в Царство Фей. Награда: 20,855 советов."
