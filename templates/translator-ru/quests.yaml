# ── Описания ──
"Durstin Tallow in Serbule Hills said, \"I know my wife gave one of the chapters to old Julius Patton. He lives on the farm nearby. He's not a bad sort; explain things to him and see if he'll give the chapter to you.\"": "Дёрстин Тэллоу в холмах Сербуль сказал: «Я знаю, что моя жена отдала одну из глав старому Джулиусу Паттону. Он живёт на ферме неподалёку. Он неплохой человек; объясни ему всё и посмотри, даст ли он тебе главу.»"
"Durstin Tallow in Serbule Hills said, \"I know exactly where this chapter is. Well, not exactly. There used to be a caretaker that lived on a hill south of here. George left years ago, but he told me he kept a chapter of the book in a box somewhere on his farm.\n\nThere's some dwarf living there now by the name of Sammie. Go search around the place, see if you can find the chapter.\"": "Дёрстин Тэллоу в Холмах Сербуль сказал: «Я точно знаю, где эта глава. Ну, не совсем точно. Раньше на холме к югу отсюда жил смотритель. Джордж уехал много лет назад, но он говорил, что хранил главу книги в коробке где-то на своей ферме.\\n\\nСейчас там живёт какой-то гном по имени Сэмми. Пойдёшь, осмотри это место, посмотри, сможешь ли найти главу."
"Durstin Tallow in Serbule Hills said, \"One of the chapters is in that old spider-infested cave northeast of here. Tyler -- the drunk over there in the corner -- said he saw them when he was exploring, but he didn't think the pages were worth anything. And now he's too afraid to go back in.\n\nHe said they were on top of some cobweb-encrusted crates deep in the cave. I'll pay extra for that one, since it sounds dangerous.\"": "Дерстин Тэллоу в Сербульских холмах сказал: «Одна из глав находится в той старой пещере, кишащей пауками, к северо-востоку отсюда. Тайлер — пьяница в том углу — сказал, что видел их, когда исследовал пещеру, но не думал, что страницы что-то стоят. А теперь он боится туда возвращаться.\n\nОн сказал, что они лежали на вершине каких-то ящиков, покрытых паутиной, глубоко в пещере. Я заплачу больше за эту главу, так как это звучит опасно."
"Durstin Tallow in Serbule Hills said, \"My wife's diary says one of the chapters is hidden at her favorite reading spot. I guess that'd be the old watchtower overlooking the Serbule Hunting Lodge. Not a very safe reading spot these days! It's on a hill. Go past the lodge and climb the hills a little south of it.\"": "Дерстин Тэллоу в Сербульских холмах сказал: «Дневник моей жены говорит, что одна из глав спрятана в её любимом месте для чтения. Думаю, это старая сторожевая башня с видом на охотничий домик Сербуля. В наши дни это не самое безопасное место для чтения! Она на холме. Пройдите мимо домика и поднимитесь на холмы немного к югу от него.»"
"Durstin Tallow in Serbule Hills said, \"That old bi-- err, old biddy Brianna Willer has one of the chapters. But she won't give it to me. Says my wife deserved... well, she won't give it to me. Can you snoop around her farm, see if you can find it?\"": "Дерстин Тэллоу в Сербульских холмах сказал: «Та старая стерва, э-э, старая баба Брианна Уиллер имеет одну из глав. Но она не отдаст её мне. Говорит, моя жена заслужила... ну, она не отдаст её мне. Можешь ли ты поискать на её ферме, посмотреть, найдёшь ли ты её?»"
"Durstin Tallow in Serbule Hills said, \"<i>[Durstin sighs.]</i> Very bad news. I was talking to Paul the lumberjack -- he's around here somewhere -- and he knew where the last chapter was. He said it was hidden in a box near the lumber mills east of here. So he went to go get it for me... and he ran into a pack of boars on the way back. And here's the kicker: one of the boars ate the pages!\n\nPaul's scared stiff of this boar. He called it 'Mudtusks'. Seems to think it's tougher than a usual boar. But a boar's a boar, right? I think if you hurry you could get the pages out of its belly. I'll pay extra! Hurry!\"": "Дёрстин Тэллоу в холмах Сербуль сказал: \"<i>[Дёрстин вздыхает.]</i> Очень плохие новости. Я разговаривал с Полом, лесорубом — он где-то здесь — и он знал, где последняя глава. Он сказал, что она спрятана в коробке возле лесопилок к востоку отсюда. Так что он пошёл за ней для меня... и по дороге обратно наткнулся на стаю кабанов. И вот в чём дело: один из кабанов съел страницы!\\n\\nПол до смерти боится этого кабана. Он назвал его «Грязные Клыки». Кажется, думает, что он крепче обычного кабана. Но кабан есть кабан, верно? Думаю, если поторопишься, сможешь достать страницы из его брюха. Я заплачу дополнительно! Поторопись!"
"Gurki asked you for a Nice Calligraphy Bench": "Гурки попросил вас о хорошей каллиграфической скамье"
"Farsight Flemmings in Statehelm said, \"Most of my customers are out-of-town orders. Quite expensive stuff. Say! You wouldn' t be interested in helping me fill some orders, would you? Like this one for skulls and brains?\"": "Фарсайт Флеммингс в Стейтхельме сказал: \"Большинство моих клиентов делают заказы из других городов. Весьма дорогие товары. Скажите! Вы не были бы заинтересованы помочь мне выполнить несколько заказов? Например, вот этот — на черепа и мозги?\""
"Jake the Buckler in Sun Vale asked for some iridium to make his buckle shine better. He suggested that it can sometimes be mined in Kur Mountains.": "Джейк Баклер из Сан-Вейла попросил немного иридия, чтобы его пряжка сияла ярче. Он предположил, что его иногда можно добыть в горах Кур."
"Umarak in Povus said, \"All our supplies are gone, so I've had lots of trouble feeding Tryaka and myself. We're making due, but I really miss having an orange for breakfast each morning. And our gums are starting to bleed... I fear that's somehow related.\"": "Умарак в Повусе сказал: \"Все наши припасы закончились, так что у меня было много проблем с тем, чтобы прокормить Трияку и себя. Мы как-то справляемся, но мне очень не хватает апельсина на завтрак каждое утро. И наши дёсны начинают кровоточить... Боюсь, это как-то связано.\""
"Julius Patton in Serbule Hills said, \"I used to grow veggies myself, but I don't move as smoothly as I used to. Gotta save my energy for the grapes! Which means I'm in a bit of an embarrassing situation: I need to restock my larder with onions. Can you grow some for me?\"": "Юлиус Паттон в Сербульских холмах сказал: \"Раньше я и сам выращивал овощи, но двигаюсь уже не так проворно, как прежде. Надо беречь силы для винограда! А значит, я оказался в немного неловком положении: мне нужно пополнить запасы лука в кладовой. Не мог бы ты вырастить немного для меня?\""
"You jumped through the nexus portal and arrived in a cave. There's a crystal nearby that seems to beckon to you.": "Вы прыгнули через портал Нексуса и оказались в пещере. Рядом есть кристалл, который словно манит вас."
"Ailred in Povus said, \"What took you so long?! I've been waiting for more than an hour! Nevermind. I don't care about your excuses. Please prepare a stuffed bell pepper for me.\"": "Эйлред в Повусе сказал: \"Что тебя так задержало?! Я жду уже больше часа! Неважно. Мне не интересны твои оправдания. Пожалуйста, приготовь для меня фаршированный болгарский перец.\""
"Engineer Crall in Vidaria said, \"When I first left camp, I wandered a bit before settling here. I stumbled upon a dwarven man near the swamp to the north, but we lacked communication because he did not speak Orcish... or perhaps he did, and simply did not want to chat. Regardless, dwarves are often clever inventors, so would you inquire about a collaboration between us?\"": "Инженер Кралл в Видарии сказал: \"Когда я впервые покинул лагерь, я немного побродил, прежде чем обосноваться здесь. Я наткнулся на гнома у болота к северу отсюда, но мы не смогли пообщаться, потому что он не говорил на орочьем... а может, и говорил, просто не хотел болтать. В любом случае, гномы часто бывают искусными изобретателями, так не могли бы вы разузнать насчёт сотрудничества между нами?\""
"Justin Smoot in Statehelm said, \"I was thinking about my friend Az. He's never experienced an orcish birthday. That's when your friends make you medals. Joke medals. Even I had friends in Gazluk. I want to give Azagrus a bit of that experience. Here: this one's perfect. Can you give it to him?\"": "Джастин Смут в Стейтхельме сказал: \"Я думал о своём друге Азе. Он никогда не праздновал орочий день рождения. Это когда твои друзья делают тебе медали. Шуточные медали. Даже у меня были друзья в Газлуке. Я хочу подарить Азагрусу частичку этого опыта. Вот: эта подходит идеально. Можешь отнести её ему?\""
"Dachak in Povus said, \"The ratkin used to be friendly. When I was younger, they would come into town and I'd sell 'em vegetables! But after the fall of Povus they attack on sight. I had to give up mining because of them. I wish somebody would teach 'em a lesson for me! Hint, hint.\"": "Дачак в Повусе сказал: \"Раньше крысолюды были дружелюбными. Когда я был моложе, они приходили в город, и я продавал им овощи! Но после падения Повуса они нападают, едва завидев кого-то. Из-за них мне пришлось бросить добычу руды. Хотелось бы, чтобы кто-нибудь задал им урок за меня! Намёк, намёк.\""
"Pickles in the Sacred Warden Grotto said, \"We've got one backup crystal emitting alerts, but it won't last forever. We really need to get the main crystal working again! But there's nobody left alive who knows how this stuff works.\n\nBefore the massacre, there was a group of foxes that maintained the system. They taught each other the secrets of how it worked. Did they write the secrets down? No, of course they didn't. And then they ALL had to go get massacred, and now here we are.\n\nMilton won't let me bring in outside help, but I needed some expert advice, so I've been quietly using a sending-stone to chat with my old master.\n\nDon't look at me like that: my master's a great wizard! I wasn't his slave! I was his partner! Anyway, I haven't told him the specifics, so he can't be too helpful, but he thinks he has a book that'll help. And he shipped it overseas to me! It should be waiting for pickup in Rahu. I'm not sure where, exactly, but talk to the dock manager.\"": "Пиклс в Священной пещере Хранителя сказал: «У нас есть один запасной кристалл, который посылает сигналы тревоги, но он не будет работать вечно. Нам действительно нужно снова запустить главный кристалл! Но никто из живых уже не знает, как всё это работает.\\n\\nДо резни была группа лис, которые обслуживали систему. Они передавали друг другу секреты её работы. Записывали ли они эти секреты? Нет, конечно, не записывали. А потом всех их уничтожили, и вот мы здесь.\\n\\nМилтон не разрешает мне привлекать постороннюю помощь, но мне нужен был совет эксперта, поэтому я тихо использовал камень связи, чтобы поговорить с моим старым мастером.\\n\\nНе смотри на меня так: мой мастер — великий волшебник! Я не был его рабом! Я был его партнёром! В любом случае, я не рассказал ему подробности, так что он не может сильно помочь, но он думает, что у него есть книга, которая поможет. И он отправил её мне через океан! Она должна ждать меня в Раху. Я точно не знаю где, но поговори с управляющим доком."
"Elune in Statehelm said, \"You've helped me get all my stock back. And my new masterpiece is perhaps even better than the old one! I can't thank you enough. But let me try. I have an idea for a masterpiece just for you. I only need a few special ingredients! When you come back with these things, be ready to tell me what combat skills I should enchant it with.\"": "Элун в Стейтхельме сказала: \"Вы помогли мне вернуть все мои товары. И мой новый шедевр, возможно, даже лучше прежнего! Я не могу в полной мере отблагодарить вас. Но позвольте мне попытаться. У меня есть идея шедевра специально для вас. Мне нужно всего несколько особых ингредиентов! Когда вернётесь с этими вещами, будьте готовы сказать мне, какими боевыми навыками мне следует его зачаровать.\""
"Elune in Statehelm said, \"Of course, there's no chance I'll ever see my most recent masterpiece ever again. The thief no doubt valued that one over all the other trinkets in my store, and would never have parted with it. Well, I shouldn't give up hope; perhaps it will show up on the market in a few years.\n\nBut right now I need to create a NEW masterpiece. The old one was a riff on my famous rubywall crystal motif, but now I'm imagining something fresher: rubywall-like crystals, but with the darkest of aquamarines!\n\nI should get started right away while the inspiration has hit me. Unfortunately, my gem supply is gone and what I need is no ordinary aquamarine. I need just the right one.\n\nWhy don't you simply get me 100 or so and I'll just pick the best one from the batch.\"": "Элун в Стейтхелме сказала: «Конечно, нет никакой надежды когда-либо снова увидеть мой последний шедевр. Вор, без сомнения, ценил его выше всех остальных безделушек в моём магазине и никогда бы с ним не расстался. Ну, не стоит терять надежду; возможно, он появится на рынке через несколько лет.\n\nНо сейчас мне нужно создать НОВЫЙ шедевр. Старый был вариацией на тему моего знаменитого мотива кристаллов рубиволл, а теперь я представляю что-то свежее: кристаллы, похожие на рубиволл, но с самыми тёмными аквамаринами!\n\nМне стоит начать прямо сейчас, пока меня посетило вдохновение. К сожалению, мой запас драгоценных камней иссяк, и то, что мне нужно, — это не обычный аквамарин. Мне нужен именно подходящий.\n\nПочему бы тебе просто не принести мне около 100 штук, а я выберу лучший из партии."
"Eveline Rastin in Red Wing Casino said, \"Can you give this note to Willem for me? Now don't read it! Promise you won't!\"": "Эвелин Растин в казино «Красное Крыло» сказала: \"Можешь передать эту записку Виллему? Только не читай её! Обещай, что не будешь!\""
"You've awakened in a strange place and you don't remember anything. You need to get your feet under you, get your wings flapping, and figure out what happened and where you are.": "Вы очнулись в странном месте и ничего не помните. Вам нужно встать на ноги, расправить крылья и понять, что случилось и где вы находитесь."
"Engineer Crall in Vidaria said, \"The notes you brought back from Rock-Wrecker's camp are pretty clever - I wish those other engineers worked this hard when I was still around. At any rate, there's a few missing pieces of information.\n\nFor security purposes, many orcish engineers write their notes as a cipher, and they carry the key on their person. Obtain a few of these keys and bring them back, hopefully one of them is the key that I need.\"": "Инженер Кралл в Видарии сказал: «Заметки, которые ты принес из лагеря Разрушителя Камней, довольно умные — жаль, что другие инженеры не работали так усердно, когда я ещё был здесь. В любом случае, не хватает нескольких важных сведений.\\n\\nВ целях безопасности многие орочьи инженеры записывают свои заметки шифром, а ключ носят при себе. Добыть несколько таких ключей и принеси их мне, надеюсь, один из них — тот самый ключ, который мне нужен."
"Truxartis in Vidaria said, \"We shall simply create a... new potion to help me restore my... power.\n\nFirst, obtain the... simple organic ingredients.\"": "Труксартис в Видарии сказал: «Мы просто создадим... новое зелье, чтобы помочь мне восстановить мою... силу.\\n\\nСначала добыть... простые органические ингредиенты."
"Urzab in Amulna asked for a Nice Meditation Stool.": "Урзаб в Амульне попросил хороший табурет для медитации."
"Daniel Murderdark in Rahu said, \"Hey, thanks for teaching me that little ratkin-skeleton trick! It's not as amazing as the trick I taught you... but it's still pretty good! But, um... in my excitement I forgot something. I don't have one of those summoning talismans! Can you give me yours? I'll give you a lifetime of riches for it!\"": "Дэниел Мёрдердарк в Раху сказал: \"Эй, спасибо, что научили меня тому маленькому трюку с раткином-скелетом! Он не так удивителен, как трюк, которому я научил вас... но всё равно довольно хорош! Но, эм... в своём волнении я кое-что забыл. У меня нет одного из этих призывающих талисманов! Можете отдать мне свой? Я дам вам за него богатство на всю жизнь!\""
"Sammie Grimspine in Serbule Hills said, \"You know those flying monsters the ranalon have? Those 'scray'? Yeah. Well, I need a stinger from one. If you find one, bring it to me!\"": "Сэмми Гримспайн в Сербульских холмах сказал: \"Знаешь тех летающих монстров, которые есть у раналонов? Тех самых 'скреев'? Ага. В общем, мне нужно жало одного из них. Если найдёшь, принеси его мне!\""
"Daniel Murderdark in Rahu said, \"Pst... a little bird told me the most exciting rumor: there's some weird kind of skeletons in a cave under Rahu... and they're easily controllable by necromancers! I bet they're the restless undead from that rakkie war! Those rakkies could supposedly shapeshift... imagine a shapeshifting skeleton! Orrrr... they say there were dragons during the war... imagine a dragon skeleton at our command!\n\nWell, I don't care what it is, really... I have to see one! If you find it, you've gotta show me. Promise me!\"": "Дэниел Мёрдердарк в Раху сказал: «Псс... маленькая птичка рассказала мне самый захватывающий слух: в пещере под Раху есть какие-то странные скелеты... и ими легко управляют некроманты! Бьюсь об заклад, это беспокойные нежити с той раккийской войны! Говорят, те ракки могли менять облик... представь себе скелета, меняющего форму! Или... говорят, во время войны были драконы... представь себе драконьего скелета под нашим командованием!\n\nНу, мне всё равно, что это на самом деле... я должен увидеть одного! Если найдёшь — покажи мне. Пообещай!"
"Elahil in Serbule asked you to collect some Uncrossing Oil.": "Элахиль в Сербуле попросила вас собрать немного масла развязывания."
"The Sand Seer in Amulna wanted you to be on the lookout for an \"ancient magical stencil\". She suggested that she would pay well for it.": "Песчаная провидица в Амульне просила вас быть начеку в поисках \"древнего магического трафарета\". Она намекнула, что хорошо за него заплатит."
"Sirine in Rahu said, \"I went hunting with the bow you helped me repair! And it sucks. It's frankly unusable. It turns out the only reason it worked before was due to all the magic, because normal ivory doesn't bend or flex at all! I guess I let all the magic out when I replaced the ivory, and now it's junk. But not to worry! I can research the spells necessary to fix it! But that will take a while. For now, I need a substitute.\n\nI've always hunted with a bow I made myself, even back when I was a child. I'm not going to just use some store-bought bow now at age 438! Can you get me some really perfect cedar wood for a temporary bow?\"": "Сирин в Раху сказал: «Я ходил на охоту с луком, который ты помог мне починить! И он ужасен. Честно говоря, он непригоден к использованию. Оказывается, единственная причина, почему он работал раньше, была вся эта магия, потому что обычная слоновая кость совсем не гнётся и не сгибается! Похоже, я выпустил всю магию, когда заменил слоновую кость, и теперь это хлам. Но не волнуйся! Я могу изучить заклинания, необходимые для его починки! Но это займёт время. А пока мне нужен заменитель.\n\nЯ всегда охотился с луком, который сделал сам, даже когда был ребёнком. Я не собираюсь просто так использовать какой-то магазинный лук в свои 438 лет! Можешь ли ты достать мне действительно идеальную кедровую древесину для временного лука?"
"Pickles in the Sacred Warden Grotto said, \"The gear you found fits perfectly! These gears must be mass-produced by the dwarves! That's pretty amazing, right?\n\nBut that repair didn't make it go. I think I found the problem: the primary timing system is just... gone! It must have gotten lost or stolen. I've studied the similar ones in the auxiliary system, and I think if I had a dwarven weight like this one, I could rig something up with some string. Maybe? Worth a try.\"": "Пиклс в Священной пещере Хранителя сказал: «Шестерёнка, которую ты нашёл, подходит идеально! Эти шестерёнки, должно быть, массово производят гномы! Это довольно удивительно, правда?\\n\\nНо этот ремонт не запустил систему. Думаю, я нашёл проблему: основная система синхронизации просто... пропала! Наверное, её потеряли или украли. Я изучил похожие в вспомогательной системе и думаю, что если бы у меня был гномий груз, как этот, я мог бы соорудить что-то с помощью ниток. Может быть? Стоит попробовать."
"Lincha in Povus said, \"The orcs even stole my guest chair. It was pretty great, too. I wish I could find a replacement! The trouble is that I must know the chair's provenance. I won't support goblin slave labor!\"": "Линча в Повусе сказала: \"Орки даже украли мой гостевой стул. Он был и правда отличным. Хотелось бы мне найти ему замену! Но проблема в том, что я должна знать происхождение стула. Я не стану поддерживать рабский труд гоблинов!\""
"Lincha in Povus said, \"I used to have a beautiful little table where I could leave my paintings to dry. Do you want to know a secret? It was actually a repurposed calligraphy table! I would buy a replacement in an instant, as long as I was confident it wasn't made by goblin slave-labor.\"": "Линча в Повусе сказала: \"Раньше у меня был красивый маленький столик, на котором я могла оставлять свои картины сохнуть. Хочешь узнать секрет? На самом деле это был переделанный стол для каллиграфии! Я бы мгновенно купила ему замену, если бы была уверена, что она не сделана рабским трудом гоблинов.\""
"Lincha in Povus said, \"I used to have a great little meditation stool which I used while working in my garden. The orcs stole it, of course. I would pay well for a replacement... but only if I know the crafter. I don't want to accidentally support slave labor!\"": "Линча в Повусе сказала: \"Раньше у меня был отличный маленький табурет для медитации, которым я пользовалась, работая в своём саду. Орки, конечно же, украли его. Я хорошо заплачу за замену... но только если буду знать мастера, который её сделал. Я не хочу случайно поддержать рабский труд!\""
"Lincha in Povus said, \"Back before the orc attacks, my home was beautiful. Even my storage chests were beautiful pieces of art! They sell similar chests in Rahu, but I know those are made by goblin-owned slaves. I need to know my furniture is made by someone free!\"": "Линча в Повусе сказала: \"До нападений орков мой дом был прекрасен. Даже мои сундуки для хранения были прекрасными произведениями искусства! Похожие сундуки продают в Раху, но я знаю, что их делают рабы, принадлежащие гоблинам. Мне нужно знать, что мою мебель делает кто-то свободный!\""
"Truxartis in Vidaria said, \"I've used Khyrulek's journal to map a way into one of the vampire safehouses beneath Statehelm. There's a working entrance in... Vidaria! It's in the old Woodburr Farm common building. Look for a... windmill... nearby. Once you find the Tuvillic Rune, you should be able to... defeat the guardian... and enter the safehouse.\n\nOnce inside, search for these items -- I will write them down for you. You may keep anything else you find.\"": "Труксартис в Видарии сказал: «Я использовал журнал Хирулека, чтобы наметить путь в одно из убежищ вампиров под Стейтхелмом. Рабочий вход находится в... Видарии! Он в старом общественном здании фермы Вудбурр. Ищи... ветряную мельницу... поблизости. Как только найдёшь руну Тувиллик, ты сможешь... победить стража... и войти в убежище.\\n\\nОказавшись внутри, ищи эти предметы — я запишу их для тебя. Всё остальное, что найдёшь, можешь оставить себе."
"Ensign Cricket aboard the Wintertide said, \"While you're invading, would you mind exterminating those pesky birds on the main deck? Lieutenant Frostglimmer insists they're trained alarm birds that will prevent intruders from sneaking around. But they make so much noise that most of us just ignore them...\"": "Энсин Крикет на борту «Винтертайда» сказал: \"Раз уж вы вторгаетесь, не могли бы заодно истребить этих надоедливых птиц на главной палубе? Лейтенант Фростглиммер настаивает, что это обученные сигнальные птицы, которые не дадут нарушителям незаметно пробраться. Но они так шумят, что большинство из нас просто не обращает на них внимания...\""
"Deliver 10 Acid Boost Potions to Viedesi in Sun Vale. Reward: 4,262 councils.": "Доставьте 10 зелий усиления кислоты Виедези в Сан-Вейл. Награда: 4,262 councils."
"Deliver 10 Acid Resist Potions to Viedesi in Sun Vale. Reward: 5,398 councils.": "Доставьте 10 зелий сопротивления кислоте Виедези в Сан-Вейл. Награда: 5,398 councils."
"Deliver 10 Acid Shield Potions to Viedesi in Sun Vale. Reward: 8,717 councils.": "Доставьте 10 зелий кислотного щита Виедези в Сан-Вейл. Награда: 8,717 councils."
"Parella in Statehelm said, \"Here's the recipe from Gozzaroon. Make one of these, find the stone slab in the ocean, and use the beacon there. Then watch out! Ranalon will come from everywhere.\n\nKill a bunch of them to stop their progress.\n\nI suppose you could do this on your own, but were I you, I would gather some backup before attacking an army.\"": "Парелла в Стейтхелме сказала: «Вот рецепт от Гоззаруна. Сделай одну из этих свечей, найди каменную плиту в океане и используй там маяк. А потом будь осторожен! Раналоны придут отовсюду.\n\nУбей много из них, чтобы остановить их продвижение.\n\nПолагаю, ты мог бы сделать это один, но на твоём месте я бы собрал подкрепление перед атакой на армию."
"Deliver 10000 Advanced Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 1,970 councils.": "Доставьте 10000 продвинутых стрел Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 1,970 councils."
"Deliver 10000 Advanced Barbed Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,677 councils.": "Доставьте 10000 улучшенных стрел с зазубринами Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 3,677 councils."
"Deliver 10000 Advanced Dense Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,305 councils.": "Доставьте 10000 продвинутых плотных стрел Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 3,305 councils."
"Deliver 10000 Advanced Long Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,858 councils.": "Доставьте 10000 продвинутых длинных стрел Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 2,858 councils."
"Deliver 10000 Advanced Reservoir Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 12,506 councils.": "Доставьте 10000 продвинутых стрел-резервуаров Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 12,506 councils."
"Deliver 10000 Advanced Snare Arrows to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,330 councils.": "Доставьте 10000 продвинутых стрел-ловушек Напёрстку Питу в крепость Хогана, Эльтибуль. Награда: 3,330 советов."
"Deliver 10 Agates to Viedesi in Sun Vale. Reward: 4,760 councils.": "Доставьте 10 агатов Виедези в Сан-Вейл. Награда: 4,760 councils."
"Umarak in Povus said, \"I wish I could help Tryaka recover from the invasion. She has seemed distant. Even... I don't dare say it to her face... a bit afraid. I need to bring her mind back to practical matters! If I had some agates, I could convince her to return to jewelrycrafting.\"": "Умарак в Повусе сказал: \"Хотел бы я помочь Трияке оправиться после вторжения. В последнее время она кажется отстранённой. Даже... я не осмелюсь сказать ей это в лицо... немного напуганной. Мне нужно вернуть её мысли к практическим делам! Если бы у меня были агаты, я смог бы убедить её вернуться к ювелирному делу.\""
"Deliver 10 Agonizing Speed Potions to Viedesi in Sun Vale. Reward: 6,345 councils.": "Доставьте 10 зелий мучительной скорости Виедези в Сан-Вейл. Награда: 6,345 councils."
"Agrashab in the Fae Realm said, \"Basilisks are mortals, and yet some of their number have partnered with the Winter Queen -- a queen who has vowed to freeze all mortal life to death. In exchange for their treachery, these basilisks are given resistance to cold and increased strength. Show them that their strength is not limitless.\"": "Аграшаб в Царстве фей сказал: \"Василиски смертны, и всё же некоторые из них заключили союз с Зимней королевой — королевой, поклявшейся заморозить до смерти всю смертную жизнь. В обмен на своё предательство эти василиски получают сопротивление холоду и увеличенную силу. Покажите им, что их сила не безгранична.\""
"Agrashab in the Fae Realm said, \"The so-called 'firebird mountain' south of here is home to an irritating phoenix population, which terrify my subjects, but at least they don't typically hunt trolls for food! Droaches, unfortunately, do. Please head to 'Firebird Mountain' and eliminate the fire droach threat.\"": "Аграшаб в Фейском царстве сказал: \"Так называемая 'гора огненной птицы' к югу отсюда служит домом для раздражающе многочисленных фениксов, которые наводят ужас на моих подданных, но по крайней мере они обычно не охотятся на троллей ради пропитания! А вот дроучи, к сожалению, охотятся. Пожалуйста, отправляйтесь на 'Гору огненной птицы' и устраните угрозу огненных дроучей.\""
"Agrashab in the Fae Realm said, \"I've tried indirect methods of dealing with the phoenix issue, but the threat grows ever hotter. My subjects have even given a name to the birds' stolen home: 'firebird mountain.' It is not a comforting name to fire-averse trolls. Please resolve this issue by removing the phoenices.\"": "Аграшаб в Царстве фей сказал: \"Я пытался решить проблему с фениксами косвенными методами, но угроза становится всё жарче. Мои подданные даже дали украденному птицами дому название: 'гора огненных птиц'. Это название не приносит утешения троллям, боящимся огня. Пожалуйста, решите эту проблему, убрав фениксов.\""
"Agrashab in the Fae Realm said, \"There has been a recent influx of pixies, and along with them come many typical creatures. The worst of these is the so-called shocking droach, a cowardly creature that roams in packs causing chaos. We have enough chaos right now; please remove this excess.\"": "Аграшаб в Царстве фей сказал: \"В последнее время наблюдается наплыв пикси, а вместе с ними приходит множество типичных существ. Худшие из них — так называемые шокирующие дрочи, трусливые твари, которые бродят стаями, сея хаос. Хаоса у нас сейчас и так достаточно; пожалуйста, избавьтесь от этого излишка.\""
"Agrashab in the Fae Realm said, \"I do not give commandments to my children. Trolls can form alliances with anyone they want! But that doesn't mean I will stand idly by when a pack of potent war-trolls comes here and starts wreaking havoc! These winter trolls are extremely powerful and need to be stopped. Remember: I only want you to kill the giant blue trolls, not the green ones.\"": "Аграшаб в Царстве фей сказал: \"Я не отдаю приказов своим детям. Тролли могут заключать союзы с кем захотят! Но это не значит, что я буду стоять сложа руки, когда сюда приходит стая могучих боевых троллей и начинает сеять хаос! Эти зимние тролли чрезвычайно сильны, и их нужно остановить. Помни: я хочу, чтобы ты убивал только гигантских синих троллей, а не зелёных.\""
"Deliver 10 Aiming Potions to Viedesi in Sun Vale. Reward: 3,207 councils.": "Доставьте 10 зелий меткости Виедези в Сан-Вейл. Награда: 3,207 councils."
"Strom Farblood in Statehelm said, \"I know you understand the basics of alchemy, but you'll need to understand more than just the basics before I can teach you with a clean conscience. I need to know that you can safely handle dangerous substances, can source exotic ingredients, and can make a palatable potion. I'll teach you an alchemical formula, you make it and bring it to me. I drink it. Easy as that.\"": "Стром Фарблад в Стейтхельме сказал: \"Я знаю, что вы понимаете основы алхимии, но вам нужно понимать не только основы, прежде чем я смогу учить вас с чистой совестью. Мне нужно знать, что вы умеете безопасно обращаться с опасными веществами, можете добывать экзотические ингредиенты и способны приготовить сносное зелье. Я научу вас алхимической формуле, вы изготовите его и принесёте мне. Я его выпью. Проще простого.\""
"Michael Irasce in Statehelm said, \"I have a special book order for alchemy tutorials. I have some of the needed books, but here are the ones I don't have copies of. Can you look for them? I'll pay well.\"": "Майкл Ираск в Стейтхельме сказал: \"У меня есть особый заказ на книги по алхимии. Некоторые из нужных книг у меня уже есть, но вот этих у меня нет в копиях. Не могли бы вы поискать их? Я хорошо заплачу.\""
"Aceri said, \"I could use your assistance! I hear there is an orcish potion that can enhance your combat readiness.  Could you get me 10 of those Gur-Hortas? I need to reverse engineer them so I can make them for the whole group.\"": "Ацери сказал: \"Мне бы пригодилась твоя помощь! Я слышал, есть орочье зелье, которое может повысить твою боевую готовность. Не мог бы ты принести мне 10 таких Гур-Хорт? Мне нужно разобрать их состав, чтобы я мог делать их для всей группы.\""
"Aceri said, \"I could use your assistance! I hear there is a speed potion that a lot of folks craft around here to get around easier. Could you get me 10 of those Agonizing Speed Potions? I need to reverse engineer them so I can make them for the whole group.\"": "Ацери сказала: \"Мне бы пригодилась твоя помощь! Я слышала, что здесь многие делают зелье скорости, чтобы легче передвигаться. Не мог бы ты принести мне 10 таких Мучительных зелий скорости? Мне нужно разобрать их, чтобы понять устройство и сделать их для всей группы.\""
"Jaime Fatholm asked for a lot of clownfish.": "Джейме Фатхольм попросил много рыбы-клоуна."
"Deliver 10 All-Flavor Chickens to Irkima in Red Wing Casino. Reward: 3,143 councils.": "Доставьте 10 кур «На любой вкус» Иркиме в казино «Красное Крыло». Награда: 3,143 councils."
"Stephie Blackhammer in Povus said, \"It's my job to keep uncle Tremmond working at top capacity, and he's almost out of <b>amazing armor patch kits</b>. Can you make some for me?\n\nMy uncle follows dwarven crafting-guild rules strictly. That means I can't accept tools that you didn't make yourself!\"": "Стефи Блэкхаммер в Повусе сказала: «Моя задача — поддерживать дядю Треммонда в полной боевой готовности, а у него почти закончились <b>потрясающие наборы для починки брони</b>. Ты можешь сделать их для меня?\\n\\nМой дядя строго придерживается правил гильдии кузнецов-гномов. Это значит, что я не могу принять инструменты, которые ты сделал не сам!"
