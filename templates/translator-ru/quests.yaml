"Ailred in Povus said, \"I've had a VERY long time to look at the menu, so yes, I'm ready to place my food order! I saw that you have fresh amberjack on the fish list. How is that even possible?! I guess amberjack is native to here? Well, I simply must try this dish.\"": "Эйлред в Повусе сказал: «У меня было ОЧЕНЬ много времени, чтобы изучить меню, так что да, я готов сделать заказ! Я видел, что у вас в списке рыб есть свежий амберджек. Как это вообще возможно?! Полагаю, амберджек — местная рыба? Ну, я просто обязан попробовать это блюдо.»"
"Deliver 10 Grilled Chickens to Laura Neth in Kur Mountains. Reward: 3,048 councils.": "Доставьте 10 жареных цыплят Лауре Нет в горах Кур. Награда: 3 048 советов."
"Bellema Deftwhisper in New Prestonbule said, \"I'm Mox's backup when we go out on expeditions. The stuff in the caves isn't too bad, but the stuff in the snow can be pretty scary! I'm not confident my crossbow can handle those huge bears before they have time to maul one of us. Can you kill some and let me know how hard they are to kill? Just a few will do. Like... five. No! Eight. That's a more scientific number.\"": "Беллема Дефтвиспер в Нью Престонбуле сказала: «Я — запасной стрелок Мокса, когда мы отправляемся на экспедиции. В пещерах не так уж страшно, но в снегу бывает довольно жутко! Я не уверена, что мой арбалет справится с этими огромными медведями, прежде чем они успеют наброситься на кого-то из нас. Можешь убить несколько и сказать, насколько их сложно убить? Достаточно нескольких. Ну... пять. Нет! Восемь. Это более научное число.»"
"Deliver 10 Groovalus to Ogamboe in the Fae Realm. Reward: 9,749 councils.": "Доставьте 10 Грувалусов Огамбо в Царство Фей. Награда: 9 749 советов."
"Fransesca Muradrake in Statehelm said, \"I do appreciate what you've done to stop Grosark. But I've bad news: what you slew was merely Grosark's bodily husk, a sort of meat puppet that he wore because he didn't realize that liches don't need them. But the good news is that he doesn't know enough about his powers to be particularly dangerous to our realm yet. Some of his soul is in Acur, and the rest of it is trapped here, bodiless, in what is called an astral state.\n\nBut the bad news is that he can escape this state easily if he only knew how, and he is researching furiously. I've detected his presence near the ivory library. He can't get in, of course, even in astral form, but it shows that he knows what he needs. It's only a matter of time.\n\nBut the good news is that long ago I researched the perfect ritual for this situation. The Statehelm graveyard may seem an ordinary one, but it was actually configured by the Council to support extreme necromantic rituals. You can use that place to pull Grosark into our realm now, while he is weak and confused. It's the only way. Aside from the myriad other ways, of course, but it's the only way I recommend.\n\nHere are the notes. Follow them diligently. And bring a friend. No, bring an army! No, that would be chaos. Bring between five and fifteen friends.\n\nOh! You'll need a summoning candle. Can you make them? No, nevermind, let me teach you precisely how to make it safely. No sense getting you turned into an ectoplasmic pudding. It's a relatively simple candle... I trust you know your way around a candlemaking station? There's one conveniently located in the crypt.\"": "Франсеска Мурадрейк в Стейтхелме сказала: «Я ценю то, что ты сделал, чтобы остановить Гросарка. Но у меня плохие новости: то, что ты убил, было лишь телесной оболочкой Гросарка, своего рода мясной марионеткой, которую он носил, потому что не понимал, что личи не нуждаются в теле. Но хорошая новость в том, что он ещё не знает достаточно о своих силах, чтобы быть особенно опасным для нашего мира. Часть его души находится в Акюре, а остальная часть заперта здесь, без тела, в так называемом астральном состоянии.\n\nНо плохая новость в том, что он может легко выйти из этого состояния, если только узнает как, и он активно исследует это. Я обнаружила его присутствие рядом с слоновой библиотекой. Он, конечно, не может войти, даже в астральной форме, но это показывает, что он знает, что ему нужно. Это лишь вопрос времени.\n\nНо хорошая новость в том, что давно я исследовала идеальный ритуал для такой ситуации. Кладбище Стейтхелма может показаться обычным, но на самом деле оно было устроено Советом для поддержки экстремальных некромантских ритуалов. Ты можешь использовать это место, чтобы сейчас, пока он слаб и сбит с толку, вытащить Гросарка в наш мир. Это единственный способ. Помимо множества других, конечно, но это единственный способ, который я рекомендую.\n\nВот заметки. Следуй им тщательно. И возьми с собой друга. Нет, возьми армию! Нет, это будет хаос. Возьми от пяти до пятнадцати друзей.\n\nО! Тебе понадобится свеча призыва. Ты умеешь их делать? Нет, неважно, я научу тебя точно, как сделать её безопасно. Не хочу, чтобы ты превратился в экзоплазменный пудинг. Это относительно простая свеча... Надеюсь, ты умеешь обращаться с мастерской по изготовлению свечей? Там есть одна, удобно расположенная в склепе."
"You repelled Grosark's invasion into our realm!": "Вы отразили вторжение Гросарка в наш мир!"
"Ensign Cricket aboard the Wintertide said, \"The lowest deck is mostly empty and just used for storage. We've stored a bunch of mortal specimens down there for later analysis.\n\nThe mortal realm near here is full of really beautiful things. Beautiful flowers! Talking trees! 'Elves'! Real dragons! But what's in the hold? ... cow-men.\n\nThey're going to try to breed them into an army, so you should totally go stop them.\"": "Мичман Крикет на борту «Винтертайда» сказал: «Самая нижняя палуба в основном пуста и используется только для хранения. Там мы храним множество смертных образцов для последующего анализа.\\n\\nМир смертных неподалёку полон действительно красивых вещей. Красивых цветов! Говорящих деревьев! \"Эльфов\"! Настоящих драконов! А что в трюме? ... человекокоров.\\n\\nОни собираются вывести из них армию, так что тебе определённо стоит их остановить."
"Percy in Eltibule encouraged you to kill Bear Groupies near The Mangler.": "Перси в Элтибуле попросил вас убивать фанатов Медведя возле Манглера."
"Hemmit Magmagrip in New Prestonbule said, \"I need you to go spelunking! There are caves all through the mountains, and some of them have mushrooms growing inside.\n\nThere's a kind of mushroom found only in this mountain range. Orcs call it 'Groxmax'. You'll know them by the stench of rotten meat. I'll pay well for them! Oh, and if you find other kinds of mushrooms, hold on to them too; I may need them.\"": "Хеммит Магмагрип в Нью-Престонбуле сказал: «Мне нужно, чтобы ты пошёл исследовать пещеры! По всей горной цепи есть пещеры, и в некоторых из них растут грибы.\\n\\nЕсть вид грибов, который встречается только в этих горах. Орки называют их «Гроксмакс». Ты узнаешь их по запаху гнилого мяса. Я хорошо заплачу за них! О, и если найдёшь другие виды грибов, тоже забирай их; они могут мне понадобиться."
"Helena Veilmoor in Hogan's Keep asked you to get something written by the poet Gruzark. She didn't seem to know where Gruzark lives, though.": "Хелена Вейлмур в Хоганском Крепости попросила тебя достать что-то, написанное поэтом Грузарком. Однако она, похоже, не знала, где живет Грузарк."
"Trasen in Serbule Hills said, \"There are several types of ranalon around here. The large ones with the dangling orb on their heads are my favorite. I would love to see how their glow balls work. Well, if you happen to find any, please show them to me!\"": "Трасен в Холмах Сербуль сказал: «Здесь водится несколько видов раналонов. Большие с висящим шаром на голове — мои любимые. Мне бы очень хотелось узнать, как работают их светящиеся шары. Если вдруг найдёте таких, пожалуйста, покажите мне!»"
"Deliver 10 Guava Beet Muffins to Laura Neth in Kur Mountains. Reward: 4,145 councils.": "Доставьте 10 маффинов с гуавой и свеклой Лауре Неф в горах Кур. Награда: 4,145 советов."
"Deliver 10 Guava Bowls to Laura Neth in Kur Mountains. Reward: 4,407 councils.": "Доставьте 10 чаш с гуава Лауре Нет в горах Кур. Награда: 4 407 советов."
"Deliver 10 Guava Shaved Ices to Ogamboe in the Fae Realm. Reward: 9,726 councils.": "Доставьте 10 щербетов из гуавы Огамбо в Фейском мире. Награда: 9 726 советов."
"Hogan in Hogan's Keep asked you to collect some guavas.": "Хоган в Крепости Хогана попросил тебя собрать несколько гуав."
"Nelson Ballard in Serbule said, \"I'm worried about something that's probably far-fetched... but I don't dare ignore the possibility. That fool elf Pennoc invited a traveling circus from Senoca to come visit here. We're much too small for a circus to normally bother with, but he promised them an exceptionally friendly welcome, \"in elven style\", and he even promised free room and board for weeks!\n\nI would have had Pennoc thrown in the dungeon if we had a dungeon. <i>Sigh.</i> What if his ploy works and the circus comes here? I barely have enough supplies for the elven refugees, let alone a bunch of circus freaks! Can you help me prepare for the worst-case scenario?\"": "Нельсон Баллард в Сербуле сказал: «Меня беспокоит кое-что, что, вероятно, звучит неправдоподобно... но я не смею игнорировать такую возможность. Тот глупый эльф Пеннок пригласил к нам путешествующий цирк из Сеноки. Мы слишком маленькое место, чтобы цирк обычно обращал на нас внимание, но он пообещал им исключительно тёплый приём «в эльфийском стиле» и даже бесплатное проживание и питание на несколько недель!\n\nЯ бы посадил Пеннок в темницу, если бы у нас была темница. <i>Вздыхает.</i> Что если его уловка сработает и цирк приедет сюда? У меня едва хватает припасов для эльфийских беженцев, не говоря уже о куче цирковых уродов! Ты можешь помочь мне подготовиться к худшему?"
"Red in Kur Mountains said, \"Well, if Spot likes you, I guess you're okay. With your help, we might make it through winter after all. But I'll warn you: you'll have to go up against werewolves. If you want to back out, I completely understand. I'm not stupid enough to take werewolves on either!\"": "Ред в горах Кур сказал: «Ну, если Спот тебя любит, значит, ты нормальный. С твоей помощью мы, возможно, переживём зиму. Но предупреждаю: тебе придётся сразиться с оборотнями. Если хочешь отказаться, я полностью пойму. Я тоже не настолько глуп, чтобы сражаться с оборотнями!»"
"Ser Lorentz in Vidaria said, \"We are fully stocked up on supplies now, and it's time to take the fight to the demons! Gather your own troops, and help us cull these endless hordes.\"": "Сэр Лоренц в Видарии сказал: «У нас теперь полный запас припасов, и пришло время перейти в наступление на демонов! Соберите свои войска и помогите нам истребить эти бесконечные орды.»"
"The Sand Seer in Amulna said, \"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.\"": "Песчаный Провидец в Амульне сказал: «Вы были добры, что навестили меня. Я боюсь за будущее этого маленького городка, и дело не в жалких существах, бродящих по пустыне. Нет, беда исходит из глубин <i>под</i> песками. Я узнал, что там находятся тысячи солдат Гегемонии Старух, оставшихся после относительно недавней войны. Они размножаются, строят козни и очень, очень злы. Это лишь вопрос времени, когда они восстанут и захватят пустыню. Вы должны нанести удар, пока они еще слабы и не готовы. Найдите входы в их туннели и положите конец этой опасности.»"
"The Sand Seer in Amulna said, \"It was good of you to see me. I fear for this little town's future, and it's not because of the meager creatures that rove the desert. No, the trouble comes from deep <i>beneath</i> the sands. I've learned that there are thousands of Crone Hegemony troops down there, left behind after some relatively-recent war. They are breeding, and scheming, and very, very angry. It's only a matter of time before they rise up and claim the desert. You must strike while they are still weak and unprepared. Seek out their tunnel entrances and put an end to the danger.\n\nOh! And since you'll be heading down there anyway, perhaps you could collect some items for me? I mean, it'd be foolish to waste this opportunity to study Hegemony weapons...\"": "Песчаный Провидец в Амульне сказал: «Вы были добры, что навестили меня. Я боюсь за будущее этого маленького городка, и дело не в жалких существах, бродящих по пустыне. Нет, беда исходит из глубин <i>под</i> песками. Я узнал, что там находятся тысячи солдат Гегемонии Старух, оставшихся после относительно недавней войны. Они размножаются, строят козни и очень, очень злы. Это лишь вопрос времени, когда они восстанут и захватят пустыню. Вы должны нанести удар, пока они еще слабы и не готовы. Найдите входы в их туннели и положите конец этой опасности.\n\nО! И раз уж вы всё равно собираетесь туда спуститься, может, соберёте для меня кое-какие предметы? Было бы глупо упускать возможность изучить оружие Гегемонии..."
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\"": "Перси Эванс в Элтибуле сказал: «У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда была новая луна, я призвал Талерру, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\\n\\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком \"Подними-Меня\". Пока я на этом соке, я могу чувствовать надежду, но когда он заканчивается, я почти впадаю в ступор. В прошлый раз так было, я чуть не умер от обезвоживания, пока Хоган случайно не зашёл ко мне.\\n\\nПоэтому я стараюсь держать его в организме постоянно. Но я никогда не был силён в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас."
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but I go almost catatonic when it wears off. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times. But I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\n\nI also need something to inhibit my memories of despair... it makes the Juice last longer. Some ditzy elf gave me a few bottles last week, but she said she can't make enough to keep me going. Elves: always flaking out when you need 'em! Ahem... no offense to you and your friends, of course.\"": "Перси Эванс в Элтибуле сказал: «У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда луна была новой, я призвал Талерру, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\\n\\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком «Подними настроение». Пока я на этом соке, я могу чувствовать хоть какую-то надежду, но когда он заканчивается, я почти впадаю в ступор. В прошлый раз так было, я чуть не умер от обезвоживания, пока случайно не зашёл Хоган.\\n\\nПоэтому я стараюсь держать его в организме постоянно. Но я никогда не был силён в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас.\\n\\nМне также нужно что-то, что подавляет мои воспоминания о отчаянии... это продлевает действие сока. Какая-то рассеянная эльфийка дала мне несколько бутылок на прошлой неделе, но сказала, что не может сделать достаточно, чтобы я продолжал. Эльфы: всегда подводят, когда нужны! Кхм... конечно, без обид тебе и твоим друзьям."
"Percy Evans in Eltibule said, \"You have a lot of friends, right? I need your help fast or I won't make it. When the moon was new, I called upon Talerra to find out where my wife's soul went. She answered me! And now I pay her customary price: I can't feel hope for a full year.\n\nI know it sounds foolish, but I thought I'd outsmarted her by stockpiling Pick-Me-Up Juice. As long as I'm on the Juice, I can feel some hope, but when it wears off I go almost catatonic. Last time that happened, I almost died of dehydration before Hogan happened to stop by.\n\nSo I try to keep it in my system at all times, but I was never very good at math, and a few hundred bottles won't last even close to a year! I need a bigger supply.\n\nI also need something to inhibit my memories... there's a potion that does it, but damned if I can get a steady supply of it. But any amount is helpful.\n\nOh, and I'd be much obliged if you could clean up some of those damned fairy bears! I haven't been able to get to thinning their numbers myself recently.\"": "Перси Эванс в Элтибуле сказал: «У тебя много друзей, правда? Мне нужна твоя помощь срочно, иначе я не справлюсь. Когда была новая луна, я обратился к Талерре, чтобы узнать, куда ушла душа моей жены. Она ответила мне! И теперь я плачу ей обычную цену: я не могу чувствовать надежду целый год.\n\nЗнаю, звучит глупо, но я думал, что перехитрил её, запасаясь соком «Подними настроение». Пока я на этом соке, я могу чувствовать хоть какую-то надежду, но когда эффект проходит, я почти впадаю в кататонию. В последний раз так было, я чуть не умер от обезвоживания, пока случайно не зашёл Хоган.\n\nПоэтому я стараюсь держать сок в организме постоянно, но я никогда не был хорош в математике, и несколько сотен бутылок не хватит даже близко на год! Мне нужен больший запас.\n\nЕщё мне нужно что-то, что подавляет мои воспоминания... есть зелье, которое это делает, но, чёрт возьми, я не могу наладить постоянные поставки. Но любое количество поможет.\n\nАх да, я был бы очень признателен, если бы ты помог избавиться от этих проклятых фейри-медведей! В последнее время у меня не было возможности уменьшить их численность самому."
"Percy Evans in Eltibule said, \"I need you to help me reincarnate Lydia. Her soul is still trapped in this bauble you retrieved for me, but I think I can get her a new body. How? Well... don't ask me how I got a hold of this ritual, because that would make you sad. Instead, just help me bring her back! I need some very specific ingredients. Lord Eltibule is buried with one part. The other parts might be harder to find... but you're resourceful, you can do it!\"": "Перси Эванс в Элтибуле сказал: «Мне нужна твоя помощь, чтобы реинкарнировать Лидию. Её душа всё ещё заперта в этой безделушке, которую ты для меня достал, но я думаю, что смогу найти ей новое тело. Как? Ну... не спрашивай, как я получил этот ритуал, потому что это тебя огорчит. Вместо этого просто помоги мне вернуть её! Мне нужны очень специфические ингредиенты. Лорд Элтибул похоронен с одной частью. Другие части могут быть сложнее найти... но ты находчив, ты справишься!»"
"Spot in Animal Town said, \"Hi! If you like to help animals, you should help us, because we're animals. And we need help! Sebastian and Grana went away to rescue some smart snails in Verta, but they took too much of our food. Now we don't have enough. When they come back I'll say, 'I'm not mad, I'm just disappointed,' and they'll know I'm actually really mad. But right now we need new food.\"": "Житель Города Животных сказал: «Привет! Если ты любишь помогать животным, тебе стоит помочь нам, потому что мы — животные. И нам нужна помощь! Себастьян и Грана отправились спасать умных улиток в Верте, но они взяли слишком много нашей еды. Теперь у нас её не хватает. Когда они вернутся, я скажу: «Я не злюсь, я просто разочарован», и они поймут, что я на самом деле очень зол. Но сейчас нам нужна новая еда.»"
"Nissim in Amulna said, \"I want Amulna to be a welcoming place for all creatures, but so few desert-dwellers behave appropriately. Even our fellow Rakshasa have attacked our settlement several times this year. And then the roving packs of cat-things attacked... and of course those ridiculous human-faced cat things...\n\nSimply put, the Sand Seer is the only reason we haven't been overrun already. But she won't be living here forever. This part of the desert must be made more secure!\"": "Ниссим в Амульне сказал: «Я хочу, чтобы Амульна была гостеприимным местом для всех существ, но так мало обитателей пустыни ведут себя должным образом. Даже наши сородичи ракшасы несколько раз в этом году нападали на наше поселение. А потом напали бродячие стаи кошачьих... и, конечно, эти нелепые кошки с человеческими лицами...\n\nПроще говоря, Песчаная Провидица — единственная причина, по которой нас ещё не захватили. Но она не будет жить здесь вечно. Этот участок пустыни должен стать более безопасным!"
"Percy Evans in Eltibule said, \"When I beseeched Talerra, she told me what I'd somehow known all along: my Lydia didn't fade into blessed nothing. The thing that killed her captured her soul and keeps it as a trinket.\n\nI'm helpless to save her -- she's in that damned fairy realm, but it's not reachable from the portal I know about. There must be some other way to get in. If you find the way in, kill all the fiends you can! Look for a floaty snake thing called the Despair Puck. It will have Lydia's soul.\"": "Перси Эванс в Элтибуле сказал: «Когда я умолял Талерру, она сказала мне то, что я как-то знал всё время: моя Лидия не растворилась в благословенном ничто. Существо, которое убило её, захватило её душу и хранит её как безделушку.\n\nЯ бессилен её спасти — она в этом проклятом фейском мире, но я не знаю портала, через который туда попасть. Должен быть какой-то другой путь. Если найдёшь вход, убей всех бесов, которых сможешь! Ищи плавающую змееподобную тварь под названием Пак Отчаяния. У неё будет душа Лидии."
"Ser Lorentz in Vidaria said, \"We need all the help we can get. The demons seem to be never-ending, and our supplies are ever-dwindling. Armor, weapons, rations - you name it, we need it! Statehelm is providing as many as they can, but it's simply not enough. Can we count on you and your people to aid us?\"": "Сэр Лоренц в Видарии сказал: «Нам нужна вся возможная помощь. Демонов, кажется, не счесть, а наши запасы постоянно истощаются. Доспехи, оружие, пайки — что угодно, нам это нужно! Стейтхелм предоставляет столько, сколько может, но этого просто недостаточно. Можем ли мы рассчитывать на вас и вашу команду?»"
"Deliver 10 Gul Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 19,663 councils.": "Доставьте 10 сыров Гул Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 19,663 совета."
"Deliver 10 Gur-Hortas to Irkima in Red Wing Casino. Reward: 2,357 councils.": "Доставьте 10 Гур-Хортас Иркиме в казино Красное Крыло. Награда: 2 357 советов."
"Gurki asked you to obtain some unrefined silver ore.": "Гурки попросил тебя добыть немного неочищенной серебряной руды."
"Deliver 10 Haerel Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 17,126 councils.": "Доставьте 10 сыров Хаэрел Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 17,126 советов."
"Selaxi in Amulna has asked you to obtain giant hairballs. The most common source is grimalkin in the desert.": "Селакси в Амульне попросил вас добыть гигантские шарики из шерсти. Самый распространённый источник — грималкин в пустыне."
"Deliver 10 Halloumi Cheese to Ogamboe in the Fae Realm. Reward: 22,542 councils.": "Доставьте 10 сыров Халлуми Огамбо в Царство Фей. Награда: 22 542 совета."
"Deliver 10 Hammer Boost Potion 20% to Irkima in Red Wing Casino. Reward: 2,680 councils.": "Доставьте 10 Зелий Усиления Молота 20% Иркиме в Казино Красное Крыло. Награда: 2,680 советов."
"An avatar of Tast in Povus said, Kill in my name and you shall have the knowledge that you seek: schematics for armor that is strong enough even for you!\"": "Аватар Таста в Повусе сказал: Убей от моего имени, и ты получишь знание, которое ищешь: чертежи брони, достаточно прочной даже для тебя!"
"Kelim in Amulna said, \"Oh, right, the spices. Before I let you have some, can you bring me some cranberries? Cranberries are <i>amazing</i> with turkey. \"": "Келим в Амульне сказал: «О, точно, специи. Прежде чем я дам тебе немного, можешь принести мне клюкву? Клюква <i>потрясающе</i> сочетается с индейкой.»"
"Ricatu in Povus said, \"I want some meatballs. Think you can do meatballs? But it needs to have something harvest-y going on.  You'll have to find the recipe yourself.\n\nAnd remember, no actual dead turkeys -- or gods forbid, cows!\"": "Рикату в Повусе сказал: «Я хочу фрикадельки. Думаешь, сможешь сделать фрикадельки? Но в них должно быть что-то связанное с урожаем. Рецепт тебе придётся найти самому.\n\nИ помни, никаких настоящих мёртвых индюшек — и бог forbid, коров!"
"Braigon in Eltibule said, \"Tofu can be made in three main ways. Firm tofu is used when the recipe calls for a protein that won't fall apart! I can teach you how to make it in exchange for a fresh Brunost cheese.\"": "Брейгон в Элтибуле сказал: «Тофу можно приготовить тремя основными способами. Плотное тофу используется, когда в рецепте нужен белок, который не развалится! Я могу научить тебя делать его в обмен на свежий сыр Бруност.»"
"Ricatu in Povus said, \"It's the harvest season and all my friends are eating turkey: perfectly baked turkey, turkey stir-fry, turkey pot pie ... But killing turkeys to consume their flesh is obviously wrong.\n\nI hear you can make fake meat out of that fake milk somehow. I don't know if I believe myself, but it sure would be convenient to have a plant-based turkey!\n\nI hear that Braigon in Eltibule knows how. Why don't you go ask him?\"": "Рикату в Повусе сказал: «Сезон урожая, и все мои друзья едят индейку: идеально запечённую индейку, жаркое из индейки, пирог с индейкой... Но убивать индейку ради мяса — это явно неправильно.\n\nЯ слышал, что из этого искусственного молока можно как-то сделать фальшивое мясо. Не знаю, верю ли я в это сам, но было бы очень удобно иметь растительную индейку!\n\nГоворят, что Брайгон в Элтибуле знает, как это сделать. Почему бы тебе не спросить его?"
"Ricatu in Povus said, \"Plain old tofurkey is ... plain. Bring me a better one! One with some bite! Maybe some citrus to cut the savory some. But you'll have to find the recipe yourself.\"": "Рикату в Повусе сказал: «Простой тофурки... слишком простой. Принеси мне получше! С изюминкой! Может, с цитрусом, чтобы сбалансировать вкус. Но рецепт тебе придётся найти самому.»"
"Ricatu in Povus said, \"My friend Kelim in Amulna says he's got some spices that might help this fake meat taste more like turkey. I think he's trying a little too hard to sell me on them, you know? But it might work.\n\nGo see if he'll give you some harvest spices.\"": "Рикату в Повусе сказал: «Мой друг Келим в Амульне говорит, что у него есть специи, которые могут помочь этому искусственному мясу больше походить на индейку. Мне кажется, он слишком старается меня убедить, понимаешь? Но, может, это сработает.\n\nПойди и посмотри, даст ли он тебе немного урожайных специй."
"Braigon in Eltibule said, \"Now you know the most bland, basic tofu dish. Take that back to your rakshasa and see what he thinks.\n\nAnd if you want to know how to make fancier kinds of tofu, I suppose I could trade that fancy knowledge for some fancy cheese...\"": "Брейгон в Элтибуле сказал: «Теперь ты знаешь самый простой и пресный рецепт тофу. Отнеси это своему ракшасе и посмотри, что он скажет.\n\nА если хочешь узнать, как приготовить более изысканные виды тофу, полагаю, я могу обменять эти знания на изысканный сыр..."
"Ricatu in Povus said, \"Milking non-sentient cows is exploitation! Or I think it might be -- this morality thing is <i>hard</i>. And there aren't really enough sentient cows to go around.\n\nAnyway, I want to try this fake milk I've been hearing about. I'll teach you the recipe if you don't know it. I picked it up from a dead goat.\"": "Рикату в Повусе сказал: «Доить несознательных коров — это эксплуатация! Или, по крайней мере, я так думаю — эти вопросы морали <i>сложны</i>. Да и сознательных коров всё равно слишком мало.\\n\\nВ любом случае, я хочу попробовать этот искусственный молоко, о котором слышал. Я научу тебя рецепту, если ты его не знаешь. Я узнал его от мёртвой козы."
"Ricatu in Povus said, \"I really need a good dipping sauce to go with all this 'meat'. I heard you can do something with pumpkins -- that should be interesting.  But you'll have to find the recipe yourself.\"": "Рикату в Повусе сказал: «Мне действительно нужен хороший соус для макания ко всему этому „мясу“. Я слышал, что ты умеешь что-то делать с тыквами — это должно быть интересно. Но рецепт тебе придётся найти самому.»"
"Braigon in Eltibule said, \"Are you still stuck on the tofu thing? Tofu is useless on its own, that's why I stopped pursuing it. It's not really worth eating alone, like cheese is! I could teach you some nice cheese recipes instead ... No?\n\nOkay. Well I'm working on some Roquefort, and I need pungent rennet. Get it for me and I'll teach you a simple tofu recipe.\"": "Брейгон в Элтибуле сказал: «Ты всё ещё застрял на теме тофу? Тофу бесполезен сам по себе, поэтому я перестал этим заниматься. Его не стоит есть в одиночку, как сыр! Я мог бы научить тебя нескольким хорошим рецептам сыра... Нет?\n\nЛадно. Я сейчас работаю над рокфором и мне нужна резкая сычужная закваска. Принеси её мне, и я научу тебя простому рецепту тофу."
"Braigon in Eltibule said, \"Tofu can be made in three main ways. Soft tofu is even mushier than regular tofu. Personally I think it tastes disgusting, but perhaps you're more cultured than me!\n\nI can teach you how to make it in exchange for a fresh brie.\"": "Брейгон в Элтибуле сказал: «Тофу можно приготовить тремя основными способами. Мягкое тофу ещё более кашеобразное, чем обычное. Лично я считаю, что оно отвратительно на вкус, но, возможно, ты более утончён, чем я!\n\nЯ могу научить тебя делать его в обмен на свежий бри."
"Ricatu in Povus said, \"I used to really enjoy beef kebabs. There's just something <i>primal</i> about ripping chunks of flesh off a pointy stick. I mean, that's disgusting to me now, but ... It was kind of fun.\n\nAnyway, think you could whip up something similar? You'll have to find the recipe yourself.\"": "Рикату в Повусе сказал: «Раньше я очень любил говяжьи кебабы. В этом есть что-то <i>первобытное</i> — отрывать куски мяса с острого шампура. Сейчас мне это кажется отвратительным, но... было довольно весело.\n\nВ любом случае, думаешь, сможешь приготовить что-то похожее? Рецепт тебе придётся найти самому."
"Ricatu in Povus said, \"Kelim was telling me about a turkey meatloaf he ate recently, and it sounded really good. Think you can do the same thing with tofurkey? You'll have to find the recipe yourself.\"": "Рикату в Повусе сказал: «Келим рассказывал мне о мясном хлебце из индейки, который он недавно ел, и это звучало очень вкусно. Думаешь, ты сможешь сделать то же самое с тофуркой? Тебе придётся найти рецепт самостоятельно.»"
"Ricatu in Povus said, \"Plain old tofurkey is ... kind of dry. Gravy helps, but I bet you can do better. Maybe a sauce ... Oh! How about cranberry sauce! You'll have to find the recipe yourself, though.\"": "Рикату в Повусе сказал: «Простой тофурки... немного суховат. Подливка помогает, но уверен, ты можешь сделать лучше. Может, соус... О! Как насчёт клюквенного соуса! Но рецепт тебе придётся найти самому.»"
"Kelim in Amulna said, \"If Ricatu thinks my spices will help his fake turkey, more power to him. Why don't you cook him a fake turkey meal and ask him how it tastes?\n\nI don't have any recipes for that -- you'll have to find one yourself!\"": "Келим в Амульне сказал: «Если Рикату думает, что мои специи помогут его поддельной индейке, пусть так. Почему бы тебе не приготовить ему блюдо из поддельной индейки и не спросить, как оно на вкус?\n\nУ меня нет рецептов для этого — тебе придётся найти его самому!"
"Ricatu in Povus said, \"Gravy would be perfect with this tofurkey you brought me -- give it some extra moistness. Can you make me some? You'll have to find the recipe yourself, though.\"": "Рикату в Повусе сказал: «Подливка была бы идеальна с этой индюшатиной, что ты мне принес — придаст ей дополнительную сочность. Можешь сделать мне немного? Но рецепт придется найти самому.»"
"Kelim in Amulna said, \"I prefer real meat, and I love a good turkey sandwich this time of year. Damned turkeys can be hard to find, though. They hide in underbrush, and there's not much of that around here!\n\nYou might have to travel a bit, but see if you can whack a few and bring me back their plump, juicy carcasses.\"": "Келим в Амульне сказал: «Я предпочитаю настоящее мясо, и в это время года обожаю хороший сэндвич с индейкой. Чёртовых индюков, правда, трудно найти. Они прячутся в подлеске, а у нас тут его почти нет!\n\nВозможно, придётся немного попутешествовать, но постарайся поймать пару и принеси мне их сочные, упитанные тушки."
"Braigon in Eltibule said, \"I'm working on some mozzarella right now. Bring me some whey and we'll talk about the tofu.\"": "Брайгон в Элтибуле сказал: \"Я сейчас занимаюсь моцареллой. Принеси мне сыворотку, и мы поговорим о тофу.\""
"Deliver 10 Hash Browns to Fitz the Boatman on the Serbule docks. Reward: 716 councils.": "Доставьте 10 картофельных драников Фитцу Лодочнику на причалах Сербуля. Награда: 716 советов."
"Ragabir in Red Wing Casino said, \"Okay this is a secret, but I guess I have to trust somebody here, so congrats, it's you! Now don't fuck this up! For my best potions I need oil of hatred. HATRED. Not oil of malaise, not oil of greed, not oil of disgust. Oil of hatred! Can you handle that? No, I don't know where it comes from. Back home we just bought it at the market. Around here it's harder to find, but it's gotta be somewhere...\"": "Рагабир в казино Красное Крыло сказал: «Ладно, это секрет, но, думаю, мне нужно кому-то здесь доверять, так что поздравляю, это ты! Только не облажайся! Для моих лучших зелий мне нужно масло ненависти. НЕНАВИСТИ. Не масло недомогания, не масло жадности, не масло отвращения. Масло ненависти! Справишься с этим? Нет, я не знаю, откуда оно берётся. У нас дома мы просто покупали его на рынке. Здесь его найти сложнее, но оно должно быть где-то...»"
"Deliver 10 Havarti Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 10,771 councils.": "Доставьте 10 сыров Хаварти Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 10 771 совет."
"Deliver 10 Healing Potion Omegas to Irkima in Red Wing Casino. Reward: 5,682 councils.": "Доставьте 10 Омег лечебного зелья Иркиме в казино Красное Крыло. Награда: 5,682 совета."
"Deliver 10 Healing Potions to Fitz the Boatman on the Serbule docks. Reward: 604 councils.": "Доставьте 10 зелий исцеления Фитцу Лодочнику на доках Сербуля. Награда: 604 совета."
"Mu the Myconian asked you to collect the heartshrooms of any Myconians you're forced to kill.": "Му Микониан попросил тебя собрать сердцегрибы любых микониан, которых ты вынужден убить."
"Deliver 10 Heartshrooms to Fitz the Boatman on the Serbule docks. Reward: 741 councils.\nNote from orderer: <i>\"I found one of these delicious morsels in Statehelm once and tried to track down the source. All I know is that they're from a place called Serbule.\"</i>": "Доставьте 10 сердечников Фитцу Лодочнику на причалы Сербуля. Награда: 741 совет.  \nПримечание от заказчика: <i>«Однажды я нашёл одну из этих вкусных штучек в Стейтхелме и попытался выяснить источник. Всё, что я знаю — они из места под названием Сербуль.»</i>"
"Deliver 10 Heinous Wolfsbaned Knives to Viedesi in Sun Vale. Reward: 322 councils.": "Доставьте 10 отвратительных ножей Волчьей Яды Виедеси в Солнечную Долину. Награда: 322 совета."
"Deliver 10 Hellfreeze to Korbok in Vidaria. Reward: 220,718 councils.": "Доставьте 10 Адского льда Корбоку в Видарии. Награда: 220,718 советов."
"Deliver 10 Hellfreeze Ointment to Korbok in Vidaria. Reward: 84,790 councils.": "Доставьте 10 мазей Адского Холода Корбоку в Видарии. Награда: 84 790 советов."
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. The nibbling sprouts burrow under the ground.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nThey ambush us while we pollinate. You must kill them!\n\nBzzRtxl!\"": "Улей в Фейском мире сказал: «Жжж. ЖжжЖЖжж...\n\nНам нужна твоя помощь, фея. Грызущие ростки роются под землёй.\n\nЖжж. ЖЖжЖжЖжЖж... жжжБзт!\n\nОни устраивают засады, пока мы опыляем. Ты должен их убить!\n\nЖжжРтхл!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. The spriggan weeds ambush us while we pollinate.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в царстве фей сказал: «Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Спригганы-сорняки нападают на нас, пока мы опыляем.\n\nБзз. ЗзЗзЗзЗБз... зззБзт!  \nТы должна их убить!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. Bears attack while we sleep, stealing our resources and injuring our warriors.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в Королевстве Фей сказал: «Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Медведи нападают, пока мы спим, крадут наши ресурсы и ранят наших воинов.\n\nБзз. ЗзЗзЗзЗБз... зззБзт!  \nТы должна их убить!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe cannot pollinate the red flowers nearby. This endangers future honey potential!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!\"": "Улей в царстве фей сказал: «Бзз. БззЗЗзз...\n\nМы не можем опылять красные цветы поблизости. Это ставит под угрозу будущий урожай мёда!\n\nБзз. ЗззЗззЗзБз... зззБзт!\n\nПожалуйста, опыли их для нас!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. Frost Hippogriffs graze on our flowers. Unlike other ungulates, their beaks are freezing cold, and they kill most flowers they touch. They do not belong in this world!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в Царстве Фей сказал: «Бзз. БззЗЗзз...\n\nНам нужна твоя помощь, фея. Морозные гиппогрифы пасутся на наших цветах. В отличие от других копытных, их клювы ледяные, и они убивают большинство цветов, к которым прикасаются. Им не место в этом мире!\n\nБзз. ЗззЗззЗзБз... зззБзт!\n\nТы должен их убить!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe cannot pollinate our distant flower holdings. This endangers future honey potential!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!\"": "Улей в Фейском мире сказал: «Жжж. ЖжжЖЖжж...\n\nМы не можем опылять наши отдалённые цветочные владения. Это ставит под угрозу будущий потенциал мёда!\n\nЖжж. ЖЖжЖжЖжЖж... жжжБзт!\n\nПожалуйста, опыли их для нас!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nOur plan is ruined! We invented pre-germinated seeds to help flowers grow in far-away places. But ice fairies have dug them up and are eating them!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease retrieve some of our seeds!\"": "Улей в Фейском мире сказал: «Жжж. ЖжжЖЖжж...\n\nНаш план провален! Мы изобрели пророщенные семена, чтобы помочь цветам расти в отдалённых местах. Но ледяные феи выкопали их и едят!\n\nЖжж. ЖЖжЖжЖжЖж... жжжБзт!\n\nПожалуйста, верни нам немного наших семян!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. Fae canines, barghest, ambush us while we pollinate.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в Королевстве Фей сказал: «Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Фейские псы, баргесты, устраивают засады, пока мы опыляем.\n\nБзз. ЗзЗзЗзЗБз... зззБзт!  \nТы должна их убить!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. Our two freshest flowers are covered in pixies and we cannot approach.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\nPlease pollinate them for us!\"": "Улей в царстве фей сказал: «Бзз. БззЗЗзз...  \nНам нужна твоя помощь, фея. Наши два самых свежих цветка покрыты пикси, и мы не можем к ним подойти.\n\nБзз. ЗзЗзЗзЗБз... зззБзт!  \nПожалуйста, опыли их для нас!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nSerpent creatures are attacking our hidden caches of honey! Our strongest warriors could not stop them. We need your help... Bzzz... But you will need more help!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n Join your hivemates and kill the basilisks!\"": "Улей в Фейском мире сказал: «Бзз. БззЗЗзз...  \nЗмеиные существа нападают на наши скрытые запасы мёда! Наши сильнейшие воины не смогли их остановить. Нам нужна твоя помощь... Бззз... Но тебе понадобится помощь!\n\nБзз. ЗзЗзЗзЗзБз... зззБзт!  \nПрисоединись к своим сотоварищам и убей базилисков!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. We yearn to pollinate, but travel is unsafe! Raptors attack our troops in transit!\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в Фейском мире сказал: «Жжж. ЖжжЖЖжж...  \nНам нужна твоя помощь, фея. Мы жаждем опылять, но путешествовать небезопасно! Ящеры нападают на наши отряды в пути!\n\nЖжж. ЖЖжЖжЖжЖж... жжжБзт!  \nТы должна их убить!"
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...\nWe need your help, fairy. Winter seems to be arriving and we must prepare to hibernate. Fire elementals will ambush us while we sleep.\n\nBzz. ZzzZzzZzzBz ... zzzBzt!\n You must kill them!\"": "Улей в Царстве Фей сказал: «Бзз. БззЗЗзз...\n\nНам нужна твоя помощь, фея. Похоже, наступает зима, и нам нужно подготовиться к спячке. Огненные элементали устроят нам засаду, пока мы спим.\n\nБзз. ЗззЗззЗзБз... зззБзт!\n\nТы должна их убить!"
"Gunther Ashbrown in Statehelm said, \"I'm supposed to be making a custom chair for someone, but damned if I can manage to get it to come out right. Are you good with wood? Here's the specifications. See? Slightly too tall and slightly too short.\"": "Гюнтер Эшбраун в Стейтхельме сказал: «Я должен сделать индивидуальный стул для одного человека, но, черт возьми, никак не могу добиться, чтобы он получился правильным. Ты хорошо разбираешься в дереве? Вот спецификации. Видишь? Слегка слишком высокий и слегка слишком низкий.»"
"Gunther Ashbrown in Statehelm said, \"Hey, you're the chair-wizard. You made that chair for me a while back, right? Well, I could really use your help this time. Here, look a this. See? Yeah. This is a quality chair. Far beyond my skill, I'll admit. And it needs to be made to these exact measurements.\n\nI'm not saying you owe me anything. I'm just saying, since you obviously like making chairs so much...\"": "Гюнтер Эшбраун в Стейтхельме сказал: «Эй, ты же мастер по стульям. Ты сделал тот стул для меня некоторое время назад, верно? Ну, на этот раз мне действительно нужна твоя помощь. Вот, посмотри на это. Видишь? Да. Это качественный стул. Гораздо выше моего мастерства, признаю. И его нужно сделать точно по этим размерам.\\n\\nЯ не говорю, что ты мне что-то должен. Просто говорю, раз тебе явно так нравится делать стулья..."
"Gunther Ashbrown in Statehelm said, \"I've been looking all over for you!\n\nI delivered that last chair and got lots of compliments. And now I've got an incredibly tough order. I can't even get other carpenters in town to make this for me!\n\nYou're my best chance. I will give you half -- no, two thirds of the money for the job.\"": "Гюнтер Эшбраун в Стейтхелме сказал: «Я искал тебя повсюду!\n\nЯ доставил тот последний стул и получил много похвал. А теперь у меня невероятно сложный заказ. Я даже не могу найти других плотников в городе, чтобы сделать это за меня!\n\nТы — моя лучшая надежда. Я отдам тебе половину — нет, две трети денег за работу."
"Cassandra White in Statehelm said, \"It's coming up on that time of year again: the anniversary of my Lennel's death at the hands of a bear. I was wondering if you could do a poor widow a favor. Could kill some bears for me? I'm not too particular about the type of bear. I hate all bears! Every one of them. And they're a menace to humanity, that's what I say. They kill humans! Why do we allow them to live?! I'll tell you why: magic's made us soft. People don't go out of town anymore so they don't realize how deadly the bears are. But you and I, we're no fools.\"": "Кассандра Уайт в Стейтхелме сказала: «Приближается то время года: годовщина смерти моего Леннела от рук медведя. Я хотела узнать, не могли бы вы оказать бедной вдове услугу. Могли бы убить для меня несколько медведей? Мне не важно, какого они вида. Я ненавижу всех медведей! Каждого из них. И они — угроза для человечества, вот что я скажу. Они убивают людей! Почему мы позволяем им жить?! Я скажу почему: магия сделала нас слабыми. Люди больше не выходят за пределы города, поэтому не понимают, насколько медведи опасны. Но ты и я — мы не дураки.»"
"Cassandra White in Statehelm said, \"Oh it's so nice to have your ear! Well, my husband was killed by a bear a long time ago. And I witnessed it! We were hiking through the forests south of here, as young lovers do, and came upon a bear with green fur. Lennel was a strong man but stupid, and he tried to hit it with a longbow. The bear killed him, scattering blood everywhere, and then it did the most cursed thing: it picked up his bow, stared right into my eyes, and snapped the bow over its knee. It was a very human thing to do.\n\nI learned that the locals call him the Mangler. And I promise you this: it has been decades, but my hatred still runs deep. I've paid to have him killed, but he's immortal and he keeps coming back! No, what really upsets him is to see his beloved friend injured. They call that one The Mauler. If you ask me I think they're gay bears who are gay for each other, but nobody ever asks me. After you kill The Mauler, say \"This one's for Lennel.\"\"": "Кассандра Уайт в Стейтхелме сказала: «Ох, как приятно, что ты меня слушаешь! Мой муж был убит медведем много лет назад. И я была свидетелем этого! Мы гуляли по лесам к югу отсюда, как молодые влюблённые, и наткнулись на медведя с зелёной шерстью. Леннел был сильным мужчиной, но глупым, и он попытался ударить его из длинного лука. Медведь убил его, разбрызгав кровь повсюду, а потом сделал самое проклятое: поднял его лук, посмотрел прямо мне в глаза и сломал лук пополам. Это было очень по-человечески.\n\nЯ узнала, что местные называют его Манглером. И я обещаю тебе: прошло уже десятилетия, но моя ненависть всё ещё глубока. Я платил, чтобы его убили, но он бессмертен и продолжает возвращаться! Нет, что действительно его расстраивает — видеть, как ранят его любимого друга. Его зовут Моляр. Если хочешь знать моё мнение, я думаю, что это гей-медведи, влюблённые друг в друга, но меня никто никогда не спрашивает. После того как убьёшь Моляра, скажи: «Это за Леннела."
"Gleanfeckle in Statehelm said, \"Hi, %PLAYER_NAME%, I wanted to report back about my sleep habits. I've got the infestation cleared and the sound and odor issues under control! But it's slightly too chilly. The standard-issued blanket is too thin. I need a replacement!\"": "Глинфекл в Стейтхельме сказал: «Привет, %PLAYER_NAME%, я хотел сообщить о своих привычках сна. Я избавился от заражения, и проблемы со звуком и запахом под контролем! Но немного холодновато. Стандартное одеяло слишком тонкое. Мне нужна замена!»"
"Anamemerie in Statehelm said, \"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Fransesca Muradrake, and you can keep the tip. Let me know when it's done, though, okay? I'm still responsible for it. And don't steal it. Stealing is bad.\"": "Анамемери в Стейтхелме сказала: «Я так отстаю с доставками сегодня! Не могла бы ты помочь? Эта штука меня пугает. Отнеси её Франческе Мурадрейк, а чаевые можешь оставить себе. Только дай знать, когда всё будет сделано, хорошо? Я всё ещё за это отвечаю. И не воруй. Воровство — это плохо.»"
"Gareth Plumsy in Statehelm said, \"I have a big test coming up at school and I need to be at my best. I could literally die if I'm not! This school is nuts! I need more pineal juice, but not the weak stuff you brought me before.\n\nHere. I bribed an alchemist at the mage college to get this recipe. Of course, I don't know how to actually do alchemy, so I'll leave it up to you.\"": "Гарет Пламси в Стейтхелме сказал: «У меня скоро большой экзамен в школе, и я должен быть в лучшей форме. Если нет — я буквально могу умереть! Эта школа сумасшедшая! Мне нужно больше сока шишковидной железы, но не тот слабый, что ты приносил раньше.\n\nВот. Я подкупил алхимика в колледже магов, чтобы получить этот рецепт. Конечно, я не умею заниматься алхимией, так что оставляю это тебе."
"Terriva Jance in Statehelm said, \"Hey how about one more tall glass of that brown ale? Don't worry, I can hold my stuff.\"": "Террива Джанс в Стейтхелме сказала: «Эй, как насчёт ещё одного высокого бокала этого коричневого эля? Не волнуйся, я умею держать своё.»"
"Flitilda in Statehelm said, \"Hey, it's you again. Remember when you got me flitterbies? I was thinking about them. I bet you guys have no idea how flitterbies work! They're maleable to their environment even after they grow. If you have a ton of citrus on you when you pick one, it'll come out smelling citrusy itself!\n\nCan you confirm this actually works like I expect? Sometimes mortal-realm variants can act weird.\n\n<i>[To advance this quest you must have 100+ citrus items in your inventory when you pick flitterbies.]</i>\"": "Флитильда в Стейтхелме сказала: «Эй, это снова ты. Помнишь, когда ты принес мне флиттербис? Я подумала о них. Бьюсь об заклад, вы, ребята, понятия не имеете, как работают флиттербисы! Они подстраиваются под окружающую среду даже после того, как вырастают. Если у тебя при сборе будет много цитрусовых, они сами будут пахнуть цитрусом!\n\nМожешь подтвердить, что это действительно работает так, как я ожидаю? Иногда варианты из смертного мира ведут себя странно.\n\n<i>[Чтобы продвинуть этот квест, у тебя должно быть более 100 цитрусовых предметов в инвентаре при сборе флиттербис.]</i>"
"Salmpo Phelps in Statehelm said, \"Did you know there's really such a thing as a Salmpo? They're abominations. Created by amateur alchemists, mostly. I don't exactly know what they look like, but I've heard their hearts are made of leafy greens! I've always wanted to try one. Just to know what I taste like. So to speak.\"": "Салмпо Фелпс в Стейтхелме сказал: «Знаете ли вы, что Салмпо действительно существует? Это отвратительные создания. В основном их создают любители-алхимики. Я точно не знаю, как они выглядят, но слышал, что их сердца сделаны из листовой зелени! Мне всегда хотелось попробовать одного. Просто чтобы узнать, какой у меня вкус. Так сказать.»"
"Flitilda in Statehelm said, \"One of my fae friends said that there are flitterbies growing here in this country, somewhere far south of here in a land called Eltibule. I need one for my drawings!\"": "Флитильда в Стейтхелме сказала: «Одна из моих фейных подруг сказала, что здесь, в этой стране, где-то далеко на юге, в земле под названием Элтибуль, растут флиттербисы. Мне нужен один для моих рисунков!»"
"Shiriqa in Statehelm said, \"Me and Jenny Foster have a prank war going on. You know, the server at the coffee shop? Yeah. She loves pranks! But she's terrified of osslars. Osslars are some kind of demon thing and apparently she had a scary experience with them. So you know what that means!\n\nThis will be a prank for the history books of this mortal realm. I'm gonna animate the skull and have it talk to her!\"": "Ширика в Стейтхелме сказала: «У меня и Дженни Фостер идёт война розыгрышей. Знаешь, сервер в кофейне? Да. Она обожает розыгрыши! Но она боится оссларов. Осслары — это какие-то демонические создания, и, по-видимому, у неё был с ними страшный опыт. Так что ты понимаешь, что это значит!\n\nЭтот розыгрыш войдёт в историю этого смертного мира. Я собираюсь оживить череп и заставить его говорить с ней!"
"Exalto the Extractor in Statehelm said, \"I require human teeth. They must be in excellent condition!\"": "Экзальто Экстрактор в Стейтхельме сказал: «Мне нужны человеческие зубы. Они должны быть в отличном состоянии!»"
"Exalto the Extractor in Statehelm said, \"I need more human teeth. Human dentristry is demanding: the teeth must be in good condition!\"": "Экзальто Экстрактор в Стейтхелме сказал: «Мне нужно больше человеческих зубов. Человеческая стоматология требует: зубы должны быть в хорошем состоянии!»"
"Salmpo Phelps in Statehelm said, \"The best loading golems have a cutting mode to open tough crates. The ones we have left on the docks don't have that feature, though. I was thinking, maybe I could install it. If I had some cutting arms, I mean.\"": "Салмпо Фелпс в Стейтхелме сказал: «Лучшие грузовые големы имеют режим резки для открытия прочных ящиков. Те, что остались у причалов, такой функции не имеют. Я подумал, может, смогу её установить. Если бы у меня были режущие руки, конечно.»"
"Shiriqa in Statehelm said, \"Jenny said that if I want to be friends with her again I have to swear off pranking her <i>forever</i>. She said she doesn't even really like pranks! She was just humoring me! Can you believe the audacity?\n\nMortals are so unpredictable, it's scary. I don't even know how to deal with this.\n\nWait: yes I do! I just need to show her the beautiful side of pranks. Can you make or find a pair of glued-together coins? I'll use them for a harmless prank. HARMLESS. I promise! She'll laugh!\"": "Ширика в Стейтхелме сказала: «Дженни сказала, что если я хочу снова стать с ней друзьями, мне нужно навсегда отказаться от розыгрышей. Она сказала, что на самом деле ей розыгрыши даже не нравятся! Она просто потворствовала мне! Можешь поверить в такую наглость?\n\nСмертные такие непредсказуемые, это страшно. Я даже не знаю, как с этим справиться.\n\nПодожди: знаю! Мне просто нужно показать ей красивую сторону розыгрышей. Можешь сделать или найти пару склеенных вместе монет? Я использую их для безобидного розыгрыша. БЕЗОБИДНОГО. Обещаю! Она посмеётся!"
"Terriva Jance in Statehelm said, \"I'm ready for another keg of the brown. Business has been good!\"": "Террива Джанс в Стейтхельме сказала: «Я готова к новой бочке коричневого. Дела идут хорошо!»"
"Gregory Pincackle in Statehelm said, \"Hey, remember when you cleared out the animated legs in the graveyard? Well, they're back.\n\n<i>[Gregory looks at you and raises his eyebrows.]</i>\"": "Грегори Пинкэкл в Стейтхельме сказал: «Эй, помнишь, когда ты очистил ожившие ноги на кладбище? Так вот, они вернулись.\n\n<i>[Грегори смотрит на тебя и поднимает брови.]</i>"
"Gregory Pincackle in Statehelm said, \"Somebody needs to take care of all the damned leg bones wandering around in the graveyard! It's one thing to run away from a full skeleton but I'll be damned if I'm running away from a single leg. I was able to suspend disbelief at a whole fleshless body, but just one leg? One leg that for some reason kicks like a mule? I won't have it. It's an undignified way to die, and the graveyard needs all the dignity it can muster.\n\nSo as I say, <i>somebody</i> should do something about it. Somebody braver than the town guards.\n\n<i>[Gregory looks at you.]</i>\"": "Грегори Пинкэкл в Стейтхелме сказал: «Кто-то должен разобраться со всеми этими проклятыми костями ног, бродящими по кладбищу! Одно дело убежать от целого скелета, но я не позволю себе убегать от одной ноги. Я мог поверить в целое бездушное тело, но одна нога? Нога, которая почему-то бьёт, как мул? Я этого не потерплю. Это недостойный способ умереть, а кладбищу нужна вся возможная достоинство.\n\nТак что, как я и говорю, <i>кто-то</i> должен что-то с этим сделать. Кто-то смелее городских стражников.\n\n<i>[Грегори смотрит на тебя.]</i>"
"Gareth Plumsy in Statehelm said, \"When you finally corner one of the professors at Tennenbrandt and get them to actually give you a lesson, they teach FAST. It fells like they're shoving knowledge at you faster than you can process it! But you know what helps? Pineal juice. Illegal here, of course. So I know you wouldn't have any on you. That's a shame because I have a pretty rough day of lessons coming up.\"": "Гарет Пламси в Стейтхелме сказал: «Когда ты наконец загоняешь одного из профессоров в Тенненбрандте и заставляешь его действительно дать тебе урок, они учат ОЧЕНЬ БЫСТРО. Кажется, что они вталкивают знания в тебя быстрее, чем ты успеваешь их усвоить! Но знаешь, что помогает? Сок шишковидной железы. Здесь это, конечно, незаконно. Так что я знаю, что у тебя его нет. Жаль, потому что у меня впереди довольно тяжёлый день уроков.»"
"Gareth Plumsy in Statehelm said, \"Tennenbrandt University teaches important music and magic theory, but they're not very hands-on. It's important to see other performers work their magic -- that's part of my education too! But staying out all night leaves me exhausted for the next day. You know what helps? Pineal juice.\"": "Гарет Пламси в Стейтхелме сказал: «Университет Тенненбрандта учит важной теории музыки и магии, но там мало практики. Важно видеть, как другие исполнители творят свою магию — это тоже часть моего обучения! Но ночные посиделки оставляют меня истощённым на следующий день. Знаешь, что помогает? Сок шишковидной железы.»"
"Franklin Mallus in Statehelm said, \"I lost my lucky balaclava. Now my head is cold in the mornings. This makes me sad.\"": "Франклин Маллус в Стейтхелме сказал: «Я потерял свою удачную балаклаву. Теперь по утрам у меня холодная голова. Это меня огорчает.»"
"Franklin Mallus in Statehelm said, \"My wife Ariadne works at one of the vendor stalls. The hours are terrible and the pay is awful and I feel bad for her. I want to visit and drop of her favorite lunch, Broccoli Squash Bake. But I can't cook. This makes me sad.\"": "Франклин Маллус в Стейтхелме сказал: \"Моя жена Ариадна работает на одной из торговых палаток. Часы работы ужасные, а оплата плохая, и мне её жаль. Я хочу навестить её и принести её любимый обед — запеканку из брокколи и тыквы. Но я не умею готовить. Это меня огорчает.\""
"Salmpo Phelps in Statehelm said, \"I used to maintain these loading golems, back when there were more of 'em. It was sort of my side-job. And, well, I guess since nobody else is taking responsibility, I still have to do it! So I've been doing safety inspections on the golems. I've made some easy fixes, but the scarier problems require special parts.\"": "Салмпо Фелпс в Стейтхелме сказал: «Раньше я обслуживал этих погрузочных големов, когда их было больше. Это была своего рода моя подработка. И, ну, думаю, раз никто другой не берёт на себя ответственность, мне всё равно приходится этим заниматься! Поэтому я провожу техосмотры големов. Я сделал несколько простых ремонтов, но более серьёзные проблемы требуют специальных деталей.»"
"Shiriqa in Statehelm said, \"Hey, you're the one who sold me that bad osslar skull. This is your fault! I performed an absolutely hilarious prank and now Jenny Foster won't speak to me! At all! She gives me the \"silent treatment\", which should definitely be considered a war crime if it isn't already.\n\nSince you did this too, you should help me fix it. Jenny likes tea, so I want you to get her some exotic tropical tea. Make it extra sweet.\"": "Ширика в Стейтхелме сказала: «Эй, это ты продал мне тот плохой череп осслера. Это твоя вина! Я устроила очень забавную шутку, а теперь Дженни Фостер вообще не разговаривает со мной! Она игнорирует меня, и это определённо должно считаться военным преступлением, если ещё не считается.\n\nПоскольку ты тоже виноват, помоги мне всё исправить. Дженни любит чай, так что принеси ей экзотический тропический чай. Сделай его особенно сладким."
"Tremond Rockhammer in Statehelm said, \"I was looking for you! Got a real tricky one for you this time. Masterworks, but with a slight intentional weak spot here and here. Never you mind what they're for, just make them to this specification and I'll pay well.\"": "Тремонд Рокхаммер в Стейтхелме сказал: «Я тебя искал! На этот раз у меня для тебя действительно сложное задание. Мастерские изделия, но с небольшими намеренными слабыми местами здесь и здесь. Не спрашивай, для чего они нужны, просто сделай их по этим спецификациям, и я хорошо заплачу.»"
"Leopold Smith in Statehelm said, \"I've lost my favorite Grand Shaping Hammer. And don't tell me it broke, it was brand new! I must have put it somewhere. It was special because it had a wider grip and shorter handle which made it a joy to use. I guess I'll have to get a toolcrafter to make me a new one some day. *Sigh*\"": "Леопольд Смит в Стейтхелме сказал: «Я потерял свой любимый Большой Формовочный Молот. И не говорите мне, что он сломался, он был совершенно новым! Я, должно быть, где-то его положил. Он был особенным, потому что имел более широкую рукоять и короткую ручку, что делало его использование настоящим удовольствием. Похоже, мне придется когда-нибудь попросить кузнеца сделать мне новый. *Вздох*»"
"Gareth Plumsy in Statehelm said, \"Hey, you've got to help me out again. BIG test coming up and I'm out of the juice! I need the cranked juice. Nothing else works anymore. I'll pay well!\"": "Гарет Пламси в Стейтхелме сказал: «Эй, ты должен снова помочь мне. Скоро большой тест, а у меня кончилась энергия! Мне нужна зарядка на полную катушку. Больше ничего не помогает. Хорошо заплачу!»"
"Kasapar in Statehelm said, \"I have enjoyed the tequila, my friend, and it has proven a very interesting talking point among guests. I need more! I shall pay you the same as before. As to the flavor profile, please surprise me with something delicious.\"": "Касапар в Стейтхелме сказал: «Мне понравилась текила, мой друг, и она стала очень интересной темой для разговоров среди гостей. Мне нужно больше! Я заплачу тебе так же, как и раньше. Что касается вкусового профиля, пожалуйста, удиви меня чем-нибудь вкусным.»"
"Leopold Smith in Statehelm said, \"Hey! Uh, sorry again about accusing you of being a thief. You just seem like ... ahem, well, anyway, I know NOW that you're an expert toolsmith! And that means you must have access to quality metal. I need some.\n\nThe Council provides me with the metal to fix horseshoes and fences, but I need fancier metal for a personal project I'm working on.\"": "Леопольд Смит в Стейтхелме сказал: «Эй! Эм, ещё раз извини, что обвинял тебя в воровстве. Ты просто казался... эм, ну, в общем, теперь я знаю, что ты эксперт по изготовлению инструментов! А это значит, что у тебя должен быть доступ к качественному металлу. Мне он нужен.\n\nСовет снабжает меня металлом для починки подков и заборов, но для личного проекта мне нужен более изысканный металл."
"Terriva Jance in Statehelm said, \"Hey! You're the brown ale expert. Hey hey good to see you again! I've been thinking about that brown ale. I want to order a keg of it! Can you deliver? I've been saving up!\"": "Террива Джанс в Стейтхелме сказала: «Эй! Ты же эксперт по коричневому элю. Привет-привет, рад снова тебя видеть! Я всё думала о том коричневом эле. Хочу заказать бочку! Ты можешь доставить? Я копила деньги!»"
"Tremond Rockhammer in Statehelm said, \"Hey, it's you! What a bit of luck. I need more specialized armor stakes. Can you bang these out today? Expert-quality, but with a peened head.\"": "Тремонд Рокхаммер в Стейтхелме сказал: «Эй, это ты! Какая удача. Мне нужно больше специализированных колышков для брони. Можешь сделать их сегодня? Экспертного качества, но с клёпаной головкой.»"
"Tremond Rockhammer in Statehelm said, \"I've been sent out as a gofer. Pretty insulting to my skills but you gotta take it on the chin sometimes when you work with humans. They're not exactly good at manners and shit. Problem is, though, that I can't find what I need: I need some pretty good armor stakes but with an extra thumbspan's length on the end. Say, are you a smith? You could whip them up for me.\"": "Тремонд Рокхаммер в Стейтхельме сказал: «Меня отправили за поручением. Довольно обидно для моих умений, но иногда приходится терпеть, когда работаешь с людьми. Они не отличаются хорошими манерами и прочим. Проблема в том, что я не могу найти то, что мне нужно: мне нужны довольно хорошие колья для брони, но с дополнительной длиной в один размах большого пальца на конце. Скажи, ты кузнец? Ты мог бы сделать их для меня.»"
"Shiriqa in Statehelm said, \"I did the glued-coin gag to Jenny. I stuck them to the table and watched her struggle to pull them off. She was at it for a while and she wasn't laughing at all! So I ran over and stopped her.\n\nI explained everything: how it was your idea, how you're fully to blame, and how I would never, ever, EVER do a prank to her again. Thanks for taking the heat for me!\n\nWhat? You DID enable the prank. You can't be blameless in this!\n\nOkay, look, I know I screwed up. Social scenarios with mortals are extremely tricky! Can you forgive me? I can't have you as an enemy! You're more terrifying than Jenny! I thought you'd understand!\n\nCalm down, I know how to fix this: my prank fund! You can have it! It's a treasure chest full of precious gems. At least I think it is. I can't open it! But I have a plan on how to get it open. Here's what I need.\"": "Ширика в Стейтхелме сказала: «Я устроила Дженни розыгрыш с склеенными монетами. Приклеила их к столу и наблюдала, как она пытается их оторвать. Она мучилась долго и совсем не смеялась! Тогда я подбежала и остановила её.\n\nЯ всё объяснила: что это была твоя идея, что вся вина на тебе, и что я никогда, никогда, НИКОГДА больше не буду её разыгрывать. Спасибо, что взял вину на себя!\n\nЧто? Ты действительно способствовал розыгрышу. Ты не можешь быть безвинным в этом!\n\nЛадно, слушай, я знаю, что облажалась. Социальные ситуации с смертными очень сложны! Ты можешь меня простить? Я не могу иметь тебя в врагах! Ты страшнее Дженни! Я думала, ты поймёшь!\n\nУспокойся, я знаю, как это исправить: мой фонд розыгрышей! Он твой! Это сундук с драгоценными камнями. По крайней мере, я так думаю. Я не могу его открыть! Но у меня есть план, как это сделать. Вот что мне нужно."
"Terriva Jance in Statehelm said, \"You know what I miss? Brown ale. Strong, sweet, but dry. Except the wet ones. I'm not too particular I guess. But every brown ale is better than what Cynthia serves!\"": "Террива Джанс в Стейтхелме сказала: «Знаешь, чего мне не хватает? Коричневого эля. Крепкого, сладкого, но сухого. Только не мокрого. Впрочем, я не слишком придирчива. Но любой коричневый эль лучше того, что подаёт Синтия!»"
"Gleanfeckle in Statehelm said, \"Oh, hi %PLAYER_NAME%! You got that wax for me, remember? I appreciate it, but turns out the wax was heavily scented, and the scent gives me a headache.\n\nFlitilda studies local fauna and says the odors from these things would cancel out the scent.\"": "Глинфекл в Стейтхельме сказал: «О, привет, %PLAYER_NAME%! Ты принес тот воск для меня, помнишь? Я благодарен, но оказалось, что воск сильно ароматизирован, и этот запах вызывает у меня головную боль.\n\nФлитильда изучает местную фауну и говорит, что запахи этих существ нейтрализуют аромат."
"Gleanfeckle in Statehelm said, \"I'm still geting used to having to sleep every day. The giant tree is making that hard, too, because the other fae are not quiet at night!\n\nI've been using a magical dampening sphere to protect my ears, but the spell gives me a headache. Electra told me I should just get the local mortal equivalent. Do you happen to have any of this wax?\"": "Глинфекл в Стейтхельме сказал: «Я всё ещё привыкаю к тому, что нужно спать каждый день. Огромное дерево тоже мешает, потому что другие феи не бывают тихими ночью!\n\nЯ использую магическую сферу гашения, чтобы защитить уши, но заклинание вызывает у меня головную боль. Электра сказала, что мне стоит просто достать местный смертный аналог. Случайно у тебя нет такого воска?"
"Jaunce Zodiac in Statehelm said, \"I have a great new scheme to win big at keelflip: bomb threats. Don't worry. Nobody is going to get hurt. Everything wil go according to plan.\"": "Джонс Зодиак в Стейтхелме сказал: «У меня есть отличный новый план, как выиграть по-крупному в кифлип: угрозы бомбой. Не волнуйтесь. Никто не пострадает. Всё пойдёт по плану.»"
"Jaunce Zodiac in Statehelm said, \"I have an idea for how to win big at keelflip: cheating! I just need some corks.\"": "Джонс Зодиак в Стейтхелме сказал: «У меня есть идея, как выиграть по-крупному в кильфлип: жульничество! Мне просто нужны пробки.»"
"Gleanfeckle in Statehelm said, \"Oh, it's you. The bozo who gave me an infested hexapus arm to sleep on! Well to your credit, all those horrific odors DID cancel out and I was able to get some sleep for a bit, but two days later I was in terrible pain. I visited Steven the healer, who declared that I had Hexapus Ear and cured me. Apparently the tentacle you gave me was covered in eggs, and they got all over everything!\n\nI threw out the hexapus arm but I still keep getting infected with Hexapus Ear every night! It's disgusting! It's... humiliating at this point. Please, you have to help me sanitize my bed area! ... And also get me a tentatkiller arm to replace the odor of the hexapus arm.\"": "Глинфекл в Стейтхелме сказал: «О, это ты. Болван, который дал мне заражённую руку гексапуса, чтобы я на ней спал! Но, надо отдать тебе должное, все эти ужасные запахи действительно перебились, и я смог немного поспать, но через два дня у меня началась сильная боль. Я посетил Стивена целителя, который сказал, что у меня «Ухо гексапуса» и вылечил меня. Оказывается, щупальце, которое ты мне дал, было покрыто яйцами, и они повсюду!\n\nЯ выбросил руку гексапуса, но каждую ночь меня снова заражает «Ухо гексапуса»! Это отвратительно! На этом этапе это... унизительно. Пожалуйста, помоги мне продезинфицировать моё спальное место! ... И ещё достань мне руку-убийцу щупалец, чтобы заменить запах руки гексапуса."
"Leopold Smith in Statehelm said, \"Oh, I'm glad I ran into you! I need some gems to finish my... project. A carnelian and an onyx. Actually, two of each! Just in case I'm unlucky.\"": "Леопольд Смит в Стейтхелме сказал: «О, я рад, что встретил тебя! Мне нужны драгоценные камни, чтобы закончить мой... проект. Карнеол и оникс. На самом деле, по два каждого! На случай, если мне не повезёт.»"
"Flitilda in Statehelm said, \"I've heard of a mortal flower called a tulip, but I've never seen one! I wish I had one.\n\n<i>[Flitilda flutters her eyelashes at you.]</i>\"": "Флитильда в Стейтхелме сказала: «Я слышала о смертном цветке под названием тюльпан, но никогда не видела его! Хотела бы иметь один.\n\n<i>[Флитильда хлопает тебе ресницами.]</i>"
"Jaunce Zodiac in Statehelm said, \"I have a new idea for how to cheat at keelflip. I just need some pebbles. But they have to be perfectly balanced!\"": "Джонс Зодиак в Стейтхелме сказал: «У меня есть новая идея, как обмануть в кейлфлипе. Мне просто нужны камешки. Но они должны быть идеально сбалансированы!»"
"Kasapar in Statehelm said, \"They have many interesting spirits here, but I miss the drink of my homeland. Rahu has the most salivation-inducing tequila! I would love to have a cask delivered.\n\nAnd of course, this would be a business expense, so I can tap into my generous expense account.\"": "Касапар в Стейтхелме сказал: «Здесь много интересных духов, но мне не хватает напитка моей родины. В Раху самая слюноотделяющая текила! Я бы с удовольствием получил бочку.\n\nИ, конечно, это будет служебным расходом, так что я смогу воспользоваться своим щедрым служебным счётом."
"Anamemerie in Statehelm said, \"I'm so far behind on my deliveries today! Could you help? This one creeps me out. Take it to Strom Farblood, and you can keep the tip! And like before, let me know when it's done so I can check it off the list.\"": "Анамемери в Стейтхелме сказала: «Я сегодня так отстаю с доставками! Не мог бы ты помочь? Эта штука меня пугает. Отнеси её Строму Фарблуду, и можешь оставить себе чаевые! И, как раньше, сообщи мне, когда закончишь, чтобы я могла вычеркнуть это из списка.»"
"Deliver 10 Hiral's Citrus Blends to Laura Neth in Kur Mountains. Reward: 8,062 councils.": "Доставьте 10 цитрусовых смесей Хирала Лауре Нет в горах Кур. Награда: 8 062 совета."
"Hogan the staff fighter has requested some items as payment for teaching you staff combat.": "Хоган, боец с посохом, попросил несколько предметов в качестве оплаты за обучение тебя бою с посохом."
"Sir Taggart in Vidaria said, \"There's also the issue of the so-called Invincible Bulwark skeletons. They're a huge problem. Be careful!\"": "Сэр Таггарт в Видарии сказал: «Есть ещё проблема так называемых скелетов Непобедимых Щитов. Они — огромная проблема. Будьте осторожны!»"
"Lakrea told you to work the word 'beleaguered' into your next conversation.\n\nBeleaguered: adjective: beset with difficulties.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «осаждённый» в следующий разговор.\n\nОсаждённый: прилагательное: окружённый трудностями.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'cajole' into your next conversation.\n\nCajole: verb: to persuade someone to do something with flattery or promises.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «льстить» в следующий разговор.\n\nЛьстить: глагол: убедить кого-то сделать что-то с помощью лести или обещаний.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'confidant' into your next conversation.\n\nConfidant: noun: a person entrusted with secrets, such as a friend or co-conspirator. Note: do not confuse with the word 'confident', which is totally different.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «доверенное лицо» в свой следующий разговор.\n\nДоверенное лицо: сущ.: человек, которому доверяют секреты, например друг или соучастник. Примечание: не путай со словом «уверенный», которое совсем другое.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'impetus' into your next conversation.\n\nImpetus: the force that makes something happen. e.g. 'A vicious goblin attack was the impetus for the new anti-goblin law.'\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «импульс» в следующий разговор.\n\nИмпульс: сила, которая заставляет что-то происходить. Например: «Жестокое нападение гоблинов стало импульсом для нового закона против гоблинов.»\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'jocular' into your next conversation.\n\nJocular: adjective: given to jesting, habitually jolly or playful. e.g. 'He was in a jocular mood yesterday.'\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «шутливый» в следующий разговор.\n\nШутливый: прилагательное: склонный к шуткам, обычно весёлый или игривый. Например: «Вчера у него было шутливое настроение.»\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'maladaptive' into your next conversation.\n\nMaladaptive: adjective: not providing adequate or appropriate adjustment to the environment or situation.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «неадаптивный» в следующий разговор.\n\nНеадаптивный: прилагательное: не обеспечивающий адекватной или подходящей адаптации к окружению или ситуации.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'obsequious' into your next conversation.\n\nObsequious: adjective: too eager to help or obey someone. Fawning.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «раболепный» в следующий разговор.\n\nРаболепный: прилагательное: слишком стремящийся помочь или подчиниться кому-то. Льстивый.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'susurrus' into your next conversation.\n\nSusurrus: noun: a soft whispering or rustling sound.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «шелест» в следующий разговор.\n\nШелест: существительное: тихий шёпот или шуршащий звук.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'truculent' into your next conversation.\n\nTruculent: adjective: eager to argue or quick to start a fight. Similar to 'belligerent' but with an implication of cruelty or savagery.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «воинственный» в следующий разговор.\n\nВоинственный: прилагательное: склонный к спорам или быстро начинающий драку. Похоже на «воинственный», но с оттенком жестокости или дикости.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'vacillate' into your next conversation.\n\nVacillate: verb: to waver back and forth indecisively.\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «колебаться» в следующий разговор.\n\nКолебаться: глагол: нерешительно колебаться туда-сюда.\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea told you to work the word 'vociferous' into your next conversation.\n\nVociferous: adjective: expressed in a loud or forceful way. e.g. 'I was a vociferous critic of the new curfew, but my efforts were in vain.'\n\n(Note: if you use the word out of context, the game won't know, but <i>you'll</i> know that you lost 10,000 Roleplay Points.)": "Лакреа сказала тебе вставить слово «голосистый» в следующий разговор.\n\nГолосистый: прилагательное: выраженный громко или настойчиво. Например: «Я был голосистым критиком нового комендантского часа, но мои усилия оказались напрасными.»\n\n(Примечание: если ты используешь слово не по контексту, игра не заметит, но <i>ты</i> узнаешь, что потерял 10 000 очков ролевой игры.)"
"Lakrea gave you a recipe for a Bacon Basket and instructed you to cook one. Eating it is optional.": "Лакрея дала вам рецепт Корзины с беконом и поручила приготовить её. Есть её необязательно."
"Lakrea told you to go get attacked by nine different dinosaurs, or at least creatures in the dinosaur family. (Many things are in the dinosaur family, including dragons and birds.)": "Лакреа сказала тебе пойти и быть атакованным девятью разными динозаврами, или по крайней мере существами из семейства динозавров. (Многие существа относятся к семейству динозавров, включая драконов и птиц.)"
"Lakrea told you to go get attacked by nine different ruminants. (Ruminants are animals like cows, sheep, deer, or camels.)": "Лакреа сказала тебе пойти и получить атаки от девяти разных жвачных животных. (Жвачные — это животные, такие как коровы, овцы, олени или верблюды.)"
"Lakrea told you to bomb things. (Use bomb abilities, such as Spore Bomb.)": "Лакреа сказала вам взрывать вещи. (Используйте способности бомбы, такие как Споровая бомба.)"
"Lakrea told you to bury canines to build up your sense of compassion.": "Лакреа сказала вам похоронить собак, чтобы развить чувство сострадания."
"Lakrea told you to catch cavefish. They can be found deep in certain caves, including the caves of Kur Mountains.": "Лакреа сказала тебе поймать пещерную рыбу. Её можно найти глубоко в некоторых пещерах, включая пещеры гор Кур."
"Lakrea told you to make your own cheese. She suggested avoiding the fancier cheese recipes that require aging.": "Лакрея сказала тебе сделать свой собственный сыр. Она посоветовала избегать более сложных рецептов сыра, которые требуют выдержки."
"Lakrea suggested that you drink 20 bottles of water.": "Лакреа предложила вам выпить 20 бутылок воды."
"Lakrea told you to dye suits of armor.": "Лакрея сказала тебе покрасить доспехи."
"Lakrea suggested that you activate an explosive runestone.": "Лакреа предложила вам активировать взрывной рунический камень."
"Lakrea told you to skin a flawless animal skin of some kind. (If you have high anatomy knowledge of a creature that you skin, you have a chance of obtaining a flawless skin instead of the usual skin.)": "Лакреа сказала вам снять шкуру безупречного животного какого-либо вида. (Если у вас есть глубокие знания анатомии существа, с которого вы снимаете шкуру, у вас есть шанс получить безупречную шкуру вместо обычной.)"
"Lakrea told you to smith some hoops. She didn't seem to care what kind of hoops you smithed. (Blacksmithing is the skill used to make hoops for barrels and casks.)": "Лакреа сказала тебе выковать обручи. Ей было всё равно, какие именно обручи ты выкован. (Кузнечное дело — навык, используемый для изготовления обручей для бочек и кадок.)"
"Lakrea told you to get 100 crystals and show her your collection. You don't have to mine them yourself -- you just need 100 of them.": "Лакреа сказала тебе собрать 100 кристаллов и показать ей свою коллекцию. Тебе не обязательно добывать их самому — нужно просто иметь 100 штук."
"Lakrea told you to grow some carrots.": "Лакреа сказала тебе вырастить немного моркови."
"Lakrea told you to put 40 pieces of equipment in your inventory and then talk to her.": "Лакреа сказала вам положить 40 предметов снаряжения в инвентарь, а затем поговорить с ней."
"Lakrea told you to build two meditation stools. (Meditation stools are made with Carpentry.)": "Лакреа сказала тебе сделать два медитативных табурета. (Медитативные табуреты изготавливаются с помощью столярного дела.)"
"Lakrea told you to mine some iridium. Iridium can be found in the Kur Mountains and in caves beneath the mountains.": "Лакреа сказала вам добыть немного иридия. Иридий можно найти в горах Кур и в пещерах под горами."
"Lakrea gave you a recipe for a Raw Egg Blend and instructed you to drink one.": "Лакрея дала вам рецепт смеси из сырого яйца и велела выпить её."
"Lakrea suggested that you \"battle\" a shark.": "Лакрея предложила вам «сразиться» с акулой."
"Lakrea told you to practice your conversation skills. (Use the 'small talk' option when talking to different NPCs.)": "Лакреа сказала тебе попрактиковаться в навыках общения. (Используй опцию «светская беседа» при разговоре с разными NPC.)"
"Lakrea directed you to stand in a sandstorm. There are sandstorms in the Ilmari Desert. (You must be within 65 meters of the center of the storm to advance the quest.)": "Лакреа направила вас встать в песчаную бурю. Песчаные бури бывают в пустыне Илмари. (Вы должны находиться в пределах 65 метров от центра бури, чтобы продвинуть задание.)"
"Lakrea told you to use treasure maps to find buried treasure.": "Лакреа сказала вам использовать карты сокровищ, чтобы найти зарытые сокровища."
"Lakrea directed you to make yarn. There are Textiles recipes for creating yarn; complete yarn recipes twelve times (for a total of 24 balls of yarn).": "Лакреа направила вас сделать пряжу. В рецептах Текстиля есть рецепты создания пряжи; выполните рецепты пряжи двенадцать раз (всего 24 клубка пряжи)."
"Deliver 10 Honey Hams to Fitz the Boatman on the Serbule docks. Reward: 835 councils.": "Доставьте 10 медовых окороков Фитцу Лодочнику на причалы Сербуля. Награда: 835 советов."
"Crelpin in the Fae Realm said, \"We've managed to get the bears out of the western bee fields, but south and east of here, they're a real problem! They're especially dense during the day when they hunt for honey. Yes, they eat my damned crop! Why can't they be more like the panthers?! Anyway, you just gotta stop 'em. They're a menace!\"": "Крелпин в Фейском мире сказал: «Нам удалось выгнать медведей из западных пчелиных полей, но к югу и востоку от сюда они настоящая проблема! Особенно их много днем, когда они охотятся за медом. Да, они едят мой проклятый урожай! Почему они не могут быть как пантеры?! В любом случае, тебе просто нужно их остановить. Они — настоящая угроза!»"
"Deliver 10 Honey-Pumpkin Muffins to Ogamboe in the Fae Realm. Reward: 6,920 councils.": "Доставьте 10 медово-тыквенных маффинов Огамбо в Царство Фей. Награда: 6,920 советов."
"Helena Veilmoor in Hogan's Keep asked you to get some \"hook-claw things.\"": "Хелена Вейлмур в Крепости Хоган попросила тебя достать несколько \"крюко-когтей.\""
"Unora's sending stone in Gazluk said, \"Ice Magic is well known for granting its users resilience. Let's make sure you understand this concept well.\n\nThere's a metal dodecahedron outside. Stand in it and say 'Ossugazak 2'. This will activate a training program. Be prepared.\n\n<i>[Must use Ice Magic to advance this quest.]</i>\"": "Камень связи Уноры в Газлуке сказал: «Ледяная магия хорошо известна тем, что дарит своим пользователям стойкость. Давай убедимся, что ты хорошо понимаешь эту концепцию.\n\nСнаружи стоит металлический додекаэдр. Встань в него и скажи «Оссугазак 2». Это активирует тренировочную программу. Будь готов.\n\n<i>[Для продвижения в этом задании необходимо использовать Ледяную магию.]</i>"
