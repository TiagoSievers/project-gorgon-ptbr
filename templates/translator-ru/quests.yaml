"Hulon won't let you use the Council Vault while you're an animal... if his superiors found out, he'd be in trouble. But he hinted that a suitable bribe would get him to look the other way.": "Халон не позволит вам пользоваться Хранилищем Совета, пока вы животное... если его начальство узнает, у него будут проблемы. Но он намекнул, что подходящая взятка заставит его закрыть на это глаза."
"Leonard Allenson claims that there are strange runes buried among some of the corpses inside Borghild. He wants you to find some and bring them back to him.": "Леонард Алленсон утверждает, что среди некоторых трупов внутри Боргилда зарыты странные руны. Он хочет, чтобы вы нашли несколько и принесли их ему."
