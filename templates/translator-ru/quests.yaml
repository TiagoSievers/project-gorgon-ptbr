"Sir Hughes in Statehelm said, \"Hey, I have to stand around watching recruits during business hours, so I keep missing my chance to pick up a package from Pumza's weapons stall. Can you go get it for me?\"": "Сэр Хьюз в Стейтхелме сказал: «Эй, мне приходится стоять и наблюдать за новобранцами в рабочее время, поэтому я постоянно пропускаю возможность забрать посылку с оружейного прилавка Пумзы. Можешь сходить и забрать её для меня?»"
"Zazzamath in The Rubywall in Vidaria said, \"I am <i>so</i> bored here, stuck in this giant red ice cube. I was sent here for one purpose and one purpose only, to destroy as much life as possible on this stupid rock. But there's no chance that's happening now. But maybe the outcome can still be achieved... I tell you what. Go out and end lives in my name, and I will tell you whatever you want to know about the invading demon force. Deal?\"": "Заззамат в Рубиновом Стене в Видарии сказал: «Мне здесь <i>так</i> скучно, застрял в этом гигантском красном ледяном кубе. Меня отправили сюда с одной единственной целью — уничтожить как можно больше жизни на этой глупой скале. Но теперь этому нет никакого шанса сбыться. Но, может быть, результат всё ещё можно достичь... Вот что. Выйди и покончи с жизнями от моего имени, и я расскажу тебе всё, что ты хочешь знать о вторгающейся демонической силе. Согласен?»"
