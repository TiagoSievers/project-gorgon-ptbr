"Deliver 10 Pansy Bouquets to Sheyna in Rahu. Reward: 8,814 councils.": "Доставьте 10 букетов анютиных глазок Шейне в Раху. Награда: 8,814 советов."
"Deliver 10 Panther Tails to Thimble Pete in Hogan's Keep, Eltibule. Reward: 418 councils.": "Доставьте 10 хвостов пантеры Тимбл Питу в Хоганском Крепости, Элтибуле. Награда: 418 советов."
"Deliver 10 Papermouth Fillets to Irkima in Red Wing Casino. Reward: 741 councils.": "Доставьте 10 филе бумажного рта Иркиме в казино Красное Крыло. Награда: 741 совет."
"Deliver 99 Papermouth Fillets to Sheyna in Rahu. Reward: 12,679 councils.": "Доставьте 99 филе бумажного рта Шейне в Раху. Награда: 12 679 советов."
"Irkima in Red Wing Casino said, \"I need the assistance of a Red Wing named Mandibles. She will only aid me if I produce something called 'paralytic chicken meat'.\n\nThe meat of several different bird-like creatures would work, but Mandibles said the most accessible meat is in a tower in Kur. I cannot go to Kur, it is too cold. She knows this and she taunts me with knowledge I cannot use! Please aid me?\"": "Иркима в казино Красное Крыло сказала: «Мне нужна помощь Красного Крыла по имени Мандиблс. Она поможет мне только если я принесу нечто под названием «паралитическое куриное мясо».\n\nПодойдёт мясо нескольких разных птицеподобных существ, но Мандиблс сказала, что самое доступное мясо находится в башне в Куре. Я не могу поехать в Кур — там слишком холодно. Она знает это и дразнит меня знаниями, которые я не могу использовать! Пожалуйста, помоги мне?"
"Deliver 10 Parmesan Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 12,485 councils.": "Доставьте 10 пармезана Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 12 485 советов."
"Tremmond Blackhammer in Povus said, \"I'm no gadgeteer or trinket-smith, but I was thinking about building a simple automated holder-arm. Nothin' fancy, just something a little smarter than a C-clamp!\n\nI don't want to ask Stephie for the parts, though, because that would go on our ledger. This isn't business, it's just an old dwarf messin' around! ... Say, maybe you could help me out? Here's some of the stuff I need. There's more, but this is the hard stuff.\"": "Треммонд Блэкхэммер в Повусе сказал: «Я не изобретатель и не мастер безделушек, но думал построить простой автоматический держатель-руку. Ничего особенного, просто что-то чуть умнее, чем C-образный зажим!\n\nНо я не хочу просить у Стефи детали, потому что это попадёт в нашу бухгалтерию. Это не бизнес, а просто старый гном балуется! ... Слушай, может, ты мне поможешь? Вот некоторые из нужных мне вещей. Есть и другие, но это самые сложные."
"Paul Vaughn in Serbule Hills said, \"This is gonna sound silly. But you know that watery beer Durstin sells? I found a way to improve it: strawberry juice! I just need a few strawberries for each cup. If you have some, I'll buy 'em from you for... I dunno, ten times their value!\"": "Пол Вон в Сербульских Холмах сказал: «Это прозвучит глупо. Но знаешь это водянистое пиво, которое продаёт Дёрстин? Я нашёл способ его улучшить: клубничный сок! Мне нужно всего несколько клубник на каждую кружку. Если у тебя есть, я куплю их у тебя за... не знаю, в десять раз дороже!»"
"Paul Vaughn in Serbule Hills said, \"I was one of the last lumberjacks to leave our logging camp. Thought I could hold out against some lousy goblins, but they just kept coming! Eventually I had to run. I left behind a lot of great beer, which I'm sure is all gone by now. But more importantly, I left behind my lucky belt buckle. I'd really like it back.\n\nThe camps are east of here, over some hills. The buckle is in the northernmost camp, if that helps.\"": "Пол Вон в Сербульских Холмах сказал: «Я был одним из последних лесорубов, покинувших наш лагерь. Думал, что смогу устоять против этих жалких гоблинов, но они всё шли и шли! В конце концов мне пришлось бежать. Я оставил много отличного пива, которое, уверен, уже всё пропало. Но что важнее — я оставил свой счастливый пряжку от ремня. Очень хочу её вернуть.\n\nЛагеря находятся к востоку отсюда, за холмами. Пряжка в самом северном лагере, если это поможет."
"Paul Vaughn in Serbule Hills said, \"You know the only good thing about staying here? It's the food! I know, most of it's nothing to write home about. But some days, Durstin makes his fried mycena bites, and they are delicious! They're my one weakness, really. I could eat a million of 'em!\n\nSadly, Durstin's not made any in a while. He offered to teach me the recipe so I could make 'em myself, but that's way too much work! Say... you wanna do it for me?\"": "Пол Вон в Сербульских Холмах сказал: «Знаешь, единственное хорошее в том, чтобы здесь оставаться — это еда! Я знаю, что большая часть её не стоит того, чтобы о ней рассказывать. Но иногда Дёрстин готовит свои жареные микенские кусочки, и они просто восхитительны! Это моя единственная слабость, честно. Я мог бы съесть их миллион!\n\nК сожалению, Дёрстин давно их не готовил. Он предложил научить меня рецепту, чтобы я мог готовить их сам, но это слишком много работы! Слушай... не хочешь сделать это за меня?"
"Helena Veilmoor in Hogan's Keep asked you to obtain some obsidians so she can pay off her debtors before they cut off her head and lay eggs down her neck. But no rush.": "Хелена Вейлмур в Хоганском Крепости попросила тебя добыть несколько обсидианов, чтобы она могла расплатиться с кредиторами, прежде чем они отрубят ей голову и отложат яйца на шею. Но спешить не нужно."
"Sam Veilmoor in Statehelm said, \"I need to pay off Helena's debt. But I can't entrust her with the money. Can I ask you to deliver it to the mantises? I've been communicating via letter with a mantis named Irkima. He... or she? Eh, whatever. It will take posession of the money. \"": "Сэм Вейлмур в Стейтхелме сказал: «Мне нужно погасить долг Хелены. Но я не могу доверить ей деньги. Могу ли я попросить тебя доставить их богомолам? Я общался по переписке с богомолом по имени Иркима. Он... или она? Да какая разница. Он заберёт деньги.»"
"Deliver 10 Peach Shaved Ices to Ogamboe in the Fae Realm. Reward: 16,542 councils.": "Доставьте 10 персиковых ледяных десертов Огамбо в Царство Фей. Награда: 16,542 совета."
"Umarak in Povus said, \"Tryaka's favorite snack was peaches. They always cheered her up! Pity they only grow far from here...\"": "Умарак в Повусе сказал: «Любимым лакомством Тряки были персики. Они всегда поднимали ей настроение! Жаль, что они растут только далеко отсюда...»"
"Deliver 10 Pear Shaved Ices to Ogamboe in the Fae Realm. Reward: 14,761 councils.": "Доставьте 10 грушевых ледяных десертов Огамбо в Области Фей. Награда: 14,761 советов."
"Paullus in Statehelm said, \"Hey, did you make that pear wine yet? It'd go great with this party!\"": "Пауллус в Стейтхелме сказал: «Эй, ты уже сделал это грушевое вино? Оно отлично подойдет для этой вечеринки!»"
"Deliver 10 Pearl Bracelets to Irkima in Red Wing Casino. Reward: 8,861 councils.": "Доставьте 10 жемчужных браслетов Иркиме в казино Красное Крыло. Награда: 8,861 советов."
"Steven Poplar in Statehelm said, \"Time to practice the technique I taught you to harvest excess negative emotions. Check my almanac to see what sort of undead are best to hunt right now. Then go kill them until you find some pearls! Remember: you don't have to be a priest to do this, but you do have to be wearing a Symbol of Arisetsu while you kill the undead.\"": "Стивен Поплар в Стейтхелме сказал: «Пора попрактиковаться в технике, которую я тебе преподавал, чтобы собирать избыточные негативные эмоции. Проверь мой альманах, чтобы узнать, каких нежить лучше всего охотиться сейчас. Затем убивай их, пока не найдёшь жемчуг! Помни: не обязательно быть жрецом, чтобы это делать, но обязательно носить Символ Арисецу, пока убиваешь нежить.»"
"Deliver 10 Peas to Ogamboe in the Fae Realm. Reward: 11,437 councils.": "Доставьте 10 горошин Огамбо в Область Фей. Награда: 11,437 советов."
"Deliver 10 Peasant's Pies to Laura Neth in Kur Mountains. Reward: 3,033 councils.": "Доставьте 10 крестьянских пирогов Лауре Нет в горах Кур. Награда: 3,033 совета."
"Deliver 10 Peening Hammers to Sheyna in Rahu. Reward: 1,053 councils.": "Доставьте 10 кувалд для отбивки Шейне в Раху. Награда: 1 053 совета."
"Pegast in the Fae Realm said, \"I'll teach you Armor Patching if you bring me some strange, finely ground dirt to help me polish my equipment.\"": "Пегаст в Фейском мире сказал: «Я научу тебя заплаткам для брони, если ты принесёшь мне странную, мелко измельчённую землю, чтобы помочь мне отполировать моё снаряжение.»"
"Deliver 10 Pemphredo Eyes to Irkima in Red Wing Casino. Reward: 2,311 councils.": "Доставьте 10 Глаз Пемфредо Иркиме в казино Красное Крыло. Награда: 2 311 советов."
"Deliver 10 Pepper Jack Cheese to Thimble Pete in Hogan's Keep, Eltibule. Reward: 15,208 councils.": "Доставьте 10 сыров Перец Джек Тримбл Питу в Хоганском Крепости, Элтибуль. Награда: 15,208 советов."
"Deliver 10 Pepper Venisons to Laura Neth in Kur Mountains. Reward: 5,619 councils.": "Доставьте 10 перченых оленин Лауре Нет в горах Кур. Награда: 5,619 советов."
"Deliver 10 Perch to Fitz the Boatman on the Serbule docks. Reward: 314 councils.": "Доставьте 10 окуней Фитцу Лодочнику на доках Сербуля. Награда: 314 советов."
"Deliver 10 Perch Fillets to Fitz the Boatman on the Serbule docks. Reward: 173 councils.": "Доставьте 10 филе окуня Фитцу лодочнику на доках Сербуля. Награда: 173 совета."
"Deliver 99 Perch Fillets to Sheyna in Rahu. Reward: 3,067 councils.": "Доставьте 99 филе окуня Шейне в Раху. Награда: 3 067 советов."
"Deliver 10 Perch Nigiri to Ogamboe in the Fae Realm. Reward: 5,192 councils.": "Доставьте 10 нигири из окуня Огамбо в Царстве Фей. Награда: 5,192 совета."
"Deliver 10 Perch Sushi Rolls to Ogamboe in the Fae Realm. Reward: 6,076 councils.": "Доставьте 10 роллов из окуня Огамбо в Фейском царстве. Награда: 6,076 советов."
"Deliver 10 Perfect Cedar Wood to Irkima in Red Wing Casino. Reward: 4,262 councils.": "Доставьте 10 единиц идеальной кедровой древесины Иркиме в казино Красное Крыло. Награда: 4 262 совета."
"Deliver 10 Perfect Cotton to Thimble Pete in Hogan's Keep, Eltibule. Reward: 3,638 councils.": "Доставьте 10 Идеального хлопка Тимбл Питу в Хоганском Крепости, Элтибуль. Награда: 3 638 советов."
"Deliver 10 Perfect Giant Snail Shells to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,204 councils.\nNote from orderer: <i>\"I heard that some backwater called Eltibule has hundreds of gigantic armored snails!\"</i>": "Доставьте 10 идеальных раковин гигантских улиток Тимбл Питу в Крепость Хогана, Элтибул. Награда: 2 204 совета.  \nПримечание от заказчика: <i>«Я слышал, что в какой-то глуши под названием Элтибул есть сотни гигантских бронированных улиток!»</i>"
"Deliver 10 Perfect Maple Wood to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,089 councils.": "Доставьте 10 единиц идеальной клёновой древесины Тимбл Питу в Хоганском укреплении, Элтибул. Награда: 2 089 советов."
"Deliver 10 Perfect Memory Inhibitors to Fitz the Boatman on the Serbule docks. Reward: 2,069 councils.": "Доставьте 10 ингибиторов совершенной памяти Фитцу Лодочнику на доках Сербуля. Награда: 2,069 советов."
"Deliver 10 Perfect Oak Wood to Fitz the Boatman on the Serbule docks. Reward: 830 councils.": "Доставьте 10 единиц идеального дубового леса Фитцу Лодочнику на доках Сербуля. Награда: 830 советов."
"Roshun the Traitor in Serbule mentioned that he wished he had a Trophy Tiger Skin. They are rare items found by expert skinners.": "Рошун Предатель в Сербуле упоминал, что хотел бы иметь трофейную тигровую шкуру. Это редкие предметы, которые находят опытные снятчики шкур."
"Deliver 10 Perfectly Baked Potatoes to Fitz the Boatman on the Serbule docks. Reward: 1,075 councils.": "Доставьте 10 Идеально Запечённых Картофелин Фитцу Лодочнику на причалах Сербуля. Награда: 1,075 советов."
"Deliver 10 Perfectly Baked Turkeys to Irkima in Red Wing Casino. Reward: 10,648 councils.": "Доставьте 10 идеально запечённых индейок Иркиме в казино Красное Крыло. Награда: 10 648 советов."
"A goblin named Jumjab in Eltibule asked for some perfectly round pebbles. He says there's no common place to find them, but they can be found \"all over the place\".": "Гоблин по имени Джамджаб в Элтибуле попросил несколько идеально круглых гальок. Он говорит, что их нельзя найти в каком-то одном месте, но они встречаются «повсюду»."
"Deliver 10 Peridots to Thimble Pete in Hogan's Keep, Eltibule. Reward: 4,080 councils.": "Доставьте 10 перидотов Тимбл Питу в Хоганской крепости, Элтибуль. Награда: 4 080 советов."
"Flia has asked for a peridot.": "Флия попросила перидот."
"Deliver 10 Persona Minimizer Potions to Viedesi in Sun Vale. Reward: 2,093 councils.": "Доставьте 10 Зелий Минимизации Персоны Виедеси в Солнечную Долину. Награда: 2 093 совета."
"Deliver 10 Persona Reducer Potions to Viedesi in Sun Vale. Reward: 1,207 councils.": "Доставьте 10 Зелий Сокращения Личности Виедеси в Солнечную Долину. Награда: 1,207 советов."
"Kalaba in Eltibule taught you the basics of Transmutation. He asked you to find weak magical items (\"Uncommon\" rarity items, with a green label) and turn them into Phlogiston. You learned a Transmutation recipe to do this -- it's in your Recipes menu.": "Калаба в Элтибуле научил вас основам Трансмутации. Он попросил вас найти слабые магические предметы (предметы редкости «Необычные» с зелёной меткой) и превратить их в Флогистон. Вы выучили рецепт Трансмутации для этого — он находится в вашем меню Рецептов."
"Deliver 10 Phoenix Beaks to Ogamboe in the Fae Realm. Reward: 3,832 councils.": "Доставьте 10 клювов феникса Огамбо в Фейский мир. Награда: 3,832 совета."
"Deliver 5 Phoenix Eggs to Ogamboe in the Fae Realm. Reward: 121,040 councils.": "Доставьте 5 яиц Феникса Огамбо в Царство Фей. Награда: 121,040 советов."
"Deliver 10 Phoenix Feathers to Ogamboe in the Fae Realm. Reward: 21,957 councils.": "Доставьте 10 перьев Феникса Огамбо в Царство Фей. Награда: 21,957 советов."
"Ensign Cricket aboard the Wintertide said, \"Any invasion force would be dumb not to take out the phoenixes on the engine deck. We don't use them in day-to-day operations, but if we have to cold-start an engine, we use their superheated breath.\"": "Мичман Крикет на борту Зимней Волны сказал: «Любое вторжение было бы глупо, если бы не уничтожить фениксов на машинном отделении. Мы не используем их в повседневных операциях, но если нам нужно холодно запустить двигатель, мы используем их сверхнагретое дыхание.»"
"Jesina asked for some Pick-Me-Up Juice.": "Джесина попросила немного сока Подбодрить."
"Deliver 10 Pick-Me-Up Juices to Fitz the Boatman on the Serbule docks. Reward: 440 councils.": "Доставьте 10 эликсиров бодрости Фитцу Лодочнику на причалы Сербуля. Награда: 440 советов."
"Deliver 10 Pig Boost Potion 20% to Irkima in Red Wing Casino. Reward: 7,009 councils.": "Доставьте 10 Зелий Усиления Свиньи 20% Иркиме в Казино Красное Крыло. Награда: 7,009 советов."
"Deliver 10 Pig Feet to Fitz the Boatman on the Serbule docks. Reward: 314 councils.": "Доставьте 10 свиных ножек Фитцу Лодочнику на доках Сербуля. Награда: 314 советов."
"Deliver 10 Pig Snouts to Fitz the Boatman on the Serbule docks. Reward: 2,080 councils.": "Доставьте 10 свиных рыл Фитцу Лодочнику на доках Сербуля. Награда: 2,080 советов."
"Deliver 10 Pike Fillets to Viedesi in Sun Vale. Reward: 1,501 councils.": "Доставьте 10 филе щуки Вьедеси в Солнечную Долину. Награда: 1 501 совет."
"Deliver 99 Pike Fillets to Sheyna in Rahu. Reward: 26,881 councils.": "Доставьте 99 филе щуки Шейне в Раху. Награда: 26,881 совет."
"Midge in the Fae Realm said, \"If I can make a potion to fix my mind, it might fix yours too! Can you grind up some mushroom flakes for me?\"": "Мидж в Фейском мире сказал: «Если я смогу сделать зелье, чтобы исправить свой разум, возможно, оно поможет и тебе! Можешь измельчить для меня немного грибных хлопьев?»"
"Midge in the Fae Realm said, \"If I can make a potion to fix my mind, it might fix yours too! Can you bring me some ingredients I'm missing?\"": "Мидж в Фейском мире сказала: «Если я смогу сварить зелье, чтобы исправить свой разум, возможно, оно поможет и тебе! Можешь принести мне недостающие ингредиенты?»"
"Deliver 10 Pinfish Fillets to Irkima in Red Wing Casino. Reward: 223 councils.": "Доставьте 10 филе игольчатой рыбы Иркиме в казино Красное Крыло. Награда: 223 совета."
"Deliver 99 Pinfish Fillets to Sheyna in Rahu. Reward: 3,067 councils.": "Доставьте 99 филе пинфиша Шейне в Раху. Награда: 3 067 советов."
"Deliver 10 Pixie Antlers to Ogamboe in the Fae Realm. Reward: 4,738 councils.": "Доставьте 10 Оленьих Рогов Фей Огамбо в Царство Фей. Награда: 4,738 советов."
"Deliver 10 Pixie Dust to Ogamboe in the Fae Realm. Reward: 7,457 councils.": "Доставьте 10 пыльцы фей Огамбо в Царство Фей. Награда: 7,457 советов."
"Deliver 99 Pixie Dust to Korbok in Vidaria. Reward: 74,986 councils.": "Доставьте 99 пыльцы фей Корбоку в Видарии. Награда: 74,986 советов."
"Deliver 10 Pixie Pockets to Ogamboe in the Fae Realm. Reward: 6,354 councils.": "Доставьте 10 карманов пикси Огамбо в Царство Фей. Награда: 6,354 совета."
"Uriana in the fae realm said, \"My horn hurts! It burns with righteousness! I need a new horn, a horn of dark! Fetch it fresh from the most despicable pixie you can. Go!\"": "Уриана в мире фей сказала: «Мой рог болит! Он пылает праведным гневом! Мне нужен новый рог, рог тьмы! Принеси его свежим от самой отвратительной феи, какую только сможешь найти. Вперёд!»"
"Uriana in the fae realm said, \"It is difficult to remember what beast is a true immortal and what is not. But I have invented something in the human tongue to help! Bury bears. Because they are mortal, you see? \"Bury bears\"? Go and practice until this trick is burned into your mind.\"": "Уриана в царстве фей сказала: «Трудно помнить, какое существо истинно бессмертно, а какое нет. Но я придумала кое-что на человеческом языке, чтобы помочь! Хорони медведей. Потому что они смертны, понимаешь? «Хорони медведей»? Иди и практикуйся, пока этот трюк не врежется тебе в память.»"
"Uriana in the fae realm said, \"At night, go south of here until you find the fiery birds, which are immortal like me, and seek the crimsonfelt moths, which are not immortal. Steal these moths' lives. Let the phoenices see you do it! That is the only way to make them understand what I understand.\"": "Уриана в царстве фей сказала: «Ночью иди к югу отсюда, пока не найдёшь огненных птиц, которые бессмертны, как я, и ищи багровопалых мотыльков, которые не бессмертны. Укради жизни этих мотыльков. Пусть фениксы увидят, как ты это делаешь! Это единственный способ заставить их понять то, что понимаю я.»"
"Uriana in the fae realm said, \"Listen for the buzz of bees at night. You will see that it is not bees who dwell in the night, it is wasps! Wasps who bask in the power the Winter Queen! They sting all who oppose her. You know what to do.\"": "Уриана в фейском мире сказала: «Слушай жужжание пчёл ночью. Ты увидишь, что в ночи живут не пчёлы, а осы! Осы, которые купаются в силе Зимней Королевы! Они жалят всех, кто ей противится. Ты знаешь, что делать.»"
"Uriana in the fae realm said, \"Pixies hunt; fairies hunt; panthers hunt! But one is not worthy! NOT WORTHY! They are not like us! They seethe with mortality! Can you not smell the mortality of the panthers?! Show them their mortality! SHOW THEM!\"": "Уриана в фейском царстве сказала: «Пикси охотятся; феи охотятся; пантеры охотятся! Но один недостоин! НЕДОСТОИН! Они не такие, как мы! Они кипят смертностью! Разве ты не чувствуешь смертность пантер?! Покажи им их смертность! ПОКАЖИ ИМ!»"
"Uriana in the fae realm said, \"Yesterday I experienced fear. Why should I suffer fear?! I am immortal! Yet I did fear. I was hunted by another immortal: a true barghest, and I was afraid! I slew it, but I knew it would return, and so my fear only grew!\n\nI do not like fear. I do not like it! Go and find the barghest's new body and vanquish my fear with your actions!\"": "Уриана в фейском царстве сказала: «Вчера я испытала страх. Почему я должна страдать от страха?! Я бессмертна! Но всё же я боялась. Меня преследовал другой бессмертный: настоящий баргест, и я боялась! Я убила его, но знала, что он вернётся, и мой страх только рос!\n\nМне не нравится страх. Мне это не нравится! Иди и найди новое тело баргеста и уничтожь мой страх своими действиями!"
"Uriana in the fae realm said, \"I have been to the ancient ruins and I have meditated there. You, too, must go. Touch them. Feel their bones. Hear their words.\"": "Уриана в фейском мире сказала: «Я была в древних руинах и медитировала там. Ты тоже должен пойти. Прикоснись к ним. Почувствуй их кости. Услышь их слова.»"
"Uriana in the fae realm said, \"There is only one way to overcome the bees: let them sting you. Yes! Tell them to inject their hatred into you. INTO YOU, and yet you survive! Show them. Show them their hatred is unworthy.\"": "Уриана в мире фей сказала: «Есть только один способ преодолеть пчёл: позволь им ужалить тебя. Да! Скажи им впрыснуть свою ненависть в тебя. В ТЕБЯ, и всё же ты выживаешь! Покажи им. Покажи им, что их ненависть недостойна.»"
"Uriana in the fae realm said, \"I remember a thing! It is called a Pixie Pocket. So named by cruel mortals! Or... perhaps named by cruel fairies... I do not remember. But I think I remember the formula! Here: my notes. Make the Pixie Pocket. Tell me if my formula works.\"": "Уриана в фейском царстве сказала: «Я вспомнила кое-что! Это называется Карман Пикси. Так назвали жестокие смертные! Или... может быть, жестокие феи... Я не помню. Но, кажется, я помню формулу! Вот: мои заметки. Сделай Карман Пикси. Скажи мне, работает ли моя формула.»"
"Uriana in the fae realm said, \"Go and pluck the wings from shimmerwings. Listen to their final dying words and then you will know what I know.\"": "Уриана в царстве фей сказала: «Иди и сорви крылья у сверкающих крыльев. Послушай их последние умирающие слова, и тогда ты узнаешь то, что знаю я.»"
"Pegast in the Fae Realm said, \"Vines keep attacking people south of town. I don't mean the spriggan weeds, I mean the OTHER kind! Floxie calls them carnivines. And really, Floxie should be the one to deal with these pests, given she's on plant duty, but she refuses! Will you remove these vicious weeds before someone gets hurt?\"": "Пегаст в Фейском мире сказал: «Лозы продолжают нападать на людей к югу от города. Я не про сорняки спригганов, я про ДРУГОЙ вид! Флокси называет их плотоядными лозами. И вообще, Флокси должна заниматься этими вредителями, ведь она отвечает за растения, но она отказывается! Уберёшь эти свирепые сорняки, пока кто-нибудь не пострадал?»"
"Deliver 10 Poached Eggs to Fitz the Boatman on the Serbule docks. Reward: 1,949 councils.": "Доставьте 10 яиц пашот Фитцу Лодочнику на доках Сербуля. Награда: 1,949 советов."
"Engineer Crall in Vidaria said, \"I've heard that some of the demonic rocks to the north have useful properties. There is one in particular that interests me, some kind of frozen magma. I would like to tinker with this one, and see if it has useful engineering applications. If you bring me a few, I will share any findings with you.\"": "Инженер Кралл в Видарии сказал: «Я слышал, что некоторые демонические камни на севере обладают полезными свойствами. Есть один, который особенно меня интересует — некий замороженный магма. Я хотел бы поэкспериментировать с ним и посмотреть, есть ли у него полезные инженерные применения. Если ты принесёшь мне несколько, я поделюсь с тобой своими находками.»"
"Deliver 10 Poison Resistance Potions to Fitz the Boatman on the Serbule docks. Reward: 830 councils.": "Доставьте 10 зелий сопротивления яду Фитцу Лодочнику на причалы Сербуля. Награда: 830 советов."
"A beehive in the Fae Realm said, \"Bzz. BzzZZzzz ...Bzz. ZzzZzzZzzBz ... zzzBzt!\nWe need your help, fairy. Our enemies burrow under the ground to ambush us while we pollinate.\n\nZzrt bzz. ZzzZzzZzzBz ... zzzBzt!\nWe cannot care for our young flowers. You must go instead.\n\nBzzRtxl!\nPollinate our young flowers!\"": "Улей в Фейском мире сказал: «Бзз. БззЗЗзз... Бзз. ЗззЗззЗзБз... зззБзт!  \nНам нужна твоя помощь, фея. Наши враги роются под землёй, чтобы устроить нам засаду, пока мы опыляем.\n\nЗзрт бзз. ЗззЗззЗзБз... зззБзт!  \nМы не можем заботиться о наших молодых цветах. Ты должна сделать это вместо нас.\n\nБззРтхл!  \nОпылить наши молодые цветы!"
"Deliver 10 Pompano Fillets to Irkima in Red Wing Casino. Reward: 1,111 councils.": "Доставьте 10 филе помпано Иркиме в казино Красное Крыло. Награда: 1 111 советов."
"Deliver 99 Pompano Fillets to Sheyna in Rahu. Reward: 19,582 councils.": "Доставьте 99 филе помпано Шейне в Раху. Награда: 19,582 совета."
"Deliver 10 Poppies to Thimble Pete in Hogan's Keep, Eltibule. Reward: 2,102 councils.": "Доставьте 10 маков Тимбл Питу в Хоганском замке, Элтибуль. Награда: 2,102 совета."
"Deliver 10 Poppy Bouquets to Sheyna in Rahu. Reward: 11,543 councils.": "Доставьте 10 букетов из маков Шейне в Раху. Награда: 11,543 совета."
"Ailred in Povus said, \"Well, you've made me wait so long for my food that I'm not even that hungry. I'll take the appetizers to go, please. Oh, don't tell me you lost my appetizer order?! It was spicy porcini bites! I need two servings. And not too greasy!\"": "Эйлред в Повусе сказал: «Ну, вы заставили меня так долго ждать еду, что я уже не так голоден. Я возьму закуски с собой, пожалуйста. О, не говорите, что вы потеряли мой заказ на закуски?! Это были острые закуски из белых грибов! Мне нужно две порции. И не слишком жирные!»"
