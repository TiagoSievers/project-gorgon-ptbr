"Brianna Willer in Serbule Hills said, \"My bitchy old friend Gretchen taught me a special brewing recipe. I'm eager to try it, but it needs potatoes. I hate growing potatoes! You do it.\"": "Брианна Уиллер в Сербульских Холмах сказала: «Моя сварливая старая подруга Гретхен научила меня особому рецепту пивоварения. Мне не терпится попробовать, но нужны картофелины. Я ненавижу выращивать картофель! Сделай это ты.»"
"Jesina asked for a dozen potatoes.": "Йесина попросила дюжину картофелин."
