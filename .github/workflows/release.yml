# Gera zips Linux + Windows (com INSTALAR.exe) e publica na Release ao criar tag v*.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependências e BepInEx vendor
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          bash scripts/fetch-bepinex-vendor.sh

      - name: Pacote Linux
        run: make release-pack

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: releases/Project-Gorgon-PT-BR-*-Linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: BepInEx vendor
        shell: bash
        run: bash scripts/fetch-bepinex-vendor.sh

      - name: INSTALAR.exe (PyInstaller)
        run: powershell -ExecutionPolicy Bypass -File scripts/build-windows-installer.ps1

      - name: Pacote Windows
        shell: bash
        run: |
          bash scripts/assemble-pack-windows.sh
          bash scripts/release-pack-windows.sh

      - name: Verificar INSTALAR.exe no zip
        shell: bash
        run: |
          unzip -l releases/Project-Gorgon-PT-BR-*-Windows.zip | grep -F "INSTALAR.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: releases/Project-Gorgon-PT-BR-*-Windows.zip

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-zip/*
            artifacts/windows-zip/*
          generate_release_notes: true
