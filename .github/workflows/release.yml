# Publica Project-Gorgon-PT-BR-v*-Pack.zip ao criar tag v*.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y zip mingw-w64
          bash scripts/fetch-bepinex-vendor.sh

      - name: Montar e zipar pack PT-BR
        run: |
          make release-pack-ptbr

      - name: Verificar zip
        run: bash scripts/verify-pack-zip.sh

      - uses: actions/upload-artifact@v4
        with:
          name: pack-zip
          path: releases/Project-Gorgon-PT-BR-*-Pack.zip

  publish:
    needs: [build-pack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/pack-zip/*
          generate_release_notes: true
